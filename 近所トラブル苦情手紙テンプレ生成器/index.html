<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>近所トラブル苦情手紙テンプレ生成器｜穏やかに伝える文面を即作成</title>
  <meta name="description" content="騒音・ゴミ出し・タバコ・ペット・駐車などの近所トラブルを、関係を悪化させずに伝える手紙文を即生成。トーンを3段階から選べて、対面で言いづらい一言を穏やかな文面に置き換えられます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }
    .letter-body {
      font-size: 0.95rem; line-height: 1.85; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px; padding: 1.1rem 1rem;
      margin-bottom: 0.8rem; text-align: left;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { opacity: 0.8; }
    .copy-msg { display: none; text-align: center; font-size: 0.82rem; color: var(--ok); margin-top: 0.5rem; font-weight: 700; }
    .copy-msg.show { display: block; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:first-child { width: 6em; font-weight: 600; color: var(--text); }
    .detail-table td:last-child { color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>近所トラブル苦情手紙テンプレ生成器</h1>
    <p class="subtitle">対面で言いづらい一言を、関係を悪化させない文面に。</p>
  </header>

  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="kind">トラブルの種類</label>
      <select id="kind">
        <option value="noise">騒音（足音・話し声・楽器・夜間の物音）</option>
        <option value="trash">ゴミ出し（曜日違反・分別違反・収集後放置）</option>
        <option value="smoke">タバコ（ベランダ・玄関先・受動喫煙）</option>
        <option value="pet">ペット（鳴き声・フン放置・抜け毛）</option>
        <option value="parking">駐車・駐輪（無断駐車・はみ出し）</option>
        <option value="other">その他（共用部の使い方・庭木のはみ出しなど）</option>
      </select>
    </div>
    <div class="field">
      <label for="rel">相手との関係</label>
      <select id="rel">
        <option value="next">隣の家</option>
        <option value="up">上の階の方</option>
        <option value="down">下の階の方</option>
        <option value="same">同じ階・同じマンションの方</option>
        <option value="block">町内会・近隣住民の方</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">伝え方のトーン</label>
      <select id="tone">
        <option value="soft">やんわり（角を立てない初回のお願い）</option>
        <option value="mid" selected>中間（具体的に・でも丁寧に）</option>
        <option value="firm">しっかり（改善されない場合の毅然とした文面）</option>
      </select>
      <p class="hint">最初は「やんわり」が無難です。改善されないときに「中間」「しっかり」へ。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="makeLetter()">手紙を作る</button>

  <div class="result-card" id="result">
    <p class="result-label">生成された手紙</p>
    <div class="letter-body" id="rv">—</div>
    <button class="btn-copy" onclick="copyLetter()">📋 全文をコピー</button>
    <p class="copy-msg" id="cm">コピーしました</p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">伝え方のポイント</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、法務省・国民生活センター・自治体の生活相談窓口などで案内される「近隣トラブル時の穏やかな伝え方」の基本パターンを参考に、文面を組み立てています。深刻な被害がある場合は管理会社・自治会・専門相談窓口へご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'neighbor_letter_v1';

  // 関係性 → 冒頭の呼びかけ
  var GREETING = {
    next:  '隣家の方へ',
    up:    '上階にお住まいの方へ',
    down:  '下階にお住まいの方へ',
    same:  '同じマンションにお住まいの方へ',
    block: 'ご近所の皆様へ'
  };

  // トラブル種別 → 事象（トーン別の描写）
  var ISSUE = {
    noise: {
      soft: '夜分の物音や話し声が、思いがけずこちらまで届いてくることがございまして',
      mid:  '夜遅くの足音や話し声、物を動かす音などが、こちらの部屋にもよく響いておりまして',
      firm: '深夜から早朝にかけての足音・話し声・物音が、たびたび当方の生活に支障をきたしております'
    },
    trash: {
      soft: '集積所のゴミの出し方について少し気になることがございまして',
      mid:  '指定の曜日や分別ルールと異なるゴミが出されていることが続いておりまして',
      firm: '収集ルールに沿わないゴミの排出が繰り返されており、集積所の衛生状態が悪化しております'
    },
    smoke: {
      soft: 'お煙草の煙が、風向きの加減でこちらにも届くことがございまして',
      mid:  'ベランダや玄関先でのお煙草の煙が、こちらの窓・洗濯物にも流れてきておりまして',
      firm: 'ベランダ等での喫煙によるにおい・煙が、当方の居室・洗濯物へ繰り返し流入しております'
    },
    pet: {
      soft: 'お飼いのペットのことで少しご相談したいことがございまして',
      mid:  '鳴き声やフン・抜け毛などについて、こちらでも気になる場面がございまして',
      firm: 'ペットの鳴き声やフンの未処理が続いており、当方の生活環境に支障をきたしております'
    },
    parking: {
      soft: '駐車場・駐輪場の使い方について少しご相談させてください',
      mid:  '指定区画外への駐車・駐輪、もしくははみ出しなどが見受けられまして',
      firm: '無断駐車（駐輪）または区画はみ出しが繰り返されており、こちらの利用に支障が出ております'
    },
    other: {
      soft: '共用部分の使い方について、少しご相談したいことがございまして',
      mid:  '共用部の使い方・植栽のはみ出しなどについて、気になる点がございまして',
      firm: '共用部分の使用方法について改善のお願いをこれまで申し上げておりますが、状況が変わっておらず'
    }
  };

  // トラブル種別 → お願い文（トーン別）
  var REQUEST = {
    noise: {
      soft: 'もし可能でしたら、夜間の音にだけ少しお気遣いいただけますと大変ありがたく存じます。',
      mid:  '恐れ入りますが、夜22時以降は足音や話し声、物音などにつきまして、もう一段ご配慮いただけますようお願い申し上げます。',
      firm: '誠に恐縮ですが、深夜帯（22時〜翌7時）の生活音について、改めてご配慮くださいますよう強くお願い申し上げます。改善が見られない場合、管理会社（自治会）へ相談させていただく可能性がございます。'
    },
    trash: {
      soft: 'お互いさまの部分かと思いますので、改めて曜日と分別をご確認いただけますと幸いです。',
      mid:  '集積所の使い方について、改めて指定曜日・分別区分のご確認をお願いできれば幸いです。',
      firm: 'ゴミの排出ルールについて、改めて遵守いただきますよう強くお願い申し上げます。改善が見られない場合は、管理会社・自治体清掃部署へ相談させていただきます。'
    },
    smoke: {
      soft: '差し支えなければ、風向きの強い時間帯だけでも少しお気遣いいただけますと幸いです。',
      mid:  '恐れ入りますが、ベランダ・玄関先での喫煙につきまして、ご配慮をお願いできれば幸いです。',
      firm: 'ベランダ等屋外の共用部に近い場所での喫煙について、改善をお願い申し上げます。今後も同様の状況が続く場合は、管理会社へ正式に相談いたします。'
    },
    pet: {
      soft: '可愛いペットだとは思いつつ、少しお気遣いいただけますと大変ありがたく存じます。',
      mid:  '恐れ入りますが、鳴き声の時間帯・フンの始末などにつきまして、もう一段ご配慮いただけますと幸いです。',
      firm: 'ペットの鳴き声・フン処理等について、飼い主としての責任あるご対応を改めてお願い申し上げます。改善が見られない場合は、管理会社・自治体窓口へ相談いたします。'
    },
    parking: {
      soft: 'もしご事情があるようでしたら、一度お話しできるとありがたく存じます。',
      mid:  '恐れ入りますが、指定区画内での駐車（駐輪）にご協力いただけますようお願い申し上げます。',
      firm: '無断駐車（駐輪）・区画はみ出しの継続が確認されております。改善されない場合は、管理会社または警察への通報も検討させていただきます。'
    },
    other: {
      soft: 'お時間のあるときに、一度ご相談させていただけますと幸いです。',
      mid:  '恐れ入りますが、共用部分の使い方について改めてご配慮いただけますと幸いです。',
      firm: '共用部分の使用について、改めて適切なご対応をお願い申し上げます。改善が見られない場合は、管理会社・自治会へ相談いたします。'
    }
  };

  // トーン → 末尾締め
  var CLOSING = {
    soft: 'こうしてお手紙という形になってしまったこと、ご無礼をお許しください。今後とも、どうぞよろしくお願い申し上げます。',
    mid:  '直接お伝えするのが難しく、書面にてのご連絡となりましたこと、ご容赦ください。今後ともご近所として、よろしくお願い申し上げます。',
    firm: '直接申し上げる機会を持てず、書面にてのご連絡となりましたことをお詫び申し上げます。何卒、誠実なご対応をお願い申し上げます。'
  };

  // トーン → 伝え方のポイント
  var POINTS = {
    soft: [
      ['宛先', '個人名は書かず「○○の方へ」とぼかすと角が立ちません'],
      ['差出', '匿名 or 「同じマンションの住人より」程度が無難です'],
      ['投函', 'ポストに直接投函。手書きより印字のほうが感情を抑えやすいです'],
      ['注意', '感情表現（うるさい・迷惑）は使わず、事実と希望だけにしましょう']
    ],
    mid: [
      ['宛先', '「○○号室の方へ」など、相手に届く範囲で具体化します'],
      ['差出', '名乗るかどうかは状況次第。名乗ると誠実さが伝わります'],
      ['投函', '日付を入れて、控えを1枚手元に保管しておきましょう'],
      ['注意', '時間帯・頻度など事実は具体的に、感情は抑えめに']
    ],
    firm: [
      ['宛先', '相手の号室・部屋を明記。誤投函を避けます'],
      ['差出', '名乗ることを推奨。問題が深刻化した場合の証跡になります'],
      ['控え', '同じ文面のコピーと投函日のメモを必ず保管してください'],
      ['注意', '次の段階（管理会社・自治会・警察）への相談先を1つ用意してから投函を']
    ]
  };

  function makeLetter() {
    var kind = document.getElementById('kind').value;
    var rel  = document.getElementById('rel').value;
    var tone = document.getElementById('tone').value;

    var greet = GREETING[rel] || 'ご近所の方へ';
    var issue = (ISSUE[kind] && ISSUE[kind][tone]) || '';
    var req   = (REQUEST[kind] && REQUEST[kind][tone]) || '';
    var close = CLOSING[tone] || '';

    var opener = tone === 'firm'
      ? '突然のお手紙、失礼いたします。'
      : tone === 'mid'
        ? '突然お手紙にて失礼いたします。'
        : 'はじめまして、突然のお手紙ご無礼いたします。';

    var body = greet + '\n\n'
             + opener + '\n\n'
             + issue + '、'
             + 'ご事情があってのことかと存じますが、お手紙という形でご相談させていただきました。\n\n'
             + req + '\n\n'
             + close + '\n\n'
             + '令和の日付：' + formatDate() + '\n'
             + '同じ建物の住人より';

    document.getElementById('rv').textContent = body;
    document.getElementById('result').className = 'result-card';
    document.getElementById('result').style.display = 'block';

    var rows = POINTS[tone] || [];
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';

    save({ kind: kind, rel: rel, tone: tone });

    var rc = document.getElementById('result');
    if (rc.scrollIntoView) rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyLetter() {
    var txt = document.getElementById('rv').textContent;
    if (!txt || txt === '—') return;
    var done = function() {
      var m = document.getElementById('cm');
      m.classList.add('show');
      setTimeout(function(){ m.classList.remove('show'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  function formatDate() {
    var d = new Date();
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }

  function save(s) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
  }
  function load() {
    try {
      var s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!s) return;
      if (s.kind) document.getElementById('kind').value = s.kind;
      if (s.rel)  document.getElementById('rel').value  = s.rel;
      if (s.tone) document.getElementById('tone').value = s.tone;
    } catch(e) {}
  }
  load();
  </script>
