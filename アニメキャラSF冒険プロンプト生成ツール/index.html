<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="アニメキャラ名と冒険舞台を選択するだけで、SF背景の詳細AIプロンプトが自動生成できる無料ツール。キャラ設定と組み合わせて、推し活イラスト生成や創作に即使えます。">
  <title>🎨 アニメキャラSF冒険プロンプト生成ツール</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果エリア ── */
    .prompt-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .prompt-card.show { display: block; }
    .prompt-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-transform: uppercase; }
    .prompt-text {
      font-size: 0.95rem; font-weight: 500; line-height: 1.7; color: var(--text);
      background: var(--accent-light); padding: 1rem;
      border-radius: 8px; word-break: break-word; white-space: pre-wrap;
    }
    .btn-copy {
      display: inline-block; margin-top: 0.8rem; padding: 0.6rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .prompt-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->

<body>

  <header class="app-header">
    <h1>🎨 アニメキャラSF冒険プロンプト生成ツール</h1>
    <p class="subtitle">アニメキャラの設定と冒険舞台を選ぶと、SF背景の詳細プロンプトがサクッと生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="character">キャラクター</label>
      <select id="character">
        <option value="">-- キャラクターを選択 --</option>
        <option value="魔女">魔女</option>
        <option value="賞金稼ぎ">賞金稼ぎ</option>
        <option value="宇宙海賊">宇宙海賊</option>
        <option value="テロリスト">テロリスト</option>
        <option value="探偵">探偵</option>
        <option value="科学者">科学者</option>
        <option value="忍者">忍者</option>
        <option value="兵士">兵士</option>
      </select>
    </div>
    <div class="field">
      <label for="stage">冒険舞台</label>
      <select id="stage">
        <option value="">-- 舞台を選択 --</option>
        <option value="未来の地球">未来の地球</option>
        <option value="宇宙空間">宇宙空間</option>
        <option value="異星">異星</option>
        <option value="時間跳躍">時間跳躍</option>
        <option value="サイバーシティ">サイバーシティ</option>
        <option value="深海コロニー">深海コロニー</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">プロンプトを生成</button>

  <!-- 結果カード -->
  <div class="prompt-card" id="result">
    <p class="prompt-label">生成されたプロンプト</p>
    <div class="prompt-text" id="promptText"></div>
    <button class="btn-copy" onclick="copyPrompt()">📋 コピーする</button>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── プロンプト生成データベース ──
  var prompts = {
    '魔女': {
      '未来の地球': '黒いマントを纏った魔女。ネオンが灯る高層ビル群の屋上で、魔法と科学が融合した儀式を行っている。手には発光する魔法陣、背景は赤と青に光る未来都市。',

      '異星': '紫色の異星の荒野で、奇妙な色合いの花が咲く大地に立つ魔女。未知のエネルギーが彼女の周りを回転している。',

    },
    '賞金稼ぎ': {
      '未来の地球': 'サングラスをかけた賞金稼ぎが、未来都市の暗い路地に立っている。高級なサイバーウェアが装備され、背景は巨大な企業ロゴが輝く摩天楼。',
      '宇宙空間': 'スペーススーツを着た賞金稼ぎが、宇宙ステーションの外側で浮遊している。宇宙船や隕石が背景。',
      '異星': '異星の砂漠で、エイリアンの痕跡を追う賞金稼ぎ。異国的な生物や地形が周囲にある。',
      '時間跳躍': '異なる時代を股にかけて活動する賞金稼ぎ。古い銃と未来的な技術が混在した装備。',
      'サイバーシティ': 'ネオンの看板が反射するウェットスーツのような服を着た賞金稼ぎ。街角での緊迫した対峙。',
      '深海コロニー': '深海の圧力スーツを装備した賞金稼ぎが、海底基地の外で敵を追う。'
    },
    '宇宙海賊': {
      '未来の地球': 'シップを盗んで地表に降り立つ宇宙海賊。廃墟と新しい科学技術が混在する背景。',
      '宇宙空間': '独特のデザインの海賊船の甲板に立つ宇宙海賊。星々が背景に輝く。',
      '異星': 'エイリアンの遺跡を掠奪する宇宙海賊。古代文明の謎めいた構造物。',
      '時間跳躍': 'タイムマシンで過去の宝物を盗む宇宙海賊。異なる時代のテクノロジーが混在。',
      'サイバーシティ': 'デジタル海賊として仮想空間で活動する宇宙海賊。ホログラムと現実が交差。',
      '深海コロニー': '海底資源を狙う宇宙海賊。深海ステーションへの侵入シーン。'
    },
    'テロリスト': {
      '未来の地球': 'レジスタンス組織のメンバーとして、政府施設に侵入するテロリスト。爆発と警察の光が背景。',
      '宇宙空間': '宇宙ステーションを脅かすテロリスト。危機的な状況で浮遊している。',
      '異星': '異星の植民地反乱軍。原住民と共に独立のために立ち上がる。',

      '深海コロニー': '海底独立派のリーダー。基地の支配を巡る激しい戦い。'

    '探偵': {
      '未来の地球': '証拠を求めて未来都市の路地を歩く探偵。霧の中、高層ビルが背景。',

      '異星': '未知の惑星での事件解決に当たる探偵。異世界的な環境。',
      '時間跳躍': 'タイムスリップして過去の事件を調査する探偵。',
      'サイバーシティ': 'AIと協力してサイバー犯罪を追う探偵。ホログラフィック証拠。',
      '深海コロニー': '海底基地での謎の失踪事件を調査する探偵。'
    },
    '科学者': {
      '未来の地球': '実験室で未来の技術に取り組む科学者。複雑な機械と発光する液体。',

      '異星': '異星の生命体を研究する科学者。未知の生物標本。',

      '深海コロニー': '深海の新種生物を発見する科学者。水圧実験室。'
    },
    '忍者': {
      '未来の地球': '高層ビルを忍び足で移動する忍者。闇に紛れた身のこなし。',
      '宇宙空間': '無重力でのステルス活動をする忍者。',
      '異星': '異星の密林で狩人としての忍者。',
      '時間跳躍': '時間を操作する忍術を使う忍者。',
      'サイバーシティ': 'サイバーネティックな装甲を身に着けた忍者。光の反射を利用したステルス。',
      '深海コロニー': '海底の暗い通路を進む忍者。'
    },
    '兵士': {
      '未来の地球': '高度な兵器を装備した兵士が、戦場に立っている。爆発と硝煙。',
      '宇宙空間': '宇宙戦闘用のスーツを着た兵士。宇宙戦争の緊迫した状況。',
      '異星': 'エイリアンとの戦闘に従事する兵士。异世界的な兵器。',
      '時間跳躍': '異なる時代の兵士たちが同時に存在する戦場。',
      'サイバーシティ': 'サイボーグ兵士が街中で行動。近未来的な戦闘。',
      '深海コロニー': '海底での戦闘に従事する兵士。'
    }
  };

  function generatePrompt() {
    var character = document.getElementById('character').value;
    var stage = document.getElementById('stage').value;

    if (!character || !stage) {
      alert('キャラクターと舞台の両方を選択してください');
      return;
    }

    var prompt = prompts[character][stage];
    var resultCard = document.getElementById('result');
    document.getElementById('promptText').textContent = prompt;
    resultCard.classList.add('show');

    // localStorage に保存
    var history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
    history.push({
      character: character,
      stage: stage,
      prompt: prompt,
      timestamp: new Date().toLocaleString('ja-JP')
    });
    if (history.length > 10) history.shift(); // 最新10件まで保持
    localStorage.setItem('promptHistory', JSON.stringify(history));
  }

  function copyPrompt() {
    var promptText = document.getElementById('promptText').textContent;
    navigator.clipboard.writeText(promptText).then(function() {
      alert('プロンプトをコピーしました！');
    }).catch(function() {
      // フォールバック
      var textarea = document.createElement('textarea');
      textarea.value = promptText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('プロンプトをコピーしました！');
    });
  }

  // ページロード時にlocalStorageから前回の選択を復元
  window.addEventListener('load', function() {
    var lastChar = localStorage.getItem('lastCharacter');
    var lastStage = localStorage.getItem('lastStage');
    if (lastChar) document.getElementById('character').value = lastChar;
    if (lastStage) document.getElementById('stage').value = lastStage;
  });

  // 選択内容を保存
  document.getElementById('character').addEventListener('change', function() {
    localStorage.setItem('lastCharacter', this.value);
  });
  document.getElementById('stage').addEventListener('change', function() {
    localStorage.setItem('lastStage', this.value);
  });
  </script>
