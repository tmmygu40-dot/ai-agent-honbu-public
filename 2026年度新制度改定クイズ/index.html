<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知らないと損する2026年度 新制度・改定クイズ｜10問3択</title>
  <meta name="description" content="2026年度の新制度や制度改定を10問3択でサクッと確認できる知識クイズです。新NISA、インボイス、児童手当、定額減税など、知らないと損するポイントを楽しく学べます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress-bar {
      width: 100%; height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden; margin-bottom: 1rem;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s;
    }
    .q-num { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.5rem; font-weight: 700; }
    .q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 1.2rem; }

    .choice {
      display: block; width: 100%; margin-bottom: 0.6rem;
      padding: 0.85rem 1rem; font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      text-align: left; cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .choice:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice:disabled { cursor: default; }
    .choice.correct {
      background: var(--ok-bg); border-color: var(--ok); color: var(--ok); font-weight: 800;
    }
    .choice.wrong {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng); font-weight: 800;
    }

    .feedback {
      display: none; margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.9rem; line-height: 1.5;
    }
    .feedback.ok { background: var(--ok-bg); border: 1px solid var(--ok); color: var(--ok); }
    .feedback.ng { background: var(--ng-bg); border: 1px solid var(--ng); color: var(--ng); }
    .feedback strong { display: block; font-weight: 800; margin-bottom: 0.3rem; }
    .feedback span { color: var(--text); font-weight: 500; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.4rem; }
    .result-best { font-size: 0.82rem; color: var(--text-sub); margin-top: 0.8rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>知らないと損する2026年度 新制度・改定クイズ</h1>
    <p class="subtitle">10問3択でサクッと確認 ※2026年4月時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <p class="q-num" id="qnum">第1問 / 10</p>
    <p class="q-text" id="qtext">問題文</p>
    <div id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQ()">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-best" id="rb"></p>
  </div>

  <button class="btn-calc" id="retry-btn" style="display:none" onclick="restart()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国税庁・厚生労働省・日本年金機構・文部科学省・内閣府などの官公庁公開資料を参考に、目安として整理したものです。最新情報や正確な制度の詳細は必ず公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '2024年から始まった「新NISA」の年間投資枠（つみたて投資枠＋成長投資枠）の合計上限はいくら？',
      choices: ['120万円', '240万円', '360万円'],
      correct: 2,
      explain: '新NISAはつみたて投資枠120万円＋成長投資枠240万円の合計360万円が年間上限。生涯非課税限度額は1,800万円です。'
    },
    {
      q: 'インボイス制度で、2026年10月以降の免税事業者からの仕入税額控除の割合は？',
      choices: ['80%控除', '50%控除', '控除なし'],
      correct: 1,
      explain: '2023年10月開始のインボイス制度は経過措置あり。2023年10月〜2026年9月は80%控除、2026年10月〜2029年9月は50%控除に縮小されます。'
    },
    {
      q: '2024年6月から実施された定額減税、所得税分の1人あたりの減税額は？',
      choices: ['1万円', '3万円', '5万円'],
      correct: 1,
      explain: '定額減税は所得税3万円＋住民税1万円の合計4万円。本人＋配偶者（同一生計）＋扶養親族の人数分が対象でした。'
    },
    {
      q: '2024年10月から児童手当はどう変わった？',
      choices: ['所得制限が撤廃された', '支給額が半額になった', '対象年齢が3歳までに縮小された'],
      correct: 0,
      explain: '2024年10月から所得制限が撤廃され、支給対象も高校生年代まで拡大。第3子以降は月3万円に増額されました。'
    },
    {
      q: '2024年4月施行、医師の働き方改革で時間外労働の上限規制は原則年何時間？',
      choices: ['720時間', '960時間', '1,860時間'],
      correct: 1,
      explain: '医師の時間外・休日労働の上限は原則年960時間（A水準）。地域医療確保暫定特例水準（B水準等）は年1,860時間まで認められます。'
    },
    {
      q: '2023年4月から自転車のヘルメット着用は全年齢で？',
      choices: ['義務化された', '努力義務になった', '推奨にとどまる'],
      correct: 1,
      explain: '改正道路交通法により、2023年4月から全年齢で自転車ヘルメット着用が「努力義務」に。罰則はないが安全のため推奨されています。'
    },
    {
      q: '育児休業給付の支給開始から180日までの支給率は、休業前賃金の何％？',
      choices: ['50%', '67%', '80%'],
      correct: 1,
      explain: '育休給付金は開始180日までは賃金の67％、それ以降は50％。社会保険料免除も合わせると手取りベースで休業前の約8割相当になります。'
    },
    {
      q: '2025年4月施行の改正育児・介護休業法、3歳未満の子を持つ従業員に対する事業主の新たな義務は？',
      choices: ['短時間勤務制度の選択肢を増やす（始業時刻変更・テレワーク等）', '完全在宅勤務を許可する', '残業を全面禁止する'],
      correct: 0,
      explain: '2025年4月から、3歳未満の子の養育中の柔軟な働き方として、始業時刻変更・テレワーク・短時間勤務など複数選択肢の整備が事業主に義務付けられました。'
    },
    {
      q: '介護保険サービスの自己負担割合は、所得により最大何割？',
      choices: ['1割', '2割', '3割'],
      correct: 2,
      explain: '原則1割負担ですが、一定以上の所得がある場合は2割、現役並み所得者は3割負担。所得判定は前年所得で行われます。'
    },
    {
      q: '2025年度から拡充された大学等の高等教育修学支援、子3人以上の多子世帯の所得制限は？',
      choices: ['年収約380万円未満', '年収約600万円未満', '撤廃され所得制限なし'],
      correct: 2,
      explain: '2025年度から、扶養する子が3人以上いる多子世帯は所得制限なしで授業料・入学金が支援対象に。少子化対策の一環として拡充されました。'
    }
  ];

  var BEST_KEY = 'shinseido_quiz_best_v1';
  var idx = 0;
  var score = 0;
  var answered = false;

  function showQ() {
    answered = false;
    var q = QUESTIONS[idx];
    document.getElementById('qnum').textContent = '第' + (idx+1) + '問 / ' + QUESTIONS.length;
    document.getElementById('qtext').textContent = q.q;
    document.getElementById('progress').style.width = ((idx) / QUESTIONS.length * 100) + '%';
    var ch = document.getElementById('choices');
    ch.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = (i+1) + '. ' + c;
      btn.onclick = function() { answer(i); };
      ch.appendChild(btn);
    });
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function answer(i) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[idx];
    var btns = document.querySelectorAll('#choices .choice');
    btns.forEach(function(b, bi) {
      b.disabled = true;
      if (bi === q.correct) b.classList.add('correct');
      else if (bi === i) b.classList.add('wrong');
    });
    var fb = document.getElementById('feedback');
    if (i === q.correct) {
      score++;
      fb.className = 'feedback ok';
      fb.innerHTML = '<strong>⭕ 正解！</strong><span>' + q.explain + '</span>';
    } else {
      fb.className = 'feedback ng';
      fb.innerHTML = '<strong>❌ 不正解（正解は ' + (q.correct+1) + '）</strong><span>' + q.explain + '</span>';
    }
    fb.style.display = 'block';
    document.getElementById('next-btn').textContent = (idx+1 >= QUESTIONS.length) ? '結果を見る' : '次の問題へ';
    document.getElementById('next-btn').style.display = 'block';
  }

  function nextQ() {
    idx++;
    if (idx >= QUESTIONS.length) {
      finish();
    } else {
      showQ();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
  }

  function finish() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    var pct = Math.round(score / QUESTIONS.length * 100);
    var level = pct >= 80 ? 'ok' : pct >= 50 ? 'warn' : 'ng';
    var msg = level === 'ok' ? '素晴らしい！制度に詳しいですね'
            : level === 'warn' ? 'まずまず。残りも要チェック'
            : '知らないと損！もう一度復習しましょう';
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + QUESTIONS.length + ' 正解';
    document.getElementById('rn').textContent = '正答率 ' + pct + '％ — ' + msg;

    var best = 0;
    try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch(e) {}
    if (score > best) {
      best = score;
      try { localStorage.setItem(BEST_KEY, String(best)); } catch(e) {}
      document.getElementById('rb').textContent = '🏆 自己ベスト更新！(' + best + '/' + QUESTIONS.length + ')';
    } else {
      document.getElementById('rb').textContent = '自己ベスト：' + best + '/' + QUESTIONS.length;
    }

    document.getElementById('retry-btn').style.display = 'block';
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function restart() {
    idx = 0;
    score = 0;
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    showQ();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  showQ();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
