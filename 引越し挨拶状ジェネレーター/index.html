<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引越し挨拶状ジェネレーター｜相手別に3パターン文面を即生成</title>
  <meta name="description" content="旧居・新居のご近所、親族、友人など相手別に使い分けられる引越し挨拶状の文面を、フォーマル・カジュアル・簡潔の3パターンで即生成。コピーしてLINEや手紙にすぐ使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 文面カード ── */
    .letter-card { display: none; }
    .letter-card .tone-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.7rem; border-radius: 999px;
      margin-bottom: 0.7rem; letter-spacing: 0.05em;
    }
    .letter-card.formal .tone-label { background: #4a5568; }
    .letter-card.casual .tone-label { background: #2b6cb0; }
    .letter-card.simple .tone-label { background: #38a169; }
    .letter-text {
      background: var(--accent-light);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem; line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.6rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .letter-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>引越し挨拶状ジェネレーター</h1>
    <p class="subtitle">相手別に3パターン（フォーマル／カジュアル／簡潔）の文面を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="relation">相手区分</label>
      <select id="relation">
        <option value="old_neighbor">旧居のご近所さん</option>
        <option value="new_neighbor">新居のご近所さん</option>
        <option value="relative">親族・親戚</option>
        <option value="friend">友人・知人</option>
        <option value="work">会社関係・取引先</option>
      </select>
    </div>
    <div class="field">
      <label for="timing">引越し時期</label>
      <select id="timing">
        <option value="next_month">来月引越し予定</option>
        <option value="this_month">今月中に引越し</option>
        <option value="just_done">先月引越し済み</option>
        <option value="long_ago">数ヶ月前に引越し済み</option>
      </select>
    </div>
    <div class="field">
      <label for="name">あなたの名字（任意）</label>
      <input type="text" id="name" placeholder="例: 田中">
      <p class="hint">空欄なら「私」表記になります</p>
    </div>
    <div class="field">
      <label for="area">引越し先・引越し元の地域（任意）</label>
      <input type="text" id="area" placeholder="例: 横浜市">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">文面を生成する</button>

  <!-- 結果（3パターン） -->
  <div class="card letter-card formal" id="card-formal">
    <p class="card-title"><span class="tone-label">フォーマル</span> 丁寧で格式ある文面</p>
    <div class="letter-text" id="text-formal"></div>
    <button class="btn-copy" onclick="copyText('text-formal', this)">📋 コピーする</button>
  </div>

  <div class="card letter-card casual" id="card-casual">
    <p class="card-title"><span class="tone-label">カジュアル</span> 親しみやすく柔らかい文面</p>
    <div class="letter-text" id="text-casual"></div>
    <button class="btn-copy" onclick="copyText('text-casual', this)">📋 コピーする</button>
  </div>

  <div class="card letter-card simple" id="card-simple">
    <p class="card-title"><span class="tone-label">簡潔</span> 要点だけの短い文面</p>
    <div class="letter-text" id="text-simple"></div>
    <button class="btn-copy" onclick="copyText('text-simple', this)">📋 コピーする</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、一般的な引越し挨拶のマナー・文面例を参考に、生活シーンで使いやすい形で整理しています。状況や相手との関係に応じて、お名前・住所・日付などを書き加えてご利用ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'hikkoshi_aisatsu_v1';

  function saveInput() {
    var data = {
      relation: document.getElementById('relation').value,
      timing:   document.getElementById('timing').value,
      name:     document.getElementById('name').value,
      area:     document.getElementById('area').value
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadInput() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.relation) document.getElementById('relation').value = d.relation;
      if (d.timing)   document.getElementById('timing').value   = d.timing;
      if (d.name)     document.getElementById('name').value     = d.name;
      if (d.area)     document.getElementById('area').value     = d.area;
    } catch(e) {}
  }

  function generate() {
    saveInput();
    var rel    = document.getElementById('relation').value;
    var timing = document.getElementById('timing').value;
    var rawName = document.getElementById('name').value.trim();
    var rawArea = document.getElementById('area').value.trim();
    var nameStr = rawName ? rawName : '';
    var areaStr = rawArea ? rawArea : '';

    var formal = buildFormal(rel, timing, nameStr, areaStr);
    var casual = buildCasual(rel, timing, nameStr, areaStr);
    var simple = buildSimple(rel, timing, nameStr, areaStr);

    document.getElementById('text-formal').textContent = formal;
    document.getElementById('text-casual').textContent = casual;
    document.getElementById('text-simple').textContent = simple;

    document.getElementById('card-formal').style.display = 'block';
    document.getElementById('card-casual').style.display = 'block';
    document.getElementById('card-simple').style.display = 'block';

    document.getElementById('card-formal').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function nameSign(name, suffix) {
    // suffix: 'family' (家族として「○○家一同」「私たち」など) or 'self' (個人)
    if (!name) return suffix === 'family' ? '私ども' : '私';
    return suffix === 'family' ? (name + '家一同') : (name);
  }

  function timingPhrase(timing, tone) {
    // tone: 'formal' | 'casual' | 'simple'
    if (timing === 'next_month') {
      if (tone === 'formal') return 'この度、来月に転居することとなりました。';
      if (tone === 'casual') return 'このたび、来月◯日に引越すことになりました。';
      return '来月、下記住所へ引越します。';
    }
    if (timing === 'this_month') {
      if (tone === 'formal') return 'この度、今月中に転居の運びとなりました。';
      if (tone === 'casual') return 'このたび、今月中に引越すことになりました。';
      return '今月中に下記住所へ引越します。';
    }
    if (timing === 'just_done') {
      if (tone === 'formal') return 'この度、先月◯日付けにて転居いたしました。';
      if (tone === 'casual') return '先月、無事に引越しが終わりました。';
      return '先月、下記住所へ引越しました。';
    }
    // long_ago
    if (tone === 'formal') return 'ご報告が遅くなりましたが、先般、転居いたしました。';
    if (tone === 'casual') return 'ご連絡が遅くなりましたが、しばらく前に引越していました。';
    return '先日、下記住所へ引越しました。';
  }

  function buildFormal(rel, timing, name, area) {
    var time = timingPhrase(timing, 'formal');
    var sign = nameSign(name, 'family');
    var areaLine = area ? '新住所は' + area + 'となります。' : '';

    if (rel === 'old_neighbor') {
      return '拝啓\n\n時下ますますご清祥のこととお慶び申し上げます。\n\n' + time + 'ご近所の皆様には、長きにわたり大変温かなお付き合いを賜り、心より御礼申し上げます。' + areaLine + '\n\n本来であれば直接ご挨拶に伺うべきところ、略儀ながら書中をもちましてお礼かたがたご挨拶を申し上げます。皆様のご健康と益々のご多幸を心よりお祈り申し上げます。\n\n敬具\n\n' + sign;
    }
    if (rel === 'new_neighbor') {
      return '拝啓\n\n時下ますますご清祥のこととお慶び申し上げます。\n\n' + time + (area ? '新たに' + area + 'にてお世話になることとなりました。' : '') + 'ご近所の皆様には、これからお世話になることも多いかと存じます。\n\n何かとご迷惑をおかけすることもあろうかと存じますが、何卒よろしくお願い申し上げます。\n\n敬具\n\n' + sign;
    }
    if (rel === 'relative') {
      return '謹啓\n\n皆様におかれましてはお健やかにお過ごしのことと存じます。\n\n' + time + areaLine + '\nお近くにお越しの際は、ぜひお立ち寄りいただければ幸いです。今後ともどうぞよろしくお願い申し上げます。\n\n謹白\n\n' + sign;
    }
    if (rel === 'friend') {
      return '前略\n\nお元気でお過ごしでしょうか。\n\n' + time + areaLine + '\n落ち着きましたら、改めてご連絡いたします。お近くへお越しの際は、お気軽にお立ち寄りください。\n\n草々\n\n' + sign;
    }
    // work
    return '拝啓\n\n貴社ますますご清栄のこととお慶び申し上げます。平素は格別のご高配を賜り、厚く御礼申し上げます。\n\nさて、' + time + areaLine + '\n今後とも変わらぬご指導ご鞭撻を賜りますよう、何卒よろしくお願い申し上げます。\n\nまずは略儀ながら、書中をもちましてご挨拶申し上げます。\n\n敬具\n\n' + (name ? name : '私');
  }

  function buildCasual(rel, timing, name, area) {
    var time = timingPhrase(timing, 'casual');
    var sign = name ? name : '私';
    var areaLine = area ? '新しい住まいは' + area + 'です。' : '';

    if (rel === 'old_neighbor') {
      return 'ご近所の皆さまへ\n\n' + time + '\n長い間、本当にお世話になりました。子どもの声や生活音など、いろいろとご迷惑をおかけしたかもしれませんが、温かく見守ってくださりありがとうございました。' + areaLine + '\n\nまた近くを通った際にはご挨拶に伺います。皆さまどうぞお元気で。\n\n' + sign;
    }
    if (rel === 'new_neighbor') {
      return 'はじめまして！\n\n' + time + (area ? area + 'からこちらに越してきました。' : '') + '\n慣れないことも多く、ご迷惑をおかけすることもあるかと思いますが、どうぞよろしくお願いします。\n\nお見かけしたときはお気軽に声をかけてください。これからお世話になります。\n\n' + sign + ' より';
    }
    if (rel === 'relative') {
      return 'ご無沙汰しています。\n\n' + time + areaLine + '\nしばらくバタバタしていましたが、ようやく落ち着きました。お近くにお越しの際は、ぜひ遊びにきてください。\n\nまたゆっくりお話しできるのを楽しみにしています。\n\n' + sign;
    }
    if (rel === 'friend') {
      return 'お久しぶり！元気にしてる？\n\n' + time + areaLine + '\n落ち着いたら遊びに来てね。新居でゆっくりおしゃべりしたいです。\n\n近くまで来ることがあったら、いつでも連絡してね。\n\n' + sign;
    }
    // work
    return 'お世話になっております。\n\n' + (name ? name : '私') + 'です。\n\n私事で恐縮ですが、' + time + areaLine + '\n今後ともこれまで同様、よろしくお願いいたします。\n\n取り急ぎ、ご報告まで。\n\n' + (name ? name : '');
  }

  function buildSimple(rel, timing, name, area) {
    var time = timingPhrase(timing, 'simple');
    var sign = name ? name : '私';
    var areaTxt = area ? '（' + area + '）' : '';

    if (rel === 'old_neighbor') {
      return time + '\n長らくお世話になり、ありがとうございました。' + areaTxt + '\n\n' + sign;
    }
    if (rel === 'new_neighbor') {
      return 'はじめまして。' + time + areaTxt + '\nよろしくお願いいたします。\n\n' + sign;
    }
    if (rel === 'relative') {
      return time + areaTxt + '\nお近くの際はお立ち寄りください。\n\n' + sign;
    }
    if (rel === 'friend') {
      return time + areaTxt + '\n落ち着いたら遊びに来てね。\n\n' + sign;
    }
    // work
    return 'お世話になっております。\n' + time + areaTxt + '\n今後ともよろしくお願いいたします。\n\n' + (name ? name : '');
  }

  function copyText(elId, btn) {
    var txt = document.getElementById(elId).textContent;
    if (!txt) return;
    var done = function() {
      var orig = btn.textContent;
      btn.classList.add('copied');
      btn.textContent = '✓ コピーしました';
      setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = orig; }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, function(){ fallbackCopy(txt, done); });
    } else {
      fallbackCopy(txt, done);
    }
  }
  function fallbackCopy(txt, done) {
    try {
      var ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      done();
    } catch(e) {}
  }

  // 入力値復元
  loadInput();
  </script>
