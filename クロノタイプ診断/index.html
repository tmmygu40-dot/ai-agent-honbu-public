<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロノタイプ診断 — 朝型・夜型？5問でわかる最適な1日</title>
  <meta name="description" content="5つのYES/NO質問に答えるだけで、あなたのクロノタイプ（朝型・中間型・夜型）を判定。あなたに合った最適な1日のスケジュールと生活アドバイスが30秒でわかります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --night: #6d28d9;  --night-bg: #f5f3ff;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* 設問 */
    .q-item {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }
    .q-item:last-child { border-bottom: none; }
    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .q-text { font-size: 0.95rem; font-weight: 600; line-height: 1.5; margin-bottom: 0.6rem; }
    .q-btns { display: flex; gap: 0.6rem; }
    .q-btn {
      flex: 1; padding: 0.55rem 0;
      font-size: 0.9rem; font-weight: 700;
      border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer;
      background: var(--bg); color: var(--text-sub);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .q-btn.yes.selected { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .q-btn.no.selected  { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .q-btn:not(.selected):hover { border-color: var(--accent); color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.45; pointer-events: none;
    }
    .btn-calc.ready { opacity: 1; pointer-events: auto; }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結果カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);    background: var(--ok-bg);    }
    .result-card.warn { border-color: var(--warn);   background: var(--warn-bg);  }
    .result-card.night{ border-color: var(--night);  background: var(--night-bg); }
    .result-emoji { font-size: 2.8rem; margin-bottom: 0.3rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok    .result-value { color: var(--ok);    }
    .result-card.warn  .result-value { color: var(--warn);  }
    .result-card.night .result-value { color: var(--night); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }

    /* スケジュール */
    .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .schedule-table tr { border-bottom: 1px solid var(--border); }
    .schedule-table tr:last-child { border-bottom: none; }
    .schedule-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .schedule-table td:first-child { width: 6.5rem; font-weight: 700; color: var(--text); white-space: nowrap; font-size: 0.82rem; }

    /* アドバイス */
    .tip-list { list-style: none; padding: 0; }
    .tip-list li { padding: 0.55rem 0 0.55rem 1.4rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; line-height: 1.5; color: var(--text-sub); position: relative; }
    .tip-list li:last-child { border-bottom: none; }
    .tip-list li::before { content: '✅'; position: absolute; left: 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🕐 クロノタイプ診断</h1>
    <p class="subtitle">5問に答えるだけで、あなたの朝型・夜型タイプと最適な1日がわかります。</p>
  </header>

  <!-- 診断フォーム -->
  <div class="card" id="quiz-card">
    <p class="card-title">診断</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" id="btn-diagnose" onclick="diagnose()">診断する →</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="r-emoji"></p>
    <p class="result-label">あなたのクロノタイプ</p>
    <p class="result-value" id="r-type"></p>
    <p class="result-note" id="r-desc"></p>
  </div>

  <!-- 最適スケジュール -->
  <div class="card" id="schedule-card" style="display:none">
    <p class="card-title">最適な1日のスケジュール</p>
    <table class="schedule-table"><tbody id="schedule-body"></tbody></table>
  </div>

  <!-- 生活アドバイス -->
  <div class="card" id="tips-card" style="display:none">
    <p class="card-title">生活アドバイス</p>
    <ul class="tip-list" id="tips-list"></ul>
  </div>

  <div class="card" id="retry-card" style="display:none;text-align:center;">
    <button onclick="resetQuiz()" style="background:none;border:1.5px solid var(--border);border-radius:10px;padding:0.6rem 1.6rem;font-size:0.9rem;font-weight:700;cursor:pointer;color:var(--text-sub);">もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、睡眠科学・時間生物学の研究（Michael Breus博士のクロノタイプ理論など）をもとに、目安として使いやすく整理しています。個人差がありますので参考程度にご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var QUESTIONS = [
    '朝6時台に自然と目が覚めることが多い',
    '午前中が一番集中できて、作業が捗る',
    '夜10時を過ぎるとだんだん眠くなる',
    '目覚ましなしでも、すっきり起きられる方だ',
    '昼食後に眠くなっても、30分以内にシャキッと回復できる'
  ];

  var TYPES = {
    morning: {
      label: '朝型（ライオン）',
      emoji: '🌅',
      level: 'ok',
      desc: '朝の早い時間に最もパワーが出る朝型タイプです。規律を好み、目標達成が得意。午前中を最大限活かすと最高のパフォーマンスを発揮できます。',
      schedule: [
        ['5:30〜7:00', '起床・軽い運動・朝食'],
        ['7:00〜12:00', '💡 最集中タイム（重要タスク・難しい判断）'],
        ['12:00〜13:00', '昼食・仮眠10分'],
        ['13:00〜17:00', '会議・連絡・軽めの作業'],
        ['17:00〜21:00', '家事・趣味・リラックス'],
        ['21:00〜22:00', '就寝準備（スマホオフ）'],
        ['22:00〜5:30', '💤 睡眠（約7.5時間）']
      ],
      tips: [
        '起床直後に重要な判断や創造的な作業をすると◎',
        '夕方以降のカフェインは睡眠の質を下げやすい',
        '夜のSNSは翌朝のパフォーマンスを落としやすいので早めにオフ'
      ]
    },
    middle: {
      label: '中間型（ベアー）',
      emoji: '🐻',
      level: 'warn',
      desc: '人口の約50%を占める中間型タイプです。午前10時〜14時頃に最も生産性が高まります。社会のスケジュールと比較的合いやすいバランスの良いタイプです。',
      schedule: [
        ['7:00〜8:00', '起床・朝食'],
        ['8:00〜10:00', 'ウォームアップ（軽めの作業・メール確認）'],
        ['10:00〜14:00', '💡 最集中タイム（重要タスク・会議）'],
        ['14:00〜15:00', '昼食・仮眠（10〜20分）'],
        ['15:00〜19:00', '作業継続・打ち合わせ'],
        ['19:00〜23:00', '夕食・趣味・リラックス'],
        ['23:00〜7:00', '💤 睡眠（約8時間）']
      ],
      tips: [
        '午前10時〜14時の集中ゾーンを最優先タスクに充てると効率UP',
        '15時前後の仮眠（20分以内）が午後のパフォーマンス維持に有効',
        '規則正しい起床時間を守ると体内時計が安定しやすい'
      ]
    },
    night: {
      label: '夜型（ウルフ）',
      emoji: '🌙',
      level: 'night',
      desc: '夕方〜深夜にエンジンが全開になる夜型タイプです。創造性が高く、独自の発想が得意。夜型は「悪い」のではなく、活躍できる時間帯が違うだけです。',
      schedule: [
        ['8:00〜9:30', '起床・朝食（ゆっくり目に）'],
        ['9:30〜12:00', 'ウォームアップ（軽い作業・準備）'],
        ['12:00〜14:00', '昼食・休憩'],
        ['14:00〜17:00', '通常作業・会議・連絡'],
        ['17:00〜21:00', '💡 集中タイム（重要タスク）'],
        ['21:00〜24:00', '🔥 最集中タイム（創造的作業・アイデア出し）'],
        ['24:00〜8:00', '💤 睡眠（約8時間）']
      ],
      tips: [
        '夕方〜夜の時間帯に創造的・重要な作業を集中させると◎',
        '朝は急がず、ウォームアップ時間を十分に確保しよう',
        '社会リズムとのズレはストレスになりやすいので、できる範囲でフレックスを活用'
      ]
    }
  };

  var answers = new Array(QUESTIONS.length).fill(null);

  function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = QUESTIONS.map(function(q, i) {
      return '<div class="q-item">'
        + '<p class="q-num">Q' + (i + 1) + '</p>'
        + '<p class="q-text">' + q + '</p>'
        + '<div class="q-btns">'
        + '<button class="q-btn yes" id="yes-' + i + '" onclick="setAnswer(' + i + ', true)">✅ YES</button>'
        + '<button class="q-btn no"  id="no-'  + i + '" onclick="setAnswer(' + i + ', false)">❌ NO</button>'
        + '</div></div>';
    }).join('');
  }

  function setAnswer(idx, isYes) {
    answers[idx] = isYes;
    document.getElementById('yes-' + idx).className = 'q-btn yes' + (isYes ? ' selected' : '');
    document.getElementById('no-'  + idx).className = 'q-btn no'  + (!isYes ? ' selected' : '');
    checkReady();
  }

  function checkReady() {
    var allAnswered = answers.every(function(a) { return a !== null; });
    var btn = document.getElementById('btn-diagnose');
    if (allAnswered) btn.classList.add('ready');
    else btn.classList.remove('ready');
  }

  function diagnose() {
    var allAnswered = answers.every(function(a) { return a !== null; });
    if (!allAnswered) { alert('すべての設問に答えてください'); return; }

    var score = answers.filter(function(a) { return a === true; }).length;
    var typeKey = score >= 4 ? 'morning' : score >= 2 ? 'middle' : 'night';
    var t = TYPES[typeKey];

    // 結果カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-type').textContent = t.label;
    document.getElementById('r-desc').textContent = t.desc;

    // スケジュール
    document.getElementById('schedule-body').innerHTML = t.schedule.map(function(row) {
      return '<tr><td>' + row[0] + '</td><td>' + row[1] + '</td></tr>';
    }).join('');
    document.getElementById('schedule-card').style.display = 'block';

    // アドバイス
    document.getElementById('tips-list').innerHTML = t.tips.map(function(tip) {
      return '<li>' + tip + '</li>';
    }).join('');
    document.getElementById('tips-card').style.display = 'block';

    document.getElementById('retry-card').style.display = 'block';

    // localStorage保存
    try {
      localStorage.setItem('chronotype_result', JSON.stringify({ score: score, type: typeKey, date: new Date().toLocaleDateString('ja-JP') }));
    } catch(e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetQuiz() {
    answers = new Array(QUESTIONS.length).fill(null);
    buildQuiz();
    document.getElementById('result').style.display = 'none';
    document.getElementById('schedule-card').style.display = 'none';
    document.getElementById('tips-card').style.display = 'none';
    document.getElementById('retry-card').style.display = 'none';
    document.getElementById('btn-diagnose').classList.remove('ready');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  buildQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
