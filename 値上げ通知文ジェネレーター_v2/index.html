<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ通知文ジェネレーター</title>
  <meta name="description" content="業種・値上げ品目・値上げ率を入力するだけで、取引先向けのビジネス文書形式の値上げ通知文を即生成。コピー・PDF保存にも対応した無料Webツール。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 横並び2列 */
    .field-row { display: flex; gap: 0.8rem; }
    .field-row .field { flex: 1; margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード（通知文表示） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    }
    .result-card-header .card-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

    .btn-copy {
      padding: 0.45rem 1rem; font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .copy-ok { color: var(--ok); font-size: 0.78rem; font-weight: 700; display: none; }

    /* 通知文テキスト */
    .letter-box {
      font-size: 0.9rem; line-height: 2;
      white-space: pre-wrap; color: var(--text);
      background: var(--bg); border-radius: 9px;
      padding: 1rem; border: 1px solid var(--border);
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      .letter-box { background: #fff; border: 1px solid #ccc; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>値上げ通知文ジェネレーター</h1>
    <p class="subtitle">業種・品目・値上げ率を入力して取引先への通知文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食">飲食</option>
        <option value="小売">小売</option>
        <option value="製造">製造</option>
        <option value="建設">建設</option>
        <option value="サービス">サービス</option>
        <option value="運送・物流">運送・物流</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="sender">差出人（会社名・担当者名）</label>
      <input type="text" id="sender" placeholder="例：株式会社○○　営業部　田中太郎">
    </div>

    <div class="field">
      <label for="recipient">取引先名</label>
      <input type="text" id="recipient" placeholder="例：△△株式会社　ご担当者様">
      <p class="hint">宛先を入力（省略可）</p>
    </div>

    <div class="field">
      <label for="item">値上げ品目・サービス名</label>
      <input type="text" id="item" placeholder="例：○○製品、△△サービス">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="rate">値上げ率（%）</label>
        <input type="number" id="rate" min="0" max="999" step="0.1" placeholder="例：15">
      </div>
      <div class="field">
        <label for="effectiveDate">適用開始日</label>
        <input type="date" id="effectiveDate">
      </div>
    </div>

    <div class="field">
      <label for="extra">補足事項（任意）</label>
      <textarea id="extra" placeholder="例：詳細は別添の資料をご参照ください。"></textarea>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">通知文を生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="resultCard">
    <div class="result-card-header">
      <p class="card-title">生成された通知文</p>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="copy-ok" id="copyOk">コピーしました！</span>
        <button class="btn-copy no-print" onclick="copyText()">コピー</button>
      </div>
    </div>
    <div class="letter-box" id="letterBox"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは経産省・中小企業庁・公正取引委員会の「価格転嫁ガイドライン」等を参考に、一般的なビジネス文書形式で通知文を生成します。実際の送付前にご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 業種別コスト上昇理由
  var REASONS = {
    '飲食':     '食材・食料品の仕入れコスト高騰および物流費の上昇',
    '小売':     '仕入れコストの上昇および物流費・エネルギーコストの増加',
    '製造':     '原材料費・エネルギーコストの大幅な上昇',
    '建設':     '建設資材・エネルギー費・人件費の高騰',
    'サービス': '人件費・諸経費の上昇',
    '運送・物流':'燃料費・人件費の高騰',
    'その他':   '各種仕入れコスト・諸経費の上昇'
  };

  function toReiwa(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    var y = d.getFullYear();
    var m = d.getMonth() + 1;
    var day = d.getDate();
    var reiwa = y - 2018;
    return '令和' + reiwa + '年' + m + '月' + day + '日';
  }

  function generate() {
    var industry = document.getElementById('industry').value;
    var sender   = document.getElementById('sender').value.trim();
    var recipient= document.getElementById('recipient').value.trim() || 'お取引先各位';
    var item     = document.getElementById('item').value.trim();
    var rate     = document.getElementById('rate').value.trim();
    var dateVal  = document.getElementById('effectiveDate').value;
    var extra    = document.getElementById('extra').value.trim();

    if (!item) { alert('値上げ品目・サービス名を入力してください。'); return; }
    if (!rate)  { alert('値上げ率を入力してください。'); return; }
    if (!dateVal) { alert('適用開始日を入力してください。'); return; }

    var reason     = REASONS[industry] || REASONS['その他'];
    var effectiveStr = toReiwa(dateVal);
    var today = toReiwa(new Date().toISOString().slice(0, 10));
    var senderLine = sender || '（差出人名）';

    var letter = '';
    letter += recipient + '\n\n';
    letter += '拝啓　時下ますますご清栄のこととお慶び申し上げます。\n';
    letter += '平素は格別のご高配を賜り、厚く御礼申し上げます。\n\n';
    letter += 'さて、誠に恐縮ではございますが、昨今の' + reason + 'の影響により、';
    letter += 'これまでの価格水準を維持することが困難な状況となってまいりました。\n\n';
    letter += 'つきましては、誠に勝手ながら、' + effectiveStr + 'より、';
    letter += '「' + item + '」の価格を現行より' + rate + '% 引き上げさせていただきたく、';
    letter += '何卒ご理解・ご承認くださいますようお願い申し上げます。\n\n';
    if (extra) {
      letter += extra + '\n\n';
    }
    letter += '突然のご通知となりましたことを深くお詫び申し上げます。\n';
    letter += '今後ともご愛顧を賜りますよう、よろしくお願い申し上げます。\n\n';
    letter += '敬具\n\n';
    letter += today + '\n';
    letter += senderLine;

    var box = document.getElementById('letterBox');
    box.textContent = letter;
    var card = document.getElementById('resultCard');
    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // localStorage保存
    try {
      localStorage.setItem('neage-form', JSON.stringify({
        industry: industry, sender: sender, recipient: recipient,
        item: item, rate: rate, dateVal: dateVal, extra: extra
      }));
    } catch(e) {}
  }

  function copyText() {
    var text = document.getElementById('letterBox').textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showCopyOk(); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyOk();
    }
  }

  function showCopyOk() {
    var el = document.getElementById('copyOk');
    el.style.display = 'inline';
    setTimeout(function() { el.style.display = 'none'; }, 2000);
  }

  // localStorage 復元
  (function() {
    try {
      var saved = localStorage.getItem('neage-form');
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.industry) document.getElementById('industry').value = d.industry;
      if (d.sender)   document.getElementById('sender').value   = d.sender;
      if (d.recipient && d.recipient !== 'お取引先各位') document.getElementById('recipient').value = d.recipient;
      if (d.item)     document.getElementById('item').value     = d.item;
      if (d.rate)     document.getElementById('rate').value     = d.rate;
      if (d.dateVal)  document.getElementById('effectiveDate').value = d.dateVal;
      if (d.extra)    document.getElementById('extra').value    = d.extra;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
