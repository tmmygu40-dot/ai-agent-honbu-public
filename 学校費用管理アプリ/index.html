<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校費用管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏫 学校費用管理</h1>
      <p class="subtitle">支払い漏れをゼロに</p>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>支払いを登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="item-name">項目名</label>
          <input type="text" id="item-name" placeholder="例：遠足代" maxlength="50">
        </div>
        <div class="form-group">
          <label for="item-amount">金額（円）</label>
          <input type="number" id="item-amount" placeholder="例：3500" min="0">
        </div>
        <div class="form-group">
          <label for="item-due">期限</label>
          <input type="date" id="item-due">
        </div>
        <div class="form-group">
          <label for="item-memo">メモ（任意）</label>
          <input type="text" id="item-memo" placeholder="例：封筒に入れて提出" maxlength="100">
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">＋ 追加する</button>
    </section>

    <!-- サマリー -->
    <section class="summary-section" id="summary-section">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="summary-label">未払い合計</span>
          <span class="summary-value" id="total-unpaid">¥0</span>
        </div>
        <div class="summary-card paid">
          <span class="summary-label">支払い済み合計</span>
          <span class="summary-value" id="total-paid">¥0</span>
        </div>
      </div>
    </section>

    <!-- 未払いリスト -->
    <section class="list-section">
      <h2>未払い <span class="count" id="unpaid-count">0</span>件</h2>
      <div id="unpaid-list" class="item-list">
        <p class="empty-msg">未払いの項目はありません</p>
      </div>
    </section>

    <!-- 支払い済みリスト -->
    <section class="list-section paid-section">
      <h2>支払い済み <span class="count" id="paid-count">0</span>件</h2>
      <div id="paid-list" class="item-list">
        <p class="empty-msg">支払い済みの項目はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
