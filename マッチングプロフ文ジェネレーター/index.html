<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="あなたの特徴を入力するとマッチングアプリで『いいね』が増えるプロフィール文を3パターン即座に生成できます。">
  <title>💌 マッチングプロフ文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-title {
      font-size: 0.92rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .profile-text {
      font-size: 0.95rem; color: var(--text); line-height: 1.6;
      padding: 0.8rem 0.6rem; background: var(--accent-light);
      border-radius: 9px; margin-bottom: 0.6rem; word-break: break-word;
    }
    .btn-copy {
      display: inline-block; padding: 0.4rem 0.8rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 7px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.8; }
    .copy-msg {
      font-size: 0.75rem; color: var(--ok);
      margin-top: 0.3rem; display: none;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>💌 マッチングプロフ文ジェネレーター</h1>
    <p class="subtitle">あなたの特徴を入力すると、「いいね」が増えるプロフィール文を3パターン即座に生成します。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたの情報を入力</p>
    <div class="field">
      <label for="gender">性別</label>
      <select id="gender">
        <option value="">選択してください</option>
        <option value="男性">男性</option>
        <option value="女性">女性</option>
      </select>
    </div>
    <div class="field">
      <label for="age">年代</label>
      <select id="age">
        <option value="">選択してください</option>
        <option value="20代">20代</option>
        <option value="30代">30代</option>
        <option value="40代">40代</option>
        <option value="50代">50代</option>
      </select>
    </div>
    <div class="field">
      <label for="job">職業・仕事</label>
      <input type="text" id="job" placeholder="例: 営業、エンジニア、デザイナー">
      <p class="hint">職種や業界を簡潔に入力してください</p>
    </div>
    <div class="field">
      <label for="hobby">趣味・好きなこと</label>
      <input type="text" id="hobby" placeholder="例: カフェ巡り、映画鑑賞、ハイキング">
      <p class="hint">複数ある場合は「・」で区切ってください</p>
    </div>
    <div class="field">
      <label for="personality">性格・雰囲気</label>
      <input type="text" id="personality" placeholder="例: 明るい、落ち着いている、優しい">
      <p class="hint">自分の印象を教えてください</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generateProfile()">✨ プロフィール文を生成</button>

  <!-- 結果エリア -->
  <div class="card result-card" id="result">
    <p class="result-title">📝 生成されたプロフィール文</p>

    <div style="margin-bottom: 1.2rem;">
      <p style="font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem;">パターン1: ロマンティック系</p>
      <div class="profile-text" id="profile1"></div>
      <button class="btn-copy" onclick="copyProfile(1)">📋 コピー</button>
      <p class="copy-msg" id="copy-msg-1">コピーしました</p>
    </div>

    <div style="margin-bottom: 1.2rem;">
      <p style="font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem;">パターン2: クール系</p>
      <div class="profile-text" id="profile2"></div>
      <button class="btn-copy" onclick="copyProfile(2)">📋 コピー</button>
      <p class="copy-msg" id="copy-msg-2">コピーしました</p>
    </div>

    <div>
      <p style="font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem;">パターン3: フレンドリー系</p>
      <div class="profile-text" id="profile3"></div>
      <button class="btn-copy" onclick="copyProfile(3)">📋 コピー</button>
      <p class="copy-msg" id="copy-msg-3">コピーしました</p>
    </div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 生成テンプレート ──
  var TEMPLATES = {
    romantic: [
      '（性別）ですが、素直で誠実さを大事にしています。（趣味）を通じて、心が通じ合う出会いを探してます。',
      '（性別）・（年代）。（人格）な性格で、一緒にいて落ち着きを感じられる関係を求めてます。（仕事）の傍ら、（趣味）も大切にしています。',
      '（性別）。人を思いやる気持ちと、自分の世界観も大切にしています。カフェで話し込んだり、（趣味）を共有できる人と、ゆっくり関係を築きたいです。'
    ],
    cool: [
      '（性別）・（年代）。（仕事）をしていて、プライベートは（趣味）を楽しんでいます。等身大の自分と向き合える人との出会いを待ってます。',
      '（性別）。ドライかもしれませんが、本気で相手のことを考える人です。（人格）な雰囲気で、（趣味）が好きなので、共通の話題で盛り上がれたら嬉しいです。',
      '（性別）・（年代）。自分の時間を大切にしつつも、相手との時間も大事にしたいです。（仕事）×（趣味）が人生の柱で、一緒に成長できる人を探してます。'
    ],
    friendly: [
      '（性別）です。（人格）で、誰とでも仲良くなれる方だと思います。（趣味）で気分転換しながら、新しい出会いを楽しみたい！',
      '（性別）・（年代）。（仕事）の仕事をしてますが、何より大事なのは一緒にいて楽しい時間。（趣味）好きなので、同じ興味を持つ人と出会いたいです。',
      '（性別）。明るく社交的な方です。（人格）に過ごしたいタイプなので、笑顔の絶えない関係を作れたら最高。（趣味）の話でも、日常のことでも、楽しく話せる人が好きです。'
    ]
  };

  function generateProfile() {
    var gender = document.getElementById('gender').value;
    var age = document.getElementById('age').value;
    var job = document.getElementById('job').value;
    var hobby = document.getElementById('hobby').value;
    var personality = document.getElementById('personality').value;

    if (!gender || !age || !job || !hobby || !personality) {
      alert('すべての項目を入力してください');
      return;
    }

    // テンプレートに入力値を埋め込み
    var replaceFn = function(template) {
      return template
        .replace(/（性別）/g, gender)
        .replace(/（年代）/g, age)
        .replace(/（仕事）/g, job)
        .replace(/（趣味）/g, hobby)
        .replace(/（人格）/g, personality);
    };

    document.getElementById('profile1').textContent = replaceFn(TEMPLATES.romantic[0]);
    document.getElementById('profile2').textContent = replaceFn(TEMPLATES.cool[0]);
    document.getElementById('profile3').textContent = replaceFn(TEMPLATES.friendly[0]);

    document.getElementById('result').style.display = '';

    // 入力値を localStorage に保存
    saveInput();
  }

  function copyProfile(num) {
    var profileId = 'profile' + num;
    var msgId = 'copy-msg-' + num;
    var text = document.getElementById(profileId).textContent;

    navigator.clipboard.writeText(text).then(function() {
      var msg = document.getElementById(msgId);
      msg.style.display = '';
      setTimeout(function() { msg.style.display = 'none'; }, 1500);
    });
  }

  function saveInput() {
    var data = {
      gender: document.getElementById('gender').value,
      age: document.getElementById('age').value,
      job: document.getElementById('job').value,
      hobby: document.getElementById('hobby').value,
      personality: document.getElementById('personality').value
    };
    localStorage.setItem('matchingProfile', JSON.stringify(data));
  }

  function loadInput() {
    var data = localStorage.getItem('matchingProfile');
    if (data) {
      var obj = JSON.parse(data);
      document.getElementById('gender').value = obj.gender || '';
      document.getElementById('age').value = obj.age || '';
      document.getElementById('job').value = obj.job || '';
      document.getElementById('hobby').value = obj.hobby || '';
      document.getElementById('personality').value = obj.personality || '';
    }
  }

  // ページ読み込み時に保存データを復元
  window.addEventListener('DOMContentLoaded', loadInput);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
