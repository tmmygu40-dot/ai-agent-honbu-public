<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャッチコピージェネレーター（業種別）</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結果エリア */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .result-header {
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 0.85rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .copy-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-top: none;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.15s;
    }
    .copy-item:last-child {
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .copy-item:hover { background: var(--accent-light); }
    .copy-text {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
    }
    .copy-num {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--accent);
      min-width: 24px;
    }
    .btn-copy {
      flex-shrink: 0;
      padding: 0.35rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-sub);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>キャッチコピージェネレーター</h1>
    <p class="subtitle">業種と商品の特徴を入力するだけで売れるキャッチコピー10案を即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="">選択してください</option>
        <option value="飲食店">飲食店・カフェ・レストラン</option>
        <option value="小売店">小売店・雑貨店</option>
        <option value="美容院">美容院・ヘアサロン</option>
        <option value="エステ">エステ・マッサージ</option>
        <option value="整骨院">整骨院・接骨院・整体</option>
        <option value="不動産">不動産・住宅</option>
        <option value="学習塾">学習塾・スクール</option>
        <option value="フィットネス">フィットネス・ジム</option>
        <option value="EC通販">EC・通販</option>
        <option value="士業">士業・コンサル</option>
        <option value="IT">IT・ソフトウェア</option>
        <option value="製造業">製造業・メーカー</option>
        <option value="その他">その他・一般</option>
      </select>
    </div>
    <div class="field">
      <label for="product">商品・サービス名</label>
      <input type="text" id="product" placeholder="例：手作りパン、肩こりケアコース">
    </div>
    <div class="field">
      <label for="features">特徴・強み</label>
      <textarea id="features" placeholder="例：無添加・地元素材使用・30年の職人技&#10;複数書いてもOKです"></textarea>
      <p class="hint">特徴を書くほど、ピッタリな表現が生まれます</p>
    </div>
    <div class="field">
      <label for="target">ターゲット（任意）</label>
      <input type="text" id="target" placeholder="例：30代ママ、腰痛に悩む会社員">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">キャッチコピーを10案生成する</button>

  <div class="result-area" id="resultArea">
    <div class="result-header" id="resultHeader">生成結果</div>
    <div id="copyList"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── テンプレートパターン ──
  var PATTERNS = {
    // 訴求型
    appeal: [
      '{f}が選ばれる理由、それが{p}です。',
      '{p}だから、{f}を実現できる。',
      '{f}にこだわった{p}、ここにあります。',
      '本物の{f}を知る人が選ぶ{p}。',
      '{p}が変えた。{f}という当たり前を。',
    ],
    // 問いかけ型
    question: [
      '{f}に、本当に満足していますか？',
      '{f}を諦めていませんか？{p}が解決します。',
      '{p}を選ぶ前に、{f}を確かめてください。',
      '今の{f}、{p}でもっとよくなりませんか？',
      '{f}の悩み、{p}が答えます。',
    ],
    // 感情型
    emotion: [
      '{p}で、もっと毎日が楽しくなる。',
      '一度体験したら、手放せない。{p}の{f}。',
      '{p}がくれた、{f}という幸せ。',
      '{f}が、こんなにうれしいとは思わなかった。',
      '{p}を選んだ日から、{f}が変わった。',
    ],
    // 強調型
    emphasis: [
      '{f}なら、ぜったい{p}。',
      '誰よりも{f}にこだわった、それが{p}。',
      '{p}一択。{f}はここで決まる。',
      '{f}の本質を追求した{p}。妥協なし。',
      '{f}を超えた{f}が、{p}にある。',
    ],
    // シンプル型
    simple: [
      '{p}。ただ、{f}だけを。',
      '{f}のための{p}。',
      'シンプルだから届く、{p}の{f}。',
      '{p}。それだけで十分です。',
      '{f}、{p}。それが答えです。',
    ],
    // 数字型
    number: [
      '{p}で{f}が変わる、その実感を。',
      '{f}を求める人に、{p}は応えてきた。',
      '{p}が選ばれ続ける理由は、{f}にある。',
      '何度でもリピートしたくなる{p}の{f}。',
      '{f}で選ばれる、{p}のこだわり。',
    ],
    // ターゲット型（targetがある場合）
    target: [
      '{tg}のための{p}、ここにあります。',
      '{tg}が一番喜ぶ{f}、それが{p}。',
      '{tg}だから選んでほしい{p}の{f}。',
      '{tg}に届けたい。{p}の{f}。',
      '{tg}のことを考えて作った{p}です。',
    ],
    // 業種連動
    industry: {
      '飲食店':    ['{f}の味、{p}で毎日どうぞ。', '食べれば分かる{p}の{f}。'],
      '小売店':    ['見つけた瞬間、欲しくなる{p}の{f}。', '{f}を探していたなら、{p}へ。'],
      '美容院':    ['{f}が、あなたをもっと輝かせる。{p}。', '{p}で、{f}の自分に出会う。'],
      'エステ':    ['{f}で、内側から変わる体験。{p}。', '{p}の{f}が、あなたの毎日を変える。'],
      '整骨院':    ['{f}の悩みに、{p}が向き合います。', '{p}で、{f}のない毎日を取り戻そう。'],
      '不動産':    ['{f}な暮らしを、{p}が実現します。', '{p}が描く{f}な住まい。'],
      '学習塾':    ['{f}を身につける場所、それが{p}。', '{p}で、{f}の力を引き出す。'],
      'フィットネス': ['{f}な体は、{p}でつくられる。', '{p}で始める、{f}への第一歩。'],
      'EC通販':    ['{f}なのに、すぐ届く。{p}。', '試したら分かる{p}の{f}。'],
      '士業':      ['{f}な判断を、{p}が支えます。', '{p}が守る、あなたの{f}。'],
      'IT':        ['{f}を実現する技術、{p}にあります。', '{p}が変える{f}の未来。'],
      '製造業':    ['{f}な品質で、{p}は世界と戦う。', '{p}のものづくりは、{f}から始まる。'],
      'その他':    ['{p}の{f}、ぜひ一度お試しください。', '{f}を求めるなら、{p}へ。'],
    }
  };

  function fillTemplate(tpl, p, f, tg) {
    return tpl
      .replace(/\{p\}/g, p || '当サービス')
      .replace(/\{f\}/g, f || '高品質')
      .replace(/\{tg\}/g, tg || 'お客様');
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function pickFrom(arr, n) {
    return shuffle(arr).slice(0, n);
  }

  function generate() {
    var industry = document.getElementById('industry').value;
    var product = document.getElementById('product').value.trim();
    var features = document.getElementById('features').value.trim();
    var target = document.getElementById('target').value.trim();

    if (!industry) { alert('業種を選択してください'); return; }
    if (!product && !features) { alert('商品名または特徴を入力してください'); return; }

    // 特徴の最初の1フレーズを抽出（改行・読点で区切り）
    var f = features.split(/[\n、,，。.]/)[0].trim() || features || '高品質';
    var p = product || '当サービス';
    var tg = target;

    // 候補を集める
    var candidates = [];

    // 各パターンから1〜2件ずつ取る
    var poolOrder = ['appeal','emotion','question','emphasis','simple','number'];
    poolOrder.forEach(function(key) {
      candidates = candidates.concat(PATTERNS[key]);
    });

    // ターゲットがあればtargetパターンも追加
    if (tg) {
      candidates = candidates.concat(PATTERNS.target);
    }

    // 業種別パターン追加
    var indPat = PATTERNS.industry[industry] || PATTERNS.industry['その他'];
    candidates = candidates.concat(indPat);

    // シャッフルして10件取る
    var picks = pickFrom(candidates, 10);
    var copies = picks.map(function(tpl) {
      return fillTemplate(tpl, p, f, tg);
    });

    // 表示
    var area = document.getElementById('resultArea');
    area.style.display = 'block';
    document.getElementById('resultHeader').textContent =
      '「' + p + '」のキャッチコピー10案';

    var list = document.getElementById('copyList');
    list.innerHTML = copies.map(function(text, i) {
      return '<div class="copy-item">'
        + '<span class="copy-num">' + (i + 1) + '</span>'
        + '<span class="copy-text">' + escHtml(text) + '</span>'
        + '<button class="btn-copy" onclick="copyText(this, \'' + escAttr(text) + '\')">'
        + 'コピー</button>'
        + '</div>';
    }).join('');

    // localStorage 保存
    try {
      localStorage.setItem('catchcopy_v2_industry', industry);
      localStorage.setItem('catchcopy_v2_product', product);
      localStorage.setItem('catchcopy_v2_features', features);
      localStorage.setItem('catchcopy_v2_target', target);
    } catch(e) {}

    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'コピー済';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 1800);
    }).catch(function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'コピー済';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 1800);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  // localStorage 復元
  (function() {
    try {
      var ind = localStorage.getItem('catchcopy_v2_industry');
      var pro = localStorage.getItem('catchcopy_v2_product');
      var fea = localStorage.getItem('catchcopy_v2_features');
      var tgt = localStorage.getItem('catchcopy_v2_target');
      if (ind) document.getElementById('industry').value = ind;
      if (pro) document.getElementById('product').value = pro;
      if (fea) document.getElementById('features').value = fea;
      if (tgt) document.getElementById('target').value = tgt;
    } catch(e) {}
  })();
  </script>

</body>
</html>
