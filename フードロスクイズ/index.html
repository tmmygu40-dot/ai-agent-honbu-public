<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フードロスクイズ | 食品ロス削減テクを10問で学ぶ</title>
  <meta name="description" content="意外と知らない食品ロス削減テクを10問のクイズで楽しく学べます。賞味期限・保存方法・買い物のコツなど、今日から使える節約＆エコ知識を身につけましょう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #2d8a4e;
      --accent-light: #f0fdf4;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }

    /* ── 進捗バー ── */
    .progress-wrap {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1.2rem;
    }
    .progress-label {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.4rem;
      display: flex; justify-content: space-between;
    }
    .progress-bar-bg {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ── 問題カード ── */
    .question-num {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.8rem;
    }
    .question-text {
      font-size: 1rem; font-weight: 700; line-height: 1.6; margin-bottom: 1.2rem;
    }

    /* ── 選択肢ボタン ── */
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      display: block; width: 100%;
      padding: 0.8rem 1rem;
      font-size: 0.9rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700;
    }
    .choice-btn.incorrect {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng);
    }
    .choice-btn:disabled { cursor: default; }

    /* ── フィードバック ── */
    .feedback {
      display: none; margin-top: 1rem; padding: 0.9rem;
      border-radius: 10px; font-size: 0.88rem; line-height: 1.6;
    }
    .feedback.correct-fb {
      background: var(--ok-bg); border: 1px solid var(--ok);
    }
    .feedback.incorrect-fb {
      background: var(--ng-bg); border: 1px solid var(--ng);
    }
    .feedback-label { font-weight: 700; margin-bottom: 0.3rem; }
    .feedback-label.correct-lbl { color: var(--ok); }
    .feedback-label.incorrect-lbl { color: var(--ng); }
    .feedback-text { color: var(--text); }

    /* ── 次へボタン ── */
    .btn-next {
      display: none;
      width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #1f6337, 0 6px 16px rgba(45,138,78,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1f6337, 0 2px 8px rgba(45,138,78,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-top: 0.5rem; margin-bottom: 0.6rem; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .best-score-note { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.6rem; }

    /* ── もう一度ボタン ── */
    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.9rem;
      font-size: 0.95rem; font-weight: 800;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:hover { background: var(--accent-light); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-next, .btn-retry, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌱 フードロスクイズ</h1>
    <p class="subtitle">意外と知らない食品ロス削減テクを10問で楽しくチェック！</p>
  </header>

  <!-- 進捗バー -->
  <div class="progress-wrap no-print" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">問 1 / 10</span>
      <span id="scoreLabel">正解: 0問</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 問題カード -->
  <div class="card" id="quizCard">
    <p class="question-num" id="questionNum">第1問</p>
    <p class="question-text" id="questionText"></p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <p class="feedback-label" id="feedbackLabel"></p>
      <p class="feedback-text" id="feedbackText"></p>
    </div>
  </div>

  <!-- 次の問題ボタン -->
  <button class="btn-next no-print" id="btnNext" onclick="nextQuestion()">次の問題へ →</button>

  <!-- 結果カード -->
  <div class="result-card" id="resultCard">
    <p class="result-label">クイズ結果</p>
    <p class="result-value" id="resultScore">—</p>
    <p class="result-eval" id="resultEval"></p>
    <p class="result-note" id="resultNote"></p>
    <p class="best-score-note" id="bestScoreNote"></p>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-retry no-print" id="btnRetry" style="display:none" onclick="restartQuiz()">🔄 もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、環境省・農林水産省・消費者庁の公開資料を参考に作成しています。データは2022〜2023年度時点の目安です。最新情報は各省庁の公式サイトをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var quizData = [
    {
      q: "日本では年間約472万トンの食品ロスが発生しています（2022年度）。国民一人あたりに換算すると、毎日どのくらい捨てていることになる？",
      choices: ["お茶碗1杯分のごはん（約38g）", "500mlペットボトル1本分", "食パン1枚分（約60g）", "りんご1個分（約200g）"],
      answer: 0,
      explanation: "2022年度の食品ロスは約472万トン。国民一人あたり1日約38gで、お茶碗1杯分のごはんを毎日捨てているのと同じ量です。まだ食べられる食品が毎日大量に廃棄されています。"
    },
    {
      q: "「賞味期限」が過ぎた食品はどうするのが正解？",
      choices: ["すぐに捨てる（法律で食べることは禁止）", "においや見た目を確認して問題なければ食べられる", "期限から1週間以内なら必ず安全", "冷凍すれば賞味期限はリセットされる"],
      answer: 1,
      explanation: "賞味期限は「おいしく食べられる期限」であり、過ぎても即座に危険にはなりません。においや見た目・味に異常がなければ食べられることが多いです。一方「消費期限」は安全に食べられる期限なので、過ぎたら廃棄が基本です。"
    },
    {
      q: "ほうれん草などの葉物野菜を長持ちさせる正しい保存方法はどれ？",
      choices: ["袋を開けて平らに寝かせ野菜室へ", "濡れたキッチンペーパーで包み、立てて野菜室へ", "乾燥剤と一緒に密閉袋で常温保存", "水でよく洗ってからタッパーに入れる"],
      answer: 1,
      explanation: "葉物野菜は濡れたキッチンペーパーや新聞紙で包んでポリ袋に入れ、立てて野菜室に入れると長持ちします。畑で立っていた状態を再現するのがポイント。横向きに寝かせると鮮度が落ちやすくなります。"
    },
    {
      q: "スーパーで食品ロスを減らす「てまえどり」とは何？",
      choices: ["棚の手前（消費期限が近い）の商品を選ぶこと", "スーパーの入口に近い棚から商品を取ること", "まとめ買いせず少量ずつ購入すること", "調理前に手を洗うこと"],
      answer: 0,
      explanation: "「てまえどり」は、その日・翌日中に食べるなら棚の手前（期限が近い）商品を選ぶことです。消費者庁が推奨しており、商品補充は奥から行われるため手前の商品が残りがちです。積極的に選ぶことで廃棄削減につながります。"
    },
    {
      q: "炊いたご飯を美味しく冷凍するコツはどれ？",
      choices: ["完全に冷ましてから密閉容器へ入れる", "温かいうちに1食分ずつラップで包む", "冷蔵庫で一晩冷やしてから冷凍する", "水分を飛ばしてからラップで包む"],
      answer: 1,
      explanation: "ご飯は完全に冷めると水分が飛んでパサパサになってしまいます。熱い蒸気を少し逃がしたら、温かいうちに1食分ずつラップでしっかり包んで冷凍するのが正解。解凍時は電子レンジで温めるだけで炊き立てに近い食感が戻ります。"
    },
    {
      q: "食材の食品ロスを最も効果的に減らす買い物の方法はどれ？",
      choices: ["毎日閉店間際に半額品だけ買う", "週1回まとめて献立を決めてから買い物する", "特売日に大量まとめ買いをする", "冷蔵庫を常にいっぱいにしておく"],
      answer: 1,
      explanation: "食品ロスの大きな原因は「何があるか把握していない」「使い切れない量を買う」こと。週1回献立を考えてから必要なものだけ購入することで、食材を計画的に使い切れます。まとめ買いは逆に食品ロスを増やすリスクがあります。"
    },
    {
      q: "アスパラガスを長持ちさせる保存方法として正しいのはどれ？",
      choices: ["ラップで全体を包んで横にして冷蔵", "根元を水に浸して立てた状態で冷蔵", "新聞紙に包んで常温で保存", "洗ってから水気を切りジップ袋で冷凍"],
      answer: 1,
      explanation: "アスパラガスは根元を少量の水に浸してコップなどに立て、ポリ袋をかぶせて野菜室で保存すると鮮度が長持ちします。横に寝かせると成長しようとして栄養を使いがちです。にんじんや長ねぎも同じく立て保存が有効です。"
    },
    {
      q: "宴会での食品ロスを減らすために推奨されている「3010運動」とは？",
      choices: ["30分以上かけてゆっくり食べる習慣", "乾杯後の30分と終了前10分は自席で食事に集中すること", "月に30日のうち10日は残さず食べること", "食材の3割を10分以内に調理する料理術"],
      answer: 1,
      explanation: "「3010（サンマルイチマル）運動」は、宴会・飲み会で乾杯後の30分と終了前の10分は自席で食事に集中しようという取り組みです。長野県松本市発祥で環境省も推奨。宴会での食べ残しを大幅に減らす効果があります。"
    },
    {
      q: "冷蔵庫の中で食品ロスを防ぐために最も効果的な管理方法はどれ？",
      choices: ["冷蔵庫をできるだけいっぱいにしておく（冷気が逃げにくい）", "週1〜2回中身を確認し、期限が近い食材を手前に並べる", "全ての食材をアルファベット順に整理する", "食材は全て冷凍室に移す"],
      answer: 1,
      explanation: "「冷蔵庫の中で忘れていた」食材が食品ロスの大きな原因です。週1〜2回整理して、期限が近い食材を手前・目線の高さに並べておくことで使い忘れを防げます。食材リストをスマホで管理する習慣も効果的です。"
    },
    {
      q: "スーパーで「割引シール（見切り品）」が貼られた消費期限の近い食品を購入することは食品ロス削減になる。この認識は正しい？",
      choices: ["間違い。見切り品は品質に問題があるので買わない方がよい", "正しい。期限が近い食品を使い切ることはロス削減につながる", "正しいが、購入後は必ず再冷凍してから食べること", "間違い。半額になるほど劣化しているので体に悪い"],
      answer: 1,
      explanation: "割引品（見切り品）を積極的に購入して使い切ることは、食品ロス削減に大きく貢献します。廃棄されるはずだった食品を消費することで店舗の廃棄量を減らせます。ただし購入後はその日〜翌日中に必ず調理・消費するようにしましょう。"
    }
  ];

  var currentIndex = 0;
  var score = 0;
  var answered = false;

  function init() {
    currentIndex = 0;
    score = 0;
    answered = false;
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('btnRetry').style.display = 'none';
    document.getElementById('quizCard').style.display = 'block';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('btnNext').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    var data = quizData[currentIndex];
    answered = false;

    var pct = (currentIndex / quizData.length * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = '問 ' + (currentIndex + 1) + ' / ' + quizData.length;
    document.getElementById('scoreLabel').textContent = '正解: ' + score + '問';

    document.getElementById('questionNum').textContent = '第' + (currentIndex + 1) + '問';
    document.getElementById('questionText').textContent = data.q;

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    data.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = (function(idx) { return function() { answer(idx); }; })(i);
      choicesEl.appendChild(btn);
    });

    var fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.className = 'feedback';
    document.getElementById('btnNext').style.display = 'none';
  }

  function answer(selectedIndex) {
    if (answered) return;
    answered = true;

    var data = quizData[currentIndex];
    var correct = (selectedIndex === data.answer);
    if (correct) score++;

    var btns = document.getElementById('choices').getElementsByTagName('button');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (i === data.answer) {
        btns[i].className = 'choice-btn correct';
      } else if (i === selectedIndex && !correct) {
        btns[i].className = 'choice-btn incorrect';
      }
    }

    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (correct ? 'correct-fb' : 'incorrect-fb');
    var lbl = document.getElementById('feedbackLabel');
    lbl.textContent = correct ? '✅ 正解！' : '❌ 不正解…';
    lbl.className = 'feedback-label ' + (correct ? 'correct-lbl' : 'incorrect-lbl');
    document.getElementById('feedbackText').textContent = data.explanation;
    fb.style.display = 'block';

    document.getElementById('scoreLabel').textContent = '正解: ' + score + '問';

    var btnNext = document.getElementById('btnNext');
    btnNext.textContent = (currentIndex + 1 >= quizData.length) ? '結果を見る →' : '次の問題へ →';
    btnNext.style.display = 'block';
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= quizData.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('btnNext').style.display = 'none';

    var total = quizData.length;
    var pct = score / total;
    var level = pct >= 0.8 ? 'ok' : pct >= 0.5 ? 'warn' : 'ng';
    var evalText = pct >= 0.8 ? '素晴らしい！フードロス博士級です🌟'
                 : pct >= 0.5 ? 'まずまず！もう少しで食品ロス達人に✊'
                 : '惜しい！今日から実践してロスを減らそう💪';
    var noteText = pct >= 0.8 ? '食品ロス削減の知識はバッチリ。日々の行動で地球にやさしく。'
                 : pct >= 0.5 ? '基本はOK！保存方法や買い方を少し意識するだけでロスが減ります。'
                 : '知識を増やして実践につなげましょう。もう一度チャレンジしてみて！';

    var bestNote = '';
    try {
      var key = 'foodloss_quiz_best';
      var prev = parseInt(localStorage.getItem(key) || '0');
      var isNew = score > prev;
      if (isNew) localStorage.setItem(key, score);
      bestNote = isNew
        ? '🎉 最高スコア更新！（' + score + '/' + total + '）'
        : '過去の最高スコア：' + prev + '/' + total;
    } catch (e) {}

    var resultCard = document.getElementById('resultCard');
    resultCard.className = 'result-card ' + level;
    resultCard.innerHTML =
      '<p class="result-label">クイズ結果</p>' +
      '<p class="result-value" id="resultScore">' + score + ' / ' + total + '</p>' +
      '<p class="result-eval" id="resultEval">' + evalText + '</p>' +
      '<p class="result-note" id="resultNote">' + noteText + '</p>' +
      '<p class="best-score-note" id="bestScoreNote">' + bestNote + '</p>';
    resultCard.style.display = 'block';

    document.getElementById('btnRetry').style.display = 'block';
  }

  function restartQuiz() {
    init();
  }

  init();
  </script>
