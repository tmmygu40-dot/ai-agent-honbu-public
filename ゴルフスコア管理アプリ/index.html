<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフスコア管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>⛳ ゴルフスコア管理</h1>
    </header>

    <!-- サマリーカード -->
    <section class="summary">
      <div class="card">
        <div class="card-label">自己ベスト</div>
        <div class="card-value" id="best-score">--</div>
      </div>
      <div class="card">
        <div class="card-label">平均スコア</div>
        <div class="card-value" id="avg-score">--</div>
      </div>
      <div class="card">
        <div class="card-label">ラウンド数</div>
        <div class="card-value" id="round-count">0</div>
      </div>
    </section>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>ラウンドを登録</h2>
      <div class="form">
        <div class="form-row">
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-row">
          <label for="course">コース名</label>
          <input type="text" id="course" placeholder="例：○○ゴルフクラブ" maxlength="50">
        </div>
        <div class="form-row">
          <label for="score">スコア</label>
          <input type="number" id="score" placeholder="例：95" min="18" max="250" required>
        </div>
        <div class="form-row">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：天気よし、フェアウェイ好調" maxlength="100">
        </div>
        <div id="form-error" class="form-error" role="alert" aria-live="polite"></div>
        <button id="add-btn" class="btn-primary" onclick="addRound()">登録する</button>
      </div>
    </section>

    <!-- 履歴一覧 -->
    <section class="history-section">
      <div class="history-header">
        <h2>ラウンド履歴</h2>
        <span id="history-count"></span>
      </div>
      <div id="history-list" class="history-list">
        <p class="empty-msg">まだラウンドが登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <script>
    const STORAGE_KEY = 'golf_rounds';

    function loadRounds() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveRounds(rounds) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds));
    }

    function calcStats(rounds) {
      if (rounds.length === 0) return { best: null, avg: null };
      const scores = rounds.map(r => r.score);
      const best = Math.min(...scores);
      const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10;
      return { best, avg };
    }

    function updateSummary(rounds) {
      const { best, avg } = calcStats(rounds);
      document.getElementById('best-score').textContent = best !== null ? best : '--';
      document.getElementById('avg-score').textContent = avg !== null ? avg : '--';
      document.getElementById('round-count').textContent = rounds.length;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return y + '年' + m + '月' + d + '日';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderHistory(rounds) {
      const list = document.getElementById('history-list');
      const countEl = document.getElementById('history-count');
      if (rounds.length === 0) {
        list.innerHTML = '<p class="empty-msg">まだラウンドが登録されていません</p>';
        countEl.textContent = '';
        return;
      }
      const { best } = calcStats(rounds);
      countEl.textContent = '全' + rounds.length + '件';
      const sorted = [...rounds].sort((a, b) => new Date(b.date) - new Date(a.date));
      list.innerHTML = sorted.map(r => {
        const isBest = r.score === best;
        return '<div class="history-item' + (isBest ? ' best' : '') + '" data-id="' + r.id + '">'
          + (isBest ? '<span class="best-badge">自己ベスト</span>' : '')
          + '<div class="score-badge">' + r.score + '</div>'
          + '<div class="item-info">'
          + '<div class="item-course">' + escapeHtml(r.course || '(コース名なし)') + '</div>'
          + '<div class="item-date">' + formatDate(r.date) + '</div>'
          + (r.memo ? '<div class="item-memo">' + escapeHtml(r.memo) + '</div>' : '')
          + '</div>'
          + '<button class="delete-btn" onclick="deleteRound(\'' + r.id + '\')" title="削除">✕</button>'
          + '</div>';
      }).join('');
    }

    function renderAll() {
      const rounds = loadRounds();
      updateSummary(rounds);
      renderHistory(rounds);
    }

    function showFormError(msg) {
      const el = document.getElementById('form-error');
      if (el) el.textContent = msg;
    }

    function clearFormError() {
      const el = document.getElementById('form-error');
      if (el) el.textContent = '';
    }

    function addRound() {
      const dateEl = document.getElementById('date');
      const courseEl = document.getElementById('course');
      const scoreEl = document.getElementById('score');
      const memoEl = document.getElementById('memo');

      const date = dateEl.value;
      const course = courseEl.value.trim();
      const scoreRaw = scoreEl.value.trim();
      const memo = memoEl.value.trim();

      clearFormError();

      if (!date) {
        showFormError('日付を入力してください');
        dateEl.focus();
        return;
      }
      if (!scoreRaw) {
        showFormError('スコアを入力してください');
        scoreEl.focus();
        return;
      }
      const score = parseInt(scoreRaw, 10);
      if (isNaN(score) || score < 18 || score > 250) {
        showFormError('スコアは18〜250の整数で入力してください');
        scoreEl.focus();
        return;
      }

      const rounds = loadRounds();
      rounds.push({ id: Date.now().toString(), date, course, score, memo });
      saveRounds(rounds);
      renderAll();

      courseEl.value = '';
      scoreEl.value = '';
      memoEl.value = '';
      scoreEl.focus();
    }

    function deleteRound(id) {
      if (!confirm('このラウンドを削除しますか？')) return;
      const rounds = loadRounds().filter(r => r.id !== id);
      saveRounds(rounds);
      renderAll();
    }

    (function setTodayDefault() {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('date').value = y + '-' + m + '-' + d;
    })();

    renderAll();
  </script>
</body>
</html>
