<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 SNSネタフレーズメーカー</title>
  <meta name="description" content="タグと感情ラベルを選ぶだけで、SNSでウケるボケ・共感フレーズを3秒で量産できるジェネレーターです。毎日のSNS投稿ネタが瞬時に増えます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── フレーズリスト ── */
    .phrase-list { display: none; background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 1.4rem 1.2rem; box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px; }
    .phrase-list.active { display: block; }
    .phrase-item { padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
    .phrase-item:last-child { border-bottom: none; }
    .phrase-text { font-size: 0.95rem; line-height: 1.5; color: var(--text); margin-bottom: 0.5rem; }
    .phrase-btn { display: inline-block; padding: 0.4rem 0.8rem; font-size: 0.75rem; font-weight: 700; background: var(--accent-light); color: var(--accent); border: none; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .phrase-btn:hover { background: var(--accent); color: #fff; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .phrase-list { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->

<body>

  <header class="app-header">
    <h1>💬 SNSネタフレーズメーカー</h1>
    <p class="subtitle">タグと感情を選ぶだけで、SNSでウケるボケ・共感フレーズを3秒で量産できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">選択</p>
    <div class="field">
      <label for="tag">話題タグを選ぶ</label>
      <select id="tag">
        <option value="">-- 選択してください --</option>
        <option value="恋愛">恋愛</option>
        <option value="仕事">仕事</option>
        <option value="日常">日常</option>
        <option value="推し活">推し活</option>
        <option value="グルメ">グルメ</option>
        <option value="トレンド">トレンド</option>
      </select>
    </div>
    <div class="field">
      <label for="emotion">感情ラベルを選ぶ</label>
      <select id="emotion">
        <option value="">-- 選択してください --</option>
        <option value="ボケ">ボケ・ユーモア</option>
        <option value="共感">共感・応援</option>
        <option value="驚き">驚き・感動</option>
        <option value="アドバイス">アドバイス・ノウハウ</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">フレーズを生成</button>

  <!-- フレーズリスト -->
  <div class="phrase-list" id="phraseList">
    <p class="card-title">生成されたフレーズ</p>
    <div id="phrases"></div>
  </div>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // フレーズ生成ロジック
  var PHRASES = {
    恋愛: {
      ボケ: [
        '恋愛は麻薬。僕は中毒者です。',
        '恋愛で人は変わる。良くなるとは言ってない。',
        '好きな人の前では人格変わる。演技って大事だね。'
      ],
      共感: [
        '片思いって、こんなに胸が苦しいんだ。',
        '恋愛って、相手を知るほど好きになるんだね。',
        '好きな人のために頑張れる自分が好きです。'
      ],
      驚き: [
        '告白されるまで気付かなかった。運命ってあるんだ。',
        'こんな人がいるんだって、世界観変わった。',
        '初恋ってこんなに尊いんだ。'
      ],
      アドバイス: [
        '好きな人には、素直になるのが一番。',
        '恋愛は相手を知ることから始まる。',
        '好きな気持ちは、いつか必ず伝わる。'
      ]
    },
    仕事: {
      ボケ: [
        '仕事中に睡魔と戦う。最強の敵です。',
        '企画会議で寝たことある。怒られた。',
        '月曜日が一番長い。月？違う、終わりが遠い。'
      ],
      共感: [
        '仕事が終わった瞬間の解放感。これが生きてる実感。',
        '同僚の頑張りを見てると、自分も頑張らなきゃって思う。',
        'チームで成功した時の達成感って、何物にも代えがたい。'
      ],
      驚き: [
        '自分がこんなことできるようになるなんて。',
        'プロジェクト完成した時は感動した。',
        'あんな無茶な企画が成功するなんて、ビックリ。'
      ],
      アドバイス: [
        '仕事は誠実さが一番大事。',
        'ミスは誰にでもある。そこからの対応が重要。',
        '困った時は相談。一人で抱え込むな。'
      ]
    },
    日常: {
      ボケ: [
        '朝は弱い。人間じゃなくなる。',
        'コーヒーなしで朝は無理。カフェインが友達。',
        '夜更かしして後悔するのは、何回しても学ばない。'
      ],
      共感: [
        'いつもの朝のルーティン。これが心を落ち着かせる。',
        '帰宅した時の「ただいま」って言葉に、心がホッとする。',
        '何もない日がこんなに幸せって、気付くのが遅れた。'
      ],
      驚き: [
        'こんな日もあるんだ。人生って予測不能。',
        '小さなことで幸せを感じられることに気付いた。',
        '何気ない日常が、実は最高に幸せなんだ。'
      ],
      アドバイス: [
        '毎日少しずつ、自分を大事にする時間を作ろう。',
        'ルーティンを作ると、心が整う。',
        '小さな喜びを積み重ねることが、人生を豊かにする。'
      ]
    }
  };

  function generate() {
    var tag = document.getElementById('tag').value;
    var emotion = document.getElementById('emotion').value;

    if (!tag || !emotion) {
      showErr('タグと感情を両方選択してください');
      return;
    }

    var phrases = PHRASES[tag] ? (PHRASES[tag][emotion] || []) : [];
    if (phrases.length === 0) {
      showErr('選択した組み合わせのフレーズが見つかりません');
      return;
    }

    showPhrases(phrases);
    saveHistory(tag, emotion);
  }

  function showPhrases(phrases) {
    var html = phrases.map(function(p, i) {
      return '<div class="phrase-item">'
           + '<p class="phrase-text">' + p + '</p>'
           + '<button class="phrase-btn" onclick="copyPhrase(' + i + ')">コピー</button>'
           + '</div>';
    }).join('');
    document.getElementById('phrases').innerHTML = html;
    document.getElementById('phraseList').classList.add('active');
  }

  function copyPhrase(idx) {
    var phrases = PHRASES[document.getElementById('tag').value][document.getElementById('emotion').value];
    if (idx < phrases.length) {
      var text = phrases[idx];
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      }).catch(function() {
        // Fallback for older browsers
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('コピーしました！');
      });
    }
  }

  function showErr(msg) {
    alert(msg);
    document.getElementById('phraseList').classList.remove('active');
  }

  function saveHistory(tag, emotion) {
    var history = JSON.parse(localStorage.getItem('phraseHistory') || '[]');
    history.unshift({ tag: tag, emotion: emotion, date: new Date().toISOString() });
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem('phraseHistory', JSON.stringify(history));
  }

  // ページ読み込み時：過去の選択を復元
  window.addEventListener('load', function() {
    var history = JSON.parse(localStorage.getItem('phraseHistory') || '[]');
    if (history.length > 0) {
      document.getElementById('tag').value = history[0].tag;
      document.getElementById('emotion').value = history[0].emotion;
    }
  });
  </script>
