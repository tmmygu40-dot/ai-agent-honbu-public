<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事日報アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>工事日報アプリ</h1>
    </header>

    <main>
      <!-- 入力フォーム -->
      <section class="form-section no-print">
        <h2>日報入力</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="date">日付</label>
            <input type="date" id="date">
          </div>
          <div class="form-group">
            <label for="site-name">現場名</label>
            <input type="text" id="site-name" placeholder="例：〇〇ビル新築工事">
          </div>
          <div class="form-group">
            <label for="worker-count">作業員数</label>
            <div class="input-unit">
              <input type="number" id="worker-count" min="0" placeholder="0">
              <span class="unit">名</span>
            </div>
          </div>
          <div class="form-group">
            <label for="weather">天候</label>
            <select id="weather">
              <option value="晴れ">晴れ</option>
              <option value="曇り">曇り</option>
              <option value="雨">雨</option>
              <option value="雪">雪</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label for="work-content">工事内容</label>
            <textarea id="work-content" rows="4" placeholder="本日の作業内容を入力してください"></textarea>
          </div>
          <div class="form-group full-width">
            <label for="remarks">備考</label>
            <textarea id="remarks" rows="2" placeholder="特記事項・安全確認など（任意）"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button id="preview-btn" class="btn btn-primary">プレビュー表示</button>
          <button id="clear-btn" class="btn btn-secondary">クリア</button>
        </div>
      </section>

      <!-- プレビュー -->
      <section class="preview-section" id="preview-section">
        <div class="preview-header no-print">
          <h2>プレビュー</h2>
          <div class="preview-actions">
            <button id="save-btn" class="btn btn-save no-print">日報を保存</button>
            <button id="print-btn" class="btn btn-primary no-print">印刷</button>
          </div>
        </div>

        <div class="report" id="report">
          <div class="report-title">工 事 日 報</div>
          <table class="report-table">
            <tr>
              <th>日付</th>
              <td id="r-date"></td>
              <th>天候</th>
              <td id="r-weather"></td>
            </tr>
            <tr>
              <th>現場名</th>
              <td id="r-site" colspan="3"></td>
            </tr>
            <tr>
              <th>作業員数</th>
              <td id="r-workers" colspan="3"></td>
            </tr>
            <tr>
              <th class="tall-cell">工事内容</th>
              <td id="r-content" class="tall-cell" colspan="3"></td>
            </tr>
            <tr>
              <th class="tall-cell">備考</th>
              <td id="r-remarks" class="tall-cell" colspan="3"></td>
            </tr>
          </table>
        </div>
      </section>

      <!-- 過去日報一覧 -->
      <section class="history-section no-print" id="history-section">
        <h2>保存済み日報 <span id="history-count"></span></h2>
        <div id="history-list" class="history-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
