<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推し色を選ぶだけで今週の運勢と恋愛アドバイスが即座に分かる。推し活を応援する占いアプリです。">
  <title>推し活カラー占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>💫 推し活カラー占い</h1>
    <p class="subtitle">推し色を選ぶだけで、今週の運勢と恋愛アドバイスがサッと分かる占いアプリです。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推し色を選ぶ</p>
    <div class="field">
      <label>あなたの推し色は？</label>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 0.5rem; margin-top: 0.5rem;">
        <button onclick="selectColor('red')" style="background: #e74c3c; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-red">🔴 赤</button>
        <button onclick="selectColor('pink')" style="background: #f5a5c1; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-pink">💗 ピンク</button>
        <button onclick="selectColor('purple')" style="background: #9b59b6; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-purple">💜 紫</button>
        <button onclick="selectColor('blue')" style="background: #3498db; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-blue">💙 青</button>
        <button onclick="selectColor('green')" style="background: #2ecc71; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-green">💚 緑</button>
        <button onclick="selectColor('yellow')" style="background: #f1c40f; color: #333; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-yellow">💛 黄</button>
        <button onclick="selectColor('cyan')" style="background: #1abc9c; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-cyan">🩵 水色</button>
        <button onclick="selectColor('orange')" style="background: #e67e22; color: #fff; padding: 1rem; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-weight: 600;" id="btn-orange">🧡 橙</button>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()" id="btn-calc">占いを見る</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">今週の運勢</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">恋愛アドバイス</p>
    <p id="advice" style="font-size: 0.92rem; color: var(--text); line-height: 1.6;"></p>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💫 このアプリの占い結果は、西洋占星術やカラーセラピーの考え方を参考にした、あくまで娯楽目的のツールです。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠" style="display:none;"></div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 占い運勢データ ──
  var fortuneData = {
    red: {
      emoji: '🔴',
      level: 'ok',
      fortune: '大吉',
      msg: '赤はエネルギーと勇気の色。今週は新しいチャレンジに最適な運気です。思い切った行動が幸運を呼びます。',
      advice: '推しへの気持ちもクリアで、行動力がアップしている時期です。デートのお誘いなど、少し大胆に動いてみましょう。新しい展開が期待できます！'
    },
    pink: {
      emoji: '💗',
      level: 'ok',
      fortune: '中吉',
      msg: 'ピンクは優しさと愛情の色。人間関係が穏やかで暖かい運気に包まれています。周囲への思いやりが運を広げます。',
      advice: '推しに対する気持ちが素直に表現できる時期。優しさや感謝の気持ちを伝えることで、関係が深まる可能性がありますよ。'
    },
    purple: {
      emoji: '💜',
      level: 'warn',
      fortune: '小吉',
      msg: '紫は神秘と直感の色。感覚が冴えている週です。自分の直感を信じて動くことが大切です。ただし思い込みには注意。',
      advice: '推しとの関係で何か引っかかることがあるなら、直感に耳を傾けて。でも確認も大事です。じっくり向き合う時期かもしれません。'
    },
    blue: {
      emoji: '💙',
      level: 'ok',
      fortune: '中吉',
      msg: '青は冷静さと信頼の色。頭がクリアで判断力が良好な週です。大事な決断にはもってこいの運気。',
      advice: '落ち着いて推しと向き合える時期です。素直なコミュニケーションがうまくいきやすいですよ。信頼を深める好機です。'
    },
    green: {
      emoji: '💚',
      level: 'ok',
      fortune: '大吉',
      msg: '緑は調和と成長の色。バランスの取れた運気で、安定と発展を同時に得られます。焦らず着実に進めば吉です。',
      advice: '推しとの関係も緩やかに成長していく時期。焦らず、ゆっくり信頼を積み重ねることで、良い未来が見えますよ。'
    },
    yellow: {
      emoji: '💛',
      level: 'warn',
      fortune: '小吉',
      msg: '黄色は楽観と光の色。明るく前向きな運気で、周囲も動かします。ただしミスや約束忘れに注意を。',
      advice: '気分は軽く楽しい週ですが、推しとの約束やメッセージの返信は忘れずに。細部への注意で、さらに良い関係に。'
    },
    cyan: {
      emoji: '🩵',
      level: 'ok',
      fortune: '中吉',
      msg: '水色は癒しと柔軟性の色。ストレスが軽く、心に余裕が出ます。その優しさが人を引き付ける週です。',
      advice: '心に余裕があるので、推しに対して包容力をアピールできる時期。相手の話を聞く姿勢が好印象につながります。'
    },
    orange: {
      emoji: '🧡',
      level: 'ok',
      fortune: '中吉',
      msg: 'オレンジは喜びと親しみやすさの色。人付き合いがスムーズで、誰からも好かれる運気です。パーティーや集まりが吉。',
      advice: '推しとの交流も自然で親密になりやすい時期です。友人と一緒に過ごす時間も大切にすると、さらに良い関係が築けます。'
    }
  };

  var STORAGE_KEY = 'fortune-color-divination';
  var selectedColor = null;

  window.addEventListener('load', function() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      selectedColor = saved;
      highlightColor(selectedColor);
    }
  });

  function selectColor(color) {
    selectedColor = color;
    localStorage.setItem(STORAGE_KEY, color);
    highlightColor(color);
  }

  function highlightColor(color) {
    var colors = ['red', 'pink', 'purple', 'blue', 'green', 'yellow', 'cyan', 'orange'];
    colors.forEach(function(c) {
      var btn = document.getElementById('btn-' + c);
      if (c === color) {
        btn.style.border = '3px solid #000';
        btn.style.transform = 'scale(1.05)';
      } else {
        btn.style.border = '2px solid transparent';
        btn.style.transform = 'scale(1)';
      }
    });
  }

  var EMOJI_MSG = {
    ok:   { e: '😌', t: 'ほっ、今回は大丈夫そう' },
    warn: { e: '🤔', t: 'うーん、少し見直すと安心' },
    ng:   { e: '😱', t: 'ガーン、早めに確認しよう' }
  };

  var QA = {
    ok: [
      { q: '今のままで大丈夫？', a: '今回は安心ゾーンです。今の習慣を続けるのが一番の備えになります。' },
      { q: 'もっと余裕を持つには？', a: '毎月少しずつ見直すだけで、急な変化にも慌てずに済みます。' },
      { q: '備えを強化するなら？', a: '家庭の備蓄や保険の見直しを、年に1回チェックしておくと安心です。' },
      { q: '比較・確認したい時は？', a: '同じ条件で他のプランも見ておくと、選び直す目安になります。' }
    ],
    warn: [
      { q: 'すぐ危ない？', a: 'すぐに危険ではありません。今のうちに確認すると後で楽になります。' },
      { q: '何から見直す？', a: '一番金額が大きい項目・一番頻度が高い項目から1つずつで十分です。' },
      { q: '備えを足すなら？', a: '足りない部分だけ補えばOK。一気に揃える必要はありません。' },
      { q: '比較してみたい時は？', a: '今の条件をメモして、別の選択肢と並べて見ると判断しやすくなります。' }
    ],
    ng: [
      { q: 'パニックになりそう…', a: '焦らなくて大丈夫です。やることを「今日／今週／今月」に分ければ進められます。' },
      { q: '今日できることは？', a: 'まず現状をメモして、家族や関係者と共有するだけでも一歩前進です。' },
      { q: '相談したほうがいい？', a: '一人で抱え込まず、専門窓口・公的相談を見ておくのも一つの方法です。' },
      { q: '備えや代替を探すなら？', a: '同じ用途の代替・比較情報を見ておくと、選択肢が広がって安心できます。' }
    ]
  };

  function calc() {
    if (!selectedColor) {
      showErr('推し色を選んでください');
      return;
    }
    var data = fortuneData[selectedColor];
    showResult(data.level, data.emoji + ' ' + data.fortune, data.msg);
    showAdvice(data.advice);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showAdvice(advice) {
    document.getElementById('advice').textContent = advice;
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
