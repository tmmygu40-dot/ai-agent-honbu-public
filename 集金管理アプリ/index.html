<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集金管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>集金管理アプリ</h1>

    <!-- 月の設定 -->
    <div class="card">
      <label for="monthInput">対象月</label>
      <div class="row">
        <input type="text" id="monthInput" placeholder="例：2026年4月">
        <button id="setMonthBtn" class="btn-primary">設定</button>
      </div>
      <p id="currentMonth" class="current-month"></p>
    </div>

    <!-- 会員登録 -->
    <div class="card">
      <label for="memberName">会員名を追加</label>
      <div class="row">
        <input type="text" id="memberName" placeholder="例：山田 太郎">
        <button id="addMemberBtn" class="btn-primary">追加</button>
      </div>
    </div>

    <!-- フィルター -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全員</button>
      <button class="filter-btn" data-filter="unpaid">未回収のみ</button>
      <button class="filter-btn" data-filter="paid">済みのみ</button>
    </div>

    <!-- 集計 -->
    <div class="summary">
      <span>全員：<strong id="totalCount">0</strong>名</span>
      <span class="paid">済み：<strong id="paidCount">0</strong>名</span>
      <span class="unpaid">未回収：<strong id="unpaidCount">0</strong>名</span>
    </div>

    <!-- 会員リスト -->
    <div id="memberList" class="member-list"></div>

    <!-- 未回収一覧 -->
    <div id="unpaidSection" class="card unpaid-section" style="display:none;">
      <h2>未回収一覧</h2>
      <ul id="unpaidList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
