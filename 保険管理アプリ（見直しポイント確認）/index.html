<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保険管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>保険管理アプリ</h1>
    <p class="subtitle">保険の見直しポイントをすぐ確認</p>

    <!-- 見直しポイントサマリー -->
    <section class="summary-section">
      <h2>見直しポイント</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">月払い合計</div>
          <div class="summary-value" id="totalMonthly">¥0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">年払い換算</div>
          <div class="summary-value" id="totalYearly">¥0</div>
        </div>
        <div class="summary-card alert-card" id="expiringSoonCard">
          <div class="summary-label">要注意（90日以内）</div>
          <div class="summary-value" id="expiringSoon">0件</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">登録件数</div>
          <div class="summary-value" id="totalCount">0件</div>
        </div>
      </div>
      <div class="category-summary" id="categorySummary"></div>
    </section>

    <!-- 保険登録フォーム -->
    <section class="form-section">
      <h2>保険を登録する</h2>
      <form id="insuranceForm">
        <div class="form-group">
          <label for="insType">種類 <span class="required">*</span></label>
          <select id="insType" required>
            <option value="">選択してください</option>
            <option value="生命保険">生命保険</option>
            <option value="医療保険">医療保険</option>
            <option value="火災保険">火災保険</option>
            <option value="自動車保険">自動車保険</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="insCompany">保険会社名 <span class="required">*</span></label>
          <input type="text" id="insCompany" placeholder="例：〇〇生命" required>
        </div>
        <div class="form-group">
          <label for="insPremium">月払い保険料（円） <span class="required">*</span></label>
          <input type="number" id="insPremium" placeholder="例：5000" min="0" required>
        </div>
        <div class="form-group">
          <label for="insExpiry">満期日</label>
          <input type="date" id="insExpiry">
        </div>
        <div class="form-group">
          <label for="insNote">備考</label>
          <input type="text" id="insNote" placeholder="例：死亡保障1000万円">
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary" id="submitBtn">登録する</button>
          <button type="button" class="btn-secondary" id="cancelBtn" style="display:none;">キャンセル</button>
        </div>
      </form>
    </section>

    <!-- 保険一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>登録済み保険一覧</h2>
        <div class="sort-control">
          <label for="sortSelect">並び順：</label>
          <select id="sortSelect">
            <option value="expiry">満期が近い順</option>
            <option value="type">種類別</option>
            <option value="premium">保険料が高い順</option>
            <option value="added">登録順</option>
          </select>
        </div>
      </div>
      <div id="insuranceList" class="insurance-list">
        <p class="empty-msg">保険が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
