    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;

    .card-title {
      font-size: 0.78rem; font-weight: 700;

    .phrase-text {

      background: rgba(28,25,23,0.92); color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 999px;

  function generate() {
    var g = document.getElementById('genre').value;
    var t = document.getElementById('tone').value;
    var pool = (POOL[g] && POOL[g][t]) || [];
    if (pool.length === 0) return;

    var copy = pool.slice();
    var picked = [];
    var n = Math.min(5, copy.length);
    for (var i = 0; i < n; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      picked.push(copy.splice(idx, 1)[0]);
    }

    renderPhrases(picked);
    document.getElementById('result-card').style.display = 'block';
    renderFavs();
  }

  function renderPhrases(list) {
    var favs = loadFavs();
    var html = list.map(function(p) {
      var on = favs.indexOf(p) >= 0 ? ' on' : '';
      var safe = escapeAttr(p);
      return '<div class="phrase-item">'
           + '<div class="phrase-text" onclick="copyPhrase(this)" data-text="' + safe + '">' + escapeHtml(p) + '</div>'
           + '<button class="phrase-fav' + on + '" onclick="toggleFav(this)" data-text="' + safe + '" aria-label="お気に入り">★</button>'
           + '</div>';
    }).join('');
    document.getElementById('phrase-list').innerHTML = html;
  }

  function copyPhrase(el) {
    var text = el.getAttribute('data-text');
    if (!text) return;
    var decoded = decodeAttr(text);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(decoded).then(showToast, fallbackCopy.bind(null, decoded));
    } else {
      fallbackCopy(decoded);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showToast() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 1400);
  }

  function toggleFav(btn) {
    var text = decodeAttr(btn.getAttribute('data-text'));
    var favs = loadFavs();
    var i = favs.indexOf(text);
    if (i >= 0) { favs.splice(i, 1); btn.classList.remove('on'); }
    else { favs.unshift(text); btn.classList.add('on'); }
    saveFavs(favs);
    renderFavs();
  }

  function renderFavs() {
    var favs = loadFavs();
    var card = document.getElementById('fav-card');
    var list = document.getElementById('fav-list');
    if (favs.length === 0) {

      list.innerHTML = '';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(p) {
      var safe = escapeAttr(p);
      return '<div class="phrase-item">'
           + '<div class="phrase-text" onclick="copyPhrase(this)" data-text="' + safe + '">' + escapeHtml(p) + '</div>'
           + '<button class="phrase-fav on" onclick="removeFav(this)" data-text="' + safe + '" aria-label="お気に入り解除">★</button>'
           + '</div>';
    }).join('');
  }

  function removeFav(btn) {
    var text = decodeAttr(btn.getAttribute('data-text'));
    var favs = loadFavs();
    var i = favs.indexOf(text);
    if (i >= 0) { favs.splice(i, 1); saveFavs(favs); }
    renderFavs();
    var phraseList = document.getElementById('phrase-list');
    if (phraseList) {
      var btns = phraseList.querySelectorAll('.phrase-fav');
      for (var k = 0; k < btns.length; k++) {
        if (decodeAttr(btns[k].getAttribute('data-text')) === text) {
          btns[k].classList.remove('on');
        }
      }
    }
  }

  function loadFavs() {
    try {
      var raw = localStorage.getItem(FAV_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
  }
  function saveFavs(arr) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); } catch(e) {}
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escapeAttr(s) {
    return encodeURIComponent(s);
  }
  function decodeAttr(s) {
    try { return decodeURIComponent(s); } catch(e) { return s; }
  }

  document.addEventListener('DOMContentLoaded', renderFavs);
  </script>
