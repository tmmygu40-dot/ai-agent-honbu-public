<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCPシナリオジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結果エリア */
    #result-area { display: none; max-width: 600px; margin: 0 auto; }

    .result-header {
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 800;
    }
    .result-header .label { font-size: 0.75rem; opacity: 0.85; margin-bottom: 0.25rem; }

    .phase-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .phase-title {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.9rem; font-weight: 800;
      margin-bottom: 1rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .phase-badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 6px;
      white-space: nowrap;
    }
    .phase-1 .phase-badge { background: var(--ng-bg); color: var(--ng); }
    .phase-2 .phase-badge { background: var(--warn-bg); color: var(--warn); }
    .phase-3 .phase-badge { background: var(--ok-bg); color: var(--ok); }

    .step-list { list-style: none; }
    .step-list li {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.5;
    }
    .step-list li:last-child { border-bottom: none; }
    .step-num {
      min-width: 1.4rem; height: 1.4rem;
      background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 0.05rem;
    }
    .phase-1 .step-num { background: var(--ng); }
    .phase-2 .step-num { background: var(--warn); }
    .phase-3 .step-num { background: var(--ok); }

    .btn-save {
      display: block; width: 100%; margin-bottom: 0.7rem;
      padding: 0.7rem 1rem; font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #ffe8c0; }

    .btn-pdf {
      display: block; width: 100%; margin-bottom: 0.7rem;
      padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .saved-notice {
      display: none;
      background: var(--ok-bg); color: var(--ok);
      border: 1px solid var(--ok); border-radius: 8px;
      padding: 0.5rem 0.8rem; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 0.7rem; text-align: center;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-save, .btn-pdf, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .phase-card, .result-header { box-shadow: none; }
      .app-header { border-bottom: 2px solid #000; }
      #result-area { display: block !important; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>BCPシナリオジェネレーター</h1>
    <p class="subtitle">業種とリスクを選ぶだけで事業継続計画の対応手順を自動生成</p>
  </header>

  <div class="card">
    <p class="card-title">業種・リスクを選択</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="">業種を選択してください</option>
        <option value="飲食業">飲食業</option>
        <option value="製造業">製造業</option>
        <option value="小売業">小売業</option>
        <option value="建設業">建設業</option>
        <option value="サービス業">サービス業</option>
        <option value="医療・介護">医療・介護</option>
        <option value="IT・通信">IT・通信</option>
        <option value="物流・運輸">物流・運輸</option>
        <option value="農業・食品">農業・食品</option>
        <option value="宿泊・観光">宿泊・観光</option>
      </select>
    </div>
    <div class="field">
      <label for="risk">リスク種別</label>
      <select id="risk">
        <option value="">リスクを選択してください</option>
        <option value="地震">地震</option>
        <option value="火災">火災</option>
        <option value="洪水・水害">洪水・水害</option>
        <option value="停電">停電</option>
        <option value="感染症">感染症</option>
        <option value="サプライチェーン断絶">サプライチェーン断絶</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">対応手順を生成する</button>

  <div id="result-area">
    <div class="result-header">
      <p class="label">BCP対応手順</p>
      <p id="result-title">—</p>
    </div>

    <div class="phase-card phase-1">
      <div class="phase-title">
        <span class="phase-badge">緊急対応</span>
        発生直後（0〜3時間以内）
      </div>
      <ul class="step-list" id="steps-immediate"></ul>
    </div>

    <div class="phase-card phase-2">
      <div class="phase-title">
        <span class="phase-badge">初動対応</span>
        24時間以内
      </div>
      <ul class="step-list" id="steps-day1"></ul>
    </div>

    <div class="phase-card phase-3">
      <div class="phase-title">
        <span class="phase-badge">復旧対応</span>
        1週間以内
      </div>
      <ul class="step-list" id="steps-week1"></ul>
    </div>

    <div id="saved-notice" class="saved-notice">保存しました！</div>
    <button class="btn-save no-print" onclick="savePlan()">このプランを保存する（localStorage）</button>
    <button class="btn-pdf no-print" onclick="window.print()">📄 印刷・PDF保存</button>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  function generate() {
    var industry = document.getElementById('industry').value;
    var risk = document.getElementById('risk').value;
    if (!industry || !risk) {
      alert('業種とリスクを選択してください');
      return;
    }

    var base = BASE[risk];
    var add = ADDITION[industry][risk];

    var steps = {
      immediate: base.immediate.concat(add.immediate || []),
      day1: base.day1.concat(add.day1 || []),
      week1: base.week1.concat(add.week1 || [])
    };

    document.getElementById('result-title').textContent = industry + ' × ' + risk + ' 対応シナリオ';
    renderSteps('steps-immediate', steps.immediate);
    renderSteps('steps-day1', steps.day1);
    renderSteps('steps-week1', steps.week1);

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('saved-notice').style.display = 'none';

    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderSteps(elId, items) {
    var el = document.getElementById(elId);
    el.innerHTML = items.map(function(item, i) {
      return '<li><span class="step-num">' + (i + 1) + '</span><span>' + item + '</span></li>';
    }).join('');
  }

  function savePlan() {
    var industry = document.getElementById('industry').value;
    var risk = document.getElementById('risk').value;
    if (!industry || !risk) return;
    var data = { industry: industry, risk: risk, savedAt: new Date().toLocaleString('ja-JP') };
    localStorage.setItem('bcp_last_plan', JSON.stringify(data));
    var notice = document.getElementById('saved-notice');
    notice.style.display = 'block';
    setTimeout(function() { notice.style.display = 'none'; }, 2500);
  }

  /* 保存済みプランの復元 */
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('bcp_last_plan');
    if (!saved) return;
    try {
      var data = JSON.parse(saved);
      var industryEl = document.getElementById('industry');
      var riskEl = document.getElementById('risk');
      for (var i = 0; i < industryEl.options.length; i++) {
        if (industryEl.options[i].value === data.industry) { industryEl.selectedIndex = i; break; }
      }
      for (var j = 0; j < riskEl.options.length; j++) {
        if (riskEl.options[j].value === data.risk) { riskEl.selectedIndex = j; break; }
      }
    } catch(e) {}
  });
