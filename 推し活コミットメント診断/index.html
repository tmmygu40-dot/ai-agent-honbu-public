<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 推し活コミットメント診断 | 10問でわかる推し愛の深さ</title>
  <meta name="description" content="10問の質問に答えるだけで、あなたの推し活コミットメント度をスコア化。推し愛の深さを「見習い／ガチ恋勢／沼の住人」の3段階で診断できる無料の自己診断アプリです。">
  <style>
    :root {
      --bg: #faf3f7;
      --card: #ffffff;
      --border: #f0d9e6;
      --accent: #e0408f;
      --accent-light: #fff0f7;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; line-height: 1.5; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { padding: 0.6rem 0 1rem; border-bottom: 1px dashed var(--border); }
    .q-block:last-child { border-bottom: none; padding-bottom: 0.2rem; }
    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
    .q-text { font-size: 0.98rem; font-weight: 700; color: var(--text); margin: 0.2rem 0 0.7rem; line-height: 1.5; }

    .opt-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .opt {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
      background: var(--bg);
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt input[type="radio"]:checked ~ .opt-text { color: var(--accent); font-weight: 700; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }
    .opt-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }

    .btn-calc {
      display: block; width: calc(100% - 2rem); max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b62873, 0 6px 16px rgba(224,64,143,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b62873, 0 2px 8px rgba(224,64,143,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.9rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.5rem; }
    .result-emoji { font-size: 2.4rem; line-height: 1.2; margin-bottom: 0.3rem; }
    .result-eval {
      font-size: 1.1rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.4rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: calc(100% - 2rem);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💖 推し活コミットメント診断</h1>
    <p class="subtitle">10問でわかる、あなたの推し愛の深さ。見習い？沼の住人？</p>
  </header>

  <div class="card">
    <p class="card-title">10の質問</p>
    <div id="q-container"></div>
  </div>

  <button class="btn-calc" onclick="calc()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="re">💖</p>
    <p class="result-label">あなたの推し活レベル</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="rl"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断スコア</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 本診断はエンタメ目的の自己診断ツールです。スコアや判定はあくまで参考としてお楽しみください。推し活は人それぞれ、自分のペースで楽しむのが一番です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi_commitment_v1';

  var QUESTIONS = [
    {
      q: '推しを知ってからどれくらい経った？',
      opts: ['3ヶ月以内', '半年〜1年', '1〜3年', '3年以上の戦友']
    },
    {
      q: '推しに使う1ヶ月のお金は？',
      opts: ['ほぼゼロ円派', '〜5,000円', '5,000〜2万円', '2万円超え（聞かないで）']
    },
    {
      q: '推し関連グッズ・所持品の数は？',
      opts: ['まだ未所持', '5個以下', '6〜30個', '部屋が祭壇化中']
    },
    {
      q: '推しのコンテンツ（配信・動画・楽曲等）に費やす時間は週どれくらい？',
      opts: ['週1時間未満', '1〜5時間', '5〜15時間', '15時間以上の住人']
    },
    {
      q: '推しの誕生日／記念日への気合いは？',
      opts: ['特に何もしない', 'SNSでお祝い投稿', '推しケーキ＆祭壇', '広告・センイル全力']
    },
    {
      q: '推しのスケジュール把握度は？',
      opts: ['だいたい知らない', '主要イベントのみ', '配信・更新は把握', 'カレンダー完備の参謀']
    },
    {
      q: '推しの話を友人・SNSで布教する熱量は？',
      opts: ['基本ひっそり', 'たまに呟く', '布教用資料あり', '布教は使命']
    },
    {
      q: '推しのことで泣いたり情緒不安定になった回数は？',
      opts: ['特に記憶なし', '1〜2回', 'シーズン毎にある', '週次で情緒崩壊']
    },
    {
      q: '推しがいない自分を想像できる？',
      opts: ['余裕で想像できる', 'ちょっと寂しい', '考えたくない', '想像不可・酸素レベル']
    },
    {
      q: '推しに対する今の気持ちを一言で言うと？',
      opts: ['いいなと思う', '応援している', '生きがい', '推しが宇宙']
    }
  ];

  var LEVELS = [
    {
      min: 0, max: 10,
      cls: 'warn',
      emoji: '🌱',
      label: '推し活見習い',
      note: 'まだ気軽に楽しめている健全ゾーン。これから沼に落ちるか、ライトに楽しみ続けるか、運命の分かれ道です。'
    },
    {
      min: 11, max: 20,
      cls: 'warn',
      emoji: '🔥',
      label: 'ガチ恋勢',
      note: '推しのために動ける立派な戦友。生活と推し活のバランスを保ちつつ、しっかり熱量を維持できているタイプです。'
    },
    {
      min: 21, max: 30,
      cls: 'ok',
      emoji: '💎',
      label: '沼の住人',
      note: '推しが酸素。もはや推しのいない人生は考えられないレベル。推しは人生の核です。どうか健康とお財布だけは大事に。'
    }
  ];

  function renderQuestions() {
    var saved = loadAnswers();
    var html = QUESTIONS.map(function(item, i) {
      var opts = item.opts.map(function(opt, j) {
        var checked = (saved && saved[i] === j) ? ' checked' : '';
        return '<label class="opt">'
             + '<input type="radio" name="q' + i + '" value="' + j + '"' + checked + '>'
             + '<span class="opt-text">' + opt + '</span>'
             + '</label>';
      }).join('');
      return '<div class="q-block">'
           + '<div class="q-num">Q' + (i + 1) + ' / ' + QUESTIONS.length + '</div>'
           + '<p class="q-text">' + item.q + '</p>'
           + '<div class="opt-list">' + opts + '</div>'
           + '</div>';
    }).join('');
    document.getElementById('q-container').innerHTML = html;
  }

  function loadAnswers() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (Array.isArray(obj.answers)) return obj.answers;
    } catch (e) {}
    return null;
  }

  function saveAnswers(answers) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers: answers, savedAt: Date.now() }));
    } catch (e) {}
  }

  function calc() {
    var answers = [];
    var unanswered = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) {
        unanswered.push(i + 1);
        answers.push(null);
      } else {
        answers.push(parseInt(sel.value, 10));
      }
    }

    if (unanswered.length > 0) {
      showErr('まだ回答していない質問があります（Q' + unanswered.join(', Q') + '）');
      return;
    }

    saveAnswers(answers);

    var total = answers.reduce(function(a, b) { return a + b; }, 0);
    var level = LEVELS[0];
    for (var k = 0; k < LEVELS.length; k++) {
      if (total >= LEVELS[k].min && total <= LEVELS[k].max) {
        level = LEVELS[k]; break;
      }
    }

    showResult(level, total);
    showDetail(answers, total, level);

    setTimeout(function(){
      var rc = document.getElementById('result');
      if (rc && rc.scrollIntoView) rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function showResult(level, total) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level.cls;
    rc.style.display = 'block';
    document.getElementById('re').textContent = level.emoji;
    document.getElementById('rv').textContent = total + ' / 30 点';
    document.getElementById('rl').textContent = level.label;
    document.getElementById('rn').textContent = level.note;
  }

  function showDetail(answers, total, level) {
    var rows = answers.map(function(a, i) {
      return ['Q' + (i + 1), a + ' 点'];
    });
    rows.push(['合計スコア', total + ' / 30 点', true]);
    rows.push(['判定', level.label]);
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('rl').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  renderQuestions();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
