<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス感謝コメント生成器</title>
  <meta name="description" content="上司へのお礼メールを場面別に5パターン即座に生成できるアプリです。指導・サポート・チャンスなど、その時々の状況に合わせた敬語・丁寧度の感謝文が選べます。仕事の効率化に。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── シーンボタン ── */
    .scene-buttons {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
    }
    .btn-scene {
      flex: 1; min-width: 100px;
      padding: 0.8rem 0.6rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-scene:active { transform: scale(0.95); }
    .btn-scene.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent); box-shadow: 0 3px 12px rgba(224,123,0,0.2);
    }

    /* ── 結果パターンカード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .pattern-header {
      font-size: 0.82rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
    }
    .pattern-text {
      font-size: 0.95rem; line-height: 1.6;
      color: var(--text); margin-bottom: 1rem;
      word-break: break-word;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.6rem; font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-scene, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ビジネス感謝コメント生成器</h1>
    <p class="subtitle">上司へのお礼メールを場面別に5パターン即提案</p>
  </header>

  <!-- シーン選択カード -->
  <div class="card">
    <p class="card-title">シーンを選択</p>
    <div class="scene-buttons">
      <button class="btn-scene" onclick="selectScene('guidance')">指導</button>
      <button class="btn-scene" onclick="selectScene('support')">サポート</button>
      <button class="btn-scene" onclick="selectScene('chance')">チャンス</button>
      <button class="btn-scene" onclick="selectScene('kindness')">親切</button>
      <button class="btn-scene" onclick="selectScene('encourage')">励まし</button>
    </div>
  </div>

  <!-- パターン表示エリア -->
  <div id="result" style="display:none">
    <div class="result-card ok" id="pattern-1"></div>
    <div class="result-card ok" id="pattern-2"></div>
    <div class="result-card ok" id="pattern-3"></div>
    <div class="result-card ok" id="pattern-4"></div>
    <div class="result-card ok" id="pattern-5"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💼 このアプリは、ビジネスコミュニケーション研究・敬語用法の参考資料を基に、場面別のお礼文を提示しています。実際の使用時は、相手や状況に応じて適宜カスタマイズしてください。
  </p>

  <script>
  var PATTERNS = {
    guidance: [
      "いつも丁寧にご指導いただき、ありがとうございます。今回のアドバイスのおかげで、より良い成果を出すことができました。",
      "先日はご多忙のところ、貴重なご指導を賜り、心より御礼申し上げます。いただいたご指摘を参考に、改善に努めてまいります。",
      "ご指導ありがとうございました。次に活かします。",
      "いつもありがとうございます。今回のご指導のおかげで、進め方が分かりました。",
      "いつも身に余るご指導を賜り、誠にありがとうございます。今後も精進してまいる所存です。"
    ],
    support: [
      "困難な状況で支援していただき、ありがとうございました。おかげで乗り越えることができました。",
      "この度は親身なサポートをいただき、誠にありがとうございます。大変心強かったです。",
      "サポートありがとうございました。助かりました。",
      "いつもサポートしてくれてありがとうございます。おかげで安心して進めることができます。",
      "日頃より格別のご支援を賜り、厚く御礼申し上げます。今後ともよろしくお願い申し上げます。"
    ],
    chance: [
      "この度はこのような良い機会をいただき、ありがとうございます。精一杯頑張ります。",
      "貴重な機会を与えていただき、心より感謝申し上げます。全力でこの仕事に当たります。",
      "チャンスをありがとうございました。頑張ります。",
      "こういう機会をくれてありがとうございます。必ず成果を出します。",
      "かかる至上の機会をお与えいただき、誠にありがとうございます。全力を尽くしてまいります。"
    ],
    kindness: [
      "先日は親切にしていただき、ありがとうございました。とても助かりました。",
      "何かとお気遣いいただき、心より御礼申し上げます。今後も全力でサポートいただきたく、よろしくお願いいたします。",
      "親切にありがとうございました。感謝しています。",
      "いつも優しくしてくれてありがとうございます。本当に助かります。",
      "常日頃より細やかなご配慮を賜り、誠にありがとうございます。心より感謝いたしております。"
    ],
    encourage: [
      "励ましの言葉をありがとうございました。頑張ります。",
      "温かい励ましをいただき、誠にありがとうございます。その言葉を力に、頑張ってまいります。",
      "励ましてくれてありがとう。頑張ります。",
      "応援ありがとうございます。努力します。",
      "温かいお励ましの言葉を賜り、誠にありがとうございます。一層精進いたす所存です。"
    ]
  };

  var selectedScene = null;

  var PATTERN_LABELS = [
    'パターン1（丁寧度：標準）',
    'パターン2（丁寧度：高）',
    'パターン3（簡潔版）',
    'パターン4（カジュアル）',
    'パターン5（フォーマル）'
  ];

  function selectScene(scene) {
    selectedScene = scene;
    var buttons = document.querySelectorAll('.btn-scene');
    buttons.forEach(function(b) { b.classList.remove('active'); });
    event.target.classList.add('active');

    var patterns = PATTERNS[scene];

    function renderCard(cardId, textId, label, text) {
      var card = document.getElementById(cardId);
      card.innerHTML =
        '<p class="pattern-header">' + label + '</p>' +
        '<p class="pattern-text" id="' + textId + '">' + text + '</p>' +
        '<button class="btn-copy" onclick="copyPattern(\'' + textId + '\')">📋 コピーする</button>';
      card.style.display = 'block';
    }

    document.getElementById('pattern-1').innerHTML = '';
    document.getElementById('pattern-2').innerHTML = '';
    document.getElementById('pattern-3').innerHTML = '';
    document.getElementById('pattern-4').innerHTML = '';
    document.getElementById('pattern-5').innerHTML = '';

    renderCard('pattern-1', 'text-1', PATTERN_LABELS[0], patterns[0]);
    renderCard('pattern-2', 'text-2', PATTERN_LABELS[1], patterns[1]);
    renderCard('pattern-3', 'text-3', PATTERN_LABELS[2], patterns[2]);
    renderCard('pattern-4', 'text-4', PATTERN_LABELS[3], patterns[3]);
    renderCard('pattern-5', 'text-5', PATTERN_LABELS[4], patterns[4]);

    var result = document.getElementById('result');
    result.style.display = '';
    saveHistory(scene);

    // スクロール
    setTimeout(function() {
      result.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  function copyPattern(elementId) {
    var text = document.getElementById(elementId).textContent;
    navigator.clipboard.writeText(text).then(function() {
      alert('コピーしました！');
    }).catch(function(e) {
      // Fallback for older browsers
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('コピーしました！');
    });
  }

  function saveHistory(scene) {
    try {
      var history = JSON.parse(localStorage.getItem('businessThankHistory') || '[]');
      var now = new Date().toLocaleString('ja-JP');
      history.push({ scene: scene, time: now });
      if (history.length > 10) history.shift();
      localStorage.setItem('businessThankHistory', JSON.stringify(history));
    } catch(e) {}
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
