<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="顔の特徴を入力するだけで、AI用のドット絵SNSアイコンプロンプトが自動で生成されます。推しキャラもプロフ画像も、簡単にAI生成できるプロンプトがパッと作れます。">
  <title>🎨 ドット絵AIプロンプト生成メーカー - SNSアイコンを簡単AI化</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.5; margin-bottom: 0.8rem; word-wrap: break-word; }
    .result-card.ok   .result-value { color: var(--text); }
    .result-card.warn .result-value { color: var(--text); }
    .result-card.ng   .result-value { color: var(--text); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; margin: 1rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: background 0.15s;
    }
    .btn-copy:hover { background: #c56a00; }
    .btn-copy.copied { background: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 生成履歴 ── */
    .history-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      display: none;
    }
    .history-item {
      padding: 0.7rem 0.6rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--accent-light); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy, .history-card { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🎨 ドット絵AIプロンプト生成メーカー</h1>
    <p class="subtitle">顔の特徴を入力するだけで、AI用のドット絵アイコンプロンプトがパッと生成。推しキャラもアイコンも自由自在です。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">顔の特徴を入力</p>
    <div class="field">
      <label for="hairColor">髪色</label>
      <input type="text" id="hairColor" placeholder="例：黒、赤、金髪">
      <p class="hint">髪の色やスタイルを入力</p>
    </div>
    <div class="field">
      <label for="faceShape">顔型</label>
      <select id="faceShape">
        <option value="">選択してください</option>
        <option value="丸顔">丸顔</option>
        <option value="面長">面長</option>
        <option value="菱顔">菱顔</option>
        <option value="四角顔">四角顔</option>
      </select>
    </div>
    <div class="field">
      <label for="eyeColor">目の色</label>
      <input type="text" id="eyeColor" placeholder="例：青、紫、キャラ的な目">
      <p class="hint">瞳の色や特徴</p>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="">選択してください</option>
        <option value="笑顔">笑顔</option>
        <option value="真顔">真顔</option>
        <option value="困り顔">困り顔</option>
        <option value="怒り顔">怒り顔</option>
        <option value="照れ顔">照れ顔</option>
      </select>
    </div>
    <div class="field">
      <label for="clothing">衣装・特徴</label>
      <input type="text" id="clothing" placeholder="例：セーラー服、学ラン、推しの衣装">
      <p class="hint">キャラクターの衣装や目立つ特徴</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">🎨 プロンプト生成</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <p class="result-value" id="rv">—</p>
    <button class="btn-copy no-print" onclick="copyPrompt()">📋 プロンプトをコピー</button>
  </div>

  <!-- 広告枠（将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 生成履歴 -->
  <div class="history-card" id="historyCard">
    <p class="card-title">生成履歴</p>
    <div id="historyList"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── ドット絵プロンプト生成ロジック ──
  function generatePrompt() {
    var hairColor = document.getElementById('hairColor').value.trim();
    var faceShape = document.getElementById('faceShape').value.trim();
    var eyeColor = document.getElementById('eyeColor').value.trim();
    var expression = document.getElementById('expression').value.trim();
    var clothing = document.getElementById('clothing').value.trim();

    // バリデーション
    if (!hairColor && !faceShape && !eyeColor && !expression && !clothing) {
      showErr('⚠️ 少なくとも1つの特徴を入力してください');
      return;
    }

    // プロンプト生成
    var prompts = [];
    if (hairColor) prompts.push(hairColor + 'の髪');
    if (faceShape) prompts.push(faceShape);
    if (eyeColor) prompts.push(eyeColor + 'の瞳');
    if (expression) prompts.push(expression);
    if (clothing) prompts.push(clothing);

    var prompt = 'ドット絵、16bit pixel art style、' + prompts.join('、') + 'のSNSアイコン、かわいい、シンプル、transparent background、正面向き';

    showResult(prompt);
    saveToHistory(prompt);
  }

  function showResult(prompt) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = prompt;
    document.getElementById('rv').dataset.text = prompt;
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = msg;
  }

  function copyPrompt() {
    var text = document.getElementById('rv').dataset.text || document.getElementById('rv').textContent;
    if (!text || text === '—') return;
    navigator.clipboard.writeText(text).then(function() {
      var btn = event.target;
      var orig = btn.textContent;
      btn.textContent = '✓ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── 履歴管理（localStorage） ──
  function saveToHistory(prompt) {
    var history = JSON.parse(localStorage.getItem('dotPaintHistory') || '[]');
    history.unshift({ text: prompt, time: new Date().toLocaleString('ja-JP') });
    if (history.length > 20) history.pop();
    localStorage.setItem('dotPaintHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem('dotPaintHistory') || '[]');
    if (history.length === 0) {
      document.getElementById('historyCard').style.display = 'none';
      return;
    }

    var html = history.map(function(item, idx) {
      return '<div class="history-item" onclick="useHistory(' + idx + ')" title="' + item.text + '">'
           + '<strong>' + item.time + '</strong><br>'
           + item.text.substring(0, 50) + (item.text.length > 50 ? '...' : '')
           + '</div>';
    }).join('');

    document.getElementById('historyList').innerHTML = html;
    document.getElementById('historyCard').style.display = 'block';
  }

  function useHistory(idx) {
    var history = JSON.parse(localStorage.getItem('dotPaintHistory') || '[]');
    if (history[idx]) {
      document.getElementById('rv').textContent = history[idx].text;
      document.getElementById('rv').dataset.text = history[idx].text;
      var rc = document.getElementById('result');
      rc.className = 'result-card ok';
      rc.style.display = 'block';
      window.scrollTo(0, document.getElementById('result').offsetTop - 100);
    }
  }

  // ── 初期化 ──
  window.addEventListener('load', function() {
    renderHistory();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
