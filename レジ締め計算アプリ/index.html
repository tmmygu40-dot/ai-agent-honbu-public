<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レジ締め計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>レジ締め計算</h1>

    <section class="section">
      <h2>基準金額（売上目標・前日在高）</h2>
      <div class="base-input">
        <input type="number" id="baseAmount" min="0" placeholder="0" inputmode="numeric">
        <span class="unit">円</span>
      </div>
    </section>

    <section class="section">
      <h2>金種入力</h2>
      <table class="denomination-table">
        <thead>
          <tr>
            <th>金種</th>
            <th>枚数</th>
            <th>小計</th>
          </tr>
        </thead>
        <tbody id="denominationBody">
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="2">合計</td>
            <td id="totalAmount">0 円</td>
          </tr>
        </tfoot>
      </table>
    </section>

    <section class="section result-section">
      <h2>過不足</h2>
      <div class="result-box" id="resultBox">
        <span id="diffLabel">-</span>
        <span id="diffAmount" class="diff-amount">0 円</span>
      </div>
    </section>

    <div class="actions">
      <button class="btn-reset" id="resetBtn">クリア</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
