<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意思決定マトリックス</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>意思決定マトリックス</h1>
    <p class="subtitle">選択肢を評価軸で点数化して比較しよう</p>

    <div class="controls">
      <div class="control-group">
        <input type="text" id="optionInput" placeholder="選択肢を入力（例：転職する）" maxlength="30">
        <button onclick="addOption()">選択肢を追加</button>
      </div>
      <div class="control-group">
        <input type="text" id="criteriaInput" placeholder="評価軸を入力（例：給与）" maxlength="20">
        <button onclick="addCriteria()">評価軸を追加</button>
      </div>
    </div>

    <div id="matrixWrapper">
      <div id="emptyMessage" class="empty-message">
        選択肢と評価軸を追加してください
      </div>
      <div class="table-scroll" id="tableScroll" style="display:none">
        <table id="matrixTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
          <tfoot id="tableFoot"></tfoot>
        </table>
      </div>
    </div>

    <div class="actions">
      <button class="btn-secondary" onclick="clearAll()">リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
