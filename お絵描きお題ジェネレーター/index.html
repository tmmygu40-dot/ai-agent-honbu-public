<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お絵描きお題ジェネレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🎨 お絵描きお題ジェネレーター</h1>
    <p class="subtitle">何を描くか迷ったらここでお題を引こう</p>

    <div class="category-section">
      <label for="category">カテゴリを選ぶ</label>
      <select id="category">
        <option value="all">🎲 全部から選ぶ</option>
        <option value="people">👤 人物</option>
        <option value="animal">🐾 動物</option>
        <option value="landscape">🌄 風景</option>
        <option value="object">🪴 物・小物</option>
        <option value="fantasy">🐉 ファンタジー</option>
      </select>
    </div>

    <div class="result-section">
      <div id="topic-display" class="topic-display">
        <span id="topic-text">ボタンを押してお題を引こう</span>
      </div>
      <div class="buttons">
        <button id="generate-btn" class="btn-primary">お題を引く ✨</button>
        <button id="favorite-btn" class="btn-secondary" disabled>お気に入りに追加 ♡</button>
      </div>
    </div>

    <div class="favorites-section">
      <h2>♡ お気に入りのお題 <span id="fav-count">0</span>件</h2>
      <div id="favorites-list" class="favorites-list">
        <p class="empty-msg">まだお気に入りはありません</p>
      </div>
      <button id="clear-favorites-btn" class="btn-danger" style="display:none">お気に入りを全部消す</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
