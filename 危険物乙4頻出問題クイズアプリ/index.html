<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="危険物取扱者乙種第4類の頻出問題を出題範囲別に4択クイズで学習。法令・物理化学・性質消火の3分野から出題し、正解率と解説で合格力を即チェックできます。">
  <title>危険物乙4頻出問題クイズアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── クイズ専用スタイル ── */
    .quiz-progress {
      max-width: 600px; margin: 0 auto 0.8rem;
      font-size: 0.82rem; color: var(--text-sub); text-align: center;
    }
    .quiz-progress-bar {
      max-width: 600px; margin: 0 auto 1rem;
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s;
    }
    .quiz-question {
      font-size: 1rem; font-weight: 700; line-height: 1.6;
      margin-bottom: 1.2rem;
    }
    .quiz-choices { list-style: none; }
    .quiz-choices li {
      padding: 0.85rem 1rem; margin-bottom: 0.6rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--card); cursor: pointer;
      font-size: 0.95rem; line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }
    .quiz-choices li:hover { border-color: var(--accent); background: var(--accent-light); }
    .quiz-choices li.correct { border-color: var(--ok); background: var(--ok-bg); font-weight: 700; }
    .quiz-choices li.wrong { border-color: var(--ng); background: var(--ng-bg); opacity: 0.8; }
    .quiz-choices li.disabled { pointer-events: none; }
    .quiz-explain {
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-radius: 10px;
      font-size: 0.88rem; line-height: 1.6; color: var(--text);
      display: none;
    }
    .quiz-explain .explain-label { font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .quiz-next {
      display: none; margin-top: 1rem;
      padding: 0.8rem; width: 100%;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .quiz-next:active { opacity: 0.85; }
    #screen-setup, #screen-quiz, #screen-result { max-width: 600px; margin: 0 auto; }
    #screen-quiz, #screen-result { display: none; }
    .history-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .history-item:last-child { border-bottom: none; }
    .btn-secondary {
      display: block; width: 100%; max-width: 600px;
      margin: 0.5rem auto; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
    }
    .btn-secondary:active { opacity: 0.8; }
    .category-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .category-badge {
      font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.6rem;
      border-radius: 6px; background: var(--accent-light); color: var(--accent);
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>危険物乙4 頻出問題クイズ</h1>
    <p class="subtitle">出題範囲を選んで合格力をチェック！頻出45問から即練習</p>
  </header>

  <!-- ===== 設定画面 ===== -->
  <div id="screen-setup">
    <div class="card">
      <p class="card-title">出題設定</p>
      <div class="field">
        <label for="sel-category">出題範囲</label>
        <select id="sel-category">
          <option value="all">全範囲（法令＋物理化学＋性質消火）</option>
          <option value="law">法令（15問）</option>
          <option value="physics">物理化学（15問）</option>
          <option value="property">性質消火（15問）</option>
        </select>
      </div>
      <div class="field">
        <label for="sel-count">出題数</label>
        <select id="sel-count">
          <option value="10">10問</option>
          <option value="20">20問</option>
          <option value="0">全問</option>
        </select>
      </div>
    </div>

    <button class="btn-calc" onclick="startQuiz()">クイズスタート</button>

    <div class="ad-slot" aria-label="広告枠">広告枠</div>

    <div class="card" id="history-card" style="display:none">
      <p class="card-title">過去の成績</p>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- ===== クイズ画面 ===== -->
  <div id="screen-quiz">
    <div class="quiz-progress" id="progress-text"></div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill"></div></div>
    <div class="card">
      <div class="category-badges" id="q-category"></div>
      <p class="quiz-question" id="q-text"></p>
      <ul class="quiz-choices" id="q-choices"></ul>
      <div class="quiz-explain" id="q-explain">
        <p class="explain-label">解説</p>
        <p id="q-explain-text"></p>
      </div>
      <button class="quiz-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="screen-result">
    <div class="result-card" id="result">
      <p class="result-label">最終結果</p>
      <p class="result-value" id="rv">—</p>
      <p class="result-note" id="rn"></p>
    </div>

    <div class="card" id="detail">
      <p class="card-title">分野別成績</p>
      <table class="detail-table"><tbody id="db"></tbody></table>
    </div>

    <button class="btn-calc" onclick="retryWrong()">間違えた問題だけ再挑戦</button>
    <button class="btn-secondary" onclick="backToSetup()">設定に戻る</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは危険物取扱者乙種第4類試験の頻出テーマを参考に作成した練習用です。最新の出題傾向や法改正は消防試験研究センターの公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ========================================
     危険物乙4 頻出問題データ
     ======================================== */
  var QUESTIONS = [
    // ── 法令（law）15問 ──
    {cat:'law', q:'危険物取扱者免状の書換えを行う事由として正しいものはどれか。',
     c:['本籍地の都道府県が変わったとき','勤務先が変わったとき','危険物の取扱い作業に従事しなくなったとき','免状を紛失したとき'],
     a:0, ex:'本籍地の属する都道府県が変わったときは書換え申請が必要です。紛失は再交付です。'},
    {cat:'law', q:'指定数量の倍数が15の製造所に必要な保安距離として正しいものはどれか。',
     c:['住居に対して10m以上','学校に対して20m以上','重要文化財に対して50m以上','病院に対して20m以上'],
     a:2, ex:'重要文化財に対する保安距離は50m以上です。住居10m、学校・病院30mが基本です。'},
    {cat:'law', q:'第4類危険物の指定数量の組合せとして正しいものはどれか。',
     c:['特殊引火物：50L','ガソリン：200L','灯油：500L','重油：2000L'],
     a:1, ex:'ガソリン（第一石油類・非水溶性）の指定数量は200Lです。特殊引火物50L、灯油1000L、重油2000Lです。'},
    {cat:'law', q:'危険物保安監督者を定めなくてもよい施設はどれか。',
     c:['製造所','屋内貯蔵所','移動タンク貯蔵所','給油取扱所'],
     a:2, ex:'移動タンク貯蔵所は危険物保安監督者の選任が不要です。'},
    {cat:'law', q:'危険物取扱者免状の返納命令を出すことができるのは誰か。',
     c:['市町村長','消防長','都道府県知事','総務大臣'],
     a:2, ex:'免状の返納命令は都道府県知事が行います。'},
    {cat:'law', q:'製造所等の位置・構造・設備を変更する場合に必要な手続きはどれか。',
     c:['届出','許可','認可','承認'],
     a:1, ex:'製造所等の変更は市町村長等の許可が必要です（変更許可申請）。'},
    {cat:'law', q:'予防規程を定めなければならないのは次のうちどれか。',
     c:['指定数量の倍数が10以上の製造所','すべての屋外タンク貯蔵所','指定数量の倍数が100以上の屋内貯蔵所','すべての給油取扱所'],
     a:3, ex:'給油取扱所はすべて予防規程を定める必要があります。'},
    {cat:'law', q:'危険物の運搬に関する基準として正しいものはどれか。',
     c:['運搬容器は収納口を横にしてもよい','指定数量未満でも運搬の基準は適用される','運搬中は免状の携帯は不要である','運搬容器の外部に表示は不要である'],
     a:1, ex:'運搬の基準は指定数量未満であっても適用されます。'},
    {cat:'law', q:'定期点検を行わなければならない施設はどれか。',
     c:['指定数量の倍数が10以上の製造所','すべての屋内貯蔵所','地下タンクを有する給油取扱所','すべての簡易タンク貯蔵所'],
     a:2, ex:'地下タンクを有する施設は定期点検が義務付けられています。'},
    {cat:'law', q:'仮使用の承認を行うのは誰か。',
     c:['消防長または消防署長','市町村長等','都道府県知事','総務大臣'],
     a:0, ex:'仮使用の承認は消防長または消防署長が行います。'},
    {cat:'law', q:'危険物施設保安員を定めなければならないのはどれか。',
     c:['指定数量の倍数が50以上の製造所','すべての一般取扱所','指定数量の倍数が100以上の製造所','すべての屋外タンク貯蔵所'],
     a:2, ex:'指定数量の倍数が100以上の製造所は危険物施設保安員の選任が必要です。'},
    {cat:'law', q:'第4類危険物を貯蔵する屋内貯蔵所の構造として正しいものはどれか。',
     c:['窓は防火設備でなくてよい','床は地盤面以上とする','天井を設けなければならない','2階建てとすることができる'],
     a:1, ex:'屋内貯蔵所の床は地盤面以上とし、適当な傾斜とためますを設けます。天井は設けません。'},
    {cat:'law', q:'移送取扱所とは何を指すか。',
     c:['タンクローリーで危険物を運ぶ施設','配管で危険物を送る施設','ドラム缶で危険物を移す施設','船舶で危険物を移す施設'],
     a:1, ex:'移送取扱所はパイプラインなど配管によって危険物を移送する施設です。'},
    {cat:'law', q:'仮貯蔵・仮取扱いの期間として正しいものはどれか。',
     c:['7日以内','10日以内','15日以内','30日以内'],
     a:1, ex:'仮貯蔵・仮取扱いは10日以内で、消防長又は消防署長の承認が必要です。'},
    {cat:'law', q:'危険物取扱者の保安講習の受講期限として正しいものはどれか。',
     c:['免状取得後1年以内、以降3年ごと','免状取得後2年以内、以降5年ごと','従事開始から1年以内、以降3年ごと','従事開始から2年以内、以降5年ごと'],
     a:2, ex:'危険物の取扱い作業に従事する者は、従事開始から1年以内に受講し、以後3年ごとに受講が必要です。'},

    // ── 物理化学（physics）15問 ──
    {cat:'physics', q:'燃焼の三要素に含まれないものはどれか。',
     c:['可燃物','酸素供給体','点火源','水分'],
     a:3, ex:'燃焼の三要素は可燃物・酸素供給体・点火源です。水分は含まれません。'},
    {cat:'physics', q:'引火点の説明として正しいものはどれか。',
     c:['可燃性液体が自然に発火する温度','可燃性蒸気に点火源を近づけたとき燃え始める最低温度','燃焼が継続する最低温度','爆発が起こる最低温度'],
     a:1, ex:'引火点は可燃性液体の蒸気が点火源により引火する最低の液温です。'},
    {cat:'physics', q:'自然発火の原因として誤っているものはどれか。',
     c:['酸化熱の蓄積','分解熱の蓄積','吸着熱の蓄積','気化熱の蓄積'],
     a:3, ex:'気化熱は温度を下げる方向に働くため、自然発火の原因にはなりません。'},
    {cat:'physics', q:'静電気に関する記述として正しいものはどれか。',
     c:['湿度が高いほど静電気は発生しやすい','流速が速いほど静電気は発生しやすい','金属は静電気を蓄積しやすい','接地（アース）は静電気対策にならない'],
     a:1, ex:'流速が速いほど摩擦による静電気が発生しやすくなります。湿度が高いと放電しやすく蓄積しにくいです。'},
    {cat:'physics', q:'消火方法のうち「窒息消火」に該当するものはどれか。',
     c:['水をかけて温度を下げる','泡で可燃物を覆う','可燃物を取り除く','ハロゲン化物で燃焼反応を抑える'],
     a:1, ex:'泡で覆うことにより酸素の供給を遮断するのが窒息消火です。'},
    {cat:'physics', q:'比重が1より小さい液体の性質として正しいものはどれか。',
     c:['水に沈む','水に浮く','水と同じ高さになる','水に溶ける'],
     a:1, ex:'比重が1より小さい液体は水より軽いため水に浮きます。第4類危険物の多くが該当します。'},
    {cat:'physics', q:'蒸気比重が1より大きい場合の性質として正しいものはどれか。',
     c:['空気より軽く上方に滞留する','空気より重く低所に滞留する','空気と同じ重さで拡散する','蒸気は発生しない'],

  var CAT_NAMES = {law:'法令', physics:'物理化学', property:'性質消火'};

  /* ── 状態管理 ── */
  var quiz = { questions:[], current:0, score:0, answers:[], wrongIds:[] };

  /* ── クイズ開始 ── */
  function startQuiz() {
    var cat = document.getElementById('sel-category').value;
    var count = parseInt(document.getElementById('sel-count').value);
    var pool = cat === 'all' ? QUESTIONS.slice() : QUESTIONS.filter(function(q){ return q.cat === cat; });
    shuffle(pool);
    if (count > 0 && count < pool.length) pool = pool.slice(0, count);
    quiz = { questions: pool, current: 0, score: 0, answers: [], wrongIds: [] };
    showScreen('quiz');
    renderQuestion();
  }

  /* ── 問題表示 ── */
  function renderQuestion() {
    var q = quiz.questions[quiz.current];
    var total = quiz.questions.length;
    document.getElementById('progress-text').textContent = (quiz.current + 1) + ' / ' + total + ' 問';
    document.getElementById('progress-fill').style.width = ((quiz.current + 1) / total * 100) + '%';
    document.getElementById('q-category').innerHTML = '<span class="category-badge">' + CAT_NAMES[q.cat] + '</span>';
    document.getElementById('q-text').textContent = 'Q' + (quiz.current + 1) + '. ' + q.q;

    var ul = document.getElementById('q-choices');
    ul.innerHTML = '';
    q.c.forEach(function(choice, i) {
      var li = document.createElement('li');
      li.textContent = choice;
      li.onclick = function(){ selectAnswer(i); };
      ul.appendChild(li);
    });
    document.getElementById('q-explain').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
  }

  /* ── 回答選択 ── */
  function selectAnswer(idx) {
    var q = quiz.questions[quiz.current];
    var lis = document.getElementById('q-choices').children;
    for (var i = 0; i < lis.length; i++) lis[i].classList.add('disabled');
    if (idx === q.a) {
      lis[idx].classList.add('correct');
      quiz.score++;
    } else {
      lis[idx].classList.add('wrong');
      lis[q.a].classList.add('correct');
      quiz.wrongIds.push(quiz.current);
    }
    quiz.answers.push({ qIdx: quiz.current, selected: idx, correct: q.a });
    document.getElementById('q-explain-text').textContent = q.ex;
    document.getElementById('q-explain').style.display = 'block';
    var btn = document.getElementById('btn-next');
    btn.textContent = quiz.current < quiz.questions.length - 1 ? '次の問題へ →' : '結果を見る →';
    btn.style.display = 'block';
  }

  /* ── 次の問題 ── */
  function nextQuestion() {
    quiz.current++;
    if (quiz.current >= quiz.questions.length) {
      showResultScreen();
    } else {
      renderQuestion();
    }
  }

  /* ── 結果表示 ── */
  function showResultScreen() {
    showScreen('result');
    var total = quiz.questions.length;
    var pct = Math.round(quiz.score / total * 100);
    var level = pct >= 80 ? 'ok' : pct >= 60 ? 'warn' : 'ng';
    var msg = level === 'ok' ? '合格ライン突破！この調子で本番も頑張ろう'
            : level === 'warn' ? 'あと少し！苦手分野を重点的に復習しよう'
            : 'まだ伸びしろたっぷり！基礎から復習しよう';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = quiz.score + ' / ' + total + '（' + pct + '%）';
    document.getElementById('rn').textContent = msg;

    // 分野別集計
    var cats = {};
    quiz.questions.forEach(function(q, i) {
      if (!cats[q.cat]) cats[q.cat] = { total: 0, correct: 0 };
      cats[q.cat].total++;
      if (quiz.answers[i] && quiz.answers[i].selected === q.a) cats[q.cat].correct++;
    });
    var rows = '';
    Object.keys(CAT_NAMES).forEach(function(k) {
      if (cats[k]) {
        var cpct = Math.round(cats[k].correct / cats[k].total * 100);
        rows += '<tr' + (cpct < 60 ? ' class="hl"' : '') + '><td>' + CAT_NAMES[k] + '</td><td>' + cats[k].correct + ' / ' + cats[k].total + '（' + cpct + '%）</td></tr>';
      }
    });
    document.getElementById('db').innerHTML = rows;

    // 間違えた問題がない場合はボタンを非表示
    var retryBtn = document.querySelector('#screen-result .btn-calc');
    retryBtn.style.display = quiz.wrongIds.length > 0 ? 'block' : 'none';

    saveHistory(pct, total, quiz.score);
  }

  /* ── 間違えた問題だけ再挑戦 ── */
  function retryWrong() {
    if (quiz.wrongIds.length === 0) return;
    var wrongQs = quiz.wrongIds.map(function(i){ return quiz.questions[i]; });
    shuffle(wrongQs);
    quiz = { questions: wrongQs, current: 0, score: 0, answers: [], wrongIds: [] };
    showScreen('quiz');
    renderQuestion();
  }

  /* ── 設定に戻る ── */
  function backToSetup() {
    showScreen('setup');
    loadHistory();
  }

  /* ── 画面切替 ── */
  function showScreen(name) {
    document.getElementById('screen-setup').style.display = name === 'setup' ? 'block' : 'none';
    document.getElementById('screen-quiz').style.display = name === 'quiz' ? 'block' : 'none';
    document.getElementById('screen-result').style.display = name === 'result' ? 'block' : 'none';
    window.scrollTo(0, 0);
  }

  /* ── localStorage 履歴 ── */
  function saveHistory(pct, total, score) {
    var hist = JSON.parse(localStorage.getItem('otsu4_history') || '[]');
    hist.unshift({ date: new Date().toLocaleString('ja-JP'), pct: pct, score: score, total: total });
    if (hist.length > 20) hist = hist.slice(0, 20);
    localStorage.setItem('otsu4_history', JSON.stringify(hist));
  }

  function loadHistory() {
    var hist = JSON.parse(localStorage.getItem('otsu4_history') || '[]');
    var card = document.getElementById('history-card');
    if (hist.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('history-list').innerHTML = hist.map(function(h) {
      return '<div class="history-item">' + h.date + '　' + h.score + '/' + h.total + '（' + h.pct + '%）</div>';
    }).join('');
  }

  /* ── ユーティリティ ── */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
  }

  // 初期化
  loadHistory();
  </script>
