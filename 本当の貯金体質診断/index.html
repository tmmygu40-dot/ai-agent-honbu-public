<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたの本当の貯金体質タイプ（コツコツ型・ふつう型・浪費型）が30秒で分かる無料診断アプリ。タイプ別の改善アドバイスもセットで表示します。">
  <title>本当の貯金体質診断｜5問YES/NOで分かる無料アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-item { padding: 0.9rem 0; border-bottom: 1px solid var(--border); }
    .q-item:last-child { border-bottom: none; }
    .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.5; }
    .q-choices { display: flex; gap: 0.6rem; }
    .q-choices label {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 0.4rem; padding: 0.7rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); font-weight: 700; font-size: 0.95rem;
      cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .q-choices label:hover { border-color: var(--accent); }
    .q-choices input[type="radio"] { display: none; }
    .q-choices input[type="radio"]:checked + .choice-yes {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng);
    }
    .q-choices input[type="radio"]:checked + .choice-no {
      background: var(--ok-bg); border-color: var(--ok); color: var(--ok);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text); line-height: 1.6; text-align: left; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .yes-mark { color: var(--ng); font-weight: 700; }
    .no-mark  { color: var(--ok); font-weight: 700; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>本当の貯金体質診断</h1>
    <p class="subtitle">5問のYES/NOで、あなたの貯金体質タイプを30秒で診断</p>
  </header>

  <div class="card">
    <p class="card-title">5問の質問</p>
    <div id="q-container"></div>
  </div>

  <button class="btn-calc" onclick="calc()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">回答内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、金融広報中央委員会・家計調査などの公開データや、家計管理に関する一般的な知見を参考に、目安として使いやすく整理しています。診断結果は娯楽目的で、個別の金融助言ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'chokin_taishitsu_v1';

  var QUESTIONS = [
    'お給料が入った日に、まず使う前に貯金分を別口座へ移している',
    'コンビニで「ついで買い」せず、必要なものだけ買って出ている',
    '月の固定費（サブスク・通信費）を、半年以内に1回は見直した',
    'クレジットカードの請求額を、毎月明細でチェックしている',
    'セールやポイント還元に釣られて「予定外の買い物」をしない'
  ];

  var TYPES = {
    ok: {
      name: '貯金体質タイプ（コツコツ強者）',
      note: '5問中4〜5問YESのあなたは、お金が自然に貯まる仕組みを身につけています。あとは年1回、固定費と保険を点検するだけで盤石。投資や繰上返済の検討フェーズに入ってOKです。'
    },
    warn: {
      name: 'ふつう体質タイプ（あと一歩）',
      note: '5問中2〜3問YES。基本はできていますが、1〜2項目に「もったいない出費」が潜んでいます。NOだった項目を1つだけ来週から始めてみると、月数千円〜1万円の改善が見込めます。'
    },
    ng: {
      name: '浪費体質タイプ（要見直し）',
      note: '5問中YESが0〜1問。今のままだと収入が増えてもお金は残りにくい状態です。まずは「給料日の自動振替」と「サブスク棚卸し」の2つから着手すると、3ヶ月で体質が変わります。'
    }
  };

  function renderQuestions() {
    var saved = loadAnswers();
    var html = QUESTIONS.map(function(q, i) {
      var checkedYes = saved[i] === 'yes' ? ' checked' : '';
      var checkedNo  = saved[i] === 'no'  ? ' checked' : '';
      return '<div class="q-item">' +
        '<p class="q-text">Q' + (i+1) + '. ' + q + '</p>' +
        '<div class="q-choices">' +
          '<label><input type="radio" name="q' + i + '" value="yes"' + checkedYes + '><span class="choice-yes">YES</span></label>' +
          '<label><input type="radio" name="q' + i + '" value="no"' + checkedNo + '><span class="choice-no">NO</span></label>' +
        '</div></div>';
    }).join('');
    document.getElementById('q-container').innerHTML = html;
  }

  function getAnswers() {
    var ans = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      ans.push(sel ? sel.value : null);
    }
    return ans;
  }

  function saveAnswers(ans) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ans)); } catch(e) {}
  }

  function loadAnswers() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : [];
    } catch(e) { return []; }
  }

  function calc() {
    var ans = getAnswers();
    var unanswered = ans.filter(function(a){ return a === null; }).length;
    if (unanswered > 0) {
      showErr(unanswered + '問が未回答です。すべて答えてください');
      return;
    }
    saveAnswers(ans);

    var yesCount = ans.filter(function(a){ return a === 'yes'; }).length;
    var level = yesCount >= 4 ? 'ok' : yesCount >= 2 ? 'warn' : 'ng';
    var t = TYPES[level];

    showResult(level, t.name, 'YES ' + yesCount + ' / 5問　' + t.note);

    var rows = [];
    rows.push(['YES数', yesCount + ' / 5問', true]);
    QUESTIONS.forEach(function(q, i) {
      var mark = ans[i] === 'yes'
        ? '<span class="yes-mark">YES</span>'
        : '<span class="no-mark">NO</span>';
      rows.push(['Q' + (i+1), mark]);
    });
    showDetail(rows);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }

  renderQuestions();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
