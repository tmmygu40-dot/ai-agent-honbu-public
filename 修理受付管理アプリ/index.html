<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修理受付管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>修理受付管理</h1>
    </header>

    <section class="form-section">
      <h2>新規受付登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品名</label>
          <input type="text" id="itemName" placeholder="例：ノートPC、スマートフォン">
        </div>
        <div class="form-group">
          <label for="receiveDate">受付日</label>
          <input type="date" id="receiveDate">
        </div>
        <div class="form-group full-width">
          <label for="symptom">症状・内容</label>
          <textarea id="symptom" rows="2" placeholder="例：電源が入らない、画面が割れている"></textarea>
        </div>
        <div class="form-group">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="受付中">受付中</option>
            <option value="修理中">修理中</option>
            <option value="完了">完了</option>
            <option value="引渡済">引渡済</option>
          </select>
        </div>
        <div class="form-group">
          <label for="customerName">お客様名</label>
          <input type="text" id="customerName" placeholder="例：山田 太郎">
        </div>
      </div>
      <button class="btn-primary" onclick="addItem()">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>案件一覧 <span id="countBadge" class="badge">0件</span></h2>
        <div class="filter-buttons">
          <button class="filter-btn active" onclick="setFilter('all')" id="filterAll">すべて</button>
          <button class="filter-btn" onclick="setFilter('active')" id="filterActive">未完了のみ</button>
        </div>
      </div>
      <div id="itemList" class="item-list">
        <p class="empty-msg">登録された案件はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
