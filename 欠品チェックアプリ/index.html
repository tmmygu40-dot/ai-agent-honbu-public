<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欠品チェックアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>欠品チェックアプリ</h1>

    <section class="input-section">
      <h2>欠品を記録する</h2>
      <div class="form-group">
        <label for="productName">商品名 <span class="required">*</span></label>
        <input type="text" id="productName" placeholder="例：牛乳200ml" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="shelfNumber">棚番号</label>
        <input type="text" id="shelfNumber" placeholder="例：A-3" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="quantity">数量</label>
        <input type="text" id="quantity" placeholder="例：3個" autocomplete="off">
      </div>
      <button id="addBtn" class="btn btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>欠品リスト <span id="count" class="count-badge">0</span></h2>
        <button id="clearAllBtn" class="btn btn-danger" style="display:none">全件削除</button>
      </div>
      <div id="emptyMessage" class="empty-message">欠品はまだ記録されていません</div>
      <ul id="itemList"></ul>
    </section>

    <section id="actionSection" class="action-section" style="display:none">
      <button id="copyBtn" class="btn btn-secondary">補充リストをコピー</button>
      <button id="printBtn" class="btn btn-secondary">印刷する</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
