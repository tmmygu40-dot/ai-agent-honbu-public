<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハンドメイド原価計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧵 ハンドメイド原価計算</h1>
      <p class="subtitle">材料費と制作時間から適正販売価格を計算</p>
    </header>

    <section class="calc-section">
      <h2>計算入力</h2>
      <div class="form-group">
        <label for="itemName">作品名</label>
        <input type="text" id="itemName" placeholder="例：レザーポーチ">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="materialCost">材料費（円）</label>
          <input type="number" id="materialCost" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="workHours">制作時間（分）</label>
          <input type="number" id="workHours" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="hourlyWage">時給（円）</label>
          <input type="number" id="hourlyWage" value="1000" min="0">
        </div>
        <div class="form-group">
          <label for="profitRate">利益率（%）</label>
          <input type="number" id="profitRate" value="100" min="0">
        </div>
      </div>
      <button class="btn-calc" onclick="calculate()">計算する</button>

      <div class="result" id="result" style="display:none;">
        <div class="result-grid">
          <div class="result-item">
            <span class="result-label">人件費</span>
            <span class="result-value" id="laborCost">-</span>
          </div>
          <div class="result-item">
            <span class="result-label">原価合計</span>
            <span class="result-value" id="totalCost">-</span>
          </div>
          <div class="result-item highlight">
            <span class="result-label">適正販売価格</span>
            <span class="result-value" id="sellingPrice">-</span>
          </div>
          <div class="result-item">
            <span class="result-label">利益額</span>
            <span class="result-value" id="profit">-</span>
          </div>
        </div>
        <button class="btn-save" onclick="saveRecord()">履歴に保存</button>
      </div>
    </section>

    <section class="history-section">
      <h2>計算履歴 <span class="count" id="historyCount">0件</span></h2>
      <div id="historyList" class="history-list">
        <p class="empty-msg">まだ履歴がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
