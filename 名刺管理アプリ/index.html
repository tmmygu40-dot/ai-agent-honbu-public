<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名刺管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>名刺管理</h1>

    <section class="form-section">
      <h2>名刺を登録</h2>
      <form id="cardForm">
        <div class="form-group">
          <label for="company">会社名</label>
          <input type="text" id="company" placeholder="例：株式会社〇〇" required>
        </div>
        <div class="form-group">
          <label for="name">氏名</label>
          <input type="text" id="name" placeholder="例：山田 太郎" required>
        </div>
        <div class="form-group">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" placeholder="例：090-1234-5678">
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：展示会で名刺交換">
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>名刺一覧 <span id="count">0</span>件</h2>
        <input type="text" id="searchInput" placeholder="検索（会社・氏名・電話番号）">
      </div>
      <div id="cardList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
