<!DOCTYPE html>

<head>

  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .task-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .task-btn {
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem; font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .task-btn.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }
    .task-hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.4rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 結論カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }

    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.4rem; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* リスクバー */
    .risk-bar-wrap {
      margin: 1rem 0 0.5rem;
      background: #f0e8d8; border-radius: 99px;
      height: 14px; position: relative; overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.6s ease;
    }
    .risk-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 0.65rem; color: var(--text-sub); margin-top: 0.3rem;
    }

    /* スキルリスト */
    .skill-list { list-style: none; margin-top: 0.6rem; }
    .skill-list li {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.55rem 0.3rem; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; color: var(--text); line-height: 1.5;
    }
    .skill-list li:last-child { border-bottom: none; }
    .skill-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

    /* 内訳テーブル */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:first-child { width: 40%; }
    .detail-table td:last-child { font-weight: 600; color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>

  // =============================================
  // UI 制御
  // =============================================
  var selectedTasks = {};

  function init() {
    var sel = document.getElementById('jobSelect');
    JOBS.forEach(function(j) {
      var opt = document.createElement('option');
      opt.value = j.id; opt.textContent = j.name;
      sel.appendChild(opt);
    });
    loadStorage();
  }

  function updateTasks() {
    var jobId = document.getElementById('jobSelect').value;
    selectedTasks = {};
    var taskCard = document.getElementById('taskCard');
    var grid = document.getElementById('taskGrid');
    grid.innerHTML = '';

    if (!jobId) { taskCard.style.display = 'none'; updateBtn(); return; }

    var job = JOBS.find(function(j){ return j.id === jobId; });
    if (!job) { taskCard.style.display = 'none'; updateBtn(); return; }

    job.tasks.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'task-btn';
      btn.textContent = t.name;
      btn.dataset.id = t.id;
      btn.onclick = function() {
        if (selectedTasks[t.id]) {
          delete selectedTasks[t.id];
          btn.classList.remove('selected');
        } else {
          selectedTasks[t.id] = t;
          btn.classList.add('selected');
        }
        updateBtn();
      };
      grid.appendChild(btn);
    });

    taskCard.style.display = '';
    updateBtn();
  }

  function updateBtn() {
    var jobId = document.getElementById('jobSelect').value;
    var hasTask = Object.keys(selectedTasks).length > 0;
    document.getElementById('diagBtn').disabled = !(jobId && hasTask);
  }

  function diagnose() {
    var tasks = Object.values(selectedTasks);
    if (tasks.length === 0) return;

    var avg = tasks.reduce(function(s, t){ return s + t.risk; }, 0) / tasks.length;
    var levelIdx = Math.min(4, Math.max(0, Math.round(avg) - 1));
    var cfg = RISK_CONFIG[levelIdx];

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + cfg.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = cfg.label;
    document.getElementById('re').textContent = cfg.eval;
    document.getElementById('rn').textContent = cfg.note;

    var bar = document.getElementById('riskBar');
    bar.style.background = cfg.color;
    bar.style.width = '0%';
    setTimeout(function(){ bar.style.width = cfg.pct + '%'; }, 50);

    // スキル提案
    var skills = SKILLS_BY_LEVEL[levelIdx];
    var ul = document.getElementById('skillList');
    ul.innerHTML = skills.map(function(s){
      return '<li><span class="skill-icon">' + s.icon + '</span><span>' + s.text + '</span></li>';
    }).join('');
    document.getElementById('skillCard').style.display = '';

    // 内訳
    var jobId = document.getElementById('jobSelect').value;
    var job = JOBS.find(function(j){ return j.id === jobId; });
    var rows = tasks.map(function(t){
      var r = RISK_CONFIG[Math.min(4, t.risk - 1)];
      return '<tr><td>' + t.name + '</td><td>' + r.label + '（' + t.risk + '/5）</td></tr>';
    });
    rows.push('<tr style="border-top:2px solid var(--border)"><td><strong>平均スコア</strong></td><td><strong>' + avg.toFixed(1) + ' / 5.0</strong></td></tr>');
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = '';

    saveStorage(jobId, Object.keys(selectedTasks));
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function saveStorage(jobId, taskIds) {
    try {
      localStorage.setItem('ai_risk_job', jobId);
      localStorage.setItem('ai_risk_tasks', JSON.stringify(taskIds));
    } catch(e) {}
  }

  function loadStorage() {
    try {
      var jobId = localStorage.getItem('ai_risk_job');
      var taskIds = JSON.parse(localStorage.getItem('ai_risk_tasks') || '[]');
      if (!jobId) return;
      var sel = document.getElementById('jobSelect');
      sel.value = jobId;
      updateTasks();
      setTimeout(function() {
        taskIds.forEach(function(tid) {
          var btns = document.querySelectorAll('.task-btn');
          btns.forEach(function(btn) {
            if (btn.dataset.id === tid) btn.click();
          });
        });
      }, 50);
    } catch(e) {}
  }

  init();
  </script>
