<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>備蓄日数チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>備蓄日数チェッカー</h1>
      <p class="subtitle">品目ごとにあと何日分あるか確認できます</p>
    </header>

    <section class="form-section">
      <h2>品目を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：米" maxlength="30">
        </div>
        <div class="form-group">
          <label for="itemUnit">単位</label>
          <input type="text" id="itemUnit" placeholder="例：合" maxlength="10">
        </div>
        <div class="form-group">
          <label for="stockQty">備蓄数量</label>
          <input type="number" id="stockQty" placeholder="例：30" min="0" step="any">
        </div>
        <div class="form-group">
          <label for="dailyUse">1日の消費量</label>
          <input type="number" id="dailyUse" placeholder="例：3" min="0.01" step="any">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
      <p id="errorMsg" class="error-msg" aria-live="polite"></p>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>備蓄一覧</h2>
        <span id="itemCount" class="item-count"></span>
      </div>
      <div id="emptyState" class="empty-state">品目がまだ登録されていません</div>
      <ul id="itemList" class="item-list"></ul>
    </section>

    <section class="legend">
      <div class="legend-item"><span class="badge danger">●</span> 残り7日以下（要補充）</div>
      <div class="legend-item"><span class="badge warning">●</span> 残り15日以下（補充検討）</div>
      <div class="legend-item"><span class="badge safe">●</span> 十分な備蓄</div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
