<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美容カルテ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💇 美容カルテ</h1>
    </header>

    <!-- 顧客検索・追加 -->
    <section class="search-section">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="顧客名で検索..." oninput="renderCustomerList()">
      </div>
      <button class="btn-primary" onclick="showAddCustomerForm()">＋ 新規顧客登録</button>
    </section>

    <!-- 顧客追加フォーム -->
    <div id="addCustomerForm" class="form-card hidden">
      <h2>新規顧客登録</h2>
      <div class="form-group">
        <label>顧客名 <span class="required">*</span></label>
        <input type="text" id="newCustomerName" placeholder="例：田中 花子">
      </div>
      <div class="form-group">
        <label>メモ（アレルギー・特記事項など）</label>
        <textarea id="newCustomerMemo" placeholder="例：パーマ液アレルギーあり" rows="3"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addCustomer()">登録</button>
        <button class="btn-secondary" onclick="hideAddCustomerForm()">キャンセル</button>
      </div>
    </div>

    <!-- 顧客一覧 -->
    <section id="customerList" class="customer-list">
      <!-- JS で生成 -->
    </section>

    <!-- 施術記録詳細パネル -->
    <div id="detailPanel" class="detail-panel hidden">
      <div class="detail-header">
        <h2 id="detailCustomerName"></h2>
        <div class="detail-header-actions">
          <button class="btn-small btn-primary" onclick="showAddRecordForm()">＋ 施術記録を追加</button>
          <button class="btn-small btn-danger" onclick="deleteCustomer()">顧客削除</button>
          <button class="btn-small btn-secondary" onclick="closeDetailPanel()">✕ 閉じる</button>
        </div>
      </div>

      <div id="customerMemoDisplay" class="customer-memo"></div>

      <!-- 施術記録追加フォーム -->
      <div id="addRecordForm" class="form-card hidden">
        <h3>施術記録を追加</h3>
        <div class="form-group">
          <label>来店日 <span class="required">*</span></label>
          <input type="date" id="recordDate">
        </div>
        <div class="form-group">
          <label>施術内容 <span class="required">*</span></label>
          <input type="text" id="recordService" placeholder="例：カット・カラー・パーマ">
        </div>
        <div class="form-group">
          <label>カラーレシピ</label>
          <textarea id="recordColorRecipe" placeholder="例：アッシュ7 + ベージュ3 / 6vol 30分" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>担当者メモ</label>
          <textarea id="recordNote" placeholder="例：毛量多め・根元2cm伸び" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="addRecord()">保存</button>
          <button class="btn-secondary" onclick="hideAddRecordForm()">キャンセル</button>
        </div>
      </div>

      <!-- 施術履歴一覧 -->
      <div id="recordList" class="record-list">
        <!-- JS で生成 -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
