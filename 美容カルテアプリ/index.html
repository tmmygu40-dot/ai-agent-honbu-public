<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美容カルテ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%BE%8E%E5%AE%B9%E3%82%AB%E3%83%AB%E3%83%86%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="美容カルテ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"美容カルテ","description":"美容カルテ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E7%BE%8E%E5%AE%B9%E3%82%AB%E3%83%AB%E3%83%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💇 美容カルテ</h1>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
    </header>

    <!-- 顧客検索・追加 -->
    <section class="search-section">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="顧客名で検索..." oninput="renderCustomerList()">
      </div>
      <button class="btn-primary" onclick="showAddCustomerForm()">＋ 新規顧客登録</button>
    </section>

    <!-- 顧客追加フォーム -->
    <div id="addCustomerForm" class="form-card hidden">
      <h2>新規顧客登録</h2>
      <div class="form-group">
        <label>顧客名 <span class="required">*</span></label>
        <input type="text" id="newCustomerName" placeholder="例：田中 花子">
      </div>
      <div class="form-group">
        <label>メモ（アレルギー・特記事項など）</label>
        <textarea id="newCustomerMemo" placeholder="例：パーマ液アレルギーあり" rows="3"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addCustomer()">登録</button>
        <button class="btn-secondary" onclick="hideAddCustomerForm()">キャンセル</button>
      </div>
    </div>

    <!-- 顧客一覧 -->
    <section id="customerList" class="customer-list">
      <!-- JS で生成 -->
    </section>

    <!-- 施術記録詳細パネル -->
    <div id="detailPanel" class="detail-panel hidden">
      <div class="detail-header">
        <h2 id="detailCustomerName"></h2>
        <div class="detail-header-actions">
          <button class="btn-small btn-primary" onclick="showAddRecordForm()">＋ 施術記録を追加</button>
          <button class="btn-small btn-danger" onclick="deleteCustomer()">顧客削除</button>
          <button class="btn-small btn-secondary" onclick="closeDetailPanel()">✕ 閉じる</button>
        </div>
      </div>

      <div id="customerMemoDisplay" class="customer-memo"></div>

      <!-- 施術記録追加フォーム -->
      <div id="addRecordForm" class="form-card hidden">
        <h3>施術記録を追加</h3>
        <div class="form-group">
          <label>来店日 <span class="required">*</span></label>
          <input type="date" id="recordDate">
        </div>
        <div class="form-group">
          <label>施術内容 <span class="required">*</span></label>
          <input type="text" id="recordService" placeholder="例：カット・カラー・パーマ">
        </div>
        <div class="form-group">
          <label>カラーレシピ</label>
          <textarea id="recordColorRecipe" placeholder="例：アッシュ7 + ベージュ3 / 6vol 30分" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>担当者メモ</label>
          <textarea id="recordNote" placeholder="例：毛量多め・根元2cm伸び" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="addRecord()">保存</button>
          <button class="btn-secondary" onclick="hideAddRecordForm()">キャンセル</button>
        </div>
      </div>

      <!-- 施術履歴一覧 -->
      <div id="recordList" class="record-list">
        <!-- JS で生成 -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
