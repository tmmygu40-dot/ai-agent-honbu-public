<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事業継続チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>事業継続チェッカー</h1>
    <p class="subtitle">仕入れ停止・停電・人手不足 — 各リスクで何日乗り切れるか即確認</p>

    <!-- サマリー -->
    <div class="summary" id="summary">
      <div class="summary-item" id="sum-supply">
        <span class="sum-label">仕入れ停止</span>
        <span class="sum-value" id="sum-supply-val">—</span>
      </div>
      <div class="summary-item" id="sum-power">
        <span class="sum-label">停電</span>
        <span class="sum-value" id="sum-power-val">—</span>
      </div>
      <div class="summary-item" id="sum-staff">
        <span class="sum-label">人手不足</span>
        <span class="sum-value" id="sum-staff-val">—</span>
      </div>
    </div>

    <!-- 仕入れ停止 -->
    <div class="card card-supply">
      <div class="card-header">
        <span class="card-icon">📦</span>
        <h2>仕入れ停止リスク</h2>
      </div>
      <p class="card-desc">現在の在庫で何日分の販売・製造が可能か確認します。</p>

      <div id="supply-items">
        <!-- 動的に追加 -->
      </div>
      <button class="btn-add" onclick="addSupplyItem()">＋ 品目を追加</button>

      <div class="result-box" id="supply-result">
        <div class="result-label">最短で乗り切れる日数</div>
        <div class="result-value" id="supply-days">— 日</div>
        <div class="result-detail" id="supply-detail"></div>
      </div>
    </div>

    <!-- 停電 -->
    <div class="card card-power">
      <div class="card-header">
        <span class="card-icon">⚡</span>
        <h2>停電リスク</h2>
      </div>
      <p class="card-desc">ポータブル電源・バッテリーで業務継続できる時間を確認します。</p>

      <div class="input-grid">
        <label>バッテリー容量合計 (Wh)</label>
        <input type="number" id="power-battery" min="0" placeholder="例: 2000" oninput="calcPower(); saveData()">

        <label>業務で使う電力合計 (W)</label>
        <input type="number" id="power-usage" min="0" placeholder="例: 200" oninput="calcPower(); saveData()">

        <label>1日の業務使用時間 (時間)</label>
        <input type="number" id="power-hours" min="0" max="24" placeholder="例: 8" oninput="calcPower(); saveData()">
      </div>

      <div id="power-devices">
        <!-- 設備リスト（任意） -->
      </div>
      <button class="btn-add" onclick="addPowerDevice()">＋ 設備を追加して自動合算</button>

      <div class="result-box" id="power-result">
        <div class="result-label">乗り切れる日数</div>
        <div class="result-value" id="power-days">— 日</div>
        <div class="result-detail" id="power-detail"></div>
      </div>
    </div>

    <!-- 人手不足 -->
    <div class="card card-staff">
      <div class="card-header">
        <span class="card-icon">👥</span>
        <h2>人手不足リスク</h2>
      </div>
      <p class="card-desc">現在のスタッフ数で最低限の業務を何日継続できるか確認します。</p>

      <div class="input-grid">
        <label>現在の稼働可能スタッフ数 (人)</label>
        <input type="number" id="staff-current" min="0" placeholder="例: 5" oninput="calcStaff(); saveData()">

        <label>業務継続に最低必要なスタッフ数 (人)</label>
        <input type="number" id="staff-min" min="0" placeholder="例: 3" oninput="calcStaff(); saveData()">

        <label>1人あたり最大連続勤務可能日数 (日)</label>
        <input type="number" id="staff-maxdays" min="0" placeholder="例: 5" oninput="calcStaff(); saveData()">
      </div>

      <div class="result-box" id="staff-result">
        <div class="result-label">乗り切れる日数の目安</div>
        <div class="result-value" id="staff-days">— 日</div>
        <div class="result-detail" id="staff-detail"></div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearAll()">すべてリセット</button>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
