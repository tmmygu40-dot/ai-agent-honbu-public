<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>習慣トラッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>習慣トラッカー</h1>
      <p class="today-label" id="todayLabel"></p>
    </header>

    <section class="add-section">
      <input type="text" id="habitInput" placeholder="習慣を入力（例：朝の運動）" maxlength="50">
      <button id="addBtn">追加</button>
    </section>

    <section class="habits-section">
      <ul id="habitList"></ul>
      <p class="empty-msg" id="emptyMsg">習慣がまだありません。追加してください。</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
