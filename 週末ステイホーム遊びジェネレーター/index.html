    }
  };

  function pick(arr, n) {
    var copy = arr.slice();
    var out = [];
    var take = Math.min(n, copy.length);
    for (var i = 0; i < take; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      out.push(copy.splice(idx, 1)[0]);
    }
    return out;
  }

  function generate() {
    var genre = document.getElementById('genre').value;
    var target = document.getElementById('target').value;
    try {
      localStorage.setItem('stayhome_genre', genre);
      localStorage.setItem('stayhome_target', target);
    } catch (e) {}

    var pool = (IDEAS[genre] && IDEAS[genre][target]) ? IDEAS[genre][target] : [];
    // フォールバック：対象が見つからなければジャンル内のすべてから抽出
    if (pool.length < 3) {
      var all = [];
      Object.keys(IDEAS[genre] || {}).forEach(function(k){
        all = all.concat(IDEAS[genre][k]);
      });
      pool = all;
    }

    var picks = pick(pool, 3);
    var listEl = document.getElementById('ideaList');
    if (picks.length === 0) {
      listEl.innerHTML = '<div class="idea-card"><p class="idea-title">アイデアが見つかりませんでした</p><p class="idea-desc">条件を変えてもう一度お試しください。</p></div>';
    } else {
      listEl.innerHTML = picks.map(function(p, i){
        return '<div class="idea-card">'
             + '<span class="idea-num">アイデア ' + (i+1) + '</span>'
             + '<p class="idea-title">' + escapeHtml(p.t) + '</p>'
             + '<p class="idea-desc">' + escapeHtml(p.d) + '</p>'
             + '</div>';
      }).join('');
    }
    listEl.style.display = 'block';
    document.getElementById('btnAgain').style.display = 'block';
    listEl.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // 前回の選択を復元
  (function(){
    try {
      var g = localStorage.getItem('stayhome_genre');
      var t = localStorage.getItem('stayhome_target');
      if (g) document.getElementById('genre').value = g;
      if (t) document.getElementById('target').value = t;
    } catch (e) {}
  })();
  </script>
