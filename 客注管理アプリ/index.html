<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客注管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>客注管理</h1>

    <section class="form-section">
      <h2>新規登録</h2>
      <form id="orderForm">
        <div class="form-group">
          <label for="customerName">お客様名</label>
          <input type="text" id="customerName" placeholder="例：田中様" required>
        </div>
        <div class="form-group">
          <label for="productName">商品名</label>
          <input type="text" id="productName" placeholder="例：○○メーカー ○○モデル" required>
        </div>
        <div class="form-group">
          <label for="arrivalDate">入荷予定日</label>
          <input type="date" id="arrivalDate">
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：サイズ・色など">
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>客注一覧 <span id="totalCount" class="count-badge">0</span>件</h2>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">すべて</button>
          <button class="filter-btn" data-filter="未連絡">未連絡</button>
          <button class="filter-btn" data-filter="連絡済み">連絡済み</button>
          <button class="filter-btn" data-filter="引き渡し済み">引き渡し済み</button>
        </div>
      </div>
      <div id="orderList" class="order-list">
        <p class="empty-msg">登録された客注品はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
