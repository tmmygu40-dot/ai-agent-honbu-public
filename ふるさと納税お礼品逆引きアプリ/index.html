  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── プリセットボタン ── */
    .preset-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .preset-btn {
      padding: 0.45rem 0.85rem; font-size: 0.85rem; font-weight: 600;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .preset-btn:hover, .preset-btn.active { background: var(--accent); color: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── お礼品カード ── */
    .item-list { max-width: 600px; margin: 0 auto; }
    .item-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      box-shadow: var(--shadow); margin-bottom: 0.8rem;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 0.8rem;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.4; }
    .item-detail { font-size: 0.78rem; color: var(--text-sub); line-height: 1.5; }
    .item-detail span { display: inline-block; margin-right: 0.8rem; }
    .item-badge {
      flex-shrink: 0; padding: 0.3rem 0.6rem;
      font-size: 0.72rem; font-weight: 700;
      border-radius: 6px; white-space: nowrap;
    }
    .badge-high { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
    .badge-mid { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-low { background: #f3f4f6; color: var(--text-sub); border: 1px solid var(--border); }

    .fav-btn {
      background: none; border: none; font-size: 1.3rem; cursor: pointer;
      padding: 0.2rem; flex-shrink: 0; transition: transform 0.15s;
    }
    .fav-btn:hover { transform: scale(1.2); }
    .fav-btn.saved { filter: none; }
    .fav-btn:not(.saved) { filter: grayscale(1) opacity(0.4); }

    .no-result { text-align: center; color: var(--text-sub); font-size: 0.9rem; padding: 2rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .item-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  var GENRE_NAMES = {
    all: 'すべて', meat: '肉・ハム', seafood: '魚介・海産物', rice: '米・パン',
    fruit: '果物・フルーツ', sweets: 'スイーツ・菓子', drink: '飲料・酒',
    daily: '日用品・雑貨', electronics: '家電・電子機器', travel: '旅行・体験', craft: '工芸品・地域特産'
  };

  // ── お気に入り（localStorage） ──
  var FAV_KEY = 'furusato_fav';
  function loadFav() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
  }
  function saveFav(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
  function toggleFav(name) {
    var arr = loadFav();
    var idx = arr.indexOf(name);
    if (idx >= 0) arr.splice(idx, 1); else arr.push(name);
    saveFav(arr);
    renderResults(lastResults);
  }

  var lastResults = [];

  // ── プリセットボタン ──
  document.getElementById('presets').addEventListener('click', function(e) {
    if (!e.target.classList.contains('preset-btn')) return;
    document.getElementById('amount').value = e.target.dataset.val;
    document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
  });

  // ── 検索 ──
  function search() {
    var amount = parseInt(document.getElementById('amount').value);
    var genre = document.getElementById('genre').value;

    if (!amount || amount < 1000) {
      showResult('ng', '⚠️', '寄付額を1,000円以上で入力してください');
      document.getElementById('itemList').innerHTML = '';
      return;
    }

    var results = ITEMS.filter(function(item) {
      var genreOk = genre === 'all' || item.genre === genre;
      var amountOk = item.minAmount <= amount;
      return genreOk && amountOk;
    });

    // 人気順 → 還元率順
    results.sort(function(a, b) {
      if (a.popular !== b.popular) return a.popular ? -1 : 1;
      return b.rate - a.rate;
    });

    lastResults = results;

    var genreName = GENRE_NAMES[genre];
    if (results.length === 0) {
      showResult('warn', '0件', amount.toLocaleString() + '円 × ' + genreName + ' の条件に合うお礼品が見つかりません。寄付額を上げるか、ジャンルを変えてみてください');
      document.getElementById('itemList').innerHTML = '<p class="no-result">条件を変えて再検索してください</p>';
    } else {
      showResult('ok', results.length + '件ヒット', amount.toLocaleString() + '円以下 × ' + genreName + ' のお礼品候補です');
      renderResults(results);
    }
  }

  function renderResults(results) {
    var favs = loadFav();
    var html = results.map(function(item) {
      var isFav = favs.indexOf(item.name) >= 0;
      var badgeClass = item.rate >= 30 ? 'badge-high' : item.rate >= 25 ? 'badge-mid' : 'badge-low';
      var badgeText = item.rate >= 30 ? '高還元' : item.rate >= 25 ? '標準' : '体験型';
      return '<div class="item-card">'
        + '<div class="item-info">'
        + '<p class="item-name">' + (item.popular ? '🔥 ' : '') + esc(item.name) + '</p>'
        + '<p class="item-detail">'
        + '<span>💰 ' + item.minAmount.toLocaleString() + '円〜</span>'
        + '<span>📊 還元率 約' + item.rate + '%</span>'
        + '<span>📍 ' + esc(item.area) + '</span>'
        + '</p></div>'
        + '<span class="item-badge ' + badgeClass + '">' + badgeText + '</span>'
        + '<button class="fav-btn ' + (isFav ? 'saved' : '') + '" onclick="toggleFav(\'' + esc(item.name).replace(/'/g, "\\'") + '\')" title="お気に入り">⭐</button>'
        + '</div>';
    }).join('');
    document.getElementById('itemList').innerHTML = html;
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function esc(s) {
    var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
