<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子育て支援制度ガイド</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 件数バッジ ── */
    .result-summary {
      display: none;
      background: var(--card);
      border: 2px solid var(--ok);
      background: var(--ok-bg);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .result-summary .count { font-size: 2rem; font-weight: 900; color: var(--ok); }
    .result-summary .count-label { font-size: 0.85rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 制度リスト ── */
    .program-list {
      max-width: 600px;
      margin: 0 auto;
    }
    .program-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .program-header {
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .program-header:hover { background: var(--accent-light); }
    .program-header-left { flex: 1; }
    .program-name {
      font-size: 0.98rem; font-weight: 700; line-height: 1.4;
      margin-bottom: 0.2rem;
    }
    .program-amount {
      font-size: 0.82rem; font-weight: 800;
      color: var(--accent);
    }
    .program-chevron {
      font-size: 1rem; color: var(--text-sub);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .program-item.open .program-chevron { transform: rotate(180deg); }

    .program-body {
      display: none;
      padding: 0 1.2rem 1rem;
      border-top: 1px solid var(--border);
    }
    .program-item.open .program-body { display: block; }

    .info-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.84rem;
      line-height: 1.5;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      font-weight: 700; color: var(--text-sub);
      min-width: 4.5rem; flex-shrink: 0;
    }
    .info-val { color: var(--text); }

    /* カテゴリバッジ */
    .badge {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      background: var(--accent-light);
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .badge.national { background: #e0f0ff; color: #1d4ed8; }
    .badge.pref     { background: #fce7f3; color: #9d174d; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 注記 ── */
    .note-card {
      max-width: 600px; margin: 0 auto 1rem;
      background: var(--warn-bg); border: 1px solid var(--warn);
      border-radius: var(--radius); padding: 0.8rem 1rem;
      font-size: 0.78rem; color: var(--warn); display: none;
    }
  </style>

  <!-- 入力カード -->

    <p class="card-title">条件入力</p>
    <div class="field">
      <label for="ageGroup">子どもの年齢</label>
      <select id="ageGroup">
        <option value="">選んでください</option>
        <option value="0">0歳（乳児）</option>
        <option value="1-2">1〜2歳</option>
        <option value="3-5">3〜5歳（未就学）</option>
        <option value="6-11">6〜11歳（小学生）</option>
        <option value="12-15">12〜15歳（中学生）</option>

      </select>
    </div>
    <div class="field">
      <label for="income">世帯年収（目安）</label>
      <select id="income">
        <option value="">選んでください</option>
        <option value="low">〜300万円</option>
        <option value="mid">300〜600万円</option>
        <option value="high">600万円以上</option>
      </select>
      <p class="hint">夫婦合算の概算で構いません</p>
    </div>
    <div class="field">
      <label for="childOrder">子どもの人数（出生順）</label>
      <select id="childOrder">
        <option value="">選んでください</option>
        <option value="1">第1子のみ</option>
        <option value="2">第2子（計2人）</option>
        <option value="3">第3子以降（計3人以上）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="search()">制度を検索する</button>

  <!-- 件数表示 -->
  <div class="result-summary" id="resultSummary">
    <div class="count" id="countNum">0</div>
    <div class="count-label">件の支援制度が該当します</div>
  </div>

  <!-- 注記 -->
  <div class="note-card" id="noteCard">
    ※ 表示内容は2024年度時点の全国制度が中心です。自治体独自の上乗せ・追加制度は各市区町村窓口でご確認ください。
  </div>

  <!-- 制度リスト -->
  <div class="program-list" id="programList"></div>

  function getAge() { return document.getElementById('ageGroup').value; }
  function getIncome() { return document.getElementById('income').value; }
  function getOrder() { return document.getElementById('childOrder').value; }

  function search() {
    var age = getAge(), inc = getIncome(), ord = getOrder();
    if (!age || !inc || !ord) {
      alert('すべての条件を選択してください');
      return;
    }

    // localStorage に保存
    localStorage.setItem('kodawari_age', age);
    localStorage.setItem('kodawari_income', inc);
    localStorage.setItem('kodawari_order', ord);

    var matched = PROGRAMS.filter(function(p) {
      var ageOk = p.age.indexOf(age) !== -1;
      var incOk = p.income.indexOf(inc) !== -1;
      var ordOk = p.childOrder === null || p.childOrder.indexOf(ord) !== -1;
      return ageOk && incOk && ordOk;
    });

    renderResults(matched);
  }

  function renderResults(list) {
    var summary = document.getElementById('resultSummary');
    var note = document.getElementById('noteCard');
    var container = document.getElementById('programList');

    document.getElementById('countNum').textContent = list.length;
    summary.style.display = '';
    note.style.display = '';

    if (list.length === 0) {
      container.innerHTML = '<div class="card" style="text-align:center;color:var(--text-sub);">条件に合う制度が見つかりませんでした。<br>条件を変えて再検索してください。</div>';
      return;
    }

    container.innerHTML = list.map(function(p, i) {
      return '<div class="program-item" id="pi' + i + '">' +
        '<div class="program-header" onclick="toggle(' + i + ')">' +
          '<div class="program-header-left">' +
            '<div class="badge ' + p.category + '">' + p.categoryLabel + '</div>' +
            '<div class="program-name">' + esc(p.name) + '</div>' +
            '<div class="program-amount">' + esc(p.amount) + '</div>' +
          '</div>' +
          '<div class="program-chevron">▼</div>' +
        '</div>' +
        '<div class="program-body">' +
          '<div class="info-row"><span class="info-label">内容</span><span class="info-val">' + esc(p.detail) + '</span></div>' +
          '<div class="info-row"><span class="info-label">申請先</span><span class="info-val">' + esc(p.apply) + '</span></div>' +
          '<div class="info-row"><span class="info-label">主な条件</span><span class="info-val">' + esc(p.cond) + '</span></div>' +
          (p.note ? '<div class="info-row"><span class="info-label">補足</span><span class="info-val">' + esc(p.note) + '</span></div>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    // 先頭を開く
    if (list.length > 0) toggle(0);
  }

  function toggle(i) {
    var el = document.getElementById('pi' + i);
    if (el) el.classList.toggle('open');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ページ読み込み時に前回値を復元
  window.addEventListener('load', function() {
    var age = localStorage.getItem('kodawari_age');
    var inc = localStorage.getItem('kodawari_income');
    var ord = localStorage.getItem('kodawari_order');
    if (age) document.getElementById('ageGroup').value = age;
    if (inc) document.getElementById('income').value = inc;
    if (ord) document.getElementById('childOrder').value = ord;
  });
  </script>
