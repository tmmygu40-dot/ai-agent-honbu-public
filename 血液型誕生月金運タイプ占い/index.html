<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="血液型と誕生月を選ぶだけで、今月のあなたの金運上昇タイプ・運気スコア・ラッキーアクションが分かる無料占いアプリ。月初の気分転換にどうぞ。">
  <title>血液型×誕生月 今月の金運上昇タイプ占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-top:0.4rem; }
    .score-line { font-size: 1.05rem; font-weight: 700; margin-top:0.6rem; }
    .lucky-list { text-align:left; margin-top: 1rem; padding-top:0.8rem; border-top:1px dashed var(--border); }
    .lucky-list h4 { font-size:0.82rem; color: var(--text-sub); margin-bottom:0.5rem; font-weight:700; letter-spacing:0.06em; }
    .lucky-list ul { list-style:none; padding-left:0; }
    .lucky-list li { font-size:0.92rem; line-height:1.55; padding:0.35rem 0; border-bottom:1px solid var(--border); }
    .lucky-list li:last-child { border-bottom:none; }
    .lucky-list li:before { content:"✨ "; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>血液型×誕生月 今月の金運上昇タイプ占い</h1>
    <p class="subtitle">血液型と誕生月から、今月の金運タイプとラッキーアクションを軽く占うエンタメ占いです（2026年4月時点の参考。占い結果は娯楽目的）</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたの情報</p>
    <div class="field">
      <label for="bt">血液型</label>
      <select id="bt">
        <option value="">選んでください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
    <div class="field">
      <label for="bm">誕生月</label>
      <select id="bm">
        <option value="">選んでください</option>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
      <p class="hint">今月の運気は毎月自動で切り替わります</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">今月の金運タイプを占う</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">今月の金運タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="score-line" id="rs"></p>
    <p class="result-note" id="rn"></p>
    <div class="lucky-list" id="lucky-wrap" style="display:none">
      <h4>ラッキーアクション</h4>
      <ul id="lucky-list"></ul>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このアプリはエンタメ占いです。血液型と誕生月の組合せから今月の金運タイプを軽く判定するもので、医学的・統計的根拠はありません。お金の判断はご自身の状況に合わせて行ってください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'kinun_uranai_v1';

  // 金運タイプ12種（血液型×誕生月で出やすいタイプ）
  var TYPES = [
    { name:'種まき型', emoji:'🌱', level:'warn', note:'今月は仕込みの月。すぐの収入よりも、来月以降に効くお金の動きを意識すると◎', actions:['先月の支出を3カテゴリだけ振り返る','少額でいいから新しい節約習慣を1つ始める','ポイ活アプリの未使用ポイントを確認する'] },
    { name:'金運上昇型', emoji:'💎', level:'ok', note:'今月は臨時収入や見直し効果が出やすい好調月。攻めの一手が当たりやすいタイミング', actions:['ふるさと納税の枠をチェックする','使ってないサブスクを1つ解約する','給与明細の控除内訳を確認する'] },
    { name:'貯金安定型', emoji:'🏦', level:'ok', note:'今月は守りが強い月。地味だけど着実にお金が育つタイプ。慌てずコツコツが正解', actions:['普通預金から定期に少しだけ移す','家計簿アプリを開いて先月分を締める','非常時のための予備費を1万円確保する'] },
    { name:'引き締め型', emoji:'🧱', level:'warn', note:'やや財布のひもを締めたい月。大きな衝動買いは月末まで保留が吉', actions:['買い物前に「2日待つ」ルールを導入する','現金主義デーを週1で作る','3000円以上の出費は紙にメモする'] },
    { name:'チャンス到来型', emoji:'🎯', level:'ok', note:'臨時のお誘いや副業情報がチャンスにつながる月。動けば当たるタイプ', actions:['副業・投資の情報を1つだけリサーチする','月1回の家計レビュー日を決める','信頼できる人にお金の相談をしてみる'] },
    { name:'整える型', emoji:'🧹', level:'warn', note:'今月は財布・口座・カードの「整理整頓」が運気を上げる月', actions:['財布の中の不要レシートを処分する','使ってないクレカを1枚見直す','銀行口座の残高を全部書き出す'] },
    { name:'ご褒美型', emoji:'🍰', level:'ok', note:'頑張った自分への小さな投資が、巡り巡って金運に返ってくる月', actions:['予算内で「ちょっといいモノ」を1つだけ買う','健康・睡眠にお金をかける','学びへの自己投資を1500円分だけする'] },
    { name:'波乱注意型', emoji:'⚠️', level:'ng', note:'今月は予想外の出費が出やすい月。慎重さが運気を守る', actions:['月初に固定費だけ先に確保する','友人との大きな出費イベントは慎重に','クレカ明細を週1で確認する'] },
    { name:'人脈金運型', emoji:'🤝', level:'ok', note:'人とのつながりからお金の話が舞い込む月。誘いには軽いノリで乗ってOK', actions:['しばらく会ってない友人と連絡を取る','奢られたら次に小さく返す','家族にお金の相談を1つしてみる'] },
    { name:'リセット型', emoji:'🔄', level:'warn', note:'お金との付き合い方をリセットすると次月から流れが変わる月', actions:['家計の固定費を1つだけ見直す','使ってないアプリのサブスクを棚卸し','銀行・証券の口座を1つ整理する'] },
    { name:'コツコツ積立型', emoji:'📈', level:'ok', note:'地味な積立・投資・節約が今月とくに伸びるタイプ。続ける人ほど得する月', actions:['積立額を100円だけ増やしてみる','つみたてNISAの今月分を確認する','光熱費の前月比を見る'] },
    { name:'再起型', emoji:'🌅', level:'warn', note:'先月までの出費でお疲れ気味なら、今月は静かに立て直す月。無理しないが正解', actions:['今月は新しい契約・買い物を1つ減らす','現金で1週間生活してみる','寝る前にスマホ家計簿を1分だけ開く'] }
  ];

  function calc() {
    var bt = document.getElementById('bt').value;
    var bm = parseInt(document.getElementById('bm').value, 10);
    if (!bt || !bm) { showErr('血液型と誕生月を選んでください'); return; }

    var now = new Date();
    var ym = now.getFullYear() * 100 + (now.getMonth() + 1);

    // 血液型・誕生月・現在の年月から擬似ハッシュでタイプとスコアを決定
    var btIdx = ['A','B','O','AB'].indexOf(bt);
    var seed = (btIdx + 1) * 13 + bm * 7 + ym * 3;
    var typeIdx = ((seed % TYPES.length) + TYPES.length) % TYPES.length;
    var t = TYPES[typeIdx];

    // 運気スコア 30〜95 の範囲
    var score = 30 + ((seed * 17) % 66);
    if (t.level === 'ok')   score = Math.max(score, 65);
    if (t.level === 'ng')   score = Math.min(score, 55);

    showResult(t, score, bt, bm, now);
    save({ bt: bt, bm: bm, typeIdx: typeIdx, score: score, ym: ym });
  }

  function showResult(t, score, bt, bm, now) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = t.emoji + ' ' + t.name;
    document.getElementById('rs').textContent = '運気スコア：' + score + ' / 100　（' + bt + '型・' + bm + '月生まれ／' + (now.getFullYear()) + '年' + (now.getMonth()+1) + '月）';
    document.getElementById('rn').textContent = t.note;

    var ul = document.getElementById('lucky-list');
    ul.innerHTML = t.actions.map(function(a){ return '<li>' + a + '</li>'; }).join('');
    document.getElementById('lucky-wrap').style.display = 'block';

    rc.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️ 入力エラー';
    document.getElementById('rs').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('lucky-wrap').style.display = 'none';
  }

  function save(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d && d.bt) document.getElementById('bt').value = d.bt;
      if (d && d.bm) document.getElementById('bm').value = String(d.bm);

      // 同じ年月なら以前の結果を復元
      var now = new Date();
      var ym = now.getFullYear() * 100 + (now.getMonth() + 1);
      if (d && d.ym === ym && typeof d.typeIdx === 'number' && TYPES[d.typeIdx]) {
        showResult(TYPES[d.typeIdx], d.score, d.bt, d.bm, now);
      }
    } catch(e) {}
  }

  load();
  </script>

</body>
