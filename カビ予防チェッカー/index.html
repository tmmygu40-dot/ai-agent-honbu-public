<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カビ予防チェッカー｜3問でカビリスク即診断</title>
  <meta name="description" content="換気・湿気・過去のカビ経験の3問に答えるだけで、梅雨のカビ発生リスクと最優先の対策を即診断できる無料ツールです。梅雨シーズン前の備えチェックにご活用ください。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ラジオ問題 ── */
    .question { margin-bottom: 1.4rem; }
    .question:last-child { margin-bottom: 0; }
    .question-text { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .question-num { color: var(--accent); margin-right: 0.3rem; }
    .radio-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .radio-option {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.8rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .radio-option input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent); }
    .radio-option span { font-size: 0.88rem; color: var(--text); line-height: 1.4; }
    .radio-option:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 対策カード ── */
    .measure-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .measure-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .measure-item { padding: 0.55rem 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 0.5rem; }
    .measure-item:last-child { border-bottom: none; }
    .measure-icon { font-size: 1.1rem; flex-shrink: 0; }
    .measure-text { font-size: 0.88rem; color: var(--text); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍄 カビ予防チェッカー</h1>
    <p class="subtitle">3問に答えるだけで梅雨のカビリスクが分かる。今すぐできる対策もご提案。</p>
  </header>

  <!-- 診断カード -->
  <div class="card">
    <p class="card-title">3問で診断</p>

    <div class="question">
      <p class="question-text"><span class="question-num">Q1.</span>部屋の換気、どのくらいしていますか？</p>
      <div class="radio-group" id="q1">
        <label class="radio-option"><input type="radio" name="q1" value="0"><span>毎日窓を開けて換気している</span></label>
        <label class="radio-option"><input type="radio" name="q1" value="1"><span>週2〜3回ほど換気している</span></label>
        <label class="radio-option"><input type="radio" name="q1" value="2"><span>ほとんど換気していない（週1以下）</span></label>
      </div>
    </div>

    <div class="question">
      <p class="question-text"><span class="question-num">Q2.</span>部屋の湿気環境はどちらに近いですか？</p>
      <div class="radio-group" id="q2">
        <label class="radio-option"><input type="radio" name="q2" value="0"><span>南向き・日当たりが良く乾燥しやすい</span></label>
        <label class="radio-option"><input type="radio" name="q2" value="1"><span>普通の部屋（特に湿気を感じない）</span></label>
        <label class="radio-option"><input type="radio" name="q2" value="2"><span>水回り近く・北向き・湿気を感じやすい</span></label>
      </div>
    </div>

    <div class="question">
      <p class="question-text"><span class="question-num">Q3.</span>これまでに結露やカビを見たことがありますか？</p>
      <div class="radio-group" id="q3">
        <label class="radio-option"><input type="radio" name="q3" value="0"><span>ほとんどない</span></label>
        <label class="radio-option"><input type="radio" name="q3" value="1"><span>たまにある（年1〜2回程度）</span></label>
        <label class="radio-option"><input type="radio" name="q3" value="2"><span>よくある（梅雨になると必ず気になる）</span></label>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">カビリスクを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">カビ発生リスク</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 対策カード -->
  <div class="measure-card" id="measure-card">
    <p class="measure-title">最優先対策</p>
    <div id="measures"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・環境省などの官公庁資料や、カビ対策に関する一般的な知見を参考に作成した目安ツールです。実際のカビ発生状況は住環境により異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var MEASURES = {
    ok: [
      { icon: '✅', text: '今の換気習慣を梅雨時期も続けましょう。朝の換気5分が効果的です。' },
      { icon: '🧽', text: '梅雨前に浴室・洗面台・押し入れを軽く拭き掃除しておくと万全です。' },
      { icon: '🌿', text: '吸湿性の高い植物（ポトス等）を置くと快適さがアップします。' }
    ],
    warn: [
      { icon: '🪟', text: '換気回数を増やしましょう。朝晩10分×2回が目標です。' },
      { icon: '📦', text: '押し入れ・クローゼットに除湿剤を設置してください。湿気を逃しにくい場所を優先。' },
      { icon: '🚿', text: '水回り（浴室・洗面所・キッチン）のカビ取りスプレーを梅雨前に使っておきましょう。' },
      { icon: '🌡️', text: '室温26℃以下・湿度60%以下を目標にしてみましょう。' }
    ],
    ng: [
      { icon: '⚠️', text: '今すぐ重点箇所（浴室・押し入れ・窓枠）にカビ取りスプレーを使いましょう。' },
      { icon: '🌬️', text: '換気扇の24時間稼働を検討してください。特に水回りは常時運転が効果的です。' },
      { icon: '💧', text: '除湿器の導入を優先的に検討しましょう。エアコンの除湿機能も活用を。' },
      { icon: '🛡️', text: '防カビコーティングスプレーを年1回施工するとカビの再発を抑えられます。' },
      { icon: '🏠', text: '壁紙・木材にカビが広がっている場合は、プロのクリーニング業者への相談も検討してください。' }
    ]
  };

  var LEVEL_DATA = {
    ok:   { label: '低リスク', eval: 'カビが生えにくい環境です 👍', note: '今の生活習慣を維持すれば梅雨も安心。念のため梅雨前に軽くチェックしておくと万全です。' },
    warn: { label: '中リスク', eval: 'やや注意が必要な環境です ⚠️', note: '湿気対策を少し強化するだけで快適に過ごせます。梅雨前の準備を早めにスタートしましょう。' },
    ng:   { label: '高リスク', eval: 'カビが発生しやすい環境です 🆘', note: '放置するとカビが広がりやすくなります。梅雨前に集中対策をおすすめします。' }
  };

  function diagnose() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
      alert('3問すべてを選んでから診断してください。');
      return;
    }

    var score = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value);
    var level = score <= 1 ? 'ok' : score <= 4 ? 'warn' : 'ng';
    var data = LEVEL_DATA[level];

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = data.label;
    document.getElementById('re').textContent = data.eval;
    document.getElementById('rn').textContent = data.note;

    // 対策カード表示
    var mc = document.getElementById('measure-card');
    mc.style.display = 'block';
    document.getElementById('measures').innerHTML = MEASURES[level].map(function(m) {
      return '<div class="measure-item"><span class="measure-icon">' + m.icon + '</span><span class="measure-text">' + m.text + '</span></div>';
    }).join('');

    // localStorage保存
    var ans = { q1: q1.value, q2: q2.value, q3: q3.value };
    try { localStorage.setItem('kabi-checker-ans', JSON.stringify(ans)); } catch(e) {}

    // スクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 前回の回答を復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem('kabi-checker-ans') || 'null');
      if (!saved) return;
      ['q1','q2','q3'].forEach(function(q) {
        var el = document.querySelector('input[name="' + q + '"][value="' + saved[q] + '"]');
        if (el) el.checked = true;
      });
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
