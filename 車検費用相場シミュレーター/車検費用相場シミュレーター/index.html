<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車検費用相場シミュレーター</title>
  <meta name="description" content="車種・重量帯・車齢・整備プランを選ぶだけで、車検の法定費用内訳と整備費用の相場レンジをすぐ確認。重量税・自賠責・検査料の内訳も一覧表示できる車検費用シミュレーターです（2025年度目安）。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; color: var(--accent); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; background: var(--accent-light); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .section-row td {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.04em; background: #fdf5ec; padding-top: 0.75rem;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>車検費用相場シミュレーター</h1>
    <p class="subtitle">車種・重量・車齢・整備プランを選ぶだけ。法定費用内訳と相場レンジを即確認（2025年度目安）</p>
  </header>

  <div class="card">
    <p class="card-title">車両情報を選択</p>
    <div class="field">
      <label for="vtype">車種・重量帯</label>
      <select id="vtype">
        <option value="kei">軽自動車</option>
        <option value="s1">普通乗用車（1t未満）</option>
        <option value="s2">普通乗用車（1〜1.5t）</option>
        <option value="m1" selected>普通乗用車（1.5〜2t）</option>
        <option value="m2">普通乗用車（2〜2.5t）</option>
        <option value="l1">普通乗用車（2.5t超）</option>
        <option value="klight">軽貨物・軽バン（4ナンバー）</option>
      </select>
      <p class="hint">車検証の「車両重量」欄で確認できます</p>
    </div>
    <div class="field">
      <label for="age">車齢（初度登録からの経過年数）</label>
      <select id="age">
        <option value="new">3年未満（エコカー減税対象含む）</option>
        <option value="mid" selected>3〜12年（標準税率）</option>
        <option value="old">13年超（重量税が増額）</option>
        <option value="old18">18年超（さらに増額）</option>
      </select>
    </div>
    <div class="field">
      <label for="plan">整備プラン</label>
      <select id="plan">
        <option value="min">車検専門店・最低限（法定点検のみ）</option>
        <option value="std" selected>標準コース（消耗品交換あり・一般整備工場）</option>
        <option value="dlr">ディーラーコース（純正部品・丁寧整備）</option>
        <option value="full">フルコース（全消耗品＋各種点検）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">費用相場を計算する</button>

  <div class="result-card" id="result">
    <p class="result-label">車検費用の目安合計</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">費用内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 国土交通省・自動車検査登録情報協会等の公開データをもとにした2025年度の目安です。重量税はエコカー減税・経年加算で変わります。実際の費用は車両状態・整備業者によって異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 重量税（2年分）: [3年未満, 3-12年, 13年超, 18年超]
  var WEIGHT_TAX = {
    kei:    [5000,  6600,  8200,  8200],
    s1:     [10000, 16400, 20000, 25200],
    s2:     [15000, 24600, 30000, 37800],
    m1:     [20000, 32800, 40000, 50400],
    m2:     [25000, 41000, 50000, 63000],
    l1:     [30000, 49200, 60000, 75600],
    klight: [5000,  6600,  8200,  8200],
  };
  // 自賠責保険料（24ヶ月）
  var COMPULSORY = { kei:17540, s1:17650, s2:17650, m1:17650, m2:17650, l1:17650, klight:17540 };
  // 検査手数料（印紙代）
  var INSP_FEE   = { kei:1400,  s1:1800,  s2:1800,  m1:1800,  m2:1800,  l1:1800,  klight:1400  };
  // サイズ分類
  var SIZE_MAP   = { kei:'kei', s1:'small', s2:'small', m1:'mid', m2:'mid', l1:'large', klight:'kei' };
  // 整備費用相場 [min, max]
  var MAINT = {
    min:  { kei:[20000,40000], small:[25000,50000], mid:[30000,60000],  large:[35000,70000]  },
    std:  { kei:[40000,70000], small:[50000,90000], mid:[60000,100000], large:[70000,120000] },
    dlr:  { kei:[60000,100000], small:[70000,120000], mid:[80000,150000], large:[90000,180000] },
    full: { kei:[80000,130000], small:[100000,160000], mid:[120000,200000], large:[150000,240000] },
  };
  var PLAN_NAMES = { min:'車検専門店・最低限', std:'標準コース（一般整備工場）', dlr:'ディーラーコース', full:'フルコース' };
  var AGE_IDX   = { new:0, mid:1, old:2, old18:3 };
  var AGE_NAMES = { new:'3年未満', mid:'3〜12年', old:'13年超', old18:'18年超' };

  function calc() {
    var vt  = document.getElementById('vtype').value;
    var age = document.getElementById('age').value;
    var pl  = document.getElementById('plan').value;
    var sz  = SIZE_MAP[vt];
    var ai  = AGE_IDX[age];

    var wt    = WEIGHT_TAX[vt][ai];
    var comp  = COMPULSORY[vt];
    var insp  = INSP_FEE[vt];
    var legal = wt + comp + insp;
    var mr    = MAINT[pl][sz];
    var tMin  = legal + mr[0];
    var tMax  = legal + mr[1];

    var vtName = document.getElementById('vtype').options[document.getElementById('vtype').selectedIndex].text;

    document.getElementById('rv').textContent = fmt(tMin) + '〜' + fmt(tMax) + ' 円';
    document.getElementById('rn').textContent = vtName + ' / ' + AGE_NAMES[age] + ' / ' + PLAN_NAMES[pl];
    document.getElementById('result').style.display = 'block';

    var rows = [
      { section: '法定費用（固定）' },
      ['自動車重量税（2年分）', fmt(wt) + ' 円', '車齢・エコカー等で変動'],
      ['自賠責保険料（24ヶ月）', fmt(comp) + ' 円', ''],
      ['検査手数料（印紙代）', fmt(insp) + ' 円', '持込検査の場合'],
      ['法定費用 合計', fmt(legal) + ' 円', '', true],
      { section: '整備費用（相場レンジ）' },
      ['整備・点検費用', fmt(mr[0]) + '〜' + fmt(mr[1]) + ' 円', PLAN_NAMES[pl]],
      { section: '車検費用 合計目安' },
      ['法定費用＋整備費用', fmt(tMin) + '〜' + fmt(tMax) + ' 円', '車両状態により変動', true],
    ];

    document.getElementById('db').innerHTML = rows.map(function(r) {
      if (r.section) return '<tr class="section-row"><td colspan="2">' + r.section + '</td></tr>';
      var cls  = r[3] ? ' class="hl"' : '';
      var note = r[2] ? '<br><span style="font-size:0.72rem;font-weight:400;color:var(--text-sub)">' + r[2] + '</span>' : '';
      return '<tr' + cls + '><td>' + r[0] + note + '</td><td>' + r[1] + '</td></tr>';
    }).join('');

    document.getElementById('detail').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function saveSettings() {
    try {
      localStorage.setItem('shakken_vtype', document.getElementById('vtype').value);
      localStorage.setItem('shakken_age',   document.getElementById('age').value);
      localStorage.setItem('shakken_plan',  document.getElementById('plan').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var v = localStorage.getItem('shakken_vtype');
      var a = localStorage.getItem('shakken_age');
      var p = localStorage.getItem('shakken_plan');
      if (v) document.getElementById('vtype').value = v;
      if (a) document.getElementById('age').value = a;
      if (p) document.getElementById('plan').value = p;
    } catch(e) {}
  }
  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
