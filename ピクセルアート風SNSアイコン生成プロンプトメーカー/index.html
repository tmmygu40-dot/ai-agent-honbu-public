<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="キャラタイプ・背景・表情・アクセサリを選ぶだけで、ピクセルアート風SNSアイコン向けのAI画像生成プロンプトをワンタップで生成・コピーできる無料Webアプリです。">
  <title>🎨 ピクセルアート風SNSアイコン生成プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
      resize: vertical; min-height: 3rem;
    }
    .field textarea:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }

    /* ── プロンプト表示エリア ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); word-break: break-word;
      white-space: pre-wrap; min-height: 60px;
      margin-bottom: 0.8rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
      cursor: pointer; transition: background 0.1s;
    }
    .history-item:hover { background: var(--accent-light); }
    .history-item:last-child { border-bottom: none; }
    .history-item .hist-prompt { color: var(--text); font-size: 0.85rem; word-break: break-word; }
    .history-item .hist-date { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.2rem; }
    .btn-clear-history {
      display: block; width: 100%; margin-top: 0.8rem; padding: 0.5rem;
      font-size: 0.8rem; font-weight: 600;
      background: transparent; color: var(--ng); border: 1.5px solid var(--ng);
      border-radius: 8px; cursor: pointer;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎨 ピクセルアート風SNSアイコン生成プロンプトメーカー</h1>
    <p class="subtitle">キャラや背景を選ぶだけで、ピクセルアート風アイコンのAIプロンプトをサクッと生成。</p>
  </header>

  <!-- 入力カード：キャラタイプ -->
  <div class="card">
    <p class="card-title">キャラクター設定</p>
    <div class="field">
      <label for="charType">キャラタイプ</label>
      <select id="charType">
        <option value="human boy">男の子</option>
        <option value="human girl">女の子</option>
        <option value="cat">猫</option>
        <option value="dog">犬</option>
        <option value="rabbit">うさぎ</option>
        <option value="bear">くま</option>
        <option value="fox">きつね</option>
        <option value="owl">ふくろう</option>
        <option value="dragon">ドラゴン</option>
        <option value="robot">ロボット</option>
        <option value="slime">スライム</option>
        <option value="ghost">おばけ</option>
        <option value="alien">宇宙人</option>
        <option value="mushroom creature">きのこ</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="smiling happily">にっこり笑顔</option>
        <option value="winking">ウインク</option>
        <option value="with a cool serious face">クール・無表情</option>
        <option value="surprised with wide eyes">びっくり</option>
        <option value="blushing shyly">照れ顔</option>
        <option value="with a mischievous grin">いたずら顔</option>
        <option value="looking sleepy">眠そう</option>
        <option value="crying with tears">泣き顔</option>
        <option value="with an angry pout">ぷんぷん怒り</option>
        <option value="with sparkling eyes">キラキラ目</option>
      </select>
    </div>
    <div class="field">
      <label for="accessory">アクセサリー</label>
      <select id="accessory">
        <option value="">なし</option>
        <option value="wearing headphones">ヘッドフォン</option>
        <option value="wearing a crown">王冠</option>
        <option value="wearing sunglasses">サングラス</option>
        <option value="wearing a witch hat">魔女帽子</option>
        <option value="wearing a ribbon bow">リボン</option>
        <option value="wearing a beanie hat">ニット帽</option>
        <option value="wearing round glasses">丸メガネ</option>
        <option value="holding a star wand">星のステッキ</option>
        <option value="with angel wings">天使の羽</option>
        <option value="with devil horns">悪魔の角</option>
        <option value="wearing a scarf">マフラー</option>
      </select>
    </div>
  </div>

  <!-- 入力カード：ビジュアル設定 -->
  <div class="card">
    <p class="card-title">ビジュアル設定</p>
    <div class="field">
      <label for="bgColor">背景色</label>
      <select id="bgColor">
        <option value="pastel pink">パステルピンク</option>
        <option value="pastel blue">パステルブルー</option>
        <option value="pastel green">パステルグリーン</option>
        <option value="pastel yellow">パステルイエロー</option>
        <option value="pastel purple">パステルパープル</option>
        <option value="white">ホワイト</option>
        <option value="black">ブラック</option>
        <option value="gradient rainbow">レインボーグラデ</option>
        <option value="starry night sky">星空</option>
        <option value="sunset orange gradient">夕焼けグラデ</option>
        <option value="transparent">透過（透明）</option>
      </select>
    </div>
    <div class="field">
      <label for="pixelStyle">ドット絵スタイル</label>
      <select id="pixelStyle">
        <option value="16x16 retro pixel art">16x16 レトロ</option>
        <option value="32x32 pixel art">32x32 スタンダード</option>
        <option value="64x64 detailed pixel art">64x64 ハイディテール</option>
        <option value="chibi pixel art">ちびキャラ風</option>
        <option value="Game Boy style pixel art">ゲームボーイ風</option>
        <option value="SNES RPG style pixel art">スーファミRPG風</option>
        <option value="modern pixel art with clean lines">モダンピクセル</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="cute and kawaii">かわいい</option>
        <option value="cool and stylish">クール</option>
        <option value="dark and mysterious">ダーク・ミステリアス</option>
        <option value="warm and cozy">あたたかい</option>
        <option value="energetic and vibrant">元気・ビビッド</option>
        <option value="dreamy and pastel">ゆめかわ</option>
        <option value="retro gaming">レトロゲーム</option>
        <option value="minimalist and simple">ミニマル</option>
      </select>
    </div>
    <div class="field">
      <label for="extraText">追加キーワード（自由入力・任意）</label>
      <textarea id="extraText" rows="2" placeholder="例: holding a coffee cup, cherry blossoms"></textarea>
      <p class="hint">英語で自由にキーワードを追加できます（空欄OK）</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">🎨 プロンプトを生成</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="promptOutput"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">📋 コピーする</button>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">生成履歴</p>
    <div id="historyList"></div>
    <button class="btn-clear-history no-print" onclick="clearHistory()">🗑 履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 生成されるプロンプトはAI画像生成ツール（Midjourney、DALL-E、Stable Diffusion等）向けの参考テキストです。ツールごとに最適な書式が異なる場合があります。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var HISTORY_KEY = 'pixelIconPromptHistory';

  function generatePrompt() {
    var charType = document.getElementById('charType').value;
    var expression = document.getElementById('expression').value;
    var accessory = document.getElementById('accessory').value;
    var bgColor = document.getElementById('bgColor').value;
    var pixelStyle = document.getElementById('pixelStyle').value;
    var mood = document.getElementById('mood').value;
    var extraText = document.getElementById('extraText').value.trim();

    var parts = [
      pixelStyle + ' SNS icon',
      'a ' + charType + ' character',
      expression
    ];

    if (accessory) {
      parts.push(accessory);
    }

    parts.push(mood + ' atmosphere');
    parts.push(bgColor + ' background');
    parts.push('centered composition');
    parts.push('square format');
    parts.push('clean pixel edges');
    parts.push('no text');

    if (extraText) {
      parts.push(extraText);
    }

    var prompt = parts.join(', ');

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('promptOutput').textContent = prompt;

    var copyBtn = document.getElementById('btnCopy');
    copyBtn.textContent = '📋 コピーする';
    copyBtn.classList.remove('copied');

    saveHistory(prompt);
    renderHistory();
  }

  function copyPrompt() {
    var text = document.getElementById('promptOutput').textContent;
    if (!text) return;

    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btnCopy');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.getElementById('btnCopy');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function getHistory() {
    try {
      var data = localStorage.getItem(HISTORY_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }

  function saveHistory(prompt) {
    var history = getHistory();
    history.unshift({
      prompt: prompt,
      date: new Date().toLocaleString('ja-JP')
    });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = getHistory();
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');

    if (history.length === 0) {
      card.style.display = 'none';
      return;
    }

    card.style.display = 'block';
    list.innerHTML = history.map(function(item, i) {
      return '<div class="history-item" onclick="useHistory(' + i + ')">'
        + '<div class="hist-prompt">' + escHtml(item.prompt) + '</div>'
        + '<div class="hist-date">' + escHtml(item.date) + ' ─ タップで再利用</div>'
        + '</div>';
    }).join('');
  }

  function useHistory(index) {
    var history = getHistory();
    if (!history[index]) return;
    document.getElementById('promptOutput').textContent = history[index].prompt;
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    var copyBtn = document.getElementById('btnCopy');
    copyBtn.textContent = '📋 コピーする';
    copyBtn.classList.remove('copied');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function clearHistory() {
    if (!confirm('生成履歴をすべて削除しますか？')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
