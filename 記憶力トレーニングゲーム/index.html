<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記憶力トレーニング</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E8%A8%98%E6%86%B6%E5%8A%9B%E3%83%88%E3%83%AC%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0%E3%82%B2%E3%83%BC%E3%83%A0/" />
  <meta name="description" content="記憶力トレーニング。楽しくチャレンジして知識を確認できるクイズアプリです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"記憶力トレーニング","description":"記憶力トレーニング。楽しくチャレンジして知識を確認できるクイズアプリです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E8%A8%98%E6%86%B6%E5%8A%9B%E3%83%88%E3%83%AC%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0%E3%82%B2%E3%83%BC%E3%83%A0/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div id="app">

    <!-- スタート画面 -->
    <div id="screen-start" class="screen">
      <h1>🧠 記憶力トレーニング</h1>
      <p class="subtitle">数字を覚えて入力しよう！</p>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">楽しくチャレンジして知識を確認できるクイズアプリです。スマホでも快適にご利用いただけます。</p>

      <div class="setting-group">
        <label for="digit-select">桁数</label>
        <select id="digit-select">
          <option value="2">2桁</option>
          <option value="3">3桁</option>
          <option value="4" selected>4桁</option>
          <option value="5">5桁</option>
          <option value="6">6桁</option>
          <option value="7">7桁</option>
          <option value="8">8桁</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="time-select">表示時間</label>
        <select id="time-select">
          <option value="2">2秒</option>
          <option value="3" selected>3秒</option>
          <option value="5">5秒</option>
        </select>
      </div>

      <div class="highscore-box">
        <span class="hs-label">ハイスコア</span>
        <span class="hs-value" id="highscore">0</span>
        <span class="hs-unit">連続正解</span>
      </div>

      <button id="btn-start" class="btn-primary">スタート</button>
    </div>

    <!-- 数字表示画面 -->
    <div id="screen-show" class="screen hidden">
      <h2>覚えて！</h2>
      <div id="number-display" class="number-display"></div>
      <div class="timer-wrap">
        <div id="timer-bar" class="timer-bar"></div>
      </div>
      <p id="countdown-text" class="countdown-text"></p>
    </div>

    <!-- 入力画面 -->
    <div id="screen-input" class="screen hidden">
      <h2>何の数字でしたか？</h2>
      <input type="number" id="answer-input" class="answer-input"
        placeholder="数字を入力してください" inputmode="numeric" autocomplete="off">
      <button id="btn-submit" class="btn-primary">決定</button>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen hidden">
      <div id="result-icon" class="result-icon"></div>
      <div id="result-label" class="result-label"></div>
      <div id="correct-answer" class="correct-answer"></div>

      <div class="score-row">
        <div class="score-item">
          <span class="score-num" id="current-score">0</span>
          <span class="score-label">連続正解</span>
        </div>
        <div class="score-item best">
          <span class="score-num" id="highscore-result">0</span>
          <span class="score-label">ハイスコア</span>
        </div>
      </div>

      <button id="btn-next" class="btn-primary">次の問題へ</button>
      <button id="btn-home" class="btn-secondary">設定に戻る</button>
    </div>

  </div>
  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ クイズの解答はあくまで目安です。最新の情報は公式資料等でご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. やり直せますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、ページを再読み込みするとやり直せます。</dd>
      <dt style="font-weight:600;">Q. 正解の解説はありますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">正解・不正解後に解説が表示されます。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
