<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>実質賃金チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>実質賃金チェッカー</h1>
    <p class="subtitle">物価上昇による購買力低下をすぐ確認</p>

    <section class="input-section">
      <div class="form-group">
        <label for="salary">月給（円）</label>
        <input type="number" id="salary" placeholder="例：300000" min="0">
      </div>
      <div class="form-group">
        <label for="inflation">物価上昇率（%）</label>
        <input type="number" id="inflation" placeholder="例：3.5" step="0.1" min="0">
      </div>
      <button id="calcBtn">計算する</button>
    </section>

    <section class="result-section" id="resultSection" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-grid">
        <div class="result-card nominal">
          <div class="card-label">現在の月給（名目）</div>
          <div class="card-value" id="nominalSalary">―</div>
        </div>
        <div class="result-card real">
          <div class="card-label">実質賃金（購買力換算）</div>
          <div class="card-value" id="realSalary">―</div>
        </div>
        <div class="result-card loss">
          <div class="card-label">目減り額（月）</div>
          <div class="card-value loss-value" id="salaryLoss">―</div>
        </div>
        <div class="result-card annual">
          <div class="card-label">目減り額（年）</div>
          <div class="card-value loss-value" id="annualLoss">―</div>
        </div>
      </div>

      <div class="power-section">
        <div class="power-label">購買力の残り</div>
        <div class="power-bar-wrap">
          <div class="power-bar" id="powerBar"></div>
          <div class="power-bar-label" id="powerBarLabel"></div>
        </div>
        <p class="power-desc" id="powerDesc"></p>
      </div>

      <div class="example-section">
        <h3>具体的なイメージ</h3>
        <div class="examples" id="examples"></div>
      </div>
    </section>

    <section class="history-section" id="historySection" style="display:none;">
      <h2>計算履歴</h2>
      <ul id="historyList"></ul>
      <button id="clearHistory" class="clear-btn">履歴を削除</button>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
