<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鍵管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔑 鍵管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>鍵を登録する</h2>
      <div class="form-group">
        <label for="keyNumber">鍵番号</label>
        <input type="text" id="keyNumber" placeholder="例：A-001" maxlength="20">
      </div>
      <div class="form-group">
        <label for="borrower">貸出先</label>
        <input type="text" id="borrower" placeholder="例：山田太郎" maxlength="30">
      </div>
      <div class="form-group">
        <label for="note">メモ（任意）</label>
        <input type="text" id="note" placeholder="例：フロント出入り口" maxlength="50">
      </div>
      <button id="addBtn" class="btn btn-primary">登録する</button>
    </section>

    <!-- 統計 -->
    <section class="stats-section">
      <div class="stat-card">
        <span class="stat-label">総鍵数</span>
        <span class="stat-value" id="totalCount">0</span>
      </div>
      <div class="stat-card lending">
        <span class="stat-label">貸出中</span>
        <span class="stat-value" id="lendingCount">0</span>
      </div>
      <div class="stat-card returned">
        <span class="stat-label">返却済み</span>
        <span class="stat-value" id="returnedCount">0</span>
      </div>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="lending">貸出中</button>
      <button class="filter-btn" data-filter="returned">返却済み</button>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <ul id="keyList" class="key-list"></ul>
      <p id="emptyMsg" class="empty-msg">登録された鍵はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
