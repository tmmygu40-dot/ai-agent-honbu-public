<body>
<div class="page-intro-card">
  <h1>数秘術ラッキー数字診断</h1>
  <p class="lead">生年月日からライフパスナンバーを計算し、ラッキー数字を診断。</p>
  <p class="sub-lead">数字に込められた性格傾向と、今日のラッキー数字を一緒にチェック。</p>
</div>

<div class="app-card">
  <h2>生年月日を入力</h2>
<div class="field"><label>生年月日</label>
        <input type="date" id="bd"></div>
      <button class="btn" onclick="run()">ライフパスを計算</button>
  <div id="result" class="result empty">↑ボタンを押すと結果が表示されます</div>
</div>

<script>

const M={
1:['1: リーダーの数。今日は前に出るほど運が開く。','行動派'],
2:['2: 調和の数。人とのつながりが運を運ぶ。','調整役'],
3:['3: 創造の数。表現を楽しむと幸運。','クリエイター'],
4:['4: 安定の数。コツコツが実る日。','土台作り'],
5:['5: 自由の数。変化を恐れず動こう。','冒険家'],
6:['6: 愛の数。誰かを思いやると運気上昇。','面倒見が良い'],
7:['7: 探究の数。一人で考える時間が吉。','分析家'],
8:['8: 達成の数。数字や成果に強い日。','実行者'],
9:['9: 完了の数。手放しと締めくくりに集中。','理想家'],
11:['11: 直感の数。閃きを書き留めて。','インスピレーション'],
22:['22: 大いなる建設者。スケールの大きい計画に最適。','ビジョナリー'],
33:['33: 慈愛の数。誰かに優しくすると倍返し。','ヒーラー']};
function reduce(n){while(![11,22,33].includes(n)&&n>9){n=String(n).split('').reduce((a,b)=>a+ +b,0);}return n;}
function run(){const bd=document.getElementById('bd').value;if(!bd){alert('生年月日を入力してください');return;}const sum=bd.replace(/-/g,'').split('').reduce((a,b)=>a+ +b,0);const path=reduce(sum);const today=new Date();const tNum=reduce(today.getFullYear()+today.getMonth()+1+today.getDate());const info=M[path]||['特別な数。直感を大切に。',''];const r='ライフパスナンバー: '+path+'\nタイプ: '+info[1]+'\n\n'+info[0]+'\n\n今日のラッキー数字: '+tNum;document.getElementById('result').classList.remove('empty');document.getElementById('result').textContent=r;}

</script>
