<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="たった5問のYES/NOに答えるだけで、あなたの節約タイプを診断。ケチ？浪費家？バランス型？自分の金銭感覚がサクッと分かります。">
  <title>節約タイプ診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 診断専用スタイル ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); text-align: center;
      margin-bottom: 0.8rem;
    }
    .quiz-progress-bar {
      width: 100%; height: 6px; background: var(--border);
      border-radius: 3px; margin-bottom: 1rem; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease;
    }
    .quiz-question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      text-align: center; margin-bottom: 1.2rem; min-height: 3em;
    }
    .quiz-buttons {
      display: flex; gap: 0.8rem; justify-content: center;
    }
    .quiz-buttons button {
      flex: 1; max-width: 200px; padding: 0.9rem 1rem;
      font-size: 1rem; font-weight: 800; border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      background: var(--card); color: var(--text);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quiz-buttons .btn-yes:hover, .quiz-buttons .btn-yes:active {
      background: var(--ok-bg); border-color: var(--ok); color: var(--ok);
    }
    .quiz-buttons .btn-no:hover, .quiz-buttons .btn-no:active {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng);
    }

    .type-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .type-name { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.6rem; }
    .type-desc { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 1rem; }
    .type-advice {
      font-size: 0.88rem; line-height: 1.6; padding: 0.8rem 1rem;
      background: var(--accent-light); border-radius: 10px;
      border-left: 3px solid var(--accent);
    }

    .share-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0.8rem auto 0; padding: 0.7rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .share-btn:hover { background: var(--accent); color: #fff; }

    .restart-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0.6rem auto 0; padding: 0.7rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

    .prev-result {
      font-size: 0.78rem; color: var(--text-sub); text-align: center;
      margin-top: 0.5rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💰 節約タイプ診断</h1>
    <p class="subtitle">たった5問のYES/NOで、あなたがケチなのか浪費家なのか丸わかり。</p>
  </header>

  <!-- 診断カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">診断スタート</p>
    <div class="quiz-progress" id="progress-text">Q1 / 5</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill" style="width:20%"></div></div>
    <p class="quiz-question" id="question">読み込み中…</p>
    <div class="quiz-buttons">
      <button class="btn-yes" onclick="answer(true)">⭕ YES</button>
      <button class="btn-no" onclick="answer(false)">❌ NO</button>
    </div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの節約タイプ</p>
    <p class="type-emoji" id="type-emoji"></p>
    <p class="type-name result-value" id="type-name"></p>
    <p class="result-eval" id="type-tagline"></p>
    <p class="type-desc" id="type-desc"></p>
    <div class="type-advice" id="type-advice"></div>
  </div>

  <!-- 回答内訳 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">あなたの回答</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="share-btn no-print" id="share-btn" style="display:none" onclick="shareResult()">📋 結果をコピーしてシェア</button>
  <button class="restart-btn no-print" id="restart-btn" style="display:none" onclick="restart()">🔄 もう一度診断する</button>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    { text: 'コンビニで「ついで買い」をほとんどしない', savvy: true },
    { text: '友達との食事では割り勘の端数が気になる', savvy: true },
    { text: 'セールや限定品を見るとつい買ってしまう', savvy: false },
    { text: '毎月の貯金額をだいたい把握している', savvy: true },
    { text: 'ご褒美と称して月に1回以上プチ贅沢する', savvy: false }
  ];

  var TYPES = [
    {
      min: 5, max: 5,
      emoji: '🏦', name: '鉄壁の節約マスター',
      level: 'ok',
      tagline: '財布のヒモは鋼鉄製！',
      desc: '完璧な自制心の持ち主。無駄遣いとは無縁で、将来設計もバッチリ。ただし、たまには自分へのご褒美も忘れずに。',
      advice: '💡 節約は素晴らしいけど、ケチと思われないよう「使うところは使う」メリハリを意識すると人間関係もスムーズに。'
    },
    {
      min: 3, max: 4,
      emoji: '⚖️', name: 'バランス型しっかりさん',
      level: 'ok',
      tagline: '使うときは使う、締めるときは締める',
      desc: '節約と楽しみのバランスが取れた理想的なタイプ。家計管理の基本ができていて、無理なく貯金もできているはず。',
      advice: '💡 今の感覚をキープしつつ、固定費の見直しでさらにラクに貯められるかも。年に1回のサブスク棚卸しがおすすめ。'
    },
    {
      min: 1, max: 2,
      emoji: '🛍️', name: 'プチ贅沢エンジョイ派',
      level: 'warn',
      tagline: '人生を楽しむのが上手、でもお財布はヒヤヒヤ',
      desc: '楽しいことにお金を使うのが得意なタイプ。日々の満足度は高いけど、気づいたら「あれ、今月もう残高が…」となりがち。',
      advice: '💡 まず「先取り貯金」を1つだけ設定してみて。残りで楽しむスタイルなら、罪悪感なく贅沢できます。'
    },
    {
      min: 0, max: 0,
      emoji: '🎉', name: '豪快フルスロットル浪費家',
      level: 'ng',
      tagline: '今が楽しければOK！…だけど大丈夫？',
      desc: 'お金は使うためにある！という信念の持ち主。経験値は高いけど、通帳を見るのがちょっと怖いかも。',
      advice: '💡 まずは1週間だけ支出を記録してみて。「見える化」するだけで自然とブレーキがかかります。小さな一歩から。'
    }
  ];

  var currentQ = 0;
  var answers = [];

  function init() {
    currentQ = 0;
    answers = [];
    showQuestion();
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('share-btn').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';

    var prev = localStorage.getItem('savingtype_result');
    var prevEl = document.getElementById('prev-result');
    if (prevEl) prevEl.remove();
    if (prev) {
      var p = document.createElement('p');
      p.className = 'prev-result';
      p.id = 'prev-result';
      p.textContent = '前回の結果: ' + prev;
      document.getElementById('quiz-card').after(p);
    }
  }

  function showQuestion() {
    var q = QUESTIONS[currentQ];
    document.getElementById('question').textContent = q.text;
    document.getElementById('progress-text').textContent = 'Q' + (currentQ + 1) + ' / 5';
    document.getElementById('progress-fill').style.width = ((currentQ + 1) / 5 * 100) + '%';
  }

  function answer(yes) {
    var q = QUESTIONS[currentQ];
    var isSavvy = q.savvy ? yes : !yes;
    answers.push({ question: q.text, answered: yes, savvy: isSavvy });
    currentQ++;

    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    var score = answers.reduce(function(s, a) { return s + (a.savvy ? 1 : 0); }, 0);
    var type = TYPES.find(function(t) { return score >= t.min && score <= t.max; });

    document.getElementById('quiz-card').style.display = 'none';
    var prevEl = document.getElementById('prev-result');
    if (prevEl) prevEl.remove();

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + type.level;
    rc.style.display = 'block';
    document.getElementById('type-emoji').textContent = type.emoji;
    document.getElementById('type-name').textContent = type.name;
    document.getElementById('type-tagline').textContent = type.tagline;
    document.getElementById('type-desc').textContent = type.desc;
    document.getElementById('type-advice').innerHTML = type.advice;

    // 回答内訳
    var html = answers.map(function(a, i) {
      return '<tr><td>Q' + (i + 1) + '. ' + a.question + '</td>'
           + '<td>' + (a.answered ? '⭕ YES' : '❌ NO') + '</td></tr>';
    }).join('');
    html += '<tr class="hl"><td>節約スコア</td><td>' + score + ' / 5</td></tr>';
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = 'block';

    document.getElementById('share-btn').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'block';

    localStorage.setItem('savingtype_result', type.name);
  }

  function shareResult() {
    var name = document.getElementById('type-name').textContent;
    var tagline = document.getElementById('type-tagline').textContent;
    var text = '【節約タイプ診断の結果】\n'
             + name + '\n'
             + tagline + '\n'
             + '#節約タイプ診断';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('share-btn');
        btn.textContent = '✅ コピーしました！';
        setTimeout(function() { btn.textContent = '📋 結果をコピーしてシェア'; }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.getElementById('share-btn');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = '📋 結果をコピーしてシェア'; }, 2000);
    }
  }

  function restart() {
    init();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
