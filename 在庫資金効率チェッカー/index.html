<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫資金効率チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>在庫資金効率チェッカー</h1>
    <p class="subtitle">在庫回転日数・資金拘束額を品目ごとに確認</p>

    <section class="form-section">
      <h2>品目を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：A部品">
        </div>
        <div class="form-group">
          <label for="stockQty">在庫数</label>
          <input type="number" id="stockQty" placeholder="例：100" min="0">
        </div>
        <div class="form-group">
          <label for="unitCost">仕入れ単価（円）</label>
          <input type="number" id="unitCost" placeholder="例：500" min="0">
        </div>
        <div class="form-group">
          <label for="monthlyUsage">月間消費数</label>
          <input type="number" id="monthlyUsage" placeholder="例：30" min="1">
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">登録する</button>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-label">品目数</div>
          <div class="summary-value" id="totalItems">0</div>
        </div>
        <div class="summary-card highlight">
          <div class="summary-label">合計資金拘束額</div>
          <div class="summary-value" id="totalFunds">¥0</div>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録品目一覧</h2>
        <div class="sort-controls">
          <label>並び替え：</label>
          <select id="sortSelect" onchange="renderList()">
            <option value="default">登録順</option>
            <option value="turnover_desc">回転日数（長い順）</option>
            <option value="turnover_asc">回転日数（短い順）</option>
            <option value="funds_desc">資金拘束額（多い順）</option>
          </select>
        </div>
      </div>
      <div id="itemList">
        <p class="empty-msg">まだ品目が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
