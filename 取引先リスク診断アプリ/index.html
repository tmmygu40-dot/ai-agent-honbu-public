<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取引先リスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --danger: #7c3aed; --danger-bg: #f5f3ff;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── チェックリスト ── */
    .check-section { margin-bottom: 1.4rem; }
    .check-section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin-bottom: 0.6rem; padding: 0.3rem 0;
      border-bottom: 1px dashed var(--border);
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] {
      width: 1.2rem; height: 1.2rem; flex-shrink: 0; margin-top: 0.1rem;
      accent-color: var(--ng); cursor: pointer;
    }
    .check-item .item-text {
      font-size: 0.9rem; line-height: 1.45; color: var(--text);
    }
    .check-item .item-weight {
      font-size: 0.72rem; color: var(--text-sub); margin-left: auto; flex-shrink: 0; padding-top: 0.1rem;
    }
    .check-item:has(input:checked) { background: #fff5f5; border-radius: 8px; }
    .check-item:has(input:checked) .item-text { color: var(--ng); font-weight: 600; }

    /* スコアバー */
    .score-bar-wrap {
      margin: 0.8rem 0 0;
      background: var(--border); border-radius: 99px; height: 8px; overflow: hidden;
    }
    .score-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #15803d, #b45309, #b91c1c, #7c3aed);
      transition: width 0.4s;
    }
    .score-counter {
      text-align: right; font-size: 0.78rem; font-weight: 700; color: var(--text-sub); margin-top: 0.3rem;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok     { border-color: var(--ok);     background: var(--ok-bg);     }
    .result-card.warn   { border-color: var(--warn);   background: var(--warn-bg);   }
    .result-card.ng     { border-color: var(--ng);     background: var(--ng-bg);     }
    .result-card.danger { border-color: var(--danger); background: var(--danger-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok     .result-value { color: var(--ok);     }
    .result-card.warn   .result-value { color: var(--warn);   }
    .result-card.ng     .result-value { color: var(--ng);     }
    .result-card.danger .result-value { color: var(--danger); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.6; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* 保存リスト */
    .saved-item {
      padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;
    }
    .saved-item:last-child { border-bottom: none; }
    .saved-badge {
      font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.5rem;
      border-radius: 99px; flex-shrink: 0;
    }
    .saved-badge.ok     { background: var(--ok-bg);     color: var(--ok);     }
    .saved-badge.warn   { background: var(--warn-bg);   color: var(--warn);   }
    .saved-badge.ng     { background: var(--ng-bg);     color: var(--ng);     }
    .saved-badge.danger { background: var(--danger-bg); color: var(--danger); }
    .saved-name { flex: 1; font-weight: 600; }
    .saved-score { color: var(--text-sub); font-size: 0.78rem; }
    .saved-del { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 1rem; padding: 0.1rem 0.3rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>取引先リスク診断アプリ</h1>
    <p class="subtitle">仕入れ先の倒産兆候をチェックして取引リスクを即診断</p>
  </header>

  <!-- 仕入れ先名入力 -->
  <div class="card">
    <p class="card-title">仕入れ先情報</p>
    <div class="field">
      <label for="supplier-name">仕入れ先名（任意）</label>
      <input type="text" id="supplier-name" placeholder="例：〇〇商事">
    </div>
  </div>

  <!-- チェックリスト -->
  <div class="card">
    <p class="card-title">倒産兆候チェックリスト</p>
    <p style="font-size:0.8rem;color:var(--text-sub);margin-bottom:1rem;">当てはまる項目にチェックしてください。チェック数が多いほどリスクが高まります。</p>

    <div class="check-section">
      <p class="check-section-title">💰 資金・支払い関係</p>

      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">支払いが遅延するようになった（手形・振込の引き延ばし）</span>
        <span class="item-weight">+2</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">決算書・財務資料の開示を嫌がるようになった</span>
        <span class="item-weight">+2</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">突然の大幅値引き要求・支払条件の変更を求めてきた</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">銀行融資の条件変更・保証人追加などの噂がある</span>
        <span class="item-weight">+2</span>
      </label>
    </div>

    <div class="check-section">
      <p class="check-section-title">👥 人材・組織関係</p>

      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">担当者・営業担当が頻繁に変わる</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">幹部・経営陣の離職・退職が相次いでいる</span>
        <span class="item-weight">+2</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">求人広告を大量に出している（人材流出の補充）</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">従業員数が目に見えて減っている</span>
        <span class="item-weight">+1</span>
      </label>
    </div>

    <div class="check-section">
      <p class="check-section-title">📦 事業・取引関係</p>

      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">主要取引先・大口顧客を失った</span>
        <span class="item-weight">+2</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">発注量が突然大幅に減った</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">在庫が異常に積み上がっている・保管状況が悪化</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">工場・倉庫の稼働率が明らかに低下している</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">関連会社・子会社が廃業・撤退した</span>
        <span class="item-weight">+2</span>
      </label>
    </div>

    <div class="check-section">
      <p class="check-section-title">🏢 対応・コミュニケーション関係</p>

      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">連絡がつきにくくなった・レスポンスが遅い</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">社屋の照明が暗い・清掃が行き届いていない（節電・人員不足）</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">設備投資・機器更新を一切行っていない</span>
        <span class="item-weight">+1</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="2">
        <span class="item-text">第三者保証・担保の提供を求めてくるようになった</span>
        <span class="item-weight">+2</span>
      </label>
      <label class="check-item">
        <input type="checkbox" class="risk-check" value="1">
        <span class="item-text">業界内で経営不振・資金繰り悪化の噂が流れている</span>
        <span class="item-weight">+1</span>
      </label>
    </div>

    <!-- スコアバー -->
    <div class="score-bar-wrap">
      <div class="score-bar" id="score-bar" style="width:0%"></div>
    </div>
    <p class="score-counter" id="score-counter">チェック数：0件 / スコア：0点</p>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">リスクを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="rl">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
    <button class="btn-reset" style="margin-top:1rem;" onclick="saveResult()">この診断結果を保存する</button>
  </div>

  <!-- リセットボタン -->
  <button class="btn-reset" onclick="resetAll()">チェックをリセットする</button>

  <!-- 保存済みリスト -->
  <div class="card" id="saved-card" style="display:none">
    <p class="card-title">保存済み診断履歴</p>
    <div id="saved-list"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var MAX_SCORE = 26; // 全チェック項目の合計ウェイト

  // チェックボックス変更時にスコアバーを更新
  document.querySelectorAll('.risk-check').forEach(function(cb) {
    cb.addEventListener('change', updateBar);
  });

  function calcScore() {
    var score = 0, count = 0;
    document.querySelectorAll('.risk-check:checked').forEach(function(cb) {
      score += parseInt(cb.value);
      count++;
    });
    return { score: score, count: count };
  }

  function updateBar() {
    var r = calcScore();
    var pct = Math.min(100, Math.round(r.score / MAX_SCORE * 100));
    document.getElementById('score-bar').style.width = pct + '%';
    document.getElementById('score-counter').textContent =
      'チェック数：' + r.count + '件 / スコア：' + r.score + '点（最大' + MAX_SCORE + '点）';
  }

  function diagnose() {
    var r = calcScore();
    var score = r.score;
    var level, label, note;

    if (score <= 4) {
      level = 'ok';
      label = '低リスク';
      note = '現時点での倒産リスクは低い状況です。定期的なモニタリングを継続しながら通常通り取引を続けて問題ありません。';
    } else if (score <= 9) {
      level = 'warn';
      label = '要注意';
      note = 'いくつかの兆候が見られます。支払い状況を注意深く確認し、与信限度額の見直しや取引条件の再確認を検討してください。';
    } else if (score <= 15) {
      level = 'ng';
      label = '高リスク';
      note = '複数の危険信号が確認されています。新規受注・発注の抑制や、代替仕入れ先の確保を早急に進めることをお勧めします。';
    } else {
      level = 'danger';
      label = '危険：取引停止を検討';
      note = '深刻な倒産兆候が多数見られます。既存売掛金の回収を最優先とし、新規取引の停止と代替先への切り替えを強く推奨します。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rl').textContent = '診断結果';
    document.getElementById('rv').textContent = label;
    document.getElementById('rn').textContent = '総合スコア：' + score + '点（最大' + MAX_SCORE + '点）\n' + note;

    // 内訳
    var checkedItems = [];
    document.querySelectorAll('.risk-check:checked').forEach(function(cb) {
      var text = cb.parentElement.querySelector('.item-text').textContent.trim();
      checkedItems.push([text.substring(0, 20) + (text.length > 20 ? '…' : ''), '+' + cb.value + '点']);
    });
    var rows = [];
    if (checkedItems.length === 0) {
      rows.push(['該当項目', 'なし']);
    } else {
      checkedItems.forEach(function(item) { rows.push(item); });
    }
    rows.push(['合計スコア', score + '点', true]);
    rows.push(['判定', label, true]);

    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function saveResult() {
    var r = calcScore();
    var name = document.getElementById('supplier-name').value.trim() || '（名前なし）';
    var score = r.score;
    var level;
    if (score <= 4) level = 'ok';
    else if (score <= 9) level = 'warn';
    else if (score <= 15) level = 'ng';
    else level = 'danger';
    var label = { ok: '低リスク', warn: '要注意', ng: '高リスク', danger: '危険' }[level];
    var date = new Date().toLocaleDateString('ja-JP');

    var saved = JSON.parse(localStorage.getItem('torihiki_risk_saved') || '[]');
    saved.unshift({ name: name, score: score, level: level, label: label, date: date });
    if (saved.length > 20) saved = saved.slice(0, 20);
    localStorage.setItem('torihiki_risk_saved', JSON.stringify(saved));
    renderSaved();
  }

  function renderSaved() {
    var saved = JSON.parse(localStorage.getItem('torihiki_risk_saved') || '[]');
    var card = document.getElementById('saved-card');
    var list = document.getElementById('saved-list');
    if (saved.length === 0) { card.style.display = 'none'; return; }
    card.style.display = '';
    list.innerHTML = saved.map(function(item, idx) {
      return '<div class="saved-item">'
        + '<span class="saved-badge ' + item.level + '">' + item.label + '</span>'
        + '<span class="saved-name">' + escHtml(item.name) + '</span>'
        + '<span class="saved-score">' + item.score + '点 / ' + item.date + '</span>'
        + '<button class="saved-del" onclick="deleteSaved(' + idx + ')" title="削除">✕</button>'
        + '</div>';
    }).join('');
  }

  function deleteSaved(idx) {
    var saved = JSON.parse(localStorage.getItem('torihiki_risk_saved') || '[]');
    saved.splice(idx, 1);
    localStorage.setItem('torihiki_risk_saved', JSON.stringify(saved));
    renderSaved();
  }

  function resetAll() {
    document.querySelectorAll('.risk-check').forEach(function(cb) { cb.checked = false; });
    document.getElementById('supplier-name').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    updateBar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期化
  renderSaved();
  updateBar();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
