<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粗利管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>粗利管理アプリ</h1>
  </header>

  <main>
    <section class="form-section">
      <h2>商品を登録</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：リンゴジュース" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="costPrice">仕入れ値（円）</label>
          <input type="number" id="costPrice" placeholder="例：100" min="0" step="1">
        </div>
        <div class="form-group">
          <label for="sellPrice">販売価格（円）</label>
          <input type="number" id="sellPrice" placeholder="例：250" min="0" step="1">
        </div>
      </div>
      <button id="addBtn" onclick="addProduct()">登録する</button>
      <p id="errorMsg" class="error"></p>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="summary-label">登録商品数</span>
          <span class="summary-value" id="totalCount">0</span>
          <span class="summary-unit">件</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">平均粗利率</span>
          <span class="summary-value" id="avgMargin">0</span>
          <span class="summary-unit">%</span>
        </div>
        <div class="summary-card highlight">
          <span class="summary-label">最高粗利商品</span>
          <span class="summary-value small" id="topProduct">—</span>
        </div>
      </div>
    </section>

    <section class="list-section" id="listSection" style="display:none;">
      <div class="list-header">
        <h2>商品ランキング</h2>
        <div class="sort-buttons">
          <button class="sort-btn active" onclick="setSortMode('profit')" id="sortProfit">粗利額順</button>
          <button class="sort-btn" onclick="setSortMode('margin')" id="sortMargin">粗利率順</button>
          <button class="sort-btn" onclick="setSortMode('name')" id="sortName">名前順</button>
        </div>
      </div>
      <div id="productList"></div>
    </section>

    <section class="empty-section" id="emptySection">
      <p>商品を登録するとランキングが表示されます</p>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
