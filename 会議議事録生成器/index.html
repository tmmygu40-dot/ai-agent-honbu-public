<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 会議議事録生成器</title>
  <meta name="description" content="議題と参加者を入力するだけで、会議の議事録テンプレが自動生成される無料ツール。会議後の議事録作成時間を大幅削減できます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📝 会議議事録生成器</h1>
    <p class="subtitle">議題と参加者を入れるだけで、会議の議事録テンプレが自動生成されます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">議事録の情報を入力</p>
    <div class="field">
      <label for="f1">議題</label>
      <input type="text" id="f1" placeholder="例: Q2マーケティング戦略会議">
      <p class="hint">会議の主題・目的を入力してください</p>
    </div>
    <div class="field">
      <label for="f2">開始時間</label>
      <input type="datetime-local" id="f2">
    </div>
    <div class="field">
      <label for="f3">参加者</label>
      <input type="text" id="f3" placeholder="例: 山田太郎、鈴木花子、佐藤次郎">
      <p class="hint">カンマで区切ってください</p>
    </div>
    <div class="field">
      <label for="f4">主な議論内容</label>
      <textarea id="f4" placeholder="例: 予算配分、新広告キャンペーン、SNS戦略" style="width:100%;padding:0.72rem 0.9rem;font-size:1rem;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);outline:none;resize:vertical;font-family:inherit;"></textarea>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generateMinutes()">📋 議事録を生成する</button>

  <!-- ダウンロードボタン（生成後に表示） -->
  <button id="download-btn" class="btn-calc" onclick="downloadMinutes()" style="background:#666;box-shadow:0 4px 0 #444, 0 6px 16px rgba(0,0,0,0.2);display:none;">💾 テキストをダウンロード</button>

  <!-- 議事録表示カード -->
  <div class="result-card" id="result" style="display:none">
    <p class="result-label">生成された議事録</p>
    <div id="rv" style="white-space:pre-wrap;font-family:monospace;font-size:0.9rem;line-height:1.6;color:var(--text);text-align:left;">—</div>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📋 生成されたテンプレートは、必要に応じてご自身の組織の議事録ルールに合わせてお修正のうえご利用ください。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 結果別Q&A・絵文字ひとこと（不安・備え系アプリのみ true に） ──
  var ENABLE_RESULT_QA = false;

  var EMOJI_MSG = {
    ok:   { e: '😌', t: 'ほっ、今回は大丈夫そう' },
    warn: { e: '🤔', t: 'うーん、少し見直すと安心' },
    ng:   { e: '😱', t: 'ガーン、早めに確認しよう' }
  };

  var QA = {
    ok: [
      { q: '今のままで大丈夫？', a: '今回は安心ゾーンです。今の習慣を続けるのが一番の備えになります。' },
      { q: 'もっと余裕を持つには？', a: '毎月少しずつ見直すだけで、急な変化にも慌てずに済みます。' },
      { q: '備えを強化するなら？', a: '家庭の備蓄や保険の見直しを、年に1回チェックしておくと安心です。' },
      { q: '比較・確認したい時は？', a: '同じ条件で他のプランも見ておくと、選び直す目安になります。' }
    ],
    warn: [
      { q: 'すぐ危ない？', a: 'すぐに危険ではありません。今のうちに確認すると後で楽になります。' },
      { q: '何から見直す？', a: '一番金額が大きい項目・一番頻度が高い項目から1つずつで十分です。' },
      { q: '備えを足すなら？', a: '足りない部分だけ補えばOK。一気に揃える必要はありません。' },
      { q: '比較してみたい時は？', a: '今の条件をメモして、別の選択肢と並べて見ると判断しやすくなります。' }
    ],
    ng: [
      { q: 'パニックになりそう…', a: '焦らなくて大丈夫です。やることを「今日／今週／今月」に分ければ進められます。' },
      { q: '今日できることは？', a: 'まず現状をメモして、家族や関係者と共有するだけでも一歩前進です。' },
      { q: '相談したほうがいい？', a: '一人で抱え込まず、専門窓口・公的相談を見ておくのも一つの方法です。' },
      { q: '備えや代替を探すなら？', a: '同じ用途の代替・比較情報を見ておくと、選択肢が広がって安心できます。' }
    ]
  };

  var lastMinutes = '';

  function generateMinutes() {
    var title = document.getElementById('f1').value.trim();
    var time = document.getElementById('f2').value;
    var members = document.getElementById('f3').value.trim();
    var content = document.getElementById('f4').value.trim();

    if (!title) { alert('議題を入力してください'); return; }

    // 日時のフォーマット
    var dateStr = '';
    if (time) {
      var d = new Date(time);
      dateStr = d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
                ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    } else {
      var now = new Date();
      dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    }

    // 議事録を生成
    var minutes = '━━━━━━━━━━━━━━━━━━━━━━━\n' +
                  '        会議議事録\n' +
                  '━━━━━━━━━━━━━━━━━━━━━━━\n\n' +
                  '【議題】\n' + title + '\n\n' +
                  '【日時】\n' + dateStr + '\n\n' +
                  '【参加者】\n' + (members ? members + '\n' : '（記入漏れ）\n') + '\n' +
                  '【主な議論内容】\n' + (content ? content + '\n' : '（記入漏れ）\n') + '\n' +
                  '【決定事項】\n（決定内容をここに記入）\n\n' +
                  '【次のアクション】\n' +
                  '実施予定: ____________\n' +
                  '担当者: ____________\n\n' +
                  '【備考】\n' +
                  '（特記事項があれば記入）\n\n' +
                  '━━━━━━━━━━━━━━━━━━━━━━━\n' +
                  '記録日: ' + new Date().toLocaleDateString('ja-JP') + '\n' +
                  '━━━━━━━━━━━━━━━━━━━━━━━';

    lastMinutes = minutes;

    // 保存と表示
    saveToLocalStorage();
    showMinutes(minutes);
    document.getElementById('download-btn').style.display = 'block';
  }

  function showMinutes(text) {
    var rc = document.getElementById('result');
    rc.style.display = '';
    document.getElementById('rv').textContent = text;
  }

  function downloadMinutes() {
    if (!lastMinutes) { alert('まず議事録を生成してください'); return; }
    var blob = new Blob([lastMinutes], { type: 'text/plain; charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = 'minutes_' + new Date().getTime() + '.txt';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function saveToLocalStorage() {
    var data = {
      title: document.getElementById('f1').value,
      time: document.getElementById('f2').value,
      members: document.getElementById('f3').value,
      content: document.getElementById('f4').value,
      minutes: lastMinutes,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('meetingMinutesData', JSON.stringify(data));
  }

  function loadFromLocalStorage() {
    var data = localStorage.getItem('meetingMinutesData');
    if (data) {
      try {
        var obj = JSON.parse(data);
        document.getElementById('f1').value = obj.title || '';
        document.getElementById('f2').value = obj.time || '';
        document.getElementById('f3').value = obj.members || '';
        document.getElementById('f4').value = obj.content || '';
        if (obj.minutes) {
          lastMinutes = obj.minutes;
          showMinutes(obj.minutes);
          document.getElementById('download-btn').style.display = 'block';
        }
      } catch(e) {}
    }
  }

  // ページロード時に復元
  window.addEventListener('DOMContentLoaded', loadFromLocalStorage);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
