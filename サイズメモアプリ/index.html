<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイズメモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>👗 サイズメモ</h1>

    <!-- メンバー登録 -->
    <section class="section">
      <h2>メンバー</h2>
      <div class="input-row">
        <input type="text" id="memberNameInput" placeholder="名前を入力（例：パパ）" maxlength="20">
        <button id="addMemberBtn">追加</button>
      </div>
      <div id="memberList" class="member-tabs"></div>
    </section>

    <!-- サイズ入力 -->
    <section class="section" id="sizeSection" style="display:none;">
      <h2 id="sizeTitle">サイズ入力</h2>
      <div class="input-row">
        <select id="categorySelect">
          <option value="">カテゴリ選択</option>
          <option value="トップス">トップス</option>
          <option value="ボトムス">ボトムス</option>
          <option value="アウター">アウター</option>
          <option value="靴">靴</option>
          <option value="帽子">帽子</option>
          <option value="その他">その他</option>
        </select>
        <input type="text" id="sizeInput" placeholder="サイズ（例：M, 26cm）" maxlength="20">
        <button id="addSizeBtn">追加</button>
      </div>
      <div id="sizeList" class="size-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
