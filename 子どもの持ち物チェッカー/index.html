<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子どもの持ち物チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 持ち物チェッカー</h1>
      <p class="today-label" id="todayLabel"></p>
    </header>

    <nav class="day-tabs" id="dayTabs">
      <button class="tab-btn" data-day="0">月</button>
      <button class="tab-btn" data-day="1">火</button>
      <button class="tab-btn" data-day="2">水</button>
      <button class="tab-btn" data-day="3">木</button>
      <button class="tab-btn" data-day="4">金</button>
      <button class="tab-btn" data-day="5">土</button>
      <button class="tab-btn" data-day="6">日</button>
    </nav>

    <main>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">0 / 0 チェック済み</p>

      <div class="input-row">
        <input type="text" id="itemInput" placeholder="持ち物を追加..." maxlength="40">
        <button id="addBtn">追加</button>
      </div>

      <ul class="item-list" id="itemList"></ul>

      <div class="actions">
        <button class="reset-btn" id="resetBtn">チェックをリセット</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
