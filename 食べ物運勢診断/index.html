  <title>食べ物運勢診断｜好きな食べ物3つで今月の運勢が分かる</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"

  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.6rem; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.7rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 700; color: var(--text); font-size: 1.05rem; }
    .personality-card {
      display: none;
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.3rem 1.2rem;
      margin: 0 auto 1rem; max-width: 600px;
      text-align: center;
    }
    .personality-emoji { font-size: 2.6rem; line-height: 1.2; margin-bottom: 0.4rem; }
    .personality-title { font-size: 1.2rem; font-weight: 900; color: var(--accent); margin-bottom: 0.5rem; }
    .personality-text { font-size: 0.92rem; color: var(--text); line-height: 1.7; text-align: left; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .personality-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>食べ物運勢診断</h1>
    <p class="subtitle">好きな食べ物3つで、今月の運勢と隠れた性格をサクッと診断 ※エンタメ用途の目安です</p>
  </header>

  <div class="card">
    <p class="card-title">3つ選んでください</p>
    <div class="field">
      <label for="f1">朝ごはんに食べたいもの</label>
      <select id="f1">
        <option value="">選んでください</option>
        <option value="0">ごはん・お味噌汁</option>
        <option value="1">食パン・トースト</option>
        <option value="2">パンケーキ・ホットケーキ</option>
        <option value="3">シリアル・グラノーラ</option>
        <option value="4">おにぎり</option>
      </select>
    </div>
    <div class="field">
      <label for="f2">甘いもので食べたいもの</label>
      <select id="f2">
        <option value="">選んでください</option>
        <option value="0">チョコレート</option>
        <option value="1">ショートケーキ</option>
        <option value="2">アイスクリーム</option>
        <option value="3">プリン</option>
        <option value="4">和菓子（あんこ系）</option>
      </select>
    </div>
    <div class="field">
      <label for="f3">飲み物で選ぶなら</label>
      <select id="f3">
        <option value="">選んでください</option>
        <option value="0">コーヒー</option>
        <option value="1">紅茶</option>
        <option value="2">緑茶・日本茶</option>
        <option value="3">炭酸ジュース</option>
        <option value="4">フルーツジュース</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">運勢を診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">今月の総合運</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">運勢の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <div class="personality-card" id="personality">
    <p class="personality-emoji" id="pe">🍀</p>
    <p class="personality-title" id="pt">—</p>
    <p class="personality-text" id="pd">—</p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このツールは食べ物の好みから性格傾向を読み解くエンタメ診断です。結果は気軽な参考としてお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'food_fortune_v1';

  // 食べ物の特性スコア（0〜4 の値ごとに各運に与える基礎点）
  var BREAKFAST_TRAITS = {
    '0': { 総合: 3, 恋愛: 2, 金: 4, 仕事: 4, type: '堅実' },
    '1': { 総合: 3, 恋愛: 4, 金: 2, 仕事: 3, type: '社交' },
    '2': { 総合: 4, 恋愛: 4, 金: 2, 仕事: 2, type: '甘党' },
    '3': { 総合: 2, 恋愛: 2, 金: 3, 仕事: 4, type: '効率' },
    '4': { 総合: 3, 恋愛: 3, 金: 3, 仕事: 3, type: '安定' }
  };
  var SWEETS_TRAITS = {
    '0': { 総合: 3, 恋愛: 4, 金: 2, 仕事: 3, type: '情熱' },
    '1': { 総合: 4, 恋愛: 4, 金: 3, 仕事: 2, type: 'ロマン' },
    '2': { 総合: 3, 恋愛: 3, 金: 2, 仕事: 2, type: '享楽' },
    '3': { 総合: 3, 恋愛: 2, 金: 3, 仕事: 3, type: '癒し' },
    '4': { 総合: 4, 恋愛: 2, 金: 4, 仕事: 4, type: '伝統' }
  };
  var DRINK_TRAITS = {
    '0': { 総合: 3, 恋愛: 2, 金: 3, 仕事: 4, type: '集中' },
    '1': { 総合: 4, 恋愛: 4, 金: 3, 仕事: 3, type: '優雅' },
    '2': { 総合: 3, 恋愛: 3, 金: 4, 仕事: 4, type: '和' },
    '3': { 総合: 3, 恋愛: 4, 金: 2, 仕事: 2, type: '陽気' },
    '4': { 総合: 4, 恋愛: 3, 金: 3, 仕事: 3, type: '健康' }
  };

  // 性格タイプの説明（朝×甘×飲 の type 組み合わせを集約）
  var PERSONALITY = {
    '堅実_情熱_集中':   { e: '🛡️', t: '芯の強い職人タイプ', d: '見た目は静かでも、内側には燃えるような芯を持つ努力家。決めたことを最後までやり抜く力で、周りからの信頼が自然と集まります。' },
    '甘党_ロマン_優雅':  { e: '🌹', t: '夢見るアーティスト', d: '感性が豊かで、日常の中に小さな幸せを見つけるのが得意。理想を描く力が強く、人を惹きつける独特の世界観を持っています。' },
    '社交_情熱_陽気':   { e: '🎉', t: '太陽みたいなムードメーカー', d: 'その場の空気を一瞬で明るく変える才能あり。笑顔と気配りで、気付くと周りに人が集まっている人気者タイプです。' },
    '効率_癒し_集中':   { e: '🎯', t: 'クールな分析家', d: 'ムダを嫌い、最短ルートで結果を出すスマートな思考の持ち主。冷静に見えて、実は身近な人を密かに気にかける優しさあり。' },
    '安定_伝統_和':     { e: '🍵', t: '和の心を持つ大樹タイプ', d: 'どっしりと構えた安心感が魅力。流行に惑わされず、自分の軸を大事にする姿勢が、長期的に大きな信頼を生みます。' }
  };

  // デフォルト性格（マッチしない時のフォールバック）
  var PERSONALITY_FALLBACK = [
    { e: '🌟', t: 'バランス型オールラウンダー', d: '極端に偏らず、状況に応じて柔軟に立ち回れる調整力の持ち主。誰とでも上手くやれる、大人タイプです。' },
    { e: '🍀', t: '隠れラッキータイプ', d: '派手さはないけれど、なぜか良いタイミングで良いことが起きる持ち前の運気あり。自分を信じて動くと吉。' },
    { e: '🌈', t: 'マイペース夢追い人', d: '人と比べず、自分のペースで歩む芯の強さあり。思いついたら即行動できる行動力が、今月の運を引き寄せます。' },
    { e: '🔥', t: 'チャレンジャー型', d: '新しいことに飛び込む勇気と好奇心が運の源。今月は思い切った一歩が、思わぬ良縁・良機会につながりそう。' },
    { e: '🌸', t: 'やわらか共感型', d: '人の気持ちを汲み取る力が抜きん出ています。さりげない一言が周りを救うこと多々。今月は人との縁が運を運びます。' }
  ];

  function loadSaved() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.f1 != null) document.getElementById('f1').value = d.f1;
      if (d.f2 != null) document.getElementById('f2').value = d.f2;
      if (d.f3 != null) document.getElementById('f3').value = d.f3;
    } catch (e) {}
  }
  function save(f1, f2, f3) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ f1: f1, f2: f2, f3: f3 }));
    } catch (e) {}
  }

  function diagnose() {
    var f1 = document.getElementById('f1').value;
    var f2 = document.getElementById('f2').value;
    var f3 = document.getElementById('f3').value;
    if (f1 === '' || f2 === '' || f3 === '') {
      showErr('3つすべて選んでください');
      return;
    }

    save(f1, f2, f3);

    var b = BREAKFAST_TRAITS[f1];
    var s = SWEETS_TRAITS[f2];
    var d = DRINK_TRAITS[f3];

    // 月によるバイアス（同月内は同結果）
    var month = new Date().getMonth() + 1;
    var bias = ((month * 7) % 5) - 2; // -2 〜 +2

    function score(key) {
      var raw = b[key] + s[key] + d[key] + bias;
      // 1〜5 にクランプ
      return Math.max(1, Math.min(5, Math.round(raw / 3 + 1)));
    }

    var total = score('総合');
    var love  = score('恋愛');
    var money = score('金');
    var work  = score('仕事');

    var level = total >= 4 ? 'ok' : total <= 2 ? 'ng' : 'warn';
    var labels = ['', '🌧 少し慎重に', '☁ ぼちぼち', '⛅ 普通に良い', '☀ 好調', '🌟 絶好調'];
    var notes = [
      '',
      '無理せず体を休める月。焦らず、家でゆっくり充電する時間を増やすと回復します。',
      '大きな波はないけれど、コツコツ積み重ねた人ほど後半に芽が出やすい月。',
      '安定運。普段通りに過ごせば良い結果が出る、いつものペースが追い風になる月。',
      '勢いが出てくる月。気になっていたことに一歩踏み出すと良い縁・良い情報が舞い込みやすい。',
      '運が味方する最高の月。ピンと来たら即行動。新しい挑戦が大きな実りに繋がります。'
    ];

    showResult(level, '★'.repeat(total) + '☆'.repeat(5 - total), labels[total] + '｜' + notes[total]);
    showDetail([
      ['💗 恋愛運', '★'.repeat(love) + '☆'.repeat(5 - love)],
      ['💰 金運',   '★'.repeat(money) + '☆'.repeat(5 - money)],
      ['💼 仕事運', '★'.repeat(work) + '☆'.repeat(5 - work)]
    ]);

    // 性格タイプ
    var key = b.type + '_' + s.type + '_' + d.type;
    var p = PERSONALITY[key];
    if (!p) {
      // ハッシュでフォールバック選択
      var h = (parseInt(f1) * 7 + parseInt(f2) * 13 + parseInt(f3) * 17) % PERSONALITY_FALLBACK.length;
      p = PERSONALITY_FALLBACK[h];
    }
    document.getElementById('pe').textContent = p.e;
    document.getElementById('pt').textContent = p.t;
    document.getElementById('pd').textContent = p.d;
    document.getElementById('personality').style.display = 'block';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('personality').style.display = 'none';
  }

  loadSaved();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
