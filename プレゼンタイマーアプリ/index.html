<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレゼンタイマー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>プレゼンタイマー</h1>

    <!-- スライド追加フォーム -->
    <section class="add-section">
      <h2>スライドを追加</h2>
      <div class="form-row">
        <input type="text" id="slideName" placeholder="スライド名（例：自己紹介）" maxlength="40">
        <input type="number" id="slideMin" placeholder="分" min="0" max="99" value="0">
        <span class="sep">:</span>
        <input type="number" id="slideSec" placeholder="秒" min="0" max="59" value="30">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <!-- スライドリスト -->
    <section class="list-section">
      <div class="list-header">
        <h2>スライド一覧</h2>
        <div class="list-actions">
          <span id="totalTime">合計：0:00</span>
          <button id="clearBtn" class="btn-text">クリア</button>
        </div>
      </div>
      <ul id="slideList"></ul>
    </section>

    <!-- タイマー -->
    <section class="timer-section" id="timerSection" style="display:none">
      <div class="progress-info">
        <span id="progressLabel">スライド 1 / 1</span>
        <span id="totalRemain">残り合計：0:00</span>
      </div>
      <div class="slide-name" id="currentSlideName">-</div>
      <div class="timer-display" id="timerDisplay">0:00</div>
      <div class="time-bar-wrap">
        <div class="time-bar" id="timeBar"></div>
      </div>
      <div class="timer-controls">
        <button id="startBtn">▶ スタート</button>
        <button id="nextBtn">次へ ▶▶</button>
        <button id="resetBtn">最初から</button>
      </div>
    </section>

    <!-- 練習スタートボタン -->
    <div class="start-wrap">
      <button id="practiceBtn" class="btn-practice" disabled>練習開始</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
