<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの性別・髪・雰囲気・翼・光輪・衣装・シーンを選ぶだけで、守護天使風のAI画像生成プロンプト（英語）を即作成。MidjourneyやDALL-Eにそのまま貼って使えます。">
  <title>推し守護天使プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --border: #e8e0d2;
      --accent: #c79a3a;
      --accent-light: #fbf6e9;
      --text: #1f1b16;
      --text-sub: #7d7568;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #9c771f, 0 6px 16px rgba(199,154,58,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #9c771f, 0 2px 8px rgba(199,154,58,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }
    .prompt-box {
      width: 100%; min-height: 140px;
      padding: 0.85rem 0.9rem;
      font-size: 0.92rem; line-height: 1.55;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", monospace;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--accent-light);
      color: var(--text);
      resize: vertical;
      margin-bottom: 0.8rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>推し守護天使プロンプトメーカー</h1>
    <p class="subtitle">推しの特徴を選ぶだけで、守護天使風AIイラストのプロンプト（英語）を即生成</p>
  </header>

  <div class="card">
    <p class="card-title">推しの特徴を選ぶ</p>

    <div class="field">
      <label for="gender">性別・タイプ</label>
      <select id="gender">
        <option value="young man">男性天使</option>
        <option value="young woman">女性天使</option>
        <option value="androgynous figure">中性的な天使</option>
        <option value="child-like figure">幼い天使（ケルビム風）</option>
      </select>
    </div>

    <div class="field">
      <label for="hair">髪型・髪色</label>
      <select id="hair">
        <option value="long flowing golden hair, glowing softly">ロング・金髪</option>
        <option value="long silver hair, ethereal shine">ロング・シルバー</option>
        <option value="short black hair, calm and noble">短髪・黒</option>
        <option value="medium platinum blonde hair, gentle waves">ミディアム・プラチナ</option>
        <option value="long white hair, almost translucent">ロング・白</option>
        <option value="soft pastel pink hair, dreamy">パステルピンク</option>
        <option value="braided auburn hair">三つ編み・赤茶</option>
      </select>
    </div>

    <div class="field">
      <label for="mood">表情・雰囲気</label>
      <select id="mood">
        <option value="serene smile, gentle and compassionate gaze">穏やかな微笑み・慈愛</option>
        <option value="solemn expression, divine and holy aura">厳かな表情・神聖</option>
        <option value="closed eyes in prayer, peaceful">祈りの表情・安らぎ</option>
        <option value="determined and protective gaze">守る覚悟・凛とした眼差し</option>
        <option value="melancholic and beautiful expression">儚げで美しい表情</option>
      </select>
    </div>

    <div class="field">
      <label for="wings">翼のタイプ</label>
      <select id="wings">
        <option value="huge pure white feathered wings, fully spread">純白の大きな翼・広げる</option>
        <option value="six radiant golden wings, seraphim style">黄金の六翼（セラフィム）</option>
        <option value="soft pastel pink feathered wings">淡いピンクの羽根翼</option>
        <option value="black raven-like wings with silver tips, fallen angel">黒い羽根翼（堕天使風）</option>
        <option value="translucent crystalline wings of light">光の結晶の翼</option>
        <option value="folded white wings behind the back">折りたたんだ白翼</option>
        <option value="multiple layered wings of soft feathers">幾重にも重なる柔らかな翼</option>
      </select>
    </div>

    <div class="field">
      <label for="halo">光輪（ハロー）</label>
      <select id="halo">
        <option value="glowing golden halo above the head">頭上に金色の光輪</option>
        <option value="ring of soft white light hovering behind the head">背後に柔らかな白光の輪</option>
        <option value="ornate halo with intricate sacred geometry">紋様入り神聖幾何学ハロー</option>
        <option value="floating crown of stars and light">星と光の浮遊王冠</option>
        <option value="no halo, but soft divine glow surrounds the figure">ハロー無し・全身が淡く発光</option>
      </select>
    </div>

    <div class="field">
      <label for="costume">衣装</label>
      <select id="costume">
        <option value="flowing white robe with golden embroidery">白と金の刺繍ローブ</option>
        <option value="elegant silver and pale blue ceremonial dress">銀と淡青の典礼衣装</option>
        <option value="ornate ivory chiton draped softly">象牙色のキトン</option>
        <option value="armor of holy knight, white and gold plates">白と金の聖騎士鎧</option>
        <option value="sheer white gown with light layers, ethereal">透ける薄衣のドレス</option>
        <option value="black and gold dark angel attire">黒と金のダークエンジェル衣装</option>
      </select>
    </div>

    <div class="field">
      <label for="item">手に持つもの</label>
      <select id="item">
        <option value="holding a glowing sword of light">光の剣</option>
        <option value="holding a golden harp">金色のハープ</option>
        <option value="cradling a small glowing orb of light">光の球を抱える</option>
        <option value="holding a long silver staff with a star tip">星の杖</option>
        <option value="hands clasped in prayer">祈りの手</option>
        <option value="releasing a flock of white doves">白鳩を放つ</option>
        <option value="empty hands, palms open in blessing">祝福の手（手ぶら）</option>
      </select>
    </div>

    <div class="field">
      <label for="scene">背景・シーン</label>
      <select id="scene">
        <option value="floating in a sky filled with golden light and divine clouds">金色の光と雲の天空</option>
        <option value="standing on a marble cathedral floor with stained glass windows">ステンドグラスの大聖堂</option>
        <option value="in a sacred forest with shafts of holy light">聖なる森の光芒</option>
        <option value="above a calm sea at dawn, mist and light">夜明けの海の上</option>
        <option value="in front of a giant glowing mandala in the sky">巨大マンダラの前</option>
        <option value="amidst countless feathers falling softly">舞い散る羽根の中</option>
        <option value="in a star-filled cosmic heaven">星に満ちた天界</option>
      </select>
    </div>

    <div class="field">
      <label for="style">アートスタイル</label>
      <select id="style">
        <option value="renaissance religious oil painting style, like Caravaggio and Raphael">ルネサンス宗教画</option>
        <option value="art nouveau style with ornate flowing lines, like Alphonse Mucha">アールヌーヴォー（ミュシャ風）</option>
        <option value="japanese anime illustration style, soft cel shading">アニメイラスト風</option>
        <option value="ethereal fantasy illustration with watercolor texture">水彩ファンタジー</option>
        <option value="hyper-detailed digital painting, cinematic lighting">超精細デジタル絵</option>
        <option value="stained glass art style, vibrant and luminous">ステンドグラス画風</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generatePrompt()">プロンプトを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成プロンプト（英語・コピーしてAI画像生成サービスへ）</p>
    <textarea class="prompt-box" id="promptBox" readonly></textarea>
    <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">📋 プロンプトをコピー</button>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">使ったキーワード</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 生成された英語プロンプトは Midjourney / DALL·E / Stable Diffusion などのAI画像生成サービスにそのまま貼り付けて使えます。サービスごとに細かい記法は異なるため、必要に応じて調整してください。実在の人物名は含めず、特徴を抽象化したプロンプトとしてご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi-guardian-angel-v1';
  var FIELDS = ['gender','hair','mood','wings','halo','costume','item','scene','style'];
  var LABEL_JA = {
    gender:'タイプ', hair:'髪', mood:'雰囲気', wings:'翼',
    halo:'光輪', costume:'衣装', item:'手元', scene:'シーン', style:'画風'
  };

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      FIELDS.forEach(function(k){
        if (s[k] != null) {
          var el = document.getElementById(k);
          if (el) el.value = s[k];
        }
      });
    } catch(e) {}
  }
  function saveState(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function getValues() {
    var v = {};
    FIELDS.forEach(function(k){
      var el = document.getElementById(k);
      v[k] = el ? el.value : '';
    });
    return v;
  }

  function buildPrompt(v) {
    var subject = 'A ' + v.gender + ' depicted as a divine guardian angel, ' + v.hair + ', ' + v.mood;
    var wings = v.wings;
    var halo = v.halo;
    var costume = 'wearing ' + v.costume;
    var item = v.item;
    var scene = v.scene;
    var style = v.style + ', sacred and divine atmosphere, soft glowing light, intricate details, masterpiece, ultra detailed, 4k';
    return subject + ', ' + wings + ', ' + halo + ', ' + costume + ', ' + item + ', ' + scene + ', ' + style;
  }

  function generatePrompt() {
    var v = getValues();
    saveState(v);
    var prompt = buildPrompt(v);
    var rc = document.getElementById('result');
    var box = document.getElementById('promptBox');
    box.value = prompt;
    rc.style.display = 'block';

    var rows = FIELDS.map(function(k){
      var el = document.getElementById(k);
      var label = el && el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : v[k];
      return [LABEL_JA[k], label];
    });
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';

    var btn = document.getElementById('btnCopy');
    btn.classList.remove('copied');
    btn.textContent = '📋 プロンプトをコピー';

    rc.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function copyPrompt() {
    var box = document.getElementById('promptBox');
    var btn = document.getElementById('btnCopy');
    var text = box.value;
    if (!text) return;

    var done = function(){
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = '📋 プロンプトをコピー';
      }, 1800);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function(){
        fallbackCopy(box, done);
      });
    } else {
      fallbackCopy(box, done);
    }
  }
  function fallbackCopy(box, done) {
    try {
      box.removeAttribute('readonly');
      box.select();
      document.execCommand('copy');
      box.setAttribute('readonly','readonly');
      window.getSelection().removeAllRanges();
      done();
    } catch(e) {}
  }

  loadState();
  </script>

</body>
