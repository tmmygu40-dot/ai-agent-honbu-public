<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診療科ガイドアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-dept {
      font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .result-card.ok .result-dept { color: var(--ok); }
    .result-card.warn .result-dept { color: var(--warn); }
    .result-reason { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 0.8rem; }
    .result-caution {
      font-size: 0.78rem; color: var(--warn); background: var(--warn-bg);
      border: 1px solid #fde68a; border-radius: 8px; padding: 0.6rem 0.8rem; line-height: 1.5;
    }

    /* ── 候補カード（複数診療科） ── */
    .dept-list { list-style: none; padding: 0; margin: 0.5rem 0 0; }
    .dept-list li {
      padding: 0.55rem 0.8rem; margin-bottom: 0.4rem;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.92rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .dept-list li .badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 99px; background: var(--accent); color: #fff; white-space: nowrap;
    }
    .dept-list li .badge.sub { background: #d4c8b8; color: var(--text); }

    /* ── 部位グリッド ── */
    .part-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 0.5rem;
    }
    .part-btn {
      padding: 0.7rem 0.3rem; text-align: center; font-size: 0.9rem; font-weight: 600;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .part-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .part-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
    .part-icon { font-size: 1.3rem; display: block; margin-bottom: 0.2rem; }

    /* ── 症状ボタン ── */
    .symptom-grid {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .symptom-btn {
      padding: 0.45rem 0.8rem; font-size: 0.88rem; font-weight: 600;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 99px;
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .symptom-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .symptom-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

    .section-hint { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.7rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>診療科ガイドアプリ</h1>
    <p class="subtitle">症状・部位を選ぶだけで受診科を即逆引き</p>
  </header>

  <!-- STEP1: 部位選択 -->
  <div class="card">
    <p class="card-title">STEP 1｜気になる部位を選ぶ</p>
    <div class="part-grid" id="partGrid"></div>
  </div>

  <!-- STEP2: 症状選択 -->
  <div class="card" id="symptomCard" style="display:none">
    <p class="card-title">STEP 2｜症状を選ぶ（複数可）</p>
    <p class="section-hint">当てはまる症状をすべて選んでください</p>
    <div class="symptom-grid" id="symptomGrid"></div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" id="diagBtn" style="display:none" onclick="diagnose()">診療科を調べる</button>

  <!-- 結果 -->
  <div class="result-card" id="result">
    <p class="result-label">おすすめの診療科</p>
    <p class="result-dept" id="rDept">—</p>
    <p class="result-reason" id="rReason"></p>
    <div class="result-caution" id="rCaution"></div>
    <div id="altDepts" style="margin-top:1rem; display:none">
      <p class="section-hint" style="margin-bottom:0.4rem">その他の候補</p>
      <ul class="dept-list" id="altList"></ul>
    </div>
  </div>

  <!-- リセット -->
  <button class="btn-reset" id="resetBtn" style="display:none" onclick="resetAll()">最初からやり直す</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── データ定義 ──
  var PARTS = [
    { id:'head',    label:'頭・脳',   icon:'🧠' },
    { id:'eye',     label:'目',       icon:'👁️' },
    { id:'ear',     label:'耳',       icon:'👂' },
    { id:'nose',    label:'鼻・のど', icon:'👃' },
    { id:'chest',   label:'胸・心臓', icon:'❤️' },
    { id:'stomach', label:'お腹',     icon:'🫁' },
    { id:'skin',    label:'皮膚',     icon:'🩹' },
    { id:'muscle',  label:'筋肉・骨', icon:'🦴' },
    { id:'mental',  label:'こころ',   icon:'💭' },
    { id:'urology', label:'泌尿器',   icon:'💧' },
    { id:'female',  label:'婦人科',   icon:'🌸' },
    { id:'child',   label:'子ども',   icon:'👶' },
  ];

  var SYMPTOMS = {
    head:    ['頭痛','めまい','しびれ','記憶障害','意識障害','首の痛み','発熱を伴う頭痛','嘔吐を伴う頭痛','視野が欠ける'],
    eye:     ['視力低下','充血','目やに','かゆみ','痛み','涙が止まらない','ものが二重に見える','目がかすむ','光がまぶしい'],
    ear:     ['難聴','耳鳴り','耳の痛み','耳だれ','めまい','耳がつまった感じ'],
    nose:    ['鼻づまり','鼻水','くしゃみ','鼻血','のどの痛み','声がかれる','飲み込みにくい','咳'],
    chest:   ['胸の痛み','動悸','息切れ','咳が続く','痰が出る','胸がつかえる感じ','血痰'],
    stomach: ['腹痛','下痢','便秘','嘔吐','吐き気','血便','食欲不振','体重減少','黄疸'],
    skin:    ['かゆみ','発疹','赤み','腫れ','水ぶくれ','傷・切り傷','ニキビ','脱毛','爪の変形'],
    muscle:  ['関節痛','腰痛','肩こり','骨折疑い','むくみ','筋肉痛','手足のしびれ','歩きにくい'],
    mental:  ['気分の落ち込み','不眠','不安感','イライラ','やる気が出ない','食欲不振','過呼吸','幻覚・幻聴'],
    urology: ['頻尿','排尿時の痛み','血尿','尿が出にくい','残尿感','陰部の痛み・腫れ'],
    female:  ['生理不順','生理痛','不正出血','下腹部痛','おりもの異常','妊娠の可能性'],
    child:   ['発熱','咳','鼻水','嘔吐・下痢','発疹','泣き止まない','食欲不振','けいれん'],
  };

  var DIAGNOSIS = {
    head: {
      default: { dept:'脳神経外科・神経内科', reason:'頭部・脳・神経系の症状には脳神経外科または神経内科が対応します。', alt:['内科'] },
      '意識障害': { dept:'脳神経外科（救急）', reason:'意識障害は緊急性が高いため、すぐに救急受診が必要です。', urgent:true },
      '嘔吐を伴う頭痛': { dept:'脳神経外科（救急）', reason:'嘔吐を伴う激しい頭痛はくも膜下出血の可能性があります。至急受診を。', urgent:true },
      'めまい': { dept:'耳鼻咽喉科・神経内科', reason:'めまいは内耳由来か脳由来かで対応科が異なります。', alt:['脳神経外科'] },
    },
    eye: {
      default: { dept:'眼科', reason:'目の症状はまず眼科へ。視力・眼圧・眼底など専門的な検査が必要です。', alt:[] },
      '視力低下': { dept:'眼科', reason:'急な視力低下は網膜剥離など緊急疾患の可能性があります。', urgent:false },
    },
    ear: {
      default: { dept:'耳鼻咽喉科', reason:'耳の症状は耳鼻咽喉科が専門です。', alt:[] },
      'めまい': { dept:'耳鼻咽喉科・神経内科', reason:'耳に由来するめまい（良性発作性頭位めまい症など）は耳鼻咽喉科へ。', alt:['脳神経外科'] },
    },
    nose: {
      default: { dept:'耳鼻咽喉科', reason:'鼻・のどの症状は耳鼻咽喉科が専門です。', alt:['内科'] },
      '咳': { dept:'内科・耳鼻咽喉科', reason:'咳が続く場合は内科または耳鼻咽喉科で診てもらいましょう。', alt:['呼吸器内科'] },
      '飲み込みにくい': { dept:'耳鼻咽喉科・消化器内科', reason:'嚥下困難は耳鼻咽喉科または消化器内科へ。', alt:[] },
    },
    chest: {
      default: { dept:'内科・循環器内科', reason:'胸の症状は内科または循環器内科へ。心疾患の精査が必要な場合があります。', alt:['呼吸器内科'] },
      '胸の痛み': { dept:'循環器内科（救急）', reason:'急な胸の痛みは心筋梗塞の疑いがあります。すぐに救急受診してください。', urgent:true },
      '血痰': { dept:'呼吸器内科', reason:'血痰は肺の疾患の可能性があります。早めに呼吸器内科へ。', alt:['内科'] },
    },
    stomach: {
      default: { dept:'消化器内科', reason:'お腹の症状は消化器内科が専門です。', alt:['内科'] },
      '血便': { dept:'消化器内科（早急に）', reason:'血便は消化管出血の可能性があります。早急に受診してください。', urgent:true },
      '黄疸': { dept:'消化器内科・肝臓内科', reason:'黄疸は肝臓・胆嚢・膵臓の疾患が疑われます。', urgent:false },
    },
    skin: {
      default: { dept:'皮膚科', reason:'皮膚の症状はまず皮膚科へ。', alt:[] },
      '傷・切り傷': { dept:'外科・皮膚科', reason:'傷の処置は外科または皮膚科へ。', alt:[] },
      '腫れ': { dept:'皮膚科・外科', reason:'腫れを伴う場合は外科での診察も検討してください。', alt:[] },
    },
    muscle: {
      default: { dept:'整形外科', reason:'筋肉・骨・関節の症状は整形外科が専門です。', alt:['リハビリテーション科'] },
      '骨折疑い': { dept:'整形外科（早急に）', reason:'骨折が疑われる場合は整形外科に早急に受診してください。', urgent:true },
      'むくみ': { dept:'内科・循環器内科', reason:'むくみは心臓・腎臓・静脈の疾患のサインのこともあります。', alt:['整形外科'] },
    },
    mental: {
      default: { dept:'精神科・心療内科', reason:'こころの症状は精神科または心療内科へ。抵抗があれば内科でも相談できます。', alt:['内科'] },
      '過呼吸': { dept:'内科・心療内科', reason:'過呼吸発作は内科または心療内科へ。緊急時は救急へ。', alt:['精神科'] },
    },
    urology: {
      default: { dept:'泌尿器科', reason:'泌尿器の症状は泌尿器科が専門です。', alt:['内科'] },
      '血尿': { dept:'泌尿器科（早急に）', reason:'血尿は泌尿器疾患のサインの場合があります。早めに受診してください。', urgent:false },
    },
    female: {
      default: { dept:'産婦人科・婦人科', reason:'女性特有の症状は婦人科または産婦人科へ。', alt:[] },
      '妊娠の可能性': { dept:'産婦人科', reason:'妊娠の可能性がある場合は産婦人科へ。', alt:[] },
    },
    child: {
      default: { dept:'小児科', reason:'お子さんの症状はまず小児科へ。', alt:[] },
      'けいれん': { dept:'小児科（救急）', reason:'けいれんは緊急受診が必要です。すぐに救急または小児科へ。', urgent:true },
      '発熱': { dept:'小児科', reason:'お子さんの発熱はまず小児科へ。39℃以上が続く場合は早めに受診を。', alt:[] },
    },
  };

  // ── 状態 ──
  var selectedPart = null;
  var selectedSymptoms = [];

  // ── 部位グリッド描画 ──
  function renderParts() {
    var grid = document.getElementById('partGrid');
    grid.innerHTML = '';
    PARTS.forEach(function(p) {
      var btn = document.createElement('button');
      btn.className = 'part-btn' + (selectedPart === p.id ? ' selected' : '');
      btn.innerHTML = '<span class="part-icon">' + p.icon + '</span>' + p.label;
      btn.onclick = function() { selectPart(p.id); };
      grid.appendChild(btn);
    });
  }

  function selectPart(partId) {
    selectedPart = partId;
    selectedSymptoms = [];
    renderParts();
    renderSymptoms();
    document.getElementById('symptomCard').style.display = '';
    document.getElementById('diagBtn').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').className = 'result-card';
    document.getElementById('resetBtn').style.display = 'none';

    // localStorage保存
    var saved = { part: selectedPart, symptoms: [] };
    try { localStorage.setItem('shinryo_guide', JSON.stringify(saved)); } catch(e) {}
  }

  // ── 症状グリッド描画 ──
  function renderSymptoms() {
    var grid = document.getElementById('symptomGrid');
    grid.innerHTML = '';
    var list = SYMPTOMS[selectedPart] || [];
    list.forEach(function(s) {
      var btn = document.createElement('button');
      btn.className = 'symptom-btn' + (selectedSymptoms.indexOf(s) >= 0 ? ' selected' : '');
      btn.textContent = s;
      btn.onclick = function() { toggleSymptom(s); };
      grid.appendChild(btn);
    });
  }

  function toggleSymptom(s) {
    var idx = selectedSymptoms.indexOf(s);
    if (idx >= 0) { selectedSymptoms.splice(idx, 1); }
    else { selectedSymptoms.push(s); }
    renderSymptoms();

    // localStorage保存
    var saved = { part: selectedPart, symptoms: selectedSymptoms };
    try { localStorage.setItem('shinryo_guide', JSON.stringify(saved)); } catch(e) {}
  }

  // ── 診断 ──
  function diagnose() {
    if (!selectedPart) return;
    var partData = DIAGNOSIS[selectedPart] || {};
    var result = null;

    // 選択された症状でマッチする専用診断を探す（最初にマッチしたものを使う）
    for (var i = 0; i < selectedSymptoms.length; i++) {
      if (partData[selectedSymptoms[i]]) {
        result = partData[selectedSymptoms[i]];
        break;
      }
    }
    if (!result) { result = partData['default'] || { dept:'内科', reason:'まずはかかりつけ医や内科へご相談ください。', alt:[] }; }

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.className = 'result-card ' + (result.urgent ? 'warn' : 'ok');
    document.getElementById('rDept').textContent = result.dept;
    document.getElementById('rReason').textContent = result.reason;

    var cautionEl = document.getElementById('rCaution');
    if (result.urgent) {
      cautionEl.style.display = '';
      cautionEl.textContent = '⚠️ 緊急性が高い可能性があります。できるだけ早く受診してください。夜間・休日は救急外来を利用してください。';
    } else {
      cautionEl.style.display = 'none';
    }

    var altDepts = document.getElementById('altDepts');
    var altList = document.getElementById('altList');
    if (result.alt && result.alt.length > 0) {
      altDepts.style.display = '';
      altList.innerHTML = result.alt.map(function(d, i) {
        return '<li><span class="badge sub">候補' + (i+2) + '</span>' + d + '</li>';
      }).join('');
    } else {
      altDepts.style.display = 'none';
    }

    document.getElementById('resetBtn').style.display = '';

    // スクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── リセット ──
  function resetAll() {
    selectedPart = null;
    selectedSymptoms = [];
    renderParts();
    document.getElementById('symptomCard').style.display = 'none';
    document.getElementById('diagBtn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').className = 'result-card';
    document.getElementById('resetBtn').style.display = 'none';
    try { localStorage.removeItem('shinryo_guide'); } catch(e) {}
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── 初期化 ──
  (function init() {
    renderParts();

    // localStorage復元
    try {
      var saved = JSON.parse(localStorage.getItem('shinryo_guide') || 'null');
      if (saved && saved.part) {
        selectedPart = saved.part;
        selectedSymptoms = saved.symptoms || [];
        renderParts();
        renderSymptoms();
        document.getElementById('symptomCard').style.display = '';
        document.getElementById('diagBtn').style.display = '';
      }
    } catch(e) {}
  })();
  </script>

</body>
</html>
