<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿文ジェネレーター｜商品名・特徴を入れるだけでInstagram・X・LINE用の投稿文を即生成</title>
  <meta name="description" content="商品名と特徴を入力するだけで、Instagram・X（旧Twitter）・LINE向けの投稿文を自動生成。各SNSの文化に合わせた文体でコピーしてすぐ使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── SNS結果カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .sns-header {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.8rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .sns-icon { font-size: 1.3rem; }
    .sns-name { font-size: 0.85rem; font-weight: 800; color: var(--accent); letter-spacing: 0.05em; }
    .sns-limit { font-size: 0.72rem; color: var(--text-sub); margin-left: auto; }
    .sns-text {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 0.8rem 0.9rem;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
      margin-bottom: 0.75rem;
      font-family: inherit;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.65rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-copy { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📣 SNS投稿文ジェネレーター</h1>
    <p class="subtitle">商品名・特徴を入れるだけで Instagram・X・LINE 用の投稿文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品・サービス情報を入力</p>
    <div class="field">
      <label for="productName">商品名・サービス名 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="productName" placeholder="例：有機抹茶ラテパウダー">
    </div>
    <div class="field">
      <label for="features">特徴・セールスポイント <span style="color:var(--ng)">*</span></label>
      <textarea id="features" placeholder="例：無農薬・国産茶葉100%使用&#10;砂糖不使用で健康的&#10;水に溶かすだけで本格ラテ"></textarea>
      <p class="hint">1行ずつ書くと使いやすいです（複数OK）</p>
    </div>
    <div class="field">
      <label for="target">ターゲット（任意）</label>
      <input type="text" id="target" placeholder="例：健康を気にする30代女性">
    </div>
    <div class="field">
      <label for="price">価格（任意）</label>
      <input type="text" id="price" placeholder="例：1,980円（税込）">
    </div>
    <div class="field">
      <label for="cta">行動喚起・URL（任意）</label>
      <input type="text" id="cta" placeholder="例：プロフのリンクから購入できます">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ 投稿文を生成する</button>

  <!-- Instagram -->
  <div class="result-card" id="result-ig">
    <div class="sns-header">
      <span class="sns-icon">📸</span>
      <span class="sns-name">Instagram</span>
      <span class="sns-limit">絵文字・改行・ハッシュタグ付き</span>
    </div>
    <div class="sns-text" id="card-ig"></div>
    <button class="btn-copy" id="copy-ig" onclick="copyText('ig')">📋 コピーする</button>
  </div>

  <!-- X -->
  <div class="result-card" id="result-x">
    <div class="sns-header">
      <span class="sns-icon">✖️</span>
      <span class="sns-name">X（旧Twitter）</span>
      <span class="sns-limit">140字以内・拡散狙い</span>
    </div>
    <div class="sns-text" id="card-x"></div>
    <button class="btn-copy" id="copy-x" onclick="copyText('x')">📋 コピーする</button>
  </div>

  <!-- LINE -->
  <div class="result-card" id="result-line">
    <div class="sns-header">
      <span class="sns-icon">💬</span>
      <span class="sns-name">LINE</span>
      <span class="sns-limit">口語調・読みやすい短文</span>
    </div>
    <div class="sns-text" id="card-line"></div>
    <button class="btn-copy" id="copy-line" onclick="copyText('line')">📋 コピーする</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 生成された投稿文はテンプレートベースの参考例です。実際に投稿する前に、内容・表現・ハッシュタグをご確認・調整ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'sns_generator_v1';

  var emojis = {
    food:     ['🍵','🍃','🌿','✨','💚','😋','🎉','💛'],
    beauty:   ['💄','✨','💅','🌸','💕','😍','🪞','💗'],
    health:   ['💪','🌿','✨','🏃','💚','😊','🌱','⚡'],
    fashion:  ['👗','✨','💫','🛍️','😍','💕','🎀','👑'],
    tech:     ['📱','💻','⚡','✨','🔥','💡','🚀','🎯'],
    default:  ['✨','🎉','💫','🌟','😊','👍','💪','🔥']
  };

  function pickEmoji(name, features) {
    var text = (name + features).toLowerCase();
    if (/抹茶|緑茶|コーヒー|紅茶|スムージー|ジュース|食|飲|料理|レシピ/.test(text)) return emojis.food;
    if (/美容|スキン|コスメ|化粧|クリーム|美白|保湿|ヘア/.test(text)) return emojis.beauty;
    if (/健康|ダイエット|プロテイン|サプリ|筋|運動|フィット/.test(text)) return emojis.health;
    if (/服|ファッション|コーデ|ブランド|アクセ|バッグ|靴/.test(text)) return emojis.fashion;
    if (/アプリ|ツール|システム|サービス|tech|it|ai/.test(text)) return emojis.tech;
    return emojis.default;
  }

  function getEmoji(set, idx) {
    return set[idx % set.length];
  }

  function buildHashtags(name, features, target) {
    var tags = [];
    tags.push(name.replace(/\s+/g, ''));
    var lines = features.split('\n').filter(function(l){ return l.trim(); });
    lines.slice(0, 3).forEach(function(l) {
      var word = l.replace(/[・。、\s]/g, '').substring(0, 10);
      if (word) tags.push(word);
    });
    if (target) {
      var tw = target.replace(/[・。、\s]/g, '').substring(0, 8);
      if (tw) tags.push(tw);
    }
    tags.push('おすすめ');
    return tags.map(function(t){ return '#' + t; }).join(' ');
  }

  function generate() {
    var name     = document.getElementById('productName').value.trim();
    var features = document.getElementById('features').value.trim();
    var target   = document.getElementById('target').value.trim();
    var price    = document.getElementById('price').value.trim();
    var cta      = document.getElementById('cta').value.trim();

    if (!name || !features) {
      alert('商品名と特徴は必須です');
      return;
    }

    var lines = features.split('\n').filter(function(l){ return l.trim(); });
    var eset  = pickEmoji(name, features);
    var e0 = getEmoji(eset, 0), e1 = getEmoji(eset, 1),
        e2 = getEmoji(eset, 2), e3 = getEmoji(eset, 3),
        e4 = getEmoji(eset, 4);

    // ── Instagram ──
    var ig = e0 + ' ' + name + ' ' + e0 + '\n\n';
    ig += lines.map(function(l, i){
      return getEmoji(eset, i+1) + ' ' + l.trim();
    }).join('\n') + '\n\n';
    if (target) ig += '👤 ' + target + 'にぴったり！\n\n';
    if (price)  ig += '💰 ' + price + '\n\n';
    if (cta)    ig += e4 + ' ' + cta + '\n\n';
    ig += buildHashtags(name, features, target);
    document.getElementById('result-ig').innerHTML =
      '<div class="sns-header"><span class="sns-icon">📸</span>' +
      '<span class="sns-name">Instagram</span>' +
      '<span class="sns-limit">絵文字・改行・ハッシュタグ付き</span></div>' +
      '<div class="sns-text" id="card-ig"></div>' +
      '<button class="btn-copy" id="copy-ig" onclick="copyText(\'ig\')">📋 コピーする</button>';
    document.getElementById('card-ig').textContent = ig;
    document.getElementById('result-ig').style.display = 'block';

    // ── X ──
    var featShort = lines.slice(0, 2).map(function(l){ return l.trim(); }).join('・');
    var x = e0 + name + 'が話題。\n';
    x += featShort;
    if (price) x += '（' + price + '）';
    x += '\n';
    if (cta) x += cta + '\n';
    x += '\n' + buildHashtags(name, features, target).split(' ').slice(0, 4).join(' ');
    // X は140字以内に調整
    if (x.length > 140) {
      x = e0 + name + '。\n' + featShort + '\n' +
          buildHashtags(name, features, target).split(' ').slice(0, 3).join(' ');
    }
    document.getElementById('result-x').innerHTML =
      '<div class="sns-header"><span class="sns-icon">✖️</span>' +
      '<span class="sns-name">X（旧Twitter）</span>' +
      '<span class="sns-limit">140字以内・拡散狙い</span></div>' +
      '<div class="sns-text" id="card-x"></div>' +
      '<button class="btn-copy" id="copy-x" onclick="copyText(\'x\')">📋 コピーする</button>';
    document.getElementById('card-x').textContent = x;
    document.getElementById('result-x').style.display = 'block';

    // ── LINE ──
    var line = 'こんにちは！\n\n';
    line += name + 'のご紹介です' + e1 + '\n\n';
    lines.forEach(function(l) {
      line += '・' + l.trim() + '\n';
    });
    line += '\n';
    if (price) line += '価格は' + price + 'です。\n';
    if (target) line += target + 'の方にも喜んでいただいています' + e2 + '\n';
    line += '\n';
    line += cta ? cta + '\n' : 'ぜひ一度お試しください' + e3 + '\n';
    document.getElementById('result-line').innerHTML =
      '<div class="sns-header"><span class="sns-icon">💬</span>' +
      '<span class="sns-name">LINE</span>' +
      '<span class="sns-limit">口語調・読みやすい短文</span></div>' +
      '<div class="sns-text" id="card-line"></div>' +
      '<button class="btn-copy" id="copy-line" onclick="copyText(\'line\')">📋 コピーする</button>';
    document.getElementById('card-line').textContent = line;
    document.getElementById('result-line').style.display = 'block';

    // localStorage保存
    var saved = { name: name, features: features, target: target, price: price, cta: cta };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); } catch(e) {}
  }

  function copyText(sns) {
    var el  = document.getElementById('card-' + sns);
    var btn = document.getElementById('copy-' + sns);
    var text = el.textContent;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(function(){
        showCopied(btn);
      }).catch(function(){
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showCopied(btn); } catch(e) { alert('コピーできませんでした'); }
    document.body.removeChild(ta);
  }

  function showCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function(){
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  }

  // 起動時にlocalStorageから復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved) return;
      if (saved.name)     document.getElementById('productName').value = saved.name;
      if (saved.features) document.getElementById('features').value    = saved.features;
      if (saved.target)   document.getElementById('target').value      = saved.target;
      if (saved.price)    document.getElementById('price').value       = saved.price;
      if (saved.cta)      document.getElementById('cta').value         = saved.cta;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
