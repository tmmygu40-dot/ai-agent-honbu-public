<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問の診断で、あなたの仕事スタイルがRPG職業に変身。戦士、魔法使い、盗賊など、あなたの適職タイプを楽しく診断できるWebアプリです。">
  <title>⚔️ 仕事スタイルRPG職業診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ラジオボタン行 ── */
    .radio-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .radio-item:last-child { border-bottom: none; }
    .radio-item input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .radio-item .radio-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 詳細情報カード ── */
    .info-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .info-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--text); }
    .info-text { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>⚔️ 仕事スタイルRPG職業診断</h1>
    <p class="subtitle">5問に答えると、あなたの仕事スタイルがRPG職業に変身。</p>
  </header>

  <!-- 診断カード -->
  <div class="card">
    <p class="card-title">診断質問</p>

    <!-- Q1 -->
    <div class="field">
      <label style="font-size: 0.88rem; font-weight: 700; color: var(--text);">Q1. 新しい仕事を任されたときの対応は？</label>
      <div style="margin-top: 0.5rem;">
        <label class="radio-item">
          <input type="radio" name="q1" value="0">
          <span class="radio-text">とりあえずやってみる</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q1" value="1">
          <span class="radio-text">計画を立ててから取り組む</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q1" value="2">
          <span class="radio-text">周りに聞いて効率的なやり方を探す</span>
        </label>
      </div>
    </div>

    <!-- Q2 -->
    <div class="field">
      <label style="font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 0.8rem; display: block;">Q2. チーム作業での自分の役割は？</label>
      <div style="margin-top: 0.5rem;">
        <label class="radio-item">
          <input type="radio" name="q2" value="0">
          <span class="radio-text">リーダーシップを取りたい</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q2" value="1">
          <span class="radio-text">専門知識で貢献したい</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q2" value="2">
          <span class="radio-text">みんなをサポートしたい</span>
        </label>
      </div>
    </div>

    <!-- Q3 -->
    <div class="field">
      <label style="font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 0.8rem; display: block;">Q3. ストレスを感じたときの対処法は？</label>
      <div style="margin-top: 0.5rem;">
        <label class="radio-item">
          <input type="radio" name="q3" value="0">
          <span class="radio-text">全力で乗り越える</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q3" value="1">
          <span class="radio-text">冷静に分析・対策を考える</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q3" value="2">
          <span class="radio-text">友人や同僚に相談する</span>
        </label>
      </div>
    </div>

    <!-- Q4 -->
    <div class="field">
      <label style="font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 0.8rem; display: block;">Q4. 目標設定は？</label>
      <div style="margin-top: 0.5rem;">
        <label class="radio-item">
          <input type="radio" name="q4" value="0">
          <span class="radio-text">短期目標で成果を積み重ねる</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q4" value="1">
          <span class="radio-text">長期的なキャリア形成を重視</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q4" value="2">
          <span class="radio-text">その時々の状況に応じて柔軟に</span>
        </label>
      </div>
    </div>

    <!-- Q5 -->
    <div class="field">
      <label style="font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 0.8rem; display: block;">Q5. 新しいスキルの習得は？</label>
      <div style="margin-top: 0.5rem;">
        <label class="radio-item">
          <input type="radio" name="q5" value="0">
          <span class="radio-text">実践の中で学ぶのが好き</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q5" value="1">
          <span class="radio-text">理論をしっかり学んでから応用</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q5" value="2">
          <span class="radio-text">他人の成功例を参考にしたい</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたのRPG職業は</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 詳細情報 -->
  <div class="card info-card" id="detail">
    <p class="info-title" id="job-name">職業名</p>
    <p class="info-text" id="job-desc">説明</p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
    var JOBS = {
      warrior: {
        name: '⚔️ 戦士',
        desc: 'リーダーシップタイプ。決断力と行動力で目標達成。チームの中心となり、困難な課題に真っ先に取り組む。短期目標で成果を積み重ね、みんなを引っ張るタイプです。職場では頼られるリーダーに。'
      },
      mage: {
        name: '🔮 魔法使い',
        desc: 'クリエイティブ・思考型。理論と分析で複雑な問題を解決。新しい視点から革新的なアイデアを生み出し、深い知識で専門性を発揮。成長志向で長期的キャリア形成を目指すタイプです。'
      },
      rogue: {
        name: '🗡️ 盗賊',
        desc: 'フリーダム・柔軟型。状況を見極め、臨機応変に対応。ルールにとらわれず、効率的で独創的な方法を見つけるのが得意。実践の中で学び、どんな環境でも順応できます。'
      },
      paladin: {
        name: '✨ 聖騎士',
        desc: '責任感・サポート型。コツコツと着実に成果を積み重ねるのが得意。周囲とのバランスを大切にし、みんなで成功することを目指す。誠実さと信頼性で職場の土台を支えます。'
      },
      bard: {
        name: '🎵 吟遊詩人',
        desc: 'コミュニケーション・調和型。人間関係を大切にし、チーム内のまとめ役として活躍。柔軟な思考で意見を調整し、みんなの意見を引き出すのが上手。信頼できるサポーターです。'
      }
    };

    function diagnose() {
      var q1 = parseInt(document.querySelector('input[name="q1"]:checked')?.value ?? '-1');
      var q2 = parseInt(document.querySelector('input[name="q2"]:checked')?.value ?? '-1');
      var q3 = parseInt(document.querySelector('input[name="q3"]:checked')?.value ?? '-1');
      var q4 = parseInt(document.querySelector('input[name="q4"]:checked')?.value ?? '-1');
      var q5 = parseInt(document.querySelector('input[name="q5"]:checked')?.value ?? '-1');

      if ([q1, q2, q3, q4, q5].includes(-1)) {
        showErr('すべての質問に答えてください');
        return;
      }

      // 職業判定ロジック
      var scores = { warrior: 0, mage: 0, rogue: 0, paladin: 0, bard: 0 };

      // Q1: 行動スタイル
      if (q1 === 0) scores.warrior++; // とりあえずやってみる → 戦士
      else if (q1 === 1) scores.paladin++; // 計画的 → 聖騎士
      else scores.rogue++; // 聞く → 盗賊

      // Q2: チーム内の役割
      if (q2 === 0) scores.warrior++; // リーダー → 戦士
      else if (q2 === 1) scores.mage++; // 専門知識 → 魔法使い
      else scores.bard++; // サポート → 吟遊詩人

      // Q3: ストレス対処
      if (q3 === 0) scores.warrior++; // 全力 → 戦士
      else if (q3 === 1) scores.mage++; // 分析 → 魔法使い
      else scores.bard++; // 相談 → 吟遊詩人

      // Q4: 目標設定
      if (q4 === 0) scores.warrior++; // 短期 → 戦士
      else if (q4 === 1) scores.mage++; // 長期 → 魔法使い
      else scores.rogue++; // 柔軟 → 盗賊

      // Q5: スキル習得
      if (q5 === 0) scores.rogue++; // 実践 → 盗賊
      else if (q5 === 1) scores.mage++; // 理論 → 魔法使い
      else scores.paladin++; // 参考 → 聖騎士

      // 最高スコアの職業を判定
      var maxScore = Math.max(...Object.values(scores));
      var result = Object.keys(scores).find(job => scores[job] === maxScore);

      if (!result) result = 'warrior'; // フォールバック
      var job = JOBS[result];

      showResult(job);
      saveResult(result);
    }

    function showResult(job) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ok';
      rc.style.display = 'block';
      document.getElementById('rv').textContent = job.name;
      document.getElementById('rn').textContent = '診断完了！あなたの仕事スタイルをさらに詳しく見てみましょう。';

      var detail = document.getElementById('detail');
      detail.style.display = 'block';
      document.getElementById('job-name').textContent = job.name;
      document.getElementById('job-desc').textContent = job.desc;
    }

    function showErr(msg) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ng';
      rc.style.display = 'block';
      document.getElementById('rv').textContent = '⚠️';
      document.getElementById('rn').textContent = msg;
      document.getElementById('detail').style.display = 'none';
    }

    function saveResult(result) {
      localStorage.setItem('rpg_job_result', result);
      var timestamp = new Date().toISOString();
      localStorage.setItem('rpg_job_timestamp', timestamp);
    }

    // ページ読み込み時に前回の結果を復元
    window.addEventListener('DOMContentLoaded', function() {
      var saved = localStorage.getItem('rpg_job_result');
      if (saved && JOBS[saved]) {
        showResult(JOBS[saved]);
      }
    });
  </script>
