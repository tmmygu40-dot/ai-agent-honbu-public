<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値引き下限チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>値引き下限チェッカー</h1>
    <p class="subtitle">粗利目標を守れる最低販売価格を即計算</p>

    <div class="card">
      <div class="form-group">
        <label for="costPrice">仕入れ値（円）</label>
        <input type="number" id="costPrice" placeholder="例：1000" min="0">
      </div>
      <div class="form-group">
        <label for="targetMargin">目標粗利率（%）</label>
        <input type="number" id="targetMargin" placeholder="例：30" min="0" max="100">
      </div>
      <div class="form-group">
        <label for="currentPrice">現在の販売価格（円）<span class="optional">任意</span></label>
        <input type="number" id="currentPrice" placeholder="例：1500" min="0">
      </div>
      <div class="form-group">
        <label for="itemName">品名<span class="optional">任意</span></label>
        <input type="text" id="itemName" placeholder="例：商品A" maxlength="50">
      </div>
      <button id="calcBtn" onclick="calculate()">計算する</button>
    </div>

    <div class="result-card" id="resultCard" style="display:none;">
      <div class="result-main">
        <span class="result-label">最低販売価格</span>
        <span class="result-value" id="minPrice">―</span>
      </div>
      <div class="result-sub" id="diffSection" style="display:none;">
        <span class="result-label-sm">現在価格との差</span>
        <span class="result-diff" id="priceDiff">―</span>
      </div>
      <p class="result-note" id="resultNote"></p>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="clear-btn" onclick="clearHistory()">履歴を削除</button>
      </div>
      <div id="historyList">
        <p class="empty-msg">まだ履歴がありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
