<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問の心理テストであなたのメンタル状態を診断。今のあなたに必要な自宅セルフケア方法をアドバイスします。">
  <title>🧠 メンタル不調セルフケア診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.82rem; color: var(--text-sub); margin-top: 0.4rem; line-height: 1.5; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問 ── */
    .question-set { margin-bottom: 1.2rem; }
    .question-set:last-child { margin-bottom: 0; }
    .q-label { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; display: block; }
    .q-label .q-num { font-size: 0.85rem; color: var(--accent); margin-right: 0.4rem; }
    .option { margin-bottom: 0.5rem; }
    .option label {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; cursor: pointer; user-select: none;
      border-radius: 8px; transition: background 0.15s;
    }
    .option label:hover { background: var(--accent-light); }
    .option input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .option .opt-text { font-size: 0.88rem; color: var(--text); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.6rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; }
    .result-header { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--text); }
    .result-card.ok   .result-header { color: var(--ok); }
    .result-card.warn .result-header { color: var(--warn); }
    .result-card.ng   .result-header { color: var(--ng); }

    /* ── セルフケア提案 ── */
    .care-item { margin-bottom: 0.8rem; }
    .care-title { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    .care-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; padding: 0.6rem; background: rgba(255,255,255,0.5); border-radius: 8px; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>🧠 メンタル不調セルフケア診断</h1>
    <p class="subtitle">5問答えるだけで、今のメンタル状態を診断。自宅で即座にできるリセット方法をアドバイスします。</p>
  </header>

  <!-- 診断カード -->
  <div class="card" id="questions-card">
    <p class="card-title">診断質問</p>

    <div class="question-set">
      <label class="q-label"><span class="q-num">Q1.</span> 最近の体の状態は？</label>
      <div class="option">
        <label><input type="radio" name="q1" value="0"> <span class="opt-text">よく眠れて体力がある</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q1" value="1"> <span class="opt-text">少し疲れているが何とかなる</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q1" value="2"> <span class="opt-text">疲れが取れない・寝不足気味</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q1" value="3"> <span class="opt-text">常に疲れていて何もやる気が出ない</span></label>
      </div>
    </div>

    <div class="question-set">
      <label class="q-label"><span class="q-num">Q2.</span> 心の状態は？</label>
      <div class="option">
        <label><input type="radio" name="q2" value="0"> <span class="opt-text">前向きで心穏やか</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q2" value="1"> <span class="opt-text">少し不安があるが対応できる</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q2" value="2"> <span class="opt-text">ストレスと不安が大きい</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q2" value="3"> <span class="opt-text">頭が混乱して何も考えられない</span></label>
      </div>
    </div>

    <div class="question-set">
      <label class="q-label"><span class="q-num">Q3.</span> やるべきことへの向き合い方は？</label>
      <div class="option">
        <label><input type="radio" name="q3" value="0"> <span class="opt-text">スムーズに取り組める</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q3" value="1"> <span class="opt-text">少し億劫だが手をつけられる</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q3" value="2"> <span class="opt-text">やる気が出ず何もしたくない</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q3" value="3"> <span class="opt-text">焦りばかりで落ち着いて取り組めない</span></label>
      </div>
    </div>

    <div class="question-set">
      <label class="q-label"><span class="q-num">Q4.</span> 日常の過ごし方は？</label>
      <div class="option">
        <label><input type="radio" name="q4" value="0"> <span class="opt-text">バランスよく休息と活動ができている</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q4" value="1"> <span class="opt-text">時々無理をしている</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q4" value="2"> <span class="opt-text">毎日無理している・疲れ果てている</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q4" value="3"> <span class="opt-text">常に動いていて止められない</span></label>
      </div>
    </div>

    <div class="question-set">
      <label class="q-label"><span class="q-num">Q5.</span> 人間関係での気分は？</label>
      <div class="option">
        <label><input type="radio" name="q5" value="0"> <span class="opt-text">誰かと話すと気が晴れる</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q5" value="1"> <span class="opt-text">普通に接することができる</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q5" value="2"> <span class="opt-text">人間関係がストレスになっている</span></label>
      </div>
      <div class="option">
        <label><input type="radio" name="q5" value="3"> <span class="opt-text">誰とも会いたくない・関わりたくない</span></label>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-header" id="rh"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- セルフケア提案カード -->
  <div class="card" id="care-card" style="display:none">
    <p class="card-title">今日のセルフケア方法</p>
    <div id="care-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは心理学的なメンタルケアの一般的知識を参考に作成しています。深刻な精神的不調の場合は医師や心理士などの専門家に相談ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
  var CARE_DATA = {
    fatigue: {
      type: '疲労型',
      emoji: '😴',
      desc: 'あなたは身体的な疲れが溜まっている状態です。十分な休息とリセットが必要です。',
      care: [
        { title: '深い呼吸と瞑想（5分）', desc: '静かな場所で腹式呼吸を意識し、心を落ち着けましょう。副交感神経を優位にします。' },
        { title: 'ぬるいお風呂（15～20分）', desc: '38～40℃のぬるいお風呂に浸かり、筋肉をリラックスさせます。就寝の1時間前が効果的。' },
        { title: '軽いストレッチ', desc: '無理のない範囲で全身を優しく伸ばし、血流を改善します。5～10分程度で十分。' },
        { title: 'アロマテラピー', desc: 'ラベンダーやカモミールなど、リラックス効果のあるアロマを活用。心が落ち着きます。' },
        { title: '早寝を心がける', desc: '今夜は意識的に30分早く寝て、睡眠時間を確保しましょう。' }
      ]
    },
    stress: {
      type: 'ストレス型',
      emoji: '😰',
      desc: 'あなたは心理的なストレスと不安が大きい状態です。気持ちをリセットする時間が必要です。',
      care: [
        { title: '好きな音楽を聴く（10分）', desc: 'リラックス系の音楽や、気分が上がる好きな曲を聴きましょう。気持ちが落ち着きます。' },
        { title: '紙に思いを書き出す', desc: '頭の中のモヤモヤを紙に書き出すだけで、心が少し軽くなります。5～10分程度。' },
        { title: 'アロマテラピー（柑橘系）', desc: 'レモンやオレンジなど、気分をリフレッシュする香りを使いましょう。' },
        { title: '好きなものを食べる・飲む', desc: '好きなお菓子やお茶を味わいながら、自分を労わる時間を作ります。' },
        { title: '無理な予定をキャンセルする勇気', desc: '今夜や明日の無理な予定があれば、思い切ってキャンセルすることも大事です。' }
      ]
    },
    apathy: {
      type: '無気力型',
      emoji: '😑',
      desc: 'あなたはやる気が失われている状態です。小さな刺激と達成感が必要です。',
      care: [
        { title: '日光を浴びる（5～10分）', desc: '朝日や自然光を浴びるだけで、セロトニンが分泌され気分が少し上がります。' },
        { title: '好きな人と連絡する', desc: '信頼できる友人や家族に、簡単なメッセージを送ってみましょう。' },
        { title: '小さなタスクをこなす', desc: '部屋の片隅を片付けるなど、小さなことを1つやり遂げると達成感が生まれます。' },
        { title: '軽い運動やストレッチ', desc: '散歩や軽い体操で、身体を動かしてみましょう。エンドルフィンが分泌されます。' },
        { title: '好きなコンテンツを楽しむ', desc: 'ドラマ・本・ゲーム・アニメなど、心がときめくものに浸る時間を作ります。' }
      ]
    },
    tension: {
      type: '過緊張型',
      emoji: '⚡',
      desc: 'あなたは常に焦りと緊張状態です。意識的に身体と心のペースを落とす必要があります。',
      care: [
        { title: '呼吸を遅くする（10分）', desc: '意識的に呼吸を遅くし（4秒吸って8秒かけてゆっくり吐く）、交感神経を鎮めます。' },
        { title: 'やることリストを作る', desc: '頭の中のタスクを全部リスト化すると、優先順位が見え焦りが軽くなります。' },
        { title: 'プログレッシブ・マッスル・リラクセーション', desc: '全身の筋肉に力を入れて5秒、ふーっと抜く。これを繰り返すと体がリラックスします。' },
        { title: 'やることを一度止める', desc: 'あえて何もしない時間を30分作り、ゆっくり過ごしましょう。焦りが落ち着きます。' },
        { title: '瞑想・マインドフルネス（5～15分）', desc: '今この瞬間に集中し、余計な思考を手放します。不安が軽くなります。' }
      ]
    }
  };

  function diagnose() {
    var scores = {};
    for (var i = 1; i <= 5; i++) {
      var selected = document.querySelector('input[name="q' + i + '"]:checked');
      if (!selected) { showErr('すべての質問に答えてください'); return; }
      scores['q' + i] = parseInt(selected.value);
    }

    // タイプを判定（スコア合計で判定）
    var total = Object.values(scores).reduce(function(a, b) { return a + b; }, 0);
    var type = judgeType(scores);

    // 結果を表示
    var data = CARE_DATA[type];
    showResult(type, data);
    showCare(data);

    // localStorage に保存
    localStorage.setItem('mental-diagnosis', JSON.stringify({
      date: new Date().toISOString(),
      scores: scores,
      type: type,
      total: total
    }));
  }

  function judgeType(scores) {
    var q1 = scores.q1, q2 = scores.q2, q3 = scores.q3, q4 = scores.q4, q5 = scores.q5;

    // 疲労スコア：q1,q4が高い（疲れている・無理している）
    var fatigueScore = q1 + q4;
    // ストレススコア：q2が高い（心が不安定）
    var stressScore = q2 * 2;
    // 無気力スコア：q3,q5が高い（やる気なし・誰とも関わりたくない）
    var apathyScore = q3 + q5;
    // 過緊張スコア：q3,q4が3（焦りと常に動いている）
    var tensionScore = (q3 === 3 ? 10 : 0) + (q4 === 3 ? 10 : 0);

    // 最高スコアのタイプを返す
    var scores_obj = {
      fatigue: fatigueScore,
      stress: stressScore,
      apathy: apathyScore,
      tension: tensionScore
    };

    var maxType = Object.keys(scores_obj).reduce(function(a, b) {
      return scores_obj[a] > scores_obj[b] ? a : b;
    });

    return maxType;
  }

  function showResult(type, data) {
    var rc = document.getElementById('result');
    var classname = type === 'stress' ? 'warn' : 'ok';
    rc.className = 'result-card ' + classname;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = data.emoji;
    document.getElementById('rh').textContent = data.type;
    document.getElementById('rn').textContent = data.desc;
  }

  function showCare(data) {
    var html = data.care.map(function(c) {
      return '<div class="care-item">'
           + '<div class="care-title">' + c.title + '</div>'
           + '<div class="care-desc">' + c.desc + '</div>'
           + '</div>';
    }).join('');
    document.getElementById('care-list').innerHTML = html;
    document.getElementById('care-card').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rh').textContent = 'ご注意';
    document.getElementById('rn').textContent = msg;
    document.getElementById('care-card').style.display = 'none';
  }

  // ページ読み込み時に前回の結果を復元（オプション）
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('mental-diagnosis');
    if (saved) {
      var data = JSON.parse(saved);
      var lastDate = new Date(data.date);
      var now = new Date();
      // 前回の診断が今日のものなら、復元を促すメッセージを表示（実装はオプション）
    }
  });
  </script>
