<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推し名と魅力キーワードを選ぶだけで、推しにぴったりの四字熟語を即生成！あなたの推しの魅力を漢字4文字で表現して、SNSやプロフィールにも活用できます。">
  <title>💫 推し四字熟語ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── キーワードボタン ── */
    .keyword-group { margin-bottom: 1.2rem; }
    .keyword-group:last-child { margin-bottom: 0; }
    .keyword-group-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .keyword-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .kw-btn {
      padding: 0.45rem 0.85rem;
      font-size: 0.84rem; font-weight: 600;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 20px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .kw-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .kw-btn.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent); font-weight: 700;
    }

    /* ── 四字熟語結果 ── */
    .oshi-result-name {
      font-size: 0.9rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.5rem;
    }
    .kanji-display {
      font-size: 3.2rem; font-weight: 900;
      color: var(--accent); letter-spacing: 0.08em;
      margin: 0.3rem 0;
      line-height: 1.2;
    }
    .kana-display {
      font-size: 0.9rem; color: var(--text-sub);
      margin-bottom: 0.8rem;
    }
    .meaning-display {
      font-size: 0.92rem; color: var(--text);
      line-height: 1.65; margin-bottom: 0.8rem;
      padding: 0.7rem 0.9rem; background: var(--accent-light);
      border-radius: 8px; border-left: 3px solid var(--accent);
      text-align: left;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      padding: 0.55rem 1.4rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }

    /* ── 履歴 ── */
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 0.2rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-kanji { font-weight: 700; font-size: 1.05rem; color: var(--accent); }
    .history-meta { color: var(--text-sub); font-size: 0.8rem; }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

<body>

  <header class="app-header">
    <h1>💫 推し四字熟語ジェネレーター</h1>
    <p class="subtitle">推しの魅力を4文字の漢字に！キーワードを選んでぴったりの四字熟語を生成しよう</p>
  </header>

  <!-- 推し名入力 -->
  <div class="card">
    <p class="card-title">推し名を入力</p>
    <div class="field">
      <label for="oshi-name">推し名（ニックネームでもOK）</label>
      <input type="text" id="oshi-name" placeholder="例：〇〇くん、〇〇ちゃん" maxlength="30">
    </div>
  </div>

  <!-- キーワード選択 -->
  <div class="card">
    <p class="card-title">推しの魅力キーワードを選ぶ（複数OK）</p>

    <div class="keyword-group">
      <div class="keyword-group-label">✨ 外見・ビジュアル</div>
      <div class="keyword-tags">
        <button class="kw-btn" data-cat="looks" onclick="toggleKw(this)">顔面が完璧</button>
        <button class="kw-btn" data-cat="looks" onclick="toggleKw(this)">スタイルが最高</button>
        <button class="kw-btn" data-cat="looks" onclick="toggleKw(this)">笑顔がまぶしい</button>
        <button class="kw-btn" data-cat="looks" onclick="toggleKw(this)">目力がすごい</button>
        <button class="kw-btn" data-cat="looks" onclick="toggleKw(this)">衣装が似合う</button>
      </div>
    </div>

    <div class="keyword-group">
      <div class="keyword-group-label">💛 性格・人柄</div>
      <div class="keyword-tags">
        <button class="kw-btn" data-cat="personality" onclick="toggleKw(this)">優しい</button>
        <button class="kw-btn" data-cat="personality" onclick="toggleKw(this)">明るい</button>
        <button class="kw-btn" data-cat="personality" onclick="toggleKw(this)">素直でまっすぐ</button>
        <button class="kw-btn" data-cat="personality" onclick="toggleKw(this)">誠実</button>
        <button class="kw-btn" data-cat="personality" onclick="toggleKw(this)">天真爛漫</button>
      </div>
    </div>

    <div class="keyword-group">
      <div class="keyword-group-label">🌟 才能・スキル</div>
      <div class="keyword-tags">
        <button class="kw-btn" data-cat="talent" onclick="toggleKw(this)">歌がうまい</button>
        <button class="kw-btn" data-cat="talent" onclick="toggleKw(this)">ダンスが神</button>
        <button class="kw-btn" data-cat="talent" onclick="toggleKw(this)">演技力が高い</button>
        <button class="kw-btn" data-cat="talent" onclick="toggleKw(this)">何でもできる</button>
        <button class="kw-btn" data-cat="talent" onclick="toggleKw(this)">独自のセンスがある</button>
      </div>
    </div>

    <div class="keyword-group">
      <div class="keyword-group-label">🌙 雰囲気・存在感</div>
      <div class="keyword-tags">
        <button class="kw-btn" data-cat="aura" onclick="toggleKw(this)">独特の空気感</button>
        <button class="kw-btn" data-cat="aura" onclick="toggleKw(this)">カリスマ性がある</button>
        <button class="kw-btn" data-cat="aura" onclick="toggleKw(this)">唯一無二の存在</button>
        <button class="kw-btn" data-cat="aura" onclick="toggleKw(this)">見てるだけで癒される</button>
        <button class="kw-btn" data-cat="aura" onclick="toggleKw(this)">圧倒的な存在感</button>
      </div>
    </div>

    <div class="keyword-group">
      <div class="keyword-group-label">🔥 努力・行動</div>
      <div class="keyword-tags">
        <button class="kw-btn" data-cat="action" onclick="toggleKw(this)">努力を惜しまない</button>
        <button class="kw-btn" data-cat="action" onclick="toggleKw(this)">ファンへの愛が深い</button>
        <button class="kw-btn" data-cat="action" onclick="toggleKw(this)">全力で向き合う</button>
        <button class="kw-btn" data-cat="action" onclick="toggleKw(this)">困難に負けない</button>
        <button class="kw-btn" data-cat="action" onclick="toggleKw(this)">常に成長している</button>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ 四字熟語を生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">✨ あなたの推しにぴったりの四字熟語</p>
    <p class="oshi-result-name" id="rv-name"></p>
    <p class="kanji-display" id="rv-kanji"></p>
    <p class="kana-display" id="rv-kana"></p>
    <div class="meaning-display" id="rv-meaning"></div>
    <button class="btn-copy no-print" onclick="copyResult()">📋 コピーする</button>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">最近の生成履歴</p>
    <div id="history-list"></div>
    <button class="btn-copy no-print" style="margin-top:0.8rem;display:block;width:100%" onclick="clearHistory()">🗑️ 履歴を消す</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 四字熟語の意味は一般的な辞典の解釈を参考にしています。推し活をより楽しむためのエンタメコンテンツとしてご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── 四字熟語データベース ──
  var YOJIJUKUGO = {
    looks: [
      { kanji: '傾城傾国', kana: 'けいせいけいこく', meaning: 'その美しさで城も国も傾けてしまうほど。圧倒的なビジュアルを持つ推しにぴったりの言葉。' },
      { kanji: '花容月態', kana: 'かようげったい', meaning: '花のような顔立ち、月のような姿。自然の美しさを体現したような存在感。' },
      { kanji: '沈魚落雁', kana: 'ちんぎょらくがん', meaning: '魚も沈み、雁も落ちるほどの美しさ。全てを虜にする圧倒的なビジュアル。' },
      { kanji: '雪膚花顔', kana: 'せっぷかがん', meaning: '雪のように白い肌、花のような美しい顔。細部まで完璧なビジュアルの持ち主。' },
      { kanji: '光彩陸離', kana: 'こうさいりくり', meaning: '光り輝き、まばゆいほどの美しさ。見るたびに目が離せない輝きを持つ存在。' },
      { kanji: '玲瓏無瑕', kana: 'れいろうむか', meaning: '透き通るように美しく、傷一つない完璧な美しさ。欠点のないビジュアルに贈る言葉。' },
      { kanji: '美麗脱俗', kana: 'びれいだつぞく', meaning: '美しく、俗世を超えた存在感。この世のものとは思えないほどの美しさ。' },
      { kanji: '艶姿花容', kana: 'えんしかよう', meaning: '艶やかで花のような美しい姿。人々を魅了してやまない特別なビジュアル。' }
    ],
    personality: [
      { kanji: '天真爛漫', kana: 'てんしんらんまん', meaning: '無邪気で自然体、ありのままの姿が輝いている。飾らない素直な魅力にあふれた推し。' },
      { kanji: '純真無垢', kana: 'じゅんしんむく', meaning: '純粋で汚れのない心。その真っ直ぐな心が多くの人を惹きつける。' },
      { kanji: '温柔敦厚', kana: 'おんじゅうとんこう', meaning: '温かく誠実な心。人を包み込むような優しさと厚い人情を持つ存在。' },
      { kanji: '明朗快活', kana: 'めいろうかいかつ', meaning: '明るく活発で、その場を明るくしてしまう存在。一緒にいるだけで元気になれる。' },
      { kanji: '誠心誠意', kana: 'せいしんせいい', meaning: '真心を込めて誠実に向き合う。ファンに対しても常に誠実な姿勢が伝わる推し。' },
      { kanji: '温雅清楚', kana: 'おんがせいそ', meaning: '上品で清らかな雰囲気。穏やかで品のある佇まいが魅力的な存在。' },
      { kanji: '磊落豪快', kana: 'らいらくごうかい', meaning: '細かいことにこだわらず豪快な心の持ち主。大らかな魅力がたまらない推し。' },
      { kanji: '親切慈愛', kana: 'しんせつじあい', meaning: '親切で深い愛情を持つ人。周りへの思いやりがあふれる素敵な存在。' }
    ],
    talent: [
      { kanji: '才色兼備', kana: 'さいしょくけんび', meaning: '才能と美しさを兼ね備えた存在。内側も外側も完璧な推しにぴったりの四字熟語。' },
      { kanji: '文武両道', kana: 'ぶんぶりょうどう', meaning: '文事も武事も両方優れている。歌もダンスも演技も何でもこなせる万能な推し。' },
      { kanji: '多才多芸', kana: 'たさいたげい', meaning: '多くの才能と芸を持つ。どんなジャンルでも輝きを放つ唯一無二の推し。' },
      { kanji: '超絶技巧', kana: 'ちょうぜつぎこう', meaning: '極めて高い技術を持つ存在。その圧倒的なパフォーマンスに目が釘付けになる。' },
      { kanji: '神技鬼才', kana: 'しんぎきさい', meaning: '神がかった技と並外れた才能。人知を超えたような表現力を持つ推し。' },
      { kanji: '百花繚乱', kana: 'ひゃっかりょうらん', meaning: '多くの才能が一気に花咲く様子。あらゆる方向で輝きを放つ才能の持ち主。' },
      { kanji: '一芸万能', kana: 'いちげいばんのう', meaning: '一つの芸に秀でながら万能な実力を持つ。とことん極めた先に広がる可能性。' },
      { kanji: '絶妙精巧', kana: 'ぜつみょうせいこう', meaning: '繊細で精巧な技を持つ。細部へのこだわりが圧倒的なクオリティを生み出す推し。' }
    ],
    aura: [
      { kanji: '唯一無二', kana: 'ゆいいつむに', meaning: 'この世にただ一人の存在。他の誰とも比べることができない唯一の推し。' },
      { kanji: '威風堂々', kana: 'いふうどうどう', meaning: '堂々とした存在感。どこにいても目を引く、圧倒的なオーラを持つ推し。' },

      { kanji: '神秘幽玄', kana: 'しんぴゆうげん', meaning: '神秘的で奥深い魅力を持つ。知れば知るほど深みにはまっていく不思議な推し。' },
      { kanji: '清風明月', kana: 'せいふうめいげつ', meaning: '清らかで穏やかな存在感。そこにいるだけで空気が変わるような特別な雰囲気。' },
      { kanji: '一世風靡', kana: 'いっせいふうび', meaning: '時代を席巻する影響力を持つ存在。その魅力は時代を超えて輝き続ける。' },
      { kanji: '光風霽月', kana: 'こうふうせいげつ', meaning: '晴れ渡った空に清々しい風。見るだけで心が晴れる、爽やかな存在感の推し。' },
      { kanji: '月下美人', kana: 'げっかびじん', meaning: '月明かりの下で輝く特別な美しさ。ミステリアスな魅力にあふれた推し。' }
    ],
    action: [
      { kanji: '獅子奮迅', kana: 'ししふんじん', meaning: '猛烈な勢いで活動する様子。ステージでも日々の活動でも全力を尽くす推し。' },
      { kanji: '一意専心', kana: 'いちいせんしん', meaning: '一つのことに全力で取り組む。ファンのために、夢のために妥協しない姿勢。' },
      { kanji: '粉骨砕身', kana: 'ふんこつさいしん', meaning: '骨を砕くほど全力を尽くす。その努力の量と質が他の追随を許さない推し。' },
      { kanji: '不撓不屈', kana: 'ふとうふくつ', meaning: '何があっても屈しない強さを持つ。どんな困難も乗り越えてきた推しの真骨頂。' },
      { kanji: '七転八起', kana: 'しちてんはっき', meaning: '何度転んでも立ち上がる。失敗を糧に成長し続けるたくましい推し。' },
      { kanji: '勇往邁進', kana: 'ゆうおうまいしん', meaning: '勇気を持って前へ進む。迷わず夢に向かって突き進む姿が格好いい推し。' },
      { kanji: '刻苦勉励', kana: 'こっくべんれい', meaning: '苦労しながら懸命に励む。陰での努力が見えるほど頑張り屋な推し。' },
      { kanji: '初志貫徹', kana: 'しょしかんてつ', meaning: '最初の志を最後まで貫く。ブレない信念と情熱を持ち続ける推しに贈る言葉。' }
    ]
  };

  // ── キーワードのON/OFF ──
  function toggleKw(btn) {
    btn.classList.toggle('selected');
  }

  // ── 文字列ハッシュ（簡易版） ──
  function hashStr(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h = h & h;
    }
    return Math.abs(h);
  }

  // ── 生成処理 ──
  function generate() {
    var name = document.getElementById('oshi-name').value.trim();
    if (!name) { alert('推し名を入力してください！'); return; }

    var selectedBtns = document.querySelectorAll('.kw-btn.selected');
    if (selectedBtns.length === 0) { alert('キーワードを1つ以上選んでください！'); return; }

    // カテゴリ別カウント
    var counts = { looks: 0, personality: 0, talent: 0, aura: 0, action: 0 };
    var lastCat = 'aura';
    selectedBtns.forEach(function(btn) {
      var cat = btn.getAttribute('data-cat');
      if (counts[cat] !== undefined) { counts[cat]++; lastCat = cat; }
    });

    // 最多カテゴリを特定（同数の場合は最後に選んだキーワードのカテゴリを優先）
    var maxCat = lastCat;
    var maxCount = 0;
    var categories = ['looks', 'personality', 'talent', 'aura', 'action'];
    categories.forEach(function(cat) {
      if (counts[cat] > maxCount) { maxCount = counts[cat]; maxCat = cat; }
    });
    if (counts[lastCat] === maxCount) maxCat = lastCat;

    // 四字熟語を選択（推し名 + キーワード数のハッシュでインデックス決定）
    var list = YOJIJUKUGO[maxCat];
    var idx = hashStr(name + String(selectedBtns.length)) % list.length;
    var item = list[idx];

    // 結果表示
    document.getElementById('rv-name').textContent = '「' + name + '」への四字熟語';
    document.getElementById('rv-kanji').textContent = item.kanji;
    document.getElementById('rv-kana').textContent = '【' + item.kana + '】';
    document.getElementById('rv-meaning').textContent = item.meaning;

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // 履歴保存
    saveHistory(name, item);
    renderHistory();
  }

  // ── コピー ──
  function copyResult() {
    var name = document.getElementById('rv-name').textContent;
    var kanji = document.getElementById('rv-kanji').textContent;
    var kana = document.getElementById('rv-kana').textContent;
    var meaning = document.getElementById('rv-meaning').textContent;
    var text = name + '\n' + kanji + ' ' + kana + '\n' + meaning;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { alert('コピーしました！'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('コピーしました！');
    }
  }

  // ── 履歴（localStorage） ──
  var LS_KEY = 'oshi_yoji_history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function saveHistory(name, item) {
    var history = loadHistory();
    history.unshift({ name: name, kanji: item.kanji, kana: item.kana, ts: new Date().toLocaleDateString('ja-JP') });
    if (history.length > 5) history = history.slice(0, 5);
    localStorage.setItem(LS_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = loadHistory();
    var card = document.getElementById('history-card');
    var list = document.getElementById('history-list');
    if (history.length === 0) { card.style.display = 'none'; return; }
    list.innerHTML = history.map(function(h) {
      return '<div class="history-item">'
        + '<span class="history-kanji">' + h.kanji + '</span>&nbsp;'
        + '<span class="history-meta">（' + h.kana + '）</span>'
        + '<span class="history-meta">' + h.name + ' / ' + h.ts + '</span>'
        + '</div>';
    }).join('');
    card.style.display = 'block';
  }

  function clearHistory() {
    localStorage.removeItem(LS_KEY);
    document.getElementById('history-card').style.display = 'none';
  }

  // 起動時に履歴を表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
