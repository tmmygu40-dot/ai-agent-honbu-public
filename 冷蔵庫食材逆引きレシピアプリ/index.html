<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="冷蔵庫にある食材をチェックするだけで、今日使い切れるレシピを即提案。食材を選んで「レシピを探す」ボタンを押すだけで今夜の献立が決まる、食材逆引きレシピアプリです。">
  <title>冷蔵庫食材逆引きレシピアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリ見出し ── */
    .cat-head {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin: 1rem 0 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .cat-head:first-of-type { margin-top: 0; }

    /* ── 食材グリッド ── */
    .ingredient-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }
    @media (max-width: 400px) {
      .ingredient-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .ing-label {
      display: flex; align-items: center; gap: 0.45rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.55rem 0.6rem;
      cursor: pointer; user-select: none;
      font-size: 0.82rem; font-weight: 500; color: var(--text);
      transition: border-color 0.12s, background 0.12s;
    }
    .ing-label input[type="checkbox"] { width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .ing-label input[type="checkbox"]:checked ~ .ing-name {
      font-weight: 700; color: var(--accent);
    }
    .ing-label:has(input:checked) {
      border-color: var(--accent); background: var(--accent-light);
    }
    .selected-count {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .selected-count span { color: var(--accent); font-weight: 700; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.6rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.65rem;
      font-size: 0.88rem; font-weight: 600; color: var(--text-sub);
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── レシピ結果エリア ── */
    #result-area { max-width: 600px; margin: 0 auto; }

    .result-header {
      font-size: 0.82rem; color: var(--text-sub);
      margin-bottom: 0.8rem; padding: 0 0.2rem;
    }
    .result-header strong { color: var(--accent); }

    /* ── レシピカード ── */
    .recipe-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .recipe-card.full-match { border-color: var(--ok); }
    .recipe-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .match-badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.45rem;
      border-radius: 20px; flex-shrink: 0;
    }
    .badge-full { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
    .badge-part { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }

    .recipe-section { margin-top: 0.6rem; }
    .recipe-section-title { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); letter-spacing: 0.04em; margin-bottom: 0.3rem; }
    .ingredients-row { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .ing-chip {
      font-size: 0.75rem; padding: 0.18rem 0.5rem;
      border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-sub);
    }
    .ing-chip.have { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); font-weight: 600; }
    .ing-chip.missing { background: var(--ng-bg); color: var(--ng); border-color: var(--ng); }

    .steps-list { margin-top: 0.3rem; padding-left: 0; list-style: none; }
    .steps-list li {
      font-size: 0.82rem; color: var(--text); line-height: 1.55;
      padding: 0.25rem 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 0.5rem;
    }
    .steps-list li:last-child { border-bottom: none; }
    .step-num { font-weight: 700; color: var(--accent); flex-shrink: 0; }

    .no-result {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 2rem 1.2rem;
      text-align: center; color: var(--text-sub); font-size: 0.88rem;
    }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .recipe-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🥦 冷蔵庫食材逆引きレシピ</h1>
    <p class="subtitle">今ある食材を選ぶだけ — 今日作れるレシピを即提案</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 食材選択カード -->
  <div class="card">

    <div class="ingredient-grid" id="g-egg"></div>

    <p class="cat-head">🍚 主食・その他</p>
    <div class="ingredient-grid" id="g-carb"></div>
  </div>

  <button class="btn-calc" onclick="search()">🔍 レシピを探す</button>
  <button class="btn-reset no-print" onclick="resetAll()">✕ 選択をリセット</button>

  <!-- 結果エリア -->
  <div id="result-area"></div>

  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  // ─── 食材チェックリスト生成 ───────────────────────
  function buildGrid(gridId, items) {
    var g = document.getElementById(gridId);
    items.forEach(function(name) {
      var lbl = document.createElement('label');
      lbl.className = 'ing-label';
      lbl.innerHTML = '<input type="checkbox" value="' + name + '" onchange="updateCount()"><span class="ing-name">' + name + '</span>';
      g.appendChild(lbl);
    });
  }
  Object.keys(CATS).forEach(function(id) { buildGrid(id, CATS[id]); });

  // ─── 選択数カウント ───────────────────────────────
  function getSelected() {
    return Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(function(cb){ return cb.value; });
  }
  function updateCount() {
    document.getElementById('cnt').textContent = getSelected().length;
    saveLS();
  }

  // ─── レシピ検索 ───────────────────────────────────
  function search() {
    var selected = getSelected();
    if (selected.length === 0) {
      document.getElementById('result-area').innerHTML =
        '<div class="no-result">食材を1つ以上選んでください🥬</div>';
      return;
    }
    var results = [];
    RECIPES.forEach(function(r) {
      var matched = r.key.filter(function(k){ return selected.indexOf(k) !== -1; });
      if (matched.length === 0) return;
      results.push({ r: r, matched: matched, score: matched.length / r.key.length });
    });
    results.sort(function(a, b){ return b.score - a.score || b.matched.length - a.matched.length; });

    var area = document.getElementById('result-area');
    if (results.length === 0) {
      area.innerHTML = '<div class="no-result">選んだ食材に合うレシピが見つかりませんでした。<br>食材を変えて試してみてください🔄</div>';
      return;
    }
    var html = '<p class="result-header">✅ <strong>' + results.length + ' 件</strong>のレシピが見つかりました</p>';
    results.forEach(function(item) {
      var r = item.r;
      var isFull = item.score >= 1;
      var badge = isFull
        ? '<span class="match-badge badge-full">完全一致</span>'
        : '<span class="match-badge badge-part">部分一致</span>';
      var chips = r.all.map(function(ing) {
        var have = selected.indexOf(ing) !== -1;
        var isKey = r.key.indexOf(ing) !== -1;
        var cls = have ? 'have' : (isKey ? 'missing' : '');
        return '<span class="ing-chip ' + cls + '">' + (cls === 'missing' ? '×' : '') + ing + '</span>';
      }).join('');
      var steps = r.steps.map(function(s, i) {
        return '<li><span class="step-num">' + (i+1) + '</span>' + s + '</li>';
      }).join('');
      html += '<div class="recipe-card' + (isFull ? ' full-match' : '') + '">'
        + '<p class="recipe-name">' + r.name + badge + '</p>'
        + '<div class="recipe-section"><p class="recipe-section-title">🧂 材料</p><div class="ingredients-row">' + chips + '</div></div>'
        + '<div class="recipe-section"><p class="recipe-section-title">👨‍🍳 手順</p><ul class="steps-list">' + steps + '</ul></div>'
        + '</div>';
    });
    area.innerHTML = html;
  }

  // ─── リセット ─────────────────────────────────────
  function resetAll() {
    document.querySelectorAll('input[type="checkbox"]').forEach(function(cb){ cb.checked = false; });
    updateCount();
    document.getElementById('result-area').innerHTML = '';
    localStorage.removeItem('reshipi_selected');
  }

  // ─── localStorage ─────────────────────────────────
  function saveLS() {
    localStorage.setItem('reshipi_selected', JSON.stringify(getSelected()));
  }
  function loadLS() {
    try {
      var saved = JSON.parse(localStorage.getItem('reshipi_selected') || '[]');
      if (!Array.isArray(saved)) return;
      saved.forEach(function(name) {
        var cb = document.querySelector('input[value="' + CSS.escape(name) + '"]');
        if (cb) cb.checked = true;
      });
      updateCount();
    } catch(e) {}
  }
  loadLS();
  </script>
