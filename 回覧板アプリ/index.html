<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回覧板アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>📋 回覧板</h1>

    <!-- タブナビ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="notices">連絡事項</button>
      <button class="tab-btn" data-tab="staff">スタッフ管理</button>
    </div>

    <!-- 連絡事項タブ -->
    <div id="tab-notices" class="tab-content active">
      <div class="card">
        <h2>新しい連絡事項を追加</h2>
        <div class="form-group">
          <label for="notice-title">タイトル</label>
          <input type="text" id="notice-title" placeholder="例：来週の朝礼について">
        </div>
        <div class="form-group">
          <label for="notice-body">内容</label>
          <textarea id="notice-body" rows="3" placeholder="連絡事項の詳細を入力してください"></textarea>
        </div>
        <button id="add-notice-btn" class="btn btn-primary">追加する</button>
      </div>

      <div id="notices-list"></div>
    </div>

    <!-- スタッフ管理タブ -->
    <div id="tab-staff" class="tab-content">
      <div class="card">
        <h2>スタッフを登録</h2>
        <div class="form-group">
          <label for="staff-name">スタッフ名</label>
          <input type="text" id="staff-name" placeholder="例：田中 太郎">
        </div>
        <button id="add-staff-btn" class="btn btn-primary">登録する</button>
      </div>

      <div id="staff-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
