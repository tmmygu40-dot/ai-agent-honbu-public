<html lang="ja">
<head>

  <link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E5%9B%9E%E8%A6%A7%E6%9D%BF%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="回覧板。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"回覧板","description":"回覧板。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%9B%9E%E8%A6%A7%E6%9D%BF%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>📋 回覧板</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <!-- タブナビ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="notices">連絡事項</button>
      <button class="tab-btn" data-tab="staff">スタッフ管理</button>
    </div>

    <!-- 連絡事項タブ -->
    <div id="tab-notices" class="tab-content active">
      <div class="card">
        <h2>新しい連絡事項を追加</h2>
        <div class="form-group">
          <label for="notice-title">タイトル</label>
          <input type="text" id="notice-title" placeholder="例：来週の朝礼について">
        </div>
        <div class="form-group">
          <label for="notice-body">内容</label>
          <textarea id="notice-body" rows="3" placeholder="連絡事項の詳細を入力してください"></textarea>
        </div>
        <button id="add-notice-btn" class="btn btn-primary">追加する</button>
      </div>

      <div id="notices-list"></div>
    </div>

    <!-- スタッフ管理タブ -->
    <div id="tab-staff" class="tab-content">
      <div class="card">
        <h2>スタッフを登録</h2>
        <div class="form-group">
          <label for="staff-name">スタッフ名</label>
          <input type="text" id="staff-name" placeholder="例：田中 太郎">
        </div>
        <button id="add-staff-btn" class="btn btn-primary">登録する</button>
      </div>

      <div id="staff-list"></div>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
