<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>温度記録管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🌡️ 温度記録管理</h1>

    <!-- 基準値設定 -->
    <section class="card">
      <h2>基準値設定</h2>
      <div class="threshold-setting">
        <div class="form-row">
          <input type="text" id="thresholdLocation" placeholder="場所名（例：冷蔵庫）">
          <input type="number" id="thresholdValue" placeholder="基準値（℃）" step="0.1">
          <button id="addThresholdBtn" class="btn btn-secondary">登録</button>
        </div>
      </div>
      <ul id="thresholdList" class="threshold-list"></ul>
    </section>

    <!-- 温度記録入力 -->
    <section class="card">
      <h2>温度を記録する</h2>
      <div class="form-group">
        <label>場所</label>
        <select id="locationSelect">
          <option value="">場所を選択</option>
        </select>
        <input type="text" id="locationManual" placeholder="または直接入力">
      </div>
      <div class="form-group">
        <label>温度（℃）</label>
        <input type="number" id="tempInput" placeholder="例：5.2" step="0.1">
      </div>
      <div class="form-group">
        <label>日時</label>
        <input type="datetime-local" id="datetimeInput">
      </div>
      <div class="form-group">
        <label>メモ（任意）</label>
        <input type="text" id="memoInput" placeholder="気づいたことなど">
      </div>
      <button id="addRecordBtn" class="btn btn-primary">記録する</button>
    </section>

    <!-- フィルター -->
    <section class="card">
      <h2>記録一覧</h2>
      <div class="filter-row">
        <select id="filterLocation">
          <option value="">すべての場所</option>
        </select>
        <select id="filterAlert">
          <option value="">すべて</option>
          <option value="alert">基準超えのみ</option>
          <option value="normal">正常のみ</option>
        </select>
        <button id="clearAllBtn" class="btn btn-danger btn-sm">全削除</button>
      </div>
      <div id="recordCount" class="record-count"></div>
      <ul id="recordList" class="record-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
