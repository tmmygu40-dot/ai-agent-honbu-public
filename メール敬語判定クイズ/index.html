<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📧 メール敬語判定クイズ</title>
  <meta name="description" content="ビジネスメール敬語の正解を10問クイズで学べます。敬語の使い分けや誤用を楽しく習得できる無料ツール。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズ問題表示 ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 1rem;
      font-weight: 600;
    }
    .quiz-question {
      font-size: 1rem; color: var(--text); margin-bottom: 1.2rem;
      line-height: 1.6; font-weight: 600;
    }
    .quiz-choices { display: flex; flex-direction: column; gap: 0.8rem; }
    .choice-btn {
      display: block; width: 100%; padding: 1rem 1.2rem;
      font-size: 0.95rem; text-align: left; font-weight: 600;
      background: var(--card); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent); background: var(--accent-light);
    }
    .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700; }
    .choice-btn.incorrect { border-color: var(--ng); background: var(--ng-bg); }

    /* ── 解説カード ── */
    .explanation-card {
      display: none; background: var(--accent-light);
      border: 1.5px solid var(--accent); border-radius: 10px;
      padding: 1rem; margin: 1rem 0 0 0;
      font-size: 0.92rem; color: var(--text); line-height: 1.6;
    }
    .explanation-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.5rem; text-transform: uppercase;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── リトライボタン ── */
    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>📧 メール敬語判定クイズ</h1>
    <p class="subtitle">敬語の使い分けを10問で学べます</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quizCard" style="display:none">
    <div class="quiz-progress" id="progress">1 / 10</div>
    <div class="quiz-question" id="question">質問がここに表示されます</div>
    <div class="quiz-choices" id="choicesContainer"></div>
    <div class="explanation-card" id="explanation">
      <div class="explanation-label">解説</div>
      <div id="explanationText"></div>
    </div>
    <button class="btn-calc" id="nextBtn" onclick="nextQuestion()" style="display:none">次の問題へ</button>
  </div>

  <!-- 開始画面 -->
  <div class="card" id="startCard">
    <p class="card-title">クイズについて</p>
    <p style="font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem;">
      ビジネスメールで使う敬語の正解を当てるクイズです。10問に答えると、あなたの敬語スコアが出ます。
    </p>
    <p style="font-size: 0.82rem; color: var(--text-sub); line-height: 1.6;">
      ✅ 各問、敬語の使い分けが正しいかを判定します<br>
      ✅ 解説付きなので、間違った敬語も学べます<br>
      ✅ スコアは保存されます
    </p>
  </div>

  <button class="btn-calc" onclick="startQuiz()">クイズを開始する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <button class="btn-retry" id="retryBtn" onclick="startQuiz()" style="display:none">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、文化庁・文部科学省などの敬語解説資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

  <script>
  const QUIZ_DATA = [
    {
      q: '部長へのメール：「先日はご指導いただき、ありがとうございました」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（ご指導ではなく「ご教示」を使うべき）', '間違い（「いただき」は不適切）'],
      correct: 0,
      explanation: '「ご指導いただき」は正しい敬語です。目上の人からアドバイスを受けたときに使われます。「ご教示」も同様に正しく使えます。'
    },
    {
      q: '取引先へのメール：「お忙しいところ、わざわざお越しいただき…」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「わざわざ」は失礼）', '間違い（「お越し」が不適切）'],
      correct: 0,
      explanation: '「お忙しいところ」は相手を気遣う敬語で正しいです。ただし「わざわざ」は「手間をかけさせて申し訳ない」という気持ちを表すため、丁寧な文脈では適切です。'
    },
    {
      q: 'お客様へのメール：「弊社のサービスをご利用になられた」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「ご利用になられた」は二重敬語）', '間違い（「弊社」が不適切）'],
      correct: 1,
      explanation: '「ご利用になられた」は二重敬語です。正しくは「ご利用になった」または「ご利用いただいた」と書きます。'
    },
    {
      q: '上司へのメール：「ご不明な点がございましたら、お気軽にお問い合わせください」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「ご不明」が不適切）', '間違い（「お気軽に」がカジュアル）'],
      correct: 0,
      explanation: '正しい敬語です。相手が不明な点があることを丁寧に表現し、連絡しやすい雰囲気を作っています。'
    },
    {
      q: 'クライアントへのメール：「昨日提出させていただきました資料をご参照ください」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「させていただきました」は過剰）', '間違い（「ご参照」が不適切）'],
      correct: 1,
      explanation: '「提出させていただきました」は本来「させていただく」は相手の許可を得て何かをしたときの敬語ですが、ここでは不要です。「提出いたしました」が正確です。'
    },
    {
      q: '取引先へのメール：「こちらの都合がつきましたら、お伺いさせていただきたく…」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「こちらの都合」は失礼）', '間違い（「お伺い」が不適切）'],
      correct: 0,
      explanation: '正しい敬語です。自分が相手の所へ訪問する際に、「お伺いします」と丁寧に表現しています。'
    },
    {
      q: '部下へのメール：「今後は注意されたいので報告します」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（上司が部下に敬語を使うべきでない）', '間違い（「注意されたい」が不適切）'],
      correct: 2,
      explanation: '上司から部下へのメールなので、この文脈では敬語は不要です。また「注意されたい」は「注意してほしい」と書きます。'
    },
    {
      q: 'メール冒頭：「いつもお世話になっております。」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「お世話」は過剰）', '間違い（「になっております」の形が不適切）'],
      correct: 0,
      explanation: 'ビジネスメール冒頭の最も基本的で正しい敬語です。相手への感謝と尊敬を表しています。'
    },
    {
      q: 'メール締め：「ご検討のほど、よろしくお願いいたします。」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「ご検討」が不適切）', '間違い（「お願いいたします」が過剰）'],
      correct: 0,
      explanation: 'ビジネスメール締めとして正しい敬語です。相手に何かを依頼する際の丁寧な表現です。'
    },
    {
      q: '取引先へのメール：「恐れ入りますが、明日までに返信していただけますか？」→ 敬語は正しいですか？',
      choices: ['正しい', '間違い（「返信」が不適切）', '間違い（「していただける」が失礼）'],
      correct: 0,
      explanation: '正しい敬語です。「恐れ入りますが」で相手に手間をかけることを申し訳なく思う気持ちを表現し、「していただけますか」で丁寧に依頼しています。'
    }
  ];

  let currentQuestion = 0;
  let score = 0;
  let quizStarted = false;

  function startQuiz() {
    quizStarted = true;
    currentQuestion = 0;
    score = 0;
    document.getElementById('startCard').style.display = 'none';
    document.getElementById('quizCard').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.querySelector('.btn-calc').style.display = 'block';
    document.querySelector('.btn-calc').textContent = 'クイズを開始する';
    showQuestion();
  }

  function showQuestion() {
    if (currentQuestion >= QUIZ_DATA.length) {
      showResult();
      return;
    }

    const q = QUIZ_DATA[currentQuestion];
    document.getElementById('progress').textContent = (currentQuestion + 1) + ' / ' + QUIZ_DATA.length;
    document.getElementById('question').textContent = q.q;

    const container = document.getElementById('choicesContainer');
    container.innerHTML = '';
    q.choices.forEach((choice, idx) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = '(' + String.fromCharCode(65 + idx) + ') ' + choice;
      btn.onclick = () => selectChoice(idx);
      container.appendChild(btn);
    });

    document.getElementById('explanation').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
  }

  function selectChoice(idx) {
    const q = QUIZ_DATA[currentQuestion];
    const btns = document.querySelectorAll('.choice-btn');

    btns.forEach(btn => btn.disabled = true);

    if (idx === q.correct) {
      btns[idx].classList.add('correct');
      score++;
    } else {
      btns[idx].classList.add('incorrect');
      btns[q.correct].classList.add('correct');
    }

    document.getElementById('explanationText').textContent = q.explanation;
    document.getElementById('explanation').style.display = 'block';
    document.getElementById('nextBtn').style.display = 'block';
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion >= QUIZ_DATA.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('retryBtn').style.display = 'block';

    const pct = Math.round(score / QUIZ_DATA.length * 100);
    const level = score === QUIZ_DATA.length ? 'ok' : score >= 7 ? 'warn' : 'ng';
    const evalMsg = score === QUIZ_DATA.length ? '完璧です！敬語マスター🎉'
               : score >= 8 ? 'ほぼ完璧！あと少し 👏'
               : score >= 6 ? '及第点です。もう少し復習を 💪'
               : '復習が必要です。もう一度チャレンジしてみましょう！';

    document.getElementById('result').className = 'result-card ' + level;
    document.getElementById('rv').textContent = score + ' / 10 点';
    document.getElementById('re').textContent = evalMsg;
    document.getElementById('rn').textContent = '正解率: ' + pct + '%';

    localStorage.setItem('mail_etiquette_quiz_score', JSON.stringify({ score: score, pct: pct, date: new Date().toLocaleDateString('ja-JP') }));
  }

  // ページ読み込み時に前回スコアを確認（オプション表示）
  window.addEventListener('load', function() {
    const saved = localStorage.getItem('mail_etiquette_quiz_score');
    if (saved) {
      const data = JSON.parse(saved);
      const hint = document.createElement('p');
      hint.style.cssText = 'font-size:0.82rem;color:var(--text-sub);text-align:center;margin-bottom:1rem;';
      hint.textContent = '前回のスコア: ' + data.score + '/10 点 (' + data.date + ')';
      document.getElementById('startCard').appendChild(hint);
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
