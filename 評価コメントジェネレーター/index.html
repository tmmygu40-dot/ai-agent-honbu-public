<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>評価コメントジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select, .field input[type="text"] {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus, .field input[type="text"]:focus { border-color: var(--accent); background: #fff; }

    /* 評価段階ボタン */
    .grade-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .grade-btn {
      flex: 1; min-width: 52px; padding: 0.7rem 0.4rem;
      font-size: 1rem; font-weight: 800;
      border: 2px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .grade-btn:hover { border-color: var(--accent); color: var(--accent); }
    .grade-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grade-btn.s { --g: #7c3aed; }
    .grade-btn.s.active { background: #7c3aed; border-color: #7c3aed; }
    .grade-btn.a { --g: var(--ok); }
    .grade-btn.a.active { background: var(--ok); border-color: var(--ok); }
    .grade-btn.b { --g: var(--accent); }
    .grade-btn.b.active { background: var(--accent); border-color: var(--accent); }
    .grade-btn.c { --g: var(--warn); }
    .grade-btn.c.active { background: var(--warn); border-color: var(--warn); }
    .grade-btn.d { --g: var(--ng); }
    .grade-btn.d.active { background: var(--ng); border-color: var(--ng); }

    .grade-desc { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.5rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 結果エリア */
    .result-area { display: none; max-width: 600px; margin: 0 auto; }

    .comment-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .comment-card .comment-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8rem;
    }
    .comment-badge {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 0.25rem 0.6rem; border-radius: 20px; background: var(--accent-light);
      color: var(--accent);
    }
    .comment-badge.s { background: #f5f3ff; color: #7c3aed; }
    .comment-badge.a { background: var(--ok-bg); color: var(--ok); }
    .comment-badge.b { background: var(--accent-light); color: var(--accent); }
    .comment-badge.c { background: var(--warn-bg); color: var(--warn); }
    .comment-badge.d { background: var(--ng-bg); color: var(--ng); }

    .comment-text {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }

    .comment-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }

    .comment-item {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.93rem; line-height: 1.65;
    }
    .comment-item:hover { border-color: var(--accent); background: var(--accent-light); }
    .comment-item.selected { border-color: var(--accent); background: var(--accent-light); }
    .comment-item-num { font-size: 0.7rem; color: var(--accent); font-weight: 700; margin-bottom: 0.25rem; }

    .btn-copy {
      display: block; width: 100%;
      padding: 0.85rem; font-size: 1rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-copy.copied { background: var(--ok); }

    .copy-notice {
      text-align: center; font-size: 0.82rem; color: var(--ok);
      margin-top: 0.5rem; min-height: 1.2em;
    }

    /* 氏名入力 */
    .name-row { display: flex; gap: 0.6rem; align-items: center; }
    .name-row input { flex: 1; }
    .name-row .hint-sm { font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

<body>

  <header class="app-header">
    <h1>評価コメントジェネレーター</h1>
    <p class="subtitle">項目と評価段階を選ぶだけでコメントを即生成</p>
  </header>

  <!-- 設定カード -->
  <div class="card">
    <p class="card-title">評価設定</p>

    <div class="field">
      <label for="evalName">評価対象者名（任意）</label>
      <input type="text" id="evalName" placeholder="例: 山田 太郎">
    </div>

    <div class="field">
      <label for="category">評価カテゴリ</label>
      <select id="category">
        <option value="">── カテゴリを選択 ──</option>
        <option value="業績">業績・目標達成</option>
        <option value="行動">行動特性・仕事の進め方</option>
        <option value="コミュニケーション">コミュニケーション・協調性</option>
        <option value="主体性">主体性・積極性</option>
        <option value="成長">成長性・スキルアップ</option>
        <option value="リーダーシップ">リーダーシップ・マネジメント</option>
        <option value="顧客対応">顧客対応・サービス品質</option>
      </select>
    </div>

    <div class="field">
      <label>評価段階</label>
      <div class="grade-group">
        <button class="grade-btn s" data-grade="S" onclick="selectGrade(this)">S</button>
        <button class="grade-btn a" data-grade="A" onclick="selectGrade(this)">A</button>
        <button class="grade-btn b" data-grade="B" onclick="selectGrade(this)">B</button>
        <button class="grade-btn c" data-grade="C" onclick="selectGrade(this)">C</button>
        <button class="grade-btn d" data-grade="D" onclick="selectGrade(this)">D</button>
      </div>
      <p class="grade-desc" id="gradeDesc">S: 非常に優秀　A: 優秀　B: 標準（期待通り）　C: やや不足　D: 不足</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" id="genBtn" onclick="generate()">コメントを生成する</button>

  <!-- 結果エリア -->
  <div class="result-area" id="resultArea">
    <div class="card">
      <p class="card-title">生成コメント（クリックして選択）</p>
      <div class="comment-list" id="commentList"></div>
      <button class="btn-copy" id="copyBtn" onclick="copySelected()">選択したコメントをコピー</button>
      <p class="copy-notice" id="copyNotice"></p>
    </div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>

  function selectGrade(btn) {
    document.querySelectorAll('.grade-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedGrade = btn.dataset.grade;
    var descs = {
      S: 'S：目標を大幅超過・非常に優秀',
      A: 'A：目標達成・優秀',
      B: 'B：概ね達成・標準（期待通り）',
      C: 'C：一部未達・やや不足',
      D: 'D：大幅未達・不足',
    };
    document.getElementById('gradeDesc').textContent = descs[selectedGrade] || '';
    save();
  }

  function generate() {
    var cat = document.getElementById('category').value;
    if (!cat) { alert('評価カテゴリを選んでください'); return; }
    if (!selectedGrade) { alert('評価段階を選んでください'); return; }

    var name = document.getElementById('evalName').value.trim();
    var comments = COMMENTS[cat] && COMMENTS[cat][selectedGrade];
    if (!comments) { alert('コメントデータが見つかりません'); return; }

    var list = document.getElementById('commentList');
    list.innerHTML = '';
    selectedComment = '';

    comments.forEach(function(txt, i) {
      var full = name ? name + 'さんについて。' + txt : txt;
      var item = document.createElement('div');
      item.className = 'comment-item';
      var num = document.createElement('div');
      num.className = 'comment-item-num';
      num.textContent = 'パターン ' + (i + 1);
      var body = document.createElement('div');
      body.textContent = full;
      item.appendChild(num);
      item.appendChild(body);
      item.addEventListener('click', function() {
        document.querySelectorAll('.comment-item').forEach(function(el){ el.classList.remove('selected'); });
        item.classList.add('selected');
        selectedComment = full;
      });
      list.appendChild(item);
    });

    // 1番目を自動選択
    var first = list.querySelector('.comment-item');
    if (first) {
      first.classList.add('selected');
      selectedComment = name
        ? name + 'さんについて。' + comments[0]
        : comments[0];
    }

    document.getElementById('resultArea').style.display = '';
    document.getElementById('copyNotice').textContent = '';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    save();
  }

  function copySelected() {
    if (!selectedComment) { alert('コメントを選択してください'); return; }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(selectedComment).then(function() {
        showCopied();
      }).catch(function() { fallbackCopy(selectedComment); });
    } else {
      fallbackCopy(selectedComment);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  }

  function showCopied() {
    var n = document.getElementById('copyNotice');
    n.textContent = 'コピーしました！';
    setTimeout(function() { n.textContent = ''; }, 2500);
  }

  function save() {
    try {
      localStorage.setItem('evalCommentGen_category', document.getElementById('category').value);
      localStorage.setItem('evalCommentGen_grade', selectedGrade);
      localStorage.setItem('evalCommentGen_name', document.getElementById('evalName').value);
    } catch(e) {}
  }

  function load() {
    try {
      var cat = localStorage.getItem('evalCommentGen_category');
      var grade = localStorage.getItem('evalCommentGen_grade');
      var name = localStorage.getItem('evalCommentGen_name');
      if (cat) document.getElementById('category').value = cat;
      if (name) document.getElementById('evalName').value = name;
      if (grade) {
        var btn = document.querySelector('.grade-btn[data-grade="' + grade + '"]');
        if (btn) selectGrade(btn);
      }
    } catch(e) {}
  }

  load();
  </script>
