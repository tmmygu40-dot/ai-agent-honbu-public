<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ペットの写真をレトロゲーム風ドット絵に変換するAI画像プロンプトを秒速で生成。犬・猫・小動物の特徴を選ぶだけで、AI画像生成に必要なプロンプト文が完成します。">
  <title>🐾 ペット写真ドット絵プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; word-break: break-word; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── copy button ── */
    .btn-copy {
      display: block; margin: 1rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🐾 ペット写真ドット絵プロンプトメーカー</h1>
    <p class="subtitle">ペットの特徴を選ぶだけで、レトロゲーム風ドット絵のAI画像生成プロンプトが完成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ペット情報</p>
    <div class="field">
      <label for="petType">ペット種別</label>
      <select id="petType">
        <option value="">選択してください</option>
        <option value="犬">犬</option>
        <option value="猫">猫</option>
        <option value="ウサギ">ウサギ</option>
        <option value="小鳥">小鳥</option>
        <option value="ハムスター">ハムスター</option>
        <option value="その他小動物">その他小動物</option>
      </select>
    </div>
    <div class="field">
      <label for="petColor">毛色・色合い</label>
      <select id="petColor">
        <option value="">選択してください</option>
        <option value="白">白</option>
        <option value="黒">黒</option>
        <option value="茶色">茶色</option>
        <option value="グレー">グレー</option>
        <option value="多色">多色・模様あり</option>
      </select>
    </div>
    <div class="field">
      <label for="petSize">サイズ感</label>
      <select id="petSize">
        <option value="">選択してください</option>
        <option value="小型">小型・小さめ</option>
        <option value="中型">中型</option>
        <option value="大型">大型・大きめ</option>
      </select>
    </div>
  </div>

  <div class="card">
    <p class="card-title">ドット絵スタイル</p>
    <div class="field">
      <label for="pixelStyle">スタイル選択</label>
      <select id="pixelStyle">
        <option value="">選択してください</option>
        <option value="8bitファミコン風">8bitファミコン風</option>
        <option value="16bitスーパーファミコン風">16bitスーパーファミコン風</option>
        <option value="ゲームボーイ風">ゲームボーイ風</option>
        <option value="アーケード風">アーケード風</option>
      </select>
    </div>
    <div class="field">
      <label for="background">背景</label>
      <select id="background">
        <option value="">選択してください</option>
        <option value="シンプル背景なし">シンプル背景なし</option>
        <option value="自然背景">自然背景</option>
        <option value="室内">室内</option>
        <option value="幻想的">幻想的</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">プロンプト生成</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <p class="result-value" id="rv">—</p>
    <button class="btn-copy" onclick="copyPrompt()">📋 コピーする</button>
  </div>

  <!-- 広告枠（将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 生成されたプロンプトは、Midjourney・Stable Diffusion・ChatGPT+ の画像生成機能などで利用できます。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  function generatePrompt() {
    var petType = document.getElementById('petType').value;
    var petColor = document.getElementById('petColor').value;
    var petSize = document.getElementById('petSize').value;
    var pixelStyle = document.getElementById('pixelStyle').value;
    var background = document.getElementById('background').value;

    if (!petType || !petColor || !petSize || !pixelStyle || !background) {
      alert('すべての項目を選択してください');
      return;
    }

    // プロンプト生成ロジック
    var prompt = petType + '、' + petColor + '、' + petSize + '、'
      + pixelStyle + '、' + background + '、ドット絵、レトログラフィー、'
      + 'pixel art、retro game style、highly detailed、professional quality';

    showResult(prompt);
    saveToLocalStorage(petType, petColor, petSize, pixelStyle, background, prompt);
  }

  function showResult(prompt) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = prompt;
  }

  function copyPrompt() {
    var promptText = document.getElementById('rv').textContent;
    navigator.clipboard.writeText(promptText).then(function() {
      alert('プロンプトをコピーしました！');
    }).catch(function() {
      // Fallback for older browsers
      var textarea = document.createElement('textarea');
      textarea.value = promptText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('プロンプトをコピーしました！');
    });
  }

  function saveToLocalStorage(petType, petColor, petSize, pixelStyle, background, prompt) {
    var history = JSON.parse(localStorage.getItem('petPromptHistory') || '[]');
    history.push({
      date: new Date().toLocaleString('ja-JP'),
      petType: petType,
      petColor: petColor,
      petSize: petSize,
      pixelStyle: pixelStyle,
      background: background,
      prompt: prompt
    });
    // 最新50件を保持
    if (history.length > 50) {
      history.shift();
    }
    localStorage.setItem('petPromptHistory', JSON.stringify(history));
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
