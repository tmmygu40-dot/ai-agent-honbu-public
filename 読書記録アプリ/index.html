<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読書記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>読書記録</h1>
      <div class="stats">
        <span>読了：<strong id="finishedCount">0</strong> 冊</span>
        <span>積ん読：<strong id="toReadCount">0</strong> 冊</span>
      </div>
    </header>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>本を登録</h2>
      <form id="bookForm">
        <div class="form-group">
          <label for="title">タイトル <span class="required">*</span></label>
          <input type="text" id="title" placeholder="本のタイトル" required>
        </div>
        <div class="form-group">
          <label for="author">著者</label>
          <input type="text" id="author" placeholder="著者名">
        </div>
        <div class="form-group">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="finished">読了</option>
            <option value="toread">積ん読</option>
          </select>
        </div>
        <div class="form-group" id="ratingGroup">
          <label>評価</label>
          <div class="star-rating" id="starRating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
          <input type="hidden" id="rating" value="0">
        </div>
        <div class="form-group">
          <label for="memo">感想・メモ</label>
          <textarea id="memo" placeholder="感想やメモを入力" rows="3"></textarea>
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <!-- タブ -->
    <section class="list-section">
      <div class="tabs">
        <button class="tab active" data-tab="finished">読了</button>
        <button class="tab" data-tab="toread">積ん読</button>
        <button class="tab" data-tab="all">すべて</button>
      </div>
      <div id="bookList" class="book-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
