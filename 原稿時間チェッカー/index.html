<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原稿時間チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>原稿時間チェッカー</h1>
    <p class="subtitle">原稿を貼り付けるだけで読み上げ時間を計算します</p>

    <section class="card">
      <label for="script-input" class="label">原稿テキスト</label>
      <textarea id="script-input" placeholder="ここに原稿を貼り付けてください..." rows="10"></textarea>
      <div class="char-count"><span id="char-count">0</span> 文字</div>
    </section>

    <section class="card">
      <label class="label">読み上げ速度（文字／分）</label>
      <div class="speed-control">
        <input type="range" id="speed-slider" min="100" max="600" step="10" value="300">
        <input type="number" id="speed-number" min="100" max="600" step="10" value="300">
      </div>
      <div class="speed-presets">
        <button class="preset-btn" data-speed="200">ゆっくり（200）</button>
        <button class="preset-btn active" data-speed="300">標準（300）</button>
        <button class="preset-btn" data-speed="400">速め（400）</button>
        <button class="preset-btn" data-speed="500">早口（500）</button>
      </div>
    </section>

    <section class="result-card">
      <div class="result-label">読み上げ所要時間</div>
      <div class="result-time" id="result-time">0 分 0 秒</div>
      <div class="result-detail" id="result-detail">（0.0分）</div>
    </section>

    <div class="actions">
      <button id="clear-btn" class="btn-secondary">クリア</button>
      <button id="copy-btn" class="btn-primary">結果をコピー</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
