<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相見積もり比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>相見積もり比較</h1>

    <!-- 業者追加 -->
    <section class="input-section">
      <h2>業者を追加</h2>
      <div class="input-row">
        <input type="text" id="vendorInput" placeholder="業者名を入力" maxlength="30">
        <button id="addVendorBtn">追加</button>
      </div>
    </section>

    <!-- 項目・金額追加 -->
    <section class="input-section">
      <h2>項目・金額を入力</h2>
      <div class="input-row triple">
        <input type="text" id="itemInput" placeholder="項目名" maxlength="30">
        <select id="vendorSelect">
          <option value="">業者を選択</option>
        </select>
        <input type="number" id="priceInput" placeholder="金額" min="0">
        <button id="addPriceBtn">登録</button>
      </div>
    </section>

    <!-- 比較テーブル -->
    <section class="table-section">
      <div class="table-header">
        <h2>見積もり比較表</h2>
        <button id="clearBtn" class="danger">全クリア</button>
      </div>
      <div class="table-wrapper">
        <table id="compareTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
          <tfoot id="tableFoot"></tfoot>
        </table>
      </div>
      <p id="emptyMsg" class="empty-msg">業者と項目を追加してください</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
