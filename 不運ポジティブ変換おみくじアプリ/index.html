<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今日の不運を30秒でポジティブに変換！ボタンを押すだけで笑えるネタに一発変換できるおみくじアプリです。">
  <title>不運ポジティブ変換おみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.6rem; color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── ポジティブ変換カード ── */
    .positive-card {
      display: none; background: var(--ok-bg);
      border: 2px solid var(--ok); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .positive-card.show { display: block; }
    .positive-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ok); margin-bottom: 0.4rem; }
    .positive-value { font-size: 1.1rem; font-weight: 700; line-height: 1.4; color: var(--ok); margin-bottom: 0.6rem; }
    .positive-emoji { font-size: 2.4rem; margin-bottom: 0.4rem; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.8rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy.show { display: block; }
    .btn-copy:hover { background: var(--accent-light); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-bad { color: var(--ng); font-weight: 600; }
    .history-good { color: var(--ok); font-weight: 600; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .positive-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎲 不運ポジティブ変換おみくじ</h1>
    <p class="subtitle">今日の不運を30秒で笑えるポジティブネタに一発変換します。</p>
  </header>

  <!-- おみくじボタン -->
  <button class="btn-calc" onclick="drawOmikuji()">🎯 おみくじを引く</button>

  <!-- 不運カード -->
  <div class="result-card" id="bad-card">
    <p class="result-label">💀 今日の不運</p>
    <p class="result-value" id="bad-text">—</p>
  </div>

  <!-- ポジティブ変換カード -->
  <div class="positive-card" id="good-card">
    <p class="positive-emoji" id="good-emoji">✨</p>
    <p class="positive-label">🌈 ポジティブ変換！</p>
    <p class="positive-value" id="good-text">—</p>
  </div>

  <!-- コピーボタン -->
  <button class="btn-copy" id="btn-copy" onclick="copyResult()">📋 結果をコピー</button>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">📜 過去の変換履歴</p>
    <div id="history-list"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var DATA = [
    { bad: '朝イチで靴下が裏返しだった', good: '裏ルート発見！人生のショートカットが見えてる証拠', emoji: '🧦' },
    { bad: '電車で足を踏まれた', good: '存在感MAXの証明。あなたは無視できない人間です', emoji: '👣' },
    { bad: 'コンビニのおにぎりが最後の1個で崩壊してた', good: '割引シールが貼られる運命。お得体質の持ち主', emoji: '🍙' },
    { bad: '傘を忘れて雨に降られた', good: '天然シャワーで浄化完了。運気リセット済み', emoji: '☔' },
    { bad: 'ATMの手数料を取られた', good: 'お金の流れを止めない人。金運の通り道が開通中', emoji: '💸' },
    { bad: '寝坊して朝食を食べ損ねた', good: '自然とプチ断食達成！体が勝手にデトックスモード', emoji: '⏰' },
    { bad: 'エレベーターが目の前で閉まった', good: '階段で足腰強化チャンス獲得。未来の健康貯金', emoji: '🛗' },
    { bad: 'スマホを落として画面にヒビ', good: 'オリジナルアート誕生。世界に一つだけのデザイン', emoji: '📱' },
    { bad: '自販機でお釣りが出てこなかった', good: '見えない誰かにおごった徳ポイント加算中', emoji: '🥤' },
    { bad: '鳥のフンが頭に落ちてきた', good: '宝くじ買い時サイン！天からの金運マーキング完了', emoji: '🐦' },
    { bad: '好きな服にシミがついた', good: 'ワイルド系ファッションへの進化フラグ発動', emoji: '👕' },
    { bad: '会議で名前を間違えられた', good: 'ミステリアスキャラ認定。気になる存在になってる', emoji: '🎭' },
    { bad: '信号が全部赤だった', good: 'VIPは急がない。宇宙があなたに休憩を命じてる', emoji: '🚦' },
    { bad: 'お気に入りのペンのインクが切れた', good: '一つの章が完結。次の物語が始まる合図', emoji: '🖊️' },
    { bad: '食べたかったランチが売り切れ', good: '運命の一品に出会うためのフラグ。次が本命', emoji: '🍱' },
    { bad: 'Wi-Fiが突然切れた', good: 'デジタルデトックス強制発動。脳がリフレッシュ中', emoji: '📶' },
    { bad: 'コーヒーをこぼした', good: 'アロマセラピー効果発動。周囲を癒すコーヒー聖人', emoji: '☕' },
    { bad: '蚊に3か所刺された', good: 'モテ期到来。あなたの血は上質認定されました', emoji: '🦟' },
    { bad: '財布を家に忘れた', good: 'ミニマリスト修行レベル1クリア。身軽さを体感中', emoji: '👛' },
    { bad: '目覚ましより1分前に起きてしまった', good: '体内時計が超高精度。生体AIレベルの自己管理力', emoji: '🕐' },
    { bad: 'レジで小銭がなくて焦った', good: 'キャッシュレス時代の先駆者。進化を促されている', emoji: '💳' },
    { bad: 'ヘッドホンのコードが絡まっていた', good: '複雑な問題を解くIQの高さの証明', emoji: '🎧' },
    { bad: '推しの配信を見逃した', good: 'アーカイブという名の2度楽しめる権利を獲得', emoji: '📺' },
    { bad: '爪が割れた', good: '新しい自分への脱皮開始。再生能力覚醒のサイン', emoji: '💅' },
    { bad: 'ゴミの日を間違えた', good: '断捨離の猶予期間を獲得。本当に捨てていいか再確認タイム', emoji: '🗑️' }
  ];

  var history = JSON.parse(localStorage.getItem('omikuji_history') || '[]');

  function drawOmikuji() {
    var item = DATA[Math.floor(Math.random() * DATA.length)];

    document.getElementById('bad-text').textContent = item.bad;
    document.getElementById('bad-card').classList.add('show');
    document.getElementById('bad-card').style.display = 'block';

    document.getElementById('good-emoji').textContent = item.emoji;
    document.getElementById('good-text').textContent = item.good;
    document.getElementById('good-card').classList.add('show');
    document.getElementById('good-card').style.display = 'block';

    document.getElementById('btn-copy').classList.add('show');
    document.getElementById('btn-copy').style.display = 'block';

    // 履歴に追加
    history.unshift({ bad: item.bad, good: item.good, date: new Date().toLocaleString('ja-JP') });
    if (history.length > 10) history.pop();
    localStorage.setItem('omikuji_history', JSON.stringify(history));
    renderHistory();
  }

  function copyResult() {
    var bad = document.getElementById('bad-text').textContent;
    var good = document.getElementById('good-text').textContent;
    var text = '【今日の不運】' + bad + '\n【ポジティブ変換】' + good + '\n\n#不運ポジティブ変換おみくじ';
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btn-copy');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = '📋 結果をコピー'; }, 2000);
    });
  }

  function renderHistory() {
    if (history.length === 0) {
      document.getElementById('history-card').style.display = 'none';
      return;
    }
    document.getElementById('history-card').style.display = 'block';
    var html = history.map(function(h) {
      return '<div class="history-item"><span class="history-bad">💀 ' + h.bad + '</span><br><span class="history-good">🌈 ' + h.good + '</span></div>';
    }).join('');
    document.getElementById('history-list').innerHTML = html;
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
