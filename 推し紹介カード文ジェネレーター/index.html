<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し紹介カード文ジェネレーター｜SNSにそのまま貼れる推し布教文を3パターン自動生成</title>
  <meta name="description" content="推しの名前・ジャンル・好きポイントを選ぶだけで、SNSにそのまま貼れる推し紹介カード文を3パターン即生成。布教・自己紹介・固定ツイートに使える、推し活オタクのための紹介文ジェネレーターです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .app-header .lead { font-size: 0.85rem; color: var(--text); margin-top: 0.5rem; line-height: 1.5; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem;
    }
    .check-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.7rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer; user-select: none;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .check-item input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.88rem; color: var(--text); line-height: 1.3; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      color: var(--accent); font-weight: 700;
    }
    .check-item:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    /* 結果カード（3パターン） */
    .gen-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      margin: 0 auto 0.8rem;
      max-width: 600px;
      box-shadow: var(--shadow);
    }
    .gen-tag {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      padding: 0.2rem 0.55rem; border-radius: 6px;
      margin-bottom: 0.6rem;
    }
    .gen-text {
      font-size: 0.95rem; line-height: 1.7;
      color: var(--text); white-space: pre-wrap;
      margin-bottom: 0.7rem;
    }
    .gen-meta {
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.5rem;
    }
    .gen-count {
      font-size: 0.72rem; color: var(--text-sub);
    }
    .gen-count.over { color: var(--ng); font-weight: 700; }
    .btn-copy {
      padding: 0.5rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { background: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .gen-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>💖 推し紹介カード文ジェネレーター</h1>
    <p class="subtitle">SNS布教・固定ツイ・自己紹介に。3パターン即生成</p>
    <p class="lead">推しの名前と「好き」を選ぶだけ。SNSにそのまま貼れる紹介カード文を3パターン作ります。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推し情報を入力</p>
    <div class="field">
      <label for="oshiName">推しの名前</label>
      <input type="text" id="oshiName" placeholder="例: ○○くん / ○○ちゃん" maxlength="30">
      <p class="hint">愛称・本名どちらでもOK（30字まで）</p>
    </div>
    <div class="field">
      <label for="oshiGenre">ジャンル</label>
      <select id="oshiGenre">
        <option value="アイドル">アイドル</option>
        <option value="俳優・声優">俳優・声優</option>
        <option value="アニメ・漫画キャラ">アニメ・漫画キャラ</option>
        <option value="Vtuber・配信者">Vtuber・配信者</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label>好きなところ（複数選択OK・1〜4個推奨）</label>
      <div class="check-grid" id="pointGrid"></div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">カード文を3パターン生成する</button>

  <!-- 結果（JSが gen-card を append） -->
  <div id="resultArea"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 生成された文章は推し活SNSでそのまま使える長さに調整しています（X目安：280字以内）。布教・固定ツイート・自己紹介などにご活用ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var POINTS = ['笑顔', '声', '歌唱力', 'ダンス', '人柄・性格', 'ビジュアル', 'トーク', '努力家なところ'];
  var STORAGE_KEY = 'oshi-card-gen-v1';

  // checkbox UIを生成
  (function initPoints() {
    var grid = document.getElementById('pointGrid');
    POINTS.forEach(function(p, i) {
      var label = document.createElement('label');
      label.className = 'check-item';
      label.innerHTML = '<input type="checkbox" value="' + p + '"><span class="check-text">' + p + '</span>';
      grid.appendChild(label);
    });
  })();

  // 直近入力を復元
  (function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.name) document.getElementById('oshiName').value = d.name;
      if (d.genre) document.getElementById('oshiGenre').value = d.genre;
      if (Array.isArray(d.points)) {
        var checks = document.querySelectorAll('#pointGrid input[type="checkbox"]');
        checks.forEach(function(c) {
          if (d.points.indexOf(c.value) >= 0) c.checked = true;
        });
      }
    } catch (e) {}
  })();

  function getSelectedPoints() {
    var checks = document.querySelectorAll('#pointGrid input[type="checkbox"]:checked');
    var arr = [];
    checks.forEach(function(c) { arr.push(c.value); });
    return arr;
  }

  function buildHashtags(name, genre) {
    var tags = [];
    if (name) tags.push('#' + name.replace(/\s+/g, '') + 'と繋がりたい');
    tags.push('#推し活');
    if (genre === 'アイドル') tags.push('#アイドル好きと繋がりたい');
    else if (genre === '俳優・声優') tags.push('#俳優好きと繋がりたい');
    else if (genre === 'アニメ・漫画キャラ') tags.push('#オタクと繋がりたい');
    else if (genre === 'Vtuber・配信者') tags.push('#Vtuber好きと繋がりたい');
    return tags.join(' ');
  }

  function pattern1Hot(name, genre, points) {
    var n = name || '推し';
    var p = points.length ? points.join('・') : '存在そのもの';
    return '【推しの話、聞いてくれ】\n' +
           n + 'を好きになってから世界の彩度が上がりました。\n' +
           p + 'が天才。とにかく天才。\n' +
           'これから推す人にも全力でおすすめしたい' + genre + 'です。';
  }

  function pattern2Quiet(name, genre, points) {
    var n = name || 'あの人';
    var p = points.length ? points[0] : '存在感';
    var p2 = points.length > 1 ? '、' + points[1] + 'も好き' : '';
    return n + 'の' + p + 'に、ふと救われる日があります' + p2 + '。\n' +
           '騒がず、ただ静かに応援していたい。\n' +
           'そう思える' + genre + 'に出会えたことに感謝。';
  }

  function pattern3Spread(name, genre, points) {
    var n = name || '推し';
    var listed = points.length ? points.map(function(x){ return '・' + x; }).join('\n') : '・全部';
    return '🌟 ' + n + ' 布教カード\n' +
           'ジャンル：' + genre + '\n' +
           '好きなとこ：\n' + listed + '\n' +
           'まだ知らない人、覗いてみてほしい。沼にようこそ。';
  }

  function generate() {
    var name = document.getElementById('oshiName').value.trim();
    var genre = document.getElementById('oshiGenre').value;
    var points = getSelectedPoints();

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        name: name, genre: genre, points: points
      }));
    } catch (e) {}

    var tags = buildHashtags(name, genre);
    var data = [
      { tag: '熱量MAX系', text: pattern1Hot(name, genre, points) + '\n\n' + tags },
      { tag: 'しっとり系', text: pattern2Quiet(name, genre, points) + '\n\n' + tags },
      { tag: '布教カード系', text: pattern3Spread(name, genre, points) + '\n\n' + tags }
    ];

    var area = document.getElementById('resultArea');
    area.innerHTML = '';
    data.forEach(function(d, i) {
      var card = document.createElement('div');
      card.className = 'gen-card';
      var len = d.text.length;
      var over = len > 280;
      card.innerHTML =
        '<span class="gen-tag">' + d.tag + '</span>' +
        '<div class="gen-text">' + escapeHtml(d.text) + '</div>' +
        '<div class="gen-meta">' +
          '<span class="gen-count' + (over ? ' over' : '') + '">' + len + '字' + (over ? '（X要短縮）' : '') + '</span>' +
          '<button class="btn-copy" data-idx="' + i + '">コピー</button>' +
        '</div>';
      area.appendChild(card);
    });

    // コピーボタン
    area.querySelectorAll('.btn-copy').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        var text = data[idx].text;
        copyText(text, btn);
      });
    });

    // スクロール
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(text, btn) {
    var fallback = function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        markCopied(btn);
      }, function() {
        fallback(); markCopied(btn);
      });
    } else {
      fallback(); markCopied(btn);
    }
  }

  function markCopied(btn) {
    btn.classList.add('copied');
    btn.textContent = 'コピー済み';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.textContent = 'コピー';
    }, 1800);
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
