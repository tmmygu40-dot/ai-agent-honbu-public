<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="部屋数・広さ・形・雰囲気を選ぶだけで、あなたの間取りをRPGダンジョン風に変換するAI画像生成プロンプト（英語）を即生成。Stable DiffusionやMidjourney用にすぐコピーできます。">
  <title>🗺️ 間取りRPGダンジョン化プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 70px; font-family: inherit; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── プロンプト出力エリア ── */
    .prompt-output {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .prompt-text {
      width: 100%;
      padding: 0.9rem;
      font-size: 0.88rem;
      font-family: "Courier New", Consolas, monospace;
      background: #1a1218;
      color: #d4c5e2;
      border: 1.5px solid #5a3a6e;
      border-radius: 9px;
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
      word-break: break-all;
    }
    .btn-copy {
      display: block; width: 100%;
      margin-top: 0.85rem; padding: 0.65rem 1rem;
      font-size: 0.92rem; font-weight: 700;
      background: #5a3a6e; color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy:hover { background: #7a4a9e; }
    .btn-copy.copied { background: var(--ok); }
    .prompt-label {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .dungeon-badge {
      display: inline-block;
      background: #1a1218; color: #d4c5e2;
      font-size: 0.72rem; padding: 0.2rem 0.5rem;
      border-radius: 5px; letter-spacing: 0.04em;
    }

    /* ── 履歴カード ── */
    .history-list { margin-top: 0; }
    .history-item {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border-radius: 7px;
      transition: background 0.1s;
      position: relative;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--accent-light); }
    .history-item-time { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .history-item-text {
      font-size: 0.82rem; color: var(--text);
      font-family: "Courier New", Consolas, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%;
    }
    .history-item-tag {
      font-size: 0.7rem; color: #5a3a6e; font-weight: 700;
      margin-top: 0.2rem;
    }
    .no-history { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .prompt-output { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🗺️ 間取りRPGダンジョン化プロンプトメーカー</h1>
    <p class="subtitle">間取りの条件を選ぶだけで、RPGダンジョン風のAI画像プロンプトをサクッと生成。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">間取りの条件を選ぶ</p>
    <div class="field">
      <label for="rooms">部屋数・間取り</label>
      <select id="rooms">
        <option value="1K">1K（ワンルーム）</option>
        <option value="1LDK">1LDK</option>
        <option value="2LDK" selected>2LDK</option>
        <option value="3LDK">3LDK</option>
        <option value="4LDK+">4LDK以上</option>
      </select>
    </div>
    <div class="field">
      <label for="size">広さ</label>
      <select id="size">
        <option value="compact">コンパクト（〜30㎡）</option>
        <option value="standard" selected>標準（31〜60㎡）</option>
        <option value="large">広め（61〜90㎡）</option>
        <option value="xlarge">大型（91㎡〜）</option>
      </select>
    </div>
    <div class="field">
      <label for="shape">形・レイアウト</label>
      <select id="shape">
        <option value="square" selected>正方形</option>
        <option value="rectangle">長方形</option>
        <option value="lshape">L字型</option>
        <option value="irregular">変形・複雑な形</option>
      </select>
    </div>
    <div class="field">
      <label for="atmosphere">ダンジョンの雰囲気</label>
      <select id="atmosphere">
        <option value="dark" selected>ダーク・陰影重視</option>
        <option value="mystic">神秘的・魔法的</option>
        <option value="ruin">廃墟・苔むした古代遺跡</option>
        <option value="crystal">魔法陣・クリスタル輝き</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加したい要素（任意）</label>
      <input type="text" id="extra" placeholder="例: underground lake, treasure room, boss room...">
      <p class="hint">英語・日本語どちらでもOK（英語推奨）</p>
    </div>
    <div class="field">
      <label for="style">画像スタイル</label>
      <select id="style">
        <option value="topdown" selected>トップダウン（真上から）</option>
        <option value="isometric">アイソメトリック（斜め上から）</option>
        <option value="concept">コンセプトアート風</option>
        <option value="pixel">ドット絵・ピクセルアート</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">⚔️ ダンジョンプロンプトを生成する</button>

  <!-- プロンプト出力 -->
  <div class="prompt-output" id="promptOutput">
    <p class="prompt-label">
      生成されたプロンプト <span class="dungeon-badge">🗝️ AI用 英語プロンプト</span>
    </p>
    <textarea class="prompt-text" id="promptText" readonly></textarea>
    <button class="btn-copy no-print" id="copyBtn" onclick="copyPrompt()">📋 プロンプトをコピーする</button>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot no-print" aria-label="広告枠">広告枠</div>

  <!-- 履歴カード -->
  <div class="card no-print">
    <p class="card-title">最近の生成履歴（最大5件）</p>
    <div class="history-list" id="historyList">
      <p class="no-history">まだ生成履歴がありません</p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🗺️ このツールは、AI画像生成（Stable Diffusion・Midjourneyなど）向けのプロンプトを自動生成します。生成されたプロンプトは自由にご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── 間取り→RPGダンジョンプロンプト 変換マップ ──
  var ROOMS_MAP = {
    '1K':   'single compact chamber, one-room dungeon cell',
    '1LDK': 'one main hall with antechamber, small dungeon layout',
    '2LDK': 'two-chamber dungeon with connecting corridor',
    '3LDK': 'three-room dungeon complex with branching passages',
    '4LDK+':'large multi-chamber dungeon fortress with multiple corridors'
  };
  var SIZE_MAP = {
    'compact':  'cramped narrow dungeon, tight passages, claustrophobic',
    'standard': 'standard-sized dungeon rooms, moderate open space',
    'large':    'spacious dungeon chambers, wide corridors',
    'xlarge':   'vast sprawling dungeon complex, grand hall proportions'
  };
  var SHAPE_MAP = {
    'square':    'square-shaped rooms, symmetrical layout',
    'rectangle': 'rectangular rooms and long corridors, elongated layout',
    'lshape':    'L-shaped dungeon path, hidden corner rooms',
    'irregular': 'irregular winding passages, asymmetrical cave-like rooms'
  };
  var ATMOSPHERE_MAP = {
    'dark':    'dark shadowy atmosphere, dim flickering torchlight, ominous shadows, dark stone walls',
    'mystic':  'mystical glowing runes on walls, ethereal blue light, floating magical orbs, arcane energy',
    'ruin':    'ancient ruined dungeon, crumbling stone walls, overgrown with moss and vines, weathered architecture',
    'crystal': 'glowing crystals embedded in walls, magical circle floor patterns, purple and teal arcane light'
  };
  var STYLE_MAP = {
    'topdown':    'top-down view, 2D floor plan perspective, bird eye view, orthographic projection',
    'isometric':  'isometric perspective, 3D isometric dungeon art, 45-degree angle view',
    'concept':    'concept art style, painted illustration, detailed fantasy artwork',
    'pixel':      'pixel art style, retro RPG sprite, 16-bit game aesthetic, pixelated dungeon map'
  };

  function generate() {
    var rooms = document.getElementById('rooms').value;
    var size = document.getElementById('size').value;
    var shape = document.getElementById('shape').value;
    var atmosphere = document.getElementById('atmosphere').value;
    var extra = document.getElementById('extra').value.trim();
    var style = document.getElementById('style').value;

    var parts = [
      'RPG dungeon map',
      STYLE_MAP[style],
      ROOMS_MAP[rooms],
      SIZE_MAP[size],
      SHAPE_MAP[shape],
      ATMOSPHERE_MAP[atmosphere],
      'stone wall texture, wooden doors, floor tiles, detailed dungeon architecture',
      'medieval fantasy setting, high quality',
      'game art style, highly detailed illustration'
    ];

    if (extra) {
      // 簡易な日本語→英語変換（よく使うキーワード）
      var extraEn = extra
        .replace(/宝部屋|宝箱の部屋/g, 'treasure room')
        .replace(/ボス部屋|ボスルーム/g, 'boss room')
        .replace(/地下湖/g, 'underground lake')
        .replace(/牢獄|牢屋/g, 'prison cells')
        .replace(/図書室|書庫/g, 'ancient library')
        .replace(/祭壇/g, 'dark altar')
        .replace(/罠/g, 'trap mechanism')
        .replace(/秘密通路/g, 'secret passage')
        .replace(/螺旋階段/g, 'spiral staircase')
        .replace(/橋/g, 'stone bridge');
      parts.push(extraEn);
    }

    var prompt = parts.join(', ');

    // 出力表示
    document.getElementById('promptText').value = prompt;
    var output = document.getElementById('promptOutput');
    output.style.display = 'block';
    output.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // コピーボタンリセット
    var copyBtn = document.getElementById('copyBtn');
    copyBtn.textContent = '📋 プロンプトをコピーする';
    copyBtn.className = 'btn-copy no-print';

    // 履歴保存
    saveHistory({
      prompt: prompt,
      rooms: rooms,
      atmosphere: atmosphere,
      style: style,
      time: new Date().toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    });
    renderHistory();
  }

  function copyPrompt() {
    var text = document.getElementById('promptText').value;
    var btn = document.getElementById('copyBtn');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✅ コピーしました！';
        btn.className = 'btn-copy no-print copied';
        setTimeout(function() {
          btn.textContent = '📋 プロンプトをコピーする';
          btn.className = 'btn-copy no-print';
        }, 2000);
      });
    } else {
      // fallback
      var ta = document.getElementById('promptText');
      ta.select();
      document.execCommand('copy');
      btn.textContent = '✅ コピーしました！';
      btn.className = 'btn-copy no-print copied';
      setTimeout(function() {
        btn.textContent = '📋 プロンプトをコピーする';
        btn.className = 'btn-copy no-print';
      }, 2000);
    }
  }

  function saveHistory(item) {
    var history = loadHistory();
    history.unshift(item);
    if (history.length > 5) history = history.slice(0, 5);
    try { localStorage.setItem('dungeon_prompt_history', JSON.stringify(history)); } catch(e) {}
  }

  function loadHistory() {
    try {
      var data = localStorage.getItem('dungeon_prompt_history');
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }

  function renderHistory() {
    var history = loadHistory();
    var container = document.getElementById('historyList');
    if (!history.length) {
      container.innerHTML = '<p class="no-history">まだ生成履歴がありません</p>';
      return;
    }
    container.innerHTML = history.map(function(item, i) {
      var label = item.rooms + ' / ' + (item.atmosphere || '') + ' / ' + (item.style || '');
      return '<div class="history-item" onclick="loadHistoryItem(' + i + ')">'
        + '<p class="history-item-time">' + (item.time || '') + '</p>'
        + '<p class="history-item-tag">⚔️ ' + label + '</p>'
        + '<p class="history-item-text">' + escHtml(item.prompt) + '</p>'
        + '</div>';
    }).join('');
  }

  function loadHistoryItem(index) {
    var history = loadHistory();
    if (!history[index]) return;
    var item = history[index];
    document.getElementById('promptText').value = item.prompt;
    var output = document.getElementById('promptOutput');
    output.style.display = 'block';
    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
    var btn = document.getElementById('copyBtn');
    btn.textContent = '📋 プロンプトをコピーする';
    btn.className = 'btn-copy no-print';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 起動時に履歴を表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
