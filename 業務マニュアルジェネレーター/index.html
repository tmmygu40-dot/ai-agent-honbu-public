<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務マニュアルジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent); background: #fff;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ステップリスト ── */
    .step-list { list-style: none; }
    .step-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .step-num {
      flex-shrink: 0; width: 2rem; height: 2rem;
      background: var(--accent); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; margin-top: 0.5rem;
    }
    .step-input {
      flex: 1; padding: 0.6rem 0.8rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; font-family: inherit;
    }
    .step-input:focus { border-color: var(--accent); background: #fff; }
    .btn-del-step {
      flex-shrink: 0; width: 2rem; height: 2rem;
      background: var(--ng-bg); color: var(--ng);
      border: 1.5px solid var(--ng); border-radius: 50%;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-top: 0.5rem; transition: background 0.15s;
    }
    .btn-del-step:hover { background: var(--ng); color: #fff; }
    .btn-add-step {
      width: 100%; padding: 0.6rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px dashed var(--accent); border-radius: 9px;
      cursor: pointer; margin-top: 0.4rem; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-add-step:hover { background: var(--accent); color: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── プレビューカード ── */
    .preview-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .preview-card.show { display: block; }
    .preview-header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.8rem;
      margin-bottom: 1rem;
    }
    .preview-header h2 { font-size: 1.1rem; font-weight: 900; }
    .preview-meta { font-size: 0.8rem; color: var(--text-sub); margin-top: 0.3rem; }
    .preview-section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.5rem; margin-top: 1rem;
    }
    .preview-overview { font-size: 0.92rem; line-height: 1.6; white-space: pre-wrap; }
    .preview-steps { list-style: none; margin-top: 0.5rem; }
    .preview-step {
      display: flex; gap: 0.7rem; align-items: flex-start;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .preview-step:last-child { border-bottom: none; }
    .preview-step-n {
      flex-shrink: 0; font-weight: 700; color: var(--accent);
      min-width: 2rem;
    }

    /* ── アクションボタン群 ── */
    .action-row {
      display: flex; gap: 0.6rem; margin-bottom: 1rem;
      max-width: 600px; margin-left: auto; margin-right: auto;
    }
    .btn-action {
      flex: 1; padding: 0.75rem 0.5rem;
      font-size: 0.9rem; font-weight: 700;
      border-radius: 10px; cursor: pointer;
      border: 2px solid var(--accent); font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .btn-action.primary { background: var(--accent); color: #fff; }
    .btn-action.secondary { background: #fff; color: var(--accent); }
    .btn-action:hover.primary { background: #c96c00; }
    .btn-action:hover.secondary { background: var(--accent-light); }

    /* ── 保存一覧 ── */
    .saved-list { list-style: none; }
    .saved-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0.3rem; border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .saved-item:last-child { border-bottom: none; }
    .saved-name { font-weight: 600; cursor: pointer; color: var(--accent); }
    .saved-name:hover { text-decoration: underline; }
    .saved-date { font-size: 0.75rem; color: var(--text-sub); margin-left: 0.5rem; }
    .btn-del-saved {
      background: none; border: none; color: var(--ng);
      font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem;
    }
    .empty-msg { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 印刷用 ── */
    @media print {
      .app-header, .card:not(.preview-card), .btn-calc, .action-row, .saved-section, .back-link, #fav-widget-root { display: none !important; }
      .preview-card { display: block !important; border: none; box-shadow: none; max-width: 100%; }
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>業務マニュアルジェネレーター</h1>
    <p class="subtitle">業務内容を入力するだけで新人向け手順書を即生成</p>
  </header>

  <!-- 基本情報カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="bizName">業務名 *</label>
      <input type="text" id="bizName" placeholder="例：レジ締め作業">
    </div>
    <div class="field">
      <label for="assignee">担当者・部署</label>
      <input type="text" id="assignee" placeholder="例：レジ担当 / 全スタッフ">
    </div>
    <div class="field">
      <label for="overview">業務概要</label>
      <textarea id="overview" placeholder="例：閉店時のレジ締め・日報作成・釣り銭補充の一連の流れ"></textarea>
    </div>
  </div>

  <!-- 手順カード -->
  <div class="card">
    <p class="card-title">作業手順</p>
    <ul class="step-list" id="stepList"></ul>
    <button class="btn-add-step" onclick="addStep()">＋ 手順を追加</button>
  </div>

  <!-- 備考カード -->
  <div class="card">
    <p class="card-title">注意事項・備考（任意）</p>
    <div class="field">
      <textarea id="notes" placeholder="例：作業前に必ず上長に報告すること"></textarea>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">手順書を生成する</button>

  <!-- アクションボタン -->
  <div class="action-row" id="actionRow" style="display:none">
    <button class="btn-action primary" onclick="copyText()">コピー</button>
    <button class="btn-action secondary" onclick="printPage()">印刷</button>
    <button class="btn-action secondary" onclick="saveManual()">保存</button>
  </div>

  <!-- プレビューカード -->
  <div class="preview-card" id="previewCard">
    <div class="preview-header">
      <h2 id="pvTitle"></h2>
      <p class="preview-meta" id="pvMeta"></p>
    </div>
    <div id="pvOverviewSection">
      <p class="preview-section-title">【業務概要】</p>
      <p class="preview-overview" id="pvOverview"></p>
    </div>
    <p class="preview-section-title">【作業手順】</p>
    <ol class="preview-steps" id="pvSteps"></ol>
    <div id="pvNotesSection">
      <p class="preview-section-title">【注意事項・備考】</p>
      <p class="preview-overview" id="pvNotes"></p>
    </div>
  </div>

  <!-- 保存一覧 -->
  <div class="card saved-section" id="savedSection">
    <p class="card-title">保存済み手順書</p>
    <ul class="saved-list" id="savedList"></ul>
    <p class="empty-msg" id="savedEmpty">まだ保存されていません</p>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'gyomu_manual_saved';
  var stepCount = 0;

  // 初期ステップ3つ
  (function init() {
    addStep(); addStep(); addStep();
    renderSavedList();
  })();

  function addStep() {
    stepCount++;
    var li = document.createElement('li');
    li.className = 'step-item';
    li.dataset.id = stepCount;
    li.innerHTML =
      '<div class="step-num">' + document.querySelectorAll('.step-item').length + '</div>' +
      '<input class="step-input" type="text" placeholder="例：レジを開けて現金を確認する">' +
      '<button class="btn-del-step" onclick="delStep(this)">×</button>';
    document.getElementById('stepList').appendChild(li);
    renumberSteps();
  }

  function delStep(btn) {
    var li = btn.closest('.step-item');
    li.parentNode.removeChild(li);
    renumberSteps();
  }

  function renumberSteps() {
    var items = document.querySelectorAll('.step-item');
    items.forEach(function(li, i) {
      li.querySelector('.step-num').textContent = i + 1;
    });
  }

  function generate() {
    var bizName = document.getElementById('bizName').value.trim();
    if (!bizName) { alert('業務名を入力してください'); return; }

    var assignee = document.getElementById('assignee').value.trim();
    var overview = document.getElementById('overview').value.trim();
    var notes = document.getElementById('notes').value.trim();

    var steps = [];
    document.querySelectorAll('.step-item .step-input').forEach(function(inp) {
      var v = inp.value.trim();
      if (v) steps.push(v);
    });
    if (steps.length === 0) { alert('手順を1つ以上入力してください'); return; }

    // プレビュー生成
    document.getElementById('pvTitle').textContent = '【業務手順書】' + bizName;
    var meta = '作成日：' + today();
    if (assignee) meta += '　担当：' + assignee;
    document.getElementById('pvMeta').textContent = meta;

    if (overview) {
      document.getElementById('pvOverview').textContent = overview;
      document.getElementById('pvOverviewSection').style.display = '';
    } else {
      document.getElementById('pvOverviewSection').style.display = 'none';
    }

    var stepsEl = document.getElementById('pvSteps');
    stepsEl.innerHTML = '';
    steps.forEach(function(s, i) {
      var li = document.createElement('li');
      li.className = 'preview-step';
      li.innerHTML = '<span class="preview-step-n">手順' + (i + 1) + '</span><span>' + escHtml(s) + '</span>';
      stepsEl.appendChild(li);
    });

    if (notes) {
      document.getElementById('pvNotes').textContent = notes;
      document.getElementById('pvNotesSection').style.display = '';
    } else {
      document.getElementById('pvNotesSection').style.display = 'none';
    }

    document.getElementById('previewCard').classList.add('show');
    document.getElementById('actionRow').style.display = 'flex';
    document.getElementById('previewCard').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function copyText() {
    var bizName = document.getElementById('bizName').value.trim();
    var assignee = document.getElementById('assignee').value.trim();
    var overview = document.getElementById('overview').value.trim();
    var notes = document.getElementById('notes').value.trim();

    var steps = [];
    document.querySelectorAll('.step-item .step-input').forEach(function(inp) {
      var v = inp.value.trim();
      if (v) steps.push(v);
    });

    var lines = [];
    lines.push('【業務手順書】' + bizName);
    lines.push('作成日：' + today() + (assignee ? '　担当：' + assignee : ''));
    lines.push('');
    if (overview) { lines.push('■ 業務概要'); lines.push(overview); lines.push(''); }
    lines.push('■ 作業手順');
    steps.forEach(function(s, i) { lines.push('手順' + (i + 1) + '：' + s); });
    if (notes) { lines.push(''); lines.push('■ 注意事項・備考'); lines.push(notes); }

    var text = lines.join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      alert('コピーしました！');
    }
  }

  function printPage() { window.print(); }

  function saveManual() {
    var bizName = document.getElementById('bizName').value.trim();
    if (!bizName) { alert('業務名を入力してください'); return; }

    var steps = [];
    document.querySelectorAll('.step-item .step-input').forEach(function(inp) {
      var v = inp.value.trim(); if (v) steps.push(v);
    });

    var data = {
      id: Date.now(),
      date: today(),
      bizName: bizName,
      assignee: document.getElementById('assignee').value.trim(),
      overview: document.getElementById('overview').value.trim(),
      notes: document.getElementById('notes').value.trim(),
      steps: steps
    };

    var list = loadList();
    list.unshift(data);
    if (list.length > 30) list = list.slice(0, 30);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    renderSavedList();
    alert('保存しました！');
  }

  function loadList() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function renderSavedList() {
    var list = loadList();
    var ul = document.getElementById('savedList');
    var empty = document.getElementById('savedEmpty');
    ul.innerHTML = '';
    if (list.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    list.forEach(function(item) {
      var li = document.createElement('li');
      li.className = 'saved-item';
      li.innerHTML =
        '<div>' +
          '<span class="saved-name" onclick="loadManual(' + item.id + ')">' + escHtml(item.bizName) + '</span>' +
          '<span class="saved-date">' + item.date + '</span>' +
        '</div>' +
        '<button class="btn-del-saved" onclick="deleteSaved(' + item.id + ')" title="削除">🗑</button>';
      ul.appendChild(li);
    });
  }

  function loadManual(id) {
    var list = loadList();
    var item = list.find(function(x) { return x.id === id; });
    if (!item) return;

    document.getElementById('bizName').value = item.bizName;
    document.getElementById('assignee').value = item.assignee;
    document.getElementById('overview').value = item.overview;
    document.getElementById('notes').value = item.notes;

    // 手順を再セット
    document.getElementById('stepList').innerHTML = '';
    stepCount = 0;
    item.steps.forEach(function(s) {
      addStep();
      var inputs = document.querySelectorAll('.step-item .step-input');
      inputs[inputs.length - 1].value = s;
    });
    if (item.steps.length === 0) { addStep(); addStep(); addStep(); }

    window.scrollTo({top: 0, behavior: 'smooth'});
    generate();
  }

  function deleteSaved(id) {
    if (!confirm('この手順書を削除しますか？')) return;
    var list = loadList().filter(function(x) { return x.id !== id; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    renderSavedList();
  }

  function today() {
    var d = new Date();
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  </script>

</body>
