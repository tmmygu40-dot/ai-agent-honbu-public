<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>調達先リスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── サマリーカード ── */
    .summary-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      display: flex;
      gap: 0.5rem;
      justify-content: space-around;
      text-align: center;
    }
    .summary-item { flex: 1; }
    .summary-label { font-size: 0.7rem; color: var(--text-sub); font-weight: 600; margin-bottom: 0.3rem; }
    .summary-num { font-size: 1.5rem; font-weight: 900; }
    .summary-num.ok { color: var(--ok); }
    .summary-num.warn { color: var(--warn); }
    .summary-num.ng { color: var(--ng); }

    /* ── 仕入先リスト ── */
    .list-area { max-width: 600px; margin: 0 auto; }
    .list-header {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; padding: 0 0.2rem 0.5rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .supplier-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      position: relative;
    }
    .supplier-card.ok   { border-left: 4px solid var(--ok); }
    .supplier-card.warn { border-left: 4px solid var(--warn); }
    .supplier-card.ng   { border-left: 4px solid var(--ng); }

    .supplier-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .supplier-name { font-size: 1rem; font-weight: 800; }
    .risk-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.7rem; border-radius: 99px;
      white-space: nowrap;
    }
    .risk-badge.ok   { background: var(--ok-bg);   color: var(--ok); }
    .risk-badge.warn { background: var(--warn-bg);  color: var(--warn); }
    .risk-badge.ng   { background: var(--ng-bg);    color: var(--ng); }

    .supplier-score {
      font-size: 1.6rem; font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .supplier-score.ok   { color: var(--ok); }
    .supplier-score.warn { color: var(--warn); }
    .supplier-score.ng   { color: var(--ng); }

    .supplier-detail {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-sub);
    }
    .detail-chip {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.2rem 0.55rem;
    }
    .detail-chip span { font-weight: 600; color: var(--text); }

    .btn-del {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 1.1rem;
      line-height: 1; padding: 0.2rem 0.4rem;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .btn-del:hover { background: var(--ng-bg); color: var(--ng); }

    .empty-msg {
      text-align: center; color: var(--text-sub);
      font-size: 0.88rem; padding: 2rem 0;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .err-msg { color: var(--ng); font-size: 0.82rem; margin-top: 0.5rem; display: none; }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>調達先リスク診断アプリ</h1>
    <p class="subtitle">仕入先の納期実績・代替先・依存度からリスクを即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">仕入先を追加</p>
    <div class="field">
      <label for="f-name">仕入先名</label>
      <input type="text" id="f-name" placeholder="例：○○商事">
    </div>
    <div class="field">
      <label for="f-delivery">納期遵守率（%）</label>
      <input type="number" id="f-delivery" placeholder="例：85" min="0" max="100">
      <p class="hint">過去の発注で、期日通りに納品された割合（0〜100）</p>
    </div>
    <div class="field">
      <label for="f-alt">代替先</label>
      <select id="f-alt">
        <option value="yes">あり（別の仕入先に切り替えられる）</option>
        <option value="no">なし（この仕入先のみ）</option>
      </select>
    </div>
    <div class="field">
      <label for="f-dep">依存度（%）</label>
      <input type="number" id="f-dep" placeholder="例：60" min="0" max="100">
      <p class="hint">この仕入先が全仕入れに占める割合（0〜100）</p>
    </div>
    <p class="err-msg" id="err">すべての項目を入力してください</p>
  </div>

  <button class="btn-add" onclick="addSupplier()">＋ 登録して診断する</button>

  <!-- サマリー -->
  <div class="summary-card" id="summary" style="display:none">
    <div class="summary-item">
      <div class="summary-label">登録件数</div>
      <div class="summary-num" id="s-total" style="color:var(--text)">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">低リスク</div>
      <div class="summary-num ok" id="s-ok">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">中リスク</div>
      <div class="summary-num warn" id="s-warn">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">高リスク</div>
      <div class="summary-num ng" id="s-ng">0</div>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="list-area" id="list-area">
    <div class="empty-msg" id="empty-msg">仕入先を登録するとここに表示されます</div>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📊 リスクスコア＝(100−納期遵守率)×0.4＋依存度×0.3＋(代替先なし→30点)。スコア0〜39：低、40〜69：中、70以上：高。目安のスコアです。
  </p>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var LS_KEY = 'chotatsu_risk_v1';

  function calcScore(delivery, alt, dep) {
    return (100 - delivery) * 0.4 + (alt === 'no' ? 30 : 0) + dep * 0.3;
  }

  function scoreLevel(score) {
    if (score < 40) return 'ok';
    if (score < 70) return 'warn';
    return 'ng';
  }

  function levelLabel(level) {
    if (level === 'ok')   return '低リスク';
    if (level === 'warn') return '中リスク';
    return '高リスク';
  }

  function load() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e) { return []; }
  }

  function save(list) {
    localStorage.setItem(LS_KEY, JSON.stringify(list));
  }

  function addSupplier() {
    var name     = document.getElementById('f-name').value.trim();
    var delivery = parseFloat(document.getElementById('f-delivery').value);
    var alt      = document.getElementById('f-alt').value;
    var dep      = parseFloat(document.getElementById('f-dep').value);
    var err      = document.getElementById('err');

    if (!name || isNaN(delivery) || isNaN(dep)) {
      err.style.display = 'block';
      return;
    }
    err.style.display = 'none';

    delivery = Math.min(100, Math.max(0, delivery));
    dep      = Math.min(100, Math.max(0, dep));

    var score = calcScore(delivery, alt, dep);
    var list  = load();
    list.push({ name: name, delivery: delivery, alt: alt, dep: dep, score: score, id: Date.now() });
    save(list);

    document.getElementById('f-name').value = '';
    document.getElementById('f-delivery').value = '';
    document.getElementById('f-dep').value = '';

    render();
  }

  function deleteSupplier(id) {
    var list = load().filter(function(s) { return s.id !== id; });
    save(list);
    render();
  }

  function render() {
    var list = load();
    var listArea = document.getElementById('list-area');
    var summary  = document.getElementById('summary');
    var emptyMsg = document.getElementById('empty-msg');

    // sort by score desc
    list.sort(function(a, b) { return b.score - a.score; });

    if (list.length === 0) {
      summary.style.display = 'none';
      listArea.innerHTML = '<div class="empty-msg" id="empty-msg">仕入先を登録するとここに表示されます</div>';
      return;
    }

    // summary
    var cntOk = 0, cntWarn = 0, cntNg = 0;
    list.forEach(function(s) {
      var lv = scoreLevel(s.score);
      if (lv === 'ok') cntOk++;
      else if (lv === 'warn') cntWarn++;
      else cntNg++;
    });
    summary.style.display = 'flex';
    document.getElementById('s-total').textContent = list.length;
    document.getElementById('s-ok').textContent    = cntOk;
    document.getElementById('s-warn').textContent  = cntWarn;
    document.getElementById('s-ng').textContent    = cntNg;

    // list
    var html = '<div class="list-header">リスク高い順</div>';
    list.forEach(function(s) {
      var lv    = scoreLevel(s.score);
      var label = levelLabel(lv);
      var altLabel = s.alt === 'yes' ? 'あり' : 'なし';
      html += '<div class="supplier-card ' + lv + '">'
            +   '<button class="btn-del" onclick="deleteSupplier(' + s.id + ')" title="削除">×</button>'
            +   '<div class="supplier-top">'
            +     '<div class="supplier-name">' + esc(s.name) + '</div>'
            +     '<div class="risk-badge ' + lv + '">' + label + '</div>'
            +   '</div>'
            +   '<div class="supplier-score ' + lv + '">' + Math.round(s.score) + '<span style="font-size:1rem;font-weight:600;"> pt</span></div>'
            +   '<div class="supplier-detail">'
            +     '<div class="detail-chip">納期遵守率 <span>' + s.delivery + '%</span></div>'
            +     '<div class="detail-chip">代替先 <span>' + altLabel + '</span></div>'
            +     '<div class="detail-chip">依存度 <span>' + s.dep + '%</span></div>'
            +   '</div>'
            + '</div>';
    });

    listArea.innerHTML = html;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
  </script>

</body>
</html>
