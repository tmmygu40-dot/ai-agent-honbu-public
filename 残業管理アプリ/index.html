<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>残業管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>残業管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>出退勤を記録する</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="startTime">出勤時刻</label>
          <input type="time" id="startTime" value="09:00">
        </div>
        <div class="form-group">
          <label for="endTime">退勤時刻</label>
          <input type="time" id="endTime">
        </div>
        <div class="form-group">
          <label for="normalEnd">定時</label>
          <input type="time" id="normalEnd" value="18:00">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
      <p id="errorMsg" class="error-msg"></p>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label for="monthFilter">月を絞り込む：</label>
      <input type="month" id="monthFilter">
      <button id="clearFilter" class="btn-secondary">すべて表示</button>
    </section>

    <!-- 合計表示 -->
    <section class="summary-section">
      <div class="summary-card">
        <span class="summary-label">合計残業時間</span>
        <span id="totalOvertime" class="summary-value">0時間00分</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">記録件数</span>
        <span id="recordCount" class="summary-value">0件</span>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
