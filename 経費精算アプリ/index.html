<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経費精算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>経費精算アプリ</h1>

    <section class="input-section no-print">
      <h2>領収書を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="category">勘定科目</label>
          <select id="category">
            <option value="交通費">交通費</option>
            <option value="宿泊費">宿泊費</option>
            <option value="会議費">会議費</option>
            <option value="接待費">接待費</option>
            <option value="消耗品費">消耗品費</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" min="1" placeholder="例：1500" required>
        </div>
        <div class="form-group full-width">
          <label for="memo">備考</label>
          <input type="text" id="memo" placeholder="例：電車代（渋谷→新宿）">
        </div>
      </div>
      <button class="btn-add" id="btn-add">追加</button>
    </section>

    <section class="summary-section">
      <div class="summary-header">
        <h2>集計表</h2>
        <div class="print-controls no-print">
          <input type="text" id="title-input" placeholder="件名（例：2026年4月 経費精算）" class="title-input">
          <button class="btn-print" id="btn-print">印刷</button>
          <button class="btn-clear no-print" id="btn-clear">全削除</button>
        </div>
      </div>

      <div class="print-title" id="print-title"></div>

      <table class="summary-table" id="summary-table">
        <thead>
          <tr>
            <th>勘定科目</th>
            <th>小計</th>
          </tr>
        </thead>
        <tbody id="summary-body"></tbody>
        <tfoot>
          <tr class="total-row">
            <td>合計</td>
            <td id="total-amount">¥0</td>
          </tr>
        </tfoot>
      </table>
    </section>

    <section class="list-section">
      <h2>明細一覧</h2>
      <div id="empty-msg" class="empty-msg">領収書がまだありません</div>
      <table class="list-table" id="list-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>勘定科目</th>
            <th>金額</th>
            <th>備考</th>
            <th class="no-print">削除</th>
          </tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
