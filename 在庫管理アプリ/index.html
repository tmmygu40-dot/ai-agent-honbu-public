<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>在庫管理アプリ</h1>

    <section class="form-section">
      <h2>商品を追加</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：りんご" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="stockIn">仕入れ数</label>
          <input type="number" id="stockIn" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="stockOut">販売数</label>
          <input type="number" id="stockOut" placeholder="0" min="0">
        </div>
      </div>
      <button id="addBtn" class="btn btn-primary">追加する</button>
      <p id="errorMsg" class="error-msg" aria-live="polite"></p>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>在庫一覧</h2>
        <span id="totalCount" class="total-count"></span>
      </div>
      <div id="productList" class="product-list">
        <p class="empty-msg">商品が登録されていません。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
