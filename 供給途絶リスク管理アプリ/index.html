<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供給途絶リスク管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>供給途絶リスク管理</h1>
    <p class="subtitle">輸入品の在庫が何日持つか即確認</p>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2 id="form-title">品目を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="item-name">品目名 <span class="required">*</span></label>
          <input type="text" id="item-name" placeholder="例：部品A">
        </div>
        <div class="form-group">
          <label for="item-stock">現在の在庫数量 <span class="required">*</span></label>
          <input type="number" id="item-stock" placeholder="例：500" min="0">
        </div>
        <div class="form-group">
          <label for="item-daily">1日あたり使用量 <span class="required">*</span></label>
          <input type="number" id="item-daily" placeholder="例：20" min="0.1" step="0.1">
        </div>
        <div class="form-group">
          <label for="item-lead">リードタイム（日）<span class="required">*</span></label>
          <input type="number" id="item-lead" placeholder="例：30" min="1">
        </div>
        <div class="form-group">
          <label for="item-note">メモ（任意）</label>
          <input type="text" id="item-note" placeholder="例：主要サプライヤー：中国">
        </div>
      </div>
      <div class="form-actions">
        <button id="save-btn" class="btn btn-primary">追加する</button>
        <button id="cancel-btn" class="btn btn-secondary" style="display:none;">キャンセル</button>
      </div>
      <p id="form-error" class="error-msg"></p>
    </section>

    <!-- リスク凡例 -->
    <div class="legend">
      <span class="badge badge-red">危険</span> 残日数 ≤ リードタイム
      <span class="badge badge-yellow">注意</span> 残日数 ≤ リードタイム×1.5
      <span class="badge badge-green">安全</span> それ以外
    </div>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>品目一覧 <span id="item-count" class="count-badge">0件</span></h2>
        <button id="clear-btn" class="btn btn-danger-sm">全削除</button>
      </div>
      <div id="empty-msg" class="empty-msg">品目がまだ登録されていません。上のフォームから追加してください。</div>
      <div class="table-wrap">
        <table id="items-table" style="display:none;">
          <thead>
            <tr>
              <th>リスク</th>
              <th>品目名</th>
              <th>在庫数</th>
              <th>日使用量</th>
              <th>残日数</th>
              <th>リードタイム</th>
              <th>メモ</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="items-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
