<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>疲れタイプ睡眠ケア診断｜3問でぐっすり眠るケア法を提案</title>
  <meta name="description" content="今の疲れサインを3問で判定し、心・体・脳どのタイプの疲労かを診断。タイプ別に今夜から実践できる睡眠ケア法をすぐに提案する無料セルフチェックツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { margin-bottom: 1.4rem; }
    .question:last-child { margin-bottom: 0; }
    .question .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.5; }
    .choice {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .choice:last-child { margin-bottom: 0; }
    .choice input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .choice .choice-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .choice:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-emoji-big { font-size: 2.6rem; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text); line-height: 1.6; text-align: left; }

    .care-list { width: 100%; }
    .care-item {
      padding: 0.8rem 0.2rem; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.55; color: var(--text);
    }
    .care-item:last-child { border-bottom: none; }
    .care-item .care-tag {
      display: inline-block; padding: 0.15rem 0.5rem; margin-right: 0.4rem;
      font-size: 0.72rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent); border-radius: 6px;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>疲れタイプ睡眠ケア診断</h1>
    <p class="subtitle">3問で「心・体・脳」のどの疲れか判定 → 今夜できるケア法を提案</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">3つの質問</p>

    <div class="question">
      <p class="q-text">Q1. 最近、朝起きた時の感じは？</p>
      <label class="choice"><input type="radio" name="q1" value="mind"><span class="choice-text">気が重い・憂うつでベッドから出づらい</span></label>
      <label class="choice"><input type="radio" name="q1" value="body"><span class="choice-text">体が重だるい・節々が痛い</span></label>
      <label class="choice"><input type="radio" name="q1" value="brain"><span class="choice-text">頭がぼーっとして考えがまとまらない</span></label>
    </div>

    <div class="question">
      <p class="q-text">Q2. 日中の不調で一番強いのは？</p>
      <label class="choice"><input type="radio" name="q2" value="mind"><span class="choice-text">イライラ・落ち込み・気分の浮き沈み</span></label>
      <label class="choice"><input type="radio" name="q2" value="body"><span class="choice-text">肩こり・腰痛・むくみ・冷え</span></label>
      <label class="choice"><input type="radio" name="q2" value="brain"><span class="choice-text">集中力低下・物忘れ・目の疲れ</span></label>
    </div>

    <div class="question">
      <p class="q-text">Q3. 寝る時の状態に近いのは？</p>
      <label class="choice"><input type="radio" name="q3" value="mind"><span class="choice-text">不安や考え事で寝つけない</span></label>
      <label class="choice"><input type="radio" name="q3" value="body"><span class="choice-text">疲れているのに体がこわばって眠れない</span></label>
      <label class="choice"><input type="radio" name="q3" value="brain"><span class="choice-text">寝る直前までスマホ・PCを見ている</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="judge()">疲れタイプを診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="rEmoji">😴</p>
    <p class="result-label">あなたの疲れタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- ケア法カード -->
  <div class="card" id="careCard" style="display:none">
    <p class="card-title">今夜からできる睡眠ケア法</p>
    <div class="care-list" id="careList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省「健康づくりのための睡眠ガイド」など公的資料と一般的なセルフケア情報を参考に、目安として整理しています。症状が続く場合は医療機関にご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    mind: {
      label: '心の疲れタイプ（メンタル疲労）',
      emoji: '💭',
      level: 'warn',
      note: '感情の起伏や思考過多で交感神経が優位に。脳より気持ちのクールダウンが先決です。',
      cares: [
        ['呼吸', '寝る前に4秒吸って8秒吐く呼吸を5セット。心拍を落ち着かせます。'],
        ['書く', 'ノートに「今日のモヤモヤ」を3行だけ書き出して頭の外に出す。'],
        ['湯', 'ぬるめ38〜40℃のお湯に15分浸かる。リラックスのスイッチが入ります。'],
        ['香り', 'ラベンダー・カモミールなど鎮静系の香りを枕元に。'],
        ['距離', '寝る1時間前からSNS・ニュースを見ない。情報を遮断する時間を作る。']
      ]
    },
    body: {
      label: '体の疲れタイプ（フィジカル疲労）',
      emoji: '💪',
      level: 'ok',
      note: '筋肉のこわばり・血流低下が眠りを浅くしています。体をゆるめてから寝るのが効きます。',
      cares: [
        ['ストレッチ', '寝る前に肩・首・股関節を各30秒ゆっくり伸ばす。'],
        ['温め', '蒸しタオルで首・目元を温めて血流を促す。'],
        ['湯', '炭酸入浴剤を入れた40℃のお湯に10〜15分。発汗で老廃物を流す。'],
        ['寝姿勢', '横向き寝で膝の間にクッション。腰の負担を減らす。'],
        ['軽い運動', '日中に20分歩く。夜の寝つきが深くなる定番ケア。']
      ]
    },
    brain: {
      label: '脳の疲れタイプ（神経・情報疲労）',
      emoji: '🧠',
      level: 'ng',
      note: 'ブルーライト・情報過多で脳が興奮状態。「眠る前に脳を冷ます」のが最優先です。',
      cares: [
        ['デジタル断ち', '就寝1時間前にスマホ・PC・テレビをオフ。脳の興奮を鎮める。'],
        ['暗くする', '寝室の照明を暖色・薄暗くする。メラトニン分泌を促す。'],
        ['ホットアイ', '蒸しタオルやアイマスクで目を温める。眼精疲労を緩和。'],
        ['カフェイン', '15時以降はコーヒー・緑茶・栄養ドリンクを控える。'],
        ['ルーティン', '毎晩同じ時間に寝る。体内時計が整い、入眠が楽になる。']
      ]
    },
    mixed: {
      label: '混合タイプ（複合疲労）',
      emoji: '😵',
      level: 'ng',
      note: '心・体・脳のいくつかが同時に疲れているサイン。できる範囲で複数のケアを取り入れましょう。',
      cares: [
        ['深呼吸', '寝る前に4秒吸って8秒吐く呼吸を5セット。'],
        ['湯', 'ぬるめ40℃のお湯に15分浸かる。'],
        ['ストレッチ', '肩・首・股関節を各30秒ゆっくり伸ばす。'],
        ['デジタル断ち', '就寝1時間前にスマホ・PCをオフ。'],
        ['暗くする', '寝室を暖色・薄暗くしてメラトニンを促す。'],
        ['書き出し', 'モヤモヤを3行だけノートに書く。']
      ]
    }
  };

  var STORAGE_KEY = 'tsukare_type_sleep_care_v1';

  function judge() {
    var q1 = getRadio('q1');
    var q2 = getRadio('q2');
    var q3 = getRadio('q3');
    if (!q1 || !q2 || !q3) {
      showErr('3つの質問すべてに答えてください');
      return;
    }

    var count = { mind: 0, body: 0, brain: 0 };
    count[q1]++; count[q2]++; count[q3]++;

    var max = Math.max(count.mind, count.body, count.brain);
    var typeKey;
    if (max >= 2) {
      typeKey = count.mind === max ? 'mind' : count.body === max ? 'body' : 'brain';
    } else {
      typeKey = 'mixed';
    }

    showResult(typeKey);
    saveLast({ q1: q1, q2: q2, q3: q3, type: typeKey });
  }

  function getRadio(name) {
    var els = document.getElementsByName(name);
    for (var i = 0; i < els.length; i++) if (els[i].checked) return els[i].value;
    return null;
  }

  function showResult(typeKey) {
    var t = TYPES[typeKey];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('rEmoji').textContent = t.emoji;
    document.getElementById('rv').textContent = t.label;
    document.getElementById('rn').textContent = t.note;

    var listHtml = t.cares.map(function(c){
      return '<div class="care-item"><span class="care-tag">' + c[0] + '</span>' + c[1] + '</div>';
    }).join('');
    document.getElementById('careList').innerHTML = listHtml;
    document.getElementById('careCard').style.display = 'block';

    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rEmoji').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('careCard').style.display = 'none';
  }

  function saveLast(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadLast() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.q1) return;
      setRadio('q1', data.q1);
      setRadio('q2', data.q2);
      setRadio('q3', data.q3);
      if (data.type && TYPES[data.type]) showResult(data.type);
    } catch(e) {}
  }

  function setRadio(name, value) {
    var els = document.getElementsByName(name);
    for (var i = 0; i < els.length; i++) if (els[i].value === value) els[i].checked = true;
  }

  loadLast();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
