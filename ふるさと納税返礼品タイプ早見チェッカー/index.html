<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふるさと納税 返礼品タイプ早見チェッカー｜上限額と得する返礼品タイプが3秒でわかる</title>
  <meta name="description" content="年収と家族構成から控除上限額の目安、好みと方針から得する返礼品タイプを3秒で早見できる無料ツール。商品名・自治体名は載せず、タイプと還元率目安だけ表示します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ふるさと納税 返礼品タイプ早見チェッカー</h1>
    <p class="subtitle">年収と好みから「どんなタイプの返礼品が得か」を3秒早見 ※2026年4月時点の参考目安。最新情報は公式情報をご確認ください</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="income">年収（給与）</label>
      <input type="number" id="income" placeholder="例: 500" inputmode="numeric">
      <p class="hint">単位は万円。額面年収を入れてください</p>
    </div>
    <div class="field">
      <label for="family">家族構成</label>
      <select id="family">
        <option value="single">独身 or 共働き（控除対象配偶者なし）</option>
        <option value="couple">夫婦（配偶者を扶養）</option>
        <option value="couple_child1">夫婦 + 子1人（高校生以上）</option>
        <option value="couple_child2">夫婦 + 子2人（高校生以上1名含む）</option>
      </select>
    </div>
    <div class="field">
      <label for="taste">好み</label>
      <select id="taste">
        <option value="food">食品（米・肉・魚介・果物など）</option>
        <option value="appliance">家電・キッチン用品</option>
        <option value="travel">旅行・宿泊・体験</option>
        <option value="daily">日用品（紙類・洗剤・水など）</option>
        <option value="craft">雑貨・工芸品</option>
      </select>
    </div>
    <div class="field">
      <label for="policy">方針</label>
      <select id="policy">
        <option value="rate">還元率重視（コスパ最優先）</option>
        <option value="volume">ボリューム重視（量・定期便）</option>
        <option value="experience">体験重視（思い出・特別感）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">早見する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたに得するタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・国税庁などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。返礼品の還元率は総務省告示で原則3割以下です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'furusato_recommend_v1';

  // 年収×家族構成で控除上限の目安（万円）
  // 出典：総務省ふるさと納税ポータル「全額控除されるふるさと納税額（年間上限）の目安」を参考に簡易化
  var LIMIT_TABLE = {
    // [年収万円, single, couple, couple_child1, couple_child2]
    rows: [
      [300, 28, 19, 11, 6],
      [400, 42, 33, 25, 21],
      [500, 61, 49, 40, 36],
      [600, 77, 69, 60, 57],
      [700, 108, 86, 78, 75],
      [800, 129, 120, 110, 107],
      [900, 152, 143, 132, 128],
      [1000, 180, 171, 157, 153],
      [1500, 395, 380, 364, 360],
      [2000, 569, 564, 548, 544]
    ]
  };

  function estimateLimit(income, family) {
    var rows = LIMIT_TABLE.rows;
    var idx = family === 'single' ? 1
            : family === 'couple' ? 2
            : family === 'couple_child1' ? 3 : 4;
    if (income <= rows[0][0]) return rows[0][idx];
    for (var i = 0; i < rows.length - 1; i++) {
      var lo = rows[i], hi = rows[i+1];
      if (income >= lo[0] && income <= hi[0]) {
        var ratio = (income - lo[0]) / (hi[0] - lo[0]);
        return Math.round(lo[idx] + (hi[idx] - lo[idx]) * ratio);
      }
    }
    return rows[rows.length - 1][idx];
  }

  // 好み × 方針 → 返礼品タイプ
  var REC = {
    food: {
      rate: { label: 'お米・定番肉の大容量タイプ', rate: '28〜30%目安', why: '食品×還元率重視ならお米10kg以上や訳あり肉が定番。1万円前後で還元率が安定。' },
      volume: { label: '定期便（米・果物・水）タイプ', rate: '25〜30%目安', why: '同じ寄附で複数回届くので、上限まで使い切る家庭向き。冷蔵庫圧迫を避けやすい。' },
      experience: { label: '産地直送の旬グルメタイプ', rate: '20〜28%目安', why: 'カニ・うなぎ・ブランド和牛など、季節体験として楽しめる返礼品が満足度高め。' }
    },
    appliance: {
      rate: { label: '地場産小型家電・調理器具タイプ', rate: '25〜30%目安', why: '地場産家電は還元率が比較的高く、長く使える実用品が狙い目。' },
      volume: { label: 'キッチン消耗品セット（保存容器・包丁等）', rate: '22〜28%目安', why: 'まとめ買いで日常コストを下げる方向。1万円台で複数点セットが多い。' },
      experience: { label: 'こだわり調理家電・刃物職人モノ', rate: '20〜28%目安', why: '伝統工芸×実用の交差点。一生モノを選ぶ満足感重視の選び方。' }
    },
    travel: {
      rate: { label: '宿泊割引券・チケットタイプ', rate: '30%目安', why: '券面額に対する還元率は安定。期限と利用範囲のチェックが必須。' },
      volume: { label: '回数券・複数泊パックタイプ', rate: '25〜30%目安', why: '長期休みや複数回利用予定のある自治体向け。家族旅行の固定費を圧縮。' },
      experience: { label: '体験型（陶芸・農業・グランピング）タイプ', rate: '20〜28%目安', why: 'モノでなく思い出。家族イベントに使うと満足度がモノ系より長持ちしやすい。' }
    },
    daily: {
      rate: { label: 'トイレットペーパー・ティッシュ大容量タイプ', rate: '28〜30%目安', why: '日用品×還元率重視の鉄板。年間消費量に合わせて上限内で確実に使い切れる。' },
      volume: { label: '洗剤・水・米の定期便タイプ', rate: '25〜30%目安', why: '毎月届く形で家計の固定費を圧縮。買い忘れリスクも下がる。' },
      experience: { label: '無添加石鹸・国産タオルセットタイプ', rate: '22〜28%目安', why: '使うたびに少し気分が上がる日用品。実用×満足のバランス型。' }
    },
    craft: {
      rate: { label: '伝統工芸の食器・カトラリータイプ', rate: '25〜30%目安', why: '量産品より単価高めだが、地場産品は還元率が比較的安定。' },
      volume: { label: '和雑貨・タオル・寝具セットタイプ', rate: '22〜28%目安', why: '複数点セットで部屋の小物を一気に更新できる。来客対応にも◎。' },
      experience: { label: '一点物の工芸体験＋作品タイプ', rate: '20〜28%目安', why: '工房訪問・絵付け体験など、モノだけでなく時間も返礼に含まれる。' }
    }
  };

  function calc() {
    var income = parseFloat(document.getElementById('income').value);
    var family = document.getElementById('family').value;
    var taste = document.getElementById('taste').value;
    var policy = document.getElementById('policy').value;

    if (isNaN(income) || income < 100 || income > 5000) {
      showErr('年収は100〜5000万円の範囲で入力してください');
      return;
    }

    var limit = estimateLimit(income, family);
    var rec = REC[taste][policy];

    // 評価レベル: 上限が小さい(<10万)はwarn, 余裕あり(>30万)はok, それ以外もok
    var level = limit < 5 ? 'ng' : limit < 15 ? 'warn' : 'ok';
    var note = '控除上限の目安は約 ' + limit.toLocaleString('ja-JP') + ',000 円。'
             + 'この範囲内で「' + rec.label + '」を中心に選ぶと方針に合います。';

    showResult(level, rec.label, note);
    showDetail([
      ['年収（万円）', income.toLocaleString('ja-JP') + ' 万円'],
      ['家族構成', familyLabel(family)],
      ['控除上限の目安', (limit * 10000).toLocaleString('ja-JP') + ' 円', true],
      ['好み', tasteLabel(taste)],
      ['方針', policyLabel(policy)],
      ['還元率の目安', rec.rate],
      ['選び方の理由', rec.why]
    ]);

    save({ income: income, family: family, taste: taste, policy: policy });
  }

  function familyLabel(v) {
    return ({
      single: '独身 or 共働き',
      couple: '夫婦（配偶者扶養）',
      couple_child1: '夫婦+子1人',
      couple_child2: '夫婦+子2人'
    })[v];
  }
  function tasteLabel(v) {
    return ({ food:'食品', appliance:'家電・キッチン', travel:'旅行・体験', daily:'日用品', craft:'雑貨・工芸品' })[v];
  }
  function policyLabel(v) {
    return ({ rate:'還元率重視', volume:'ボリューム重視', experience:'体験重視' })[v];
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function save(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.income) document.getElementById('income').value = s.income;
      if (s.family) document.getElementById('family').value = s.family;
      if (s.taste) document.getElementById('taste').value = s.taste;
      if (s.policy) document.getElementById('policy').value = s.policy;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
