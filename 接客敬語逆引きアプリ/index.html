<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接客敬語逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.2rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 検索 ── */
    .search-wrap {
      max-width: 640px;
      margin: 0 auto 1rem;
      padding: 0 0;
    }
    .search-input {
      width: 100%; padding: 0.8rem 1rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.15s;
      box-shadow: var(--shadow);
    }
    .search-input:focus { border-color: var(--accent); }

    /* ── シーンタブ ── */
    .scene-tabs {
      max-width: 640px;
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0;
    }
    .scene-tab {
      padding: 0.5rem 0.9rem;
      font-size: 0.85rem; font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      background: var(--card);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .scene-tab:hover { border-color: var(--accent); color: var(--accent); }
    .scene-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── フレーズカード ── */
    .phrase-list {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .phrase-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      position: relative;
    }
    .phrase-scene-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .phrase-situation {
      font-size: 0.82rem;
      color: var(--text-sub);
      margin-bottom: 0.6rem;
    }
    .phrase-main {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }
    .phrase-ng {
      font-size: 0.78rem;
      color: var(--ng);
      background: var(--ng-bg);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      margin-bottom: 0.3rem;
      display: inline-block;
    }
    .phrase-ng::before { content: "NG："; font-weight: 700; }
    .phrase-tip {
      font-size: 0.78rem;
      color: var(--text-sub);
      line-height: 1.5;
      margin-top: 0.4rem;
    }
    .fav-btn {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
      color: #ccc;
      transition: color 0.15s;
      padding: 0;
    }
    .fav-btn.active { color: #f59e0b; }
    .fav-btn:hover { color: #f59e0b; }

    /* ── 空状態 ── */
    .empty-msg {
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
      padding: 2rem 1rem;
    }

    /* ── コピー通知 ── */
    .copy-btn {
      font-size: 0.72rem;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      margin-left: 0.5rem;
      vertical-align: middle;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.75; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>接客敬語逆引きアプリ</h1>
    <p class="subtitle">シーンを選ぶ → 正しい敬語がすぐわかる</p>
  </header>

  <!-- 検索 -->
  <div class="search-wrap" style="padding: 0 1rem;">
    <input class="search-input" type="text" id="searchInput" placeholder="キーワードで検索（例：いらっしゃいませ、承る）" oninput="onSearch()">
  </div>

  <!-- シーンタブ -->
  <div class="scene-tabs" id="sceneTabs" style="padding: 0 1rem;">
    <button class="scene-tab active" data-scene="all" onclick="selectScene(this)">すべて</button>
    <button class="scene-tab" data-scene="greeting"   onclick="selectScene(this)">挨拶・接客開始</button>
    <button class="scene-tab" data-scene="guidance"   onclick="selectScene(this)">ご案内</button>
    <button class="scene-tab" data-scene="decline"    onclick="selectScene(this)">お断り</button>
    <button class="scene-tab" data-scene="apology"    onclick="selectScene(this)">お詫び</button>
    <button class="scene-tab" data-scene="thanks"     onclick="selectScene(this)">お礼</button>
    <button class="scene-tab" data-scene="payment"    onclick="selectScene(this)">お会計</button>
    <button class="scene-tab" data-scene="phone"      onclick="selectScene(this)">電話応対</button>
    <button class="scene-tab" data-scene="complaint"  onclick="selectScene(this)">クレーム対応</button>
    <button class="scene-tab" data-scene="fav"        onclick="selectScene(this)">⭐ お気に入り</button>
  </div>

  <!-- フレーズ一覧 -->
  <div class="phrase-list" id="phraseList" style="padding: 0 1rem;"></div>
  <div class="empty-msg" id="emptyMsg" style="display:none;">該当するフレーズがありません</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  var currentScene = 'all';
  var currentSearch = '';
  var favorites = JSON.parse(localStorage.getItem('keigo_favorites') || '[]');

  function selectScene(btn) {
    document.querySelectorAll('.scene-tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentScene = btn.getAttribute('data-scene');
    document.getElementById('searchInput').value = '';
    currentSearch = '';
    render();
  }

  function onSearch() {
    currentSearch = document.getElementById('searchInput').value.trim();
    if (currentSearch) {
      document.querySelectorAll('.scene-tab').forEach(function(b){ b.classList.remove('active'); });
      document.querySelector('[data-scene="all"]').classList.add('active');
      currentScene = 'all';
    }
    render();
  }

  function toggleFav(id) {
    var idx = favorites.indexOf(id);
    if (idx === -1) {
      favorites.push(id);
    } else {
      favorites.splice(idx, 1);
    }
    localStorage.setItem('keigo_favorites', JSON.stringify(favorites));
    render();
  }

  function copyText(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var orig = btn.textContent;
    btn.textContent = 'コピー済み';
    setTimeout(function(){ btn.textContent = orig; }, 1500);
  }

  function render() {
    var list = PHRASES.filter(function(p) {
      if (currentScene === 'fav') return favorites.indexOf(p.id) !== -1;
      if (currentScene !== 'all' && p.scene !== currentScene) return false;
      if (currentSearch) {
        var kw = currentSearch.toLowerCase();
        return p.ok.toLowerCase().includes(kw)
          || p.ng.toLowerCase().includes(kw)
          || p.situation.toLowerCase().includes(kw)
          || p.sceneLabel.includes(kw);
      }
      return true;
    });

    var container = document.getElementById('phraseList');
    var emptyMsg = document.getElementById('emptyMsg');

    if (list.length === 0) {
      container.innerHTML = '';
      emptyMsg.style.display = '';
      return;
    }
    emptyMsg.style.display = 'none';

    container.innerHTML = list.map(function(p) {
      var isFav = favorites.indexOf(p.id) !== -1;
      return '<div class="phrase-card">'
        + '<button class="fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFav(' + p.id + ')" title="お気に入り">⭐</button>'
        + '<div class="phrase-scene-label">' + p.sceneLabel + '</div>'
        + '<div class="phrase-situation">【シーン】' + p.situation + '</div>'
        + '<div class="phrase-main">'
          + '✅ ' + escHtml(p.ok)
          + ' <button class="copy-btn" onclick="copyText(\'' + escJs(p.ok) + '\', this)">コピー</button>'
        + '</div>'
        + '<span class="phrase-ng">' + escHtml(p.ng) + '</span>'
        + '<div class="phrase-tip">💡 ' + escHtml(p.tip) + '</div>'
        + '</div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  render();
  </script>
