<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発注管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>発注管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>発注を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="vendor">業者名 <span class="required">*</span></label>
          <input type="text" id="vendor" placeholder="例：山田商事">
        </div>
        <div class="form-group">
          <label for="item">品目 <span class="required">*</span></label>
          <input type="text" id="item" placeholder="例：A4コピー用紙">
        </div>
        <div class="form-group">
          <label for="orderDate">発注日 <span class="required">*</span></label>
          <input type="date" id="orderDate">
        </div>
        <div class="form-group">
          <label for="dueDate">納期 <span class="required">*</span></label>
          <input type="date" id="dueDate">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="備考（任意）">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">すべて</button>
        <button class="tab" data-filter="pending">未入荷のみ</button>
        <button class="tab" data-filter="arrived">入荷済みのみ</button>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="emptyMsg" class="empty-msg">発注データがありません</div>
      <div id="orderList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
