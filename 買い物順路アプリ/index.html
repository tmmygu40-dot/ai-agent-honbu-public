<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い物順路アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🛒 買い物順路アプリ</h1>

    <!-- タブ切り替え -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="shopping">買い物リスト</button>
      <button class="tab-btn" data-tab="aisles">売り場設定</button>
    </div>

    <!-- 買い物リストタブ -->
    <div id="tab-shopping" class="tab-content active">
      <div class="add-item-form">
        <input type="text" id="item-name" placeholder="商品名を入力" maxlength="50">
        <select id="item-aisle">
          <option value="">売り場を選択</option>
        </select>
        <button id="add-item-btn" class="btn-primary">追加</button>
      </div>

      <div class="list-header">
        <span>商品リスト（<span id="item-count">0</span>件）</span>
        <button id="clear-checked-btn" class="btn-small">購入済みを削除</button>
      </div>

      <ul id="shopping-list">
        <li class="empty-message">商品がありません</li>
      </ul>
    </div>

    <!-- 売り場設定タブ -->
    <div id="tab-aisles" class="tab-content">
      <p class="hint">売り場の順番を変えると、買い物リストの並び順が変わります。</p>

      <div class="add-aisle-form">
        <input type="text" id="aisle-name" placeholder="売り場名を入力" maxlength="20">
        <button id="add-aisle-btn" class="btn-primary">追加</button>
      </div>

      <ul id="aisle-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
