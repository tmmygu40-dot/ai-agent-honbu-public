<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="商品名・特徴・価格・ターゲットを入力するだけで、売場POPコピーを3案即生成。お得感訴求・機能訴求・ターゲット共感の3パターンをワンクリックでコピー可能な無料Webアプリです。">
  <title>商品POPコピーライティングジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── コピー結果カード ── */
    .result-section {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .copy-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 0.9rem;
      box-shadow: var(--shadow);
    }
    .copy-card.pattern-1 { border-color: #e07b00; }
    .copy-card.pattern-2 { border-color: #0369a1; }
    .copy-card.pattern-3 { border-color: #15803d; }
    .copy-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .copy-tag {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em;
      padding: 0.2rem 0.6rem; border-radius: 99px; text-transform: uppercase;
    }
    .pattern-1 .copy-tag { background: #fff8ee; color: #e07b00; }
    .pattern-2 .copy-tag { background: #e0f2fe; color: #0369a1; }
    .pattern-3 .copy-tag { background: #f0fdf4; color: #15803d; }
    .copy-tag-label {
      font-size: 0.72rem; color: var(--text-sub); font-weight: 600;
    }
    .copy-text {
      font-size: 1.0rem; font-weight: 700; line-height: 1.6;
      color: var(--text); white-space: pre-wrap; word-break: break-all;
      background: var(--bg); border-radius: 8px; padding: 0.8rem 0.9rem;
      margin-bottom: 0.75rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.55rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .copy-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <a class="back-link" href="../index.html" style="display:block;text-align:left;margin-bottom:0.4rem;font-size:0.78rem;color:var(--text-sub);text-decoration:none;">← アプリ一覧に戻る</a>
    <h1>商品POPコピーライティングジェネレーター</h1>
    <p class="subtitle">商品情報を入れるだけで売場POPコピーを3案即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="productName">商品名 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="productName" placeholder="例：国産はちみつ、こだわり珈琲豆、オーガニックソープ">
    </div>
    <div class="field">
      <label for="features">特徴・セールスポイント <span style="color:var(--ng)">*</span></label>
      <textarea id="features" placeholder="例：無農薬栽培、手作り、厳選素材、職人仕上げ、限定100個"></textarea>
      <p class="hint">複数ある場合はそのまま書いてOK</p>
    </div>
    <div class="field">
      <label for="price">価格</label>
      <input type="text" id="price" placeholder="例：980円、1,500円（税込）、2個セット1,200円">
      <p class="hint">空欄の場合は価格表記なしで生成します</p>
    </div>
    <div class="field">
      <label for="target">ターゲット顧客</label>
      <input type="text" id="target" placeholder="例：お土産を探している方、健康が気になる方、プレゼントに悩む方">
      <p class="hint">空欄の場合は汎用的なコピーになります</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✏️ POPコピーを3案生成する</button>

  <!-- 生成結果 -->
  <div class="result-section" id="resultSection">
    <div class="copy-card pattern-1">
      <div class="copy-card-header">
        <span class="copy-tag">Pattern 1</span>
        <span class="copy-tag-label">💰 お得感・価格訴求</span>
      </div>
      <p class="copy-text" id="copy1"></p>
      <button class="btn-copy" onclick="copyText('copy1', this)">📋 コピーする</button>
    </div>
    <div class="copy-card pattern-2">
      <div class="copy-card-header">
        <span class="copy-tag">Pattern 2</span>
        <span class="copy-tag-label">⭐ 機能・特徴訴求</span>
      </div>
      <p class="copy-text" id="copy2"></p>
      <button class="btn-copy" onclick="copyText('copy2', this)">📋 コピーする</button>
    </div>
    <div class="copy-card pattern-3">
      <div class="copy-card-header">
        <span class="copy-tag">Pattern 3</span>
        <span class="copy-tag-label">🎯 ターゲット共感訴求</span>
      </div>
      <p class="copy-text" id="copy3"></p>
      <button class="btn-copy" onclick="copyText('copy3', this)">📋 コピーする</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📌 生成されたコピーはルールベースで作成しています。実際の販促物への使用前に、内容・表現を必ずご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'pop_copy_gen_v1';

  // ── テンプレート定義 ──
  var tpl1 = [
    '{price}で{name}！{feature}の一品をお試しください。',
    '今だけ！{name} {price}\n{feature}をこの価格で。',
    '{name} {price}\n{feature}。コスパ抜群の逸品です。',
    '{price}の価値あり！\n{name}は{feature}。ぜひ一度どうぞ。',
    'お求めやすい{price}！\n{name}は{feature}でご好評をいただいています。',
  ];
  var tpl1_noprice = [
    '{name}をぜひ！{feature}の一品です。',
    '数量限定！{name}\n{feature}の特別な逸品。',
    '{name}をお得にどうぞ。\n{feature}が自慢です。',
    '今がチャンス！\n{name}は{feature}。お見逃しなく。',
    '特選品！{name}\n{feature}でご満足いただけます。',
  ];

  var tpl2 = [
    '{name}の特長は「{feature}」\n本物の品質をご体感ください。',
    '{feature}だから違う。\n{name}は素材・製法にこだわった逸品。',
    '{name}は{feature}。\n他にはない品質をお届けします。',
    '選ばれる理由は{feature}。\n{name}のこだわりをぜひお確かめください。',
    '職人の技が光る{name}。\n{feature}のひと品をどうぞ。',
  ];

  var tpl3_target = [
    '{target}の方へ。\n{name}は{feature}でおすすめです。',
    '{target}の方に人気！\n{name}は{feature}の逸品です。',
    '{target}の方に選ばれています。\n{name}は{feature}が特長。',
    '{target}の方、必見！\n{name}は{feature}でご好評です。',
    '{target}の方にピッタリ。\n{name}は{feature}です。',
  ];
  var tpl3_notarget = [
    'お探しの方へ。\n{name}は{feature}の自慢の品です。',
    'こだわりの方に選ばれています。\n{name}は{feature}が特長。',
    'プレゼントにも！\n{name}は{feature}の品格ある逸品。',
    '贈り物にも自分用にも。\n{name}は{feature}でおすすめ。',
    'お客様に人気！\n{name}は{feature}の特別な品です。',
  ];

  function pickTpl(arr, seed) {
    return arr[seed % arr.length];
  }

  function buildCopy(tpl, name, feature, price, target) {
    return tpl
      .replace(/{name}/g, name)
      .replace(/{feature}/g, feature)
      .replace(/{price}/g, price || '')
      .replace(/{target}/g, target || '');
  }

  function generate() {
    var name    = (document.getElementById('productName').value || '').trim();
    var feature = (document.getElementById('features').value || '').trim();
    var price   = (document.getElementById('price').value || '').trim();
    var target  = (document.getElementById('target').value || '').trim();

    if (!name) { alert('商品名を入力してください。'); return; }
    if (!feature) { alert('特徴・セールスポイントを入力してください。'); return; }

    // シード: 入力の長さを利用してバリエーションを出す
    var seed = (name.length + feature.length) % 5;

    // Pattern 1: お得感・価格訴求
    var arr1 = price ? tpl1 : tpl1_noprice;
    var c1 = buildCopy(pickTpl(arr1, seed), name, feature, price, target);

    // Pattern 2: 機能・特徴訴求
    var c2 = buildCopy(pickTpl(tpl2, (seed + 2) % tpl2.length), name, feature, price, target);

    // Pattern 3: ターゲット共感訴求
    var arr3 = target ? tpl3_target : tpl3_notarget;
    var c3 = buildCopy(pickTpl(arr3, (seed + 1) % arr3.length), name, feature, price, target);

    document.getElementById('copy1').textContent = c1;
    document.getElementById('copy2').textContent = c2;
    document.getElementById('copy3').textContent = c3;

    var rs = document.getElementById('resultSection');
    rs.style.display = 'block';
    rs.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // ボタンをリセット
    document.querySelectorAll('.btn-copy').forEach(function(b) {
      b.textContent = '📋 コピーする';
      b.classList.remove('copied');
    });

    saveLocal(name, feature, price, target);
  }

  function copyText(id, btn) {
    var text = document.getElementById(id).textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✅ コピーしました';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '📋 コピーする';
          btn.classList.remove('copied');
        }, 2000);
      });
    } else {
      // フォールバック
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    }
  }

  function saveLocal(name, feature, price, target) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: name, feature: feature, price: price, target: target }));
    } catch(e) {}
  }

  function loadLocal() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!d) return;
      if (d.name)    document.getElementById('productName').value = d.name;
      if (d.feature) document.getElementById('features').value    = d.feature;
      if (d.price)   document.getElementById('price').value       = d.price;
      if (d.target)  document.getElementById('target').value      = d.target;
    } catch(e) {}
  }

  loadLocal();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
