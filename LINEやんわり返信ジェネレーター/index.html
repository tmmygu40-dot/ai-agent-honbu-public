<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LINEで相手を傷つけないお断り・保留・催促のやんわり返信文を1タップで生成。メッセージタイプを選んで「生成」をクリックするだけで、コピー可能な文案が即座に表示されます。">
  <title>💬 LINEやんわり返信ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── メッセージタイプボタン ── */
    .msg-type-group {
      display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem;
    }
    .msg-type-btn {
      flex: 1; min-width: 100px;
      padding: 0.7rem 0.9rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .msg-type-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .msg-type-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード（生成結果） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.6; margin-bottom: 0.8rem; white-space: pre-wrap; word-break: break-word; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }

    /* ── コピーボタン ── */
    .btn-copy {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💬 LINEやんわり返信ジェネレーター</h1>
    <p class="subtitle">相手を傷つけない返信文をサッと作成。お断り・保留・催促がかんたん生成できます。</p>
  </header>

  <!-- メッセージタイプ選択カード -->
  <div class="card">
    <p class="card-title">メッセージタイプを選ぶ</p>
    <div class="msg-type-group">
      <button class="msg-type-btn active" onclick="selectType('decline')">🚫 お断り</button>
      <button class="msg-type-btn" onclick="selectType('hold')">⏳ 保留</button>
      <button class="msg-type-btn" onclick="selectType('urge')">📢 催促</button>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">生成する</button>

  <!-- 結論カード（JS で表示） -->
  <div class="result-card" id="result">
    <p class="result-label">生成された文案</p>
    <p class="result-value" id="rv">—</p>
    <button class="btn-copy" onclick="copyText()">📋 コピー</button>
  </div>

  <!-- 広告枠（将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var selectedType = 'decline';
  var generatedText = '';

  var MESSAGES = {
    decline: [
      '申し訳ありませんが、今回はお役に立てそうにありません。次のご機会があればぜひお力になりたいです。',
      'ありがとうございますが、この度はご期待に応えられず申し訳ございません。',
      'ご相談ありがとうございます。申し訳ないのですが、今回はお手伝いできません。ご理解ください。',
      'ご依頼ありがとうございます。今のところ対応が難しいので、申し訳ありませんがお断りさせていただきます。',
      'ご提案をいただきありがとうございます。申し訳ないのですが、今回はご遠慮させていただきます。'
    ],
    hold: [
      '貴重なご提案ありがとうございます。検討させていただきたいので、少しお時間をいただけますでしょうか？',
      'ご連絡ありがとうございます。確認してからご返答したいので、少しお待たせしてしまい申し訳ございません。',
      'ご質問ありがとうございます。こちらで確認中のため、もう少しお時間をいただきたく存じます。',
      'ご提案ありがとうございます。今のところ、返答にはもう少し時間をいただきたいのですが、ご了承ください。',
      'ご相談ありがとうございます。詳しく検討した上でお返事したいので、数日いただけますか？'
    ],
    urge: [
      'お疲れ様です。前回のご相談について、進捗状況をお聞かせいただけますでしょうか？',
      'いつもお世話になっています。以前お送りしたご提案について、ご検討の進み具合をお教えいただけますか？',
      'ご多忙とは存じますが、先日のご依頼について、状況をお聞かせいただきたく存じます。',
      'お忙しいところ恐れ入りますが、前回の件についてのご返答をいただけますか？',
      'いつもありがとうございます。先日のご質問について、その後どのようになりましたか？'
    ]
  };

  function selectType(type) {
    selectedType = type;
    document.querySelectorAll('.msg-type-btn').forEach(function(btn) {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');
  }

  function generate() {
    var messages = MESSAGES[selectedType];
    var randomIndex = Math.floor(Math.random() * messages.length);
    generatedText = messages[randomIndex];

    showResult();
  }

  function showResult() {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = generatedText;
  }

  function copyText() {
    if (!generatedText) return;

    if (navigator.clipboard) {
      navigator.clipboard.writeText(generatedText).then(function() {
        var btn = event.target;
        var originalText = btn.textContent;
        btn.textContent = '✓ コピーしました';
        setTimeout(function() {
          btn.textContent = originalText;
        }, 1500);
      });
    } else {
      // Fallback
      var textarea = document.createElement('textarea');
      textarea.value = generatedText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
