<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下半期開運診断｜2026年下半期の運勢を3項目で占う</title>
  <meta name="description" content="血液型と生年月日を入れるだけで、2026年下半期（7〜12月）の総合運・恋愛運・金運を3項目で占える無料アプリです。星評価と短いアドバイスで気持ちを切り替え、下半期を前向きに過ごすヒントになります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; }

    .fortune-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .fortune-item:last-child { border-bottom: none; }
    .fortune-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .fortune-name { font-size: 1rem; font-weight: 800; }
    .fortune-stars { font-size: 1.05rem; color: var(--accent); letter-spacing: 0.1em; }
    .fortune-stars .dim { color: #ddd; }
    .fortune-msg { font-size: 0.9rem; color: var(--text-sub); line-height: 1.6; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔮 2026年下半期 開運診断</h1>
    <p class="subtitle">血液型×生年月日で、7〜12月の総合運・恋愛運・金運をズバッと診断 ※2026年下半期向け・エンタメ目的の診断です</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたについて教えてください</p>
    <div class="field">
      <label for="blood">血液型</label>
      <select id="blood">
        <option value="">選んでください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
    <div class="field">
      <label for="bday">生年月日</label>
      <input type="date" id="bday">
      <p class="hint">お誕生日から運勢を読み解きます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="divine()">運勢を占う</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">2026年下半期 総合評価</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 3項目 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">3項目の運勢</p>
    <div id="fortunes"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 本ツールは血液型と生年月日を組み合わせた簡易ロジックによるエンタメ占いです。気持ちの切り替えや行動のきっかけとしてお楽しみください。重要な判断は専門家や公的情報をご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var KEY = 'kaiun_h2_2026_v1';

  // 復元
  (function(){
    try {
      var s = localStorage.getItem(KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.blood) document.getElementById('blood').value = d.blood;
      if (d.bday)  document.getElementById('bday').value  = d.bday;
    } catch(e){}
  })();

  function divine() {
    var blood = document.getElementById('blood').value;
    var bday  = document.getElementById('bday').value;
    if (!blood || !bday) { showErr('血液型と生年月日を入力してください'); return; }

    try { localStorage.setItem(KEY, JSON.stringify({blood: blood, bday: bday})); } catch(e){}

    var d = new Date(bday);
    if (isNaN(d.getTime())) { showErr('生年月日の形式が正しくありません'); return; }
    var month = d.getMonth() + 1;
    var day   = d.getDate();

    // 決定的な簡易ロジック
    var bloodCode = {A:1, B:2, O:3, AB:4}[blood];
    var seed = (bloodCode * 13 + month * 7 + day * 3) % 100;

    // 3項目それぞれ別シードで星を出す（1〜5）
    var soSeed = seed;
    var loSeed = (seed * 31 + 17) % 100;
    var moSeed = (seed * 47 + 53) % 100;

    var so = (soSeed % 5) + 1;
    var lo = (loSeed % 5) + 1;
    var mo = (moSeed % 5) + 1;

    var avg = (so + lo + mo) / 3;
    var level = avg >= 4 ? 'ok' : avg >= 2.7 ? 'warn' : 'ng';
    var label = avg >= 4 ? '絶好調！追い風が吹いています'
              : avg >= 2.7 ? 'まずまず。工夫次第で伸びる時期'
              : '少しスローペースに。焦らず行きましょう';

    var stars = '★★★★★'.slice(0, Math.round(avg)) + '☆☆☆☆☆'.slice(0, 5 - Math.round(avg));

    showResult(level, stars, label);
    showFortunes(blood, month, [
      {name: '総合運', star: so, msg: msgFor('so', so, blood, month)},
      {name: '恋愛運', star: lo, msg: msgFor('lo', lo, blood, month)},
      {name: '金運',   star: mo, msg: msgFor('mo', mo, blood, month)}
    ]);
  }

  function msgFor(kind, star, blood, month) {
    var pool = MSGS[kind][star] || MSGS[kind][3];
    var idx = (blood.charCodeAt(0) + month) % pool.length;
    return pool[idx];
  }

  var MSGS = {
    so: {
      5: ['追い風が吹く下半期。新しい挑戦が驚くほどスムーズに進みます。', '直感が冴える時期。ピンと来た話には乗ってOK。', '人との縁が大きく開く半年。出会いは大切に。'],
      4: ['全体的に好調。準備してきたことが実を結びそう。', '小さな成功が積み重なる時期。コツコツが効きます。', '健康面に気を配ると、運気がさらに底上げされます。'],
      3: ['平穏な下半期。焦らず自分のペースで進みましょう。', '可もなく不可もなく。日常を整えるのに最適な時期。', '我慢より工夫。新しい習慣を1つだけ足してみて。'],
      2: ['少しお疲れ気味の半年。休息を惜しまないで。', '迷いやすい時期。決断は朝の時間帯がおすすめ。', '人間関係でモヤモヤしたら、距離を取るのも開運。'],
      1: ['停滞期に入る予感。守りを固める時期と捉えて。', '大きな決断は来年に持ち越して正解。', '焦らず仕切り直し。今は種まきの時期です。']
    },
    lo: {
      5: ['ドラマチックな出会いの予感。秋〜冬が特に好調。', '恋人との関係が深まる半年。記念日を大切に。', '片想いに進展アリ。勇気ある一歩がカギ。'],
      4: ['好意的な視線が集まる時期。笑顔が最大の武器。', 'マンネリを感じたら新しい場所デートへ。', '友人からの紹介が良縁につながりそう。'],
      3: ['静かな恋愛期。今は自分磨きに時間を使うと吉。', '相手のペースに合わせると関係が安定します。', '無理に動かず、自然体でいるのがベスト。'],
      2: ['すれ違いが起きやすい時期。連絡はこまめに。', '自分の気持ちを言語化するとモヤモヤが解消。', '焦って距離を詰めるのは逆効果。深呼吸を。'],
      1: ['一旦立ち止まって関係を見直す半年。', '理想と現実のギャップに注意。冷静さがカギ。', '別れを考えたら、まず友人に相談を。']
    },
    mo: {
      5: ['臨時収入の予感。秋に大きなチャンスあり。', '投資・副業の判断が冴える時期。情報収集を。', '貯蓄目標が前倒しで達成できそうな半年。'],
      4: ['コツコツ型の金運。家計簿アプリと相性◎', '不要なサブスクを見直すと、運気が上がります。', 'ポイ活・割引活用が功を奏する時期。'],
      3: ['平均的な金運。大きな出費は計画的に。', '衝動買いに注意。3日寝かせて判断を。', '固定費の見直しで地味に開運。'],
      2: ['予定外の出費が増える予感。予備費を厚めに。', '人付き合いの出費はメリハリをつけて。', '高額な買い物は秋以降に延期が無難。'],
      1: ['財布の紐は固く。新規契約は慎重に。', '貸し借りトラブルに注意。きっぱり断る勇気を。', 'まずは支出を可視化することから。']
    }
  };

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showFortunes(blood, month, items) {
    var html = items.map(function(it){
      var stars = '';
      for (var i = 0; i < 5; i++) {
        stars += i < it.star ? '★' : '<span class="dim">★</span>';
      }
      return '<div class="fortune-item">' +
             '<div class="fortune-head">' +
             '<span class="fortune-name">' + it.name + '</span>' +
             '<span class="fortune-stars">' + stars + '</span>' +
             '</div>' +
             '<p class="fortune-msg">' + it.msg + '</p>' +
             '</div>';
    }).join('');
    document.getElementById('fortunes').innerHTML = html;
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
