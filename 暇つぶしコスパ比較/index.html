<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 暇つぶしコスパ比較</title>
  <meta name="description" content="映画・配信・漫喫の1時間あたりのコストを入力して比較。最安選択肢がサッと分かります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok .result-value { color: var(--ok); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── サービス一覧 ── */
    .service-list { margin-top: 1rem; }
    .service-item {
      display: grid; grid-template-columns: 1fr 80px 60px;
      gap: 0.5rem; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px solid var(--border);
    }
    .service-item:last-child { border-bottom: none; }
    .service-name { font-weight: 600; color: var(--text); }
    .service-cost { text-align: right; font-weight: 700; color: var(--accent); }
    .service-delete { text-align: center; }
    .service-delete button {
      padding: 0.3rem 0.6rem; font-size: 0.75rem;
      background: #f0f0f0; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer; color: var(--text-sub);
    }
    .service-delete button:active { transform: scale(0.95); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>💰 暇つぶしコスパ比較</h1>
    <p class="subtitle">映画・配信・漫喫の1時間あたりのコストを入力して比較</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">サービスを追加</p>
    <div class="field">
      <label for="svcName">サービス名</label>
      <input type="text" id="svcName" placeholder="例: 映画館">
      <p class="hint">何をするときのコストかを入力</p>
    </div>
    <div class="field">
      <label for="cost">料金（円）</label>
      <input type="number" id="cost" placeholder="例: 1900">
      <p class="hint">1回または1月の総額</p>
    </div>
    <div class="field">
      <label for="hours">利用時間（時間）</label>
      <input type="number" id="hours" placeholder="例: 2.5">
      <p class="hint">1回または1月の総時間</p>
    </div>
  </div>

  <!-- 追加ボタン -->
  <button class="btn-calc" onclick="addService()">＋ 追加する</button>

  <!-- 結果カード -->
  <div class="result-card ok" id="result" style="display:none">
    <p class="result-label">最安サービス</p>
    <p class="result-value" id="cheapest">—</p>
    <p class="result-note" id="costCompare"></p>
  </div>

  <!-- サービス比較表 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">コスト比較（低い順）</p>
    <div class="service-list" id="serviceList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 各サービスの料金・利用時間を入力すると、1時間あたりのコストを計算して最安オプションがサッと分かります。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // localStorage キー
  const STORAGE_KEY = 'hima-cost-services';

  // ページロード時にデータを復元
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      window.services = JSON.parse(saved);
      updateDisplay();
    } else {
      window.services = [];
    }
  }

  // サービスを追加
  function addService() {
    const name = document.getElementById('svcName').value.trim();
    const cost = parseFloat(document.getElementById('cost').value);
    const hours = parseFloat(document.getElementById('hours').value);

    if (!name || isNaN(cost) || isNaN(hours) || cost <= 0 || hours <= 0) {
      alert('すべて正しく入力してください');
      return;
    }

    const costPerHour = cost / hours;
    window.services.push({ name, cost, hours, costPerHour });

    // localStorage に保存
    localStorage.setItem(STORAGE_KEY, JSON.stringify(window.services));

    // 入力欄をクリア
    document.getElementById('svcName').value = '';
    document.getElementById('cost').value = '';
    document.getElementById('hours').value = '';

    updateDisplay();
  }

  // 表示を更新
  function updateDisplay() {
    if (window.services.length === 0) {
      document.getElementById('result').style.display = 'none';
      document.getElementById('detail').style.display = 'none';
      return;
    }

    // コストで昇順にソート
    const sorted = [...window.services].sort((a, b) => a.costPerHour - b.costPerHour);

    // 結果カード
    const cheapest = sorted[0];
    document.getElementById('cheapest').textContent = cheapest.name;
    document.getElementById('costCompare').textContent =
      '1時間あたり ' + Math.round(cheapest.costPerHour) + ' 円（' + cheapest.name + '）';
    document.getElementById('result').style.display = '';

    // サービス一覧
    const html = sorted.map((s, idx) => {
      const costText = Math.round(s.costPerHour) + ' 円/時間';
      return `
        <div class="service-item">
          <div class="service-name">${s.name}</div>
          <div class="service-cost">${costText}</div>
          <div class="service-delete"><button onclick="deleteService(${idx})">削除</button></div>
        </div>
      `;
    }).join('');
    document.getElementById('serviceList').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  // サービスを削除
  function deleteService(idx) {
    // 削除対象を特定（ソート前の配列インデックスで削除）
    const sorted = [...window.services].sort((a, b) => a.costPerHour - b.costPerHour);
    const target = sorted[idx];
    window.services = window.services.filter(s => s !== target);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(window.services));
    updateDisplay();
  }

  // ページロード
  window.addEventListener('load', loadData);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
