<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭菜園記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌱 家庭菜園記録</h1>
    </header>

    <section class="form-section">
      <h2>作物を登録</h2>
      <div class="form">
        <div class="form-group">
          <label for="cropName">作物名</label>
          <input type="text" id="cropName" placeholder="例：トマト" maxlength="30">
        </div>
        <div class="form-group">
          <label for="sowDate">播種日</label>
          <input type="date" id="sowDate">
        </div>
        <div class="form-group">
          <label for="harvestDate">収穫予定日（任意）</label>
          <input type="date" id="harvestDate">
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：プランター、南向き" maxlength="60">
        </div>
        <button id="addBtn" class="btn-add">登録する</button>
      </div>
    </section>

    <section class="list-section">
      <h2>登録中の作物 <span id="cropCount">0</span>件</h2>
      <div id="cropList" class="crop-list">
        <p class="empty-msg">まだ作物が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
