<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミシュラン風料理プロンプトメーカー｜手料理を三つ星風に変えるAI画像呪文を即生成</title>
  <meta name="description" content="ジャンル・盛り付け・雰囲気を選ぶだけで、手料理写真をミシュラン三つ星風に変身させるAI画像生成プロンプトを英語で自動生成。SNS映え用に即コピーできます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.5rem; text-transform: uppercase; }
    .prompt-box {
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      padding: 0.85rem 0.95rem; font-size: 0.92rem; line-height: 1.55;
      color: var(--text); white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Hiragino Sans", monospace;
    }
    .copy-btn {
      display: block; width: 100%; margin-top: 0.8rem; padding: 0.7rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .copy-btn.copied { background: var(--ok); }

    .history-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-meta { font-size: 0.72rem; color: var(--accent); margin-bottom: 0.2rem; }
    .history-item .h-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>ミシュラン風料理プロンプトメーカー</h1>
    <p class="subtitle">3択を選ぶだけで、手料理を三つ星風に変えるAI画像生成プロンプト（英語）が出ます</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="genre">料理ジャンル</label>
      <select id="genre">
        <option value="japanese">和食（kaiseki / washoku）</option>
        <option value="french">フレンチ</option>
        <option value="italian">イタリアン</option>
        <option value="chinese">中華</option>
        <option value="sushi">寿司・刺身</option>
        <option value="pasta">パスタ</option>
        <option value="dessert">スイーツ・デザート</option>
        <option value="ramen">ラーメン・麺類</option>
        <option value="curry">カレー</option>
        <option value="bento">弁当・定食</option>
      </select>
    </div>
    <div class="field">
      <label for="style">盛り付けスタイル</label>
      <select id="style">
        <option value="minimal">ミニマル（余白多め・1点豪華）</option>
        <option value="luxury">豪華絢爛（大皿に山盛り・金箔）</option>
        <option value="avant">前衛アート（ソースで絵画風）</option>
        <option value="seasonal">季節感（花や葉のあしらい）</option>
        <option value="geometric">幾何学（直線とドットの構成）</option>
        <option value="rustic">素朴・木皿（自然派）</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気・照明</label>
      <select id="mood">
        <option value="warm">暖色キャンドル光</option>
        <option value="natural">自然光・ソフト</option>
        <option value="dark">暗背景＋スポットライト</option>
        <option value="mono">モノトーン陰影</option>
        <option value="cinema">映画的・ローキー</option>
        <option value="bright">真上から明るく</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加メモ（任意）</label>
      <input type="text" id="extra" placeholder="例: chicken curry, ramen with chashu">
      <p class="hint">具体的な料理名を英語で書くと精度が上がります</p>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">プロンプト生成</button>

  <div class="result-card" id="result">
    <p class="result-label">生成されたAI画像プロンプト</p>
    <div class="prompt-box" id="prompt"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">📋 コピー</button>
  </div>

  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">直近の生成履歴（最大5件）</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 出力プロンプトは Midjourney / Stable Diffusion / DALL·E など各種AI画像生成サービスでの利用を想定しています。各サービスの利用規約をご確認のうえお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var GENRE_MAP = {
    japanese: "a refined Japanese kaiseki dish",
    french:   "a refined French haute cuisine plate",
    italian:  "an elegant Italian fine-dining plate",
    chinese:  "a sophisticated Chinese fine-dining dish",
    sushi:    "an exquisite sushi and sashimi arrangement",
    pasta:    "a fine-dining pasta plate",
    dessert:  "a Michelin-style plated dessert",
    ramen:    "a luxurious bowl of ramen reimagined as fine dining",
    curry:    "a Michelin-style plated curry dish",
    bento:    "a luxurious bento box reimagined as Michelin three-star presentation"
  };
  var STYLE_MAP = {
    minimal:   "minimalist plating, lots of negative space, single focal element, geometric arrangement",
    luxury:    "lavish presentation, gold leaf accents, abundant garnish, opulent dishware",
    avant:     "avant-garde plating, painterly sauce strokes, edible art composition",
    seasonal:  "seasonal flowers and fresh leaves as garnish, organic asymmetry",
    geometric: "geometric composition with precise dots and lines of sauce, ruler-straight elements",
    rustic:    "rustic wooden plate, natural materials, hand-thrown ceramics, earthy textures"
  };
  var MOOD_MAP = {
    warm:    "warm candlelight, golden hour ambience, soft amber tones",
    natural: "soft natural daylight from a window, gentle shadows, airy mood",
    dark:    "dark moody background with a single spotlight, dramatic chiaroscuro",
    mono:    "monochrome lighting, deep contrast, black and grey palette accents",
    cinema:  "cinematic low-key lighting, film-still atmosphere, shallow depth of field",
    bright:  "bright top-down lighting, flat-lay overhead shot, evenly lit"
  };

  var BASE_TAIL = "Michelin three-star restaurant presentation, food photography, ultra-detailed, 8k, professional studio shot, magazine quality, photorealistic";

  var STORE_KEY = 'michelin_prompt_history';

  function gen() {
    var g = document.getElementById('genre').value;
    var s = document.getElementById('style').value;
    var m = document.getElementById('mood').value;
    var extra = document.getElementById('extra').value.trim();

    var subject = GENRE_MAP[g];
    if (extra) subject = subject + ' (' + extra + ')';

    var prompt = subject + ', '
               + STYLE_MAP[s] + ', '
               + MOOD_MAP[m] + ', '
               + BASE_TAIL;

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('prompt').textContent = prompt;

    var btn = document.getElementById('copyBtn');
    btn.textContent = '📋 コピー';
    btn.className = 'copy-btn';

    saveHistory(prompt, g, s, m);
    renderHistory();

    rc.scrollIntoView({behavior:'smooth', block:'center'});
  }

  function copyPrompt() {
    var text = document.getElementById('prompt').textContent;
    if (!text) return;
    var btn = document.getElementById('copyBtn');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = '✅ コピーしました';
        btn.className = 'copy-btn copied';
      }).catch(function(){ fallbackCopy(text, btn); });
    } else {
      fallbackCopy(text, btn);
    }
  }
  function fallbackCopy(text, btn) {
    var t = document.createElement('textarea');
    t.value = text; document.body.appendChild(t); t.select();
    try { document.execCommand('copy'); btn.textContent = '✅ コピーしました'; btn.className = 'copy-btn copied'; }
    catch(e) { btn.textContent = 'コピー失敗'; }
    document.body.removeChild(t);
  }

  function saveHistory(prompt, g, s, m) {
    var arr = loadHistory();
    arr.unshift({ p: prompt, g: g, s: s, m: m, t: new Date().toISOString() });
    if (arr.length > 5) arr = arr.slice(0, 5);
    try { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); } catch(e){}
  }
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function renderHistory() {
    var arr = loadHistory();
    var card = document.getElementById('historyCard');
    if (arr.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('historyList').innerHTML = arr.map(function(h){
      var d = new Date(h.t);
      var tag = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
      return '<div class="history-item">'
           + '<p class="h-meta">' + tag + ' / ' + h.g + ' × ' + h.s + ' × ' + h.m + '</p>'
           + '<p class="h-text">' + escapeHtml(h.p) + '</p>'
           + '</div>';
    }).join('');
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
