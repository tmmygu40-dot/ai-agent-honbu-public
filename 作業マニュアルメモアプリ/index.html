<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業マニュアルメモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>作業マニュアルメモ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>マニュアルを登録</h2>
      <div class="form-group">
        <label for="title">作業名</label>
        <input type="text" id="title" placeholder="例：Excelでピボットテーブルを作る" maxlength="100">
      </div>
      <div class="form-group">
        <label for="steps">手順（1行1ステップ）</label>
        <textarea id="steps" rows="6" placeholder="例：&#10;1. ファイルを開く&#10;2. データ範囲を選択する&#10;3. 挿入→ピボットテーブルをクリック"></textarea>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- 検索 -->
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="作業名で検索...">
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="count" class="count-label"></div>
      <div id="manualList" class="manual-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
