<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値札作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="app-container" id="appContainer">
    <header>
      <h1>値札作成アプリ</h1>
    </header>

    <section class="input-section" id="inputSection">
      <h2>値札を追加</h2>
      <div class="input-row">
        <input type="text" id="itemName" placeholder="品名を入力" maxlength="30">
        <input type="number" id="itemPrice" placeholder="価格（円）" min="0">
        <button id="addBtn" onclick="addTag()">追加</button>
      </div>
      <div class="action-buttons">
        <button id="printBtn" onclick="printTags()" class="btn-print">印刷する</button>
        <button id="clearBtn" onclick="clearAll()" class="btn-clear">全削除</button>
      </div>
      <p id="emptyMsg" class="empty-msg">値札がありません。品名・価格を入力して追加してください。</p>
    </section>

    <section class="preview-section">
      <h2 class="preview-title">値札プレビュー（<span id="tagCount">0</span>枚）</h2>
      <div class="tags-grid" id="tagsGrid"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
