<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消耗品交換管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>消耗品交換管理</h1>

    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="itemName">消耗品名</label>
        <input type="text" id="itemName" placeholder="例：エアコンフィルター">
      </div>
      <div class="form-group">
        <label for="lastChanged">最終交換日</label>
        <input type="date" id="lastChanged">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cycleValue">交換サイクル</label>
          <input type="number" id="cycleValue" min="1" value="1">
        </div>
        <div class="form-group">
          <label for="cycleUnit">単位</label>
          <select id="cycleUnit">
            <option value="day">日</option>
            <option value="week">週</option>
            <option value="month" selected>ヶ月</option>
            <option value="year">年</option>
          </select>
        </div>
      </div>
      <button id="addBtn" class="btn btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <h2>登録済み消耗品</h2>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="overdue">期限切れ</button>
        <button class="filter-btn" data-filter="soon">まもなく</button>
        <button class="filter-btn" data-filter="ok">余裕あり</button>
      </div>
      <div id="itemList" class="item-list">
        <p class="empty-msg">登録された消耗品はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
