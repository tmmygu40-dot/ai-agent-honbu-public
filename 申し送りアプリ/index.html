<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申し送りアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>申し送りアプリ</h1>
      <p class="subtitle">シフト交代時の伝達事項を記録する</p>
    </header>

    <section class="input-section">
      <div class="form-group">
        <label for="date-input">日付</label>
        <input type="date" id="date-input">
      </div>
      <div class="form-group">
        <label for="shift-input">シフト</label>
        <select id="shift-input">
          <option value="">選択してください</option>
          <option value="早番">早番</option>
          <option value="中番">中番</option>
          <option value="遅番">遅番</option>
          <option value="夜勤">夜勤</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="content-input">伝達事項</label>
        <textarea id="content-input" placeholder="引き継ぎ内容を入力してください" rows="4"></textarea>
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>申し送り一覧</h2>
        <span id="count-badge">0件</span>
      </div>
      <div id="records-list" class="records-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
