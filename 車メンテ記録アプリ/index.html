<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車メンテ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🚗 車メンテ記録</h1>

    <section class="current-mileage-section">
      <label for="currentMileage">現在の走行距離（km）</label>
      <div class="mileage-row">
        <input type="number" id="currentMileage" placeholder="例：45000" min="0">
        <button id="saveMileageBtn">保存</button>
      </div>
    </section>

    <section class="form-section">
      <h2>メンテ項目を追加</h2>
      <div class="form-group">
        <label for="partName">部品名</label>
        <input type="text" id="partName" placeholder="例：エンジンオイル">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="lastMileage">前回交換距離（km）</label>
          <input type="number" id="lastMileage" placeholder="例：40000" min="0">
        </div>
        <div class="form-group">
          <label for="cycleMileage">交換サイクル（km）</label>
          <input type="number" id="cycleMileage" placeholder="例：5000" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="lastDate">前回交換日</label>
          <input type="date" id="lastDate">
        </div>
        <div class="form-group">
          <label for="cycleMonths">交換サイクル（ヶ月）</label>
          <input type="number" id="cycleMonths" placeholder="例：6" min="0">
        </div>
      </div>
      <button id="addBtn">追加</button>
    </section>

    <section class="list-section">
      <h2>メンテ一覧</h2>
      <div id="itemList" class="item-list"></div>
      <p id="emptyMsg" class="empty-msg">まだ項目がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
