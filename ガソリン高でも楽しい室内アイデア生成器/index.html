<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ガソリン代が高くて遠出しづらい日に。気分・人数・予算を選ぶだけで、家や近所で楽しめる室内アイデアを3つ即提案。お得に休日を楽しむ無料ツールです。">
  <title>ガソリン高でも楽しい室内アイデア生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .idea-item {
      padding: 0.9rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .idea-item:last-child { border-bottom: none; }
    .idea-title { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .idea-comment { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; }
    .idea-meta { display: inline-block; font-size: 0.7rem; font-weight: 700; color: var(--accent); background: var(--accent-light); padding: 0.15rem 0.55rem; border-radius: 999px; margin-bottom: 0.4rem; }

    .empty { text-align: center; color: var(--text-sub); font-size: 0.88rem; padding: 1rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ガソリン高でも楽しい室内アイデア生成器</h1>
    <p class="subtitle">気分・人数・予算を選ぶだけ。家や近所で楽しめるアイデアを3つご提案。※2026年4月時点の参考データ</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="mood">今日の気分</label>
      <select id="mood">
        <option value="のんびり">のんびり休みたい</option>
        <option value="アクティブ">体を動かしたい</option>
        <option value="クリエイティブ">何か作りたい</option>
        <option value="お得">とにかくお金を使いたくない</option>
      </select>
    </div>
    <div class="field">
      <label for="ppl">人数</label>
      <select id="ppl">
        <option value="1">ひとり</option>
        <option value="2">ふたり</option>
        <option value="4">3〜4人</option>
        <option value="5">5人以上</option>
      </select>
    </div>
    <div class="field">
      <label for="bud">予算（ひとりあたり）</label>
      <select id="bud">
        <option value="0">0円（家にあるものだけ）</option>
        <option value="500">〜500円</option>
        <option value="2000">〜2000円</option>
        <option value="5000">〜5000円</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">アイデアを出す</button>

  <!-- 結果カード -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">今日のおすすめ3案</p>
    <div id="ideas"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:#fff;border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 経済産業省・資源エネルギー庁などの公開データや、家計の節約に関する一般的な知見を参考に、目安として整理しています。最新情報は各公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // アイデアプール（mood / minPpl / maxPpl / minBud / title / comment）
  var POOL = [
    // のんびり
    { m:'のんびり', p:[1,99], b:0,    t:'家中の照明を全部豆電球に変えて読書ナイト', c:'灯りを落とすだけで非日常感。積読も今日なら進む。' },
    { m:'のんびり', p:[1,99], b:0,    t:'スマホを別室に置いて2時間だけ過ごす',     c:'デジタルデトックス。耳が静かさに慣れる頃には頭もスッキリ。' },
    { m:'のんびり', p:[1,2],  b:500,  t:'コンビニスイーツ食べ比べ',                 c:'2〜3個買って半分こ。順位を真剣に決めると盛り上がる。' },
    { m:'のんびり', p:[1,99], b:500,  t:'お風呂屋さんごっこホームスパ',             c:'入浴剤と冷えたドリンク1本で温泉気分。タオルを温めるのが鍵。' },
    { m:'のんびり', p:[1,99], b:2000, t:'近所のカフェでモーニング解禁',             c:'歩いて行ける距離限定。ガソリン0円で非日常。' },
    { m:'のんびり', p:[1,2],  b:2000, t:'映画館気分の自宅シアター',                 c:'ポップコーンとペットボトル買い込んで、部屋を暗くするだけ。' },
    { m:'のんびり', p:[1,99], b:5000, t:'ちょっといいお取り寄せで家ディナー',       c:'外食より安く、片付けながら飲める贅沢。' },

    // アクティブ
    { m:'アクティブ', p:[1,99], b:0,    t:'家中ぞうきんがけタイムアタック',         c:'30分で全部屋。終わる頃には汗だく＆部屋ピカピカ。' },
    { m:'アクティブ', p:[1,99], b:0,    t:'YouTubeでHIIT 20分チャレンジ',           c:'器具なし・スペース畳1枚分。終わる頃には満足感MAX。' },
    { m:'アクティブ', p:[2,99], b:0,    t:'室内で風船バレー',                       c:'落としたら負け。膝で打つの禁止ルールでさらに盛り上がる。' },
    { m:'アクティブ', p:[1,99], b:500,  t:'近所散歩スタンプラリー',                 c:'地図アプリで町内一周ルートを引いてカフェ1軒だけ寄る。' },
    { m:'アクティブ', p:[2,99], b:500,  t:'公園ピクニック（徒歩圏内）',             c:'コンビニおにぎりだけでも空の下で食べると別格。' },
    { m:'アクティブ', p:[1,99], b:2000, t:'近所の銭湯で熱波チャレンジ',             c:'移動は徒歩か自転車。サウナ後の冷たい水分は別格。' },
    { m:'アクティブ', p:[2,99], b:5000, t:'近場のボウリング2ゲーム',                c:'車を出さずに行ける範囲限定。終わったら歩いて帰る。' },

    // クリエイティブ
    { m:'クリエイティブ', p:[1,99], b:0,    t:'冷蔵庫の余り物だけで創作料理',       c:'縛りプレイ。意外な美味しさを発見すると勝ち。' },
    { m:'クリエイティブ', p:[1,99], b:0,    t:'スマホで部屋の中ミニ写真展',         c:'テーマを「丸いもの」など縛って20枚。並べると作品集。' },
    { m:'クリエイティブ', p:[1,4],  b:0,    t:'紙とペンだけで連想ゲーム漫画',       c:'1コマずつ交代で描き継ぐ。完成したら家宝。' },
    { m:'クリエイティブ', p:[1,99], b:500,  t:'100円ショップ縛り工作',             c:'材料費500円以内ルール。制限が発想を生む。' },
    { m:'クリエイティブ', p:[1,2],  b:2000, t:'お菓子作りに挑戦',                   c:'材料費2000円以内、レシピは無料サイトで十分。失敗してもネタになる。' },
    { m:'クリエイティブ', p:[1,99], b:2000, t:'ZINE（自作ミニ雑誌）を1冊作る',     c:'A4用紙1枚を折るだけで8ページ本。テーマは何でも。' },
    { m:'クリエイティブ', p:[1,99], b:5000, t:'プチDIYで部屋の一角を模様替え',     c:'材料を絞って1日で完結。終わると毎日の気分が変わる。' },

    // お得
    { m:'お得', p:[1,99], b:0,    t:'家計簿アプリで先月の出費可視化',           c:'1時間で済む節約活動。ガソリン高の真犯人を特定できる。' },
    { m:'お得', p:[1,99], b:0,    t:'サブスク棚卸し',                           c:'使ってないやつ1つ解約で年6000円浮く。' },
    { m:'お得', p:[1,99], b:0,    t:'家にある食材だけで1食',                   c:'冷蔵庫スッキリ＆食費0円。クックパッドで「食材名 余り」で検索。' },
    { m:'お得', p:[1,99], b:500,  t:'スーパーのタイムセール狙い',               c:'夕方に徒歩で。半額シール戦利品でその日のメインが決まる。' },
    { m:'お得', p:[1,99], b:500,  t:'図書館で雑誌読みあさり',                   c:'入館無料、雑誌の最新号もタダ。半日いても電気代分浮く。' },
    { m:'お得', p:[2,99], b:2000, t:'家飲みで居酒屋ごっこ',                     c:'おつまみ3品＋ドリンクで居酒屋換算1人2000円以下。' },
    { m:'お得', p:[1,99], b:2000, t:'メルカリ大掃除（出品祭り）',               c:'眠ってる物を5点出品。売れたら次の楽しみの軍資金。' },
    { m:'お得', p:[1,99], b:5000, t:'ふるさと納税の返礼品リサーチ',             c:'実質2000円で食費先取り。家から動かず家計防衛。' }
  ];

  var STORE = 'gas_indoor_idea_v1';

  function pick(mood, ppl, bud) {
    var cands = POOL.filter(function(x){
      return x.m === mood && ppl >= x.p[0] && ppl <= x.p[1] && x.b <= bud;
    });
    if (cands.length === 0) {
      // 予算が0でぴったり無い場合などの保険：気分だけで一致を許す
      cands = POOL.filter(function(x){ return x.m === mood; });
    }
    // シャッフル
    var arr = cands.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr.slice(0, 3);
  }

  function render(items, mood, ppl, bud) {
    var card = document.getElementById('result-card');
    var box = document.getElementById('ideas');
    if (!items || items.length === 0) {
      box.innerHTML = '<p class="empty">条件に合うアイデアが見つかりませんでした。条件を変えてもう一度試してください。</p>';
    } else {
      box.innerHTML = items.map(function(x){
        return '<div class="idea-item">'
             + '<span class="idea-meta">' + x.m + '</span>'
             + '<p class="idea-title">' + x.t + '</p>'
             + '<p class="idea-comment">' + x.c + '</p>'
             + '</div>';
      }).join('');
    }
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function gen() {
    var mood = document.getElementById('mood').value;
    var ppl  = parseInt(document.getElementById('ppl').value, 10);
    var bud  = parseInt(document.getElementById('bud').value, 10);
    var items = pick(mood, ppl, bud);
    render(items, mood, ppl, bud);
    try {
      localStorage.setItem(STORE, JSON.stringify({
        mood: mood, ppl: ppl, bud: bud, items: items, ts: Date.now()
      }));
    } catch(e) {}
  }

  // 復元
  (function restore(){
    try {
      var raw = localStorage.getItem(STORE);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d) return;
      if (d.mood) document.getElementById('mood').value = d.mood;
      if (d.ppl)  document.getElementById('ppl').value  = String(d.ppl);
      if (typeof d.bud !== 'undefined') document.getElementById('bud').value = String(d.bud);
      if (d.items && d.items.length) render(d.items, d.mood, d.ppl, d.bud);
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
