<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オタク向け出品文ジェネレーター｜推し活グッズのメルカリ出品文を30秒で量産</title>
  <meta name="description" content="推し活グッズのメルカリ出品文を30秒で量産する出品文ジェネレーター。種別と状態を選ぶだけで売れやすい文章が出るオタク向けツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.4; margin-bottom: 0.6rem; text-align: left; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; text-align: left; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: inline-block; margin-top: 1rem; padding: 0.6rem 1.4rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: var(--ok); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎀 オタク向け出品文ジェネレーター</h1>
    <p class="subtitle">推し活グッズのメルカリ出品文を30秒で量産。種別と状態を選ぶだけで売れやすい文面が出ます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">出品情報を入力</p>
    <div class="field">
      <label for="f1">グッズ種別</label>
      <select id="f1">
        <option value="缶バッジ">缶バッジ</option>
        <option value="アクスタ">アクスタ（アクリルスタンド）</option>
        <option value="ぬいぐるみ">ぬいぐるみ</option>
        <option value="ペンライト">ペンライト</option>
        <option value="フォトカード">フォトカード（トレカ）</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="f2">推し名（キャラ・メンバー名）</label>
      <input type="text" id="f2" placeholder="例: 〇〇くん" maxlength="40">
    </div>
    <div class="field">
      <label for="f3">コンテンツ名（作品・グループ名）</label>
      <input type="text" id="f3" placeholder="例: 〇〇プロジェクト" maxlength="40">
      <p class="hint">アニメ・グループ・ゲームなどの作品名</p>
    </div>
    <div class="field">
      <label for="f4">状態</label>
      <select id="f4">
        <option value="新品未開封">新品未開封</option>
        <option value="開封済(美品)">開封済（美品）</option>
        <option value="中古良品">中古良品</option>
        <option value="使用感あり">使用感あり</option>
      </select>
    </div>
    <div class="field">
      <label for="f5">希望価格（円・任意）</label>
      <input type="number" id="f5" placeholder="例: 1500" min="0">
      <p class="hint">空欄ならお気持ち価格として記載されます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="calc()">出品文を生成する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成された出品文</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <button class="btn-copy no-print" id="copyBtn" onclick="copyText()">📋 タイトル＋本文をコピー</button>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">出品メモ</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 出品文は売れやすさを意識した一般的なテンプレを元に組み立てています。フリマアプリ各社のガイドラインに沿って投稿前にご確認ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi-mercari-gen';
  var lastTitle = '';
  var lastBody  = '';

  function calc() {
    var goods   = document.getElementById('f1').value;
    var oshi    = document.getElementById('f2').value.trim();
    var content = document.getElementById('f3').value.trim();
    var cond    = document.getElementById('f4').value;
    var priceS  = document.getElementById('f5').value.trim();

    if (!oshi)    { showErr('推し名を入力してください'); return; }
    if (!content) { showErr('コンテンツ名を入力してください'); return; }

    save({ f1: goods, f2: oshi, f3: content, f4: cond, f5: priceS });

    var price = priceS === '' ? null : parseInt(priceS, 10);
    var priceTag = price !== null && !isNaN(price) ? price.toLocaleString('ja-JP') + '円' : 'お気持ち価格';

    // タイトル生成（メルカリは40字推奨）
    var title = '【' + cond + '】' + content + ' ' + oshi + ' ' + goods;
    if (title.length > 40) title = title.slice(0, 40);

    // 本文テンプレ
    var lead = goodsLead(goods, oshi, content);
    var condText = condDescription(cond, goods);
    var body =
      lead + '\n' +
      '\n' +
      '◆作品：' + content + '\n' +
      '◆キャラ／メンバー：' + oshi + '\n' +
      '◆種別：' + goods + '\n' +
      '◆状態：' + cond + '\n' +
      '◆価格：' + priceTag + '\n' +
      '\n' +
      condText + '\n' +
      '\n' +
      '【発送について】\n' +
      '・防水・折れ防止対策をして発送します\n' +
      '・ペット・喫煙者なしの環境で保管しています\n' +
      '・即日〜翌営業日の発送を心がけています\n' +
      '\n' +
      '【お願い】\n' +
      '・自宅保管品のため神経質な方はご遠慮ください\n' +
      '・他サイトでも出品中のため、急に削除する場合があります\n' +
      'ご検討よろしくお願いします！';

    showResult(title, body);
    showDetail([
      ['タイトル文字数', title.length + ' / 40 字'],
      ['本文文字数',     body.length  + ' 字'],
      ['推し',           oshi],
      ['作品',           content],
      ['種別',           goods, true],
      ['状態',           cond],
      ['価格',           priceTag],
    ]);

    lastTitle = title;
    lastBody  = body;

    var btn = document.getElementById('copyBtn');
    btn.classList.remove('copied');
    btn.textContent = '📋 タイトル＋本文をコピー';
  }

  function goodsLead(goods, oshi, content) {
    var map = {
      '缶バッジ':     content + ' の ' + oshi + ' 缶バッジを出品します。コレクション整理のため、必要な方にお譲りしたく出品しました。',
      'アクスタ':     content + ' の ' + oshi + ' アクリルスタンドを出品します。お迎えいただける方を探しています。',
      'ぬいぐるみ':   content + ' の ' + oshi + ' ぬいぐるみを出品します。大切にしてくださる方にお譲りしたいです。',
      'ペンライト':   content + ' の ' + oshi + ' ペンライトを出品します。次の現場で活躍してくれる方へ。',
      'フォトカード': content + ' の ' + oshi + ' フォトカード（トレカ）を出品します。お探しの方はぜひご検討ください。',
      'その他':       content + ' の ' + oshi + ' グッズを出品します。コレクション整理のため出品しました。'
    };
    return map[goods] || map['その他'];
  }

  function condDescription(cond, goods) {
    var base = {
      '新品未開封':   '【状態】未開封の新品です。届いた状態のまま暗所で保管していました。初期の細かな擦れ・印刷ムラ等は許容できる方にお願いします。',
      '開封済(美品)': '【状態】開封済みですが、目立つ傷や汚れはなく美品です。一度も外に持ち出していません。神経質な方はご遠慮ください。',
      '中古良品':     '【状態】中古品です。普段使いの程度の擦れはありますが、鑑賞・使用には問題ありません。気になる点は写真でご確認ください。',
      '使用感あり':   '【状態】使用感があります。傷・汚れがあるためお安く出品しています。気になる方は購入前に必ず写真をご確認ください。'
    };
    return base[cond] || base['中古良品'];
  }

  function showResult(title, body) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '【タイトル】\n' + title;
    document.getElementById('rn').textContent = body;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + escapeHtml(r[0]) + '</td><td>' + escapeHtml(r[1]) + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️ ' + msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
    lastTitle = ''; lastBody = '';
  }

  function copyText() {
    if (!lastTitle && !lastBody) return;
    var text = '【タイトル】\n' + lastTitle + '\n\n【本文】\n' + lastBody;
    var btn = document.getElementById('copyBtn');
    var done = function () {
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = '📋 タイトル＋本文をコピー';
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function save(d) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
  }
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.f1) document.getElementById('f1').value = d.f1;
      if (d.f2) document.getElementById('f2').value = d.f2;
      if (d.f3) document.getElementById('f3').value = d.f3;
      if (d.f4) document.getElementById('f4').value = d.f4;
      if (d.f5) document.getElementById('f5').value = d.f5;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
