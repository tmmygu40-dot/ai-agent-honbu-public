<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTA挨拶スピーチ文ジェネレーター｜役職別・場面別スピーチ即生成</title>
  <meta name="description" content="役職と場面を選ぶだけで、PTA挨拶スピーチ文を3パターン即生成できる無料ツールです。会長・副会長・委員長など6役職×7場面に対応。コピーしてそのまま使えます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }

    .speech-block { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
    .speech-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .speech-tone { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: 0.04em; }
    .speech-body {
      font-size: 0.95rem; line-height: 1.8; color: var(--text);
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      padding: 0.9rem 1rem; white-space: pre-wrap; word-break: break-word;
    }
    .btn-copy {
      display: inline-block; margin-top: 0.6rem; padding: 0.45rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px; cursor: pointer;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>PTA挨拶スピーチ文ジェネレーター</h1>
    <p class="subtitle">役職と場面を選ぶだけで、すぐ使えるPTA挨拶文を3パターン生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="role">役職</label>
      <select id="role">
        <option value="会長">会長</option>
        <option value="副会長">副会長</option>
        <option value="書記">書記</option>
        <option value="会計">会計</option>
        <option value="委員長">委員長</option>
        <option value="新任役員">新任役員</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">場面</label>
      <select id="scene">
        <option value="入学式">入学式</option>
        <option value="始業式">始業式</option>
        <option value="運動会">運動会</option>
        <option value="PTA総会">PTA総会</option>
        <option value="卒業式">卒業式</option>
        <option value="送別会">送別会</option>
        <option value="懇親会">懇親会</option>
      </select>
    </div>
    <div class="field">
      <label for="school">学校種別（任意）</label>
      <select id="school">
        <option value="小学校">小学校</option>
        <option value="中学校">中学校</option>
        <option value="幼稚園・保育園">幼稚園・保育園</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">スピーチ文を生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成されたスピーチ文（3パターン）</p>
    <div id="rv"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、各自治体・学校・PTA連合会で公開されているスピーチ事例を参考に、目安として使いやすく整理しています。実際のスピーチでは学校・地域の慣習に合わせて調整してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'pta_speech_v1';

  // 場面別の冒頭フレーズ
  var OPENING = {
    '入学式': ['ご入学おめでとうございます', '本日はお子様のご入学、誠におめでとうございます', '入学式という晴れの日を迎えられ'],
    '始業式': ['新しい学期が始まりました', '気持ちも新たに始業式を迎え', '新学期のスタートにあたり'],
    '運動会': ['本日はお天気にも恵まれ', '子どもたちが楽しみにしてきた運動会', '今日この日を迎えられ'],
    'PTA総会': ['本日はお忙しい中ご出席いただき', 'お集まりいただきありがとうございます', '年に一度のPTA総会にあたり'],
    '卒業式': ['ご卒業おめでとうございます', '本日はお子様のご卒業、誠におめでとうございます', '6年間（3年間）の学びを終え'],
    '送別会': ['本日はお集まりいただきありがとうございます', 'お別れの会にあたり', '一年間を振り返り'],
    '懇親会': ['本日はお忙しい中お集まりいただき', '皆様とお話しできる機会を頂き', 'ささやかですが懇親の場として']
  };

  // 役職別の自己紹介フレーズ
  var SELF = {
    '会長': 'PTA会長を務めております○○と申します',
    '副会長': 'PTA副会長を務めております○○と申します',
    '書記': 'PTA書記を担当しております○○と申します',
    '会計': 'PTA会計を担当しております○○と申します',
    '委員長': '○○委員会の委員長を務めております○○と申します',
    '新任役員': '本年度より新たにPTA役員を務めさせていただく○○と申します'
  };

  // 場面別の主要メッセージ
  var BODY = {
    '入学式': {
      formal: '本日からお子様の新たな学校生活が始まります。保護者の皆様には、ご不安なお気持ちもあろうかと存じますが、PTAも先生方とともに子どもたちの成長を温かく見守ってまいります。皆様のご支援とご協力を、何卒よろしくお願い申し上げます。',
      friendly: 'お子様の入学、本当におめでとうございます。これからの学校生活、楽しいことも大変なこともきっとあると思いますが、PTAは保護者と先生をつなぐ存在として頑張っていきます。気軽に声をかけていただけたら嬉しいです。',
      short: '本日はおめでとうございます。お子様の門出を、PTAとしても全力で応援させていただきます。一年間、どうぞよろしくお願いいたします。'
    },
    '始業式': {
      formal: '春休みを終え、子どもたちが元気に登校する姿を見て、私たち保護者も気持ちが引き締まる思いです。今年度も先生方と協力しながら、子どもたちが安心して過ごせる環境づくりに努めてまいります。よろしくお願いいたします。',
      friendly: '新学期、子どもたちの元気な顔を見るとこちらまで嬉しくなります。今年度もPTAとして、無理のない範囲で楽しく活動していければと思います。皆様のお力添えをお願いいたします。',
      short: '新学期のスタートを心からお祝いいたします。今年度もどうぞよろしくお願いいたします。'
    },
    '運動会': {
      formal: '本日、子どもたちが日頃の練習の成果を発揮する大切な一日となります。先生方には準備にご尽力いただき、心より感謝申し上げます。保護者の皆様には、温かいご声援をどうぞよろしくお願いいたします。',
      friendly: '今日は子どもたちにとって特別な一日です。最後まで全力で頑張る姿に、ぜひ大きな拍手とご声援をお願いします。けがなく無事に終えられますように。',
      short: '本日はお集まりいただきありがとうございます。子どもたちの頑張りに、温かいご声援をお願いいたします。'
    },
    'PTA総会': {
      formal: '日頃よりPTA活動にご理解とご協力を賜り、誠にありがとうございます。本日は本年度の活動方針および予算等についてご審議いただきます。限られた時間ではございますが、忌憚のないご意見を頂戴できれば幸いです。',
      friendly: 'いつもPTA活動にご協力いただきありがとうございます。今日は今年度の活動について、皆さんと一緒に考えていく場になればと思っています。ぜひご意見お聞かせください。',
      short: '本日はご出席いただきありがとうございます。短い時間ですが、ご審議のほどよろしくお願いいたします。'
    },
    '卒業式': {
      formal: '本日はお子様のご卒業、誠におめでとうございます。これまで多くの場面で子どもたちの成長を見守ってこられた保護者の皆様、そしてご指導いただいた先生方に、心より感謝申し上げます。お子様の新たな門出に、心からのエールを送ります。',
      friendly: 'ご卒業、本当におめでとうございます。あっという間の学校生活だったかもしれません。子どもたちのこれからが、笑顔あふれるものになりますようにお祈りしております。',
      short: 'ご卒業おめでとうございます。新しい一歩を、心から応援しております。'
    },
    '送別会': {
      formal: '本日はお別れの会にご出席いただきありがとうございます。これまでお世話になった皆様への感謝の気持ちを込めて、ささやかな会を開かせていただきました。今後ますますのご活躍を、心よりお祈り申し上げます。',
      friendly: '今日まで本当にお疲れさまでした。一緒に活動できた時間は、私たちにとって何より心強いものでした。これからもどうぞお元気で。',
      short: '本日はお集まりいただきありがとうございます。皆様のご活躍を心よりお祈りしております。'
    },
    '懇親会': {
      formal: '本日はお忙しい中お集まりいただき、誠にありがとうございます。日頃なかなかゆっくりお話しする機会がございませんので、本日は短い時間ですが、皆様と交流を深められれば幸いです。',
      friendly: '今日は気軽にお話しできる場として企画しました。普段話せないことも、この機会にぜひお聞かせください。楽しい時間にしましょう。',
      short: 'お集まりいただきありがとうございます。短い時間ですが、楽しんでいただければ幸いです。'
    }
  };

  // 結びのフレーズ
  var CLOSING = {
    formal: '本日は誠にありがとうございました。',
    friendly: '今日はありがとうございました。これからもよろしくお願いします。',
    short: 'ありがとうございました。'
  };

  function buildSpeech(role, scene, school, tone) {
    var openIdx = tone === 'formal' ? 1 : tone === 'friendly' ? 2 : 0;
    var open = OPENING[scene][openIdx] || OPENING[scene][0];
    var self = SELF[role];
    var body = BODY[scene][tone];
    var close = CLOSING[tone];

    var schoolMention = '';
    if (tone === 'formal') {
      schoolMention = '本日は' + school + 'の保護者の皆様、関係者の皆様、お集まりいただきありがとうございます。\n\n';
    }

    return schoolMention + open + '。\n\n' + self + '。\n\n' + body + '\n\n' + close;
  }

  function gen() {
    var role = document.getElementById('role').value;
    var scene = document.getElementById('scene').value;
    var school = document.getElementById('school').value;

    save(role, scene, school);

    var speeches = [
      { tone: 'formal',   label: 'フォーマル（公式行事向け）' },
      { tone: 'friendly', label: 'カジュアル（親しみやすい）' },
      { tone: 'short',    label: 'ショート（短めにまとめたい時）' }
    ];

    var html = speeches.map(function(s, i) {
      var text = buildSpeech(role, scene, school, s.tone);
      var id = 'sp' + i;
      return '<div class="speech-block">'
        + '<p class="speech-tone">' + s.label + '</p>'
        + '<div class="speech-body" id="' + id + '">' + escapeHtml(text) + '</div>'
        + '<button class="btn-copy" onclick="copyText(\'' + id + '\', this)">📋 コピー</button>'
        + '</div>';
    }).join('');

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').innerHTML = html;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(id, btn) {
    var el = document.getElementById(id);
    var text = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { flashBtn(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      flashBtn(btn);
    }
  }
  function flashBtn(btn) {
    var orig = btn.textContent;
    btn.textContent = '✓ コピーしました';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function save(role, scene, school) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ role: role, scene: scene, school: school }));
    } catch (e) {}
  }
  function load() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (d.role)   document.getElementById('role').value = d.role;
      if (d.scene)  document.getElementById('scene').value = d.scene;
      if (d.school) document.getElementById('school').value = d.school;
    } catch (e) {}
  }
  load();
  </script>

</body>
