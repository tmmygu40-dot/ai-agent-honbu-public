<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗 共依存度診断 — 5問で分かるあなたの距離感タイプ</title>
  <meta name="description" content="5問に答えるだけで、あなたの共依存度レベルと人間関係での適切な距離感の処方箋が分かります。人間関係に疲れやすい方や、自分のパターンを客観的に把握したい方におすすめです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問 ── */
    .q-step {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.6rem;
    }
    .q-text {
      font-size: 1rem; font-weight: 700; color: var(--text);
      line-height: 1.5; margin-bottom: 1.2rem;
    }
    .choice-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }

    /* プログレスバー */
    .progress-bar-wrap {
      max-width: 600px; margin: 0 auto 1rem;
      height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent); border-radius: 99px;
      transition: width 0.3s ease;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.8rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; text-align: left; }

    /* 処方箋カード */
    .rx-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .rx-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.9rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .rx-item { padding: 0.55rem 0; border-bottom: 1px solid var(--border); }
    .rx-item:last-child { border-bottom: none; }
    .rx-item-title { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
    .rx-item-body { font-size: 0.84rem; color: var(--text-sub); line-height: 1.55; }

    /* リセットボタン */
    .btn-reset {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem 1rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print,
      #q-area, .progress-bar-wrap { display: none !important; }
      .card, .result-card, .rx-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔗 共依存度診断</h1>
    <p class="subtitle">5問に答えるだけで、あなたの共依存度と上手な距離の取り方がわかります。</p>
  </header>

  <!-- プログレスバー -->
  <div class="progress-bar-wrap no-print">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- 質問カード -->
  <div class="card" id="q-area">
    <p class="q-step" id="q-step">質問 1 / 5</p>
    <p class="q-text" id="q-text"></p>
    <div class="choice-list" id="choice-list"></div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">共依存度レベル</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 処方箋カード -->
  <div class="rx-card" id="rx-card">
    <p class="rx-title">💊 距離感の処方箋</p>
    <div id="rx-list"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot no-print" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <button class="btn-reset no-print" id="btn-reset" onclick="resetQuiz()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは心理学・カウンセリング分野の共依存概念をもとにした目安ツールです。医療診断ではありません。深刻な悩みは専門家（カウンセラー・精神科医など）にご相談ください。
  </p>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var QUESTIONS = [
    {
      text: '相手が悩んでいると、自分のことは後回しにして助けることを最優先にしてしまう。',
      choices: [
        { label: 'ほとんどない', score: 0 },
        { label: 'たまにある',   score: 1 },
        { label: 'よくある',     score: 2 },
        { label: '常にそうだ',   score: 3 }
      ]
    },
    {
      text: '相手に「NO」と言えず、断ることに強い罪悪感を感じる。',
      choices: [
        { label: 'ほとんどない', score: 0 },
        { label: 'たまにある',   score: 1 },
        { label: 'よくある',     score: 2 },
        { label: '常にそうだ',   score: 3 }
      ]
    },
    {
      text: '相手の機嫌や感情に左右されて、自分の気分が大きく変わる。',
      choices: [
        { label: 'ほとんどない', score: 0 },
        { label: 'たまにある',   score: 1 },
        { label: 'よくある',     score: 2 },
        { label: '常にそうだ',   score: 3 }
      ]
    },
    {
      text: '相手の問題を、自分が何とかしなければいけないと感じる。',
      choices: [
        { label: 'ほとんどない', score: 0 },
        { label: 'たまにある',   score: 1 },
        { label: 'よくある',     score: 2 },
        { label: '常にそうだ',   score: 3 }
      ]
    },
    {
      text: '自分の意見や気持ちよりも、相手に合わせることを選ぶことが多い。',
      choices: [
        { label: 'ほとんどない', score: 0 },
        { label: 'たまにある',   score: 1 },
        { label: 'よくある',     score: 2 },
        { label: '常にそうだ',   score: 3 }
      ]
    }
  ];

  var RESULTS = {
    ok: {
      label: '共依存度：低',
      eval: '健全な距離感を保てています 👍',
      note: 'あなたは自分と他者の境界線（バウンダリー）をうまく保てています。相手を大切にしながらも、自分自身も尊重できているタイプです。',
      rx: [
        { title: '今のペースを続ける', body: '今の関わり方は概ね健全です。たまに「自分の気持ちを優先できているか」を振り返る習慣があれば十分です。' },
        { title: '小さな「NO」の練習', body: '今後のためにも、日常の小さな場面で「ちょっと待ってね」と言う練習を続けると、さらに安心感が増します。' },
        { title: 'セルフケアを忘れずに', body: '健全な関係を続けるには、自分自身の充電が欠かせません。好きなことをする時間を意識的に確保しましょう。' }
      ]
    },
    warn: {
      label: '共依存度：中',
      eval: '共依存の傾向があります。距離感を意識して。',
      note: '相手への気遣いが強く、自分の感情や時間を犠牲にする場面が出てきています。今のうちに距離感を見直すと、関係がもっと楽になります。',
      rx: [
        { title: '「相手の感情は相手のもの」と繰り返す', body: '相手の怒りや悲しみは、あなたが解決すべき問題ではありません。受け止めることと、引き受けることは違います。' },
        { title: '断る練習を小さく始める', body: '全部引き受けなくていいです。まず「今は難しい」「後で考えてみる」という一言から始めてみましょう。' },
        { title: '自分の時間を週1回確保する', body: '誰かのためではなく、自分だけのための時間を意識的に作ることが、共依存の抜け出し口になります。' }
      ]
    },
    ng: {
      label: '共依存度：高',
      eval: '共依存の傾向が強め。専門家への相談も◎',
      note: '相手を優先しすぎて、自分の感情や境界線が見えにくくなっている状態です。深刻な疲弊を感じる前に、専門家（カウンセラーなど）へ相談することも一つの選択肢です。',
      rx: [
        { title: 'まず自分の感情を言語化する', body: '「相手がどう感じているか」より先に、「自分は今どう感じているか」を日記やメモに書き出してみましょう。' },
        { title: '「助けない」という選択もある', body: '助けることが常に正解ではありません。相手が自分で解決する力を奪っている可能性も考えてみましょう。' },
        { title: '専門家への相談を検討する', body: '共依存は一人で気づきにくいパターンです。カウンセラーや相談窓口（よりそいホットライン: 0120-279-338）への連絡も有効です。' }
      ]
    }
  };

  var currentQ = 0;
  var totalScore = 0;

  function renderQuestion() {
    var q = QUESTIONS[currentQ];
    document.getElementById('q-step').textContent = '質問 ' + (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.text;
    var html = '';
    for (var i = 0; i < q.choices.length; i++) {
      var c = q.choices[i];
      html += '<button class="choice-btn" onclick="answer(' + c.score + ')">' + c.label + '</button>';
    }
    document.getElementById('choice-list').innerHTML = html;
    document.getElementById('progress-fill').style.width = (currentQ / QUESTIONS.length * 100) + '%';
  }

  function answer(score) {
    totalScore += score;
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('q-area').style.display = 'none';
    document.getElementById('progress-fill').style.width = '100%';

    var level = totalScore <= 5 ? 'ok' : totalScore <= 10 ? 'warn' : 'ng';
    var res = RESULTS[level];

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = res.label;
    document.getElementById('re').textContent = res.eval;
    document.getElementById('rn').textContent = res.note;

    var rxCard = document.getElementById('rx-card');
    rxCard.style.display = 'block';
    var rxHtml = '';
    for (var i = 0; i < res.rx.length; i++) {
      var item = res.rx[i];
      rxHtml += '<div class="rx-item"><p class="rx-item-title">▶ ' + item.title + '</p>'
              + '<p class="rx-item-body">' + item.body + '</p></div>';
    }
    document.getElementById('rx-list').innerHTML = rxHtml;

    document.getElementById('btn-reset').style.display = 'block';

    try {
      localStorage.setItem('kyoizon_result', JSON.stringify({
        score: totalScore,
        level: level,
        date: new Date().toLocaleDateString('ja-JP')
      }));
    } catch(e) {}
  }

  function resetQuiz() {
    currentQ = 0;
    totalScore = 0;
    document.getElementById('q-area').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('rx-card').style.display = 'none';
    document.getElementById('btn-reset').style.display = 'none';
    renderQuestion();
  }

  renderQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
