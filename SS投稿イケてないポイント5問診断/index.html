<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="自分のSS投稿を5問で分析。投稿のトーン・内容・ビジュアル・タイミング・狙いから、バズりやすい投稿への改善ポイントと具体的なアドバイスを無料でズバリ診断します。">
  <title>💬 SS投稿イケてないポイント5問診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print { .btn-pdf { display: none; } }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; text-align: center; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval { font-size: 1rem; font-weight: 700; line-height: 1.6; margin: 1rem 0; text-align: center; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .advice-box { background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 10px; margin-top: 1rem; font-size: 0.9rem; line-height: 1.6; }
    .advice-title { font-weight: 700; margin-bottom: 0.5rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { padding: 0; background: white; }
      .app-header { border: none; }
      .btn-calc { display: none; }
      .back-link { display: none; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>💬 SS投稿イケてないポイント5問診断</h1>
  <p class="subtitle">自分のSS投稿を5問で分析。バズりやすい投稿への改善法をズバリ指摘します。</p>
</div>

<div class="card">
  <div class="card-title">診断する</div>

  <div class="field">
    <label for="q1">1. 投稿のトーン</label>
    <select id="q1">
      <option value="">選択してください</option>
      <option value="0">ふざけた・ジョーク系</option>
      <option value="2">真面目・情報提供系</option>
      <option value="1">感情的・ぼんやり系</option>
    </select>
  </div>

  <div class="field">
    <label for="q2">2. 投稿の内容のポイント</label>
    <select id="q2">
      <option value="">選択してください</option>
      <option value="0">意外性・驚き</option>
      <option value="2">共感・共有できること</option>
      <option value="1">普通・特に何もない</option>
    </select>
  </div>

  <div class="field">
    <label for="q3">3. 投稿のビジュアル</label>
    <select id="q3">
      <option value="">選択してください</option>
      <option value="2">写真や画像あり</option>
      <option value="1">テキストのみ</option>
      <option value="0">絵文字やアイコン多用</option>
    </select>
  </div>

  <div class="field">
    <label for="q4">4. 投稿のタイミング</label>
    <select id="q4">
      <option value="">選択してください</option>
      <option value="2">昼間（11時〜15時）</option>
      <option value="1">朝・夜</option>
      <option value="0">深夜や早朝</option>
    </select>
  </div>

  <div class="field">
    <label for="q5">5. 反応を狙っている</label>
    <select id="q5">
      <option value="">選択してください</option>
      <option value="2">いいね・保存</option>
      <option value="1">コメント・返信</option>
      <option value="0">拡散・リツイート狙い</option>
    </select>
  </div>

  <button class="btn-calc" onclick="diagnose()">📊 診断を実行</button>
</div>

<div id="resultCard" class="result-card">
  <div class="result-value" id="resultScore"></div>
  <div class="result-eval" id="resultText"></div>
  <div class="advice-box">
    <div class="advice-title">🎯 改善アドバイス</div>
    <div id="resultAdvice"></div>
  </div>
</div>

<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

<script>
function diagnose() {
  const answers = [
    parseInt(document.getElementById('q1').value),
    parseInt(document.getElementById('q2').value),
    parseInt(document.getElementById('q3').value),
    parseInt(document.getElementById('q4').value),
    parseInt(document.getElementById('q5').value)
  ];

  if (answers.some(a => isNaN(a))) {
    alert('すべての質問に答えてください');
    return;
  }

  const score = answers.reduce((a, b) => a + b, 0);
  const maxScore = 10;
  const percentage = Math.round((score / maxScore) * 100);

  let resultClass, resultText, advice;

  if (percentage >= 70) {
    resultClass = 'ok';
    resultText = 'バズりやすい投稿！';
    advice = '✅ 非常に良い投稿です。このまま続けてください。\\n✅ さらにハッシュタグを2〜3個追加すると拡散力UP\\n✅ 定期的に同じトーンで投稿するとフォロワーが増えやすい';
  } else if (percentage >= 50) {
    resultClass = 'warn';
    resultText = 'もう少し改善の余地あり';
    advice = '⚠️ 現在の投稿には改善ポイントがあります。\\n⚠️ ビジュアル（画像・写真）を増やしてみてください\\n⚠️ 投稿内容に「意外性」や「共感」を意識的に加える\\n⚠️ 最適な時間帯（昼間）を狙って投稿';
  } else {
    resultClass = 'ng';
    resultText = 'イケてない可能性大';
    advice = '❌ 今の投稿のままではバズりにくいです。\\n❌ 必ず画像・写真を付けて投稿してください\\n❌ 投稿内容を「驚き」や「共感」に変えてみる\\n❌ タイミングを昼間（11〜15時）に変更\\n❌ 本当に必要な投稿か、一度立ち止まって考える';
  }

  const card = document.getElementById('resultCard');
  card.className = 'result-card ' + resultClass;
  card.innerHTML =
    '<div class="result-value">' + percentage + '%</div>' +
    '<div class="result-eval">' + resultText + '</div>' +
    '<div class="advice-box">' +
      '<div class="advice-title">🎯 改善アドバイス</div>' +
      '<div>' + advice.split('\\n').join('<br>') + '</div>' +
    '</div>';
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // localStorage保存
  const data = {
    date: new Date().toLocaleDateString('ja-JP'),
    score: percentage,
    q1: document.getElementById('q1').value,
    q2: document.getElementById('q2').value,
    q3: document.getElementById('q3').value,
    q4: document.getElementById('q4').value,
    q5: document.getElementById('q5').value
  };
  localStorage.setItem('ss_diagnosis_history', JSON.stringify([...JSON.parse(localStorage.getItem('ss_diagnosis_history') || '[]'), data]));
}

// ページ読み込み時に履歴を復元
window.addEventListener('load', function() {
  const history = localStorage.getItem('ss_diagnosis_history');
  if (history) {
    console.log('過去の診断履歴あり');
  }
});
</script>

</body>
</html>
