<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト人件費計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>シフト人件費計算</h1>

    <section class="form-section">
      <h2>スタッフ追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">スタッフ名</label>
          <input type="text" id="name" placeholder="例：田中">
        </div>
        <div class="form-group">
          <label for="wage">時給（円）</label>
          <input type="number" id="wage" placeholder="例：1200" min="0">
        </div>
        <div class="form-group">
          <label for="hours">シフト時間（時間）</label>
          <input type="number" id="hours" placeholder="例：8" min="0" step="0.5">
        </div>
      </div>
      <button id="addBtn" class="btn btn-primary">追加する</button>
    </section>

    <section class="total-section">
      <div class="total-box">
        <span class="total-label">本日の人件費合計</span>
        <span class="total-amount" id="totalAmount">¥0</span>
      </div>
      <div class="staff-count" id="staffCount">スタッフ 0 名</div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>スタッフ一覧</h2>
        <button id="clearAllBtn" class="btn btn-danger btn-sm">全削除</button>
      </div>
      <div id="staffList" class="staff-list">
        <p class="empty-msg">スタッフが登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
