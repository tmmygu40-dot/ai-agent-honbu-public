<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝日トリビアクイズ｜日本の祝日の由来・雑学10問</title>
  <meta name="description" content="日本の祝日の由来や雑学を10問4択で楽しめる無料クイズアプリ。「昭和の日って元は何の日？」「山の日はいつできた？」などの意外な雑学に挑戦して、ベストスコアを更新しよう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 進捗バー ── */
    .progress-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.6rem;
    }
    .progress-bar {
      width: 100%; height: 8px; background: var(--bg);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      width: 0%; transition: width 0.3s;
    }

    /* ── 問題文 ── */
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem;
    }

    /* ── 選択肢ボタン ── */
    .choice-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; opacity: 0.85; }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700;
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng); font-weight: 700;
    }
    .choice-mark { font-weight: 900; margin-right: 0.5rem; }

    /* ── 解説 ── */
    .explanation {
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-left: 4px solid var(--accent);
      border-radius: 8px; font-size: 0.88rem; line-height: 1.6;
    }
    .explanation .label { font-weight: 700; color: var(--accent); margin-right: 0.4rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.5; margin-bottom: 0.4rem; font-weight: 600; }
    .result-sub { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .best-row {
      display: flex; justify-content: center; gap: 1rem;
      margin-top: 0.8rem; font-size: 0.85rem; color: var(--text-sub);
    }
    .best-row strong { color: var(--accent); font-weight: 800; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎌 祝日トリビアクイズ</h1>
    <p class="subtitle">日本の祝日の由来・雑学を10問4択で。※2026年4月時点の参考データ</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <div class="progress-row">
      <span id="progress-text">第1問 / 全10問</span>
      <span id="score-text">スコア 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="card-title" style="margin-top:1rem">問題</p>
    <p class="question-text" id="question-text">問題を読み込み中...</p>
    <div class="choice-list" id="choice-list"></div>
    <div class="explanation" id="explanation" style="display:none">
      <p><span class="label" id="exp-label"></span><span id="exp-text"></span></p>
    </div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-sub" id="rs"></p>
    <div class="best-row" id="best-row" style="display:none">
      <span>ベストスコア：<strong id="best-score">0</strong>/10</span>
      <span>挑戦回数：<strong id="play-count">0</strong>回</span>
    </div>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc" id="restart-btn" style="display:none" onclick="restart()">もう一度チャレンジ</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、内閣府「国民の祝日に関する法律」や、各省庁・自治体の公開資料を参考に作成しています。最新情報は公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '「成人の日」が1月の第2月曜日になったのは、何制度の導入から？',
      choices: ['週休二日制', 'ゆとり教育', 'ハッピーマンデー制度', '振替休日制度'],
      a: 2,
      e: '2000年から導入された「ハッピーマンデー制度」により、もともと1月15日固定だった成人の日が1月の第2月曜日に移されました。'
    },
    {
      q: '「建国記念の日」（2月11日）の由来となった出来事は？',
      choices: ['明治維新', '神武天皇即位の日', '大日本帝国憲法発布', '日本書紀の完成'],
      a: 1,
      e: '日本書紀に記された初代天皇・神武天皇即位の日に基づきます。戦前は「紀元節」と呼ばれ、1966年に祝日として復活しました。'
    },
    {
      q: '「昭和の日」（4月29日）は、もともと何の日だった？',
      choices: ['文化の日', '昭和天皇の誕生日', 'みどりの日のまま', '建国記念の日'],
      a: 1,
      e: '昭和天皇の誕生日 → 崩御後は「みどりの日」 → 2007年からは「昭和の日」に。みどりの日は5月4日に移動しました。'
    },
    {
      q: '「こどもの日」（5月5日）の起源とされる中国由来の節句は？',
      choices: ['上巳の節句', '端午の節句', '七夕', '重陽の節句'],
      a: 1,
      e: '古来中国では5月5日を「端午の節句」とし、邪気を払う行事を行っていました。日本では男児の成長を祝う日として定着し、1948年に「こどもの日」として制定されました。'
    },
    {
      q: '「海の日」が国民の祝日として制定されたのは？',
      choices: ['1985年', '1995年', '2005年', '2016年'],
      a: 1,
      e: '1995年に祝日法改正で制定、1996年から施行されました。明治天皇が東北・北海道巡幸から横浜港に帰着した7月20日が由来です。'
    },
    {
      q: '「山の日」は何月何日？',
      choices: ['7月11日', '8月11日', '9月11日', '10月11日'],
      a: 1,
      e: '8月11日です。2014年に制定、2016年から施行された比較的新しい祝日で、日本で最も新しい国民の祝日です。'
    },
    {
      q: '「敬老の日」のもとになった、兵庫県多可町から始まった日の名称は？',
      choices: ['老人の日', 'としよりの日', '長寿の日', 'シルバーデー'],
      a: 1,
      e: '1947年に兵庫県多可郡野間谷村（現・多可町）で「としよりの日」が始まり、後に「老人の日」を経て1966年に「敬老の日」として国民の祝日になりました。'
    },
    {
      q: '「文化の日」（11月3日）は、もともと何の日だった？',
      choices: ['明治天皇の誕生日', '大正天皇の誕生日', '日本国憲法公布日', '文化勲章制定日'],
      a: 0,
      e: '明治天皇の誕生日（明治節）でした。1946年11月3日に日本国憲法が公布されたことから、1948年に「文化の日」として制定されました。'
    },
    {
      q: '「勤労感謝の日」（11月23日）のルーツとされる宮中行事は？',
      choices: ['大嘗祭', '新嘗祭（にいなめさい）', '神嘗祭（かんなめさい）', '例大祭'],
      a: 1,
      e: '天皇がその年の新穀を神に供え、自らも食す「新嘗祭」が起源。戦後の1948年、勤労を尊ぶ意味で「勤労感謝の日」と改められました。'
    },
    {
      q: '「春分の日」「秋分の日」は、いつ確定する？',
      choices: ['前年2月の官報で告示', '5年に一度国会で決定', '毎年の天文観測で決まる', '60年ごとに改定'],
      a: 0,
      e: '国立天文台が前年に翌年の暦を計算し、政府が前年2月1日付の官報で「暦要項」として告示します。日付は天文学的に決まり、年によって1日前後します。'
    }
  ];

  var STORAGE_KEY = 'holiday_quiz_v1';
  var state = { idx: 0, score: 0, answered: false, order: [] };

  function loadStats() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { best: 0, plays: 0 };
    } catch (e) { return { best: 0, plays: 0 }; }
  }
  function saveStats(stats) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch (e) {}
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function start() {
    state.idx = 0;
    state.score = 0;
    state.answered = false;
    // 問題順をシャッフル（10問固定）
    var indexes = [];
    for (var i = 0; i < QUESTIONS.length; i++) indexes.push(i);
    state.order = shuffle(indexes);
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    state.answered = false;
    var qIdx = state.order[state.idx];
    var q = QUESTIONS[qIdx];
    var total = state.order.length;

    document.getElementById('progress-text').textContent = '第' + (state.idx + 1) + '問 / 全' + total + '問';
    document.getElementById('score-text').textContent = 'スコア ' + state.score;
    document.getElementById('progress-fill').style.width = ((state.idx) / total * 100) + '%';

    document.getElementById('question-text').textContent = q.q;

    var list = document.getElementById('choice-list');
    list.innerHTML = '';
    q.choices.forEach(function(text, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = '<span class="choice-mark">' + ['A','B','C','D'][i] + '.</span>' + text;
      btn.onclick = function() { answer(i); };
      list.appendChild(btn);
    });

    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function answer(choice) {
    if (state.answered) return;
    state.answered = true;
    var qIdx = state.order[state.idx];
    var q = QUESTIONS[qIdx];
    var correct = (choice === q.a);
    if (correct) state.score++;

    var btns = document.querySelectorAll('#choice-list .choice-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (i === q.a) btns[i].classList.add('correct');
      else if (i === choice) btns[i].classList.add('wrong');
    }

    document.getElementById('exp-label').textContent = correct ? '⭕ 正解！' : '❌ 不正解';
    document.getElementById('exp-text').textContent = q.e;
    document.getElementById('explanation').style.display = 'block';
    document.getElementById('score-text').textContent = 'スコア ' + state.score;

    var nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = (state.idx + 1 >= state.order.length) ? '結果を見る' : '次の問題へ';
    nextBtn.style.display = 'block';
  }

  function nextQuestion() {
    state.idx++;
    if (state.idx >= state.order.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    var total = state.order.length;
    var score = state.score;
    var pct = score / total * 100;
    var level, evalMsg, sub;
    if (pct >= 90)      { level = 'ok';   evalMsg = '祝日マスター級！';      sub = '由来も雑学もばっちり。家族や友人にも教えたくなるレベルです。'; }
    else if (pct >= 70) { level = 'ok';   evalMsg = 'かなり詳しい！';        sub = 'よく勉強されています。あと一息で祝日マスターです。'; }
    else if (pct >= 50) { level = 'warn'; evalMsg = '日本人の平均くらい';    sub = '基本は押さえています。間違えた問題の解説を読み返してみてください。'; }
    else if (pct >= 30) { level = 'warn'; evalMsg = 'まだ伸びしろあり';      sub = '祝日の由来は意外と知られていないもの。学び直しのチャンスです。'; }
    else                { level = 'ng';   evalMsg = '雑学チャンスです！';    sub = '普段なんとなく休んでいる祝日にも、面白い由来があります。'; }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + total;
    document.getElementById('rn').textContent = evalMsg;
    document.getElementById('rs').textContent = sub;

    // ベストスコア更新
    var stats = loadStats();
    stats.plays = (stats.plays || 0) + 1;
    if (score > (stats.best || 0)) stats.best = score;
    saveStats(stats);
    document.getElementById('best-score').textContent = stats.best;
    document.getElementById('play-count').textContent = stats.plays;
    document.getElementById('best-row').style.display = 'flex';

    document.getElementById('restart-btn').style.display = 'block';
  }

  function restart() {
    start();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  start();
  </script>
