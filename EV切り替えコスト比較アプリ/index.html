<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV切り替えコスト比較アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --ev: #0e7490;     --ev-bg: #ecfeff;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .card-title.ev-color { color: var(--ev); }

    /* ── 入力グループ ── */
    .input-group {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
    }
    @media (max-width: 400px) {
      .input-group { grid-template-columns: 1fr; }
    }

    /* ── 入力 ── */
    .field { margin-bottom: 0.75rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── セクション区切り ── */
    .section-label {
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.08em;
      color: var(--text-sub); text-transform: uppercase;
      margin: 1rem 0 0.6rem;
      padding-left: 0.3rem;
      border-left: 3px solid var(--border);
    }
    .section-label.gas { border-color: var(--accent); color: var(--accent); }
    .section-label.ev  { border-color: var(--ev); color: var(--ev); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--ok); font-size: 1.05rem; }
    .detail-table .hl-warn td:last-child { color: var(--warn); font-size: 1.05rem; }
    .detail-table .sub-header td { background: var(--bg); font-weight: 700; font-size: 0.8rem; color: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>EV切り替えコスト比較</h1>
    <p class="subtitle">走行距離・燃費・電費を入力して年間節約額を即確認</p>
  </header>

  <!-- 入力カード：共通 -->
  <div class="card">
    <p class="card-title">走行条件</p>
    <div class="field">
      <label for="km">年間走行距離（km）</label>
      <input type="number" id="km" placeholder="例: 10000" min="0">
      <p class="hint">1年間に走る合計距離を入力してください</p>
    </div>

    <p class="section-label gas">ガソリン車</p>
    <div class="input-group">
      <div class="field">
        <label for="gas-price">ガソリン単価（円/L）</label>
        <input type="number" id="gas-price" placeholder="例: 170" min="0">
      </div>
      <div class="field">
        <label for="gas-mileage">燃費（km/L）</label>
        <input type="number" id="gas-mileage" placeholder="例: 15" min="0" step="0.1">
      </div>
    </div>

    <p class="section-label ev">EV（電気自動車）</p>
    <div class="input-group">
      <div class="field">
        <label for="elec-price">電気代単価（円/kWh）</label>
        <input type="number" id="elec-price" placeholder="例: 30" min="0">
        <p class="hint">深夜プランなら15〜20円台も</p>
      </div>
      <div class="field">
        <label for="ev-mileage">電費（km/kWh）</label>
        <input type="number" id="ev-mileage" placeholder="例: 6" min="0" step="0.1">
        <p class="hint">一般的なEVは5〜8km/kWh</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">年間コストを比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">年間節約額（EV乗り換えで）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'ev_compare_v1';

  function loadValues() {
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (data.km)          document.getElementById('km').value = data.km;
      if (data.gasPrice)    document.getElementById('gas-price').value = data.gasPrice;
      if (data.gasMileage)  document.getElementById('gas-mileage').value = data.gasMileage;
      if (data.elecPrice)   document.getElementById('elec-price').value = data.elecPrice;
      if (data.evMileage)   document.getElementById('ev-mileage').value = data.evMileage;
    } catch(e) {}
  }

  function saveValues(km, gasPrice, gasMileage, elecPrice, evMileage) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        km: km, gasPrice: gasPrice, gasMileage: gasMileage,
        elecPrice: elecPrice, evMileage: evMileage
      }));
    } catch(e) {}
  }

  function calc() {
    var km         = parseFloat(document.getElementById('km').value);
    var gasPrice   = parseFloat(document.getElementById('gas-price').value);
    var gasMileage = parseFloat(document.getElementById('gas-mileage').value);
    var elecPrice  = parseFloat(document.getElementById('elec-price').value);
    var evMileage  = parseFloat(document.getElementById('ev-mileage').value);

    if ([km, gasPrice, gasMileage, elecPrice, evMileage].some(isNaN) ||
        [km, gasPrice, gasMileage, elecPrice, evMileage].some(function(v){ return v <= 0; })) {
      showErr('すべての項目に正の数値を入力してください');
      return;
    }

    saveValues(km, gasPrice, gasMileage, elecPrice, evMileage);

    // 年間燃料費の計算
    var gasCostYear  = (km / gasMileage) * gasPrice;   // 年間ガソリン代
    var elecCostYear = (km / evMileage)  * elecPrice;  // 年間電気代

    var saving = gasCostYear - elecCostYear; // プラス = EV有利
    var level, note;

    if (saving > 0) {
      level = 'ok';
      note  = 'EV乗り換えでガソリン代を年間 ' + fmt(saving) + ' 円節約できます。';
    } else if (saving === 0) {
      level = 'warn';
      note  = 'ガソリン車とEVで燃料コストはほぼ同じです。';
    } else {
      level = 'warn';
      note  = '現在の電気代単価ではEVの燃料費がガソリン車より年間 ' + fmt(-saving) + ' 円高くなります。';
    }

    var resultLabel = saving > 0 ? fmt(saving) + ' 円/年 お得'
                    : saving === 0 ? 'ほぼ同じ'
                    : '▲' + fmt(-saving) + ' 円/年 割高';

    showResult(level, resultLabel, note);

    var savingClass = saving >= 0 ? 'hl' : 'hl-warn';
    showDetail([
      { label: 'ガソリン車 年間ガソリン代', val: fmt(gasCostYear) + ' 円', cls: '' },
      { label: '  年間走行距離', val: fmt(km) + ' km', cls: '' },
      { label: '  燃費', val: gasMileage + ' km/L', cls: '' },
      { label: '  ガソリン単価', val: gasPrice + ' 円/L', cls: '' },
      { label: 'EV 年間電気代', val: fmt(elecCostYear) + ' 円', cls: '' },
      { label: '  電費', val: evMileage + ' km/kWh', cls: '' },
      { label: '  電気代単価', val: elecPrice + ' 円/kWh', cls: '' },
      { label: saving >= 0 ? '年間節約額' : '年間コスト増', val: fmt(Math.abs(saving)) + ' 円', cls: savingClass },
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr class="' + r.cls + '"><td>' + r.label + '</td><td>' + r.val + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  loadValues();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
