<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格戦略シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>価格戦略シミュレーター</h1>
    <p class="subtitle">値上げ・量削減・据え置きの3択で利益を即比較</p>

    <section class="card">
      <h2>現在の状況を入力</h2>
      <div class="form-group">
        <label for="costPrice">仕入れ値（円）</label>
        <input type="number" id="costPrice" placeholder="例：500" min="0" step="1">
      </div>
      <div class="form-group">
        <label for="sellPrice">販売価格（円）</label>
        <input type="number" id="sellPrice" placeholder="例：1000" min="0" step="1">
      </div>
      <div class="form-group">
        <label for="quantity">月間販売数量（個）</label>
        <input type="number" id="quantity" placeholder="例：100" min="0" step="1">
      </div>
    </section>

    <section class="card">
      <h2>シナリオ設定</h2>
      <div class="form-group">
        <label for="priceUpRate">値上げ率（%）</label>
        <input type="number" id="priceUpRate" placeholder="例：10" min="0" max="100" step="0.1" value="10">
      </div>
      <div class="form-group">
        <label for="volumeDownRate">量削減率（%）</label>
        <input type="number" id="volumeDownRate" placeholder="例：10" min="0" max="100" step="0.1" value="10">
        <span class="hint">内容量を減らして価格据え置き（実質値上げ）</span>
      </div>
    </section>

    <button id="calcBtn" class="btn-primary">計算する</button>

    <section id="results" class="results hidden">
      <h2>比較結果</h2>
      <div class="result-grid">
        <div class="result-card scenario-keep">
          <div class="scenario-label">据え置き</div>
          <div class="scenario-desc">価格・数量ともに現状維持</div>
          <div class="result-row">
            <span>販売価格</span>
            <span id="keepSellPrice">-</span>
          </div>
          <div class="result-row">
            <span>販売数量</span>
            <span id="keepQty">-</span>
          </div>
          <div class="result-row">
            <span>1個あたり利益</span>
            <span id="keepProfit1">-</span>
          </div>
          <div class="result-row highlight">
            <span>月間利益</span>
            <span id="keepProfit">-</span>
          </div>
          <div class="result-row">
            <span>粗利率</span>
            <span id="keepMargin">-</span>
          </div>
        </div>

        <div class="result-card scenario-up">
          <div class="scenario-label">値上げ</div>
          <div class="scenario-desc" id="upDesc">-</div>
          <div class="result-row">
            <span>販売価格</span>
            <span id="upSellPrice">-</span>
          </div>
          <div class="result-row">
            <span>販売数量</span>
            <span id="upQty">-</span>
          </div>
          <div class="result-row">
            <span>1個あたり利益</span>
            <span id="upProfit1">-</span>
          </div>
          <div class="result-row highlight">
            <span>月間利益</span>
            <span id="upProfit">-</span>
          </div>
          <div class="result-row">
            <span>粗利率</span>
            <span id="upMargin">-</span>
          </div>
          <div class="result-row diff-row">
            <span>据え置きとの差</span>
            <span id="upDiff">-</span>
          </div>
        </div>

        <div class="result-card scenario-down">
          <div class="scenario-label">量削減</div>
          <div class="scenario-desc" id="downDesc">-</div>
          <div class="result-row">
            <span>販売価格</span>
            <span id="downSellPrice">-</span>
          </div>
          <div class="result-row">
            <span>販売数量</span>
            <span id="downQty">-</span>
          </div>
          <div class="result-row">
            <span>1個あたり利益</span>
            <span id="downProfit1">-</span>
          </div>
          <div class="result-row highlight">
            <span>月間利益</span>
            <span id="downProfit">-</span>
          </div>
          <div class="result-row">
            <span>粗利率</span>
            <span id="downMargin">-</span>
          </div>
          <div class="result-row diff-row">
            <span>据え置きとの差</span>
            <span id="downDiff">-</span>
          </div>
        </div>
      </div>

      <div class="recommendation" id="recommendation"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
