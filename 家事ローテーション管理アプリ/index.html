<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家事ローテーション管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>家事ローテーション管理</h1>
    <p id="today-label"></p>
  </header>

  <main>
    <!-- 今日のタスク -->
    <section id="today-section">
      <h2>今日やること</h2>
      <ul id="today-list">
        <li class="empty-msg">登録タスクがありません</li>
      </ul>
    </section>

    <!-- 場所登録フォーム -->
    <section id="register-section">
      <h2>掃除場所を登録</h2>
      <form id="register-form">
        <div class="form-row">
          <input type="text" id="place-input" placeholder="掃除場所（例：リビング）" required>
        </div>
        <div class="form-row">
          <select id="freq-select">
            <option value="1">毎日</option>
            <option value="7" selected>週1</option>
            <option value="4">週2（3〜4日ごと）</option>
            <option value="14">月2（2週ごと）</option>
            <option value="30">月1</option>
          </select>
        </div>
        <button type="submit">登録する</button>
      </form>
    </section>

    <!-- 登録一覧 -->
    <section id="list-section">
      <h2>登録一覧</h2>
      <ul id="task-list">
        <li class="empty-msg">まだ登録されていません</li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
