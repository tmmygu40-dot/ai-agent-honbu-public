<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS疲れ度診断｜3問でデジタルデトックス処方箋</title>
  <meta name="description" content="3問に答えるだけでSNS疲れ度を3段階で判定し、レベル別のデジタルデトックス処方箋を即提示する無料診断ツールです。スマホとSNSに疲れたときの軽い気分転換にお使いいただけます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    .field .qtext { display: block; font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }
    .rx-list { list-style: none; padding: 0; margin: 0; }
    .rx-list li {
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
      color: var(--text);
    }
    .rx-list li:last-child { border-bottom: none; }
    .rx-list li::before { content: "✓ "; color: var(--accent); font-weight: 700; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>SNS疲れ度デジタルデトックス診断</h1>
    <p class="subtitle">3問でSNS疲れ度を判定 ／ レベル別の処方箋3つを即提示</p>
  </header>

  <div class="card">
    <p class="card-title">3つの質問</p>
    <div class="field">
      <span class="qtext">Q1. SNSを開いてからモヤッとする回数は？</span>
      <select id="q1">
        <option value="0">ほぼない</option>
        <option value="1">週1〜2回くらい</option>
        <option value="2">ほぼ毎日1回はある</option>
        <option value="3">1日に何度もある</option>
      </select>
    </div>
    <div class="field">
      <span class="qtext">Q2. 通知や反応を確認する頻度は？</span>
      <select id="q2">
        <option value="0">気が向いたときだけ</option>
        <option value="1">1日数回チェック</option>
        <option value="2">数十分おきに気になる</option>
        <option value="3">数分おきに開いてしまう</option>
      </select>
    </div>
    <div class="field">
      <span class="qtext">Q3. SNSをやめたあとの気分は？</span>
      <select id="q3">
        <option value="0">スッキリしている</option>
        <option value="1">特に変化なし</option>
        <option value="2">少し疲れたなと感じる</option>
        <option value="3">どっと疲れる・落ち込む</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="diag()">疲れ度を判定する</button>

  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="rx-card" style="display:none">
    <p class="card-title">処方箋（今日からできる3つ）</p>
    <ul class="rx-list" id="rx-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・厚生労働省などの公開資料や、デジタルウェルビーイングに関する一般情報を参考に、目安として使いやすく整理しています。医療的判断ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'sns_fatigue_v2';

  var RX = {
    ok: {
      label: '軽症：ほぼ健康的に使えています',
      note: '今のペースを保ちつつ、少しの工夫で更に快適に。',
      list: [
        '寝る前30分はSNSを閉じてみる',
        'タイムラインを開く前に「何を見たいか」を1秒考える',
        '気になるアカウントだけ通知ONにして残りはOFF'
      ]
    },
    warn: {
      label: '中症：そろそろ距離を取りたい段階',
      note: '無意識に開く習慣が増えています。少し休ませる時間を。',
      list: [
        '通知バッジ（赤い数字）をすべてオフにする',
        'スマホのホーム画面からSNSアプリを2階層奥へ移動',
        '1日1回「SNSを開かない時間帯」を30分だけ作る'
      ]
    },
    ng: {
      label: '重症：本格的なデトックスが必要',
      note: '心が疲れています。物理的に距離を取るのが効きます。',
      list: [
        'SNSアプリを一度ログアウト or アンインストールする',
        '寝室にスマホを持ち込まないルールを今日から1週間',
        'SNS以外で「人と話す／散歩する」時間を1日30分確保'
      ]
    }
  };

  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      ['q1','q2','q3'].forEach(function(k){
        if (d[k] != null) document.getElementById(k).value = d[k];
      });
    } catch (e) {}
  }

  function save(d) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch (e) {}
  }

  function diag() {
    var q1 = parseInt(document.getElementById('q1').value, 10);
    var q2 = parseInt(document.getElementById('q2').value, 10);
    var q3 = parseInt(document.getElementById('q3').value, 10);
    save({q1:q1, q2:q2, q3:q3});

    var sum = q1 + q2 + q3;
    var level = sum <= 3 ? 'ok' : sum <= 6 ? 'warn' : 'ng';
    var rx = RX[level];

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rx.label + '（合計 ' + sum + ' / 9）';
    document.getElementById('rn').textContent = rx.note;

    var listEl = document.getElementById('rx-list');
    listEl.innerHTML = rx.list.map(function(item){ return '<li>' + item + '</li>'; }).join('');
    document.getElementById('rx-card').style.display = 'block';

    rc.scrollIntoView({behavior:'smooth', block:'start'});
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
