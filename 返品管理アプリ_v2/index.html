<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返品管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>返品管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="card form-section">
      <h2>返品記録を追加</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：Tシャツ（白・M）" maxlength="100">
      </div>
      <div class="form-group">
        <label for="quantity">数量</label>
        <input type="number" id="quantity" placeholder="1" min="1" value="1">
      </div>
      <div class="form-group">
        <label for="reason">返品理由</label>
        <select id="reason">
          <option value="">選択してください</option>
          <option value="サイズ不良">サイズ不良</option>
          <option value="品質不良">品質不良</option>
          <option value="破損・汚損">破損・汚損</option>
          <option value="商品違い">商品違い（誤発送）</option>
          <option value="イメージ違い">イメージ違い</option>
          <option value="初期不良">初期不良</option>
          <option value="注文ミス">注文ミス</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="詳細を入力" maxlength="200">
      </div>
      <button class="btn-primary" onclick="addRecord()">追加する</button>
    </section>

    <!-- 集計パネル -->
    <section class="card summary-section">
      <h2>集計</h2>
      <div class="summary-tabs">
        <button class="tab-btn active" onclick="showTab('byProduct')">商品別</button>
        <button class="tab-btn" onclick="showTab('byReason')">理由別</button>
      </div>

      <div id="tab-byProduct" class="tab-content active">
        <h3>商品別返品数ランキング</h3>
        <div id="productRanking" class="ranking-list"></div>
      </div>

      <div id="tab-byReason" class="tab-content">
        <h3>返品理由別集計</h3>
        <div id="reasonSummary" class="ranking-list"></div>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="card records-section">
      <div class="records-header">
        <h2>返品記録一覧 <span id="totalCount" class="badge">0件</span></h2>
        <button class="btn-danger-small" onclick="clearAll()">全削除</button>
      </div>
      <div id="recordList" class="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
