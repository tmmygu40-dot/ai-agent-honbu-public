<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返品管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E8%BF%94%E5%93%81%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA_v2/" />
</head>
<body>
  <div class="container">
    <h1>返品管理アプリ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <!-- 入力フォーム -->
    <section class="card form-section">
      <h2>返品記録を追加</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：Tシャツ（白・M）" maxlength="100">
      </div>
      <div class="form-group">
        <label for="quantity">数量</label>
        <input type="number" id="quantity" placeholder="1" min="1" value="1">
      </div>
      <div class="form-group">
        <label for="reason">返品理由</label>
        <select id="reason">
          <option value="">選択してください</option>
          <option value="サイズ不良">サイズ不良</option>
          <option value="品質不良">品質不良</option>
          <option value="破損・汚損">破損・汚損</option>
          <option value="商品違い">商品違い（誤発送）</option>
          <option value="イメージ違い">イメージ違い</option>
          <option value="初期不良">初期不良</option>
          <option value="注文ミス">注文ミス</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="詳細を入力" maxlength="200">
      </div>
      <button class="btn-primary" onclick="addRecord()">追加する</button>
    </section>

    <!-- 集計パネル -->
    <section class="card summary-section">
      <h2>集計</h2>
      <div class="summary-tabs">
        <button class="tab-btn active" onclick="showTab('byProduct')">商品別</button>
        <button class="tab-btn" onclick="showTab('byReason')">理由別</button>
      </div>

      <div id="tab-byProduct" class="tab-content active">
        <h3>商品別返品数ランキング</h3>
        <div id="productRanking" class="ranking-list"></div>
      </div>

      <div id="tab-byReason" class="tab-content">
        <h3>返品理由別集計</h3>
        <div id="reasonSummary" class="ranking-list"></div>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="card records-section">
      <div class="records-header">
        <h2>返品記録一覧 <span id="totalCount" class="badge">0件</span></h2>
        <button class="btn-danger-small" onclick="clearAll()">全削除</button>
      </div>
      <div id="recordList" class="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
