<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>緊急情報カード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <!-- 設定画面 -->
  <div id="settingsScreen" class="screen">
    <header>
      <h1>🆘 緊急情報カード</h1>
      <button id="showCardBtn" class="btn btn-primary">カードを表示</button>
    </header>

    <section class="section">
      <h2>基本情報</h2>
      <div class="form-group">
        <label>氏名</label>
        <input type="text" id="myName" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>生年月日</label>
        <input type="date" id="myBirthdate">
      </div>
      <div class="form-group">
        <label>血液型</label>
        <select id="myBloodType">
          <option value="">不明</option>
          <option value="A">A型</option>
          <option value="B">B型</option>
          <option value="O">O型</option>
          <option value="AB">AB型</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2>緊急連絡先</h2>
      <div id="contactList" class="item-list"></div>
      <div class="add-form">
        <input type="text" id="contactName" placeholder="名前（例：山田 花子）">
        <input type="text" id="contactRelation" placeholder="続柄（例：妻）">
        <input type="tel" id="contactPhone" placeholder="電話番号">
        <button class="btn btn-add" onclick="addContact()">＋ 追加</button>
      </div>
    </section>

    <section class="section">
      <h2>持病</h2>
      <div id="conditionList" class="item-list"></div>
      <div class="add-form">
        <input type="text" id="conditionInput" placeholder="例：高血圧、糖尿病">
        <button class="btn btn-add" onclick="addCondition()">＋ 追加</button>
      </div>
    </section>

    <section class="section">
      <h2>常備薬</h2>
      <div id="medicineList" class="item-list"></div>
      <div class="add-form">
        <input type="text" id="medicineInput" placeholder="例：アムロジピン 5mg">
        <button class="btn btn-add" onclick="addMedicine()">＋ 追加</button>
      </div>
    </section>

    <section class="section">
      <h2>アレルギー</h2>
      <div id="allergyList" class="item-list"></div>
      <div class="add-form">
        <input type="text" id="allergyInput" placeholder="例：ペニシリン、そば">
        <button class="btn btn-add" onclick="addAllergy()">＋ 追加</button>
      </div>
    </section>

    <div class="save-bar">
      <button class="btn btn-save" onclick="saveAll()">💾 保存</button>
      <span id="saveMsg" class="save-msg"></span>
    </div>
  </div>

  <!-- カード表示画面 -->
  <div id="cardScreen" class="screen hidden">
    <div class="card">
      <div class="card-header">
        <div class="emergency-badge">🆘 緊急情報</div>
        <button id="fullscreenBtn" class="btn-icon" title="フルスクリーン" onclick="toggleFullscreen()">⛶</button>
        <button id="closeCardBtn" class="btn-icon" onclick="showSettings()">✕</button>
      </div>

      <div class="card-body">
        <div class="card-name" id="cardName"></div>
        <div class="card-meta" id="cardMeta"></div>

        <div class="card-section" id="cardContactsSection">
          <div class="card-section-title">📞 緊急連絡先</div>
          <div id="cardContacts"></div>
        </div>

        <div class="card-section" id="cardConditionsSection">
          <div class="card-section-title">🏥 持病</div>
          <div id="cardConditions"></div>
        </div>

        <div class="card-section" id="cardMedicinesSection">
          <div class="card-section-title">💊 常備薬</div>
          <div id="cardMedicines"></div>
        </div>

        <div class="card-section" id="cardAllergiesSection">
          <div class="card-section-title">⚠️ アレルギー</div>
          <div id="cardAllergies"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
