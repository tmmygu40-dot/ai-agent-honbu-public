<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資格期限管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>資格期限管理</h1>

    <section class="form-section">
      <h2>資格を登録する</h2>
      <div class="form-grid">
        <div class="form-row">
          <label for="staffName">スタッフ名</label>
          <input type="text" id="staffName" placeholder="例：山田 太郎">
        </div>
        <div class="form-row">
          <label for="certName">資格・免許名</label>
          <input type="text" id="certName" placeholder="例：フォークリフト運転技能者">
        </div>
        <div class="form-row">
          <label for="acquiredDate">取得日</label>
          <input type="date" id="acquiredDate">
        </div>
        <div class="form-row">
          <label for="expiryDate">有効期限</label>
          <input type="date" id="expiryDate">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録済み資格一覧</h2>
        <span id="totalCount" class="count-badge">0件</span>
      </div>
      <div class="legend">
        <span class="badge badge-expired">期限切れ</span>
        <span class="badge badge-warning">30日以内</span>
        <span class="badge badge-ok">正常</span>
      </div>
      <div id="tableWrapper">
        <table id="certTable">
          <thead>
            <tr>
              <th>スタッフ名</th>
              <th>資格・免許名</th>
              <th>取得日</th>
              <th>有効期限</th>
              <th>残り日数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="certBody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="empty-msg">登録された資格はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
