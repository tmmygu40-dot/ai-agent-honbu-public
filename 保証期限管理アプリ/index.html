<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保証期限管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>保証期限管理</h1>

    <section class="form-section">
      <h2>品目を登録する</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="品目名（例：冷蔵庫）" maxlength="50">
      </div>
      <div class="form-row">
        <select id="category">
          <option value="家電">家電</option>
          <option value="PC">PC</option>
          <option value="車">車</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-row">
        <label for="expiryDate">保証期限</label>
        <input type="date" id="expiryDate">
      </div>
      <div class="form-row">
        <input type="text" id="memo" placeholder="メモ（任意）" maxlength="100">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録済み一覧</h2>
        <span id="itemCount" class="item-count">0件</span>
      </div>
      <div id="alertBanner" class="alert-banner" style="display:none;"></div>
      <div id="itemList" class="item-list">
        <p class="empty-msg">まだ登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
