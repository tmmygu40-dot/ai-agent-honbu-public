<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PTA・保護者会・クラス懇談会の自己紹介を、場面と学年とトーンを選ぶだけで3パターン即生成。緊張する場面でも30秒で言葉が決まる無料の保護者挨拶文ジェネレーターです。">
  <title>保護者挨拶文ジェネレーター｜PTA・保護者会で使える3パターン自己紹介</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 出力カード */
    .output-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .output-card .pattern-label {
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .output-card .pattern-title {
      font-size: 1rem; font-weight: 800; color: var(--text);
      margin-bottom: 0.7rem; line-height: 1.4;
    }
    .output-card textarea {
      width: 100%; min-height: 8.5rem; resize: vertical;
      padding: 0.85rem 0.9rem; font-size: 0.95rem; line-height: 1.65;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      font-family: inherit; outline: none;
    }
    .output-card textarea:focus { border-color: var(--accent); background: #fff; }
    .btn-copy {
      display: inline-block; margin-top: 0.7rem; padding: 0.55rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .output-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>保護者挨拶文ジェネレーター</h1>
    <p class="subtitle">PTA・保護者会・懇談会の自己紹介を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="scene">場面</label>
      <select id="scene">
        <option value="pta">PTA総会</option>
        <option value="class">クラス懇談会</option>
        <option value="newterm">新学期保護者会</option>
        <option value="ceremony">入学式・卒業式の保護者会</option>
        <option value="lesson">習い事・サークルの保護者会</option>
      </select>
    </div>

    <div class="field">
      <label for="grade">学年</label>
      <select id="grade">
        <option value="pre">未就学児</option>
        <option value="low">小学校低学年</option>
        <option value="high">小学校高学年</option>
        <option value="jh">中学生</option>
        <option value="hs">高校生</option>
      </select>
    </div>

    <div class="field">
      <label for="kids">子どもの人数</label>
      <select id="kids">
        <option value="1">1人</option>
        <option value="2">2人</option>
        <option value="3">3人以上</option>
      </select>
    </div>

    <div class="field">
      <label for="surname">苗字（任意）</label>
      <input type="text" id="surname" placeholder="例：田中" maxlength="20">
      <p class="hint">空欄の場合は「○○」で出力されます</p>
    </div>

    <div class="field">
      <label for="extra">一言ネタ・趣味（任意）</label>
      <input type="text" id="extra" placeholder="例：最近は朝活ハマってます" maxlength="40">
      <p class="hint">入れると親しみパターンに自然に組み込まれます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">3パターン生成する</button>

  <!-- 出力エリア（生成後表示） -->
  <div id="outputs"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、文部科学省・自治体PTA連合会・教育委員会などの公開資料や、一般的な保護者会の進行例を参考に、目安として使いやすく整理しています。最新の運営ルールは各校・各団体の案内をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'hogosha-aisatsu-v1';

  // 場面ラベル
  var SCENE_LABEL = {
    pta:      'PTA総会',
    class:    'クラス懇談会',
    newterm:  '新学期の保護者会',
    ceremony: '式典後の保護者会',
    lesson:   '習い事の保護者会'
  };

  // 学年フレーズ
  var GRADE_LABEL = {
    pre:  '未就学の',
    low:  '小学校低学年の',
    high: '小学校高学年の',
    jh:   '中学生の',
    hs:   '高校生の'
  };

  // 子の数フレーズ
  var KIDS_LABEL = {
    '1': '子ども',
    '2': '兄弟',
    '3': '兄弟（3人以上）'
  };

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // 場面別の冒頭・結びテンプレ
  function openingByScene(scene) {
    var map = {
      pta:      ['本日はお忙しい中、PTA総会にお集まりいただきありがとうございます。',
                 'PTA総会に参加させていただき、ありがとうございます。'],
      class:    ['本日はお時間をいただきありがとうございます。',
                 'クラス懇談会への参加、ありがとうございます。'],
      newterm:  ['新学期の保護者会にお集まりいただき、ありがとうございます。',
                 'お忙しい中、新学期の保護者会にお越しいただきありがとうございます。'],
      ceremony: ['本日はお忙しい中、ご出席ありがとうございます。',
                 '式典に続き、保護者会にもご参加いただきありがとうございます。'],
      lesson:   ['日頃から大変お世話になっております。',
                 '本日はお時間をいただきありがとうございます。']
    };
    return pickRandom(map[scene] || map.pta);
  }

  function closingByTone(tone) {
    var map = {
      humble:   ['不慣れな点もあるかと思いますが、どうぞよろしくお願いいたします。',
                 '至らぬ点もあるかと存じますが、よろしくお願いいたします。'],
      standard: ['1年間（1学期間）どうぞよろしくお願いいたします。',
                 '今年度もどうぞよろしくお願いいたします。'],
      friendly: ['気軽にお声がけください。よろしくお願いします！',
                 'お会いできてうれしいです。よろしくお願いします！']
    };
    return pickRandom(map[tone] || map.standard);
  }

  function gradeAndKids(grade, kids) {
    var g = GRADE_LABEL[grade] || '';
    if (kids === '1') return g + '子どもの保護者の';
    if (kids === '2') return g + '子と、もう1人の子どもの2人の保護者の';
    return g + '子を含む3人の子どもの保護者の';
  }

  function pattern_humble(scene, grade, kids, surname) {
    var open = openingByScene(scene);
    var name = surname || '○○';
    var who  = gradeAndKids(grade, kids);
    var body = (kids === '1')
      ? '今年度から（今学期から）皆さまにお世話になります。'
      : '上の子から数年お世話になっており、いつも助けていただいております。';
    var close = closingByTone('humble');
    return open + '\n\n' + name + 'と申します。' + who + '保護者です。\n' + body + '\n\n' + close;
  }

  function pattern_standard(scene, grade, kids, surname, extra) {
    var open = openingByScene(scene);
    var name = surname || '○○';
    var who  = gradeAndKids(grade, kids);
    var body = '子どもは家では元気に過ごしております。学校（園・教室）でも先生や周りの皆さまに支えていただき、感謝しております。';
    var hobby = extra ? '私自身は' + extra + '。少しずつ皆さまとお話できればうれしいです。' : '';
    var close = closingByTone('standard');
    return open + '\n\n' + who + '保護者の' + name + 'と申します。\n' + body + (hobby ? '\n' + hobby : '') + '\n\n' + close;
  }

  function pattern_friendly(scene, grade, kids, surname, extra) {
    var name = surname || '○○';
    var who  = gradeAndKids(grade, kids);
    var open = '皆さまこんにちは！';
    var intro = who + '保護者の' + name + 'です。';
    var hobby = extra
      ? '最近のひそかなマイブームは「' + extra + '」です。同じ趣味の方がいたらぜひ声をかけてください。'
      : '同じ学年の保護者として、これから色々お話できたらうれしいです。';
    var middle = (scene === 'class' || scene === 'lesson')
      ? '日頃の様子や情報交換、気軽にできる場になればと思っています。'
      : '行事ごとに顔を合わせる仲間として、よろしくお願いします。';
    var close = closingByTone('friendly');
    return open + '\n' + intro + '\n\n' + hobby + '\n' + middle + '\n\n' + close;
  }

  function gen() {
    var scene   = document.getElementById('scene').value;
    var grade   = document.getElementById('grade').value;
    var kids    = document.getElementById('kids').value;
    var surname = (document.getElementById('surname').value || '').trim();
    var extra   = (document.getElementById('extra').value || '').trim();

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        scene: scene, grade: grade, kids: kids, surname: surname, extra: extra
      }));
    } catch(e) {}

    var sceneLabel = SCENE_LABEL[scene] || '';
    var pa = pattern_humble(scene, grade, kids, surname);
    var pb = pattern_standard(scene, grade, kids, surname, extra);
    var pc = pattern_friendly(scene, grade, kids, surname, extra);

    var out = document.getElementById('outputs');
    out.innerHTML = '';
    out.appendChild(makeCard('A', '控えめ・短めパターン（' + sceneLabel + '向け）', pa));
    out.appendChild(makeCard('B', 'スタンダードパターン', pb));
    out.appendChild(makeCard('C', '親しみ・話題提供パターン', pc));

    // スクロール
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function makeCard(label, title, text) {
    var wrap = document.createElement('div');
    wrap.className = 'output-card';

    var lab = document.createElement('p');
    lab.className = 'pattern-label';
    lab.textContent = 'パターン ' + label;
    wrap.appendChild(lab);

    var ti = document.createElement('p');
    ti.className = 'pattern-title';
    ti.textContent = title;
    wrap.appendChild(ti);

    var ta = document.createElement('textarea');
    ta.value = text;
    ta.readOnly = false;
    wrap.appendChild(ta);

    var btn = document.createElement('button');
    btn.className = 'btn-copy';
    btn.type = 'button';
    btn.textContent = '📋 コピーする';
    btn.addEventListener('click', function() {
      copyText(ta.value, btn);
    });
    wrap.appendChild(btn);

    return wrap;
  }

  function copyText(text, btn) {
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = '✓ コピーしました';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.textContent = '📋 コピーする';
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function() { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    cb();
  }

  // 復元
  (function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.scene)   document.getElementById('scene').value   = d.scene;
      if (d.grade)   document.getElementById('grade').value   = d.grade;
      if (d.kids)    document.getElementById('kids').value    = d.kids;
      if (d.surname) document.getElementById('surname').value = d.surname;
      if (d.extra)   document.getElementById('extra').value   = d.extra;
    } catch(e) {}
  })();
  </script>
