<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダム話題ジェネレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>ランダム話題ジェネレーター</h1>
    <p class="subtitle">会話のネタに困ったときに使おう</p>

    <div class="category-filter">
      <label for="category">カテゴリ</label>
      <select id="category">
        <option value="all">すべて</option>
        <option value="日常">日常</option>
        <option value="趣味">趣味</option>
        <option value="仕事">仕事</option>
        <option value="旅行">旅行</option>
        <option value="食べ物">食べ物</option>
        <option value="季節">季節</option>
      </select>
    </div>

    <div class="topic-card" id="topicCard">
      <p class="topic-text" id="topicText">ボタンを押して話題を生成しよう</p>
      <span class="topic-category" id="topicCategory"></span>
    </div>

    <div class="buttons">
      <button class="btn-generate" id="generateBtn">話題を生成</button>
      <button class="btn-favorite" id="favoriteBtn" disabled>⭐ お気に入り追加</button>
    </div>

    <div class="favorites-section">
      <h2>お気に入り <span class="count" id="favCount">0</span></h2>
      <ul class="favorites-list" id="favoritesList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
