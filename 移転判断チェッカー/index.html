<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移転判断チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 区切り線 ── */
    .section-sep {
      max-width: 600px; margin: 0 auto 1rem;
      border: none; border-top: 1px dashed var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 区切りタイトル ── */
    .section-label {
      max-width: 600px; margin: 0 auto 0.5rem;
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; padding: 0 0.2rem;
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>移転判断チェッカー</h1>
    <p class="subtitle">値上げ後家賃 vs 移転コスト＋新家賃を比較して「移転か残留か」を即判定</p>
  </header>

  <!-- 現店舗 -->
  <p class="section-label">▼ 現店舗</p>
  <div class="card">
    <p class="card-title">現店舗の家賃</p>
    <div class="field">
      <label for="current">現在の月額家賃（円）</label>
      <input type="number" id="current" placeholder="例: 150000" min="0">
      <p class="hint">現在支払っている家賃</p>
    </div>
    <div class="field">
      <label for="raised">値上げ後の月額家賃（円）</label>
      <input type="number" id="raised" placeholder="例: 180000" min="0">
      <p class="hint">家主から提示された新家賃</p>
    </div>
  </div>

  <!-- 移転 -->
  <p class="section-label">▼ 移転した場合</p>
  <div class="card">
    <p class="card-title">移転コスト・新店舗</p>
    <div class="field">
      <label for="moveCost">移転初期コスト（円）</label>
      <input type="number" id="moveCost" placeholder="例: 1000000" min="0">
      <p class="hint">敷金・礼金・内装工事・引越し費用など合計</p>
    </div>
    <div class="field">
      <label for="newRent">新店舗の月額家賃（円）</label>
      <input type="number" id="newRent" placeholder="例: 140000" min="0">
      <p class="hint">移転先として検討している物件の家賃</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">移転か残留か 判定する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳・詳細</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEYS = ['current', 'raised', 'moveCost', 'newRent'];

  // localStorage 読み込み
  (function() {
    KEYS.forEach(function(k) {
      var v = localStorage.getItem('iten_' + k);
      if (v !== null) document.getElementById(k).value = v;
    });
  })();

  function calc() {
    var current  = parseFloat(document.getElementById('current').value);
    var raised   = parseFloat(document.getElementById('raised').value);
    var moveCost = parseFloat(document.getElementById('moveCost').value);
    var newRent  = parseFloat(document.getElementById('newRent').value);

    if ([current, raised, moveCost, newRent].some(isNaN)) {
      showErr('すべての項目を入力してください');
      return;
    }

    // localStorage 保存
    KEYS.forEach(function(k) {
      localStorage.setItem('iten_' + k, document.getElementById(k).value);
    });

    var monthlyDiff = raised - newRent; // 移転した場合の毎月の節約額
    var raisedDiff  = raised - current; // 値上げ幅（月額）

    var rows = [
      ['現在の月額家賃',     fmt(current)  + ' 円'],
      ['値上げ後の月額家賃', fmt(raised)   + ' 円'],
      ['値上げ幅（月額）',   '+' + fmt(raisedDiff) + ' 円'],
      ['移転初期コスト',     fmt(moveCost) + ' 円'],
      ['新店舗の月額家賃',   fmt(newRent)  + ' 円'],
    ];

    if (monthlyDiff > 0) {
      // 移転が有利な可能性あり
      var breakEven = moveCost / monthlyDiff; // 損益分岐月数
      var breakEvenYear = (breakEven / 12).toFixed(1);

      rows.push(['月額節約額（移転後）', fmt(monthlyDiff) + ' 円/月', true]);
      rows.push(['損益分岐点', Math.ceil(breakEven) + ' ヶ月（' + breakEvenYear + ' 年）', true]);

      if (breakEven <= 24) {
        showResult('ok',
          '移転推奨',
          Math.ceil(breakEven) + 'ヶ月（' + breakEvenYear + '年）で元が取れます。\n月' + fmt(monthlyDiff) + '円の節約になります。'
        );
      } else if (breakEven <= 48) {
        showResult('warn',
          '移転検討',
          '元を取るまで' + Math.ceil(breakEven) + 'ヶ月かかります。\n長期入居予定なら移転も選択肢です。'
        );
      } else {
        showResult('warn',
          '慎重に検討',
          '損益分岐まで' + Math.ceil(breakEven) + 'ヶ月（' + breakEvenYear + '年）。\n移転コスト回収に時間がかかります。'
        );
      }
    } else if (monthlyDiff === 0) {
      rows.push(['月額差', '±0 円']);
      showResult('warn',
        '家賃は同額',
        '新旧家賃が同額のため移転コスト分だけ損になります。\n他の条件（立地・設備など）で判断してください。'
      );
    } else {
      // 新家賃 >= 値上げ後家賃
      rows.push(['新家賃の割高額', fmt(-monthlyDiff) + ' 円/月 高い', true]);
      showResult('ng',
        '残留推奨',
        '新店舗の家賃が値上げ後より月' + fmt(-monthlyDiff) + '円高くなります。\n移転コストも含めると残留が得策です。'
      );
    }

    showDetail(rows);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
