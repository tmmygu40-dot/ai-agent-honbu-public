<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="電気代が気になるあなたへ。節電に関する10問のクイズに答えて、あなたの節電サバイバル力をチェック!正解数に応じて称号も付きます。">
  <title>節電サバイバルクイズ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── クイズ専用スタイル ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1.2rem;
      font-size: 0.82rem; color: var(--text-sub); font-weight: 600;
    }
    .progress-track {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin-top: 0.4rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s;
    }
    .quiz-question {
      font-size: 1rem; font-weight: 700; line-height: 1.5; margin-bottom: 1.2rem;
    }
    .quiz-choices { list-style: none; }
    .quiz-choices li {
      padding: 0.85rem 1rem; margin-bottom: 0.6rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer; font-size: 0.95rem; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quiz-choices li:hover { border-color: var(--accent); background: var(--accent-light); }
    .quiz-choices li.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700; cursor: default;
    }
    .quiz-choices li.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng); font-weight: 700; cursor: default;
    }
    .quiz-choices li.disabled { pointer-events: none; opacity: 0.5; }
    .quiz-explanation {
      display: none; margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-radius: 10px;
      font-size: 0.88rem; line-height: 1.6; color: var(--text);
    }
    .quiz-explanation strong { color: var(--accent); }
    .btn-next {
      display: none; width: 100%; max-width: 600px;
      margin: 0.8rem auto 0; padding: 0.85rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .highscore-line {
      font-size: 0.82rem; color: var(--text-sub); margin-top: 0.6rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>⚡ 節電サバイバルクイズ</h1>
    <p class="subtitle">電気代が気になるあなたへ。10問のクイズで節電力をチェックしよう!</p>
  </header>

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="card" style="text-align:center;">
      <p style="font-size:3rem;margin-bottom:0.5rem;">⚡</p>
      <p style="font-size:1.05rem;font-weight:700;margin-bottom:0.8rem;">電気代高騰の時代を生き抜け!</p>
      <p style="font-size:0.88rem;color:var(--text-sub);line-height:1.6;margin-bottom:0.3rem;">全20問からランダム10問を出題。<br>あなたの節電サバイバル力を診断します。</p>
      <p class="highscore-line" id="hs-start"></p>
    </div>
    <button class="btn-calc" onclick="startQuiz()">クイズをはじめる</button>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz-screen" style="display:none;">
    <div class="progress-bar">
      <span id="prog-text">第 1 問 / 10問</span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="card" id="quiz-card">
      <p class="quiz-question" id="q-text"></p>
      <ul class="quiz-choices" id="q-choices"></ul>
      <div class="quiz-explanation" id="q-explain"></div>
    </div>
    <button class="btn-next no-print" id="btn-next" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" style="display:none;">
    <div class="result-card" id="result">
      <p class="result-label">あなたの節電力</p>
      <p class="result-value" id="rv">—</p>
      <p class="result-eval" id="re"></p>
      <p class="result-note" id="rn"></p>
      <p class="highscore-line" id="hs-result"></p>
    </div>

    <div class="card" id="detail">
      <p class="card-title">回答の振り返り</p>
      <div id="review-list"></div>
    </div>

    <button class="btn-calc no-print" onclick="startQuiz()">もう一度挑戦する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、経済産業省・資源エネルギー庁の省エネ関連資料や、信頼できる公開データを参考に、目安として作成しています。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── クイズデータ（20問プール） ── */
  var QUESTIONS = [
    {
      q: '家庭の消費電力で最も大きな割合を占める家電は？',
      c: ['エアコン', '冷蔵庫', '照明', 'テレビ'],
      a: 0,
      e: 'エアコンは家庭の消費電力の約25〜30%を占め、最大の電力消費源です。設定温度を1℃変えるだけで約10%の節電効果があります。'
    },
    {
      q: '冷蔵庫の設定温度を「強」から「中」に変えると、年間でおよそいくら節約できる？',
      c: ['約500円', '約1,500円', '約3,000円', '約5,000円'],
      a: 1,
      e: '冷蔵庫の設定を「強」から「中」に変えると年間約1,500円の節約になります。庫内の詰めすぎを避けるとさらに効果アップ。'
    },
    {
      q: 'エアコンの冷房で最も節電効果が高い行動は？',
      c: ['こまめにON/OFFする', 'フィルターを月1回掃除する', '扇風機と併用する', 'カーテンを閉める'],
      a: 1,
      e: 'フィルターが目詰まりすると消費電力が約5〜15%増加します。月1回の掃除が最もコスパの良い節電行動です。'
    },
    {
      q: '待機電力は家庭の電力消費の何%程度を占める？',
      c: ['約1%', '約5%', '約10%', '約20%'],
      a: 1,
      e: '待機電力は家庭の消費電力の約5〜6%を占めます。使わない家電のコンセントを抜くだけで年間数千円の節約に。'
    },
    {
      q: 'LED電球は白熱電球と比べて消費電力がどのくらい少ない？',
      c: ['約30%少ない', '約50%少ない', '約70%少ない', '約85%少ない'],
      a: 3,
      e: 'LED電球は白熱電球の約85%も消費電力が少なく、寿命も約40倍。まだ交換していない場所があれば最優先で切り替えましょう。'
    },
    {
      q: 'テレビの節電で効果的なのは？',
      c: ['画面を暗くする', '音量を下げる', '録画して倍速で見る', '字幕をつけて音を消す'],
      a: 0,
      e: '画面の明るさを下げると消費電力が約20〜30%削減できます。「省エネモード」があれば自動で調整してくれます。'
    },
    {
      q: '電気料金の「再エネ賦課金」とは何？',
      c: ['原発の廃炉費用', '再生可能エネルギー普及のための負担金', '送電線の維持費', '電力会社の利益'],
      a: 1,
      e: '再エネ賦課金は太陽光・風力などの再生可能エネルギーの買取費用を、電気の使用量に応じて利用者が負担する仕組みです。'
    },
    {
      q: '洗濯機の電気代を最も節約できる使い方は？',
      c: ['毎日少量ずつ洗う', 'まとめ洗いする', 'お湯で洗う', '手洗いにする'],
      a: 1,
      e: '洗濯機は1回の運転で消費電力がほぼ一定。まとめ洗いで回数を減らすのが最も効率的です。容量の8割が目安。'
    },
    {
      q: '電気ポットとケトル、少量のお湯を沸かすとき節電になるのは？',
      c: ['電気ポット', '電気ケトル', 'どちらも同じ', 'ガスコンロが最も安い'],
      a: 1,
      e: '少量なら電気ケトルが圧倒的に省エネ。電気ポットは保温に電力を使い続けるため、使う分だけ沸かすケトルが節電向きです。'
    },
    {
      q: '夏のエアコン冷房の推奨設定温度は？',
      c: ['24℃', '26℃', '28℃', '30℃'],
      a: 2,
      e: '環境省が推奨する冷房の設定温度は28℃。ただし室温28℃が目安で、扇風機併用で体感温度を下げると快適に過ごせます。'
    },
    {
      q: '冬の暖房で最も電気代が安い器具は？',
      c: ['エアコン', '電気ストーブ', 'こたつ', 'オイルヒーター'],
      a: 2,
      e: 'こたつは局所暖房のため消費電力が非常に小さく、1時間あたり約2〜5円。エアコンの全体暖房と併用がコスパ最強です。'
    },
    {
      q: '炊飯器の保温を12時間続けた場合と、冷蔵保存して電子レンジで温め直した場合、どちらが省エネ？',
      c: ['保温の方が省エネ', 'レンジ温め直しの方が省エネ', 'ほぼ同じ', '炊飯器の機種による'],
      a: 1,
      e: '保温は1時間あたり約15〜20Whの電力を使い続けます。4時間以上の保温なら、冷蔵してレンジで温め直す方が省エネです。'
    },
    {
      q: '食洗機と手洗い、実は電気代を含めたトータルコストが安いのは？',
      c: ['手洗い', '食洗機', 'ほぼ同じ', '食器の量による'],
      a: 1,
      e: '食洗機は少ない水量で高温洗浄するため、手洗いよりも水道代＋ガス代の節約効果が大きく、トータルで年間約8,000円お得です。'
    },
    {
      q: '電力会社の料金プランで「時間帯別料金」のメリットは？',
      c: ['常に料金が安い', '夜間の電気代が安くなる', '基本料金がゼロになる', '再エネ賦課金が免除される'],
      a: 1,
      e: '時間帯別プランは夜間（23時〜7時など）の電気代が割安。洗濯・食洗機・充電を夜間にまとめると効果的です。'
    },
    {
      q: 'エアコンの室外機周りの工夫で節電効果があるのは？',
      c: ['室外機を囲いで隠す', '室外機の前に物を置かない', '室外機に水をかける', '室外機の上に植物を置く'],
      a: 1,
      e: '室外機の前に物があると排熱がこもり、効率が大幅に低下します。50cm以上のスペースを確保すると消費電力を抑えられます。'
    },
    {
      q: '電気代の明細に書いてある「燃料費調整額」とは？',
      c: ['ガソリン代の補助金', '火力発電の燃料価格変動を反映した調整金', '省エネ機器の補助金', '電力会社の設備投資費'],
      a: 1,
      e: '燃料費調整額は、石油・LNG・石炭の価格変動を電気料金に反映する仕組み。燃料高騰時は電気代が上がる原因になります。'
    },
    {
      q: 'トイレの温水便座で最も電力を消費する機能は？',
      c: ['温水洗浄', '便座の暖房', '脱臭', '自動開閉'],
      a: 1,
      e: '便座の暖房は24時間通電するため年間の消費電力が大きくなります。季節に応じてOFFにすると年間約1,000〜2,000円の節約に。'
    },
    {
      q: '冷蔵庫を壁からどのくらい離すと効率が良い？',
      c: ['密着でOK', '1cm以上', '5cm以上', '10cm以上'],
      a: 2,
      e: '冷蔵庫は放熱のため背面と側面に5cm以上のスペースが必要。壁に密着すると放熱できず消費電力が約10〜20%増加します。'
    },
    {
      q: '窓の断熱対策で最もコスパが良い方法は？',
      c: ['二重窓にリフォーム', '断熱カーテンに変える', 'プチプチ(緩衝材)を貼る', '窓を小さくリフォーム'],
      a: 2,
      e: 'プチプチ（緩衝材）を窓に貼ると空気層ができて断熱効果あり。費用は数百円で、冬の暖房効率が体感でわかるほど改善します。'
    },
    {
      q: '電気代が最も高くなりやすい月は？',
      c: ['7月（冷房開始）', '8月（猛暑ピーク）', '1月（暖房フル稼働）', '12月（年末年始）'],
      a: 2,
      e: '暖房は冷房よりも外気温との差が大きいため電力消費が多くなります。1〜2月が年間で最も電気代が高くなる傾向があります。'
    }
  ];

  var TOTAL = 10;
  var quiz = [];
  var current = 0;
  var score = 0;
  var answers = [];
  var LS_KEY = 'setsuden_quiz_highscore';

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function getHighScore() {
    try { return parseInt(localStorage.getItem(LS_KEY)) || 0; } catch(e) { return 0; }
  }
  function setHighScore(s) {
    try { localStorage.setItem(LS_KEY, s); } catch(e) {}
  }

  function showHS() {
    var hs = getHighScore();
    var el = document.getElementById('hs-start');
    if (hs > 0) el.textContent = 'ハイスコア: ' + hs + ' / ' + TOTAL + '問正解';
    else el.textContent = '';
  }

  function startQuiz() {
    quiz = shuffle(QUESTIONS.slice()).slice(0, TOTAL);
    current = 0; score = 0; answers = [];
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = quiz[current];
    document.getElementById('prog-text').textContent = '第 ' + (current + 1) + ' 問 / ' + TOTAL + '問';
    document.getElementById('prog-fill').style.width = ((current / TOTAL) * 100) + '%';
    document.getElementById('q-text').textContent = 'Q' + (current + 1) + '. ' + q.q;
    var ul = document.getElementById('q-choices');
    ul.innerHTML = '';
    for (var i = 0; i < q.c.length; i++) {
      var li = document.createElement('li');
      li.textContent = q.c[i];
      li.setAttribute('data-idx', i);
      li.onclick = selectAnswer;
      ul.appendChild(li);
    }
    document.getElementById('q-explain').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
  }

  function selectAnswer(e) {
    var idx = parseInt(e.currentTarget.getAttribute('data-idx'));
    var q = quiz[current];
    var correct = idx === q.a;
    if (correct) score++;
    answers.push({ q: q, selected: idx, correct: correct });

    var lis = document.getElementById('q-choices').children;
    for (var i = 0; i < lis.length; i++) {
      if (i === q.a) lis[i].className = 'correct';
      else if (i === idx && !correct) lis[i].className = 'wrong';
      else lis[i].className = 'disabled';
    }

    var exp = document.getElementById('q-explain');
    exp.innerHTML = '<strong>' + (correct ? '⭕ 正解!' : '❌ 不正解…正解は「' + q.c[q.a] + '」') + '</strong><br>' + q.e;
    exp.style.display = 'block';

    var btn = document.getElementById('btn-next');
    btn.textContent = current < TOTAL - 1 ? '次の問題へ' : '結果を見る';
    btn.style.display = 'block';
  }

  function nextQuestion() {
    current++;
    if (current < TOTAL) {
      showQuestion();
    } else {
      showFinalResult();
    }
  }

  function showFinalResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    var pct = (score / TOTAL) * 100;
    var level, title, msg;
    if (pct >= 80) {
      level = 'ok'; title = '節電マスター';
      msg = '素晴らしい!あなたは電気代高騰時代を余裕で生き抜けます。';
    } else if (pct >= 50) {
      level = 'warn'; title = '節電見習い';
      msg = 'まずまずの知識です。あと少しの工夫で電気代をもっと抑えられます。';
    } else {
      level = 'ng'; title = '電気代ピンチ!';
      msg = '節電の知識を身につけて、電気代高騰の波を乗り越えましょう!';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + TOTAL + ' 問正解';
    document.getElementById('re').textContent = '称号: ' + title;
    document.getElementById('rn').textContent = msg;

    var hs = getHighScore();
    var hsEl = document.getElementById('hs-result');
    if (score > hs) {
      setHighScore(score);
      hsEl.textContent = '🎉 ハイスコア更新!';
    } else if (hs > 0) {
      hsEl.textContent = 'ハイスコア: ' + hs + ' / ' + TOTAL + '問正解';
    } else {
      hsEl.textContent = '';
    }

    var rev = document.getElementById('review-list');
    rev.innerHTML = answers.map(function(a, i) {
      return '<div style="padding:0.7rem 0;border-bottom:1px solid var(--border);">'
        + '<p style="font-size:0.88rem;font-weight:700;margin-bottom:0.3rem;">'
        + (a.correct ? '⭕' : '❌') + ' Q' + (i + 1) + '. ' + a.q.q + '</p>'
        + '<p style="font-size:0.82rem;color:var(--text-sub);line-height:1.5;">'
        + 'あなたの回答: ' + a.q.c[a.selected]
        + (a.correct ? '' : ' → 正解: ' + a.q.c[a.q.a])
        + '</p></div>';
    }).join('');
  }

  /* 初期表示 */
  showHS();
  </script>
