<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送料影響チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 入力グリッド ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }
    @media (max-width: 400px) {
      .input-grid { grid-template-columns: 1fr; }
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 比較テーブル ── */
    .compare-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
    }
    .compare-table th {
      padding: 0.5rem 0.4rem; font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub); border-bottom: 2px solid var(--border);
      text-align: right;
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table td {
      padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border);
      color: var(--text-sub); text-align: right;
    }
    .compare-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .hl td { font-weight: 700; font-size: 1.0rem; }
    .compare-table .hl td:not(:first-child) { color: var(--accent); }
    .text-ok   { color: var(--ok) !important; font-weight: 700 !important; }
    .text-ng   { color: var(--ng) !important; font-weight: 700 !important; }
    .text-warn { color: var(--warn) !important; font-weight: 700 !important; }

    /* ── 最低販売価格カード ── */
    .min-price-card {
      display: none;
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .min-price-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.4rem; }
    .min-price-value { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
    .min-price-note { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.4rem; line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>送料影響チェッカー</h1>
    <p class="subtitle">送料改定後の利益変化と最低販売価格をすぐ確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報を入力</p>
    <div class="input-grid">
      <div class="field">
        <label for="cost">仕入れ価格（円）</label>
        <input type="number" id="cost" placeholder="例: 500" min="0" inputmode="numeric">
      </div>
      <div class="field">
        <label for="price">販売価格（円）</label>
        <input type="number" id="price" placeholder="例: 1500" min="0" inputmode="numeric">
      </div>
      <div class="field">
        <label for="ship_old">現行送料（円）</label>
        <input type="number" id="ship_old" placeholder="例: 600" min="0" inputmode="numeric">
      </div>
      <div class="field">
        <label for="ship_new">改定後送料（円）</label>
        <input type="number" id="ship_new" placeholder="例: 800" min="0" inputmode="numeric">
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">利益への影響を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">改定後の利益</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 最低販売価格カード -->
  <div class="min-price-card" id="minPriceCard">
    <p class="min-price-label">最低販売価格（赤字にならない下限）</p>
    <p class="min-price-value" id="minPriceVal">—</p>
    <p class="min-price-note" id="minPriceNote"></p>
  </div>

  <!-- 比較内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">改定前後の比較</p>
    <table class="compare-table">
      <thead>
        <tr>
          <th>項目</th>
          <th>改定前</th>
          <th>改定後</th>
          <th>差額</th>
        </tr>
      </thead>
      <tbody id="cmpBody"></tbody>
    </table>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="breakdown" style="display:none">
    <p class="card-title">改定後の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEYS = ['cost','price','ship_old','ship_new'];

  // localStorage から復元
  (function() {
    KEYS.forEach(function(k) {
      var v = localStorage.getItem('shipping_' + k);
      if (v !== null) document.getElementById(k).value = v;
    });
  })();

  // 入力変更時に保存
  KEYS.forEach(function(k) {
    document.getElementById(k).addEventListener('input', function() {
      localStorage.setItem('shipping_' + k, this.value);
    });
    // Enterキーで計算
    document.getElementById(k).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') calc();
    });
  });

  function calc() {
    var cost     = parseFloat(document.getElementById('cost').value);
    var price    = parseFloat(document.getElementById('price').value);
    var shipOld  = parseFloat(document.getElementById('ship_old').value);
    var shipNew  = parseFloat(document.getElementById('ship_new').value);

    if ([cost, price, shipOld, shipNew].some(isNaN)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (price <= 0) {
      showErr('販売価格は0より大きい値を入力してください');
      return;
    }

    // 計算
    var profitOld  = price - cost - shipOld;
    var profitNew  = price - cost - shipNew;
    var ratioOld   = profitOld / price * 100;
    var ratioNew   = profitNew / price * 100;
    var diff       = profitNew - profitOld;           // 利益変化額（送料差の逆）
    var shipDiff   = shipNew - shipOld;               // 送料増加額
    var minPrice   = cost + shipNew;                  // 利益0円の下限
    var minPriceMargin = price - minPrice;            // 現行売価との余裕

    // 判定
    var level = profitNew < 0 ? 'ng' : ratioNew < 10 ? 'warn' : 'ok';
    var msg   = level === 'ok'   ? '改定後も十分な利益が確保できています'
              : level === 'warn' ? '利益率が低下しています。値上げを検討してください'
              : '改定後は赤字になります。値上げまたはコスト削減が必要です';

    // 結論カード
    showResult(level, fmt(profitNew) + ' 円', msg + '（利益率 ' + ratioNew.toFixed(1) + '%）');

    // 最低販売価格カード
    var mpCard = document.getElementById('minPriceCard');
    mpCard.style.display = '';
    document.getElementById('minPriceVal').textContent = fmt(minPrice) + ' 円';
    var npNote = '仕入れ価格（' + fmt(cost) + '円）+ 改定後送料（' + fmt(shipNew) + '円）';
    if (minPriceMargin > 0) {
      npNote += '\n現行売価との差額：+' + fmt(minPriceMargin) + '円の余裕あり';
    } else if (minPriceMargin === 0) {
      npNote += '\n現行売価はちょうど損益分岐点です';
    } else {
      npNote += '\n現行売価は最低販売価格を ' + fmt(-minPriceMargin) + '円 下回っています（赤字）';
    }
    document.getElementById('minPriceNote').textContent = npNote;

    // 比較テーブル
    var rows = [
      { label: '送料', old: shipOld, nw: shipNew, diff: shipDiff, isCost: true },
      { label: '利益額', old: profitOld, nw: profitNew, diff: diff, hl: true },
      { label: '利益率', old: ratioOld.toFixed(1) + '%', nw: ratioNew.toFixed(1) + '%',
        diff: (diff / price * 100).toFixed(1) + 'pt', hl: true, isStr: true },
    ];
    document.getElementById('cmpBody').innerHTML = rows.map(function(r) {
      var cls = r.hl ? ' class="hl"' : '';
      var diffCls = '';
      if (!r.isStr) {
        diffCls = r.isCost
          ? (r.diff > 0 ? 'text-ng' : r.diff < 0 ? 'text-ok' : '')
          : (r.diff > 0 ? 'text-ok' : r.diff < 0 ? 'text-ng' : '');
      }
      var oldStr = r.isStr ? r.old : fmt(r.old) + '円';
      var nwStr  = r.isStr ? r.nw  : fmt(r.nw)  + '円';
      var diffStr = r.isStr ? (r.diff[0] === '-' ? '' : '+') + r.diff
                            : (r.diff >= 0 ? '+' : '') + fmt(r.diff) + '円';
      return '<tr' + cls + '>'
           + '<td>' + r.label + '</td>'
           + '<td>' + oldStr + '</td>'
           + '<td>' + nwStr + '</td>'
           + '<td class="' + diffCls + '">' + diffStr + '</td>'
           + '</tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    // 内訳
    document.getElementById('db').innerHTML = [
      ['販売価格', fmt(price) + ' 円'],
      ['仕入れ価格', '− ' + fmt(cost) + ' 円'],
      ['改定後送料', '− ' + fmt(shipNew) + ' 円'],
      ['改定後利益', fmt(profitNew) + ' 円'],
    ].map(function(r) {
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('breakdown').style.display = '';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('breakdown').style.display = 'none';
    document.getElementById('minPriceCard').style.display = 'none';
  }
  function fmt(n) {
    return Math.round(n).toLocaleString('ja-JP');
  }
  </script>

<script src="../fav-widget.js"></script>
<script src="../share-widget.js"></script>
</body>
</html>
