<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お手伝いポイント管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 お手伝いポイント</h1>
    </header>

    <!-- ご褒美目標 -->
    <section class="reward-section">
      <div class="reward-header">
        <h2>🎁 ご褒美目標</h2>
        <button id="editRewardBtn" class="btn-edit">編集</button>
      </div>
      <div id="rewardDisplay" class="reward-display">
        <div class="reward-name" id="rewardName">ご褒美を設定してください</div>
        <div class="point-summary">
          <span class="current-points" id="currentPoints">0</span>
          <span class="divider"> / </span>
          <span class="target-points" id="targetPoints">100</span>
          <span class="unit"> pt</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">0%</div>
        <div id="achievedBanner" class="achieved-banner hidden">🎉 達成！おめでとう！</div>
      </div>
      <div id="rewardForm" class="reward-form hidden">
        <input type="text" id="rewardNameInput" placeholder="ご褒美の内容（例：ゲーム1時間）" maxlength="40">
        <input type="number" id="rewardPointInput" placeholder="目標ポイント" min="1" max="99999" value="100">
        <button id="saveRewardBtn" class="btn-primary">保存</button>
      </div>
    </section>

    <!-- お手伝い登録 -->
    <section class="input-section">
      <h2>✏️ お手伝いを登録</h2>
      <div class="input-row">
        <input type="text" id="taskNameInput" placeholder="お手伝いの内容（例：食器洗い）" maxlength="40">
        <input type="number" id="taskPointInput" placeholder="pt" min="1" max="999" value="10">
        <button id="addTaskBtn" class="btn-primary">追加</button>
      </div>
    </section>

    <!-- 履歴一覧 -->
    <section class="history-section">
      <div class="history-header">
        <h2>📋 お手伝い履歴</h2>
        <button id="resetBtn" class="btn-danger">リセット</button>
      </div>
      <ul id="taskList" class="task-list">
        <li class="empty-msg">まだ記録がありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
