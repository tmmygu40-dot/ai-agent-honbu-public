{"@context":"https://schema.org","@type":"SoftwareApplication","name":"子どもお小遣い管理","description":"子どもお小遣い管理。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%AD%90%E3%81%A9%E3%82%82%E3%81%8A%E5%B0%8F%E9%81%A3%E3%81%84%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>

<body>
  <div class="container">
    <h1>子どもお小遣い管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <div class="balance-card">
      <div class="balance-label">現在の残高</div>
      <div class="balance-amount" id="balance">¥0</div>
    </div>

    <div class="pace-card" id="pace-card">
      <div class="pace-label">今月の使用額</div>
      <div class="pace-info" id="pace-info">¥0</div>
    </div>

    <div class="form-card">
      <h2>収支を入力</h2>
      <div class="form-group">
        <label>種別</label>
        <div class="type-buttons">
          <button class="type-btn active" id="btn-income" onclick="selectType('income')">収入</button>
          <button class="type-btn" id="btn-expense" onclick="selectType('expense')">支出</button>
        </div>
      </div>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：500" min="1">
      </div>
      <div class="form-group">
        <label for="note">用途</label>
        <input type="text" id="note" placeholder="例：おやつ代">
      </div>
      <button class="add-btn" onclick="addEntry()">追加する</button>
    </div>

    <div class="history-card">
      <h2>履歴</h2>
      <ul class="history-list" id="history-list">
        <li class="empty-msg" id="empty-msg">履歴がありません</li>
      </ul>
    </div>
  </div>
  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
