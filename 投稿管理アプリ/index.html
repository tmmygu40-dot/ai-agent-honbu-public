<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>投稿管理アプリ</h1>

    <!-- カレンダーナビ -->
    <div class="calendar-nav">
      <button id="prevMonth">&#8249;</button>
      <span id="currentMonth"></span>
      <button id="nextMonth">&#8250;</button>
    </div>

    <!-- カレンダー -->
    <div class="calendar" id="calendar"></div>

    <!-- 予定一覧 -->
    <div class="post-list" id="postList">
      <h2 id="listTitle">選択した日の投稿予定</h2>
      <div id="posts"></div>
    </div>
  </div>

  <!-- 追加モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">投稿予定を追加</h3>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>SNS種別</label>
        <select id="inputSNS">
          <option value="Twitter/X">Twitter/X</option>
          <option value="Instagram">Instagram</option>
          <option value="Facebook">Facebook</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>投稿内容</label>
        <textarea id="inputContent" placeholder="投稿内容を入力..." rows="4"></textarea>
      </div>
      <div class="modal-buttons">
        <button id="cancelBtn" class="btn-cancel">キャンセル</button>
        <button id="saveBtn" class="btn-save">追加</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
