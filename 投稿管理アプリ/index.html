<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

{"@context":"https://schema.org","@type":"SoftwareApplication","name":"投稿管理アプリ","description":"投稿管理アプリ。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E6%8A%95%E7%A8%BF%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>投稿管理アプリ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <!-- カレンダーナビ -->
    <div class="calendar-nav">
      <button id="prevMonth">&#8249;</button>
      <span id="currentMonth"></span>
      <button id="nextMonth">&#8250;</button>
    </div>

    <!-- カレンダー -->
    <div class="calendar" id="calendar"></div>

    <!-- 予定一覧 -->
    <div class="post-list" id="postList">
      <h2 id="listTitle">選択した日の投稿予定</h2>
      <div id="posts"></div>
    </div>
  </div>

  <!-- 追加モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">投稿予定を追加</h3>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>SNS種別</label>
        <select id="inputSNS">
          <option value="Twitter/X">Twitter/X</option>
          <option value="Instagram">Instagram</option>
          <option value="Facebook">Facebook</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>投稿内容</label>
        <textarea id="inputContent" placeholder="投稿内容を入力..." rows="4"></textarea>
      </div>
      <div class="modal-buttons">
        <button id="cancelBtn" class="btn-cancel">キャンセル</button>
        <button id="saveBtn" class="btn-save">追加</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
