<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送別メッセージジェネレーター｜退職・異動する同僚への一言を30秒で</title>
  <meta name="description" content="退職・異動する同僚への送別メッセージを30秒で即生成。相手の関係・理由・トーンを選ぶだけで、寄せ書き・LINE・メールにそのまま使える3パターンを出します。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .msg-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .msg-card .msg-tag {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.55rem; border-radius: 999px;
      margin-bottom: 0.6rem;
    }
    .msg-card .msg-title {
      font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.4;
    }
    .msg-card textarea {
      width: 100%; min-height: 150px; padding: 0.7rem 0.85rem;
      font-size: 0.95rem; line-height: 1.7;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg); color: var(--text); outline: none;
      font-family: inherit; resize: vertical;
    }
    .msg-card textarea:focus { border-color: var(--accent); background: #fff; }
    .btn-copy {
      display: block; margin: 0.7rem 0 0 auto; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem;
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: 10px; color: var(--ng); font-size: 0.9rem; font-weight: 600;
      display: none;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .msg-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>送別メッセージジェネレーター</h1>
    <p class="subtitle">退職・異動する同僚への一言を30秒で。寄せ書き・LINE・メールにそのまま使える3パターン</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="rel">相手との関係</label>
      <select id="rel">
        <option value="上司">上司</option>
        <option value="先輩">先輩</option>
        <option value="同僚" selected>同僚</option>
        <option value="後輩">後輩</option>
        <option value="部下">部下</option>
      </select>
    </div>
    <div class="field">
      <label for="reason">送り出す理由</label>
      <select id="reason">
        <option value="退職" selected>退職</option>
        <option value="異動・転勤">異動・転勤</option>
        <option value="転職">転職</option>
        <option value="独立">独立</option>
        <option value="結婚退職">結婚退職</option>
        <option value="定年退職">定年退職</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="フォーマル" selected>フォーマル（無難・寄せ書き向け）</option>
        <option value="カジュアル">カジュアル（LINE・親しい間柄）</option>
        <option value="感謝重視">感謝重視（しっかり気持ちを伝える）</option>
      </select>
    </div>
    <div class="field">
      <label for="years">一緒に働いた期間</label>
      <select id="years">
        <option value="1年未満">1年未満</option>
        <option value="1〜3年" selected>1〜3年</option>
        <option value="3〜5年">3〜5年</option>
        <option value="5年以上">5年以上</option>
      </select>
    </div>
    <div class="field">
      <label for="memo">ひとことエピソード（任意）</label>
      <input type="text" id="memo" placeholder="例: 新人研修でお世話になりました" maxlength="40">
      <p class="hint">入れると本文に自然に組み込みます。30字程度まで。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">メッセージを生成する</button>

  <div class="err-msg" id="err"></div>

  <!-- 出力エリア -->
  <div id="output"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは送別の場面で使いやすい言い回しを参考に整理しています。生成された文面はそのまま使う／一部だけ使う／好みに合わせて編集する、どれでもOKです。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'farewell-msg-generator-v1';

  // ── 関係に応じた呼びかけ・敬語レベル ──
  var REL_PREFIX = {
    '上司':   { hon: '○○さん',    polite: 'high' },
    '先輩':   { hon: '○○先輩',    polite: 'high' },
    '同僚':   { hon: '○○さん',    polite: 'mid'  },
    '後輩':   { hon: '○○さん',    polite: 'mid'  },
    '部下':   { hon: '○○さん',    polite: 'mid'  }
  };

  // ── 理由ごとの締め表現 ──
  var REASON_PHRASE = {
    '退職':       { now: 'ご退職',     future: '新たなステージ' },
    '異動・転勤': { now: 'ご異動',     future: '新天地' },
    '転職':       { now: 'ご転職',     future: '新しい職場' },
    '独立':       { now: 'ご独立',     future: '新しい挑戦の場' },
    '結婚退職':   { now: 'ご退職・ご結婚', future: '新しい人生' },
    '定年退職':   { now: 'ご定年',     future: 'これからの第二の人生' }
  };

  // ── 期間ニュアンス ──
  var YEAR_NUANCE = {
    '1年未満':  '短い間でしたが',
    '1〜3年':   'この数年間',
    '3〜5年':   '長きにわたり',
    '5年以上':  '本当に長い間'
  };

  function build(rel, reason, tone, years, memo, pattern) {
    var r = REL_PREFIX[rel];
    var rp = REASON_PHRASE[reason];
    var yn = YEAR_NUANCE[years];
    var memoLine = memo
      ? (tone === 'カジュアル' ? '\n' + memo + '、本当に印象に残ってます。'
                                : '\n' + memo + '、今でもよく覚えています。')
      : '';

    if (tone === 'フォーマル') {
      if (pattern === 1) {
        // 定番フォーマル
        return r.hon + '、' + rp.now + 'おめでとうございます。\n' +
               yn + '、本当にお世話になりました。' + memoLine + '\n' +
               rp.future + 'でも、お身体に気をつけて、ますますのご活躍をお祈りしております。\n' +
               '今まで本当にありがとうございました。';
      } else if (pattern === 2) {
        // 感謝強め
        return r.hon + 'へ\n\n' +
               yn + '、ご指導・ご支援をいただき本当にありがとうございました。' + memoLine + '\n' +
               r.hon + 'と一緒に過ごした時間は、私にとってかけがえのない財産です。\n' +
               rp.future + 'でのご活躍を、心より応援しております。';
      } else {
        // 応援強め
        return r.hon + 'の' + rp.now + 'を、心からお祝い申し上げます。\n' +
               yn + 'お世話になりました。' + memoLine + '\n' +
               r.hon + 'なら、' + rp.future + 'でも必ず素晴らしい結果を残されると確信しています。\n' +
               '新たな門出に、心からのエールを送ります。';
      }
    }

    if (tone === 'カジュアル') {
      if (pattern === 1) {
        return r.hon + '、' + rp.now + 'おめでとうございます！\n' +
               yn + '一緒に働けて本当に楽しかったです。' + memoLine + '\n' +
               rp.future + 'でも頑張ってください。\n' +
               'また落ち着いたらご飯でも行きましょう！';
      } else if (pattern === 2) {
        return r.hon + 'へ\n\n' +
               yn + '本当にお世話になりました！' + memoLine + '\n' +
               r.hon + 'がいなくなるの寂しすぎます…。\n' +
               'でも新しい場所での活躍、めちゃくちゃ応援してます！';
      } else {
        return r.hon + '、' + rp.now + 'おつかれさまでした！\n' +
               yn + '本当にありがとうございました。' + memoLine + '\n' +
               '次のステージでもきっと活躍されると思います。\n' +
               'たまに連絡くださいね、またどこかでお会いしましょう！';
      }
    }

    // 感謝重視
    if (pattern === 1) {
      return r.hon + '、' + rp.now + 'おめでとうございます。\n\n' +
             yn + 'たくさんのことを教えていただき、本当にありがとうございました。' + memoLine + '\n' +
             r.hon + 'のもとで働けたことは、私の大切な経験になりました。\n' +
             rp.future + 'でのご活躍を、心より願っております。';
    } else if (pattern === 2) {
      return r.hon + 'へ\n\n' +
             yn + 'お世話になり、心から感謝しています。' + memoLine + '\n' +
             r.hon + 'からいただいた言葉や姿勢は、これからの私の支えです。\n' +
             '本当にありがとうございました。\n' +
             '新しい場所でも、お元気でお過ごしください。';
    } else {
      return r.hon + '、長い間本当にお世話になりました。\n\n' +
             yn + r.hon + 'と過ごせた日々は宝物です。' + memoLine + '\n' +
             rp.future + 'での新しい挑戦を、心から応援しています。\n' +
             '感謝の気持ちを込めて、お礼をお伝えしたく筆を取りました。\n' +
             '本当にありがとうございました。';
    }
  }

  function patternTitle(tone, pattern) {
    if (pattern === 1) return '定番（無難に使える）';
    if (pattern === 2) return '感謝強め（思い出と感謝中心）';
    return '応援強め（次の道への激励）';
  }

  function generate() {
    var rel    = document.getElementById('rel').value;
    var reason = document.getElementById('reason').value;
    var tone   = document.getElementById('tone').value;
    var years  = document.getElementById('years').value;
    var memo   = document.getElementById('memo').value.trim();

    save({rel:rel, reason:reason, tone:tone, years:years, memo:memo});

    document.getElementById('err').style.display = 'none';

    var out = document.getElementById('output');
    out.innerHTML = '';
    for (var p = 1; p <= 3; p++) {
      var msg = build(rel, reason, tone, years, memo, p);
      var card = document.createElement('div');
      card.className = 'msg-card';
      var tag = document.createElement('span');
      tag.className = 'msg-tag';
      tag.textContent = 'パターン' + p;
      var title = document.createElement('p');
      title.className = 'msg-title';
      title.textContent = patternTitle(tone, p);
      var ta = document.createElement('textarea');
      ta.value = msg;
      ta.readOnly = false;
      var btn = document.createElement('button');
      btn.className = 'btn-copy';
      btn.textContent = 'コピー';
      (function(targetTa, button){
        button.addEventListener('click', function(){
          targetTa.select();
          var ok = false;
          try { ok = document.execCommand('copy'); } catch(e) { ok = false; }
          if (!ok && navigator.clipboard) {
            navigator.clipboard.writeText(targetTa.value).then(function(){
              flash(button);
            });
            return;
          }
          flash(button);
        });
      })(ta, btn);
      card.appendChild(tag);
      card.appendChild(title);
      card.appendChild(ta);
      card.appendChild(btn);
      out.appendChild(card);
    }
    out.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function flash(btn) {
    var orig = btn.textContent;
    btn.classList.add('copied');
    btn.textContent = 'コピーしました';
    setTimeout(function(){
      btn.classList.remove('copied');
      btn.textContent = orig;
    }, 1500);
  }

  function save(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.rel)    document.getElementById('rel').value = d.rel;
      if (d.reason) document.getElementById('reason').value = d.reason;
      if (d.tone)   document.getElementById('tone').value = d.tone;
      if (d.years)  document.getElementById('years').value = d.years;
      if (d.memo)   document.getElementById('memo').value = d.memo;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../related-widget.js"></script>
