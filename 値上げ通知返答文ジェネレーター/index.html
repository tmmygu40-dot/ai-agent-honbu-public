<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ通知返答文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 状況選択ボタン */
    .situation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin-bottom: 0;
    }
    .sit-btn {
      padding: 0.75rem 0.5rem;
      font-size: 0.88rem; font-weight: 700;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.3;
    }
    .sit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .sit-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .sit-btn .sit-icon { display: block; font-size: 1.2rem; margin-bottom: 0.2rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結果エリア */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-badge {
      display: inline-block;
      font-size: 0.82rem; font-weight: 700;
      padding: 0.2rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 0.8rem;
    }
    .badge-accept  { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .badge-nego    { background: var(--warn-bg);  color: var(--warn); border: 1px solid var(--warn); }
    .badge-hold    { background: #eff6ff;         color: #1d4ed8;     border: 1px solid #93c5fd; }
    .badge-alt     { background: #f5f3ff;         color: #6d28d9;     border: 1px solid #c4b5fd; }
    .badge-decline { background: var(--ng-bg);    color: var(--ng);   border: 1px solid var(--ng); }

    .result-text {
      width: 100%;
      min-height: 220px;
      padding: 0.9rem;
      font-size: 0.9rem;
      line-height: 1.8;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    .btn-copy {
      display: block; width: 100%;
      margin-top: 0.8rem; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .btn-pdf, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>値上げ通知返答文ジェネレーター</h1>
    <p class="subtitle">状況を選ぶだけで仕入れ先への返答文を即生成</p>
  </header>

  <!-- 状況選択 -->
  <div class="card">
    <p class="card-title">STEP 1｜返答の状況を選ぶ</p>
    <div class="situation-grid">
      <button class="sit-btn" data-sit="accept" onclick="selectSit(this)">
        <span class="sit-icon">✅</span>受け入れる
      </button>
      <button class="sit-btn" data-sit="nego" onclick="selectSit(this)">
        <span class="sit-icon">🤝</span>値引き交渉する
      </button>
      <button class="sit-btn" data-sit="hold" onclick="selectSit(this)">
        <span class="sit-icon">⏸️</span>一時保留にする
      </button>
      <button class="sit-btn" data-sit="alt" onclick="selectSit(this)">
        <span class="sit-icon">🔄</span>代替先を検討する
      </button>
      <button class="sit-btn" style="grid-column: 1 / -1;" data-sit="decline" onclick="selectSit(this)">
        <span class="sit-icon">❌</span>断る（取引縮小・終了）
      </button>
    </div>
  </div>

  <!-- 入力 -->
  <div class="card">
    <p class="card-title">STEP 2｜情報を入力する</p>
    <div class="field">
      <label for="supplier">仕入れ先名（会社名）</label>
      <input type="text" id="supplier" placeholder="例：〇〇商事株式会社">
    </div>
    <div class="field">
      <label for="person">担当者名（省略可）</label>
      <input type="text" id="person" placeholder="例：山田様">
    </div>
    <div class="field">
      <label for="item">商品・品目名</label>
      <input type="text" id="item" placeholder="例：原材料A">
    </div>
    <div class="field">
      <label for="rate">値上げ率（%）</label>
      <input type="number" id="rate" placeholder="例：15" min="0" max="999">
      <p class="hint">「10%の値上げ」なら 10 と入力</p>
    </div>
    <div class="field">
      <label for="myco">自社名</label>
      <input type="text" id="myco" placeholder="例：株式会社〇〇">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">返答文を生成する</button>

  <!-- 結果 -->
  <div class="result-card" id="result">
    <p class="result-label">生成された返答文</p>
    <span class="result-badge" id="badge"></span>
    <textarea class="result-text" id="output" readonly></textarea>
    <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 コピーする</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var selectedSit = '';

  var TEMPLATES = {
    accept: {
      label: '受け入れ',
      badgeClass: 'badge-accept',
      text: function(d) {
        return [
          d.person ? d.supplier + ' ' + d.person + ' 様' : d.supplier + ' ご担当者様',
          '',
          'お世話になっております。' + d.myco + ' でございます。',
          '',
          'このたびは、' + d.item + ' の価格改定についてご連絡いただきありがとうございます。',
          '',
          d.rate + '% の値上げにつきまして、貴社のご事情を拝察し、',
          '誠に恐縮ではございますが、今回の価格改定を受け入れさせていただく方向で検討いたします。',
          '',
          '引き続き、安定したお取引を継続できますよう、何卒よろしくお願い申し上げます。',
          '',
          d.myco,
        ].join('\n');
      }
    },
    nego: {
      label: '値引き交渉',
      badgeClass: 'badge-nego',
      text: function(d) {
        return [
          d.person ? d.supplier + ' ' + d.person + ' 様' : d.supplier + ' ご担当者様',
          '',
          'お世話になっております。' + d.myco + ' でございます。',
          '',
          'このたびは、' + d.item + ' の価格改定（' + d.rate + '%）についてご連絡いただきありがとうございます。',
          '',
          '昨今のコスト増加の状況は理解しております。ただ、弊社としましても',
          '仕入れコストの大幅な増加は経営に大きく影響するため、',
          '大変恐れ入りますが値上げ幅について再度ご検討いただけますでしょうか。',
          '',
          'たとえば ' + Math.round(parseInt(d.rate) / 2) + '% 程度での落としどころが可能であれば、',
          '今後も長期的なお取引を継続させていただきたいと考えております。',
          '',
          'ご一考いただけますと幸いです。何卒よろしくお願い申し上げます。',
          '',
          d.myco,
        ].join('\n');
      }
    },
    hold: {
      label: '一時保留',
      badgeClass: 'badge-hold',
      text: function(d) {
        return [
          d.person ? d.supplier + ' ' + d.person + ' 様' : d.supplier + ' ご担当者様',
          '',
          'お世話になっております。' + d.myco + ' でございます。',
          '',
          'このたびは、' + d.item + ' の価格改定（' + d.rate + '%）についてご連絡いただきありがとうございます。',
          '',
          '内容を確認させていただきました。現在、社内での影響確認・検討を行っておりますため、',
          '返答につきましてもう少しお時間をいただけますでしょうか。',
          '',
          '近日中に改めてご連絡申し上げます。',
          'ご理解のほど、よろしくお願い申し上げます。',
          '',
          d.myco,
        ].join('\n');
      }
    },
    alt: {
      label: '代替先を検討',
      badgeClass: 'badge-alt',
      text: function(d) {
        return [
          d.person ? d.supplier + ' ' + d.person + ' 様' : d.supplier + ' ご担当者様',
          '',
          'お世話になっております。' + d.myco + ' でございます。',
          '',
          'このたびは、' + d.item + ' の価格改定（' + d.rate + '%）についてご連絡いただきありがとうございます。',
          '',
          '内容を拝見いたしました。誠に恐れ入りますが、今回の値上げ幅は',
          '弊社の許容範囲を超えている状況でございます。',
          '',
          'つきましては、社内にて調達先の見直しを含めた検討を行う予定でございます。',
          'ご不便をおかけいたしますが、ご理解いただけますと幸いです。',
          '検討結果が出次第、改めてご連絡いたします。',
          '',
          'なお、価格面での再交渉の余地がございましたら、別途ご提示いただけますと助かります。',
          '',
          d.myco,
        ].join('\n');
      }
    },
    decline: {
      label: '断る（取引縮小・終了）',
      badgeClass: 'badge-decline',
      text: function(d) {
        return [
          d.person ? d.supplier + ' ' + d.person + ' 様' : d.supplier + ' ご担当者様',
          '',
          'お世話になっております。' + d.myco + ' でございます。',
          '',
          'このたびは、' + d.item + ' の価格改定（' + d.rate + '%）についてご連絡いただきありがとうございます。',
          '',
          '内容を慎重に検討いたしました結果、誠に恐れ入りますが、',
          '今回の価格改定を受け入れることは弊社の経営状況上、難しい判断となりました。',
          '',
          '大変お世話になってまいりましたが、' + d.item + ' の取引につきましては、',
          '縮小（または終了）させていただく方向で検討しております。',
          '',
          '急なご連絡となり大変申し訳ございませんが、何卒ご理解賜りますようお願い申し上げます。',
          '',
          d.myco,
        ].join('\n');
      }
    }
  };

  function selectSit(btn) {
    document.querySelectorAll('.sit-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedSit = btn.dataset.sit;
    save();
  }

  function generate() {
    if (!selectedSit) { alert('返答の状況を選んでください'); return; }
    var supplier = document.getElementById('supplier').value.trim();
    var person   = document.getElementById('person').value.trim();
    var item     = document.getElementById('item').value.trim();
    var rate     = document.getElementById('rate').value.trim();
    var myco     = document.getElementById('myco').value.trim();

    if (!supplier) { alert('仕入れ先名を入力してください'); return; }
    if (!item)     { alert('商品・品目名を入力してください'); return; }
    if (!rate)     { alert('値上げ率を入力してください'); return; }
    if (!myco)     { alert('自社名を入力してください'); return; }

    var tmpl = TEMPLATES[selectedSit];
    var d = { supplier: supplier, person: person, item: item, rate: rate, myco: myco };
    var text = tmpl.text(d);

    document.getElementById('output').value = text;

    var badge = document.getElementById('badge');
    badge.textContent = tmpl.label;
    badge.className = 'result-badge ' + tmpl.badgeClass;

    var rc = document.getElementById('result');
    rc.style.display = 'block';

    var copyBtn = document.getElementById('copyBtn');
    copyBtn.textContent = '📋 コピーする';
    copyBtn.classList.remove('copied');

    save();
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText() {
    var ta = document.getElementById('output');
    ta.select();
    ta.setSelectionRange(0, 99999);
    try {
      navigator.clipboard.writeText(ta.value).then(function() {
        setCopied();
      }).catch(function() {
        document.execCommand('copy');
        setCopied();
      });
    } catch(e) {
      document.execCommand('copy');
      setCopied();
    }
  }

  function setCopied() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = '📋 コピーする'; btn.classList.remove('copied'); }, 2000);
  }

  var LS_KEY = 'neage_hentoubun_v1';

  function save() {
    var data = {
      sit: selectedSit,
      supplier: document.getElementById('supplier').value,
      person:   document.getElementById('person').value,
      item:     document.getElementById('item').value,
      rate:     document.getElementById('rate').value,
      myco:     document.getElementById('myco').value,
    };
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.sit) {
        var btn = document.querySelector('[data-sit="' + d.sit + '"]');
        if (btn) { btn.classList.add('active'); selectedSit = d.sit; }
      }
      if (d.supplier) document.getElementById('supplier').value = d.supplier;
      if (d.person)   document.getElementById('person').value   = d.person;
      if (d.item)     document.getElementById('item').value     = d.item;
      if (d.rate)     document.getElementById('rate').value     = d.rate;
      if (d.myco)     document.getElementById('myco').value     = d.myco;
    } catch(e) {}
  }

  ['supplier','person','item','rate','myco'].forEach(function(id){
    document.getElementById(id).addEventListener('input', save);
  });

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
