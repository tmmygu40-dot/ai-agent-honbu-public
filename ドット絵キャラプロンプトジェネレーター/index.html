<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="種族・職業・表情・ポーズ・ドット絵スタイルを選ぶだけで、画像生成AI用のドット絵キャラプロンプトを即生成。ワンクリックでコピーできるプロンプトジェネレーター。">
  <title>ドット絵キャラプロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-align: center; }

    /* ── プロンプト表示 ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); word-break: break-word;
      white-space: pre-wrap; min-height: 80px;
      margin-bottom: 1rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>ドット絵キャラプロンプトジェネレーター</h1>
    <p class="subtitle">属性を選ぶだけで画像生成AI用のドット絵キャラプロンプトを即生成</p>
  </header>

  <!-- キャラ属性カード -->
  <div class="card">
    <p class="card-title">キャラ属性</p>
    <div class="field">
      <label for="race">種族</label>
      <select id="race">
        <option value="human">人間 (Human)</option>
        <option value="elf">エルフ (Elf)</option>
        <option value="dwarf">ドワーフ (Dwarf)</option>
        <option value="orc">オーク (Orc)</option>
        <option value="beast-folk">獣人 (Beast-folk)</option>
        <option value="undead">アンデッド (Undead)</option>
        <option value="demon">悪魔 (Demon)</option>
        <option value="angel">天使 (Angel)</option>
        <option value="robot">ロボット (Robot)</option>
        <option value="slime">スライム (Slime)</option>
        <option value="dragon-kin">竜人 (Dragon-kin)</option>
        <option value="fairy">妖精 (Fairy)</option>
      </select>
    </div>
    <div class="field">
      <label for="job">職業</label>
      <select id="job">
        <option value="warrior">戦士 (Warrior)</option>
        <option value="mage">魔法使い (Mage)</option>
        <option value="thief">盗賊 (Thief)</option>
        <option value="priest">僧侶 (Priest)</option>
        <option value="ranger">レンジャー (Ranger)</option>
        <option value="knight">騎士 (Knight)</option>
        <option value="necromancer">ネクロマンサー (Necromancer)</option>
        <option value="bard">吟遊詩人 (Bard)</option>
        <option value="samurai">侍 (Samurai)</option>
        <option value="ninja">忍者 (Ninja)</option>
        <option value="merchant">商人 (Merchant)</option>
        <option value="alchemist">錬金術師 (Alchemist)</option>
        <option value="villager">村人 (Villager)</option>
        <option value="king">王様 (King)</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="neutral">通常 (Neutral)</option>
        <option value="happy smiling">笑顔 (Happy)</option>
        <option value="angry">怒り (Angry)</option>
        <option value="sad">悲しみ (Sad)</option>
        <option value="surprised">驚き (Surprised)</option>
        <option value="determined">決意 (Determined)</option>
        <option value="mysterious smirk">ミステリアス (Mysterious)</option>
        <option value="crying">泣き (Crying)</option>
        <option value="laughing">大笑い (Laughing)</option>
      </select>
    </div>
    <div class="field">
      <label for="pose">ポーズ</label>
      <select id="pose">
        <option value="standing front-facing">正面立ち (Front)</option>
        <option value="battle stance">戦闘構え (Battle)</option>
        <option value="casting spell">魔法詠唱 (Casting)</option>
        <option value="sitting">座り (Sitting)</option>
        <option value="running">走り (Running)</option>
        <option value="victory pose">勝利ポーズ (Victory)</option>
        <option value="idle animation frame">待機 (Idle)</option>
        <option value="attacking with weapon">攻撃 (Attack)</option>
        <option value="defending with shield">防御 (Defense)</option>
        <option value="walking side-view">横歩き (Walk)</option>
      </select>
    </div>
    <div class="field">
      <label for="gender">性別</label>
      <select id="gender">
        <option value="male">男性 (Male)</option>
        <option value="female">女性 (Female)</option>
        <option value="androgynous">中性的 (Androgynous)</option>
      </select>
    </div>
  </div>

  <!-- スタイル設定カード -->
  <div class="card">
    <p class="card-title">ドット絵スタイル</p>
    <div class="field">
      <label for="resolution">解像度</label>
      <select id="resolution">
        <option value="16x16">16x16（ミニキャラ）</option>
        <option value="32x32" selected>32x32（標準）</option>
        <option value="64x64">64x64（高精細）</option>
        <option value="128x128">128x128（超高精細）</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="NES palette, limited 8-bit colors">ファミコン風 (NES 8-bit)</option>
        <option value="SNES palette, 16-bit colors">スーファミ風 (SNES 16-bit)</option>
        <option value="Game Boy green monochrome palette">ゲームボーイ風 (GB Green)</option>
        <option value="vibrant colorful pixel art palette">ビビッド (Vibrant)</option>
        <option value="pastel soft pixel art palette">パステル (Pastel)</option>
        <option value="dark moody limited palette">ダーク (Dark)</option>
        <option value="sepia warm-toned retro palette">セピア (Sepia)</option>
      </select>
    </div>
    <div class="field">
      <label for="bg">背景</label>
      <select id="bg">
        <option value="transparent background">透明 (Transparent)</option>
        <option value="solid color flat background">単色 (Solid color)</option>
        <option value="pixel art grass field background">草原 (Grass field)</option>
        <option value="pixel art dungeon stone background">ダンジョン (Dungeon)</option>
        <option value="pixel art castle interior background">城内 (Castle)</option>
        <option value="pixel art forest background">森 (Forest)</option>
        <option value="pixel art night sky with stars background">星空 (Night sky)</option>
        <option value="pixel art village background">村 (Village)</option>
      </select>
    </div>
    <div class="field">
      <label for="style">画風</label>
      <select id="style">
        <option value="classic JRPG sprite style" selected>JRPG風 (Classic JRPG)</option>
        <option value="chibi cute deformed style">ちびキャラ風 (Chibi)</option>
        <option value="realistic proportions pixel art">リアル等身 (Realistic)</option>
        <option value="retro arcade game style">レトロアーケード風 (Arcade)</option>
        <option value="modern indie game pixel art style">モダンインディー風 (Indie)</option>
      </select>
    </div>
    <div class="field">
      <label for="extras">追加要素（任意）</label>
      <input type="text" id="extras" placeholder="例: holding a fire sword, wearing a red cape">
      <p class="hint">英語で自由に追加要素を記入できます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="prompt-text"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">コピーする</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、画像生成AI（Stable Diffusion / Midjourney / DALL-E 等）で使えるプロンプトの目安を生成します。生成結果はAIモデルにより異なる場合があります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'dot_chara_prompt_gen';

  function saveSettings() {
    var ids = ['race','job','expression','pose','gender','resolution','palette','bg','style','extras'];
    var data = {};
    ids.forEach(function(id) { data[id] = document.getElementById(id).value; });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadSettings() {
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY));
      if (!data) return;
      Object.keys(data).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = data[id];
      });
    } catch(e) {}
  }

  function generate() {
    saveSettings();

    var race = document.getElementById('race').value;
    var job = document.getElementById('job').value;
    var expression = document.getElementById('expression').value;
    var pose = document.getElementById('pose').value;
    var gender = document.getElementById('gender').value;
    var resolution = document.getElementById('resolution').value;
    var palette = document.getElementById('palette').value;
    var bg = document.getElementById('bg').value;
    var style = document.getElementById('style').value;
    var extras = document.getElementById('extras').value.trim();

    var parts = [
      'pixel art',
      resolution + ' sprite',
      gender + ' ' + race + ' ' + job,
      expression + ' expression',
      pose,
      style,
      palette,
      bg
    ];

    if (extras) parts.push(extras);

    parts.push('clean pixel edges, no anti-aliasing, sharp pixels, high quality');

    var prompt = parts.join(', ');

    document.getElementById('prompt-text').textContent = prompt;
    var rc = document.getElementById('result');
    rc.className = 'result-card show';
    rc.style.display = 'block';

    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーする';
    btn.className = 'btn-copy';
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied();
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーしました!';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = 'コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  // 初期化
  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
