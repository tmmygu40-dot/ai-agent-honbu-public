<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>災害支援手続きガイド</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリボタン ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
    }
    .cat-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 0.5rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:active, .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .cat-btn .cat-icon { font-size: 1.5rem; display: block; margin-bottom: 0.25rem; }

    /* ── 手続きリスト ── */
    .proc-list { max-width: 600px; margin: 0 auto; padding: 0 1rem; }
    .proc-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .proc-item.done {
      background: var(--ok-bg);
      border-color: var(--ok);
      opacity: 0.75;
    }
    .proc-check {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      margin-top: 0.1rem;
      background: #fff;
    }
    .proc-item.done .proc-check {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
    }
    .proc-body { flex: 1; }
    .proc-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }
    .proc-item.done .proc-name { text-decoration: line-through; color: var(--text-sub); }
    .proc-desc {
      font-size: 0.8rem;
      color: var(--text-sub);
      line-height: 1.5;
      margin-bottom: 0.4rem;
    }
    .proc-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .proc-tag {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      font-weight: 600;
    }
    .proc-tag.where { background: var(--accent-light); color: var(--accent); }
    .proc-tag.deadline { background: var(--ng-bg); color: var(--ng); }
    .proc-tag.info { background: #f1f5f9; color: #475569; }

    /* ── 進捗バー ── */
    .progress-wrap {
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
    }
    .progress-bar-bg {
      background: var(--border);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: var(--ok);
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }
    .progress-label {
      font-size: 0.78rem;
      color: var(--text-sub);
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
    }

    /* ── 空状態 ── */
    .empty-msg {
      text-align: center;
      color: var(--text-sub);
      font-size: 0.88rem;
      padding: 2rem 1rem;
    }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block;
      margin: 0.5rem auto 1.5rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      background: transparent;
      color: var(--ng);
      border: 1.5px solid var(--ng);
      border-radius: 99px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      margin: 0 auto 0.75rem;
      max-width: 600px;
      padding: 0 1rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  var currentCat = null;
  var checks = {};

  function loadChecks() {
    try {
      checks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch(e) { checks = {}; }
  }

  function saveChecks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checks));
  }

  function init() {
    loadChecks();
    var grid = document.getElementById('catGrid');
    Object.keys(DATA).forEach(function(key) {
      var d = DATA[key];
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.id = 'cat_' + key;
      btn.innerHTML = '<span class="cat-icon">' + d.icon + '</span>' + d.label;
      btn.onclick = function() { selectCat(key); };
      grid.appendChild(btn);
    });
  }

  function selectCat(key) {
    currentCat = key;
    // アクティブ切替
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('cat_' + key).classList.add('active');
    renderList(key);
  }

  function renderList(key) {
    var d = DATA[key];
    var list = document.getElementById('procList');
    list.innerHTML = '';

    d.items.forEach(function(item) {
      var done = !!checks[item.id];
      var div = document.createElement('div');
      div.className = 'proc-item' + (done ? ' done' : '');
      div.innerHTML =
        '<div class="proc-check">' + (done ? '✓' : '') + '</div>' +
        '<div class="proc-body">' +
          '<div class="proc-name">' + item.name + '</div>' +
          '<div class="proc-desc">' + item.desc + '</div>' +
          '<div class="proc-meta">' +
            '<span class="proc-tag where">📍 ' + item.where + '</span>' +
            '<span class="proc-tag deadline">⏰ ' + item.deadline + '</span>' +
            '<span class="proc-tag info">💡 ' + item.info + '</span>' +
          '</div>' +
        '</div>';
      div.onclick = function() { toggleItem(item.id, key); };
      list.appendChild(div);
    });

    updateProgress(key);
    document.getElementById('progressArea').style.display = '';
  }

  function toggleItem(id, key) {
    checks[id] = !checks[id];
    saveChecks();
    renderList(key);
  }

  function updateProgress(key) {
    var items = DATA[key].items;
    var total = items.length;
    var done = items.filter(function(it) { return !!checks[it.id]; }).length;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('progressText').textContent = done + ' / ' + total + ' 件対応済み';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function resetCurrent() {
    if (!currentCat) return;
    if (!confirm('このカテゴリのチェックをすべてリセットしますか？')) return;
    DATA[currentCat].items.forEach(function(item) {
      delete checks[item.id];
    });
    saveChecks();
    renderList(currentCat);
  }

  init();
  </script>

</body>
</html>
