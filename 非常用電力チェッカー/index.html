<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>非常用電力チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>⚡ 非常用電力チェッカー</h1>
    <p class="subtitle">停電時にポータブル電源で何時間動かせるか確認できます</p>

    <!-- ポータブル電源設定 -->
    <section class="card">
      <h2>🔋 ポータブル電源</h2>
      <div class="form-row">
        <label for="capacity">容量（Wh）</label>
        <input type="number" id="capacity" placeholder="例：1000" min="1">
      </div>
      <div class="form-row">
        <label for="efficiency">変換効率（%）</label>
        <input type="number" id="efficiency" value="85" min="1" max="100">
      </div>
    </section>

    <!-- 家電追加 -->
    <section class="card">
      <h2>🏠 使用する家電を登録</h2>

      <div class="preset-area">
        <p class="preset-label">プリセット：</p>
        <div class="preset-buttons" id="presetButtons"></div>
      </div>

      <div class="appliance-form">
        <input type="text" id="appName" placeholder="家電名（例：冷蔵庫）">
        <input type="number" id="appWatt" placeholder="W数（例：150）" min="1">
        <input type="number" id="appCount" placeholder="台数" value="1" min="1">
        <button id="addBtn" onclick="addAppliance()">追加</button>
      </div>
    </section>

    <!-- 家電リスト -->
    <section class="card" id="listSection">
      <h2>📋 家電リスト</h2>
      <div id="applianceList">
        <p class="empty-msg">まだ家電が登録されていません</p>
      </div>
      <div class="total-row" id="totalRow" style="display:none;">
        <span>合計消費電力：</span>
        <span id="totalWatt" class="total-value">0 W</span>
      </div>
    </section>

    <!-- 計算結果 -->
    <section class="card result-card" id="resultSection">
      <h2>⏱️ 稼働可能時間</h2>
      <div id="resultArea">
        <p class="empty-msg">家電と電源容量を入力すると表示されます</p>
      </div>
    </section>

    <button class="clear-btn" onclick="clearAll()">🗑️ すべてリセット</button>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
