<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ポモドーロタイマー</h1>

    <div class="mode-buttons">
      <button class="mode-btn active" id="btn-work" onclick="setMode('work')">作業（25分）</button>
      <button class="mode-btn" id="btn-short" onclick="setMode('short')">休憩（5分）</button>
      <button class="mode-btn" id="btn-long" onclick="setMode('long')">長休憩（15分）</button>
    </div>

    <div class="timer-display" id="timer-display">25:00</div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-start" onclick="startPause()">スタート</button>
      <button class="ctrl-btn secondary" onclick="resetTimer()">リセット</button>
    </div>

    <div class="session-info">
      <span>完了セッション数：</span>
      <span id="session-count">0</span>
      <button class="reset-sessions" onclick="resetSessions()">リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
