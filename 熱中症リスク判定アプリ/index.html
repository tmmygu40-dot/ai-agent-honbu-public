<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱中症リスク判定アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%86%B1%E4%B8%AD%E7%97%87%E3%83%AA%E3%82%B9%E3%82%AF%E5%88%A4%E5%AE%9A%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="熱中症リスク判定は、選択・入力するだけで結果をリアルタイムに確認できる無料ツールです。スマホでもお使いいただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"熱中症リスク判定","description":"熱中症リスク判定は、選択・入力するだけで結果をリアルタイムに確認できる無料ツールです。スマホでもお使いいただけます。","url":"https://nekopoke.jp/%E7%86%B1%E4%B8%AD%E7%97%87%E3%83%AA%E3%82%B9%E3%82%AF%E5%88%A4%E5%AE%9A%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>熱中症リスク判定</h1>
    <p class="subtitle">気温・湿度を入力してリスクを確認</p>

    <div class="input-section">
      <div class="input-group">
        <label for="temperature">気温 (℃)</label>
        <input type="number" id="temperature" placeholder="例：35" min="-10" max="50" step="0.1">
      </div>
      <div class="input-group">
        <label for="humidity">湿度 (%)</label>
        <input type="number" id="humidity" placeholder="例：70" min="0" max="100" step="1">
      </div>
      <button id="judgeBtn" onclick="judge()">判定する</button>
    </div>

    <div id="result" class="result hidden">
      <div id="wbgtDisplay" class="wbgt-display">
        <span class="label">暑さ指数（WBGT）</span>
        <span id="wbgtValue" class="value"></span>
      </div>
      <div id="riskCard" class="risk-card">
        <div id="riskLevel" class="risk-level"></div>
        <div id="riskLabel" class="risk-label"></div>
      </div>
      <div id="cautions" class="cautions"></div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>計測履歴</h2>
        <button onclick="clearHistory()" class="clear-btn">クリア</button>
      </div>
      <ul id="historyList" class="history-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
