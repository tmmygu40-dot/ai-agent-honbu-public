<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店頭POP文句ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-section {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .result-header {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.75rem; padding: 0 0.2rem;
    }
    .pop-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .pop-label {
      font-size: 0.7rem; font-weight: 700; color: var(--accent);
      background: var(--accent-light); border: 1px solid #f5d9a8;
      border-radius: 6px; padding: 0.2rem 0.5rem;
      white-space: nowrap; margin-top: 0.1rem;
    }
    .pop-text {
      flex: 1; font-size: 1rem; font-weight: 700;
      line-height: 1.55; color: var(--text);
    }
    .btn-copy {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.8rem;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      color: var(--text-sub); transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    /* ── 履歴 ── */
    .history-section {
      max-width: 600px; margin: 1.5rem auto 0;
    }
    .history-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; margin-bottom: 0.5rem; padding: 0 0.2rem;
    }
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1rem;
      margin-bottom: 0.5rem; cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.1rem; }
    .history-feature { font-size: 0.75rem; color: var(--text-sub); }
    .history-date { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .pop-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>🏷️ 店頭POP文句ジェネレーター</h1>
    <p class="subtitle">商品名と特徴を入れるだけで売れるPOPコピーを即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="productName">商品名</label>
      <input type="text" id="productName" placeholder="例：国産はちみつ、手作りジャム、有機野菜セット">
    </div>
    <div class="field">
      <label for="features">特徴・セールスポイント</label>
      <textarea id="features" placeholder="例：無農薬、地元産、甘さ控えめ、数量限定、職人手作り&#10;（複数の特徴はカンマや改行で区切ってください）"></textarea>
      <p class="hint">特徴を多く書くほど、バリエーション豊かなコピーが生成されます</p>
    </div>
    <div class="field">
      <label for="target">ターゲット（任意）</label>
      <input type="text" id="target" placeholder="例：健康を気にする方、ギフトに、お子様のいるご家庭">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ POPコピーを生成する</button>

  <!-- 結果 -->
  <div class="result-section" id="resultSection">
    <p class="result-header">📋 生成されたPOPコピー（タップしてコピー）</p>
    <div id="popList"></div>
  </div>

  <!-- 履歴 -->
  <div class="history-section" id="historySection" style="display:none">
    <p class="history-title">📁 最近の生成履歴（クリックで再表示）</p>
    <div id="historyList"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'popgen_history';

  // POPコピーテンプレートパターン
  function buildCopies(name, feats, target) {
    var f0 = feats[0] || '高品質';
    var f1 = feats[1] || feats[0] || '特別';
    var f2 = feats[2] || feats[0] || '本物';
    var fAll = feats.join('・') || '高品質';
    var t = target || 'こだわりの方';

    var patterns = [
      { label: 'インパクト', text: '【' + name + '】\n' + f0 + 'だから違う。\n一度食べたら、もう戻れない。' },
      { label: '数量限定', text: '数量限定！\n' + fAll + '\n' + name + '\nお早めに！' },
      { label: '品質訴求', text: name + '\n' + f0 + 'にこだわった\n本物の味をどうぞ。' },
      { label: '問いかけ', text: 'こんな' + name + '、\n探していませんでしたか？\n' + fAll },
      { label: 'ターゲット', text: t + 'へ。\n' + f0 + 'の\n' + name + '\nぜひお試しください。' },
      { label: 'シンプル強調', text: name + '\n' + f0 + '！\n' + (f1 !== f0 ? f1 + '！' : '') },
      { label: '理由訴求', text: '選ばれる理由は\n' + fAll + '\n' + name },
      { label: '体験訴求', text: name + 'で\n' + f0 + 'を\n実感してください。' },
      { label: '推薦型', text: 'スタッフ一押し！\n' + name + '\n' + f0 + 'が自慢の一品です。' },
      { label: 'ギフト訴求', text: 'ギフトにも人気！\n' + name + '\n' + fAll },
      { label: 'お得強調', text: 'この品質でこの価格！\n' + name + '\n' + f0 + ' × ' + (f1 !== f0 ? f1 : f0) },
      { label: 'こだわり', text: '職人こだわりの\n' + f0 + '\n' + name + '、はじめました。' },
    ];

    // ターゲットが空なら関連パターンを除外気味にしてシャッフル
    return patterns;
  }

  function generate() {
    var name = document.getElementById('productName').value.trim();
    var featRaw = document.getElementById('features').value.trim();
    var target = document.getElementById('target').value.trim();

    if (!name) { alert('商品名を入力してください'); return; }
    if (!featRaw) { alert('特徴を入力してください'); return; }

    var feats = featRaw.split(/[\n,、，・]/).map(function(s){ return s.trim(); }).filter(Boolean);

    var copies = buildCopies(name, feats, target);

    renderResult(copies);
    saveHistory(name, featRaw, target, copies);

    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderResult(copies) {
    var html = '';
    copies.forEach(function(c) {
      html += '<div class="pop-item">'
            + '<span class="pop-label">' + c.label + '</span>'
            + '<span class="pop-text">' + escHtml(c.text).replace(/\n/g, '<br>') + '</span>'
            + '<button class="btn-copy" onclick="copyText(this, ' + JSON.stringify(c.text) + ')">コピー</button>'
            + '</div>';
    });
    document.getElementById('popList').innerHTML = html;
  }

  function copyText(btn, text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'コピー済み✓';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 履歴 ──
  function saveHistory(name, feat, target, copies) {
    var history = loadHistory();
    var entry = {
      name: name,
      feat: feat,
      target: target,
      copies: copies,
      date: new Date().toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    };
    history.unshift(entry);
    if (history.length > 5) history = history.slice(0, 5);
    localStorage.setItem(LS_KEY, JSON.stringify(history));
    renderHistory(history);
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }

  function renderHistory(history) {
    if (!history.length) { document.getElementById('historySection').style.display = 'none'; return; }
    document.getElementById('historySection').style.display = 'block';
    var html = '';
    history.forEach(function(h, i) {
      html += '<div class="history-item" onclick="restoreHistory(' + i + ')">'
            + '<div class="history-name">🏷️ ' + escHtml(h.name) + '</div>'
            + '<div class="history-feature">' + escHtml(h.feat.replace(/\n/g, ' / ').substring(0, 60)) + '</div>'
            + '<div class="history-date">' + h.date + '</div>'
            + '</div>';
    });
    document.getElementById('historyList').innerHTML = html;
  }

  function restoreHistory(i) {
    var history = loadHistory();
    var h = history[i];
    if (!h) return;
    document.getElementById('productName').value = h.name;
    document.getElementById('features').value = h.feat;
    document.getElementById('target').value = h.target || '';
    renderResult(h.copies);
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 起動時に履歴を表示
  (function(){
    var history = loadHistory();
    if (history.length) renderHistory(history);
  })();
  </script>

</body>
