<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>視聴記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E8%A6%96%E8%81%B4%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="視聴記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"視聴記録","description":"視聴記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E8%A6%96%E8%81%B4%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>🎬 視聴記録</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <section class="form-section">
      <h2>作品を追加</h2>
      <div class="form-group">
        <label for="title">タイトル</label>
        <input type="text" id="title" placeholder="例：インセプション">
      </div>
      <div class="form-group">
        <label for="type">種別</label>
        <select id="type">
          <option value="映画">🎬 映画</option>
          <option value="ドラマ">📺 ドラマ</option>
        </select>
      </div>
      <div class="form-group">
        <label>評価</label>
        <div class="star-rating" id="starRating">
          <button class="star" data-value="1">★</button>
          <button class="star" data-value="2">★</button>
          <button class="star" data-value="3">★</button>
          <button class="star" data-value="4">★</button>
          <button class="star" data-value="5">★</button>
        </div>
        <span class="star-label" id="starLabel">未選択</span>
      </div>
      <div class="form-group">
        <label for="comment">ひとこと</label>
        <input type="text" id="comment" placeholder="感想を一言で">
      </div>
      <button class="btn-add" id="addBtn">追加する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>視聴リスト <span id="count">0</span>件</h2>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="すべて">すべて</button>
          <button class="filter-btn" data-filter="映画">映画</button>
          <button class="filter-btn" data-filter="ドラマ">ドラマ</button>
        </div>
      </div>
      <ul class="record-list" id="recordList">
        <li class="empty-msg">まだ記録がありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
