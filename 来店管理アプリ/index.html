<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来店管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>来店管理アプリ</h1>

    <!-- 来店記録入力 -->
    <section class="card">
      <h2>来店を記録する</h2>
      <div class="form-row">
        <input type="text" id="customerName" placeholder="顧客名" maxlength="50">
        <input type="date" id="visitDate">
        <button id="addBtn">記録</button>
      </div>
      <p id="errorMsg" class="error-msg"></p>
    </section>

    <!-- 顧客一覧 -->
    <section class="card">
      <h2>顧客一覧 <span id="customerCount" class="count-badge">0名</span></h2>
      <div id="customerList" class="customer-list">
        <p class="empty-msg">顧客が登録されていません</p>
      </div>
    </section>
  </div>

  <!-- 来店履歴モーダル -->
  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">来店履歴</h3>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
      <div class="modal-footer">
        <input type="date" id="addVisitDate">
        <button id="addVisitBtn">来店を追加</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
