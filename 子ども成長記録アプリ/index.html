<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子ども成長記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>子ども成長記録</h1>

    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="height">身長 (cm)</label>
        <input type="number" id="height" placeholder="例: 85.5" step="0.1" min="0" max="300">
      </div>
      <div class="form-group">
        <label for="weight">体重 (kg)</label>
        <input type="number" id="weight" placeholder="例: 12.3" step="0.1" min="0" max="200">
      </div>
      <button id="addBtn" class="btn-primary">追加</button>
    </section>

    <section class="chart-section">
      <h2>成長グラフ</h2>
      <div class="chart-tabs">
        <button class="tab-btn active" data-type="height">身長</button>
        <button class="tab-btn" data-type="weight">体重</button>
      </div>
      <canvas id="growthChart" width="600" height="280"></canvas>
    </section>

    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
