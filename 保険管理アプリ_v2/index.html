<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保険管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>保険管理アプリ</h1>
    <p class="subtitle">家族の保険を一元管理</p>

    <section class="form-section">
      <h2>保険を登録する</h2>
      <form id="insuranceForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="insuranceName">保険名 <span class="required">*</span></label>
            <input type="text" id="insuranceName" placeholder="例：〇〇生命 医療保険" required>
          </div>
          <div class="form-group">
            <label for="holderName">加入者名 <span class="required">*</span></label>
            <input type="text" id="holderName" placeholder="例：山田 太郎" required>
          </div>
          <div class="form-group">
            <label for="coverage">保障額（円）</label>
            <input type="number" id="coverage" placeholder="例：10000000" min="0">
          </div>
          <div class="form-group">
            <label for="monthlyPremium">月払い額（円）<span class="required">*</span></label>
            <input type="number" id="monthlyPremium" placeholder="例：5000" min="0" required>
          </div>
          <div class="form-group">
            <label for="renewalDate">更新日</label>
            <input type="date" id="renewalDate">
          </div>
          <div class="form-group">
            <label for="insuranceType">種類</label>
            <select id="insuranceType">
              <option value="">選択してください</option>
              <option value="生命保険">生命保険</option>
              <option value="医療保険">医療保険</option>
              <option value="がん保険">がん保険</option>
              <option value="火災保険">火災保険</option>
              <option value="自動車保険">自動車保険</option>
              <option value="学資保険">学資保険</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label for="memo">メモ</label>
            <input type="text" id="memo" placeholder="例：更新時に見直し予定">
          </div>
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <section class="summary-section" id="summarySection">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="summary-label">登録件数</span>
          <span class="summary-value" id="totalCount">0件</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">月払い合計</span>
          <span class="summary-value" id="totalMonthly">0円</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">年払い換算</span>
          <span class="summary-value" id="totalYearly">0円</span>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>保険一覧</h2>
        <div class="filter-area">
          <input type="text" id="searchInput" placeholder="名前・加入者で検索" class="search-input">
        </div>
      </div>
      <div id="insuranceList" class="insurance-list">
        <p class="empty-message">まだ保険が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
