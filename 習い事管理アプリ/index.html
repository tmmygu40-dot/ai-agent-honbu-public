<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>習い事管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>習い事管理</h1>

    <!-- 合計費用 -->
    <div class="summary">
      <span class="summary-label">今月の合計費用</span>
      <span class="summary-amount" id="totalAmount">¥0</span>
    </div>

    <!-- 登録フォーム -->
    <div class="form-card">
      <h2>習い事を追加</h2>
      <div class="form-group">
        <label for="lessonName">習い事名</label>
        <input type="text" id="lessonName" placeholder="例：ピアノ" maxlength="30">
      </div>
      <div class="form-group">
        <label for="lessonFee">月謝（円）</label>
        <input type="number" id="lessonFee" placeholder="例：8000" min="0">
      </div>
      <div class="form-group">
        <label>曜日</label>
        <div class="days-grid">
          <label class="day-label"><input type="checkbox" value="月"> 月</label>
          <label class="day-label"><input type="checkbox" value="火"> 火</label>
          <label class="day-label"><input type="checkbox" value="水"> 水</label>
          <label class="day-label"><input type="checkbox" value="木"> 木</label>
          <label class="day-label"><input type="checkbox" value="金"> 金</label>
          <label class="day-label"><input type="checkbox" value="土"> 土</label>
          <label class="day-label"><input type="checkbox" value="日"> 日</label>
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </div>

    <!-- 一覧 -->
    <div class="list-section">
      <h2>登録済み一覧</h2>
      <div id="lessonList" class="lesson-list">
        <p class="empty-msg" id="emptyMsg">まだ登録されていません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
