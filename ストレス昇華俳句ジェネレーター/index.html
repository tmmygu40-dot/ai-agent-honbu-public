<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレス昇華俳句ジェネレーター｜イライラを五七五で笑い飛ばす</title>
  <meta name="description" content="日々のイライラやムカつきをジャンルから選ぶだけで、5-7-5の俳句に変換して笑いに昇華する無料ジェネレーター。お気に入り保存・コピー機能つき。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .haiku-card {
      background: #fffaf2;
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.5rem 1.2rem 1.1rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .haiku-no {
      position: absolute; top: 0.6rem; right: 0.9rem;
      font-size: 0.7rem; color: var(--text-sub); letter-spacing: 0.08em;
    }
    .haiku-line {
      font-size: 1.35rem; font-weight: 700; line-height: 2.2;
      letter-spacing: 0.08em; text-align: center;
      color: var(--text);
    }
    .haiku-line.middle { padding-left: 1.2rem; }
    .haiku-line.last { padding-left: 2.4rem; }
    .haiku-actions {
      display: flex; gap: 0.5rem; justify-content: center;
      margin-top: 1rem;
    }
    .haiku-btn {
      padding: 0.45rem 0.9rem;
      font-size: 0.78rem; font-weight: 700;
      background: #fff; color: var(--text-sub);
      border: 1.2px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .haiku-btn:hover { border-color: var(--accent); color: var(--accent); }
    .haiku-btn.fav-on { background: var(--accent); color: #fff; border-color: var(--accent); }

    .empty-msg {
      text-align: center; color: var(--text-sub);
      font-size: 0.88rem; padding: 1.2rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .haiku-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ストレス昇華俳句ジェネレーター</h1>
    <p class="subtitle">イライラ・ムカつきを五七五に変えて、笑いに昇華</p>
  </header>

  <div class="card">
    <p class="card-title">ジャンル選択</p>
    <div class="field">
      <label for="genre">どんなイライラですか？</label>
      <select id="genre">
        <option value="work">仕事・上司</option>
        <option value="money">お金・値上げ</option>
        <option value="commute">通勤・満員電車</option>
        <option value="family">家族・パートナー</option>
        <option value="relations">人間関係</option>
        <option value="sns">SNS・ネット</option>
        <option value="health">健康・体調</option>
        <option value="daily">その他日常</option>
      </select>
    </div>
    <div class="field">
      <label for="memo">ひとこと（任意・気持ちを吐き出す欄）</label>
      <textarea id="memo" rows="2" placeholder="例：また残業…帰りたい"></textarea>
      <p class="hint">入力内容は俳句の表示には影響せず、お気に入りに一緒にメモとして保存されます。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">俳句にする</button>

  <div id="haiku-area"></div>

  <div class="card">
    <p class="card-title">お気に入り</p>
    <div id="fav-list"><p class="empty-msg">まだお気に入りはありません</p></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 俳句のフレーズはストレス昇華・気晴らしを目的とした創作例です。実在の人物・団体とは関係ありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 俳句バンク（5-7-5でハンドメイド） ──
  var HAIKU = {
    work: [
      ['月曜の','朝の会議で','涙ぐむ'],
      ['上司また','同じ説教','飽きました'],
      ['退社後の','君のLINEは','既読する'],
      ['残業で','帰り道見る','月の影'],
      ['朝礼の','長い話で','眠くなる'],
      ['在宅で','家でも仕事','逃げ場なし'],
      ['給料日','振込待つも','据え置きで'],
      ['上司との','会議の前で','胃が痛む'],
      ['納期前','逃げたい気持ち','空に投げ'],
      ['会議室','時計だけ見て','耐え忍ぶ']
    ],
    money: [
      ['また値上げ','レシート見ては','ため息出る'],
      ['卵さえ','高嶺の花の','春となり'],
      ['給料は','上がらないのに','物価だけ'],
      ['財布より','心が先に','スカスカに'],
      ['節約と','言いつつ今日も','コンビニで'],
      ['ガソリン','満タン入れて','息止める'],
      ['割引き','シール求めて','閉店前'],
      ['電気代','明細見ては','エアコン断つ'],
      ['ボーナス','期待と現実','二度泣ける'],
      ['予算より','レジで増える','その理由']
    ],
    commute: [
      ['満員で','スマホも見れず','空見上げ'],
      ['人の波','押されてはまた','押し返す'],
      ['遅延案内','流れる駅で','立ち尽くす'],
      ['乗り換えで','走る私の','ヒール泣く'],
      ['朝の駅','他人の汗で','目が覚める'],
      ['吊り革に','つかまる手にも','疲れあり'],
      ['痴漢冤罪','怖くて両手','上に挙げ'],
      ['寝過ごして','終点降りる','夜の街'],
      ['行きはよし','帰りの混雑','地獄かな'],
      ['駅員も','謝り疲れの','顔見せる']
    ],
    family: [
      ['また喧嘩','原因思い出せぬ','日曜日'],
      ['妻の声','聞こえぬふりして','逃げる僕'],
      ['夫また','靴下脱ぎ捨て','床の上'],
      ['子供から','パパくさいねと','一刀両断'],
      ['義実家の','長い説教','耳を閉じ'],
      ['家事の量','休日のほうが','増えている'],
      ['夫婦して','スマホばかりの','夕食時'],
      ['親孝行','したい気持ちと','距離の壁'],
      ['弟の','部屋のにおいが','廊下まで'],
      ['静けさを','求める家に','犬が吠え']
    ],
    relations: [
      ['既読つく','返事は来ない','三日経つ'],
      ['会釈する','名前忘れた','元同僚'],
      ['飲み会で','聞き役ばかり','疲れ果て'],
      ['友達の','幸せ報告','拍手して'],
      ['誘われず','SNSで知る','飲み会を'],
      ['気を遣い','疲れ果てては','一人飲み'],
      ['噂話','聞きたくないと','耳ふさぐ'],
      ['本音言え','言えぬ私の','薄笑い'],
      ['誰々が','私のことを','また何か'],
      ['会いたいと','言えぬ気持ちを','スマホ抱く']
    ],
    sns: [
      ['いいねより','本当の自分','押されたい'],
      ['通知欄','またあの人の','自慢話'],
      ['映え写真','撮るのに疲れ','飯冷めた'],
      ['炎上で','自分のことかと','胸が鳴る'],
      ['フォロワー','減った理由を','夜に問う'],
      ['SNS','見るのやめたと','宣言し'],
      ['ストーリー','見ては足跡','残らぬ術'],
      ['投稿後','すぐに消したい','黒歴史'],
      ['DMの','返信遅れて','冷や汗が'],
      ['アンチコメ','心に刺さる','深夜2時']
    ],
    health: [
      ['頭痛だが','仕事は休めぬ','板挟み'],
      ['肩凝りに','スマホ持つ手も','ふるえだす'],
      ['寝不足の','朝の鏡で','他人見る'],
      ['花粉症','涙鼻水','春のかたき'],
      ['健康に','気をつけながら','ポテチ食う'],
      ['歯医者へは','行かねばならぬ','明日にも'],
      ['ジムの会費','払うばかりの','一年目'],
      ['風邪気味で','今日も明日も','薬箱'],
      ['腰痛と','友達みたいに','付き合って'],
      ['寝てるのに','疲れが取れぬ','春の朝']
    ],
    daily: [
      ['雨の日に','傘忘れたと','空を見る'],
      ['信号が','変わる直前','足止まる'],
      ['コンビニで','並ぶ列だけ','長くなる'],
      ['冷蔵庫','開けては閉じる','空腹時'],
      ['宅配を','待つ日に限り','来ぬ便で'],
      ['休日の','予定なきまま','日が暮れる'],
      ['履きたいが','洗濯済みの','服がない'],
      ['朝起きて','曜日確認','する月曜'],
      ['ボタンが','取れたシャツこそ','着たくなり'],
      ['充電が','3%で','生き急ぐ']
    ]
  };

  var GENRE_LABEL = {
    work: '仕事・上司',
    money: 'お金・値上げ',
    commute: '通勤・満員電車',
    family: '家族・パートナー',
    relations: '人間関係',
    sns: 'SNS・ネット',
    health: '健康・体調',
    daily: 'その他日常'
  };

  var FAV_KEY = 'stress-haiku-favs';

  function pick3(arr) {
    var copy = arr.slice();
    var picks = [];
    for (var i = 0; i < 3 && copy.length > 0; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      picks.push(copy[idx]);
      copy.splice(idx, 1);
    }
    return picks;
  }

  function generate() {
    var genre = document.getElementById('genre').value;
    var memo = document.getElementById('memo').value || '';
    var bank = HAIKU[genre] || HAIKU.daily;
    var picks = pick3(bank);
    var area = document.getElementById('haiku-area');
    area.innerHTML = picks.map(function(h, i){
      var key = genre + '|' + h.join('|');
      return ''
        + '<div class="haiku-card" data-key="' + escapeHtml(key) + '" data-genre="' + genre + '">'
        + '<span class="haiku-no">' + (i+1) + ' / 3 ・ ' + GENRE_LABEL[genre] + '</span>'
        + '<p class="haiku-line">' + escapeHtml(h[0]) + '</p>'
        + '<p class="haiku-line middle">' + escapeHtml(h[1]) + '</p>'
        + '<p class="haiku-line last">' + escapeHtml(h[2]) + '</p>'
        + '<div class="haiku-actions">'
        + '  <button class="haiku-btn" onclick="copyHaiku(this)">📋 コピー</button>'
        + '  <button class="haiku-btn" onclick="toggleFav(this)">★ お気に入り</button>'
        + '</div>'
        + '</div>';
    }).join('');
    // 現在のメモを保存して、お気に入り保存時に参照
    document.getElementById('haiku-area').dataset.memo = memo;
    refreshFavBtns();
  }

  function copyHaiku(btn) {
    var card = btn.closest('.haiku-card');
    var lines = card.querySelectorAll('.haiku-line');
    var text = lines[0].textContent + ' / ' + lines[1].textContent + ' / ' + lines[2].textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = '✓ コピー済';
        setTimeout(function(){ btn.textContent = '📋 コピー'; }, 1500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '✓ コピー済';
      setTimeout(function(){ btn.textContent = '📋 コピー'; }, 1500);
    }
  }

  function loadFavs() {
    try {
      var raw = localStorage.getItem(FAV_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveFavs(list) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(list)); } catch(e) {}
  }

  function toggleFav(btn) {
    var card = btn.closest('.haiku-card');
    var genre = card.getAttribute('data-genre');
    var lines = card.querySelectorAll('.haiku-line');
    var haiku = [lines[0].textContent, lines[1].textContent, lines[2].textContent];
    var key = genre + '|' + haiku.join('|');
    var memo = document.getElementById('haiku-area').dataset.memo || '';
    var list = loadFavs();
    var idx = -1;
    for (var i=0; i<list.length; i++) {
      if (list[i].key === key) { idx = i; break; }
    }
    if (idx >= 0) {
      list.splice(idx, 1);
    } else {
      list.unshift({ key: key, genre: genre, haiku: haiku, memo: memo, date: new Date().toISOString().slice(0,10) });
    }
    saveFavs(list);
    renderFavs();
    refreshFavBtns();
  }

  function refreshFavBtns() {
    var list = loadFavs();
    var keys = {};
    list.forEach(function(f){ keys[f.key] = true; });
    document.querySelectorAll('.haiku-card').forEach(function(card){
      var k = card.getAttribute('data-key');
      var btn = card.querySelectorAll('.haiku-btn')[1];
      if (!btn) return;
      if (keys[k]) {
        btn.classList.add('fav-on');
        btn.textContent = '★ 保存済';
      } else {
        btn.classList.remove('fav-on');
        btn.textContent = '★ お気に入り';
      }
    });
  }

  function renderFavs() {
    var list = loadFavs();
    var box = document.getElementById('fav-list');
    if (list.length === 0) {
      box.innerHTML = '<p class="empty-msg">まだお気に入りはありません</p>';
      return;
    }
    box.innerHTML = list.map(function(f, i){
      var memoHtml = f.memo ? '<p style="font-size:0.76rem;color:var(--text-sub);margin-top:0.4rem;">📝 ' + escapeHtml(f.memo) + '</p>' : '';
      return ''
        + '<div style="border-bottom:1px solid var(--border);padding:0.8rem 0;">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;">'
        + '  <span style="font-size:0.72rem;color:var(--text-sub);">' + GENRE_LABEL[f.genre] + ' ・ ' + f.date + '</span>'
        + '  <button class="haiku-btn" onclick="removeFav(' + i + ')" style="padding:0.25rem 0.6rem;font-size:0.72rem;">🗑 削除</button>'
        + '</div>'
        + '<p style="font-size:1rem;font-weight:700;line-height:1.7;letter-spacing:0.06em;">'
        +   escapeHtml(f.haiku[0]) + ' / ' + escapeHtml(f.haiku[1]) + ' / ' + escapeHtml(f.haiku[2])
        + '</p>'
        + memoHtml
        + '</div>';
    }).join('');
  }

  function removeFav(i) {
    var list = loadFavs();
    list.splice(i, 1);
    saveFavs(list);
    renderFavs();
    refreshFavBtns();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  // 初期表示
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
