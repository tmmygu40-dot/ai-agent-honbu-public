<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家電買い替え診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>家電買い替え診断アプリ</h1>
    <p class="subtitle">使用年数と電気代から節電効果・回収年数を即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="appliance">家電の種類</label>
      <select id="appliance">
        <option value="エアコン">エアコン</option>
        <option value="冷蔵庫">冷蔵庫</option>
        <option value="洗濯機">洗濯機</option>
        <option value="テレビ">テレビ</option>
        <option value="電子レンジ">電子レンジ</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="years">使用年数</label>
      <input type="number" id="years" placeholder="例: 10" min="0" max="50">
      <p class="hint">現在の家電を何年使っているか</p>
    </div>
    <div class="field">
      <label for="current_bill">現在の電気代（月額・円）</label>
      <input type="number" id="current_bill" placeholder="例: 3000" min="0">
      <p class="hint">この家電にかかっている月の電気代の目安</p>
    </div>
    <div class="field">
      <label for="new_bill">新型家電の電気代（月額・円）</label>
      <input type="number" id="new_bill" placeholder="例: 1800" min="0">
      <p class="hint">カタログや省エネラベルの年間消費電力量から算出（÷12）</p>
    </div>
    <div class="field">
      <label for="price">新型家電の購入費用（円）</label>
      <input type="number" id="price" placeholder="例: 80000" min="0">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">投資回収年数</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'kaden_kaikae_v1';

  function calc() {
    var appliance   = document.getElementById('appliance').value;
    var years       = parseFloat(document.getElementById('years').value);
    var currentBill = parseFloat(document.getElementById('current_bill').value);
    var newBill     = parseFloat(document.getElementById('new_bill').value);
    var price       = parseFloat(document.getElementById('price').value);

    if (isNaN(currentBill) || isNaN(newBill) || isNaN(price)) {
      showErr('電気代（現在・新型）と購入費用を入力してください');
      return;
    }
    if (currentBill <= newBill) {
      showErr('新型の電気代が現在以上では節電効果がありません');
      return;
    }
    if (price <= 0) {
      showErr('購入費用を入力してください');
      return;
    }

    var monthSaving = currentBill - newBill;
    var yearSaving  = monthSaving * 12;
    var paybackYears = price / yearSaving;

    var level, eval_text, note;
    if (paybackYears < 5) {
      level = 'ok';
      eval_text = '買い替えお得！';
      note = '5年以内に元が取れます。早めの買い替えをおすすめします。';
    } else if (paybackYears < 10) {
      level = 'warn';
      eval_text = '検討余地あり';
      note = '5〜10年で回収できます。家電の寿命や必要性を考慮してご検討ください。';
    } else {
      level = 'ng';
      eval_text = '買い替え不要';
      note = '回収まで10年以上かかります。今すぐの買い替えは割に合わない可能性があります。';
    }

    var paybackStr = paybackYears < 100
      ? paybackYears.toFixed(1) + ' 年'
      : '100年超';

    showResult(level, paybackStr, eval_text, note);
    showDetail([
      ['家電の種類',         appliance],
      ['使用年数',           isNaN(years) ? '未入力' : years + ' 年'],
      ['現在の電気代（月）', fmt(currentBill) + ' 円'],
      ['新型の電気代（月）', fmt(newBill) + ' 円'],
      ['月間節電額',         fmt(monthSaving) + ' 円', true],
      ['年間節電額',         fmt(yearSaving) + ' 円'],
      ['購入費用',           fmt(price) + ' 円'],
      ['投資回収年数',       paybackStr, true],
    ]);

    saveData();
  }

  function showResult(level, val, eval_text, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = eval_text;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', '', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function saveData() {
    var data = {
      appliance:    document.getElementById('appliance').value,
      years:        document.getElementById('years').value,
      current_bill: document.getElementById('current_bill').value,
      new_bill:     document.getElementById('new_bill').value,
      price:        document.getElementById('price').value,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.appliance)    document.getElementById('appliance').value    = data.appliance;
      if (data.years)        document.getElementById('years').value        = data.years;
      if (data.current_bill) document.getElementById('current_bill').value = data.current_bill;
      if (data.new_bill)     document.getElementById('new_bill').value     = data.new_bill;
      if (data.price)        document.getElementById('price').value        = data.price;
    } catch(e) {}
  }

  loadData();
  </script>

</body>
</html>
