<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名刺管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>名刺管理</h1>

    <section class="form-section">
      <h2>名刺を登録</h2>
      <form id="cardForm">
        <div class="form-row">
          <label for="name">名前 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-row">
          <label for="company">会社</label>
          <input type="text" id="company" placeholder="株式会社〇〇">
        </div>
        <div class="form-row">
          <label for="position">役職</label>
          <input type="text" id="position" placeholder="営業部長">
        </div>
        <div class="form-row">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" placeholder="090-1234-5678">
        </div>
        <div class="form-row">
          <label for="email">メール</label>
          <input type="email" id="email" placeholder="example@example.com">
        </div>
        <div class="form-row">
          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="備考など" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <section class="search-section">
      <input type="text" id="searchInput" placeholder="名前・会社・役職で検索..." class="search-input">
    </section>

    <section class="list-section">
      <div id="count" class="count-label"></div>
      <div id="cardList" class="card-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
