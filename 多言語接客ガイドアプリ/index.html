<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多言語接客ガイドアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* フレーズカード */
    .phrase-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .phrase-scene {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 1rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .phrase-item {
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .phrase-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .phrase-ja {
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.35rem;
    }
    .phrase-foreign {
      font-size: 1.15rem; font-weight: 700; color: var(--text);
      line-height: 1.4; margin-bottom: 0.3rem;
    }
    .phrase-roman {
      font-size: 0.82rem; color: var(--text-sub); font-style: italic;
    }
    .copy-btn {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.3rem 0.8rem; font-size: 0.78rem; font-weight: 600;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid var(--accent); border-radius: 6px; cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  <header class="app-header">
    <h1>多言語接客ガイドアプリ</h1>
    <p class="subtitle">言語とシーンを選ぶだけで外国人客への接客フレーズを即表示</p>
  </header>

  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="lang">言語</label>
      <select id="lang">
        <option value="">── 選んでください ──</option>
        <option value="en">英語（English）</option>
        <option value="zh">中国語（中文）</option>
        <option value="ko">韓国語（한국어）</option>
        <option value="th">タイ語（ภาษาไทย）</option>
        <option value="vi">ベトナム語（Tiếng Việt）</option>
        <option value="pt">ポルトガル語（Português）</option>
        <option value="es">スペイン語（Español）</option>
        <option value="fr">フランス語（Français）</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">シーン</label>
      <select id="scene">
        <option value="">── 選んでください ──</option>
        <option value="greeting">挨拶・いらっしゃいませ</option>
        <option value="guide">案内・誘導</option>
        <option value="payment">お会計・支払い</option>
        <option value="product">商品説明・おすすめ</option>
        <option value="trouble">困りごと・トラブル対応</option>
        <option value="farewell">お見送り・ありがとう</option>
        <option value="wait">お待ちいただく・少々お待ちを</option>
        <option value="allergy">アレルギー・食制限確認</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="showPhrases()">フレーズを表示する</button>

  <div class="phrase-card" id="phraseCard">
    <p class="phrase-scene" id="phraseScene"></p>
    <div id="phraseList"></div>
  </div>

  var LANG_NAMES = {
    en: '英語（English）',
    zh: '中国語（中文）',
    ko: '韓国語（한국어）',
    th: 'タイ語（ภาษาไทย）',

  };

  function showPhrases() {
    var lang = document.getElementById('lang').value;
    var scene = document.getElementById('scene').value;
    if (!lang || !scene) { alert('言語とシーンを選んでください'); return; }

    var data = DB[scene];
    var jaList = data.ja;
    var fList = data[lang];
    var rList = data[lang + '_r'];

    document.getElementById('phraseScene').textContent =
      LANG_NAMES[lang] + ' ／ ' + SCENE_NAMES[scene];

    var html = '';
    for (var i = 0; i < jaList.length; i++) {
      var ja = jaList[i];
      var foreign = fList ? fList[i] : '—';
      var roman = (rList && rList[i] !== foreign) ? rList[i] : '';
      html += '<div class="phrase-item">'
        + '<p class="phrase-ja">【日本語】' + ja + '</p>'
        + '<p class="phrase-foreign">' + escHtml(foreign) + '</p>'
        + (roman ? '<p class="phrase-roman">' + escHtml(roman) + '</p>' : '')
        + '<button class="copy-btn" onclick="copyPhrase(this, ' + JSON.stringify(foreign) + ')">コピー</button>'
        + '</div>';
    }
    document.getElementById('phraseList').innerHTML = html;

    var card = document.getElementById('phraseCard');
    card.style.display = '';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyPhrase(btn, text) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'コピー完了！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
