<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部屋探し比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>部屋探し比較アプリ</h1>
    <p class="subtitle">複数の物件を登録して条件を比べよう</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>物件を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="propName">物件名 <span class="required">*</span></label>
          <input type="text" id="propName" placeholder="例：グリーンマンション101">
        </div>
        <div class="form-group">
          <label for="rent">家賃（円）</label>
          <input type="number" id="rent" placeholder="例：80000" min="0">
        </div>
        <div class="form-group">
          <label for="area">広さ（m²）</label>
          <input type="number" id="area" placeholder="例：25" min="0" step="0.1">
        </div>
        <div class="form-group">
          <label for="age">築年数（年）</label>
          <input type="number" id="age" placeholder="例：5" min="0">
        </div>
        <div class="form-group">
          <label for="walk">駅徒歩（分）</label>
          <input type="number" id="walk" placeholder="例：8" min="0">
        </div>
        <div class="form-group">
          <label for="floor">階数</label>
          <input type="text" id="floor" placeholder="例：3階">
        </div>
        <div class="form-group">
          <label for="layout">間取り</label>
          <input type="text" id="layout" placeholder="例：1K、1LDK">
        </div>
        <div class="form-group full-width">
          <label for="conditions">条件・メモ</label>
          <textarea id="conditions" placeholder="例：ペット可、オートロック、日当たり良好" rows="2"></textarea>
        </div>
        <div class="form-group full-width">
          <label>評価（1〜5）</label>
          <div class="star-input" id="starInput">
            <span class="star" data-val="1">★</span>
            <span class="star" data-val="2">★</span>
            <span class="star" data-val="3">★</span>
            <span class="star" data-val="4">★</span>
            <span class="star" data-val="5">★</span>
          </div>
          <input type="hidden" id="rating" value="0">
        </div>
      </div>
      <button class="btn-add" id="addBtn">追加する</button>
    </section>

    <!-- 並び替え -->
    <section class="sort-section" id="sortSection" style="display:none">
      <label for="sortKey">並び替え：</label>
      <select id="sortKey">
        <option value="added">追加順</option>
        <option value="rent">家賃が安い順</option>
        <option value="area">広さが広い順</option>
        <option value="walk">駅近い順</option>
        <option value="rating">評価が高い順</option>
      </select>
    </section>

    <!-- 物件一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>登録物件 <span id="propCount" class="count-badge">0件</span></h2>
        <button class="btn-clear" id="clearBtn" style="display:none">全件削除</button>
      </div>
      <div id="propList" class="prop-grid"></div>
      <p id="emptyMsg" class="empty-msg">物件をまだ登録していません。上のフォームから追加してください。</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
