<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレス発散タイプ診断｜5問でわかるあなたのリフレッシュ法</title>
  <meta name="description" content="5問の質問に答えるだけで、あなたのストレス発散タイプが4タイプから判定できる無料診断ツール。タイプ別のおすすめリフレッシュ法もすぐ分かります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { margin-bottom: 1.4rem; }
    .question:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.5; }
    .q-num { display: inline-block; background: var(--accent); color: #fff; border-radius: 50%; width: 1.5rem; height: 1.5rem; line-height: 1.5rem; text-align: center; font-size: 0.78rem; margin-right: 0.4rem; }

    .options { display: flex; flex-direction: column; gap: 0.5rem; }
    .opt-label {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .opt-label input { flex-shrink: 0; }
    .opt-text { font-size: 0.92rem; line-height: 1.4; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-emoji { font-size: 3rem; margin-bottom: 0.4rem; line-height: 1.2; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; }

    .tips-card { display: none; }
    .tips-card .card-title { color: var(--accent); }
    .tips-list { list-style: none; padding: 0; margin: 0; }
    .tips-list li {
      padding: 0.7rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list .tips-icon { color: var(--accent); font-weight: 700; flex-shrink: 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ストレス発散タイプ診断</h1>
    <p class="subtitle">5問でわかるあなたのリフレッシュ法・タイプ別おすすめ発散法つき</p>
  </header>

  <div class="card">
    <p class="card-title">5つの質問</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="calc()">タイプを判定する</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="re"></p>
    <p class="result-label">あなたのストレス発散タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card tips-card" id="tips-card">
    <p class="card-title">タイプ別おすすめ発散法</p>
    <ul class="tips-list" id="tips-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省「働く人のメンタルヘルス・ポータルサイト」などの公開資料を参考に、簡易な目安として整理したものです。診断結果は医学的判断ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: 'ストレスが溜まると、どうしたくなる？',
      opts: [
        { t: '体を動かして汗をかきたい', tag: 'A' },
        { t: '何かに没頭して気を紛らわしたい', tag: 'B' },
        { t: 'ゆっくり休んで何もしたくない', tag: 'C' },
        { t: '誰かと話して気持ちを軽くしたい', tag: 'D' }
      ]
    },
    {
      q: '休日の理想の過ごし方は？',
      opts: [
        { t: 'スポーツ・アウトドアでアクティブに', tag: 'A' },
        { t: '映画・読書・趣味に没頭', tag: 'B' },
        { t: '家でだらだら・温泉・睡眠', tag: 'C' },
        { t: '友達や家族とおしゃべり・外食', tag: 'D' }
      ]
    },
    {
      q: 'イライラしたとき、効くのはどれ？',
      opts: [
        { t: 'ジムやランニングで発散', tag: 'A' },
        { t: '創作・ゲーム・推し活で気分転換', tag: 'B' },
        { t: 'ぬるめのお風呂・睡眠でリセット', tag: 'C' },
        { t: '誰かに愚痴を聞いてもらう', tag: 'D' }
      ]
    },
    {
      q: '「あー疲れた」と言うとき、欲しいのは？',
      opts: [
        { t: '体を動かしたい欲求', tag: 'A' },
        { t: '集中して没頭する時間', tag: 'B' },
        { t: '何もしない・寝たい時間', tag: 'C' },
        { t: '気心知れた人との時間', tag: 'D' }
      ]
    },
    {
      q: 'リフレッシュできた！と感じる瞬間は？',
      opts: [
        { t: '汗をかききって気分爽快な時', tag: 'A' },
        { t: '作品やゲームに没頭できた時', tag: 'B' },
        { t: 'ぐっすり眠れた・温まった時', tag: 'C' },
        { t: '人と笑い合って楽しめた時', tag: 'D' }
      ]
    }
  ];

  var TYPES = {
    A: {
      name: '活動型（アクティブ・リリース）',
      emoji: '🏃',
      note: '体を動かしてストレスを汗と一緒に流すタイプ。じっとしているより動いた方が頭がクリアになります。運動・スポーツ・アウトドアで発散するのが最短ルート。',
      tips: [
        '週2〜3回の有酸素運動（ランニング・ウォーキング）',
        'ジム・筋トレで「達成感」を得る',
        '休日は山・海・公園など自然の中へ',
        '通勤・買い物を歩きや自転車に切り替える',
        'ストレッチ・ヨガで体をリセット'
      ]
    },
    B: {
      name: '創造型（フロー・没頭）',
      emoji: '🎨',
      note: '何かに集中・没頭することでストレスを忘れるタイプ。手や頭を動かす作業に入るとスッと楽になります。趣味・創作・推し活で深く沈むのが効果的。',
      tips: [
        '絵・音楽・小説・写真など創作系の趣味',
        '推し活・ライブ・コンサートに没入',
        'ゲーム・パズルで頭を切り替える',
        '料理・お菓子作りで手を動かす',
        '読書・映画で別世界に入り込む'
      ]
    },
    C: {
      name: '癒し型（リカバリー・休息）',
      emoji: '🛁',
      note: 'しっかり休むことでエネルギーを回復するタイプ。無理に動くより、まず体を休めることが最優先。睡眠・温泉・スパなど「受け身の癒し」が効きます。',
      tips: [
        '質の良い睡眠を最優先（7〜8時間目安）',
        'ぬるめのお風呂にゆっくり浸かる',
        '温泉・銭湯・スパでリセット',
        'マッサージ・整体で体をほぐす',
        'カフェや家でのんびり何もしない時間'
      ]
    },
    D: {
      name: '社交型（コネクト・共有）',
      emoji: '☕',
      note: '人と話す・つながることでストレスが軽くなるタイプ。気持ちを言葉にして共有することで整理されます。会話・食事・SNSなど「他者とのつながり」がカギ。',
      tips: [
        '気心知れた友人・家族とおしゃべり',
        'カフェ・居酒屋でゆるい雑談',
        'SNS・LINEでつながりを保つ',
        'コミュニティ・サークル活動への参加',
        '電話・ビデオ通話で離れた人と話す'
      ]
    }
  };

  var STORAGE_KEY = 'stress_release_type_v1';

  function renderQuestions() {
    var html = QUESTIONS.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt-label"><input type="radio" name="q' + i + '" value="' + o.tag + '"><span class="opt-text">' + o.t + '</span></label>';
      }).join('');
      return '<div class="question"><p class="q-text"><span class="q-num">' + (i+1) + '</span>' + q.q + '</p><div class="options">' + opts + '</div></div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  function calc() {
    var counts = { A: 0, B: 0, C: 0, D: 0 };
    var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (sel) { counts[sel.value]++; answered++; }
    }
    if (answered < QUESTIONS.length) {
      alert('すべての質問に答えてください（' + answered + '/' + QUESTIONS.length + '問）');
      return;
    }

    var topTag = 'A', topCount = -1;
    ['A','B','C','D'].forEach(function(t) {
      if (counts[t] > topCount) { topTag = t; topCount = counts[t]; }
    });

    showResult(topTag);
    save(topTag);
  }

  function showResult(tag) {
    var t = TYPES[tag];
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;
    document.getElementById('result').style.display = 'block';

    document.getElementById('tips-list').innerHTML = t.tips.map(function(tip) {
      return '<li><span class="tips-icon">▶</span><span>' + tip + '</span></li>';
    }).join('');
    document.getElementById('tips-card').style.display = 'block';

    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function save(tag) {
    try {
      var answers = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        var sel = document.querySelector('input[name="q' + i + '"]:checked');
        answers.push(sel ? sel.value : null);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ tag: tag, answers: answers, date: new Date().toISOString() }));
    } catch (e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.answers) {
        for (var i = 0; i < data.answers.length; i++) {
          var v = data.answers[i];
          if (!v) continue;
          var el = document.querySelector('input[name="q' + i + '"][value="' + v + '"]');
          if (el) el.checked = true;
        }
      }
      if (data.tag) showResult(data.tag);
    } catch (e) {}
  }

  renderQuestions();
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
