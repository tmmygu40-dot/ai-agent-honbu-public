<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断捨離サポートアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>断捨離サポート</h1>
    <p class="subtitle">持ち物の最終使用日を記録して、使っていないものを見つけよう</p>

    <section class="form-section">
      <div class="form-group">
        <input type="text" id="itemName" placeholder="持ち物の名前" maxlength="50">
      </div>
      <div class="form-group">
        <label for="itemCategory">カテゴリ</label>
        <select id="itemCategory">
          <option value="その他">その他</option>
          <option value="衣類">衣類</option>
          <option value="家電">家電</option>
          <option value="書籍">書籍</option>
          <option value="趣味・スポーツ">趣味・スポーツ</option>
          <option value="キッチン">キッチン</option>
          <option value="日用品">日用品</option>
        </select>
      </div>
      <div class="form-group">
        <label for="lastUsed">最終使用日</label>
        <input type="date" id="lastUsed">
      </div>
      <button id="addBtn" onclick="addItem()">登録する</button>
    </section>

    <section class="filter-section">
      <div class="filter-row">
        <label>並び替え：</label>
        <select id="sortOrder" onchange="renderList()">
          <option value="days_desc">未使用日数（長い順）</option>
          <option value="days_asc">未使用日数（短い順）</option>
          <option value="name">名前順</option>
        </select>
        <select id="filterCategory" onchange="renderList()">
          <option value="all">全カテゴリ</option>
          <option value="衣類">衣類</option>
          <option value="家電">家電</option>
          <option value="書籍">書籍</option>
          <option value="趣味・スポーツ">趣味・スポーツ</option>
          <option value="キッチン">キッチン</option>
          <option value="日用品">日用品</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </section>

    <section class="legend">
      <span class="badge normal">〜89日</span>
      <span class="badge warn">90〜179日</span>
      <span class="badge danger">180日以上</span>
    </section>

    <section id="listSection">
      <p id="emptyMsg" class="empty-msg">まだ持ち物が登録されていません</p>
      <ul id="itemList"></ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
