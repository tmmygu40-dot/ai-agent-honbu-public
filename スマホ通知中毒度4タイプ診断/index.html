<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="通知頻度を質問に答えるだけで、スマホ使用中毒度が4タイプで分かる無料診断ツールです。あなたのスマホ依存レベルをチェックして、使用習慣を見直すきっかけに。">
  <title>📱 スマホ通知中毒度4タイプ診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果別コメント ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- 計測タグ 必須 -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>📱 スマホ通知中毒度4タイプ診断</h1>
    <p class="subtitle">通知の頻度や内容を選ぶだけで、あなたのスマホ依存レベルが分かります。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">質問に答える</p>

    <!-- Q1 -->
    <div class="field">
      <label>1. 1日に受け取る通知の本数は？</label>
      <div style="margin-top: 0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q1" value="0"> 0～5個
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q1" value="1"> 6～15個
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q1" value="2"> 16～50個
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q1" value="3"> 50個以上
        </label>
      </div>
    </div>

    <!-- Q2 -->
    <div class="field">
      <label>2. 深夜（22:00-8:00）の通知設定は？</label>
      <div style="margin-top: 0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q2" value="0"> すべてOFF
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q2" value="1"> 緊急時だけON
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q2" value="2"> アプリごとに設定
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q2" value="3"> すべてON
        </label>
      </div>
    </div>

    <!-- Q3 -->
    <div class="field">
      <label>3. 作業中の通知、どうしてますか？</label>
      <div style="margin-top: 0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q3" value="0"> 見ないようにしてる
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q3" value="1"> ちょっと気になる
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q3" value="2"> よく確認する
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q3" value="3"> すぐに確認しちゃう
        </label>
      </div>
    </div>

    <!-- Q4 -->
    <div class="field">
      <label>4. 通知を無視できる時間は？</label>
      <div style="margin-top: 0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q4" value="0"> 30分以上放置可能
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q4" value="1"> 10～30分くらい
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q4" value="2"> 1～10分が限界
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q4" value="3"> すぐ確認しちゃう
        </label>
      </div>
    </div>

    <!-- Q5 -->
    <div class="field">
      <label>5. スマホ以外に時間を使える時間帯は？</label>
      <div style="margin-top: 0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q5" value="0"> たくさんある
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q5" value="1"> それなりにある
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q5" value="2"> あんまりない
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal; cursor:pointer;">
          <input type="radio" name="q5" value="3"> ほぼない
        </label>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断データ</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 結果別コメント -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、スマートフォン使用習慣に関する研究データと通知設定のベストプラクティスを参考に、目安として作成しています。診断結果は参考情報です。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 診断タイプ定義 ──
  var TYPES = {
    light: {
      name: '通知完全OFF族',
      msg: '通知はほぼ気にしない。スマホ使用も健全に管理されています。',
      emoji: '😌',
      color: 'ok'
    },
    balance: {
      name: '通知選別族',
      msg: '必要な通知は受け取りながら、上手に使い分けています。',
      emoji: '🎯',
      color: 'ok'
    },
    moderate: {
      name: '通知適度族',
      msg: '通知は多めですが、まだ対応できる範囲。設定見直しで改善できます。',
      emoji: '🤔',
      color: 'warn'
    },
    heavy: {
      name: '通知中毒族',
      msg: '通知が多すぎる状態。今がちょうど見直すチャンス！',
      emoji: '🚨',
      color: 'ng'
    }
  };

  var QA = {
    ok: [
      { q: '今のままで大丈夫？', a: '今の習慣がいいペースです。月1回程度、確認して続けるのがおすすめです。' },
      { q: 'もっとスマホ時間を減らすには？', a: 'すでにバランスが取れているので、好きなアプリの通知を活用してもOK。' },
      { q: '習慣を続けるコツは？', a: 'たまに設定を見直して、不要な通知は削除するくらいで十分です。' },
      { q: '友人に勧めるには？', a: '通知を意識的に管理することが、スマホとの付き合い方を改善する第一歩です。' }
    ],
    warn: [
      { q: 'すぐに改善が必要？', a: '焦る必要はありません。今のうちに通知設定を見直すと、後で楽になります。' },
      { q: '何から見直す？', a: 'SNSアプリの通知をまず切って、本当に必要なもの（電話・メールなど）だけONにしてみてください。' },
      { q: 'どのくらい効果が出る？', a: '1週間で変化を感じる人が多いです。落ち着きが戻ってきますよ。' },
      { q: '相談できる窓口は？', a: 'スマホメーカーのサポート、または「デジタルウェルネス」の記事を見ると設定方法が載っています。' }
    ],
    ng: [
      { q: 'パニックになりそう…', a: '大丈夫です。今が気づけたら、改善の準備ができたということ。焦らずやればOK。' },
      { q: '何から始める？', a: '今日：「設定」→「通知」を開く。明日：SNSアプリの通知をOFFにする。これだけで違います。' },
      { q: 'どの通知を切ればいい？', a: 'SNS・ゲーム・ニュースアプリから。電話・メール・カレンダーは残しておくのがおすすめです。' },
      { q: '本当に変わる？', a: '設定を変えた直後は最初、不安かもしれません。でも3日で新しいペースに慣れます。試す価値ありです。' }
    ]
  };

  function calc() {
    // ── ラジオボタンの値を取得 ──
    var answers = [
      document.querySelector('input[name="q1"]:checked'),
      document.querySelector('input[name="q2"]:checked'),
      document.querySelector('input[name="q3"]:checked'),
      document.querySelector('input[name="q4"]:checked'),
      document.querySelector('input[name="q5"]:checked')
    ];

    if (answers.some(a => !a)) {
      showErr('すべての質問に答えてください');
      return;
    }

    // ── スコア計算 ──
    var score = answers.reduce(function(sum, a) {
      return sum + parseInt(a.value);
    }, 0);

    // ── タイプ判定（スコア 0-15） ──
    var type, typeKey;
    if (score <= 3) {
      typeKey = 'light';
    } else if (score <= 7) {
      typeKey = 'balance';
    } else if (score <= 11) {
      typeKey = 'moderate';
    } else {
      typeKey = 'heavy';
    }
    type = TYPES[typeKey];

    // ── localStorage に保存 ──
    try {
      localStorage.setItem('smartphoneAddictionDiagnosis', JSON.stringify({
        type: typeKey,
        score: score,
        date: new Date().toISOString().split('T')[0],
        answers: answers.map(a => parseInt(a.value))
      }));
    } catch (e) {
      // localStorage 使用不可の場合も続行
    }

    // ── 結果表示 ──
    showResult(type.color, type.name, type.msg);
    showDetail([
      ['Q1：1日の通知本数',   ['0-5個', '6-15個', '16-50個', '50個以上'][answers[0].value]],
      ['Q2：深夜の通知設定',   ['すべてOFF', '緊急時のみ', 'アプリ別', 'すべてON'][answers[1].value]],
      ['Q3：作業中の通知対応',  ['見ない', 'ちょっと気になる', 'よく確認', 'すぐ確認'][answers[2].value]],
      ['Q4：無視できる時間',   ['30分以上', '10～30分', '1～10分', 'すぐ'][answers[3].value]],
      ['Q5：スマホ以外の時間',  ['たくさん', 'それなり', 'あんまり', 'ほぼなし'][answers[4].value]],
      ['', ''],
      ['総合スコア',           score + ' / 15点', true]
    ]);
    showQA(type.color, type);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showQA(level, type) {
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = type.emoji;
    document.getElementById('qt').textContent = type.name;
    var list = QA[level === 'ok' ? 'ok' : level === 'warn' ? 'warn' : 'ng'];
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = '';
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + (r[1] || '') + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }

  // ── ページ読み込み時に前回の結果を復元（あれば） ──
  window.addEventListener('load', function() {
    try {
      var saved = localStorage.getItem('smartphoneAddictionDiagnosis');
      if (saved) {
        var data = JSON.parse(saved);
        var typeKey = data.type, type = TYPES[typeKey];
        showResult(type.color, type.name, type.msg);
        var answerTexts = [
          ['0-5個', '6-15個', '16-50個', '50個以上'][data.answers[0]],
          ['すべてOFF', '緊急時のみ', 'アプリ別', 'すべてON'][data.answers[1]],
          ['見ない', 'ちょっと気になる', 'よく確認', 'すぐ確認'][data.answers[2]],
          ['30分以上', '10～30分', '1～10分', 'すぐ'][data.answers[3]],
          ['たくさん', 'それなり', 'あんまり', 'ほぼなし'][data.answers[4]]
        ];
        showDetail([
          ['Q1：1日の通知本数',   answerTexts[0]],
          ['Q2：深夜の通知設定',   answerTexts[1]],
          ['Q3：作業中の通知対応',  answerTexts[2]],
          ['Q4：無視できる時間',   answerTexts[3]],
          ['Q5：スマホ以外の時間',  answerTexts[4]],
          ['', ''],
          ['総合スコア',           data.score + ' / 15点', true],
          ['前回診断日',           data.date]
        ]);
        showQA(type.color, type);
      }
    } catch (e) {
      // localStorage 関連のエラーは無視して続行
    }
  });
  </script>
