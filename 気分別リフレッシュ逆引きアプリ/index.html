<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="気分・体調・目的を選ぶだけで、今の自分にぴったりのリフレッシュ方法をサッと逆引き。所要時間や場所の目安付きで、すぐ実践できます。">
  <title>気分別リフレッシュ逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果エリア ── */
    #results-area {
      max-width: 600px; margin: 0 auto;
    }
    .result-count {
      text-align: center; font-size: 0.88rem; color: var(--text-sub);
      margin-bottom: 1rem; font-weight: 600;
    }
    .refresh-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
      transition: border-color 0.15s;
    }
    .refresh-card:hover { border-color: var(--accent); }
    .refresh-card .rc-head {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem;
    }
    .refresh-card .rc-emoji { font-size: 1.6rem; line-height: 1; }
    .refresh-card .rc-name { font-size: 1rem; font-weight: 800; color: var(--text); }
    .refresh-card .rc-desc {
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; margin-bottom: 0.6rem;
    }
    .refresh-card .rc-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .rc-tag {
      display: inline-block; padding: 0.2rem 0.55rem;
      font-size: 0.72rem; font-weight: 600;
      border-radius: 6px; background: var(--accent-light); color: var(--accent);
    }
    .rc-tag.time { background: #eef2ff; color: #4338ca; }
    .rc-tag.place { background: #f0fdf4; color: #15803d; }
    .rc-tag.level { background: #fef2f2; color: #b91c1c; }
    .refresh-card .btn-fav {
      display: inline-block; margin-top: 0.5rem; padding: 0.3rem 0.7rem;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text-sub); transition: all 0.15s;
    }
    .refresh-card .btn-fav:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-card .btn-fav.saved { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ── お気に入りカード ── */
    #fav-section { max-width: 600px; margin: 1.5rem auto 0; }
    #fav-section .card-title { cursor: pointer; }

    /* ── 結果なし ── */
    .no-result {
      text-align: center; padding: 2rem 1rem;
      font-size: 0.95rem; color: var(--text-sub);
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .refresh-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🌿 気分別リフレッシュ逆引きアプリ</h1>
    <p class="subtitle">今の気分と体調を選ぶだけ。あなたにぴったりのリフレッシュ法をサクッと逆引きします。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">今のあなたの状態を選んでください</p>
    <div class="field">
      <label for="mood">気分</label>
      <select id="mood">
        <option value="">-- 選択してください --</option>
        <option value="イライラ">イライラしている</option>
        <option value="落ち込み">落ち込んでいる</option>
        <option value="不安">不安・心配</option>
        <option value="やる気なし">やる気が出ない</option>
        <option value="もやもや">もやもやする</option>
        <option value="退屈">退屈・マンネリ</option>
      </select>
    </div>
    <div class="field">
      <label for="condition">体調</label>
      <select id="condition">
        <option value="">-- 選択してください --</option>
        <option value="元気">元気</option>
        <option value="普通">普通</option>
        <option value="だるい">だるい・疲れ気味</option>
        <option value="頭痛">頭痛・肩こり</option>
        <option value="眠い">眠い・ぼんやり</option>
      </select>
    </div>
    <div class="field">
      <label for="purpose">目的</label>
      <select id="purpose">
        <option value="">-- 選択してください --</option>
        <option value="リラックス">リラックスしたい</option>
        <option value="気分転換">気分転換したい</option>
        <option value="集中回復">集中力を回復したい</option>
        <option value="ストレス発散">ストレスを発散したい</option>
        <option value="元気出す">元気を出したい</option>
      </select>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-calc" onclick="search()">おすすめを探す</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果エリア -->
  <div id="results-area"></div>

  <!-- お気に入りセクション -->
  <div id="fav-section" style="display:none">
    <div class="card">
      <p class="card-title" onclick="toggleFavList()">⭐ お気に入りリスト（タップで開閉）</p>
      <div id="fav-list"></div>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・スポーツ庁などの健康増進に関する公開情報を参考に、気軽に使えるリフレッシュ法の目安として整理しています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── リフレッシュ方法データベース ──
  var DB = [
    { name: '深呼吸（4-7-8呼吸法）', emoji: '🌬️', desc: '4秒吸って7秒止めて8秒吐く。自律神経を整えてスッと落ち着けます。', time: '1〜3分', place: 'どこでも', level: '簡単', mood: ['イライラ','不安','もやもや'], condition: ['元気','普通','だるい','頭痛','眠い'], purpose: ['リラックス','集中回復'] },
    { name: 'ストレッチ', emoji: '🤸', desc: '首・肩・背中をゆっくり伸ばす。固まった体がほぐれて頭もスッキリ。', time: '5〜10分', place: 'どこでも', level: '簡単', mood: ['イライラ','やる気なし','もやもや','落ち込み'], condition: ['元気','普通','だるい','頭痛'], purpose: ['リラックス','集中回復','ストレス発散'] },
    { name: '散歩（近所を一周）', emoji: '🚶', desc: '外の空気を吸いながら10分歩くだけで気分がリセットされます。', time: '10〜20分', place: '屋外', level: '簡単', mood: ['落ち込み','もやもや','やる気なし','退屈'], condition: ['元気','普通'], purpose: ['気分転換','元気出す','ストレス発散'] },
    { name: '好きな音楽を聴く', emoji: '🎵', desc: 'お気に入りの曲を1〜2曲。アップテンポで元気に、バラードで穏やかに。', time: '5〜10分', place: 'どこでも', level: '簡単', mood: ['落ち込み','イライラ','退屈','もやもや'], condition: ['元気','普通','だるい','眠い'], purpose: ['気分転換','元気出す','リラックス'] },
    { name: '冷たい水で顔を洗う', emoji: '💧', desc: '冷水で顔をパシャッ。眠気もモヤモヤも一瞬でリセット。', time: '1〜2分', place: '室内', level: '簡単', mood: ['眠い','もやもや','やる気なし'], condition: ['だるい','眠い','普通'], purpose: ['集中回復','気分転換'] },
    { name: '紅茶やハーブティーを淹れる', emoji: '☕', desc: 'お湯を沸かして丁寧に淹れる時間そのものが、小さなリセットに。', time: '5〜10分', place: '室内', level: '簡単', mood: ['不安','もやもや','落ち込み','イライラ'], condition: ['元気','普通','だるい','頭痛'], purpose: ['リラックス','気分転換'] },
    { name: 'ぬるめのシャワー', emoji: '🚿', desc: '38〜40℃のぬるめのシャワーで副交感神経をオン。疲労回復に。', time: '10〜15分', place: '自宅', level: '簡単', mood: ['イライラ','もやもや','やる気なし'], condition: ['だるい','頭痛','普通'], purpose: ['リラックス','ストレス発散'] },

    { name: '掃除・片付け（5分だけ）', emoji: '🧹', desc: 'デスク周りだけ5分。目に見える成果が出て達成感＆スッキリ。', time: '5〜10分', place: '室内', level: '簡単', mood: ['もやもや','やる気なし','退屈'], condition: ['元気','普通'], purpose: ['気分転換','集中回復','元気出す'] },
    { name: '瞑想（マインドフルネス）', emoji: '🧘', desc: '目を閉じて呼吸に集中。5分でも頭の中がクリアになります。', time: '5〜15分', place: 'どこでも', level: 'ふつう', mood: ['不安','イライラ','もやもや'], condition: ['元気','普通','だるい','頭痛'], purpose: ['リラックス','集中回復'] },
    { name: '推しの動画を1本だけ見る', emoji: '📱', desc: '好きな動画を「1本だけ」。笑えるもの・癒し系がおすすめ。', time: '5〜10分', place: 'どこでも', level: '簡単', mood: ['落ち込み','退屈','やる気なし'], condition: ['元気','普通','だるい','眠い'], purpose: ['気分転換','元気出す'] },
    { name: 'ガムを噛む', emoji: '🍬', desc: 'リズミカルに噛むことでセロトニン分泌が促進。集中力もアップ。', time: '5〜10分', place: 'どこでも', level: '簡単', mood: ['眠い','やる気なし','もやもや'], condition: ['眠い','だるい','普通'], purpose: ['集中回復','気分転換'] },
    { name: 'ランニング', emoji: '🏃', desc: '15〜30分の軽いジョグ。走り終えた後の爽快感は最強のリフレッシュ。', time: '15〜30分', place: '屋外', level: 'しっかり', mood: ['イライラ','退屈','やる気なし'], condition: ['元気'], purpose: ['ストレス発散','元気出す','気分転換'] },

    { name: '窓を開けて外の空気を吸う', emoji: '🪟', desc: 'たった1分でOK。新鮮な空気が脳に酸素を届けてリフレッシュ。', time: '1〜3分', place: '室内', level: '簡単', mood: ['もやもや','やる気なし','眠い'], condition: ['だるい','眠い','普通','頭痛'], purpose: ['集中回復','気分転換'] },
    { name: 'ぬり絵・落書き', emoji: '🎨', desc: '無心で手を動かすだけでOK。上手い下手は関係なし。脳が休まる。', time: '10〜20分', place: 'どこでも', level: '簡単', mood: ['不安','もやもや','退屈'], condition: ['元気','普通','だるい'], purpose: ['リラックス','気分転換'] },

    { name: 'ツボ押し（手・耳）', emoji: '👐', desc: '合谷（手の親指と人差し指の間）を10秒×3回。頭痛や肩こりに。', time: '2〜5分', place: 'どこでも', level: '簡単', mood: ['イライラ','もやもや'], condition: ['頭痛','だるい','普通'], purpose: ['リラックス','集中回復'] },
    { name: '観葉植物を眺める', emoji: '🌱', desc: '緑を見るだけで副交感神経が優位に。デスクに小さな鉢があれば最高。', time: '1〜3分', place: '室内', level: '簡単', mood: ['不安','もやもや','イライラ'], condition: ['元気','普通','だるい','頭痛','眠い'], purpose: ['リラックス','集中回復'] }
  ];

  // ── お気に入り管理 ──
  var FAV_KEY = 'refresh_app_favs';
  function getFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
  }
  function saveFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
  function toggleFav(name) {
    var favs = getFavs();
    var idx = favs.indexOf(name);
    if (idx >= 0) { favs.splice(idx, 1); } else { favs.push(name); }
    saveFavs(favs);
    renderFavSection();
    // 結果カード内のボタン状態も更新
    document.querySelectorAll('.btn-fav').forEach(function(btn) {
      if (btn.dataset.name === name) {
        btn.classList.toggle('saved', favs.indexOf(name) >= 0);
        btn.textContent = favs.indexOf(name) >= 0 ? '⭐ お気に入り済み' : '☆ お気に入り';
      }
    });
  }

  // ── 検索ロジック ──
  function search() {
    var mood = document.getElementById('mood').value;
    var cond = document.getElementById('condition').value;
    var purp = document.getElementById('purpose').value;

    if (!mood && !cond && !purp) {
      document.getElementById('results-area').innerHTML = '<p class="no-result">少なくとも1つ選択してください</p>';
      return;
    }

    var results = DB.filter(function(item) {
      var match = true;
      if (mood && item.mood.indexOf(mood) < 0) match = false;
      if (cond && item.condition.indexOf(cond) < 0) match = false;
      if (purp && item.purpose.indexOf(purp) < 0) match = false;
      return match;
    });

    var area = document.getElementById('results-area');
    if (results.length === 0) {
      area.innerHTML = '<p class="no-result">条件に合うリフレッシュ法が見つかりませんでした。<br>条件を変えて試してみてください。</p>';
      return;
    }

    var favs = getFavs();
    var html = '<p class="result-count">' + results.length + ' 件のおすすめが見つかりました</p>';
    results.forEach(function(item) {
      var isFav = favs.indexOf(item.name) >= 0;
      html += '<div class="refresh-card">'
        + '<div class="rc-head"><span class="rc-emoji">' + item.emoji + '</span><span class="rc-name">' + item.name + '</span></div>'
        + '<p class="rc-desc">' + item.desc + '</p>'
        + '<div class="rc-tags">'
        + '<span class="rc-tag time">⏱ ' + item.time + '</span>'
        + '<span class="rc-tag place">📍 ' + item.place + '</span>'
        + '<span class="rc-tag level">💡 ' + item.level + '</span>'
        + '</div>'
        + '<button class="btn-fav' + (isFav ? ' saved' : '') + '" data-name="' + item.name.replace(/"/g, '&quot;') + '" onclick="toggleFav(\'' + item.name.replace(/'/g, "\\'") + '\')">' + (isFav ? '⭐ お気に入り済み' : '☆ お気に入り') + '</button>'
        + '</div>';
    });
    area.innerHTML = html;
  }

  // ── お気に入り表示 ──
  var favOpen = true;
  function toggleFavList() { favOpen = !favOpen; renderFavSection(); }
  function renderFavSection() {
    var favs = getFavs();
    var sec = document.getElementById('fav-section');
    var list = document.getElementById('fav-list');
    if (favs.length === 0) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    if (!favOpen) { list.innerHTML = ''; return; }
    var html = '';
    favs.forEach(function(name) {
      var item = DB.find(function(d) { return d.name === name; });
      if (!item) return;
      html += '<div class="refresh-card">'
        + '<div class="rc-head"><span class="rc-emoji">' + item.emoji + '</span><span class="rc-name">' + item.name + '</span></div>'
        + '<p class="rc-desc">' + item.desc + '</p>'
        + '<div class="rc-tags">'
        + '<span class="rc-tag time">⏱ ' + item.time + '</span>'
        + '<span class="rc-tag place">📍 ' + item.place + '</span>'
        + '<span class="rc-tag level">💡 ' + item.level + '</span>'
        + '</div>'
        + '<button class="btn-fav saved" data-name="' + item.name.replace(/"/g, '&quot;') + '" onclick="toggleFav(\'' + item.name.replace(/'/g, "\\'") + '\')">⭐ お気に入り解除</button>'
        + '</div>';
    });
    list.innerHTML = html;
  }

  // 初期表示
  renderFavSection();
  </script>
