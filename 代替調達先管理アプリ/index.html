<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代替調達先管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>代替調達先管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>
  </header>

  <main>
    <!-- 検索 -->
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="品目名で検索..." oninput="renderItems()">
    </section>

    <!-- 品目登録フォーム -->
    <section class="form-section">
      <h2>品目を登録</h2>
      <div class="form-group">
        <label>品目名<span class="req">*</span></label>
        <input type="text" id="itemName" placeholder="例：A4コピー用紙">
      </div>
      <div class="form-group">
        <label>メイン仕入れ先</label>
        <input type="text" id="mainSupplier" placeholder="例：〇〇商事">
      </div>
      <div class="form-group">
        <label>メイン連絡先</label>
        <input type="text" id="mainContact" placeholder="例：03-XXXX-XXXX">
      </div>
      <div class="form-group">
        <label>備考</label>
        <input type="text" id="mainNote" placeholder="例：月末締め・翌末払い">
      </div>
      <button class="btn-primary" onclick="addItem()">品目を追加</button>
    </section>

    <!-- 品目一覧 -->
    <section class="list-section">
      <h2>品目一覧 <span id="itemCount" class="count-badge">0</span></h2>
      <div id="itemList"></div>
    </section>
  </main>

  <!-- 代替仕入れ先追加モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">代替仕入れ先を追加</h3>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>代替仕入れ先名<span class="req">*</span></label>
        <input type="text" id="altSupplier" placeholder="例：△△卸売センター">
      </div>
      <div class="form-group">
        <label>連絡先</label>
        <input type="text" id="altContact" placeholder="例：06-XXXX-XXXX">
      </div>
      <div class="form-group">
        <label>単価・条件</label>
        <input type="text" id="altPrice" placeholder="例：@120円 / 最低発注50個">
      </div>
      <div class="form-group">
        <label>備考</label>
        <input type="text" id="altNote" placeholder="例：納品まで3日">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
        <button class="btn-primary" onclick="addAltSupplier()">追加</button>
      </div>
    </div>
  </div>
  <div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
