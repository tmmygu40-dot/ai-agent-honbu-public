<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代替調達先管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>代替調達先管理</h1>
  </header>

  <main>
    <!-- 検索 -->
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="品目名で検索..." oninput="renderItems()">
    </section>

    <!-- 品目登録フォーム -->
    <section class="form-section">
      <h2>品目を登録</h2>
      <div class="form-group">
        <label>品目名<span class="req">*</span></label>
        <input type="text" id="itemName" placeholder="例：A4コピー用紙">
      </div>
      <div class="form-group">
        <label>メイン仕入れ先</label>
        <input type="text" id="mainSupplier" placeholder="例：〇〇商事">
      </div>
      <div class="form-group">
        <label>メイン連絡先</label>
        <input type="text" id="mainContact" placeholder="例：03-XXXX-XXXX">
      </div>
      <div class="form-group">
        <label>備考</label>
        <input type="text" id="mainNote" placeholder="例：月末締め・翌末払い">
      </div>
      <button class="btn-primary" onclick="addItem()">品目を追加</button>
    </section>

    <!-- 品目一覧 -->
    <section class="list-section">
      <h2>品目一覧 <span id="itemCount" class="count-badge">0</span></h2>
      <div id="itemList"></div>
    </section>
  </main>

  <!-- 代替仕入れ先追加モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">代替仕入れ先を追加</h3>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>代替仕入れ先名<span class="req">*</span></label>
        <input type="text" id="altSupplier" placeholder="例：△△卸売センター">
      </div>
      <div class="form-group">
        <label>連絡先</label>
        <input type="text" id="altContact" placeholder="例：06-XXXX-XXXX">
      </div>
      <div class="form-group">
        <label>単価・条件</label>
        <input type="text" id="altPrice" placeholder="例：@120円 / 最低発注50個">
      </div>
      <div class="form-group">
        <label>備考</label>
        <input type="text" id="altNote" placeholder="例：納品まで3日">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
        <button class="btn-primary" onclick="addAltSupplier()">追加</button>
      </div>
    </div>
  </div>
  <div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
