<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="弁当の具材・色・見た目を入力するだけで、AI画像生成用のプロンプトが自動作成されます。SNS投稿用の新作弁当画像作成を効率化できる無料ツールです。">
  <title>弁当AIプロンプトメーカー｜新作弁当の画像生成を簡単に</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード（プロンプト表示） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.6rem; }
    .prompt-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 1rem;
      font-size: 0.92rem;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      margin-bottom: 0.8rem;
      color: var(--text);
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍙 弁当AIプロンプトメーカー</h1>
    <p class="subtitle">新作弁当の特徴を入力 → AI画像生成用プロンプト自動作成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">弁当の特徴を入力</p>

    <div class="field">
      <label for="ingredients">具材（例：唐揚げ、ブロッコリー、卵焼き）</label>
      <textarea id="ingredients" placeholder="使った具材を、カンマ区切りで入力"></textarea>
      <p class="hint">複数ある場合は「,」で区切ってください</p>
    </div>

    <div class="field">
      <label for="color">色合い・見た目の特徴（例：鮮やか、ボリューミー）</label>
      <input type="text" id="color" placeholder="例：鮮やか、ゴージャス、シンプル">
      <p class="hint">全体の印象を簡潔に</p>
    </div>

    <div class="field">
      <label for="theme">テーマ・雰囲気（例：和風、洋風、イタリアン）</label>
      <input type="text" id="theme" placeholder="例：和風弁当、ヘルシー、豪華">
    </div>

    <div class="field">
      <label for="extra">その他の指定（オプション）</label>
      <input type="text" id="extra" placeholder="例：照明は自然光、背景は白、上からの視点">
      <p class="hint">プロンプトに追加したい条件があれば</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">✨ プロンプトを生成</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <p class="prompt-text" id="promptText"></p>
    <button class="btn-copy" onclick="copyToClipboard()">📋 プロンプトをコピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、AI画像生成サービス（Midjourney, DALL-E等）の効果的なプロンプト作成をサポートします。生成されたプロンプトはご自由にカスタマイズしてご使用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // localStorage からのリロード
  function loadFromStorage() {
    var saved = localStorage.getItem('bento-prompt-data');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        document.getElementById('ingredients').value = data.ingredients || '';
        document.getElementById('color').value = data.color || '';
        document.getElementById('theme').value = data.theme || '';
        document.getElementById('extra').value = data.extra || '';
      } catch(e) {}
    }
  }

  // データを localStorage に保存
  function saveToStorage() {
    var data = {
      ingredients: document.getElementById('ingredients').value,
      color: document.getElementById('color').value,
      theme: document.getElementById('theme').value,
      extra: document.getElementById('extra').value
    };
    localStorage.setItem('bento-prompt-data', JSON.stringify(data));
  }

  // プロンプト生成
  function generatePrompt() {
    var ingredients = document.getElementById('ingredients').value.trim();
    var color = document.getElementById('color').value.trim();
    var theme = document.getElementById('theme').value.trim();
    var extra = document.getElementById('extra').value.trim();

    if (!ingredients && !color && !theme) {
      alert('最低でも「具材」または「色合い」「テーマ」のいずれかを入力してください');
      return;
    }

    // プロンプト構築
    var prompt = 'Japanese bento box';

    if (ingredients) {
      var ingList = ingredients.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
      if (ingList.length > 0) {
        prompt += ', featuring ' + ingList.join(', ');
      }
    }

    if (color) {
      prompt += ', ' + color + ' appearance';
    }

    if (theme) {
      prompt += ', ' + theme + ' style';
    }

    if (extra) {
      prompt += ', ' + extra;
    }

    prompt += ', food photography, appetizing, professional lighting, HD, detailed';

    // 結果表示
    document.getElementById('promptText').textContent = prompt;
    document.getElementById('result').style.display = 'block';

    // localStorage に保存
    saveToStorage();
  }

  // コピー機能
  function copyToClipboard() {
    var text = document.getElementById('promptText').textContent;
    if (!text) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('プロンプトをコピーしました！');
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      alert('プロンプトをコピーしました！');
    } catch(e) {
      alert('コピーに失敗しました。お手数ですが手動でコピーしてください。');
    }
    document.body.removeChild(textarea);
  }

  // ページ読み込み時
  window.addEventListener('DOMContentLoaded', function() {
    loadFromStorage();
  });

  // 入力値が変わったときに自動保存
  document.getElementById('ingredients').addEventListener('change', saveToStorage);
  document.getElementById('color').addEventListener('change', saveToStorage);
  document.getElementById('theme').addEventListener('change', saveToStorage);
  document.getElementById('extra').addEventListener('change', saveToStorage);
  </script>

  <script src="../fav-widget.js"></script>

</body>
</html>
