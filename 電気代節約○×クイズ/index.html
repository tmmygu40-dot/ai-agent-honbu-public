<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気代節約○×クイズ｜10問でわかる節電の正解</title>
  <meta name="description" content="毎月の電気代、本当にムダなくできてる？日常の節電行動が正解かどうかを10問の○×クイズで即判定。あなたの節電タイプもわかる無料アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      font-size: 0.82rem; color: var(--text-sub);
      text-align: right; margin-bottom: 0.6rem;
    }
    .question-text {
      font-size: 1.08rem; font-weight: 700; line-height: 1.55;
      margin-bottom: 1.2rem;
    }

    .om-buttons {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .om-btn {
      padding: 1.1rem 0.5rem;
      font-size: 1.4rem; font-weight: 900;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card); color: var(--text);
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .om-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .om-btn:active { transform: translateY(2px); }
    .om-btn.maru { color: var(--ok); }
    .om-btn.batsu { color: var(--ng); }
    .om-btn:disabled { cursor: default; opacity: 0.6; }

    .judge-card {
      display: none;
      padding: 1.2rem 1.1rem;
      border-radius: var(--radius);
      margin-top: 1rem;
      border: 2px solid var(--border);
    }
    .judge-card.ok   { background: var(--ok-bg);   border-color: var(--ok);   }
    .judge-card.ng   { background: var(--ng-bg);   border-color: var(--ng);   }
    .judge-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .judge-card.ok .judge-label { color: var(--ok); }
    .judge-card.ng .judge-label { color: var(--ng); }
    .judge-text { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.6rem; }
    .judge-card.ok .judge-text { color: var(--ok); }
    .judge-card.ng .judge-text { color: var(--ng); }
    .judge-explain { font-size: 0.92rem; line-height: 1.6; color: var(--text); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 1rem auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji { font-size: 2.6rem; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval { font-size: 1.1rem; font-weight: 800; line-height: 1.4; margin-bottom: 0.5rem; }
    .result-card.ok   .result-eval { color: var(--ok);   }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }
    .best-score { font-size: 0.85rem; color: var(--text-sub); margin-top: 0.7rem; }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .om-buttons { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>電気代節約○×クイズ</h1>
    <p class="subtitle">日常の節電行動、合っているのは？10問で正解を即判定／2026年時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <p class="card-title">問題</p>
    <p class="progress" id="progress">第1問 / 全10問</p>
    <p class="question-text" id="question-text">問題文</p>
    <div class="om-buttons">
      <button class="om-btn maru" id="btn-maru" onclick="answer(true)">○</button>
      <button class="om-btn batsu" id="btn-batsu" onclick="answer(false)">×</button>
    </div>
    <div class="judge-card" id="judge">
      <p class="judge-label" id="judge-label">判定</p>
      <p class="judge-text" id="judge-text"></p>
      <p class="judge-explain" id="judge-explain"></p>
    </div>
    <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQ()">次の問題へ →</button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="re">🎉</p>
    <p class="result-label">あなたの節電スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="rt"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best-score"></p>
  </div>

  <button class="btn-calc" id="retry-btn" style="display:none" onclick="retry()">🔄 もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、経済産業省・資源エネルギー庁などの公開資料や、信頼できる節電情報を参考に、目安として整理しています。実際の節電効果は機器・使用環境によって異なります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── クイズデータ ──
  var QUIZ = [
    {
      q: 'エアコンの設定温度を1℃緩めるだけで、消費電力が約10%も削減できる。',
      a: true,
      explain: '○です。資源エネルギー庁の目安では、冷房28℃・暖房20℃を基準に、設定温度を1℃緩めるだけで約10%程度の電力削減効果があるとされています。'
    },
    {
      q: 'エアコンはこまめにON/OFFを繰り返した方が、つけっぱなしより電気代が安い。',
      a: false,
      explain: '×です。短時間（30分〜1時間程度）の外出ならつけっぱなしの方が省エネな場合が多い。立ち上げ時に大きな電力を使うため、頻繁なON/OFFは逆効果になりやすいです。'
    },
    {
      q: '冷蔵庫は壁から少し離して設置した方が、電気代の節約になる。',
      a: true,
      explain: '○です。冷蔵庫は背面・側面から放熱するため、壁にぴったりつけると放熱効率が落ちて電力消費が増えます。左右と上に数センチ空けるだけで省エネになります。'
    },
    {
      q: '使っていない家電のコンセントを抜く「待機電力カット」は、効果がほぼゼロなのでやらなくていい。',
      a: false,
      explain: '×です。家庭の年間消費電力のうち、待機電力は約5%を占めるとされています。長期間使わない家電のプラグを抜くだけで、年間で数千円の節約になることもあります。'
    },
    {
      q: '白熱電球をLED電球に交換すると、消費電力は約1/5〜1/8まで下がる。',
      a: true,
      explain: '○です。同等の明るさで比較すると、LED電球は白熱電球の約1/5〜1/8の消費電力。寿命も約40倍長く、交換頻度も大幅に減らせます。'
    },
    {
      q: '電気ポットでお湯を保温し続けるより、必要なときに電気ケトルで沸かす方が節電になる。',
      a: true,
      explain: '○です。長時間の保温は意外と電力を使います。1日数回しかお湯を使わないなら、その都度ケトルで沸かす方が消費電力を抑えられるケースが多いです。'
    },
    {
      q: 'テレビは画面の明るさを最大にしている方が、目にも電気代にも優しい。',
      a: false,
      explain: '×です。明るさを最大にすると消費電力が増え、目への負担も大きくなります。室内の明るさに合わせて画面輝度を下げると、節電と目の疲れ対策の両方に効果的です。'
    },
    {
      q: '洗濯機は「お急ぎコース」を使うと、通常コースより節電になる。',
      a: false,
      explain: '×です。お急ぎコースは時短が目的で、必ずしも節電とは限りません。むしろ高速回転で消費電力が増えることもあります。節水・節電なら「まとめ洗い＋通常コース」が基本です。'
    },
    {
      q: '炊飯器の保温機能は、6時間以上使い続けるなら、一度炊いたご飯を冷凍保存して食べる時に電子レンジで温め直す方が電気代が安い。',
      a: true,
      explain: '○です。長時間保温は電力を使い続けるため、4〜6時間以上保温するならラップに包んで冷凍し、必要分だけレンジで温める方が省エネかつ味も保てます。'
    },
    {
      q: '電力会社のプラン見直しや新電力への乗り換えは、面倒なだけで電気代はほとんど変わらない。',
      a: false,
      explain: '×です。家庭の使用パターンに合うプランに変えるだけで、年間で数千円〜1万円以上の差が出るケースもあります。比較サイトを使えば数分で試算可能です。'
    }
  ];

  // ── 状態 ──
  var idx = 0;
  var score = 0;
  var BEST_KEY = 'denki_quiz_best';

  function showQuestion() {
    var item = QUIZ[idx];
    document.getElementById('progress').textContent = '第' + (idx + 1) + '問 / 全' + QUIZ.length + '問';
    document.getElementById('question-text').textContent = item.q;
    document.getElementById('judge').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('btn-maru').disabled = false;
    document.getElementById('btn-batsu').disabled = false;
  }

  function answer(userAns) {
    var item = QUIZ[idx];
    var correct = (userAns === item.a);
    if (correct) score++;
    document.getElementById('btn-maru').disabled = true;
    document.getElementById('btn-batsu').disabled = true;

    var jc = document.getElementById('judge');
    jc.className = 'judge-card ' + (correct ? 'ok' : 'ng');
    jc.style.display = 'block';
    document.getElementById('judge-label').textContent = correct ? '正解！' : '残念…';
    document.getElementById('judge-text').textContent = (item.a ? '答え：○' : '答え：×') + (correct ? '（あなたの回答も合っています）' : '');
    document.getElementById('judge-explain').textContent = item.explain;

    if (idx < QUIZ.length - 1) {
      document.getElementById('next-btn').textContent = '次の問題へ →';
      document.getElementById('next-btn').style.display = 'block';
    } else {
      document.getElementById('next-btn').textContent = '結果を見る →';
      document.getElementById('next-btn').style.display = 'block';
    }
  }

  function nextQ() {
    if (idx < QUIZ.length - 1) {
      idx++;
      showQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      finish();
    }
  }

  function finish() {
    document.getElementById('quiz-card').style.display = 'none';

    var level, evalText, note, emoji;
    if (score >= 9)      { level = 'ok';   emoji = '🏆'; evalText = '節電マスター！';   note = '節電の知識が完璧。家計と地球にやさしい暮らしができています。'; }
    else if (score >= 7) { level = 'ok';   emoji = '😊'; evalText = '節電上級者';       note = 'かなり節電意識が高めです。あと数問の知識を加えれば完璧。'; }
    else if (score >= 5) { level = 'warn'; emoji = '🤔'; evalText = '節電中級';         note = '基本はOK。間違えた問題の解説を読んで、もうひと工夫できそう。'; }
    else if (score >= 3) { level = 'warn'; emoji = '💡'; evalText = '節電初級';         note = '思い込みでやっていた節電行動があるかも。解説をぜひチェック。'; }
    else                 { level = 'ng';   emoji = '😱'; evalText = '節電見直し中';     note = '間違いやすいポイントが多めの結果。今日から1つずつ変えていきましょう。'; }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('re').textContent = emoji;
    document.getElementById('rv').textContent = score + ' / ' + QUIZ.length + ' 点';
    document.getElementById('rt').textContent = evalText;
    document.getElementById('rn').textContent = note;

    // 最高スコア
    var best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    if (score > best) {
      localStorage.setItem(BEST_KEY, String(score));
      document.getElementById('best-score').textContent = '🎉 最高スコア更新！(' + score + ' 点)';
    } else {
      document.getElementById('best-score').textContent = '最高スコア：' + best + ' 点';
    }

    document.getElementById('retry-btn').style.display = 'block';
  }

  function retry() {
    idx = 0;
    score = 0;
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 初期表示
  showQuestion();
  </script>

</body>
