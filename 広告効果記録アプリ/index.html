<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>広告効果記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>📊 広告効果記録</h1>
  </header>

  <main>
    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>配布記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">配布日</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="area">エリア名</label>
          <input type="text" id="area" placeholder="例：渋谷区〇〇町">
        </div>
        <div class="form-group">
          <label for="distributed">配布部数</label>
          <input type="number" id="distributed" min="0" placeholder="例：500">
        </div>
        <div class="form-group">
          <label for="response">反響数</label>
          <input type="number" id="response" min="0" placeholder="例：12">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- エリア別集計 -->
    <section class="summary-section">
      <h2>エリア別集計</h2>
      <div id="summaryList" class="summary-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="records-section">
      <div class="section-header">
        <h2>配布記録一覧</h2>
        <span id="totalCount" class="total-count">0件</span>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
