<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カウンター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="app">

    <header class="header">
      <h1>カウンター</h1>
    </header>

    <div class="display-area">
      <div class="count" id="count">0</div>
    </div>

    <div class="controls">
      <button class="btn btn-minus" id="minusBtn">－</button>
      <button class="btn btn-reset" id="resetBtn">リセット</button>
      <button class="btn btn-plus"  id="plusBtn">＋</button>
    </div>

    <div class="history-area">
      <p class="history-label">履歴</p>
      <ul class="history-list" id="historyList"></ul>
    </div>

  </div>

  <script>
    'use strict';

    const STORAGE_KEY = 'counter-value';

    document.addEventListener('DOMContentLoaded', function () {
      // ===== 要素取得 =====
      const countEl     = document.getElementById('count');
      const plusBtn     = document.getElementById('plusBtn');
      const minusBtn    = document.getElementById('minusBtn');
      const resetBtn    = document.getElementById('resetBtn');
      const historyList = document.getElementById('historyList');

      // ===== 状態 =====
      let count = load();

      // ===== 初期描画 =====
      render();

      // ===== イベント =====
      plusBtn.addEventListener('click', function () {
        count++;
        addHistory('＋1', count);
        save();
        render();
        bump();
      });

      minusBtn.addEventListener('click', function () {
        count--;
        addHistory('－1', count);
        save();
        render();
        bump();
      });

      resetBtn.addEventListener('click', function () {
        if (count === 0) return;
        const prev = count;
        count = 0;
        addHistory('リセット', 0, prev);
        save();
        render();
      });

      // ===== 描画 =====
      function render() {
        countEl.textContent = count;
        countEl.className = 'count ' + (count > 0 ? 'positive' : count < 0 ? 'negative' : 'zero');
      }

      // ===== アニメーション =====
      function bump() {
        countEl.classList.remove('bump');
        void countEl.offsetWidth; // reflow
        countEl.classList.add('bump');
        countEl.addEventListener('transitionend', function () {
          countEl.classList.remove('bump');
        }, { once: true });
      }

      // ===== 履歴 =====
      function addHistory(op, val, prev) {
        const li = document.createElement('li');
        li.className = 'history-item';

        const opClass = op === '＋1' ? 'h-plus' : op === '－1' ? 'h-minus' : 'h-reset';
        const detail  = (prev !== undefined)
          ? prev + ' → 0'
          : '→ ' + val;

        li.innerHTML = '<span class="h-op ' + opClass + '">' + op + '</span><span class="h-val">' + detail + '</span>';

        historyList.insertBefore(li, historyList.firstChild);

        // 最大20件まで
        while (historyList.children.length > 20) {
          historyList.removeChild(historyList.lastChild);
        }
      }

      // ===== localStorage =====
      function save() {
        localStorage.setItem(STORAGE_KEY, count);
      }

      function load() {
        const v = localStorage.getItem(STORAGE_KEY);
        return v !== null ? parseInt(v, 10) : 0;
      }
    });
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
