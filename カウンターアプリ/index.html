<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カウンター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="app">

    <header class="header">
      <h1>カウンター</h1>
    </header>

    <div class="display-area">
      <div class="count" id="count">0</div>
    </div>

    <div class="controls">
      <button class="btn btn-minus" id="minusBtn">－</button>
      <button class="btn btn-reset" id="resetBtn">リセット</button>
      <button class="btn btn-plus"  id="plusBtn">＋</button>
    </div>

    <div class="history-area">
      <p class="history-label">履歴</p>
      <ul class="history-list" id="historyList"></ul>
    </div>

  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
