<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材別献立提案アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .category-label {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.5rem; margin-top: 0.8rem;
    }
    .category-label:first-child { margin-top: 0; }

    .ingredient-grid {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 0.3rem;
    }

    .ing-btn {
      padding: 0.38rem 0.75rem;
      font-size: 0.88rem; font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--bg); color: var(--text);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ing-btn.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }
    .ing-btn:active { opacity: 0.75; }

    .selected-bar {
      font-size: 0.8rem; color: var(--text-sub);
      margin-bottom: 0.5rem; min-height: 1.4em;
    }
    .selected-bar span { color: var(--accent); font-weight: 700; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.7rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.6rem;
      font-size: 0.88rem; font-weight: 600;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .result-section { display: none; }

    .result-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.75rem;
      max-width: 600px;
    }
    .result-num {
      font-size: 0.7rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; margin-bottom: 0.3rem;
    }
    .result-name {
      font-size: 1.1rem; font-weight: 900; margin-bottom: 0.4rem;
    }
    .result-desc { font-size: 0.84rem; color: var(--text-sub); line-height: 1.6; }
    .result-match {
      font-size: 0.76rem; color: var(--ok); font-weight: 600;
      margin-top: 0.4rem;
    }

    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .no-result {
      text-align: center; color: var(--text-sub);
      padding: 1.5rem; font-size: 0.9rem; max-width: 600px; margin: 0 auto;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍳 食材別献立提案</h1>
    <p class="subtitle">冷蔵庫の余り食材を選ぶだけで今日の献立を3つ提案します</p>
  </header>

  <div class="card">
    <p class="card-title">食材を選んでください（複数OK）</p>

    <p class="category-label">🥩 肉・魚</p>
    <div class="ingredient-grid" id="cat-meat"></div>

    <p class="category-label">🥚 卵・大豆</p>
    <div class="ingredient-grid" id="cat-egg"></div>

    <p class="category-label">🥦 野菜</p>
    <div class="ingredient-grid" id="cat-veg"></div>

    <p class="category-label">🍚 主食・その他</p>
    <div class="ingredient-grid" id="cat-starch"></div>

    <p class="selected-bar" id="selected-bar">選択中：なし</p>
  </div>

  <button class="btn-calc" onclick="propose()">献立を提案する</button>
  <button class="btn-reset" onclick="resetAll()">選択をリセット</button>

  <div class="result-section" id="result-section">
    <div id="result-list"></div>
    <button class="btn-retry" onclick="retry()">別の候補を見る</button>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script src="../fav-widget.js"></script>

  <script>
  var CATEGORIES = {
    'cat-meat':   ['鶏もも肉','鶏むね肉','豚バラ','豚こま','牛肉','ひき肉','ベーコン','ウインナー','鮭','さば','ツナ缶','イカ','エビ'],
    'cat-egg':    ['卵','豆腐','納豆','厚揚げ','油揚げ'],
    'cat-veg':    ['キャベツ','玉ねぎ','にんじん','じゃがいも','なす','ピーマン','トマト','きゅうり','ほうれん草','もやし','ネギ','大根','ブロッコリー','きのこ','ごぼう','れんこん'],
    'cat-starch': ['ご飯','パスタ','うどん','そば','パン','豆苗','こんにゃく','チーズ']
  };

  var RECIPES = [
    { name:'鶏の照り焼き', desc:'鶏もも肉を甘辛いタレで焼きます。ご飯が進む定番おかずです。', key:['鶏もも肉'] },
    { name:'鶏むね肉の塩麹焼き', desc:'鶏むね肉をシンプルに焼きます。ご飯・パンどちらにも合います。', key:['鶏むね肉'] },
    { name:'豚バラキャベツ炒め', desc:'豚バラとキャベツをさっと炒め、塩コショウで仕上げます。', key:['豚バラ','キャベツ'] },
    { name:'豚こまと玉ねぎの生姜焼き', desc:'豚こまと玉ねぎを生姜醤油で炒める定番丼おかずです。', key:['豚こま','玉ねぎ'] },
    { name:'ハンバーグ', desc:'ひき肉と玉ねぎをこねて焼きます。デミグラスソースで仕上げます。', key:['ひき肉','玉ねぎ'] },
    { name:'牛肉と野菜の炒め物', desc:'牛肉とお好みの野菜を炒め、オイスターソースで味付けします。', key:['牛肉'] },
    { name:'鮭のムニエル', desc:'鮭を小麦粉をまぶしてバターで焼きます。レモンを添えてどうぞ。', key:['鮭'] },
    { name:'さばの味噌煮', desc:'さばを味噌・みりん・砂糖で煮付けた和食の定番です。', key:['さば'] },
    { name:'ツナとほうれん草の和え物', desc:'ほうれん草をゆでてツナ缶と和える簡単副菜です。', key:['ツナ缶','ほうれん草'] },
    { name:'ベーコンエッグ', desc:'ベーコンと卵をフライパンで焼く朝食・夕食の定番です。', key:['ベーコン','卵'] },
    { name:'ウインナーと野菜炒め', desc:'ウインナーと余り野菜をさっと炒めるスピードおかずです。', key:['ウインナー'] },
    { name:'イカ大根', desc:'イカと大根を醤油・みりんで煮込んだ和食の定番です。', key:['イカ','大根'] },
    { name:'エビチリ', desc:'エビをチリソースで炒めます。豆腐を加えてもおいしいです。', key:['エビ'] },
    { name:'卵焼き', desc:'だし入りの甘い卵焼きです。弁当や副菜に最適です。', key:['卵'] },
    { name:'スクランブルエッグとトマト炒め', desc:'卵とトマトを炒めた中国家庭料理の定番です。', key:['卵','トマト'] },
    { name:'豆腐の味噌汁', desc:'豆腐とネギ（またはわかめ）を使った基本の味噌汁です。', key:['豆腐'] },
    { name:'麻婆豆腐', desc:'ひき肉と豆腐を豆板醤・味噌で炒め煮にします。ご飯に最高です。', key:['ひき肉','豆腐'] },
    { name:'納豆ご飯', desc:'納豆を卵・ネギと混ぜてご飯にのせる定番です。', key:['納豆','卵','ご飯'] },
    { name:'厚揚げの煮物', desc:'厚揚げをだし醤油で煮ます。大根やこんにゃくを加えてもOK。', key:['厚揚げ'] },
    { name:'油揚げとほうれん草の炒め煮', desc:'油揚げとほうれん草をだし醤油でさっと炒め煮にします。', key:['油揚げ','ほうれん草'] },
    { name:'コールスロー', desc:'キャベツとにんじんをマヨネーズで和えるサラダです。', key:['キャベツ','にんじん'] },
    { name:'ポテトサラダ', desc:'じゃがいも・にんじん・玉ねぎをマヨネーズで和えます。', key:['じゃがいも','にんじん','玉ねぎ'] },
    { name:'なすの味噌炒め', desc:'なすを味噌・みりんで炒めます。ご飯に合う甘辛おかずです。', key:['なす'] },
    { name:'ピーマンの肉詰め', desc:'ピーマンにひき肉を詰めて焼きます。甘辛ソースで仕上げます。', key:['ピーマン','ひき肉'] },
    { name:'ミネストローネ', desc:'トマト・野菜を煮込んだイタリア風スープです。', key:['トマト','玉ねぎ','にんじん'] },
    { name:'きゅうりの浅漬け', desc:'きゅうりを塩・昆布で漬けた簡単副菜です。', key:['きゅうり'] },
    { name:'もやし炒め', desc:'もやしをニンニク・ごま油で炒める超時短おかずです。', key:['もやし'] },
    { name:'ほうれん草のおひたし', desc:'ほうれん草をゆでてだし醤油・鰹節で和えます。', key:['ほうれん草'] },
    { name:'ネギ入り玉子スープ', desc:'卵をといてネギと一緒にスープにします。体が温まります。', key:['卵','ネギ'] },
    { name:'大根の煮物', desc:'大根をだし醤油でじっくり煮込みます。定番の和食副菜です。', key:['大根'] },
    { name:'ブロッコリーとベーコンの炒め物', desc:'ブロッコリーとベーコンをガーリックで炒めます。', key:['ブロッコリー','ベーコン'] },
    { name:'きのこの炊き込みご飯', desc:'きのこ・にんじんをだし醤油で炊き込みます。', key:['きのこ','にんじん','ご飯'] },
    { name:'ごぼうと豚のきんぴら', desc:'ごぼうと豚こまを甘辛く炒めます。お弁当にも最適です。', key:['ごぼう','豚こま'] },
    { name:'れんこんのはさみ揚げ', desc:'れんこんにひき肉を挟んで揚げます。食感が楽しい一品です。', key:['れんこん','ひき肉'] },
    { name:'カルボナーラ', desc:'パスタ・卵・チーズ・ベーコンで作るクリーミーな一品です。', key:['パスタ','卵','チーズ','ベーコン'] },
    { name:'ミートソーススパゲッティ', desc:'ひき肉・玉ねぎ・トマトで作るミートソースです。', key:['パスタ','ひき肉','トマト','玉ねぎ'] },
    { name:'ツナパスタ', desc:'ツナ缶とにんにく・オリーブオイルで和えるシンプルパスタです。', key:['パスタ','ツナ缶'] },
    { name:'鍋焼きうどん', desc:'うどんに卵・ネギ・ウインナーなどを入れて煮込みます。', key:['うどん','卵'] },
    { name:'そばとつけ汁', desc:'茹でたそばにネギをのせ、だし汁でいただきます。', key:['そば','ネギ'] },
    { name:'フレンチトースト', desc:'パン・卵・牛乳で作るスイートな朝食または軽食です。', key:['パン','卵'] },
    { name:'こんにゃくのピリ辛炒め', desc:'こんにゃくをごま油・唐辛子・醤油で炒めます。低カロリーおかずです。', key:['こんにゃく'] },
    { name:'チーズトースト', desc:'パンにチーズをのせてトーストします。シンプルで満足感があります。', key:['パン','チーズ'] },
    { name:'豆苗炒め', desc:'豆苗をにんにく・ごま油でさっと炒めます。栄養満点の時短副菜です。', key:['豆苗'] },
    { name:'親子丼', desc:'鶏もも肉と卵・玉ねぎをだしで煮てご飯にかけます。', key:['鶏もも肉','卵','玉ねぎ','ご飯'] },
    { name:'チャーハン', desc:'ご飯・卵・ネギ・ウインナーをフライパンで炒めます。', key:['ご飯','卵','ネギ'] },
    { name:'肉じゃが', desc:'じゃがいも・にんじん・玉ねぎ・豚こまをだし醤油で煮ます。', key:['じゃがいも','にんじん','玉ねぎ','豚こま'] },
    { name:'カレーライス', desc:'じゃがいも・にんじん・玉ねぎを煮込んだ定番カレーです。', key:['じゃがいも','にんじん','玉ねぎ','ご飯'] },
    { name:'豚汁', desc:'豚こま・大根・にんじん・こんにゃくを味噌で煮たボリューム汁物です。', key:['豚こま','大根','にんじん','こんにゃく'] },
    { name:'野菜たっぷり味噌汁', desc:'冷蔵庫の余り野菜を全部入れた具だくさん味噌汁です。', key:['玉ねぎ','豆腐','ネギ'] },
    { name:'ツナとキャベツの蒸し炒め', desc:'キャベツとツナを蒸し炒めにします。旨みが出て美味しいです。', key:['ツナ缶','キャベツ'] },
    { name:'エビ炒め', desc:'エビとブロッコリーをにんにく・バターで炒めます。', key:['エビ','ブロッコリー'] },
    { name:'ほうれん草のパスタ', desc:'ほうれん草・ベーコン・にんにくをオリーブオイルで炒め和えます。', key:['パスタ','ほうれん草','ベーコン'] },
    { name:'ネギと豆腐の炒め物', desc:'ネギと豆腐を醤油・ごま油で炒めます。シンプルで毎日食べられます。', key:['ネギ','豆腐'] }
  ];

  var selectedIngredients = [];
  var lastShownIndexes = [];

  // ページ読み込み時にボタンを生成
  window.addEventListener('DOMContentLoaded', function() {
    Object.keys(CATEGORIES).forEach(function(catId) {
      var container = document.getElementById(catId);
      CATEGORIES[catId].forEach(function(ing) {
        var btn = document.createElement('button');
        btn.className = 'ing-btn';
        btn.textContent = ing;
        btn.onclick = function() { toggleIngredient(ing, btn); };
        container.appendChild(btn);
      });
    });
    loadFromStorage();
  });

  function toggleIngredient(ing, btn) {
    var idx = selectedIngredients.indexOf(ing);
    if (idx === -1) {
      selectedIngredients.push(ing);
      btn.classList.add('selected');
    } else {
      selectedIngredients.splice(idx, 1);
      btn.classList.remove('selected');
    }
    updateBar();
    saveToStorage();
  }

  function updateBar() {
    var bar = document.getElementById('selected-bar');
    if (selectedIngredients.length === 0) {
      bar.innerHTML = '選択中：なし';
    } else {
      bar.innerHTML = '選択中：<span>' + selectedIngredients.join('、') + '</span>';
    }
  }

  function propose() {
    if (selectedIngredients.length === 0) {
      alert('食材を1つ以上選んでください。');
      return;
    }
    lastShownIndexes = [];
    showProposals();
  }

  function retry() {
    showProposals();
  }

  function showProposals() {
    // スコアを計算
    var scored = RECIPES.map(function(r, i) {
      var match = r.key.filter(function(k) { return selectedIngredients.indexOf(k) !== -1; }).length;
      return { idx: i, recipe: r, match: match };
    });

    // マッチ数0は後回し
    scored.sort(function(a, b) {
      if (b.match !== a.match) return b.match - a.match;
      return Math.random() - 0.5;
    });

    // 前回表示した候補を除外してから3件選ぶ
    var candidates = scored.filter(function(s) { return lastShownIndexes.indexOf(s.idx) === -1; });
    if (candidates.length < 3) {
      // 全候補が底をついたらリセット
      lastShownIndexes = [];
      candidates = scored;
    }

    var chosen = candidates.slice(0, 3);
    lastShownIndexes = chosen.map(function(c) { return c.idx; });

    var html = '';
    chosen.forEach(function(c, i) {
      var matchText = c.match > 0
        ? '今ある食材 ' + c.match + '種類を使えます'
        : '新たに食材を追加すると作れます';
      html += '<div class="result-card">'
           +  '<p class="result-num">献立 ' + (i+1) + '</p>'
           +  '<p class="result-name">' + c.recipe.name + '</p>'
           +  '<p class="result-desc">' + c.recipe.desc + '</p>'
           +  '<p class="result-match">' + matchText + '</p>'
           +  '</div>';
    });

    document.getElementById('result-list').innerHTML = html;
    var sec = document.getElementById('result-section');
    sec.style.display = '';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetAll() {
    selectedIngredients = [];
    document.querySelectorAll('.ing-btn').forEach(function(btn) {
      btn.classList.remove('selected');
    });
    updateBar();
    document.getElementById('result-section').style.display = 'none';
    saveToStorage();
  }

  function saveToStorage() {
    try { localStorage.setItem('献立提案_選択食材', JSON.stringify(selectedIngredients)); } catch(e) {}
  }

  function loadFromStorage() {
    try {
      var saved = localStorage.getItem('献立提案_選択食材');
      if (!saved) return;
      var arr = JSON.parse(saved);
      if (!Array.isArray(arr)) return;
      arr.forEach(function(ing) {
        var btn = Array.from(document.querySelectorAll('.ing-btn')).find(function(b) { return b.textContent === ing; });
        if (btn) { selectedIngredients.push(ing); btn.classList.add('selected'); }
      });
      updateBar();
    } catch(e) {}
  }
  </script>

</body>
