<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蓄電池採算チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .row2 { display: flex; gap: 0.8rem; }
    .row2 .field { flex: 1; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
    .result-badge {
      display: inline-block; margin-bottom: 0.6rem;
      padding: 0.25rem 0.9rem; border-radius: 20px;
      font-size: 0.8rem; font-weight: 700;
    }
    .ok   .result-badge { background: var(--ok);   color: #fff; }
    .warn .result-badge { background: var(--warn); color: #fff; }
    .ng   .result-badge { background: var(--ng);   color: #fff; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 判定基準 ── */
    .criteria {
      max-width: 600px; margin: 0 auto 1rem;
      font-size: 0.78rem; color: var(--text-sub);
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    .criteria span {
      padding: 0.25rem 0.7rem; border-radius: 20px;
      font-weight: 600;
    }
    .criteria .c-ok   { background: var(--ok-bg);   color: var(--ok); }
    .criteria .c-warn { background: var(--warn-bg); color: var(--warn); }
    .criteria .c-ng   { background: var(--ng-bg);   color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔋 蓄電池採算チェッカー</h1>
    <p class="subtitle">導入費用と電気代削減効果から投資回収年数を即計算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">導入費用</p>
    <div class="field">
      <label for="cost">蓄電池の導入費用（円）</label>
      <input type="number" id="cost" placeholder="例: 1500000" min="0" inputmode="numeric">
      <p class="hint">設置工事費込みの総額</p>
    </div>
    <div class="field">
      <label for="subsidy">補助金・助成金（円）</label>
      <input type="number" id="subsidy" placeholder="例: 200000" min="0" inputmode="numeric" value="0">
      <p class="hint">受け取れる補助金がない場合は0</p>
    </div>
  </div>

  <div class="card">
    <p class="card-title">電気代削減効果</p>
    <div class="field">
      <label for="saving">年間の電気代削減額（円/年）</label>
      <input type="number" id="saving" placeholder="例: 120000" min="0" inputmode="numeric">
      <p class="hint">売電収入がある場合はその分も含めてください</p>
    </div>
    <div class="row2">
      <div class="field">
        <label for="capacity">蓄電容量（kWh）※任意</label>
        <input type="number" id="capacity" placeholder="例: 9.8" min="0" step="0.1" inputmode="decimal">
      </div>
      <div class="field">
        <label for="lifespan">想定使用年数（年）※任意</label>
        <input type="number" id="lifespan" placeholder="例: 15" min="1" max="30" inputmode="numeric">
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">投資回収年数を計算する</button>

  <!-- 判定基準 -->
  <div class="criteria">
    <span class="c-ok">◎ 10年以内：お得</span>
    <span class="c-warn">○ 15年以内：まあまあ</span>
    <span class="c-ng">△ 16年以上：慎重に検討</span>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">投資回収年数</p>
    <p class="result-badge" id="rb">—</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">試算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'chikudenchi_checker';

  function calc() {
    var cost     = parseFloat(document.getElementById('cost').value);
    var subsidy  = parseFloat(document.getElementById('subsidy').value) || 0;
    var saving   = parseFloat(document.getElementById('saving').value);
    var capacity = parseFloat(document.getElementById('capacity').value) || null;
    var lifespan = parseFloat(document.getElementById('lifespan').value) || null;

    if (isNaN(cost) || cost <= 0) { alert('導入費用を入力してください'); return; }
    if (isNaN(saving) || saving <= 0) { alert('年間削減額を入力してください'); return; }

    var netCost   = cost - subsidy;          // 実質負担額
    var payback   = netCost / saving;        // 投資回収年数
    var paybackRound = Math.round(payback * 10) / 10;

    // 判定
    var level, badge, note;
    if (payback <= 10) {
      level = 'ok';
      badge = '◎ お得';
      note  = '10年以内で元が取れる見込みです。蓄電池の寿命（一般的に10〜15年）を考えると十分なメリットがあります。';
    } else if (payback <= 15) {
      level = 'warn';
      badge = '○ まあまあ';
      note  = '15年以内で元が取れる見込みです。蓄電池の寿命ギリギリですが、停電時の安心感や環境メリットも考慮できます。';
    } else {
      level = 'ng';
      badge = '△ 慎重に検討';
      note  = '回収に15年以上かかる見込みです。補助金の拡充や電気代の上昇次第で変わることもあります。慎重に判断しましょう。';
    }

    // 寿命内での総節約額
    var lifetimeSaving = lifespan ? saving * lifespan : null;
    var lifetimeProfit = lifetimeSaving !== null ? lifetimeSaving - netCost : null;

    showResult(level, badge, paybackRound + ' 年', note);

    // 内訳
    var rows = [
      ['導入費用',   '¥' + fmt(cost)],
      ['補助金',     '▲ ¥' + fmt(subsidy)],
      ['実質負担額', '¥' + fmt(netCost), true],
      ['年間電気代削減額', '¥' + fmt(saving) + ' / 年'],
      ['投資回収年数', paybackRound + ' 年', true],
    ];
    if (capacity) rows.push(['蓄電容量', capacity + ' kWh']);
    if (lifespan) {
      rows.push(['想定使用年数', lifespan + ' 年']);
      rows.push(['想定期間の総節約額', '¥' + fmt(lifetimeSaving)]);
      rows.push(['想定期間の純利益', (lifetimeProfit >= 0 ? '+' : '') + '¥' + fmt(lifetimeProfit), lifetimeProfit >= 0]);
    }
    showDetail(rows);

    // localStorage保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        cost: cost, subsidy: subsidy, saving: saving,
        capacity: document.getElementById('capacity').value,
        lifespan: document.getElementById('lifespan').value
      }));
    } catch(e) {}
  }

  function showResult(level, badge, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rb').textContent = badge;
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 前回の入力を復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved) return;
      if (saved.cost)     document.getElementById('cost').value     = saved.cost;
      if (saved.subsidy)  document.getElementById('subsidy').value  = saved.subsidy;
      if (saved.saving)   document.getElementById('saving').value   = saved.saving;
      if (saved.capacity) document.getElementById('capacity').value = saved.capacity;
      if (saved.lifespan) document.getElementById('lifespan').value = saved.lifespan;
    } catch(e) {}
  })();
  </script>

<script src="../fav-widget.js"></script>
</body>
</html>
