<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="残ローン額・金利・繰上返済額を入力するだけで、期間短縮型と返済額軽減型のメリットを即比較。どちらがお得か1秒で分かる住宅ローン繰上返済シミュレーターです。">
  <title>繰上返済メリット診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 比較カード ── */
    .compare-wrap {
      display: none;
      gap: 0.8rem;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .compare-card {
      flex: 1;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1rem;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .compare-card.recommended {
      border-color: var(--ok);
      background: var(--ok-bg);
    }
    .compare-card .compare-type {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--text-sub); margin-bottom: 0.5rem;
    }
    .compare-card.recommended .compare-type { color: var(--ok); }
    .compare-card .compare-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      background: var(--ok); color: #fff;
      padding: 0.15rem 0.5rem; border-radius: 6px; margin-bottom: 0.5rem;
    }
    .compare-card .compare-main {
      font-size: 1.3rem; font-weight: 900; color: var(--text); margin-bottom: 0.3rem;
    }
    .compare-card.recommended .compare-main { color: var(--ok); }
    .compare-card .compare-sub {
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .compare-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    @media (min-width: 500px) {
      .compare-wrap { display: none; flex-direction: row; }
      .compare-wrap.show { display: flex; }
    }
    @media (max-width: 499px) {
      .compare-wrap.show { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🏦 繰上返済メリット診断アプリ</h1>
    <p class="subtitle">繰上額を入れるだけで「期間短縮」と「返済減額」どっちがお得か即比較できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ローン情報を入力</p>
    <div class="field">
      <label for="balance">ローン残高</label>
      <input type="number" id="balance" placeholder="例: 20000000" min="0" step="10000">
      <p class="hint">現在のローン残高（円）</p>
    </div>
    <div class="field">
      <label for="rate">年利（%）</label>
      <input type="number" id="rate" placeholder="例: 1.2" min="0" step="0.01">
      <p class="hint">固定金利・変動金利いずれも現在の適用金利</p>
    </div>
    <div class="field">
      <label for="months">残り返済期間（年）</label>
      <input type="number" id="months" placeholder="例: 25" min="1" step="1">
      <p class="hint">残りの返済年数</p>
    </div>
    <div class="field">
      <label for="prepay">繰上返済額</label>
      <input type="number" id="prepay" placeholder="例: 1000000" min="0" step="10000">
      <p class="hint">今回まとめて返す額（円）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較カード -->
  <div class="compare-wrap" id="compare">
    <div class="compare-card" id="card-short">
      <p class="compare-type">📅 期間短縮型</p>
      <p class="compare-main" id="short-main">—</p>
      <div class="compare-sub" id="short-sub"></div>
    </div>
    <div class="compare-card" id="card-reduce">
      <p class="compare-type">💰 返済額軽減型</p>
      <p class="compare-main" id="reduce-main">—</p>
      <div class="compare-sub" id="reduce-sub"></div>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">詳細比較</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、金融庁・住宅金融支援機構などの公開情報を参考に、目安として使いやすく整理しています。実際の返済条件は金融機関にご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  function calc() {
    var balance = parseFloat(document.getElementById('balance').value);
    var rate    = parseFloat(document.getElementById('rate').value);
    var years   = parseFloat(document.getElementById('months').value);
    var prepay  = parseFloat(document.getElementById('prepay').value);

    if (isNaN(balance) || isNaN(rate) || isNaN(years) || isNaN(prepay)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (balance <= 0) { showErr('ローン残高は0より大きい値を入力してください'); return; }
    if (rate < 0) { showErr('金利は0以上を入力してください'); return; }
    if (years <= 0) { showErr('返済期間は1年以上を入力してください'); return; }
    if (prepay <= 0) { showErr('繰上返済額は0より大きい値を入力してください'); return; }
    if (prepay >= balance) { showErr('繰上返済額はローン残高未満にしてください'); return; }

    var totalMonths = Math.round(years * 12);
    var monthlyRate = rate / 100 / 12;

    // 現在の月額返済額（元利均等）
    var currentMonthly;
    if (monthlyRate === 0) {
      currentMonthly = balance / totalMonths;
    } else {
      currentMonthly = balance * monthlyRate * Math.pow(1 + monthlyRate, totalMonths)
                     / (Math.pow(1 + monthlyRate, totalMonths) - 1);
    }
    var currentTotal = currentMonthly * totalMonths;
    var currentInterest = currentTotal - balance;

    // ── 期間短縮型 ──
    var newBalanceShort = balance - prepay;
    var shortMonths;
    if (monthlyRate === 0) {
      shortMonths = Math.ceil(newBalanceShort / currentMonthly);
    } else {
      shortMonths = Math.ceil(
        -Math.log(1 - newBalanceShort * monthlyRate / currentMonthly) / Math.log(1 + monthlyRate)
      );
    }
    if (shortMonths < 1) shortMonths = 1;
    var shortTotal = currentMonthly * shortMonths;
    var shortInterest = shortTotal - newBalanceShort;
    var shortSaved = currentInterest - shortInterest;
    var shortReducedMonths = totalMonths - shortMonths;

    // ── 返済額軽減型 ──
    var newBalanceReduce = balance - prepay;
    var reduceMonthly;
    if (monthlyRate === 0) {
      reduceMonthly = newBalanceReduce / totalMonths;
    } else {
      reduceMonthly = newBalanceReduce * monthlyRate * Math.pow(1 + monthlyRate, totalMonths)
                    / (Math.pow(1 + monthlyRate, totalMonths) - 1);
    }
    var reduceTotal = reduceMonthly * totalMonths;
    var reduceInterest = reduceTotal - newBalanceReduce;
    var reduceSaved = currentInterest - reduceInterest;
    var reduceMonthlyDiff = currentMonthly - reduceMonthly;

    // ── 結論判定 ──
    var winner, level, evalText;
    if (shortSaved > reduceSaved) {
      winner = '期間短縮型';
      level = 'ok';
      evalText = '期間短縮型のほうが約 ' + fmt(Math.round(shortSaved - reduceSaved)) + ' 円お得！';
    } else if (reduceSaved > shortSaved) {
      winner = '返済額軽減型';
      level = 'warn';
      evalText = '返済額軽減型のほうが約 ' + fmt(Math.round(reduceSaved - shortSaved)) + ' 円お得！';
    } else {
      winner = '同額';
      level = 'ok';
      evalText = '利息削減額は同じです';
    }

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = 'おすすめ：' + winner;
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = '繰上返済 ' + fmt(Math.round(prepay)) + ' 円の効果を比較しました';

    // 比較カード表示
    var cw = document.getElementById('compare');
    cw.classList.add('show');

    var cardShort = document.getElementById('card-short');
    var cardReduce = document.getElementById('card-reduce');
    cardShort.classList.remove('recommended');
    cardReduce.classList.remove('recommended');

    if (shortSaved >= reduceSaved) cardShort.classList.add('recommended');
    if (reduceSaved >= shortSaved) cardReduce.classList.add('recommended');

    // 期間短縮カード
    var shortBadge = cardShort.querySelector('.compare-badge');
    if (!shortBadge && shortSaved >= reduceSaved) {
      shortBadge = document.createElement('p');
      shortBadge.className = 'compare-badge';
      cardShort.querySelector('.compare-type').after(shortBadge);
    }
    if (shortBadge) shortBadge.textContent = shortSaved >= reduceSaved ? 'おすすめ' : '';
    if (shortBadge && shortSaved < reduceSaved) shortBadge.remove();

    document.getElementById('short-main').textContent = fmt(Math.round(shortSaved)) + ' 円お得';
    document.getElementById('short-sub').innerHTML =
      '返済期間：<strong>' + Math.floor(shortReducedMonths / 12) + '年' + (shortReducedMonths % 12) + 'ヶ月短縮</strong><br>' +
      '利息削減：' + fmt(Math.round(shortSaved)) + ' 円<br>' +
      '月々の返済額：変わらず ' + fmt(Math.round(currentMonthly)) + ' 円';

    // 返済軽減カード
    var reduceBadge = cardReduce.querySelector('.compare-badge');
    if (!reduceBadge && reduceSaved > shortSaved) {
      reduceBadge = document.createElement('p');
      reduceBadge.className = 'compare-badge';
      cardReduce.querySelector('.compare-type').after(reduceBadge);
    }
    if (reduceBadge) reduceBadge.textContent = reduceSaved > shortSaved ? 'おすすめ' : '';
    if (reduceBadge && reduceSaved <= shortSaved) reduceBadge.remove();

    document.getElementById('reduce-main').textContent = fmt(Math.round(reduceSaved)) + ' 円お得';
    document.getElementById('reduce-sub').innerHTML =
      '月々の返済額：<strong>' + fmt(Math.round(reduceMonthlyDiff)) + ' 円ダウン</strong><br>' +
      '利息削減：' + fmt(Math.round(reduceSaved)) + ' 円<br>' +
      '新しい月額：' + fmt(Math.round(reduceMonthly)) + ' 円';

    // 内訳テーブル
    showDetail([
      ['現在の月額返済額', fmt(Math.round(currentMonthly)) + ' 円'],
      ['現在の総返済額', fmt(Math.round(currentTotal)) + ' 円'],
      ['現在の総利息', fmt(Math.round(currentInterest)) + ' 円'],
      ['─', '─'],
      ['【期間短縮型】短縮後の期間', Math.floor(shortMonths / 12) + '年' + (shortMonths % 12) + 'ヶ月'],
      ['【期間短縮型】利息削減額', fmt(Math.round(shortSaved)) + ' 円', true],
      ['─', '─'],
      ['【返済軽減型】新しい月額', fmt(Math.round(reduceMonthly)) + ' 円'],
      ['【返済軽減型】月額の減少分', fmt(Math.round(reduceMonthlyDiff)) + ' 円'],
      ['【返済軽減型】利息削減額', fmt(Math.round(reduceSaved)) + ' 円', true],
    ]);

    // localStorage に入力値を保存
    saveInputs();
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('compare').classList.remove('show');
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // localStorage
  function saveInputs() {
    try {
      localStorage.setItem('kuriage_inputs', JSON.stringify({
        balance: document.getElementById('balance').value,
        rate: document.getElementById('rate').value,
        months: document.getElementById('months').value,
        prepay: document.getElementById('prepay').value
      }));
    } catch(e) {}
  }

  function loadInputs() {
    try {
      var data = JSON.parse(localStorage.getItem('kuriage_inputs'));
      if (data) {
        if (data.balance) document.getElementById('balance').value = data.balance;
        if (data.rate) document.getElementById('rate').value = data.rate;
        if (data.months) document.getElementById('months').value = data.months;
        if (data.prepay) document.getElementById('prepay').value = data.prepay;
      }
    } catch(e) {}
  }

  loadInputs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
