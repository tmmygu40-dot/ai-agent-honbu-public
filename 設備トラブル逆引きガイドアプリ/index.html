<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備トラブル逆引きガイド</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* カテゴリグリッド */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      padding: 0 1rem;
    }
    .cat-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.4rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }
    .cat-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .cat-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 800; }

    /* 症状リスト */
    .symptom-list {
      list-style: none;
      padding: 0;
    }
    .symptom-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0.6rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .symptom-item:last-child { border-bottom: none; }
    .symptom-item:hover { background: var(--accent-light); }
    .symptom-name { font-size: 0.95rem; font-weight: 600; }
    .symptom-level {
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.5rem; border-radius: 99px;
      white-space: nowrap; margin-left: 0.5rem;
    }
    .level-high { background: var(--ng-bg); color: var(--ng); }
    .level-mid  { background: var(--warn-bg); color: var(--warn); }
    .level-low  { background: var(--ok-bg); color: var(--ok); }

    /* 詳細パネル */
    .detail-panel {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .detail-panel.show { display: block; }
    .detail-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .detail-title { font-size: 1.05rem; font-weight: 800; flex: 1; }
    .fav-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; line-height: 1; margin-left: 0.6rem;
      -webkit-tap-highlight-color: transparent;
    }

    .section-title {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin: 1rem 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }

    .check-list, .step-list { list-style: none; padding: 0; }
    .check-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.45rem 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #f5f0e8;
    }
    .check-item:last-child { border-bottom: none; }
    .check-mark { color: var(--warn); font-weight: 700; flex-shrink: 0; margin-top: 0.05rem; }

    .step-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f5f0e8;
    }
    .step-item:last-child { border-bottom: none; }
    .step-num {
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 800;
      width: 1.4rem; height: 1.4rem;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 0.1rem;
    }
    .step-text { font-size: 0.9rem; line-height: 1.5; }

    .contact-tag {
      display: inline-block;
      background: var(--ng-bg); color: var(--ng);
      font-size: 0.72rem; font-weight: 700;
      padding: 0.25rem 0.6rem; border-radius: 99px;
      margin-top: 0.8rem;
    }

    /* お気に入りセクション */
    .fav-section {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .fav-section.has-fav { display: block; }
    .fav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-item-name { font-size: 0.88rem; font-weight: 600; }
    .fav-item-cat { font-size: 0.72rem; color: var(--text-sub); }
    .fav-del { background: none; border: none; cursor: pointer; color: var(--text-sub); font-size: 1rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .section-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub); letter-spacing: 0.06em;
      margin: 0 auto 0.5rem; max-width: 600px;
      padding: 0 1rem;
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>設備トラブル逆引きガイド</h1>
    <p class="subtitle">症状を選ぶだけで点検ポイントと対応手順を即表示</p>
  </header>

  <!-- お気に入り -->
  <div class="fav-section" id="favSection">
    <p class="card-title">お気に入り</p>
    <ul class="check-list" id="favList"></ul>
  </div>

  <!-- カテゴリ選択 -->
  <p class="section-label">① 設備カテゴリを選ぶ</p>
  <div class="cat-grid" id="catGrid"></div>

  <!-- 症状選択 -->
  <div class="card" id="symptomCard" style="display:none">
    <p class="card-title" id="symptomCardTitle">症状を選ぶ</p>
    <ul class="symptom-list" id="symptomList"></ul>
  </div>

  <!-- 詳細パネル -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <p class="detail-title" id="detailTitle"></p>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()" title="お気に入り">☆</button>
    </div>
    <p class="section-title">▼ 点検ポイント</p>
    <ul class="check-list" id="checkList"></ul>
    <p class="section-title">▼ 対応手順</p>
    <ol class="step-list" id="stepList"></ol>
    <div id="contactArea"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  var currentCat = null;
  var currentItem = null;
  var favs = JSON.parse(localStorage.getItem('setsubi-favs') || '[]');

  function init() {
    var grid = document.getElementById('catGrid');
    Object.keys(DATA).forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.id = 'cat-' + cat;
      btn.innerHTML = '<span class="icon">' + DATA[cat].icon + '</span>' + cat;
      btn.onclick = function() { selectCat(cat); };
      grid.appendChild(btn);
    });
    renderFavs();
  }

  function selectCat(cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('cat-' + cat).classList.add('active');

    var card = document.getElementById('symptomCard');
    card.style.display = '';
    document.getElementById('symptomCardTitle').textContent = DATA[cat].icon + ' ' + cat + ' ─ 症状を選ぶ';

    var list = document.getElementById('symptomList');
    list.innerHTML = '';
    DATA[cat].items.forEach(function(item, idx) {
      var li = document.createElement('li');
      li.className = 'symptom-item';
      var levelLabel = item.level === 'high' ? '緊急度：高' : item.level === 'mid' ? '緊急度：中' : '緊急度：低';
      var levelClass = item.level === 'high' ? 'level-high' : item.level === 'mid' ? 'level-mid' : 'level-low';
      li.innerHTML = '<span class="symptom-name">' + item.name + '</span>'
                   + '<span class="symptom-level ' + levelClass + '">' + levelLabel + '</span>';
      li.onclick = function() { selectSymptom(cat, idx); };
      list.appendChild(li);
    });

    document.getElementById('detailPanel').classList.remove('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function selectSymptom(cat, idx) {
    currentItem = { cat: cat, idx: idx };
    var item = DATA[cat].items[idx];

    document.getElementById('detailTitle').textContent = item.name;
    updateFavBtn();

    var checkList = document.getElementById('checkList');
    checkList.innerHTML = item.checks.map(function(c) {
      return '<li class="check-item"><span class="check-mark">▶</span><span>' + c + '</span></li>';
    }).join('');

    var stepList = document.getElementById('stepList');
    stepList.innerHTML = item.steps.map(function(s, i) {
      return '<li class="step-item"><span class="step-num">' + (i+1) + '</span><span class="step-text">' + s + '</span></li>';
    }).join('');

    var contactArea = document.getElementById('contactArea');
    contactArea.innerHTML = item.contact
      ? '<span class="contact-tag">⚠️ 専門業者への連絡が必要な可能性があります</span>'
      : '';

    var panel = document.getElementById('detailPanel');
    panel.classList.add('show');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleFav() {
    if (!currentItem) return;
    var key = currentItem.cat + '::' + currentItem.idx;
    var idx = favs.indexOf(key);
    if (idx === -1) {
      favs.push(key);
    } else {
      favs.splice(idx, 1);
    }
    localStorage.setItem('setsubi-favs', JSON.stringify(favs));
    updateFavBtn();
    renderFavs();
  }

  function updateFavBtn() {
    if (!currentItem) return;
    var key = currentItem.cat + '::' + currentItem.idx;
    document.getElementById('favBtn').textContent = favs.indexOf(key) !== -1 ? '★' : '☆';
  }

  function renderFavs() {
    var section = document.getElementById('favSection');
    var list = document.getElementById('favList');
    if (favs.length === 0) {
      section.classList.remove('has-fav');
      return;
    }
    section.classList.add('has-fav');
    list.innerHTML = '';
    favs.forEach(function(key) {
      var parts = key.split('::');
      var cat = parts[0]; var idx = parseInt(parts[1]);
      if (!DATA[cat] || !DATA[cat].items[idx]) return;
      var item = DATA[cat].items[idx];
      var li = document.createElement('li');
      li.className = 'fav-item';
      li.innerHTML = '<div><div class="fav-item-name">' + item.name + '</div>'
                   + '<div class="fav-item-cat">' + DATA[cat].icon + ' ' + cat + '</div></div>'
                   + '<button class="fav-del" onclick="removeFav(\'' + key + '\',event)">✕</button>';
      li.onclick = function() { selectCat(cat); selectSymptom(cat, idx); };
      list.appendChild(li);
    });
  }

  function removeFav(key, e) {
    e.stopPropagation();
    var idx = favs.indexOf(key);
    if (idx !== -1) favs.splice(idx, 1);
    localStorage.setItem('setsubi-favs', JSON.stringify(favs));
    if (currentItem && currentItem.cat + '::' + currentItem.idx === key) updateFavBtn();
    renderFavs();
  }

  init();
  </script>
