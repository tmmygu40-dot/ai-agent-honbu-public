<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前と気持ちを入力するだけで、推しへの想いを詩的な4行詩にしてくれるポエムジェネレーター。コピーしてSNS投稿やメモにも使えます。">
  <title>推しポエムジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── ポエム結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.shown { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }

    .poem-text {
      font-size: 1.1rem; font-weight: 700; line-height: 2;
      color: var(--text); white-space: pre-line;
      padding: 0.8rem 0; letter-spacing: 0.03em;
    }

    .btn-copy, .btn-fav, .btn-retry {
      display: inline-block; padding: 0.55rem 1.2rem;
      font-size: 0.88rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; background: var(--card); color: var(--text-sub);
      transition: border-color 0.15s, color 0.15s;
      margin: 0.3rem;
    }
    .btn-copy:hover, .btn-fav:hover, .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── お気に入り一覧 ── */
    .fav-list { margin-top: 0.8rem; }
    .fav-item {
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.6rem;
      position: relative;
    }
    .fav-poem { font-size: 0.92rem; line-height: 1.8; white-space: pre-line; color: var(--text); }
    .fav-meta { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.4rem; }
    .fav-del {
      position: absolute; top: 0.5rem; right: 0.7rem;
      background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-sub);
    }
    .fav-del:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💌 推しポエムジェネレーター</h1>
    <p class="subtitle">推しの名前と気持ちを入れるだけで、世界に一つの4行詩が生まれます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推しへの想い</p>
    <div class="field">
      <label for="oshiName">推しの名前</label>
      <input type="text" id="oshiName" placeholder="例: ゆうき、推しの猫、担当くん">
      <p class="hint">ニックネームでもOK</p>
    </div>
    <div class="field">
      <label for="feeling">今の気持ち</label>
      <select id="feeling">
        <option value="">選んでください</option>
        <option value="love">好き・大好き</option>
        <option value="longing">会いたい・恋しい</option>
        <option value="gratitude">ありがとう・感謝</option>
        <option value="admiration">尊い・すごい</option>
        <option value="devotion">ずっと応援・推し続ける</option>
        <option value="healing">癒やされる・救われる</option>
      </select>
    </div>
    <div class="field">
      <label for="keyword">自由キーワード（任意）</label>
      <input type="text" id="keyword" placeholder="例: 笑顔、声、ライブ">
      <p class="hint">入れると詩に反映されることがあります</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePoem()">✨ ポエムを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの推しポエム</p>
    <div class="poem-text" id="poemText"></div>
    <div class="no-print">
      <button class="btn-copy" onclick="copyPoem()">📋 コピー</button>
      <button class="btn-fav" onclick="saveToFav()">💖 お気に入り</button>
      <button class="btn-retry" onclick="generatePoem()">🔄 もう一度</button>
    </div>
  </div>

  <!-- お気に入り一覧 -->
  <div class="card" id="favCard" style="display:none">
    <p class="card-title">お気に入りポエム</p>
    <div class="fav-list" id="favList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このアプリはテンプレートとランダム組み合わせで4行詩を生成しています。AIや外部サービスは使用していません。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── ポエムテンプレート ── */
  var TEMPLATES = {
    love: [
      ['{name}のことを想うたび', '胸の奥が甘くざわめく', '{kw}に宿るきらめきが', '今日もわたしを恋にする'],
      ['{name}という名の魔法に', '何度だって心奪われる', 'この好きは止められない', '{kw}のせいだと笑ってみる'],
      ['世界がどんなに広くても', '{name}がいれば満たされる', '{kw}に触れたその瞬間', '好きの気持ちが溢れだす'],
      ['{name}を好きな自分が好き', '理由なんてもういらない', '{kw}ひとつで胸が鳴る', 'この気持ちは本物だから'],
      ['眠る前に浮かぶ名前は', 'いつだって{name}だけ', '{kw}を思い出すだけで', '幸せな夢に飛び込める']
    ],
    longing: [
      ['{name}に会えない夜は長い', '月を見上げてため息ひとつ', '{kw}の記憶を抱きしめて', 'もう少しだけ待っていよう'],
      ['会いたいが口癖になった', '{name}のいない日々が重い', 'でも{kw}を思い出せば', '明日もきっと歩いていける'],
      ['画面越しの{name}に手を伸ばす', '届かないのはわかってる', '{kw}がくれた温もりで', '今はそっと夜を越える'],
      ['次に{name}に会える日まで', '指折り数える毎日が', '{kw}の記憶に彩られ', 'なんだか少し愛おしい'],
      ['{name}がいない世界は灰色', 'だけど{kw}を思い出すと', '心だけがそっと飛んでいく', 'あなたのいるその場所まで']
    ],
    gratitude: [
      ['{name}がいてくれるだけで', '世界の色が変わっていく', '{kw}をくれたあの日から', 'ありがとうが止まらない'],
      ['ありふれた言葉だけれど', '{name}に伝えたいことがある', '{kw}に救われた日のこと', '一生忘れないと誓う'],
      ['{name}という存在そのものが', 'わたしの日常を照らしてる', '{kw}にもらった優しさを', '大切に胸にしまっておく'],
      ['何度「ありがとう」を言っても', 'まだ足りない気がしてる', '{name}が{kw}をくれた日', 'あの瞬間が宝物'],
      ['{name}へ贈る感謝の詩', '言葉じゃ足りないけれど', '{kw}と過ごした時間こそ', 'わたしの一番の宝物']
    ],
    admiration: [
      ['{name}の輝きは太陽みたい', '見つめるだけで目が眩む', '{kw}に宿るその才能', '尊すぎて言葉を失う'],
      ['尊い、ただただ尊い', '{name}の存在が奇跡', '{kw}を魅せるその姿に', '何度でも心を打たれる'],
      ['{name}がこの世にいること', 'それだけで世界は美しい', '{kw}に込められた全力が', 'わたしの推し活の原動力'],
      ['天才という言葉すら', '{name}には足りない気がする', '{kw}のたびに更新される', '推しの最高記録'],
      ['{name}を知れたこの人生', '勝ち組だと胸を張れる', '{kw}が放つその輝きに', '今日も尊さで泣いている']
    ],
    devotion: [
      ['{name}を推し続けると決めた', 'この気持ちに終わりはない', '{kw}が続く限りずっと', '一番のファンでいさせて'],
      ['流行りが変わっても関係ない', '{name}だけはずっと推す', '{kw}を追いかけるこの日々が', 'わたしの青春そのもの'],
      ['何年経っても色褪せない', '{name}への想いは本物', '{kw}と共に歩んだ道を', 'これからも隣で見届ける'],
      ['{name}の未来を信じてる', 'どんな時もそばにいるから', '{kw}の先に待つ景色を', '一緒に見届けさせてほしい'],
      ['推しは推せるときに推せ', 'その言葉を胸に刻む', '{name}と{kw}がある限り', 'わたしは全力で推し続ける']
    ],
    healing: [
      ['{name}がいるから生きていける', '大げさじゃなくそう思う', '{kw}に癒やされるこの瞬間', '世界で一番穏やかな時間'],
      ['疲れた心を溶かすのは', '{name}の存在だけでいい', '{kw}がくれる安らぎに', '今日も静かに救われる'],
      ['泣きたい夜も{name}がいれば', '不思議と涙が笑顔に変わる', '{kw}という名の処方箋', '効き目は一生分'],
      ['{name}はわたしのビタミン', '毎日摂取が欠かせない', '{kw}がくれるこの癒やしは', '世界のどこにも売ってない'],
      ['何もかも嫌になった日も', '{name}を見ればリセットされる', '{kw}がそっと包んでくれる', 'この優しさが一番の薬']
    ]
  };

  /* 気持ち別のデフォルトキーワード */
  var DEFAULT_KW = {
    love: ['笑顔', '瞳', '声', '横顔', '仕草'],
    longing: ['写真', '面影', '約束', '思い出', '声'],
    gratitude: ['出会い', '言葉', '優しさ', '笑顔', '存在'],
    admiration: ['パフォーマンス', '才能', '表現', '全力', '輝き'],
    devotion: ['夢', '未来', '活動', '想い', 'ステージ'],
    healing: ['笑顔', '存在', '声', '表情', '日常']
  };

  var currentPoem = '';

  function generatePoem() {
    var name = document.getElementById('oshiName').value.trim();
    var feeling = document.getElementById('feeling').value;
    var keyword = document.getElementById('keyword').value.trim();

    if (!name) { alert('推しの名前を入力してください'); return; }
    if (!feeling) { alert('気持ちを選んでください'); return; }

    var templates = TEMPLATES[feeling];
    var lines = templates[Math.floor(Math.random() * templates.length)];

    if (!keyword) {
      var dkw = DEFAULT_KW[feeling];
      keyword = dkw[Math.floor(Math.random() * dkw.length)];
    }

    currentPoem = lines.map(function(line) {
      return line.replace('{name}', name).replace('{kw}', keyword);
    }).join('\n');

    document.getElementById('poemText').textContent = currentPoem;
    var rc = document.getElementById('result');
    rc.className = 'result-card shown';
    rc.style.display = 'block';
  }

  function copyPoem() {
    if (!currentPoem) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(currentPoem).then(function() {
        showCopyFeedback('コピーしました！');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = currentPoem;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyFeedback('コピーしました！');
    }
  }

  function showCopyFeedback(msg) {
    var btn = document.querySelector('.btn-copy');
    var orig = btn.textContent;
    btn.textContent = '✅ ' + msg;
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }

  /* ── お気に入り (localStorage) ── */
  var FAV_KEY = 'oshi_poem_favs';

  function getFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  }

  function saveToFav() {
    if (!currentPoem) return;
    var favs = getFavs();
    var name = document.getElementById('oshiName').value.trim();
    var exists = favs.some(function(f) { return f.poem === currentPoem; });
    if (exists) { alert('このポエムは既にお気に入りに保存済みです'); return; }
    favs.unshift({ poem: currentPoem, name: name, date: new Date().toLocaleDateString('ja-JP') });
    if (favs.length > 30) favs = favs.slice(0, 30);
    saveFavs(favs);
    renderFavs();
    var btn = document.querySelector('.btn-fav');
    var orig = btn.textContent;
    btn.textContent = '✅ 保存しました！';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }

  function deleteFav(idx) {
    var favs = getFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }

  function renderFavs() {
    var favs = getFavs();
    var card = document.getElementById('favCard');
    var list = document.getElementById('favList');
    if (favs.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(f, i) {
      return '<div class="fav-item">'
        + '<button class="fav-del" onclick="deleteFav(' + i + ')" title="削除">×</button>'
        + '<div class="fav-poem">' + escHtml(f.poem) + '</div>'
        + '<div class="fav-meta">推し: ' + escHtml(f.name) + ' ｜ ' + escHtml(f.date) + '</div>'
        + '</div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  /* 起動時にお気に入り一覧を表示 */
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
