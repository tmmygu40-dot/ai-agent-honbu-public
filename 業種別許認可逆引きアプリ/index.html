<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業種別許認可逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 業種グリッド ── */
    .industry-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }
    @media (min-width: 480px) {
      .industry-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .industry-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.6rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .industry-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .industry-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .industry-btn .icon { font-size: 1.6rem; display: block; margin-bottom: 0.3rem; }
    .industry-btn .name { font-size: 0.78rem; font-weight: 700; color: var(--text); }
    .industry-btn .desc { font-size: 0.66rem; color: var(--text-sub); margin-top: 0.15rem; line-height: 1.3; }

    /* ── カテゴリチェックボックス ── */
    .category-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .cat-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.7rem 0.8rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; transition: all 0.12s;
    }
    .cat-item:hover { border-color: var(--accent); }
    .cat-item input[type="checkbox"] { margin-top: 0.15rem; accent-color: var(--accent); width: 1rem; height: 1rem; flex-shrink: 0; }
    .cat-item .cat-text { flex: 1; }
    .cat-item .cat-name { font-size: 0.88rem; font-weight: 600; }
    .cat-item .cat-hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.15rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .btn-reset {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果エリア ── */
    #result-area { display: none; }
    .result-header {
      max-width: 640px; margin: 0 auto 1rem;
      padding: 1rem 1.2rem;
      background: var(--ok-bg); border: 2px solid var(--ok);
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 0.8rem;
    }
    .result-header .ico { font-size: 1.8rem; flex-shrink: 0; }
    .result-header .ttl { font-size: 1rem; font-weight: 900; color: var(--ok); }
    .result-header .sub { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 許認可リスト ── */
    .license-group { margin-bottom: 1.2rem; }
    .license-group:last-child { margin-bottom: 0; }
    .license-group-title {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text-sub); letter-spacing: 0.06em;
      margin-bottom: 0.5rem; padding-bottom: 0.3rem;
      border-bottom: 1px dashed var(--border);
    }
    .license-item {
      padding: 0.8rem 0.9rem; margin-bottom: 0.45rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px;
    }
    .license-item.required { border-left: 4px solid var(--ng); }
    .license-item.conditional { border-left: 4px solid var(--warn); }
    .license-item.optional { border-left: 4px solid var(--ok); }
    .lic-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.3rem; }
    .lic-meta { font-size: 0.75rem; color: var(--text-sub); line-height: 1.6; }
    .lic-meta span { margin-right: 0.8rem; }
    .lic-note {
      font-size: 0.74rem; color: var(--warn);
      background: var(--warn-bg); border-radius: 6px;
      padding: 0.2rem 0.5rem; margin-top: 0.3rem; display: inline-block;
    }
    .badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 4px; margin-left: 0.4rem;
      vertical-align: middle;
    }
    .badge.req { background: var(--ng-bg); color: var(--ng); }
    .badge.cond { background: var(--warn-bg); color: var(--warn); }
    .badge.opt { background: var(--ok-bg); color: var(--ok); }

    /* 凡例 */
    .legend {
      display: flex; gap: 1rem; flex-wrap: wrap;
      font-size: 0.73rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-bar { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    /* ── 印刷/PDF ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 640px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .btn-pdf, .back-link, #fav-widget, .no-print,
      #step1-card, #step2-card { display: none !important; }
      .card, #result-area { box-shadow: none; border: 1px solid #ccc; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  // ─────────────────────────────────────────────
  //  状態
  // ─────────────────────────────────────────────
  let selectedIndustry = null;
  let selectedCategories = new Set();

  // ─────────────────────────────────────────────
  //  初期化
  // ─────────────────────────────────────────────
  function init() {
    renderIndustries();
    loadFromStorage();
  }

  function renderIndustries() {
    var grid = document.getElementById('industry-grid');
    grid.innerHTML = INDUSTRIES.map(function(ind) {
      return '<button class="industry-btn" id="ind-' + ind.id + '" onclick="selectIndustry(\'' + ind.id + '\')">'
        + '<span class="icon">' + ind.icon + '</span>'
        + '<div class="name">' + ind.name + '</div>'
        + '<div class="desc">' + ind.desc + '</div>'
        + '</button>';
    }).join('');
  }

  function selectIndustry(id) {
    selectedIndustry = id;
    selectedCategories.clear();

    // ボタン選択状態
    document.querySelectorAll('.industry-btn').forEach(function(b) { b.classList.remove('selected'); });
    document.getElementById('ind-' + id).classList.add('selected');

    // カテゴリ描画
    var ind = INDUSTRIES.find(function(x) { return x.id === id; });
    var list = document.getElementById('category-list');
    list.innerHTML = ind.categories.map(function(cat) {
      return '<label class="cat-item">'
        + '<input type="checkbox" value="' + cat.id + '" onchange="toggleCategory(\'' + cat.id + '\')">'
        + '<div class="cat-text">'
        + '<div class="cat-name">' + cat.name + '</div>'
        + (cat.hint ? '<div class="cat-hint">' + cat.hint + '</div>' : '')
        + '</div></label>';
    }).join('');

    document.getElementById('step2-title').textContent = 'STEP 2 ｜ 業態・取扱内容を選んでください（複数可）';
    document.getElementById('step2-card').style.display = '';
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('show-btn').style.display = '';
    document.getElementById('reset-btn').style.display = '';
    saveToStorage();
  }

  function toggleCategory(catId) {
    if (selectedCategories.has(catId)) {
      selectedCategories.delete(catId);
    } else {
      selectedCategories.add(catId);
    }
    saveToStorage();
  }

  function showResult() {
    var ind = INDUSTRIES.find(function(x) { return x.id === selectedIndustry; });
    if (!ind) return;

    // 収集
    var groups = {};
    var allLicenses = [];

    // ベースライセンス
    if (ind.licenses.base.length > 0) {
      groups['【全業態共通】必須許認可'] = ind.licenses.base;
      allLicenses = allLicenses.concat(ind.licenses.base);
    }

    // 選択カテゴリのライセンス
    var usedCats = selectedCategories.size > 0 ? Array.from(selectedCategories) : ind.categories.map(function(c) { return c.id; });

    usedCats.forEach(function(catId) {
      var catDef = ind.categories.find(function(c) { return c.id === catId; });
      var catLicenses = ind.licenses.categories[catId] || [];
      if (catLicenses.length > 0 && catDef) {
        groups['【' + catDef.name + '】'] = catLicenses;
        allLicenses = allLicenses.concat(catLicenses);
      }
    });

    // 選択なしでも表示
    if (Object.keys(groups).length === 0) {
      groups['参考情報'] = [{ name: '選択した業態に追加の許認可情報はありません', law: '—', office: '—', type: 'optional', note: '業種共通の許認可をご確認ください' }];
    }

    var html = '';
    Object.keys(groups).forEach(function(groupName) {
      html += '<div class="license-group">'
        + '<div class="license-group-title">' + groupName + '</div>';
      groups[groupName].forEach(function(lic) {
        var badgeHtml = lic.type === 'required' ? '<span class="badge req">必須</span>'
                      : lic.type === 'conditional' ? '<span class="badge cond">条件付き</span>'
                      : '<span class="badge opt">任意</span>';
        html += '<div class="license-item ' + lic.type + '">'
          + '<div class="lic-name">' + lic.name + badgeHtml + '</div>'
          + '<div class="lic-meta">'
          + '<span>📖 ' + lic.law + '</span>'
          + '<span>🏢 ' + lic.office + '</span>'
          + '</div>'
          + (lic.note ? '<div class="lic-note">💡 ' + lic.note + '</div>' : '')
          + '</div>';
      });
      html += '</div>';
    });

    document.getElementById('license-list').innerHTML = html;
    document.getElementById('result-title').textContent = ind.name + ' の必要許認可一覧';
    var cats = selectedCategories.size > 0
      ? Array.from(selectedCategories).map(function(cid) {
          var c = ind.categories.find(function(x) { return x.id === cid; });
          return c ? c.name : cid;
        }).join('、')
      : '全業態';
    document.getElementById('result-sub').textContent = '対象業態：' + cats + '　｜　合計 ' + allLicenses.length + ' 件';
    document.getElementById('result-area').style.display = '';

    // スクロール
    setTimeout(function() {
      document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function resetAll() {
    selectedIndustry = null;
    selectedCategories.clear();
    document.querySelectorAll('.industry-btn').forEach(function(b) { b.classList.remove('selected'); });
    document.getElementById('step2-card').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('show-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    clearStorage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─────────────────────────────────────────────
  //  localStorage
  // ─────────────────────────────────────────────
  function saveToStorage() {
    try {
      localStorage.setItem('gyoshu_license_industry', selectedIndustry || '');
      localStorage.setItem('gyoshu_license_cats', JSON.stringify(Array.from(selectedCategories)));
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      var ind = localStorage.getItem('gyoshu_license_industry');
      var cats = localStorage.getItem('gyoshu_license_cats');
      if (ind) {
        selectIndustry(ind);
        if (cats) {
          var catArr = JSON.parse(cats);
          catArr.forEach(function(cid) {
            var cb = document.querySelector('input[value="' + cid + '"]');
            if (cb) { cb.checked = true; selectedCategories.add(cid); }
          });
        }
      }
    } catch(e) {}
  }

  function clearStorage() {
    try {
      localStorage.removeItem('gyoshu_license_industry');
      localStorage.removeItem('gyoshu_license_cats');
    } catch(e) {}
  }

  init();
