<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入荷検品チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>入荷検品チェッカー</h1>
  </header>

  <main>
    <!-- 発注登録フォーム -->
    <section class="card">
      <h2>発注品を登録</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="品名" maxlength="50">
        <input type="number" id="orderQty" placeholder="発注数" min="1" max="99999">
        <button id="addBtn" onclick="addItem()">追加</button>
      </div>
    </section>

    <!-- 検品リスト -->
    <section class="card">
      <h2>検品リスト</h2>
      <div id="itemList" class="item-list">
        <p class="empty-msg" id="emptyMsg">発注品を登録してください</p>
      </div>
      <div class="actions">
        <button class="btn-secondary" onclick="resetAll()">全リセット</button>
        <button class="btn-secondary" onclick="clearCompleted()">完了済みを削除</button>
      </div>
    </section>

    <!-- サマリー -->
    <section class="card summary" id="summarySection" style="display:none;">
      <h2>検品サマリー</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="label">合計品目</span>
          <span class="value" id="totalItems">0</span>
        </div>
        <div class="summary-item">
          <span class="label">OK</span>
          <span class="value ok" id="okCount">0</span>
        </div>
        <div class="summary-item">
          <span class="label">不足</span>
          <span class="value shortage" id="shortageCount">0</span>
        </div>
        <div class="summary-item">
          <span class="label">過剰</span>
          <span class="value excess" id="excessCount">0</span>
        </div>
        <div class="summary-item">
          <span class="label">未入力</span>
          <span class="value pending" id="pendingCount">0</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
