<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し沼落ちルートタイプ診断｜3択5問であなたの沼落ちタイプを判定</title>
  <meta name="description" content="3択5問に答えるだけで、あなたが推し沼に落ちたルートタイプ（ビジュ堕ち／パフォ堕ち／ギャップ堕ち／物語堕ち／総合堕ち）を判定する無料診断アプリ。推し活仲間とシェアして楽しめます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.4rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-num { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .q-text { font-size: 1rem; font-weight: 700; line-height: 1.45; margin-bottom: 0.7rem; }

    .opt-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .opt-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-item:hover { border-color: var(--accent); }
    .opt-item input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .opt-item .opt-text { font-size: 0.92rem; line-height: 1.4; color: var(--text); }
    .opt-item input[type="radio"]:checked ~ .opt-text { color: var(--accent); font-weight: 700; }
    .opt-item:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-emoji-big { font-size: 3rem; line-height: 1; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-eval { font-size: 1rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.6rem; color: var(--text); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; text-align: left; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>推し沼落ちルートタイプ診断</h1>
    <p class="subtitle">3択5問であなたの推し沼落ちルートを判定。シェアして友達とどのタイプか比較しよう</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">5問に答えるだけ</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">✨</p>
    <p class="result-label">あなたの沼落ちルート</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="rev"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">タイプ別スコア内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールはエンタメ目的の診断アプリです。質問への回答からタイプ別ポイントを集計し、最も高いタイプを表示しています。気軽に楽しんでください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── タイプ定義 ──
  var TYPES = {
    visu: {
      name: 'ビジュ堕ちルート',
      emoji: '😍',
      eval: '見た瞬間に心を撃ち抜かれた、ビジュ最強信者タイプ',
      note: '推しの顔・スタイル・雰囲気そのものに惹かれて落ちたタイプ。MV・写真集・ライブ映像など「ただ眺めるだけで幸せ」になれる強さがあります。新しい衣装やヘアスタイルが解禁されるたびに供給で生き返る人。'
    },
    perf: {
      name: 'パフォ堕ちルート',
      emoji: '🎤',
      eval: '歌・ダンス・演技に魂を持っていかれた、実力派ガチ勢タイプ',
      note: '推しの圧倒的なパフォーマンスで沼落ちしたタイプ。歌唱力・ダンス・演技・トークなど「技術と表現力」に痺れる人。ライブやステージを最優先し、日々スキルが上がっていく姿に泣きがちです。'
    },
    gap: {
      name: 'ギャップ堕ちルート',
      emoji: '🥺',
      eval: '素の表情・意外な一面でやられた、二面性沼タイプ',
      note: 'ステージ上のクールさと素のかわいさの落差で沼落ちしたタイプ。素の笑顔・天然エピソード・オフショットに弱い人。「本当はこんな人なんだ」という発見の瞬間に堕ちがちで、SNSや雑談動画を周回しがちです。'
    },
    story: {
      name: '物語堕ちルート',
      emoji: '🥹',
      eval: '努力・苦労・歩んできた道に感情移入する、推し人生応援タイプ',
      note: '推しの努力やここまで歩んできたストーリーに感動して沼落ちしたタイプ。デビュー前・苦労時代・夢への姿勢など「人生そのもの」を応援したくなる人。ドキュメンタリー・密着映像・古い映像に強い感情を抱きがちです。'
    },
    all: {
      name: '総合堕ちルート',
      emoji: '💖',
      eval: '気づいたら全部好き、もう逃げられない全方位沼タイプ',
      note: 'ビジュもパフォも素の人柄も生き様も、全部含めて推しが好きという全方位タイプ。「どこが好き？」と聞かれて答えに詰まる人。一番沼が深く、推しが何をしても肯定できる強靭な信仰心の持ち主です。'
    }
  };

  // ── 質問定義（各選択肢に [タイプキー, 加点] を持たせる） ──
  var QUESTIONS = [
    {
      q: 'Q1. 最初に「あ、好きかも」と思った瞬間は？',
      opts: [
        { t: 'MVや写真で顔を見た瞬間にやられた', s: { visu: 3, gap: 1 } },
        { t: 'ライブ・ステージのパフォーマンスを見た瞬間', s: { perf: 3, all: 1 } },
        { t: 'バラエティやSNSの素の雰囲気にやられた', s: { gap: 3, story: 1 } }
      ]
    },
    {
      q: 'Q2. 推しの何に一番お金や時間を使う？',
      opts: [
        { t: '写真集・グッズ・ビジュアル系コンテンツ', s: { visu: 3, all: 1 } },
        { t: 'ライブ・コンサート・舞台の現場', s: { perf: 3, all: 1 } },
        { t: 'ドキュメンタリー・密着・過去映像の周回', s: { story: 3, gap: 1 } }
      ]
    },
    {
      q: 'Q3. 推しのSNSで一番テンション上がる投稿は？',
      opts: [
        { t: '撮り下ろしビジュ・新衣装・カメラ目線', s: { visu: 3 } },
        { t: 'ステージ裏・練習風景・パフォ動画', s: { perf: 3 } },
        { t: '何気ない自撮り・素の笑顔・雑談動画', s: { gap: 3 } }
      ]
    },
    {
      q: 'Q4. 推しを布教するとき、まず何を見せる？',
      opts: [
        { t: 'とにかく顔がいいビジュアル画像・MV', s: { visu: 3, all: 1 } },
        { t: '神回と呼ばれているライブ映像', s: { perf: 3, all: 1 } },
        { t: 'デビュー秘話やインタビューの感動シーン', s: { story: 3 } }
      ]
    },
    {
      q: 'Q5. 推しが新しい挑戦を始めると聞いたら？',
      opts: [
        { t: 'どんなビジュで魅せてくれるか楽しみ', s: { visu: 2, all: 1 } },
        { t: '新しいパフォーマンスが見られるのワクワクする', s: { perf: 2, all: 1 } },
        { t: 'また新しい物語が始まる、最後まで応援する', s: { story: 2, all: 2 } }
      ]
    }
  ];

  var STORE_KEY = 'oshi_numa_route_type_v1';

  function renderQuestions() {
    var html = QUESTIONS.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt-item">' +
                 '<input type="radio" name="q' + i + '" value="' + j + '">' +
                 '<span class="opt-text">' + o.t + '</span>' +
               '</label>';
      }).join('');
      return '<div class="q-block">' +
               '<p class="q-num">Q' + (i + 1) + ' / ' + QUESTIONS.length + '</p>' +
               '<p class="q-text">' + q.q.replace(/^Q\d+\.\s*/, '') + '</p>' +
               '<div class="opt-list">' + opts + '</div>' +
             '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  function diagnose() {
    var scores = { visu: 0, perf: 0, gap: 0, story: 0, all: 0 };
    var unanswered = false;

    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered = true; break; }
      var s = QUESTIONS[i].opts[parseInt(sel.value, 10)].s;
      for (var k in s) { scores[k] += s[k]; }
    }

    if (unanswered) {
      showErr('5問すべてに答えてください');
      return;
    }

    // 最大スコアのタイプを抽出（同点時の優先順位: all > story > gap > perf > visu）
    var priority = ['all', 'story', 'gap', 'perf', 'visu'];
    var topKey = 'all', topScore = -1;
    for (var p = 0; p < priority.length; p++) {
      var k = priority[p];
      if (scores[k] > topScore) { topScore = scores[k]; topKey = k; }
    }

    var t = TYPES[topKey];
    showResult(t);
    showDetail(scores);

    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ key: topKey, at: Date.now() }));
    } catch (e) {}

    // 結果へスクロール
    setTimeout(function() {
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function showResult(t) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rev').textContent = t.eval;
    document.getElementById('rn').textContent = t.note;
  }

  function showDetail(scores) {
    var rows = [
      ['ビジュ堕ち',   scores.visu  + ' pt'],
      ['パフォ堕ち',   scores.perf  + ' pt'],
      ['ギャップ堕ち', scores.gap   + ' pt'],
      ['物語堕ち',     scores.story + ' pt'],
      ['総合堕ち',     scores.all   + ' pt']
    ];
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '未回答あり';
    document.getElementById('rev').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }

  // 起動時：質問を描画し、前回結果があればヒントだけ復元
  renderQuestions();
  try {
    var saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (saved && TYPES[saved.key]) {
      // 前回タイプを result-note に控えめに表示するなどはせず、ロード時には何も表示しない
      // （ユーザーが診断ボタンを押すたびに新しい結果を出す方針）
    }
  } catch (e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
