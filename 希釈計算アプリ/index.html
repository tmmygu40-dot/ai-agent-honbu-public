<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>希釈計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E5%B8%8C%E9%87%88%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="希釈計算アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"希釈計算アプリ","description":"希釈計算アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%B8%8C%E9%87%88%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>希釈計算アプリ</h1>
    <p class="subtitle">洗剤・農薬・塗料などの希釈に必要な水量を計算します</p>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <div class="card">
      <h2>入力</h2>
      <div class="form-group">
        <label for="stockAmount">原液量 (mL)</label>
        <input type="number" id="stockAmount" placeholder="例：100" min="0" step="any">
      </div>
      <div class="form-group">
        <label for="stockConc">原液濃度 (%)</label>
        <input type="number" id="stockConc" placeholder="例：100" min="0" max="100" step="any">
      </div>
      <div class="form-group">
        <label for="targetConc">希望濃度 (%)</label>
        <input type="number" id="targetConc" placeholder="例：5" min="0" max="100" step="any">
      </div>
      <button id="calcBtn" onclick="calculate()">計算する</button>
    </div>

    <div class="card result-card" id="resultCard" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-row">
        <span class="result-label">加える水量</span>
        <span class="result-value" id="waterResult">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">完成液量</span>
        <span class="result-value" id="totalResult">—</span>
      </div>
      <div class="result-note" id="resultNote"></div>
      <button class="save-btn" onclick="saveHistory()">履歴に保存</button>
    </div>

    <div class="card" id="historyCard">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="clear-btn" onclick="clearHistory()">クリア</button>
      </div>
      <ul id="historyList">
        <li class="empty-msg">履歴はありません</li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
