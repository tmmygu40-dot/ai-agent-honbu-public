<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>プレゼント候補診断｜猫型ポケット</title>
<meta name="description" content="相手・予算・シーンを選ぶと、喜ばれそうなプレゼント候補が診断形式で3件提案されます。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#fdf0f8;color:#333;min-height:100vh;padding:1.5rem 1rem}
.container{max-width:500px;margin:0 auto}
h1{font-size:1.35rem;margin-bottom:.3rem;color:#9b2869;text-align:center}
.sub{font-size:.85rem;color:#999;margin-bottom:1.8rem;text-align:center}
.card{background:#fff;border-radius:12px;padding:1.3rem;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:1rem}
.card h2{font-size:.9rem;color:#666;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #fde8f4}
.form-row{margin-bottom:1rem}
label{display:block;font-size:.82rem;color:#555;margin-bottom:.35rem;font-weight:600}
select{width:100%;padding:.55rem .8rem;border:2px solid #f4c6e0;border-radius:8px;font-size:.92rem;background:#fff;color:#333;font-family:inherit;appearance:none}
select:focus{outline:none;border-color:#9b2869}
.diag-btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#9b2869,#c0396b);color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-top:.5rem}
.diag-btn:hover{opacity:.9}
.result-area{display:none;margin-top:1rem;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.open-anim{text-align:center;font-size:2.5rem;margin-bottom:1rem;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.gift-list{display:flex;flex-direction:column;gap:.85rem}
.gift-card{background:linear-gradient(135deg,#fff8fc,#fde8f4);border:1.5px solid #f4c6e0;border-radius:12px;padding:1.1rem 1.2rem}
.gift-rank{font-size:.75rem;color:#9b2869;font-weight:700;margin-bottom:.3rem}
.gift-name{font-size:1.15rem;font-weight:700;color:#2c3e50;margin-bottom:.35rem}
.gift-reason{font-size:.84rem;color:#666;line-height:1.6}
.gift-price{font-size:.8rem;color:#9b2869;margin-top:.4rem;font-weight:600}
.btn-row{display:flex;gap:.7rem;margin-top:1.2rem;flex-wrap:wrap}
.btn-redo{flex:1;padding:.6rem;background:linear-gradient(135deg,#9b2869,#c0396b);color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;min-width:120px}
.btn-copy{flex:1;padding:.6rem;background:#fff;color:#9b2869;border:2px solid #9b2869;border-radius:8px;font-size:.9rem;cursor:pointer;min-width:120px}
.btn-redo:hover,.btn-copy:hover{opacity:.85}
.copied{font-size:.8rem;color:#27ae60;min-height:1.2rem;margin-top:.4rem;text-align:center}
</style>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="container">
<h1>🎁 プレゼント候補診断</h1>
<p class="sub">相手・予算・シーンから喜ばれるプレゼントを提案します</p>

<div class="card">
  <h2>🎯 プレゼントの条件を教えてください</h2>
  <div class="form-row">
    <label>相手</label>
    <select id="sel-who">
      <option value="mom">お母さん・母親</option>
      <option value="dad">お父さん・父親</option>
      <option value="partner">パートナー・恋人</option>
      <option value="friend-f">友人（女性）</option>
      <option value="friend-m">友人（男性）</option>
      <option value="boss">上司・先輩</option>
      <option value="child">子ども（小学生以下）</option>
      <option value="grandparent">祖父母</option>
    </select>
  </div>
  <div class="form-row">
    <label>予算</label>
    <select id="sel-budget">
      <option value="low">〜1,000円</option>
      <option value="mid1">1,001〜3,000円</option>
      <option value="mid2" selected>3,001〜5,000円</option>
      <option value="high1">5,001〜10,000円</option>
      <option value="high2">10,001円〜</option>
    </select>
  </div>
  <div class="form-row">
    <label>シーン・目的</label>
    <select id="sel-scene">
      <option value="birthday">誕生日</option>
      <option value="thanks">お礼・感謝</option>
      <option value="seasonal">季節の挨拶（お中元・お歳暮）</option>
      <option value="mothers">母の日・父の日</option>
      <option value="xmas">クリスマス</option>
      <option value="other">ちょっとしたプレゼント</option>
    </select>
  </div>
  <div class="form-row">
    <label>相手の好み・特徴（任意）</label>
    <select id="sel-taste">
      <option value="any">わからない・なんでも</option>
      <option value="food">食べること・グルメ</option>
      <option value="beauty">美容・スキンケア</option>
      <option value="outdoor">アウトドア・スポーツ</option>
      <option value="hobby">趣味・読書・音楽</option>
      <option value="practical">実用的なものが好き</option>
      <option value="fashion">おしゃれ・ファッション</option>
    </select>
  </div>
  <button class="diag-btn" onclick="diagnose()">🎁 プレゼントを提案してもらう</button>
</div>

<div class="result-area" id="result-area">
  <div class="open-anim">🎁✨</div>
  <div class="card">
    <h2>🌟 おすすめプレゼント候補</h2>
    <div class="gift-list" id="gift-list"></div>
    <div class="btn-row">
      <button class="btn-redo" onclick="diagnose()">🔄 別の候補を見る</button>
      <button class="btn-copy" onclick="copyResult()">📋 候補をコピー</button>
    </div>
    <div class="copied" id="copied"></div>
  </div>
</div>
</div>

<script>
var DB={
  mom:{
    low:   [{n:'かわいいポストカードセット',r:'手書きメッセージを添えると特別感が増します。',p:'〜1,000円'},{n:'ハンドクリーム・リップセット',r:'毎日使える実用的なギフト。いくつあっても嬉しいアイテム。',p:'500〜1,000円'},{n:'プチお菓子セット',r:'気軽に食べられるお気に入りスイーツを詰め合わせて。',p:'500〜1,000円'}],
    mid1:  [{n:'ハーブティー・紅茶セット',r:'ゆっくりお茶時間を楽しんでもらえます。ギフトボックス入りで映えます。',p:'1,500〜3,000円'},{n:'入浴剤・バスソルトセット',r:'毎日のバスタイムが特別になる癒しのプレゼント。',p:'1,500〜2,500円'},{n:'フェイスマスクセット',r:'美容好きなお母さんへ。種類が多いと選ぶ楽しさも。',p:'1,500〜3,000円'}],
    mid2:  [{n:'有名店のスイーツセット',r:'百貨店やネットで買える人気スイーツ。見た目も華やか。',p:'3,000〜5,000円'},{n:'アロマディフューザーセット',r:'部屋の雰囲気を変えてくれるインテリアにもなるプレゼント。',p:'3,500〜5,000円'},{n:'上質なタオルセット',r:'今治タオルなど肌触りの良いタオルは長く愛用してもらえます。',p:'3,000〜5,000円'}],
    high1: [{n:'老舗の和菓子・洋菓子詰め合わせ',r:'有名店の限定品は特別感があり、喜ばれること間違いなし。',p:'5,000〜8,000円'},{n:'高品質コスメ・スキンケア',r:'いつもよりちょっと贅沢な化粧品は自分では買いにくいもの。',p:'5,000〜10,000円'},{n:'ランチ・ディナーのお食事券',r:'一緒に食事に行く口実にもなる、思い出に残るプレゼント。',p:'5,000〜10,000円'}],
    high2: [{n:'宿泊・温泉ギフト券',r:'日帰り温泉や旅行のプレゼントは非日常の体験を贈れます。',p:'10,000円〜'},{n:'高級化粧品・美容機器',r:'自分ではなかなか買わない上質なコスメや美容ツール。',p:'10,000〜20,000円'},{n:'オーダーメイドギフト（刻印入り）',r:'名前や日付が入るオリジナル品は唯一無二の贈りもの。',p:'10,000円〜'}]
  },
  partner:{
    low:   [{n:'お気に入りのお菓子・チョコレート',r:'相手が好きなものを選べば気持ちが伝わります。',p:'500〜1,000円'},{n:'手書きのメッセージカード＋プチギフト',r:'言葉に気持ちを乗せて。シンプルだけど心が温まります。',p:'〜1,000円'},{n:'2人でのお出かけの約束チケット',r:'手作りの「〇〇券」はお金より気持ちが伝わることも。',p:'〜500円'}],
    mid1:  [{n:'ペアのキーホルダー・アクセサリー',r:'お揃いアイテムは特別感があってパートナーに喜ばれます。',p:'1,500〜3,000円'},{n:'お気に入りカフェのスイーツセット',r:'2人で食べる用に買っていくと一緒に楽しめます。',p:'1,000〜2,500円'},{n:'ルームウェア・リラックスグッズ',r:'おうち時間をもっと快適にしてあげられるプレゼント。',p:'2,000〜3,000円'}],
    mid2:  [{n:'おしゃれなグルメギフト（お肉・スイーツ）',r:'2人で食べられるものは一緒に楽しめて思い出になります。',p:'3,000〜5,000円'},{n:'アクセサリー・財布など身に着けるもの',r:'日常的に使うものは毎日プレゼントを思い出してもらえます。',p:'3,000〜5,000円'},{n:'体験・アクティビティギフト',r:'一緒にできることをプレゼントすると関係も深まります。',p:'3,000〜5,000円'}],
    high1: [{n:'旅行・お出かけプラン（一緒に行く）',r:'モノより体験が残ります。計画から楽しめるプレゼント。',p:'5,000〜10,000円'},{n:'ブランドアクセサリー・腕時計',r:'長く使えるプレゼントは特別な記念になります。',p:'5,000〜10,000円'},{n:'高級レストランでのディナー',r:'特別な日の特別な空間。忘れられない思い出になります。',p:'5,000〜10,000円'}],
    high2: [{n:'国内旅行・ホテルステイ',r:'2人だけの時間をプレゼント。一生の思い出になります。',p:'15,000〜50,000円'},{n:'ブランドバッグ・財布',r:'憧れのブランド品は自分ではなかなか買えないもの。',p:'10,000〜50,000円'},{n:'オーダージュエリー・刻印リング',r:'名前や日付を刻んだ世界にひとつのプレゼント。',p:'10,000〜30,000円'}]
  },
  default:{
    low:   [{n:'お気に入りのお菓子詰め合わせ',r:'相手の好みに合わせて選ぶと気持ちが伝わります。',p:'500〜1,000円'},{n:'かわいい文房具セット',r:'毎日使えるものは実用的で長く喜ばれます。',p:'500〜1,000円'},{n:'プチプラコスメ・ハンドクリーム',r:'気軽に使えてちょっと贅沢な気分になれるアイテム。',p:'500〜1,000円'}],
    mid1:  [{n:'人気スイーツセット',r:'SNSで話題の映えスイーツは喜ばれやすいです。',p:'1,500〜3,000円'},{n:'おしゃれなマグカップ＋コーヒー',r:'毎朝使ってもらえるセットギフト。',p:'1,500〜2,500円'},{n:'入浴剤・アロマセット',r:'ちょっとした贅沢感が出るリラックスギフト。',p:'1,500〜3,000円'}],
    mid2:  [{n:'有名店のスイーツ・グルメ',r:'品質の高いものは特別感が出ます。',p:'3,000〜5,000円'},{n:'上質なタオル・ブランケット',r:'肌触りの良いものは長く使ってもらえます。',p:'3,000〜5,000円'},{n:'体験型ギフト（料理・アクティビティ）',r:'モノではなく体験を贈るユニークなプレゼント。',p:'3,000〜5,000円'}],
    high1: [{n:'老舗の贈答品（肉・魚介・果物）',r:'品質で驚かせるプレゼントは印象に残ります。',p:'5,000〜10,000円'},{n:'ブランドアイテム（小物・財布）',r:'長く使えるものは喜ばれやすいです。',p:'5,000〜10,000円'},{n:'宿泊・温泉体験ギフト',r:'忙しい人への癒しプレゼント。',p:'5,000〜10,000円'}],
    high2: [{n:'宿泊旅行・ホテル宿泊券',r:'非日常を贈る特別なプレゼント。',p:'10,000〜50,000円'},{n:'高級ブランドバッグ・財布',r:'自分ではなかなか買えない贈りもの。',p:'10,000〜100,000円'},{n:'オーダーメイド品（名入れ・刻印）',r:'世界にひとつのオリジナルプレゼント。',p:'10,000〜30,000円'}]
  }
};
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
var lastText='';
function diagnose(){
  var who=document.getElementById('sel-who').value;
  var budget=document.getElementById('sel-budget').value;
  var data=DB[who]||DB.default;
  var gifts=(data[budget]||data.mid2).slice().sort(function(){return Math.random()-.5;});
  var list=document.getElementById('gift-list');
  var ranks=['🥇 イチオシ','🥈 次点','🥉 もうひとつの候補'];
  var textLines=['🎁 プレゼント候補'];
  list.innerHTML='';
  gifts.slice(0,3).forEach(function(g,i){
    var div=document.createElement('div');
    div.className='gift-card';
    div.innerHTML='<div class="gift-rank">'+ranks[i]+'</div>'
      +'<div class="gift-name">'+g.n+'</div>'
      +'<div class="gift-reason">'+g.r+'</div>'
      +'<div class="gift-price">💰 目安：'+g.p+'</div>';
    list.appendChild(div);
    textLines.push((i+1)+'位：'+g.n+' ('+g.p+')');
    textLines.push('　→ '+g.r);
  });
  lastText=textLines.join('\n');
  document.getElementById('result-area').style.display='block';
  document.getElementById('copied').textContent='';
  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function copyResult(){
  if(!lastText)return;
  navigator.clipboard&&navigator.clipboard.writeText(lastText).then(function(){
    document.getElementById('copied').textContent='✅ コピーしました！';
    setTimeout(function(){document.getElementById('copied').textContent='';},2000);
  });
}
</script>
<script src="../fav-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
