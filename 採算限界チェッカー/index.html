<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採算限界チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>採算限界チェッカー</h1>
    <p class="subtitle">原価の上昇率を入力して赤字転落の予測時期を確認</p>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>商品を登録</h2>
      <div class="form-group">
        <label>商品名</label>
        <input type="text" id="productName" placeholder="例：商品A" maxlength="50">
      </div>
      <div class="form-group">
        <label>現在の売価（円）</label>
        <input type="number" id="salePrice" placeholder="例：1000" min="1">
      </div>
      <div class="cost-items" id="costItems">
        <h3>原価項目</h3>
        <div class="cost-item-row" data-index="0">
          <input type="text" class="cost-name" placeholder="原価名（例：材料費）" maxlength="30">
          <input type="number" class="cost-value" placeholder="現在金額（円）" min="0">
          <input type="number" class="cost-rate" placeholder="月次上昇率（%）" min="0" step="0.1">
        </div>
      </div>
      <button type="button" class="btn-add-cost" id="addCostBtn">+ 原価項目を追加</button>
      <button type="button" class="btn-register" id="registerBtn">登録して計算</button>
    </section>

    <!-- 結果一覧 -->
    <section class="results-section">
      <h2>商品一覧</h2>
      <div id="productList" class="product-list">
        <p class="empty-msg">まだ登録された商品がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
