<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="友達の好みを5問の質問で診断。ぴったりなプレゼント案をズバリ提案します。年代・趣味・予算・性別・関係性から、センスの良い贈り物が見つかります。">
  <title>🎁 プレゼント提案診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問 ── */
    .question-item {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .question-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .question-text {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.6rem;
    }
    .question-progress {
      font-size: 0.72rem;
      color: var(--text-sub);
      margin-bottom: 0.8rem;
    }
    .option-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .option-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 0.8rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .option-label:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .option-label input[type="radio"] {
      margin: 0;
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .option-label input[type="radio"]:checked + .option-text {
      font-weight: 700;
      color: var(--accent);
    }
    .option-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎁 プレゼント提案診断</h1>
    <p class="subtitle">友達の好みを5問で診断。ぴったりなプレゼント案をズバリ提案します。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="questionCard">
    <p class="question-progress" id="progress">1 / 5</p>
    <p class="question-text" id="questionText"></p>
    <div class="option-group" id="optionGroup"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="nextBtn" onclick="nextQuestion()">次へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">提案するプレゼント</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- リセットボタン -->
  <button class="btn-reset" id="resetBtn" onclick="reset()" style="display:none">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、プレゼント選びの参考情報を目安として使いやすく整理しています。
  </p>

  <!-- 広告枠（将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var currentQuestion = 0;
  var answers = {};

  var questions = [
    {
      id: 'age',
      text: '友達の年代は？',
      options: [
        { label: '10代', value: 'age10s' },
        { label: '20代', value: 'age20s' },
        { label: '30代', value: 'age30s' },
        { label: '40代以上', value: 'age40plus' }
      ]
    },
    {
      id: 'hobby',
      text: '友達の趣味は？',
      options: [
        { label: 'スポーツ・運動', value: 'sports' },
        { label: 'ゲーム・アニメ', value: 'games' },
        { label: '読書・勉強', value: 'reading' },
        { label: 'ファッション・美容', value: 'fashion' },
        { label: 'グルメ・食べ物', value: 'food' }
      ]
    },
    {
      id: 'budget',
      text: '予算はどのくらい？',
      options: [
        { label: '1,000円以下', value: 'budget1k' },
        { label: '1,000〜3,000円', value: 'budget3k' },
        { label: '3,000〜5,000円', value: 'budget5k' },
        { label: '5,000円以上', value: 'budget5plus' }
      ]
    },
    {
      id: 'gender',
      text: '友達の性別は？',
      options: [
        { label: '男性', value: 'male' },
        { label: '女性', value: 'female' },
        { label: '気にしない', value: 'nocare' }
      ]
    },
    {
      id: 'relation',
      text: 'どんな関係の友達？',
      options: [
        { label: '親友', value: 'besties' },
        { label: '友達', value: 'friend' },
        { label: '同僚・クラスメート', value: 'colleague' },
        { label: 'その他', value: 'other' }
      ]
    }
  ];

  function displayQuestion() {
    var q = questions[currentQuestion];
    document.getElementById('progress').textContent = (currentQuestion + 1) + ' / ' + questions.length;
    document.getElementById('questionText').textContent = q.text;

    var optionGroup = document.getElementById('optionGroup');
    optionGroup.innerHTML = '';

    q.options.forEach(function(opt) {
      var label = document.createElement('label');
      label.className = 'option-label';
      label.innerHTML = '<input type="radio" name="option" value="' + opt.value + '"' +
                        (answers[q.id] === opt.value ? ' checked' : '') + '>' +
                        '<span class="option-text">' + opt.label + '</span>';
      label.onclick = function() {
        answers[q.id] = opt.value;
      };
      optionGroup.appendChild(label);
    });

    document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? '診断する' : '次へ';
  }

  function nextQuestion() {
    var selected = document.querySelector('input[name="option"]:checked');
    if (!selected) {
      alert('選択肢を選んでから進んでください');
      return;
    }

    answers[questions[currentQuestion].id] = selected.value;

    if (currentQuestion < questions.length - 1) {
      currentQuestion++;
      displayQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('questionCard').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'block';

    // 診断ロジック
    var gift = suggestGift(answers);

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = gift.title;
    document.getElementById('rn').textContent = gift.description;

    // localStorage に保存（最新1件のみ保持）
    localStorage.setItem('lastPresent', JSON.stringify({
      answers: answers,
      gift: gift,
      timestamp: new Date().toLocaleString('ja-JP')
    }));
  }

  function suggestGift(answers) {
    // 簡易的な提案ロジック
    var age = answers.age || '';
    var hobby = answers.hobby || '';
    var budget = answers.budget || '';
    var gender = answers.gender || '';
    var relation = answers.relation || '';

    // パターン別の提案
    if (hobby === 'sports') {
      if (budget.includes('1k')) {
        return { title: 'スポーツドリンク・飲料セット', description: '運動後のリフレッシュに最適。爽やかなギフトです。' };
      } else if (budget.includes('3k')) {
        return { title: 'ストレッチポール or 運動タオル', description: 'トレーニング時に役立つ実用的なアイテム。' };
      } else {
        return { title: 'スマートウォッチ or ジョギングシューズ', description: 'スポーツを本格的に応援するアイテム。' };
      }
    } else if (hobby === 'games') {
      if (budget.includes('1k')) {
        return { title: 'ゲームキャラクター グッズ', description: '推し推しを応援する。推し活がはかどる♪' };
      } else if (budget.includes('3k')) {
        return { title: 'ゲーミング マウス or キーボード', description: 'ゲーム体験がアップグレード。快適プレイ間違いなし。' };
      } else {
        return { title: 'ゲーミング ヘッドセット or コントローラー', description: 'ゲーム没入感が大きく向上します。' };
      }
    } else if (hobby === 'reading') {
      if (budget.includes('1k')) {
        return { title: '単行本 or 漫画', description: '気になる作品をプレゼント。本好きはうれしい！' };
      } else if (budget.includes('3k')) {
        return { title: 'Amazonギフトカード or 書店ギフトカード', description: '自分で選べる自由度。本好きに最適。' };
      } else {
        return { title: 'Kindle or 電子書籍リーダー', description: '本の読書体験が大きく変わります。' };
      }
    } else if (hobby === 'fashion') {
      if (budget.includes('1k')) {
        return { title: 'ハンカチ or スカーフ', description: 'さりげなく高見えする小物。センス光る。' };
      } else if (budget.includes('3k')) {
        return { title: 'バッグ or ベルト', description: 'ファッションの主役级アイテム。センスアップ間違いなし。' };
      } else {
        return { title: 'コート or ブランド品', description: 'ファッションが一気にグレードアップ。' };
      }
    } else if (hobby === 'food') {
      if (budget.includes('1k')) {
        return { title: 'グルメ焼き菓子 or お菓子セット', description: '小腹が満たされる。食べ好きにぴったり。' };
      } else if (budget.includes('3k')) {
        return { title: 'グルメギフト or 高級チョコレート', description: '厳選素材の美味しさ。特別感たっぷり。' };
      } else {
        return { title: 'グルメ体験 or 高級ディナー券', description: '食の時間が特別になる。思い出づくり。' };
      }
    } else {
      // デフォルト
      if (gender === 'female') {
        return { title: 'マグカップ or キャンドル', description: 'どんな趣味でも使える。日常で活躍します。' };
      } else if (gender === 'male') {
        return { title: '多機能ペン or 時計', description: 'いつも持ち歩きたくなる実用品。' };
      } else {
        return { title: 'アロマテラピー セット', description: 'リラックス時間がもっと素敵に。誰でも喜ぶギフト。' };
      }
    }
  }

  function reset() {
    currentQuestion = 0;
    answers = {};
    document.getElementById('questionCard').style.display = '';
    document.getElementById('nextBtn').style.display = 'block';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    displayQuestion();
  }

  // 初期表示（前回の診断結果があれば復元）
  window.onload = function() {
    var saved = localStorage.getItem('lastPresent');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        answers = data.answers;
        showResult();
        document.getElementById('resetBtn').style.display = 'block';
        return;
      } catch (e) {
        localStorage.removeItem('lastPresent');
      }
    }
    displayQuestion();
  };
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
