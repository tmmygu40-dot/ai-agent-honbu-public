<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>禁煙サポートアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🚭 禁煙サポート</h1>

    <section class="setup-section" id="setupSection">
      <h2>禁煙開始日を入力</h2>
      <div class="form-group">
        <label for="startDate">禁煙開始日時</label>
        <input type="datetime-local" id="startDate">
      </div>
      <div class="form-group">
        <label for="cigarettePrice">1日あたりの煙草代（円）</label>
        <input type="number" id="cigarettePrice" value="500" min="1">
      </div>
      <button id="startBtn" class="btn-primary">禁煙スタート</button>
    </section>

    <section class="stats-section" id="statsSection" style="display:none">
      <div class="stat-cards">
        <div class="stat-card accent">
          <div class="stat-label">禁煙継続</div>
          <div class="stat-value" id="elapsedDays">0</div>
          <div class="stat-unit">日</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">節約金額</div>
          <div class="stat-value" id="savedMoney">0</div>
          <div class="stat-unit">円</div>
        </div>
      </div>

      <div class="detail-time" id="detailTime"></div>

      <div class="reset-area">
        <button id="resetBtn" class="btn-reset">設定を変更する</button>
      </div>
    </section>

    <section class="timeline-section" id="timelineSection" style="display:none">
      <h2>体の回復タイムライン</h2>
      <div class="timeline" id="timeline"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
