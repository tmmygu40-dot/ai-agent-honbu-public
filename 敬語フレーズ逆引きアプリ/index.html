<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>敬語フレーズ逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── フレーズ結果エリア ── */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .result-header {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .phrase-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 0.85rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
      position: relative;
    }
    .phrase-text {
      font-size: 0.97rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 0.6rem;
      padding-right: 0;
    }
    .phrase-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-sub);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
      margin-right: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .phrase-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .btn-copy {
      font-size: 0.8rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 0.35rem 0.9rem;
      cursor: pointer; transition: background 0.1s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
    .btn-fav {
      font-size: 0.8rem; font-weight: 700;
      background: #fff; color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.35rem 0.9rem;
      cursor: pointer; transition: background 0.1s;
    }
    .btn-fav:hover { border-color: var(--accent); color: var(--accent); }
    .btn-fav.saved { background: #fff8ee; color: var(--accent); border-color: var(--accent); }

    /* ── お気に入りエリア ── */
    .fav-section {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }

    /* ── 空ステート ── */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-sub);
      font-size: 0.88rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .phrase-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

    </div>
    <div class="field">
      <label for="sel-recipient">相手</label>

        <option value="上司">上司・先輩</option>

        <option value="取引先">取引先・ビジネスパートナー</option>
        <option value="お客様">お客様</option>
      </select>
    </div>
    <div class="field">
      <label for="sel-situation">状況</label>
      <select id="sel-situation">
        <option value="">── シーンを先に選んでください ──</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="search()">フレーズを探す</button>

  <!-- 結果エリア -->
  <div class="result-area" id="result-area">
    <div class="card" style="padding-bottom:0.5rem;">
      <p class="card-title result-header" id="result-header">検索結果</p>
      <div id="phrase-list"></div>
    </div>
  </div>

    <div class="card" style="padding-bottom:0.5rem;">

      <div id="fav-list"></div>
    </div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  var SITUATIONS = {
    "依頼":  ["お願いしたいとき", "急ぎの依頼", "資料・書類を頼むとき"],
    "お礼":  ["助けてもらったとき", "指導・アドバイスへの感謝", "仕事を引き受けてもらったとき"],
    "謝罪":  ["遅刻・欠席のとき", "ミス・失敗のとき", "対応が遅れたとき"],
    "確認":  ["期日・締め切りを確認するとき", "内容・詳細を確認するとき", "進捗を確認するとき"],
    "断り":  ["依頼を断るとき", "予定・予約を断るとき", "提案を断るとき"],
    "電話":  ["電話をかけるとき", "電話を受けるとき", "伝言を頼むとき"],
    "メール": ["件名・書き出し", "返信・お礼メール", "締めの言葉"]
  };

  function onSceneChange() {
    var scene = document.getElementById('sel-scene').value;
    var sitSel = document.getElementById('sel-situation');
    sitSel.innerHTML = '';
    if (!scene) {
      sitSel.innerHTML = '<option value="">── シーンを先に選んでください ──</option>';
      return;
    }
    sitSel.innerHTML = '<option value="">── 状況を選んでください ──</option>';
    var sits = SITUATIONS[scene] || [];
    sits.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sitSel.appendChild(opt);
    });
  }

  function search() {
    var scene = document.getElementById('sel-scene').value;
    var recipient = document.getElementById('sel-recipient').value;
    var situation = document.getElementById('sel-situation').value;

    if (!scene || !recipient || !situation) {
      alert('シーン・相手・状況をすべて選んでください。');
      return;
    }

    var phrases = (PHRASES[scene] && PHRASES[scene][situation] && PHRASES[scene][situation][recipient]) || [];
    var container = document.getElementById('phrase-list');
    var header = document.getElementById('result-header');
    header.textContent = scene + ' ／ ' + situation + ' ／ 相手：' + recipient;

    if (phrases.length === 0) {
      container.innerHTML = '<p class="empty-state">該当するフレーズが見つかりませんでした。</p>';
    } else {
      var favs = loadFavs();
      container.innerHTML = phrases.map(function(p, i) {
        var isFav = favs.indexOf(p) !== -1;
        return '<div class="phrase-item" id="pi-' + i + '">'
          + '<p class="phrase-text">' + escHtml(p) + '</p>'
          + '<div class="phrase-actions">'
          + '<button class="btn-copy" onclick="copyPhrase(this, \'' + escAttr(p) + '\')">📋 コピー</button>'
          + '<button class="btn-fav' + (isFav ? ' saved' : '') + '" onclick="toggleFav(this, \'' + escAttr(p) + '\')">'
          + (isFav ? '⭐ お気に入り済' : '☆ お気に入り') + '</button>'
          + '</div></div>';
      }).join('');
    }

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyPhrase(btn, text) {
    navigator.clipboard ? navigator.clipboard.writeText(text).then(function() { flashCopy(btn); })
                        : (function() { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); flashCopy(btn); })();
  }

  function flashCopy(btn) {
    var orig = btn.textContent;
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  }

  function toggleFav(btn, text) {
    var favs = loadFavs();
    var idx = favs.indexOf(text);
    if (idx === -1) {
      favs.push(text);
      btn.textContent = '⭐ お気に入り済';
      btn.classList.add('saved');
    } else {
      favs.splice(idx, 1);
      btn.textContent = '☆ お気に入り';
      btn.classList.remove('saved');
    }
    saveFavs(favs);
    renderFavs();
  }

  function loadFavs() {
    try { return JSON.parse(localStorage.getItem('keigo_favs') || '[]'); } catch(e) { return []; }
  }
  function saveFavs(arr) {
    localStorage.setItem('keigo_favs', JSON.stringify(arr));
  }

  function renderFavs() {
    var favs = loadFavs();
    var sec = document.getElementById('fav-section');
    var list = document.getElementById('fav-list');
    if (favs.length === 0) {
      sec.style.display = 'none';
      return;
    }
    sec.style.display = 'block';
    list.innerHTML = favs.map(function(p) {
      return '<div class="phrase-item">'
        + '<p class="phrase-text">' + escHtml(p) + '</p>'
        + '<div class="phrase-actions">'
        + '<button class="btn-copy" onclick="copyPhrase(this, \'' + escAttr(p) + '\')">📋 コピー</button>'
        + '<button class="btn-fav saved" onclick="removeFavFromList(this, \'' + escAttr(p) + '\')">⭐ 削除</button>'
        + '</div></div>';
    }).join('');
  }

  function removeFavFromList(btn, text) {
    var favs = loadFavs();
    var idx = favs.indexOf(text);
    if (idx !== -1) { favs.splice(idx, 1); saveFavs(favs); }
    renderFavs();
    // 検索結果のボタンも更新
    var allFavBtns = document.querySelectorAll('#phrase-list .btn-fav');
    allFavBtns.forEach(function(b) {
      var sibling = b.previousElementSibling;
      if (sibling) {
        // find the phrase text from parent
        var pText = b.closest('.phrase-item').querySelector('.phrase-text').textContent;
        if (pText === text) {
          b.textContent = '☆ お気に入り';
          b.classList.remove('saved');
        }
      }
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  // 初期化
  renderFavs();
  </script>
