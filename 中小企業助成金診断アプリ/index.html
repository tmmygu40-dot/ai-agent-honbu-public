  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── チェックボックスグループ ── */
    .checkbox-group {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.35rem;
    }
    .checkbox-group label {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.82rem; font-weight: 500; color: var(--text);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.7rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0;
    }
    .checkbox-group input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
    .checkbox-group label:has(input:checked) {
      border-color: var(--accent); background: var(--accent-light); font-weight: 700;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 件数バナー ── */
    .count-banner {
      display: none; max-width: 600px; margin: 0 auto 1rem;
      background: var(--ok-bg); border: 2px solid var(--ok);
      border-radius: var(--radius); padding: 0.8rem 1.2rem;
      font-size: 0.9rem; font-weight: 700; color: var(--ok);
    }
    .count-banner.zero {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng);
    }

    /* ── 助成金カード ── */
    .grant-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin: 0 auto 0.8rem; max-width: 600px; overflow: hidden;
    }
    .grant-header {
      padding: 1rem 1.1rem; cursor: pointer;
      display: flex; align-items: flex-start; gap: 0.7rem;
    }
    .grant-header:hover { background: var(--accent-light); }
    .fav-btn {
      background: none; border: none; font-size: 1.2rem; cursor: pointer;
      flex-shrink: 0; padding: 0 0.1rem; line-height: 1;
      color: #ccc; transition: color 0.15s;
    }
    .fav-btn.faved { color: #e07b00; }
    .grant-meta { flex: 1; }
    .grant-name { font-size: 0.95rem; font-weight: 800; color: var(--text); line-height: 1.3; }
    .grant-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
    .tag {
      font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.5rem;
      border-radius: 99px; background: var(--accent-light); color: var(--accent);
    }
    .tag.kuni { background: #eff6ff; color: #1d4ed8; }
    .tag.chiho { background: #f0fdf4; color: #15803d; }
    .grant-amount {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      margin-top: 0.35rem;
    }
    .grant-amount span { color: var(--accent); font-size: 0.92rem; }
    .expand-icon { font-size: 0.9rem; color: var(--text-sub); flex-shrink: 0; padding-top: 0.15rem; }
    .grant-body {
      display: none; padding: 0 1.1rem 1rem;
      border-top: 1px solid var(--border);

    .grant-body dl { font-size: 0.84rem; line-height: 1.6; }
    .grant-body dt { font-weight: 700; color: var(--text-sub); margin-top: 0.7rem; font-size: 0.78rem; }
    .grant-body dd { color: var(--text); margin-left: 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  <header class="app-header">
    <h1>中小企業 助成金・補助金 診断アプリ</h1>
    <p class="subtitle">業種・規模・状況を選ぶだけで受給候補を即表示</p>
  </header>

  <!-- 条件入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>

    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="all">すべての業種</option>
        <option value="製造業">製造業</option>
        <option value="小売業">小売業</option>
        <option value="飲食業">飲食業</option>
        <option value="サービス業">サービス業</option>
        <option value="建設業">建設業</option>
        <option value="IT業">IT・情報通信業</option>
        <option value="農業">農業・林業・水産業</option>
        <option value="医療福祉">医療・福祉</option>
        <option value="運輸業">運輸・物流業</option>
        <option value="不動産業">不動産業</option>
      </select>
    </div>

    <div class="field">
      <label for="size">従業員規模</label>
      <select id="size">
        <option value="all">規模を選ばない</option>
        <option value="1〜5人">1〜5人（個人事業主含む）</option>
        <option value="6〜20人">6〜20人</option>
        <option value="21〜50人">21〜50人</option>
        <option value="51〜300人">51〜300人</option>
      </select>
    </div>

    <div class="field">
      <label>目的・状況（複数選択可）</label>
      <div class="checkbox-group" id="situations">
        <label><input type="checkbox" value="採用・雇用"> 採用・雇用</label>
        <label><input type="checkbox" value="設備投資"> 設備投資</label>
        <label><input type="checkbox" value="IT化"> IT化・デジタル化</label>
        <label><input type="checkbox" value="省エネ"> 省エネ・環境対応</label>
        <label><input type="checkbox" value="創業"> 創業・新事業</label>
        <label><input type="checkbox" value="BCP"> 事業継続・BCP</label>
        <label><input type="checkbox" value="人材育成"> 人材育成・教育</label>
        <label><input type="checkbox" value="働き方改革"> 働き方改革</label>
        <label><input type="checkbox" value="販路拡大"> 販路拡大・広報</label>
        <label><input type="checkbox" value="賃上げ"> 賃上げ・処遇改善</label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">助成金を探す</button>

  <div class="count-banner" id="countBanner"></div>
  <div id="grantList"></div>

  </p>

  var favKey = 'grant_favs_v1';
  var condKey = 'grant_cond_v1';

  function getFavs() {
    try { return JSON.parse(localStorage.getItem(favKey)) || {}; } catch(e) { return {}; }
  }
  function setFav(id, val) {
    var f = getFavs(); f[id] = val;
    localStorage.setItem(favKey, JSON.stringify(f));
  }

  function saveCond() {
    var cond = {
      industry: document.getElementById('industry').value,
      size: document.getElementById('size').value,
      situations: getChecked()
    };
    localStorage.setItem(condKey, JSON.stringify(cond));
  }

  function loadCond() {
    try {
      var c = JSON.parse(localStorage.getItem(condKey));
      if (!c) return;
      if (c.industry) document.getElementById('industry').value = c.industry;
      if (c.size) document.getElementById('size').value = c.size;
      if (c.situations) {
        document.querySelectorAll('#situations input[type="checkbox"]').forEach(function(cb) {
          cb.checked = c.situations.indexOf(cb.value) >= 0;
        });
      }
    } catch(e) {}
  }

  function getChecked() {
    var vals = [];
    document.querySelectorAll('#situations input[type="checkbox"]:checked').forEach(function(cb) {
      vals.push(cb.value);
    });
    return vals;
  }

  function diagnose() {
    saveCond();
    var industry = document.getElementById('industry').value;
    var size = document.getElementById('size').value;
    var sels = getChecked();
    var favs = getFavs();

    var results = GRANTS.filter(function(g) {
      // 業種チェック
      if (industry !== 'all' && g.industries.length > 0 && g.industries.indexOf(industry) < 0) return false;
      // 規模チェック
      if (size !== 'all' && g.sizes.length > 0 && g.sizes.indexOf(size) < 0) return false;
      // 状況チェック（未選択なら全件）
      if (sels.length > 0) {
        var match = false;
        for (var i = 0; i < sels.length; i++) {
          if (g.situations.indexOf(sels[i]) >= 0) { match = true; break; }
        }
        if (!match) return false;
      }
      return true;
    });

    // お気に入りを先頭に
    results.sort(function(a, b) {
      var af = favs[a.id] ? 1 : 0;
      var bf = favs[b.id] ? 1 : 0;
      return bf - af;
    });

    var banner = document.getElementById('countBanner');
    var list = document.getElementById('grantList');

    banner.style.display = 'block';
    if (results.length === 0) {
      banner.className = 'count-banner zero';
      banner.textContent = '条件に合う助成金・補助金が見つかりませんでした。条件を変えてお試しください。';
      list.innerHTML = '';
      return;
    }
    banner.className = 'count-banner';
    banner.textContent = results.length + ' 件の助成金・補助金が見つかりました';

    list.innerHTML = results.map(function(g) {
      var isFav = !!favs[g.id];
      return '<div class="grant-card" id="gc_' + g.id + '">'
        + '<div class="grant-header" onclick="toggleGrant(\'' + g.id + '\')">'
        + '<button class="fav-btn' + (isFav ? ' faved' : '') + '" onclick="event.stopPropagation();toggleFav(\'' + g.id + '\')" title="お気に入り">' + (isFav ? '★' : '☆') + '</button>'
        + '<div class="grant-meta">'
        + '<div class="grant-name">' + escHtml(g.name) + '</div>'
        + '<div class="grant-tags">'
        + '<span class="tag ' + g.type + '">' + escHtml(g.typeLabel) + '</span>'
        + g.situations.slice(0,3).map(function(s){ return '<span class="tag">' + escHtml(s) + '</span>'; }).join('')
        + '</div>'
        + '<div class="grant-amount">最大補助額：<span>' + escHtml(g.amount) + '</span></div>'
        + '</div>'
        + '<div class="expand-icon" id="ei_' + g.id + '">▼</div>'
        + '</div>'
        + '<div class="grant-body" id="gb_' + g.id + '">'
        + '<dl>'
        + '<dt>概要</dt><dd>' + escHtml(g.summary) + '</dd>'
        + '<dt>対象</dt><dd>' + escHtml(g.target) + '</dd>'
        + '<dt>申請先</dt><dd>' + escHtml(g.application) + '</dd>'
        + '<dt>詳細</dt><dd>' + escHtml(g.detail) + '</dd>'
        + '</dl>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  function toggleGrant(id) {
    var body = document.getElementById('gb_' + id);
    var icon = document.getElementById('ei_' + id);
    if (body.classList.contains('open')) {
      body.classList.remove('open');
      icon.textContent = '▼';
    } else {
      body.classList.add('open');
      icon.textContent = '▲';
    }
  }

  function toggleFav(id) {
    var favs = getFavs();
    var newVal = !favs[id];
    setFav(id, newVal);
    var btn = document.querySelector('#gc_' + id + ' .fav-btn');
    if (btn) {
      btn.classList.toggle('faved', newVal);
      btn.textContent = newVal ? '★' : '☆';
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期表示：保存条件を復元
  window.addEventListener('DOMContentLoaded', function() {
    loadCond();
  });
