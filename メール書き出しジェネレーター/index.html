<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="用件と相手との関係性を選ぶだけで、丁寧なビジネスメールの書き出し文を複数パターン即生成。コピーしてすぐ使えるメール書き出しジェネレーター。">
  <title>メール書き出しジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }

    /* ── 生成結果1件 ── */
    .gen-item {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .gen-item:last-child { margin-bottom: 0; }
    .gen-label {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.5rem;
    }
    .gen-text {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }
    .btn-copy {
      display: inline-block; margin-top: 0.6rem;
      padding: 0.4rem 1rem; font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--ok); }

    /* ── お気に入りカード ── */
    .fav-section { margin-top: 0.5rem; }
    .fav-section .card-title { margin-top: 0; }
    .btn-fav {
      display: inline-block; margin-top: 0.4rem;
      padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-fav:hover { border-color: var(--accent); color: var(--accent); }
    .fav-list-item {
      background: var(--bg); border-radius: 10px; padding: 0.8rem 1rem;
      margin-bottom: 0.6rem; position: relative;
    }
    .fav-list-item:last-child { margin-bottom: 0; }
    .fav-text { font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .fav-meta { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.3rem; }
    .btn-fav-del {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: none; border: none; font-size: 0.85rem; color: var(--text-sub);
      cursor: pointer; padding: 0.2rem;
    }
    .btn-fav-del:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>✉️ メール書き出しジェネレーター</h1>
    <p class="subtitle">用件と関係性を選ぶだけで、丁寧なビジネスメールの書き出しをサクッと生成できます。</p>
  </header>

    <div class="field">

        <option value="apology">お詫び</option>
        <option value="report">報告・連絡</option>
        <option value="confirm">確認</option>
        <option value="remind">催促・リマインド</option>
        <option value="invite">案内・招待</option>
        <option value="greeting">挨拶（着任・異動等）</option>
        <option value="reply">返信・回答</option>
      </select>
    </div>
    <div class="field">
      <label for="relation">相手との関係性</label>
      <select id="relation">
        <option value="">-- 選択してください --</option>
        <option value="boss">上司・目上の方</option>
        <option value="client">取引先・お客様</option>
        <option value="colleague">同僚・同格</option>
        <option value="subordinate">部下・後輩</option>
        <option value="first">初対面・面識なし</option>
      </select>
    </div>
    <div class="field">
      <label for="detail">補足（任意）</label>
      <textarea id="detail" placeholder="例: 先日の打ち合わせについて、見積もりの件 など" rows="2"></textarea>
      <p class="hint">具体的な内容を入れると、より自然な書き出しになります</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✉️ 書き出しを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="card-title">生成結果（3パターン）</p>
    <div id="result-list"></div>
  </div>

    <div id="fav-list"></div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  var PURPOSE_LABELS = {
    thanks: 'お礼', request: '依頼・お願い', apology: 'お詫び',
    report: '報告・連絡', confirm: '確認', remind: '催促・リマインド',
    invite: '案内・招待', greeting: '挨拶', reply: '返信・回答'
  };
  var RELATION_LABELS = {
    boss: '上司・目上の方', client: '取引先・お客様', colleague: '同僚・同格',
    subordinate: '部下・後輩', first: '初対面・面識なし'
  };

  /* ── localStorage ── */
  var STORAGE_KEY = 'mail_opener_fav';
  function loadFav() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFav(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  /* ── 生成 ── */
  function generate() {
    var purpose = document.getElementById('purpose').value;
    var relation = document.getElementById('relation').value;
    var detail = document.getElementById('detail').value.trim() || 'ご連絡いただいた内容';

    if (!purpose) { alert('用件を選択してください'); return; }
    if (!relation) { alert('関係性を選択してください'); return; }

    var templates = TEMPLATES[purpose][relation];
    var listEl = document.getElementById('result-list');
    listEl.innerHTML = '';

    templates.forEach(function(t, i) {
      var text = t.opening.replace(/\{name\}/g, '○○').replace(/\{detail\}/g, detail);
      var div = document.createElement('div');
      div.className = 'gen-item';
      div.innerHTML =
        '<p class="gen-label">パターン ' + (i + 1) + '（' + t.note + '）</p>' +
        '<p class="gen-text">' + escHtml(text) + '</p>' +
        '<button class="btn-copy" data-text="' + escAttr(text) + '" onclick="copyText(this)">📋 コピー</button>' +
        ' <button class="btn-fav" data-text="' + escAttr(text) + '" data-label="' + escAttr(PURPOSE_LABELS[purpose] + ' × ' + RELATION_LABELS[relation] + '（' + t.note + '）') + '" onclick="addFav(this)">⭐ お気に入り</button>';
      listEl.appendChild(div);
    });

    var rc = document.getElementById('result');
    rc.classList.add('show');
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── コピー ── */
  function copyText(btn) {
    var text = btn.getAttribute('data-text');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✅ コピーしました';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }
  }

  /* ── お気に入り ── */
  function addFav(btn) {
    var text = btn.getAttribute('data-text');
    var label = btn.getAttribute('data-label');
    var favs = loadFav();
    if (favs.some(function(f) { return f.text === text; })) {
      alert('このパターンは既にお気に入りに登録されています');
      return;
    }
    favs.push({ text: text, label: label, date: new Date().toLocaleDateString('ja-JP') });
    saveFav(favs);
    renderFav();
    btn.textContent = '⭐ 登録済み';
    setTimeout(function() { btn.textContent = '⭐ お気に入り'; }, 1500);
  }

  function removeFav(idx) {
    var favs = loadFav();
    favs.splice(idx, 1);
    saveFav(favs);
    renderFav();
  }

  function renderFav() {
    var favs = loadFav();
    var card = document.getElementById('fav-card');
    var list = document.getElementById('fav-list');
    if (favs.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(f, i) {
      return '<div class="fav-list-item">' +
        '<button class="btn-fav-del" onclick="removeFav(' + i + ')" title="削除">✕</button>' +
        '<p class="fav-text">' + escHtml(f.text) + '</p>' +
        '<p class="fav-meta">' + escHtml(f.label) + ' ／ ' + f.date + '</p>' +
        '<button class="btn-copy" data-text="' + escAttr(f.text) + '" onclick="copyText(this)" style="margin-top:0.4rem">📋 コピー</button>' +
        '</div>';
    }).join('');
  }

  /* ── ユーティリティ ── */
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'&#10;'); }

  /* ── 初期表示 ── */
  renderFav();
