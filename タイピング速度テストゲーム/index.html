<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイピング速度テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>タイピング速度テスト</h1>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">時間</span>
        <span class="stat-value" id="timer">60</span>
        <span class="stat-unit">秒</span>
      </div>
      <div class="stat">
        <span class="stat-label">WPM</span>
        <span class="stat-value" id="wpm">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">正確率</span>
        <span class="stat-value" id="accuracy">100</span>
        <span class="stat-unit">%</span>
      </div>
    </div>

    <div class="text-display" id="textDisplay">
      <!-- お題テキストがここに表示される -->
    </div>

    <textarea
      id="inputArea"
      class="input-area"
      placeholder="スタートボタンを押してタイピングを始めてください"
      disabled
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>

    <div class="btn-row">
      <button id="startBtn" class="btn btn-primary">スタート</button>
      <button id="resetBtn" class="btn btn-secondary">リセット</button>
    </div>

    <div class="result-panel" id="resultPanel" style="display:none;">
      <h2>結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">WPM</span>
          <span class="result-value" id="finalWpm">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">正確率</span>
          <span class="result-value" id="finalAccuracy">0%</span>
        </div>
        <div class="result-item">
          <span class="result-label">入力文字数</span>
          <span class="result-value" id="finalChars">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">ミス数</span>
          <span class="result-value" id="finalErrors">0</span>
        </div>
      </div>
      <div class="highscore-box">
        <span>ハイスコア（WPM）：</span>
        <span class="highscore-value" id="highScore">0</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
