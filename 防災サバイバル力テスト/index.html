<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防災サバイバル力テスト｜7問で判定する防災知識セルフチェック</title>
  <meta name="description" content="7問の防災クイズに答えるだけで、あなたの防災サバイバル力をレベル判定。地震・大雨・火災・備蓄など、いざという時に役立つ知識をサクッとセルフチェックできます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.6rem;
    }
    .question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem; color: var(--text);
    }
    .choice-btn {
      display: block; width: 100%; padding: 0.85rem 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: translateY(1px); }
    .choice-btn:last-child { margin-bottom: 0; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.55; margin-top: 0.4rem; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .review-item {
      padding: 0.9rem 0; border-bottom: 1px solid var(--border);
    }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; line-height: 1.45; }
    .review-line { font-size: 0.85rem; line-height: 1.55; margin-bottom: 0.2rem; }
    .review-line .lab { display: inline-block; min-width: 4.4em; color: var(--text-sub); font-weight: 600; }
    .review-line.correct .lab { color: var(--ok); }
    .review-line.wrong .lab { color: var(--ng); }
    .review-exp { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.35rem; padding: 0.55rem 0.7rem; background: var(--bg); border-radius: 8px; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🛟 防災サバイバル力テスト</h1>
    <p class="subtitle">7問で判定する防災知識セルフチェック ※2026年4月時点の参考情報。最新情報は内閣府・気象庁・自治体の公式情報をご確認ください</p>
  </header>

  <!-- 出題カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">クイズ</p>
    <p class="progress" id="prog">問題 1 / 7</p>
    <p class="question" id="qtext">読み込み中…</p>
    <div id="choices"></div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの防災サバイバル力</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 解説カード -->
  <div class="card" id="review" style="display:none">
    <p class="card-title">問題ごとの振り返り</p>
    <div id="review-list"></div>
  </div>

  <!-- リセットボタン -->
  <button class="btn-calc no-print" id="reset-btn" style="display:none" onclick="resetQuiz()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、内閣府・総務省消防庁・気象庁・自治体の防災ガイドなどを参考に、目安として使いやすく整理しています。最新情報は必ず公式情報・自治体のハザードマップをご確認ください。
  </p>

  <!-- 広告枠（仮） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '大きな地震が発生した直後、屋内で最初にとるべき行動は？',
      choices: [
        '窓を開けて外に飛び出す',
        '丈夫な机の下などに潜り、頭と体を守る',
        'すぐに火を止めにキッチンへ走る',
        'エレベーターで1階に降りる'
      ],
      ans: 1,
      exp: '揺れている最中の移動は転倒・落下物で危険。まずは頭を守って身を低くし、揺れが収まってから火の始末や避難を行います。'
    },
    {
      q: '非常用持ち出し袋に入れておく飲料水の目安は、1人あたり最低何日分？',
      choices: [
        '半日分（500ml程度）',
        '1日分（1〜1.5L）',
        '3日分（1日3L×3日＝9L程度）',
        '1週間分（20L以上）'
      ],
      ans: 2,
      exp: '備蓄は最低3日分、できれば1週間分が推奨。飲料・調理用として1人1日3Lが目安です（内閣府・農林水産省などのガイド）。'
    },
    {
      q: '大雨で「警戒レベル4（避難指示）」が発令されたとき、原則としてとるべき行動は？',
      choices: [
        '様子見でテレビをつけて状況を確認',
        '危険な場所にいる人は全員避難',
        '荷物を整理してから検討',
        '夜なので朝まで自宅で待機'
      ],
      ans: 1,
      exp: '警戒レベル4は「危険な場所から全員避難」のサイン。レベル5（緊急安全確保）は手遅れの段階。レベル4までに避難を完了させることが大切です。'
    },
    {
      q: '火災で煙が充満してきたとき、避難中の正しい姿勢は？',
      choices: [
        '走って一気に駆け抜ける',
        'できるだけ姿勢を低くしてハンカチで口を覆う',
        'まっすぐ立って深呼吸しながら歩く',
        '煙を避けるためエレベーターを使う'
      ],
      ans: 1,
      exp: '煙は上にたまるため、低い姿勢で口と鼻を覆い、なるべく息を止めるように移動します。エレベーターは停止リスクがあるため絶対に使わないこと。'
    },
    {
      q: '災害時、家族との安否確認に推奨されている方法は？',
      choices: [
        'とにかく電話をかけ続ける',
        '災害用伝言ダイヤル「171」や災害用伝言板を使う',
        '直接会いに行く',
        'SNSのDMで連絡が来るまで待つ'
      ],
      ans: 1,
      exp: '災害時は通話が集中して繋がりにくくなります。「171」や各キャリアの災害用伝言板、家族で決めた集合場所を活用しましょう。'
    },
    {
      q: '津波警報が発表された海辺・川沿いでとるべき行動は？',
      choices: [
        '海の様子を見に行って判断',
        '車で広い道を低い土地へ移動',
        'ただちに高台や津波避難ビルへ徒歩で避難',
        '家の2階に避難すれば安全'
      ],
      ans: 2,
      exp: '津波は予想より早く・高く到達します。海を見に行かない／車を使わない／とにかく高い所へ、が基本。木造住宅の2階では不十分なケースが多いです。'
    },
    {
      q: '備蓄食料を選ぶときのポイントとして、もっとも適切なのは？',
      choices: [
        '長期保存できる缶詰だけを大量に買う',
        '日常的に食べる物を少し多めに買い足し、食べた分を補充する（ローリングストック）',
        '非常食は買って押し入れに10年しまう',
        '家族の好みに関係なく安いものでまとめる'
      ],
      ans: 1,
      exp: 'ローリングストック法は、賞味期限切れを防ぎつつ無理なく備蓄を続けられる方法。普段から食べ慣れた味は災害時の安心感にもつながります。'
    }
  ];

  var STORAGE_KEY = 'bousai_survival_test_last_result';

  var state = {
    idx: 0,
    answers: [] // 各要素 = 選んだ index
  };

  function renderQuestion() {
    var card = document.getElementById('quiz-card');
    card.style.display = '';
    var q = QUESTIONS[state.idx];
    document.getElementById('prog').textContent = '問題 ' + (state.idx + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('qtext').textContent = q.q;
    var box = document.getElementById('choices');
    box.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.type = 'button';
      b.textContent = c;
      b.onclick = function() { onChoose(i); };
      box.appendChild(b);
    });
  }

  function onChoose(i) {
    state.answers.push(i);
    state.idx++;
    if (state.idx < QUESTIONS.length) {
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      finish();
    }
  }

  function finish() {
    document.getElementById('quiz-card').style.display = 'none';
    var score = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      if (state.answers[i] === QUESTIONS[i].ans) score++;
    }
    var total = QUESTIONS.length;
    var level, eval_, note;
    if (score >= 6) {
      level = 'ok';
      eval_ = '🛟 防災マスター級';
      note = '正しい知識がしっかり身についています。家族や周囲にも共有して、地域の防災力アップに貢献できそう。';
    } else if (score >= 4) {
      level = 'warn';
      eval_ = '⚠️ あと一歩レベル';
      note = '基本は押さえられていますが、間違えた問題は要チェック。今のうちに見直しておけば、いざという時の判断がぐっと早くなります。';
    } else {
      level = 'ng';
      eval_ = '🚨 知識不足ゾーン';
      note = '災害時の正しい行動を改めて確認しましょう。解説を読んで、今日できる備えから1つずつ始めるのがおすすめ。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + total + ' 問正解';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    renderReview();
    document.getElementById('reset-btn').style.display = '';

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        score: score,
        total: total,
        level: level,
        date: new Date().toISOString().slice(0, 10)
      }));
    } catch (e) { /* ignore */ }

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderReview() {
    var list = document.getElementById('review-list');
    list.innerHTML = '';
    QUESTIONS.forEach(function(q, i) {
      var picked = state.answers[i];
      var ok = picked === q.ans;
      var item = document.createElement('div');
      item.className = 'review-item';
      var html = '';
      html += '<p class="review-q">Q' + (i + 1) + '. ' + escapeHtml(q.q) + '</p>';
      html += '<p class="review-line ' + (ok ? 'correct' : 'wrong') + '">';
      html += '<span class="lab">' + (ok ? '◯ 正解' : '✕ 不正解') + '</span>';
      html += escapeHtml(q.choices[picked]);
      html += '</p>';
      if (!ok) {
        html += '<p class="review-line correct"><span class="lab">正答</span>' + escapeHtml(q.choices[q.ans]) + '</p>';
      }
      html += '<p class="review-exp">' + escapeHtml(q.exp) + '</p>';
      item.innerHTML = html;
      list.appendChild(item);
    });
    document.getElementById('review').style.display = '';
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function resetQuiz() {
    state.idx = 0;
    state.answers = [];
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').className = 'result-card';
    document.getElementById('review').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
