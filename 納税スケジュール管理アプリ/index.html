<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>納税スケジュール管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>納税スケジュール管理</h1>

    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="taxName">税目・保険料名</label>
          <input type="text" id="taxName" placeholder="例：住民税、国民年金" maxlength="50">
        </div>
        <div class="form-group">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" placeholder="例：50000" min="0">
        </div>
        <div class="form-group">
          <label for="dueDate">支払期限</label>
          <input type="date" id="dueDate">
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：第1期、口座振替" maxlength="100">
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">登録する</button>
    </section>

    <section class="summary-section">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="label">未払い件数</span>
          <span class="value" id="unpaidCount">0</span>
        </div>
        <div class="summary-card">
          <span class="label">未払い合計</span>
          <span class="value" id="unpaidTotal">¥0</span>
        </div>
        <div class="summary-card alert-card">
          <span class="label">期限間近（7日以内）</span>
          <span class="value" id="soonCount">0</span>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>支払い一覧</h2>
        <label class="toggle-paid">
          <input type="checkbox" id="showPaid" onchange="renderList()">
          <span>支払済みも表示</span>
        </label>
      </div>
      <div id="itemList" class="item-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
