<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>😴 睡眠管理</h1>

    <!-- 入力フォーム -->
    <section class="card">
      <h2>記録する</h2>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="bedtime">就寝時刻</label>
          <input type="time" id="bedtime">
        </div>
        <div class="form-group">
          <label for="waketime">起床時刻</label>
          <input type="time" id="waketime">
        </div>
      </div>
      <div class="form-group">
        <label for="note">メモ（任意）</label>
        <input type="text" id="note" placeholder="気になることを入力">
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <!-- 週平均表示 -->
    <section class="card" id="statsSection" style="display:none">
      <h2>週平均</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="weekAvg">--</div>
          <div class="stat-label">今週の平均</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalRecords">--</div>
          <div class="stat-label">総記録数</div>
        </div>
      </div>
    </section>

    <!-- グラフ -->
    <section class="card" id="chartSection" style="display:none">
      <h2>推移グラフ（直近14日）</h2>
      <canvas id="sleepChart"></canvas>
    </section>

    <!-- 記録一覧 -->
    <section class="card" id="listSection" style="display:none">
      <h2>記録一覧</h2>
      <ul id="recordList"></ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
