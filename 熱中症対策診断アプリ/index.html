<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱中症対策診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --danger: #7c2d12; --danger-bg: #fff1f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok     { border-color: var(--ok);     background: var(--ok-bg);     }
    .result-card.warn   { border-color: var(--warn);   background: var(--warn-bg);   }
    .result-card.ng     { border-color: var(--ng);     background: var(--ng-bg);     }
    .result-card.danger { border-color: var(--danger); background: var(--danger-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok     .result-value { color: var(--ok);     }
    .result-card.warn   .result-value { color: var(--warn);   }
    .result-card.ng     .result-value { color: var(--ng);     }
    .result-card.danger .result-value { color: var(--danger); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok     .result-eval { color: var(--ok);     }
    .result-card.warn   .result-eval { color: var(--warn);   }
    .result-card.ng     .result-eval { color: var(--ng);     }
    .result-card.danger .result-eval { color: var(--danger); }

    /* 水分量バッジ */
    .water-badge {
      display: inline-block;
      background: #e0f2fe; color: #0369a1;
      border-radius: 9px; padding: 0.4rem 1rem;
      font-size: 1.4rem; font-weight: 900;
      margin: 0.6rem 0 0.2rem;
    }
    .water-label { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.1rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* 対策カード */
    .tips-list { list-style: none; font-size: 0.85rem; line-height: 1.8; color: var(--text); }
    .tips-list li::before { content: "✅ "; }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌡️ 熱中症対策診断</h1>
    <p class="subtitle">年齢・体重・活動内容から熱中症リスクと水分補給目安を即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたの情報を入力</p>
    <div class="field">
      <label for="age">年齢</label>
      <input type="number" id="age" placeholder="例: 35" min="0" max="120">
      <p class="hint">高齢者（65歳以上）・子供（10歳以下）はリスクが高まります</p>
    </div>
    <div class="field">
      <label for="weight">体重（kg）</label>
      <input type="number" id="weight" placeholder="例: 60" min="1" max="300">
    </div>
    <div class="field">
      <label for="temp">現在の気温（℃）</label>
      <input type="number" id="temp" placeholder="例: 32" min="-10" max="50">
    </div>
    <div class="field">
      <label for="activity">活動内容</label>
      <select id="activity">
        <option value="rest">安静・室内（エアコン有）</option>
        <option value="light">軽作業・散歩・買い物</option>
        <option value="moderate" selected>通常の外出・家事・通勤</option>
        <option value="heavy">屋外作業・スポーツ・激しい運動</option>
      </select>
    </div>
    <div class="field">
      <label for="humidity">湿度の目安</label>
      <select id="humidity">
        <option value="low">低め（60%未満）</option>
        <option value="mid" selected>普通（60〜80%）</option>
        <option value="high">高め（80%以上）</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="diagnose()">熱中症リスクを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">熱中症リスクレベル</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <div style="margin-top:1rem;">
      <p class="water-label">今日の水分補給目安</p>
      <p class="water-badge" id="water">—</p>
      <p class="water-label">（食事からの水分を除いた飲料水の目安）</p>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 対策カード -->
  <div class="card" id="tips-card" style="display:none">
    <p class="card-title">推奨対策</p>
    <ul class="tips-list" id="tips-list"></ul>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは厚生労働省・環境省の熱中症予防ガイドラインおよび一般的な医学知見を参考に作成した目安です。体調不良を感じたら速やかに医療機関へ。
  </p>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'heatstroke_diag_v1';

  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      if (d.age)      document.getElementById('age').value      = d.age;
      if (d.weight)   document.getElementById('weight').value   = d.weight;
      if (d.temp)     document.getElementById('temp').value     = d.temp;
      if (d.activity) document.getElementById('activity').value = d.activity;
      if (d.humidity) document.getElementById('humidity').value = d.humidity;
    } catch(e) {}
  });

  function diagnose() {
    var age      = parseInt(document.getElementById('age').value);
    var weight   = parseFloat(document.getElementById('weight').value);
    var temp     = parseFloat(document.getElementById('temp').value);
    var activity = document.getElementById('activity').value;
    var humidity = document.getElementById('humidity').value;

    if (isNaN(age) || isNaN(weight) || isNaN(temp)) {
      showErr('年齢・体重・気温をすべて入力してください');
      return;
    }

    // 入力保存
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ age: age, weight: weight, temp: temp, activity: activity, humidity: humidity }));

    // ── リスクスコア計算 ──
    var score = 0;
    var tempScore = 0, ageScore = 0, actScore = 0, humScore = 0;

    // 気温スコア
    if      (temp < 25) { tempScore = 0; }
    else if (temp < 28) { tempScore = 1; }
    else if (temp < 30) { tempScore = 2; }
    else if (temp < 33) { tempScore = 3; }
    else if (temp < 36) { tempScore = 4; }
    else                { tempScore = 5; }

    // 活動スコア
    var actMult = 1.0;
    if      (activity === 'rest')     { actScore = 0; actMult = 1.0; }
    else if (activity === 'light')    { actScore = 1; actMult = 1.1; }
    else if (activity === 'moderate') { actScore = 2; actMult = 1.25; }
    else if (activity === 'heavy')    { actScore = 3; actMult = 1.5; }

    // 年齢スコア
    if (age >= 65 || age <= 10) { ageScore = 2; }
    else if (age >= 55)         { ageScore = 1; }

    // 湿度スコア
    if      (humidity === 'high') { humScore = 1; }
    else if (humidity === 'mid')  { humScore = 0; }

    score = tempScore + actScore + ageScore + humScore;

    // ── リスクレベル判定 ──
    var level, label, eval_, note;
    if (score <= 2) {
      level = 'ok'; label = '低リスク';
      eval_ = '現時点での熱中症リスクは低めです';
      note  = '引き続きこまめな水分補給を心がけましょう。';
    } else if (score <= 4) {
      level = 'warn'; label = '中リスク';
      eval_ = '熱中症に注意が必要な状況です';
      note  = '定期的に休憩・水分補給をしてください。';
    } else if (score <= 6) {
      level = 'ng'; label = '高リスク';
      eval_ = '熱中症が発生しやすい状況です';
      note  = '無理な外出・運動を避け、涼しい場所で休憩してください。';
    } else {
      level = 'danger'; label = '危険';
      eval_ = '熱中症の危険が非常に高い状況です';
      note  = '屋外活動は中止し、すぐに涼しい場所へ移動してください。';
    }

    // ── 水分補給目安 ──
    // 基本: 体重 × 35ml
    var baseWater = weight * 35;
    // 活動補正
    var waterMl = baseWater * actMult;
    // 気温35℃以上: +500ml
    if (temp >= 35) waterMl += 500;
    // 湿度高: +200ml
    if (humidity === 'high') waterMl += 200;
    // 食事由来の水分（約800ml）を引く
    var drinkWater = Math.max(500, waterMl - 800);
    var drinkL = (drinkWater / 1000).toFixed(1);

    // 対策リスト
    var tipsMap = {
      ok: ['こまめに水分補給（30分に1回程度）', '外出時は日陰を活用する', '帽子・日傘で直射日光を避ける'],
      warn: ['30分ごとに休憩・水分補給を必ず取る', '塩分も一緒に補給する（スポーツドリンク等）', '無理な外出・長時間の作業は控える', '首・脇・脚の付け根を冷やす'],
      ng: ['屋外活動は最小限に抑える', '毎20〜30分ごとに水分と塩分を補給', '急に気分が悪くなったらすぐ日陰に移動', '一人での外出を避ける', 'エアコンを積極的に使用する'],
      danger: ['今すぐ屋外活動を中止する', '涼しい室内に移動してエアコンをつける', '大量の水分と塩分を補給する', '体を冷やす（首・脇・脚の付け根に保冷剤等）', '症状が出たら迷わず119番に電話する']
    };

    showResult(level, label, eval_, note, drinkL);
    showDetail([
      ['気温スコア', temp + '℃ → +' + tempScore],
      ['活動スコア', actLabel(activity) + ' → +' + actScore],
      ['年齢スコア', age + '歳 → +' + ageScore],
      ['湿度スコア', humLabel(humidity) + ' → +' + humScore],
      ['合計スコア', score + ' 点', true],
    ]);
    showTips(tipsMap[level]);
  }

  function actLabel(a) {
    return { rest: '安静・室内', light: '軽作業', moderate: '通常外出', heavy: '屋外作業・運動' }[a] || a;
  }
  function humLabel(h) {
    return { low: '低め', mid: '普通', high: '高め' }[h] || h;
  }

  function showResult(level, label, eval_, note, drinkL) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = label;
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;
    document.getElementById('water').textContent = drinkL + ' L';
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showTips(tips) {
    document.getElementById('tips-list').innerHTML = tips.map(function(t) {
      return '<li>' + t + '</li>';
    }).join('');
    document.getElementById('tips-card').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('water').textContent = '—';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('tips-card').style.display = 'none';
  }
  </script>

</body>
</html>
