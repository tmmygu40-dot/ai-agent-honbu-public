<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し誕生日カウントダウン｜お祝いメッセージ自動生成</title>
  <meta name="description" content="推しの名前と誕生日を入れるだけで、残り日数とお祝いメッセージ5パターンを自動生成。SNS投稿やお祝いカードにそのまま使える、推し活ファン向けの無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .msg-item {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.9rem 0.95rem;
      margin-bottom: 0.7rem;
    }
    .msg-item:last-child { margin-bottom: 0; }
    .msg-text { font-size: 0.95rem; line-height: 1.6; color: var(--text); margin-bottom: 0.6rem; white-space: pre-wrap; }
    .btn-copy {
      display: inline-block; padding: 0.4rem 0.85rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer;
    }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎂 推し誕生日カウントダウン</h1>
    <p class="subtitle">推しの誕生日までの残り日数＆お祝いメッセージを自動生成</p>
  </header>

  <div class="card">
    <p class="card-title">推し情報</p>
    <div class="field">
      <label for="oshi-name">推しの名前</label>
      <input type="text" id="oshi-name" placeholder="例: ○○くん / △△ちゃん">
      <p class="hint">愛称・敬称込みでOK</p>
    </div>
    <div class="field">
      <label for="oshi-bday">推しの誕生日</label>
      <input type="date" id="oshi-bday">
      <p class="hint">年は当年でOK（過去日でも来年の誕生日で再計算）</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">カウントダウン開始</button>

  <div class="result-card" id="result">
    <p class="result-label">推しの誕生日まで</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="msg-card" style="display:none">
    <p class="card-title">お祝いメッセージ 5パターン</p>
    <div id="msg-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 入力された推し情報はお使いの端末（ブラウザ）にのみ保存され、外部には送信されません。SNS投稿やお祝いカードに自由にお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi_birthday_v2_app_v1';

  // 起動時に localStorage から復元
  (function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.name) document.getElementById('oshi-name').value = d.name;
      if (d.bday) document.getElementById('oshi-bday').value = d.bday;
    } catch (e) {}
  })();

  function calc() {
    var name = document.getElementById('oshi-name').value.trim();
    var bday = document.getElementById('oshi-bday').value;
    if (!name || !bday) { showErr('推しの名前と誕生日を入力してください'); return; }

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: name, bday: bday }));
    } catch (e) {}

    var today = new Date();
    today.setHours(0,0,0,0);

    var bdParts = bday.split('-');
    var bMonth = parseInt(bdParts[1], 10) - 1;
    var bDay   = parseInt(bdParts[2], 10);

    // 今年の誕生日
    var thisYearBday = new Date(today.getFullYear(), bMonth, bDay);
    thisYearBday.setHours(0,0,0,0);

    var targetBday, isToday = false;
    if (thisYearBday.getTime() === today.getTime()) {
      isToday = true;
      targetBday = thisYearBday;
    } else if (thisYearBday < today) {
      targetBday = new Date(today.getFullYear() + 1, bMonth, bDay);
    } else {
      targetBday = thisYearBday;
    }
    targetBday.setHours(0,0,0,0);

    var diffMs = targetBday - today;
    var diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

    var level, mainText, note;
    if (isToday) {
      level = 'ok';
      mainText = '🎉 今日です！';
      note = name + 'さんの誕生日です。最高の一日にしましょう！';
    } else {
      level = diffDays <= 7 ? 'ok' : diffDays <= 30 ? 'warn' : 'ng';
      mainText = 'あと ' + diffDays + ' 日';
      var dateStr = (targetBday.getMonth() + 1) + '月' + targetBday.getDate() + '日';
      note = name + 'さんの誕生日（' + dateStr + '）まで、準備の時間です';
    }

    showResult(level, mainText, note);
    showMessages(name, isToday, diffDays);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('msg-card').style.display = 'none';
  }

  function buildMessages(name, isToday, diffDays) {
    if (isToday) {
      return [
        '🎂 ' + name + 'さん、お誕生日おめでとうございます！\nあなたの存在が毎日の元気の源です。今日が最高の一日になりますように。',
        '💖 Happy Birthday, ' + name + '！\n推しになってくれてありがとう。これからもずっと応援してます。',
        '🎉 ' + name + 'さん、HBD！\n今日くらいは推しに全力でメッセージ送っちゃいます。大好きです！',
        '🌸 ' + name + 'さんの誕生日、来てくれてありがとう。\n今日という日を一緒に祝えるのが本当に嬉しいです。',
        '✨ Dear ' + name + ',\n生まれてきてくれて、推しでいてくれて、ありがとう。素敵な1年になりますように。'
      ];
    }
    if (diffDays <= 7) {
      return [
        '🎂 ' + name + 'さんの誕生日まであと ' + diffDays + ' 日！\nそろそろお祝いの準備、整いましたか？ワクワクが止まりません。',
        '💖 ' + name + 'さんのバースデーまでカウントダウン中（残り' + diffDays + '日）。\n当日は最高のお祝いを届けたいですね。',
        '🎉 あと ' + diffDays + ' 日で ' + name + 'さんの誕生日！\nSNS投稿の文面、もう考え始めましょう。',
        '🌸 推しの誕生日まで一週間以内…！\n' + name + 'さん、当日まで待ちきれません。',
        '✨ ' + name + 'さん、お誕生日まであと ' + diffDays + ' 日！\n素敵な日を迎えられるよう、心を込めて準備します。'
      ];
    }
    if (diffDays <= 30) {
      return [
        '🎂 ' + name + 'さんの誕生日まであと ' + diffDays + ' 日。\n今月中にお祝いの準備、始めましょう！',
        '💖 推しの ' + name + 'さん、誕生日まで残り ' + diffDays + ' 日。\nプレゼントやメッセージカードの計画を立てる時期です。',
        '🎉 ' + name + 'さんのバースデーまであと ' + diffDays + ' 日！\n推し活ノートに「やりたいことリスト」を書き出すのもおすすめ。',
        '🌸 1ヶ月以内に ' + name + 'さんの誕生日が来ます。\n当日のSNS投稿の構成、そろそろ考え始めましょう。',
        '✨ ' + name + 'さんの誕生日まで ' + diffDays + ' 日。\n推し色グッズの準備、忘れずに！'
      ];
    }
    return [
      '🎂 ' + name + 'さんの誕生日まであと ' + diffDays + ' 日。\nまだ時間はあります、ゆっくり準備していきましょう。',
      '💖 推しの ' + name + 'さん、お誕生日は ' + diffDays + ' 日後。\n今のうちに資金計画とアイデア出し、はじめてみては？',
      '🎉 ' + diffDays + ' 日後に ' + name + 'さんのバースデー！\n長いカウントダウンを楽しんでいきましょう。',
      '🌸 ' + name + 'さんの誕生日まで残り ' + diffDays + ' 日。\n少しずつ推し活ノートにアイデアを溜めていきたいですね。',
      '✨ ' + name + 'さんのバースデーまで ' + diffDays + ' 日。\n気長に、でも忘れずに、お祝いの準備を進めましょう。'
    ];
  }

  function showMessages(name, isToday, diffDays) {
    var msgs = buildMessages(name, isToday, diffDays);
    var html = msgs.map(function(m, i) {
      var safeId = 'msg-' + i;
      return '<div class="msg-item">'
           + '<p class="msg-text" id="' + safeId + '"></p>'
           + '<button class="btn-copy" data-target="' + safeId + '" onclick="onCopyClick(this)">📋 コピー</button>'
           + '</div>';
    }).join('');
    var listEl = document.getElementById('msg-list');
    listEl.innerHTML = html;
    msgs.forEach(function(m, i) {
      document.getElementById('msg-' + i).textContent = m;
    });
    document.getElementById('msg-card').style.display = 'block';
  }

  function onCopyClick(btn) {
    var tid = btn.getAttribute('data-target');
    var text = document.getElementById(tid).textContent;
    copyText(text, btn);
  }

  function copyText(text, btn) {
    var done = function() {
      btn.textContent = '✅ コピー完了';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピー';
        btn.classList.remove('copied');
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function() { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
