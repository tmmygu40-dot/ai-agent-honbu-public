<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="クレーム電話に即対応できる謝罪テンプレートを自動生成。クレーム内容と怒りレベルを選ぶだけで、営業担当者がその場で使える完璧な言い訳・謝罪文が1秒で生成されます。">
  <title>📞 クレーム電話言い訳テンプレートジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #d9534f;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ラジオボタングループ ── */
    .radio-group { margin-bottom: 0.5rem; }
    .radio-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0; cursor: pointer;
    }
    .radio-item input[type="radio"] { cursor: pointer; }
    .radio-item label { margin: 0; cursor: pointer; font-weight: 400; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b84441, 0 6px 16px rgba(217,83,79,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b84441, 0 2px 8px rgba(217,83,79,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.5; margin-bottom: 0.8rem; word-wrap: break-word; white-space: pre-wrap; }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📞 クレーム電話言い訳テンプレートジェネレーター</h1>
    <p class="subtitle">クレーム内容と怒りレベルを選ぶだけで、その場で使える謝罪文が自動で生成される営業支援ツール。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選択</p>

    <div class="field">
      <label for="claimType">クレーム内容</label>
      <select id="claimType">
        <option value="">選択してください</option>
        <option value="quality">商品不良・品質問題</option>
        <option value="delivery">納期遅延</option>
        <option value="price">価格・料金問題</option>
        <option value="service">対応・サービス不満</option>
      </select>
    </div>

    <div class="field">
      <label>怒りレベル</label>
      <div class="radio-group">
        <div class="radio-item">
          <input type="radio" name="angerLevel" value="low" id="low">
          <label for="low">低 👌 (落ち着いているが改善要望)</label>
        </div>
        <div class="radio-item">
          <input type="radio" name="angerLevel" value="medium" id="medium">
          <label for="medium">中 😠 (怒っている、早急な対応要求)</label>
        </div>
        <div class="radio-item">
          <input type="radio" name="angerLevel" value="high" id="high">
          <label for="high">高 🔥 (激怒、クレーム寸前)</label>
        </div>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">テンプレを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">謝罪テンプレート</p>
    <p class="result-value" id="template"></p>
    <p class="result-note" id="rn" style="margin-top:1rem;"></p>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">過去に使ったテンプレ</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、一般的なビジネスマナーとコミュニケーション理論に基づいて作成された謝罪テンプレートを提供します。実際の対応は、企業ポリシーや顧客との関係を踏まえてご判断ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // テンプレート定義（クレーム種別 × 怒りレベル）
  var TEMPLATES = {
    quality: {
      low: "いつもご利用いただきありがとうございます。\n貴重なご指摘ありがとうございます。お詫びします。\nお客様にご不快をおかけしてしまい申し訳ございません。\nお手数ですが、該当の商品をお知らせいただけば、すぐに対応させていただきます。\nご指摘の点は重く受け止め、品質改善に取り組んでまいります。",
      medium: "大変お詫びいたします。\n商品品質の不良により、ご不安とご不便をおかけして申し訳ございません。\nこのような事態を招いてしまったことを心よりお詫びし、深く反省いたしております。\n今週中にご対応させていただきたいのですが、いかがでしょうか。\n今後このようなことがないよう、製造工程の見直しを急ぎます。",
      high: "このたびは、大変失礼いたしました。申し訳ございません。\n貴重なご指摘をいただいたにもかかわらず、品質不良でご迷惑をおかけしてしまい、\n重大な過失があったことを痛感いたしております。\n本件は当社管理職へ報告済みであり、本日中に専任チームを配置いたします。\nご迷惑ご心配をおかけしたことを、重ねてお詫び申し上げます。"
    },
    delivery: {
      low: "いつもご利用いただきありがとうございます。\nこの度は納期についてご指摘いただき、ありがとうございます。\n納期遅延により、ご迷惑をおかけして申し訳ございません。\n本来のお約束を果たせず失礼いたしました。\n今後は納期管理をより徹底し、同様のことがないよう改善いたします。",
      medium: "大変お詫びいたします。\n納期遅延により、ご計画にご支障をおかけして申し訳ございません。\nお急ぎのところ、ご期待に応えられず申し訳ございませんでした。\n現在、製造チームが優先対応中であり、明日午前中には発送予定です。\nご不便をおかけして申し訳ございませんでした。",
      high: "このたびは本当に申し訳ございません。\n納期を大幅にお約束より遅延させてしまい、貴社のご計画に多大なご迷惑をおかけしました。\n大変失礼なことを申し上げました。\n本件は当社管理職へ報告済みであり、本日夜間にでも発送させていただく手配を進めております。\nご信頼をいただいていたにもかかわらず、このような事態を招いてしまい、重ねてお詫び申し上げます。"
    },
    price: {
      low: "いつもご利用いただきありがとうございます。\nご質問いただきありがとうございます。\n価格についてのご懸念ですが、品質と価値を含めたご説明をさせていただけますでしょうか。\n詳しい見積もりと仕様を改めてご送付させていただきますので、ご検討ください。",
      medium: "大変失礼いたしました。\n価格についてのご不満をいただき、申し訳ございません。\n当初のご説明不足があった可能性があり、申し訳ありません。\n詳細な内訳をご説明するとともに、ご予算に応じたプランのご提案も可能です。\n本日中にご対応させていただきたいのですが、いかがでしょうか。",
      high: "このたびはご迷惑をおかけして申し訳ございません。\n価格のご説明が不十分であり、お客様にご不信をおかけしてしまい、\n誠に失礼いたしました。\n営業責任者が本日夕方までにお伺いさせていただき、詳細なご説明と\nご予算に応じた複数の代替案をご提案させていただきたいと考えております。\nこのたびはご不快をおかけして申し訳ございませんでした。"
    },
    service: {
      low: "いつもご利用いただきありがとうございます。\nご意見をいただき、ありがとうございます。\nサービス対応についてのご指摘ですが、改善の貴重なご指摘として受け止めます。\nいただいたご意見をもとに、対応方法を見直させていただきます。",
      medium: "大変申し訳ございません。\n当社の対応でご不満をおかけしてしまい、申し訳ございません。\nお客様のご期待に応えられず、失礼いたしました。\n本件については改めて対応させていただきたいと存じます。\n明日中にご連絡させていただければ幸いです。",
      high: "このたびは本当に申し訳ございません。\n当社の対応の不備により、お客様に多大なご不快をおかけしてしまい、\n心より申し訳ございません。\nこのような事態を招いてしまったことを深く反省いたしております。\n管理責任者が本日中にご連絡させていただき、\n改めて誠意をもってご対応させていただく所存です。\nご信頼をいただいていたにもかかわらず、失礼いたしました。"
    }
  };

  function generate() {
    var claimType = document.getElementById('claimType').value;
    var angerLevel = document.querySelector('input[name="angerLevel"]:checked');

    if (!claimType || !angerLevel) {
      showErr('すべて選択してください');
      return;
    }

    var level = angerLevel.value;
    var template = TEMPLATES[claimType][level];

    showResult(template);
    saveToHistory(claimType, level);
    showHistory();
  }

  function showResult(template) {
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('template').textContent = template;
    document.getElementById('rn').textContent = 'ご状況に応じて、このテンプレートを基に調整してご使用ください。';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('template').textContent = msg;
    document.getElementById('rn').textContent = '';
  }

  function saveToHistory(claimType, level) {
    var history = JSON.parse(localStorage.getItem('claimHistory') || '[]');
    var labels = {
      quality: '商品不良',
      delivery: '納期遅延',
      price: '価格問題',
      service: '対応不満'
    };
    var levelLabels = {
      low: '低',
      medium: '中',
      high: '高'
    };

    history.push({
      claim: labels[claimType],
      anger: levelLabels[level],
      time: new Date().toLocaleString('ja-JP')
    });

    if (history.length > 10) {
      history = history.slice(-10);
    }

    localStorage.setItem('claimHistory', JSON.stringify(history));
  }

  function showHistory() {
    var history = JSON.parse(localStorage.getItem('claimHistory') || '[]');
    if (history.length === 0) return;

    var histCard = document.getElementById('historyCard');
    var list = document.getElementById('historyList');

    list.innerHTML = history.reverse().map(function(h, i) {
      return '<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.82rem;">' +
             '(' + h.time + ') ' + h.claim + ' / 怒りレベル：' + h.anger +
             '</div>';
    }).join('');

    histCard.style.display = '';
  }

  // 初期化時に履歴を表示
  window.addEventListener('load', function() {
    showHistory();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
