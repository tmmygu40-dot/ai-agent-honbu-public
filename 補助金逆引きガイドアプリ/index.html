<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補助金逆引きガイドアプリ</title>
  <meta name="description" content="業種・従業員規模・課題を選ぶだけで、活用できる補助金・助成金候補を逆引き表示。IT導入補助金・ものづくり補助金・持続化補助金など主要15件以上を収録した中小企業向け無料ガイドアプリ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 件数バッジ ── */
    .count-badge {
      max-width: 600px; margin: 0 auto 0.8rem;
      padding: 0.7rem 1rem;
      background: var(--accent-light); border: 1.5px solid var(--accent);
      border-radius: 10px; font-size: 0.92rem; font-weight: 700;
      color: var(--accent); display: none;
    }

    /* ── 補助金カード ── */
    .subsidy-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.8rem;
      max-width: 600px;
    }
    .subsidy-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
      margin-bottom: 0.5rem;
    }
    .subsidy-summary {
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.6;
      margin-bottom: 0.7rem;
    }
    .subsidy-meta {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .meta-item {
      font-size: 0.76rem; font-weight: 600;
      padding: 0.25rem 0.6rem; border-radius: 6px;
    }
    .meta-item.amount {
      background: #fff8ee; color: var(--accent);
      border: 1px solid #fcd9a0;
    }
    .meta-item.contact {
      background: #f0f4ff; color: #2563eb;
      border: 1px solid #bfcff8;
    }
    .meta-item.timing {
      background: #f0fdf4; color: var(--ok);
      border: 1px solid #a7f3d0;
    }

    /* ── 結論カード（0件時） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card, .subsidy-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 条件選択カード -->

    <div class="field">

        <option value="小売">小売業・卸売業</option>
        <option value="飲食">飲食業</option>
        <option value="IT">IT・情報通信業</option>
        <option value="サービス">サービス業</option>
        <option value="農業">農業・林業・漁業</option>
        <option value="医療">医療・介護・福祉</option>
      </select>
    </div>
    <div class="field">
      <label for="size">従業員規模</label>
      <select id="size">
        <option value="all">すべての規模</option>
        <option value="1">1人（個人事業主）</option>
        <option value="small">2〜20人</option>
        <option value="mid">21〜50人</option>
        <option value="large">51人以上</option>
      </select>
    </div>
    <div class="field">
      <label for="challenge">課題・やりたいこと</label>
      <select id="challenge">
        <option value="all">すべての課題</option>
        <option value="設備">設備投資・機械導入</option>
        <option value="デジタル">デジタル化・IT導入</option>
        <option value="採用">採用・人材育成</option>
        <option value="販路">販路開拓・売上拡大</option>
        <option value="省エネ">省エネ・コスト削減</option>
        <option value="承継">事業承継・引継ぎ</option>
        <option value="創業">創業・新規事業</option>
      </select>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-calc" onclick="search()">補助金を探す</button>

  <!-- 件数表示 -->
  <div class="count-badge" id="countBadge"></div>

  <!-- 0件メッセージ -->
  <div class="result-card warn" id="noResult">
    <p class="result-note">条件に合う補助金が見つかりませんでした。<br>条件を「すべて」にして再検索してみてください。</p>
  </div>

  <!-- 補助金リスト -->
  <div id="resultList"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、中小企業庁・厚生労働省・経済産業省などの公開資料をもとに目安として整理しています。2025年度参考データです。募集時期・上限額は年度や予算状況により変わります。最新情報は各申請窓口または公式サイトをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  var SAVE_KEY = 'hojokingaku_cond_v1';

  // ── 初期化：localStorage から復元 ──
  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      try {
        var c = JSON.parse(saved);
        if (c.industry) document.getElementById('industry').value = c.industry;
        if (c.size) document.getElementById('size').value = c.size;
        if (c.challenge) document.getElementById('challenge').value = c.challenge;
      } catch(e) {}
    }
  });

  function search() {
    var industry  = document.getElementById('industry').value;
    var size      = document.getElementById('size').value;
    var challenge = document.getElementById('challenge').value;

    // localStorage 保存
    localStorage.setItem(SAVE_KEY, JSON.stringify({industry: industry, size: size, challenge: challenge}));

    // フィルタ
    var results = DB.filter(function(s) {
      var indOk  = industry  === 'all' || s.industries.length === 0 || s.industries.indexOf(industry) !== -1;
      var sizeOk = size      === 'all' || s.sizes.length      === 0 || s.sizes.indexOf(size)          !== -1;
      var chalOk = challenge === 'all' || s.challenges.length === 0 || s.challenges.indexOf(challenge) !== -1;
      return indOk && sizeOk && chalOk;
    });

    var badge   = document.getElementById('countBadge');
    var noRes   = document.getElementById('noResult');
    var list    = document.getElementById('resultList');

    noRes.innerHTML = noRes.innerHTML;
    list.innerHTML = '';

    if (results.length === 0) {
      badge.style.display = 'none';
      noRes.style.display = 'block';
      return;
    }

    noRes.style.display = 'none';
    badge.textContent = '🎯 ' + results.length + ' 件の補助金・助成金が見つかりました';
    badge.style.display = 'block';

    results.forEach(function(s) {
      var div = document.createElement('div');
      div.className = 'subsidy-card';
      div.innerHTML =
        '<p class="subsidy-name">💰 ' + esc(s.name) + '</p>' +
        '<p class="subsidy-summary">' + esc(s.summary) + '</p>' +
        '<div class="subsidy-meta">' +
          '<span class="meta-item amount">上限 ' + esc(s.amount) + '</span>' +
          '<span class="meta-item contact">📍 ' + esc(s.contact) + '</span>' +
          '<span class="meta-item timing">📅 ' + esc(s.timing) + '</span>' +
        '</div>';
      list.appendChild(div);
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
