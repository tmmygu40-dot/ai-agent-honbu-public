<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活性格診断｜3択10問で月の散財タイプ即判定</title>
  <meta name="description" content="3択10問に答えるだけで、あなたの推し活タイプと月のおおよその散財傾向がわかる無料診断。グッズ・チケット・遠征の使いすぎ自覚にお役立てください。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { padding: 0.9rem 0; border-bottom: 1px solid var(--border); }
    .q-block:last-child { border-bottom: none; }
    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
    .q-text { font-size: 0.97rem; font-weight: 700; line-height: 1.5; margin: 0.2rem 0 0.7rem; }

    .opt {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.65rem 0.7rem; margin-bottom: 0.45rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer; user-select: none;
      transition: border-color 0.1s, background 0.1s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; margin-top: 0.2rem; cursor: pointer; accent-color: var(--accent); }
    .opt .opt-text { font-size: 0.9rem; line-height: 1.45; color: var(--text); }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>推し活性格診断</h1>
    <p class="subtitle">3択10問で、あなたの推し活タイプと月の散財傾向をズバリ判定</p>
  </header>

  <div class="card">
    <p class="card-title">10問の質問</p>
    <div id="quiz"></div>
  </div>

  <button class="btn-calc" onclick="calc()">結果を見る</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">スコアと月の散財傾向</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 本診断はエンタメ目的の参考診断です。家計判断は実際の支出記録・家計簿などをご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshikatsu_personality_v1';

  var QUESTIONS = [
    { q: '推しの新グッズ発売情報を見たとき、最初の反応は？',
      opts: [
        { t: '「とりあえず後で考えよう」と一旦保留', s: 0 },
        { t: '「予算内なら買う」と冷静に検討', s: 1 },
        { t: '「全種コンプ一択」と即ポチる', s: 2 }
      ] },
    { q: 'ライブ・イベントに参戦するペースは？',
      opts: [
        { t: '年に数回、行ければラッキー', s: 0 },
        { t: '月1〜2回、無理ない範囲で', s: 1 },
        { t: '遠征込みでスケジュール調整は推し最優先', s: 2 }
      ] },
    { q: '推しのSNS投稿をチェックする頻度は？',
      opts: [
        { t: '気が向いたら見る程度', s: 0 },
        { t: '毎日1〜数回は確認', s: 1 },
        { t: '通知ON、更新を秒で察知', s: 2 }
      ] },
    { q: '同じ推しグッズが「色違い」で3種出ます。どうする？',
      opts: [
        { t: '一番好きな1色だけ', s: 0 },
        { t: '推しイメージカラー＋もう1色', s: 1 },
        { t: '全色購入は当然のたしなみ', s: 2 }
      ] },
    { q: '月のお給料が入ったら、まず何にいくら使う？',
      opts: [
        { t: '生活費・貯金が最優先', s: 0 },
        { t: '推し活費を先に確保しておく', s: 1 },
        { t: '推し活枠が事実上の生活費', s: 2 }
      ] },
    { q: '推しのグッズや写真を飾るスペースは？',
      opts: [
        { t: 'デスクや棚の一角', s: 0 },
        { t: '推し用の専用棚や箱がある', s: 1 },
        { t: '一部屋まるごと祭壇化している', s: 2 }
      ] },
    { q: '推しの誕生日。どう祝う？',
      opts: [
        { t: 'SNSで「おめでとう」を送る', s: 0 },
        { t: '推しケーキや花を飾る／カフェ参加', s: 1 },
        { t: 'バースデー広告・看板出資クラスで盛大に', s: 2 }
      ] },
    { q: '推しがメディア露出すると…',
      opts: [
        { t: '見られたら見る', s: 0 },
        { t: '録画や見逃し配信で必ず追う', s: 1 },
        { t: '雑誌・配信・グッズすべて買って布教まで', s: 2 }
      ] },
    { q: '友達に推しの話をする頻度は？',
      opts: [
        { t: 'たまに話す', s: 0 },
        { t: 'よく話す（同担とは語る）', s: 1 },
        { t: 'ほぼすべての話題が推しに着地する', s: 2 }
      ] },
    { q: '「推しのために節約したこと」がある？',
      opts: [
        { t: 'とくにない', s: 0 },
        { t: '外食・コンビニを減らした', s: 1 },
        { t: '家賃や食費を見直した／副業を始めた', s: 2 }
      ] }
  ];

  var TYPES = [
    {
      name: 'ライト応援タイプ',
      level: 'ok',
      range: '0〜5点',
      money: '月3,000円未満',
      desc: '推しは好きだけど、生活ペース最優先。無理せず長く応援できる、もっとも家計バランスの取れた推し活スタイルです。'
    },
    {
      name: 'バランス推し活タイプ',
      level: 'ok',
      range: '6〜10点',
      money: '月5,000〜15,000円',
      desc: '日常に推しを上手に溶け込ませる達人。グッズもライブも自分の許容範囲で楽しめており、長期戦に強いタイプです。'
    },
    {
      name: '推し研究家タイプ',
      level: 'warn',
      range: '11〜15点',
      money: '月20,000〜50,000円',
      desc: '推し情報のアンテナが鋭く、出費もそこそこ。月の上限ルールを決めると、ハマりすぎ防止と楽しさを両立できます。'
    },
    {
      name: '殿堂入り推し神官タイプ',
      level: 'ng',
      range: '16〜20点',
      money: '月50,000円〜',
      desc: '推し活が人生の中心。情熱は素晴らしい一方で、家計と健康のチェックは月1回必須。年単位の出費を一度可視化してみてください。'
    }
  ];

  function renderQuiz() {
    var html = QUESTIONS.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt"><input type="radio" name="q' + i + '" value="' + o.s + '"><span class="opt-text">' + o.t + '</span></label>';
      }).join('');
      return '<div class="q-block"><p class="q-num">Q' + (i + 1) + '</p><p class="q-text">' + q.q + '</p>' + opts + '</div>';
    }).join('');
    document.getElementById('quiz').innerHTML = html;
  }

  function calc() {
    var total = 0;
    var unanswered = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered.push(i + 1); continue; }
      total += parseInt(sel.value, 10);
    }
    if (unanswered.length > 0) {
      showErr('未回答: Q' + unanswered.join(', Q') + ' に答えてください');
      return;
    }

    var type;
    if (total <= 5) type = TYPES[0];
    else if (total <= 10) type = TYPES[1];
    else if (total <= 15) type = TYPES[2];
    else type = TYPES[3];

    showResult(type.level, type.name, type.desc);
    showDetail([
      ['合計スコア', total + ' / 20点'],
      ['該当範囲', type.range],
      ['タイプ', type.name, true],
      ['月の散財目安', type.money]
    ]);

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        score: total,
        type: type.name,
        money: type.money,
        savedAt: new Date().toISOString()
      }));
    } catch (e) {}
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function loadPrev() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d || !d.type) return;
      var rc = document.getElementById('result');
      rc.className = 'result-card ok';
      rc.style.display = 'block';
      document.getElementById('rv').textContent = '前回: ' + d.type;
      document.getElementById('rn').textContent = '月の散財目安 ' + d.money + '（再診断は10問に答えて「結果を見る」を押してください）';
    } catch (e) {}
  }

  renderQuiz();
  loadPrev();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
