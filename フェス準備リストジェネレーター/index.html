<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="参加条件を選ぶだけで、夏フェス当日に必要な持ち物リストを自動生成。テント泊・日帰り・雨対策など、条件別のアイテムを全カバーしているから見落としがありません。">
  <title>フェス準備リストジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎪 フェス準備リストジェネレーター</h1>
    <p class="subtitle">参加条件を選ぶだけで、フェス当日の必需品をサクッと確認。見落としがちなアイテムも全カバー。</p>
  </header>

  <!-- 参加条件選択カード -->
  <div class="card">
    <p class="card-title">参加条件を選択</p>
    <div class="field">
      <label>宿泊方法</label>
      <div style="display:flex; gap:1rem; margin-top:0.35rem;">
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="accommodation" value="tent" checked> テント泊
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="accommodation" value="hotel"> ホテル
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="accommodation" value="daytrip"> 日帰り
        </label>
      </div>
    </div>
    <div class="field">
      <label>交通手段</label>
      <div style="display:flex; gap:1rem; margin-top:0.35rem;">
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="transport" value="car" checked> 車
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="transport" value="train"> 電車
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="transport" value="walk"> 徒歩
        </label>
      </div>
    </div>
    <div class="field">
      <label>天気対策</label>
      <div style="display:flex; gap:1rem; margin-top:0.35rem;">
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="weather" value="sunny" checked> 晴れ
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="weather" value="rainy"> 雨
        </label>
        <label style="display:flex; gap:0.3rem; align-items:center; font-weight:400; margin-bottom:0;">
          <input type="radio" name="weather" value="hot"> 暑さ
        </label>
      </div>
    </div>
  </div>

  <!-- リスト生成ボタン -->
  <button class="btn-calc" onclick="genList()">持ち物リストを生成</button>

  <!-- 持ち物リスト表示カード -->
  <div class="card" id="listCard" style="display:none">
    <p class="card-title">📋 必需品リスト</p>
    <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:1rem;">チェックして、持ち物を確認しながら準備しましょう。</p>
    <div id="itemList"></div>
  </div>


  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このリストは一般的なフェスの必需品を目安にしています。フェスの規模・会場・イベント内容によって必要なアイテムが異なる場合があります。詳細は公式サイトをご確認ください。
  </p>


  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 基本セット＆条件別追加アイテム ──
  var BASE_ITEMS = [
    'チケット', 'モバイルバッテリー', 'タオル',
    '日焼け止め', '虫よけ', 'トイレットペーパー',
    'ティッシュ', 'スマートフォン・充電ケーブル', '現金＆クレジットカード',
    '身分証', '常備薬・バンドエイド'
  ];

  var EXTRA_ITEMS = {
    tent:  ['テント', '寝袋', '枕・シーツ', 'ランタン', 'ペグ・ロープ'],
    hotel: ['パジャマ', '歯磨きセット', 'シャンプー・リンス', 'タオル（大）'],
    daytrip: [],
    car:   ['車のキー', 'ガソリン代（現金）', 'カーナビ用スマートフォン'],
    train: ['定期券・乗車券', '駅弁・飲み物'],
    walk:  [],
    sunny: ['帽子', 'サングラス'],
    rainy: ['傘', 'レインコート', '防水バッグ'],
    hot:   ['水筒・飲料', 'うちわ', '冷えピタ']
  };

  function genList() {
    var acc = document.querySelector('input[name="accommodation"]:checked').value;
    var trans = document.querySelector('input[name="transport"]:checked').value;
    var wea = document.querySelector('input[name="weather"]:checked').value;

    // ── リスト生成 ──
    var items = BASE_ITEMS.slice();
    if (EXTRA_ITEMS[acc]) items = items.concat(EXTRA_ITEMS[acc]);
    if (EXTRA_ITEMS[trans]) items = items.concat(EXTRA_ITEMS[trans]);
    if (EXTRA_ITEMS[wea]) items = items.concat(EXTRA_ITEMS[wea]);
    items = items.filter((v, i, a) => a.indexOf(v) === i); // 重複削除
    items.sort();

    // ── localStorage から前回のチェック状態を取得 ──
    var saved = localStorage.getItem('fest_list_' + acc + trans + wea) || '{}';
    var checked = {};
    try { checked = JSON.parse(saved); } catch(e) {}

    // ── HTML 生成 ──
    var html = items.map(function(item){
      var isChecked = checked[item] ? 'checked' : '';
      return '<label class="check-item">'
           + '<input type="checkbox" value="' + item + '" ' + isChecked + ' onchange="saveState()">'
           + '<span class="check-text">' + item + '</span>'
           + '</label>';
    }).join('');

    document.getElementById('itemList').innerHTML = html;
    document.getElementById('listCard').style.display = '';
  }

  function saveState() {
    var acc = document.querySelector('input[name="accommodation"]:checked').value;
    var trans = document.querySelector('input[name="transport"]:checked').value;
    var wea = document.querySelector('input[name="weather"]:checked').value;
    var key = 'fest_list_' + acc + trans + wea;

    var checked = {};
    document.querySelectorAll('#itemList input[type="checkbox"]').forEach(function(box){
      if (box.checked) checked[box.value] = true;
    });

    localStorage.setItem(key, JSON.stringify(checked));
  }

  // ── ページ読み込み時に前回の条件を復元（オプション） ──
  window.addEventListener('load', function(){
    // localStorage に前回の選択を保存していれば復元
    var saved = localStorage.getItem('fest_conditions') || null;
    if (saved) {
      try {
        var cond = JSON.parse(saved);
        if (cond.accommodation) document.querySelector('input[name="accommodation"][value="' + cond.accommodation + '"]').checked = true;
        if (cond.transport) document.querySelector('input[name="transport"][value="' + cond.transport + '"]').checked = true;
        if (cond.weather) document.querySelector('input[name="weather"][value="' + cond.weather + '"]').checked = true;
      } catch(e) {}
    }
  });

  // ── 条件選択時に条件を保存 ──
  document.addEventListener('change', function(e){
    if (['accommodation', 'transport', 'weather'].includes(e.target.name)) {
      var cond = {
        accommodation: document.querySelector('input[name="accommodation"]:checked').value,
        transport: document.querySelector('input[name="transport"]:checked').value,
        weather: document.querySelector('input[name="weather"]:checked').value
      };
      localStorage.setItem('fest_conditions', JSON.stringify(cond));
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
