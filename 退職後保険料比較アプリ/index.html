<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退職後保険料比較アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .section-head td {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); padding-top: 1rem; border-bottom: 1px solid var(--border);
    }
    .detail-table .section-head td:last-child { color: var(--accent); }

    /* ── 注記 ── */
    .note-text { font-size: 0.78rem; color: var(--text-sub); line-height: 1.75; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>退職後保険料比較</h1>
    <p class="subtitle">任意継続 vs 国民健康保険 — どちらが得か即比較</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="remun">退職時の標準報酬月額（万円）</label>
      <input type="number" id="remun" placeholder="例: 30" min="1" step="1">
      <p class="hint">給与明細や保険証に記載。30万円を超える場合は30万円で計算されます（任意継続上限）</p>
    </div>

    <div class="field">
      <label for="income">前年の給与収入（万円）</label>
      <input type="number" id="income" placeholder="例: 500" min="1" step="1">
      <p class="hint">源泉徴収票の「支払金額」欄の金額。国保保険料の算定に使います</p>
    </div>

    <div class="field">
      <label for="dep">扶養家族数</label>
      <select id="dep">
        <option value="0">0人（本人のみ）</option>
        <option value="1">1人</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人以上</option>
      </select>
      <p class="hint">任意継続は扶養家族も追加料金なし。国保は家族分の均等割が加算されます</p>
    </div>

    <div class="field">
      <label for="pref">勤務先（協会けんぽ）の都道府県</label>
      <select id="pref">
        <option value="北海道">北海道</option>
        <option value="青森">青森県</option>
        <option value="岩手">岩手県</option>
        <option value="宮城">宮城県</option>
        <option value="秋田">秋田県</option>
        <option value="山形">山形県</option>
        <option value="福島">福島県</option>
        <option value="茨城">茨城県</option>
        <option value="栃木">栃木県</option>
        <option value="群馬">群馬県</option>
        <option value="埼玉">埼玉県</option>
        <option value="千葉">千葉県</option>
        <option value="東京" selected>東京都</option>
        <option value="神奈川">神奈川県</option>
        <option value="新潟">新潟県</option>
        <option value="富山">富山県</option>
        <option value="石川">石川県</option>
        <option value="福井">福井県</option>
        <option value="山梨">山梨県</option>
        <option value="長野">長野県</option>
        <option value="岐阜">岐阜県</option>
        <option value="静岡">静岡県</option>
        <option value="愛知">愛知県</option>
        <option value="三重">三重県</option>
        <option value="滋賀">滋賀県</option>
        <option value="京都">京都府</option>
        <option value="大阪">大阪府</option>
        <option value="兵庫">兵庫県</option>
        <option value="奈良">奈良県</option>
        <option value="和歌山">和歌山県</option>
        <option value="鳥取">鳥取県</option>
        <option value="島根">島根県</option>
        <option value="岡山">岡山県</option>
        <option value="広島">広島県</option>
        <option value="山口">山口県</option>
        <option value="徳島">徳島県</option>
        <option value="香川">香川県</option>
        <option value="愛媛">愛媛県</option>
        <option value="高知">高知県</option>
        <option value="福岡">福岡県</option>
        <option value="佐賀">佐賀県</option>
        <option value="長崎">長崎県</option>
        <option value="熊本">熊本県</option>
        <option value="大分">大分県</option>
        <option value="宮崎">宮崎県</option>
        <option value="鹿児島">鹿児島県</option>
        <option value="沖縄">沖縄県</option>
      </select>
      <p class="hint">協会けんぽ加入者用。組合健保の方は保険組合へ直接確認ください</p>
    </div>

    <div class="field">
      <label for="age">年齢区分</label>
      <select id="age">
        <option value="under40">40歳未満</option>
        <option value="40to64" selected>40〜64歳</option>
        <option value="over65">65歳以上</option>
      </select>
      <p class="hint">40〜64歳は健康保険料に介護保険料が加算されます</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">比較結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較サマリーカード -->
  <div class="card" id="summary" style="display:none">
    <p class="card-title">月額・年額の比較</p>
    <table class="detail-table"><tbody id="sb"></tbody></table>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注記カード -->
  <div class="card" id="notecard" style="display:none">
    <p class="card-title">注意事項</p>
    <p class="note-text" id="notetext"></p>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // 協会けんぽ 2024年度 都道府県別健康保険料率（全額：事業主＋被保険者分）
  var PREF_RATES = {
    '北海道':10.21,'青森':9.82,'岩手':9.75,'宮城':10.02,
    '秋田':10.34,'山形':10.16,'福島':9.65,'茨城':9.75,
    '栃木':9.85,'群馬':9.81,'埼玉':9.82,'千葉':9.87,
    '東京':9.98,'神奈川':10.02,'新潟':9.56,'富山':9.84,
    '石川':10.14,'福井':9.98,'山梨':9.96,'長野':9.48,
    '岐阜':9.80,'静岡':9.75,'愛知':10.01,'三重':9.87,
    '滋賀':9.97,'京都':10.21,'大阪':10.29,'兵庫':10.27,
    '奈良':10.22,'和歌山':10.11,'鳥取':9.96,'島根':10.21,
    '岡山':10.15,'広島':9.99,'山口':10.21,'徳島':10.26,
    '香川':10.40,'愛媛':10.01,'高知':10.22,'福岡':10.36,
    '佐賀':10.71,'長崎':10.21,'熊本':10.29,'大分':10.27,
    '宮崎':10.12,'鹿児島':10.36,'沖縄':9.83
  };

  var KAIGO_RATE = 1.60;      // 介護保険料率（2024年度）
  var NINKEI_CAP = 300000;    // 任意継続の標準報酬月額上限（全国平均）

  // 国保 全国平均料率（概算）
  var KOKUHO = {
    iryo:  { shotoku: 7.0,  kinto: 28000, heikin: 22000, cap: 650000 },
    shien: { shotoku: 2.5,  kinto: 10000, heikin:  7500, cap: 240000 },
    kaigo: { shotoku: 1.8,  kinto: 13000, heikin:     0, cap: 170000 }
  };

  // 給与所得控除（令和2年以降）
  function kyuyoKojo(income) {
    if (income <= 1625000)  return 550000;
    if (income <= 1800000)  return Math.floor(income * 0.40 - 100000);
    if (income <= 3600000)  return Math.floor(income * 0.30 + 80000);
    if (income <= 6600000)  return Math.floor(income * 0.20 + 440000);
    if (income <= 8500000)  return Math.floor(income * 0.10 + 1100000);
    return 1950000;
  }

  function calc() {
    var remunMan  = parseFloat(document.getElementById('remun').value);
    var incomeMan = parseFloat(document.getElementById('income').value);
    var depCount  = parseInt(document.getElementById('dep').value) || 0;
    var pref      = document.getElementById('pref').value;
    var ageGroup  = document.getElementById('age').value;

    if (isNaN(remunMan) || remunMan <= 0) { showErr('標準報酬月額を入力してください'); return; }
    if (isNaN(incomeMan) || incomeMan <= 0) { showErr('前年の給与収入を入力してください'); return; }

    var remun  = remunMan  * 10000;
    var income = incomeMan * 10000;
    var hasKaigo = (ageGroup === '40to64');
    var people = 1 + depCount;

    // ─── 任意継続計算 ───
    var ninkeiRemun  = Math.min(remun, NINKEI_CAP);
    var healthRate   = PREF_RATES[pref] / 100;
    var ninkeiHealth = Math.round(ninkeiRemun * healthRate);
    var ninkeiKaigo  = hasKaigo ? Math.round(ninkeiRemun * KAIGO_RATE / 100) : 0;
    var ninkeiMonthly = ninkeiHealth + ninkeiKaigo;
    var ninkeiYearly  = ninkeiMonthly * 12;

    // ─── 国保計算 ───
    var kojo    = kyuyoKojo(income);
    var shotoku = Math.max(0, income - kojo);           // 給与所得
    var kazei   = Math.max(0, shotoku - 430000);        // 課税所得（基礎控除後）

    // 医療分
    var iryo = Math.round(kazei * KOKUHO.iryo.shotoku / 100)
             + KOKUHO.iryo.kinto * people
             + KOKUHO.iryo.heikin;
    iryo = Math.min(iryo, KOKUHO.iryo.cap);

    // 後期高齢者支援金分
    var shien = Math.round(kazei * KOKUHO.shien.shotoku / 100)
              + KOKUHO.shien.kinto * people
              + KOKUHO.shien.heikin;
    shien = Math.min(shien, KOKUHO.shien.cap);

    // 介護保険分（40〜64歳のみ）
    var kaigo = 0;
    if (hasKaigo) {
      kaigo = Math.round(kazei * KOKUHO.kaigo.shotoku / 100)
            + KOKUHO.kaigo.kinto * 1; // 本人のみ（被扶養者の年齢が不明なため）
      kaigo = Math.min(kaigo, KOKUHO.kaigo.cap);
    }

    var kokuhoYearly  = iryo + shien + kaigo;
    var kokuhoMonthly = Math.round(kokuhoYearly / 12);

    // ─── 比較 ───
    var diff = Math.abs(ninkeiYearly - kokuhoYearly);
    var ninkeiWins = ninkeiYearly < kokuhoYearly;
    var winner = ninkeiWins ? '任意継続が有利' : '国民健康保険が有利';
    var level  = ninkeiWins ? 'ok' : 'warn';
    var loser  = ninkeiWins ? '国保より' : '任意継続より';

    showResult(level, winner,
      '年間で約 ' + fmt(diff) + ' 円お得（' + loser + '安い）');

    // ─── サマリーテーブル ───
    var sRows = [
      ['', '任意継続', '国保（概算）'],
      ['月額', fmt(ninkeiMonthly) + ' 円', fmt(kokuhoMonthly) + ' 円'],
      ['年額', fmt(ninkeiYearly) + ' 円', fmt(kokuhoYearly) + ' 円'],
    ];
    var sb = document.getElementById('sb');
    sb.innerHTML = sRows.map(function(r, i) {
      var cls = i === 0 ? ' class="section-head"' : (i === 2 ? ' class="hl"' : '');
      return '<tr' + cls + '><td>' + r[0] + '</td><td style="text-align:right">' + r[1] + '</td><td style="text-align:right">' + r[2] + '</td></tr>';
    }).join('');
    document.getElementById('summary').style.display = '';

    // ─── 内訳テーブル ───
    var capNote = remun > NINKEI_CAP ? '（上限30万円で計算）' : '';
    var rows = [
      {head: '任意継続内訳'},
      ['健康保険料', fmt(ninkeiHealth) + ' 円/月', false],
    ];
    if (hasKaigo) rows.push(['介護保険料', fmt(ninkeiKaigo) + ' 円/月', false]);
    rows.push(['月額合計' + capNote, fmt(ninkeiMonthly) + ' 円', true]);
    rows.push({head: '国保内訳（全国平均概算）'});
    rows.push(['医療分（年間）', fmt(iryo) + ' 円', false]);
    rows.push(['支援金分（年間）', fmt(shien) + ' 円', false]);
    if (hasKaigo) rows.push(['介護分（年間）', fmt(kaigo) + ' 円', false]);
    rows.push(['年額合計', fmt(kokuhoYearly) + ' 円', true]);
    rows.push({head: '計算の根拠'});
    rows.push(['給与所得控除', fmt(kojo) + ' 円', false]);
    rows.push(['給与所得', fmt(shotoku) + ' 円', false]);
    rows.push(['課税所得（基礎控除後）', fmt(kazei) + ' 円', false]);

    var db = document.getElementById('db');
    db.innerHTML = rows.map(function(r) {
      if (r.head !== undefined) {
        return '<tr class="section-head"><td colspan="2">' + r.head + '</td></tr>';
      }
      var cls = r[2] ? ' class="hl"' : '';
      return '<tr' + cls + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    // ─── 注記 ───
    var notes = [
      '・任意継続は退職日の翌日から20日以内に申請が必要です。',
      '・任意継続は最長2年間。その後は国保・配偶者の扶養などに切り替えが必要です。',
      '・国保の保険料は市区町村によって大きく異なります。本計算は全国平均の目安です。',
      '・実際の国保料は居住市区町村の窓口または役所ウェブサイトで試算してください。',
      '・任意継続料率は協会けんぽの2024年度料率です。組合健保の方はご自身の保険組合にご確認ください。',
      '・翌年（2年目）の国保料は退職後の所得（失業給付は非課税）で再計算されます。低所得になれば国保が有利になる場合があります。',
    ];
    document.getElementById('notetext').textContent = notes.join('\n');
    document.getElementById('notecard').style.display = '';

    // localStorage保存
    try {
      localStorage.setItem('hoken_input', JSON.stringify({
        remun: remunMan, income: incomeMan, dep: depCount, pref: pref, age: ageGroup
      }));
    } catch(e) {}
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = '';
    document.getElementById('rv').textContent = '⚠ 入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('notecard').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 保存値の復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem('hoken_input') || 'null');
      if (!saved) return;
      if (saved.remun)  document.getElementById('remun').value   = saved.remun;
      if (saved.income) document.getElementById('income').value  = saved.income;
      if (saved.dep !== undefined) document.getElementById('dep').value = saved.dep;
