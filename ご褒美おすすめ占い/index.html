<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今日の疲れ具合・気分・予算を3択で選ぶだけで、今夜のご褒美が占い風に決まる無料アプリ。迷わずに自分を労わるヒントが手に入ります。">
  <title>ご褒美おすすめ占い｜今夜のご褒美が3択で決まる</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-text { font-size: 1rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.5; }
    .choices { display: flex; flex-direction: column; gap: 0.5rem; }
    .choice-btn {
      width: 100%; text-align: left;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn.selected {
      border-color: var(--accent); background: var(--accent-light);
      color: var(--accent); font-weight: 700;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-sub {
      display: block; margin: 0.5rem auto 1rem; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      background: var(--accent-light);
    }
    .result-emoji { font-size: 3rem; margin-bottom: 0.4rem; line-height: 1.1; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 0.6rem; color: var(--accent); }
    .result-note { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 0.5rem; }
    .result-fortune {
      font-size: 0.85rem; color: var(--text-sub);
      line-height: 1.6; margin-top: 0.8rem;
      padding-top: 0.8rem; border-top: 1px dashed var(--border);
      font-style: italic;
    }

    .history-item {
      padding: 0.6rem 0.3rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); font-size: 0.75rem; margin-bottom: 0.2rem; }
    .history-name { color: var(--text); font-weight: 600; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-sub, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>ご褒美おすすめ占い</h1>
    <p class="subtitle">3問答えるだけで、今夜の自分へのご褒美が決まる</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">今夜のあなたに合う、ご褒美を占います</p>

    <div class="field" style="margin-bottom:1.4rem">
      <p class="q-text">Q1. 今日の疲れ具合は？</p>
      <div class="choices" data-q="0">
        <button class="choice-btn" data-i="0">🪶 まあまあ元気（軽め）</button>
        <button class="choice-btn" data-i="1">😮‍💨 そこそこ疲れた（普通）</button>
        <button class="choice-btn" data-i="2">🥵 もうへとへと（重め）</button>
      </div>
    </div>

    <div class="field" style="margin-bottom:1.4rem">
      <p class="q-text">Q2. 今の気分は？</p>
      <div class="choices" data-q="1">
        <button class="choice-btn" data-i="0">🎉 ちょっとテンション上げたい</button>
        <button class="choice-btn" data-i="1">☕ ほっと落ち着きたい</button>
        <button class="choice-btn" data-i="2">🛌 とにかく癒されたい</button>
      </div>
    </div>

    <div class="field">
      <p class="q-text">Q3. 今夜使える予算感は？</p>
      <div class="choices" data-q="2">
        <button class="choice-btn" data-i="0">💴 〜500円（プチ）</button>
        <button class="choice-btn" data-i="1">💰 〜2,000円（ふつう）</button>
        <button class="choice-btn" data-i="2">💎 2,000円〜（がっつり）</button>
      </div>
    </div>
  </div>

  <button class="btn-calc" id="go-btn" onclick="divine()" disabled>占う</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="re">🔮</p>
    <p class="result-label">今夜のご褒美</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-fortune" id="rf"></p>
  </div>

  <button class="btn-sub no-print" id="retry-btn" onclick="reset()" style="display:none">🔮 もう一度占う</button>

  <div class="card" id="history-card" style="display:none">
    <p class="card-title">最近の占い履歴</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このアプリは占い風のエンタメです。あなたの選択をもとに、よくあるご褒美の中から1つを提案します。気分転換のヒントとしてお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'gohoubi_uranai_history_v1';
  var answers = [null, null, null];

  // ご褒美データベース：[疲れ, 気分, 予算] の組み合わせから選ばれる
  // 疲れ: 0=軽 1=中 2=重 / 気分: 0=高揚 1=ほっと 2=癒し / 予算: 0=低 1=中 2=高
  var REWARDS = [
    // 軽め × 高揚
    { e: '🍫', n: 'コンビニのご褒美スイーツ', note: '気分を上げるのは、小さくて可愛いお菓子で十分。', f: '今夜のあなたは「軽やかな星」の下にいます。少しの甘さが明日の元気を呼びます。' },
    { e: '🍺', n: 'ちょい贅沢なクラフトビール', note: 'いつもより一段上の缶を選ぶ夜に。', f: '気分の星が上向き。今日のあなたには「特別な一杯」が似合います。' },
    { e: '🎮', n: 'ご褒美ガチャ／推しグッズ1点買い', note: '今夜は「欲しかったやつ」を解禁してOK。', f: '推し運が高まる夜。直感で選んだ1つが、明日のテンションを左右します。' },
    // 軽め × ほっと
    { e: '☕', n: 'お気に入りカフェのドリップコーヒー', note: '香りで一日の終わりを丁寧に締めくくる。', f: '静かな星の夜。湯気の向こうに、明日のヒントが見えるかもしれません。' },
    { e: '🍵', n: '専門店の和スイーツ＋日本茶', note: '甘さと渋みの組み合わせで心が整います。', f: '和の星が味方。背筋が伸びるような落ち着きが訪れます。' },
    { e: '🛁', n: '高級バスソルト＋静かな入浴時間', note: '湯船で15分、スマホを置いて深呼吸を。', f: '水の星のご加護。湯気と一緒に今日の疲れが流れていきます。' },
    // 軽め × 癒し
    { e: '🐈', n: '猫動画／推しの過去配信を見返す', note: 'ベッドの上で寝転がって、たっぷり浸る時間。', f: '癒しの星が真上に。何もしない贅沢が、今夜の正解です。' },
    { e: '🕯️', n: 'アロマキャンドル＋好きな音楽', note: '部屋の照明を落として、香りに包まれる夜。', f: '香りの星に導かれる夜。五感がゆっくりほどけていきます。' },
    { e: '💆', n: 'マッサージガン or ボディオイルでセルフケア', note: '肩・首・足の3点重点で、たっぷり時間を取って。', f: '癒しの星が満ちる夜。自分の身体に「ありがとう」を伝える時間に。' },
    // 中疲れ × 高揚
    { e: '🍕', n: 'デリバリーピザ or 推し店のテイクアウト', note: '作らない・洗わない夜があってもいい。', f: '楽の星のご加護。手放した分だけ、心が軽くなります。' },
    { e: '🍣', n: 'スーパーの上等なお寿司＋スパークリング', note: '帰り道に1ランク上のパックを買ってOK。', f: '小さな贅沢の星。今日のあなたには、それだけの価値があります。' },
    { e: '🎬', n: '気になっていた映画を1本だけ', note: '途中で寝てもよし。最後まで見たら大成功。', f: '物語の星に呼ばれる夜。誰かの人生に少しだけ寄り道してきてください。' },
    // 中疲れ × ほっと
    { e: '🍜', n: '温かい一杯（ラーメン／うどん／スープ）', note: 'お腹の中から温めて、肩の力を抜く。', f: '湯気の星が見守る夜。一口めの「ほっ」が今日のごほうびです。' },
    { e: '🥃', n: '少しいいお酒を、グラスでゆっくり', note: '量より質。香りを楽しむ余裕を持って。', f: '静夜の星のもと、時間がゆっくり流れます。深呼吸も忘れずに。' },
    { e: '🛀', n: '入浴剤＋好きな本を1章だけ', note: 'スマホを脱衣所に置いて、湯船で読書を。', f: '本と湯の星。今夜のあなたは、誰にも邪魔されない時間を持つべきです。' },
    // 中疲れ × 癒し
    { e: '🍦', n: 'ハーゲンダッツ or 高めのアイス', note: '今日くらい、フタを開けてそのままどうぞ。', f: '甘い星が許可します。明日の体重計のことは、明日考えれば大丈夫。' },
    { e: '🧸', n: '推しグッズに囲まれて寝落ち', note: 'ぬいぐるみ・推しうちわ・抱き枕、全部出してOK。', f: '推しの星が一番輝く夜。包まれて眠れば、明日は少し優しくなれます。' },
    { e: '😴', n: '21時前に寝る贅沢', note: '一番のご褒美は、未来の自分への睡眠です。', f: '眠りの星が最強の味方。今夜のあなたには「早寝」という奇跡をどうぞ。' },
    // 重疲れ × 高揚
    { e: '🍱', n: 'ちょっと贅沢な総菜＋缶ビール', note: '料理しない、片付けも最小限で済ます夜。', f: '休戦の星。今夜は「がんばらない」が正解の選択肢です。' },
    { e: '🍫', n: '高級チョコ1粒＋好きな映画', note: '一粒だけ。でも、本気でいいやつを。', f: '甘さの星が一点集中。質を選んだあなたは、今日の主役です。' },
    { e: '🛋️', n: 'ソファでだらだら推し動画マラソン', note: '布団もブランケットも全部投入してOK。', f: '怠惰の星のご褒美。罪悪感ゼロでだらける権利があります。' },
    // 重疲れ × ほっと
    { e: '🍲', n: 'コンビニの温かいスープ＋おにぎり', note: '何も考えずレンチンで終わる夕食を。', f: '簡素の星が味方。手間をかけない優しさが、今夜の救いになります。' },
    { e: '🫖', n: 'ハーブティー＋ブランケット', note: '電気を少し落として、お湯の音を楽しむ。', f: '安らぎの星。湯気の向こうで、明日への小さな扉が開きます。' },
    { e: '🛁', n: '長風呂＋好きな入浴剤＋シートマスク', note: 'お湯の中で目を閉じて10分、何もしない。', f: '湯けむりの星のもと、今日の疲れが少しずつ溶けていきます。' },
    // 重疲れ × 癒し
    { e: '😴', n: 'すべて諦めて即就寝', note: '歯磨きだけして寝る、それで合格点です。', f: '眠りの星が最強。今夜の最大のご褒美は「明日の自分」への引き継ぎです。' },
    { e: '🧴', n: 'スパクオリティのバスソルト＋ベッド直行', note: '湯上がりにスキンケアだけ整えて、即布団へ。', f: '休息の星が満ちる夜。早く休むあなたに、明日の星が微笑みます。' },
    { e: '💤', n: '一日休む宣言（明日の予定を1つ削る）', note: '今夜のうちに、明日の何かを1つ手放しましょう。', f: '解放の星。手放した分だけ、エネルギーが戻ってきます。今夜はそれが正解です。' }
  ];

  function reward(t, m, b) {
    // index = t*9 + m*3 + b （27パターン）
    var idx = t * 9 + m * 3 + b;
    return REWARDS[idx] || REWARDS[0];
  }

  // ── 選択肢クリック処理 ──
  document.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var group = btn.closest('.choices');
      var qi = parseInt(group.getAttribute('data-q'));
      var ci = parseInt(btn.getAttribute('data-i'));
      answers[qi] = ci;
      group.querySelectorAll('.choice-btn').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      checkReady();
    });
  });

  function checkReady() {
    var ready = answers.every(function(x) { return x !== null; });
    document.getElementById('go-btn').disabled = !ready;
  }

  function divine() {
    if (answers.some(function(x) { return x === null; })) return;
    var r = reward(answers[0], answers[1], answers[2]);
    var card = document.getElementById('result');
    document.getElementById('re').textContent = r.e;
    document.getElementById('rv').textContent = r.n;
    document.getElementById('rn').textContent = r.note;
    document.getElementById('rf').textContent = '🔮 ' + r.f;
    card.style.display = 'block';
    document.getElementById('retry-btn').style.display = 'block';
    saveHistory(r);
    showHistory();
    setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
  }

  function reset() {
    answers = [null, null, null];
    document.querySelectorAll('.choice-btn').forEach(function(b) { b.classList.remove('selected'); });
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('go-btn').disabled = true;
    document.getElementById('quiz-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function saveHistory(r) {
    try {
      var list = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      list.unshift({
        date: new Date().toISOString(),
        emoji: r.e,
        name: r.n
      });
      list = list.slice(0, 5);
      localStorage.setItem(STORE_KEY, JSON.stringify(list));
    } catch (e) { /* localStorage 不可なら無視 */ }
  }

  function showHistory() {
    try {
      var list = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      if (!list.length) return;
      var html = list.map(function(h) {
        var d = new Date(h.date);
        var ds = d.getMonth() + 1 + '月' + d.getDate() + '日 ' +
                 String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        return '<div class="history-item"><p class="history-date">' + ds +
               '</p><p class="history-name">' + h.emoji + ' ' + h.name + '</p></div>';
      }).join('');
      document.getElementById('history-list').innerHTML = html;
      document.getElementById('history-card').style.display = 'block';
    } catch (e) { /* 無視 */ }
  }

  // 初期表示
  showHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
