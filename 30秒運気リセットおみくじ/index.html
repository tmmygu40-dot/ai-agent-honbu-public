<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30秒運気リセットおみくじ｜生年月日で今月の運勢と開運アクション</title>
  <meta name="description" content="生年月日を入れるだけで、今月の総合運と3つの開運アクションが30秒で分かる無料おみくじ。気分転換・モチベ補給・ちょっとした運気リセットにどうぞ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.55; margin-top: 0.3rem; }
    .result-sub { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.5rem; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.7rem 0.4rem; color: var(--text); line-height: 1.5; vertical-align: top; }
    .detail-table td:first-child { width: 5.5rem; color: var(--accent); font-weight: 700; font-size: 0.82rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎴 30秒運気リセットおみくじ</h1>
    <p class="subtitle">生年月日で今月の総合運と3つの開運アクションを表示。※娯楽目的の参考としてお楽しみください</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">生年月日を入力</p>
    <div class="field">
      <label for="bd">生年月日</label>
      <input type="date" id="bd" min="1900-01-01" max="2025-12-31">
      <p class="hint">今月の運勢が出ます。月が変わると結果も変わります。</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="drawOmikuji()">🎴 今月の運気を引く</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="rl">今月の総合運</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-sub" id="rs"></p>
  </div>

  <!-- 開運アクション -->
  <div class="card" id="actions" style="display:none">
    <p class="card-title">今月の開運アクション 3つ</p>
    <table class="detail-table"><tbody id="ab"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎴 本アプリは娯楽目的の参考おみくじです。診断結果は決定論的に算出され、同じ生年月日・同じ月であれば同じ結果になります。月が変わると結果も新しくなります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'omikuji-30sec-v1';

  // 運勢ランク（5段階）
  var RANKS = [
    { label: '大吉', score: 95, level: 'ok',   note: '今月は流れに乗れる絶好調月。動いた分だけ返ってきます。' },
    { label: '中吉', score: 78, level: 'ok',   note: '安定して運気が上がる月。日常を丁寧に過ごすと吉。' },
    { label: '吉',   score: 62, level: 'warn', note: '良くも悪くもない平穏月。地味な準備が後で効きます。' },
    { label: '小吉', score: 48, level: 'warn', note: 'やや低調気味。無理せず充電に使うと運気が回復。' },
    { label: '末吉', score: 32, level: 'ng',   note: '今は動きが重い時期。守りに徹してやり過ごしましょう。' }
  ];

  // 開運アクション候補プール（カテゴリ別）
  var ACTIONS = {
    lucky: [
      '朝、いつもより5分早く起きて深呼吸する',
      '玄関を1分だけ拭き掃除する',
      '財布の中のレシートを全部捨てる',
      'スマホの待ち受けを変える',
      '今月会いたい人に1人だけ連絡する',
      '机の上にある不要物を3つ捨てる',
      'いつもと違う道で帰ってみる',
      '鏡の前で笑顔を10秒キープする',
      '塩を一つまみ入れた白湯を飲む',
      '冷蔵庫の古い食材を1つ処分する',
      '寝る前に「ありがとう」を3つ書き出す',
      '観葉植物に水をあげる、または1つ買う',
      '靴をピカピカに磨く',
      'カバンの中身を全部出して整理する'
    ],
    item: [
      'ラッキーカラーは「青」。シャツや小物に取り入れて',
      'ラッキーカラーは「黄」。財布まわりに置くと吉',
      'ラッキーカラーは「緑」。観葉植物やマスキングテープで',
      'ラッキーカラーは「白」。ハンカチ・タオルを新調して',
      'ラッキーカラーは「赤」。ペン・付箋など小物で',
      'ラッキーアイテムは「丸い形のもの」。コイン・コースターなど',
      'ラッキーアイテムは「香りもの」。アロマ・お香で空気を変える',
      'ラッキーアイテムは「文房具」。新しいペンを1本おろして',
      'ラッキーアイテムは「鏡」。手鏡を持ち歩くと運気アップ',
      'ラッキーアイテムは「水」。お気に入りの水筒を持ち歩いて',
      'ラッキーフードは「旬の果物」。スーパーで1つ選ぶ',
      'ラッキーフードは「魚」。週1回は意識して食べる',
      'ラッキーフードは「お米」。雑穀を混ぜると運気アップ'
    ],
    caution: [
      '衝動買いに注意。1日寝かせてから決めて',
      '人の噂話に乗らない。聞き役に徹するのが吉',
      '夜更かしは運気ダウン。0時前に布団へ',
      'スマホの見過ぎ注意。1時間に5分は目を休めて',
      '愚痴をこぼす相手を選んで。SNSは控えめに',
      '体を冷やさない。温かい飲み物を1杯多めに',
      '焦りは禁物。急ぎたい時こそ深呼吸を',
      '財布の出しっぱなしに注意。定位置を決めて',
      '断れない頼まれごとに注意。今月は「自分優先」で',
      '甘いものの食べ過ぎ注意。3口でやめる練習を',
      '人と比べないこと。SNSの数字は気にしない'
    ]
  };

  // 簡易ハッシュ（生年月日 + YYYY-MM から決定論的な数値）
  function hashFromSeed(seed) {
    var h = 5381;
    for (var i = 0; i < seed.length; i++) {
      h = ((h << 5) + h) + seed.charCodeAt(i);
      h = h & 0xffffffff;
    }
    return Math.abs(h);
  }

  // 候補プールから決定論的にN件を重複なく取り出す
  function pickN(pool, n, baseHash, salt) {
    var copy = pool.slice();
    var picked = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var h = hashFromSeed(baseHash + ':' + salt + ':' + i);
      var idx = h % copy.length;
      picked.push(copy[idx]);
      copy.splice(idx, 1);
    }
    return picked;
  }

  function drawOmikuji() {
    var bdEl = document.getElementById('bd');
    var bd = bdEl.value;
    if (!bd) {
      showErr('生年月日を入力してください');
      return;
    }

    var now = new Date();
    var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    var seed = bd + '#' + ym;
    var h = hashFromSeed(seed);

    // ランク決定（5段階の重み付き：大吉15%、中吉25%、吉30%、小吉20%、末吉10%）
    var roll = h % 100;
    var rank;
    if (roll < 15)      rank = RANKS[0]; // 大吉
    else if (roll < 40) rank = RANKS[1]; // 中吉
    else if (roll < 70) rank = RANKS[2]; // 吉
    else if (roll < 90) rank = RANKS[3]; // 小吉
    else                rank = RANKS[4]; // 末吉

    // 開運アクションを各カテゴリから1つずつ選ぶ
    var lucky   = pickN(ACTIONS.lucky,   1, seed, 'lucky')[0];
    var item    = pickN(ACTIONS.item,    1, seed, 'item')[0];
    var caution = pickN(ACTIONS.caution, 1, seed, 'caution')[0];

    var monthLabel = (now.getMonth() + 1) + '月';
    showResult(rank, monthLabel);
    showActions([
      ['🍀 ラッキー行動', lucky],
      ['🎁 ラッキー小物', item],
      ['⚠️ 今月の注意点', caution]
    ]);

    // localStorage 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        bd: bd,
        ym: ym,
        rank: rank.label,
        score: rank.score,
        level: rank.level,
        note: rank.note,
        actions: { lucky: lucky, item: item, caution: caution },
        savedAt: new Date().toISOString()
      }));
    } catch(e) {}
  }

  function showResult(rank, monthLabel) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + rank.level;
    rc.style.display = 'block';
    document.getElementById('rl').textContent = monthLabel + 'の総合運';
    document.getElementById('rv').textContent = rank.label;
    document.getElementById('rn').textContent = rank.note;
    document.getElementById('rs').textContent = '運気スコア：' + rank.score + ' / 100';
  }

  function showActions(rows) {
    document.getElementById('ab').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('actions').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rl').textContent = 'エラー';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('rs').textContent = '';
    document.getElementById('actions').style.display = 'none';
  }

  // 起動時に前回結果を復元
  (function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data && data.bd) {
        document.getElementById('bd').value = data.bd;
        // 同じ月なら結果も復元
        var now = new Date();
        var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
        if (data.ym === ym && data.rank) {
          var rankObj = RANKS.find(function(r){ return r.label === data.rank; }) || RANKS[2];
          showResult(rankObj, (now.getMonth() + 1) + '月');
          if (data.actions) {
            showActions([
              ['🍀 ラッキー行動', data.actions.lucky],
              ['🎁 ラッキー小物', data.actions.item],
              ['⚠️ 今月の注意点', data.actions.caution]
            ]);
          }
        }
      }
    } catch(e) {}
  })();
  </script>
