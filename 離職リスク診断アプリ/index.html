<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>離職リスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 従業員入力 ── */
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    /* ── チェックリスト ── */
    .category-title {
      font-size: 0.82rem; font-weight: 700;
      color: var(--text); background: var(--bg);
      padding: 0.5rem 0.75rem; border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.65rem 0.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 6px;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item:hover { background: var(--accent-light); }
    .check-item input[type="checkbox"] {
      width: 18px; height: 18px; min-width: 18px;
      accent-color: var(--accent);
      cursor: pointer; margin-top: 1px;
    }
    .check-item .item-label { font-size: 0.88rem; line-height: 1.45; }
    .check-item .item-label .weight {
      font-size: 0.72rem; color: var(--text-sub); margin-left: 0.4rem;
    }

    /* ── カテゴリセパレータ ── */
    .category-sep { margin-bottom: 1.2rem; }
    .category-sep:last-child { margin-bottom: 0; }

    /* ── スコアバー ── */
    .score-bar-wrap {
      margin: 0.75rem 0 0.5rem;
    }
    .score-bar-track {
      width: 100%; height: 10px;
      background: var(--bg); border-radius: 99px;
      border: 1px solid var(--border); overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--accent);
      transition: width 0.35s ease;
    }
    .score-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--text-sub); margin-top: 0.25rem;
    }

    /* ── サマリーグリッド ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .summary-cell {
      text-align: center; background: var(--bg);
      border-radius: 10px; padding: 0.75rem 0.5rem;
    }
    .summary-cell .sc-label { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 0.2rem; }
    .summary-cell .sc-value { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
    .summary-cell .sc-unit { font-size: 0.72rem; color: var(--text-sub); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }

    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.5rem; padding: 0.65rem;
      font-size: 0.9rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.12s;
    }
    .btn-reset:hover { background: var(--bg); }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
    .result-name { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .hl-ng td:last-child { color: var(--ng); }
    .detail-table .hl-warn td:last-child { color: var(--warn); }
    .detail-table .hl-ok td:last-child { color: var(--ok); }

    /* ── 過去履歴 ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.65rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.86rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-name { font-weight: 600; }
    .history-meta { font-size: 0.75rem; color: var(--text-sub); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem; border-radius: 99px;
      font-size: 0.72rem; font-weight: 700;
    }
    .badge-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok);   }
    .badge-warn { background: var(--warn-bg);  color: var(--warn); border: 1px solid var(--warn); }
    .badge-ng   { background: var(--ng-bg);    color: var(--ng);   border: 1px solid var(--ng);   }
    .history-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 1rem; padding: 0.2rem 0.4rem;
    }
    .no-history { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── PDFボタン ── */
    .btn-pdf {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 0.75rem; padding: 0.65rem;
      font-size: 0.9rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.12s;
    }
    .btn-pdf:hover { background: var(--bg); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>離職リスク診断アプリ</h1>
    <p class="subtitle">従業員の離職リスクを項目別にチェックして即診断</p>
  </header>

  <!-- 従業員名 -->
  <div class="card">
    <p class="card-title">対象従業員</p>
    <div class="field">
      <label for="emp-name">従業員名（任意）</label>
      <input type="text" id="emp-name" placeholder="例：田中 太郎">
    </div>
  </div>

  <!-- チェック項目 -->
  <div class="card">
    <p class="card-title">離職リスク項目チェック</p>

    <!-- 労働環境 -->
    <div class="category-sep">
      <div class="category-title">① 労働環境</div>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">残業が多い・休みが取りにくい <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="1"> <span class="item-label">業務量が多すぎる・または少なすぎる <span class="weight">（+1点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="1"> <span class="item-label">職場環境（設備・清潔さ）に不満がある <span class="weight">（+1点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">業務内容・担当が突然変わった <span class="weight">（+2点）</span></span></label>
    </div>

    <!-- 給与・待遇 -->
    <div class="category-sep">
      <div class="category-title">② 給与・待遇</div>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="3"> <span class="item-label">給与水準が低い・同業他社と比べて劣る <span class="weight">（+3点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">昇給・昇格の見込みがない <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="1"> <span class="item-label">賞与・福利厚生に不満がある <span class="weight">（+1点）</span></span></label>
    </div>

    <!-- 人間関係 -->
    <div class="category-sep">
      <div class="category-title">③ 人間関係</div>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="3"> <span class="item-label">上司との関係が悪い・信頼関係がない <span class="weight">（+3点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">同僚・チームとの関係が悪い <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="3"> <span class="item-label">ハラスメント・いじめが疑われる <span class="weight">（+3点）</span></span></label>
    </div>

    <!-- 成長・やりがい -->
    <div class="category-sep">
      <div class="category-title">④ 成長・やりがい</div>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">スキルアップ・研修の機会がない <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">キャリアパスが不明確・将来が見えない <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">仕事にやりがい・達成感を感じていない <span class="weight">（+2点）</span></span></label>
    </div>

    <!-- 行動サイン -->
    <div class="category-sep">
      <div class="category-title">⑤ 行動サイン</div>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="3"> <span class="item-label">最近、遅刻・欠勤が増えた <span class="weight">（+3点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">会話が減った・元気がなくなった <span class="weight">（+2点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="3"> <span class="item-label">転職・退職について話していた <span class="weight">（+3点）</span></span></label>
      <label class="check-item"><input type="checkbox" class="risk-check" data-score="2"> <span class="item-label">業務に対して消極的・やる気が低下している <span class="weight">（+2点）</span></span></label>
    </div>

  </div>

  <!-- スコアプレビュー -->
  <div class="card" id="score-preview">
    <p class="card-title">現在のスコア</p>
    <div class="summary-grid">
      <div class="summary-cell">
        <div class="sc-label">チェック数</div>
        <div class="sc-value" id="check-count">0</div>
        <div class="sc-unit">項目</div>
      </div>
      <div class="summary-cell">
        <div class="sc-label">合計スコア</div>
        <div class="sc-value" id="total-score">0</div>
        <div class="sc-unit">点 / 40点</div>
      </div>
      <div class="summary-cell">
        <div class="sc-label">最高リスク</div>
        <div class="sc-value" id="top-category">—</div>
        <div class="sc-unit">カテゴリ</div>
      </div>
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-track"><div class="score-bar-fill" id="score-bar" style="width:0%"></div></div>
      <div class="score-bar-labels"><span>低リスク</span><span>中リスク</span><span>高リスク</span></div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-name" id="r-name"></p>
    <p class="result-label">離職リスク判定</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">カテゴリ別スコア</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">推奨アクション</p>
    <div id="advice-body" style="font-size:0.88rem;line-height:1.7;color:var(--text-sub);"></div>
  </div>

  <!-- PDFで保存 -->
  <button class="btn-pdf" id="btn-pdf" onclick="window.print()">PDFで保存</button>

  <!-- リセット -->
  <button class="btn-reset" onclick="resetAll()">リセット</button>

  <!-- 過去履歴 -->
  <div class="card" id="history-card">
    <p class="card-title">診断履歴（最大20件）</p>
    <div id="history-list"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var STORAGE_KEY = 'riskyakunin_history_v1';

  var CATEGORIES = [
    { name: '労働環境',     indices: [0,1,2,3],       max: 6  },
    { name: '給与・待遇',   indices: [4,5,6],          max: 6  },
    { name: '人間関係',     indices: [7,8,9],          max: 8  },
    { name: '成長・やりがい', indices: [10,11,12],     max: 6  },
    { name: '行動サイン',   indices: [13,14,15,16],    max: 10 },
  ];

  var ADVICES = {
    ok: [
      '現状は安定しています。定期的な1on1面談で関係を継続しましょう。',
      '良好な状態を維持するため、適度な感謝・承認を伝える機会を設けましょう。',
    ],
    warn: [
      '早期のフォローが必要です。個別面談を設定して悩みを聞き出しましょう。',
      '給与・待遇に不満がある場合は、評価制度の見直しや昇給タイミングを検討してください。',
      '人間関係が要因の場合は、チームビルディングや業務分担の見直しが有効です。',
      '成長機会の提供（外部研修・資格取得支援）で意欲回復を図りましょう。',
    ],
    ng: [
      '高リスクです。早急に個別面談を実施し、退職意向を直接確認してください。',
      '改善できる処遇条件（給与・シフト・担当業務）を具体的に提示しましょう。',
      'ハラスメントが疑われる場合は第三者（人事・外部相談窓口）を介入させてください。',
      '引き留めが難しい場合は引き継ぎ準備と採用計画を同時に進めることを推奨します。',
    ],
  };

  function getChecks() {
    return Array.from(document.querySelectorAll('.risk-check'));
  }

  function calcScores() {
    var checks = getChecks();
    var total = 0;
    var count = 0;
    checks.forEach(function(c) {
      if (c.checked) { total += parseInt(c.dataset.score); count++; }
    });
    var catScores = CATEGORIES.map(function(cat) {
      var s = 0;
      cat.indices.forEach(function(i) { if (checks[i].checked) s += parseInt(checks[i].dataset.score); });
      return s;
    });
    return { total: total, count: count, catScores: catScores };
  }

  // リアルタイムプレビュー
  document.addEventListener('change', function(e) {
    if (!e.target.classList.contains('risk-check')) return;
    updatePreview();
  });

  function updatePreview() {
    var sc = calcScores();
    document.getElementById('check-count').textContent = sc.count;
    document.getElementById('total-score').textContent = sc.total;
    var pct = Math.min(100, Math.round(sc.total / 40 * 100));
    document.getElementById('score-bar').style.width = pct + '%';
    // 最高リスクカテゴリ
    var maxIdx = 0;
    sc.catScores.forEach(function(s, i) { if (s > sc.catScores[maxIdx]) maxIdx = i; });
    document.getElementById('top-category').textContent = sc.total > 0 ? catShort(CATEGORIES[maxIdx].name) : '—';
  }

  function catShort(name) {
    if (name === '労働環境') return '労働';
    if (name === '給与・待遇') return '給与';
    if (name === '人間関係') return '人間関係';
    if (name === '成長・やりがい') return '成長';
    if (name === '行動サイン') return '行動';
    return name;
  }

  function diagnose() {
    var sc = calcScores();
    var empName = document.getElementById('emp-name').value.trim() || '（名前なし）';
    var level, label, note;

    if (sc.total <= 7) {
      level = 'ok'; label = '低リスク';
      note = 'スコア ' + sc.total + ' 点。現状は安定しています。定期的なフォローを続けましょう。';
    } else if (sc.total <= 18) {
      level = 'warn'; label = '中リスク';
      note = 'スコア ' + sc.total + ' 点。不満の兆候があります。早めの面談と改善対策を実施してください。';
    } else {
      level = 'ng'; label = '高リスク';
      note = 'スコア ' + sc.total + ' 点。離職リスクが高い状態です。早急な対応が必要です。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('r-name').textContent = empName;
    document.getElementById('rv').textContent = label;
    document.getElementById('re').textContent = ({ ok: '現状は落ち着いている様子です。', warn: 'いくつか気になるサインが出ています。', ng: '複数の要因が重なっている状態です。' })[level];
    document.getElementById('rn').textContent = note;

    // カテゴリ別内訳
    var rows = sc.catScores.map(function(s, i) {
      var cat = CATEGORIES[i];
      var rate = cat.max > 0 ? Math.round(s / cat.max * 100) : 0;
      var cls = rate >= 60 ? 'hl-ng' : rate >= 30 ? 'hl-warn' : '';
      return '<tr class="' + cls + '"><td>' + cat.name + '</td><td>' + s + ' / ' + cat.max + ' 点（' + rate + '%）</td></tr>';
    });
    rows.push('<tr class="hl"><td>合計</td><td>' + sc.total + ' / 40 点</td></tr>');
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = '';

    // アドバイス
    var advList = ADVICES[level];
    document.getElementById('advice-body').innerHTML = advList.map(function(a) {
      return '• ' + a;
    }).join('<br>');
    document.getElementById('advice-card').style.display = '';

    // 履歴保存
    saveHistory({ name: empName, score: sc.total, level: level, label: label, date: today() });
    renderHistory();

    document.getElementById('btn-pdf').style.display = 'block';

    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function resetAll() {
    document.querySelectorAll('.risk-check').forEach(function(c) { c.checked = false; });
    document.getElementById('emp-name').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('btn-pdf').style.display = 'none';
    document.getElementById('re').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
    updatePreview();
  }

  function today() {
    var d = new Date();
    return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
  }
  function pad(n) { return n < 10 ? '0'+n : ''+n; }

  // ── localStorage ──
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
  }
  function saveHistory(item) {
    var list = loadHistory();
    list.unshift(item);
    if (list.length > 20) list = list.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }
  function deleteHistory(idx) {
    var list = loadHistory();
    list.splice(idx, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    renderHistory();
  }
  function renderHistory() {
    var list = loadHistory();
    var el = document.getElementById('history-list');
    if (list.length === 0) {
      el.innerHTML = '<p class="no-history">診断履歴はありません</p>';
      return;
    }
    el.innerHTML = list.map(function(item, idx) {
      var badgeCls = 'badge-' + item.level;
      return '<div class="history-item">'
        + '<div><div class="history-name">' + esc(item.name) + '</div>'
        + '<div class="history-meta">' + item.date + '　' + item.score + '点</div></div>'
        + '<div style="display:flex;align-items:center;gap:0.5rem;">'
        + '<span class="badge ' + badgeCls + '">' + item.label + '</span>'
        + '<button class="history-del" onclick="deleteHistory(' + idx + ')" title="削除">✕</button>'
        + '</div></div>';
    }).join('');
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期化
  updatePreview();
  renderHistory();
  </script>
</body>
</html>
