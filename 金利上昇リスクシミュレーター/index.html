<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金利上昇リスクシミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>金利上昇リスクシミュレーター</h1>
    <p class="subtitle">金利が上がったとき月返済額と総支払いがどう変わるか即確認</p>

    <section class="card">
      <h2>借入条件を入力</h2>
      <div class="form-group">
        <label for="balance">借入残高（万円）</label>
        <input type="number" id="balance" min="0" step="1" placeholder="例：3000">
      </div>
      <div class="form-group">
        <label for="currentRate">現行金利（%）</label>
        <input type="number" id="currentRate" min="0" step="0.01" placeholder="例：0.5">
      </div>
      <div class="form-group">
        <label for="remainingMonths">残り返済期間（年）</label>
        <input type="number" id="remainingMonths" min="1" step="1" placeholder="例：25">
      </div>
      <div class="form-group">
        <label for="riseAmount">想定上昇幅（%）</label>
        <input type="number" id="riseAmount" min="0" step="0.01" placeholder="例：1.0">
      </div>
      <button id="calcBtn" onclick="calculate()">シミュレーション実行</button>
    </section>

    <section class="card result-card" id="resultCard" style="display:none">
      <h2>シミュレーション結果</h2>
      <div class="result-grid">
        <div class="result-block current">
          <div class="result-label">現行金利（<span id="rCurrentRate"></span>%）</div>
          <div class="result-value"><span id="rCurrentMonthly"></span> <small>万円/月</small></div>
          <div class="result-sub">総支払い：<span id="rCurrentTotal"></span> 万円</div>
        </div>
        <div class="arrow">→</div>
        <div class="result-block after">
          <div class="result-label">上昇後（<span id="rAfterRate"></span>%）</div>
          <div class="result-value"><span id="rAfterMonthly"></span> <small>万円/月</small></div>
          <div class="result-sub">総支払い：<span id="rAfterTotal"></span> 万円</div>
        </div>
      </div>
      <div class="diff-box">
        <div class="diff-row">
          <span class="diff-label">月返済額の増加</span>
          <span class="diff-value" id="diffMonthly"></span>
        </div>
        <div class="diff-row">
          <span class="diff-label">総支払いの増加</span>
          <span class="diff-value" id="diffTotal"></span>
        </div>
        <div class="diff-row">
          <span class="diff-label">年間負担増</span>
          <span class="diff-value" id="diffAnnual"></span>
        </div>
      </div>
    </section>

    <section class="card scenario-card" id="scenarioCard" style="display:none">
      <h2>複数シナリオ比較</h2>
      <table id="scenarioTable">
        <thead>
          <tr>
            <th>上昇幅</th>
            <th>月返済増（万円）</th>
            <th>総支払い増（万円）</th>
          </tr>
        </thead>
        <tbody id="scenarioBody"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
