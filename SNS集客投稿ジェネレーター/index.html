<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS集客投稿ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .sns-tabs {
      display: flex; gap: 0.5rem; margin-bottom: 1rem;
      max-width: 600px; margin-left: auto; margin-right: auto;
      padding: 0 0;
    }
    .sns-tab {
      flex: 1; padding: 0.6rem 0.5rem; font-size: 0.85rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 9px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .sns-tab.active {
      border-color: var(--accent); background: var(--accent-light); color: var(--accent);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-section { display: none; max-width: 600px; margin: 0 auto; }

    .output-area {
      width: 100%; min-height: 160px; padding: 1rem;
      font-size: 0.9rem; line-height: 1.7;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--accent-light); color: var(--text);
      resize: vertical; font-family: inherit;
      white-space: pre-wrap; word-break: break-word;
    }

    .hashtag-area {
      width: 100%; padding: 0.9rem;
      font-size: 0.85rem; line-height: 1.6;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: #f0f8ff; color: #1a5276;
      resize: vertical; font-family: inherit;
      white-space: pre-wrap; word-break: break-word;
    }

    .copy-btn {
      display: block; width: 100%; padding: 0.75rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--ok-bg); color: var(--ok);
      border: 2px solid var(--ok); border-radius: 9px;
      cursor: pointer; margin-top: 0.7rem;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #dcfce7; }
    .copy-btn.copied { background: var(--ok); color: #fff; }

    .char-count { font-size: 0.72rem; color: var(--text-sub); text-align: right; margin-top: 0.25rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>SNS集客投稿ジェネレーター</h1>
    <p class="subtitle">毎日SNSに何を投稿すればいいか迷う前に。業種と商品を選ぶだけで投稿文とハッシュタグを自動生成、店舗集客とフォロワー増を後押しするアプリです。</p>
  </header>

  <!-- SNSタブ -->
  <div class="sns-tabs" style="padding:0 1rem;">
    <button class="sns-tab active" onclick="setTab('instagram', this)">Instagram</button>
    <button class="sns-tab" onclick="setTab('x', this)">X / Twitter</button>
    <button class="sns-tab" onclick="setTab('facebook', this)">Facebook</button>
  </div>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食店">飲食店</option>
        <option value="カフェ">カフェ</option>
        <option value="美容院">美容院</option>
        <option value="整体院・マッサージ">整体院・マッサージ</option>
        <option value="アパレル・ファッション">アパレル・ファッション</option>
        <option value="雑貨・インテリア">雑貨・インテリア</option>
        <option value="習い事・教室">習い事・教室</option>
        <option value="クリニック・医療">クリニック・医療</option>
        <option value="不動産">不動産</option>
        <option value="フィットネス・ジム">フィットネス・ジム</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="product">商品・サービス名</label>
      <input type="text" id="product" placeholder="例：季節の野菜スープランチ">
    </div>

    <div class="field">
      <label for="point">セールスポイント（任意）</label>
      <textarea id="point" placeholder="例：地元野菜を使ったやさしい味わい。ランチ限定1日20食のみ"></textarea>
      <p class="hint">特徴・こだわり・限定情報などを入力するとより魅力的な文章になります</p>
    </div>

    <div class="field">
      <label for="cta">行動喚起（任意）</label>
      <input type="text" id="cta" placeholder="例：ご予約はDMまたはお電話で">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">投稿文を生成する</button>

  <!-- 結果 -->
  <div class="result-section" id="resultSection">

    <div class="card">
      <p class="card-title">投稿文</p>
      <textarea class="output-area" id="postOutput" readonly></textarea>
      <p class="char-count" id="charCount"></p>
      <button class="copy-btn" id="copyPost" onclick="copyText('postOutput', 'copyPost')">投稿文をコピー</button>
    </div>

    <div class="card">
      <p class="card-title">ハッシュタグ</p>
      <textarea class="hashtag-area" id="hashtagOutput" readonly></textarea>
      <button class="copy-btn" id="copyHash" onclick="copyText('hashtagOutput', 'copyHash')">ハッシュタグをコピー</button>
    </div>

    <div class="card">
      <p class="card-title">投稿文＋ハッシュタグ（まとめてコピー）</p>
      <textarea class="output-area" id="fullOutput" readonly style="min-height:200px;"></textarea>
      <button class="copy-btn" id="copyFull" onclick="copyText('fullOutput', 'copyFull')">まとめてコピー</button>
    </div>

  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  function generate() {
    var industry = document.getElementById('industry').value;
    var product  = document.getElementById('product').value.trim();
    var point    = document.getElementById('point').value.trim();
    var cta      = document.getElementById('cta').value.trim();

    if (!product) {
      alert('商品・サービス名を入力してください');
      return;
    }

    // テンプレ選択
    var tmplGroup = templates[currentTab][industry] || templates[currentTab]['その他'];
    var tmpl = tmplGroup[Math.floor(Math.random() * tmplGroup.length)];

    // プレースホルダー置換
    var post = tmpl
      .replace(/\{product\}/g, product)
      .replace(/\{point\}/g, point || '')
      .replace(/\{cta\}/g, cta || '')
      .replace(/\n\n\n+/g, '\n\n')  // 連続改行を整理
      .trim();

    // ハッシュタグ
    var tagGroup = hashtagData[currentTab][industry] || hashtagData[currentTab]['その他'];
    // Xは少なめ、他は多め
    var count = currentTab === 'x' ? 4 : 10;
    var tags = tagGroup.slice(0, count).join(' ');

    document.getElementById('postOutput').value   = post;
    document.getElementById('hashtagOutput').value = tags;
    document.getElementById('fullOutput').value   = post + '\n\n' + tags;
    document.getElementById('charCount').textContent = post.length + '文字';

    document.getElementById('resultSection').style.display = 'block';

    // コピーボタンリセット
    ['copyPost','copyHash','copyFull'].forEach(function(id){
      var btn = document.getElementById(id);
      btn.classList.remove('copied');
      btn.textContent = id === 'copyPost' ? '投稿文をコピー' : id === 'copyHash' ? 'ハッシュタグをコピー' : 'まとめてコピー';
    });

    // localStorage保存
    try {
      localStorage.setItem('sns_gen_industry', industry);
      localStorage.setItem('sns_gen_product',  product);
      localStorage.setItem('sns_gen_point',    point);
      localStorage.setItem('sns_gen_cta',      cta);
      localStorage.setItem('sns_gen_tab',      currentTab);
    } catch(e) {}

    // スクロール
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
  }

  function copyText(areaId, btnId) {
    var text = document.getElementById(areaId).value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        flashCopy(btnId);
      });
    } else {
      var el = document.getElementById(areaId);
      el.select(); el.setSelectionRange(0, 99999);
      document.execCommand('copy');
      flashCopy(btnId);
    }
  }

  function flashCopy(btnId) {
    var btn = document.getElementById(btnId);
    var orig = btn.textContent;
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(function(){
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  }

  /* ── 起動時：localStorageから復元 ── */
  (function(){
    try {
      var ind = localStorage.getItem('sns_gen_industry');
      var pro = localStorage.getItem('sns_gen_product');
      var poi = localStorage.getItem('sns_gen_point');
      var cta = localStorage.getItem('sns_gen_cta');
      var tab = localStorage.getItem('sns_gen_tab');
      if (ind) document.getElementById('industry').value = ind;
      if (pro) document.getElementById('product').value  = pro;
      if (poi) document.getElementById('point').value    = poi;
      if (cta) document.getElementById('cta').value      = cta;
      if (tab) {
        currentTab = tab;
        document.querySelectorAll('.sns-tab').forEach(function(el, i){
          var tabs = ['instagram','x','facebook'];
          el.classList.toggle('active', tabs[i] === tab);
        });
      }
    } catch(e) {}
  })();
