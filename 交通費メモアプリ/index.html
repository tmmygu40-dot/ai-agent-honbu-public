<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交通費メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>交通費メモ</h1>

    <section class="input-section">
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="route">路線・区間</label>
        <input type="text" id="route" placeholder="例：渋谷→新宿">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：200" min="0">
      </div>
      <button id="add-btn" onclick="addRecord()">追加</button>
    </section>

    <section class="filter-section">
      <label for="month-filter">表示月：</label>
      <input type="month" id="month-filter" onchange="renderList()">
    </section>

    <section class="summary-section">
      <div class="total-box">
        <span class="total-label">合計</span>
        <span class="total-amount" id="total-amount">¥0</span>
      </div>
    </section>

    <section class="list-section">
      <ul id="record-list"></ul>
      <p id="empty-msg" class="empty-msg">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
