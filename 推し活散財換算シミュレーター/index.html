<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しに使った金額を入力するだけで、江戸時代の両・分・朱・文に換算。米俵や長屋の家賃で散財スケールを楽しく実感できるシミュレーターです。">
  <title>推し活散財換算シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 物価比較カード ── */
    .compare-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
    }
    .compare-item:last-child { border-bottom: none; }
    .compare-emoji { font-size: 1.6rem; flex-shrink: 0; }
    .compare-text { font-size: 0.88rem; color: var(--text); line-height: 1.5; }
    .compare-text strong { color: var(--accent); }

    /* ── 履歴カード ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-amount { font-weight: 700; color: var(--text); }
    .history-ryo { color: var(--accent); font-weight: 600; }
    .history-date { color: var(--text-sub); font-size: 0.75rem; }
    .btn-clear-history {
      display: block; margin: 0.8rem auto 0; padding: 0.5rem 1rem;
      font-size: 0.78rem; background: none; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    }
    .btn-clear-history:hover { color: var(--ng); border-color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💰 推し活散財換算シミュレーター</h1>
    <p class="subtitle">推しに貢いだ金額、江戸時代なら何両？歴史で実感する散財スケール。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="amount">推しに使った金額（円）</label>
      <input type="number" id="amount" placeholder="例: 50000" min="0">
      <p class="hint">グッズ・チケット・遠征費など合計金額を入力</p>
    </div>
    <div class="field">
      <label for="category">費目（任意）</label>
      <select id="category">
        <option value="合計">合計</option>
        <option value="グッズ">グッズ</option>
        <option value="チケット">チケット</option>
        <option value="遠征・交通費">遠征・交通費</option>
        <option value="配信・サブスク">配信・サブスク</option>
        <option value="その他">その他</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">換算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">江戸時代換算</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">通貨内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 物価比較カード -->
  <div class="card" id="compare" style="display:none">
    <p class="card-title">江戸時代の物価で例えると</p>
    <div id="compare-list"></div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">換算履歴</p>
    <div id="history-list"></div>
    <button class="btn-clear-history no-print" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 換算レートは江戸中期の米価を基準とした目安（1両≒約13万円）です。時代・地域により変動があります。歴史的な参考値としてお楽しみください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 換算レート（江戸中期・米価基準の目安） ──
  var YEN_PER_RYO = 130000;  // 1両 ≒ 13万円
  // 1両 = 4分 = 16朱
  // 1文 ≒ 30円（目安）
  var YEN_PER_MON = 30;

  // ── 物価比較データ ──
  var COMPARISONS = [
    { emoji: '🍚', unit: '米一俵（約60kg）', yen: 130000, suffix: '俵分' },
    { emoji: '🏠', unit: '長屋の月家賃', yen: 30000, suffix: 'ヶ月分' },
    { emoji: '🍶', unit: '酒一升（1.8L）', yen: 1300, suffix: '升分' },
    { emoji: '🍣', unit: '寿司一貫', yen: 650, suffix: '貫分' },
    { emoji: '🛁', unit: '銭湯一回', yen: 400, suffix: '回分' },
    { emoji: '📖', unit: '瓦版（新聞）一部', yen: 300, suffix: '部分' },
    { emoji: '🍜', unit: 'そば一杯', yen: 480, suffix: '杯分' },
    { emoji: '💇', unit: '髪結い一回', yen: 2600, suffix: '回分' }
  ];

  // ── 散財レベル判定 ──
  function getLevel(yen) {
    if (yen < 30000) return 'ok';
    if (yen < 200000) return 'warn';
    return 'ng';
  }
  function getLevelMsg(yen) {
    if (yen < 30000) return '町人のお小遣い程度。まだまだ序の口！';
    if (yen < 100000) return '職人の月収クラス。なかなかの推し愛！';
    if (yen < 200000) return '一両超え！立派な旦那衆の貫禄です';
    if (yen < 500000) return '大店の若旦那レベル。豪気ですね！';
    if (yen < 1000000) return '御家人の年収に迫る勢い。推し、喜んでます';
    if (yen < 5000000) return '大名の家臣級。推しへの忠誠心が凄い';
    return '将軍家御用達クラス！天下の推し活大名！';
  }
  function getLevelEmoji(yen) {
    if (yen < 30000) return '😊';
    if (yen < 100000) return '😳';
    if (yen < 200000) return '🤩';
    if (yen < 500000) return '💸';
    if (yen < 1000000) return '🏯';
    return '👑';
  }

  function calc() {
    var yen = parseFloat(document.getElementById('amount').value);
    if (isNaN(yen) || yen < 0) { showErr('金額を入力してください'); return; }
    if (yen === 0) { showErr('0円は換算できません'); return; }

    // 両・分・朱に分解
    var totalRyo = yen / YEN_PER_RYO;
    var ryo = Math.floor(totalRyo);
    var remainAfterRyo = yen - ryo * YEN_PER_RYO;
    var bu = Math.floor(remainAfterRyo / (YEN_PER_RYO / 4));
    var remainAfterBu = remainAfterRyo - bu * (YEN_PER_RYO / 4);
    var shu = Math.floor(remainAfterBu / (YEN_PER_RYO / 16));
    var remainAfterShu = remainAfterBu - shu * (YEN_PER_RYO / 16);
    var mon = Math.round(remainAfterShu / YEN_PER_MON);

    // 表示用テキスト
    var parts = [];
    if (ryo > 0) parts.push(fmt(ryo) + '両');
    if (bu > 0) parts.push(bu + '分');
    if (shu > 0) parts.push(shu + '朱');
    if (mon > 0) parts.push(fmt(mon) + '文');
    if (parts.length === 0) parts.push('0文');
    var ryoText = parts.join(' ');

    var level = getLevel(yen);
    var evalMsg = getLevelEmoji(yen) + ' ' + getLevelMsg(yen);

    showResult(level, ryoText, '');
    document.getElementById('re').textContent = evalMsg;

    // 内訳
    var rows = [
      ['入力金額', fmt(yen) + ' 円'],
      ['換算レート', '1両 ≒ ' + fmt(YEN_PER_RYO) + ' 円'],
    ];
    if (ryo > 0) rows.push(['両（大判）', fmt(ryo) + ' 両']);
    if (bu > 0) rows.push(['分（一分金）', bu + ' 分']);
    if (shu > 0) rows.push(['朱（一朱銀）', shu + ' 朱']);
    if (mon > 0) rows.push(['文（銭）', fmt(mon) + ' 文']);
    rows.push(['合計', ryoText, true]);
    showDetail(rows);

    // 物価比較
    var html = '';
    COMPARISONS.forEach(function(c) {
      var count = yen / c.yen;
      if (count >= 0.1) {
        var display = count >= 10 ? fmt(Math.round(count)) : count.toFixed(1);
        html += '<div class="compare-item">'
              + '<span class="compare-emoji">' + c.emoji + '</span>'
              + '<span class="compare-text">' + c.unit + ' <strong>' + display + c.suffix + '</strong></span>'
              + '</div>';
      }
    });
    document.getElementById('compare-list').innerHTML = html;
    document.getElementById('compare').style.display = 'block';

    // 履歴保存
    saveHistory(yen, ryoText);
    renderHistory();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('re').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('compare').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'oshi_sanazai_history';
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveHistory(yen, ryoText) {
    var h = getHistory();
    var cat = document.getElementById('category').value;
    h.unshift({
      yen: yen,
      ryo: ryoText,
      cat: cat,
      date: new Date().toLocaleDateString('ja-JP')
    });
    if (h.length > 20) h = h.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
  }
  function renderHistory() {
    var h = getHistory();
    if (h.length === 0) {
      document.getElementById('history-card').style.display = 'none';
      return;
    }
    var html = '';
    h.forEach(function(item) {
      html += '<div class="history-item">'
            + '<span><span class="history-amount">' + fmt(item.yen) + '円</span>'
            + ' <span style="color:var(--text-sub);font-size:0.75rem">(' + item.cat + ')</span></span>'
            + '<span><span class="history-ryo">' + item.ryo + '</span>'
            + ' <span class="history-date">' + item.date + '</span></span>'
            + '</div>';
    });
    document.getElementById('history-list').innerHTML = html;
    document.getElementById('history-card').style.display = 'block';
  }
  function clearHistory() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('history-card').style.display = 'none';
  }

  // 起動時に履歴表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
