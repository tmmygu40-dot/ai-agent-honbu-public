<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廃棄記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>廃棄記録アプリ</h1>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>廃棄を記録する</h2>
      <div class="form-group">
        <input type="text" id="productName" placeholder="商品名" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="wasteCount">廃棄数</label>
          <input type="number" id="wasteCount" placeholder="個数" min="1" value="1">
        </div>
        <div class="form-group">
          <label for="unitPrice">単価（円）</label>
          <input type="number" id="unitPrice" placeholder="単価" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <input type="date" id="wasteDate">
      </div>
      <button id="addBtn" class="btn btn-primary">記録する</button>
    </section>

    <!-- 集計サマリー -->
    <section class="summary-section">
      <div class="summary-card">
        <div class="summary-label">本日の廃棄金額</div>
        <div class="summary-value" id="todayTotal">¥0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">累計廃棄金額</div>
        <div class="summary-value" id="grandTotal">¥0</div>
      </div>
    </section>

    <!-- ランキング -->
    <section class="ranking-section">
      <h2>廃棄ランキング（上位5件）</h2>
      <ul id="rankingList" class="ranking-list">
        <li class="empty-msg">まだデータがありません</li>
      </ul>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>記録一覧</h2>
      <div class="filter-row">
        <input type="month" id="filterMonth">
        <button id="filterBtn" class="btn btn-secondary">絞り込み</button>
        <button id="clearFilterBtn" class="btn btn-ghost">全件表示</button>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <table id="recordTable">
        <thead>
          <tr>
            <th>日付</th>
            <th>商品名</th>
            <th>廃棄数</th>
            <th>単価</th>
            <th>廃棄金額</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr><td colspan="6" class="empty-msg">まだ記録がありません</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
