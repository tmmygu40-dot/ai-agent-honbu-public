<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>気分天気おみくじ｜今日の気分を天気に例えるラッキー診断</title>
  <meta name="description" content="今日の気分を選ぶだけで、その気分を天気に例えてラッキーアドバイスと過ごし方が出てくる気分天気おみくじ。1日の調子を整えたい朝・もやもや解消のヒントにどうぞ。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji-big { font-size: 3.4rem; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; margin-top: 0.8rem; }
    .result-note strong { color: var(--accent); display: block; margin: 0.6rem 0 0.2rem; font-size: 0.82rem; letter-spacing: 0.04em; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>☁️ 気分天気おみくじ</h1>
    <p class="subtitle">今日の気分を天気に例えて、ラッキーアドバイスと過ごし方をお届け</p>
  </header>

  <div class="card">
    <p class="card-title">今日の気分</p>
    <div class="field">
      <label for="mood">いまの気分にいちばん近いものは？</label>
      <select id="mood">
        <option value="">選んでください</option>
        <option value="ukiuki">うきうき・テンション高め</option>
        <option value="nikoniko">にこにこ・落ち着いて満ち足りた</option>
        <option value="moyamoya">もやもや・スッキリしない</option>
        <option value="bonyari">ぼんやり・ぼーっとしている</option>
        <option value="shonbori">しょんぼり・落ち込み気味</option>
        <option value="guttari">ぐったり・疲れている</option>
        <option value="sowasowa">そわそわ・落ち着かない</option>
        <option value="iraira">イライラ・ピリピリしている</option>
      </select>
      <p class="hint">選び直して何度でも引けます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="draw()">🌤️ 今日の天気を占う</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="emoji">—</p>
    <p class="result-label">今日のあなたの心は</p>
    <p class="result-value" id="rv">—</p>
    <div class="result-note" id="rn"></div>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🍀 このおみくじは気分転換のための娯楽です。占い結果の解釈は気軽に楽しんでください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var DATA = {
    ukiuki: {
      level: 'ok', emoji: '☀️', weather: '快晴・絶好調びより',
      advice: [
        '思い立ったらすぐ動く日。新しい挑戦は今日が吉。',
        '人に声をかけると倍率ドンで運気アップ。',
        '小さな成功体験を1つ積むと夜まで気分が続きます。'
      ],
      spend: [
        '気になっていたお店・場所に足を運んでみる。',
        '友人や家族にちょっとした連絡をしてみる。',
        '前から温めていたアイデアを15分だけ書き出す。'
      ]
    },
    nikoniko: {
      level: 'ok', emoji: '🌤️', weather: '晴れ時々ほっこり雲',
      advice: [
        '無理に頑張らずとも、自然体でうまく回る日。',
        '丁寧にやった一手が後で効いてくる暗示。',
        '人の話をゆっくり聞くと、思わぬヒントが届きます。'
      ],
      spend: [
        '好きな飲み物をいれて、ひと息つく時間を確保。',
        '部屋の小さな場所だけ整える（机の上1段だけ等）。',
        '本・動画・音楽など、心が落ち着くコンテンツを1つ。'
      ]
    },
    moyamoya: {
      level: 'warn', emoji: '☁️', weather: 'うすぐもり・霧晴れ待ち',
      advice: [
        '答えを急がず、いったん保留にしておくのが吉。',
        '頭の中を紙に書き出すと、霧が少し晴れます。',
        '小さなことから1つ片付けると流れが変わります。'
      ],
      spend: [
        'もやもやの正体を箇条書きで3つだけメモする。',
        '15分だけ散歩や換気をして空気を入れ替える。',
        '甘いもの＆温かい飲み物で自分をいたわる。'
      ]
    },
    bonyari: {
      level: 'warn', emoji: '🌫️', weather: '霧・視界ぼんやり',
      advice: [
        '集中より「ゆるく続ける」を優先する日。',
        '大きな決断は明日以降にズラすのが安全。',
        'ToDoは数を減らして1〜2個に絞ると進みます。'
      ],
      spend: [
        'タイマー10分を1セットだけ作業して切り上げる。',
        '水を1杯・深呼吸3回でリセット。',
        '昼寝や早寝で睡眠リズムを取り戻す。'
      ]
    },
    shonbori: {
      level: 'warn', emoji: '🌧️', weather: 'しとしと小雨・あったか毛布日和',
      advice: [
        '今日は休む口実を自分にプレゼントしていい日。',
        '気持ちを否定せず、そのまま味わうのも回復のうち。',
        '誰かに「ちょっと聞いてほしい」と言うのが吉。'
      ],
      spend: [
        '湯船・シャワーで体を温める。',
        '好きな曲や映画でやさしく気分を包む。',
        '小さなご褒美（おやつ・コンビニスイーツ等）を許可。'
      ]
    },
    guttari: {
      level: 'ng', emoji: '🌧️', weather: '本降りの雨・休養注意報',
      advice: [
        '頑張る日ではなく、回復に全振りする日。',
        '予定は半分に減らしても誰も困りません。',
        '判断・連絡は短く・遅く・最小限でOK。'
      ],
      spend: [
        '今日のうちに30分でも横になる時間を作る。',
        '夕食は無理せずレトルト・お惣菜・外食に頼る。',
        'スマホを置いて目を閉じる時間を5分だけ取る。'
      ]
    },
    sowasowa: {
      level: 'warn', emoji: '🌬️', weather: '強風注意・落ち葉舞う',
      advice: [
        '気が散る日。マルチタスクは事故の元。',
        '深呼吸→1点集中で、少しずつ流れが整います。',
        '気になることは紙に出してから次に進むと吉。'
      ],
      spend: [
        '机を片付けて視界に物を減らす。',
        'スマホ通知をオフ／集中モードを15分だけ試す。',
        '体を動かすストレッチで余分な緊張を抜く。'
      ]
    },
    iraira: {
      level: 'ng', emoji: '⛈️', weather: '雷雨・接触注意警報',
      advice: [
        '即レス・即決はトラブルの種。一晩寝かせるのが吉。',
        '怒りは情報。原因を1つだけ言葉にしてみる。',
        '相手より、まず自分の体調をチェックしてみて。'
      ],
      spend: [
        '冷たい水を飲んで体温を1段下げる。',
        '誰もいない場所で30秒、声を出して伸びをする。',
        '今日は刺激物（ニュース・SNS）から距離を置く。'
      ]
    }
  };

  var pickList = ['daikichi','kichi','chukichi','shokichi','sue'];
  var FORTUNE_LABEL = {
    daikichi: '大吉', kichi: '吉', chukichi: '中吉', shokichi: '小吉', sue: '末吉'
  };

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function draw() {
    var moodKey = document.getElementById('mood').value;
    if (!moodKey || !DATA[moodKey]) {
      showErr('気分を選んでください');
      return;
    }
    var d = DATA[moodKey];
    var fortune = pick(pickList);
    var advice = pick(d.advice);
    var spend = pick(d.spend);

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + d.level;
    rc.style.display = 'block';
    document.getElementById('emoji').textContent = d.emoji;
    document.getElementById('rv').textContent = d.weather + '（' + FORTUNE_LABEL[fortune] + '）';
    document.getElementById('rn').innerHTML =
      '<strong>🍀 ラッキーアドバイス</strong>' + escapeHtml(advice) +
      '<strong>🌿 今日のおすすめの過ごし方</strong>' + escapeHtml(spend);

    try {
      localStorage.setItem('mood-weather-omikuji-last', JSON.stringify({
        mood: moodKey,
        weather: d.weather,
        fortune: fortune,
        advice: advice,
        spend: spend,
        at: new Date().toISOString()
      }));
    } catch(e) {}
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('emoji').textContent = '⚠️';
    document.getElementById('rv').textContent = msg;
    document.getElementById('rn').innerHTML = '';
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // 前回の気分を復元（再訪時の体験向上）
  (function restore() {
    try {
      var raw = localStorage.getItem('mood-weather-omikuji-last');
      if (!raw) return;
      var saved = JSON.parse(raw);
      if (saved && saved.mood && DATA[saved.mood]) {
        document.getElementById('mood').value = saved.mood;
      }
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
