<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品価格設定アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>作品価格設定アプリ</h1>
    <p class="subtitle">ハンドメイド作品の適正販売価格を計算します</p>

    <!-- 設定 -->
    <section class="card settings-card">
      <h2>設定</h2>
      <div class="form-row">
        <label>時給（円）</label>
        <input type="number" id="hourlyRate" value="1000" min="0">
      </div>
      <div class="form-row">
        <label>利益率（%）</label>
        <input type="number" id="profitRate" value="30" min="0" max="200">
      </div>
      <div class="form-row">
        <label>諸経費率（%）</label>
        <input type="number" id="expenseRate" value="10" min="0" max="100">
      </div>
    </section>

    <!-- 入力 -->
    <section class="card">
      <h2>作品情報を入力</h2>
      <div class="form-row">
        <label>作品名</label>
        <input type="text" id="itemName" placeholder="例：刺繍ポーチ">
      </div>
      <div class="form-row">
        <label>材料費（円）</label>
        <input type="number" id="materialCost" value="0" min="0">
      </div>
      <div class="form-row">
        <label>作業時間（分）</label>
        <input type="number" id="workMinutes" value="0" min="0">
      </div>
      <button class="btn-primary" onclick="calculate()">計算する</button>
    </section>

    <!-- 結果 -->
    <section class="card result-card" id="resultCard" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-item">
        <span class="result-label">材料費</span>
        <span class="result-value" id="resMaterial">—</span>
      </div>
      <div class="result-item">
        <span class="result-label">諸経費（材料費×<span id="expRateLbl">10</span>%）</span>
        <span class="result-value" id="resExpense">—</span>
      </div>
      <div class="result-item">
        <span class="result-label">作業時間（<span id="resTime">0</span>分）</span>
        <span class="result-value" id="resLabor">—</span>
      </div>
      <div class="result-item subtotal">
        <span class="result-label">原価合計</span>
        <span class="result-value" id="resCost">—</span>
      </div>
      <div class="result-item">
        <span class="result-label">利益（<span id="profRateLbl">30</span>%上乗せ）</span>
        <span class="result-value" id="resProfit">—</span>
      </div>
      <div class="result-item total">
        <span class="result-label">適正販売価格</span>
        <span class="result-value price" id="resTotal">—</span>
      </div>
      <button class="btn-secondary" onclick="saveHistory()">履歴に保存</button>
    </section>

    <!-- 履歴 -->
    <section class="card" id="historyCard">
      <h2>計算履歴</h2>
      <div id="historyList">
        <p class="empty-msg">履歴はまだありません</p>
      </div>
      <button class="btn-danger" onclick="clearHistory()" id="clearBtn" style="display:none;">履歴をすべて削除</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
