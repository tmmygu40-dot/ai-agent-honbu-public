<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省エネ投資回収シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>省エネ投資回収シミュレーター</h1>
    <p class="subtitle">設備導入の費用対効果・投資回収期間をすぐ確認</p>

    <section class="form-section">
      <h2>設備情報を入力</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="deviceName">設備名</label>
          <input type="text" id="deviceName" placeholder="例：LED照明、エアコン">
        </div>
        <div class="form-group">
          <label for="investmentCost">導入コスト（円）</label>
          <input type="number" id="investmentCost" placeholder="例：500000" min="0">
        </div>
        <div class="form-group">
          <label for="annualEnergyCost">現在の年間エネルギー費（円）</label>
          <input type="number" id="annualEnergyCost" placeholder="例：200000" min="0">
        </div>
        <div class="form-group">
          <label for="savingRate">省エネ効果率（%）</label>
          <input type="number" id="savingRate" placeholder="例：30" min="0" max="100" step="0.1">
        </div>
      </div>
      <div class="preview" id="preview" style="display:none;">
        <div class="preview-item">
          <span class="preview-label">年間節約額</span>
          <span class="preview-value" id="previewSaving">-</span>
        </div>
        <div class="preview-item">
          <span class="preview-label">投資回収期間</span>
          <span class="preview-value" id="previewPayback">-</span>
        </div>
      </div>
      <button class="btn-add" id="btnAdd">追加する</button>
    </section>

    <section class="list-section">
      <h2>登録済み設備一覧 <span id="countBadge" class="count-badge">0</span></h2>
      <div id="deviceList" class="device-list">
        <p class="empty-msg">設備がまだ登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
