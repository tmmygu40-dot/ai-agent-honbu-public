<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具貸出管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>工具貸出管理</h1>

    <!-- 貸出登録フォーム -->
    <section class="form-section">
      <h2>貸出登録</h2>
      <div class="form-group">
        <label for="toolName">工具・備品名</label>
        <input type="text" id="toolName" placeholder="例：電動ドリル" maxlength="50">
      </div>
      <div class="form-group">
        <label for="personName">担当者名</label>
        <input type="text" id="personName" placeholder="例：田中" maxlength="30">
      </div>
      <div class="form-group">
        <label for="lendDate">持ち出し日</label>
        <input type="date" id="lendDate">
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：A現場で使用" maxlength="80">
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルタ -->
    <section class="filter-section">
      <h2>貸出一覧</h2>
      <div class="filter-tabs">
        <button class="tab active" data-filter="unreturned">未返却</button>
        <button class="tab" data-filter="all">すべて</button>
        <button class="tab" data-filter="returned">返却済み</button>
      </div>
    </section>

    <!-- 件数表示 -->
    <div class="summary" id="summary"></div>

    <!-- 一覧 -->
    <div id="list" class="list"></div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
