<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経費精算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>経費精算アプリ</h1>

    <!-- 入力フォーム -->
    <section class="card">
      <h2>領収書を登録</h2>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：1500" min="0">
      </div>
      <div class="form-group">
        <label for="category">項目（カテゴリ）</label>
        <select id="category">
          <option value="交通費">交通費</option>
          <option value="食費">食費</option>
          <option value="消耗品">消耗品</option>
          <option value="通信費">通信費</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：新幹線代・会議用コーヒー">
      </div>
      <button class="btn btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- 月選択 -->
    <section class="card">
      <h2>月を選択</h2>
      <div class="month-selector">
        <input type="month" id="monthSelect">
        <button class="btn btn-secondary" id="showReportBtn">精算書を表示</button>
      </div>
    </section>

    <!-- 月別一覧 -->
    <section class="card" id="listSection">
      <h2>領収書一覧 <span id="listMonth"></span></h2>
      <div id="receiptList" class="receipt-list">
        <p class="empty-msg">登録された領収書はありません</p>
      </div>
    </section>

    <!-- 経費精算書 -->
    <section class="card" id="reportSection" style="display:none">
      <h2>経費精算書 <span id="reportMonth"></span></h2>
      <div class="report-total">
        <span>合計金額</span>
        <span id="totalAmount" class="total-num">¥0</span>
      </div>
      <h3>項目別集計</h3>
      <div id="categoryBreakdown" class="breakdown"></div>
      <h3>明細</h3>
      <div id="reportDetail" class="report-detail"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
