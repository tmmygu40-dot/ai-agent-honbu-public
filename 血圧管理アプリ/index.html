<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E8%A1%80%E5%9C%A7%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="血圧管理。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"血圧管理","description":"血圧管理。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E8%A1%80%E5%9C%A7%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>血圧管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="systolic">収縮期血圧（上）</label>
          <input type="number" id="systolic" placeholder="例: 120" min="60" max="250">
        </div>
        <div class="form-group">
          <label for="diastolic">拡張期血圧（下）</label>
          <input type="number" id="diastolic" placeholder="例: 80" min="40" max="150">
        </div>
        <div class="form-group">
          <label for="pulse">脈拍</label>
          <input type="number" id="pulse" placeholder="例: 70" min="30" max="200">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <!-- グラフ -->
    <section class="chart-section">
      <h2>傾向グラフ</h2>
      <div class="chart-legend">
        <span class="legend-item systolic-color">● 収縮期（上）</span>
        <span class="legend-item diastolic-color">● 拡張期（下）</span>
        <span class="legend-item pulse-color">● 脈拍</span>
      </div>
      <div class="canvas-wrapper">
        <canvas id="chart"></canvas>
      </div>
      <p id="noDataMsg" class="no-data">記録がありません</p>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
