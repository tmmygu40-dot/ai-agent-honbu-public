<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血圧管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>血圧管理</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="systolic">収縮期血圧（上）</label>
          <input type="number" id="systolic" placeholder="例: 120" min="60" max="250">
        </div>
        <div class="form-group">
          <label for="diastolic">拡張期血圧（下）</label>
          <input type="number" id="diastolic" placeholder="例: 80" min="40" max="150">
        </div>
        <div class="form-group">
          <label for="pulse">脈拍</label>
          <input type="number" id="pulse" placeholder="例: 70" min="30" max="200">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <!-- グラフ -->
    <section class="chart-section">
      <h2>傾向グラフ</h2>
      <div class="chart-legend">
        <span class="legend-item systolic-color">● 収縮期（上）</span>
        <span class="legend-item diastolic-color">● 拡張期（下）</span>
        <span class="legend-item pulse-color">● 脈拍</span>
      </div>
      <div class="canvas-wrapper">
        <canvas id="chart"></canvas>
      </div>
      <p id="noDataMsg" class="no-data">記録がありません</p>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
