<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レシピ倍率計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E3%83%AC%E3%82%B7%E3%83%94%E5%80%8D%E7%8E%87%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="レシピ倍率計算。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"レシピ倍率計算","description":"レシピ倍率計算。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%83%AC%E3%82%B7%E3%83%94%E5%80%8D%E7%8E%87%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>🍳 レシピ倍率計算</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <!-- レシピ登録フォーム -->
    <section class="card" id="register-section">
      <h2>レシピを登録</h2>
      <div class="form-row">
        <label>レシピ名</label>
        <input type="text" id="recipe-name" placeholder="例：カレーライス">
      </div>
      <div class="form-row">
        <label>基準人数</label>
        <input type="number" id="base-servings" min="1" value="2" placeholder="2">
        <span class="unit-label">人分</span>
      </div>

      <div id="ingredients-list">
        <h3>材料</h3>
        <div id="ingredient-rows">
          <div class="ingredient-row">
            <input type="text" class="ing-name" placeholder="材料名（例：じゃがいも）">
            <input type="number" class="ing-amount" min="0" step="0.1" placeholder="量（例：300）">
            <input type="text" class="ing-unit" placeholder="単位（例：g）">
            <button class="btn-remove-row" onclick="removeIngredientRow(this)">×</button>
          </div>
        </div>
        <button class="btn-add-row" onclick="addIngredientRow()">＋ 材料を追加</button>
      </div>

      <button class="btn-primary" onclick="saveRecipe()">レシピを保存</button>
    </section>

    <!-- レシピ一覧 -->
    <section class="card" id="list-section">
      <h2>保存済みレシピ</h2>
      <div id="recipe-list">
        <p class="empty-msg">まだレシピがありません</p>
      </div>
    </section>
  </div>

  <!-- 換算モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2 id="modal-title"></h2>
      <div class="servings-row">
        <label>何人分に換算？</label>
        <input type="number" id="target-servings" min="1" value="4" oninput="calcServings()">
        <span class="unit-label">人分</span>
      </div>
      <div id="calc-result"></div>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
