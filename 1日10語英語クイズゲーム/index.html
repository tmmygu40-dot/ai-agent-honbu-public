<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="毎日10問の英単語クイズ。日本語の意味から正しい英単語を選ぶゲーム。無料で毎日の英語学習に挑戦できます。スマホ・PCどちらでも気軽に遊べます。">
  <title>1日10語英語クイズゲーム｜毎日英単語を楽しく学べる無料アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>1日10語英語クイズゲーム</h1>
    <p class="subtitle">毎日10問。日本語から正しい英単語を選んで、英語学習を習慣化しましょう。</p>
  </header>

  <!-- クイズカード -->
  <div class="card">
    <p class="card-title">問 <span id="qNum">1</span>/10</p>
    <p id="questionJa" style="font-size:1.05rem;font-weight:600;margin-bottom:1.2rem;text-align:center;min-height:2.5rem;line-height:1.6;"></p>
    <div id="answersDiv" style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;">
      <button class="btn-choice" onclick="answerQuiz(0)" style="padding:0.85rem;font-size:0.95rem;background:var(--accent-light);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;font-weight:600;">A</button>
      <button class="btn-choice" onclick="answerQuiz(1)" style="padding:0.85rem;font-size:0.95rem;background:var(--accent-light);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;font-weight:600;">B</button>
      <button class="btn-choice" onclick="answerQuiz(2)" style="padding:0.85rem;font-size:0.95rem;background:var(--accent-light);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;font-weight:600;">C</button>
      <button class="btn-choice" onclick="answerQuiz(3)" style="padding:0.85rem;font-size:0.95rem;background:var(--accent-light);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;font-weight:600;">D</button>
    </div>
  </div>

  <!-- スタートボタン -->
  <button class="btn-calc" id="startBtn" onclick="startQuiz()">スタート</button>

  <!-- 結論カード（スコア表示） -->
  <div class="result-card" id="result">
    <p class="result-label">スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <button class="btn-calc" id="retryBtn" onclick="retryQuiz()" style="margin-top:1rem;background:#666;display:none;">もう一度遊ぶ</button>
  </div>

  <!-- 内訳カード（非表示） -->
  <div class="card" id="detail" style="display:none"></div>


  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールの英単語データは、日本の学習者向けの一般的な英単語を参考にしています。毎日の学習習慣づくりにお役立てください。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 英単語データセット ──
  var WORDS = [
    { ja: 'Apple（りんご）', en: ['apple', 'orange', 'grape', 'melon'] },
    { ja: 'Book（本）', en: ['book', 'pen', 'desk', 'paper'] },
    { ja: 'Cat（猫）', en: ['cat', 'dog', 'bird', 'fish'] },
    { ja: 'Door（ドア）', en: ['door', 'window', 'wall', 'roof'] },
    { ja: 'Elephant（象）', en: ['elephant', 'tiger', 'bear', 'lion'] },
    { ja: 'Flower（花）', en: ['flower', 'tree', 'grass', 'rose'] },
    { ja: 'Good（良い）', en: ['good', 'bad', 'ugly', 'poor'] },
    { ja: 'House（家）', en: ['house', 'building', 'apartment', 'castle'] },
    { ja: 'Ice（氷）', en: ['ice', 'snow', 'water', 'rain'] },
    { ja: 'Jump（跳ぶ）', en: ['jump', 'run', 'walk', 'fly'] },
    { ja: 'King（王様）', en: ['king', 'queen', 'prince', 'princess'] },
    { ja: 'Light（光）', en: ['light', 'dark', 'bright', 'dim'] },
    { ja: 'Moon（月）', en: ['moon', 'sun', 'star', 'planet'] },
    { ja: 'Nest（巣）', en: ['nest', 'hole', 'cave', 'den'] },
    { ja: 'Ocean（海）', en: ['ocean', 'sea', 'lake', 'river'] },
    { ja: 'Pen（ペン）', en: ['pen', 'pencil', 'marker', 'brush'] },
    { ja: 'Queen（女王）', en: ['queen', 'king', 'princess', 'lady'] },
    { ja: 'Red（赤）', en: ['red', 'blue', 'green', 'yellow'] },
    { ja: 'Sun（太陽）', en: ['sun', 'moon', 'star', 'cloud'] },
    { ja: 'Tiger（虎）', en: ['tiger', 'lion', 'bear', 'wolf'] },
    { ja: 'Under（下）', en: ['under', 'over', 'above', 'below'] },
    { ja: 'Voice（声）', en: ['voice', 'sound', 'noise', 'echo'] },
    { ja: 'Water（水）', en: ['water', 'ice', 'snow', 'steam'] },
    { ja: 'Yellow（黄色）', en: ['yellow', 'blue', 'red', 'green'] },
    { ja: 'Zoo（動物園）', en: ['zoo', 'park', 'garden', 'forest'] },
    { ja: 'Chair（椅子）', en: ['chair', 'table', 'bed', 'sofa'] },
    { ja: 'Sleep（寝る）', en: ['sleep', 'wake', 'rest', 'relax'] },
    { ja: 'Happy（幸せな）', en: ['happy', 'sad', 'angry', 'tired'] },
    { ja: 'Food（食べ物）', en: ['food', 'drink', 'bread', 'rice'] },
    { ja: 'Hand（手）', en: ['hand', 'foot', 'head', 'arm'] }
  ];

  var quizState = {
    todayDate: '',
    currentQuestion: 0,
    score: 0,
    answeredQuestions: [],
    todayQuestions: null
  };

  function getTodayDate() {
    return new Date().toDateString();
  }

  function getShuffledQuestions(date) {
    var stored = localStorage.getItem('quizDate_' + date);
    if (stored) {
      return JSON.parse(stored);
    }
    var shuffled = WORDS.map(function(w, i) { return i; }).sort(function() { return Math.random() - 0.5; });
    var today10 = shuffled.slice(0, 10).map(function(idx) { return WORDS[idx]; });
    localStorage.setItem('quizDate_' + date, JSON.stringify(today10));
    return today10;
  }

  function shuffleAnswers(correctIdx, wrongAnswers) {
    var all = [WORDS[correctIdx].en[0]].concat(wrongAnswers);
    return all.sort(function() { return Math.random() - 0.5; });
  }

  function startQuiz() {
    quizState.todayDate = getTodayDate();
    quizState.todayQuestions = getShuffledQuestions(quizState.todayDate);
    quizState.currentQuestion = 0;
    quizState.score = 0;
    quizState.answeredQuestions = [];
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    if (quizState.currentQuestion >= 10) {
      showFinalScore();
      return;
    }
    var q = quizState.todayQuestions[quizState.currentQuestion];
    var correctAnswer = q.en[0];

    // 他の単語から3つランダムに選ぶ
    var wrongAnswers = [];
    for (var i = 0; i < WORDS.length; i++) {
      if (WORDS[i].en[0] !== correctAnswer) {
        wrongAnswers.push(WORDS[i].en[0]);
      }
    }
    wrongAnswers = wrongAnswers.sort(function() { return Math.random() - 0.5; }).slice(0, 3);

    // 4つの選択肢をシャッフル
    var allAnswers = [correctAnswer].concat(wrongAnswers);
    allAnswers = allAnswers.sort(function() { return Math.random() - 0.5; });
    quizState.currentAnswers = allAnswers;
    quizState.correctAnswerIdx = allAnswers.indexOf(correctAnswer);

    document.getElementById('qNum').textContent = quizState.currentQuestion + 1;
    document.getElementById('questionJa').textContent = q.ja;

    var answerDiv = document.getElementById('answersDiv');
    answerDiv.innerHTML = '';
    var btnLabels = ['A', 'B', 'C', 'D'];
    for (var i = 0; i < 4; i++) {
      var btn = document.createElement('button');
      btn.className = 'btn-choice';
      btn.textContent = btnLabels[i] + '. ' + allAnswers[i];
      btn.style.cssText = 'padding:0.85rem;font-size:0.95rem;background:var(--accent-light);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;font-weight:600;';
      btn.onclick = (function(idx) { return function() { answerQuiz(idx); }; })(i);
      answerDiv.appendChild(btn);
    }
  }

  function answerQuiz(idx) {
    var isCorrect = (idx === quizState.correctAnswerIdx);
    if (isCorrect) quizState.score++;
    quizState.answeredQuestions.push({ q: quizState.todayQuestions[quizState.currentQuestion], correct: isCorrect });
    quizState.currentQuestion++;
    setTimeout(showQuestion, 500);
  }

  function showFinalScore() {
    var pct = (quizState.score / 10 * 100).toFixed(0);
    var level = quizState.score >= 8 ? 'ok' : quizState.score >= 5 ? 'warn' : 'ng';
    var msg = level === 'ok' ? 'よくできました！明日もチャレンジしましょう。'
            : level === 'warn' ? 'もう少し！継続が大事です。'
            : '今日も学習しました。明日また挑戦しましょう。';

    document.getElementById('result').className = 'result-card ' + level;
    document.getElementById('result').style.display = 'block';
    document.getElementById('rv').textContent = quizState.score + '/10';
    document.getElementById('rn').textContent = msg;
    document.getElementById('retryBtn').style.display = 'block';
    document.getElementById('retryBtn').onclick = retryQuiz;
  }

  function retryQuiz() {
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').textContent = 'もう一度';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('answersDiv').innerHTML = '';
  }

  // ページ読み込み時に進捗を確認
  document.addEventListener('DOMContentLoaded', function() {
    // 既存の進捗があれば復元
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
