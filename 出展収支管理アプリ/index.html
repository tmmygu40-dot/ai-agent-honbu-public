<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出展収支管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>出展収支管理</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>イベント登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="eventName">イベント名 <span class="required">*</span></label>
          <input type="text" id="eventName" placeholder="例：〇〇マルシェ" maxlength="50">
        </div>
        <div class="form-group">
          <label for="eventDate">開催日 <span class="required">*</span></label>
          <input type="date" id="eventDate">
        </div>
        <div class="form-group">
          <label for="sales">売上（円）<span class="required">*</span></label>
          <input type="number" id="sales" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="expenses">費用（円）<span class="required">*</span></label>
          <input type="number" id="expenses" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="visitors">来客数（人）</label>
          <input type="number" id="visitors" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="天気・場所など" maxlength="100">
        </div>
      </div>
      <button class="btn-primary" onclick="addEvent()">登録する</button>
    </section>

    <!-- サマリー -->
    <section class="summary-section" id="summarySection" style="display:none">
      <h2>全体サマリー</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">総売上</div>
          <div class="summary-value" id="totalSales">0円</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">総費用</div>
          <div class="summary-value" id="totalExpenses">0円</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">総利益</div>
          <div class="summary-value" id="totalProfit">0円</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">出展回数</div>
          <div class="summary-value" id="totalEvents">0回</div>
        </div>
      </div>
    </section>

    <!-- イベント一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>イベント一覧</h2>
        <select id="sortSelect" onchange="renderList()">
          <option value="date-desc">日付：新しい順</option>
          <option value="date-asc">日付：古い順</option>
          <option value="profit-desc">利益：高い順</option>
          <option value="profit-asc">利益：低い順</option>
        </select>
      </div>
      <div id="eventList" class="event-list">
        <p class="empty-message">まだイベントが登録されていません。<br>上のフォームから登録してください。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
