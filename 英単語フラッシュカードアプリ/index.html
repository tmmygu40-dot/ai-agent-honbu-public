<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語フラッシュカード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>英単語フラッシュカード</h1>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" data-tab="quiz">出題</button>
      <button class="tab" data-tab="manage">単語管理</button>
    </div>

    <!-- 出題タブ -->
    <div id="tab-quiz" class="tab-content active">
      <div id="quiz-empty" class="empty-msg" style="display:none">
        単語を登録してください
      </div>

      <div id="quiz-area">
        <div class="score-bar">
          <span>正答率: <strong id="score-rate">-%</strong></span>
          <span>（正解 <strong id="score-correct">0</strong> / 出題 <strong id="score-total">0</strong>）</span>
          <button id="reset-score" class="btn-small">リセット</button>
        </div>

        <div id="flashcard" class="flashcard">
          <div class="card-inner" id="card-inner">
            <div class="card-front" id="card-front">
              <p class="card-label">英語</p>
              <p class="card-word" id="card-word">-</p>
              <p class="card-hint">タップで意味を表示</p>
            </div>
            <div class="card-back" id="card-back">
              <p class="card-label">意味</p>
              <p class="card-word" id="card-meaning">-</p>
            </div>
          </div>
        </div>

        <div class="quiz-actions">
          <button id="btn-wrong" class="btn btn-wrong" style="display:none">✕ 不正解</button>
          <button id="btn-correct" class="btn btn-correct" style="display:none">○ 正解</button>
        </div>
        <div class="quiz-actions" style="margin-top:8px">
          <button id="btn-next" class="btn btn-next">次の単語</button>
        </div>
      </div>
    </div>

    <!-- 単語管理タブ -->
    <div id="tab-manage" class="tab-content">
      <form id="word-form">
        <div class="form-row">
          <input type="text" id="input-word" placeholder="英単語" required>
          <input type="text" id="input-meaning" placeholder="意味（日本語）" required>
          <button type="submit" class="btn btn-add">追加</button>
        </div>
      </form>

      <div id="word-list-empty" class="empty-msg" style="display:none">登録された単語がありません</div>
      <ul id="word-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
