<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>割り勘精算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>割り勘精算アプリ</h1>

    <!-- 参加者追加 -->
    <section class="card">
      <h2>参加者を追加</h2>
      <div class="input-row">
        <input type="text" id="memberName" placeholder="名前を入力" maxlength="20">
        <button onclick="addMember()">追加</button>
      </div>
      <div id="memberList" class="tag-list"></div>
    </section>

    <!-- 立替金額入力 -->
    <section class="card">
      <h2>立替金額を入力</h2>
      <div class="input-group">
        <div class="input-row">
          <label>立替者</label>
          <select id="payerSelect"></select>
        </div>
        <div class="input-row">
          <label>金額 (円)</label>
          <input type="number" id="amountInput" placeholder="金額" min="1">
        </div>
        <div class="input-row">
          <label>メモ (任意)</label>
          <input type="text" id="memoInput" placeholder="食事代など" maxlength="30">
        </div>
        <button onclick="addPayment()" class="btn-full">追加</button>
      </div>
      <div id="paymentList"></div>
    </section>

    <!-- 精算 -->
    <section class="card">
      <button onclick="calculate()" class="btn-primary btn-full">精算する</button>
      <div id="result"></div>
    </section>

    <!-- リセット -->
    <div class="reset-area">
      <button onclick="resetAll()" class="btn-danger">全データをリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
