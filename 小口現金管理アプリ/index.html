<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小口現金管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>小口現金管理</h1>

    <div class="summary">
      <div class="summary-box balance">
        <div class="label">現在残高</div>
        <div class="amount" id="balance">¥0</div>
      </div>
      <div class="summary-box income">
        <div class="label">合計入金</div>
        <div class="amount" id="total-income">¥0</div>
      </div>
      <div class="summary-box expense">
        <div class="label">合計支出</div>
        <div class="amount" id="total-expense">¥0</div>
      </div>
    </div>

    <div class="form-section">
      <h2>入出金を記録</h2>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="description">内容</label>
        <input type="text" id="description" placeholder="例：文房具購入">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：1500" min="0">
      </div>
      <div class="form-group">
        <label>種別</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="type" value="income"> 入金
          </label>
          <label class="radio-label">
            <input type="radio" name="type" value="expense" checked> 出金
          </label>
        </div>
      </div>
      <button class="btn-add" id="add-btn">記録する</button>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>履歴</h2>
        <button class="btn-clear" id="clear-btn">全件削除</button>
      </div>
      <div id="history-list">
        <div class="empty-msg">まだ記録がありません</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
