<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電力プラン比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>電力プラン比較アプリ</h1>

    <section class="card">
      <h2>プランを登録</h2>
      <div class="form-group">
        <label for="planName">プラン名</label>
        <input type="text" id="planName" placeholder="例：東電スタンダードS">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="basicFee">基本料金（円/月）</label>
          <input type="number" id="basicFee" placeholder="例：858" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="unitPrice">単価（円/kWh）</label>
          <input type="number" id="unitPrice" placeholder="例：30.57" min="0" step="0.01">
        </div>
      </div>
      <button id="addPlanBtn" class="btn-primary">プランを追加</button>
    </section>

    <section class="card" id="plansSection">
      <h2>登録済みプラン</h2>
      <div id="plansList">
        <p class="empty-msg">まだプランが登録されていません</p>
      </div>
    </section>

    <section class="card">
      <h2>使用量を入力して比較</h2>
      <div class="form-group usage-row">
        <label for="usage">月間使用量（kWh）</label>
        <div class="usage-input-row">
          <input type="number" id="usage" placeholder="例：350" min="0" step="1">
          <button id="calcBtn" class="btn-primary">比較する</button>
        </div>
      </div>
    </section>

    <section class="card" id="resultsSection" style="display:none;">
      <h2>比較結果</h2>
      <div id="resultsTable"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
