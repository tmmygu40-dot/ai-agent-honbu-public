<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出店立地診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ラジオ・スライダー ── */
    .radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.35rem; }
    .radio-group label {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.88rem; font-weight: 400; color: var(--text);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.45rem 0.8rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0;
    }
    .radio-group input[type=radio] { display: none; }
    .radio-group input[type=radio]:checked + span {
      font-weight: 700; color: var(--accent);
    }
    .radio-group label:has(input[type=radio]:checked) {
      border-color: var(--accent); background: var(--accent-light);
    }
    .slider-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.35rem; }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 6px;
      background: var(--border); border-radius: 3px; outline: none;
      border: none; padding: 0;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
      box-shadow: 0 2px 6px rgba(224,123,0,0.35);
    }
    .slider-val {
      min-width: 2.5rem; text-align: right;
      font-size: 0.95rem; font-weight: 700; color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.25rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.4rem; margin-bottom: 0.5rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.6; }

    /* ── スコアバー ── */
    .score-bar-wrap { margin: 0.8rem 0 0.5rem; }
    .score-bar-bg { height: 14px; background: var(--border); border-radius: 7px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 7px; transition: width 0.5s ease; }
    .score-bar-fill.ok   { background: var(--ok); }
    .score-bar-fill.warn { background: var(--warn); }
    .score-bar-fill.ng   { background: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .badge-ok   { color: var(--ok);   font-weight: 700; }
    .badge-warn { color: var(--warn); font-weight: 700; }
    .badge-ng   { color: var(--ng);   font-weight: 700; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>出店立地診断アプリ</h1>
    <p class="subtitle">立地条件と業種から出店の成功確率と売上目安を即診断</p>
  </header>

  <!-- 業種選択 -->
  <div class="card">
    <p class="card-title">業種を選ぶ</p>
    <div class="field">
      <label for="gyoshu">業種</label>
      <select id="gyoshu">
        <option value="">選択してください</option>
        <option value="inshoku_fast">飲食（ファスト・テイクアウト）</option>
        <option value="inshoku_sit">飲食（座席あり・居酒屋等）</option>
        <option value="retail_food">小売（食品・コンビニ系）</option>
        <option value="retail_goods">小売（雑貨・衣類等）</option>
        <option value="service_beauty">サービス（美容・ネイル等）</option>
        <option value="service_fitness">サービス（フィットネス・習い事）</option>
        <option value="medical">医療・調剤薬局・接骨院</option>
        <option value="office">オフィス・士業・コンサル</option>
      </select>
    </div>
  </div>

  <!-- 立地条件入力 -->
  <div class="card">
    <p class="card-title">立地条件を入力</p>

    <div class="field">
      <label>人通りの多さ</label>
      <div class="radio-group" id="hitodori">
        <label><input type="radio" name="hitodori" value="3"><span>多い</span></label>
        <label><input type="radio" name="hitodori" value="2"><span>普通</span></label>
        <label><input type="radio" name="hitodori" value="1"><span>少ない</span></label>
      </div>
    </div>

    <div class="field">
      <label>最寄り駅からの距離</label>
      <div class="radio-group" id="ekidist">
        <label><input type="radio" name="ekidist" value="3"><span>徒歩5分以内</span></label>
        <label><input type="radio" name="ekidist" value="2"><span>徒歩10分以内</span></label>
        <label><input type="radio" name="ekidist" value="1"><span>徒歩15分超</span></label>
      </div>
    </div>

    <div class="field">
      <label>駐車場</label>
      <div class="radio-group" id="parking">
        <label><input type="radio" name="parking" value="3"><span>専用あり（5台超）</span></label>
        <label><input type="radio" name="parking" value="2"><span>少数あり（〜4台）</span></label>
        <label><input type="radio" name="parking" value="1"><span>なし</span></label>
      </div>
    </div>

    <div class="field">
      <label>周辺の競合店数</label>
      <div class="radio-group" id="rival">
        <label><input type="radio" name="rival" value="3"><span>0〜1店</span></label>
        <label><input type="radio" name="rival" value="2"><span>2〜3店</span></label>
        <label><input type="radio" name="rival" value="1"><span>4店以上</span></label>
      </div>
    </div>

    <div class="field">
      <label>視認性（道路からの見えやすさ）</label>
      <div class="radio-group" id="visibility">
        <label><input type="radio" name="visibility" value="3"><span>良い（交差点・幹線沿い）</span></label>
        <label><input type="radio" name="visibility" value="2"><span>普通</span></label>
        <label><input type="radio" name="visibility" value="1"><span>悪い（路地・地下等）</span></label>
      </div>
    </div>

    <div class="field">
      <label>月額家賃の目安</label>
      <div class="slider-row">
        <input type="range" id="yachin" min="5" max="100" step="5" value="20" oninput="updateYachin(this.value)">
        <span class="slider-val" id="yachin-val">20万円</span>
      </div>
      <p class="hint">坪数×坪単価の合計を概算で入力してください</p>
    </div>

    <div class="field">
      <label>物件の築年数</label>
      <div class="radio-group" id="chikunen">
        <label><input type="radio" name="chikunen" value="3"><span>10年未満</span></label>
        <label><input type="radio" name="chikunen" value="2"><span>10〜20年</span></label>
        <label><input type="radio" name="chikunen" value="1"><span>20年超</span></label>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">出店立地を診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">成功確率スコア</p>
    <p class="result-value" id="rv">—</p>
    <div class="score-bar-wrap">
      <div class="score-bar-bg"><div class="score-bar-fill" id="score-bar" style="width:0%"></div></div>
    </div>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断内訳 &amp; 売上目安</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">改善アドバイス</p>
    <ul id="advice-list" style="font-size:0.88rem;line-height:1.8;padding-left:1.2rem;color:var(--text-sub);"></ul>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script src="../fav-widget.js"></script>
  <script>
  // ── 業種ごとの基礎売上目安テーブル（万円/月）と重み付け ──
  var GYOSHU_DATA = {
    inshoku_fast:   { name: '飲食（ファスト・テイクアウト）', base: [40,80,150], hitodori: 4, ekidist: 3, parking: 1, rival: 3, visibility: 4, chikunen: 1 },
    inshoku_sit:    { name: '飲食（座席あり・居酒屋等）',     base: [50,100,200], hitodori: 3, ekidist: 4, parking: 2, rival: 3, visibility: 3, chikunen: 1 },
    retail_food:    { name: '小売（食品・コンビニ系）',        base: [60,120,250], hitodori: 5, ekidist: 3, parking: 2, rival: 4, visibility: 3, chikunen: 1 },
    retail_goods:   { name: '小売（雑貨・衣類等）',           base: [30,70,150],  hitodori: 5, ekidist: 3, parking: 2, rival: 3, visibility: 4, chikunen: 1 },
    service_beauty: { name: 'サービス（美容・ネイル等）',      base: [40,80,150],  hitodori: 3, ekidist: 3, parking: 2, rival: 3, visibility: 2, chikunen: 2 },
    service_fitness:{ name: 'サービス（フィットネス・習い事）',base: [30,80,160],  hitodori: 2, ekidist: 3, parking: 3, rival: 2, visibility: 2, chikunen: 2 },
    medical:        { name: '医療・調剤薬局・接骨院',         base: [50,120,250], hitodori: 2, ekidist: 2, parking: 4, rival: 4, visibility: 2, chikunen: 2 },
    office:         { name: 'オフィス・士業・コンサル',        base: [20,50,100],  hitodori: 1, ekidist: 3, parking: 2, rival: 1, visibility: 1, chikunen: 2 },
  };

  function updateYachin(v) {
    document.getElementById('yachin-val').textContent = v + '万円';
  }

  function getRadio(name) {
    var el = document.querySelector('input[name="' + name + '"]:checked');
    return el ? parseInt(el.value) : null;
  }

  function diagnose() {
    var gyoshuKey = document.getElementById('gyoshu').value;
    var hitodori  = getRadio('hitodori');
    var ekidist   = getRadio('ekidist');
    var parking   = getRadio('parking');
    var rival     = getRadio('rival');
    var visibility= getRadio('visibility');
    var chikunen  = getRadio('chikunen');
    var yachin    = parseInt(document.getElementById('yachin').value);

    if (!gyoshuKey) { alert('業種を選択してください'); return; }
    if (hitodori===null || ekidist===null || parking===null ||
        rival===null || visibility===null || chikunen===null) {
      alert('すべての立地条件を選択してください'); return;
    }

    var gd = GYOSHU_DATA[gyoshuKey];

    // スコア計算（各項目を業種別重みで加点、100点満点）
    var totalWeight = gd.hitodori + gd.ekidist + gd.parking + gd.rival + gd.visibility + gd.chikunen;
    var rawScore =
      hitodori   * gd.hitodori +
      ekidist    * gd.ekidist +
      parking    * gd.parking +
      rival      * gd.rival +
      visibility * gd.visibility +
      chikunen   * gd.chikunen;
    var maxScore = 3 * totalWeight;
    var score = Math.round(rawScore / maxScore * 100);

    // 売上目安（スコア帯で振り分け）
    var salesRange;
    if (score >= 70) {
      salesRange = gd.base[2] + '万円/月';
    } else if (score >= 40) {
      salesRange = gd.base[1] + '万円/月';
    } else {
      salesRange = gd.base[0] + '万円/月';
    }

    // 損益ラフ試算（家賃比率で判定）
    var salesVal = score >= 70 ? gd.base[2] : score >= 40 ? gd.base[1] : gd.base[0];
    var yachinRatio = salesVal > 0 ? (yachin / salesVal * 100).toFixed(1) : 999;

    // 判定
    var level, eval_text, note;
    if (score >= 70) {
      level = 'ok';
      eval_text = '出店有望エリアです';
      note = 'この立地は業種との相性が高く、集客・売上が見込めます。\n賃料比率: ' + yachinRatio + '%（理想は10〜15%以下）';
    } else if (score >= 40) {
      level = 'warn';
      eval_text = '出店は可能ですが要改善';
      note = '平均的な立地です。弱点を補う差別化戦略が必要です。\n賃料比率: ' + yachinRatio + '%（理想は10〜15%以下）';
    } else {
      level = 'ng';
      eval_text = '出店リスクが高いです';
      note = 'この立地は業種との相性が低く、収益確保が難しい可能性があります。\n賃料比率: ' + yachinRatio + '%（理想は10〜15%以下）';
    }

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + '点';
    document.getElementById('re').textContent = eval_text;
    document.getElementById('rn').textContent = note;
    var bar = document.getElementById('score-bar');
    bar.style.width = score + '%';
    bar.className = 'score-bar-fill ' + level;

    // 内訳テーブル
    var rows = [
      ['業種', gd.name],
      ['人通り',     badge(hitodori,   ['少ない', '普通', '多い'])],
      ['駅距離',     badge(ekidist,    ['遠い', '普通', '近い'])],
      ['駐車場',     badge(parking,    ['なし', '少数', '専用あり'])],
      ['競合',       badge(rival,      ['多い', '普通', '少ない'])],
      ['視認性',     badge(visibility, ['悪い', '普通', '良い'])],
      ['築年数',     badge(chikunen,   ['古い', '普通', '新しい'])],
      ['月額家賃',   yachin + '万円'],
      ['成功確率',   score + '点 / 100点', true],
      ['売上目安',   salesRange, true],
      ['賃料比率',   yachinRatio + '%（目安10〜15%）'],
    ];
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    // アドバイス
    var advices = [];
    if (hitodori < 3)    advices.push('人通りが少ないエリアです。SNS・外看板・デリバリー活用で集客を補強しましょう。');
    if (ekidist < 2)     advices.push('駅から遠い立地です。駐車場の充実や地域密着型の告知が効果的です。');
    if (parking < 2)     advices.push('駐車場が不足しています。近隣コインパーキングとの提携を検討してください。');
    if (rival > 2)       advices.push('競合が多いエリアです。価格・品質・ターゲット層の差別化が不可欠です。');
    if (visibility < 2)  advices.push('視認性が低いです。看板・のぼり・Web地図登録で認知度を上げましょう。');
    if (parseFloat(yachinRatio) > 20) advices.push('賃料比率が高すぎます（' + yachinRatio + '%）。物件交渉か見直しを検討してください。');
    if (advices.length === 0) advices.push('立地条件は良好です。開業後の運営力・マーケティングで差をつけましょう。');

    var al = document.getElementById('advice-list');
    al.innerHTML = advices.map(function(a){ return '<li>' + a + '</li>'; }).join('');
    document.getElementById('advice-card').style.display = '';

    // localStorage保存
    save({ gyoshuKey, hitodori, ekidist, parking, rival, visibility, chikunen, yachin });

    // スクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function badge(val, labels) {
    var cls = val === 3 ? 'badge-ok' : val === 2 ? 'badge-warn' : 'badge-ng';
    return '<span class="' + cls + '">' + labels[val - 1] + '</span>';
  }

  function save(data) {
    try { localStorage.setItem('shutten_richi_v1', JSON.stringify(data)); } catch(e) {}
  }

  function load() {
    try {
      var s = localStorage.getItem('shutten_richi_v1');
      if (!s) return;
      var d = JSON.parse(s);
      if (d.gyoshuKey) document.getElementById('gyoshu').value = d.gyoshuKey;
      if (d.hitodori)  setRadio('hitodori',   d.hitodori);
      if (d.ekidist)   setRadio('ekidist',    d.ekidist);
      if (d.parking)   setRadio('parking',    d.parking);
      if (d.rival)     setRadio('rival',      d.rival);
      if (d.visibility)setRadio('visibility', d.visibility);
      if (d.chikunen)  setRadio('chikunen',   d.chikunen);
      if (d.yachin) {
        document.getElementById('yachin').value = d.yachin;
        updateYachin(d.yachin);
      }
    } catch(e) {}
  }

  function setRadio(name, val) {
    var el = document.querySelector('input[name="' + name + '"][value="' + val + '"]');
    if (el) el.checked = true;
  }

  load();
  </script>
</body>
</html>
