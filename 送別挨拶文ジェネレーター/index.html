<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送別挨拶文ジェネレーター｜転職・退職メールを3スタイルで即生成</title>
  <meta name="description" content="名前・最終出社日・退職理由・宛先を選ぶだけで、フォーマル／カジュアル／感謝重視の3スタイルの送別挨拶メール文を即生成。社内・上司・取引先別に文面を作り、ワンタップでコピーできる無料ジェネレーターです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 出力カード */
    .out-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .out-card .style-tag {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.6rem; letter-spacing: 0.04em;
    }
    .out-card.formal .style-tag { background: #1f4d8a; }
    .out-card.casual .style-tag { background: #2a8a6c; }
    .out-card.thanks .style-tag { background: #b86b00; }
    .out-body {
      white-space: pre-wrap;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 0.9rem;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.7rem; font-size: 0.9rem; font-weight: 700;
      color: var(--accent); background: var(--accent-light);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .out-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>送別挨拶文ジェネレーター</h1>
    <p class="subtitle">転職・退職時のメール文を、宛先別に3スタイルで即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="f-name">あなたの名前</label>
      <input type="text" id="f-name" placeholder="例: 山田 太郎">
    </div>
    <div class="field">
      <label for="f-date">最終出社日</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label for="f-reason">退職理由</label>
      <select id="f-reason">
        <option value="positive">前向きな転職・新たな挑戦</option>
        <option value="personal">一身上の都合</option>
        <option value="family">結婚・出産・家庭の事情</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="f-target">宛先タイプ</label>
      <select id="f-target">
        <option value="colleague">社内同僚</option>
        <option value="boss">上司</option>
        <option value="client">取引先</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3スタイル生成する</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 退職・転職時の挨拶メールは、相手や関係性により表現を調整するのが一般的です。本ツールは一般的なビジネスマナー資料や公開されているテンプレ事例を参考に文面を組み立てています。実際の送付前に内容をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'sobetsu_aisatsu_v1';

  // 復元
  window.addEventListener('DOMContentLoaded', function() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (saved.name)   document.getElementById('f-name').value = saved.name;
      if (saved.date)   document.getElementById('f-date').value = saved.date;
      if (saved.reason) document.getElementById('f-reason').value = saved.reason;
      if (saved.target) document.getElementById('f-target').value = saved.target;
    } catch(e) {}
  });

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }

  function reasonPhrase(r, style) {
    // 各スタイルでの理由フレーズ
    if (style === 'formal') {
      return ({
        positive: '新たな分野に挑戦すべく、',
        personal: '一身上の都合により、',
        family:   '家庭の事情により、',
        other:    '諸般の事情により、'
      })[r] || '';
    }
    if (style === 'casual') {
      return ({
        positive: '次のステップに進むことになり、',
        personal: '個人的な事情で、',
        family:   '家庭の都合があり、',
        other:    'いろいろと考えるところがあり、'
      })[r] || '';
    }
    // thanks
    return ({
      positive: '新しい挑戦に踏み出すこととなり、',
      personal: '一身上の事情ではございますが、',
      family:   '家庭の事情により恐縮ですが、',
      other:    '諸般の事情により、'
    })[r] || '';
  }

  function buildFormal(name, dateStr, reason, target) {
    var head, body, close;
    var reasonPh = reasonPhrase(reason, 'formal');
    if (target === 'colleague') {
      head = 'お疲れ様です。' + name + 'です。\n\n';
      body = '私事で恐縮ですが、' + reasonPh + (dateStr ? dateStr + 'をもちまして' : 'このたび') + '退職することとなりました。\n\n'
           + '在職中は何かと至らない点もあったかと存じますが、皆様にあたたかく支えていただいたこと、心より感謝しております。\n\n'
           + '本来であれば直接ご挨拶すべきところ、メールでのご連絡となりましたことをお詫びいたします。';
      close = '\n\n短い間ではありましたが、本当にありがとうございました。\n皆様のますますのご活躍をお祈り申し上げます。';
    } else if (target === 'boss') {
      head = 'お疲れ様です。' + name + 'です。\n\n';
      body = 'このたび、' + reasonPh + (dateStr ? dateStr + 'をもちまして' : '') + '退職させていただくこととなりました。\n\n'
           + '在職中は格別のご指導・ご厚情を賜り、誠にありがとうございました。お力添えいただいたことは、今後の私の財産として大切にしてまいります。';
      close = '\n\n末筆ながら、ますますのご健勝とご活躍を心よりお祈り申し上げます。\n\n' + name;
    } else {
      head = 'いつも大変お世話になっております。\n株式会社○○の' + name + 'でございます。\n\n';
      body = '私事で恐縮ですが、' + reasonPh + (dateStr ? dateStr + 'をもちまして' : 'このたび') + '退職することとなりましたので、ご挨拶申し上げます。\n\n'
           + '在職中は格別のお引き立てを賜り、誠にありがとうございました。\n後任は△△が務めさせていただきます。改めて担当よりご挨拶させていただきますので、引き続きよろしくお願い申し上げます。';
      close = '\n\n末筆ながら、貴社のますますのご発展と皆様のご健勝を心よりお祈り申し上げます。';
    }
    return head + body + close + (target === 'boss' ? '' : (target === 'client' ? '\n\n' + name : '\n\n' + name));
  }

  function buildCasual(name, dateStr, reason, target) {
    var head, body, close;
    var reasonPh = reasonPhrase(reason, 'casual');
    if (target === 'colleague') {
      head = 'お疲れさまです、' + name + 'です。\n\n';
      body = '突然のご連絡で恐縮ですが、' + reasonPh + (dateStr ? dateStr : 'このたび') + 'で退職することになりました。\n\n'
           + '一緒に働けて本当に楽しかったです。困った時にいつも助けてくれて、ランチや雑談で笑わせてくれて、感謝しかありません。\n\n'
           + '直接お礼を伝えられない方も多く申し訳ないですが、ぜひまたどこかでお会いできたら嬉しいです。';
      close = '\n\n本当にありがとうございました！\n\n' + name;
    } else if (target === 'boss') {
      head = 'お疲れさまです、' + name + 'です。\n\n';
      body = 'いつもお世話になっております。' + reasonPh + (dateStr ? dateStr : 'このたび') + '退職することになりました。\n\n'
           + '入社してから今日まで、たくさんご指導いただき本当にありがとうございました。失敗した時もフォローしてくださり、おかげで前に進むことができました。\n\n'
           + '次の場所でも、教えていただいたことを大切にして頑張ります。';
      close = '\n\n短い間でしたが、本当にお世話になりました。\n\n' + name;
    } else {
      head = 'お世話になっております、' + name + 'です。\n\n';
      body = '個人的なご報告で恐縮ですが、' + reasonPh + (dateStr ? dateStr : 'このたび') + '退職することになりました。\n\n'
           + 'ご一緒させていただいたお仕事はどれも勉強になることばかりで、貴社の皆さまには本当にお世話になりました。\n\n'
           + '後任は△△が引き継ぎますので、引き続きよろしくお願いいたします。';
      close = '\n\nまたご縁がありましたら、その時はぜひよろしくお願いします。\n\n' + name;
    }
    return head + body + close;
  }

  function buildThanks(name, dateStr, reason, target) {
    var head, body, close;
    var reasonPh = reasonPhrase(reason, 'thanks');
    if (target === 'colleague') {
      head = 'お疲れ様です。' + name + 'です。\n\n';
      body = 'このたび' + reasonPh + (dateStr ? dateStr + 'をもちまして' : '') + '退職することとなりました。\n\n'
           + 'まずはじめに、これまで本当にありがとうございました。\n仕事のいろはを教えていただいたこと、つまずいた時に声をかけていただいたこと、雑談で気持ちを軽くしてもらったこと——どれも私にとって大切な時間でした。\n\n'
           + '一人ひとりに直接お礼を伝えられないのが心残りですが、皆さまと過ごした日々は今後の支えになります。';
      close = '\n\n本当にありがとうございました。\n皆さまのますますのご活躍を、心から願っています。\n\n' + name;
    } else if (target === 'boss') {
      head = '○○部長\n\nお疲れ様です。' + name + 'です。\n\n';
      body = 'このたび、' + reasonPh + (dateStr ? dateStr + 'をもちまして' : '') + '退職させていただくこととなりました。\n\n'
           + 'まずは、長きにわたり本当にお世話になりましたこと、心よりお礼申し上げます。\n至らない部分も多かった私を、根気強くご指導くださり、時に叱り、時に背中を押していただいたことを、今でもひとつひとつ覚えております。\n\n'
           + 'いただいた言葉と機会を糧に、新しい場所でも誠実に努めてまいります。';
      close = '\n\n末筆ながら、○○部長のますますのご健勝とご発展を、心よりお祈り申し上げます。\n本当にありがとうございました。\n\n' + name;
    } else {
      head = 'いつも大変お世話になっております。\n株式会社○○の' + name + 'でございます。\n\n';
      body = '私事で恐縮ですが、' + reasonPh + (dateStr ? dateStr + 'をもちまして' : '') + '退職することとなりました。\n\n'
           + 'これまで貴社の皆さまには、たくさんのお力添えを頂戴してまいりました。\n至らぬ点も多々あったかと存じますが、温かくお付き合いくださったこと、心より感謝申し上げます。\n\n'
           + '後任は△△が引き継ぎますので、引き続き変わらぬご厚誼を賜れますと幸いです。';
      close = '\n\n末筆ながら、貴社のますますのご発展と、皆さまのご健勝を心よりお祈り申し上げます。\n本当にありがとうございました。\n\n' + name;
    }
    return head + body + close;
  }

  function generate() {
    var name   = document.getElementById('f-name').value.trim() || 'お名前';
    var date   = document.getElementById('f-date').value;
    var reason = document.getElementById('f-reason').value;
    var target = document.getElementById('f-target').value;
    var dateStr = fmtDate(date);

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        name: document.getElementById('f-name').value,
        date: date, reason: reason, target: target
      }));
    } catch(e) {}

    var formalText = buildFormal(name, dateStr, reason, target);
    var casualText = buildCasual(name, dateStr, reason, target);
    var thanksText = buildThanks(name, dateStr, reason, target);

    var html = ''
      + cardHtml('formal', 'フォーマル', formalText)
      + cardHtml('casual', 'カジュアル', casualText)
      + cardHtml('thanks', '感謝重視',   thanksText);
    document.getElementById('results').innerHTML = html;

    // スクロール
    document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function cardHtml(cls, label, text) {
    return ''
      + '<div class="out-card ' + cls + '">'
      +   '<span class="style-tag">' + label + '</span>'
      +   '<div class="out-body">' + escapeHtml(text) + '</div>'
      +   '<button class="btn-copy" data-text="' + escapeHtml(text) + '" onclick="onCopyClick(event)">コピー</button>'
      + '</div>';
  }

  function onCopyClick(e) {
    var btn = e.currentTarget;
    var text = btn.getAttribute('data-text');
    // HTMLエンティティ→生テキストへ戻す（escapeHtml で入れたため）
    var ta = document.createElement('textarea');
    ta.innerHTML = text;
    var raw = ta.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(raw).then(function(){ markCopied(btn); }, function(){ fallback(raw, btn); });
    } else {
      fallback(raw, btn);
    }
  }
  function fallback(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-1000px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); markCopied(btn); }
    catch(e) {}
    document.body.removeChild(ta);
  }
  function markCopied(btn) {
    btn.classList.add('copied');
    var orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(function(){
      btn.classList.remove('copied');
      btn.textContent = orig;
    }, 1600);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
