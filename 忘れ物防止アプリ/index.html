<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘れ物防止アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 忘れ物防止</h1>
      <p class="subtitle">学校プリントの期限・持参物を管理</p>
    </header>

    <section class="form-section">
      <h2>プリントを登録</h2>
      <div class="form-group">
        <label for="title">プリント名 <span class="required">*</span></label>
        <input type="text" id="title" placeholder="例：遠足のお知らせ" maxlength="50">
      </div>
      <div class="form-group">
        <label for="deadline">提出期限 <span class="required">*</span></label>
        <input type="date" id="deadline">
      </div>
      <div class="form-group">
        <label for="items">持参物・提出物</label>
        <input type="text" id="items" placeholder="例：同意書・集金袋500円" maxlength="100">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録一覧</h2>
        <div class="filter-tabs">
          <button class="tab active" data-filter="all">すべて</button>
          <button class="tab" data-filter="urgent">要確認</button>
          <button class="tab" data-filter="active">未完了</button>
          <button class="tab" data-filter="done">完了済み</button>
        </div>
      </div>
      <ul id="printList" class="print-list"></ul>
      <p id="emptyMsg" class="empty-msg">登録されたプリントはありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
