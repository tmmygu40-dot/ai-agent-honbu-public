<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品値上がり家計コストシミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-top: 0.5rem; margin-bottom: 0.6rem; }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng);   }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--ng); font-size: 1.05rem; }

    /* ── カテゴリ見出し ── */
    .cat-label {
      font-size: 0.76rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin: 0.9rem 0 0.5rem;
      padding-bottom: 0.3rem; border-bottom: 1px solid var(--border);
    }

    /* ── 品目行 ── */
    .item-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0; border-bottom: 1px solid #f0e8dc;
    }
    .item-row:last-child { border-bottom: none; }
    .item-check {
      width: 20px; height: 20px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 0.92rem; font-weight: 600; }
    .item-sub  { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.1rem; }
    .item-cost {
      font-size: 0.9rem; font-weight: 700; color: var(--ng);
      white-space: nowrap; min-width: 64px; text-align: right;
    }
    .item-qty {
      width: 52px; padding: 0.3rem 0.4rem;
      font-size: 0.85rem; border: 1.5px solid var(--border);
      border-radius: 7px; background: var(--bg); color: var(--text);
      text-align: center; outline: none;
    }
    .item-qty:focus { border-color: var(--accent); background: #fff; }
    .qty-unit { font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }

    /* ── 全選択・全解除 ── */
    .sel-buttons {
      display: flex; gap: 0.5rem; margin-bottom: 0.8rem;
    }
    .sel-btn {
      flex: 1; padding: 0.45rem 0;
      font-size: 0.8rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text-sub); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .sel-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 合計バー ── */
    .total-bar {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.8rem 1.2rem;
      background: var(--accent-light); border-radius: var(--radius);
      max-width: 600px; margin: 0 auto 1rem;
      border: 1.5px solid var(--accent);
    }
    .total-label { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
    .total-value { font-size: 1.6rem; font-weight: 900; color: var(--ng); }
    .total-year  { font-size: 0.8rem; color: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>🛒 食品値上がり家計コストシミュレーター</h1>
    <p class="subtitle">値上がりした食品を選ぶだけで月々の家計コスト増加額を自動試算</p>
  </header>

  <!-- 品目カード -->
  <div class="card">
    <p class="card-title">値上がり食品チェックリスト</p>
    <p style="font-size:0.76rem;color:var(--text-sub);margin-bottom:0.8rem;">チェックを入れた品目の月間コスト増加額を合計します。数量は1ヶ月あたりの購入量に合わせて変更できます。</p>
    <div class="sel-buttons">
      <button class="sel-btn no-print" onclick="selectAll()">全選択</button>
      <button class="sel-btn no-print" onclick="clearAll()">全解除</button>
    </div>
    <div id="item-list"></div>
  </div>

  <!-- 合計バー -->
  <div class="total-bar" id="total-bar" style="display:none">
    <div>
      <div class="total-label">月間コスト増加額</div>
      <div class="total-year" id="total-year">年間 0 円増</div>
    </div>
    <div class="total-value" id="total-monthly">0 円</div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail-card" style="display:none">
    <p class="card-title">選択品目の内訳</p>
    <table class="detail-table"><tbody id="detail-body"></tbody></table>
  </div>

  <p style="max-width:600px;margin:0 auto 1rem;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 値上がり率・月平均購入量は総務省消費者物価指数・農林水産省・各種報道資料をもとにした目安です。実際の家庭によって異なります。
  </p>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── 品目データ ──
  // { id, cat, name, sub, unitPrice(円), rateUp(%), defaultQty(月), unit }
  // 月間コスト増加額 = unitPrice * (rateUp/100) * qty
  var FOODS = [
    // 主食・パン
    { id:'bread',   cat:'主食・パン・麺類', name:'食パン',         sub:'1斤あたり',  unitPrice:250, rateUp:20, defaultQty:4,  unit:'斤' },
    { id:'rice',    cat:'主食・パン・麺類', name:'お米（5kg）',     sub:'5kgあたり',  unitPrice:2200,rateUp:25, defaultQty:2,  unit:'袋' },
    { id:'pasta',   cat:'主食・パン・麺類', name:'パスタ（500g）',  sub:'500gあたり', unitPrice:220, rateUp:20, defaultQty:3,  unit:'袋' },
    { id:'ramen',   cat:'主食・パン・麺類', name:'袋麺（5食入）',   sub:'5食パックあたり', unitPrice:400, rateUp:20, defaultQty:2,  unit:'袋' },

    // 乳製品・卵
    { id:'milk',    cat:'乳製品・卵', name:'牛乳（1L）',      sub:'1本あたり',  unitPrice:220, rateUp:15, defaultQty:8,  unit:'本' },
    { id:'egg',     cat:'乳製品・卵', name:'卵（10個入）',    sub:'1パックあたり',unitPrice:300, rateUp:35, defaultQty:4,  unit:'パック' },
    { id:'butter',  cat:'乳製品・卵', name:'バター（200g）',  sub:'1個あたり',  unitPrice:580, rateUp:25, defaultQty:1,  unit:'個' },
    { id:'cheese',  cat:'乳製品・卵', name:'プロセスチーズ',  sub:'1個あたり',  unitPrice:400, rateUp:20, defaultQty:2,  unit:'個' },
    { id:'yogurt',  cat:'乳製品・卵', name:'ヨーグルト（400g）', sub:'1個あたり', unitPrice:180, rateUp:15, defaultQty:4,  unit:'個' },

    // 肉類
    { id:'chicken', cat:'肉類', name:'鶏もも肉（300g）',  sub:'1パックあたり', unitPrice:500, rateUp:15, defaultQty:4,  unit:'パック' },
    { id:'pork',    cat:'肉類', name:'豚こま（300g）',    sub:'1パックあたり', unitPrice:550, rateUp:20, defaultQty:4,  unit:'パック' },
    { id:'beef',    cat:'肉類', name:'牛こま（200g）',    sub:'1パックあたり', unitPrice:750, rateUp:20, defaultQty:2,  unit:'パック' },
    { id:'sausage', cat:'肉類', name:'ウインナー（200g）', sub:'1袋あたり',   unitPrice:280, rateUp:15, defaultQty:3,  unit:'袋' },

    // 調味料・油
    { id:'oil',     cat:'調味料・油', name:'サラダ油（1L）',    sub:'1本あたり',  unitPrice:500, rateUp:40, defaultQty:1,  unit:'本' },
    { id:'mayo',    cat:'調味料・油', name:'マヨネーズ（450g）', sub:'1本あたり', unitPrice:340, rateUp:20, defaultQty:1,  unit:'本' },
    { id:'soy',     cat:'調味料・油', name:'醤油（1L）',        sub:'1本あたり',  unitPrice:320, rateUp:15, defaultQty:1,  unit:'本' },
    { id:'miso',    cat:'調味料・油', name:'味噌（750g）',      sub:'1個あたり',  unitPrice:420, rateUp:15, defaultQty:1,  unit:'個' },

    // 加工食品
    { id:'frozen',  cat:'加工食品', name:'冷凍食品（1袋）',       sub:'1袋あたり',  unitPrice:350, rateUp:20, defaultQty:5,  unit:'袋' },
    { id:'tofu',    cat:'加工食品', name:'豆腐（1丁）',           sub:'1丁あたり',  unitPrice:100, rateUp:20, defaultQty:8,  unit:'丁' },
    { id:'natto',   cat:'加工食品', name:'納豆（3パック）',        sub:'1セットあたり', unitPrice:150, rateUp:15, defaultQty:8,  unit:'セット' },
    { id:'snack',   cat:'加工食品', name:'菓子・スナック（1袋）',  sub:'1袋あたり',  unitPrice:200, rateUp:20, defaultQty:6,  unit:'袋' },

    // 飲料
    { id:'coffee',  cat:'飲料', name:'コーヒー豆・粉（200g）', sub:'1袋あたり', unitPrice:700, rateUp:30, defaultQty:2,  unit:'袋' },
    { id:'tea',     cat:'飲料', name:'緑茶・麦茶（1L×6）',   sub:'1箱あたり', unitPrice:600, rateUp:15, defaultQty:2,  unit:'箱' },
    { id:'juice',   cat:'飲料', name:'果汁ジュース（1L）',    sub:'1本あたり', unitPrice:280, rateUp:20, defaultQty:3,  unit:'本' },
  ];

  // ── 初期化 ──
  var state = {};  // id -> { checked: bool, qty: number }

  function loadState() {
    try {
      var s = localStorage.getItem('food_cost_sim_v1');
      if (s) state = JSON.parse(s);
    } catch(e) {}
    FOODS.forEach(function(f) {
      if (!state[f.id]) state[f.id] = { checked: false, qty: f.defaultQty };
    });
  }

  function saveState() {
    try { localStorage.setItem('food_cost_sim_v1', JSON.stringify(state)); } catch(e) {}
  }

  function renderList() {
    var cats = [];
    var catMap = {};
    FOODS.forEach(function(f) {
      if (!catMap[f.cat]) { cats.push(f.cat); catMap[f.cat] = []; }
      catMap[f.cat].push(f);
    });

    var html = '';
    cats.forEach(function(cat) {
      html += '<div class="cat-label">' + cat + '</div>';
      catMap[cat].forEach(function(f) {
        var s = state[f.id];
        var inc = Math.round(f.unitPrice * (f.rateUp / 100));
        html += '<div class="item-row">'
          + '<input type="checkbox" class="item-check" id="chk_' + f.id + '"'
          + (s.checked ? ' checked' : '') + ' onchange="onCheck(this, \'' + f.id + '\')">'
          + '<div class="item-info">'
          + '<div class="item-name">' + f.name + '</div>'
          + '<div class="item-sub">' + f.sub + ' +' + f.rateUp + '%（+' + fmt(inc) + '円/個）</div>'
          + '</div>'
          + '<input type="number" class="item-qty" id="qty_' + f.id + '" value="' + s.qty + '" min="0" max="99"'
          + ' onchange="onQty(this, \'' + f.id + '\')" oninput="onQty(this, \'' + f.id + '\')">'
          + '<span class="qty-unit">' + f.unit + '/月</span>'
          + '<div class="item-cost" id="cost_' + f.id + '">' + (s.checked ? '+' + fmt(Math.round(inc * s.qty)) + '円' : '—') + '</div>'
          + '</div>';
      });
    });
    document.getElementById('item-list').innerHTML = html;
  }

  function onCheck(el, id) {
    state[id].checked = el.checked;
    saveState();
    updateItemCost(id);
    updateTotal();
  }

  function onQty(el, id) {
    var v = parseInt(el.value, 10);
    if (isNaN(v) || v < 0) v = 0;
    state[id].qty = v;
    saveState();
    updateItemCost(id);
    updateTotal();
  }

  function updateItemCost(id) {
    var f = FOODS.filter(function(x){ return x.id === id; })[0];
    var s = state[id];
    var inc = Math.round(f.unitPrice * (f.rateUp / 100));
    var el = document.getElementById('cost_' + id);
    if (el) {
      el.textContent = s.checked ? '+' + fmt(Math.round(inc * s.qty)) + '円' : '—';
    }
  }

  function updateTotal() {
    var total = 0;
    var rows = [];
    FOODS.forEach(function(f) {
      var s = state[f.id];
      if (!s.checked) return;
      var inc = Math.round(f.unitPrice * (f.rateUp / 100) * s.qty);
      total += inc;
      rows.push([f.name + '（' + s.qty + f.unit + '）', '+' + fmt(inc) + ' 円']);
    });

    if (total === 0) {
      document.getElementById('total-bar').style.display = 'none';
      document.getElementById('detail-card').style.display = 'none';
      return;
    }

    document.getElementById('total-bar').style.display = 'flex';
    document.getElementById('total-monthly').textContent = fmt(total) + ' 円';
    document.getElementById('total-year').textContent = '年間 ' + fmt(total * 12) + ' 円増';

    rows.push(null); // separator for total
    var tbody = '';
    rows.forEach(function(r) {
      if (r === null) {
        tbody += '<tr class="hl"><td>月間合計増加額</td><td>+' + fmt(total) + ' 円</td></tr>';
      } else {
        tbody += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
      }
    });
    document.getElementById('detail-body').innerHTML = tbody;
    document.getElementById('detail-card').style.display = 'block';
  }

  function selectAll() {
    FOODS.forEach(function(f) { state[f.id].checked = true; });
    saveState();
    FOODS.forEach(function(f) {
      var el = document.getElementById('chk_' + f.id);
      if (el) el.checked = true;
      updateItemCost(f.id);
    });
    updateTotal();
  }

  function clearAll() {
    FOODS.forEach(function(f) { state[f.id].checked = false; });
    saveState();
    FOODS.forEach(function(f) {
      var el = document.getElementById('chk_' + f.id);
      if (el) el.checked = false;
      updateItemCost(f.id);
    });
    updateTotal();
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 起動
  loadState();
  renderList();
  updateTotal();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
