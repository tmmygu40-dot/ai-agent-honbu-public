<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="値上げにイラッときたらカテゴリを選んでボタンを押すだけ。笑える言い訳フレーズに変換してストレスをスッキリ解消できるジェネレーターです。">
  <title>値上げイライラ言い訳ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.3; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── フレーズ表示 ── */
    .phrase-box {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
      display: none;
    }
    .phrase-emoji { font-size: 2.4rem; margin-bottom: 0.5rem; }
    .phrase-text { font-size: 1.1rem; font-weight: 700; line-height: 1.6; color: var(--text); margin-bottom: 0.8rem; }
    .phrase-category { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 1rem; }

    .btn-copy {
      display: inline-block; padding: 0.5rem 1.5rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      margin-right: 0.5rem;
    }
    .btn-fav {
      display: inline-block; padding: 0.5rem 1.5rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px; cursor: pointer;
    }
    .btn-copy:active, .btn-fav:active { transform: scale(0.96); }

    /* ── お気に入りリスト ── */
    .fav-list { list-style: none; }
    .fav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-item-text { flex: 1; font-size: 0.88rem; line-height: 1.5; }
    .fav-item-cat { font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }
    .fav-item-del {
      background: none; border: none; color: var(--ng);
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .phrase-box { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>😤 値上げイライラ言い訳ジェネレーター</h1>
    <p class="subtitle">値上げにイラッときたら、笑える言い訳に変換してスッキリしちゃいましょう。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">イライラの種類を選ぶ</p>
    <div class="field">
      <label for="category">何が値上がりした？</label>
      <select id="category">
        <option value="food">食品・食材</option>
        <option value="energy">電気・ガス・光熱費</option>
        <option value="daily">日用品・消耗品</option>
        <option value="transport">交通費・ガソリン</option>
        <option value="eating">外食・カフェ</option>
        <option value="service">サブスク・サービス</option>
        <option value="other">その他・全般</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">言い訳を生成する！</button>

  <!-- フレーズ表示 -->
  <div class="phrase-box" id="phraseBox">
    <p class="phrase-emoji" id="phraseEmoji"></p>
    <p class="phrase-text" id="phraseText"></p>
    <p class="phrase-category" id="phraseCat"></p>
    <button class="btn-copy" onclick="copyPhrase()">コピー</button>
    <button class="btn-fav" onclick="saveFav()">お気に入り</button>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="favCard" style="display:none">
    <p class="card-title">お気に入りフレーズ</p>
    <ul class="fav-list" id="favList"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    😤 このツールはフィクションです。値上げのイライラを笑いに変えるエンタメ用途です。実際の値上げ情報は総務省・経産省・各メーカー公式をご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var PHRASES = {
    food: [
      { e:'🥚', t:'卵が高い？ それは"プレミアムたまご体験"への招待状です。' },
      { e:'🍞', t:'パンが値上げ？ 小麦が世界一周旅行してきたんだから仕方ない。' },
      { e:'🥩', t:'肉が高い！ でも考えてみて、牛さんも飼料代値上げで困ってるんだよ。' },
      { e:'🧈', t:'バターが高騰？ もはやバターは"食べる金塊"と呼ぶべき。' },
      { e:'🐟', t:'魚が高い！ 海の中でも物価上がってるらしいよ（魚談）。' },
      { e:'🍚', t:'お米が値上げ？ 一粒一粒が"プレミアム粒"になったと思えばお得。' },
      { e:'🥬', t:'野菜が高い！ 天候不順のせいだから、怒るなら空に向かって。' },
      { e:'🍫', t:'チョコが値上げ？ カカオ農家の笑顔を買ってると思えば…まぁ高いわ。' },
      { e:'🧀', t:'チーズが高騰！ もはやチーズは宝石。冷蔵庫が金庫になった。' },
      { e:'🍜', t:'カップ麺が値上げ？ "庶民の味方"が"プチ贅沢"に進化しただけ。' }
    ],
    energy: [
      { e:'⚡', t:'電気代が高い？ 節電はエコ活動。君は地球を救ってるんだ。' },
      { e:'🔥', t:'ガス代高騰！ 鍋を囲むのはエコ。家族の絆も温まる。' },
      { e:'💡', t:'電気代が爆上がり？ ろうそくの灯りでロマンチックな夜を過ごそう。' },
      { e:'🧊', t:'光熱費がヤバい！ 冬は着る毛布、夏は打ち水。江戸時代は最先端。' },
      { e:'🌡️', t:'エアコン代が心配？ 汗をかくのは最高のデトックスだから。' },
      { e:'💸', t:'請求書見て目が飛び出た？ それは"驚きの表情筋トレーニング"です。' },
      { e:'🕯️', t:'電気代節約で早寝早起き。値上げのおかげで健康になれる説。' },
      { e:'🏠', t:'光熱費が家賃並み？ いっそ光熱費に住んでると思えば安い。' }
    ],
    daily: [
      { e:'🧻', t:'トイレットペーパーが高い？ 一枚一枚丁寧に使う"和の心"を学ぼう。' },
      { e:'🧴', t:'洗剤が値上げ？ 少量で泡立つスキルが身につくチャンス。' },
      { e:'🪥', t:'歯ブラシが高い！ でも歯は一生もの。投資と思えば激安。' },
      { e:'🧹', t:'掃除用品が値上げ？ ミニマリストになるいい機会かも。' },
      { e:'📦', t:'日用品全般高い！ まとめ買いスキルが上がる修行だと思おう。' },
      { e:'🧤', t:'ゴム手袋まで値上げ？ 素手で洗い物すれば手の保湿ケアになる…わけない。' },
      { e:'🛁', t:'入浴剤が高い！ お湯だけでも十分あったまる。昭和スタイル最強。' },
      { e:'💊', t:'サプリが値上げ？ 早寝早起きで自然治癒力を鍛えよう（言い訳）。' }
    ],
    transport: [
      { e:'⛽', t:'ガソリンが高い！ 歩けば健康になるし、地球にも優しい。一石二鳥。' },
      { e:'🚃', t:'電車賃が上がった？ 歩く距離が増えて万歩計が喜んでる。' },
      { e:'🚗', t:'車の維持費がヤバい！ でも"動く書斎"と考えれば安い…かな？' },
      { e:'🚌', t:'バス代も値上げ？ 自転車通勤で太もも引き締め。値上げに感謝。' },
      { e:'✈️', t:'航空券が高騰！ 妄想旅行ならタダ。想像力は値上げされない。' },
      { e:'🛵', t:'ガソリン代で心が折れそう？ 風を感じるために払う"体験料"だよ。' },
      { e:'🚲', t:'交通費節約で自転車生活。値上げが健康をプレゼントしてくれた。' },
      { e:'🏃', t:'交通費が高い？ 走れば交通費ゼロ。マラソン大会の練習にもなる。' }
    ],
    eating: [
      { e:'🍔', t:'ハンバーガーが高い！ もはやハンバーガーは"プチフレンチ"。' },
      { e:'☕', t:'カフェのコーヒーが値上げ？ 家で淹れれば"自家焙煎カフェごっこ"。' },
      { e:'🍕', t:'ピザが高騰！ "円盤型の芸術作品"と思えば美術館より安い。' },
      { e:'🍱', t:'お弁当が値上げ？ 自炊スキルを上げるチャンス到来。' },
      { e:'🍣', t:'回転寿司が高い！ もう"回転"じゃなくて"回天"寿司だわ。' },
      { e:'🍰', t:'ケーキが高い？ 一口ずつ味わえば幸福度3倍。コスパ最強食べ方。' },
      { e:'🍜', t:'ラーメンが1000円超え？ もはやラーメンは"日本のフレンチ"。' },
      { e:'🥤', t:'ドリンクが値上げ？ 水道水は最強の節約ドリンク。味？…慣れるよ。' }
    ],
    service: [
      { e:'📺', t:'サブスク値上げ？ 解約するほど時間が増える。時は金なり。' },
      { e:'📱', t:'スマホ代が上がった？ たまにはデジタルデトックスしよう（強制）。' },
      { e:'🎮', t:'ゲーム課金が高い！ 無課金で勝てたら本当の勝者。' },
      { e:'💇', t:'美容院が値上げ？ セルフカットで"個性派スタイル"を手に入れよう。' },
      { e:'🏋️', t:'ジム会費が上がった？ 公園で筋トレすれば景色つき。' },
      { e:'📰', t:'新聞が値上げ？ 情報は無料で転がってる時代…でも紙の質感はプライスレス。' },
      { e:'🎬', t:'映画が高い！ "暗い部屋で大画面"体験に2000円。遊園地より安い。' },
      { e:'☁️', t:'クラウド料金値上げ？ USBメモリの時代が戻ってくるかも。' }
    ],
    other: [
      { e:'💰', t:'何もかも高い！ でも"高い"と感じるのは金銭感覚が正常な証拠。' },
      { e:'📈', t:'物価上昇？ 自分の価値も一緒に上がってると思えばOK。' },
      { e:'🤷', t:'値上げラッシュ？ 怒るエネルギーも値上がりしてるから省エネでいこう。' },
      { e:'🧘', t:'イライラしたら深呼吸。空気はまだ無料です（今のところ）。' },
      { e:'🌍', t:'世界的な値上げだから仕方ない。グローバルな視点で見れば…やっぱ高い。' },
      { e:'🎭', t:'値上げは人生の"サプライズイベント"。嫌なサプライズだけど。' },
      { e:'📊', t:'値上げ分だけ節約力が鍛えられてる。レベルアップ中です。' },
      { e:'🎪', t:'値上げに振り回されるのも人生の醍醐味…って思わないとやってられない。' }
    ]
  };

  var CAT_NAMES = {
    food:'食品・食材', energy:'電気・ガス・光熱費', daily:'日用品・消耗品',
    transport:'交通費・ガソリン', eating:'外食・カフェ', service:'サブスク・サービス', other:'その他・全般'
  };

  var currentPhrase = null;
  var LS_KEY = 'neage_iiwake_favs';

  function generate() {
    var cat = document.getElementById('category').value;
    var list = PHRASES[cat];
    var idx = Math.floor(Math.random() * list.length);
    currentPhrase = { e: list[idx].e, t: list[idx].t, cat: cat };

    document.getElementById('phraseEmoji').textContent = currentPhrase.e;
    document.getElementById('phraseText').textContent = currentPhrase.t;
    document.getElementById('phraseCat').textContent = '📁 ' + CAT_NAMES[cat];
    document.getElementById('phraseBox').style.display = 'block';
  }

  function copyPhrase() {
    if (!currentPhrase) return;
    var text = currentPhrase.e + ' ' + currentPhrase.t;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showCopyMsg('コピーしました！');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyMsg('コピーしました！');
    }
  }

  function showCopyMsg(msg) {
    var btn = document.querySelector('.btn-copy');
    var orig = btn.textContent;
    btn.textContent = msg;
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }

  function saveFav() {
    if (!currentPhrase) return;
    var favs = loadFavs();
    var dup = favs.some(function(f) { return f.t === currentPhrase.t; });
    if (dup) {
      var btn = document.querySelector('.btn-fav');
      btn.textContent = '登録済み';
      setTimeout(function() { btn.textContent = 'お気に入り'; }, 1500);
      return;
    }
    favs.push({ e: currentPhrase.e, t: currentPhrase.t, cat: currentPhrase.cat });
    saveFavs(favs);
    renderFavs();
    var btn2 = document.querySelector('.btn-fav');
    btn2.textContent = '保存しました！';
    setTimeout(function() { btn2.textContent = 'お気に入り'; }, 1500);
  }

  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(LS_KEY, JSON.stringify(favs));
  }

  function renderFavs() {
    var favs = loadFavs();
    var card = document.getElementById('favCard');
    var list = document.getElementById('favList');
    if (favs.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(f, i) {
      return '<li class="fav-item">'
        + '<span class="fav-item-text">' + f.e + ' ' + escHtml(f.t) + '</span>'
        + '<span class="fav-item-cat">' + CAT_NAMES[f.cat] + '</span>'
        + '<button class="fav-item-del" onclick="delFav(' + i + ')">削除</button>'
        + '</li>';
    }).join('');
  }

  function delFav(idx) {
    var favs = loadFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 起動時にお気に入り表示
  renderFavs();
