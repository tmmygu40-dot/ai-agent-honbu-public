<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貸し借り管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>貸し借り管理</h1>

    <section class="add-form">
      <h2>新しい貸し出しを記録</h2>
      <div class="form-group">
        <label for="item-name">品物名</label>
        <input type="text" id="item-name" placeholder="例：ワンピース 1巻" maxlength="50">
      </div>
      <div class="form-group">
        <label for="person-name">貸した相手</label>
        <input type="text" id="person-name" placeholder="例：田中さん" maxlength="30">
      </div>
      <div class="form-group">
        <label for="lend-date">貸した日付</label>
        <input type="date" id="lend-date">
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>貸し出し中 <span id="active-count" class="badge">0</span></h2>
        <label class="show-returned">
          <input type="checkbox" id="show-returned"> 返却済みも表示
        </label>
      </div>
      <ul id="lend-list" class="lend-list"></ul>
      <p id="empty-msg" class="empty-msg">貸し出し中の記録はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
