<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カフェイン摂取管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>☕ カフェイン摂取管理</h1>
    <p class="date-label" id="dateLabel"></p>

    <section class="add-section">
      <h2>飲み物を追加</h2>
      <div class="form-row">
        <select id="drinkSelect">
          <option value="coffee">コーヒー（90mg）</option>
          <option value="green_tea">緑茶（30mg）</option>
          <option value="black_tea">紅茶（50mg）</option>
          <option value="energy_drink">エナジードリンク（80mg）</option>
          <option value="cola">コーラ（35mg）</option>
          <option value="custom">カスタム...</option>
        </select>
        <input type="number" id="cupsInput" min="1" max="20" value="1" placeholder="杯数">
        <button id="addBtn">追加</button>
      </div>
      <div id="customRow" class="custom-row hidden">
        <input type="text" id="customName" placeholder="飲み物名">
        <input type="number" id="customMg" min="1" max="1000" placeholder="1杯のmg">
      </div>
      <p id="addError" class="error-msg" aria-live="polite"></p>
    </section>

    <section class="summary-section">
      <div class="total-box">
        <span class="total-label">今日の合計カフェイン</span>
        <span class="total-value" id="totalMg">0 mg</span>
      </div>
      <div class="limit-bar-wrap">
        <div class="limit-bar">
          <div class="limit-fill" id="limitFill"></div>
        </div>
        <span class="limit-text" id="limitText">上限400mgまで残り400mg</span>
      </div>
    </section>

    <section class="log-section">
      <h2>摂取ログ</h2>
      <ul id="logList"></ul>
      <button id="clearBtn" class="clear-btn">今日のログをリセット</button>
    </section>
  </div>

  <script>
  const DRINKS = {
    coffee:        { name: 'コーヒー',         mg: 90 },
    green_tea:     { name: '緑茶',             mg: 30 },
    black_tea:     { name: '紅茶',             mg: 50 },
    energy_drink:  { name: 'エナジードリンク', mg: 80 },
    cola:          { name: 'コーラ',           mg: 35 },
  };

  const LIMIT_MG = 400;
  const STORAGE_KEY = 'caffeine_log';
  const DATE_KEY    = 'caffeine_date';

  let log = [];

  function todayStr() {
    return new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  }

  function loadLog() {
    const savedDate = localStorage.getItem(DATE_KEY);
    const today = todayStr();
    if (savedDate === today) {
      try { log = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { log = []; }
    } else {
      log = [];
      localStorage.setItem(DATE_KEY, today);
      saveLog();
    }
  }

  function saveLog() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
  }

  function render() {
    const totalMg = log.reduce((s, item) => s + item.mg * item.cups, 0);

    const totalEl = document.getElementById('totalMg');
    totalEl.textContent = totalMg + ' mg';
    totalEl.classList.toggle('over', totalMg > LIMIT_MG);

    const pct = Math.min((totalMg / LIMIT_MG) * 100, 100);
    const fill = document.getElementById('limitFill');
    fill.style.width = pct + '%';
    fill.classList.toggle('over', totalMg > LIMIT_MG);

    const limitText = document.getElementById('limitText');
    if (totalMg >= LIMIT_MG) {
      limitText.textContent = '上限400mgを ' + (totalMg - LIMIT_MG) + 'mg 超過しています';
      limitText.style.color = '#e53935';
    } else {
      limitText.textContent = '上限400mgまで残り ' + (LIMIT_MG - totalMg) + 'mg';
      limitText.style.color = '#888';
    }

    const list = document.getElementById('logList');
    if (log.length === 0) {
      list.innerHTML = '<li><span class="empty-msg">まだ記録がありません</span></li>';
      return;
    }
    list.innerHTML = log.map((item, i) =>
      '<li>' +
        '<div class="log-info">' +
          '<span class="log-name">' + item.name + '</span>' +
          '<span class="log-detail">' + item.cups + '杯 × ' + item.mg + 'mg</span>' +
        '</div>' +
        '<span class="log-mg">' + (item.mg * item.cups) + ' mg</span>' +
        '<button class="delete-btn" data-index="' + i + '" title="削除">✕</button>' +
      '</li>'
    ).join('');

    list.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        log.splice(Number(btn.dataset.index), 1);
        saveLog();
        render();
      });
    });
  }

  var drinkSelect = document.getElementById('drinkSelect');
  var customRow   = document.getElementById('customRow');

  drinkSelect.addEventListener('change', function() {
    customRow.classList.toggle('hidden', drinkSelect.value !== 'custom');
  });

  document.getElementById('addBtn').addEventListener('click', function() {
    var cups = parseInt(document.getElementById('cupsInput').value, 10);
    if (!cups || cups < 1) return;

    var name, mg;
    if (drinkSelect.value === 'custom') {
      name = document.getElementById('customName').value.trim() || 'カスタム';
      mg   = parseInt(document.getElementById('customMg').value, 10);
      if (!mg || mg < 1) {
        document.getElementById('addError').textContent = '1杯のカフェイン量（mg）を入力してください';
        return;
      }
      document.getElementById('addError').textContent = '';
    } else {
      var d = DRINKS[drinkSelect.value];
      name = d.name;
      mg   = d.mg;
    }

    log.push({ name: name, mg: mg, cups: cups });
    saveLog();
    render();

    document.getElementById('cupsInput').value = 1;
    if (drinkSelect.value === 'custom') {
      document.getElementById('customName').value = '';
      document.getElementById('customMg').value = '';
    }
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    if (!confirm('今日のログをすべてリセットしますか？')) return;
    log = [];
    saveLog();
    render();
  });

  document.getElementById('dateLabel').textContent = todayStr() + ' の摂取記録';
  loadLog();
  render();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
