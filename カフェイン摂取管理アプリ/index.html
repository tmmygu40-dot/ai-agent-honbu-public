<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カフェイン摂取管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>☕ カフェイン摂取管理</h1>
    <p class="date-label" id="dateLabel"></p>

    <section class="add-section">
      <h2>飲み物を追加</h2>
      <div class="form-row">
        <select id="drinkSelect">
          <option value="coffee">コーヒー（90mg）</option>
          <option value="green_tea">緑茶（30mg）</option>
          <option value="black_tea">紅茶（50mg）</option>
          <option value="energy_drink">エナジードリンク（80mg）</option>
          <option value="cola">コーラ（35mg）</option>
          <option value="custom">カスタム...</option>
        </select>
        <input type="number" id="cupsInput" min="1" max="20" value="1" placeholder="杯数">
        <button id="addBtn">追加</button>
      </div>
      <div id="customRow" class="custom-row hidden">
        <input type="text" id="customName" placeholder="飲み物名">
        <input type="number" id="customMg" min="1" max="1000" placeholder="1杯のmg">
      </div>
    </section>

    <section class="summary-section">
      <div class="total-box">
        <span class="total-label">今日の合計カフェイン</span>
        <span class="total-value" id="totalMg">0 mg</span>
      </div>
      <div class="limit-bar-wrap">
        <div class="limit-bar">
          <div class="limit-fill" id="limitFill"></div>
        </div>
        <span class="limit-text" id="limitText">上限400mgまで残り400mg</span>
      </div>
    </section>

    <section class="log-section">
      <h2>摂取ログ</h2>
      <ul id="logList"></ul>
      <button id="clearBtn" class="clear-btn">今日のログをリセット</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
