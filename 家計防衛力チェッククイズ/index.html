<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="暮らしの値上げや節約のトリビアを3択クイズで楽しく学べる無料アプリ。10問で家計防衛力レベルを判定。物価高時代の知識力チェックにどうぞ。">
  <title>家計防衛力チェッククイズ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress-bar {
      width: 100%; height: 8px; background: var(--bg);
      border-radius: 4px; overflow: hidden; margin-bottom: 1rem;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s ease;
    }
    .progress-label {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.5rem;
      display: flex; justify-content: space-between;
    }

    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      color: var(--text); margin-bottom: 1.2rem;
    }
    .choice-btn {
      display: block; width: 100%;
      padding: 0.9rem 1rem; margin-bottom: 0.7rem;
      font-size: 0.98rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: not-allowed; opacity: 0.85; }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice-btn.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }

    .explanation {
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-left: 3px solid var(--accent);
      border-radius: 6px; font-size: 0.88rem; line-height: 1.55;
      color: var(--text);
    }
    .explanation strong { color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.55; margin-top: 0.4rem; }
    .result-eval {
      font-size: 1.1rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .best-score {
      font-size: 0.85rem; color: var(--text-sub);
      margin-top: 0.8rem; padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>家計防衛力チェッククイズ</h1>
    <p class="subtitle">暮らしの値上げ・節約トリビアを3択クイズで学ぼう。全10問・2026年4月時点の参考データ。最新情報は公式情報をご確認ください。</p>
  </header>

  <!-- 出題カード -->
  <div class="card" id="quiz-card">
    <div class="progress-label">
      <span id="progress-text">第1問 / 10問</span>
      <span id="score-text">スコア：0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    <p class="question-text" id="question-text">問題文</p>
    <div id="choices"></div>
    <div class="explanation" id="explanation" style="display:none"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="next-btn" onclick="nextQuestion()" style="display:none">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">家計防衛力ランク</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best-score"></p>
  </div>

  <button class="btn-calc" id="retry-btn" onclick="retry()" style="display:none">もう一度プレイ</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、総務省・経済産業省・消費者庁・公正取引委員会などの公開資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。最新の制度・価格は公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '2024〜2026年にかけて値上げが続いた主な原因として、最も影響が大きいとされるのは？',
      choices: ['原油・原材料価格の高騰と円安', '人口減少による需要減', '消費税の引き上げ'],
      answer: 0,
      exp: '<strong>正解：原油・原材料価格の高騰と円安。</strong>輸入比率の高い食品・エネルギーで影響が大きく、企業のコスト上昇分が小売価格に転嫁されています。'
    },
    {
      q: '一般的に「家計防衛」で最初に見直すと効果が出やすい固定費は？',
      choices: ['毎日の食費', '通信費・保険料・サブスク', '電気の細かなON/OFF'],
      answer: 1,
      exp: '<strong>正解：通信費・保険料・サブスク。</strong>毎月自動で引き落とされる固定費は、一度見直すと効果が継続。変動費の節約より少ない労力で家計改善につながります。'
    },
    {
      q: '電気代を下げる工夫として、エアコンの設定で最も実効性が高いとされるのは？',
      choices: ['こまめなON/OFF', '設定温度を1℃調整＋フィルター掃除', '常に最弱運転'],
      answer: 1,
      exp: '<strong>正解：設定温度を1℃調整＋フィルター掃除。</strong>こまめなON/OFFは起動時の消費電力で逆に高くつくことも。経産省も「設定温度の調整・フィルター清掃」を推奨しています。'
    },
    {
      q: 'ふるさと納税の自己負担額は実質いくら？',
      choices: ['0円', '2,000円', '寄付額の1割'],
      answer: 1,
      exp: '<strong>正解：2,000円。</strong>上限内であれば寄付額から2,000円を引いた金額が翌年の住民税・所得税から控除され、返礼品が実質2,000円で受け取れる仕組みです。'
    },
    {
      q: 'クレジットカードのリボ払いで注意すべき点は？',
      choices: ['ポイント還元率が下がる', '実質年率15%前後の金利が継続的にかかる', '利用上限が下がる'],
      answer: 1,
      exp: '<strong>正解：実質年率15%前後の金利が継続的にかかる。</strong>毎月の支払額は一定でも、残高に対して高金利が乗り続けるため、家計を圧迫する代表格です。'
    },
    {
      q: 'スーパーで「特売の日」に大量買いするより、家計防衛上おすすめなのは？',
      choices: ['必要量だけを定期的に買う', 'まとめ買いでストック', 'ポイント10倍の日にまとめ買い'],
      answer: 0,
      exp: '<strong>正解：必要量だけを定期的に買う。</strong>大量買いはフードロスや使いきれない無駄を生みがち。「買う前に冷蔵庫を見る」だけで食費は数千円単位で減ります。'
    },
    {
      q: '保険料を見直すときの第一歩として正しいのは？',
      choices: ['営業に勧められたまま全部更新', '公的保障（健康保険・遺族年金）でカバーされる範囲を確認', 'とりあえず全部解約'],
      answer: 1,
      exp: '<strong>正解：公的保障でカバーされる範囲を確認。</strong>高額療養費制度・遺族年金などで実は十分なケースも多く、過剰な民間保険を整理するだけで月数千円の節約になります。'
    },
    {
      q: '物価高の時代、現金を全額そのまま預金しているとどうなる？',
      choices: ['価値が増える', '実質価値が目減りする', '何も変わらない'],
      answer: 1,
      exp: '<strong>正解：実質価値が目減りする。</strong>インフレ率が金利を上回ると、額面は同じでも買えるモノの量が減ります。NISA等で一部を運用に回すのも家計防衛策の一つ。'
    },
    {
      q: '値上げに強い家計を作る上で、もっとも大切な習慣は？',
      choices: ['毎月の収支を把握する', 'クーポンを集める', '家計簿を完璧につける'],
      answer: 0,
      exp: '<strong>正解：毎月の収支を把握する。</strong>完璧な家計簿は不要。「収入・固定費・変動費・残り」のざっくり4項目を月1で把握するだけで、防衛力は大きく上がります。'
    },
    {
      q: 'スマホの通信費を下げる代表的な方法は？',
      choices: ['大手キャリアの最上位プランを選ぶ', '格安SIM・大手の低容量プランへ乗り換え', 'WiFiを切ってデータ通信を増やす'],
      answer: 1,
      exp: '<strong>正解：格安SIM・大手の低容量プランへ乗り換え。</strong>通信費は固定費の中でも見直し効果が大きく、月3,000〜5,000円減らせるケースも。家族割の見直しも有効です。'
    }
  ];

  var STORAGE_KEY = 'kakei_quiz_best_v1';
  var currentIdx = 0;
  var score = 0;
  var answered = false;

  function startQuiz() {
    currentIdx = 0;
    score = 0;
    answered = false;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    var q = QUESTIONS[currentIdx];
    document.getElementById('progress-text').textContent = '第' + (currentIdx + 1) + '問 / ' + QUESTIONS.length + '問';
    document.getElementById('score-text').textContent = 'スコア：' + score;
    document.getElementById('progress-fill').style.width = ((currentIdx) / QUESTIONS.length * 100) + '%';
    document.getElementById('question-text').textContent = q.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    for (var i = 0; i < q.choices.length; i++) {
      (function(idx){
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = q.choices[idx];
        btn.onclick = function(){ selectAnswer(idx); };
        choicesEl.appendChild(btn);
      })(i);
    }
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[currentIdx];
    var btns = document.getElementById('choices').querySelectorAll('.choice-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (i === q.answer) btns[i].classList.add('correct');
      else if (i === idx) btns[i].classList.add('wrong');
    }
    if (idx === q.answer) score++;
    var exp = document.getElementById('explanation');
    exp.innerHTML = (idx === q.answer ? '⭕ 正解！　' : '❌ 不正解。　') + q.exp;
    exp.style.display = 'block';
    document.getElementById('score-text').textContent = 'スコア：' + score;
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('next-btn').textContent = (currentIdx + 1 >= QUESTIONS.length) ? '結果を見る' : '次の問題へ';
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    var rc = document.getElementById('result');
    var level, rank, note;
    if (score >= 9) {
      level = 'ok'; rank = '家計防衛マスター'; note = '完璧に近い知識量。家計の鉄壁ガード級です。';
    } else if (score >= 7) {
      level = 'ok'; rank = '家計防衛力 上級'; note = 'かなり詳しい！日常で実践すれば家計はかなり安定します。';
    } else if (score >= 5) {
      level = 'warn'; rank = '家計防衛力 中級'; note = '基本はOK。あと少し知識を補強すると効果倍増です。';
    } else if (score >= 3) {
      level = 'warn'; rank = '家計防衛力 初級'; note = '伸びしろたっぷり。固定費の見直しから始めましょう。';
    } else {
      level = 'ng'; rank = '家計防衛力 要注意'; note = 'まずは「収支の把握」と「通信費・保険の見直し」から始めると効果絶大です。';
    }
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + QUESTIONS.length + ' 点';
    document.getElementById('re').textContent = rank;
    document.getElementById('rn').textContent = note;

    // 最高スコア
    var best = 0;
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) best = parseInt(saved, 10) || 0;
    } catch(e) {}
    var bestText = '';
    if (score > best) {
      try { localStorage.setItem(STORAGE_KEY, String(score)); } catch(e) {}
      bestText = '🎉 最高スコア更新！（前回：' + best + '点 → 今回：' + score + '点）';
    } else {
      bestText = 'これまでの最高スコア：' + best + ' 点';
    }
    document.getElementById('best-score').textContent = bestText;

    document.getElementById('retry-btn').style.display = 'block';
    window.scrollTo({ top: rc.offsetTop - 20, behavior: 'smooth' });
  }

  function retry() {
    startQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  startQuiz();
  </script>
