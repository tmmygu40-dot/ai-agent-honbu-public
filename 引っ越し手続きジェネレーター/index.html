<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引っ越し手続きジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* リスト表示 */
    .list-section { display: none; }
    .progress-bar-wrap {
      max-width: 600px; margin: 0 auto 1rem;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
    }
    .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .progress-info .prog-label { font-size: 0.82rem; font-weight: 700; color: var(--text-sub); }
    .progress-info .prog-count { font-size: 1rem; font-weight: 900; color: var(--accent); }
    .progress-bar-bg {
      height: 10px; background: var(--bg);
      border-radius: 99px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 99px; transition: width 0.3s;
      width: 0%;
    }

    .category-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .category-title {
      font-size: 0.82rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.8rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .cat-badge {
      font-size: 0.7rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      padding: 0.1rem 0.5rem; border-radius: 99px;
    }

    .check-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .check-item:last-child { border-bottom: none; padding-bottom: 0; }
    .check-item input[type="checkbox"] {
      width: 20px; height: 20px; min-width: 20px;
      accent-color: var(--ok);
      cursor: pointer; margin-top: 0.1rem;
    }
    .check-item .item-text {
      font-size: 0.9rem; line-height: 1.45; color: var(--text);
      flex: 1;
    }
    .check-item .item-sub {
      font-size: 0.75rem; color: var(--text-sub); margin-top: 0.2rem;
    }
    .check-item.done .item-text {
      text-decoration: line-through; color: var(--text-sub);
    }

    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
    }
    .btn-reset:hover { background: #ede9e0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>引っ越し手続きジェネレーター</h1>
    <p class="subtitle">条件を選ぶだけで届出・手続きリストを即生成</p>
  </header>

  <!-- 条件入力カード -->
  <div class="card">
    <p class="card-title">引っ越し条件を入力</p>
    <div class="field">
      <label for="family">家族構成</label>
      <select id="family">
        <option value="single">一人暮らし</option>
        <option value="couple">夫婦（子どもなし）</option>
        <option value="kids">家族（子どもあり）</option>
        <option value="elder">高齢者同居</option>
      </select>
    </div>
    <div class="field">
      <label for="move-type">引っ越しの種類</label>
      <select id="move-type">
        <option value="same-city">同じ市区町村内</option>
        <option value="diff-city">別の市区町村（同じ都道府県）</option>
        <option value="diff-pref">別の都道府県</option>
      </select>
    </div>
    <div class="field">
      <label for="house-type">住居タイプ</label>
      <select id="house-type">
        <option value="rental">賃貸</option>
        <option value="owned">持ち家（売却・転居）</option>
      </select>
    </div>
    <div class="field">
      <label for="car">車・バイクの有無</label>
      <select id="car">
        <option value="none">なし</option>
        <option value="car">車あり</option>
        <option value="bike">バイクあり</option>
        <option value="both">車・バイク両方あり</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">手続きリストを生成する</button>

  <!-- 生成後のリスト表示エリア -->
  <div class="list-section" id="list-section">

    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span class="prog-label">完了した手続き</span>
        <span class="prog-count"><span id="done-count">0</span> / <span id="total-count">0</span> 件</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill"></div>
      </div>
    </div>

    <div id="list-container"></div>

    <button class="btn-reset" onclick="resetAll()">チェックをすべてリセット</button>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var STORAGE_KEY = 'hikkoshi-check-v1';
  var COND_KEY    = 'hikkoshi-cond-v1';

  // ── 手続きデータ ──
  // item: { id, text, sub, categories: [], conditions: fn(cond)=>bool }
  var ALL_ITEMS = [
    // 役所・行政
    { id:'r01', cat:'役所・行政', text:'転居届を出す（同市区町村内）', sub:'住民票の住所変更。引っ越し後14日以内', cond: function(c){ return c.moveType === 'same-city'; } },
    { id:'r02', cat:'役所・行政', text:'転出届を出す（旧住所の市区町村役所）', sub:'引っ越し前〜引っ越し日まで。転出証明書を受け取る', cond: function(c){ return c.moveType !== 'same-city'; } },
    { id:'r03', cat:'役所・行政', text:'転入届を出す（新住所の市区町村役所）', sub:'引っ越し後14日以内。転出証明書を持参', cond: function(c){ return c.moveType !== 'same-city'; } },
    { id:'r04', cat:'役所・行政', text:'マイナンバーカードの住所変更', sub:'転居・転入届と同時に手続き可能', cond: function(){ return true; } },
    { id:'r05', cat:'役所・行政', text:'印鑑登録の廃止・再登録', sub:'旧住所で廃止、新住所で再登録', cond: function(){ return true; } },
    { id:'r06', cat:'役所・行政', text:'国民健康保険の変更手続き', sub:'転入先の役所で加入手続き', cond: function(){ return true; } },
    { id:'r07', cat:'役所・行政', text:'国民年金の住所変更', sub:'日本年金機構またはマイナポータルで変更', cond: function(){ return true; } },
    { id:'r08', cat:'役所・行政', text:'介護保険の住所変更', sub:'65歳以上の方が対象', cond: function(c){ return c.family === 'elder'; } },
    { id:'r09', cat:'役所・行政', text:'児童手当の受給先変更', sub:'転入先の役所で手続き（14日以内）', cond: function(c){ return c.family === 'kids'; } },
    { id:'r10', cat:'役所・行政', text:'保育園・幼稚園の転園手続き', sub:'転入先の自治体に早めに相談', cond: function(c){ return c.family === 'kids'; } },
    { id:'r11', cat:'役所・行政', text:'小・中学校の転校手続き', sub:'旧住所の学校で在学証明書・転出証明書を受け取る', cond: function(c){ return c.family === 'kids'; } },

    // ライフライン
    { id:'l01', cat:'ライフライン', text:'電気の使用停止・開始申込み', sub:'旧住所の停止と新住所の開始を別々に連絡', cond: function(){ return true; } },
    { id:'l02', cat:'ライフライン', text:'ガスの使用停止・開始申込み', sub:'開始時は立会いが必要な場合あり', cond: function(){ return true; } },
    { id:'l03', cat:'ライフライン', text:'水道の使用停止・開始申込み', sub:'市区町村の水道局へ連絡', cond: function(){ return true; } },
    { id:'l04', cat:'ライフライン', text:'インターネット回線の移転手続き', sub:'工事が必要な場合は早めに申込む', cond: function(){ return true; } },
    { id:'l05', cat:'ライフライン', text:'NHK受信料の住所変更', sub:'NHKのサイトまたはコールセンターで', cond: function(){ return true; } },
    { id:'l06', cat:'ライフライン', text:'新聞・定期購読の住所変更・停止', sub:'配達店か公式サイトで連絡', cond: function(){ return true; } },

    // 郵便・通知
    { id:'p01', cat:'郵便・通知', text:'郵便局で転居届を出す（郵便転送）', sub:'旧住所宛の郵便を1年間新住所に転送', cond: function(){ return true; } },
    { id:'p02', cat:'郵便・通知', text:'勤務先・取引先への住所変更連絡', sub:'給与振込・会社書類送付先の変更を忘れずに', cond: function(){ return true; } },
    { id:'p03', cat:'郵便・通知', text:'家族・知人への引っ越し挨拶連絡', sub:'挨拶状・LINEなどで周知', cond: function(){ return true; } },

    // 金融機関
    { id:'f01', cat:'金融機関', text:'銀行・信用金庫の住所変更', sub:'各銀行のアプリ・窓口・ネットバンキングで', cond: function(){ return true; } },
    { id:'f02', cat:'金融機関', text:'クレジットカードの住所変更', sub:'カード会社のWebまたは電話で', cond: function(){ return true; } },
    { id:'f03', cat:'金融機関', text:'証券・投資口座の住所変更', sub:'証券会社のアプリ・サイトで変更', cond: function(){ return true; } },
    { id:'f04', cat:'金融機関', text:'ローン・住宅ローンの住所変更', sub:'金融機関窓口で変更手続き', cond: function(c){ return c.houseType === 'owned'; } },
    { id:'f05', cat:'金融機関', text:'生命保険・火災保険の住所変更', sub:'各保険会社に連絡。火災保険の物件変更も確認', cond: function(){ return true; } },

    // 車・バイク
    { id:'v01', cat:'車・バイク', text:'運転免許証の住所変更（警察署・運転免許センター）', sub:'引っ越し後に新住所で手続き', cond: function(c){ return c.car !== 'none'; } },
    { id:'v02', cat:'車・バイク', text:'自動車の住所変更（車検証の記載変更）', sub:'管轄の運輸支局で変更。都道府県をまたぐ場合はナンバー変更も', cond: function(c){ return c.car === 'car' || c.car === 'both'; } },
    { id:'v03', cat:'車・バイク', text:'バイクの住所変更（標識交付証明書の変更）', sub:'125cc超は運輸支局、125cc以下は市区町村役所', cond: function(c){ return c.car === 'bike' || c.car === 'both'; } },
    { id:'v04', cat:'車・バイク', text:'自動車保険・バイク保険の住所変更', sub:'保険会社または代理店に連絡', cond: function(c){ return c.car !== 'none'; } },
    { id:'v05', cat:'車・バイク', text:'駐車場の解約・新規契約', sub:'旧住所の駐車場解約と新住所近くの確保', cond: function(c){ return c.car === 'car' || c.car === 'both'; } },
    { id:'v06', cat:'車・バイク', text:'車庫証明の取得（新住所）', sub:'住所変更後に警察署で手続き', cond: function(c){ return c.car === 'car' || c.car === 'both'; } },

    // 賃貸特有
    { id:'rc01', cat:'賃貸手続き', text:'旧物件の退去手続き・立会い', sub:'退去日程を管理会社・オーナーと調整', cond: function(c){ return c.houseType === 'rental'; } },
    { id:'rc02', cat:'賃貸手続き', text:'敷金の精算・返金確認', sub:'退去後に管理会社から精算書を受け取る', cond: function(c){ return c.houseType === 'rental'; } },
    { id:'rc03', cat:'賃貸手続き', text:'新物件の入居手続き・鍵の受け取り', sub:'入居日・鍵渡し日を管理会社と確認', cond: function(c){ return c.houseType === 'rental'; } },
    { id:'rc04', cat:'賃貸手続き', text:'火災保険（借家人賠償）の加入', sub:'入居前に加入必要。管理会社指定か自分で選ぶ', cond: function(c){ return c.houseType === 'rental'; } },

    // 持ち家特有
    { id:'ow01', cat:'持ち家手続き', text:'不動産の売却・引渡し手続き', sub:'不動産会社・司法書士と連携', cond: function(c){ return c.houseType === 'owned'; } },
    { id:'ow02', cat:'持ち家手続き', text:'固定資産税の住所変更', sub:'市区町村の税務課へ変更通知', cond: function(c){ return c.houseType === 'owned'; } },
    { id:'ow03', cat:'持ち家手続き', text:'登記の住所変更（法務局）', sub:'引っ越し後に法務局で変更登記', cond: function(c){ return c.houseType === 'owned'; } },

    // 医療・その他
    { id:'m01', cat:'医療・その他', text:'かかりつけ医院への転院手続き', sub:'紹介状の作成を依頼しておくと新しい病院で役立つ', cond: function(){ return true; } },
    { id:'m02', cat:'医療・その他', text:'処方薬の受け取り・調剤薬局の変更', sub:'お薬手帳を新しい薬局に持参', cond: function(){ return true; } },
    { id:'m03', cat:'医療・その他', text:'携帯電話・スマホの住所変更', sub:'各キャリアのアプリ・Webで手続き', cond: function(){ return true; } },
    { id:'m04', cat:'医療・その他', text:'ネット通販・デリバリーサービスの住所変更', sub:'Amazon・楽天・Uberなど各アプリで変更', cond: function(){ return true; } },
    { id:'m05', cat:'医療・その他', text:'各種ポイントカード・会員登録の住所変更', sub:'よく使うサービスをリストアップして変更', cond: function(){ return true; } },
    { id:'m06', cat:'医療・その他', text:'マイホームの火災保険・地震保険の加入', sub:'持ち家の場合は引っ越し前に手配', cond: function(c){ return c.houseType === 'owned'; } },
    { id:'m07', cat:'医療・その他', text:'老人ホーム・介護施設への転所手続き', sub:'入居中の施設と調整', cond: function(c){ return c.family === 'elder'; } },
  ];

  var checkedState = {};
  var currentItems = [];

  function generate() {
    var cond = {
      family:   document.getElementById('family').value,
      moveType: document.getElementById('move-type').value,
      houseType:document.getElementById('house-type').value,
      car:      document.getElementById('car').value,
    };

    // 条件に合うアイテムを絞り込む
    currentItems = ALL_ITEMS.filter(function(item){ return item.cond(cond); });

    // 保存済みの条件・チェック状態を読む
    var saved = localStorage.getItem(STORAGE_KEY);
    checkedState = saved ? JSON.parse(saved) : {};

    renderList();

    document.getElementById('list-section').style.display = '';
    document.getElementById('list-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderList() {
    // カテゴリ別に分類
    var cats = {};
    currentItems.forEach(function(item) {
      if (!cats[item.cat]) cats[item.cat] = [];
      cats[item.cat].push(item);
    });

    var html = '';
    Object.keys(cats).forEach(function(catName) {
      var items = cats[catName];
      var done  = items.filter(function(it){ return checkedState[it.id]; }).length;
      html += '<div class="category-card">';
      html += '<div class="category-title">' + catName
            + '<span class="cat-badge">' + done + '/' + items.length + '</span>'
            + '</div>';
      items.forEach(function(item) {
        var checked = checkedState[item.id] ? true : false;
        html += '<label class="check-item' + (checked ? ' done' : '') + '" for="cb-' + item.id + '">';
        html += '<input type="checkbox" id="cb-' + item.id + '"'
              + (checked ? ' checked' : '')
              + ' onchange="toggle(\'' + item.id + '\')">';
        html += '<div class="item-text">' + item.text;
        if (item.sub) html += '<div class="item-sub">' + item.sub + '</div>';
        html += '</div></label>';
      });
      html += '</div>';
    });

    document.getElementById('list-container').innerHTML = html;
    updateProgress();
  }

  function toggle(id) {
    checkedState[id] = !checkedState[id];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
    // ラベルのクラスを更新
    var label = document.getElementById('cb-' + id).parentElement;
    if (checkedState[id]) {
      label.classList.add('done');
    } else {
      label.classList.remove('done');
    }
    updateProgress();
    // カテゴリバッジ更新
    renderCatBadges();
  }

  function renderCatBadges() {
    // カテゴリ別に分類してバッジだけ更新
    var cats = {};
    currentItems.forEach(function(item) {
      if (!cats[item.cat]) cats[item.cat] = [];
      cats[item.cat].push(item);
    });
    var catTitles = document.querySelectorAll('.category-title');
    var catKeys = Object.keys(cats);
    catTitles.forEach(function(el, i) {
      if (!catKeys[i]) return;
      var items = cats[catKeys[i]];
      var done  = items.filter(function(it){ return checkedState[it.id]; }).length;
      var badge = el.querySelector('.cat-badge');
      if (badge) badge.textContent = done + '/' + items.length;
    });
  }

  function updateProgress() {
    var total = currentItems.length;
    var done  = currentItems.filter(function(it){ return checkedState[it.id]; }).length;
    document.getElementById('done-count').textContent = done;
    document.getElementById('total-count').textContent = total;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
  }

  function resetAll() {
    if (!confirm('チェックをすべてリセットしますか？')) return;
    checkedState = {};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
    renderList();
  }

  // 初期ロード時：保存済み条件があれば復元
  (function() {
    var savedCond = localStorage.getItem(COND_KEY);
    if (savedCond) {
      try {
        var c = JSON.parse(savedCond);
        if (c.family)    document.getElementById('family').value     = c.family;
        if (c.moveType)  document.getElementById('move-type').value  = c.moveType;
        if (c.houseType) document.getElementById('house-type').value = c.houseType;
        if (c.car)       document.getElementById('car').value        = c.car;
      } catch(e) {}
    }
  })();

  // 条件変更時にlocalStorageへ保存
  ['family','move-type','house-type','car'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', function() {
      var cond = {
        family:   document.getElementById('family').value,
        moveType: document.getElementById('move-type').value,
        houseType:document.getElementById('house-type').value,
        car:      document.getElementById('car').value,
      };
      localStorage.setItem(COND_KEY, JSON.stringify(cond));
    });
  });
  </script>

</body>
</html>
