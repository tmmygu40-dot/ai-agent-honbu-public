<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1on1記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header>
    <h1>1on1記録アプリ</h1>
  </header>

  <main>

    <!-- 部下登録 -->
    <section class="card" id="member-section">
      <h2>部下を登録する</h2>
      <div class="input-row">
        <input type="text" id="member-input" placeholder="部下の名前" maxlength="30">
        <button id="add-member-btn">追加</button>
      </div>
      <ul id="member-list"></ul>
    </section>

    <!-- 面談記録 -->
    <section class="card" id="record-section">
      <h2>面談を記録する</h2>
      <div class="form-group">
        <label>部下を選ぶ</label>
        <select id="record-member-select">
          <option value="">-- 選んでください --</option>
        </select>
      </div>
      <div class="form-group">
        <label>面談日</label>
        <input type="date" id="record-date">
      </div>
      <div class="form-group">
        <label>面談内容</label>
        <textarea id="record-content" placeholder="話した内容・気になったこと" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>次回アクション</label>
        <textarea id="record-action" placeholder="次回までにやること・確認すること" rows="3"></textarea>
      </div>
      <button id="add-record-btn" class="btn-primary">記録する</button>
    </section>

    <!-- 履歴一覧 -->
    <section class="card" id="history-section">
      <h2>面談履歴</h2>
      <div class="filter-row">
        <label>絞り込み：</label>
        <select id="filter-member">
          <option value="">全員</option>
        </select>
      </div>
      <div id="history-list"></div>
    </section>

  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
