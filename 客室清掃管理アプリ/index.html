<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客室清掃管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>客室清掃管理</h1>
      <div class="summary" id="summary">未清掃: 0 / 清掃中: 0 / 完了: 0</div>
    </header>

    <section class="add-section">
      <h2>部屋を追加</h2>
      <div class="add-form">
        <input type="text" id="roomNumber" placeholder="部屋番号（例：101）" maxlength="10">
        <input type="text" id="roomMemo" placeholder="メモ（任意）" maxlength="30">
        <button id="addBtn" onclick="addRoom()">追加</button>
      </div>
    </section>

    <section class="filter-section">
      <button class="filter-btn active" onclick="filterRooms('all', this)">すべて</button>
      <button class="filter-btn" onclick="filterRooms('未清掃', this)">未清掃</button>
      <button class="filter-btn" onclick="filterRooms('清掃中', this)">清掃中</button>
      <button class="filter-btn" onclick="filterRooms('完了', this)">完了</button>
    </section>

    <section class="rooms-section" id="roomsList">
      <!-- 部屋カードがここに入る -->
    </section>

    <div class="empty-msg" id="emptyMsg" style="display:none;">部屋が登録されていません</div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
