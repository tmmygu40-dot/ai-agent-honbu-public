<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デートプランジェネレーター｜予算と日程で3コース即提案</title>
  <meta name="description" content="予算と曜日・時間帯・雰囲気を選ぶだけで、定番・サプライズ・癒しの3パターンのデートコースをスケジュールと費用内訳付きで即提案。毎回のプラン迷子を3秒で解決します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .plan-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
      border-left: 6px solid var(--accent);
    }
    .plan-card.a { border-left-color: #e07b00; }
    .plan-card.b { border-left-color: #c026d3; }
    .plan-card.c { border-left-color: #15803d; }
    .plan-tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.18rem 0.6rem; border-radius: 999px;
      background: var(--accent-light); color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .plan-card.b .plan-tag { background: #fdf4ff; color: #c026d3; }
    .plan-card.c .plan-tag { background: #f0fdf4; color: #15803d; }
    .plan-title { font-size: 1.15rem; font-weight: 900; margin-bottom: 0.3rem; line-height: 1.3; }
    .plan-theme { font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 0.9rem; }
    .schedule-list { list-style: none; padding: 0; margin: 0 0 0.9rem; }
    .schedule-list li {
      display: flex; gap: 0.7rem; padding: 0.55rem 0;
      border-bottom: 1px dashed var(--border); font-size: 0.92rem;
    }
    .schedule-list li:last-child { border-bottom: none; }
    .schedule-time {
      flex-shrink: 0; min-width: 4.2rem;
      font-weight: 700; color: var(--accent); font-size: 0.85rem;
    }
    .plan-card.b .schedule-time { color: #c026d3; }
    .plan-card.c .schedule-time { color: #15803d; }
    .schedule-text { color: var(--text); line-height: 1.5; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-top: 0.4rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.5rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); padding-top: 0.7rem; }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .plan-card.b .detail-table .hl td:last-child { color: #c026d3; }
    .plan-card.c .detail-table .hl td:last-child { color: #15803d; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .plan-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>デートプランジェネレーター</h1>
    <p class="subtitle">予算と日程を選ぶだけで、3パターンのデートコースを即提案</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="budget">予算（2人分の合計）</label>
      <select id="budget">
        <option value="5000">〜5,000円（プチデート）</option>
        <option value="10000" selected>〜10,000円（定番）</option>
        <option value="15000">〜15,000円（ちょっと贅沢）</option>
        <option value="20000">〜20,000円（記念日寄り）</option>
        <option value="30000">〜30,000円（特別な日）</option>
      </select>
    </div>
    <div class="field">
      <label for="day">曜日</label>
      <select id="day">
        <option value="weekday">平日</option>
        <option value="weekend" selected>週末・祝日</option>
      </select>
    </div>
    <div class="field">
      <label for="time">時間帯</label>
      <select id="time">
        <option value="day">昼〜夕方</option>
        <option value="night" selected>夕方〜夜</option>
        <option value="all">一日中</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="standard" selected>定番（外さない）</option>
        <option value="active">アクティブ（動き重視）</option>
        <option value="chill">まったり（癒し重視）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">コースを生成する</button>

  <div id="output"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 表示される金額・コース内容は、一般的な相場をもとにした目安です。実際のお店の価格や予約状況は各施設の最新情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'date-plan-input-v1';

  // 予算ティアに応じた素材
  var FOOD = {
    5000:  { lunch:['カフェランチ', 1500], dinner:['ファミレス・チェーン居酒屋', 2500], cafe:['チェーンカフェ', 800] },
    10000: { lunch:['人気ランチ店', 2500], dinner:['カジュアルダイニング', 4500], cafe:['おしゃれカフェ', 1200] },
    15000: { lunch:['少し贅沢ランチ', 3500], dinner:['ビストロ・隠れ家居酒屋', 6500], cafe:['ホテルラウンジ', 1800] },
    20000: { lunch:['ホテルランチ', 5000], dinner:['コース料理レストラン', 9000], cafe:['ホテルラウンジ', 2200] },
    30000: { lunch:['ホテルブッフェ', 7000], dinner:['記念日コースレストラン', 14000], cafe:['ホテルアフタヌーンティー', 3500] }
  };
  var ACTIVITY = {
    5000:  { day:['公園散歩・ウィンドウショッピング', 0], night:['夜景スポット（無料）', 0], surprise:['プリクラ・ゲーセン', 1500], chill:['本屋デート', 0] },
    10000: { day:['水族館', 4500], night:['映画', 3800], surprise:['脱出ゲーム', 4500], chill:['日帰り温泉', 2400] },
    15000: { day:['プラネタリウム＋美術館', 4000], night:['夜景バー1軒', 5000], surprise:['屋形船・クルーズ', 6500], chill:['岩盤浴・スパ', 4500] },
    20000: { day:['動物園＋遊園地', 6000], night:['ジャズバー＋夜景', 7500], surprise:['気球体験・乗馬体験', 8000], chill:['日帰り温泉旅館（昼）', 8000] },
    30000: { day:['テーマパーク1日', 10000], night:['ナイトクルーズ＋バー', 10000], surprise:['ヘリコプター遊覧', 16000], chill:['高級スパ・エステ', 10000] }
  };
  var EXTRA = {
    5000:  { gift:['100均でプチプラ小物', 500], drink:['コンビニドリンク', 400] },
    10000: { gift:['雑貨屋でちょい贈り物', 1500], drink:['カフェドリンク', 800] },
    15000: { gift:['LOFT・PLAZAでギフト', 2500], drink:['カクテル1杯', 1500] },
    20000: { gift:['ブランド雑貨', 4000], drink:['シャンパン1杯', 2200] },
    30000: { gift:['アクセサリー・花束', 7000], drink:['ボトルワイン', 4500] }
  };

  function pickTier(budget) {
    return [5000,10000,15000,20000,30000].reduce(function(prev, cur){
      return Math.abs(cur-budget) < Math.abs(prev-budget) ? cur : prev;
    });
  }

  function buildPlanA(tier, day, time, mood) {
    // 定番安心コース
    var f = FOOD[tier], a = ACTIVITY[tier];
    var schedule = [], breakdown = [], total = 0;
    if (time === 'day' || time === 'all') {
      schedule.push(['12:00', '駅前で待ち合わせ → '+f.lunch[0]+'でランチ']);
      breakdown.push(['ランチ', f.lunch[1]*2]); total += f.lunch[1]*2;
      schedule.push(['14:00', a.day[0]+'をのんびり満喫']);
      breakdown.push(['アクティビティ', a.day[1]*2]); total += a.day[1]*2;
      schedule.push(['16:30', f.cafe[0]+'でひと休み']);
      breakdown.push(['カフェ', f.cafe[1]*2]); total += f.cafe[1]*2;
    }
    if (time === 'night' || time === 'all') {
      schedule.push([(time==='all'?'18:30':'18:00'), f.dinner[0]+'でディナー']);
      breakdown.push(['ディナー', f.dinner[1]*2]); total += f.dinner[1]*2;
      schedule.push([(time==='all'?'21:00':'20:00'), '駅まで散歩しながら見送り']);
    }
    var theme = (day==='weekday'?'平日仕事終わりでも': '週末ゆっくり') + 'でも、外さない王道のデートコース。初デートやマンネリ脱出にも◎。';
    return { tag:'コースA', cls:'a', title:'定番安心コース', theme:theme, schedule:schedule, breakdown:breakdown, total:total };
  }

  function buildPlanB(tier, day, time, mood) {
    // サプライズ・特別感
    var f = FOOD[tier], a = ACTIVITY[tier], e = EXTRA[tier];
    var schedule = [], breakdown = [], total = 0;
    if (time === 'day' || time === 'all') {
      schedule.push(['11:30', '集合 → '+f.lunch[0]+'で景色のいい席を予約済みランチ']);
      breakdown.push(['ランチ（景色重視）', f.lunch[1]*2]); total += f.lunch[1]*2;
      schedule.push(['13:30', a.surprise[0]+'で非日常体験']);
      breakdown.push(['アクティビティ', a.surprise[1]*2]); total += a.surprise[1]*2;
      schedule.push(['16:00', e.gift[0]+'をこっそり購入']);
      breakdown.push(['プチギフト', e.gift[1]]); total += e.gift[1];
    }
    if (time === 'night' || time === 'all') {
      schedule.push([(time==='all'?'18:30':'18:30'), f.dinner[0]+'で記念日風ディナー（事前予約）']);
      breakdown.push(['ディナー', f.dinner[1]*2]); total += f.dinner[1]*2;
      schedule.push([(time==='all'?'20:30':'20:30'), a.night[0]+'で夜景タイム']);
      breakdown.push(['夜景スポット', a.night[1]*2]); total += a.night[1]*2;
      schedule.push([(time==='all'?'22:00':'22:00'), 'お別れ前にプチギフトを渡す']);
      if (time !== 'all') { breakdown.push(['プチギフト', e.gift[1]]); total += e.gift[1]; }
    }
    var theme = '記念日や勝負日に。事前予約と小さなギフトで「今日のデートは特別」を演出するコース。';
    return { tag:'コースB', cls:'b', title:'サプライズ・特別感コース', theme:theme, schedule:schedule, breakdown:breakdown, total:total };
  }

  function buildPlanC(tier, day, time, mood) {
    // のんびり癒し
    var f = FOOD[tier], a = ACTIVITY[tier];
    var schedule = [], breakdown = [], total = 0;
    if (time === 'day' || time === 'all') {
      schedule.push(['12:30', '遅めスタート → '+f.lunch[0]+'でゆっくりランチ']);
      breakdown.push(['ランチ', f.lunch[1]*2]); total += f.lunch[1]*2;
      schedule.push(['14:30', a.chill[0]+'でリラックスタイム']);
      breakdown.push(['アクティビティ', a.chill[1]*2]); total += a.chill[1]*2;
      schedule.push(['17:00', f.cafe[0]+'でスイーツ＆おしゃべり']);
      breakdown.push(['カフェ', f.cafe[1]*2]); total += f.cafe[1]*2;
    }
    if (time === 'night' || time === 'all') {
      schedule.push([(time==='all'?'19:00':'18:30'), f.dinner[0]+'で会話重視のディナー']);
      breakdown.push(['ディナー', f.dinner[1]*2]); total += f.dinner[1]*2;
      schedule.push([(time==='all'?'21:00':'20:30'), 'コンビニで翌朝用のお土産を買って解散']);
    }
    var theme = (day==='weekday'?'仕事疲れの平日':'休日の癒し時間')+'にぴったり。会話と居心地を最優先にした、肩の力を抜けるコース。';
    return { tag:'コースC', cls:'c', title:'のんびり癒しコース', theme:theme, schedule:schedule, breakdown:breakdown, total:total };
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function renderPlan(p) {
    var schedHtml = p.schedule.map(function(s){
      return '<li><span class="schedule-time">'+s[0]+'</span><span class="schedule-text">'+s[1]+'</span></li>';
    }).join('');
    var breakHtml = p.breakdown.map(function(b){
      return '<tr><td>'+b[0]+'</td><td>'+fmt(b[1])+' 円</td></tr>';
    }).join('');
    return '<div class="plan-card '+p.cls+'">'
         + '<span class="plan-tag">'+p.tag+'</span>'
         + '<h2 class="plan-title">'+p.title+'</h2>'
         + '<p class="plan-theme">'+p.theme+'</p>'
         + '<ul class="schedule-list">'+schedHtml+'</ul>'
         + '<table class="detail-table"><tbody>'+breakHtml
         + '<tr class="hl"><td>合計（2人分）</td><td>'+fmt(p.total)+' 円</td></tr>'
         + '</tbody></table>'
         + '</div>';
  }

  function generate() {
    var budget = parseInt(document.getElementById('budget').value, 10);
    var day = document.getElementById('day').value;
    var time = document.getElementById('time').value;
    var mood = document.getElementById('mood').value;

    save();
    var tier = pickTier(budget);
    var plans = [
      buildPlanA(tier, day, time, mood),
      buildPlanB(tier, day, time, mood),
      buildPlanC(tier, day, time, mood)
    ];

    // 雰囲気でA/B/Cの順序を入れ替える
    if (mood === 'active') plans = [plans[1], plans[0], plans[2]];
    else if (mood === 'chill') plans = [plans[2], plans[0], plans[1]];

    var out = document.getElementById('output');
    out.innerHTML = plans.map(renderPlan).join('');
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function save() {
    try {
      var data = {
        budget: document.getElementById('budget').value,
        day:    document.getElementById('day').value,
        time:   document.getElementById('time').value,
        mood:   document.getElementById('mood').value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.budget) document.getElementById('budget').value = d.budget;
      if (d.day)    document.getElementById('day').value    = d.day;
      if (d.time)   document.getElementById('time').value   = d.time;
      if (d.mood)   document.getElementById('mood').value   = d.mood;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
