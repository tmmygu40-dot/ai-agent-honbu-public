<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お詫び文ジェネレーター｜猫型ポケット</title>
<meta name="description" content="状況を選ぶだけで丁寧なお詫びメール・メッセージが完成。上司・取引先・友人など相手別に文体を自動調整。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#faf8f4;color:#333;min-height:100vh;padding:1.5rem 1rem}
.container{max-width:520px;margin:0 auto}
h1{font-size:1.35rem;margin-bottom:.3rem;color:#2c3e50}
.sub{font-size:.85rem;color:#999;margin-bottom:1.8rem}
.card{background:#fff;border-radius:12px;padding:1.3rem;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:1rem}
.card h2{font-size:.9rem;color:#666;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #f0ebe0}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:.82rem;color:#555;margin-bottom:.35rem;font-weight:600}
select,textarea{width:100%;padding:.55rem .8rem;border:2px solid #e0d8cc;border-radius:8px;font-size:.92rem;background:#fff;color:#333;appearance:none;font-family:inherit}
select:focus,textarea:focus{outline:none;border-color:#f5a623}
textarea{resize:vertical;min-height:60px;line-height:1.6}
.gen-btn{width:100%;padding:.75rem;background:#e74c3c;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:background .2s}
.gen-btn:hover{background:#c0392b}
.result-card{background:#fff;border-radius:12px;padding:1.3rem;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:1rem;display:none;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:.78rem;color:#e74c3c;font-weight:700;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem}
.result-text{background:#fdf8f0;border:1px solid #f0e8d0;border-radius:8px;padding:1rem;font-size:.9rem;line-height:1.85;white-space:pre-wrap;color:#333;word-break:break-all}
.btn-row{display:flex;gap:.7rem;margin-top:1rem;flex-wrap:wrap}
.btn-copy{flex:1;padding:.6rem;background:#2c3e50;color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;min-width:120px}
.btn-redo{flex:1;padding:.6rem;background:#fff;color:#e74c3c;border:2px solid #e74c3c;border-radius:8px;font-size:.9rem;cursor:pointer;min-width:120px}
.btn-copy:hover{opacity:.85}.btn-redo:hover{opacity:.85}
.copied{font-size:.8rem;color:#27ae60;min-height:1.2rem;margin-top:.4rem}

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card, #fff); color: var(--text-sub, #666);
      border: 1.5px solid var(--border, #ddd); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent, #e07b00); color: var(--accent, #e07b00); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
<div class="container">
<h1>🙇 お詫び文ジェネレーター</h1>
<p class="sub">状況を選ぶだけでお詫び文が完成します</p>

<div class="card">
  <h2>⚙️ 状況を選んでください</h2>
  <div class="form-row">
    <label>相手</label>
    <select id="sel-target">
      <option value="boss">上司・先輩</option>
      <option value="biz">取引先・お客様</option>
      <option value="friend">友人・知人</option>
      <option value="col">同僚</option>
    </select>
  </div>
  <div class="form-row">
    <label>ミスの種類</label>
    <select id="sel-type">
      <option value="late">遅刻・時間に遅れた</option>
      <option value="deadline">納期・締め切りに遅れた</option>
      <option value="miss">伝え忘れ・確認漏れ</option>
      <option value="wrong">間違った情報を伝えた</option>
      <option value="absent">無断欠席・ドタキャン</option>
      <option value="rude">失礼な言動をしてしまった</option>
    </select>
  </div>
  <div class="form-row">
    <label>深刻さ</label>
    <select id="sel-level">
      <option value="light">軽め（小さなミス）</option>
      <option value="mid">ふつう</option>
      <option value="heavy">深刻（大きな迷惑をかけた）</option>
    </select>
  </div>
  <div class="form-row">
    <label>件名に入れる内容（任意）</label>
    <textarea id="inp-subject" placeholder="例：先日のミーティングの件、昨日のメールの件"></textarea>
  </div>
  <button class="gen-btn" id="gen-btn">🙇 お詫び文を生成する</button>
</div>

<div class="result-card" id="result-card"></div>
</div>

<script>
var OPEN={
  boss: {
    light:'お世話になっております。\n先日は{件名}につきまして、ご迷惑をおかけしてしまい、大変申し訳ございませんでした。',
    mid:  'いつもお世話になっております。\n先日の{件名}の件につきまして、ご迷惑をおかけしましたこと、深くお詫び申し上げます。',
    heavy:'平素より大変お世話になっております。\nこのたびの{件名}の件につきましては、多大なるご迷惑をおかけしてしまいまして、誠に申し訳ございません。'
  },
  biz: {
    light:'いつもお世話になっております。\n先日は{件名}にてご不便をおかけし、申し訳ございませんでした。',
    mid:  'いつも大変お世話になっております。\nこのたびは{件名}の件でご迷惑をおかけしてしまい、心よりお詫び申し上げます。',
    heavy:'平素より格別のご高配を賜り、厚く御礼申し上げます。\nこのたびは{件名}につきまして、多大なるご迷惑をおかけし、深くお詫び申し上げます。'
  },
  friend:{
    light:'ごめんね！\n先日の{件名}のこと、ほんとうに申し訳なかったと思ってる。',
    mid:  'ごめんなさい。\n先日の{件名}のこと、ずっと気になっていました。本当に申し訳なかったです。',
    heavy:'ちゃんと謝りたくてメッセージしました。\n先日の{件名}のこと、本当に傷つけてしまってごめんなさい。'
  },
  col:{
    light:'先日は{件名}で迷惑かけてしまってごめんなさい。気をつけます。',
    mid:  'この前の{件名}の件、ほんとうに申し訳なかったです。フォローしてくれてありがとう。',
    heavy:'先日の{件名}の件、本当に迷惑をかけてしまって心苦しいです。改めてお詫びしたくて連絡しました。'
  }
};
var BODY={
  late:    {light:'時間に余裕を持って行動できておらず、反省しています。',mid:'時間管理が甘く、ご不便をおかけしました。今後は余裕を持った行動を心がけます。',heavy:'時間を守ることの大切さを改めて痛感しております。ご迷惑をおかけしたことを、深く反省しています。'},
  deadline:{light:'確認が不十分で締め切りに間に合わず、ご不便をおかけしました。',mid:'スケジュール管理が行き届かず、期限を守れませんでした。関係する方々にご迷惑をおかけしたことを反省しております。',heavy:'期限を守ることが最優先事項であったにもかかわらず、それを果たせなかったことを、心よりお詫び申し上げます。'},
  miss:    {light:'確認が不十分でお伝えできていなかった点があり、失礼しました。',mid:'伝達・確認が徹底できておらず、ご迷惑をおかけしました。',heavy:'情報の確認・共有が不十分で多大なご迷惑をおかけしたことは、言い訳のしようもございません。'},
  wrong:   {light:'誤った情報をお伝えしてしまい、大変失礼しました。',mid:'正確に確認してからお伝えすべきところ、誤った情報をお知らせしてしまいました。',heavy:'不正確な情報をお伝えしたことにより、ご判断やご対応にご迷惑をおかけしてしまいましたこと、誠に申し訳ございません。'},
  absent:  {light:'急な欠席となってしまい、ご迷惑をおかけしました。',mid:'事前にご連絡できず、急な欠席となってしまい大変申し訳ありませんでした。',heavy:'事前にご連絡もなく欠席してしまい、多大なご迷惑をおかけしたことを、深く反省しております。'},
  rude:    {light:'言い方が配慮に欠けており、気分を害してしまったかもしれません。',mid:'私の言動が配慮を欠いており、不快な思いをさせてしまいました。',heavy:'私の言動が非常に失礼であり、深く傷つけてしまったことを心よりお詫び申し上げます。'}
};
var CLOSE={
  boss: {light:'今後は気をつけます。引き続きよろしくお願いいたします。',mid:'再発防止に努めてまいります。引き続きどうぞよろしくお願いいたします。',heavy:'今後はこのようなことのないよう、再発防止に全力で取り組んでまいります。何卒ご容赦賜りますよう、お願い申し上げます。'},
  biz:  {light:'今後ともよろしくお願いいたします。',mid:'今後はより一層注意を払い、再発防止に努めてまいります。引き続き何卒よろしくお願いいたします。',heavy:'今後はこのようなことがないよう万全の対策を講じてまいります。何卒ご理解とご容赦を賜りますよう、謹んでお願い申し上げます。'},
  friend:{light:'これからも仲良くしてね。',mid:'また連絡するね。これからもよろしく。',heavy:'これからちゃんと大事にするから、また話せると嬉しいです。'},
  col:   {light:'またよろしくお願いします。',mid:'これからも助け合っていきましょう。よろしくお願いします。',heavy:'改めてフォローしますので、引き続きよろしくお願いします。'}
};
function generate(){
  var t=document.getElementById('sel-target').value;
  var tp=document.getElementById('sel-type').value;
  var lv=document.getElementById('sel-level').value;
  var subj=document.getElementById('inp-subject').value.trim()||'先日の件';
  var open=OPEN[t][lv].replace('{件名}',subj);
  var body=BODY[tp][lv];
  var close=CLOSE[t][lv];
  var text=open+'\n\n'+body+'\n\n'+close;
  var card=document.getElementById('result-card');
  card.innerHTML=
    '<div class="result-label">📄 生成されたお詫び文</div>'+
    '<div class="result-text" id="result-text"></div>'+
    '<div class="btn-row">'+
      '<button class="btn-copy" id="btn-copy">📋 コピーする</button>'+
      '<button class="btn-redo" id="btn-redo">🔄 再生成する</button>'+
    '</div>'+
    '<div class="copied" id="copied"></div>';
  document.getElementById('result-text').textContent=text;
  document.getElementById('btn-copy').addEventListener('click',copyText);
  document.getElementById('btn-redo').addEventListener('click',generate);
  card.style.display='block';
  document.getElementById('copied').textContent='';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function copyText(){
  var t=document.getElementById('result-text').textContent;
  if(!t)return;
  navigator.clipboard&&navigator.clipboard.writeText(t).then(function(){
    document.getElementById('copied').textContent='✅ コピーしました！';
    setTimeout(function(){document.getElementById('copied').textContent='';},2000);
  });
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('gen-btn').addEventListener('click',generate);
});
</script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
