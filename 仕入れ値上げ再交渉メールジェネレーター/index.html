<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ値上げ再交渉メールジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── シーン選択 ── */
    .scene-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0;
    }
    .scene-btn {
      padding: 0.75rem 0.5rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .scene-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .scene-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .scene-btn .scene-icon { font-size: 1.3rem; display: block; margin-bottom: 0.25rem; }
    .scene-btn .scene-label { font-size: 0.75rem; }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field .rate-badge {
      display: inline-block; margin-top: 0.4rem;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
      background: var(--ng-bg); color: var(--ng);
    }

    /* ── 2カラム入力 ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
    .field-row .field { margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果エリア ── */
    .result-area { display: none; max-width: 600px; margin: 0 auto 1rem; }

    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .result-scene-tag {
      display: inline-block;
      padding: 0.3rem 0.9rem; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent); color: #fff;
    }
    .btn-copy {
      padding: 0.5rem 1.1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); border-color: var(--ok); color: #fff; }

    .mail-box {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
    }

    /* ── 履歴 ── */
    .history-item {
      font-size: 0.82rem; padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-sub); cursor: pointer;
    }
    .history-item:hover { color: var(--accent); }
    .history-item:last-child { border-bottom: none; }
    .history-empty { font-size: 0.82rem; color: var(--text-sub); }

    .btn-clear {
      font-size: 0.78rem; color: var(--text-sub);
      background: none; border: none; cursor: pointer;
      text-decoration: underline; margin-top: 0.5rem;
      display: block;
    }
    .btn-clear:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>仕入れ値上げ再交渉メールジェネレーター</h1>
    <p class="subtitle">値上げ通知への返答メールをシーン別に自動生成</p>
  </header>

  <!-- シーン選択 -->
  <div class="card">
    <p class="card-title">① 返答シーンを選ぶ</p>
    <div class="scene-grid">
      <button class="scene-btn" id="s0" onclick="selectScene(0)">
        <span class="scene-icon">🔄</span>
        <span>再交渉依頼</span>
        <span class="scene-label">値上げ幅の引き下げを交渉</span>
      </button>
      <button class="scene-btn" id="s1" onclick="selectScene(1)">
        <span class="scene-icon">⏸️</span>
        <span>据え置き依頼</span>
        <span class="scene-label">現行価格の維持をお願い</span>
      </button>
      <button class="scene-btn" id="s2" onclick="selectScene(2)">
        <span class="scene-icon">📋</span>
        <span>条件付き受諾</span>
        <span class="scene-label">条件・段階的な受け入れ</span>
      </button>
      <button class="scene-btn" id="s3" onclick="selectScene(3)">
        <span class="scene-icon">➗</span>
        <span>一部受諾</span>
        <span class="scene-label">値上げ幅を一部のみ受け入れ</span>
      </button>
    </div>
  </div>

  <!-- 基本情報入力 -->
  <div class="card">
    <p class="card-title">② 基本情報を入力</p>
    <div class="field-row">
      <div class="field">
        <label for="myCompany">自社名</label>
        <input type="text" id="myCompany" placeholder="例: 株式会社○○">
      </div>
      <div class="field">
        <label for="myName">担当者名（省略可）</label>
        <input type="text" id="myName" placeholder="例: 山田 太郎">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="supplier">仕入れ先名</label>
        <input type="text" id="supplier" placeholder="例: ○○商事株式会社">
      </div>
      <div class="field">
        <label for="contact">担当者名（先方・省略可）</label>
        <input type="text" id="contact" placeholder="例: 鈴木様">
      </div>
    </div>
    <div class="field">
      <label for="product">商品名・品目</label>
      <input type="text" id="product" placeholder="例: A商品、○○原材料一式">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="currentPrice">現行単価（円）</label>
        <input type="number" id="currentPrice" placeholder="例: 1000" min="0" oninput="calcRate()">
      </div>
      <div class="field">
        <label for="newPrice">値上げ後単価（円）</label>
        <input type="number" id="newPrice" placeholder="例: 1200" min="0" oninput="calcRate()">
        <span class="rate-badge" id="rateBadge" style="display:none"></span>
      </div>
    </div>
    <div class="field" id="conditionField" style="display:none">
      <label for="condition" id="conditionLabel">条件・要望（省略可）</label>
      <input type="text" id="condition" placeholder="例: 3ヶ月後からの段階的な適用">
    </div>
    <div class="field">
      <label for="memo">追加メモ・補足（省略可）</label>
      <textarea id="memo" placeholder="例: 長年のお取引を考慮していただければ幸いです"></textarea>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">📧 メール文を生成する</button>

  <!-- 結果 -->
  <div class="result-area" id="resultArea">
    <div class="result-header">
      <span class="result-scene-tag" id="sceneTag">再交渉依頼</span>
      <button class="btn-copy" id="copyBtn" onclick="copyMail()">コピー</button>
    </div>
    <div class="mail-box" id="mailBox"></div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard">
    <p class="card-title">生成履歴</p>
    <div id="historyList"><p class="history-empty">まだ生成していません</p></div>
    <button class="btn-clear" onclick="clearHistory()">履歴を消去</button>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var selectedScene = -1;
  var LS_KEY = 'negoMailGen_v1';

  var SCENES = [
    { id: 0, label: '再交渉依頼',  condLabel: '希望する落とし所（省略可）', condHint: '例: 5%以内に抑えてほしい' },
    { id: 1, label: '据え置き依頼', condLabel: '据え置き希望期間（省略可）',  condHint: '例: 半年間' },
    { id: 2, label: '条件付き受諾', condLabel: '受諾条件（省略可）',         condHint: '例: 3ヶ月後からの段階適用' },
    { id: 3, label: '一部受諾',    condLabel: '受け入れ可能な値上げ幅（省略可）', condHint: '例: 値上げ幅の半分（〇〇円）まで' }
  ];

  function selectScene(n) {
    selectedScene = n;
    for (var i = 0; i < 4; i++) {
      document.getElementById('s' + i).classList.toggle('active', i === n);
    }
    var sc = SCENES[n];
    var cf = document.getElementById('conditionField');
    cf.style.display = '';
    document.getElementById('conditionLabel').textContent = sc.condLabel;
    document.getElementById('condition').placeholder = sc.condHint;
  }

  function calcRate() {
    var cp = parseFloat(document.getElementById('currentPrice').value);
    var np = parseFloat(document.getElementById('newPrice').value);
    var badge = document.getElementById('rateBadge');
    if (!isNaN(cp) && !isNaN(np) && cp > 0) {
      var rate = ((np - cp) / cp * 100).toFixed(1);
      badge.textContent = '値上げ率 ' + rate + '%';
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }

  function generate() {
    if (selectedScene < 0) { alert('返答シーンを選んでください'); return; }

    var myCompany   = document.getElementById('myCompany').value.trim()   || '弊社';
    var myName      = document.getElementById('myName').value.trim();
    var supplier    = document.getElementById('supplier').value.trim()    || 'ご担当者';
    var contact     = document.getElementById('contact').value.trim();
    var product     = document.getElementById('product').value.trim()     || 'ご提案品';
    var cp          = document.getElementById('currentPrice').value.trim();
    var np          = document.getElementById('newPrice').value.trim();
    var condition   = document.getElementById('condition').value.trim();
    var memo        = document.getElementById('memo').value.trim();

    var rateStr = '';
    if (cp && np && parseFloat(cp) > 0) {
      var rate = ((parseFloat(np) - parseFloat(cp)) / parseFloat(cp) * 100).toFixed(1);
      rateStr = '（' + rate + '%の値上げ）';
    }

    var priceNote = '';
    if (cp && np) {
      priceNote = '現行単価：' + Number(cp).toLocaleString('ja-JP') + '円 → 値上げ後：' + Number(np).toLocaleString('ja-JP') + '円' + rateStr;
    }

    var to = supplier + (contact ? ' ' + contact : ' ご担当者様');
    var from = myCompany + (myName ? ' ' + myName : '');

    var mail = buildMail(selectedScene, to, from, myCompany, product, priceNote, condition, memo);

    document.getElementById('sceneTag').textContent = SCENES[selectedScene].label;
    document.getElementById('mailBox').textContent = mail;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

    saveHistory(SCENES[selectedScene].label, supplier, product, mail);
    saveLS();
  }

  function buildMail(scene, to, from, myCompany, product, priceNote, condition, memo) {
    var lines = [];
    lines.push(to);
    lines.push('');
    lines.push('いつも大変お世話になっております。');
    lines.push(from + 'でございます。');
    lines.push('');
    lines.push('このたびは「' + product + '」の価格改定についてご連絡いただき、ありがとうございます。');
    if (priceNote) lines.push(priceNote);
    lines.push('');

    if (scene === 0) {
      // 再交渉依頼
      lines.push('ご事情については十分に理解しており、原材料費・エネルギーコストの上昇という昨今の状況も承知しております。');
      lines.push('一方、弊社においても現在のコスト環境のなか、お客様への価格維持に努めている状況でございます。');
      lines.push('');
      lines.push('つきましては、大変恐縮ではございますが、値上げ幅について今一度ご検討いただけないでしょうか。');
      if (condition) {
        lines.push('具体的には「' + condition + '」のような形でのご対応が可能であれば、大変助かります。');
      }
      lines.push('');
      lines.push('貴社との長年のお取引を大切にしたいと考えており、引き続き安定的なお取引が継続できますよう、ご配慮いただけますと幸いです。');
    } else if (scene === 1) {
      // 据え置き依頼
      lines.push('ご事情については十分に理解しており、誠に申し訳ないお願いとは存じますが、');
      lines.push('現在の弊社の経営状況を鑑みますと、ただちに価格改定分を吸収することが難しい状況でございます。');
      lines.push('');
      lines.push('つきましては、大変勝手ながら、現行価格を');
      if (condition) {
        lines.push('今後' + condition + 'のあいだ、据え置いていただくことは可能でしょうか。');
      } else {
        lines.push('一定期間、据え置いていただくことはご検討いただけないでしょうか。');
      }
      lines.push('');
      lines.push('当該期間内に弊社としても社内コスト削減等の対策を進め、改めてご相談させていただければと考えております。');
    } else if (scene === 2) {
      // 条件付き受諾
      lines.push('貴社のご事情をご説明いただきありがとうございます。コスト上昇という厳しい状況は弊社も理解しております。');
      lines.push('');
      lines.push('価格改定については前向きに受け入れる方向で検討させていただいておりますが、');
      if (condition) {
        lines.push('「' + condition + '」という条件でのご対応は可能でしょうか。');
      } else {
        lines.push('段階的な価格改定、または適用時期について調整いただくことは可能でしょうか。');
      }
      lines.push('');
      lines.push('弊社としても社内調整が必要なため、少しでもご配慮いただけますと大変助かります。');
    } else if (scene === 3) {
      // 一部受諾
      lines.push('貴社のご事情につきましては理解しております。誠に心苦しいのですが、');
      lines.push('今回ご提示いただいた値上げ幅の全額を即時に受け入れることは、弊社の経営上、困難な状況でございます。');
      lines.push('');
      if (condition) {
        lines.push('つきましては、今回は「' + condition + '」という形でご対応いただけないでしょうか。');
      } else {
        lines.push('つきましては、今回はご提示の値上げ幅の一部をまず受け入れる形でのご対応は可能でしょうか。');
      }
      lines.push('');
      lines.push('残りの部分については、今後の市場動向を見ながら改めて協議させていただければと存じます。');
    }

    if (memo) {
      lines.push('');
      lines.push(memo);
    }

    lines.push('');
    lines.push('ご多忙のところ大変恐縮ですが、ご検討のほどよろしくお願いいたします。');
    lines.push('');
    lines.push('何かご不明な点がございましたら、お気軽にご連絡ください。');
    lines.push('引き続きどうぞよろしくお願いいたします。');
    lines.push('');
    lines.push(from);

    return lines.join('\n');
  }

  function copyMail() {
    var text = document.getElementById('mailBox').textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { flashCopy(); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      flashCopy();
    }
  }
  function flashCopy() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました！'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1800);
  }

  /* ── 履歴 ── */
  var history = [];

  function saveHistory(scene, supplier, product, mail) {
    history.unshift({ scene: scene, supplier: supplier, product: product, mail: mail, ts: new Date().toLocaleString('ja-JP') });
    if (history.length > 10) history.pop();
    renderHistory();
  }
  function renderHistory() {
    var el = document.getElementById('historyList');
    if (!history.length) { el.innerHTML = '<p class="history-empty">まだ生成していません</p>'; return; }
    el.innerHTML = history.map(function(h, i) {
      return '<div class="history-item" onclick="loadHistory(' + i + ')">'
           + h.ts + '　' + h.scene + '　' + (h.supplier || '–') + '　' + (h.product || '–')
           + '</div>';
    }).join('');
  }
  function loadHistory(i) {
    var h = history[i];
    if (!h) return;
    document.getElementById('sceneTag').textContent = h.scene;
    document.getElementById('mailBox').textContent = h.mail;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function clearHistory() {
    if (!confirm('履歴を消去しますか？')) return;
    history = [];
    renderHistory();
    saveLS();
  }

  /* ── localStorage ── */
  function saveLS() {
    var data = {
      myCompany:    document.getElementById('myCompany').value,
      myName:       document.getElementById('myName').value,
      supplier:     document.getElementById('supplier').value,
      contact:      document.getElementById('contact').value,
      product:      document.getElementById('product').value,
      currentPrice: document.getElementById('currentPrice').value,
      newPrice:     document.getElementById('newPrice').value,
      scene:        selectedScene,
      history:      history
    };
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadLS() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.myCompany)    document.getElementById('myCompany').value    = data.myCompany;
      if (data.myName)       document.getElementById('myName').value       = data.myName;
      if (data.supplier)     document.getElementById('supplier').value     = data.supplier;
      if (data.contact)      document.getElementById('contact').value      = data.contact;
      if (data.product)      document.getElementById('product').value      = data.product;
      if (data.currentPrice) document.getElementById('currentPrice').value = data.currentPrice;
      if (data.newPrice)     document.getElementById('newPrice').value     = data.newPrice;
      if (data.currentPrice || data.newPrice) calcRate();
      if (data.scene >= 0)   selectScene(data.scene);
      if (Array.isArray(data.history)) { history = data.history; renderHistory(); }
    } catch(e) {}
  }
