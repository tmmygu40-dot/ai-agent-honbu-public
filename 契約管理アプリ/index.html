<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>契約管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>契約管理アプリ</h1>
      <p class="subtitle">取引先の契約情報を一元管理</p>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>契約を登録</h2>
      <form id="contractForm">
        <div class="form-row">
          <label for="clientName">取引先名 <span class="required">*</span></label>
          <input type="text" id="clientName" placeholder="例：株式会社〇〇" required>
        </div>
        <div class="form-row">
          <label for="contractContent">契約内容 <span class="required">*</span></label>
          <input type="text" id="contractContent" placeholder="例：業務委託契約" required>
        </div>
        <div class="form-row two-col">
          <div>
            <label for="startDate">契約開始日</label>
            <input type="date" id="startDate">
          </div>
          <div>
            <label for="endDate">契約終了日</label>
            <input type="date" id="endDate">
          </div>
        </div>
        <div class="form-row">
          <label for="renewalDate">更新日 <span class="required">*</span></label>
          <input type="date" id="renewalDate" required>
        </div>
        <div class="form-row">
          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="備考・注意事項など" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-add">登録する</button>
      </form>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="expired">期限切れ</button>
        <button class="filter-btn" data-filter="warning">30日以内</button>
        <button class="filter-btn" data-filter="normal">正常</button>
      </div>
      <div class="sort-bar">
        <label for="sortSelect">並び順：</label>
        <select id="sortSelect">
          <option value="renewal-asc">更新日（近い順）</option>
          <option value="renewal-desc">更新日（遠い順）</option>
          <option value="client-asc">取引先名（昇順）</option>
        </select>
      </div>
    </section>

    <!-- サマリー -->
    <section class="summary-section">
      <div class="summary-card expired-card">
        <span class="summary-num" id="expiredCount">0</span>
        <span class="summary-label">期限切れ</span>
      </div>
      <div class="summary-card warning-card">
        <span class="summary-num" id="warningCount">0</span>
        <span class="summary-label">30日以内</span>
      </div>
      <div class="summary-card normal-card">
        <span class="summary-num" id="normalCount">0</span>
        <span class="summary-label">正常</span>
      </div>
      <div class="summary-card total-card">
        <span class="summary-num" id="totalCount">0</span>
        <span class="summary-label">合計</span>
      </div>
    </section>

    <!-- 契約一覧 -->
    <section class="list-section">
      <h2>契約一覧</h2>
      <div id="contractList" class="contract-list">
        <p class="empty-msg">契約が登録されていません</p>
      </div>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>契約を編集</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <label for="editClientName">取引先名 <span class="required">*</span></label>
          <input type="text" id="editClientName" required>
        </div>
        <div class="form-row">
          <label for="editContractContent">契約内容 <span class="required">*</span></label>
          <input type="text" id="editContractContent" required>
        </div>
        <div class="form-row two-col">
          <div>
            <label for="editStartDate">契約開始日</label>
            <input type="date" id="editStartDate">
          </div>
          <div>
            <label for="editEndDate">契約終了日</label>
            <input type="date" id="editEndDate">
          </div>
        </div>
        <div class="form-row">
          <label for="editRenewalDate">更新日 <span class="required">*</span></label>
          <input type="date" id="editRenewalDate" required>
        </div>
        <div class="form-row">
          <label for="editMemo">メモ</label>
          <textarea id="editMemo" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-add">保存する</button>
          <button type="button" id="cancelEdit" class="btn-cancel">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
