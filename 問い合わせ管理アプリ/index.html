<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問い合わせ管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>問い合わせ管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="channel">受付経路</label>
        <select id="channel">
          <option value="電話">電話</option>
          <option value="メール">メール</option>
          <option value="SNS">SNS</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="name">相手名</label>
        <input type="text" id="name" placeholder="例：田中様">
      </div>
      <div class="form-group">
        <label for="content">内容</label>
        <textarea id="content" rows="3" placeholder="問い合わせ内容を入力"></textarea>
      </div>
      <button class="btn-add" id="addBtn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">すべて</button>
        <button class="tab" data-filter="未対応">未対応</button>
        <button class="tab" data-filter="対応中">対応中</button>
        <button class="tab" data-filter="完了">完了</button>
      </div>
      <div class="count-display" id="countDisplay"></div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <ul class="inquiry-list" id="inquiryList"></ul>
      <p class="empty-msg" id="emptyMsg">問い合わせはありません</p>
    </section>
  </div>

  <script>
'use strict';

const STORAGE_KEY = 'inquiries_v1';
let inquiries = [];
let currentFilter = 'all';

function load() {
  try {
    inquiries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    inquiries = [];
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(inquiries));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatDate(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${y}/${mo}/${day} ${h}:${mi}`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function render() {
  const filtered = currentFilter === 'all'
    ? inquiries
    : inquiries.filter(i => i.status === currentFilter);

  const list = document.getElementById('inquiryList');
  const emptyMsg = document.getElementById('emptyMsg');
  const countDisplay = document.getElementById('countDisplay');

  const unresolved = inquiries.filter(i => i.status === '未対応').length;
  countDisplay.textContent = `全 ${inquiries.length} 件 ／ 未対応 ${unresolved} 件`;

  if (filtered.length === 0) {
    list.innerHTML = '';
    emptyMsg.style.display = 'block';
    return;
  }

  emptyMsg.style.display = 'none';
  list.innerHTML = filtered.map(item => `
    <li class="inquiry-item status-${item.status}" data-id="${item.id}">
      <div class="item-header">
        <span class="badge-channel">${escHtml(item.channel)}</span>
        <span class="item-name">${escHtml(item.name)}</span>
        <span class="item-date">${formatDate(item.createdAt)}</span>
      </div>
      <div class="item-content">${escHtml(item.content)}</div>
      <div class="item-footer">
        <span class="status-badge badge-${item.status}">${item.status}</span>
        <select class="status-select" onchange="changeStatus('${item.id}', this.value)">
          <option value="未対応" ${item.status === '未対応' ? 'selected' : ''}>未対応</option>
          <option value="対応中" ${item.status === '対応中' ? 'selected' : ''}>対応中</option>
          <option value="完了"   ${item.status === '完了'   ? 'selected' : ''}>完了</option>
        </select>
        <button class="btn-delete" onclick="deleteItem('${item.id}')">削除</button>
      </div>
    </li>
  `).join('');
}

function changeStatus(id, newStatus) {
  const item = inquiries.find(i => i.id === id);
  if (item) {
    item.status = newStatus;
    save();
    render();
  }
}

function deleteItem(id) {
  if (!confirm('この問い合わせを削除しますか？')) return;
  inquiries = inquiries.filter(i => i.id !== id);
  save();
  render();
}

document.getElementById('addBtn').addEventListener('click', () => {
  const channel = document.getElementById('channel').value;
  const name = document.getElementById('name').value.trim();
  const content = document.getElementById('content').value.trim();

  if (!content) {
    alert('内容を入力してください');
    return;
  }

  const item = {
    id: generateId(),
    channel,
    name: name || '（名前なし）',
    content,
    status: '未対応',
    createdAt: new Date().toISOString()
  };

  inquiries.unshift(item);
  save();

  document.getElementById('name').value = '';
  document.getElementById('content').value = '';

  render();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });
});

load();
render();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
