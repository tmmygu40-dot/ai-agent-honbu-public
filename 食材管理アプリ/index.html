<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>🥦 食材管理</h1>

    <div class="input-area">
      <div class="input-group">
        <label for="itemName">食材名</label>
        <input type="text" id="itemName" placeholder="例：牛乳" maxlength="30">
      </div>
      <div class="input-group">
        <label for="expiryDate">消費期限</label>
        <input type="date" id="expiryDate">
      </div>
      <button id="addBtn" onclick="addItem()">登録</button>
    </div>

    <div class="filter-area">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('danger', this)">期限切れ</button>
      <button class="filter-btn" onclick="setFilter('warning', this)">期限間近</button>
      <button class="filter-btn" onclick="setFilter('safe', this)">余裕あり</button>
    </div>

    <div id="itemList"></div>

    <div id="emptyMsg" class="empty-msg" style="display:none;">登録されている食材はありません</div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
