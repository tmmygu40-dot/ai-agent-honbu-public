<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宅配便管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>宅配便管理</h1>

    <!-- 追加フォーム -->
    <section class="form-section">
      <h2>発送記録を追加</h2>
      <div class="form-group">
        <label for="recipient">相手（宛先）</label>
        <input type="text" id="recipient" placeholder="例：山田 太郎" maxlength="50">
      </div>
      <div class="form-group">
        <label for="item">品名</label>
        <input type="text" id="item" placeholder="例：洋服・書類" maxlength="100">
      </div>
      <div class="form-group">
        <label for="deliveryDate">到着予定日</label>
        <input type="date" id="deliveryDate">
      </div>
      <div class="form-group">
        <label for="note">メモ（任意）</label>
        <input type="text" id="note" placeholder="例：追跡番号など" maxlength="100">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- フィルタ -->
    <section class="filter-section">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="pending">未受取</button>
      <button class="filter-btn" data-filter="done">受取済み</button>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="emptyMsg" class="empty-msg">発送記録がありません</div>
      <ul id="deliveryList"></ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
