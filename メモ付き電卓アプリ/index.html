<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メモ付き電卓</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>メモ付き電卓</h1>

    <!-- 電卓エリア -->
    <div class="calculator">
      <div class="display">
        <div class="display-sub" id="expression"></div>
        <div class="display-main" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-clear span2" onclick="clearAll()">AC</button>
        <button class="btn btn-clear" onclick="backspace()">⌫</button>
        <button class="btn btn-op" onclick="inputOp('/')">÷</button>

        <button class="btn" onclick="inputNum('7')">7</button>
        <button class="btn" onclick="inputNum('8')">8</button>
        <button class="btn" onclick="inputNum('9')">9</button>
        <button class="btn btn-op" onclick="inputOp('*')">×</button>

        <button class="btn" onclick="inputNum('4')">4</button>
        <button class="btn" onclick="inputNum('5')">5</button>
        <button class="btn" onclick="inputNum('6')">6</button>
        <button class="btn btn-op" onclick="inputOp('-')">−</button>

        <button class="btn" onclick="inputNum('1')">1</button>
        <button class="btn" onclick="inputNum('2')">2</button>
        <button class="btn" onclick="inputNum('3')">3</button>
        <button class="btn btn-op" onclick="inputOp('+')">＋</button>

        <button class="btn span2" onclick="inputNum('0')">0</button>
        <button class="btn" onclick="inputDot()">.</button>
        <button class="btn btn-eq" onclick="calculate()">=</button>
      </div>
    </div>

    <!-- メモ保存エリア -->
    <div class="memo-save">
      <input type="text" id="labelInput" placeholder="ラベルを入力（例：ランチ代）" maxlength="50">
      <button class="btn-save" onclick="saveMemo()">メモに保存</button>
    </div>

    <!-- メモ一覧エリア -->
    <div class="memo-list-area">
      <div class="memo-header">
        <h2>保存したメモ</h2>
        <button class="btn-clear-all" onclick="clearAllMemos()">全件削除</button>
      </div>
      <ul id="memoList"></ul>
      <p id="emptyMsg" class="empty-msg">まだメモはありません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
