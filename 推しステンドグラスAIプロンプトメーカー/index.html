<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前・外見・色合いを選ぶだけで、ステンドグラス風教会アートのAI画像生成プロンプト（英語・日本語・ネガティブ）を30秒で自動生成できる無料ツールです。">
  <title>🪟 推しステンドグラスAIプロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0f8;
      --card: #ffffff;
      --border: #e0d5ec;
      --accent: #7c3aed;
      --accent-light: #f5f3ff;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #5b21b6, 0 6px 16px rgba(124,58,237,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5b21b6, 0 2px 8px rgba(124,58,237,0.2);
    }

    /* ── プロンプト出力エリア ── */
    .prompt-block { margin-bottom: 1rem; }
    .prompt-block:last-child { margin-bottom: 0; }
    .prompt-label {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); margin-bottom: 0.4rem;
    }
    .prompt-text {
      width: 100%; min-height: 80px;
      padding: 0.75rem 0.9rem;
      font-size: 0.88rem; line-height: 1.6;
      border: 1.5px solid var(--border);
      border-radius: 9px; background: #fafafa;
      color: var(--text); resize: vertical;
      font-family: inherit;
    }
    .btn-copy {
      display: block; margin-top: 0.4rem;
      padding: 0.45rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🪟 推しステンドグラスAIプロンプトメーカー</h1>
    <p class="subtitle">推しの特徴を選ぶだけで、ステンドグラス風教会アートのAI呪文を30秒で生成！</p>
  </header>

  <!-- 入力カード：キャラクター情報 -->
  <div class="card">
    <p class="card-title">キャラクター情報</p>
    <div class="field">
      <label for="chara-name">推しの名前・キャラ名</label>
      <input type="text" id="chara-name" placeholder="例：エメラルド、白銀ノエル">
      <p class="hint">名前をそのまま英語プロンプトに使います</p>
    </div>
    <div class="field">
      <label for="hair-color">髪の色・特徴</label>
      <input type="text" id="hair-color" placeholder="例：金髪ロング、白髪ショート、黒髪ポニーテール">
    </div>
    <div class="field">
      <label for="eye-color">目の色・特徴</label>
      <input type="text" id="eye-color" placeholder="例：青い瞳、赤い瞳、エメラルドグリーンの目">
    </div>
    <div class="field">
      <label for="outfit">服装・印象</label>
      <input type="text" id="outfit" placeholder="例：白いドレス、剣士の鎧、巫女装束、アイドル衣装">
    </div>
  </div>

  <!-- 入力カード：アートスタイル -->
  <div class="card">
    <p class="card-title">アートスタイル</p>
    <div class="field">
      <label for="art-style">スタイル</label>
      <select id="art-style">
        <option value="gothic">ゴシック教会風（尖塔アーチ・ガーゴイル影）</option>
        <option value="cathedral">光差し込む大聖堂（天国の光芒・荘厳な空間）</option>
        <option value="rose">薔薇窓モチーフ（円形万華鏡・放射状の花びら）</option>
        <option value="geometry">黄金比幾何学（神聖幾何学・数学的対称美）</option>
      </select>
    </div>
    <div class="field">
      <label for="color-palette">色合い</label>
      <select id="color-palette">
        <option value="blue-gold">神聖なブルー＆ゴールド（サファイア×金箔）</option>
        <option value="crimson-emerald">深紅＆エメラルド（ルビー×翡翠）</option>
        <option value="purple-silver">パープル＆シルバー（アメシスト×月光銀）</option>
        <option value="amber-cream">暖かいアンバー＆クリーム（琥珀×象牙）</option>
      </select>
    </div>
    <div class="field">
      <label for="lighting">光の雰囲気</label>
      <select id="lighting">
        <option value="sunlight">太陽光（燦然とした昼の光）</option>
        <option value="twilight">夕暮れ（温かな黄昏の光）</option>
        <option value="moonlight">月明かり（神秘的な夜の光）</option>
        <option value="candle">燭台の光（揺らめく炎の温もり）</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加キーワード（任意）</label>
      <input type="text" id="extra" placeholder="例：翼、花、剣、魔法陣">
      <p class="hint">プロンプトに追加したい要素があれば入力</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ プロンプトを生成する</button>

  <!-- プロンプト出力カード -->
  <div class="result-card" id="result">
    <p class="card-title">生成されたプロンプト</p>

    <div class="prompt-block">
      <p class="prompt-label">🇬🇧 英語プロンプト（AIツールに貼り付け）</p>
      <textarea class="prompt-text" id="prompt-en" readonly></textarea>
      <button class="btn-copy" id="copy-en" onclick="copyPrompt('prompt-en','copy-en')">📋 コピー</button>
    </div>

    <div class="prompt-block">
      <p class="prompt-label">🇯🇵 日本語プロンプト（参考・翻訳用）</p>
      <textarea class="prompt-text" id="prompt-ja" readonly></textarea>
      <button class="btn-copy" id="copy-ja" onclick="copyPrompt('prompt-ja','copy-ja')">📋 コピー</button>
    </div>

    <div class="prompt-block">
      <p class="prompt-label">🚫 ネガティブプロンプト</p>
      <textarea class="prompt-text" id="prompt-neg" readonly></textarea>
      <button class="btn-copy" id="copy-neg" onclick="copyPrompt('prompt-neg','copy-neg')">📋 コピー</button>
    </div>
  </div>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var STYLE_MAP = {
    gothic:    { en: 'gothic cathedral style, pointed arches, flying buttresses, gargoyle shadows, dark grandeur', ja: 'ゴシック教会風、尖塔アーチ、ガーゴイル、荘厳な闇' },
    cathedral: { en: 'light-filled cathedral style, soaring nave, heavenly rays of light streaming down, luminous divine atmosphere', ja: '光差し込む大聖堂、天国の光芒、荘厳な空間、神聖な輝き' },
    rose:      { en: 'rose window pattern, circular mandala design, radiating petal motifs, kaleidoscope symmetry', ja: '薔薇窓モチーフ、円形万華鏡、放射状の花びら、万華鏡の対称美' },
    geometry:  { en: 'sacred geometry pattern, golden ratio design, intricate geometric symmetry, mathematical divine order', ja: '神聖幾何学、黄金比デザイン、幾何学的対称美' }
  };

  var COLOR_MAP = {
    'blue-gold':      { en: 'deep cobalt blue and gold color palette, sapphire and gold leaf, divine blue tones', ja: '神聖なブルー＆ゴールド、サファイア×金箔' },
    'crimson-emerald':{ en: 'crimson and emerald green color palette, ruby red and jade green, rich jewel tones', ja: '深紅＆エメラルドグリーン、ルビー×翡翠' },
    'purple-silver':  { en: 'royal purple and silver color palette, amethyst and moonlit silver, mystical tones', ja: 'ロイヤルパープル＆シルバー、アメシスト×月光銀' },
    'amber-cream':    { en: 'warm amber and cream color palette, golden amber and ivory white, warm sunset tones', ja: '暖かいアンバー＆クリーム、琥珀×象牙' }
  };

  var LIGHT_MAP = {
    sunlight: { en: 'brilliant sunlight streaming through stained glass, warm golden sunbeams, daylight radiance', ja: '燦々と差し込む太陽光、温かな金色の光芒' },
    twilight: { en: 'warm twilight glow filtering through glass, sunset light atmosphere, dusk illumination', ja: '夕暮れの温かな光、黄昏のグロー' },
    moonlight:{ en: 'moonlit radiance through stained glass, cool silver moonbeams, nocturnal mystical light', ja: '月明かりの神秘的な輝き、クールシルバーの月光' },
    candle:   { en: 'warm candlelight glow, flickering flame atmosphere, intimate warm light through glass', ja: '燭台の揺らめく炎の光、温もりのある薄暗い光' }
  };

  function generate() {
    var name    = document.getElementById('chara-name').value.trim();
    var hair    = document.getElementById('hair-color').value.trim();
    var eyes    = document.getElementById('eye-color').value.trim();
    var outfit  = document.getElementById('outfit').value.trim();
    var style   = document.getElementById('art-style').value;
    var color   = document.getElementById('color-palette').value;
    var light   = document.getElementById('lighting').value;
    var extra   = document.getElementById('extra').value.trim();

    var nameEn   = name || 'original character';
    var hairEn   = hair || 'beautiful hair';
    var eyesEn   = eyes || 'expressive eyes';
    var outfitEn = outfit || 'elegant attire';
    var extraEn  = extra ? ', ' + extra : '';

    var styleData = STYLE_MAP[style];
    var colorData = COLOR_MAP[color];
    var lightData = LIGHT_MAP[light];

    var promptEn = [
      nameEn + ',',
      hairEn + ', ' + eyesEn + ', ' + outfitEn + ',',
      'stained glass art, ' + styleData.en + ',',
      colorData.en + ',',
      lightData.en + ',',
      'intricate lead lines, jewel-toned glass, divine radiance, art nouveau stained glass motifs' + extraEn + ',',
      'ultra detailed, masterpiece quality, vibrant colors, luminous, breathtaking'
    ].join(' ');

    var nameJa  = name || 'オリジナルキャラクター';
    var hairJa  = hair || '美しい髪';
    var eyesJa  = eyes || '印象的な目';
    var outfitJa = outfit || '優雅な装い';
    var extraJa = extra ? '、' + extra : '';

    var promptJa = [
      'ステンドグラス風アート、',
      nameJa + '、' + hairJa + '、' + eyesJa + '、' + outfitJa + '、',
      styleData.ja + '、',
      colorData.ja + '、',
      lightData.ja + '、',
      '繊細な鉛線、宝石のようなガラス、神聖な輝き、アールヌーヴォー' + extraJa + '、',
      '超精細、傑作、鮮やか、輝くような美しさ'
    ].join('');

    var promptNeg = 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry, ugly, deformed, distorted face, dark background, muddy colors, flat colors';

    document.getElementById('prompt-en').value  = promptEn;
    document.getElementById('prompt-ja').value  = promptJa;
    document.getElementById('prompt-neg').value = promptNeg;

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // コピーボタンをリセット
    ['copy-en','copy-ja','copy-neg'].forEach(function(id){
      var btn = document.getElementById(id);
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    });

    // localStorage保存
    try {
      localStorage.setItem('stained_glass_prompt', JSON.stringify({
        name: name, hair: hair, eyes: eyes, outfit: outfit,
        style: style, color: color, light: light, extra: extra,
        promptEn: promptEn, promptJa: promptJa, promptNeg: promptNeg
      }));
    } catch(e) {}
  }

  function copyPrompt(textareaId, btnId) {
    var text = document.getElementById(textareaId).value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById(btnId);
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
      // フォールバック
      var ta = document.getElementById(textareaId);
      ta.select();
      document.execCommand('copy');
      var btn = document.getElementById(btnId);
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // localStorage から前回の入力を復元
  (function() {
    try {
      var saved = localStorage.getItem('stained_glass_prompt');
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.name)   document.getElementById('chara-name').value  = d.name;
      if (d.hair)   document.getElementById('hair-color').value  = d.hair;
      if (d.eyes)   document.getElementById('eye-color').value   = d.eyes;
      if (d.outfit) document.getElementById('outfit').value      = d.outfit;
      if (d.style)  document.getElementById('art-style').value   = d.style;
      if (d.color)  document.getElementById('color-palette').value = d.color;
      if (d.light)  document.getElementById('lighting').value    = d.light;
      if (d.extra)  document.getElementById('extra').value       = d.extra;
      if (d.promptEn) {
        document.getElementById('prompt-en').value  = d.promptEn;
        document.getElementById('prompt-ja').value  = d.promptJa;
        document.getElementById('prompt-neg').value = d.promptNeg;
        document.getElementById('result').style.display = 'block';
      }
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
