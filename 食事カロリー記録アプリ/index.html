<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食事カロリー記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🥗 食事カロリー記録</h1>
      <p class="date" id="today-date"></p>
    </header>

    <!-- 目標カロリー設定 -->
    <section class="goal-section">
      <label for="goal-input">目標カロリー</label>
      <div class="goal-row">
        <input type="number" id="goal-input" min="0" placeholder="2000">
        <span>kcal</span>
        <button id="save-goal-btn">保存</button>
      </div>
    </section>

    <!-- 合計表示 -->
    <section class="summary-section">
      <div class="summary-card">
        <div class="summary-item">
          <span class="summary-label">摂取カロリー</span>
          <span class="summary-value" id="total-cal">0</span>
          <span class="summary-unit">kcal</span>
        </div>
        <div class="summary-divider">/</div>
        <div class="summary-item">
          <span class="summary-label">目標</span>
          <span class="summary-value" id="goal-cal">2000</span>
          <span class="summary-unit">kcal</span>
        </div>
      </div>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="remaining" id="remaining-text"></p>
    </section>

    <!-- 食事入力 -->
    <section class="input-section">
      <h2>食事を追加</h2>
      <div class="input-row">
        <input type="text" id="meal-name" placeholder="食事名（例：おにぎり）" maxlength="40">
      </div>
      <div class="input-row">
        <input type="number" id="meal-cal" placeholder="カロリー（kcal）" min="0">
        <button id="add-btn">追加</button>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>今日の記録</h2>
      <ul id="meal-list"></ul>
      <p class="empty-msg" id="empty-msg">まだ記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
