<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し誕プレジェネレーター｜推しの誕生月とタイプ・予算でプレゼント3案を提案</title>
  <meta name="description" content="推しの誕生月・タイプ・予算・渡し方を選ぶだけで、推しが喜ぶプレゼント候補を3案提案。SNSで使える推しへのひと言コメント付きで、誕生日企画やオフ会のギフト選びに使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; }

    /* プレゼント候補リスト */
    .gift-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .gift-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      background: var(--accent-light);
    }
    .gift-rank {
      display: inline-block; font-size: 0.72rem; font-weight: 800;
      background: var(--accent); color: #fff;
      padding: 0.15rem 0.55rem; border-radius: 999px; margin-right: 0.5rem;
    }
    .gift-name { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 0.3rem; }
    .gift-price { font-size: 0.82rem; color: var(--accent); font-weight: 700; margin-bottom: 0.4rem; }
    .gift-reason { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; margin-bottom: 0.5rem; }
    .gift-quote {
      font-size: 0.85rem; color: var(--text); line-height: 1.5;
      background: #fff; border-left: 3px solid var(--accent);
      padding: 0.5rem 0.7rem; border-radius: 5px;
    }
    .copy-btn {
      display: inline-block; margin-top: 0.5rem;
      font-size: 0.75rem; font-weight: 700;
      padding: 0.3rem 0.7rem; border-radius: 6px;
      background: #fff; border: 1px solid var(--border); color: var(--text-sub);
      cursor: pointer;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .copy-btn, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>

</head>
<body>

  <header class="app-header">
    <h1>推し誕プレジェネレーター</h1>
    <p class="subtitle">推しの誕生月・タイプ・予算・渡し方からプレゼント3案を即提案</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推し情報を入力</p>
    <div class="field">
      <label for="month">推しの誕生月</label>
      <select id="month">
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3">3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div class="field">
      <label for="type">推しのタイプ</label>
      <select id="type">
        <option value="cute">可愛い系（笑顔・癒し系）</option>
        <option value="cool">クール系（クール・ミステリアス）</option>
        <option value="funny">おもしろ系（ボケ・ムードメーカー）</option>
        <option value="stable">しっかり系（リーダー・お兄/お姉）</option>
        <option value="natural">天然系（マイペース・素朴）</option>
      </select>
    </div>
    <div class="field">
      <label for="budget">予算（円）</label>
      <input type="number" id="budget" placeholder="例: 5000" min="500" max="200000">
      <p class="hint">500〜200000円の範囲で入力してください</p>
    </div>
    <div class="field">
      <label for="relation">渡し方・関係性</label>
      <select id="relation">
        <option value="self">本人に直接渡す</option>
        <option value="sns">SNS投稿・お祝い企画</option>
        <option value="group">グループでまとめてプレゼント</option>
        <option value="event">オフ会・誕生日イベントで渡す</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">プレゼント3案を提案する</button>

  <div class="result-card" id="result">
    <p class="result-label">総合おすすめ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 候補3案カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">候補3案（タップでコピー）</p>
    <div class="gift-list" id="db"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎁 このツールは推し活ファンの一般的なプレゼント傾向と価格帯を参考に、汎用的な目安としてまとめています。実際の選択は推しのSNS発信・ファンクラブ情報も合わせてご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── プレゼント候補プール（タイプ × 価格帯） ──
  // priceMin は目安下限。budget がそれ以上なら候補に入る。
  var POOL = {
    cute: [
      { name: 'ぬいぐるみ・マスコット',       priceMin:  1500, reason: '見た目の可愛らしさが推しのイメージにぴったり。机に飾れて毎日癒される'},
      { name: 'フラワーアレンジメント',         priceMin:  3000, reason: '誕生月の花を選べば季節感も演出でき、写真映えも抜群'},
      { name: 'ハンドクリーム＆コスメ詰合わせ',  priceMin:  2500, reason: '実用的で香りでも幸せ。可愛い系の推しが好む傾向あり'},
      { name: 'カフェチェーン ギフトカード',    priceMin:  1000, reason: '気軽に受け取れるサイズ感。SNS企画でも推しに負担をかけない'},
      { name: 'デザイン文具セット',             priceMin:  1500, reason: '見た目が華やかで仕事にも使える。日常で推しを感じてもらえる'},
      { name: 'スイーツ詰合わせ',               priceMin:  2000, reason: '甘いもの好き率が高め。SNSで開封シーンになりやすい'},
      { name: 'バスソルト・入浴剤セット',       priceMin:  2000, reason: 'リラックス系で疲れた推しを労われる。香りで季節感も出せる'},
      { name: '名入れマグカップ',               priceMin:  2500, reason: '世界に1つの特別感。長く使ってもらえる定番'}
    ],
    cool: [
      { name: '高級ボールペン',                  priceMin:  3000, reason: '実用性とブランド感を両立。クール系のイメージにマッチ'},
      { name: 'シンプルレザー小物（カードケース等）', priceMin: 4000, reason: '上質で長く使える。落ち着いた雰囲気の推しが好む'},
      { name: 'ブランドフレグランス・ディフューザー', priceMin: 3500, reason: '香りで推しの世界観を演出。プライベート空間で愛用してもらえる'},
      { name: '高級チョコレート・ウイスキーボンボン', priceMin: 2500, reason: 'シンプルで上質。クール系のテンションを邪魔しない'},
      { name: 'モノトーン文具セット',             priceMin:  2000, reason: 'デザイン性が高く、机周りに置いても浮かない'},
      { name: 'シルバーアクセサリー',             priceMin:  5000, reason: '小物使いに使える。クール系のスタイルに合いやすい'},
      { name: 'コーヒー器具・専門店豆セット',     priceMin:  3500, reason: 'こだわり系の趣味を応援できる。一人時間を充実させる'},
      { name: '高級タオル・ハンカチ',             priceMin:  2500, reason: '日常で使う上質さ。さりげなく寄り添える'}
    ],
    funny: [
      { name: 'おもしろ雑貨・ガジェット',         priceMin:  1500, reason: 'SNSにアップしたくなるネタ性あり。ボケのきっかけになる'},
      { name: 'ご当地お菓子の詰合わせ',           priceMin:  2000, reason: 'リアクション動画になりやすい。話のネタが増える'},
      { name: 'パーティーグッズ・コスプレ小物',   priceMin:  2000, reason: '誕生日配信で活用できる。ムードメーカー気質と相性◎'},
      { name: 'ジョークマグカップ',               priceMin:  2000, reason: '笑いが取れて実用的。事務所・楽屋でも使える'},
      { name: '名物グルメギフト（とんかつ・牛タン等）', priceMin: 4000, reason: 'がっつり系で食レポにも最適。配信ネタになる'},
      { name: 'ボードゲーム・アナログゲーム',     priceMin:  2500, reason: '誰かと盛り上がる用途。グループでの企画にも◎'},
      { name: 'ユニーク文房具セット',             priceMin:  1500, reason: '机に置いてあるだけで会話のきっかけ。場を和ませる'},
      { name: 'お笑いライブ・劇場チケット',       priceMin:  3500, reason: '体験ギフト。推しに笑いの時間をプレゼントできる'}
    ],
    stable: [
      { name: 'ビジネスグッズ（手帳・ペン）',      priceMin:  3000, reason: 'リーダー気質に合う実用性。仕事を支える'},
      { name: '高級ハーブティー・コーヒーセット',  priceMin:  2500, reason: '忙しい推しを労る一杯。落ち着いた休息時間に'},
      { name: 'リラクゼーショングッズ（マッサージ機等）', priceMin: 5000, reason: 'お疲れ様の気持ちを形に。健康面のサポートに'},
      { name: '上質な栄養ドリンク・健康ギフト',    priceMin:  2000, reason: '体調管理を応援。長く活動してもらうための気遣い'},
      { name: 'ワイン・日本酒（誕生年・地酒）',    priceMin:  4000, reason: '大人の嗜みに合う。誕生月や故郷縁の銘柄が選べる'},
      { name: 'バスローブ・上質ルームウェア',     priceMin:  6000, reason: '帰宅後のリセットに。家族・パートナーにもバレにくい'},
      { name: 'ビジネス書・自己啓発書セット',     priceMin:  3000, reason: '向上心の強い推しに。読書時間をサポート'},
      { name: 'プレミアムタオルセット',           priceMin:  3500, reason: '生活の質を底上げ。実用的で長く愛用される'}
    ],
    natural: [
      { name: 'ハンドメイド系雑貨（陶器・木工品）', priceMin:  2500, reason: '一点物の温かみ。マイペースな推しの感性に響きやすい'},
      { name: 'オーガニックハーブティー',           priceMin:  2000, reason: '自然派志向と相性◎。ゆったりした時間を演出'},
      { name: 'アロマオイル・キャンドルセット',     priceMin:  2500, reason: '空間の癒しに。素朴な推しの好みに合いやすい'},
      { name: '観葉植物・多肉植物',                 priceMin:  1500, reason: '世話する楽しみ付き。ナチュラル系の部屋にも馴染む'},
      { name: '産直フルーツ・ジャム詰合わせ',       priceMin:  3000, reason: '素材の美味しさを楽しめる。素直な味の好みに合う'},
      { name: '手作り石けん・無添加コスメ',         priceMin:  2500, reason: '肌への優しさ。自然志向の推しに最適'},
      { name: '木製ステーショナリー',               priceMin:  2000, reason: '温かみのある質感。机に置いて心地よい'},
      { name: '季節のリース・ドライフラワー',       priceMin:  3500, reason: '飾るだけで季節感。フォトジェニックでSNS映えも'}
    ]
  };

  // ── 月別カラーテーマ・誕生石ヒント ──
  var MONTH_HINT = {
    1:  '1月（ガーネット・新春の和テイスト）',
    2:  '2月（アメジスト・バレンタイン×誕生日のW企画も◎）',
    3:  '3月（アクアマリン・春色パステル）',
    4:  '4月（ダイヤ・桜ピンク）',
    5:  '5月（エメラルド・若葉グリーン）',
    6:  '6月（パール・梅雨を楽しむレイングッズも◎）',
    7:  '7月（ルビー・夏色ビビッド）',
    8:  '8月（ペリドット・ひまわりイエロー）',
    9:  '9月（サファイア・秋の深いブルー）',
    10: '10月（オパール・ハロウィン×誕生日のW企画も◎）',
    11: '11月（トパーズ・紅葉オレンジ）',
    12: '12月（ターコイズ・クリスマス×誕生日のW企画も◎）'
  };

  var TYPE_LABEL = {
    cute:    '可愛い系',
    cool:    'クール系',
    funny:   'おもしろ系',
    stable:  'しっかり系',
    natural: '天然系'
  };

  var RELATION_QUOTE = {
    self:  ['お誕生日おめでとう！いつも幸せをありがとう。今年も素敵な1年になりますように。',
            '推しの誕生日に、心ばかりだけど受け取ってくれたら嬉しいです🎂',
            '今日という日を一緒にお祝いできて嬉しい。これからもずっと応援してます！'],
    sns:   ['#推しの誕生日 にちなんで、ささやかなお祝いを🎁 みんなも一緒にお祝いしよ〜',
            '今日は推しの誕生日！この1年も推しが幸せでありますように🎂✨',
            'HAPPY BIRTHDAY🎉 推しのおかげで毎日が彩られてます。ありがとう！'],
    group: ['みんなからの気持ちを込めて🎁 これからも一緒に応援していこうね！',
            'グループ一同からのお祝いです。いつもの感謝を形にしました🎂',
            'みんなの「ありがとう」を集めました。素敵な1年になりますように🌟'],
    event: ['オフ会の場で渡せる嬉しさ✨ 直接「おめでとう」を伝えられて感激です🎁',
            'イベントで会えた記念に、心ばかりのお祝いを。ずっと応援してます！',
            '今日この場でお祝いできることが何よりのプレゼントです🎂']
  };

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function generate() {
    var month   = parseInt(document.getElementById('month').value, 10);
    var type    = document.getElementById('type').value;
    var budget  = parseFloat(document.getElementById('budget').value);
    var relation= document.getElementById('relation').value;

    if (isNaN(budget) || budget < 500) {
      showErr('予算は500円以上で入力してください');
      return;
    }
    if (budget > 200000) {
      showErr('予算は200000円以下で入力してください');
      return;
    }

    saveState({ month: month, type: type, budget: budget, relation: relation });

    var pool = POOL[type] || [];
    var candidates = pool.filter(function (g) { return g.priceMin <= budget; });

    if (candidates.length < 3) {
      // 予算が低すぎる場合は priceMin が小さい順に上位を採用
      candidates = pool.slice().sort(function(a,b){ return a.priceMin - b.priceMin; }).slice(0, 3);
    }

    var picked = shuffle(candidates).slice(0, 3);
    var quotes = shuffle(RELATION_QUOTE[relation] || []);

    // 結論カード
    showResult('ok', picked[0].name, '推し（' + TYPE_LABEL[type] + '）の' + MONTH_HINT[month] + 'にぴったりの本命候補');

    // 3案リスト
    var html = picked.map(function (g, i) {
      var price = formatPriceRange(g.priceMin, budget);
      var quote = quotes[i % quotes.length];
      return ''
        + '<div class="gift-item">'
        +   '<div class="gift-name"><span class="gift-rank">候補' + (i+1) + '</span>' + escapeHtml(g.name) + '</div>'
        +   '<div class="gift-price">想定: ' + price + '</div>'
        +   '<div class="gift-reason">' + escapeHtml(g.reason) + '。</div>'
        +   '<div class="gift-quote" id="q' + i + '">' + escapeHtml(quote) + '</div>'
        +   '<button class="copy-btn" onclick="copyText(\'q' + i + '\')">SNS文をコピー</button>'
        + '</div>';
    }).join('');
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = 'block';

    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function formatPriceRange(min, budget) {
    var lo = Math.max(min, Math.floor(budget * 0.6));
    var hi = budget;
    if (lo >= hi) lo = Math.floor(hi * 0.7);
    return lo.toLocaleString('ja-JP') + '〜' + hi.toLocaleString('ja-JP') + '円';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function copyText(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var t = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(function(){ alert('SNS文をコピーしました'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = t; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); alert('SNS文をコピーしました'); } catch(e){}
      document.body.removeChild(ta);
    }
  }

  // ── localStorage ──
  var LS_KEY = 'oshi_birthday_gift_v1';
  function saveState(st) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(st)); } catch(e){}
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var st = JSON.parse(raw);
      if (st.month)    document.getElementById('month').value    = st.month;
      if (st.type)     document.getElementById('type').value     = st.type;
      if (st.budget)   document.getElementById('budget').value   = st.budget;
      if (st.relation) document.getElementById('relation').value = st.relation;
    } catch(e){}
  }
  loadState();
  </script>
