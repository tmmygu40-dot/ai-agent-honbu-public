<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="テーマやキーワードを入力するだけで、バズりやすいX（旧Twitter）投稿文を5パターン瞬時に生成。ワンタップコピーですぐ投稿できるSNS文章作成ツールです。">
  <title>ポスト文章ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 60px; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── パターンタブ ── */
    .pattern-tabs {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      margin: 0 auto 1rem; max-width: 600px; padding: 0 0.2rem;
    }
    .pattern-tab {
      flex: 1; min-width: 80px; padding: 0.55rem 0.3rem;
      font-size: 0.75rem; font-weight: 700; text-align: center;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .pattern-tab.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── 結果カード ── */
    .post-result {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .post-result.show { display: block; }
    .post-text {
      font-size: 0.95rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-all;
      padding: 0.8rem; background: var(--bg);
      border-radius: 9px; margin-bottom: 0.8rem;
      min-height: 60px;
    }
    .char-count {
      font-size: 0.72rem; color: var(--text-sub);
      text-align: right; margin-bottom: 0.6rem;
    }
    .char-count.over { color: var(--ng); font-weight: 700; }
    .btn-copy {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub);
    }
    .history-item:last-child { border-bottom: none; }
    .history-theme { font-weight: 600; color: var(--text); }
    .history-date { font-size: 0.72rem; color: var(--text-sub); margin-left: 0.5rem; }
    .btn-history-use {
      font-size: 0.72rem; color: var(--accent);
      background: none; border: 1px solid var(--accent);
      border-radius: 6px; padding: 0.2rem 0.5rem;
      cursor: pointer; margin-left: 0.5rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .post-result { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📝 ポスト文章ジェネレーター</h1>
    <p class="subtitle">テーマを入れるだけで、バズるX投稿文を5パターン瞬時に生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">テーマ入力</p>
    <div class="field">
      <label for="theme">テーマ・話題</label>
      <input type="text" id="theme" placeholder="例: 節約術、転職、朝活">
      <p class="hint">投稿したいテーマやキーワードを入力</p>
    </div>
    <div class="field">
      <label for="detail">補足（任意）</label>
      <textarea id="detail" rows="2" placeholder="例: 初心者向け、体験談風に"></textarea>
      <p class="hint">トーンや切り口の指定があれば</p>
    </div>
  </div>

  <!-- パターンタブ -->
  <div class="pattern-tabs" id="tabs">
    <button class="pattern-tab active" data-idx="0">共感型</button>
    <button class="pattern-tab" data-idx="1">驚き型</button>
    <button class="pattern-tab" data-idx="2">リスト型</button>
    <button class="pattern-tab" data-idx="3">体験談型</button>
    <button class="pattern-tab" data-idx="4">問いかけ型</button>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">投稿文を生成する</button>

  <!-- 結果 -->
  <div class="post-result" id="result">
    <p class="card-title" id="result-label">共感型</p>
    <div class="post-text" id="post-text"></div>
    <p class="char-count" id="char-count"></p>
    <button class="btn-copy" id="btn-copy" onclick="copyPost()">コピーする</button>
  </div>

  <!-- 全パターン一覧 -->
  <div class="card" id="all-patterns" style="display:none">
    <p class="card-title">5パターン一覧</p>
    <div id="all-list"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 履歴 -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">生成履歴</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、SNSマーケティングの一般的な投稿パターンを参考に、投稿文の下書き作成を支援するものです。生成された文章は適宜編集してご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── パターン定義 ──
  var PATTERNS = [
    {
      name: '共感型',
      desc: '読者の「あるある」に寄り添う',
      build: function(theme, detail) {
        var lines = [
          theme + 'について、正直に言います。',
          '',
          'みんな「' + theme + '」って難しいと思ってるけど、',
          '実はコツさえ掴めばシンプルなんです。',
          '',
          '私も最初は全然ダメだったけど、',
          '1つだけ意識を変えたら一気に変わった。',
          '',
          'それは「完璧を目指さない」こと。',
          '',
          detail ? '(' + detail + ')' : '',
          '',
          '#' + theme.replace(/\s+/g, '') + ' #共感'
        ];
        return lines.filter(function(l){ return l !== ''; }).join('\n');
      }
    },
    {
      name: '驚き型',
      desc: '意外な事実で目を引く',
      build: function(theme, detail) {
        var lines = [
          '【知らないと損】' + theme + 'の意外な事実',
          '',
          '実は' + theme + 'には、',
          'ほとんどの人が見落としているポイントがあります。',
          '',
          '知っている人はもう始めてる。',
          '知らない人は今日から意識するだけでOK。',
          '',
          detail ? detail + 'がカギです。' : 'ちょっとした工夫がカギです。',
          '',
          '気になる人はブクマ必須👇',
          '',
          '#' + theme.replace(/\s+/g, '') + ' #豆知識'
        ];
        return lines.join('\n');
      }
    },
    {
      name: 'リスト型',
      desc: '箇条書きで読みやすく',
      build: function(theme, detail) {
        var lines = [
          theme + 'で大事なこと5選',
          '',
          '① まず基本を押さえる',
          '② 小さく始める',
          '③ 毎日少しずつ続ける',
          '④ 人に教えるつもりで学ぶ',
          '⑤ 振り返りを習慣にする',
          '',
          detail ? '特に' + detail + 'は効果大。' : '特に③は効果絶大。',
          '',
          '保存して見返してね📌',
          '',
          '#' + theme.replace(/\s+/g, '') + ' #まとめ'
        ];
        return lines.join('\n');
      }
    },
    {
      name: '体験談型',
      desc: 'リアルなストーリーで引き込む',
      build: function(theme, detail) {
        var lines = [
          theme + 'を始めて3ヶ月。',
          '正直、最初の1週間は地獄でした。',
          '',
          '何度もやめようと思ったけど、',
          'ある日ふと「あ、できてる」って気づいた瞬間があって。',
          '',
          'そこからは楽しくなって、',
          '今では' + theme + 'なしの生活は考えられない。',
          '',
          detail ? detail : '始めるのに遅すぎることはない。',
          '',
          '#' + theme.replace(/\s+/g, '') + ' #体験談'
        ];
        return lines.join('\n');
      }
    },
    {
      name: '問いかけ型',
      desc: '質問でエンゲージメントを上げる',
      build: function(theme, detail) {
        var lines = [
          '質問です。',
          '',
          theme + 'について、あなたはどう思いますか？',
          '',
          'A: もっとやるべき',
          'B: 今のままでいい',
          'C: 正直よくわからない',
          '',
          detail ? '（' + detail + '）' : '',
          '',
          'リプで教えてください！',
          '結果はまた共有します📊',
          '',
          '#' + theme.replace(/\s+/g, '') + ' #アンケート'
        ];
        return lines.filter(function(l){ return l !== ''; }).join('\n');
      }
    }
  ];

  var currentIdx = 0;
  var currentPosts = [];
  var STORAGE_KEY = 'post_gen_history';

  // ── タブ切り替え ──
  document.getElementById('tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.pattern-tab');
    if (!tab) return;
    currentIdx = parseInt(tab.dataset.idx);
    document.querySelectorAll('.pattern-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    if (currentPosts.length > 0) showPost(currentIdx);
  });

  // ── 生成 ──
  function generate() {
    var theme = document.getElementById('theme').value.trim();
    if (!theme) {
      alert('テーマを入力してください');
      return;
    }
    var detail = document.getElementById('detail').value.trim();

    currentPosts = PATTERNS.map(function(p) {
      return { name: p.name, text: p.build(theme, detail) };
    });

    showPost(currentIdx);
    showAllPatterns();
    saveHistory(theme);
  }

  // ── 選択パターン表示 ──
  function showPost(idx) {
    var post = currentPosts[idx];
    document.getElementById('result-label').textContent = post.name;
    document.getElementById('post-text').textContent = post.text;
    var len = post.text.length;
    var cc = document.getElementById('char-count');
    cc.textContent = len + ' / 140文字';
    cc.className = 'char-count' + (len > 140 ? ' over' : '');
    document.getElementById('result').classList.add('show');
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーする';
    btn.classList.remove('copied');
  }

  // ── 全パターン一覧 ──
  function showAllPatterns() {
    var html = currentPosts.map(function(post, i) {
      return '<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">'
        + '<p style="font-weight:700;font-size:0.85rem;color:var(--accent);margin-bottom:0.4rem;">' + post.name + '</p>'
        + '<div style="font-size:0.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;padding:0.6rem;background:var(--bg);border-radius:8px;margin-bottom:0.5rem;">' + escHtml(post.text) + '</div>'
        + '<button class="btn-copy" style="font-size:0.78rem;padding:0.4rem 0.8rem;width:auto;" onclick="copySingle(' + i + ',this)">コピー</button>'
        + '</div>';
    }).join('');
    document.getElementById('all-list').innerHTML = html;
    document.getElementById('all-patterns').style.display = 'block';
  }

  // ── コピー ──
  function copyPost() {
    var text = currentPosts[currentIdx].text;
    copyToClipboard(text, document.getElementById('btn-copy'));
  }

  function copySingle(idx, btn) {
    copyToClipboard(currentPosts[idx].text, btn);
  }

  function copyToClipboard(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = 'コピーしました!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1500);
  }

  // ── 履歴 ──
  function saveHistory(theme) {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    history.unshift({ theme: theme, date: new Date().toLocaleString('ja-JP') });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (history.length === 0) {
      document.getElementById('history-card').style.display = 'none';
      return;
    }
    document.getElementById('history-card').style.display = 'block';
    document.getElementById('history-list').innerHTML = history.map(function(h) {
      return '<div class="history-item">'
        + '<span class="history-theme">' + escHtml(h.theme) + '</span>'
        + '<span class="history-date">' + escHtml(h.date) + '</span>'
        + '<button class="btn-history-use" onclick="useHistory(\'' + escAttr(h.theme) + '\')">再利用</button>'
        + '</div>';
    }).join('');
  }

  function useHistory(theme) {
    document.getElementById('theme').value = theme;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
  }

  // ── 初期化 ──
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
