<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い物メモ共有アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>買い物メモ</h1>

    <div class="input-area">
      <input type="text" id="item-input" placeholder="アイテムを入力..." autocomplete="off">
      <button id="add-btn">追加</button>
    </div>

    <ul id="item-list"></ul>

    <div class="actions" id="actions" style="display:none">
      <button id="clear-checked-btn" class="btn-secondary">チェック済みを削除</button>
    </div>

    <div class="share-area">
      <button id="share-btn">URLをコピーして共有</button>
      <p id="share-msg" class="share-msg"></p>
    </div>

    <div id="shared-notice" class="shared-notice" style="display:none">
      共有されたリストを表示中です。<button id="use-this-btn">このリストを使う</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
