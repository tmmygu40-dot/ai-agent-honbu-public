<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読書感想文 書き出しジェネレーター｜小中学生の宿題サポート</title>
  <meta name="description" content="本のタイトルと印象に残ったこと、感想のキーワードを選ぶだけで、読書感想文の書き出し文を3パターン（インパクト型・問いかけ型・場面描写型）すぐに生成。小中学生の宿題に役立つ無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.35rem; line-height: 1.55; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input[type="text"], .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 4.5rem; line-height: 1.5; }
    .field input[type="text"]:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.3rem; line-height: 1.5; }

    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      display: inline-flex; align-items: center;
      padding: 0.45rem 0.85rem;
      font-size: 0.86rem; font-weight: 600;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 999px;
      cursor: pointer; user-select: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip.on {
      background: var(--accent-light); color: var(--accent);
      border-color: var(--accent);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 結果カード */
    .pattern-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem; max-width: 600px;
    }
    .pattern-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.65rem; padding-bottom: 0.55rem;
      border-bottom: 1px solid var(--border);
    }
    .pattern-tag {
      font-size: 0.74rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.04em;
      background: var(--accent-light);
      padding: 0.25rem 0.6rem; border-radius: 999px;
    }
    .pattern-text {
      font-size: 1rem; line-height: 1.7;
      color: var(--text); white-space: pre-wrap;
      margin-bottom: 0.7rem;
    }
    .copy-btn {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }

    .results-wrap { display: none; }

    .reroll-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0.4rem auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer;
    }
    .reroll-btn:active { background: var(--accent-light); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem;
      font-size: 0.88rem; color: var(--ng);
      background: var(--ng-bg);
      border: 1.5px solid var(--ng);
      border-radius: 10px;
      display: none;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .reroll-btn, .copy-btn, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📖 読書感想文 書き出しジェネレーター</h1>
    <p class="subtitle">本のタイトルと感想のキーワードから、書き出しの1〜2文を3パターンすぐに作ります。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="title">本のタイトル</label>
      <input type="text" id="title" placeholder="例：走れメロス">
    </div>
    <div class="field">
      <label for="impression">いちばん心に残ったこと</label>
      <textarea id="impression" placeholder="例：友だちのために必死で走るところ／ぼくも勇気をもらった"></textarea>
      <p class="hint">短い言葉でOK。シーン・場面・気持ちなど。</p>
    </div>
    <div class="field">
      <label>感想のキーワード（タップで複数選べます）</label>
      <div class="chips" id="chips"></div>
      <p class="hint">どれも当てはまらないときは選ばなくてOK。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">書き出しを作る</button>

  <p class="err-msg" id="err"></p>

  <div class="results-wrap" id="results">
    <div class="pattern-card">
      <div class="pattern-head">
        <span class="pattern-tag" id="tag1">パターン1</span>
        <button class="copy-btn" onclick="copyText('out1', this)">コピー</button>
      </div>
      <p class="pattern-text" id="out1">—</p>
    </div>
    <div class="pattern-card">
      <div class="pattern-head">
        <span class="pattern-tag" id="tag2">パターン2</span>
        <button class="copy-btn" onclick="copyText('out2', this)">コピー</button>
      </div>
      <p class="pattern-text" id="out2">—</p>
    </div>
    <div class="pattern-card">
      <div class="pattern-head">
        <span class="pattern-tag" id="tag3">パターン3</span>
        <button class="copy-btn" onclick="copyText('out3', this)">コピー</button>
      </div>
      <p class="pattern-text" id="out3">—</p>
    </div>
    <button class="reroll-btn" onclick="reroll()">🔁 もう一回 別の書き出しを作る</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 このツールは、書き出しのきっかけを作るためのアイデア集です。最終的な感想文は、自分の言葉で書き直してから提出しましょう。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── キーワード ──
  var KEYWORDS = [
    '楽しかった',
    '感動した',
    'かっこよかった',
    '不思議だった',
    '勇気をもらった',
    '考えさせられた',
    'かなしかった',
    'びっくりした'
  ];

  // ── テンプレート（3パターン×複数案） ──
  // {title} = 本のタイトル / {imp} = 印象に残ったこと / {kw} = キーワード（連結）
  var TEMPLATES = {
    impact: [
      'わたしは「{title}」を読んで、心がぐっと動かされた。とくに{imp}の場面が、いまでも頭からはなれない。',
      '一気に読み終えたとき、わたしの中に残ったのは「{kw_or_default}」という気持ちだった。「{title}」は、そんな本だ。',
      'はじめは何気なく手に取った「{title}」。でも読み終えるころには、{imp}という思いでむねがいっぱいになっていた。',
      '「{title}」は、ただの物語ではなかった。{imp}という場面に、わたしはたしかに自分の気持ちを重ねていた。',
      'もし「{title}」を読んでいなかったら、わたしは{kw_or_default}という気持ちを知らないままだったかもしれない。',
      '本をとじたあと、しばらく動けなかった。「{title}」の{imp}が、心の中でずっと残っていたからだ。'
    ],
    question: [
      'みなさんは、{kw_or_default}と感じたことはありますか。「{title}」を読んで、わたしはその気持ちを思い出した。',
      '「{title}」を読み終えたとき、わたしの中にひとつの問いが生まれた。「もし自分が{imp}という場面にいたら、どうしただろう」と。',
      'なぜ、{imp}というシーンはこんなにも心に残るのだろう。「{title}」を読んでから、わたしはずっとそのことを考えている。',
      '「自分だったら、どうするだろう」――「{title}」の{imp}という場面で、わたしは何度もそう自分に問いかけた。',
      'みなさんは、本を読んで{kw_or_default}という気持ちになったことはありますか。「{title}」は、わたしにそれをくれた一冊だ。',
      'もし大切な人が「{title}」のような場面にいたら、わたしは何ができるだろう。{imp}という場面を読みながら、ずっとそんなことを考えていた。'
    ],
    scene: [
      '{imp}――この場面が、「{title}」の中でいちばん心に残った。読んでいるのに、まるで自分がその場にいるようだった。',
      'ページをめくる手が止まらなかった。「{title}」の{imp}という場面では、思わず{kw_or_default}という気持ちになった。',
      'しずかな夜、ふとんの中で「{title}」を読みすすめた。{imp}の場面までくると、心の中があたたかくなった。',
      '「{title}」を読んでいて、いちばんドキドキしたのは{imp}のところだった。本を読んでいるのに、息をのんでしまった。',
      'わたしの目に今もうかぶのは、「{title}」の{imp}という場面だ。物語が終わってからも、ずっとその景色が消えない。',
      '本を読みながら、わたしは「{title}」の世界の中にいた。{imp}という場面では、登場人物といっしょに{kw_or_default}という気持ちになっていた。'
    ]
  };

  var TAG_LABELS = {
    impact:   'パターン1：インパクト型',
    question: 'パターン2：問いかけ型',
    scene:    'パターン3：場面描写型'
  };

  var STORE_KEY = 'dokushokansoubun_kakidashi_v1';
  var selectedKws = [];

  // ── キーワードチップ初期化 ──
  function buildChips() {
    var box = document.getElementById('chips');
    box.innerHTML = '';
    KEYWORDS.forEach(function(kw){
      var el = document.createElement('span');
      el.className = 'chip';
      el.textContent = kw;
      el.onclick = function(){
        var idx = selectedKws.indexOf(kw);
        if (idx >= 0) { selectedKws.splice(idx, 1); el.classList.remove('on'); }
        else { selectedKws.push(kw); el.classList.add('on'); }
        save();
      };
      box.appendChild(el);
    });
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function fill(template, ctx) {
    return template
      .replace(/\{title\}/g, ctx.title)
      .replace(/\{imp\}/g, ctx.imp)
      .replace(/\{kw_or_default\}/g, ctx.kwOrDefault)
      .replace(/\{kw\}/g, ctx.kw);
  }

  function showErr(msg) {
    var box = document.getElementById('err');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
    document.getElementById('results').style.display = 'none';
  }
  function clearErr() {
    document.getElementById('err').style.display = 'none';
  }

  function generate() {
    var title = (document.getElementById('title').value || '').trim();
    var imp   = (document.getElementById('impression').value || '').trim();

    if (!title) { showErr('本のタイトルを入れてください。'); return; }
    if (!imp)   { showErr('心に残ったことを短くで良いので入れてください。'); return; }

    clearErr();

    var kwJoined;
    if (selectedKws.length === 0) kwJoined = '';
    else if (selectedKws.length === 1) kwJoined = selectedKws[0];
    else if (selectedKws.length === 2) kwJoined = selectedKws[0] + 'し、' + selectedKws[1];
    else kwJoined = selectedKws.slice(0, -1).join('、') + '、そして' + selectedKws[selectedKws.length - 1];

    var kwDefault = kwJoined || 'なんともいえない気持ち';

    var ctx = {
      title: title,
      imp: imp,
      kw: kwJoined,
      kwOrDefault: kwDefault
    };

    document.getElementById('tag1').textContent = TAG_LABELS.impact;
    document.getElementById('tag2').textContent = TAG_LABELS.question;
    document.getElementById('tag3').textContent = TAG_LABELS.scene;

    document.getElementById('out1').textContent = fill(pick(TEMPLATES.impact),   ctx);
    document.getElementById('out2').textContent = fill(pick(TEMPLATES.question), ctx);
    document.getElementById('out3').textContent = fill(pick(TEMPLATES.scene),    ctx);

    document.getElementById('results').style.display = 'block';

    // コピーボタンのリセット
    document.querySelectorAll('.copy-btn').forEach(function(b){
      b.classList.remove('copied'); b.textContent = 'コピー';
    });

    save();
  }

  function reroll() { generate(); }

  function copyText(id, btn) {
    var txt = document.getElementById(id).textContent;
    if (!txt || txt === '—') return;

    var done = function(){
      btn.classList.add('copied');
      btn.textContent = 'コピーしました';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = 'コピー';
      }, 1600);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done).catch(function(){ fallbackCopy(txt, done); });
    } else {
      fallbackCopy(txt, done);
    }
  }

  function fallbackCopy(txt, done) {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); }
    catch (e) { /* noop */ }
    document.body.removeChild(ta);
  }

  // ── localStorage ──
  function save() {
    try {
      var data = {
        title: document.getElementById('title').value,
        imp:   document.getElementById('impression').value,
        kws:   selectedKws.slice()
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    } catch (e) { /* noop */ }
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.title) document.getElementById('title').value = data.title;
      if (data.imp)   document.getElementById('impression').value = data.imp;
      if (Array.isArray(data.kws)) {
        selectedKws = data.kws.slice();
        document.querySelectorAll('.chip').forEach(function(el){
          if (selectedKws.indexOf(el.textContent) >= 0) el.classList.add('on');
        });
      }
    } catch (e) { /* noop */ }
  }

  // 入力欄の変更も保存
  document.addEventListener('DOMContentLoaded', function(){
    buildChips();
    load();
    document.getElementById('title').addEventListener('input', save);
    document.getElementById('impression').addEventListener('input', save);
  });
  </script>
