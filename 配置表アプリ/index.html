<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置表アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header class="header no-print">
      <h1>配置表アプリ</h1>
    </header>

    <!-- メインコンテンツ -->
    <main>
      <!-- 売り場・ポジション登録セクション -->
      <section class="section no-print">
        <h2>売り場・ポジション登録</h2>
        <div class="input-row">
          <input type="text" id="positionInput" placeholder="売り場・ポジション名を入力" maxlength="30">
          <button onclick="addPosition()">追加</button>
        </div>
        <ul id="positionList" class="tag-list"></ul>
      </section>

      <!-- スタッフ配置セクション -->
      <section class="section">
        <div class="section-header no-print">
          <h2>スタッフ配置</h2>
          <div class="date-row">
            <label for="dateInput">日付：</label>
            <input type="date" id="dateInput">
          </div>
        </div>
        <div id="assignmentArea">
          <p class="empty-msg" id="emptyMsg">売り場・ポジションを追加してください</p>
          <table id="assignmentTable" class="assignment-table" style="display:none;">
            <thead>
              <tr>
                <th>売り場 / ポジション</th>
                <th>担当スタッフ</th>
              </tr>
            </thead>
            <tbody id="assignmentBody"></tbody>
          </table>
        </div>
      </section>

      <!-- 操作ボタン -->
      <div class="btn-row no-print">
        <button class="btn-secondary" onclick="clearAssignments()">配置をクリア</button>
        <button class="btn-primary" onclick="printTable()">印刷する</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
