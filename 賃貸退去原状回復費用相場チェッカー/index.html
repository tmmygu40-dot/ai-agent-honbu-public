<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="入居年数・床面積・請求額を入力するだけで、原状回復費用の相場と請求妥当性を即チェック。国交省ガイドライン準拠の減価償却計算で過剰請求を見抜けます。">
  <title>賃貸退去原状回復費用相場チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>賃貸退去 原状回復費用相場チェッカー</h1>
    <p class="subtitle">入居年数と床面積を選ぶだけで請求妥当性を即チェック（国交省ガイドライン準拠）</p>
  </header>

  <!-- 入力カード：基本情報 -->
  <div class="card">
    <p class="card-title">物件情報</p>
    <div class="field">
      <label for="years">入居年数</label>
      <select id="years">
        <option value="">選択してください</option>
        <option value="1">1年以内</option>
        <option value="2">1〜2年</option>
        <option value="3">2〜3年</option>
        <option value="4">3〜4年</option>
        <option value="5">4〜5年</option>
        <option value="6">5〜6年</option>
        <option value="8">6〜8年</option>
        <option value="10">8〜10年</option>
        <option value="15">10〜15年</option>
        <option value="20">15年以上</option>
      </select>
    </div>
    <div class="field">
      <label for="area">床面積（平米）</label>
      <select id="area">
        <option value="">選択してください</option>
        <option value="20">〜20平米（ワンルーム）</option>
        <option value="30">20〜30平米（1K・1DK）</option>
        <option value="40">30〜40平米（1LDK）</option>
        <option value="50">40〜50平米（2DK・2LDK）</option>
        <option value="60">50〜60平米（2LDK・3DK）</option>
        <option value="70">60〜70平米（3LDK）</option>
        <option value="80">70平米以上（4LDK〜）</option>
      </select>
    </div>
    <div class="field">
      <label for="smoking">喫煙の有無</label>
      <select id="smoking">
        <option value="no">喫煙なし</option>
        <option value="yes">喫煙あり</option>
      </select>
    </div>
    <div class="field">
      <label for="pet">ペットの有無</label>
      <select id="pet">
        <option value="no">ペットなし</option>
        <option value="yes">ペットあり</option>
      </select>
    </div>
  </div>

  <!-- 入力カード：請求情報 -->
  <div class="card">
    <p class="card-title">請求情報</p>
    <div class="field">
      <label for="bill">請求された原状回復費用（円）</label>
      <input type="number" id="bill" placeholder="例: 150000" inputmode="numeric">
      <p class="hint">退去時に提示された金額を入力してください</p>
    </div>
    <div class="field">
      <label for="deposit">敷金（円）</label>
      <input type="number" id="deposit" placeholder="例: 100000" inputmode="numeric" value="0">
      <p class="hint">入居時に預けた敷金の額（0でもOK）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">チェックする</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">相場内訳（推定）</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 減価償却カード -->
  <div class="card" id="depreciation-card" style="display:none">
    <p class="card-title">減価償却による負担割合の目安</p>
    <table class="detail-table"><tbody id="dep-body"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">アドバイス</p>
    <div id="advice-body" style="font-size:0.88rem;color:var(--text-sub);line-height:1.6;"></div>
  </div>

  <!-- 結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、国土交通省「原状回復をめぐるトラブルとガイドライン（再改訂版）」を参考に、目安として使いやすく整理しています。実際の負担額は契約内容や物件の状態により異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var ENABLE_RESULT_QA = true;

  var EMOJI_MSG = {
    ok:   { e: '😌', t: '請求額は相場の範囲内です' },
    warn: { e: '🤔', t: '少し高めかも…内訳を確認しましょう' },
    ng:   { e: '😱', t: '過剰請求の可能性があります！' }
  };

  var QA = {
    ok: [
      { q: '相場通りなら払わないといけない？', a: '通常の使用による損耗は貸主負担が原則です。特約がなければ、経年劣化分は払う必要がありません。' },
      { q: '敷金は戻ってくる？', a: '原状回復費用を差し引いた残額は返還されるのが原則です。返還されない場合は内訳の提示を求めましょう。' },
      { q: '念のため確認すべきことは？', a: '請求書の項目ごとの単価と数量を確認し、契約書の特約条項と照合しておくと安心です。' }
    ],
    warn: [
      { q: 'どの項目が高い？', a: '上の内訳と請求書を照らし合わせて、相場より大幅に高い項目がないか確認しましょう。' },
      { q: '交渉できる？', a: 'ガイドラインの相場を根拠に、管理会社や大家に内訳の説明を求めることができます。' },
      { q: '相談窓口は？', a: '消費生活センター（188番）や法テラス（0570-078374）に無料で相談できます。' }
    ],
    ng: [
      { q: 'まず何をすべき？', a: '請求書の写しを保管し、項目ごとの単価・数量・根拠の説明を書面で求めましょう。' },
      { q: '払わなくていい費用は？', a: '通常使用による経年劣化（壁紙の日焼け、畳の摩耗等）は貸主負担が原則です。' },
      { q: '専門家に相談すべき？', a: '消費生活センター、法テラス、または弁護士に相談をおすすめします。少額訴訟（60万円以下）も選択肢です。' }
    ]
  };

  /* ── 相場データ（1平米あたりの単価目安） ── */
  var MARKET = {
    // ハウスクリーニング相場（面積帯ごとの固定額）
    cleaning: { 20: 25000, 30: 30000, 40: 35000, 50: 40000, 60: 50000, 70: 60000, 80: 70000 },
    // 壁紙張替え単価（1平米あたり）
    wallpaper_unit: 1200,
    // 壁紙の面積係数（床面積に対する壁・天井の面積倍率）
    wallpaper_ratio: 2.5,
    // 床（フローリング）補修 1平米あたり
    floor_unit: 1500,
    // 畳表替え 1枚あたり
    tatami_unit: 5000,
    // エアコンクリーニング 1台
    aircon: 12000,
    // 鍵交換
    key_change: 15000,
    // 喫煙による追加（壁紙全面張替え加算率）
    smoking_add: 1.0,
    // ペットによる追加（壁紙・床補修加算率）
    pet_add: 0.5
  };

  /* ── 減価償却：耐用年数テーブル ── */
  var USEFUL_LIFE = {
    wallpaper: 6,   // 壁紙（クロス）
    carpet: 6,      // カーペット
    cushion_floor: 6, // クッションフロア
    tatami: 6,      // 畳表
    flooring: 22,   // フローリング（建物に準ずる）
    equipment: 6,   // 設備機器
    unit_bath: 22   // ユニットバス
  };

  function calcDepreciation(years, usefulLife) {
    if (years >= usefulLife) return 0.1; // 最低残存価値10%
    var remaining = 1 - (years / usefulLife);
    return Math.max(0.1, remaining);
  }

  function calc() {
    var years = parseInt(document.getElementById('years').value);
    var area = parseInt(document.getElementById('area').value);
    var bill = parseFloat(document.getElementById('bill').value);
    var deposit = parseFloat(document.getElementById('deposit').value) || 0;
    var smoking = document.getElementById('smoking').value === 'yes';
    var pet = document.getElementById('pet').value === 'yes';

    if (!years || !area || isNaN(bill)) {
      showErr('入居年数・床面積・請求額をすべて入力してください');
      return;
    }

    // ── 相場計算 ──
    var cleaning = MARKET.cleaning[area] || 40000;

    // 壁紙：減価償却考慮
    var wallArea = area * MARKET.wallpaper_ratio;
    var wallFull = wallArea * MARKET.wallpaper_unit;
    var wallDepRate = calcDepreciation(years, USEFUL_LIFE.wallpaper);
    var wallCost = Math.round(wallFull * wallDepRate);
    if (smoking) wallCost = Math.round(wallFull); // 喫煙は全額借主負担の可能性

    // 床：減価償却考慮
    var floorFull = area * MARKET.floor_unit;
    var floorDepRate = calcDepreciation(years, USEFUL_LIFE.flooring);
    var floorCost = Math.round(floorFull * floorDepRate * 0.3); // 全面ではなく一部補修想定
    if (pet) floorCost = Math.round(floorFull * floorDepRate * 0.6); // ペットは広範囲

    // エアコン
    var airconCost = MARKET.aircon;

    // 鍵交換（特約がなければ貸主負担だが、特約で借主負担も多い）
    var keyCost = MARKET.key_change;

    // 合計相場
    var marketTotal = cleaning + wallCost + floorCost + airconCost + keyCost;
    var marketLow = Math.round(marketTotal * 0.7);
    var marketHigh = Math.round(marketTotal * 1.3);

    // ── 妥当性判定 ──
    var ratio = bill / marketTotal;
    var level, evalText;
    if (ratio <= 1.2) {
      level = 'ok';
      evalText = '請求額は相場の範囲内';
    } else if (ratio <= 1.8) {
      level = 'warn';
      evalText = '相場よりやや高め';
    } else {
      level = 'ng';
      evalText = '過剰請求の可能性あり';
    }

    var diffFromMarket = bill - marketTotal;
    var diffText = diffFromMarket > 0 ? '+' + fmt(diffFromMarket) + '円' : fmt(diffFromMarket) + '円';

    // 敷金との差額
    var outOfPocket = Math.max(0, bill - deposit);

    showResult(level,
      evalText,
      '相場目安 ' + fmt(marketLow) + '〜' + fmt(marketHigh) + '円 に対して、請求額 ' + fmt(bill) + '円（相場比 ' + Math.round(ratio * 100) + '%）'
    );
    document.getElementById('re').textContent = evalText;

    // ── 内訳表示 ──
    showDetail([
      ['ハウスクリーニング', fmt(cleaning) + '円'],
      ['壁紙（減価償却後）', fmt(wallCost) + '円'],
      ['床補修（減価償却後）', fmt(floorCost) + '円'],
      ['エアコン洗浄', fmt(airconCost) + '円'],
      ['鍵交換（特約時）', fmt(keyCost) + '円'],
      ['相場合計（目安）', fmt(marketTotal) + '円', true],
      ['請求額', fmt(bill) + '円'],
      ['相場との差額', diffText, true],
      ['敷金', fmt(deposit) + '円'],
      ['実質自己負担', fmt(outOfPocket) + '円', true]
    ]);

    // ── 減価償却カード ──
    var depCard = document.getElementById('depreciation-card');
    var depBody = document.getElementById('dep-body');
    depBody.innerHTML = [
      depRow('壁紙（クロス）', USEFUL_LIFE.wallpaper, years),
      depRow('カーペット', USEFUL_LIFE.carpet, years),
      depRow('クッションフロア', USEFUL_LIFE.cushion_floor, years),
      depRow('畳表', USEFUL_LIFE.tatami, years),
      depRow('フローリング', USEFUL_LIFE.flooring, years),
      depRow('設備機器', USEFUL_LIFE.equipment, years)
    ].join('');
    depCard.style.display = 'block';

    // ── アドバイスカード ──
    var advCard = document.getElementById('advice-card');
    var advBody = document.getElementById('advice-body');
    var advices = [];
    if (level === 'ng') {
      advices.push('<b>請求書の項目別内訳を書面で求めましょう。</b>管理会社・大家は説明義務があります。');
      advices.push('国交省「原状回復をめぐるトラブルとガイドライン」を根拠に交渉できます。');
      advices.push('消費生活センター（局番なし188）への相談も有効です。');
    } else if (level === 'warn') {
      advices.push('請求書の各項目が相場と大きくずれていないか確認しましょう。');
      advices.push('特に壁紙の張替え範囲と単価が妥当かチェックしてください。');
      advices.push('入居年数 ' + years + '年の場合、経年劣化分は貸主負担が原則です。');
    } else {
      advices.push('請求額は相場の範囲内です。念のため請求書の項目を確認しておくと安心です。');
      advices.push('敷金からの差し引きの場合は、精算書の残額返還時期も確認しましょう。');
    }
    if (smoking) advices.push('喫煙による汚損は「借主の故意・過失」として全額借主負担になる場合が多いです。');
    if (pet) advices.push('ペットによる傷・臭いは借主負担となる場合が多いです。範囲を限定して交渉しましょう。');
    advBody.innerHTML = advices.map(function(a){ return '<p style="margin-bottom:0.6rem;">' + a + '</p>'; }).join('');
    advCard.style.display = 'block';

    showQA(level);
    saveToStorage(years, area, bill, deposit, smoking, pet);
  }

  function depRow(name, life, years) {
    var rate = calcDepreciation(years, life);
    var pct = Math.round(rate * 100);
    return '<tr><td>' + name + '（耐用' + life + '年）</td><td style="text-align:right;font-weight:600;">借主負担 ' + pct + '%</td></tr>';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showQA(level) {
    if (!ENABLE_RESULT_QA) return;
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = 'block';
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('depreciation-card').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  /* ── localStorage ── */
  function saveToStorage(years, area, bill, deposit, smoking, pet) {
    try {
      localStorage.setItem('restoration_checker', JSON.stringify({
        years: years, area: area, bill: bill, deposit: deposit,
        smoking: smoking, pet: pet, saved: new Date().toISOString()
      }));
    } catch(e) {}
  }
  function loadFromStorage() {
    try {
      var d = JSON.parse(localStorage.getItem('restoration_checker'));
      if (!d) return;
      document.getElementById('years').value = d.years || '';
      document.getElementById('area').value = d.area || '';
      document.getElementById('bill').value = d.bill || '';
      document.getElementById('deposit').value = d.deposit || 0;
      document.getElementById('smoking').value = d.smoking ? 'yes' : 'no';
      document.getElementById('pet').value = d.pet ? 'yes' : 'no';
    } catch(e) {}
  }
  loadFromStorage();
  </script>
