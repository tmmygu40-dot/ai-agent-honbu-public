<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="フォロワー数とバズ度を入れるだけで、あなたの今月の人気確度がサクッと分かる診断ツールです。バズる確度を見える化して、SNSマーケティング計画に活かしましょう。">
  <title>📊 バズ度メーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field input[type="range"] { padding: 0; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field .range-value { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-align: center; margin-top: 0.5rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->

</head>
<body>

  <header class="app-header">
    <h1>📊 バズ度メーター</h1>
    <p class="subtitle">フォロワー数とバズ度から、あなたの今月の人気確度をサクッと診断。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="followers">フォロワー数</label>
      <input type="number" id="followers" placeholder="例: 5000" min="0">
      <p class="hint">現在のフォロワー数を入力してください</p>
    </div>
    <div class="field">
      <label for="buzz">バズ度（0〜100）</label>
      <input type="range" id="buzz" min="0" max="100" value="50">
      <p class="range-value"><span id="buzzValue">50</span>%</p>
      <p class="hint">スライダーを動かしてバズ度を選択（0=バズなし、100=最高にバズ中）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">人気確度を診断</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">人気確度</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、SNS運用の目安として作られています。実際のバズの可能性は、コンテンツの質・投稿時間・トレンド等多くの要因に影響されます。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // リアルタイムでバズ度スライダーの値を表示
  document.getElementById('buzz').addEventListener('input', function() {
    document.getElementById('buzzValue').textContent = this.value;
  });

  // localStorage へのアクセス
  function saveData() {
    var data = {
      followers: document.getElementById('followers').value,
      buzz: document.getElementById('buzz').value
    };
    localStorage.setItem('buzz-meter-data', JSON.stringify(data));
  }

  function loadData() {
    var stored = localStorage.getItem('buzz-meter-data');
    if (stored) {
      var data = JSON.parse(stored);
      document.getElementById('followers').value = data.followers || '';
      document.getElementById('buzz').value = data.buzz || 50;
      document.getElementById('buzzValue').textContent = data.buzz || 50;
    }
  }

  // ページ読み込み時にデータを復元
  window.addEventListener('DOMContentLoaded', loadData);

  function calc() {
    var followers = parseFloat(document.getElementById('followers').value);
    var buzz = parseFloat(document.getElementById('buzz').value);

    if (isNaN(followers) || followers < 0) {
      showErr('フォロワー数を0以上で入力してください');
      return;
    }

    // 人気確度の計算：(フォロワー数 / 10000) * (バズ度 / 100) * 100
    var certainty = Math.min(100, (followers / 10000) * (buzz / 100) * 100);
    certainty = Math.max(0, certainty);
    var rounded = certainty.toFixed(1);

    // レベル判定
    var level = certainty < 10 ? 'ng' : certainty < 30 ? 'warn' : 'ok';
    var eval_msg = '';
    if (level === 'ok') {
      eval_msg = '🎉 バズる可能性高い！この勢いで行けば人気確度が上がりますよ。';
    } else if (level === 'warn') {
      eval_msg = '🤔 可能性はあります。バズ度を上げるコンテンツ工夫が大切です。';
    } else {
      eval_msg = '📍 今は基盤構築中。フォロワーを増やしてから狙いましょう。';
    }

    var note = '';
    if (followers === 0) {
      note = '※ フォロワーがいない場合、人気確度は算出されません';
    } else if (buzz === 0) {
      note = '※ バズ度が0の場合、バイラルは期待できません';
    } else {
      note = '※ この結果は目安です。実際のバズは多くの要因に左右されます。';
    }

    showResult(level, rounded + '%', eval_msg, note);
    saveData();
    showDetail([
      ['フォロワー数',   followers.toLocaleString('ja-JP')],
      ['バズ度',         buzz + '%'],
      ['人気確度',       rounded + '%', true],
    ]);
  }

  function showResult(level, val, eval_msg, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = eval_msg;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }
  </script>
