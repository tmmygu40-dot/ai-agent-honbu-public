<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🌱 植物管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="card" id="register-section">
      <h2>植物を登録する</h2>
      <div class="form-group">
        <label for="plant-name">植物の名前</label>
        <input type="text" id="plant-name" placeholder="例：パキラ" maxlength="30">
      </div>
      <div class="form-group">
        <label for="plant-type">種類・メモ</label>
        <input type="text" id="plant-type" placeholder="例：観葉植物・日当たり好き" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="water-interval">水やり間隔（日）</label>
          <input type="number" id="water-interval" min="1" max="365" value="3">
        </div>
        <div class="form-group">
          <label for="fertilizer-interval">肥料間隔（日）</label>
          <input type="number" id="fertilizer-interval" min="1" max="365" value="30">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="last-water">最終水やり日</label>
          <input type="date" id="last-water">
        </div>
        <div class="form-group">
          <label for="last-fertilizer">最終肥料日</label>
          <input type="date" id="last-fertilizer">
        </div>
      </div>
      <button id="add-btn" class="btn btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-bar">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="urgent">要ケア</button>
      <button class="filter-btn" data-filter="water">水やり近い</button>
      <button class="filter-btn" data-filter="fertilizer">肥料近い</button>
    </section>

    <!-- 植物一覧 -->
    <section id="plant-list">
      <div id="empty-msg" class="empty-msg">植物がまだ登録されていません。</div>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2>記録する</h2>
      <p id="modal-plant-name" class="modal-name"></p>
      <div class="modal-btns">
        <button id="record-water-btn" class="btn btn-water">水やりした</button>
        <button id="record-fertilizer-btn" class="btn btn-fertilizer">肥料をあげた</button>
      </div>
      <hr>
      <h3>手動で日付を変更</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="edit-water">最終水やり日</label>
          <input type="date" id="edit-water">
        </div>
        <div class="form-group">
          <label for="edit-fertilizer">最終肥料日</label>
          <input type="date" id="edit-fertilizer">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="edit-water-interval">水やり間隔（日）</label>
          <input type="number" id="edit-water-interval" min="1" max="365">
        </div>
        <div class="form-group">
          <label for="edit-fertilizer-interval">肥料間隔（日）</label>
          <input type="number" id="edit-fertilizer-interval" min="1" max="365">
        </div>
      </div>
      <div class="modal-action-btns">
        <button id="save-edit-btn" class="btn btn-primary">保存する</button>
        <button id="delete-btn" class="btn btn-danger">削除する</button>
        <button id="close-modal-btn" class="btn btn-secondary">閉じる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
