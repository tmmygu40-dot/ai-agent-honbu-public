<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>期限管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>期限管理アプリ</h1>

    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="品目名（例：エアコン保証）" maxlength="50">
        <input type="date" id="itemDate">
        <button id="addBtn">追加</button>
      </div>
      <p id="formError" class="error-msg"></p>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録済み一覧</h2>
        <span id="totalCount" class="badge"></span>
      </div>
      <ul id="itemList"></ul>
      <p id="emptyMsg" class="empty-msg">まだ登録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
