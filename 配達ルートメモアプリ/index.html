<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配達ルートメモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>配達ルートメモ</h1>

    <div class="summary" id="summary">
      <span id="total-count">0件</span>中<span id="done-count">0件</span>完了
    </div>

    <form id="add-form" class="add-form">
      <div class="form-row">
        <input type="text" id="input-name" placeholder="訪問先名" required>
        <input type="text" id="input-address" placeholder="住所（任意）">
        <input type="number" id="input-qty" placeholder="件数" min="1" value="1">
      </div>
      <button type="submit">追加</button>
    </form>

    <div class="actions">
      <button id="btn-clear-done" class="btn-secondary">完了済みを削除</button>
      <button id="btn-clear-all" class="btn-danger">全件削除</button>
    </div>

    <ul id="route-list" class="route-list"></ul>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
