<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勉強進捗管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>📚 勉強進捗管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>教材を登録</h2>
      <div class="form-group">
        <label for="bookName">教材名</label>
        <input type="text" id="bookName" placeholder="例：英単語帳 Target 1900">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="totalPages">総ページ数</label>
          <input type="number" id="totalPages" placeholder="例：300" min="1">
        </div>
        <div class="form-group">
          <label for="dailyGoal">1日の目標ページ</label>
          <input type="number" id="dailyGoal" placeholder="例：10" min="1">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- 教材一覧 -->
    <section class="list-section">
      <h2>教材一覧</h2>
      <div id="bookList" class="book-list">
        <p class="empty-msg">教材が登録されていません</p>
      </div>
    </section>
  </div>

  <!-- 進捗更新モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <div class="form-group">
        <label for="currentPage">現在のページ数</label>
        <input type="number" id="currentPage" min="0">
      </div>
      <div class="modal-actions">
        <button id="saveBtn" class="btn-primary">保存</button>
        <button id="cancelBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>
  <div id="overlay" class="overlay hidden"></div>

  <script src="script.js"></script>
</body>
</html>
