<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勘定科目逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.2rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 検索カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 0.8rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    /* 検索バー */
    .search-wrap { position: relative; margin-bottom: 0.8rem; }
    .search-wrap input {
      width: 100%; padding: 0.75rem 2.5rem 0.75rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .search-wrap input:focus { border-color: var(--accent); background: #fff; }
    .search-wrap .clear-btn {
      position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-sub); padding: 0.2rem;
      display: none;
    }

    /* カテゴリボタン */
    .cat-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .cat-btn {
      padding: 0.35rem 0.75rem; font-size: 0.78rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .cat-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* タブ */
    .tab-wrap { display: flex; max-width: 640px; margin: 0 auto 1rem; }
    .tab-btn {
      flex: 1; padding: 0.65rem; font-size: 0.88rem; font-weight: 700;
      border: 1.5px solid var(--border); background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); border-right: none; }
    .tab-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 件数表示 */
    .result-count { max-width: 640px; margin: 0 auto 0.6rem; font-size: 0.8rem; color: var(--text-sub); padding: 0 0.2rem; }

    /* 結果リスト */
    .result-list { max-width: 640px; margin: 0 auto; }

    /* 逆引きカード */
    .item-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
      position: relative;
    }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .item-expense { font-size: 1rem; font-weight: 800; color: var(--text); }
    .item-cat-tag {
      font-size: 0.7rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid #f4c07040; border-radius: 10px;
      padding: 0.2rem 0.55rem; white-space: nowrap; margin-left: 0.5rem;
    }
    .item-account {
      font-size: 1.05rem; font-weight: 900; color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .item-account-label { font-size: 0.72rem; font-weight: 600; color: var(--text-sub); margin-right: 0.4rem; }
    .jiwake-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 0.5rem; }
    .jiwake-table th {
      background: #f7f4f0; color: var(--text-sub); font-weight: 700;
      padding: 0.3rem 0.4rem; border: 1px solid var(--border); text-align: center; font-size: 0.72rem;
    }
    .jiwake-table td {
      padding: 0.35rem 0.5rem; border: 1px solid var(--border); color: var(--text);
    }
    .jiwake-table .dr { background: #fff8ee; font-weight: 700; }
    .jiwake-table .cr { background: #f0f9ff; }
    .item-note { font-size: 0.75rem; color: var(--text-sub); line-height: 1.5; }
    .fav-btn {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; cursor: pointer; font-size: 1.4rem;
      -webkit-tap-highlight-color: transparent;
    }

    /* 空メッセージ */
    .empty-msg { text-align: center; padding: 3rem 1rem; color: var(--text-sub); font-size: 0.88rem; }

    /* 戻るリンク */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .cat-btn { font-size: 0.72rem; padding: 0.3rem 0.6rem; }
    }
  </style>

  <div class="tab-wrap">

    </div>
    <div class="cat-wrap" id="catWrap"></div>
  </div>

  <!-- 件数 -->
  <p class="result-count" id="resultCount"></p>

  <!-- 結果 -->
  <div class="result-list" id="resultList"></div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  { cat:'修繕・保険', expense:'賠償責任保険料', account:'保険料', dr:'保険料', cr:'普通預金 / 未払金', desc:'(摘要) 賠償責任保険料', note:'' },

  // 手数料・その他
  { cat:'手数料・その他', expense:'銀行振込手数料', account:'支払手数料', dr:'支払手数料', cr:'普通預金', desc:'(摘要) 振込手数料', note:'取引ごとに発生する手数料は支払手数料で計上。' },
  { cat:'手数料・その他', expense:'税理士・社労士への報酬', account:'支払手数料', dr:'支払手数料', cr:'普通預金 / 未払金', desc:'(摘要) 税理士顧問料 ○月分', note:'源泉徴収が必要（報酬の10.21%）。' },
  { cat:'手数料・その他', expense:'会計ソフト・クラウド経費精算システム', account:'支払手数料', dr:'支払手数料', cr:'普通預金 / 未払金', desc:'(摘要) 会計ソフト利用料 ○月分', note:'' },
  { cat:'手数料・その他', expense:'業界団体・商工会の会費', account:'諸会費', dr:'諸会費', cr:'現金 / 普通預金', desc:'(摘要) ○○協会 年会費', note:'入会金は原則損金算入できない場合があるため要確認。' },
  { cat:'手数料・その他', expense:'書籍・専門誌購入', account:'新聞図書費', dr:'新聞図書費', cr:'現金', desc:'(摘要) 業務関連書籍購入', note:'業務に直接関連する書籍に限る。' },
  { cat:'手数料・その他', expense:'新聞・業界誌購読料', account:'新聞図書費', dr:'新聞図書費', cr:'普通預金 / 未払金', desc:'(摘要) 業界誌購読料 ○月分', note:'' },
  { cat:'手数料・その他', expense:'消耗品費（雑費的なもの）', account:'雑費', dr:'雑費', cr:'現金', desc:'(摘要) 雑費', note:'金額が少なく他に適当な科目がない場合に使う。頻繁に使いすぎないよう注意。' },
  { cat:'手数料・その他', expense:'融資の利息', account:'支払利息', dr:'支払利息', cr:'普通預金', desc:'(摘要) 借入金利息 ○月分', note:'元本返済は「借入金」の減少で処理。利息のみが費用。' },
];

// カテゴリ一覧（重複排除・順序固定）
const CATS = ['すべて', '旅費交通費', '通信費', '消耗品費', '接待交際費', '広告宣伝費', '給与・福利厚生', '地代家賃・光熱費', '修繕・保険', '手数料・その他'];

// ─── 状態 ───
let currentTab = 'all';
let currentCat = 'すべて';
let currentQuery = '';
let favorites = loadFavs();

function loadFavs() {
  try { return JSON.parse(localStorage.getItem('kanjyo_favs') || '[]'); }
  catch(e) { return []; }
}
function saveFavs() {
  localStorage.setItem('kanjyo_favs', JSON.stringify(favorites));
}
function isFav(expense) { return favorites.indexOf(expense) !== -1; }
function toggleFav(expense) {
  var idx = favorites.indexOf(expense);
  if (idx === -1) favorites.push(expense);
  else favorites.splice(idx, 1);
  saveFavs();
  render();
}

// ─── カテゴリボタン生成 ───
function buildCatButtons() {
  var wrap = document.getElementById('catWrap');
  wrap.innerHTML = CATS.map(function(c) {
    return '<button class="cat-btn' + (c === currentCat ? ' active' : '') + '" onclick="selectCat(\'' + c + '\')">' + c + '</button>';
  }).join('');
}

function selectCat(cat) {
  currentCat = cat;
  buildCatButtons();
  render();
}

function onSearch() {
  var input = document.getElementById('searchInput');
  currentQuery = input.value.trim();
  document.getElementById('clearBtn').style.display = currentQuery ? '' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('clearBtn').style.display = 'none';
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').className = 'tab-btn' + (tab === 'all' ? ' active' : '');
  document.getElementById('tab-fav').className = 'tab-btn' + (tab === 'fav' ? ' active' : '');
  document.getElementById('search-area').style.display = tab === 'all' ? '' : 'none';
  render();
}

// ─── 描画 ───
function render() {
  var list = document.getElementById('resultList');
  var count = document.getElementById('resultCount');

  var items;
  if (currentTab === 'fav') {
    items = ITEMS.filter(function(it) { return isFav(it.expense); });
  } else {
    items = ITEMS.filter(function(it) {
      var catOk = currentCat === 'すべて' || it.cat === currentCat;
      var q = currentQuery.toLowerCase();
      var queryOk = !q || it.expense.toLowerCase().indexOf(q) !== -1
                       || it.account.toLowerCase().indexOf(q) !== -1
                       || it.cat.toLowerCase().indexOf(q) !== -1
                       || it.note.toLowerCase().indexOf(q) !== -1
                       || it.desc.toLowerCase().indexOf(q) !== -1;
      return catOk && queryOk;
    });
  }

  count.textContent = currentTab === 'fav' ? 'お気に入り ' + items.length + '件' : '該当 ' + items.length + '件';

  if (items.length === 0) {
    list.innerHTML = '<div class="empty-msg">' + (currentTab === 'fav' ? '★ お気に入りはまだありません' : '該当する勘定科目が見つかりませんでした') + '</div>';
    return;
  }

  list.innerHTML = items.map(function(it) {
    var fav = isFav(it.expense);
    return '<div class="item-card">'
      + '<button class="fav-btn" onclick="toggleFav(\'' + esc(it.expense) + '\')" title="お気に入り">' + (fav ? '★' : '☆') + '</button>'
      + '<div class="item-header">'
      + '<span class="item-expense">' + esc2(it.expense) + '</span>'
      + '<span class="item-cat-tag">' + esc2(it.cat) + '</span>'
      + '</div>'
      + '<div class="item-account"><span class="item-account-label">勘定科目</span>' + esc2(it.account) + '</div>'
      + '<table class="jiwake-table">'
      + '<thead><tr><th>借方（Dr）</th><th>貸方（Cr）</th><th>摘要例</th></tr></thead>'
      + '<tbody><tr><td class="dr">' + esc2(it.dr) + '</td><td class="cr">' + esc2(it.cr) + '</td><td>' + esc2(it.desc) + '</td></tr></tbody>'
      + '</table>'
      + (it.note ? '<p class="item-note">📝 ' + esc2(it.note) + '</p>' : '')
      + '</div>';
  }).join('');
}

function esc(s) { return s.replace(/'/g, "\\'"); }
function esc2(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 初期化 ───
buildCatButtons();
render();
</script>
