<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>クレーム管理</h1>
      <p class="subtitle">受付・原因・対策を記録して再発防止に活かす</p>
    </header>

    <section class="form-section">
      <h2>新規クレーム登録</h2>
      <form id="claimForm">
        <div class="form-group">
          <label for="date">受付日 <span class="required">*</span></label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="customer">顧客名 <span class="required">*</span></label>
          <input type="text" id="customer" placeholder="例：山田太郎" required>
        </div>
        <div class="form-group">
          <label for="content">クレーム内容 <span class="required">*</span></label>
          <textarea id="content" rows="3" placeholder="クレームの詳細を入力" required></textarea>
        </div>
        <div class="form-group">
          <label for="cause">原因</label>
          <textarea id="cause" rows="2" placeholder="クレームの原因を入力"></textarea>
        </div>
        <div class="form-group">
          <label for="action">対策</label>
          <textarea id="action" rows="2" placeholder="再発防止のための対策を入力"></textarea>
        </div>
        <div class="form-group">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
            <option value="保留">保留</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>クレーム一覧 <span id="totalCount" class="count-badge">0</span></h2>
        <div class="filter-group">
          <select id="filterStatus">
            <option value="all">すべて</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
            <option value="保留">保留</option>
          </select>
        </div>
      </div>
      <div id="claimList" class="claim-list">
        <p class="empty-message">クレームが登録されていません</p>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3>クレーム詳細</h3>
      <div id="modalBody"></div>
      <button class="btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
