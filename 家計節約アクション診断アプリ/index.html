<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計節約アクション診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    @media (max-width: 420px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field { margin-bottom: 0; }
    .field label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem;
    }
    .field label .avg { font-size: 0.7rem; font-weight: 400; color: #aaa; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* 節約アクションリスト */
    .action-list { list-style: none; }
    .action-item {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.85rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .action-item:last-child { border-bottom: none; }
    .action-rank {
      flex-shrink: 0;
      width: 2rem; height: 2rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #fff;
    }
    .action-rank.rank-1 { background: #e07b00; }
    .action-rank.rank-2 { background: #b45309; }
    .action-rank.rank-3 { background: #78716c; }
    .action-rank.rank-n { background: #d4ccc5; }
    .action-body { flex: 1; }
    .action-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
    .action-saving {
      font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem;
    }
    .action-saving.over { color: var(--ng); }
    .action-saving.avg  { color: var(--ok); }
    .action-tip { font-size: 0.78rem; color: var(--text-sub); line-height: 1.4; }

    /* 達成バー */
    .progress-wrap { margin-top: 0.75rem; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.3rem;
    }
    .progress-bar-bg {
      height: 10px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--accent); transition: width 0.6s ease;
    }
    .progress-bar-fill.achieved { background: var(--ok); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>家計節約アクション診断</h1>
    <p class="subtitle">費目別金額を入れるだけ → 月1万円節約への優先アクションを即提示</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">今月の支出を入力（円）</p>
    <div class="field-grid" id="fields"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">節約アクションを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">節約余地の合計</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <div class="progress-wrap" id="pw" style="display:none">
      <div class="progress-label">
        <span>月1万円節約の達成度</span>
        <span id="pct-label">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="pbar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- アクションリスト -->
  <div class="card" id="actions" style="display:none">
    <p class="card-title">節約アクション優先リスト</p>
    <ul class="action-list" id="action-list"></ul>
  </div>

  <!-- 内訳テーブル -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">費目別 実績 vs 目安</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var ITEMS = [
    { key: 'light',    label: '光熱費',       avg: 15000, tip: '電力会社の見直し・節電家電への切替えで月2,000〜5,000円削減できる場合があります。' },
    { key: 'food',     label: '食費（自炊）', avg: 30000, tip: '週の食材まとめ買い・献立計画で食材ロスを減らすと月3,000〜8,000円節約できます。' },
    { key: 'comm',     label: '通信費',       avg: 8000,  tip: '格安SIMへの乗り換えで月3,000〜6,000円削減できる場合があります。' },
    { key: 'eat_out',  label: '外食費',       avg: 15000, tip: '週1〜2回の外食を自炊に替えるだけで月5,000〜10,000円節約できます。' },
    { key: 'sub',      label: 'サブスク',     avg: 5000,  tip: '使用頻度の低いサービスを1〜2本解約するだけで月2,000〜4,000円削減できます。' },
    { key: 'daily',    label: '日用品',       avg: 8000,  tip: 'まとめ買い・プライベートブランド活用で月1,000〜3,000円節約できます。' },
    { key: 'transport',label: '交通費',       avg: 10000, tip: '定期券の最適化・自転車活用で月2,000〜5,000円削減できる場合があります。' },
    { key: 'other',    label: 'その他',       avg: 10000, tip: '衝動買い防止に「24時間ルール」（欲しいものを一晩置いてから判断）が効果的です。' },
  ];

  var LS_KEY = 'kakeisetsuyaku_v1';

  function buildFields() {
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) {}
    var html = '';
    ITEMS.forEach(function(it) {
      var val = saved[it.key] !== undefined ? saved[it.key] : '';
      html += '<div class="field">'
            + '<label for="' + it.key + '">' + it.label
            + '<span class="avg">目安 ' + fmt(it.avg) + '円</span></label>'
            + '<input type="number" id="' + it.key + '" placeholder="0" min="0" value="' + val + '">'
            + '</div>';
    });
    document.getElementById('fields').innerHTML = html;
  }

  function diagnose() {
    var data = {};
    var allEmpty = true;
    var results = [];
    var totalOver = 0;

    ITEMS.forEach(function(it) {
      var raw = document.getElementById(it.key).value;
      var v = raw === '' ? null : parseFloat(raw);
      data[it.key] = v !== null ? v : '';
      if (v !== null) {
        allEmpty = false;
        var over = v - it.avg;
        results.push({ item: it, actual: v, over: over });
        if (over > 0) totalOver += over;
      }
    });

    if (allEmpty) {
      showErr('少なくとも1つの費目を入力してください');
      return;
    }

    // save
    var toSave = {};
    ITEMS.forEach(function(it) { toSave[it.key] = data[it.key]; });
    try { localStorage.setItem(LS_KEY, JSON.stringify(toSave)); } catch(e) {}

    // sort by over desc (only over-avg items), then show all
    var overItems = results.filter(function(r) { return r.over > 0; });
    overItems.sort(function(a, b) { return b.over - a.over; });
    var avgItems = results.filter(function(r) { return r.over <= 0; });

    var target = 10000;
    var achieved = Math.min(totalOver, target);
    var pct = Math.min(Math.round(totalOver / target * 100), 100);

    var level, evalText, noteText;
    if (totalOver <= 0) {
      level = 'ok'; evalText = '節約の余地は少ないです'; noteText = '全費目が目安以内です。引き続きキープしましょう。';
    } else if (totalOver >= target) {
      level = 'ng'; evalText = '月1万円節約が十分可能です！'; noteText = '下のアクションから優先順位の高いものを1〜2つ実践しましょう。';
    } else {
      level = 'warn'; evalText = '節約余地あり。もう一工夫で目標達成！'; noteText = '下のアクションを実践して月1万円節約を目指しましょう。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = '節約余地 ' + fmt(totalOver) + '円/月';
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = noteText;

    var pw = document.getElementById('pw');
    if (totalOver > 0) {
      pw.style.display = '';
      document.getElementById('pct-label').textContent = pct + '%';
      var bar = document.getElementById('pbar');
      bar.style.width = pct + '%';
      bar.className = 'progress-bar-fill' + (pct >= 100 ? ' achieved' : '');
    } else {
      pw.style.display = 'none';
    }

    // action list
    var acEl = document.getElementById('actions');
    var rankClasses = ['rank-1', 'rank-2', 'rank-3'];
    if (overItems.length > 0) {
      var liHtml = '';
      overItems.forEach(function(r, i) {
        var rc2 = i < 3 ? rankClasses[i] : 'rank-n';
        liHtml += '<li class="action-item">'
                + '<div class="action-rank ' + rc2 + '">' + (i + 1) + '</div>'
                + '<div class="action-body">'
                + '<div class="action-name">' + r.item.label + '</div>'
                + '<div class="action-saving over">目安より +' + fmt(r.over) + '円 オーバー</div>'
                + '<div class="action-tip">' + r.item.tip + '</div>'
                + '</div></li>';
      });
      avgItems.forEach(function(r) {
        liHtml += '<li class="action-item">'
                + '<div class="action-rank rank-n">✓</div>'
                + '<div class="action-body">'
                + '<div class="action-name">' + r.item.label + '</div>'
                + '<div class="action-saving avg">目安以内 (' + fmt(r.actual) + '円 / 目安' + fmt(r.item.avg) + '円)</div>'
                + '</div></li>';
      });
      document.getElementById('action-list').innerHTML = liHtml;
      acEl.style.display = '';
    } else {
      acEl.style.display = 'none';
    }

    // detail table
    var dbHtml = '';
    results.forEach(function(r) {
      var overTxt = r.over > 0 ? '<span style="color:var(--ng)">+' + fmt(r.over) + '円</span>'
                  : r.over < 0 ? '<span style="color:var(--ok)">' + fmt(r.over) + '円</span>'
                  : '±0円';
      dbHtml += '<tr>'
              + '<td>' + r.item.label + '</td>'
              + '<td style="text-align:right">' + fmt(r.actual) + '円</td>'
              + '<td style="text-align:right;color:var(--text-sub)">目安 ' + fmt(r.item.avg) + '円</td>'
              + '<td style="text-align:right">' + overTxt + '</td>'
              + '</tr>';
    });
    if (dbHtml) {
      document.getElementById('db').innerHTML = dbHtml;
      document.getElementById('detail').style.display = '';
    } else {
      document.getElementById('detail').style.display = 'none';
    }
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = '';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('pw').style.display = 'none';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  buildFields();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
