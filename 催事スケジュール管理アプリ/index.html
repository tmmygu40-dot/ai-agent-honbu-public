<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>催事スケジュール管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>催事スケジュール管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>催事を登録</h2>
      <div class="form-group">
        <label for="eventName">催事名 <span class="required">*</span></label>
        <input type="text" id="eventName" placeholder="例：秋の大感謝祭" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="startDate">開始日 <span class="required">*</span></label>
          <input type="date" id="startDate">
        </div>
        <div class="form-group">
          <label for="endDate">終了日 <span class="required">*</span></label>
          <input type="date" id="endDate">
        </div>
      </div>
      <div class="form-group">
        <label for="staff">担当者 <span class="required">*</span></label>
        <input type="text" id="staff" placeholder="例：田中" maxlength="30">
      </div>
      <div class="form-group">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="備考・場所など" maxlength="100">
      </div>
      <button class="btn-primary" onclick="addEvent()">登録する</button>
    </section>

    <!-- 絞り込み -->
    <section class="filter-section">
      <h2>一覧</h2>
      <div class="filter-row">
        <label for="filterYear">年：</label>
        <select id="filterYear" onchange="renderList()"></select>
        <label for="filterMonth">月：</label>
        <select id="filterMonth" onchange="renderList()">
          <option value="0">すべて</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </div>
    </section>

    <!-- 一覧 -->
    <div id="eventList" class="event-list"></div>
    <div id="emptyMessage" class="empty-message" style="display:none;">登録された催事はありません</div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
