<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時給引き上げ影響シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 2カラム入力 */
    .field-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem;
    }
    .field-row .field { margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 必要売上カード ── */
    .sales-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .sales-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .sales-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; color: var(--accent); line-height: 1.1; margin-bottom: 0.4rem; }
    .sales-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>時給引き上げ影響シミュレーター</h1>
    <p class="subtitle">最低賃金アップで人件費がいくら増えるか・必要売上を即試算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">時給・スタッフ情報</p>
    <div class="field-row">
      <div class="field">
        <label for="wage_now">現行時給（円）</label>
        <input type="number" id="wage_now" placeholder="例: 1000" min="0">
      </div>
      <div class="field">
        <label for="wage_new">新時給（円）</label>
        <input type="number" id="wage_new" placeholder="例: 1050" min="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="staff_count">スタッフ数（人）</label>
        <input type="number" id="staff_count" placeholder="例: 5" min="1">
      </div>
      <div class="field">
        <label for="hours_month">月間労働時間（時間/人）</label>
        <input type="number" id="hours_month" placeholder="例: 120" min="0">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">利益率</p>
    <div class="field">
      <label for="margin">粗利率（%）</label>
      <input type="number" id="margin" placeholder="例: 60" min="1" max="100" value="60">
      <p class="hint">売上に対する粗利の割合。飲食業は約60〜70%が目安です。</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">人件費増加を計算する</button>

  <!-- 人件費増加カード -->
  <div class="result-card" id="result">
    <p class="result-label">月間 人件費増加額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 必要売上カード -->
  <div class="sales-card" id="sales">
    <p class="sales-label">増加分をカバーするために必要な売上増</p>
    <p class="sales-value" id="sv">—</p>
    <p class="sales-note" id="sn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'jikyuSimulator_v1';

  // localStorage から復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (saved.wage_now)     document.getElementById('wage_now').value     = saved.wage_now;
      if (saved.wage_new)     document.getElementById('wage_new').value     = saved.wage_new;
      if (saved.staff_count)  document.getElementById('staff_count').value  = saved.staff_count;
      if (saved.hours_month)  document.getElementById('hours_month').value  = saved.hours_month;
      if (saved.margin)       document.getElementById('margin').value       = saved.margin;
    } catch(e) {}
  })();

  // 入力変更時に localStorage 保存
  ['wage_now','wage_new','staff_count','hours_month','margin'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', saveInputs);
  });

  function saveInputs() {
    try {
      var data = {
        wage_now:    document.getElementById('wage_now').value,
        wage_new:    document.getElementById('wage_new').value,
        staff_count: document.getElementById('staff_count').value,
        hours_month: document.getElementById('hours_month').value,
        margin:      document.getElementById('margin').value
      };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function calc() {
    var wageNow    = parseFloat(document.getElementById('wage_now').value);
    var wageNew    = parseFloat(document.getElementById('wage_new').value);
    var staffCount = parseFloat(document.getElementById('staff_count').value);
    var hoursMonth = parseFloat(document.getElementById('hours_month').value);
    var margin     = parseFloat(document.getElementById('margin').value);

    if (isNaN(wageNow) || isNaN(wageNew) || isNaN(staffCount) || isNaN(hoursMonth) || isNaN(margin)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (wageNew < wageNow) {
      showErr('新時給は現行時給以上の値を入力してください');
      return;
    }
    if (margin <= 0 || margin > 100) {
      showErr('粗利率は1〜100の範囲で入力してください');
      return;
    }

    var costNow       = wageNow * staffCount * hoursMonth;
    var costNew       = wageNew * staffCount * hoursMonth;
    var costIncrease  = costNew - costNow;
    var perHead       = (wageNew - wageNow) * hoursMonth;
    var salesIncrease = costIncrease / (margin / 100);
    var wageUpRate    = wageNow > 0 ? ((wageNew - wageNow) / wageNow * 100).toFixed(1) : 0;

    // 結果カードの色分け
    var level = costIncrease === 0 ? 'ok'
              : costIncrease < 50000 ? 'warn'
              : 'ng';

    var note = costIncrease === 0
      ? '時給変更なし。人件費に変化はありません。'
      : '時給 +' + (wageNew - wageNow) + '円（' + wageUpRate + '%アップ）の影響です。';

    showResult(level, '+' + fmt(costIncrease) + ' 円', note);

    // 必要売上カード
    if (costIncrease > 0) {
      document.getElementById('sv').textContent = '+' + fmt(salesIncrease) + ' 円';
      document.getElementById('sn').textContent =
        '粗利率 ' + margin + '% で計算。この売上増が確保できれば利益水準を維持できます。';
      document.getElementById('sales').style.display = 'block';
    } else {
      document.getElementById('sales').style.display = 'none';
    }

    showDetail([
      ['現行時給',          fmt(wageNow) + ' 円'],
      ['新時給',            fmt(wageNew) + ' 円'],
      ['時給差',            '+' + fmt(wageNew - wageNow) + ' 円'],
      ['スタッフ数',        staffCount + ' 人'],
      ['月間労働時間/人',   hoursMonth + ' 時間'],
      ['現行 月間人件費',   fmt(costNow) + ' 円'],
      ['新 月間人件費',     fmt(costNew) + ' 円'],
      ['人件費増加額',      '+' + fmt(costIncrease) + ' 円', true],
      ['1人あたり増加額',   '+' + fmt(perHead) + ' 円/月'],
      ['粗利率',            margin + ' %'],
      ['必要売上増加額',    '+' + fmt(salesIncrease) + ' 円', true],
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('sales').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
