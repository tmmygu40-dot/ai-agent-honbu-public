<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス敬語クイズ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-main {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-choice {
      display: block; width: 100%;
      margin-bottom: 0.8rem; padding: 1rem;
      font-size: 1rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }
    .btn-choice:hover { border-color: var(--accent); background: var(--accent-light); }
    .btn-choice.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .btn-choice.wrong   { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .btn-choice:disabled { cursor: not-allowed; opacity: 0.85; }

    /* ── 問題カード ── */
    .q-number { font-size: 0.75rem; color: var(--text-sub); font-weight: 700; margin-bottom: 0.5rem; }
    .q-text { font-size: 1.05rem; line-height: 1.6; font-weight: 600; margin-bottom: 1.2rem; }
    .q-note { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 1rem; }

    /* ── フィードバック ── */
    .feedback {
      display: none; border-radius: var(--radius);
      padding: 1rem 1.1rem; margin-bottom: 1rem; font-size: 0.88rem; line-height: 1.6;
    }
    .feedback.ok { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--ok); }
    .feedback.ng { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--ng); }
    .feedback .fb-title { font-size: 1rem; font-weight: 800; margin-bottom: 0.4rem; }
    .feedback .fb-explain { color: var(--text); font-size: 0.85rem; margin-top: 0.5rem; }

    /* ── 進捗バー ── */
    .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 1rem; }
    .progress-bar { height: 6px; border-radius: 99px; background: var(--accent); transition: width 0.3s; }

    /* ── スコアカード ── */
    .score-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.8rem; margin-bottom: 1rem;
    }
    .score-cell {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.9rem; text-align: center;
    }
    .score-cell .sc-label { font-size: 0.72rem; color: var(--text-sub); font-weight: 700; margin-bottom: 0.3rem; }
    .score-cell .sc-val { font-size: 1.6rem; font-weight: 900; color: var(--accent); }

    /* ── 結果判定 ── */
    .result-verdict {
      text-align: center; padding: 1.2rem 1rem;
      border-radius: var(--radius); margin-bottom: 1rem;
      font-size: 1.1rem; font-weight: 800;
    }
    .result-verdict.ok   { background: var(--ok-bg);   color: var(--ok);   border: 2px solid var(--ok); }
    .result-verdict.warn { background: var(--warn-bg); color: var(--warn); border: 2px solid var(--warn); }
    .result-verdict.ng   { background: var(--ng-bg);   color: var(--ng);   border: 2px solid var(--ng); }

    /* ── 履歴 ── */
    .hist-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-score { font-weight: 700; }
    .hist-score.ok   { color: var(--ok); }
    .hist-score.warn { color: var(--warn); }
    .hist-score.ng   { color: var(--ng); }

    /* ── 回答履歴 ── */
    .ans-row {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem;
    }
    .ans-row:last-child { border-bottom: none; }
    .ans-q { font-weight: 600; margin-bottom: 0.2rem; }
    .ans-result { color: var(--text-sub); }
    .ans-result .correct { color: var(--ok); font-weight: 700; }
    .ans-result .wrong   { color: var(--ng); font-weight: 700; }

    /* ── 非表示 ── */
    .hidden { display: none; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>ビジネス敬語クイズ</h1>
    <p class="subtitle">仕事でよく使う敬語の正誤を○×で判定しよう</p>
  </header>

  <!-- スタート画面 -->
  <div id="screen-start">
    <div class="card">
      <p class="card-title">クイズについて</p>
      <p style="font-size:0.9rem;line-height:1.7;color:var(--text-sub);">
        ビジネスでよく使う敬語・丁寧語の表現が<strong style="color:var(--text)">正しいか間違いか</strong>を○×で答えてください。<br>
        全20問・各問題に解説つきです。
      </p>
      <div style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;">
        <div style="background:var(--bg);border-radius:9px;padding:0.8rem;text-align:center;">
          <div style="font-size:0.7rem;color:var(--text-sub);font-weight:700;">問題数</div>
          <div style="font-size:1.4rem;font-weight:900;color:var(--accent);">20問</div>
        </div>
        <div style="background:var(--bg);border-radius:9px;padding:0.8rem;text-align:center;">
          <div style="font-size:0.7rem;color:var(--text-sub);font-weight:700;">合格ライン</div>
          <div style="font-size:1.4rem;font-weight:900;color:var(--ok);">80%</div>
        </div>
      </div>
    </div>
    <button class="btn-main" onclick="startQuiz()">クイズをスタート</button>

    <!-- 過去の成績 -->
    <div class="card" id="hist-card">
      <p class="card-title">過去の成績</p>
      <div id="hist-list"><p style="font-size:0.85rem;color:var(--text-sub);">まだ記録がありません</p></div>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="hidden">
    <div class="card">
      <div class="q-number" id="q-number"></div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="q-note">この表現は正しい敬語ですか？</div>
      <div class="q-text" id="q-text"></div>
      <div id="feedback" class="feedback"></div>
      <button class="btn-choice" id="btn-maru" onclick="answer(true)">○ 正しい</button>
      <button class="btn-choice" id="btn-batu" onclick="answer(false)">× 間違い</button>
      <button class="btn-main hidden" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="hidden">
    <div class="card">
      <p class="card-title">クイズ結果</p>
      <div class="score-grid">
        <div class="score-cell">
          <div class="sc-label">正解数</div>
          <div class="sc-val" id="res-correct">—</div>
        </div>
        <div class="score-cell">
          <div class="sc-label">正答率</div>
          <div class="sc-val" id="res-rate">—</div>
        </div>
      </div>
      <div class="result-verdict" id="res-verdict"></div>
    </div>

    <button class="btn-main" onclick="startQuiz()">もう一度挑戦する</button>

    <!-- 回答履歴 -->
    <div class="card">
      <p class="card-title">今回の回答まとめ</p>
      <div id="ans-list"></div>
    </div>

    <a class="back-link" href="../index.html">← トップへ戻る</a>
  </div>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── 問題データ（20問）──
  var QUESTIONS = [
    {
      text: '「先生、こちらがご説明した資料になります」',
      correct: false,
      explain: '「なります」は変化を表す言葉です。資料は変化するものではないため「でございます」または「です」が正しい表現です。「〜になります」の誤用は非常に多いので注意しましょう。'
    },
    {
      text: '「おっしゃる通りでございます」',
      correct: true,
      explain: '「おっしゃる」は「言う」の尊敬語、「ございます」は「ある」の丁寧語です。目上の方への返答として正しい表現です。'
    },
    {
      text: '「お客様がいらっしゃいました」',
      correct: true,
      explain: '「いらっしゃる」は「いる・来る・行く」の尊敬語です。お客様が来た場面での正しい表現です。'
    },
    {
      text: '「ご担当者様はおられますか？」',
      correct: false,
      explain: '「おられる」は「いる」の尊敬語として使われますが、標準的なビジネス敬語では「いらっしゃいますか？」が適切です。「おられる」は地域によっては問題ありませんが、ビジネス標準では避けたほうが無難です。'
    },
    {
      text: '「先ほど田中部長が申されました」',
      correct: false,
      explain: '「申す」は謙譲語です。目上の田中部長の動作には尊敬語の「おっしゃいました」を使うのが正しい表現です。'
    },
    {
      text: '「ただいま担当者に申し伝えます」',
      correct: true,
      explain: '「申し伝える」は「伝える」の謙譲語です。自分（または自社側）の動作に対して謙譲語を使うのは正しい表現です。'
    },
    {
      text: '「資料を拝見させていただきました」',
      correct: false,
      explain: '「拝見する」はすでに謙譲語のため「させていただく」は重複（二重敬語）になります。「拝見いたしました」または「拝見しました」が正しい表現です。'
    },
    {
      text: '「ご連絡いただきありがとうございます」',
      correct: true,
      explain: '「いただく」は「もらう」の謙譲語です。相手から連絡をもらったことへの感謝として正しい表現です。'
    },
    {
      text: '「よろしかったでしょうか？」',
      correct: false,
      explain: '確認や了承を求める際に「よろしかったでしょうか」と過去形にするのは不自然です。現在の確認なので「よろしいでしょうか？」が正しい表現です。'
    },
    {
      text: '「部長がご説明いたします」',
      correct: false,
      explain: '「いたす」は謙譲語です。目上の部長の動作には謙譲語は使えません。「部長がご説明されます（くださいます）」または「部長がご説明なさいます」が正しい表現です。'
    },
    {
      text: '「お電話いただけますでしょうか」',
      correct: true,
      explain: '「いただく」（謙譲語）＋「でしょうか」（丁寧）で、相手に電話をお願いする丁寧な表現として正しい敬語です。'
    },
    {
      text: '「私が参ります」',
      correct: true,
      explain: '「参る」は「行く・来る」の謙譲語です。自分の動作に謙譲語を使うのは正しい表現です。'
    },
    {
      text: '「こちらがメニューになります」',
      correct: false,
      explain: '「なります」は変化を表す言葉です。メニューは変化するものではないため「こちらがメニューでございます（です）」が正しい表現です。'
    },
    {
      text: '「ご返信をお待ちしております」',
      correct: true,
      explain: '「お待ちする」は「待つ」の謙譲語です。相手の返信を待つ自分の状態を謙譲語で表した正しい表現です。'
    },
    {
      text: '「社長がおっしゃいました」',
      correct: true,
      explain: '「おっしゃる」は「言う」の尊敬語です。目上の社長の発言に尊敬語を使うのは正しい表現です。'
    },
    {
      text: '「ご連絡させていただきます」',
      correct: true,
      explain: '「させていただく」は本来「相手の許可が必要な行為」に使います。ビジネスでは相手へ連絡するという謙虚な表現として広く受け入れられています。'
    },
    {
      text: '「先生、ご苦労様でございます」',
      correct: false,
      explain: '「ご苦労様」は目下の方をねぎらう言葉です。先生など目上の方には「お疲れ様でございます」が正しい表現です。'
    },
    {
      text: '「お名前をお伺いしてもよろしいでしょうか」',
      correct: true,
      explain: '「伺う」は「聞く・訪ねる」の謙譲語、「よろしいでしょうか」は丁寧な問いかけです。初対面などで名前を聞く正しい表現です。'
    },
    {
      text: '「ご確認のほど、よろしくお願い申し上げます」',
      correct: true,
      explain: '「申し上げる」は「言う」の謙譲語の最丁寧語です。メールの締めなどでよく使われる正しい敬語表現です。'
    },
    {
      text: '「山田部長は今席を外していらっしゃいます」',
      correct: true,
      explain: '「いらっしゃる」は「いる」の尊敬語です。社外の方に対して社内の上司の行動を尊敬語で表すのは正しいです（社外の人への外部敬語として許容される表現）。'
    }
  ];

  // ── 状態 ──
  var quizOrder = [];
  var currentIdx = 0;
  var answers = [];
  var STORAGE_KEY = 'keigo_quiz_history';

  // ── スタート ──
  function startQuiz() {
    quizOrder = shuffle(QUESTIONS.map(function(_, i){ return i; }));
    currentIdx = 0;
    answers = [];
    showScreen('quiz');
    showQuestion();
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // ── 問題表示 ──
  function showQuestion() {
    var q = QUESTIONS[quizOrder[currentIdx]];
    var total = QUESTIONS.length;
    document.getElementById('q-number').textContent = (currentIdx + 1) + ' / ' + total + ' 問目';
    document.getElementById('progress-bar').style.width = ((currentIdx / total) * 100) + '%';
    document.getElementById('q-text').textContent = q.text;

    var fb = document.getElementById('feedback');
    fb.style.display = 'none'; fb.className = 'feedback';

    var bm = document.getElementById('btn-maru');
    var bb = document.getElementById('btn-batu');
    bm.className = 'btn-choice'; bm.disabled = false;
    bb.className = 'btn-choice'; bb.disabled = false;
    document.getElementById('btn-next').classList.add('hidden');
  }

  // ── 回答 ──
  function answer(userSays) {
    var qIdx = quizOrder[currentIdx];
    var q = QUESTIONS[qIdx];
    var isCorrect = (userSays === q.correct);

    answers.push({ qIdx: qIdx, userSays: userSays, isCorrect: isCorrect });

    var bm = document.getElementById('btn-maru');
    var bb = document.getElementById('btn-batu');
    bm.disabled = true; bb.disabled = true;

    // ボタンに色付け
    if (q.correct === true) {
      bm.classList.add('correct');
    } else {
      bb.classList.add('correct');
    }
    if (!isCorrect) {
      if (userSays === true) bm.classList.add('wrong');
      else bb.classList.add('wrong');
    }

    // フィードバック
    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (isCorrect ? 'ok' : 'ng');
    fb.innerHTML = '<div class="fb-title">' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</div>'
      + '<div>正しい表現は：<strong>' + (q.correct ? '○ 正しい' : '× 間違い') + '</strong></div>'
      + '<div class="fb-explain">💡 ' + q.explain + '</div>';
    fb.style.display = 'block';

    document.getElementById('btn-next').classList.remove('hidden');

    if (currentIdx + 1 >= QUESTIONS.length) {
      document.getElementById('btn-next').textContent = '結果を見る';
    } else {
      document.getElementById('btn-next').textContent = '次の問題へ →';
    }
  }

  // ── 次へ ──
  function nextQuestion() {
    currentIdx++;
    if (currentIdx >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  // ── 結果表示 ──
  function showResult() {
    showScreen('result');
    var total = answers.length;
    var correct = answers.filter(function(a){ return a.isCorrect; }).length;
    var rate = Math.round(correct / total * 100);

    document.getElementById('res-correct').textContent = correct + ' / ' + total;
    document.getElementById('res-rate').textContent = rate + '%';

    var verdict = document.getElementById('res-verdict');
    if (rate >= 80) {
      verdict.className = 'result-verdict ok';
      verdict.textContent = '合格！ビジネス敬語の使い方はバッチリです';
    } else if (rate >= 60) {
      verdict.className = 'result-verdict warn';
      verdict.textContent = 'もう少し！苦手な敬語を重点的に復習しましょう';
    } else {
      verdict.className = 'result-verdict ng';
      verdict.textContent = '要復習。解説をよく読んで再チャレンジしましょう';
    }

    // 回答まとめ
    var html = answers.map(function(a, i) {
      var q = QUESTIONS[a.qIdx];
      return '<div class="ans-row">'
        + '<div class="ans-q">Q' + (i + 1) + '. ' + q.text + '</div>'
        + '<div class="ans-result"><span class="' + (a.isCorrect ? 'correct' : 'wrong') + '">'
        + (a.isCorrect ? '✓ 正解' : '✗ 不正解') + '</span>'
        + ' ／ 正解：' + (q.correct ? '○ 正しい' : '× 間違い') + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('ans-list').innerHTML = html;

    // localStorage 保存
    saveHistory(correct, total, rate);
    renderHistory();
  }

  // ── 履歴 ──
  function saveHistory(correct, total, rate) {
    var hist = loadHistory();
    hist.unshift({
      date: new Date().toLocaleDateString('ja-JP'),
      correct: correct,
      total: total,
      rate: rate
    });
    if (hist.length > 10) hist = hist.slice(0, 10);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); } catch(e) {}
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
  }

  function renderHistory() {
    var hist = loadHistory();
    var el = document.getElementById('hist-list');
    if (!hist.length) {
      el.innerHTML = '<p style="font-size:0.85rem;color:var(--text-sub);">まだ記録がありません</p>';
      return;
    }
    el.innerHTML = hist.map(function(h) {
      var cls = h.rate >= 80 ? 'ok' : h.rate >= 60 ? 'warn' : 'ng';
      return '<div class="hist-row">'
        + '<span>' + h.date + '</span>'
        + '<span class="hist-score ' + cls + '">' + h.correct + '/' + h.total + '問（' + h.rate + '%）</span>'
        + '</div>';
    }).join('');
  }

  // ── 画面切替 ──
  function showScreen(name) {
    ['start','quiz','result'].forEach(function(s){
      document.getElementById('screen-' + s).classList.toggle('hidden', s !== name);
    });
  }

  // 初期化
  renderHistory();
  </script>
</body>
</html>
