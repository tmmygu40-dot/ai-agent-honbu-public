<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="投稿タイプを選ぶだけでバズりやすいX投稿を3パターン自動生成。朝ネタ・日中つぶやき・夜の本音など、シーン別に最適なテンプレを30秒で選べて、すぐコピーできます。">
  <title>バズるX投稿テンプレ30秒自動生成｜投稿作成支援ツール</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── テンプレカード ── */
    .template-card { display: none; }
    .template-card.show { display: block; }
    .template-item {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .template-item:last-child { margin-bottom: 0; }
    .template-num { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; margin-bottom: 0.3rem; }
    .template-text {
      font-size: 0.95rem; color: var(--text);
      line-height: 1.6; word-break: break-word;
      margin-bottom: 0.7rem; min-height: 80px;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.6rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-copy:active { opacity: 0.8; }
    .copy-feedback { font-size: 0.7rem; color: var(--accent); margin-top: 0.3rem; text-align: center; min-height: 1rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .template-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>バズるX投稿テンプレ30秒自動生成</h1>
    <p class="subtitle">シーン別テンプレを選ぶだけで、バズりやすい投稿を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ステップ1：投稿タイプを選ぶ</p>
    <div class="field">
      <label for="typeSelect">投稿タイプ</label>
      <select id="typeSelect">
        <option value="">選んでください...</option>
        <option value="morning">🌅 朝の励ましネタ</option>
        <option value="daytime">☀️ 日中のつぶやき</option>
        <option value="night">🌙 夜の本音</option>
        <option value="fan">💕 推し活応援</option>
        <option value="advice">💭 悩み相談返答</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">テンプレを生成</button>

  <!-- テンプレ表示 -->
  <div class="template-card" id="templateCard">
    <div id="templatesContainer"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // テンプレデータ
  const templates = {
    morning: [
      "朝日が昇った 🌅\n新しい一日の始まり\nあなたの「今日やること」から始めよう\n小さく始まるすべてが、大きな成果になる",
      "おはよう☀️\nきょうも頑張るあなたへ\nできない日があってもいい\nできた日があれば、それで十分",
      "朝の過ごし方が、その日全体を決める📝\n5分でいいから、やりたいこと1つ決めよう\nそれだけで、きょうは最高の日になる"
    ],
    daytime: [
      "昼間だけど、疲れた\nそんな時は一呼吸 🫁\nコーヒー1杯、水を1杯\n自分を褒めてあげようぜ",
      "仕事に追われてる感じ😅\nでも立ち止まって見てみると\nすれば進む、が3個もある✨\n完璧は目指さない、進むだけ",
      "午後のスランプ時間⏰\nここから挽回のチャンス\nあと2時間、頑張ろ💪"
    ],
    night: [
      "夜中の思考ループから抜け出した🌙\nやっぱり寝る前のスマホは危険\nでも今夜気づけたから明日は変わる",
      "疲れた一日だったけど\n寝る前に思う\nあれもできた、これもできた\n明日もいけるな、と",
      "夜中のモヤモヤを言語化できた✍️\nこれが明日への一歩\n寝よう、明日は新しい日だ"
    ],
    fan: [
      "推しのために頑張ってる自分、好きだ💕\n推し活は自分磨きの鏡\nグッズを買う → 推しへの感謝\nライブに行く → 自分への投資\n推しがいるから、今がある",
      "推し、お疲れ様📱\nきょうも応援させてくれてありがとう\n推しの笑顔があれば\n私の1日は成功🌟",
      "推しを好きでいることが\n一番の自分磨き💎\nこれからも応援するからね\n一緒に歩もう、推しと"
    ],
    advice: [
      "悩んでる？\nそれってまじで優しい人の証\nできない自分を責める前に\n「できることもある」を数えてみ",
      "苦しい時こそ味方を探そう\n一人で抱え込まない\n話す・聞く・共感される\nそれだけで次が見える",
      "今の悩みは\n明日の強さになる💪\n立ち止まることは\n弱じゃなくて、賢い判断"
    ]
  };

  function generate() {
    const type = document.getElementById('typeSelect').value;
    if (!type) { alert('投稿タイプを選んでください'); return; }

    const selectedTemplates = templates[type];
    const container = document.getElementById('templatesContainer');
    container.innerHTML = selectedTemplates.map((t, i) => `
      <div class="template-item">
        <p class="template-num">テンプレ ${i + 1}/3</p>
        <p class="template-text">${escapeHtml(t)}</p>
        <button class="btn-copy" onclick="copyText('${escapeJs(t)}', this)">📋 コピー</button>
        <div class="copy-feedback"></div>
      </div>
    `).join('');

    document.getElementById('templateCard').classList.add('show');
    saveHistory(type);
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const feedback = btn.nextElementSibling;
      feedback.textContent = 'コピーしました!';
      setTimeout(() => { feedback.textContent = ''; }, 2000);
    });
  }

  function saveHistory(type) {
    const history = JSON.parse(localStorage.getItem('xTemplateHistory') || '[]');
    history.unshift({ type, date: new Date().toISOString() });
    if (history.length > 10) history.pop();
    localStorage.setItem('xTemplateHistory', JSON.stringify(history));
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function escapeJs(text) {
    return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
