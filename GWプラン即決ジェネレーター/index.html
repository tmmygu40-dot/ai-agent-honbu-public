    body {

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;

    }

    /* ── 入力 ── */
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.5rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      cursor: pointer;
    }
    .field select:focus { border-color: var(--accent); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── プラン案カード ── */
    .plans-container {
      display: none; margin: 0 auto 1rem;
    }
    .plan-card {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.8rem;
      max-width: 600px;
    }
    .plan-title { font-size: 1rem; font-weight: 800; color: var(--accent); margin-bottom: 0.3rem; }
    .plan-desc { font-size: 0.88rem; color: var(--text); line-height: 1.5; margin-bottom: 0.5rem; }
    .plan-details { font-size: 0.78rem; color: var(--text-sub); }
    .plan-details span { display: inline-block; margin-right: 1rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;

      color: var(--text-sub); font-size: 0.78rem;

    @media print {

      .app-header { border-bottom: 2px solid #000; }

    '5_high_okinawa': { title: '家族・インターコンチ沖縄', desc: 'ビーチリゾートで最高級体験。思い出作り最高。', details: 'リゾート・ビーチ・家族' }
  };

  function showPlans() {
    var people = document.getElementById('people').value;
    var budget = document.getElementById('budget').value;
    var area = document.getElementById('area').value;

    if (!people || !budget || !area) {
      alert('3つすべてを選んでください！');
      return;
    }

    var key = people + '_' + budget + '_' + area;
    var plan = PLANS[key] || { title: 'おすすめ', desc: 'この条件のプランを見つけてください', details: '' };

    // プランを複数表示（同じ条件でいくつかバリエーション）
    var container = document.getElementById('plansContainer');
    container.innerHTML = '';

    // 主プラン
    var html = '<div class="plan-card">' +
               '<p class="plan-title">🎯 ' + plan.title + '</p>' +
               '<p class="plan-desc">' + plan.desc + '</p>' +
               '<p class="plan-details"><span>📍 ' + area + '</span><span>💰 ' + budget + '</span></p>' +
               '</div>';

    // 代替案1・2を追加
    var alt1 = generateAltPlan(people, budget, area, 1);
    var alt2 = generateAltPlan(people, budget, area, 2);

    html += '<div class="plan-card"><p class="plan-title">💡 代替案1：' + alt1.title + '</p><p class="plan-desc">' + alt1.desc + '</p></div>';
    html += '<div class="plan-card"><p class="plan-title">✨ 代替案2：' + alt2.title + '</p><p class="plan-desc">' + alt2.desc + '</p></div>';

    container.innerHTML = html;
    container.style.display = 'block';

    // localStorage に保存
    saveHistory(people, budget, area);
  }

  function generateAltPlan(people, budget, area, num) {
    var plans = [
      { title: '温泉リラックスプラン', desc: '温泉でのんびり。自然に身をゆだねる最高のリセット時間。' },
      { title: 'グルメツアー', desc: 'その地の食を満喫。地元グルメと特産品を堪能。' },
      { title: 'アクティビティ満喫プラン', desc: 'キャンプ、ハイキング、水遊びなど思い切り遊ぶ。' }
    ];
    return plans[(num - 1) % plans.length];
  }

  function saveHistory(people, budget, area) {
    try {
      var history = JSON.parse(localStorage.getItem('gwPlanHistory') || '[]');
      if (history.length >= 5) history.shift(); // 最新5件まで保持
      history.push({ people: people, budget: budget, area: area, date: new Date().toLocaleString('ja-JP') });
      localStorage.setItem('gwPlanHistory', JSON.stringify(history));
    } catch (e) {
      // localStorage 不可の環境での対応
    }
  }
  </script>
