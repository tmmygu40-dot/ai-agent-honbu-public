<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康診断記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>健康診断記録</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="year">年度</label>
        <input type="number" id="year" placeholder="例：2024" min="2000" max="2099">
      </div>
      <div class="form-group">
        <label for="item">検査項目</label>
        <input type="text" id="item" placeholder="例：血糖値、BMI、血圧(収縮期)">
      </div>
      <div class="form-group">
        <label for="value">数値</label>
        <input type="number" id="value" placeholder="例：98.6" step="any">
      </div>
      <div class="form-group">
        <label for="unit">単位（任意）</label>
        <input type="text" id="unit" placeholder="例：mg/dL、kg/m²">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label for="filterItem">項目で絞り込み：</label>
      <select id="filterItem">
        <option value="">すべての項目</option>
      </select>
    </section>

    <!-- 一覧テーブル -->
    <section class="table-section">
      <h2>記録一覧</h2>
      <div id="tableWrapper">
        <p class="empty-msg">記録がありません。上のフォームから追加してください。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
