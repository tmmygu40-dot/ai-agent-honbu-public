<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康診断記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E5%81%A5%E5%BA%B7%E8%A8%BA%E6%96%AD%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="健康診断記録。いくつかの質問に答えるだけで診断できます。エンタメ目的の参考診断としてお楽しみください。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"健康診断記録","description":"健康診断記録。いくつかの質問に答えるだけで診断できます。エンタメ目的の参考診断としてお楽しみください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%81%A5%E5%BA%B7%E8%A8%BA%E6%96%AD%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>健康診断記録</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">いくつかの質問に答えるだけで診断できます。エンタメ目的の参考診断としてお楽しみください。</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="year">年度</label>
        <input type="number" id="year" placeholder="例：2024" min="2000" max="2099">
      </div>
      <div class="form-group">
        <label for="item">検査項目</label>
        <input type="text" id="item" placeholder="例：血糖値、BMI、血圧(収縮期)">
      </div>
      <div class="form-group">
        <label for="value">数値</label>
        <input type="number" id="value" placeholder="例：98.6" step="any">
      </div>
      <div class="form-group">
        <label for="unit">単位（任意）</label>
        <input type="text" id="unit" placeholder="例：mg/dL、kg/m²">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label for="filterItem">項目で絞り込み：</label>
      <select id="filterItem">
        <option value="">すべての項目</option>
      </select>
    </section>

    <!-- 一覧テーブル -->
    <section class="table-section">
      <h2>記録一覧</h2>
      <div id="tableWrapper">
        <p class="empty-msg">記録がありません。上のフォームから追加してください。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。エンタメ目的の参考診断としてお楽しみください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 診断はやり直せますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">ページを再読み込みするとやり直せます。</dd>
      <dt style="font-weight:600;">Q. 毎回同じ結果になりますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">選択の組み合わせで結果が変わります。気が向いたときにお試しください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
