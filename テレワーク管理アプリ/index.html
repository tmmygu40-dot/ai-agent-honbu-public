<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テレワーク管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>テレワーク管理</h1>

    <!-- 月・上限設定 -->
    <section class="settings-section">
      <div class="month-nav">
        <button id="prevMonth" class="nav-btn">&#9664;</button>
        <span id="currentMonth" class="month-label"></span>
        <button id="nextMonth" class="nav-btn">&#9654;</button>
      </div>
      <div class="limit-setting">
        <label for="limitInput">月間出社上限日数：</label>
        <input type="number" id="limitInput" min="1" max="31" value="10">
        <span>日</span>
        <button id="saveLimit" class="btn-save">設定</button>
      </div>
    </section>

    <!-- サマリー -->
    <section class="summary-section">
      <div class="summary-card office">
        <div class="summary-label">出社</div>
        <div class="summary-count" id="officeCount">0</div>
        <div class="summary-unit">日</div>
      </div>
      <div class="summary-card remote">
        <div class="summary-label">在宅</div>
        <div class="summary-count" id="remoteCount">0</div>
        <div class="summary-unit">日</div>
      </div>
      <div class="summary-card remaining">
        <div class="summary-label">残り出社可能</div>
        <div class="summary-count" id="remainingCount">10</div>
        <div class="summary-unit">日</div>
      </div>
    </section>

    <!-- 記録追加 -->
    <section class="add-section">
      <h2>記録を追加</h2>
      <div class="add-form">
        <input type="date" id="dateInput">
        <div class="type-buttons">
          <button class="btn-type btn-office" data-type="office">出社</button>
          <button class="btn-type btn-remote" data-type="remote">在宅</button>
          <button class="btn-type btn-holiday" data-type="holiday">休日</button>
        </div>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="records-section">
      <h2>今月の記録</h2>
      <ul id="recordList" class="record-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
