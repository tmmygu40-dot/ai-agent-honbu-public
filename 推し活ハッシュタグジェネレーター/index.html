<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活ハッシュタグジェネレーター｜SNSの応援タグを一発生成</title>
  <meta name="description" content="ジャンルと萌えポイントを選ぶだけで、SNS投稿に使える応援ハッシュタグセットをワンクリックで生成する推し活サポートツールです。コピーしてそのまま投稿に使えます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* チェックチップ */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .chip {
      display: inline-flex; align-items: center;
      padding: 0.5rem 0.85rem; font-size: 0.88rem;
      border: 1.5px solid var(--border); border-radius: 999px;
      background: var(--bg); color: var(--text);
      cursor: pointer; user-select: none;
      transition: all 0.15s;
    }
    .chip input { display: none; }
    .chip.checked { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }
    .tag-area {
      background: var(--accent-light); border: 1px dashed var(--border);
      border-radius: 10px; padding: 0.9rem;
      font-size: 0.95rem; line-height: 1.7;
      color: var(--text); word-break: break-all;
      white-space: pre-wrap; min-height: 5rem;
    }
    .btn-copy {
      display: block; width: 100%;
      margin-top: 0.8rem; padding: 0.7rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .copy-msg { text-align: center; font-size: 0.82rem; color: var(--ok); margin-top: 0.5rem; min-height: 1rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .btn-copy, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>推し活ハッシュタグジェネレーター</h1>
    <p class="subtitle">ジャンル＋萌えポイントを選ぶだけ。応援タグをワンクリックで生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="oshiName">推しの名前（任意）</label>
      <input type="text" id="oshiName" placeholder="例: 〇〇くん">
      <p class="hint">入力すると専用タグも追加されます</p>
    </div>

    <div class="field">
      <label for="genre">ジャンル</label>
      <select id="genre">
        <option value="idol">アイドル</option>
        <option value="anime">アニメキャラ</option>
        <option value="actor">俳優・芸能人</option>
        <option value="vtuber">Vtuber</option>
        <option value="seiyu">声優</option>
        <option value="sports">スポーツ選手</option>
        <option value="2.5">2.5次元</option>
        <option value="kpop">K-POP</option>
      </select>
    </div>

    <div class="field">
      <label>萌えポイント（複数選択OK）</label>
      <div class="chip-grid" id="moeGrid">
        <label class="chip"><input type="checkbox" value="smile"><span>笑顔</span></label>
        <label class="chip"><input type="checkbox" value="effort"><span>努力</span></label>
        <label class="chip"><input type="checkbox" value="natural"><span>天然</span></label>
        <label class="chip"><input type="checkbox" value="gap"><span>ギャップ</span></label>
        <label class="chip"><input type="checkbox" value="precious"><span>尊い</span></label>
        <label class="chip"><input type="checkbox" value="cute"><span>可愛い</span></label>
        <label class="chip"><input type="checkbox" value="cool"><span>かっこいい</span></label>
        <label class="chip"><input type="checkbox" value="numa"><span>沼</span></label>
        <label class="chip"><input type="checkbox" value="dance"><span>ダンス</span></label>
        <label class="chip"><input type="checkbox" value="voice"><span>声</span></label>
        <label class="chip"><input type="checkbox" value="visual"><span>ビジュ</span></label>
        <label class="chip"><input type="checkbox" value="fanservice"><span>ファンサ</span></label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">タグを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成されたハッシュタグ</p>
    <div class="tag-area" id="tagOut"></div>
    <button class="btn-copy" onclick="copyTags()">📋 コピーする</button>
    <p class="copy-msg" id="copyMsg"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 SNSで実際に使われている応援タグの傾向を参考に、よく使われる組み合わせを目安として整理しています。生成結果はあくまで提案です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'osikatsu_hashtag_v1';

  var GENRE_TAGS = {
    idol:   ['推し活','アイドル','箱推し','尊い','現場'],
    anime:  ['アニメ','推しキャラ','尊い','二次元','沼'],
    actor:  ['推し活','俳優沼','現場','尊い','ファンサ'],
    vtuber: ['Vtuber','推し配信','切り抜き','リスナー','尊い'],
    seiyu:  ['声優','推し声優','ラジオ','イベント','尊い'],
    sports: ['推し選手','スポーツ観戦','現地観戦','応援','勝利の女神'],
    '2.5':  ['2.5次元','舞台','カテコ','現場','尊い'],
    kpop:   ['KPOP','推し活','カムバ','ペンライト','尊い']
  };

  var MOE_TAGS = {
    smile:      ['尊い笑顔','笑顔が世界平和','推しの笑顔最高'],
    effort:     ['努力家の鑑','頑張ってる姿が好き','推しの努力に泣く'],
    natural:    ['天然かわいい','天然爆発','尊い天然'],
    gap:        ['ギャップ萌え','ギャップで殺される','二面性が尊い'],
    precious:   ['尊い','尊さの暴力','尊くて泣ける'],
    cute:       ['可愛いが過ぎる','かわいいの権化','可愛さの暴力'],
    cool:       ['かっこよすぎ','かっこよさの暴力','かっこいいに殺される'],
    numa:       ['沼','沼が深い','戻れない沼'],
    dance:      ['ダンスが神','キレッキレダンス','推しのダンス最高'],
    voice:      ['声が好き','声優じゃないの？','声が刺さる'],
    visual:     ['ビジュ爆発','ビジュ最強','ビジュ担',],
    fanservice: ['ファンサありがとう','神ファンサ','ファンサ最強']
  };

  var COMMON_TAGS = ['推しのいる生活','推し活女子','推し活男子','推しは尊い','今日の推し'];

  function $(id){ return document.getElementById(id); }

  function generate() {
    var name = $('oshiName').value.trim();
    var genre = $('genre').value;
    var checks = document.querySelectorAll('#moeGrid input:checked');
    var moes = [];
    checks.forEach(function(c){ moes.push(c.value); });

    var tags = [];
    // 推し名タグ
    if (name) {
      tags.push(name);
      tags.push(name + '推し');
      tags.push(name + '尊い');
    }
    // ジャンルタグ
    (GENRE_TAGS[genre] || []).forEach(function(t){ tags.push(t); });
    // 萌えポイントタグ
    moes.forEach(function(m){
      var arr = MOE_TAGS[m] || [];
      arr.forEach(function(t){ tags.push(t); });
    });
    // 共通タグからランダム2つ
    var pick = COMMON_TAGS.slice().sort(function(){ return Math.random() - 0.5; }).slice(0, 2);
    pick.forEach(function(t){ tags.push(t); });

    // 重複除去
    var uniq = [];
    tags.forEach(function(t){ if (uniq.indexOf(t) === -1) uniq.push(t); });

    // # を付ける
    var output = uniq.map(function(t){ return '#' + t; }).join(' ');

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('tagOut').textContent = output;
    document.getElementById('copyMsg').textContent = '';

    // 保存
    save(name, genre, moes);

    // 結果へスクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyTags() {
    var text = $('tagOut').textContent;
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        $('copyMsg').textContent = '✅ コピーしました';
      }, function(){
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); $('copyMsg').textContent = '✅ コピーしました'; }
    catch(e) { $('copyMsg').textContent = 'コピーできませんでした。長押しで選択してください'; }
    document.body.removeChild(ta);
  }

  function save(name, genre, moes) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: name, genre: genre, moes: moes }));
    } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.name) $('oshiName').value = d.name;
      if (d.genre) $('genre').value = d.genre;
      if (d.moes && d.moes.length) {
        var checks = document.querySelectorAll('#moeGrid input');
        checks.forEach(function(c){
          if (d.moes.indexOf(c.value) !== -1) {
            c.checked = true;
            c.parentElement.classList.add('checked');
          }
        });
      }
    } catch(e) {}
  }

  // chip の見た目を check 状態と同期
  document.querySelectorAll('#moeGrid .chip').forEach(function(label){
    var input = label.querySelector('input');
    input.addEventListener('change', function(){
      if (input.checked) label.classList.add('checked');
      else label.classList.remove('checked');
    });
  });

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
