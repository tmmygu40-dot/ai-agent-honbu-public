<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="好きな味付けを選ぶと、その味付けを好む世界の料理が分かる無料診断アプリです。塩辛い・辛い・甘い・こってり・さっぱりから選んで、世界中の料理の特徴と調理法を学べます。">
  <title>好きな味付けから探す世界料理診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok .result-value { color: var(--ok); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:first-child { font-weight: 600; color: var(--text); width: 50%; }
    .detail-table td:last-child { text-align: left; font-size: 0.85rem; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- 計測タグ 必須 -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>世界料理診断アプリ</h1>
    <p class="subtitle">好きな味付けから世界の料理を探します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">味付けを選んでください</p>
    <label class="check-item">
      <input type="checkbox" value="salty">
      <span class="check-text">🧂 塩辛い</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="spicy">
      <span class="check-text">🌶️ 辛い</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="sweet">
      <span class="check-text">🍯 甘い</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="rich">
      <span class="check-text">🧈 こってり</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="light">
      <span class="check-text">🥗 さっぱり</span>
    </label>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">🍽️ 診断する</button>

  <!-- 結論カード -->
  <div class="result-card ok" id="result" style="display:none">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">料理の説明</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、世界各地の料理文化と味付けの一般的な特徴を参考に、目安として整理しています。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 料理データベース
  var RECIPES = {
    salty: [
      { name: 'ポルトガル塩漬けバッカラオ', desc: 'タラを塩漬けにして、オリーブオイルで調理。欧州最古の塩漬け調理法。' },
      { name: '日本漬物', desc: '野菜を塩漬けにして発酵させたもの。日本の伝統的保存食。' },
      { name: 'スペインハモン（生ハム）', desc: '豚肉を塩漬けにして熟成させたもの。スペインの最高級食材。' },
      { name: '韓国キムチ', desc: '唐辛子と塩で漬けた野菜。辛塩辛い韓国の国民食。' }
    ],
    spicy: [
      { name: 'タイカレー', desc: 'ココナッツミルクと唐辛子。タイ料理の代表格で、辛さが特徴。' },
      { name: 'インドカレー', desc: 'スパイスミックスを使った煮込み。インド亜大陸の多彩な味わい。' },
      { name: 'メキシコタコス', desc: 'トウガラシとスパイス、豚肉や牛肉を詰めた折り畳みパン。' },
      { name: '中華麻婆豆腐', desc: 'シマナガシマ（花椒）と唐辛子を使った豆腐の煮込み。中華の代表。' }
    ],
    sweet: [
      { name: 'ベルギーチョコレート', desc: 'カカオの優雅な甘さ。ベルギーの伝統菓子。' },
      { name: '日本和菓子', desc: '砂糖と豆を使った伝統菓子。上品な甘さが特徴。' },
      { name: 'フランスマカロン', desc: 'アーモンドパウダーと砂糖で作るフランス菓子。優雅な甘さ。' },
      { name: 'アメリカンパイ', desc: 'フルーツと砂糖をふんだんに使った甘いパイ。アメリカ伝統。' }
    ],
    rich: [
      { name: 'フランスコンフィ', desc: 'バターと塩漬け肉を煮詰めた贅沢な一品。フランス古典料理。' },
      { name: '日本とんかつ', desc: '豚肉を揚げた濃厚な味。日本の庶民料理。' },
      { name: 'イタリアパスタ カルボーナーラ', desc: 'バター、卵、ベーコンで作るこってり系パスタ。' },
      { name: 'スウェーデンミートボール', desc: '肉のミートボールをクリームソースで。濃厚で贅沢な味。' }
    ],
    light: [
      { name: '地中海サラダ', desc: 'オリーブオイルとレモンでさっぱりと。ギリシャ・イタリアの伝統。' },
      { name: '日本そうめん', desc: '細い麺を冷やして食べる。さっぱりとした夏の食べ物。' },
      { name: 'ベトナム生春巻き', desc: 'ライスペーパーに野菜と海老を巻いたもの。爽やかな食感。' },
      { name: '日本冷奴', desc: '冷えた豆腐に醤油をかけたもの。最もシンプルな日本の味。' }
    ]
  };

  function diagnose() {
    var selected = [];
    document.querySelectorAll('.check-item input[type="checkbox"]:checked').forEach(function(cb) {
      selected.push(cb.value);
    });

    if (selected.length === 0) {
      showResult('⚠️', '味付けを1つ以上選んでください');
      document.getElementById('detail').style.display = 'none';
      return;
    }

    // 選択された味付けに対応する料理を集める
    var recipes = [];
    selected.forEach(function(tag) {
      if (RECIPES[tag]) {
        recipes = recipes.concat(RECIPES[tag]);
      }
    });

    // 重複を除去
    var seen = {};
    var unique = [];
    recipes.forEach(function(r) {
      if (!seen[r.name]) {
        unique.push(r);
        seen[r.name] = true;
      }
    });

    // localStorage に保存
    localStorage.setItem('foodDiagnosis', JSON.stringify({
      selected: selected,
      timestamp: new Date().toISOString()
    }));

    showResult('🍽️', unique.length + '個の料理がマッチしました');
    showDetail(unique);
  }

  function showResult(emoji, msg) {
    var rc = document.getElementById('result');
    rc.style.display = '';
    document.getElementById('rv').textContent = emoji;
    document.getElementById('rn').textContent = msg;
  }

  function showDetail(recipes) {
    var html = recipes.map(function(r) {
      return '<tr><td>' + r.name + '</td><td>' + r.desc + '</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  // ページロード時に前回の選択を復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('foodDiagnosis');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        data.selected.forEach(function(tag) {
          var cb = document.querySelector('.check-item input[value="' + tag + '"]');
          if (cb) cb.checked = true;
        });
      } catch (e) {
        // エラーハンドリング
      }
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
