<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題解決フレームワーク逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリ選択 ── */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .cat-btn {
      padding: 0.8rem 0.6rem;
      font-size: 0.85rem;
      font-weight: 700;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      color: var(--text-sub);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .cat-icon { display: block; font-size: 1.4rem; margin-bottom: 0.25rem; }

    /* ── フレームワーク一覧 ── */
    .fw-list { max-width: 600px; margin: 0 auto; }
    .fw-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.7rem;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .fw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .fw-header:hover { background: var(--accent-light); }
    .fw-name {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      flex: 1;
    }
    .fw-tagline {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-top: 0.2rem;
    }
    .fw-toggle {
      font-size: 1.2rem;
      color: var(--accent);
      margin-left: 0.7rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .fw-item.open .fw-toggle { transform: rotate(45deg); }
    .fw-detail {
      display: none;
      padding: 0 1.2rem 1rem;
      border-top: 1px solid var(--border);
    }
    .fw-item.open .fw-detail { display: block; }

    .fw-section { margin-top: 0.8rem; }
    .fw-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .fw-section p {
      font-size: 0.86rem;
      line-height: 1.65;
      color: var(--text);
    }
    .fw-steps {
      list-style: none;
      counter-reset: step;
    }
    .fw-steps li {
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--text);
      padding: 0.25rem 0 0.25rem 1.8rem;
      position: relative;
      counter-increment: step;
    }
    .fw-steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0.3rem;
      width: 1.35rem;
      height: 1.35rem;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fw-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.35rem;
    }
    .fw-tag {
      font-size: 0.7rem;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 99px;
      padding: 0.15rem 0.6rem;
      font-weight: 600;
    }

    /* ── 空状態 ── */
    .empty-msg {
      text-align: center;
      color: var(--text-sub);
      font-size: 0.88rem;
      padding: 2rem 0;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 400px) {
      .category-grid { grid-template-columns: 1fr 1fr; }
      .cat-btn { font-size: 0.78rem; padding: 0.65rem 0.4rem; }
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  <header class="app-header">

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  // ───────── ロジック ─────────
  var currentCat = null;

  function init() {
    // カテゴリボタン生成
    var grid = document.getElementById('categoryGrid');
    CATEGORIES.forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.id = cat.id;
      btn.innerHTML = '<span class="cat-icon">' + cat.icon + '</span>'
                    + '<strong>' + cat.label + '</strong><br>'
                    + '<small style="color:var(--text-sub);font-size:0.7rem;">' + cat.sub + '</small>';
      btn.addEventListener('click', function() { selectCat(cat.id); });
      grid.appendChild(btn);
    });

    // localStorage 復元
    var saved = localStorage.getItem('fw_last_cat');
    if (saved) { selectCat(saved); }
  }

  function selectCat(id) {
    currentCat = id;
    localStorage.setItem('fw_last_cat', id);

    // ボタンのアクティブ状態更新
    document.querySelectorAll('.cat-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.id === id);
    });

    renderFW(id);
  }

  function renderFW(catId) {
    var list = document.getElementById('fwList');
    var items = FRAMEWORKS[catId] || [];
    if (!items.length) {
      list.innerHTML = '<div class="empty-msg">フレームワークが見つかりませんでした</div>';
      return;
    }

    list.innerHTML = items.map(function(fw, i) {
      return '<div class="fw-item" id="fw-' + i + '">'
        + '<div class="fw-header" onclick="toggleFW(' + i + ')">'
        + '<div><div class="fw-name">' + fw.name + '</div>'
        + '<div class="fw-tagline">' + fw.tagline + '</div></div>'
        + '<span class="fw-toggle">＋</span>'
        + '</div>'
        + '<div class="fw-detail">'
        + '<div class="fw-section"><p class="fw-section-title">使いどき</p><p>' + fw.when + '</p></div>'
        + '<div class="fw-section"><p class="fw-section-title">概要・ポイント</p><p>' + fw.how + '</p></div>'
        + '<div class="fw-section"><p class="fw-section-title">実践ステップ</p><ol class="fw-steps">'
        + fw.steps.map(function(s){ return '<li>' + s + '</li>'; }).join('')
        + '</ol></div>'
        + '<div class="fw-section"><div class="fw-tags">'
        + fw.tags.map(function(t){ return '<span class="fw-tag">' + t + '</span>'; }).join('')
        + '</div></div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  function toggleFW(i) {
    var item = document.getElementById('fw-' + i);
    item.classList.toggle('open');
  }

  init();
