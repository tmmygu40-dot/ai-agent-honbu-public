<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雇用契約管理アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── サマリーグリッド ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .summary-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 0.5rem;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .summary-item.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .summary-item.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .summary-item.ok   { border-color: var(--ok);    background: var(--ok-bg);   }
    .summary-label { font-size: 0.7rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.25rem; }
    .summary-item.ng   .summary-label { color: var(--ng);   }
    .summary-item.warn .summary-label { color: var(--warn); }
    .summary-item.ok   .summary-label { color: var(--ok);   }
    .summary-value { font-size: 1.6rem; font-weight: 900; }
    .summary-item.ng   .summary-value { color: var(--ng);   }
    .summary-item.warn .summary-value { color: var(--warn); }
    .summary-item.ok   .summary-value { color: var(--ok);   }
    .summary-unit { font-size: 0.72rem; color: var(--text-sub); }

    /* ── 従業員リスト ── */
    .emp-list { max-width: 600px; margin: 0 auto 1rem; }
    .emp-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.7rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 0.5rem;
    }
    .emp-item.ng   { border-left: 4px solid var(--ng);   }
    .emp-item.warn { border-left: 4px solid var(--warn); }
    .emp-item.ok   { border-left: 4px solid var(--ok);   }
    .emp-name { font-size: 1rem; font-weight: 800; margin-bottom: 0.25rem; }
    .emp-meta { font-size: 0.78rem; color: var(--text-sub); line-height: 1.7; }
    .emp-badge {
      display: inline-block;
      font-size: 0.7rem; font-weight: 800;
      padding: 0.15rem 0.55rem; border-radius: 99px;
      margin-bottom: 0.3rem;
    }
    .badge-ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng);   }
    .badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok);   }
    .emp-days {
      font-size: 0.82rem; font-weight: 700; margin-top: 0.2rem;
    }
    .emp-days.ng   { color: var(--ng);   }
    .emp-days.warn { color: var(--warn); }
    .emp-days.ok   { color: var(--ok);   }
    .btn-del {
      background: none; border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.35rem 0.7rem;
      font-size: 0.78rem; color: var(--text-sub); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-del:hover { border-color: var(--ng); color: var(--ng); }

    .empty-msg {
      text-align: center; color: var(--text-sub);
      font-size: 0.88rem; padding: 1.5rem 0;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>雇用契約管理アプリ</h1>
    <p class="subtitle">契約更新日の漏れを防ぐ。期限切れ・30日以内を即警告。</p>
  </header>

  <!-- 登録カード -->
  <div class="card">
    <p class="card-title">従業員を登録</p>
    <div class="field">
      <label for="empName">従業員名</label>
      <input type="text" id="empName" placeholder="例: 山田 太郎">
    </div>
    <div class="field">
      <label for="hireDate">入社日</label>
      <input type="date" id="hireDate">
    </div>
    <div class="field">
      <label for="empType">雇用形態</label>
      <select id="empType">
        <option value="正社員">正社員</option>
        <option value="契約社員">契約社員</option>
        <option value="パート">パート</option>
        <option value="アルバイト">アルバイト</option>
        <option value="派遣">派遣</option>
      </select>
    </div>
    <div class="field">
      <label for="renewDate">契約更新日</label>
      <input type="date" id="renewDate">
    </div>
  </div>

  <button class="btn-add" onclick="addEmployee()">登録する</button>

  <!-- サマリー -->
  <div class="summary-grid" id="summaryGrid" style="display:none">
    <div class="summary-item ng">
      <div class="summary-label">期限切れ</div>
      <div class="summary-value" id="cntNg">0</div>
      <div class="summary-unit">件</div>
    </div>
    <div class="summary-item warn">
      <div class="summary-label">30日以内</div>
      <div class="summary-value" id="cntWarn">0</div>
      <div class="summary-unit">件</div>
    </div>
    <div class="summary-item ok">
      <div class="summary-label">余裕あり</div>
      <div class="summary-value" id="cntOk">0</div>
      <div class="summary-unit">件</div>
    </div>
  </div>

  <!-- 従業員リスト -->
  <div class="emp-list" id="empList"></div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var STORAGE_KEY = 'koyo-keiyaku-list';
  var employees = [];

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      employees = raw ? JSON.parse(raw) : [];
    } catch(e) { employees = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
  }

  function getToday() {
    var d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function diffDays(dateStr) {
    var today = getToday();
    var target = new Date(dateStr);
    target.setHours(0,0,0,0);
    return Math.round((target - today) / 86400000);
  }

  function getLevel(days) {
    if (days < 0) return 'ng';
    if (days <= 30) return 'warn';
    return 'ok';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    var d = new Date(dateStr);
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }

  function addEmployee() {
    var name     = document.getElementById('empName').value.trim();
    var hireDate = document.getElementById('hireDate').value;
    var empType  = document.getElementById('empType').value;
    var renewDate= document.getElementById('renewDate').value;

    if (!name || !renewDate) {
      alert('従業員名と契約更新日は必須です');
      return;
    }

    employees.push({
      id: Date.now(),
      name: name,
      hireDate: hireDate,
      empType: empType,
      renewDate: renewDate
    });
    save();
    renderList();

    // フォームリセット
    document.getElementById('empName').value = '';
    document.getElementById('hireDate').value = '';
    document.getElementById('renewDate').value = '';
  }

  function deleteEmployee(id) {
    employees = employees.filter(function(e){ return e.id !== id; });
    save();
    renderList();
  }

  function renderList() {
    var list = document.getElementById('empList');
    var grid = document.getElementById('summaryGrid');

    if (employees.length === 0) {
      list.innerHTML = '<div class="empty-msg">登録された従業員はいません</div>';
      grid.style.display = 'none';
      return;
    }

    grid.style.display = '';

    // 期限の近い順にソート
    var sorted = employees.slice().sort(function(a, b){
      return diffDays(a.renewDate) - diffDays(b.renewDate);
    });

    var cntNg = 0, cntWarn = 0, cntOk = 0;
    var html = '';

    sorted.forEach(function(emp) {
      var days  = diffDays(emp.renewDate);
      var level = getLevel(days);
      if (level === 'ng')   cntNg++;
      else if (level === 'warn') cntWarn++;
      else cntOk++;

      var badgeClass = 'badge-' + level;
      var badgeText  = level === 'ng' ? '期限切れ' : level === 'warn' ? '30日以内' : '余裕あり';
      var daysText   = days < 0
        ? '期限から ' + Math.abs(days) + ' 日超過'
        : days === 0 ? '本日が更新日'
        : '更新まで ' + days + ' 日';

      html += '<div class="emp-item ' + level + '">'
            +   '<div>'
            +     '<div class="emp-name">' + escHtml(emp.name) + '</div>'
            +     '<span class="emp-badge ' + badgeClass + '">' + badgeText + '</span>'
            +     '<div class="emp-meta">'
            +       '雇用形態：' + escHtml(emp.empType) + '<br>'
            +       (emp.hireDate ? '入社日：' + formatDate(emp.hireDate) + '<br>' : '')
            +       '契約更新日：' + formatDate(emp.renewDate)
            +     '</div>'
            +     '<div class="emp-days ' + level + '">' + daysText + '</div>'
            +   '</div>'
            +   '<button class="btn-del" onclick="deleteEmployee(' + emp.id + ')">削除</button>'
            + '</div>';
    });

    list.innerHTML = html;
    document.getElementById('cntNg').textContent   = cntNg;
    document.getElementById('cntWarn').textContent = cntWarn;
    document.getElementById('cntOk').textContent   = cntOk;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 起動
  load();
  renderList();
  </script>
</body>
</html>
