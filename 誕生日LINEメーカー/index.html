<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="相手タイプと距離感を選ぶだけで、誕生日のお祝いLINE文を「あったか系・カジュアル系・きちんと系」の3スタイルで即生成。コピーしてそのまま送れる無料ツールです。">
  <title>誕生日LINEメーカー｜3スタイル即生成</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .line-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 600px;
    }
    .line-card.warm   { border-color: #f0a85c; background: #fff8ee; }
    .line-card.casual { border-color: #6db5e0; background: #f0f8ff; }
    .line-card.formal { border-color: #99a3b0; background: #f6f7f9; }
    .line-style-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 0.18rem 0.55rem; border-radius: 999px;
      background: rgba(0,0,0,0.06); color: var(--text-sub);
      margin-bottom: 0.6rem;
    }
    .line-card.warm   .line-style-label { background: #f0a85c; color: #fff; }
    .line-card.casual .line-style-label { background: #6db5e0; color: #fff; }
    .line-card.formal .line-style-label { background: #99a3b0; color: #fff; }
    .line-text {
      font-size: 0.95rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
      padding: 0.6rem 0; margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.45rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover, .btn-copy:active { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .results-wrap { display: none; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .line-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>誕生日LINEメーカー</h1>
    <p class="subtitle">相手タイプと距離感を選ぶだけで、誕生日LINEが3スタイル即出ます。文中の「〇〇」は相手の名前に置き換えてください。</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="targetType">相手タイプ</label>
      <select id="targetType">
        <option value="family">家族</option>
        <option value="friend" selected>友人</option>
        <option value="lover">恋人</option>
        <option value="boss">上司</option>
        <option value="coworker">同僚</option>
        <option value="junior">後輩</option>
      </select>
    </div>
    <div class="field">
      <label for="distance">距離感</label>
      <select id="distance">
        <option value="close">近い（タメ口OK）</option>
        <option value="normal" selected>普通</option>
        <option value="far">少し遠い（丁寧め）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="makeMessages()">3スタイルを作る</button>

  <div class="results-wrap" id="results">
    <div class="line-card warm">
      <span class="line-style-label">あったか系</span>
      <p class="line-text" id="msg-warm"></p>
      <button class="btn-copy" data-target="msg-warm" onclick="copyText(this)">コピー</button>
    </div>
    <div class="line-card casual">
      <span class="line-style-label">カジュアル系</span>
      <p class="line-text" id="msg-casual"></p>
      <button class="btn-copy" data-target="msg-casual" onclick="copyText(this)">コピー</button>
    </div>
    <div class="line-card formal">
      <span class="line-style-label">きちんと系</span>
      <p class="line-text" id="msg-formal"></p>
      <button class="btn-copy" data-target="msg-formal" onclick="copyText(this)">コピー</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✉️ 本ツールが生成する文面は一般的な日本語のお祝いメッセージのテンプレを基にしています。送信前に相手や場面に合わせて微調整してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 相手タイプ別の呼び方・補足フレーズ
  var TYPE_PHRASE = {
    family:   { call: '〇〇',    callPolite: '〇〇',     midWarm: 'いつもそばにいてくれてありがとう。',           midFormal: 'いつも家族として支えてくれて、心から感謝しています。' },
    friend:   { call: '〇〇',    callPolite: '〇〇さん', midWarm: 'いつも一緒に笑ってくれてありがとう。',           midFormal: '日頃の感謝と、これからもよろしくの気持ちを込めて。' },
    lover:    { call: '〇〇',    callPolite: '〇〇',     midWarm: '一緒に過ごす毎日が、私にとって宝物です。',         midFormal: '一緒に過ごす時間に、いつも感謝しています。' },
    boss:     { call: '〇〇さん', callPolite: '〇〇さん', midWarm: '日頃のご指導、本当にありがとうございます。',      midFormal: '日頃よりご指導とお心遣いをいただき、心より感謝申し上げます。' },
    coworker: { call: '〇〇さん', callPolite: '〇〇さん', midWarm: '一緒に働けて毎日心強く思ってます。',                midFormal: '日頃より大変お世話になっております。' },
    junior:   { call: '〇〇さん', callPolite: '〇〇さん', midWarm: 'いつも頑張っている姿、ちゃんと見てるよ。',          midFormal: '日頃から真摯に取り組んでくれてありがとうございます。' }
  };

  // 距離感×スタイルで文面を組み立てる
  function buildWarm(type, dist) {
    var p = TYPE_PHRASE[type];
    if (dist === 'close') {
      return p.call + '、お誕生日おめでとう🎂\n' + p.midWarm + '\n' + p.call + 'がいてくれて、毎日ちょっと幸せ。\n今年も笑顔いっぱいの1年になりますように☺️';
    }
    if (dist === 'far') {
      return p.callPolite + '、お誕生日おめでとうございます🎂\n' + p.midWarm + '\nこれからの1年が、' + p.callPolite + 'にとってあたたかく、穏やかな日々になりますように。';
    }
    return p.call + '、お誕生日おめでとう🎉🎂\n' + p.midWarm + '\nこれからも変わらず仲良くしてね。\n素敵な1年になりますように☺️';
  }

  function buildCasual(type, dist) {
    var p = TYPE_PHRASE[type];
    if (dist === 'close') {
      return 'ハッピーバースデー' + p.call + '🎉🎂\nまたひとつ歳とったね〜！おめでとう！\nとりあえず近いうちにお祝いしよ〜🍻\nいい1年にしような！';
    }
    if (dist === 'far') {
      return p.callPolite + '、お誕生日おめでとうございます🎂\nまたお会いできる機会を楽しみにしています。\n素敵な1年になりますように🎉';
    }
    return p.call + '、お誕生日おめでとう〜🎉🎂\nまた近いうちにごはん行こ！\n良い1年にしてね〜☺️';
  }

  function buildFormal(type, dist) {
    var p = TYPE_PHRASE[type];
    if (dist === 'close') {
      return p.call + '、お誕生日おめでとう。\n' + p.midFormal + '\nこれからの1年が、健やかで充実した日々になることを願っています。';
    }
    if (dist === 'far') {
      return p.callPolite + '\n\nお誕生日を心よりお慶び申し上げます。\n' + p.midFormal + '\n今後益々のご健勝とご多幸を心よりお祈り申し上げます。';
    }
    return p.callPolite + '、お誕生日おめでとうございます。\n' + p.midFormal + '\nますますのご活躍とご健康を心よりお祈り申し上げます。';
  }

  function makeMessages() {
    var type = document.getElementById('targetType').value;
    var dist = document.getElementById('distance').value;

    document.getElementById('msg-warm').textContent   = buildWarm(type, dist);
    document.getElementById('msg-casual').textContent = buildCasual(type, dist);
    document.getElementById('msg-formal').textContent = buildFormal(type, dist);

    document.getElementById('results').style.display = 'block';

    // localStorage 保存
    try {
      localStorage.setItem('birthdayLineMaker.targetType', type);
      localStorage.setItem('birthdayLineMaker.distance', dist);
    } catch (e) {}
  }

  function copyText(btn) {
    var id = btn.getAttribute('data-target');
    var text = document.getElementById(id).textContent;
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = 'コピーしました';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = 'コピー';
      }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  }

  // 初期復元
  (function restore() {
    try {
      var t = localStorage.getItem('birthdayLineMaker.targetType');
      var d = localStorage.getItem('birthdayLineMaker.distance');
      if (t) document.getElementById('targetType').value = t;
      if (d) document.getElementById('distance').value = d;
    } catch (e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
