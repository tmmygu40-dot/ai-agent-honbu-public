<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易見積書作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <div class="app-container">
    <!-- 操作ボタン（画面上部） -->
    <div class="action-bar no-print">
      <h1>簡易見積書作成</h1>
      <div class="action-buttons">
        <button onclick="saveToStorage()" class="btn btn-secondary">保存</button>
        <button onclick="clearAll()" class="btn btn-danger">クリア</button>
        <button onclick="window.print()" class="btn btn-primary">印刷</button>
      </div>
    </div>

    <!-- 見積書本体 -->
    <div class="estimate-doc">
      <!-- ヘッダー -->
      <div class="doc-header">
        <div class="doc-title-block">
          <h2 class="doc-title">御見積書</h2>
        </div>
        <div class="doc-meta">
          <div class="meta-row">
            <label>発行日</label>
            <input type="date" id="issueDate">
          </div>
          <div class="meta-row">
            <label>見積番号</label>
            <input type="text" id="estimateNo" placeholder="例：EST-001">
          </div>
          <div class="meta-row">
            <label>有効期限</label>
            <input type="date" id="validDate">
          </div>
        </div>
      </div>

      <div class="doc-info">
        <div class="to-block">
          <div class="to-row">
            <input type="text" id="clientName" placeholder="宛先（会社名・氏名）" class="to-input">
            <span class="to-suffix">御中</span>
          </div>
          <div class="subject-row">
            <label>件名：</label>
            <input type="text" id="subject" placeholder="件名を入力">
          </div>
        </div>
        <div class="from-block">
          <div class="from-row"><label>会社名</label><input type="text" id="fromCompany" placeholder="自社名"></div>
          <div class="from-row"><label>担当者</label><input type="text" id="fromPerson" placeholder="担当者名"></div>
          <div class="from-row"><label>TEL</label><input type="text" id="fromTel" placeholder="電話番号"></div>
          <div class="from-row"><label>Email</label><input type="text" id="fromEmail" placeholder="メールアドレス"></div>
        </div>
      </div>

      <!-- 合計表示 -->
      <div class="total-summary">
        <span>合計金額（税込）：</span>
        <strong class="total-amount" id="totalDisplay">¥0</strong>
      </div>

      <!-- 品目テーブル -->
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-no">No.</th>
            <th class="col-name">品目・内容</th>
            <th class="col-qty">数量</th>
            <th class="col-unit">単位</th>
            <th class="col-price">単価</th>
            <th class="col-subtotal">金額</th>
            <th class="col-action no-print">操作</th>
          </tr>
        </thead>
        <tbody id="itemsBody">
        </tbody>
      </table>

      <!-- 行追加ボタン -->
      <div class="add-row-area no-print">
        <button onclick="addRow()" class="btn btn-add">＋ 行を追加</button>
      </div>

      <!-- 小計・税・合計 -->
      <div class="totals-block">
        <div class="totals-row">
          <span>小計</span>
          <span id="subtotalDisplay">¥0</span>
        </div>
        <div class="totals-row">
          <span>消費税（10%）</span>
          <span id="taxDisplay">¥0</span>
        </div>
        <div class="totals-row totals-grand">
          <span>合計（税込）</span>
          <span id="grandTotalDisplay">¥0</span>
        </div>
      </div>

      <!-- 備考 -->
      <div class="remarks-block">
        <label class="remarks-label">備考</label>
        <textarea id="remarks" rows="3" placeholder="備考・支払い条件など"></textarea>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script></body>
</html>
