<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>源泉徴収計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>源泉徴収計算アプリ</h1>
    <p class="subtitle">フリーランスへの報酬支払い計算</p>

    <div class="card">
      <div class="form-group">
        <label for="amount">支払金額（円）</label>
        <input type="number" id="amount" placeholder="例：300000" min="0">
      </div>

      <div class="form-group tax-toggle">
        <label>消費税の扱い</label>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="radio" name="taxType" value="excl" checked> 消費税抜き
          </label>
          <label class="toggle-label">
            <input type="radio" name="taxType" value="incl"> 消費税込み
          </label>
        </div>
      </div>

      <button id="calcBtn">計算する</button>
    </div>

    <div class="result-card" id="resultCard" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-row">
        <span class="result-label">支払金額</span>
        <span class="result-value" id="resAmount">—</span>
      </div>
      <div class="result-row" id="taxRow" style="display:none;">
        <span class="result-label">消費税（10%）</span>
        <span class="result-value" id="resTax">—</span>
      </div>
      <div class="result-row highlight">
        <span class="result-label">源泉徴収額</span>
        <span class="result-value" id="resWithholding">—</span>
      </div>
      <div class="result-row total">
        <span class="result-label">差引支給額</span>
        <span class="result-value" id="resNet">—</span>
      </div>
      <div class="calc-note" id="calcNote"></div>
      <button class="copy-btn" id="copyBtn">結果をコピー</button>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="clear-btn" id="clearBtn">履歴を消去</button>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-msg">まだ履歴がありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
