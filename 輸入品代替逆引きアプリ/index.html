  <title>輸入品代替逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.2rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 検索 ── */
    .search-wrap {
      max-width: 640px; margin: 0 auto 0.8rem;
      padding: 0 1rem;
    }
    .search-input {
      width: 100%; padding: 0.8rem 1rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 99px; background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* ── カテゴリフィルター ── */
    .filter-wrap {
      max-width: 640px; margin: 0 auto 1rem;
      padding: 0 1rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.4rem 0.85rem;
      font-size: 0.8rem; font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: 99px; background: var(--card); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── 結果カウント ── */
    .result-count {
      max-width: 640px; margin: 0 auto 0.6rem;
      padding: 0 1rem;
      font-size: 0.8rem; color: var(--text-sub);
    }

    /* ── 品目カード ── */
    .item-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 640px;
      overflow: hidden;
    }
    .item-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.1rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .item-import {
      flex: 1;
    }
    .item-category {
      font-size: 0.7rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.2rem;
    }
    .item-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
    }
    .item-note {
      font-size: 0.75rem; color: var(--text-sub); margin-top: 0.15rem;
    }
    .fav-btn {
      background: none; border: none; font-size: 1.4rem; cursor: pointer;
      padding: 0.2rem; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 代替品リスト ── */
    .alt-list { padding: 0.7rem 1.1rem 0.9rem; }
    .alt-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .alt-item {
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      background: var(--accent-light);
      margin-bottom: 0.4rem;
    }
    .alt-item:last-child { margin-bottom: 0; }
    .alt-name {
      font-size: 0.9rem; font-weight: 700; color: var(--text);
    }
    .alt-feature {
      font-size: 0.76rem; color: var(--text-sub); margin-top: 0.15rem;
    }
    .alt-source {
      font-size: 0.72rem; color: var(--ok); margin-top: 0.1rem;
      display: flex; align-items: center; gap: 0.25rem;
    }
    .alt-source::before { content: "🏪"; font-size: 0.65rem; }

    /* ── お気に入りタブ ── */
    .tab-wrap {
      max-width: 640px; margin: 0 auto 1rem;
      padding: 0 1rem;
      display: flex; gap: 0;
    }
    .tab-btn {
      flex: 1; padding: 0.65rem;
      font-size: 0.85rem; font-weight: 700;
      border: 1.5px solid var(--border);
      background: var(--card); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .tab-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 空状態 ── */
    .empty-msg {
      text-align: center; padding: 2.5rem 1rem;
      font-size: 0.88rem; color: var(--text-sub);
      max-width: 640px; margin: 0 auto;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  // ── 状態 ──
  var currentTab = 'all';
  var currentCategory = 'all';
  var favIds = JSON.parse(localStorage.getItem('importAlt_favs') || '[]');

  function saveFavs() {
    localStorage.setItem('importAlt_favs', JSON.stringify(favIds));
  }

  function toggleFav(id) {
    var idx = favIds.indexOf(id);
    if (idx === -1) { favIds.push(id); } else { favIds.splice(idx, 1); }
    saveFavs();
    render();
  }

  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tab-all').className = 'tab-btn' + (tab === 'all' ? ' active' : '');
    document.getElementById('tab-fav').className = 'tab-btn' + (tab === 'fav' ? ' active' : '');
    var showSearch = tab === 'all';
    document.getElementById('search-section').style.display = showSearch ? '' : 'none';
    document.getElementById('filter-section').style.display = showSearch ? '' : 'none';
    render();
  }

  function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active');
    render();
  }

  function render() {
    var q = (document.getElementById('searchBox').value || '').trim().toLowerCase();
    var list = DATA.filter(function(d) {
      if (currentTab === 'fav') return favIds.indexOf(d.id) !== -1;
      if (currentCategory !== 'all' && d.category !== currentCategory) return false;
      if (!q) return true;
      if (d.name.toLowerCase().indexOf(q) !== -1) return true;
      if (d.category.toLowerCase().indexOf(q) !== -1) return true;
      if (d.note.toLowerCase().indexOf(q) !== -1) return true;
      return d.alts.some(function(a) {
        return a.name.toLowerCase().indexOf(q) !== -1 || a.feature.toLowerCase().indexOf(q) !== -1;
      });
    });

    var countEl = document.getElementById('resultCount');
    if (currentTab === 'fav') {
      countEl.textContent = 'お気に入り ' + list.length + ' 件';
    } else {
      countEl.textContent = list.length + ' 件表示中（全 ' + DATA.length + ' 件）';
    }

    var html = '';
    list.forEach(function(d) {
      var isFav = favIds.indexOf(d.id) !== -1;
      html += '<div class="item-card">';
      html += '<div class="item-header">';
      html += '<div class="item-import">';
      html += '<div class="item-category">' + esc(d.category) + '</div>';
      html += '<div class="item-name">' + esc(d.name) + '</div>';
      html += '<div class="item-note">' + esc(d.note) + '</div>';
      html += '</div>';
      html += '<button class="fav-btn" onclick="toggleFav(' + d.id + ')" title="お気に入り">' + (isFav ? '★' : '☆') + '</button>';
      html += '</div>';
      html += '<div class="alt-list">';
      html += '<div class="alt-label">▶ 国産代替品</div>';
      d.alts.forEach(function(a) {
        html += '<div class="alt-item">';
        html += '<div class="alt-name">' + esc(a.name) + '</div>';
        html += '<div class="alt-feature">' + esc(a.feature) + '</div>';
        html += '<div class="alt-source">' + esc(a.source) + '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '</div>';
    });

    if (list.length === 0) {
      if (currentTab === 'fav') {
        html = '<div class="empty-msg">まだお気に入りがありません。<br>品目カードの ☆ をタップして追加してください。</div>';
      } else {
        html = '<div class="empty-msg">「' + esc(q) + '」に一致する品目が見つかりませんでした。</div>';
      }
      countEl.textContent = '';
    }

    document.getElementById('itemList').innerHTML = html;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  render();
  </script>
