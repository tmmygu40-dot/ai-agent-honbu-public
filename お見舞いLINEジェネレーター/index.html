<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お見舞いLINEジェネレーター｜入院・病気の相手に送る文面を3パターン即生成</title>
  <meta name="description" content="入院や病気の相手に送るお見舞いLINEを、関係性・病状・トーンを選ぶだけで3パターン即生成。コピーしてそのまま送れる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .pattern-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .pattern-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: #fff; background: var(--accent);
      padding: 0.18rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.6rem;
    }
    .pattern-text {
      font-size: 0.95rem; color: var(--text); line-height: 1.7;
      white-space: pre-wrap;
      padding: 0.7rem 0.8rem;
      background: var(--bg);
      border-radius: 9px;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.6rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>お見舞いLINEジェネレーター</h1>
    <p class="subtitle">関係性・病状・トーンを選ぶだけで、お見舞いLINE文を3パターン即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="rel">相手との関係性</label>
      <select id="rel">
        <option value="family">家族</option>
        <option value="relative">親戚</option>
        <option value="friend">友人</option>
        <option value="colleague">同僚</option>
        <option value="boss">上司・目上</option>
      </select>
    </div>
    <div class="field">
      <label for="lvl">病気の重さ</label>
      <select id="lvl">
        <option value="light">軽い体調不良・風邪</option>
        <option value="hosp">入院中</option>
        <option value="long">長期療養中</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="polite">丁寧</option>
        <option value="casual">カジュアル</option>
        <option value="warm">温かい</option>
      </select>
    </div>
    <div class="field">
      <label for="name">相手の呼び方（任意）</label>
      <input type="text" id="name" placeholder="例：○○さん、お父さん など">
      <p class="hint">空欄なら呼びかけ部分は省略します</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、一般的なビジネスマナー資料・お見舞い文例集などを参考に、目安として使いやすく整理しています。最終的な文面は相手との関係性に合わせて調整してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // テンプレート定義
  // [呼びかけ] / [本文] / [締め] を組み合わせる
  var TEMPLATES = {
    polite: {
      light: [
        { label: '丁寧版', body: '{name}体調を崩されたと伺い、心配しております。\nどうかご無理なさらず、ゆっくりお休みになってお身体をいたわってください。\n一日も早いご回復をお祈りしております。' },
        { label: '短め版', body: '{name}体調を崩されたとのこと、お見舞い申し上げます。\nどうぞお大事になさってください。' },
        { label: '温かい版', body: '{name}お加減いかがですか？\n季節の変わり目で体調を崩しやすい時期ですので、温かくしてゆっくり休んでくださいね。\n一日も早く元気になられますように。' }
      ],
      hosp: [
        { label: '丁寧版', body: '{name}ご入院されたと伺い、大変驚いております。\n本来であればすぐにでもお見舞いに伺うべきところ、まずは取り急ぎLINEにて失礼いたします。\nどうかご無理なさらず、治療に専念されてください。一日も早いご回復を心よりお祈り申し上げます。' },
        { label: '短め版', body: '{name}ご入院と伺い、心配しております。\nどうぞ治療に専念され、ゆっくりお身体を休めてください。\nお大事になさってください。' },
        { label: '温かい版', body: '{name}ご入院されたと聞いて、本当に驚きました。\nまずは焦らず、ゆっくり治すことを最優先にしてくださいね。\n何かお手伝いできることがあれば、いつでも遠慮なく言ってください。早いご回復を願っております。' }
      ],
      long: [
        { label: '丁寧版', body: '{name}長らく療養されているとのこと、お見舞い申し上げます。\n返信などはどうかお気になさらず、ご自身のペースで治療に専念されてください。\nご快復を心からお祈りしております。' },
        { label: '短め版', body: '{name}療養中と伺い、お見舞い申し上げます。\n返信は不要ですので、どうかご自愛ください。' },
        { label: '温かい版', body: '{name}療養が長くなっているとのこと、お疲れが出ていないか案じております。\n焦らず、ご自身のペースで大丈夫です。応援しておりますので、無理なさらないでくださいね。' }
      ]
    },
    casual: {
      light: [
        { label: '丁寧版', body: '{name}体調崩したって聞いたよ、大丈夫？\n無理しないでゆっくり休んでね。早く良くなりますように。' },
        { label: '短め版', body: '{name}大丈夫？お大事にね！' },
        { label: '温かい版', body: '{name}体調どう？心配してるよ。\nあったかくして、ぐっすり寝るのが一番！\n何かあったら遠慮なく連絡してね。早く元気になりますように。' }
      ],
      hosp: [
        { label: '丁寧版', body: '{name}入院したって聞いてびっくりしたよ。\n今は治療に専念して、ゆっくり休んでね。\n落ち着いたらお見舞い行かせて。早く良くなることを願ってるよ。' },
        { label: '短め版', body: '{name}入院って聞いてびっくり！\nゆっくり休んでね、お大事に。' },
        { label: '温かい版', body: '{name}入院したって聞いて、めちゃくちゃ心配してる。\n今は何も考えず、しっかり治すことだけ考えてね。\n何か必要なものとか、できることあったら遠慮なく言って！早く元気な顔見たいよ。' }
      ],
      long: [
        { label: '丁寧版', body: '{name}療養が長引いてるって聞いて、気にかけてたよ。\n返信とか気にしなくていいから、自分のペースで休んでね。\nずっと応援してる。' },
        { label: '短め版', body: '{name}療養長くて大変だね。\n返信いらないから、ゆっくりしてね。' },
        { label: '温かい版', body: '{name}療養長引いてるって聞いて、ずっと気になってたよ。\n返事はいつでもいいから、無理しないでね。\n焦らず、自分のペースで大丈夫。いつでも味方だからね。' }
      ]
    },
    warm: {
      light: [
        { label: '丁寧版', body: '{name}体調を崩されたと聞いて、心配しています。\n季節柄、無理は禁物です。温かくして、ゆっくり休んでくださいね。\n一日も早く、いつもの笑顔が戻りますように。' },
        { label: '短め版', body: '{name}お加減いかがですか？\nどうかゆっくり休んで、お大事になさってください。' },
        { label: '温かい版', body: '{name}体調崩されたと聞いて、すぐ顔が浮かびました。\n今は何も考えず、温かくしてぐっすり休んでくださいね。\nあなたの元気な姿を、また早く見られますように。' }
      ],
      hosp: [
        { label: '丁寧版', body: '{name}ご入院と聞いて、本当に驚きました。\nどうか今は何も心配せず、治療に専念してくださいね。\n何か力になれることがあれば、遠慮なく言ってください。早いご回復を、心から願っています。' },
        { label: '短め版', body: '{name}入院と聞いて心配しています。\nどうぞお大事に、ゆっくり休んでくださいね。' },
        { label: '温かい版', body: '{name}入院されたと聞いて、心からびっくりしました。\n今はどうか自分のことだけを考えて、ゆっくり過ごしてくださいね。\n寂しい時、不安な時、いつでも声をかけてください。あなたの回復を、毎日願っています。' }
      ],
      long: [
        { label: '丁寧版', body: '{name}療養が長くなっていると伺い、お辛い時もあるのではと案じています。\n返信などはどうかお気になさらず、ご自身のペースで過ごしてくださいね。\nいつもあなたのことを思っています。' },
        { label: '短め版', body: '{name}療養中と聞いて、気にかけています。\n返信は気にしないで、ゆっくり過ごしてくださいね。' },
        { label: '温かい版', body: '{name}療養が長引いていると聞いて、ずっと気になっていました。\n体だけでなく、心も疲れる時があると思います。\n返事はいつでもいいので、無理だけはしないでくださいね。あなたを応援している人がここにいます。' }
      ]
    }
  };

  function generate() {
    var rel  = document.getElementById('rel').value;
    var lvl  = document.getElementById('lvl').value;
    var tone = document.getElementById('tone').value;
    var name = document.getElementById('name').value.trim();

    // 関係性で呼びかけスタイルを微調整
    var greeting = '';
    if (name) {
      if (rel === 'boss') greeting = name + '、\n';
      else if (rel === 'family') greeting = name + '、\n';
      else greeting = name + '、\n';
    }

    var patterns = TEMPLATES[tone][lvl];
    var html = patterns.map(function(p, i) {
      var text = p.body.replace('{name}', greeting);
      var safe = escapeHtml(text);
      var encoded = encodeURIComponent(text);
      return ''
        + '<div class="pattern-card">'
        +   '<span class="pattern-label">パターン' + (i+1) + '・' + p.label + '</span>'
        +   '<div class="pattern-text">' + safe + '</div>'
        +   '<button class="btn-copy" onclick="copyText(this, decodeURIComponent(\'' + encoded + '\'))">📋 コピーする</button>'
        + '</div>';
    }).join('');

    document.getElementById('results').innerHTML = html;

    // localStorage 保存
    try {
      localStorage.setItem('omimai_last', JSON.stringify({rel:rel, lvl:lvl, tone:tone, name:name}));
    } catch(e) {}
  }

  function copyText(btn, text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✓ コピーしました';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '📋 コピーする';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function() { fallbackCopy(btn, text); });
    } else {
      fallbackCopy(btn, text);
    }
  }
  function fallbackCopy(btn, text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    } catch(e) {
      btn.textContent = '× コピー失敗';
    }
    document.body.removeChild(ta);
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // 起動時に前回入力を復元
  try {
    var saved = localStorage.getItem('omimai_last');
    if (saved) {
      var d = JSON.parse(saved);
      if (d.rel)  document.getElementById('rel').value  = d.rel;
      if (d.lvl)  document.getElementById('lvl').value  = d.lvl;
      if (d.tone) document.getElementById('tone').value = d.tone;
      if (d.name) document.getElementById('name').value = d.name;
    }
  } catch(e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
