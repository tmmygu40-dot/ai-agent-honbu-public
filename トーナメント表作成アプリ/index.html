<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トーナメント表作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>トーナメント表作成</h1>

    <!-- チーム入力セクション -->
    <section id="input-section">
      <h2>チーム登録</h2>
      <div class="input-row">
        <input type="text" id="team-input" placeholder="チーム名を入力" maxlength="20">
        <button id="add-btn">追加</button>
      </div>
      <ul id="team-list"></ul>
      <div class="action-row">
        <button id="shuffle-btn" class="secondary">シャッフル</button>
        <button id="generate-btn" class="primary">トーナメント表を生成</button>
      </div>
    </section>

    <!-- トーナメント表示セクション -->
    <section id="tournament-section" class="hidden">
      <div class="section-header">
        <h2>トーナメント表</h2>
        <button id="reset-btn" class="danger">リセット</button>
      </div>
      <div id="tournament-wrapper">
        <div id="tournament-bracket"></div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
