<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体調メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>体調メモ</h1>

    <section class="form-section">
      <div class="form-row">
        <label for="record-date">日付</label>
        <input type="date" id="record-date">
      </div>
      <div class="form-row">
        <label for="category">症状</label>
        <select id="category">
          <option value="頭痛">頭痛</option>
          <option value="倦怠感">倦怠感</option>
          <option value="発熱">発熱</option>
          <option value="吐き気">吐き気</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-row">
        <label for="severity">程度</label>
        <select id="severity">
          <option value="軽い">軽い</option>
          <option value="普通">普通</option>
          <option value="強い">強い</option>
        </select>
      </div>
      <div class="form-row">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="詳細・気になることなど">
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <span id="count-label"></span>
      </div>
      <ul id="record-list"></ul>
      <p id="empty-msg" class="empty-msg">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
