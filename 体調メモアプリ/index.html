<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体調メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E4%BD%93%E8%AA%BF%E3%83%A1%E3%83%A2%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="体調メモ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"体調メモ","description":"体調メモ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E4%BD%93%E8%AA%BF%E3%83%A1%E3%83%A2%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>体調メモ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <section class="form-section">
      <div class="form-row">
        <label for="record-date">日付</label>
        <input type="date" id="record-date">
      </div>
      <div class="form-row">
        <label for="category">症状</label>
        <select id="category">
          <option value="頭痛">頭痛</option>
          <option value="倦怠感">倦怠感</option>
          <option value="発熱">発熱</option>
          <option value="吐き気">吐き気</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-row">
        <label for="severity">程度</label>
        <select id="severity">
          <option value="軽い">軽い</option>
          <option value="普通">普通</option>
          <option value="強い">強い</option>
        </select>
      </div>
      <div class="form-row">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="詳細・気になることなど">
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <span id="count-label"></span>
      </div>
      <ul id="record-list"></ul>
      <p id="empty-msg" class="empty-msg">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
