<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栄養管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>栄養管理アプリ</h1>

    <div class="date-nav">
      <button id="prevDay" class="date-btn">&#8249;</button>
      <span id="currentDate"></span>
      <button id="nextDay" class="date-btn">&#8250;</button>
    </div>

    <div class="totals">
      <div class="total-item protein">
        <span class="total-label">たんぱく質</span>
        <span class="total-value" id="totalProtein">0</span>
        <span class="total-unit">g</span>
      </div>
      <div class="total-item fat">
        <span class="total-label">脂質</span>
        <span class="total-value" id="totalFat">0</span>
        <span class="total-unit">g</span>
      </div>
      <div class="total-item carbs">
        <span class="total-label">糖質</span>
        <span class="total-value" id="totalCarbs">0</span>
        <span class="total-unit">g</span>
      </div>
    </div>

    <div class="form-section">
      <h2>食事を追加</h2>
      <div class="form-group">
        <label for="mealName">食事名</label>
        <input type="text" id="mealName" placeholder="例：朝食、ランチ">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="protein">たんぱく質 (g)</label>
          <input type="number" id="protein" min="0" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label for="fat">脂質 (g)</label>
          <input type="number" id="fat" min="0" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label for="carbs">糖質 (g)</label>
          <input type="number" id="carbs" min="0" step="0.1" placeholder="0">
        </div>
      </div>
      <button id="addBtn" class="add-btn">追加する</button>
    </div>

    <div class="list-section">
      <h2>食事記録</h2>
      <ul id="mealList" class="meal-list"></ul>
      <p id="emptyMsg" class="empty-msg">まだ記録がありません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
