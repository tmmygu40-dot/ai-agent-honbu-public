<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>説明文ジェネレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>説明文ジェネレーター</h1>
    <p class="subtitle">フリマ出品用の商品説明文を自動生成します</p>

    <section class="form-section">
      <div class="form-group">
        <label for="itemName">商品名 <span class="required">*</span></label>
        <input type="text" id="itemName" placeholder="例：ナイキ スニーカー エアマックス">
      </div>

      <div class="form-group">
        <label for="itemCategory">カテゴリ</label>
        <select id="itemCategory">
          <option value="">選択してください</option>
          <option value="ファッション">ファッション（服・靴・バッグ）</option>
          <option value="家電">家電・スマホ・カメラ</option>
          <option value="インテリア">インテリア・住まい・小物</option>
          <option value="本・音楽・ゲーム">本・音楽・ゲーム</option>
          <option value="スポーツ">スポーツ・レジャー</option>
          <option value="おもちゃ">おもちゃ・ホビー</option>
          <option value="コスメ">コスメ・香水・美容</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="itemCondition">商品の状態 <span class="required">*</span></label>
        <select id="itemCondition">
          <option value="">選択してください</option>
          <option value="新品・未使用">新品・未使用</option>
          <option value="未使用に近い">未使用に近い</option>
          <option value="目立った傷や汚れなし">目立った傷や汚れなし</option>
          <option value="やや傷や汚れあり">やや傷や汚れあり</option>
          <option value="傷や汚れあり">傷や汚れあり</option>
          <option value="全体的に状態が悪い">全体的に状態が悪い</option>
        </select>
      </div>

      <div class="form-group">
        <label for="itemFeatures">商品の特徴・アピールポイント <span class="required">*</span></label>
        <textarea id="itemFeatures" rows="4" placeholder="例：購入から半年、ほとんど使用していません。サイズは27cm。箱付き。カラーはホワイト。"></textarea>
      </div>

      <div class="form-group">
        <label for="itemDefects">傷・汚れ・注意点（任意）</label>
        <textarea id="itemDefects" rows="2" placeholder="例：右かかと部分に小さな擦り傷があります"></textarea>
      </div>

      <div class="form-group">
        <label for="itemPrice">希望価格（任意）</label>
        <div class="price-input">
          <input type="number" id="itemPrice" placeholder="3000" min="0">
          <span class="price-unit">円</span>
        </div>
      </div>

      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="chkNoReturn"> 返品・交換不可</label>
        <label><input type="checkbox" id="chkNego"> 価格交渉あり</label>
        <label><input type="checkbox" id="chkQuickShip"> 即日発送可</label>
      </div>

      <button id="generateBtn" class="btn-generate">説明文を生成する</button>
    </section>

    <section class="result-section" id="resultSection" style="display:none">
      <h2>生成された説明文</h2>
      <div class="result-box">
        <textarea id="resultText" rows="15" readonly></textarea>
      </div>
      <div class="result-actions">
        <button id="copyBtn" class="btn-copy">コピーする</button>
        <span id="copyMsg" class="copy-msg"></span>
      </div>
    </section>

    <section class="history-section" id="historySection">
      <div class="history-header">
        <h2>生成履歴</h2>
        <button id="clearHistoryBtn" class="btn-clear-history">履歴を全削除</button>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-msg">履歴はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
