    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;

      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ボタングリッド */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }
    .btn-grid.col3 { grid-template-columns: repeat(3, 1fr); }
    .sel-btn {
      padding: 0.7rem 0.5rem;
      font-size: 0.88rem; font-weight: 600;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sel-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .sel-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* Step インジケーター */
    .step-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 0.6rem;
    }
    .step-label span { color: var(--accent); }

    /* 結果カード */
    .result-wrap {
      display: none;
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .result-main {
      background: var(--ok-bg);
      border: 2px solid var(--ok);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .result-main.funeral { background: #f5f3ff; border-color: #7c3aed; }
    .result-amount-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-amount { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; color: var(--ok); line-height: 1.1; margin-bottom: 0.3rem; }
    .result-main.funeral .result-amount { color: #7c3aed; }
    .result-scene { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-note { font-size: 0.88rem; color: var(--text); line-height: 1.6; }

    /* マナーカード */
    .manner-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.2rem; box-shadow: var(--shadow); }
    .manner-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .manner-list { list-style: none; }
    .manner-list li { font-size: 0.88rem; color: var(--text); line-height: 1.6; padding: 0.35rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .manner-list li:last-child { border-bottom: none; }
    .manner-list li::before { content: "✓"; color: var(--accent); font-weight: 700; flex-shrink: 0; }

    .reset-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.9rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }

    @media (max-width: 480px) {
      .btn-grid.col3 { grid-template-columns: repeat(2, 1fr); }
    }

  var selectedScene = null;
  var selectedRel = null;

  function init() {
    // localStorage から復元
    var saved = JSON.parse(localStorage.getItem('kankon_last') || '{}');

    // 場面ボタン生成
    var sg = document.getElementById('scene-grid');
    SCENES.forEach(function(s) {
      var b = document.createElement('button');
      b.className = 'sel-btn';
      b.textContent = s.emoji + ' ' + s.label;
      b.dataset.id = s.id;
      b.onclick = function() { selectScene(s.id); };
      sg.appendChild(b);
    });

    // 関係性ボタン生成
    var rg = document.getElementById('rel-grid');
    RELS.forEach(function(r) {
      var b = document.createElement('button');
      b.className = 'sel-btn';
      b.textContent = r.label;
      b.dataset.id = r.id;
      b.onclick = function() { selectRel(r.id); };
      rg.appendChild(b);
    });

    // 復元
    if (saved.scene) selectScene(saved.scene, true);
    if (saved.rel) selectRel(saved.rel, true);
  }

  function selectScene(id, silent) {
    selectedScene = id;
    selectedRel = null;

    // ボタン状態更新
    document.querySelectorAll('#scene-grid .sel-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.id === id);
    });

    // Step2 表示
    document.getElementById('step2-card').style.display = '';
    // 関係性ボタンリセット
    document.querySelectorAll('#rel-grid .sel-btn').forEach(function(b) {
      b.classList.remove('active');
    });

    // 結果非表示
    document.getElementById('result-wrap').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';

    if (!silent) saveState();
  }

  function selectRel(id, silent) {
    if (!selectedScene) return;
    selectedRel = id;

    // ボタン状態更新
    document.querySelectorAll('#rel-grid .sel-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.id === id);
    });

    showResult();
    if (!silent) saveState();
  }

  function showResult() {
    var scene = SCENES.find(function(s) { return s.id === selectedScene; });
    var rel = RELS.find(function(r) { return r.id === selectedRel; });
    var d = DATA[selectedScene] && DATA[selectedScene][selectedRel];
    if (!scene || !rel || !d) return;

    var wrap = document.getElementById('result-wrap');
    var main = document.getElementById('result-main');
    wrap.style.display = '';
    main.className = 'result-main' + (scene.funeral ? ' funeral' : '');

    document.getElementById('result-label').textContent = scene.funeral ? '香典の相場' : 'ご祝儀の相場';
    document.getElementById('result-amount').textContent = d.amount;
    document.getElementById('result-scene').textContent = scene.emoji + ' ' + scene.label + '｜' + rel.label;
    document.getElementById('result-note').textContent = d.note;

    var ul = document.getElementById('manner-list');
    ul.innerHTML = d.manners.map(function(m) { return '<li>' + m + '</li>'; }).join('');

    document.getElementById('reset-btn').style.display = '';

    // スクロール
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function reset() {
    selectedScene = null;
    selectedRel = null;
    document.querySelectorAll('.sel-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('step2-card').style.display = 'none';
    document.getElementById('result-wrap').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    localStorage.removeItem('kankon_last');
    document.getElementById('step1-card').scrollIntoView({ behavior: 'smooth' });
  }

  function saveState() {
    localStorage.setItem('kankon_last', JSON.stringify({ scene: selectedScene, rel: selectedRel }));
  }

  init();
  </script>
