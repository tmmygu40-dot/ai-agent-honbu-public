<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント受付管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>イベント受付管理</h1>

    <!-- タブ切り替え -->
    <div class="tabs">
      <button class="tab active" data-tab="register">参加者登録</button>
      <button class="tab" data-tab="checkin">当日受付</button>
    </div>

    <!-- 参加者登録タブ -->
    <div id="tab-register" class="tab-content active">
      <h2>参加者を登録する</h2>
      <div class="form-group">
        <input type="text" id="input-name" placeholder="氏名（必須）" maxlength="50">
        <input type="text" id="input-note" placeholder="備考（任意）" maxlength="100">
        <button id="btn-add">登録</button>
      </div>
      <div class="count-bar">
        登録者数：<span id="total-count">0</span> 名
      </div>
      <ul id="participant-list"></ul>
    </div>

    <!-- 当日受付タブ -->
    <div id="tab-checkin" class="tab-content">
      <h2>当日受付</h2>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="氏名で検索...">
      </div>
      <div class="status-bar">
        チェックイン済：<span id="checked-count">0</span> 名 ／ 全体：<span id="total-count2">0</span> 名
      </div>
      <ul id="checkin-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
