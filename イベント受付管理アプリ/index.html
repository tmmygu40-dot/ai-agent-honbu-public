<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント受付管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>イベント受付管理</h1>

    <!-- タブ切り替え -->
    <div class="tabs">
      <button id="tab-btn-register" class="tab active" data-tab="register">参加者登録</button>
      <button id="tab-btn-checkin" class="tab" data-tab="checkin">当日受付</button>
    </div>

    <!-- 参加者登録タブ -->
    <div id="tab-register" class="tab-content active">
      <h2>参加者を登録する</h2>
      <div class="form-group">
        <input type="text" id="input-name" placeholder="氏名（必須）" maxlength="50">
        <input type="text" id="input-note" placeholder="備考（任意）" maxlength="100">
        <button id="btn-add">登録</button>
      </div>
      <div class="count-bar">
        登録者数：<span id="total-count">0</span> 名
      </div>
      <ul id="participant-list"></ul>
    </div>

    <!-- 当日受付タブ -->
    <div id="tab-checkin" class="tab-content">
      <h2>当日受付</h2>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="氏名で検索...">
      </div>
      <div class="status-bar">
        チェックイン済：<span id="checked-count">0</span> 名 ／ 全体：<span id="total-count2">0</span> 名
      </div>
      <ul id="checkin-list"></ul>
    </div>
  </div>

  <script>
  (function () {
    const STORAGE_KEY = 'event-participants';
    let participants = [];

    function load() {
      try { participants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { participants = []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(participants));
    }

    function esc(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function now() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'checkin') renderCheckin();
    }

    function addParticipant() {
      const nameEl = document.getElementById('input-name');
      const noteEl = document.getElementById('input-note');
      const name = nameEl.value.trim();
      if (!name) { nameEl.focus(); return; }
      participants.push({ id: Date.now(), name, note: noteEl.value.trim(), checked: false, checkedAt: null });
      save();
      nameEl.value = '';
      noteEl.value = '';
      nameEl.focus();
      renderRegister();
    }

    function renderRegister() {
      const list = document.getElementById('participant-list');
      document.getElementById('total-count').textContent = participants.length;
      if (participants.length === 0) {
        list.innerHTML = '<p class="empty-msg">登録された参加者はいません</p>';
        return;
      }
      list.innerHTML = participants.map((p, idx) => `
        <li class="participant-item">
          <div class="info">
            <div class="name">${esc(p.name)}</div>
            ${p.note ? `<div class="note">${esc(p.note)}</div>` : ''}
          </div>
          <button class="btn-delete" data-idx="${idx}">削除</button>
        </li>
      `).join('');
      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          participants.splice(parseInt(btn.dataset.idx), 1);
          save();
          renderRegister();
        });
      });
    }

    function renderCheckin() {
      const keyword = document.getElementById('search-input').value.trim().toLowerCase();
      const list = document.getElementById('checkin-list');
      document.getElementById('checked-count').textContent = participants.filter(p => p.checked).length;
      document.getElementById('total-count2').textContent = participants.length;
      const filtered = keyword
        ? participants.filter(p => p.name.toLowerCase().includes(keyword))
        : [...participants];
      if (filtered.length === 0) {
        list.innerHTML = keyword
          ? '<p class="empty-msg">一致する参加者が見つかりません</p>'
          : '<p class="empty-msg">参加者が登録されていません</p>';
        return;
      }
      filtered.sort((a, b) => a.checked === b.checked ? 0 : a.checked ? 1 : -1);
      list.innerHTML = filtered.map(p => `
        <li class="checkin-item ${p.checked ? 'checked' : ''}" data-id="${p.id}">
          <div class="info">
            <div class="name">${esc(p.name)}</div>
            ${p.note ? `<div class="note">${esc(p.note)}</div>` : ''}
            ${p.checked && p.checkedAt ? `<div class="time-label">受付済：${p.checkedAt}</div>` : ''}
          </div>
          <button class="btn-checkin" data-id="${p.id}">${p.checked ? '取消' : 'チェックイン'}</button>
        </li>
      `).join('');
      list.querySelectorAll('.btn-checkin').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = participants.find(x => x.id === parseInt(btn.dataset.id));
          if (!p) return;
          p.checked = !p.checked;
          p.checkedAt = p.checked ? now() : null;
          save();
          renderCheckin();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('tab-btn-register').addEventListener('click', function () { switchTab(this); });
      document.getElementById('tab-btn-checkin').addEventListener('click', function () { switchTab(this); });
      document.getElementById('btn-add').addEventListener('click', addParticipant);
      document.getElementById('input-name').addEventListener('keydown', e => { if (e.key === 'Enter') addParticipant(); });
      document.getElementById('search-input').addEventListener('input', renderCheckin);
      load();
      renderRegister();
    });
  })();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
