<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発注判断チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .setting-row {
      display: flex; align-items: center; gap: 0.7rem;
      font-size: 0.88rem; color: var(--text-sub);
    }
    .setting-row input[type="number"] {
      width: 70px; padding: 0.4rem 0.6rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text);
      outline: none; text-align: center;
    }
    .setting-row input[type="number"]:focus { border-color: var(--accent); background: #fff; }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    @media (min-width: 500px) {
      .input-grid { grid-template-columns: 2fr 1fr 1fr 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.78rem; font-weight: 600; color: var(--text-sub); }
    .field input {
      padding: 0.72rem 0.9rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .btn-add {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* サマリー */
    .summary-row {
      display: flex; gap: 0.8rem; margin: 0 auto 1rem; max-width: 640px;
    }
    .summary-card {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 0.8rem; text-align: center;
      box-shadow: var(--shadow);
    }
    .summary-card .s-num { font-size: 1.7rem; font-weight: 900; line-height: 1; }
    .summary-card .s-label { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .summary-card.ng { border-color: var(--ng); background: var(--ng-bg); }
    .summary-card.ng .s-num { color: var(--ng); }
    .summary-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .summary-card.warn .s-num { color: var(--warn); }
    .summary-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .summary-card.ok .s-num { color: var(--ok); }

    /* 品目リスト */
    .items-wrap { max-width: 640px; margin: 0 auto; }
    .item-card {
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.1rem;
      margin-bottom: 0.75rem; box-shadow: var(--shadow);
      position: relative;
    }
    .item-card.ng   { border-color: var(--ng);   background: var(--ng-bg); }
    .item-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .item-card.ok   { border-color: var(--ok);    background: var(--ok-bg); }

    .item-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.7rem;
    }
    .item-name { font-size: 1rem; font-weight: 800; }
    .item-badge {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      padding: 0.22rem 0.6rem; border-radius: 20px;
    }
    .item-card.ng   .item-badge { background: var(--ng);   color: #fff; }
    .item-card.warn .item-badge { background: var(--warn);  color: #fff; }
    .item-card.ok   .item-badge { background: var(--ok);    color: #fff; }

    .item-main { font-size: 1.6rem; font-weight: 900; margin-bottom: 0.4rem; }
    .item-card.ng   .item-main { color: var(--ng); }
    .item-card.warn .item-main { color: var(--warn); }
    .item-card.ok   .item-main { color: var(--ok); }

    .item-detail {
      display: flex; gap: 1rem; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--text-sub);
    }
    .item-detail span { white-space: nowrap; }
    .item-detail strong { color: var(--text); }

    .btn-del {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-sub); line-height: 1;
      padding: 0.2rem 0.3rem; border-radius: 5px;
    }
    .btn-del:hover { color: var(--ng); background: var(--ng-bg); }

    .empty-msg {
      text-align: center; color: var(--text-sub); font-size: 0.88rem;
      padding: 2rem 0;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>発注判断チェッカー</h1>
    <p class="subtitle">在庫数・消費ペース・調達日数から発注タイミングを即判断</p>
  </header>

  <!-- 安全在庫設定 -->
  <div class="card" style="max-width:640px">
    <p class="card-title">設定</p>
    <div class="setting-row">
      <span>安全在庫日数（バッファ）：</span>
      <input type="number" id="safetyDays" value="3" min="0" max="30" onchange="renderList()">
      <span>日</span>
    </div>
  </div>

  <!-- 入力フォーム -->
  <div class="card" style="max-width:640px">
    <p class="card-title">品目を追加</p>
    <div class="input-grid">
      <div class="field">
        <label for="iName">品目名</label>
        <input type="text" id="iName" placeholder="例：A部品">
      </div>
      <div class="field">
        <label for="iStock">在庫数</label>
        <input type="number" id="iStock" placeholder="100" min="0">
      </div>
      <div class="field">
        <label for="iConsume">消費/日</label>
        <input type="number" id="iConsume" placeholder="5" min="0.01" step="0.01">
      </div>
      <div class="field">
        <label for="iLead">調達日数</label>
        <input type="number" id="iLead" placeholder="7" min="0">
      </div>
    </div>
  </div>

  <button class="btn-add" onclick="addItem()">＋ 品目を追加して判断する</button>

  <!-- サマリー -->
  <div class="summary-row" id="summaryRow" style="display:none">
    <div class="summary-card ng" id="sumNg">
      <div class="s-num" id="sumNgNum">0</div>
      <div class="s-label">要発注</div>
    </div>
    <div class="summary-card warn" id="sumWarn">
      <div class="s-num" id="sumWarnNum">0</div>
      <div class="s-label">注意</div>
    </div>
    <div class="summary-card ok" id="sumOk">
      <div class="s-num" id="sumOkNum">0</div>
      <div class="s-label">余裕あり</div>
    </div>
  </div>

  <!-- 品目リスト -->
  <div class="items-wrap" id="itemsWrap"></div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORE_KEY = 'hatyu-handan-items-v1';
  var items = [];

  function load() {
    try { items = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { items = []; }
    renderList();
  }

  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
  }

  function addItem() {
    var name    = document.getElementById('iName').value.trim();
    var stock   = parseFloat(document.getElementById('iStock').value);
    var consume = parseFloat(document.getElementById('iConsume').value);
    var lead    = parseFloat(document.getElementById('iLead').value);

    if (!name) { alert('品目名を入力してください'); return; }
    if (isNaN(stock) || stock < 0)   { alert('在庫数を正しく入力してください'); return; }
    if (isNaN(consume) || consume <= 0) { alert('消費/日を正しく入力してください（0より大きい値）'); return; }
    if (isNaN(lead) || lead < 0)    { alert('調達日数を正しく入力してください'); return; }

    items.push({ name: name, stock: stock, consume: consume, lead: lead, id: Date.now() });
    save();
    renderList();

    document.getElementById('iName').value    = '';
    document.getElementById('iStock').value   = '';
    document.getElementById('iConsume').value = '';
    document.getElementById('iLead').value    = '';
    document.getElementById('iName').focus();
  }

  function deleteItem(id) {
    items = items.filter(function(it) { return it.id !== id; });
    save();
    renderList();
  }

  function getLevel(remainDays, trigger) {
    if (remainDays <= trigger) return 'ng';
    if (remainDays <= trigger * 2) return 'warn';
    return 'ok';
  }

  function renderList() {
    var safety = parseFloat(document.getElementById('safetyDays').value) || 0;
    var wrap = document.getElementById('itemsWrap');
    var summaryRow = document.getElementById('summaryRow');

    if (items.length === 0) {
      wrap.innerHTML = '<p class="empty-msg">品目を追加すると発注タイミングが表示されます</p>';
      summaryRow.style.display = 'none';
      return;
    }

    summaryRow.style.display = 'flex';
    var ngCount = 0, warnCount = 0, okCount = 0;
    var html = '';

    // 要発注順にソート（残存日数が少ない順）
    var sorted = items.slice().sort(function(a, b) {
      var rA = a.stock / a.consume;
      var rB = b.stock / b.consume;
      return rA - rB;
    });

    sorted.forEach(function(it) {
      var remainDays = it.stock / it.consume;
      var trigger    = it.lead + safety;
      var level      = getLevel(remainDays, trigger);
      var badge      = level === 'ng' ? '要発注！' : level === 'warn' ? '注意' : '余裕あり';

      if (level === 'ng')   ngCount++;
      else if (level === 'warn') warnCount++;
      else okCount++;

      var remainTxt = remainDays >= 999 ? '999+日' : Math.floor(remainDays) + '日';
      var orderMsg  = level === 'ng'
        ? '今すぐ発注してください'
        : level === 'warn'
        ? '発注タイミングが近づいています'
        : '在庫に余裕があります';

      html += '<div class="item-card ' + level + '">'
            + '<button class="btn-del" onclick="deleteItem(' + it.id + ')" title="削除">✕</button>'
            + '<div class="item-header">'
            + '<span class="item-name">' + esc(it.name) + '</span>'
            + '<span class="item-badge">' + badge + '</span>'
            + '</div>'
            + '<div class="item-main">' + remainTxt + '</div>'
            + '<div class="item-detail">'
            + '<span>在庫数：<strong>' + fmt(it.stock) + '</strong></span>'
            + '<span>消費/日：<strong>' + it.consume + '</strong></span>'
            + '<span>調達日数：<strong>' + it.lead + '日</strong></span>'
            + '<span>発注判断ライン：<strong>' + trigger + '日前</strong></span>'
            + '</div>'
            + '<div style="font-size:0.8rem;color:var(--text-sub);margin-top:0.5rem">' + orderMsg + '</div>'
            + '</div>';
    });

    wrap.innerHTML = html;
    document.getElementById('sumNgNum').textContent   = ngCount;
    document.getElementById('sumWarnNum').textContent = warnCount;
    document.getElementById('sumOkNum').textContent   = okCount;
  }

  function fmt(n) {
    return Number(n).toLocaleString('ja-JP');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enterキーで追加
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.target.id === 'iName' || e.target.id === 'iStock' || e.target.id === 'iConsume' || e.target.id === 'iLead')) {
      addItem();
    }
  });

  load();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
