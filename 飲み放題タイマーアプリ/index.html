<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲み放題タイマー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍺 飲み放題タイマー</h1>
    </header>

    <section class="add-form">
      <h2>テーブルを追加</h2>
      <div class="form-row">
        <label>テーブル番号
          <input type="text" id="tableNo" placeholder="例：1番" maxlength="10">
        </label>
        <label>人数
          <input type="number" id="persons" placeholder="人数" min="1" max="99" value="2">
        </label>
      </div>
      <div class="form-row">
        <label>制限時間（分）
          <input type="number" id="limitMin" placeholder="分" min="1" max="300" value="90">
        </label>
        <label>開始時刻
          <input type="time" id="startTime">
        </label>
      </div>
      <button class="btn-add" onclick="addTable()">追加する</button>
    </section>

    <section class="table-list">
      <div class="list-header">
        <h2>テーブル一覧</h2>
        <span class="count" id="tableCount">0件</span>
      </div>
      <div id="tableCards"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
