<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移動コスト比較チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%A7%BB%E5%8B%95%E3%82%B3%E3%82%B9%E3%83%88%E6%AF%94%E8%BC%83%E3%83%81%E3%82%A7%E3%83%83%E3%82%AB%E3%83%BC/" />
  <meta name="description" content="移動コスト比較チェッカーは、条件を選ぶだけで診断・確認できる無料ツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"移動コスト比較チェッカー","description":"移動コスト比較チェッカーは、条件を選ぶだけで診断・確認できる無料ツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E7%A7%BB%E5%8B%95%E3%82%B3%E3%82%B9%E3%83%88%E6%AF%94%E8%BC%83%E3%83%81%E3%82%A7%E3%83%83%E3%82%AB%E3%83%BC/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>移動コスト比較チェッカー</h1>
    <p class="subtitle">車 vs 電車、どちらが安いか即比較</p>

    <div class="cards">
      <!-- 車コスト -->
      <div class="card car-card">
        <div class="card-header">
          <span class="icon">🚗</span>
          <h2>車</h2>
        </div>
        <div class="field">
          <label for="gas">ガソリン代（円）</label>
          <input type="number" id="gas" min="0" placeholder="例: 800" inputmode="numeric">
        </div>
        <div class="field">
          <label for="highway">高速代（円）</label>
          <input type="number" id="highway" min="0" placeholder="例: 1200" inputmode="numeric">
        </div>
        <div class="field">
          <label for="parking">駐車代（円）</label>
          <input type="number" id="parking" min="0" placeholder="例: 500" inputmode="numeric">
        </div>
        <div class="subtotal" id="car-subtotal">合計：― 円</div>
      </div>

      <!-- 電車コスト -->
      <div class="card train-card">
        <div class="card-header">
          <span class="icon">🚃</span>
          <h2>電車</h2>
        </div>
        <div class="field">
          <label for="fare">運賃（円）</label>
          <input type="number" id="fare" min="0" placeholder="例: 560" inputmode="numeric">
        </div>
        <div class="field">
          <label for="ic-discount">ICカード割引（円）</label>
          <input type="number" id="ic-discount" min="0" placeholder="例: 10" inputmode="numeric">
        </div>
        <div class="field">
          <label for="other-train">その他（バス代など）（円）</label>
          <input type="number" id="other-train" min="0" placeholder="例: 200" inputmode="numeric">
        </div>
        <div class="subtotal" id="train-subtotal">合計：― 円</div>
      </div>
    </div>

    <!-- 比較ボタン -->
    <button class="compare-btn" id="compare-btn" onclick="compare()">比較する</button>

    <!-- 結果 -->
    <div class="result-area" id="result-area" style="display:none;">
      <div class="result-box" id="result-box">
        <div class="winner" id="winner-label"></div>
        <div class="diff" id="diff-label"></div>
        <div class="detail" id="detail-label"></div>
      </div>
    </div>

    <!-- リセット -->
    <button class="reset-btn" id="reset-btn" onclick="resetAll()">リセット</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
