<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接質問ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果エリア ── */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }

    /* ── カテゴリカード ── */
    .cat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .cat-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .cat-title .cat-num {
      background: var(--accent); color: #fff;
      border-radius: 5px; padding: 0.1rem 0.45rem;
      font-size: 0.72rem; font-weight: 900;
    }
    .q-list { list-style: none; padding: 0; }
    .q-list li {
      font-size: 0.9rem; color: var(--text);
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
      display: flex; gap: 0.6rem;
    }
    .q-list li:last-child { border-bottom: none; }
    .q-num { flex-shrink: 0; font-weight: 700; color: var(--accent); min-width: 1.4rem; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy:hover { background: #fde8c4; }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .cat-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎯 面接質問ジェネレーター</h1>
    <p class="subtitle">職種・スキル・資質を入力して採用面接の質問リストを即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">面接情報を入力</p>
    <div class="field">
      <label for="job">職種・ポジション <span style="color:var(--ng)">*</span></label>
      <input type="text" id="job" placeholder="例: Webエンジニア、営業マネージャー、経理担当">
    </div>
    <div class="field">
      <label for="skills">必要スキル・経験</label>
      <textarea id="skills" placeholder="例: Python、プロジェクト管理3年以上、顧客折衝経験&#10;（複数の場合は改行または読点で区切る）"></textarea>
      <p class="hint">空欄の場合は一般的な質問を生成します</p>
    </div>
    <div class="field">
      <label for="traits">重視する資質・人柄</label>
      <textarea id="traits" placeholder="例: リーダーシップ、コミュニケーション力、粘り強さ&#10;（複数の場合は改行または読点で区切る）"></textarea>
      <p class="hint">空欄の場合は一般的な質問を生成します</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc no-print" onclick="generate()">📋 質問リストを生成する</button>

  <!-- 結果エリア -->
  <div class="result-area" id="resultArea">

    <!-- 概要カード -->
    <div class="card" style="text-align:center; padding:1rem 1.2rem 0.8rem;">
      <p style="font-size:0.78rem;color:var(--text-sub);margin-bottom:0.3rem;">生成した質問数</p>
      <p id="totalCount" style="font-size:2.2rem;font-weight:900;color:var(--accent);line-height:1;">—</p>
      <p style="font-size:0.8rem;color:var(--text-sub);margin-top:0.2rem;">問</p>
    </div>

    <!-- カテゴリ別質問 -->
    <div id="catContainer"></div>

    <!-- コピーボタン -->
    <button class="btn-copy no-print" onclick="copyAll()">📋 全質問をコピーする</button>

  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var CATEGORIES = [
    {
      id: 'basic',
      label: '基本確認',
      icon: '📌',
      questions: [
        function(job) { return '本日はお越しいただきありがとうございます。まず、' + job + 'としての経歴を簡単にご紹介いただけますか？'; },
        function(job) { return '前職を離れた（または離れようとしている）理由を教えてください。'; },
        function(job) { return '当社の' + job + 'ポジションに応募された動機は何ですか？'; },
        function(job) { return 'これまでの職歴の中で、最も誇れる実績を教えてください。'; },
        function(job) { return '入社後、まず取り組みたいことは何ですか？'; },
      ]
    },
    {
      id: 'skills',
      label: 'スキル・経験確認',
      icon: '🔧',
      questions: [] // 動的生成
    },
    {
      id: 'traits',
      label: '資質・人柄確認',
      icon: '💡',
      questions: [] // 動的生成
    },
    {
      id: 'motivation',
      label: '意欲・将来像確認',
      icon: '🚀',
      questions: [
        function(job) { return '5年後、' + job + 'としてどのような姿を目指していますか？'; },
        function(job) { return '仕事において最もやりがいを感じる瞬間はどんな時ですか？'; },
        function(job) { return '当社でどのような価値を発揮できると思いますか？'; },
        function(job) { return '困難な状況に直面したとき、どのように乗り越えてきましたか？'; },
      ]
    }
  ];

  var SKILL_TEMPLATES = [
    function(skill) { return skill + 'について、具体的な経験年数と実績を教えてください。'; },
    function(skill) { return skill + 'を活かした最も難しかった案件について教えてください。どのような課題があり、どう解決しましたか？'; },
    function(skill) { return skill + 'のスキルをどのように習得・向上させてきましたか？'; },
  ];

  var TRAIT_TEMPLATES = [
    function(trait) { return trait + 'を発揮した具体的なエピソードを教えてください。'; },
    function(trait) { return trait + 'について、自己評価と周囲からの評価の違いがあれば教えてください。'; },
  ];

  function splitInput(val) {
    if (!val.trim()) return [];
    return val.split(/[、,，\n]/).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
  }

  function generate() {
    var job    = document.getElementById('job').value.trim();
    var skills = splitInput(document.getElementById('skills').value);
    var traits = splitInput(document.getElementById('traits').value);

    if (!job) {
      alert('職種・ポジションを入力してください');
      return;
    }

    // localStorage 保存
    localStorage.setItem('mensetu_job',    job);
    localStorage.setItem('mensetu_skills', document.getElementById('skills').value);
    localStorage.setItem('mensetu_traits', document.getElementById('traits').value);

    var allQuestions = [];
    var container = document.getElementById('catContainer');
    container.innerHTML = '';

    // カテゴリ1: 基本確認
    var basicQs = CATEGORIES[0].questions.map(function(fn){ return fn(job); });
    renderCat(CATEGORIES[0], basicQs, container, allQuestions);

    // カテゴリ2: スキル確認（スキルが未入力なら汎用質問）
    var skillQs = [];
    if (skills.length > 0) {
      skills.forEach(function(skill) {
        SKILL_TEMPLATES.forEach(function(fn) {
          skillQs.push(fn(skill));
        });
      });
      // 多すぎる場合は6問に制限
      if (skillQs.length > 6) skillQs = skillQs.slice(0, 6);
    } else {
      skillQs = [
        '業務上最も得意とするスキルと、その習得のプロセスを教えてください。',
        'これまでの経験の中で最も難しかった業務課題と、その解決方法を教えてください。',
        '現在、業務スキル向上のために取り組んでいることはありますか？',
      ];
    }
    renderCat({label: 'スキル・経験確認', icon: '🔧'}, skillQs, container, allQuestions);

    // カテゴリ3: 資質確認（資質が未入力なら汎用質問）
    var traitQs = [];
    if (traits.length > 0) {
      traits.forEach(function(trait) {
        TRAIT_TEMPLATES.forEach(function(fn) {
          traitQs.push(fn(trait));
        });
      });
      if (traitQs.length > 6) traitQs = traitQs.slice(0, 6);
    } else {
      traitQs = [
        'あなたの強みと弱みをそれぞれ教えてください。',
        'チームで仕事をする際、どのような役割を担うことが多いですか？',
        '意見が対立したとき、どのように対処しますか？',
      ];
    }
    renderCat({label: '資質・人柄確認', icon: '💡'}, traitQs, container, allQuestions);

    // カテゴリ4: 意欲・将来像
    var motivationQs = CATEGORIES[3].questions.map(function(fn){ return fn(job); });
    renderCat(CATEGORIES[3], motivationQs, container, allQuestions);

    // 合計
    document.getElementById('totalCount').textContent = allQuestions.length;
    document.getElementById('resultArea').style.display = 'block';

    // スクロール
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderCat(cat, questions, container, allQuestions) {
    var startNum = allQuestions.length + 1;
    var card = document.createElement('div');
    card.className = 'cat-card';

    var qs = questions.map(function(q, i) {
      allQuestions.push(q);
      return '<li><span class="q-num">Q' + (startNum + i) + '.</span><span>' + escHtml(q) + '</span></li>';
    }).join('');

    card.innerHTML = '<div class="cat-title"><span class="cat-num">' + escHtml(cat.icon) + '</span>' + escHtml(cat.label) + '</div>'
      + '<ul class="q-list">' + qs + '</ul>';
    container.appendChild(card);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyAll() {
    var job = localStorage.getItem('mensetu_job') || '';
    var lines = ['【面接質問リスト】'];
    if (job) lines.push('職種: ' + job);
    lines.push('');

    var cats = document.querySelectorAll('.cat-card');
    cats.forEach(function(cat) {
      var title = cat.querySelector('.cat-title').textContent.trim();
      lines.push('■ ' + title);
      var items = cat.querySelectorAll('.q-list li');
      items.forEach(function(li) {
        var num  = li.querySelector('.q-num').textContent.trim();
        var text = li.querySelector('span:last-child').textContent.trim();
        lines.push(num + ' ' + text);
      });
      lines.push('');
    });

    var text = lines.join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.querySelector('.btn-copy');
        btn.textContent = '✅ コピーしました！';
        setTimeout(function(){ btn.textContent = '📋 全質問をコピーする'; }, 2000);
      });
    } else {
      // フォールバック
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.querySelector('.btn-copy');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function(){ btn.textContent = '📋 全質問をコピーする'; }, 2000);
    }
  }

  // localStorage から復元
  window.addEventListener('DOMContentLoaded', function() {
    var job    = localStorage.getItem('mensetu_job');
    var skills = localStorage.getItem('mensetu_skills');
    var traits = localStorage.getItem('mensetu_traits');
    if (job)    document.getElementById('job').value    = job;
    if (skills) document.getElementById('skills').value = skills;
    if (traits) document.getElementById('traits').value = traits;
  });
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
