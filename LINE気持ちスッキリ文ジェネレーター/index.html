<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE気持ちスッキリ文ジェネレーター｜悩みを共感LINE文に</title>
  <meta name="description" content="モヤモヤや悩みを入力するだけで、友達に送れる共感LINE文を3パターン即生成。関係性とトーンを選んでワンタップでコピーできる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .msg-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 600px;
    }
    .msg-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }
    .msg-body {
      font-size: 0.95rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
      padding: 0.8rem 0.9rem;
      background: var(--accent-light);
      border-radius: 10px;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.7rem 0.9rem; font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
    #out-area { display: none; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .msg-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>LINE気持ちスッキリ文ジェネレーター</h1>
    <p class="subtitle">悩みを入れると、友達に送れる共感LINE文を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="worry">いまの悩み・モヤモヤ</label>
      <textarea id="worry" placeholder="例：上司に理不尽に怒られて凹んでる…"></textarea>
      <p class="hint">短い言葉でOK。具体的なほど共感文がしっくりきます</p>
    </div>
    <div class="field">
      <label for="rel">送る相手</label>
      <select id="rel">
        <option value="親友">親友</option>
        <option value="友達">友達</option>
        <option value="同僚">同僚</option>
        <option value="家族">家族</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="やさしく">やさしく寄り添う</option>
        <option value="一緒に怒る">一緒に怒る・荒ぶる</option>
        <option value="笑い飛ばす">明るく笑い飛ばす</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">共感LINEを3パターン生成する</button>

  <!-- 出力エリア -->
  <div id="out-area">
    <div class="msg-card">
      <p class="msg-label">パターン1</p>
      <p class="msg-body" id="m1"></p>
      <button class="btn-copy" onclick="copyMsg(1)">📋 コピー</button>
    </div>
    <div class="msg-card">
      <p class="msg-label">パターン2</p>
      <p class="msg-body" id="m2"></p>
      <button class="btn-copy" onclick="copyMsg(2)">📋 コピー</button>
    </div>
    <div class="msg-card">
      <p class="msg-label">パターン3</p>
      <p class="msg-body" id="m3"></p>
      <button class="btn-copy" onclick="copyMsg(3)">📋 コピー</button>
    </div>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var KEY = 'line_kimochi_v1';

  // 関係性ごとの呼びかけ・語尾
  var STYLE = {
    '親友': { you: 'ねぇ', end: 'よ〜', soft: 'だよね', warm: 'ほんとそれ' },
    '友達': { you: 'ねぇねぇ', end: 'よね', soft: 'だよね', warm: 'わかる〜' },
    '同僚': { you: 'お疲れさま、', end: 'です', soft: 'ですよね', warm: 'わかります' },
    '家族': { you: 'ちょっと聞いて、', end: 'んだよ', soft: 'だよね', warm: 'うんうん' }
  };

  // トーン別テンプレ（{w}=悩み, {y}=呼びかけ, {e}=語尾, {s}=ですよね系, {warm}=共感あいづち）
  var TEMPLATES = {
    'やさしく': [
      '{y}今日ちょっと聞いてくれる？\n「{w}」って感じで、地味にしんどい1日だった…。\nなんか{warm}ってなる出来事って、頭から離れないよね。\n話聞いてくれるだけで結構助かる、ありがとう🙏',
      '{y}話したいことあって連絡しちゃった。\n実は「{w}」みたいなことがあって、ちょっと心折れ気味…。\nうまく言えないけど、いま{warm}って言ってくれる人がほしかった。\n落ち着いたらまた普通に話そ〜🌷',
      '{y}いきなりごめん、ちょい吐き出させて。\n{w}って状況で、自分でも処理しきれてない感じ{e}。\n大丈夫って思いたいけど、今日はちょっと無理そう…。\n返信は気が向いたときでいいから、見てくれてありがと💭'
    ],
    '一緒に怒る': [
      '{y}聞いて聞いて、まじで腹立つことがあった！！\n「{w}」って、これおかしくない？？\n冷静になろうとしてるけど無理、{warm}案件{e}😤\n一緒にキレてくれる人ほしくて連絡しちゃった、ありがと💢',
      '{y}ちょっと愚痴らせて、ガチで限界。\n{w}とか、もう意味わかんない{s}！？\n我慢してた自分えらいけど、今日は荒ぶらせて🔥\nスタンプでもいいから「わかる」って言ってくれ〜！',
      '{y}怒りでLINE打ってる、ごめん🙏\n{w}って、これ普通にひどくない？？\n優しく対応してきたのバカらしくなってきた{e}。\n聞いてくれるだけでだいぶスッキリするから、お願い…！'
    ],
    '笑い飛ばす': [
      '{y}今日のヤバ事件聞いてww\n「{w}」って起きて、もう逆に笑える{e}🤣\n人生コント説あるよね、{warm}。\nオチ報告だけしたかった、ありがと〜！',
      '{y}ちょっとネタ提供🤲\n{w}とか、もはや創作でしょwwってレベル{e}。\n泣いても仕方ないから笑うことにした！\n後で詳しく話すから、今日は元気出すために連絡したw',
      '{y}今日もポンコツ稼働中ですw\n{w}って状況で、心の中で叫んでた…！\nまあ、生きてるしご飯食べたしOKってことで{e}🍚\nこっちの被害報告でした、{warm}って言ってくれたら救われるw'
    ]
  };

  function generate() {
    var w = document.getElementById('worry').value.trim();
    var rel = document.getElementById('rel').value;
    var tone = document.getElementById('tone').value;
    if (!w) { alert('悩み・モヤモヤを入力してください'); return; }

    save(w, rel, tone);

    var st = STYLE[rel] || STYLE['友達'];
    var tmpls = TEMPLATES[tone] || TEMPLATES['やさしく'];
    for (var i = 0; i < 3; i++) {
      var text = tmpls[i]
        .replace(/\{w\}/g, w)
        .replace(/\{y\}/g, st.you)
        .replace(/\{e\}/g, st.end)
        .replace(/\{s\}/g, st.soft)
        .replace(/\{warm\}/g, st.warm);
      document.getElementById('m' + (i + 1)).textContent = text;
    }
    document.getElementById('out-area').style.display = 'block';
    // ボタンの「コピー済み」表示をリセット
    var btns = document.querySelectorAll('.btn-copy');
    for (var b = 0; b < btns.length; b++) {
      btns[b].classList.remove('copied');
      btns[b].textContent = '📋 コピー';
    }
  }

  function copyMsg(n) {
    var text = document.getElementById('m' + n).textContent;
    var btn = document.querySelectorAll('.btn-copy')[n - 1];
    function done() {
      btn.classList.add('copied');
      btn.textContent = '✓ コピーしました';
      setTimeout(function () {
        btn.classList.remove('copied');
        btn.textContent = '📋 コピー';
      }, 1800);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallback(text, done); });
    } else {
      fallback(text, done);
    }
  }

  function fallback(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); cb(); } catch (e) { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }

  function save(w, rel, tone) {
    try { localStorage.setItem(KEY, JSON.stringify({ w: w, rel: rel, tone: tone })); } catch (e) {}
  }
  function load() {
    try {
      var s = localStorage.getItem(KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.w)    document.getElementById('worry').value = d.w;
      if (d.rel)  document.getElementById('rel').value   = d.rel;
      if (d.tone) document.getElementById('tone').value  = d.tone;
    } catch (e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
