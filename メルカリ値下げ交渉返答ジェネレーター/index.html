<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="メルカリの値下げコメントに何て返す？商品名・元値・提示額・自分のスタンスを選ぶだけで、丁寧／フランク／きっぱりの3パターン返答文を即生成。コピペで即送信できます。">
  <title>メルカリ値下げ交渉返答ジェネレーター｜3パターン即生成</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .radio-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .radio-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.8rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); cursor: pointer;
      font-size: 0.92rem; transition: border-color 0.15s, background 0.15s;
    }
    .radio-item input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .radio-item:has(input[type="radio"]:checked) {
      border-color: var(--accent); background: var(--accent-light);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* 返答文カード */
    .reply-list { display: none; max-width: 600px; margin: 0 auto 1rem; }
    .reply-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.1rem;
      box-shadow: var(--shadow); margin-bottom: 0.8rem;
    }
    .reply-style {
      font-size: 0.74rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .reply-text {
      font-size: 0.95rem; line-height: 1.65; color: var(--text);
      white-space: pre-wrap; word-wrap: break-word;
      background: var(--bg); padding: 0.8rem 0.9rem;
      border-radius: 9px; margin-bottom: 0.6rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.55rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .result-card, .reply-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ値下げ交渉返答ジェネレーター</h1>
    <p class="subtitle">商品名・金額・スタンスを選ぶだけで、丁寧／フランク／きっぱり の3パターン返答文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">出品情報</p>
    <div class="field">
      <label for="itemName">商品名（任意）</label>
      <input type="text" id="itemName" placeholder="例: 推しグッズまとめ売り">
    </div>
    <div class="field">
      <label for="listPrice">出品価格（円）</label>
      <input type="number" id="listPrice" inputmode="numeric" placeholder="例: 3000">
    </div>
    <div class="field">
      <label for="offerPrice">相手の希望価格（円）</label>
      <input type="number" id="offerPrice" inputmode="numeric" placeholder="例: 2500">
    </div>
  </div>

  <!-- スタンス -->
  <div class="card">
    <p class="card-title">あなたのスタンス</p>
    <div class="radio-group" id="stanceGroup">
      <label class="radio-item"><input type="radio" name="stance" value="accept"> そのままOK（提示額で売る）</label>
      <label class="radio-item"><input type="radio" name="stance" value="counter" checked> ここまでなら値下げOK</label>
      <label class="radio-item"><input type="radio" name="stance" value="reject"> お断り（値下げしない）</label>
    </div>
    <div class="field" id="counterField" style="margin-top:1rem;">
      <label for="floorPrice">譲歩可能下限（円）</label>
      <input type="number" id="floorPrice" inputmode="numeric" placeholder="例: 2800">
      <p class="hint">この金額までなら値下げOK、と相手に提案します</p>
    </div>
  </div>

  <!-- 相手の感じ -->
  <div class="card">
    <p class="card-title">相手の感じ</p>
    <div class="radio-group">
      <label class="radio-item"><input type="radio" name="tone" value="polite" checked> 丁寧・常識的</label>
      <label class="radio-item"><input type="radio" name="tone" value="casual"> 普通・カジュアル</label>
      <label class="radio-item"><input type="radio" name="tone" value="pushy"> グイグイ・強引</label>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">返答文を生成する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">値引き率</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 返答文リスト -->
  <div class="reply-list" id="replyList">
    <div class="reply-card">
      <p class="reply-style">丁寧スタイル</p>
      <p class="reply-text" id="replyPolite"></p>
      <button class="btn-copy" onclick="copyText('replyPolite', this)">📋 コピー</button>
    </div>
    <div class="reply-card">
      <p class="reply-style">フランクスタイル</p>
      <p class="reply-text" id="replyCasual"></p>
      <button class="btn-copy" onclick="copyText('replyCasual', this)">📋 コピー</button>
    </div>
    <div class="reply-card">
      <p class="reply-style">きっぱりスタイル</p>
      <p class="reply-text" id="replyFirm"></p>
      <button class="btn-copy" onclick="copyText('replyFirm', this)">📋 コピー</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、消費者庁・公正取引委員会のガイドラインや、フリマサービスの一般的なマナーを参考に、目安として使いやすく整理しています。最終的な対応は出品者自身でご判断ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'mercari_reply_gen_v1';

  // ── 返答文テンプレ ──
  function buildReplies(itemName, listPrice, offerPrice, stance, tone, floorPrice) {
    var item = itemName ? '「' + itemName + '」' : 'こちらの商品';
    var offerStr = offerPrice ? offerPrice.toLocaleString('ja-JP') + '円' : '提示の金額';
    var floorStr = floorPrice ? floorPrice.toLocaleString('ja-JP') + '円' : '〇〇円';

    var replies = { polite: '', casual: '', firm: '' };

    if (stance === 'accept') {
      // そのままOK
      replies.polite =
        'コメントありがとうございます。\n' +
        item + 'を ' + offerStr + ' に変更してお出ししますね。\n' +
        '専用にしますので、ご購入手続きをお願いいたします。';
      replies.casual =
        'コメントありがとうございます！\n' +
        offerStr + ' でお出しします〜\n' +
        '専用にするので、そのままご購入どうぞ！';
      replies.firm =
        'ご連絡ありがとうございます。\n' +
        offerStr + ' に変更しました。\n' +
        '24時間以内のご購入でお願いします。';

    } else if (stance === 'counter') {
      // 一部OK
      var middlePrefix = (tone === 'pushy')
        ? 'ご希望は承知しました。ただ、こちらにも下げられる限度がございます。\n'
        : 'コメントありがとうございます。\n';
      replies.polite =
        middlePrefix +
        '大変恐縮ですが、' + item + 'は ' + floorStr + ' までであればお値下げ可能です。\n' +
        'ご検討いただけますと幸いです。';
      replies.casual =
        'コメントありがとうございます！\n' +
        floorStr + ' まででしたら大丈夫です〜\n' +
        'いかがでしょうか？';
      replies.firm =
        'ご希望価格は厳しいです。\n' +
        floorStr + ' が最終ラインになります。\n' +
        'よろしければ専用にいたしますので、ご検討ください。';

    } else {
      // お断り
      var rejectPrefix = (tone === 'pushy')
        ? '何度かコメントをいただいておりますが、'
        : 'コメントありがとうございます。';
      replies.polite =
        rejectPrefix + '\n' +
        '誠に恐れ入りますが、' + item + 'は出品価格にてお譲りしたく、お値下げは見送らせてください。\n' +
        'ご縁がありましたらよろしくお願いいたします。';
      replies.casual =
        'コメントありがとうございます！\n' +
        'すみません、こちらは値下げ予定はないんです〜\n' +
        '気になっていただけたら嬉しいです🙇';
      replies.firm =
        'ご連絡ありがとうございます。\n' +
        'お値下げは行っておりません。\n' +
        '出品価格でのご検討をお願いいたします。';
    }

    return replies;
  }

  function getStance() {
    var els = document.getElementsByName('stance');
    for (var i = 0; i < els.length; i++) if (els[i].checked) return els[i].value;
    return 'counter';
  }
  function getTone() {
    var els = document.getElementsByName('tone');
    for (var i = 0; i < els.length; i++) if (els[i].checked) return els[i].value;
    return 'polite';
  }

  function generate() {
    var itemName = document.getElementById('itemName').value.trim();
    var listPrice = parseFloat(document.getElementById('listPrice').value);
    var offerPrice = parseFloat(document.getElementById('offerPrice').value);
    var stance = getStance();
    var tone = getTone();
    var floorPrice = parseFloat(document.getElementById('floorPrice').value);

    if (isNaN(listPrice) || listPrice <= 0) { showErr('出品価格を入力してください'); return; }
    if (isNaN(offerPrice) || offerPrice <= 0) { showErr('相手の希望価格を入力してください'); return; }
    if (offerPrice > listPrice) { showErr('希望価格が出品価格より高いです。入力をご確認ください'); return; }

    if (stance === 'counter') {
      if (isNaN(floorPrice) || floorPrice <= 0) { showErr('譲歩可能下限を入力してください'); return; }
      if (floorPrice >= listPrice) { showErr('譲歩下限が出品価格以上です'); return; }
      if (floorPrice <= offerPrice) {
        // 下限が希望以下なら、実質「accept」と同じ
      }
    }

    var discount = listPrice - offerPrice;
    var pct = (discount / listPrice * 100);
    var pctStr = pct.toFixed(1);
    var level = stance === 'reject' ? 'ng'
              : stance === 'accept' ? (pct >= 20 ? 'warn' : 'ok')
              : 'warn';
    var note = stance === 'accept' ? '提示額で受ける場合の値引き率です'
             : stance === 'counter' ? '相手の希望額に対する値引き率（参考）'
             : 'お断りする場合の参考値です';

    showResult(level, '−' + pctStr + ' %', note);

    var replies = buildReplies(itemName, listPrice, offerPrice, stance, tone, floorPrice);
    document.getElementById('replyPolite').textContent = replies.polite;
    document.getElementById('replyCasual').textContent = replies.casual;
    document.getElementById('replyFirm').textContent = replies.firm;
    document.getElementById('replyList').style.display = 'block';

    saveInputs();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('replyList').style.display = 'none';
  }

  function copyText(id, btn) {
    var text = document.getElementById(id).textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ markCopied(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); try { document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta);
      markCopied(btn);
    }
  }
  function markCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = '✓ コピー完了';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
  }

  // ── localStorage ──
  function saveInputs() {
    try {
      var data = {
        itemName: document.getElementById('itemName').value,
        listPrice: document.getElementById('listPrice').value,
        offerPrice: document.getElementById('offerPrice').value,
        floorPrice: document.getElementById('floorPrice').value,
        stance: getStance(),
        tone: getTone()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  function loadInputs() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.itemName != null)   document.getElementById('itemName').value = d.itemName;
      if (d.listPrice != null)  document.getElementById('listPrice').value = d.listPrice;
      if (d.offerPrice != null) document.getElementById('offerPrice').value = d.offerPrice;
      if (d.floorPrice != null) document.getElementById('floorPrice').value = d.floorPrice;
      if (d.stance) {
        var sel = document.querySelector('input[name="stance"][value="' + d.stance + '"]');
        if (sel) sel.checked = true;
      }
      if (d.tone) {
        var t = document.querySelector('input[name="tone"][value="' + d.tone + '"]');
        if (t) t.checked = true;
      }
    } catch(e) {}
    toggleCounterField();
  }

  function toggleCounterField() {
    var s = getStance();
    document.getElementById('counterField').style.display = (s === 'counter') ? '' : 'none';
  }

  document.addEventListener('DOMContentLoaded', function() {
    loadInputs();
    var stanceEls = document.getElementsByName('stance');
    for (var i = 0; i < stanceEls.length; i++) {
      stanceEls[i].addEventListener('change', toggleCounterField);
    }
  });
  </script>

  <script src="../related-widget.js"></script>
