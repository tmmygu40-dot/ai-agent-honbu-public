<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="食材名を選ぶか検索するだけで、常温・冷蔵・冷凍の保存方法と保存日数の目安、冷凍可否をすぐ確認できる食材保存方法逆引きアプリです。">
  <title>食材保存方法逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* カテゴリフィルター */
    .cat-btns {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .cat-btn {
      padding: 0.35rem 0.85rem; font-size: 0.82rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 999px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }

    /* 食材リスト */
    .food-list {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem; max-height: 320px; overflow-y: auto;
      padding: 0.2rem;
    }
    .food-item {
      padding: 0.6rem 0.75rem; border-radius: 10px;
      background: var(--bg); border: 1.5px solid var(--border);
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
      text-align: center; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .food-item:hover, .food-item:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .food-item.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

    .no-result { color: var(--text-sub); font-size: 0.88rem; text-align: center; padding: 1.5rem 0; }

    /* 結果カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.visible { display: block; }
    .result-food-name {
      font-size: 1.5rem; font-weight: 900; color: var(--accent);
      margin-bottom: 1rem; padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border); text-align: center;
    }
    .result-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.75rem; margin-bottom: 1rem;
    }
    .result-item {
      background: var(--bg); border-radius: 10px;
      padding: 0.85rem 0.9rem; text-align: center;
    }
    .result-item-label { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .result-item-value { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .result-item.full { grid-column: 1 / -1; }
    .result-item.freeze-ok .result-item-value { color: var(--ok); }
    .result-item.freeze-partial .result-item-value { color: var(--warn); }
    .result-item.freeze-ng .result-item-value { color: var(--ng); }
    .result-note-box {
      background: var(--accent-light); border: 1px solid #fde8c0;
      border-radius: 10px; padding: 0.75rem 0.9rem;
      font-size: 0.84rem; color: var(--text); line-height: 1.6;
    }
    .result-note-box strong { color: var(--accent); }

    /* 最近みた食材 */
    .history-list {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .history-item {
      padding: 0.3rem 0.75rem; border-radius: 999px;
      background: var(--accent-light); border: 1.5px solid #fde8c0;
      font-size: 0.82rem; color: var(--accent); font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .history-item:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .history-empty { font-size: 0.82rem; color: var(--text-sub); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print { display: none !important; }
      .btn-pdf { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🥦 食材保存方法逆引きアプリ</h1>
    <p class="subtitle">食材を選ぶだけ — 保存方法・日数・冷凍可否をすぐ確認</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 検索・カテゴリ -->
  <div class="card">
    <p class="card-title">食材を選ぶ</p>
    <div class="field">
      <label for="searchInput">食材名で検索</label>
      <input type="text" id="searchInput" placeholder="例：じゃがいも、鶏肉、牛乳…" oninput="filterFoods()" autocomplete="off">
      <p class="hint">ひらがな・漢字どちらでも検索できます</p>
    </div>
    <div class="cat-btns" id="catBtns"></div>
    <div class="food-list" id="foodList"></div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="resultCard">
    <div class="result-food-name" id="resultName">—</div>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-item-label">保存場所</div>
        <div class="result-item-value" id="resultStorage">—</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">保存日数の目安</div>
        <div class="result-item-value" id="resultDuration">—</div>
      </div>
      <div class="result-item full" id="resultFreezeBox">
        <div class="result-item-label">冷凍保存</div>
        <div class="result-item-value" id="resultFreeze">—</div>
      </div>
    </div>
    <div class="result-note-box" id="resultNote"></div>
  </div>

  <!-- 最近みた食材 -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">最近みた食材</p>
    <div class="history-list" id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 保存日数はあくまで目安です。農林水産省・消費者庁が公開する食品保存に関する資料や、一般的な食品衛生の考え方をもとに整理しています。食材の状態・保存環境によって異なります。最新情報は各公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>

    {name:'ケチャップ', cat:'調味料', storage:'冷蔵', duration:'開封後1〜2ヶ月', freeze:'不可', freezeLevel:'ng', note:'開封後は冷蔵庫へ。中身を出してから容器の蓋を下にして保存すると出やすくなる。'},

    {name:'砂糖', cat:'調味料', storage:'常温', duration:'無期限（密閉保存）', freeze:'不可', freezeLevel:'ng', note:'湿気を避けた密閉容器で常温保存。固まった場合は電子レンジで加熱すると戻る。'},
    {name:'塩', cat:'調味料', storage:'常温', duration:'無期限（密閉保存）', freeze:'不可', freezeLevel:'ng', note:'湿気を避けた密閉容器で常温保存。固まりやすいため乾燥剤を入れると便利。'},

    {name:'豆乳', cat:'その他', storage:'冷蔵', duration:'開封後2〜3日', freeze:'不可', freezeLevel:'ng', note:'未開封は常温可。開封後は冷蔵庫へ早めに使い切る。冷凍すると成分が分離するため不可。'},

  var CATEGORIES = ['すべて','野菜','果物','肉','魚','乳製品','調味料','その他'];
  var currentCat = 'すべて';
  var currentFood = null;
  var HISTORY_KEY = 'shokuhin-history-v1';

  // カテゴリボタン生成
  function renderCatBtns() {
    var el = document.getElementById('catBtns');
    el.innerHTML = CATEGORIES.map(function(c) {
      return '<button class="cat-btn' + (c === currentCat ? ' active' : '') + '" onclick="setCat(\'' + c + '\')">' + c + '</button>';
    }).join('');
  }

  function setCat(cat) {
    currentCat = cat;
    renderCatBtns();
    filterFoods();
  }

  // 食材リスト描画
  function filterFoods() {
    var query = document.getElementById('searchInput').value.trim();
    var list = FOODS.filter(function(f) {
      var catOk = (currentCat === 'すべて') || (f.cat === currentCat);
      var searchOk = !query || f.name.includes(query) || f.cat.includes(query);
      return catOk && searchOk;
    });

    var el = document.getElementById('foodList');
    if (list.length === 0) {
      el.innerHTML = '<div class="no-result">「' + (query || currentCat) + '」の食材が見つかりませんでした</div>';
      return;
    }
    el.innerHTML = list.map(function(f) {
      var sel = (currentFood && currentFood.name === f.name) ? ' selected' : '';
      return '<div class="food-item' + sel + '" onclick="showFood(\'' + f.name + '\')">' + f.name + '</div>';
    }).join('');
  }

  // 食材詳細表示
  function showFood(name) {
    var food = FOODS.find(function(f) { return f.name === name; });
    if (!food) return;
    currentFood = food;

    document.getElementById('resultName').textContent = food.name;
    document.getElementById('resultStorage').textContent = food.storage;
    document.getElementById('resultDuration').textContent = food.duration;

    var freezeBox = document.getElementById('resultFreezeBox');
    freezeBox.className = 'result-item full freeze-' + food.freezeLevel;
    document.getElementById('resultFreeze').textContent = food.freeze;
    document.getElementById('resultNote').innerHTML = '<strong>💡 保存のコツ：</strong>' + food.note;

    var rc = document.getElementById('resultCard');
    rc.style.display = 'block';
    rc.scrollIntoView({behavior:'smooth', block:'nearest'});

    filterFoods(); // 選択状態を更新
    saveHistory(name);
  }

  // localStorage 履歴
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
  }
  function saveHistory(name) {
    var h = loadHistory().filter(function(n) { return n !== name; });
    h.unshift(name);
    if (h.length > 10) h = h.slice(0, 10);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch(e) {}
    renderHistory();
  }
  function renderHistory() {
    var h = loadHistory();
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');
    if (h.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = h.map(function(name) {
      return '<span class="history-item" onclick="showFood(\'' + name + '\')">' + name + '</span>';
    }).join('');
  }

  // 初期化
  renderCatBtns();
  filterFoods();
  renderHistory();
  </script>
