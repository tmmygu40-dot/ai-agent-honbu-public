<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたの本当の浪費体質タイプを診断。衝動買い・ご褒美中毒・セールハンターなど6タイプから判定し、改善のヒントもお届けします。">
  <title>浪費体質診断｜5問YES/NOで暴く本当のお金の使い方タイプ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-item { padding: 0.9rem 0; border-bottom: 1px solid var(--border); }
    .q-item:last-child { border-bottom: none; }
    .q-text { font-size: 0.96rem; font-weight: 600; line-height: 1.5; margin-bottom: 0.7rem; }
    .q-num { display: inline-block; background: var(--accent); color: #fff; font-size: 0.72rem; font-weight: 800; padding: 0.15rem 0.5rem; border-radius: 4px; margin-right: 0.4rem; vertical-align: middle; }
    .yn-row { display: flex; gap: 0.6rem; }
    .yn-btn {
      flex: 1; padding: 0.7rem 0.5rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .yn-btn:active { transform: scale(0.97); }
    .yn-btn.selected-yes { background: var(--accent); color: #fff; border-color: var(--accent); }
    .yn-btn.selected-no  { background: var(--text-sub); color: #fff; border-color: var(--text-sub); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-emoji-big { font-size: 2.6rem; line-height: 1.2; margin-bottom: 0.3rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; text-align: left; }
    .result-score { font-size: 0.82rem; color: var(--text-sub); margin-top: 0.6rem; }

    .advice-list { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px dashed var(--border); text-align: left; }
    .advice-list h4 { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .advice-list ul { padding-left: 1.1rem; }
    .advice-list li { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 0.3rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>浪費体質診断</h1>
    <p class="subtitle">5問YES/NOで暴く、あなたのお金の使い方タイプ</p>
  </header>

  <div class="card">
    <p class="card-title">5問の質問</p>
    <div id="qbox"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">🛡️</p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-score" id="rs"></p>
    <div class="advice-list" id="ad" style="display:none">
      <h4>📝 改善のヒント</h4>
      <ul id="al"></ul>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断は、家計改善・行動経済学の一般的な知見を参考に、目安として楽しんで使えるよう整理した簡易版です。本格的な家計相談はファイナンシャルプランナーや自治体の無料相談窓口もご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'rouhi-taishitsu-shindan-v1';

  var QUESTIONS = [
    { q: 'SNSや広告で気になった商品を、その日のうちに買ってしまうことが多い', cat: '衝動' },
    { q: '自分へのご褒美として、ちょっと高めの食事やスイーツを月3回以上買う', cat: 'ご褒美' },
    { q: '「期間限定」「セール」「ポイント◯倍」と聞くと、予定外でもつい買ってしまう', cat: 'セール' },
    { q: '何にいくら使ったか、月末になっても正確に把握できていない', cat: 'どんぶり' },
    { q: '「これで最後」と思って買った推し・コレクション・趣味グッズが、実は何個もある', cat: '推し活' }
  ];

  var TYPES = {
    '堅実': {
      emoji: '🛡️', name: '堅実モード', level: 'ok',
      desc: 'お金の使い方が地に足のついた堅実派。衝動買いに振り回されず、自分の判断軸でモノを選べているタイプです。今のスタイルを続けつつ、たまには「使う楽しみ」も大事に。',
      advice: ['今の家計簿・収支管理スタイルを継続', '半年に1回、固定費の見直しチェック', 'ストイックすぎて疲れたら、計画的なご褒美もアリ']
    },
    '普通': {
      emoji: '🙂', name: 'ほどほど派・やや要注意', level: 'warn',
      desc: '極端な浪費はしないが、いくつかの場面で「ついうっかり」が出るタイプ。意識すれば改善余地は大きく、家計のバランスを整える小さな習慣が効きます。',
      advice: ['週1回、レシートをまとめて見るだけでも意識が変わる', '気になった商品は「カートに入れて1日置く」ルールを試す', '月予算をざっくり3カテゴリ（必須・余暇・貯蓄）で分ける']
    },
    '衝動': {
      emoji: '⚡', name: '衝動買いハンター型', level: 'warn',
      desc: 'SNSや広告のタイミングに弱く、欲しいと思ったらすぐ買ってしまうタイプ。後から「何でこれ買ったんだっけ」と冷静になりやすいのも特徴です。',
      advice: ['「ほしい物リスト」に1度入れて24時間寝かせる', 'SNSのフォローを見直し、購買意欲を煽るアカウントを整理', 'クレカ即時通知をONにして、買った瞬間の金額を可視化']
    },
    'ご褒美': {
      emoji: '🍰', name: 'ご褒美中毒型', level: 'warn',
      desc: '頑張った自分への「ご褒美」が止まらないタイプ。1回1回は小さくても、積み上がると大きな出費になりがちです。ご褒美の頻度より「特別感」を意識すると吉。',
      advice: ['ご褒美は「週末だけ」「月3回まで」と頻度ルール化', '金額より体験（短い旅行・推し現場など）にシフトする', '我慢ではなく「ご褒美予算」を月で先取りしておく']
    },
    'セール': {
      emoji: '🏷️', name: 'セールハンター型', level: 'warn',
      desc: '「お得」「期間限定」「ポイント還元」に反応しやすいタイプ。値引き額に目が行き、本来の必要性を見失いがち。実は割引前提で買って合計支出は増えていることも。',
      advice: ['「定価で欲しいかどうか」を判断基準にする', 'ポイント還元は「実質値引き」として現金換算してチェック', '買い置きしすぎて使い切れない物がないか棚卸しする']
    },
    'どんぶり': {
      emoji: '🍱', name: 'どんぶり勘定型', level: 'warn',
      desc: '使った金額の把握が雑で、月末の銀行残高で初めて気付くタイプ。「気付いたら無い」「思ったより使ってた」が口癖の人はこのタイプです。',
      advice: ['家計簿アプリで「自動連携」だけでも始める（手入力は続かない）', 'クレカ・電子マネーは1〜2枚に集約', '週1回、5分だけ収支を眺める習慣を作る']
    },
    '推し活': {
      emoji: '💜', name: '推し活散財型', level: 'warn',
      desc: '推し・趣味・コレクションへの熱量がそのままお金に反映されるタイプ。気持ちは尊いが、月の上限を決めないと家計が崩れがち。',
      advice: ['月の推し活予算を先に確保する「先取り推し貯金」', '同じ系統のグッズはダブり買いをチェックしてから購入', '現場・グッズ・配信の3カテゴリで支出バランスを見直す']
    },
    '全方位': {
      emoji: '🔥', name: '全方位浪費型・要注意', level: 'ng',
      desc: '5問すべてに心当たりがあり、複数のお金の漏れが同時に起きている状態。1つずつ手をつけないと改善が難しいので、今月から1ジャンルだけでも対策スタートを。',
      advice: ['まず1ヶ月、すべての支出を記録するだけ（改善より把握優先）', '固定費（サブスク・通信・保険）から大きい順に見直す', '一人で難しければ、自治体の無料家計相談・FP無料相談を活用']
    }
  };

  function renderQuestions() {
    var box = document.getElementById('qbox');
    var html = '';
    for (var i = 0; i < QUESTIONS.length; i++) {
      html += '<div class="q-item">'
            + '<p class="q-text"><span class="q-num">Q' + (i+1) + '</span>' + QUESTIONS[i].q + '</p>'
            + '<div class="yn-row">'
            + '<button type="button" class="yn-btn" data-i="' + i + '" data-v="yes">YES</button>'
            + '<button type="button" class="yn-btn" data-i="' + i + '" data-v="no">NO</button>'
            + '</div></div>';
    }
    box.innerHTML = html;
    box.querySelectorAll('.yn-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = btn.getAttribute('data-i');
        var val = btn.getAttribute('data-v');
        box.querySelectorAll('.yn-btn[data-i="' + idx + '"]').forEach(function(b){
          b.classList.remove('selected-yes', 'selected-no');
        });
        btn.classList.add(val === 'yes' ? 'selected-yes' : 'selected-no');
      });
    });
  }

  function getAnswers() {
    var arr = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('.yn-btn[data-i="' + i + '"].selected-yes, .yn-btn[data-i="' + i + '"].selected-no');
      if (!sel) return null;
      arr.push(sel.classList.contains('selected-yes'));
    }
    return arr;
  }

  function judgeType(answers) {
    var yesCount = answers.filter(function(a){ return a; }).length;
    if (yesCount === 5) return '全方位';
    if (yesCount <= 1) return '堅実';
    if (yesCount === 2) return '普通';
    // 3〜4 YES の場合: YES が付いた質問のうち、優先順で最初に来るカテゴリを採用
    // 優先順位: 衝動 > 推し活 > どんぶり > セール > ご褒美（家計影響度ベース）
    var priority = ['衝動', '推し活', 'どんぶり', 'セール', 'ご褒美'];
    var yesCats = [];
    for (var i = 0; i < answers.length; i++) {
      if (answers[i]) yesCats.push(QUESTIONS[i].cat);
    }
    for (var p = 0; p < priority.length; p++) {
      if (yesCats.indexOf(priority[p]) !== -1) return priority[p];
    }
    return '普通';
  }

  function diagnose() {
    var answers = getAnswers();
    if (!answers) { showErr('5問すべてに YES / NO で答えてください'); return; }
    var key = judgeType(answers);
    var t = TYPES[key];
    var yesCount = answers.filter(function(a){ return a; }).length;

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.desc;
    document.getElementById('rs').textContent = 'YES の数：' + yesCount + ' / 5';

    var ad = document.getElementById('ad');
    var al = document.getElementById('al');
    al.innerHTML = t.advice.map(function(x){ return '<li>' + x + '</li>'; }).join('');
    ad.style.display = 'block';

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        answers: answers, type: key, ts: Date.now()
      }));
    } catch(e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('rs').textContent = '';
    document.getElementById('ad').style.display = 'none';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.answers || data.answers.length !== QUESTIONS.length) return;
      for (var i = 0; i < data.answers.length; i++) {
        var v = data.answers[i] ? 'yes' : 'no';
        var btn = document.querySelector('.yn-btn[data-i="' + i + '"][data-v="' + v + '"]');
        if (btn) btn.classList.add(data.answers[i] ? 'selected-yes' : 'selected-no');
      }
    } catch(e) {}
  }

  renderQuestions();
  restore();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
