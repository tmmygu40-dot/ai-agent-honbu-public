<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医療費管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>医療費管理アプリ</h1>
    <p class="subtitle">病院別・家族別に記録して確定申告合計を確認</p>

    <!-- 年度フィルター -->
    <div class="year-filter">
      <label for="filterYear">表示年度：</label>
      <select id="filterYear"></select>
      <span class="total-display">年間合計：<strong id="yearTotal">¥0</strong></span>
    </div>

    <!-- 入力フォーム -->
    <div class="card form-card">
      <h2>記録を追加</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="inputDate">日付 <span class="required">*</span></label>
          <input type="date" id="inputDate">
        </div>
        <div class="form-group">
          <label for="inputMember">家族名 <span class="required">*</span></label>
          <input type="text" id="inputMember" placeholder="例：父、母、太郎">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="inputHospital">病院名 <span class="required">*</span></label>
          <input type="text" id="inputHospital" placeholder="例：○○クリニック">
        </div>
        <div class="form-group">
          <label for="inputAmount">金額（円）<span class="required">*</span></label>
          <input type="number" id="inputAmount" placeholder="例：2500" min="0">
        </div>
      </div>
      <div class="form-group">
        <label for="inputMemo">メモ（任意）</label>
        <input type="text" id="inputMemo" placeholder="例：定期検診、処方薬代">
      </div>
      <button class="btn-add" id="btnAdd">追加する</button>
    </div>

    <!-- 集計カード -->
    <div class="summary-area" id="summaryArea"></div>

    <!-- 記録一覧 -->
    <div class="card">
      <div class="list-header">
        <h2>記録一覧</h2>
        <div class="filter-group">
          <select id="filterMember">
            <option value="">すべての家族</option>
          </select>
          <select id="filterHospital">
            <option value="">すべての病院</option>
          </select>
        </div>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
