<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレスタイプ診断｜3問でわかる最速スッキリ法</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text {
      font-size: 0.98rem; font-weight: 700;
      margin-bottom: 0.7rem; line-height: 1.4;
    }
    .q-num {
      display: inline-block; background: var(--accent); color:#fff;
      font-size: 0.78rem; font-weight: 800;
      padding: 0.15rem 0.5rem; border-radius: 6px; margin-right: 0.5rem;
    }
    .opt-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .opt {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.9rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { width: 18px; height: 18px; flex-shrink:0; cursor: pointer; accent-color: var(--accent); }
    .opt .opt-text { font-size: 0.92rem; line-height: 1.4; }
    .opt input[type="radio"]:checked ~ .opt-text { font-weight: 700; color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-emoji { font-size: 3rem; line-height: 1.1; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.55; text-align: left; padding: 0 0.4rem; }

    .tips-list { list-style: none; padding: 0; margin: 0.4rem 0 0; }
    .tips-list li {
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.5rem;
      border-radius: 6px;
      text-align: left;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .tips-list li:last-child { margin-bottom: 0; }
    .tips-list .tips-num {
      display: inline-block; font-weight: 800; color: var(--accent);
      margin-right: 0.4rem;
    }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    .last-result {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.6rem 0.9rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem; color: var(--text-sub);
      text-align: center;
    }
    .last-result strong { color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>ストレスタイプ診断</h1>
    <p class="subtitle">3問で今のイライラを4タイプに分類、最速スッキリ法を提案</p>
  </header>

  <div id="last-result" class="last-result" style="display:none"></div>

  <div class="card">
    <p class="card-title">3問で診断</p>

    <div class="q-block">
      <p class="q-text"><span class="q-num">Q1</span>今、頭の中はどんな感じ？</p>
      <div class="opt-list" data-q="0">
        <label class="opt"><input type="radio" name="q0" value="0"><span class="opt-text">何回も同じこと考えてループしてる</span></label>
        <label class="opt"><input type="radio" name="q0" value="1"><span class="opt-text">うわっと爆発しそうで抑えてる</span></label>
        <label class="opt"><input type="radio" name="q0" value="2"><span class="opt-text">何にイラついてるか自分でも分からない</span></label>
        <label class="opt"><input type="radio" name="q0" value="3"><span class="opt-text">もう何も考えたくない、ただ疲れた</span></label>
      </div>
    </div>

    <div class="q-block">
      <p class="q-text"><span class="q-num">Q2</span>体のサインは？</p>
      <div class="opt-list" data-q="1">
        <label class="opt"><input type="radio" name="q1" value="0"><span class="opt-text">夜になっても考えごとが止まらず眠れない</span></label>
        <label class="opt"><input type="radio" name="q1" value="1"><span class="opt-text">肩・あご・拳に力が入ってる、心拍が速い</span></label>
        <label class="opt"><input type="radio" name="q1" value="2"><span class="opt-text">胸のあたりがざわざわ・もやもやする</span></label>
        <label class="opt"><input type="radio" name="q1" value="3"><span class="opt-text">体が重い、起きてもだるい、動きたくない</span></label>
      </div>
    </div>

    <div class="q-block">
      <p class="q-text"><span class="q-num">Q3</span>今すぐやりたいことは？</p>
      <div class="opt-list" data-q="2">
        <label class="opt"><input type="radio" name="q2" value="0"><span class="opt-text">原因をハッキリさせて整理したい</span></label>
        <label class="opt"><input type="radio" name="q2" value="1"><span class="opt-text">叫ぶ・殴る・とにかく発散したい</span></label>
        <label class="opt"><input type="radio" name="q2" value="2"><span class="opt-text">誰かに「分かるよ」と言って欲しい</span></label>
        <label class="opt"><input type="radio" name="q2" value="3"><span class="opt-text">布団かぶって何もしたくない</span></label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">タイプを診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="re">—</p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-label" style="margin-top:1.2rem">最速スッキリ法</p>
    <ul class="tips-list" id="tips"></ul>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">回答の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、ストレス対処（コーピング）に関する一般的な知見をもとに、目安として使いやすく整理しています。深刻な不調が続く場合は専門家への相談をご検討ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // タイプ定義
  // 0: ぐるぐる(思考反芻), 1: 爆発(怒り), 2: もやもや(言語化困難), 3: 燃え尽き(疲労)
  var TYPES = [
    {
      key: 'guruguru',
      emoji: '🌀',
      name: 'ぐるぐるタイプ（思考反芻型）',
      note: '同じ考えが頭の中をぐるぐる回って止まらない状態。情報を整理して脳の負荷を下げるのが効きます。',
      tips: [
        '紙やスマホメモに「今モヤってること」を5分だけ書き出す（書ききったら閉じる）',
        '5・4・3・2・1法：見える物5・聞こえる音4・触れる物3・匂い2・味1を確認して五感に戻る',
        '20分の散歩で景色を変える。歩くと反芻ループが切れやすい'
      ]
    },
    {
      key: 'bakuhatsu',
      emoji: '🔥',
      name: '爆発タイプ（怒り蓄積型）',
      note: '怒りエネルギーが体に溜まっている状態。安全に発散させてから整える順番が効きます。',
      tips: [
        'クッションを思いきり叩く・タオルを噛む・空に向かって声を出す（30秒）',
        '6秒ルール：怒りピーク時は6秒だけ「数を数える」。6秒過ぎれば衝動は弱まる',
        '冷たい水で手と顔を洗って体温を下げる。交感神経の昂りが落ち着く'
      ]
    },
    {
      key: 'moyamoya',
      emoji: '😩',
      name: 'もやもやタイプ（言語化困難型）',
      note: '感情に名前がついていない状態。曖昧なものに「ラベル」を貼ると一気に楽になります。',
      tips: [
        '感情リスト（怒り・悲しみ・不安・嫉妬・寂しさ）から近いものを1つだけ選ぶ',
        '誰か・LINE・AIに「今こういう状態」と1行だけ送る（返事は要らない）',
        '湯船・シャワー・温かい飲み物で体を温める。体温↑で感情の輪郭が出やすい'
      ]
    },
    {
      key: 'moetsuki',
      emoji: '💤',
      name: '燃え尽きタイプ（疲労蓄積型）',
      note: 'もう発散する元気もない状態。発散ではなく「回復」を優先する局面です。',
      tips: [
        '今日のToDoから1つだけ消す。罪悪感は明日の自分に押し付けてOK',
        '20分の昼寝 or 早めの就寝。睡眠負債は思考力・感情コントロールを直撃する',
        '頑張らずに食べられる物（プリン・果物・温かいスープ）でエネルギー補給'
      ]
    }
  ];

  var Q_LABELS = ['Q1 頭の中', 'Q2 体のサイン', 'Q3 今やりたいこと'];

  // 起動時：前回結果表示
  (function initLast(){
    try {
      var s = localStorage.getItem('stress-type-v3-last');
      if (!s) return;
      var d = JSON.parse(s);
      var box = document.getElementById('last-result');
      box.innerHTML = '前回（' + d.date + '）は <strong>' + d.emoji + ' ' + d.name + '</strong> でした';
      box.style.display = 'block';
    } catch(e) {}
  })();

  function diagnose() {
    var picks = [];
    for (var i = 0; i < 3; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) {
        showErr('Q' + (i+1) + ' に答えてください');
        return;
      }
      picks.push(parseInt(sel.value, 10));
    }
    // スコア集計（各回答 value がそのままタイプ index）
    var scores = [0,0,0,0];
    picks.forEach(function(v){ scores[v] += 1; });

    // 最高スコアのタイプを判定（同点は最初のもの）
    var maxIdx = 0;
    for (var k = 1; k < scores.length; k++) {
      if (scores[k] > scores[maxIdx]) maxIdx = k;
    }
    var t = TYPES[maxIdx];

    // 結果表示
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;
    document.getElementById('tips').innerHTML = t.tips.map(function(x, i){
      return '<li><span class="tips-num">' + (i+1) + '.</span>' + x + '</li>';
    }).join('');
    document.getElementById('result').style.display = 'block';

    // 内訳
    var optTexts = [
      ['ループ思考','爆発寸前','原因不明','疲れ切り'],
      ['眠れない','体に力','胸ざわざわ','体が重い'],
      ['整理したい','発散したい','共感ほしい','何もしたくない']
    ];
    var rows = picks.map(function(v, i){
      return '<tr><td>' + Q_LABELS[i] + '</td><td>' + optTexts[i][v] + '</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = rows;
    document.getElementById('detail').style.display = 'block';

    // localStorage 保存
    try {
      var today = new Date();
      var dateStr = today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate();
      localStorage.setItem('stress-type-v3-last', JSON.stringify({
        date: dateStr, emoji: t.emoji, name: t.name, key: t.key
      }));
    } catch(e) {}

    // 結果へスクロール
    document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function showErr(msg) {
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('tips').innerHTML = '';
    document.getElementById('result').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
