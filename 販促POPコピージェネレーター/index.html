<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販促POPコピージェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果エリア ── */
    #result-area { display: none; }

    .copy-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.75rem;
      max-width: 600px;
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }
    .copy-card-num {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      background: var(--accent-light); border-radius: 6px;
      padding: 0.2rem 0.5rem; white-space: nowrap; flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .copy-card-text {
      flex: 1; font-size: 1rem; font-weight: 700; line-height: 1.55;
      color: var(--text); word-break: break-all;
    }
    .btn-copy {
      flex-shrink: 0; padding: 0.45rem 0.85rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    /* ── 履歴 ── */
    .history-item {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub);
      display: flex; gap: 0.5rem; align-items: flex-start;
    }
    .history-item:last-child { border-bottom: none; }
    .history-label {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      background: var(--accent-light); border-radius: 5px;
      padding: 0.1rem 0.4rem; flex-shrink: 0; white-space: nowrap; margin-top: 0.05rem;
    }
    .history-text { flex: 1; line-height: 1.45; }
    .btn-clear {
      display: block; width: 100%; padding: 0.5rem;
      font-size: 0.8rem; font-weight: 600; color: var(--ng);
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: 8px; cursor: pointer; margin-top: 0.75rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>🏷️ 販促POPコピージェネレーター</h1>
    <p class="subtitle">業種・商品情報を入力するだけで売り場POPのキャッチコピーを即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="industry">業種・カテゴリ</label>
      <select id="industry">
        <option value="食品・飲食">食品・飲食</option>
        <option value="スイーツ・菓子">スイーツ・菓子</option>
        <option value="飲料">飲料</option>
        <option value="アパレル・衣料">アパレル・衣料</option>
        <option value="雑貨・日用品">雑貨・日用品</option>
        <option value="コスメ・美容">コスメ・美容</option>
        <option value="文房具・事務用品">文房具・事務用品</option>
        <option value="電化製品・ガジェット">電化製品・ガジェット</option>
        <option value="健康・サプリメント">健康・サプリメント</option>
        <option value="本・教材">本・教材</option>
        <option value="農産物・産直">農産物・産直</option>
        <option value="サービス・体験">サービス・体験</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="product">商品名</label>
      <input type="text" id="product" placeholder="例：こだわり豚カツ、夏限定ジェラート">
    </div>
    <div class="field">
      <label for="features">商品の特徴・セールスポイント</label>
      <textarea id="features" placeholder="例：国産豚100%・サクサク衣・揚げたてで提供&#10;複数ある場合は改行か読点で区切って入力"></textarea>
      <p class="hint">特徴が多いほど多様なコピーが生成されます</p>
    </div>
    <div class="field">
      <label for="price">価格（任意）</label>
      <input type="text" id="price" placeholder="例：580円、お買い得3個セット">
      <p class="hint">入力すると価格訴求コピーも生成されます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ キャッチコピーを生成する</button>

  <!-- 結果エリア -->
  <div id="result-area">
    <div class="card" style="max-width:600px;margin:0 auto 0.75rem;">
      <p class="card-title">生成されたキャッチコピー</p>
      <p style="font-size:0.78rem;color:var(--text-sub);margin-bottom:0.5rem;">気に入ったコピーの「コピー」ボタンを押してください</p>
    </div>
    <div id="copies-container"></div>

    <div class="card" style="max-width:600px;margin:1rem auto 0;">
      <p style="font-size:0.78rem;color:var(--text-sub);line-height:1.6;">
        💡 気に入ったコピーは自由に編集してお使いください。商品の魅力が最も伝わる表現を選びましょう。
      </p>
    </div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="max-width:600px;margin:1.5rem auto 0;display:none;">
    <p class="card-title">生成履歴（最新5件）</p>
    <div id="history-list"></div>
    <button class="btn-clear no-print" onclick="clearHistory()">履歴を削除</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a>
  </p>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

  <script>
  // ── コピーパターン定義 ──
  var PATTERNS = [
    // ベーシック系
    function(p) { return p.name + '、始めました。'; },
    function(p) { return '今日の一押し！' + p.name; },
    function(p) { return 'お試しください。' + p.name; },
    // 特徴訴求系
    function(p) { return p.feat1 ? p.feat1 + 'の' + p.name : null; },
    function(p) { return p.feat1 && p.feat2 ? p.feat1 + 'で' + p.feat2 + '。それが' + p.name + 'です。' : null; },
    function(p) { return p.feat1 ? 'だから違う。' + p.feat1 + 'の' + p.name : null; },
    function(p) { return p.feat1 ? p.feat1 + 'にこだわった' + p.name : null; },
    function(p) { return p.feat1 ? 'ひと口食べれば/使えばわかる。' + p.feat1 + '。' : null; },
    // 品質・こだわり系
    function(p) { return '職人がひとつひとつ仕上げた' + p.name; },
    function(p) { return p.industry.includes('食') || p.industry.includes('飲') ? '素材の旨みをそのままに。' + p.name : null; },
    function(p) { return 'シンプルだから、本物がわかる。' + p.name; },
    function(p) { return '一度' + (p.industry.includes('食') || p.industry.includes('飲') ? '食べたら' : '使ったら') + 'やめられない' + p.name; },
    // お得・価格訴求系
    function(p) { return p.price ? p.price + 'でこの満足感！' + p.name : null; },
    function(p) { return p.price ? '特別価格' + p.price + '！お早めに。' : null; },
    function(p) { return p.price ? 'この品質でこのお値段。' + p.name + '（' + p.price + '）' : null; },
    // 限定・希少感系
    function(p) { return '数量限定！お早めに。'; },
    function(p) { return '今だけ！' + p.name; },
    function(p) { return '売り切れ御免！' + p.name; },
    function(p) { return p.feat1 ? '希少！' + p.feat1 + 'の' + p.name : null; },
    // 共感・シーン提案系
    function(p) { return 'ご自分へのご褒美に。' + p.name; },
    function(p) { return '大切な方への贈り物に。' + p.name; },
    function(p) { return '毎日の' + (p.industry.includes('食') ? '食事' : '暮らし') + 'をもっと豊かに。' + p.name; },
    // 業種別専用
    function(p) {
      if (p.industry.includes('食品') || p.industry.includes('飲食') || p.industry.includes('農産')) {
        return p.feat1 ? '産地直送・' + p.feat1 + 'の' + p.name : '産地直送・新鮮な' + p.name;
      }
      return null;
    },
    function(p) {
      if (p.industry.includes('スイーツ') || p.industry.includes('菓子')) {
        return p.feat1 ? p.feat1 + '。ひと口で幸せ。' + p.name : 'ひと口で幸せ。' + p.name;
      }
      return null;
    },
    function(p) {
      if (p.industry.includes('アパレル') || p.industry.includes('衣料')) {
        return p.feat1 ? p.feat1 + 'で、もっとおしゃれに。' + p.name : 'もっとおしゃれに。' + p.name;
      }
      return null;
    },
    function(p) {
      if (p.industry.includes('コスメ') || p.industry.includes('美容') || p.industry.includes('健康')) {
        return p.feat1 ? p.feat1 + 'で、毎日がちょっと変わる。' : '毎日がちょっと変わる。' + p.name;
      }
      return null;
    },
    function(p) {
      if (p.industry.includes('雑貨') || p.industry.includes('日用品')) {
        return p.feat1 ? p.feat1 + 'だから使いやすい。' + p.name : '使いやすさが違う。' + p.name;
      }
      return null;
    },
    // クエスチョン・問いかけ系
    function(p) { return (p.industry.includes('食') ? 'こんなに旨いもの、食べたことありますか？' : 'こんなに便利なもの、使ったことありますか？') + ' ' + p.name; },
    function(p) { return p.feat1 ? 'あなたはご存知でしたか？' + p.feat1 + 'の' + p.name : null; },
    // シンプル断言系
    function(p) { return p.feat1 ? p.feat1 + '。それだけで、十分です。' : null; },
    function(p) { return '本物は、語らない。ただ、' + p.name + '。' ; },
    function(p) { return p.feat1 && p.feat2 ? p.feat1 + 'と' + p.feat2 + 'が出会った。それが' + p.name + 'です。' : null; },
  ];

  function parseFeatures(raw) {
    if (!raw) return [];
    return raw.split(/[、,，。\n]/).map(function(s){ return s.trim(); }).filter(Boolean);
  }

  function generate() {
    var industry = document.getElementById('industry').value;
    var product  = document.getElementById('product').value.trim();
    var featRaw  = document.getElementById('features').value.trim();
    var price    = document.getElementById('price').value.trim();

    if (!product) { alert('商品名を入力してください'); return; }

    var feats = parseFeatures(featRaw);
    var params = {
      industry: industry,
      name: product,
      feat1: feats[0] || '',
      feat2: feats[1] || '',
      feat3: feats[2] || '',
      price: price
    };

    var results = [];
    PATTERNS.forEach(function(fn) {
      try {
        var r = fn(params);
        if (r && r.trim()) results.push(r.trim());
      } catch(e) {}
    });

    // 重複除去・シャッフル
    results = results.filter(function(v, i, a){ return a.indexOf(v) === i; });
    results = shuffle(results).slice(0, 8);

    // 表示
    var container = document.getElementById('copies-container');
    container.innerHTML = '';
    results.forEach(function(text, i) {
      var div = document.createElement('div');
      div.className = 'copy-card';
      div.innerHTML =
        '<span class="copy-card-num">案' + (i+1) + '</span>' +
        '<span class="copy-card-text">' + esc(text) + '</span>' +
        '<button class="btn-copy" onclick="copyText(this, ' + JSON.stringify(text) + ')">コピー</button>';
      container.appendChild(div);
    });

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // 履歴保存
    saveHistory(product, industry, results[0]);
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function copyText(btn, text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { flashCopied(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      flashCopied(btn);
    }
  }

  function flashCopied(btn) {
    btn.textContent = 'コピー済';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 1500);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 履歴 ──
  var HIST_KEY = 'pop_copy_history';

  function saveHistory(product, industry, firstCopy) {
    var hist = loadHistory();
    hist.unshift({ product: product, industry: industry, copy: firstCopy, date: new Date().toLocaleDateString('ja-JP') });
    if (hist.length > 5) hist = hist.slice(0, 5);
    try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); } catch(e) {}
    renderHistory(hist);
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(HIST_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  function renderHistory(hist) {
    var card = document.getElementById('history-card');
    var list = document.getElementById('history-list');
    if (!hist || hist.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = hist.map(function(h) {
      return '<div class="history-item">' +
        '<span class="history-label">' + esc(h.industry || '') + '</span>' +
        '<span class="history-text"><strong>' + esc(h.product || '') + '</strong><br>' + esc(h.copy || '') + '<br><span style="font-size:0.7rem;">' + esc(h.date || '') + '</span></span>' +
        '</div>';
    }).join('');
  }

  function clearHistory() {
    try { localStorage.removeItem(HIST_KEY); } catch(e) {}
    document.getElementById('history-card').style.display = 'none';
  }

  // 起動時に履歴表示
  renderHistory(loadHistory());
  </script>

</body>
</html>
