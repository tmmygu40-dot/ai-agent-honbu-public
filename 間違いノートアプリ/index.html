<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>間違いノート</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>間違いノート</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>問題を登録</h2>
      <div class="form-group">
        <label for="subject">科目</label>
        <input type="text" id="subject" placeholder="例：数学、英語、国語" maxlength="30">
      </div>
      <div class="form-group">
        <label for="question">問題内容</label>
        <textarea id="question" placeholder="間違えた問題の内容を入力" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="cause">ミスの原因</label>
        <textarea id="cause" placeholder="なぜ間違えたかを入力" rows="2"></textarea>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label for="filterSubject">科目で絞り込み：</label>
      <select id="filterSubject">
        <option value="">すべて</option>
      </select>
      <span id="countDisplay" class="count-display"></span>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="noteList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
