<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開運アクションおみくじ｜誕生月と今月で「運が上がる行動」がわかる</title>
  <meta name="description" content="誕生月と今月を選ぶだけで、今月やると運が上がる開運アクションと運気レベル（大吉・中吉・小吉）が出るおみくじです。今月の前向きな行動指針が1分で見つかります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-top: 0.4rem; }
    .result-action {
      font-size: 1.1rem; font-weight: 800; line-height: 1.5;
      margin: 0.6rem auto 0.4rem; max-width: 480px;
      color: var(--text);
    }
    .result-emoji-big { font-size: 2.6rem; line-height: 1.1; margin-bottom: 0.3rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍀 開運アクションおみくじ</h1>
    <p class="subtitle">誕生月と今月を選ぶだけで「今月やると運が上がること」がふわっと見つかります</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="birth">あなたの誕生月</label>
      <select id="birth">
        <option value="">選んでください</option>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
    <div class="field">
      <label for="thismo">今月（自動入力。変えてもOK）</label>
      <select id="thismo">
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
      <p class="hint">毎月引き直すと、その月の開運アクションが出ます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="draw()">おみくじを引く</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">🎴</p>
    <p class="result-label">今月の運気</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-action" id="ra"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このおみくじは、季節の暮らしや昔ながらの開運習慣を参考に、今月のちょっとした行動ヒントとして使いやすく整理したものです。占いではなく日常のきっかけ作りとしてご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 12種の開運アクションプール ──
  var POOL = [
    { lv: 'ok',   name: '大吉',  emoji: '🌟', action: '久しぶりの友人にひとことメッセージを送る', note: '思い出した縁から、今月のいい風が入ってきます。' },
    { lv: 'warn', name: '中吉',  emoji: '🌿', action: '朝5分だけ早く起きて窓を開ける',         note: '小さな新しい空気が、今月の流れをやさしく変えます。' },
    { lv: 'ng',   name: '小吉',  emoji: '🍀', action: 'デスクや机の周りをひとつだけ片付ける',   note: 'ひとつ整えるだけで、判断のキレが戻ってきます。' },
    { lv: 'warn', name: '中吉',  emoji: '🌿', action: '知らない道を1区間だけ歩いてみる',       note: '見慣れない景色が、新しい気付きを連れてきてくれます。' },
    { lv: 'ok',   name: '大吉',  emoji: '🌟', action: '鏡をピカピカに磨いて笑顔を1回作る',       note: '鏡が映すのは未来の自分。今月は明るい表情から。' },
    { lv: 'ng',   name: '小吉',  emoji: '🍀', action: '観葉植物に水をやる、または小さな緑を買う', note: '緑の世話をする時間が、自分の心も育ててくれます。' },
    { lv: 'warn', name: '中吉',  emoji: '🌿', action: '好きな音楽を1曲だけ聴いてから動き出す',   note: '心のチューニングが整うと、今月の選択がスムーズに。' },
    { lv: 'warn', name: '中吉',  emoji: '🌿', action: 'ベランダ・玄関をひとはき掃く',           note: '出入り口がきれいだと、いい運の通り道が広がります。' },
    { lv: 'ng',   name: '小吉',  emoji: '🍀', action: 'いつもと違う食べ物をひと口試してみる',    note: 'ささやかな冒険が、今月の気分の幅を広げてくれます。' },
    { lv: 'ok',   name: '大吉',  emoji: '🌟', action: '財布の中身を整理してレシートを抜く',     note: '財布が軽くなると、お金の巡りも軽やかになります。' },
    { lv: 'warn', name: '中吉',  emoji: '🌿', action: '1日10分だけ本を読む時間を作る',         note: '言葉のシャワーが、今月の自分を一段引き上げます。' },
    { lv: 'ng',   name: '小吉',  emoji: '🍀', action: '寝る前に「今日よかったこと」を1つ書く',   note: '小さな良かった発見が、明日の自分にやる気を渡します。' }
  ];

  var KEY = 'kaiun_omikuji_v1';

  function pad2(n){ return n; }

  function draw() {
    var birth = parseInt(document.getElementById('birth').value, 10);
    var thismo = parseInt(document.getElementById('thismo').value, 10);
    if (isNaN(birth) || isNaN(thismo)) { showErr('誕生月と今月を選んでください'); return; }

    // ── 結果決定（誕生月×今月でローテーション） ──
    var idx = ((birth * 7 + thismo * 3) % 12 + 12) % 12;
    var r = POOL[idx];

    // 表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + r.lv;
    rc.style.display = 'block';
    document.getElementById('re').textContent = r.emoji;
    document.getElementById('rv').textContent = r.name;
    document.getElementById('ra').textContent = '今月のおすすめ：' + r.action;
    document.getElementById('rn').textContent = r.note;

    // 保存
    try {
      localStorage.setItem(KEY, JSON.stringify({ birth: birth, thismo: thismo }));
    } catch(e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('ra').textContent = '';
    document.getElementById('rn').textContent = msg;
  }

  // ── 初期化：今月の自動入力＋前回入力の復元 ──
  (function init(){
    var thisMonth = new Date().getMonth() + 1;
    document.getElementById('thismo').value = String(thisMonth);
    try {
      var saved = JSON.parse(localStorage.getItem(KEY) || 'null');
      if (saved && saved.birth) {
        document.getElementById('birth').value = String(saved.birth);
      }
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
