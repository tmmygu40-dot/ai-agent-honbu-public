<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求人票ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── テンプレ切り替え ── */
    .tmpl-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tmpl-tab {
      flex: 1; padding: 0.55rem 0.5rem;
      font-size: 0.82rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; text-align: center;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .tmpl-tab.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 生成結果 ── */
    .result-area {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .result-area .card-title { color: var(--ok); }
    .result-text {
      white-space: pre-wrap;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok-bg); color: var(--ok);
      border: 1.5px solid var(--ok); border-radius: 9px;
      cursor: pointer; text-align: center;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { opacity: 0.7; }
    .copy-msg { font-size: 0.78rem; color: var(--ok); text-align: center; margin-top: 0.5rem; display: none; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

<body>

  <header class="app-header">
    <h1>求人票ジェネレーター</h1>
    <p class="subtitle">職種と条件を入力するだけで応募が集まる求人文面を即生成</p>
  </header>

  <!-- テンプレート選択 -->
  <div class="card">
    <p class="card-title">雇用形態を選ぶ</p>
    <div class="tmpl-tabs">
      <div class="tmpl-tab active" onclick="selectTmpl('アルバイト', this)">アルバイト</div>
      <div class="tmpl-tab" onclick="selectTmpl('パート', this)">パート</div>
      <div class="tmpl-tab" onclick="selectTmpl('正社員', this)">正社員</div>
    </div>
  </div>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="jobTitle">職種・ポジション名</label>
      <input type="text" id="jobTitle" placeholder="例：カフェスタッフ、営業担当、エンジニア">
    </div>
    <div class="field">
      <label for="company">会社・お店の名前（任意）</label>
      <input type="text" id="company" placeholder="例：〇〇カフェ、株式会社〇〇">
    </div>
    <div class="field">
      <label for="salary">給与・時給</label>
      <input type="text" id="salary" placeholder="例：時給1,200円〜、月給25万円〜">
    </div>
    <div class="field">
      <label for="hours">勤務時間・シフト</label>
      <input type="text" id="hours" placeholder="例：週3〜5日・1日4h〜、9:00〜18:00">
    </div>
    <div class="field">
      <label for="location">勤務地</label>
      <input type="text" id="location" placeholder="例：東京都渋谷区、在宅勤務OK">
    </div>
  </div>

  <div class="card">
    <p class="card-title">仕事内容・魅力</p>
    <div class="field">
      <label for="workContent">主な仕事内容</label>
      <textarea id="workContent" placeholder="例：接客・注文受付・商品提供・レジ操作・軽い清掃など"></textarea>
    </div>
    <div class="field">
      <label for="appeals">この仕事の魅力・特典（任意）</label>
      <textarea id="appeals" placeholder="例：まかないあり・シフト自由・未経験歓迎・服装自由"></textarea>
      <p class="hint">応募者が増えるポイントを書くと効果的です</p>
    </div>
    <div class="field">
      <label for="requirements">応募資格・歓迎条件（任意）</label>
      <input type="text" id="requirements" placeholder="例：経験不問・高校生可、接客経験者歓迎">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">求人票を生成する</button>

  <!-- 生成結果エリア -->
  <div class="result-area" id="resultArea">
    <p class="card-title">生成された求人票</p>
    <div class="result-text" id="resultText"></div>
    <button class="btn-copy" onclick="copyText()">コピーする</button>
    <p class="copy-msg" id="copyMsg">コピーしました！</p>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var currentTmpl = 'アルバイト';

  function selectTmpl(tmpl, el) {
    currentTmpl = tmpl;
    document.querySelectorAll('.tmpl-tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    saveState();
  }

  function val(id) { return (document.getElementById(id).value || '').trim(); }

  function generate() {
    var jobTitle    = val('jobTitle');
    var company     = val('company');
    var salary      = val('salary');
    var hours       = val('hours');
    var location    = val('location');
    var workContent = val('workContent');
    var appeals     = val('appeals');
    var requirements = val('requirements');

    if (!jobTitle) { alert('職種・ポジション名を入力してください'); return; }

    var salaryLine    = salary    ? '【給与】' + salary : '';
    var hoursLine     = hours     ? '【勤務時間】' + hours : '';
    var locationLine  = location  ? '【勤務地】' + location : '';
    var appealLines   = appeals   ? '\n✅ ' + appeals.split(/[\n・,、]/).filter(Boolean).join('\n✅ ') : '';
    var reqLine       = requirements ? '\n【応募資格】' + requirements : '';

    var companyPart = company ? '【' + company + '】' : '';

    var text = '';

    if (currentTmpl === 'アルバイト' || currentTmpl === 'パート') {
      text =
'━━━━━━━━━━━━━━━━━━\n' +
'🌟 ' + jobTitle + '募集 ' + companyPart + '\n' +
'━━━━━━━━━━━━━━━━━━\n\n' +
'▶ 仕事内容\n' +
(workContent || jobTitle + 'として活躍してくれる方を募集しています。') + '\n\n' +
(appealLines ? '▶ この仕事のメリット' + appealLines + '\n\n' : '') +
(salaryLine   ? salaryLine   + '\n' : '') +
(hoursLine    ? hoursLine    + '\n' : '') +
(locationLine ? locationLine + '\n' : '') +
reqLine + (reqLine ? '\n' : '') +
'\n【雇用形態】' + currentTmpl + '\n\n' +
'━━━━━━━━━━━━━━━━━━\n' +
'気になった方はお気軽にご応募ください！\n' +
'未経験の方もしっかりサポートします 😊\n' +
'━━━━━━━━━━━━━━━━━━';
    } else {
      // 正社員
      text =
'━━━━━━━━━━━━━━━━━━\n' +
'【' + jobTitle + '】正社員募集 ' + companyPart + '\n' +
'━━━━━━━━━━━━━━━━━━\n\n' +
'■ 仕事内容\n' +
(workContent || jobTitle + 'として、チームの中核となって活躍していただきます。') + '\n\n' +
(appealLines ? '■ 当社の魅力・福利厚生' + appealLines + '\n\n' : '') +
(salaryLine   ? salaryLine   + '\n' : '') +
(hoursLine    ? hoursLine    + '\n' : '') +
(locationLine ? locationLine + '\n' : '') +
reqLine + (reqLine ? '\n' : '') +
'\n【雇用形態】正社員\n\n' +
'━━━━━━━━━━━━━━━━━━\n' +
'あなたの経験・スキルを活かせる環境です。\n' +
'まずはお気軽にご応募ください。\n' +
'━━━━━━━━━━━━━━━━━━';
    }

    document.getElementById('resultText').textContent = text;
    var ra = document.getElementById('resultArea');
    ra.style.display = '';
    ra.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveState();
  }

  function copyText() {
    var text = document.getElementById('resultText').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(showCopyMsg);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyMsg();
    }
  }

  function showCopyMsg() {
    var msg = document.getElementById('copyMsg');
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 2000);
  }

  // localStorage 保存・復元
  var LS_KEY = 'kyujin_generator_v1';

  function saveState() {
    var state = {
      tmpl: currentTmpl,
      jobTitle:     val('jobTitle'),
      company:      val('company'),
      salary:       val('salary'),
      hours:        val('hours'),
      location:     val('location'),
      workContent:  val('workContent'),
      appeals:      val('appeals'),
      requirements: val('requirements'),
    };
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.jobTitle)     document.getElementById('jobTitle').value     = s.jobTitle;
      if (s.company)      document.getElementById('company').value      = s.company;
      if (s.salary)       document.getElementById('salary').value       = s.salary;
      if (s.hours)        document.getElementById('hours').value        = s.hours;
      if (s.location)     document.getElementById('location').value     = s.location;
      if (s.workContent)  document.getElementById('workContent').value  = s.workContent;
      if (s.appeals)      document.getElementById('appeals').value      = s.appeals;
      if (s.requirements) document.getElementById('requirements').value = s.requirements;
      if (s.tmpl) {
        document.querySelectorAll('.tmpl-tab').forEach(function(t){
          if (t.textContent === s.tmpl) {
            document.querySelectorAll('.tmpl-tab').forEach(function(u){ u.classList.remove('active'); });
            t.classList.add('active');
            currentTmpl = s.tmpl;
          }
        });
      }
    } catch(e) {}
  }

  // 入力変更時に自動保存
  ['jobTitle','company','salary','hours','location','workContent','appeals','requirements'].forEach(function(id){
    document.getElementById(id).addEventListener('input', saveState);
  });

  loadState();
  </script>

</body>
