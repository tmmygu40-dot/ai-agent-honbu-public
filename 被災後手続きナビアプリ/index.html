<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>被災後手続きナビアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 選択ボタングループ ── */
    .btn-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .btn-sel {
      flex: 1 1 calc(50% - 0.25rem); min-width: 120px;
      padding: 0.7rem 0.5rem; font-size: 0.9rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 10px;
      background: var(--bg); color: var(--text);
      cursor: pointer; text-align: center;
      transition: all 0.15s;
    }
    .btn-sel.active {
      border-color: var(--accent); background: var(--accent-light); color: var(--accent);
    }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 計算ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 手続きカード ── */
    .steps-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }

    /* ── 優先度バッジ ── */
    .priority-group { margin-bottom: 1.2rem; }
    .priority-label {
      display: inline-block; font-size: 0.72rem; font-weight: 800;
      padding: 0.2rem 0.6rem; border-radius: 6px; margin-bottom: 0.6rem;
      letter-spacing: 0.05em;
    }
    .p1 .priority-label { background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng); }
    .p2 .priority-label { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .p3 .priority-label { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }

    /* ── 手続き行 ── */
    .proc-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }
    .proc-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 0.8rem; cursor: pointer;
      background: var(--bg);
    }
    .proc-header input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent); }
    .proc-name { font-size: 0.95rem; font-weight: 700; flex: 1; }
    .proc-toggle { font-size: 0.75rem; color: var(--text-sub); flex-shrink: 0; }
    .proc-body {
      display: none;
      padding: 0.7rem 0.8rem 0.8rem;
      background: var(--card);
      border-top: 1px solid var(--border);
      font-size: 0.85rem; line-height: 1.6;
    }
    .proc-body.open { display: block; }
    .proc-meta { display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; margin-bottom: 0.4rem; }
    .proc-meta span { color: var(--text-sub); font-size: 0.8rem; }
    .proc-meta strong { color: var(--text); }
    .proc-note { color: var(--text-sub); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .steps-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      .proc-body { display: block !important; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🆘 被災後手続きナビアプリ</h1>
    <p class="subtitle">災害種別と被害状況を選ぶだけで、優先して動くべき手続きが分かる</p>
  </header>

  <!-- STEP1: 災害種別 -->
  <div class="card">
    <p class="card-title">STEP 1｜災害の種類を選ぶ</p>
    <div class="btn-group" id="disaster-btns">
      <button class="btn-sel" data-val="earthquake" onclick="selectDisaster(this)">🌀 地震</button>
      <button class="btn-sel" data-val="typhoon"    onclick="selectDisaster(this)">🌧 台風・大雨</button>
      <button class="btn-sel" data-val="flood"      onclick="selectDisaster(this)">🌊 洪水・浸水</button>
      <button class="btn-sel" data-val="fire"       onclick="selectDisaster(this)">🔥 火災</button>
    </div>
  </div>

  <!-- STEP2: 被害状況 -->
  <div class="card">
    <p class="card-title">STEP 2｜被害の状況を選ぶ（複数可）</p>
    <label class="check-item">
      <input type="checkbox" id="dmg-building">
      <span class="check-text">🏠 住宅・建物に被害がある</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="dmg-goods">
      <span class="check-text">📦 家財・家電・財産に被害がある</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="dmg-injury">
      <span class="check-text">🏥 けが・入院などの人的被害がある</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="dmg-car">
      <span class="check-text">🚗 車・バイクに被害がある</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="dmg-business">
      <span class="check-text">🏢 事業所・店舗に被害がある</span>
    </label>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="showSteps()">手続き一覧を表示する</button>

  <!-- 手続き一覧 -->
  <div class="steps-card" id="steps-card">
    <p class="card-title">手続き優先順位リスト</p>
    <div id="steps-list"></div>
  </div>

  <p id="source-note" style="display:none;max-width:600px;margin:0 auto 1rem;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 手続き情報は内閣府防災担当・総務省・各省庁の公開資料をもとに整理しています。実際の申請は市区町村や各機関に確認してください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── データ定義 ──

    {

      conditions: ['building']
    },
    // === 地震固有 ===
    {
      id: 'quake-ins', priority: 1, disasters: ['earthquake'],
      name: '地震保険の申請',
      dest: '加入している損害保険会社',
      deadline: '契約により異なる（早いほど良い）',
      note: '地震・噴火・津波による損害が対象。火災保険とセットが多い。損害写真を撮影後すぐ連絡する。',
      conditions: []
    },
    {
      id: 'quake-kiken', priority: 1, disasters: ['earthquake'],
      name: '家屋の危険度判定（応急危険度判定）の確認',
      dest: '市区町村・応急危険度判定士（自治体が派遣）',
      deadline: '発生後数日以内',
      note: '緑（使用可）・黄（要注意）・赤（危険立入禁止）のステッカーが貼られる。赤の場合は立入を避ける。',
      conditions: []
    },
    // === 台風・大雨固有 ===
    {
      id: 'kazai-ins', priority: 1, disasters: ['typhoon','flood'],
      name: '火災保険（風災・水災特約）の申請',
      dest: '加入している損害保険会社',
      deadline: '3年以内（早いほど良い）',
      note: '台風・大雨・洪水による被害は火災保険の風災・水災条項で補償される場合あり。すぐ連絡する。',
      conditions: []
    },
    // === 火災固有 ===
    {
      id: 'fire-cert', priority: 1, disasters: ['fire'],

    },

      id: 'fire-ins', priority: 1, disasters: ['fire'],
      name: '火災保険の申請',
      dest: '加入している損害保険会社',

    },

      dest: '加入している損害保険会社',
      deadline: '早いほど良い（契約により異なる）',
      note: '地震・津波・噴火は一般的に車両保険の対象外。「地震・噴火・津波危険補償特約」を確認する。',
      conditions: ['car']
    },
    // === 事業所被害 ===
    {
      id: 'biz-support', priority: 2, disasters: ['earthquake','typhoon','flood','fire'],
      name: '中小企業向け災害融資・補助金の申請',
      dest: '日本政策金融公庫・商工会議所・都道府県',

      conditions: ['business']
    },
    // === 共通・後半 ===
    {
      id: 'tax-defer', priority: 3, disasters: ['earthquake','typhoon','flood','fire'],
      name: '所得税・住民税の猶予・減免申請',
      dest: '税務署・市区町村税務窓口',
      deadline: '税の申告・納付期限まで',
      note: '被災により申告・納付が困難な場合、期限延長・猶予・減免を申請できる。確定申告時に対応可能。',
      conditions: []
    },
    {
      id: 'gienkin', priority: 3, disasters: ['earthquake','typhoon','flood','fire'],
      name: '義援金の受給申請',
      dest: '市区町村の窓口',
      deadline: '自治体が定める申請期限まで',
      note: '日本赤十字社や報道機関が集めた義援金が市区町村を通じて配分される。罹災証明書が必要。',
      conditions: []

  var selectedDisaster = null;

  function selectDisaster(btn) {
    document.querySelectorAll('#disaster-btns .btn-sel').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedDisaster = btn.getAttribute('data-val');
    loadStorage();
  }

  function showSteps() {
    if (!selectedDisaster) { alert('災害の種類を選んでください'); return; }

    var dmgBuilding  = document.getElementById('dmg-building').checked;
    var dmgGoods     = document.getElementById('dmg-goods').checked;
    var dmgInjury    = document.getElementById('dmg-injury').checked;
    var dmgCar       = document.getElementById('dmg-car').checked;
    var dmgBusiness  = document.getElementById('dmg-business').checked;
    var selected     = [];
    if (dmgBuilding) selected.push('building');
    if (dmgGoods)    selected.push('goods');
    if (dmgInjury)   selected.push('injury');
    if (dmgCar)      selected.push('car');
    if (dmgBusiness) selected.push('business');

    // フィルタリング
    var procs = ALL_PROCS.filter(function(p) {
      if (p.disasters.indexOf(selectedDisaster) === -1) return false;
      if (p.conditions.length === 0) return true;
      return p.conditions.some(function(c){ return selected.indexOf(c) !== -1; });
    });

    if (procs.length === 0) {
      document.getElementById('steps-card').style.display = 'block';
      document.getElementById('steps-list').innerHTML = '<p style="color:var(--text-sub);font-size:0.9rem;">該当する手続きが見つかりませんでした。</p>';
      return;
    }

    var storageKey = 'saigai_nav_' + selectedDisaster;
    var savedChecks = {};
    try { savedChecks = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e){}

    var p1 = procs.filter(function(p){ return p.priority === 1; });
    var p2 = procs.filter(function(p){ return p.priority === 2; });
    var p3 = procs.filter(function(p){ return p.priority === 3; });

    var html = '';
    if (p1.length) html += renderGroup('🔴 最優先：すぐ動く', 'p1', p1, savedChecks);
    if (p2.length) html += renderGroup('🟡 1週間以内に動く', 'p2', p2, savedChecks);
    if (p3.length) html += renderGroup('🟢 1ヶ月以内に動く', 'p3', p3, savedChecks);

    document.getElementById('steps-list').innerHTML = html;
    document.getElementById('steps-card').style.display = 'block';
    document.getElementById('source-note').style.display = 'block';
    document.getElementById('steps-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderGroup(label, cls, procs, savedChecks) {
    var rows = procs.map(function(p) {
      var checked = savedChecks[p.id] ? ' checked' : '';
      return '<div class="proc-item">'
        + '<div class="proc-header" onclick="toggleBody(this)">'
        + '<input type="checkbox" id="chk-' + p.id + '"' + checked + ' onclick="saveCheck(event,\'' + p.id + '\')">'
        + '<span class="proc-name">' + p.name + '</span>'
        + '<span class="proc-toggle">▼ 詳細</span>'
        + '</div>'
        + '<div class="proc-body">'
        + '<div class="proc-meta">'
        + '<span>📌 申請先：<strong>' + p.dest + '</strong></span>'
        + '<span>⏰ 目安：<strong>' + p.deadline + '</strong></span>'
        + '</div>'
        + '<p class="proc-note">' + p.note + '</p>'
        + '</div>'
        + '</div>';
    }).join('');
    return '<div class="priority-group ' + cls + '"><span class="priority-label">' + label + '</span>' + rows + '</div>';
  }

  function toggleBody(header) {
    var body = header.nextElementSibling;
    body.classList.toggle('open');
    var arrow = header.querySelector('.proc-toggle');
    arrow.textContent = body.classList.contains('open') ? '▲ 閉じる' : '▼ 詳細';
  }

  function saveCheck(e, id) {
    e.stopPropagation();
    if (!selectedDisaster) return;
    var storageKey = 'saigai_nav_' + selectedDisaster;
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e2){}
    saved[id] = document.getElementById('chk-' + id).checked;
    localStorage.setItem(storageKey, JSON.stringify(saved));
  }

  function loadStorage() {
    // 初期ロード時に何もしない（表示後に反映）
  }
  </script>
