<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賃上げ実感チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力グリッド ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) {
      .input-grid { grid-template-columns: 1fr; }
    }
    .field { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .field-full { grid-column: 1 / -1; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 比較テーブルカード ── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 480px) {
      .compare-grid { grid-template-columns: 1fr; }
    }
    .compare-col {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 0.8rem;
    }
    .compare-col-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; margin-bottom: 0.5rem;
    }
    .compare-col.after .compare-col-label { color: var(--accent); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.5rem 0.2rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.0rem; }
    .detail-table .minus td:last-child { color: var(--ng); }

    /* ── 注記 ── */
    .note-box {
      max-width: 600px; margin: 0 auto 1rem;
      background: var(--accent-light); border: 1px solid #f5d9a8;
      border-radius: 10px; padding: 0.8rem 1rem;
      font-size: 0.75rem; color: var(--text-sub); line-height: 1.7;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>賃上げ実感チェッカー</h1>
    <p class="subtitle">月給アップ後の手取り増加を社会保険料・税金込みで即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">月給を入力</p>
    <div class="input-grid">
      <div class="field">
        <label for="before">現在の月給（円）</label>
        <input type="number" id="before" placeholder="例: 250000" min="0">
      </div>
      <div class="field">
        <label for="after">昇給後の月給（円）</label>
        <input type="number" id="after" placeholder="例: 270000" min="0">
      </div>
      <div class="field field-full">
        <label for="dependents">扶養家族の人数</label>
        <select id="dependents">
          <option value="0">0人（本人のみ）</option>
          <option value="1">1人</option>
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人以上</option>
        </select>
        <p class="hint">所得税の控除計算に使用します</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">手取りを計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">手取りの増加額（月額）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較カード -->
  <div class="card" id="compareCard" style="display:none">
    <p class="card-title">昇給前後の比較</p>
    <div class="compare-grid">
      <div class="compare-col before">
        <p class="compare-col-label">現在</p>
        <table class="detail-table"><tbody id="beforeTable"></tbody></table>
      </div>
      <div class="compare-col after">
        <p class="compare-col-label">昇給後</p>
        <table class="detail-table"><tbody id="afterTable"></tbody></table>
      </div>
    </div>
  </div>

  <!-- 差額内訳カード -->
  <div class="card" id="diffCard" style="display:none">
    <p class="card-title">増減の内訳（月額）</p>
    <table class="detail-table"><tbody id="diffTable"></tbody></table>
  </div>

  <!-- 注記 -->
  <div class="note-box" id="noteBox" style="display:none">
    ※ この計算は概算です。健康保険5%・厚生年金9.15%・雇用保険0.6%（いずれも本人負担分）、
    所得税は標準税率テーブル、住民税は10%で試算しています。
    実際の金額は勤務先や自治体によって異なります。
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ─────────────────────────────────────
  //  計算ロジック
  // ─────────────────────────────────────

  // 年収から給与所得控除を計算
  function kyuuyoKojo(nenShu) {
    if (nenShu <= 1625000)  return 550000;
    if (nenShu <= 1800000)  return nenShu * 0.4 - 100000;
    if (nenShu <= 3600000)  return nenShu * 0.3 + 80000;
    if (nenShu <= 6600000)  return nenShu * 0.2 + 440000;
    if (nenShu <= 8500000)  return nenShu * 0.1 + 1100000;
    return 1950000;
  }

  // 扶養控除（年額）
  function fuyouKojo(dependents) {
    return dependents * 380000;
  }

  // 所得税（年額）を課税所得から計算
  function shotokuZei(kazeiShotoku) {
    if (kazeiShotoku <= 0) return 0;
    var tax;
    if (kazeiShotoku <= 1950000)       tax = kazeiShotoku * 0.05;
    else if (kazeiShotoku <= 3300000)  tax = kazeiShotoku * 0.10 - 97500;
    else if (kazeiShotoku <= 6950000)  tax = kazeiShotoku * 0.20 - 427500;
    else if (kazeiShotoku <= 9000000)  tax = kazeiShotoku * 0.23 - 636000;
    else if (kazeiShotoku <= 18000000) tax = kazeiShotoku * 0.33 - 1536000;
    else if (kazeiShotoku <= 40000000) tax = kazeiShotoku * 0.40 - 2796000;
    else                               tax = kazeiShotoku * 0.45 - 4796000;
    // 復興特別所得税 2.1%
    return Math.max(0, Math.round(tax * 1.021));
  }

  // 月給から各控除を計算して手取りを返す
  function calcTakeDome(tsukiKyu, dependents) {
    var nenShu = tsukiKyu * 12;

    // 社会保険料（月額）
    var kenkoHoken   = Math.round(tsukiKyu * 0.05);     // 健康保険 本人5%
    var kousei        = Math.round(tsukiKyu * 0.0915);   // 厚生年金 本人9.15%
    var koyoHoken     = Math.round(tsukiKyu * 0.006);    // 雇用保険 0.6%
    var shakaHokenTsuki = kenkoHoken + kousei + koyoHoken;
    var shakaHokenNen   = shakaHokenTsuki * 12;

    // 課税所得（年額）
    var kyuuyoShotoku = nenShu - kyuuyoKojo(nenShu);
    var kihonKojo     = 480000; // 基礎控除
    var kazeiShotoku  = Math.max(0, kyuuyoShotoku - shakaHokenNen - kihonKojo - fuyouKojo(dependents));

    // 所得税（月額）
    var shotokuZeiNen  = shotokuZei(kazeiShotoku);
    var shotokuZeiTsuki = Math.round(shotokuZeiNen / 12);

    // 住民税（月額）= 課税所得 × 10% ÷ 12（翌年度徴収だが簡易表示）
    var juminZeiTsuki = Math.round(kazeiShotoku * 0.10 / 12);

    // 手取り
    var takeDome = tsukiKyu - shakaHokenTsuki - shotokuZeiTsuki - juminZeiTsuki;

    return {
      tsukiKyu       : tsukiKyu,
      kenkoHoken     : kenkoHoken,
      kousei          : kousei,
      koyoHoken       : koyoHoken,
      shakaHokenTsuki : shakaHokenTsuki,
      shotokuZeiTsuki : shotokuZeiTsuki,
      juminZeiTsuki   : juminZeiTsuki,
      takeDome        : takeDome,
      kazeiShotoku    : kazeiShotoku,
    };
  }

  function calc() {
    var beforeVal = parseInt(document.getElementById('before').value, 10);
    var afterVal  = parseInt(document.getElementById('after').value, 10);
    var dep       = parseInt(document.getElementById('dependents').value, 10);

    if (isNaN(beforeVal) || isNaN(afterVal) || beforeVal <= 0 || afterVal <= 0) {
      alert('現在の月給と昇給後の月給を入力してください。');
      return;
    }
    if (afterVal <= beforeVal) {
      alert('昇給後の月給は現在の月給より大きい値を入力してください。');
      return;
    }

    var b = calcTakeDome(beforeVal, dep);
    var a = calcTakeDome(afterVal,  dep);

    var takeDomeDiff = a.takeDome - b.takeDome;
    var kyuPct       = ((afterVal - beforeVal) / beforeVal * 100).toFixed(1);
    var takePct      = (takeDomeDiff / b.takeDome * 100).toFixed(1);
    var jissitsuPct  = (takePct / kyuPct * 100).toFixed(0); // 月給増加率に対する手取り増加の割合

    // 結論カード
    var level = takeDomeDiff >= 10000 ? 'ok' : takeDomeDiff >= 3000 ? 'warn' : 'ng';
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = '+' + fmt(takeDomeDiff) + ' 円';
    document.getElementById('rn').textContent =
      '月給は +' + (afterVal - beforeVal).toLocaleString('ja-JP') + ' 円（+' + kyuPct + '%）の増加 → '
      + '手取りは +' + takePct + '% の増加\n'
      + '月給増加分のうち約 ' + jissitsuPct + '% が実際の手取りに反映されます';

    // 比較テーブル
    document.getElementById('beforeTable').innerHTML = makeCompareRows(b);
    document.getElementById('afterTable').innerHTML  = makeCompareRows(a);
    document.getElementById('compareCard').style.display = '';

    // 差額内訳
    document.getElementById('diffTable').innerHTML = [
      ['月給の増加',         '+' + fmt(afterVal - beforeVal) + ' 円', false, false],
      ['健康保険料の増加',   '-' + fmt(a.kenkoHoken - b.kenkoHoken) + ' 円', false, true],
      ['厚生年金の増加',     '-' + fmt(a.kousei - b.kousei) + ' 円', false, true],
      ['雇用保険の増加',     '-' + fmt(a.koyoHoken - b.koyoHoken) + ' 円', false, true],
      ['所得税の増加',       '-' + fmt(a.shotokuZeiTsuki - b.shotokuZeiTsuki) + ' 円', false, true],
      ['住民税の増加',       '-' + fmt(a.juminZeiTsuki - b.juminZeiTsuki) + ' 円', false, true],
      ['手取りの増加（実質）', '+' + fmt(takeDomeDiff) + ' 円', true, false],
    ].map(function(r) {
      var cls = r[2] ? ' class="hl"' : (r[3] ? ' class="minus"' : '');
      return '<tr' + cls + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('diffCard').style.display = '';
    document.getElementById('noteBox').style.display  = '';

    // localStorage保存
    localStorage.setItem('chinaage_before', beforeVal);
    localStorage.setItem('chinaage_after',  afterVal);
    localStorage.setItem('chinaage_dep',    dep);
  }

  function makeCompareRows(d) {
    return [
      ['月給',       fmt(d.tsukiKyu) + ' 円'],
      ['健康保険',   '-' + fmt(d.kenkoHoken) + ' 円'],
      ['厚生年金',   '-' + fmt(d.kousei) + ' 円'],
      ['雇用保険',   '-' + fmt(d.koyoHoken) + ' 円'],
      ['所得税',     '-' + fmt(d.shotokuZeiTsuki) + ' 円'],
      ['住民税',     '-' + fmt(d.juminZeiTsuki) + ' 円'],
      ['手取り',     fmt(d.takeDome) + ' 円'],
    ].map(function(r, i) {
      var cls = (i === 6) ? ' class="hl"' : '';
      return '<tr' + cls + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 前回の入力を復元
  (function() {
    var b = localStorage.getItem('chinaage_before');
    var a = localStorage.getItem('chinaage_after');
    var d = localStorage.getItem('chinaage_dep');
    if (b) document.getElementById('before').value = b;
    if (a) document.getElementById('after').value  = a;
    if (d) document.getElementById('dependents').value = d;
  })();
  </script>

  <script src="../fav-widget.js"></script>
</body>
