<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上目標逆算シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 2列グリッド ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── KPIグリッド ── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; max-width: 600px; margin: 0 auto 1rem; }
    .kpi-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); text-align: center;
    }
    .kpi-label { font-size: 0.72rem; color: var(--text-sub); font-weight: 600; margin-bottom: 0.4rem; }
    .kpi-value { font-size: 1.5rem; font-weight: 900; color: var(--accent); line-height: 1.1; }
    .kpi-unit { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>売上目標逆算シミュレーター</h1>
    <p class="subtitle">月間目標から必要な客数・客単価・アプローチ数を逆算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本設定</p>
    <div class="field">
      <label for="target">月間売上目標（円）</label>
      <input type="number" id="target" placeholder="例: 1000000" min="0">
    </div>
    <div class="field">
      <label for="fixed">月間固定費（円）</label>
      <input type="number" id="fixed" placeholder="例: 300000" min="0">
      <p class="hint">家賃・人件費・光熱費など毎月かかる費用の合計</p>
    </div>
    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label for="price">想定客単価（円）</label>
        <input type="number" id="price" placeholder="例: 5000" min="1">
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="rate">成約率（%）</label>
        <input type="number" id="rate" placeholder="例: 30" min="0.1" max="100" step="0.1">
        <p class="hint">見込み客の何%が購入するか</p>
      </div>
    </div>
    <div class="field" style="margin-top:1rem">
      <label for="days">月間営業日数（日）</label>
      <input type="number" id="days" placeholder="例: 25" min="1" max="31">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">逆算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">必要粗利（売上目標 − 固定費）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- KPIグリッド -->
  <div class="kpi-grid" id="kpi-area" style="display:none">
    <div class="kpi-card">
      <p class="kpi-label">月間 必要客数</p>
      <p class="kpi-value" id="kpi-customers">—</p>
      <p class="kpi-unit">人</p>
    </div>
    <div class="kpi-card">
      <p class="kpi-label">月間 必要アプローチ数</p>
      <p class="kpi-value" id="kpi-approach">—</p>
      <p class="kpi-unit">件</p>
    </div>
    <div class="kpi-card">
      <p class="kpi-label">1日 必要客数</p>
      <p class="kpi-value" id="kpi-daily-cust">—</p>
      <p class="kpi-unit">人/日</p>
    </div>
    <div class="kpi-card">
      <p class="kpi-label">1日 必要アプローチ</p>
      <p class="kpi-value" id="kpi-daily-app">—</p>
      <p class="kpi-unit">件/日</p>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">逆算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📌 このツールは目安計算です。業種・季節・集客状況によって実際の数値は異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEYS = ['target','fixed','price','rate','days'];

  // localStorage から復元
  (function(){
    var saved = localStorage.getItem('uriage_gyaku_v1');
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      KEYS.forEach(function(k){ if (d[k] !== undefined) document.getElementById(k).value = d[k]; });
    } catch(e) {}
  })();

  function save() {
    var d = {};
    KEYS.forEach(function(k){ d[k] = document.getElementById(k).value; });
    localStorage.setItem('uriage_gyaku_v1', JSON.stringify(d));
  }

  function calc() {
    var target = parseFloat(document.getElementById('target').value);
    var fixed  = parseFloat(document.getElementById('fixed').value);
    var price  = parseFloat(document.getElementById('price').value);
    var rate   = parseFloat(document.getElementById('rate').value);
    var days   = parseFloat(document.getElementById('days').value);

    if (isNaN(target) || isNaN(fixed) || isNaN(price) || isNaN(rate) || isNaN(days)) {
      showErr('すべての項目を入力してください'); return;
    }
    if (price <= 0 || rate <= 0 || days <= 0) {
      showErr('客単価・成約率・営業日数は0より大きい値を入力してください'); return;
    }

    save();

    var grossProfit = target - fixed;          // 必要粗利
    var customers   = target / price;          // 必要客数（売上目標÷客単価）
    var approach    = customers / (rate / 100);// 必要アプローチ数
    var dailyCust   = customers / days;        // 1日必要客数
    var dailyApp    = approach / days;         // 1日必要アプローチ

    // 評価
    var level, eval_text, note;
    var approachRatio = approach; // 月間アプローチ数
    if (grossProfit < 0) {
      level = 'ng';
      eval_text = '固定費が目標売上を超えています';
      note = '固定費を下げるか、売上目標を引き上げてください';
    } else if (dailyApp > 50) {
      level = 'warn';
      eval_text = '1日のアプローチ数がかなり多め';
      note = '目標を段階的に設定するか、客単価アップを検討しましょう';
    } else {
      level = 'ok';
      eval_text = '達成可能な目標ラインです';
      note = '1日の行動目標を意識して取り組みましょう';
    }

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(grossProfit) + ' 円';
    document.getElementById('re').textContent = eval_text;
    document.getElementById('rn').textContent = note;

    // KPI
    document.getElementById('kpi-customers').textContent  = Math.ceil(customers).toLocaleString('ja-JP');
    document.getElementById('kpi-approach').textContent   = Math.ceil(approach).toLocaleString('ja-JP');
    document.getElementById('kpi-daily-cust').textContent = (Math.ceil(dailyCust * 10) / 10).toFixed(1);
    document.getElementById('kpi-daily-app').textContent  = (Math.ceil(dailyApp * 10) / 10).toFixed(1);
    document.getElementById('kpi-area').style.display     = 'grid';

    // 内訳
    showDetail([
      ['月間売上目標',         fmt(target) + ' 円'],
      ['月間固定費',           fmt(fixed) + ' 円'],
      ['必要粗利（目標−固定費）', fmt(grossProfit) + ' 円', true],
      ['想定客単価',           fmt(price) + ' 円'],
      ['成約率',               rate + ' %'],
      ['月間営業日数',         days + ' 日'],
      ['必要客数（月）',       Math.ceil(customers) + ' 人', true],
      ['必要アプローチ数（月）', Math.ceil(approach) + ' 件', true],
      ['必要客数（1日）',      (Math.ceil(dailyCust * 10) / 10).toFixed(1) + ' 人'],
      ['必要アプローチ（1日）', (Math.ceil(dailyApp * 10) / 10).toFixed(1) + ' 件'],
    ]);
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('kpi-area').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
