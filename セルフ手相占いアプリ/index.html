<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="感情線・知能線・生命線を3本選ぶだけで、あなたの運勢と性格タイプが30秒でわかる手相占いアプリです。気軽に試せる無料のセルフ診断ツール。">
  <title>🤚 セルフ手相占いアプリ</title>
  <style>
    :root {
      --bg: #f5f0f8;
      --card: #ffffff;
      --border: #ddd0ee;
      --accent: #5c3d7a;
      --accent-light: #f5f0ff;
      --text: #1c1917;
      --text-sub: #6b5c7a;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(92,61,122,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.82rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.04em;
      margin-bottom: 0.9rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 線選択カード ── */
    .line-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .line-option {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .line-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .line-option.selected { border-color: var(--accent); background: var(--accent-light); }
    .line-option input[type="radio"] {
      margin-top: 0.15rem; width: 18px; height: 18px; flex-shrink: 0;
      accent-color: var(--accent); cursor: pointer;
    }
    .option-body { flex: 1; }
    .option-name { display: block; font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
    .option-desc { display: block; font-size: 0.78rem; color: var(--text-sub); line-height: 1.4; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #3a2050, 0 6px 16px rgba(92,61,122,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #3a2050, 0 2px 8px rgba(92,61,122,0.2);
    }

    /* ── エラーメッセージ ── */
    .err-msg {
      display: none; color: #b91c1c; font-size: 0.85rem; font-weight: 600;
      text-align: center; padding: 0.6rem;
      background: #fef2f2; border-radius: 8px;
      margin: 0 auto 0.8rem; max-width: 600px;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.4rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .fortune-badge {
      display: inline-block;
      font-size: 2.2rem; font-weight: 900;
      color: #fff; background: var(--accent);
      border-radius: 50px; padding: 0.3rem 1.8rem;
      margin-bottom: 1rem; letter-spacing: 0.12em;
    }
    .result-type {
      font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-bottom: 0.8rem;
    }
    .result-advice {
      font-size: 0.88rem; color: var(--text-sub); line-height: 1.7;
      background: var(--accent-light); border-radius: 10px;
      padding: 0.9rem 1rem; margin: 0.6rem 0 0.8rem; text-align: left;
    }
    .result-life {
      font-size: 0.82rem; color: var(--text-sub);
      margin-top: 0.6rem; line-height: 1.6;
      border-top: 1px solid var(--border); padding-top: 0.6rem;
    }
    .result-tags {
      display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
      margin-top: 0.8rem;
    }
    .tag {
      font-size: 0.74rem; background: var(--accent); color: #fff;
      border-radius: 20px; padding: 0.2rem 0.75rem; font-weight: 600;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px; min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card); border: 1px dashed var(--border);
      border-radius: var(--radius); color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🤚 セルフ手相占いアプリ</h1>
    <p class="subtitle">3本の線を選ぶだけ。あなたの運勢と性格が30秒でわかります。</p>
  </header>

  <!-- 感情線 -->
  <div class="card">
    <p class="card-title">① 感情線を選んでください（小指の下から伸びる横の線）</p>
    <div class="line-options">
      <label class="line-option">
        <input type="radio" name="line_e" value="0">
        <div class="option-body">
          <span class="option-name">長くて深い</span>
          <span class="option-desc">人差し指の下あたりまで長く、くっきり伸びている</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_e" value="1">
        <div class="option-body">
          <span class="option-name">短くて直線的</span>
          <span class="option-desc">中指あたりまでまっすぐ伸びている</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_e" value="2">
        <div class="option-body">
          <span class="option-name">波打つように曲がっている</span>
          <span class="option-desc">ゆるやかな曲線を描きながら伸びている</span>
        </div>
      </label>
    </div>
  </div>

  <!-- 知能線 -->
  <div class="card">
    <p class="card-title">② 知能線を選んでください（親指と人差し指の間から伸びる線）</p>
    <div class="line-options">
      <label class="line-option">
        <input type="radio" name="line_h" value="0">
        <div class="option-body">
          <span class="option-name">まっすぐ横に伸びる</span>
          <span class="option-desc">手のひらをほぼ水平に横切る線</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_h" value="1">
        <div class="option-body">
          <span class="option-name">下に向かって弧を描く</span>
          <span class="option-desc">手首方向に向かってゆるやかに下がっていく線</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_h" value="2">
        <div class="option-body">
          <span class="option-name">短くてはっきりしている</span>
          <span class="option-desc">短めだが太くくっきりとした線</span>
        </div>
      </label>
    </div>
  </div>

  <!-- 生命線 -->
  <div class="card">
    <p class="card-title">③ 生命線を選んでください（親指の付け根を囲む弧の線）</p>
    <div class="line-options">
      <label class="line-option">
        <input type="radio" name="line_l" value="0">
        <div class="option-body">
          <span class="option-name">大きく弧を描いて長い</span>
          <span class="option-desc">親指をぐるりと包むように大きくカーブして手首まで伸びる</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_l" value="1">
        <div class="option-body">
          <span class="option-name">細くても長く途切れない</span>
          <span class="option-desc">やや細いが途切れずに長く伸びている</span>
        </div>
      </label>
      <label class="line-option">
        <input type="radio" name="line_l" value="2">
        <div class="option-body">
          <span class="option-name">途中で枝分かれしている</span>
          <span class="option-desc">線の途中から支線が分かれている</span>
        </div>
      </label>
    </div>
  </div>

  <p class="err-msg" id="err">3つの線をすべて選んでください</p>

  <button class="btn-calc" onclick="diagnose()">🔮 手相を診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p style="font-size:0.75rem;color:var(--text-sub);margin-bottom:0.5rem">今日の運勢</p>
    <div class="fortune-badge" id="rv">—</div>
    <p class="result-type" id="rt"></p>
    <div class="result-advice" id="ra"></div>
    <p class="result-life" id="rl"></p>
    <div class="result-tags" id="tags"></div>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // 選択時にハイライト
  document.querySelectorAll('.line-option').forEach(function(el) {
    el.addEventListener('click', function() {
      var name = el.querySelector('input').name;
      document.querySelectorAll('input[name="' + name + '"]').forEach(function(r) {
        r.closest('.line-option').classList.remove('selected');
      });
      el.classList.add('selected');
    });
  });

  // ── データ ──
  var E_NAMES = ['長くて深い', '短くて直線的', '波打つように曲がっている'];
  var H_NAMES = ['まっすぐ横に伸びる', '下に弧を描く', '短くてはっきり'];
  var L_NAMES = ['大きく弧を描いて長い', '細くても長く途切れない', '途中で枝分かれ'];

  // 感情線(e) × 知能線(h) → 性格タイプ
  var TYPES = [
    ['感情と知性のバランス型', '感性の芸術家型',    '情熱のリーダー型'],
    ['知性の探究者型',         '感性の静思者型',    '意志の実務家型'],
    ['変化に強い知性型',       '直感の詩人型',      '革新の行動者型']
  ];

  // 感情線(e) × 知能線(h) → アドバイス
  var ADVICE = [
    [
      '感情と論理をバランスよく持つあなたは、人間関係の調和を得意とします。新しい出会いや協力関係に積極的に動くと吉。',
      '豊かな感受性と芸術的センスがあなたの武器。創作活動や自己表現の場を大切にすると、運気がぐっと上がります。',
      '情熱とリーダーシップが輝いています。あなたの一歩が周囲を動かす力になります。積極的に発言していきましょう。'
    ],
    [
      '冷静な観察眼と知的好奇心が強みです。焦らず着実に進めることで良い結果が出ます。今月は情報収集が鍵になります。',
      '静かな深さを持つ思索家タイプ。自分の内側に向き合う時間を確保すると、創造性と直感が磨かれていきます。',
      '少ない言葉で物事を的確に判断する実務家タイプ。信頼される行動の積み重ねが今後の大きな支えになります。'
    ],
    [
      '変化への適応力と知的な柔軟性を兼ね備えたあなた。新しい挑戦に飛び込む好機です。環境が変わるほど強くなります。',
      '直感と感性のアンテナが鋭い詩人型。言葉や音楽、アートなど感性を磨く活動があなたの運気を高めます。',
      '革新を求める行動者タイプ。固定観念を打ち破るあなたの発想が周囲に刺激を与えます。自分を信じて前へ進もう。'
    ]
  ];

  // 生命線(l) → エネルギーメッセージ
  var LIFE_MSG = [
    '生命線が大きくカーブして長い——エネルギーが充実しています。行動すればするほど運気が高まります。',
    '生命線が細くても途切れずに続く——着実に積み重ねる姿勢が、長期的な幸運を引き寄せます。',
    '生命線に枝分かれがある——転換期のサイン。変化を恐れず受け入れると大きな扉が開きます。'
  ];

  // 各スコア（合計 3〜9）→ 運勢ラベル
  var E_SCORE = [3, 1, 2];
  var H_SCORE = [2, 3, 1];
  var L_SCORE = [3, 2, 1];

  function fortuneLabel(score) {
    if (score >= 8) return '大吉';
    if (score >= 6) return '中吉';
    if (score >= 5) return '小吉';
    if (score >= 4) return '吉';
    return '末吉';
  }

  function diagnose() {
    var eEl = document.querySelector('input[name="line_e"]:checked');
    var hEl = document.querySelector('input[name="line_h"]:checked');
    var lEl = document.querySelector('input[name="line_l"]:checked');
    var errEl = document.getElementById('err');

    if (!eEl || !hEl || !lEl) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    var e = parseInt(eEl.value);
    var h = parseInt(hEl.value);
    var l = parseInt(lEl.value);

    var score   = E_SCORE[e] + H_SCORE[h] + L_SCORE[l];
    var fortune = fortuneLabel(score);
    var type    = TYPES[e][h];
    var advice  = ADVICE[e][h];
    var lifeMsg = LIFE_MSG[l];

    var rc = document.getElementById('result');
    document.getElementById('rv').textContent = fortune;
    document.getElementById('rt').textContent = '性格タイプ：' + type;
    document.getElementById('ra').textContent = advice;
    document.getElementById('rl').textContent = lifeMsg;
    document.getElementById('tags').innerHTML =
      '<span class="tag">感情線：' + E_NAMES[e] + '</span>' +
      '<span class="tag">知能線：' + H_NAMES[h] + '</span>' +
      '<span class="tag">生命線：' + L_NAMES[l] + '</span>';

    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // localStorage 保存
    try {
      localStorage.setItem('teiso_last', JSON.stringify({ e: e, h: h, l: l }));
    } catch(ex) {}
  }

  // 前回の選択を復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem('teiso_last'));
      if (!saved) return;
      ['e','h','l'].forEach(function(k) {
        var r = document.querySelector('input[name="line_' + k + '"][value="' + saved[k] + '"]');
        if (r) {
          r.checked = true;
          r.closest('.line-option').classList.add('selected');
        }
      });
    } catch(ex) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
