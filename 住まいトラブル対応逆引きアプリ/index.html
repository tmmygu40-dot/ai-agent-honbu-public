<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="トラブルの種類を選ぶだけで応急処置手順と相談先を即表示。雨漏り・水漏れ・鍵・電気・害虫・騒音など住まいのトラブルに対応。">
  <title>住まいトラブル対応逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; color: var(--warn); }

    .section-block {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .section-title {
      font-size: 0.82rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.04em; margin-bottom: 0.9rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
    }

    .step-list { list-style: none; padding: 0; }
    .step-list li {
      display: flex; gap: 0.7rem; align-items: flex-start;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
    }
    .step-list li:last-child { border-bottom: none; }
    .step-num {
      flex-shrink: 0; width: 22px; height: 22px;
      background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.72rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin-top: 0.1rem;
    }

    .contact-list { list-style: none; padding: 0; }
    .contact-list li {
      padding: 0.6rem 0.3rem; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; line-height: 1.5; color: var(--text);
    }
    .contact-list li:last-child { border-bottom: none; }
    .contact-list li::before { content: "📞 "; }

    .note-box {
      background: var(--warn-bg); border: 1px solid var(--warn);
      border-radius: 8px; padding: 0.7rem 0.9rem;
      font-size: 0.85rem; line-height: 1.6; color: var(--text);
    }
    .note-box::before { content: "⚠️ "; font-size: 0.9rem; }

    .badge-urgent {
      display: inline-block; background: var(--ng); color: #fff;
      font-size: 0.68rem; font-weight: 800; padding: 0.15rem 0.5rem;
      border-radius: 20px; letter-spacing: 0.04em; margin-left: 0.4rem;
      vertical-align: middle;
    }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card, .section-block { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>住まいトラブル対応逆引きアプリ</h1>
    <p class="subtitle">トラブルの種類を選ぶだけ → 応急処置と相談先を即表示</p>
  </header>

  <div class="card">
    <p class="card-title">トラブルを選ぶ</p>
    <div class="field">
      <label for="trouble">トラブルの種類</label>
      <select id="trouble">
        <option value="">-- 選んでください --</option>
        <option value="rain">雨漏り</option>
        <option value="water">水漏れ・排水詰まり</option>
        <option value="key">鍵・錠前トラブル</option>
        <option value="electric">電気トラブル（停電・ブレーカー）</option>
        <option value="gas">ガストラブル・ガス漏れ</option>
        <option value="pest">害虫・害獣</option>
        <option value="wall">壁・床・天井の損傷</option>
        <option value="ac">エアコン・設備故障</option>
        <option value="noise">騒音・近隣トラブル</option>
        <option value="mold">カビ・結露</option>
        <option value="fire">火災・緊急事態</option>
        <option value="crack">外壁ひび割れ・基礎損傷</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="lookup()">対処法を確認する</button>

  <div class="result-card warn" id="result">
    <p class="result-label">トラブル種別</p>
    <p class="result-value" id="rv">—</p>
  </div>

  <div class="section-block" id="sec-emergency">
    <p class="section-title">🚨 応急処置（今すぐやること）</p>
    <ul class="step-list" id="emergency-list"></ul>
  </div>

  <div class="section-block" id="sec-contacts">
    <p class="section-title">📞 相談先・連絡先</p>
    <ul class="contact-list" id="contacts-list"></ul>
  </div>

  <div class="section-block" id="sec-note">
    <p class="section-title">💡 注意点・ポイント</p>
    <div class="note-box" id="note-text"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、国民生活センター・消費者庁・各自治体の住宅相談窓口等の公開情報を参考に作成しています。緊急時は迷わず119番・110番へ。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  function lookup() {
    var key = document.getElementById('trouble').value;
    if (!key) { alert('トラブルの種類を選んでください'); return; }
    var d = DATA[key];
    if (!d) return;

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('rv').textContent = d.label;

    var el = document.getElementById('emergency-list');
    el.innerHTML = d.emergency.map(function(s, i) {
      return '<li><span class="step-num">' + (i+1) + '</span><span>' + s + '</span></li>';
    }).join('');
    document.getElementById('sec-emergency').style.display = 'block';

    var cl = document.getElementById('contacts-list');
    cl.innerHTML = d.contacts.map(function(s) {
      return '<li>' + s + '</li>';
    }).join('');
    document.getElementById('sec-contacts').style.display = 'block';

    document.getElementById('note-text').textContent = d.note;
    document.getElementById('sec-note').style.display = 'block';

    localStorage.setItem('sumato_type', key);
    rc.scrollIntoView({behavior:'smooth', block:'start'});
  }

  (function() {
    var saved = localStorage.getItem('sumato_type');
    if (saved) document.getElementById('trouble').value = saved;
  })();
  </script>
