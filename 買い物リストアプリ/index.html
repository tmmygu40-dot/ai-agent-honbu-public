<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い物リスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>買い物リスト</h1>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="アイテムを入力..." maxlength="50">
      <button id="addBtn">追加</button>
    </div>

    <div class="list-header">
      <span id="countLabel">0件</span>
      <button id="clearCheckedBtn">チェック済みを削除</button>
    </div>

    <ul id="itemList"></ul>

    <p class="empty-msg" id="emptyMsg">リストは空です</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
