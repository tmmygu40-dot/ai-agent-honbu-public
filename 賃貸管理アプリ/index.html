<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賃貸管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>賃貸管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>部屋を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="roomNumber">部屋番号</label>
          <input type="text" id="roomNumber" placeholder="例：101" maxlength="10">
        </div>
        <div class="form-group">
          <label for="tenantName">入居者名</label>
          <input type="text" id="tenantName" placeholder="例：田中 太郎" maxlength="30">
        </div>
        <div class="form-group">
          <label for="rent">家賃（円）</label>
          <input type="number" id="rent" placeholder="例：80000" min="0">
        </div>
        <div class="form-group">
          <label for="renewalDate">契約更新日</label>
          <input type="date" id="renewalDate">
        </div>
      </div>
      <button class="btn-add" id="addBtn">登録する</button>
    </section>

    <!-- 統計サマリー -->
    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-label">登録部屋数</div>
          <div class="summary-value" id="totalRooms">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">月額合計</div>
          <div class="summary-value" id="totalRent">¥0</div>
        </div>
        <div class="summary-card warn">
          <div class="summary-label">未払い</div>
          <div class="summary-value" id="unpaidCount">0</div>
        </div>
        <div class="summary-card alert">
          <div class="summary-label">更新まもなく</div>
          <div class="summary-value" id="renewalSoon">0</div>
        </div>
      </div>
    </section>

    <!-- フィルター -->
    <section class="filter-section" id="filterSection" style="display:none;">
      <label class="filter-label">
        <input type="checkbox" id="filterUnpaid"> 未払いのみ表示
      </label>
      <label class="filter-label">
        <input type="checkbox" id="filterRenewal"> 更新まもなくのみ表示
      </label>
    </section>

    <!-- 部屋一覧 -->
    <section class="list-section">
      <h2>部屋一覧</h2>
      <div id="roomList">
        <p class="empty-msg">まだ部屋が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
