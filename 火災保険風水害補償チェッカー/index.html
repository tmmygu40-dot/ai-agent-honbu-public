<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="台風・大雨・洪水・雪害・雷など風水害の被害状況を選ぶだけで、火災保険で補償されるかどうかを即診断。補償可否と注意点がすぐわかる生活防衛アプリです。">
  <title>火災保険風水害補償チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>火災保険風水害補償チェッカー</h1>
    <p class="subtitle">損害状況を選ぶだけで風水害の補償可否を即診断（2026年4月時点の一般的な火災保険を参考）</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">被害状況を選択</p>
    <div class="field">
      <label for="disaster">風水害の種類</label>
      <select id="disaster">
        <option value="">-- 選んでください --</option>
        <option value="typhoon">台風（風災）</option>
        <option value="heavy_rain">大雨・集中豪雨（水災）</option>
        <option value="flood">洪水・河川氾濫（水災）</option>
        <option value="storm_surge">高潮（水災）</option>
        <option value="landslide">土砂崩れ・地滑り（水災）</option>
        <option value="snow">雪害・豪雪（雪災）</option>
        <option value="hail">ひょう（ひょう災）</option>
        <option value="lightning">落雷</option>
        <option value="tornado">竜巻・突風（風災）</option>
      </select>
    </div>
    <div class="field">
      <label for="damage">被害箇所</label>
      <select id="damage">
        <option value="">-- 選んでください --</option>
        <option value="roof">屋根・瓦の破損</option>
        <option value="wall">外壁・窓ガラスの破損</option>
        <option value="floor">床上浸水</option>
        <option value="basement">床下浸水</option>
        <option value="furniture">家財（家具・家電）の損傷</option>
        <option value="fence">塀・門・カーポートの破損</option>
        <option value="car_in_garage">車庫内の車の損傷</option>
        <option value="garden">庭・植栽の損傷</option>
        <option value="solar">太陽光パネルの破損</option>
        <option value="antenna">アンテナ・エアコン室外機の破損</option>
      </select>
    </div>
    <div class="field">
      <label for="contract">契約プラン</label>
      <select id="contract">
        <option value="">-- 選んでください --</option>
        <option value="full">フルカバー（火災＋風災＋水災＋その他）</option>
        <option value="no_water">水災なしプラン（火災＋風災のみ）</option>
        <option value="building_only">建物のみ（家財なし）</option>
        <option value="contents_only">家財のみ（建物なし）</option>
        <option value="unknown">よくわからない</option>
      </select>
      <p class="hint">不明な場合は「よくわからない」を選んでください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">-</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">補償の詳細</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注意事項カード -->
  <div class="card" id="caution-card" style="display:none">
    <p class="card-title">注意事項・ポイント</p>
    <div id="caution-list" style="font-size:0.88rem;color:var(--text-sub);line-height:1.6;"></div>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、金融庁・損害保険料率算出機構・各損害保険会社の約款・パンフレットを参考に、一般的な火災保険の補償範囲を目安として整理しています。実際の補償は契約内容により異なります。最新情報は加入先の保険会社にご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var ENABLE_RESULT_QA = true;

  var EMOJI_MSG = {
    ok:   { e: '😌', t: 'ほっ、一般的に補償される可能性が高いです' },
    warn: { e: '🤔', t: 'うーん、条件次第で補償されない場合があります' },
    ng:   { e: '😱', t: '残念…一般的には補償対象外の可能性が高いです' }
  };

  var QA = {
    ok: [
      { q: '保険金を請求するには？', a: '被害状況の写真を撮り、保険会社に電話で事故受付をしてください。修理前の写真が重要です。' },
      { q: '免責金額に注意', a: '契約に免責金額（自己負担額）が設定されている場合、その金額以下の損害は保険金が出ません。' },
      { q: '請求期限は？', a: '保険法では事故から3年以内が請求期限です。早めの連絡が安心です。' },
      { q: '修理業者はどう選ぶ？', a: '保険会社から紹介を受けるか、複数社から見積もりを取ると安心です。「保険で無料」を強調する訪問業者には注意。' }
    ],
    warn: [
      { q: '補償されるか確認するには？', a: '保険証券を確認し、加入先に直接問い合わせるのが確実です。' },
      { q: '水災補償を付けていない場合は？', a: '水災は別途特約やオプションで付帯が必要な場合が多いです。今後の備えとして見直しを検討しましょう。' },
      { q: '損害額が少ないと出ない？', a: '水災の場合、損害額が建物評価額の30%以上、または床上浸水等の条件がある保険もあります。' },
      { q: '被害の証拠は残すべき？', a: 'はい。写真・動画・修理見積書など、できるだけ多くの証拠を残してください。' }
    ],
    ng: [
      { q: '他の救済策はある？', a: '自治体の被災者生活再建支援制度・災害見舞金・災害復興住宅融資などを確認してみてください。' },
      { q: '今後の備えは？', a: '火災保険の契約内容を見直し、風災・水災・家財の補償を検討しましょう。' },
      { q: '地震が原因の場合は？', a: '地震による被害は火災保険では補償されません。地震保険の加入が必要です。' },
      { q: '罹災証明書とは？', a: '自治体が発行する被害程度の証明書です。各種支援制度の申請に必要なので、被災後は早めに申請してください。' }
    ]
  };

  // ── 補償判定データ ──
  var COVERAGE = {
    typhoon:     { cat: 'wind',  name: '台風（風災）' },
    heavy_rain:  { cat: 'water', name: '大雨・集中豪雨（水災）' },
    flood:       { cat: 'water', name: '洪水・河川氾濫（水災）' },
    storm_surge: { cat: 'water', name: '高潮（水災）' },
    landslide:   { cat: 'water', name: '土砂崩れ・地滑り（水災）' },
    snow:        { cat: 'wind',  name: '雪害（雪災）' },
    hail:        { cat: 'wind',  name: 'ひょう（ひょう災）' },
    lightning:   { cat: 'lightning', name: '落雷' },
    tornado:     { cat: 'wind',  name: '竜巻・突風（風災）' }
  };

  var DAMAGE = {
    roof:         { type: 'building', name: '屋根・瓦の破損' },
    wall:         { type: 'building', name: '外壁・窓ガラスの破損' },
    floor:        { type: 'building', name: '床上浸水' },
    basement:     { type: 'building', name: '床下浸水' },
    furniture:    { type: 'contents', name: '家財（家具・家電）の損傷' },
    fence:        { type: 'building', name: '塀・門・カーポートの破損' },
    car_in_garage:{ type: 'other',    name: '車庫内の車の損傷' },
    garden:       { type: 'other',    name: '庭・植栽の損傷' },
    solar:        { type: 'building', name: '太陽光パネルの破損' },
    antenna:      { type: 'building', name: 'アンテナ・エアコン室外機の破損' }
  };

  function calc() {
    var dKey = document.getElementById('disaster').value;
    var dmgKey = document.getElementById('damage').value;
    var cKey = document.getElementById('contract').value;

    if (!dKey || !dmgKey || !cKey) {
      showResult('ng', '未選択', 'すべての項目を選択してください');
      document.getElementById('detail').style.display = 'none';
      document.getElementById('caution-card').style.display = 'none';
      document.getElementById('qa-card').style.display = 'none';
      return;
    }

    var disaster = COVERAGE[dKey];
    var damage = DAMAGE[dmgKey];
    var level, verdict, note;
    var details = [];
    var cautions = [];

    // 車は火災保険対象外
    if (dmgKey === 'car_in_garage') {
      level = 'ng';
      verdict = '補償対象外';
      note = '自動車は火災保険の補償対象外です。自動車保険（車両保険）での補償になります。';
      details.push(['被害対象', '車（自動車）']);
      details.push(['火災保険', '対象外']);
      cautions.push('車両保険に加入していれば、風災・水災による車の損害が補償される場合があります。');
      cautions.push('車両保険の「一般型」なら洪水・台風も対象、「エコノミー型」は対象外の場合があります。');
    }
    // 庭・植栽は基本対象外
    else if (dmgKey === 'garden') {
      level = 'ng';
      verdict = '補償対象外';
      note = '庭木・植栽・芝生などは一般的に火災保険の補償対象外です。';
      details.push(['被害対象', '庭・植栽']);
      details.push(['火災保険', '対象外']);
      cautions.push('門・塀・垣根は「建物」の付属物として補償対象になる場合があります。');
    }
    // 床下浸水は条件付き
    else if (dmgKey === 'basement' && disaster.cat === 'water') {
      level = 'warn';
      verdict = '条件付き';
      note = '床下浸水は水災補償の支払い条件を満たさない場合があります。';
      details.push(['災害種別', disaster.name]);
      details.push(['被害箇所', damage.name]);
      details.push(['水災補償', cKey === 'no_water' ? '未付帯（対象外）' : '要確認'], true);
      if (cKey === 'no_water') {
        level = 'ng';
        verdict = '補償対象外';
        note = '水災補償が付いていないプランのため、水災による被害は補償されません。';
      }
      cautions.push('水災の支払い条件は「損害額が建物評価額の30%以上」または「床上浸水」が一般的です。');
      cautions.push('床下浸水のみでは条件を満たさない場合が多いですが、保険会社によって異なります。');
      cautions.push('近年は床下浸水も補償する「新型水災補償」を用意する保険会社もあります。');
    }
    else {
      // 通常判定
      var needWater = (disaster.cat === 'water');
      var needBuilding = (damage.type === 'building');
      var needContents = (damage.type === 'contents');

      // 契約プランとの照合
      var covered = true;
      var reason = '';

      if (needWater && cKey === 'no_water') {
        covered = false;
        reason = '水災補償が付いていないプランのため、水災による被害は補償されません。';
      } else if (needContents && cKey === 'building_only') {
        covered = false;
        reason = '建物のみの契約のため、家財の損害は補償されません。';
      } else if (needBuilding && cKey === 'contents_only') {
        covered = false;
        reason = '家財のみの契約のため、建物の損害は補償されません。';
      }

      if (!covered) {
        level = 'ng';
        verdict = '補償対象外';
        note = reason;
      } else if (cKey === 'unknown') {
        level = 'warn';
        verdict = '要確認';
        note = '契約内容によって補償可否が変わります。保険証券を確認してください。';
      } else {
        level = 'ok';
        verdict = '補償される可能性が高い';
        note = 'お選びの契約プランと被害内容であれば、一般的に補償対象です。';
      }

      details.push(['災害種別', disaster.name]);
      details.push(['被害箇所', damage.name]);
      details.push(['補償区分', needWater ? '水災補償' : disaster.cat === 'lightning' ? '落雷補償' : '風災・雪災・ひょう災補償']);
      details.push(['対象区分', needContents ? '家財' : '建物（付属物含む）']);
      details.push(['診断結果', verdict, true]);

      // 注意事項
      if (disaster.cat === 'wind') {
        cautions.push('風災・雪災・ひょう災には免責金額（自己負担額）が設定されている場合があります（例：20万円）。');
        cautions.push('古い契約では「20万円以上の損害でないと支払われない」フランチャイズ方式の場合があります。');
      }
      if (disaster.cat === 'water') {
        cautions.push('水災の支払い条件は「損害額が建物評価額の30%以上」または「床上浸水」が一般的です。');
        cautions.push('近年はこの条件を緩和した保険商品も増えています。保険証券を確認してください。');
      }
      if (disaster.cat === 'lightning') {
        cautions.push('落雷による電気機器の故障も補償対象です（過電流による基板焼損など）。');
        cautions.push('家電の故障が落雷によるものか証明が必要な場合があります。');
      }
      if (dmgKey === 'fence') {
        cautions.push('塀・門・カーポートは「建物」の付属物として補償されるのが一般的ですが、契約により異なります。');
      }
      if (dmgKey === 'solar') {
        cautions.push('太陽光パネルは建物の付属設備として補償されるのが一般的です。メーカー保証と併用できる場合もあります。');
      }
    }

    cautions.push('実際の補償内容は保険会社・商品・特約により異なります。必ず保険証券と約款をご確認ください。');

    showResult(level, verdict, note);
    showDetail(details);
    showCautions(cautions);
    showQA(level);
    saveToStorage(dKey, dmgKey, cKey);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = note;
  }

  function showQA(level) {
    if (!ENABLE_RESULT_QA) return;
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = 'block';
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showCautions(items) {
    var el = document.getElementById('caution-list');
    el.innerHTML = items.map(function(c){ return '<p style="margin-bottom:0.5rem;">・' + c + '</p>'; }).join('');
    document.getElementById('caution-card').style.display = 'block';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('caution-card').style.display = 'none';
  }

  // ── localStorage ──
  function saveToStorage(d, dm, c) {
    try {
      localStorage.setItem('fire_ins_wind_water_checker', JSON.stringify({ disaster: d, damage: dm, contract: c }));
    } catch(e) {}
  }
  function loadFromStorage() {
    try {
      var data = JSON.parse(localStorage.getItem('fire_ins_wind_water_checker'));
      if (data) {
        if (data.disaster) document.getElementById('disaster').value = data.disaster;
        if (data.damage) document.getElementById('damage').value = data.damage;
        if (data.contract) document.getElementById('contract').value = data.contract;
      }
    } catch(e) {}
  }
  loadFromStorage();
  </script>
