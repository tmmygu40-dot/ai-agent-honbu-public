<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="バズりやすいX投稿テンプレを3パターンから即座にコピーできるジェネレーター">
  <title>✍️ バズるX投稿テンプレジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── テンプレパターンボタン ── */
    .template-buttons {
      display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .template-btn {
      flex: 1; min-width: 120px;
      padding: 0.8rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .template-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .template-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1.6; margin-bottom: 0.4rem; white-space: pre-wrap; word-break: break-word; }
    .result-card.ok   .result-value { color: var(--text); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── コピーフィードバック ── */
    .copy-feedback {
      display: none;
      margin-top: 0.8rem;
      font-size: 0.88rem;
      color: var(--ok);
      font-weight: 600;
      text-align: center;
    }
    .copy-feedback.show {
      display: block;
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>✍️ バズるX投稿テンプレジェネレーター</h1>
    <p class="subtitle">3パターンのバズりやすいテンプレから選んで、すぐコピー。X投稿作成が時短できます。</p>
  </header>

  <!-- テンプレパターン選択 -->
  <div class="card">
    <p class="card-title">テンプレを選ぶ</p>
    <div class="template-buttons">
      <button class="template-btn active" data-template="buzz">バズり系</button>
      <button class="template-btn" data-template="empathy">共感系</button>
      <button class="template-btn" data-template="question">質問系</button>
    </div>
  </div>

  <!-- テンプレプレビュー -->
  <div class="result-card" id="result">
    <p class="result-label" id="template-label">バズり系</p>
    <p class="result-value" id="template-content"></p>
    <p class="copy-feedback" id="copy-feedback">✓ コピーしました</p>
  </div>

  <!-- コピーボタン -->
  <button class="btn-calc" onclick="copyTemplate()">📋 コピーする</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このテンプレートはバズりやすい投稿パターンをまとめたものです。自分のスタイルに合わせてカスタマイズしてご利用ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // テンプレートデータ定義
  var templates = {
    buzz: {
      label: 'バズり系',
      content: 'ああ〜\n〇〇してたのか！\n\n知らなかった。\n今日のスコアは\n［テーマ入力］'
    },
    empathy: {
      label: '共感系',
      content: 'わかります〜\n〇〇って、こういう時\nほんと困りますよね。\n\n［体験・感情を入力］\n\n同感してくれたら\nRT・いいねお願いします！'
    },
    question: {
      label: '質問系',
      content: 'ちょっと質問です！\n\n〇〇する時、\n皆さんは\n「A派」「B派」\nどっちですか？\n\n私は△派です👇'
    }
  };

  var currentTemplate = 'buzz';

  // 初期表示
  function initTemplate() {
    showTemplate('buzz');
  }

  // テンプレート表示
  function showTemplate(key) {
    currentTemplate = key;
    var t = templates[key];

    document.getElementById('template-label').textContent = t.label;
    document.getElementById('template-content').textContent = t.content;
    document.getElementById('result').style.display = '';
    document.getElementById('copy-feedback').classList.remove('show');

    // ボタンの active 状態を更新
    document.querySelectorAll('.template-btn').forEach(function(btn) {
      if (btn.dataset.template === key) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // localStorage に保存
    localStorage.setItem('selectedTemplate', key);
  }

  // テンプレコピー
  function copyTemplate() {
    var content = document.getElementById('template-content').textContent;

    navigator.clipboard.writeText(content).then(function() {
      // コピー成功
      var feedback = document.getElementById('copy-feedback');
      feedback.classList.add('show');

      // 2秒後に非表示
      setTimeout(function() {
        feedback.classList.remove('show');
      }, 2000);
    }).catch(function(err) {
      // フォールバック（古いブラウザ対応）
      var textarea = document.createElement('textarea');
      textarea.value = content;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);

      var feedback = document.getElementById('copy-feedback');
      feedback.classList.add('show');
      setTimeout(function() {
        feedback.classList.remove('show');
      }, 2000);
    });
  }

  // ボタンクリックリスナー
  document.querySelectorAll('.template-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      showTemplate(this.dataset.template);
    });
  });

  // ページ読み込み時に前回選んだテンプレを復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('selectedTemplate');
    if (saved && templates[saved]) {
      initTemplate();
      showTemplate(saved);
    } else {
      initTemplate();
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
