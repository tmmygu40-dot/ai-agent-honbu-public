<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>育児日記アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>👶 育児日記</h1>
  </header>

  <main>
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label>種別</label>
        <div class="type-buttons">
          <button class="type-btn active" data-type="授乳">🍼 授乳</button>
          <button class="type-btn" data-type="睡眠">😴 睡眠</button>
          <button class="type-btn" data-type="おむつ">👶 おむつ</button>
        </div>
      </div>

      <div class="form-group">
        <label for="datetime">日時</label>
        <input type="datetime-local" id="datetime">
      </div>

      <div class="form-group" id="amount-group">
        <label for="amount" id="amount-label">量 (ml)</label>
        <input type="number" id="amount" placeholder="例：120" min="0">
      </div>

      <div class="form-group" id="duration-group" style="display:none;">
        <label for="duration">時間 (分)</label>
        <input type="number" id="duration" placeholder="例：30" min="0">
      </div>

      <div class="form-group" id="diaper-group" style="display:none;">
        <label>おむつの種類</label>
        <div class="diaper-buttons">
          <button class="diaper-btn active" data-diaper="おしっこ">💧 おしっこ</button>
          <button class="diaper-btn" data-diaper="うんち">💩 うんち</button>
          <button class="diaper-btn" data-diaper="両方">両方</button>
        </div>
      </div>

      <div class="form-group">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="気になったことなど">
      </div>

      <button class="add-btn" id="addBtn">追加する</button>
    </section>

    <section class="filter-section">
      <label>絞り込み：</label>
      <button class="filter-btn active" data-filter="すべて">すべて</button>
      <button class="filter-btn" data-filter="授乳">🍼 授乳</button>
      <button class="filter-btn" data-filter="睡眠">😴 睡眠</button>
      <button class="filter-btn" data-filter="おむつ">👶 おむつ</button>
    </section>

    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
