<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売掛管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>売掛管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="client">得意先</label>
        <input type="text" id="client" placeholder="会社名・氏名">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：50000" min="0">
      </div>
      <div class="form-group">
        <label for="billingDate">請求日</label>
        <input type="date" id="billingDate">
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="件名・内容など">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- 未入金サマリー -->
    <section class="summary-section">
      <div class="summary-box">
        <span class="summary-label">未入金合計</span>
        <span class="summary-amount" id="totalUnpaid">¥0</span>
      </div>
      <div class="summary-sub">
        <span id="unpaidCount">0件</span> 未入金
      </div>
    </section>

    <!-- フィルター -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="unpaid">未入金のみ</button>
      <button class="filter-btn" data-filter="all">すべて</button>
    </div>

    <!-- 一覧 -->
    <section class="list-section">
      <ul id="recordList" class="record-list"></ul>
      <p id="emptyMsg" class="empty-msg">登録がありません</p>
    </section>
  </div>

  <!-- 入金確認モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3>入金済みにする</h3>
      <p id="modalClientName"></p>
      <div class="form-group">
        <label for="paidDate">入金日</label>
        <input type="date" id="paidDate">
      </div>
      <div class="modal-actions">
        <button id="confirmPaid" class="btn-primary">入金済みにする</button>
        <button id="cancelModal" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
