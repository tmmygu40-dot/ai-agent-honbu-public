<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>調達多様化チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 680px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 0.9rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.3rem; }
    .field input {
      width: 100%; padding: 0.65rem 0.85rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
      margin-bottom: 1rem;
    }
    .source-group {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.7rem;
    }
    .source-group .src-label {
      font-size: 0.78rem; font-weight: 800;
      color: var(--accent); margin-bottom: 0.6rem;
      text-align: center; letter-spacing: 0.04em;
    }
    .source-group .mini-field { margin-bottom: 0.5rem; }
    .source-group .mini-field:last-child { margin-bottom: 0; }
    .source-group .mini-field label { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.2rem; display: block; }
    .source-group .mini-field input {
      width: 100%; padding: 0.5rem 0.6rem;
      font-size: 0.88rem; border: 1.5px solid var(--border);
      border-radius: 7px; background: #fff; color: var(--text);
      outline: none; -webkit-appearance: none;
    }
    .source-group .mini-field input:focus { border-color: var(--accent); }

    .btn-add {
      display: block; width: 100%; max-width: 680px;
      margin: 0 auto 1.2rem; padding: 0.95rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .err-msg {
      max-width: 680px; margin: 0 auto 1rem;
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: 9px; padding: 0.75rem 1rem;
      font-size: 0.88rem; color: var(--ng); display: none;
    }

    /* サマリーグリッド */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
      max-width: 680px;
      margin: 0 auto 1rem;
    }
    .sum-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 0.7rem;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .sum-card .s-label { font-size: 0.7rem; color: var(--text-sub); font-weight: 600; margin-bottom: 0.3rem; }
    .sum-card .s-value { font-size: 1.35rem; font-weight: 900; color: var(--accent); }
    .sum-card .s-unit { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.15rem; }

    /* 一覧テーブル */
    .list-wrap { max-width: 680px; margin: 0 auto 1rem; overflow-x: auto; }
    .list-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 560px; }
    .list-table thead { background: var(--accent-light); }
    .list-table thead th {
      padding: 0.55rem 0.5rem; text-align: center;
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      border-bottom: 2px solid var(--border);
    }
    .list-table thead th:first-child { text-align: left; }
    .list-table tbody tr { border-bottom: 1px solid var(--border); }
    .list-table tbody tr:last-child { border-bottom: none; }
    .list-table tbody td { padding: 0.55rem 0.5rem; text-align: center; vertical-align: middle; }
    .list-table tbody td:first-child { text-align: left; font-weight: 700; }
    .list-table tbody td.item-name { max-width: 100px; word-break: break-all; }

    /* バッジ */
    .badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.4rem; border-radius: 99px;
      margin-left: 0.2rem; white-space: nowrap; vertical-align: middle;
    }
    .badge-ok   { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
    .badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-ng   { background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng); }

    .cell-ok   { color: var(--ok); font-weight: 700; }
    .cell-warn { color: var(--warn); font-weight: 700; }
    .cell-sub  { color: var(--text-sub); }

    .btn-del {
      background: none; border: 1px solid var(--ng); color: var(--ng);
      border-radius: 6px; padding: 0.2rem 0.45rem;
      font-size: 0.72rem; cursor: pointer; font-weight: 700;
    }
    .btn-del:hover { background: var(--ng-bg); }

    .empty-msg {
      max-width: 680px; margin: 0 auto 1rem;
      text-align: center; color: var(--text-sub);
      font-size: 0.88rem; padding: 2rem 0;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .source-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(3, 1fr); }
      .sum-card .s-value { font-size: 1.1rem; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>調達多様化チェッカー</h1>
    <p class="subtitle">中国・国内・第三国のコスト差と納期差を即比較して切り替え判断</p>
  </header>

  <!-- 入力フォーム -->
  <div class="card" style="max-width:680px">
    <p class="card-title">品目を追加</p>
    <div class="field">
      <label for="itemName">品目名</label>
      <input type="text" id="itemName" placeholder="例：電子部品A、Tシャツ素材">
    </div>
    <div class="source-grid">
      <!-- 中国 -->
      <div class="source-group">
        <p class="src-label">🇨🇳 中国</p>
        <div class="mini-field">
          <label>単価（円）</label>
          <input type="number" id="cnPrice" placeholder="例: 500" min="0">
        </div>
        <div class="mini-field">
          <label>納期（日）</label>
          <input type="number" id="cnLead" placeholder="例: 30" min="0">
        </div>
      </div>
      <!-- 国内 -->
      <div class="source-group">
        <p class="src-label">🇯🇵 国内</p>
        <div class="mini-field">
          <label>単価（円）</label>
          <input type="number" id="jpPrice" placeholder="例: 900" min="0">
        </div>
        <div class="mini-field">
          <label>納期（日）</label>
          <input type="number" id="jpLead" placeholder="例: 5" min="0">
        </div>
      </div>
      <!-- 第三国 -->
      <div class="source-group">
        <p class="src-label">🌏 第三国</p>
        <div class="mini-field">
          <label>単価（円）</label>
          <input type="number" id="altPrice" placeholder="例: 650" min="0">
        </div>
        <div class="mini-field">
          <label>納期（日）</label>
          <input type="number" id="altLead" placeholder="例: 20" min="0">
        </div>
      </div>
    </div>
    <p style="font-size:0.75rem;color:var(--text-sub);margin-top:-0.5rem;">※ 未使用の調達先は単価・納期を空欄にしてください（比較対象から除外されます）</p>
  </div>

  <div class="err-msg" id="errMsg"></div>
  <button class="btn-add" onclick="addItem()">品目を追加して比較する</button>

  <!-- 一覧 -->
  <div id="listSection" style="display:none">

    <!-- サマリー -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- テーブル -->
    <div class="list-wrap">
      <table class="list-table">
        <thead>
          <tr>
            <th>品目</th>
            <th>中国<br>単価/納期</th>
            <th>国内<br>単価/納期</th>
            <th>第三国<br>単価/納期</th>
            <th>コスト最安</th>
            <th>納期最速</th>
            <th>コスト差</th>
            <th>削除</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>

    <div style="max-width:680px;margin:0 auto;">
      <button onclick="clearAll()" style="background:none;border:1px solid var(--ng);color:var(--ng);border-radius:8px;padding:0.45rem 1rem;font-size:0.82rem;cursor:pointer;font-weight:700;display:block;margin-left:auto;">全件削除</button>
    </div>
  </div>

  <div class="empty-msg" id="emptyMsg">品目を追加すると比較結果が表示されます</div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'chokutaMulti_v1';
  var items = [];

  function load() {
    try {
      var d = localStorage.getItem(STORAGE_KEY);
      if (d) items = JSON.parse(d);
    } catch(e) { items = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function parseSource(priceId, leadId) {
    var p = parseFloat(document.getElementById(priceId).value);
    var l = parseFloat(document.getElementById(leadId).value);
    if (isNaN(p) && isNaN(l)) return null; // 未入力
    return { price: isNaN(p) ? null : p, lead: isNaN(l) ? null : l };
  }

  function addItem() {
    var name = document.getElementById('itemName').value.trim();
    if (!name) { showErr('品目名を入力してください'); return; }

    var cn  = parseSource('cnPrice',  'cnLead');
    var jp  = parseSource('jpPrice',  'jpLead');
    var alt = parseSource('altPrice', 'altLead');

    // 有効な調達先が2つ以上ないと比較不可
    var validSrc = [cn, jp, alt].filter(function(s){ return s !== null; });
    if (validSrc.length < 2) { showErr('比較するには2つ以上の調達先を入力してください'); return; }

    hideErr();
    var item = {
      id: Date.now(),
      name: name,
      cn: cn, jp: jp, alt: alt
    };
    items.push(item);
    save();
    clearForm();
    render();
  }

  function clearForm() {
    ['itemName','cnPrice','cnLead','jpPrice','jpLead','altPrice','altLead'].forEach(function(id){
      document.getElementById(id).value = '';
    });
  }

  function deleteItem(id) {
    items = items.filter(function(i){ return i.id !== id; });
    save();
    render();
  }

  function clearAll() {
    if (!confirm('全件削除しますか？')) return;
    items = [];
    save();
    render();
  }

  function render() {
    var list = document.getElementById('listSection');
    var empty = document.getElementById('emptyMsg');
    if (items.length === 0) {
      list.style.display = 'none';
      empty.style.display = '';
      return;
    }
    list.style.display = '';
    empty.style.display = 'none';

    renderSummary();
    renderTable();
  }

  function getBest(item) {
    var sources = [
      { key: 'cn',  label: '中国',  data: item.cn },
      { key: 'jp',  label: '国内',  data: item.jp },
      { key: 'alt', label: '第三国', data: item.alt }
    ].filter(function(s){ return s.data !== null; });

    var withPrice = sources.filter(function(s){ return s.data.price !== null; });
    var withLead  = sources.filter(function(s){ return s.data.lead  !== null; });

    var cheapest = null, fastest = null;
    if (withPrice.length > 0) {
      cheapest = withPrice.reduce(function(a, b){ return a.data.price <= b.data.price ? a : b; });
    }
    if (withLead.length > 0) {
      fastest = withLead.reduce(function(a, b){ return a.data.lead <= b.data.lead ? a : b; });
    }

    // コスト差: 最安 vs 最高値
    var maxPrice = null, minPrice = null;
    if (withPrice.length >= 2) {
      var prices = withPrice.map(function(s){ return s.data.price; });
      maxPrice = Math.max.apply(null, prices);
      minPrice = Math.min.apply(null, prices);
    }

    return { cheapest: cheapest, fastest: fastest, maxPrice: maxPrice, minPrice: minPrice };
  }

  function renderSummary() {
    var totalItems = items.length;
    var totalSaving = 0; // 中国→最安の差額合計（中国が存在する場合）
    var cnDepsCount = items.filter(function(i){ return i.cn !== null && i.cn.price !== null; }).length;
    var diversifiedCount = 0; // 中国が最安ではない品目数

    items.forEach(function(item){
      var b = getBest(item);
      if (item.cn && item.cn.price !== null && b.cheapest && b.cheapest.key !== 'cn') {
        totalSaving += item.cn.price - b.cheapest.data.price;
        diversifiedCount++;
      }
    });

    document.getElementById('summaryGrid').innerHTML =
      '<div class="sum-card"><div class="s-label">登録品目数</div><div class="s-value">' + totalItems + '</div><div class="s-unit">品目</div></div>' +
      '<div class="sum-card"><div class="s-label">切替推奨品目</div><div class="s-value">' + diversifiedCount + '</div><div class="s-unit">品目</div></div>' +
      '<div class="sum-card"><div class="s-label">切替時の単価節約</div><div class="s-value">' + fmt(totalSaving) + '</div><div class="s-unit">円/個合計</div></div>';
  }

  function cellVal(data) {
    if (!data) return '<span class="cell-sub">—</span>';
    var p = data.price !== null ? fmt(data.price) + '円' : '—';
    var l = data.lead  !== null ? data.lead + '日' : '—';
    return p + ' / ' + l;
  }

  function renderTable() {
    var rows = items.map(function(item){
      var b = getBest(item);
      var cheapLabel = b.cheapest ? b.cheapest.label : '—';
      var fastLabel  = b.fastest  ? b.fastest.label  : '—';

      var cheapBadge = b.cheapest ? ('<span class="badge badge-ok">最安</span>') : '';
      var fastBadge  = b.fastest  ? ('<span class="badge badge-ok">最速</span>') : '';

      var costDiff = '';
      if (b.maxPrice !== null && b.minPrice !== null) {
        var diff = b.maxPrice - b.minPrice;
        var pct  = b.maxPrice > 0 ? (diff / b.maxPrice * 100).toFixed(0) : 0;
        costDiff = fmt(diff) + '円<br><span class="cell-sub">(' + pct + '%差)</span>';
      } else {
        costDiff = '<span class="cell-sub">—</span>';
      }

      var cnClass  = (b.cheapest && b.cheapest.key === 'cn')  ? ' class="cell-ok"' : '';
      var jpClass  = (b.cheapest && b.cheapest.key === 'jp')  ? ' class="cell-ok"' : '';
      var altClass = (b.cheapest && b.cheapest.key === 'alt') ? ' class="cell-ok"' : '';

      return '<tr>' +
        '<td class="item-name">' + esc(item.name) + '</td>' +
        '<td' + cnClass  + '>' + cellVal(item.cn)  + '</td>' +
        '<td' + jpClass  + '>' + cellVal(item.jp)  + '</td>' +
        '<td' + altClass + '>' + cellVal(item.alt) + '</td>' +
        '<td><strong>' + cheapLabel + '</strong>' + cheapBadge + '</td>' +
        '<td><strong>' + fastLabel  + '</strong>' + fastBadge  + '</td>' +
        '<td>' + costDiff + '</td>' +
        '<td><button class="btn-del" onclick="deleteItem(' + item.id + ')">削除</button></td>' +
        '</tr>';
    }).join('');
    document.getElementById('listBody').innerHTML = rows;
  }

  function showErr(msg) {
    var el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = '';
  }
  function hideErr() {
    document.getElementById('errMsg').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  load();
  render();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
