<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ストレス度を1-10で入力すると、その夜に実践できるリセット法を3つ提案する無料ツールです。仕事の疲れ・人間関係の悩みなど、その日のストレスレベルに応じた最適な対策法をすぐに確認できます。">
  <title>😌 ストレス即対策診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input[type="range"] { width: 100%; padding: 0; height: 8px; cursor: pointer; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .stress-display {
      font-size: 2rem; font-weight: 900; text-align: center;
      color: var(--accent); margin-top: 0.5rem;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .reset-methods { display: flex; flex-direction: column; gap: 0.8rem; }
    .method-item {
      padding: 0.9rem; border-radius: 9px;
      background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.1);
    }
    .method-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
    .method-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .method-time { font-size: 0.76rem; color: var(--text-sub); margin-top: 0.3rem; font-style: italic; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>😌 ストレス即対策診断</h1>
    <p class="subtitle">ストレス度を1-10で入力すると、その夜のリセット法を3つ提案します。</p>
  </header>

  <div class="card">
    <p class="card-title">ストレス度を選択</p>
    <div class="field">
      <label for="stress">現在のストレス度：</label>
      <input type="range" id="stress" min="1" max="10" value="5" onchange="updateStress()">
      <p class="stress-display" id="stressDisplay">5</p>
      <p class="hint">1=軽い　→　10=非常に高い</p>
    </div>
  </div>

  <button class="btn-calc" onclick="showResets()">リセット法を提案してもらう</button>

  <div class="result-card" id="result">
    <p class="card-title">あなたの今夜のリセット法</p>
    <div class="reset-methods" id="resetMethods"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、ストレス管理の一般的な方法と心理学的なリセット技法を参考に、日常で実践しやすく整理しています。深刻な場合は医療専門家に相談してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var RESET_METHODS = {
    1: [
      { title: '深呼吸リセット', desc: '腹式呼吸で副交感神経を優位にして、心身をリラックスさせます。', time: '3分' },
      { title: '好きな音楽を聴く', desc: 'お気に入りの曲を聴くだけで、気分転換と感情の整理ができます。', time: '5-10分' },
      { title: '軽いストレッチ', desc: '肩や首をゆっくり動かして、緊張をほぐします。', time: '5分' }
    ],
    2: [
      { title: '散歩（15分）', desc: '外に出て新鮮な空気を吸いながら歩くと、ストレスが軽くなります。', time: '15分' },
      { title: 'アロマテラピー', desc: 'ラベンダーやユーカリの香りでリラックス効果を得られます。', time: '10分' },
      { title: 'ぬるめのお風呂', desc: '温かいお風呂は副交感神経を優位にします。', time: '15-20分' }
    ],
    3: [
      { title: 'ヨガ・瞑想（10分）', desc: 'マインドフルネスで心を整理し、今この瞬間に集中します。', time: '10分' },
      { title: '好物を食べる', desc: '栄養バランスを考えながら、好きな食べ物をゆっくり味わいます。', time: '15分' },
      { title: 'ジャーナリング', desc: '思いを書き出すことで、心が整理されます。', time: '10分' }
    ],
    4: [
      { title: '入浴＋読書', desc: '湯舟に浸かりながら軽い本を読むと、日中の疲れをリセットできます。', time: '30分' },
      { title: 'ガイド付き瞑想', desc: 'アプリや動画のガイドに従って瞑想すると、集中しやすくなります。', time: '15分' },
      { title: '軽い有酸素運動', desc: 'ジョギングや室内自転車でエンドルフィンを分泌させます。', time: '20分' }
    ],
    5: [
      { title: 'ボディスキャン瞑想', desc: '頭から足先まで順番に意識を向け、緊張している部位をほぐします。', time: '15分' },
      { title: '友人・家族と話す', desc: '信頼できる人に話を聞いてもらうだけで、気持ちが楽になります。', time: '20-30分' },
      { title: '好きな映画・動画を見る', desc: '笑いや感動は、ストレスホルモンを下げる効果があります。', time: '30-60分' }
    ],
    6: [
      { title: '自然の中を歩く', desc: '公園や緑の多い場所を歩くと、皮質醇（ストレスホルモン）が低下します。', time: '30分' },
      { title: '創作活動（絵・料理など）', desc: '何かを作ることに集中することで、思考の悪循環を断ち切れます。', time: '30-60分' },
      { title: 'プログレッシブ筋弛緩法', desc: '各筋肉を順番に緊張させてから緩める技法で、深いリラックスを得られます。', time: '20分' }
    ],
    7: [
      { title: '長めの入浴（炭酸浴）', desc: '38〜40℃のお湯に20分以上浸かり、副交感神経を優位にします。', time: '25分' },
      { title: '感情の書き出し', desc: 'ネガティブな感情をそのまま紙に書き出すことで、内側の圧力を解放します。', time: '15分' },
      { title: 'サポートを求める', desc: '信頼できる人か相談窓口に連絡し、一人で抱え込まないようにします。', time: '30分' }
    ],
    8: [
      { title: '深いリラクゼーション音楽', desc: 'バイノーラルビートやホワイトノイズで脳波を落ち着かせます。', time: '30分' },
      { title: '思い切り泣く', desc: '感情を開放することで、副交感神経が活性化し気持ちが楽になります。', time: '適宜' },
      { title: '睡眠を優先する', desc: '無理をせず早めに就寝し、明日に備えることも重要な選択肢です。', time: '十分な睡眠' }
    ],
    9: [
      { title: '専門家への相談を検討', desc: 'ストレスレベルが高い場合は、カウンセラーや医師への相談も選択肢です。', time: '早めに' },
      { title: '今日は何もしないを許す', desc: '完璧な回復を目指さず、ただ横になって休むだけでも価値があります。', time: '適宜' },
      { title: '安心できる場所で深呼吸', desc: '静かな場所で目を閉じ、ゆっくり呼吸することだけに集中します。', time: '10分' }
    ],
    10: [
      { title: '今すぐ休息を取る', desc: '限界を感じているサインです。仕事や用事を手放し、まず体を横にしてください。', time: 'すぐに' },
      { title: '相談窓口を利用する', desc: 'よりそいホットライン（0120-279-338）など、無料の相談窓口があります。', time: '今すぐ' },
      { title: '明日の自分を信じて眠る', desc: '睡眠は最強の回復手段です。今夜は眠ることだけを目標にしてください。', time: '今夜' }
    ]
  };

  function updateStress() {
    var val = document.getElementById('stress').value;
    document.getElementById('stressDisplay').textContent = val;
  }

  function showResets() {
    var level = parseInt(document.getElementById('stress').value, 10);
    var methods = RESET_METHODS[level] || RESET_METHODS[5];

    var card = document.getElementById('result');
    var container = document.getElementById('resetMethods');

    // 色クラスを決定
    card.className = 'result-card';
    if (level <= 3) card.classList.add('ok');
    else if (level <= 6) card.classList.add('warn');
    else card.classList.add('ng');

    // メソッドを描画
    container.innerHTML = methods.map(function(m) {
      return '<div class="method-item">'
        + '<p class="method-title">' + m.title + '</p>'
        + '<p class="method-desc">' + m.desc + '</p>'
        + '<p class="method-time">⏱ ' + m.time + '</p>'
        + '</div>';
    }).join('');

    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  </script>
</body>
</html>
