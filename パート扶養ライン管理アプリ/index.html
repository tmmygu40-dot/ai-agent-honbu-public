<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パート扶養ライン管理アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 月別履歴 ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-month { color: var(--text-sub); font-weight: 600; }
    .history-amount { font-weight: 700; color: var(--text); }
    .history-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 0.8rem; padding: 0.2rem 0.4rem;
      border-radius: 5px; transition: color 0.15s;
    }
    .history-del:hover { color: var(--ng); }
    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1rem 0; }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.75rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--ng);
      border: 1.5px solid var(--ng); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:hover { background: var(--ng-bg); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── ステータスバー ── */
    .progress-bar-wrap {
      margin-top: 0.8rem;
      background: var(--border); border-radius: 99px; height: 12px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--accent); transition: width 0.4s ease;
    }
    .progress-bar-fill.warn { background: var(--warn); }
    .progress-bar-fill.ng   { background: var(--ng); }
    .progress-label { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.4rem; text-align: right; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print, .history-del { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🧮 パート扶養ライン管理アプリ</h1>
    <p class="subtitle">103万の壁まで残り収入・残り労働時間を即確認</p>
  </header>

  <!-- 今月収入入力カード -->
  <div class="card">
    <p class="card-title">今月の収入を記録</p>
    <div class="field">
      <label for="hourly">時給（円）</label>
      <input type="number" id="hourly" placeholder="例: 1100" min="0" inputmode="numeric">
      <p class="hint">変更がなければ前回値が使われます</p>
    </div>
    <div class="field">
      <label for="monthly">今月の収入（円）</label>
      <input type="number" id="monthly" placeholder="例: 85000" min="0" inputmode="numeric">
    </div>
    <div class="field">
      <label for="month-sel">月</label>
      <input type="month" id="month-sel">
    </div>
  </div>

  <button class="btn-calc" onclick="addMonth()">記録して計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">残り労働可能時間</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="pbar" style="width:0%"></div>
    </div>
    <p class="progress-label" id="plabel"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 月別履歴カード -->
  <div class="card">
    <p class="card-title">月別収入履歴（今年）</p>
    <div id="history-list"><p class="empty-msg">まだ記録がありません</p></div>
  </div>

  <!-- 年次リセット -->
  <button class="btn-reset no-print" onclick="resetYear()">🔄 年次リセット（新年度用）</button>

  <p style="max-width:600px;margin:0 auto 1rem;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 103万円の壁とは、給与所得者の年収が103万円を超えると所得税が発生し、配偶者の扶養控除が外れる可能性があるラインです（2024年度現在）。正確な判断は税務署・社労士にご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LIMIT = 1030000;
  var KEY_HOURLY  = 'fuyoLineApp_hourly';
  var KEY_HISTORY = 'fuyoLineApp_history';

  // ── 初期化 ──
  window.addEventListener('DOMContentLoaded', function() {
    var savedHourly = localStorage.getItem(KEY_HOURLY);
    if (savedHourly) document.getElementById('hourly').value = savedHourly;

    var today = new Date();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('month-sel').value = today.getFullYear() + '-' + mm;

    renderHistory();
    autoCalc();
  });

  // ── 月を記録して計算 ──
  function addMonth() {
    var hourly  = parseFloat(document.getElementById('hourly').value);
    var monthly = parseFloat(document.getElementById('monthly').value);
    var month   = document.getElementById('month-sel').value;

    if (!month)               { alert('月を選択してください'); return; }
    if (isNaN(hourly) || hourly <= 0)  { alert('時給を正しく入力してください'); return; }
    if (isNaN(monthly) || monthly < 0) { alert('今月の収入を正しく入力してください'); return; }

    // 時給を保存
    localStorage.setItem(KEY_HOURLY, hourly);

    // 履歴に追加（同月があれば上書き）
    var history = getHistory();
    var existing = history.findIndex(function(h) { return h.month === month; });
    if (existing >= 0) {
      history[existing].income = monthly;
    } else {
      history.push({ month: month, income: monthly });
    }
    history.sort(function(a, b) { return a.month < b.month ? 1 : -1; });
    saveHistory(history);

    renderHistory();
    showCalcResult(hourly);

    // 入力欄リセット（時給・月は維持）
    document.getElementById('monthly').value = '';
  }

  // ── 計算して結果表示 ──
  function autoCalc() {
    var hourly = parseFloat(document.getElementById('hourly').value || localStorage.getItem(KEY_HOURLY));
    if (!isNaN(hourly) && hourly > 0) {
      showCalcResult(hourly);
    }
  }

  function showCalcResult(hourly) {
    var history = getHistory();
    var year    = new Date().getFullYear();
    var cumulative = 0;
    history.forEach(function(h) {
      if (h.month && h.month.startsWith(String(year))) {
        cumulative += h.income;
      }
    });

    var remaining     = LIMIT - cumulative;
    var remainingHrs  = remaining > 0 ? Math.floor(remaining / hourly) : 0;
    var pct           = Math.min(100, Math.round(cumulative / LIMIT * 100));
    var over          = remaining < 0;

    var level, eval_, note;
    if (over) {
      level = 'ng';
      eval_ = '⚠️ 103万円を超過しています';
      note  = '扶養控除が外れる可能性があります。税務署や会社にご確認ください。';
    } else if (remaining <= 100000) {
      level = 'ng';
      eval_ = '🔴 残りわずか！要注意';
      note  = '103万円まであとわずかです。今月の勤務時間を調整してください。';
    } else if (remaining <= 500000) {
      level = 'warn';
      eval_ = '🟡 あと少し余裕があります';
      note  = '引き続き月収を確認しながら調整しましょう。';
    } else {
      level = 'ok';
      eval_ = '🟢 余裕あり';
      note  = 'まだ十分な余裕があります。';
    }

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';

    if (over) {
      document.getElementById('rv').textContent = '超過 ' + fmt(Math.abs(remaining)) + ' 円';
    } else {
      document.getElementById('rv').textContent = remainingHrs.toLocaleString('ja-JP') + ' 時間';
    }
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    // プログレスバー
    var pbar = document.getElementById('pbar');
    pbar.style.width = pct + '%';
    pbar.className = 'progress-bar-fill' + (level === 'ng' ? ' ng' : level === 'warn' ? ' warn' : '');
    document.getElementById('plabel').textContent = '使用済み ' + pct + '%（' + fmt(cumulative) + ' 円 ／ ' + fmt(LIMIT) + ' 円）';

    // 内訳
    var rows = [
      ['103万の壁',       fmt(LIMIT) + ' 円'],
      ['今年の累計収入',   fmt(cumulative) + ' 円'],
      ['残り収入枠',       fmt(Math.max(0, remaining)) + ' 円', true],
      ['時給',            fmt(hourly) + ' 円'],
    ];
    if (!over) {
      rows.push(['残り労働可能時間', remainingHrs.toLocaleString('ja-JP') + ' 時間', true]);
    }
    var tbody = document.getElementById('db');
    tbody.innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  // ── 履歴表示 ──
  function renderHistory() {
    var history = getHistory();
    var year    = new Date().getFullYear();
    var thisYear = history.filter(function(h) { return h.month && h.month.startsWith(String(year)); });
    var el = document.getElementById('history-list');
    if (thisYear.length === 0) {
      el.innerHTML = '<p class="empty-msg">まだ記録がありません</p>';
      return;
    }
    el.innerHTML = thisYear.map(function(h) {
      return '<div class="history-item">'
           + '<span class="history-month">' + h.month + '</span>'
           + '<span class="history-amount">' + fmt(h.income) + ' 円</span>'
           + '<button class="history-del no-print" onclick="deleteMonth(\'' + h.month + '\')">削除</button>'
           + '</div>';
    }).join('');
  }

  // ── 月削除 ──
  function deleteMonth(month) {
    var history = getHistory().filter(function(h) { return h.month !== month; });
    saveHistory(history);
    renderHistory();
    autoCalc();
  }

  // ── 年次リセット ──
  function resetYear() {
    if (!confirm('今年の収入履歴をすべてリセットしますか？\n（新年度の記録開始用）')) return;
    var year = new Date().getFullYear();
    var history = getHistory().filter(function(h) { return !h.month.startsWith(String(year)); });
    saveHistory(history);
    renderHistory();
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  // ── localStorage ユーティリティ ──
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(KEY_HISTORY) || '[]'); } catch(e) { return []; }
  }
  function saveHistory(history) {
    localStorage.setItem(KEY_HISTORY, JSON.stringify(history));
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
