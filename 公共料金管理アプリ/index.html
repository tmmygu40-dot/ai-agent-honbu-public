<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公共料金管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>公共料金管理</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="inputYear">年</label>
          <select id="inputYear"></select>
        </div>
        <div class="form-group">
          <label for="inputMonth">月</label>
          <select id="inputMonth">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
        </div>
        <div class="form-group">
          <label for="inputType">種別</label>
          <select id="inputType">
            <option value="electricity">電気</option>
            <option value="gas">ガス</option>
            <option value="water">水道</option>
          </select>
        </div>
        <div class="form-group">
          <label for="inputUsage">使用量</label>
          <div class="input-with-unit">
            <input type="number" id="inputUsage" min="0" step="0.1" placeholder="0">
            <span id="unitLabel">kWh</span>
          </div>
        </div>
        <div class="form-group">
          <label for="inputAmount">金額（円）</label>
          <input type="number" id="inputAmount" min="0" step="1" placeholder="0">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- タブ切り替え -->
    <section class="list-section">
      <div class="tab-bar">
        <button class="tab-btn active" data-type="all">すべて</button>
        <button class="tab-btn electricity" data-type="electricity">電気</button>
        <button class="tab-btn gas" data-type="gas">ガス</button>
        <button class="tab-btn water" data-type="water">水道</button>
      </div>

      <div id="recordList" class="record-list"></div>
      <p id="emptyMsg" class="empty-msg">記録がありません。追加してください。</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
