<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最低賃金対応シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>最低賃金対応シミュレーター</h1>
    <p class="subtitle">最低賃金改定による人件費増加と必要値上げ幅を計算します</p>

    <section class="card">
      <h2>① 人件費情報</h2>
      <div class="form-group">
        <label for="currentWage">現在の時給（円）</label>
        <input type="number" id="currentWage" min="0" placeholder="例：1000">
      </div>
      <div class="form-group">
        <label for="newWage">改定後の時給（円）</label>
        <input type="number" id="newWage" min="0" placeholder="例：1050">
      </div>
      <div class="form-group">
        <label for="staffCount">スタッフ数（人）</label>
        <input type="number" id="staffCount" min="0" placeholder="例：5">
      </div>
      <div class="form-group">
        <label for="monthlyHours">月間総労働時間（時間）<br><span class="hint">（スタッフ1人あたり）</span></label>
        <input type="number" id="monthlyHours" min="0" placeholder="例：160">
      </div>
    </section>

    <section class="card">
      <h2>② 売上情報</h2>
      <div class="form-group">
        <label for="monthlySales">月間売上（円）</label>
        <input type="number" id="monthlySales" min="0" placeholder="例：3000000">
      </div>
    </section>

    <button id="calcBtn" class="btn-calc">計算する</button>

    <section class="card result-card" id="resultSection" style="display:none;">
      <h2>計算結果</h2>

      <div class="result-block">
        <div class="result-label">人件費増加額（月）</div>
        <div class="result-value" id="costIncrease">—</div>
      </div>

      <div class="result-block">
        <div class="result-label">現在の月間人件費</div>
        <div class="result-value sub" id="currentCost">—</div>
      </div>
      <div class="result-block">
        <div class="result-label">改定後の月間人件費</div>
        <div class="result-value sub" id="newCost">—</div>
      </div>

      <hr>

      <div class="result-block">
        <div class="result-label">必要値上げ率</div>
        <div class="result-value highlight" id="priceRaise">—</div>
      </div>
      <div class="result-block">
        <div class="result-label">必要値上げ金額（月売上ベース）</div>
        <div class="result-value" id="priceRaiseAmount">—</div>
      </div>

      <div class="result-block">
        <div class="result-label">売上に対する人件費増加率</div>
        <div class="result-value" id="impactRate">—</div>
      </div>

      <div id="judgment" class="judgment"></div>
    </section>

    <div class="save-row">
      <button id="saveBtn" class="btn-save">入力値を保存</button>
      <button id="clearBtn" class="btn-clear">クリア</button>
    </div>
    <p id="saveMsg" class="save-msg"></p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
