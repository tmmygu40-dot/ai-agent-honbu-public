<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>節電判断アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>節電判断アプリ</h1>
    <p class="subtitle">設備の消費電力と重要度を登録して、節電目標を達成する停止候補を確認できます。</p>

    <!-- 設備登録フォーム -->
    <section class="card">
      <h2>設備を登録する</h2>
      <div class="form-group">
        <label for="device-name">設備名</label>
        <input type="text" id="device-name" placeholder="例：エアコン" maxlength="30">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="device-watt">消費電力（W）</label>
          <input type="number" id="device-watt" placeholder="例：700" min="1" max="99999">
        </div>
        <div class="form-group">
          <label for="device-priority">重要度</label>
          <select id="device-priority">
            <option value="low">低</option>
            <option value="mid">中</option>
            <option value="high">高</option>
          </select>
        </div>
      </div>
      <button id="add-btn" class="btn-primary">追加する</button>
    </section>

    <!-- 節電目標 -->
    <section class="card">
      <h2>節電目標を設定する</h2>
      <div class="form-row">
        <div class="form-group flex1">
          <label for="target-watt">削減目標（W）</label>
          <input type="number" id="target-watt" placeholder="例：500" min="1">
        </div>
        <div class="form-group align-bottom">
          <button id="calc-btn" class="btn-secondary">停止候補を表示</button>
        </div>
      </div>
    </section>

    <!-- 停止候補 -->
    <section class="card" id="result-section" style="display:none;">
      <h2>停止候補</h2>
      <div id="result-summary" class="result-summary"></div>
      <ul id="result-list" class="device-list"></ul>
    </section>

    <!-- 登録済み設備一覧 -->
    <section class="card">
      <h2>登録済み設備一覧</h2>
      <div id="total-info" class="total-info"></div>
      <ul id="device-list" class="device-list">
        <li class="empty-msg" id="empty-msg">設備が登録されていません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
