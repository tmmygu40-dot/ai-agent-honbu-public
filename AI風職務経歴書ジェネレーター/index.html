<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3つのエピソード・職種・業界・強みを選ぶだけで、職務経歴書の自己PR1段落（200〜400字）を即生成。コピーしてそのまま貼れる、転職活動の時短ツールです。">
  <title>AI風職務経歴書ジェネレーター | 自己PRを3秒で量産</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { min-height: 4.5rem; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }
    .result-text {
      font-size: 0.98rem; line-height: 1.85; color: var(--text);
      white-space: pre-wrap;
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.05rem; margin-bottom: 0.8rem;
    }
    .result-meta { font-size: 0.76rem; color: var(--text-sub); text-align: right; margin-bottom: 0.8rem; }
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px; cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .copy-msg { font-size: 0.78rem; color: var(--ok); text-align: center; margin-top: 0.5rem; min-height: 1em; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .btn-copy, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>AI風職務経歴書ジェネレーター</h1>
    <p class="subtitle">3エピソード＋職種・業界・強みで、自己PR1段落を3秒生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="role">職種</label>
      <select id="role">
        <option value="エンジニア">エンジニア</option>
        <option value="営業">営業</option>
        <option value="企画">企画</option>
        <option value="マーケター">マーケター</option>
        <option value="管理職">管理職</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="industry">業界</label>
      <select id="industry">
        <option value="IT">IT</option>
        <option value="製造">製造</option>
        <option value="小売">小売</option>
        <option value="サービス">サービス</option>
        <option value="金融">金融</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="strength">強みキーワード</label>
      <select id="strength">
        <option value="論理的思考">論理的思考</option>
        <option value="実行力">実行力</option>
        <option value="調整力">調整力</option>
        <option value="改善志向">改善志向</option>
        <option value="顧客志向">顧客志向</option>
        <option value="継続力">継続力</option>
      </select>
    </div>
  </div>

  <div class="card">
    <p class="card-title">エピソード（3つ）</p>
    <div class="field">
      <label for="ep1">エピソード1</label>
      <textarea id="ep1" placeholder="例：3名チームで新規Webサービスを企画し、半年で月間1万PVを達成"></textarea>
    </div>
    <div class="field">
      <label for="ep2">エピソード2</label>
      <textarea id="ep2" placeholder="例：既存業務フローを見直し、月20時間の作業を自動化"></textarea>
    </div>
    <div class="field">
      <label for="ep3">エピソード3</label>
      <textarea id="ep3" placeholder="例：顧客ヒアリングから改善案を立案し、解約率を15%削減"></textarea>
      <p class="hint">短文でOK。生成時に文体を整えます。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">自己PRを生成する</button>

  <!-- 結論カード（内容はJSで動的生成） -->
  <div class="result-card" id="result"></div>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'ai_resume_generator_v1';

  function $(id) { return document.getElementById(id); }

  function loadInputs() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.role) $('role').value = d.role;
      if (d.industry) $('industry').value = d.industry;
      if (d.strength) $('strength').value = d.strength;
      if (d.ep1) $('ep1').value = d.ep1;
      if (d.ep2) $('ep2').value = d.ep2;
      if (d.ep3) $('ep3').value = d.ep3;
    } catch(e) {}
  }

  function saveInputs(d) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
  }

  function trim(s) { return (s || '').replace(/\s+/g, ' ').trim(); }
  function endsWithPeriod(s) { return /[。.!?！？]$/.test(s); }
  function asSentence(s) { return endsWithPeriod(s) ? s : s + '。'; }

  function buildText(role, industry, strength, ep1, ep2, ep3) {
    var STRENGTH_DESC = {
      '論理的思考': '物事を構造的に整理し、根拠をもって判断する',
      '実行力':     '決めたことを最後までやり抜き、形にする',
      '調整力':     '関係者の立場を踏まえて合意を形成する',
      '改善志向':   '現状に満足せず、より良いやり方を模索する',
      '顧客志向':   '相手の立場で考え、必要なものを見極める',
      '継続力':     'コツコツと積み重ねて結果につなげる'
    };
    var connectors = ['まず', '次に', 'さらに'];
    var verbs = ['取り組んでまいりました', '推進してまいりました', '実現してまいりました'];

    var eps = [ep1, ep2, ep3].map(trim).filter(function(x){ return x.length > 0; });
    var epLines = eps.map(function(ep, i) {
      var conn = connectors[i] || 'また';
      var verb = verbs[i % verbs.length];
      var body = ep.replace(/[。.!?！？]+$/, '');
      return conn + '、' + body + 'に' + verb + '。';
    });

    var head = '私は' + industry + '業界の' + role + 'として、現場で経験を積んでまいりました。';
    var mid  = epLines.join('');
    var sDesc = STRENGTH_DESC[strength] || strength;
    var bridge = 'これらの経験を通じて、' + sDesc + '「' + strength + '」が私の強みであると実感しています。';
    var tail = '今後も「' + strength + '」を活かし、' + industry + '業界の' + role + 'として貴社に貢献してまいりたいと考えております。';

    return head + mid + bridge + tail;
  }

  function showResult(level, text, meta) {
    var el = document.getElementById('result');
    el.className = 'result-card ' + level;
    el.style.display = 'block';
    el.innerHTML =
      '<p class="result-label">生成された自己PR</p>' +
      '<p class="result-text" id="rt"></p>' +
      '<p class="result-meta" id="rm"></p>' +
      '<button class="btn-copy" onclick="copyText()">📋 クリップボードにコピー</button>' +
      '<p class="copy-msg" id="cm"></p>';
    document.getElementById('rt').textContent = text;
    document.getElementById('rm').textContent = meta;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function generate() {
    var role     = $('role').value;
    var industry = $('industry').value;
    var strength = $('strength').value;
    var ep1 = trim($('ep1').value);
    var ep2 = trim($('ep2').value);
    var ep3 = trim($('ep3').value);

    if (!ep1 && !ep2 && !ep3) {
      showResult('ng', 'エピソードを1つ以上入力してください。', '');
      return;
    }

    var text = buildText(role, industry, strength, ep1, ep2, ep3);
    var len = text.length;
    var level = (len >= 200 && len <= 400) ? 'ok' : 'warn';

    showResult(level, text, '文字数：' + len + '字（自己PR目安：200〜400字）');

    saveInputs({ role: role, industry: industry, strength: strength, ep1: ep1, ep2: ep2, ep3: ep3 });
  }

  function copyText() {
    var text = $('rt').textContent;
    if (!text) return;
    var done = function() {
      $('cm').textContent = '✓ コピーしました';
      setTimeout(function(){ $('cm').textContent = ''; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }

  loadInputs();
  </script>

  <script>
  // ウィジェット動的ロード（ファイル不在時はスキップ）
  (function(){
    ['../fav-widget.js','../related-widget.js'].forEach(function(src){
      var s = document.createElement('script');
      s.src = src;
      document.body.appendChild(s);
    });
  })();
  </script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
