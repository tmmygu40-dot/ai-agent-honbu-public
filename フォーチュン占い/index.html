<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォーチュン占い｜今週の運気を3択で診断</title>
  <meta name="description" content="3択の質問に答えるだけで、今週のポジティブな運気アドバイスが10秒で出てきます。毎週の運気をサッとチェックして、今週の過ごし方を見直すアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問UI ── */
    .question-item { margin-bottom: 1.2rem; }
    .question-item:last-child { margin-bottom: 0; }
    .question-text { font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 0.6rem; }
    .choice-label {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.8rem; border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; transition: border-color 0.15s, background-color 0.15s;
      margin-bottom: 0.5rem;
    }
    .choice-label:last-child { margin-bottom: 0; }
    .choice-label input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .choice-label input[type="radio"]:checked { accent-color: var(--accent); }
    .choice-label input[type="radio"]:checked ~ .choice-text {
      color: var(--accent); font-weight: 700;
    }
    .choice-text { font-size: 0.9rem; color: var(--text); }
    .choice-label:has(input[type="radio"]:checked) {
      border-color: var(--accent); background: var(--accent-light);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎰 フォーチュン占い</h1>
    <p class="subtitle">3択の質問に答えるだけで、今週のポジティブな運気アドバイスが10秒で出てきます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">質問</p>

    <div class="question-item">
      <p class="question-text">Q1. 今週のあなたの気分は？</p>
      <label class="choice-label">
        <input type="radio" name="q1" value="positive">
        <span class="choice-text">やる気に満ちている</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q1" value="neutral">
        <span class="choice-text">普通・平穏</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q1" value="negative">
        <span class="choice-text">疲れた・迷ってる</span>
      </label>
    </div>

    <div class="question-item">
      <p class="question-text">Q2. 今週のやりたいことは？</p>
      <label class="choice-label">
        <input type="radio" name="q2" value="action">
        <span class="choice-text">新しいことに挑戦</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q2" value="maintain">
        <span class="choice-text">今の流れを続ける</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q2" value="rest">
        <span class="choice-text">ゆっくり休みたい</span>
      </label>
    </div>

    <div class="question-item">
      <p class="question-text">Q3. 今週の人間関係は？</p>
      <label class="choice-label">
        <input type="radio" name="q3" value="social">
        <span class="choice-text">仲間と一緒にいたい</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q3" value="solo">
        <span class="choice-text">一人の時間を大切に</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q3" value="focus">
        <span class="choice-text">自分と向き合いたい</span>
      </label>
    </div>
  </div>

  <!-- 占うボタン -->
  <button class="btn-calc" onclick="calc()">✨ 今週の運気を占う</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">今週の運気</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 運気診断ロジック ──
  var FORTUNES = {
    // (ポジティブ × 挑戦 × 社交) = 最高運
    'positive_action_social': {
      emoji: '⭐',
      level: 'ok',
      title: '最幸運',
      msg: 'あなたのやる気が周りに伝わり、新しい出会いや成功がやってくる運気。新しいことに思いきり挑戦して！'
    },
    // (ポジティブ × 挑戦 × 一人) = 成長運
    'positive_action_solo': {
      emoji: '🌟',
      level: 'ok',
      title: '成長運',
      msg: 'あなたの才能が花開く運気。自分のペースで新しい目標に向かってGO。着実な進歩が実になるよ。'
    },
    // (ポジティブ × 挑戦 × 自分) = チャレンジ運
    'positive_action_focus': {
      emoji: '💪',
      level: 'ok',
      title: 'チャレンジ運',
      msg: '自分の強みを確認しながら前に進む運気。自信を持って新しい第一歩を踏み出そう。'
    },
    // (ポジティブ × 継続 × 社交) = 人間関係運
    'positive_maintain_social': {
      emoji: '💝',
      level: 'ok',
      title: '人間関係運',
      msg: '周りとの絆が深まる運気。信頼できる人との時間を大切にすると、思わぬ幸運が訪れるよ。'
    },
    // (ポジティブ × 継続 × 一人) = 安定運
    'positive_maintain_solo': {
      emoji: '🌈',
      level: 'ok',
      title: '安定運',
      msg: 'あなたのペースで進めることで、気づかないうちに夢に近づいてる運気。続けることが勝ちです。'
    },
    // (ポジティブ × 継続 × 自分) = 自己実現運
    'positive_maintain_focus': {
      emoji: '🎯',
      level: 'ok',
      title: '自己実現運',
      msg: '内面が整って、本当の望みが見えてくる運気。焦らず、自分らしく進みましょう。'
    },
    // (ポジティブ × 休息 × 社交) = 癒し運
    'positive_rest_social': {
      emoji: '😊',
      level: 'warn',
      title: '癒し運',
      msg: '好きな人との時間が心を満たす運気。笑顔であふれた時間を大切にしてね。'
    },
    // (ポジティブ × 休息 × 一人) = リフレッシュ運
    'positive_rest_solo': {
      emoji: '🧘',
      level: 'warn',
      title: 'リフレッシュ運',
      msg: 'あなた専用の充電時間。本当に欲しい物や目標が見えてくる、大切な時間になるよ。'
    },
    // (ポジティブ × 休息 × 自分) = 自愛運
    'positive_rest_focus': {
      emoji: '💖',
      level: 'warn',
      title: '自愛運',
      msg: '自分を大事にすることの大切さに気づく運気。自分への優しさが周りへの優しさになります。'
    },
    // (普通 × 挑戦 × 社交) = 協調運
    'neutral_action_social': {
      emoji: '👥',
      level: 'ok',
      title: '協調運',
      msg: 'チームの一員として力を発揮できる運気。仲間を信じて、一緒に目標を目指そう。'
    },
    // (普通 × 挑戦 × 一人) = 工夫運
    'neutral_action_solo': {
      emoji: '🔧',
      level: 'warn',
      title: '工夫運',
      msg: 'あなたのアイデアが形になる運気。試行錯誤の中に新しい発見があるよ。'
    },
    // (普通 × 挑戦 × 自分) = 見直し運
    'neutral_action_focus': {
      emoji: '🔍',
      level: 'warn',
      title: '見直し運',
      msg: 'いい機会だから、今までを振り返ってみる運気。新しい視点が湧いてくるはず。'
    },
    // (普通 × 継続 × 社交) = バランス運
    'neutral_maintain_social': {
      emoji: '⚖️',
      level: 'warn',
      title: 'バランス運',
      msg: '仕事も人間関係も、ちょうどいいバランスで進む運気。今のペースを保ちましょう。'
    },
    // (普通 × 継続 × 一人) = 基礎固め運
    'neutral_maintain_solo': {
      emoji: '🏗️',
      level: 'warn',
      title: '基礎固め運',
      msg: '小さなコツコツの積み重ねが大きな力になる運気。地道な作業を大切にしてね。'
    },
    // (普通 × 継続 × 自分) = 内省運
    'neutral_maintain_focus': {
      emoji: '🌙',
      level: 'warn',
      title: '内省運',
      msg: '自分の中の本当の気持ちと向き合う時間。大事な決断への準備の時です。'
    },
    // (普通 × 休息 × 社交) = 調整運
    'neutral_rest_social': {
      emoji: '🕐',
      level: 'warn',
      title: '調整運',
      msg: 'ペースを整える週。友人とのんびり過ごすのが開運のコツです。'
    },
    // (普通 × 休息 × 一人) = 整理運
    'neutral_rest_solo': {
      emoji: '📚',
      level: 'warn',
      title: '整理運',
      msg: '心と体をリセットする時間。部屋の片付けや気分転換で、次への準備ができるよ。'
    },
    // (普通 × 休息 × 自分) = 瞑想運
    'neutral_rest_focus': {
      emoji: '🪷',
      level: 'warn',
      title: '瞑想運',
      msg: '深い思考の中に答えが見つかる運気。ゆっくり考える時間を大切にしてね。'
    },
    // (疲れた × 挑戦 × 社交) = 励まし運
    'negative_action_social': {
      emoji: '🤝',
      level: 'warn',
      title: '励まし運',
      msg: '誰かの応援が力になる週。頼りになる人に話してみてください。応援が力に変わります。'
    },
    // (疲れた × 挑戦 × 一人) = 根気運
    'negative_action_solo': {
      emoji: '💪',
      level: 'warn',
      title: '根気運',
      msg: '今がしんどくても、続けることで明日が変わる運気。一歩ずつ進みましょう。'
    },
    // (疲れた × 挑戦 × 自分) = 模索運
    'negative_action_focus': {
      emoji: '🧭',
      level: 'ng',
      title: '模索運',
      msg: '何かが違うと感じるなら、今こそ立ち止まって考える時。新しい道が見えてくるよ。'
    },
    // (疲れた × 継続 × 社交) = 甘え運
    'negative_maintain_social': {
      emoji: '🤗',
      level: 'ng',
      title: '甘え運',
      msg: '無理をしすぎてません。人に頼ることも大事。心強い存在を頼ってみて。'
    },
    // (疲れた × 継続 × 一人) = 充電運
    'negative_maintain_solo': {
      emoji: '🔋',
      level: 'ng',
      title: '充電運',
      msg: 'あなたのバッテリーが少なくなってるサイン。思いきって休むことが正解です。'
    },
    // (疲れた × 継続 × 自分) = 自己ケア運
    'negative_maintain_focus': {
      emoji: '💝',
      level: 'ng',
      title: '自己ケア運',
      msg: '自分を労わる時間が必要です。好きなことをして、心身をリセットしましょう。'
    },
    // (疲れた × 休息 × 社交) = 回復運
    'negative_rest_social': {
      emoji: '😌',
      level: 'ng',
      title: '回復運',
      msg: '好きな人とのんびり過ごしてください。笑顔が戻ってくる時間になるよ。'
    },
    // (疲れた × 休息 × 一人) = 再起動運
    'negative_rest_solo': {
      emoji: '🔄',
      level: 'ng',
      title: '再起動運',
      msg: 'リセットの時間。思いきり休んでください。新しい気力が湧いてくるよ。'
    },
    // (疲れた × 休息 × 自分) = 再生運
    'negative_rest_focus': {
      emoji: '🌱',
      level: 'ng',
      title: '再生運',
      msg: '苦しい時間も必要です。そこから生まれる強さを信じてください。'
    }
  };

  function calc() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
      showErr('すべて答えてから占ってください');
      return;
    }

    var key = q1.value + '_' + q2.value + '_' + q3.value;
    var fortune = FORTUNES[key] || FORTUNES['neutral_maintain_solo'];

    // localStorage保存
    var history = JSON.parse(localStorage.getItem('fortune_history') || '[]');
    var today = new Date().toISOString().split('T')[0];
    history.unshift({ date: today, key: key, fortune: fortune });
    if (history.length > 30) history.pop();
    localStorage.setItem('fortune_history', JSON.stringify(history));

    showResult(fortune);
  }

  function showResult(fortune) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + fortune.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fortune.emoji + ' ' + fortune.title;
    document.getElementById('re').textContent = fortune.msg;
    document.getElementById('rn').textContent = '※毎週占い直すと、あなたの運気が見えてきます。';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
