<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売れ筋メニュー管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>売れ筋メニュー管理</h1>
  </header>

  <main>
    <!-- タブナビゲーション -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="menu">メニュー管理</button>
      <button class="tab-btn" data-tab="input">注文数入力</button>
      <button class="tab-btn" data-tab="ranking">ランキング</button>
    </nav>

    <!-- メニュー管理タブ -->
    <section class="tab-content active" id="tab-menu">
      <h2>メニュー登録</h2>
      <div class="form-row">
        <input type="text" id="menu-name-input" placeholder="メニュー名を入力" maxlength="50">
        <button id="add-menu-btn" class="btn-primary">追加</button>
      </div>
      <ul id="menu-list" class="item-list"></ul>
    </section>

    <!-- 注文数入力タブ -->
    <section class="tab-content" id="tab-input">
      <h2>日次注文数入力</h2>
      <div class="form-row">
        <label for="date-input">日付：</label>
        <input type="date" id="date-input">
        <button id="load-date-btn" class="btn-primary">読み込む</button>
      </div>
      <div id="order-form" class="order-form"></div>
      <div class="form-row" id="save-row" style="display:none;">
        <button id="save-orders-btn" class="btn-primary btn-full">保存</button>
      </div>
    </section>

    <!-- ランキングタブ -->
    <section class="tab-content" id="tab-ranking">
      <h2>売れ筋ランキング</h2>
      <div class="filter-row">
        <label>集計期間：</label>
        <input type="date" id="from-date">
        <span>〜</span>
        <input type="date" id="to-date">
        <button id="filter-btn" class="btn-primary">集計</button>
      </div>
      <div class="ranking-container">
        <div class="ranking-section">
          <h3>🏆 売れ筋トップ</h3>
          <ol id="top-ranking" class="ranking-list"></ol>
        </div>
        <div class="ranking-section">
          <h3>⚠️ 不動品ワースト</h3>
          <ol id="bottom-ranking" class="ranking-list"></ol>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
