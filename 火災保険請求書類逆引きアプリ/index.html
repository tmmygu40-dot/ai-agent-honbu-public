<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="被害種別（火災・風災・水災・雪災・落雷・盗難）を選ぶだけで、火災保険の請求に必要な書類と撮影すべき写真をチェックリスト形式で即確認できる逆引きアプリです。">
  <title>火災保険請求書類逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── カテゴリ見出し ── */
    .cat-title {
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
      margin: 0.8rem 0 0.3rem; padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }
    .cat-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }

    /* ── 進捗バー ── */
    .progress-wrap { margin-bottom: 1rem; }
    .progress-bar-bg {
      width: 100%; height: 10px; background: var(--border);
      border-radius: 5px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--ok); border-radius: 5px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.3rem; text-align: right; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>火災保険請求書類逆引きアプリ</h1>
    <p class="subtitle">被害種別を選ぶだけで必要な書類と写真がすぐわかる</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">被害種別を選択</p>
    <div class="field">
      <label for="damageType">被害の種類</label>
      <select id="damageType">
        <option value="">-- 選んでください --</option>
        <option value="fire">火災（火事・もらい火）</option>
        <option value="wind">風災（台風・突風・竜巻）</option>
        <option value="water">水災（洪水・床上浸水・土砂崩れ）</option>
        <option value="snow">雪災（積雪・雪崩・雹）</option>
        <option value="lightning">落雷（落雷による損害）</option>
        <option value="theft">盗難（侵入盗・窃盗）</option>
      </select>
      <p class="hint">該当する被害を1つ選んでください</p>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-calc" onclick="lookup()">必要書類を調べる</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">必要書類数</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- チェックリストカード -->
  <div class="card" id="checklist-card" style="display:none">
    <p class="card-title">必要書類・写真チェックリスト</p>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
      <p class="progress-text" id="ptext">0 / 0 完了</p>
    </div>
    <div id="checklist"></div>
  </div>

  <!-- 補足カード -->
  <div class="card" id="tips-card" style="display:none">
    <p class="card-title">請求時のポイント</p>
    <div id="tips"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、金融庁・一般社団法人日本損害保険協会の公開情報を参考に、一般的な火災保険請求の目安として整理しています。実際の必要書類は保険会社・契約内容により異なります。最新情報はご加入の保険会社にご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

          '侵入口の写真（窓の破損・ドアのこじ開け跡）',
          '室内の荒らされた状態の写真',
          '壊された鍵・錠前の写真',
          '建物の全景写真（侵入経路がわかるもの）',
          '盗難に遭った場所の写真'
        ],
        'あると有利な書類': [
          '盗難品の購入レシート・保証書',
          '盗難品の写真（購入時・使用時）',
          '鍵の交換・修理の見積書',
          '防犯カメラの映像（ある場合）',
          '警察の捜査状況の確認メモ'
        ]
      },
      tips: [
        '被害に気づいたらすぐに110番通報し、盗難届を出しましょう',
        '室内の状態は警察の現場確認が終わるまで片付けないでください',
        '盗難届出証明書は受理番号を控えておくと、保険会社への連絡がスムーズです',
        '現金の盗難は補償上限額がある場合が多いです（一般的に20〜30万円程度）'
      ]
    }
  };

  var currentType = '';

  function lookup() {
    var sel = document.getElementById('damageType').value;
    if (!sel) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ng'; rc.style.display = 'block';
      document.getElementById('rv').textContent = '⚠️';
      document.getElementById('rn').textContent = '被害種別を選んでください';
      document.getElementById('checklist-card').style.display = 'none';
      document.getElementById('tips-card').style.display = 'none';
      return;
    }

    currentType = sel;
    var d = DATA[sel];
    var totalCount = 0;
    Object.keys(d.docs).forEach(function(cat) { totalCount += d.docs[cat].length; });

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card warn'; rc.style.display = 'block';
    document.getElementById('rv').textContent = totalCount + ' 項目';
    document.getElementById('rn').textContent = d.label + ' の請求に必要な書類・写真の一覧です';

    // チェックリスト生成
    var cl = document.getElementById('checklist');
    cl.innerHTML = '';
    var saved = loadChecks(sel);
    var idx = 0;

    Object.keys(d.docs).forEach(function(cat) {
      var catEl = document.createElement('p');
      catEl.className = 'cat-title';
      catEl.textContent = cat;
      cl.appendChild(catEl);

      d.docs[cat].forEach(function(item) {
        var lbl = document.createElement('label');
        lbl.className = 'check-item';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.dataset.idx = idx;
        if (saved[idx]) cb.checked = true;
        cb.addEventListener('change', onCheck);
        var sp = document.createElement('span');
        sp.className = 'check-text';
        sp.textContent = item;
        lbl.appendChild(cb);
        lbl.appendChild(sp);
        cl.appendChild(lbl);
        idx++;
      });
    });

    document.getElementById('checklist-card').style.display = 'block';
    updateProgress();

    // 補足Tips
    var tipsEl = document.getElementById('tips');
    tipsEl.innerHTML = d.tips.map(function(t) {
      return '<p style="font-size:0.88rem;color:var(--text-sub);line-height:1.6;margin-bottom:0.6rem;padding-left:1.2em;text-indent:-1.2em;">💡 ' + t + '</p>';
    }).join('');
    document.getElementById('tips-card').style.display = 'block';
  }

  function onCheck() {
    saveChecks();
    updateProgress();
  }

  function updateProgress() {
    var cbs = document.querySelectorAll('#checklist input[type="checkbox"]');
    var total = cbs.length;
    var done = 0;
    cbs.forEach(function(cb) { if (cb.checked) done++; });
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('pbar').style.width = pct + '%';
    document.getElementById('ptext').textContent = done + ' / ' + total + ' 完了';

    // 結論カード更新
    var rc = document.getElementById('result');
    if (done === total && total > 0) {
      rc.className = 'result-card ok';
      document.getElementById('rv').textContent = '全て準備OK!';
      document.getElementById('rn').textContent = done + '/' + total + ' 項目すべてチェック済みです';
    } else {
      rc.className = 'result-card warn';
      document.getElementById('rv').textContent = (total - done) + ' 項目が未準備';
      document.getElementById('rn').textContent = done + '/' + total + ' 項目チェック済み';
    }
  }

  /* ── localStorage ── */
  function storageKey(type) { return 'fire_ins_docs_' + type; }

  function saveChecks() {
    if (!currentType) return;
    var cbs = document.querySelectorAll('#checklist input[type="checkbox"]');
    var state = {};
    cbs.forEach(function(cb) { state[cb.dataset.idx] = cb.checked; });
    try { localStorage.setItem(storageKey(currentType), JSON.stringify(state)); } catch(e) {}
  }

  function loadChecks(type) {
    try {
      var s = localStorage.getItem(storageKey(type));
      return s ? JSON.parse(s) : {};
    } catch(e) { return {}; }
  }
  </script>
