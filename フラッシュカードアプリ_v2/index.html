<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フラッシュカードアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>フラッシュカード</h1>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="practice">練習</button>
      <button class="tab-btn" data-tab="manage">カード管理</button>
    </nav>

    <!-- 練習タブ -->
    <section id="tab-practice" class="tab-content active">
      <div id="no-cards-msg" class="empty-msg">
        <p>カードがありません。<br>「カード管理」でカードを追加してください。</p>
      </div>

      <div id="practice-area" class="practice-area hidden">
        <div class="stats-bar">
          <span id="progress-text">0 / 0</span>
          <span id="accuracy-text">正解率: 0%</span>
        </div>

        <div class="card-wrapper">
          <div class="card" id="flashcard">
            <div class="card-inner">
              <div class="card-front">
                <div class="card-label">表（問題）</div>
                <div class="card-text" id="card-front-text"></div>
              </div>
              <div class="card-back">
                <div class="card-label">裏（答え）</div>
                <div class="card-text" id="card-back-text"></div>
              </div>
            </div>
          </div>
          <p class="flip-hint">タップ / クリックでめくる</p>
        </div>

        <div class="judge-buttons" id="judge-buttons">
          <button class="btn btn-wrong" id="btn-wrong">✗ 不正解</button>
          <button class="btn btn-correct" id="btn-correct">○ 正解</button>
        </div>

        <div class="practice-controls">
          <button class="btn btn-secondary" id="btn-restart">最初からやり直す</button>
          <button class="btn btn-secondary" id="btn-shuffle">シャッフル</button>
        </div>

        <div id="finish-area" class="finish-area hidden">
          <h2>完了！</h2>
          <p id="finish-stats"></p>
          <button class="btn btn-primary" id="btn-retry-wrong">不正解のみ再挑戦</button>
          <button class="btn btn-secondary" id="btn-retry-all">全て最初から</button>
        </div>
      </div>
    </section>

    <!-- カード管理タブ -->
    <section id="tab-manage" class="tab-content">
      <div class="add-card-form">
        <h2>カードを追加</h2>
        <div class="form-group">
          <label for="input-front">表（単語・問題）</label>
          <textarea id="input-front" placeholder="例：apple" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="input-back">裏（意味・答え）</label>
          <textarea id="input-back" placeholder="例：りんご" rows="2"></textarea>
        </div>
        <button class="btn btn-primary" id="btn-add-card">追加する</button>
      </div>

      <div class="card-list-section">
        <div class="card-list-header">
          <h2>カード一覧 <span id="card-count">（0枚）</span></h2>
          <button class="btn btn-danger-sm" id="btn-clear-all">全削除</button>
        </div>
        <ul id="card-list" class="card-list"></ul>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
