<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="10問の選択式質問に答えるだけで、あなたのお金の使い方タイプとムダ遣いパターンを診断。改善アドバイス付きで家計の見直しに役立つ無料ツールです。">
  <title>家計タイプ診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 診断専用 ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem; height: 8px;
      background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s ease;
    }
    .q-number {
      font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.6rem;
    }
    .q-text {
      font-size: 1rem; font-weight: 700; line-height: 1.5; margin-bottom: 1rem;
    }
    .choices { list-style: none; }
    .choices li {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.6rem;
      font-size: 0.92rem; cursor: pointer; transition: all 0.15s;
      line-height: 1.4;
    }
    .choices li:hover { border-color: var(--accent); background: var(--accent-light); }
    .choices li:active { transform: scale(0.98); }

    .type-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .type-name { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.3rem; color: var(--accent); }
    .type-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 1rem; }

    .advice-card {
      background: var(--accent-light); border: 1.5px solid var(--accent);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      margin-top: 1rem; text-align: left;
    }
    .advice-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
    .advice-list { list-style: none; }
    .advice-list li { font-size: 0.88rem; color: var(--text); line-height: 1.6; padding: 0.3rem 0; }
    .advice-list li::before { content: '✅ '; }

    .waste-card {
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      margin-top: 1rem; text-align: left;
    }
    .waste-title { font-size: 0.82rem; font-weight: 700; color: var(--ng); margin-bottom: 0.5rem; }
    .waste-list { list-style: none; }
    .waste-list li { font-size: 0.88rem; color: var(--text); line-height: 1.6; padding: 0.3rem 0; }
    .waste-list li::before { content: '⚠️ '; }

    .score-bar-wrap {
      max-width: 600px; margin: 0 auto 1rem;
    }
    .score-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .score-label { font-size: 0.78rem; color: var(--text-sub); width: 90px; flex-shrink: 0; text-align: right; }
    .score-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease; }
    .score-val { font-size: 0.78rem; color: var(--text); font-weight: 600; width: 30px; }

    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 1rem auto; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-retry:hover { background: var(--accent); color: #fff; }

    .history-item {
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.6;
      padding: 0.4rem 0; border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>💰 家計タイプ診断アプリ</h1>
    <p class="subtitle">10問答えるだけで、あなたのお金グセとムダ遣いパターンがサクッとわかります。</p>
  </header>

  <!-- 進捗バー -->
  <div class="progress-bar" id="progress-wrap">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <!-- 質問カード -->
  <div class="card" id="q-card">
    <p class="q-number" id="q-num"></p>
    <p class="q-text" id="q-text"></p>
    <ul class="choices" id="choices"></ul>
  </div>

  <!-- スタートボタン（初回表示用） -->
  <button class="btn-calc" id="btn-start" onclick="startDiagnosis()">診断スタート！</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの家計タイプ</p>
    <p class="type-emoji" id="r-emoji"></p>
    <p class="type-name" id="r-name"></p>
    <p class="type-desc" id="r-desc"></p>

    <div class="waste-card">
      <p class="waste-title">ムダ遣いパターン</p>
      <ul class="waste-list" id="r-waste"></ul>
    </div>

    <div class="advice-card">
      <p class="advice-title">改善アドバイス</p>
      <ul class="advice-list" id="r-advice"></ul>
    </div>
  </div>

  <!-- スコア内訳 -->
  <div class="card" id="score-card" style="display:none">
    <p class="card-title">タイプ別スコア</p>
    <div class="score-bar-wrap" id="score-bars"></div>
  </div>

  <!-- 過去の診断履歴 -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">過去の診断履歴</p>
    <div id="history-list"></div>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-retry no-print" id="btn-retry" style="display:none" onclick="resetDiagnosis()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、家計管理の一般的な知見をもとに、お金の使い方の傾向を簡易的に診断するものです。あくまで目安としてご活用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 診断質問データ ──
  var QUESTIONS = [
    {
      q: 'コンビニに寄ったとき、つい買ってしまうのは？',
      choices: [
        { text: '必要なものだけ買って出る', scores: [2,0,0,0,0] },
        { text: '新商品が気になってカゴに入れがち', scores: [0,2,0,1,0] },
        { text: '特に考えず目についたものを買う', scores: [0,0,0,0,2] }
      ]
    },
    {
      q: '給料日後の行動パターンは？',
      choices: [
        { text: 'まず貯蓄分を確保してから使う', scores: [2,0,0,0,0] },
        { text: '頑張ったご褒美にちょっと贅沢する', scores: [0,0,0,2,0] },
        { text: '特に意識せず普段通り過ごす', scores: [0,0,0,0,2] }
      ]
    },
    {
      q: '友人との食事の会計時、あなたは？',
      choices: [
        { text: 'きっちり割り勘にする', scores: [2,0,0,0,0] },
        { text: '「ここは自分が」とおごりがち', scores: [0,0,2,0,0] },
        { text: 'あまり気にせず流れに任せる', scores: [0,0,0,0,2] }
      ]
    },
    {
      q: 'セール・タイムセールを見たときの反応は？',
      choices: [
        { text: '本当に必要か考えてからスルーすることが多い', scores: [2,0,0,0,0] },
        { text: '「今だけ」に弱くてつい買ってしまう', scores: [0,2,0,0,0] },
        { text: 'お得感より見た目やブランドで選ぶ', scores: [0,0,2,0,0] }
      ]
    },
    {
      q: '毎月の支出、どれくらい把握してる？',
      choices: [
        { text: '家計簿やアプリでほぼ正確に把握', scores: [2,0,0,0,0] },
        { text: 'だいたいは把握しているが細かくは見ない', scores: [0,0,0,1,1] },
        { text: '正直よくわからない', scores: [0,0,0,0,2] }
      ]
    },
    {
      q: 'ストレスが溜まったときの発散方法は？',
      choices: [
        { text: '散歩や運動などお金をかけない方法', scores: [2,0,0,0,0] },
        { text: 'ネットショッピングでポチポチ買う', scores: [0,2,0,1,0] },
        { text: '高めのレストランやカフェで贅沢する', scores: [0,0,0,2,0] }
      ]
    },
    {
      q: 'スマホやガジェットの買い替えタイミングは？',
      choices: [
        { text: '壊れるか不便になるまで使い続ける', scores: [2,0,0,0,0] },
        { text: '新製品が出たらすぐ欲しくなる', scores: [0,2,0,0,0] },
        { text: '周りが持ってると自分も欲しくなる', scores: [0,0,2,0,0] }
      ]
    },
    {
      q: '「自分へのご褒美」の頻度は？',
      choices: [
        { text: 'ほとんど買わない・必要なものだけ', scores: [2,0,0,0,0] },
        { text: '月に2〜3回はご褒美を買っている', scores: [0,0,0,2,0] },
        { text: '気づいたら毎週何か買っている', scores: [0,1,0,2,0] }
      ]
    },
    {
      q: 'サブスク（定額サービス）の管理状況は？',
      choices: [
        { text: '使っていないものは即解約する', scores: [2,0,0,0,0] },
        { text: '入ったまま放置しているものがある', scores: [0,0,0,0,2] },
        { text: '話題のサービスはとりあえず入る', scores: [0,1,1,0,1] }
      ]
    },
    {
      q: '貯金の目標は？',
      choices: [
        { text: '具体的な金額と期限を決めている', scores: [2,0,0,0,0] },
        { text: '漠然と「貯めたい」とは思っている', scores: [0,0,0,1,1] },
        { text: '特に考えたことがない', scores: [0,0,0,0,2] }
      ]
    }
  ];

  // scores index: [堅実倹約, 衝動買い, 見栄っ張り, ご褒美散財, 無頓着]
  var TYPE_NAMES = ['堅実倹約', '衝動買い', '見栄っ張り', 'ご褒美散財', '無頓着'];
  var TYPE_COLORS = ['#15803d', '#b45309', '#9333ea', '#e07b00', '#6b7280'];

  var TYPES = {
    0: {
      emoji: '🏦', name: '堅実倹約タイプ',
      desc: 'お金の管理がしっかりしていて、計画的にやりくりできるタイプです。ただし節約を意識しすぎると、必要な投資や楽しみまで削ってしまうことも。',
      waste: ['安いからと必要ないものをまとめ買い', '節約疲れからの反動で大きな出費', '「もったいない」で古いものを使い続け効率ダウン'],
      advice: ['月に1回は「楽しみ予算」を確保しよう', '安さだけでなく満足度でも判断する癖をつける', '自己投資（学び・健康）はケチらないルールを作る']
    },
    1: {
      emoji: '🛒', name: '衝動買いタイプ',
      desc: '「今だけ」「限定」に弱く、その場のテンションで買い物しがちなタイプ。買った瞬間は満足するけど、後から「いらなかったかも」と思うことが多いかも。',
      waste: ['セール・タイムセールでの不要品購入', 'ネットショッピングの深夜ポチリ', '「限定」「残りわずか」に反応しての即決買い'],
      advice: ['欲しいものは24時間カートに入れたまま寝かせる', '月の「衝動買い予算」を先に決めておく', '買い物前に「これ3回以上使う？」と自問する']
    },
    2: {
      emoji: '👑', name: '見栄っ張りタイプ',
      desc: '人からの評価や見た目を気にして、つい背伸びした出費をしがちなタイプ。おごりや高級品で周囲の目を気にするあまり、家計が圧迫されることも。',
      waste: ['必要以上のブランド品・高級品の購入', '付き合いでの過度なおごりや出費', 'SNS映えを意識した消費'],
      advice: ['「誰のためのお金？」と自分に問いかける', '見栄の出費とリアルな満足度を記録して比較する', '本当に大切な人間関係は金額では測れないと意識する']
    },
    3: {
      emoji: '🎁', name: 'ご褒美散財タイプ',
      desc: '頑張った自分へのご褒美が多めなタイプ。仕事や家事の疲れをモノや体験で癒そうとする傾向があり、気づけば「ご褒美」が日常化していることも。',
      waste: ['「頑張ったから」が口癖の贅沢消費', 'ストレス発散のための買い物依存', 'ご褒美の頻度が週1以上になっている'],
      advice: ['ご褒美は月2回までとルールを決める', 'お金をかけないストレス発散法を3つ見つける', '「ご褒美リスト」を作って計画的に楽しむ']
    },
    4: {
      emoji: '😶', name: '無頓着タイプ',
      desc: 'お金の流れに無関心で、いくら使ったか把握していないタイプ。悪気はないけど、気づいたら残高が減っている…というパターンに陥りやすい。',
      waste: ['使っていないサブスクの放置', '何に使ったかわからない使途不明金', 'ATM手数料やコンビニ割高価格の積み重ね'],
      advice: ['まず1週間だけ全支出をメモしてみる', '固定費（サブスク・保険・通信）を棚卸しする', '口座残高を週1回チェックする習慣をつける']
    }
  };

  var currentQ = 0;
  var answers = [];
  var scores = [0, 0, 0, 0, 0];

  function startDiagnosis() {
    currentQ = 0;
    answers = [];
    scores = [0, 0, 0, 0, 0];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('score-card').style.display = 'none';
    document.getElementById('history-card').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    document.getElementById('q-card').style.display = 'block';
    document.getElementById('progress-wrap').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[currentQ];
    var pct = (currentQ / QUESTIONS.length * 100).toFixed(0);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('q-num').textContent = 'Q' + (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.q;

    var ul = document.getElementById('choices');
    ul.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var li = document.createElement('li');
      li.textContent = c.text;
      li.onclick = function() { selectAnswer(i); };
      ul.appendChild(li);
    });
  }

  function selectAnswer(idx) {
    var q = QUESTIONS[currentQ];
    var s = q.choices[idx].scores;
    for (var i = 0; i < 5; i++) scores[i] += s[i];
    answers.push(idx);
    currentQ++;

    if (currentQ >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('progress').style.width = '100%';
    document.getElementById('q-card').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';

    // 最大スコアのタイプを判定
    var maxIdx = 0;
    for (var i = 1; i < 5; i++) {
      if (scores[i] > scores[maxIdx]) maxIdx = i;
    }

    var t = TYPES[maxIdx];
    var rc = document.getElementById('result');
    rc.className = 'result-card warn';
    rc.style.display = 'block';

    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent = t.name;
    document.getElementById('r-desc').textContent = t.desc;

    document.getElementById('r-waste').innerHTML = t.waste.map(function(w) {
      return '<li>' + w + '</li>';
    }).join('');

    document.getElementById('r-advice').innerHTML = t.advice.map(function(a) {
      return '<li>' + a + '</li>';
    }).join('');

    // スコアバー表示
    var maxScore = Math.max.apply(null, scores);
    if (maxScore === 0) maxScore = 1;
    var barsHtml = '';
    for (var i = 0; i < 5; i++) {
      var pct = (scores[i] / maxScore * 100).toFixed(0);
      barsHtml += '<div class="score-row">'
        + '<span class="score-label">' + TYPE_NAMES[i] + '</span>'
        + '<div class="score-track"><div class="score-fill" style="width:' + pct + '%;background:' + TYPE_COLORS[i] + '"></div></div>'
        + '<span class="score-val">' + scores[i] + '</span>'
        + '</div>';
    }
    document.getElementById('score-bars').innerHTML = barsHtml;
    document.getElementById('score-card').style.display = 'block';

    document.getElementById('btn-retry').style.display = 'block';

    // localStorage に保存
    saveHistory(t.name);
    showHistory();
  }

  function saveHistory(typeName) {
    var history = JSON.parse(localStorage.getItem('kakeTypeDiag') || '[]');
    history.unshift({
      date: new Date().toLocaleDateString('ja-JP'),
      type: typeName,
      scores: scores.slice()
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('kakeTypeDiag', JSON.stringify(history));
  }

  function showHistory() {
    var history = JSON.parse(localStorage.getItem('kakeTypeDiag') || '[]');
    if (history.length === 0) return;

    var html = '';
    history.forEach(function(h) {
      html += '<div class="history-item">' + h.date + '：' + h.type + '</div>';
    });
    document.getElementById('history-list').innerHTML = html;
    document.getElementById('history-card').style.display = 'block';
  }

  function resetDiagnosis() {
    startDiagnosis();
  }

  // 初期表示
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  </script>
