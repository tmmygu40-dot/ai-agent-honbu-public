<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスク管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>サブスク管理</h1>
      <div class="total-box">
        <span class="total-label">月額合計</span>
        <span class="total-amount" id="totalAmount">¥0</span>
      </div>
    </header>

    <section class="form-section">
      <h2>サブスクを追加</h2>
      <div class="form-group">
        <label for="subName">サービス名</label>
        <input type="text" id="subName" placeholder="例：Netflix" maxlength="40">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="subAmount">月額（円）</label>
          <input type="number" id="subAmount" placeholder="990" min="0" max="9999999">
        </div>
        <div class="form-group">
          <label for="subRenewal">更新日（毎月）</label>
          <input type="number" id="subRenewal" placeholder="1〜31" min="1" max="31">
        </div>
      </div>
      <button class="btn-add" id="addBtn">追加する</button>
    </section>

    <section class="list-section">
      <h2>登録済みサブスク <span class="count" id="subCount">0件</span></h2>
      <div id="subList" class="sub-list">
        <p class="empty-msg">まだ登録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
