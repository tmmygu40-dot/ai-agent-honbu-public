<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="職場の配置変更・昇進・転勤リスクを5問の診断で即判定。2026年4月新人事異動に備える。あなたの人事異動リスクをランク診断し、対策アドバイスを表示します。">
  <title>🔄 2026年4月人事異動リスク診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問 ── */
    .question-item { margin-bottom: 1.2rem; }
    .question-item:last-child { margin-bottom: 0; }
    .q-label { display: block; font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 0.6rem; }
    .q-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .radio-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.6rem; border-radius: 8px;
      cursor: pointer; user-select: none;
      transition: background-color 0.15s;
    }
    .radio-item:hover { background-color: var(--accent-light); }
    .radio-item input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .radio-label { font-size: 0.88rem; color: var(--text); line-height: 1.3; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-again {
      display: block; width: 100%; max-width: 600px;
      margin: 1.2rem auto 0; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius);
      cursor: pointer; transition: background-color 0.15s, color 0.15s;
    }
    .btn-again:active { background-color: var(--accent-light); }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.9rem; color: var(--text); line-height: 1.6; margin-top: 0.8rem; }

    /* ── アドバイスカード ── */
    .advice-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .advice-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 0.8rem; }
    .advice-text { font-size: 0.92rem; color: var(--text); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-again, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔄 2026年4月人事異動リスク診断</h1>
    <p class="subtitle">職場の変化に備える。5問に答えるだけで、あなたの人事異動リスクを即診断。新年度への対策をお手伝いします。※2026年4月時点の参考データ</p>
  </header>

  <!-- 診断質問カード -->
  <div class="card" id="questionCard">
    <p class="card-title">診断質問</p>

    <div class="question-item">
      <label class="q-label">Q1. 直属上司との関係は良好ですか？</label>
      <div class="q-options">
        <label class="radio-item">
          <input type="radio" name="q1" value="0"> <span class="radio-label">非常に良好である</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q1" value="1"> <span class="radio-label">まあ良好である</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q1" value="2"> <span class="radio-label">どちらともいえない</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q1" value="3"> <span class="radio-label">やや悪い</span>
        </label>
      </div>
    </div>

    <div class="question-item">
      <label class="q-label">Q2. 現在の部署での成果・実績は高いですか？</label>
      <div class="q-options">
        <label class="radio-item">
          <input type="radio" name="q2" value="0"> <span class="radio-label">非常に高い</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q2" value="1"> <span class="radio-label">まあ高い</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q2" value="2"> <span class="radio-label">どちらともいえない</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q2" value="3"> <span class="radio-label">低い</span>
        </label>
      </div>
    </div>

    <div class="question-item">
      <label class="q-label">Q3. 転勤・配置変更の可能性について上司から聞いたことはありますか？</label>
      <div class="q-options">
        <label class="radio-item">
          <input type="radio" name="q3" value="0"> <span class="radio-label">はい、近いうちにあると聞いた</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q3" value="1"> <span class="radio-label">可能性について話題になった</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q3" value="2"> <span class="radio-label">一度も聞いていない</span>
        </label>
      </div>
    </div>

    <div class="question-item">
      <label class="q-label">Q4. 最近の人事評価は高い方でしたか？</label>
      <div class="q-options">
        <label class="radio-item">
          <input type="radio" name="q4" value="0"> <span class="radio-label">A評価（最高）</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q4" value="1"> <span class="radio-label">B評価（標準）</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q4" value="2"> <span class="radio-label">C評価（要改善）</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q4" value="3"> <span class="radio-label">評価をもらっていない</span>
        </label>
      </div>
    </div>

    <div class="question-item">
      <label class="q-label">Q5. 今年度の転職を考えていますか？</label>
      <div class="q-options">
        <label class="radio-item">
          <input type="radio" name="q5" value="0"> <span class="radio-label">いいえ、考えていない</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q5" value="1"> <span class="radio-label">漠然と考えている</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="q5" value="2"> <span class="radio-label">真剣に検討中</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="emoji"></p>
    <p class="result-label">判定結果</p>
    <p class="result-value" id="resultRank">—</p>
    <p class="result-note" id="resultNote"></p>
  </div>

  <!-- アドバイスカード -->
  <div class="advice-card" id="advice">
    <p class="advice-title">📋 あなたへの対策アドバイス</p>
    <p class="advice-text" id="adviceText"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・日本経団連・企業人事慣行などの参考資料をもとに、人事異動のリスク要因を4段階で判定しています。実際の異動は企業戦略により変動します。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <button class="btn-again" id="againBtn" style="display:none" onclick="reset()">もう一度診断する</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 判定ロジック
  function diagnose() {
    // 各質問の回答を取得
    var q1 = getRadioValue('q1');
    var q2 = getRadioValue('q2');
    var q3 = getRadioValue('q3');
    var q4 = getRadioValue('q4');
    var q5 = getRadioValue('q5');

    if (q1 === null || q2 === null || q3 === null || q4 === null || q5 === null) {
      alert('すべての質問に答えてください');
      return;
    }

    // スコア計算
    var score = parseInt(q1) + parseInt(q2) + parseInt(q3) + parseInt(q4) + parseInt(q5);

    // リスク判定
    var result;
    if (score <= 4) {
      result = { rank: '低リスク', emoji: '😌', label: 'LOW', className: 'ok', advice: 'あなたの人事異動リスクは低い状況です。現在の関係が良好で、成果も出ているため、急な異動の可能性は低いと考えられます。ただし、4月は人事異動の時期。念のため転職サイトの情報チェックや、スキル整理をしておくことをお勧めします。' };
    } else if (score <= 8) {
      result = { rank: '中リスク', emoji: '🤔', label: 'MEDIUM', className: 'warn', advice: 'あなたの人事異動リスクは中程度です。配置変更や転勤の可能性が少し高まっている状況かもしれません。今のうちに以下の準備をしておくと安心です：①自分のスキル・経歴をまとめておく、②次のキャリアオプションを整理する、③家族や関係者と相談する。' };
    } else {
      result = { rank: '高リスク', emoji: '😱', label: 'HIGH', className: 'ng', advice: '人事異動のリスクが高い状況が想定されます。評価や関係性、異動の噂などから、配置変更や転勤の可能性が考えられます。早めに準備を進めましょう：①上司に意思や希望を伝える、②他部署の人間関係を広げておく、③最悪の場合の転職活動準備、④引越しや生活変更の計画。焦らず、計画的に対応しましょう。' };
    }

    // 結果表示
    showResult(result, score);
    document.getElementById('questionCard').style.display = 'none';
    document.getElementById('againBtn').style.display = 'block';

    // localStorage に保存
    localStorage.setItem('lastDiagnosis', JSON.stringify({
      date: new Date().toISOString(),
      score: score,
      rank: result.rank
    }));
  }

  function getRadioValue(name) {
    var radio = document.querySelector('input[name="' + name + '"]:checked');
    return radio ? radio.value : null;
  }

  function showResult(result, score) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + result.className;
    rc.style.display = 'block';
    document.getElementById('emoji').textContent = result.emoji;
    document.getElementById('resultRank').textContent = result.rank;
    document.getElementById('resultNote').textContent = 'スコア：' + score + '点 / 15点満点';

    var ac = document.getElementById('advice');
    ac.style.display = 'block';
    document.getElementById('adviceText').textContent = result.advice;
  }

  function reset() {
    // ラジオボタンをリセット
    document.querySelectorAll('input[type="radio"]').forEach(function(radio) {
      radio.checked = false;
    });
    document.getElementById('result').style.display = 'none';
    document.getElementById('advice').style.display = 'none';
    document.getElementById('questionCard').style.display = '';
    document.getElementById('againBtn').style.display = 'none';
  }

  // ページ読み込み時に前回の診断結果を確認（オプション）
  window.addEventListener('load', function() {
    var lastDiagnosis = localStorage.getItem('lastDiagnosis');
    if (lastDiagnosis) {
      console.log('前回の診断：', JSON.parse(lastDiagnosis));
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
