<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>令和の値上がり品目当てクイズ｜物価感覚チェック</title>
  <meta name="description" content="令和に入ってから身近な食品やサービスがどれだけ値上がりしたかを10問4択で当てるクイズです。物価感覚がズレていないかをサクッと自己チェックできます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; line-height: 1.5; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .progress-bar {
      width: 100%; height: 8px; background: var(--bg);
      border-radius: 4px; overflow: hidden; margin-bottom: 0.8rem;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.78rem; color: var(--text-sub);
      text-align: center; margin-bottom: 1rem;
    }
    .question-text {
      font-size: 1.05rem; font-weight: 700;
      line-height: 1.5; margin-bottom: 1.2rem;
      color: var(--text);
    }
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      display: block; width: 100%;
      padding: 0.85rem 1rem; font-size: 0.96rem;
      font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent); background: var(--accent-light);
    }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      background: var(--ok-bg); border-color: var(--ok); color: var(--ok); font-weight: 800;
    }
    .choice-btn.wrong {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng); font-weight: 800;
    }
    .explain-box {
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 10px;
      font-size: 0.88rem; line-height: 1.6;
      color: var(--text);
    }
    .explain-box .explain-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.3rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.86rem; color: var(--text-sub); line-height: 1.6; }
    .best-score {
      display: inline-block; margin-top: 0.6rem;
      padding: 0.3rem 0.7rem; font-size: 0.78rem;
      background: rgba(224,123,0,0.1); color: var(--accent);
      border-radius: 6px; font-weight: 700;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>令和の値上がり品目当てクイズ</h1>
    <p class="subtitle">10問4択で物価感覚をセルフチェック。<br>※2026年4月時点の参考データ。価格は概算の目安で、最新情報は公式情報をご確認ください。</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <p class="card-title">クイズ</p>
    <div class="progress-bar"><div class="progress-bar-fill" id="pbar"></div></div>
    <p class="progress-text" id="ptext">第 1 問 / 全 10 問</p>
    <p class="question-text" id="qtext"></p>
    <div class="choices" id="choices"></div>
    <div class="explain-box" id="explain" style="display:none">
      <p class="explain-label">解説</p>
      <p id="explain-text"></p>
    </div>
  </div>

  <!-- 次へ／結果ボタン -->
  <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best"></p>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc" id="restart-btn" style="display:none" onclick="startQuiz()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、総務省「小売物価統計調査」「消費者物価指数」や、各メーカー・公式発表の参考価格をベースに、目安として整理しています。年度や時期により価格は変動します。最新情報は公式情報をご確認ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: 'マクドナルドの「ハンバーガー」単品。2019年（110円）から2024年までで、価格はおおよそ何%値上がりした？',
      choices: ['約20%', '約35%', '約55%', '約80%'],
      answer: 2,
      explain: '2019年に110円だったハンバーガーは段階的な値上げを経て2024年には170円前後となり、約55%上昇しました。'
    },
    {
      q: '駄菓子「うまい棒」は2022年4月に約42年ぶりに価格を改定。何円から何円になった？',
      choices: ['8円→10円', '10円→12円', '12円→15円', '15円→20円'],
      answer: 1,
      explain: '1979年の発売以来10円を維持していたうまい棒は、2022年4月出荷分から税抜12円に改定されました。'
    },
    {
      q: '山崎製パン「ロイヤルブレッド」など主要食パンの希望小売価格。2019年と2024年を比べると、おおよそどれくらい値上がりした？',
      choices: ['約10%', '約25%', '約40%', '約60%'],
      answer: 2,
      explain: '小麦価格高騰や物流費上昇を受け、各社が複数回値上げを実施。累計でおよそ40%前後の上昇となりました。'
    },
    {
      q: '卵Mサイズ10個入りの全国平均小売価格。2019年→2023年高騰時で、ピーク時はおおよそ何%値上がりした？',
      choices: ['約20%', '約40%', '約60%', '約100%'],
      answer: 2,
      explain: '鳥インフルエンザによる供給減で「エッグショック」が発生。2023年春には平年比でおよそ6割高い水準まで上昇しました。'
    },
    {
      q: '東京ディズニーランド1Dayパスポート（大人）。2019年（7,500円）から2024年の変動価格制最高額までで、何円値上がりした？',
      choices: ['約1,000円', '約2,000円', '約3,400円', '約5,000円'],
      answer: 2,
      explain: '2019年の7,500円から、2024年の変動価格制では最大10,900円となり、約3,400円（約45%）の上昇となりました。'
    },
    {
      q: 'レギュラーガソリン全国平均小売価格。2019年4月（約145円/L）と2024年4月を比較すると、おおよそ何%上昇した？',
      choices: ['約10%', '約20%', '約30%', '約45%'],
      answer: 1,
      explain: '原油価格上昇と円安の影響で、175円/L前後まで上昇。補助金がなければさらに高騰した試算もあります。'
    },
    {
      q: '電気代（標準的な家庭の月額）は、2020年〜2023年の燃料費調整額込みでおおよそ何%上がった？',
      choices: ['約10%', '約25%', '約40%', '約55%'],
      answer: 2,
      explain: 'LNGや石炭の国際価格高騰と円安により、燃料費調整額が大幅にプラスに。標準家庭でおよそ4割増となりました。'
    },
    {
      q: 'iPhoneのフラッグシップ最上位モデル（Pro Max最大容量）の日本販売価格。2019年と2024年でおおよそ何円値上がりした？',
      choices: ['約3万円', '約6万円', '約9万円', '約12万円'],
      answer: 2,
      explain: '2019年のiPhone 11 Pro Max 512GBは159,800円、2024年のiPhone 15 Pro Max 1TBは249,800円で、約9万円の上昇です。'
    },
    {
      q: '赤城乳業「ガリガリ君ソーダ」。2019年（70円）から2024年でおおよそ何%値上がりした？',
      choices: ['約0%（据え置き）', '約15%', '約30%', '約50%'],
      answer: 1,
      explain: '2016年に60→70円へ上げて以来、2024年に70→80円へ約8年ぶりに改定。およそ15%の上昇です。'
    },
    {
      q: 'マクドナルド「ビッグマック」単品。2019年（390円）から2024年までで、おおよそ何円値上がりした？',
      choices: ['約30円', '約60円', '約90円', '約130円'],
      answer: 2,
      explain: '2024年時点では480円前後となり、5年でおよそ90円（約23%）上昇しました。'
    }
  ];

  var STORAGE_KEY = 'reiwa-quiz-best';
  var current = 0;
  var score = 0;
  var answered = false;

  function startQuiz() {
    current = 0;
    score = 0;
    answered = false;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    var q = QUESTIONS[current];
    document.getElementById('ptext').textContent = '第 ' + (current + 1) + ' 問 / 全 ' + QUESTIONS.length + ' 問';
    document.getElementById('pbar').style.width = ((current) / QUESTIONS.length * 100) + '%';
    document.getElementById('qtext').textContent = q.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.type = 'button';
      btn.textContent = c;
      btn.onclick = function() { selectAnswer(i); };
      choicesEl.appendChild(btn);
    });
    document.getElementById('explain').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[current];
    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === q.answer) b.classList.add('correct');
      else if (i === idx) b.classList.add('wrong');
    });
    if (idx === q.answer) score++;
    document.getElementById('explain-text').textContent = q.explain;
    document.getElementById('explain').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('next-btn').textContent = (current + 1 >= QUESTIONS.length) ? '結果を見る' : '次の問題へ';
    document.getElementById('pbar').style.width = ((current + 1) / QUESTIONS.length * 100) + '%';
  }

  function nextQuestion() {
    current++;
    if (current >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    var rc = document.getElementById('result');
    var pct = score / QUESTIONS.length;
    var level, evalText, note;
    if (pct >= 0.8) {
      level = 'ok';
      evalText = '物価感覚バッチリ！';
      note = '令和の値上がり事情をしっかり把握できています。日々の家計管理にも活かせる感覚です。';
    } else if (pct >= 0.5) {
      level = 'warn';
      evalText = 'まあまあの物価感覚';
      note = 'おおむね把握できています。よく買う品目の値段は意識すると、ムダな出費を防げます。';
    } else {
      level = 'ng';
      evalText = '物価感覚、少しズレてるかも';
      note = '実は思ったより値上がりしている品目が多いです。レシートを見直してみると新しい発見があるかも。';
    }
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = score + ' / ' + QUESTIONS.length + ' 問正解';
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = note;

    var best = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    if (score > best) {
      best = score;
      try { localStorage.setItem(STORAGE_KEY, String(best)); } catch (e) {}
    }
    document.getElementById('best').textContent = '🏆 過去最高スコア：' + best + ' / ' + QUESTIONS.length;

    document.getElementById('restart-btn').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 初期化
  startQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
