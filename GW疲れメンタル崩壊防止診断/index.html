<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GW連休後の疲れやメンタル崩壊を防ぐため、心理状態を5問で診断して改善対策を提案するWebアプリです。リスク度に応じた実行可能なセルフケア法をお役立てください。">
  <title>GW疲れメンタル崩壊防止診断｜心理状態5問チェック</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-group { margin-bottom: 1.5rem; }
    .q-number { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 0.3rem; }
    .q-text { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 0.7rem; }
    .q-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .q-option {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.8rem; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; user-select: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .q-option input[type="radio"] { cursor: pointer; }
    .q-option input[type="radio"]:checked ~ .q-label {
      font-weight: 700; color: var(--accent);
    }
    .q-option input[type="radio"]:checked {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .q-label { font-size: 0.88rem; color: var(--text); cursor: pointer; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .advice-card { display: none; }
    .advice-item { margin-bottom: 0.8rem; }
    .advice-title { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    .advice-text { font-size: 0.82rem; color: var(--text-sub); line-height: 1.6; }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>GW疲れメンタル崩壊防止診断</h1>
    <p class="subtitle">5問で心理状態をチェック・改善対策をご提案</p>
  </header>

  <!-- 診断カード -->
  <div class="card">
    <p class="card-title">5問の心理状態診断</p>

    <!-- 問1 -->
    <div class="q-group">
      <p class="q-number">Q1</p>
      <p class="q-text">連休後の疲労度はどの程度ですか？</p>
      <div class="q-options">
        <label class="q-option">
          <input type="radio" name="q1" value="0">
          <span class="q-label">疲れは感じていない</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q1" value="1">
          <span class="q-label">少し疲れている</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q1" value="2">
          <span class="q-label">かなり疲れている</span>
        </label>
      </div>
    </div>

    <!-- 問2 -->
    <div class="q-group">
      <p class="q-number">Q2</p>
      <p class="q-text">メンタルの不安定感を感じていますか？</p>
      <div class="q-options">
        <label class="q-option">
          <input type="radio" name="q2" value="0">
          <span class="q-label">安定している</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q2" value="1">
          <span class="q-label">少し不安定</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q2" value="2">
          <span class="q-label">かなり不安定</span>
        </label>
      </div>
    </div>

    <!-- 問3 -->
    <div class="q-group">
      <p class="q-number">Q3</p>
      <p class="q-text">睡眠の質はどうですか？</p>
      <div class="q-options">
        <label class="q-option">
          <input type="radio" name="q3" value="0">
          <span class="q-label">良く眠れている</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q3" value="1">
          <span class="q-label">少し低下している</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q3" value="2">
          <span class="q-label">大きく低下している</span>
        </label>
      </div>
    </div>

    <!-- 問4 -->
    <div class="q-group">
      <p class="q-number">Q4</p>
      <p class="q-text">やる気や意欲はどの程度ですか？</p>
      <div class="q-options">
        <label class="q-option">
          <input type="radio" name="q4" value="0">
          <span class="q-label">ある・通常通り</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q4" value="1">
          <span class="q-label">少し低下している</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q4" value="2">
          <span class="q-label">かなり低下している</span>
        </label>
      </div>
    </div>

    <!-- 問5 -->
    <div class="q-group">
      <p class="q-number">Q5</p>
      <p class="q-text">全体的なストレスレベルはどのくらいですか？</p>
      <div class="q-options">
        <label class="q-option">
          <input type="radio" name="q5" value="0">
          <span class="q-label">低い</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q5" value="1">
          <span class="q-label">中程度</span>
        </label>
        <label class="q-option">
          <input type="radio" name="q5" value="2">
          <span class="q-label">高い</span>
        </label>
      </div>
    </div>

  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断結果を見る</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-emoji" id="emoji"></p>
    <p class="result-value" id="level"></p>
    <p class="result-eval" id="msg"></p>
  </div>

  <!-- 対策提案カード -->
  <div class="card" id="advice" style="display:none">
    <p class="card-title">改善対策</p>
    <div id="advice-list"></div>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは一般的な心理学的知識に基づいた目安です。症状が続く場合は、医療機関や専門家に相談することをお勧めします。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 診断ロジック
  var ADVICE = {
    ok: {
      emoji: '😌',
      level: '低リスク',
      msg: 'ほっ、今のところ大丈夫そうですね',
      tips: [
        { title: '① 現在の良い習慣を維持する', text: 'いま順調な理由を大事にしてください。毎日の習慣を記録しておくと、今後の参考になります。' },
        { title: '② 予防的なケアを心がける', text: '今のうちに十分な睡眠・栄養・運動を心がけることで、将来のメンタル低下を防げます。' },
        { title: '③ 定期的にチェックする', text: '週に1回このツールで診断して、少しの変化も見逃さないようにしましょう。' }
      ]
    },
    warn: {
      emoji: '🤔',
      level: '中リスク',
      msg: 'うーん、少し疲れが見えますね。見直すと安心です',
      tips: [
        { title: '① 睡眠を最優先に', text: '他のことは後回しにして、毎晩7～8時間の睡眠を確保してください。' },
        { title: '② 一番簡単なリセットから始める', text: '得意な運動・食事・音楽など、自分がリラックスできる1つに集中してみてください。' },
        { title: '③ やることを「今日」に絞る', text: '全部やろうとするのではなく、今日できることだけを見つけましょう。' }
      ]
    },
    ng: {
      emoji: '😱',
      level: '高リスク',
      msg: 'ガーン、早めに確認・サポート受けたほうがいいですね',
      tips: [
        { title: '① 医療機関・専門家に相談を', text: 'メンタルが不安定なときは、一人で判断せず専門家に相談することをお勧めします。' },
        { title: '② 無理をしない・できる範囲だけ', text: '今は「何かをやる」より「休む」優先。仕事・家事は最小限にしましょう。' },
        { title: '③ 信頼できる人に相談する', text: '家族・友人・職場の人に今の状況を話し、サポートを受けてください。' }
      ]
    }
  };

  function diagnose() {
    var q1 = parseInt(document.querySelector('input[name="q1"]:checked')?.value || -1);
    var q2 = parseInt(document.querySelector('input[name="q2"]:checked')?.value || -1);
    var q3 = parseInt(document.querySelector('input[name="q3"]:checked')?.value || -1);
    var q4 = parseInt(document.querySelector('input[name="q4"]:checked')?.value || -1);
    var q5 = parseInt(document.querySelector('input[name="q5"]:checked')?.value || -1);

    if (q1 < 0 || q2 < 0 || q3 < 0 || q4 < 0 || q5 < 0) {
      alert('すべての質問に答えてください');
      return;
    }

    var score = q1 + q2 + q3 + q4 + q5;
    var riskLevel = score <= 5 ? 'ok' : score <= 10 ? 'warn' : 'ng';

    // localStorage に保存
    var history = JSON.parse(localStorage.getItem('gw-diagnosis-history') || '[]');
    history.push({
      date: new Date().toLocaleString('ja-JP'),
      score: score,
      level: riskLevel
    });
    localStorage.setItem('gw-diagnosis-history', JSON.stringify(history));
    localStorage.setItem('gw-diagnosis-last', JSON.stringify({ score, level: riskLevel }));

    // 結果表示
    var advice = ADVICE[riskLevel];
    document.getElementById('emoji').textContent = advice.emoji;
    document.getElementById('level').textContent = advice.level;
    document.getElementById('msg').textContent = advice.msg;
    document.getElementById('result').className = 'result-card ' + riskLevel;
    document.getElementById('result').style.display = 'block';

    // 対策提案
    var adviceHtml = advice.tips.map(function(tip) {
      return '<div class="advice-item"><div class="advice-title">' + tip.title + '</div><div class="advice-text">' + tip.text + '</div></div>';
    }).join('');
    document.getElementById('advice-list').innerHTML = adviceHtml;
    document.getElementById('advice').style.display = 'block';
  }

  // ページロード時に前回の結果を復元
  window.addEventListener('load', function() {
    var last = localStorage.getItem('gw-diagnosis-last');
    if (last) {
      try {
        var data = JSON.parse(last);
        console.log('前回の診断結果を復元しました: ' + data.level);
      } catch(e) {}
    }
  });
  </script>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
