<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレスタイプ診断｜3問でわかる最速スッキリ法</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .qgroup { margin-bottom: 1.2rem; }
    .qgroup:last-child { margin-bottom: 0; }
    .qlabel { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.4; }
    .qopt {
      display: block;
      padding: 0.75rem 0.9rem; margin-bottom: 0.5rem;
      font-size: 0.92rem; line-height: 1.4;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .qopt:last-child { margin-bottom: 0; }
    .qopt input { display: none; }
    .qopt:hover { border-color: var(--accent); }
    .qopt.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      font-weight: 600;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; margin-top: 0.6rem; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.6rem 0.3rem; color: var(--text); line-height: 1.5; }
    .detail-table td:first-child { color: var(--text-sub); width: 30%; font-weight: 600; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>ストレスタイプ診断</h1>
    <p class="subtitle">3問でイライラを分類、最速スッキリ法を提案</p>
  </header>

  <div class="card">
    <p class="card-title">3問アンケート</p>

    <div class="qgroup" data-q="q1">
      <p class="qlabel">Q1. 今のイライラの主な原因は？</p>
      <label class="qopt"><input type="radio" name="q1" value="work">仕事・上司・締切に追われている</label>
      <label class="qopt"><input type="radio" name="q1" value="people">人間関係・家族・パートナーにモヤモヤ</label>
      <label class="qopt"><input type="radio" name="q1" value="fatigue">なんとなく漠然と疲れ・無気力</label>
    </div>

    <div class="qgroup" data-q="q2">
      <p class="qlabel">Q2. イライラの強さは？</p>
      <label class="qopt"><input type="radio" name="q2" value="low">軽い・モヤモヤ程度</label>
      <label class="qopt"><input type="radio" name="q2" value="mid">中くらい・ため息が出る</label>
      <label class="qopt"><input type="radio" name="q2" value="high">強い・爆発しそう</label>
    </div>

    <div class="qgroup" data-q="q3">
      <p class="qlabel">Q3. 今すぐ使える時間は？</p>
      <label class="qopt"><input type="radio" name="q3" value="t5">5分以内</label>
      <label class="qopt"><input type="radio" name="q3" value="t30">30分くらい</label>
      <label class="qopt"><input type="radio" name="q3" value="t180">半日〜数時間</label>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのストレスタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">最速スッキリ法</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 厚生労働省「働く人のメンタルヘルス・ポータルサイト こころの耳」など、公的機関のセルフケア資料を参考にしています。医学的診断ではなく、気分転換のヒントとしてお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ラジオボタン選択時に親 .qopt に .selected を付ける ──
  document.querySelectorAll('.qopt input').forEach(function(input){
    input.addEventListener('change', function(){
      var name = input.name;
      document.querySelectorAll('.qopt input[name="' + name + '"]').forEach(function(i){
        i.parentElement.classList.toggle('selected', i.checked);
      });
    });
  });

  // ── localStorage 復元 ──
  var STORAGE_KEY = 'stress-type-diag-v2';
  try {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    ['q1','q2','q3'].forEach(function(q){
      if (saved[q]) {
        var el = document.querySelector('input[name="' + q + '"][value="' + saved[q] + '"]');
        if (el) { el.checked = true; el.parentElement.classList.add('selected'); }
      }
    });
  } catch(e) {}

  var TYPE_INFO = {
    work: {
      name: '仕事ストレス型',
      level: 'warn',
      desc: '締切・タスク量・上司との関係などで交感神経が高ぶっている状態。体を動かすか、物理的に環境を切り替えると一気にリセットしやすいタイプです。',
      methods: {
        t5:   ['深呼吸4-7-8法', '4秒吸う→7秒止める→8秒吐くを3セット。自律神経が整い、思考のループが切れます。'],
        t30:  ['散歩＋アンガーログ', '外を15分歩いて、戻ったら「何にイライラしたか」を3行メモ。原因を可視化するだけで強度が下がります。'],
        t180: ['オフライン半日', 'スマホ・メールを切って、家事や運動など体を動かす作業に没頭。脳の回路が切り替わります。']
      }
    },
    people: {
      name: '対人ストレス型',
      level: 'ng',
      desc: '人間関係や言われた一言が頭にこびりついて反芻している状態。感情を「外に出す」「距離を取る」のが効きやすいタイプです。',
      methods: {
        t5:   ['ジャーナリング', '紙に「腹立つ」と思っていることを2分書きなぐる。読み返さず捨ててOK。書くことで脳から外に出ます。'],
        t30:  ['信頼できる人に話す', '友人・家族に5〜10分だけ話を聞いてもらう。アドバイス不要・ただ吐き出すだけで処理が進みます。'],
        t180: ['物理的距離を取る', '半日は相手のSNSも通知も見ない。空間と情報の両方で距離を取ると、見え方が変わります。']
      }
    },
    fatigue: {
      name: '慢性疲労型',
      level: 'ng',
      desc: '疲労が溜まっていて、特定の原因より体力・気力の低下からくるイライラ。休養と栄養・睡眠の優先度が一番高いタイプです。',
      methods: {
        t5:   ['目を閉じて温める', 'ホットタオルか手のひらで目を1分覆う。眼精疲労が抜けるだけで気分が変わります。'],
        t30:  ['仮眠＋糖分補給', '20分仮眠＋少量の甘いもの。夕方なら15時前までに。脳の燃料切れを補給します。'],
        t180: ['睡眠最優先デー', '今日は予定を諦めて寝る・湯船に浸かる・温かいものを食べる。回復が一番のスッキリ法です。']
      }
    }
  };

  var INTENSITY_NOTE = {
    low:  '軽めなので、短時間の対処でも十分効きやすい状態です。',
    mid:  '中くらいのモヤモヤ。ここで対処できると後を引きません。',
    high: '強い状態。今すぐ環境を変えるか、信頼できる人に頼るのが優先です。'
  };

  function calc() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
      showErr('3問すべて選んでください');
      return;
    }

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        q1: q1.value, q2: q2.value, q3: q3.value
      }));
    } catch(e) {}

    var info = TYPE_INFO[q1.value];
    var method = info.methods[q3.value];
    var level = q2.value === 'high' ? 'ng' : (q2.value === 'mid' ? 'warn' : 'ok');

    showResult(level, info.name, info.desc);
    showDetail([
      ['今の状態', INTENSITY_NOTE[q2.value]],
      ['おすすめ', method[0]],
      ['やり方', method[1]]
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️ 入力不足', msg);
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
