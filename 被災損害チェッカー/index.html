<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>被災損害チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 0.9rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
    @media (max-width: 480px) { .row3 { grid-template-columns: 1fr; } }

    /* ── ボタン ── */
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.85rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.75rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy:active { background: var(--accent-light); }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .detail-table th { padding: 0.45rem 0.3rem; color: var(--text-sub); font-size: 0.75rem; font-weight: 700; border-bottom: 2px solid var(--border); text-align: right; }
    .detail-table th:first-child { text-align: left; }
    .detail-table td { padding: 0.6rem 0.3rem; border-bottom: 1px solid var(--border); text-align: right; color: var(--text); vertical-align: middle; }
    .detail-table td:first-child { text-align: left; font-weight: 600; }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table .hl td { background: var(--accent-light); font-weight: 800; }
    .detail-table .hl td:nth-child(4) { color: var(--ng); }
    .priority-badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.7rem; font-weight: 700; border-radius: 20px;
      padding: 0.1rem 0.45rem; margin-right: 0.35rem; vertical-align: middle;
    }
    .priority-1 { background: var(--ng); }
    .priority-2 { background: var(--warn); }
    .priority-3 { background: #b45309cc; }

    .btn-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 1rem; padding: 0.2rem 0.4rem;
      border-radius: 6px; line-height: 1;
    }
    .btn-del:hover { background: var(--ng-bg); color: var(--ng); }

    .total-row td { font-weight: 800; color: var(--text); border-top: 2px solid var(--border); }
    .total-row td:nth-child(4) { color: var(--ng); font-size: 1rem; }

    /* ── 空状態 ── */
    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.9rem; padding: 1.5rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>被災損害チェッカー</h1>
    <p class="subtitle">台風・水害の被害額と補償額から実質自己負担と復旧優先順位を確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">被害項目を追加</p>
    <div class="row3">
      <div class="field">
        <label for="itemName">項目名</label>
        <input type="text" id="itemName" placeholder="例：屋根修繕">
      </div>
      <div class="field">
        <label for="damage">被害額（円）</label>
        <input type="number" id="damage" placeholder="例：500000" min="0">
      </div>
      <div class="field">
        <label for="covered">保険補償額（円）</label>
        <input type="number" id="covered" placeholder="例：300000" min="0">
      </div>
    </div>
  </div>

  <button class="btn-add" onclick="addItem()">＋ 項目を追加する</button>

  <!-- 結論カード -->
  <div class="result-card" id="resultCard">
    <p class="result-label">合計 実質自己負担額</p>
    <p class="result-value" id="totalBurden">—</p>
    <p class="result-note" id="resultNote"></p>
  </div>

  <!-- 一覧カード -->
  <div class="card" id="listCard" style="display:none">
    <p class="card-title">被害一覧（自己負担の大きい順）</p>
    <table class="detail-table">
      <thead>
        <tr>
          <th>項目</th>
          <th>被害額</th>
          <th>補償額</th>
          <th>自己負担</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>
    <div class="empty-msg" id="emptyMsg" style="display:none">項目がありません</div>
  </div>

  <button class="btn-copy" id="copyBtn" style="display:none" onclick="copyResult()">結果をコピー</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var items = [];

  function load() {
    try {
      var saved = localStorage.getItem('saigai-damage-checker');
      if (saved) items = JSON.parse(saved);
    } catch(e) { items = []; }
    render();
  }

  function save() {
    try { localStorage.setItem('saigai-damage-checker', JSON.stringify(items)); } catch(e) {}
  }

  function addItem() {
    var name    = document.getElementById('itemName').value.trim();
    var damage  = parseFloat(document.getElementById('damage').value);
    var covered = parseFloat(document.getElementById('covered').value) || 0;

    if (!name) { alert('項目名を入力してください'); return; }
    if (isNaN(damage) || damage < 0) { alert('被害額を入力してください'); return; }
    if (covered < 0) covered = 0;

    var burden = Math.max(0, damage - covered);
    items.push({ id: Date.now(), name: name, damage: damage, covered: covered, burden: burden });
    save();

    // 入力リセット
    document.getElementById('itemName').value  = '';
    document.getElementById('damage').value    = '';
    document.getElementById('covered').value   = '';
    document.getElementById('itemName').focus();

    render();
  }

  function deleteItem(id) {
    items = items.filter(function(x){ return x.id !== id; });
    save();
    render();
  }

  function render() {
    // 自己負担の降順でソート（優先順位）
    var sorted = items.slice().sort(function(a, b){ return b.burden - a.burden; });

    var totalDamage  = items.reduce(function(s,x){ return s + x.damage; }, 0);
    var totalCovered = items.reduce(function(s,x){ return s + x.covered; }, 0);
    var totalBurden  = items.reduce(function(s,x){ return s + x.burden; }, 0);

    var listCard = document.getElementById('listCard');
    var resultCard = document.getElementById('resultCard');
    var copyBtn = document.getElementById('copyBtn');

    if (items.length === 0) {
      listCard.style.display = 'none';
      resultCard.style.display = 'none';
      copyBtn.style.display = 'none';
      return;
    }

    listCard.style.display = '';
    resultCard.style.display = 'block';
    copyBtn.style.display = '';

    // 結論カード
    var level = totalBurden === 0 ? 'ok' : totalBurden <= 500000 ? 'warn' : 'ng';
    resultCard.className = 'result-card ' + level;
    document.getElementById('totalBurden').textContent = fmt(totalBurden) + ' 円';
    document.getElementById('resultNote').textContent =
      '被害合計：' + fmt(totalDamage) + '円　補償合計：' + fmt(totalCovered) + '円';

    // 一覧テーブル
    var html = '';
    sorted.forEach(function(item, i) {
      var rank = i + 1;
      var cls  = rank === 1 ? 'priority-1' : rank === 2 ? 'priority-2' : rank === 3 ? 'priority-3' : '';
      html += '<tr>'
        + '<td><span class="priority-badge ' + cls + '">' + rank + '位</span>' + esc(item.name) + '</td>'
        + '<td>' + fmt(item.damage) + '円</td>'
        + '<td>' + fmt(item.covered) + '円</td>'
        + '<td style="color:var(--ng);font-weight:800">' + fmt(item.burden) + '円</td>'
        + '<td><button class="btn-del" onclick="deleteItem(' + item.id + ')" title="削除">×</button></td>'
        + '</tr>';
    });
    // 合計行
    html += '<tr class="total-row">'
      + '<td>合計</td>'
      + '<td>' + fmt(totalDamage) + '円</td>'
      + '<td>' + fmt(totalCovered) + '円</td>'
      + '<td>' + fmt(totalBurden) + '円</td>'
      + '<td></td>'
      + '</tr>';

    document.getElementById('itemList').innerHTML = html;
    document.getElementById('emptyMsg').style.display = 'none';
  }

  function copyResult() {
    var sorted = items.slice().sort(function(a,b){ return b.burden - a.burden; });
    var totalDamage  = items.reduce(function(s,x){ return s + x.damage; }, 0);
    var totalCovered = items.reduce(function(s,x){ return s + x.covered; }, 0);
    var totalBurden  = items.reduce(function(s,x){ return s + x.burden; }, 0);

    var lines = ['【被災損害チェッカー 結果】', ''];
    lines.push('■ 復旧優先順位（自己負担の大きい順）');
    sorted.forEach(function(item, i) {
      lines.push((i+1) + '位 ' + item.name
        + '　被害額：' + fmt(item.damage) + '円'
        + '　補償：' + fmt(item.covered) + '円'
        + '　自己負担：' + fmt(item.burden) + '円');
    });
    lines.push('');
    lines.push('合計被害額：' + fmt(totalDamage) + '円');
    lines.push('合計補償額：' + fmt(totalCovered) + '円');
    lines.push('合計自己負担：' + fmt(totalBurden) + '円');

    var text = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { alert('コピーしました'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('コピーしました');
    }
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enterキーで追加
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.target.id === 'itemName' || e.target.id === 'damage' || e.target.id === 'covered')) {
      addItem();
    }
  });

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
