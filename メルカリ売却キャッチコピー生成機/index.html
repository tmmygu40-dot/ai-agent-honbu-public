<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="商品の特徴を選ぶだけでメルカリで売れやすいキャッチコピーが自動生成される無料ツールです。ジャンル・状態・こだわり点から、販売成功率を高めるコピーが3パターン即座に作成されます。">
  <title>メルカリ売却キャッチコピー生成機</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ売却キャッチコピー生成機</h1>
    <p class="subtitle">商品から売れるコピーを即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="genre">商品ジャンル</label>
      <select id="genre">
        <option value="">選んでください</option>
        <option value="衣類">衣類</option>
        <option value="本">本</option>
        <option value="家電">家電</option>
        <option value="美容">美容</option>
        <option value="おもちゃ">おもちゃ</option>
        <option value="スポーツ">スポーツ</option>
        <option value="食品">食品</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label>状態</label>
      <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin:0.5rem 0;"><input type="radio" name="condition" value="新品未使用" style="width:auto;"> 新品未使用</label>
      <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin:0.5rem 0;"><input type="radio" name="condition" value="未使用に近い" style="width:auto;"> 未使用に近い</label>
      <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin:0.5rem 0;"><input type="radio" name="condition" value="目立つ傷あり" style="width:auto;"> 目立つ傷あり</label>
      <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin:0.5rem 0;"><input type="radio" name="condition" value="やや傷あり" style="width:auto;"> やや傷あり</label>
    </div>
    <div class="field">
      <label for="point">こだわり・特徴</label>
      <input type="text" id="point" placeholder="例: 上品、手作り、レア、限定版など">
      <p class="hint">空白でもOK</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">キャッチコピーを生成</button>

  <!-- 結果カード -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">生成されたキャッチコピー</p>
    <div id="copy-list"></div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・観光庁・国税庁などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // キャッチコピーテンプレート
  var copyTemplates = {
    '衣類': {
      '新品未使用': [
        '【新品未使用】サイズ感ぴったり。上質素材で高見え。',
        '【送料無料・新品】そのまま使える、厳選した逸品。',
        '新品タグ付き。質感がとても良い〇〇です。'
      ],
      '未使用に近い': [
        '【ほぼ未使用】数回のみ。丁寧に保管していました。',
        'クローゼットで眠ってた掘り出し物です。',
        '着用数回の上質素材。ほぼ新品です。'
      ],
      '目立つ傷あり': [
        '【訳あり】かなりお安くしました。',
        'この価格なら納得！掘り出しアイテム。',
        'ダメージあり＝格安♪まだまだ使えます。'
      ],
      'やや傷あり': [
        '【お手軽価格】気にならないレベルです。',
        '気になる点は説明に記載。それでもお得。',
        'ちょっぴり傷ありで破格です。'
      ]
    },
    '本': {
      '新品未使用': [
        '【新品】売れ筋本。今すぐ読まないなら手放します。',
        '未読本。これからの季節に読みたい1冊。',
        '限定版・新品。希少です。'
      ],
      '未使用に近い': [
        '【ほぼ新品】1回だけパラパラめくった程度。',
        'クリーニング済み。目立つ傷なし。',
        '読んだけど美品です。'
      ],
      '目立つ傷あり': [
        '【激安】内容はしっかり読めます。',
        'ボロボロだけど価格で解決！',
        '学べる内容は変わらない。格安で。'
      ],
      'やや傷あり': [
        '【訳あり価格】本の内容に支障なし。',
        '傷あり＝お手軽価格。読みやすい。',
        'ちょっと古めだけどお安く。'
      ]
    },
    'その他': {
      '新品未使用': [
        '【新品】未開封。すぐ使えます。',
        '【送料無料・新品】オススメです♪',
        '新品・綺麗。今が買い時です。'
      ],
      '未使用に近い': [
        '【ほぼ新品】試しただけ。綺麗です。',
        '外観は新品同然です。',
        '数回使用の美品。'
      ],
      '目立つ傷あり': [
        '【大幅値下げ】まだ使えます！',
        'これでこの価格はお得。',
        '訳あり＝破格です。'
      ],
      'やや傷あり': [
        '【お手軽価格】まだいけます。',
        'ちょっと傷ありで格安。',
        '状態気にしない方へ。'
      ]
    }
  };

  function generate() {
    var genre = document.getElementById('genre').value;
    var condition = document.querySelector('input[name="condition"]:checked');
    var point = document.getElementById('point').value;

    if (!genre) { alert('ジャンルを選んでください'); return; }
    if (!condition) { alert('状態を選んでください'); return; }

    var condValue = condition.value;
    var templates = copyTemplates[genre] || copyTemplates['その他'];
    var copies = templates[condValue] || templates['やや傷あり'];

    // ポイントを加味したコピー生成
    var resultCopies = copies.map(function(c) {
      if (point) {
        var insertion = Math.random() > 0.5 ?
          c.substring(0, c.length - 1) + '。' + point + '。' :
          point + '。' + c;
        return insertion;
      }
      return c;
    });

    showResult(resultCopies);
    saveLastInputs(genre, condValue);
  }

  function showResult(copies) {
    var html = copies.map(function(c, i) {
      return '<div style="margin:1rem 0;padding:0.9rem;background:var(--accent-light);border-left:3px solid var(--accent);border-radius:6px;">' +
             '<p style="margin-bottom:0.5rem;font-size:0.95rem;line-height:1.5;">' + c + '</p>' +
             '<button onclick="copyToClipboard(\'' + c.replace(/'/g, "\\'") + '\')" style="padding:0.5rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">📋 コピー</button>' +
             '</div>';
    }).join('');
    document.getElementById('copy-list').innerHTML = html;
    document.getElementById('result-card').style.display = '';
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      });
    } else {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('コピーしました！');
    }
  }

  function saveLastInputs(genre, condition) {
    try {
      localStorage.setItem('mercari_last_genre', genre);
      localStorage.setItem('mercari_last_condition', condition);
    } catch(e) {}
  }

  function loadLastInputs() {
    try {
      var lastGenre = localStorage.getItem('mercari_last_genre');
      var lastCondition = localStorage.getItem('mercari_last_condition');
      if (lastGenre) document.getElementById('genre').value = lastGenre;
      if (lastCondition) {
        var radio = document.querySelector('input[name="condition"][value="' + lastCondition + '"]');
        if (radio) radio.checked = true;
      }
    } catch(e) {}
  }

  window.addEventListener('load', function() {
    loadLastInputs();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
