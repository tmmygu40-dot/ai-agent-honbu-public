<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作り置き管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🍱 作り置き管理</h1>

    <section class="form-section">
      <div class="form-group">
        <label for="name">料理名</label>
        <input type="text" id="name" placeholder="例：鶏そぼろ" maxlength="50">
      </div>
      <div class="form-group">
        <label for="amount">量</label>
        <input type="text" id="amount" placeholder="例：2人分、300g" maxlength="30">
      </div>
      <div class="form-group">
        <label for="expiry">保存期限</label>
        <input type="date" id="expiry">
      </div>
      <button id="addBtn" onclick="addItem()">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <span id="count">0件</span>
        <span class="legend">
          <span class="dot expired"></span>期限切れ
          <span class="dot soon"></span>3日以内
        </span>
      </div>
      <ul id="list"></ul>
      <p id="empty" class="empty-msg">まだ登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
