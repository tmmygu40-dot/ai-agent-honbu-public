<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カラー診断ライフアドバイス｜今の自分に必要な色がわかる7問診断</title>
  <meta name="description" content="7つの質問に答えるだけで、今のあなたに必要な色と行動アドバイスが分かる無料カラー診断アプリです。気分転換やセルフケアのヒントにお使いください。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.1rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-label {
      display: block; font-size: 0.92rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.5rem; line-height: 1.45;
    }
    .q-options { display: flex; flex-direction: column; gap: 0.4rem; }
    .opt {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.7rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); cursor: pointer;
      font-size: 0.9rem; color: var(--text); user-select: none;
      transition: border-color 0.12s, background 0.12s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
    .opt input[type="radio"]:checked ~ .opt-text { font-weight: 700; color: var(--accent); }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; margin: 0 auto 1.2rem; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .color-circle {
      width: 110px; height: 110px; margin: 0 auto 1rem;
      border-radius: 50%; box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      border: 4px solid #fff;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-color-name { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.2rem; }
    .result-tagline { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 1.1rem; line-height: 1.5; }
    .advice-list { text-align: left; margin: 1rem 0 0.4rem; padding: 1rem 1.1rem; background: var(--accent-light); border-radius: 10px; border-left: 3px solid var(--accent); }
    .advice-list h3 { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.6rem; text-transform: uppercase; }
    .advice-list ul { list-style: none; padding: 0; }
    .advice-list li { font-size: 0.92rem; color: var(--text); line-height: 1.55; padding: 0.4rem 0 0.4rem 1.4rem; position: relative; border-bottom: 1px dashed var(--border); }
    .advice-list li:last-child { border-bottom: none; }
    .advice-list li::before { content: "✓"; position: absolute; left: 0; top: 0.4rem; color: var(--accent); font-weight: 900; }
    .err-msg { color: var(--ng); font-weight: 700; margin-bottom: 0.6rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>カラー診断ライフアドバイス</h1>
    <p class="subtitle">7問で今の自分に必要な「色」と行動アドバイスがわかる ／ 色彩心理の一般的な知見を参考にした目安</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="q-card">
    <p class="card-title">7つの質問</p>
    <div id="q-list"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <div class="color-circle" id="rcCircle" style="background:#ccc"></div>
    <p class="result-label">今のあなたに必要な色</p>
    <p class="result-color-name" id="rcName">—</p>
    <p class="result-tagline" id="rcTag"></p>
    <div class="advice-list">
      <h3>今日からの行動アドバイス</h3>
      <ul id="rcAdvice"></ul>
    </div>
  </div>

  <button class="btn-reset no-print" id="btnReset" onclick="resetAll()" style="display:none">↺ もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは色彩心理学の一般的な知見を参考にした目安です。医学的・専門的な助言ではありません。気になる体調・心の不調が続く場合は、専門家へご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 質問定義（各選択肢に色スコアを割り当て）
  // 色: red(行動)/blue(冷静)/green(癒し)/yellow(楽しさ)/pink(優しさ)/purple(直感)/white(リセット)/orange(社交)
  var QUESTIONS = [
    {
      q: 'Q1. 最近の気分を一言で表すなら？',
      opts: [
        { t: 'イライラ・カリカリしている', s: { blue:3, green:2, white:1 } },
        { t: 'なんとなく沈んでいる',       s: { yellow:3, orange:2, pink:1 } },
        { t: '退屈・刺激が足りない',       s: { red:3, yellow:2, orange:1 } },
        { t: 'モヤモヤして決められない',   s: { white:3, purple:2, blue:1 } },
        { t: 'まあまあ普通',               s: { green:1, yellow:1, pink:1 } }
      ]
    },
    {
      q: 'Q2. いま自分に足りないと感じるのは？',
      opts: [
        { t: 'やる気・行動力',     s: { red:3, orange:2 } },
        { t: '落ち着き・冷静さ',   s: { blue:3, white:2 } },
        { t: '癒し・回復',         s: { green:3, pink:2 } },
        { t: '楽しさ・希望',       s: { yellow:3, orange:1 } },
        { t: 'ひらめき・直感',     s: { purple:3, white:1 } }
      ]
    },
    {
      q: 'Q3. いまの人間関係は？',
      opts: [
        { t: '充実している',       s: { yellow:2, orange:2, pink:1 } },
        { t: '普通',               s: { green:1, white:1 } },
        { t: '少し疲れる',         s: { green:3, blue:2 } },
        { t: '孤独・さみしい',     s: { pink:3, orange:2, yellow:1 } },
        { t: 'トラブル・摩擦あり', s: { white:3, blue:2, green:1 } }
      ]
    },
    {
      q: 'Q4. ここ数日の体調は？',
      opts: [
        { t: '元気いっぱい',       s: { red:2, orange:2, yellow:1 } },
        { t: '普通',               s: { green:1, blue:1 } },
        { t: '少し疲れている',     s: { green:3, pink:2 } },
        { t: 'かなり疲れている',   s: { green:3, white:3, pink:2 } },
        { t: '不調・だるい',       s: { white:3, green:2, blue:1 } }
      ]
    },
    {
      q: 'Q5. 最近の睡眠は？',
      opts: [
        { t: 'ぐっすり眠れている', s: { yellow:2, green:1 } },
        { t: 'まあまあ',           s: { green:1, blue:1 } },
        { t: '浅い・途中で目覚める', s: { blue:3, green:2, purple:1 } },
        { t: '不眠気味・寝つけない', s: { white:3, blue:2, green:1 } }
      ]
    },
    {
      q: 'Q6. 仕事や勉強・日々のタスクは？',
      opts: [
        { t: '順調に進んでいる',   s: { yellow:2, orange:1, red:1 } },
        { t: '普通',               s: { green:1, blue:1 } },
        { t: '停滞している・進まない', s: { red:3, orange:2, purple:1 } },
        { t: 'プレッシャーが大きい', s: { blue:3, white:2, green:1 } }
      ]
    },
    {
      q: 'Q7. いま一番欲しいのは？',
      opts: [
        { t: '一歩踏み出す勇気',   s: { red:3, orange:2 } },
        { t: '安心・安定',         s: { blue:2, green:2, pink:1 } },
        { t: '笑顔・楽しさ',       s: { yellow:3, orange:2 } },
        { t: '優しい気持ち',       s: { pink:3, green:1 } },
        { t: '新しいひらめき',     s: { purple:3, white:1, yellow:1 } }
      ]
    }
  ];

  // 色定義
  var COLORS = {
    red: {
      name: 'レッド（赤）',
      hex: '#e63946',
      tag: '一歩踏み出す勇気とエネルギーをくれる色',
      advice: [
        '朝、赤い小物（靴下・ペン・マグなど）を1つ身につけて出かける',
        '「今日やる1つ」を朝に決めて、午前中にやり切る',
        '15分だけでも体を動かす（ストレッチ・散歩・階段）'
      ]
    },
    blue: {
      name: 'ブルー（青）',
      hex: '#2e86c1',
      tag: '心を冷静にして、思考を整理してくれる色',
      advice: [
        '寝る前にスマホを置き、青空・水の写真を1分眺める',
        '頭の中のモヤモヤを紙に殴り書きで全部出す',
        '深呼吸を4-7-8（4秒吸う・7秒止める・8秒吐く）で3セット'
      ]
    },
    green: {
      name: 'グリーン（緑）',
      hex: '#2e8b57',
      tag: '疲れた心と体を、やさしく回復させてくれる色',
      advice: [
        '近所の公園・植物・観葉植物を5分眺める時間をつくる',
        '今日は「いつもより1時間早く寝る」を最優先にする',
        '何もしない時間（ぼーっとする）を10分、罪悪感なく取る'
      ]
    },
    yellow: {
      name: 'イエロー（黄）',
      hex: '#f1c40f',
      tag: '楽しさと前向きさを取り戻してくれる色',
      advice: [
        '黄色い食べ物（バナナ・卵・レモン）を1つ食事に取り入れる',
        '声を出して笑える動画・本を10分だけ見る',
        '「最近うれしかったこと」を3つメモに書き出す'
      ]
    },
    pink: {
      name: 'ピンク',
      hex: '#ec7eb1',
      tag: '優しさと自己受容を思い出させてくれる色',
      advice: [
        '今日の自分に「よくやった」と声に出して言う',
        '大切な人に「ありがとう」を1通メッセージで送る',
        'ぬるめのお風呂に15分つかって、自分をいたわる'
      ]
    },
    purple: {
      name: 'パープル（紫）',
      hex: '#8e44ad',
      tag: 'ひらめきと内なる感性を呼び覚ます色',
      advice: [
        '夜、灯りを少し落として、ノートに思いつくことを自由に書く',
        '直感で「気になる」と感じた本・場所・人を1つメモする',
        '普段聞かないジャンルの音楽を1曲だけ聴いてみる'
      ]
    },
    white: {
      name: 'ホワイト（白）',
      hex: '#cfcfcf',
      tag: 'リセットと新しいスタートを後押しする色',
      advice: [
        '机・カバンの中・スマホのホーム画面のどれか1つを片付ける',
        '今日の予定から「やらなくてもいいこと」を1つ消す',
        '白い紙に「いま手放したいもの」を書いて捨てる'
      ]
    },
    orange: {
      name: 'オレンジ',
      hex: '#e67e22',
      tag: '人とのつながりと活力を運んでくれる色',
      advice: [
        '久しぶりに連絡したい人に、短いメッセージを1通送る',
        '昼食・休憩で誰かと「軽く話す」時間を5分つくる',
        '夕方の散歩で太陽の光（オレンジの空）を5分浴びる'
      ]
    }
  };

  var STORAGE_KEY = 'colorAdviceResult_v1';

  // 質問描画
  function renderQuestions() {
    var html = QUESTIONS.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt"><input type="radio" name="q' + i + '" value="' + j + '"><span class="opt-text">' + escapeHtml(o.t) + '</span></label>';
      }).join('');
      return '<div class="q-block"><span class="q-label">' + escapeHtml(q.q) + '</span><div class="q-options">' + opts + '</div></div>';
    }).join('');
    document.getElementById('q-list').innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function diagnose() {
    // 全問チェック
    var answers = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) {
        alert('Q' + (i+1) + ' に答えてください');
        return;
      }
      answers.push(parseInt(sel.value, 10));
    }

    // スコア集計
    var score = { red:0, blue:0, green:0, yellow:0, pink:0, purple:0, white:0, orange:0 };
    for (var i = 0; i < answers.length; i++) {
      var s = QUESTIONS[i].opts[answers[i]].s;
      for (var k in s) {
        if (Object.prototype.hasOwnProperty.call(s, k)) {
          score[k] += s[k];
        }
      }
    }

    // 最高スコアの色を選ぶ（同点ならkeysの先頭側）
    var topKey = 'green', topVal = -1;
    var keys = ['red','blue','green','yellow','pink','purple','white','orange'];
    for (var i = 0; i < keys.length; i++) {
      if (score[keys[i]] > topVal) { topVal = score[keys[i]]; topKey = keys[i]; }
    }

    showResult(topKey, score, answers);
    saveResult(topKey, answers);
  }

  function showResult(key, score, answers) {
    var c = COLORS[key];
    document.getElementById('rcCircle').style.background = c.hex;
    document.getElementById('rcName').textContent = c.name;
    document.getElementById('rcTag').textContent = c.tag;
    document.getElementById('rcAdvice').innerHTML = c.advice.map(function(a){
      return '<li>' + escapeHtml(a) + '</li>';
    }).join('');
    document.getElementById('result').style.display = 'block';
    document.getElementById('btnReset').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function saveResult(key, answers) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        key: key,
        answers: answers,
        date: new Date().toISOString()
      }));
    } catch(e) { /* ignore */ }
  }

  function loadResult() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d || !d.key || !COLORS[d.key]) return;
      // 答えを復元
      if (Array.isArray(d.answers) && d.answers.length === QUESTIONS.length) {
        for (var i = 0; i < d.answers.length; i++) {
          var radios = document.querySelectorAll('input[name="q' + i + '"]');
          if (radios[d.answers[i]]) radios[d.answers[i]].checked = true;
        }
      }
      showResult(d.key);
    } catch(e) { /* ignore */ }
  }

  function resetAll() {
    for (var i = 0; i < QUESTIONS.length; i++) {
      var radios = document.querySelectorAll('input[name="q' + i + '"]');
      for (var j = 0; j < radios.length; j++) radios[j].checked = false;
    }
    document.getElementById('result').style.display = 'none';
    document.getElementById('btnReset').style.display = 'none';
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    document.getElementById('q-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 初期化
  renderQuestions();
  loadResult();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
