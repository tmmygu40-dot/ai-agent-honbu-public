<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="配信テーマ・バナーサイズ・背景シーン・装飾を選ぶだけで、ド���ト絵配信バナーの画像生成AIプロンプトを即生成。ワンクリックでコピーできるプロンプトジェネレーター。">
  <title>配信バナードット絵プロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘ��ダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-align: center; }

    /* ── プロンプト表示 ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); word-break: break-word;
      white-space: pre-wrap; min-height: 80px;
      margin-bottom: 1rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── お気に入りセクション ── */
    .fav-section { max-width: 600px; margin: 1rem auto; }
    .fav-section .card-title { margin-bottom: 0.6rem; }
    .btn-fav {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px; cursor: pointer;
      margin-top: 0.8rem; transition: background 0.15s;
    }
    .btn-fav:hover { background: var(--accent); color: #fff; }
    .fav-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: 0.8rem;
      margin-bottom: 0.6rem; font-size: 0.85rem; line-height: 1.5;
      word-break: break-word; position: relative;
    }
    .fav-item-actions {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }
    .fav-item-actions button {
      padding: 0.35rem 0.7rem; font-size: 0.78rem; font-weight: 600;
      border-radius: 6px; border: 1px solid var(--border);
      cursor: pointer; background: var(--card); color: var(--text-sub);
      transition: border-color 0.15s, color 0.15s;
    }
    .fav-item-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .fav-item-actions .btn-del { color: var(--ng); border-color: var(--ng); }
    .fav-item-actions .btn-del:hover { background: var(--ng); color: #fff; }
    .fav-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>配信バナードット絵プロンプトジェネレーター</h1>
    <p class="subtitle">配信バナー用のドット絵プロンプトを選ぶだけで即生成</p>
  </header>

  <!-- 配信設定カード -->
  <div class="card">
    <p class="card-title">配信テーマ設定</p>
    <div class="field">
      <label for="streamType">配信テーマ</label>
      <select id="streamType">
        <option value="gaming livestream">ゲーム実況 (Gaming)</option>
        <option value="chatting stream">雑談配信 (Chatting)</option>
        <option value="singing karaoke stream">歌枠 (Singing/Karaoke)</option>
        <option value="art drawing stream">お絵描き配信 (Art/Drawing)</option>
        <option value="cooking stream">料理配信 (Cooking)</option>
        <option value="music DJ stream">音楽・DJ配信 (Music/DJ)</option>
        <option value="study co-working stream">勉強・作業配信 (Study)</option>
        <option value="ASMR relaxing stream">ASMR配信 (ASMR)</option>
        <option value="unboxing review stream">開封・レビュー配信 (Unboxing)</option>
        <option value="just chatting IRL stream">雑談・IRL配信 (IRL)</option>
        <option value="horror game stream">ホラーゲーム実況 (Horror)</option>
        <option value="retro game stream">レトロゲーム実況 (Retro Game)</option>
      </select>
    </div>
    <div class="field">
      <label for="bannerSize">バナーサイズ</label>
      <select id="bannerSize">
        <option value="wide banner 1920x480">横長バナー 1920x480 (Twitch)</option>
        <option value="wide banner 2560x1440">サムネ 2560x1440 (YouTube)</option>
        <option value="wide banner 1200x630">OGP画像 1200x630</option>
        <option value="square banner 1080x1080">正方形 1080x1080 (SNS)</option>
        <option value="vertical banner 1080x1920">縦長 1080x1920 (ストーリー)</option>
        <option value="wide banner 800x200">小バナー 800x200</option>
      </select>
    </div>
    <div class="field">
      <label for="bgScene">背景シーン</label>
      <select id="bgScene">
        <option value="pixel art gaming room with monitors and LED lights">ゲーミングルーム (Gaming room)</option>
        <option value="pixel art cozy bedroom with warm lighting">おしゃれ部屋 (Cozy room)</option>
        <option value="pixel art neon city skyline at night">ネオン街夜景 (Neon city)</option>
        <option value="pixel art fantasy castle interior">ファンタジー城内 (Fantasy castle)</option>
        <option value="pixel art outer space with stars and planets">宇宙空間 (Outer space)</option>
        <option value="pixel art sakura cherry blossom scene">桜の風景 (Cherry blossom)</option>
        <option value="pixel art retro arcade game center">ゲームセンター (Arcade)</option>
        <option value="pixel art underwater ocean scene">海中 (Underwater)</option>
        <option value="pixel art sunset beach scene">夕焼けビーチ (Sunset beach)</option>
        <option value="pixel art dark dungeon with torches">ダンジョン (Dungeon)</option>
        <option value="pixel art concert stage with spotlights">コンサートステージ (Concert stage)</option>
        <option value="pixel art forest with fireflies">蛍の森 (Firefly forest)</option>
      </select>
    </div>
  </div>

  <!-- スタイル設定カード -->
  <div class="card">
    <p class="card-title">スタイル設定</p>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="vibrant neon pixel art palette">ネオンビビッド (Neon vibrant)</option>
        <option value="pastel soft pixel art palette">パステル (Pastel)</option>
        <option value="NES palette, limited 8-bit colors">ファミコン風 (NES 8-bit)</option>
        <option value="SNES palette, 16-bit colors" selected>スーファミ風 (SNES 16-bit)</option>
        <option value="dark moody cyberpunk palette">サイバーパンク (Cyberpunk)</option>
        <option value="warm cozy sunset palette">あったか系 (Warm)</option>
        <option value="cool ocean blue palette">クール系 (Cool)</option>
        <option value="monochrome grayscale palette">モノクロ (Monochrome)</option>
        <option value="vaporwave pink and purple palette">ヴェイパーウェイブ (Vaporwave)</option>
      </select>
    </div>
    <div class="field">
      <label for="textPlacement">テキスト配置</label>
      <select id="textPlacement">
        <option value="large title text centered">中央に大きく (Center large)</option>
        <option value="title text on the left side">左寄せ (Left aligned)</option>
        <option value="title text on the right side">右寄せ (Right aligned)</option>
        <option value="title text at the top">上部 (Top)</option>
        <option value="title text at the bottom">下部 (Bottom)</option>
        <option value="no text, image only">テキストなし (No text)</option>
      </select>
    </div>
    <div class="field">
      <label for="decoration">装飾要素</label>
      <select id="decoration">
        <option value="pixel sparkle effects and glowing particles">キラキラエフェクト (Sparkles)</option>
        <option value="pixel heart and star decorations">ハート＆星 (Hearts & Stars)</option>
        <option value="pixel fire and flame effects">炎エフェクト (Fire)</option>
        <option value="pixel lightning and electric effects">雷エフェクト (Lightning)</option>
        <option value="pixel music notes floating around">音符 (Music notes)</option>
        <option value="pixel bubble and foam effects">泡エフェクト (Bubbles)</option>
        <option value="pixel retro game UI elements and health bars">ゲームUI風 (Game UI)</option>
        <option value="pixel flower petals floating">花びら (Flower petals)</option>
        <option value="">なし (None)</option>
      </select>
    </div>
    <div class="field">
      <label for="character">キャラクター配置</label>
      <select id="character">
        <option value="cute chibi pixel character on the right side">右にちびキャラ (Chibi right)</option>
        <option value="cute chibi pixel character on the left side">左にちびキャラ (Chibi left)</option>
        <option value="cute chibi pixel character centered">中央にちびキャラ (Chibi center)</option>
        <option value="pixel cat mascot on the corner">隅に猫マスコット (Cat mascot)</option>
        <option value="pixel robot mascot waving">ロボットマスコット (Robot mascot)</option>
        <option value="">キャラなし (No character)</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">ムード・雰囲気</label>
      <select id="mood">
        <option value="energetic exciting atmosphere">元気・ハイテンション (Energetic)</option>
        <option value="chill relaxed lofi atmosphere">チル・まったり (Chill/Lofi)</option>
        <option value="cute kawaii atmosphere">かわいい系 (Cute/Kawaii)</option>
        <option value="cool professional atmosphere">クール・プロ感 (Cool/Pro)</option>
        <option value="mysterious dark atmosphere">ミステリアス (Mysterious)</option>
        <option value="retro nostalgic atmosphere">レトロ・懐かしい (Retro/Nostalgic)</option>
        <option value="festive celebration atmosphere">お祭り・イベント (Festive)</option>
      </select>
    </div>
    <div class="field">
      <label for="extras">追加要素（任意）</label>
      <input type="text" id="extras" placeholder="例: subscribe button, chat overlay, emotes floating">
      <p class="hint">英語で自由に追加要素を記入できます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="prompt-text"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">コピーする</button>
    <button class="btn-fav no-print" onclick="saveFav()">お気に入りに保存</button>
  </div>

  <!-- お気に入り一覧 -->
  <div class="card fav-section no-print" id="fav-card">
    <p class="card-title">お気に入りプロンプト</p>
    <div id="fav-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、画像生成AI（Stable Diffusion / Midjourney / DALL-E 等）で使える配信バナー向けプロンプトの目安を生成します。生成結果はAIモデルにより異なる場合があります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'stream_banner_dot_prompt_gen';
  var LS_FAV_KEY = 'stream_banner_dot_prompt_favs';

  function saveSettings() {
    var ids = ['streamType','bannerSize','bgScene','palette','textPlacement','decoration','character','mood','extras'];
    var data = {};
    ids.forEach(function(id) { data[id] = document.getElementById(id).value; });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadSettings() {
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY));
      if (!data) return;
      Object.keys(data).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = data[id];
      });
    } catch(e) {}
  }

  function generate() {
    saveSettings();

    var streamType = document.getElementById('streamType').value;
    var bannerSize = document.getElementById('bannerSize').value;
    var bgScene = document.getElementById('bgScene').value;
    var palette = document.getElementById('palette').value;
    var textPlacement = document.getElementById('textPlacement').value;
    var decoration = document.getElementById('decoration').value;
    var character = document.getElementById('character').value;
    var mood = document.getElementById('mood').value;
    var extras = document.getElementById('extras').value.trim();

    var parts = [
      'pixel art',
      'livestream banner',
      bannerSize,
      streamType + ' theme',
      bgScene,
      palette,
      mood
    ];

    if (textPlacement) parts.push(textPlacement);
    if (decoration) parts.push(decoration);
    if (character) parts.push(character);
    if (extras) parts.push(extras);

    parts.push('clean pixel edges, no anti-aliasing, sharp pixels, high quality, detailed pixel art');

    var prompt = parts.join(', ');

    document.getElementById('prompt-text').textContent = prompt;
    var rc = document.getElementById('result');
    rc.className = 'result-card show';
    rc.style.display = 'block';

    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーする';
    btn.className = 'btn-copy';
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied();
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーしました!';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = 'コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  // ── お気に入り機能 ──
  function getFavs() {
    try {
      return JSON.parse(localStorage.getItem(LS_FAV_KEY)) || [];
    } catch(e) { return []; }
  }

  function setFavs(favs) {
    try { localStorage.setItem(LS_FAV_KEY, JSON.stringify(favs)); } catch(e) {}
  }

  function saveFav() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    var favs = getFavs();
    if (favs.indexOf(text) !== -1) {
      alert('このプロンプトは既にお気に入りに保存済みです');
      return;
    }
    favs.unshift(text);
    if (favs.length > 20) favs = favs.slice(0, 20);
    setFavs(favs);
    renderFavs();
  }

  function deleteFav(index) {
    var favs = getFavs();
    favs.splice(index, 1);
    setFavs(favs);
    renderFavs();
  }

  function copyFav(index) {
    var favs = getFavs();
    var text = favs[index];
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました');
      }).catch(function() {
        fallbackCopyAlert(text);
      });
    } else {
      fallbackCopyAlert(text);
    }
  }

  function fallbackCopyAlert(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('コピーしました'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function renderFavs() {
    var favs = getFavs();
    var container = document.getElementById('fav-list');
    if (favs.length === 0) {
      container.innerHTML = '<p class="fav-empty">お気に入りはまだありません</p>';
      return;
    }
    container.innerHTML = favs.map(function(f, i) {
      return '<div class="fav-item">'
        + '<div>' + escHtml(f) + '</div>'
        + '<div class="fav-item-actions">'
        + '<button onclick="copyFav(' + i + ')">コピー</button>'
        + '<button class="btn-del" onclick="deleteFav(' + i + ')">削除</button>'
        + '</div></div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期化
  loadSettings();
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
