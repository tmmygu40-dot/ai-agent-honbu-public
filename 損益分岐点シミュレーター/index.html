<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>損益分岐点シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>損益分岐点シミュレーター</h1>
    <p class="subtitle">固定費・変動費・価格を入力して黒字になる最低販売数を計算</p>

    <div class="card">
      <div class="form-group">
        <label for="fixedCost">固定費（円）</label>
        <input type="number" id="fixedCost" placeholder="例: 100000" min="0">
        <span class="hint">家賃・人件費など売上に関係なくかかる費用</span>
      </div>
      <div class="form-group">
        <label for="variableCost">変動費（円/個）</label>
        <input type="number" id="variableCost" placeholder="例: 300" min="0">
        <span class="hint">材料費・仕入れ費など1個あたりにかかる費用</span>
      </div>
      <div class="form-group">
        <label for="price">販売価格（円/個）</label>
        <input type="number" id="price" placeholder="例: 500" min="0">
        <span class="hint">1個あたりの売値</span>
      </div>
      <button id="calcBtn" onclick="calculate()">計算する</button>
    </div>

    <div class="result-card" id="resultCard" style="display:none;">
      <div class="result-main">
        <div class="result-label">損益分岐点（最低販売数）</div>
        <div class="result-value"><span id="bepQty">--</span> 個</div>
      </div>
      <div class="result-sub">
        <div class="result-item">
          <span class="r-label">粗利益（1個あたり）</span>
          <span class="r-value" id="unitMargin">--</span>
        </div>
        <div class="result-item">
          <span class="r-label">損益分岐点売上</span>
          <span class="r-value" id="bepSales">--</span>
        </div>
      </div>
    </div>

    <div class="chart-section" id="chartSection" style="display:none;">
      <h2>販売数ごとの損益シミュレーション</h2>
      <div class="chart-container">
        <div class="chart-labels" id="chartLabels"></div>
        <div class="chart-bars" id="chartBars"></div>
      </div>
      <div class="chart-legend">
        <span class="legend loss">赤字</span>
        <span class="legend zero">損益分岐点</span>
        <span class="legend profit">黒字</span>
      </div>
    </div>

    <div class="table-section" id="tableSection" style="display:none;">
      <h2>損益一覧</h2>
      <div class="table-wrapper">
        <table id="resultTable">
          <thead>
            <tr>
              <th>販売数</th>
              <th>売上</th>
              <th>総コスト</th>
              <th>損益</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
