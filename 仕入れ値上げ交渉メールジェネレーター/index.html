<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ値上げ交渉メールジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    /* トーン選択 */
    .tone-group { display: flex; gap: 0.5rem; }
    .tone-btn {
      flex: 1; padding: 0.6rem 0.5rem; font-size: 0.85rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .tone-btn.active { border-color: var(--accent); background: #fff8ee; color: var(--accent); }
    /* ボタン */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }
    /* 結果 */
    .result-card {
      display: none; background: var(--ok-bg);
      border: 2px solid var(--ok); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ok); margin-bottom: 0.8rem; }
    .mail-body {
      font-size: 0.88rem; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.65rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--ok);
      border: 2px solid var(--ok); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--ok-bg); }
    /* 値上げ率バッジ */
    .rate-badge {
      display: inline-block; padding: 0.2rem 0.6rem;
      background: #fef2f2; color: #b91c1c; border-radius: 6px;
      font-size: 0.78rem; font-weight: 700; margin-bottom: 0.6rem;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .tone-group { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
    @media (max-width: 480px) {
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>仕入れ値上げ交渉メールジェネレーター</h1>
    <p class="subtitle">商品・価格を入力するだけで交渉メールを即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label>仕入れ先（会社名）</label>
      <input type="text" id="supplier" placeholder="例：〇〇商事株式会社">
    </div>
    <div class="field">
      <label>自社名・担当者名</label>
      <input type="text" id="sender" placeholder="例：山田商店 山田太郎">
    </div>
    <div class="field">
      <label>商品名</label>
      <input type="text" id="item" placeholder="例：食用油（18L缶）">
    </div>
    <div class="row2">
      <div class="field">
        <label>現在の仕入れ価格（円）</label>
        <input type="number" id="currentPrice" placeholder="例: 3500" min="0">
      </div>
      <div class="field">
        <label>通知された値上げ後価格（円）</label>
        <input type="number" id="newPrice" placeholder="例: 4200" min="0">
        <p class="hint">値上げされた or 要求された価格</p>
      </div>
    </div>
    <div class="field">
      <label>希望する落としどころの価格（円）</label>
      <input type="number" id="targetPrice" placeholder="例: 3800" min="0">
      <p class="hint">交渉で目指したい着地価格（省略可）</p>
    </div>
    <div class="field">
      <label>交渉トーン</label>
      <div class="tone-group">
        <button class="tone-btn active" id="tone-polite" onclick="setTone('polite')">丁寧・協調型</button>
        <button class="tone-btn" id="tone-firm" onclick="setTone('firm')">毅然・強め型</button>
        <button class="tone-btn" id="tone-accept" onclick="setTone('accept')">受け入れ＋条件型</button>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">交渉メールを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成されたメール文</p>
    <div id="rateBadge"></div>
    <div class="mail-body" id="mailBody"></div>
    <button class="btn-copy" onclick="copyMail()">📋 メール文をコピー</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'purchaseNegMailGen_v1';
  var currentTone = 'polite';

  (function() {
    try {
      var s = JSON.parse(localStorage.getItem(LS_KEY));
      if (!s) return;
      ['supplier','sender','item','currentPrice','newPrice','targetPrice'].forEach(function(id) {
        if (s[id] !== undefined) { var el = document.getElementById(id); if (el) el.value = s[id]; }
      });
      if (s.tone) setTone(s.tone);
    } catch(e) {}
  })();

  function setTone(tone) {
    currentTone = tone;
    ['polite','firm','accept'].forEach(function(t) {
      document.getElementById('tone-'+t).classList.toggle('active', t === tone);
    });
  }

  function generate() {
    var supplier     = v('supplier')     || '〇〇様';
    var sender       = v('sender')       || '担当者';
    var item         = v('item')         || '商品';
    var currentPrice = parseFloat(document.getElementById('currentPrice').value);
    var newPrice     = parseFloat(document.getElementById('newPrice').value);
    var targetPrice  = parseFloat(document.getElementById('targetPrice').value);

    if (isNaN(currentPrice) || isNaN(newPrice)) {
      alert('現在価格と値上げ後価格を入力してください');
      return;
    }

    try { localStorage.setItem(LS_KEY, JSON.stringify({ supplier: v('supplier'), sender: sender, item: item, currentPrice: currentPrice, newPrice: newPrice, targetPrice: targetPrice || '', tone: currentTone })); } catch(e) {}

    var upRate    = ((newPrice - currentPrice) / currentPrice * 100).toFixed(1);
    var upAmt     = Math.round(newPrice - currentPrice);
    var hasTarget = !isNaN(targetPrice) && targetPrice > 0;
    var targetAmt = hasTarget ? Math.round(targetPrice - currentPrice) : 0;
    var targetRate = hasTarget ? ((targetPrice - currentPrice) / currentPrice * 100).toFixed(1) : 0;

    var mail = buildMail(supplier, sender, item, currentPrice, newPrice, targetPrice, upRate, upAmt, hasTarget, targetAmt, targetRate);

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('rateBadge').innerHTML =
      '<span class="rate-badge">値上げ率 +' + upRate + '% （+' + fmt(upAmt) + '円）</span>';
    document.getElementById('mailBody').textContent = mail;
  }

  function buildMail(supplier, sender, item, currentPrice, newPrice, targetPrice, upRate, upAmt, hasTarget, targetAmt, targetRate) {
    var today = fmtDate(new Date());

    if (currentTone === 'polite') {
      return [
        '件名：' + item + ' の仕入れ価格についてご相談',
        '',
        supplier + ' ご担当者様',
        '',
        'いつも大変お世話になっております。',
        sender + ' でございます。',
        '',
        'このたびは、' + item + ' の仕入れ価格改定についてご連絡いただき、ありがとうございます。',
        '昨今の原材料・輸送コストの高騰につきましては、弊社としても十分認識しているところでございます。',
        '',
        '現在の仕入れ価格：' + fmt(currentPrice) + ' 円',
        '改定後のご提示価格：' + fmt(newPrice) + ' 円（+' + upRate + '%）',
        '',
        '誠に恐れ入りますが、今回の値上げ幅（' + fmt(upAmt) + '円）につきましては、弊社の採算への影響が大きく、そのままお受けすることが難しい状況でございます。',
        (hasTarget
          ? '大変ご無理を申し上げますが、' + fmt(targetPrice) + ' 円（+' + targetRate + '%）程度での落としどころを、ご検討いただけますでしょうか。'
          : '段階的な価格移行や、数量増加による単価調整など、何らかのご対応をご検討いただけますと幸いでございます。'),
        '',
        '引き続き良好なお取引を継続してまいりたいと考えておりますので、ぜひご協議のお時間をいただければ幸いです。',
        'お忙しいところ恐れ入りますが、どうぞよろしくお願い申し上げます。',
        '',
        today,
        sender,
      ].join('\n');
    }

    if (currentTone === 'firm') {
      return [
        '件名：' + item + ' の価格改定についての申し入れ',
        '',
        supplier + ' ご担当者様',
        '',
        'お世話になっております。' + sender + ' です。',
        '',
        '' + item + ' の価格改定について、下記のとおり申し入れいたします。',
        '',
        '現行仕入れ価格：' + fmt(currentPrice) + ' 円',
        'ご提示価格：' + fmt(newPrice) + ' 円（+' + upRate + '%・+' + fmt(upAmt) + '円）',
        '',
        '率直に申し上げますと、今回の値上げ幅は弊社の経営に与える影響が甚大であり、',
        'このままでは仕入れ先の見直しを含めた検討を行わざるを得ない状況です。',
        '',
        (hasTarget
          ? '弊社としては ' + fmt(targetPrice) + ' 円（+' + targetRate + '%）を着地点として強くご要望申し上げます。'
          : '少なくとも値上げ幅を半減程度に抑えていただくことを強くお願いいたします。'),
        '',
        '早急にご回答をいただきますようお願いいたします。',
        '',
        today,
        sender,
      ].join('\n');
    }

    // accept（受け入れ＋条件型）
    return [
      '件名：' + item + ' の価格改定について（条件確認）',
      '',
      supplier + ' ご担当者様',
      '',
      'お世話になっております。' + sender + ' でございます。',
      '',
      'この度は ' + item + ' の価格改定についてご連絡いただきありがとうございます。',
      '改定後価格（' + fmt(newPrice) + '円、+' + upRate + '%）につきまして、',
      '弊社としては原則お受けする方向で検討しております。',
      '',
      'ただし、以下の条件についてご対応いただけますでしょうか。',
      '',
      '① 適用時期を〇月〇日以降とし、現行価格での発注を〇月末まで受け付けていただくこと',
      '② 一定数量以上の発注に対して、数量割引（例：〇〇個以上で ' + (hasTarget ? fmt(targetPrice) + '円/個' : '－') + '）をご検討いただくこと',
      '③ 次回価格改定の際は、3ヶ月以上前にご通知いただくこと',
      '',
      'ご確認のうえ、ご回答いただければ幸いです。',
      '引き続きよろしくお願い申し上げます。',
      '',
      today,
      sender,
    ].join('\n');
  }

  function copyMail() {
    var text = document.getElementById('mailBody').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { alert('コピーしました'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      alert('コピーしました');
    }
  }

  function v(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmtDate(d) { return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日'; }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
