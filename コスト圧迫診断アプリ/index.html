<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コスト圧迫診断アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>コスト圧迫診断</h1>
    <p class="subtitle">仕入れ・光熱費・運賃が同時に上がった場合の利益と値上げ必要額を確認</p>

    <section class="card">
      <h2>現状の数値</h2>
      <div class="form-group">
        <label for="revenue">売上（円）</label>
        <input type="number" id="revenue" placeholder="例：1000000" min="0">
      </div>
      <div class="form-group">
        <label for="purchase">仕入れコスト（円）</label>
        <input type="number" id="purchase" placeholder="例：400000" min="0">
      </div>
      <div class="form-group">
        <label for="utility">光熱費（円）</label>
        <input type="number" id="utility" placeholder="例：50000" min="0">
      </div>
      <div class="form-group">
        <label for="freight">運賃（円）</label>
        <input type="number" id="freight" placeholder="例：30000" min="0">
      </div>
      <div class="form-group">
        <label for="otherCost">その他固定費（円）</label>
        <input type="number" id="otherCost" placeholder="例：100000" min="0">
      </div>
      <div class="form-group">
        <label for="targetMargin">目標利益率（%）</label>
        <input type="number" id="targetMargin" placeholder="例：20" min="0" max="100" step="0.1">
      </div>
    </section>

    <section class="card">
      <h2>コスト増加額</h2>
      <div class="form-group">
        <label for="purchaseIncrease">仕入れ増加額（円）</label>
        <input type="number" id="purchaseIncrease" placeholder="例：50000" min="0">
      </div>
      <div class="form-group">
        <label for="utilityIncrease">光熱費増加額（円）</label>
        <input type="number" id="utilityIncrease" placeholder="例：10000" min="0">
      </div>
      <div class="form-group">
        <label for="freightIncrease">運賃増加額（円）</label>
        <input type="number" id="freightIncrease" placeholder="例：5000" min="0">
      </div>
    </section>

    <div class="button-row">
      <button id="calcBtn" class="btn-primary">診断する</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>

    <section class="card result-card" id="resultSection" style="display:none;">
      <h2>診断結果</h2>

      <div class="result-block">
        <h3>現状</h3>
        <div class="result-row">
          <span>総コスト</span>
          <span id="currentTotalCost" class="value">-</span>
        </div>
        <div class="result-row">
          <span>利益額</span>
          <span id="currentProfit" class="value">-</span>
        </div>
        <div class="result-row">
          <span>利益率</span>
          <span id="currentMargin" class="value">-</span>
        </div>
      </div>

      <div class="result-block">
        <h3>コスト増加後</h3>
        <div class="result-row">
          <span>コスト増加合計</span>
          <span id="totalIncrease" class="value increase">-</span>
        </div>
        <div class="result-row">
          <span>新総コスト</span>
          <span id="newTotalCost" class="value">-</span>
        </div>
        <div class="result-row">
          <span>利益残高</span>
          <span id="newProfit" class="value">-</span>
        </div>
        <div class="result-row">
          <span>新利益率</span>
          <span id="newMargin" class="value">-</span>
        </div>
      </div>

      <div class="result-block highlight-block">
        <h3>値上げ必要額</h3>
        <div class="result-row big">
          <span>目標利益率を達成するための値上げ額</span>
          <span id="requiredPriceUp" class="value big-value">-</span>
        </div>
        <div class="result-row">
          <span>値上げ後の売上目標</span>
          <span id="newRevenue" class="value">-</span>
        </div>
        <div class="result-row">
          <span>値上げ率</span>
          <span id="priceUpRate" class="value">-</span>
        </div>
      </div>

      <div id="alertBox" class="alert" style="display:none;"></div>
    </section>
  </div>

  <script>
const STORAGE_KEY = 'cost_pressure_app';

const fields = [
  'revenue', 'purchase', 'utility', 'freight', 'otherCost', 'targetMargin',
  'purchaseIncrease', 'utilityIncrease', 'freightIncrease'
];

function saveInputs() {
  const data = {};
  fields.forEach(id => {
    data[id] = document.getElementById(id).value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadInputs() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    fields.forEach(id => {
      if (data[id] !== undefined) {
        document.getElementById(id).value = data[id];
      }
    });
  } catch (e) {}
}

function val(id) {
  return parseFloat(document.getElementById(id).value) || 0;
}

function fmt(num) {
  return num.toLocaleString('ja-JP') + ' 円';
}

function fmtPct(num) {
  return num.toFixed(1) + ' %';
}

function calculate() {
  const revenue = val('revenue');
  const purchase = val('purchase');
  const utility = val('utility');
  const freight = val('freight');
  const otherCost = val('otherCost');
  const targetMargin = val('targetMargin');

  const purchaseIncrease = val('purchaseIncrease');
  const utilityIncrease = val('utilityIncrease');
  const freightIncrease = val('freightIncrease');

  if (revenue <= 0) {
    const alertBox = document.getElementById('alertBox');
    alertBox.className = 'alert alert-info';
    alertBox.textContent = '⚠️ 売上を入力してください。';
    alertBox.style.display = 'block';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  const currentTotalCost = purchase + utility + freight + otherCost;
  const currentProfit = revenue - currentTotalCost;
  const currentMargin = revenue > 0 ? (currentProfit / revenue) * 100 : 0;

  const totalIncrease = purchaseIncrease + utilityIncrease + freightIncrease;
  const newTotalCost = currentTotalCost + totalIncrease;
  const newProfit = revenue - newTotalCost;
  const newMargin = revenue > 0 ? (newProfit / revenue) * 100 : 0;

  let requiredRevenue = 0;
  let requiredPriceUp = 0;
  let priceUpRate = 0;

  if (targetMargin > 0 && targetMargin < 100) {
    requiredRevenue = newTotalCost / (1 - targetMargin / 100);
    requiredPriceUp = requiredRevenue - revenue;
    priceUpRate = revenue > 0 ? (requiredPriceUp / revenue) * 100 : 0;
  } else if (targetMargin === 0) {
    requiredRevenue = newTotalCost;
    requiredPriceUp = requiredRevenue - revenue;
    priceUpRate = revenue > 0 ? (requiredPriceUp / revenue) * 100 : 0;
  }

  document.getElementById('currentTotalCost').textContent = fmt(currentTotalCost);
  document.getElementById('currentProfit').textContent = fmt(currentProfit);
  document.getElementById('currentProfit').className = 'value ' + (currentProfit >= 0 ? 'profit-positive' : 'profit-negative');
  document.getElementById('currentMargin').textContent = fmtPct(currentMargin);

  document.getElementById('totalIncrease').textContent = fmt(totalIncrease);
  document.getElementById('newTotalCost').textContent = fmt(newTotalCost);
  document.getElementById('newProfit').textContent = fmt(newProfit);
  document.getElementById('newProfit').className = 'value ' + (newProfit >= 0 ? 'profit-positive' : 'profit-negative');
  document.getElementById('newMargin').textContent = fmtPct(newMargin);

  if (targetMargin > 0 && targetMargin < 100) {
    document.getElementById('requiredPriceUp').textContent = requiredPriceUp > 0 ? fmt(Math.ceil(requiredPriceUp)) : '値上げ不要';
    document.getElementById('newRevenue').textContent = fmt(Math.ceil(requiredRevenue));
    document.getElementById('priceUpRate').textContent = requiredPriceUp > 0 ? fmtPct(priceUpRate) : '0.0 %';
  } else {
    document.getElementById('requiredPriceUp').textContent = '目標利益率を入力してください';
    document.getElementById('newRevenue').textContent = '-';
    document.getElementById('priceUpRate').textContent = '-';
  }

  const alertBox = document.getElementById('alertBox');
  if (newProfit < 0) {
    alertBox.className = 'alert alert-info';
    alertBox.textContent = '⚠️ 現在の売上ではコスト増加後に赤字になります。値上げが必要です。';
    alertBox.style.display = 'block';
  } else if (newMargin < targetMargin && targetMargin > 0) {
    alertBox.className = 'alert alert-info';
    alertBox.textContent = `⚠️ 利益率が目標（${targetMargin}%）を下回ります（${fmtPct(newMargin)}）。値上げを検討してください。`;
    alertBox.style.display = 'block';
  } else if (requiredPriceUp <= 0 && targetMargin > 0) {
    alertBox.className = 'alert alert-success';
    alertBox.textContent = '✅ 現在の売上のまま目標利益率を達成できています。';
    alertBox.style.display = 'block';
  } else {
    alertBox.style.display = 'none';
  }

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  saveInputs();
}

function resetAll() {
  fields.forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('resultSection').style.display = 'none';
  localStorage.removeItem(STORAGE_KEY);
}

document.getElementById('calcBtn').addEventListener('click', calculate);
document.getElementById('resetBtn').addEventListener('click', resetAll);

fields.forEach(id => {
  document.getElementById(id).addEventListener('change', saveInputs);
});

loadInputs();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
