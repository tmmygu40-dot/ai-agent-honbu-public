<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有給管理アプリ（スタッフ版）</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>有給管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <!-- スタッフ登録フォーム -->
    <section class="card">
      <h2>スタッフ登録</h2>
      <div class="form-group">
        <label>スタッフ名</label>
        <input type="text" id="staffName" placeholder="例：田中 太郎">
      </div>
      <div class="form-group">
        <label>付与日数</label>
        <input type="number" id="grantDays" min="0" max="40" placeholder="例：10">
      </div>
      <div class="form-group">
        <label>有効期限</label>
        <input type="date" id="expireDate">
      </div>
      <button class="btn-primary" onclick="addStaff()">スタッフを追加</button>
    </section>

    <!-- スタッフ一覧 -->
    <section class="card">
      <h2>スタッフ一覧</h2>
      <div id="staffList"></div>
    </section>

    <!-- 有給取得記録モーダル -->
    <div id="recordModal" class="modal hidden">
      <div class="modal-content">
        <h2>有給取得を記録</h2>
        <p id="modalStaffName" class="modal-staff-name"></p>
        <div class="form-group">
          <label>取得日</label>
          <input type="date" id="recordDate">
        </div>
        <div class="form-group">
          <label>日数</label>
          <input type="number" id="recordDays" min="0.5" max="20" step="0.5" value="1">
        </div>
        <div class="form-group">
          <label>備考（任意）</label>
          <input type="text" id="recordNote" placeholder="例：夏季休暇">
        </div>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="saveRecord()">記録する</button>
          <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- 取得履歴モーダル -->
    <div id="historyModal" class="modal hidden">
      <div class="modal-content">
        <h2>取得履歴</h2>
        <p id="historyStaffName" class="modal-staff-name"></p>
        <div id="historyList"></div>
        <button class="btn-secondary" onclick="closeHistoryModal()">閉じる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
