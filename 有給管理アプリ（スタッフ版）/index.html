<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有給管理アプリ（スタッフ版）</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>有給管理</h1>

    <!-- スタッフ登録フォーム -->
    <section class="card">
      <h2>スタッフ登録</h2>
      <div class="form-group">
        <label>スタッフ名</label>
        <input type="text" id="staffName" placeholder="例：田中 太郎">
      </div>
      <div class="form-group">
        <label>付与日数</label>
        <input type="number" id="grantDays" min="0" max="40" placeholder="例：10">
      </div>
      <div class="form-group">
        <label>有効期限</label>
        <input type="date" id="expireDate">
      </div>
      <button class="btn-primary" onclick="addStaff()">スタッフを追加</button>
    </section>

    <!-- スタッフ一覧 -->
    <section class="card">
      <h2>スタッフ一覧</h2>
      <div id="staffList"></div>
    </section>

    <!-- 有給取得記録モーダル -->
    <div id="recordModal" class="modal hidden">
      <div class="modal-content">
        <h2>有給取得を記録</h2>
        <p id="modalStaffName" class="modal-staff-name"></p>
        <div class="form-group">
          <label>取得日</label>
          <input type="date" id="recordDate">
        </div>
        <div class="form-group">
          <label>日数</label>
          <input type="number" id="recordDays" min="0.5" max="20" step="0.5" value="1">
        </div>
        <div class="form-group">
          <label>備考（任意）</label>
          <input type="text" id="recordNote" placeholder="例：夏季休暇">
        </div>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="saveRecord()">記録する</button>
          <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- 取得履歴モーダル -->
    <div id="historyModal" class="modal hidden">
      <div class="modal-content">
        <h2>取得履歴</h2>
        <p id="historyStaffName" class="modal-staff-name"></p>
        <div id="historyList"></div>
        <button class="btn-secondary" onclick="closeHistoryModal()">閉じる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
