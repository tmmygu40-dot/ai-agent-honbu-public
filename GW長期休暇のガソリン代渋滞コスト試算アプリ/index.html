<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⛽ GW長期ドライブ費用試算ツール</title>
  <meta name="description" content="走行距離・燃費・ガソリン価格を入れるだけで、通常時と渋滞時のガソリン代をリアルタイム試算。GW予算計画に最適です。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #ff6b6b;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #cc4444, 0 6px 16px rgba(255,107,107,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #cc4444, 0 2px 8px rgba(255,107,107,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── print ── */
    @media print {
      .app-header, .btn-calc, .btn-pdf, .back-link, p[style*="改善案"] { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>⛽ GW長期ドライブ費用試算ツール</h1>
    <p class="subtitle">走行距離・燃費・ガソリン価格を入れるだけで、通常時と渋滞時のガソリン代をリアルタイム試算。GW予算計画に最適です。</p>
  </div>

  <div class="card">
    <div class="card-title">走行条件を入力</div>
    <div class="field">
      <label for="distance">走行距離 (km)</label>
      <input type="number" id="distance" placeholder="例）400" min="0" step="0.1">
      <div class="hint">ドライブの片道または往復距離を入力</div>
    </div>
    <div class="field">
      <label for="mpg">燃費 (km/L)</label>
      <input type="number" id="mpg" placeholder="例）12" min="0.1" step="0.1">
      <div class="hint">あなたの車の平均燃費（燃料計から推定でOK）</div>
    </div>
    <div class="field">
      <label for="price">ガソリン価格 (円/L)</label>
      <input type="number" id="price" placeholder="例）170" min="0" step="1">
      <div class="hint">現在のガソリンスタンド価格</div>
    </div>
    <div class="field">
      <label for="traffic">渋滞予想時間 (時間)</label>
      <input type="number" id="traffic" placeholder="例）2" min="0" step="0.5">
      <div class="hint">GW期間の渋滞で失われる時間。時間 = 距離/速度</div>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">計算実行</button>

  <div id="result" class="result-card">
    <div class="result-label">ガソリン代（通常 + 渋滞分）</div>
    <div class="result-value" id="rv">¥ 0</div>
    <div class="result-note" id="rn">条件を入力して「計算実行」をタップ</div>
  </div>

  <div class="card" id="detail" style="display:none;">
    <div class="card-title">内訳</div>
    <table class="detail-table">
      <tbody id="db"></tbody>
    </table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // データ保存キー
  var STORAGE_KEY = 'gw_gasoline_calc';

  // ページ読み込み時にデータを復元
  window.addEventListener('DOMContentLoaded', function() {
    loadData();
  });

  // 入力変更時に自動保存
  ['distance', 'mpg', 'price', 'traffic'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', saveData);
  });

  function calc() {
    var distance = parseFloat(document.getElementById('distance').value);
    var mpg = parseFloat(document.getElementById('mpg').value);
    var price = parseFloat(document.getElementById('price').value);
    var traffic = parseFloat(document.getElementById('traffic').value);

    if (isNaN(distance) || isNaN(mpg) || isNaN(price)) {
      showErr('走行距離・燃費・ガソリン価格は必須です');
      return;
    }
    if (distance <= 0 || mpg <= 0 || price <= 0) {
      showErr('すべての値は0より大きい数値を入力してください');
      return;
    }

    traffic = isNaN(traffic) ? 0 : Math.max(0, traffic);
    saveData();

    // 計算ロジック
    var normalGasoline = distance / mpg * price;
    var trafficGasoline = 0;
    if (traffic > 0) {
      // 渋滞時：平均時速50km/hで進む場合、1時間で50km進む = 50/mpg リットル消費
      // 但し渋滞時は燃費が30%低下するため、実際の消費量 = 50/mpg * 1.3 リットル/時間
      trafficGasoline = (traffic * 50 / mpg * 1.3) * price;
    }
    var totalCost = normalGasoline + trafficGasoline;

    // 予算感の判定
    var level = totalCost <= 5000 ? 'ok' : totalCost <= 10000 ? 'warn' : 'ng';
    var eval_msg = level === 'ok'   ? 'GW予算内で収まりそう'
                 : level === 'warn' ? 'ガソリン代に注意が必要'
                 : 'かなりのガソリン代。渋滞回避を検討';

    showResult(level, fmt(Math.round(totalCost)) + ' 円', eval_msg);
    showDetail([
      ['走行距離', fmt(distance) + ' km'],
      ['燃費', fmt(mpg) + ' km/L'],
      ['通常時ガソリン代', fmt(Math.round(normalGasoline)) + ' 円'],
      ['渋滞時間', fmt(traffic) + ' 時間'],
      ['渋滞時追加ガソリン代', fmt(Math.round(trafficGasoline)) + ' 円'],
      ['合計ガソリン代', fmt(Math.round(totalCost)) + ' 円', true],
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) {
    return typeof n === 'number' ? Math.round(n).toLocaleString('ja-JP') : n.toLocaleString('ja-JP');
  }

  function saveData() {
    var data = {
      distance: document.getElementById('distance').value,
      mpg: document.getElementById('mpg').value,
      price: document.getElementById('price').value,
      traffic: document.getElementById('traffic').value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    var json = localStorage.getItem(STORAGE_KEY);
    if (json) {
      try {
        var data = JSON.parse(json);
        if (data.distance) document.getElementById('distance').value = data.distance;
        if (data.mpg) document.getElementById('mpg').value = data.mpg;
        if (data.price) document.getElementById('price').value = data.price;
        if (data.traffic) document.getElementById('traffic').value = data.traffic;
      } catch (e) {}
    }
  }
  </script>
