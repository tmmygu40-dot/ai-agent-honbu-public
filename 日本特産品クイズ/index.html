<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本特産品クイズ｜都道府県を当てる4択ゲーム</title>
  <meta name="description" content="ずんだ餅は何県？地元の名物は誰でも分かるけど、他県の特産品はどれくらい知ってる？4択から都道府県を選ぶだけの日本特産品クイズ。10問でアナタの全国知識を即チェック。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .meta-row .qno { font-weight: 700; color: var(--accent); }
    .meta-row .score { font-weight: 700; }

    .specialty {
      text-align: center; font-size: 1.6rem; font-weight: 900;
      padding: 1.4rem 0.8rem; line-height: 1.3;
      background: var(--accent-light);
      border-radius: 12px; margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .specialty .label { display: block; font-size: 0.72rem; color: var(--text-sub); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 0.4rem; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .choice-btn {
      padding: 0.95rem 0.6rem;
      font-size: 1rem; font-weight: 700;
      background: #fff; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
    .choice-btn.wrong   { background: var(--ng-bg); border-color: var(--ng); color: var(--ng); }

    .feedback {
      display: none; margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.95rem; line-height: 1.5;
      text-align: center; font-weight: 700;
    }
    .feedback.ok { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--ok); }
    .feedback.ng { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--ng); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin: 0.5rem 0 0.6rem; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .review-list { margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto; }
    .review-item {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0.7rem 0.9rem; margin-bottom: 0.5rem;
      display: flex; justify-content: space-between; gap: 0.5rem;
      font-size: 0.88rem;
    }
    .review-item .mark { font-weight: 800; flex-shrink: 0; }
    .review-item.ok .mark { color: var(--ok); }
    .review-item.ng .mark { color: var(--ng); }
    .review-item .qa { flex: 1; }
    .review-item .qa .q { font-weight: 700; color: var(--text); margin-bottom: 0.15rem; }
    .review-item .qa .a { color: var(--text-sub); font-size: 0.82rem; }

    @media (max-width: 380px) {
      .specialty { font-size: 1.35rem; }
      .choice-btn { font-size: 0.92rem; padding: 0.85rem 0.4rem; }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>日本特産品クイズ</h1>
    <p class="subtitle">この特産品、何県？10問で全国知識をワンタップでチェック</p>
  </header>

  <!-- スタートカード -->
  <div class="card" id="start-card">
    <p class="card-title">遊び方</p>
    <p style="font-size:0.95rem;line-height:1.7;color:var(--text-sub);margin-bottom:0.8rem;">
      画面に出てくる特産品が、どの都道府県のものかを4択から1つ選びます。<br>
      全10問。スコアと正答率が最後に出ます。
    </p>
    <p style="font-size:0.82rem;line-height:1.6;color:var(--text-sub);">
      ※ ベストスコアはこの端末に保存されます。
    </p>
  </div>
  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズを始める</button>

  <!-- 出題カード -->
  <div class="card" id="quiz-card" style="display:none">
    <div class="meta-row">
      <span class="qno" id="qno">第1問 / 全10問</span>
      <span class="score" id="score-now">スコア 0</span>
    </div>
    <div class="specialty">
      <span class="label">この特産品はどこの都道府県？</span>
      <span id="specialty-name">—</span>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-calc" id="next-btn" style="display:none;margin-top:1rem;" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="result-note" id="rb" style="margin-top:0.5rem;"></p>
  </div>

  <!-- 結果カード下のレビュー一覧 -->
  <div class="review-list" id="review-list" style="display:none"></div>

  <!-- 再挑戦ボタン -->
  <button class="btn-calc" id="retry-btn" style="display:none" onclick="startQuiz()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、農林水産省・観光庁・各自治体公式サイトなどの公開データを参考に、目安として使いやすく整理しています。最新情報は公式情報をご確認ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 問題プール（特産品 → 都道府県） ──
  var POOL = [
    { q: 'ずんだ餅', a: '宮城県' },
    { q: 'きりたんぽ鍋', a: '秋田県' },
    { q: 'わんこそば', a: '岩手県' },
    { q: '芋煮', a: '山形県' },
    { q: 'いちご「あまおう」', a: '福岡県' },
    { q: 'うどん（讃岐うどん）', a: '香川県' },
    { q: '明石焼き', a: '兵庫県' },
    { q: 'たこ焼き', a: '大阪府' },
    { q: '生八つ橋', a: '京都府' },
    { q: '伊勢うどん', a: '三重県' },
    { q: '味噌煮込みうどん', a: '愛知県' },
    { q: '富山ブラックラーメン', a: '富山県' },
    { q: '加賀友禅', a: '石川県' },
    { q: 'ほうとう', a: '山梨県' },
    { q: '信州そば', a: '長野県' },
    { q: '水戸納豆', a: '茨城県' },
    { q: 'いちご「とちおとめ」', a: '栃木県' },
    { q: '下仁田ねぎ', a: '群馬県' },
    { q: '川越芋', a: '埼玉県' },
    { q: '落花生', a: '千葉県' },
    { q: 'もんじゃ焼き', a: '東京都' },
    { q: '崎陽軒のシウマイ', a: '神奈川県' },
    { q: 'へぎそば', a: '新潟県' },
    { q: '若狭塗箸', a: '福井県' },
    { q: '鰻のひつまぶし', a: '愛知県' },
    { q: 'ふぐ料理', a: '山口県' },
    { q: 'もみじ饅頭', a: '広島県' },
    { q: '出雲そば', a: '島根県' },
    { q: '鳥取砂丘らっきょう', a: '鳥取県' },
    { q: '岡山きびだんご', a: '岡山県' },
    { q: '徳島ラーメン', a: '徳島県' },
    { q: '鯛めし', a: '愛媛県' },
    { q: '鰹のたたき', a: '高知県' },
    { q: 'もつ鍋', a: '福岡県' },
    { q: '佐賀牛', a: '佐賀県' },
    { q: '長崎ちゃんぽん', a: '長崎県' },
    { q: '熊本馬刺し', a: '熊本県' },
    { q: '関アジ・関サバ', a: '大分県' },
    { q: '宮崎マンゴー', a: '宮崎県' },
    { q: '黒豚', a: '鹿児島県' },
    { q: 'ゴーヤチャンプルー', a: '沖縄県' },
    { q: 'ジンギスカン', a: '北海道' },
    { q: '十勝バター', a: '北海道' },
    { q: '青森りんご', a: '青森県' },
    { q: '南部鉄器', a: '岩手県' },
    { q: '会津漆器', a: '福島県' },
    { q: '甲州ワイン', a: '山梨県' },
    { q: '紀州梅干し', a: '和歌山県' },
    { q: '奈良漬', a: '奈良県' },
    { q: '近江牛', a: '滋賀県' }
  ];

  // ── 全都道府県リスト（4択ダミー候補プール） ──
  var ALL_PREF = [
    '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
    '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
    '新潟県','富山県','石川県','福井県','山梨県','長野県',
    '岐阜県','静岡県','愛知県','三重県',
    '滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
    '鳥取県','島根県','岡山県','広島県','山口県',
    '徳島県','香川県','愛媛県','高知県',
    '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'
  ];

  var QUESTIONS_PER_GAME = 10;
  var STORAGE_KEY = 'nihon_tokusan_quiz_best';

  var state = {
    questions: [],
    idx: 0,
    score: 0,
    answered: false,
    review: []
  };

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function pickQuestions() {
    var picked = shuffle(POOL).slice(0, QUESTIONS_PER_GAME);
    return picked.map(function (item) {
      var dummies = shuffle(ALL_PREF.filter(function (p) { return p !== item.a; })).slice(0, 3);
      var choices = shuffle([item.a].concat(dummies));
      return { q: item.q, a: item.a, choices: choices };
    });
  }

  function startQuiz() {
    state.questions = pickQuestions();
    state.idx = 0;
    state.score = 0;
    state.answered = false;
    state.review = [];

    document.getElementById('start-card').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('review-list').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';

    renderQuestion();
  }

  function renderQuestion() {
    var qData = state.questions[state.idx];
    state.answered = false;

    document.getElementById('qno').textContent = '第' + (state.idx + 1) + '問 / 全' + QUESTIONS_PER_GAME + '問';
    document.getElementById('score-now').textContent = 'スコア ' + state.score;
    document.getElementById('specialty-name').textContent = qData.q;

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    qData.choices.forEach(function (c) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = function () { selectChoice(c, btn); };
      choicesEl.appendChild(btn);
    });

    var fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.textContent = '';
    fb.className = 'feedback';

    document.getElementById('next-btn').style.display = 'none';
  }

  function selectChoice(chosen, btn) {
    if (state.answered) return;
    state.answered = true;

    var qData = state.questions[state.idx];
    var correct = (chosen === qData.a);
    if (correct) state.score++;

    // 全ボタン無効化＆色付け
    var btns = document.querySelectorAll('#choices .choice-btn');
    btns.forEach(function (b) {
      b.disabled = true;
      if (b.textContent === qData.a) b.classList.add('correct');
      else if (b === btn) b.classList.add('wrong');
    });

    var fb = document.getElementById('feedback');
    if (correct) {
      fb.className = 'feedback ok';
      fb.textContent = '⭕ 正解！ ' + qData.a + ' の特産品です';
    } else {
      fb.className = 'feedback ng';
      fb.textContent = '❌ 残念。正解は ' + qData.a + ' です';
    }
    fb.style.display = 'block';

    state.review.push({ q: qData.q, a: qData.a, chosen: chosen, correct: correct });

    document.getElementById('score-now').textContent = 'スコア ' + state.score;

    var nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = (state.idx + 1 >= QUESTIONS_PER_GAME) ? '結果を見る' : '次の問題へ';
    nextBtn.style.display = 'block';
  }

  function nextQuestion() {
    state.idx++;
    if (state.idx >= QUESTIONS_PER_GAME) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function finishQuiz() {
    document.getElementById('quiz-card').style.display = 'none';

    var pct = Math.round(state.score / QUESTIONS_PER_GAME * 100);
    var level, evalMsg;
    if (state.score >= 9)      { level = 'ok';   evalMsg = '全国博士レベル！'; }
    else if (state.score >= 7) { level = 'ok';   evalMsg = 'なかなかの全国通'; }
    else if (state.score >= 5) { level = 'warn'; evalMsg = 'まずまず。あと一歩'; }
    else                       { level = 'ng';   evalMsg = '伸びしろたっぷり'; }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = state.score + ' / ' + QUESTIONS_PER_GAME + ' 問正解';
    document.getElementById('re').textContent = evalMsg;
    document.getElementById('rn').textContent = '正答率 ' + pct + '％';

    // ベストスコア
    var best = 0;
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw !== null) best = parseInt(raw, 10) || 0;
    } catch (e) { /* ignore */ }

    var bestMsg = '';
    if (state.score > best) {
      try { localStorage.setItem(STORAGE_KEY, String(state.score)); } catch (e) {}
      bestMsg = '🏆 ベストスコア更新！（前回: ' + best + ' / ' + QUESTIONS_PER_GAME + '）';
    } else {
      bestMsg = 'ベストスコア: ' + best + ' / ' + QUESTIONS_PER_GAME;
    }
    document.getElementById('rb').textContent = bestMsg;

    // レビュー一覧
    var reviewEl = document.getElementById('review-list');
    reviewEl.innerHTML = '<p class="card-title" style="max-width:600px;margin:0 auto 0.6rem;color:var(--accent);">この10問のおさらい</p>' +
      state.review.map(function (r) {
        var mark = r.correct ? '⭕' : '❌';
        var cls = r.correct ? 'ok' : 'ng';
        var ans = r.correct
          ? r.a
          : 'あなた: ' + r.chosen + ' / 正解: ' + r.a;
        return '<div class="review-item ' + cls + '">' +
                 '<span class="mark">' + mark + '</span>' +
                 '<div class="qa"><div class="q">' + r.q + '</div><div class="a">' + ans + '</div></div>' +
               '</div>';
      }).join('');
    reviewEl.style.display = 'block';

    document.getElementById('retry-btn').style.display = 'block';

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  </script>
