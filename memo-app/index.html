<body>

  <div class="container">
    <h1>📝 メモ一覧</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。無料・登録不要・スマホ対応。</p>

    </div>
  </div>
