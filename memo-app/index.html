<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルメモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <div class="container">
    <h1>📝 メモ一覧</h1>

    <!-- 新しいメモを書く入力エリア -->
    <div class="input-area">
      <textarea id="memoInput" placeholder="ここにメモを書いてください..." rows="4"></textarea>
      <button id="addBtn">追加する</button>
    </div>

    <!-- メモの一覧を表示するエリア -->
    <div id="memoList" class="memo-list">
      <!-- メモがここに自動で入る -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
