<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ふるさと納税・iDeCo・NISA・医療費控除など、知らないと損する日本の節税制度を10問4択で楽しく学べる無料クイズ。確定申告前のおさらいや初心者の入門にも最適です。">
  <title>節税知識クイズ｜知らないと損する10問チェック</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .q-text { font-size: 0.98rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.8rem; }
    .choices { display: flex; flex-direction: column; gap: 0.45rem; }
    .choice {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice input[type="radio"] { margin-top: 0.15rem; flex-shrink: 0; cursor: pointer; }
    .choice .choice-text { font-size: 0.92rem; line-height: 1.45; color: var(--text); }
    .choice:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; margin: 0 auto 1.2rem; padding: 0.55rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .best-note { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.6rem; }

    .review-item {
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
    }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; line-height: 1.4; }
    .review-tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.1rem 0.5rem; border-radius: 4px; margin-right: 0.4rem; vertical-align: middle;
    }
    .review-tag.ok { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
    .review-tag.ng { background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng); }
    .review-ans { font-size: 0.85rem; color: var(--text); margin: 0.25rem 0; }
    .review-exp { font-size: 0.82rem; color: var(--text-sub); line-height: 1.55; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>節税知識クイズ</h1>
    <p class="subtitle">知らないと損する日本の節税制度を10問4択で楽しくチェック ※2026年4月時点の参考データ。最新情報は国税庁公式をご確認ください</p>
  </header>

  <div class="card">
    <p class="card-title">全10問</p>
    <p style="font-size:0.85rem;color:var(--text-sub);line-height:1.55;">
      ふるさと納税・iDeCo・NISA・医療費控除などの基礎を10問でおさらい。各問1点、最後にまとめて採点します。
    </p>
  </div>

  <div id="quiz-area"></div>

  <button class="btn-calc" onclick="grade()">採点する</button>
  <button class="btn-reset no-print" onclick="resetQuiz()">回答をリセット</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <p class="best-note"    id="rb"></p>
  </div>

  <div class="card" id="review" style="display:none">
    <p class="card-title">解答と解説</p>
    <div id="review-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国税庁・金融庁などの公開資料を参考に学習用として整理しています。実際の税務判断は最新の公式情報・税理士等にご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUIZ = [
    {
      q: 'ふるさと納税の「自己負担額」は最低いくら？',
      c: ['0円', '1,000円', '2,000円', '5,000円'],
      a: 2,
      e: '寄附額のうち2,000円が自己負担で、それを超える分が所得税・住民税から控除されます(上限あり)。'
    },
    {
      q: 'iDeCoの掛金は所得税ではどの控除になる？',
      c: ['生命保険料控除', '小規模企業共済等掛金控除', '医療費控除', '寄附金控除'],
      a: 1,
      e: 'iDeCoの掛金は全額「小規模企業共済等掛金控除」として所得控除の対象になります。'
    },
    {
      q: '新NISAの「つみたて投資枠」の年間投資上限額は？(2024年以降)',
      c: ['40万円', '80万円', '120万円', '240万円'],
      a: 2,
      e: 'つみたて投資枠は年間120万円が上限。成長投資枠は年間240万円で、合計年間360万円まで投資できます。'
    },
    {
      q: '医療費控除は、年間医療費がいくらを超えると対象になる？(所得200万円以上の場合)',
      c: ['5万円', '10万円', '20万円', '50万円'],
      a: 1,
      e: '年間医療費が10万円(または総所得の5%のいずれか低い方)を超えた分が医療費控除の対象です。'
    },
    {
      q: '配偶者控除を満額(38万円)受けられる配偶者の給与収入の上限は？',
      c: ['100万円', '103万円', '130万円', '150万円'],
      a: 1,
      e: '配偶者の給与収入が103万円以下なら配偶者控除が満額。150万円までは配偶者特別控除の対象になります。'
    },
    {
      q: '住宅ローン控除の最長適用期間は？(新築・認定住宅などの場合)',
      c: ['5年', '10年', '13年', '20年'],
      a: 2,
      e: '新築・買取再販で認定住宅・ZEH水準・省エネ基準適合住宅などは最長13年間、住宅ローン控除を受けられます。'
    },
    {
      q: '給与所得者の副業所得が、確定申告を不要にできる金額の上限は？',
      c: ['10万円', '20万円', '38万円', '48万円'],
      a: 1,
      e: '給与所得者は、給与以外の所得が年20万円以下なら所得税の確定申告は不要(ただし住民税は別途申告が必要)。'
    },
    {
      q: '生命保険料控除(新制度)の所得税側の年間上限額は？(3区分合計)',
      c: ['5万円', '8万円', '12万円', '20万円'],
      a: 2,
      e: '新制度では「一般生命」「介護医療」「個人年金」の3区分で各最大4万円、合計上限12万円(所得税側)です。'
    },
    {
      q: 'ふるさと納税の「控除上限額」は主に何で決まる？',
      c: ['年齢', '年収と家族構成', '居住地', '寄附先の数'],
      a: 1,
      e: 'ふるさと納税の控除上限は主に年収と家族構成(住民税所得割額)で決まります。シミュレータで概算が可能です。'
    },
    {
      q: '新NISA(2024年以降)の非課税保有期間は？',
      c: ['5年', '20年', '無期限', '60歳まで'],
      a: 2,
      e: '2024年からの新NISAでは非課税保有期間が無期限化されました。旧NISA(5年)・旧つみたてNISA(20年)とは異なります。'
    }
  ];

  var BEST_KEY = 'setsuzeiQuizBest';

  function renderQuiz() {
    var html = '';
    for (var i = 0; i < QUIZ.length; i++) {
      var item = QUIZ[i];
      html += '<div class="card">';
      html += '<p class="q-num">Q' + (i + 1) + ' / ' + QUIZ.length + '</p>';
      html += '<p class="q-text">' + escapeHtml(item.q) + '</p>';
      html += '<div class="choices">';
      for (var j = 0; j < item.c.length; j++) {
        html += '<label class="choice">';
        html += '<input type="radio" name="q' + i + '" value="' + j + '">';
        html += '<span class="choice-text">' + escapeHtml(item.c[j]) + '</span>';
        html += '</label>';
      }
      html += '</div></div>';
    }
    document.getElementById('quiz-area').innerHTML = html;
  }

  function grade() {
    var score = 0;
    var unanswered = 0;
    var details = [];
    for (var i = 0; i < QUIZ.length; i++) {
      var picked = document.querySelector('input[name="q' + i + '"]:checked');
      var pickedIdx = picked ? parseInt(picked.value, 10) : -1;
      var correct = (pickedIdx === QUIZ[i].a);
      if (pickedIdx === -1) unanswered++;
      if (correct) score++;
      details.push({ idx: i, picked: pickedIdx, correct: correct });
    }

    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    var msg = level === 'ok'   ? '節税マスター級！この知識で年間数万円〜数十万円の節税も夢じゃない。'
            : level === 'warn' ? 'まずまずの基礎力。あと数問押さえれば確定申告でも迷いません。'
            :                    '伸びしろたっぷり。知っていれば年に数万円戻ってくる制度ばかり。';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + QUIZ.length + ' 点';
    document.getElementById('rn').textContent = unanswered > 0
      ? msg + '(未回答 ' + unanswered + '問)'
      : msg;

    var best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    if (score > best) {
      localStorage.setItem(BEST_KEY, String(score));
      best = score;
      document.getElementById('rb').textContent = '🎉 自己ベスト更新！(' + best + '点)';
    } else {
      document.getElementById('rb').textContent = '自己ベスト: ' + best + '点';
    }

    renderReview(details);
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderReview(details) {
    var html = '';
    for (var k = 0; k < details.length; k++) {
      var d = details[k];
      var item = QUIZ[d.idx];
      var tag = d.correct
        ? '<span class="review-tag ok">正解</span>'
        : '<span class="review-tag ng">不正解</span>';
      var pickedLabel = d.picked === -1 ? '(未回答)' : item.c[d.picked];
      html += '<div class="review-item">';
      html += '<p class="review-q">' + tag + 'Q' + (d.idx + 1) + '. ' + escapeHtml(item.q) + '</p>';
      html += '<p class="review-ans">あなたの回答: ' + escapeHtml(pickedLabel) + '</p>';
      html += '<p class="review-ans" style="color:var(--ok);font-weight:700;">正解: ' + escapeHtml(item.c[item.a]) + '</p>';
      html += '<p class="review-exp">' + escapeHtml(item.e) + '</p>';
      html += '</div>';
    }
    document.getElementById('review-list').innerHTML = html;
    document.getElementById('review').style.display = 'block';
  }

  function resetQuiz() {
    var radios = document.querySelectorAll('#quiz-area input[type="radio"]');
    for (var i = 0; i < radios.length; i++) radios[i].checked = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('review').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  renderQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
