<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返済計画アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>返済計画アプリ</h1>

    <section class="input-section">
      <div class="input-group">
        <label for="principal">借入額（円）</label>
        <input type="number" id="principal" placeholder="例：3000000" min="1">
      </div>
      <div class="input-group">
        <label for="rate">年利（%）</label>
        <input type="number" id="rate" placeholder="例：3.0" min="0" step="0.01">
      </div>
      <div class="input-group">
        <label for="payment">月返済額（円）</label>
        <input type="number" id="payment" placeholder="例：30000" min="1">
      </div>
      <button id="calcBtn">計算する</button>
    </section>

    <div id="error" class="error hidden"></div>

    <section id="summary" class="summary hidden">
      <h2>計算結果</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="label">完済予定月</span>
          <span class="value" id="totalMonths">—</span>
        </div>
        <div class="summary-item">
          <span class="label">総支払い額</span>
          <span class="value" id="totalPayment">—</span>
        </div>
        <div class="summary-item">
          <span class="label">総利息額</span>
          <span class="value" id="totalInterest">—</span>
        </div>
      </div>
    </section>

    <section id="tableSection" class="table-section hidden">
      <h2>残高推移</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>月数</th>
              <th>支払額（円）</th>
              <th>うち利息（円）</th>
              <th>うち元本（円）</th>
              <th>残高（円）</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
