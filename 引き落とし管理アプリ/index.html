<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引き落とし管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>引き落とし管理</h1>

    <!-- 残高入力 -->
    <section class="balance-section">
      <h2>口座残高</h2>
      <div class="balance-input-row">
        <input type="number" id="balanceInput" placeholder="口座残高を入力" min="0">
        <span class="yen-label">円</span>
      </div>
    </section>

    <!-- サマリー -->
    <section class="summary-section" id="summarySection">
      <div class="summary-row">
        <span class="summary-label">今月の引き落とし合計</span>
        <span class="summary-value" id="totalAmount">0 円</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">残高 - 合計</span>
        <span class="summary-value" id="diffAmount">- 円</span>
      </div>
      <div class="status-badge" id="statusBadge">残高を入力してください</div>
    </section>

    <!-- 追加フォーム -->
    <section class="form-section">
      <h2>引き落とし項目を追加</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="名前（例：電気代）" maxlength="30">
      </div>
      <div class="form-row two-col">
        <div class="input-group">
          <label>引き落とし日</label>
          <input type="number" id="itemDay" placeholder="日" min="1" max="31">
          <span class="unit-label">日</span>
        </div>
        <div class="input-group">
          <label>金額</label>
          <input type="number" id="itemAmount" placeholder="金額" min="0">
          <span class="unit-label">円</span>
        </div>
      </div>
      <button class="btn-add" id="addBtn">追加する</button>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>登録済み項目 <span class="item-count" id="itemCount">0件</span></h2>
      <ul class="item-list" id="itemList">
        <li class="empty-message">まだ項目がありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
