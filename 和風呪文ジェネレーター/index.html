<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>和風呪文ジェネレーター｜浮世絵風AI画像プロンプトを5案生成</title>
  <meta name="description" content="題材と季節・色調を選ぶだけで、浮世絵風のAI画像生成プロンプトを5案サクッと作成。SNS投稿やブログのアイキャッチ画像作りに使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #b91c1c;
      --accent-light: #fdf2f2;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #7f1212, 0 6px 16px rgba(185,28,28,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #7f1212, 0 2px 8px rgba(185,28,28,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 結果カード */
    .prompt-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin: 0 auto 0.9rem;
      max-width: 600px;
      box-shadow: var(--shadow);
    }
    .prompt-num {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800; color: #fff;
      background: var(--accent); padding: 0.18rem 0.55rem;
      border-radius: 999px; letter-spacing: 0.06em;
      margin-bottom: 0.55rem;
    }
    .prompt-text {
      font-size: 0.92rem; line-height: 1.55;
      color: var(--text); word-break: break-word;
      background: var(--accent-light);
      padding: 0.7rem 0.8rem; border-radius: 8px;
      margin-bottom: 0.7rem;
      font-family: "SF Mono", Menlo, Consolas, monospace;
    }
    .btn-copy {
      display: inline-block;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem;
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: 10px; color: var(--ng);
      font-size: 0.88rem; font-weight: 600;
      text-align: center;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .prompt-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>和風呪文ジェネレーター</h1>
    <p class="subtitle">題材を選ぶだけで、浮世絵風のAI画像プロンプトを5案いっき生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">題材を選ぶ</p>
    <div class="field">
      <label for="theme">題材</label>
      <select id="theme">
        <option value="fuji">富士山</option>
        <option value="sakura">桜</option>
        <option value="dragon">龍</option>
        <option value="samurai">武士</option>
        <option value="geisha">芸者</option>
        <option value="wave">波（神奈川沖浪裏風）</option>
        <option value="moon">月夜</option>
        <option value="koi">鯉</option>
        <option value="crane">鶴</option>
        <option value="kyoto">京都の町並み</option>
      </select>
    </div>
    <div class="field">
      <label for="season">季節</label>
      <select id="season">
        <option value="">指定なし</option>
        <option value="spring">春</option>
        <option value="summer">夏</option>
        <option value="autumn">秋</option>
        <option value="winter">冬</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">色調</label>
      <select id="tone">
        <option value="">指定なし</option>
        <option value="vivid">鮮やか</option>
        <option value="muted">落ち着き</option>
        <option value="mono">モノクロ</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">呪文を5つ唱える</button>

  <div id="err" class="err-msg" style="display:none;"></div>
  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎨 生成される文言は、Stable Diffusion / Midjourney / DALL·E など主要な画像生成AIで使える英語プロンプトの目安です。お使いのサービスの利用規約に従ってご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'fuwa-jumon-state';

  var THEMES = {
    fuji:    { en: 'Mount Fuji towering over a calm landscape', extra: ['snow-capped peak','reflected in still lake water','seen from a distant village','at sunrise with crimson sky'] },
    sakura:  { en: 'cherry blossoms in full bloom', extra: ['petals falling like snow','beside a small wooden bridge','around an old temple','with a samurai walking past'] },
    dragon:  { en: 'a coiling Japanese dragon among clouds', extra: ['breathing pale fire','wrapped around a sacred mountain','rising from stormy sea','glowing in the night sky'] },
    samurai: { en: 'a lone samurai with a katana', extra: ['standing in heavy rain','crossing a wooden bridge','meditating under cherry blossoms','silhouetted against a giant moon'] },
    geisha:  { en: 'a graceful geisha in elegant kimono', extra: ['holding a paper umbrella','playing a shamisen','looking back over her shoulder','in a lantern-lit alley'] },
    wave:    { en: 'a colossal cresting wave in the style of Hokusai', extra: ['with Mount Fuji in the distance','small fishing boats below','foam shaped like dragon claws','under a stormy sky'] },
    moon:    { en: 'a giant pale moon over a quiet village', extra: ['fireflies drifting nearby','reflected on a rice paddy','behind silhouetted pine trees','with a lone crane flying across'] },
    koi:     { en: 'koi fish swimming in clear water', extra: ['leaping up a waterfall','among floating lotus flowers','beneath a wooden footbridge','with cherry petals on the surface'] },
    crane:   { en: 'a pair of red-crowned cranes', extra: ['dancing in a snowy field','flying past a full moon','beside a frozen river','at dawn over wetlands'] },
    kyoto:   { en: 'an old Kyoto street with wooden machiya houses', extra: ['paper lanterns glowing at dusk','a torii gate at the end of the lane','a brief shower wetting the stone path','with Higashiyama hills in the background'] }
  };

  var SEASON_EN = {
    spring: 'in spring, with soft pink cherry blossoms and warm sunlight',
    summer: 'in midsummer, with deep green foliage and humid air',
    autumn: 'in autumn, with vivid red and gold maple leaves',
    winter: 'in winter, with quiet falling snow and bare branches'
  };

  var TONE_EN = {
    vivid: 'vivid saturated colors, bold pigments',
    muted: 'muted earthy tones, soft natural pigments',
    mono:  'monochrome sumi ink wash, black and white only'
  };

  // 5パターンの構図/スタイル
  var STYLES = [
    'traditional ukiyo-e woodblock print, flat color blocks, bold black outlines, in the style of Hokusai',
    'Edo-period nishiki-e style, fine line work, delicate gradient bokashi shading, ornate border',
    'sumi-e ink painting fused with ukiyo-e, simple composition, lots of negative space, brush stroke texture',
    'modern ukiyo-e illustration, clean vector-like lines, slightly cinematic lighting, posterized shading',
    'shin-hanga revival style, dramatic skies, atmospheric perspective, refined detail in the foreground'
  ];

  var COMMON_TAIL = 'highly detailed, masterpiece, balanced composition, no text, no watermark';

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.theme)  document.getElementById('theme').value  = s.theme;
      if (s.season !== undefined) document.getElementById('season').value = s.season;
      if (s.tone   !== undefined) document.getElementById('tone').value   = s.tone;
    } catch (e) {}
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        theme:  document.getElementById('theme').value,
        season: document.getElementById('season').value,
        tone:   document.getElementById('tone').value
      }));
    } catch (e) {}
  }

  function showErr(msg) {
    var el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearErr() {
    document.getElementById('err').style.display = 'none';
  }

  function gen() {
    clearErr();
    var themeKey = document.getElementById('theme').value;
    var season   = document.getElementById('season').value;
    var tone     = document.getElementById('tone').value;
    var th = THEMES[themeKey];
    if (!th) { showErr('題材を選んでください'); return; }
    save();

    var seasonPart = season ? SEASON_EN[season] : '';
    var tonePart   = tone   ? TONE_EN[tone]     : '';

    var prompts = [];
    for (var i = 0; i < 5; i++) {
      var subject = th.en + ', ' + th.extra[i % th.extra.length];
      var parts = [subject, STYLES[i]];
      if (seasonPart) parts.push(seasonPart);
      if (tonePart)   parts.push(tonePart);
      parts.push(COMMON_TAIL);
      prompts.push(parts.join(', '));
    }

    var html = prompts.map(function(p, idx) {
      var safe = p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      return '<div class="prompt-item">'
           +   '<span class="prompt-num">呪文 ' + (idx + 1) + '</span>'
           +   '<p class="prompt-text">' + safe + '</p>'
           +   '<button class="btn-copy" data-text="' + safe + '" onclick="copyPrompt(this)">コピー</button>'
           + '</div>';
    }).join('');
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyPrompt(btn) {
    var text = btn.getAttribute('data-text');
    // HTMLエスケープを戻す
    var dec = document.createElement('textarea');
    dec.innerHTML = text;
    var raw = dec.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(raw).then(function() {
        flashCopied(btn);
      }, function() {
        fallbackCopy(raw, btn);
      });
    } else {
      fallbackCopy(raw, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    flashCopied(btn);
  }

  function flashCopied(btn) {
    var orig = btn.textContent;
    btn.classList.add('copied');
    btn.textContent = '✓ コピーしました';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.textContent = orig;
    }, 1400);
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
