<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インバウンド採算チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.82rem; font-weight: 700; color: var(--text);
      margin: 0.8rem 0 0.5rem;
      padding: 0.3rem 0.6rem;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
    }

    .field { margin-bottom: 0.9rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .sep td { padding-top: 0.8rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; color: var(--accent); border-bottom: 1px solid var(--border); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>インバウンド採算チェッカー</h1>
    <p class="subtitle">円安局面での外国人客売上貢献と集客投資の採算を即確認</p>
  </header>

  <!-- 外国人客 -->
  <div class="card">
    <p class="card-title">外国人客（インバウンド）</p>
    <div class="row2">
      <div class="field">
        <label for="inb_count">月間来店数（人）</label>
        <input type="number" id="inb_count" placeholder="例: 80" min="0">
      </div>
      <div class="field">
        <label for="inb_price">客単価（円）</label>
        <input type="number" id="inb_price" placeholder="例: 8000" min="0">
      </div>
    </div>
  </div>

  <!-- 日本人客 -->
  <div class="card">
    <p class="card-title">日本人客（比較用）</p>
    <div class="row2">
      <div class="field">
        <label for="dom_count">月間来店数（人）</label>
        <input type="number" id="dom_count" placeholder="例: 300" min="0">
      </div>
      <div class="field">
        <label for="dom_price">客単価（円）</label>
        <input type="number" id="dom_price" placeholder="例: 3500" min="0">
      </div>
    </div>
  </div>

  <!-- 集客投資 -->
  <div class="card">
    <p class="card-title">集客投資コスト（月額）</p>
    <div class="field">
      <label for="cost">多言語対応・広告・翻訳等の合計（円）</label>
      <input type="number" id="cost" placeholder="例: 50000" min="0">
      <p class="hint">多言語メニュー・SNS広告・通訳対応など外国人向け投資の月額合計</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">採算を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">インバウンド投資の採算</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">売上・採算の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  function calc() {
    var inbCount  = parseFloat(document.getElementById('inb_count').value) || 0;
    var inbPrice  = parseFloat(document.getElementById('inb_price').value) || 0;
    var domCount  = parseFloat(document.getElementById('dom_count').value) || 0;
    var domPrice  = parseFloat(document.getElementById('dom_price').value) || 0;
    var cost      = parseFloat(document.getElementById('cost').value) || 0;

    if (inbCount === 0 || inbPrice === 0) {
      showErr('外国人客の来店数と客単価を入力してください');
      return;
    }

    var inbSales   = inbCount * inbPrice;   // 外国人客売上
    var domSales   = domCount * domPrice;   // 日本人客売上
    var totalSales = inbSales + domSales;   // 合計売上
    var inbRatio   = totalSales > 0 ? (inbSales / totalSales * 100) : 0; // 外国人客売上比率

    var profit     = inbSales - cost;       // 集客投資後の純貢献
    var roi        = cost > 0 ? (profit / cost * 100) : null; // ROI

    // 採算判定：純貢献が黒字かつROI 100%以上=OK、黒字でもROI低め=warn、赤字=ng
    var level, verdict, note;
    if (cost === 0) {
      level   = 'ok';
      verdict = '投資コスト0円';
      note    = '集客投資コストを入力すると採算判定が表示されます。現在は外国人客売上のみ表示しています。';
    } else if (profit >= 0 && roi >= 100) {
      level   = 'ok';
      verdict = '採算 OK ✔';
      note    = '集客コストを上回る売上が取れています。インバウンド投資は有効です。';
    } else if (profit >= 0) {
      level   = 'warn';
      verdict = '微益・要注意';
      note    = '黒字ですが投資対効果はまだ低めです。単価アップや来店数増加で改善できます。';
    } else {
      level   = 'ng';
      verdict = '赤字・投資見直しを';
      note    = '集客コストが外国人客売上を上回っています。コスト削減か来店数・単価の改善が必要です。';
    }

    showResult(level, verdict, note);

    var rows = [
      ['sep', '■ 外国人客（インバウンド）'],
      ['来店数',          fmt(inbCount) + ' 人'],
      ['客単価',          '¥' + fmt(inbPrice)],
      ['外国人客売上',    '¥' + fmt(inbSales), true],
    ];

    if (domCount > 0 && domPrice > 0) {
      rows = rows.concat([
        ['sep', '■ 日本人客（比較）'],
        ['来店数',        fmt(domCount) + ' 人'],
        ['客単価',        '¥' + fmt(domPrice)],
        ['日本人客売上',  '¥' + fmt(domSales)],
        ['合計売上',      '¥' + fmt(totalSales)],
        ['外国人客売上比率', inbRatio.toFixed(1) + ' %'],
      ]);
    }

    if (cost > 0) {
      rows = rows.concat([
        ['sep', '■ 集客投資採算'],
        ['集客投資コスト（月）', '¥' + fmt(cost)],
        ['外国人売上 − 投資コスト', '¥' + fmt(profit), true],
      ]);
      if (roi !== null) {
        rows.push(['ROI（投資収益率）', roi.toFixed(1) + ' %']);
      }
      var breakEven = cost / inbPrice;
      rows.push(['損益分岐来店数', Math.ceil(breakEven) + ' 人/月']);
    }

    showDetail(rows);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    var html = rows.map(function(r) {
      if (r[0] === 'sep') {
        return '<tr class="sep"><td colspan="2">' + r[1] + '</td></tr>';
      }
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', 'エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
