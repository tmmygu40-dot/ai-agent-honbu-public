<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋愛スタイル花タイプ診断｜5問で分かる花占い恋愛タイプ</title>
  <meta name="description" content="5問に答えるだけで、あなたの恋愛スタイルをバラ・ひまわり・桜・ユリ・カスミソウ・ラベンダーの6つの花タイプに当てはめて診断します。長所・気をつけること・相性も無料でチェック。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-text { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.4; }
    .q-num { color: var(--accent); margin-right: 0.4rem; }
    .opt-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .opt {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.8rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); cursor: pointer;
      font-size: 0.92rem; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt input[type="radio"]:checked ~ .opt-text { color: var(--accent); font-weight: 600; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-emoji { font-size: 3rem; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.78rem; font-weight: 700; color: var(--text-sub); letter-spacing: 0.1em; margin-bottom: 0.3rem; }
    .result-flower { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; margin-bottom: 0.4rem; line-height: 1.2; }
    .result-tagline { font-size: 0.95rem; color: var(--text-sub); line-height: 1.5; }

    .detail-section { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .detail-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .detail-h { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.45rem; }
    .detail-body { font-size: 0.92rem; line-height: 1.6; color: var(--text); }
    .match-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.3rem; }
    .match-tag { display: inline-block; padding: 0.25rem 0.7rem; border: 1px solid var(--border); border-radius: 999px; background: var(--accent-light); font-size: 0.85rem; color: var(--accent); font-weight: 600; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg { color: var(--ng); background: var(--ng-bg); border: 1.5px solid var(--ng); border-radius: 10px; padding: 0.8rem; margin: 0 auto 1rem; max-width: 600px; font-size: 0.9rem; text-align: center; display: none; }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌸 恋愛スタイル花タイプ診断</h1>
    <p class="subtitle">5問に答えると、あなたの恋愛スタイルを6つの花タイプに当てはめて診断します</p>
  </header>

  <div id="quiz" class="card">
    <p class="card-title">5問の診断</p>
    <div id="qList"></div>
  </div>

  <p id="errMsg" class="err-msg"></p>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="rEmoji">🌸</p>
    <p class="result-label">あなたの花タイプ</p>
    <p class="result-flower" id="rFlower">—</p>
    <p class="result-tagline" id="rTagline"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">花タイプの詳細</p>
    <div class="detail-section">
      <p class="detail-h">🌷 タイプの特徴</p>
      <p class="detail-body" id="dFeature"></p>
    </div>
    <div class="detail-section">
      <p class="detail-h">💕 恋愛での長所</p>
      <p class="detail-body" id="dStrong"></p>
    </div>
    <div class="detail-section">
      <p class="detail-h">🍃 気をつけること</p>
      <p class="detail-body" id="dWeak"></p>
    </div>
    <div class="detail-section">
      <p class="detail-h">🌟 相性のいい花タイプ</p>
      <div class="match-list" id="dMatch"></div>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🌸 この診断はエンタメ目的の心理タイプ分類です。花言葉や一般的な花のイメージを参考に、恋愛傾向を6タイプに整理しています。結果は気軽な目安としてお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 花タイプ定義
  var FLOWERS = {
    rose:      { name: 'バラ', emoji: '🌹', tagline: '情熱リード型 — ドラマチックな恋を生み出す主役タイプ',
                 feature: '自分の気持ちにまっすぐで、好きな人には自分から動ける情熱派。デートも会話も自分から色を作っていけるタイプです。',
                 strong: '気持ちを言葉にできる素直さと、相手を引っ張る行動力。恋を停滞させずに前へ進めます。',
                 weak: '勢いが強すぎると相手を置いていきがち。たまに相手のペースに合わせる時間を作ると◎。',
                 match: ['ユリ', 'カスミソウ', 'ラベンダー'] },
    sunflower: { name: 'ひまわり', emoji: '🌻', tagline: '太陽型 — 一緒にいるだけで元気になれる明るさNo.1',
                 feature: '笑顔と明るさが武器のひまわりタイプ。一緒にいると周りまで前向きになれる、恋の元気印です。',
                 strong: '笑い飛ばす力と切り替えの早さ。喧嘩しても引きずらず、すぐ仲直りできる軽やかさがあります。',
                 weak: 'いつも明るく振る舞いすぎて、本音を溜め込みがち。たまには弱音を見せるのも信頼の証。',
                 match: ['桜', 'ユリ', 'バラ'] },
    sakura:    { name: '桜', emoji: '🌸', tagline: '繊細感性型 — 短くも深い瞬間を大切にする情緒派',
                 feature: '感受性が豊かで、心の機微にすぐ気づける桜タイプ。儚さと深さを併せ持つ、ロマンチックな恋人です。',
                 strong: '相手の小さな変化を見逃さない観察力と、思い出を大切にする感受性。深い絆を作れます。',
                 weak: '考えすぎて自分を追い込みやすい傾向。ひとり時間と話す時間のバランスを意識して。',
                 match: ['ひまわり', 'ラベンダー', 'ユリ'] },
    lily:      { name: 'ユリ', emoji: '🌼', tagline: '誠実信頼型 — 長く穏やかな絆を築く本命タイプ',
                 feature: '誠実で落ち着いていて、信頼関係をじっくり育てるユリタイプ。一度好きになったら長く愛せる本命気質。',
                 strong: '言動の一貫性と責任感。相手に安心感を与え、長期的に信頼される関係を作れます。',
                 weak: '真面目すぎて遊び心が薄れがち。たまにサプライズや非日常を取り入れると新鮮さが続きます。',
                 match: ['バラ', 'ひまわり', 'カスミソウ'] },
    babys:     { name: 'カスミソウ', emoji: '🤍', tagline: '寄り添い型 — そばで支えるあたたかさのプロ',
                 feature: '主役よりも、そっと隣で支える方が居心地のいいカスミソウタイプ。控えめな優しさで相手を包みます。',
                 strong: '相手を立てる気遣いと、見返りを求めない優しさ。家庭的な居心地の良さを作れます。',
                 weak: '自分の意見を言わずに我慢しがち。本音を伝えるのも、長く続く恋には大切なステップ。',
                 match: ['バラ', 'ユリ', 'ラベンダー'] },
    lavender:  { name: 'ラベンダー', emoji: '💜', tagline: '癒しマイペース型 — 一緒にいて心が休まる安心の存在',
                 feature: '穏やかで自分のペースを大切にするラベンダータイプ。独特の落ち着きで相手の心を安らげます。',
                 strong: '焦らない安定感と、相手の自由を尊重する包容力。長く穏やかな関係に向いています。',
                 weak: 'マイペースすぎて連絡が空きがち。一言の「気にかけてるよ」を意識的に伝えると◎。',
                 match: ['バラ', '桜', 'カスミソウ'] }
  };

  // 5問×6選択肢（各選択肢は1花タイプに+1ポイント）
  var QUESTIONS = [
    {
      q: 'デートの場所選びは？',
      opts: [
        { t: '自分が行きたい場所を提案する', f: 'rose' },
        { t: '一緒に楽しめる賑やかなところ', f: 'sunflower' },
        { t: '季節感のある景色のいい場所', f: 'sakura' },
        { t: '二人で話せる雰囲気のいい店', f: 'lily' },
        { t: '相手の希望に合わせる', f: 'babys' },
        { t: '静かで落ち着ける場所', f: 'lavender' }
      ]
    },
    {
      q: '恋人に求めるのはどんな人？',
      opts: [
        { t: 'リード力と頼れる強さ', f: 'rose' },
        { t: '一緒に笑える明るさ', f: 'sunflower' },
        { t: '心の繊細さや感性', f: 'sakura' },
        { t: '誠実さと真面目さ', f: 'lily' },
        { t: '自分を尊重してくれる優しさ', f: 'babys' },
        { t: 'マイペースを許してくれる包容力', f: 'lavender' }
      ]
    },
    {
      q: '喧嘩したらどうなる？',
      opts: [
        { t: '言いたいことはハッキリ言う', f: 'rose' },
        { t: '笑い飛ばして仲直りする', f: 'sunflower' },
        { t: 'ひとりで考え込んでしまう', f: 'sakura' },
        { t: '冷静に話し合おうとする', f: 'lily' },
        { t: '自分が引いて穏便にする', f: 'babys' },
        { t: '距離を置いて時間に任せる', f: 'lavender' }
      ]
    },
    {
      q: '恋人に見せる自分は？',
      opts: [
        { t: 'ストレートに気持ちを伝える', f: 'rose' },
        { t: 'いつでも元気でいたい', f: 'sunflower' },
        { t: '弱いところも素直に見せる', f: 'sakura' },
        { t: '落ち着いた信頼できる姿', f: 'lily' },
        { t: '控えめだけど尽くす姿', f: 'babys' },
        { t: '自然体でリラックスした自分', f: 'lavender' }
      ]
    },
    {
      q: '恋愛で一番大切にしたいことは？',
      opts: [
        { t: 'ドキドキする刺激と情熱', f: 'rose' },
        { t: '一緒にいて楽しい時間', f: 'sunflower' },
        { t: '心が通じ合う深い瞬間', f: 'sakura' },
        { t: '信頼と長く続く絆', f: 'lily' },
        { t: '相手を思いやる優しさ', f: 'babys' },
        { t: '心が休まる安心感', f: 'lavender' }
      ]
    }
  ];

  var STORAGE_KEY = 'flowerLoveDiagnosis_lastResult';

  function renderQuiz() {
    var html = QUESTIONS.map(function(item, qi) {
      var opts = item.opts.map(function(o, oi) {
        return '<label class="opt">'
             + '<input type="radio" name="q' + qi + '" value="' + o.f + '">'
             + '<span class="opt-text">' + o.t + '</span>'
             + '</label>';
      }).join('');
      return '<div class="detail-section">'
           + '<p class="q-text"><span class="q-num">Q' + (qi+1) + '.</span>' + item.q + '</p>'
           + '<div class="opt-list">' + opts + '</div>'
           + '</div>';
    }).join('');
    document.getElementById('qList').innerHTML = html;
  }

  function diagnose() {
    var err = document.getElementById('errMsg');
    var scores = { rose:0, sunflower:0, sakura:0, lily:0, babys:0, lavender:0 };
    var unanswered = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered.push(i+1); continue; }
      scores[sel.value] += 1;
    }
    if (unanswered.length > 0) {
      err.textContent = 'Q' + unanswered.join(', Q') + ' に未回答があります。';
      err.style.display = 'block';
      return;
    }
    err.style.display = 'none';

    // 最大値の花タイプを判定（同点時は QUESTIONS の最後の選択を優先＝後ろ優先）
    var topKey = 'rose', topScore = -1;
    Object.keys(scores).forEach(function(k) {
      if (scores[k] > topScore) { topScore = scores[k]; topKey = k; }
    });

    showResult(topKey);
    saveResult(topKey);
  }

  function showResult(key) {
    var f = FLOWERS[key];
    var rc = document.getElementById('result');
    document.getElementById('rEmoji').textContent = f.emoji;
    document.getElementById('rFlower').textContent = f.name + 'タイプ';
    document.getElementById('rTagline').textContent = f.tagline;
    rc.style.display = 'block';

    document.getElementById('dFeature').textContent = f.feature;
    document.getElementById('dStrong').textContent = f.strong;
    document.getElementById('dWeak').textContent = f.weak;
    document.getElementById('dMatch').innerHTML = f.match.map(function(n) {
      return '<span class="match-tag">' + n + '</span>';
    }).join('');
    document.getElementById('detail').style.display = 'block';

    // スクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function saveResult(key) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ key: key, date: new Date().toISOString() }));
    } catch (e) {}
  }

  // 初期表示
  renderQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
