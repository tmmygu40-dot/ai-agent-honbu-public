<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い置き判断チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>買い置き判断チェッカー</h1>
    <p class="subtitle">値上がり前に買い置きすべきか、今すぐ判定します</p>

    <section class="card">
      <h2>品目を入力</h2>
      <div class="form-group">
        <label for="itemName">品目名</label>
        <input type="text" id="itemName" placeholder="例：砂糖、洗剤、米">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="currentPrice">現在の単価（円）</label>
          <input type="number" id="currentPrice" placeholder="例：300" min="0">
        </div>
        <div class="form-group">
          <label for="riseRate">値上がり率（%）</label>
          <input type="number" id="riseRate" placeholder="例：15" min="0" max="200">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="monthlyUse">月間消費量（個/本/袋）</label>
          <input type="number" id="monthlyUse" placeholder="例：2" min="0.1" step="0.1">
        </div>
        <div class="form-group">
          <label for="stockCount">買い置きできる数</label>
          <input type="number" id="stockCount" placeholder="例：6" min="1">
        </div>
      </div>
      <button class="btn-check" onclick="checkStockup()">判定する</button>
    </section>

    <section id="resultSection" class="result-section hidden">
      <div id="resultCard" class="result-card">
        <div class="result-verdict" id="verdict"></div>
        <div class="result-details" id="resultDetails"></div>
      </div>
    </section>

    <section class="card">
      <h2>保存済み品目一覧</h2>
      <div id="savedList" class="saved-list">
        <p class="empty-msg">保存された品目はありません</p>
      </div>
      <button class="btn-clear" onclick="clearAll()">一覧をクリア</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
