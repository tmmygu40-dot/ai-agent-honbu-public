<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接練習アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* 質問表示 */
    .question-num {
      font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 1.1rem; font-weight: 700; line-height: 1.6; color: var(--text);
      min-height: 3em;
    }

    /* テキストエリア */
    .answer-area {
      width: 100%; padding: 0.8rem;
      font-size: 0.95rem; line-height: 1.6;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      resize: vertical; min-height: 120px;
      font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .answer-area:focus { border-color: var(--accent); background: #fff; }

    .btn-row {
      display: flex; gap: 0.7rem; margin-top: 0.9rem; max-width: 600px; margin-left: auto; margin-right: auto;
    }
    .btn-main {
      flex: 1; padding: 0.9rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-sub {
      flex: 1; padding: 0.9rem;
      font-size: 1rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sub:hover { background: var(--accent-light); }

    /* 履歴 */
    .history-item {
      border-bottom: 1px solid var(--border); padding: 0.9rem 0;
    }
    .history-item:last-child { border-bottom: none; }
    .history-q {
      font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem;
    }
    .history-a {
      font-size: 0.9rem; line-height: 1.6; color: var(--text); white-space: pre-wrap;
    }
    .history-date {
      font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem;
    }
    .empty-msg { font-size: 0.88rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    .badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 700; border-radius: 99px;
      padding: 0.15rem 0.55rem; margin-left: 0.4rem; vertical-align: middle;
    }

    .btn-danger {
      display: block; margin: 0.5rem auto 0; padding: 0.5rem 1.2rem;
      font-size: 0.78rem; color: var(--ng); background: none;
      border: 1px solid var(--ng); border-radius: 99px; cursor: pointer;
    }
    .btn-danger:hover { background: var(--ng-bg); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>面接練習アプリ</h1>
    <p class="subtitle">よく聞かれる質問をランダム出題 ― 回答を記録して対策を強化</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">今回の質問</p>
    <p class="question-num" id="qNum">— / 30</p>
    <p class="question-text" id="qText">「次の質問へ」ボタンで質問が表示されます</p>
  </div>

  <!-- 回答入力カード -->
  <div class="card">
    <p class="card-title">あなたの回答メモ</p>
    <textarea class="answer-area" id="answerInput" placeholder="ここに回答を書いてみましょう&#10;例：私は〇〇という経験を通じて…"></textarea>
    <div class="btn-row">
      <button class="btn-sub" onclick="nextQuestion()">次の質問へ</button>
      <button class="btn-main" onclick="saveAnswer()">この回答を保存</button>
    </div>
  </div>

  <!-- 回答履歴 -->
  <div class="card" id="historyCard">
    <p class="card-title">回答履歴 <span class="badge" id="histCount">0</span></p>
    <div id="historyList"><p class="empty-msg">まだ回答がありません</p></div>
    <button class="btn-danger" id="clearBtn" onclick="clearHistory()" style="display:none">履歴をすべて消す</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var QUESTIONS = [
    "自己紹介をしてください。",
    "あなたの強みと弱みを教えてください。",
    "志望動機を教えてください。",
    "これまでの職歴で最も大きな成果は何ですか？",
    "5年後・10年後はどのようなキャリアを描いていますか？",
    "チームで働く際、あなたはどのような役割を担うことが多いですか？",
    "困難な状況に直面したとき、どのように乗り越えましたか？",
    "前職（または学業）を通じて学んだ最大のことは何ですか？",
    "なぜ前職（または前の部署）を退職したのですか？",
    "当社のどのような点に魅力を感じていますか？",
    "リーダーシップを発揮した経験を教えてください。",
    "失敗した経験と、そこから何を学びましたか？",
    "あなたのキャリアにおける最大の転機はいつですか？",
    "上司や同僚と意見が対立したとき、どう対応しますか？",
    "優先順位の付け方や時間管理の方法を教えてください。",
    "複数のプロジェクトを同時に進めた経験はありますか？",
    "お客様や取引先とのトラブルをどのように解決しましたか？",
    "スキルアップのために日頃どのような取り組みをしていますか？",
    "あなたを一言で表すとしたら何ですか？",
    "あなたが最も大切にしている仕事上の価値観は何ですか？",
    "プレッシャーのかかる状況でどのようにパフォーマンスを保ちますか？",
    "チームのモチベーションを高めるために何をしましたか？",
    "入社後にまず取り組みたいことは何ですか？",
    "どのような職場環境・社風で働きたいですか？",
    "あなたの趣味・特技を仕事にどう活かせますか？",
    "給与・待遇への希望はありますか？",
    "残業・出張・転勤についての考えをお聞かせください。",
    "あなたが思う『理想の上司』はどのような人物ですか？",
    "仕事でミスをしたとき、どのように対処しますか？",
    "最後に、自己PRや質問があればどうぞ。"
  ];

  var STORAGE_KEY = 'mensetsuRenshu_v1';
  var currentIdx = -1;
  var shownSet = [];
  var history = [];

  function init() {
    history = loadHistory();
    renderHistory();
    // 最初の質問を自動表示
    nextQuestion();
  }

  function nextQuestion() {
    if (shownSet.length >= QUESTIONS.length) {
      shownSet = [];
    }
    var remaining = QUESTIONS.map(function(_, i){ return i; }).filter(function(i){ return shownSet.indexOf(i) < 0; });
    var pick = remaining[Math.floor(Math.random() * remaining.length)];
    shownSet.push(pick);
    currentIdx = pick;
    document.getElementById('qNum').textContent = shownSet.length + ' / ' + QUESTIONS.length;
    document.getElementById('qText').textContent = QUESTIONS[pick];
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').focus();
  }

  function saveAnswer() {
    if (currentIdx < 0) { alert('先に質問を表示してください'); return; }
    var ans = document.getElementById('answerInput').value.trim();
    if (!ans) { alert('回答を入力してください'); return; }
    var item = {
      q: QUESTIONS[currentIdx],
      a: ans,
      date: new Date().toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    };
    history.unshift(item);
    saveHistory();
    renderHistory();
    document.getElementById('answerInput').value = '';
    nextQuestion();
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    history = [];
    saveHistory();
    renderHistory();
  }

  function renderHistory() {
    var list = document.getElementById('historyList');
    var count = history.length;
    document.getElementById('histCount').textContent = count;
    document.getElementById('clearBtn').style.display = count > 0 ? 'block' : 'none';
    if (count === 0) {
      list.innerHTML = '<p class="empty-msg">まだ回答がありません</p>';
      return;
    }
    list.innerHTML = history.map(function(item) {
      return '<div class="history-item">'
        + '<p class="history-q">' + escHtml(item.q) + '</p>'
        + '<p class="history-a">' + escHtml(item.a) + '</p>'
        + '<p class="history-date">' + escHtml(item.date) + '</p>'
        + '</div>';
    }).join('');
  }

  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch(e) { return []; }
  }

  function saveHistory() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
  </script>
</body>
</html>
