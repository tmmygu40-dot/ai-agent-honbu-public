<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="デスクの主役・時間帯・季節・雰囲気・色を選ぶだけで、ローファイチルな勉強デスクのAI背景画像プロンプトを即生成。配信サムネや作業BGM動画の背景作りに使える無料ツールです。">
  <title>🪴 ルームプロンプトメーカー</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #8a6d3b;
      --accent-dark: #6b5328;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 var(--accent-dark), 0 6px 16px rgba(138,109,59,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--accent-dark), 0 2px 8px rgba(138,109,59,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align:center; }
    .prompt-text {
      background: var(--bg); padding: 1rem; border-radius: 8px;
      word-break: break-word; font-size: 0.95rem; min-height: 3rem;
      font-family: monospace; line-height: 1.55;
    }
    .btn-copy {
      display: block; width: 100%;
      margin-top: 1rem; padding: 0.8rem 1.2rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-weight: 700; font-size: 0.95rem;
    }
    .btn-copy:active { background: var(--accent-dark); }

    .source-note {
      font-size: 0.72rem; color: var(--text-sub);
      margin-top: 1rem; text-align: center; line-height: 1.5;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🪴 ルームプロンプトメーカー</h1>
    <p class="subtitle">ローファイチルな勉強デスクのAI背景画像プロンプトを、5つの選択だけで即生成します。</p>
  </header>

  <div class="card">
    <p class="card-title">デスクの設定</p>
    <div class="field">
      <label for="focus">デスクの主役</label>
      <select id="focus">
        <option value="laptop">ノートPCと開いたノート</option>
        <option value="lamp">読書ランプと積まれた本</option>
        <option value="coffee">コーヒーカップとお菓子</option>
        <option value="plant">観葉植物とミニライト</option>
        <option value="plush">ぬいぐるみとブランケット</option>
      </select>
    </div>
    <div class="field">
      <label for="time">時間帯</label>
      <select id="time">
        <option value="morning">朝（やわらかい光）</option>
        <option value="afternoon">昼下がり（差し込む日差し）</option>
        <option value="evening">夕方（オレンジの陽）</option>
        <option value="night">深夜（暖色ランプ＋窓の街灯り）</option>
      </select>
    </div>
    <div class="field">
      <label for="season">季節</label>
      <select id="season">
        <option value="spring">春</option>
        <option value="summer">夏</option>
        <option value="autumn">秋</option>
        <option value="winter">冬</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="lofi">ローファイチル</option>
        <option value="cafe">コージーカフェ</option>
        <option value="minimal">ミニマル和モダン</option>
        <option value="retro">レトロ昭和</option>
        <option value="nordic">ナチュラル北欧</option>
      </select>
    </div>
    <div class="field">
      <label for="color">カラートーン</label>
      <select id="color">
        <option value="warmbeige">ウォームベージュ</option>
        <option value="dustyblue">ダスティブルー</option>
        <option value="mossgreen">モスグリーン</option>
        <option value="palepink">ペールピンク</option>
        <option value="mono">モノトーン</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generatePrompt()">✨ プロンプトを生成</button>

  <div class="result-card ok" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <p class="prompt-text" id="prompt-text">—</p>
    <button class="btn-copy" id="copy-btn" onclick="copyPrompt()">📋 コピーして使う</button>
    <p class="source-note">※生成結果は参考用のサンプルプロンプトです。Stable Diffusion / Midjourney / DALL·E 等のAI画像生成サービスでお使いください。</p>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var currentPrompt = '';

  var focusMap = {
    laptop:  'an open laptop with a softly glowing screen and a half-written notebook, a pen resting beside it',
    lamp:    'a small warm reading lamp casting a gentle pool of light over a stack of vintage books',
    coffee:  'a steaming ceramic coffee mug, a saucer with cookies, soft steam rising into the light',
    plant:   'a small potted houseplant with trailing leaves, a tiny string of fairy lights nearby',
    plush:   'a fluffy plush toy slumped on a knit blanket, a closed book and a mug nearby'
  };

  var timeMap = {
    morning:   'soft early morning light filtering through sheer curtains, gentle pastel highlights, calm and quiet',
    afternoon: 'warm afternoon sunlight streaming in at a low angle, golden dust motes floating in the air',
    evening:   'orange evening glow filling the room, long warm shadows, sunset hues spilling over the desk',
    night:     'late night atmosphere, warm desk lamp glow, distant city lights twinkling outside the window'
  };

  var seasonMap = {
    spring: 'spring season vibes, a few cherry blossom petals drifting outside, fresh greenery in soft focus',
    summer: 'summer season vibes, faint cicada hum implied, light cotton curtains swaying, cool iced drink condensation',
    autumn: 'autumn season vibes, fallen maple leaves visible through the window, warm amber palette, cozy knit textures',
    winter: 'winter season vibes, soft snow falling outside, frosted window edges, a thick scarf draped over the chair'
  };

  var moodMap = {
    lofi:    'lofi chill aesthetic, anime illustration style reminiscent of lofi study girl, slightly grainy texture, dreamy and relaxed',
    cafe:    'cozy cafe aesthetic, warm wood tones, latte art notes implied, calm reading-room ambience',
    minimal: 'minimal Japanese modern aesthetic, clean lines, tatami or light oak floor, wabi-sabi simplicity, lots of negative space',
    retro:   'retro Showa-era Japanese aesthetic, slightly faded film look, brown wooden desk, old radio in the corner, nostalgic warmth',
    nordic:  'natural Nordic Scandinavian aesthetic, light pine wood, white walls, hygge mood, soft wool textiles'
  };

  var colorMap = {
    warmbeige: 'warm beige and cream color palette, milk-tea tones, gentle sepia accents',
    dustyblue: 'dusty blue and muted navy color palette, calm and slightly melancholic',
    mossgreen: 'moss green and olive color palette, earthy and grounded forest tones',
    palepink:  'pale pink and peach color palette, soft and tender, blushing morning hues',
    mono:      'monochrome black-white-gray palette with a single warm accent, refined and quiet'
  };

  function generatePrompt() {
    var focus = document.getElementById('focus').value;
    var time = document.getElementById('time').value;
    var season = document.getElementById('season').value;
    var mood = document.getElementById('mood').value;
    var color = document.getElementById('color').value;

    var parts = [
      'A cozy lofi study desk scene featuring ' + focusMap[focus] + ',',
      timeMap[time] + ',',
      seasonMap[season] + ',',
      moodMap[mood] + ',',
      colorMap[color] + ',',
      'highly detailed background illustration, soft cinematic lighting, depth of field, no people, no text, 16:9 wallpaper composition'
    ];

    currentPrompt = parts.join(' ');
    document.getElementById('prompt-text').textContent = currentPrompt;
    document.getElementById('result').style.display = 'block';

    localStorage.setItem('roomPrompt_focus', focus);
    localStorage.setItem('roomPrompt_time', time);
    localStorage.setItem('roomPrompt_season', season);
    localStorage.setItem('roomPrompt_mood', mood);
    localStorage.setItem('roomPrompt_color', color);
  }

  function copyPrompt() {
    if (!currentPrompt) {
      alert('プロンプトを先に生成してください');
      return;
    }
    var btn = document.getElementById('copy-btn');
    var original = btn.textContent;
    var done = function() {
      btn.textContent = '✓ コピーしました！';
      setTimeout(function(){ btn.textContent = original; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentPrompt).then(done).catch(function() {
        fallbackCopy(currentPrompt); done();
      });
    } else {
      fallbackCopy(currentPrompt); done();
    }
  }

  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(textarea);
  }

  window.addEventListener('DOMContentLoaded', function() {
    var keys = ['focus','time','season','mood','color'];
    keys.forEach(function(k) {
      var saved = localStorage.getItem('roomPrompt_' + k);
      if (saved) {
        var el = document.getElementById(k);
        if (el) {
          var hasOption = false;
          for (var i = 0; i < el.options.length; i++) {
            if (el.options[i].value === saved) { hasOption = true; break; }
          }
          if (hasOption) el.value = saved;
        }
      }
    });
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
