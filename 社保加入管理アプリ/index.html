<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社保加入管理アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 曜日入力グリッド ── */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    @media (max-width: 400px) {
      .days-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .day-item { text-align: center; }
    .day-item label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.2rem; }
    .day-item input {
      width: 100%; padding: 0.55rem 0.4rem;
      font-size: 0.95rem; text-align: center;
      border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none;
    }
    .day-item input:focus { border-color: var(--accent); background: #fff; }
    .week-total-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; color: var(--text-sub);
      margin-top: 0.25rem;
    }
    .week-total-row span:last-child { font-weight: 700; color: var(--text); font-size: 1rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; }
    .result-badge {
      display: inline-block; padding: 0.25rem 0.75rem;
      border-radius: 99px; font-size: 0.78rem; font-weight: 800;
      margin-bottom: 0.6rem;
    }
    .ok .result-badge   { background: var(--ok);   color: #fff; }
    .warn .result-badge { background: var(--warn);  color: #fff; }
    .ng .result-badge   { background: var(--ng);    color: #fff; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 週間記録 ── */
    .record-list { list-style: none; }
    .record-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .record-list li:last-child { border-bottom: none; }
    .record-list .rec-label { color: var(--text-sub); }
    .record-list .rec-hours { font-weight: 700; }
    .record-list .rec-badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.55rem;
      border-radius: 99px; margin-left: 0.4rem;
    }
    .rec-ok   .rec-badge { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .rec-warn .rec-badge { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .rec-ng   .rec-badge { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
    .btn-del-rec {
      font-size: 0.72rem; background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-sub); padding: 0.15rem 0.45rem;
      cursor: pointer; margin-left: 0.5rem;
    }
    .btn-del-rec:hover { border-color: var(--ng); color: var(--ng); }
    .btn-clear-all {
      font-size: 0.75rem; background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-sub); padding: 0.35rem 0.75rem;
      cursor: pointer; margin-top: 0.75rem; display: block; margin-left: auto;
    }
    .btn-clear-all:hover { border-color: var(--ng); color: var(--ng); }
    .empty-msg { color: var(--text-sub); font-size: 0.83rem; text-align: center; padding: 0.75rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>社保加入管理アプリ</h1>
    <p class="subtitle">アルバイトの週間勤務時間と社保加入ラインまでの残り時間を即確認</p>
  </header>

  <!-- 設定カード -->
  <div class="card">
    <p class="card-title">設定</p>
    <div class="field">
      <label for="staffName">スタッフ名（任意）</label>
      <input type="text" id="staffName" placeholder="例：田中さん">
    </div>
    <div class="field">
      <label for="limit">週の上限時間（社保加入ライン）</label>
      <input type="number" id="limit" value="20" min="1" max="40" step="0.5">
      <p class="hint">社会保険加入義務は週20時間（51人以上の事業所：2024年10月改正）</p>
    </div>
  </div>

  <!-- 今週の入力カード -->
  <div class="card">
    <p class="card-title">今週の勤務時間（時間）</p>
    <div class="days-grid">
      <div class="day-item">
        <label>月</label>
        <input type="number" id="d0" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>火</label>
        <input type="number" id="d1" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>水</label>
        <input type="number" id="d2" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>木</label>
        <input type="number" id="d3" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>金</label>
        <input type="number" id="d4" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>土</label>
        <input type="number" id="d5" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
      <div class="day-item">
        <label>日</label>
        <input type="number" id="d6" min="0" max="24" step="0.5" placeholder="0" oninput="updateWeekTotal()">
      </div>
    </div>
    <div class="week-total-row">
      <span>今週合計</span>
      <span id="weekTotalDisp">0.0 時間</span>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">残り時間を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">社保加入ラインまでの残り時間</p>
    <span class="result-badge" id="rb">—</span>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 週間記録カード -->
  <div class="card">
    <p class="card-title">週間記録</p>
    <ul class="record-list" id="recordList"></ul>
    <button class="btn-clear-all" onclick="clearAll()">記録をすべて削除</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var DAYS = ['d0','d1','d2','d3','d4','d5','d6'];
  var STORAGE_KEY = 'shaho_kanri_v1';

  function getVal(id) {
    var v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? 0 : v;
  }

  function updateWeekTotal() {
    var total = DAYS.reduce(function(s, id) { return s + getVal(id); }, 0);
    document.getElementById('weekTotalDisp').textContent = fmt(total) + ' 時間';
    saveInputs();
  }

  function fmt(n) {
    return (Math.round(n * 10) / 10).toFixed(1);
  }

  function calc() {
    var limit = parseFloat(document.getElementById('limit').value);
    if (isNaN(limit) || limit <= 0) { alert('上限時間を入力してください'); return; }

    var dayVals = DAYS.map(function(id) { return getVal(id); });
    var total = dayVals.reduce(function(s, v) { return s + v; }, 0);
    var remaining = limit - total;

    var level, badge, note;
    if (remaining > 3) {
      level = 'ok'; badge = '安全圏';
      note = '上限まで余裕があります。このまま継続しても社保加入ラインを超えません。';
    } else if (remaining > 0) {
      level = 'warn'; badge = '要注意';
      note = '残りわずかです。今週これ以上の勤務追加は慎重に判断してください。';
    } else if (remaining === 0) {
      level = 'ng'; badge = '上限到達';
      note = 'ちょうど上限に達しています。これ以上の勤務は社保加入義務が生じる可能性があります。';
    } else {
      level = 'ng'; badge = '超過';
      note = '週の上限を超えています。社会保険加入義務が生じている可能性があります。速やかに確認してください。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rb').textContent = badge;
    document.getElementById('rv').textContent = (remaining >= 0 ? '+' : '') + fmt(remaining) + ' 時間';
    document.getElementById('rn').textContent = note;

    var dayLabels = ['月','火','水','木','金','土','日'];
    var rows = [];
    dayLabels.forEach(function(label, i) {
      if (dayVals[i] > 0) {
        rows.push([label + '曜日', fmt(dayVals[i]) + ' 時間', false]);
      }
    });
    rows.push(['今週合計', fmt(total) + ' 時間', true]);
    rows.push(['上限', fmt(limit) + ' 時間', false]);
    rows.push(['残り', (remaining >= 0 ? '+' : '') + fmt(remaining) + ' 時間', true]);

    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    // 記録に追加
    addRecord(total, remaining, level);

    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── 週間記録 ──
  function getRecords() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY + '_records') || '[]'); }
    catch(e) { return []; }
  }
  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY + '_records', JSON.stringify(records));
  }

  function addRecord(total, remaining, level) {
    var records = getRecords();
    var now = new Date();
    var dateStr = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate();
    var staffName = document.getElementById('staffName').value.trim() || '未設定';
    var limit = parseFloat(document.getElementById('limit').value) || 20;
    records.unshift({
      date: dateStr,
      staff: staffName,
      total: total,
      limit: limit,
      remaining: remaining,
      level: level
    });
    if (records.length > 50) records = records.slice(0, 50);
    saveRecords(records);
    renderRecords();
  }

  function renderRecords() {
    var records = getRecords();
    var list = document.getElementById('recordList');
    if (records.length === 0) {
      list.innerHTML = '<li><span class="empty-msg">記録がありません。計算すると自動保存されます。</span></li>';
      return;
    }
    list.innerHTML = records.map(function(r, i) {
      var badgeText = r.level === 'ok' ? '安全圏' : r.level === 'warn' ? '要注意' : (r.remaining < 0 ? '超過' : '上限到達');
      return '<li class="rec-' + r.level + '">'
        + '<span class="rec-label">' + r.date + '　' + r.staff + '</span>'
        + '<span class="rec-hours">' + fmt(r.total) + '/' + fmt(r.limit) + 'h'
        + '<span class="rec-badge">' + badgeText + '</span></span>'
        + '<button class="btn-del-rec" onclick="delRecord(' + i + ')">削除</button>'
        + '</li>';
    }).join('');
  }

  function delRecord(idx) {
    var records = getRecords();
    records.splice(idx, 1);
    saveRecords(records);
    renderRecords();
  }

  function clearAll() {
    if (!confirm('記録をすべて削除しますか？')) return;
    saveRecords([]);
    renderRecords();
  }

  // ── localStorage 入力値保存 ──
  function saveInputs() {
    var data = {
      staffName: document.getElementById('staffName').value,
      limit: document.getElementById('limit').value,
      days: DAYS.map(function(id) { return document.getElementById(id).value; })
    };
    localStorage.setItem(STORAGE_KEY + '_inputs', JSON.stringify(data));
  }

  function loadInputs() {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY + '_inputs') || '{}');
      if (data.staffName !== undefined) document.getElementById('staffName').value = data.staffName;
      if (data.limit !== undefined) document.getElementById('limit').value = data.limit;
      if (data.days) {
        data.days.forEach(function(v, i) {
          if (DAYS[i]) document.getElementById(DAYS[i]).value = v;
        });
      }
    } catch(e) {}
    updateWeekTotal();
  }

  // イベント設定
  document.getElementById('staffName').addEventListener('input', saveInputs);
  document.getElementById('limit').addEventListener('input', saveInputs);

  // 初期化
  loadInputs();
  renderRecords();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
