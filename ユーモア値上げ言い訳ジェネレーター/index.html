<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーモア値上げ言い訳ジェネレーター｜イライラを笑いに変える3パターン</title>
  <meta name="description" content="値上げ対象とシーンを選ぶだけで、家族・SNS・愚痴用に使えるユーモア言い訳フレーズを3パターン即生成。値上げのモヤモヤを笑いに変えてコピペ投稿できる無料ジェネレーターです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 言い訳パターン ── */
    .phrase-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.8rem;
      text-align: left;
    }
    .phrase-item:last-child { margin-bottom: 0; }
    .phrase-num {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .phrase-text {
      font-size: 0.98rem; color: var(--text); line-height: 1.6;
      margin-bottom: 0.7rem; white-space: pre-wrap; word-break: break-word;
    }
    .btn-copy {
      display: inline-block; padding: 0.4rem 0.9rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); border-color: var(--ok); color: #fff; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ユーモア値上げ言い訳ジェネレーター</h1>
    <p class="subtitle">値上げのイライラを笑いに変える3パターンを30秒で生成・コピー</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">値上げ対象とシーンを選ぶ</p>
    <div class="field">
      <label for="cat">値上げ対象カテゴリ</label>
      <select id="cat">
        <option value="food">食品（卵・野菜・米・肉など）</option>
        <option value="utility">電気・ガス・水道</option>
        <option value="gas">ガソリン・燃料</option>
        <option value="rent">家賃・住宅費</option>
        <option value="cafe">カフェ・外食</option>
        <option value="leisure">娯楽・映画・旅行</option>
        <option value="oshi">推し活・グッズ・チケット</option>
        <option value="other">その他いろいろ</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">使うシーン</label>
      <select id="scene">
        <option value="family">家族にぼやく</option>
        <option value="sns">SNSに投稿</option>
        <option value="boss">上司への愚痴</option>
        <option value="friend">友達への笑い話</option>
        <option value="self">自分を慰める</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="calc()">言い訳を3パターン生成する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">ユーモア言い訳・3パターン</p>
    <div id="phrases"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ※ このツールはユーモア・娯楽用途のフレーズ生成器です。家計の判断や公式な発言には使わず、SNS投稿・雑談・愚痴の笑いの種としてお楽しみください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── カテゴリ別ユーモア・フレーズ ──
  var PHRASES = {
    food: [
      'もはやスーパーは博物館。並んでる商品は鑑賞用、買うのは選ばれし者だけ。',
      'イチゴ1パックがミニ宝石。買えたらインスタに載せたいレベル。',
      '卵が高級食材になる時代、令和の貴族体験を毎日させていただいてます。',
      '値札を二度見する筋肉だけ鍛えられた、新しい体幹トレーニング。',
      '「お買い得」の定義、誰か再翻訳してください。意味が変わってる。',
      '食費の家計簿が、もはや短編小説。読み返すと泣ける。',
      'レジで合計額が出るたびに「今のは…幻だよね？」と現実逃避してる。'
    ],
    utility: [
      '電気代がライバル。月末に勝てた試しがない。',
      '冷蔵庫が金庫。中身より電気代のほうが高いまである。',
      'エアコンつけると財布が冷える。これがほんとのクールダウン。',
      'ガス代の請求書、もはや脅迫状。封を開ける勇気が試される。',
      '「節電してるよ」って言いながら、心が一番節電されてる。',
      '電気つけるたびに10円玉が空に消えていく音が聞こえる。'
    ],
    gas: [
      '給油はもう儀式。賽銭のつもりで札を出してます。',
      'ガソリンスタンドの値段表、もう価格じゃなくてエンタメ。',
      '満タンにする勇気、それ自体が現代の贅沢。',
      '昔は遠出、今は近所ですらガス代と相談。',
      '「リッターいくら？」が日常の挨拶になりつつある。',
      '給油するたびに、車に「働いてくれ」と話しかけてる。'
    ],
    rent: [
      '家賃で住んでるんじゃなく、家賃に住まわされてる感がすごい。',
      '更新料の通知、開封する前に深呼吸が必要なレベル。',
      '部屋の広さより、家賃のほうが先に育っていく不思議。',
      '「住めば都」って言うけど、住むだけで都が遠ざかっていく。',
      '家賃を払うたびに、自分の人生にサブスク登録してる気分。',
      'ベランダで深呼吸→そこも家賃に含まれてると思って涙。'
    ],
    cafe: [
      'カフェラテ1杯が、もはや小さなご褒美じゃなく決済イベント。',
      '「ちょっとカフェでも」が、もう日常会話の上級レベル。',
      'スタバのサイズ、Tallが心のグランデになりつつある。',
      'コーヒー1杯=ランチ予算の時代、私たちは大人になった。',
      '外食の値段、もはやイベント価格。誕生日かと錯覚する。',
      'モーニングセットが、朝の小冒険。お会計でクライマックス。'
    ],
    leisure: [
      '映画館は文化の塔。チケット代がもはや入山料。',
      '旅行は「行けたらラッキー」枠。計画よりも貯金が先。',
      '遊園地のフリーパス、人生のフリーパスより貴重。',
      '「気分転換に映画でも」が、もう年に1回の儀式。',
      'ライブのチケット代、最近は宝くじを買う気分で申込。',
      '休日の過ごし方が、無料コンテンツ探しという新スポーツ。'
    ],
    oshi: [
      '推し活は信仰、課金はお布施。値上げは試練、応援は不変。',
      'グッズ1個の値段、もはや小さな絵画。家宝にする他ない。',
      '推しのために働く、推しのために節約する、推しのために生きる。',
      '「現場に行く」が令和の冒険。装備（軍資金）を整えて挑む。',
      'チケット代が上がるたび、推しへの愛が試される修行モード。',
      '推しグッズを並べると、家計簿が泣く。でも心は満たされる。'
    ],
    other: [
      '何もかも値上げ、心まで値上げ。せめて感情はセール価格にしたい。',
      'レシートを見るたびに、現実とフィクションの境目が曖昧になる。',
      '「昔は安かったのに」が口癖になった瞬間、私は大人になった。',
      '値上げに慣れる才能だけ、急成長中。これも適応能力？',
      '財布のチャックを開けるたび、勇気と決意が必要になった令和。',
      '物価が上がる、給料は据え置き、笑顔だけは無料で頑張る。'
    ]
  };

  // ── シーン別の包み方 ──
  var SCENE_WRAP = {
    family: function(p) { return 'ねぇ聞いて、' + p; },
    sns:    function(p) { return p + '\n#値上げあるある #令和の現実'; },
    boss:   function(p) { return 'すみません、ちょっと愚痴を…' + p + 'って思っちゃう日もあるんですよ。'; },
    friend: function(p) { return 'ウケるんだけどさ、' + p + '笑'; },
    self:   function(p) { return 'まあでもさ、' + p + 'って思えば、ちょっと笑える。今日も乗り切ろ。'; }
  };

  function calc() {
    var cat = document.getElementById('cat').value;
    var scene = document.getElementById('scene').value;
    var pool = PHRASES[cat] || PHRASES.other;
    var wrap = SCENE_WRAP[scene] || SCENE_WRAP.self;

    // pool からランダム3つ選ぶ
    var picks = pickThree(pool);
    var rendered = picks.map(function(p){ return wrap(p); });

    var html = rendered.map(function(text, i){
      var safe = escapeHtml(text);
      var idx = i + 1;
      return '<div class="phrase-item">'
           +   '<p class="phrase-num">PATTERN ' + idx + '</p>'
           +   '<p class="phrase-text" id="pt' + idx + '">' + safe + '</p>'
           +   '<button class="btn-copy" onclick="copyPhrase(' + idx + ', this)">📋 コピー</button>'
           + '</div>';
    }).join('');

    document.getElementById('phrases').innerHTML = html;
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';

    saveLast(cat, scene);
  }

  function pickThree(arr) {
    var copy = arr.slice();
    var out = [];
    var n = Math.min(3, copy.length);
    for (var i = 0; i < n; i++) {
      var k = Math.floor(Math.random() * copy.length);
      out.push(copy[k]);
      copy.splice(k, 1);
    }
    return out;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/\n/g, '<br>');
  }

  function copyPhrase(i, btn) {
    var el = document.getElementById('pt' + i);
    if (!el) return;
    var text = el.innerText || el.textContent || '';
    var done = function() {
      btn.classList.add('copied');
      var orig = btn.textContent;
      btn.textContent = '✓ コピーしました';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = orig;
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    cb();
  }

  // ── localStorage 保存・復元 ──
  var LS_KEY = 'humor_neage_last_v1';
  function saveLast(cat, scene) {
    try { localStorage.setItem(LS_KEY, JSON.stringify({cat: cat, scene: scene})); } catch(e) {}
  }
  function loadLast() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var obj = JSON.parse(raw);
      if (obj.cat) document.getElementById('cat').value = obj.cat;
      if (obj.scene) document.getElementById('scene').value = obj.scene;
    } catch(e) {}
  }
  loadLast();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
