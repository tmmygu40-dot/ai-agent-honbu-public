<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フリーランス案件管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>フリーランス案件管理</h1>

    <!-- 案件登録フォーム -->
    <section class="form-section">
      <h2>案件を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="projectName">案件名</label>
          <input type="text" id="projectName" placeholder="例：Webデザイン">
        </div>
        <div class="form-group">
          <label for="workDate">対象月</label>
          <input type="month" id="workDate">
        </div>
        <div class="form-group">
          <label for="workHours">作業時間（h）</label>
          <input type="number" id="workHours" placeholder="例：20" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label for="unitPrice">単価（円/h）</label>
          <input type="number" id="unitPrice" placeholder="例：3000" min="0">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- 月フィルター -->
    <section class="filter-section">
      <label for="filterMonth">表示月：</label>
      <input type="month" id="filterMonth">
      <button id="clearFilter" class="btn-secondary">すべて表示</button>
    </section>

    <!-- 月別集計 -->
    <section class="summary-section" id="summarySection">
      <div class="summary-card">
        <div class="summary-label">収入合計</div>
        <div class="summary-value" id="totalIncome">¥0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">稼働時間合計</div>
        <div class="summary-value" id="totalHours">0h</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">案件数</div>
        <div class="summary-value" id="totalCount">0件</div>
      </div>
    </section>

    <!-- 案件一覧 -->
    <section class="list-section">
      <h2>案件一覧</h2>
      <ul id="projectList" class="project-list">
        <li class="empty-msg" id="emptyMsg">案件がありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
