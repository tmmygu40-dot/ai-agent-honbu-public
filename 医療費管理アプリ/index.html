<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医療費管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>医療費管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>医療費を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="member">家族名</label>
          <input type="text" id="member" placeholder="例：本人、子ども" maxlength="20">
        </div>
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="hospital">医療機関名</label>
          <input type="text" id="hospital" placeholder="例：○○クリニック" maxlength="50">
        </div>
        <div class="form-group">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" placeholder="例：1500" min="0">
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：風邪・処方箋" maxlength="100">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- 集計サマリー -->
    <section class="summary-section">
      <h2>集計サマリー</h2>
      <div class="year-select-wrap">
        <label for="yearSelect">表示年：</label>
        <select id="yearSelect"></select>
      </div>
      <div class="summary-cards">
        <div class="card">
          <div class="card-label">年間合計</div>
          <div class="card-value" id="totalAmount">¥0</div>
        </div>
        <div class="card highlight">
          <div class="card-label">医療費控除の目安</div>
          <div class="card-value" id="deductionAmount">¥0</div>
          <div class="card-note">（年間合計 − 10万円）</div>
        </div>
      </div>
    </section>

    <!-- 月別集計 -->
    <section class="monthly-section">
      <h2>月別集計</h2>
      <div id="monthlyTable" class="monthly-table"></div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div class="filter-wrap">
        <label for="filterMember">家族名でフィルタ：</label>
        <select id="filterMember">
          <option value="">全員</option>
        </select>
      </div>
      <div id="recordList" class="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
