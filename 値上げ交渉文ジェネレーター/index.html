<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ交渉文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── トグルボタン（トーン切替） ── */
    .tone-toggle { display: flex; gap: 0.5rem; }
    .tone-btn {
      flex: 1; padding: 0.65rem; font-size: 0.9rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tone-btn.active {
      border-color: var(--accent); background: var(--accent-light); color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果エリア ── */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .result-label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .result-area .card-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

    /* ── メール文テキストエリア ── */
    .mail-text {
      width: 100%; min-height: 320px;
      padding: 1rem; font-size: 0.92rem; line-height: 1.75;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--accent-light); color: var(--text);
      resize: vertical; font-family: inherit;
      outline: none;
    }
    .mail-text:focus { border-color: var(--accent); background: #fff; }

    /* ── コピー・保存ボタン ── */
    .action-row { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
    .btn-copy, .btn-save {
      flex: 1; padding: 0.7rem; font-size: 0.88rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-copy:active { opacity: 0.8; }
    .btn-save { background: var(--card); color: var(--text-sub); }
    .btn-save:active { opacity: 0.8; }

    /* ── 保存履歴 ── */
    .history-card { display: none; }
    .history-item {
      border: 1px solid var(--border); border-radius: 9px;
      padding: 0.75rem; margin-bottom: 0.6rem; cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:last-child { margin-bottom: 0; }
    .history-item:hover { border-color: var(--accent); }
    .history-item-title { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.2rem; }
    .history-item-preview { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item-del {
      float: right; background: none; border: none;
      color: var(--text-sub); font-size: 1rem; cursor: pointer; line-height: 1;
      padding: 0 0 0 0.5rem;
    }
    .history-item-del:hover { color: var(--ng); }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 0.6rem 1.2rem;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>値上げ交渉文ジェネレーター</h1>
    <p class="subtitle">業種と状況を選ぶだけで仕入れ先への交渉メール文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>

    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食">飲食業</option>
        <option value="小売">小売業</option>
        <option value="製造">製造業</option>
        <option value="建設">建設業</option>
        <option value="サービス">サービス業</option>
        <option value="運輸">運輸・物流業</option>
        <option value="農業">農業・食品加工業</option>
      </select>
    </div>

    <div class="field">
      <label for="situation">値上げの主な理由</label>
      <select id="situation">
        <option value="原材料高騰">原材料・資材の高騰</option>
        <option value="円安">円安の進行</option>
        <option value="燃料費">燃料費・エネルギーコストの増加</option>
        <option value="物流費">物流コスト・運送費の増加</option>
        <option value="人件費">人件費・最低賃金の上昇</option>
        <option value="複合">複数要因の重複（全体的なコスト増）</option>
      </select>
    </div>

    <div class="field">
      <label for="rate">希望する値上げ率（%）<span style="font-weight:400;font-size:0.78rem;"> — 空欄で「ご相談」表記</span></label>
      <input type="number" id="rate" placeholder="例: 8" min="1" max="99">
    </div>

    <div class="field">
      <label>文面のトーン</label>
      <div class="tone-toggle">
        <button class="tone-btn active" id="tone-polite" onclick="setTone('polite')">丁寧・柔らか</button>
        <button class="tone-btn" id="tone-firm" onclick="setTone('firm')">率直・強め</button>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">メール文を生成する</button>

  <!-- 結果エリア -->
  <div class="result-area" id="resultArea">
    <div class="card">
      <div class="result-label-row">
        <p class="card-title">生成されたメール文</p>
      </div>
      <textarea class="mail-text" id="mailText" readonly></textarea>
      <div class="action-row">
        <button class="btn-copy" onclick="copyText()">コピー</button>
        <button class="btn-save" onclick="saveHistory()">履歴に保存</button>
      </div>
    </div>
  </div>

  <!-- 保存履歴 -->
  <div class="card history-card" id="historyCard">
    <p class="card-title">保存した履歴</p>
    <div id="historyList"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <div class="toast" id="toast"></div>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var currentTone = 'polite';
  var STORAGE_KEY = 'neage_koushou_history_v1';

  function setTone(t) {
    currentTone = t;
    document.getElementById('tone-polite').classList.toggle('active', t === 'polite');
    document.getElementById('tone-firm').classList.toggle('active', t === 'firm');
  }

  // ── テンプレートデータ ──
  var INDUSTRY_LABELS = {
    '飲食': '飲食業',
    '小売': '小売業',
    '製造': '製造業',
    '建設': '建設業',
    'サービス': 'サービス業',
    '運輸': '運輸・物流業',
    '農業': '農業・食品加工業'
  };

  var SITUATION_LABELS = {
    '原材料高騰': '原材料・資材の高騰',
    '円安': '円安の進行',
    '燃料費': '燃料費・エネルギーコストの増加',
    '物流費': '物流コスト・運送費の増加',
    '人件費': '人件費・最低賃金の上昇',
    '複合': '複数要因によるコスト増'
  };

  var SITUATION_BODY = {
    '原材料高騰': {
      polite: 'このたびはご連絡をいたしますのは、原材料および資材の仕入れコストが近年大幅に上昇しておりまして、当社の経営に多大な影響が生じているためでございます。世界的な資源不足や国際相場の高騰により、主要原材料の調達コストが著しく増加しております。',
      firm: 'ご連絡の要件は、原材料・資材コストの大幅な上昇です。国際相場の高騰および資源不足の影響により、当社の調達コストは従来比で大きく上昇しており、現行の取引単価では事業継続が困難な状況となっております。'
    },
    '円安': {
      polite: 'このたびご連絡を差し上げますのは、急速な円安の進行により、輸入原材料および関連資材の調達コストが大幅に上昇しているためでございます。為替レートの急激な変動は当社の収支に直接的な影響を与えており、現状の価格体系の維持が難しい状況となっております。',
      firm: 'ご連絡の要件は、円安進行によるコスト増加の問題です。急速な円安により輸入原材料の調達コストが大幅に上昇しており、現行単価での取引の継続が事業的に困難となっております。'
    },
    '燃料費': {
      polite: 'このたびご連絡を申し上げますのは、燃料費・エネルギーコストの高騰により、製造・運営コストが大幅に増加しているためでございます。電気代・ガス代・燃料費の急激な上昇は、当社の製造原価や運営費に重大な影響を及ぼしております。',
      firm: 'ご連絡の要件は、燃料費・エネルギーコストの大幅上昇です。電力・ガス・燃料費の高騰により、当社の運営コストは深刻な水準で増加しており、現行の取引価格での継続が困難な状況です。'
    },
    '物流費': {
      polite: 'このたびご連絡をいたしますのは、物流コスト・運送費の高騰が著しく、当社の仕入れおよび販売にかかるコスト構造が大きく変化しているためでございます。ドライバー不足や燃料費上昇を背景に、運送委託費が継続的に上昇しており、当社への影響が無視できない水準に達しております。',
      firm: 'ご連絡の要件は、物流・運送コストの高騰です。ドライバー不足・燃料高騰の複合要因により運送費が大幅に増加しており、現行価格での事業運営が困難になっております。'
    },
    '人件費': {
      polite: 'このたびご連絡を差し上げますのは、最低賃金の引き上げをはじめとした人件費の上昇により、当社の運営コストが増加しているためでございます。年々引き上げられる最低賃金に加え、人材確保のための処遇改善も重なり、人件費の増加分を現行の価格では吸収しきれない状況となっております。',
      firm: 'ご連絡の要件は、人件費・最低賃金上昇によるコスト増加です。継続的な最低賃金引き上げと人材確保コストの上昇により、現行の取引価格での採算確保が困難になっております。'
    },
    '複合': {
      polite: 'このたびご連絡を申し上げますのは、原材料高騰・円安・燃料費増加・物流費上昇・人件費増など、複数の要因が重なってコスト全体が大幅に上昇しているためでございます。個別要因だけであれば企業努力での吸収も試みてまいりましたが、複数の要因が同時進行していることから、現状の価格体系の継続が困難な状況に至っております。',
      firm: 'ご連絡の要件は、複合的なコスト上昇への対応です。原材料高騰・円安・燃料費・物流費・人件費と、複数要因が同時に上昇しており、これ以上の企業努力による吸収が限界に達しております。'
    }
  };

  function generate() {
    var industry = document.getElementById('industry').value;
    var situation = document.getElementById('situation').value;
    var rateVal = document.getElementById('rate').value.trim();
    var tone = currentTone;

    var industryLabel = INDUSTRY_LABELS[industry] || industry;
    var situationLabel = SITUATION_LABELS[situation] || situation;
    var rateText = rateVal ? '約' + rateVal + '％' : 'ご相談の上';

    var situationBody = (SITUATION_BODY[situation] && SITUATION_BODY[situation][tone])
      ? SITUATION_BODY[situation][tone]
      : SITUATION_BODY['複合'][tone];

    var mail = '';

    if (tone === 'polite') {
      mail = [
        '件名：商品単価の改定に関するご相談とお願い',
        '',
        '拝啓',
        '',
        'お世話になっております。平素より格別のお引き立てを賜り、厚く御礼申し上げます。',
        '',
        situationBody,
        '',
        'これまで当社では、品質の維持と安定供給のために最大限のコスト削減努力を重ねてまいりました。しかしながら、昨今のコスト上昇幅はその努力の域を超えており、誠に不本意ではございますが、現行の商品単価の改定についてご相談させていただきたく存じます。',
        '',
        '◆ ご相談内容',
        '現行価格より ' + rateText + ' の価格改定',
        '実施時期：ご協議の上、決定させていただければ幸いです。',
        '',
        'お客様との長期的なお取引を大切にしたいと考えております。改定幅や実施時期につきましては、貴社のご状況も踏まえて柔軟にご相談させていただく所存です。',
        '',
        'ご多忙のところ誠に恐縮でございますが、ご検討のほど何卒よろしくお願い申し上げます。詳細につきましては、改めてお時間をいただきご説明させていただければ幸いです。',
        '',
        '敬具',
        '',
        '──────────────────',
        '【差出人情報】',
        '会社名：',
        '担当者名：',
        '電話：',
        'メール：',
        '──────────────────'
      ].join('\n');
    } else {
      mail = [
        '件名：取引単価の改定について（ご連絡）',
        '',
        'お世話になっております。',
        '',
        situationBody,
        '',
        '当社としてはコスト削減に取り組んでまいりましたが、現行の取引価格での継続は限界に達しております。つきましては、下記の通り価格改定をお願いしたく、ご連絡差し上げます。',
        '',
        '【改定内容】',
        '現行価格より ' + rateText + ' の値上げ',
        '実施希望時期：ご相談の上、早期に決定させていただきたく存じます。',
        '',
        '誠に申し訳ございませんが、事業継続の観点から必要な措置としてご理解くださいますようお願い申し上げます。',
        'ご質問やご要望がございましたら、お気軽にお申し付けください。引き続きよろしくお願いいたします。',
        '',
        '──────────────────',
        '【差出人情報】',
        '会社名：',
        '担当者名：',
        '電話：',
        'メール：',
        '──────────────────'
      ].join('\n');
    }

    document.getElementById('mailText').value = mail;
    document.getElementById('resultArea').style.display = 'block';

    // スクロール
    setTimeout(function() {
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function copyText() {
    var text = document.getElementById('mailText').value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      showToast('コピーしました');
    }).catch(function() {
      // フォールバック
      var ta = document.getElementById('mailText');
      ta.removeAttribute('readonly');
      ta.select();
      document.execCommand('copy');
      ta.setAttribute('readonly', '');
      showToast('コピーしました');
    });
  }

  function saveHistory() {
    var text = document.getElementById('mailText').value;
    if (!text) return;
    var industry = document.getElementById('industry').value;
    var situation = document.getElementById('situation').value;
    var rate = document.getElementById('rate').value.trim();
    var label = INDUSTRY_LABELS[industry] + '×' + SITUATION_LABELS[situation]
              + (rate ? '（' + rate + '%値上げ）' : '');
    var list = loadHistory();
    list.unshift({ id: Date.now(), label: label, text: text, date: new Date().toLocaleDateString('ja-JP') });
    if (list.length > 20) list = list.slice(0, 20);
    saveHistoryList(list);
    renderHistory();
    showToast('履歴に保存しました');
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
  }
  function saveHistoryList(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function renderHistory() {
    var list = loadHistory();
    var card = document.getElementById('historyCard');
    var container = document.getElementById('historyList');
    if (!list.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    container.innerHTML = list.map(function(item) {
      return '<div class="history-item" id="hi-' + item.id + '">'
        + '<button class="history-item-del" onclick="deleteHistory(' + item.id + ');event.stopPropagation();" title="削除">×</button>'
        + '<div class="history-item-title">' + escHtml(item.label) + '</div>'
        + '<div class="history-item-preview">' + escHtml(item.text.substring(0, 80)) + '…</div>'
        + '</div>';
    }).join('');

    list.forEach(function(item) {
      var el = document.getElementById('hi-' + item.id);
      if (el) {
        el.addEventListener('click', function() {
          document.getElementById('mailText').value = item.text;
          document.getElementById('resultArea').style.display = 'block';
          document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        });
      }
    });
  }

  function deleteHistory(id) {
    var list = loadHistory().filter(function(i) { return i.id !== id; });
    saveHistoryList(list);
    renderHistory();
    showToast('削除しました');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  // 初期化
  renderHistory();
  </script>

</body>
</html>
