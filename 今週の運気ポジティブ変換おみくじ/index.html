<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今週の運気を30秒で診断。ネガティブな結果もポジティブに変換してくれるおみくじアプリです。">
  <title>🎉 今週の運気ポジティブ変換おみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 絵文字ひとこと ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    .result-card.ok   .result-emoji-text { color: var(--ok); }
    .result-card.warn .result-emoji-text { color: var(--warn); }
    .result-card.ng   .result-emoji-text { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎉 今週の運気ポジティブ変換おみくじ</h1>
    <p class="subtitle">今週の運気を30秒で診断。ネガティブな結果もポジティブに変換してくれます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">週を選ぶ</p>
    <div class="field">
      <label for="week">診断する週</label>
      <select id="week">
        <option value="">-- 選択してください --</option>
        <option value="this">今週</option>
        <option value="next">来週</option>
        <option value="after">再来週</option>
        <option value="random">ランダム診断</option>
      </select>
      <p class="hint">診断したい時期を選んでください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="diagnose()">運気診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="emoji">😌</p>
    <p class="result-value" id="rv">大吉</p>
    <p class="result-emoji-text" id="et">素晴らしい運気です！</p>
    <p class="result-note" id="rn">最高のチャンスが訪れています</p>
    <p class="result-eval" id="re">ポジティブな行動で、運気はさらに上昇します！</p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このアプリの診断結果は参考・エンターテインメント目的です。重要な判断は信頼できる情報・専門家のアドバイスを参考にしてください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var OMIKUJI_DATA = {
    this: [
      { level: 'ok', value: '大吉',  emoji: '🌟', msg: '素晴らしい運気です！', advice: 'チャンスの到来。積極的に行動して、幸運をつかみましょう！' },
      { level: 'ok', value: '中吉',  emoji: '😊', msg: '良い流れが来ています', advice: '小さな幸せを積み重ねることで、さらに良い週になります' },
      { level: 'warn', value: '小吉', emoji: '😌', msg: 'まあまあな週です', advice: 'コツコツ努力すれば、意外な良いことが起こるかも' },
      { level: 'warn', value: '吉',   emoji: '🤔', msg: 'チャレンジのしどころ', advice: '少し工夫すれば、新しい道が開けます' },
      { level: 'ng',  value: '末吉',  emoji: '😅', msg: '落ち着きが大切な週', advice: 'こういう時こそ丁寧さが身を守ります。来週は明るい予報です！' }
    ],
    next: [
      { level: 'ok', value: '大吉',  emoji: '✨', msg: '来週は大きなチャンスの予感', advice: 'その時のために、今週から準備を始めましょう！' },
      { level: 'ok', value: '中吉',  emoji: '😄', msg: 'いい流れが続きそうです', advice: '今週のいい勢いをそのまま来週に持ち込めます' },
      { level: 'warn', value: '小吉', emoji: '😊', msg: 'チャンスと課題が混在', advice: '注意深く行動すれば、課題もチャンスに変わります' },
      { level: 'warn', value: '吉',   emoji: '🙂', msg: 'バランスが大事な週', advice: '焦らず、着実に進むことが成功の鍵です' },
      { level: 'ng',  value: '末吉',  emoji: '💪', msg: 'しばらく辛抱の週ですが', advice: 'それでもポジティブに過ごせば、その先に晴れ間が！' }
    ],
    after: [
      { level: 'ok', value: '大吉',  emoji: '🎆', msg: '再来週はしあわせ週間！', advice: '目標に向かって全力で走る準備を始めましょう' },
      { level: 'ok', value: '中吉',  emoji: '😍', msg: '再来週も運気好調です', advice: 'この流れを逃さず、やりたいことに挑戦してください' },
      { level: 'warn', value: '小吉', emoji: '🤗', msg: '平穏な週が見えてきます', advice: 'この時間を使って、次のステップを考えるのもいいですね' },
      { level: 'warn', value: '吉',   emoji: '😌', msg: '回復の予兆が見えます', advice: '今から前向きな気持ちを持つことが大切です' },
      { level: 'ng',  value: '末吉',  emoji: '🌱', msg: '新しい芽が出始める週', advice: 'つらい時期も終わりに。希望をもって過ごしましょう' }
    ]
  };

  function diagnose() {
    var weekSelect = document.getElementById('week').value;
    if (!weekSelect) {
      showErr('週を選んでください');
      return;
    }

    var week = weekSelect === 'random'
      ? ['this', 'next', 'after'][Math.floor(Math.random() * 3)]
      : weekSelect;

    var data = OMIKUJI_DATA[week];
    var omikuji = data[Math.floor(Math.random() * data.length)];

    showResult(omikuji);
    saveLast(week, omikuji);
  }

  function showResult(omikuji) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + omikuji.level;
    document.getElementById('emoji').textContent = omikuji.emoji;
    document.getElementById('rv').textContent = omikuji.value;
    document.getElementById('et').textContent = omikuji.msg;
    document.getElementById('rn').textContent = '「' + omikuji.advice + '」';
    document.getElementById('re').textContent = '今週も頑張りましょう！ 新しい運気を引き寄せるのは、あなたのポジティブな行動です。';
    rc.style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    document.getElementById('emoji').textContent = '⚠️';
    document.getElementById('rv').textContent = 'エラー';
    document.getElementById('et').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('re').textContent = '';
    rc.style.display = '';
  }

  function saveLast(week, omikuji) {
    var data = {
      week: week,
      omikuji: omikuji.value,
      date: new Date().toLocaleString('ja-JP')
    };
    localStorage.setItem('omikuji_last', JSON.stringify(data));
  }

  window.addEventListener('load', function() {
    var last = localStorage.getItem('omikuji_last');
    if (last) {
      var data = JSON.parse(last);
      // 前回の診断を表示（オプション）
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
