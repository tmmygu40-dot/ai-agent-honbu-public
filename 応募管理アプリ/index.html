<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>応募管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>応募管理アプリ</h1>

    <section class="form-section">
      <h2>新規応募を登録</h2>
      <form id="entryForm">
        <div class="form-row">
          <label for="company">企業名</label>
          <input type="text" id="company" placeholder="例：株式会社○○" required>
        </div>
        <div class="form-row">
          <label for="appliedDate">応募日</label>
          <input type="date" id="appliedDate" required>
        </div>
        <div class="form-row">
          <label for="status">選考状況</label>
          <select id="status">
            <option value="書類選考中">書類選考中</option>
            <option value="一次面接">一次面接</option>
            <option value="二次面接">二次面接</option>
            <option value="最終面接">最終面接</option>
            <option value="内定">内定</option>
            <option value="不採用">不採用</option>
            <option value="辞退">辞退</option>
          </select>
        </div>
        <div class="form-row">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：○○部門、リモート可">
        </div>
        <button type="submit" class="btn-add">登録する</button>
      </form>
    </section>

    <section class="filter-section">
      <label for="filterStatus">絞り込み：</label>
      <select id="filterStatus">
        <option value="all">すべて</option>
        <option value="書類選考中">書類選考中</option>
        <option value="一次面接">一次面接</option>
        <option value="二次面接">二次面接</option>
        <option value="最終面接">最終面接</option>
        <option value="内定">内定</option>
        <option value="不採用">不採用</option>
        <option value="辞退">辞退</option>
      </select>
      <span id="countDisplay" class="count-display"></span>
    </section>

    <section class="list-section">
      <div id="entryList"></div>
      <p id="emptyMessage" class="empty-msg">応募はまだ登録されていません。</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
