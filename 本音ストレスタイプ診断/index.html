<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本音ストレスタイプ診断｜3問でわかる原因タイプと発散法</title>
  <meta name="description" content="3つの質問に答えるだけで、あなたの本音のストレス原因タイプと、今すぐできる発散法が分かる無料診断アプリ。仕事・人間関係・時間に追われる感覚など、自分のクセを把握して心を軽くしましょう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { margin-bottom: 1.3rem; }
    .question:last-child { margin-bottom: 0; }
    .question .q-text { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.5; }
    .choice-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .choice {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .choice .choice-text { font-size: 0.9rem; line-height: 1.4; }
    .choice:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }
    .result-emoji { font-size: 2.4rem; margin-bottom: 0.3rem; line-height: 1.2; }

    .release-list { width: 100%; font-size: 0.9rem; text-align: left; }
    .release-list li { padding: 0.5rem 0.2rem; border-bottom: 1px solid var(--border); line-height: 1.5; list-style: none; }
    .release-list li:last-child { border-bottom: none; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>本音ストレスタイプ診断</h1>
    <p class="subtitle">3つの質問でわかる、あなたの本音のストレス原因タイプと今すぐできる発散法</p>
  </header>

  <div class="card">
    <p class="card-title">3つの質問に答えてください</p>

    <div class="question">
      <p class="q-text">Q1. 最近、一番モヤッとした瞬間は？</p>
      <div class="choice-list">
        <label class="choice"><input type="radio" name="q1" value="A"><span class="choice-text">A. 誰かの一言や態度にイラッとした</span></label>
        <label class="choice"><input type="radio" name="q1" value="B"><span class="choice-text">B. やることが多すぎて頭がパンクしそうだった</span></label>
        <label class="choice"><input type="radio" name="q1" value="C"><span class="choice-text">C. 言いたいことを飲み込んで我慢した</span></label>
      </div>
    </div>

    <div class="question">
      <p class="q-text">Q2. 1日の終わりに一番感じるのは？</p>
      <div class="choice-list">
        <label class="choice"><input type="radio" name="q2" value="A"><span class="choice-text">A. なんでこの人とこんなに話したんだろう…という疲れ</span></label>
        <label class="choice"><input type="radio" name="q2" value="B"><span class="choice-text">B. 時間に追われて自分の時間がゼロだった</span></label>
        <label class="choice"><input type="radio" name="q2" value="C"><span class="choice-text">C. 自分の気持ちを後回しにしすぎた</span></label>
      </div>
    </div>

    <div class="question">
      <p class="q-text">Q3. もし今30分自由に使えるなら？</p>
      <div class="choice-list">
        <label class="choice"><input type="radio" name="q3" value="A"><span class="choice-text">A. 一人になれる場所でとにかく無言になりたい</span></label>
        <label class="choice"><input type="radio" name="q3" value="B"><span class="choice-text">B. ベッドに倒れ込んで何もしたくない</span></label>
        <label class="choice"><input type="radio" name="q3" value="C"><span class="choice-text">C. 思いっきり泣くか叫ぶかしたい</span></label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="re">🌿</p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="release-card" style="display:none">
    <p class="card-title">今すぐできる発散法</p>
    <ul class="release-list" id="release-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省「働く人のメンタルヘルス・ポータルサイト」など公的機関の情報を参考に、セルフチェックの目安として整理しています。深刻な不調を感じる場合は専門窓口へご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    A: {
      emoji: '👥',
      name: '人間関係グッタリ型',
      note: '人の言葉や態度を真っすぐ受け止めすぎて、心がチクチクしているサイン。距離を取る勇気が、今いちばんの薬になります。',
      release: [
        '5分でいいので、誰とも話さない「無言タイム」を作る',
        'スマホの通知を1時間だけOFFにして、視界から人を消す',
        '紙に「ムカついた一言」を書き出して、ビリビリに破る',
        '今日は誰の機嫌も取らないと決める。返事は明日でOK'
      ]
    },
    B: {
      emoji: '⏰',
      name: '時間に追われる型',
      note: 'タスクの量より、「終わらないかも」という焦りで消耗しているタイプ。一度立ち止まって、優先順位を1個だけ決めるのが近道です。',
      release: [
        'TODOを全部書き出して、今日やる1つだけ赤丸を付ける',
        '残りは「明日の自分に任せる」と声に出して終了宣言する',
        '5分タイマーをかけて、ベッドに倒れて目を閉じる',
        '湯船に肩までつかる（無理ならシャワーを首に1分当てる）'
      ]
    },
    C: {
      emoji: '🗣️',
      name: '本音飲み込み型',
      note: '言いたいことを我慢するのが上手すぎて、心の中に在庫がパンパンになっています。出口を作るだけで、ぐっと軽くなります。',
      release: [
        '誰にも見せない前提で、本音をスマホのメモに殴り書きする',
        'カラオケや車内で、声を出して歌う or 叫ぶ',
        '「今日くらい自分の機嫌を最優先」と紙に書いて見えるとこに貼る',
        '泣ける動画・曲を1本見て、思い切り涙を流す'
      ]
    }
  };

  function diagnose() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');
    if (!q1 || !q2 || !q3) {
      showErr('3つすべての質問にお答えください');
      return;
    }
    var counts = { A: 0, B: 0, C: 0 };
    counts[q1.value]++; counts[q2.value]++; counts[q3.value]++;

    var top = 'A', max = -1;
    ['A','B','C'].forEach(function(k){ if (counts[k] > max) { max = counts[k]; top = k; } });

    var t = TYPES[top];
    var rc = document.getElementById('result');
    rc.className = 'result-card warn';
    rc.style.display = 'block';
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;

    var rl = document.getElementById('release-list');
    rl.innerHTML = t.release.map(function(x){ return '<li>・' + x + '</li>'; }).join('');
    document.getElementById('release-card').style.display = 'block';

    try { localStorage.setItem('honne_stress_type', top); } catch(e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('release-card').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
