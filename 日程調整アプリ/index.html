<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <!-- 作成画面 -->
  <div id="screen-create" class="screen">
    <header>
      <h1>日程調整アプリ</h1>
      <p class="subtitle">候補日を入力してURLで共有</p>
    </header>
    <main>
      <section class="card">
        <label>イベント名</label>
        <input type="text" id="event-name" placeholder="例：チームランチ" maxlength="50">
      </section>

      <section class="card">
        <label>候補日を追加</label>
        <div class="date-input-row">
          <input type="date" id="date-input">
          <button onclick="addDate()" class="btn-add">追加</button>
        </div>
        <ul id="date-list" class="date-list"></ul>
      </section>

      <button onclick="generateVoteUrl()" class="btn-primary">共有URLを生成</button>

      <section id="vote-url-section" class="card hidden">
        <label>参加者に送るURL</label>
        <div class="url-box" id="vote-url-display"></div>
        <button onclick="copyVoteUrl()" class="btn-copy">URLをコピー</button>
        <p class="hint">このURLを参加者に送ってください</p>
      </section>
    </main>
  </div>

  <!-- 回答画面 -->
  <div id="screen-vote" class="screen hidden">
    <header>
      <h1 id="vote-event-name"></h1>
      <p class="subtitle">参加可否を入力してください</p>
    </header>
    <main>
      <section class="card">
        <label>あなたのお名前</label>
        <input type="text" id="voter-name" placeholder="名前を入力" maxlength="20">
      </section>

      <section class="card">
        <label>各候補日の参加可否</label>
        <div id="vote-dates"></div>
      </section>

      <button onclick="generateAnswerUrl()" class="btn-primary">回答URLを生成</button>

      <section id="answer-url-section" class="card hidden">
        <label>主催者に送るURL</label>
        <div class="url-box" id="answer-url-display"></div>
        <button onclick="copyAnswerUrl()" class="btn-copy">URLをコピー</button>
        <p class="hint">このURLを主催者に送ってください</p>
      </section>
    </main>
  </div>

  <!-- 集計画面 -->
  <div id="screen-results" class="screen hidden">
    <header>
      <h1 id="results-event-name"></h1>
      <p class="subtitle">回答を集計</p>
    </header>
    <main>
      <section class="card">
        <label>参加者の回答URLを貼り付け</label>
        <div class="paste-row">
          <input type="text" id="answer-url-input" placeholder="回答URLを貼り付け">
          <button onclick="addAnswer()" class="btn-add">追加</button>
        </div>
        <p id="paste-error" class="error-msg hidden">URLが正しくありません</p>
      </section>

      <section id="result-table-section" class="card hidden">
        <div id="result-table-wrapper"></div>
      </section>

      <div class="nav-bottom">
        <button onclick="goToCreate()" class="btn-secondary">新しいイベントを作る</button>
      </div>
    </main>
  </div>

  <!-- ナビゲーション（作成・集計画面の切り替え） -->
  <nav id="main-nav" class="main-nav hidden">
    <button onclick="showScreen('create')" id="nav-create" class="nav-btn active">作成</button>
    <button onclick="showResultsFromStorage()" id="nav-results" class="nav-btn">集計</button>
  </nav>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
