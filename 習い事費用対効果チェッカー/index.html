<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="子どもの習い事を最大5件まで入力すると、年間コスト・1時間あたりの単価・満足度1点あたりの単価を一発で比較できる無料ツールです。続けるか絞るかの判断材料にお使いください。">
  <title>習い事費用対効果チェッカー｜年間コスト・時間単価で一発比較</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .lesson-block { padding: 0.8rem 0; border-bottom: 1px dashed var(--border); }
    .lesson-block:last-child { border-bottom: none; }
    .lesson-block h3 { font-size: 0.92rem; font-weight: 700; color: var(--accent); margin-bottom: 0.6rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .field { margin-bottom: 0.7rem; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.25rem; }
    .field input, .field select {
      width: 100%; padding: 0.6rem 0.8rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; color: var(--accent); }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .compare-table th, .compare-table td { padding: 0.5rem 0.4rem; text-align: right; border-bottom: 1px solid var(--border); }
    .compare-table th { background: var(--accent-light); color: var(--text-sub); font-weight: 700; font-size: 0.74rem; }
    .compare-table th:first-child, .compare-table td:first-child { text-align: left; }
    .compare-table tr.best td { background: var(--ok-bg); color: var(--ok); font-weight: 700; }
    .compare-table tr.worst td { background: var(--ng-bg); color: var(--ng); font-weight: 700; }
    .badge { display: inline-block; font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 999px; margin-left: 0.3rem; }
    .badge.best { background: var(--ok); color: #fff; }
    .badge.worst { background: var(--ng); color: #fff; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>習い事費用対効果チェッカー</h1>
    <p class="subtitle">最大5件の習い事を、年間コスト・1時間単価・満足度単価で一発比較。続けるか絞るかの判断材料に。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">習い事を入力（1件以上）</p>
    <div id="lessons"></div>
  </div>

  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">合計年間コスト</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 比較テーブル -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">比較結果（コスパ順）</p>
    <div style="overflow-x:auto;">
      <table class="compare-table">
        <thead>
          <tr><th>教室</th><th>年間コスト</th><th>時間単価</th><th>満足度単価</th></tr>
        </thead>
        <tbody id="db"></tbody>
      </table>
    </div>
    <p style="font-size:0.74rem;color:var(--text-sub);margin-top:0.7rem;line-height:1.5;">
      ※ 時間単価＝年間コスト÷年間通学時間。満足度単価＝年間コスト÷満足度。どちらも数値が小さいほどコスパが良い目安です。
    </p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは家庭での比較・判断の目安を提示するものです。実際の費用やお子さまの満足度はご家庭ごとに異なります。月謝・教材費等の最新情報は各教室にご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'lesson_cost_checker_v1';
  var LESSON_COUNT = 5;

  function buildForm() {
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem(STORE_KEY) || '{}') || {}; } catch(e){}
    var html = '';
    for (var i = 1; i <= LESSON_COUNT; i++) {
      var s = saved['l' + i] || {};
      html += '<div class="lesson-block">'
        +    '<h3>習い事 ' + i + (i === 1 ? '（必須）' : '（任意）') + '</h3>'
        +    '<div class="field"><label>教室名</label>'
        +      '<input type="text" id="n' + i + '" placeholder="例: ピアノ教室" value="' + (s.n || '') + '"></div>'
        +    '<div class="row">'
        +      '<div class="field"><label>月謝（円）</label>'
        +        '<input type="number" id="m' + i + '" placeholder="例: 8000" value="' + (s.m || '') + '"></div>'
        +      '<div class="field"><label>年間その他費用（円）</label>'
        +        '<input type="number" id="o' + i + '" placeholder="教材・発表会など" value="' + (s.o || '') + '"></div>'
        +    '</div>'
        +    '<div class="row">'
        +      '<div class="field"><label>週の回数（回）</label>'
        +        '<input type="number" id="w' + i + '" placeholder="例: 1" value="' + (s.w || '') + '"></div>'
        +      '<div class="field"><label>1回の時間（分）</label>'
        +        '<input type="number" id="t' + i + '" placeholder="例: 60" value="' + (s.t || '') + '"></div>'
        +    '</div>'
        +    '<div class="field"><label>満足度（1〜5）</label>'
        +      '<select id="s' + i + '">'
        +        '<option value="">選択</option>'
        +        '<option value="1"' + (s.s == 1 ? ' selected' : '') + '>1（不満）</option>'
        +        '<option value="2"' + (s.s == 2 ? ' selected' : '') + '>2</option>'
        +        '<option value="3"' + (s.s == 3 ? ' selected' : '') + '>3（普通）</option>'
        +        '<option value="4"' + (s.s == 4 ? ' selected' : '') + '>4</option>'
        +        '<option value="5"' + (s.s == 5 ? ' selected' : '') + '>5（大満足）</option>'
        +      '</select></div>'
        + '</div>';
    }
    document.getElementById('lessons').innerHTML = html;
  }

  function readForm() {
    var list = [];
    var save = {};
    for (var i = 1; i <= LESSON_COUNT; i++) {
      var n = document.getElementById('n' + i).value.trim();
      var m = parseFloat(document.getElementById('m' + i).value);
      var o = parseFloat(document.getElementById('o' + i).value);
      var w = parseFloat(document.getElementById('w' + i).value);
      var t = parseFloat(document.getElementById('t' + i).value);
      var s = parseInt(document.getElementById('s' + i).value, 10);
      save['l' + i] = { n:n, m:m||'', o:o||'', w:w||'', t:t||'', s:s||'' };
      if (!n && isNaN(m) && isNaN(w)) continue;
      if (!n) n = '習い事' + i;
      if (isNaN(m)) m = 0;
      if (isNaN(o)) o = 0;
      if (isNaN(w) || w <= 0) continue;
      if (isNaN(t) || t <= 0) continue;
      if (isNaN(s) || s < 1) s = 3;
      var yearCost = m * 12 + o;
      var yearHours = w * 52 * t / 60;
      var perHour = yearHours > 0 ? yearCost / yearHours : 0;
      var perSat  = s > 0 ? yearCost / s : 0;
      list.push({ n:n, yearCost:yearCost, yearHours:yearHours, perHour:perHour, perSat:perSat, s:s });
    }
    try { localStorage.setItem(STORE_KEY, JSON.stringify(save)); } catch(e){}
    return list;
  }

  function calc() {
    var list = readForm();
    if (list.length === 0) { showErr('習い事を1件以上、月謝・週回数・1回時間まで入力してください'); return; }
    list.sort(function(a, b){ return a.perHour - b.perHour; });

    var total = 0;
    list.forEach(function(x){ total += x.yearCost; });

    var bestIdx = 0, worstIdx = list.length - 1;
    var hasRange = list.length >= 2;

    var level = 'ok';
    if (total >= 600000) level = 'ng';
    else if (total >= 300000) level = 'warn';

    var msg = level === 'ok' ? '無理のない範囲。家計バランスは良好な目安です。'
            : level === 'warn' ? '年30〜60万は中ボリューム。続ける優先順位を意識すると安心。'
            : '年60万超は重め。コスパ最下位の見直し検討を。';

    showResult(level, fmt(total) + ' 円 / 年', msg);

    var rows = list.map(function(x, i){
      var cls = '';
      var label = '';
      if (hasRange && i === bestIdx) { cls = 'best'; label = '<span class="badge best">ベスト</span>'; }
      if (hasRange && i === worstIdx) { cls = 'worst'; label = '<span class="badge worst">ワースト</span>'; }
      return '<tr' + (cls ? ' class="' + cls + '"' : '') + '>'
        + '<td>' + escapeHtml(x.n) + label + '</td>'
        + '<td>' + fmt(x.yearCost) + '</td>'
        + '<td>' + fmt(x.perHour) + '</td>'
        + '<td>' + fmt(x.perSat) + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('db').innerHTML = rows;
    document.getElementById('detail').style.display = 'block';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  buildForm();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
