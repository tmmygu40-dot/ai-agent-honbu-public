<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="あなたの生活費を診断して、値上げに勝つ家計防衛7か条をサッと提案。今すぐ試してみて">
  <title>値上げラッシュ家計防衛診断 | 2026年度参考</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #ff6b35;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #e55a1f, 0 6px 16px rgba(255,107,53,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #e55a1f, 0 2px 8px rgba(255,107,53,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 防衛アドバイスリスト ── */
    .defense-list { margin-top: 1rem; }
    .defense-item {
      display: flex; gap: 0.7rem;
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
    }
    .defense-item:last-child { border-bottom: none; }
    .defense-num { font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .defense-text { font-size: 0.9rem; color: var(--text); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>🛡️ 値上げラッシュ家計防衛診断 | 2026年度参考</h1>
    <p class="subtitle">値上げラッシュの家計危機をサッと診断。あなたの防衛策を自動判定します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">生活費を入力</p>
    <div class="field">
      <label for="f1">食費（月額）</label>
      <input type="number" id="f1" placeholder="例: 50000" data-name="食費">
      <p class="hint">食料品・外食の合計</p>
    </div>
    <div class="field">
      <label for="f2">光熱費（月額）</label>
      <input type="number" id="f2" placeholder="例: 15000" data-name="光熱費">
      <p class="hint">電気・ガス・水道</p>
    </div>
    <div class="field">
      <label for="f3">通信費（月額）</label>
      <input type="number" id="f3" placeholder="例: 8000" data-name="通信費">
      <p class="hint">スマホ・インターネット</p>
    </div>
    <div class="field">
      <label for="f4">ガソリン代（月額）</label>
      <input type="number" id="f4" placeholder="例: 10000" data-name="ガソリン代">
      <p class="hint">車を使う場合</p>
    </div>
    <div class="field">
      <label for="f5">保険料（月額）</label>
      <input type="number" id="f5" placeholder="例: 12000" data-name="保険料">
      <p class="hint">生命保険・車保険など</p>
    </div>
    <div class="field">
      <label for="f6">その他支出（月額）</label>
      <input type="number" id="f6" placeholder="例: 20000" data-name="その他支出">
      <p class="hint">サブスク・小口支出</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
  </div>

  <!-- 防衛7か条カード -->
  <div class="card" id="defense-card" style="display:none">
    <p class="card-title">家計防衛7か条</p>
    <div class="defense-list" id="defense-list"></div>
  </div>

  <!-- 支出内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">支出内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・経産省・中小企業庁などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 防衛7か条データ ──
  var DEFENSE_RULES = [
    {
      title: '食費3000円削減',
      tips: '外食1回減らす、業務用スーパー活用、まとめ買いで在庫管理'
    },
    {
      title: '光熱費2000円削減',
      tips: '待機電力カット、シャワー時間短縮、断熱シート・断熱カーテン活用'
    },
    {
      title: '通信費1000円削減',
      tips: '格安SIM検討、不要プラン削減、家族割引・学割の活用'
    },
    {
      title: '保険見直し5000円削減',
      tips: 'すでに加入している保険の内容確認、重複保障の削減、割引プラン確認'
    },
    {
      title: 'ガソリン代削減',
      tips: '移動の効率化、公共交通との組み合わせ、ガソリンスタンド比較アプリ活用'
    },
    {
      title: '小口支出削減',
      tips: 'コンビニ利用減、衝動買い防止、月の出費額を固定化する'
    },
    {
      title: '定期購読見直し',
      tips: '月額サービスを一度確認、本当に使っているか振り返り、不要なら即解約'
    }
  ];

  // ── localStorage キー（既存構造と同じキーを使用） ──
  var STORAGE_KEY = 'defense-diag';

  // ── 入力値の保存 ──
  function saveInput() {
    var data = {};
    for (var i = 1; i <= 6; i++) {
      var el = document.getElementById('f' + i);
      data['f' + i] = el.value;
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ── 入力値の読み込み ──
  function loadInput() {
    var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    for (var i = 1; i <= 6; i++) {
      var el = document.getElementById('f' + i);
      if (data['f' + i]) el.value = data['f' + i];
    }
  }

  // ── 診断実行 ──
  function calc() {
    var values = [];
    for (var i = 1; i <= 6; i++) {
      var v = parseFloat(document.getElementById('f' + i).value || 0);
      if (v < 0) { showErr('負の数は入力できません'); return; }
      values.push(v);
    }

    // 全て0の場合はエラー
    if (values.every(function(v) { return v === 0; })) {
      showErr('1つ以上の支出を入力してください');
      return;
    }

    // 総支出
    var total = values.reduce(function(a, b) { return a + b; }, 0);

    // 防衛度の計算：各カテゴリごとに削減目安を集計
    // 総支出が多いほど防衛が必要
    var defensePriority = calcDefensePriority(values);

    // 判定
    var level = total > 100000 ? 'ng' : total > 60000 ? 'warn' : 'ok';
    var resultMsg = level === 'ok'   ? '家計は安定ゾーン'
                  : level === 'warn' ? '少し見直す方が安心'
                  : '早めの防衛が必要です';

    showResult(level, fmt(total) + '円/月', resultMsg, defensePriority);
    showDetail(values);
    showDefenseAdvice(defensePriority);
    saveInput();
  }

  // ── 防衛優先度の計算 ──
  function calcDefensePriority(values) {
    // values: [食費, 光熱費, 通信費, ガソリン, 保険, その他]
    var priorities = [
      { idx: 0, name: '食費', val: values[0], savingTarget: 3000 },
      { idx: 1, name: '光熱費', val: values[1], savingTarget: 2000 },
      { idx: 2, name: '通信費', val: values[2], savingTarget: 1000 },
      { idx: 4, name: '保険', val: values[4], savingTarget: 5000 },
      { idx: 3, name: 'ガソリン', val: values[3], savingTarget: 2000 },
      { idx: 5, name: 'その他', val: values[5], savingTarget: 3000 }
    ];

    // 金額が大きい順にソート（防衛の優先度）
    return priorities.sort(function(a, b) { return b.val - a.val; });
  }

  function showResult(level, val, note, priority) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = note;
  }

  function showDetail(values) {
    var labels = ['食費', '光熱費', '通信費', 'ガソリン', '保険', 'その他'];
    var total = values.reduce(function(a, b) { return a + b; }, 0);
    var rows = [];

    for (var i = 0; i < 6; i++) {
      if (values[i] > 0) {
        var pct = ((values[i] / total) * 100).toFixed(1);
        rows.push([labels[i], fmt(values[i]) + '円', pct + '%', false]);
      }
    }

    rows.push(['合計', fmt(total) + '円', '100%', true]);

    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[3] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td><td style="text-align:right;font-size:0.85rem;">' + r[2] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showDefenseAdvice(priority) {
    var html = '';
    for (var i = 0; i < DEFENSE_RULES.length; i++) {
      var rule = DEFENSE_RULES[i];
      html += '<div class="defense-item">'
           + '<span class="defense-num">No.' + (i+1) + '</span>'
           + '<div class="defense-text">'
           + '<strong>' + rule.title + '</strong><br>'
           + rule.tips
           + '</div>'
           + '</div>';
    }
    document.getElementById('defense-list').innerHTML = html;
    document.getElementById('defense-card').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = '';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('defense-card').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── 初期化 ──
  window.addEventListener('load', function() {
    loadInput();
  });

  // ── 入力変更時に保存 ──
  for (var i = 1; i <= 6; i++) {
    document.getElementById('f' + i).addEventListener('change', saveInput);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
