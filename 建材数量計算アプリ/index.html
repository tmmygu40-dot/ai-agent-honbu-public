<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建材数量計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>建材数量計算アプリ</h1>
    <p class="subtitle">面積と建材サイズから必要枚数を計算します</p>

    <section class="card">
      <h2>施工面積</h2>
      <div class="input-row">
        <div class="input-group">
          <label for="areaW">幅（m）</label>
          <input type="number" id="areaW" placeholder="例：3.5" min="0" step="0.01">
        </div>
        <span class="times">×</span>
        <div class="input-group">
          <label for="areaH">奥行き（m）</label>
          <input type="number" id="areaH" placeholder="例：4.2" min="0" step="0.01">
        </div>
      </div>
      <div class="input-group">
        <label for="areaManual">または直接入力（㎡）</label>
        <input type="number" id="areaManual" placeholder="例：14.7" min="0" step="0.01">
      </div>
      <div class="area-display" id="areaDisplay"></div>
    </section>

    <section class="card">
      <h2>建材1枚のサイズ</h2>
      <div class="input-row">
        <div class="input-group">
          <label for="matW">幅（m）</label>
          <input type="number" id="matW" placeholder="例：0.9" min="0" step="0.001">
        </div>
        <span class="times">×</span>
        <div class="input-group">
          <label for="matH">奥行き（m）</label>
          <input type="number" id="matH" placeholder="例：1.8" min="0" step="0.001">
        </div>
      </div>
    </section>

    <section class="card">
      <h2>ロス率</h2>
      <div class="input-group">
        <label for="lossRate">ロス率（%）</label>
        <input type="number" id="lossRate" value="10" min="0" max="100" step="1">
        <p class="hint">カット・廃材などの余裕分。一般的に5〜15%</p>
      </div>
    </section>

    <button class="calc-btn" id="calcBtn">計算する</button>

    <section class="result-card" id="resultCard" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">施工面積</span>
          <span class="result-value" id="resArea">—</span>
          <span class="result-unit">㎡</span>
        </div>
        <div class="result-item">
          <span class="result-label">建材1枚の面積</span>
          <span class="result-value" id="resMatArea">—</span>
          <span class="result-unit">㎡</span>
        </div>
        <div class="result-item highlight">
          <span class="result-label">必要枚数（ロスなし）</span>
          <span class="result-value" id="resBase">—</span>
          <span class="result-unit">枚</span>
        </div>
        <div class="result-item highlight-main">
          <span class="result-label">必要枚数（ロス込み）</span>
          <span class="result-value" id="resTotal">—</span>
          <span class="result-unit">枚</span>
        </div>
        <div class="result-item">
          <span class="result-label">ロス枚数</span>
          <span class="result-value" id="resLoss">—</span>
          <span class="result-unit">枚</span>
        </div>
      </div>
      <button class="save-btn" id="saveBtn">この結果を履歴に保存</button>
    </section>

    <section class="card" id="historySection">
      <h2>計算履歴</h2>
      <ul class="history-list" id="historyList">
        <li class="empty-msg">まだ履歴がありません</li>
      </ul>
      <button class="clear-btn" id="clearBtn">履歴をすべて削除</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
