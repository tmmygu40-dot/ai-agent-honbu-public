<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>献立提案アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力行 ── */
    .input-row {
      display: flex; gap: 0.5rem; align-items: flex-end;
    }
    .field { margin-bottom: 0; flex: 1; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field-date { flex: 0 0 140px; }

    /* ── ボタン ── */
    .btn-add {
      padding: 0.72rem 1rem;
      font-size: 0.95rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-add:active { transform: translateY(2px); box-shadow: 0 1px 0 #b35e00; }

    .btn-search {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-search:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── 食材リスト ── */
    .ingredient-list { margin-top: 0.8rem; }
    .ingredient-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .ingredient-item:last-child { border-bottom: none; }
    .ingredient-name { font-weight: 600; }
    .ingredient-meta { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.1rem; }
    .badge-warn {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      background: var(--warn-bg); color: var(--warn);
      border: 1px solid var(--warn); border-radius: 6px;
      padding: 0.1rem 0.4rem; margin-left: 0.4rem;
    }
    .badge-ng {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      background: var(--ng-bg); color: var(--ng);
      border: 1px solid var(--ng); border-radius: 6px;
      padding: 0.1rem 0.4rem; margin-left: 0.4rem;
    }
    .btn-del {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-sub);
      font-size: 0.78rem; padding: 0.2rem 0.5rem;
      cursor: pointer; flex-shrink: 0;
    }
    .btn-del:hover { border-color: var(--ng); color: var(--ng); }
    .empty-msg { color: var(--text-sub); font-size: 0.85rem; text-align: center; padding: 0.8rem 0; }

    /* ── 料理候補 ── */
    .recipe-section { margin-bottom: 1rem; }
    .section-head {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .recipe-card {
      background: var(--ok-bg);
      border: 1.5px solid var(--ok);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
    }
    .recipe-card.partial {
      background: var(--warn-bg);
      border-color: var(--warn);
    }
    .recipe-card-name { font-size: 1rem; font-weight: 800; }
    .recipe-card-name span { font-size: 0.75rem; font-weight: 400; color: var(--text-sub); margin-left: 0.4rem; }
    .recipe-meta { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.3rem; }
    .recipe-missing { font-size: 0.78rem; color: var(--warn); margin-top: 0.3rem; }
    .no-result { text-align: center; padding: 1.2rem; color: var(--text-sub); font-size: 0.88rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; }
      .btn-add, .btn-search, .btn-del, .back-link { display: none !important; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🥦 献立提案アプリ</h1>
    <p class="subtitle">冷蔵庫の食材を入力 → 今日作れる料理を逆引き</p>
  </header>

  <!-- 食材入力 -->
  <div class="card">
    <p class="card-title">食材を入力</p>
    <div class="input-row">
      <div class="field">
        <label for="ing-name">食材名</label>
        <input type="text" id="ing-name" placeholder="例: 卵、鶏肉、豆腐" autocomplete="off">
      </div>
      <div class="field field-date">
        <label for="ing-date">消費期限</label>
        <input type="date" id="ing-date">
      </div>
      <button class="btn-add" onclick="addIngredient()">追加</button>
    </div>
    <div class="ingredient-list" id="ingredient-list">
      <p class="empty-msg" id="empty-msg">食材が登録されていません</p>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-search" onclick="findRecipes()">今日作れる料理を探す</button>

  <!-- 結果 -->
  <div id="result-area" style="display:none">

    <!-- 完全一致 -->
    <div class="card" id="full-match-card">
      <p class="card-title">今すぐ作れる料理</p>
      <div class="recipe-section" id="full-match-list"></div>
    </div>

    <!-- 部分一致 -->
    <div class="card" id="partial-match-card" style="display:none">
      <p class="card-title">あと少しで作れる料理（1〜2品不足）</p>
      <div class="recipe-section" id="partial-match-list"></div>
    </div>

  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script src="../fav-widget.js"></script>

  <script>
  // ── 料理データベース（食材名は正規化済み）
  const RECIPES = [
    // 和食
    { name: "卵焼き",       cat: "和食", time: "10分", req: ["卵"] },
    { name: "目玉焼き",     cat: "和食", time: "5分",  req: ["卵"] },
    { name: "オムレツ",     cat: "洋食", time: "10分", req: ["卵", "バター"] },
    { name: "卵かけご飯",   cat: "和食", time: "3分",  req: ["卵"] },
    { name: "親子丼",       cat: "和食", time: "20分", req: ["卵", "鶏肉", "玉ねぎ"] },
    { name: "豚肉の生姜焼き", cat: "和食", time: "15分", req: ["豚肉", "玉ねぎ"] },
    { name: "豚汁",         cat: "和食", time: "25分", req: ["豚肉", "大根", "にんじん", "玉ねぎ"] },
    { name: "肉じゃが",     cat: "和食", time: "30分", req: ["じゃがいも", "玉ねぎ", "牛肉"] },
    { name: "野菜炒め",     cat: "和食", time: "10分", req: ["キャベツ"] },
    { name: "味噌汁",       cat: "和食", time: "10分", req: ["味噌"] },
    { name: "豆腐の味噌汁", cat: "和食", time: "10分", req: ["豆腐", "味噌"] },
    { name: "冷奴",         cat: "和食", time: "2分",  req: ["豆腐"] },
    { name: "麻婆豆腐",     cat: "中華", time: "20分", req: ["豆腐", "豚肉"] },
    { name: "回鍋肉",       cat: "中華", time: "15分", req: ["豚肉", "キャベツ"] },
    { name: "チンジャオロース", cat: "中華", time: "20分", req: ["豚肉", "ピーマン"] },
    { name: "ポテトサラダ", cat: "洋食", time: "30分", req: ["じゃがいも", "マヨネーズ"] },
    { name: "コロッケ",     cat: "洋食", time: "40分", req: ["じゃがいも", "牛豚合いびき肉"] },
    { name: "カレーライス", cat: "洋食", time: "60分", req: ["じゃがいも", "にんじん", "玉ねぎ", "カレールー"] },
    { name: "肉じゃが",     cat: "和食", time: "30分", req: ["じゃがいも", "玉ねぎ", "牛肉"] },
    { name: "肉野菜炒め",   cat: "中華", time: "15分", req: ["豚肉", "もやし"] },
    { name: "チャーハン",   cat: "中華", time: "10分", req: ["卵"] },
    { name: "餃子",         cat: "中華", time: "30分", req: ["豚肉", "キャベツ", "にら"] },
    { name: "グラタン",     cat: "洋食", time: "40分", req: ["牛乳", "バター"] },
    { name: "シチュー",     cat: "洋食", time: "60分", req: ["じゃがいも", "にんじん", "玉ねぎ", "牛乳"] },
    { name: "ハンバーグ",   cat: "洋食", time: "30分", req: ["牛豚合いびき肉", "玉ねぎ", "卵"] },
    { name: "唐揚げ",       cat: "和食", time: "30分", req: ["鶏肉"] },
    { name: "鶏の照り焼き", cat: "和食", time: "20分", req: ["鶏肉"] },
    { name: "水炊き",       cat: "和食", time: "30分", req: ["鶏肉", "豆腐", "白菜"] },
    { name: "鍋料理",       cat: "和食", time: "30分", req: ["白菜", "豆腐"] },
    { name: "サーモン丼",   cat: "和食", time: "5分",  req: ["サーモン"] },
    { name: "魚の塩焼き",   cat: "和食", time: "15分", req: ["魚"] },
    { name: "スパゲティナポリタン", cat: "洋食", time: "20分", req: ["スパゲッティ", "玉ねぎ", "ウインナー"] },
    { name: "ペペロンチーノ", cat: "洋食", time: "15分", req: ["スパゲッティ", "にんにく"] },
    { name: "カルボナーラ", cat: "洋食", time: "20分", req: ["スパゲッティ", "卵", "ベーコン"] },
    { name: "チーズトースト", cat: "洋食", time: "5分",  req: ["食パン", "チーズ"] },
    { name: "フレンチトースト", cat: "洋食", time: "10分", req: ["食パン", "卵", "牛乳"] },
    { name: "お好み焼き",   cat: "和食", time: "25分", req: ["キャベツ", "卵"] },
    { name: "そば・うどん", cat: "和食", time: "10分", req: ["そば"] },
    { name: "ラーメン",     cat: "中華", time: "10分", req: ["インスタントラーメン"] },
    { name: "炊き込みご飯", cat: "和食", time: "60分", req: ["鶏肉", "にんじん", "ごぼう"] },
    { name: "トマトスープ", cat: "洋食", time: "20分", req: ["トマト", "玉ねぎ"] },
    { name: "卵スープ",     cat: "中華", time: "10分", req: ["卵"] },
    { name: "ほうれん草のお浸し", cat: "和食", time: "10分", req: ["ほうれん草"] },
    { name: "きんぴらごぼう", cat: "和食", time: "15分", req: ["ごぼう", "にんじん"] },
    { name: "ナポリタン",   cat: "洋食", time: "20分", req: ["ウインナー", "玉ねぎ", "ピーマン"] },
    { name: "焼きそば",     cat: "和食", time: "15分", req: ["焼きそば麺", "豚肉"] },
    { name: "炒飯",         cat: "中華", time: "10分", req: ["卵"] },
    { name: "鮭のムニエル", cat: "洋食", time: "15分", req: ["鮭", "バター"] },
    { name: "チキンソテー", cat: "洋食", time: "20分", req: ["鶏肉", "バター"] },
    { name: "筑前煮",       cat: "和食", time: "35分", req: ["鶏肉", "にんじん", "ごぼう", "れんこん"] },
    { name: "豚の角煮",     cat: "和食", time: "90分", req: ["豚肉"] },
  ];

  // ── 食材データ（localStorage）
  var ingredients = [];
  var KEY = '献立提案_ingredients_v1';

  function load() {
    try { ingredients = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { ingredients = []; }
  }
  function save() {
    localStorage.setItem(KEY, JSON.stringify(ingredients));
  }

  // ── 消費期限チェック
  function getExpiryStatus(dateStr) {
    if (!dateStr) return 'none';
    var today = new Date(); today.setHours(0,0,0,0);
    var exp = new Date(dateStr); exp.setHours(0,0,0,0);
    var diff = Math.floor((exp - today) / 86400000);
    if (diff < 0) return 'expired';
    if (diff <= 2) return 'soon';
    return 'ok';
  }
  function expiryLabel(dateStr) {
    if (!dateStr) return '';
    var status = getExpiryStatus(dateStr);
    var d = new Date(dateStr);
    var label = (d.getMonth()+1) + '/' + d.getDate() + 'まで';
    if (status === 'expired') return '<span class="badge-ng">期限切れ</span>';
    if (status === 'soon')    return '<span class="badge-warn">あと2日以内</span>';
    return '<span style="font-size:0.75rem;color:var(--text-sub);margin-left:0.4rem;">' + label + '</span>';
  }

  // ── 食材追加
  function addIngredient() {
    var nameEl = document.getElementById('ing-name');
    var dateEl = document.getElementById('ing-date');
    var name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    ingredients.push({ name: name, date: dateEl.value, id: Date.now() });
    save();
    nameEl.value = '';
    dateEl.value = '';
    nameEl.focus();
    renderList();
  }

  // ── 食材削除
  function deleteIngredient(id) {
    ingredients = ingredients.filter(function(i){ return i.id !== id; });
    save();
    renderList();
  }

  // ── 食材リスト描画
  function renderList() {
    var listEl = document.getElementById('ingredient-list');
    var emptyEl = document.getElementById('empty-msg');
    if (ingredients.length === 0) {
      emptyEl.style.display = 'block';
      listEl.innerHTML = '';
      listEl.appendChild(emptyEl);
      return;
    }
    emptyEl.style.display = 'none';
    // 消費期限が近い順・期限切れ先頭
    var sorted = ingredients.slice().sort(function(a, b) {
      var sa = a.date || '9999-99-99';
      var sb = b.date || '9999-99-99';
      return sa < sb ? -1 : sa > sb ? 1 : 0;
    });
    listEl.innerHTML = sorted.map(function(ing) {
      return '<div class="ingredient-item">'
        + '<div><span class="ingredient-name">' + esc(ing.name) + '</span>' + expiryLabel(ing.date) + '</div>'
        + '<button class="btn-del" onclick="deleteIngredient(' + ing.id + ')">削除</button>'
        + '</div>';
    }).join('');
  }

  // ── 料理逆引き
  function normalize(s) { return s.trim().toLowerCase(); }

  function findRecipes() {
    if (ingredients.length === 0) {
      alert('食材を入力してください');
      return;
    }
    var myIngredients = ingredients.map(function(i){ return normalize(i.name); });

    var fullMatches = [];
    var partialMatches = [];

    RECIPES.forEach(function(recipe) {
      var reqNorm = recipe.req.map(normalize);
      var matched = reqNorm.filter(function(r) {
        return myIngredients.some(function(m) { return m.includes(r) || r.includes(m); });
      });
      var missing = reqNorm.filter(function(r) {
        return !myIngredients.some(function(m) { return m.includes(r) || r.includes(m); });
      });

      if (missing.length === 0) {
        fullMatches.push({ recipe: recipe, matched: matched, missing: missing });
      } else if (missing.length <= 2 && matched.length > 0) {
        partialMatches.push({ recipe: recipe, matched: matched, missing: missing });
      }
    });

    // 重複除去（料理名）
    var seen = {};
    fullMatches = fullMatches.filter(function(x) {
      if (seen[x.recipe.name]) return false;
      seen[x.recipe.name] = true; return true;
    });
    seen = {};
    partialMatches = partialMatches.filter(function(x) {
      if (seen[x.recipe.name]) return false;
      seen[x.recipe.name] = true; return true;
    });

    // 消費期限近い食材を多く使う料理を優先
    var urgentNames = ingredients
      .filter(function(i){ var s = getExpiryStatus(i.date); return s === 'soon' || s === 'expired'; })
      .map(function(i){ return normalize(i.name); });

    function urgentScore(item) {
      return item.recipe.req.filter(function(r){
        return urgentNames.some(function(u){ return u.includes(normalize(r)) || normalize(r).includes(u); });
      }).length;
    }
    fullMatches.sort(function(a,b){ return urgentScore(b) - urgentScore(a); });
    partialMatches.sort(function(a,b){ return a.missing.length - b.missing.length; });

    renderResults(fullMatches, partialMatches);
  }

  function renderResults(fullMatches, partialMatches) {
    var area = document.getElementById('result-area');
    area.style.display = 'block';

    // 完全一致
    var fullList = document.getElementById('full-match-list');
    if (fullMatches.length === 0) {
      fullList.innerHTML = '<p class="no-result">今の食材だけで作れる料理は見つかりませんでした。<br>食材を追加するか「あと少しで作れる料理」を参考にしてください。</p>';
    } else {
      fullList.innerHTML = fullMatches.map(function(item) {
        var u = urgentIngredients(item.recipe.req);
        return '<div class="recipe-card">'
          + '<div class="recipe-card-name">' + esc(item.recipe.name) + '<span>' + esc(item.recipe.cat) + ' / ' + esc(item.recipe.time) + '</span></div>'
          + (u ? '<div class="recipe-missing" style="color:var(--warn);">⚠ 期限近い食材を活用: ' + u + '</div>' : '')
          + '<div class="recipe-meta">必要食材: ' + item.recipe.req.map(esc).join('、') + '</div>'
          + '</div>';
      }).join('');
    }

    // 部分一致
    var partialCard = document.getElementById('partial-match-card');
    var partialList = document.getElementById('partial-match-list');
    if (partialMatches.length > 0) {
      partialCard.style.display = 'block';
      partialList.innerHTML = partialMatches.map(function(item) {
        return '<div class="recipe-card partial">'
          + '<div class="recipe-card-name">' + esc(item.recipe.name) + '<span>' + esc(item.recipe.cat) + ' / ' + esc(item.recipe.time) + '</span></div>'
          + '<div class="recipe-missing">不足: ' + item.missing.map(esc).join('、') + '</div>'
          + '<div class="recipe-meta">必要食材: ' + item.recipe.req.map(esc).join('、') + '</div>'
          + '</div>';
      }).join('');
    } else {
      partialCard.style.display = 'none';
    }

    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function urgentIngredients(req) {
    var urgentNames = ingredients
      .filter(function(i){ var s = getExpiryStatus(i.date); return s === 'soon' || s === 'expired'; })
      .map(function(i){ return normalize(i.name); });
    var found = req.filter(function(r){
      return urgentNames.some(function(u){ return u.includes(normalize(r)) || normalize(r).includes(u); });
    });
    return found.length ? found.map(esc).join('、') : '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enterキーで追加
  document.getElementById('ing-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addIngredient();
  });
  document.getElementById('ing-date').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addIngredient();
  });

  // 初期化
  load();
  renderList();
  </script>
</body>
</html>
