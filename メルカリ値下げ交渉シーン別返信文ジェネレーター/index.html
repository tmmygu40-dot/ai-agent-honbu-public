<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ値下げ交渉シーン別返信文ジェネレーター</title>
  <meta name="description" content="メルカリの値下げコメントへの返信に困った時、シーンと希望値下げ額を選ぶだけで「丁寧型・きっぱり型・折衷案型」の3パターン返信文を即生成。コピーしてそのまま使える無料ツールです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 返信文カード */
    .reply-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 600px;
    }
    .reply-card.polite  { border-left: 5px solid var(--ok); }
    .reply-card.firm    { border-left: 5px solid var(--ng); }
    .reply-card.middle  { border-left: 5px solid var(--warn); }
    .reply-tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 999px;
      margin-bottom: 0.55rem; letter-spacing: 0.04em;
    }
    .reply-card.polite .reply-tag { color: var(--ok);   background: var(--ok-bg); }
    .reply-card.firm   .reply-tag { color: var(--ng);   background: var(--ng-bg); }
    .reply-card.middle .reply-tag { color: var(--warn); background: var(--warn-bg); }
    .reply-text {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      padding: 0.5rem 0 0.7rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.45rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .reply-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ値下げ交渉シーン別返信文ジェネレーター</h1>
    <p class="subtitle">シーンと希望値下げ額を選ぶだけで、丁寧型・きっぱり型・折衷案型の3パターンを即生成。</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="scene">シーンを選ぶ</label>
      <select id="scene">
        <option value="just_listed">出品直後（値下げまだしたくない）</option>
        <option value="long_stay">長期在庫（早く売りたい）</option>
        <option value="quick_buy">即決希望（少し下げてOK）</option>
        <option value="extreme">極端な値下げ要求（半額以下など）</option>
      </select>
    </div>
    <div class="field">
      <label for="item">商品名（任意）</label>
      <input type="text" id="item" placeholder="例: ○○のスニーカー">
    </div>
    <div class="field">
      <label for="price">元の出品価格（円）</label>
      <input type="number" id="price" placeholder="例: 5000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="ask">相手の希望値下げ額（円）</label>
      <input type="number" id="ask" placeholder="例: 4000" inputmode="numeric">
      <p class="hint">「○○円までお値下げできますか？」と言われた金額を入れてください</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="results"></div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'mercari-haggle-reply-v1';

  // 復元
  (function restore(){
    try {
      var s = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
      if (s.scene) document.getElementById('scene').value = s.scene;
      if (s.item)  document.getElementById('item').value  = s.item;
      if (s.price) document.getElementById('price').value = s.price;
      if (s.ask)   document.getElementById('ask').value   = s.ask;
    } catch(e) {}
  })();

  function save(scene, item, price, ask) {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({scene:scene,item:item,price:price,ask:ask}));
    } catch(e) {}
  }

  function fmt(n){ return Number(n).toLocaleString('ja-JP'); }

  function buildReplies(scene, item, price, ask) {
    var itemLabel = item ? '「' + item + '」' : 'こちらの商品';
    var priceTxt  = price ? fmt(price) + '円' : '出品価格';
    var askTxt    = ask   ? fmt(ask)   + '円' : 'ご提示額';
    var diff      = (price && ask) ? (price - ask) : 0;
    var midPrice  = (price && ask && diff > 0) ? Math.round((Number(price) + Number(ask)) / 2 / 10) * 10 : null;
    var smallCut  = (price) ? Math.max(100, Math.round(Number(price) * 0.05 / 10) * 10) : 200;
    var smallPrice = (price) ? Number(price) - smallCut : null;

    var polite = '', firm = '', middle = '';

    if (scene === 'just_listed') {
      polite =
        'コメントありがとうございます。\n' +
        itemLabel + 'にご興味をお持ちいただき嬉しいです。\n\n' +
        '誠に恐縮ですが、出品したばかりですので、もうしばらく' + priceTxt + 'のままで様子を見させてください。\n' +
        '今後お値下げを検討する際は、こちらにご連絡いたします。\n' +
        'どうぞよろしくお願いいたします。';
      firm =
        'コメントありがとうございます。\n' +
        '申し訳ありませんが、出品直後のためお値下げは予定しておりません。\n' +
        '提示の' + priceTxt + 'でのご検討をよろしくお願いいたします。';
      middle =
        'コメントありがとうございます。\n' +
        'お値下げのご相談ありがとうございます。\n' +
        '出品直後のため大幅なお値下げは難しいのですが、' +
        (smallPrice ? fmt(smallPrice) + '円' : '少しのお値引き') + 'まででしたら検討可能です。\n' +
        'ご検討いただけますと幸いです。';
    } else if (scene === 'long_stay') {
      polite =
        'コメントありがとうございます。\n' +
        itemLabel + 'にご興味をお持ちいただきありがとうございます。\n\n' +
        'ご希望の' + askTxt + 'にてお譲りいたします。\n' +
        '専用ページにいたしますので、お手数ですが本日中のご購入をお願いできますと幸いです。\n' +
        'どうぞよろしくお願いいたします。';
      firm =
        'コメントありがとうございます。\n' +
        'お値下げのご相談ありがとうございます。\n' +
        askTxt + 'までは難しいのですが、' +
        (smallPrice ? fmt(smallPrice) + '円' : '少しのお値引き') + 'でしたら可能です。\n' +
        'ご検討よろしくお願いいたします。';
      middle =
        'コメントありがとうございます。\n' +
        'ご希望の' + askTxt + 'と' + priceTxt + 'の中間で、' +
        (midPrice ? fmt(midPrice) + '円' : 'お互いに歩み寄った価格') + 'でしたらお譲り可能です。\n' +
        'もしご検討いただけるようでしたら、価格を変更いたします。\n' +
        'よろしくお願いいたします。';
    } else if (scene === 'quick_buy') {
      polite =
        'コメントありがとうございます。\n' +
        '即購入を検討いただき嬉しいです。\n\n' +
        'ご希望の' + askTxt + 'にて変更させていただきます。\n' +
        '価格反映後、お手数ですが早めのご購入をお願いいたします。\n' +
        'どうぞよろしくお願いいたします。';
      firm =
        'コメントありがとうございます。\n' +
        '即購入歓迎です。\n' +
        askTxt + 'は難しいのですが、' +
        (smallPrice ? fmt(smallPrice) + '円' : 'こちらの価格') + 'でしたらお値下げ可能です。\n' +
        'ご検討よろしくお願いいたします。';
      middle =
        'コメントありがとうございます。\n' +
        '即購入とのこと、ありがとうございます。\n' +
        '間を取って' + (midPrice ? fmt(midPrice) + '円' : '中間価格') + 'でしたらお譲りできます。\n' +
        '価格変更後にご購入いただけますと幸いです。';
    } else { // extreme
      polite =
        'コメントありがとうございます。\n' +
        itemLabel + 'にご興味をお持ちいただきありがとうございます。\n\n' +
        '誠に恐縮ですが、ご希望の' + askTxt + 'は仕入れ・送料の関係で難しい状況です。\n' +
        priceTxt + 'での出品とさせていただいておりますので、ご理解いただけますと幸いです。';
      firm =
        'コメントありがとうございます。\n' +
        '申し訳ありませんが、' + askTxt + 'でのお譲りは難しいです。\n' +
        '価格変更の予定はございませんので、' + priceTxt + 'でのご検討をお願いいたします。';
      middle =
        'コメントありがとうございます。\n' +
        'ご希望のお値段は難しいのですが、' +
        (smallPrice ? fmt(smallPrice) + '円' : '少しのお値引き') + 'までであれば対応可能です。\n' +
        'ご検討いただけますと幸いです。';
    }

    return [
      { tag: '丁寧型',  cls: 'polite', text: polite },
      { tag: 'きっぱり型', cls: 'firm',   text: firm },
      { tag: '折衷案型', cls: 'middle', text: middle }
    ];
  }

  function generate() {
    var scene = document.getElementById('scene').value;
    var item  = document.getElementById('item').value.trim();
    var price = document.getElementById('price').value.trim();
    var ask   = document.getElementById('ask').value.trim();

    save(scene, item, price, ask);

    var replies = buildReplies(scene, item, price, ask);
    var html = replies.map(function(r, i){
      return '<div class="reply-card ' + r.cls + '">' +
             '<span class="reply-tag">' + r.tag + '</span>' +
             '<div class="reply-text" id="reply-' + i + '">' + escapeHtml(r.text) + '</div>' +
             '<button class="btn-copy" onclick="copyReply(' + i + ', this)">📋 コピー</button>' +
             '</div>';
    }).join('');
    document.getElementById('results').innerHTML = html;
    var first = document.querySelector('.reply-card');
    if (first) first.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyReply(i, btn) {
    var el = document.getElementById('reply-' + i);
    if (!el) return;
    var text = el.textContent;
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
