<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易注文伝票アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%B0%A1%E6%98%93%E6%B3%A8%E6%96%87%E4%BC%9D%E7%A5%A8%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="簡易注文伝票。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"簡易注文伝票","description":"簡易注文伝票。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E7%B0%A1%E6%98%93%E6%B3%A8%E6%96%87%E4%BC%9D%E7%A5%A8%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>簡易注文伝票</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <div class="input-section">
      <div class="input-row">
        <div class="input-group">
          <label for="tableNo">テーブル番号</label>
          <input type="text" id="tableNo" placeholder="例：3番" maxlength="10">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group flex2">
          <label for="itemName">注文品</label>
          <input type="text" id="itemName" placeholder="例：ハンバーグ定食" maxlength="50">
        </div>
        <div class="input-group">
          <label for="price">単価（円）</label>
          <input type="number" id="price" placeholder="例：850" min="0" max="99999">
        </div>
        <div class="input-group">
          <label for="qty">数量</label>
          <input type="number" id="qty" value="1" min="1" max="99">
        </div>
      </div>
      <button class="btn-add" onclick="addOrder()">追加</button>
    </div>

    <div class="orders-section" id="ordersSection">
      <div class="table-header" id="tableHeader" style="display:none">
        <span id="tableLabel"></span>
      </div>
      <div id="orderList"></div>
      <div class="total-row" id="totalRow" style="display:none">
        <span class="total-label">合計</span>
        <span class="total-amount" id="totalAmount">¥0</span>
      </div>
    </div>

    <div class="action-buttons" id="actionButtons" style="display:none">
      <button class="btn-reset" onclick="resetOrders()">会計リセット</button>
    </div>
  </div>

  <script src="script.js"></script>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
  このツールは参考目的で作成しています。正確な情報や最新の条件は、公式情報や専門家にご確認ください。
</p>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
