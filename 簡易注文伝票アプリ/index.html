<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易注文伝票アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>簡易注文伝票</h1>

    <div class="input-section">
      <div class="input-row">
        <div class="input-group">
          <label for="tableNo">テーブル番号</label>
          <input type="text" id="tableNo" placeholder="例：3番" maxlength="10">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group flex2">
          <label for="itemName">注文品</label>
          <input type="text" id="itemName" placeholder="例：ハンバーグ定食" maxlength="50">
        </div>
        <div class="input-group">
          <label for="price">単価（円）</label>
          <input type="number" id="price" placeholder="例：850" min="0" max="99999">
        </div>
        <div class="input-group">
          <label for="qty">数量</label>
          <input type="number" id="qty" value="1" min="1" max="99">
        </div>
      </div>
      <button class="btn-add" onclick="addOrder()">追加</button>
    </div>

    <div class="orders-section" id="ordersSection">
      <div class="table-header" id="tableHeader" style="display:none">
        <span id="tableLabel"></span>
      </div>
      <div id="orderList"></div>
      <div class="total-row" id="totalRow" style="display:none">
        <span class="total-label">合計</span>
        <span class="total-amount" id="totalAmount">¥0</span>
      </div>
    </div>

    <div class="action-buttons" id="actionButtons" style="display:none">
      <button class="btn-reset" onclick="resetOrders()">会計リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
