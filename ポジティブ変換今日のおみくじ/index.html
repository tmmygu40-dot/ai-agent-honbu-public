<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ボタンを押すだけで今日の運勢をポジティブに変換！30秒で気分が上がるおみくじアプリです。凶でも大丈夫、前向きメッセージに早変わり。">
  <title>ポジティブ変換今日のおみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── おみくじ演出 ── */
    .omikuji-box {
      text-align: center;
      padding: 2rem 1rem;
    }
    .omikuji-emoji {
      font-size: 4rem;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .omikuji-guide {
      font-size: 0.88rem;
      color: var(--text-sub);
      margin-top: 0.5rem;
    }

    /* シェイクアニメーション */
    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(-15deg); }
      20% { transform: rotate(15deg); }
      30% { transform: rotate(-12deg); }
      40% { transform: rotate(12deg); }
      50% { transform: rotate(-8deg); }
      60% { transform: rotate(8deg); }
      70% { transform: rotate(-4deg); }
      80% { transform: rotate(4deg); }
      90% { transform: rotate(-2deg); }
    }
    .shaking {
      animation: shake 0.8s ease-in-out;
    }

    /* フェードイン */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.5s ease-out forwards;
    }

    /* ── ポジティブ変換カード ── */
    .positive-card {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .positive-emoji {
      font-size: 2.4rem;
      margin-bottom: 0.3rem;
    }
    .positive-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
    }
    .positive-msg {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.7;
    }

    /* ── 今日のラッキーポイント ── */
    .lucky-card {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .lucky-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .lucky-item {
      font-size: 0.88rem;
      color: var(--text);
      padding: 0.3rem 0;
      line-height: 1.5;
    }

    /* ── 履歴カード ── */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); }
    .history-fortune { font-weight: 700; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .positive-card, .lucky-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌈 ポジティブ変換今日のおみくじ</h1>
    <p class="subtitle">今日の運勢をポジティブに変換！30秒で気分が上がるおみくじです。</p>
  </header>

  <!-- おみくじボックス -->
  <div class="card">
    <div class="omikuji-box">
      <div class="omikuji-emoji" id="omikuji-icon">🎋</div>
      <p class="omikuji-guide" id="omikuji-guide">ボタンを押しておみくじを引こう！</p>
    </div>
  </div>

  <!-- おみくじボタン -->
  <button class="btn-calc" id="draw-btn" onclick="drawOmikuji()">おみくじを引く 🎯</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">今日の運勢</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- ポジティブ変換カード -->
  <div class="positive-card" id="positive" style="display:none">
    <p class="positive-emoji" id="pe"></p>
    <p class="positive-title">✨ ポジティブ変換 ✨</p>
    <p class="positive-msg" id="pm"></p>
  </div>

  <!-- ラッキーポイント -->
  <div class="lucky-card" id="lucky" style="display:none">
    <p class="lucky-title">🍀 今日のラッキーポイント</p>
    <div id="lucky-list"></div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">おみくじ履歴</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎋 このおみくじは娯楽目的のアプリです。運勢は毎回ランダムに生成されます。気軽に楽しんでください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── おみくじデータ ──
  var FORTUNES = [
    {
      name: '大吉', level: 'ok', emoji: '🌟',
      comment: '最高の運気！何をやっても良い方向に進みます',
      positive: '今日のあなたは無敵モード！いつもより少しだけ大胆にいきましょう。小さな挑戦が大きな成果につながる日です。',
      lucky: ['ラッキーカラー：ゴールド', 'ラッキーフード：卵料理', 'ラッキーアクション：誰かに「ありがとう」を伝える']
    },
    {
      name: '中吉', level: 'ok', emoji: '😊',
      comment: 'なかなか良い運気です。着実に前進できます',
      positive: 'コツコツ積み重ねてきたことが報われる日。「地味だな」と思っていた努力こそ、今日一番の武器です！',
      lucky: ['ラッキーカラー：オレンジ', 'ラッキーフード：パスタ', 'ラッキーアクション：5分だけ片付けをする']
    },
    {
      name: '小吉', level: 'ok', emoji: '🌱',
      comment: 'ちょっといいことがありそうな予感',
      positive: '小さな幸せを見つけるアンテナが冴える日！「ラッキー！」と思えることが、普段より多く見つかりますよ。',
      lucky: ['ラッキーカラー：黄緑', 'ラッキーフード：サラダ', 'ラッキーアクション：空を見上げる']
    },
    {
      name: '吉', level: 'warn', emoji: '✌️',
      comment: '安定の運気。普段通りが一番です',
      positive: '「普通」って実はすごいこと。今日の安定感は明日の土台になります。穏やかに過ごせること自体がラッキーです。',
      lucky: ['ラッキーカラー：水色', 'ラッキーフード：おにぎり', 'ラッキーアクション：好きな曲を聴く']
    },
    {
      name: '末吉', level: 'warn', emoji: '🌤️',
      comment: 'じわじわ運気上昇中。焦らずいこう',
      positive: '今は種まきの時期！今日やったことが、数日後に「あの時やっておいてよかった！」に変わります。未来の自分へのプレゼントだと思って。',
      lucky: ['ラッキーカラー：ラベンダー', 'ラッキーフード：ヨーグルト', 'ラッキーアクション：早めに寝る']
    },
    {
      name: '凶', level: 'ng', emoji: '💪',
      comment: 'ちょっと注意が必要な日…でも大丈夫！',
      positive: '「凶」は「強」に変わる！ピンチはチャンスの前触れです。今日ちょっと大変なことがあっても、それは成長ポイントがもらえるイベントだと思いましょう。',
      lucky: ['ラッキーカラー：赤', 'ラッキーフード：チョコレート', 'ラッキーアクション：深呼吸を3回する']
    },
    {
      name: '大凶', level: 'ng', emoji: '🔥',
      comment: '運気は底…つまりここから上がるだけ！',
      positive: '大凶を引けるのはある意味レア！今日がどん底なら明日からは全部上り坂。RPGでいえばレベルアップ直前のボス戦です。乗り越えたら経験値ドッサリ！',
      lucky: ['ラッキーカラー：白（リセットの色）', 'ラッキーフード：アイスクリーム（ご褒美）', 'ラッキーアクション：「まあいっか」と声に出す']
    }
  ];

  // ── 追加のポジティブメッセージ（ランダムで1つ追加表示） ──
  var BONUS_MSG = [
    'あなたが今日ここにいること、それだけで十分すごいことです。',
    '失敗しても大丈夫。それは「挑戦した証」です。',
    '誰かの「当たり前」は、あなたの「すごいこと」かもしれません。',
    '今日1日を乗り切れたら、自分にハナマルをあげましょう。',
    'うまくいかない日は、次にうまくいく日のための練習日です。',
    'あなたの頑張りは、ちゃんと誰かが見ています。',
    '完璧じゃなくていい。60点でも前に進んでいることに変わりはない。',
    '「しんどい」と思えるのは、ちゃんと頑張っている証拠です。'
  ];

  var isDrawing = false;

  function drawOmikuji() {
    if (isDrawing) return;
    isDrawing = true;

    var btn = document.getElementById('draw-btn');
    var icon = document.getElementById('omikuji-icon');
    var guide = document.getElementById('omikuji-guide');

    btn.disabled = true;
    btn.textContent = '引いています…';
    guide.textContent = 'おみくじを振っています…';

    // シェイクアニメーション
    icon.classList.add('shaking');
    icon.textContent = '🎋';

    setTimeout(function() {
      icon.classList.remove('shaking');

      // ランダムで運勢を選ぶ（重み付き）
      var fortune = pickFortune();

      // 結果を表示
      showFortuneResult(fortune);

      // localStorage に保存
      saveHistory(fortune);

      // 履歴表示
      showHistory();

      btn.disabled = false;
      btn.textContent = 'もう一度引く 🔄';
      icon.textContent = fortune.emoji;
      guide.textContent = '↓ 結果はこちら ↓';
      isDrawing = false;
    }, 1000);
  }

  function pickFortune() {
    // 重み付き：大吉15%, 中吉20%, 小吉20%, 吉20%, 末吉15%, 凶8%, 大凶2%
    var weights = [15, 20, 20, 20, 15, 8, 2];
    var total = weights.reduce(function(a, b) { return a + b; }, 0);
    var r = Math.random() * total;
    var cumulative = 0;
    for (var i = 0; i < weights.length; i++) {
      cumulative += weights[i];
      if (r < cumulative) return FORTUNES[i];
    }
    return FORTUNES[0];
  }

  function showFortuneResult(fortune) {
    // メイン結果カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + fortune.level;
    rc.style.display = 'block';
    rc.classList.add('fade-in');
    document.getElementById('rv').textContent = fortune.name;
    document.getElementById('re').textContent = fortune.comment;

    // ボーナスメッセージ
    var bonus = BONUS_MSG[Math.floor(Math.random() * BONUS_MSG.length)];
    document.getElementById('rn').textContent = bonus;

    // ポジティブ変換カード
    var pc = document.getElementById('positive');
    pc.style.display = 'block';
    pc.classList.add('fade-in');
    document.getElementById('pe').textContent = fortune.emoji;
    document.getElementById('pm').textContent = fortune.positive;

    // ラッキーポイント
    var lc = document.getElementById('lucky');
    lc.style.display = 'block';
    lc.classList.add('fade-in');
    document.getElementById('lucky-list').innerHTML = fortune.lucky.map(function(item) {
      return '<p class="lucky-item">' + item + '</p>';
    }).join('');

    // スクロール
    setTimeout(function() {
      rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }

  // ── localStorage ──
  function saveHistory(fortune) {
    var key = 'omikuji_history';
    var history = JSON.parse(localStorage.getItem(key) || '[]');
    var today = new Date();
    var dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');
    var timeStr = String(today.getHours()).padStart(2, '0') + ':' + String(today.getMinutes()).padStart(2, '0');

    history.unshift({
      date: dateStr,
      time: timeStr,
      name: fortune.name,
      emoji: fortune.emoji
    });

    // 最新30件まで保持
    if (history.length > 30) history = history.slice(0, 30);
    localStorage.setItem(key, JSON.stringify(history));
  }

  function showHistory() {
    var key = 'omikuji_history';
    var history = JSON.parse(localStorage.getItem(key) || '[]');
    if (history.length === 0) return;

    var card = document.getElementById('history-card');
    card.style.display = 'block';

    var list = document.getElementById('history-list');
    list.innerHTML = history.slice(0, 10).map(function(h) {
      return '<div class="history-item">'
        + '<span class="history-date">' + h.date + ' ' + h.time + '</span>'
        + '<span class="history-fortune">' + h.emoji + ' ' + h.name + '</span>'
        + '</div>';
    }).join('');
  }

  // ページ読み込み時に履歴表示
  showHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
