<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたの貯金体質を簡単診断。先取り貯金・衝動買い・固定費把握など、お金の習慣をチェックできます。">
  <title>貯金体質診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン共通 ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 診断用スタイル ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); text-align: center;
      margin-bottom: 0.8rem;
    }
    .quiz-progress-bar {
      width: 100%; height: 6px; background: var(--border); border-radius: 3px;
      margin-bottom: 1rem; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease;
    }
    .quiz-question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      text-align: center; margin-bottom: 1.2rem; min-height: 3em;
    }
    .quiz-buttons {
      display: flex; gap: 0.8rem; justify-content: center;
    }
    .quiz-buttons button {
      flex: 1; max-width: 160px; padding: 0.9rem 1rem;
      font-size: 1.05rem; font-weight: 800; border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      background: var(--card); color: var(--text);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quiz-buttons .btn-yes:hover, .quiz-buttons .btn-yes:active {
      background: var(--ok-bg); border-color: var(--ok); color: var(--ok);
    }
    .quiz-buttons .btn-no:hover, .quiz-buttons .btn-no:active {
      background: var(--ng-bg); border-color: var(--ng); color: var(--ng);
    }
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.8rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }

    /* ── 履歴 ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); }
    .history-score { font-weight: 700; }
    .history-score.ok { color: var(--ok); }
    .history-score.warn { color: var(--warn); }
    .history-score.ng { color: var(--ng); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>💰 貯金体質診断</h1>
    <p class="subtitle">5問のYES/NOに答えるだけで、あなたの貯金体質をサクッと診断します。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">診断スタート</p>
    <p class="quiz-progress" id="quiz-progress">Q1 / 5</p>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-bar" style="width:0%"></div></div>
    <p class="quiz-question" id="quiz-question"></p>
    <div class="quiz-buttons">
      <button class="btn-yes" onclick="answer(true)">⭕ YES</button>
      <button class="btn-no" onclick="answer(false)">❌ NO</button>
    </div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="result-emoji"></p>
    <p class="result-label">あなたの貯金体質は…</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">回答内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- コピー＆やり直しボタン -->
  <button class="btn-copy no-print" id="btn-copy" style="display:none" onclick="copyResult()">📋 結果をコピー</button>
  <button class="btn-retry no-print" id="btn-retry" style="display:none" onclick="retry()">🔄 もう一度診断する</button>

  <!-- 履歴カード -->
  <div class="card no-print" id="history-card" style="display:none">
    <p class="card-title">過去の診断履歴</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断は一般的な家計管理の知見をもとにした簡易チェックです。正確な資産診断には、FP（ファイナンシャルプランナー）や金融機関への相談をおすすめします。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    { q: '毎月の収入から、先に貯金分を取り分けていますか？', hint: '先取り貯金の習慣' },
    { q: '欲しいものがあっても、1日以上考えてから買いますか？', hint: '衝動買い耐性' },
    { q: '月々の固定費（サブスク・保険など）を把握していますか？', hint: '固定費の把握' },
    { q: 'ATMの手数料を払わないように工夫していますか？', hint: '小さな出費への意識' },
    { q: '貯金の目標金額や使い道がありますか？', hint: '目標設定力' }
  ];

  var current = 0;
  var score = 0;
  var answers = [];

  function init() {
    current = 0;
    score = 0;
    answers = [];
    showQuestion();
    renderHistory();
  }

  function showQuestion() {
    document.getElementById('quiz-progress').textContent = 'Q' + (current + 1) + ' / 5';
    document.getElementById('quiz-bar').style.width = (current / 5 * 100) + '%';
    document.getElementById('quiz-question').textContent = QUESTIONS[current].q;
  }

  function answer(yes) {
    answers.push(yes);
    if (yes) score++;
    current++;
    if (current < 5) {
      showQuestion();
    } else {
      showResultScreen();
    }
  }

  function showResultScreen() {
    document.getElementById('quiz-card').style.display = 'none';

    var level, title, emoji, evalText, note;
    if (score >= 4) {
      level = 'ok';
      emoji = '🏆';
      title = '貯金体質';
      evalText = score + ' / 5 点';
      note = 'すばらしい！お金の管理がしっかりできています。この調子で続ければ、将来の安心度はかなり高いです。';
    } else if (score >= 2) {
      level = 'warn';
      emoji = '🤔';
      title = 'ふつう体質';
      evalText = score + ' / 5 点';
      note = '悪くはないけど、もう少し意識するともっと貯まります。固定費の見直しや先取り貯金を始めてみましょう。';
    } else {
      level = 'ng';
      emoji = '💸';
      title = '散財体質';
      evalText = score + ' / 5 点';
      note = 'お金が手元に残りにくいタイプかも。まずは月の固定費を書き出すところから始めてみましょう。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('rv').textContent = title;
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = note;

    // 内訳
    var rows = QUESTIONS.map(function(q, i) {
      return '<tr><td>' + q.hint + '</td><td>' + (answers[i] ? '⭕ YES' : '❌ NO') + '</td></tr>';
    });
    rows.push('<tr class="hl"><td>合計スコア</td><td>' + score + ' / 5</td></tr>');
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = 'block';

    document.getElementById('btn-copy').style.display = 'block';
    document.getElementById('btn-retry').style.display = 'block';

    saveHistory(score, level, title);
    renderHistory();
  }

  function copyResult() {
    var level = score >= 4 ? '貯金体質' : score >= 2 ? 'ふつう体質' : '散財体質';
    var lines = ['【貯金体質診断の結果】', level + '（' + score + '/5点）', ''];
    QUESTIONS.forEach(function(q, i) {
      lines.push((answers[i] ? '⭕' : '❌') + ' ' + q.hint);
    });
    var text = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('btn-copy');
        btn.textContent = '✅ コピーしました！';
        setTimeout(function() { btn.textContent = '📋 結果をコピー'; }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.getElementById('btn-copy');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = '📋 結果をコピー'; }, 2000);
    }
  }

  function retry() {
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('btn-copy').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    init();
  }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'chokin_shindan_history';

  function saveHistory(sc, lv, title) {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    history.unshift({
      date: new Date().toLocaleDateString('ja-JP'),
      score: sc,
      level: lv,
      title: title
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    var card = document.getElementById('history-card');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('history-list').innerHTML = history.map(function(h) {
      return '<div class="history-item">'
        + '<span class="history-date">' + h.date + '</span>'
        + '<span class="history-score ' + h.level + '">' + h.title + '（' + h.score + '/5）</span>'
        + '</div>';
    }).join('');
  }

  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
