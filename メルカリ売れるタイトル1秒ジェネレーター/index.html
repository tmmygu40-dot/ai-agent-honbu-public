<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ売れるタイトル1秒ジェネレーター</title>
  <meta name="description" content="カテゴリ・状態・特徴を選ぶだけで、売れやすいキーワード入りのメルカリ用商品タイトル候補を1秒で複数生成。60字以内で検索ヒットしやすい売れタイトルが秒速で完成します。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 結果カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }

    /* タイトル候補リスト */
    .title-item {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.7rem;
    }
    .title-item:last-child { margin-bottom: 0; }
    .title-text {
      font-size: 0.95rem; font-weight: 700; line-height: 1.45; color: var(--text);
      word-break: break-word;
    }
    .title-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.5rem; gap: 0.6rem;
    }
    .title-count {
      font-size: 0.72rem; color: var(--text-sub);
    }
    .title-count.over { color: var(--ng); font-weight: 700; }
    .btn-copy {
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 0.35rem 0.8rem; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ売れるタイトル1秒ジェネレーター</h1>
    <p class="subtitle">カテゴリと状態を選ぶだけで、検索に強い60字以内の売れタイトル候補を5件以上生成します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>

    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="レディース">レディース</option>
        <option value="メンズ">メンズ</option>
        <option value="ベビー・キッズ">ベビー・キッズ</option>
        <option value="コスメ・美容">コスメ・美容</option>
        <option value="本・雑誌">本・雑誌</option>
        <option value="家電・スマホ">家電・スマホ</option>
        <option value="ホビー・グッズ">ホビー・グッズ</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="brand">ブランド・型番（任意）</label>
      <input type="text" id="brand" placeholder="例: UNIQLO / iPhone15 / ナイキ">
    </div>

    <div class="field">
      <label for="name">商品名・種別 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="name" placeholder="例: ワンピース / Tシャツ / ヘアドライヤー">
      <p class="hint">必須。出品物のメイン名称をひとことで</p>
    </div>

    <div class="field">
      <label for="size">サイズ・容量・カラー（任意）</label>
      <input type="text" id="size" placeholder="例: M / 150ml / ブラック">
    </div>

    <div class="field">
      <label for="cond">状態</label>
      <select id="cond">
        <option value="新品未使用">新品未使用</option>
        <option value="未使用に近い">未使用に近い</option>
        <option value="目立った傷や汚れなし" selected>目立った傷や汚れなし</option>
        <option value="やや傷や汚れあり">やや傷や汚れあり</option>
      </select>
    </div>

    <div class="field">
      <label for="kw">特徴・キーワード（任意）</label>
      <input type="text" id="kw" placeholder="例: 春服 オフィス 入学式（スペース区切りで複数可）">
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">タイトルを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたタイトル候補</p>
    <div id="titles"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 メルカリ公式の出品ガイドや、よく検索される売れキーワードをもとに、検索ヒットしやすいタイトル例を整理しています。実際の検索ヒット率は出品時期・相場・カテゴリで変動するため、目安としてご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'mercari_title_gen_v1';

  // 状態 → 状態キーワード
  var COND_KW = {
    '新品未使用':       ['新品未使用', '新品', 'タグ付き'],
    '未使用に近い':     ['未使用に近い', 'ほぼ新品', '極美品'],
    '目立った傷や汚れなし': ['美品', '美品✨', 'きれい'],
    'やや傷や汚れあり': ['used', '使用感あり', 'お得品']
  };

  // 配送・取引アピール
  var SHIP_KW = ['送料無料', '即購入OK', '24時間以内発送', '匿名配送', 'メルカリ便'];

  // 訴求語（カテゴリ別）
  var APPEAL_KW = {
    'レディース':      ['人気', '可愛い', 'おしゃれ', '春夏', 'お値下げ歓迎'],
    'メンズ':          ['人気', 'おしゃれ', 'カジュアル', '定番', 'お値下げ歓迎'],
    'ベビー・キッズ':  ['可愛い', '人気', 'まとめ売り', 'お買い得'],
    'コスメ・美容':    ['人気', '残量たっぷり', '正規品', '限定', '即日発送'],
    '本・雑誌':        ['初版', '帯付き', '美品', 'まとめ売り', '匿名配送'],
    '家電・スマホ':    ['動作確認済', '正規品', '初期化済', '美品', '送料無料'],
    'ホビー・グッズ':  ['希少', '限定', '正規品', '人気', 'コレクター'],
    'その他':          ['人気', '希少', 'お得', 'おすすめ']
  };

  // ロード時に保存値を復元
  window.addEventListener('DOMContentLoaded', function () {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.cat) document.getElementById('cat').value = d.cat;
      if (d.cond) document.getElementById('cond').value = d.cond;
      if (d.brand) document.getElementById('brand').value = d.brand;
      if (d.name) document.getElementById('name').value = d.name;
      if (d.size) document.getElementById('size').value = d.size;
      if (d.kw) document.getElementById('kw').value = d.kw;
    } catch (e) {}
  });

  function save(d) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch (e) {}
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function pickN(arr, n) {
    var copy = arr.slice();
    var out = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      out.push(copy[idx]);
      copy.splice(idx, 1);
    }
    return out;
  }

  function trim60(parts) {
    // parts: 文字列の配列。先頭から繋いで60字を超えないように削る
    var out = '';
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (!p) continue;
      var sep = out.length === 0 ? '' : ' ';
      if ((out + sep + p).length <= 60) {
        out = out + sep + p;
      }
    }
    return out;
  }

  function buildPatterns(input) {
    var brand = input.brand;
    var name = input.name;
    var size = input.size;
    var condKw = COND_KW[input.cond] || ['美品'];
    var appealList = APPEAL_KW[input.cat] || APPEAL_KW['その他'];
    var kwArr = (input.kw || '').split(/\s+/).filter(function (x) { return x.length > 0; });

    // キーワード組み合わせを毎回ランダムに振り分ける
    var c1 = pick(condKw);
    var c2 = pick(condKw.filter(function(x){return x!==c1;}).concat([c1]));
    var s1 = pick(SHIP_KW);
    var s2 = pick(SHIP_KW.filter(function(x){return x!==s1;}).concat([s1]));
    var a1 = pick(appealList);
    var a2 = pick(appealList.filter(function(x){return x!==a1;}).concat([a1]));
    var a3 = pick(appealList);

    var patterns = [
      // 1. 状態 + ブランド + 名前 + サイズ + 訴求
      [c1, brand, name, size, a1],
      // 2. 訴求 + ブランド + 名前 + 状態 + 配送
      [a1, brand, name, c1, s1],
      // 3. ブランド + 名前 + キーワード + 状態 + 訴求
      [brand, name].concat(kwArr.slice(0, 2)).concat([c1, a2]),
      // 4. 状態 + 名前 + サイズ + 訴求 + 配送
      [c2, name, size, a2, s1],
      // 5. 訴求 + 状態 + ブランド + 名前 + キーワード
      [a3, c1, brand, name].concat(kwArr.slice(0, 1)),
      // 6. ブランド + 名前 + サイズ + 訴求 + 配送 + 状態
      [brand, name, size, a1, s2, c1],
      // 7. 状態 + 訴求 + 名前 + キーワード + 配送
      [c2, a2, name].concat(kwArr.slice(0, 2)).concat([s1])
    ];

    var seen = {};
    var titles = [];
    for (var i = 0; i < patterns.length; i++) {
      var t = trim60(patterns[i]);
      if (!t) continue;
      if (seen[t]) continue;
      seen[t] = true;
      titles.push(t);
    }
    return titles;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render(titles) {
    var html = '';
    for (var i = 0; i < titles.length; i++) {
      var t = titles[i];
      var len = t.length;
      var over = len > 60;
      html += '<div class="title-item">'
            + '<div class="title-text">' + escapeHtml(t) + '</div>'
            + '<div class="title-meta">'
            +   '<span class="title-count' + (over ? ' over' : '') + '">' + len + '字 / 60字</span>'
            +   '<button type="button" class="btn-copy" onclick="copyTitle(this, ' + i + ')">コピー</button>'
            + '</div>'
            + '</div>';
    }
    document.getElementById('titles').innerHTML = html;
    window._currentTitles = titles;
  }

  function copyTitle(btn, idx) {
    var t = (window._currentTitles || [])[idx];
    if (!t) return;
    var done = function () {
      btn.classList.add('copied');
      btn.textContent = 'コピー済';
      setTimeout(function () {
        btn.classList.remove('copied');
        btn.textContent = 'コピー';
      }, 1400);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(done, function () { fallbackCopy(t); done(); });
    } else {
      fallbackCopy(t);
      done();
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function gen() {
    var input = {
      cat:   document.getElementById('cat').value.trim(),
      brand: document.getElementById('brand').value.trim(),
      name:  document.getElementById('name').value.trim(),
      size:  document.getElementById('size').value.trim(),
      cond:  document.getElementById('cond').value.trim(),
      kw:    document.getElementById('kw').value.trim()
    };

    if (!input.name) {
      alert('「商品名・種別」は必須です（例: ワンピース、iPhone15 など）');
      return;
    }

    save(input);

    var titles = buildPatterns(input);
    if (titles.length === 0) {
      titles = [trim60([input.cond, input.brand, input.name, input.size])];
    }

    render(titles);
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  </script>

  <script src="../related-widget.js"></script>

</body>
