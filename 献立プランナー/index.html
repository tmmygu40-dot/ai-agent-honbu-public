<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>献立プランナー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>献立プランナー</h1>

    <!-- 曜日タブ -->
    <div class="day-tabs" id="dayTabs"></div>

    <!-- 献立入力 -->
    <div class="input-section">
      <div class="input-row">
        <input type="text" id="dishName" placeholder="料理名（例：カレーライス）" maxlength="50">
      </div>
      <div class="input-row">
        <input type="text" id="ingredients" placeholder="食材（カンマ区切り：玉ねぎ,じゃがいも,肉）" maxlength="200">
      </div>
      <button id="addBtn" onclick="addDish()">追加</button>
    </div>

    <!-- 献立リスト -->
    <section class="section">
      <h2 id="menuTitle">月曜日の献立</h2>
      <ul id="menuList" class="menu-list"></ul>
    </section>

    <!-- 食材リスト -->
    <section class="section">
      <h2>今週の食材リスト</h2>
      <div class="shopping-header">
        <span id="ingredientCount">0件</span>
        <button class="copy-btn" onclick="copyIngredients()">コピー</button>
        <button class="clear-btn" onclick="clearChecked()">チェック済みを削除</button>
      </div>
      <ul id="ingredientList" class="ingredient-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
