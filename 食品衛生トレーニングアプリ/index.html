<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品衛生トレーニングアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── スタート画面 ── */
    .start-screen { text-align: center; padding: 1rem 0; }
    .start-screen p { font-size: 0.92rem; color: var(--text-sub); line-height: 1.7; margin-bottom: 1.2rem; }
    .category-btns { display: flex; flex-direction: column; gap: 0.8rem; }
    .btn-category {
      padding: 1rem; font-size: 1rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-category:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }
    .btn-category.all { background: #1c6f4a; box-shadow: 0 4px 0 #144f34; }
    .btn-category.all:active { box-shadow: 0 1px 0 #144f34; }

    /* ── 進捗バー ── */
    .progress-wrap {
      max-width: 600px; margin: 0 auto 1rem;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0 0.2rem;
    }
    .progress-bar {
      flex: 1; height: 8px;
      background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 0.78rem; color: var(--text-sub); white-space: nowrap; }

    /* ── カテゴリバッジ ── */
    .category-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      margin-bottom: 0.7rem;
    }
    .badge-allergy { background: #fde8ff; color: #7e22ce; }
    .badge-hygiene { background: #e0f2fe; color: #0369a1; }

    /* ── 問題文 ── */
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    /* ── 選択肢ボタン ── */
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .btn-choice {
      width: 100%; padding: 0.85rem 1rem; text-align: left;
      font-size: 0.92rem; font-weight: 600; line-height: 1.4;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-choice:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .btn-choice.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .btn-choice.wrong   { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .btn-choice:disabled { cursor: default; }

    /* ── フィードバック ── */
    .feedback {
      display: none; margin-top: 1rem;
      padding: 0.9rem 1rem; border-radius: 10px;
      font-size: 0.88rem; line-height: 1.6;
    }
    .feedback.correct { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--ok); }
    .feedback.wrong   { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--ng); }
    .feedback .fb-label { font-weight: 800; font-size: 1rem; margin-bottom: 0.3rem; }
    .feedback .fb-exp   { color: var(--text); margin-top: 0.4rem; }

    /* ── 次へボタン ── */
    .btn-next {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 1rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }

    /* ── 結論カード（スコア画面） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.2rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin: 0.5rem 0 0.6rem; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 履歴カード ── */
    .history-list { list-style: none; }
    .history-list li {
      display: flex; justify-content: space-between;
      padding: 0.45rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-sub);
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .score-val { font-weight: 700; color: var(--text); }

    /* ── リトライ／戻るボタン ── */
    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 1rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-next, .btn-retry, .btn-category, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🍽️ 食品衛生トレーニングアプリ</h1>
    <p class="subtitle">食品アレルギー・衛生基準をクイズで繰り返し学習</p>
  </header>

  <!-- スタート画面 -->
  <div class="card" id="startScreen">
    <p class="card-title">カテゴリを選んでスタート</p>
    <div class="start-screen">
      <p>飲食店スタッフ向け食品衛生クイズです。<br>カテゴリを選んで学習を始めましょう。</p>
      <div class="category-btns">
        <button class="btn-category" onclick="startQuiz('allergy')">🥜 食品アレルギー編（10問）</button>
        <button class="btn-category" onclick="startQuiz('hygiene')">🧼 衛生基準編（10問）</button>
        <button class="btn-category all" onclick="startQuiz('all')">📚 全問チャレンジ（20問）</button>
      </div>
    </div>
  </div>

  <!-- 進捗バー -->
  <div class="progress-wrap no-print" id="progressWrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-text" id="progressText">0 / 0</span>
  </div>

  <!-- クイズカード -->
  <div class="card" id="quizCard" style="display:none">
    <span class="category-badge" id="categoryBadge"></span>
    <p class="question-text" id="questionText"></p>
    <div class="choices" id="choicesArea"></div>
    <div class="feedback" id="feedbackArea">
      <div class="fb-label" id="fbLabel"></div>
      <div class="fb-exp" id="fbExp"></div>
    </div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-next no-print" id="btnNext" onclick="nextQuestion()">次の問題へ →</button>

  <!-- スコア結果カード -->
  <div class="result-card" id="scoreCard">
    <p class="result-label">クイズ結果</p>
    <p class="result-value" id="scoreValue">—</p>
    <p class="result-eval" id="scoreEval"></p>
    <p class="result-note" id="scoreNote"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detailCard" style="display:none">
    <p class="card-title">カテゴリ別スコア</p>
    <table class="detail-table"><tbody id="detailBody"></tbody></table>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">スコア履歴（直近5回）</p>
    <ul class="history-list" id="historyList"></ul>
  </div>

  <!-- リトライボタン -->
  <button class="btn-retry no-print" id="btnRetry" style="display:none" onclick="showStart()">もう一度チャレンジ</button>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── 問題データ ──
  var QUESTIONS = {
    allergy: [
      {
        q: '日本の食品表示法で「特定原材料」として表示が義務付けられているのはどれですか？',
        choices: ['大豆', '小麦', 'ごま', 'カシューナッツ'],
        correct: 1,
        exp: '小麦は特定原材料8品目のひとつで、表示が義務付けられています。大豆・ごま・カシューナッツは表示推奨（任意表示）の品目です。'
      },
      {
        q: '特定原材料に含まれない食品はどれですか？',
        choices: ['えび', '落花生（ピーナッツ）', 'りんご', 'そば'],
        correct: 2,
        exp: 'りんごは特定原材料ではなく、表示推奨品目（任意表示）です。えび・落花生・そばは特定原材料として表示義務があります。'
      },
      {
        q: 'アレルギー症状が出た場合に最初に行うべき対応として正しいのはどれですか？',
        choices: ['水を飲ませる', '食べたものを無理に吐かせる', '横にして安静にさせる', '症状を観察してから対応を決める'],
        correct: 2,
        exp: 'アレルギー症状（特にアナフィラキシー）は急速に悪化します。横にして安静を保ちつつ、速やかに救急車を呼ぶことが重要です。'
      },
      {
        q: 'アナフィラキシーショックの特徴として正しいのはどれですか？',
        choices: ['ゆっくり数時間かけて症状が出る', '全身に急速に症状が現れ命に関わることがある', '必ず皮膚症状（じんましん）が最初に出る', '食べた直後より2〜3時間後に症状が出やすい'],
        correct: 1,
        exp: 'アナフィラキシーは急速に進行し、血圧低下・意識障害など生命に関わる症状が出ることがあります。早急な対応が必要です。'
      },
      {
        q: 'エピペン（アドレナリン自己注射薬）について正しいのはどれですか？',
        choices: ['太ももに注射する', '腕の血管に注射する', '効果は72時間持続する', '注射後はすぐ帰宅してよい'],
        correct: 0,
        exp: 'エピペンは太ももの外側に注射します。効果は15〜20分程度のため、注射後は必ず救急車を呼んで病院で診察を受ける必要があります。'
      },
      {
        q: '食物アレルギーの原因となる「アレルゲン」について正しいのはどれですか？',
        choices: ['加熱すれば必ずアレルゲン性が消失する', 'タンパク質の一部がアレルゲンになることが多い', 'においや触れるだけでは反応しない', '子供のアレルギーは必ず大人になれば治る'],
        correct: 1,
        exp: 'アレルゲンは食品中のタンパク質が原因になることがほとんどです。加熱で性質が変わるものもありますが、完全に消えるとは限りません。'
      },
      {
        q: '乳アレルギーのある顧客に提供できない可能性がある食品はどれですか？',
        choices: ['豆乳', 'アーモンドミルク', 'バター', 'ライスミルク'],
        correct: 2,
        exp: 'バターは牛乳から作られる乳製品です。乳アレルギーの方は乳タンパクに反応するため、バターも避ける必要があります。豆乳・アーモンドミルク・ライスミルクは乳を含みません。'
      },
      {
        q: 'アレルギー対応食を提供する際の注意点として正しいのはどれですか？',
        choices: ['アレルゲン食材を取り除けば同じ器具・食器を使ってよい', '可能な限り専用の器具・食器を使いコンタミネーションを防ぐ', '見た目でアレルゲンが入っていないか確認する', '顧客がアレルギーと言っていても通常通り調理してよい'],
        correct: 1,
        exp: 'コンタミネーション（微量混入）がアレルギー反応を引き起こすことがあります。専用器具・食器の使用や調理場所の分離が重要です。'
      },
      {
        q: '特定原材料として表示が義務付けられているのは現在（2024年）何品目ですか？',
        choices: ['5品目', '7品目', '8品目', '20品目'],
        correct: 2,
        exp: '2023年3月より特定原材料は従来の7品目にくるみが追加され、8品目（えび・かに・小麦・そば・卵・乳・落花生・くるみ）となりました。'
      },
      {
        q: 'そばアレルギーについて正しいのはどれですか？',
        choices: ['ごく少量では反応しない', '重篤なアナフィラキシーを引き起こすことがある', '湯気やにおいで反応することはない', '食べてから必ず24時間以内に症状が出る'],
        correct: 1,
        exp: 'そばは重篤なアレルギー反応（アナフィラキシー）を引き起こしやすい食品のひとつです。ごく微量でも反応する場合があり、湯気を吸い込んで症状が出るケースもあります。'
      }
    ],
    hygiene: [
      {
        q: '食中毒の三大原因として「つけない・ふやさない」に加えてもう1つは何ですか？',
        choices: ['冷やす', 'やっつける（殺菌）', '混ぜない', '隔離する'],
        correct: 1,
        exp: '食中毒予防の三原則は「つけない・ふやさない・やっつける（殺菌する）」です。加熱や消毒でウイルス・菌を死滅させることが重要です。'
      },
      {
        q: 'ノロウイルスを不活化するために有効な消毒液として正しいのはどれですか？',
        choices: ['エタノール（アルコール）消毒液', '次亜塩素酸ナトリウム溶液', '逆性石けん', '塩水'],
        correct: 1,
        exp: 'ノロウイルスはアルコール消毒に抵抗性があります。次亜塩素酸ナトリウム（塩素系漂白剤）が有効です。濃度200ppm以上の溶液で消毒します。'
      },
      {
        q: '食品を安全に保存するための「冷蔵」温度として正しいのはどれですか？',
        choices: ['10℃以下', '15℃以下', '20℃以下', '5℃以下'],
        correct: 0,
        exp: '食品衛生法では、要冷蔵食品は10℃以下で保存することが定められています。細菌の増殖を抑えるため、できるだけ低温管理が重要です。'
      },
      {
        q: '手洗いで正しい方法はどれですか？',
        choices: ['流水で3秒ほど流す', '石けんで15秒もみ洗い後、流水で十分にすすぐ', '消毒液をつけた紙で拭くだけでよい', '水温は関係ないので水でよい'],
        correct: 1,
        exp: '手洗いは石けんで十分にもみ洗い（最低15〜30秒）し、流水ですすぐことが重要です。指の間・爪の中・手首も忘れずに洗います。'
      },
      {
        q: '食品を再加熱する際の適切な中心温度はどれですか？',
        choices: ['60℃で1分以上', '75℃で1分以上', '100℃で5分以上', '50℃で30秒以上'],
        correct: 1,
        exp: '加熱調理食品の中心温度は75℃で1分以上（二枚貝等は85〜90℃で90秒以上）を確保することで、ほとんどの食中毒菌を死滅させることができます。'
      },
      {
        q: '食品を扱う際の衛生的な作業着の着用について正しいのはどれですか？',
        choices: ['普段着の上にエプロンをすればよい', '作業着・帽子を着用し、毛髪や汗が食品に入らないよう管理する', '手袋をすれば手洗いは不要', '爪が長くても手袋をすれば問題ない'],
        correct: 1,
        exp: '作業着・帽子の着用、毛髪の管理は異物混入防止の基本です。手袋も正しく使えば有効ですが、手袋着用前後の手洗いも必要です。'
      },
      {
        q: '食中毒が発生したり疑われる場合、まず何をすべきですか？',
        choices: ['自分たちで原因を調べてから報告する', '保健所に報告するとともに、原因食品を保存する', '食品を廃棄して証拠を残さない', 'メニューを変更して様子を見る'],
        correct: 1,
        exp: '食中毒が疑われる場合は、速やかに保健所へ報告することが義務です。また、原因究明のために食材・調理済み食品・嘔吐物などを保存しておくことが重要です。'
      },
      {
        q: '原材料の「先入れ先出し」管理について正しいのはどれですか？',
        choices: ['新しい食材から優先して使う', '古い食材（先に入庫したもの）から優先して使う', '賞味期限は関係なく使いやすい食材から使う', '冷蔵品だけに適用するルール'],
        correct: 1,
        exp: '先入れ先出し（FIFO）は在庫管理の基本原則です。先に入庫した食材（古いもの）から優先して使うことで、食材の無駄・食中毒リスクを減らします。'
      },
      {
        q: '黄色ブドウ球菌による食中毒の特徴として正しいのはどれですか？',
        choices: ['加熱すれば毒素も無毒化できる', '食後数日経ってから症状が出る', '菌が産生する毒素は加熱しても残ることがある', '主に生肉に汚染が多い'],
        correct: 2,
        exp: '黄色ブドウ球菌が産生するエンテロトキシン（毒素）は熱に非常に強く、一般的な加熱調理では分解されません。菌を増やさないことが最大の予防です。手指の傷口が感染源になることもあります。'
      },
      {
        q: '交差汚染（クロスコンタミネーション）を防ぐために正しいのはどれですか？',
        choices: ['生肉と野菜を同じまな板で調理してよい', '生鮮食品と加工済み食品に同じ器具を使わない', '使用後のまな板は水洗いだけでよい', '魚と肉は同じ保存容器に入れてよい'],
        correct: 1,
        exp: '交差汚染防止のため、生鮮食品と加工済み食品は専用の器具・まな板を分けて使います。まな板は使用後、洗浄・消毒・乾燥させることが必要です。'
      }
    ]
  };

  // ── ゲーム状態 ──
  var state = {
    questions: [],
    currentIdx: 0,
    score: 0,
    allergyCorrect: 0,
    allergyTotal: 0,
    hygieneCorrect: 0,
    hygieneTotal: 0,
    answered: false
  };

  // ── スタート ──
  function startQuiz(category) {
    var qs = [];
    if (category === 'allergy') {
      qs = shuffle(QUESTIONS.allergy.map(function(q){ return Object.assign({}, q, {cat: 'allergy'}); }));
    } else if (category === 'hygiene') {
      qs = shuffle(QUESTIONS.hygiene.map(function(q){ return Object.assign({}, q, {cat: 'hygiene'}); }));
    } else {
      var all = QUESTIONS.allergy.map(function(q){ return Object.assign({}, q, {cat: 'allergy'}); })
              .concat(QUESTIONS.hygiene.map(function(q){ return Object.assign({}, q, {cat: 'hygiene'}); }));
      qs = shuffle(all);
    }
    state.questions = qs;
    state.currentIdx = 0;
    state.score = 0;
    state.allergyCorrect = 0; state.allergyTotal = 0;
    state.hygieneCorrect = 0; state.hygieneTotal = 0;
    state.answered = false;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('scoreCard').style.display = 'none';
    document.getElementById('detailCard').style.display = 'none';
    document.getElementById('historyCard').style.display = 'none';
    document.getElementById('btnRetry').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'flex';
    showQuestion();
  }

  // ── 問題表示 ──
  function showQuestion() {
    var q = state.questions[state.currentIdx];
    state.answered = false;

    // 進捗
    var pct = (state.currentIdx / state.questions.length * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = state.currentIdx + ' / ' + state.questions.length;

    // カテゴリバッジ
    var badge = document.getElementById('categoryBadge');
    if (q.cat === 'allergy') {
      badge.textContent = '🥜 食品アレルギー';
      badge.className = 'category-badge badge-allergy';
    } else {
      badge.textContent = '🧼 衛生基準';
      badge.className = 'category-badge badge-hygiene';
    }

    document.getElementById('questionText').textContent = (state.currentIdx + 1) + '. ' + q.q;

    // 選択肢
    var area = document.getElementById('choicesArea');
    area.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'btn-choice';
      btn.textContent = ['ア', 'イ', 'ウ', 'エ'][i] + '. ' + c;
      btn.onclick = function() { answer(i); };
      area.appendChild(btn);
    });

    // フィードバックリセット
    var fb = document.getElementById('feedbackArea');
    fb.className = 'feedback';
    fb.style.display = 'none';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('quizCard').style.display = 'block';
  }

  // ── 回答処理 ──
  function answer(idx) {
    if (state.answered) return;
    state.answered = true;
    var q = state.questions[state.currentIdx];
    var btns = document.querySelectorAll('.btn-choice');
    var correct = (idx === q.correct);

    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === q.correct) b.classList.add('correct');
      else if (i === idx && !correct) b.classList.add('wrong');
    });

    if (correct) {
      state.score++;
      if (q.cat === 'allergy') state.allergyCorrect++;
      else state.hygieneCorrect++;
    }
    if (q.cat === 'allergy') state.allergyTotal++;
    else state.hygieneTotal++;

    var fb = document.getElementById('feedbackArea');
    fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
    document.getElementById('fbLabel').textContent = correct ? '⭕ 正解！' : '❌ 不正解';
    document.getElementById('fbExp').textContent = q.exp;
    fb.style.display = 'block';

    var isLast = (state.currentIdx >= state.questions.length - 1);
    var nextBtn = document.getElementById('btnNext');
    nextBtn.textContent = isLast ? '結果を見る' : '次の問題へ →';
    nextBtn.style.display = 'block';

    // 進捗更新
    var pct = ((state.currentIdx + 1) / state.questions.length * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = (state.currentIdx + 1) + ' / ' + state.questions.length;
  }

  // ── 次へ ──
  function nextQuestion() {
    state.currentIdx++;
    if (state.currentIdx >= state.questions.length) {
      showScore();
    } else {
      showQuestion();
    }
  }

  // ── スコア画面 ──
  function showScore() {
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';

    var total = state.questions.length;
    var score = state.score;
    var pct = Math.round(score / total * 100);

    var level = pct >= 80 ? 'ok' : pct >= 60 ? 'warn' : 'ng';
    var eval_text = pct >= 80 ? '素晴らしい！合格レベルです' : pct >= 60 ? 'もう少し！復習しましょう' : '要復習。繰り返し練習しましょう';

    var sc = document.getElementById('scoreCard');
    sc.className = 'result-card ' + level;
    sc.style.display = 'block';
    document.getElementById('scoreValue').textContent = score + ' / ' + total + '問';
    document.getElementById('scoreEval').textContent = '正答率 ' + pct + '% — ' + eval_text;
    document.getElementById('scoreNote').textContent = '合格目安：80%以上（' + Math.ceil(total * 0.8) + '問以上正解）';

    // 内訳
    var rows = [];
    if (state.allergyTotal > 0) rows.push(['🥜 食品アレルギー', state.allergyCorrect + ' / ' + state.allergyTotal + '問']);
    if (state.hygieneTotal > 0)  rows.push(['🧼 衛生基準', state.hygieneCorrect + ' / ' + state.hygieneTotal + '問']);
    rows.push(['合計', score + ' / ' + total + '問（' + pct + '%）']);

    document.getElementById('detailBody').innerHTML = rows.map(function(r, i) {
      var hl = (i === rows.length - 1) ? ' class="hl"' : '';
      return '<tr' + hl + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detailCard').style.display = 'block';

    // 履歴保存
    saveHistory(score, total, pct);

    document.getElementById('btnRetry').style.display = 'block';
  }

  // ── 履歴 ──
  function saveHistory(score, total, pct) {
    var key = 'shokuhinEisei_history';
    var hist = JSON.parse(localStorage.getItem(key) || '[]');
    hist.unshift({
      date: new Date().toLocaleDateString('ja-JP'),
      score: score,
      total: total,
      pct: pct
    });
    if (hist.length > 5) hist = hist.slice(0, 5);
    localStorage.setItem(key, JSON.stringify(hist));

    var ul = document.getElementById('historyList');
    ul.innerHTML = hist.map(function(h) {
      return '<li><span>' + h.date + '</span><span class="score-val">' + h.score + '/' + h.total + '問（' + h.pct + '%）</span></li>';
    }).join('');
    document.getElementById('historyCard').style.display = 'block';
  }

  // ── トップへ戻る ──
  function showStart() {
    document.getElementById('startScreen').style.display = 'block';
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('scoreCard').style.display = 'none';
    document.getElementById('detailCard').style.display = 'none';
    document.getElementById('btnRetry').style.display = 'none';

    // 履歴は残す
    var key = 'shokuhinEisei_history';
    var hist = JSON.parse(localStorage.getItem(key) || '[]');
    if (hist.length > 0) {
      var ul = document.getElementById('historyList');
      ul.innerHTML = hist.map(function(h) {
        return '<li><span>' + h.date + '</span><span class="score-val">' + h.score + '/' + h.total + '問（' + h.pct + '%）</span></li>';
      }).join('');
      document.getElementById('historyCard').style.display = 'block';
    } else {
      document.getElementById('historyCard').style.display = 'none';
    }
  }

  // ── ユーティリティ ──
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // 起動時：履歴表示
  (function() {
    var key = 'shokuhinEisei_history';
    var hist = JSON.parse(localStorage.getItem(key) || '[]');
    if (hist.length > 0) {
      var ul = document.getElementById('historyList');
      ul.innerHTML = hist.map(function(h) {
        return '<li><span>' + h.date + '</span><span class="score-val">' + h.score + '/' + h.total + '問（' + h.pct + '%）</span></li>';
      }).join('');
      document.getElementById('historyCard').style.display = 'block';
    }
  })();
  </script>
