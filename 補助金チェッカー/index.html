<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補助金チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E8%A3%9C%E5%8A%A9%E9%87%91%E3%83%81%E3%82%A7%E3%83%83%E3%82%AB%E3%83%BC/" />
</head>
<body>
  <div class="container">
    <h1>補助金チェッカー</h1>
    <p class="subtitle">申請期限と対象条件を登録してチャンスを見逃さない</p>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="name">補助金・助成金名 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：IT導入補助金2024" maxlength="100">
      </div>
      <div class="form-group">
        <label for="deadline">申請期限 <span class="required">*</span></label>
        <input type="date" id="deadline">
      </div>
      <div class="form-group">
        <label for="amount">補助金額（目安）</label>
        <input type="text" id="amount" placeholder="例：最大150万円" maxlength="50">
      </div>
      <div class="form-group">
        <label for="condition">対象条件</label>
        <textarea id="condition" placeholder="例：従業員20名以下の中小企業、IT導入を行う事業者" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="url">参照URL</label>
        <input type="text" id="url" placeholder="https://..." maxlength="200">
      </div>
      <div class="form-group">
        <label for="memo">メモ</label>
        <textarea id="memo" placeholder="必要書類・担当者など" rows="2"></textarea>
      </div>
      <button class="btn-primary" onclick="addEntry()">登録する</button>
    </section>

    <section class="filter-section">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
        <button class="filter-btn urgent" data-filter="urgent" onclick="setFilter('urgent', this)">期限間近</button>
        <button class="filter-btn expired" data-filter="expired" onclick="setFilter('expired', this)">期限切れ</button>
        <button class="filter-btn ok" data-filter="ok" onclick="setFilter('ok', this)">余裕あり</button>
      </div>
      <input type="text" id="search" placeholder="名前・条件で検索..." oninput="renderList()">
    </section>

    <section class="list-section">
      <div id="summary" class="summary"></div>
      <div id="list"></div>
      <p id="empty" class="empty" style="display:none;">登録されている補助金はありません</p>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
