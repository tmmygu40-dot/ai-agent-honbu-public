<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>視点シフト生成器｜不安を笑いに変える3パターン変換</title>
  <meta name="description" content="今日のちいさな不安を入力するだけで、ユーモア・前向き・メタ視点の3パターンに即変換します。寝る前のモヤモヤをサッと笑いに変えたいときに。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
      resize: vertical; min-height: 80px;
      font-family: inherit;
    }
    .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .shift-item {
      padding: 1rem 0; border-bottom: 1px solid var(--border);
    }
    .shift-item:last-child { border-bottom: none; }
    .shift-tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.22rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.5rem;
    }
    .shift-tag.humor { background: #fff3d6; color: #b45309; }
    .shift-tag.positive { background: #dcfce7; color: #15803d; }
    .shift-tag.meta { background: #e0e7ff; color: #4338ca; }
    .shift-text { font-size: 0.98rem; line-height: 1.65; color: var(--text); }

    .history-item {
      padding: 0.6rem 0.3rem;
      border-bottom: 1px dashed var(--border);
      font-size: 0.86rem;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 0.8rem 0; }
    .history-clear {
      display: block; margin: 0.6rem auto 0;
      font-size: 0.76rem; color: var(--text-sub);
      background: none; border: none; cursor: pointer;
      text-decoration: underline;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>視点シフト生成器</h1>
    <p class="subtitle">今日のちいさな不安を、ユーモア・前向き・メタ視点の3パターンで言い換え</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">不安・モヤモヤを入力</p>
    <div class="field">
      <label for="worry">何が気になってる？</label>
      <textarea id="worry" placeholder="例：明日の打ち合わせで失敗したらどうしよう"></textarea>
      <p class="hint">短くてOK。寝る前のモヤモヤや、ふと浮かんだ心配ごとを。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">視点を変える</button>

  <!-- 結果カード -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">3つの視点シフト</p>
    <div id="shift-list"></div>
  </div>

  <!-- 履歴カード -->
  <div class="card">
    <p class="card-title">最近のシフト履歴（直近5件）</p>
    <div id="history-list"></div>
    <button class="history-clear" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは、認知行動療法・リフレーミングの考え方を参考に、気軽に使えるカジュアル版として整理しています。深い悩みは専門窓口（厚生労働省「こころの耳」など）にもご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'shisten_shift_history_v1';

  var HUMOR_TEMPLATES = [
    'よく考えたら、宇宙の歴史138億年からすると「{x}」は1ナノ秒未満の出来事。気にしてたら銀河系に怒られる。',
    '「{x}」って言葉にすると、なんか急にRPGの中ボス感が出てきた。次のセーブポイントまで頑張れ。',
    '冷静に見ると「{x}」は、5年後の自分にとって完全に黒歴史よりかわいい笑い話のネタ。',
    '「{x}」を100文字以内で世界に発表しても、たぶん誰も覚えてない。なら自分も忘れていい。',
    '宇宙人視点で見ると「{x}」は、地球人がまた変な悩み方してるな〜くらい。',
    'ペットの犬猫から見たら「{x}」より飯の方が大事。動物の境地に学ぼう。'
  ];

  var POSITIVE_TEMPLATES = [
    '「{x}」に気付けてる時点で、もう半分解決してる。気にできる人は、変えられる人。',
    '「{x}」と感じるのは、それだけ真剣に向き合ってる証拠。鈍感だったら気付かない。',
    '「{x}」を考えられる余裕があるなら、まだ大丈夫。本当にヤバい時は考える前に動く。',
    '「{x}」を準備できる時間があるなら、それは備えのチャンス。失敗ではなく予習。',
    '「{x}」は今のあなたが成長中の証拠。ステージが上がる時は不安もセットで来る。',
    '「{x}」を抱えながらも今日ここまで来た自分、十分えらい。'
  ];

  var META_TEMPLATES = [
    '10年後の自分が「{x}」を見たら「あー、そんなこともあったな」レベル。今はゲームの中盤戦。',
    '「{x}」を悩んでる自分を、空から見てる別の自分を想像しよう。「あ、人間悩み中」って絵になる。',
    '「{x}」は人生という長編小説の1ページ。次のページをめくる権利は自分にある。',
    '「{x}」を心配する自分と、それを観察する自分は別人。観察してる自分はわりと冷静。',
    '「{x}」の重さは、今日の体感100%でも、明日の朝には30%、来週には3%に減るのが普通。',
    '「{x}」を抱えた今日のあなたは、未来のあなたから見たら「乗り越えた人」のスタート地点。'
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function escape(s) {
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function generate() {
    var worry = document.getElementById('worry').value.trim();
    if (!worry) {
      alert('まず何が気になってるか入力してね');
      return;
    }
    if (worry.length > 200) {
      worry = worry.substring(0, 200);
    }

    var safeWorry = escape(worry);
    var humor = pick(HUMOR_TEMPLATES).replace('{x}', safeWorry);
    var positive = pick(POSITIVE_TEMPLATES).replace('{x}', safeWorry);
    var meta = pick(META_TEMPLATES).replace('{x}', safeWorry);

    var html =
      '<div class="shift-item">' +
        '<span class="shift-tag humor">😂 ユーモア視点</span>' +
        '<p class="shift-text">' + humor + '</p>' +
      '</div>' +
      '<div class="shift-item">' +
        '<span class="shift-tag positive">🌱 前向き視点</span>' +
        '<p class="shift-text">' + positive + '</p>' +
      '</div>' +
      '<div class="shift-item">' +
        '<span class="shift-tag meta">🌌 メタ視点</span>' +
        '<p class="shift-text">' + meta + '</p>' +
      '</div>';

    document.getElementById('shift-list').innerHTML = html;
    document.getElementById('result-card').style.display = 'block';

    saveHistory(worry);
    renderHistory();
  }

  function saveHistory(worry) {
    var list = loadHistory();
    var now = new Date();
    var ts = now.getFullYear() + '/' +
             String(now.getMonth()+1).padStart(2,'0') + '/' +
             String(now.getDate()).padStart(2,'0') + ' ' +
             String(now.getHours()).padStart(2,'0') + ':' +
             String(now.getMinutes()).padStart(2,'0');
    list.unshift({ ts: ts, worry: worry });
    if (list.length > 5) list = list.slice(0, 5);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    } catch (e) {}
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  function renderHistory() {
    var list = loadHistory();
    var box = document.getElementById('history-list');
    if (!list.length) {
      box.innerHTML = '<p class="history-empty">まだ履歴がありません</p>';
      return;
    }
    box.innerHTML = list.map(function(item){
      return '<div class="history-item">' +
               '<div style="font-size:0.72rem;color:var(--text-sub);margin-bottom:0.15rem;">' + item.ts + '</div>' +
               '<div>' + escape(item.worry) + '</div>' +
             '</div>';
    }).join('');
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderHistory();
  }

  renderHistory();
  </script>

</body>
</html>
