<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返信待ち管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>返信待ち管理</h1>

    <div class="form-card">
      <div class="form-group">
        <label for="contact">連絡先</label>
        <input type="text" id="contact" placeholder="例：田中さん、support@example.com" maxlength="100">
      </div>
      <div class="form-group">
        <label for="subject">件名</label>
        <input type="text" id="subject" placeholder="例：打ち合わせ日程の確認" maxlength="200">
      </div>
      <div class="form-group">
        <label for="date">登録日</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：急ぎ、〇日までに" maxlength="200">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="pending">未返信</button>
      <button class="filter-btn" data-filter="done">返信済み</button>
    </div>

    <div id="list" class="item-list"></div>

    <p id="empty-msg" class="empty-msg">登録されている案件はありません</p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
