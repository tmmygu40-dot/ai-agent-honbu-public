<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギフト管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🎁 ギフト管理</h1>

    <section class="form-section">
      <h2>贈り物を記録する</h2>
      <div class="form-group">
        <label for="partner">相手の名前</label>
        <input type="text" id="partner" placeholder="例：田中さん">
      </div>
      <div class="form-group">
        <label for="giftContent">贈り物の内容</label>
        <input type="text" id="giftContent" placeholder="例：お歳暮 洋菓子セット">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" placeholder="例：3000" min="0">
        </div>
        <div class="form-group">
          <label for="giftDate">日付</label>
          <input type="date" id="giftDate">
        </div>
      </div>
      <div class="form-group">
        <label for="direction">種別</label>
        <select id="direction">
          <option value="received">もらった</option>
          <option value="gave">あげた</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：結婚祝いのお返し">
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <div class="filter-group">
          <label>
            <input type="checkbox" id="showOnlyUnreturned" checked>
            お返し未済のみ表示
          </label>
        </div>
      </div>
      <div id="giftList" class="gift-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
