<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>症状逆引きガイドアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      cursor: pointer;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* カテゴリボタングリッド */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
    }
    .cat-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.5rem;
      font-size: 0.88rem; font-weight: 700;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .cat-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .cat-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 0.25rem; }

    /* 症状ボタングリッド */
    .sym-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .sym-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem; font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sym-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .sym-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* 結果エリア */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto;
    }
    .result-symptom {
      text-align: center;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 1.15rem;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .result-section {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .result-section-title {
      font-size: 0.82rem; font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .result-section-title.cause { color: var(--ng); border-color: #fecaca; }
    .result-section-title.treat { color: var(--ok); border-color: #bbf7d0; }
    .result-section-title.doctor { color: var(--warn); border-color: #fde68a; }

    .result-list { list-style: none; }
    .result-list li {
      padding: 0.55rem 0;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .result-list li:last-child { border-bottom: none; }
    .result-list li::before {
      content: '•';
      color: var(--accent);
      font-weight: 900;
      flex-shrink: 0;
      margin-top: 0.05rem;
    }
    .result-list.cause li::before { color: var(--ng); }
    .result-list.treat li::before { color: var(--ok); }

    .doctor-tag {
      display: inline-block;
      background: var(--warn-bg);
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--warn);
      margin: 0.3rem 0.3rem 0 0;
    }
    .warn-box {
      background: var(--ng-bg);
      border: 1.5px solid #fecaca;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.82rem;
      color: var(--ng);
      line-height: 1.5;
    }
    .warn-box strong { font-weight: 800; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .reset-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0.75rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>

  <header class="app-header">
    <h1>症状逆引きガイド</h1>
    <p class="subtitle">症状を選ぶだけで原因と対処法をすぐ確認</p>

  <!-- カテゴリ選択 -->
  <div class="card" id="catCard">
    <p class="card-title">STEP 1 — カテゴリを選ぶ</p>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- 症状選択 -->
  <div class="card" id="symCard" style="display:none">
    <p class="card-title">STEP 2 — 症状を選ぶ</p>
    <div class="sym-grid" id="symGrid"></div>
  </div>

  <!-- 結果 -->
  <div class="result-area" id="resultArea">
    <div class="result-symptom" id="resultTitle"></div>

    <div class="result-section">
      <p class="result-section-title cause">❓ 考えられる原因</p>
      <ul class="result-list cause" id="causeList"></ul>
    </div>

    <div class="result-section">
      <p class="result-section-title treat">✅ 対処法・セルフケア</p>
      <ul class="result-list treat" id="treatList"></ul>
    </div>

    <div class="result-section">
      <p class="result-section-title doctor">🏥 受診の目安・診療科</p>
      <div id="doctorInfo"></div>
    </div>

    <button class="reset-btn" onclick="resetAll()">← 別の症状を調べる</button>
  </div>

  // ─────────────────────────────────────────
  // UI制御
  // ─────────────────────────────────────────
  var selectedCat = null;
  var selectedSym = null;

  function init() {
    renderCategories();
    // localStorageから前回の選択を復元
    var saved = getSaved();
    if (saved && DB[saved.cat] && DB[saved.cat].symptoms[saved.sym]) {
      selectCategory(saved.cat, true);
      selectSymptom(saved.sym);
    }
  }

  function renderCategories() {
    var grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    Object.keys(DB).forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn' + (selectedCat === cat ? ' active' : '');
      btn.innerHTML = '<span class="icon">' + DB[cat].icon + '</span>' + cat;
      btn.onclick = function() { selectCategory(cat); };
      grid.appendChild(btn);
    });
  }

  function selectCategory(cat, silent) {
    selectedCat = cat;
    selectedSym = null;
    renderCategories();
    renderSymptoms(cat);
    document.getElementById('symCard').style.display = '';
    document.getElementById('resultArea').style.display = 'none';
    if (!silent) {
      document.getElementById('symCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function renderSymptoms(cat) {
    var grid = document.getElementById('symGrid');
    grid.innerHTML = '';
    Object.keys(DB[cat].symptoms).forEach(function(sym) {
      var btn = document.createElement('button');
      btn.className = 'sym-btn' + (selectedSym === sym ? ' active' : '');
      btn.textContent = sym;
      btn.onclick = function() { selectSymptom(sym); };
      grid.appendChild(btn);
    });
  }

  function selectSymptom(sym) {
    selectedSym = sym;
    renderSymptoms(selectedCat);
    showResult(selectedCat, sym);
    saveSelected(selectedCat, sym);
    setTimeout(function() {
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function showResult(cat, sym) {
    var data = DB[cat].symptoms[sym];
    document.getElementById('resultTitle').textContent = DB[cat].icon + ' ' + sym;

    // 原因
    var causeList = document.getElementById('causeList');
    causeList.innerHTML = data.causes.map(function(c) {
      return '<li>' + c + '</li>';
    }).join('');

    // 対処法
    var treatList = document.getElementById('treatList');
    treatList.innerHTML = data.treats.map(function(t) {
      return '<li>' + t + '</li>';
    }).join('');

    // 診療科
    var doctorInfo = document.getElementById('doctorInfo');
    var html = data.doctors.map(function(d) {
      return '<span class="doctor-tag">' + d + '</span>';
    }).join('');
    if (data.warn) {
      html += '<div class="warn-box" style="margin-top:0.8rem"><strong>⚠️ 受診タイミング：</strong>' + data.warn + '</div>';
    }
    doctorInfo.innerHTML = html;

    document.getElementById('resultArea').style.display = '';
  }

  function resetAll() {
    selectedCat = null;
    selectedSym = null;
    renderCategories();
    document.getElementById('symCard').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // localStorage
  function saveSelected(cat, sym) {
    try { localStorage.setItem('symptom_guide_last', JSON.stringify({cat: cat, sym: sym})); } catch(e) {}
  }
  function getSaved() {
    try { return JSON.parse(localStorage.getItem('symptom_guide_last')); } catch(e) { return null; }
  }

  window.onload = init;
  </script>
