<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト希望収集アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>シフト希望収集</h1>

    <section class="form-section">
      <h2>希望を追加</h2>
      <div class="form-group">
        <label for="staffName">スタッフ名</label>
        <input type="text" id="staffName" placeholder="例：田中">
      </div>
      <div class="form-group">
        <label for="dayOfWeek">曜日</label>
        <select id="dayOfWeek">
          <option value="月">月曜日</option>
          <option value="火">火曜日</option>
          <option value="水">水曜日</option>
          <option value="木">木曜日</option>
          <option value="金">金曜日</option>
          <option value="土">土曜日</option>
          <option value="日">日曜日</option>
        </select>
      </div>
      <div class="form-group time-group">
        <label>時間帯</label>
        <div class="time-inputs">
          <input type="time" id="startTime" value="09:00">
          <span>〜</span>
          <input type="time" id="endTime" value="17:00">
        </div>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：午前のみ可">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>希望一覧</h2>
        <div class="view-toggle">
          <button id="viewByStaff" class="toggle-btn active">スタッフ別</button>
          <button id="viewByDay" class="toggle-btn">曜日別</button>
        </div>
      </div>
      <div id="listContainer"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
