<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>納品書作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>納品書作成</h1>

    <!-- 発行情報 -->
    <div class="section no-print">
      <h2>発行情報</h2>
      <div class="form-row">
        <label>納品書番号</label>
        <input type="text" id="invoiceNo" placeholder="例：001">
      </div>
      <div class="form-row">
        <label>発行日</label>
        <input type="date" id="issueDate">
      </div>
      <div class="form-row">
        <label>納品先</label>
        <input type="text" id="clientName" placeholder="例：株式会社〇〇">
      </div>
    </div>

    <!-- 品目入力 -->
    <div class="section no-print">
      <h2>品目を追加</h2>
      <div class="item-form">
        <div class="form-row">
          <label>品名</label>
          <input type="text" id="itemName" placeholder="品名を入力">
        </div>
        <div class="form-row">
          <label>数量</label>
          <input type="number" id="itemQty" placeholder="1" min="1">
        </div>
        <div class="form-row">
          <label>単価（円）</label>
          <input type="number" id="itemPrice" placeholder="0" min="0">
        </div>
        <button class="btn-add" onclick="addItem()">追加</button>
      </div>
    </div>

    <!-- 納品書プレビュー -->
    <div class="section invoice-preview" id="invoicePreview">
      <div class="invoice-header">
        <h2 class="invoice-title">納　品　書</h2>
        <div class="invoice-meta">
          <div class="invoice-meta-left">
            <p class="client-name"><span id="previewClient">　</span> 御中</p>
            <p>下記の通り納品いたします。</p>
          </div>
          <div class="invoice-meta-right">
            <p>No. <span id="previewNo">　</span></p>
            <p>発行日：<span id="previewDate">　</span></p>
          </div>
        </div>
      </div>

      <table class="invoice-table">
        <thead>
          <tr>
            <th class="col-no">No.</th>
            <th class="col-name">品名</th>
            <th class="col-qty">数量</th>
            <th class="col-price">単価</th>
            <th class="col-total">金額</th>
            <th class="col-action no-print">操作</th>
          </tr>
        </thead>
        <tbody id="itemList">
          <tr class="empty-row" id="emptyRow">
            <td colspan="6" class="empty-msg">品目を追加してください</td>
          </tr>
        </tbody>
      </table>

      <div class="invoice-summary">
        <table class="summary-table">
          <tr>
            <td>小計</td>
            <td id="subtotal">¥0</td>
          </tr>
          <tr>
            <td>消費税（10%）</td>
            <td id="tax">¥0</td>
          </tr>
          <tr class="total-row">
            <td>合計</td>
            <td id="total">¥0</td>
          </tr>
        </table>
      </div>
    </div>

    <!-- ボタン類 -->
    <div class="action-buttons no-print">
      <button class="btn-print" onclick="printInvoice()">印刷する</button>
      <button class="btn-clear" onclick="clearAll()">全クリア</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
