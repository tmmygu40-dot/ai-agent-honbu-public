<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フリマ出品シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>フリマ出品シミュレーター</h1>
    <p class="subtitle">手取り額をすぐ計算</p>

    <section class="card">
      <h2>プラットフォーム選択</h2>
      <div class="platform-grid">
        <button class="platform-btn active" data-rate="10" data-name="メルカリ">メルカリ<span>10%</span></button>
        <button class="platform-btn" data-rate="6" data-name="ラクマ">ラクマ<span>6%</span></button>
        <button class="platform-btn" data-rate="10" data-name="ヤフオク">ヤフオク<span>10%</span></button>
        <button class="platform-btn" data-rate="8" data-name="PayPayフリマ">PayPayフリマ<span>8%</span></button>
        <button class="platform-btn" data-rate="5.5" data-name="ミンネ">ミンネ<span>5.5%</span></button>
        <button class="platform-btn" data-rate="0" data-name="カスタム">カスタム<span id="customLabel">-</span></button>
      </div>
    </section>

    <section class="card">
      <h2>入力</h2>
      <div class="form-group">
        <label for="salePrice">出品価格（円）</label>
        <input type="number" id="salePrice" placeholder="例：3000" min="0">
      </div>
      <div class="form-group">
        <label for="shippingCost">送料（円）</label>
        <input type="number" id="shippingCost" placeholder="例：200" min="0" value="0">
      </div>
      <div class="form-group" id="customRateGroup" style="display:none;">
        <label for="customRate">手数料率（%）</label>
        <input type="number" id="customRate" placeholder="例：8.8" min="0" max="100" step="0.1">
      </div>
      <div class="rate-display">
        手数料率：<strong id="rateDisplay">10%</strong>（<span id="platformDisplay">メルカリ</span>）
      </div>
    </section>

    <section class="card result-card">
      <h2>計算結果</h2>
      <div class="result-main">
        <span class="result-label">手取り額</span>
        <span class="result-value" id="takeHome">－</span>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-row">
          <span>出品価格</span>
          <span id="resSalePrice">－</span>
        </div>
        <div class="breakdown-row minus">
          <span>手数料（<span id="resRateLabel">10%</span>）</span>
          <span id="resFee">－</span>
        </div>
        <div class="breakdown-row minus">
          <span>送料</span>
          <span id="resShipping">－</span>
        </div>
        <div class="breakdown-row total">
          <span>手取り額</span>
          <span id="resTakeHome">－</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button id="clearHistory" class="btn-clear">全削除</button>
      </div>
      <ul id="historyList" class="history-list">
        <li class="empty-msg">履歴はまだありません</li>
      </ul>
      <button id="saveBtn" class="btn-save">この結果を履歴に保存</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
