<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全管理アプリ｜ヒヤリハット記録</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>⚠️ ヒヤリハット記録</h1>
    <p class="subtitle">現場の危険事例を記録・集計</p>
  </header>

  <main>
    <!-- 記録フォーム -->
    <section class="card" id="form-section">
      <h2>新規記録</h2>
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="location">場所</label>
        <input type="text" id="location" placeholder="例：倉庫A、作業場B">
      </div>
      <div class="form-group">
        <label for="cause">原因</label>
        <input type="text" id="cause" placeholder="例：床の濡れ、視界不良">
      </div>
      <div class="form-group">
        <label for="content">内容</label>
        <textarea id="content" rows="3" placeholder="ヒヤリハットの詳細を入力"></textarea>
      </div>
      <button class="btn-primary" id="add-btn">記録する</button>
    </section>

    <!-- 集計表示 -->
    <section class="card" id="summary-section">
      <h2>集計</h2>
      <div class="summary-tabs">
        <button class="tab-btn active" data-tab="location-tab">場所別</button>
        <button class="tab-btn" data-tab="cause-tab">原因別</button>
      </div>
      <div id="location-tab" class="tab-content active">
        <div id="location-summary" class="summary-list">
          <p class="empty-msg">まだ記録がありません</p>
        </div>
      </div>
      <div id="cause-tab" class="tab-content">
        <div id="cause-summary" class="summary-list">
          <p class="empty-msg">まだ記録がありません</p>
        </div>
      </div>
    </section>

    <!-- 一覧表示 -->
    <section class="card" id="list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <span class="count-badge" id="total-count">0件</span>
      </div>
      <div id="records-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
