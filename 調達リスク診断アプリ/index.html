<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="仕入れ品目・依存国・代替品の有無を登録するだけで輸入停止時の調達リスクをスコア化。高リスク品目を一覧で可視化して、調達先の分散対策を判断できる診断ツールです。">
  <title>調達リスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 2カラムフィールド */
    .field-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .field-row .field { margin-bottom: 0; }

    /* ラジオ風トグル */
    .toggle-row { display: flex; gap: 0.5rem; }
    .toggle-row label {
      flex: 1; text-align: center;
      padding: 0.6rem 0.5rem; font-size: 0.88rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; user-select: none; background: var(--bg); color: var(--text-sub);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .toggle-row input[type="radio"] { display: none; }
    .toggle-row input[type="radio"]:checked + label {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── リスト ── */
    .list-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      overflow: hidden;
    }
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 1.2rem 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .list-header .card-title { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .sort-btn {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      background: none; border: 1px solid var(--accent);
      border-radius: 6px; padding: 0.25rem 0.55rem; cursor: pointer;
    }

    .item-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .risk-badge {
      flex-shrink: 0; width: 3.2rem; text-align: center;
      padding: 0.3rem 0.2rem; border-radius: 7px;
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.04em;
    }
    .badge-high { background: var(--ng-bg); color: var(--ng); border: 1px solid #fca5a5; }
    .badge-mid  { background: var(--warn-bg); color: var(--warn); border: 1px solid #fcd34d; }
    .badge-low  { background: var(--ok-bg); color: var(--ok); border: 1px solid #86efac; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub  { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.15rem; }
    .item-score { flex-shrink: 0; font-size: 1.05rem; font-weight: 900; }
    .score-high { color: var(--ng); }
    .score-mid  { color: var(--warn); }
    .score-low  { color: var(--ok); }
    .del-btn {
      flex-shrink: 0; background: none; border: none;
      color: var(--text-sub); font-size: 1.1rem; cursor: pointer; padding: 0.2rem;
      opacity: 0.5; transition: opacity 0.15s;
    }
    .del-btn:hover { opacity: 1; color: var(--ng); }

    .empty-msg {
      padding: 2rem 1.2rem; text-align: center;
      font-size: 0.88rem; color: var(--text-sub);
    }

    /* ── 統計バー ── */
    .stat-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border);
    }
    .stat-chip {
      font-size: 0.78rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 20px; white-space: nowrap;
    }
    .chip-high { background: var(--ng-bg); color: var(--ng); }
    .chip-mid  { background: var(--warn-bg); color: var(--warn); }
    .chip-low  { background: var(--ok-bg); color: var(--ok); }
    .chip-all  { background: var(--accent-light); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .list-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>調達リスク診断アプリ</h1>
    <p class="subtitle">仕入れ品目の依存国・代替品有無からリスクをスコア化</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">品目を登録する</p>

    <div class="field">
      <label for="itemName">品目名</label>
      <input type="text" id="itemName" placeholder="例：電子部品A、原材料X">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="country">依存国</label>
        <select id="country">
          <option value="cn">中国</option>
          <option value="sea">東南アジア（ASEAN）</option>
          <option value="west">欧米（米国・EU）</option>
          <option value="other" selected>その他</option>
        </select>
      </div>
      <div class="field">
        <label for="dependRatio">仕入れ依存度（%）</label>
        <input type="number" id="dependRatio" placeholder="例：80" min="1" max="100">
      </div>
    </div>

    <div class="field">
      <label>代替調達先</label>
      <div class="toggle-row">
        <input type="radio" name="alt" id="altNo" value="no" checked>
        <label for="altNo">なし（リスク大）</label>
        <input type="radio" name="alt" id="altYes" value="yes">
        <label for="altYes">あり（リスク小）</label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="addItem()">+ 品目を追加する</button>

  <!-- 一覧 -->
  <div class="list-card" id="listCard">
    <div class="list-header">
      <p class="card-title">登録済み品目（リスク診断結果）</p>
      <button class="sort-btn no-print" onclick="toggleSort()">▼ 高リスク順</button>
    </div>
    <div class="stat-row" id="statRow" style="display:none"></div>
    <div id="itemList"><p class="empty-msg">まだ品目が登録されていません。<br>上のフォームから追加してください。</p></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 リスクスコアは、依存度・国リスク係数・代替品有無を掛け合わせた参考値です（最大225）。実際の調達リスクは地政学情勢や契約内容によって異なります。経産省・中小企業庁の調達リスク管理ガイドラインも参考にしてください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 国リスク係数
  var countryCoef = { cn: 1.5, sea: 1.2, west: 0.8, other: 1.0 };
  var countryLabel = { cn: '中国', sea: '東南アジア', west: '欧米', other: 'その他' };

  var items = [];
  var sortByRisk = true; // true=高リスク順, false=登録順

  // localStorage 読み込み
  (function() {
    var saved = localStorage.getItem('chotalisk_items');
    if (saved) {
      try { items = JSON.parse(saved); } catch(e) { items = []; }
    }
    renderList();
  })();

  function save() {
    localStorage.setItem('chotalisk_items', JSON.stringify(items));
  }

  function calcScore(item) {
    var coef = countryCoef[item.country] || 1.0;
    var altMul = item.hasAlt ? 1.0 : 1.5;
    return Math.round(item.depend * coef * altMul);
  }

  function getRiskLevel(score) {
    if (score >= 80) return 'high';
    if (score >= 40) return 'mid';
    return 'low';
  }

  function addItem() {
    var name = document.getElementById('itemName').value.trim();
    var country = document.getElementById('country').value;
    var depend = parseFloat(document.getElementById('dependRatio').value);
    var hasAlt = document.querySelector('input[name="alt"]:checked').value === 'yes';

    if (!name) { alert('品目名を入力してください'); return; }
    if (isNaN(depend) || depend < 1 || depend > 100) { alert('仕入れ依存度は1〜100で入力してください'); return; }

    items.push({ id: Date.now(), name: name, country: country, depend: depend, hasAlt: hasAlt });
    save();
    renderList();

    // フォームリセット
    document.getElementById('itemName').value = '';
    document.getElementById('dependRatio').value = '';
    document.getElementById('country').value = 'other';
    document.getElementById('altNo').checked = true;
  }

  function deleteItem(id) {
    items = items.filter(function(it) { return it.id !== id; });
    save();
    renderList();
  }

  function toggleSort() {
    sortByRisk = !sortByRisk;
    var btn = document.querySelector('.sort-btn');
    btn.textContent = sortByRisk ? '▼ 高リスク順' : '▼ 登録順';
    renderList();
  }

  function renderList() {
    var list = document.getElementById('itemList');
    var statRow = document.getElementById('statRow');

    if (items.length === 0) {
      list.innerHTML = '<p class="empty-msg">まだ品目が登録されていません。<br>上のフォームから追加してください。</p>';
      statRow.style.display = 'none';
      return;
    }

    // スコア計算
    var scored = items.map(function(it) {
      var score = calcScore(it);
      return { item: it, score: score, level: getRiskLevel(score) };
    });

    // ソート
    if (sortByRisk) {
      scored.sort(function(a, b) { return b.score - a.score; });
    }

    // 統計
    var high = scored.filter(function(s) { return s.level === 'high'; }).length;
    var mid  = scored.filter(function(s) { return s.level === 'mid'; }).length;
    var low  = scored.filter(function(s) { return s.level === 'low'; }).length;
    statRow.style.display = 'flex';
    statRow.innerHTML =
      '<span class="stat-chip chip-all">合計 ' + items.length + '件</span>' +
      (high ? '<span class="stat-chip chip-high">高リスク ' + high + '件</span>' : '') +
      (mid  ? '<span class="stat-chip chip-mid">中リスク ' + mid + '件</span>'  : '') +
      (low  ? '<span class="stat-chip chip-low">低リスク ' + low + '件</span>'  : '');

    // リスト描画
    list.innerHTML = scored.map(function(s) {
      var badgeClass = s.level === 'high' ? 'badge-high' : s.level === 'mid' ? 'badge-mid' : 'badge-low';
      var scoreClass = s.level === 'high' ? 'score-high' : s.level === 'mid' ? 'score-mid' : 'score-low';
      var badgeLabel = s.level === 'high' ? '高' : s.level === 'mid' ? '中' : '低';
      var it = s.item;
      return '<div class="item-row">'
        + '<span class="risk-badge ' + badgeClass + '">' + badgeLabel + 'リスク</span>'
        + '<div class="item-body">'
        +   '<div class="item-name">' + esc(it.name) + '</div>'
        +   '<div class="item-sub">' + countryLabel[it.country] + '依存 ' + it.depend + '% ／ 代替: ' + (it.hasAlt ? 'あり' : 'なし') + '</div>'
        + '</div>'
        + '<span class="item-score ' + scoreClass + '">' + s.score + '</span>'
        + '<button class="del-btn no-print" onclick="deleteItem(' + it.id + ')" title="削除">✕</button>'
        + '</div>';
    }).join('');
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
