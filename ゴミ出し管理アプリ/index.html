<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴミ出し管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🗑️ ゴミ出し管理</h1>

    <!-- 今日のゴミエリア -->
    <section id="today-section">
      <h2 id="today-heading">今日のゴミ</h2>
      <div id="today-trash"></div>
    </section>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>ゴミを登録する</h2>
      <div class="form-group">
        <label for="trash-name">ゴミの種類</label>
        <input type="text" id="trash-name" placeholder="例：燃えるゴミ" maxlength="20">
      </div>
      <div class="form-group">
        <label>収集曜日（複数選択可）</label>
        <div class="days-grid">
          <label class="day-label"><input type="checkbox" value="0"> 日</label>
          <label class="day-label"><input type="checkbox" value="1"> 月</label>
          <label class="day-label"><input type="checkbox" value="2"> 火</label>
          <label class="day-label"><input type="checkbox" value="3"> 水</label>
          <label class="day-label"><input type="checkbox" value="4"> 木</label>
          <label class="day-label"><input type="checkbox" value="5"> 金</label>
          <label class="day-label"><input type="checkbox" value="6"> 土</label>
        </div>
      </div>
      <button id="add-btn" onclick="addTrash()">登録する</button>
    </section>

    <!-- 登録済み一覧 -->
    <section class="list-section">
      <h2>登録済み一覧</h2>
      <div id="trash-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
