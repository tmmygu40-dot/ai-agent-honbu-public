<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配達採算チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>配達採算チェッカー</h1>
    <p class="subtitle">顧客ごとの配達コストと採算を確認できます</p>

    <!-- 採算ライン設定 -->
    <div class="card settings-card">
      <h2>採算ライン設定</h2>
      <div class="settings-row">
        <label>コスト率の上限（%）</label>
        <input type="number" id="thresholdInput" min="1" max="100" value="20" step="1">
        <span class="unit">%以下で採算OK</span>
      </div>
      <p class="note">月間配達コスト ÷ 月間売上 × 100 がこの値を超えると採算割れと判定します</p>
    </div>

    <!-- 顧客登録フォーム -->
    <div class="card form-card">
      <h2>顧客を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="customerName">顧客名</label>
          <input type="text" id="customerName" placeholder="例：田中商店">
        </div>
        <div class="form-group">
          <label for="distance">片道距離 (km)</label>
          <input type="number" id="distance" min="0" step="0.1" placeholder="例：15">
        </div>
        <div class="form-group">
          <label for="frequency">月間配達回数</label>
          <input type="number" id="frequency" min="1" step="1" placeholder="例：8">
        </div>
        <div class="form-group">
          <label for="fuelPrice">燃料単価 (円/L)</label>
          <input type="number" id="fuelPrice" min="1" step="1" placeholder="例：175">
        </div>
        <div class="form-group">
          <label for="fuelEfficiency">車の燃費 (km/L)</label>
          <input type="number" id="fuelEfficiency" min="1" step="0.1" placeholder="例：12">
        </div>
        <div class="form-group">
          <label for="monthlySales">月間売上 (円)</label>
          <input type="number" id="monthlySales" min="0" step="1" placeholder="例：50000">
        </div>
      </div>
      <button class="btn-add" onclick="addCustomer()">追加する</button>
    </div>

    <!-- フィルター -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('ng', this)">採算割れのみ</button>
      <button class="filter-btn" onclick="setFilter('ok', this)">採算OK のみ</button>
    </div>

    <!-- 顧客一覧 -->
    <div id="customerList" class="customer-list">
      <p class="empty-msg">顧客がまだ登録されていません</p>
    </div>

    <!-- 集計 -->
    <div class="card summary-card" id="summaryCard" style="display:none">
      <h2>集計</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">登録顧客数</span>
          <span class="summary-value" id="totalCount">0</span><span class="summary-unit">件</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">採算割れ</span>
          <span class="summary-value danger" id="ngCount">0</span><span class="summary-unit">件</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">月間コスト合計</span>
          <span class="summary-value" id="totalCost">0</span><span class="summary-unit">円</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">月間売上合計</span>
          <span class="summary-value" id="totalSales">0</span><span class="summary-unit">円</span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
