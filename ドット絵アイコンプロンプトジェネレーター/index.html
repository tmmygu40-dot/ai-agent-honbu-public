<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="キャラ種別・表情・背景色・アクセサリーを選ぶだけで、SNSアイコン向けドット絵の画像生成AIプロンプトを即生成。ワンクリックでコピーできるプロンプトジェネレーター。">
  <title>ドット絵アイコンプロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-align: center; }

    /* ── プロンプト表示 ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); word-break: break-word;
      white-space: pre-wrap; min-height: 80px;
      margin-bottom: 1rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── お気に入りセクション ── */
    .fav-section { max-width: 600px; margin: 1rem auto; }
    .fav-section .card-title { margin-bottom: 0.6rem; }
    .btn-fav {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px; cursor: pointer;
      margin-top: 0.8rem; transition: background 0.15s;
    }
    .btn-fav:hover { background: var(--accent); color: #fff; }
    .fav-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: 0.8rem;
      margin-bottom: 0.6rem; font-size: 0.85rem; line-height: 1.5;
      word-break: break-word; position: relative;
    }
    .fav-item-actions {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }
    .fav-item-actions button {
      padding: 0.35rem 0.7rem; font-size: 0.78rem; font-weight: 600;
      border-radius: 6px; border: 1px solid var(--border);
      cursor: pointer; background: var(--card); color: var(--text-sub);
      transition: border-color 0.15s, color 0.15s;
    }
    .fav-item-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .fav-item-actions .btn-del { color: var(--ng); border-color: var(--ng); }
    .fav-item-actions .btn-del:hover { background: var(--ng); color: #fff; }
    .fav-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>ドット絵アイコンプロンプトジェネレーター</h1>
    <p class="subtitle">SNSアイコン向けドット絵の画像生成AIプロンプトを選ぶだけで即生成</p>
  </header>

  <!-- キャラ設定カード -->
  <div class="card">
    <p class="card-title">キャラクター設定</p>
    <div class="field">
      <label for="charType">キャラ種別</label>
      <select id="charType">
        <option value="boy">男の子 (Boy)</option>
        <option value="girl">女の子 (Girl)</option>
        <option value="cat">猫 (Cat)</option>
        <option value="dog">犬 (Dog)</option>
        <option value="rabbit">うさぎ (Rabbit)</option>
        <option value="bear">くま (Bear)</option>
        <option value="penguin">ペンギン (Penguin)</option>
        <option value="fox">きつね (Fox)</option>
        <option value="owl">フクロウ (Owl)</option>
        <option value="dragon">ドラゴン (Dragon)</option>
        <option value="robot">ロボット (Robot)</option>
        <option value="alien">宇宙人 (Alien)</option>
        <option value="ghost">おばけ (Ghost)</option>
        <option value="panda">パンダ (Panda)</option>
        <option value="hamster">ハムスター (Hamster)</option>
        <option value="unicorn">ユニコーン (Unicorn)</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="happy smiling">にっこり (Happy)</option>
        <option value="winking">ウインク (Winking)</option>
        <option value="cool confident">クール (Cool)</option>
        <option value="surprised">びっくり (Surprised)</option>
        <option value="sleepy drowsy">眠い (Sleepy)</option>
        <option value="laughing">大笑い (Laughing)</option>
        <option value="blushing shy">照れ (Blushing)</option>
        <option value="angry pouting">ぷんすか (Angry)</option>
        <option value="neutral calm">無表情 (Neutral)</option>
        <option value="sparkly eyes excited">キラキラ (Sparkly)</option>
        <option value="tongue out playful">あっかんべー (Playful)</option>
        <option value="crying">泣き (Crying)</option>
      </select>
    </div>
    <div class="field">
      <label for="headwear">帽子・ヘッドアクセ</label>
      <select id="headwear">
        <option value="">なし</option>
        <option value="wearing a baseball cap">キャップ (Cap)</option>
        <option value="wearing a knit beanie">ニット帽 (Beanie)</option>
        <option value="wearing a crown">王冠 (Crown)</option>
        <option value="wearing a witch hat">魔女帽 (Witch hat)</option>
        <option value="wearing cat ears headband">猫耳カチューシャ (Cat ears)</option>
        <option value="wearing a ribbon bow">リボン (Ribbon)</option>
        <option value="wearing headphones">ヘッドホン (Headphones)</option>
        <option value="wearing a flower wreath">花冠 (Flower wreath)</option>
        <option value="wearing a halo">天使の輪 (Halo)</option>
        <option value="wearing devil horns">悪魔の角 (Devil horns)</option>
        <option value="wearing a top hat">シルクハット (Top hat)</option>
      </select>
    </div>
    <div class="field">
      <label for="accessory">アクセサリー</label>
      <select id="accessory">
        <option value="">なし</option>
        <option value="wearing round glasses">丸メガネ (Round glasses)</option>
        <option value="wearing sunglasses">サングラス (Sunglasses)</option>
        <option value="wearing a scarf">マフラー (Scarf)</option>
        <option value="holding a star wand">星のステッキ (Star wand)</option>
        <option value="holding a coffee cup">コーヒーカップ (Coffee)</option>
        <option value="holding a heart">ハート (Heart)</option>
        <option value="holding a game controller">ゲームコントローラー (Controller)</option>
        <option value="holding a book">本 (Book)</option>
        <option value="holding a musical note">音符 (Musical note)</option>
        <option value="wearing a bowtie">蝶ネクタイ (Bowtie)</option>
        <option value="holding a paintbrush">絵筆 (Paintbrush)</option>
      </select>
    </div>
  </div>

  <!-- スタイル設定カード -->
  <div class="card">
    <p class="card-title">スタイル設定</p>
    <div class="field">
      <label for="bgColor">背景</label>
      <select id="bgColor">
        <option value="transparent background">透明 (Transparent)</option>
        <option value="solid pastel pink background">パステルピンク (Pastel pink)</option>
        <option value="solid pastel blue background">パステルブルー (Pastel blue)</option>
        <option value="solid pastel yellow background">パステルイエロー (Pastel yellow)</option>
        <option value="solid pastel green background">パステルグリーン (Pastel green)</option>
        <option value="solid pastel purple background">パステルパープル (Pastel purple)</option>
        <option value="gradient pink to orange background">ピンク→オレンジグラデ (Gradient)</option>
        <option value="gradient blue to purple background">ブルー→パープルグラデ (Gradient)</option>
        <option value="pixel art starry night sky background">星空 (Starry night)</option>
        <option value="pixel art rainbow background">虹色 (Rainbow)</option>
        <option value="pixel art heart pattern background">ハート柄 (Heart pattern)</option>
        <option value="solid white background">白 (White)</option>
        <option value="solid black background">黒 (Black)</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="vibrant colorful pixel art palette">ビビッド (Vibrant)</option>
        <option value="pastel soft pixel art palette" selected>パステル (Pastel)</option>
        <option value="NES palette, limited 8-bit colors">ファミコン風 (NES 8-bit)</option>
        <option value="SNES palette, 16-bit colors">スーファミ風 (SNES 16-bit)</option>
        <option value="Game Boy green monochrome palette">ゲームボーイ風 (GB Green)</option>
        <option value="warm cozy color palette">あったか系 (Warm)</option>
        <option value="cool ocean blue color palette">クール系 (Cool)</option>
        <option value="neon cyberpunk color palette">ネオン (Neon)</option>
      </select>
    </div>
    <div class="field">
      <label for="resolution">解像度</label>
      <select id="resolution">
        <option value="16x16">16x16（ミニ）</option>
        <option value="32x32" selected>32x32（標準）</option>
        <option value="64x64">64x64（高精細）</option>
        <option value="128x128">128x128（超高精細）</option>
      </select>
    </div>
    <div class="field">
      <label for="style">画風</label>
      <select id="style">
        <option value="cute chibi pixel art style" selected>かわいい系 (Cute chibi)</option>
        <option value="retro game pixel art style">レトロゲーム風 (Retro game)</option>
        <option value="modern indie pixel art style">モダンインディー風 (Modern indie)</option>
        <option value="kawaii Japanese pixel art style">カワイイ系 (Kawaii)</option>
        <option value="minimalist simple pixel art style">ミニマル (Minimalist)</option>
        <option value="bold pop art pixel style">ポップアート風 (Pop art)</option>
      </select>
    </div>
    <div class="field">
      <label for="shape">アイコン形状</label>
      <select id="shape">
        <option value="square icon composition">正方形 (Square)</option>
        <option value="circular icon composition, centered">丸型 (Circle)</option>
        <option value="rounded square icon composition">角丸 (Rounded square)</option>
      </select>
    </div>
    <div class="field">
      <label for="extras">追加要素（任意）</label>
      <input type="text" id="extras" placeholder="例: sparkles around, tiny wings, holding pizza">
      <p class="hint">英語で自由に追加要素を記入できます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="prompt-text"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">コピーする</button>
    <button class="btn-fav no-print" onclick="saveFav()">お気に入りに保存</button>
  </div>

  <!-- お気に入り一覧 -->
  <div class="card fav-section no-print" id="fav-card">
    <p class="card-title">お気に入りプロンプト</p>
    <div id="fav-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、画像生成AI（Stable Diffusion / Midjourney / DALL-E 等）で使えるSNSアイコン向けプロンプトの目安を生成します。生成結果はAIモデルにより異なる場合があります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'dot_icon_prompt_gen';
  var LS_FAV_KEY = 'dot_icon_prompt_favs';

  function saveSettings() {
    var ids = ['charType','expression','headwear','accessory','bgColor','palette','resolution','style','shape','extras'];
    var data = {};
    ids.forEach(function(id) { data[id] = document.getElementById(id).value; });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadSettings() {
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY));
      if (!data) return;
      Object.keys(data).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = data[id];
      });
    } catch(e) {}
  }

  function generate() {
    saveSettings();

    var charType = document.getElementById('charType').value;
    var expression = document.getElementById('expression').value;
    var headwear = document.getElementById('headwear').value;
    var accessory = document.getElementById('accessory').value;
    var bgColor = document.getElementById('bgColor').value;
    var palette = document.getElementById('palette').value;
    var resolution = document.getElementById('resolution').value;
    var style = document.getElementById('style').value;
    var shape = document.getElementById('shape').value;
    var extras = document.getElementById('extras').value.trim();

    var parts = [
      'pixel art',
      'SNS profile icon',
      resolution + ' sprite',
      'single ' + charType + ' character',
      expression + ' expression',
      'face and upper body portrait',
      style,
      palette,
      shape,
      bgColor
    ];

    if (headwear) parts.push(headwear);
    if (accessory) parts.push(accessory);
    if (extras) parts.push(extras);

    parts.push('clean pixel edges, no anti-aliasing, sharp pixels, centered composition, high quality');

    var prompt = parts.join(', ');

    document.getElementById('prompt-text').textContent = prompt;
    var rc = document.getElementById('result');
    rc.className = 'result-card show';
    rc.style.display = 'block';

    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーする';
    btn.className = 'btn-copy';
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied();
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーしました!';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = 'コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  // ── お気に入り機能 ──
  function getFavs() {
    try {
      return JSON.parse(localStorage.getItem(LS_FAV_KEY)) || [];
    } catch(e) { return []; }
  }

  function setFavs(favs) {
    try { localStorage.setItem(LS_FAV_KEY, JSON.stringify(favs)); } catch(e) {}
  }

  function saveFav() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    var favs = getFavs();
    if (favs.indexOf(text) !== -1) {
      alert('このプロンプトは既にお気に入りに保存済みです');
      return;
    }
    favs.unshift(text);
    if (favs.length > 20) favs = favs.slice(0, 20);
    setFavs(favs);
    renderFavs();
  }

  function deleteFav(index) {
    var favs = getFavs();
    favs.splice(index, 1);
    setFavs(favs);
    renderFavs();
  }

  function copyFav(index) {
    var favs = getFavs();
    var text = favs[index];
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました');
      }).catch(function() {
        fallbackCopyAlert(text);
      });
    } else {
      fallbackCopyAlert(text);
    }
  }

  function fallbackCopyAlert(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('コピーしました'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function renderFavs() {
    var favs = getFavs();
    var container = document.getElementById('fav-list');
    if (favs.length === 0) {
      container.innerHTML = '<p class="fav-empty">お気に入りはまだありません</p>';
      return;
    }
    container.innerHTML = favs.map(function(f, i) {
      return '<div class="fav-item">'
        + '<div>' + escHtml(f) + '</div>'
        + '<div class="fav-item-actions">'
        + '<button onclick="copyFav(' + i + ')">コピー</button>'
        + '<button class="btn-del" onclick="deleteFav(' + i + ')">削除</button>'
        + '</div></div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期化
