<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイムスリップ物価クイズ｜昭和・平成・令和の懐かしい価格を当てる</title>
  <meta name="description" content="昭和・平成・令和の懐かしい物価を思い出しながら、時代の変化を楽しく学べるクイズです。卵・パン・映画・ラーメンなど、身近な商品の過去の価格を当てるアプリ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズUI ── */
    .quiz-question { font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
    .quiz-period { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.6rem; }
    .choice-label {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.8rem; border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; transition: border-color 0.15s, background-color 0.15s;
      margin-bottom: 0.5rem;
    }
    .choice-label:last-child { margin-bottom: 0; }
    .choice-label input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .choice-label input[type="radio"]:checked { accent-color: var(--accent); }
    .choice-label input[type="radio"]:checked ~ .choice-text {
      color: var(--accent); font-weight: 700;
    }
    .choice-text { font-size: 0.9rem; color: var(--text); }
    .choice-label:has(input[type="radio"]:checked) {
      border-color: var(--accent); background: var(--accent-light);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── スコア表示 ── */
    .score-display {
      text-align: center; font-size: 0.9rem; color: var(--text-sub);
      margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }
    .score-current { font-size: 1.3rem; font-weight: 900; color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>📅 タイムスリップ物価クイズ</h1>
    <p class="subtitle">昭和・平成・令和の懐かしい物価を思い出しながら、時代の変化を楽しく学べるクイズです。</p>
  </header>

  <!-- スコア表示 -->
  <div class="card">
    <div class="score-display">
      正解数：<span class="score-current" id="sc">0</span> / <span id="qt">1</span>
    </div>
  </div>

  <!-- クイズカード -->
  <div class="card">
    <p class="card-title" id="prd">昭和</p>
    <p class="quiz-period" id="per"></p>
    <p class="quiz-question" id="q"></p>
    <div id="choices"></div>
  </div>

  <!-- 回答ボタン -->
  <button class="btn-calc" onclick="check()">✓ 回答する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="rl"></p>
    <p class="result-value" id="rv"></p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── クイズデータ（20問） ──
  var QUIZZES = [
    { period: '昭和50年代', year: '1970年代', q: '昭和50年代の卵（10個）の価格は？', ans: '250円', opts: ['150円', '250円', '350円'], exp: '昭和50年代は経済成長期。卵は250円程度でした。' },
    { period: '昭和60年代', year: '1980年代', q: '昭和60年代の食パン（1斤）の価格は？', ans: '180円', opts: ['120円', '180円', '240円'], exp: '昭和60年代、食パンは180円前後でした。' },
    { period: '平成初期', year: '1990年代', q: '平成初期のコーヒー（缶コーヒー）の価格は？', ans: '120円', opts: ['100円', '120円', '150円'], exp: '平成初期、缶コーヒーは120円が一般的でした。' },
    { period: '平成10年代', year: '1990年代後半', q: '平成11年のラーメン（1杯）の価格は？', ans: '750円', opts: ['600円', '750円', '900円'], exp: '平成11年、ラーメンは750円前後でした。' },
    { period: '平成15年前後', year: '2000年代初期', q: '平成15年の映画チケット（一般）の価格は？', ans: '1800円', opts: ['1500円', '1800円', '2000円'], exp: '平成15年、映画チケットは1800円でした。' },
    { period: '昭和60年代', year: '1980年代', q: '昭和60年代のガソリンの価格は？', ans: '100円/L', opts: ['80円/L', '100円/L', '130円/L'], exp: '昭和60年代、ガソリンは100円/L程度でした。' },
    { period: '平成初期', year: '1990年代', q: '平成初期の新聞（朝刊）の価格は？', ans: '3000円/月', opts: ['2500円/月', '3000円/月', '3500円/月'], exp: '平成初期、新聞の購読料は3000円/月でした。' },
    { period: '平成10年代', year: '1990年代後半', q: '平成12年の牛肉（100g）の価格は？', ans: '1200円', opts: ['1000円', '1200円', '1500円'], exp: '平成12年、牛肉は1200円/100g程度でした。' },
    { period: '昭和50年代', year: '1970年代', q: '昭和50年代の大学の学費（年間）は？', ans: '100万円', opts: ['80万円', '100万円', '120万円'], exp: '昭和50年代、私立大学の学費は100万円程度でした。' },
    { period: '平成20年代', year: '2000年代中盤', q: '平成20年代のスターバックスコーヒー（Tall）の価格は？', ans: '450円', opts: ['380円', '450円', '520円'], exp: '平成20年代、スターバックスのコーヒーは450円でした。' },
    { period: '昭和60年代', year: '1980年代', q: '昭和60年代の自動車（軽自動車）の価格は？', ans: '700万円', opts: ['600万円', '700万円', '800万円'], exp: '昭和60年代、軽自動車は700万円程度でした。' },
    { period: '平成初期', year: '1990年代', q: '平成初期の牛乳（1L）の価格は？', ans: '180円', opts: ['150円', '180円', '210円'], exp: '平成初期、牛乳は180円程度でした。' },
    { period: '平成10年代', year: '1990年代後半', q: '平成15年のハンバーガー（マック）の価格は？', ans: '150円', opts: ['130円', '150円', '170円'], exp: '平成15年、ハンバーガーは150円でした。' },
    { period: '平成20年代', year: '2000年代中盤', q: '平成20年代のiPod（第5世代）の価格は？', ans: '23000円', opts: ['18000円', '23000円', '28000円'], exp: '平成20年代、iPhoneが登場する前のiPodは23000円でした。' },
    { period: '昭和50年代', year: '1970年代', q: '昭和50年代のビール（500ml缶）の価格は？', ans: '180円', opts: ['150円', '180円', '210円'], exp: '昭和50年代、ビールは180円程度でした。' },
    { period: '平成初期', year: '1990年代', q: '平成初期のタクシー初乗運賃は？', ans: '1000円', opts: ['800円', '1000円', '1200円'], exp: '平成初期、タクシーの初乗運賃は1000円でした。' },
    { period: '平成10年代', year: '1990年代後半', q: '平成15年のコンビニおにぎりの価格は？', ans: '100円', opts: ['80円', '100円', '120円'], exp: '平成15年、コンビニおにぎりは100円が標準でした。' },
    { period: '昭和60年代', year: '1980年代', q: '昭和60年代の家賃（東京都内・1LDK相場）は？', ans: '8万円', opts: ['6万円', '8万円', '10万円'], exp: '昭和60年代、東京のワンルームは8万円程度でした。' },
    { period: '平成20年代', year: '2000年代中盤', q: '平成20年代のPS3の本体価格は？', ans: '59800円', opts: ['49800円', '59800円', '69800円'], exp: '平成20年代、PS3は59800円で発売されました。' },
    { period: '平成初期', year: '1990年代', q: '平成初期の携帯電話（ショルダー型）の価格は？', ans: '800万円', opts: ['600万円', '800万円', '1000万円'], exp: '平成初期、携帯電話は800万円程度でした。' }
  ];

  var currentQ = 0, score = 0, answered = false, quizzesUsed = [];

  function init() {
    currentQ = 0;
    score = 0;
    answered = false;
    quizzesUsed = [];
    loadHistory();
    nextQ();
  }

  function nextQ() {
    if (currentQ >= 20) {
      showFinal();
      return;
    }
    var q = QUIZZES[currentQ];
    var choices = [q.ans, ...q.opts].sort(() => Math.random() - 0.5);

    document.getElementById('prd').textContent = q.period;
    document.getElementById('per').textContent = '(' + q.year + ')';
    document.getElementById('q').textContent = q.q;
    document.getElementById('choices').innerHTML = choices.map((c, i) =>
      '<label class="choice-label"><input type="radio" name="ans" value="' + c + '"><span class="choice-text">' + c + '</span></label>'
    ).join('');
    document.getElementById('result').style.display = 'none';
    document.getElementById('qt').textContent = currentQ + 1;
    document.querySelector('.btn-calc').textContent = '✓ 回答する';
    answered = false;
  }

  function check() {
    if (answered) {
      currentQ++;
      nextQ();
      return;
    }
    var sel = document.querySelector('input[name="ans"]:checked');
    if (!sel) return alert('選択してください');

    answered = true;
    var q = QUIZZES[currentQ];
    var isCorrect = sel.value === q.ans;
    if (isCorrect) score++;

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + (isCorrect ? 'ok' : 'ng');
    rc.style.display = 'block';
    document.getElementById('rl').textContent = isCorrect ? '正解！' : '不正解';
    document.getElementById('rv').textContent = isCorrect ? '✓' : '✗';
    document.getElementById('re').textContent = '正しい価格：' + q.ans;
    document.getElementById('rn').textContent = q.exp;
    document.getElementById('sc').textContent = score;
    document.querySelector('.btn-calc').textContent = currentQ >= 19 ? '✓ 結果を見る' : '✓ 次へ';
  }

  function showFinal() {
    var rc = document.getElementById('result');
    var level = score >= 16 ? 'ok' : score >= 10 ? 'warn' : 'ng';
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rl').textContent = 'クイズ終了';
    document.getElementById('rv').textContent = score + ' / 20';
    document.getElementById('re').textContent = score >= 16 ? '時代の変化をよく知ってますね！' : score >= 10 ? 'まあまあですね！' : 'もっと昭和を思い出してみましょう';
    document.getElementById('rn').textContent = '懐かしい物価でしたね。時代とともに大きく変わってます。';
    document.querySelector('.btn-calc').textContent = '✓ もう一度';
    document.querySelector('.btn-calc').onclick = function() { init(); };

    saveHistory();
  }

  function loadHistory() {
    var h = JSON.parse(localStorage.getItem('quiz_history') || '[]');
    // 履歴データから何か処理したければここに
  }

  function saveHistory() {
    var h = JSON.parse(localStorage.getItem('quiz_history') || '[]');
    var today = new Date().toISOString().split('T')[0];
    h.unshift({ date: today, score: score });
    if (h.length > 50) h.pop();
    localStorage.setItem('quiz_history', JSON.stringify(h));
  }

  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
