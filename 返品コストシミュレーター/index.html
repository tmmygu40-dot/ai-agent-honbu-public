<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返品コストシミュレーター</title>
  <meta name="description" content="商品名・売上・原価・返品率・返品対応コストを入力するだけで、返品による損失額と実質利益への影響を即試算。複数商品を比較して利益圧迫の実態を数字で把握できるシミュレーターです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 商品行 ── */
    .product-row {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .product-row .row-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.75rem; letter-spacing: 0.04em;
    }
    .product-row .field { margin-bottom: 0.7rem; }
    .product-row .field:last-child { margin-bottom: 0; }
    .row-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 0.8rem;
    }
    .row-grid .field { margin-bottom: 0.7rem; }
    .btn-remove {
      position: absolute; top: 0.6rem; right: 0.7rem;
      background: none; border: none; color: var(--text-sub);
      font-size: 1.1rem; cursor: pointer; padding: 0.2rem 0.4rem;
      border-radius: 6px; transition: background 0.1s, color 0.1s;
    }
    .btn-remove:hover { background: var(--ng-bg); color: var(--ng); }
    .btn-add {
      display: block; width: 100%; padding: 0.65rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px dashed var(--accent); border-radius: 10px;
      cursor: pointer; margin-top: 0.2rem;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #ffe4b5; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .ng-row td:last-child { color: var(--ng); }

    /* ── 比較テーブル ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .compare-table th {
      background: var(--accent); color: #fff;
      padding: 0.5rem 0.4rem; text-align: center; font-weight: 700;
    }
    .compare-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); text-align: right; }
    .compare-table td:first-child { text-align: left; font-weight: 600; }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .best { color: var(--ok); font-weight: 800; }
    .compare-table .worst { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>返品コストシミュレーター</h1>
    <p class="subtitle">返品率・対応コストを入力するだけで実質利益への影響を即試算</p>
  </header>

  <!-- 商品入力カード -->
  <div class="card">
    <p class="card-title">商品入力（最大5件）</p>
    <div id="product-list">
      <!-- JS で初期行を挿入 -->
    </div>
    <button class="btn-add no-print" onclick="addRow()">＋ 商品を追加</button>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">全商品合計 実質利益</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">全商品合計 内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 商品比較カード -->
  <div class="card" id="compare-card" style="display:none">
    <p class="card-title">商品別 比較</p>
    <div style="overflow-x:auto">
      <table class="compare-table" id="compare-table"></table>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、経産省・中小企業庁の返品・流通コストに関する公開資料を参考に、目安として使いやすく整理しています。実際の数値はビジネス環境により異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var MAX_ROWS = 5;
  var rowCount = 0;

  function addRow() {
    var list = document.getElementById('product-list');
    if (list.children.length >= MAX_ROWS) {
      alert('最大 ' + MAX_ROWS + ' 商品まで追加できます');
      return;
    }
    rowCount++;
    var id = rowCount;
    var div = document.createElement('div');
    div.className = 'product-row';
    div.id = 'row-' + id;
    div.innerHTML =
      '<p class="row-title">商品 ' + id + '</p>' +
      (id > 1 ? '<button class="btn-remove no-print" onclick="removeRow(' + id + ')" title="削除">✕</button>' : '') +
      '<div class="field"><label>商品名</label><input type="text" id="name-' + id + '" placeholder="例: Tシャツ"></div>' +
      '<div class="row-grid">' +
        '<div class="field"><label>月間販売数（個）</label><input type="number" id="qty-' + id + '" placeholder="100" min="0"></div>' +
        '<div class="field"><label>販売単価（円）</label><input type="number" id="price-' + id + '" placeholder="3000" min="0"></div>' +
        '<div class="field"><label>原価（円/個）</label><input type="number" id="cost-' + id + '" placeholder="1500" min="0"></div>' +
        '<div class="field"><label>返品率（%）</label><input type="number" id="rate-' + id + '" placeholder="5" min="0" max="100" step="0.1"></div>' +
      '</div>' +
      '<div class="field"><label>返品1件あたり対応コスト（円）</label><input type="number" id="rcost-' + id + '" placeholder="500" min="0"><p class="hint">送料・検品・廃棄・手続き費用の合計目安</p></div>';
    list.appendChild(div);
    saveLocal();
  }

  function removeRow(id) {
    var el = document.getElementById('row-' + id);
    if (el) el.remove();
    saveLocal();
  }

  function getRows() {
    var rows = [];
    var list = document.getElementById('product-list');
    var divs = list.querySelectorAll('.product-row');
    for (var i = 0; i < divs.length; i++) {
      var d = divs[i];
      var rid = d.id.replace('row-', '');
      rows.push({
        name:  (document.getElementById('name-'  + rid) || {}).value || ('商品' + (i+1)),
        qty:   parseFloat((document.getElementById('qty-'   + rid) || {}).value) || 0,
        price: parseFloat((document.getElementById('price-' + rid) || {}).value) || 0,
        cost:  parseFloat((document.getElementById('cost-'  + rid) || {}).value) || 0,
        rate:  parseFloat((document.getElementById('rate-'  + rid) || {}).value) || 0,
        rcost: parseFloat((document.getElementById('rcost-' + rid) || {}).value) || 0
      });
    }
    return rows;
  }

  function calc() {
    var rows = getRows();
    if (rows.length === 0) { alert('商品を1件以上入力してください'); return; }

    var hasInput = rows.some(function(r){ return r.qty > 0 && r.price > 0; });
    if (!hasInput) { alert('販売数・販売単価を入力してください'); return; }

    var results = rows.map(function(r) {
      var sales       = r.qty * r.price;                      // 売上
      var cogs        = r.qty * r.cost;                       // 原価合計
      var returnQty   = r.qty * (r.rate / 100);               // 返品数
      var returnLoss  = returnQty * r.price;                  // 返品による売上減
      var returnCost  = returnQty * r.rcost;                  // 返品対応コスト
      var totalReturn = returnLoss + returnCost;              // 返品総損失
      var grossProfit = sales - cogs;                         // 粗利（返品前）
      var netProfit   = grossProfit - totalReturn;            // 実質利益
      var netMargin   = sales > 0 ? (netProfit / sales * 100) : 0;
      var returnImpact= sales > 0 ? (totalReturn / sales * 100) : 0;
      return { r: r, sales: sales, cogs: cogs, returnQty: returnQty,
               returnLoss: returnLoss, returnCost: returnCost,
               totalReturn: totalReturn, grossProfit: grossProfit,
               netProfit: netProfit, netMargin: netMargin, returnImpact: returnImpact };
    });

    var totSales       = sum(results, 'sales');
    var totCogs        = sum(results, 'cogs');
    var totReturnLoss  = sum(results, 'returnLoss');
    var totReturnCost  = sum(results, 'returnCost');
    var totTotalReturn = sum(results, 'totalReturn');
    var totGrossProfit = sum(results, 'grossProfit');
    var totNetProfit   = sum(results, 'netProfit');
    var totNetMargin   = totSales > 0 ? (totNetProfit / totSales * 100) : 0;
    var totReturnImpact= totSales > 0 ? (totTotalReturn / totSales * 100) : 0;

    var level = totNetProfit < 0 ? 'ng' : totNetMargin >= 15 ? 'ok' : 'warn';
    var eval_ = level === 'ok'
      ? '利益率 ' + totNetMargin.toFixed(1) + '% — 返品影響を吸収できています'
      : level === 'warn'
      ? '利益率 ' + totNetMargin.toFixed(1) + '% — 返品コストで利益が圧縮されています'
      : '赤字 — 返品コストが利益を上回っています。要見直し';
    var note = '返品による総損失 ' + fmt(totTotalReturn) + ' 円 / 月（売上比 ' + totReturnImpact.toFixed(1) + '%）';

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(totNetProfit) + ' 円';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    // 内訳
    var rows_ = [
      ['売上合計',          fmt(totSales)       + ' 円', false, false],
      ['原価合計',          fmt(totCogs)        + ' 円', false, false],
      ['粗利（返品前）',    fmt(totGrossProfit) + ' 円', false, false],
      ['返品による売上減',  '▲ ' + fmt(totReturnLoss)  + ' 円', false, true],
      ['返品対応コスト',    '▲ ' + fmt(totReturnCost)  + ' 円', false, true],
      ['返品総損失',        '▲ ' + fmt(totTotalReturn) + ' 円', false, true],
      ['実質利益',          fmt(totNetProfit)   + ' 円', true,  totNetProfit < 0],
      ['実質利益率',        totNetMargin.toFixed(1) + ' %', false, false],
    ];
    document.getElementById('db').innerHTML = rows_.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : r[3] ? ' class="ng-row"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';

    // 比較テーブル（商品が2件以上のとき）
    var compareCard = document.getElementById('compare-card');
    if (results.length >= 2) {
      var bestIdx  = results.reduce(function(bi,r,i){ return r.netMargin > results[bi].netMargin ? i : bi; }, 0);
      var worstIdx = results.reduce(function(wi,r,i){ return r.netMargin < results[wi].netMargin ? i : wi; }, 0);
      var thead = '<thead><tr><th>商品名</th><th>売上</th><th>返品損失</th><th>実質利益</th><th>実質利益率</th></tr></thead>';
      var tbody = '<tbody>' + results.map(function(r, i) {
        var isBest  = i === bestIdx;
        var isWorst = i === worstIdx;
        return '<tr>'
          + '<td>' + esc(r.r.name || ('商品' + (i+1))) + '</td>'
          + '<td>' + fmt(r.sales) + '</td>'
          + '<td class="' + (isWorst ? 'worst' : '') + '">▲' + fmt(r.totalReturn) + '</td>'
          + '<td class="' + (isBest ? 'best' : isWorst ? 'worst' : '') + '">' + fmt(r.netProfit) + '</td>'
          + '<td class="' + (isBest ? 'best' : isWorst ? 'worst' : '') + '">' + r.netMargin.toFixed(1) + '%</td>'
          + '</tr>';
      }).join('') + '</tbody>';
      document.getElementById('compare-table').innerHTML = thead + tbody;
      compareCard.style.display = 'block';
    } else {
      compareCard.style.display = 'none';
    }

    saveLocal();
  }

  function sum(arr, key) { return arr.reduce(function(s,r){ return s + r[key]; }, 0); }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── localStorage ──
  function saveLocal() {
    try {
      var list = document.getElementById('product-list');
      var divs = list.querySelectorAll('.product-row');
      var data = [];
      for (var i = 0; i < divs.length; i++) {
        var rid = divs[i].id.replace('row-', '');
        data.push({
          name:  (document.getElementById('name-'  + rid) || {}).value || '',
          qty:   (document.getElementById('qty-'   + rid) || {}).value || '',
          price: (document.getElementById('price-' + rid) || {}).value || '',
          cost:  (document.getElementById('cost-'  + rid) || {}).value || '',
          rate:  (document.getElementById('rate-'  + rid) || {}).value || '',
          rcost: (document.getElementById('rcost-' + rid) || {}).value || ''
        });
      }
      localStorage.setItem('henpinCost_v1', JSON.stringify(data));
    } catch(e) {}
  }

  function loadLocal() {
    try {
      var raw = localStorage.getItem('henpinCost_v1');
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!Array.isArray(data) || data.length === 0) return;
      data.forEach(function(d) {
        addRow();
        var list = document.getElementById('product-list');
        var divs = list.querySelectorAll('.product-row');
        var rid = divs[divs.length - 1].id.replace('row-', '');
        if (document.getElementById('name-'  + rid)) document.getElementById('name-'  + rid).value = d.name  || '';
        if (document.getElementById('qty-'   + rid)) document.getElementById('qty-'   + rid).value = d.qty   || '';
        if (document.getElementById('price-' + rid)) document.getElementById('price-' + rid).value = d.price || '';
        if (document.getElementById('cost-'  + rid)) document.getElementById('cost-'  + rid).value = d.cost  || '';
        if (document.getElementById('rate-'  + rid)) document.getElementById('rate-'  + rid).value = d.rate  || '';
        if (document.getElementById('rcost-' + rid)) document.getElementById('rcost-' + rid).value = d.rcost || '';
      });
    } catch(e) {}
  }

  // 入力変化を自動保存
  document.addEventListener('change', function(e){
    if (e.target.closest && e.target.closest('.product-row')) saveLocal();
  });

  // 初期化
  loadLocal();
  if (document.getElementById('product-list').children.length === 0) addRow();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
