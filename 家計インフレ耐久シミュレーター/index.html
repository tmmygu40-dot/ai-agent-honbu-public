<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計インフレ耐久シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 2列グリッド ── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .field-row .field { margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .detail-table thead tr { border-bottom: 2px solid var(--border); }
    .detail-table tbody tr { border-bottom: 1px solid var(--border); }
    .detail-table tbody tr:last-child { border-bottom: none; }
    .detail-table th { padding: 0.5rem 0.4rem; text-align: right; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); }
    .detail-table th:first-child { text-align: left; }
    .detail-table td { padding: 0.5rem 0.4rem; color: var(--text-sub); text-align: right; }
    .detail-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
    .detail-table tr.danger td { color: var(--ng); font-weight: 700; }
    .detail-table tr.danger td:first-child { color: var(--ng); }
    .detail-table tr.safe td { color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── 月次収支バー ── */
    .bar-wrap { margin-top: 0.75rem; }
    .bar-label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.2rem; display: flex; justify-content: space-between; }
    .bar-bg { background: var(--border); border-radius: 6px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }
    .bar-fill.ok   { background: var(--ok); }
    .bar-fill.warn { background: var(--warn); }
    .bar-fill.ng   { background: var(--ng); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>家計インフレ耐久シミュレーター</h1>
    <p class="subtitle">月収・固定費・変動費とインフレ率を入れて家計破綻時期を即予測</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">現在の家計（月額）</p>
    <div class="field-row">
      <div class="field">
        <label for="income">月収（手取り）</label>
        <input type="number" id="income" placeholder="例: 300000" min="0">
        <p class="hint">円／月</p>
      </div>
      <div class="field">
        <label for="fixed">固定費</label>
        <input type="number" id="fixed" placeholder="例: 120000" min="0">
        <p class="hint">家賃・保険など（円／月）</p>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="variable">変動費</label>
        <input type="number" id="variable" placeholder="例: 80000" min="0">
        <p class="hint">食費・光熱費など（円／月）</p>
      </div>
      <div class="field">
        <label for="savings">月の貯蓄額（任意）</label>
        <input type="number" id="savings" placeholder="例: 30000" min="0">
        <p class="hint">破綻猶予の計算に使用</p>
      </div>
    </div>
  </div>

  <!-- インフレ設定カード -->
  <div class="card">
    <p class="card-title">インフレ設定</p>
    <div class="field-row">
      <div class="field">
        <label for="inflate_fixed">固定費 上昇率（年）</label>
        <input type="number" id="inflate_fixed" value="2" step="0.1" min="0" max="30">
        <p class="hint">%</p>
      </div>
      <div class="field">
        <label for="inflate_var">変動費 上昇率（年）</label>
        <input type="number" id="inflate_var" value="3" step="0.1" min="0" max="30">
        <p class="hint">%</p>
      </div>
    </div>
    <div class="field">
      <label for="income_raise">月収 上昇率（年）</label>
      <input type="number" id="income_raise" value="0" step="0.1" min="0" max="30">
      <p class="hint">%（昇給がない場合は 0）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">破綻時期を診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">破綻時期の診断</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 年次推移カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">年次シミュレーション（30年分）</p>
    <div style="overflow-x:auto">
      <table class="detail-table">
        <thead>
          <tr>
            <th>年後</th>
            <th>月収</th>
            <th>固定費</th>
            <th>変動費</th>
            <th>支出計</th>
            <th>月次収支</th>
          </tr>
        </thead>
        <tbody id="db"></tbody>
      </table>
    </div>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ※ このシミュレーターは入力値をもとに機械的に計算した目安です。実際の家計は収入変動・臨時支出など多くの要素が絡みます。あくまで参考にご利用ください。
  </p>

  <button class="no-print" onclick="window.print()" style="display:block;margin:1.2rem auto 0;padding:0.6rem 1.2rem;font-size:0.85rem;font-weight:700;background:var(--card);color:var(--text-sub);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;max-width:600px;width:100%;">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  (function() {
    var KEYS = ['income','fixed','variable','savings','inflate_fixed','inflate_var','income_raise'];
    KEYS.forEach(function(k) {
      var el = document.getElementById(k);
      var saved = localStorage.getItem('infle_sim_' + k);
      if (saved !== null) el.value = saved;
      el.addEventListener('input', function() {
        localStorage.setItem('infle_sim_' + k, el.value);
      });
    });
  })();

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function calc() {
    var income   = parseFloat(document.getElementById('income').value);
    var fixed    = parseFloat(document.getElementById('fixed').value);
    var variable = parseFloat(document.getElementById('variable').value);
    var savings  = parseFloat(document.getElementById('savings').value) || 0;
    var ri = parseFloat(document.getElementById('inflate_fixed').value) / 100;
    var rv = parseFloat(document.getElementById('inflate_var').value) / 100;
    var rw = parseFloat(document.getElementById('income_raise').value) / 100;

    if (isNaN(income) || isNaN(fixed) || isNaN(variable)) {
      showResult('ng', '⚠️', '', '月収・固定費・変動費を入力してください');
      document.getElementById('detail').style.display = 'none';
      return;
    }
    if (income <= 0) {
      showResult('ng', '⚠️', '', '月収は1以上を入力してください');
      document.getElementById('detail').style.display = 'none';
      return;
    }

    var rows = [];
    var breakYear = -1;
    var accSavings = 0; // 累積貯蓄（月次収支の積み上げ）

    for (var y = 0; y <= 30; y++) {
      var inc = income  * Math.pow(1 + rw, y);
      var fix = fixed   * Math.pow(1 + ri, y);
      var vr  = variable * Math.pow(1 + rv, y);
      var exp = fix + vr;
      var diff = inc - exp;
      rows.push({ year: y, inc: inc, fix: fix, vr: vr, exp: exp, diff: diff });

      if (breakYear < 0 && diff < 0) {
        breakYear = y;
      }
    }

    // 結果
    var level, valText, evalText, noteText;
    if (breakYear < 0) {
      level = 'ok';
      valText = '30年以内は安全';
      evalText = 'インフレが続いても30年間は家計が維持できます';
      noteText = '※ 設定した上昇率が続く想定です。実際の推移と定期的に比較することをお勧めします。';
    } else if (breakYear === 0) {
      level = 'ng';
      valText = '現時点で赤字';
      evalText = '現在すでに支出が月収を超えています';
      noteText = '固定費・変動費を見直してください。';
    } else if (breakYear <= 5) {
      level = 'ng';
      valText = breakYear + '年後に破綻';
      evalText = 'インフレが続くと' + breakYear + '年後に月収が支出を下回ります';
      noteText = '早急に固定費の削減または収入アップが必要です。';
    } else if (breakYear <= 10) {
      level = 'warn';
      valText = breakYear + '年後に破綻';
      evalText = breakYear + '年後に家計が厳しくなります';
      noteText = '中期的に生活費の見直しや昇給・副収入を検討してください。';
    } else {
      level = 'warn';
      valText = breakYear + '年後に破綻';
      evalText = breakYear + '年後から家計が苦しくなります';
      noteText = '長期的な視点で資産形成・収入増加を検討しましょう。';
    }

    showResult(level, valText, evalText, noteText);

    // テーブル
    var tbody = document.getElementById('db');
    tbody.innerHTML = rows.map(function(r) {
      var danger = r.diff < 0;
      var cls = danger ? ' class="danger"' : '';
      return '<tr' + cls + '>'
        + '<td>' + (r.year === 0 ? '現在' : r.year + '年後') + '</td>'
        + '<td>' + fmt(r.inc) + '</td>'
        + '<td>' + fmt(r.fix) + '</td>'
        + '<td>' + fmt(r.vr) + '</td>'
        + '<td>' + fmt(r.exp) + '</td>'
        + '<td>' + (r.diff >= 0 ? '+' : '') + fmt(r.diff) + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showResult(level, val, ev, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = ev;
    document.getElementById('rn').textContent = note;
  }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
