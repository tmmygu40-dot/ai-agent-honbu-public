<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活カウントダウン生成器｜推しの誕生日まであと何日？</title>
  <meta name="description" content="推しの名前と誕生日を登録するだけで、誕生日まであと何日かを大きく表示する推し活カウントダウン生成器。複数推し対応・お祝いメッセージのランダム生成も可能です。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #fdf2f8;
      --card: #ffffff;
      --border: #f5d6e3;
      --accent: #e91e63;
      --accent-light: #fff0f6;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b3174d, 0 6px 16px rgba(233,30,99,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b3174d, 0 2px 8px rgba(233,30,99,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 推し一覧 ── */
    .oshi-list { list-style: none; }
    .oshi-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 0.4rem; border-bottom: 1px solid var(--border); gap: 0.6rem;
    }
    .oshi-item:last-child { border-bottom: none; }
    .oshi-info { flex: 1; min-width: 0; }
    .oshi-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .oshi-bday { font-size: 0.76rem; color: var(--text-sub); margin-top: 0.15rem; }
    .oshi-days {
      font-size: 1.4rem; font-weight: 900; color: var(--accent);
      letter-spacing: -0.02em; line-height: 1;
    }
    .oshi-days small { font-size: 0.7rem; font-weight: 700; color: var(--text-sub); margin-left: 0.2rem; }
    .oshi-today {
      font-size: 1.1rem; font-weight: 900; color: #fff;
      background: var(--accent); padding: 0.3rem 0.7rem; border-radius: 8px;
    }
    .btn-del {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      width: 32px; height: 32px; cursor: pointer; color: var(--text-sub);
      font-size: 1rem; flex-shrink: 0;
    }
    .btn-del:hover { border-color: var(--ng); color: var(--ng); }
    .empty-msg {
      text-align: center; color: var(--text-sub); font-size: 0.88rem;
      padding: 1.2rem 0; line-height: 1.6;
    }

    /* ── お祝いメッセージ ── */
    .msg-card {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .msg-text { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.6; margin-bottom: 0.8rem; white-space: pre-wrap; }
    .msg-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    .btn-mini {
      padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer;
    }
    .btn-mini:hover { background: var(--accent); color: #fff; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-del, .btn-mini { display: none !important; }
      .card, .msg-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>推し活カウントダウン生成器</h1>
    <p class="subtitle">推しの誕生日まで、あと何日？複数推し対応・データはこの端末に保存されます</p>
  </header>

  <!-- 推し追加カード -->
  <div class="card">
    <p class="card-title">推しを追加</p>
    <div class="field">
      <label for="oshi-name">推しの名前</label>
      <input type="text" id="oshi-name" placeholder="例: 〇〇くん / 〇〇ちゃん" maxlength="30">
    </div>
    <div class="field">
      <label>誕生日</label>
      <div class="row2">
        <select id="oshi-month">
          <option value="">月を選ぶ</option>
        </select>
        <select id="oshi-day">
          <option value="">日を選ぶ</option>
        </select>
      </div>
      <p class="hint">年は使いません。毎年の誕生日までの日数を表示します。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="addOshi()">推しを追加する</button>

  <!-- 推し一覧 -->
  <div class="card">
    <p class="card-title">推し一覧</p>
    <ul class="oshi-list" id="oshi-list"></ul>
    <p class="empty-msg" id="empty-msg" style="display:none">まだ推しが登録されていません。<br>上のフォームから追加してね💖</p>
  </div>

  <!-- お祝いメッセージ -->
  <div class="card" id="msg-section" style="display:none">
    <p class="card-title">お祝いメッセージを生成</p>
    <div class="field">
      <label for="msg-target">対象の推しを選ぶ</label>
      <select id="msg-target"></select>
    </div>
    <button class="btn-mini" style="width:100%;padding:0.7rem;font-size:0.9rem" onclick="genMsg()">お祝いメッセージを作る</button>
  </div>

  <div class="msg-card" id="msg-card" style="display:none">
    <p class="msg-text" id="msg-text"></p>
    <div class="msg-actions">
      <button class="btn-mini" onclick="genMsgAgain()">別のパターン</button>
      <button class="btn-mini" onclick="copyMsg()">コピー</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🌸 このツールは入力データをこの端末の localStorage にのみ保存します。サーバーには送信しません。誕生日の年は使わず、毎年の月日のみ参照します。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi_countdown_list';
  var lastMsgTarget = null;

  // 月・日のセレクトを埋める
  (function initSelects(){
    var m = document.getElementById('oshi-month');
    for (var i=1; i<=12; i++) {
      var o = document.createElement('option');
      o.value = i; o.textContent = i + '月';
      m.appendChild(o);
    }
    var d = document.getElementById('oshi-day');
    for (var j=1; j<=31; j++) {
      var o2 = document.createElement('option');
      o2.value = j; o2.textContent = j + '日';
      d.appendChild(o2);
    }
  })();

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
  }
  function save(list) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch(e) {}
  }

  function daysUntil(month, day) {
    var today = new Date();
    today.setHours(0,0,0,0);
    var year = today.getFullYear();
    var target = new Date(year, month-1, day);
    target.setHours(0,0,0,0);
    if (target < today) {
      target = new Date(year+1, month-1, day);
      target.setHours(0,0,0,0);
    }
    var diff = Math.round((target - today) / 86400000);
    return diff;
  }

  function addOshi() {
    var name = (document.getElementById('oshi-name').value || '').trim();
    var month = parseInt(document.getElementById('oshi-month').value, 10);
    var day = parseInt(document.getElementById('oshi-day').value, 10);
    if (!name) { alert('推しの名前を入力してください'); return; }
    if (isNaN(month) || isNaN(day)) { alert('誕生日を選んでください'); return; }
    // 月日妥当性チェック（うるう年は2/29も許可）
    var test = new Date(2024, month-1, day);
    if (test.getMonth() !== month-1 || test.getDate() !== day) {
      alert('その月日は存在しません'); return;
    }
    var list = load();
    list.push({ name: name, month: month, day: day, addedAt: Date.now() });
    save(list);
    document.getElementById('oshi-name').value = '';
    document.getElementById('oshi-month').value = '';
    document.getElementById('oshi-day').value = '';
    render();
  }

  function delOshi(idx) {
    var list = load();
    if (idx < 0 || idx >= list.length) return;
    if (!confirm(list[idx].name + ' を削除しますか？')) return;
    list.splice(idx, 1);
    save(list);
    render();
  }

  function render() {
    var list = load();
    var ul = document.getElementById('oshi-list');
    var empty = document.getElementById('empty-msg');
    ul.innerHTML = '';
    if (list.length === 0) {
      empty.style.display = 'block';
      document.getElementById('msg-section').style.display = 'none';
      document.getElementById('msg-card').style.display = 'none';
      return;
    }
    empty.style.display = 'none';

    list.forEach(function(o, i){
      var d = daysUntil(o.month, o.day);
      var li = document.createElement('li');
      li.className = 'oshi-item';
      var info = document.createElement('div');
      info.className = 'oshi-info';
      var nm = document.createElement('div');
      nm.className = 'oshi-name';
      nm.textContent = o.name;
      var bd = document.createElement('div');
      bd.className = 'oshi-bday';
      bd.textContent = o.month + '月' + o.day + '日生まれ';
      info.appendChild(nm); info.appendChild(bd);

      var daysEl = document.createElement('div');
      if (d === 0) {
        daysEl.className = 'oshi-today';
        daysEl.textContent = '🎉 今日！';
      } else {
        daysEl.className = 'oshi-days';
        daysEl.innerHTML = d + '<small>日</small>';
      }

      var del = document.createElement('button');
      del.className = 'btn-del';
      del.type = 'button';
      del.textContent = '×';
      del.setAttribute('aria-label', '削除');
      del.onclick = function(){ delOshi(i); };

      li.appendChild(info);
      li.appendChild(daysEl);
      li.appendChild(del);
      ul.appendChild(li);
    });

    // メッセージ生成セクション
    var sec = document.getElementById('msg-section');
    var sel = document.getElementById('msg-target');
    sec.style.display = 'block';
    var prev = sel.value;
    sel.innerHTML = '';
    list.forEach(function(o, i){
      var op = document.createElement('option');
      op.value = i;
      op.textContent = o.name + '（' + o.month + '/' + o.day + '）';
      sel.appendChild(op);
    });
    if (prev !== '' && parseInt(prev,10) < list.length) sel.value = prev;
  }

  // ── お祝いメッセージ生成 ──
  var MSG_TEMPLATES = [
    '{name}、お誕生日おめでとう！\nあなたが幸せでありますように。これからもずっと推させてね🌸',
    '{name}！誕生日まであと{days}日✨\nこの日を一緒に迎えられるの、本当に嬉しいよ。',
    '{name}、生まれてきてくれてありがとう。\n{days}日後の特別な日が、世界一の笑顔で満ちますように💖',
    '{day_phrase}🎂\n{name}の幸せがどこまでも続きますように。今日もあなたを推せて幸せです。',
    '{name}🌟\n{day_phrase}、何もできない私だけど、いつも応援してます。最高の1年を！',
    '{day_phrase}！\n{name}が笑ってくれるなら、それだけで世界がキラキラ✨ おめでとう！',
    '{name}へ。\n{day_phrase}、あなたの夢が叶いますように。私はずっと隣で応援してます。',
    'Happy Birthday, {name}! 🎉\n{day_phrase}、この日を迎えられたことに感謝。これからもよろしくね。'
  ];

  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  function buildMsg(idx) {
    var list = load();
    var o = list[idx]; if (!o) return '';
    var d = daysUntil(o.month, o.day);
    var dayPhrase = d === 0 ? 'ついに迎えた誕生日' : 'あと' + d + '日で誕生日';
    var t = pick(MSG_TEMPLATES);
    return t.replace(/\{name\}/g, o.name)
            .replace(/\{days\}/g, d)
            .replace(/\{day_phrase\}/g, dayPhrase);
  }

  function genMsg() {
    var sel = document.getElementById('msg-target');
    var idx = parseInt(sel.value, 10);
    if (isNaN(idx)) { alert('推しを選んでください'); return; }
    lastMsgTarget = idx;
    var msg = buildMsg(idx);
    document.getElementById('msg-text').textContent = msg;
    document.getElementById('msg-card').style.display = 'block';
  }
  function genMsgAgain() {
    if (lastMsgTarget === null) { genMsg(); return; }
    var msg = buildMsg(lastMsgTarget);
    document.getElementById('msg-text').textContent = msg;
  }
  function copyMsg() {
    var t = document.getElementById('msg-text').textContent;
    if (!t) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(function(){ alert('コピーしました'); }, function(){ fallbackCopy(t); });
    } else {
      fallbackCopy(t);
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); alert('コピーしました'); } catch(e) { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }

  render();
  </script>
