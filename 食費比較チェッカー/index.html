<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食費比較チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #2a9d8f;
      --accent-light: #edfaf8;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 2カラム比較レイアウト ── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .compare-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
    }
    .compare-card.delivery { border-top: 3px solid #e07b00; }
    .compare-card.homemade { border-top: 3px solid #2a9d8f; }
    .compare-title {
      font-size: 0.8rem; font-weight: 800;
      margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .compare-card.delivery .compare-title { color: #e07b00; }
    .compare-card.homemade .compare-title { color: #2a9d8f; }

    /* ── 入力 ── */
    .field { margin-bottom: 0.75rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.25rem; }
    .field input, .field select {
      width: 100%; padding: 0.6rem 0.75rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }
    .field .subtotal {
      font-size: 0.78rem; font-weight: 700;
      text-align: right; color: var(--accent); margin-top: 0.3rem;
    }

    /* 月利用回数カード */
    .times-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      max-width: 600px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .times-label { font-size: 0.85rem; font-weight: 700; flex: 1; }
    .times-card input {
      width: 90px; padding: 0.55rem 0.7rem;
      font-size: 1rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); text-align: center;
      outline: none;
    }
    .times-card input:focus { border-color: var(--accent); background: #fff; }
    .times-unit { font-size: 0.85rem; color: var(--text-sub); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #1a7168, 0 6px 16px rgba(42,157,143,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1a7168, 0 2px 8px rgba(42,157,143,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .section-head td {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); padding-top: 0.8rem;
    }

    /* ── 履歴 ── */
    .history-list { list-style: none; }
    .history-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.83rem;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-meta { color: var(--text-sub); font-size: 0.75rem; }
    .history-val  { font-weight: 700; color: var(--ok); }
    .history-val.negative { color: var(--ng); }
    .history-empty { font-size: 0.83rem; color: var(--text-sub); text-align: center; padding: 0.5rem 0; }
    .btn-clear {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.6rem;
      font-size: 0.82rem; font-weight: 700; color: var(--text-sub);
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 400px) {
      .compare-grid { grid-template-columns: 1fr; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>食費比較チェッカー</h1>
    <p class="subtitle">デリバリー vs 自炊｜1食コストと節約額を即計算</p>
  </header>

  <!-- コスト入力 2カラム -->
  <div class="compare-grid">
    <!-- デリバリー -->
    <div class="compare-card delivery">
      <p class="compare-title">🛵 デリバリー</p>
      <div class="field">
        <label for="d_item">商品代（円）</label>
        <input type="number" id="d_item" placeholder="例: 800" min="0" oninput="updateSub()">
      </div>
      <div class="field">
        <label for="d_ship">配送料（円）</label>
        <input type="number" id="d_ship" placeholder="例: 300" min="0" value="300" oninput="updateSub()">
      </div>
      <div class="field">
        <label for="d_fee">サービス手数料（円）</label>
        <input type="number" id="d_fee" placeholder="例: 100" min="0" value="100" oninput="updateSub()">
      </div>
      <p class="subtotal" id="d_sub">1食コスト：— 円</p>
    </div>

    <!-- 自炊 -->
    <div class="compare-card homemade">
      <p class="compare-title">🍳 自炊</p>
      <div class="field">
        <label for="h_food">食材費（円）</label>
        <input type="number" id="h_food" placeholder="例: 200" min="0" oninput="updateSub()">
      </div>
      <div class="field">
        <label for="h_util">光熱費（円）</label>
        <input type="number" id="h_util" placeholder="例: 50" min="0" value="50" oninput="updateSub()">
      </div>
      <div class="field">
        <label for="h_other">その他（円）</label>
        <input type="number" id="h_other" placeholder="例: 0" min="0" value="0" oninput="updateSub()">
      </div>
      <p class="subtotal" id="h_sub">1食コスト：— 円</p>
    </div>
  </div>

  <!-- 月の利用回数 -->
  <div class="times-card">
    <p class="times-label">月の食事回数（比較対象）</p>
    <input type="number" id="times" value="30" min="1" max="365">
    <span class="times-unit">回／月</span>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">節約額を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">1食あたりの節約額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 履歴カード -->
  <div class="card">
    <p class="card-title">計算履歴</p>
    <ul class="history-list" id="histList"></ul>
  </div>
  <button class="btn-clear" onclick="clearHist()">履歴をクリア</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STOR_KEY = 'shokuhi_hist';

  function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }

  function updateSub() {
    var dCost = getVal('d_item') + getVal('d_ship') + getVal('d_fee');
    var hCost = getVal('h_food') + getVal('h_util') + getVal('h_other');
    document.getElementById('d_sub').textContent = '1食コスト：' + fmt(dCost) + ' 円';
    document.getElementById('h_sub').textContent = '1食コスト：' + fmt(hCost) + ' 円';
  }

  function calc() {
    var dItem = getVal('d_item');
    var dShip = getVal('d_ship');
    var dFee  = getVal('d_fee');
    var hFood = getVal('h_food');
    var hUtil = getVal('h_util');
    var hOther = getVal('h_other');
    var times = parseInt(document.getElementById('times').value) || 30;

    if (dItem === 0 && hFood === 0) {
      showErr('商品代または食材費を入力してください');
      return;
    }

    var dCost    = dItem + dShip + dFee;
    var hCost    = hFood + hUtil + hOther;
    var savePer  = dCost - hCost;
    var saveMonth = savePer * times;
    var saveYear  = saveMonth * 12;

    var level, mainMsg, subMsg;
    if (savePer > 0) {
      level   = 'ok';
      mainMsg = fmt(savePer) + ' 円／食';
      subMsg  = '自炊の方が安い！月' + fmt(saveMonth) + '円、年間' + fmt(saveYear) + '円の節約になります';
    } else if (savePer < 0) {
      level   = 'ng';
      mainMsg = fmt(Math.abs(savePer)) + ' 円／食';
      subMsg  = 'デリバリーの方が安い結果です。月' + fmt(Math.abs(saveMonth)) + '円、年間' + fmt(Math.abs(saveYear)) + '円の差があります';
    } else {
      level   = 'warn';
      mainMsg = '差なし（0円）';
      subMsg  = 'デリバリーと自炊のコストは同じです';
    }

    showResult(level, mainMsg, subMsg);
    showDetail([
      ['section', 'デリバリー'],
      ['商品代', fmt(dItem) + ' 円'],
      ['配送料', fmt(dShip) + ' 円'],
      ['手数料', fmt(dFee) + ' 円'],
      ['hl', 'デリバリー1食コスト', fmt(dCost) + ' 円'],
      ['section', '自炊'],
      ['食材費', fmt(hFood) + ' 円'],
      ['光熱費', fmt(hUtil) + ' 円'],
      ['その他', fmt(hOther) + ' 円'],
      ['hl', '自炊1食コスト', fmt(hCost) + ' 円'],
      ['section', '節約効果（月' + times + '回）'],
      ['1食の差額', fmt(Math.abs(savePer)) + ' 円'],
      ['hl', '月間節約額', fmt(Math.abs(saveMonth)) + ' 円'],
      ['hl', '年間節約額', fmt(Math.abs(saveYear)) + ' 円'],
    ]);

    // 履歴保存
    saveHist(dCost, hCost, savePer, times);
    renderHist();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    var html = '';
    rows.forEach(function(r) {
      if (r[0] === 'section') {
        html += '<tr class="section-head"><td colspan="2">' + r[1] + '</td></tr>';
      } else if (r[0] === 'hl') {
        html += '<tr class="hl"><td>' + r[1] + '</td><td>' + r[2] + '</td></tr>';
      } else {
        html += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
      }
    });
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  /* ── 履歴 ── */
  function saveHist(dCost, hCost, savePer, times) {
    var hist = loadHist();
    hist.unshift({
      date: new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}),
      dCost: dCost,
      hCost: hCost,
      savePer: savePer,
      times: times
    });
    if (hist.length > 10) hist = hist.slice(0, 10);
    localStorage.setItem(STOR_KEY, JSON.stringify(hist));
  }

  function loadHist() {
    try { return JSON.parse(localStorage.getItem(STOR_KEY)) || []; }
    catch(e) { return []; }
  }

  function renderHist() {
    var hist = loadHist();
    var list = document.getElementById('histList');
    if (!hist.length) {
      list.innerHTML = '<li><p class="history-empty">まだ計算履歴がありません</p></li>';
      return;
    }
    list.innerHTML = hist.map(function(h) {
      var cls = h.savePer >= 0 ? 'history-val' : 'history-val negative';
      var sign = h.savePer >= 0 ? '節約 ' : '割高 ';
      return '<li>'
        + '<span class="history-meta">' + h.date + '｜デ' + fmt(h.dCost) + '円 / 炊' + fmt(h.hCost) + '円</span>'
        + '<span class="' + cls + '">' + sign + fmt(Math.abs(h.savePer)) + '円/食</span>'
        + '</li>';
    }).join('');
  }

  function clearHist() {
    localStorage.removeItem(STOR_KEY);
    renderHist();
  }

  /* ── 初期化 ── */
  updateSub();
  renderHist();

  /* 入力変更でリアルタイム小計更新 */
  ['d_item','d_ship','d_fee','h_food','h_util','h_other'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', updateSub);
  });
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
