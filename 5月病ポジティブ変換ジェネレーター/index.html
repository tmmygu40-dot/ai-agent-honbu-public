<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GW明けのモヤモヤや憂鬱な気持ちを入力すると、爆笑ポジティブコメントに変換。5月病の気分を笑い飛ばせるお手軽ジェネレーターです。">
  <title>5月病ポジティブ変換ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
      resize: vertical; min-height: 100px; font-family: inherit;
    }
    .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.3; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.6rem; }

    /* ── 変換前テキスト表示 ── */
    .original-text {
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
      padding: 0.6rem 0.8rem; background: var(--bg); border-radius: 8px;
      margin-bottom: 0.8rem; text-align: left;
    }
    .original-text span { font-weight: 600; color: var(--text); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-before { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .history-after { font-size: 0.95rem; font-weight: 700; color: var(--ok); line-height: 1.4; }
    .history-time { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }
    .btn-clear {
      display: block; margin: 0.8rem auto 0; padding: 0.5rem 1rem;
      font-size: 0.8rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer;
    }
    .btn-clear:hover { border-color: var(--ng); color: var(--ng); }
    .history-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>🌀 5月病ポジティブ変換ジェネレーター</h1>
    <p class="subtitle">GW明けのモヤモヤを入力するだけで、笑える前向きコメントに即変換！</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたのモヤモヤを教えて</p>
    <div class="field">
      <label for="moyamoya">今のモヤモヤ・憂鬱な気持ち</label>
      <textarea id="moyamoya" placeholder="例: 会社行きたくない…もう連休が終わるなんて信じたくない"></textarea>
      <p class="hint">何でもOK！正直な気持ちをそのまま書いてね</p>
    </div>
    <div class="field">
      <label for="tone">変換テイスト</label>
      <select id="tone">
        <option value="random">おまかせ（ランダム）</option>
        <option value="ceo">やり手社長風</option>
        <option value="anime">熱血アニメ風</option>
        <option value="grandma">おばあちゃん風</option>
        <option value="poet">ポエマー風</option>
        <option value="gyaru">ギャル風</option>
      </select>
    </div>
  </div>

  <!-- 変換ボタン -->
  <button class="btn-calc" onclick="convert()">ポジティブ変換する！</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">ポジティブ変換結果</p>
    <div class="original-text" id="original"></div>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card">
    <p class="card-title">変換履歴</p>
    <div id="history-list">
      <p class="history-empty">まだ変換していません</p>
    </div>
    <button class="btn-clear no-print" id="btn-clear" style="display:none" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 変換パターン定義 ──
  var PATTERNS = {
    ceo: [
      function(t){ return '「' + t + '」…それは成功者の通過儀礼だ。おめでとう、君は今まさに成長している。'; },
      function(t){ return '「' + t + '」と感じている君。その感性こそが次のイノベーションの種だ。私の会社に来ないか？'; },
      function(t){ return 'いいかい？「' + t + '」というのはね、まだ本気を出していない証拠なんだ。つまり伸びしろしかない。'; },
      function(t){ return '「' + t + '」…私もかつてそうだった。そこから年商10億になった。つまり君も年商10億の素質がある。'; },
      function(t){ return '「' + t + '」──これを言語化できる時点で、君はトップ1%の人材だ。自信を持ちたまえ。'; },
    ],
    anime: [
      function(t){ return '「' + t + '」だと…！？ バカな…！ お前の真の力はまだ覚醒していないだけだ！立て！！'; },
      function(t){ return '「' + t + '」…そう言ってた仲間を何人も見てきた。でもな、お前にはまだ仲間がいる！！'; },
      function(t){ return '「' + t + '」…フッ、俺も同じことを思っていたさ。だが今日の俺は…昨日までの俺じゃねぇ！'; },
      function(t){ return '「' + t + '」ってお前…それ、主人公が覚醒する直前のセリフじゃん！！フラグ立ってるぞ！！'; },
      function(t){ return '「' + t + '」…それがお前の限界か？ 違うだろ！お前の戦いはこれからだ！次回もお楽しみに！'; },
    ],
    grandma: [
      function(t){ return '「' + t + '」って言うけどねぇ、おばあちゃんなんか毎日それよ。でも今日もご飯は美味しいわよ〜'; },
      function(t){ return 'あらあら「' + t + '」なんて。大丈夫よ、あんたはよくやってるわ。はい、飴ちゃん🍬'; },
      function(t){ return '「' + t + '」かい？ おばあちゃんの時代はもっとひどかったわよ。でもね、なんとかなるもんよ〜'; },
      function(t){ return '「' + t + '」ねぇ…。まぁいいじゃない、今日生きてるだけで100点よ。お茶でも飲みなさい🍵'; },
      function(t){ return '「' + t + '」って？ あんた昔からそうやって悩んでは乗り越えてきたでしょ。大丈夫大丈夫。'; },
    ],
    poet: [
      function(t){ return '「' + t + '」──それは心の雨。でも雨上がりの虹は、濡れた者にしか見えない。'; },
      function(t){ return '「' + t + '」…その痛みは、魂が脱皮しようとしている音。新しい自分が生まれる前夜。'; },
      function(t){ return '朝露のように儚い「' + t + '」という想い。だが花はいつも朝露の中で咲くのだ。'; },
      function(t){ return '「' + t + '」──冬を知らぬ花に、春の喜びは分からない。君は今、春を待つ蕾なのだ。'; },
      function(t){ return '誰もが「' + t + '」と呟く夜がある。しかしその夜が深いほど、明けの明星は美しく輝く。'; },
    ],
    gyaru: [
      function(t){ return '「' + t + '」ってまじ〜？ てかそれウケるんだけど！ てかむしろ推せる！がんばれ〜💖'; },
      function(t){ return 'え〜「' + t + '」とかちょー分かる〜！ でもぶっちゃけ寝たら治るし！タピろ🧋'; },
      function(t){ return '「' + t + '」？ やば〜それ逆にエモくない？ ストーリーに載せよ？映えるって！📸'; },
      function(t){ return '「' + t + '」とか言ってるけどさ〜、あんた普通にがんばってるから！まじリスペクト〜✨'; },
      function(t){ return 'ちょっと〜「' + t + '」なんて言わないでよ〜！ あたしが推すからさ！一緒にプリ撮ろ！📷'; },
    ]
  };

  var TONES = ['ceo', 'anime', 'grandma', 'poet', 'gyaru'];
  var TONE_NAMES = { ceo: 'やり手社長', anime: '熱血アニメ', grandma: 'おばあちゃん', poet: 'ポエマー', gyaru: 'ギャル' };
  var HISTORY_KEY = 'may_positive_history';

  function convert() {
    var text = document.getElementById('moyamoya').value.trim();
    if (!text) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ng';
      rc.style.display = 'block';
      document.getElementById('original').innerHTML = '';
      document.getElementById('rv').textContent = '⚠️';
      document.getElementById('rn').textContent = 'モヤモヤを入力してください！';
      return;
    }

    var toneSelect = document.getElementById('tone').value;
    var tone = toneSelect === 'random' ? TONES[Math.floor(Math.random() * TONES.length)] : toneSelect;
    var patterns = PATTERNS[tone];
    var fn = patterns[Math.floor(Math.random() * patterns.length)];
    var result = fn(text);

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('original').innerHTML = '<span>あなたのモヤモヤ：</span> ' + escHtml(text);
    document.getElementById('rv').textContent = '✨ ' + TONE_NAMES[tone] + '風 ✨';
    document.getElementById('rn').textContent = result;

    saveHistory(text, result, tone);
    renderHistory();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── localStorage 履歴 ──
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveHistory(before, after, tone) {
    var h = getHistory();
    h.unshift({ before: before, after: after, tone: tone, time: new Date().toLocaleString('ja-JP') });
    if (h.length > 20) h = h.slice(0, 20);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  }
  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }
  function renderHistory() {
    var h = getHistory();
    var el = document.getElementById('history-list');
    var btn = document.getElementById('btn-clear');
    if (h.length === 0) {
      el.innerHTML = '<p class="history-empty">まだ変換していません</p>';
      btn.style.display = 'none';
      return;
    }
    btn.style.display = 'block';
    el.innerHTML = h.map(function(item) {
      return '<div class="history-item">'
        + '<p class="history-before">😞 ' + escHtml(item.before) + '</p>'
        + '<p class="history-after">😆 ' + escHtml(item.after) + '</p>'
        + '<p class="history-time">' + escHtml(item.time) + ' / ' + TONE_NAMES[item.tone] + '風</p>'
        + '</div>';
    }).join('');
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
