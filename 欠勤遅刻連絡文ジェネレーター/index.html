<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欠勤遅刻連絡文ジェネレーター｜上司・チームへの当日連絡を3パターン即生成</title>
  <meta name="description" content="欠勤・遅刻・早退の理由と連絡相手を選ぶだけで、フォーマル/標準/カジュアル丁寧の3パターンの連絡文を即生成。コピーしてLINEやメールにそのまま貼れます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .pattern-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .pattern-label {
      font-size: 0.72rem; font-weight: 800;
      color: #fff; background: var(--accent);
      padding: 0.28rem 0.6rem; border-radius: 6px;
      display: inline-block; margin-bottom: 0.7rem;
      letter-spacing: 0.04em;
    }
    .pattern-text {
      white-space: pre-wrap;
      font-size: 0.94rem;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      border-radius: 9px;
      padding: 0.85rem 0.95rem;
      border: 1px solid var(--border);
    }
    .btn-copy {
      display: block; width: 100%;
      margin-top: 0.7rem; padding: 0.65rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    #result-area { display: none; }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0; padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.76rem; color: var(--text-sub);
      line-height: 1.6; text-align: left;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>欠勤遅刻連絡文ジェネレーター</h1>
    <p class="subtitle">理由と相手を選ぶだけ。3パターンの連絡文を即生成 → コピーしてLINE/メールに貼るだけ。</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="kind">種別</label>
      <select id="kind">
        <option value="absent">本日 欠勤する</option>
        <option value="late">遅刻する</option>
        <option value="leave-early">早退する</option>
      </select>
    </div>
    <div class="field" id="late-time-field" style="display:none">
      <label for="late-time">遅刻の到着予定</label>
      <select id="late-time">
        <option value="30分ほど">30分ほど</option>
        <option value="1時間ほど">1時間ほど</option>
        <option value="午前中いっぱい">午前中いっぱい</option>
        <option value="午後から">午後から</option>
        <option value="未定">未定</option>
      </select>
    </div>
    <div class="field">
      <label for="reason">理由</label>
      <select id="reason">
        <option value="fever">発熱・体調不良</option>
        <option value="stomach">腹痛・胃腸の不調</option>
        <option value="headache">頭痛・偏頭痛</option>
        <option value="cold">風邪の症状</option>
        <option value="family">家族の体調不良</option>
        <option value="child">子どもの看護</option>
        <option value="hospital">通院・検査</option>
        <option value="train">電車遅延</option>
        <option value="private">私用</option>
        <option value="other">その他（自由入力）</option>
      </select>
    </div>
    <div class="field" id="other-field" style="display:none">
      <label for="other-reason">理由を入力</label>
      <input type="text" id="other-reason" placeholder="例：歯科の急な予約">
    </div>
    <div class="field">
      <label for="audience">連絡相手</label>
      <select id="audience">
        <option value="boss">上司（直属）</option>
        <option value="senior">先輩</option>
        <option value="team">チーム宛（複数）</option>
      </select>
    </div>
    <div class="field">
      <label for="name">自分の名前（任意）</label>
      <input type="text" id="name" placeholder="例：山田">
      <p class="hint">空欄なら「[自分の名前]」のまま出ます。あとで置換してもOK。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="result-area">
    <div class="pattern-card">
      <span class="pattern-label">フォーマル（メール向け）</span>
      <div class="pattern-text" id="p1"></div>
      <button class="btn-copy" onclick="copyText('p1', this)">📋 この文をコピー</button>
    </div>
    <div class="pattern-card">
      <span class="pattern-label">標準（チャット/LINE向け）</span>
      <div class="pattern-text" id="p2"></div>
      <button class="btn-copy" onclick="copyText('p2', this)">📋 この文をコピー</button>
    </div>
    <div class="pattern-card">
      <span class="pattern-label">カジュアル丁寧（先輩・親しい上司）</span>
      <div class="pattern-text" id="p3"></div>
      <button class="btn-copy" onclick="copyText('p3', this)">📋 この文をコピー</button>
    </div>
  </div>

  <p class="source-note">
    📚 このツールは個人利用向けの文例ジェネレーターです。職場の慣習や就業規則によって望ましい連絡方法が異なる場合があるため、社内ルールに合わせて文面を調整してご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'kekkin-chikoku-generator-v1';

  var REASON_LABELS = {
    fever:    { formal: '発熱があり', polite: '熱が出てしまい',     casual: '熱が出てしまって' },
    stomach:  { formal: '腹痛のため', polite: 'お腹の調子が悪く',   casual: 'お腹の調子が悪くて' },
    headache: { formal: '頭痛のため', polite: '頭痛がひどく',       casual: '頭痛がひどくて' },
    cold:     { formal: '風邪の症状があり', polite: '風邪気味のため', casual: '風邪っぽくて' },
    family:   { formal: '家族の体調不良のため', polite: '家族の体調が悪く', casual: '家族の体調が悪くて' },
    child:    { formal: '子の看護のため', polite: '子どもの看病が必要で', casual: '子どもの看病で' },
    hospital: { formal: '通院のため', polite: '病院へ行くため', casual: '病院に行く必要があり' },
    train:    { formal: '電車遅延のため', polite: '電車が遅延しており', casual: '電車が遅れていて' },
    private:  { formal: '私用のため', polite: '私用のため', casual: '私用で' },
    other:    { formal: '', polite: '', casual: '' }
  };

  function init() {
    document.getElementById('kind').addEventListener('change', onKindChange);
    document.getElementById('reason').addEventListener('change', onReasonChange);
    onKindChange(); onReasonChange();
    restore();
  }

  function onKindChange() {
    var v = document.getElementById('kind').value;
    document.getElementById('late-time-field').style.display = (v === 'late') ? 'block' : 'none';
  }
  function onReasonChange() {
    var v = document.getElementById('reason').value;
    document.getElementById('other-field').style.display = (v === 'other') ? 'block' : 'none';
  }

  function getReasonText(tone) {
    var key = document.getElementById('reason').value;
    if (key === 'other') {
      var t = document.getElementById('other-reason').value.trim() || '体調不良';
      if (tone === 'formal') return t + 'のため';
      if (tone === 'polite') return t + 'のため';
      return t + 'で';
    }
    return REASON_LABELS[key][tone];
  }

  function getKindWord(kind, tone) {
    if (kind === 'absent') {
      if (tone === 'formal') return '本日お休みをいただきたく';
      if (tone === 'polite') return '本日お休みさせていただきたく';
      return '今日お休みさせてください';
    }
    if (kind === 'late') {
      var t = document.getElementById('late-time').value;
      if (tone === 'formal') return t + '遅れての出社となります';
      if (tone === 'polite') return t + '遅れて出社いたします';
      return t + '遅れて行きます';
    }
    if (kind === 'leave-early') {
      if (tone === 'formal') return '本日は早退させていただきたく';
      if (tone === 'polite') return '早退させていただきたく';
      return '早退させてください';
    }
    return '';
  }

  function getGreeting(audience, tone) {
    if (tone === 'formal') {
      return audience === 'team' ? 'お疲れさまです。' : 'お疲れさまです。';
    }
    if (tone === 'polite') {
      return 'おはようございます。';
    }
    return 'おはようございます。';
  }

  function generate() {
    var kind = document.getElementById('kind').value;
    var audience = document.getElementById('audience').value;
    var name = document.getElementById('name').value.trim() || '[自分の名前]';

    save();

    // Pattern 1: Formal (mail)
    var r1 = getReasonText('formal');
    var k1 = getKindWord(kind, 'formal');
    var p1 = 'お疲れさまです。' + name + 'です。\n\n' +
             r1 + '、' + k1 + 'ご連絡いたしました。\n' +
             (kind === 'absent'
                ? '本日中の業務は明日以降のリカバリーで対応いたします。'
                : kind === 'late'
                  ? '到着次第、業務に取り掛からせていただきます。'
                  : '本日分の引き継ぎは別途ご相談させてください。') + '\n' +
             'ご迷惑をおかけし申し訳ございませんが、何卒よろしくお願いいたします。';

    // Pattern 2: Standard (chat/LINE)
    var r2 = getReasonText('polite');
    var k2 = getKindWord(kind, 'polite');
    var p2 = 'おはようございます、' + name + 'です。\n' +
             r2 + '、' + k2 + 'ご連絡しました。\n' +
             (kind === 'absent'
                ? 'ご迷惑をおかけしますが、本日はお休みをいただきます。'
                : kind === 'late'
                  ? '出社次第、すぐ業務に入ります。'
                  : '途中までの分は引き継ぎを残しておきます。') + '\n' +
             'よろしくお願いいたします。';

    // Pattern 3: Casual polite (senior / friendly boss)
    var r3 = getReasonText('casual');
    var k3 = getKindWord(kind, 'casual');
    var p3 = 'おはようございます、' + name + 'です。\n' +
             r3 + '、' + k3 + '。\n' +
             (kind === 'absent'
                ? '急ですみません、今日はお休みさせていただきます。'
                : kind === 'late'
                  ? 'バタバタしていて申し訳ないです…。'
                  : '途中で抜けるかたちですみません。') + '\n' +
             'よろしくお願いします！';

    // Audience adjustments for team
    if (audience === 'team') {
      p1 = p1.replace('お疲れさまです。', '皆さまお疲れさまです。');
      p2 = p2.replace('おはようございます、', 'チームの皆さま、おはようございます。\n');
    }

    document.getElementById('p1').textContent = p1;
    document.getElementById('p2').textContent = p2;
    document.getElementById('p3').textContent = p3;
    document.getElementById('result-area').style.display = 'block';
  }

  function copyText(id, btn) {
    var text = document.getElementById(id).textContent;
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function save() {
    try {
      var data = {
        kind: document.getElementById('kind').value,
        lateTime: document.getElementById('late-time').value,
        reason: document.getElementById('reason').value,
        otherReason: document.getElementById('other-reason').value,
        audience: document.getElementById('audience').value,
        name: document.getElementById('name').value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.kind) document.getElementById('kind').value = d.kind;
      if (d.lateTime) document.getElementById('late-time').value = d.lateTime;
      if (d.reason) document.getElementById('reason').value = d.reason;
      if (d.otherReason) document.getElementById('other-reason').value = d.otherReason;
      if (d.audience) document.getElementById('audience').value = d.audience;
      if (d.name) document.getElementById('name').value = d.name;
      onKindChange(); onReasonChange();
    } catch(e) {}
  }

  init();
  </script>
