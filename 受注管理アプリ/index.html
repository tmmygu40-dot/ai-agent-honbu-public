<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受注管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>受注管理アプリ</h1>

    <!-- サマリーカード -->
    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">総件数</div>
        <div class="summary-value" id="totalCount">0</div>
      </div>
      <div class="summary-card accent-green">
        <div class="summary-label">成約率</div>
        <div class="summary-value" id="winRate">0%</div>
      </div>
      <div class="summary-card accent-blue">
        <div class="summary-label">売上見込み</div>
        <div class="summary-value" id="expectedRevenue">¥0</div>
      </div>
      <div class="summary-card accent-orange">
        <div class="summary-label">成約金額</div>
        <div class="summary-value" id="wonRevenue">¥0</div>
      </div>
    </div>

    <!-- 入力フォーム -->
    <div class="form-section">
      <h2>新規登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="client">送付先 <span class="required">*</span></label>
          <input type="text" id="client" placeholder="例：株式会社〇〇">
        </div>
        <div class="form-group">
          <label for="amount">金額（円） <span class="required">*</span></label>
          <input type="number" id="amount" placeholder="例：500000" min="0">
        </div>
        <div class="form-group">
          <label for="status">結果</label>
          <select id="status">
            <option value="未決">未決</option>
            <option value="成約">成約</option>
            <option value="失注">失注</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">送付日</label>
          <input type="date" id="date">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="備考など">
        </div>
      </div>
      <button class="btn-primary" onclick="addEntry()">登録する</button>
    </div>

    <!-- フィルター -->
    <div class="filter-section">
      <label>絞り込み：</label>
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('未決', this)">未決</button>
      <button class="filter-btn" onclick="setFilter('成約', this)">成約</button>
      <button class="filter-btn" onclick="setFilter('失注', this)">失注</button>
    </div>

    <!-- 一覧 -->
    <div class="list-section">
      <h2>案件一覧</h2>
      <div id="entryList"></div>
      <p id="emptyMessage" class="empty-message">案件がまだ登録されていません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
