<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト表ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 700px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* スタッフ追加 */
    .add-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .add-row input {
      flex: 1; padding: 0.65rem 0.8rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none;
    }
    .add-row input:focus { border-color: var(--accent); background: #fff; }
    .btn-add {
      padding: 0.65rem 1rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      white-space: nowrap;
    }
    .btn-add:active { opacity: 0.8; }

    /* スタッフリスト */
    .staff-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .staff-row {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--bg); border-radius: 10px; padding: 0.6rem 0.8rem;
      flex-wrap: wrap;
    }
    .staff-name {
      font-size: 0.9rem; font-weight: 700; min-width: 5rem;
      flex-shrink: 0;
    }
    .day-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; flex: 1; }
    .day-btn {
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%; border: 1.5px solid var(--border);
      background: var(--card); font-size: 0.78rem; font-weight: 700;
      cursor: pointer; position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center; line-height: 1;
    }
    .day-btn span.day-label { font-size: 0.68rem; color: var(--text-sub); }
    .day-btn span.day-mark  { font-size: 0.82rem; }
    .day-btn.want  { background: #d1fae5; border-color: var(--ok);   }
    .day-btn.maybe { background: #fef9c3; border-color: var(--warn); }
    .day-btn.no    { background: #fee2e2; border-color: var(--ng);   }
    .btn-remove {
      margin-left: auto; font-size: 0.8rem; color: var(--ng);
      background: none; border: none; cursor: pointer; flex-shrink: 0;
      padding: 0.2rem 0.4rem;
    }

    /* 必要人数 */
    .req-row {
      display: flex; align-items: center; gap: 0.5rem;
      flex-wrap: wrap;
    }
    .req-item { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .req-item label { font-size: 0.72rem; color: var(--text-sub); font-weight: 600; }
    .req-item input {
      width: 3rem; text-align: center;
      padding: 0.45rem; font-size: 0.95rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg); outline: none;
    }
    .req-item input:focus { border-color: var(--accent); background: #fff; }

    /* 生成ボタン */
    .btn-calc {
      display: block; width: 100%; max-width: 700px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* シフト表 */
    .shift-table-wrap { overflow-x: auto; }
    .shift-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.85rem; min-width: 400px;
    }
    .shift-table th {
      background: var(--accent); color: #fff;
      padding: 0.5rem 0.4rem; text-align: center;
      font-size: 0.8rem;
    }
    .shift-table td {
      border: 1px solid var(--border);
      padding: 0.45rem 0.5rem; text-align: center;
    }
    .shift-table td.name-cell {
      text-align: left; font-weight: 600;
      background: var(--bg);
    }
    .mark-want  { color: var(--ok);   font-weight: 700; }
    .mark-maybe { color: var(--warn); font-weight: 700; }
    .mark-no    { color: var(--ng);   font-weight: 700; }
    .req-row-result td {
      font-weight: 700; font-size: 0.82rem;
    }
    .req-ok   { color: var(--ok); }
    .req-warn { color: var(--warn); }
    .req-ng   { color: var(--ng); }

    .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.8rem; font-size: 0.78rem; color: var(--text-sub); }
    .legend span { display: flex; align-items: center; gap: 0.3rem; }

    .result-msg {
      padding: 0.6rem 0.8rem; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; margin-bottom: 0.8rem;
      background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok);
    }
    .result-msg.warn { background: var(--warn-bg); color: var(--warn); border-color: var(--warn); }

    #result-card { display: none; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .empty-hint { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 0.8rem 0; }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>シフト表ジェネレーター</h1>
    <p class="subtitle">スタッフの希望と必要人数を入力して週間シフト表を即生成</p>
  </header>

  <!-- スタッフ入力カード -->
  <div class="card">
    <p class="card-title">スタッフ登録</p>
    <div class="add-row">
      <input type="text" id="staff-name-input" placeholder="スタッフ名を入力" maxlength="20">
      <button class="btn-add" onclick="addStaff()">追加</button>
    </div>
    <div id="staff-list" class="staff-list">
      <p class="empty-hint" id="empty-hint">スタッフを追加してください</p>
    </div>
  </div>

  <!-- 必要人数カード -->
  <div class="card">
    <p class="card-title">曜日別・必要人数</p>
    <div class="req-row">
      <div class="req-item"><label>月</label><input type="number" id="req-0" value="2" min="0" max="99"></div>
      <div class="req-item"><label>火</label><input type="number" id="req-1" value="2" min="0" max="99"></div>
      <div class="req-item"><label>水</label><input type="number" id="req-2" value="2" min="0" max="99"></div>
      <div class="req-item"><label>木</label><input type="number" id="req-3" value="2" min="0" max="99"></div>
      <div class="req-item"><label>金</label><input type="number" id="req-4" value="2" min="0" max="99"></div>
      <div class="req-item"><label>土</label><input type="number" id="req-5" value="1" min="0" max="99"></div>
      <div class="req-item"><label>日</label><input type="number" id="req-6" value="1" min="0" max="99"></div>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">シフト表を生成する</button>

  <!-- 結果カード -->
  <div class="card" id="result-card">
    <p class="card-title">週間シフト表</p>
    <div id="result-msg" class="result-msg"></div>
    <div class="shift-table-wrap">
      <table class="shift-table" id="shift-table"></table>
    </div>
    <div class="legend">
      <span><span class="mark-want">○</span>出勤希望</span>
      <span><span class="mark-maybe">△</span>可能</span>
      <span><span class="mark-no">×</span>不可</span>
      <span>— 未設定</span>
    </div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>

  <script>
  var DAYS = ['月','火','水','木','金','土','日'];
  var MARKS = ['○','△','×'];
  var STATES = ['want','maybe','no'];
  var staff = []; // [{name, days:[0~3]}, ...] 0=未設定 1=希望 2=可 3=不可

  function saveData() {
    try { localStorage.setItem('shift-gen-v1', JSON.stringify({staff: staff, req: getReq()})); } catch(e) {}
  }

  function loadData() {
    try {
      var d = JSON.parse(localStorage.getItem('shift-gen-v1') || 'null');
      if (!d) return;
      staff = d.staff || [];
      if (d.req) d.req.forEach(function(v,i){ var el=document.getElementById('req-'+i); if(el) el.value=v; });
      renderStaff();
    } catch(e) {}
  }

  function getReq() {
    return DAYS.map(function(_,i){ return parseInt(document.getElementById('req-'+i).value)||0; });
  }

  function addStaff() {
    var inp = document.getElementById('staff-name-input');
    var name = inp.value.trim();
    if (!name) return;
    if (staff.some(function(s){ return s.name === name; })) { alert('同名のスタッフが既に存在します'); return; }
    staff.push({ name: name, days: [0,0,0,0,0,0,0] });
    inp.value = '';
    renderStaff();
    saveData();
  }

  function removeStaff(idx) {
    staff.splice(idx, 1);
    renderStaff();
    saveData();
  }

  function toggleDay(staffIdx, dayIdx) {
    var cur = staff[staffIdx].days[dayIdx];
    staff[staffIdx].days[dayIdx] = (cur + 1) % 4; // 0→1→2→3→0
    renderStaff();
    saveData();
  }

  function renderStaff() {
    var list = document.getElementById('staff-list');
    var hint = document.getElementById('empty-hint');
    if (staff.length === 0) {
      list.innerHTML = '';
      list.appendChild(hint);
      hint.style.display = '';
      return;
    }
    hint.style.display = 'none';
    var html = staff.map(function(s, si) {
      var dayBtns = DAYS.map(function(d, di) {
        var state = s.days[di]; // 0=未,1=○,2=△,3=×
        var cls = state === 0 ? '' : STATES[state-1];
        var mark = state === 0 ? '—' : MARKS[state-1];
        var markCls = state === 0 ? '' : (state===1?' mark-want':state===2?' mark-maybe':' mark-no');
        return '<button class="day-btn ' + cls + '" onclick="toggleDay(' + si + ',' + di + ')" title="' + d + '曜">'
             + '<span class="day-label">' + d + '</span>'
             + '<span class="day-mark' + markCls + '">' + mark + '</span>'
             + '</button>';
      }).join('');
      return '<div class="staff-row">'
           + '<span class="staff-name">' + esc(s.name) + '</span>'
           + '<div class="day-btns">' + dayBtns + '</div>'
           + '<button class="btn-remove" onclick="removeStaff(' + si + ')" title="削除">✕</button>'
           + '</div>';
    }).join('');
    list.innerHTML = html;
    list.appendChild(document.getElementById('empty-hint'));
  }

  function generate() {
    if (staff.length === 0) { alert('スタッフを登録してください'); return; }
    var req = getReq();
    saveData();

    // ヘッダー行
    var thead = '<thead><tr><th>スタッフ</th>' + DAYS.map(function(d){ return '<th>' + d + '</th>'; }).join('') + '</tr></thead>';

    // スタッフ行
    var tbodyRows = staff.map(function(s) {
      var cells = DAYS.map(function(_,di) {
        var st = s.days[di];
        if (st === 0) return '<td>—</td>';
        var cls = st===1?'mark-want':st===2?'mark-maybe':'mark-no';
        return '<td class="' + cls + '">' + MARKS[st-1] + '</td>';
      }).join('');
      return '<tr><td class="name-cell">' + esc(s.name) + '</td>' + cells + '</tr>';
    }).join('');

    // 集計行（希望者数 vs 必要人数）
    var warnings = [];
    var reqRow = '<tr class="req-row-result"><td class="name-cell">必要/希望</td>';
    DAYS.forEach(function(d, di) {
      var want = staff.filter(function(s){ return s.days[di] === 1; }).length;
      var maybe = staff.filter(function(s){ return s.days[di] === 2; }).length;
      var avail = want + maybe;
      var r = req[di];
      var cls = avail >= r ? 'req-ok' : (avail > 0 ? 'req-warn' : 'req-ng');
      if (avail < r) warnings.push(d + '曜（必要' + r + '人/希望' + avail + '人）');
      reqRow += '<td class="' + cls + '">' + r + '/' + avail + '</td>';
    });
    reqRow += '</tr>';

    var tbody = '<tbody>' + tbodyRows + reqRow + '</tbody>';
    document.getElementById('shift-table').innerHTML = thead + tbody;

    var msgEl = document.getElementById('result-msg');
    if (warnings.length === 0) {
      msgEl.className = 'result-msg';
      msgEl.textContent = '全曜日で必要人数を満たしています。';
    } else {
      msgEl.className = 'result-msg warn';
      msgEl.textContent = '人手不足の曜日があります：' + warnings.join('、');
    }
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('result-card').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('staff-name-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') addStaff();
  });

  // 必要人数変更でも自動保存
  DAYS.forEach(function(_,i){
    document.getElementById('req-'+i).addEventListener('change', saveData);
  });

  loadData();
  </script>

</body>
</html>
