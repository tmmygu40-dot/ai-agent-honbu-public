<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カスタマーサポート対応逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* カテゴリ・状況グリッド */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    .btn-cat, .btn-sit {
      padding: 0.65rem 0.5rem;
      font-size: 0.88rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cat:hover, .btn-sit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-cat.active, .btn-sit.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* 結果エリア */
    .result-area {
      display: none;
    }

    .script-box {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .script-label {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .reply-box {
      background: var(--ok-bg);
      border: 1.5px solid var(--ok);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      color: var(--text);
    }

    .btn-copy {
      display: block; width: 100%;
      margin-top: 0.75rem; padding: 0.65rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1c1917; color: #fff; font-size: 0.85rem; font-weight: 600;
      padding: 0.6rem 1.4rem; border-radius: 99px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print, .btn-pdf, .btn-copy { display: none !important; }
      .card, .result-area { box-shadow: none; border: 1px solid #ccc; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
</head>

  // ── 状態 ──
  var selCat = null;
  var selSit = null;

  // ── 初期化 ──
  function init() {
    var catGrid = document.getElementById('catGrid');
    CATEGORIES.forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'btn-cat';
      btn.textContent = cat;
      btn.onclick = function() { selectCat(cat); };
      catGrid.appendChild(btn);
    });

    var sitGrid = document.getElementById('sitGrid');
    SITUATIONS.forEach(function(sit) {
      var btn = document.createElement('button');
      btn.className = 'btn-sit';
      btn.textContent = sit;
      btn.onclick = function() { selectSit(sit); };
      sitGrid.appendChild(btn);
    });

    // localStorage 復元
    var saved = getSaved();
    if (saved.cat && DATA[saved.cat]) {
      selectCat(saved.cat);
      if (saved.sit) {
        selectSit(saved.sit);
      }
    }
  }

  function selectCat(cat) {
    selCat = cat;
    selSit = null;

    // カテゴリボタン更新
    document.querySelectorAll('.btn-cat').forEach(function(b) {
      b.className = 'btn-cat' + (b.textContent === cat ? ' active' : '');
    });

    // 状況パネル表示
    document.getElementById('sitCard').style.display = 'block';
    document.querySelectorAll('.btn-sit').forEach(function(b) {
      b.className = 'btn-sit';
    });

    // 結果を隠す
    document.getElementById('resultCard').style.display = 'none';

    save(cat, null);
  }

  function selectSit(sit) {
    if (!selCat) return;
    selSit = sit;

    document.querySelectorAll('.btn-sit').forEach(function(b) {
      b.className = 'btn-sit' + (b.textContent === sit ? ' active' : '');
    });

    var d = DATA[selCat] && DATA[selCat][sit];
    if (!d) return;

    document.getElementById('scriptBox').textContent = d.script;
    document.getElementById('replyBox').textContent = d.reply;

    var rc = document.getElementById('resultCard');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

    save(selCat, sit);
  }

  function copyText(id) {
    var text = document.getElementById(id).textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(showToast);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    }
  }

  function showToast() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 1800);
  }

  function save(cat, sit) {
    try { localStorage.setItem('cs_support_cat', cat || ''); } catch(e){}
    try { localStorage.setItem('cs_support_sit', sit || ''); } catch(e){}
  }

  function getSaved() {
    try {
      return {
        cat: localStorage.getItem('cs_support_cat') || '',
        sit: localStorage.getItem('cs_support_sit') || ''
      };
    } catch(e) { return { cat: '', sit: '' }; }
  }

  init();
  </script>
