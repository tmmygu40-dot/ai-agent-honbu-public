<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>献立管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>🍽️ 献立管理</h1>
    <div class="header-actions">
      <button id="prevWeek">◀</button>
      <span id="weekLabel"></span>
      <button id="nextWeek">▶</button>
      <button id="todayBtn">今週</button>
    </div>
  </header>

  <main>
    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" data-tab="calendar">📅 献立カレンダー</button>
      <button class="tab" data-tab="shopping">🛒 買い物リスト</button>
    </div>

    <!-- カレンダータブ -->
    <section id="tab-calendar" class="tab-content active">
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <!-- 買い物リストタブ -->
    <section id="tab-shopping" class="tab-content">
      <div class="shopping-header">
        <h2>買い物リスト</h2>
        <button id="clearChecked">チェック済みを削除</button>
        <button id="resetShoppingBtn">リセット</button>
      </div>
      <div id="shoppingList" class="shopping-list"></div>
      <div class="add-item">
        <input type="text" id="newItem" placeholder="食材を手動追加...">
        <button id="addItemBtn">追加</button>
      </div>
    </section>
  </main>

  <!-- 献立入力モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <label>料理名</label>
        <input type="text" id="mealName" placeholder="例：野菜炒め">
        <label>食材（カンマ区切り）</label>
        <textarea id="mealIngredients" placeholder="例：豚肉, キャベツ, 人参, 醤油"></textarea>
        <label>メモ</label>
        <input type="text" id="mealMemo" placeholder="例：冷蔵庫の残り物で">
      </div>
      <div class="modal-footer">
        <button id="saveMeal" class="btn-primary">保存</button>
        <button id="deleteMeal" class="btn-danger">削除</button>
        <button id="cancelModal">キャンセル</button>
      </div>
    </div>
  </div>
  <div id="overlay" class="hidden"></div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
