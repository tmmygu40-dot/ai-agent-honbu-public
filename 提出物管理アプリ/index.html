<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提出物管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>📋 提出物管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="subject">科目</label>
        <input type="text" id="subject" placeholder="例：数学" maxlength="30">
      </div>
      <div class="form-group">
        <label for="title">提出物・宿題名</label>
        <input type="text" id="title" placeholder="例：プリント3枚" maxlength="60">
      </div>
      <div class="form-group">
        <label for="deadline">締め切り日</label>
        <input type="date" id="deadline">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <button class="filter-btn active" data-filter="pending">未提出</button>
      <button class="filter-btn" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="done">提出済み</button>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="itemList"></div>
      <p id="emptyMsg" class="empty-msg">登録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
