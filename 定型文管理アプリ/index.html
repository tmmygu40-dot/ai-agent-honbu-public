<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定型文管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>定型文管理</h1>

    <div class="form-section">
      <input type="text" id="titleInput" placeholder="タイトル（例：お礼メール冒頭）" maxlength="50">
      <textarea id="textInput" placeholder="定型文の本文を入力..." rows="4"></textarea>
      <select id="categorySelect">
        <option value="">カテゴリ（任意）</option>
        <option value="メール">メール</option>
        <option value="チャット">チャット</option>
        <option value="挨拶">挨拶</option>
        <option value="お礼">お礼</option>
        <option value="その他">その他</option>
      </select>
      <button id="addBtn" class="btn-primary">追加する</button>
    </div>

    <div class="filter-section">
      <input type="text" id="searchInput" placeholder="検索...">
      <select id="filterCategory">
        <option value="">すべて</option>
        <option value="メール">メール</option>
        <option value="チャット">チャット</option>
        <option value="挨拶">挨拶</option>
        <option value="お礼">お礼</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div id="itemList" class="item-list"></div>

    <div id="emptyMsg" class="empty-msg" style="display:none;">
      定型文がまだありません。上のフォームから追加してください。
    </div>
  </div>

  <div id="toast" class="toast">コピーしました！</div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
