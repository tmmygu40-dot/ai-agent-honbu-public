<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム対応手順逆引きアプリ</title>
  <meta name="description" content="クレームのトラブル種別と状況を選ぶだけで、対応の優先手順と注意点をすぐ表示。品質不良・納期遅延・対応不備など6種類×初回・再発・エスカレーション対応をカバー。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── 手順リスト ── */
    .step-list { list-style: none; padding: 0; }
    .step-list li {
      display: flex; gap: 0.85rem; align-items: flex-start;
      padding: 0.75rem 0; border-bottom: 1px solid var(--border);
    }
    .step-list li:last-child { border-bottom: none; }
    .step-num {
      flex-shrink: 0; width: 28px; height: 28px;
      background: var(--accent); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 800;
    }
    .step-text { font-size: 0.92rem; line-height: 1.6; padding-top: 0.2rem; }

    /* ── 注意点リスト ── */
    .note-list { list-style: none; padding: 0; }
    .note-list li {
      display: flex; gap: 0.6rem; align-items: flex-start;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.5; color: var(--text-sub);
    }
    .note-list li:last-child { border-bottom: none; }
    .note-list li::before { content: "⚠️"; flex-shrink: 0; margin-top: 0.05rem; }

    /* ── 禁止カード ── */
    .ng-card {
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: var(--radius); padding: 1rem 1.2rem; margin: 0 auto 1rem; max-width: 600px;
    }
    .ng-card .card-title { color: var(--ng); border-color: #fca5a5; }
    .ng-list { list-style: none; padding: 0; }
    .ng-list li {
      display: flex; gap: 0.6rem; align-items: flex-start;
      padding: 0.5rem 0; border-bottom: 1px solid #fca5a5;
      font-size: 0.88rem; line-height: 1.5; color: var(--ng);
    }
    .ng-list li:last-child { border-bottom: none; }
    .ng-list li::before { content: "✕"; flex-shrink: 0; font-weight: 800; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .ng-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>クレーム対応手順 逆引きアプリ</h1>
    <p class="subtitle">種別と状況を選ぶだけ。対応手順と注意点を即表示</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">選択</p>
    <div class="field">
      <label for="claimType">クレームの種類</label>
      <select id="claimType">
        <option value="quality">品質不良・不具合</option>
        <option value="delay">納期遅延・配送遅延</option>
        <option value="response">対応不備・接客マナー</option>
        <option value="billing">誤請求・請求ミス</option>
        <option value="delivery">配送ミス・誤配</option>
        <option value="other">その他・複合</option>
      </select>
    </div>
    <div class="field">
      <label for="situation">現在の状況</label>
      <select id="situation">
        <option value="first">初回連絡（初めてのクレーム）</option>
        <option value="repeat">再発・二次クレーム</option>
        <option value="escalation">上位対応・法的示唆あり</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="lookup()">対応手順を確認する</button>

  <!-- 手順カード -->
  <div class="card" id="stepsCard" style="display:none">
    <p class="card-title" id="stepsTitle">優先対応手順</p>
    <ul class="step-list" id="stepsList"></ul>
  </div>

  <!-- 注意点カード -->
  <div class="card" id="notesCard" style="display:none">
    <p class="card-title">注意点</p>
    <ul class="note-list" id="notesList"></ul>
  </div>

  <!-- 禁止カード -->
  <div class="ng-card" id="ngCard" style="display:none">
    <p class="card-title">やってはいけないこと</p>
    <ul class="ng-list" id="ngList"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📋 対応手順は一般的なビジネス実務の目安です。法的トラブルに発展した場合は弁護士など専門家にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

    var type = document.getElementById('claimType').value;
    var sit  = document.getElementById('situation').value;
    var d    = DATA[type][sit];
    var typeLabel = DATA[type].label;
    var sitLabel = { first: '初回連絡', repeat: '再発・二次クレーム', escalation: 'エスカレーション対応' }[sit];

    // 手順
    document.getElementById('stepsTitle').textContent = '優先対応手順（' + typeLabel + ' / ' + sitLabel + '）';
    document.getElementById('stepsList').innerHTML = d.steps.map(function(s, i) {
      return '<li><span class="step-num">' + (i + 1) + '</span><span class="step-text">' + s + '</span></li>';
    }).join('');
    document.getElementById('stepsCard').style.display = 'block';

    // 注意点
    document.getElementById('notesList').innerHTML = d.notes.map(function(n) {
      return '<li>' + n + '</li>';
    }).join('');
    document.getElementById('notesCard').style.display = 'block';

    // 禁止
    document.getElementById('ngList').innerHTML = d.ng.map(function(n) {
      return '<li>' + n + '</li>';
    }).join('');
    document.getElementById('ngCard').style.display = 'block';

    document.getElementById('stepsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function saveSettings() {
    try {
      localStorage.setItem('claim_steps_type', document.getElementById('claimType').value);
      localStorage.setItem('claim_steps_sit',  document.getElementById('situation').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var t = localStorage.getItem('claim_steps_type');
      var s = localStorage.getItem('claim_steps_sit');
      if (t) document.getElementById('claimType').value = t;
      if (s) document.getElementById('situation').value = s;
    } catch(e) {}
  }
  loadSettings();
  </script>
