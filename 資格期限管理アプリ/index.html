<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資格期限管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>資格期限管理</h1>

    <div class="form-card">
      <h2>資格を登録</h2>
      <div class="form-group">
        <label for="staffName">スタッフ名</label>
        <input type="text" id="staffName" placeholder="例：田中 太郎">
      </div>
      <div class="form-group">
        <label for="certName">資格・免許名</label>
        <input type="text" id="certName" placeholder="例：フォークリフト運転技能講習">
      </div>
      <div class="form-group">
        <label for="expDate">有効期限</label>
        <input type="date" id="expDate">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </div>

    <div class="summary" id="summary"></div>

    <div class="list-section">
      <h2>登録済み資格一覧</h2>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="expired">期限切れ</button>
        <button class="filter-btn" data-filter="soon">期限間近</button>
        <button class="filter-btn" data-filter="ok">正常</button>
      </div>
      <div id="certList"></div>
      <p id="emptyMsg" class="empty-msg">登録されている資格はありません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
