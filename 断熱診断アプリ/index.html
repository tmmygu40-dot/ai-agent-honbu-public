<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断熱診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 箇所セレクター ── */
    .spot-row {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .spot-row:last-child { border-bottom: none; padding-bottom: 0; }
    .spot-icon { font-size: 1.4rem; flex-shrink: 0; width: 2rem; text-align: center; }
    .spot-label { flex: 1; font-size: 0.9rem; font-weight: 600; }
    .spot-hint { font-size: 0.72rem; color: var(--text-sub); }
    .level-select {
      padding: 0.5rem 0.7rem;
      font-size: 0.88rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; -webkit-appearance: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .level-select:focus { border-color: var(--accent); background: #fff; }
    .level-select.good   { border-color: var(--ok);   background: var(--ok-bg);   color: var(--ok); }
    .level-select.normal { border-color: var(--warn);  background: var(--warn-bg); color: var(--warn); }
    .level-select.bad    { border-color: var(--ng);    background: var(--ng-bg);   color: var(--ng); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── ランキング ── */
    .rank-list { list-style: none; }
    .rank-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 2rem; height: 2rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 900; flex-shrink: 0;
    }
    .rank-1 { background: #fbbf24; color: #fff; }
    .rank-2 { background: #9ca3af; color: #fff; }
    .rank-3 { background: #d97706; color: #fff; }
    .rank-other { background: var(--border); color: var(--text-sub); }
    .rank-body { flex: 1; }
    .rank-name { font-size: 0.92rem; font-weight: 700; }
    .rank-effect { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.15rem; }
    .rank-badge {
      font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.6rem;
      border-radius: 20px; white-space: nowrap;
    }
    .badge-ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
    .badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🏠 断熱診断アプリ</h1>
    <p class="subtitle">各箇所の状態を選ぶだけ・リフォーム優先順位と光熱費削減効果を即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">現状の断熱状態を選択</p>

    <div class="spot-row">
      <div class="spot-icon">🪟</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">窓・サッシ</div>
        <div class="spot-hint">単板ガラス・複層ガラス・樹脂サッシ など</div>
      </div>
      <select class="level-select" id="s-window" onchange="updateStyle(this)">
        <option value="good">良好（複層+樹脂）</option>
        <option value="normal" selected>普通（複層ガラス）</option>
        <option value="bad">要改善（単板ガラス）</option>
      </select>
    </div>

    <div class="spot-row">
      <div class="spot-icon">🧱</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">壁・外壁</div>
        <div class="spot-hint">断熱材の有無・厚さ・種類 など</div>
      </div>
      <select class="level-select" id="s-wall" onchange="updateStyle(this)">
        <option value="good">良好（高性能断熱）</option>
        <option value="normal" selected>普通（標準断熱材）</option>
        <option value="bad">要改善（断熱材なし）</option>
      </select>
    </div>

    <div class="spot-row">
      <div class="spot-icon">🏗️</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">床・基礎</div>
        <div class="spot-hint">床下断熱・基礎断熱 など</div>
      </div>
      <select class="level-select" id="s-floor" onchange="updateStyle(this)">
        <option value="good">良好（床下断熱あり）</option>
        <option value="normal" selected>普通（一部断熱）</option>
        <option value="bad">要改善（断熱なし）</option>
      </select>
    </div>

    <div class="spot-row">
      <div class="spot-icon">🏠</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">屋根・天井</div>
        <div class="spot-hint">屋根断熱・天井断熱の状態 など</div>
      </div>
      <select class="level-select" id="s-roof" onchange="updateStyle(this)">
        <option value="good">良好（高性能断熱）</option>
        <option value="normal" selected>普通（標準断熱）</option>
        <option value="bad">要改善（断熱なし）</option>
      </select>
    </div>

    <div class="spot-row">
      <div class="spot-icon">🚪</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">玄関ドア</div>
        <div class="spot-hint">断熱ドア・アルミ製 など</div>
      </div>
      <select class="level-select" id="s-door" onchange="updateStyle(this)">
        <option value="good">良好（断熱ドア）</option>
        <option value="normal" selected>普通（一般ドア）</option>
        <option value="bad">要改善（隙間・古い）</option>
      </select>
    </div>

    <div class="spot-row">
      <div class="spot-icon">❄️</div>
      <div class="spot-body" style="flex:1">
        <div class="spot-label">暖冷房設備</div>
        <div class="spot-hint">エアコンの年式・効率（APF） など</div>
      </div>
      <select class="level-select" id="s-hvac" onchange="updateStyle(this)">
        <option value="good">良好（高効率・最新型）</option>
        <option value="normal" selected>普通（10年以内）</option>
        <option value="bad">要改善（10年超・旧型）</option>
      </select>
    </div>

  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">🔍 診断する</button>

  <!-- 総合判定カード -->
  <div class="result-card" id="result">
    <p class="result-label">総合断熱スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 優先順位ランキング -->
  <div class="card" id="ranking-card" style="display:none">
    <p class="card-title">改善優先順位ランキング</p>
    <ul class="rank-list" id="ranking-list"></ul>
  </div>

  <!-- 削減効果サマリー -->
  <div class="card" id="summary-card" style="display:none">
    <p class="card-title">光熱費削減効果の概算</p>
    <table class="detail-table"><tbody id="summary-body"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // 箇所データ：name / id / baseReduction(%) / icon
  var SPOTS = [
    { id: 'window', name: '窓・サッシ',   icon: '🪟', base: 30 },
    { id: 'hvac',   name: '暖冷房設備',   icon: '❄️', base: 20 },
    { id: 'wall',   name: '壁・外壁',     icon: '🧱', base: 15 },
    { id: 'floor',  name: '床・基礎',     icon: '🏗️', base: 10 },
    { id: 'roof',   name: '屋根・天井',   icon: '🏠', base: 10 },
    { id: 'door',   name: '玄関ドア',     icon: '🚪', base: 5  },
  ];

  var LEVEL_SCORE = { good: 0, normal: 1, bad: 2 };
  var LEVEL_LABEL = { good: '良好', normal: '普通', bad: '要改善' };

  function updateStyle(sel) {
    sel.className = 'level-select ' + sel.value;
    saveState();
  }

  function getLevels() {
    return SPOTS.map(function(s) {
      var sel = document.getElementById('s-' + s.id);
      return { spot: s, level: sel ? sel.value : 'normal' };
    });
  }

  function diagnose() {
    var items = getLevels();

    // スコア計算（要改善=base、普通=base/2、良好=0）
    var results = items.map(function(item) {
      var lv = item.level;
      var reduction = lv === 'bad' ? item.spot.base
                    : lv === 'normal' ? Math.round(item.spot.base / 2)
                    : 0;
      var score = lv === 'bad' ? item.spot.base * 2
                : lv === 'normal' ? item.spot.base
                : 0;
      return {
        spot: item.spot,
        level: lv,
        reduction: reduction,
        score: score
      };
    });

    // スコア降順でソート
    results.sort(function(a, b) { return b.score - a.score; });

    // 総合判定（全箇所の削減合計）
    var totalReduction = results.reduce(function(sum, r) { return sum + r.reduction; }, 0);
    // 悪い箇所の数
    var badCount = results.filter(function(r) { return r.level === 'bad'; }).length;
    var normalCount = results.filter(function(r) { return r.level === 'normal'; }).length;

    var level, label, note;
    if (badCount === 0 && normalCount <= 1) {
      level = 'ok';
      label = '断熱性能は良好です';
      note = '現状の断熱対策で十分な水準です。引き続き設備のメンテナンスを行いましょう。';
    } else if (badCount <= 1 && normalCount <= 2) {
      level = 'warn';
      label = '改善の余地があります';
      note = '一部の箇所を改善することで光熱費を削減できます。優先度の高い箇所から検討しましょう。';
    } else {
      level = 'ng';
      label = '断熱性能が不足しています';
      note = '複数箇所に要改善箇所があります。リフォームの優先順位に従って計画的に改善しましょう。';
    }

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = label;
    document.getElementById('rn').textContent = note;

    // ランキング表示
    var rankList = document.getElementById('ranking-list');
    rankList.innerHTML = results.map(function(r, i) {
      var rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
      var badgeClass = r.level === 'bad' ? 'badge-ng' : r.level === 'normal' ? 'badge-warn' : 'badge-ok';
      var effectText = r.reduction > 0 ? '最大約' + r.reduction + '%削減' : '改善不要';
      return '<li class="rank-item">'
        + '<div class="rank-num ' + rankClass + '">' + (i + 1) + '</div>'
        + '<div class="rank-body">'
        + '<div class="rank-name">' + r.spot.icon + ' ' + r.spot.name + '</div>'
        + '<div class="rank-effect">' + effectText + '</div>'
        + '</div>'
        + '<span class="rank-badge ' + badgeClass + '">' + LEVEL_LABEL[r.level] + '</span>'
        + '</li>';
    }).join('');
    document.getElementById('ranking-card').style.display = '';

    // サマリーテーブル
    var rows = results.filter(function(r) { return r.reduction > 0; }).map(function(r) {
      return '<tr><td>' + r.spot.icon + ' ' + r.spot.name + '</td><td>最大 ' + r.reduction + '% 削減</td></tr>';
    });
    if (rows.length === 0) {
      rows = ['<tr><td colspan="2" style="text-align:center;color:var(--ok)">すべての箇所が良好です</td></tr>'];
    }
    rows.push('<tr class="hl"><td>全体の削減見込み合計</td><td>最大 ' + Math.min(totalReduction, 60) + '% 削減</td></tr>');
    document.getElementById('summary-body').innerHTML = rows.join('');
    document.getElementById('summary-card').style.display = '';

    // スクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

    saveState();
  }

  // ── localStorage ──
  function saveState() {
    var state = {};
    SPOTS.forEach(function(s) {
      var sel = document.getElementById('s-' + s.id);
      if (sel) state[s.id] = sel.value;
    });
    try { localStorage.setItem('dantnetsu-state', JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      var raw = localStorage.getItem('dantnetsu-state');
      if (!raw) return;
      var state = JSON.parse(raw);
      SPOTS.forEach(function(s) {
        var sel = document.getElementById('s-' + s.id);
        if (sel && state[s.id]) {
          sel.value = state[s.id];
          updateStyle(sel);
        }
      });
    } catch(e) {}
  }

  loadState();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
