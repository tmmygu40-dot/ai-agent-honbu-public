<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集金管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>集金管理アプリ</h1>

    <div class="settings-grid">
      <!-- 世帯登録 -->
      <div class="card">
        <h2>世帯の登録</h2>
        <div class="input-row">
          <input type="text" id="householdInput" placeholder="世帯名を入力" maxlength="30">
          <button class="btn-primary" onclick="addHousehold()">追加</button>
        </div>
        <ul id="householdList" class="tag-list"></ul>
      </div>

      <!-- 集金項目登録 -->
      <div class="card">
        <h2>集金項目の登録</h2>
        <div class="input-row">
          <input type="text" id="itemNameInput" placeholder="項目名" maxlength="20">
          <input type="number" id="itemAmountInput" placeholder="金額(円)" min="0" step="1" style="width:110px">
          <button class="btn-primary" onclick="addItem()">追加</button>
        </div>
        <ul id="itemList" class="tag-list"></ul>
      </div>
    </div>

    <!-- 集金状況テーブル -->
    <div class="card">
      <h2>集金状況</h2>
      <p id="emptyMsg" class="empty-msg">世帯と集金項目を両方登録すると表が表示されます</p>
      <div id="tableWrapper" class="table-wrapper" style="display:none">
        <table id="collectionTable" class="collection-table">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 未払い一覧 -->
    <div class="card">
      <h2>未払い一覧</h2>
      <div id="unpaidList" class="unpaid-list">
        <p class="empty-msg">未払いなし</p>
      </div>
      <div class="total-row" id="totalRow" style="display:none">
        <span>未払い合計：</span>
        <strong id="totalAmount" class="total-amount">¥0</strong>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
