<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスク断捨離診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── サマリカード ── */
    .summary-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.45rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { color: var(--text-sub); }
    .summary-value { font-weight: 700; font-size: 1.1rem; }
    .summary-value.accent { color: var(--accent); }
    .summary-value.ok { color: var(--ok); }

    /* ── リスト ── */
    .list-container {
      max-width: 600px; margin: 0 auto;
    }
    .sub-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      position: relative;
    }
    .sub-item.priority-1 { border-left: 5px solid var(--ng); }
    .sub-item.priority-2 { border-left: 5px solid #f97316; }
    .sub-item.priority-3 { border-left: 5px solid var(--warn); }
    .sub-item.priority-ok { border-left: 5px solid var(--ok); }

    .sub-rank {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .priority-1 .sub-rank { color: var(--ng); }
    .priority-2 .sub-rank { color: #f97316; }
    .priority-3 .sub-rank { color: var(--warn); }
    .priority-ok .sub-rank { color: var(--ok); }

    .sub-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .sub-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.78rem; color: var(--text-sub); }
    .meta-tag {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.2rem 0.55rem;
    }
    .sub-price { font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-top: 0.4rem; }
    .sub-verdict {
      font-size: 0.8rem; font-weight: 700; margin-top: 0.5rem;
      padding: 0.3rem 0.7rem; border-radius: 20px; display: inline-block;
    }
    .priority-1 .sub-verdict { background: var(--ng-bg); color: var(--ng); }
    .priority-2 .sub-verdict { background: #fff7ed; color: #ea580c; }
    .priority-3 .sub-verdict { background: var(--warn-bg); color: var(--warn); }
    .priority-ok .sub-verdict { background: var(--ok-bg); color: var(--ok); }

    .btn-del {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-sub); line-height: 1;
      padding: 0.2rem 0.4rem;
    }
    .btn-del:hover { color: var(--ng); }

    /* ── 空状態 ── */
    .empty {
      text-align: center; color: var(--text-sub);
      font-size: 0.9rem; padding: 2rem 1rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>📋 サブスク断捨離診断アプリ</h1>
    <p class="subtitle">使用頻度と費用対効果から解約優先順位を即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">サブスクを追加</p>
    <div class="field">
      <label for="subName">サービス名</label>
      <input type="text" id="subName" placeholder="例: Netflix、Spotify、Amazonプライム">
    </div>
    <div class="field">
      <label for="subPrice">月額料金（円）</label>
      <input type="number" id="subPrice" placeholder="例: 990" min="0">
    </div>
    <div class="field">
      <label for="subFreq">使用頻度</label>
      <select id="subFreq">
        <option value="1">毎日使っている</option>
        <option value="2">週に数回使っている</option>
        <option value="3">月に数回使っている</option>
        <option value="4">ほとんど使っていない</option>
      </select>
    </div>
    <div class="field">
      <label for="subImp">重要度・満足度</label>
      <select id="subImp">
        <option value="1">高い（ないと困る）</option>
        <option value="2">普通（あると便利）</option>
        <option value="3">低い（なくてもよい）</option>
      </select>
    </div>
  </div>

  <button class="btn-add" onclick="addSub()">＋ 追加して診断する</button>

  <!-- サマリ -->
  <div class="summary-card" id="summary" style="display:none">
    <p class="card-title">診断サマリ</p>
    <div class="summary-row">
      <span class="summary-label">登録サブスク数</span>
      <span class="summary-value" id="sumCount">0 件</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">合計月額</span>
      <span class="summary-value accent" id="sumTotal">¥0</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">解約推奨TOP3を解約した場合の節約額</span>
      <span class="summary-value ok" id="sumSave">¥0 / 月</span>
    </div>
  </div>

  <!-- リスト -->
  <div class="list-container" id="listContainer">
    <div class="empty" id="emptyMsg">サブスクを追加すると解約優先順位が表示されます</div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script src="../fav-widget.js"></script>

  <script>
  var STORAGE_KEY = 'subscrDisposal_v1';
  var subs = [];

  function load() {
    try {
      var d = localStorage.getItem(STORAGE_KEY);
      subs = d ? JSON.parse(d) : [];
    } catch(e) { subs = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(subs));
  }

  // スコア計算：高いほど解約推奨
  // freq: 1=毎日, 2=週数回, 3=月数回, 4=ほぼ使わない
  // imp:  1=高, 2=普通, 3=低
  function calcScore(sub) {
    return sub.freq * sub.imp * (sub.price / 100);
  }

  var freqLabel = { '1':'毎日', '2':'週数回', '3':'月数回', '4':'ほぼ使わない' };
  var impLabel  = { '1':'重要度:高', '2':'重要度:普通', '3':'重要度:低' };

  function verdict(rank, total) {
    if (total === 0) return { cls: 'priority-ok', label: '継続OK', rankLabel: '継続推奨' };
    if (rank === 1) return { cls: 'priority-1', label: '今すぐ解約を検討', rankLabel: '解約優先度 1位' };
    if (rank === 2) return { cls: 'priority-2', label: '解約を検討', rankLabel: '解約優先度 2位' };
    if (rank === 3) return { cls: 'priority-3', label: '見直しを検討', rankLabel: '解約優先度 3位' };
    return { cls: 'priority-ok', label: '継続OK', rankLabel: '解約優先度 ' + rank + '位' };
  }

  function render() {
    var container = document.getElementById('listContainer');
    var emptyMsg  = document.getElementById('emptyMsg');
    var summary   = document.getElementById('summary');

    if (subs.length === 0) {
      emptyMsg.style.display = '';
      summary.style.display = 'none';
      container.innerHTML = '<div class="empty" id="emptyMsg">サブスクを追加すると解約優先順位が表示されます</div>';
      return;
    }

    // スコア順にソート（降順）
    var sorted = subs.slice().sort(function(a, b) {
      return calcScore(b) - calcScore(a);
    });

    // サマリ計算
    var total = subs.reduce(function(s, x) { return s + x.price; }, 0);
    var saveTop3 = sorted.slice(0, 3).reduce(function(s, x) { return s + x.price; }, 0);

    document.getElementById('sumCount').textContent = subs.length + ' 件';
    document.getElementById('sumTotal').textContent = '¥' + fmt(total);
    document.getElementById('sumSave').textContent  = '¥' + fmt(saveTop3) + ' / 月';
    summary.style.display = '';

    // リスト描画
    var html = '';
    sorted.forEach(function(sub, idx) {
      var rank = idx + 1;
      var v = verdict(rank, sorted.length);
      html += '<div class="sub-item ' + v.cls + '">';
      html += '<button class="btn-del" onclick="delSub(\'' + sub.id + '\')" title="削除">✕</button>';
      html += '<div class="sub-rank">' + v.rankLabel + '</div>';
      html += '<div class="sub-name">' + esc(sub.name) + '</div>';
      html += '<div class="sub-meta">';
      html += '<span class="meta-tag">' + freqLabel[sub.freq] + '</span>';
      html += '<span class="meta-tag">' + impLabel[sub.imp] + '</span>';
      html += '</div>';
      html += '<div class="sub-price">¥' + fmt(sub.price) + ' / 月</div>';
      html += '<div class="sub-verdict">' + v.label + '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function addSub() {
    var name  = document.getElementById('subName').value.trim();
    var price = parseFloat(document.getElementById('subPrice').value);
    var freq  = document.getElementById('subFreq').value;
    var imp   = document.getElementById('subImp').value;

    if (!name) { alert('サービス名を入力してください'); return; }
    if (isNaN(price) || price < 0) { alert('月額料金を入力してください'); return; }

    subs.push({
      id: Date.now().toString(),
      name: name,
      price: price,
      freq: freq,
      imp: imp
    });
    save();

    // フォームリセット
    document.getElementById('subName').value  = '';
    document.getElementById('subPrice').value = '';
    document.getElementById('subFreq').value  = '1';
    document.getElementById('subImp').value   = '1';

    render();
  }

  function delSub(id) {
    subs = subs.filter(function(s) { return s.id !== id; });
    save();
    render();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 初期化
  load();
  render();
  </script>

</body>
</html>
