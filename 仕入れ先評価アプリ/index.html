<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ先評価アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>仕入れ先評価アプリ</h1>
    <p class="subtitle">納期・品質・価格・安定性をスコア評価して最適発注先を判断</p>

    <section class="form-section">
      <h2>仕入れ先を登録</h2>
      <div class="form-group">
        <label for="name">仕入れ先名</label>
        <input type="text" id="name" placeholder="例：山田商事" maxlength="50">
      </div>
      <div class="score-grid">
        <div class="score-item">
          <label for="delivery">納期 <span class="hint">（1〜5）</span></label>
          <select id="delivery">
            <option value="1">1 - 悪い</option>
            <option value="2">2 - やや悪い</option>
            <option value="3" selected>3 - 普通</option>
            <option value="4">4 - 良い</option>
            <option value="5">5 - 優秀</option>
          </select>
        </div>
        <div class="score-item">
          <label for="quality">品質 <span class="hint">（1〜5）</span></label>
          <select id="quality">
            <option value="1">1 - 悪い</option>
            <option value="2">2 - やや悪い</option>
            <option value="3" selected>3 - 普通</option>
            <option value="4">4 - 良い</option>
            <option value="5">5 - 優秀</option>
          </select>
        </div>
        <div class="score-item">
          <label for="price">価格 <span class="hint">（1〜5）</span></label>
          <select id="price">
            <option value="1">1 - 高い</option>
            <option value="2">2 - やや高い</option>
            <option value="3" selected>3 - 普通</option>
            <option value="4">4 - 安い</option>
            <option value="5">5 - 最安</option>
          </select>
        </div>
        <div class="score-item">
          <label for="stability">安定性 <span class="hint">（1〜5）</span></label>
          <select id="stability">
            <option value="1">1 - 不安定</option>
            <option value="2">2 - やや不安定</option>
            <option value="3" selected>3 - 普通</option>
            <option value="4">4 - 安定</option>
            <option value="5">5 - 非常に安定</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：担当：田中さん、月1回訪問" maxlength="100">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="ranking-section">
      <div class="ranking-header">
        <h2>ランキング一覧</h2>
        <span class="count-badge" id="countBadge">0 件</span>
      </div>
      <div id="emptyMsg" class="empty-msg">まだ仕入れ先が登録されていません</div>
      <div id="rankingList" class="ranking-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
