<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>介護記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>介護記録アプリ</h1>

    <div class="date-nav">
      <button id="prevDay">&#8592;</button>
      <span id="currentDate"></span>
      <button id="nextDay">&#8594;</button>
    </div>

    <div class="form-card">
      <div class="form-row">
        <label>種別</label>
        <div class="category-buttons">
          <button class="cat-btn active" data-category="食事">🍚 食事</button>
          <button class="cat-btn" data-category="水分">💧 水分</button>
          <button class="cat-btn" data-category="排泄">🚽 排泄</button>
        </div>
      </div>
      <div class="form-row">
        <label for="recordTime">時刻</label>
        <input type="time" id="recordTime">
      </div>
      <div class="form-row">
        <label for="recordMemo">メモ</label>
        <input type="text" id="recordMemo" placeholder="例：おかゆ半分、200ml…">
      </div>
      <button id="addBtn" class="add-btn">記録する</button>
    </div>

    <div class="summary">
      <span class="summary-item" id="summaryFood">🍚 食事 <strong>0</strong>回</span>
      <span class="summary-item" id="summaryWater">💧 水分 <strong>0</strong>回</span>
      <span class="summary-item" id="summaryToilet">🚽 排泄 <strong>0</strong>回</span>
    </div>

    <div id="recordList" class="record-list"></div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
