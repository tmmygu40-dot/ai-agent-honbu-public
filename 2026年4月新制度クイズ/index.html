<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 2026年4月新制度クイズ</title>
  <meta name="description" content="2026年4月から変わる年金・税制・給与制度をクイズで学べます。複数の制度改定を楽しく理解できるツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズ問題 ── */
    .quiz-question {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 1.2rem; line-height: 1.5;
    }
    .quiz-counter {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.5rem;
    }
    .quiz-options { margin-bottom: 0; }
    .quiz-option {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: background-color 0.15s;
    }
    .quiz-option:last-child { border-bottom: none; }
    .quiz-option:hover { background-color: var(--accent-light); }
    .quiz-option input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .quiz-option .option-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- 計測タグ -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📝 2026年4月新制度クイズ</h1>
    <p class="subtitle">4月から変わる年金・税制・給与制度をクイズで楽しく学べます。</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <div class="quiz-counter"><span id="quiz-num">1</span> / <span id="quiz-total">5</span></div>
    <p class="quiz-question" id="quiz-q">問題文がここに表示されます</p>
    <div class="quiz-options" id="quiz-options"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="btn-next" onclick="nextQuestion()">次へ進む</button>

  <!-- 結論カード（結果表示） -->
  <div class="result-card" id="result">
    <p class="result-label">終了</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 再試行ボタン -->
  <button class="btn-calc" id="btn-retry" onclick="restartQuiz()" style="display:none">もう一度やる</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・日本年金機構・国税庁などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。※2026年4月時点の参考データです。最新情報は公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // クイズデータ
  var QUIZ = [
    {
      q: '2026年4月から、年金保険料率（労使折半）がいくつになりますか？',
      opts: ['18.3%', '18.9%', '19.2%', '19.6%'],
      ans: 2, // 正解は19.2%（3番目）
      exp: '2026年4月から年金保険料率は19.2%に引き上げられます。'
    },
    {
      q: '2026年1月から新しく導入される課税制度は次のどれですか？',
      opts: ['給与所得控除の見直し', '金利・配当・株式譲渡益の一本化', '基礎控除の廃止', '医療費控除の廃止'],
      ans: 1, // 正解は金利・配当・株式譲渡益の一本化
      exp: '2026年1月から金利・配当・株式譲渡益が一本化され、課税方式が統一されます。'
    },
    {
      q: '2026年4月から健康保険の保険料率はどう変わりますか？',
      opts: ['据え置き', '引き上げ', '引き下げ', '廃止'],
      ans: 1, // 正解は引き上げ
      exp: '医療費の増加に伴い、2026年4月から健康保険料率が引き上げられます。'
    },
    {
      q: '2026年4月からの給与明細で新しく表示される項目は？',
      opts: ['手取り額の予測', '社会保険料の負担割合', '所得税の計算式', '年金受給予定額'],
      ans: 1, // 正解は社会保険料の負担割合
      exp: '透明性向上のため、給与明細に社会保険料の負担割合が明記されるようになります。'
    },
    {
      q: '2026年度の扶養親族控除の対象者は、所得がいくら以下の人ですか？',
      opts: ['48万円', '50万円', '75万円', '100万円'],
      ans: 2, // 正解は75万円
      exp: '2026年度から扶養親族控除の所得基準が75万円に設定されます。'
    }
  ];

  var currentQuestion = 0;
  var score = 0;
  var answered = false;

  function init() {
    currentQuestion = 0;
    score = 0;
    answered = false;
    showQuestion();
  }

  function showQuestion() {
    if (currentQuestion >= QUIZ.length) {
      showResult();
      return;
    }

    answered = false;
    var q = QUIZ[currentQuestion];
    document.getElementById('quiz-num').textContent = currentQuestion + 1;
    document.getElementById('quiz-total').textContent = QUIZ.length;
    document.getElementById('quiz-q').textContent = q.q;

    var html = '';
    for (var i = 0; i < q.opts.length; i++) {
      html += '<label class="quiz-option">'
            + '<input type="radio" name="option" value="' + i + '">'
            + '<span class="option-text">' + q.opts[i] + '</span>'
            + '</label>';
    }
    document.getElementById('quiz-options').innerHTML = html;

    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').textContent = '選んで次へ';

    var radios = document.querySelectorAll('input[name="option"]');
    for (var i = 0; i < radios.length; i++) {
      radios[i].addEventListener('change', function() {
        document.getElementById('btn-next').disabled = false;
        answered = true;
      });
    }
  }

  function nextQuestion() {
    if (!answered) return;
    var selected = document.querySelector('input[name="option"]:checked').value;
    if (QUIZ[currentQuestion].ans == selected) {
      score++;
    }
    currentQuestion++;
    showQuestion();
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'block';

    var rc = document.getElementById('result');
    var pct = Math.round(score / QUIZ.length * 100);
    var level = pct >= 80 ? 'ok' : pct >= 60 ? 'warn' : 'ng';

    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + QUIZ.length;

    var msg = '';
    if (level === 'ok') {
      msg = '素晴らしい！新制度についてよく理解できていますね。';
    } else if (level === 'warn') {
      msg = 'まあまあです。もう一度チャレンジして完全マスターを目指しましょう。';
    } else {
      msg = 'もう一度やってみましょう。新制度について学べます。';
    }
    document.getElementById('rn').textContent = msg;
  }

  function restartQuiz() {
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('btn-next').style.display = 'block';
    document.getElementById('btn-retry').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    init();
  }

  // 初期化
  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

</body>
</html>
