<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="つらい家事を避けたい時、ユーモアたっぷりな言い訳を入力してAIが自動生成。相手を笑わせながら家事から逃げられる無料ツールです。">
  <title>つらい家事を笑いに変える言い訳ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ラジオボタングループ ── */
    .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .radio-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.92rem; cursor: pointer;
    }
    .radio-item input[type="radio"] { cursor: pointer; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card { border-color: var(--accent); background: var(--accent-light); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 1rem; }
    .excuse-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }
    .excuse-item:last-child { margin-bottom: 0; }
    .excuse-number {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 700;
      display: inline-block;
      margin-right: 0.5rem;
    }
    .copy-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      background: var(--border);
      color: var(--text-sub);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .copy-btn:active { background: var(--accent); color: #fff; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>つらい家事を笑いに変える言い訳ジェネレーター</h1>
    <p class="subtitle">家事が億劫な時に、ユーモアで相手を笑わせる言い訳を瞬時に生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="chore">やりたくない家事</label>
      <select id="chore">
        <option value="">選択してください</option>
        <option value="laundry">洗濯</option>
        <option value="dishes">食器洗い</option>
        <option value="cleaning">掃除</option>
        <option value="cooking">料理</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label>相手との関係</label>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="relation" value="family"> 家族
        </label>
        <label class="radio-item">
          <input type="radio" name="relation" value="friend"> 友人
        </label>
        <label class="radio-item">
          <input type="radio" name="relation" value="partner"> パートナー
        </label>
        <label class="radio-item">
          <input type="radio" name="relation" value="boss"> 上司
        </label>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">言い訳を生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成された言い訳 3パターン</p>
    <div id="excuses"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは、家事の負担を少しでも軽くするために、ユーモアと共感を込めた言い訳パターンを生成しています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 言い訳データベース
  var EXCUSES = {
    laundry: {
      family: [
        "洗濯物が自動で洗い始めるまで、イメージトレーニングしてました。念力の修行です。",
        "洗濯槽から宇宙の声が…今、それどころじゃないみたい。明日必ず！",
        "洗濯ネットが突然『俺たちに触れるな』って言い始めたから、一旦冷静さを取り戻しに。"
      ],
      friend: [
        "洗濯物「今日は休場」ってLINEくれたんだ。プロ意識が高い…。",
        "洗濯機が瞑想中です。人間関係も修復するらしい。一緒に待ちません？",
        "洗濯物、新展開。。。ドラマ見終わったら、一気にやります、マジで。"
      ],
      partner: [
        "洗濯物さんに『今夜は一人の時間をください』って言われました。共感ですね。",
        "洗濯ネット君が恋に落ちたみたい。揺れて見守ってます。",
        "洗濯槽に瞑想中のバグが発生。修理待ちしてます。その間一緒に寝ません？"
      ],
      boss: [
        "洗濯物の報告書作成中です。カテゴリ分けから始めてます。効率化を。",
        "洗濯係の人事評価が……まあ、そろそろやります。進捗報告は明日。",
        "洗濯機のシステムエラーです。IT部門で確認してます。待機中。"
      ]
    },
    dishes: {
      family: [
        "食器たちが『今日は仲良く沈んで考える時間が必要』って。水に浮かぶ悟りの時間。",
        "食器用洗剤が品切れだと思い込んでた。本気出すまで、あと5分だけ。",
        "食器が積み重なって『俺たちのピラミッド建築記』始まった。鑑賞中。"
      ],
      friend: [
        "食器の本音座談会開催中。『なぜ俺たちは汚れるのか』って…深い話。",
        "洗う？いや、食器との関係性を見直してた。結構いい話になった。",
        "シンクの水、『今日は温泉気分』らしい。気持ちわかる。"
      ],
      partner: [
        "食器「お前に洗われる筋合いじゃない」ムードになってた。仲直り中。",
        "洗い桶が『俺たちの愛の深さをもっと感じてほしい』って。詩的。",
        "食器の流れる音…『これは宇宙の周波数』らしい。敬虔に聞いてた。"
      ],
      boss: [
        "食器洗浄プロジェクト、計画段階です。スケジュール確認中。",
        "シンク管理システムのリセット待ちです。本格的な対応は明日から。",
        "食器在庫管理、見直し進行中。整理整頓の効率化案を練ってます。"
      ]
    },
    cleaning: {
      family: [
        "床にホコリたちが『大団結イベント』開いてた。彼らの独立戦争を見守り中。",
        "掃除機「今日は休場」ってモード。機械も人間らしい。一緒に休んでました。",
        "部屋全体が『断捨離瞑想モード』に入ってた。乱雑さも幸福度らしい。"
      ],
      friend: [
        "掃除をしてたら、部屋が『いや、荷物がいっぱいが俺のアイデンティティ』って。個性尊重。",
        "ホコリさんの構成員会議がありました。『俺たちをなぜ消す？』って質問攻め。",
        "床が『磨かれずの光沢も悪くない』ムード。美学の議論になった。"
      ],
      partner: [
        "掃除は愛。だから…今その愛を感じ直してました。ロマンチック。",
        "部屋との関係性、見直し期。モノとの向き合い方を考え直してた。",
        "床のホコリ『俺たちもお前のために必要？』って。哲学的。"
      ],
      boss: [
        "清掃プロジェクト、作業計画書作成中です。スケジュール調整待ち。",
        "環境整備システム、本格稼働は明日予定です。準備段階です。",
        "室内環境管理、リソース配分の見直し中。進捗はホウレンソウします。"
      ]
    },
    cooking: {
      family: [
        "食材たちが『僕たちの調理方法、一緒に決めたくない？』って民主主義。",
        "キッチンが『今夜は冷たいままがいい』ムード。室温愛好。",
        "レシピが『え、これ作るの？』って困惑。相談会開いてた。"
      ],
      friend: [
        "調理器具が『今日は協調性を試す日』ってストライキ状態。支持してました。",
        "食材の自由度を尊重してた。焼く？煮る？『お前たちで決めろ』って。",
        "キッチン全体が『今夜は瞑想モード』。音も匂いも消した特別な夜。"
      ],
      partner: [
        "料理は愛。だから…愛を込めるまで、時間が必要だった。準備中。",
        "食材とのコミュニケーション中。『どんな姿になりたい？』って。",
        "台所が『二人の空間の再確認』を望んでた。雰囲気を大事に。"
      ],
      boss: [
        "食事提供業務、計画調整中です。メニュー検討は明日の会議で。",
        "調理スケジュール、リソース確認後に実行予定。進捗は報告します。",
        "食材在庫管理と調理工程、システム確認待ちです。準備整次第。"
      ]
    },
    other: {
      family: [
        "その家事が『実は俺たち、自動でやってくれる日を待ってた』って。待ち続け中。",
        "やること『今日は心が準備できてない』って。メンタルトレーニング中。",
        "部屋全体が『俺たちの流れに逆らわないで』ムード。自然の摂理尊重。"
      ],
      friend: [
        "その家事、『やることの本質って何だ？』って問い始めた。哲学タイム。",
        "やることリストが『優先度の再検討』望んでた。会議開いてた。",
        "環境が『今このままでいたい』ってメッセージ。受け取ってた。"
      ],
      partner: [
        "その家事は愛。だから…やる前に、その意味を確認してた。大切。",
        "やることと関係性、一緒に見直し中。『これ、本当に必要？』って。",
        "部屋が『二人の空間として完成』ってオーラ。そのままでいたい。"
      ],
      boss: [
        "家事業務、優先度の見直し検討中です。実行スケジュール調整中。",
        "作業リソース配分、確認待ちです。準備整次第、対応予定。",
        "タスク管理システム、最適化案を検討してます。レポート後に実行。"
      ]
    }
  };

  function generate() {
    var chore = document.getElementById('chore').value;
    var relation = document.querySelector('input[name="relation"]:checked') ? document.querySelector('input[name="relation"]:checked').value : '';

    if (!chore || !relation) {
      alert('家事と相手との関係を選択してください');
      return;
    }

    // ローカルストレージに保存
    localStorage.setItem('lastChore', chore);
    localStorage.setItem('lastRelation', relation);

    // 言い訳取得
    var excuses = EXCUSES[chore][relation] || [];
    if (excuses.length === 0) {
      alert('申し訳ございません。その組み合わせにはまだ対応していません。');
      return;
    }

    // 3パターン表示（ランダムに異なる3つを選ぶ）
    var selected = [];
    var indices = [0, 1, 2];
    for (var i = 0; i < Math.min(3, excuses.length); i++) {
      selected.push(excuses[indices[i]]);
    }

    // 結果表示
    var html = '';
    for (var i = 0; i < selected.length; i++) {
      html += '<div class="excuse-item">' +
              '<span class="excuse-number">パターン ' + (i+1) + '</span>' +
              '<p style="margin-bottom: 0.5rem;">' + selected[i] + '</p>' +
              '<button class="copy-btn" onclick="copyToClipboard(\'' + selected[i].replace(/'/g, "\\'") + '\')">📋 コピー</button>' +
              '</div>';
    }

    document.getElementById('excuses').innerHTML = html;
    document.getElementById('result').style.display = 'block';
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function(){
      alert('コピーしました！');
    }).catch(function(){
      alert('コピーに失敗しました');
    });
  }

  // ページ読み込み時に前回の選択を復元
  window.addEventListener('load', function(){
    var lastChore = localStorage.getItem('lastChore');
    var lastRelation = localStorage.getItem('lastRelation');
    if (lastChore) document.getElementById('chore').value = lastChore;
    if (lastRelation) document.querySelector('input[name="relation"][value="' + lastRelation + '"]').checked = true;
  });
  </script>
