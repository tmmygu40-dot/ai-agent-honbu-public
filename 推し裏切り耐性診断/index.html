<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し裏切り耐性診断 | 5問でわかるあなたのメンタルタイプ</title>
  <meta name="description" content="活動休止・スキャンダル・卒業…そんな「推しの裏切り」にあなたはどれだけ耐えられる？5問で診断するメンタル耐性タイプ。推し活との健康的な距離感を見直すきっかけに。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.4rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.5; }
    .q-num { color: var(--accent); margin-right: 0.4rem; }
    .opt {
      display: block;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.5rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.92rem;
      line-height: 1.45;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input { display: none; }
    .opt.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      font-weight: 600;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji-big { font-size: 3rem; margin-bottom: 0.4rem; line-height: 1; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; margin-top: 0.8rem; }
    .result-tags { font-size: 0.82rem; color: var(--text-sub); margin-top: 0.6rem; }

    .btn-share {
      display: inline-block; margin-top: 1rem; padding: 0.55rem 1.1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
    }
    .btn-share:active { background: var(--accent-light); }

    .last-result {
      font-size: 0.78rem; color: var(--text-sub);
      max-width: 600px; margin: 0 auto 1rem; padding: 0.5rem 0.9rem;
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; text-align: center;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>推し裏切り耐性診断</h1>
    <p class="subtitle">活動休止・スキャンダル・卒業…あなたのメンタル耐性タイプは？5問で診断</p>
  </header>

  <div class="last-result" id="lastResult" style="display:none"></div>

  <div class="card">
    <p class="card-title">5問の質問</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re"></p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-tags" id="rt"></p>
    <p class="result-note" id="rn"></p>
    <button class="btn-share no-print" onclick="copyShare()">📋 結果をコピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、心理学の「ストレス耐性」「対象喪失への適応」に関する一般的な知見をもとに、エンタメ用途として目安として使いやすく整理しています。医学的診断ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '推しが突然「活動休止」を発表。最初に頭をよぎるのは？',
      opts: [
        { t: 'まあ仕方ない、ゆっくり休んで欲しい', s: 1 },
        { t: 'えっ、でもまた戻ってくるよね？', s: 2 },
        { t: '寂しい…生活の楽しみが減る…', s: 3 },
        { t: '世界が終わった。もう何も手につかない', s: 4 }
      ]
    },
    {
      q: '推しに熱愛報道。あなたの反応は？',
      opts: [
        { t: '推しが幸せならそれが一番！', s: 1 },
        { t: 'ちょっと複雑だけど受け入れる', s: 2 },
        { t: '数日間は寝込む。グッズも見たくない', s: 3 },
        { t: '裏切られた。ファン辞める一択', s: 4 }
      ]
    },
    {
      q: '推し活に使える時間とお金、現実の生活との比率は？',
      opts: [
        { t: '生活優先。空いた時間で推し活', s: 1 },
        { t: '半々くらい。バランスは取れてる', s: 2 },
        { t: '推し活が中心。生活はその周りに合わせる', s: 3 },
        { t: '推しがすべて。生活は二の次', s: 4 }
      ]
    },
    {
      q: '推し以外に夢中になれる趣味・人間関係はある？',
      opts: [
        { t: 'いっぱいある。推しはそのうちの一つ', s: 1 },
        { t: '少しある。推しが一番だけど他もある', s: 2 },
        { t: 'ほぼない。推しの話ばかりしている', s: 3 },
        { t: 'まったくない。推しがいないと話題ゼロ', s: 4 }
      ]
    },
    {
      q: '推しが卒業・引退すると言ったら、立ち直るのにかかる時間は？',
      opts: [
        { t: '1週間くらいで切り替えられる', s: 1 },
        { t: '1〜3ヶ月くらいかな', s: 2 },
        { t: '半年〜1年は引きずる', s: 3 },
        { t: '一生忘れられない。次の推しは作れない', s: 4 }
      ]
    }
  ];

  var TYPES = {
    iron: {
      level: 'ok', emoji: '🛡️',
      name: '鋼鉄ハート型',
      tags: '#推し活マイスター #生活第一 #安定型',
      note: 'あなたは推し活と日常のバランスが取れたタイプ。推しの裏切りにも「人生はそれだけじゃない」と冷静に受け止められる強さがあります。推しが幸せならそれが一番、と思える健全さは、長く推し活を続ける最大の武器。今のスタンスを大切に。'
    },
    calm: {
      level: 'ok', emoji: '🌿',
      name: '平常心キープ型',
      tags: '#しなやか #柔軟適応 #おとな推し',
      note: 'ショックは受けるけれど、しっかり消化して前を向けるタイプ。推しへの愛情と自分の生活の境界線を引けているので、何があってもちゃんと立ち直れます。仲間と話す・趣味で気を紛らす、そんな小さなクッションを大事にして。'
    },
    flower: {
      level: 'warn', emoji: '🌸',
      name: '揺れる花びら型',
      tags: '#感情ふんわり #ダメージ大 #要セルフケア',
      note: '推しへの愛が深い分、何かあると心がぐらぐら揺れるタイプ。立ち直るには時間が必要だけど、ちゃんと立ち直れる強さも持っています。推し以外の楽しみを少しずつ増やしておくと、いざという時のショックを和らげる「保険」になります。'
    },
    glass: {
      level: 'ng', emoji: '💎',
      name: 'ガラスの心型',
      tags: '#推し依存度高め #要バランス調整',
      note: '推しがあなたの世界の中心になっているタイプ。愛情が深いのは素晴らしいことだけど、もし推しに何かあった時のダメージは計り知れません。今のうちに、推し活以外の小さな楽しみ・友人関係・趣味を少しでも作っておくのが、自分自身を守る一番の対策です。'
    }
  };

  // 質問描画
  function renderQuestions() {
    var html = QUESTIONS.map(function(item, i) {
      var opts = item.opts.map(function(o, j) {
        return '<label class="opt" data-q="'+i+'" data-s="'+o.s+'">'
             + '<input type="radio" name="q'+i+'" value="'+o.s+'">'
             + o.t + '</label>';
      }).join('');
      return '<div class="q-block">'
           + '<p class="q-text"><span class="q-num">Q'+(i+1)+'.</span>'+item.q+'</p>'
           + opts + '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;

    // クリックで selected トグル
    document.querySelectorAll('.opt').forEach(function(el){
      el.addEventListener('click', function(){
        var qi = el.getAttribute('data-q');
        document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(e){ e.classList.remove('selected'); });
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      });
    });
  }

  function diagnose() {
    var total = 0;
    var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q'+i+'"]:checked');
      if (sel) { total += parseInt(sel.value, 10); answered++; }
    }
    if (answered < QUESTIONS.length) {
      alert('全'+QUESTIONS.length+'問に答えてください（' + answered + '/' + QUESTIONS.length + ')');
      return;
    }

    var typeKey;
    if (total <= 7)      typeKey = 'iron';
    else if (total <= 11) typeKey = 'calm';
    else if (total <= 15) typeKey = 'flower';
    else                  typeKey = 'glass';

    showResult(typeKey, total);
    saveResult(typeKey, total);
  }

  function showResult(typeKey, total) {
    var t = TYPES[typeKey];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rt').textContent = t.tags + ' ／ スコア:' + total + '/20';
    document.getElementById('rn').textContent = t.note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyShare() {
    var name = document.getElementById('rv').textContent;
    var tags = document.getElementById('rt').textContent.split(' ／')[0];
    var text = '私の推し裏切り耐性タイプは「'+name+'」でした！\n'+tags+'\n#推し裏切り耐性診断';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        alert('結果をコピーしました！SNSに貼り付けてシェアできます。');
      }, function(){
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('結果をコピーしました！'); }
    catch(e) { alert('コピーに失敗しました。手動でお試しください。'); }
    document.body.removeChild(ta);
  }

  var STORAGE_KEY = 'oshi_betrayal_result';
  function saveResult(typeKey, total) {
    try {
      var data = { typeKey: typeKey, total: total, date: new Date().toISOString().slice(0,10) };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  function loadResult() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      var t = TYPES[data.typeKey];
      if (!t) return;
      var box = document.getElementById('lastResult');
      box.style.display = 'block';
      box.textContent = '前回の診断（'+data.date+'）：'+t.emoji+' '+t.name;
    } catch(e) {}
  }

  renderQuestions();
  loadResult();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
