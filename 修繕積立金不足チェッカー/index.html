<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修繕積立金不足チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 追加徴収カード ── */
    .extra-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .extra-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .extra-value { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 0.25rem; }
    .extra-note { font-size: 0.78rem; color: var(--text-sub); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>修繕積立金不足チェッカー</h1>
    <p class="subtitle">積立残高と世帯数から大規模修繕の不足額・追加徴収目安を即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="balance">現在の積立残高（万円）</label>
      <input type="number" id="balance" placeholder="例: 3000" min="0">
      <p class="hint">管理組合が現在保有している積立金の合計</p>
    </div>
    <div class="field">
      <label for="monthly">毎月の積立額 合計（万円／月）</label>
      <input type="number" id="monthly" placeholder="例: 50" min="0" value="0">
      <p class="hint">全世帯合計の月々の積立額（0でも可）</p>
    </div>
    <div class="field">
      <label for="units">世帯数（戸）</label>
      <input type="number" id="units" placeholder="例: 80" min="1">
    </div>
    <div class="field">
      <label for="cost">大規模修繕の予定総額（万円）</label>
      <input type="number" id="cost" placeholder="例: 8000" min="0">
    </div>
    <div class="field">
      <label for="years">修繕まであと何年</label>
      <input type="number" id="years" placeholder="例: 5" min="0.1" step="0.5">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">不足額を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">積立不足額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 追加徴収カード -->
  <div class="extra-card" id="extra">
    <p class="extra-label">1世帯あたりの追加徴収目安</p>
    <p class="extra-value" id="ev">—</p>
    <p class="extra-note" id="en"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var LS_KEY = 'shusenzekitatsu_checker_v1';

  window.addEventListener('load', function() {
    var saved = localStorage.getItem(LS_KEY);
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      if (d.balance !== undefined) document.getElementById('balance').value = d.balance;
      if (d.monthly !== undefined) document.getElementById('monthly').value = d.monthly;
      if (d.units   !== undefined) document.getElementById('units').value   = d.units;
      if (d.cost    !== undefined) document.getElementById('cost').value    = d.cost;
      if (d.years   !== undefined) document.getElementById('years').value   = d.years;
    } catch(e) {}
  });

  function calc() {
    var balance = parseFloat(document.getElementById('balance').value);
    var monthly = parseFloat(document.getElementById('monthly').value) || 0;
    var units   = parseFloat(document.getElementById('units').value);
    var cost    = parseFloat(document.getElementById('cost').value);
    var years   = parseFloat(document.getElementById('years').value);

    if (isNaN(balance) || isNaN(units) || isNaN(cost) || isNaN(years)) {
      showErr('必須項目をすべて入力してください');
      return;
    }
    if (units <= 0) { showErr('世帯数は1以上を入力してください'); return; }
    if (years <= 0) { showErr('修繕まであと何年は0より大きい値を入力してください'); return; }

    // localStorage に保存
    localStorage.setItem(LS_KEY, JSON.stringify({
      balance: balance, monthly: monthly, units: units, cost: cost, years: years
    }));

    var months = years * 12;
    var futureBalance = balance + monthly * months;  // 現残高 + 積立見込み
    var shortage = cost - futureBalance;             // 不足額（負なら余裕あり）

    var level, note;
    if (shortage <= 0) {
      level = 'ok';
      note = '修繕費用を積立で賄える見込みです。引き続き維持しましょう。';
    } else if (shortage / cost <= 0.2) {
      level = 'warn';
      note = '修繕費の20%以内の不足です。早めに対策を検討しましょう。';
    } else {
      level = 'ng';
      note = '積立が大きく不足しています。追加徴収や修繕計画の見直しが必要です。';
    }

    // 結論カード
    var resultCard = document.getElementById('result');
    resultCard.className = 'result-card ' + level;
    resultCard.style.display = 'block';
    document.getElementById('rv').textContent = shortage <= 0
      ? '余裕 ' + fmt(Math.abs(shortage)) + ' 万円'
      : '不足 ' + fmt(shortage) + ' 万円';
    document.getElementById('rn').textContent = note;

    // 追加徴収カード
    var extraCard = document.getElementById('extra');
    extraCard.style.display = 'block';
    if (shortage > 0) {
      var extraPerUnitMonth = shortage / units / months;
      document.getElementById('ev').textContent = fmt2(extraPerUnitMonth) + ' 万円 / 月';
      document.getElementById('en').textContent =
        '（' + fmt(shortage) + ' 万円 ÷ ' + units + ' 戸 ÷ ' + months.toFixed(0) + ' ヶ月）';
    } else {
      document.getElementById('ev').textContent = '追加徴収不要';
      document.getElementById('en').textContent = '現在の積立計画で賄えます';
    }

    // 内訳テーブル
    showDetail([
      ['現在の積立残高', fmt(balance) + ' 万円'],
      ['積立見込み（' + months.toFixed(0) + ' ヶ月分）', fmt(monthly * months) + ' 万円'],
      ['修繕時点の積立合計', fmt(futureBalance) + ' 万円'],
      ['大規模修繕の予定総額', fmt(cost) + ' 万円'],
      [shortage <= 0 ? '余裕額' : '積立不足額', (shortage <= 0 ? '▲' : '') + fmt(Math.abs(shortage)) + ' 万円', true],
    ]);
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('extra').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmt2(n) {
    // 小数点2桁まで
    return (Math.round(n * 100) / 100).toLocaleString('ja-JP', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }
  </script>

</body>
</html>
