<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="不安やモヤモヤを入力するだけで、ユーモア・ポジティブ・ツッコミの3視点に言い換えて笑いに変える認知リフレーミング生成器。気持ちを切り替えたいときの相棒に。">
  <title>認知リフレーミング生成器｜不安を笑いに変える</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field textarea, .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
      font-family: inherit; resize: vertical;
    }
    .field textarea { min-height: 100px; line-height: 1.5; }
    .field textarea:focus, .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px; min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card); border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* リフレーミング結果カード */
    .reframe-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 600px;
    }
    .reframe-card.humor    { border-left: 5px solid #ec4899; background: #fdf2f8; }
    .reframe-card.positive { border-left: 5px solid #15803d; background: var(--ok-bg); }
    .reframe-card.retort   { border-left: 5px solid #2563eb; background: #eff6ff; }
    .reframe-tag {
      font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 0.6rem;
    }
    .reframe-card.humor .reframe-tag    { background: #ec4899; color: #fff; }
    .reframe-card.positive .reframe-tag { background: var(--ok); color: #fff; }
    .reframe-card.retort .reframe-tag   { background: #2563eb; color: #fff; }
    .reframe-text {
      font-size: 1.02rem; font-weight: 600;
      line-height: 1.6; color: var(--text);
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }

    /* 履歴 */
    .history-item {
      padding: 0.7rem 0.6rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem; color: var(--text-sub);
      cursor: pointer; line-height: 1.4;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { color: var(--accent); }
    .history-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 0.5rem 0; }
    .btn-clear-history {
      display: block; margin: 0.8rem auto 0;
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy, .btn-clear-history { display: none !important; }
      .card, .reframe-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>認知リフレーミング生成器</h1>
    <p class="subtitle">不安・モヤモヤを「ユーモア／ポジティブ／ツッコミ」の3視点で言い換えて、気持ちを切り替える練習に</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">不安・心配ごとを入力</p>
    <div class="field">
      <label for="worry">いま気になっていること</label>
      <textarea id="worry" placeholder="例：プレゼンで失敗したらどうしよう"></textarea>
      <p class="hint">短い1〜2文がちょうどいい長さです</p>
    </div>
  </div>

  <!-- ボタン -->
  <button class="btn-calc" onclick="reframe()">3視点でリフレーミングする</button>

  <!-- 結果カード -->
  <div id="result-area" style="display:none">
    <div class="reframe-card humor">
      <span class="reframe-tag">😂 ユーモア視点</span>
      <p class="reframe-text" id="r-humor"></p>
      <button class="btn-copy" onclick="copyText('r-humor', this)">コピー</button>
    </div>
    <div class="reframe-card positive">
      <span class="reframe-tag">🌱 ポジティブ視点</span>
      <p class="reframe-text" id="r-positive"></p>
      <button class="btn-copy" onclick="copyText('r-positive', this)">コピー</button>
    </div>
    <div class="reframe-card retort">
      <span class="reframe-tag">💡 ツッコミ視点</span>
      <p class="reframe-text" id="r-retort"></p>
      <button class="btn-copy" onclick="copyText('r-retort', this)">コピー</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="card">
    <p class="card-title">過去の入力履歴（最大10件）</p>
    <div id="history-list"></div>
    <button class="btn-clear-history" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは認知行動療法（CBT）のリフレーミング技法を参考に、気持ちの切り替え練習として使いやすく整理した目安ツールです。深刻な不安が続く場合は、厚生労働省の「こころの耳」など公的相談窓口もご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ユーモア視点テンプレ ──
  var HUMOR = [
    'まあ、{X}って言うけど、宇宙の歴史で見たら今日のことなんて0.0000001秒の話だよ。',
    '「{X}」…これ、未来の自分が酒の肴にする最高のネタになるやつ。',
    '{X}っていう題名で、いつか自伝書こう。第3章くらいに入れとこう。',
    '{X}！はい、人類史上たぶん3億人くらい同じこと考えてる。あなただけじゃない。',
    'もし{X}したら、それはそれでネタが増える。むしろラッキー。',
    '{X}…って、ドラマだったら主人公の見せ場の前フリ。BGM流れてる。',
    '{X}って思ってる時点で、あなたかなり真面目。サボれる人はそもそも気にしない。'
  ];

  // ── ポジティブ視点テンプレ ──
  var POSITIVE = [
    '{X}と感じているのは、それだけ大事に向き合っている証拠。気にしない人はそもそも考えない。',
    '{X}…でも、その気持ちに気づけたこと自体が、自分を大切にしている一歩です。',
    '{X}と思える今のあなたは、改善のヒントをすでに掴みかけている状態。',
    '{X}を心配できるのは、準備しようとする力がある証拠。何もしない人より一歩先にいます。',
    '{X}という不安は、「ちゃんとやりたい」という前向きな気持ちの裏返し。',
    '{X}…たとえそうなっても、そこから学べることは必ずある。経験値は減らない。',
    '{X}と感じる感受性こそ、あなたの強み。それを持てない人もたくさんいます。'
  ];

  // ── ツッコミ視点テンプレ ──
  var RETORT = [
    'いや、{X}って…まだ起きてないやん。先回りして悩む天才か？',
    '{X}を心配する前に、今日の晩ごはんの方が現実的やで。',
    '{X}って、それ最悪のケースでしょ？普通バージョンも一応考えとこ？',
    '「{X}」ってあなた、未来予知能力者なん？確定してから悩んでも遅くないで。',
    '{X}！…で、それで命取られるか？取られへんやろ。なら大丈夫。',
    '{X}を考えてる時間で、対策ひとつ進められるんちゃう？という自分へのツッコミ。',
    '{X}って思考、もう何回ループしてる？同じ場所でぐるぐるしてへん？'
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // 入力テキストの末尾整形（句点・改行を除去）
  function clean(text) {
    return text.trim().replace(/[\s\n\r]+/g, ' ').replace(/[。.!！?？]+$/g, '');
  }

  function reframe() {
    var raw = document.getElementById('worry').value;
    if (!raw || raw.trim().length === 0) {
      alert('不安・心配ごとを入力してください');
      return;
    }
    var text = clean(raw);
    var humor    = pick(HUMOR).replace(/\{X\}/g, text);
    var positive = pick(POSITIVE).replace(/\{X\}/g, text);
    var retort   = pick(RETORT).replace(/\{X\}/g, text);

    document.getElementById('r-humor').textContent    = humor;
    document.getElementById('r-positive').textContent = positive;
    document.getElementById('r-retort').textContent   = retort;
    document.getElementById('result-area').style.display = 'block';

    saveHistory(text);
    renderHistory();

    // 結果へスクロール
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(id, btn) {
    var t = document.getElementById(id).textContent;
    if (!t) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(function(){
        btn.textContent = 'コピーしました';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
      });
    } else {
      // フォールバック
      var ta = document.createElement('textarea');
      ta.value = t; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); btn.textContent = 'コピーしました'; btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
      } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  // ── 履歴管理 ──
  var HISTORY_KEY = 'reframe_history_v1';

  function loadHistory() {
    try {
      var raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
  }

  function saveHistory(text) {
    var hist = loadHistory();
    // 重複除去
    hist = hist.filter(function(x){ return x !== text; });
    hist.unshift(text);
    if (hist.length > 10) hist = hist.slice(0, 10);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch(e) {}
  }

  function renderHistory() {
    var hist = loadHistory();
    var list = document.getElementById('history-list');
    if (hist.length === 0) {
      list.innerHTML = '<p class="history-empty">まだ履歴はありません</p>';
      return;
    }
    list.innerHTML = hist.map(function(t, i){
      var safe = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      return '<div class="history-item" data-i="' + i + '">' + safe + '</div>';
    }).join('');
    Array.prototype.forEach.call(list.querySelectorAll('.history-item'), function(el){
      el.addEventListener('click', function(){
        var idx = parseInt(el.getAttribute('data-i'), 10);
        var h = loadHistory();
        if (h[idx] != null) {
          document.getElementById('worry').value = h[idx];
          document.getElementById('worry').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    });
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    try { localStorage.removeItem(HISTORY_KEY); } catch(e) {}
    renderHistory();
  }

  // 初期描画
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
