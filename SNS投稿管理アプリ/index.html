<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>SNS投稿管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>投稿を登録</h2>
      <div class="form-group">
        <label for="postDate">投稿予定日時</label>
        <input type="datetime-local" id="postDate">
      </div>
      <div class="form-group">
        <label for="snsPlatform">SNS種別</label>
        <select id="snsPlatform">
          <option value="Twitter/X">Twitter/X</option>
          <option value="Instagram">Instagram</option>
          <option value="Facebook">Facebook</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="postContent">投稿内容</label>
        <textarea id="postContent" placeholder="投稿内容を入力..." rows="4"></textarea>
      </div>
      <button id="addBtn" class="btn btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label>表示：</label>
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="未投稿">未投稿</button>
      <button class="filter-btn" data-filter="投稿済み">投稿済み</button>
    </section>

    <!-- 投稿一覧 -->
    <section class="list-section">
      <div id="postList"></div>
      <p id="emptyMsg" class="empty-msg">投稿が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
