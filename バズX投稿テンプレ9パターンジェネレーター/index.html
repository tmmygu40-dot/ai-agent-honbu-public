<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ バズX投稿テンプレ9パターンジェネレーター</title>
  <meta name="description" content="9つのバズるX投稿テンプレから好きなパターンを選んでコピー。瞬時にバズるX投稿を作成できるジェネレーターです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>✨ バズX投稿テンプレ9パターンジェネレーター</h1>
    <p class="subtitle">9つのバズるX投稿テンプレから好きなパターンを選んでコピー。瞬時にX投稿を作れます。</p>
  </header>

  <!-- テンプレ選択ボタン -->
  <div class="card">
    <p class="card-title">テンプレを選ぶ</p>
    <div id="template-buttons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
      <button class="template-btn" onclick="showTemplate(0)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ1</button>
      <button class="template-btn" onclick="showTemplate(1)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ2</button>
      <button class="template-btn" onclick="showTemplate(2)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ3</button>
      <button class="template-btn" onclick="showTemplate(3)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ4</button>
      <button class="template-btn" onclick="showTemplate(4)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ5</button>
      <button class="template-btn" onclick="showTemplate(5)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ6</button>
      <button class="template-btn" onclick="showTemplate(6)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ7</button>
      <button class="template-btn" onclick="showTemplate(7)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ8</button>
      <button class="template-btn" onclick="showTemplate(8)" style="padding: 0.8rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; transition: border-color 0.15s;">テンプレ9</button>
    </div>
  </div>

  <!-- テンプレ表示エリア -->
  <div class="result-card" id="result" style="display: none;">
    <p class="result-value" id="template-text" style="text-align: left; font-size: 1rem; font-weight: normal; white-space: pre-wrap; line-height: 1.6;"></p>
    <button class="btn-copy" onclick="copyToClipboard()" style="display: block; margin: 1rem auto 0; padding: 0.8rem 1.5rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem;">📋 コピーする</button>
  </div>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var templates = [
    "今って〇〇ですよね\n××は本当に～\n△△だからこそ✨\n\n→だからこそ○○が必要\n\n※参考：～～",
    "朗報です！\n××が～～になりました\n\n🎉 メリット1\n🎉 メリット2\n🎉 メリット3\n\nぜひチェック👇",
    "あるあるすぎる😂\n××の時ってみんな〇〇\nなぜかいつも△△\nわかる〜って人は\n\n→このやり方で解決",
    "質問です\nあなたは××派それとも〇〇派？\n\n実は～～なんです\nだから△△の方が…\n\n賛成？反対？コメントください👇",
    "××が話題ですね\n✅ メリット\n❌ デメリット\n\n結論：△△がおすすめ\n理由は～～だから\n\n参考になった？",
    "久々に××使ったら\n本当に〇〇になってた😳\n\nこんなに変わるなんて\n△△が理由みたい\n\n他にも気づいたことあります",
    "× そう思ってた\n○ 実はこう\n△ だからこうするべき\n\n～～で確認したので間違いなし\nリプで違う考え教えてください",
    "許可取った😂\n××が正式に〇〇になりました\n\nなぜか知らない人多い\n△△な場合は特に注意\n\n知ってた？",
    "ガチレビュー：××\n\n初心者向け：〇〇\nコスパ：△△\n使いやすさ：✅✅✅\n\nコスト：～～\n\n総合評価：⭐⭐⭐⭐⭐"
  ];

  var currentTemplate = -1;

  function showTemplate(idx) {
    currentTemplate = idx;
    var result = document.getElementById('result');
    var text = document.getElementById('template-text');
    text.textContent = templates[idx];
    result.style.display = '';
    localStorage.setItem('selectedTemplate', idx);
  }

  function copyToClipboard() {
    if (currentTemplate < 0) return;
    var text = document.getElementById('template-text').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('コピーしました！');
  }

  // ページ読み込み時に前回選択したテンプレを復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('selectedTemplate');
    if (saved !== null) {
      showTemplate(parseInt(saved));
    }
  });
  </script>
