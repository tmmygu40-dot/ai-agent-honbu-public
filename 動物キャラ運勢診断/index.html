<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動物キャラ運勢診断 | 5問で今日の運気をチェック</title>
  <meta name="description" content="5問サッと答えるだけで、今日の運気を動物キャラで判定。今日のコンディションを楽しく把握できる性格運勢診断です。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.96rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .q-options { display: flex; flex-direction: column; gap: 0.4rem; }
    .q-options label {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.7rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); cursor: pointer;
      font-size: 0.9rem; line-height: 1.4; transition: border-color 0.15s, background 0.15s;
    }
    .q-options label:hover { border-color: var(--accent); }
    .q-options input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .q-options input[type="radio"]:checked + .opt-text { color: var(--accent); font-weight: 700; }
    .q-options label:has(input:checked) { background: var(--accent-light); border-color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-emoji-big { font-size: 3.2rem; line-height: 1.1; margin-bottom: 0.2rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-fortune { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.5rem; }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.4rem; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🐾 動物キャラ運勢診断</h1>
    <p class="subtitle">5問サッと答えるだけで、今日の運気を動物キャラで判定。今日のコンディションを楽しく把握できる性格運勢診断です。</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">今日のあなたについて 5問</p>
    <div id="quiz"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">今日のあなたは</p>
    <p class="result-emoji-big" id="r-emoji">—</p>
    <p class="result-value" id="r-name">—</p>
    <p class="result-fortune" id="r-fortune">—</p>
    <p class="result-note" id="r-note"></p>
  </div>

  <!-- 詳細カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断データ</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは性格傾向と運気をエンタメ的に診断するもので、医学的・占術的な根拠を保証するものではありません。今日の気分づくりの参考にお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 動物キャラ定義 ──
  var ANIMALS = {
    dog:    { emoji: '🐶', name: 'いぬ',     desc: '元気で人懐っこいムード。素直に動くと運気アップ。', item: '明るい色のソックス' },
    cat:    { emoji: '🐱', name: 'ねこ',     desc: 'マイペースで観察上手な日。直感を信じてOK。',     item: 'お気に入りのマグカップ' },
    rabbit: { emoji: '🐰', name: 'うさぎ',   desc: '感受性が高く跳ねる日。新しい出会いに期待。',     item: 'ピンク色の小物' },
    fox:    { emoji: '🦊', name: 'きつね',   desc: '頭の回転が冴える日。アイデア勝負で吉。',         item: '手帳と新しいペン' },
    owl:    { emoji: '🦉', name: 'ふくろう', desc: '冷静沈着な賢者モード。情報整理がはかどる。',     item: '温かい紅茶' },
    bear:   { emoji: '🐻', name: 'くま',     desc: 'どっしり安定感ある日。じっくり取り組むと吉。',   item: 'お気に入りのブランケット' }
  };

  // ── 5問・各選択肢 ──
  // type: その動物に1点 / score: 運気スコア(1〜4)
  var QUESTIONS = [
    {
      q: 'Q1. 朝起きた瞬間の気分は？',
      opts: [
        { label: 'スッキリ目覚めた、最高',     type: 'dog',    score: 4 },
        { label: 'まあまあ、いつも通り',       type: 'cat',    score: 3 },
        { label: 'ちょっとだるい',             type: 'bear',   score: 2 },
        { label: '寝足りない…眠い',           type: 'owl',    score: 2 }
      ]
    },
    {
      q: 'Q2. 今日まずやりたいことは？',
      opts: [
        { label: '人と会って話す',             type: 'dog',    score: 4 },
        { label: '一人で集中して片付ける',     type: 'owl',    score: 3 },
        { label: '新しいことを試す',           type: 'fox',    score: 4 },
        { label: 'のんびり過ごす',             type: 'bear',   score: 2 }
      ]
    },
    {
      q: 'Q3. 今のテンションを色で例えると？',
      opts: [
        { label: 'オレンジ・赤系（情熱）',     type: 'fox',    score: 4 },
        { label: 'ピンク・パステル（柔らかさ）', type: 'rabbit', score: 3 },
        { label: '青・緑系（落ち着き）',       type: 'owl',    score: 3 },
        { label: '茶・ベージュ系（安定）',     type: 'bear',   score: 2 }
      ]
    },
    {
      q: 'Q4. 困ったことが起きた時の行動は？',
      opts: [
        { label: 'まず誰かに相談する',         type: 'dog',    score: 3 },
        { label: '自分で情報を集めて考える',   type: 'fox',    score: 4 },
        { label: '一旦距離を置いて様子を見る', type: 'cat',    score: 3 },
        { label: '感情のままに動いてしまう',   type: 'rabbit', score: 2 }
      ]
    },
    {
      q: 'Q5. 今日のラッキーを引き寄せたいのは？',
      opts: [
        { label: '仕事・勉強の成果',           type: 'fox',    score: 4 },
        { label: '人間関係・恋愛',             type: 'rabbit', score: 4 },
        { label: '健康・体調',                 type: 'bear',   score: 3 },
        { label: '心の余裕・癒やし',           type: 'cat',    score: 3 }
      ]
    }
  ];

  var STORE_KEY = 'animal-fortune';

  function renderQuiz() {
    var html = QUESTIONS.map(function(q, qi) {
      var opts = q.opts.map(function(o, oi) {
        return '<label>'
          + '<input type="radio" name="q' + qi + '" value="' + oi + '">'
          + '<span class="opt-text">' + o.label + '</span>'
          + '</label>';
      }).join('');
      return '<div class="q-block">'
        + '<p class="q-text">' + q.q + '</p>'
        + '<div class="q-options">' + opts + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('quiz').innerHTML = html;
  }

  function diagnose() {
    var picks = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) {
        showErr('Q' + (i + 1) + ' に答えてください');
        return;
      }
      picks.push(QUESTIONS[i].opts[parseInt(sel.value, 10)]);
    }

    // タイプ集計（最頻動物を選ぶ・同点は先勝ち）
    var typeCount = {};
    var totalScore = 0;
    picks.forEach(function(p) {
      typeCount[p.type] = (typeCount[p.type] || 0) + 1;
      totalScore += p.score;
    });
    var topType = null, topCount = -1;
    Object.keys(typeCount).forEach(function(k) {
      if (typeCount[k] > topCount) { topCount = typeCount[k]; topType = k; }
    });

    var animal = ANIMALS[topType];

    // 運気判定（合計スコア 5〜20 の範囲）
    var fortune, level;
    if (totalScore >= 17)      { fortune = '大吉'; level = 'ok';   }
    else if (totalScore >= 13) { fortune = '中吉'; level = 'ok';   }
    else if (totalScore >= 9)  { fortune = '小吉'; level = 'warn'; }
    else                       { fortune = '末吉'; level = 'warn'; }

    showResult(level, animal, fortune, totalScore);
    showDetail(animal, fortune, totalScore, typeCount);
    save({ type: topType, fortune: fortune, score: totalScore, date: new Date().toISOString() });
  }

  function showResult(level, animal, fortune, score) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('r-emoji').textContent = animal.emoji;
    document.getElementById('r-name').textContent  = animal.name + 'タイプ';
    document.getElementById('r-fortune').textContent = '今日の運気：' + fortune + '（' + score + '点 / 20点中）';
    document.getElementById('r-note').textContent  = animal.desc + ' ラッキーアイテムは「' + animal.item + '」。';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showDetail(animal, fortune, score, typeCount) {
    var rows = [
      ['動物キャラ', animal.emoji + ' ' + animal.name],
      ['今日の運気', fortune],
      ['運気スコア', score + ' 点 / 20点'],
      ['ラッキーアイテム', animal.item, true]
    ];
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
        + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('r-emoji').textContent = '⚠️';
    document.getElementById('r-name').textContent  = '入力不足';
    document.getElementById('r-fortune').textContent = '';
    document.getElementById('r-note').textContent  = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function save(obj) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch (e) {}
  }

  function loadLast() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var obj = JSON.parse(raw);
      if (!obj || !obj.type || !ANIMALS[obj.type]) return;
      // 直近結果のヒント表示（小さく）
      var hint = document.createElement('p');
      hint.style.cssText = 'max-width:600px;margin:0 auto 1rem;font-size:0.78rem;color:var(--text-sub);text-align:center;';
      hint.textContent = '前回の診断：' + ANIMALS[obj.type].emoji + ' ' + ANIMALS[obj.type].name + 'タイプ / ' + obj.fortune;
      var header = document.querySelector('.app-header');
      header.insertAdjacentElement('afterend', hint);
    } catch (e) {}
  }

  renderQuiz();
  loadLast();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
