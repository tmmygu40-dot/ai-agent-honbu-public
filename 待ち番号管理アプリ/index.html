<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待ち番号管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>待ち番号管理</h1>

    <!-- 呼び出し中 -->
    <section class="calling-section" id="callingSection">
      <p class="calling-label">呼び出し中</p>
      <div class="calling-number" id="callingNumber">—</div>
      <div class="calling-time" id="callingTime"></div>
      <div class="calling-actions" id="callingActions">
        <button class="btn btn-done" id="btnDone" onclick="completeCalling()">完了</button>
        <button class="btn btn-cancel" id="btnCancel" onclick="cancelCalling()">キャンセル</button>
      </div>
    </section>

    <!-- 操作ボタン -->
    <section class="actions">
      <button class="btn btn-issue" onclick="issueNumber()">＋ 新しい番号を発行</button>
      <button class="btn btn-call" onclick="callNext()" id="btnCallNext">次を呼ぶ</button>
    </section>

    <!-- 統計 -->
    <section class="stats">
      <div class="stat-item">
        <span class="stat-label">待ち人数</span>
        <span class="stat-value" id="waitCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">次の番号</span>
        <span class="stat-value" id="nextNumber">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">本日発行</span>
        <span class="stat-value" id="issuedCount">0</span>
      </div>
    </section>

    <!-- 待ち一覧 -->
    <section class="waiting-section">
      <h2>待ち一覧</h2>
      <ul class="waiting-list" id="waitingList">
        <li class="empty-msg">待ちはありません</li>
      </ul>
    </section>

    <!-- リセット -->
    <section class="reset-section">
      <button class="btn btn-reset" onclick="resetAll()">番号をリセット</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
