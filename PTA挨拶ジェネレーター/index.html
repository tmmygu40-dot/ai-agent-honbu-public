<html lang="ja">
<head>

  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok { display: block; border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1rem; font-weight: 600; line-height: 1.6; margin-bottom: 1rem; color: var(--text); }
    .btn-copy {
      display: block; width: 100%;
      margin: 0.5rem 0 0; padding: 0.6rem;
      font-size: 0.85rem; font-weight: 600;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #d06b00; }
    .btn-copy:active { transform: scale(0.98); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    function generate() {
      var pos = document.getElementById('position').value;
      var scene = document.getElementById('scene').value;

      if (!pos || !scene) {
        showError('⚠️ 立場とシーンを両方選択してください');
        return;
      }
      hideError();

      var key = pos + '_' + scene;
      var patterns = PATTERNS[key] || [];

      if (patterns.length === 0) {
        showError('⚠️ 申し訳ありません。このシーンはまだ用意されていません。');
        document.getElementById('results').innerHTML = '';
        return;
      }

      // #results へ .result-card.ok 要素を動的生成して書き込む
      var resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';
      patterns.forEach(function(text, idx) {
        var card = document.createElement('div');
        card.className = 'card result-card ok'; // .result-card.ok → CSS で display:block
        var label = document.createElement('p');
        label.className = 'result-label';
        label.textContent = 'パターン ' + (idx + 1);
        var value = document.createElement('p');
        value.className = 'result-value';
        value.textContent = text;
        var btn = document.createElement('button');
        btn.className = 'btn-copy';
        btn.textContent = '📋 コピー';
        btn.setAttribute('data-text', text);
        btn.addEventListener('click', function() { copyToClipboard(btn); });
        card.appendChild(label);
        card.appendChild(value);
        card.appendChild(btn);
        resultsEl.appendChild(card);
      });
      resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // localStorage に履歴を保存
      var history = JSON.parse(localStorage.getItem('pta-history') || '[]');
      history.push({ pos: pos, scene: scene, time: new Date().toLocaleString('ja-JP') });
      if (history.length > 10) history.shift();
      localStorage.setItem('pta-history', JSON.stringify(history));
    }

    function copyToClipboard(btn) {
      var text = btn.getAttribute('data-text');
      var orig = btn.textContent;
      function onSuccess() {
        btn.textContent = '✅ コピーしました';
        setTimeout(function() { btn.textContent = orig; }, 1500);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onSuccess).catch(function() { fallbackCopy(text, onSuccess); });
      } else {
        fallbackCopy(text, onSuccess);
      }
    }

    function fallbackCopy(text, cb) {
      var tmp = document.createElement('textarea');
      tmp.value = text;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      try { document.execCommand('copy'); if (cb) cb(); } catch (e) {}
      document.body.removeChild(tmp);
    }

    // ページ読み込み時に localStorage から履歴を復元
    window.addEventListener('load', function() {
      // 必要に応じて履歴の表示処理
    });
  </script>
