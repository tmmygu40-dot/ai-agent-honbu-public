<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイレシピノート</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🍳 マイレシピノート</h1>

    <!-- 検索エリア -->
    <section class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="食材名で検索（例：鶏肉、にんにく）">
        <button id="clearSearch">✕</button>
      </div>
      <div id="searchCount" class="search-count"></div>
    </section>

    <!-- レシピ登録フォーム -->
    <section class="form-section">
      <h2>レシピを登録</h2>
      <div class="form-group">
        <label for="recipeName">料理名 <span class="required">*</span></label>
        <input type="text" id="recipeName" placeholder="例：鶏の唐揚げ">
      </div>
      <div class="form-group">
        <label for="recipeIngredients">材料 <span class="required">*</span></label>
        <textarea id="recipeIngredients" placeholder="例：鶏もも肉 300g、醤油 大さじ2、にんにく 1片" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="recipeSteps">作り方 <span class="required">*</span></label>
        <textarea id="recipeSteps" placeholder="例：1. 鶏肉を一口大に切る&#10;2. 調味料に30分漬ける&#10;3. 180℃の油で揚げる" rows="5"></textarea>
      </div>
      <div class="form-group">
        <label for="recipeMemo">メモ（任意）</label>
        <input type="text" id="recipeMemo" placeholder="例：冷めても美味しい">
      </div>
      <button id="saveBtn" class="btn-primary">登録する</button>
    </section>

    <!-- レシピ一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>登録済みレシピ</h2>
        <span id="recipeCount" class="recipe-count"></span>
      </div>
      <div id="recipeList" class="recipe-list"></div>
    </section>
  </div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <h2 id="modalTitle"></h2>
      <div class="modal-section">
        <h3>材料</h3>
        <p id="modalIngredients"></p>
      </div>
      <div class="modal-section">
        <h3>作り方</h3>
        <p id="modalSteps"></p>
      </div>
      <div class="modal-memo" id="modalMemoWrap">
        <h3>メモ</h3>
        <p id="modalMemo"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
