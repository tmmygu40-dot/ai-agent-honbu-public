<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活防衛チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 固定費セクション ── */
    .expense-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 420px) {
      .expense-grid { grid-template-columns: 1fr; }
    }
    .expense-grid .field { margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-badge {
      display: inline-block; padding: 0.3rem 1rem;
      border-radius: 99px; font-size: 0.78rem; font-weight: 800;
      margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-badge { background: var(--ok);   color: #fff; }
    .result-card.warn .result-badge { background: var(--warn); color: #fff; }
    .result-card.ng   .result-badge { background: var(--ng);   color: #fff; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 判定基準 ── */
    .criteria {
      max-width: 600px; margin: 0 auto 1rem;
      display: flex; gap: 0.5rem;
    }
    .criteria-item {
      flex: 1; text-align: center; padding: 0.5rem 0.3rem;
      border-radius: 9px; font-size: 0.72rem; font-weight: 700;
    }
    .criteria-item.ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .criteria-item.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .criteria-item.ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🛡️ 生活防衛チェッカー</h1>
    <p class="subtitle">収入が止まったら何ヶ月生活できる？今すぐ確認</p>
  </header>

  <!-- 貯蓄残高カード -->
  <div class="card">
    <p class="card-title">貯蓄残高</p>
    <div class="field">
      <label for="savings">現在の貯蓄残高（円）</label>
      <input type="number" id="savings" placeholder="例: 1500000" inputmode="numeric">
      <p class="hint">預金口座の合計。投資は含めず現金・普通預金のみ推奨</p>
    </div>
  </div>

  <!-- 月固定費カード -->
  <div class="card">
    <p class="card-title">月の固定費・生活費</p>
    <div class="expense-grid">
      <div class="field">
        <label for="rent">家賃・住宅ローン（円）</label>
        <input type="number" id="rent" placeholder="例: 70000" inputmode="numeric">
      </div>
      <div class="field">
        <label for="food">食費（円）</label>
        <input type="number" id="food" placeholder="例: 40000" inputmode="numeric">
      </div>
      <div class="field">
        <label for="utility">水道光熱費（円）</label>
        <input type="number" id="utility" placeholder="例: 15000" inputmode="numeric">
      </div>
      <div class="field">
        <label for="comm">通信費（円）</label>
        <input type="number" id="comm" placeholder="例: 8000" inputmode="numeric">
      </div>
      <div class="field">
        <label for="ins">保険・社会保険料（円）</label>
        <input type="number" id="ins" placeholder="例: 20000" inputmode="numeric">
      </div>
      <div class="field">
        <label for="other">その他（交通・日用品等）（円）</label>
        <input type="number" id="other" placeholder="例: 20000" inputmode="numeric">
      </div>
    </div>
  </div>

  <!-- 判定基準 -->
  <div class="criteria">
    <div class="criteria-item ok">安全<br>6ヶ月以上</div>
    <div class="criteria-item warn">注意<br>3〜6ヶ月</div>
    <div class="criteria-item ng">危険<br>3ヶ月未満</div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">生活可能月数を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-badge" id="rb">—</p>
    <p class="result-label">生活可能月数</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var FIELDS = ['savings','rent','food','utility','comm','ins','other'];

  // ── localStorage 読み込み ──
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('seikatsu_boei');
    if (!saved) return;
    try {
      var data = JSON.parse(saved);
      FIELDS.forEach(function(id) {
        if (data[id] !== undefined) document.getElementById(id).value = data[id];
      });
    } catch(e) {}
  });

  function getVal(id) {
    var v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? 0 : v;
  }

  function calc() {
    var savings = getVal('savings');
    if (savings <= 0) { showErr('貯蓄残高を入力してください'); return; }

    var rent    = getVal('rent');
    var food    = getVal('food');
    var utility = getVal('utility');
    var comm    = getVal('comm');
    var ins     = getVal('ins');
    var other   = getVal('other');
    var monthly = rent + food + utility + comm + ins + other;

    if (monthly <= 0) { showErr('月の固定費・生活費を1項目以上入力してください'); return; }

    var months = savings / monthly;
    var monthsFloor = Math.floor(months * 10) / 10;

    var level, badge, note;
    if (months >= 6) {
      level = 'ok';
      badge = '✅ 安全';
      note  = '生活防衛資金として十分な水準です。万一の収入停止にも備えられています。';
    } else if (months >= 3) {
      level = 'warn';
      badge = '⚠️ 注意';
      note  = '最低ラインには達していますが、もう少し貯蓄を増やすと安心です。目標は6ヶ月分。';
    } else {
      level = 'ng';
      badge = '🚨 危険';
      note  = '収入が止まると3ヶ月以内に資金が底をつきます。今すぐ貯蓄を優先してください。';
    }

    // localStorage 保存
    var saveData = {};
    FIELDS.forEach(function(id) {
      saveData[id] = document.getElementById(id).value;
    });
    localStorage.setItem('seikatsu_boei', JSON.stringify(saveData));

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rb').textContent = badge;
    document.getElementById('rv').textContent = monthsFloor.toFixed(1) + ' ヶ月';
    document.getElementById('rn').textContent = note;

    var target6 = monthly * 6;
    var gap6 = target6 - savings;

    showDetail([
      ['現在の貯蓄残高', fmt(savings) + ' 円'],
      ['月の合計支出', fmt(monthly) + ' 円', true],
      ['─ 家賃・住宅ローン', fmt(rent) + ' 円'],
      ['─ 食費', fmt(food) + ' 円'],
      ['─ 水道光熱費', fmt(utility) + ' 円'],
      ['─ 通信費', fmt(comm) + ' 円'],
      ['─ 保険・社会保険料', fmt(ins) + ' 円'],
      ['─ その他', fmt(other) + ' 円'],
      ['生活可能月数', monthsFloor.toFixed(1) + ' ヶ月', true],
      ['6ヶ月達成に必要な追加貯蓄', gap6 > 0 ? fmt(gap6) + ' 円' : '達成済み'],
    ]);
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rb').textContent = '⚠️ 入力エラー';
    document.getElementById('rv').textContent = '—';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
