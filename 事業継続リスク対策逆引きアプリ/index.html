<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事業継続リスク対策逆引きアプリ</title>
  <meta name="description" content="停電・断水・物流停止・通信障害・スタッフ欠員のリスク種別を選ぶだけで、今すぐやるべき備えと対策を優先度つきで即確認できる中小企業向け事業継続対策逆引きアプリ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── リスク種別ボタン ── */
    .risk-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1.2rem;
    }
    .risk-btn {
      padding: 0.85rem 0.6rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text);
      border: 2px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .risk-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .risk-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .risk-btn .risk-icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }

    /* ── 対策リスト ── */
    .measure-list { display: none; }
    .phase-block { margin-bottom: 1.4rem; }
    .phase-block:last-child { margin-bottom: 0; }
    .phase-label {
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.08em;
      padding: 0.25rem 0.7rem; border-radius: 20px; display: inline-block;
      margin-bottom: 0.7rem;
    }
    .phase-now  .phase-label { background: var(--ng-bg);   color: var(--ng);   border: 1.5px solid var(--ng);   }
    .phase-week .phase-label { background: var(--warn-bg); color: var(--warn); border: 1.5px solid var(--warn); }
    .phase-prep .phase-label { background: var(--ok-bg);   color: var(--ok);   border: 1.5px solid var(--ok);   }

    /* ── チェック項目 ── */
    .check-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.65rem 0.4rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; margin-top: 0.1rem; }
    .check-item .check-text { font-size: 0.9rem; color: var(--text); line-height: 1.45; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.55;
    }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; margin: 0.6rem auto 0; padding: 0.45rem 1rem;
      font-size: 0.78rem; font-weight: 600;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; max-width: 600px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .risk-grid, .back-link, #fav-widget, .no-print, .btn-reset { display: none !important; }
      .card, .measure-list { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>事業継続リスク対策逆引きアプリ</h1>
    <p class="subtitle">リスクを選ぶだけ → 今すぐやるべき備えを優先度つきで即表示</p>
  </header>

  <!-- リスク種別選択 -->
  <div class="card">
    <p class="card-title">リスク種別を選択</p>
    <p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:0.9rem;">直面しているリスク（または備えたいリスク）を選んでください</p>
    <div class="risk-grid" style="padding:0;max-width:100%;">
      <button class="risk-btn" onclick="selectRisk('power')" id="btn-power">
        <span class="risk-icon">⚡</span>停電
      </button>
      <button class="risk-btn" onclick="selectRisk('water')" id="btn-water">
        <span class="risk-icon">💧</span>断水
      </button>
      <button class="risk-btn" onclick="selectRisk('logistics')" id="btn-logistics">
        <span class="risk-icon">🚛</span>物流停止
      </button>
      <button class="risk-btn" onclick="selectRisk('comms')" id="btn-comms">
        <span class="risk-icon">📡</span>通信障害
      </button>
      <button class="risk-btn" onclick="selectRisk('staff')" id="btn-staff" style="grid-column:1/-1;">
        <span class="risk-icon">🏥</span>スタッフ欠員（感染症・急病）
      </button>
    </div>
  </div>

  <!-- 対策リスト（JS で表示切替） -->
  <div class="card measure-list" id="measure-list">
    <p class="card-title" id="measure-title">対策リスト</p>

    <div class="phase-block phase-now">
      <p class="phase-label">🔴 今すぐやること</p>
      <div id="phase-now-list"></div>
    </div>

    <div class="phase-block phase-week">
      <p class="phase-label">🟡 1週間以内にやること</p>
      <div id="phase-week-list"></div>
    </div>

    <div class="phase-block phase-prep">
      <p class="phase-label">🟢 事前備え（平時にやっておくこと）</p>
      <div id="phase-prep-list"></div>
    </div>
  </div>

  <button class="btn-reset no-print" id="btn-reset" onclick="resetChecks()" style="display:none;">チェックをリセット</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、内閣府（防災）・中小企業庁・経済産業省・消防庁などの公開資料を参考に、事業継続対策の目安として整理しています。実際の対策は事業規模・業種・状況に応じてご判断ください。2026年4月時点の参考情報です。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var RISKS = {
    power: {
      label: '⚡ 停電',
      now: [
        'UPS（無停電電源装置）の残量・動作を確認する',
        '重要データの手動バックアップ（クラウド同期確認）を行う',
        '照明・懐中電灯・発電機の場所と使い方を全員で確認する',
        '冷蔵・冷凍品の保存限界時間を把握し、廃棄判断ラインを決める',
        '停電継続が予想される場合、顧客・取引先へ状況を速報する',
      ],
      week: [
        '電力会社への復旧見込み確認と業務停止の可否判断を行う',
        '代替電力（ポータブル発電機・レンタル発電機）の手配先をリスト化する',
        'ネット受注・電子決済が止まった場合の代替手順（手書き対応等）を整備する',
        '在庫状況を確認し、出荷優先順位を決める',
        '損害状況の記録・保険会社への連絡を行う',
      ],
      prep: [
        '発電機・燃料の備蓄量を定期確認し、半年以内に動作テストを行う',
        'UPSのバッテリー劣化チェックを年1回実施する',
        '停電時の業務継続手順書（紙・オフライン版）を作成しておく',
        '電力需要の高い設備はIoT電力監視を導入し異常を早期検知する',
        '太陽光パネル＋蓄電池の導入可否を検討する',
      ],
    },
    water: {
      label: '💧 断水',
      now: [
        '断水前にポリタンク・バケツ・浴槽に水を確保する（飲料水は別途確保）',
        'トイレ用水（流し水）の確保量を計算し、バケツに備蓄する',
        '飲料水の在庫（ボトルウォーター）を確認し、不足なら手配する',
        '食器・機材の洗浄を要する業務を一時停止する判断をする',
        '水を使う製造・調理工程がある場合は業務停止の通知を関係者に行う',
      ],
      week: [
        '給水車・近隣給水スポットの場所と受け取り手順を確認する',
        '断水継続時の仕入れ・製造見通しを取引先に連絡する',
        '業務再開条件（水量・水質）を決め、準備基準を明確にする',
        '簡易トイレ・節水型設備のレンタル・導入を検討する',
        '損害状況の記録・保険会社への連絡を行う',
      ],
      prep: [
        '事業所内に飲料水200L以上の備蓄を常時確保しておく',
        '貯水タンクの設置・定期点検（年1回以上）を行う',
        '水を使う工程ごとに最低必要水量を洗い出し、断水時の稼働可否を整理する',
        '断水時の調理・洗浄代替手順を手順書化しておく',
        '水道局の断水情報メール配信サービスに登録しておく',
      ],
    },
    logistics: {
      label: '🚛 物流停止',
      now: [
        '現在の在庫量を確認し、何日分の営業が可能かを把握する',
        '取引中の配送業者へ状況確認（遅延日数・再開見込み）の連絡を入れる',
        '顧客への出荷遅延・欠品の速報を行う（謝罪＋再開見込みを明記）',
        '代替配送業者・運送会社の候補をリストアップする',
        '生産・発注のペースを在庫見合いに調整し、過剰発注を止める',
      ],
      week: [
        '代替ルート（別業者・自社配送・宅配便切替）を仮手配する',
        '仕入れ先・製造委託先の在庫・生産状況を確認し、調達見通しを立てる',
        '緊急発注が必要な品目を優先順位つきでリスト化する',
        '顧客への納期見直し・契約変更が必要な案件を洗い出す',
        '損害状況の記録・保険（物流保険・PL保険等）の適用確認を行う',
      ],
      prep: [
        '主要仕入れ先は最低2社確保し、調達分散しておく',
        '在庫安全在庫（最低1ヶ月分）の管理基準を設ける',
        '配送業者を複数登録し、価格・納期・緊急対応力を定期比較する',
        '物流停止シナリオでのリードタイム延長を前提とした受注・生産計画を検討する',
        'BCPを作成し、物流停止時の判断基準・連絡フローを文書化しておく',
      ],
    },
    comms: {
      label: '📡 通信障害',
      now: [
        '通信障害の範囲（固定回線・携帯・インターネット）を確認する',
        '社員・取引先への緊急連絡手段（別キャリアのスマホ・固定電話・FAX）に切り替える',
        '受発注・問い合わせ対応が止まる旨を即時アナウンス（SNS・HPが使えれば活用）する',
        'オンラインシステム（受注管理・勤怠・クラウド会計）がオフライン時の代替手順を確認する',
        '重要なデータを手元（PC・USB）に手動ダウンロードして保全する',
      ],
      week: [
        '通信回線の復旧見込みを通信事業者へ確認し、代替回線（ポケットWi-Fi・SIMカード）を手配する',
        'メール不達・受注漏れがないか遡って確認し、必要なら先方へ確認連絡を入れる',
        '通信障害時に使えるオフライン業務手順書（紙ベース）を整備する',
        '通信障害で発生した損失・機会損失を記録し、保険適用の有無を確認する',
      ],
      prep: [
        '固定回線とモバイル回線（異なるキャリア）の2系統確保を検討する',
        '社員の個人携帯番号リスト（緊急連絡先）を紙でも保管しておく',
        'クラウドサービスは最低限のオフライン動作ができる設定にしておく',
        '通信障害時の顧客向けアナウンス文のテンプレートを事前作成しておく',
        '拠点間の連絡手段にFAX・衛星回線の代替手段を検討する',
      ],
    },
    staff: {
      label: '🏥 スタッフ欠員（感染症・急病）',
      now: [
        '欠員人数と欠員業務（担当業務）を即時把握する',
        '残りスタッフで対応できる業務を絞り込み、優先業務を決める',
        '他部署・パート・アルバイトからの即時応援要請ができるか確認する',
        '欠員者の担当業務の引き継ぎ手順書（またはメモ）が存在するか確認する',
        '顧客・取引先に影響が出る場合は速報（納期遅延・対応遅延の連絡）を入れる',
      ],
      week: [
        '欠員継続日数の見通しを把握し、業務体制の組み替えを行う',
        '外部人材（人材派遣・業務委託）の手配が必要かを判断し、問い合わせを開始する',
        '欠員業務の一時停止・外部委託・自動化ができないかを検討する',
        '感染症の場合は職場内感染拡大防止措置（消毒・テレワーク・時差出勤）を実施する',
        '欠員期間中の労務・給与処理（傷病手当金・代替雇用等）を確認する',
      ],
      prep: [
        '全業務の担当者を最低2名体制にし、バックアップ担当者を決めておく',
        '業務マニュアル・引き継ぎ手順書を全業務分作成・更新しておく',
        '感染症流行時のテレワーク・時差出勤ポリシーを事前に決めておく',
        '人材派遣会社と事前に契約（または仮登録）しておく',
        '有給消化状況・欠員リスクが高い繁忙期を把握し、計画的に人員確保する',
      ],
    },
  };

  var currentRisk = null;

  function selectRisk(riskKey) {
    currentRisk = riskKey;
    // ボタンの active 切替
    var btns = document.querySelectorAll('.risk-btn');
    for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
    document.getElementById('btn-' + riskKey).classList.add('active');

    var risk = RISKS[riskKey];
    document.getElementById('measure-title').textContent = risk.label + '　対策リスト';

    renderPhase('phase-now-list',  risk.now,  riskKey + '_now');
    renderPhase('phase-week-list', risk.week, riskKey + '_week');
    renderPhase('phase-prep-list', risk.prep, riskKey + '_prep');

    document.getElementById('measure-list').style.display = 'block';
    document.getElementById('btn-reset').style.display = 'block';

    // スクロール
    document.getElementById('measure-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderPhase(containerId, items, storagePrefix) {
    var container = document.getElementById(containerId);
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var key = storagePrefix + '_' + i;
      var checked = localStorage.getItem(key) === '1';
      html += '<label class="check-item">'
            + '<input type="checkbox"' + (checked ? ' checked' : '') + ' onchange="saveCheck(\'' + key + '\', this.checked)">'
            + '<span class="check-text">' + escHtml(items[i]) + '</span>'
            + '</label>';
    }
    container.innerHTML = html;
  }

  function saveCheck(key, checked) {
    if (checked) { localStorage.setItem(key, '1'); }
    else { localStorage.removeItem(key); }
  }

  function resetChecks() {
    if (!currentRisk) return;
    var prefixes = [currentRisk + '_now', currentRisk + '_week', currentRisk + '_prep'];
    for (var p = 0; p < prefixes.length; p++) {
      var items = RISKS[currentRisk][p === 0 ? 'now' : p === 1 ? 'week' : 'prep'];
      for (var i = 0; i < items.length; i++) {
        localStorage.removeItem(prefixes[p] + '_' + i);
      }
    }
    selectRisk(currentRisk);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
