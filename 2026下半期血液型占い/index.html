<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="血液型と生まれ月を選ぶだけで、2026年7-12月の運勢テーマ・ラッキーカラー・開運アクション・注意点が分かる無料の下半期占いです。GW明けの運気切替や夏からの目標決めにどうぞ。">
  <title>2026下半期血液型占い｜血液型×生まれ月で7-12月のテーマを占う</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; line-height: 1.5; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.4; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .advice-row { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .advice-row:last-child { border-bottom: none; }
    .advice-label { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .advice-text { font-size: 0.95rem; color: var(--text); line-height: 1.5; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>2026下半期血液型占い</h1>
    <p class="subtitle">血液型×生まれ月で、2026年7-12月のテーマ運勢を占います<br>※2026年下半期の参考占い。最新情報は公式情報をご確認ください</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="blood">血液型</label>
      <select id="blood">
        <option value="">選んでください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
    <div class="field">
      <label for="month">生まれ月</label>
      <select id="month">
        <option value="">選んでください</option>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">占う</button>

  <div class="result-card" id="result">
    <p class="result-label">2026下半期(7-12月) あなたのテーマ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">運勢の詳細</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <div class="card" id="advice" style="display:none">
    <p class="card-title">開運アドバイス</p>
    <div class="advice-row">
      <p class="advice-label">🎨 ラッキーカラー</p>
      <p class="advice-text" id="ac-color"></p>
    </div>
    <div class="advice-row">
      <p class="advice-label">✨ 開運アクション</p>
      <p class="advice-text" id="ac-action"></p>
    </div>
    <div class="advice-row">
      <p class="advice-label">⚠️ 注意点</p>
      <p class="advice-text" id="ac-caution"></p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 一般的な占い・性格分類の知見を参考に、楽しみながら使えるよう整理しています。判断に迷った時の参考程度にお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  const STORAGE_KEY = 'uranai_2026h2_v1';

  const THEMES = {
    A: [
      '計画を整え直す半年', '信頼を積み上げる半年', '基礎を固め直す半年', '細部に光が当たる半年',
      '安心の土台を作る半年', '静かに前進する半年', '守りで強くなる半年', '段取り力で勝つ半年',
      '整理整頓で運上昇の半年', '慎重さが報われる半年', '支える人として輝く半年', '完成度を高める半年'
    ],
    B: [
      '直感を信じて動く半年', '趣味が運を呼ぶ半年', '自由が広がる半年', '突発の出会いを楽しむ半年',
      '軽やかに動き回る半年', '旅と冒険の半年', '好奇心が道を開く半年', '深掘りが当たる半年',
      '変化を恐れない半年', 'ひらめきが冴える半年', '自分のペースを貫く半年', '自由表現で輝く半年'
    ],
    O: [
      '攻めて運をつかむ半年', 'リーダー役で輝く半年', '行動量が結果を呼ぶ半年', '大きく動いて吉の半年',
      '仲間と笑い合う半年', '思い切りが幸運の半年', '挑戦が実を結ぶ半年', '度胸が運を呼ぶ半年',
      '大舞台に立つ半年', '直球勝負が吉の半年', '仲間運が爆上がりの半年', '締めくくりに大きな実りの半年'
    ],
    AB: [
      '学びが運を引き寄せる半年', '二面性が魅力になる半年', '知性で道を切り開く半年', '縁が知識を運ぶ半年',
      '静と動を使い分ける半年', '観察力が冴える半年', '学びと出会いが交差する半年', 'アイデアで突破する半年',
      '結びつける役で輝く半年', '戦略的に動いて吉の半年', '知識が自信になる半年', '総まとめで成果を出す半年'
    ]
  };

  const LUCKY_COLOR = [
    'シルバー（凛とした始動を後押し）',
    'ラベンダー（柔らかい気の流れを呼ぶ）',
    'ペールピンク（人間関係をなめらかに）',
    'ライトグリーン（新しい循環を作る）',
    'ターコイズ（風通しを良くする）',
    'アジサイブルー（落ち着きと判断力UP）',
    'マリンブルー（決断と前進を助ける）',
    'ヒマワリイエロー（行動エネルギー全開）',
    'ムーンゴールド（実りと豊かさを象徴）',
    'モミジオレンジ（暖かい縁を引き寄せる）',
    'ボルドー（深い満足と達成を呼ぶ）',
    'スノーホワイト（締めくくりと浄化）'
  ];

  const ACTIONS = {
    A:  '朝の5分でその日のToDoを3つだけ書き出す。書く＝整うが運気の起点になります。',
    B:  '行きたいと思った場所へ思いつきで行ってみる。予定通りより寄り道に運気が宿ります。',
    O:  'しばらく連絡していなかった友人に一言メッセージを送る。動いた分だけ運が返ってきます。',
    AB: '気になっていた分野の本を1冊だけ買って読み始める。知識のストックが下半期の武器になります。'
  };

  const CAUTIONS = {
    A:  '完璧主義で動けなくなる時期に注意。70点で出して後で直す姿勢が運を呼びます。',
    B:  '飽きやすい時期。せめて1つは最後までやり切ると、信用と運気が積み上がります。',
    O:  '押し通しすぎに注意。相手の話を最後まで聞く5秒で、人間関係が安定します。',
    AB: '気分の二極化に注意。中庸を意識し、極端な決断は1日寝かせてからにしましょう。'
  };

  function calc() {
    const blood = document.getElementById('blood').value;
    const monthStr = document.getElementById('month').value;
    if (!blood || !monthStr) { showErr('血液型と生まれ月を選んでください'); return; }
    const month = parseInt(monthStr, 10);

    const theme   = THEMES[blood][month - 1];
    const color   = LUCKY_COLOR[month - 1];
    const action  = ACTIONS[blood];
    const caution = CAUTIONS[blood];

    showResult('ok', theme, blood + '型 / ' + month + '月生まれ のあなたへ');

    document.getElementById('db').innerHTML =
      '<tr><td>占い対象</td><td>' + blood + '型 × ' + month + '月生まれ</td></tr>'
      + '<tr><td>テーマ期間</td><td>2026年7月〜12月</td></tr>'
      + '<tr class="hl"><td>下半期キーワード</td><td>' + getKeyword(blood) + '</td></tr>';
    document.getElementById('detail').style.display = 'block';

    document.getElementById('ac-color').textContent   = color;
    document.getElementById('ac-action').textContent  = action;
    document.getElementById('ac-caution').textContent = caution;
    document.getElementById('advice').style.display = 'block';

    saveInput(blood, monthStr);
  }

  function getKeyword(b) {
    return { A:'整える', B:'動く', O:'攻める', AB:'学ぶ' }[b] || '—';
  }

  function showResult(level, val, note) {
    const rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice').style.display = 'none';
  }

  function saveInput(blood, month) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ blood: blood, month: month })); } catch(e) {}
  }
  function loadInput() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      const o = JSON.parse(s);
      if (o.blood) document.getElementById('blood').value = o.blood;
      if (o.month) document.getElementById('month').value = o.month;
    } catch(e) {}
  }
  window.addEventListener('load', loadInput);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
