<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスク断捨離チェッカー｜月額固定費の見直しに</title>
  <meta name="description" content="使ってるサブスクの名前・月額・利用頻度を入れるだけで、断捨離候補・要検討・キープを即仕分け。解約すれば月いくら浮くか年いくら浮くかが一目で分かる無料アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* サブスクリスト */
    .sub-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
    }
    .sub-item:last-child { border-bottom: none; }
    .sub-tag {
      flex-shrink: 0; padding: 0.2rem 0.55rem;
      font-size: 0.7rem; font-weight: 700; border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .sub-tag.ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .sub-tag.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .sub-tag.ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
    .sub-name { flex: 1; font-size: 0.92rem; font-weight: 600; line-height: 1.3; word-break: break-word; }
    .sub-price { flex-shrink: 0; font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .sub-del {
      flex-shrink: 0; background: transparent; border: 1px solid var(--border);
      color: var(--text-sub); font-size: 0.75rem; padding: 0.3rem 0.55rem;
      border-radius: 8px; cursor: pointer;
    }
    .sub-del:hover { border-color: var(--ng); color: var(--ng); }
    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .sub-del, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>サブスク断捨離チェッカー</h1>
    <p class="subtitle">月額・利用頻度を入れるだけで「キープ／要検討／断捨離候補」を即仕分け。解約すればいくら浮くか可視化。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">サブスクを追加</p>
    <div class="field">
      <label for="sName">サービス名</label>
      <input type="text" id="sName" placeholder="例: 動画見放題サービス">
    </div>
    <div class="field">
      <label for="sPrice">月額（円）</label>
      <input type="number" id="sPrice" placeholder="例: 990" inputmode="numeric">
    </div>
    <div class="field">
      <label for="sFreq">利用頻度</label>
      <select id="sFreq">
        <option value="daily">ほぼ毎日使う</option>
        <option value="weekly">週1〜数回使う</option>
        <option value="monthly">月1〜2回しか使わない</option>
        <option value="rare">ほぼ使ってない</option>
      </select>
      <p class="hint">頻度で「キープ／要検討／断捨離候補」が自動判定されます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="addSub()">追加する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">解約すれば年間</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">集計</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 一覧カード -->
  <div class="card" id="listCard" style="display:none">
    <p class="card-title">登録中のサブスク</p>
    <div id="subList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、消費者庁・総務省（家計調査）などの公開データを参考に、固定費見直しの目安として使いやすく整理しています。判定は頻度ベースの簡易ロジックです。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'subscDeclutterCheckerV1';
  var subs = [];

  var FREQ_LABEL = {
    daily:   { tag: 'ok',   text: 'ほぼ毎日',  judge: 'キープ' },
    weekly:  { tag: 'ok',   text: '週1〜数回',  judge: 'キープ' },
    monthly: { tag: 'warn', text: '月1〜2回',   judge: '要検討' },
    rare:    { tag: 'ng',   text: 'ほぼ未使用', judge: '断捨離候補' }
  };

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr)) subs = arr;
      }
    } catch (e) { subs = []; }
    render();
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(subs)); } catch (e) {}
  }

  function addSub() {
    var name = (document.getElementById('sName').value || '').trim();
    var price = parseFloat(document.getElementById('sPrice').value);
    var freq = document.getElementById('sFreq').value;
    if (!name) { showErr('サービス名を入力してください'); return; }
    if (isNaN(price) || price < 0) { showErr('月額（円）を正しく入力してください'); return; }
    if (!FREQ_LABEL[freq]) { showErr('利用頻度を選んでください'); return; }
    subs.push({ id: Date.now() + Math.floor(Math.random()*1000), name: name, price: Math.round(price), freq: freq });
    save();
    document.getElementById('sName').value = '';
    document.getElementById('sPrice').value = '';
    document.getElementById('sFreq').value = 'daily';
    render();
  }

  function delSub(id) {
    subs = subs.filter(function(s){ return s.id !== id; });
    save();
    render();
  }

  function render() {
    var listCard = document.getElementById('listCard');
    var listEl = document.getElementById('subList');

    if (subs.length === 0) {
      listCard.style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('detail').style.display = 'none';
      return;
    }

    // リスト
    var html = subs.map(function(s){
      var info = FREQ_LABEL[s.freq] || FREQ_LABEL.daily;
      var safeName = String(s.name).replace(/[&<>"']/g, function(c){
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
      return '<div class="sub-item">'
           + '<span class="sub-tag ' + info.tag + '">' + info.judge + '</span>'
           + '<span class="sub-name">' + safeName + '<br><small style="font-weight:400;color:var(--text-sub);font-size:0.72rem;">' + info.text + '</small></span>'
           + '<span class="sub-price">' + s.price.toLocaleString('ja-JP') + '円/月</span>'
           + '<button class="sub-del" onclick="delSub(' + s.id + ')">削除</button>'
           + '</div>';
    }).join('');
    listEl.innerHTML = html;
    listCard.style.display = '';

    // 集計
    var total = 0, cancelTotal = 0, reviewTotal = 0, keepTotal = 0;
    var cancelCount = 0, reviewCount = 0, keepCount = 0;
    subs.forEach(function(s){
      var info = FREQ_LABEL[s.freq] || FREQ_LABEL.daily;
      total += s.price;
      if (info.tag === 'ng') { cancelTotal += s.price; cancelCount++; }
      else if (info.tag === 'warn') { reviewTotal += s.price; reviewCount++; }
      else { keepTotal += s.price; keepCount++; }
    });

    // 結論カード（年間で浮く額）
    var rc = document.getElementById('result');
    var rv = document.getElementById('rv');
    var rn = document.getElementById('rn');
    var level = cancelTotal > 0 ? 'ng' : reviewTotal > 0 ? 'warn' : 'ok';
    var topLabel = level === 'ng' ? '解約すれば年間' : level === 'warn' ? '見直し候補は年間' : '今のところ無駄なし';
    var noteMsg;
    if (cancelTotal > 0) {
      noteMsg = '断捨離候補が ' + cancelCount + '件。月 ' + cancelTotal.toLocaleString('ja-JP') + '円 を解約すれば年間で大きく浮きます。';
    } else if (reviewTotal > 0) {
      noteMsg = '要検討が ' + reviewCount + '件。本当に必要か一度見直してみましょう。';
    } else {
      noteMsg = '登録中のサブスクはすべて活用できています。';
    }
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.querySelector('#result .result-label').textContent = topLabel;
    rv.textContent = (cancelTotal > 0 ? cancelTotal*12 : reviewTotal > 0 ? reviewTotal*12 : 0).toLocaleString('ja-JP') + ' 円';
    rn.textContent = noteMsg;

    // 内訳
    var rows = [
      ['月額合計',           total.toLocaleString('ja-JP') + ' 円', false],
      ['年額合計',           (total*12).toLocaleString('ja-JP') + ' 円', false],
      ['キープ（' + keepCount + '件）',         keepTotal.toLocaleString('ja-JP') + ' 円/月', false],
      ['要検討（' + reviewCount + '件）',       reviewTotal.toLocaleString('ja-JP') + ' 円/月', false],
      ['断捨離候補（' + cancelCount + '件）',   cancelTotal.toLocaleString('ja-JP') + ' 円/月', true],
      ['断捨離した場合の年間節約額',             (cancelTotal*12).toLocaleString('ja-JP') + ' 円', true]
    ];
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.querySelector('#result .result-label').textContent = '入力エラー';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
