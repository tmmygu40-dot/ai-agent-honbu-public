<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語彙クイズアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>語彙クイズ</h1>
      <div class="stats">
        <span>正解: <strong id="correct-count">0</strong></span>
        <span>不正解: <strong id="wrong-count">0</strong></span>
        <span>正解率: <strong id="accuracy">-%</strong></span>
      </div>
    </header>

    <main>
      <div class="quiz-card" id="quiz-card">
        <div class="category" id="category"></div>
        <div class="question" id="question"></div>

        <div class="answer-section hidden" id="answer-section">
          <div class="reading" id="reading"></div>
          <div class="meaning" id="meaning"></div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="show-answer-btn" onclick="showAnswer()">答えを見る</button>
          <button class="btn btn-correct hidden" id="correct-btn" onclick="answer(true)">正解 ✓</button>
          <button class="btn btn-wrong hidden" id="wrong-btn" onclick="answer(false)">不正解 ✗</button>
        </div>
      </div>

      <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">次の問題へ</button>

      <div class="progress">
        <span id="progress-text">問題を読んで答えを考えてみましょう</span>
      </div>
    </main>

    <footer>
      <button class="btn btn-reset" onclick="resetStats()">記録をリセット</button>
    </footer>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
