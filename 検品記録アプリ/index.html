<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検品記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>検品記録アプリ</h1>

    <!-- サマリー -->
    <section class="summary">
      <div class="summary-card total">
        <div class="summary-label">総検品数</div>
        <div class="summary-value" id="totalCount">0</div>
      </div>
      <div class="summary-card pass">
        <div class="summary-label">合格</div>
        <div class="summary-value" id="passCount">0</div>
      </div>
      <div class="summary-card fail">
        <div class="summary-label">不良</div>
        <div class="summary-value" id="failCount">0</div>
      </div>
      <div class="summary-card rate">
        <div class="summary-label">不良率</div>
        <div class="summary-value" id="failRate">0.0%</div>
      </div>
    </section>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>検品入力</h2>
      <div class="form-group">
        <label for="productName">製品名</label>
        <input type="text" id="productName" placeholder="例：部品A" maxlength="50">
      </div>
      <div class="form-group">
        <label>検品結果</label>
        <div class="radio-group">
          <label class="radio-label pass-label">
            <input type="radio" name="result" value="pass" checked> 合格
          </label>
          <label class="radio-label fail-label">
            <input type="radio" name="result" value="fail"> 不良
          </label>
        </div>
      </div>
      <div class="form-group" id="reasonGroup" style="display:none;">
        <label for="failReason">不良理由</label>
        <input type="text" id="failReason" placeholder="例：傷・変形・寸法不良" maxlength="100">
      </div>
      <button class="btn-add" id="addBtn">記録する</button>
    </section>

    <!-- 製品別集計 -->
    <section class="stats-section" id="statsSection" style="display:none;">
      <h2>製品別集計</h2>
      <div id="statsTable"></div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <button class="btn-clear" id="clearBtn">全件削除</button>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-msg">記録はまだありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
