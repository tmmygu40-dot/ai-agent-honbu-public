<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>守護動物スピリチュアル診断｜3択5問で今のあなたの守護動物が分かる</title>
  <meta name="description" content="3択5問に答えるだけで、今のあなたを見守る守護動物（狼・鷹・亀・蝶・猫）が分かるスピリチュアル診断。動物ごとの性格と今日のメッセージで自分を見つめ直せます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #8b5cf6;
      --accent-light: #f5f0ff;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.4rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--text); }

    .opt {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.75rem 0.8rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #6d28d9, 0 6px 16px rgba(139,92,246,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #6d28d9, 0 2px 8px rgba(139,92,246,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      background: var(--accent-light);
    }
    .result-emoji { font-size: 3.5rem; line-height: 1.1; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-trait { font-size: 1rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.8rem; color: var(--text); }
    .result-msg { font-size: 0.92rem; color: var(--text-sub); line-height: 1.7; text-align: left; padding: 0.8rem 0.9rem; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>守護動物スピリチュアル診断</h1>
    <p class="subtitle">3択5問で今のあなたの守護動物が分かる ／ ※エンタメ目的の簡易診断です</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">5問の質問</p>

    <div class="q-block">
      <p class="q-title">Q1. 休日の理想の過ごし方は？</p>
      <label class="opt"><input type="radio" name="q1" value="A"><span class="opt-text">A. 仲間と外でアクティブに動く</span></label>
      <label class="opt"><input type="radio" name="q1" value="B"><span class="opt-text">B. 静かな場所で本やひとり時間</span></label>
      <label class="opt"><input type="radio" name="q1" value="C"><span class="opt-text">C. 気の向くまま予定を決めずに出かける</span></label>
    </div>

    <div class="q-block">
      <p class="q-title">Q2. 困ったとき、まず何をする？</p>
      <label class="opt"><input type="radio" name="q2" value="A"><span class="opt-text">A. すぐ動いて行動で解決する</span></label>
      <label class="opt"><input type="radio" name="q2" value="B"><span class="opt-text">B. 全体を観察して原因を分析する</span></label>
      <label class="opt"><input type="radio" name="q2" value="C"><span class="opt-text">C. 一旦落ち着いて時間をかけて考える</span></label>
    </div>

    <div class="q-block">
      <p class="q-title">Q3. 友達と一緒のとき、自分は？</p>
      <label class="opt"><input type="radio" name="q3" value="A"><span class="opt-text">A. グループを引っぱるリーダー役</span></label>
      <label class="opt"><input type="radio" name="q3" value="B"><span class="opt-text">B. 空気を読んで全体を支える</span></label>
      <label class="opt"><input type="radio" name="q3" value="C"><span class="opt-text">C. 自分のペースで居心地よく過ごす</span></label>
    </div>

    <div class="q-block">
      <p class="q-title">Q4. 新しいチャンスがやってきたら？</p>
      <label class="opt"><input type="radio" name="q4" value="A"><span class="opt-text">A. しっかり準備してから慎重に進む</span></label>
      <label class="opt"><input type="radio" name="q4" value="B"><span class="opt-text">B. ワクワクが先に立ってすぐ飛び込む</span></label>
      <label class="opt"><input type="radio" name="q4" value="C"><span class="opt-text">C. 興味があれば自分のタイミングで試す</span></label>
    </div>

    <div class="q-block">
      <p class="q-title">Q5. 自分の強みだと感じるのは？</p>
      <label class="opt"><input type="radio" name="q5" value="A"><span class="opt-text">A. 決断力と行動力</span></label>
      <label class="opt"><input type="radio" name="q5" value="B"><span class="opt-text">B. 直感とひらめき</span></label>
      <label class="opt"><input type="radio" name="q5" value="C"><span class="opt-text">C. 粘り強さと自分軸</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">守護動物を診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <div class="result-emoji" id="re">🐺</div>
    <p class="result-label">あなたの今の守護動物</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-trait" id="rt"></p>
    <p class="result-msg" id="rn"></p>
  </div>

  <!-- スコア内訳 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">動物別スコア</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このツールは、エンターテインメント目的の簡易スピリチュアル診断です。占いや診断結果は個人の感じ方を大切にする参考としてお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 守護動物データ
  var ANIMALS = {
    wolf:   { emoji: '🐺', name: '狼（オオカミ）',   trait: 'リーダー型・情熱と決断の力',
              msg: '今のあなたを見守るのは「狼」。仲間を率いる強い意志と、ここぞで一気に動ける決断力が宿っています。今日は迷っている案件を1つ決めてしまうと、流れが大きく前に進みます。背中を見せる側に回ってOK。' },
    hawk:   { emoji: '🦅', name: '鷹（タカ）',       trait: '直感型・俯瞰と洞察の力',
              msg: '今のあなたを見守るのは「鷹」。物事を高い視点から見て、本質をひらめきで掴む力があります。今日は急いで答えを出さず、一歩引いて全体を眺めてから動くと正解が見えます。直感を信じてOK。' },
    turtle: { emoji: '🐢', name: '亀（カメ）',       trait: '堅実型・忍耐と継続の力',
              msg: '今のあなたを見守るのは「亀」。コツコツ積み重ねて長く続ける力があなたの最大の武器です。今日は派手な成果より、毎日の小さな1歩を丁寧に。地に足をつけたペースが運を呼びます。' },
    butterfly:{emoji: '🦋', name: '蝶（チョウ）',     trait: '自由型・変化と好奇心の力',
              msg: '今のあなたを見守るのは「蝶」。新しい風と変化を自然に味方にできる軽やかさが魅力です。今日はいつもと違うルート・いつもと違う人と話してみると、ヒントが羽を広げて舞い込みます。' },
    cat:    { emoji: '🐈', name: '猫（ネコ）',       trait: 'マイペース型・しなやかな自分軸',
              msg: '今のあなたを見守るのは「猫」。流されず、自分の心地よさを大切にできるしなやかさがあります。今日は無理して人に合わせず、自分の「気が向く方」を選んでOK。それが最善の選択です。' }
  };

  // 各選択肢のスコア配点
  var SCORES = {
    q1: { A: { wolf: 2, hawk: 0, turtle: 0, butterfly: 0, cat: 0 },
          B: { wolf: 0, hawk: 1, turtle: 1, butterfly: 0, cat: 1 },
          C: { wolf: 0, hawk: 0, turtle: 0, butterfly: 2, cat: 0 } },
    q2: { A: { wolf: 2, hawk: 0, turtle: 0, butterfly: 0, cat: 0 },
          B: { wolf: 0, hawk: 2, turtle: 0, butterfly: 0, cat: 0 },
          C: { wolf: 0, hawk: 0, turtle: 2, butterfly: 0, cat: 0 } },
    q3: { A: { wolf: 2, hawk: 0, turtle: 0, butterfly: 0, cat: 0 },
          B: { wolf: 0, hawk: 1, turtle: 1, butterfly: 0, cat: 0 },
          C: { wolf: 0, hawk: 0, turtle: 0, butterfly: 0, cat: 2 } },
    q4: { A: { wolf: 0, hawk: 0, turtle: 2, butterfly: 0, cat: 0 },
          B: { wolf: 1, hawk: 0, turtle: 0, butterfly: 2, cat: 0 },
          C: { wolf: 0, hawk: 0, turtle: 0, butterfly: 1, cat: 1 } },
    q5: { A: { wolf: 2, hawk: 0, turtle: 0, butterfly: 0, cat: 0 },
          B: { wolf: 0, hawk: 2, turtle: 0, butterfly: 1, cat: 0 },
          C: { wolf: 0, hawk: 0, turtle: 1, butterfly: 0, cat: 2 } }
  };

  function calc() {
    var answers = {};
    var qs = ['q1','q2','q3','q4','q5'];
    for (var i = 0; i < qs.length; i++) {
      var q = qs[i];
      var sel = document.querySelector('input[name="'+q+'"]:checked');
      if (!sel) { showErr('Q'+(i+1)+' を選んでください'); return; }
      answers[q] = sel.value;
    }

    var totals = { wolf: 0, hawk: 0, turtle: 0, butterfly: 0, cat: 0 };
    for (var j = 0; j < qs.length; j++) {
      var qq = qs[j];
      var s = SCORES[qq][answers[qq]];
      for (var k in s) totals[k] += s[k];
    }

    // 最大スコアの動物を採用（同点時は wolf > hawk > turtle > butterfly > cat の順で1つ選ぶ）
    var order = ['wolf','hawk','turtle','butterfly','cat'];
    var top = order[0];
    for (var m = 1; m < order.length; m++) {
      if (totals[order[m]] > totals[top]) top = order[m];
    }

    var a = ANIMALS[top];
    document.getElementById('re').textContent = a.emoji;
    document.getElementById('rv').textContent = a.name;
    document.getElementById('rt').textContent = a.trait;
    document.getElementById('rn').textContent = a.msg;
    document.getElementById('result').style.display = 'block';

    // スコア内訳
    var rows = order.map(function(key){
      return '<tr'+(key===top?' class="hl"':'')+'><td>'+ANIMALS[key].emoji+' '+ANIMALS[key].name+'</td><td>'+totals[key]+' 点</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = rows;
    document.getElementById('detail').style.display = 'block';

    // localStorage 保存
    try {
      localStorage.setItem('shugo_animal_last', JSON.stringify({
        animal: top, ts: Date.now()
      }));
    } catch(e) {}

    // スクロール
    document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function showErr(msg) {
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力エラー';
    document.getElementById('rt').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('result').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
