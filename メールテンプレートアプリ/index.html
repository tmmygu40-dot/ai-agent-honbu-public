<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールテンプレートアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>メールテンプレートアプリ</h1>

    <div class="form-section">
      <div class="form-group">
        <label for="company">会社名</label>
        <input type="text" id="company" placeholder="例：株式会社〇〇">
      </div>
      <div class="form-group">
        <label for="name">担当者名</label>
        <input type="text" id="name" placeholder="例：山田 太郎">
      </div>
      <div class="form-group">
        <label for="subject">件名</label>
        <input type="text" id="subject" placeholder="例：お打ち合わせのご依頼">
      </div>
      <div class="form-group">
        <label for="sender">自分の名前・会社</label>
        <input type="text" id="sender" placeholder="例：佐藤 花子（株式会社△△）">
      </div>
      <div class="form-group">
        <label for="content">要件</label>
        <textarea id="content" rows="4" placeholder="例：来週中にお打ち合わせの時間をいただけますでしょうか。オンライン・対面どちらでも対応可能です。"></textarea>
      </div>

      <div class="button-row">
        <button class="btn-primary" id="generateBtn">メール文面を生成</button>
        <button class="btn-secondary" id="saveTemplateBtn">テンプレート保存</button>
      </div>
    </div>

    <div class="output-section" id="outputSection" style="display:none;">
      <div class="output-header">
        <h2>生成されたメール文面</h2>
        <button class="btn-copy" id="copyBtn">コピー</button>
      </div>
      <pre id="mailOutput" class="mail-output"></pre>
    </div>

    <div class="templates-section" id="templatesSection" style="display:none;">
      <h2>保存済みテンプレート</h2>
      <div id="templatesList"></div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
