<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品質記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>品質記録アプリ</h1>

    <!-- 統計サマリー -->
    <section class="summary">
      <div class="stat-card">
        <div class="stat-label">総検査数</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card good">
        <div class="stat-label">合格</div>
        <div class="stat-value" id="goodCount">0</div>
      </div>
      <div class="stat-card bad">
        <div class="stat-label">不合格</div>
        <div class="stat-value" id="badCount">0</div>
      </div>
      <div class="stat-card rate">
        <div class="stat-label">不良率</div>
        <div class="stat-value" id="defectRate">0.0%</div>
      </div>
    </section>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>検査登録</h2>
      <div class="form-group">
        <label for="productName">品目名（任意）</label>
        <input type="text" id="productName" placeholder="例：部品A、ロット123">
      </div>
      <div class="form-group">
        <label for="inspector">検査者（任意）</label>
        <input type="text" id="inspector" placeholder="例：田中">
      </div>
      <div class="judgment-buttons">
        <button class="btn-good" id="btnGood" onclick="addRecord('合格')">✓ 合格</button>
        <button class="btn-bad" id="btnBad" onclick="showDefectForm()">✗ 不合格</button>
      </div>

      <!-- 不良原因入力（不合格時のみ表示） -->
      <div class="defect-form" id="defectForm" style="display:none;">
        <div class="form-group">
          <label for="defectCategory">不良原因カテゴリ</label>
          <select id="defectCategory">
            <option value="寸法不良">寸法不良</option>
            <option value="外観不良">外観不良</option>
            <option value="機能不良">機能不良</option>
            <option value="材料不良">材料不良</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="defectNote">詳細メモ（任意）</label>
          <input type="text" id="defectNote" placeholder="具体的な内容を入力">
        </div>
        <div class="defect-actions">
          <button class="btn-confirm-bad" onclick="addRecord('不合格')">不合格として登録</button>
          <button class="btn-cancel" onclick="hideDefectForm()">キャンセル</button>
        </div>
      </div>
    </section>

    <!-- 原因別集計 -->
    <section class="defect-summary" id="defectSummary" style="display:none;">
      <h2>不良原因別集計</h2>
      <div id="defectBreakdown"></div>
    </section>

    <!-- 記録一覧 -->
    <section class="records-section">
      <div class="records-header">
        <h2>検査記録 <span id="recordCount">（0件）</span></h2>
        <button class="btn-clear" onclick="clearAll()">全件削除</button>
      </div>
      <div id="recordList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
