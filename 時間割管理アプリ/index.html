<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間割管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>時間割管理</h1>
  </header>

  <main>
    <div class="table-wrapper">
      <table id="timetable">
        <thead>
          <tr>
            <th class="period-col">時限</th>
            <th>月</th>
            <th>火</th>
            <th>水</th>
            <th>木</th>
            <th>金</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>

    <p class="hint">セルをタップして授業・仕事名を入力してください</p>
  </main>

  <!-- 入力モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-inner">
      <h2 id="modal-title">科目名を入力</h2>
      <input type="text" id="modal-input" placeholder="例：数学、会議、空き" maxlength="20">
      <div class="modal-actions">
        <button id="btn-save" class="btn-primary">保存</button>
        <button id="btn-clear" class="btn-danger">削除</button>
        <button id="btn-cancel" class="btn-cancel">キャンセル</button>
      </div>
    </div>
  </div>
  <div id="overlay" class="overlay hidden"></div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
