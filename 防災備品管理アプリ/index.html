<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防災備品管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🛡️ 防災備品管理</h1>

    <section class="form-section">
      <h2>備蓄品を登録する</h2>
      <div class="form-group">
        <label for="itemName">品名</label>
        <input type="text" id="itemName" placeholder="例：ミネラルウォーター" maxlength="50">
      </div>
      <div class="form-group">
        <label for="itemQty">数量</label>
        <input type="number" id="itemQty" placeholder="例：12" min="1" max="9999">
      </div>
      <div class="form-group">
        <label for="itemUnit">単位</label>
        <input type="text" id="itemUnit" placeholder="例：本・個・袋" maxlength="10">
      </div>
      <div class="form-group">
        <label for="itemExpiry">消費期限</label>
        <input type="date" id="itemExpiry">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>備蓄品一覧</h2>
        <div class="summary" id="summary"></div>
      </div>
      <div class="legend">
        <span class="badge expired">期限切れ</span>
        <span class="badge soon">残り30日以内</span>
        <span class="badge ok">余裕あり</span>
        <span class="badge no-expiry">期限なし</span>
      </div>
      <ul id="itemList" class="item-list"></ul>
      <p id="emptyMsg" class="empty-msg">まだ登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
