<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>積立シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>積立シミュレーター</h1>
    <p class="subtitle">毎月の積立で将来の資産を計算</p>

    <section class="input-section">
      <div class="input-group">
        <label for="monthly">毎月の積立額</label>
        <div class="input-wrap">
          <input type="number" id="monthly" min="1" placeholder="30000" value="">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="input-group">
        <label for="rate">年利（期待利回り）</label>
        <div class="input-wrap">
          <input type="number" id="rate" min="0" max="100" step="0.1" placeholder="5" value="">
          <span class="unit">%</span>
        </div>
      </div>
      <div class="input-group">
        <label for="years">運用期間</label>
        <div class="input-wrap">
          <input type="number" id="years" min="1" max="60" placeholder="20" value="">
          <span class="unit">年</span>
        </div>
      </div>
      <button id="calcBtn" class="calc-btn">計算する</button>
    </section>

    <section class="result-section" id="resultSection" hidden>
      <h2>計算結果</h2>
      <div class="result-cards">
        <div class="card">
          <div class="card-label">元本合計</div>
          <div class="card-value" id="principal">―</div>
        </div>
        <div class="card highlight">
          <div class="card-label">最終資産額</div>
          <div class="card-value" id="total">―</div>
        </div>
        <div class="card accent">
          <div class="card-label">運用益</div>
          <div class="card-value" id="gain">―</div>
        </div>
      </div>

      <div class="chart-wrap">
        <h3>年ごとの資産推移</h3>
        <canvas id="chart"></canvas>
      </div>

      <div class="table-wrap">
        <h3>年次一覧</h3>
        <table id="yearTable">
          <thead>
            <tr>
              <th>経過年数</th>
              <th>元本</th>
              <th>資産総額</th>
              <th>運用益</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
