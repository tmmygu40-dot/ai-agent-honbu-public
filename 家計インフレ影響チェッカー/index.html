<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計インフレ影響チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>家計インフレ影響チェッカー</h1>
    <p class="subtitle">今年と去年の同月を比較して、インフレの家計への影響を確認</p>

    <!-- 費目管理 -->
    <section class="card">
      <h2>費目管理</h2>
      <div class="category-list" id="categoryList"></div>
      <div class="add-category">
        <input type="text" id="newCategoryInput" placeholder="新しい費目を追加（例：外食費）" maxlength="20">
        <button onclick="addCategory()">追加</button>
      </div>
    </section>

    <!-- データ入力 -->
    <section class="card">
      <h2>金額入力</h2>
      <div class="input-row">
        <div class="form-group">
          <label>費目</label>
          <select id="categorySelect"></select>
        </div>
        <div class="form-group">
          <label>今年</label>
          <select id="thisYearSelect"></select>
        </div>
        <div class="form-group">
          <label>去年</label>
          <select id="lastYearSelect"></select>
        </div>
        <div class="form-group">
          <label>月</label>
          <select id="monthSelect"></select>
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>今年の金額（円）</label>
          <input type="number" id="thisYearAmount" placeholder="例：45000" min="0">
        </div>
        <div class="form-group">
          <label>去年の金額（円）</label>
          <input type="number" id="lastYearAmount" placeholder="例：38000" min="0">
        </div>
        <div class="form-group btn-group">
          <button class="btn-primary" onclick="addRecord()">記録する</button>
        </div>
      </div>
    </section>

    <!-- 比較テーブル -->
    <section class="card">
      <h2>比較一覧</h2>
      <div class="filter-row">
        <label>表示年：</label>
        <select id="filterYearSelect" onchange="renderTable()"></select>
        <label>費目：</label>
        <select id="filterCategorySelect" onchange="renderTable()">
          <option value="all">すべて</option>
        </select>
      </div>
      <div class="table-wrap">
        <table id="comparisonTable">
          <thead>
            <tr>
              <th>費目</th>
              <th>月</th>
              <th>今年</th>
              <th>去年</th>
              <th>増加額</th>
              <th>増加率</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <p class="empty-msg" id="emptyMsg">データがありません。金額を入力してください。</p>
      </div>
    </section>

    <!-- サマリー -->
    <section class="card">
      <h2>年間累計インフレ影響額</h2>
      <div id="summaryArea" class="summary-area"></div>
    </section>

    <!-- グラフ -->
    <section class="card">
      <h2>費目別 増加額グラフ</h2>
      <div class="filter-row">
        <label>表示年：</label>
        <select id="graphYearSelect" onchange="renderGraph()"></select>
      </div>
      <div id="graphArea" class="graph-area"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
