<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>予約管理</h1>

    <section class="form-section">
      <h2>予約を追加</h2>
      <div class="form-group">
        <label for="name">お名前 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：山田 太郎" maxlength="50">
      </div>
      <div class="form-group">
        <label for="date">日付 <span class="required">*</span></label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="time">時刻 <span class="required">*</span></label>
        <input type="time" id="time">
      </div>
      <div class="form-group">
        <label for="memo">メモ</label>
        <textarea id="memo" placeholder="例：初回来店、アレルギーあり" rows="2" maxlength="200"></textarea>
      </div>
      <div id="error-msg" class="error-msg" aria-live="polite"></div>
      <button id="add-btn" class="btn-primary">追加する</button>
    </section>

    <section class="list-section">
      <h2>予約一覧 <span id="count" class="count"></span></h2>
      <div id="no-data" class="no-data">予約はまだありません</div>
      <ul id="reservation-list" class="reservation-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
