<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棚番号管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>棚番号管理</h1>
    <p class="subtitle">保管品の置き場所をすぐ検索</p>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>登録</h2>
      <div class="form-row">
        <input type="text" id="shelfInput" placeholder="棚番号（例：A-1）" maxlength="20">
        <input type="text" id="itemInput" placeholder="保管品名（例：電球）" maxlength="50">
        <button id="addBtn">追加</button>
      </div>
      <div id="formError" class="error-msg" style="display:none"></div>
    </section>

    <!-- 検索 -->
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="棚番号または保管品名で検索...">
      <span id="resultCount" class="result-count"></span>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="emptyMsg" class="empty-msg">まだ登録がありません。上のフォームから追加してください。</div>
      <table id="shelfTable" style="display:none">
        <thead>
          <tr>
            <th>棚番号</th>
            <th>保管品名</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="shelfList"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
