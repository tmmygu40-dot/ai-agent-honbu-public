<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推し名と最近のエピソード、感情タグを選ぶだけでX投稿文を3トーン同時生成できる無料ツール。熱量爆発・しっとり共感・短文ファニーから選んでコピー、推し語りが秒で完成します。">
  <title>推し語りX投稿ジェネレーター｜30秒で3パターン量産</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 投稿カード ── */
    .post-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .post-tone {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      padding: 0.25rem 0.7rem; border-radius: 999px;
      background: var(--accent-light); color: var(--accent);
      margin-bottom: 0.6rem; letter-spacing: 0.04em;
    }
    .post-text {
      font-size: 0.95rem; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
      padding: 0.7rem 0.8rem; background: var(--bg);
      border-radius: 10px; border: 1px solid var(--border);
      margin-bottom: 0.6rem;
    }
    .post-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.6rem;
    }
    .char-count { font-size: 0.78rem; color: var(--text-sub); }
    .char-count.over { color: var(--ng); font-weight: 700; }
    .btn-copy {
      padding: 0.5rem 0.95rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .post-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>推し語りX投稿ジェネレーター</h1>
    <p class="subtitle">推し名・エピソード・感情タグから、3トーンの投稿文を30秒で量産</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="oshi">推し名</label>
      <input type="text" id="oshi" placeholder="例: ○○くん / ○○ちゃん / 推しの名前">
    </div>
    <div class="field">
      <label for="relation">関係性・呼び方</label>
      <select id="relation">
        <option value="推し">推し</option>
        <option value="最推し">最推し</option>
        <option value="担当">担当</option>
        <option value="ガチ恋対象">ガチ恋対象</option>
        <option value="尊い存在">尊い存在</option>
        <option value="ぴ">ぴ</option>
      </select>
    </div>
    <div class="field">
      <label for="episode">最近のエピソード（自由入力）</label>
      <textarea id="episode" placeholder="例: 配信で笑った／ライブで天使だった／新衣装が神／コメント返してくれた など"></textarea>
      <p class="hint">短くてOK。「○○した」「○○な姿」など出来事や姿を一言で</p>
    </div>
    <div class="field">
      <label for="emotion">感情タグ</label>
      <select id="emotion">
        <option value="尊い">尊い</option>
        <option value="神">神</option>
        <option value="無理">無理（語彙力崩壊）</option>
        <option value="大優勝">大優勝</option>
        <option value="泣ける">泣ける</option>
        <option value="エモい">エモい</option>
        <option value="しんど">しんど（良い意味で）</option>
        <option value="顔面国宝">顔面国宝</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <!-- 結果エリア -->
  <div id="result-area"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 X(旧Twitter)の投稿文字数（半角280字／全角140字相当）の一般的な目安をもとに整理しています。最新仕様は X 公式ヘルプをご確認ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi_x_post_generator_v1';

  // ── トーン別テンプレ（{oshi} {ep} {em} {rel} {hash} を差し込み） ──
  var TEMPLATES = {
    '熱量爆発': [
      '{oshi}が{ep}…はい優勝🏆🏆🏆 今日も{oshi}の{em}さで地球が回ってます🌍✨ もう無理、好き、ありがとう {hash}',
      'ちょ、{oshi}{ep}の件、誰か止めて〜〜〜！！！ {em}すぎて心臓が3回死んだ💖💖💖 {oshi}は今日も最強 {hash}',
      '【速報】{oshi}が{ep}。以上、{em}案件でした🚨🚨 {rel}にしてよかった人生100点！！ {hash}'
    ],
    'しっとり共感': [
      '{oshi}の{ep}を見て、ふと胸が熱くなった…。{em}って言葉だけじゃ足りない、こういう瞬間に出会えてよかった。 {hash}',
      'なんでもない日の{oshi}が一番{em}。{ep}、ただそれだけで今日を頑張れる気がする。 {hash}',
      '{rel}と出会ってから、世界の見え方が少し優しくなった。{ep}…{oshi}、ありがとうね。 {hash}'
    ],
    '短文ファニー': [
      '{oshi}{ep}の件、もう許して(尊死) {hash}',
      '{ep}の{oshi}に殴られたい人〜🙋‍♀️🙋‍♂️ {hash}',
      '【お知らせ】{oshi}が{em}すぎるため本日休業します {hash}'
    ]
  };

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function buildHash(oshi) {
    if (!oshi) return '';
    // 空白除去のハッシュタグ化
    var clean = oshi.replace(/\s+/g, '');
    return '#' + clean;
  }

  function fill(tpl, ctx) {
    return tpl
      .replace(/\{oshi\}/g, ctx.oshi)
      .replace(/\{ep\}/g, ctx.ep)
      .replace(/\{em\}/g, ctx.em)
      .replace(/\{rel\}/g, ctx.rel)
      .replace(/\{hash\}/g, ctx.hash);
  }

  function countTwitter(text) {
    // 全角=2/半角=1 で 280 まで（X仕様の素朴な近似）
    var n = 0;
    for (var i = 0; i < text.length; i++) {
      var c = text.charCodeAt(i);
      n += (c <= 0x7F || (c >= 0xFF61 && c <= 0xFF9F)) ? 1 : 2;
    }
    return n;
  }

  function generate() {
    var oshi = document.getElementById('oshi').value.trim();
    var rel  = document.getElementById('relation').value;
    var ep   = document.getElementById('episode').value.trim();
    var em   = document.getElementById('emotion').value;

    if (!oshi) { alert('推し名を入力してください'); return; }
    if (!ep)   { ep = '今日も存在してくれた'; }

    var ctx = { oshi: oshi, rel: rel, ep: ep, em: em, hash: buildHash(oshi) };

    var tones = ['熱量爆発', 'しっとり共感', '短文ファニー'];
    var area = document.getElementById('result-area');
    area.innerHTML = '';

    tones.forEach(function(tone, i) {
      var text = fill(pick(TEMPLATES[tone]), ctx);
      var twN = countTwitter(text);
      var over = twN > 280;

      var card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML =
        '<span class="post-tone">' + tone + '</span>' +
        '<div class="post-text" id="pt-' + i + '"></div>' +
        '<div class="post-meta">' +
          '<span class="char-count' + (over ? ' over' : '') + '">' + twN + ' / 280（X換算）</span>' +
          '<button class="btn-copy" data-target="pt-' + i + '">コピー</button>' +
        '</div>';
      area.appendChild(card);
      // テキストはinnerHTMLでなくtextContentで安全に
      card.querySelector('#pt-' + i).textContent = text;
    });

    // コピーボタン
    area.querySelectorAll('.btn-copy').forEach(function(btn){
      btn.addEventListener('click', function() {
        var tid = btn.getAttribute('data-target');
        var txt = document.getElementById(tid).textContent;
        copyToClipboard(txt, btn);
      });
    });

    save({ oshi: oshi, relation: rel, emotion: em });
  }

  function copyToClipboard(text, btn) {
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = 'コピー済み';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallback(text, done); });
    } else {
      fallback(text, done);
    }
  }
  function fallback(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch(e) { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }

  function save(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  function load() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.oshi) document.getElementById('oshi').value = d.oshi;
      if (d.relation) document.getElementById('relation').value = d.relation;
      if (d.emotion) document.getElementById('emotion').value = d.emotion;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
