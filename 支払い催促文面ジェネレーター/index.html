<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支払い催促文面ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .level-btns {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .level-btn {
      flex: 1; min-width: 80px;
      padding: 0.65rem 0.5rem;
      font-size: 0.88rem; font-weight: 700;
      border: 2px solid var(--border);
      border-radius: 9px; background: var(--bg);
      color: var(--text-sub); cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .level-btn.active-1 { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .level-btn.active-2 { border-color: var(--warn); background: var(--warn-bg); color: var(--warn); }
    .level-btn.active-3 { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-area { display: none; max-width: 600px; margin: 0 auto 1rem; }
    .result-label-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .result-label-bar span { font-size: 0.82rem; font-weight: 700; color: var(--text-sub); }
    .copy-btn {
      padding: 0.45rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .copy-btn.copied { background: var(--ok); }
    textarea#mailBody {
      width: 100%; min-height: 320px;
      padding: 1rem; font-size: 0.88rem;
      line-height: 1.8; font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--card); color: var(--text);
      resize: vertical; outline: none;
    }
    textarea#mailBody:focus { border-color: var(--accent); }

    .err-msg { font-size: 0.82rem; color: var(--ng); margin: -0.5rem auto 0.8rem; max-width: 600px; display: none; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>支払い催促文面ジェネレーター</h1>
    <p class="subtitle">取引先名・金額・期限を入れるだけで催促メールを即生成</p>
  </header>

  <!-- 自社情報（保存あり） -->
  <div class="card">
    <p class="card-title">自社情報（保存されます）</p>
    <div class="field">
      <label for="myCompany">会社名 / 屋号</label>
      <input type="text" id="myCompany" placeholder="例: 株式会社〇〇">
    </div>
    <div class="field">
      <label for="myName">担当者名</label>
      <input type="text" id="myName" placeholder="例: 山田 太郎">
    </div>
  </div>

  <!-- 請求情報 -->
  <div class="card">
    <p class="card-title">請求情報</p>
    <div class="field">
      <label for="clientName">取引先名</label>
      <input type="text" id="clientName" placeholder="例: 〇〇商事株式会社">
    </div>
    <div class="field">
      <label for="invoiceNo">請求書番号（任意）</label>
      <input type="text" id="invoiceNo" placeholder="例: INV-2026-001">
    </div>
    <div class="field">
      <label for="amount">請求金額（円）</label>
      <input type="number" id="amount" placeholder="例: 150000" min="0">
    </div>
    <div class="field">
      <label for="dueDate">支払期限</label>
      <input type="date" id="dueDate">
    </div>
  </div>

  <!-- 催促レベル -->
  <div class="card">
    <p class="card-title">催促レベル</p>
    <div class="level-btns">
      <button class="level-btn active-1" data-level="1" onclick="selectLevel(1)">初回<br><small>丁寧な確認</small></button>
      <button class="level-btn" data-level="2" onclick="selectLevel(2)">2回目<br><small>明確な催促</small></button>
      <button class="level-btn" data-level="3" onclick="selectLevel(3)">最終<br><small>強い警告</small></button>
    </div>
  </div>

  <p class="err-msg" id="errMsg">⚠ 必須項目を入力してください</p>

  <button class="btn-calc" onclick="generate()">文面を生成する</button>

  <!-- 生成結果 -->
  <div class="result-area" id="resultArea">
    <div class="result-label-bar">
      <span id="levelLabel">催促文面（初回）</span>
      <button class="copy-btn" id="copyBtn" onclick="copyText()">コピー</button>
    </div>
    <textarea id="mailBody" readonly></textarea>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var selectedLevel = 1;

  function selectLevel(n) {
    selectedLevel = n;
    document.querySelectorAll('.level-btn').forEach(function(b) {
      b.className = 'level-btn';
    });
    var btn = document.querySelector('[data-level="' + n + '"]');
    if (btn) btn.className = 'level-btn active-' + n;
  }

  function fmtMoney(n) {
    return Math.round(n).toLocaleString('ja-JP');
  }

  function fmtDate(str) {
    if (!str) return '';
    var d = new Date(str);
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }

  function generate() {
    var client = document.getElementById('clientName').value.trim();
    var amount = parseFloat(document.getElementById('amount').value);
    var due    = document.getElementById('dueDate').value;
    var myComp = document.getElementById('myCompany').value.trim();
    var myName = document.getElementById('myName').value.trim();
    var invNo  = document.getElementById('invoiceNo').value.trim();

    // バリデーション
    if (!client || isNaN(amount) || !due) {
      var e = document.getElementById('errMsg');
      e.style.display = 'block';
      setTimeout(function(){ e.style.display = 'none'; }, 3000);
      return;
    }

    // 自社情報を保存
    localStorage.setItem('sfc_myCompany', myComp);
    localStorage.setItem('sfc_myName', myName);

    var today = new Date();
    var y = today.getFullYear();
    var m = today.getMonth()+1;
    var d = today.getDate();
    var todayStr = y + '年' + m + '月' + d + '日';
    var dueFmt = fmtDate(due);
    var amountFmt = fmtMoney(amount) + '円';
    var invLine = invNo ? '（請求書番号：' + invNo + '）' : '';
    var sig = (myComp || '弊社') + (myName ? '\n担当：' + myName : '');

    var body = '';

    if (selectedLevel === 1) {
      body = '件名：お支払いのご確認のお願い' + invLine + '\n\n'
           + client + ' 御中\n\n'
           + 'お世話になっております。' + (myComp || '弊社') + 'の' + (myName || '担当者') + 'でございます。\n\n'
           + '先般ご請求申し上げました下記代金につきまして、'
           + '本日現在、着金が確認できておりません。\n\n'
           + '【ご請求内容】\n'
           + 'ご請求金額：' + amountFmt + '\n'
           + '支払期限　：' + dueFmt + '\n'
           + (invNo ? '請求書番号：' + invNo + '\n' : '')
           + '\n'
           + '既にお手続きいただいている場合は、行き違いにてご容赦ください。\n'
           + 'まだのようでしたら、早急にご対応いただけますようお願い申し上げます。\n\n'
           + 'ご不明な点がございましたら、お気軽にお問い合わせください。\n\n'
           + 'よろしくお願いいたします。\n\n'
           + todayStr + '\n'
           + sig;

    } else if (selectedLevel === 2) {
      body = '件名：【再度のお願い】お支払いについて' + invLine + '\n\n'
           + client + ' 御中\n\n'
           + 'お世話になっております。' + (myComp || '弊社') + 'の' + (myName || '担当者') + 'でございます。\n\n'
           + '先般よりご請求・ご連絡を差し上げておりますが、'
           + '下記代金のご入金をいまだ確認できておりません。\n\n'
           + '【ご請求内容】\n'
           + 'ご請求金額：' + amountFmt + '\n'
           + '支払期限　：' + dueFmt + '（期限超過）\n'
           + (invNo ? '請求書番号：' + invNo + '\n' : '')
           + '\n'
           + '誠に恐れ入りますが、至急お振込みいただきますようお願い申し上げます。\n'
           + 'お支払いが難しい事情がございましたら、事前にご相談いただけますと幸いです。\n\n'
           + 'ご対応をお待ちしております。\n\n'
           + todayStr + '\n'
           + sig;

    } else {
      body = '件名：【最終通知】未払い代金のお支払いについて' + invLine + '\n\n'
           + client + ' 御中\n\n'
           + 'お世話になっております。' + (myComp || '弊社') + 'の' + (myName || '担当者') + 'でございます。\n\n'
           + '再三にわたりお支払いのご連絡を差し上げておりますが、'
           + '下記代金について依然として着金が確認できておりません。\n\n'
           + '【ご請求内容】\n'
           + 'ご請求金額：' + amountFmt + '\n'
           + '支払期限　：' + dueFmt + '（期限超過）\n'
           + (invNo ? '請求書番号：' + invNo + '\n' : '')
           + '\n'
           + '本書面が最終通知となります。\n'
           + '誠に遺憾ながら、本書到着後1週間以内にご入金がない場合は、'
           + '法的手段を含めた回収手続きへ移行せざるを得ない場合がございます。\n\n'
           + 'ご状況をご連絡いただき、速やかにご対応くださいますようお願い申し上げます。\n\n'
           + todayStr + '\n'
           + sig;
    }

    var labels = ['催促文面（初回：丁寧な確認）', '催促文面（2回目：明確な催促）', '催促文面（最終：強い警告）'];
    document.getElementById('levelLabel').textContent = labels[selectedLevel - 1];
    document.getElementById('mailBody').value = body;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('copyBtn').textContent = 'コピー';
    document.getElementById('copyBtn').className = 'copy-btn';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText() {
    var ta = document.getElementById('mailBody');
    ta.select();
    ta.setSelectionRange(0, 99999);
    try {
      navigator.clipboard.writeText(ta.value).then(function() {
        showCopied();
      }).catch(function() {
        document.execCommand('copy');
        showCopied();
      });
    } catch(e) {
      document.execCommand('copy');
      showCopied();
    }
  }

  function showCopied() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました！';
    btn.className = 'copy-btn copied';
    setTimeout(function() {
      btn.textContent = 'コピー';
      btn.className = 'copy-btn';
    }, 2000);
  }

  // 自社情報をロード
  window.addEventListener('DOMContentLoaded', function() {
    var mc = localStorage.getItem('sfc_myCompany');
    var mn = localStorage.getItem('sfc_myName');
    if (mc) document.getElementById('myCompany').value = mc;
    if (mn) document.getElementById('myName').value = mn;

    // 今日から1ヶ月後をデフォルト期限に
    var d = new Date();
    d.setMonth(d.getMonth() + 1);
    document.getElementById('dueDate').value = d.toISOString().slice(0, 10);
  });
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
