<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>関税コスト転嫁計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>関税コスト転嫁計算</h1>
    <p class="subtitle">輸入品の関税コスト増加と必要売価を計算</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <div class="form-group">
        <label for="itemName">品目名</label>
        <input type="text" id="itemName" placeholder="例：鉄鋼製品">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="costPrice">仕入れ値（円）</label>
          <input type="number" id="costPrice" placeholder="例：10000" min="0">
        </div>
        <div class="form-group">
          <label for="tariffRate">関税率（%）</label>
          <input type="number" id="tariffRate" placeholder="例：25" min="0" max="100" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label for="profitRate">目標粗利率（%）<span class="default-note">デフォルト：30%</span></label>
        <input type="number" id="profitRate" placeholder="30" min="0" max="99" step="0.1" value="30">
      </div>
      <button class="btn-calc" onclick="calculate()">計算して追加</button>
    </section>

    <!-- 計算結果プレビュー -->
    <section class="preview-section" id="previewSection" style="display:none;">
      <h2>計算結果プレビュー</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">仕入れ値</span>
          <span class="result-value" id="prevCost">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">関税コスト増加</span>
          <span class="result-value highlight-red" id="prevTariff">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">関税後コスト</span>
          <span class="result-value" id="prevTotal">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">必要売価</span>
          <span class="result-value highlight-orange" id="prevSellPrice">—</span>
        </div>
      </div>
    </section>

    <!-- 品目一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>品目一覧</h2>
        <button class="btn-clear" onclick="clearAll()">全クリア</button>
      </div>
      <div id="itemList">
        <p class="empty-msg">品目を追加すると一覧に表示されます</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
