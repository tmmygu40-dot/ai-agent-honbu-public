<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏰ 先延ばし癖タイプ診断</title>
  <meta name="description" content="5問に答えるだけで、あなたの先延ばし癖のタイプが分かり、タイプ別の克服方法をすぐに実践できる無料診断ツールです。完璧主義型・快楽優先型・不安回避型・気分依存型・優先順位混乱型から診断します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問カード ── */
    .question-card { margin-bottom: 1rem; }
    .q-title { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.8rem; line-height: 1.4; }
    .q-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .q-option {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.8rem; border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: all 0.15s;
      background: var(--card);
    }
    .q-option:hover { border-color: var(--accent); background: #fafafa; }
    .q-option input[type="radio"] {
      width: 16px; height: 16px; flex-shrink: 0; cursor: pointer;
    }
    .q-option .opt-text { font-size: 0.88rem; color: var(--text); flex: 1; }
    .q-option input[type="radio"]:checked + .opt-text {
      font-weight: 600; color: var(--text);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 克服法カード ── */
    .tips-card { margin-top: 1rem; }
    .tips-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.8rem; }
    .tips-list { list-style: none; }
    .tips-item { font-size: 0.88rem; color: var(--text); margin-bottom: 0.6rem; padding-left: 1.5rem; position: relative; line-height: 1.5; }
    .tips-item:before { content: "✓"; position: absolute; left: 0; font-weight: 700; color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>⏰ 先延ばし癖タイプ診断</h1>
    <p class="subtitle">5問に答えるだけで、あなたの先延ばし癖タイプが分かります。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="questions-container">
    <p class="card-title">診断</p>
    <!-- 質問は JavaScript で動的に生成 -->
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断結果を見る</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの先延ばし癖タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <div class="tips-card" id="tips-container"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 診断データ ──
  var TYPES = {
    perfectionist: { name: '完璧主義型', emoji: '🎯', color: 'warn' },
    hedonist: { name: '快楽優先型', emoji: '🎉', color: 'ng' },
    avoidant: { name: '不安回避型', emoji: '😰', color: 'warn' },
    mood: { name: '気分依存型', emoji: '🎭', color: 'ng' },
    confused: { name: '優先順位混乱型', emoji: '🌀', color: 'warn' }
  };

  var QUESTIONS = [
    {
      text: 'タスクに取り組む時、最も当てはまるのは？',
      options: [
        { text: '「完璧にできるまで待とう」と完成度にこだわる', scores: { perfectionist: 3, hedonist: 0, avoidant: 1, mood: 0, confused: 0 } },
        { text: '楽しい事や気になる事を優先して、つい後回しにしてしまう', scores: { perfectionist: 0, hedonist: 3, avoidant: 0, mood: 1, confused: 0 } },
        { text: '「失敗したら嫌だな」と恐れて避けてしまう', scores: { perfectionist: 1, hedonist: 0, avoidant: 3, mood: 0, confused: 0 } },
        { text: 'その日の気分や気力次第で取り組む気になるかが決まる', scores: { perfectionist: 0, hedonist: 1, avoidant: 0, mood: 3, confused: 0 } },
        { text: 'やるべき事がたくさんあって、何から手をつけたらいいか分からない', scores: { perfectionist: 0, hedonist: 0, avoidant: 0, mood: 0, confused: 3 } }
      ]
    },
    {
      text: '期限が近づいても始められない時の心情は？',
      options: [
        { text: '準備不足で失敗するなら、やらないほうがましだと思う', scores: { perfectionist: 2, hedonist: 0, avoidant: 2, mood: 0, confused: 0 } },
        { text: '大丈夫、ギリギリでもなんとかなると思っている', scores: { perfectionist: 0, hedonist: 2, avoidant: 0, mood: 2, confused: 0 } },
        { text: '心配で不安な気持ちが勝ってしまう', scores: { perfectionist: 1, hedonist: 0, avoidant: 3, mood: 1, confused: 0 } },
        { text: 'やるぞと思うのに、やる気スイッチが入らない', scores: { perfectionist: 0, hedonist: 1, avoidant: 0, mood: 3, confused: 1 } },
        { text: '緊急度や重要度の判断がつかない', scores: { perfectionist: 0, hedonist: 0, avoidant: 0, mood: 0, confused: 3 } }
      ]
    },
    {
      text: '休日に「やらなきゃいけない事」があると？',
      options: [
        { text: 'きちんと終わるまでは休めない感じがする', scores: { perfectionist: 3, hedonist: 0, avoidant: 0, mood: 0, confused: 1 } },
        { text: 'つい後回しにして、楽しい事をしてしまう', scores: { perfectionist: 0, hedonist: 3, avoidant: 0, mood: 1, confused: 0 } },
        { text: 'できればやらずに済ませたいと思う', scores: { perfectionist: 0, hedonist: 0, avoidant: 3, mood: 0, confused: 0 } },
        { text: '気分が乗れば始められるけど、乗らないと進まない', scores: { perfectionist: 0, hedonist: 1, avoidant: 0, mood: 3, confused: 1 } },
        { text: '何が本当に大事なのか判断できない', scores: { perfectionist: 1, hedonist: 0, avoidant: 0, mood: 0, confused: 3 } }
      ]
    },
    {
      text: '仕事や勉強で先延ばしした結果、最も悔しいのは？',
      options: [
        { text: '準備不足のせいで、期待した成果が出なかった', scores: { perfectionist: 3, hedonist: 1, avoidant: 0, mood: 0, confused: 0 } },
        { text: 'やる事がいっぱい溜まって、パニックになった', scores: { perfectionist: 0, hedonist: 2, avoidant: 1, mood: 1, confused: 2 } },
        { text: '最後は何とかなったけど、精神的にキツかった', scores: { perfectionist: 0, hedonist: 0, avoidant: 3, mood: 1, confused: 0 } },
        { text: '追い詰められてやっと動けたけど、いつも同じ繰り返し', scores: { perfectionist: 0, hedonist: 1, avoidant: 1, mood: 3, confused: 0 } },
        { text: '何を優先すべきだったか分からないまま終わった', scores: { perfectionist: 0, hedonist: 0, avoidant: 0, mood: 0, confused: 3 } }
      ]
    },
    {
      text: '先延ばしを克服するなら、最も効果がありそうなのは？',
      options: [
        { text: 'とりあえず始めてみる勇気を持つこと', scores: { perfectionist: 3, hedonist: 0, avoidant: 2, mood: 1, confused: 0 } },
        { text: '楽しくする工夫や、好きな人とやること', scores: { perfectionist: 0, hedonist: 3, avoidant: 0, mood: 1, confused: 0 } },
        { text: '「失敗しても大丈夫」という安心感を得ること', scores: { perfectionist: 0, hedonist: 0, avoidant: 3, mood: 1, confused: 0 } },
        { text: '毎日少しずつやって、習慣化すること', scores: { perfectionist: 1, hedonist: 0, avoidant: 0, mood: 3, confused: 1 } },
        { text: 'やる事の順番や優先度を見える化すること', scores: { perfectionist: 1, hedonist: 0, avoidant: 0, mood: 0, confused: 3 } }
      ]
    }
  ];

  var TIPS = {
    perfectionist: [
      '「100点でなくていい」と自分に許可を出す',
      'まず「やる」という1歩を踏み出す勇気を大切に',
      '完成度より「始める」事を優先しよう',
      '定期的に進捗を確認して、完璧さの罠から脱出する'
    ],
    hedonist: [
      'タスクを楽しく・ゲーム化する工夫',
      '好きな環境・好きな人と一緒にやる',
      '短時間で終わる小さなタスクに分解する',
      '完了時の報酬を用意して、モチベーションを作る'
    ],
    avoidant: [
      'まずは「失敗しても大丈夫」を思い出す',
      '小さな成功体験から自信をつける',
      'サポート・相談できる人を探す',
      '完璧さより「チャレンジ精神」を大事にしよう'
    ],
    mood: [
      '毎日同じ時間に取り組む習慣をつける',
       'やる気がなくても「5分だけ」始めてみる',
      '環境を整える（座る場所・音楽など）',
      'モーニングルーティンでエンジンをかける'
    ],
    confused: [
      '今週のタスク一覧を紙に書き出す',
      '「今日のNo.1」を1つだけ決める',
      '優先度マトリクス（重要度×緊急度）を使う',
      '1日1つ「これだけは」という目標に集中する'
    ]
  };

  // ── 初期化 ──
  function init() {
    loadAnswers();
    renderQuestions();
  }

  function renderQuestions() {
    var container = document.getElementById('questions-container');
    var html = '<p class="card-title">診断</p>';
    QUESTIONS.forEach(function(q, idx) {
      html += '<div class="question-card">';
      html += '<p class="q-title">Q' + (idx + 1) + '：' + q.text + '</p>';
      html += '<div class="q-options">';
      q.options.forEach(function(opt, oidx) {
        var id = 'q' + idx + 'o' + oidx;
        html += '<label class="q-option">';
        html += '<input type="radio" name="q' + idx + '" id="' + id + '" value="' + oidx + '" onchange="saveAnswers()">';
        html += '<span class="opt-text">' + opt.text + '</span>';
        html += '</label>';
      });
      html += '</div></div>';
    });
    container.innerHTML = html;
  }

  function saveAnswers() {
    var answers = {};
    for (var i = 0; i < QUESTIONS.length; i++) {
      var selected = document.querySelector('input[name="q' + i + '"]:checked');
      if (selected) {
        answers['q' + i] = selected.value;
      }
    }
    localStorage.setItem('diagnosis_answers', JSON.stringify(answers));
  }

  function loadAnswers() {
    var saved = localStorage.getItem('diagnosis_answers');
    if (saved) {
      var answers = JSON.parse(saved);
      Object.keys(answers).forEach(function(key) {
        var match = key.match(/q(\d+)/);
        if (match) {
          var idx = parseInt(match[1]);
          var opt = parseInt(answers[key]);
          setTimeout(function() {
            var radio = document.querySelector('input[name="q' + idx + '"][value="' + opt + '"]');
            if (radio) radio.checked = true;
          }, 0);
        }
      });
    }
  }

  function calc() {
    var scores = { perfectionist: 0, hedonist: 0, avoidant: 0, mood: 0, confused: 0 };
    var allAnswered = true;

    for (var i = 0; i < QUESTIONS.length; i++) {
      var selected = document.querySelector('input[name="q' + i + '"]:checked');
      if (!selected) {
        allAnswered = false;
        break;
      }
      var optIdx = parseInt(selected.value);
      var option = QUESTIONS[i].options[optIdx];
      Object.keys(option.scores).forEach(function(type) {
        scores[type] += option.scores[type];
      });
    }

    if (!allAnswered) {
      alert('すべての質問に答えてください');
      return;
    }

    // 最高スコアのタイプを判定
    var maxScore = 0, resultType = 'perfectionist';
    Object.keys(scores).forEach(function(type) {
      if (scores[type] > maxScore) {
        maxScore = scores[type];
        resultType = type;
      }
    });

    showResult(resultType);
    saveAnswers();
  }

  function showResult(type) {
    var typeData = TYPES[type];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + typeData.color;
    rc.style.display = 'block';

    document.getElementById('rv').textContent = typeData.emoji + ' ' + typeData.name;
    document.getElementById('rn').textContent = 'あなたの先延ばし癖は「' + typeData.name + '」です。以下の克服法を参考にしてみてください。';

    var tips = TIPS[type];
    var tipsHtml = '<p class="tips-title">🎯 克服法</p>';
    tipsHtml += '<ul class="tips-list">';
    tips.forEach(function(tip) {
      tipsHtml += '<li class="tips-item">' + tip + '</li>';
    });
    tipsHtml += '</ul>';
    document.getElementById('tips-container').innerHTML = tipsHtml;
  }

  // ページ読み込み時に初期化
  window.addEventListener('load', init);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
