<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前と熱量レベルを選ぶだけで、誕生日メッセージを一発生成。控えめ・普通・全力の3段階から選んでコピー＆SNS投稿や手紙にすぐ使えます。">
  <title>推し誕メッセージジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 熱量選択ボタン ── */
    .heat-group { display: flex; gap: 0.5rem; }
    .heat-btn {
      flex: 1; padding: 0.8rem 0.5rem; border: 2px solid var(--border);
      border-radius: 10px; background: var(--card); cursor: pointer;
      text-align: center; transition: all 0.15s; font-size: 0.9rem;
      -webkit-tap-highlight-color: transparent;
    }
    .heat-btn .heat-emoji { font-size: 1.4rem; display: block; margin-bottom: 0.2rem; }
    .heat-btn .heat-label { font-size: 0.78rem; font-weight: 600; color: var(--text-sub); }
    .heat-btn.active { border-color: var(--accent); background: var(--accent-light); }
    .heat-btn.active .heat-label { color: var(--accent); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .msg-header { text-align: center; margin-bottom: 1rem; }
    .msg-heat-badge {
      display: inline-block; padding: 0.3rem 0.8rem;
      background: var(--accent-light); color: var(--accent);
      border-radius: 20px; font-size: 0.78rem; font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .msg-content {
      font-size: 1.05rem; line-height: 1.8; padding: 1rem;
      background: var(--bg); border-radius: 10px;
      white-space: pre-wrap; word-break: break-word;
    }
    .btn-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-copy, .btn-retry {
      flex: 1; padding: 0.7rem; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text-sub); transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover, .btn-retry:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎂 推し誕メッセージジェネレーター</h1>
    <p class="subtitle">推しの名前と熱量を選ぶだけで、誕生日メッセージをサクッと生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推しの情報</p>
    <div class="field">
      <label for="oshiName">推しの名前</label>
      <input type="text" id="oshiName" placeholder="例: 星野アイ">
      <p class="hint">キャラ名・アーティスト名・推しの呼び方なんでもOK</p>
    </div>
    <div class="field">
      <label>熱量レベル</label>
      <div class="heat-group">
        <button type="button" class="heat-btn" data-heat="mild" onclick="selectHeat(this)">
          <span class="heat-emoji">☺️</span>
          <span class="heat-label">控えめ</span>
        </button>
        <button type="button" class="heat-btn active" data-heat="normal" onclick="selectHeat(this)">
          <span class="heat-emoji">🎉</span>
          <span class="heat-label">普通</span>
        </button>
        <button type="button" class="heat-btn" data-heat="max" onclick="selectHeat(this)">
          <span class="heat-emoji">🔥</span>
          <span class="heat-label">全力</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🎁 メッセージを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <div class="msg-header">
      <span class="msg-heat-badge" id="heatBadge"></span>
    </div>
    <div class="msg-content" id="msgContent"></div>
    <div class="btn-actions">
      <button class="btn-copy" id="btnCopy" onclick="copyMsg()">📋 コピー</button>
      <button class="btn-retry" onclick="generate()">🔄 別パターン</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールはテンプレートからメッセージを自動生成しています。実際の投稿時はご自身の言葉もお加えください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 熱量選択 ──
  var currentHeat = 'normal';
  function selectHeat(el) {
    document.querySelectorAll('.heat-btn').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active');
    currentHeat = el.dataset.heat;
  }

  // ── メッセージテンプレート ──
  var TEMPLATES = {
    mild: [
      '{name}さん、お誕生日おめでとうございます。\nいつも素敵な姿を見せてくれてありがとうございます。\nこれからも応援しています。良い一年になりますように。',
      '{name}さん、Happy Birthday！\n{name}さんの活躍をいつも楽しみにしています。\n素敵な一日をお過ごしください。',
      '{name}さん、お誕生日おめでとうございます。\n{name}さんがいてくれるだけで元気をもらっています。\n今日が笑顔あふれる日になりますように。',
      '{name}さん、誕生日おめでとう！\nいつもたくさんの幸せをありがとうございます。\nこれからも{name}さんらしく輝いてください。',
      '{name}さんへ。お誕生日おめでとうございます。\n日々の頑張りをそっと応援しています。\n素晴らしい一年になりますように。',
      '{name}さん、お誕生日おめでとうございます。\nいつも素敵な笑顔に救われています。\nどうか幸せいっぱいの一日を。'
    ],
    normal: [
      '{name}、お誕生日おめでとう！🎂🎉\n出会えたことが本当に嬉しい！\n{name}のおかげで毎日が楽しくなってるよ。\nこれからもずっと応援してる！最高の一年にしよう！',
      '🎊 {name}、Happy Birthday！！\n{name}がこの世に生まれてきてくれて本当にありがとう！\n推せる喜びをかみしめつつ…今日は盛大にお祝いさせて！🎁',
      '{name}〜！誕生日おめでとう！🥳\nいつも元気と感動をありがとう！\n{name}の存在が私の毎日の原動力です！\nこれからも全力で推し続けるからね！',
      '今日は{name}の大切な日！🎂✨\nおめでとう！おめでとう！おめでとう！\n{name}が幸せでいてくれることが一番の願いです。\n最高の誕生日になりますように！',
      '{name}、誕生日おめでとう！🎉🎈\n{name}を好きになれて本当によかった！\n笑顔も頑張る姿も全部大好き！\nこれからもたくさんの幸せが降り注ぎますように！',
      '{name}！お誕生日おめでとう！🎁\nいつだって{name}は最高なんだよ！\n今日くらいはゆっくり休んで、たくさん甘やかされてね！'
    ],
    max: [
      '🔥🔥🔥 {name}ァァァ！！！誕生日おめでとおおおお！！！🎂🎉🎊\n生まれてきてくれてありがとう！！この世に{name}がいるってだけで優勝！！！\n好きすぎて語彙力が消滅してるけど伝えたい！！\n{name}は最強！最高！唯一無二！！！\nこれからも一生推すから覚悟しててね！！！🔥🔥🔥',
      '！！！{name}！！！誕生日！！！おめでとう！！！🎂🔥🎉\nもう無理、好きすぎる、しんどい、尊い、ありがとう！！！\n{name}が生まれた今日は人類の記念日だよ？？？\n全人類に祝わせたい！！拡散してくれ！！！\n来年も再来年もずっとずっとお祝いさせてください！！！',
      '🎂💥💥💥 {name}様ァァァ！！！\nハッッッピーーーバースデーーーー！！！！\n{name}の誕生日を祝える喜びで震えが止まらない！！\n存在そのものが国宝！！世界遺産！！奇跡！！\nこの愛は宇宙が滅びても消えないから！！！永遠に推す！！！🔥',
      '{name}ーーー！！！誕生日おめでとおおお！！！🥳🎊🎉🔥\nあのさ、{name}って罪深いよ？？？\nこんなに人を幸せにしていいの？？？\n推しが生きてるだけで世界は美しい！！！\n{name}にとって最高の一年になることを全力で祈ってる！！！',
      '⚡⚡⚡ {name}！！！HAPPY BIRTHDAY！！！🎂🎉🔥\n待ってた！！！この日をずっと待ってた！！！\n{name}のことが好きすぎて毎日感謝してるんだけど、\n今日だけは特別に1000倍の「ありがとう」を叫ばせて！！！\nこれからも{name}についていく！！一生推し！！宣誓！！！',
      '🎂🔥🎊 うわああああ{name}！！誕生日だあああ！！！\n{name}が生まれた奇跡に感謝！！ありがとう宇宙！！\nもう語彙力ないけどとにかく最高！！天才！！かわいい！！かっこいい！！\n全部！！全部好き！！！来年も絶対祝う！！永遠に祝う！！！🔥🔥🔥'
    ]
  };

  var lastIndex = { mild: -1, normal: -1, max: -1 };

  function generate() {
    var name = document.getElementById('oshiName').value.trim();
    if (!name) {
      alert('推しの名前を入力してください');
      return;
    }

    // localStorage に推し名を保存
    try { localStorage.setItem('oshi_birthday_msg_name', name); } catch(e) {}

    var list = TEMPLATES[currentHeat];
    var idx;
    do {
      idx = Math.floor(Math.random() * list.length);
    } while (idx === lastIndex[currentHeat] && list.length > 1);
    lastIndex[currentHeat] = idx;

    var msg = list[idx].replace(/\{name\}/g, name);

    // 結果表示
    var rc = document.getElementById('result');
    rc.classList.add('show');

    var badges = { mild: '☺️ 控えめ', normal: '🎉 普通', max: '🔥 全力' };
    document.getElementById('heatBadge').textContent = badges[currentHeat];
    document.getElementById('msgContent').textContent = msg;

    // コピーボタンリセット
    var btn = document.getElementById('btnCopy');
    btn.textContent = '📋 コピー';
    btn.classList.remove('copied');

    // 結果までスクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyMsg() {
    var text = document.getElementById('msgContent').textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showCopied(); });
    } else {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  }

  function showCopied() {
    var btn = document.getElementById('btnCopy');
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }, 2000);
  }

  // ── localStorage から推し名を復元 ──
  (function() {
    try {
      var saved = localStorage.getItem('oshi_birthday_msg_name');
      if (saved) { document.getElementById('oshiName').value = saved; }
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
