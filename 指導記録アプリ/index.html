<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指導記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>指導記録アプリ</h1>
    </header>

    <!-- 生徒登録エリア -->
    <section class="section" id="student-section">
      <h2>生徒登録</h2>
      <div class="student-form">
        <input type="text" id="student-name-input" placeholder="生徒名を入力" maxlength="20">
        <button id="add-student-btn" class="btn btn-primary">登録</button>
      </div>
      <div class="student-list" id="student-list">
        <!-- 生徒タブがここに入る -->
      </div>
    </section>

    <!-- 授業記録エリア -->
    <section class="section" id="record-section" style="display:none;">
      <div class="record-header">
        <h2 id="selected-student-name">生徒名</h2>
        <span class="student-label">の授業記録</span>
      </div>

      <div class="record-form">
        <div class="form-group">
          <label for="record-date">授業日</label>
          <input type="date" id="record-date">
        </div>
        <div class="form-group">
          <label for="record-content">授業内容</label>
          <textarea id="record-content" placeholder="今日学習した内容を入力" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="record-homework">宿題</label>
          <textarea id="record-homework" placeholder="宿題の内容を入力" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="record-goal">次回目標</label>
          <textarea id="record-goal" placeholder="次回授業の目標を入力" rows="2"></textarea>
        </div>
        <button id="save-record-btn" class="btn btn-primary btn-full">記録を保存</button>
      </div>

      <!-- 過去の授業記録一覧 -->
      <div class="history-section">
        <h3>授業履歴</h3>
        <div id="record-list">
          <!-- 記録がここに入る -->
        </div>
      </div>
    </section>

    <!-- 生徒未選択メッセージ -->
    <section class="section" id="empty-section">
      <p class="empty-msg">生徒を登録・選択してください</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
