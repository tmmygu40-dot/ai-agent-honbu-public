<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%AD%8B%E3%83%88%E3%83%AC%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA_v2/" />
  <meta name="description" content="筋トレ記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"筋トレ記録","description":"筋トレ記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E7%AD%8B%E3%83%88%E3%83%AC%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA_v2/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💪 筋トレ記録</h1>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
    </header>

    <!-- 記録追加フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <form id="recordForm">
        <div class="form-row">
          <label for="exercise">種目名</label>
          <input type="text" id="exercise" placeholder="例：ベンチプレス" required>
        </div>
        <div class="form-row">
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-row three-col">
          <div>
            <label for="weight">重量 (kg)</label>
            <input type="number" id="weight" min="0" step="0.5" placeholder="0" required>
          </div>
          <div>
            <label for="sets">セット数</label>
            <input type="number" id="sets" min="1" placeholder="1" required>
          </div>
          <div>
            <label for="reps">回数</label>
            <input type="number" id="reps" min="1" placeholder="1" required>
          </div>
        </div>
        <div class="form-row">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="体調や感想など">
        </div>
        <button type="submit" class="btn-primary">追加する</button>
      </form>
    </section>

    <!-- 自己ベスト一覧 -->
    <section class="best-section">
      <h2>🏆 自己ベスト</h2>
      <div id="bestList" class="best-list">
        <p class="empty-msg">記録がまだありません</p>
      </div>
    </section>

    <!-- 種目フィルター -->
    <section class="history-section">
      <h2>📋 履歴</h2>
      <div class="filter-row">
        <label for="filterExercise">種目で絞り込み：</label>
        <select id="filterExercise">
          <option value="">すべて</option>
        </select>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-msg">記録がまだありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
