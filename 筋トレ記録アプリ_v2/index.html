<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💪 筋トレ記録</h1>
    </header>

    <!-- 記録追加フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <form id="recordForm">
        <div class="form-row">
          <label for="exercise">種目名</label>
          <input type="text" id="exercise" placeholder="例：ベンチプレス" required>
        </div>
        <div class="form-row">
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-row three-col">
          <div>
            <label for="weight">重量 (kg)</label>
            <input type="number" id="weight" min="0" step="0.5" placeholder="0" required>
          </div>
          <div>
            <label for="sets">セット数</label>
            <input type="number" id="sets" min="1" placeholder="1" required>
          </div>
          <div>
            <label for="reps">回数</label>
            <input type="number" id="reps" min="1" placeholder="1" required>
          </div>
        </div>
        <div class="form-row">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="体調や感想など">
        </div>
        <button type="submit" class="btn-primary">追加する</button>
      </form>
    </section>

    <!-- 自己ベスト一覧 -->
    <section class="best-section">
      <h2>🏆 自己ベスト</h2>
      <div id="bestList" class="best-list">
        <p class="empty-msg">記録がまだありません</p>
      </div>
    </section>

    <!-- 種目フィルター -->
    <section class="history-section">
      <h2>📋 履歴</h2>
      <div class="filter-row">
        <label for="filterExercise">種目で絞り込み：</label>
        <select id="filterExercise">
          <option value="">すべて</option>
        </select>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-msg">記録がまだありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
