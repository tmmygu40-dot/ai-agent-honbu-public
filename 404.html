<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ページが見つかりません｜猫型ポケット</title>
  <meta name="description" content="お探しのページが見つかりませんでした。猫型ポケットのトップページや検索から目的のWebアプリを探せます。">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>

    :root {
      color-scheme: light;
      --bg: #fdf8ef;
      --card: #fffaf0;
      --text: #2f2a24;
      --muted: #6f6258;
      --accent: #f28c28;
      --border: #f4d3a1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 6px solid var(--accent);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(80, 50, 20, .08);
    }
    h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); margin: 0 0 12px; }
    h2 { margin-top: 32px; padding-top: 8px; border-top: 1px solid var(--border); }
    p, li { color: var(--text); }
    .lead { color: var(--muted); font-size: 1.05rem; }
    a { color: #a65300; font-weight: 700; }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 24px 0 0;
    }
    .nav a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      text-decoration: none;
    }
    .note {
      background: #fff7e3;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--muted);
    }
    footer { margin-top: 28px; color: var(--muted); font-size: .95rem; }

  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>ページが見つかりません</h1>
      <p class="lead">探していたページは、移動したか、URLが変わった可能性があります。猫のポケットの中をもう一度探してみてください。</p>

      <div class="nav">
        <a href="/">トップページへ戻る</a>
        <a href="/#search">アプリを探す</a>
        <a href="/about.html">運営者情報</a>
        <a href="/privacy.html">プライバシーポリシー</a>
        <a href="/terms.html">利用規約</a>
        <a href="/contact.html">お問い合わせ</a>
      </div>

      <h2>おすすめの探し方</h2>
      <ul>
        <li>トップページの検索欄に、目的やキーワードを入力する</li>
        <li>家計、仕事、学習、健康、趣味などのカテゴリから探す</li>
        <li>URLの文字抜けや誤字がないか確認する</li>
      </ul>

      <p class="note">ネコポケは大量の無料Webアプリを順次整備しています。目的に近いツールが見つからない場合も、トップページから似たアプリを探せます。</p>
    </section>
  </main>
</body>
</html>
