<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="送金額と送金先の国を選ぶだけで、Wise・PayPal・銀行送金など主要サービスの手数料と着金額を即比較。最安の海外送金方法がすぐ分かるシミュレーターです。">
  <title>海外送金コスト比較アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 比較テーブル ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .compare-table th {
      text-align: left; padding: 0.6rem 0.4rem; font-size: 0.75rem;
      color: var(--text-sub); font-weight: 600; border-bottom: 2px solid var(--border);
    }
    .compare-table th:nth-child(n+2) { text-align: right; }
    .compare-table td { padding: 0.65rem 0.4rem; border-bottom: 1px solid var(--border); }
    .compare-table td:nth-child(n+2) { text-align: right; font-variant-numeric: tabular-nums; }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .best-row { background: var(--ok-bg); }
    .compare-table .best-row td:first-child { font-weight: 800; color: var(--ok); }
    .compare-table .best-row td:last-child { font-weight: 800; color: var(--ok); }
    .rank-badge {
      display: inline-block; width: 22px; height: 22px; line-height: 22px;
      text-align: center; border-radius: 50%; font-size: 0.72rem; font-weight: 800;
      margin-right: 0.3rem; color: #fff; vertical-align: middle;
    }
    .rank-1 { background: var(--ok); }
    .rank-2 { background: var(--warn); }
    .rank-3 { background: var(--text-sub); }
    .rank-other { background: var(--border); color: var(--text-sub); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>海外送金コスト比較アプリ</h1>
    <p class="subtitle">送金額と国を選ぶだけで手数料・着金額を即比較（2025年4月時点の参考データ）</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">送金条件を入力</p>
    <div class="field">
      <label for="amount">送金額（円）</label>
      <input type="number" id="amount" placeholder="例: 100000" min="1">
      <p class="hint">日本円で送りたい金額を入力</p>
    </div>
    <div class="field">
      <label for="country">送金先の国・通貨</label>
      <select id="country">
        <option value="">-- 選択してください --</option>
        <option value="USD">アメリカ（USD）</option>
        <option value="EUR">ヨーロッパ（EUR）</option>
        <option value="GBP">イギリス（GBP）</option>
        <option value="AUD">オーストラリア（AUD）</option>
        <option value="CNY">中国（CNY）</option>
        <option value="KRW">韓国（KRW）</option>
        <option value="THB">タイ（THB）</option>
        <option value="PHP">フィリピン（PHP）</option>
        <option value="VND">ベトナム（VND）</option>
        <option value="INR">インド（INR）</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">最安サービス</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較一覧カード -->
  <div class="card" id="compare-card" style="display:none">
    <p class="card-title">サービス比較一覧（着金額が多い順）</p>
    <table class="compare-table">
      <thead>
        <tr><th>サービス</th><th>手数料</th><th>為替レート</th><th>着金額</th></tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">最安サービスの内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは各送金サービスの公開情報を参考に、目安として使いやすく整理しています。実際の手数料・為替レートはサービスごとに随時変動します。送金前に必ず各サービスの最新情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 為替レート（参考値・中値ベース） ──
  var RATES = {
    USD: { name: 'USドル', symbol: '$', mid: 0.00667 },
    EUR: { name: 'ユーロ', symbol: '€', mid: 0.00610 },
    GBP: { name: 'ポンド', symbol: '£', mid: 0.00527 },
    AUD: { name: '豪ドル', symbol: 'A$', mid: 0.01030 },
    CNY: { name: '人民元', symbol: '¥', mid: 0.04840 },
    KRW: { name: 'ウォン', symbol: '₩', mid: 9.200 },
    THB: { name: 'バーツ', symbol: '฿', mid: 0.2280 },
    PHP: { name: 'ペソ', symbol: '₱', mid: 0.3780 },
    VND: { name: 'ドン', symbol: '₫', mid: 171.0 },
    INR: { name: 'ルピー', symbol: '₹', mid: 0.5670 }
  };

  // ── 送金サービス定義 ──
  // fee: 固定手数料(円), feePct: 送金額に対する%手数料, marginPct: 為替マージン%
  var SERVICES = [
    { name: 'Wise',            fee: 0,    feePct: 0.60, marginPct: 0.05 },
    { name: 'PayPal',          fee: 499,  feePct: 0,    marginPct: 3.00 },
    { name: '楽天銀行',         fee: 750,  feePct: 0,    marginPct: 1.00 },
    { name: 'SBI新生銀行',     fee: 2000, feePct: 0,    marginPct: 0.50 },
    { name: '三菱UFJ銀行',     fee: 3000, feePct: 0,    marginPct: 1.00 },
    { name: '三井住友銀行',     fee: 3500, feePct: 0,    marginPct: 1.00 },
    { name: 'ゆうちょ銀行',     fee: 2500, feePct: 0,    marginPct: 1.50 },
    { name: 'Western Union',   fee: 990,  feePct: 0,    marginPct: 2.00 }
  ];

  function calc() {
    var amount = parseFloat(document.getElementById('amount').value);
    var currency = document.getElementById('country').value;
    if (isNaN(amount) || amount <= 0) { showErr('送金額を入力してください'); return; }
    if (!currency) { showErr('送金先の国を選択してください'); return; }

    var rateInfo = RATES[currency];
    var midRate = rateInfo.mid;
    var results = [];

    for (var i = 0; i < SERVICES.length; i++) {
      var s = SERVICES[i];
      var totalFee = s.fee + Math.round(amount * s.feePct / 100);
      var sendable = amount - totalFee;
      if (sendable <= 0) {
        results.push({ name: s.name, fee: totalFee, rate: 0, received: 0, feePct: s.feePct, fixedFee: s.fee, marginPct: s.marginPct });
        continue;
      }
      // マージン込みレート = 中値 × (1 - マージン%)
      var effectiveRate = midRate * (1 - s.marginPct / 100);
      var received = sendable * effectiveRate;
      results.push({
        name: s.name,
        fee: totalFee,
        rate: effectiveRate,
        received: received,
        feePct: s.feePct,
        fixedFee: s.fee,
        marginPct: s.marginPct
      });
    }

    // 着金額の多い順にソート
    results.sort(function(a, b) { return b.received - a.received; });

    // 結論カード
    var best = results[0];
    var worst = results[results.length - 1];
    var diff = best.received - worst.received;
    var level = 'ok';
    showResult(level,
      best.name,
      '着金額 ' + rateInfo.symbol + ' ' + fmtForeign(best.received, currency),
      '最安と最高で ' + rateInfo.symbol + ' ' + fmtForeign(diff, currency) + ' の差があります'
    );

    // 比較テーブル
    var tbody = document.getElementById('compare-body');
    tbody.innerHTML = '';
    for (var j = 0; j < results.length; j++) {
      var r = results[j];
      var tr = document.createElement('tr');
      if (j === 0) tr.className = 'best-row';

      var rankClass = j === 0 ? 'rank-1' : j === 1 ? 'rank-2' : j === 2 ? 'rank-3' : 'rank-other';
      tr.innerHTML =
        '<td><span class="rank-badge ' + rankClass + '">' + (j + 1) + '</span>' + esc(r.name) + '</td>' +
        '<td>' + fmt(r.fee) + ' 円</td>' +
        '<td>' + (r.rate > 0 ? r.rate.toFixed(6) : '-') + '</td>' +
        '<td>' + rateInfo.symbol + ' ' + fmtForeign(r.received, currency) + '</td>';
      tbody.appendChild(tr);
    }
    document.getElementById('compare-card').style.display = 'block';

    // 内訳カード（最安サービス）
    showDetail([
      ['送金額', fmt(amount) + ' 円'],
      ['サービス', best.name],
      ['固定手数料', fmt(best.fixedFee) + ' 円'],
      ['変動手数料 (' + best.feePct + '%)', fmt(best.fee - best.fixedFee) + ' 円'],
      ['手数料合計', fmt(best.fee) + ' 円'],
      ['実質送金額', fmt(amount - best.fee) + ' 円'],
      ['為替マージン', best.marginPct + ' %'],
      ['適用レート', best.rate.toFixed(6)],
      ['着金額', rateInfo.symbol + ' ' + fmtForeign(best.received, currency), true]
    ]);

    // localStorage に前回入力を保存
    try {
      localStorage.setItem('remit_amount', amount);
      localStorage.setItem('remit_country', currency);
    } catch(e) {}
  }

  function showResult(level, val, evalText, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('compare-card').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmtForeign(n, cur) {
    if (cur === 'KRW' || cur === 'VND') return Math.round(n).toLocaleString('ja-JP');
    return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── 前回入力の復元 ──
  (function() {
    try {
      var savedAmount = localStorage.getItem('remit_amount');
      var savedCountry = localStorage.getItem('remit_country');
      if (savedAmount) document.getElementById('amount').value = savedAmount;
      if (savedCountry) document.getElementById('country').value = savedCountry;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
