<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💒 冠婚葬祭マナークイズ</title>
  <meta name="description" content="知らないと恥ずかしい冠婚葬祭のマナーを10問の選択肢クイズで学べます。あなたのマナー知識をチェックしましょう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズ進捗 ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 1rem; text-align: center;
    }
    .quiz-progress strong { color: var(--accent); font-weight: 700; }

    /* ── 問題文 ── */
    .quiz-question {
      font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; line-height: 1.5;
    }

    /* ── 選択肢 ── */
    .quiz-options { margin: 0; }
    .quiz-option {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.75rem 0.9rem; margin-bottom: 0.6rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer;
      transition: all 0.2s;
    }
    .quiz-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .quiz-option input[type="radio"] { margin-top: 0.15rem; cursor: pointer; flex-shrink: 0; }
    .quiz-option label { font-size: 0.92rem; color: var(--text); cursor: pointer; flex: 1; line-height: 1.4; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 詳細カード ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>💒 冠婚葬祭マナークイズ</h1>
    <p class="subtitle">知らないと恥ずかしい冠婚葬祭のマナーを10問で学べます。あなたのマナー知識をチェックしてみましょう。</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <div class="quiz-progress">第 <strong id="qnum">1</strong> / <strong>10</strong> 問</div>
    <p class="quiz-question" id="qtext">問題がロード中...</p>
    <form class="quiz-options" id="qopts"></form>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="btn-next" onclick="nextQuestion()">次へ</button>

  <!-- 結論カード（スコア表示） -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- スコア詳細 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">解説</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、内閣府・文化庁などの官公庁資料や、冠婚葬祭に関する信頼できる公開データを参考に、一般的なマナーをまとめています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── クイズデータ（10問） ──
  var quizData = [
    {
      q: '一般的な葬儀での香典（故人が会社の上司）の金額は？',
      opts: ['3,000円', '5,000円', '10,000円', '20,000円'],
      ans: 1,
      exp: '会社の上司への香典は5,000～10,000円が目安。3,000円は親戚・友人向け。'
    },
    {
      q: '葬儀での服装で最もふさわしい靴の色は？',
      opts: ['黒色', '濃い紺色', '白色', '茶色'],
      ans: 0,
      exp: '弔事では黒の靴が正装です。光沢や装飾のない、シンプルな黒を選びます。'
    },
    {
      q: '弔電を送るベストなタイミングは？',
      opts: ['告別式当日に到着', '通夜の夜', '半年後の法要前', 'どのタイミングでもOK'],
      ans: 0,
      exp: '弔電は葬式前日か当日の告別式までに到着するよう送るのがマナーです。'
    },
    {
      q: '結婚式での服装で避けるべき色は？',
      opts: ['白', '黒', '紺', '淡いピンク'],
      ans: 0,
      exp: '白は花嫁の色とされ、避けるべきです。黒も避ける地域が多いため、紺・淡色が一般的。'
    },
    {
      q: '「御祝い」と「お祝い」の使い分けで正しいのは？',
      opts: ['どちらでも同じ', '目上の人には「御祝い」', '目下の人には「お祝い」', 'お金を包む時は「御祝い」'],
      ans: 3,
      exp: '「御祝い」は金封（祝儀袋）に使う敬語。手渡しする時は「お祝い」。'
    },
    {
      q: '成人式でのお祝いの相場は（友人の場合）？',
      opts: ['1,000円', '3,000円', '5,000円', '10,000円'],
      ans: 1,
      exp: '友人への成人祝いは3,000円程度が目安。親戚は5,000～10,000円。'
    },
    {
      q: '葬式での髪型で避けるべきは？',
      opts: ['黒でまとめた髪', 'うなじまとめ', '一つ結び（光のある髪留め）', 'すっきりまとめた髪'],
      ans: 2,
      exp: 'キラキラした髪留めは弔事向きではありません。黒のシンプルなピンやバレッタが正装。'
    },
    {
      q: '結婚祝いの金額（友人）の目安は？',
      opts: ['5,000円', '10,000円', '30,000円', '50,000円'],
      ans: 1,
      exp: '友人への結婚祝いは10,000円が一般的。親戚は30,000～50,000円程度。'
    },
    {
      q: '弔事での避けるべき装飾品は？',
      opts: ['シンプルなネックレス', 'キラキラしたブレスレット', '真珠のアクセサリー', 'シンプルな指輪'],
      ans: 1,
      exp: '光沢や派手な装飾品は避けます。真珠は弔事向きの正装。シンプルなものならOK。'
    },
    {
      q: '同じ会社の同期が出産した際のお祝いの金額は？',
      opts: ['3,000円', '5,000円', '10,000円', '20,000円'],
      ans: 1,
      exp: '同期・同等の立場への出産祝いは5,000円が目安。部下なら3,000円、上司なら10,000円程度。'
    }
  ];

  // ── 状態管理 ──
  var currentQ = 0;
  var answers = [];
  var correctCount = 0;

  // ── 初期化 ──
  window.addEventListener('load', function() {
    loadScores();
    showQuestion();
  });

  // ── 問題表示 ──
  function showQuestion() {
    if (currentQ >= quizData.length) {
      showResult();
      return;
    }
    var q = quizData[currentQ];
    document.getElementById('qnum').textContent = (currentQ + 1);
    document.getElementById('qtext').textContent = q.q;

    var optsHtml = '';
    for (var i = 0; i < q.opts.length; i++) {
      optsHtml += '<div class="quiz-option">'
                + '<input type="radio" id="opt' + i + '" name="answer" value="' + i + '">'
                + '<label for="opt' + i + '">' + q.opts[i] + '</label>'
                + '</div>';
    }
    document.getElementById('qopts').innerHTML = optsHtml;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  // ── 次へボタン ──
  function nextQuestion() {
    var selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) {
      alert('回答を選んでください');
      return;
    }

    var userAns = parseInt(selected.value);
    var correct = userAns === quizData[currentQ].ans;
    if (correct) { correctCount++; }

    answers.push({
      q: quizData[currentQ].q,
      ans: quizData[currentQ].opts[userAns],
      exp: quizData[currentQ].exp,
      correct: correct
    });

    currentQ++;
    if (currentQ >= quizData.length) {
      saveScores();
      showResult();
    } else {
      showQuestion();
    }
  }

  // ── 結果表示 ──
  function showResult() {
    var rc = document.getElementById('result');
    var pct = Math.round(correctCount / quizData.length * 100);
    var level = correctCount >= 8 ? 'ok' : correctCount >= 5 ? 'warn' : 'ng';
    var msg = correctCount >= 8 ? 'マナー知識が充実しています！'
            : correctCount >= 5 ? 'もう少し復習すると安心'
            : '基礎からの学習をお勧めします';

    rc.className = 'result-card ' + level;
    document.getElementById('rv').textContent = correctCount + ' / 10 問 (' + pct + '%)';
    document.getElementById('rn').textContent = msg;
    rc.style.display = 'block';
    document.getElementById('quiz-card').style.display = 'none';

    showDetail();
  }

  // ── 詳細表示 ──
  function showDetail() {
    var rows = [];
    for (var i = 0; i < answers.length; i++) {
      var a = answers[i];
      rows.push(['Q' + (i+1) + ' ' + (a.correct ? '✓' : '✗'), a.q]);
      rows.push(['あなたの答え', a.ans]);
      rows.push(['解説', a.exp]);
      if (i < answers.length - 1) {
        rows.push(['', '']);
      }
    }

    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var isHL = r[0].startsWith('Q');
      html += '<tr' + (isHL ? ' style="font-weight:700;color:var(--text);"' : '') + '>'
           + '<td style="' + (isHL ? 'color:' + (r[0].includes('✓') ? 'var(--ok)' : 'var(--ng)') + ';' : '') + '">' + r[0] + '</td>'
           + '<td style="text-align:left;padding-left:1rem;">' + r[1] + '</td></tr>';
    }
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  // ── localStorage ──
  function saveScores() {
    var score = {
      date: new Date().toISOString(),
      correctCount: correctCount,
      answers: answers
    };
    var history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
    history.push(score);
    localStorage.setItem('quizHistory', JSON.stringify(history));
  }

  function loadScores() {
    var history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
    if (history.length === 0) return;
    var last = history[history.length - 1];
    var best = history.reduce(function(m, h) { return h.correctCount > m ? h.correctCount : m; }, 0);
    var note = document.createElement('p');
    note.style.cssText = 'text-align:center;font-size:0.78rem;color:var(--text-sub);margin-bottom:0.5rem;';
    note.textContent = '前回: ' + last.correctCount + '/10問 ／ 最高: ' + best + '/10問';
    var card = document.getElementById('quiz-card');
    card.parentNode.insertBefore(note, card);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
