<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたの貯金体質タイプを診断。貯金上手か浪費家か、本当のお金との付き合い方が分かります。">
  <title>貯金体質診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 質問カード ── */
    .q-number {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    .q-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; min-height: 2.5em;
    }
    .q-progress {
      display: flex; gap: 6px; margin-bottom: 1rem;
    }
    .q-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); transition: background 0.2s;
    }
    .q-dot.done { background: var(--accent); }
    .q-dot.current { background: var(--accent); transform: scale(1.3); }
    .btn-yes, .btn-no {
      display: inline-block; width: 48%; padding: 0.9rem;
      font-size: 1rem; font-weight: 800; border: none;
      border-radius: var(--radius); cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-yes {
      background: var(--ok); color: #fff;
      box-shadow: 0 3px 0 #0f6b30, 0 4px 12px rgba(21,128,61,0.2);
    }
    .btn-no {
      background: var(--ng); color: #fff;
      box-shadow: 0 3px 0 #8b1515, 0 4px 12px rgba(185,28,28,0.2);
    }
    .btn-yes:active, .btn-no:active { transform: translateY(2px); }
    .btn-row { display: flex; gap: 4%; justify-content: center; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>💰 貯金体質診断</h1>
    <p class="subtitle">5問YES/NOに答えるだけで、あなたの本当の貯金力タイプがサクッと分かります。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <div class="q-progress" id="progress"></div>
    <p class="q-number" id="q-num">Q1 / 5</p>
    <p class="q-text" id="q-text"></p>
    <div class="btn-row">
      <button class="btn-yes" onclick="answer(true)">YES</button>
      <button class="btn-no" onclick="answer(false)">NO</button>
    </div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの貯金体質タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">回答の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">ワンポイントアドバイス</p>
    <p id="advice-text" style="font-size:0.92rem;line-height:1.6;color:var(--text-sub);"></p>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc no-print" id="retry-btn" style="display:none" onclick="retry()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断は一般的な家計管理の知見をもとに作成した簡易チェックです。個別の資産状況はFP等の専門家にご相談ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    { text: '毎月、給料が入ったらまず貯蓄分を先に分けている', yesScore: 1 },
    { text: '衝動買いをしたあと「これ本当に必要だった？」と考えることが多い', yesScore: 0 },
    { text: '1ヶ月の食費や光熱費がだいたいいくらか把握している', yesScore: 1 },
    { text: 'セールや限定品を見ると、予定外でもつい買ってしまう', yesScore: 0 },
    { text: '急な出費（家電故障・冠婚葬祭）に備えて、生活費とは別にお金を確保している', yesScore: 1 }
  ];

  var TYPES = {
    5: { name: '鉄壁ガード型', emoji: '🏆', level: 'ok',
         eval: '貯金体質レベル：MAX',
         note: '先取り貯蓄・支出把握・緊急予備費と三拍子揃った最強タイプ。今の習慣を無理なく続けるだけで、将来の安心度がどんどん上がります。',
         advice: '強すぎる節約でストレスを溜めないことだけ注意。たまのご褒美も立派な投資です。' },
    4: { name: '堅実セーバー型', emoji: '😊', level: 'ok',
         eval: '貯金体質レベル：高め',
         note: '基本はしっかりできています。あと1つ習慣を足せば鉄壁に。足りない部分を見直してみましょう。',
         advice: '「NO」だった項目を1つだけ意識してみてください。完璧を目指さなくても、1つ変えるだけでグッと安心感が増します。' },
    3: { name: 'バランス模索型', emoji: '🤔', level: 'warn',
         eval: '貯金体質レベル：普通',
         note: '貯められる素質はあるけど、ムラがあるタイプ。仕組みで自動化すると一気に安定します。',
         advice: '先取り貯蓄の自動振替を設定するだけで、意志力に頼らず貯まる体質に変われます。月5,000円からでもOK。' },
    2: { name: 'うっかり散財型', emoji: '😅', level: 'warn',
         eval: '貯金体質レベル：やや低め',
         note: '気づくとお金が減っている…心当たりありませんか？支出の見える化が第一歩です。',
         advice: '1週間だけ全支出をメモしてみてください。「どこに消えてるか」が分かるだけで行動が変わります。' },
    1: { name: 'エンジョイ浪費型', emoji: '💸', level: 'ng',
         eval: '貯金体質レベル：要注意',
         note: '今を楽しむのも大事ですが、将来の自分も少し助けてあげましょう。小さな一歩から始めればOK。',
         advice: '給料日に自動で3,000円だけ別口座に移す設定をしてみてください。たったそれだけで「貯まる仕組み」がスタートします。' },
    0: { name: '全力フルスロットル型', emoji: '🔥', level: 'ng',
         eval: '貯金体質レベル：危険ゾーン',
         note: '入ったお金が右から左…でも大丈夫、気づいた今日が一番早い日です。まずは現状把握から。',
         advice: '今月の支出を3つだけカテゴリ分けしてみてください。「食費・趣味・固定費」だけでOK。見えるだけで意識が変わります。' }
  };

  var current = 0;
  var score = 0;
  var answers = [];

  function renderQuestion() {
    var prog = document.getElementById('progress');
    prog.innerHTML = '';
    for (var i = 0; i < QUESTIONS.length; i++) {
      var dot = document.createElement('div');
      dot.className = 'q-dot' + (i < current ? ' done' : '') + (i === current ? ' current' : '');
      prog.appendChild(dot);
    }
    document.getElementById('q-num').textContent = 'Q' + (current + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = QUESTIONS[current].text;
  }

  function answer(yes) {
    var q = QUESTIONS[current];
    var pts = yes ? q.yesScore : (1 - q.yesScore);
    score += pts;
    answers.push({ text: q.text, ans: yes, pts: pts });

    current++;
    if (current < QUESTIONS.length) {
      renderQuestion();
    } else {
      showDiagnosis();
    }
  }

  function showDiagnosis() {
    document.getElementById('quiz-card').style.display = 'none';

    var type = TYPES[score];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + type.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = type.emoji + ' ' + type.name;
    document.getElementById('re').textContent = type.eval;
    document.getElementById('rn').textContent = type.note;

    var rows = answers.map(function(a) {
      return '<tr><td>' + a.text + '</td><td>' + (a.ans ? 'YES' : 'NO') + '</td></tr>';
    });
    rows.push('<tr class="hl"><td>貯金スコア</td><td>' + score + ' / ' + QUESTIONS.length + '</td></tr>');
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = 'block';

    document.getElementById('advice-text').textContent = type.advice;
    document.getElementById('advice-card').style.display = 'block';

    document.getElementById('retry-btn').style.display = 'block';

    try {
      localStorage.setItem('saving_diagnosis_v2', JSON.stringify({
        score: score, type: type.name, date: new Date().toISOString().slice(0,10)
      }));
    } catch(e) {}
  }

  function retry() {
    current = 0; score = 0; answers = [];
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    renderQuestion();
  }

  renderQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
