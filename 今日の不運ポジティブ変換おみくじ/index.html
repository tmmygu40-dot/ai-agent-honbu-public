<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="嫌なこと・ツイてない出来事をタップひとつでポジティブに変換。30秒で気分が軽くなる不運→前向きおみくじアプリです。">
  <title>今日の不運ポジティブ変換おみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── おみくじ専用スタイル ── */
    .omikuji-emoji { font-size: 4rem; text-align: center; margin-bottom: 0.5rem; line-height: 1.2; }
    .omikuji-bad { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 1rem; text-align: center; }
    .omikuji-bad-label { font-size: 0.72rem; font-weight: 700; color: var(--ng); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .omikuji-arrow { font-size: 1.6rem; text-align: center; margin: 0.5rem 0; color: var(--accent); }
    .omikuji-good { font-size: 1.05rem; font-weight: 700; color: var(--ok); line-height: 1.5; text-align: center; margin-bottom: 0.5rem; }
    .omikuji-good-label { font-size: 0.72rem; font-weight: 700; color: var(--ok); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .omikuji-advice { font-size: 0.82rem; color: var(--text-sub); line-height: 1.6; text-align: center; margin-top: 0.5rem; }
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.8rem; padding: 0.75rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }

    .history-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 0.72rem; color: var(--text-sub); }
    .history-bad { color: var(--text-sub); }
    .history-good { color: var(--ok); font-weight: 600; }
    .btn-clear-history {
      display: block; margin: 0.8rem 0 0; padding: 0.5rem;
      font-size: 0.78rem; font-weight: 600;
      background: none; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; width: 100%; text-align: center;
    }
    .btn-clear-history:hover { border-color: var(--ng); color: var(--ng); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

    { bad: '自販機にお金を吸われた', good: '機械への寄付で徳を積んだ！カルマポイント+100', advice: 'お金は天下の回りもの。あなたの100円はいつか1万円になって戻ってくる。', emoji: '🎰' },

    { bad: '爪が割れた', good: 'ネイルを新しくする完璧な口実が完成！おしゃれ運上昇中', advice: '割れたのは爪だけ。心は割れてないから大丈夫。', emoji: '💅' },

  var currentResult = null;

  function drawOmikuji() {
    var idx = Math.floor(Math.random() * OMIKUJI.length);
    var item = OMIKUJI[idx];
    currentResult = item;

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';

    document.getElementById('result-emoji').textContent = item.emoji;
    document.getElementById('result-bad').textContent = item.bad;
    document.getElementById('result-good').textContent = item.good;
    document.getElementById('result-advice').textContent = item.advice;

    document.getElementById('btn-copy').style.display = 'block';
    document.getElementById('btn-retry').style.display = 'block';

    // 履歴に保存
    saveHistory(item);
    renderHistory();

    // 結果までスクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyResult() {
    if (!currentResult) return;
    var text = '🔮 今日の不運ポジティブ変換おみくじ\n\n'
      + '【不運】' + currentResult.bad + '\n'
      + '　⬇️\n'
      + '【ポジティブ変換】' + currentResult.good + '\n\n'
      + '💡 ' + currentResult.advice;

    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btn-copy');
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = orig; }, 1500);
    }).catch(function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.getElementById('btn-copy');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = '📋 結果をコピーする'; }, 1500);
    });
  }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'omikuji_positive_history';

  function getHistory() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }

  function saveHistory(item) {
    var history = getHistory();
    var now = new Date();
    var dateStr = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    history.unshift({ date: dateStr, bad: item.bad, good: item.good, emoji: item.emoji });
    if (history.length > 20) history = history.slice(0, 20);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
  }

  function renderHistory() {
    var history = getHistory();
    var card = document.getElementById('history-card');
    var list = document.getElementById('history-list');
    if (history.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = history.map(function(h) {
      return '<div class="history-item">'
        + '<p class="history-date">' + h.emoji + ' ' + h.date + '</p>'
        + '<p class="history-bad">不運: ' + h.bad + '</p>'
        + '<p class="history-good">→ ' + h.good + '</p>'
        + '</div>';
    }).join('');
  }

  function clearHistory() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    renderHistory();
  }

  // 初期表示時に履歴があれば表示
  renderHistory();
  </script>
