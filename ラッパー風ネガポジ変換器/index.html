<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ラッパー風ネガポジ変換器｜独り言をライムに変換</title>
  <meta name="description" content="ネガティブな独り言を入力するだけで、韻を踏んだラッパー風バースに即変換。強気・前向き・ユーモアの3パターンを生成し、気分転換やSNSのネタにも使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field textarea, .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit; resize: vertical;
    }
    .field textarea:focus, .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .verse-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .verse-card.style-fierce { border-color: var(--ng); background: var(--ng-bg); }
    .verse-card.style-positive { border-color: var(--ok); background: var(--ok-bg); }
    .verse-card.style-humor { border-color: var(--warn); background: var(--warn-bg); }
    .verse-label {
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.06em;
      margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .verse-card.style-fierce .verse-label { color: var(--ng); }
    .verse-card.style-positive .verse-label { color: var(--ok); }
    .verse-card.style-humor .verse-label { color: var(--warn); }
    .verse-text {
      font-size: 1rem; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; font-weight: 600;
      margin-bottom: 0.8rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.45rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }

    .history-item {
      padding: 0.7rem 0.5rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .ts { font-size: 0.72rem; color: var(--text-sub); opacity: 0.7; }
    .btn-clear {
      display: block; margin: 0.8rem 0 0; padding: 0.5rem 0.9rem;
      font-size: 0.78rem; background: transparent; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .verse-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎤 ラッパー風ネガポジ変換器</h1>
    <p class="subtitle">ネガティブな独り言を、韻を踏んだバースに即変換</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="src">ネガティブな独り言</label>
      <textarea id="src" rows="4" placeholder="例：もう疲れた。なんかうまくいかない。やる気が出ない。"></textarea>
      <p class="hint">改行・句読点で文を区切ると、よりリズムが生まれます</p>
    </div>
  </div>

  <button class="btn-calc" onclick="convert()">🎤 ライムに変換する</button>

  <div id="output"></div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <div class="card" id="hist-card" style="display:none">
    <p class="card-title">最近の変換履歴</p>
    <div id="hist-list"></div>
    <button class="btn-clear" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎤 このツールは入力テキストをルールベースで変換するエンタメ用途のジェネレーターです。生成結果の利用は自己責任でお願いします。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'rapper_negapozi_v1';

  // ── ネガポジ置換辞書 ──
  var NEGA_DICT = [
    [/疲れた|疲れる|つかれた/g, '燃え尽きそうでも止まんねえ'],
    [/無理(だ|っす|です)?/g, 'まだやれる'],
    [/ダメ(だ|っぽい)?/g, 'Get it more'],
    [/しんどい/g, '踏ん張り時'],
    [/やる気が出ない|やる気でない/g, 'エンジン温め中'],
    [/うまくいかない|上手くいかない/g, '次の手 仕込み中'],
    [/眠い/g, '夢で先取り'],
    [/お金がない|金がない/g, 'これからbig money'],
    [/めんどくさい|面倒くさい|めんどい/g, 'やれば五分で片付く'],
    [/孤独|寂しい|さみしい/g, '一人時間でレベルアップ'],
    [/不安(だ)?/g, '備えてるからOK'],
    [/怖い/g, 'ビビらず一歩'],
    [/失敗した/g, '次の伏線にした'],
    [/イライラする|むかつく/g, 'クールダウン Now'],
    [/暇/g, '充電タイム'],
    [/最悪/g, 'ここから巻き返し'],
    [/つまらない/g, '自分で面白くする'],
    [/嫌い|きらい/g, '距離おいてOK'],
    [/負けた|まけた/g, '次の戦いの伏線'],
    [/もうやだ/g, 'リセットして再起動']
  ];

  // ── バーススタイル定義 ──
  var STYLES = {
    fierce: {
      label: '🔥 強気バース',
      cls: 'style-fierce',
      intro: ['Yo, listen up,', 'Check this out,', 'Mic check,'],
      tail: [' Yo!', ' Check it!', ' 立ち上がるDay', ' 折れねえWay', ' まだやれるStay']
    },
    positive: {
      label: '🌱 前向きバース',
      cls: 'style-positive',
      intro: ['ゆっくり行こう、', '一歩ずつ、', '深呼吸して、'],
      tail: [' 進むStay', ' 明日へWay', ' もう一歩Today', ' 光がさすDay', ' 大丈夫Way']
    },
    humor: {
      label: '😎 ユーモアバース',
      cls: 'style-humor',
      intro: ['まあとりま、', 'ちょっと聞いて、', 'いやいや、'],
      tail: [' とりまイェー', ' 気合でセイヤ', ' カモン明日Yay', ' ま、いっかDay', ' なんとかなるYo']
    }
  };

  function applyDict(text) {
    var out = text;
    for (var i = 0; i < NEGA_DICT.length; i++) {
      out = out.replace(NEGA_DICT[i][0], NEGA_DICT[i][1]);
    }
    return out;
  }

  function splitSentences(text) {
    var arr = text.replace(/[\r\n]+/g, '。').split(/[。、！？!?]/);
    var out = [];
    for (var i = 0; i < arr.length; i++) {
      var s = arr[i].trim();
      if (s.length > 0) out.push(s);
    }
    return out;
  }

  function buildVerse(styleKey, sentences) {
    var s = STYLES[styleKey];
    var lines = [];
    var introIdx = Math.floor(Math.random() * s.intro.length);
    for (var i = 0; i < sentences.length; i++) {
      var converted = applyDict(sentences[i]);
      var tail = s.tail[i % s.tail.length];
      var prefix = (i === 0) ? s.intro[introIdx] + ' ' : '';
      lines.push(prefix + converted + tail);
    }
    return lines.join('\n');
  }

  function convert() {
    var src = document.getElementById('src').value.trim();
    if (!src) {
      alert('ネガティブな独り言を入力してください');
      return;
    }
    var sentences = splitSentences(src);
    if (sentences.length === 0) {
      alert('文を1つ以上入力してください');
      return;
    }

    var keys = ['fierce', 'positive', 'humor'];
    var html = '';
    var verses = {};
    for (var i = 0; i < keys.length; i++) {
      var v = buildVerse(keys[i], sentences);
      verses[keys[i]] = v;
      var s = STYLES[keys[i]];
      html += '<div class="verse-card ' + s.cls + '">'
           +    '<p class="verse-label">' + s.label + '</p>'
           +    '<p class="verse-text" id="vt-' + keys[i] + '">' + escapeHtml(v) + '</p>'
           +    '<button class="btn-copy" onclick="copyVerse(\'' + keys[i] + '\', this)">📋 コピー</button>'
           + '</div>';
    }
    document.getElementById('output').innerHTML = html;

    saveHistory(src, verses);
    renderHistory();
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function copyVerse(key, btn) {
    var text = document.getElementById('vt-' + key).textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        flashCopied(btn);
      }).catch(function() {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); flashCopied(btn); } catch (e) {}
    document.body.removeChild(ta);
  }

  function flashCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = '✅ Copied';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1400);
  }

  function saveHistory(src, verses) {
    var raw = localStorage.getItem(STORAGE_KEY);
    var arr = [];
    try { arr = raw ? JSON.parse(raw) : []; } catch (e) { arr = []; }
    arr.unshift({
      ts: new Date().toISOString(),
      src: src,
      verses: verses
    });
    if (arr.length > 5) arr = arr.slice(0, 5);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function loadHistory() {
    var raw = localStorage.getItem(STORAGE_KEY);
    try { return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
  }

  function renderHistory() {
    var arr = loadHistory();
    var card = document.getElementById('hist-card');
    var list = document.getElementById('hist-list');
    if (!arr.length) { card.style.display = 'none'; return; }
    card.style.display = '';
    list.innerHTML = arr.map(function(item) {
      var d = new Date(item.ts);
      var ts = d.getMonth()+1 + '/' + d.getDate() + ' ' + d.getHours() + ':' + ('0'+d.getMinutes()).slice(-2);
      return '<div class="history-item"><span class="ts">' + ts + '</span>　' + escapeHtml(item.src.slice(0, 40)) + (item.src.length > 40 ? '…' : '') + '</div>';
    }).join('');
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
  }

  renderHistory();
  </script>
