<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="app" id="app">

    <header class="header">
      <h1>⏱ タイマー</h1>
    </header>

    <!-- タイマー表示 -->
    <div class="display-area">
      <div class="time-display" id="timeDisplay">05:00</div>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- 入力エリア -->
    <div class="input-area" id="inputArea">
      <div class="time-inputs">
        <div class="input-group">
          <input type="number" id="minInput" value="5" min="0" max="99">
          <label>分</label>
        </div>
        <span class="colon">:</span>
        <div class="input-group">
          <input type="number" id="secInput" value="0" min="0" max="59">
          <label>秒</label>
        </div>
      </div>

      <!-- プリセットボタン -->
      <div class="presets">
        <button class="btn btn-preset" data-min="1" data-sec="0">1分</button>
        <button class="btn btn-preset" data-min="3" data-sec="0">3分</button>
        <button class="btn btn-preset" data-min="5" data-sec="0">5分</button>
      </div>
    </div>

    <!-- 操作ボタン -->
    <div class="controls">
      <button class="btn btn-start"  id="startBtn">スタート</button>
      <button class="btn btn-pause"  id="pauseBtn"  disabled>一時停止</button>
      <button class="btn btn-reset"  id="resetBtn">リセット</button>
    </div>

  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
