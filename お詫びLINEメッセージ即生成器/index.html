<!DOCTYPE html>
<html lang="ja">
<head>

    :root {
      --bg: #f5f0e8;
      --card: #ffffff;

      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }

    /* ── メッセージカード ── */
    .msg-card {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .msg-card:last-child { margin-bottom: 0; }
    .msg-label {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.4rem; letter-spacing: 0.04em;
    }
    .msg-text {
      font-size: 0.95rem; color: var(--text); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .btn-copy {
      display: block; width: 100%; margin-top: 0.7rem; padding: 0.55rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .btn-copy:active, .btn-copy.copied {
      background: var(--accent); color: #fff;
    }

    /* ── 履歴 ── */
    .history-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-meta { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.2rem; }
    .history-msg { color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>

  var HISTORY_KEY = 'owabi_line_history';

  function generate() {
    var scene = document.getElementById('scene').value;
    var relation = document.getElementById('relation').value;
    var severity = document.getElementById('severity').value;

    var tpl = TEMPLATES[scene];
    if (!tpl || !tpl[severity] || !tpl[severity][relation]) {
      tpl = TEMPLATES['other'];
    }
    var msgs = tpl[severity][relation];

    var container = document.getElementById('messages');
    container.innerHTML = '';

    var labels = ['パターン A', 'パターン B', 'パターン C'];
    for (var i = 0; i < msgs.length; i++) {
      var card = document.createElement('div');
      card.className = 'msg-card';
      card.innerHTML =
        '<p class="msg-label">' + labels[i] + '</p>' +
        '<p class="msg-text">' + escapeHtml(msgs[i]) + '</p>' +
        '<button class="btn-copy" onclick="copyMsg(this)" data-msg="' + escapeAttr(msgs[i]) + '">コピーする</button>';
      container.appendChild(card);
    }

    var rc = document.getElementById('result');
    rc.style.display = 'block';

    saveHistory(scene, relation, severity, msgs[0]);
    renderHistory();
  }

  function copyMsg(btn) {
    var msg = btn.getAttribute('data-msg');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(msg).then(function() {
        showCopied(btn);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = msg;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1500);
  }

  function saveHistory(scene, relation, severity, msg) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var sceneNames = {};
    for (var k in TEMPLATES) { sceneNames[k] = TEMPLATES[k].name; }
    var relNames = { boss: '上司', colleague: '同僚', friend: '友人', partner: '恋人', client: '取引先' };
    var sevNames = { light: '軽め', normal: '普通', serious: '深刻' };

    history.unshift({
      date: new Date().toLocaleString('ja-JP'),
      scene: sceneNames[scene] || scene,
      relation: relNames[relation] || relation,
      severity: sevNames[severity] || severity,
      msg: msg
    });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var card = document.getElementById('history-card');
    var list = document.getElementById('history-list');
    if (history.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = history.map(function(h) {
      return '<div class="history-item">' +
        '<p class="history-meta">' + escapeHtml(h.date) + '　' + escapeHtml(h.scene) + ' / ' + escapeHtml(h.relation) + ' / ' + escapeHtml(h.severity) + '</p>' +
        '<p class="history-msg">' + escapeHtml(h.msg) + '</p>' +
      '</div>';
    }).join('');
  }

  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function escapeAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 初期表示で履歴を描画
  renderHistory();
