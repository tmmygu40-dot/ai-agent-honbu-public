<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🥦 食材管理</h1>
      <p class="subtitle">賞味期限が近い順に並べます</p>
    </header>

    <section class="input-section">
      <div class="input-group">
        <input type="text" id="itemName" placeholder="食材名" maxlength="40">
        <input type="date" id="itemDate">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <section class="list-section">
      <div class="summary" id="summary"></div>
      <ul id="itemList"></ul>
      <p class="empty-msg" id="emptyMsg">食材を登録してください</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
