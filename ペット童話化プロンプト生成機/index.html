<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 ペット童話化プロンプト生成機</title>
  <meta name="description" content="ペットの写真をアップロードして、童話の主人公のようにするAIプロンプトを即座に生成。SNS投稿やグッズデザインに活用できます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🐾 ペット童話化プロンプト生成機</h1>
    <p class="subtitle">ペット写真を選んで、童話の主人公の絵を描かせるAIプロンプトを即座に生成。SNS投稿やグッズデザインに活用できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ペット写真を選択</p>
    <div class="field">
      <label for="petImage">ペット写真</label>
      <input type="file" id="petImage" accept="image/*">
      <p class="hint">JPG / PNG / WebP に対応しています</p>
    </div>
    <div id="imagePreview" style="margin-top: 1rem; text-align: center; display: none;">
      <img id="previewImg" style="max-width: 100%; max-height: 300px; border-radius: 10px;">
    </div>
  </div>

  <!-- スタイル選択カード -->
  <div class="card">
    <p class="card-title">童話スタイルを選ぶ</p>
    <div id="styleButtons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem;">
      <!-- JavaScript で生成 -->
    </div>
  </div>

  <!-- プロンプト生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">プロンプト生成</button>

  <!-- 生成されたプロンプト -->
  <div class="card" id="result" style="display:none">
    <p class="card-title">生成されたプロンプト</p>
    <div id="promptBox" style="background: #f9f9f9; padding: 1rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.6; word-break: break-word; margin-bottom: 1rem; border: 1px solid var(--border);">
      <p id="promptText"></p>
    </div>
    <button onclick="copyToClipboard()" style="display: block; width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.95rem;">📋 コピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールで生成されたプロンプトは、各AI画像生成サービス（Midjourney / Stable Diffusion など）で活用できます。実際の画像生成時には、各サービスの利用規約をご確認ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 童話スタイル定義 ──
  var FAIRY_TALES = [
    { id: 'red-riding-hood', name: '赤ずきん', desc: '赤い肌着の女の子のように、可愛らしく、少し冒険心のある雰囲気で' },
    { id: 'cinderella', name: 'シンデレラ', desc: 'ドレスを着た優雅な姿で、魔法のような美しさと高貴さを持ち、輝いている雰囲気で' },
    { id: 'snow-white', name: '白雪姫', desc: '白い肌、黒い髪、赤いリボンの美しい女の子のように、優しく、魔法のような光に包まれて' },
    { id: 'pinocchio', name: 'ピノキオ', desc: '木製の人形のような素朴で可愛らしい表情で、冒険好きで好奇心旺盛な雰囲気で' },
    { id: 'rapunzel', name: 'ラプンツェル', desc: '長い金髪が特徴的で、明るく優しく、魔法のように輝いている雰囲気で' }
  ];

  // ── ページ読み込み時の初期化 ──
  window.addEventListener('DOMContentLoaded', function() {
    renderStyleButtons();
  });

  // ── スタイルボタン生成 ──
  function renderStyleButtons() {
    var container = document.getElementById('styleButtons');
    container.innerHTML = FAIRY_TALES.map(function(tale) {
      return '<button type="button" onclick="selectStyle(\'' + tale.id + '\')" id="btn-' + tale.id + '" style="padding:0.8rem;background:var(--card);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.2s;">' + tale.name + '</button>';
    }).join('');
  }

  // ── 選択中のスタイルID ──
  var selectedStyle = null;

  // ── スタイル選択 ──
  function selectStyle(id) {
    var allBtns = document.querySelectorAll('#styleButtons button');
    allBtns.forEach(function(btn) {
      btn.style.background = 'var(--card)';
      btn.style.borderColor = 'var(--border)';
      btn.style.color = 'var(--text)';
    });
    var selectedBtn = document.getElementById('btn-' + id);
    selectedBtn.style.background = 'var(--accent)';
    selectedBtn.style.borderColor = 'var(--accent)';
    selectedBtn.style.color = '#fff';
    selectedStyle = id;
  }

  // ── 画像ファイル選択時の処理 ──
  document.getElementById('petImage').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
      var reader = new FileReader();
      reader.onload = function(evt) {
        document.getElementById('previewImg').src = evt.target.result;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // ── プロンプト生成 ──
  function generatePrompt() {
    var imageInput = document.getElementById('petImage');
    if (!imageInput.files.length) {
      alert('ペット写真を選んでください');
      return;
    }
    if (!selectedStyle) {
      alert('童話スタイルを選んでください');
      return;
    }

    var tale = FAIRY_TALES.find(function(t) { return t.id === selectedStyle; });
    var prompt = tale.name + 'のようなペットの肖像画。' + tale.desc + '。ファンタジー背景。高品質、詳細な絵画、魔法のような光。';

    document.getElementById('promptText').textContent = prompt;
    document.getElementById('result').style.display = '';

    // localStorage に保存（追加候補）
    saveHistory(tale.name, prompt);
  }

  // ── クリップボードにコピー ──
  function copyToClipboard() {
    var text = document.getElementById('promptText').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert('プロンプトをコピーしました！');
      });
    } else {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('プロンプトをコピーしました！');
    }
  }

  // ── 履歴保存（localStorage） ──
  function saveHistory(style, prompt) {
    var history = JSON.parse(localStorage.getItem('petPromptHistory') || '[]');
    history.unshift({ style: style, prompt: prompt, date: new Date().toLocaleString('ja-JP') });
    if (history.length > 10) history.pop();
    localStorage.setItem('petPromptHistory', JSON.stringify(history));
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
