<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太陽光発電管理アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 0.85rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── 2列グリッド入力 ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.85rem; }

    /* ── ボタン ── */
    .btn-primary {
      display: block; width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 1rem;
    }
    .btn-primary:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 進捗バー ── */
    .progress-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 20px;
      overflow: hidden;
      margin: 0.75rem 0 0.5rem;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #fbbf24);
      transition: width 0.5s ease;
      min-width: 0;
    }
    .progress-bar.full { background: linear-gradient(90deg, var(--ok), #22c55e); }
    .progress-label {
      font-size: 0.8rem; font-weight: 700;
      text-align: right; color: var(--text-sub);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-main { text-align: center; margin-bottom: 1rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.3rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.3rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .ok-row td:last-child { color: var(--ok); }

    /* ── 記録一覧 ── */
    .record-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .record-table th {
      text-align: left; padding: 0.5rem 0.4rem;
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      border-bottom: 2px solid var(--border);
    }
    .record-table td { padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .record-table tr:last-child td { border-bottom: none; }
    .record-table td:nth-child(3), .record-table td:nth-child(4) { text-align: right; font-weight: 600; }
    .btn-del {
      font-size: 0.72rem; padding: 0.3rem 0.6rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--ng); cursor: pointer;
      font-weight: 700;
    }
    .btn-del:hover { background: var(--ng-bg); border-color: var(--ng); }
    .empty-msg { text-align: center; padding: 1.5rem; color: var(--text-sub); font-size: 0.85rem; }

    /* ── 設定保存ボタン（小さめ） ── */
    .btn-save {
      display: inline-block; padding: 0.55rem 1.2rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      margin-top: 0.75rem;
    }
    .saved-badge {
      display: none; font-size: 0.78rem; color: var(--ok);
      font-weight: 700; margin-left: 0.75rem; vertical-align: middle;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>☀️ 太陽光発電管理アプリ</h1>
    <p class="subtitle">月別発電量・売電収入を記録して投資回収の進捗をすぐ確認</p>
  </header>

  <!-- 初期投資額設定カード -->
  <div class="card">
    <p class="card-title">初期投資額の設定</p>
    <div class="field">
      <label for="totalCost">初期投資額（円）</label>
      <input type="number" id="totalCost" placeholder="例: 1500000" min="0">
    </div>
    <button class="btn-save" onclick="saveCost()">保存</button>
    <span class="saved-badge" id="savedBadge">✓ 保存しました</span>
  </div>

  <!-- 月別記録入力カード -->
  <div class="card">
    <p class="card-title">月別記録を追加</p>
    <div class="field-row">
      <div class="field" style="margin:0">
        <label for="recYear">年</label>
        <input type="number" id="recYear" placeholder="例: 2025" min="2000" max="2100">
      </div>
      <div class="field" style="margin:0">
        <label for="recMonth">月</label>
        <select id="recMonth">
          <option value="1">1月</option><option value="2">2月</option>
          <option value="3">3月</option><option value="4">4月</option>
          <option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option>
          <option value="9">9月</option><option value="10">10月</option>
          <option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field" style="margin:0">
        <label for="recKwh">発電量（kWh）</label>
        <input type="number" id="recKwh" placeholder="例: 350" min="0">
      </div>
      <div class="field" style="margin:0">
        <label for="recIncome">売電収入（円）</label>
        <input type="number" id="recIncome" placeholder="例: 9800" min="0">
      </div>
    </div>
    <button class="btn-primary" onclick="addRecord()">記録を追加</button>
  </div>

  <!-- 投資回収進捗カード -->
  <div class="result-card" id="resultCard">
    <div class="result-main">
      <p class="result-label">投資回収達成率</p>
      <p class="result-value" id="resultPct">—</p>
      <p class="result-note" id="resultNote"></p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <p class="progress-label" id="progressLabel"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detailCard" style="display:none">
    <p class="card-title">投資回収内訳</p>
    <table class="detail-table"><tbody id="detailBody"></tbody></table>
  </div>

  <!-- 月別記録一覧カード -->
  <div class="card" id="recordsCard" style="display:none">
    <p class="card-title">月別記録一覧</p>
    <div style="overflow-x:auto">
      <table class="record-table">
        <thead>
          <tr>
            <th>年月</th>
            <th>発電量</th>
            <th>売電収入</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var COST_KEY = 'solar_cost';
  var RECS_KEY = 'solar_records';

  // 初期化
  (function init() {
    var cost = localStorage.getItem(COST_KEY);
    if (cost) document.getElementById('totalCost').value = cost;

    // 今月をデフォルト設定
    var now = new Date();
    document.getElementById('recYear').value = now.getFullYear();
    document.getElementById('recMonth').value = now.getMonth() + 1;

    renderAll();
  })();

  function saveCost() {
    var v = parseFloat(document.getElementById('totalCost').value);
    if (isNaN(v) || v <= 0) { alert('初期投資額を正しく入力してください'); return; }
    localStorage.setItem(COST_KEY, v);
    var badge = document.getElementById('savedBadge');
    badge.style.display = 'inline';
    setTimeout(function() { badge.style.display = 'none'; }, 2000);
    renderAll();
  }

  function addRecord() {
    var year   = parseInt(document.getElementById('recYear').value);
    var month  = parseInt(document.getElementById('recMonth').value);
    var kwh    = parseFloat(document.getElementById('recKwh').value);
    var income = parseFloat(document.getElementById('recIncome').value);

    if (isNaN(year) || isNaN(month)) { alert('年・月を入力してください'); return; }
    if (isNaN(kwh) || kwh < 0)       { alert('発電量を入力してください'); return; }
    if (isNaN(income) || income < 0) { alert('売電収入を入力してください'); return; }

    var records = loadRecords();
    var key = year * 100 + month;

    // 同月の記録が既にあれば上書き確認
    var existing = records.findIndex(function(r) { return r.year * 100 + r.month === key; });
    if (existing >= 0) {
      if (!confirm(year + '年' + month + '月の記録が既にあります。上書きしますか？')) return;
      records[existing] = { year: year, month: month, kwh: kwh, income: income };
    } else {
      records.push({ year: year, month: month, kwh: kwh, income: income });
    }

    // 年月順にソート
    records.sort(function(a, b) {
      return (a.year * 100 + a.month) - (b.year * 100 + b.month);
    });

    saveRecords(records);
    renderAll();

    // 入力欄をクリア
    document.getElementById('recKwh').value = '';
    document.getElementById('recIncome').value = '';
  }

  function deleteRecord(idx) {
    var records = loadRecords();
    records.splice(idx, 1);
    saveRecords(records);
    renderAll();
  }

  function renderAll() {
    var records = loadRecords();
    var cost    = parseFloat(localStorage.getItem(COST_KEY)) || 0;

    renderProgress(records, cost);
    renderRecords(records);
  }

  function renderProgress(records, cost) {
    var resultCard = document.getElementById('resultCard');
    var detailCard = document.getElementById('detailCard');

    if (records.length === 0 || cost <= 0) {
      resultCard.style.display = 'none';
      detailCard.style.display = 'none';
      return;
    }

    var totalKwh    = 0;
    var totalIncome = 0;
    records.forEach(function(r) { totalKwh += r.kwh; totalIncome += r.income; });

    var months      = records.length;
    var avgIncome   = totalIncome / months;
    var remaining   = cost - totalIncome;
    var pct         = Math.min(totalIncome / cost * 100, 100);
    var recovered   = remaining <= 0;

    // 予測完済月
    var predText = '—';
    if (!recovered && avgIncome > 0) {
      var monthsLeft = Math.ceil(remaining / avgIncome);
      var last = records[records.length - 1];
      var predDate = new Date(last.year, last.month - 1 + monthsLeft, 1);
      predText = predDate.getFullYear() + '年' + (predDate.getMonth() + 1) + '月';
    } else if (recovered) {
      predText = '回収完了済み';
    }

    var level = recovered ? 'ok' : pct >= 50 ? 'warn' : 'ng';

    resultCard.className = 'result-card ' + level;
    resultCard.style.display = '';
    document.getElementById('resultPct').textContent = pct.toFixed(1) + '%';
    document.getElementById('resultNote').textContent = recovered
      ? '投資回収が完了しました！'
      : '残り ' + fmt(Math.ceil(remaining)) + ' 円で回収完了';

    var bar = document.getElementById('progressBar');
    bar.style.width = pct.toFixed(1) + '%';
    bar.className = 'progress-bar' + (recovered ? ' full' : '');
    document.getElementById('progressLabel').textContent =
      fmt(Math.round(totalIncome)) + ' 円 / ' + fmt(cost) + ' 円';

    // 内訳
    var rows = [
      ['初期投資額',     fmt(cost) + ' 円'],
      ['記録月数',       months + ' ヶ月'],
      ['累計発電量',     fmt(Math.round(totalKwh)) + ' kWh'],
      ['累計売電収入',   fmt(Math.round(totalIncome)) + ' 円'],
      ['月平均売電収入', fmt(Math.round(avgIncome)) + ' 円 / 月'],
      ['残り回収額',     fmt(Math.max(0, Math.ceil(remaining))) + ' 円'],
      ['予測完済時期',   predText, true],
    ];

    document.getElementById('detailBody').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="ok-row"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    detailCard.style.display = '';
  }

  function renderRecords(records) {
    var card = document.getElementById('recordsCard');
    var tbody = document.getElementById('recordsBody');

    if (records.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = '';

    tbody.innerHTML = records.map(function(r, i) {
      return '<tr>'
        + '<td>' + r.year + '年' + r.month + '月</td>'
        + '<td>' + fmt(r.kwh) + ' kWh</td>'
        + '<td>' + fmt(r.income) + ' 円</td>'
        + '<td><button class="btn-del" onclick="deleteRecord(' + i + ')">削除</button></td>'
        + '</tr>';
    }).join('');
  }

  function loadRecords() {
    try { return JSON.parse(localStorage.getItem(RECS_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveRecords(r) { localStorage.setItem(RECS_KEY, JSON.stringify(r)); }
  function fmt(n) { return Number(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
