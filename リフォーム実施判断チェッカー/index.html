<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リフォーム実施判断チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .input-row { display: flex; gap: 0.7rem; }
    .input-row .field { flex: 1; margin-bottom: 0; }

    .section-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 0.7rem; margin-top: 1rem;
      padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .section-label:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .hl2 td:last-child { color: var(--ng); font-size: 1.05rem; }

    .verdict-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
    }
    .badge-now  { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
    .badge-wait { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .badge-same { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }

    .reset-link {
      display: block; text-align: center; margin-top: 0.5rem;
      font-size: 0.78rem; color: var(--text-sub); cursor: pointer;
      text-decoration: underline;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🏠 リフォーム実施判断チェッカー</h1>
    <p class="subtitle">値上がり率と先延ばしリスクから「今やるべきか・待てるか」を即判断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <p class="section-label">現在のリフォーム費用</p>
    <div class="field">
      <label for="cost">現在のリフォーム見積もり費用（万円）</label>
      <input type="number" id="cost" placeholder="例: 150" min="0" inputmode="decimal">
      <p class="hint">現時点での工事費用の概算</p>
    </div>

    <p class="section-label">先延ばしシナリオ</p>
    <div class="input-row">
      <div class="field">
        <label for="rate">年間値上がり率（%）</label>
        <input type="number" id="rate" placeholder="例: 5" min="0" max="100" inputmode="decimal">
        <p class="hint">材料費・人件費の上昇率</p>
      </div>
      <div class="field">
        <label for="years">先延ばし年数（年）</label>
        <input type="number" id="years" placeholder="例: 3" min="0" max="30" inputmode="decimal">
        <p class="hint">何年後に実施するか</p>
      </div>
    </div>
    <div class="field">
      <label for="damage">先延ばし中に発生する追加損害・修繕費（万円）</label>
      <input type="number" id="damage" placeholder="例: 20" min="0" inputmode="decimal">
      <p class="hint">雨漏り悪化・外壁劣化など、放置で発生する追加コスト（なければ 0）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">今やるべきか判断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判断結果</p>
    <div id="verdict-badge-wrap"></div>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <span class="reset-link" onclick="resetResult()">入力をリセット</span>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">コスト内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'reform_checker_v1';

  function $(id) { return document.getElementById(id); }

  function load() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (d.cost)   $('cost').value   = d.cost;
      if (d.rate)   $('rate').value   = d.rate;
      if (d.years)  $('years').value  = d.years;
      if (d.damage) $('damage').value = d.damage;
    } catch(e) {}
  }

  function save(cost, rate, years, damage) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ cost: cost, rate: rate, years: years, damage: damage }));
    } catch(e) {}
  }

  function calc() {
    var cost   = parseFloat($('cost').value);
    var rate   = parseFloat($('rate').value);
    var years  = parseFloat($('years').value);
    var damage = parseFloat($('damage').value) || 0;

    if (isNaN(cost) || cost <= 0) { showErr('リフォーム費用を入力してください'); return; }
    if (isNaN(rate) || rate < 0)  { showErr('年間値上がり率を入力してください'); return; }
    if (isNaN(years) || years <= 0) { showErr('先延ばし年数を入力してください'); return; }

    save(cost, rate, years, damage);

    // コスト計算
    var costNow    = cost;
    var costLater  = cost * Math.pow(1 + rate / 100, years) + damage;
    var diff       = costLater - costNow;
    var diffPct    = (diff / costNow * 100).toFixed(1);

    var level, badgeClass, badgeText, headline, note;

    if (diff > 0) {
      // 後回しのほうが高くなる → 今やるべき
      level      = 'ng';
      badgeClass = 'badge-now';
      badgeText  = '今すぐやるべき';
      headline   = '+ ' + fmt(diff) + ' 万円 の損失';
      note       = years + '年後に実施すると約 ' + fmt(costLater) + ' 万円になります（今より ' + diffPct + '% 高い）。\n早期実施がコスト的に有利です。';
    } else if (diff < 0) {
      // 後回しのほうが安い → 待てる
      var savingAmt = -diff;
      level      = 'ok';
      badgeClass = 'badge-wait';
      badgeText  = '待てる（後回しOK）';
      headline   = '- ' + fmt(savingAmt) + ' 万円 の節約見込み';
      note       = years + '年後に実施すると約 ' + fmt(costLater) + ' 万円（今より ' + Math.abs(diffPct) + '% 安い見込み）。\nただし先延ばし中の損害費用が増える可能性があります。';
    } else {
      level      = 'warn';
      badgeClass = 'badge-same';
      badgeText  = 'どちらでも同等';
      headline   = 'コスト差はほぼ 0';
      note       = '今やっても ' + years + '年後にやっても費用はほぼ同じです。\n劣化リスクや生活の優先度で判断してください。';
    }

    showResult(level, badgeClass, badgeText, headline, note);

    showDetail([
      ['今すぐ実施した場合',          fmt(costNow)  + ' 万円'],
      ['  └ 現在の工事費',            fmt(cost)     + ' 万円'],
      [years + '年後に実施した場合',   fmt(costLater)+ ' 万円'],
      ['  └ ' + years + '年後の工事費（値上がり後）', fmt(cost * Math.pow(1 + rate / 100, years)) + ' 万円'],
      ['  └ 先延ばし中の追加損害',     fmt(damage)   + ' 万円'],
      [diff >= 0
        ? '先延ばしによる追加コスト'
        : '先延ばしによる節約額',
        (diff >= 0 ? '+ ' : '- ') + fmt(Math.abs(diff)) + ' 万円', diff >= 0],
    ]);
  }

  function showResult(level, badgeClass, badgeText, val, note) {
    var rc = $('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    $('verdict-badge-wrap').innerHTML = '<span class="verdict-badge ' + badgeClass + '">' + badgeText + '</span>';
    $('rv').textContent = val;
    $('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showDetail(rows) {
    $('db').innerHTML = rows.map(function(r) {
      var cls = r[2] ? ' class="hl"' : (r[2] === false ? ' class="hl2"' : '');
      return '<tr' + cls + '><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    $('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = $('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    $('verdict-badge-wrap').innerHTML = '';
    $('rv').textContent = '⚠️ 入力エラー';
    $('rn').textContent = msg;
    $('detail').style.display = 'none';
  }

  function resetResult() {
    $('result').style.display = 'none';
    $('detail').style.display = 'none';
    ['cost','rate','years','damage'].forEach(function(id) { $(id).value = ''; });
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    $('cost').focus();
  }

  function fmt(n) {
    if (isNaN(n)) return '0';
    return Math.round(n * 10) / 10;
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
