<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荷物受取管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>📦 荷物受取管理</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>配達予定を登録</h2>
      <div class="form-grid">
        <label>
          日付
          <input type="date" id="inputDate">
        </label>
        <label>
          時間帯
          <select id="inputTime">
            <option value="指定なし">指定なし</option>
            <option value="午前">午前</option>
            <option value="午後">午後</option>
            <option value="夜間">夜間</option>
          </select>
        </label>
        <label>
          業者名
          <input type="text" id="inputCarrier" placeholder="例：ヤマト運輸">
        </label>
        <label>
          品名
          <input type="text" id="inputItem" placeholder="例：Amazonの注文">
        </label>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label class="filter-label">
        <input type="checkbox" id="filterPending">
        未受取のみ表示
      </label>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>配達一覧 <span id="countBadge" class="badge">0件</span></h2>
      <div id="deliveryList" class="delivery-list">
        <p class="empty-msg">登録されている配達予定はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
