{"@context":"https://schema.org","@type":"SoftwareApplication","name":"荷物受取管理","description":"荷物受取管理。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E8%8D%B7%E7%89%A9%E5%8F%97%E5%8F%96%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>

<body>
  <div class="container">
    <h1>📦 荷物受取管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>配達予定を登録</h2>
      <div class="form-grid">
        <label>
          日付
          <input type="date" id="inputDate">
        </label>
        <label>
          時間帯
          <select id="inputTime">
            <option value="指定なし">指定なし</option>
            <option value="午前">午前</option>
            <option value="午後">午後</option>
            <option value="夜間">夜間</option>
          </select>
        </label>
        <label>
          業者名
          <input type="text" id="inputCarrier" placeholder="例：ヤマト運輸">
        </label>
        <label>
          品名
          <input type="text" id="inputItem" placeholder="例：Amazonの注文">
        </label>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label class="filter-label">
        <input type="checkbox" id="filterPending">
        未受取のみ表示
      </label>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>配達一覧 <span id="countBadge" class="badge">0件</span></h2>
      <div id="deliveryList" class="delivery-list">
        <p class="empty-msg">登録されている配達予定はありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>

</body>
</html>
