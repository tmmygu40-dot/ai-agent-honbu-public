<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扶養内収入チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>扶養内収入チェッカー</h1>

    <!-- 扶養限度額の設定 -->
    <section class="card">
      <h2>扶養限度額の設定</h2>
      <div class="limit-options">
        <label class="radio-label">
          <input type="radio" name="limit" value="1030000"> 103万円（所得税の壁）
        </label>
        <label class="radio-label">
          <input type="radio" name="limit" value="1060000"> 106万円（社会保険の壁）
        </label>
        <label class="radio-label">
          <input type="radio" name="limit" value="1300000"> 130万円（社会保険の壁）
        </label>
        <label class="radio-label">
          <input type="radio" name="limit" value="1500000"> 150万円（配偶者特別控除の壁）
        </label>
        <label class="radio-label">
          <input type="radio" name="limit" value="custom"> その他
        </label>
      </div>
      <div id="customLimitArea" class="hidden">
        <label for="customLimit">限度額を入力（円）：</label>
        <input type="number" id="customLimit" placeholder="例：2000000" min="0">
      </div>
    </section>

    <!-- 残り収入表示 -->
    <section class="card summary-card">
      <div class="summary-row">
        <div class="summary-item">
          <span class="label">限度額</span>
          <span class="value" id="limitDisplay">-</span>
        </div>
        <div class="summary-item">
          <span class="label">現在の収入合計</span>
          <span class="value" id="totalDisplay">0円</span>
        </div>
      </div>
      <div class="remaining-area">
        <span class="remaining-label">残り稼げる金額</span>
        <span class="remaining-amount" id="remainingDisplay">-</span>
      </div>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
    </section>

    <!-- 月別収入入力 -->
    <section class="card">
      <h2>月別収入の入力</h2>
      <div class="month-grid" id="monthGrid">
        <!-- JSで生成 -->
      </div>
      <div class="total-row">
        <span>年間合計：</span>
        <span id="yearTotal">0円</span>
      </div>
    </section>

    <!-- 操作ボタン -->
    <div class="actions">
      <button id="resetBtn" class="btn-secondary">データをリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
