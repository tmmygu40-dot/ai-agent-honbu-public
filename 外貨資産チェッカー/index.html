<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外貨資産チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力グリッド ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0.6rem;
      align-items: end;
      margin-bottom: 0.8rem;
    }
    @media (max-width: 500px) {
      .input-grid {
        grid-template-columns: 1fr 1fr;
      }
      .input-grid .add-col { grid-column: 1 / -1; }
    }
    .field { margin: 0; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.3rem; }
    .field input {
      width: 100%; padding: 0.65rem 0.75rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-add {
      padding: 0.65rem 1rem;
      font-size: 0.95rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 3px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
    }
    .btn-add:active { transform: translateY(2px); box-shadow: 0 1px 0 #b35e00; }

    /* ── サマリーグリッド ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      padding: 0 0;
    }
    .summary-cell {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .summary-cell .s-label { font-size: 0.72rem; color: var(--text-sub); font-weight: 600; margin-bottom: 0.3rem; }
    .summary-cell .s-val { font-size: 1.6rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; line-height: 1.1; }
    .summary-cell .s-sub { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 一覧テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table th {
      text-align: left; padding: 0.5rem 0.4rem;
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      border-bottom: 2px solid var(--border);
    }
    .detail-table th:not(:first-child) { text-align: right; }
    .detail-table td { padding: 0.6rem 0.4rem; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .detail-table td:not(:first-child) { text-align: right; }
    .detail-table tr:last-child td { border-bottom: none; }
    .currency-badge {
      display: inline-block; background: var(--accent-light);
      color: var(--accent); font-weight: 800; font-size: 0.82rem;
      padding: 0.2rem 0.5rem; border-radius: 6px; margin-right: 0.3rem;
    }
    .jpy-val { font-weight: 700; color: var(--text); }
    .btn-del {
      background: none; border: none; cursor: pointer; color: var(--text-sub);
      font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del:hover { color: var(--ng); background: var(--ng-bg); }

    /* ── 空メッセージ ── */
    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1.5rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>外貨資産チェッカー</h1>
    <p class="subtitle">複数通貨の保有額を円換算して合計を即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">通貨を追加</p>
    <div class="input-grid">
      <div class="field">
        <label for="currName">通貨名</label>
        <input type="text" id="currName" placeholder="例: USD">
      </div>
      <div class="field">
        <label for="amount">保有額</label>
        <input type="number" id="amount" placeholder="例: 1000" min="0" step="any">
      </div>
      <div class="field">
        <label for="rate">為替レート（円）</label>
        <input type="number" id="rate" placeholder="例: 155.5" min="0" step="any">
      </div>
      <div class="field add-col">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="addEntry()">追加</button>
      </div>
    </div>
  </div>

  <!-- サマリー -->
  <div class="summary-grid" id="summaryGrid" style="display:none">
    <div class="summary-cell">
      <div class="s-label">登録通貨数</div>
      <div class="s-val" id="sumCount">0</div>
      <div class="s-sub">通貨</div>
    </div>
    <div class="summary-cell">
      <div class="s-label">合計円換算額</div>
      <div class="s-val" id="sumTotal">0</div>
      <div class="s-sub">円</div>
    </div>
  </div>

  <!-- 一覧カード -->
  <div class="card" id="listCard" style="display:none">
    <p class="card-title">外貨資産一覧</p>
    <table class="detail-table">
      <thead>
        <tr>
          <th>通貨</th>
          <th>保有額</th>
          <th>レート</th>
          <th>円換算額</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>

  <div class="card" id="emptyCard">
    <p class="empty-msg">通貨を追加すると円換算一覧が表示されます</p>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'gaika-asset-checker-v1';
  var entries = [];

  function load() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) entries = JSON.parse(saved);
    } catch(e) { entries = []; }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function addEntry() {
    var name = document.getElementById('currName').value.trim().toUpperCase();
    var amount = parseFloat(document.getElementById('amount').value);
    var rate = parseFloat(document.getElementById('rate').value);

    if (!name) { alert('通貨名を入力してください'); return; }
    if (isNaN(amount) || amount < 0) { alert('保有額を正しく入力してください'); return; }
    if (isNaN(rate) || rate <= 0) { alert('為替レートを正しく入力してください'); return; }

    entries.push({ name: name, amount: amount, rate: rate });
    save();
    render();

    document.getElementById('currName').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('rate').value = '';
    document.getElementById('currName').focus();
  }

  function deleteEntry(idx) {
    entries.splice(idx, 1);
    save();
    render();
  }

  function render() {
    var listBody = document.getElementById('listBody');
    var summaryGrid = document.getElementById('summaryGrid');
    var listCard = document.getElementById('listCard');
    var emptyCard = document.getElementById('emptyCard');

    if (entries.length === 0) {
      summaryGrid.style.display = 'none';
      listCard.style.display = 'none';
      emptyCard.style.display = '';
      return;
    }

    emptyCard.style.display = 'none';
    summaryGrid.style.display = '';
    listCard.style.display = '';

    var total = 0;
    var rows = entries.map(function(e, i) {
      var jpy = e.amount * e.rate;
      total += jpy;
      return '<tr>'
        + '<td><span class="currency-badge">' + esc(e.name) + '</span></td>'
        + '<td>' + fmtNum(e.amount) + '</td>'
        + '<td>' + fmtNum(e.rate) + ' 円</td>'
        + '<td class="jpy-val">¥' + fmtNum(Math.round(jpy)) + '</td>'
        + '<td><button class="btn-del" onclick="deleteEntry(' + i + ')" title="削除">×</button></td>'
        + '</tr>';
    });

    listBody.innerHTML = rows.join('');
    document.getElementById('sumCount').textContent = entries.length;
    document.getElementById('sumTotal').textContent = fmtNum(Math.round(total));
  }

  function fmtNum(n) { return Number(n).toLocaleString('ja-JP'); }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enterキーで追加
  document.addEventListener('DOMContentLoaded', function() {
    ['currName','amount','rate'].forEach(function(id) {
      document.getElementById(id).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addEntry();
      });
    });
    load();
    render();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
