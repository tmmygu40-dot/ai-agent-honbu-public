<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="関係性と故人との続柄を選ぶだけで、忌み言葉を避けた弔電文を3パターン即生成。取引先・友人・上司などシーン別にコピーしてすぐ送れる無料ジェネレーターです。">
  <title>弔電テンプレジェネレーター｜関係性と続柄を選ぶだけで弔電文が3パターン</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 弔電カード */
    .cho-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .cho-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 0.7rem;
      letter-spacing: 0.04em;
    }
    .cho-text {
      font-size: 0.95rem; line-height: 1.85;
      color: var(--text); white-space: pre-wrap;
      padding: 0.6rem 0.2rem;
      margin-bottom: 0.9rem;
    }
    .cho-meta {
      font-size: 0.72rem; color: var(--text-sub);
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.6rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem;
      background: var(--ng-bg); color: var(--ng);
      border: 1.5px solid var(--ng); border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
      text-align: center;
      display: none;
    }

    .note-box {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.85rem 1rem;
      background: var(--accent-light);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.78rem; line-height: 1.6;
      color: var(--text-sub);
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .cho-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="rel">あなたと送り先の関係</label>

        <option value="business">取引先・お客様</option>

    <div class="field">
      <label for="kin">故人と送り先の続柄</label>

        <option value="self">ご本人（送り先の方が亡くなった）</option>

        <option value="mother">お母様（ご母堂様）</option>
        <option value="husband">ご主人様</option>
        <option value="wife">奥様（ご令室様）</option>
        <option value="son">ご子息様</option>
        <option value="daughter">ご令嬢様</option>

        <option value="grandmother">ご祖母様</option>
        <option value="brother">ご令兄様</option>
        <option value="sister">ご令姉様</option>
        <option value="younger_brother">ご令弟様</option>

    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="standard">標準（一般的な弔電）</option>
        <option value="polite">丁寧（フォーマル・格調高め）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">弔電文を生成する</button>

  <p class="err-msg" id="err"></p>

  <div id="results"></div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、NTT東日本・西日本の電報文例集や一般的な弔電マナーを参考に、忌み言葉（重ね言葉・直接的表現）を避けた目安文を提供しています。最終的な文面はご自身でご確認のうえ、お送りください。
  </p>

  <div class="note-box">
    💡 ヒント：弔電は宛名を「喪主のお名前」とし、「○○家ご一同様」とする場合もあります。送り先の式場名・喪主のお名前・通夜／告別式の日時は、必ず案内状や訃報をご確認ください。

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 続柄→敬称

    husband:        { honor: 'ご主人様', subj: 'ご主人様' },
    wife:           { honor: 'ご令室様', subj: '奥様' },
    son:            { honor: 'ご子息様', subj: 'ご子息様' },
    daughter:       { honor: 'ご令嬢様', subj: 'ご令嬢様' },
    grandfather:    { honor: 'ご祖父様', subj: 'お祖父様' },

  // 関係性ラベル
  var REL_LABEL = {
    business: '取引先・お客様',

  };

      '{name}のご訃報に接し、心よりお悔やみ申し上げます。安らかなご永眠を心よりお祈り申し上げますとともに、ご遺族の皆様に謹んでお悔やみを申し上げます。',
      'ご逝去の悲報に接し、痛惜の念に堪えません。在りし日のお姿を偲び、心よりご冥福をお祈り申し上げます。',
      'ご訃報に接し、謹んでお悔やみ申し上げます。ご遺族の皆様の御心痛いかばかりかと拝察いたします。安らかなご永眠をお祈り申し上げます。'
    ],
    polite: [
      '謹啓 ご訃報に接し、誠に哀悼の極みに存じます。生前のご厚情に深く感謝申し上げますとともに、心よりご冥福をお祈り申し上げます。 謹白',
      'ご逝去の悲報に接し、ご遺族並びに関係者の皆様に、衷心よりお悔やみ申し上げます。生前のご厚誼に深く感謝するとともに、安らかなご永眠を心よりお祈り申し上げます。',
      'ご訃報に接し、ご一同様の御悲嘆いかばかりかとお察し申し上げます。生前のご厚情に深謝いたしますとともに、ここに謹んで哀悼の意を表します。'
    ]
  };

  // 関係性別×トーンの定型（{honor}に敬称を差し込む）
  var TPL_BY_REL = {
    business: {
      standard: [
        '{honor}のご逝去の報に接し、心よりお悔やみ申し上げます。安らかなご永眠をお祈り申し上げますとともに、ご家族の皆様に謹んでお悔やみを申し上げます。',
        '{honor}のご訃報に接し、痛惜の念に堪えません。在りし日のお姿を偲び、ご冥福を心よりお祈り申し上げます。',
        '{honor}のご逝去を悼み、謹んでお悔やみ申し上げます。御心痛いかばかりかと拝察いたします。安らかなご永眠をお祈り申し上げます。'
      ],
      polite: [
        '謹啓 {honor}のご逝去の悲報に接し、誠に哀悼の極みに存じます。生前のご厚情に深く感謝申し上げますとともに、心よりご冥福をお祈り申し上げます。 謹白',
        '{honor}のご訃報に接し、ご遺族並びに関係者の皆様に、衷心よりお悔やみ申し上げます。生前のご厚誼に深く感謝するとともに、安らかなご永眠を心よりお祈り申し上げます。',
        '{honor}のご逝去の悲報に接し、ご一同様の御悲嘆いかばかりかとお察し申し上げます。生前のご厚情に深謝いたしますとともに、ここに謹んで哀悼の意を表します。'
      ]
    },
    boss: {
      standard: [
        '{honor}のご逝去の報に接し、心よりお悔やみ申し上げます。ご家族の皆様の御心痛いかばかりかと拝察いたします。安らかなご永眠をお祈り申し上げます。',
        '{honor}のご訃報に接し、謹んでお悔やみ申し上げます。生前のお姿を偲び、心よりご冥福をお祈り申し上げます。',
        '{honor}のご逝去を悼み、心よりお悔やみ申し上げます。安らかなご永眠を、心よりお祈りいたします。'
      ],
      polite: [
        '{honor}のご逝去の悲報に接し、ご遺族の皆様に、衷心よりお悔やみ申し上げます。生前のご厚情に深く感謝するとともに、安らかなご永眠を心よりお祈り申し上げます。',
        '謹啓 {honor}のご訃報に接し、誠に哀悼の念に堪えません。生前のご厚誼に深謝いたしますとともに、心よりご冥福をお祈り申し上げます。 謹白',

      ]
    },
    friend: {
      standard: [
        '{honor}のご逝去の報に接し、心よりお悔やみ申し上げます。安らかなご永眠を、心よりお祈りいたします。お力落としのことと存じますが、どうかご自愛ください。',

      ],
      polite: [
        '{honor}のご逝去の悲報に接し、心よりお悔やみ申し上げます。生前のお姿を偲び、安らかなご永眠を心よりお祈り申し上げます。ご家族の皆様、どうかご自愛ください。',
        '{honor}のご訃報に接し、ご遺族の皆様に衷心よりお悔やみ申し上げます。心よりご冥福をお祈り申し上げます。',
        '謹んで{honor}のご逝去を悼み、心よりお悔やみ申し上げます。お力落としのことと存じますが、どうかお身体を大切にお過ごしください。'
      ]
    },
    relative: {
      standard: [
        '{honor}のご逝去の報に接し、心よりお悔やみ申し上げます。安らかなご永眠を、心よりお祈りいたします。事情によりお伺いできず申し訳ありません。',
        '{honor}のご訃報に接し、謹んでお悔やみ申し上げます。心ばかりの弔電にて失礼いたします。ご冥福を心よりお祈り申し上げます。',
        '{honor}のご逝去を悼み、心よりお悔やみ申し上げます。お辛いことと存じますが、どうかお身体を大切にお過ごしください。'
      ],
      polite: [
        '{honor}のご逝去の悲報に接し、衷心よりお悔やみ申し上げます。やむを得ぬ事情により参列が叶わず、心ばかりの弔電にて失礼いたします。安らかなご永眠を心よりお祈り申し上げます。',
        '謹んで{honor}のご逝去を悼み、ご遺族の皆様に心よりお悔やみ申し上げます。生前のお姿を偲び、ご冥福を心よりお祈り申し上げます。',
        '{honor}のご訃報に接し、ご一同様の御悲嘆いかばかりかとお察し申し上げます。心よりご冥福をお祈り申し上げますとともに、ご家族の皆様のご健康をお祈り申し上げます。'
      ]
    },
    general: {
      standard: [
        '{honor}のご逝去の報に接し、心よりお悔やみ申し上げます。安らかなご永眠をお祈り申し上げます。',
        '{honor}のご訃報に接し、謹んでお悔やみ申し上げます。心よりご冥福をお祈り申し上げます。',
        '{honor}のご逝去を悼み、心よりお悔やみ申し上げます。ご家族の皆様の御心痛いかばかりかと拝察いたします。'
      ],
      polite: [
        '謹啓 {honor}のご逝去の悲報に接し、誠に哀悼の極みに存じます。心よりご冥福をお祈り申し上げます。 謹白',
        '{honor}のご訃報に接し、ご遺族の皆様に衷心よりお悔やみ申し上げます。安らかなご永眠を心よりお祈り申し上げます。',
        '{honor}のご逝去に際し、ご一同様の御悲嘆いかばかりかとお察し申し上げます。ここに謹んで哀悼の意を表します。'
      ]
    }
  };

  function generate() {
    var rel  = document.getElementById('rel').value;
    var kin  = document.getElementById('kin').value;
    var tone = document.getElementById('tone').value;

    if (!rel || !kin || !tone) { showErr('すべて選択してください'); return; }
    hideErr();

    // localStorage に保存
    try {
      localStorage.setItem('cho_den_last', JSON.stringify({ rel: rel, kin: kin, tone: tone }));
    } catch (e) {}

    var texts;
    if (kin === 'self') {
      texts = TPL_SELF[tone];
    } else {
      var honor = KIN[kin].honor;
      var raw   = TPL_BY_REL[rel][tone];
      texts = raw.map(function(t){ return t.replace(/\{honor\}/g, honor); });
    }

    var labels = ['シンプル', '標準', '心配り'];
    var html = texts.map(function(t, i){
      var meta = REL_LABEL[rel] + '向け／' + (tone === 'polite' ? '丁寧' : '標準') + 'トーン';
      var safeT = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="cho-card">'
           + '<span class="cho-label">パターン' + (i+1) + '：' + labels[i] + '</span>'
           + '<p class="cho-meta">' + meta + '</p>'
           + '<p class="cho-text">' + safeT + '</p>'
           + '<button class="btn-copy" onclick="copyText(this, ' + i + ')">📋 この文をコピー</button>'
           + '</div>';
    }).join('');

    document.getElementById('results').innerHTML = html;
    window._currentTexts = texts;

    // 結果へスクロール
    setTimeout(function(){
      var first = document.querySelector('.cho-card');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function copyText(btn, idx) {
    var texts = window._currentTexts || [];
    var t = texts[idx];
    if (!t) return;
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(done).catch(function(){
        fallbackCopy(t); done();
      });
    } else {
      fallbackCopy(t); done();
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function showErr(msg) {
    var el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideErr() {
    document.getElementById('err').style.display = 'none';
  }

  // 復元
  (function restore(){
    try {
      var s = localStorage.getItem('cho_den_last');
      if (!s) return;
      var d = JSON.parse(s);
      if (d.rel)  document.getElementById('rel').value  = d.rel;
      if (d.kin)  document.getElementById('kin').value  = d.kin;
      if (d.tone) document.getElementById('tone').value = d.tone;
    } catch (e) {}
  })();
  </script>
