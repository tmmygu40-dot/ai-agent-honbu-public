<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法改正チェックリストアプリ</title>
  <meta name="description" content="業種を選ぶだけで2026年4月施行の制度変更・法改正への対応状況をチェックできる。建設・飲食・小売・製造・医療・介護・IT・運輸など業種別に整理し、対応漏れゼロを実現するチェックリストツール。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── カウントバッジ ── */
    .count-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .count-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .count-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .count-card.ok   { border-color: var(--ok);    background: var(--ok-bg);   }
    .count-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.3rem; }
    .count-value { font-size: 2rem; font-weight: 900; margin-bottom: 0.25rem; }
    .count-card.ng   .count-value { color: var(--ng);   }
    .count-card.warn .count-value { color: var(--warn); }
    .count-card.ok   .count-value { color: var(--ok);   }
    .count-note { font-size: 0.82rem; color: var(--text-sub); }

    /* ── チェックリストカード ── */
    .checklist-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .section-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.6rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.7rem 0.4rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; margin-top: 2px; }
    .check-text { font-size: 0.9rem; color: var(--text); line-height: 1.5; }
    .check-sub  { font-size: 0.75rem; color: var(--text-sub); margin-top: 0.15rem; }
    .check-item input[type="checkbox"]:checked ~ .check-body .check-text {
      text-decoration: line-through; opacity: 0.5;
    }
    .check-item input[type="checkbox"]:checked ~ .check-body .check-sub {
      opacity: 0.4;
    }
    .check-body { flex: 1; }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .checklist-card, .count-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>

        { text: 'ICT・介護ロボット活用の申請・補助金確認', sub: '介護テクノロジー導入支援補助金等の活用。導入計画・効果確認' },
      ]
    },
    it: {
      label: 'IT・情報通信',
      items: [
        { text: '個人情報保護法の改正対応（漏えい報告義務）', sub: '2022年改正〜個人情報漏えい時の本人・個人情報保護委員会への報告義務。対応フロー確認' },
        { text: 'サイバーセキュリティ対策の強化（経産省ガイドライン）', sub: '「サイバーセキュリティ経営ガイドライン」の最新版確認。ランサムウェア対策・バックアップ体制' },
        { text: 'ソフトウェア部品表（SBOM）対応の検討', sub: '米国・欧州を中心に義務化の動き。自社製品・サービスのOSS利用把握・管理体制確認' },
        { text: 'AI利活用ガイドラインへの対応', sub: '内閣府・総務省・経産省の生成AI利活用ガイドラインの確認。社内ポリシー整備' },
        { text: 'フリーランス新法対応（業務委託先管理）', sub: '2024年11月〜フリーランスへの業務委託は書面明示・60日以内払い等が義務化' },
        { text: 'クラウドサービスのセキュリティ認証確認', sub: 'ISMAP（政府情報システムのためのセキュリティ評価制度）対応。取引先からの要求増加' },
        { text: 'テレワーク・在宅勤務に関する労働環境整備', sub: '労働安全衛生法のテレワークガイドライン対応。自宅での作業環境・通信費支給の整備確認' },

    },
    transport: {
      label: '運輸・物流',
      items: [
        { text: '時間外労働上限規制への完全対応（2024年4月施行済み）', sub: 'トラックドライバーは年間960時間の上限。36協定見直し・勤怠管理システム対応確認' },
        { text: '物流効率化法（2024年4月施行）への対応', sub: '荷主・物流事業者・元請の中継連携義務。取引先との連携・荷待ち時間削減計画確認' },
        { text: '2024年問題への継続対応', sub: '運賃交渉・配車計画・拘束時間管理。ドライバー確保・待機時間削減の進捗確認' },
        { text: 'アルコールチェック義務（2023年12月〜全車両）', sub: '社用車のアルコール検知器による全ドライバーチェック。記録保存・機器点検確認' },

        { text: '緑ナンバー（一般貨物自動車運送事業）の営業区域・保険確認', sub: '事業許可更新・車両保険・整備記録の最新管理' },
        { text: '再配達削減への取り組み（国交省指針）', sub: '2024年度〜宅配ロッカー普及・置き配推進。指針に沿った取り組み記録' },
      ]
    },
    other: {
      label: 'その他の業種',
      items: []
    }
  };

  var currentIndustry = '';

  function showChecklist() {
    var sel = document.getElementById('industry').value;
    if (!sel) {
      document.getElementById('checklistCard').style.display = 'none';
      document.getElementById('countCard').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'none';
      return;
    }
    currentIndustry = sel;

    // 全業種共通 + 業種別の合算
    var items = [];
    if (sel !== 'common' && sel !== 'other') {
      DATA['common'].items.forEach(function(item) {
        items.push({ id: 'common_' + DATA['common'].items.indexOf(item), industry: 'common', item: item });
      });
      DATA[sel].items.forEach(function(item) {
        items.push({ id: sel + '_' + DATA[sel].items.indexOf(item), industry: sel, item: item });
      });
    } else {
      DATA['common'].items.forEach(function(item) {
        items.push({ id: 'common_' + DATA['common'].items.indexOf(item), industry: 'common', item: item });
      });
    }

    var saved = loadState(sel);
    var html = '';

    // 全業種共通セクション
    if (sel !== 'common' && sel !== 'other') {
      html += '<p class="section-title" style="margin-top:0.2rem">📋 全業種共通（' + DATA['common'].items.length + '件）</p>';
    }
    DATA['common'].items.forEach(function(item, i) {
      var id = 'common_' + i;
      var checked = saved[id] ? 'checked' : '';
      html += buildCheckItem(id, item, checked);
    });

    // 業種別セクション
    if (sel !== 'common' && sel !== 'other' && DATA[sel].items.length > 0) {
      html += '<p class="section-title" style="margin-top:1rem">🏭 ' + DATA[sel].label + '固有（' + DATA[sel].items.length + '件）</p>';
      DATA[sel].items.forEach(function(item, i) {
        var id = sel + '_' + i;
        var checked = saved[id] ? 'checked' : '';
        html += buildCheckItem(id, item, checked);
      });
    }

    document.getElementById('checklistBody').innerHTML = html;
    document.getElementById('sectionTitle').textContent = DATA[sel].label + ' のチェックリスト';
    document.getElementById('checklistCard').style.display = 'block';
    document.getElementById('countCard').style.display = 'block';
    document.getElementById('resetBtn').style.display = 'block';

    updateCount();
  }

  function buildCheckItem(id, item, checked) {
    return '<label class="check-item" for="chk_' + id + '">'
      + '<input type="checkbox" id="chk_' + id + '" ' + checked + ' onchange="onCheck(\'' + id + '\', this.checked)">'
      + '<div class="check-body">'
      + '<div class="check-text">' + escHtml(item.text) + '</div>'
      + (item.sub ? '<div class="check-sub">' + escHtml(item.sub) + '</div>' : '')
      + '</div>'
      + '</label>';
  }

  function onCheck(id, isChecked) {
    var saved = loadState(currentIndustry);
    saved[id] = isChecked;
    saveState(currentIndustry, saved);
    updateCount();
  }

  function updateCount() {
    var boxes = document.querySelectorAll('#checklistBody input[type="checkbox"]');
    var total = boxes.length;
    var checked = 0;
    boxes.forEach(function(b) { if (b.checked) checked++; });
    var unchecked = total - checked;
    var el = document.getElementById('countCard');
    document.getElementById('countValue').textContent = unchecked;
    if (unchecked === 0) {
      el.className = 'count-card ok';
      document.getElementById('countNote').textContent = '全 ' + total + ' 件の対応が完了しています！';
    } else if (unchecked <= 3) {
      el.className = 'count-card warn';
      document.getElementById('countNote').textContent = '全 ' + total + ' 件中 ' + checked + ' 件完了。あと少し！';
    } else {
      el.className = 'count-card ng';
      document.getElementById('countNote').textContent = '全 ' + total + ' 件中 ' + checked + ' 件完了。対応を進めましょう';
    }
  }

  function resetChecklist() {
    if (!confirm('チェックをすべてリセットしますか？')) return;
    saveState(currentIndustry, {});
    showChecklist();
  }

  // ── localStorage ──
  var STORAGE_KEY = 'houkaisei_checklist_v1';
  function loadState(industry) {
    try {
      var all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      return all[industry] || {};
    } catch(e) { return {}; }
  }
  function saveState(industry, state) {
    try {
      var all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      all[industry] = state;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    } catch(e) {}
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>
