<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペットそっくり占い｜気分から似ているペットキャラを診断</title>
  <meta name="description" content="今日の気分と性格を5問選ぶだけで、あなたに似ているペットキャラを判定。性格傾向と今日の運勢・ラッキーアクションも分かる無料の診断アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.55rem; line-height: 1.4; }
    .opt {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.75rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt .opt-text { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-emoji-big { font-size: 4.5rem; line-height: 1; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.3rem; }
    .result-name { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 0.8rem; line-height: 1.2; }
    .result-desc { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; text-align: left; }
    .result-section {
      margin-top: 1rem; padding: 0.85rem 0.9rem;
      background: var(--accent-light); border-radius: 10px; text-align: left;
    }
    .result-section .label { font-size: 0.72rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; letter-spacing: 0.05em; }
    .result-section .body { font-size: 0.9rem; color: var(--text); line-height: 1.55; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🐾 ペットそっくり占い</h1>
    <p class="subtitle">気分と性格から、似ているペットキャラと今日の運勢を診断します</p>
  </header>

  <div class="card">
    <p class="card-title">5問の質問</p>

    <div class="q-block">
      <p class="q-text">Q1. 今の気分は？</p>
      <label class="opt"><input type="radio" name="q1" value="cat"><span class="opt-text">マイペースに過ごしたい</span></label>
      <label class="opt"><input type="radio" name="q1" value="dog"><span class="opt-text">誰かと一緒に楽しみたい</span></label>
      <label class="opt"><input type="radio" name="q1" value="rabbit"><span class="opt-text">ふわっと癒やされたい</span></label>
      <label class="opt"><input type="radio" name="q1" value="hamster"><span class="opt-text">ちょこちょこ動きたい</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q2. エネルギーレベルは？</p>
      <label class="opt"><input type="radio" name="q2" value="dog"><span class="opt-text">高め。じっとしてられない</span></label>
      <label class="opt"><input type="radio" name="q2" value="hamster"><span class="opt-text">短時間ダッシュ型</span></label>
      <label class="opt"><input type="radio" name="q2" value="cat"><span class="opt-text">必要な時だけ全開</span></label>
      <label class="opt"><input type="radio" name="q2" value="turtle"><span class="opt-text">ゆっくり長く続く</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q3. 人との距離感は？</p>
      <label class="opt"><input type="radio" name="q3" value="dog"><span class="opt-text">ベタベタしたい</span></label>
      <label class="opt"><input type="radio" name="q3" value="bird"><span class="opt-text">おしゃべりしたい</span></label>
      <label class="opt"><input type="radio" name="q3" value="cat"><span class="opt-text">適度に距離をとりたい</span></label>
      <label class="opt"><input type="radio" name="q3" value="fish"><span class="opt-text">そっと見守られたい</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q4. 一番好きな時間帯は？</p>
      <label class="opt"><input type="radio" name="q4" value="dog"><span class="opt-text">朝のすっきりした時間</span></label>
      <label class="opt"><input type="radio" name="q4" value="bird"><span class="opt-text">昼の明るい時間</span></label>
      <label class="opt"><input type="radio" name="q4" value="cat"><span class="opt-text">夕方のまどろむ時間</span></label>
      <label class="opt"><input type="radio" name="q4" value="hamster"><span class="opt-text">夜のひとり時間</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q5. 落ち着く場所は？</p>
      <label class="opt"><input type="radio" name="q5" value="cat"><span class="opt-text">日当たりのいい窓辺</span></label>
      <label class="opt"><input type="radio" name="q5" value="rabbit"><span class="opt-text">ふかふかのソファ</span></label>
      <label class="opt"><input type="radio" name="q5" value="hamster"><span class="opt-text">狭くて隠れられる場所</span></label>
      <label class="opt"><input type="radio" name="q5" value="fish"><span class="opt-text">水辺・静かな場所</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q6. 苦手なものは？</p>
      <label class="opt"><input type="radio" name="q6" value="cat"><span class="opt-text">急かされること</span></label>
      <label class="opt"><input type="radio" name="q6" value="rabbit"><span class="opt-text">大きな音・乱暴な人</span></label>
      <label class="opt"><input type="radio" name="q6" value="dog"><span class="opt-text">放っておかれること</span></label>
      <label class="opt"><input type="radio" name="q6" value="turtle"><span class="opt-text">予定が詰まっていること</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">🔮 占う</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="rEmoji">🐾</p>
    <p class="result-label">あなたに似ているペットは</p>
    <p class="result-name" id="rName">—</p>
    <p class="result-desc" id="rDesc"></p>
    <div class="result-section">
      <p class="label">🌟 今日の運勢</p>
      <p class="body" id="rFortune"></p>
    </div>
    <div class="result-section">
      <p class="label">🍀 ラッキーアクション</p>
      <p class="body" id="rLucky"></p>
    </div>
    <div class="result-section">
      <p class="label">💞 相性のいいペットタイプ</p>
      <p class="body" id="rMatch"></p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🐾 このアプリは、ペットの一般的な性格傾向をもとにした遊びの診断です。占い結果は娯楽目的でお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'pet_lookalike_uranai_last_v1';

  var PETS = {
    cat: {
      emoji: '🐱', name: 'ネコさんタイプ',
      desc: 'マイペースで自分の世界を大切にするタイプ。気まぐれに見えても、好きなものへの愛情は深い。一人時間で充電するのが得意。',
      fortune: '今日は無理に予定を詰めなくて正解。窓辺でひと息つく時間を作ると、午後にいい発想がふっと降りてきます。',
      lucky: '日当たりのいい場所で5分だけぼーっとする。',
      match: 'ネコ／カメ／キンギョ（お互いのペースを尊重できる組み合わせ）'
    },
    dog: {
      emoji: '🐶', name: 'イヌさんタイプ',
      desc: 'まっすぐで愛情表現が素直なタイプ。仲間と過ごす時間でエネルギーが湧くムードメーカー。約束を守る誠実さが信頼を集める。',
      fortune: '誰かに「ありがとう」を伝える日。1人で抱え込むより、声をかけた相手がチャンスを運んでくれそう。',
      lucky: '朝イチで散歩か外の空気を吸う。',
      match: 'イヌ／ハムスター／ウサギ（一緒に動いて楽しめる組み合わせ）'
    },
    rabbit: {
      emoji: '🐰', name: 'ウサギさんタイプ',
      desc: '繊細でやさしく、空気を読むのが上手なタイプ。一見おとなしいけれど、心の中は好奇心でいっぱい。安心できる人にだけ甘える。',
      fortune: 'いつもより五感が冴える日。耳に心地よい音楽や、ふんわり甘いものを取り入れると運気がアップ。',
      lucky: 'ふかふかのクッションを抱えて深呼吸を3回。',
      match: 'ウサギ／キンギョ／ネコ（やわらかい空気を共有できる組み合わせ）'
    },
    hamster: {
      emoji: '🐹', name: 'ハムスターさんタイプ',
      desc: 'ちょこまかしていて好奇心旺盛なタイプ。短い集中力で次々アイデアが湧くひらめき型。小さな幸せを集めるのが上手。',
      fortune: '小さな寄り道がチャンスを呼ぶ日。普段通らない道や新しいお店に立ち寄ると、思わぬ出会いがあるかも。',
      lucky: '帰り道にコンビニで「いつも買わないお菓子」を選ぶ。',
      match: 'ハムスター／イヌ／コトリ（テンポよく動ける組み合わせ）'
    },
    bird: {
      emoji: '🐦', name: 'コトリさんタイプ',
      desc: 'おしゃべりでフットワークが軽いタイプ。情報通で人と人をつなぐのが得意。明るい空気をまとっていて場の華になりやすい。',
      fortune: '言葉が運をつかむ日。SNS投稿・LINEひと言・電話一本など、発信したものが返ってきます。',
      lucky: 'しばらく連絡してない友達に近況を送ってみる。',
      match: 'コトリ／イヌ／ハムスター（軽やかに弾む組み合わせ）'
    },
    turtle: {
      emoji: '🐢', name: 'カメさんタイプ',
      desc: 'マイペースで芯が強いタイプ。一見ゆっくり見えるけれど、コツコツ続ける力は誰にも真似できない。長期戦で勝つ努力家。',
      fortune: '焦らない人が勝つ日。早く出した結論より、ひと晩寝かせた答えの方が確実に正解です。',
      lucky: '今日は「今日中に決めない」を意識する。',
      match: 'カメ／ネコ／キンギョ（落ち着いたペースを共有できる組み合わせ）'
    },
    fish: {
      emoji: '🐠', name: 'キンギョさんタイプ',
      desc: '物静かで雰囲気を大切にするタイプ。自己主張は控えめでも、空間に「いてくれる安心感」がある。観察眼が鋭い。',
      fortune: '静かな場所が運を運ぶ日。図書館・カフェ・お風呂など、水・静けさのある場所で大事な気付きが降りてきます。',
      lucky: 'スマホを置いて、お湯にしっかり浸かる時間を作る。',
      match: 'キンギョ／カメ／ウサギ（穏やかな時間を共有できる組み合わせ）'
    }
  };

  function diagnose() {
    var counts = { cat:0, dog:0, rabbit:0, hamster:0, bird:0, turtle:0, fish:0 };
    var allAnswered = true;
    for (var i = 1; i <= 6; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { allAnswered = false; break; }
      counts[sel.value] = (counts[sel.value] || 0) + 1;
    }
    if (!allAnswered) {
      alert('すべての質問に答えてから占ってください 🐾');
      return;
    }

    // 最大スコアのペットを選ぶ。同点なら最初に到達したもの。
    var top = 'cat', topScore = -1;
    var order = ['cat','dog','rabbit','hamster','bird','turtle','fish'];
    order.forEach(function(k){
      if (counts[k] > topScore) { topScore = counts[k]; top = k; }
    });

    showResult(top);
    saveResult(top);
  }

  function showResult(key) {
    var p = PETS[key];
    document.getElementById('rEmoji').textContent = p.emoji;
    document.getElementById('rName').textContent = p.name;
    document.getElementById('rDesc').textContent = p.desc;
    document.getElementById('rFortune').textContent = p.fortune;
    document.getElementById('rLucky').textContent = p.lucky;
    document.getElementById('rMatch').textContent = p.match;
    var card = document.getElementById('result');
    card.style.display = 'block';
    setTimeout(function(){
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }

  function saveResult(key) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ key: key, date: new Date().toISOString() }));
    } catch(e) {}
  }

  // 起動時に直近の結果を復元（同じ日なら表示）
  (function restore(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.key || !PETS[data.key]) return;
      var saved = new Date(data.date);
      var today = new Date();
      if (saved.toDateString() === today.toDateString()) {
        showResult(data.key);
      }
    } catch(e) {}
  })();
  </script>
