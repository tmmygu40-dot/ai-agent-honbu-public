<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体重記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>⚖️ 体重記録</h1>

    <section class="input-section">
      <div class="input-row">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="input-row">
        <label for="weight">体重 (kg)</label>
        <input type="number" id="weight" step="0.1" min="1" max="999" placeholder="例：65.3">
      </div>
      <button id="addBtn">記録する</button>
    </section>

    <section class="graph-section" id="graphSection" style="display:none;">
      <h2>グラフ</h2>
      <canvas id="chart"></canvas>
    </section>

    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="emptyMsg" class="empty-msg">まだ記録がありません</div>
      <table id="recordTable" style="display:none;">
        <thead>
          <tr>
            <th>日付</th>
            <th>体重</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recordBody"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
