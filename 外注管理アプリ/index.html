<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外注管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>外注管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>案件を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="vendor">外注先</label>
          <input type="text" id="vendor" placeholder="例：株式会社〇〇">
        </div>
        <div class="form-group">
          <label for="task">依頼内容</label>
          <input type="text" id="task" placeholder="例：LP制作">
        </div>
        <div class="form-group">
          <label for="deadline">納期</label>
          <input type="date" id="deadline">
        </div>
        <div class="form-group">
          <label for="cost">費用（円）</label>
          <input type="number" id="cost" placeholder="例：50000" min="0">
        </div>
        <div class="form-group">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="unpaid">未払い</option>
            <option value="paid">支払い済み</option>
          </select>
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="備考・連絡先など">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルタ -->
    <section class="filter-section">
      <label>表示：</label>
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="unpaid">未払い・遅延</button>
      <button class="filter-btn" data-filter="paid">支払い済み</button>
    </section>

    <!-- 合計 -->
    <div class="summary" id="summary"></div>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="list" class="list"></div>
      <p class="empty-msg" id="emptyMsg">案件が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
