<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="業種・値上げ率・相手の立場を選ぶだけで、取引先や顧客への値上げ交渉トークと反論への切り返し文を即生成。コピーしてそのまま使える交渉スクリプトジェネレーター。">
  <title>値上げ交渉スクリプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .result-section { display: none; }
    .script-box {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 0.8rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.6rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
    .objection-list { display: flex; flex-direction: column; gap: 1rem; }
    .objection-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .objection-q {
      background: var(--warn-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--warn);
    }
    .objection-a {
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .btn-copy-sm {
      display: block; width: 100%;
      padding: 0.45rem 0.8rem;
      font-size: 0.8rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; margin: 0 1rem 0.8rem;
      width: calc(100% - 2rem);
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy-sm.copied { color: var(--ok); border-color: var(--ok); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    .source-note {
      max-width: 600px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.76rem; color: var(--text-sub); line-height: 1.6; text-align: left;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .btn-copy-sm, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-section { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💬 値上げ交渉スクリプトジェネレーター</h1>
    <p class="subtitle">業種・値上げ率・相手を選ぶだけで交渉トークと反論切り返しを即生成</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>

    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食">飲食・フード</option>
        <option value="小売">小売・販売</option>
        <option value="製造">製造・メーカー</option>
        <option value="建設">建設・工事</option>
        <option value="サービス">サービス・士業</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="rate">値上げ率</label>
      <select id="rate">
        <option value="5">5%</option>
        <option value="10">10%</option>
        <option value="15">15%</option>
        <option value="20">20%</option>
        <option value="30">30%</option>
        <option value="一部">一部品目のみ</option>
      </select>
    </div>

    <div class="field">
      <label for="partner">相手の立場</label>
      <select id="partner">
        <option value="長期取引先">長期取引先・得意先</option>
        <option value="新規取引先">新規・比較的新しい取引先</option>
        <option value="個人顧客">個人のお客様</option>
        <option value="法人顧客">法人のお客様</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">✏️ スクリプトを生成する</button>

  <!-- 生成結果 -->
  <div class="result-section" id="resultSection">

    <!-- メイン交渉トーク -->
    <div class="card">
      <p class="card-title">値上げ交渉トーク</p>
      <div class="script-box" id="mainScript"></div>
      <button class="btn-copy" id="copyMain" onclick="copyText('mainScript','copyMain')">📋 コピーする</button>
    </div>

    <!-- 反論切り返し -->
    <div class="card">
      <p class="card-title">反論への切り返し</p>
      <div class="objection-list" id="objectionList"></div>
    </div>

  </div>

  <p class="source-note">
    📚 このツールは、値上げ交渉の参考例文を生成します。実際の交渉では、相手との関係性や取引状況に合わせて内容を調整してご使用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 交渉トーク文テンプレート ──
  var INTRO_BY_PARTNER = {
    '長期取引先': '平素より格別のお引き立てを賜り、誠にありがとうございます。長年にわたるお取引に深く感謝申し上げます。',
    '新規取引先': '平素よりお世話になっております。このたびは重要なご連絡がございます。',
    '個人顧客': 'いつもご利用いただきありがとうございます。お客様には常日頃より大変お世話になっております。',
    '法人顧客': '平素より格別のご高配を賜り、厚く御礼申し上げます。',
  };
  var REASON_BY_INDUSTRY = {
    '飲食': '食材・原材料費の高騰に加え、光熱費・人件費の大幅な上昇',
    '小売': '仕入れ価格の上昇および物流コスト・人件費の増加',
    '製造': '原材料費・エネルギーコストの継続的な高騰および労務費の上昇',
    '建設': '資材費の急騰および人件費・重機コストの増加',
    'サービス': '人件費の上昇および各種運営コストの増加',
    'その他': '原材料・エネルギー・人件費を中心とした各種コストの上昇',
  };
  var RATE_TEXT = {
    '5': '現行価格より5%',
    '10': '現行価格より10%',
    '15': '現行価格より15%',
    '20': '現行価格より20%',
    '30': '現行価格より30%',
    '一部': '一部品目について',
  };
  var CLOSE_BY_PARTNER = {
    '長期取引先': '長年のお取引を何よりも大切に考えております。引き続き最高の品質・サービスをご提供できるよう全力を尽くしてまいります。ご理解とご協力のほど、何卒よろしくお願い申し上げます。',
    '新規取引先': '皆様のご期待に応えられるよう、品質・サービスの維持向上に努めてまいります。ご理解のほど、何卒よろしくお願い申し上げます。',
    '個人顧客': 'お客様に引き続き満足いただけるサービスをご提供できるよう、スタッフ一同精進してまいります。何卒ご理解いただけますようお願い申し上げます。',
    '法人顧客': '御社のビジネスに最大限貢献できるよう、品質・サービスの向上に努めてまいります。ご理解とご協力を賜りますよう、よろしくお願い申し上げます。',
  };

  function buildScript(industry, rate, partner) {
    var intro = INTRO_BY_PARTNER[partner];
    var reason = REASON_BY_INDUSTRY[industry];
    var rateText = RATE_TEXT[rate];
    var close = CLOSE_BY_PARTNER[partner];
    var month = new Date().getMonth() + 2;
    if (month > 12) month = 1;
    var nextMonth = month + '月';
    var rateDetail = rate === '一部'
      ? '一部品目について価格改定をお願いしたく存じます。対象品目の詳細は別途ご案内いたします。'
      : rateText + 'の価格改定をお願い申し上げます。';

    return intro + '\n\n' +
      'さて、誠に恐れながら、' + reason + 'が続いており、現行価格の維持が非常に困難な状況となってまいりました。\n\n' +
      '弊社といたしましても、企業努力による価格据え置きに最大限取り組んでまいりましたが、これ以上の吸収は限界に達しており、やむを得ず価格改定をお願いせざるを得ない状況となりました。\n\n' +
      '誠に恐縮ではございますが、' + nextMonth + 'より、' + rateDetail + '\n\n' +
      close;
  }

  // ── 反論パターン ──
  var OBJECTIONS = [
    {
      q: '「高い」「値上げは困る」',
      getA: function(industry, rate, partner) {
        return 'おっしゃる通り、価格改定はお客様・お取引先様にとって大変なご負担であることは重々承知しております。\n\n' +
          '弊社でも、' + REASON_BY_INDUSTRY[industry] + 'を受け、さまざまなコスト削減を試みてまいりました。しかしながら、品質・サービス水準を維持したまま現行価格を継続することが困難な状況に達しております。\n\n' +
          '何とかご理解いただけますと幸いです。ご不明な点がございましたら、詳細資料をご用意いたしますので、お気軽にお申し付けください。';
      }
    },
    {
      q: '「他社と比べて高い」「競合他社は値上げしていない」',
      getA: function(industry, rate, partner) {
        return '他社様との比較についてのご指摘、ありがとうございます。\n\n' +
          '確かに、各社の状況はさまざまかと存じます。ただ、弊社の場合、品質・納期・アフターサポートにおいて、これまで培ってきた独自の強みがございます。\n\n' +
          '同一品・同一サービスでの比較であれば、詳細をお伺いしたうえで改めてご説明させてください。単純な価格比較では見えにくい価値の部分も、ぜひご考慮いただけますと幸いです。';
      }
    },
    {
      q: '「今すぐは難しい」「時期が悪い」',
      getA: function(industry, rate, partner) {
        var month = new Date().getMonth() + 3;
        if (month > 12) month -= 12;
        return 'ご事情はよく理解できます。弊社としても急な改定はお取引先様のご負担になることは承知しております。\n\n' +
          'もし今すぐのご対応が難しいようであれば、段階的な対応（例：今月は半額相当の改定、' + month + '月より全面適用）なども検討させていただく余地がございます。\n\n' +
          'ぜひ、御社のご都合と弊社の状況をすり合わせ、双方にとって無理のない形を一緒に考えさせてください。';
      }
    },
    {
      q: '「上の者に確認が必要」「社内で検討する」',
      getA: function(industry, rate, partner) {
        return 'もちろんでございます。ご検討の時間をいただけることに感謝申し上げます。\n\n' +
          'ご説明の参考として、今回の価格改定の背景・根拠を記載した資料をご用意いたします。ご担当者様・上長様にご覧いただけますと、よりご理解が深まるかと思います。\n\n' +
          'ご返答の目安として、○月○日ごろまでにお知らせいただけますと幸いです。何かご不明な点がございましたら、いつでもお申し付けください。';
      }
    },
    {
      q: '「なぜ今なのか」「急すぎる」',
      getA: function(industry, rate, partner) {
        return 'ご指摘はもっともでございます。実は、弊社では長期にわたってコスト上昇を吸収してまいりましたが、今般の状況が予想を超えて続いており、これ以上の据え置きが困難となりました。\n\n' +
          'できる限り早めにお伝えし、準備期間を設けていただきたいと考え、このタイミングでのご連絡となりました。\n\n' +
          '急なご連絡となってしまい大変申し訳ございません。引き続き最高の品質・サービスをご提供できるよう全力を尽くしてまいります。';
      }
    },
    {
      q: '「品質は変わらないのか」「サービスは同じか」',
      getA: function(industry, rate, partner) {
        return 'ご心配をおかけしてしまい、大変申し訳ございません。\n\n' +
          '今回の価格改定はあくまでコスト上昇分の適正化であり、これまでご提供してきた品質・サービス水準については一切変更ございません。むしろ、安定した経営基盤を維持することで、より長期的に安心してお取引いただけると考えております。\n\n' +
          '引き続きご期待に応えられるよう、スタッフ一同努力してまいります。';
      }
    },
    {
      q: '「他のコスト削減はしているのか」「まだ努力できるのでは」',
      getA: function(industry, rate, partner) {
        return 'ご指摘はとても重要な視点です。弊社でも人件費の最適化・業務効率化・仕入れ先との交渉など、あらゆるコスト削減に継続して取り組んでまいりました。\n\n' +
          'しかしながら、' + REASON_BY_INDUSTRY[industry] + 'の規模が従来の想定を大きく上回っており、内部努力だけでは吸収しきれない状況となっております。\n\n' +
          'ご要望があれば、コスト削減の取り組み内容についても詳しくご説明させていただきます。';
      }
    },
    {
      q: '「取引量を減らすかもしれない」「他社に切り替えも検討する」',
      getA: function(industry, rate, partner) {
        return 'そのようなご事情はよく理解できます。お取引の見直しをご検討いただくことは、御社のご判断ですので、その点は尊重いたします。\n\n' +
          'ただ、これまでのお取引実績や、弊社がご提供してきた品質・納期・サポートの価値も合わせてご評価いただけますと幸いです。\n\n' +
          'もし今後も良いお取引関係を続けていただけるようであれば、長期的な視点で双方にとってメリットのある条件をぜひ一緒に考えさせていただきたいと思います。';
      }
    },
  ];

  function generate() {
    var industry = document.getElementById('industry').value;
    var rate = document.getElementById('rate').value;
    var partner = document.getElementById('partner').value;

    // メインスクリプト
    document.getElementById('mainScript').textContent = buildScript(industry, rate, partner);

    // 反論リスト
    var html = '';
    OBJECTIONS.forEach(function(obj, i) {
      html += '<div class="objection-item">' +
        '<div class="objection-q">🗣 ' + obj.q + '</div>' +
        '<div class="objection-a" id="obj' + i + '">' + obj.getA(industry, rate, partner) + '</div>' +
        '<button class="btn-copy-sm" id="copyObj' + i + '" onclick="copyText(\'obj' + i + '\',\'copyObj' + i + '\')">📋 切り返し文をコピー</button>' +
        '</div>';
    });
    document.getElementById('objectionList').innerHTML = html;

    // 表示
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // localStorage 保存
    localStorage.setItem('negScript_industry', industry);
    localStorage.setItem('negScript_rate', rate);
    localStorage.setItem('negScript_partner', partner);
  }

  function copyText(srcId, btnId) {
    var text = document.getElementById(srcId).textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { flashCopied(btnId); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      flashCopied(btnId);
    }
  }

  function flashCopied(btnId) {
    var btn = document.getElementById(btnId);
    var orig = btn.textContent;
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  }

  // localStorage 復元
  window.addEventListener('DOMContentLoaded', function() {
    var i = localStorage.getItem('negScript_industry');
    var r = localStorage.getItem('negScript_rate');
    var p = localStorage.getItem('negScript_partner');
    if (i) document.getElementById('industry').value = i;
    if (r) document.getElementById('rate').value = r;
    if (p) document.getElementById('partner').value = p;
  });
  </script>
