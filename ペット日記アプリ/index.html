<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペット日記</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐾 ペット日記</h1>
      <p class="subtitle">体重・食事・散歩を記録して健康管理</p>
    </header>

    <section class="form-section">
      <h2>記録を追加</h2>
      <form id="record-form">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="weight">体重 (kg)</label>
          <input type="number" id="weight" step="0.01" min="0" placeholder="例：3.50">
        </div>
        <div class="form-group">
          <label for="meal">食事内容</label>
          <input type="text" id="meal" placeholder="例：ドライフード100g">
        </div>
        <div class="form-group">
          <label for="walk">散歩</label>
          <select id="walk">
            <option value="">未記録</option>
            <option value="あり">あり</option>
            <option value="なし">なし</option>
          </select>
        </div>
        <div class="form-group">
          <label for="note">メモ</label>
          <input type="text" id="note" placeholder="例：元気よく食べた">
        </div>
        <button type="submit" class="btn-add">記録する</button>
      </form>
    </section>

    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="empty-message" class="empty-message">まだ記録がありません。</div>
      <ul id="record-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
