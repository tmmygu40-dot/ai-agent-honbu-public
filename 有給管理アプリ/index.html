<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有給管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>有給管理</h1>

    <!-- 残日数サマリー -->
    <section class="summary-section">
      <div id="summary-cards" class="summary-cards">
        <!-- JSで生成 -->
      </div>
    </section>

    <!-- タブ切り替え -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="grant">付与登録</button>
      <button class="tab-btn" data-tab="use">取得記録</button>
      <button class="tab-btn" data-tab="history">履歴</button>
    </div>

    <!-- 付与登録タブ -->
    <section id="tab-grant" class="tab-content active">
      <h2>有給を付与する</h2>
      <form id="grant-form" class="form-card">
        <div class="form-row">
          <label for="grant-date">付与日</label>
          <input type="date" id="grant-date" required>
        </div>
        <div class="form-row">
          <label for="grant-days">付与日数</label>
          <input type="number" id="grant-days" min="0.5" step="0.5" placeholder="例：10" required>
        </div>
        <div class="form-row">
          <label for="grant-expire">有効期限</label>
          <input type="date" id="grant-expire" required>
        </div>
        <div class="form-row">
          <label for="grant-note">メモ（任意）</label>
          <input type="text" id="grant-note" placeholder="例：2026年度分">
        </div>
        <button type="submit" class="btn-primary">付与を登録する</button>
      </form>

      <h2>付与履歴</h2>
      <div id="grant-list" class="list-container">
        <!-- JSで生成 -->
      </div>
    </section>

    <!-- 取得記録タブ -->
    <section id="tab-use" class="tab-content">
      <h2>有給を取得する</h2>
      <form id="use-form" class="form-card">
        <div class="form-row">
          <label for="use-grant-select">対象の付与</label>
          <select id="use-grant-select" required>
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-row">
          <label for="use-date">取得日</label>
          <input type="date" id="use-date" required>
        </div>
        <div class="form-row">
          <label for="use-days">取得日数</label>
          <input type="number" id="use-days" min="0.5" step="0.5" placeholder="例：1" required>
        </div>
        <div class="form-row">
          <label for="use-note">メモ（任意）</label>
          <input type="text" id="use-note" placeholder="例：夏季休暇">
        </div>
        <button type="submit" class="btn-primary">取得を記録する</button>
      </form>
    </section>

    <!-- 履歴タブ -->
    <section id="tab-history" class="tab-content">
      <h2>取得履歴</h2>
      <div id="use-list" class="list-container">
        <!-- JSで生成 -->
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
