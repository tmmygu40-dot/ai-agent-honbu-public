<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト表作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>シフト表作成アプリ</h1>

    <!-- スタッフ登録 -->
    <section class="section">
      <h2>スタッフ登録</h2>
      <div class="staff-input">
        <input type="text" id="staffName" placeholder="スタッフ名を入力" maxlength="20">
        <button onclick="addStaff()">追加</button>
      </div>
      <div id="staffList" class="staff-list"></div>
    </section>

    <!-- 時間帯設定 -->
    <section class="section">
      <h2>時間帯設定</h2>
      <div class="time-input">
        <input type="text" id="timeName" placeholder="時間帯名（例：朝9-12）" maxlength="10">
        <button onclick="addTimeSlot()">追加</button>
      </div>
      <div id="timeSlotList" class="tag-list"></div>
    </section>

    <!-- シフト表 -->
    <section class="section">
      <h2>週次シフト表</h2>
      <div class="week-nav">
        <button onclick="prevWeek()">◀ 前の週</button>
        <span id="weekLabel"></span>
        <button onclick="nextWeek()">次の週 ▶</button>
      </div>
      <div class="table-wrapper">
        <table id="shiftTable"></table>
      </div>
      <p class="legend"><span class="empty-mark">■</span> 空きコマ（未割り当て）</p>
    </section>

    <!-- 操作ボタン -->
    <section class="section btn-row">
      <button class="btn-clear" onclick="clearWeekShift()">この週のシフトをクリア</button>
      <button class="btn-save" onclick="saveAll()">保存</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
