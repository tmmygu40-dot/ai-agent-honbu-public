<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通院記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>通院記録アプリ</h1>

    <!-- 次回予約日ピックアップ -->
    <section class="upcoming" id="upcomingSection">
      <h2>次回予約</h2>
      <div id="upcomingList" class="upcoming-list"></div>
    </section>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <label>
          病院名 <span class="required">*</span>
          <input type="text" id="hospital" placeholder="例：山田内科クリニック">
        </label>
        <label>
          診察日 <span class="required">*</span>
          <input type="date" id="visitDate">
        </label>
        <label>
          症状
          <input type="text" id="symptom" placeholder="例：頭痛、発熱">
        </label>
        <label>
          処方薬
          <input type="text" id="medicine" placeholder="例：ロキソニン、ムコスタ">
        </label>
        <label>
          次回予約日
          <input type="date" id="nextDate">
        </label>
        <label>
          メモ
          <input type="text" id="memo" placeholder="例：空腹時に内服">
        </label>
      </div>
      <button class="btn-add" id="addBtn">追加する</button>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧 <span class="count" id="recordCount">0件</span></h2>
      <div id="recordList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
