<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="業種と規模を選ぶだけで、人手不足対策アクションをすぐ逆引きできるツール。飲食・建設・介護・製造など8業種×4規模に対応。採用・定着・業務効率化の打ち手を即確認。">
  <title>人材確保対策逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果ヘッダー ── */
    .result-header {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .result-header-label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .result-header-title { font-size: 1.15rem; font-weight: 900; color: var(--accent); }
    .result-header-count { font-size: 0.82rem; color: var(--text-sub); margin-top: 0.3rem; }

    /* ── アクションリスト ── */
    .action-list {
      display: none;
      max-width: 600px;
      margin: 0 auto;
    }
    .action-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .action-tag {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }
    .tag-hire   { background: #dbeafe; color: #1d4ed8; }
    .tag-retain { background: #d1fae5; color: #065f46; }
    .tag-eff    { background: #fef9c3; color: #713f12; }
    .tag-pr     { background: #ede9fe; color: #4c1d95; }
    .tag-env    { background: #fce7f3; color: #831843; }
    .action-title { font-size: 0.97rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .action-desc  { font-size: 0.84rem; color: var(--text-sub); line-height: 1.55; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .action-item, .result-header { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>人材確保対策逆引きアプリ</h1>
    <p class="subtitle">業種と規模を選ぶだけ — 人手不足の打ち手をすぐ確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="">選択してください</option>
        <option value="food">飲食・宿泊</option>
        <option value="retail">小売・流通</option>
        <option value="construction">建設・土木</option>
        <option value="care">介護・福祉</option>
        <option value="mfg">製造</option>
        <option value="transport">運輸・物流</option>
        <option value="it">IT・情報通信</option>
        <option value="service">サービス業全般</option>
      </select>
    </div>
    <div class="field">
      <label for="scale">従業員規模</label>
      <select id="scale">
        <option value="">選択してください</option>
        <option value="s">1〜10名（個人〜零細）</option>
        <option value="m">11〜30名（小規模）</option>
        <option value="l">31〜100名（中規模）</option>
        <option value="xl">100名以上（大規模）</option>
      </select>
    </div>
  </div>

  <!-- 逆引きボタン -->
  <button class="btn-calc" onclick="lookup()">🔍 対策を逆引きする</button>

  <!-- 結果ヘッダー -->
  <div class="result-header" id="result-header">
    <p class="result-header-label">逆引き結果</p>
    <p class="result-header-title" id="result-title"></p>
    <p class="result-header-count" id="result-count"></p>
  </div>

  <!-- アクションリスト -->
  <div class="action-list" id="action-list"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・中小企業庁・経済産業省などの官公庁資料や、人材確保・雇用管理に関する公開データを参考に整理しています。目安としてご活用ください。最新の制度・助成金は各公的機関の情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

    food:'飲食・宿泊', retail:'小売・流通', construction:'建設・土木',
    care:'介護・福祉', mfg:'製造', transport:'運輸・物流',
    it:'IT・情報通信', service:'サービス業全般'
  };
  var SCALE_LABEL = {
    s:'1〜10名', m:'11〜30名', l:'31〜100名', xl:'100名以上'
  };
  var TAG_INFO = {
    hire:   { label:'採用強化',     cls:'tag-hire'   },
    retain: { label:'定着・待遇',   cls:'tag-retain' },
    eff:    { label:'業務効率化',   cls:'tag-eff'    },
    pr:     { label:'採用広報',     cls:'tag-pr'     },
    env:    { label:'職場環境',     cls:'tag-env'    },
  };

  function lookup() {
    var ind = document.getElementById('industry').value;
    var sc  = document.getElementById('scale').value;
    if (!ind || !sc) { alert('業種と規模を選択してください'); return; }

    // localStorage に保存
    localStorage.setItem('jinzai_industry', ind);
    localStorage.setItem('jinzai_scale', sc);

    var d = DATA[ind];
    var actions = (d.common || []).concat(d[sc] || []);

    // 結果ヘッダー
    var hdr = document.getElementById('result-header');
    hdr.style.display = 'block';
    document.getElementById('result-title').textContent =
      INDUSTRY_LABEL[ind] + '｜' + SCALE_LABEL[sc];
    document.getElementById('result-count').textContent =
      '対策アクション：' + actions.length + '件';

    // アクションリスト
    var list = document.getElementById('action-list');
    list.style.display = 'block';
    list.innerHTML = actions.map(function(a) {
      var ti = TAG_INFO[a.tag] || { label: a.tag, cls: '' };
      return '<div class="action-item">'
           + '<span class="action-tag ' + ti.cls + '">' + ti.label + '</span>'
           + '<p class="action-title">' + a.title + '</p>'
           + '<p class="action-desc">' + a.desc + '</p>'
           + '</div>';
    }).join('');

    // スクロール
    hdr.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 前回の選択を復元
  window.addEventListener('load', function() {
    var ind = localStorage.getItem('jinzai_industry');
    var sc  = localStorage.getItem('jinzai_scale');
    if (ind) document.getElementById('industry').value = ind;
    if (sc)  document.getElementById('scale').value   = sc;
  });
  </script>
