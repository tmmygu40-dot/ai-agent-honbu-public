<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座席割り当てアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>座席割り当てアプリ</h1>

    <!-- 参加者登録 -->
    <section class="card">
      <h2>参加者を登録</h2>
      <div class="form-row">
        <input type="text" id="nameInput" placeholder="名前" maxlength="30">
        <input type="text" id="groupInput" placeholder="グループ（任意）" maxlength="30">
        <button id="addBtn">追加</button>
      </div>
      <div id="participantList" class="list"></div>
    </section>

    <!-- テーブル設定 -->
    <section class="card">
      <h2>テーブル設定</h2>
      <div class="form-row">
        <label>テーブル数
          <input type="number" id="tableCount" value="3" min="1" max="50">
        </label>
        <label>1テーブルの定員
          <input type="number" id="tableCapacity" value="4" min="1" max="100">
        </label>
      </div>
    </section>

    <!-- 操作ボタン -->
    <div class="btn-row">
      <button id="assignBtn" class="primary">自動割り当て</button>
      <button id="resetBtn" class="danger">リセット</button>
    </div>

    <!-- 結果 -->
    <section id="resultSection" class="card hidden">
      <h2>割り当て結果</h2>
      <div id="resultList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
