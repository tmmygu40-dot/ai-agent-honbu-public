<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>副業採算チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>副業採算チェッカー</h1>
    <p>副業の手取り増加額・確定申告要否・年間収支を即確認</p>
  </header>

  <main>
    <section class="card">
      <h2>入力</h2>
      <div class="form-group">
        <label for="monthlyRevenue">副業の月収（円）</label>
        <input type="number" id="monthlyRevenue" placeholder="例：50000" min="0">
      </div>
      <div class="form-group">
        <label for="monthlyExpense">月間経費（円）</label>
        <input type="number" id="monthlyExpense" placeholder="例：5000" min="0" value="0">
        <span class="hint">通信費・道具代・交通費など</span>
      </div>
      <div class="form-group">
        <label for="incomeTaxRate">所得税率（%）</label>
        <input type="number" id="incomeTaxRate" placeholder="例：20" min="0" max="100" value="20">
        <span class="hint">給与の課税所得に応じた税率（5〜45%）</span>
      </div>
      <div class="form-group">
        <label for="residentTaxRate">住民税率（%）</label>
        <input type="number" id="residentTaxRate" placeholder="例：10" min="0" max="100" value="10">
        <span class="hint">通常は10%固定</span>
      </div>
      <button class="btn-calc" id="calcBtn">計算する</button>
    </section>

    <section class="card result-card" id="resultCard" style="display:none;">
      <h2>計算結果</h2>

      <div class="result-grid">
        <div class="result-item">
          <div class="label">月間副業所得</div>
          <div class="value" id="monthlyIncome">¥0</div>
          <div class="sub">（月収 − 経費）</div>
        </div>
        <div class="result-item">
          <div class="label">月間税負担</div>
          <div class="value red" id="monthlyTax">¥0</div>
          <div class="sub">（所得税 + 住民税）</div>
        </div>
        <div class="result-item highlight">
          <div class="label">月間手取り増加額</div>
          <div class="value green" id="monthlyTakeHome">¥0</div>
        </div>
      </div>

      <hr>

      <div class="result-grid">
        <div class="result-item">
          <div class="label">年間副業所得</div>
          <div class="value" id="annualIncome">¥0</div>
        </div>
        <div class="result-item">
          <div class="label">年間税負担</div>
          <div class="value red" id="annualTax">¥0</div>
        </div>
        <div class="result-item highlight">
          <div class="label">年間手取り増加額</div>
          <div class="value green" id="annualTakeHome">¥0</div>
        </div>
      </div>

      <hr>

      <div class="judgment" id="judgmentBox">
        <div class="judgment-label">確定申告</div>
        <div class="judgment-result" id="judgmentResult">-</div>
        <div class="judgment-note" id="judgmentNote"></div>
      </div>
    </section>

    <section class="card" id="historySection">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="btn-clear" id="clearHistoryBtn">履歴を削除</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="no-history">履歴はありません</li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
