<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>不運ネタ変換ポジティブおみくじ｜30秒で笑い話に変える</title>
  <meta name="description" content="今日の不運をカテゴリで選ぶだけで、ネタ化フレーズとポジティブ一言を30秒で返すおみくじアプリ。落ち込んだ夜のメンタル切替や、明日の話題作りにお使いいただけます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.1rem; font-weight: 700; line-height: 1.5;
      margin-top: 0.6rem; margin-bottom: 0.7rem;
      padding: 0.8rem 0.6rem; border-radius: 10px;
      background: rgba(255,255,255,0.55);
    }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; }

    .history-list { list-style: none; padding: 0; margin: 0; }
    .history-item { padding: 0.7rem 0.3rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; line-height: 1.5; }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-meta { color: var(--text-sub); font-size: 0.75rem; margin-bottom: 0.2rem; }
    .history-item .h-rank { font-weight: 700; color: var(--accent); margin-right: 0.4rem; }
    .empty-history { color: var(--text-sub); font-size: 0.85rem; text-align: center; padding: 1rem 0; }

    .btn-clear {
      display: block; margin: 1rem auto 0; padding: 0.5rem 1rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
    }
    .btn-clear:hover { color: var(--ng); border-color: var(--ng); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-clear { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>不運ネタ変換ポジティブおみくじ</h1>
    <p class="subtitle">今日の不運をカテゴリで選ぶだけ。ネタ化フレーズとポジ一言を30秒でお届け</p>
  </header>

  <div class="card">
    <p class="card-title">どんな不運でしたか？</p>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="work">💼 仕事・職場</option>
        <option value="love">💔 恋愛・パートナー</option>
        <option value="money">💸 金運・お金</option>
        <option value="health">🤒 健康・体調</option>
        <option value="human">😤 人間関係</option>
        <option value="other">🌧 その他・なんとなく</option>
      </select>
      <p class="hint">気になる種類を1つ選んでください</p>
    </div>
  </div>

  <button class="btn-calc" onclick="draw()">🎴 おみくじを引く</button>

  <div class="result-card" id="result">
    <p class="result-label">今日の運勢ランク</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="hist-card">
    <p class="card-title">引いた履歴（最新10件）</p>
    <ul class="history-list" id="hist-list"></ul>
    <button class="btn-clear" onclick="clearHistory()">履歴を全消去</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このおみくじはエンタメ目的のジョークツールです。フレーズはユーモアと前向きな再解釈を意識して作成していますが、深刻な悩みは専門窓口・公的相談先のご利用をおすすめします。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'fuun_omikuji_history_v1';
  var MAX_HISTORY = 10;

  var RANKS = [
    { name: '大ラッキー',   level: 'ok',   weight: 1 },
    { name: 'ラッキー',     level: 'ok',   weight: 2 },
    { name: '小ラッキー',   level: 'ok',   weight: 2 },
    { name: 'ふつう',       level: 'warn', weight: 3 },
    { name: '小不運',       level: 'warn', weight: 2 },
    { name: '不運',         level: 'ng',   weight: 2 },
    { name: '超不運（=神ネタ）', level: 'ng', weight: 2 }
  ];

  var CAT_LABEL = {
    work:   '💼 仕事',
    love:   '💔 恋愛',
    money:  '💸 金運',
    health: '🤒 健康',
    human:  '😤 人間関係',
    other:  '🌧 その他'
  };

  // カテゴリ別ネタ変換フレーズ
  var NETA = {
    work: [
      '今日の失敗は、来年の自分の鉄板トーク素材として保管されました',
      'コピー機が紙詰まりするタイミング、まさに芸術点満点',
      '上司の機嫌、今日は気象警報レベルでした',
      '会議で当てられた瞬間、人類の進化が止まりました',
      '残業した時間ぶん、伝説のネタ濃度が上昇',
      '誤送信メールは、来週の飲み会の優勝候補です',
      'PCがフリーズ＝宇宙が「ちょっと休め」と言ってきた合図',
      'プリンターと心が通じ合わなかった日'
    ],
    love: [
      '既読がつくまでの時間、修行僧レベルで磨かれました',
      '送ったLINE、返事が来る前に何回も読み返してる時点で勝ち',
      '相手の地雷を踏んだ＝相手の地雷探知機を兼ねる才能を獲得',
      '今日のすれ違い、来年の小説のあらすじになります',
      'デートのドタキャン、貯金が無傷で残った祝勝の日',
      '失恋の痛みは、来月のカラオケで全部出し切れる予定',
      '片想い継続日数が世界記録更新中（自分調べ）'
    ],
    money: [
      '財布の中の小銭、今日は珍しい組み合わせで美術館行きレベル',
      '予定外の出費＝未来の自分が「いい思い出」と呼ぶ伏線',
      'コンビニで買いすぎた日は、自分への給料日と命名',
      'ATMの行列、人生で一番気の長い時間でした',
      'レシート見たら、来月の節約モチベが10倍になった',
      '自販機でハズレた、その代わり健康ポイントが貯まった',
      '財布を家に忘れた日、世界で一番身軽な気分を味わえた'
    ],
    health: [
      'くしゃみ3連発で、悪霊3体お祓い完了',
      '寝坊した日に限って絶好調、これが体内時計の反逆',
      '頭痛は脳が「もう少し甘やかして」と言っているサイン',
      '腹痛は腸からの真剣交際申込み',
      '寝違えた首、世界一の慎重派フォームを開発した',
      '低気圧に負けた日は、空に責任転嫁OKです',
      '花粉のせいで涙ぐむ姿、映画ワンシーンに使えるレベル'
    ],
    human: [
      'マウント取られた瞬間、こちらは無料漫才を見学する権利を獲得',
      'グループLINEの既読スルー、平和な夜のサイン',
      '雑談で話題外しても、それは伝説の前振り',
      '苦手な人と同じ車両、体感だけで月に1往復した気分',
      '飲み会断った日は、家でフルコース貸切営業',
      '隣の人の貧乏ゆすり、今日のBGMでした',
      '上司の長話、メモ取るふりで詩のネタ仕込めました'
    ],
    other: [
      '傘を忘れた瞬間に晴れる現象、自然界からのドッキリ',
      '電車1本逃した日は、人生のリズム調整デー',
      '靴下に穴、足の指が空気と握手したがってる証拠',
      '信号が連続赤、今日は深呼吸の練習日',
      '自販機がお釣り全部1円玉、財布の体幹が鍛えられた',
      'スーパーのカートが斜めに進む日、人生も寄り道のススメ',
      '夜中に冷蔵庫を開けたら何もない、それは明日への期待感'
    ]
  };

  var POSITIVE = [
    'この経験、5年後の飲みネタ確定です',
    '今日の不運は明日の運の前借りと考えましょう',
    '一日が終わるだけで人生勝ちみたいなところある',
    '誰かに話せばだいたい笑える、それで充分',
    '今日のあなたは「物語の主人公」っぽさが7割増',
    '寝て起きたら、たいていのことは70%軽くなります',
    '不運に気づける感性は、幸運に気づける感性と同じです',
    '今日のあなた、頑張った。冷たい飲み物を飲む権利あり',
    '比較する相手を昨日の自分にすれば常にプラス',
    '小さな不運を笑える人が、大きな幸運を呼びます',
    '深呼吸してお風呂入れば、勝率は跳ね上がります',
    '今日のしんどさ、来週の優しさになって誰かを救う',
    'まだ何かを引きずれる元気がある、それも才能',
    '今日できたことを3つ思い出すと、悪い日が中和されます',
    '宇宙的に見ると、今日の出来事は塵レベル。ご安心を'
  ];

  function pickWeighted(arr) {
    var total = 0;
    arr.forEach(function(x){ total += x.weight; });
    var r = Math.random() * total;
    for (var i = 0; i < arr.length; i++) {
      r -= arr[i].weight;
      if (r <= 0) return arr[i];
    }
    return arr[arr.length - 1];
  }
  function pickOne(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function draw() {
    var cat = document.getElementById('cat').value;
    var rank = pickWeighted(RANKS);
    var neta = pickOne(NETA[cat]);
    var pos = pickOne(POSITIVE);

    showResult(rank.level, rank.name, neta, pos);
    saveHistory({
      ts: Date.now(),
      cat: cat,
      rank: rank.name,
      level: rank.level,
      neta: neta,
      pos: pos
    });
    renderHistory();
  }

  function showResult(level, rankName, neta, pos) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rankName;
    document.getElementById('re').textContent = '🎴 ' + neta;
    document.getElementById('rn').textContent = '✨ ' + pos;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function loadHistory() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return [];
      var arr = JSON.parse(s);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }
  function saveHistory(item) {
    var arr = loadHistory();
    arr.unshift(item);
    if (arr.length > MAX_HISTORY) arr = arr.slice(0, MAX_HISTORY);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
  }
  function clearHistory() {
    if (!confirm('履歴を全部消しますか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderHistory();
  }
  function fmtDate(ts) {
    var d = new Date(ts);
    var pad = function(n){ return n < 10 ? '0' + n : '' + n; };
    return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate())
      + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function renderHistory() {
    var list = loadHistory();
    var ul = document.getElementById('hist-list');
    if (!list.length) {
      ul.innerHTML = '<li class="empty-history">まだ履歴はありません。引いてみてください。</li>';
      return;
    }
    ul.innerHTML = list.map(function(it){
      var catLabel = CAT_LABEL[it.cat] || it.cat;
      return '<li class="history-item">'
        + '<div class="h-meta">' + escapeHtml(fmtDate(it.ts)) + ' / ' + escapeHtml(catLabel) + '</div>'
        + '<div><span class="h-rank">' + escapeHtml(it.rank) + '</span>' + escapeHtml(it.neta) + '</div>'
        + '<div style="color:var(--text-sub);margin-top:0.2rem;">→ ' + escapeHtml(it.pos) + '</div>'
        + '</li>';
    }).join('');
  }

  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
