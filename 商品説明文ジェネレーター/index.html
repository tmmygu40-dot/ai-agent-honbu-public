<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品説明文ジェネレーター</title>
  <meta name="description" content="商品名・特徴・ターゲットを入力するだけでECサイト向け商品説明文を3パターン即生成。シンプル型・訴求型・ストーリー型をワンクリックでコピーできるネットショップ出品サポートアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 生成結果カード ── */
    .gen-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .gen-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .gen-type {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
    }
    .gen-type span {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid var(--accent); border-radius: 5px;
      padding: 0.1rem 0.45rem; margin-left: 0.4rem;
    }
    .gen-text {
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }
    .btn-copy {
      display: inline-block; padding: 0.38rem 0.9rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-copy { display: none !important; }
      .card, .gen-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; display: block !important; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>✍️ 商品説明文ジェネレーター</h1>
    <p class="subtitle">商品情報を入力するだけでEC向け説明文を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="prod_name">商品名</label>
      <input type="text" id="prod_name" placeholder="例: 竹製まな板 Mサイズ">
    </div>
    <div class="field">
      <label for="category">カテゴリ・種類</label>
      <select id="category">
        <option value="daily">日用品・キッチン用品</option>
        <option value="fashion">ファッション・アパレル</option>
        <option value="beauty">美容・コスメ・健康</option>
        <option value="food">食品・飲料</option>
        <option value="hobby">趣味・スポーツ・アウトドア</option>
        <option value="digital">家電・デジタル機器</option>
        <option value="baby">ベビー・キッズ用品</option>
        <option value="pet">ペット用品</option>
        <option value="handmade">ハンドメイド・手作り品</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="features">商品の特徴・セールスポイント</label>
      <textarea id="features" placeholder="例: 抗菌加工、軽くて洗いやすい、食洗機対応、木の温もりを感じるデザイン"></textarea>
      <p class="hint">特徴や強みを複数入力（カンマ区切りでも可）</p>
    </div>
    <div class="field">
      <label for="target">ターゲット（どんな人向けか）</label>
      <input type="text" id="target" placeholder="例: 料理好きの30〜50代女性、新築・引越しを機に調理道具を揃えたい方">
    </div>
    <div class="field">
      <label for="price">価格（任意）</label>
      <input type="text" id="price" placeholder="例: 2,980円">
      <p class="hint">入力すると価格訴求文に使用されます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ 説明文を生成する</button>

  <!-- 生成結果: シンプル型 -->
  <div class="gen-card" id="card-simple">
    <div class="gen-card-header">
      <p class="gen-type">シンプル型 <span>読みやすさ重視</span></p>
      <button class="btn-copy" onclick="copyText('simple', this)">コピー</button>
    </div>
    <p class="gen-text" id="text-simple"></p>
  </div>

  <!-- 生成結果: 訴求型 -->
  <div class="gen-card" id="card-appeal">
    <div class="gen-card-header">
      <p class="gen-type">訴求型 <span>ベネフィット強調</span></p>
      <button class="btn-copy" onclick="copyText('appeal', this)">コピー</button>
    </div>
    <p class="gen-text" id="text-appeal"></p>
  </div>

  <!-- 生成結果: ストーリー型 -->
  <div class="gen-card" id="card-story">
    <div class="gen-card-header">
      <p class="gen-type">ストーリー型 <span>使用シーン描写</span></p>
      <button class="btn-copy" onclick="copyText('story', this)">コピー</button>
    </div>
    <p class="gen-text" id="text-story"></p>
  </div>

  <p class="source-note" style="display:none;max-width:600px;margin:0.5rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;" id="gen-note">
    💡 生成した文章は入力情報をもとに作成した参考文です。出品前に内容をご確認・修正のうえご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'shohin_setumeibun_v1';

  var CATEGORY_LABEL = {
    daily: '日用品・キッチン用品', fashion: 'ファッション・アパレル',
    beauty: '美容・コスメ・健康', food: '食品・飲料',
    hobby: '趣味・スポーツ・アウトドア', digital: '家電・デジタル機器',
    baby: 'ベビー・キッズ用品', pet: 'ペット用品',
    handmade: 'ハンドメイド・手作り品', other: 'その他'
  };

  // シーン別ひとことテンプレ
  var SCENE = {
    daily:    { s: '毎日の家事がもっと快適になります。', a: '日々のストレスをなくして、家事時間をもっと楽しく！', st: '朝の忙しい時間、これ一つでいつもの作業がスムーズに。' },
    fashion:  { s: 'コーデを選ばず、幅広いシーンで活躍します。', a: 'あなたのスタイルに自然と溶け込む、使い勝手のよさが魅力！', st: 'ふとした外出の日も、これを身につけるだけで気分が上がる。' },
    beauty:   { s: '毎日のスキンケア・メイクに取り入れやすい一品です。', a: 'プチプラなのに本格ケア。毎日続けやすい価格帯も魅力！', st: '朝の準備の時間が、ちょっと楽しみになるかもしれません。' },
    food:     { s: '素材のおいしさをそのままお届けします。', a: '食卓に「おいしい」を届ける、こだわりの一品！', st: '家族が集まる食卓に、ひと品加えるだけで会話が弾む。' },
    hobby:    { s: '趣味の時間をもっと充実させてくれる一品です。', a: 'パフォーマンスアップで、もっと楽しく・もっと本格的に！', st: 'あの日の「もっとうまくなりたい」という気持ちを後押しします。' },
    digital:  { s: '使いやすさと機能性を両立したアイテムです。', a: '面倒な作業を短縮して、時間を有効活用！', st: '「もっと早く買えばよかった」と思える、頼れる一台。' },
    baby:     { s: '赤ちゃんと子どもに安心してお使いいただけます。', a: '安全性に徹底的こだわった、パパ・ママも安心の設計！', st: 'お子さんの笑顔が増える、そんなアイテムを届けたくて作りました。' },
    pet:      { s: '大切なペットのために作られた一品です。', a: 'ペットの健康・快適さを考えた、うれしい機能満載！', st: '「もっと喜ばせてあげたい」そんな気持ちに応えるアイテムです。' },
    handmade: { s: '一点一点丁寧に手作りしたオリジナル作品です。', a: '同じものは世界に一つ。あなただけの特別な一品をお届けします！', st: '作った人の温もりが伝わる、手仕事ならではの風合いをお楽しみください。' },
    other:    { s: '日常をちょっと便利にしてくれる一品です。', a: 'シンプルだけど、使い始めると手放せなくなります！', st: 'ある日ふとした不便を解決してくれたのが、このアイテムでした。' }
  };

  function generate() {
    var name     = document.getElementById('prod_name').value.trim();
    var category = document.getElementById('category').value;
    var features = document.getElementById('features').value.trim();
    var target   = document.getElementById('target').value.trim();
    var price    = document.getElementById('price').value.trim();

    if (!name) { alert('商品名を入力してください'); return; }
    if (!features) { alert('商品の特徴・セールスポイントを入力してください'); return; }

    // 特徴をリスト化
    var featList = features.split(/[、,，\n]/).map(function(f){ return f.trim(); }).filter(function(f){ return f.length > 0; });
    var featBullets = featList.map(function(f){ return '・' + f; }).join('\n');
    var featInline = featList.join('、');

    var scene = SCENE[category] || SCENE['other'];
    var priceText = price ? '\n価格：' + price : '';
    var targetText = target ? target : 'お使いいただく方';

    // シンプル型
    var simple =
      '【' + name + '】\n\n' +
      featBullets + '\n\n' +
      (target ? '▶ こんな方におすすめ\n' + targetText + '\n\n' : '') +
      scene.s +
      priceText;

    // 訴求型
    var appeal =
      '【' + name + '】\n\n' +
      '「' + featList[0] + '」で毎日の暮らしが変わります。\n\n' +
      scene.a + '\n\n' +
      '◎ 選ばれる理由\n' +
      featBullets + '\n\n' +
      (target ? targetText + 'にぴったりの一品です。' : 'ぜひ一度お試しください。') +
      priceText;

    // ストーリー型
    var story =
      scene.st + '\n\n' +
      '「' + name + '」は、' + featInline + 'を実現した商品です。\n\n' +
      (target ? targetText + 'の毎日を、少しだけ豊かにするために作りました。\n\n' : '') +
      '【特徴】\n' +
      featBullets +
      priceText;

    document.getElementById('text-simple').textContent = simple;
    document.getElementById('text-appeal').textContent = appeal;
    document.getElementById('text-story').textContent  = story;

    document.getElementById('card-simple').style.display = 'block';
    document.getElementById('card-appeal').style.display = 'block';
    document.getElementById('card-story').style.display  = 'block';
    document.getElementById('gen-note').style.display    = 'block';

    // コピーボタンをリセット
    document.querySelectorAll('.btn-copy').forEach(function(btn) {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    });

    saveData(name, category, features, target, price);
  }

  function copyText(type, btn) {
    var text = document.getElementById('text-' + type).textContent;
    if (!text) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { showCopied(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  }

  function saveData(name, category, features, target, price) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        name: name, category: category, features: features, target: target, price: price
      }));
    } catch(e) {}
  }

  function loadData() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.name)     document.getElementById('prod_name').value = d.name;
      if (d.category) document.getElementById('category').value  = d.category;
      if (d.features) document.getElementById('features').value  = d.features;
      if (d.target)   document.getElementById('target').value    = d.target;
      if (d.price)    document.getElementById('price').value     = d.price;
    } catch(e) {}
  }

  loadData();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
