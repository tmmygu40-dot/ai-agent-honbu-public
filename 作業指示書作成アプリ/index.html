<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業指示書作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E4%BD%9C%E6%A5%AD%E6%8C%87%E7%A4%BA%E6%9B%B8%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="作業指示書作成アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"作業指示書作成アプリ","description":"作業指示書作成アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E4%BD%9C%E6%A5%AD%E6%8C%87%E7%A4%BA%E6%9B%B8%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>作業指示書作成アプリ</h1>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
    </header>

    <section class="form-section no-print">
      <h2>新規作成</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="productName">品名 <span class="required">*</span></label>
          <input type="text" id="productName" placeholder="例：部品A">
        </div>
        <div class="form-group">
          <label for="process">工程 <span class="required">*</span></label>
          <input type="text" id="process" placeholder="例：組立・塗装・検品">
        </div>
        <div class="form-group">
          <label for="assignee">担当者 <span class="required">*</span></label>
          <input type="text" id="assignee" placeholder="例：山田 太郎">
        </div>
        <div class="form-group">
          <label for="deadline">期限 <span class="required">*</span></label>
          <input type="date" id="deadline">
        </div>
        <div class="form-group full-width">
          <label for="quantity">数量</label>
          <input type="text" id="quantity" placeholder="例：100個">
        </div>
        <div class="form-group full-width">
          <label for="note">備考</label>
          <textarea id="note" rows="2" placeholder="特記事項があれば入力"></textarea>
        </div>
      </div>
      <button class="btn-primary" id="addBtn">指示書を追加</button>
    </section>

    <section class="list-section">
      <div class="list-header no-print">
        <h2>指示書一覧 <span id="countBadge" class="badge">0</span></h2>
        <button class="btn-print" id="printBtn">印刷</button>
      </div>

      <div id="listContainer">
        <p class="empty-message" id="emptyMsg">指示書がまだありません。上のフォームから追加してください。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
