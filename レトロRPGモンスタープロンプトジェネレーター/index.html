<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="モンスター種別・属性・ピクセルスタイル・背景を選ぶだけで、レトロRPG風モンスターの画像生成AIプロンプトを即生成。ワンクリックコピーでMidjourney・Stable Diffusion等にそのまま貼れます。">
  <title>レトロRPGモンスタープロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .prompt-output {
      background: #1c1917; color: #e5e5e5; padding: 1rem; border-radius: 10px;
      font-family: "Courier New", Consolas, monospace; font-size: 0.88rem;
      line-height: 1.6; word-break: break-all; white-space: pre-wrap;
      margin-bottom: 0.8rem; min-height: 80px;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── お気に入りカード ── */
    .fav-list { list-style: none; padding: 0; }
    .fav-list li {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; line-height: 1.5;
    }
    .fav-list li:last-child { border-bottom: none; }
    .fav-text { flex: 1; word-break: break-all; cursor: pointer; }
    .fav-text:hover { color: var(--accent); }
    .fav-del {
      flex-shrink: 0; background: none; border: none;
      color: var(--ng); font-size: 1rem; cursor: pointer; padding: 0 0.2rem;
    }
    .btn-fav-add {
      display: inline-block; margin-top: 0.6rem; padding: 0.45rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px; cursor: pointer;
    }
    .btn-fav-add:active { opacity: 0.7; }
    .no-fav { font-size: 0.82rem; color: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>レトロRPGモンスタープロンプトジェネレーター</h1>
    <p class="subtitle">モンスター種別・属性・スタイルを選ぶだけで画像生成AIプロンプトを即生成</p>
  </header>

  <!-- モンスター設定カード -->
  <div class="card">
    <p class="card-title">モンスター設定</p>
    <div class="field">
      <label for="monsterType">モンスター種別</label>
      <select id="monsterType">
        <option value="slime">スライム</option>
        <option value="dragon">ドラゴン</option>
        <option value="goblin">ゴブリン</option>
        <option value="skeleton">骸骨（スケルトン）</option>
        <option value="dark_mage">闇の魔法使い</option>
        <option value="golem">ゴーレム</option>
        <option value="ghost">ゴースト</option>
        <option value="demon">デーモン</option>
        <option value="treant">トレント（樹人）</option>
        <option value="mimic">ミミック</option>
        <option value="chimera">キメラ</option>
        <option value="basilisk">バジリスク</option>
      </select>
    </div>
    <div class="field">
      <label for="element">属性</label>
      <select id="element">
        <option value="fire">火</option>
        <option value="water">水</option>
        <option value="ice">氷</option>
        <option value="thunder">雷</option>
        <option value="earth">地</option>
        <option value="wind">風</option>
        <option value="light">光</option>
        <option value="dark">闇</option>
        <option value="poison">毒</option>
        <option value="none">無属性</option>
      </select>
    </div>
    <div class="field">
      <label for="monsterSize">サイズ</label>
      <select id="monsterSize">
        <option value="small">小型（ザコ敵）</option>
        <option value="medium">中型（中ボス）</option>
        <option value="boss">ボス級（大型）</option>
      </select>
    </div>
    <div class="field">
      <label for="pose">ポーズ・アクション</label>
      <select id="pose">
        <option value="idle">待機（アイドル）</option>
        <option value="attack">攻撃</option>
        <option value="cast_spell">魔法詠唱</option>
        <option value="defend">防御</option>
        <option value="defeated">倒れ</option>
        <option value="roar">咆哮</option>
      </select>
    </div>
  </div>

  <!-- スタイル設定カード -->
  <div class="card">
    <p class="card-title">スタイル設定</p>
    <div class="field">
      <label for="pixelStyle">ピクセルスタイル</label>
      <select id="pixelStyle">
        <option value="8bit">8bit（ファミコン風）</option>
        <option value="16bit">16bit（スーファミ風）</option>
        <option value="32bit">32bit（PS1風）</option>
      </select>
    </div>
    <div class="field">
      <label for="bgScene">背景</label>
      <select id="bgScene">
        <option value="none">なし（透過・単色）</option>
        <option value="dungeon">ダンジョン</option>
        <option value="grassland">草原</option>
        <option value="lava">溶岩・火山</option>
        <option value="ice_cave">氷の洞窟</option>
        <option value="dark_forest">暗い森</option>
        <option value="castle">城・玉座の間</option>
        <option value="ruins">遺跡・廃墟</option>
        <option value="underwater">海底</option>
        <option value="sky">空・雲上</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="classic">クラシック（ファミコン風）</option>
        <option value="dark_fantasy">ダークファンタジー</option>
        <option value="vibrant">ビビッド（高彩度）</option>
        <option value="pastel">パステル</option>
        <option value="monochrome">モノクロ</option>
        <option value="sepia">セピア</option>
        <option value="neon">ネオン（サイバー）</option>
      </select>
    </div>
    <div class="field">
      <label for="extraDetail">追加ディテール（任意）</label>
      <input type="text" id="extraDetail" placeholder="例: glowing eyes, battle scars, crystal armor">
      <p class="hint">英語でカンマ区切り。空欄でもOK</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🎮 プロンプトを生成</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成プロンプト</p>
    <div class="prompt-output" id="promptText"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">📋 コピー</button>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="favCard">
    <p class="card-title">お気に入りプロンプト</p>
    <button class="btn-fav-add no-print" id="btnFavAdd" onclick="addFav()" style="display:none">⭐ 現在のプロンプトをお気に入りに追加</button>
    <ul class="fav-list" id="favList"></ul>
    <p class="no-fav" id="noFav">まだお気に入りはありません</p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、レトロRPG風モンスターの画像生成AIプロンプトを手軽に作成するためのジェネレーターです。Midjourney・Stable Diffusion・DALL-E等でご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── データ定義 ── */
  var MONSTERS = {
    slime: { en: 'slime', desc: 'a round gelatinous slime creature' },
    dragon: { en: 'dragon', desc: 'a fearsome dragon with wings and horns' },
    goblin: { en: 'goblin', desc: 'a small mischievous goblin warrior' },
    skeleton: { en: 'skeleton warrior', desc: 'an undead skeleton warrior with a sword' },
    dark_mage: { en: 'dark mage', desc: 'a sinister dark mage in a hooded robe' },
    golem: { en: 'stone golem', desc: 'a massive stone golem with glowing runes' },
    ghost: { en: 'ghost', desc: 'a floating translucent ghost with eerie glow' },
    demon: { en: 'demon lord', desc: 'a powerful demon lord with curved horns and bat wings' },
    treant: { en: 'treant', desc: 'a living tree monster with gnarled bark and glowing eyes' },
    mimic: { en: 'mimic chest', desc: 'a treasure chest mimic with sharp teeth and a tongue' },
    chimera: { en: 'chimera', desc: 'a chimera with a lion head, goat body, and serpent tail' },
    basilisk: { en: 'basilisk', desc: 'a serpentine basilisk with petrifying gaze' }
  };

  var ELEMENTS = {
    fire: { en: 'fire', fx: 'surrounded by flames and embers' },
    water: { en: 'water', fx: 'with water splashes and aqua aura' },
    ice: { en: 'ice', fx: 'covered in frost and ice crystals' },
    thunder: { en: 'thunder', fx: 'crackling with lightning bolts and electric sparks' },
    earth: { en: 'earth', fx: 'with rocky armor and dirt particles' },
    wind: { en: 'wind', fx: 'with swirling wind and leaves' },
    light: { en: 'holy', fx: 'radiating golden holy light and halos' },
    dark: { en: 'dark', fx: 'shrouded in dark mist and shadow tendrils' },
    poison: { en: 'poison', fx: 'dripping with toxic green ooze and poison gas' },
    none: { en: '', fx: '' }
  };

  var SIZES = {
    small: 'small enemy sprite',
    medium: 'mid-boss sized creature',
    boss: 'large imposing boss monster'
  };

  var POSES = {
    idle: 'in idle standing pose',
    attack: 'in attack pose, swinging weapon forward',
    cast_spell: 'casting a spell with magical energy gathering',
    defend: 'in defensive guard pose',
    defeated: 'in defeated falling pose',
    roar: 'roaring with mouth wide open'
  };

  var STYLES = {
    '8bit': 'NES 8-bit pixel art style, limited color palette, 16x16 or 32x32 sprite',
    '16bit': 'SNES 16-bit pixel art style, richer colors, 48x48 or 64x64 sprite',
    '32bit': 'PlayStation 1 era 32-bit pixel art style, detailed shading, high-resolution sprite'
  };

  var BGS = {
    none: 'on a clean solid color background',
    dungeon: 'in a dark stone dungeon with torches on walls',
    grassland: 'on a green grassland with blue sky',
    lava: 'in a volcanic lava field with molten rock',
    ice_cave: 'inside an icy crystal cave',
    dark_forest: 'in a dark enchanted forest with twisted trees',
    castle: 'inside a grand castle throne room',
    ruins: 'among ancient stone ruins overgrown with vines',
    underwater: 'in a deep underwater scene with coral and bubbles',
    sky: 'floating above clouds in the sky'
  };

  var PALETTES = {
    classic: 'classic NES color palette',
    dark_fantasy: 'dark fantasy color palette with deep purples, blacks, and blood reds',
    vibrant: 'vibrant high-saturation colors',
    pastel: 'soft pastel color palette',
    monochrome: 'monochrome grayscale palette',
    sepia: 'warm sepia-toned palette',
    neon: 'neon cyberpunk color palette with glowing highlights'
  };

  var currentPrompt = '';
  var LS_KEY = 'retroRPGMonsterPromptFavs';

  /* ── プロンプト生成 ── */
  function generate() {
    var mt = document.getElementById('monsterType').value;
    var el = document.getElementById('element').value;
    var sz = document.getElementById('monsterSize').value;
    var ps = document.getElementById('pose').value;
    var px = document.getElementById('pixelStyle').value;
    var bg = document.getElementById('bgScene').value;
    var pl = document.getElementById('palette').value;
    var extra = document.getElementById('extraDetail').value.trim();

    var m = MONSTERS[mt];
    var e = ELEMENTS[el];

    var parts = [];
    parts.push(STYLES[px]);
    parts.push(SIZES[sz]);
    if (e.en) {
      parts.push(e.en + '-element ' + m.en + ', ' + m.desc + ', ' + e.fx);
    } else {
      parts.push(m.en + ', ' + m.desc);
    }
    parts.push(POSES[ps]);
    parts.push(BGS[bg]);
    parts.push(PALETTES[pl]);
    parts.push('retro JRPG monster design, front-facing battle sprite, game asset, no text, high quality pixel art');

    if (extra) {
      parts.push(extra);
    }

    currentPrompt = parts.join(', ');

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('promptText').textContent = currentPrompt;
    document.getElementById('btnCopy').textContent = '📋 コピー';
    document.getElementById('btnCopy').className = 'btn-copy';
    document.getElementById('btnFavAdd').style.display = 'block';
  }

  /* ── コピー ── */
  function copyPrompt() {
    if (!currentPrompt) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(currentPrompt).then(function() {
        showCopied();
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = currentPrompt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  }
  function showCopied() {
    var btn = document.getElementById('btnCopy');
    btn.textContent = '✅ コピーしました！';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = '📋 コピー';
      btn.className = 'btn-copy';
    }, 2000);
  }

  /* ── お気に入り (localStorage) ── */
  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(LS_KEY, JSON.stringify(favs));
  }
  function renderFavs() {
    var favs = loadFavs();
    var list = document.getElementById('favList');
    var noFav = document.getElementById('noFav');
    if (favs.length === 0) {
      list.innerHTML = '';
      noFav.style.display = 'block';
      return;
    }
    noFav.style.display = 'none';
    list.innerHTML = favs.map(function(f, i) {
      return '<li><span class="fav-text" onclick="useFav(' + i + ')" title="クリックで結果欄に表示">' + escHtml(f) + '</span>'
           + '<button class="fav-del no-print" onclick="delFav(' + i + ')">✕</button></li>';
    }).join('');
  }
  function addFav() {
    if (!currentPrompt) return;
    var favs = loadFavs();
    if (favs.indexOf(currentPrompt) !== -1) { alert('すでにお気に入りに追加済みです'); return; }
    favs.unshift(currentPrompt);
    if (favs.length > 20) favs = favs.slice(0, 20);
    saveFavs(favs);
    renderFavs();
  }
  function delFav(i) {
    var favs = loadFavs();
    favs.splice(i, 1);
    saveFavs(favs);
    renderFavs();
  }
  function useFav(i) {
    var favs = loadFavs();
    if (!favs[i]) return;
    currentPrompt = favs[i];
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('promptText').textContent = currentPrompt;
    document.getElementById('btnCopy').textContent = '📋 コピー';
    document.getElementById('btnCopy').className = 'btn-copy';
    document.getElementById('btnFavAdd').style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 初期化 ── */
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

</body>
