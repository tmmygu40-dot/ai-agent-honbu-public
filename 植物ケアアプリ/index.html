<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物ケアアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🌿 植物ケアアプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>植物を登録</h2>
      <div class="form-row">
        <input type="text" id="plantName" placeholder="植物の名前" maxlength="30">
        <input type="number" id="plantFreq" placeholder="水やり頻度（日）" min="1" max="365">
        <button id="addBtn" onclick="addPlant()">追加</button>
      </div>
    </section>

    <!-- 植物一覧 -->
    <section class="list-section">
      <h2>水やりスケジュール</h2>
      <div id="plantList" class="plant-list"></div>
      <p id="emptyMsg" class="empty-msg">植物が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
