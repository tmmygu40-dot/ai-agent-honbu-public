<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ幅計算アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* コスト構成比 row */
    .ratio-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .ratio-row .field { margin-bottom: 0; }

    /* 上昇率 row */
    .rise-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem;
    }
    .rise-row .field { margin-bottom: 0; }

    .section-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin: 0.8rem 0 0.4rem;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結論カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* サマリーグリッド */
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.75rem; margin-bottom: 0;
    }
    .summary-item {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.8rem 0.75rem; text-align: center;
    }
    .summary-item .s-label { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .summary-item .s-val   { font-size: 1.15rem; font-weight: 800; color: var(--accent); }

    /* 内訳テーブル */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>値上げ幅計算アプリ</h1>
    <p class="subtitle">原材料・人件費・光熱費の上昇分を反映した適正売価を即算出</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="currentPrice">現在の売価（円）</label>
      <input type="number" id="currentPrice" placeholder="例: 1000" min="0" step="1">
    </div>

    <p class="section-label">コスト構成比（合計が100%になるように入力）</p>
    <div class="ratio-row">
      <div class="field">
        <label for="matRatio">原材料費（%）</label>
        <input type="number" id="matRatio" placeholder="例: 40" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label for="labRatio">人件費（%）</label>
        <input type="number" id="labRatio" placeholder="例: 30" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label for="utlRatio">光熱費（%）</label>
        <input type="number" id="utlRatio" placeholder="例: 10" min="0" max="100" step="0.1">
      </div>
    </div>
    <p class="hint" style="margin-bottom:0.8rem;">※ その他コスト分は含めなくてOK。3項目の合計のみで計算します。</p>

    <p class="section-label">各コストの上昇率</p>
    <div class="rise-row">
      <div class="field">
        <label for="matRise">原材料費 上昇率（%）</label>
        <input type="number" id="matRise" placeholder="例: 15" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="labRise">人件費 上昇率（%）</label>
        <input type="number" id="labRise" placeholder="例: 5" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="utlRise">光熱費 上昇率（%）</label>
        <input type="number" id="utlRise" placeholder="例: 20" min="0" step="0.1">
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">適正売価を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">必要な値上げ幅</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- サマリーグリッド -->
  <div class="card" id="summaryCard" style="display:none">
    <p class="card-title">サマリー</p>
    <div class="summary-grid">
      <div class="summary-item"><p class="s-label">現在の売価</p><p class="s-val" id="sCurrentPrice">—</p></div>
      <div class="summary-item"><p class="s-label">適正新売価</p><p class="s-val" id="sNewPrice">—</p></div>
      <div class="summary-item"><p class="s-label">値上げ額</p><p class="s-val" id="sRiseAmt">—</p></div>
      <div class="summary-item"><p class="s-label">コスト上昇率（加重平均）</p><p class="s-val" id="sWeightedRise">—</p></div>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detailCard" style="display:none">
    <p class="card-title">コスト項目別 内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var LS_KEY = 'neage-keisan-v1';

  function $(id) { return document.getElementById(id); }

  /* localStorage 保存 */
  function save() {
    var data = {
      currentPrice: $('currentPrice').value,
      matRatio: $('matRatio').value,
      labRatio: $('labRatio').value,
      utlRatio: $('utlRatio').value,
      matRise: $('matRise').value,
      labRise: $('labRise').value,
      utlRise: $('utlRise').value
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }

  /* localStorage 読み込み */
  function load() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      $('currentPrice').value = d.currentPrice || '';
      $('matRatio').value = d.matRatio || '';
      $('labRatio').value = d.labRatio || '';
      $('utlRatio').value = d.utlRatio || '';
      $('matRise').value = d.matRise || '';
      $('labRise').value = d.labRise || '';
      $('utlRise').value = d.utlRise || '';
    } catch(e) {}
  }

  /* 入力変更時に保存 */
  ['currentPrice','matRatio','labRatio','utlRatio','matRise','labRise','utlRise'].forEach(function(id) {
    $(id).addEventListener('input', save);
  });

  /* 計算 */
  function calc() {
    var price   = parseFloat($('currentPrice').value);
    var matR    = parseFloat($('matRatio').value);
    var labR    = parseFloat($('labRatio').value);
    var utlR    = parseFloat($('utlRatio').value);
    var matRise = parseFloat($('matRise').value);
    var labRise = parseFloat($('labRise').value);
    var utlRise = parseFloat($('utlRise').value);

    if (isNaN(price) || price <= 0) { showErr('現在の売価を入力してください'); return; }
    if (isNaN(matR) || isNaN(labR) || isNaN(utlR)) { showErr('コスト構成比を全て入力してください'); return; }
    if (isNaN(matRise) || isNaN(labRise) || isNaN(utlRise)) { showErr('コスト上昇率を全て入力してください'); return; }

    /* 加重平均コスト上昇率 */
    /* weightedRise = (matR * matRise + labR * labRise + utlR * utlRise) / 100 */
    /* ただし構成比合計が0の場合はエラー */
    var totalRatio = matR + labR + utlR;
    if (totalRatio <= 0) { showErr('コスト構成比の合計が0です'); return; }

    var weightedRise = (matR * matRise + labR * labRise + utlR * utlRise) / totalRatio;
    var newPrice = price * (1 + weightedRise / 100);
    var riseAmt  = newPrice - price;
    var risePct  = weightedRise;

    /* 判定 */
    var level = risePct < 5 ? 'ok' : risePct < 15 ? 'warn' : 'ng';
    var msg   = level === 'ok'   ? '値上げ幅は小さめです。顧客への影響は限定的です'
              : level === 'warn' ? '値上げ幅が中程度です。段階的な値上げを検討してください'
              : '値上げ幅が大きいです。コスト削減や商品構成の見直しも検討してください';

    /* 結論カード */
    showResult(level, '+' + risePct.toFixed(1) + '%', msg);

    /* サマリー */
    $('sCurrentPrice').textContent = fmt(price) + ' 円';
    $('sNewPrice').textContent     = fmt(newPrice) + ' 円';
    $('sRiseAmt').textContent      = '+' + fmt(riseAmt) + ' 円';
    $('sWeightedRise').textContent = risePct.toFixed(2) + '%';
    $('summaryCard').style.display = '';

    /* 内訳テーブル */
    var matCost  = price * matR / 100;
    var labCost  = price * labR / 100;
    var utlCost  = price * utlR / 100;
    var matNew   = matCost * (1 + matRise / 100);
    var labNew   = labCost * (1 + labRise / 100);
    var utlNew   = utlCost * (1 + utlRise / 100);
    var matDiff  = matNew - matCost;
    var labDiff  = labNew - labCost;
    var utlDiff  = utlNew - utlCost;

    var rows = [
      ['', '構成比', '上昇率', 'コスト増加額'],
      ['原材料費', matR.toFixed(1) + '%', matRise.toFixed(1) + '%', '+' + fmt(matDiff) + ' 円'],
      ['人件費',   labR.toFixed(1) + '%', labRise.toFixed(1) + '%', '+' + fmt(labDiff) + ' 円'],
      ['光熱費',   utlR.toFixed(1) + '%', utlRise.toFixed(1) + '%', '+' + fmt(utlDiff) + ' 円'],
      ['合計コスト増加', '', '', '+' + fmt(matDiff + labDiff + utlDiff) + ' 円'],
      ['必要な値上げ額', '', '', '+' + fmt(riseAmt) + ' 円'],
    ];

    $('db').innerHTML = rows.map(function(r, i) {
      if (i === 0) {
        return '<tr style="font-size:0.72rem;color:var(--text-sub);">'
             + '<td>' + r[0] + '</td><td style="text-align:right">' + r[1] + '</td>'
             + '<td style="text-align:right">' + r[2] + '</td>'
             + '<td style="text-align:right">' + r[3] + '</td></tr>';
      }
      var isHl = (i === rows.length - 1);
      return '<tr' + (isHl ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td>'
           + '<td style="text-align:right">' + r[1] + '</td>'
           + '<td style="text-align:right">' + r[2] + '</td>'
           + '<td>' + r[3] + '</td></tr>';
    }).join('');
    $('detailCard').style.display = '';

    save();
  }

  function showResult(level, val, note) {
    var rc = $('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    $('rv').textContent = val;
    $('rn').textContent = note;
  }

  function showErr(msg) {
    var rc = $('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    $('rv').textContent = '⚠️';
    $('rn').textContent = msg;
    $('summaryCard').style.display = 'none';
    $('detailCard').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  /* 初期化 */
  load();
  </script>
</body>
</html>
