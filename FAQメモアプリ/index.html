<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQメモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>FAQメモ</h1>

    <div class="search-area">
      <input type="text" id="searchInput" placeholder="キーワードで検索..." oninput="renderList()">
    </div>

    <div class="form-area">
      <input type="text" id="questionInput" placeholder="質問">
      <textarea id="answerInput" placeholder="回答" rows="3"></textarea>
      <button onclick="addFAQ()">追加</button>
    </div>

    <div id="faqList" class="faq-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
