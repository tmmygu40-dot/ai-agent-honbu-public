<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販路別利益比較チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 2列グリッド ── */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }

    /* ── 販路カード ── */
    .channel-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .channel-item {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      position: relative;
    }
    .channel-item .ch-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.65rem;
    }
    .channel-item .del-btn {
      position: absolute; top: 0.65rem; right: 0.75rem;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-sub); line-height: 1;
      padding: 0.15rem 0.3rem;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .channel-item .del-btn:hover { background: var(--ng-bg); color: var(--ng); }

    .add-btn {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--accent-light); border: 1.5px dashed var(--accent);
      border-radius: 10px; padding: 0.75rem 1rem;
      cursor: pointer; font-size: 0.9rem; font-weight: 700;
      color: var(--accent); width: 100%; margin-top: 0.75rem;
      transition: background 0.1s;
    }
    .add-btn:hover { background: #ffeedd; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果テーブル ── */
    .result-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .result-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.86rem; min-width: 420px;
    }
    .result-table th {
      background: var(--bg); padding: 0.55rem 0.6rem;
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      border-bottom: 2px solid var(--border);
      text-align: right; white-space: nowrap;
    }
    .result-table th:first-child { text-align: left; }
    .result-table td {
      padding: 0.6rem 0.6rem;
      border-bottom: 1px solid var(--border);
      text-align: right; color: var(--text);
    }
    .result-table td:first-child { text-align: left; font-weight: 600; }
    .result-table tr:last-child td { border-bottom: none; }

    /* ベスト行 */
    .result-table tr.best-row { background: var(--ok-bg); }
    .result-table tr.best-row td { color: var(--ok); font-weight: 700; }
    .result-table tr.best-row td:first-child::before {
      content: "★ "; color: var(--ok);
    }

    /* マイナス */
    .neg { color: var(--ng) !important; }

    /* ── 結論カード ── */
    .winner-card {
      display: none;
      background: var(--ok-bg);
      border: 2px solid var(--ok);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      max-width: 640px; margin: 0 auto 1rem;
      text-align: center;
    }
    .winner-card .wl { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ok); margin-bottom: 0.3rem; }
    .winner-card .wn { font-size: 1.5rem; font-weight: 900; color: var(--ok); margin-bottom: 0.2rem; }
    .winner-card .ws { font-size: 0.85rem; color: var(--text-sub); }

    /* ── エラー ── */
    .err-msg {
      display: none; color: var(--ng);
      font-size: 0.82rem; font-weight: 600;
      text-align: center; padding: 0.5rem;
      max-width: 640px; margin: 0 auto 0.75rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 420px) {
      .row3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>販路別利益比較チェッカー</h1>
    <p class="subtitle">複数販路の手数料・送料を入力して手取りを即比較</p>
  </header>

  <!-- 共通設定 -->
  <div class="card">
    <p class="card-title">共通設定</p>
    <div class="row2">
      <div class="field">
        <label for="sell-price">販売価格（円）</label>
        <input type="number" id="sell-price" placeholder="例: 3000" min="0">
      </div>
      <div class="field">
        <label for="cost">仕入れ原価（円）<span style="font-weight:400;"> 任意</span></label>
        <input type="number" id="cost" placeholder="例: 1000" min="0">
        <p class="hint">空欄でもOK</p>
      </div>
    </div>
  </div>

  <!-- 販路リスト -->
  <div class="card">
    <p class="card-title">販路を追加</p>
    <div class="channel-list" id="channel-list"></div>
    <button class="add-btn" onclick="addChannel()">＋ 販路を追加する</button>
  </div>

  <!-- エラー -->
  <p class="err-msg" id="err-msg"></p>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">手取りを比較する</button>

  <!-- 最優秀販路 -->
  <div class="winner-card" id="winner-card">
    <p class="wl">最高手取り販路</p>
    <p class="wn" id="winner-name">—</p>
    <p class="ws" id="winner-detail"></p>
  </div>

  <!-- 結果テーブル -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">比較結果</p>
    <div class="result-table-wrap">
      <table class="result-table" id="result-table">
        <thead>
          <tr>
            <th>販路</th>
            <th>手取り額</th>
            <th>手数料</th>
            <th>利益率</th>
            <th id="gross-th" style="display:none">粗利</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var channelCount = 0;

  /* デフォルトの販路プリセット */
  var presets = [
    { name: 'メルカリ',    feeRate: 10, shipping: 0 },
    { name: 'ヤフオク',    feeRate: 8.8, shipping: 0 },
    { name: 'Amazon',      feeRate: 15, shipping: 0 },
    { name: 'ラクマ',      feeRate: 6, shipping: 0 },
    { name: 'BASE',        feeRate: 6.6, shipping: 0 },
    { name: '自社EC',      feeRate: 3, shipping: 0 },
  ];

  function addChannel(preset) {
    channelCount++;
    var idx = channelCount;
    var p = preset || { name: '', feeRate: '', shipping: '' };
    var item = document.createElement('div');
    item.className = 'channel-item';
    item.id = 'ch-' + idx;
    item.innerHTML =
      '<p class="ch-title">販路 ' + idx + '</p>'
    + '<button class="del-btn" onclick="removeChannel(' + idx + ')" title="削除">✕</button>'
    + '<div class="row3">'
    +   '<div class="field" style="grid-column:1/-1">'
    +     '<label>販路名</label>'
    +     '<input type="text" id="ch-name-' + idx + '" placeholder="例: メルカリ" value="' + escHtml(String(p.name)) + '">'
    +   '</div>'
    +   '<div class="field">'
    +     '<label>手数料率（%）</label>'
    +     '<input type="number" id="ch-fee-' + idx + '" placeholder="例: 10" min="0" max="100" step="0.1" value="' + (p.feeRate !== '' ? p.feeRate : '') + '">'
    +   '</div>'
    +   '<div class="field">'
    +     '<label>送料（円）</label>'
    +     '<input type="number" id="ch-ship-' + idx + '" placeholder="例: 210" min="0" value="' + (p.shipping !== '' ? p.shipping : '') + '">'
    +   '</div>'
    + '</div>';
    document.getElementById('channel-list').appendChild(item);
    save();
  }

  function removeChannel(idx) {
    var el = document.getElementById('ch-' + idx);
    if (el) el.remove();
    save();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function calc() {
    hideErr();
    var sellPrice = parseFloat(document.getElementById('sell-price').value);
    var costVal   = document.getElementById('cost').value;
    var hasCost   = costVal !== '' && !isNaN(parseFloat(costVal));
    var cost      = hasCost ? parseFloat(costVal) : null;

    if (isNaN(sellPrice) || sellPrice <= 0) {
      showErr('販売価格を入力してください');
      return;
    }

    var items = document.querySelectorAll('.channel-item');
    if (items.length === 0) {
      showErr('販路を1件以上追加してください');
      return;
    }

    var results = [];
    var valid = true;
    items.forEach(function(item) {
      var id    = item.id.replace('ch-','');
      var name  = document.getElementById('ch-name-' + id).value.trim() || ('販路' + id);
      var fee   = parseFloat(document.getElementById('ch-fee-' + id).value);
      var ship  = parseFloat(document.getElementById('ch-ship-' + id).value);

      if (isNaN(fee)) { showErr('「' + name + '」の手数料率を入力してください'); valid = false; return; }
      if (isNaN(ship)) ship = 0;

      var feeAmt = sellPrice * fee / 100;
      var take   = sellPrice - feeAmt - ship;
      var rate   = (take / sellPrice * 100);
      var gross  = hasCost ? take - cost : null;

      results.push({ name: name, feeAmt: feeAmt, ship: ship, take: take, rate: rate, gross: gross });
    });

    if (!valid) return;
    if (results.length === 0) { showErr('有効な販路がありません'); return; }

    /* ベスト（手取り最大） */
    var bestIdx = 0;
    results.forEach(function(r, i) { if (r.take > results[bestIdx].take) bestIdx = i; });

    /* 勝者カード */
    var wc = document.getElementById('winner-card');
    var best = results[bestIdx];
    document.getElementById('winner-name').textContent = best.name;
    document.getElementById('winner-detail').textContent =
      '手取り ' + fmt(best.take) + ' 円　利益率 ' + best.rate.toFixed(1) + ' %'
      + (best.gross !== null ? '　粗利 ' + fmt(best.gross) + ' 円' : '');
    wc.style.display = '';

    /* テーブル */
    var grossTh = document.getElementById('gross-th');
    grossTh.style.display = hasCost ? '' : 'none';

    var tbody = document.getElementById('result-tbody');
    tbody.innerHTML = '';
    results.forEach(function(r, i) {
      var tr = document.createElement('tr');
      if (i === bestIdx) tr.className = 'best-row';
      var grossCell = hasCost
        ? '<td class="' + (r.gross < 0 ? 'neg' : '') + '">' + fmt(r.gross) + ' 円</td>'
        : '';
      tr.innerHTML =
        '<td>' + escHtml(r.name) + '</td>'
      + '<td class="' + (r.take < 0 ? 'neg' : '') + '">' + fmt(r.take) + ' 円</td>'
      + '<td>' + fmt(r.feeAmt) + ' 円<span style="color:var(--text-sub);font-size:0.78rem;"> (' + r.rate === undefined ? '' : '' + (document.getElementById('ch-fee-' + (i+1)) ? '' : '') + '</span></td>'
      + '<td class="' + (r.rate < 0 ? 'neg' : '') + '">' + r.rate.toFixed(1) + ' %</td>'
      + grossCell;

      /* 手数料セル を正しく書く */
      tr.innerHTML =
        '<td>' + escHtml(r.name) + '</td>'
      + '<td class="' + (r.take < 0 ? 'neg' : '') + '">' + fmt(r.take) + ' 円</td>'
      + '<td>' + fmt(r.feeAmt) + ' 円</td>'
      + '<td class="' + (r.rate < 0 ? 'neg' : '') + '">' + r.rate.toFixed(1) + ' %</td>'
      + (hasCost ? '<td class="' + (r.gross < 0 ? 'neg' : '') + '">' + fmt(r.gross) + ' 円</td>' : '');

      tbody.appendChild(tr);
    });

    document.getElementById('result-card').style.display = '';
    save();
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function showErr(msg) {
    var el = document.getElementById('err-msg');
    el.textContent = '⚠️ ' + msg; el.style.display = '';
  }
  function hideErr() {
    document.getElementById('err-msg').style.display = 'none';
    document.getElementById('winner-card').style.display = 'none';
    document.getElementById('result-card').style.display = 'none';
  }

  /* ── localStorage ── */
  function save() {
    var items = document.querySelectorAll('.channel-item');
    var channels = [];
    items.forEach(function(item) {
      var id = item.id.replace('ch-','');
      channels.push({
        name:    (document.getElementById('ch-name-' + id) || {}).value || '',
        feeRate: (document.getElementById('ch-fee-'  + id) || {}).value || '',
        shipping:(document.getElementById('ch-ship-' + id) || {}).value || '',
      });
    });
    var data = {
      sellPrice: document.getElementById('sell-price').value,
      cost:      document.getElementById('cost').value,
      channels:  channels,
    };
    try { localStorage.setItem('hanro_checker', JSON.stringify(data)); } catch(e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem('hanro_checker');
      if (!raw) { loadDefaults(); return; }
      var data = JSON.parse(raw);
      document.getElementById('sell-price').value = data.sellPrice || '';
      document.getElementById('cost').value = data.cost || '';
      (data.channels || []).forEach(function(ch) { addChannel(ch); });
      if ((data.channels || []).length === 0) loadDefaults();
    } catch(e) { loadDefaults(); }
  }

  function loadDefaults() {
    presets.slice(0, 3).forEach(function(p) { addChannel(p); });
  }

  /* 入力変更時に自動保存 */
  document.addEventListener('input', function(e) {
    if (e.target.closest('#channel-list') || e.target.id === 'sell-price' || e.target.id === 'cost') {
      save();
    }
  });

  load();
  </script>
</body>
</html>
