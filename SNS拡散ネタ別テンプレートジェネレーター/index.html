<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS拡散ネタ別テンプレートジェネレーター｜バズるX投稿を一発生成</title>
  <meta name="description" content="ネタ切れの夜に。カテゴリとキーワードを入れるだけで、共感系・自虐系・お役立ち系などバズりやすいX投稿テンプレを3案サッと生成できる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-sub {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* テンプレ表示カード */
    .tpl-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 0.95rem;
      margin-bottom: 0.8rem;
      background: var(--accent-light);
    }
    .tpl-item:last-child { margin-bottom: 0; }
    .tpl-text {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.7rem;
    }
    .tpl-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: var(--text-sub);
    }
    .btn-copy {
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { background: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-sub, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .tpl-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📣 SNS拡散ネタ別テンプレートジェネレーター</h1>
    <p class="subtitle">ネタ切れの夜に。カテゴリ＋キーワードでバズりやすいX投稿を3案サッと生成。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="category">ネタのカテゴリ</label>
      <select id="category">
        <option value="empathy">共感系（あるある・気持ちの代弁）</option>
        <option value="selfdis">自虐系（笑える失敗・ダメな自分）</option>
        <option value="useful">お役立ち系（豆知識・コツ）</option>
        <option value="emo">エモ系（しみる・余韻）</option>
        <option value="strong">煽り強め系（断言・刺し系）</option>
        <option value="question">質問系（リプ誘発）</option>
      </select>
    </div>
    <div class="field">
      <label for="keyword">キーワード（任意）</label>
      <input type="text" id="keyword" placeholder="例: 在宅ワーク／推し活／節約／月曜日">
      <p class="hint">空欄でもOK。入れると本文に反映されます。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">テンプレを生成する</button>

  <!-- 結果カード -->
  <div class="card" id="resultCard" style="display:none">
    <p class="card-title">生成された投稿テンプレ（3案）</p>
    <div id="tplList"></div>
  </div>

  <button class="btn-sub" id="btnReroll" onclick="generate()" style="display:none">🔄 別案を出す</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 投稿前に文面の最終確認をお願いします。誇張・誤情報・誰かを傷つける表現になっていないかチェックしてから投稿しましょう。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── テンプレ集（{kw} はキーワードに置換、空ならフォールバック語に置換） ──
  var TEMPLATES = {
    empathy: [
      "{kw}してる人にしか分からない3秒。\n  ・あの瞬間\n  ・あの間\n  ・あの空気\nわかる人だけわかってくれ。",
      "{kw}、向いてる人と向いてない人の差って\n才能じゃなくて、しんどさを言語化できるかどうかだと思う。",
      "{kw}って結局、得意な人より\n「自分のペース崩さない人」が一番強い説。",
      "{kw}してると、急に「自分だけ置いてかれてる感」くる夜ない？\nない？　俺だけ？　いや、絶対みんなあるだろ。",
      "{kw}、慣れた頃にやってくる小さな違和感、\nだいたい当たってるから無視しない方がいい。"
    ],
    selfdis: [
      "{kw}の話、\n張り切ってメモ取った最初の3日 → 完璧\nその後の半年 → 行方不明\nなんで人間こうなんだ。",
      "「{kw}、ちゃんとやってます」って顔で\nブラウザ開いただけで満足してる自分に\n2025年の俺は気づいた。",
      "{kw}が続かない原因、\n意志でも環境でもなく、\n「やる前に動画1本見ちゃう」癖だった。",
      "{kw}できる人と俺の違い、\nたぶん才能じゃなくて\n「とりあえず始める」を発動できるかどうか。",
      "{kw}、3日坊主どころか\n買って満足する勢の頂点に立ち続けて何年経った？"
    ],
    useful: [
      "{kw}でラクするコツ3つ📝\n①完璧を捨てる\n②時間を区切る\n③人と比べない\n地味だけど、これ本当に効く。",
      "{kw}のコツ、誰も言わないけど\n「最初の5分」をどれだけ軽くできるかで\n全部決まる。",
      "{kw}を頑張る前に確認することリスト🗒\n・本当に今日やる必要ある？\n・他人の真似してない？\n・休憩入れてる？\nこれだけで空回り減る。",
      "{kw}、結果より「振り返り」に時間使う人ほど伸びる。\n反省じゃなくて、何が効いた？を1行メモするだけ。",
      "{kw}を続ける裏技：\n「やらない日も記録する」\n意外とこれが続く理由になる。"
    ],
    emo: [
      "{kw}してたあの頃の自分に\n「大丈夫、ちゃんと今ここまで来てる」\nって伝えてあげたい夜。",
      "{kw}って、続けてる時は分からないけど\n振り返ると、\n全部ちゃんと意味があった気がする。",
      "{kw}を選んだ自分も、選ばなかった自分も、\nどっちも誰かの「いつかの自分」になってる。",
      "{kw}してる時の真夜中の静けさ、\nしんどいけど、\nあの時間にしか見えない景色がある。",
      "「{kw}、もう向いてないかも」\nって思った日の自分が、\n結局いま一番自分を支えてる。"
    ],
    strong: [
      "{kw}で結果出したいなら、\n才能じゃなく「続けた量」だけ見ろ。\n言い訳の半分は、続けてないだけ。",
      "{kw}、迷ってる時間が一番もったいない。\n動いてから考えろ。考えながら動け。",
      "{kw}を「いつかやる」って言ってる人、\n10年後も同じこと言ってる説、\nマジで割と当たる。",
      "{kw}を諦めるのは自由。\nでも「忙しくて」って言うのはやめよう。\n本当の理由は別にある。",
      "{kw}が続かない人へ。\nやる気の問題じゃない。\n「環境」と「仕組み」を変えろ。"
    ],
    question: [
      "{kw}、みんなどうやってモチベ保ってる？\nガチで知りたい。教えてくれ🙏",
      "{kw}を始めて変わったこと、\n1個だけ教えて。\nリプで参考にさせてください。",
      "{kw}でこれだけはやめとけ、\nって失敗談ある人いますか？\n後輩に伝えたいのでぜひ。",
      "{kw}を続けるコツ、\n世間で言われてるのと\n実際に効いたやつ、違ったりしません？",
      "{kw}って、最初の何ヶ月で\n手応え出始めた？\n体感ベースで聞きたい。"
    ]
  };

  var FALLBACK_WORD = {
    empathy: "それ", selfdis: "あの作業", useful: "毎日のルーティン",
    emo: "頑張ってた日々", strong: "目の前のこと", question: "それ"
  };

  // 配列をシャッフルして上位N件返す
  function pick(arr, n) {
    var copy = arr.slice();
    for (var i = copy.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = copy[i]; copy[i] = copy[j]; copy[j] = t;
    }
    return copy.slice(0, n);
  }

  function generate() {
    var cat = document.getElementById('category').value;
    var kw  = document.getElementById('keyword').value.trim();
    var word = kw === '' ? FALLBACK_WORD[cat] : kw;

    var bank = TEMPLATES[cat] || [];
    var picked = pick(bank, 3);

    var listEl = document.getElementById('tplList');
    listEl.innerHTML = '';
    picked.forEach(function(tpl, idx) {
      var text = tpl.replace(/\{kw\}/g, word);
      var item = document.createElement('div');
      item.className = 'tpl-item';
      var pre = document.createElement('div');
      pre.className = 'tpl-text';
      pre.textContent = text;
      var meta = document.createElement('div');
      meta.className = 'tpl-meta';
      var info = document.createElement('span');
      info.textContent = '案 ' + (idx + 1) + '／' + text.length + '字';
      var btn = document.createElement('button');
      btn.className = 'btn-copy';
      btn.type = 'button';
      btn.textContent = 'コピー';
      btn.addEventListener('click', function() { copyText(text, btn); });
      meta.appendChild(info);
      meta.appendChild(btn);
      item.appendChild(pre);
      item.appendChild(meta);
      listEl.appendChild(item);
    });
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('btnReroll').style.display = 'block';

    // 入力を保存
    try {
      localStorage.setItem('sns_tpl_last', JSON.stringify({ cat: cat, kw: kw }));
    } catch (e) {}
  }

  function copyText(text, btn) {
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = '✓ コピー済';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.textContent = 'コピー';
      }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function() { fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  // 初期化：保存済み入力を復元
  (function init() {
    try {
      var raw = localStorage.getItem('sns_tpl_last');
      if (!raw) return;
      var obj = JSON.parse(raw);
      if (obj && obj.cat) document.getElementById('category').value = obj.cat;
      if (obj && typeof obj.kw === 'string') document.getElementById('keyword').value = obj.kw;
    } catch (e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
