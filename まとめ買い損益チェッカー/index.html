<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まとめ買い損益チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>まとめ買い損益チェッカー</h1>
    <p class="subtitle">割引メリットと保管コストを比較して、まとめ買いの損得を即判断</p>

    <section class="card">
      <h2>商品情報</h2>
      <div class="form-group">
        <label for="unitPrice">通常単価（円）</label>
        <input type="number" id="unitPrice" placeholder="例：500" min="0">
      </div>
      <div class="form-group">
        <label for="discountRate">割引率（%）</label>
        <input type="number" id="discountRate" placeholder="例：10" min="0" max="100">
      </div>
      <div class="form-group">
        <label for="lotSize">まとめ買い個数</label>
        <input type="number" id="lotSize" placeholder="例：12" min="1">
      </div>
      <div class="form-group">
        <label for="normalBuy">通常購入個数（1回あたり）</label>
        <input type="number" id="normalBuy" placeholder="例：1" min="1">
      </div>
    </section>

    <section class="card">
      <h2>保管コスト</h2>
      <div class="form-group">
        <label for="storageCost">保管コスト（円/月）<span class="hint">スペース代・維持費など</span></label>
        <input type="number" id="storageCost" placeholder="例：200" min="0">
      </div>
      <div class="form-group">
        <label for="storageMonths">使い切るまでの月数</label>
        <input type="number" id="storageMonths" placeholder="例：3" min="1">
      </div>
    </section>

    <button class="btn-calc" id="calcBtn">判定する</button>

    <section class="result-card hidden" id="result">
      <div class="verdict" id="verdict"></div>
      <table class="result-table">
        <tbody>
          <tr>
            <td>まとめ買い価格</td>
            <td id="resBulkPrice">-</td>
          </tr>
          <tr>
            <td>通常購入での合計</td>
            <td id="resNormalPrice">-</td>
          </tr>
          <tr class="highlight">
            <td>割引による節約額</td>
            <td id="resSaving">-</td>
          </tr>
          <tr>
            <td>保管コスト合計</td>
            <td id="resStorageTotal">-</td>
          </tr>
          <tr class="highlight-net" id="netRow">
            <td>差し引き損益</td>
            <td id="resNet">-</td>
          </tr>
        </tbody>
      </table>
      <p class="note" id="resultNote"></p>
    </section>

    <section class="history-section" id="historySection" style="display:none">
      <h2>過去の計算履歴</h2>
      <ul class="history-list" id="historyList"></ul>
      <button class="btn-clear" id="clearBtn">履歴を削除</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
