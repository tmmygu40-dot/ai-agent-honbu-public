<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>節約献立メーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 食材タグ ── */
    .ingredient-group { margin-bottom: 1rem; }
    .ingredient-group:last-child { margin-bottom: 0; }
    .group-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.4rem; display: block;
    }
    .tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .tag {
      padding: 0.35rem 0.8rem;
      font-size: 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tag.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .tag:hover:not(.selected) { border-color: var(--accent); background: var(--accent-light); }

    /* ── テキスト入力 ── */
    .input-row {
      display: flex; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .input-row input {
      flex: 1; padding: 0.65rem 0.9rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: var(--accent); background: #fff; }
    .btn-add {
      padding: 0.65rem 1rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      white-space: nowrap;
    }

    /* ── 選択中表示 ── */
    .selected-area {
      min-height: 2.5rem;
      padding: 0.6rem 0.8rem;
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      align-items: center;
    }
    .selected-area .empty-msg {
      font-size: 0.82rem; color: var(--text-sub);
    }
    .sel-tag {
      padding: 0.25rem 0.65rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border-radius: 999px;
      display: flex; align-items: center; gap: 0.3rem;
      cursor: pointer;
    }
    .sel-tag .remove { font-size: 0.75rem; opacity: 0.8; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.6rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-clear {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.6rem;
      font-size: 0.88rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer;
    }

    /* ── 献立カード ── */
    .menu-result {
      display: none; max-width: 600px; margin: 0 auto 1rem;
    }
    .menu-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .menu-card-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .menu-num {
      width: 1.8rem; height: 1.8rem;
      background: var(--accent); color: #fff;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem; font-weight: 900;
      flex-shrink: 0;
    }
    .menu-name { font-size: 1.05rem; font-weight: 800; }
    .menu-match {
      font-size: 0.75rem; color: var(--ok); font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .menu-ingredients-row {
      display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.7rem;
    }
    .ing-tag-match {
      padding: 0.2rem 0.55rem; font-size: 0.78rem;
      background: var(--ok-bg); border: 1px solid var(--ok);
      color: var(--ok); border-radius: 999px; font-weight: 600;
    }
    .ing-tag-extra {
      padding: 0.2rem 0.55rem; font-size: 0.78rem;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-sub); border-radius: 999px;
    }
    .menu-recipe {
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.65;
      padding-top: 0.7rem; border-top: 1px solid var(--border);
    }
    .menu-recipe strong { color: var(--text); }

    /* ── 件数なし ── */
    .no-result {
      display: none; text-align: center; padding: 2rem 1rem;
      color: var(--text-sub); font-size: 0.9rem;
      max-width: 600px; margin: 0 auto;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🥘 節約献立メーカー</h1>
    <p class="subtitle">冷蔵庫の残り食材を選ぶだけで今日の献立を提案</p>
  </header>

  <!-- 食材選択 -->
  <div class="card">
    <p class="card-title">食材を選ぶ</p>

    <div class="ingredient-group">
      <span class="group-label">肉・魚</span>
      <div class="tags" id="tags-meat">
        <span class="tag" data-ing="鶏肉">鶏肉</span>
        <span class="tag" data-ing="豚肉">豚肉</span>
        <span class="tag" data-ing="牛肉">牛肉</span>
        <span class="tag" data-ing="ひき肉">ひき肉</span>
        <span class="tag" data-ing="卵">卵</span>
        <span class="tag" data-ing="ちくわ">ちくわ</span>
        <span class="tag" data-ing="ツナ缶">ツナ缶</span>
        <span class="tag" data-ing="鮭">鮭</span>
        <span class="tag" data-ing="サバ缶">サバ缶</span>
        <span class="tag" data-ing="豆腐">豆腐</span>
        <span class="tag" data-ing="納豆">納豆</span>
      </div>
    </div>

    <div class="ingredient-group">
      <span class="group-label">野菜</span>
      <div class="tags" id="tags-veg">
        <span class="tag" data-ing="玉ねぎ">玉ねぎ</span>
        <span class="tag" data-ing="じゃがいも">じゃがいも</span>
        <span class="tag" data-ing="にんじん">にんじん</span>
        <span class="tag" data-ing="キャベツ">キャベツ</span>
        <span class="tag" data-ing="もやし">もやし</span>
        <span class="tag" data-ing="白菜">白菜</span>
        <span class="tag" data-ing="ほうれん草">ほうれん草</span>
        <span class="tag" data-ing="長ねぎ">長ねぎ</span>
        <span class="tag" data-ing="なす">なす</span>
        <span class="tag" data-ing="ピーマン">ピーマン</span>
        <span class="tag" data-ing="トマト">トマト</span>
        <span class="tag" data-ing="大根">大根</span>
        <span class="tag" data-ing="ブロッコリー">ブロッコリー</span>
        <span class="tag" data-ing="きのこ">きのこ</span>
        <span class="tag" data-ing="ごぼう">ごぼう</span>
        <span class="tag" data-ing="こんにゃく">こんにゃく</span>
      </div>
    </div>

    <div class="ingredient-group">
      <span class="group-label">炭水化物・その他</span>
      <div class="tags" id="tags-carb">
        <span class="tag" data-ing="ご飯">ご飯</span>
        <span class="tag" data-ing="麺">麺</span>
        <span class="tag" data-ing="豆">豆</span>
        <span class="tag" data-ing="チーズ">チーズ</span>
        <span class="tag" data-ing="牛乳">牛乳</span>
      </div>
    </div>
  </div>

  <!-- フリー入力 -->
  <div class="card">
    <p class="card-title">食材を追加する</p>
    <div class="input-row">
      <input type="text" id="custom-input" placeholder="例：しめじ、豚バラ…" maxlength="20">
      <button class="btn-add" onclick="addCustom()">追加</button>
    </div>
    <p style="font-size:0.75rem;color:var(--text-sub);">Enterキーでも追加できます</p>
  </div>

  <!-- 選択中の食材 -->
  <div class="card">
    <p class="card-title">選択中の食材</p>
    <div class="selected-area" id="selected-area">
      <span class="empty-msg">食材を選んでください</span>
    </div>
  </div>

  <!-- ボタン -->
  <button class="btn-calc" onclick="suggest()">🍽️ 献立を提案する</button>
  <button class="btn-clear" onclick="clearAll()">すべてクリア</button>

  <!-- 結果 -->
  <div class="menu-result" id="menu-result"></div>
  <div class="no-result" id="no-result">
    <p style="font-size:2rem;margin-bottom:0.5rem;">🤔</p>
    <p>該当する献立が見つかりませんでした。</p>
    <p>食材をもう少し追加してみてください。</p>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script src="../fav-widget.js"></script>

  <script>
  // ── 料理データベース ──
  var RECIPES = [
    { name: '親子丼', main: ['鶏肉','卵'], extra: ['玉ねぎ','ご飯','長ねぎ'],
      recipe: '<strong>①</strong> 鶏肉を一口大に切る。<strong>②</strong> だし＋醤油＋みりんで煮る。<strong>③</strong> 玉ねぎを加えて火を通し、溶き卵でとじる。<strong>④</strong> ご飯の上にかける。' },
    { name: '肉じゃが', main: ['じゃがいも'], extra: ['牛肉','豚肉','玉ねぎ','にんじん','こんにゃく'],
      recipe: '<strong>①</strong> じゃがいもを乱切りにする。<strong>②</strong> 油で肉・玉ねぎを炒める。<strong>③</strong> だし・醤油・砂糖・みりんで全体を煮込む。<strong>④</strong> じゃがいもが柔らかくなったら完成。' },
    { name: '豚の生姜焼き', main: ['豚肉'], extra: ['玉ねぎ','キャベツ'],
      recipe: '<strong>①</strong> 醤油・みりん・酒・生姜をあわせてたれを作る。<strong>②</strong> 豚肉にたれをからめて炒める。<strong>③</strong> キャベツの千切りを添える。' },
    { name: '回鍋肉（ホイコーロー）', main: ['豚肉','キャベツ'], extra: ['ピーマン','長ねぎ'],
      recipe: '<strong>①</strong> 豚肉とキャベツを一口大に切る。<strong>②</strong> 油で豚肉を炒め、キャベツ・ピーマンを加える。<strong>③</strong> 甜麺醤・豆板醤・醤油・酒で味付けして炒め合わせる。' },
    { name: '鶏のから揚げ', main: ['鶏肉'], extra: ['大根','キャベツ'],
      recipe: '<strong>①</strong> 鶏肉を一口大に切り、醤油・みりん・ニンニク・生姜で下味をつける。<strong>②</strong> 片栗粉をまぶして揚げる（もしくは多めの油で揚げ焼き）。' },
    { name: '麻婆豆腐', main: ['豆腐','ひき肉'], extra: ['長ねぎ','豆'],
      recipe: '<strong>①</strong> 豆腐を一口大に切る。<strong>②</strong> ひき肉・豆板醤を炒め、スープを加える。<strong>③</strong> 豆腐を入れて煮たら、醤油・砂糖で調味し水溶き片栗粉でとろみをつける。' },
    { name: 'チキンカレー', main: ['鶏肉','じゃがいも'], extra: ['玉ねぎ','にんじん','ご飯'],
      recipe: '<strong>①</strong> 野菜・鶏肉を切って炒める。<strong>②</strong> 水を加えて煮込む。<strong>③</strong> カレールーを溶かして10分煮る。<strong>④</strong> ご飯に盛る。' },
    { name: '豚汁', main: ['豚肉','大根'], extra: ['じゃがいも','にんじん','こんにゃく','ごぼう','長ねぎ','豆腐'],
      recipe: '<strong>①</strong> 野菜・こんにゃくを切る。<strong>②</strong> ごま油で豚肉・野菜を炒める。<strong>③</strong> だし汁を加えて煮込む。<strong>④</strong> 味噌を溶かして完成。' },
    { name: 'ナポリタン', main: ['麺'], extra: ['玉ねぎ','ピーマン','トマト','ウインナー'],
      recipe: '<strong>①</strong> スパゲティを茹でる。<strong>②</strong> 玉ねぎ・ピーマン・ウインナーを炒める。<strong>③</strong> ケチャップ・ウスターソースで炒め合わせる。<strong>④</strong> スパゲティを和える。' },
    { name: '野菜炒め', main: ['もやし'], extra: ['豚肉','キャベツ','にんじん','ピーマン','長ねぎ'],
      recipe: '<strong>①</strong> 野菜を食べやすく切る。<strong>②</strong> 豚肉を炒め、野菜を加えて強火でさっと炒める。<strong>③</strong> 塩・醤油・ごま油で味付けする。' },
    { name: 'オムレツ', main: ['卵'], extra: ['玉ねぎ','ピーマン','チーズ','牛乳'],
      recipe: '<strong>①</strong> 卵を溶き、牛乳・塩コショウを加える。<strong>②</strong> バターをフライパンで熱し卵液を流し込む。<strong>③</strong> 半熟になったら具材を乗せて包む。' },
    { name: '炒り豆腐', main: ['豆腐'], extra: ['ひき肉','にんじん','卵','長ねぎ','きのこ'],

    { name: 'ポテトサラダ', main: ['じゃがいも'], extra: ['にんじん','卵','玉ねぎ'],

    { name: '納豆ご飯', main: ['納豆','ご飯'], extra: ['卵','長ねぎ'],
      recipe: '<strong>①</strong> 納豆に付属のたれ・からしを混ぜる。<strong>②</strong> 長ねぎや卵黄を加えてもよい。<strong>③</strong> ご飯の上にのせる。' },
    { name: 'チャーハン', main: ['ご飯'], extra: ['卵','長ねぎ','ちくわ','豚肉'],
      recipe: '<strong>①</strong> 油を熱し、溶き卵を炒める。<strong>②</strong> ご飯を加えてほぐしながら炒める。<strong>③</strong> 具材を加え、醤油・塩コショウで味を調える。' },
    { name: 'もやし炒め', main: ['もやし'], extra: ['卵','ちくわ','キャベツ'],
      recipe: '<strong>①</strong> フライパンに油を熱す。<strong>②</strong> もやしを強火でさっと炒める。<strong>③</strong> 塩コショウ・醤油・ごま油で味付けする。' },
    { name: '鶏と野菜のスープ', main: ['鶏肉','白菜'], extra: ['にんじん','きのこ','豆腐','長ねぎ'],
      recipe: '<strong>①</strong> 鶏肉と野菜を一口大に切る。<strong>②</strong> 水・コンソメ（または鶏ガラスープ）で煮込む。<strong>③</strong> 塩コショウで味を調える。' },
    { name: 'ハンバーグ', main: ['ひき肉'], extra: ['玉ねぎ','トマト'],
      recipe: '<strong>①</strong> ひき肉・みじん切り玉ねぎ・卵・パン粉・塩コショウをこねる。<strong>②</strong> 成形して焼く（両面焼いたら蓋をして蒸らす）。<strong>③</strong> ソースをかけて完成。' },
    { name: 'なすの味噌炒め', main: ['なす'], extra: ['豚肉','ピーマン','長ねぎ'],
      recipe: '<strong>①</strong> なすを乱切りにして水にさらす。<strong>②</strong> 豚肉と一緒に油で炒める。<strong>③</strong> 味噌・みりん・砂糖を合わせたたれで炒め合わせる。' },
    { name: 'ほうれん草のお浸し', main: ['ほうれん草'], extra: ['きのこ'],
      recipe: '<strong>①</strong> ほうれん草を塩茹でする（2分程度）。<strong>②</strong> 水気を絞って食べやすく切る。<strong>③</strong> だし醤油・ごまで和える。' },

  // ── 選択状態 ──
  var selected = new Set();

  // ── localStorage から復元 ──
  function loadFromStorage() {
    try {
      var saved = localStorage.getItem('kondate_selected');
      if (saved) {
        var arr = JSON.parse(saved);
        arr.forEach(function(ing) { selected.add(ing); });
        updateUI();
      }
    } catch(e) {}
  }

  function saveToStorage() {
    try {
      localStorage.setItem('kondate_selected', JSON.stringify(Array.from(selected)));
    } catch(e) {}
  }

  // ── タグの初期化 ──
  function initTags() {
    document.querySelectorAll('.tag').forEach(function(tag) {
      tag.addEventListener('click', function() {
        var ing = this.getAttribute('data-ing');
        if (selected.has(ing)) {
          selected.delete(ing);
        } else {
          selected.add(ing);
        }
        updateUI();
        saveToStorage();
      });
    });
  }

  // ── カスタム食材追加 ──
  function addCustom() {
    var input = document.getElementById('custom-input');
    var val = input.value.trim();
    if (!val) return;
    selected.add(val);
    input.value = '';
    updateUI();
    saveToStorage();
  }

  document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('custom-input');
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addCustom();
    });
    initTags();
    loadFromStorage();
  });

  // ── UI更新 ──
  function updateUI() {
    // タグの見た目
    document.querySelectorAll('.tag').forEach(function(tag) {
      var ing = tag.getAttribute('data-ing');
      tag.classList.toggle('selected', selected.has(ing));
    });
    // 選択中エリア
    var area = document.getElementById('selected-area');
    if (selected.size === 0) {
      area.innerHTML = '<span class="empty-msg">食材を選んでください</span>';
    } else {
      area.innerHTML = Array.from(selected).map(function(ing) {
        return '<span class="sel-tag" onclick="removeIng(\'' + escapeQ(ing) + '\')">' + escHtml(ing) + ' <span class="remove">✕</span></span>';
      }).join('');
    }
  }

  function removeIng(ing) {
    selected.delete(ing);
    updateUI();
    saveToStorage();
  }

  function clearAll() {
    selected.clear();
    updateUI();
    saveToStorage();
    document.getElementById('menu-result').style.display = 'none';
    document.getElementById('no-result').style.display = 'none';
  }

  // ── 献立提案 ──
  function suggest() {
    if (selected.size === 0) {
      alert('食材を1つ以上選んでください');
      return;
    }

    var selArr = Array.from(selected);

    // マッチスコア計算
    var scored = RECIPES.map(function(r) {
      var mainMatches = r.main.filter(function(m) { return selArr.some(function(s) { return s === m; }); });
      var extraMatches = r.extra.filter(function(e) { return selArr.some(function(s) { return s === e; }); });
      var score = mainMatches.length * 10 + extraMatches.length;
      return { recipe: r, mainMatches: mainMatches, extraMatches: extraMatches, score: score };
    });

    // 主食材が1つ以上マッチするものだけ抽出
    var matched = scored.filter(function(s) { return s.mainMatches.length > 0; });
    matched.sort(function(a, b) { return b.score - a.score; });

    var top = matched.slice(0, 3);

    var resultDiv = document.getElementById('menu-result');
    var noResult = document.getElementById('no-result');

    if (top.length === 0) {
      resultDiv.style.display = 'none';
      noResult.style.display = 'block';
      return;
    }

    noResult.style.display = 'none';
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = top.map(function(item, idx) {
      var r = item.recipe;
      var allIngredients = r.main.concat(r.extra);
      var ingHtml = allIngredients.map(function(ing) {
        var isMatch = selArr.some(function(s) { return s === ing; });
        if (isMatch) {
          return '<span class="ing-tag-match">' + escHtml(ing) + '</span>';
        } else {
          return '<span class="ing-tag-extra">' + escHtml(ing) + '</span>';
        }
      }).join('');

      var matchPct = Math.round((item.mainMatches.length + item.extraMatches.length) / Math.max(allIngredients.length, 1) * 100);

      return '<div class="menu-card">'
        + '<div class="menu-card-header">'
        + '<span class="menu-num">' + (idx+1) + '</span>'
        + '<span class="menu-name">' + escHtml(r.name) + '</span>'
        + '</div>'
        + '<p class="menu-match">手持ち食材の活用率 ' + matchPct + '%</p>'
        + '<div class="menu-ingredients-row">' + ingHtml + '</div>'
        + '<div class="menu-recipe">' + r.recipe + '</div>'
        + '</div>';
    }).join('');

    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── ユーティリティ ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escapeQ(str) {
    return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }
