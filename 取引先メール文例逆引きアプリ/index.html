<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取引先メール文例逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── シーン選択ボタン群 ── */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }
    .scene-btn {
      padding: 0.75rem 0.5rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .scene-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .scene-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 文例カード ── */
    .template-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.85rem;
    }
    .template-card:last-child { margin-bottom: 0; }
    .tpl-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--text-sub); margin-bottom: 0.5rem;
    }
    .tpl-body {
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
      background: var(--bg); border-radius: 8px;
      padding: 0.75rem 0.8rem; margin-bottom: 0.6rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.4rem 1rem;
      font-size: 0.8rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 最近使った文例 ── */
    .recent-item {
      padding: 0.55rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub);
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-recent-copy {
      flex-shrink: 0; padding: 0.3rem 0.7rem;
      font-size: 0.75rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 7px;
      cursor: pointer;
    }
    .btn-recent-copy:hover { border-color: var(--accent); color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-pdf, .back-link, #fav-widget, .no-print, .btn-copy, .btn-recent-copy { display: none !important; }
      .card, .template-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  </header>

    <div id="tpl-list"></div>
  </div>

  <!-- 最近使った文例 -->
  <div class="card" id="recent-card" style="display:none">

    <div id="recent-list"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

    var grid = document.getElementById('scene-grid');
    grid.innerHTML = scenes.map(function(s) {
      return '<button class="scene-btn" onclick="selectScene(\'' + s + '\')">' + s + '</button>';
    }).join('');
  }

  function selectScene(scene) {
    // アクティブ切り替え
    document.querySelectorAll('.scene-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent === scene);
    });

    var templates = DATA[scene];
    var list = document.getElementById('tpl-list');
    list.innerHTML = templates.map(function(tpl, i) {
      var id = 'tpl-' + scene + '-' + i;
      return '<div class="template-card">'
        + '<p class="tpl-title">' + escHtml(tpl.title) + '</p>'
        + '<pre class="tpl-body" id="' + id + '">' + escHtml(tpl.body) + '</pre>'
        + '<button class="btn-copy" onclick="copyText(\'' + id + '\', \'' + escAttr(tpl.title) + '\', this)">'
        + 'コピー</button>'
        + '</div>';
    }).join('');

    document.getElementById('tpl-card-title').textContent = scene + ' — 文例';
    document.getElementById('tpl-card').style.display = '';
  }

  function copyText(id, title, btn) {
    var el = document.getElementById(id);
    var text = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
        saveRecent(title, text);
      }).catch(function() { fallbackCopy(text, btn, title); });
    } else {
      fallbackCopy(text, btn, title);
    }
  }

  function fallbackCopy(text, btn, title) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(btn); saveRecent(title, text); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied(btn) {
    btn.textContent = 'コピー完了!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 1500);
  }

  function saveRecent(title, text) {
    var list = loadRecent();
    list = list.filter(function(r) { return r.title !== title; });
    list.unshift({ title: title, text: text });
    if (list.length > MAX_RECENT) list = list.slice(0, MAX_RECENT);
    localStorage.setItem(RECENT_KEY, JSON.stringify(list));
    renderRecent();
  }

  function loadRecent() {
    try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch(e) { return []; }
  }

  function renderRecent() {
    var list = loadRecent();
    var card = document.getElementById('recent-card');
    if (!list.length) { card.style.display = 'none'; return; }
    card.style.display = '';
    document.getElementById('recent-list').innerHTML = list.map(function(r, i) {
      return '<div class="recent-item">'
        + '<span class="recent-label">' + escHtml(r.title) + '</span>'
        + '<button class="btn-recent-copy" onclick="copyRecent(' + i + ', this)">コピー</button>'
        + '</div>';
    }).join('');
  }

  function copyRecent(i, btn) {
    var list = loadRecent();
    if (!list[i]) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(list[i].text).then(function() { showCopied(btn); })
        .catch(function() { fallbackCopy(list[i].text, btn, list[i].title); });
    } else {
      fallbackCopy(list[i].text, btn, list[i].title);
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/'/g, '\\\'');
  }

  renderScenes();
  renderRecent();
  </script>
