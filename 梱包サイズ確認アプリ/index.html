<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梱包サイズ確認アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>📦 梱包サイズ確認</h1>
    <p class="subtitle">3辺と重量を入力してサイズ区分と料金目安を確認</p>

    <section class="input-section">
      <div class="input-row">
        <div class="input-group">
          <label for="width">縦 (cm)</label>
          <input type="number" id="width" min="1" max="300" placeholder="例: 30" step="0.1">
        </div>
        <div class="input-group">
          <label for="height">横 (cm)</label>
          <input type="number" id="height" min="1" max="300" placeholder="例: 25" step="0.1">
        </div>
        <div class="input-group">
          <label for="depth">高さ (cm)</label>
          <input type="number" id="depth" min="1" max="300" placeholder="例: 15" step="0.1">
        </div>
        <div class="input-group">
          <label for="weight">重量 (kg)</label>
          <input type="number" id="weight" min="0.1" max="30" placeholder="例: 2.5" step="0.1">
        </div>
      </div>
      <div class="button-row">
        <button id="calcBtn" class="btn-primary">判定する</button>
        <button id="clearBtn" class="btn-secondary">クリア</button>
      </div>
    </section>

    <section class="result-section" id="resultSection" style="display:none;">
      <div class="result-card" id="resultCard">
        <div class="size-badge" id="sizeBadge"></div>
        <div class="size-detail" id="sizeDetail"></div>
        <div class="price-label">料金目安（ヤマト運輸・関東発 目安）</div>
        <div class="price-table" id="priceTable"></div>
        <p class="note">※料金は目安です。実際の料金は各配送会社のサイトでご確認ください。</p>
      </div>
    </section>

    <section class="size-chart">
      <h2>サイズ区分表</h2>
      <table>
        <thead>
          <tr>
            <th>サイズ</th>
            <th>3辺合計</th>
            <th>重量上限</th>
            <th>料金目安</th>
          </tr>
        </thead>
        <tbody id="chartBody"></tbody>
      </table>
    </section>
  </div>
  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
