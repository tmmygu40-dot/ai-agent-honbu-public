<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="愛車の車種・色・形状・背景を選ぶだけで、8bitSFレトロゲーム風ドット絵AIプロンプトをワンタップで生成・コピーできるツールです。">
  <title>愛車プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }

    /* ── プロンプト表示エリア ── */
    .prompt-output {
      background: #1a1a2e;
      color: #00ff88;
      font-family: "Courier New", Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 1rem;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 0.8rem;
      min-height: 60px;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: #1a1a2e; color: #00ff88;
      border: 2px solid #00ff88; border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: #00ff88; color: #1a1a2e; }
    .btn-copy.copied { background: #00ff88; color: #1a1a2e; }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: color 0.15s;
    }
    .history-item:hover { color: var(--accent); }
    .history-item:last-child { border-bottom: none; }
    .history-meta { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🚗 愛車プロンプトメーカー</h1>
    <p class="subtitle">愛車の特徴を選ぶだけで、8bitSF風ドット絵プロンプトをサクッと生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">愛車の情報を入力</p>
    <div class="field">
      <label for="carType">車のタイプ</label>
      <select id="carType">
        <option value="">選択してください</option>
        <option value="sedan">セダン</option>
        <option value="suv">SUV</option>
        <option value="sports">スポーツカー</option>
        <option value="kcar">軽自動車</option>
        <option value="wagon">ワゴン</option>
        <option value="minivan">ミニバン</option>
        <option value="truck">トラック</option>
        <option value="classic">クラシックカー</option>
        <option value="supercar">スーパーカー</option>
        <option value="motorcycle">バイク</option>
      </select>
    </div>
    <div class="field">
      <label for="carName">車種名（任意）</label>
      <input type="text" id="carName" placeholder="例: スカイラインGT-R、ジムニー">
      <p class="hint">空欄でもOK。入れるとプロンプトに反映されます</p>
    </div>
    <div class="field">
      <label for="carColor">ボディカラー</label>
      <select id="carColor">
        <option value="">選択してください</option>
        <option value="red">レッド</option>
        <option value="blue">ブルー</option>
        <option value="white">ホワイト</option>
        <option value="black">ブラック</option>
        <option value="silver">シルバー</option>
        <option value="green">グリーン</option>
        <option value="yellow">イエロー</option>
        <option value="orange">オレンジ</option>
        <option value="purple">パープル</option>
        <option value="pink">ピンク</option>
        <option value="gold">ゴールド</option>
        <option value="neon-cyan">ネオンシアン</option>
      </select>
    </div>
    <div class="field">
      <label for="sfScene">SFシーン</label>
      <select id="sfScene">
        <option value="">選択してください</option>
        <option value="cybercity">サイバーパンクシティ</option>
        <option value="space-highway">宇宙ハイウェイ</option>
        <option value="neon-garage">ネオンガレージ</option>
        <option value="desert-planet">砂漠の惑星</option>
        <option value="floating-city">浮遊都市</option>
        <option value="rain-city">雨のネオン街</option>
        <option value="starport">宇宙港</option>
        <option value="retro-racetrack">レトロレーストラック</option>
      </select>
    </div>
    <div class="field">
      <label for="sfMod">SFカスタム</label>
      <select id="sfMod">
        <option value="">選択してください</option>
        <option value="hover">ホバーユニット装備</option>
        <option value="turbo">ターボブースター付き</option>
        <option value="laser">レーザーキャノン搭載</option>
        <option value="shield">エネルギーシールド展開</option>
        <option value="wing">ウイングスポイラー（巨大）</option>
        <option value="exhaust">炎のエキゾースト</option>
        <option value="robot">ロボット変形機構</option>
        <option value="none">カスタムなし</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="">選択してください</option>
        <option value="cool">クール&スタイリッシュ</option>
        <option value="cute">ポップ&キュート</option>
        <option value="dark">ダーク&ハードボイルド</option>
        <option value="retro">レトロフューチャー</option>
        <option value="epic">壮大&シネマティック</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🎮 プロンプトを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="promptOutput"></div>
    <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">📋 プロンプトをコピー</button>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">生成履歴（タップで復元）</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは独自ロジックでAI画像生成用プロンプトを組み立てています。生成AIサービス（Midjourney, Stable Diffusion, DALL-E等）に貼り付けてご利用ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPE_MAP = {
    sedan: 'sedan car', suv: 'SUV off-road vehicle', sports: 'sports car',
    kcar: 'compact kei car', wagon: 'station wagon', minivan: 'minivan',
    truck: 'pickup truck', classic: 'classic vintage car',
    supercar: 'supercar', motorcycle: 'motorcycle'
  };
  var COLOR_MAP = {
    red: 'vibrant red', blue: 'electric blue', white: 'pearl white',
    black: 'jet black', silver: 'metallic silver', green: 'emerald green',
    yellow: 'bright yellow', orange: 'sunset orange', purple: 'deep purple',
    pink: 'hot pink', gold: 'golden', 'neon-cyan': 'neon cyan glowing'
  };
  var SCENE_MAP = {
    'cybercity': 'neon-lit cyberpunk city street with holographic billboards',
    'space-highway': 'galactic space highway with stars and nebulas',
    'neon-garage': 'underground neon garage with glowing floor tiles',
    'desert-planet': 'alien desert planet with twin suns and red sand dunes',
    'floating-city': 'futuristic floating city above the clouds',
    'rain-city': 'rainy neon-soaked city night with reflections on wet asphalt',
    'starport': 'massive starport docking bay with spaceships',
    'retro-racetrack': 'retro pixel art racetrack with checkered flags'
  };
  var MOD_MAP = {
    hover: 'equipped with glowing hover units replacing wheels',
    turbo: 'with massive turbo booster engines emitting blue flames',
    laser: 'mounted with laser cannons on the roof',
    shield: 'surrounded by a translucent energy shield bubble',
    wing: 'with an oversized futuristic wing spoiler',
    exhaust: 'with flame-shooting exhausts trailing fire',
    robot: 'mid-transformation into a mecha robot',
    none: ''
  };
  var MOOD_MAP = {
    cool: 'cool and stylish atmosphere, sharp lines, dramatic lighting',
    cute: 'pop and cute atmosphere, bright colors, cheerful vibe',
    dark: 'dark and hardboiled atmosphere, deep shadows, gritty details',
    retro: 'retro-futuristic atmosphere, warm CRT glow, nostalgic palette',
    epic: 'epic cinematic atmosphere, dramatic camera angle, lens flare'
  };

  var HISTORY_KEY = 'carPromptHistory';

  function generate() {
    var carType = document.getElementById('carType').value;
    var carName = document.getElementById('carName').value.trim();
    var carColor = document.getElementById('carColor').value;
    var sfScene = document.getElementById('sfScene').value;
    var sfMod = document.getElementById('sfMod').value;
    var mood = document.getElementById('mood').value;

    if (!carType || !carColor || !sfScene || !mood) {
      document.getElementById('result').style.display = 'block';
      document.getElementById('promptOutput').textContent = '⚠️ 車のタイプ・カラー・シーン・雰囲気を選んでください';
      document.getElementById('copyBtn').style.display = 'none';
      return;
    }

    var parts = [];
    parts.push('8-bit pixel art, retro game style, 16-bit era aesthetic');
    parts.push(COLOR_MAP[carColor] + ' ' + TYPE_MAP[carType]);
    if (carName) parts.push('inspired by ' + carName);
    if (sfMod && sfMod !== 'none' && MOD_MAP[sfMod]) parts.push(MOD_MAP[sfMod]);
    parts.push('parked in a ' + SCENE_MAP[sfScene]);
    parts.push(MOOD_MAP[mood]);
    parts.push('detailed pixel art sprites, clean pixel edges, limited color palette, no anti-aliasing');

    var prompt = parts.join(', ');

    document.getElementById('promptOutput').textContent = prompt;
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('copyBtn').textContent = '📋 プロンプトをコピー';
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('result').style.display = 'block';

    saveHistory(prompt, carType, carColor);
    renderHistory();
  }

  function copyPrompt() {
    var text = document.getElementById('promptOutput').textContent;
    if (!text || text.startsWith('⚠️')) return;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 プロンプトをコピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function saveHistory(prompt, carType, carColor) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({
      prompt: prompt,
      type: carType,
      color: carColor,
      date: new Date().toLocaleString('ja-JP')
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = history.map(function(item, i) {
      var short = item.prompt.length > 80 ? item.prompt.substring(0, 80) + '...' : item.prompt;
      return '<div class="history-item" onclick="restoreHistory(' + i + ')">'
        + short
        + '<div class="history-meta">' + item.date + '</div>'
        + '</div>';
    }).join('');
  }

  function restoreHistory(index) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (!history[index]) return;
    document.getElementById('promptOutput').textContent = history[index].prompt;
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('copyBtn').textContent = '📋 プロンプトをコピー';
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
  }

  // 初期表示で履歴があれば表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
