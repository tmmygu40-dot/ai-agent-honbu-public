<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水道コスト影響チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .px { padding-left: 1rem; padding-right: 1rem; }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>水道コスト影響チェッカー</h1>
    <p class="subtitle">水道料金値上げによる月額コスト増と転嫁必要額を即試算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="manufacturing">製造業</option>
        <option value="food">飲食業</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="usage">月間使用量（m³）</label>
      <input type="number" id="usage" placeholder="例: 200" min="0" step="1">
      <p class="hint">検針票や明細書で確認できます</p>
    </div>
    <div class="field">
      <label for="priceNow">現在の水道単価（円/m³）</label>
      <input type="number" id="priceNow" placeholder="例: 200" min="0" step="1">
      <p class="hint">料金÷使用量で概算できます</p>
    </div>
    <div class="field">
      <label for="priceNew">値上げ後の水道単価（円/m³）</label>
      <input type="number" id="priceNew" placeholder="例: 230" min="0" step="1">
    </div>
  </div>

  <!-- 転嫁試算カード -->
  <div class="card">
    <p class="card-title">転嫁試算（任意）</p>
    <div class="field">
      <label for="salesQty">月間販売数（個・食）</label>
      <input type="number" id="salesQty" placeholder="例: 500" min="0" step="1">
      <p class="hint">空欄の場合は転嫁額の試算をスキップします</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">コスト増を試算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">月額コスト増加額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'suido_cost_checker_v1';

  function loadSaved() {
    try {
      var s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (s.industry)  document.getElementById('industry').value  = s.industry;
      if (s.usage)     document.getElementById('usage').value     = s.usage;
      if (s.priceNow)  document.getElementById('priceNow').value  = s.priceNow;
      if (s.priceNew)  document.getElementById('priceNew').value  = s.priceNew;
      if (s.salesQty)  document.getElementById('salesQty').value  = s.salesQty;
    } catch(e) {}
  }

  function saveInputs() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        industry:  document.getElementById('industry').value,
        usage:     document.getElementById('usage').value,
        priceNow:  document.getElementById('priceNow').value,
        priceNew:  document.getElementById('priceNew').value,
        salesQty:  document.getElementById('salesQty').value
      }));
    } catch(e) {}
  }

  function calc() {
    var industry  = document.getElementById('industry').value;
    var usage     = parseFloat(document.getElementById('usage').value);
    var priceNow  = parseFloat(document.getElementById('priceNow').value);
    var priceNew  = parseFloat(document.getElementById('priceNew').value);
    var salesQtyV = document.getElementById('salesQty').value;
    var salesQty  = salesQtyV !== '' ? parseFloat(salesQtyV) : null;

    if (isNaN(usage) || isNaN(priceNow) || isNaN(priceNew)) {
      showErr('月間使用量・現在単価・値上げ後単価を入力してください');
      return;
    }
    if (priceNew < priceNow) {
      showErr('値上げ後単価が現在単価より低くなっています。確認してください');
      return;
    }

    saveInputs();

    var costNow   = usage * priceNow;
    var costNew   = usage * priceNew;
    var costDiff  = costNew - costNow;
    var rateUp    = priceNow > 0 ? (costDiff / costNow * 100) : 0;
    var yearDiff  = costDiff * 12;

    var level = rateUp < 5 ? 'ok' : rateUp < 15 ? 'warn' : 'ng';
    var levelLabel = level === 'ok'   ? '影響は軽微'
                   : level === 'warn' ? '要注意レベル'
                   : '大きな負担増';

    var unitLabel = industry === 'food' ? '1食あたり転嫁必要額' : '1個あたり転嫁必要額';
    var noteText  = '増加率 ' + rateUp.toFixed(1) + '%　年間コスト増 ' + fmt(yearDiff) + ' 円';
    if (salesQty !== null && !isNaN(salesQty) && salesQty > 0) {
      var perUnit = costDiff / salesQty;
      noteText += '\n' + unitLabel + '：約 ' + perUnit.toFixed(1) + ' 円';
    }

    showResult(level, '+' + fmt(costDiff) + ' 円/月', noteText);

    var rows = [
      ['現在の月額水道代',   fmt(costNow)  + ' 円'],
      ['値上げ後の月額水道代', fmt(costNew)  + ' 円'],
      ['月額コスト増加額',   '+' + fmt(costDiff) + ' 円', true],
      ['コスト増加率',       rateUp.toFixed(1) + ' %'],
      ['年間コスト増加額',   '+' + fmt(yearDiff) + ' 円'],
    ];

    if (salesQty !== null && !isNaN(salesQty) && salesQty > 0) {
      var perUnit = costDiff / salesQty;
      rows.push([unitLabel, '約 ' + perUnit.toFixed(1) + ' 円']);
    }

    rows.push(['判定', levelLabel]);
    showDetail(rows);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').style.whiteSpace = 'pre-line';
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  loadSaved();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
