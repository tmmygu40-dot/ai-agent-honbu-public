<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 月経周期で最適な仕事・運動タイミング診断</title>
  <meta name="description" content="月経周期と体調から、仕事や運動に最適な日を診断する無料ツールです。毎月のリズムに合わせて生活をカスタマイズできます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #d4a5d4;
      --accent-light: #faf5ff;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b580b8, 0 6px 16px rgba(212,165,212,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b580b8, 0 2px 8px rgba(212,165,212,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.8rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── タイミング提案テーブル ── */
    .timing-section {
      margin-bottom: 1rem;
    }
    .timing-section h3 {
      font-size: 0.95rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .timing-item {
      display: flex; gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      background: var(--accent-light);
      border-radius: 9px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .timing-item .emoji { font-size: 1.3rem; min-width: 30px; }
    .timing-item .text { flex: 1; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌸 月経周期で最適なタイミング診断</h1>
    <p class="subtitle">周期と体調から、仕事・運動・休息のベストタイミングが分かります</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="cycle">月経周期（日数）</label>
      <input type="number" id="cycle" placeholder="例: 28" min="21" max="45">
      <p class="hint">通常は25〜35日です</p>
    </div>
    <div class="field">
      <label for="dayInCycle">今日は周期の何日目？</label>
      <input type="number" id="dayInCycle" placeholder="例: 1" min="1" max="45">
      <p class="hint">月経初日を1日目として数えます</p>
    </div>
  </div>

  <!-- 体調入力カード -->
  <div class="card">
    <p class="card-title">体調</p>
    <div class="field">
      <label for="mood">気分（1=低い ← → 5=高い）</label>
      <input type="range" id="mood" min="1" max="5" value="3" class="slider">
      <p class="hint" id="mood-label">3: 普通</p>
    </div>
    <div class="field">
      <label for="energy">体力（1=疲れてる ← → 5=元気）</label>
      <input type="range" id="energy" min="1" max="5" value="3" class="slider">
      <p class="hint" id="energy-label">3: 普通</p>
    </div>
    <div class="field">
      <label for="sleep">睡眠（1=寝不足 ← → 5=充実）</label>
      <input type="range" id="sleep" min="1" max="5" value="3" class="slider">
      <p class="hint" id="sleep-label">3: 普通</p>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="calc()">タイミングを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- タイミング提案カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">おすすめのタイミング</p>
    <div id="timing-details"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、一般的な月経周期の特性と体調パターンを参考に、目安として使いやすく整理しています。医学的診断ではありません。体調に不安がある場合は、医師にご相談ください。
  </p>

  <!-- 広告枠（結果と補足の後に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── Range スライダーの表示更新 ──
  const labels = {
    mood: { 1: '低い', 2: 'やや低い', 3: '普通', 4: 'やや高い', 5: '高い' },
    energy: { 1: '疲れてる', 2: 'やや疲れ', 3: '普通', 4: 'やや元気', 5: '元気' },
    sleep: { 1: '寝不足', 2: 'やや不足', 3: '普通', 4: 'やや充実', 5: '充実' }
  };

  document.getElementById('mood').addEventListener('input', function() {
    document.getElementById('mood-label').textContent = this.value + ': ' + labels.mood[this.value];
  });
  document.getElementById('energy').addEventListener('input', function() {
    document.getElementById('energy-label').textContent = this.value + ': ' + labels.energy[this.value];
  });
  document.getElementById('sleep').addEventListener('input', function() {
    document.getElementById('sleep-label').textContent = this.value + ': ' + labels.sleep[this.value];
  });

  // ── localStorage 保存・復元 ──
  function saveData() {
    localStorage.setItem('femtech_cycle', document.getElementById('cycle').value);
    localStorage.setItem('femtech_dayInCycle', document.getElementById('dayInCycle').value);
    localStorage.setItem('femtech_mood', document.getElementById('mood').value);
    localStorage.setItem('femtech_energy', document.getElementById('energy').value);
    localStorage.setItem('femtech_sleep', document.getElementById('sleep').value);
  }

  function loadData() {
    var cycle = localStorage.getItem('femtech_cycle');
    var dayInCycle = localStorage.getItem('femtech_dayInCycle');
    var mood = localStorage.getItem('femtech_mood');
    var energy = localStorage.getItem('femtech_energy');
    var sleep = localStorage.getItem('femtech_sleep');

    if (cycle) document.getElementById('cycle').value = cycle;
    if (dayInCycle) document.getElementById('dayInCycle').value = dayInCycle;
    if (mood) {
      document.getElementById('mood').value = mood;
      document.getElementById('mood-label').textContent = mood + ': ' + labels.mood[mood];
    }
    if (energy) {
      document.getElementById('energy').value = energy;
      document.getElementById('energy-label').textContent = energy + ': ' + labels.energy[energy];
    }
    if (sleep) {
      document.getElementById('sleep').value = sleep;
      document.getElementById('sleep-label').textContent = sleep + ': ' + labels.sleep[sleep];
    }
  }

  window.addEventListener('load', loadData);
  ['cycle', 'dayInCycle', 'mood', 'energy', 'sleep'].forEach(id => {
    document.getElementById(id).addEventListener('change', saveData);
  });

  // ── 診断ロジック ──
  function calc() {
    var cycle = parseInt(document.getElementById('cycle').value);
    var dayInCycle = parseInt(document.getElementById('dayInCycle').value);
    var mood = parseInt(document.getElementById('mood').value);
    var energy = parseInt(document.getElementById('energy').value);
    var sleep = parseInt(document.getElementById('sleep').value);

    if (isNaN(cycle) || isNaN(dayInCycle)) {
      showErr('周期と日数を入力してください');
      return;
    }

    if (dayInCycle < 1 || dayInCycle > cycle) {
      showErr('周期の日数内で入力してください');
      return;
    }

    // 周期の段階判定
    var phase = getPhase(dayInCycle, cycle);
    var bodyCondition = mood + energy + sleep; // 3〜15点
    var recommendation = getRecommendation(phase, dayInCycle, cycle, bodyCondition);

    var phaseLabel = phase === 'menstrual' ? 'A. 月経期'
                   : phase === 'follicular' ? 'B. 卵胞期'
                   : phase === 'ovulation' ? 'C. 排卵期'
                   : 'D. 黄体期';

    showResult('ok', phaseLabel, recommendation.message);
    showTiming(phase, dayInCycle, cycle, bodyCondition);
    saveData();
  }

  function getPhase(dayInCycle, cycle) {
    var ratio = dayInCycle / cycle;
    if (ratio <= 0.14) return 'menstrual';      // 月経期（1〜4日）
    if (ratio <= 0.5) return 'follicular';      // 卵胞期（5〜14日）
    if (ratio <= 0.6) return 'ovulation';       // 排卵期（15〜17日）
    return 'luteal';                            // 黄体期（18〜28日）
  }

  function getRecommendation(phase, dayInCycle, cycle, bodyCondition) {
    if (phase === 'menstrual') {
      return { message: '月経期：体を休ませるのが最優先。軽い運動と温めが◎' };
    } else if (phase === 'follicular') {
      return { message: '卵胞期：気分と体力が上向き。チャレンジや新企画を始めるなら今です' };
    } else if (phase === 'ovulation') {
      return { message: '排卵期：エネルギー満タン！重要な仕事・交渉に最適なタイミング' };
    } else {
      return { message: '黄体期：気分が不安定になりやすい。予定に余裕を持たせて、丁寧なコミュニケーションを' };
    }
  }

  function showTiming(phase, dayInCycle, cycle, bodyCondition) {
    var html = '';

    if (phase === 'menstrual') {
      html += '<div class="timing-section">'
            + '<h3>💤 休息を優先</h3>'
            + '<div class="timing-item"><div class="emoji">🔥</div><div class="text">体を温める（入浴・温かい食事）</div></div>'
            + '<div class="timing-item"><div class="emoji">🌸</div><div class="text">ヨガ・ストレッチなど軽い運動</div></div>'
            + '<div class="timing-item"><div class="emoji">📴</div><div class="text">重要な判断は後回しに。休息重視</div></div>'
            + '</div>';
    } else if (phase === 'follicular') {
      html += '<div class="timing-section">'
            + '<h3>⚡ 企画・チャレンジ期</h3>'
            + '<div class="timing-item"><div class="emoji">🚀</div><div class="text">新しい企画・プロジェクトを開始</div></div>'
            + '<div class="timing-item"><div class="emoji">💪</div><div class="text">運動量を増やしても◎。トレーニング効果UP</div></div>'
            + '<div class="timing-item"><div class="emoji">🎯</div><div class="text">営業・プレゼンで良い成果が期待できます</div></div>'
            + '</div>';
    } else if (phase === 'ovulation') {
      html += '<div class="timing-section">'
            + '<h3>⭐ 最高潮・交渉期</h3>'
            + '<div class="timing-item"><div class="emoji">🎤</div><div class="text">重要な交渉・プレゼン・大事な面接に</div></div>'
            + '<div class="timing-item"><div class="emoji">👥</div><div class="text">対人スキルが最高潮。人間関係構築に◎</div></div>'
            + '<div class="timing-item"><div class="emoji">✨</div><div class="text">自信と魅力が一番出るタイミング</div></div>'
            + '</div>';
    } else {
      html += '<div class="timing-section">'
            + '<h3>🌙 丁寧さ・調整期</h3>'
            + '<div class="timing-item"><div class="emoji">💬</div><div class="text">丁寧なコミュニケーションを心がけて</div></div>'
            + '<div class="timing-item"><div class="emoji">📋</div><div class="text">細かい作業・チェック業務に集中</div></div>'
            + '<div class="timing-item"><div class="emoji">🏠</div><div class="text">無理をしない。自分のペースで</div></div>'
            + '</div>';
    }

    // 体調に応じた補足
    if (bodyCondition <= 6) {
      html += '<div class="timing-section">'
            + '<h3>💭 体調がやや低めです</h3>'
            + '<div class="timing-item"><div class="emoji">⚠️</div><div class="text">無理な予定は避けて。十分な睡眠と栄養を</div></div>'
            + '</div>';
    } else if (bodyCondition >= 13) {
      html += '<div class="timing-section">'
            + '<h3>🌟 体調は良好です</h3>'
            + '<div class="timing-item"><div class="emoji">✅</div><div class="text">今のペースを保つと、大きな目標達成に</div></div>'
            + '</div>';
    }

    document.getElementById('timing-details').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
