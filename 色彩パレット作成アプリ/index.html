<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩パレット作成アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>色彩パレット</h1>

    <div class="input-area">
      <div class="color-input-group">
        <input type="color" id="colorPicker" value="#4a90d9">
        <input type="text" id="colorCode" value="#4a90d9" placeholder="#000000" maxlength="7">
        <input type="text" id="colorName" placeholder="色の名前（任意）" maxlength="20">
      </div>
      <button id="addBtn">追加</button>
    </div>

    <div class="palette-header">
      <span id="colorCount">0色</span>
      <button id="clearBtn">すべて削除</button>
    </div>

    <div id="palette" class="palette"></div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
