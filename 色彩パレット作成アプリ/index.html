<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩パレット作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>色彩パレット</h1>

    <div class="input-area">
      <div class="color-input-group">
        <input type="color" id="colorPicker" value="#4a90d9">
        <input type="text" id="colorCode" value="#4a90d9" placeholder="#000000" maxlength="7">
        <input type="text" id="colorName" placeholder="色の名前（任意）" maxlength="20">
      </div>
      <button id="addBtn">追加</button>
    </div>

    <div class="palette-header">
      <span id="colorCount">0色</span>
      <button id="clearBtn">すべて削除</button>
    </div>

    <div id="palette" class="palette"></div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
