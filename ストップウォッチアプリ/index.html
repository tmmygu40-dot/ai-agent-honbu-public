<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストップウォッチ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>ストップウォッチ</h1>

    <div class="display">
      <span id="time">00:00.00</span>
    </div>

    <div class="controls">
      <button id="startStopBtn" class="btn btn-primary">スタート</button>
      <button id="lapBtn" class="btn btn-secondary" disabled>ラップ</button>
      <button id="resetBtn" class="btn btn-danger" disabled>リセット</button>
    </div>

    <div class="lap-section" id="lapSection">
      <div class="lap-header" id="lapHeader" style="display:none">
        <span>ラップ</span>
        <span>ラップタイム</span>
        <span>合計タイム</span>
      </div>
      <ul id="lapList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
