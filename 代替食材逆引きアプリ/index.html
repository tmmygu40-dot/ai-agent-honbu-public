<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代替食材逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.2rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      max-width: 640px;
      margin: 0 auto 0.8rem;
      padding: 0 0;
      display: flex;
      gap: 0.5rem;
    }
    .search-wrap input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap button {
      padding: 0.75rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .cats {
      max-width: 640px;
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .cat-btn {
      padding: 0.4rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--card);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
    }
    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tab-row {
      max-width: 640px;
      margin: 0 auto 1rem;
      display: flex;
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1.5px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 0.65rem 0.5rem;
      background: var(--card);
      color: var(--text-sub);
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-right: 1px solid var(--border);
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: var(--accent); color: #fff; }

    .no-result {
      max-width: 640px;
      margin: 0 auto 1rem;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
      padding: 2rem;
    }

    /* 食材カード */
    .ingredient-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 0 auto 0.8rem;
      max-width: 640px;
      overflow: hidden;
    }
    .ing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      gap: 0.6rem;
    }
    .ing-header:hover { background: var(--accent-light); }
    .ing-name {
      font-size: 1.05rem;
      font-weight: 800;
    }
    .ing-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cat-tag {
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
    }
    .fav-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.2rem;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-icon {
      font-size: 0.8rem;
      color: var(--text-sub);
    }

    .ing-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 1rem 1.1rem;
    }
    .ing-body.open { display: block; }

    .alt-item {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .alt-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .alt-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ok);
      margin-bottom: 0.3rem;
    }
    .alt-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.35rem;
    }
    .alt-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .alt-tag.use  { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; }
    .alt-tag.note { color: #b45309; border-color: #fcd34d; background: #fffbeb; }
    .alt-desc {
      font-size: 0.83rem;
      color: var(--text-sub);
      line-height: 1.6;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  </div>

  <div class="cats" id="cats" style="padding:0 0.8rem;"></div>

  <div class="tab-row" style="margin:0 0.8rem 1rem;">
    <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">すべて</button>
    <button class="tab-btn" id="tabFav" onclick="switchTab('fav')">★ お気に入り</button>
  </div>

  <div id="list"></div>

  // ══════════════════════════════════════════
  // 状態管理
  // ══════════════════════════════════════════
  var CATS = ['すべて','肉','魚介','野菜','乳製品','調味料','粉類','その他'];
  var state = {
    cat: 'すべて',
    tab: 'all',
    query: '',
    favs: JSON.parse(localStorage.getItem('altIngFavs') || '[]'),
    open: {}
  };

  function saveFavs() {
    localStorage.setItem('altIngFavs', JSON.stringify(state.favs));
  }

  function toggleFav(id) {
    var idx = state.favs.indexOf(id);
    if (idx >= 0) state.favs.splice(idx, 1);
    else state.favs.push(id);
    saveFavs();
    render();
  }

  function toggleOpen(id) {
    state.open[id] = !state.open[id];
    render();
  }

  function switchTab(tab) {
    state.tab = tab;
    document.getElementById('tabAll').className = 'tab-btn' + (tab === 'all' ? ' active' : '');
    document.getElementById('tabFav').className = 'tab-btn' + (tab === 'fav' ? ' active' : '');
    render();
  }

  function setCat(cat) {
    state.cat = cat;
    document.querySelectorAll('.cat-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    render();
  }

  // ══════════════════════════════════════════
  // 描画
  // ══════════════════════════════════════════
  function buildCats() {
    var wrap = document.getElementById('cats');
    wrap.innerHTML = CATS.map(function(c) {
      return '<button class="cat-btn' + (c === 'すべて' ? ' active' : '') + '" data-cat="' + c + '" onclick="setCat(\'' + c + '\')">' + c + '</button>';
    }).join('');
  }

  function render() {
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    state.query = q;

    var list = DATA.filter(function(d) {
      // タブフィルター
      if (state.tab === 'fav' && state.favs.indexOf(d.id) < 0) return false;
      // カテゴリフィルター
      if (state.cat !== 'すべて' && d.cat !== state.cat) return false;
      // 検索フィルター
      if (q) {
        var hit = d.name.toLowerCase().includes(q)
          || d.alts.some(function(a) { return a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q); });
        if (!hit) return false;
      }
      return true;
    });

    var wrap = document.getElementById('list');
    if (list.length === 0) {
      wrap.innerHTML = '<div class="no-result">該当する食材が見つかりませんでした。</div>';
      return;
    }

    wrap.innerHTML = list.map(function(d) {
      var isFav = state.favs.indexOf(d.id) >= 0;
      var isOpen = !!state.open[d.id];
      return '<div class="ingredient-card">'
        + '<div class="ing-header" onclick="toggleOpen(\'' + d.id + '\')">'
        +   '<div style="display:flex;align-items:center;gap:0.5rem;flex:1;">'
        +     '<span class="ing-name">' + esc(d.name) + '</span>'
        +     '<span class="cat-tag">' + esc(d.cat) + '</span>'
        +   '</div>'
        +   '<div class="ing-meta">'
        +     '<button class="fav-btn" onclick="event.stopPropagation();toggleFav(\'' + d.id + '\')" title="お気に入り">' + (isFav ? '★' : '☆') + '</button>'
        +     '<span class="toggle-icon">' + (isOpen ? '▲' : '▼') + '</span>'
        +   '</div>'
        + '</div>'
        + '<div class="ing-body' + (isOpen ? ' open' : '') + '">'
        +   '<p style="font-size:0.78rem;color:var(--text-sub);margin-bottom:0.8rem;">代替品 ' + d.alts.length + '件</p>'
        +   d.alts.map(function(a) {
              return '<div class="alt-item">'
                + '<div class="alt-name">✓ ' + esc(a.name) + '</div>'
                + '<div class="alt-tags">'
                +   (a.use || []).map(function(u) { return '<span class="alt-tag use">' + esc(u) + '</span>'; }).join('')
                +   (a.note || []).map(function(n) { return '<span class="alt-tag note">⚠ ' + esc(n) + '</span>'; }).join('')
                + '</div>'
                + '<div class="alt-desc">' + esc(a.desc) + '</div>'
                + '</div>';
            }).join('')
        + '</div>'
        + '</div>';
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期化
  buildCats();
  render();
  </script>
