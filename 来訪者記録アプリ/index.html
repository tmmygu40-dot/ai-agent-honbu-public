<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来訪者記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>来訪者記録</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>来訪者登録</h2>
      <div class="form-group">
        <label for="name">氏名 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：山田 太郎" maxlength="50">
      </div>
      <div class="form-group">
        <label for="company">会社名</label>
        <input type="text" id="company" placeholder="例：株式会社〇〇" maxlength="100">
      </div>
      <div class="form-group">
        <label for="purpose">来訪目的 <span class="required">*</span></label>
        <input type="text" id="purpose" placeholder="例：打ち合わせ" maxlength="100">
      </div>
      <div class="form-group">
        <label for="checkin">入室時刻 <span class="required">*</span></label>
        <input type="datetime-local" id="checkin">
      </div>
      <button class="btn btn-primary" id="addBtn">登録</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <button class="filter-btn active" data-filter="all">全員</button>
      <button class="filter-btn" data-filter="in">在室中</button>
      <button class="filter-btn" data-filter="out">退室済み</button>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>来訪者一覧 <span id="count" class="count-badge">0</span></h2>
      <div id="visitorList" class="visitor-list"></div>
      <p id="emptyMsg" class="empty-msg">来訪者が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
