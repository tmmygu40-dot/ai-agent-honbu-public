<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロット管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>ロット管理アプリ</h1>

    <section class="form-section">
      <h2>ロット登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="lotNumber">ロット番号</label>
          <input type="text" id="lotNumber" placeholder="例：LOT-2024-001">
        </div>
        <div class="form-group">
          <label for="productName">製品名</label>
          <input type="text" id="productName" placeholder="例：商品A">
        </div>
        <div class="form-group">
          <label for="manufactureDate">製造日</label>
          <input type="date" id="manufactureDate">
        </div>
        <div class="form-group">
          <label for="expiryDate">期限日</label>
          <input type="date" id="expiryDate">
        </div>
        <div class="form-group">
          <label for="quantity">数量</label>
          <input type="number" id="quantity" min="0" placeholder="例：100">
        </div>
        <div class="form-group form-group--full">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="任意">
        </div>
      </div>
      <button class="btn-primary" onclick="addLot()">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>ロット一覧</h2>
        <div class="filter-area">
          <label>
            <input type="checkbox" id="showExpiredOnly" onchange="renderList()">
            期限切れ・期限間近のみ表示
          </label>
        </div>
      </div>
      <div id="summary" class="summary"></div>
      <div id="lotList" class="lot-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
