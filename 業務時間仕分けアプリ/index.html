<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務時間仕分けアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>業務時間仕分け</h1>

    <section class="add-section">
      <form id="add-form">
        <input type="text" id="category-input" placeholder="作業種別名を入力" maxlength="30">
        <button type="submit">追加</button>
      </form>
    </section>

    <section class="categories-section">
      <div id="categories-list"></div>
    </section>

    <section class="summary-section">
      <div class="summary-header">
        <h2>今日の合計</h2>
        <button id="reset-btn" class="reset-btn">リセット</button>
      </div>
      <div id="summary-list"></div>
      <div id="total-display" class="total-display"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
