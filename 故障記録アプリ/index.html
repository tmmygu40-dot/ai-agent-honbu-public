<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故障記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>故障記録アプリ</h1>
  </header>

  <main>
    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>故障を記録する</h2>
      <div class="form-group">
        <label for="device-name">設備・機器名</label>
        <input type="text" id="device-name" placeholder="例：エアコン A棟1F" maxlength="50">
      </div>
      <div class="form-group">
        <label for="failure-date">故障日</label>
        <input type="date" id="failure-date">
      </div>
      <div class="form-group">
        <label for="repair-content">修理内容・状況</label>
        <textarea id="repair-content" placeholder="例：コンプレッサー交換。業者対応。費用3万円。" rows="3" maxlength="300"></textarea>
      </div>
      <button id="add-btn" class="btn-primary">登録する</button>
    </section>

    <!-- 集計ランキング -->
    <section class="ranking-section">
      <h2>設備別 故障ランキング</h2>
      <div id="ranking-list" class="ranking-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>

    <!-- 検索 -->
    <section class="search-section">
      <input type="text" id="search-input" placeholder="設備名で絞り込み...">
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>故障履歴一覧 <span id="record-count" class="count-badge">0件</span></h2>
      <div id="record-list" class="record-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
