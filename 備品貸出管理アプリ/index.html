<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>備品貸出管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>備品貸出管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">備品名 *</label>
          <input type="text" id="itemName" placeholder="例：ノートPC、社用車（白）">
        </div>
        <div class="form-group">
          <label for="borrower">借りた人 *</label>
          <input type="text" id="borrower" placeholder="例：山田太郎">
        </div>
        <div class="form-group">
          <label for="lendDate">貸し出し日 *</label>
          <input type="date" id="lendDate">
        </div>
        <div class="form-group">
          <label for="returnDate">返却期限 *</label>
          <input type="date" id="returnDate">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：出張用、第2倉庫の鍵付き">
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <button class="filter-btn active" data-filter="unreturned">未返却のみ</button>
      <button class="filter-btn" data-filter="all">全件表示</button>
      <span class="count-badge" id="countBadge"></span>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="itemList" class="item-list"></div>
      <p class="empty-msg" id="emptyMsg">登録された備品はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
