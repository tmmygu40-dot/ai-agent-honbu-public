<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロジェクト進捗管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>プロジェクト進捗管理</h1>

    <!-- 登録フォーム -->
    <div class="form-card">
      <h2 id="form-title">案件を登録</h2>
      <div class="form-row">
        <label>案件名</label>
        <input type="text" id="input-name" placeholder="例：ウェブサイトリニューアル">
      </div>
      <div class="form-row">
        <label>進捗 (%)</label>
        <input type="number" id="input-progress" min="0" max="100" placeholder="0〜100">
      </div>
      <div class="form-row">
        <label>期限</label>
        <input type="date" id="input-deadline">
      </div>
      <div class="form-row">
        <label>メモ（任意）</label>
        <input type="text" id="input-memo" placeholder="備考など">
      </div>
      <div class="form-actions">
        <button id="btn-submit" onclick="submitProject()">登録する</button>
        <button id="btn-cancel" class="btn-cancel hidden" onclick="cancelEdit()">キャンセル</button>
      </div>
    </div>

    <!-- 並び替えコントロール -->
    <div class="sort-controls">
      <span>並び替え：</span>
      <button id="sort-deadline" class="sort-btn active" onclick="setSort('deadline')">期限順</button>
      <button id="sort-progress" class="sort-btn" onclick="setSort('progress')">進捗順</button>
      <button id="sort-name" class="sort-btn" onclick="setSort('name')">名前順</button>
    </div>

    <!-- 案件リスト -->
    <div id="project-list"></div>

    <!-- 空メッセージ -->
    <div id="empty-msg" class="empty-msg hidden">案件がまだありません。上のフォームから登録してください。</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
