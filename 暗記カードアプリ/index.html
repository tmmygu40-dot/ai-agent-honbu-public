<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暗記カードアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>暗記カードアプリ</h1>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="quiz">出題</button>
      <button class="tab-btn" data-tab="list">カード一覧</button>
      <button class="tab-btn" data-tab="add">カード追加</button>
    </div>

    <!-- 出題タブ -->
    <div id="tab-quiz" class="tab-content active">
      <div id="quiz-empty" class="empty-msg">
        <p>カードがありません。<br>「カード追加」タブから登録してください。</p>
      </div>

      <div id="quiz-area" class="hidden">
        <!-- 正解率 -->
        <div class="stats-bar">
          <span>正解率：<strong id="rate-text">0%</strong></span>
          <span>（正解 <span id="correct-count">0</span> / 挑戦 <span id="total-count">0</span>）</span>
          <button id="reset-stats-btn" class="btn-small btn-ghost">リセット</button>
        </div>

        <!-- カード -->
        <div class="card-wrapper">
          <div class="card" id="card" onclick="flipCard()">
            <div class="card-front">
              <div class="card-label">表（単語・用語）</div>
              <div class="card-text" id="front-text"></div>
              <div class="card-hint">タップで答えを見る</div>
            </div>
            <div class="card-back">
              <div class="card-label">裏（意味・答え）</div>
              <div class="card-text" id="back-text"></div>
            </div>
          </div>
        </div>

        <!-- 判定ボタン（裏面表示後に出現） -->
        <div id="judge-btns" class="hidden judge-btns">
          <button class="btn btn-wrong" onclick="judgeCard(false)">✗ 不正解</button>
          <button class="btn btn-correct" onclick="judgeCard(true)">✓ 正解</button>
        </div>

        <button class="btn btn-secondary mt-16" onclick="nextCard()">スキップ →</button>
      </div>
    </div>

    <!-- カード一覧タブ -->
    <div id="tab-list" class="tab-content hidden">
      <div id="list-empty" class="empty-msg">
        <p>カードがありません。</p>
      </div>
      <ul id="card-list" class="card-list"></ul>
    </div>

    <!-- カード追加タブ -->
    <div id="tab-add" class="tab-content hidden">
      <form id="add-form" class="add-form">
        <label>
          表（単語・用語）
          <input type="text" id="input-front" placeholder="例：apple" required>
        </label>
        <label>
          裏（意味・答え）
          <textarea id="input-back" placeholder="例：りんご" required></textarea>
        </label>
        <button type="submit" class="btn btn-primary">追加する</button>
      </form>
      <p id="add-msg" class="add-msg hidden">追加しました！</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
