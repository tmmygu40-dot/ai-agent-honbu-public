<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="テーマやキーワードを入力するだけで、バズるX(Twitter)投稿を共感型・数字型・問いかけ型の3パターンで即生成。ワンタップコピーですぐ投稿できます。">
  <title>📱 SNS投稿テンプレジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .post-card {
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .post-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .post-type-badge {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 0.25rem 0.7rem; border-radius: 20px;
    }
    .post-type-badge.empathy { background: var(--ok-bg); color: var(--ok); }
    .post-type-badge.number { background: var(--warn-bg); color: var(--warn); }
    .post-type-badge.question { background: #eff6ff; color: #1d4ed8; }
    .char-count { font-size: 0.75rem; color: var(--text-sub); }
    .char-count.over { color: var(--ng); font-weight: 700; }
    .post-text {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
      margin-bottom: 0.8rem; min-height: 3rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-item:last-child { border-bottom: none; }
    .history-keyword { font-size: 0.88rem; color: var(--text); cursor: pointer; }
    .history-keyword:hover { color: var(--accent); }
    .history-delete { font-size: 0.75rem; color: var(--text-sub); cursor: pointer; border: none; background: none; padding: 0.3rem; }
    .history-delete:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .post-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>📱 SNS投稿テンプレジェネレーター</h1>
    <p class="subtitle">テーマを入力するだけで、バズるX投稿を3パターン即生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">テーマ入力</p>
    <div class="field">
      <label for="theme">テーマ・キーワード</label>
      <input type="text" id="theme" placeholder="例: 副業、節約、転職、AI活用">
      <p class="hint">投稿したいテーマを入力してください</p>
    </div>
    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="casual">カジュアル（普段使い）</option>
        <option value="pro">プロ・専門家風</option>
        <option value="funny">ユーモア・ネタ系</option>
      </select>
    </div>
    <div class="field">
      <label for="target">ターゲット</label>
      <select id="target">
        <option value="general">一般・誰でも</option>
        <option value="biz">ビジネスパーソン</option>
        <option value="student">学生・若者</option>
        <option value="mama">ママ・パパ</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <!-- 結果エリア -->
  <div id="results"></div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">入力履歴</p>
    <div id="history-list"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── テンプレート定義 ──
  var TEMPLATES = {
    casual: {
      empathy: [
        '{theme}って正直めんどくさいと思ってたけど、やってみたら世界変わった。\n\nぶっちゃけ最初の一歩が一番キツい。\nでも始めたら「なんでもっと早くやらなかったの」ってなる。\n\n{theme}気になってる人、今日がその日かも。',
        '「{theme}なんて自分には関係ない」\n\n↑半年前の自分に言いたい。\n\n{theme}を知ってから\n・時間の使い方が変わった\n・考え方がアップデートされた\n・毎日がちょっと楽しくなった\n\nマジで早く知りたかった。',
        '{theme}について本音で話すね。\n\n最初は「難しそう…」って思った。\nでも実際やってみたら意外とシンプル。\n\nコツは「完璧を目指さないこと」。\n60点でOKって思えたら一気にラクになった。\n\n{theme}、迷ってる人の背中を押せたら嬉しい。'
      ],
      number: [
        '{theme}で人生変わった人がやってる3つのこと\n\n① まず小さく始める\n② 毎日5分だけ続ける\n③ 成果より「やった事実」を記録する\n\nこの3つだけで{theme}の成功率が爆上がりする。\n騙されたと思ってやってみて。',
        '【{theme}の真実】知らないと損する5つの事実\n\n1. 始めるのにお金はほぼいらない\n2. 1日15分で十分成果が出る\n3. 失敗しても失うものはほぼゼロ\n4. 周りの9割はまだやってない\n5. 今日始めれば来月には別人\n\n{theme}、やらない理由がない。',
        '{theme}を始めて変わった数字\n\n・0→1になるまで：約2週間\n・習慣化するまで：約1ヶ月\n・「やってよかった」と思うまで：3日\n\n思ってたより全然早い。\n{theme}、始めるなら今。'
      ],
      question: [
        'なんで{theme}やってる人ってあんなにイキイキしてるの？\n\n気になって調べてみたら納得した。\n\n{theme}をやると\n→ 自信がつく\n→ 新しい出会いが増える\n→ 毎日に「楽しみ」ができる\n\nそりゃイキイキするよね。',
        '{theme}を始めない理由、本当にそれで合ってる？\n\n「時間がない」→ スマホ見る時間はある\n「お金がない」→ 無料で始められる\n「才能がない」→ 才能なんていらない\n\n言い訳してる間に、隣の人はもう始めてるよ。',
        '{theme}に興味あるのに始めてない人に聞きたい。\n\n「何が怖い？」\n\n失敗？→ 誰も見てないから大丈夫\n恥ずかしい？→ 始めた人はみんな通る道\nめんどくさい？→ 最初の5分だけやってみ\n\n{theme}、思ってるより気軽だよ。'
      ]
    },
    pro: {
      empathy: [
        '{theme}の本質を理解していないと、いくら努力しても成果は出ません。\n\n私が{theme}に取り組んで気づいたのは、「正しい方向に正しい量の努力をすること」の重要性です。\n\n闇雲に頑張るのではなく、まず全体像を把握する。\nこれだけで成果が出るスピードが劇的に変わります。',
        '{theme}で成果を出す人と出せない人の決定的な違い。\n\nそれは「仕組み化」できているかどうか。\n\n意志の力に頼らず\n・ルーティンに組み込む\n・環境を整える\n・記録して振り返る\n\n{theme}は気合いではなく仕組みで解決する時代です。',
        '{theme}の専門家として断言します。\n\n「今さら遅い」は完全な誤解です。\n\nむしろ今の時代は\n・情報が整理されている\n・ツールが充実している\n・先人の失敗例から学べる\n\n{theme}を始めるなら、実は今が一番効率がいい。'
      ],
      number: [
        '{theme}で結果を出すための3原則\n\n① インプットとアウトプットの比率は3:7\n② PDCAではなくDCAPで回す\n③ 完璧主義を捨てて「まずリリース」\n\nこの3つを意識するだけで{theme}の生産性は2倍以上になります。',
        '【保存推奨】{theme}の成功者に共通する5つの習慣\n\n1. 毎朝15分のインプット時間を確保\n2. 週1回の振り返りを欠かさない\n3. 同じ志を持つコミュニティに所属\n4. 失敗をデータとして記録する\n5. 3ヶ月単位で目標を見直す\n\n{theme}は「習慣の質」で差がつきます。',
        '{theme}に関する市場データ\n\n・過去3年で需要が約2.5倍に拡大\n・参入者の7割が1年以内に離脱\n・継続した3割の平均成果は月額換算で+15%\n\nつまり「続けるだけ」で上位3割に入れる。\n{theme}は継続が最大の競争優位。'
      ],
      question: [
        '{theme}について、あなたは「消費者」と「生産者」のどちらですか？\n\n情報を受け取るだけの消費者は、永遠に搾取される側です。\n\n{theme}の知識を使って価値を生み出す側に回る。\nこの発想の転換が、最初の分岐点です。',
        '{theme}の情報を集めるだけで満足していませんか？\n\n「知っている」と「できる」の間には\n大きな溝があります。\n\n今日学んだことを、今日中に1つだけ実践する。\nこのシンプルな習慣が{theme}の成果を左右します。',
        'なぜ{theme}に取り組む人の大半が途中で挫折するのか？\n\n答えはシンプルで「ゴール設定が曖昧」だから。\n\n・いつまでに\n・どの指標を\n・どのレベルまで\n\nこの3点を明確にするだけで継続率は劇的に上がります。'
      ]
    },
    funny: {
      empathy: [
        '{theme}始めたら友達に「どうした急に」って言われた。\n\nいや、急じゃないんよ。\n3ヶ月悩んでたんよ。\n\nでもね、始めてみたら\n「もっと早くやれば」って100回思った。\n\n{theme}、悩んでる時間が一番もったいない説。',
        '{theme}やり始めの自分\n「こんなの余裕でしょw」\n\n3日後の自分\n「…」\n\n1週間後の自分\n「あれ、ちょっと楽しいかも」\n\n1ヶ月後の自分\n「{theme}のない人生とか考えられない」\n\nこれが沼。',
        '深夜2時に突然「{theme}やろう」って決意する現象に名前つけたい。\n\n翌朝の冷静な自分「…マジで？」\n\nでもね、深夜のテンションが正解なこともある。\n{theme}始めて本当によかった。\n\nあの日の深夜2時の自分、ナイス判断。'
      ],
      number: [
        '{theme}あるある3選\n\n① 始める前が一番めんどくさい\n② やり始めると止まらなくなる\n③ 気づいたら周りに布教してる\n\n全部当てはまった人、もう立派な{theme}民です。\nおめでとうございます（？）',
        '{theme}の難易度\n\n始めるまで：★★★★★\n始めてから：★★☆☆☆\n人に説明する：★★★★★★★★★★\n\n「{theme}って何が楽しいの？」って聞かれると\n急に語彙力ゼロになるの、なんでだろう。',
        '【悲報】{theme}を始めた結果\n\n・自由な時間：減った\n・お財布の中身：変わらない\n・スマホのスクリーンタイム：増えた\n・謎の達成感：爆増\n・人生の充実度：なぜか上がった\n\n{theme}、コスパ最強説。'
      ],
      question: [
        '{theme}やってない人ってマジで何して生きてるの？（煽りじゃなくて純粋な疑問）\n\n別にやらなくても生きていけるけど、\nやったら人生のスパイスが増える。\n\n{theme}は「なくても死なないけど、あると生きるのが楽しくなるもの」です。',
        '{theme}始めようか迷ってるそこのあなた。\n\n一つだけ聞いていい？\n\n「来月の自分も同じこと言ってない？」\n\n去年も同じこと思ってたでしょ？\n来年も同じこと思うよ？\n\n{theme}、始めるなら今日。\n明日の自分に期待するのはやめよう。',
        '{theme}ガチ勢の朝\n「今日も{theme}できる！最高！」\n\n{theme}エアプ勢の朝\n「{theme}っていいのかな…でもな…」\n\nどっちになりたい？\n答えは決まってるよね？\n\nさあ、{theme}の世界へようこそ。'
      ]
    }
  };

  var TARGET_SUFFIX = {
    general: '',
    biz: '\n\n#ビジネス #仕事術',
    student: '\n\n#学生 #成長',
    mama: '\n\n#子育て #ママパパ'
  };

  function generate() {
    var theme = document.getElementById('theme').value.trim();
    if (!theme) { alert('テーマを入力してください'); return; }

    var tone = document.getElementById('tone').value;
    var target = document.getElementById('target').value;
    var templates = TEMPLATES[tone];
    var suffix = TARGET_SUFFIX[target];

    var types = [
      { key: 'empathy', label: '共感型', cls: 'empathy' },
      { key: 'number',  label: '数字型', cls: 'number' },
      { key: 'question', label: '問いかけ型', cls: 'question' }
    ];

    var html = '';
    types.forEach(function(t) {
      var pool = templates[t.key];
      var text = pool[Math.floor(Math.random() * pool.length)];
      text = text.replace(/\{theme\}/g, theme) + suffix;
      var len = text.length;
      var overClass = len > 140 ? ' over' : '';

      html += '<div class="post-card">'
        + '<div class="post-card-header">'
        + '<span class="post-type-badge ' + t.cls + '">' + t.label + '</span>'
        + '<span class="char-count' + overClass + '">' + len + ' / 140字</span>'
        + '</div>'
        + '<div class="post-text">' + escHtml(text) + '</div>'
        + '<button class="btn-copy" onclick="copyText(this)" data-text="' + escAttr(text) + '">📋 コピーする</button>'
        + '</div>';
    });

    document.getElementById('results').innerHTML = html;
    saveHistory(theme);
  }

  function copyText(btn) {
    var text = btn.getAttribute('data-text');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    btn.classList.add('copied');
    btn.textContent = '✅ コピーしました！';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.textContent = '📋 コピーする';
    }, 1500);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'&#10;');
  }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'sns_template_history';

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveHistory(keyword) {
    var hist = getHistory();
    hist = hist.filter(function(h) { return h !== keyword; });
    hist.unshift(keyword);
    if (hist.length > 10) hist = hist.slice(0, 10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
    renderHistory();
  }

  function deleteHistory(idx) {
    var hist = getHistory();
    hist.splice(idx, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
    renderHistory();
  }

  function useHistory(keyword) {
    document.getElementById('theme').value = keyword;
    generate();
  }

  function renderHistory() {
    var hist = getHistory();
    var card = document.getElementById('history-card');
    if (hist.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    var html = '';
    hist.forEach(function(h, i) {
      html += '<div class="history-item">'
        + '<span class="history-keyword" onclick="useHistory(\'' + escAttr(h) + '\')">' + escHtml(h) + '</span>'
        + '<button class="history-delete" onclick="deleteHistory(' + i + ')">✕</button>'
        + '</div>';
    });
    document.getElementById('history-list').innerHTML = html;
  }

  // 初期表示
  renderHistory();
  </script>
