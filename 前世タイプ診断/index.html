<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3択の質問に7問答えるだけで、あなたの前世が何者だったかを楽しく診断。武士？魔女？旅人？意外な前世タイプが分かるエンタメ占いアプリです。">
  <title>前世タイプ診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── プログレスバー ── */
    .progress-wrap {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1.2rem;
    }
    .progress-bar {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.75rem; color: var(--text-sub); text-align: right; margin-top: 0.3rem;
    }

    /* ── 質問カード ── */
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; text-align: center;
    }
    .choice-btn {
      display: block; width: 100%; padding: 0.9rem 1rem;
      margin-bottom: 0.7rem; font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: translateY(1px); }

    /* ── 結果詳細 ── */
    .type-emoji { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
    .type-name { font-size: 1.4rem; font-weight: 900; text-align: center; color: var(--accent); margin-bottom: 0.3rem; }
    .type-title { font-size: 0.88rem; font-weight: 600; text-align: center; color: var(--text-sub); margin-bottom: 1rem; }
    .type-desc { font-size: 0.9rem; color: var(--text); line-height: 1.7; margin-bottom: 1rem; }
    .type-advice {
      background: var(--accent-light); border-left: 3px solid var(--accent);
      padding: 0.8rem 1rem; border-radius: 0 8px 8px 0;
      font-size: 0.85rem; color: var(--text); line-height: 1.6;
    }
    .type-advice strong { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔮 前世タイプ診断</h1>
    <p class="subtitle">3択の質問に答えるだけで、あなたの前世が何者だったか楽しく占えます。</p>
  </header>

  <!-- プログレスバー -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <p class="progress-text" id="progress-text">1 / 7</p>
  </div>

  <!-- 質問カード -->
  <div class="card" id="question-card">
    <p class="question-text" id="question-text"></p>
    <button class="choice-btn" id="c0" onclick="answer(0)"></button>
    <button class="choice-btn" id="c1" onclick="answer(1)"></button>
    <button class="choice-btn" id="c2" onclick="answer(2)"></button>
  </div>

  <!-- 結果カード -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">あなたの前世は…</p>
    <p class="type-emoji" id="r-emoji"></p>
    <p class="type-name" id="r-name"></p>
    <p class="type-title" id="r-title"></p>
    <p class="type-desc" id="r-desc"></p>
    <div class="type-advice" id="r-advice"></div>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc no-print" id="retry-btn" style="display:none" onclick="retry()">🔮 もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 この診断はエンタメ目的のオリジナル占いです。科学的根拠はありませんが、楽しい気づきのきっかけとしてお使いください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 質問データ（7問・各3択） ──
  // 各選択肢に [A, B, C, D, E, F, G, H] の8タイプへのスコア配列
  var QUESTIONS = [
    {
      q: '休日の朝、目が覚めたらまず何をしたい？',
      choices: [
        { text: '🗡️ 体を動かして汗を流したい', scores: [2,0,0,1,0,0,1,0] },
        { text: '📚 静かに読書や考え事をしたい', scores: [0,2,1,0,0,1,0,0] },
        { text: '🎨 何か作品を作りたい・絵を描きたい', scores: [0,0,0,0,2,1,0,1] }
      ]
    },
    {
      q: '友達と意見が割れた。あなたはどうする？',
      choices: [
        { text: '💪 自分の意見を堂々と主張する', scores: [2,0,0,1,0,0,1,0] },
        { text: '🤝 みんなの意見をまとめて妥協点を探す', scores: [0,1,0,0,0,2,0,1] },
        { text: '🔍 一歩引いて冷静に状況を観察する', scores: [0,2,1,0,0,0,0,1] }
      ]
    },
    {
      q: '旅行に行くならどんな場所？',
      choices: [
        { text: '🏔️ 誰も知らない秘境や遺跡', scores: [0,0,1,2,0,0,1,0] },
        { text: '🏰 歴史ある古い街並みや城', scores: [1,1,0,0,0,1,1,0] },
        { text: '🌿 自然豊かな森や湖のほとり', scores: [0,0,2,0,1,0,0,1] }
      ]
    },
    {
      q: 'もし超能力を一つ手に入れられるなら？',
      choices: [
        { text: '🔥 炎や雷を自在に操る力', scores: [1,0,0,0,0,0,2,1] },
        { text: '💫 未来を見通す予知能力', scores: [0,2,1,0,0,1,0,0] },
        { text: '🌱 傷を癒す治癒の力', scores: [0,0,1,0,1,1,0,1] }
      ]
    },
    {
      q: '大切な人へのプレゼント、何を選ぶ？',
      choices: [
        { text: '✋ 自分の手で作った世界に一つのもの', scores: [0,0,0,0,2,0,0,1] },
        { text: '📖 心に響く言葉を書いた手紙', scores: [0,1,1,0,1,1,0,0] },
        { text: '💎 値段は気にせず最高のものを贈る', scores: [1,0,0,1,0,0,1,1] }
      ]
    },
    {
      q: '困っている人を見かけた。あなたの行動は？',
      choices: [
        { text: '🛡️ すぐに駆け寄って助ける', scores: [2,0,0,1,0,0,1,0] },
        { text: '🧠 最善の助け方を考えてから動く', scores: [0,2,1,0,0,1,0,0] },
        { text: '🌟 励ましの言葉をかけて勇気づける', scores: [0,0,0,0,1,1,0,2] }
      ]
    },
    {
      q: '生まれ変わったら何になりたい？',
      choices: [
        { text: '🦅 大空を自由に飛ぶ鳥', scores: [0,0,0,2,1,0,1,0] },
        { text: '🐉 伝説の竜', scores: [1,0,0,0,0,0,2,1] },
        { text: '🌳 千年を生きる大木', scores: [0,1,2,0,0,1,0,0] }
      ]
    }
  ];

  // ── 8つの前世タイプ ──
  var TYPES = [
    { emoji: '⚔️', name: '戦国武将', title: '— 戦場を駆けた熱き指揮官', desc: 'あなたの前世は、戦国時代を駆け抜けた武将でした。強い信念とリーダーシップで仲間を率い、どんな困難にも正面から立ち向かう勇敢な魂の持ち主です。現世でもその決断力と行動力が光っているはず。', advice: '<strong>💡 前世からのアドバイス：</strong>突っ走りがちな時こそ、一息ついて周りの声を聞いてみて。あなたの強さは、仲間と一緒だともっと輝きます。' },
    { emoji: '🧙', name: '宮廷の賢者', title: '— 知恵で国を導いた参謀', desc: 'あなたの前世は、王に仕えた知恵者でした。冷静な分析力と深い洞察力で難問を解決し、多くの人を正しい道へ導いてきました。現世でも「この人に聞けば間違いない」と頼られる存在でしょう。', advice: '<strong>💡 前世からのアドバイス：</strong>考えすぎて動けなくなることも。たまには直感を信じて飛び込むと、思わぬ発見がありますよ。' },
    { emoji: '🌿', name: '森の魔女', title: '— 自然と語り合うヒーラー', desc: 'あなたの前世は、深い森に住む薬草の魔女でした。自然の声を聞き、草花の力で人々を癒す穏やかな存在。現世でも動物や植物に好かれやすく、周りの人をほっとさせる不思議な魅力を持っています。', advice: '<strong>💡 前世からのアドバイス：</strong>人の世話ばかりしていると自分が疲れてしまいます。自分を癒す時間も大切にしてくださいね。' },
    { emoji: '🧭', name: '大航海時代の冒険家', title: '— 未知の海を渡った探求者', desc: 'あなたの前世は、大航海時代に新大陸を目指した冒険家でした。未知への好奇心と恐れ知らずの行動力で、誰も見たことのない景色を見てきた魂です。現世でも「やったことないこと」にワクワクするタイプでは？', advice: '<strong>💡 前世からのアドバイス：</strong>冒険も大事だけど、たまには港（家）でゆっくり休むことも大切。帰る場所があるからこそ旅は楽しいのです。' },
    { emoji: '🎭', name: 'ルネサンスの芸術家', title: '— 美を追い求めた天才', desc: 'あなたの前世は、ルネサンス期に活躍した芸術家でした。美しいものを生み出す才能と繊細な感性を持ち、作品を通じて人の心を動かしてきました。現世でもクリエイティブな才能が眠っているはずです。', advice: '<strong>💡 前世からのアドバイス：</strong>完璧を求めすぎて手が止まることも。「まず作ってみる」の精神で、6割の出来でもまず世に出してみましょう。' },
    { emoji: '👘', name: '平安貴族', title: '— 雅を愛した文化人', desc: 'あなたの前世は、平安時代の貴族でした。歌や書を嗜み、人との調和を大切にする優雅な魂です。争いを好まず、美しい言葉と気配りで人間関係を円滑にする才能があります。現世でも場の空気を読むのが得意では？', advice: '<strong>💡 前世からのアドバイス：</strong>空気を読みすぎて自分の気持ちを後回しにしがち。たまには「自分はこうしたい」とハッキリ伝えてみて。' },
    { emoji: '🐉', name: '伝説の龍使い', title: '— 神話に名を刻んだ英雄', desc: 'あなたの前世は、伝説の龍を従えた英雄でした。圧倒的なカリスマ性と強大な力を持ち、人々から畏敬の念を集めていた存在です。現世でも「あの人にはかなわない」と思わせるオーラがあるかもしれません。', advice: '<strong>💡 前世からのアドバイス：</strong>強さだけでは人はついてきません。弱さを見せる勇気が、本当の強さにつながります。' },
    { emoji: '✨', name: '古代の巫女', title: '— 神託を伝えた神秘の存在', desc: 'あなたの前世は、古代の神殿に仕えた巫女でした。人の心を読み取り、言葉にならない想いを汲み取る不思議な力を持っていました。現世でも「なんでわかるの？」と驚かれることが多いのでは？', advice: '<strong>💡 前世からのアドバイス：</strong>人の感情を受け取りすぎて疲れることも。定期的に一人の静かな時間を作って、自分の心をリセットしましょう。' }
  ];

  var current = 0;
  var scores = [0,0,0,0,0,0,0,0];

  function showQuestion() {
    var q = QUESTIONS[current];
    document.getElementById('question-text').textContent = 'Q' + (current + 1) + '. ' + q.q;
    for (var i = 0; i < 3; i++) {
      document.getElementById('c' + i).textContent = q.choices[i].text;
    }
    document.getElementById('progress-fill').style.width = (current / QUESTIONS.length * 100) + '%';
    document.getElementById('progress-text').textContent = (current + 1) + ' / ' + QUESTIONS.length;
  }

  function answer(idx) {
    var chosen = QUESTIONS[current].choices[idx].scores;
    for (var i = 0; i < scores.length; i++) {
      scores[i] += chosen[i];
    }
    current++;
    if (current < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    // プログレスを100%に
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').textContent = '完了！';

    // 質問カードを隠す
    document.getElementById('question-card').style.display = 'none';

    // 最高スコアのタイプを特定
    var maxIdx = 0;
    for (var i = 1; i < scores.length; i++) {
      if (scores[i] > scores[maxIdx]) maxIdx = i;
    }
    var t = TYPES[maxIdx];

    // 結果を表示
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent = t.name;
    document.getElementById('r-title').textContent = t.title;
    document.getElementById('r-desc').textContent = t.desc;
    document.getElementById('r-advice').innerHTML = t.advice;
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('retry-btn').style.display = 'block';
  }

  function retry() {
    current = 0;
    scores = [0,0,0,0,0,0,0,0];
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('question-card').style.display = 'block';
    showQuestion();
  }

  // 初期表示
  showQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
