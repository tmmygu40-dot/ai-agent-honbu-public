<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今日の悩みを3択で選ぶと、不安を笑いに変えるポジティブ一言を即シャッフル表示。落ち込んだ日に1秒で気分を切り替えるための無料おみくじアプリです。">
  <title>不安シャッフル変換おみくじ｜悩みを笑いに変える1秒おみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .cat-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .cat-item {
      flex: 1 1 30%;
      min-width: 90px;
      cursor: pointer;
      user-select: none;
    }
    .cat-item input { display: none; }
    .cat-item .cat-label {
      display: block;
      padding: 0.85rem 0.4rem;
      text-align: center;
      font-size: 0.92rem; font-weight: 700;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .cat-item input:checked + .cat-label {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .cat-emoji { display: block; font-size: 1.4rem; margin-bottom: 0.2rem; line-height: 1; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      background: var(--accent-light);
    }
    .result-emoji-big { font-size: 2.6rem; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-value {
      font-size: 1.25rem; font-weight: 900; letter-spacing: -0.01em;
      line-height: 1.5; color: var(--accent); margin-bottom: 0.6rem;
    }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }

    .history-row {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.2rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.5;
    }
    .history-row:last-child { border-bottom: none; }
    .history-cat {
      flex-shrink: 0;
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.18rem 0.5rem;
      border-radius: 6px;
      margin-top: 0.1rem;
    }
    .history-text { flex: 1; color: var(--text); }
    .history-empty { padding: 0.8rem 0.2rem; color: var(--text-sub); font-size: 0.85rem; text-align: center; }
    .btn-clear {
      display: block; margin: 0.8rem auto 0; padding: 0.45rem 1rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
    }
    .btn-clear:hover { color: var(--ng); border-color: var(--ng); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>不安シャッフル変換おみくじ</h1>
    <p class="subtitle">悩みを3択で選ぶだけ。1秒で笑えるポジティブ一言が出ます ※気分転換用の遊びアプリです</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">今日のモヤモヤは？</p>
    <div class="cat-row">
      <label class="cat-item">
        <input type="radio" name="cat" value="work" checked>
        <span class="cat-label"><span class="cat-emoji">💼</span>仕事</span>
      </label>
      <label class="cat-item">
        <input type="radio" name="cat" value="rel">
        <span class="cat-label"><span class="cat-emoji">💬</span>人間関係</span>
      </label>
      <label class="cat-item">
        <input type="radio" name="cat" value="money">
        <span class="cat-label"><span class="cat-emoji">💸</span>お金・将来</span>
      </label>
    </div>
  </div>

  <!-- シャッフルボタン -->
  <button class="btn-calc" onclick="shuffle()">🎲 シャッフルする</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">🎯</p>
    <p class="result-label">今日のひとこと</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 履歴カード -->
  <div class="card">
    <p class="card-title">引いた一言の履歴（最新10件）</p>
    <div id="hist"></div>
    <button class="btn-clear" onclick="clearHist()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このアプリは気分転換の遊びです。深刻な不安が続く時は、内閣府「まもろうよこころ」など公的な相談窓口もあわせてご活用ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'omikuji_history_v1';

  var POOL = {
    work: [
      { e: '🍡', m: 'やる気が出ないのは脳が「今は休めば？」と賢く判断してるだけ。お茶でも飲もう。' },
      { e: '🐢', m: 'ToDoが終わらない日は、地球の自転に負けてるだけだから気にしなくていい。' },
      { e: '🦥', m: '今日の生産性ゼロは、明日の伸びしろ100%という意味です（諸説あり）。' },
      { e: '🌋', m: 'ミスしたあなたは、人類の進化に必要な「失敗データ」を提供した英雄です。' },
      { e: '🥐', m: '締め切りに追われてる時のあなたは、実は社会で一番カッコいい状態らしいよ。' },
      { e: '🐈', m: '会議で発言できなかった日は、猫として生きていた前世が出ただけ。問題なし。' },
      { e: '🍳', m: '上司の小言は脳のスキマに溜まる埃。寝れば翌朝には消えてます。' },
      { e: '🪴', m: '評価されない仕事ほど、あなたの「徳」がコッソリ積まれてるらしい。仏か。' },
      { e: '🎈', m: '月曜が憂鬱なのは正常。むしろ楽しみな人がいたら新興宗教を疑うレベル。' },
      { e: '🛟', m: '仕事できる人ほど早く帰る。早く帰れない日は、まだ人生の練習中ってだけ。' }
    ],
    rel: [
      { e: '🐹', m: 'あの人の冷たい態度は、ただお腹が空いてるだけ説。エサ（コーヒー）を渡してみよう。' },
      { e: '🪞', m: '気まずい沈黙は、二人とも頭の中で同じくらい焦ってるという連帯の証です。' },
      { e: '🧃', m: '既読スルーされたら「相手のスマホが冷蔵庫の中にある」と思って忘れていい。' },
      { e: '🐠', m: '苦手な人とは、別の水槽で泳いでるだけ。同じ海にいなくていいんだよ。' },
      { e: '🎀', m: '人間関係の悩みの9割は、寝てカレー食べたら半分になります（脳科学的なやつ）。' },
      { e: '🐧', m: 'うまく話せない日は、あなたが「ペンギン形態」になってるだけ。可愛いから許される。' },
      { e: '🍿', m: '誰かに嫌われた？ 全人類に好かれてるのは塩むすびだけって言うじゃないですか。' },
      { e: '🪁', m: '気を遣いすぎたあなた、もう今日は他人に1ミリも気を遣わなくて大丈夫。許可します。' },
      { e: '🌷', m: '陰口を言われた気がする日は、あなたが今日「主役級」だったってこと。誇って。' },
      { e: '🦔', m: 'うざい人と距離を取るのは、自分の心の家賃を払わない人を追い出すのと同じ。正解。' }
    ],
    money: [
      { e: '🪙', m: '貯金が増えない月は、思い出という非課税資産を爆積みしてた可能性が大。' },
      { e: '🧧', m: 'お金の不安は、脳が「もっと頑張れる」と勘違いしてる暴走だから一回深呼吸。' },
      { e: '🍣', m: '節約に疲れた日は、回らない寿司じゃなく回る寿司の極み2貫で気分爆上げできる。' },
      { e: '📦', m: '老後2000万円問題、実は「2000万円の心配する元気がある人」が勝ち組らしいよ。' },
      { e: '🎰', m: '無駄遣いした罪悪感は、3日後には「いい買い物だった」に進化する不思議。' },
      { e: '🐖', m: '給料日まで遠い時は、空腹が一番のスパイスという古代からの知恵を発動しよう。' },
      { e: '🏝', m: '将来の不安は未来の自分に丸投げOK。未来の自分、今のあなたより賢いから大丈夫。' },
      { e: '🪴', m: 'お金が無い時こそ、図書館・公園・夕焼けという無料の三大富豪コンテンツを使え。' },
      { e: '🎁', m: '今月赤字でも、あなたの存在は時価億超えなので帳尻は合ってます。安心して。' },
      { e: '🍵', m: '物価高？ お茶っ葉は3煎まで戦える。日本人の知恵で乗り切れる。たぶん。' }
    ]
  };

  var CAT_LABEL = { work: '仕事', rel: '人間関係', money: 'お金' };

  function pick(cat) {
    var list = POOL[cat] || POOL.work;
    return list[Math.floor(Math.random() * list.length)];
  }

  function shuffle() {
    var cat = document.querySelector('input[name="cat"]:checked').value;
    var item = pick(cat);
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('re').textContent = item.e;
    document.getElementById('rv').textContent = item.m;
    document.getElementById('rn').textContent = '※真面目に受け取らず、ふっと笑う用です';
    saveHist(cat, item);
    renderHist();
  }

  function loadHist() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : [];
    } catch (e) { return []; }
  }
  function saveHist(cat, item) {
    var arr = loadHist();
    arr.unshift({ cat: cat, e: item.e, m: item.m, t: Date.now() });
    if (arr.length > 10) arr = arr.slice(0, 10);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
  }
  function renderHist() {
    var arr = loadHist();
    var el = document.getElementById('hist');
    if (arr.length === 0) {
      el.innerHTML = '<p class="history-empty">まだ履歴はありません</p>';
      return;
    }
    el.innerHTML = arr.map(function(x){
      var lbl = CAT_LABEL[x.cat] || '—';
      return '<div class="history-row">'
           + '<span class="history-cat">' + lbl + '</span>'
           + '<span class="history-text">' + x.e + ' ' + escapeHtml(x.m) + '</span>'
           + '</div>';
    }).join('');
  }
  function clearHist() {
    if (!confirm('履歴を全部消します。よろしいですか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderHist();
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  renderHist();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
