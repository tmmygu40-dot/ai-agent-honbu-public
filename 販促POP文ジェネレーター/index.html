<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販促POP文ジェネレーター</title>
  <meta name="description" content="商品名・特徴・価格を入力するだけで、店頭POPや販促チラシに使えるキャッチコピー・説明文・セール訴求文を3パターン即生成。コピーボタン付きで使いやすい販促文作成ツール。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-area { display: none; }
    .result-area.visible { display: block; }

    .pattern-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.2rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .pattern-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .pattern-type {
      font-size: 0.82rem; font-weight: 600; color: var(--text-sub);
      margin-bottom: 0.6rem;
    }
    .pattern-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text);
      min-height: 60px;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: block; width: 100%;
      padding: 0.55rem 1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer; text-align: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: #ffe8c0; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>販促POP文ジェネレーター</h1>
    <p class="subtitle">商品情報を入れるだけで、POP・チラシ用の訴求文を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="productName">商品名 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="productName" placeholder="例: 国産はちみつ レモン風味">
    </div>
    <div class="field">
      <label for="productFeatures">商品の特徴・ウリ</label>
      <textarea id="productFeatures" placeholder="例: 国産レモン果汁使用、無添加、スッキリとした甘さ、ギフトにも最適"></textarea>
      <p class="hint">複数ある場合は読点（、）や改行で区切ってください</p>
    </div>
    <div class="field">
      <label for="productPrice">価格・キャンペーン内容</label>
      <input type="text" id="productPrice" placeholder="例: 1,280円（税込）/ 2個で2,000円">
      <p class="hint">価格・セール情報・期間など自由に入力</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">訴求文を生成する</button>

  <!-- 生成結果エリア -->
  <div class="result-area" id="resultArea">

    <div class="pattern-card">
      <p class="pattern-label">PATTERN 1</p>
      <p class="pattern-type">キャッチコピー風 — 目を引く短文</p>
      <div class="pattern-text" id="text1"></div>
      <button class="btn-copy" onclick="copyText('text1', this)">📋 コピーする</button>
    </div>

    <div class="pattern-card">
      <p class="pattern-label">PATTERN 2</p>
      <p class="pattern-type">説明文風 — 特徴をしっかり伝える</p>
      <div class="pattern-text" id="text2"></div>
      <button class="btn-copy" onclick="copyText('text2', this)">📋 コピーする</button>
    </div>

    <div class="pattern-card">
      <p class="pattern-label">PATTERN 3</p>
      <p class="pattern-type">セール訴求風 — 価格・お得感を前面に</p>
      <div class="pattern-text" id="text3"></div>
      <button class="btn-copy" onclick="copyText('text3', this)">📋 コピーする</button>
    </div>

  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 生成されたテキストはそのまま使うほか、ご自身でアレンジしてお使いください。商品情報は端末内に保存され、外部には送信されません。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_NAME     = 'pop_name';
  var LS_FEATURES = 'pop_features';
  var LS_PRICE    = 'pop_price';

  // 起動時に前回入力を復元
  (function() {
    var n = localStorage.getItem(LS_NAME);
    var f = localStorage.getItem(LS_FEATURES);
    var p = localStorage.getItem(LS_PRICE);
    if (n) document.getElementById('productName').value = n;
    if (f) document.getElementById('productFeatures').value = f;
    if (p) document.getElementById('productPrice').value = p;
    if (n) generate();
  })();

  function generate() {
    var name     = document.getElementById('productName').value.trim();
    var features = document.getElementById('productFeatures').value.trim();
    var price    = document.getElementById('productPrice').value.trim();

    if (!name) {
      alert('商品名を入力してください');
      return;
    }

    // localStorage に保存
    localStorage.setItem(LS_NAME,     name);
    localStorage.setItem(LS_FEATURES, features);
    localStorage.setItem(LS_PRICE,    price);

    // 特徴の分割（最大3つ）
    var featureList = features
      ? features.split(/[、,，\n]/).map(function(s){ return s.trim(); }).filter(Boolean)
      : [];
    var feat1 = featureList[0] || '';
    var feat2 = featureList[1] || '';
    var feat3 = featureList[2] || '';

    var priceStr = price ? price : '';

    // ── PATTERN 1: キャッチコピー風 ──
    var p1 = buildCatchCopy(name, feat1, feat2, priceStr);
    // ── PATTERN 2: 説明文風 ──
    var p2 = buildDescription(name, featureList, priceStr);
    // ── PATTERN 3: セール訴求風 ──
    var p3 = buildSaleText(name, featureList, priceStr);

    document.getElementById('text1').textContent = p1;
    document.getElementById('text2').textContent = p2;
    document.getElementById('text3').textContent = p3;

    document.getElementById('resultArea').classList.add('visible');

    // コピーボタンをリセット
    document.querySelectorAll('.btn-copy').forEach(function(b) {
      b.textContent = '📋 コピーする';
      b.classList.remove('copied');
    });
  }

  function buildCatchCopy(name, feat1, feat2, price) {
    var lines = [];
    if (feat1) {
      lines.push(feat1 + 'の');
    }
    lines.push('【' + name + '】');
    if (feat2) {
      lines.push(feat2 + '！');
    } else if (feat1) {
      lines.push('こだわりの一品！');
    }
    if (price) {
      lines.push('');
      lines.push('▶ ' + price);
    }
    return lines.join('\n');
  }

  function buildDescription(name, featureList, price) {
    var lines = [];
    lines.push('━━━━━━━━━━━━━━━');
    lines.push(name);
    lines.push('━━━━━━━━━━━━━━━');
    if (featureList.length > 0) {
      lines.push('');
      featureList.forEach(function(f) {
        lines.push('✓ ' + f);
      });
    }
    if (price) {
      lines.push('');
      lines.push('価格：' + price);
    }
    lines.push('');
    lines.push('ぜひ一度お試しください。');
    return lines.join('\n');
  }

  function buildSaleText(name, featureList, price) {
    var lines = [];
    lines.push('★ お買い得情報 ★');
    lines.push('');
    lines.push('「' + name + '」');
    if (featureList.length > 0) {
      lines.push('');
      featureList.slice(0, 3).forEach(function(f) {
        lines.push('▶ ' + f);
      });
    }
    if (price) {
      lines.push('');
      lines.push('╔════════════════╗');
      lines.push('  特価　' + price);
      lines.push('╚════════════════╝');
    }
    lines.push('');
    lines.push('この機会にぜひどうぞ！');
    return lines.join('\n');
  }

  function copyText(id, btn) {
    var el = document.getElementById(id);
    var text = el.textContent;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
      }).catch(function() {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '0';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      showCopied(btn);
    } catch(e) {
      alert('コピーに失敗しました。手動でテキストを選択してください。');
    }
    document.body.removeChild(ta);
  }

  function showCopied(btn) {
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '📋 コピーする';
      btn.classList.remove('copied');
    }, 2000);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
