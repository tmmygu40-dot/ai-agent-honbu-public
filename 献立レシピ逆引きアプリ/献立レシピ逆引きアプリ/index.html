<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>献立レシピ逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ヘッダー */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* カード共通 */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* 食材カテゴリ */
    .cat-section { margin-bottom: 1.2rem; }
    .cat-label {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .cat-label::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
    }

    /* 食材タグ */
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      padding: 0.32rem 0.75rem;
      font-size: 0.85rem; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text);
      cursor: pointer; transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tag:hover { border-color: var(--accent); background: var(--accent-light); }
    .tag.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent); font-weight: 700;
    }

    /* 選択済み表示 */
    .selected-bar {
      max-width: 640px; margin: 0 auto 0.8rem;
      font-size: 0.8rem; color: var(--text-sub);
      min-height: 1.2rem;
    }
    .selected-bar span { color: var(--accent); font-weight: 700; }

    /* ボタン類 */
    .btn-row {
      max-width: 640px; margin: 0 auto 1.2rem;
      display: flex; gap: 0.6rem;
    }
    .btn-search {
      flex: 1; padding: 0.9rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-search:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }
    .btn-reset {
      padding: 0.9rem 1.2rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: border-color 0.12s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* 結果ヘッダー */
    .result-header {
      display: none; max-width: 640px; margin: 0 auto 0.8rem;
    }
    .result-count {
      font-size: 0.85rem; color: var(--text-sub);
    }
    .result-count span { color: var(--accent); font-weight: 800; font-size: 1.1rem; }

    /* レシピカード */
    .recipe-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.8rem;
      max-width: 640px;
    }
    .recipe-header { display: flex; align-items: flex-start; gap: 0.7rem; margin-bottom: 0.8rem; }
    .recipe-match {
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 800;
      padding: 0.18rem 0.55rem; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0; margin-top: 0.15rem;
    }
    .recipe-name { font-size: 1.05rem; font-weight: 800; line-height: 1.3; }
    .recipe-category {
      font-size: 0.72rem; color: var(--text-sub); margin-top: 0.15rem;
    }
    .recipe-section { margin-bottom: 0.7rem; }
    .recipe-section:last-child { margin-bottom: 0; }
    .recipe-section-title {
      font-size: 0.74rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.3rem; letter-spacing: 0.05em;
    }
    .recipe-ingredients {
      font-size: 0.84rem; color: var(--text-sub); line-height: 1.6;
    }
    .recipe-ingredients .hit { color: var(--accent); font-weight: 700; }
    .recipe-steps {
      list-style: none; font-size: 0.84rem; line-height: 1.6;
    }
    .recipe-steps li {
      padding: 0.25rem 0;
      display: flex; gap: 0.6rem;
    }
    .recipe-steps li::before {
      content: attr(data-n); display: inline-flex;
      align-items: center; justify-content: center;
      min-width: 1.4rem; height: 1.4rem;
      background: var(--accent-light); color: var(--accent);
      border-radius: 50%; font-size: 0.7rem; font-weight: 800;
      flex-shrink: 0; margin-top: 0.08rem;
    }

    /* no-result */
    .no-result {
      display: none; max-width: 640px; margin: 0 auto;
      text-align: center; padding: 2.5rem 1rem;
      background: var(--card); border-radius: var(--radius);
      border: 1.5px solid var(--border);
      color: var(--text-sub); font-size: 0.9rem; line-height: 1.7;
    }

    /* 戻るリンク */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"

</head>

  // ── 選択食材の管理 ──
  var selected = new Set();

  function init() {
    // localStorage から復元
    try {
      var saved = JSON.parse(localStorage.getItem('recipe-ingredients') || '[]');
      saved.forEach(function(i) { selected.add(i); });
    } catch(e) {}

    // タグ生成
    Object.keys(CATEGORIES).forEach(function(catId) {
      var el = document.getElementById(catId);
      if (!el) return;
      CATEGORIES[catId].forEach(function(item) {
        var tag = document.createElement('span');
        tag.className = 'tag' + (selected.has(item) ? ' selected' : '');
        tag.textContent = item;
        tag.onclick = function() { toggleTag(item, tag); };
        el.appendChild(tag);
      });
    });

    updateBar();
  }

  function toggleTag(item, el) {
    if (selected.has(item)) {
      selected.delete(item);
      el.classList.remove('selected');
    } else {
      selected.add(item);
      el.classList.add('selected');
    }
    updateBar();
    saveSelected();
  }

  function updateBar() {
    var bar = document.getElementById('selected-bar');
    if (selected.size === 0) {
      bar.textContent = '食材を選んでください';
      return;
    }
    var list = Array.from(selected);
    bar.innerHTML = '選択中：<span>' + list.join('・') + '</span>（' + list.length + '品）';
  }

  function saveSelected() {
    try {
      localStorage.setItem('recipe-ingredients', JSON.stringify(Array.from(selected)));
    } catch(e) {}
  }

  function resetAll() {
    selected.clear();
    document.querySelectorAll('.tag.selected').forEach(function(t) {
      t.classList.remove('selected');
    });
    updateBar();
    saveSelected();
    document.getElementById('results').innerHTML = '';
    document.getElementById('result-header').style.display = 'none';
    document.getElementById('no-result').style.display = 'none';
  }

  function search() {
    if (selected.size === 0) {
      alert('食材を1つ以上選んでください');
      return;
    }

    var sel = Array.from(selected);

    // 各レシピのマッチ数を計算
    var scored = RECIPES.map(function(r) {
      var allRequired = r.req.concat(r.opt || []);
      var matchCount = 0;
      var reqMatch = 0;
      allRequired.forEach(function(ing) {
        if (sel.includes(ing)) matchCount++;
      });
      r.req.forEach(function(ing) {
        if (sel.includes(ing)) reqMatch++;
      });
      return { recipe: r, match: matchCount, reqMatch: reqMatch };
    });

    // reqMatch >= 1（必須食材を1つ以上持っている）のものだけ表示
    var filtered = scored.filter(function(s) { return s.reqMatch >= 1; });

    // マッチ数の多い順にソート
    filtered.sort(function(a, b) { return b.match - a.match; });

    var resultsEl = document.getElementById('results');
    var headerEl = document.getElementById('result-header');
    var noResultEl = document.getElementById('no-result');

    if (filtered.length === 0) {
      resultsEl.innerHTML = '';
      headerEl.style.display = 'none';
      noResultEl.style.display = '';
      noResultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    noResultEl.style.display = 'none';
    headerEl.style.display = '';
    document.getElementById('result-count').innerHTML =
      '<span>' + filtered.length + '件</span>のレシピが見つかりました';

    resultsEl.innerHTML = filtered.map(function(s) {
      var r = s.recipe;
      // 食材テキストのハイライト
      var allIng = r.all;
      sel.forEach(function(i) {
        allIng = allIng.split(i).join('<span class="hit">' + i + '</span>');
      });

      var stepsHtml = r.steps.map(function(step, idx) {
        return '<li data-n="' + (idx + 1) + '">' + esc(step) + '</li>';
      }).join('');

      return '<div class="recipe-card">'
        + '<div class="recipe-header">'
        + '<span class="recipe-match">食材 ' + s.match + '品一致</span>'
        + '<div><p class="recipe-name">' + esc(r.name) + '</p>'
        + '<p class="recipe-category">' + esc(r.category) + '</p></div>'
        + '</div>'
        + '<div class="recipe-section">'
        + '<p class="recipe-section-title">材料</p>'
        + '<p class="recipe-ingredients">' + allIng + '</p>'
        + '</div>'
        + '<div class="recipe-section">'
        + '<p class="recipe-section-title">作り方</p>'
        + '<ol class="recipe-steps">' + stepsHtml + '</ol>'
        + '</div>'
        + '</div>';
    }).join('');

    headerEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
  </script>
