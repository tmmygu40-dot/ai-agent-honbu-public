<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デジタルおみくじ｜猫型ポケット</title>
<meta name="description" content="ボタン1つで今日の運勢がわかるデジタルおみくじ。ラッキーカラーとひとことメッセージ付き。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#fdf6e8;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem}
h1{font-size:1.4rem;margin-bottom:.3rem;color:#8b3a0f;text-align:center}
.sub{font-size:.85rem;color:#999;margin-bottom:2rem;text-align:center}
.wrap{width:100%;max-width:380px;text-align:center}
.draw-btn{background:linear-gradient(135deg,#c0392b,#8b3a0f);color:#fff;border:none;border-radius:50%;width:120px;height:120px;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(139,58,15,.4);transition:transform .15s,box-shadow .15s;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem}
.draw-btn:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(139,58,15,.5)}
.draw-btn:active{transform:scale(.95)}
.draw-btn .icon{font-size:1.8rem;line-height:1}
.result{display:none;margin-top:2rem;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.scroll{background:linear-gradient(180deg,#fff9ee,#fff3d4);border:2px solid #d4a843;border-radius:8px;padding:0;box-shadow:0 3px 14px rgba(180,140,60,.3);overflow:hidden}
.scroll-rod{height:14px;background:linear-gradient(90deg,#b8860b,#daa520,#f0c040,#daa520,#b8860b);border-radius:0}
.scroll-body{padding:1.4rem 1.2rem}
.f-label{font-size:.75rem;color:#aaa;letter-spacing:.15em;margin-bottom:.3rem}
.f-name{font-size:3.2rem;font-weight:700;letter-spacing:.05em;line-height:1;margin-bottom:.3rem}
.f-ruby{font-size:.9rem;color:#888;margin-bottom:1rem}
.f-msg{font-size:.92rem;line-height:1.75;color:#444;text-align:left;margin-bottom:1.1rem}
.tags{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.tag{font-size:.78rem;padding:.25rem .75rem;border-radius:20px;background:#f5e9c8;color:#7a4f00}
.btn-row{display:flex;gap:.8rem;justify-content:center;margin-top:1.4rem;flex-wrap:wrap}
.btn-a{background:#c0392b;color:#fff;border:none;padding:.55rem 1.3rem;border-radius:24px;font-size:.92rem;cursor:pointer}
.btn-c{background:#fff;color:#8b3a0f;border:2px solid #c0392b;padding:.55rem 1.3rem;border-radius:24px;font-size:.92rem;cursor:pointer}
.btn-a:hover,.btn-c:hover{opacity:.85}
.copied{font-size:.8rem;color:#27ae60;margin-top:.5rem;min-height:1.2rem}
.foot{font-size:.75rem;color:#ccc;margin-top:2.5rem;text-align:center}

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card, #fff); color: var(--text-sub, #666);
      border: 1.5px solid var(--border, #ddd); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent, #e07b00); color: var(--accent, #e07b00); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>
<script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
<h1>🎋 デジタルおみくじ</h1>
<p class="sub">今日の運勢を引いてみよう</p>
<div class="wrap">
  <button class="draw-btn" onclick="draw()"><span class="icon">🎋</span>おみくじを引く</button>
  <div class="result" id="result">
    <div class="scroll">
      <div class="scroll-rod"></div>
      <div class="scroll-body">
        <div class="f-label">本日の運勢</div>
        <div class="f-name" id="fname"></div>
        <div class="f-ruby" id="fruby"></div>
        <div class="f-msg" id="fmsg"></div>
        <div class="tags">
          <span class="tag">🎨 ラッキーカラー：<span id="fcolor"></span></span>
          <span class="tag">🔢 ラッキーナンバー：<span id="fnum"></span></span>
          <span class="tag">✨ 今日のひとこと：<span id="fadvice"></span></span>
        </div>
      </div>
      <div class="scroll-rod"></div>
    </div>
    <div class="btn-row">
      <button class="btn-a" onclick="draw()">もう一度引く</button>
      <button class="btn-c" onclick="copyResult()">結果をコピー</button>
    </div>
    <div class="copied" id="copied"></div>
  </div>
  <p class="foot">気軽に何度でも 🎋</p>
</div>
<script>
var F=[
  {n:'大吉',r:'だいきち',w:5,c:'#c8960c',msgs:['すべての運気が上昇中。積極的に動くと良いことが重なります。','今日は何をしても上手くいく日。チャンスを逃さずに。','大きなチャンスが訪れる予感。勇気を出して一歩踏み出して。']},
  {n:'吉',  r:'きち',    w:20,c:'#27ae60',msgs:['全体的に順調な一日。小さな親切が大きな縁を生みます。','穏やかに、でも確実に前進できる日。焦らず進もう。','良い知らせが届くかもしれません。メールや連絡をお見逃しなく。']},
  {n:'中吉',r:'ちゅうきち',w:25,c:'#2980b9',msgs:['まずまずの運気。コツコツ積み上げてきたことが実を結び始めます。','人との縁が幸運を運んでくれる日。大切な人を大事に。','午後から運気アップ。思ったよりスムーズに進む一日です。']},
  {n:'小吉',r:'しょうきち',w:20,c:'#16a085',msgs:['小さな幸運が積み重なる一日。見逃しがちな幸せに気づいて。','地道な努力が認められる日。今日の行動が明日の糧になります。','無理せず丁寧に過ごすことで、良い流れが生まれます。']},
  {n:'末吉',r:'すえきち',w:15,c:'#7f8c8d',msgs:['今はまだ種まきの時期。じっくり待てば花開きます。','焦らないことが吉。今日は準備や計画を練る日にしましょう。','ゆっくりとした流れの中にも、確かな前進があります。']},
  {n:'凶',  r:'きょう',  w:12,c:'#e74c3c',msgs:['慎重に行動する日。無理をせず、今できることに集中しましょう。','小さなミスに注意。確認を怠らず、丁寧に進めて。','今日は守りの日。新しいことより、現状維持を優先して。']},
  {n:'大凶',r:'だいきょう',w:3,c:'#8e44ad',msgs:['試練の日ですが、乗り越えた先に大きな成長が待っています。','今日は慎重に。しかし悲観せずに、ひとつひとつ丁寧に。','運気の底は上昇の始まり。今日を乗り切れば明日は明るい。']}
];
var COLORS=['赤','青','緑','黄','白','紫','オレンジ','ピンク','金','銀','水色','ベージュ'];
var ADVICE=['早起きする','深呼吸する','笑顔で挨拶する','水を1杯飲む','5分散歩する','好きな音楽を聴く','机を整理する','感謝を伝える','日光を浴びる','甘いものを食べる'];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function wRnd(a){var t=a.reduce(function(s,f){return s+f.w},0),r=Math.random()*t;for(var i=0;i<a.length;i++){r-=a[i].w;if(r<=0)return a[i];}return a[a.length-1];}
var last='';
function draw(){
  var f=wRnd(F),color=rnd(COLORS),num=Math.floor(Math.random()*9)+1,advice=rnd(ADVICE),msg=rnd(f.msgs);
  document.getElementById('fname').textContent=f.n;
  document.getElementById('fname').style.color=f.c;
  document.getElementById('fruby').textContent='（'+f.r+'）';
  document.getElementById('fmsg').textContent=msg;
  document.getElementById('fcolor').textContent=color;
  document.getElementById('fnum').textContent=num;
  document.getElementById('fadvice').textContent=advice;
  document.getElementById('result').style.display='block';
  document.getElementById('copied').textContent='';
  last='🎋デジタルおみくじ\n運勢：'+f.n+'（'+f.r+'）\n'+msg+'\nラッキーカラー：'+color+' / ラッキーナンバー：'+num+'\n今日のひとこと：'+advice;
}
function copyResult(){
  if(!last)return;
  navigator.clipboard&&navigator.clipboard.writeText(last).then(function(){
    document.getElementById('copied').textContent='✅ コピーしました！';
    setTimeout(function(){document.getElementById('copied').textContent='';},2000);
  });
}
</script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
