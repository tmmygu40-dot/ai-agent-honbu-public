<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 生年月日お金DNA診断</title>
  <meta name="description" content="生年月日から あなたの金銭感覚タイプを診断。節約派？散財派？向いている家計管理方法がわかります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💰 生年月日お金DNA診断</h1>
    <p class="subtitle">生年月日から あなたの金銭感覚タイプを診断します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="month">月</label>
      <select id="month">
        <option value="">選択してください</option>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
    <div class="field">
      <label for="day">日</label>
      <select id="day">
        <option value="">選択してください</option>
        <option value="1">1日-15日</option>
        <option value="2">16日-31日</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 詳細情報カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">詳細情報</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、統計学・行動経済学の基本理論と、個人の金銭感覚パターンを参考に、目安として作成しています。実際の家計管理は、個人の状況に合わせてカスタマイズしてください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 診断データ ──
  var MONEY_DNA = {
    '1-1': { type: '始まりの節約家', trait: '新年度の気分で、計画的に家計管理をコツコツ進めるタイプ。安定志向で、予算立てが得意。', management: '月初に家計簿をリセット。毎月の固定費と変動費を整理して、年間目安を立てる。', level: 'ok' },
    '1-2': { type: '年間設計者', trait: '1年通した金銭計画を立てるのが得意。季節ごとの支出変動を想定して準備する。', management: '年間スケジュール表を作成。ボーナス時期や大型支出を前もって計画。', level: 'ok' },
    '2-1': { type: '細かい派', trait: 'こまめなチェック派。日々の支出を細かく記録して、無駄を見つけるのが上手。', management: '毎日レシート確認。週ごとに支出を仕分けて、改善点を探す習慣。', level: 'ok' },
    '2-2': { type: '月次診断者', trait: '月ごとの収支バランスをチェックして、翌月へ活かすのが得意。PDCAが好き。', management: '月末に収支分析。翌月の予算調整に反映させる。', level: 'ok' },
    '3-1': { type: '対応力型', trait: '急な支出にも柔軟に対応。予備費を多めに確保して、安心感を重視。', management: '予備費・緊急費を月給の1.5倍程度確保。柔軟な家計管理枠を持つ。', level: 'warn' },
    '3-2': { type: 'メリハリ付け派', trait: 'イベントや季節で支出をメリハリ付ける。突発費用も織り込む。', management: 'イベント月を意識した予算。その月の優先順位を明確にする。', level: 'warn' },
    '4-1': { type: 'リセット好き', trait: '区切りを好む。新学期・新年度で家計をリセットして新たに始める。', management: '季節の区切りで家計を見直す習慣。新しいルールをよく試す。', level: 'ok' },
    '4-2': { type: '定期見直し者', trait: '定期的に家計診断を実施。3ヶ月ごとの見直しで改善を積み重ねる。', management: '四半期ごとに家計会議。目標達成度を確認して調整。', level: 'ok' },
    '5-1': { type: '計画型上手', trait: 'イベント・連休の使い方を計画的に。家計に組み込んで楽しむ。', management: 'イベント費用を月に分散計上。連休の支出を事前に見積もる。', level: 'warn' },
    '5-2': { type: '経験投資派', trait: '経験や思い出にお金を使うことを優先。その代わり、基本経費は締める。', management: '優先順位を明確に。体験費は予算化。固定費は厳選。', level: 'warn' },
    '6-1': { type: '準備万端派', trait: 'これからの季節変化に先読みして準備。季節先取りで賢く支出。', management: 'セール時期を活用。季節モノは前もって購入・準備。', level: 'ok' },
    '6-2': { type: '先読み計画者', trait: '3-6ヶ月先のイベント・必要品を見越して計画。無駄なく準備。', management: '長期カレンダーで大型支出を把握。早めの決定・購入。', level: 'ok' },
    '7-1': { type: '経験重視派', trait: 'この季節を楽しむことに価値を感じる。その代わり秋冬で調整。', management: '夏の経験費は許容。秋冬の家計を引き締めて帳尻合わせ。', level: 'warn' },
    '7-2': { type: 'メリハリの達人', trait: '支出・貯蓄をハッキリ分ける。今月は使う、来月は貯める、と切り替え。', management: '月ごとのテーマを決定。偶数月は貯蓄モード、奇数月は消費OKなど。', level: 'warn' },
    '8-1': { type: 'リバウンド型', trait: '前半の使い過ぎを後半で取り返す。底力がある。', management: '下期の家計は厳しくしない。持続可能なペースを工夫。', level: 'warn' },
    '8-2': { type: '後半集中型', trait: 'ペース配分が上手。後半になると家計引き締めモードに自動切替。', management: '後半の目標金額を月初に宣言。進捗を確認。', level: 'ok' },
    '9-1': { type: '見直し職人', trait: '秋の涼しさで、じっくり家計を見直す気になるタイプ。改善好き。', management: '年2回（春と秋）の家計診断。改善案をストック。', level: 'ok' },
    '9-2': { type: 'PDCA達人', trait: 'H1（上期）を振り返り、H2へ活かす。計画→実行→確認→改善の繰り返し。', management: '上期の家計評価書を作成。下期の重点改善項目を決定。', level: 'ok' },
    '10-1': { type: '冬支度派', trait: '冬の支出（光熱費など）を先読みして準備。計画的。', management: '10月から冬モード家計へ。光熱費・衣類費を多めに確保。', level: 'ok' },
    '10-2': { type: '先読み準備者', trait: '年末年始の支出を見越して、10月から準備。貯蓄ペースを調整。', management: '年末に向けた貯蓄目安を設定。月ごとのマイルストーン。', level: 'ok' },
    '11-1': { type: '税対策パーソン', trait: '年末の税金・控除を意識。ふるさと納税・保険見直しなどを活用。', management: '11月中に税効果をシミュレーション。12月の対策を決定。', level: 'ok' },
    '11-2': { type: '年末対応者', trait: 'ボーナス・年末手当を含めた、下期の家計総仕上げを得意とする。', management: 'ボーナス時に年間目標を最終確認。12月の調整計画。', level: 'ok' },
    '12-1': { type: '新年目標設定者', trait: '新しい年へ向けて、新しい家計目標を立てるのが得意。リセット志向。', management: '1月までに目標貯蓄額・支出目安を決定。新年スタートダッシュ。', level: 'ok' },
    '12-2': { type: '来年設計家', trait: '1年後の家計像を描いて、来年の月ごと目標を立てる。長期志向。', management: '年間目標を月別に分解。進捗ダッシュボード作成。', level: 'ok' }
  };

  var EMOJI_MSG = {
    ok:   { e: '😌', t: '計画的で、家計管理を上手に進められるタイプです。' },
    warn: { e: '🤔', t: 'メリハリをつけることで、さらに上手く管理できそうです。' },
    ng:   { e: '😱', t: '柔軟な対応が得意。予期しない支出にも強いタイプです。' }
  };

  var QA = {
    ok: [
      { q: '今のペースで大丈夫？', a: '計画的な進め方が得意なので、目標達成はほぼ確実です。継続が大事。' },
      { q: 'さらに効率化するなら？', a: '自動化を増やすといい。貯蓄の自動天引き・固定費の振替など。' },
      { q: '家族と共有するなら？', a: 'あなたの家計管理方針をパートナーに説明。予算方針を合わせるといい。' }
    ],
    warn: [
      { q: 'メリハリって何？', a: '「この月は使う」「この月は貯める」と意識的に切り替えること。' },
      { q: 'どう切り替える？', a: '生活必需品は確保しつつ、嗜好品の予算を月で変える工夫。' },
      { q: 'バランスを取るなら？', a: '月単位から四半期単位へ。3ヶ月でのトータル黒字を目指す。' }
    ],
    ng: [
      { q: 'パニックになりそう…', a: '急な支出に強いのはあなたの武器。予備費を厚めに持つだけで安心。' },
      { q: '予備費どのくらい？', a: '月給の1.5倍～2倍。あなたなら、それくらいあると柔軟に対応できる。' },
      { q: '計画も大事では？', a: 'その通り。柔軟さ＋最低限の基本予算で、バランスが取れます。' }
    ]
  };

  function calc() {
    var m = document.getElementById('month').value;
    var d = document.getElementById('day').value;
    if (!m || !d) { showErr('月と日を選択してください'); return; }

    var key = m + '-' + d;
    var data = MONEY_DNA[key];
    var level = data.level;
    var msg = data.trait;

    showResult(level, data.type, msg);
    showDetail([
      ['診断タイプ', data.type],
      ['性質・特徴', data.trait],
      ['おすすめの管理方法', data.management, true]
    ]);
    showQA(level);

    // localStorage に保存
    localStorage.setItem('moneyDNA', JSON.stringify({month: m, day: d, type: data.type, date: new Date().toLocaleString('ja-JP')}));
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showQA(level) {
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = '';
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td style="width:30%;">' + r[0] + '</td><td style="width:70%; text-align:left;">' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }

  // 前回の診断結果を自動復元
  window.onload = function() {
    var saved = localStorage.getItem('moneyDNA');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        document.getElementById('month').value = data.month;
        document.getElementById('day').value = data.day;
      } catch(e) {}
    }
  };
  </script>
