<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲み放題タイマー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🍺 飲み放題タイマー</h1>

    <div class="form-card">
      <h2>テーブル登録</h2>
      <div class="form-row">
        <label for="tableNum">テーブル番号</label>
        <input type="text" id="tableNum" placeholder="例：3番" maxlength="10">
      </div>
      <div class="form-row">
        <label for="startTime">着席時刻</label>
        <div class="time-input-row">
          <input type="time" id="startTime">
          <button id="nowBtn" class="btn-secondary">今すぐ</button>
        </div>
      </div>
      <div class="form-row">
        <label for="duration">制限時間（分）</label>
        <input type="number" id="duration" value="90" min="1" max="300">
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </div>

    <div class="table-list" id="tableList">
      <p class="empty-msg" id="emptyMsg">登録されているテーブルはありません</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
