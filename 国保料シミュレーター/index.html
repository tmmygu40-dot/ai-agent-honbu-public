<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国保料シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .field-row {
      display: flex; gap: 0.75rem;
    }
    .field-row .field { flex: 1; margin-bottom: 0; }

    /* ── チェックボックス ── */
    .check-field { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
    .check-field input[type="checkbox"] { width: 1.2rem; height: 1.2rem; accent-color: var(--accent); cursor: pointer; }
    .check-field label { font-size: 0.9rem; font-weight: 600; color: var(--text); cursor: pointer; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); background: var(--accent-light); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 注意カード ── */
    .notice-card {
      max-width: 600px; margin: 0 auto 1rem;
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: var(--radius); padding: 0.9rem 1rem;
      font-size: 0.78rem; color: #92400e; line-height: 1.6;
    }
    .notice-card b { display: block; margin-bottom: 0.3rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>国保料シミュレーター</h1>
    <p class="subtitle">月収と家族構成を入力して国民健康保険料の年額概算をすぐ確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">収入・年齢</p>
    <div class="field">
      <label for="monthly">月収（万円）</label>
      <input type="number" id="monthly" placeholder="例: 25" min="0" step="0.5">
      <p class="hint">税引き前の月収入を入力してください（給与収入ベース）</p>
    </div>
    <div class="field">
      <label for="age-group">本人の年齢帯</label>
      <select id="age-group">
        <option value="under40">39歳以下</option>
        <option value="40to64">40〜64歳（介護保険料あり）</option>
        <option value="over65">65歳以上（介護保険料なし）</option>
      </select>
    </div>
  </div>

  <!-- 家族構成カード -->
  <div class="card">
    <p class="card-title">家族構成（75歳未満）</p>
    <div class="check-field">
      <input type="checkbox" id="spouse">
      <label for="spouse">配偶者がいる（国保加入）</label>
    </div>
    <div class="field">
      <label for="children">子どもの人数（人）</label>
      <input type="number" id="children" placeholder="例: 2" min="0" max="20" step="1" value="0">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">年額保険料を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">年間国民健康保険料（概算）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注意書き -->
  <div class="notice-card" id="notice" style="display:none">
    <b>⚠ この計算について</b>
    全国平均的な保険料率（令和6年度参考値）を使った概算です。実際の保険料はお住まいの市区町村により異なります。正確な金額はお住まいの自治体窓口またはWebサイトでご確認ください。
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'kokuho_inputs';

  // 給与所得控除（給与収入→給与所得控除額）
  function kyuyoKojoFixed(nen) {
    if (nen <= 550000)  return 550000;
    if (nen <= 1625000) return 550000;
    if (nen <= 1800000) return Math.floor(nen * 0.4) - 100000;
    if (nen <= 3600000) return Math.floor(nen * 0.3) + 80000;
    if (nen <= 6600000) return Math.floor(nen * 0.2) + 440000;
    if (nen <= 8500000) return Math.floor(nen * 0.1) + 1100000;
    return 1950000;
  }

  function calc() {
    var monthly = parseFloat(document.getElementById('monthly').value);
    var ageGroup = document.getElementById('age-group').value;
    var hasSpouse = document.getElementById('spouse').checked;
    var children = parseInt(document.getElementById('children').value) || 0;

    if (isNaN(monthly) || monthly <= 0) {
      showErr('月収を入力してください');
      return;
    }

    // localStorage保存
    saveInputs();

    // 計算
    var nenShuu = monthly * 10000 * 12; // 年間収入（円）
    var kojo = kyuyoKojoFixed(nenShuu);
    var kisoKojo = 430000; // 基礎控除
    var kazeiShotoku = Math.max(0, nenShuu - kojo - kisoKojo);

    // 被保険者数
    var ninzu = 1 + (hasSpouse ? 1 : 0) + children;

    // 医療分（上限65万円）
    var iryoShotokuWari = kazeiShotoku * 0.0724;
    var iryoKintouWari  = ninzu * 29100;
    var iryoHeitoWari   = 22800;
    var iryo = Math.min(iryoShotokuWari + iryoKintouWari + iryoHeitoWari, 650000);

    // 後期高齢者支援金分（上限24万円）
    var koukiShotokuWari = kazeiShotoku * 0.0254;
    var koukiKintouWari  = ninzu * 9300;
    var koukiHeitoWari   = 6600;
    var kouki = Math.min(koukiShotokuWari + koukiKintouWari + koukiHeitoWari, 240000);

    // 介護分（40〜64歳のみ、上限17万円）
    var kaigo = 0;
    if (ageGroup === '40to64') {
      var kaigoShotokuWari = kazeiShotoku * 0.0189;
      var kaigoKintouWari  = 15800;
      kaigo = Math.min(kaigoShotokuWari + kaigoKintouWari, 170000);
    }

    var total = Math.round(iryo + kouki + kaigo);
    var monthly_total = Math.round(total / 12);

    // 判定（年収に対する負担率でレベル分け）
    var ratio = total / nenShuu;
    var level = ratio < 0.08 ? 'ok' : ratio < 0.15 ? 'warn' : 'ng';
    var msg   = '月額目安：約 ' + fmt(monthly_total) + ' 円  ／  被保険者 ' + ninzu + ' 名';

    showResult(level, fmt(total) + ' 円', msg);
    showDetail([
      ['年間収入',               fmt(nenShuu) + ' 円'],
      ['給与所得控除',           '▲ ' + fmt(kojo) + ' 円'],
      ['基礎控除',               '▲ ' + fmt(kisoKojo) + ' 円'],
      ['課税所得',               fmt(kazeiShotoku) + ' 円'],
      ['', ''],
      ['医療分',                 fmt(Math.round(iryo)) + ' 円'],
      ['後期高齢者支援金分',     fmt(Math.round(kouki)) + ' 円'],
      ageGroup === '40to64'
        ? ['介護分（40〜64歳）', fmt(Math.round(kaigo)) + ' 円']
        : ['介護分',             '対象外'],
      ['年間合計保険料',         fmt(total) + ' 円', true],
    ]);

    document.getElementById('notice').style.display = '';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      if (!r[0] && !r[1]) return '<tr><td colspan="2" style="padding:0.2rem 0;border:none"></td></tr>';
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = '';
    document.getElementById('rv').textContent = '⚠';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('notice').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function saveInputs() {
    var data = {
      monthly:  document.getElementById('monthly').value,
      ageGroup: document.getElementById('age-group').value,
      spouse:   document.getElementById('spouse').checked,
      children: document.getElementById('children').value,
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadInputs() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.monthly)  document.getElementById('monthly').value = d.monthly;
      if (d.ageGroup) document.getElementById('age-group').value = d.ageGroup;
      if (d.spouse !== undefined) document.getElementById('spouse').checked = d.spouse;
      if (d.children !== undefined) document.getElementById('children').value = d.children;
    } catch(e) {}
  }

  loadInputs();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
