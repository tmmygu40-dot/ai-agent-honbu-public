<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>緊急仕入れ判断アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>緊急仕入れ判断アプリ</h1>
    <p class="subtitle">欠品損失 vs 緊急調達コストを比較して即判断</p>

    <div class="card">
      <h2>① 欠品損失</h2>
      <div class="form-group">
        <label for="dailyLoss">1日あたりの販売機会損失額（円）</label>
        <input type="number" id="dailyLoss" placeholder="例：50000" min="0">
      </div>
      <div class="form-group">
        <label for="outOfStockDays">欠品継続予測日数（日）</label>
        <input type="number" id="outOfStockDays" placeholder="例：5" min="0">
      </div>
    </div>

    <div class="card">
      <h2>② 緊急調達コスト</h2>
      <div class="form-group">
        <label for="normalPrice">通常仕入れ単価（円）</label>
        <input type="number" id="normalPrice" placeholder="例：1000" min="0">
      </div>
      <div class="form-group">
        <label for="urgentPrice">緊急調達単価（円）</label>
        <input type="number" id="urgentPrice" placeholder="例：1500" min="0">
      </div>
      <div class="form-group">
        <label for="quantity">調達数量（個）</label>
        <input type="number" id="quantity" placeholder="例：200" min="0">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="calculate()">判断する</button>
      <button class="btn-secondary" onclick="resetForm()">リセット</button>
    </div>

    <div id="result" class="result hidden"></div>

    <div class="history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="btn-clear" onclick="clearHistory()">履歴を削除</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
