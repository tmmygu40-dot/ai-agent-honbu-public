<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>稟議管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>稟議管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規申請登録</h2>
      <div class="form-group">
        <label for="content">申請内容</label>
        <input type="text" id="content" placeholder="例：備品購入・交通費精算">
      </div>
      <div class="form-group">
        <label for="applicant">申請者</label>
        <input type="text" id="applicant" placeholder="例：山田太郎">
      </div>
      <div class="form-group">
        <label for="amount">金額（円）</label>
        <input type="number" id="amount" placeholder="例：15000" min="0">
      </div>
      <div class="form-group">
        <label for="status">承認状況</label>
        <select id="status">
          <option value="申請中">申請中</option>
          <option value="承認済み">承認済み</option>
          <option value="却下">却下</option>
        </select>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>申請一覧</h2>
      <div class="filter-group">
        <label>表示：</label>
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="申請中">未決裁のみ</button>
        <button class="filter-btn" data-filter="承認済み">承認済み</button>
        <button class="filter-btn" data-filter="却下">却下</button>
      </div>
      <div id="summary" class="summary"></div>
    </section>

    <!-- 一覧テーブル -->
    <div class="table-wrapper">
      <table id="listTable">
        <thead>
          <tr>
            <th>申請日</th>
            <th>申請内容</th>
            <th>申請者</th>
            <th>金額</th>
            <th>承認状況</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
      <p id="emptyMsg" class="empty-msg">登録された申請はありません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
