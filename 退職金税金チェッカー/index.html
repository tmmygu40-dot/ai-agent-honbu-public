<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退職金税金チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── チェックボックス ── */
    .check-field { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
    .check-field input[type="checkbox"] { width: 1.1rem; height: 1.1rem; accent-color: var(--accent); cursor: pointer; }
    .check-field label { font-size: 0.88rem; font-weight: 600; color: var(--text); cursor: pointer; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .sep td { font-size: 0.75rem; color: var(--accent); font-weight: 700; letter-spacing: 0.04em; background: var(--accent-light); padding: 0.3rem 0.3rem; }

    /* ── 注記 ── */
    .note-box {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.76rem; color: var(--text-sub); line-height: 1.6;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>退職金税金チェッカー</h1>
    <p class="subtitle">勤続年数と退職金額を入力するだけで手取り額・税負担を即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="years">勤続年数（年）</label>
      <input type="number" id="years" placeholder="例: 30" min="1" max="60">
      <p class="hint">1年未満の端数は切り上げ（例：30年6か月 → 31年）</p>
    </div>
    <div class="field">
      <label for="amount">退職金額（万円）</label>
      <input type="number" id="amount" placeholder="例: 2000" min="0">
    </div>
    <div class="check-field">
      <input type="checkbox" id="disabled">
      <label for="disabled">障害退職（障害者になったことが直接の原因で退職）</label>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">手取りを計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">手取り額（概算）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">計算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注記 -->
  <div class="note-box" id="notebox" style="display:none">
    ※ この計算は概算です。実際の税額は源泉徴収票や確定申告で確定します。<br>
    ※ 「退職所得の受給に関する申告書」を提出していない場合は一律20.42%の源泉徴収となります。<br>
    ※ 住民税は翌年課税のため実際の手取りとは時期がずれます。<br>
    ※ 役員退職金で勤続年数5年以下の場合は1/2計算の適用外となります（今回は含めていません）。
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'retirement-tax-checker';

  // 所得税の速算表（課税退職所得に対して）
  var TAX_TABLE = [
    { limit: 1950000,   rate: 0.05,  deduct: 0        },
    { limit: 3300000,   rate: 0.10,  deduct: 97500    },
    { limit: 6950000,   rate: 0.20,  deduct: 427500   },
    { limit: 9000000,   rate: 0.23,  deduct: 636000   },
    { limit: 18000000,  rate: 0.33,  deduct: 1536000  },
    { limit: 40000000,  rate: 0.40,  deduct: 2796000  },
    { limit: Infinity,  rate: 0.45,  deduct: 4796000  },
  ];

  function calcIncomeTax(taxableIncome) {
    for (var i = 0; i < TAX_TABLE.length; i++) {
      if (taxableIncome <= TAX_TABLE[i].limit) {
        return Math.floor(taxableIncome * TAX_TABLE[i].rate - TAX_TABLE[i].deduct);
      }
    }
    return 0;
  }

  function calc() {
    var years  = parseInt(document.getElementById('years').value);
    var amtMan = parseFloat(document.getElementById('amount').value);
    var isDisabled = document.getElementById('disabled').checked;

    if (!years || years < 1 || isNaN(amtMan) || amtMan < 0) {
      showErr('勤続年数と退職金額を正しく入力してください');
      return;
    }

    var amount = amtMan * 10000; // 万円 → 円

    // 退職所得控除額
    var deduction;
    if (years <= 20) {
      deduction = Math.max(400000 * years, 800000);
    } else {
      deduction = 8000000 + 700000 * (years - 20);
    }
    if (isDisabled) deduction += 1000000;

    // 課税退職所得（1000円未満切捨て）
    var taxableBase = Math.max(0, (amount - deduction) * 0.5);
    var taxable = Math.floor(taxableBase / 1000) * 1000;

    // 所得税
    var incomeTax = Math.max(0, calcIncomeTax(taxable));

    // 復興特別所得税（所得税 × 2.1%、1円未満切捨て）
    var surtax = Math.floor(incomeTax * 0.021);

    // 住民税（課税退職所得 × 10%、100円未満切捨て）
    var residentTax = Math.floor(taxable * 0.10 / 100) * 100;

    // 税負担合計
    var totalTax = incomeTax + surtax + residentTax;

    // 手取り額
    var takehome = amount - totalTax;

    // 手取り率
    var takeRate = (takehome / amount * 100).toFixed(1);

    // レベル判定（控除で税が0なら ok、手取り率90%以上 ok、75%以上 warn、未満 ng）
    var level;
    if (totalTax === 0) {
      level = 'ok';
    } else if (takehome / amount >= 0.90) {
      level = 'ok';
    } else if (takehome / amount >= 0.75) {
      level = 'warn';
    } else {
      level = 'ng';
    }

    var rn = '税負担合計 ' + fmt(totalTax) + ' 円 ／ 手取り率 ' + takeRate + '%';
    showResult(level, fmt(takehome) + ' 円', rn);

    showDetail([
      ['sep', '退職金・控除'],
      ['退職金額',           fmt(amount) + ' 円', false],
      ['退職所得控除額',     fmt(deduction) + ' 円', false],
      ['課税退職所得',       fmt(taxable) + ' 円', false],
      ['sep', '税金内訳'],
      ['所得税',             fmt(incomeTax) + ' 円', false],
      ['復興特別所得税',     fmt(surtax) + ' 円', false],
      ['住民税（概算）',     fmt(residentTax) + ' 円', false],
      ['税負担合計',         fmt(totalTax) + ' 円', true],
      ['sep', '手取り'],
      ['手取り額',           fmt(takehome) + ' 円', true],
      ['手取り率',           takeRate + '%', false],
    ]);

    document.getElementById('notebox').style.display = '';

    // localStorage 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        years: years, amount: amtMan, disabled: isDisabled
      }));
    } catch(e) {}
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    var html = rows.map(function(r) {
      if (r[0] === 'sep') {
        return '<tr class="sep"><td colspan="2">' + r[1] + '</td></tr>';
      }
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('notebox').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 前回の入力を復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved) return;
      if (saved.years)   document.getElementById('years').value   = saved.years;
      if (saved.amount)  document.getElementById('amount').value  = saved.amount;
      if (saved.disabled) document.getElementById('disabled').checked = saved.disabled;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
