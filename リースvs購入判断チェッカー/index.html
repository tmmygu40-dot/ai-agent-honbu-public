<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リースvs購入判断チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 2カラム比較レイアウト ── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    @media (max-width: 480px) {
      .compare-grid { grid-template-columns: 1fr; }
    }
    .compare-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1rem;
      box-shadow: var(--shadow);
    }
    .compare-card.lease-card { border-top: 4px solid #2563eb; }
    .compare-card.buy-card   { border-top: 4px solid #15803d; }
    .compare-card .card-title { margin-bottom: 0.8rem; }
    .compare-card.lease-card .card-title { color: #2563eb; }
    .compare-card.buy-card   .card-title { color: #15803d; }

    /* ── 入力 ── */
    .field { margin-bottom: 0.85rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.3rem; }
    .field input, .field select {
      width: 100%; padding: 0.65rem 0.8rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.5rem; padding: 0.6rem;
      font-size: 0.85rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .lease-hl td:last-child { color: #2563eb; font-size: 1.05rem; }
    .detail-table .buy-hl td:last-child { color: #15803d; font-size: 1.05rem; }
    .detail-table .section-header td {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
      color: #fff; padding: 0.4rem 0.5rem;
    }
    .detail-table .section-lease td { background: #2563eb; }
    .detail-table .section-buy td   { background: #15803d; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── メモ ── */
    .note-box {
      max-width: 600px; margin: 0 auto 1rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.8rem 1rem; line-height: 1.6;
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>リースvs購入 判断チェッカー</h1>
    <p class="subtitle">設備・機器の導入コストを比較して最適な方法をすぐ判断</p>
  </header>

  <!-- 比較入力：2カラム -->
  <div class="compare-grid">
    <!-- リース側 -->
    <div class="compare-card lease-card">
      <p class="card-title">🔵 リース</p>
      <div class="field">
        <label for="leaseMonthly">月額リース料（円）</label>
        <input type="number" id="leaseMonthly" placeholder="例: 50000" min="0">
      </div>
      <div class="field">
        <label for="leasePeriod">契約期間（ヶ月）</label>
        <input type="number" id="leasePeriod" placeholder="例: 60" min="1">
        <p class="hint">例）5年 = 60ヶ月</p>
      </div>
      <div class="field">
        <label for="leaseResidual">残価・保証金（円）</label>
        <input type="number" id="leaseResidual" placeholder="例: 0" min="0" value="0">
        <p class="hint">契約終了時に支払う額（なければ0）</p>
      </div>
    </div>

    <!-- 購入側 -->
    <div class="compare-card buy-card">
      <p class="card-title">🟢 購入</p>
      <div class="field">
        <label for="buyPrice">購入価格（円）</label>
        <input type="number" id="buyPrice" placeholder="例: 2000000" min="0">
      </div>
      <div class="field">
        <label for="buyMaintenance">年間維持費（円）</label>
        <input type="number" id="buyMaintenance" placeholder="例: 100000" min="0" value="0">
        <p class="hint">保険・点検・修理費の目安（なければ0）</p>
      </div>
      <div class="field">
        <label for="buyLifespan">使用年数（年）</label>
        <input type="number" id="buyLifespan" placeholder="例: 5" min="1">
        <p class="hint">リース期間に合わせると比較しやすい</p>
      </div>
    </div>
  </div>

  <div class="note-box">
    💡 <strong>比較の考え方：</strong>リースは「同期間の総支払い額」、購入は「初期費用＋維持費の合計」で比較します。金利・減価償却・節税効果は含みません。
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">どちらが得か判断する</button>
  <button class="btn-reset" onclick="reset()">入力をリセット</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">コスト内訳比較</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEYS = {
    leaseMonthly: 'lv-leaseMonthly',
    leasePeriod:  'lv-leasePeriod',
    leaseResidual:'lv-leaseResidual',
    buyPrice:     'lv-buyPrice',
    buyMaintenance:'lv-buyMaintenance',
    buyLifespan:  'lv-buyLifespan'
  };

  // localStorage 読み込み
  (function(){
    Object.keys(KEYS).forEach(function(id){
      var v = localStorage.getItem(KEYS[id]);
      if (v !== null) {
        var el = document.getElementById(id);
        if (el) el.value = v;
      }
    });
  })();

  // localStorage 保存
  function save() {
    Object.keys(KEYS).forEach(function(id){
      var el = document.getElementById(id);
      if (el) localStorage.setItem(KEYS[id], el.value);
    });
  }

  function getVal(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function calc() {
    var leaseMonthly  = getVal('leaseMonthly');
    var leasePeriod   = getVal('leasePeriod');
    var leaseResidual = getVal('leaseResidual');
    var buyPrice      = getVal('buyPrice');
    var buyMaint      = getVal('buyMaintenance');
    var buyLifespan   = getVal('buyLifespan');

    if (leaseMonthly <= 0 || leasePeriod <= 0 || buyPrice <= 0 || buyLifespan <= 0) {
      showErr('月額リース料・契約期間・購入価格・使用年数は必須です');
      return;
    }

    save();

    // コスト計算
    var leaseTotalMonths = leaseMonthly * leasePeriod;
    var leaseTotal = leaseTotalMonths + leaseResidual;

    var buyMaintTotal = buyMaint * buyLifespan;
    var buyTotal = buyPrice + buyMaintTotal;

    var diff = buyTotal - leaseTotal; // 正 → リースが得、負 → 購入が得

    var winner, level, msg;
    if (Math.abs(diff) < 10000) {
      winner = 'ほぼ同額';
      level = 'warn';
      msg = 'コスト差が1万円未満です。利便性・節税・資産計上の要否など他の要素で判断してください。';
    } else if (diff > 0) {
      winner = 'リースが得！';
      level = 'ok';
      msg = '購入より合計コストが安い。初期費用の抑制にもなります。\n差額 ' + fmt(diff) + ' 円お得。';
    } else {
      winner = '購入が得！';
      level = 'ok';
      msg = 'リースより合計コストが安い。長期保有で維持費が低ければ有利です。\n差額 ' + fmt(-diff) + ' 円お得。';
    }

    showResult(level, winner, msg);
    showDetail([
      { section: 'lease', label: '🔵 リース合計', rows: [
        ['月額リース料 × ' + leasePeriod + 'ヶ月', fmt(leaseTotalMonths) + ' 円'],
        ['残価・保証金',                           fmt(leaseResidual) + ' 円'],
        ['リース総コスト',                          fmt(leaseTotal) + ' 円', 'lease-hl'],
      ]},
      { section: 'buy', label: '🟢 購入合計', rows: [
        ['購入価格',                              fmt(buyPrice) + ' 円'],
        ['年間維持費 × ' + buyLifespan + '年',    fmt(buyMaintTotal) + ' 円'],
        ['購入総コスト',                           fmt(buyTotal) + ' 円', 'buy-hl'],
      ]},
      { section: null, label: null, rows: [
        ['差額（購入 − リース）', (diff >= 0 ? '+' : '') + fmt(diff) + ' 円', 'hl'],
      ]},
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(sections) {
    var html = '';
    sections.forEach(function(sec) {
      if (sec.label) {
        var cls = sec.section ? 'section-' + sec.section : 'section-header';
        html += '<tr class="section-header ' + cls + '"><td colspan="2">' + sec.label + '</td></tr>';
      }
      sec.rows.forEach(function(r) {
        var rowCls = r[2] || '';
        html += '<tr class="' + rowCls + '"><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
      });
    });
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function reset() {
    Object.keys(KEYS).forEach(function(id){
      localStorage.removeItem(KEYS[id]);
      var el = document.getElementById(id);
      if (el) el.value = (id === 'leaseResidual' || id === 'buyMaintenance') ? '0' : '';
    });
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
