<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お礼文ジェネレーター｜「ありがとう」を5パターン即生成</title>
  <meta name="description" content="シーンと相手との関係性を選ぶだけで、丁寧・カジュアル・フォーマル・短文・ユーモアの5パターンのお礼文をワンタップで生成。LINEやメールにそのままコピペできる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* お礼文カード */
    .thanks-list { max-width: 600px; margin: 0 auto; }
    .thanks-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.9rem;
    }
    .thanks-style {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); background: var(--accent-light);
      padding: 0.2rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }
    .thanks-text {
      font-size: 0.95rem; color: var(--text);
      line-height: 1.65; white-space: pre-wrap;
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .thanks-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>お礼文ジェネレーター</h1>
    <p class="subtitle">シーン×関係性で「ありがとう」を5パターン即生成。LINE・メールにコピペOK</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="scene">シーン</label>
      <select id="scene">
        <option value="help">仕事を手伝ってもらった</option>
        <option value="gift">プレゼント・贈り物をもらった</option>
        <option value="treat">ご馳走してもらった</option>
        <option value="souvenir">差し入れ・お土産をもらった</option>
        <option value="visit">お見舞いに来てくれた</option>
        <option value="move">引越しを手伝ってもらった</option>
        <option value="intro">紹介・推薦してもらった</option>
        <option value="advice">相談に乗ってもらった</option>
        <option value="trouble">困ったときに助けてもらった</option>
        <option value="party">飲み会・食事会に呼んでもらった</option>
      </select>
    </div>
    <div class="field">
      <label for="relation">相手との関係性</label>
      <select id="relation">
        <option value="boss">上司</option>
        <option value="colleague">同僚</option>
        <option value="junior">部下・後輩</option>
        <option value="client">取引先</option>
        <option value="friend">友達</option>
        <option value="family">家族</option>
        <option value="partner">恋人・パートナー</option>
        <option value="teacher">先生・恩師</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">5パターン生成する</button>

  <div class="thanks-list" id="result-list"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 このツールは一般的なビジネスマナー・コミュニケーション資料を参考に文面例を整理しています。実際の送信前に相手や状況に合わせて一部調整してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'orei_gen_v1';

  // ── シーン別の核となる「お礼の対象」表現 ──
  var SCENE_CORE = {
    help:     { polite: 'お仕事を手伝っていただき',     casual: '仕事手伝ってくれて',         formal: '業務にご助力を賜り',           short: '助かった',     humor: '神スピードの援護射撃' },
    gift:     { polite: '素敵なプレゼントをいただき',   casual: 'プレゼントくれて',           formal: '結構なお品を頂戴し',           short: 'プレゼント嬉しい', humor: 'まさかの最強アイテム支給' },
    treat:    { polite: 'ご馳走になりまして',           casual: 'ご飯おごってくれて',         formal: 'お食事をご馳走になり',         short: 'ごちそうさま', humor: '胃袋強化イベント開催' },
    souvenir: { polite: 'お心遣いの差し入れをいただき', casual: '差し入れありがとう',         formal: 'お心遣いの品を頂戴し',         short: '差し入れ嬉しい', humor: '突然の補給物資投下' },
    visit:    { polite: 'お見舞いにお越しいただき',     casual: 'お見舞いに来てくれて',       formal: 'ご多忙の折お見舞いを賜り',     short: '来てくれて嬉しい', humor: '元気チャージ完了' },
    move:     { polite: '引越しをお手伝いいただき',     casual: '引越し手伝ってくれて',       formal: '転居の労をお手伝いいただき',   short: '助かった',     humor: '人力クレーン稼働ありがとう' },
    intro:    { polite: 'ご紹介の労を取っていただき',   casual: '紹介してくれて',             formal: 'ご紹介の機会を頂戴し',         short: 'ご紹介感謝', humor: '人脈ガチャSSR排出' },
    advice:   { polite: 'ご相談に乗っていただき',       casual: '話聞いてくれて',             formal: '貴重なお時間を頂戴しご助言を賜り', short: '相談乗ってくれて感謝', humor: '心のメンテナンス完了' },
    trouble:  { polite: 'お困りの折にお力添えいただき', casual: 'ピンチで助けてくれて',       formal: '窮地にお力添えを賜り',         short: '本当に助かった', humor: '緊急援軍ありがとう' },
    party:    { polite: 'お招きいただき',               casual: '誘ってくれて',               formal: 'お招きにあずかり',             short: '楽しかった', humor: '宴会レベルアップ' }
  };

  // ── 関係性別の「呼びかけ・締め」 ──
  var REL = {
    boss:      { name: '○○部長', tone_polite: '本当にありがとうございました。引き続きどうぞよろしくお願いいたします。', tone_casual: '本当に助かりました！またお願いします〜', tone_formal: '深く御礼申し上げます。今後ともご指導のほどよろしくお願い申し上げます。', tone_short: 'ありがとうございました！', tone_humor: 'もう足を向けて寝られません🙏' },
    colleague: { name: '○○さん', tone_polite: '本当にありがとうございました。今度お礼させてくださいね。',           tone_casual: 'マジ助かった〜！今度お礼するね😊',                       tone_formal: '心より御礼申し上げます。今後ともよろしくお願いいたします。',                 tone_short: 'ありがとう！',           tone_humor: '今度コーヒー奢らせて☕' },
    junior:    { name: '○○さん', tone_polite: '本当にありがとう。すごく助かりました。',                             tone_casual: 'ほんと助かった〜！ありがとね',                           tone_formal: '感謝しております。今後の活躍を期待しています。',                              tone_short: 'ありがとう！',           tone_humor: '頼れる！惚れる！🥰' },
    client:    { name: '○○様',   tone_polite: '誠にありがとうございました。今後ともよろしくお願い申し上げます。',   tone_casual: '本当に助かりました。ありがとうございます！',             tone_formal: '謹んで御礼申し上げます。引き続きご厚誼のほどよろしくお願い申し上げます。',   tone_short: 'ありがとうございました。', tone_humor: '御社の神対応にひれ伏します🙇' },
    friend:    { name: '○○',     tone_polite: '本当にありがとう。今度ゆっくりお礼させてね。',                       tone_casual: 'ほんっとありがとう！愛してる😂',                          tone_formal: '心から感謝しています。改めてお礼させてください。',                            tone_short: 'ありがとう！',           tone_humor: '一生ついていきます🐶' },
    family:    { name: '',         tone_polite: '本当にありがとう。いつも感謝しています。',                           tone_casual: 'ありがとー！ほんと助かった✨',                            tone_formal: '心より感謝しています。いつも本当にありがとう。',                              tone_short: 'ありがとう！',           tone_humor: '我が家の救世主✨' },
    partner:   { name: '',         tone_polite: '本当にありがとう。あなたがいてくれて心強いよ。',                     tone_casual: 'ほんとありがとう〜大好き💕',                              tone_formal: '心から感謝しています。これからもよろしくね。',                                tone_short: 'ありがとう♡',          tone_humor: '今夜は私が王様…じゃなくて感謝の主に🥰' },
    teacher:   { name: '○○先生', tone_polite: '本当にありがとうございました。今後ともご指導のほどよろしくお願いいたします。', tone_casual: '本当にありがとうございました！',                       tone_formal: '深く御礼申し上げます。今後ともご鞭撻のほどよろしくお願い申し上げます。',     tone_short: 'ありがとうございました。', tone_humor: '一生の恩、忘れません！' }
  };

  var STYLES = [
    { key: 'polite', label: '① 丁寧（標準ビジネス）',     greet: 'お世話になっております。',         body: function(c, r){ return c.polite + '、本当にありがとうございました。\nおかげさまで助かりました。\n' + r.tone_polite; }, named: true },
    { key: 'casual', label: '② カジュアル（友達・気軽）', greet: '',                                    body: function(c, r){ return c.casual + 'ありがとう！\nめっちゃ嬉しかった〜🙏\n' + r.tone_casual; }, named: false },
    { key: 'formal', label: '③ フォーマル（目上・取引先）', greet: '拝啓\n時下ますますご清祥のこととお慶び申し上げます。', body: function(c, r){ return 'この度は' + c.formal + '、誠にありがとうございました。\n心より御礼申し上げます。\n' + r.tone_formal + '\n敬具'; }, named: true },
    { key: 'short',  label: '④ 一言短文（LINE向き）',     greet: '',                                    body: function(c, r){ return c.short + '！\n' + r.tone_short; }, named: false },
    { key: 'humor',  label: '⑤ ユーモア（少し笑える）',   greet: '',                                    body: function(c, r){ return c.humor + 'で、感謝しかないっす！😂\n' + r.tone_humor; }, named: false }
  ];

  function generate() {
    var sceneKey = document.getElementById('scene').value;
    var relKey   = document.getElementById('relation').value;
    var core = SCENE_CORE[sceneKey];
    var rel  = REL[relKey];

    var list = document.getElementById('result-list');
    list.innerHTML = '';

    STYLES.forEach(function(st, idx) {
      var greet = st.greet;
      if (st.named && rel.name) {
        greet = (greet ? greet + '\n' : '') + rel.name + '\n';
      } else if (greet) {
        greet = greet + '\n';
      }
      var text = greet + st.body(core, rel);

      var item = document.createElement('div');
      item.className = 'thanks-item';
      var spanStyle = document.createElement('span');
      spanStyle.className = 'thanks-style';
      spanStyle.textContent = st.label;
      var pText = document.createElement('p');
      pText.className = 'thanks-text';
      pText.textContent = text;
      var btn = document.createElement('button');
      btn.className = 'btn-copy';
      btn.textContent = '📋 コピー';
      btn.onclick = (function(t, b){ return function(){ copyText(t, b); }; })(text, btn);

      item.appendChild(spanStyle);
      item.appendChild(pText);
      item.appendChild(btn);
      list.appendChild(item);
    });

    saveState(sceneKey, relKey);
  }

  function copyText(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = '✓ コピーしました';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 1800);
      }).catch(function(){ fallbackCopy(text, btn); });
    } else {
      fallbackCopy(text, btn);
    }
  }
  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); btn.textContent = '✓ コピーしました'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 1800); } catch(e) {}
    document.body.removeChild(ta);
  }

  function saveState(scene, relation) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ scene: scene, relation: relation })); } catch(e) {}
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.scene)    document.getElementById('scene').value    = d.scene;
      if (d.relation) document.getElementById('relation').value = d.relation;
    } catch(e) {}
  }
  loadState();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
