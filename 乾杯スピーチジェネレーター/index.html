      padding: 0 0 3rem;

    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.6rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-sub {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center;}
    .result-speech {
      font-size: 1rem; line-height: 1.85; color: var(--text);
      white-space: pre-wrap; padding: 0.6rem 0.4rem;
    }

    .copy-area textarea {
      width: 100%; min-height: 120px; padding: 0.7rem;
      font-size: 0.92rem; line-height: 1.7;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      resize: vertical; font-family: inherit;
    }
    .btn-copy {
      display: block; margin: 0.7rem 0 0; padding: 0.65rem 1rem;

    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;

      cursor: pointer; max-width: 600px; width: 100%;

    @media print {

        <option value="m" selected>6〜15人（小宴会）</option>

        <option value="xl">30人以上（大宴会）</option>

    <div class="result-speech" id="rs"></div>
  </div>

  <div class="card copy-area" id="copyCard" style="display:none">

    <textarea id="copyText" readonly></textarea>

    s:  ['少人数だからこそ、しっかり一人ひとりと話せる時間にしたいですね。', '近い距離で語り合えるのが、この人数の良さですね。', ''],

  };

    boss:    ['それでは皆さま、ご唱和ください。乾杯！', 'グラスをお持ちください。乾杯！', 'お手元のグラスをお持ち願います。乾杯！'],
    peer:    ['それでは、グラスを持って！乾杯！', 'みんなで、乾杯！', '声を合わせて、乾杯！'],
    junior:  ['それじゃあみんな、グラスを持って。乾杯！', 'お疲れさま、乾杯！', 'ぐっといきましょう、乾杯！'],
    client:  ['それでは皆さま、ご唱和をお願い申し上げます。乾杯！', 'お手元のグラスをお持ち願います。乾杯！', 'ご唱和ください。乾杯！'],
    friend:  ['さあ、グラス持って！乾杯ー！', 'いっくよー、乾杯！', 'はい、乾杯！'],
    family:  ['それじゃ、みんなで乾杯しよう。乾杯！', 'グラスを持って、乾杯！', '今日に感謝して、乾杯！'],
    couple:  ['今夜という時間に、乾杯。', 'これからの二人に、乾杯。', '私たちに、乾杯。']
  };

  var lastResult = '';

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generate() {
    var rel = document.getElementById('rel').value;
    var scene = document.getElementById('scene').value;
    var size = document.getElementById('size').value;

    var op = pick(OPENINGS[rel]);
    var body = (BODIES[scene] && BODIES[scene][rel]) ? BODIES[scene][rel] : '';
    var sizeNote = pick(SIZE_NOTES[size]);
    var cl = pick(CLOSINGS[rel]);

    var lines = [op, body];
    if (sizeNote) lines.push(sizeNote);
    lines.push(cl);

    var text = lines.filter(function(s){ return s && s.length; }).join('\n\n');
    lastResult = text;

    var rs = document.getElementById('rs');
    rs.textContent = text;
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';

    var copyCard = document.getElementById('copyCard');
    copyCard.style.display = 'block';
    document.getElementById('copyText').value = text;

    var btn = document.getElementById('btnCopy');
    btn.classList.remove('copied');
    btn.textContent = '📋 コピーする';

    // localStorage 保存
    try {
      localStorage.setItem('kanpai_speech_v1', JSON.stringify({rel: rel, scene: scene, size: size}));
    } catch (e) {}

    rc.scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  function copyText() {
    var ta = document.getElementById('copyText');
    ta.select();
    ta.setSelectionRange(0, 99999);
    var ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(ta.value);
        ok = true;
      } else {
        ok = document.execCommand('copy');
      }
    } catch (e) { ok = false; }
    var btn = document.getElementById('btnCopy');
    if (ok) {
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました';
    } else {
      btn.textContent = '⚠️ コピー失敗（手動で選択してください）';
    }
  }
