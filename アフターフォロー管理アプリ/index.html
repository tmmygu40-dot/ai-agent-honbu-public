<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アフターフォロー管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>アフターフォロー管理</h1>

    <section class="form-section">
      <h2>案件を登録</h2>
      <div class="form">
        <div class="form-row">
          <label for="client">顧客名</label>
          <input type="text" id="client" placeholder="例：山田商事">
        </div>
        <div class="form-row">
          <label for="date">次回連絡日</label>
          <input type="date" id="date">
        </div>
        <div class="form-row">
          <label for="memo">連絡内容</label>
          <textarea id="memo" rows="3" placeholder="例：新商品の提案・見積もり送付など"></textarea>
        </div>
        <button id="addBtn" onclick="addItem()">登録する</button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>フォローアップ一覧</h2>
        <span id="count" class="count-badge">0件</span>
      </div>
      <div id="list" class="list"></div>
      <p id="empty" class="empty-msg">登録された案件はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
