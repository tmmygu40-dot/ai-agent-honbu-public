<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取引先倒産リスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --lv3: #c2410c;    --lv3-bg: #fff7ed;
      --lv5: #7f1d1d;    --lv5-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── チェックリスト ── */
    .check-section-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.05em; margin: 0.8rem 0 0.4rem;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.7rem 0.5rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 0.1rem; cursor: pointer; }
    .check-item .check-text { font-size: 0.9rem; color: var(--text); line-height: 1.45; }
    .check-item .check-badge {
      font-size: 0.68rem; font-weight: 700; color: #b91c1c;
      background: #fee2e2; border-radius: 4px; padding: 0.1rem 0.35rem;
      flex-shrink: 0; margin-top: 0.15rem;
    }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.lv3  { border-color: var(--lv3);   background: var(--lv3-bg);  }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-card.lv5  { border-color: var(--lv5);   background: #fff0f0;        }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-level { font-size: 3rem; font-weight: 900; line-height: 1; margin-bottom: 0.3rem; }
    .result-card.ok   .result-level { color: var(--ok);   }
    .result-card.warn .result-level { color: var(--warn); }
    .result-card.lv3  .result-level { color: var(--lv3);  }
    .result-card.ng   .result-level { color: var(--ng);   }
    .result-card.lv5  .result-level { color: var(--lv5);  }
    .result-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 0.5rem; }
    .result-card.ok   .result-title { color: var(--ok);   }
    .result-card.warn .result-title { color: var(--warn); }
    .result-card.lv3  .result-title { color: var(--lv3);  }
    .result-card.ng   .result-title { color: var(--ng);   }
    .result-card.lv5  .result-title { color: var(--lv5);  }
    .result-score { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .result-advice { font-size: 0.88rem; line-height: 1.6; color: var(--text); text-align: left; background: rgba(255,255,255,0.7); border-radius: 8px; padding: 0.8rem 1rem; }
    .result-advice strong { display: block; font-size: 0.76rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-sub); margin-bottom: 0.4rem; }

    /* ── 内訳カード ── */
    .checked-list { list-style: none; padding: 0; margin: 0; }
    .checked-list li { font-size: 0.85rem; color: var(--text-sub); padding: 0.45rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .checked-list li:last-child { border-bottom: none; }
    .checked-list .pt { font-weight: 700; color: var(--ng); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>📊 取引先倒産リスク診断</h1>
    <p class="subtitle">兆候を選ぶだけで取引先の危険度を5段階で即診断</p>
  </header>

  <!-- チェックリストカード -->
  <div class="card">
    <p class="card-title">危険シグナル チェックリスト</p>
    <p style="font-size:0.8rem;color:var(--text-sub);margin-bottom:0.8rem;">当てはまる項目にチェックを入れてください。<span style="color:#b91c1c;font-weight:700;">⚠️マーク</span>は特に重大なシグナルです。</p>

    <p class="check-section-label">🔴 特に重大なシグナル（各2点）</p>

    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="2">
      <span class="check-badge">⚠️ 重大</span>
      <span class="check-text">支払い期日を過ぎても入金がない・振込が遅れている</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="2">
      <span class="check-badge">⚠️ 重大</span>
      <span class="check-text">担当者・経営陣に連絡が取れない、折り返しがない</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="2">
      <span class="check-badge">⚠️ 重大</span>
      <span class="check-text">手形・小切手が不渡りになった</span>
    </label>

    <p class="check-section-label" style="margin-top:1rem;">🟡 注意すべきシグナル（各1点）</p>

    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">発注量・取引量が急激に減った</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">担当者が頻繁に交代している（3ヶ月で2回以上）</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">納品・受領が突然遅れるようになった</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">支払い条件の変更・猶予・分割払いを要求してきた</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">会社の住所・事務所が縮小・移転した</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">銀行口座・振込先が突然変更になった</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">決算書・財務情報の開示を拒否・先延ばしにした</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">仕入れ先・同業他社から経営悪化の噂を聞いた</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">社長・役員など経営幹部が突然交代した</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">会社のWebサイト・電話番号・メールが突然使えなくなった</span>
    </label>
    <label class="check-item">
      <input type="checkbox" class="risk-check" data-pt="1">
      <span class="check-text">売掛金の増加・回収サイトが急に長くなった</span>
    </label>
  </div>

  <button class="btn-calc" onclick="diagnose()">リスクを診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">リスクレベル</p>
    <p class="result-level" id="rlevel">—</p>
    <p class="result-title" id="rtitle"></p>
    <p class="result-score" id="rscore"></p>
    <div class="result-advice" id="radvice"></div>
  </div>

  <!-- チェック済み項目カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">チェックした項目</p>
    <ul class="checked-list" id="checked-list"></ul>
  </div>

  <button class="btn-reset no-print" onclick="resetAll()">チェックをリセットする</button>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ℹ️ この診断は一般的な与信管理の知見をもとにした目安ツールです。最終的な判断は専門家にご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LEVELS = [
    { min: 0,  max: 0,  cls: 'ok',   label: 'Lv.1', title: '現時点では問題なし',
      advice: '現在チェックされた兆候はありません。引き続き定期的に取引状況を確認しましょう。\n\n【推奨アクション】\n・月次で入金状況・連絡状況を確認\n・年1回の与信見直し' },
    { min: 1,  max: 3,  cls: 'warn',  label: 'Lv.2', title: '要注意：気になる点あり',
      advice: '軽微な兆候が見られます。今のうちに関係を確認しておきましょう。\n\n【推奨アクション】\n・担当者に直接コンタクトを取る\n・入金サイクルを注意深く確認\n・信用調査サービスで情報収集' },
    { min: 4,  max: 7,  cls: 'lv3',   label: 'Lv.3', title: '警戒：複数の危険シグナル',
      advice: '複数の兆候が重なっています。早急な対策を検討してください。\n\n【推奨アクション】\n・掛け売りの与信枠を一時縮小\n・支払い条件を前払い・現金払いへ交渉\n・信用調査機関に調査依頼\n・法的手段の準備（弁護士相談）' },
    { min: 8,  max: 11, cls: 'ng',    label: 'Lv.4', title: '高リスク：深刻な状態',
      advice: '倒産・経営破綻の可能性が高い状態です。今すぐ行動が必要です。\n\n【推奨アクション】\n・新規取引・追加出荷を一時停止\n・未回収債権を最優先で回収\n・内容証明郵便で債権保全\n・弁護士・司法書士に相談\n・取引保険の確認' },
    { min: 12, max: 999,cls: 'lv5',   label: 'Lv.5', title: '危険：即時対応が必要',
      advice: '極めて深刻な状況です。倒産・夜逃げのリスクが非常に高い状態です。\n\n【緊急アクション】\n・全取引を即時停止\n・未回収債権を最優先で法的回収\n・差押え・仮処分などの保全措置を検討\n・弁護士に即相談\n・取引保険の速やかな申請' },
  ];

  function diagnose() {
    var checks = document.querySelectorAll('.risk-check');
    var score = 0;
    var checkedItems = [];
    checks.forEach(function(cb) {
      if (cb.checked) {
        var pt = parseInt(cb.getAttribute('data-pt'));
        score += pt;
        var label = cb.parentElement.querySelector('.check-text').textContent.trim();
        checkedItems.push({ label: label, pt: pt });
      }
    });

    var lv = LEVELS[0];
    for (var i = 0; i < LEVELS.length; i++) {
      if (score >= LEVELS[i].min && score <= LEVELS[i].max) {
        lv = LEVELS[i]; break;
      }
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + lv.cls;
    rc.style.display = 'block';
    document.getElementById('rlevel').textContent = lv.label;
    document.getElementById('rtitle').textContent = lv.title;
    document.getElementById('rscore').textContent = 'リスクスコア：' + score + '点（チェック数：' + checkedItems.length + '件）';
    document.getElementById('radvice').innerHTML = '<strong>対応アドバイス</strong>' + lv.advice.replace(/\n/g, '<br>');

    var detailEl = document.getElementById('detail');
    var listEl = document.getElementById('checked-list');
    if (checkedItems.length > 0) {
      listEl.innerHTML = checkedItems.map(function(item) {
        return '<li><span>' + item.label + '</span><span class="pt">+' + item.pt + '点</span></li>';
      }).join('');
      detailEl.style.display = 'block';
    } else {
      detailEl.style.display = 'none';
    }

    try {
      var save = { score: score, level: lv.label, checkedItems: checkedItems, date: new Date().toLocaleDateString('ja-JP') };
      localStorage.setItem('toriikisaki_diagnosis', JSON.stringify(save));
    } catch(e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function resetAll() {
    document.querySelectorAll('.risk-check').forEach(function(cb) { cb.checked = false; });
    var rc = document.getElementById('result');
    rc.style.display = 'none';
    rc.className = 'result-card';
    document.getElementById('detail').style.display = 'none';
    try { localStorage.removeItem('toriikisaki_diagnosis'); } catch(e) {}
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
