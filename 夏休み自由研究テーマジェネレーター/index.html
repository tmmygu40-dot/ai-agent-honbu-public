<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏休み自由研究テーマジェネレーター｜学年×興味で3案即提案</title>
  <meta name="description" content="学年と興味分野を選ぶだけで、夏休みの自由研究テーマを3案その場で提案する無料ツールです。テーマ名・用意するもの・進め方・まとめ方のヒントまで一気に出るので、テーマ決めの時短に役立ちます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* チェックボックス（行クリックでON/OFF・チェック済みは取り消し線） */
    .check-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem;
    }
    .check-item {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.6rem 0.7rem; border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; user-select: none;
      background: var(--bg); transition: border-color 0.12s, background 0.12s;
    }
    .check-item input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.3; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      color: var(--accent); font-weight: 700;
    }
    .check-item:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    /* テーマ結果カード */
    .theme-card {
      background: var(--card);
      border: 2px solid var(--accent);
      border-left: 6px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .theme-num {
      display: inline-block; padding: 0.18rem 0.6rem;
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em;
      border-radius: 999px; margin-bottom: 0.6rem;
    }
    .theme-name { font-size: 1.15rem; font-weight: 900; line-height: 1.4; margin-bottom: 0.6rem; }
    .theme-summary { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 0.9rem; }
    .theme-section { margin-top: 0.85rem; }
    .theme-section h4 {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .theme-section ul, .theme-section ol { padding-left: 1.2rem; }
    .theme-section li { font-size: 0.9rem; line-height: 1.6; margin-bottom: 0.2rem; color: var(--text); }
    .theme-tip {
      margin-top: 0.85rem; padding: 0.7rem 0.85rem;
      background: var(--accent-light); border-radius: 9px;
      font-size: 0.86rem; color: var(--text); line-height: 1.55;
    }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem; padding: 0.85rem 1rem;
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      border-radius: 10px; color: var(--ng);
      font-size: 0.9rem; font-weight: 700; text-align: center;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .theme-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>夏休み自由研究テーマジェネレーター</h1>
    <p class="subtitle">学年と興味を選ぶだけで自由研究テーマを3案即提案。テーマ決めの時短に。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="grade">お子さんの学年</label>
      <select id="grade">
        <option value="">選んでください</option>
        <option value="low">小学1〜2年</option>
        <option value="mid">小学3〜4年</option>
        <option value="high">小学5〜6年</option>
        <option value="jhs">中学1〜3年</option>
      </select>
    </div>
    <div class="field">
      <label>興味のある分野（複数選択OK）</label>
      <div class="check-grid" id="topics">
        <label class="check-item"><input type="checkbox" value="bio"><span class="check-text">🐛 生き物・昆虫</span></label>
        <label class="check-item"><input type="checkbox" value="plant"><span class="check-text">🌱 植物・栽培</span></label>
        <label class="check-item"><input type="checkbox" value="weather"><span class="check-text">☀️ 天気・気象</span></label>
        <label class="check-item"><input type="checkbox" value="space"><span class="check-text">🌟 宇宙・星</span></label>
        <label class="check-item"><input type="checkbox" value="earth"><span class="check-text">🌏 地球・地学</span></label>
        <label class="check-item"><input type="checkbox" value="food"><span class="check-text">🍳 料理・食べ物</span></label>
        <label class="check-item"><input type="checkbox" value="craft"><span class="check-text">🔨 工作・ものづくり</span></label>
        <label class="check-item"><input type="checkbox" value="society"><span class="check-text">🏘️ 地域・社会</span></label>
        <label class="check-item"><input type="checkbox" value="history"><span class="check-text">📜 歴史</span></label>
        <label class="check-item"><input type="checkbox" value="health"><span class="check-text">💪 健康・からだ</span></label>
        <label class="check-item"><input type="checkbox" value="machine"><span class="check-text">⚙️ 機械・科学実験</span></label>
        <label class="check-item"><input type="checkbox" value="daily"><span class="check-text">❓ 身近なふしぎ</span></label>
      </div>
      <p class="hint">何も選ばないと全分野からランダム提案します</p>
    </div>
    <div class="field">
      <label for="duration">取り組める期間</label>
      <select id="duration">
        <option value="any">こだわらない</option>
        <option value="day1">1日でできる</option>
        <option value="days">数日かけられる</option>
        <option value="long">1週間以上かけたい</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">テーマを3案生成する</button>

  <div id="err-area"></div>
  <div id="result-area"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、文部科学省・国立科学博物館・自治体の自由研究ガイドなど、信頼できる公開情報を参考に、家庭で取り組みやすいテーマ例として整理しています。実験・観察は安全に十分配慮し、必要に応じて保護者と一緒に行ってください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── テーマDB ──
  // tags: [カテゴリ], grades: 対応学年, duration: 推奨期間
  var THEMES = [
    // 生き物
    { name: 'アリの行列マップを作ろう', tags:['bio','daily'], grades:['low','mid'], duration:['day1','days'],

      tip: '「天気・時間・気温」も記録しておくと、考察が深くなります。'
    },
    { name: 'セミの抜け殻オス・メス調査', tags:['bio'], grades:['mid','high'], duration:['days'],

      steps: ['場所を決めて抜け殻を集める','腹部の形でオス・メスを判別','種類ごとに数える','場所ごとの違いを表とグラフに'],

    { name: 'ダンゴムシの右左曲がりクセ実験', tags:['bio','machine'], grades:['mid','high','jhs'], duration:['day1','days'],

    { name: '身近な葉っぱの葉脈標本コレクション', tags:['plant','craft'], grades:['mid','high'], duration:['days'],

  // ── ストレージ ──
  var STORAGE_KEY = 'jiyukenkyu_v1';
  function loadState() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return null;
      return JSON.parse(s);
    } catch(e) { return null; }
  }
  function saveState(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  // ── 初期化 ──
  document.addEventListener('DOMContentLoaded', function(){
    var st = loadState();
    if (!st) return;
    if (st.grade) document.getElementById('grade').value = st.grade;
    if (st.duration) document.getElementById('duration').value = st.duration;
    if (st.topics && st.topics.length) {
      document.querySelectorAll('#topics input[type="checkbox"]').forEach(function(cb){
        if (st.topics.indexOf(cb.value) >= 0) cb.checked = true;
      });
    }
  });

  function generate() {
    var grade = document.getElementById('grade').value;
    var duration = document.getElementById('duration').value;
    var topics = [];
    document.querySelectorAll('#topics input[type="checkbox"]:checked').forEach(function(cb){
      topics.push(cb.value);
    });

    var errArea = document.getElementById('err-area');
    var resultArea = document.getElementById('result-area');
    errArea.innerHTML = '';
    resultArea.innerHTML = '';

    if (!grade) {
      errArea.innerHTML = '<div class="err-msg">⚠️ 学年を選んでください</div>';
      return;
    }

    saveState({ grade: grade, duration: duration, topics: topics });

    // 候補プール作成
    var pool = THEMES.filter(function(t){
      if (t.grades.indexOf(grade) < 0) return false;
      if (duration !== 'any' && t.duration.indexOf(duration) < 0) return false;
      if (topics.length > 0) {
        var hit = false;
        for (var i = 0; i < topics.length; i++) {
          if (t.tags.indexOf(topics[i]) >= 0) { hit = true; break; }
        }
        if (!hit) return false;
      }
      return true;
    });

    if (pool.length === 0) {
      errArea.innerHTML = '<div class="err-msg">条件に合うテーマがありませんでした。興味分野を増やすか、期間を「こだわらない」に変えて再生成してください。</div>';
      return;
    }

    // シャッフルして3件
    var shuffled = pool.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }
    var picks = shuffled.slice(0, 3);

    // 描画
    var html = '';
    picks.forEach(function(t, idx){
      html += '<div class="theme-card">'
        + '<span class="theme-num">テーマ ' + (idx+1) + '</span>'
        + '<h3 class="theme-name">' + escapeHtml(t.name) + '</h3>'
        + '<p class="theme-summary">' + escapeHtml(t.summary) + '</p>'
        + '<div class="theme-section"><h4>用意するもの</h4><ul>'
        + t.need.map(function(x){ return '<li>' + escapeHtml(x) + '</li>'; }).join('')
        + '</ul></div>'
        + '<div class="theme-section"><h4>進め方</h4><ol>'
        + t.steps.map(function(x){ return '<li>' + escapeHtml(x) + '</li>'; }).join('')
        + '</ol></div>'
        + '<div class="theme-tip">💡 まとめ方ヒント：' + escapeHtml(t.tip) + '</div>'
        + '</div>';
    });

    if (picks.length < 3) {
      html += '<div class="err-msg" style="background:var(--warn-bg);border-color:var(--warn);color:var(--warn);">条件に合うテーマが ' + picks.length + ' 件しかありませんでした。興味分野を増やすともっと候補が出ます。</div>';
    }

    resultArea.innerHTML = html;
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
