<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランニング記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🏃 ランニング記録</h1>

    <section class="input-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="distance">距離 (km)</label>
        <input type="number" id="distance" placeholder="例：5.0" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>タイム</label>
        <div class="time-inputs">
          <div class="time-field">
            <input type="number" id="hours" placeholder="0" min="0" max="23">
            <span>時間</span>
          </div>
          <div class="time-field">
            <input type="number" id="minutes" placeholder="0" min="0" max="59">
            <span>分</span>
          </div>
          <div class="time-field">
            <input type="number" id="seconds" placeholder="0" min="0" max="59">
            <span>秒</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：朝ラン、気温20℃">
      </div>
      <div id="pace-preview" class="pace-preview hidden">
        ペース：<span id="pace-value">--</span>
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="records-section">
      <div class="records-header">
        <h2>記録一覧</h2>
        <span id="record-count" class="record-count">0件</span>
      </div>
      <div id="stats" class="stats hidden">
        <div class="stat-item">
          <span class="stat-label">合計距離</span>
          <span id="total-distance" class="stat-value">0 km</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">平均ペース</span>
          <span id="avg-pace" class="stat-value">--</span>
        </div>
      </div>
      <ul id="record-list" class="record-list">
        <li class="empty-message" id="empty-message">記録がありません。<br>距離とタイムを入力して記録してみましょう。</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
