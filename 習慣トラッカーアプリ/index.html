<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>習慣トラッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>習慣トラッカー</h1>
      <p class="today-label" id="todayLabel"></p>
    </header>

    <section class="add-section">
      <form id="addForm">
        <input type="text" id="habitInput" placeholder="新しい習慣を入力..." maxlength="50">
        <button type="submit">追加</button>
      </form>
    </section>

    <section class="summary">
      <span id="progressText">0 / 0 達成</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <section class="habits-section">
      <ul id="habitList"></ul>
      <p class="empty-msg" id="emptyMsg">習慣を追加してください</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
