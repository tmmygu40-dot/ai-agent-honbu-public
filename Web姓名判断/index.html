<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web姓名判断｜2026年の金運・仕事運をサクッと占う</title>
  <meta name="description" content="姓と名の画数を入れるだけで、2026年の金運・仕事運がサクッと分かる無料の姓名判断ツール。総画数の81画陰陽判定で大吉〜凶を即診断、ラッキー数字も表示します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #b8860b;
      --accent-light: #fffaee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #8a6608, 0 6px 16px rgba(184,134,11,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8a6608, 0 2px 8px rgba(184,134,11,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .fortune-row td:last-child { text-align: left; font-weight: 500; line-height: 1.55; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔮 Web姓名判断</h1>
    <p class="subtitle">姓と名の画数で2026年の金運・仕事運を占う ※伝統的な81画陰陽判定の参考情報です</p>
  </header>

  <div class="card">
    <p class="card-title">画数を入力</p>
    <div class="field">
      <label for="seiKaku">姓の総画数</label>
      <input type="number" id="seiKaku" min="1" max="80" placeholder="例: 12">
      <p class="hint">姓に使う漢字すべての画数の合計</p>
    </div>
    <div class="field">
      <label for="meiKaku">名の総画数</label>
      <input type="number" id="meiKaku" min="1" max="80" placeholder="例: 9">
      <p class="hint">名前に使う漢字すべての画数の合計</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">占う</button>

  <div class="result-card" id="result">
    <p class="result-label">2026年の運勢</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">運勢詳細</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このツールは、伝統的な81画陰陽判定をもとに、2026年の運勢の参考情報として整理しています。実際の運命を保証するものではなく、エンタメ目的でお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 大吉画数（81画陰陽判定の主要吉数）
  var DAIKICHI = [1,3,5,6,7,8,11,13,15,16,17,18,21,23,24,25,29,31,32,33,35,37,39,41,45,47,48,52,57,58,61,63,65,67,68,81];
  // 凶画数
  var KYO = [2,4,9,10,12,14,19,20,22,26,27,28,30,34,36,38,40,42,43,44,46,49,50,51,53,54,55,56,59,60,62,64,66,69,70,71,72,73,74,75,76,77,78,79,80];
  // 特に強い大吉（金運・仕事運に好影響）
  var SUPER_KICHI = [3,5,6,11,13,15,16,21,23,24,29,31,32,33,35,41,45,47,48,52,57,58,63,65,67,68,81];

  var FORTUNE_COMMENTS = {
    daikichi: {
      label: '大吉',
      level: 'ok',
      summary: '2026年は飛躍の年。流れに乗って大きく前進できる強運の画数です。',
      kinun: '臨時収入や昇給のチャンスが舞い込みやすい年。投資や副業も追い風が吹きます。財布の整理と支出見直しでさらに金運アップ。',
      shigoto: '評価が一気に高まり、責任あるポジションを任される予感。新しい挑戦に手を挙げると吉。実力以上の成果が出やすい年。'
    },
    kichi: {
      label: '吉',
      level: 'ok',
      summary: '2026年は安定して上向く年。コツコツ続けてきたことが実を結びます。',
      kinun: '無駄遣いを抑えれば確実に貯まる年。固定費の見直し・家計簿アプリ活用で着実に資産を増やせます。',
      shigoto: 'チームワークが追い風に。地道な努力が認められて評価が上がる年。資格取得・スキルアップも吉。'
    },
    chukichi: {
      label: '中吉',
      level: 'warn',
      summary: '2026年は波があるものの、選択次第で良い方向へ転がる年です。',
      kinun: '大きな出費に注意。衝動買い・サブスク増やしすぎは要警戒。家計簿で見える化すれば運気が安定します。',
      shigoto: '判断ミスに注意。新規プロジェクトより、既存業務の改善で堅実に成果を出すのが吉。報連相を丁寧に。'
    },
    kyo: {
      label: '凶',
      level: 'ng',
      summary: '2026年は慎重さが求められる年。守りを固めれば乗り切れます。',
      kinun: '投資・大きな買い物は控えめに。詐欺・甘い儲け話に注意。緊急予備資金を確保しておくと安心。',
      shigoto: '転職・独立は来年以降が吉。現職で実績を積み、人間関係を大切にすると流れが変わります。健康管理も忘れずに。'
    }
  };

  // ラッキー数字（下1桁、0は10扱い）
  function getLuckyNumber(n) {
    var d = n % 10;
    return d === 0 ? 10 : d;
  }

  // 81画を超える場合は81画陰陽の循環で再計算
  function reduceTo81(n) {
    if (n <= 81) return n;
    var r = n % 81;
    return r === 0 ? 81 : r;
  }

  function judgeFortune(total) {
    var reduced = reduceTo81(total);
    if (SUPER_KICHI.indexOf(reduced) !== -1) return 'daikichi';
    if (DAIKICHI.indexOf(reduced) !== -1) return 'kichi';
    if (KYO.indexOf(reduced) !== -1) return 'kyo';
    return 'chukichi';
  }

  function calc() {
    var sei = parseInt(document.getElementById('seiKaku').value, 10);
    var mei = parseInt(document.getElementById('meiKaku').value, 10);

    if (isNaN(sei) || isNaN(mei) || sei < 1 || mei < 1) {
      showErr('姓と名の画数を1以上の数値で入力してください');
      return;
    }
    if (sei > 80 || mei > 80) {
      showErr('画数は80以下で入力してください');
      return;
    }

    var total = sei + mei;
    var reduced = reduceTo81(total);
    var key = judgeFortune(total);
    var f = FORTUNE_COMMENTS[key];
    var lucky = getLuckyNumber(total);

    showResult(f.level, f.label + '（総画数 ' + total + '）', f.summary);
    showDetail([
      { label: '姓の画数', value: sei + ' 画' },
      { label: '名の画数', value: mei + ' 画' },
      { label: '総画数', value: total + ' 画', hl: true },
      { label: '判定基準画数', value: reduced + ' 画', hint: total > 81 ? '※81画を超えるため循環判定' : '' },
      { label: 'ラッキー数字', value: lucky },
      { label: '💰 2026年 金運', value: f.kinun, fortune: true },
      { label: '💼 2026年 仕事運', value: f.shigoto, fortune: true }
    ]);

    saveInput(sei, mei);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      var cls = r.hl ? ' class="hl"' : (r.fortune ? ' class="fortune-row"' : '');
      var v = r.value;
      if (r.hint) v = v + '<br><span style="font-size:0.72rem;color:var(--text-sub)">' + r.hint + '</span>';
      return '<tr' + cls + '><td>' + r.label + '</td><td>' + v + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  // localStorage 保存・復元
  var STORAGE_KEY = 'web_seimei_input_v1';

  function saveInput(sei, mei) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ sei: sei, mei: mei }));
    } catch (e) {}
  }

  function loadInput() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.sei) document.getElementById('seiKaku').value = data.sei;
      if (data.mei) document.getElementById('meiKaku').value = data.mei;
    } catch (e) {}
  }

  loadInput();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
