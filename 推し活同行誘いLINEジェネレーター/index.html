<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活同行誘いLINEジェネレーター｜遠征誘いをサクッと文面化</title>
  <meta name="description" content="推し名・ライブ名・日程・場所・予算を入れるだけで、友達を遠征に誘うLINE文面を3つのノリ（テンション高め／冷静／お願い丁寧）で即生成。コピーしてそのまま送れます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* LINE風メッセージ表示 */
    .msg-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .msg-tone {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.7rem;
    }
    .msg-bubble {
      background: #06c755;
      color: #fff;
      padding: 0.85rem 1rem;
      border-radius: 18px 18px 18px 4px;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .btn-copy {
      display: block; margin: 0.8rem 0 0; padding: 0.55rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    #out-wrap { display: none; }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .msg-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎤 推し活同行誘いLINEジェネレーター</h1>
    <p class="subtitle">推しの遠征に友達を誘うLINE文を3ノリで即生成。コピーしてすぐ送れます。</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="oshi">推し名</label>
      <input type="text" id="oshi" placeholder="例: ◯◯くん／◯◯ちゃん">
    </div>
    <div class="field">
      <label for="live">ライブ・イベント名</label>
      <input type="text" id="live" placeholder="例: アリーナツアー2026">
    </div>
    <div class="field">
      <label for="date">日程</label>
      <input type="text" id="date" placeholder="例: 6月15日(日)">
    </div>
    <div class="field">
      <label for="place">場所</label>
      <input type="text" id="place" placeholder="例: 大阪城ホール">
    </div>
    <div class="field">
      <label for="budget">ざっくり費用（任意）</label>
      <input type="text" id="budget" placeholder="例: チケ+遠征で2万円くらい">
      <p class="hint">空欄でもOK。書くと説得力アップ</p>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">3ノリで生成する</button>

  <div id="out-wrap">
    <div class="msg-card">
      <span class="msg-tone">テンション高め</span>
      <div class="msg-bubble" id="m1"></div>
      <button class="btn-copy" data-target="m1">📋 コピー</button>
    </div>
    <div class="msg-card">
      <span class="msg-tone">冷静寄り</span>
      <div class="msg-bubble" id="m2"></div>
      <button class="btn-copy" data-target="m2">📋 コピー</button>
    </div>
    <div class="msg-card">
      <span class="msg-tone">お願い丁寧</span>
      <div class="msg-bubble" id="m3"></div>
      <button class="btn-copy" data-target="m3">📋 コピー</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは送信前の文案サンプルを生成するだけのものです。実際に送る前に、相手との関係性に合わせて言い回しを調整してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'oshi_invite_line_v1';

  function $(id){ return document.getElementById(id); }
  function getVals(){
    return {
      oshi:   $('oshi').value.trim()  || '推し',
      live:   $('live').value.trim()  || 'ライブ',
      date:   $('date').value.trim()  || '当日',
      place:  $('place').value.trim() || '会場',
      budget: $('budget').value.trim()
    };
  }

  function buildHigh(v){
    var b = v.budget ? '費用は' + v.budget + '！分割でも大丈夫だよ〜！' : '';
    return [
      'やばい話していい！？',
      v.oshi + 'の' + v.live + '、' + v.date + 'に' + v.place + 'であるんだけど、',
      '一緒に行かない！？絶対に一生もんの思い出になるやつ！！',
      b,
      '隣で叫んでくれる人いるだけで世界変わるからお願いっ🙏'
    ].filter(Boolean).join('\n');
  }

  function buildCalm(v){
    var b = v.budget ? '費用感はだいたい' + v.budget + '。' : '';
    return [
      'ちょっと相談なんだけど、',
      v.date + 'に' + v.place + 'で' + v.oshi + 'の' + v.live + 'があって、',
      'もし都合つけば一緒に行かないかなと思って。',
      b + '無理ならぜんぜんOKだから、予定だけ確認してもらえると助かる！'
    ].filter(Boolean).join('\n');
  }

  function buildPolite(v){
    var b = v.budget ? '費用は' + v.budget + 'くらいになりそうです。' : '';
    return [
      'お忙しいところごめんね、お願いがあって…！',
      v.date + 'に' + v.place + 'で' + v.oshi + 'の' + v.live + 'があるんだけど、',
      'もし良かったら一緒に行ってもらえないかな？',
      b,
      '一人だと心細くて…無理なら全然大丈夫だから、ちょっとだけ考えてみてほしい🙇'
    ].filter(Boolean).join('\n');
  }

  function gen(){
    var v = getVals();
    $('m1').textContent = buildHigh(v);
    $('m2').textContent = buildCalm(v);
    $('m3').textContent = buildPolite(v);
    $('out-wrap').style.display = 'block';
    save();
    $('out-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function save(){
    try {
      var d = {
        oshi:   $('oshi').value,
        live:   $('live').value,
        date:   $('date').value,
        place:  $('place').value,
        budget: $('budget').value
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(d));
    } catch(e){}
  }

  function load(){
    try {
      var s = localStorage.getItem(STORE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.oshi)   $('oshi').value   = d.oshi;
      if (d.live)   $('live').value   = d.live;
      if (d.date)   $('date').value   = d.date;
      if (d.place)  $('place').value  = d.place;
      if (d.budget) $('budget').value = d.budget;
    } catch(e){}
  }

  document.addEventListener('click', function(e){
    var btn = e.target.closest && e.target.closest('.btn-copy');
    if (!btn) return;
    var id = btn.getAttribute('data-target');
    var txt = $(id) ? $(id).textContent : '';
    if (!txt) return;
    var done = function(){
      btn.classList.add('copied');
      var orig = btn.textContent;
      btn.textContent = '✅ コピー済み';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = orig;
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, function(){ fallbackCopy(txt); done(); });
    } else {
      fallbackCopy(txt); done();
    }
  });

  function fallbackCopy(txt){
    try {
      var ta = document.createElement('textarea');
      ta.value = txt; ta.style.position='fixed'; ta.style.left='-9999px';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e){}
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
