<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手順付きクッキングタイマー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🍳 クッキングタイマー</h1>

    <!-- 工程追加フォーム -->
    <section class="add-section">
      <h2>工程を追加</h2>
      <div class="form-row">
        <input type="text" id="stepName" placeholder="工程名（例：玉ねぎを炒める）" maxlength="50">
      </div>
      <div class="form-row time-row">
        <label>時間：</label>
        <input type="number" id="stepMin" min="0" max="99" value="0" placeholder="分">
        <span>分</span>
        <input type="number" id="stepSec" min="0" max="59" value="0" placeholder="秒">
        <span>秒</span>
      </div>
      <button class="btn btn-add" onclick="addStep()">+ 工程を追加</button>
    </section>

    <!-- 工程リスト -->
    <section class="steps-section">
      <div class="steps-header">
        <h2>工程リスト</h2>
        <button class="btn btn-clear" onclick="clearAllSteps()">全削除</button>
      </div>
      <ul id="stepList" class="step-list">
        <li class="empty-msg" id="emptyMsg">工程を追加してください</li>
      </ul>
    </section>

    <!-- タイマー表示 -->
    <section class="timer-section" id="timerSection">
      <div class="current-step-name" id="currentStepName">-</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="step-progress" id="stepProgress"></div>
      <div class="timer-buttons">
        <button class="btn btn-start" id="startBtn" onclick="startTimer()">▶ スタート</button>
        <button class="btn btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none;">⏸ 一時停止</button>
        <button class="btn btn-reset" onclick="resetTimer()">↺ リセット</button>
      </div>
    </section>

    <!-- 完了メッセージ -->
    <div class="finish-msg" id="finishMsg" style="display:none;">
      🎉 全工程完了！お料理の完成です！
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
