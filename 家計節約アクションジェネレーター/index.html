<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計節約アクションジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.2rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── サマリーグリッド ── */
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.7rem; max-width: 600px; margin: 0 auto 1rem; padding: 0 1rem;
    }
    .summary-item {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.8rem 0.9rem;
      box-shadow: var(--shadow);
    }
    .summary-item .s-label { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .summary-item .s-value { font-size: 1.35rem; font-weight: 900; color: var(--accent); }
    .summary-item .s-value.green { color: var(--ok); }

    /* ── カテゴリタブ ── */
    .tab-wrap {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1rem;
      overflow-x: auto; white-space: nowrap;
      scrollbar-width: thin;
    }
    .tab-inner {
      display: inline-flex; gap: 0.4rem; padding-bottom: 0.2rem;
    }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.52rem 0.85rem; border-radius: 999px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      border: 2px solid var(--border); background: var(--card);
      color: var(--text-sub); white-space: nowrap;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 2px 8px rgba(224,123,0,0.3);
    }
    .tab-btn .badge {
      font-size: 0.68rem; background: rgba(0,0,0,0.12); border-radius: 999px;
      padding: 0.05rem 0.4rem; font-weight: 600;
    }
    .tab-btn.active .badge { background: rgba(255,255,255,0.3); }

    /* ── アクションリスト ── */
    .actions-wrap {
      max-width: 600px; margin: 0 auto; padding: 0 1rem;
    }
    .cat-section { margin-bottom: 1.4rem; }
    .cat-title {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; font-weight: 800; color: var(--accent);
      letter-spacing: 0.05em; margin-bottom: 0.6rem;
      padding-bottom: 0.45rem; border-bottom: 1.5px solid var(--border);
    }
    .cat-title .icon { font-size: 1rem; }

    .action-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.8rem 1rem;
      margin-bottom: 0.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      display: flex; align-items: flex-start; gap: 0.8rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-card:hover { border-color: var(--accent); }
    .action-card.done {
      background: var(--ok-bg); border-color: var(--ok);
    }
    .action-card.todo {
      background: var(--warn-bg); border-color: var(--warn);
    }

    .check-area {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; gap: 0.3rem; padding-top: 0.1rem;
    }
    .check-circle {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid var(--border); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: all 0.15s;
    }
    .action-card.done .check-circle {
      background: var(--ok); border-color: var(--ok); color: #fff;
    }
    .action-card.todo .check-circle {
      background: var(--warn); border-color: var(--warn); color: #fff;
    }
    .check-label {
      font-size: 0.6rem; font-weight: 700; color: var(--text-sub);
    }
    .action-card.done .check-label { color: var(--ok); }
    .action-card.todo .check-label { color: var(--warn); }

    .action-body { flex: 1; min-width: 0; }
    .action-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.25rem; }
    .action-card.done .action-name { color: var(--ok); text-decoration: line-through; opacity: 0.75; }
    .action-card.todo .action-name { color: var(--warn); }
    .action-desc { font-size: 0.78rem; color: var(--text-sub); line-height: 1.45; }
    .action-saving {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      margin-top: 0.3rem;
    }
    .action-card.done .action-saving { color: var(--ok); }

    /* 状態ラベル */
    .status-chip {
      display: inline-block; font-size: 0.65rem; font-weight: 800;
      padding: 0.15rem 0.55rem; border-radius: 999px; margin-top: 0.3rem;
    }
    .chip-none { background: var(--bg); color: var(--text-sub); border: 1px solid var(--border); }
    .chip-todo { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .chip-done { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }

    /* ── リセットボタン ── */
    .reset-wrap {
      max-width: 600px; margin: 1.5rem auto 0; padding: 0 1rem;
      text-align: center;
    }
    .btn-reset {
      padding: 0.6rem 1.6rem; font-size: 0.82rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 999px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--ng); color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

  // ────────── 状態管理 ──────────
  var LS_KEY = 'savings-actions-checks';
  var checks = {}; // {actionId: 'none'|'todo'|'done'}
  var currentCat = 'all';

  function loadChecks() {
    try {
      var saved = localStorage.getItem(LS_KEY);
      if (saved) checks = JSON.parse(saved);
    } catch(e) { checks = {}; }
  }

  function saveChecks() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(checks)); } catch(e) {}
  }

  function getCheck(id) {
    return checks[id] || 'none';
  }

  function cycleCheck(id) {
    var cur = getCheck(id);
    var next = cur === 'none' ? 'todo' : cur === 'todo' ? 'done' : 'none';
    checks[id] = next;
    saveChecks();
    renderAll();
  }

  function resetAll() {
    if (!confirm('すべてのチェックをリセットしますか？')) return;
    checks = {};
    saveChecks();
    renderAll();
  }

  // ────────── 集計 ──────────
  function calcSummary() {
    var doneSaving = 0, todoSaving = 0, doneCount = 0, todoCount = 0;
    CATEGORIES.forEach(function(cat) {
      if (!cat.actions) return;
      cat.actions.forEach(function(action) {
        var st = getCheck(action.id);
        if (st === 'done') { doneSaving += action.saving; doneCount++; }
        else if (st === 'todo') { todoSaving += action.saving; todoCount++; }
      });
    });
    return { doneSaving: doneSaving, todoSaving: todoSaving, doneCount: doneCount, todoCount: todoCount };
  }

  // ────────── レンダリング ──────────
  function fmt(n) { return '¥' + n.toLocaleString('ja-JP'); }

  function renderTabs() {
    var tabInner = document.getElementById('tabInner');
    var html = '';
    CATEGORIES.forEach(function(cat) {
      var count = 0;
      if (cat.id === 'all') {
        CATEGORIES.forEach(function(c) { if (c.actions) count += c.actions.length; });
      } else if (cat.actions) {
        count = cat.actions.length;
      }
      var active = currentCat === cat.id ? ' active' : '';
      html += '<button class="tab-btn' + active + '" onclick="selectCat(\'' + cat.id + '\')">'
            + cat.icon + ' ' + cat.name
            + ' <span class="badge">' + count + '</span>'
            + '</button>';
    });
    tabInner.innerHTML = html;
  }

  function renderActions() {
    var wrap = document.getElementById('actionsWrap');
    var html = '';

    var catsToShow = currentCat === 'all'
      ? CATEGORIES.filter(function(c) { return c.actions; })
      : CATEGORIES.filter(function(c) { return c.id === currentCat && c.actions; });

    catsToShow.forEach(function(cat) {
      html += '<div class="cat-section">';
      html += '<div class="cat-title"><span class="icon">' + cat.icon + '</span>' + cat.name + '</div>';
      cat.actions.forEach(function(action) {
        var st = getCheck(action.id);
        var cardClass = st === 'done' ? ' done' : st === 'todo' ? ' todo' : '';
        var circleContent = st === 'done' ? '✓' : st === 'todo' ? '▶' : '';
        var checkLabelText = st === 'done' ? 'やった' : st === 'todo' ? 'やる' : 'タップ';
        var chipClass = st === 'done' ? 'chip-done' : st === 'todo' ? 'chip-todo' : 'chip-none';
        var chipText = st === 'done' ? '✓ 実践済み' : st === 'todo' ? '▶ やる予定' : '未設定';

        html += '<div class="action-card' + cardClass + '" onclick="cycleCheck(\'' + action.id + '\')">';
        html += '<div class="check-area">';
        html += '<div class="check-circle">' + circleContent + '</div>';
        html += '<span class="check-label">' + checkLabelText + '</span>';
        html += '</div>';
        html += '<div class="action-body">';
        html += '<div class="action-name">' + action.name + '</div>';
        html += '<div class="action-desc">' + action.desc + '</div>';
        html += '<div class="action-saving">💰 月間節約目安 ' + fmt(action.saving) + '〜</div>';
        html += '<span class="status-chip ' + chipClass + '">' + chipText + '</span>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    wrap.innerHTML = html;
  }

  function renderSummary() {
    var s = calcSummary();
    document.getElementById('sumDone').textContent = fmt(s.doneSaving);
    document.getElementById('sumTodo').textContent = fmt(s.todoSaving);
    document.getElementById('sumDoneCount').textContent = s.doneCount + '件';
    document.getElementById('sumTodoCount').textContent = s.todoCount + '件';
  }

  function renderAll() {
    renderTabs();
    renderActions();
    renderSummary();
  }

  function selectCat(id) {
    currentCat = id;
    renderAll();
    // タブをスクロール
    var tabInner = document.getElementById('tabInner');
    var activeBtn = tabInner.querySelector('.tab-btn.active');
    if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', block: 'nearest' });
  }

  // ────────── 初期化 ──────────
  loadChecks();
  renderAll();
  </script>
</body>
</html>
