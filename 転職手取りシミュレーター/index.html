<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転職手取りシミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .section-label {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin: 1.1rem 0 0.7rem;
      padding-bottom: 0.35rem; border-bottom: 1px solid var(--border);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* 比較テーブル */
    .compare-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
    }
    .compare-table th, .compare-table td {
      padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border);
      text-align: right;
    }
    .compare-table th { font-weight: 700; color: var(--text-sub); font-size: 0.78rem; text-align: center; }
    .compare-table td:first-child { text-align: left; color: var(--text-sub); }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .hl td { font-weight: 800; color: var(--text); border-top: 2px solid var(--border); }
    .compare-table .hl td:last-child { color: var(--accent); }
    .up { color: var(--ok); font-weight: 700; }
    .down { color: var(--ng); font-weight: 700; }
    .same { color: var(--text-sub); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>転職手取りシミュレーター</h1>
    <p class="subtitle">年収と家族構成から転職前後の手取り・社保・住民税を即比較</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件入力</p>

    <div class="field">
      <label for="family">家族構成</label>
      <select id="family">
        <option value="0">独身</option>
        <option value="1">配偶者あり（扶養）</option>
        <option value="2">配偶者あり + 子1人</option>
        <option value="3">配偶者あり + 子2人以上</option>
      </select>
      <p class="hint">配偶者は年収103万以下・子は一般扶養（16歳以上）として計算</p>
    </div>

    <p class="section-label">転職前</p>
    <div class="field">
      <label for="income_before">年収（万円）</label>
      <input type="number" id="income_before" placeholder="例: 400" min="0" max="10000">
    </div>

    <p class="section-label">転職後</p>
    <div class="field">
      <label for="income_after">年収（万円）</label>
      <input type="number" id="income_after" placeholder="例: 480" min="0" max="10000">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">手取りを比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">手取り増減</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">転職前後の比較（年額）</p>
    <table class="compare-table">
      <thead>
        <tr>
          <th style="text-align:left">項目</th>
          <th>転職前</th>
          <th>転職後</th>
          <th>差額</th>
        </tr>
      </thead>
      <tbody id="db"></tbody>
    </table>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 所得税は2024年度速算表・給与所得控除額を使用。社会保険料は協会けんぽ東京2024年度（40歳未満）の概算値。住民税は均等割5,000円込み。実際の金額は源泉徴収票や年末調整の結果と異なる場合があります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'tensyoku_teatori_v1';

  // ── 給与所得控除 ──
  function kyuyoShotokuKojo(nen) {
    if (nen <= 162.5) return 55;
    if (nen <= 180)   return nen * 0.40 - 10;
    if (nen <= 360)   return nen * 0.30 + 8;
    if (nen <= 660)   return nen * 0.20 + 44;
    if (nen <= 850)   return nen * 0.10 + 110;
    return 195; // 上限195万
  }

  // ── 所得税計算 ──
  function calcShotokuzei(kazei) {
    var tax = 0;
    if      (kazei <= 195)  tax = kazei * 0.05;
    else if (kazei <= 330)  tax = kazei * 0.10 - 9.75;
    else if (kazei <= 695)  tax = kazei * 0.20 - 42.75;
    else if (kazei <= 900)  tax = kazei * 0.23 - 63.6;
    else if (kazei <= 1800) tax = kazei * 0.33 - 153.6;
    else if (kazei <= 4000) tax = kazei * 0.40 - 279.6;
    else                    tax = kazei * 0.45 - 479.6;
    return Math.max(0, tax) * 1.021; // 復興特別所得税
  }

  // ── 社会保険料 ──
  function calcShakai(nen) {
    var kenko  = Math.min(nen * 0.04985, 83.1177); // 健保 協会けんぽ東京2024 9.97%/2
    var nenkin = Math.min(nen * 0.0915,  71.37);   // 厚生年金 18.3%/2 上限650万/月→年780万
    var koyo   = nen * 0.006;                      // 雇用保険
    return kenko + nenkin + koyo;
  }

  // ── 住民税計算 ──
  function calcJumin(nenShotoku, kazeiKojoJumin) {
    var kazei = Math.max(0, nenShotoku - kazeiKojoJumin);
    if (kazei <= 0) return 0;
    return kazei * 0.10 + 0.5; // 均等割0.5万（市3500+都1500）
  }

  // ── メイン計算 ──
  function taxBreakdown(nenManYen, familyType) {
    var nen = nenManYen;
    var kyuyo_kojo = kyuyoShotokuKojo(nen);
    var nenShotoku = Math.max(0, nen - kyuyo_kojo);

    // 所得控除（所得税）
    var kiso       = 48;  // 基礎控除
    var haigusha   = (familyType >= 1) ? 38 : 0; // 配偶者控除
    var fuyou      = (familyType === 2) ? 38
                   : (familyType === 3) ? 76 : 0; // 扶養控除
    var shotokuKojo = kiso + haigusha + fuyou;
    var kazeiShotoku = Math.max(0, nenShotoku - shotokuKojo);

    var shotokuzei = calcShotokuzei(kazeiShotoku);
    var shakai     = calcShakai(nen);

    // 住民税控除（基礎43・配偶者33・扶養33×人数）
    var juminHaigusha = (familyType >= 1) ? 33 : 0;
    var juminFuyou    = (familyType === 2) ? 33
                      : (familyType === 3) ? 66 : 0;
    var juminKojo     = 43 + juminHaigusha + juminFuyou;
    var jumin         = calcJumin(nenShotoku, juminKojo);

    var tedori = nen - shotokuzei - shakai - jumin;
    return {
      nen:        Math.round(nen * 10000) / 10000,
      tedori:     Math.round(tedori * 100) / 100,
      shotokuzei: Math.round(shotokuzei * 100) / 100,
      shakai:     Math.round(shakai * 100) / 100,
      jumin:      Math.round(jumin * 100) / 100
    };
  }

  function calc() {
    var ib = parseFloat(document.getElementById('income_before').value);
    var ia = parseFloat(document.getElementById('income_after').value);
    var fam = parseInt(document.getElementById('family').value);

    if (isNaN(ib) || isNaN(ia) || ib <= 0 || ia <= 0) {
      showErr('転職前後の年収を入力してください');
      return;
    }

    var b = taxBreakdown(ib, fam);
    var a = taxBreakdown(ia, fam);
    var diff = a.tedori - b.tedori;

    var level = diff > 0 ? 'ok' : diff < 0 ? 'ng' : 'warn';
    var sign  = diff > 0 ? '+' : '';
    showResult(level,
      sign + fmtMan(diff) + '万円',
      '転職後の年間手取りは ' + fmtMan(a.tedori) + ' 万円になります'
    );

    var rows = [
      ['年収',       fmtMan(b.nen),        fmtMan(a.nen),        diff_str(a.nen - b.nen), false],
      ['社会保険料', fmtMan(b.shakai),      fmtMan(a.shakai),     diff_str(a.shakai - b.shakai), false],
      ['所得税',     fmtMan(b.shotokuzei),  fmtMan(a.shotokuzei), diff_str(a.shotokuzei - b.shotokuzei), false],
      ['住民税',     fmtMan(b.jumin),       fmtMan(a.jumin),      diff_str(a.jumin - b.jumin), false],
      ['年間手取り', fmtMan(b.tedori),      fmtMan(a.tedori),     diff_str(diff), true],
    ];

    var html = rows.map(function(r) {
      var cls = r[4] ? ' class="hl"' : '';
      var dCls = '';
      var dVal = r[3];
      // 差額の色：手取りは増加が良い、税負担は増加が悪い
      if (r[4]) { // 手取り行
        dCls = diff > 0 ? ' class="up"' : diff < 0 ? ' class="down"' : ' class="same"';
      }
      return '<tr' + cls + '>'
           + '<td>' + r[0] + '</td>'
           + '<td>' + r[1] + '万</td>'
           + '<td>' + r[2] + '万</td>'
           + '<td' + dCls + '>' + dVal + '万</td>'
           + '</tr>';
    }).join('');

    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = 'block';

    // localStorage 保存
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        income_before: ib, income_after: ia, family: fam
      }));
    } catch(e) {}
  }

  function diff_str(v) {
    var r = Math.round(v * 100) / 100;
    return (r > 0 ? '+' : '') + r.toFixed(1);
  }

  function fmtMan(v) {
    return (Math.round(v * 10) / 10).toFixed(1);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  // 起動時に保存値を復元
  (function() {
    try {
      var saved = localStorage.getItem(LS_KEY);
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.income_before) document.getElementById('income_before').value = d.income_before;
      if (d.income_after)  document.getElementById('income_after').value  = d.income_after;
      if (d.family !== undefined) document.getElementById('family').value = d.family;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
