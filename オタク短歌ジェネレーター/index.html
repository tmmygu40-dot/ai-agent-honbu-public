<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オタク短歌ジェネレーター｜推しへの想いを5秒で短歌・俳句に</title>
  <meta name="description" content="推しの名前・好きなところ・今の気持ちを入れるだけで、推しへの想いを短歌や俳句にしてくれる無料ツール。SNSのポエムや推し語りに使えます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .seg {
      display: flex; gap: 0.5rem; margin-bottom: 0.4rem;
    }
    .seg button {
      flex: 1; padding: 0.6rem; border: 1.5px solid var(--border); background: var(--bg);
      color: var(--text-sub); border-radius: 9px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; -webkit-appearance: none; -webkit-tap-highlight-color: transparent;
    }
    .seg button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 短歌カード */
    .poem {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.2rem 0.9rem;
      margin: 0 auto 0.8rem;
      max-width: 600px;
      box-shadow: var(--shadow);
    }
    .poem-text {
      font-size: 1.15rem; font-weight: 600;
      color: var(--text); line-height: 2.1;
      letter-spacing: 0.04em;
      white-space: pre-line;
      text-align: center;
      padding: 0.4rem 0 0.6rem;
    }
    .poem-actions {
      display: flex; justify-content: flex-end; gap: 0.5rem;
      border-top: 1px solid var(--border); padding-top: 0.6rem;
    }
    .poem-actions button {
      padding: 0.45rem 0.9rem; font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; cursor: pointer;
      -webkit-appearance: none;
    }
    .poem-actions button:active { transform: translateY(1px); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .poem { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>オタク短歌ジェネレーター</h1>
    <p class="subtitle">推しへの想いを5秒で短歌・俳句に。SNSのポエム投稿にも。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label>形式</label>
      <div class="seg" id="seg">
        <button type="button" data-mode="tanka" class="active" onclick="setMode('tanka')">短歌(5/7/5/7/7)</button>
        <button type="button" data-mode="haiku" onclick="setMode('haiku')">俳句(5/7/5)</button>
      </div>
      <p class="hint">どちらでもボタン1つで切替できます</p>
    </div>
    <div class="field">
      <label for="oshi">推しの名前</label>
      <input type="text" id="oshi" placeholder="例: 推しくん" maxlength="12">
    </div>
    <div class="field">
      <label for="suki">好きなところ（短く）</label>
      <input type="text" id="suki" placeholder="例: 笑顔／声／全部" maxlength="20">
    </div>
    <div class="field">
      <label for="kimochi">今の気持ち（短く）</label>
      <input type="text" id="kimochi" placeholder="例: 尊い／泣ける／好きすぎる" maxlength="20">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">詠む</button>

  <!-- 結果（動的に挿入） -->
  <div id="result"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 短歌は5/7/5/7/7、俳句は5/7/5の音数を目安にした遊びツールです。厳密な韻律ではなく、推し語りを楽しむための簡易テンプレ生成です。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'otaku_tanka_v1';
  var mode = 'tanka';

  // ── 短歌テンプレ（5/7/5/7/7 を目安に推し名・好きなところ・気持ちを差し込み） ──
  var TANKA_TEMPLATES = [
    '推しの{suki}\n今日もこの胸{kimochi}\n{oshi}は\nわたしの宇宙\nありがとう尊い',
    '画面越し\n{oshi}の{suki}が\n刺さりすぎ\n今日もこの世に\n推しがいる幸せ',
    '{oshi}の\n{suki}見るたび{kimochi}\n夜更かしも\n仕事のだるさも\n全部消えてく',
    'ねえ推しよ\n{suki}が罪作りすぎる\nわたくしの\n推し活貯金\n吹き飛ぶ覚悟',
    'もう一度\n{oshi}の{suki}\n見たくなる\n{kimochi}気持ち\nループ再生'
  ];

  // ── 俳句テンプレ（5/7/5 を目安） ──
  var HAIKU_TEMPLATES = [
    '{oshi}の\n{suki}に今日も\n{kimochi}',
    '画面越し\n{oshi}の{suki}\n沁みる夜',
    '推しが尊い\n{suki}見るたび\n{kimochi}',
    '{oshi}よ\nあなたの{suki}\n効きすぎる',
    'また今日も\n{oshi}の{suki}に\n沼落ちる'
  ];

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.oshi)    document.getElementById('oshi').value    = d.oshi;
      if (d.suki)    document.getElementById('suki').value    = d.suki;
      if (d.kimochi) document.getElementById('kimochi').value = d.kimochi;
      if (d.mode === 'haiku') setMode('haiku');
    } catch (e) {}
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        oshi:    document.getElementById('oshi').value,
        suki:    document.getElementById('suki').value,
        kimochi: document.getElementById('kimochi').value,
        mode:    mode
      }));
    } catch (e) {}
  }

  function setMode(m) {
    mode = m;
    var btns = document.querySelectorAll('#seg button');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].getAttribute('data-mode') === m);
    }
  }

  document.querySelectorAll('#seg button').forEach(function(b){
    b.addEventListener('click', function(){ setMode(b.getAttribute('data-mode')); });
  });

  function pick(arr, n) {
    var copy = arr.slice();
    var out = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      out.push(copy.splice(idx, 1)[0]);
    }
    return out;
  }

  function fill(tpl, vars) {
    return tpl.replace(/\{oshi\}/g, vars.oshi)
              .replace(/\{suki\}/g, vars.suki)
              .replace(/\{kimochi\}/g, vars.kimochi);
  }

  function generate() {
    var oshi    = document.getElementById('oshi').value.trim();
    var suki    = document.getElementById('suki').value.trim();
    var kimochi = document.getElementById('kimochi').value.trim();

    if (!oshi || !suki || !kimochi) {
      var r = document.getElementById('result');
      r.innerHTML = '<div class="poem"><p class="poem-text" style="color:var(--ng);font-size:0.95rem;">3つとも入力してください</p></div>';
      return;
    }

    save();

    var pool = (mode === 'tanka') ? TANKA_TEMPLATES : HAIKU_TEMPLATES;
    var picked = pick(pool, 3);
    var vars = { oshi: oshi, suki: suki, kimochi: kimochi };

    var html = '';
    for (var i = 0; i < picked.length; i++) {
      var text = fill(picked[i], vars);
      var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += '<div class="poem">'
            + '<p class="poem-text">' + safe + '</p>'
            + '<div class="poem-actions">'
            + '<button onclick="copyPoem(this)">コピー</button>'
            + '</div>'
            + '<textarea style="display:none">' + safe + '</textarea>'
            + '</div>';
    }
    document.getElementById('result').innerHTML = html;
  }

  function copyPoem(btn) {
    var card = btn.closest('.poem');
    var text = card.querySelector('.poem-text').textContent;
    var orig = btn.textContent;
    var done = function(){ btn.textContent = 'コピー済'; setTimeout(function(){ btn.textContent = orig; }, 1500); };
    var fail = function(){ btn.textContent = '失敗'; setTimeout(function(){ btn.textContent = orig; }, 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){
        fallbackCopy(text) ? done() : fail();
      });
    } else {
      fallbackCopy(text) ? done() : fail();
    }
  }

  function fallbackCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  // 入力変更で自動保存
  ['oshi','suki','kimochi'].forEach(function(id){
    document.getElementById(id).addEventListener('input', save);
  });

  load();
  </script>
