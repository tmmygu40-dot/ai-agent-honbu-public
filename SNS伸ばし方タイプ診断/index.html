<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="利用SNS・フォロワー数・週投稿頻度・得意な発信形式・目標を選ぶと、4タイプ判定と最適な週投稿頻度・伸ばし方アドバイスがすぐ分かる無料の診断アプリです。">
  <title>SNS伸ばし方タイプ診断｜最適投稿頻度がわかる</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    .advice-list { font-size: 0.9rem; color: var(--text); line-height: 1.7; padding-left: 1.2rem; }
    .advice-list li { margin-bottom: 0.4rem; }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>SNS伸ばし方タイプ診断</h1>
    <p class="subtitle">フォロワー数と発信スタイルで、あなたの最適投稿頻度と伸ばし方タイプが分かります</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="sns">利用SNS</label>
      <select id="sns">
        <option value="ig">Instagram</option>
        <option value="x">X（Twitter）</option>
        <option value="tt">TikTok</option>
      </select>
    </div>
    <div class="field">
      <label for="fol">現在のフォロワー数</label>
      <input type="number" id="fol" placeholder="例: 320" min="0">
    </div>
    <div class="field">
      <label for="freq">現在の週投稿数</label>
      <input type="number" id="freq" placeholder="例: 3" min="0">
    </div>
    <div class="field">
      <label for="fmt">得意な発信形式</label>
      <select id="fmt">
        <option value="photo">写真・画像</option>
        <option value="video">動画</option>
        <option value="text">文字・キャプション</option>
      </select>
    </div>
    <div class="field">
      <label for="goal">伸ばす目的</label>
      <select id="goal">
        <option value="money">収益化したい</option>
        <option value="influence">影響力を持ちたい</option>
        <option value="fun">楽しみたい・趣味</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">伸ばし方アドバイス</p>
    <ul class="advice-list" id="advice-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・経済産業省などの公開資料や各SNSの公式運営ガイドラインを参考に、目安として整理しています。実際の伸びはジャンルや時期で変動します。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'sns-grow-type-input-v1';

  var TYPES = {
    A: { name: '量産・存在感型', baseFreq: 7, eval: '投稿数を増やして露出を稼ぐ段階' },
    B: { name: '継続・信頼型',   baseFreq: 5, eval: '質と頻度のバランスで地力を作る段階' },
    C: { name: '個性・尖り型',   baseFreq: 4, eval: '自分の色で熱量を上げる段階' },
    D: { name: 'ブランド・展開型', baseFreq: 3, eval: '選別と外部展開で価値を高める段階' }
  };

  var SNS_COEF = { ig: 1.0, x: 1.5, tt: 1.2 };
  var SNS_NAME = { ig: 'Instagram', x: 'X', tt: 'TikTok' };
  var FMT_COEF = { photo: 1.0, video: 0.8, text: 1.2 };
  var FMT_NAME = { photo: '写真・画像', video: '動画', text: '文字・キャプション' };
  var GOAL_NAME = { money: '収益化', influence: '影響力', fun: '楽しみ' };

  function pickType(fol) {
    if (fol < 500) return 'A';
    if (fol < 5000) return 'B';
    if (fol < 50000) return 'C';
    return 'D';
  }

  function diagnose() {
    var fol  = parseInt(document.getElementById('fol').value, 10);
    var freq = parseInt(document.getElementById('freq').value, 10);
    var sns  = document.getElementById('sns').value;
    var fmt  = document.getElementById('fmt').value;
    var goal = document.getElementById('goal').value;

    if (isNaN(fol) || fol < 0 || isNaN(freq) || freq < 0) {
      showErr('フォロワー数と週投稿数を入力してください');
      return;
    }

    save({ sns: sns, fol: fol, freq: freq, fmt: fmt, goal: goal });

    var tkey = pickType(fol);
    var t = TYPES[tkey];
    var recommend = Math.round(t.baseFreq * SNS_COEF[sns] * FMT_COEF[fmt]);
    if (recommend < 1) recommend = 1;

    var diff = freq - recommend;
    var level, msg;
    if (diff < -2) { level = 'ng';   msg = '投稿頻度が足りていません。まずは本数を増やすのが近道。'; }
    else if (diff > 2) { level = 'warn'; msg = '投稿しすぎ気味。質と一本一本の振り返りを増やしましょう。'; }
    else { level = 'ok'; msg = '頻度はほぼ適正。タイプに合った中身の磨き込みを。'; }

    var headline = t.name + '（推奨 週' + recommend + '本）';
    showResult(level, headline, msg);

    showDetail([
      ['利用SNS', SNS_NAME[sns]],
      ['現フォロワー数', fol.toLocaleString('ja-JP') + ' 人'],
      ['基本タイプ', t.name],
      ['推奨週投稿数', recommend + ' 本', true],
      ['現在の週投稿数', freq + ' 本'],
      ['過不足', (diff === 0 ? '±0' : (diff > 0 ? '+' + diff : diff)) + ' 本/週'],
      ['得意形式', FMT_NAME[fmt]],
      ['目的', GOAL_NAME[goal]]
    ]);

    showAdvice(buildAdvice(tkey, sns, fmt, goal, diff));
  }

  function buildAdvice(tkey, sns, fmt, goal, diff) {
    var list = [];
    // タイプ別の核
    var core = {
      A: 'まずは本数。完璧を目指さず7割で出して反応を見る。',
      B: '同じ系統で揃えて「次も期待できる」流れを作る。',
      C: '自分の色を強く出した1本を週1ペースで仕込む。',
      D: '本数より「外部に持ち出せる代表作」を磨く。'
    };
    list.push(core[tkey]);

    // SNS別
    var snsTips = {
      ig: 'リール優先で外部リーチ。1投稿目の3秒で結論を見せる。',
      x:  '伸びる投稿は文頭3行勝負。深夜より朝7-9時／夜21-23時を狙う。',
      tt: '冒頭1秒で世界観確定。フックを変えた同テーマ動画を連投。'
    };
    list.push(snsTips[sns]);

    // 形式別
    var fmtTips = {
      photo: '同じ被写体・色味で揃えると「世界観あるアカウント」に見える。',
      video: 'テロップ＋無音でも伝わる構成。最後の0.5秒で次回をチラ見せ。',
      text:  '結論→理由→具体例の順。最初の1行に「なぜ読むべきか」を入れる。'
    };
    list.push(fmtTips[fmt]);

    // 目的別
    var goalTips = {
      money:     'フォロワー1000人を最初の壁に。商品紹介より先に「悩み解決」発信を積む。',
      influence: '保存される投稿を意識。データ・まとめ系を月1本は仕込む。',
      fun:       '伸び以上に「投稿が楽しい状態」を維持。週の本数は無理しない。'
    };
    list.push(goalTips[goal]);

    // 過不足からの行動
    if (diff < -2) list.push('今週は最低でも +' + Math.abs(diff) + '本、書きためをまとめて投稿してみる。');
    else if (diff > 2) list.push('一旦頻度を落として、伸びた投稿の共通点を1つメモする時間を作る。');

    return list;
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showAdvice(items) {
    document.getElementById('advice-list').innerHTML = items.map(function(s){
      return '<li>' + escapeHtml(s) + '</li>';
    }).join('');
    document.getElementById('advice-card').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function save(d) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
  }
  function restore() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.sns)  document.getElementById('sns').value = d.sns;
      if (typeof d.fol === 'number')  document.getElementById('fol').value = d.fol;
      if (typeof d.freq === 'number') document.getElementById('freq').value = d.freq;
      if (d.fmt)  document.getElementById('fmt').value = d.fmt;
      if (d.goal) document.getElementById('goal').value = d.goal;
    } catch(e) {}
  }
  restore();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
