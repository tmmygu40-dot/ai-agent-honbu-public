<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店頭POP文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── タグ選択 ── */
    .tag-group { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.35rem; }
    .tag-btn {
      padding: 0.3rem 0.75rem; font-size: 0.82rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--bg); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .tag-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── POP文結果 ── */
    .results-area {
      display: none;
      max-width: 600px;
      margin: 0 auto;
    }
    .results-area.visible { display: block; }

    .pop-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .pop-item-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.65rem;
    }
    .pop-type {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); background: var(--accent-light);
      padding: 0.2rem 0.55rem; border-radius: 20px;
    }
    .btn-copy {
      font-size: 0.8rem; font-weight: 700;
      padding: 0.28rem 0.8rem;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .pop-text {
      font-size: 1rem; line-height: 1.65; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }

    /* ── 履歴 ── */
    .history-area {
      max-width: 600px; margin: 1.5rem auto 0;
    }
    .history-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.6rem;
    }
    .history-title { font-size: 0.82rem; font-weight: 700; color: var(--text-sub); }
    .btn-clear-hist {
      font-size: 0.75rem; color: var(--text-sub); background: none; border: none;
      cursor: pointer; text-decoration: underline;
    }
    .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.6rem 0.9rem;
      font-size: 0.82rem; color: var(--text-sub); cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--accent); color: var(--text); }
    .history-item .hist-name { font-weight: 700; color: var(--text); }
    .history-item .hist-date { font-size: 0.72rem; float: right; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-copy { display: none !important; }
      .card, .pop-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card, #fff); color: var(--text-sub, #666);
      border: 1.5px solid var(--border, #ddd); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent, #e07b00); color: var(--accent, #e07b00); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🏷️ 店頭POP文ジェネレーター</h1>
    <p class="subtitle">商品名と特徴を入力するだけで売れるPOP文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="productName">商品名 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="productName" placeholder="例: 国産いちごジャム、手作りランチボックス">
    </div>
    <div class="field">
      <label for="features">商品の特徴・セールスポイント <span style="color:var(--ng)">*</span></label>
      <textarea id="features" placeholder="例: 無添加・砂糖不使用・農家直送&#10;複数ある場合は改行か「・」で区切って入力"></textarea>
      <p class="hint">特徴が多いほどバリエーション豊かなPOP文が生成されます</p>
    </div>
    <div class="field">
      <label>業種・カテゴリ（任意）</label>
      <div class="tag-group" id="categoryTags">
        <button class="tag-btn active" onclick="toggleTag(this)" data-val="">すべて</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="食品・飲料">食品・飲料</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="雑貨・日用品">雑貨・日用品</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="アパレル・ファッション">アパレル</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="コスメ・美容">コスメ・美容</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="家電・デジタル">家電・デジタル</button>
        <button class="tag-btn" onclick="toggleTag(this)" data-val="健康・医療">健康・医療</button>
      </div>
    </div>
    <div class="field">
      <label>ターゲット（任意）</label>
      <div class="tag-group" id="targetTags">
        <button class="tag-btn active" onclick="toggleTarget(this)" data-val="">指定なし</button>
        <button class="tag-btn" onclick="toggleTarget(this)" data-val="女性">女性</button>
        <button class="tag-btn" onclick="toggleTarget(this)" data-val="男性">男性</button>
        <button class="tag-btn" onclick="toggleTarget(this)" data-val="シニア">シニア</button>
        <button class="tag-btn" onclick="toggleTarget(this)" data-val="ファミリー">ファミリー</button>
        <button class="tag-btn" onclick="toggleTarget(this)" data-val="ビジネスマン">ビジネスマン</button>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc no-print" onclick="generate()">✨ POP文を生成する</button>

  <!-- 結果エリア -->
  <div class="results-area" id="resultsArea">
    <div id="popList"></div>
    <button class="btn-calc no-print" style="background:#5a6e8a;box-shadow:0 4px 0 #3d4f63,0 6px 16px rgba(90,110,138,0.25);" onclick="copyAll()">📋 全文まとめてコピー</button>
  </div>

  <!-- 履歴エリア -->
  <div class="history-area no-print" id="historyArea" style="display:none">
    <div class="history-head">
      <span class="history-title">📝 最近の生成履歴</span>
      <button class="btn-clear-hist" onclick="clearHistory()">履歴を消す</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var selectedCategory = '';
  var selectedTarget   = '';

  function toggleTag(btn) {
    document.querySelectorAll('#categoryTags .tag-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedCategory = btn.dataset.val;
  }
  function toggleTarget(btn) {
    document.querySelectorAll('#targetTags .tag-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedTarget = btn.dataset.val;
  }

  // ── POP文テンプレート定義 ──
  var patterns = [
    {
      type: 'お得感・価格訴求',
      gen: function(name, feats, cat, target) {
        var f = feats[0] || '高品質';
        return '今だけ特別価格！\n\n『' + name + '』\n\n' + f + 'なのにこのお値段。\nこのチャンスをお見逃しなく！';
      }
    },
    {
      type: '限定感・希少性',
      gen: function(name, feats, cat, target) {
        var f = feats.length > 1 ? feats[0] + '×' + feats[1] : feats[0] || '厳選素材';
        return '数量限定入荷！\n\n『' + name + '』\n\n' + f + '\n手に入るうちにぜひどうぞ。';
      }
    },
    {
      type: '品質・こだわり訴求',
      gen: function(name, feats, cat, target) {
        var fList = feats.slice(0,3).map(function(f){ return '✓ ' + f; }).join('\n');
        return '品質へのこだわり\n\n『' + name + '』\n\n' + fList + '\n\n妥協しないお客様へ。';
      }
    },
    {
      type: 'シズル・体験訴求',
      gen: function(name, feats, cat, target) {
        var f = feats[feats.length - 1] || '特別な味わい';
        var t = target ? target + 'に大人気！' : 'リピーター続出！';
        return t + '\n\n『' + name + '』\n\n' + f + 'を、ぜひ一度お試しください。\n一度使ったら手放せません。';
      }
    },
    {
      type: '問いかけ・課題解決型',
      gen: function(name, feats, cat, target) {
        var f = feats[0] || '高品質';
        var question = cat === '食品・飲料' ? '毎日の食事、もっと楽しみたいですか？'
                     : cat === '健康・医療' ? '健康が気になり始めていませんか？'
                     : cat === 'コスメ・美容' ? '肌のお悩み、諦めていませんか？'
                     : 'お探しのものが見つかりましたか？';
        return question + '\n\nそれが——\n\n『' + name + '』\n\n' + f + ' で、あなたの毎日が変わります。';
      }
    },
    {
      type: 'ストーリー・背景訴求',
      gen: function(name, feats, cat, target) {
        var f = feats.slice(0,2).join('・') || '素材へのこだわり';
        return '作り手の想いが詰まった一品\n\n『' + name + '』\n\n' + f + '\n\n丁寧に作られたものを、あなたの元へ。';
      }
    },
    {
      type: '比較・差別化訴求',
      gen: function(name, feats, cat, target) {
        var f = feats[0] || '独自の特長';
        return '他とどこが違うの？\n\n→ 『' + name + '』は\n' + f + '\n\n一般的な商品とはここが違います。\nぜひ手に取って確かめてください！';
      }
    },
    {
      type: 'ギフト・プレゼント訴求',
      gen: function(name, feats, cat, target) {
        var f = feats.slice(0,2).join('・') || '特別なこだわり';
        var t = target ? target + 'への' : '';
        return t + 'プレゼントに迷ったら\n\n『' + name + '』\n\n' + f + '\n\n喜ばれること間違いなし。\nギフト包装も承ります。';
      }
    }
  ];

  function parseFeatures(raw) {
    return raw.split(/[\n・、,，]/).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
  }

  function generate() {
    var name = document.getElementById('productName').value.trim();
    var rawFeat = document.getElementById('features').value.trim();
    if (!name) { alert('商品名を入力してください'); return; }
    if (!rawFeat) { alert('商品の特徴を入力してください'); return; }

    var feats = parseFeatures(rawFeat);
    var list = document.getElementById('popList');
    list.innerHTML = '';

    patterns.forEach(function(p, idx) {
      var text = p.gen(name, feats, selectedCategory, selectedTarget);
      var item = document.createElement('div');
      item.className = 'pop-item';
      item.innerHTML =
        '<div class="pop-item-head">'
        + '<span class="pop-type">' + p.type + '</span>'
        + '<button class="btn-copy" onclick="copyOne(this, ' + idx + ')">コピー</button>'
        + '</div>'
        + '<div class="pop-text" id="popText' + idx + '">' + escHtml(text) + '</div>';
      list.appendChild(item);
    });

    document.getElementById('resultsArea').className = 'results-area visible';
    document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

    saveHistory(name, feats);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyOne(btn, idx) {
    var text = document.getElementById('popText' + idx).innerText;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'コピー済み✓';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = 'コピー済み✓'; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyAll() {
    var allText = patterns.map(function(p, idx) {
      return '【' + p.type + '】\n' + document.getElementById('popText' + idx).innerText;
    }).join('\n\n---\n\n');
    navigator.clipboard.writeText(allText).then(function() {
      alert('全POP文をコピーしました');
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = allText; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      alert('全POP文をコピーしました');
    });
  }

  // ── 履歴 ──
  var HIST_KEY = 'popgen_history';

  function saveHistory(name, feats) {
    var hist = loadHistoryData();
    var entry = { name: name, feats: feats.join('・'), date: new Date().toLocaleDateString('ja-JP') };
    hist = hist.filter(function(h){ return h.name !== name; });
    hist.unshift(entry);
    if (hist.length > 10) hist = hist.slice(0, 10);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
    renderHistory();
  }

  function loadHistoryData() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e) { return []; }
  }

  function renderHistory() {
    var hist = loadHistoryData();
    var area = document.getElementById('historyArea');
    if (!hist.length) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    var list = document.getElementById('historyList');
    list.innerHTML = hist.map(function(h, i) {
      return '<div class="history-item" onclick="loadHistory(' + i + ')">'
        + '<span class="hist-date">' + h.date + '</span>'
        + '<div class="hist-name">' + escHtml(h.name) + '</div>'
        + '<div style="font-size:0.75rem;margin-top:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(h.feats) + '</div>'
        + '</div>';
    }).join('');
  }

  function loadHistory(idx) {
    var hist = loadHistoryData();
    var h = hist[idx];
    if (!h) return;
    document.getElementById('productName').value = h.name;
    document.getElementById('features').value = h.feats;
    generate();
  }

  function clearHistory() {
    if (!confirm('履歴を消しますか？')) return;
    localStorage.removeItem(HIST_KEY);
    document.getElementById('historyArea').style.display = 'none';
  }

  // 起動時に履歴表示
  renderHistory();
  </script>
