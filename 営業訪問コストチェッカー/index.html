<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業訪問コストチェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力グループ ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>営業訪問コストチェッカー</h1>
    <p class="subtitle">外回り1件あたりのガソリン代・人件費・採算を即確認</p>
  </header>

  <!-- 移動コスト -->
  <div class="card">
    <p class="card-title">移動コスト</p>
    <div class="row3">
      <div class="field">
        <label for="dist">往復距離（km）</label>
        <input type="number" id="dist" placeholder="例: 30" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="fuel">燃費（km/L）</label>
        <input type="number" id="fuel" placeholder="例: 15" min="0.1" step="0.1">
      </div>
      <div class="field">
        <label for="gasPrice">ガソリン単価（円/L）</label>
        <input type="number" id="gasPrice" placeholder="例: 175" min="0" step="1">
      </div>
    </div>
  </div>

  <!-- 人件費 -->
  <div class="card">
    <p class="card-title">人件費</p>
    <div class="row2">
      <div class="field">
        <label for="hours">訪問時間合計（時間）</label>
        <input type="number" id="hours" placeholder="例: 2" min="0" step="0.25">
        <p class="hint">移動＋商談の合計</p>
      </div>
      <div class="field">
        <label for="wage">時給（円）</label>
        <input type="number" id="wage" placeholder="例: 2500" min="0" step="100">
        <p class="hint">社保込みの実質コスト</p>
      </div>
    </div>
  </div>

  <!-- 売上・粗利 -->
  <div class="card">
    <p class="card-title">売上・粗利</p>
    <div class="row2">
      <div class="field">
        <label for="sales">期待売上（円）</label>
        <input type="number" id="sales" placeholder="例: 50000" min="0" step="1000">
      </div>
      <div class="field">
        <label for="margin">粗利率（%）</label>
        <input type="number" id="margin" placeholder="例: 30" min="0" max="100" step="1">
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">採算を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">純利益（1訪問あたり）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var IDS = ['dist','fuel','gasPrice','hours','wage','sales','margin'];

  // localStorage 復元
  window.addEventListener('DOMContentLoaded', function() {
    IDS.forEach(function(id) {
      var v = localStorage.getItem('eikan_' + id);
      if (v !== null) document.getElementById(id).value = v;
    });
  });

  function save() {
    IDS.forEach(function(id) {
      localStorage.setItem('eikan_' + id, document.getElementById(id).value);
    });
  }

  function calc() {
    var dist     = parseFloat(document.getElementById('dist').value);
    var fuel     = parseFloat(document.getElementById('fuel').value);
    var gasPrice = parseFloat(document.getElementById('gasPrice').value);
    var hours    = parseFloat(document.getElementById('hours').value);
    var wage     = parseFloat(document.getElementById('wage').value);
    var sales    = parseFloat(document.getElementById('sales').value);
    var margin   = parseFloat(document.getElementById('margin').value);

    if ([dist, fuel, gasPrice, hours, wage, sales, margin].some(isNaN)) {
      showErr('すべての項目を入力してください'); return;
    }
    if (fuel <= 0) { showErr('燃費は0より大きい値を入力してください'); return; }

    var gasCost    = dist / fuel * gasPrice;          // ガソリン代
    var laborCost  = hours * wage;                    // 人件費
    var totalCost  = gasCost + laborCost;             // 総コスト
    var grossProfit = sales * (margin / 100);         // 粗利額
    var netProfit  = grossProfit - totalCost;         // 純利益
    var netMargin  = sales > 0 ? netProfit / sales * 100 : -Infinity;

    var level, msg;
    if (netProfit > 0 && netMargin >= 10) {
      level = 'ok';
      msg = '採算OK：十分な利益が出ています';
    } else if (netProfit > 0) {
      level = 'warn';
      msg = '辛うじてプラス：利益率が低めです';
    } else {
      level = 'ng';
      msg = '採算NG：訪問コストが粗利を上回っています';
    }

    save();
    showResult(level, fmt(netProfit) + ' 円', msg);
    showDetail([
      ['ガソリン代（往復' + dist + 'km）', fmt(gasCost) + ' 円'],
      ['人件費（' + hours + '時間 × ' + fmt(wage) + '円）', fmt(laborCost) + ' 円'],
      ['訪問総コスト', fmt(totalCost) + ' 円'],
      ['期待粗利（売上' + fmt(sales) + '円 × ' + margin + '%）', fmt(grossProfit) + ' 円'],
      ['純利益', fmt(netProfit) + ' 円', true],
      ['純利益率', netMargin.toFixed(1) + ' %'],
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
