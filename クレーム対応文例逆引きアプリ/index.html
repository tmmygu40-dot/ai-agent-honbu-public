<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="クレーム種別を選ぶだけで、お詫び・対応・報告メールの文例をすぐコピーできる逆引きアプリ。商品不良・配送遅延・接客態度など8種別に対応。">
  <title>クレーム対応文例逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── カテゴリボタン ── */
    .cat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .cat-btn {
      padding: 0.8rem 0.5rem; font-size: 0.88rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* ── 文例カード ── */
    .tpl-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.8rem;
    }
    .tpl-card:last-child { margin-bottom: 0; }
    .tpl-title {
      font-size: 0.82rem; font-weight: 700; color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .tpl-body {
      font-size: 0.88rem; color: var(--text); line-height: 1.7;
      white-space: pre-wrap; word-break: break-all;
      background: var(--bg); border-radius: 8px;
      padding: 0.8rem 0.9rem; margin-bottom: 0.6rem;
      max-height: 300px; overflow-y: auto;
    }
    .btn-copy {
      display: inline-block; padding: 0.45rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--ok); }

    /* ── お気に入り文例 ── */
    .fav-star {
      float: right; font-size: 1.2rem; cursor: pointer; line-height: 1;
      color: var(--border); transition: color 0.15s;
    }
    .fav-star.active { color: var(--accent); }

    #results-area { max-width: 600px; margin: 0 auto; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  // ── お気に入り管理 ──
  var STORAGE_KEY = 'claim-tpl-favs';
  var favs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function saveFavs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(favs)); }
  function isFav(catIdx, tplIdx) { return favs.some(function(f){ return f[0]===catIdx && f[1]===tplIdx; }); }
  function toggleFav(catIdx, tplIdx) {
    var idx = favs.findIndex(function(f){ return f[0]===catIdx && f[1]===tplIdx; });
    if (idx >= 0) favs.splice(idx, 1); else favs.push([catIdx, tplIdx]);
    saveFavs();
  }

  // ── カテゴリボタン生成 ──
  var grid = document.getElementById('cat-grid');
  DATA.forEach(function(d, i) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = d.icon + ' ' + d.cat;
    btn.onclick = function() { selectCat(i); };
    grid.appendChild(btn);
  });

  var currentCat = -1;

  function selectCat(idx) {
    currentCat = idx;
    var btns = grid.querySelectorAll('.cat-btn');
    btns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
    renderTemplates(idx);
  }

  function renderTemplates(catIdx) {
    var area = document.getElementById('results-area');
    var cat = DATA[catIdx];
    var html = '<div class="card"><p class="card-title">' + cat.icon + ' ' + cat.cat + ' の文例</p>';
    cat.templates.forEach(function(tpl, tplIdx) {
      var faved = isFav(catIdx, tplIdx);
      html += '<div class="tpl-card">'
        + '<span class="fav-star ' + (faved ? 'active' : '') + '" onclick="onFav(' + catIdx + ',' + tplIdx + ',this)">★</span>'
        + '<p class="tpl-title">' + tpl.title + '</p>'
        + '<div class="tpl-body">' + escHtml(tpl.body) + '</div>'
        + '<button class="btn-copy" onclick="copyTpl(this,' + catIdx + ',' + tplIdx + ')">📋 コピー</button>'
        + '</div>';
    });
    html += '</div>';
    area.innerHTML = html;
  }

  function onFav(catIdx, tplIdx, el) {
    toggleFav(catIdx, tplIdx);
    el.classList.toggle('active');
  }

  function copyTpl(btn, catIdx, tplIdx) {
    var text = DATA[catIdx].templates[tplIdx].body;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✅ コピー完了';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 1500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ コピー完了';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 1500);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
