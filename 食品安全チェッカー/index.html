<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品安全チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>食品安全チェッカー</h1>
    <p class="subtitle">料理の残り安全時間を管理する</p>
  </header>

  <main>
    <section class="form-section">
      <h2>料理を登録する</h2>
      <div class="form">
        <div class="form-group">
          <label for="food-name">料理名</label>
          <input type="text" id="food-name" placeholder="例：カレー" maxlength="50">
        </div>
        <div class="form-group">
          <label for="made-at">作った時刻</label>
          <input type="datetime-local" id="made-at">
        </div>
        <div class="form-group">
          <label>保存方法</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="storage" value="room" checked>
              <span>常温（2時間）</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="storage" value="cold">
              <span>冷蔵（72時間）</span>
            </label>
          </div>
        </div>
        <button id="add-btn" class="btn-primary">登録する</button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録中の料理 <span id="count"></span></h2>
        <button id="clear-expired-btn" class="btn-small">期限切れを削除</button>
      </div>
      <div id="food-list" class="food-list">
        <p class="empty-msg">登録されている料理はありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
