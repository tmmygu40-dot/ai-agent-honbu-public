<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>円安コスト試算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>円安コスト試算アプリ</h1>
    <p class="subtitle">輸入材料の為替コスト増加と売価転嫁額を品目ごとに計算</p>

    <section class="form-section">
      <h2>品目を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：アルミ板">
        </div>
        <div class="form-group">
          <label for="costUsd">仕入れ値（ドル）</label>
          <input type="number" id="costUsd" placeholder="例：100" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="oldRate">旧為替レート（円/ドル）</label>
          <input type="number" id="oldRate" placeholder="例：130" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="newRate">新為替レート（円/ドル）</label>
          <input type="number" id="newRate" placeholder="例：155" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="grossMargin">目標粗利率（%）</label>
          <input type="number" id="grossMargin" placeholder="例：30" min="0" max="99" step="0.1">
        </div>
      </div>

      <div class="preview" id="preview" hidden>
        <div class="preview-grid">
          <div class="preview-item">
            <span class="preview-label">旧円換算コスト</span>
            <span class="preview-value" id="prevOldCost">-</span>
          </div>
          <div class="preview-item">
            <span class="preview-label">新円換算コスト</span>
            <span class="preview-value" id="prevNewCost">-</span>
          </div>
          <div class="preview-item highlight-red">
            <span class="preview-label">コスト増加額</span>
            <span class="preview-value" id="prevIncrease">-</span>
          </div>
          <div class="preview-item highlight-red">
            <span class="preview-label">増加率</span>
            <span class="preview-value" id="prevIncreaseRate">-</span>
          </div>
          <div class="preview-item highlight-blue">
            <span class="preview-label">必要売価（転嫁後）</span>
            <span class="preview-value" id="prevSellPrice">-</span>
          </div>
        </div>
      </div>

      <button class="btn-add" id="btnAdd">追加して保存</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>品目一覧</h2>
        <div class="summary" id="summary" hidden>
          合計コスト増加額：<strong id="totalIncrease">0</strong> 円
        </div>
      </div>
      <div id="emptyMsg" class="empty-msg">品目を追加してください</div>
      <div class="table-wrap">
        <table id="itemTable" hidden>
          <thead>
            <tr>
              <th>品目名</th>
              <th>仕入れ値(USD)</th>
              <th>旧レート</th>
              <th>新レート</th>
              <th>旧コスト(円)</th>
              <th>新コスト(円)</th>
              <th>増加額(円)</th>
              <th>増加率</th>
              <th>粗利率</th>
              <th>必要売価(円)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
