<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>怒りタイプクールダウン診断｜3問でわかる怒りグセと30秒切替法</title>
  <meta name="description" content="3つの質問に答えるだけで、あなたの怒りタイプ4種類のうちどれかを判定。タイプ別の30秒クールダウン法を即提示するメンタルケア無料診断です。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { margin-bottom: 1.2rem; }
    .question:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .q-options label {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer;
      font-size: 0.9rem; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .q-options label:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }
    .q-options input[type="radio"] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
    .q-options span { flex: 1; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-emoji { font-size: 2.6rem; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; margin-bottom: 1rem; }
    .cooldown-box {
      background: var(--accent-light); border: 1.5px solid var(--accent);
      border-radius: 10px; padding: 0.9rem 1rem; text-align: left;
      margin-top: 0.6rem;
    }
    .cooldown-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; }
    .cooldown-text { font-size: 0.95rem; color: var(--text); line-height: 1.55; }
    .last-result {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.6rem 0.9rem; font-size: 0.8rem; color: var(--text-sub);
      background: var(--card); border: 1px dashed var(--border); border-radius: 10px;
      text-align: center;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>怒りタイプクールダウン診断</h1>
    <p class="subtitle">3問で分かるあなたの怒りグセ。タイプ別「30秒で切り替える方法」つき。</p>
  </header>

  <div class="last-result" id="lastResult" style="display:none"></div>

  <div class="card">
    <p class="card-title">3問の質問</p>

    <div class="question">
      <p class="q-text">Q1. ムカッとした瞬間、最初に出るのは？</p>
      <div class="q-options" data-q="q1">
        <label><input type="radio" name="q1" value="A"><span>声が大きくなる／顔に出る</span></label>
        <label><input type="radio" name="q1" value="B"><span>表面は平静、内心グツグツ</span></label>
        <label><input type="radio" name="q1" value="C"><span>「なんで？」と理由を考え始める</span></label>
        <label><input type="radio" name="q1" value="D"><span>黙る／距離をとる</span></label>
      </div>
    </div>

    <div class="question">
      <p class="q-text">Q2. その怒り、どのくらい続く？</p>
      <div class="q-options" data-q="q2">
        <label><input type="radio" name="q2" value="A"><span>数分で発散して終わる</span></label>
        <label><input type="radio" name="q2" value="B"><span>何時間でも引きずる</span></label>
        <label><input type="radio" name="q2" value="C"><span>解決するまで頭から離れない</span></label>
        <label><input type="radio" name="q2" value="D"><span>翌日まで持ち越す</span></label>
      </div>
    </div>

    <div class="question">
      <p class="q-text">Q3. 落ち着くきっかけになりやすいのは？</p>
      <div class="q-options" data-q="q3">
        <label><input type="radio" name="q3" value="A"><span>一息ついたら自然に忘れる</span></label>
        <label><input type="radio" name="q3" value="B"><span>誰かに話を聞いてもらう</span></label>
        <label><input type="radio" name="q3" value="C"><span>納得できる答えが出る</span></label>
        <label><input type="radio" name="q3" value="D"><span>一人の時間で回復する</span></label>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの怒りタイプ</p>
    <p class="result-emoji" id="rEmoji">🔥</p>
    <p class="result-value" id="rType">—</p>
    <p class="result-note" id="rDesc"></p>
    <div class="cooldown-box">
      <p class="cooldown-title">⏱ 30秒クールダウン法</p>
      <p class="cooldown-text" id="rCool"></p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは厚生労働省「こころの耳」やアンガーマネジメントの一般的な知見を参考に、目安として整理した簡易セルフチェックです。医療的診断ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    A: {
      emoji: '🔥',
      name: '瞬間沸騰タイプ',
      desc: 'カッとなった瞬間に表に出るタイプ。発散は早いけれど、後で「言いすぎたかも…」と後悔しがち。爆発の前に1秒置けるかが分かれ目です。',
      cool: '深呼吸を3回 → 心の中で「6・5・4・3・2・1」と逆カウント。声を出す前に1秒だけ間を置くだけで言葉のトゲが半分に減ります。'
    },
    B: {
      emoji: '🌋',
      name: 'じわじわ蓄積タイプ',
      desc: '表は平静でも内側にマグマを溜め込むタイプ。我慢が限界を超えたタイミングで一気に噴火しやすいので、こまめなガス抜きが大事。',
      cool: '紙に怒りの中身を3行だけ書き出して、グシャッと丸めて捨てる。書く＋捨てるの動作で脳が「処理した」と判定し、モヤモヤが軽くなります。'
    },
    C: {
      emoji: '🧠',
      name: '理屈モヤモヤタイプ',
      desc: '「なぜそうなった？」と頭の中でぐるぐる考え続けるタイプ。正論で詰めたくなるけれど、考えすぎて眠れなくなることも。',
      cool: '視線をいったん遠く（窓・天井・空）へ移して10秒キープ → 別のことを声に出して説明する。思考のループを物理的に切るのが効きます。'
    },
    D: {
      emoji: '🌙',
      name: '拗ねモードタイプ',
      desc: '黙ってシャットダウンするタイプ。表面は穏やかでも心の中では距離を取り続け、関係修復までに時間がかかりがち。',
      cool: '温かい飲み物を一口 or 好きな香りを30秒嗅ぐ。五感のスイッチを切り替えると、内向きの殻が自然にほどけます。'
    }
  };

  function diagnose() {
    var ans = ['q1','q2','q3'].map(function(n){
      var el = document.querySelector('input[name="'+n+'"]:checked');
      return el ? el.value : null;
    });
    if (ans.indexOf(null) !== -1) {
      alert('3問すべてに答えてください');
      return;
    }
    var count = { A:0, B:0, C:0, D:0 };
    ans.forEach(function(v){ count[v]++; });
    var order = ['A','B','C','D'];
    var top = order.reduce(function(best, k){
      return count[k] > count[best] ? k : best;
    }, 'A');

    var t = TYPES[top];
    document.getElementById('rEmoji').textContent = t.emoji;
    document.getElementById('rType').textContent = t.name;
    document.getElementById('rDesc').textContent = t.desc;
    document.getElementById('rCool').textContent = t.cool;
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

    try {
      localStorage.setItem('angerType_last', JSON.stringify({
        type: top, name: t.name, date: new Date().toISOString().slice(0,10)
      }));
    } catch(e) {}
  }

  (function showLast(){
    try {
      var raw = localStorage.getItem('angerType_last');
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d || !d.name) return;
      var box = document.getElementById('lastResult');
      box.textContent = '前回（' + d.date + '）の診断結果：' + d.name;
      box.style.display = 'block';
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
