<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今週の開運を呼ぶアファメーション（肯定的な言葉）をワンタップで生成。前向きな言葉とラッキーアクションで気持ちを整える開運おみくじアプリです。">
  <title>開運アファメーションおみくじ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #ff9a56;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #e67e3f, 0 6px 16px rgba(255,154,86,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #e67e3f, 0 2px 8px rgba(255,154,86,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── アファメーション専用スタイル ── */
    .affirmation-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .affirmation-text {
      font-size: 1.3rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; color: var(--accent);
    }
    .luck-action-label { font-size: 0.78rem; color: var(--text-sub); margin-top: 1rem; margin-bottom: 0.3rem; }
    .luck-action-text {
      font-size: 0.95rem; color: var(--text);
      padding: 0.8rem; background: rgba(255,154,86,0.1);
      border-left: 3px solid var(--accent); border-radius: 4px;
    }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>✨ 開運アファメーションおみくじ</h1>
    <p class="subtitle">今週の開運を呼ぶ肯定的な言葉をワンタップで生成</p>
  </header>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generateAffirmation()">🎯 開運アファメーションを生成</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <div class="affirmation-emoji" id="emoji">✨</div>
    <p class="affirmation-text" id="affirmation">今週もあなたなら大丈夫</p>
    <p class="luck-action-label">💡 ラッキーアクション：</p>
    <p class="luck-action-text" id="luckAction">朝日を見て深呼吸する</p>
  </div>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // アファメーション＋ラッキーアクションデータセット
  var affirmations = [
    { emoji: '✨', text: '今週もあなたなら大丈夫', action: '朝日を見て深呼吸する' },
    { emoji: '💪', text: 'あなたの力は必ず報われる', action: '鏡を見て「できる」と言う' },
    { emoji: '🌟', text: '最高の週がやってくる', action: 'いつもより早く起きてみる' },
    { emoji: '🎯', text: '目標達成は時間の問題', action: '目標を誰かに話す' },
    { emoji: '💝', text: 'あなたは充分に価値がある', action: '好きなものを1つ褒める' },
    { emoji: '🚀', text: '新しいチャレンジが花開く', action: '1つ新しいことを始める' },
    { emoji: '😊', text: 'その笑顔で世界が変わる', action: '3人に笑顔を届ける' },
    { emoji: '🌈', text: 'すべては最高のタイミングで', action: '好きな色を身につける' },
    { emoji: '🏆', text: 'あなたは既に成功している', action: 'この1週間の成果を思い出す' },
    { emoji: '🔥', text: 'その情熱は確実に光になる', action: '好きなことを1時間やる' },
    { emoji: '💫', text: '運気は確実に上昇中', action: '運気が上がっていると信じる' },
    { emoji: '🎊', text: 'すべてが上手くいく週だ', action: '感謝を3つ挙げる' },
    { emoji: '🌺', text: 'あなたの幸せが周りを照らす', action: '苦手な人に優しくする' },
    { emoji: '⭐', text: '輝く時はもう近い', action: '過去の成功を1つ思い出す' },
    { emoji: '🎁', text: 'この週は特別な贈り物', action: '今を大事にする' },
    { emoji: '🌸', text: 'あなたは確実に成長している', action: '鏡に感謝を言う' },
    { emoji: '💎', text: 'あなたの本当の価値を知ろう', action: '自分の強みを1つ数える' },
    { emoji: '🌊', text: '流れに身を任せて上手くいく', action: 'やることリストを書く' },
    { emoji: '🦋', text: '蝶のように自由に飛ぼう', action: '今日できなかったことは忘れる' },
    { emoji: '🌙', text: 'どんな夜も必ず明ける', action: '寝る前に今日を褒める' },
    { emoji: '☀️', text: '明日も晴れの予報だ', action: '朝の準備を丁寧にする' },
    { emoji: '🍀', text: 'あなたは幸運体質だ', action: 'いい出来事を1つ探す' },
    { emoji: '🎪', text: 'この週を楽しむが勝ち', action: '得意なことをやってみる' },
    { emoji: '🏅', text: 'あなたはチャンピオン', action: 'ずっと続けたことを褒める' },
    { emoji: '🌻', text: '太陽のように輝け', action: '朝日を浴びる' },
    { emoji: '🚁', text: 'もう高く飛ぶ時期だ', action: '新しい目標を書く' },
    { emoji: '🎨', text: 'あなたの人生は傑作だ', action: '自分のいいところを描く' },
    { emoji: '🎵', text: 'リズムに乗って進もう', action: '好きな曲を聴く' },
    { emoji: '🏔️', text: '山頂はもう見えている', action: '小さな一歩を踏み出す' },
    { emoji: '🌴', text: 'リラックスして上手くいく', action: '深くため息をつく' },
    { emoji: '🎪', text: '人生は思い出作り', action: '誰かを笑わせる' }
  ];

  // localStorage キー
  var STORAGE_KEY = 'last_affirmation_data';

  // アファメーション生成関数
  function generateAffirmation() {
    // ランダムに1つ選択
    var idx = Math.floor(Math.random() * affirmations.length);
    var current = affirmations[idx];

    // 表示
    showAffirmation(current);

    // localStorage に保存
    saveToStorage(current);
  }

  // 表示関数
  function showAffirmation(data) {
    var card = document.getElementById('result');
    document.getElementById('emoji').textContent = data.emoji;
    document.getElementById('affirmation').textContent = data.text;
    document.getElementById('luckAction').textContent = data.action;
    card.style.display = '';
  }

  // localStorage 保存関数
  function saveToStorage(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        emoji: data.emoji,
        text: data.text,
        action: data.action,
        timestamp: new Date().toISOString()
      }));
    } catch(e) {
      console.log('localStorage 保存失敗:', e);
    }
  }

  // ページロード時に最後のアファメーションを復元
  function loadFromStorage() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        var data = JSON.parse(saved);
        showAffirmation(data);
      }
    } catch(e) {
      console.log('localStorage 読み込み失敗:', e);
    }
  }

  // ページロード時に実行
  document.addEventListener('DOMContentLoaded', function() {
    loadFromStorage();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
