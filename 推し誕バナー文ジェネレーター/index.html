<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推し誕日までのカウントダウンと応援メッセージを瞬時に生成。推し活を盛り上げる応援コピーを毎日チェック。">
  <title>🎂 推し誕バナー文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 応援コピーカード ── */
    .copy-item {
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      padding: 1rem;
      margin: 0.8rem 0;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
      word-wrap: break-word;
    }
    .copy-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .copy-btn:active { opacity: 0.8; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .copy-btn { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎂 推し誕バナー文ジェネレーター</h1>
    <p class="subtitle">推し誕日までのカウントダウンと応援メッセージを瞬時に作れます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推し誕日を入力</p>
    <div class="field">
      <label for="birthday">推しの誕生日</label>
      <input type="date" id="birthday">
      <p class="hint">推しの誕生日を選択してください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">応援メッセージを作る</button>

  <!-- 結論カード -->
  <div class="result-card ok" id="result">
    <p class="result-label">カウントダウン</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <div id="copy-cards"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、楽しい推し活を応援するための参考ツールです。
  </p>

  <!-- 広告枠（仮） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 応援コピーのパターン ──
  var MESSAGE_PATTERNS = [
    '推し活、永遠に💕',
    'あと{day}日…推しへの想いが止まらない💫',
    '誕生日まで{day}日間、毎日応援してます！',
    '推しの存在が生きる理由😊💝',
    '{day}日後、推しの輝きがさらに増す✨',
    '推し活は人生のエネルギー源💪',
    '毎日が推しへの感謝の日',
    '{day}日後、推しへの応援が爆発します🎉',
    '推しの笑顔のために生きてる💗',
    '推し活が人生を彩ってくれる🌈',
    'あなたは最高のエンターテイナー🎭',
    '{day}日、ずっと応援し続けます',
    '推しの存在がすべて💯',
    '応援し続けることが、推しへのラブレター',
    '推しのために、毎日を大切に過ごす',
    '{day}日後、また新しい推し活の物語が始まる📖',
    '推し活ロスなんて存在しない（毎日が推し活）',
    '推しの魅力は無限大🌟',
    'あと{day}日、一緒に頑張ろう💓',
    '推しが好きということが最高の幸せ✨',
    '推し活を通じて、人生が豊かになった',
    '毎日推しに感謝🙏',
    '推し誕、最高にハッピーな日にする🎂',
    '{day}日後の推し誕をみんなで祝おう🎊',
    '応援の気持ちが、推しへ届きますように💌',
    '推し活仲間との絆も大事にしよう👯',
    'あと{day}日の間に、推しへの想いをもっと大きく💕',
    '推し活による幸福度：MAX😆',
    '推しが存在するだけで世界は輝く☀️',
    'おめでとう、大好きな推し🎈'
  ];

  function calc() {
    var birthdayStr = document.getElementById('birthday').value;
    if (!birthdayStr) { showErr('推し誕生日を入力してください'); return; }

    // ローカルストレージに保存
    localStorage.setItem('oshiBirthday', birthdayStr);

    // カウントダウン日数計算
    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var birthday = new Date(birthdayStr);
    var nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());

    // 今年の誕生日が過ぎていれば、来年の誕生日を計算
    if (nextBirthday < today) {
      nextBirthday = new Date(today.getFullYear() + 1, birthday.getMonth(), birthday.getDate());
    }

    var daysUntil = Math.floor((nextBirthday - today) / (1000 * 60 * 60 * 24));

    // 結果表示
    var dayText = daysUntil === 0 ? '今日が推し誕！🎂' : 'あと ' + daysUntil + ' 日';
    showResult(dayText);

    // 応援コピーを5パターン生成
    var messages = generateMessages(daysUntil);
    showMessages(messages);
  }

  function generateMessages(days) {
    var msgs = [];
    var shuffled = MESSAGE_PATTERNS.slice().sort(function() { return Math.random() - 0.5; });

    for (var i = 0; i < Math.min(5, shuffled.length); i++) {
      var msg = shuffled[i].replace('{day}', days);
      msgs.push(msg);
    }
    return msgs;
  }

  function showResult(text) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = text;
    document.getElementById('rn').textContent = '推し活の応援メッセージを生成しました💕';
  }

  function showMessages(messages) {
    var html = messages.map(function(msg) {
      return '<div class="copy-item">' + msg +
             '<br><button class="copy-btn" onclick="copyToClipboard(\'' + msg.replace(/'/g, "\\'") + '\')">📋 コピー</button>' +
             '</div>';
    }).join('');
    document.getElementById('copy-cards').innerHTML = html;
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('copy-cards').innerHTML = '';
  }

  function copyToClipboard(text) {
    var temp = document.createElement('textarea');
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    alert('コピーしました！');
  }

  // ページ読み込み時に前回のデータを復元
  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('oshiBirthday');
    if (saved) {
      document.getElementById('birthday').value = saved;
      calc();
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
