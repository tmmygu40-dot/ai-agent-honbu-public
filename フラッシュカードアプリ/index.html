<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フラッシュカード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E3%83%95%E3%83%A9%E3%83%83%E3%82%B7%E3%83%A5%E3%82%AB%E3%83%BC%E3%83%89%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="フラッシュカード。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"フラッシュカード","description":"フラッシュカード。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%83%95%E3%83%A9%E3%83%83%E3%82%B7%E3%83%A5%E3%82%AB%E3%83%BC%E3%83%89%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>

  <header>
    <h1>フラッシュカード</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
  </header>

  <main>
    <!-- カード追加フォーム -->
    <section class="add-form">
      <h2>カードを追加</h2>
      <div class="form-group">
        <label for="front-input">表面（問題）</label>
        <textarea id="front-input" placeholder="例：apple" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="back-input">裏面（答え）</label>
        <textarea id="back-input" placeholder="例：りんご" rows="2"></textarea>
      </div>
      <button id="add-btn" class="btn-primary">追加する</button>
    </section>

    <!-- カード一覧 -->
    <section class="cards-section">
      <h2>カード一覧 <span id="card-count">0</span>枚</h2>
      <div id="cards-container" class="cards-container"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
  このツールは参考目的で作成しています。正確な情報や最新の条件は、公式情報や専門家にご確認ください。
</p>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
