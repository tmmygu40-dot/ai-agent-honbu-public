<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輸送手段比較チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>輸送手段比較チェッカー</h1>
    <p class="subtitle">船便 vs 航空便の総コストを比較して最適な輸送手段を判定します</p>

    <div class="common-section">
      <h2>共通設定</h2>
      <div class="form-group">
        <label for="cargoValue">商品仕入れ価格（円）</label>
        <input type="number" id="cargoValue" placeholder="例：1000000" min="0">
      </div>
      <div class="form-group">
        <label for="interestRate">在庫金利率（年率 %）</label>
        <input type="number" id="interestRate" placeholder="例：3" min="0" step="0.1">
      </div>
    </div>

    <div class="methods-grid">
      <div class="method-card sea">
        <h2>🚢 船便</h2>
        <div class="form-group">
          <label for="seaDays">輸送日数（日）</label>
          <input type="number" id="seaDays" placeholder="例：30" min="0">
        </div>
        <div class="form-group">
          <label for="seaFreight">輸送費（円）</label>
          <input type="number" id="seaFreight" placeholder="例：50000" min="0">
        </div>
        <div class="method-result" id="seaResult">—</div>
      </div>

      <div class="method-card air">
        <h2>✈️ 航空便</h2>
        <div class="form-group">
          <label for="airDays">輸送日数（日）</label>
          <input type="number" id="airDays" placeholder="例：5" min="0">
        </div>
        <div class="form-group">
          <label for="airFreight">輸送費（円）</label>
          <input type="number" id="airFreight" placeholder="例：150000" min="0">
        </div>
        <div class="method-result" id="airResult">—</div>
      </div>
    </div>

    <button id="calcBtn" class="calc-btn">計算する</button>

    <div class="result-section" id="resultSection" style="display:none">
      <div class="verdict" id="verdict"></div>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="note">
      <small>在庫金利コスト = 商品仕入れ価格 × 年利率 × (輸送日数 ÷ 365)<br>総コスト = 輸送費 + 在庫金利コスト</small>
    </div>
  </div>
  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
