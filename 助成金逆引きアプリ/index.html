<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>助成金逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果ヘッダー ── */
    .result-header {
      display: none;
      max-width: 600px; margin: 0 auto 0.8rem;
      padding: 0.8rem 1.2rem;
      background: var(--ok-bg);
      border: 1.5px solid var(--ok);
      border-radius: var(--radius);
      font-size: 0.9rem; font-weight: 700; color: var(--ok);
      text-align: center;
    }
    .result-header.none {
      background: var(--warn-bg); border-color: var(--warn); color: var(--warn);
    }

    /* ── 助成金カード ── */
    .grant-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.75rem;
      max-width: 600px;
    }
    .grant-name {
      font-size: 0.98rem; font-weight: 800; color: var(--text);
      margin-bottom: 0.4rem;
    }
    .grant-agency {
      font-size: 0.75rem; color: var(--accent); font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .grant-desc {
      font-size: 0.83rem; color: var(--text-sub); line-height: 1.6;
      margin-bottom: 0.6rem;
    }
    .grant-tags {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
    }
    .tag {
      font-size: 0.7rem; font-weight: 600;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 99px; padding: 0.2rem 0.6rem;
    }
    .tag.industry { background: #f0f7ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag.issue { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

<body>

  <header class="app-header">
    <h1>助成金逆引きアプリ</h1>
    <p class="subtitle">業種と困りごとを選ぶだけで使える補助金・助成金を即検索</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="">-- 選択してください --</option>
        <option value="飲食">飲食・外食</option>
        <option value="小売">小売・販売</option>
        <option value="IT">IT・情報通信</option>
        <option value="製造">製造・加工</option>
        <option value="建設">建設・工事</option>
        <option value="サービス">サービス業（美容・クリーニング等）</option>
        <option value="農業">農業・林業・水産</option>
        <option value="医療">医療・介護・福祉</option>
        <option value="教育">教育・学習支援</option>
        <option value="運輸">運輸・物流</option>
        <option value="不動産">不動産・賃貸</option>
        <option value="その他">その他・業種不問</option>
      </select>
    </div>
    <div class="field">
      <label for="issue">困りごと</label>
      <select id="issue">
        <option value="">-- 選択してください --</option>
        <option value="資金調達">資金調達・運転資金</option>
        <option value="採用">採用・人材確保・育成</option>
        <option value="設備投資">設備投資・機械導入</option>
        <option value="販路拡大">販路拡大・集客・PR</option>
        <option value="IT化">IT化・DX・デジタル化</option>
        <option value="省エネ">省エネ・環境対策</option>
        <option value="事業承継">事業承継・M&A</option>
        <option value="研究開発">研究開発・新商品開発</option>
        <option value="創業">創業・起業</option>
        <option value="その他">その他・全般</option>
      </select>
    </div>
  </div>

  <!-- 検索ボタン -->
  <button class="btn-calc" onclick="search()">助成金を検索する</button>

  <!-- 結果ヘッダー -->
  <div class="result-header" id="result-header"></div>

  <!-- 助成金一覧 -->
  <div id="results"></div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── 補助金・助成金データ ──
  var GRANTS = [
    {

    {

      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['IT化','販路拡大','採用'],
    },
    {
      name: '事業再構築補助金',
      agency: '中小企業庁',

      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['資金調達','設備投資','研究開発','販路拡大'],
    },
    {
      name: 'キャリアアップ助成金',
      agency: '厚生労働省',
      desc: '非正規雇用労働者を正社員に転換・待遇改善した事業主に最大72万円を助成。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['採用'],
    },
    {
      name: '人材開発支援助成金',
      agency: '厚生労働省',
      desc: '従業員に職業訓練・教育訓練を実施した事業主に訓練費用・賃金の一部を助成。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['採用'],
    },
    {
      name: '業務改善助成金',
      agency: '厚生労働省',
      desc: '最低賃金引き上げと設備投資を同時に行う中小企業に最大600万円を助成。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['採用','設備投資'],
    },
    {
      name: '省エネルギー投資促進・需要最適化支援事業',
      agency: '経済産業省 / METI',
      desc: '省エネ設備導入や省エネ診断・改修計画策定を補助。補助率1/3〜1/2。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['省エネ','設備投資'],
    },
    {
      name: '事業承継・引継ぎ補助金',
      agency: '中小企業庁',
      desc: '事業承継・M&Aに伴う廃業費用・専門家費用・設備投資等を最大150万円補助。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['事業承継','資金調達'],
    },
    {
      name: 'スタートアップ創出促進補助金',
      agency: '中小企業庁',
      desc: '新たに事業を起こす創業者に最大200万円を補助。創業初期の資金調達を支援。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['創業','資金調達'],
    },
    {
      name: '農業次世代人材投資資金',
      agency: '農林水産省',
      desc: '新規就農者に経営確立期間中（最長7年）、年間最大150万円を交付。',
      industries: ['農業'],
      issues: ['創業','資金調達','採用'],
    },
    {
      name: 'スマート農業技術の開発・実証プロジェクト',
      agency: '農林水産省',
      desc: 'ロボット・AI・ICT等のスマート農業技術の導入実証を支援する補助事業。',
      industries: ['農業'],
      issues: ['IT化','設備投資','研究開発'],
    },
    {
      name: '福祉医療機構 融資・助成',
      agency: '独立行政法人 福祉医療機構',
      desc: '医療・介護・福祉施設の設備整備・運営資金について低利融資・助成を提供。',
      industries: ['医療'],
      issues: ['資金調達','設備投資','採用'],
    },

      name: '建設キャリアアップシステム普及促進事業',

    },

      name: 'トラック運送業省エネ補助金',
      agency: '国土交通省 / 環境省',
      desc: '低燃費トラック・電気自動車など省エネ車両の導入に補助金を支給。',
      industries: ['運輸'],
      issues: ['省エネ','設備投資'],
    },

      name: '地域雇用開発助成金',
      agency: '厚生労働省',
      desc: '雇用機会が不足している地域で施設整備・雇用を行う事業主に最大960万円を助成。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['採用','設備投資'],
    },
    {
      name: '中小企業デジタル化応援隊事業',
      agency: '中小企業庁',
      desc: 'ITの専門家が中小企業を直接訪問しデジタル化を支援。費用の大部分を補助。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['IT化'],
    },
    {
      name: 'J-クレジット制度（売却益）',
      agency: '経済産業省・農林水産省・環境省',
      desc: 'CO2削減量をクレジット化して売却できる制度。省エネ・再エネ投資のコスト回収に活用可。',
      industries: ['飲食','小売','IT','製造','建設','サービス','農業','医療','教育','運輸','不動産','その他'],
      issues: ['省エネ'],
    },
  ];

  // ── 業種・困りごとラベル ──
  var INDUSTRY_LABEL = {
    '飲食':'飲食・外食','小売':'小売・販売','IT':'IT・情報通信',
    '製造':'製造・加工','建設':'建設・工事','サービス':'サービス業',
    '農業':'農業・林業・水産','医療':'医療・介護・福祉','教育':'教育・学習支援',
    '運輸':'運輸・物流','不動産':'不動産・賃貸','その他':'その他・業種不問'
  };
  var ISSUE_LABEL = {
    '資金調達':'資金調達・運転資金','採用':'採用・人材確保・育成',
    '設備投資':'設備投資・機械導入','販路拡大':'販路拡大・集客・PR',
    'IT化':'IT化・DX・デジタル化','省エネ':'省エネ・環境対策',
    '事業承継':'事業承継・M&A','研究開発':'研究開発・新商品開発',
    '創業':'創業・起業','その他':'その他・全般'
  };

  function search() {
    var ind = document.getElementById('industry').value;
    var iss = document.getElementById('issue').value;

    // localStorage 保存
    try {
      localStorage.setItem('joseikin_industry', ind);
      localStorage.setItem('joseikin_issue', iss);
    } catch(e) {}

    var matched = GRANTS.filter(function(g) {
      var indMatch = !ind || ind === 'その他' || g.industries.indexOf(ind) !== -1 || g.industries.indexOf('その他') !== -1;
      var issMatch = !iss || iss === 'その他' || g.issues.indexOf(iss) !== -1;
      return indMatch && issMatch;
    });

    var hdr = document.getElementById('result-header');
    var res = document.getElementById('results');
    hdr.style.display = 'block';

    if (matched.length === 0) {
      hdr.className = 'result-header none';
      hdr.textContent = '条件に合う補助金・助成金が見つかりませんでした';
      res.innerHTML = '';
      return;
    }

    hdr.className = 'result-header';
    hdr.textContent = matched.length + ' 件の補助金・助成金が見つかりました';

    res.innerHTML = matched.map(function(g) {
      var indTags = g.industries.filter(function(v) { return v !== 'その他'; }).map(function(v) {
        return '<span class="tag industry">' + (INDUSTRY_LABEL[v] || v) + '</span>';
      }).join('');
      var issTags = g.issues.map(function(v) {
        return '<span class="tag issue">' + (ISSUE_LABEL[v] || v) + '</span>';
      }).join('');
      return '<div class="grant-card">'
        + '<div class="grant-name">' + g.name + '</div>'
        + '<div class="grant-agency">' + g.agency + '</div>'
        + '<div class="grant-desc">' + g.desc + '</div>'
        + '<div class="grant-tags">' + indTags + issTags + '</div>'
        + '</div>';
    }).join('');
  }

  // 初期表示：localStorage から前回の選択を復元
  (function() {
    try {
      var ind = localStorage.getItem('joseikin_industry');
      var iss = localStorage.getItem('joseikin_issue');
      if (ind) document.getElementById('industry').value = ind;
      if (iss) document.getElementById('issue').value = iss;
    } catch(e) {}
  })();
  </script>

</body>
