<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="テーマとトーンを選ぶだけで、X(Twitter)でバズる投稿テンプレを3秒で生成。コピーしてすぐ使えるSNS投稿ジェネレーター。">
  <title>SNS投稿ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-align: center; }

    /* ── 生成テンプレ表示 ── */
    .template-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 1rem; margin-bottom: 1rem;
      font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap;
      word-break: break-word; min-height: 60px;
    }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-copy, .btn-regen, .btn-fav {
      flex: 1; min-width: 100px; padding: 0.7rem 0.5rem;
      font-size: 0.88rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--card); color: var(--text);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .btn-copy:hover, .btn-regen:hover, .btn-fav:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy:active, .btn-regen:active, .btn-fav:active { background: var(--accent-light); }
    .btn-fav.active { background: #fff3cd; border-color: #f0ad4e; color: #d48806; }
    .copy-msg { font-size: 0.75rem; color: var(--ok); text-align: center; margin-top: 0.5rem; min-height: 1.2em; }

    /* ── お気に入り一覧 ── */
    .fav-list { list-style: none; }
    .fav-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-text { flex: 1; font-size: 0.88rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .fav-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .fav-actions button {
      padding: 0.3rem 0.5rem; font-size: 0.75rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--card); cursor: pointer;
      color: var(--text-sub);
    }
    .fav-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .fav-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>📱 SNS投稿ジェネレーター</h1>
    <p class="subtitle">テーマとトーンを選ぶだけ。バズるX投稿テンプレを3秒でサクッと量産できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">テンプレ設定</p>
    <div class="field">
      <label for="theme">テーマ・カテゴリ</label>
      <select id="theme">
        <option value="daily">🏠 日常・あるある</option>
        <option value="business">💼 ビジネス・仕事術</option>
        <option value="money">💰 お金・節約</option>
        <option value="empathy">💭 共感・人間関係</option>
        <option value="motivation">🔥 モチベ・自己啓発</option>
        <option value="humor">😂 ネタ・ユーモア</option>
        <option value="trend">📈 トレンド・時事</option>
        <option value="oshi">💜 推し活・エンタメ</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">トーン</label>
      <select id="tone">
        <option value="funny">😆 面白い・ツッコミ系</option>
        <option value="serious">🧐 真面目・信頼系</option>
        <option value="provoke">🔥 煽り・問いかけ系</option>
        <option value="empathy">🥹 共感・しみじみ系</option>
        <option value="teach">📖 教える・まとめ系</option>
      </select>
    </div>
    <div class="field">
      <label for="keyword">キーワード（任意）</label>
      <input type="text" id="keyword" placeholder="例: 月曜日、値上げ、推し">
      <p class="hint">入れるとテンプレに反映されます（空でもOK）</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">⚡ テンプレを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたテンプレ</p>
    <div class="template-output" id="output"></div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyText()">📋 コピー</button>
      <button class="btn-regen" onclick="generate()">🔄 再生成</button>
      <button class="btn-fav" id="btnFav" onclick="toggleFav()">⭐ 保存</button>
    </div>
    <p class="copy-msg" id="copyMsg"></p>
  </div>

  <!-- お気に入り一覧 -->
  <div class="card" id="favCard" style="display:none">
    <p class="card-title">⭐ 保存したテンプレ</p>
    <ul class="fav-list" id="favList"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、SNSマーケティングの一般的なテクニック（問いかけ・数字・共感・対比など）を参考にテンプレートを生成しています。投稿前に内容をご自身で確認・調整してください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── テンプレートデータ ──
  var TEMPLATES = {
    daily: {
      funny: [
        '【悲報】{kw}、今日も絶好調に{kw}でした。\n\nいやもうね、笑うしかない。\n毎日がコントなんよ。\n\n#あるある #日常',
        'マジで聞いてほしいんだけど、{kw}って何回やっても慣れないのなんで？\n\n人類の進化バグでしょこれ。\n\n#日常の謎 #あるある',
        '今日の{kw}レベル：★★★★★（MAX）\n\n誰か攻略法教えてください。\n課金で解決できるなら課金します。\n\n#日常 #助けて'
      ],

        '日常の中で{kw}を意識するだけで、生活の質がだいぶ変わった話。\n\nポイントは3つ：\n①朝イチで確認\n②記録をつける\n③週末に振り返る\n\n#ライフハック',
        '{kw}を習慣化して3ヶ月。\n\n結論：やるかやらないかで全然違う。\n\n最初の1週間がキツいだけで、あとは勝手に回る。\n\n#継続は力なり'
      ],
      provoke: [
        'まだ{kw}やってないの？\n\nマジで人生損してるかも。\n今日から始めても遅くないから、とりあえず試してみて。\n\n#行動が全て',
        '{kw}を「面倒くさい」で片付けてる人、ちょっと待って。\n\nそれ、未来の自分が泣くやつ。\n\n今やるか、後で後悔するか。\n\n#厳しめに言うと',
        '【質問】{kw}に毎日どれくらい時間かけてる？\n\n答えが「ゼロ」の人、ヤバいかも。\nいやヤバい。\n\n#本音 #問いかけ'

        '「{kw}ってしんどいな」って思った時は、それだけ頑張ってる証拠。\n\n自分を褒めてあげて。\nお疲れさま、今日も。\n\n#共感 #日常',
        '{kw}あるある：\n・やろうと思って忘れる\n・やり始めると止まらない\n・終わった後の達成感だけが救い\n\n分かる人RT。\n\n#あるある'

        '{kw}で失敗しないコツ、まとめました👇\n\n✅ 最初から完璧を目指さない\n✅ 小さく始めて改善する\n✅ 記録をつけて振り返る\n\nシンプルだけど、これが一番効く。\n\n#まとめ',
        '【保存推奨】{kw}の基本ルール\n\n1️⃣ 毎日少しずつ（5分でもOK）\n2️⃣ 完了したらチェック\n3️⃣ 1週間で振り返り\n\nこれだけで生活が整います。\n\n#有益'
      ]
    },
    business: {
      funny: [
        '【朗報】{kw}、やっと終わりました（白目）\n\n所要時間：見積もりの3倍\n精神ダメージ：甚大\nでも達成感：プライスレス\n\n#仕事あるある #社会人',
        '上司「{kw}お願いね」\n僕「はい！（やり方知らんけど）」\n\nこの流れ、月に何回あるの？\n\n#仕事 #新人あるある',
        '{kw}のミーティング、また1時間。\n\n結論：「次回また話しましょう」\n\nそれ今決めろよ。\n\n#会議あるある #仕事'
      ],
      serious: [
        '{kw}で成果を出すために意識していること。\n\n①目的を明確にする\n②期限を区切る\n③完璧より完了を優先\n\nシンプルだけど、これが全て。\n\n#仕事術 #ビジネス',
        '{kw}に取り組んで分かったこと。\n\n「スピード」と「質」は両立できる。\n\nただし条件がある。\n→ 事前準備に時間をかけること。\n\n#ビジネス #学び',

  var currentText = '';
  var favorites = JSON.parse(localStorage.getItem('sns_gen_favs') || '[]');

  function generate() {
    var theme = document.getElementById('theme').value;
    var tone = document.getElementById('tone').value;
    var kw = document.getElementById('keyword').value.trim() || getDefaultKw(theme);

    var pool = TEMPLATES[theme] && TEMPLATES[theme][tone];
    if (!pool || pool.length === 0) {
      document.getElementById('output').textContent = 'このカテゴリ×トーンの組み合わせはまだ準備中です。';
      document.getElementById('result').style.display = 'block';
      return;
    }

    var tmpl = pool[Math.floor(Math.random() * pool.length)];
    currentText = tmpl.replace(/\{kw\}/g, kw);

    document.getElementById('output').textContent = currentText;
    document.getElementById('result').style.display = 'block';
    document.getElementById('copyMsg').textContent = '';
    updateFavBtn();
  }

  function getDefaultKw(theme) {
    var defaults = {
      daily: '朝の支度',
      business: 'タスク管理',
      money: '節約',
      empathy: '人間関係',
      motivation: '目標達成',
      humor: 'あるあるネタ',
      trend: 'ニュース',
      oshi: '推しの新情報'
    };
    return defaults[theme] || 'これ';
  }

  function copyText() {
    if (!currentText) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentText).then(function() {
        showCopyMsg('✅ コピーしました！');
      }).catch(function() {
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
  }

  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = currentText;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showCopyMsg('✅ コピーしました！');
    } catch(e) {
      showCopyMsg('⚠️ コピーに失敗しました');
    }
    document.body.removeChild(ta);
  }

  function showCopyMsg(msg) {
    var el = document.getElementById('copyMsg');
    el.textContent = msg;
    setTimeout(function() { el.textContent = ''; }, 2000);
  }

  function toggleFav() {
    if (!currentText) return;
    var idx = favorites.indexOf(currentText);
    if (idx >= 0) {
      favorites.splice(idx, 1);
    } else {
      favorites.push(currentText);
    }
    saveFavs();
    updateFavBtn();
    renderFavs();
  }

  function updateFavBtn() {
    var btn = document.getElementById('btnFav');
    if (favorites.indexOf(currentText) >= 0) {
      btn.textContent = '⭐ 保存済み';
      btn.classList.add('active');
    } else {
      btn.textContent = '⭐ 保存';
      btn.classList.remove('active');
    }
  }

  function saveFavs() {
    localStorage.setItem('sns_gen_favs', JSON.stringify(favorites));
  }

  function renderFavs() {
    var card = document.getElementById('favCard');
    var list = document.getElementById('favList');
    if (favorites.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = favorites.map(function(text, i) {
      return '<li class="fav-item">'
        + '<span class="fav-text">' + escHtml(text) + '</span>'
        + '<span class="fav-actions">'
        + '<button onclick="copyFav(' + i + ')">📋</button>'
        + '<button onclick="removeFav(' + i + ')">🗑️</button>'
        + '</span></li>';
    }).join('');
  }

  function copyFav(i) {
    var text = favorites[i];
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopyMsg('✅ コピーしました！');
      });
    } else {
      currentText = text;
      fallbackCopy();
    }
  }

  function removeFav(i) {
    favorites.splice(i, 1);
    saveFavs();
    renderFavs();
    updateFavBtn();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  // 起動時にお気に入り表示
  renderFavs();
  </script>
