<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="取引先の反応タイプを選ぶだけで、値上げ交渉に使えるトーク例と対処ポイントを即表示。即断り・値引き要求・保留・競合比較など8パターン対応の現場で使える逆引きツールです。">
  <title>値上げ交渉シナリオ逆引きアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 反応タイプ選択ボタン群 ── */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .type-btn {
      padding: 0.75rem 0.5rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
    }
    .type-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .type-btn.active {
      border-color: var(--accent); background: var(--accent); color: #fff;
    }
    .type-btn .type-icon { font-size: 1.2rem; display: block; margin-bottom: 0.2rem; }

    /* ── 結果カード ── */
    .result-card {
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
      display: none;
    }

    /* ── セクションタイトル ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 0.5rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 反応タイプ見出し ── */
    .type-heading {
      font-size: 1.1rem; font-weight: 900;
      color: var(--text); margin-bottom: 0.25rem;
    }
    .type-desc {
      font-size: 0.82rem; color: var(--text-sub);
      margin-bottom: 1.2rem; line-height: 1.5;
    }

    /* ── トーク例 ── */
    .talk-block { margin-bottom: 1.2rem; }
    .talk-num {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.7rem; font-weight: 800; border-radius: 4px;
      padding: 0.1rem 0.45rem; margin-bottom: 0.45rem;
    }
    .talk-text {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 0.9rem;
      font-size: 0.92rem; line-height: 1.6; color: var(--text);
    }

    /* ── 対処ポイント ── */
    .point-list { list-style: none; }
    .point-list li {
      padding: 0.5rem 0 0.5rem 1.4rem;
      position: relative; font-size: 0.88rem; color: var(--text);
      line-height: 1.5; border-bottom: 1px solid var(--border);
    }
    .point-list li:last-child { border-bottom: none; }
    .point-list li::before {
      content: "✓"; position: absolute; left: 0;
      color: var(--ok); font-weight: 800;
    }

    /* ── 注意リスト ── */
    .caution-list { list-style: none; }
    .caution-list li {
      padding: 0.5rem 0 0.5rem 1.4rem;
      position: relative; font-size: 0.88rem; color: var(--text);
      line-height: 1.5; border-bottom: 1px solid var(--border);
    }
    .caution-list li:last-child { border-bottom: none; }
    .caution-list li::before {
      content: "⚠"; position: absolute; left: 0;
      color: var(--warn); font-weight: 800;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  <a class="back-link no-print" href="../index.html" style="margin-top:0.8rem;margin-bottom:0;">← アプリ一覧に戻る</a>

  <header class="app-header">
    <h1>値上げ交渉シナリオ逆引きアプリ</h1>
    <p class="subtitle">取引先の反応タイプを選ぶだけ → トーク例と対処ポイントを即表示</p>
  </header>

  <!-- 反応タイプ選択 -->
  <div class="card">
    <p class="card-title">取引先の反応タイプを選んでください</p>
    <div class="type-grid" id="typeGrid"></div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="resultCard">
    <p class="type-heading" id="resHeading"></p>
    <p class="type-desc" id="resDesc"></p>

    <p class="section-label">トーク例</p>
    <div id="resTalks" style="margin-bottom:1.2rem;"></div>

    <p class="section-label">対処ポイント</p>
    <ul class="point-list" id="resPoints" style="margin-bottom:1.2rem;"></ul>

    <p class="section-label" id="cautionLabel" style="display:none;">注意点</p>
    <ul class="caution-list" id="resCautions"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:0.5rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 本ツールのトーク例・対処法は、経済産業省・中小企業庁・公正取引委員会の価格転嫁に関するガイドラインを参考に編集しています。実際の交渉結果を保証するものではありません。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script src="../related-widget.js"></script>

  <script>
  var SCENARIOS = [
    {
      id: 'immediate-reject',
      icon: '🚫',
      label: '即断り',
      desc: '「それは無理です」「受け入れられない」と即座に拒否してくる反応。感情的ではなく、最初から交渉の余地なしに見える。',
      talks: [
        {
          num: '例 1',
          text: '「今回の値上げは、原材料費・エネルギーコストの上昇分を最小限に留めた結果です。詳細なコスト根拠をお持ちしますので、一度数字をご覧いただけますか？」'
        },
        {
          num: '例 2',
          text: '「おっしゃる気持ちはよく分かります。ただ、このまま現行価格を維持すると安定供給が難しくなります。供給継続のために、ぜひ協議の機会をいただけますか？」'

        {

        '値上げ率を小さく見せる工夫（年間影響額・1単位あたりの差額）も有効'
      ],
      cautions: [
        'その場で値下げ・妥協案を出さない。一度下げると次回の交渉が難しくなる',
        '「他社も値上げしている」は有効だが、比較対象が不正確だと逆効果'
      ]
    },
    {
      id: 'price-cut',
      icon: '💰',
      label: '値引き要求',
      desc: '「もう少し安くなりませんか」「5%なら受け入れる」など、値上げ率の引き下げや値引きを求めてくる反応。',
      talks: [
        {
          num: '例 1',
          text: '「ご要望はよく分かります。今回の値上げ幅を絞るのは難しいのですが、〇〇の条件（発注数量・支払い条件）で合意いただければ、その分をコスト削減に回す検討ができます。」'
        },
        {
          num: '例 2',
          text: '「全品目一律の値引きは難しいですが、A品目は優先いただけるなら、B品目の値上げを1期ずらすことは可能です。どちらがご都合よいでしょうか？」'

      points: [
        '値引きではなく「条件の交換」として提案する（数量・支払い期日・発注頻度など）',
        '品目ごとの優先度に応じて、一部の値上げ時期をずらす段階的な提案も有効',
        '「これが最終です」と言わず、「この条件なら可能」という条件付き話法を使う',
        '相手の値引き要求額と自社の最低ラインを事前に把握しておく'
      ],
      cautions: [
        '値引きに応じると「次回も交渉すれば下がる」と学習させてしまう',
        '値引き額ではなく「合意するための条件」に話をずらすのがポイント'
      ]
    },
    {
      id: 'pending',
      icon: '⏳',
      label: '保留・検討',
      desc: '「社内で確認します」「上に相談してから」「検討させてください」と、即答を避ける反応。',
      talks: [
        {
          num: '例 1',
          text: '「ありがとうございます。では、社内でご確認いただく際に使っていただけるよう、今回の値上げ根拠をまとめた資料をお送りします。1週間後にご連絡いただけますか？」'

        {
          num: '例 2',

      points: [
        'コスト根拠資料を渡し、社内回覧しやすい形にする（A4 1枚・要点だけ）',
        '次のアクション（いつまでに連絡・次回面談日）を必ずその場で決める',
        '決裁権者がいる場での再プレゼン機会を取り付ける',
        '保留期間が長引く場合は「供給開始日・発注締め切り」を期限として提示する'
      ],
      cautions: [
        '「検討します」を鵜呑みにして待ちすぎない。フォローの期限を決める',
        '保留中に他の値上げ交渉と混在させず、この案件専用の資料を作る'
      ]
    },
    {
      id: 'competitor',
      icon: '⚖️',
      label: '競合比較',
      desc: '「競合他社はXX円です」「他のメーカーと比べている」など、競合の価格を交渉の道具に使ってくる反応。',

          num: '例 1',

        },
        {
          num: '例 2',

        }
      ],
      points: [

        '競合への切り替えコスト（仕様変更・検品・教育コスト等）を試算して提示する',
        '競合の価格が本当に正確かを確認する（サンプル品・仕様が異なる場合も多い）',
        '自社の差別化ポイントをあらかじめ整理しておく'
      ],
      cautions: [
        '競合を批判しない。「弊社の価値」を語ることに集中する',
        '競合価格が事実であれば、無視せず「それでも弊社を選ぶ理由」を伝える'
      ]
    },
    {
      id: 'silence',
      icon: '😶',
      label: '沈黙・無反応',
      desc: 'うなずくだけ、返事がない、「はあ…」と曖昧な反応。賛成なのか反対なのか読めない状態。',
      talks: [
        {
          num: '例 1',
          text: '「少し確認させてください。今のご説明で、特に気になる点はありましたか？率直に教えていただけると助かります。」'
        },
        {
          num: '例 2',
          text: '「今日すぐにお返事は不要です。まず資料をお持ちしますので、1週間後にあらためてお時間をいただけますか？」'
        }
      ],
      points: [
        '相手に考える時間を与えるため、沈黙を焦って埋めない',
        '「特に気になる点はありますか？」とオープン質問で反応を引き出す',
        'こちらから「〇〇が気になっていますか？」とクローズド質問でも試みる',
        '反応がなければ「次の面談日」を設定して継続を担保する'
      ],
      cautions: [

        '「ご理解いただけましたか？」などイエス誘導の質問は避ける'

    },
    {
      id: 'partial-accept',
      icon: '🤝',
      label: '一部受諾',
      desc: '「一部の品目なら受け入れる」「今期分だけなら」と、部分的に応じてくる反応。交渉の糸口がある状態。',
      talks: [
        {
          num: '例 1',
          text: '「ありがとうございます。まず〇〇品目からご納得いただけたことは大変ありがたいです。残りの品目については、次のご発注時からの適用で、同様にご理解いただけますか？」'

          num: '例 2',

  ];

  function init() {
    var grid = document.getElementById('typeGrid');
    var saved = localStorage.getItem('negotiation_type');
    SCENARIOS.forEach(function(s) {
      var btn = document.createElement('button');
      btn.className = 'type-btn' + (s.id === saved ? ' active' : '');
      btn.innerHTML = '<span class="type-icon">' + s.icon + '</span>' + s.label;
      btn.setAttribute('data-id', s.id);
      btn.addEventListener('click', function() { selectType(s.id); });
      grid.appendChild(btn);
    });
    if (saved) showScenario(saved);
  }

  function selectType(id) {
    document.querySelectorAll('.type-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-id') === id);
    });
    localStorage.setItem('negotiation_type', id);
    showScenario(id);
  }

  function showScenario(id) {
    var s = SCENARIOS.find(function(x) { return x.id === id; });
    if (!s) return;

    document.getElementById('resHeading').textContent = s.icon + ' ' + s.label;
    document.getElementById('resDesc').textContent = s.desc;

    var talksEl = document.getElementById('resTalks');
    talksEl.innerHTML = s.talks.map(function(t) {
      return '<div class="talk-block">'
           + '<span class="talk-num">' + t.num + '</span>'
           + '<p class="talk-text">' + t.text + '</p>'
           + '</div>';
    }).join('');

    var pointsEl = document.getElementById('resPoints');
    pointsEl.innerHTML = s.points.map(function(p) {
      return '<li>' + p + '</li>';
    }).join('');

    var cautionsEl = document.getElementById('resCautions');
    var cautionLabel = document.getElementById('cautionLabel');
    if (s.cautions && s.cautions.length) {
      cautionsEl.innerHTML = s.cautions.map(function(c) {
        return '<li>' + c + '</li>';
      }).join('');
      cautionLabel.style.display = '';
      cautionsEl.style.display = '';
    } else {
      cautionLabel.style.display = 'none';
      cautionsEl.style.display = 'none';
    }

    var rc = document.getElementById('resultCard');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  init();
  </script>
