<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>試験対策記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>試験対策記録アプリ</h1>
    <p class="subtitle">分野ごとの練習問題数と正解率を管理できます</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>分野を登録 / 更新</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="fieldName">分野名</label>
          <input type="text" id="fieldName" placeholder="例：数学・英語・国語" maxlength="30">
        </div>
        <div class="form-group">
          <label for="totalCount">問題数</label>
          <input type="number" id="totalCount" placeholder="例：50" min="1" max="9999">
        </div>
        <div class="form-group">
          <label for="correctCount">正解数</label>
          <input type="number" id="correctCount" placeholder="例：35" min="0" max="9999">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- サマリー -->
    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-label">登録分野数</div>
          <div class="summary-value" id="totalFields">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">総問題数</div>
          <div class="summary-value" id="totalQuestions">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">全体正解率</div>
          <div class="summary-value" id="overallRate">0%</div>
        </div>
        <div class="summary-card warning" id="weakCard">
          <div class="summary-label">苦手分野数</div>
          <div class="summary-value" id="weakCount">0</div>
        </div>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>分野一覧</h2>
        <div class="sort-control">
          <label for="sortSelect">並び順：</label>
          <select id="sortSelect">
            <option value="name">分野名順</option>
            <option value="rate-asc" selected>正解率（低い順）</option>
            <option value="rate-desc">正解率（高い順）</option>
            <option value="total-desc">問題数（多い順）</option>
          </select>
        </div>
      </div>

      <div class="legend">
        <span class="legend-item weak">正解率60%未満（苦手）</span>
        <span class="legend-item caution">正解率60〜79%（要注意）</span>
        <span class="legend-item good">正解率80%以上（良好）</span>
      </div>

      <div id="fieldList" class="field-list">
        <p class="empty-msg">まだ分野が登録されていません。<br>上のフォームから登録してください。</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
