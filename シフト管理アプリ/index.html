<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>シフト管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>シフト登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="staffName">スタッフ名</label>
          <input type="text" id="staffName" placeholder="例：田中 太郎">
        </div>
        <div class="form-group">
          <label for="workDate">日付</label>
          <input type="date" id="workDate">
        </div>
        <div class="form-group">
          <label for="startTime">開始時刻</label>
          <input type="time" id="startTime">
        </div>
        <div class="form-group">
          <label for="endTime">終了時刻</label>
          <input type="time" id="endTime">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="daily">日別</button>
      <button class="tab-btn" data-tab="person">人別</button>
    </div>

    <!-- 日別ビュー -->
    <section class="tab-content active" id="tab-daily">
      <h2>日別シフト一覧</h2>
      <div id="dailyList" class="list-area"></div>
    </section>

    <!-- 人別ビュー -->
    <section class="tab-content" id="tab-person">
      <h2>人別 合計勤務時間</h2>
      <div id="personList" class="list-area"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
