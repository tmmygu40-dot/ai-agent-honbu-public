<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダーアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <div class="app">
    <header class="header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <h1 class="month-title" id="monthTitle"></h1>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </header>

    <div class="weekdays">
      <div class="weekday sun">日</div>
      <div class="weekday">月</div>
      <div class="weekday">火</div>
      <div class="weekday">水</div>
      <div class="weekday">木</div>
      <div class="weekday">金</div>
      <div class="weekday sat">土</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-date" id="modalDate"></span>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <ul class="event-list" id="eventList"></ul>
        <div class="input-row">
          <input type="text" id="eventInput" placeholder="予定を入力..." maxlength="50">
          <button class="add-btn" id="addEventBtn">追加</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
