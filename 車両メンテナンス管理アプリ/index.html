<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車両メンテナンス管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🚗 車両メンテナンス管理</h1>

    <!-- 次回メンテ案内 -->
    <section class="next-maintenance" id="nextMaintenance">
      <h2>次回メンテナンス目安</h2>
      <div class="next-grid" id="nextGrid">
        <p class="no-data">記録がありません</p>
      </div>
    </section>

    <!-- 記録追加フォーム -->
    <section class="form-section">
      <h2>メンテナンスを記録</h2>
      <form id="recordForm">
        <div class="form-group">
          <label for="vehicleName">車両名・ナンバー</label>
          <input type="text" id="vehicleName" placeholder="例：社用車1号・品川100あ1234">
        </div>
        <div class="form-group">
          <label for="recordDate">実施日 <span class="required">*</span></label>
          <input type="date" id="recordDate" required>
        </div>
        <div class="form-group">
          <label for="mileage">走行距離（km） <span class="required">*</span></label>
          <input type="number" id="mileage" placeholder="例：15000" min="0" required>
        </div>
        <div class="form-group">
          <label for="maintenanceType">整備種別 <span class="required">*</span></label>
          <select id="maintenanceType" required>
            <option value="">選択してください</option>
            <option value="定期点検">定期点検</option>
            <option value="オイル交換">オイル交換</option>
            <option value="タイヤ交換">タイヤ交換</option>
            <option value="車検">車検</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="details">整備内容・メモ</label>
          <textarea id="details" placeholder="例：エンジンオイル交換・フィルター交換" rows="3"></textarea>
        </div>
        <button type="submit" class="btn-primary">記録を追加</button>
      </form>
    </section>

    <!-- 履歴一覧 -->
    <section class="history-section">
      <div class="history-header">
        <h2>メンテナンス履歴</h2>
        <span class="count" id="recordCount">0件</span>
      </div>
      <div id="historyList">
        <p class="no-data">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
