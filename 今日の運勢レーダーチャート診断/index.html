<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今日の日付と気分から仕事・恋愛・金運を5段階で診断するレーダーチャート占いアプリです。毎日の運勢をビジュアルで確認できます。">
  <title>今日の運勢レーダーチャート診断 〜日替わり運勢チェッカー〜</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin: 0 auto 1.2rem;
      max-width: 600px;
      display: none;
    }
    .result-card.show { display: block; }
    .result-card h2 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.5rem; }
    .result-card p { font-size: 0.85rem; color: var(--text); line-height: 1.6; white-space: pre-wrap; }

    /* ── レーダーチャート ── */
    .chart-container {
      max-width: 600px;
      margin: 0 auto 1.2rem;
      padding: 0 1rem;
    }
    svg { width: 100%; height: auto; }

    /* ── アイテム一覧 ── */
    .item-list {
      display: grid; gap: 0.8rem;
      max-width: 600px;
      margin: 0 auto 1.2rem;
    }
    .item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.2rem;
      font-size: 0.85rem;
    }
    .item-label { font-weight: 600; color: var(--text-sub); margin-bottom: 0.3rem; }
    .item-value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

    /* ── PDF ── */
    .btn-pdf {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.9rem;
      font-size: 0.95rem; font-weight: 700;
      background: #f3f4f6; color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-pdf:active { background: #e5e7eb; }
    @media print {
      .btn-pdf, .btn-calc, .source-note, .back-link, a, button { display: none; }
      body { background: #fff; padding: 0; }
      .card { box-shadow: none; margin: 0 0 1rem; }
      .result-card { display: block; }
    }

    /* ── フッター ── */
    .source-note {
      font-size: 0.7rem; color: var(--text-sub);
      text-align: center;
      margin-top: 2rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .back-link {
      display: block;
      text-align: left;
      margin-top: 1rem; margin-bottom: 0.5rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-size: 0.8rem;
    }
    .back-link a { color: var(--accent); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    /* ── レスポンシブ ── */
    @media (max-width: 375px) {
      .app-header h1 { font-size: 1rem; }
      .card { padding: 1rem 1rem; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>今日の運勢レーダーチャート診断</h1>
  <div class="subtitle">毎日の仕事・恋愛・金運を5段階で占う</div>
</div>

<!-- 入力カード -->
<div class="card">
  <div class="card-title">📅 今日の運勢を診断</div>

  <div class="field">
    <label for="dateInput">本日の日付</label>
    <input type="date" id="dateInput">
  </div>

  <div class="field">
    <label for="moodSelect">今朝の気分</label>
    <select id="moodSelect">
      <option value="">-- 選択してください --</option>
      <option value="最悪">最悪（1/5）</option>
      <option value="悪い">悪い（2/5）</option>
      <option value="普通">普通（3/5）</option>
      <option value="良い">良い（4/5）</option>
      <option value="最高">最高（5/5）</option>
    </select>
  </div>
</div>

<button class="btn-calc" onclick="calculateFortune()">運勢を診断する</button>

<!-- 結果レーダーチャート -->
<div class="chart-container" id="chartContainer" style="display:none;">
  <svg id="radarChart" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<!-- 結論カード -->
<div class="result-card" id="resultCard">
  <h2>📊 今日の運勢診断結果</h2>
  <p id="resultText"></p>
</div>

<!-- 数値詳細 -->
<div class="item-list" id="itemList" style="display:none;">
  <div class="item">
    <div class="item-label">仕事運</div>
    <div class="item-value" id="workValue">-</div>
  </div>
  <div class="item">
    <div class="item-label">恋愛運</div>
    <div class="item-value" id="loveValue">-</div>
  </div>
  <div class="item">
    <div class="item-label">金運</div>
    <div class="item-value" id="moneyValue">-</div>
  </div>
</div>

<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

<div class="source-note">
  ※このアプリは日付と気分を入力して運勢を疑似診断します。実際の運勢は努力次第です。
</div>

<div class="back-link">
  <a href="../index.html">← アプリ一覧に戻る</a>
</div>

<!-- 関連アプリ・お気に入りウィジェット -->
<script src="../related-widget.js"></script>
<script src="../fav-widget.js"></script>

<!-- 計測 -->
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>

<script>
  // 初期化
  document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
  });

  // 運勢診断計算
  function calculateFortune() {
    const dateStr = document.getElementById('dateInput').value;
    const mood = document.getElementById('moodSelect').value;

    if (!dateStr || !mood) {
      alert('日付と気分を選択してください');
      return;
    }

    // 日付をシード値として疑似乱数を生成
    const date = new Date(dateStr);
    const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
    const seed = dayOfYear + parseInt(date.getFullYear());

    // 簡易疑似乱数関数
    const pseudoRandom = (s) => {
      const x = Math.sin(s) * 10000;
      return x - Math.floor(x);
    };

    // 仕事・恋愛・金運の初期値を生成（1〜5）
    let work = Math.floor(pseudoRandom(seed) * 5) + 1;
    let love = Math.floor(pseudoRandom(seed + 100) * 5) + 1;
    let money = Math.floor(pseudoRandom(seed + 200) * 5) + 1;

    // 気分による補正（気分が良いほど+1、悪いほど-1）
    const moodBonus = { '最悪': -1, '悪い': -0.5, '普通': 0, '良い': 0.5, '最高': 1 };
    const bonus = moodBonus[mood] || 0;
    work = Math.max(1, Math.min(5, work + bonus));
    love = Math.max(1, Math.min(5, love + bonus));
    money = Math.max(1, Math.min(5, money + bonus));

    // 表示更新
    displayResults(work, love, money, mood);
  }

  // 結果表示
  function displayResults(work, love, money, mood) {
    const workRounded = Math.round(work);
    const loveRounded = Math.round(love);
    const moneyRounded = Math.round(money);

    // 数値表示
    document.getElementById('workValue').innerText = `⭐ ${workRounded}/5`;
    document.getElementById('loveValue').innerText = `⭐ ${loveRounded}/5`;
    document.getElementById('moneyValue').innerText = `⭐ ${moneyRounded}/5`;

    // 診断テキスト生成
    const diagnoses = [];
    if (workRounded >= 4) diagnoses.push('今日の仕事は好調。積極的にいこう！');
    if (workRounded <= 2) diagnoses.push('仕事は焦らず、確認作業を大切に。');
    if (loveRounded >= 4) diagnoses.push('恋愛運が高い。コミュニケーションを大切に💕');
    if (loveRounded <= 2) diagnoses.push('恋愛は慎重に。独り時間も大事です。');
    if (moneyRounded >= 4) diagnoses.push('金運が良い。チャンスを逃さない💰');
    if (moneyRounded <= 2) diagnoses.push('金運は控えめ。無駄遣い注意です。');

    const resultText = diagnoses.length > 0 ? diagnoses.join('\n') : '今日も平均的な運勢。自分のペースで頑張ろう！';
    document.getElementById('resultCard').innerHTML = `<h2>📊 今日の運勢診断結果</h2><p>${resultText}</p>`;

    // 表示切り替え
    document.getElementById('chartContainer').style.display = 'block';
    document.getElementById('itemList').style.display = 'grid';
    document.getElementById('resultCard').classList.add('show');

    // レーダーチャート描画
    drawRadarChart(work, love, money);

    // localStorage に保存
    const today = new Date().toISOString().split('T')[0];
    const history = JSON.parse(localStorage.getItem('fortuneHistory') || '{}');
    history[today] = { work: workRounded, love: loveRounded, money: moneyRounded, mood };
    localStorage.setItem('fortuneHistory', JSON.stringify(history));
  }

  // レーダーチャート描画（SVG）
  function drawRadarChart(work, love, money) {
    const svg = document.getElementById('radarChart');
    svg.innerHTML = ''; // リセット

    const width = 300, height = 300;
    const centerX = width / 2, centerY = height / 2;
    const maxRadius = 80;
    const scale = maxRadius / 5;

    // グリッド線（背景）
    for (let i = 1; i <= 5; i++) {
      const r = i * scale;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', centerX);
      circle.setAttribute('cy', centerY);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', '#ddd');
      circle.setAttribute('stroke-width', '1');
      svg.appendChild(circle);
    }

    // 軸（3軸）
    const axes = [
      { label: '仕事運', angle: -Math.PI / 2 },
      { label: '恋愛運', angle: -Math.PI / 2 + (Math.PI * 2 / 3) },
      { label: '金運', angle: -Math.PI / 2 + (Math.PI * 4 / 3) }
    ];

    axes.forEach(axis => {
      const x = centerX + maxRadius * Math.cos(axis.angle);
      const y = centerY + maxRadius * Math.sin(axis.angle);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', centerX);
      line.setAttribute('y1', centerY);
      line.setAttribute('x2', x);
      line.setAttribute('y2', y);
      line.setAttribute('stroke', '#ccc');
      line.setAttribute('stroke-width', '1');
      svg.appendChild(line);

      // ラベル
      const labelX = centerX + (maxRadius + 25) * Math.cos(axis.angle);
      const labelY = centerY + (maxRadius + 25) * Math.sin(axis.angle);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelX);
      text.setAttribute('y', labelY);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('font-size', '12');
      text.setAttribute('fill', '#999');
      text.textContent = axis.label;
      svg.appendChild(text);
    });

    // データ点
    const values = [work, love, money];
    const points = values.map((v, i) => {
      const r = v * scale;
      const angle = axes[i].angle;
      const x = centerX + r * Math.cos(angle);
      const y = centerY + r * Math.sin(angle);
      return { x, y };
    });

    // ポリゴン（塗りつぶし）
    let pathData = `M ${points[0].x} ${points[0].y}`;
    for (let i = 1; i < points.length; i++) {
      pathData += ` L ${points[i].x} ${points[i].y}`;
    }
    pathData += ' Z';

    const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    polygon.setAttribute('d', pathData);
    polygon.setAttribute('fill', '#e07b00');
    polygon.setAttribute('fill-opacity', '0.3');
    polygon.setAttribute('stroke', '#e07b00');
    polygon.setAttribute('stroke-width', '2');
    svg.appendChild(polygon);

    // データ点
    points.forEach(point => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', point.x);
      circle.setAttribute('cy', point.y);
      circle.setAttribute('r', '5');
      circle.setAttribute('fill', '#e07b00');
      svg.appendChild(circle);
    });
  }
</script>

</body>
</html>
