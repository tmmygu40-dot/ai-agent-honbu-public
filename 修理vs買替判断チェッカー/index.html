<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修理vs買替判断チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>修理 vs 買替<br>判断チェッカー</h1>
    <p class="subtitle">どちらがお得か年間コストで即判断</p>

    <div class="cards">
      <div class="card repair-card">
        <h2>🔧 修理する場合</h2>
        <div class="field">
          <label for="repairCost">修理費用（円）</label>
          <input type="number" id="repairCost" placeholder="例: 15000" min="0">
        </div>
        <div class="field">
          <label for="repairLife">修理後の使用予定年数（年）</label>
          <input type="number" id="repairLife" placeholder="例: 3" min="0.1" step="0.1">
        </div>
      </div>

      <div class="card replace-card">
        <h2>🛒 買い替える場合</h2>
        <div class="field">
          <label for="replaceCost">買い替え費用（円）</label>
          <input type="number" id="replaceCost" placeholder="例: 50000" min="0">
        </div>
        <div class="field">
          <label for="replaceLife">新品の使用予定年数（年）</label>
          <input type="number" id="replaceLife" placeholder="例: 8" min="0.1" step="0.1">
        </div>
      </div>
    </div>

    <button class="btn-calc" id="calcBtn">判断する</button>

    <div class="result" id="result" style="display:none">
      <div class="result-inner">
        <div class="verdict" id="verdict"></div>
        <div class="cost-compare">
          <div class="cost-item" id="repairAnnual"></div>
          <div class="cost-divider">vs</div>
          <div class="cost-item" id="replaceAnnual"></div>
        </div>
        <div class="diff" id="diffText"></div>
      </div>
    </div>

    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <h3>計算履歴</h3>
        <button class="btn-clear" id="clearBtn">履歴を消す</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
