<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生理周期管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>生理周期管理</h1>

    <!-- 次回予定日 -->
    <section class="next-period-card" id="nextPeriodCard">
      <div class="next-label">次回予定日</div>
      <div class="next-date" id="nextDate">—</div>
      <div class="next-sub" id="nextSub"></div>
    </section>

    <!-- 記録入力 -->
    <section class="card">
      <h2>記録を追加</h2>
      <div class="form-row">
        <label>開始日<input type="date" id="startDate"></label>
        <label>終了日<input type="date" id="endDate"></label>
      </div>
      <div class="form-row">
        <label class="full">体調メモ
          <input type="text" id="memo" placeholder="例: 腹痛あり、気分良好">
        </label>
      </div>
      <button class="btn-primary" onclick="addRecord()">記録する</button>
    </section>

    <!-- 周期グラフ -->
    <section class="card" id="graphSection" style="display:none;">
      <h2>周期の推移</h2>
      <div class="graph-wrap">
        <canvas id="cycleCanvas" height="120"></canvas>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="card">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
