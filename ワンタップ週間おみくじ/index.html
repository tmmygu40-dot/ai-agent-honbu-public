<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワンタップ週間おみくじ｜直感3択で今週の運気タイプを診断</title>
  <meta name="description" content="直感で3択を3問タップするだけで、今週の運気タイプ・キーカラー・ラッキーアクションを30秒で診断できる無料おみくじアプリです。月曜の朝にサクッと運勢チェック。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-text {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 0.9rem; line-height: 1.5;
    }
    .choice-row { display: flex; flex-direction: column; gap: 0.55rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.98rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); }
    .choice-btn:active { transform: translateY(1px); }
    .choice-btn.selected {
      background: var(--accent-light); border-color: var(--accent);
      color: var(--accent); font-weight: 700;
    }
    .q-num { font-size: 0.72rem; color: var(--accent); font-weight: 700; margin-bottom: 0.3rem; letter-spacing: 0.06em; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc.disabled { background: #d6c7b3; box-shadow: 0 4px 0 #b8a487; cursor: not-allowed; }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-emoji { font-size: 3.4rem; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-type {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-sub); margin-bottom: 0.3rem; text-transform: uppercase;
    }
    .result-name { font-size: 1.7rem; font-weight: 900; color: var(--accent); margin-bottom: 0.6rem; letter-spacing: -0.02em; }
    .result-msg { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; }

    .info-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 0.6rem; }
    .info-table tr { border-bottom: 1px solid var(--border); }
    .info-table tr:last-child { border-bottom: none; }
    .info-table td { padding: 0.6rem 0.3rem; color: var(--text-sub); text-align: left; }
    .info-table td:last-child { text-align: right; font-weight: 700; color: var(--text); }

    .reset-btn {
      display: block; margin: 0.8rem auto 0; padding: 0.6rem 1.4rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .saved-note {
      max-width: 600px; margin: 0 auto 1rem; padding: 0.6rem 0.9rem;
      background: var(--accent-light); border: 1px solid var(--accent);
      border-radius: 10px; font-size: 0.78rem; color: var(--accent);
      text-align: center; display: none;
    }
    .saved-note.show { display: block; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .choice-btn, .reset-btn { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ワンタップ週間おみくじ</h1>
    <p class="subtitle">直感で3択を3問タップ。今週の運気タイプ・キーカラー・ラッキーアクションが30秒で分かります。</p>
  </header>

  <div class="saved-note" id="savedNote">📌 前回の診断結果を表示中（再診断するには下のボタンをタップ）</div>

  <!-- Q1 -->
  <div class="card" id="q1card">
    <p class="q-num">Q1</p>
    <p class="q-text">朝起きて最初に見たい景色は？</p>
    <div class="choice-row" data-q="0">
      <button class="choice-btn" data-v="0">☀️ ピカッと晴れた青空</button>
      <button class="choice-btn" data-v="1">🌙 静かな夜明け前の月</button>
      <button class="choice-btn" data-v="2">🌬 そよ風が吹く草原</button>
    </div>
  </div>

  <!-- Q2 -->
  <div class="card" id="q2card">
    <p class="q-num">Q2</p>
    <p class="q-text">いま一番惹かれる飲み物は？</p>
    <div class="choice-row" data-q="1">
      <button class="choice-btn" data-v="0">🍵 体が温まるお茶</button>
      <button class="choice-btn" data-v="1">💧 ひんやり清らかな水</button>
      <button class="choice-btn" data-v="2">☕ 香り立つコーヒー</button>
    </div>
  </div>

  <!-- Q3 -->
  <div class="card" id="q3card">
    <p class="q-num">Q3</p>
    <p class="q-text">今週やってみたい気分は？</p>
    <div class="choice-row" data-q="2">
      <button class="choice-btn" data-v="0">🚀 新しいことに挑戦したい</button>
      <button class="choice-btn" data-v="1">🛋 のんびり整える時間がほしい</button>
      <button class="choice-btn" data-v="2">🤝 誰かと話して笑いたい</button>
    </div>
  </div>

  <button class="btn-calc disabled" id="calcBtn" onclick="calc()">🔮 結果を見る</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <div class="result-emoji" id="re">🔮</div>
    <p class="result-type">今週のあなたは</p>
    <p class="result-name" id="rn">—</p>
    <p class="result-msg" id="rm"></p>
    <table class="info-table"><tbody id="rt"></tbody></table>
    <button class="reset-btn" onclick="resetAll()">もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✨ このアプリは娯楽・気分転換を目的とした参考おみくじです。診断結果はその週を楽しく過ごすための小さなヒントとしてご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'omikuji_weekly_result_v1';
  var answers = [null, null, null];

  // 5タイプ：太陽・月・風・水・大地
  var TYPES = {
    sun:   { emoji: '☀️', name: '太陽タイプ', color: 'オレンジ・ゴールド', action: '朝の散歩・新しい挑戦', advice: '今週は行動運が絶好調。気になっていたことに一歩踏み出すと、想像以上の手応えが返ってきます。', luck: '★★★★★' },
    moon:  { emoji: '🌙', name: '月タイプ',   color: 'ネイビー・シルバー', action: '寝る前のストレッチ・日記', advice: '今週は内側を整える週。睡眠と食事を丁寧にすると、後半に運気がスッと上向きます。', luck: '★★★★☆' },
    wind:  { emoji: '🌬', name: '風タイプ',   color: 'ライトグリーン・水色', action: '誰かを誘ってランチ・短い旅', advice: '人との縁が運を運ぶ週。久しぶりの相手にメッセージを送ると、面白いきっかけが舞い込みます。', luck: '★★★★☆' },
    water: { emoji: '💧', name: '水タイプ',   color: 'ブルー・ホワイト',   action: '水回りの掃除・温泉', advice: '感受性が高まる週。情報を絞って入れすぎないことで、必要なひらめきが降りてきます。', luck: '★★★☆☆' },
    earth: { emoji: '🌳', name: '大地タイプ', color: 'ベージュ・カーキ',   action: '部屋の片付け・地道な貯金', advice: '土台を固める週。派手な動きより、コツコツ続けてきたことの見直しで運気が安定します。', luck: '★★★★☆' }
  };

  // 選択ハンドラ
  document.querySelectorAll('.choice-row').forEach(function(row){
    var qIdx = parseInt(row.getAttribute('data-q'), 10);
    row.querySelectorAll('.choice-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        row.querySelectorAll('.choice-btn').forEach(function(b){ b.classList.remove('selected'); });
        btn.classList.add('selected');
        answers[qIdx] = parseInt(btn.getAttribute('data-v'), 10);
        updateBtn();
      });
    });
  });

  function updateBtn() {
    var btn = document.getElementById('calcBtn');
    if (answers.every(function(a){ return a !== null; })) {
      btn.classList.remove('disabled');
    } else {
      btn.classList.add('disabled');
    }
  }

  function calc() {
    if (!answers.every(function(a){ return a !== null; })) return;

    // タイプ判定（3問の組み合わせから5タイプへマップ）
    var sum = answers[0] + answers[1] + answers[2];
    var key;
    // Q3 が0(挑戦) → 太陽寄り、Q3=1(整える) → 月/大地寄り、Q3=2(交流) → 風寄り
    if (answers[2] === 0) {
      key = (answers[0] === 0) ? 'sun' : (answers[1] === 1 ? 'water' : 'wind');
    } else if (answers[2] === 1) {
      key = (answers[0] === 1) ? 'moon' : (answers[1] === 0 ? 'earth' : 'water');
    } else {
      key = (answers[0] === 2) ? 'wind' : (answers[1] === 2 ? 'sun' : 'moon');
    }

    var type = TYPES[key];
    showResult(type);

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        key: key, answers: answers, savedAt: new Date().toISOString()
      }));
    } catch(e) {}
  }

  function showResult(type) {
    document.getElementById('re').textContent = type.emoji;
    document.getElementById('rn').textContent = type.name;
    document.getElementById('rm').textContent = type.advice;
    document.getElementById('rt').innerHTML =
        '<tr><td>今週の運気</td><td>' + type.luck + '</td></tr>'
      + '<tr><td>キーカラー</td><td>' + type.color + '</td></tr>'
      + '<tr><td>ラッキーアクション</td><td>' + type.action + '</td></tr>';
    var rc = document.getElementById('result');
    rc.classList.add('show');
    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function resetAll() {
    answers = [null, null, null];
    document.querySelectorAll('.choice-btn').forEach(function(b){ b.classList.remove('selected'); });
    document.getElementById('result').classList.remove('show');
    document.getElementById('savedNote').classList.remove('show');
    updateBtn();
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    document.getElementById('q1card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 起動時：保存があれば再表示
  (function init(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.key || !TYPES[data.key]) return;
      if (Array.isArray(data.answers) && data.answers.length === 3) {
        answers = data.answers.slice();
        document.querySelectorAll('.choice-row').forEach(function(row){
          var qIdx = parseInt(row.getAttribute('data-q'), 10);
          var v = answers[qIdx];
          if (v === null || v === undefined) return;
          var btn = row.querySelector('.choice-btn[data-v="' + v + '"]');
          if (btn) btn.classList.add('selected');
        });
        updateBtn();
      }
      showResult(TYPES[data.key]);
      document.getElementById('savedNote').classList.add('show');
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
