<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生命保険必要保障額診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 子ども入力欄の表示切替 */
    #child-fields { margin-top: 0.5rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .sep td { background: var(--bg); font-size: 0.78rem; font-weight: 700; color: var(--text-sub); letter-spacing: 0.05em; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>生命保険 必要保障額診断</h1>
    <p class="subtitle">年収・家族構成を入力して、今の保障が足りているかを即チェック</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="income">年収（万円）</label>
      <input type="number" id="income" placeholder="例: 500" min="0">
      <p class="hint">税込み年収（手取りではなく額面）</p>
    </div>
    <div class="field">
      <label for="savings">現在の貯蓄・金融資産（万円）</label>
      <input type="number" id="savings" placeholder="例: 300" min="0">
      <p class="hint">預金・投資信託など。なければ 0</p>
    </div>
    <div class="field">
      <label for="current-insure">現在の生命保険 保障額（万円）</label>
      <input type="number" id="current-insure" placeholder="例: 2000" min="0">
      <p class="hint">死亡保険金の合計。なければ 0</p>
    </div>
  </div>

  <div class="card">
    <p class="card-title">家族構成</p>
    <div class="field">
      <label for="spouse">配偶者</label>
      <select id="spouse" onchange="toggleSpouse()">
        <option value="yes">いる</option>
        <option value="no">いない</option>
      </select>
    </div>
    <div class="field">
      <label for="children">子どもの人数</label>
      <select id="children" onchange="toggleChildren()">
        <option value="0">いない（0人）</option>
        <option value="1">1人</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人以上</option>
      </select>
    </div>
    <div id="child-fields" style="display:none">
      <div class="field">
        <label for="youngest-age">末子（一番下の子）の現在の年齢</label>
        <select id="youngest-age">
          <option value="0">0歳</option>
          <option value="1">1歳</option>
          <option value="2">2歳</option>
          <option value="3">3歳</option>
          <option value="4">4歳</option>
          <option value="5">5歳</option>
          <option value="6">6歳</option>
          <option value="7">7歳</option>
          <option value="8">8歳</option>
          <option value="9">9歳</option>
          <option value="10">10歳</option>
          <option value="11">11歳</option>
          <option value="12">12歳</option>
          <option value="13">13歳</option>
          <option value="14">14歳</option>
          <option value="15">15歳</option>
          <option value="16">16歳</option>
          <option value="17">17歳</option>
          <option value="18">18歳以上（独立済み）</option>
        </select>
        <p class="hint">子どもが独立するまでの生活費・教育費の計算に使用します</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">過不足額（保障額 − 必要保障額）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">必要保障額の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 必要保障額は「遺族生活費（年収×70%×必要年数）＋教育費＋整理費用」から「遺族年金概算＋現在の貯蓄」を差し引いた目安額です。実際の保険加入時はFPへの相談を推奨します。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'seimei-hoken-v1';

  function toggleChildren() {
    var n = parseInt(document.getElementById('children').value, 10);
    document.getElementById('child-fields').style.display = n > 0 ? 'block' : 'none';
    saveInputs();
  }
  function toggleSpouse() { saveInputs(); }

  function calc() {
    var income  = parseFloat(document.getElementById('income').value);
    var savings = parseFloat(document.getElementById('savings').value) || 0;
    var currentInsure = parseFloat(document.getElementById('current-insure').value) || 0;
    var spouse  = document.getElementById('spouse').value;
    var children = parseInt(document.getElementById('children').value, 10);
    var youngestAge = children > 0 ? parseInt(document.getElementById('youngest-age').value, 10) : 18;

    if (isNaN(income) || income <= 0) { showErr('年収を入力してください'); return; }

    // ── 必要年数の計算 ──
    // 末子が22歳になるまでの年数（養育費・生活費期間）
    var childYears = Math.max(22 - youngestAge, 0);
    // 配偶者がいる場合は老後生活費として追加20年想定
    var seniorYears = spouse === 'yes' ? 20 : 0;
    // 総必要年数
    var totalYears = childYears + seniorYears;
    // 最低10年保証（遺族が生活を立て直す最低ライン）
    if (spouse === 'yes' || children > 0) {
      totalYears = Math.max(totalYears, 10);
    }

    // ── 遺族生活費（年収×70%×必要年数）──
    var lifeCost = income * 0.70 * totalYears;

    // ── 教育費（1人あたり300万円）──
    var edCost = children * 300;

    // ── 整理費用（葬祭・相続手続きなど）──
    var funeralCost = 200;

    // ── 遺族年金概算（配偶者ありの場合: 年収15%×20年相当）──
    var pensionDeduct = spouse === 'yes' ? income * 0.15 * Math.min(totalYears, 20) : 0;

    // ── 必要保障額 ──
    var needed = lifeCost + edCost + funeralCost - pensionDeduct - savings;
    needed = Math.max(needed, 0);

    // ── 過不足 ──
    var diff = currentInsure - needed;

    // ── 判定 ──
    var level, evalText, note;
    if (diff >= 500) {
      level = 'ok';
      evalText = '保障は十分です';
      note = '現在の保険で必要保障額をカバーできています。余裕分は見直しによる保険料節約も検討できます。';
    } else if (diff >= -500) {
      level = 'warn';
      evalText = '概ね充足していますが要確認';
      note = '大きな不足はありませんが、家族構成や収入の変化に応じて定期的に見直しましょう。';
    } else {
      level = 'ng';
      evalText = '保障が不足しています';
      note = '現在の保障では不足している可能性があります。保険の追加加入やFPへの相談を検討してください。';
    }

    var diffText = (diff >= 0 ? '+' : '') + fmt(diff) + ' 万円';
    showResult(level, diffText, evalText, note);
    showDetail([
      ['sep', '＋ 必要な費用'],
      ['遺族生活費（年収×70%×' + totalYears + '年）', fmt(lifeCost) + ' 万円'],
      ['教育費（' + children + '人×300万円）', fmt(edCost) + ' 万円'],
      ['整理費用（葬祭・手続き）', fmt(funeralCost) + ' 万円'],
      ['sep', '－ 控除できるもの'],
      ['遺族年金概算', '−' + fmt(pensionDeduct) + ' 万円'],
      ['現在の貯蓄・金融資産', '−' + fmt(savings) + ' 万円'],
      ['sep', '＝ 結果'],
      ['必要保障額（目安）', fmt(needed) + ' 万円', true],
      ['現在の保障額', fmt(currentInsure) + ' 万円'],
      ['過不足', (diff >= 0 ? '+' : '') + fmt(diff) + ' 万円', true],
    ]);
    saveInputs();
  }

  function showResult(level, val, evalTxt, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = evalTxt;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      if (r[0] === 'sep') {
        return '<tr class="sep"><td colspan="2">' + r[1] + '</td></tr>';
      }
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function saveInputs() {
    var data = {
      income: document.getElementById('income').value,
      savings: document.getElementById('savings').value,
      currentInsure: document.getElementById('current-insure').value,
      spouse: document.getElementById('spouse').value,
      children: document.getElementById('children').value,
      youngestAge: document.getElementById('youngest-age').value,
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadInputs() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.income)       document.getElementById('income').value = data.income;
      if (data.savings)      document.getElementById('savings').value = data.savings;
      if (data.currentInsure) document.getElementById('current-insure').value = data.currentInsure;
      if (data.spouse)       document.getElementById('spouse').value = data.spouse;
      if (data.children)     document.getElementById('children').value = data.children;
      if (data.youngestAge)  document.getElementById('youngest-age').value = data.youngestAge;
      toggleChildren();
    } catch(e) {}
  }

  loadInputs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
