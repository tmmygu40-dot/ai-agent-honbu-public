<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引継ぎ書作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>引継ぎ書作成</h1>

    <section class="card">
      <h2>基本情報</h2>
      <div class="field">
        <label for="title">引継ぎ件名</label>
        <input type="text" id="title" placeholder="例：営業部 月次報告業務">
      </div>
      <div class="field">
        <label for="from-name">引き継ぐ人（担当者）</label>
        <input type="text" id="from-name" placeholder="例：山田 太郎">
      </div>
      <div class="field">
        <label for="to-name">引き継がれる人</label>
        <input type="text" id="to-name" placeholder="例：鈴木 花子">
      </div>
      <div class="field">
        <label for="date">引継ぎ日</label>
        <input type="date" id="date">
      </div>
    </section>

    <section class="card">
      <h2>手順</h2>
      <div id="steps-list"></div>
      <div class="add-row">
        <input type="text" id="step-input" placeholder="手順を入力（例：毎月5日にデータを集計する）">
        <button class="btn-add" onclick="addStep()">追加</button>
      </div>
    </section>

    <section class="card">
      <h2>注意点</h2>
      <div id="notes-list"></div>
      <div class="add-row">
        <input type="text" id="note-input" placeholder="注意点を入力（例：締め切りは毎月10日厳守）">
        <button class="btn-add" onclick="addNote()">追加</button>
      </div>
    </section>

    <div class="action-row">
      <button class="btn-primary" onclick="generatePreview()">引継ぎ書を生成</button>
      <button class="btn-secondary" onclick="clearAll()">リセット</button>
    </div>

    <section class="card" id="preview-section" style="display:none;">
      <h2>プレビュー</h2>
      <pre id="preview-text"></pre>
      <button class="btn-copy" onclick="copyToClipboard()">コピーする</button>
      <span class="copy-msg" id="copy-msg">コピーしました！</span>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
