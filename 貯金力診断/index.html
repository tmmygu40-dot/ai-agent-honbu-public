<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貯金力診断｜5問YES/NOで貯金体質か浪費体質かをズバリ当てる</title>
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたが貯金体質か浪費体質かをズバリ判定。タイプ別の特徴と改善アドバイスを無料で表示する貯金力診断アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-num { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
    .q-text { font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.55; margin-bottom: 1.2rem; }
    .q-progress { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.6rem; }
    .q-progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 1rem; }
    .q-progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

    .yn-row { display: flex; gap: 0.7rem; }
    .btn-yn {
      flex: 1; padding: 1rem;
      font-size: 1rem; font-weight: 800;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--text); cursor: pointer;
      transition: transform 0.1s, border-color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-yn.yes { color: var(--ok); }
    .btn-yn.no  { color: var(--ng); }
    .btn-yn:hover { background: var(--accent-light); border-color: var(--accent); }
    .btn-yn:active { transform: translateY(2px); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; margin-top: 0.8rem; }
    .result-emoji { font-size: 2.6rem; line-height: 1.2; margin-bottom: 0.3rem; }

    .advice-list { text-align: left; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .advice-list li { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-bottom: 0.4rem; padding-left: 0.2rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .last-result {
      max-width: 600px; margin: 0 auto 1rem; padding: 0.6rem 0.9rem;
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.78rem; color: var(--text-sub);
    }
    .last-result b { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-yn, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>貯金力診断</h1>
    <p class="subtitle">5問YES/NOで本当の貯金体質か浪費体質かをズバリ当てる</p>
  </header>

  <!-- 前回の結果 -->
  <div class="last-result" id="last-result" style="display:none"></div>

  <!-- 質問カード -->
  <div class="card" id="q-card">
    <p class="card-title">診断スタート</p>
    <p class="q-progress" id="q-progress">1問目 / 全5問</p>
    <div class="q-progress-bar"><div class="q-progress-bar-fill" id="q-progress-fill" style="width:20%"></div></div>
    <p class="q-num" id="q-num">Q1</p>
    <p class="q-text" id="q-text">—</p>
    <div class="yn-row">
      <button class="btn-yn yes" onclick="answer(true)">YES</button>
      <button class="btn-yn no"  onclick="answer(false)">NO</button>
    </div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="r-emoji"></p>
    <p class="result-label">あなたの貯金タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <ul class="advice-list" id="advice-list"></ul>
  </div>

  <button class="btn-calc" id="btn-retry" style="display:none" onclick="retry()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断は、家計管理・行動経済学の一般的な知見をもとに、目安として使いやすく整理した簡易タイプ診断です。最新の家計管理アドバイスは公式情報や専門家にご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    'クレジットカードの請求額を見て驚くことが、月に1回以上ある',
    '給料日後の3日間で、1ヶ月の出費の半分以上を使ってしまう',
    '毎月決まった金額を、自動で先取り貯金している',
    'コンビニやカフェに、ほぼ毎日立ち寄って何か買っている',
    '予定外のセール・限定品を、その場でつい買ってしまうことが多い'
  ];
  // YES が「貯金力に+」となる質問は index 2 のみ。他はYES=浪費寄り。
  var YES_BAD = [true, true, false, true, true];

  var TYPES = {
    master: {
      name: '貯金マスター',
      emoji: '💰',
      level: 'ok',
      note: 'あなたは貯金体質ど真ん中。お金の流れをきちんと把握できていて、衝動買いに流されにくい鋼のメンタルの持ち主です。',
      advice: [
        '今の習慣を続けるだけで、5年後の資産が大きく変わります',
        '貯金が貯まりすぎて眠っているなら、つみたてNISAなど次のステップへ',
        'たまには自分にご褒美もOK。我慢のしすぎは反動買いのもと'
      ]
    },
    steady: {
      name: 'コツコツ堅実タイプ',
      emoji: '🐢',
      level: 'ok',
      note: '派手さはないけど、地道に貯められるバランス型。大きな失敗はしにくい安全運転タイプです。',
      advice: [
        '先取り貯金の額を「月+3,000円」だけ増やしてみると伸びしろあり',
        'サブスクや固定費をたまに見直すと、もう一段階の貯金加速が狙えます',
        'たまの大きな出費（家電・旅行）の予算枠を別管理にすると安心'
      ]
    },
    yellow: {
      name: '要注意ライン',
      emoji: '⚠️',
      level: 'warn',
      note: '貯金と浪費が綱引き状態。今のままだと「気づいたら残高が…」のパターンに陥りやすい黄信号タイプです。',
      advice: [
        'まずは「先取り貯金」を月3,000円でいいので自動化してみる',
        '毎日のコンビニ・カフェ出費を、週に1〜2回まとめ買いに置き換える',
        'クレカ明細を月1回、必ず10分だけ見る習慣をつくる'
      ]
    },
    junkie: {
      name: '浪費ジャンキー',
      emoji: '🔥',
      level: 'ng',
      note: 'お金が手元にあると使いきってしまう、典型的な浪費体質。今すぐ仕組みで自分を守る対策が必要です。',
      advice: [
        '給料日に自動で別口座へ「先取り貯金」を仕組み化（手動はムリ）',
        'クレカは1枚に絞って、家計簿アプリで明細を毎週チェック',
        'セールメール・通販アプリの通知を全部OFFにして衝動買いを物理的に減らす',
        '「24時間ルール」（買う前に24時間考える）を即導入'
      ]
    }
  };

  var STORAGE_KEY = 'chokin_ryoku_shindan_last';
  var idx = 0;
  var score = 0; // 貯金力スコア（高いほど貯金体質）

  function showQ() {
    var n = idx + 1;
    document.getElementById('q-num').textContent = 'Q' + n;
    document.getElementById('q-text').textContent = QUESTIONS[idx];
    document.getElementById('q-progress').textContent = n + '問目 / 全5問';
    document.getElementById('q-progress-fill').style.width = (n * 20) + '%';
  }

  function answer(yes) {
    var bad = YES_BAD[idx];
    if (yes && !bad)  score++;     // 貯金良い行動にYES
    if (!yes && bad)  score++;     // 浪費行動にNO
    idx++;
    if (idx < QUESTIONS.length) {
      showQ();
    } else {
      finish();
    }
  }

  function finish() {
    var t;
    if      (score === 5) t = TYPES.master;
    else if (score >= 3)  t = TYPES.steady;
    else if (score >= 2)  t = TYPES.yellow;
    else                  t = TYPES.junkie;

    document.getElementById('q-card').style.display = 'none';
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;
    document.getElementById('advice-list').innerHTML =
      t.advice.map(function(a){ return '<li>・' + a + '</li>'; }).join('');
    document.getElementById('btn-retry').style.display = 'block';

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        type: t.name, score: score, date: new Date().toISOString().slice(0,10)
      }));
    } catch (e) {}
  }

  function retry() {
    idx = 0; score = 0;
    document.getElementById('q-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    showQ();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function loadLast() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d || !d.type) return;
      var el = document.getElementById('last-result');
      el.style.display = 'block';
      el.innerHTML = '前回の結果（' + d.date + '）：<b>' + d.type + '</b>（スコア ' + d.score + '/5）';
    } catch (e) {}
  }

  showQ();
  loadLast();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
