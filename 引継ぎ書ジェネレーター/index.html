<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引継ぎ書ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 0.85rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.3rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.65rem 0.9rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    /* 2カラム */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-add {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1rem; font-size: 0.85rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:hover { background: #ffe4b5; }

    .btn-del {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; flex-shrink: 0;
      background: var(--ng-bg); color: var(--ng);
      border: 1.5px solid #fca5a5; border-radius: 8px; cursor: pointer;
      font-size: 1.1rem; font-weight: 700;
    }
    .btn-del:hover { background: #fee2e2; }

    .btn-copy {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1rem; font-size: 0.85rem; font-weight: 700;
      background: var(--ok-bg); color: var(--ok);
      border: 1.5px solid #86efac; border-radius: 9px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: #dcfce7; }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 640px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 業務カード ── */
    .task-card {
      border: 1.5px solid var(--border);
      border-radius: 10px; padding: 1rem;
      margin-bottom: 0.8rem; background: var(--bg);
    }
    .task-card:last-child { margin-bottom: 0; }
    .task-header {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem;
    }
    .task-num {
      font-size: 0.7rem; font-weight: 800;
      background: var(--accent); color: #fff;
      padding: 0.15rem 0.5rem; border-radius: 5px;
      flex-shrink: 0;
    }
    .task-name-display {
      font-size: 0.88rem; font-weight: 700; color: var(--text); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── 引継ぎ書プレビュー ── */
    #doc-area {
      display: none;
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 640px;
    }
    .doc-header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .doc-header-label {
      font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em;
    }
    .doc-btn-row { display: flex; gap: 0.5rem; }

    /* 引継ぎ書本文 */
    #doc-content { font-size: 0.9rem; line-height: 1.7; color: var(--text); }
    .doc-title {
      font-size: 1.2rem; font-weight: 900; text-align: center;
      margin-bottom: 1.2rem; padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--border);
    }
    .doc-meta { margin-bottom: 1.2rem; }
    .doc-meta table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .doc-meta td { padding: 0.45rem 0.5rem; border-bottom: 1px solid var(--border); color: var(--text-sub); }
    .doc-meta td:first-child { font-weight: 600; color: var(--text); white-space: nowrap; width: 7rem; }
    .doc-task { margin-bottom: 1.4rem; }
    .doc-task-title {
      font-size: 1rem; font-weight: 800;
      padding: 0.5rem 0.8rem; background: var(--accent-light);
      border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0;
      margin-bottom: 0.7rem;
    }
    .doc-task-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .doc-task-key {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      white-space: nowrap; min-width: 5rem; padding-top: 0.1rem;
    }
    .doc-task-val { font-size: 0.88rem; color: var(--text); white-space: pre-wrap; }
    .doc-footer { font-size: 0.76rem; color: var(--text-sub); text-align: right; margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.7rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-add, .app-header { display: none !important; }
      #doc-area { display: block !important; box-shadow: none; border: 1px solid #ccc; max-width: 100%; }
      .card { display: none !important; }
      .doc-btn-row { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>📋 引継ぎ書ジェネレーター</h1>
    <p class="subtitle">退職・産休前の引継ぎ内容を入力するだけで業務引継ぎ書を即生成</p>
  </header>

  <a class="back-link no-print" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 基本情報 -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="row2">
      <div class="field">
        <label for="author">作成者名</label>
        <input type="text" id="author" placeholder="例: 田中 花子">
      </div>
      <div class="field">
        <label for="dept">部署・チーム</label>
        <input type="text" id="dept" placeholder="例: 営業部 第一課">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="leave-type">種別</label>
        <select id="leave-type">
          <option value="退職">退職</option>
          <option value="産前産後休暇">産前産後休暇</option>
          <option value="育児休業">育児休業</option>
          <option value="その他休暇">その他休暇</option>
          <option value="異動">異動</option>
        </select>
      </div>
      <div class="field">
        <label for="leave-date">最終出勤日 / 引継ぎ完了日</label>
        <input type="date" id="leave-date">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="successor">後任者名</label>
        <input type="text" id="successor" placeholder="例: 鈴木 太郎">
      </div>
      <div class="field">
        <label for="successor-contact">後任者連絡先（任意）</label>
        <input type="text" id="successor-contact" placeholder="例: 内線1234 / suzuki@xxx.co.jp">
      </div>
    </div>
    <div class="field">
      <label for="overview">引継ぎ全体のメモ・特記事項（任意）</label>
      <textarea id="overview" placeholder="例: 月末は請求処理が集中するため、月初に手順確認をお願いします。"></textarea>
    </div>
  </div>

  <!-- 引継ぎ業務リスト -->
  <div class="card">
    <p class="card-title">引継ぎ業務リスト</p>
    <div id="task-list"></div>
    <button class="btn-add no-print" onclick="addTask()">＋ 業務を追加する</button>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc no-print" onclick="generate()">📋 引継ぎ書を生成する</button>

  <!-- 引継ぎ書プレビュー -->
  <div id="doc-area">
    <div class="doc-header-row">
      <span class="doc-header-label">📄 引継ぎ書（プレビュー）</span>
      <div class="doc-btn-row no-print">
        <button class="btn-copy" onclick="copyDoc()">📋 テキストをコピー</button>
      </div>
    </div>
    <div id="doc-content"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存・印刷</button>

  <a class="back-link no-print" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var tasks = [];

  // localStorage 読み込み
  function loadState() {
    try {
      var s = localStorage.getItem('hikitsug_state');
      if (!s) return;
      var d = JSON.parse(s);
      if (d.author)    document.getElementById('author').value = d.author;
      if (d.dept)      document.getElementById('dept').value = d.dept;
      if (d.leaveType) document.getElementById('leave-type').value = d.leaveType;
      if (d.leaveDate) document.getElementById('leave-date').value = d.leaveDate;
      if (d.successor) document.getElementById('successor').value = d.successor;
      if (d.successorContact) document.getElementById('successor-contact').value = d.successorContact;
      if (d.overview)  document.getElementById('overview').value = d.overview;
      if (d.tasks && Array.isArray(d.tasks)) { tasks = d.tasks; renderTasks(); }
    } catch(e) {}
  }

  // localStorage 保存
  function saveState() {
    try {
      var d = {
        author: document.getElementById('author').value,
        dept:   document.getElementById('dept').value,
        leaveType: document.getElementById('leave-type').value,
        leaveDate: document.getElementById('leave-date').value,
        successor: document.getElementById('successor').value,
        successorContact: document.getElementById('successor-contact').value,
        overview: document.getElementById('overview').value,
        tasks: tasks
      };
      localStorage.setItem('hikitsug_state', JSON.stringify(d));
    } catch(e) {}
  }

  // 自動保存（入力変更時）
  document.addEventListener('change', saveState);
  document.addEventListener('input', saveState);

  // 業務追加
  function addTask() {
    tasks.push({ name:'', overview:'', steps:'', notes:'' });
    renderTasks();
    saveState();
  }

  // 業務削除
  function deleteTask(i) {
    tasks.splice(i, 1);
    renderTasks();
    saveState();
  }

  // 業務リスト描画
  function renderTasks() {
    var list = document.getElementById('task-list');
    if (tasks.length === 0) {
      list.innerHTML = '<p style="font-size:0.85rem;color:var(--text-sub);text-align:center;padding:1rem 0;">「業務を追加する」ボタンで引継ぎ業務を追加してください</p>';
      return;
    }
    list.innerHTML = tasks.map(function(t, i) {
      return '<div class="task-card">'
        + '<div class="task-header">'
        + '<span class="task-num">業務 ' + (i+1) + '</span>'
        + '<span class="task-name-display">' + esc(t.name || '（業務名未入力）') + '</span>'
        + '<button class="btn-del no-print" onclick="deleteTask(' + i + ')">✕</button>'
        + '</div>'
        + '<div class="field"><label>業務名 <span style="color:var(--ng)">*</span></label>'
        + '<input type="text" placeholder="例: 月次請求書の作成・発送" value="' + esc(t.name) + '" oninput="updateTask(' + i + ',\'name\',this.value)"></div>'
        + '<div class="field"><label>業務概要（何をする業務か）</label>'
        + '<textarea placeholder="例: 毎月末日に得意先への請求書を作成し、翌月1日に郵送する。" oninput="updateTask(' + i + ',\'overview\',this.value)">' + esc(t.overview) + '</textarea></div>'
        + '<div class="field"><label>引継ぎ手順（順番に書く）</label>'
        + '<textarea placeholder="例: 1. 会計ソフトを開く&#10;2. 請求書作成→得意先を選択&#10;3. 金額確認後に印刷・押印&#10;4. 封入して郵便局へ" oninput="updateTask(' + i + ',\'steps\',this.value)">' + esc(t.steps) + '</textarea></div>'
        + '<div class="field"><label>注意点・ポイント（任意）</label>'
        + '<textarea placeholder="例: 締め日が月末でない得意先もあるため、顧客マスタを要確認。" oninput="updateTask(' + i + ',\'notes\',this.value)">' + esc(t.notes) + '</textarea></div>'
        + '</div>';
    }).join('');
  }

  function updateTask(i, key, val) {
    tasks[i][key] = val;
    // 業務名表示を動的に更新
    var headers = document.querySelectorAll('.task-name-display');
    if (headers[i]) headers[i].textContent = val || '（業務名未入力）';
    saveState();
  }

  // 引継ぎ書生成
  function generate() {
    var author = document.getElementById('author').value.trim();
    var dept   = document.getElementById('dept').value.trim();
    var leaveType = document.getElementById('leave-type').value;
    var leaveDate = document.getElementById('leave-date').value;
    var successor = document.getElementById('successor').value.trim();
    var successorContact = document.getElementById('successor-contact').value.trim();
    var overview = document.getElementById('overview').value.trim();

    if (!author) { alert('作成者名を入力してください'); return; }
    if (tasks.length === 0) { alert('業務を1件以上追加してください'); return; }

    var dateStr = leaveDate ? fmtDate(leaveDate) : '（未設定）';
    var today = fmtDate(new Date().toISOString().slice(0,10));

    // HTML生成
    var html = '';
    html += '<div class="doc-title">業務引継ぎ書</div>';
    html += '<div class="doc-meta"><table>';
    html += '<tr><td>作成日</td><td>' + today + '</td></tr>';
    html += '<tr><td>作成者</td><td>' + esc(author) + (dept ? '　' + esc(dept) : '') + '</td></tr>';
    html += '<tr><td>種別</td><td>' + esc(leaveType) + '</td></tr>';
    html += '<tr><td>最終出勤日</td><td>' + esc(dateStr) + '</td></tr>';
    html += '<tr><td>後任者</td><td>' + esc(successor || '（未設定）') + (successorContact ? '　' + esc(successorContact) : '') + '</td></tr>';
    if (overview) html += '<tr><td>特記事項</td><td style="white-space:pre-wrap">' + esc(overview) + '</td></tr>';
    html += '</table></div>';

    tasks.forEach(function(t, i) {
      html += '<div class="doc-task">';
      html += '<div class="doc-task-title">【業務 ' + (i+1) + '】' + esc(t.name || '（業務名未入力）') + '</div>';
      if (t.overview) {
        html += '<div class="doc-task-row"><span class="doc-task-key">概要</span><span class="doc-task-val">' + esc(t.overview) + '</span></div>';
      }
      if (t.steps) {
        html += '<div class="doc-task-row"><span class="doc-task-key">手順</span><span class="doc-task-val">' + esc(t.steps) + '</span></div>';
      }
      if (t.notes) {
        html += '<div class="doc-task-row"><span class="doc-task-key">注意点</span><span class="doc-task-val">' + esc(t.notes) + '</span></div>';
      }
      html += '</div>';
    });

    html += '<div class="doc-footer">作成者: ' + esc(author) + '　|　作成日: ' + today + '</div>';

    document.getElementById('doc-content').innerHTML = html;
    var area = document.getElementById('doc-area');
    area.style.display = 'block';
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // テキストコピー
  function copyDoc() {
    var author = document.getElementById('author').value.trim();
    var dept   = document.getElementById('dept').value.trim();
    var leaveType = document.getElementById('leave-type').value;
    var leaveDate = document.getElementById('leave-date').value;
    var successor = document.getElementById('successor').value.trim();
    var successorContact = document.getElementById('successor-contact').value.trim();
    var overview = document.getElementById('overview').value.trim();
    var today = fmtDate(new Date().toISOString().slice(0,10));
    var dateStr = leaveDate ? fmtDate(leaveDate) : '（未設定）';

    var lines = [];
    lines.push('■ 業務引継ぎ書');
    lines.push('');
    lines.push('作成日：' + today);
    lines.push('作成者：' + author + (dept ? '　' + dept : ''));
    lines.push('種別：' + leaveType);
    lines.push('最終出勤日：' + dateStr);
    lines.push('後任者：' + (successor || '（未設定）') + (successorContact ? '　' + successorContact : ''));
    if (overview) lines.push('特記事項：' + overview);
    lines.push('');

    tasks.forEach(function(t, i) {
      lines.push('─'.repeat(30));
      lines.push('【業務 ' + (i+1) + '】' + (t.name || '（業務名未入力）'));
      if (t.overview) lines.push('概要：' + t.overview);
      if (t.steps)    lines.push('手順：\n' + t.steps);
      if (t.notes)    lines.push('注意点：' + t.notes);
      lines.push('');
    });

    var text = lines.join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert('テキストをコピーしました！');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      alert('テキストをコピーしました！');
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(d) {
    var p = d.split('-');
    return p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
  }

  // 初期化
  loadState();
  if (tasks.length === 0) { tasks.push({ name:'', overview:'', steps:'', notes:'' }); renderTasks(); }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
