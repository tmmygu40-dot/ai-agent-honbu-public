<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="地震後に役立つ応急処置と止血法を3択クイズで学べます。防災知識を身につけましょう。">
  <title>🚨 サバイバル応急処置ガイド</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #d9534f;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b04030, 0 6px 16px rgba(217,83,79,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b04030, 0 2px 8px rgba(217,83,79,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── クイズの選択肢 ── */
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1.2rem 0;
    }
    .option-btn {
      padding: 1rem;
      font-size: 0.95rem;
      text-align: left;
      background: #f9f9f9;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:hover {
      background: #f0f0f0;
      border-color: var(--accent);
    }
    .option-btn.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ── 解説 ── */
    .explanation {
      display: none;
      background: #f9f9f9;
      padding: 1rem;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      margin: 1rem 0;
      font-size: 0.92rem;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── スコア表示 ── */
    .score-display {
      text-align: center;
      padding: 1rem;
      background: var(--bg);
      border-radius: 10px;
      margin: 1.2rem 0;
    }
    .score-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--accent);
      margin: 0.5rem 0;
    }

    /* ── プログレスバー ── */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 1rem 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }

    /* ── リスタート ── */
    .btn-restart {
      display: block;
      margin: 0 auto;
      padding: 0.8rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--card);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-restart:hover {
      background: var(--accent);
      color: white;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-restart { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── スマホ対応 ── */
    @media (max-width: 480px) {
      .app-header h1 { font-size: 1.1rem; }
      .result-value { font-size: 1.8rem; }
      .score-number { font-size: 2rem; }
    }
  </style>
  <!-- 計測タグ（goatcounter） -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>🚨 サバイバル応急処置ガイド</h1>
    <p class="subtitle">地震後に役立つ応急処置と止血法を楽しいクイズで学べます。防災知識を身につけましょう。</p>
  </header>

  <!-- スコア表示 -->
  <div class="card" id="scoreCard">
    <p class="card-title">スコア</p>
    <div class="score-display">
      <p>正答数</p>
      <div class="score-number" id="scoreText">0 / 0</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>

  <!-- クイズカード -->
  <div class="card" id="quizCard">
    <p class="card-title" id="questionNumber">問題 1 / 10</p>
    <p id="questionText" style="font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.6;"></p>
    <div class="quiz-options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="btn-calc" id="nextBtn" onclick="nextQuestion()" style="display: none;">次へ進む</button>
  </div>

  <!-- 完了メッセージ -->
  <div class="result-card" id="result" style="display: none;">
    <p class="result-label">クイズ完了</p>
    <p class="result-value" id="finalScore"></p>
    <p class="result-note" id="finalMessage"></p>
    <button class="btn-restart" onclick="restart()">もう一度やる</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、内閣府・気象庁・日本赤十字社などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。最新情報は公式情報をご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── クイズデータ ──
  const QUIZZES = [
    {
      q: "地震で意識がない人を見つけました。最初にすべきことは？",
      options: [
        { text: "①反応がないか、呼びかけて確認する", correct: true, exp: "まず反応確認が重要です。呼びかけて、肩をやさしく叩いて反応を確認します。" },
        { text: "②すぐに病院に連れていく", correct: false, exp: "移動はまず反応確認後です。不用意な移動は脊椎損傷を悪化させる可能性があります。" },
        { text: "③その場で寝ているので放置する", correct: false, exp: "意識がない状態は危険です。必ず反応を確認し、適切な対応をします。" }
      ]
    },
    {
      q: "止血が必要な大出血が見られました。最初の対応は？",
      options: [
        { text: "①清潔なタオルで強く圧迫止血する", correct: true, exp: "直接圧迫が最初の止血法です。清潔なタオルで患部を強く押さえ続けます。" },
        { text: "②傷口を水で洗う", correct: false, exp: "大出血時は洗浄より止血が優先です。圧迫止血が最優先です。" },
        { text: "③绷带を巻く", correct: false, exp: "止血後に絆創膏や包帯を使います。まず圧迫止血が重要です。" }
      ]
    },
    {
      q: "骨折が疑われるとき、最初の応急処置は？",
      options: [
        { text: "①動かさず、患部を固定する", correct: true, exp: "骨折時は患部の固定が最優先です。新聞紙や枕で患部を動かないように支えます。" },
        { text: "②患者に動いてもらう（痛みが和らぐか確認）", correct: false, exp: "動かすと骨折が悪化します。固定が最優先です。" },
        { text: "③患部をマッサージする", correct: false, exp: "マッサージは骨折を悪化させます。固定が重要です。" }
      ]
    },
    {
      q: "火傷を負いました。何度まで冷やすのが正解？",
      options: [
        { text: "①20～30度（流水冷却）", correct: true, exp: "流水で15～30分冷やすのが標準です。冷たすぎず、流水で継続的に冷却します。" },
        { text: "②0度以下（氷水に浸す）", correct: false, exp: "氷水は凍傷を起こします。流水冷却が適切です。" },
        { text: "③冷やさずすぐに薬を塗る", correct: false, exp: "冷却してから薬を塗きます。まず冷やすことが重要です。" }
      ]
    },
    {
      q: "地震後、ガス漏れの臭いがしました。最初の対応は？",
      options: [
        { text: "①窓を全部開けて換気し、火をつけない", correct: true, exp: "ガス漏れは換気が最優先。火気厳禁です。電気スイッチも触らないようにします。" },
        { text: "②懐中電灯をつけて臭いの出所を探す", correct: false, exp: "電気スイッチも危険です。換気と火気厳禁が最優先。" },
        { text: "③すぐにガスの栓を閉める", correct: false, exp: "火気の方が優先です。火をつけずに換気してからガス栓を確認します。" }
      ]
    },
    {
      q: "AED（自動体外式除細動器）を使う前に必ず確認することは？",
      options: [
        { text: "①患者の反応と呼吸を確認する", correct: true, exp: "反応がなく呼吸がない場合にAED使用を検討します。応答と呼吸確認が最初です。" },
        { text: "②AEDの機械が動くか確認する", correct: false, exp: "患者の状態確認が先です。AED自体は動作確認済みです。" },
        { text: "③周囲に人がいるか確認する", correct: false, exp: "安全確認も大事ですが、患者の反応確認が最優先です。" }
      ]
    },
    {
      q: "災害時、感染を防ぐため、創傷処置前に何をする？",
      options: [
        { text: "①手を清潔な水や消毒液で洗う", correct: true, exp: "処置前の手洗いが最重要です。感染予防の基本は手衛生です。" },
        { text: "②患者に何か飲ませる", correct: false, exp: "飲食は止血後です。まず手を清潔にして感染予防に努めます。" },
        { text: "③すぐに包帯を巻く", correct: false, exp: "手洗い後に処置します。まず手を清潔にすることが重要です。" }
      ]
    },
    {
      q: "日中の炎天下で意識が朦朧とした人を見つけました。最初の対応は？",
      options: [
        { text: "①日中避ける場所に移し、身体を冷やす", correct: true, exp: "熱射病の初期対応は冷却です。涼しい場所に移して身体を冷やします。" },
        { text: "②温かい飲み物を飲ませる", correct: false, exp: "温かい飲み物は危険です。身体を冷やし、冷たい飲料を与えるのが正しい対応です。" },
        { text: "③無理に立たせて動かす", correct: false, exp: "患者は動かないようにします。涼しい場所で冷却が優先です。" }
      ]
    },
    {
      q: "地震直後、建物が揺れています。外が見える安全な場所と、トイレの中なら、どちらに向かう？",
      options: [
        { text: "①すぐに外に出る（安全が確認できれば）", correct: true, exp: "揺れが続く間は、まず安全な屋外に出るのが優先。倒壊リスクを回避します。" },
        { text: "②トイレに隠れる", correct: false, exp: "トイレは容器のため、むしろ危険です。安全な屋外に出るのが最優先。" },
        { text: "③その場で動かない", correct: false, exp: "揺れが続く間は、倒壊のリスクがあります。安全な場所への移動が必要です。" }
      ]
    },
    {
      q: "溺れている人を見つけました。直接助けに行く前に何をする？",
      options: [
        { text: "①周囲に助けを呼び、浮き物を近くに用意する", correct: true, exp: "無理な救助は自分も危険です。まず助けを呼び、溺者を浮かせる道具を準備します。" },
        { text: "②すぐに飛び込んで助けに行く", correct: false, exp: "溺者に引きずられる危険があります。必ず周囲に助けを呼んでから対応します。" },
        { text: "③岸から大声で励ます", correct: false, exp: "励ましは無理です。具体的な救助準備（浮き物など）が必要です。" }
      ]
    }
  ];

  let currentQuestion = 0;
  let score = 0;
  let answered = false;

  // ── クイズ開始 ──
  function showQuestion() {
    const quiz = QUIZZES[currentQuestion];
    document.getElementById('questionNumber').textContent = `問題 ${currentQuestion + 1} / ${QUIZZES.length}`;
    document.getElementById('questionText').textContent = quiz.q;

    const optionsContainer = document.getElementById('optionsContainer');
    optionsContainer.innerHTML = '';

    quiz.options.forEach((option, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = option.text;
      btn.onclick = () => selectOption(i, option);
      optionsContainer.appendChild(btn);
    });

    document.getElementById('explanation').classList.remove('show');
    document.getElementById('explanation').textContent = '';
    document.getElementById('nextBtn').style.display = 'none';
    answered = false;
    updateScore();
  }

  function selectOption(index, option) {
    if (answered) return;
    answered = true;

    const buttons = document.querySelectorAll('.option-btn');
    buttons[index].classList.add('selected');

    if (option.correct) {
      score++;
      buttons[index].style.background = '#15803d';
      buttons[index].style.borderColor = '#15803d';
    } else {
      buttons[index].style.background = '#b91c1c';
      buttons[index].style.borderColor = '#b91c1c';
      // 正解を表示
      const quiz = QUIZZES[currentQuestion];
      const correctIndex = quiz.options.findIndex(o => o.correct);
      buttons[correctIndex].style.background = '#15803d';
      buttons[correctIndex].style.borderColor = '#15803d';
    }

    document.getElementById('explanation').textContent = option.exp;
    document.getElementById('explanation').classList.add('show');
    document.getElementById('nextBtn').style.display = 'block';
    updateScore();

    // ボタンをすべて無効化
    buttons.forEach(btn => btn.disabled = true);
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < QUIZZES.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function updateScore() {
    document.getElementById('scoreText').textContent = `${score} / ${currentQuestion + 1}`;
    const progress = (currentQuestion + 1) / QUIZZES.length * 100;
    document.getElementById('progressBar').style.width = progress + '%';
  }

  function showResult() {
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('scoreCard').style.display = 'none';

    const percentage = Math.round(score / QUIZZES.length * 100);
    const resultClass = percentage >= 70 ? 'ok' : percentage >= 50 ? 'warn' : 'ng';
    const resultCard = document.getElementById('result');
    resultCard.className = 'result-card ' + resultClass;
    resultCard.style.display = '';

    document.getElementById('finalScore').textContent = `${score} / ${QUIZZES.length} (${percentage}%)`;

    let message = '';
    if (percentage >= 80) {
      message = '素晴らしい！防災知識をしっかり持っています。いざという時の冷静な判断に役立つでしょう。';
    } else if (percentage >= 60) {
      message = '良好です。基本的な応急処置知識がありますね。さらに学べば、いざという時に活躍できます。';
    } else if (percentage >= 40) {
      message = 'まだ改善の余地があります。もう一度やって知識を深めましょう。';
    } else {
      message = '防災知識を一から学び直すことをお勧めします。家族と一緒に学びましょう。';
    }

    document.getElementById('finalMessage').textContent = message;

    // localStorage に保存
    const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
    history.push({
      date: new Date().toLocaleString('ja-JP'),
      score: score,
      total: QUIZZES.length,
      percentage: percentage
    });
    localStorage.setItem('quizHistory', JSON.stringify(history.slice(-10))); // 最新10件保存
  }

  function restart() {
    currentQuestion = 0;
    score = 0;
    answered = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('quizCard').style.display = '';
    document.getElementById('scoreCard').style.display = '';
    showQuestion();
  }

  // 初期化
  showQuestion();
  </script>
