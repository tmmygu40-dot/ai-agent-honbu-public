<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サバイバル節約クイズ｜値上げ時代を乗り切る節約術10問</title>
  <meta name="description" content="食費・光熱費・通信費の節約術を10問3択クイズで試せる無料ツールです。値上げラッシュの今、知っているとお得な節約知識をサクッと診断できます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .progress-bar {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
      margin-bottom: 1.2rem;
    }
    .progress-fill {
      height: 100%; background: var(--accent); transition: width 0.3s;
    }

    .question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; color: var(--text);
    }

    .choice {
      display: block; width: 100%;
      padding: 0.9rem 1rem; margin-bottom: 0.6rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .choice.disabled { cursor: default; opacity: 0.85; }
    .choice.disabled:hover { border-color: var(--border); background: var(--bg); }
    .choice.disabled.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); opacity: 1; }
    .choice.disabled.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); opacity: 1; }

    .explain {
      display: none;
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-left: 4px solid var(--accent);
      border-radius: 8px; font-size: 0.88rem; line-height: 1.55; color: var(--text);
    }
    .explain.show { display: block; }
    .explain-head { font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; font-size: 0.82rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.1rem; font-weight: 800; line-height: 1.4;
      margin-top: 0.3rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }
    .best-score {
      font-size: 0.82rem; color: var(--text-sub);
      margin-top: 0.8rem; padding-top: 0.7rem;
      border-top: 1px dashed var(--border);
    }

    .review-list { margin-top: 0.5rem; }
    .review-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.5;
    }
    .review-item:last-child { border-bottom: none; }
    .review-mark { font-weight: 700; margin-right: 0.4rem; }
    .review-mark.ok { color: var(--ok); }
    .review-mark.ng { color: var(--ng); }
    .review-q { color: var(--text); margin-bottom: 0.2rem; }
    .review-a { color: var(--text-sub); font-size: 0.82rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>サバイバル節約クイズ</h1>
    <p class="subtitle">値上げ時代を乗り切る節約術を10問3択でチェック ※2026年4月時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <div class="progress">
      <span id="prog-text">第1問 / 全10問</span>
      <span id="prog-score">正解 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
    <p class="question" id="q-text">—</p>
    <div id="choices"></div>
    <div class="explain" id="explain">
      <p class="explain-head">解説</p>
      <p id="explain-text"></p>
    </div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="next-btn" onclick="nextQuestion()" disabled>選択肢を選んでください</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの節約レベル</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best">—</p>
  </div>

  <!-- 振り返りカード -->
  <div class="card" id="review-card" style="display:none">
    <p class="card-title">問題の振り返り</p>
    <div class="review-list" id="review-list"></div>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc" id="retry-btn" onclick="restart()" style="display:none">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、経済産業省・資源エネルギー庁・総務省などの公開資料や、信頼できる節約情報を参考に作成しています。実際の節約効果は世帯状況により異なります。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 節約クイズ問題データ ──
  var QUESTIONS = [
    {
      q: '使っていない家電のコンセントを抜くと、年間でおよそいくら電気代が節約できる？',
      choices: ['約500円', '約2,000円', '約6,000円'],
      answer: 2,
      explain: '待機電力は家庭の電気使用量の約5%。年間約6,000円分の節約になります。テレビ・電子レンジ・温水洗浄便座は特に大きいです。'
    },
    {
      q: 'エアコン（冷房）の設定温度を1℃上げると、節約できる電気代の目安は？',
      choices: ['約3%', '約13%', '約30%'],
      answer: 1,
      explain: '冷房の設定温度を1℃上げる（暖房は1℃下げる）と、電気代が約13%節約できると環境省が示しています。28℃推奨はこの根拠です。'
    },
    {
      q: 'スーパーでの食費節約で最も効果が高いのは？',
      choices: ['毎日こまめに買う', '週1〜2回まとめ買い+献立決めてから', '特売品を見て決める'],
      answer: 1,
      explain: '献立を決めてから週1〜2回まとめ買いするのが食品ロス削減＆衝動買い防止に効果的。月の食費が1〜2割減ることも。'
    },
    {
      q: '大手キャリアから格安SIMに乗り換えると、月の通信費はおよそいくら下がる？',
      choices: ['約500円', '約3,000〜5,000円', '約100円'],
      answer: 1,
      explain: '大手キャリア平均8,000円→格安SIM平均3,000円。月3,000〜5,000円、年間で約4〜6万円の節約効果があります。'
    },
    {
      q: '冷蔵庫の節電で最も効果がある使い方は？',
      choices: ['詰め込み満タンにする', '7割程度に空けておく', '何度も開け閉めする'],
      answer: 1,
      explain: '冷蔵庫は中身が7割程度のときが最も省エネ。冷凍庫は逆に詰め込んだほうが省エネ（冷気が逃げにくい）です。'
    },
    {
      q: 'お風呂のガス代節約で正しいのは？',
      choices: ['追い焚きを何度もする', '家族が続けて入る', 'シャワーで済ませる'],
      answer: 1,
      explain: '追い焚き1回で約20円。家族が間隔を空けず続けて入るのが最も節約。お湯張りは200L→160L程度に減らすのも効果的です。'
    },
    {
      q: '使っていないサブスクを見直すと、平均どれくらい節約できる？',
      choices: ['月数百円程度', '月2,000〜5,000円', 'ほぼ変わらない'],
      answer: 1,
      explain: '日本人は平均5〜7個のサブスクに加入しており、未使用が混ざる人は月2,000〜5,000円の節約余地があります。半年に1回見直しを。'
    },
    {
      q: '水道代を最も節約できる方法は？',
      choices: ['食器を流しっぱなしで洗う', 'シャワー時間を1分短くする', 'お風呂のお湯を毎日入れ替える'],
      answer: 1,
      explain: 'シャワー1分で約12L＝約3円。1日1分短縮で年間約1,000円。家族4人なら年間約4,000円の節約になります。'
    },
    {
      q: 'クレジットカードのポイント還元を最大化する基本は？',
      choices: ['カードを5枚以上持つ', 'メインカードを1〜2枚に絞る', 'リボ払いに設定する'],
      answer: 1,
      explain: 'ポイントは集約してこそ価値が出ます。メイン1〜2枚に絞り還元率1%以上のカードを使うのが鉄則。リボ払いは絶対NGです。'
    },
    {
      q: '電気・ガス代の値上げ時代に、固定費見直しの最大効果が出るのは？',
      choices: ['電力会社の料金プラン見直し', '電球をこまめに消す', 'コタツを使わない'],
      answer: 0,
      explain: '電力自由化で料金プランは選べます。基本料金や時間帯別プランの見直しで年間1〜3万円の節約も。比較サイトで30秒で確認できます。'
    }
  ];

  var STORAGE_KEY = 'survival_savings_quiz_best_score';
  var current = 0;
  var score = 0;
  var answers = []; // { qIndex, selected, isCorrect }
  var locked = false;

  function showQuestion() {
    locked = false;
    var q = QUESTIONS[current];
    document.getElementById('prog-text').textContent = '第' + (current + 1) + '問 / 全' + QUESTIONS.length + '問';
    document.getElementById('prog-score').textContent = '正解 ' + score;
    document.getElementById('prog-fill').style.width = ((current) / QUESTIONS.length * 100) + '%';
    document.getElementById('q-text').textContent = q.q;

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice';
      btn.type = 'button';
      btn.textContent = (i + 1) + '. ' + c;
      btn.onclick = function() { selectChoice(i, btn); };
      choicesEl.appendChild(btn);
    });

    document.getElementById('explain').classList.remove('show');
    var nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = true;
    nextBtn.textContent = '選択肢を選んでください';
  }

  function selectChoice(i, btn) {
    if (locked) return;
    locked = true;
    var q = QUESTIONS[current];
    var isCorrect = (i === q.answer);
    if (isCorrect) score++;
    answers.push({ qIndex: current, selected: i, isCorrect: isCorrect });

    var allBtns = document.querySelectorAll('#choices .choice');
    allBtns.forEach(function(b, idx) {
      b.classList.add('disabled');
      if (idx === q.answer) b.classList.add('correct');
      else if (idx === i) b.classList.add('wrong');
    });

    document.getElementById('explain-text').textContent = q.explain;
    document.getElementById('explain').classList.add('show');
    document.getElementById('prog-score').textContent = '正解 ' + score;

    var nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = false;
    nextBtn.textContent = (current + 1 >= QUESTIONS.length) ? '結果を見る' : '次の問題へ →';
  }

  function nextQuestion() {
    if (current + 1 >= QUESTIONS.length) {
      showResult();
      return;
    }
    current++;
    showQuestion();
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    var level, eval_, note;
    if (score >= 9) {
      level = 'ok';
      eval_ = '節約マスター級！';
      note = '値上げの波もこの知識でラクラク乗り切れます。家族や友人にも教えてあげると喜ばれます。';
    } else if (score >= 6) {
      level = 'warn';
      eval_ = '節約中級者';
      note = '基本はバッチリ。間違えた問題の解説を読み直して、月数千円の上積みを狙いましょう。';
    } else {
      level = 'ng';
      eval_ = '節約見直しチャンス！';
      note = 'まだ伸びしろたっぷり。下の解説を読むだけで、年間で数万円の差が生まれます。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / 10 問正解';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    // localStorage best score
    var best = 0;
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved !== null) best = parseInt(saved, 10) || 0;
      if (score > best) {
        localStorage.setItem(STORAGE_KEY, String(score));
        best = score;
      }
    } catch (e) {}
    document.getElementById('best').textContent = '🏆 ベストスコア：' + best + ' / 10';

    // Review list
    var reviewEl = document.getElementById('review-list');
    reviewEl.innerHTML = answers.map(function(a) {
      var q = QUESTIONS[a.qIndex];
      var mark = a.isCorrect ? '<span class="review-mark ok">○</span>' : '<span class="review-mark ng">×</span>';
      return '<div class="review-item">'
        + '<p class="review-q">' + mark + ' Q' + (a.qIndex + 1) + '. ' + q.q + '</p>'
        + '<p class="review-a">正解：' + q.choices[q.answer] + ' ／ ' + q.explain + '</p>'
        + '</div>';
    }).join('');
    document.getElementById('review-card').style.display = '';
    document.getElementById('retry-btn').style.display = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restart() {
    current = 0;
    score = 0;
    answers = [];
    locked = false;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('next-btn').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('review-card').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  showQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
