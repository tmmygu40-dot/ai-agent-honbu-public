<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="本のあらすじと感想を入力すると、読書記録用のレビュー文を自動生成します。5段階評価で分かりやすく、過去のレビューも保存できます。">
  <title>📚 ブックレビュー作成アシスタント</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- 計測タグ -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📚 ブックレビュー作成アシスタント</h1>
    <p class="subtitle">本のあらすじ・感想・評価を入れるだけで、レビュー文を自動生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">本の情報を入力</p>
    <div class="field">
      <label for="title">本のタイトル</label>
      <input type="text" id="title" placeholder="例: 1Q84">
      <p class="hint">（省略可能）</p>
    </div>
    <div class="field">
      <label for="summary">あらすじ・内容</label>
      <textarea id="summary" placeholder="本の簡潔なあらすじや内容を50字程度で入力" style="width:100%; min-height:70px; padding:0.72rem 0.9rem; font-size:1rem; border:1.5px solid var(--border); border-radius:9px; background:var(--bg); color:var(--text); outline:none; font-family:inherit; resize:vertical;"></textarea>
    </div>
    <div class="field">
      <label for="feeling">感想</label>
      <textarea id="feeling" placeholder="読んで感じたことや心に残ったことを入力" style="width:100%; min-height:70px; padding:0.72rem 0.9rem; font-size:1rem; border:1.5px solid var(--border); border-radius:9px; background:var(--bg); color:var(--text); outline:none; font-family:inherit; resize:vertical;"></textarea>
    </div>
    <div class="field">
      <label for="rating">評価</label>
      <select id="rating" style="width:100%; padding:0.72rem 0.9rem; font-size:1rem; border:1.5px solid var(--border); border-radius:9px; background:var(--bg); color:var(--text);">
        <option value="">-- 選択してください --</option>
        <option value="⭐">⭐ 1つ星</option>
        <option value="⭐⭐">⭐⭐ 2つ星</option>
        <option value="⭐⭐⭐">⭐⭐⭐ 3つ星</option>
        <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ 4つ星</option>
        <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ 5つ星</option>
      </select>
    </div>
  </div>

  <!-- レビュー生成ボタン -->
  <button class="btn-calc" onclick="generateReview()">📖 レビューを生成する</button>

  <!-- レビュー結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたレビュー</p>
    <p class="result-value" id="rv" style="font-size:1rem; margin:0; white-space:pre-wrap; word-wrap:break-word; text-align:left;"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 過去のレビュー履歴 -->
  <div class="card" id="history" style="display:none">
    <p class="card-title">過去のレビュー</p>
    <div id="history-list" style="max-height:300px; overflow-y:auto;"></div>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは読書記録をシンプルに、楽しく作成するための個人用アシスタントです。生成されたレビューはブラウザのみに保存され、サーバーには送信されません。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（将来差し替え予定。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ローカルストレージキー ──
  var STORAGE_KEY = 'bookReviews';

  // ── レビュー生成 ──
  function generateReview() {
    var title = document.getElementById('title').value.trim();
    var summary = document.getElementById('summary').value.trim();
    var feeling = document.getElementById('feeling').value.trim();
    var rating = document.getElementById('rating').value.trim();

    if (!summary || !feeling || !rating) {
      showErr('あらすじ、感想、評価はすべて入力してください');
      return;
    }

    // レビュー生成ロジック（テンプレート組み合わせ）
    var ratingText = rating.split(' ')[0]; // ⭐⭐⭐ など
    var reviewText = '';

    if (title) {
      reviewText = '『' + title + '』：';
    }
    reviewText += ratingText + ' この本は、「' + feeling + '」という感想を持ちました。あらすじは「' + summary + '」です。読書体験として、とても貴重でした。';

    // 結果を表示
    var reviewObj = {
      title: title,
      summary: summary,
      feeling: feeling,
      rating: rating,
      review: reviewText,
      date: new Date().toLocaleDateString('ja-JP')
    };

    showReviewResult(reviewText);
    saveReview(reviewObj);
    showHistory();
  }

  function showReviewResult(reviewText) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = reviewText;
    document.getElementById('rn').textContent = '✨ レビューが生成されました';
  }

  function saveReview(reviewObj) {
    var reviews = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    reviews.unshift(reviewObj); // 最新を先頭に
    if (reviews.length > 20) reviews = reviews.slice(0, 20); // 最新20件まで保持
    localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
  }

  function showHistory() {
    var reviews = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (reviews.length === 0) {
      document.getElementById('history').style.display = 'none';
      return;
    }

    var html = reviews.map(function(r, i) {
      return '<div style="padding:0.8rem; border-bottom:1px solid var(--border); font-size:0.88rem;">' +
             '<strong>' + (r.title || '（タイトルなし）') + '</strong> ' + r.rating.split(' ')[0] + '<br>' +
             '<span style="color:var(--text-sub);">' + r.date + '</span>' +
             '</div>';
    }).join('');

    document.getElementById('history-list').innerHTML = html;
    document.getElementById('history').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
  }

  // ページ読み込み時に履歴を表示
  window.addEventListener('load', function() {
    showHistory();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
