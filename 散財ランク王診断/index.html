<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今月の散財額を入力するだけで、歴史上の浪費家に例えてランク判定。ユーモア格言で楽しく散財を振り返れる診断アプリです。">
  <title>散財ランク王診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 人物カード ── */
    .person-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .person-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .person-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); margin-bottom: 0.3rem; }
    .person-era { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .person-quote {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      line-height: 1.6; padding: 0.8rem; margin-bottom: 0.6rem;
      background: var(--accent-light); border-radius: 10px;
      border-left: 4px solid var(--accent);
    }
    .person-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 履歴カード ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.55rem 0.3rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); }
    .history-amount { font-weight: 600; }
    .history-rank { color: var(--accent); font-weight: 700; }
    .btn-clear-history {
      display: block; margin: 0.8rem auto 0; padding: 0.4rem 1rem;
      font-size: 0.78rem; background: none; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    }
    .btn-clear-history:hover { border-color: var(--ng); color: var(--ng); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .person-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>💸 散財ランク王診断</h1>
    <p class="subtitle">今月の散財額を入力するだけ。歴史上の浪費家に例えてあなたのランクを診断します。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">今月の散財額</p>
    <div class="field">
      <label for="amount">散財額（円）</label>
      <input type="number" id="amount" placeholder="例: 50000" min="0" inputmode="numeric">
      <p class="hint">趣味・衝動買い・贅沢など、今月使った「なくても困らなかったお金」を入力</p>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの散財ランク</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 人物カード -->
  <div class="person-card" id="person">
    <p class="person-emoji" id="pe"></p>
    <p class="person-name" id="pn"></p>
    <p class="person-era" id="pera"></p>
    <div class="person-quote" id="pq"></div>
    <p class="person-desc" id="pd"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">散財レベル分析</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 履歴カード -->
  <div class="card no-print" id="history-card" style="display:none">
    <p class="card-title">診断履歴</p>
    <div id="history-list"></div>
    <button class="btn-clear-history" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは娯楽目的のジョーク診断です。歴史上の人物の散財額は諸説あり、あくまでユーモアとしてお楽しみください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var RANKS = [
    {
      min: 0, max: 999,
      rank: '倹約聖人', level: 'ok', emoji: '😇',
      name: '二宮金次郎',
      era: '江戸時代後期の農政家',
      quote: '「使わぬ金は未来への種まきである」…あなたは種まき名人です。',
      desc: '薪を背負いながら読書する姿で有名。極限の倹約で藩の財政を立て直した伝説の節約家。'
    },
    {
      min: 1000, max: 4999,
      rank: '堅実市民', level: 'ok', emoji: '🧐',
      name: 'ベンジャミン・フランクリン',
      era: 'アメリカ建国の父（1706-1790）',
      quote: '「1ペニーの節約は1ペニーの稼ぎ」…あなたはフランクリン級の堅実さ。',
      desc: '発明家・政治家でありながら超がつく倹約家。「時は金なり」の名言でもおなじみ。'
    },
    {
      min: 5000, max: 9999,
      rank: 'プチ贅沢貴族', level: 'ok', emoji: '🍷',
      name: '徳川光圀（水戸黄門）',
      era: '江戸時代前期の大名（1628-1701）',
      quote: '「人生には適度な贅沢も必要じゃ」…ご老公もうなずく散財レベル。',
      desc: '全国漫遊はフィクションだが、ラーメンや餃子を日本で初めて食べたとされるグルメ大名。'
    },
    {
      min: 10000, max: 29999,
      rank: '散財見習い', level: 'warn', emoji: '💰',
      name: '織田信長',
      era: '戦国時代の天下人（1534-1582）',
      quote: '「であるか。まあ良い、金は天下の回りものよ」…信長級の豪快さです。',
      desc: '茶器に数千万円相当をポンと出し、南蛮渡来の珍品を片っ端から買い集めた戦国の散財王。'
    },
    {
      min: 30000, max: 49999,
      rank: '中堅浪費家', level: 'warn', emoji: '👑',
      name: '豊臣秀吉',
      era: '安土桃山時代の天下人（1537-1598）',
      quote: '「黄金の茶室でお茶しない？」…秀吉もびっくりの散財っぷり。',
      desc: '黄金の茶室、醍醐の花見など超ド派手。天下統一後の散財スケールは日本史トップクラス。'
    },
    {
      min: 50000, max: 99999,
      rank: '浪費マスター', level: 'warn', emoji: '💎',
      name: 'マリー・アントワネット',
      era: 'フランス王妃（1755-1793）',
      quote: '「お金がないならカードで買えばいいじゃない」…王妃級の散財力です。',
      desc: '「パンがなければケーキを」は実は別人の言葉。でもドレス・宝石への散財は本物。年間衣装代は現代の数億円相当。'
    },
    {
      min: 100000, max: 299999,
      rank: '散財キング', level: 'ng', emoji: '🏰',
      name: 'ルイ14世（太陽王）',
      era: 'フランス国王（1638-1715）',
      quote: '「ヴェルサイユ宮殿？あれは週末の別荘じゃよ」…太陽王レベルの散財です。',
      desc: 'ヴェルサイユ宮殿の建設費は現代換算で数兆円。72年間王位に就き、国庫を空にした浪費の帝王。'
    },
    {
      min: 300000, max: 999999,
      rank: '散財エンペラー', level: 'ng', emoji: '⚡',
      name: 'ネロ（ローマ皇帝）',
      era: '古代ローマ帝国（37-68）',
      quote: '「燃やして作り直せばいいのだ」…ネロ級の破壊的散財力。',
      desc: 'ローマ大火の後に黄金宮殿を建設。宴会では天井からバラの花びらと香水を降らせた伝説の浪費帝。'
    },
    {
      min: 1000000, max: Infinity,
      rank: '散財神', level: 'ng', emoji: '🌟',
      name: 'マンサ・ムーサ（マリ帝国皇帝）',
      era: '西アフリカ・マリ帝国（1280頃-1337頃）',
      quote: '「金をばらまきすぎて経済を壊しちゃった、てへ」…人類史上最強の散財王です。',
      desc: 'メッカ巡礼で金を配りまくり、エジプトの金相場を10年間暴落させた史上最も裕福な人物。資産は現代換算で約50兆円。'
    }
  ];

  function diagnose() {
    var amount = parseInt(document.getElementById('amount').value);
    if (isNaN(amount) || amount < 0) {
      showErr('金額を正しく入力してください');
      return;
    }

    var rank = RANKS.find(function(r) { return amount >= r.min && amount <= r.max; });
    if (!rank) rank = RANKS[RANKS.length - 1];

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + rank.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rank.rank;
    document.getElementById('rn').textContent = '散財額 ' + fmt(amount) + ' 円';

    // 人物カード表示
    var pc = document.getElementById('person');
    pc.style.display = 'block';
    pc.style.borderColor = rank.level === 'ok' ? 'var(--ok)' : rank.level === 'warn' ? 'var(--warn)' : 'var(--ng)';
    document.getElementById('pe').textContent = rank.emoji;
    document.getElementById('pn').textContent = rank.name;
    document.getElementById('pera').textContent = rank.era;
    document.getElementById('pq').textContent = rank.quote;
    document.getElementById('pd').textContent = rank.desc;

    // 内訳カード
    var daily = Math.round(amount / 30);
    var hourly = Math.round(amount / 720);
    showDetail([
      ['今月の散財額', fmt(amount) + ' 円', true],
      ['1日あたり', fmt(daily) + ' 円'],
      ['1時間あたり', fmt(hourly) + ' 円'],
      ['散財ランク', rank.rank]
    ]);

    // 履歴保存
    saveHistory(amount, rank.rank);
    renderHistory();
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('person').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'zanzai_rank_history';

  function saveHistory(amount, rank) {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    history.unshift({
      date: new Date().toLocaleDateString('ja-JP'),
      amount: amount,
      rank: rank
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    var card = document.getElementById('history-card');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('history-list').innerHTML = history.map(function(h) {
      return '<div class="history-item">'
           + '<span class="history-date">' + h.date + '</span>'
           + '<span class="history-amount">' + fmt(h.amount) + ' 円</span>'
           + '<span class="history-rank">' + h.rank + '</span>'
           + '</div>';
    }).join('');
  }

  function clearHistory() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('history-card').style.display = 'none';
  }

  // 初期表示時に履歴があれば表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
