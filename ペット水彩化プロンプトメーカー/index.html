<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="愛犬・愛猫の種類や毛色・表情・ポーズを選ぶだけで、ジブリ風水彩タッチのAI画像生成プロンプトを日本語と英語で即作成。Stable DiffusionやMidjourneyにそのまま使えます。">
  <title>ペット水彩化プロンプトメーカー｜ジブリ風AI画像プロンプト生成</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.5rem; text-align: center; }
    .prompt-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 0.7rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .btn-copy {
      display: inline-block;
      padding: 0.55rem 1.1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: var(--ok); }
    .copy-row { text-align: center; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎨 ペット水彩化プロンプトメーカー</h1>
    <p class="subtitle">愛犬・愛猫の特徴を選ぶだけ。ジブリ風水彩のAI画像プロンプトを日本語と英語で即生成</p>
  </header>

  <div class="card">
    <p class="card-title">ペットの特徴を選ぶ</p>
    <div class="field">
      <label for="petType">ペットの種類</label>
      <select id="petType">
        <option value="cat">猫</option>
        <option value="dog">犬（小型）</option>
        <option value="dog_med">犬（中型）</option>
        <option value="dog_large">犬（大型）</option>
        <option value="rabbit">うさぎ</option>
        <option value="hamster">ハムスター</option>
        <option value="bird">小鳥</option>
      </select>
    </div>
    <div class="field">
      <label for="furColor">毛色</label>
      <select id="furColor">
        <option value="white">白</option>
        <option value="black">黒</option>
        <option value="brown">茶色</option>
        <option value="cream">クリーム</option>
        <option value="gray">グレー</option>
        <option value="orange">オレンジ</option>
        <option value="calico">三毛</option>
        <option value="tricolor">三色</option>
      </select>
    </div>
    <div class="field">
      <label for="pattern">模様</label>
      <select id="pattern">
        <option value="plain">無地</option>
        <option value="tabby">縞模様（しま）</option>
        <option value="spotted">水玉模様（ぶち）</option>
        <option value="bicolor">二色（はちわれ等）</option>
        <option value="socks">手足だけ白（ソックス）</option>
      </select>
    </div>
    <div class="field">
      <label for="eyeColor">目の色</label>
      <select id="eyeColor">
        <option value="black">黒</option>
        <option value="brown">茶色</option>
        <option value="amber">琥珀色</option>
        <option value="green">緑</option>
        <option value="blue">青</option>
        <option value="gold">金色</option>
        <option value="odd">オッドアイ</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="gentle">優しい・穏やか</option>
        <option value="curious">好奇心いっぱい</option>
        <option value="sleepy">眠たげ</option>
        <option value="happy">うれしそう</option>
        <option value="proud">堂々</option>
        <option value="shy">恥ずかしげ</option>
      </select>
    </div>
    <div class="field">
      <label for="pose">ポーズ</label>
      <select id="pose">
        <option value="sitting">お座り</option>
        <option value="lying">横になっている</option>
        <option value="curled">丸まっている</option>
        <option value="walking">歩いている</option>
        <option value="standing">立っている</option>
        <option value="looking">こちらを見ている</option>
        <option value="playing">遊んでいる</option>
      </select>
    </div>
    <div class="field">
      <label for="bg">背景</label>
      <select id="bg">
        <option value="window">陽だまりの窓辺</option>
        <option value="garden">花咲く庭</option>
        <option value="forest">緑の森</option>
        <option value="meadow">そよ風の草原</option>
        <option value="room">ぬくもりのある部屋</option>
        <option value="seaside">穏やかな海辺</option>
        <option value="cherry">桜の木の下</option>
        <option value="autumn">紅葉の小道</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">プロンプトを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">日本語プロンプト</p>
    <div class="prompt-box" id="jpPrompt">—</div>
    <div class="copy-row">
      <button class="btn-copy" id="btnCopyJp" onclick="copyText('jpPrompt', 'btnCopyJp')">📋 コピー</button>
    </div>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">英語プロンプト（Stable Diffusion / Midjourney 用）</p>
    <div class="prompt-box" id="enPrompt">—</div>
    <div class="copy-row">
      <button class="btn-copy" id="btnCopyEn" onclick="copyText('enPrompt', 'btnCopyEn')">📋 コピー</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎨 生成されたプロンプトは Stable Diffusion / Midjourney / DALL-E などの画像生成AIで利用できます。出力結果は参考用です。各サービスの利用規約に従ってご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'pet-watercolor-prompt-last';

  var JP = {
    petType: { cat:'猫', dog:'小型犬', dog_med:'中型犬', dog_large:'大型犬', rabbit:'うさぎ', hamster:'ハムスター', bird:'小鳥' },
    furColor: { white:'白', black:'黒', brown:'茶色', cream:'クリーム色', gray:'グレー', orange:'オレンジ', calico:'三毛', tricolor:'三色' },
    pattern: { plain:'', tabby:'縞模様の', spotted:'ぶち模様の', bicolor:'二色の', socks:'手足が白い' },
    eyeColor: { black:'黒い', brown:'茶色の', amber:'琥珀色の', green:'緑の', blue:'青い', gold:'金色の', odd:'オッドアイの' },
    expression: { gentle:'優しく穏やかな表情', curious:'好奇心いっぱいの表情', sleepy:'眠たげな表情', happy:'うれしそうな表情', proud:'堂々とした表情', shy:'少し恥ずかしげな表情' },
    pose: { sitting:'静かにお座りしている', lying:'横になってくつろいでいる', curled:'丸まって眠っている', walking:'ゆっくり歩いている', standing:'四つ足で立っている', looking:'じっとこちらを見ている', playing:'楽しそうに遊んでいる' },
    bg: { window:'陽だまりの窓辺', garden:'花咲く庭', forest:'静かな緑の森', meadow:'そよ風の吹く草原', room:'ぬくもりのある部屋', seaside:'穏やかな海辺', cherry:'桜の木の下', autumn:'紅葉の小道' }
  };

  var EN = {
    petType: { cat:'cat', dog:'small dog', dog_med:'medium-sized dog', dog_large:'large dog', rabbit:'rabbit', hamster:'hamster', bird:'small bird' },
    furColor: { white:'white', black:'black', brown:'brown', cream:'cream-colored', gray:'gray', orange:'orange', calico:'calico', tricolor:'tricolor' },
    pattern: { plain:'', tabby:'tabby-striped', spotted:'spotted', bicolor:'bicolor', socks:'with white socks' },
    eyeColor: { black:'black', brown:'brown', amber:'amber', green:'green', blue:'blue', gold:'golden', odd:'heterochromia' },
    expression: { gentle:'gentle and serene expression', curious:'curious expression', sleepy:'sleepy expression', happy:'happy expression', proud:'proud expression', shy:'slightly shy expression' },
    pose: { sitting:'sitting calmly', lying:'lying down relaxed', curled:'curled up sleeping', walking:'walking slowly', standing:'standing on four legs', looking:'looking directly at the viewer', playing:'playing joyfully' },
    bg: { window:'a sunlit window', garden:'a garden full of flowers', forest:'a quiet green forest', meadow:'a breezy meadow', room:'a cozy warm room', seaside:'a calm seaside', cherry:'under cherry blossom trees', autumn:'an autumn leaves path' }
  };

  function getVals() {
    return {
      petType: document.getElementById('petType').value,
      furColor: document.getElementById('furColor').value,
      pattern: document.getElementById('pattern').value,
      eyeColor: document.getElementById('eyeColor').value,
      expression: document.getElementById('expression').value,
      pose: document.getElementById('pose').value,
      bg: document.getElementById('bg').value
    };
  }

  function buildJp(v) {
    var pat = JP.pattern[v.pattern] ? JP.pattern[v.pattern] : '';
    var fur = JP.furColor[v.furColor];
    var animal = JP.petType[v.petType];
    var eye = JP.eyeColor[v.eyeColor];
    var subject = pat + fur + 'の' + animal + '、' + eye + '瞳、' + JP.expression[v.expression] + '。' + JP.pose[v.pose] + '姿。';
    var scene = '背景は' + JP.bg[v.bg] + '。';
    var style = 'スタジオジブリ風の柔らかな水彩画タッチ、繊細な筆致、淡い光と暖かな空気感、絵本のような優しい雰囲気、手描き感のある質感、絵の具のにじみ、高解像度、芸術的なディテール。';
    return subject + scene + style;
  }

  function buildEn(v) {
    var pat = EN.pattern[v.pattern] ? EN.pattern[v.pattern] + ' ' : '';
    var fur = EN.furColor[v.furColor];
    var animal = EN.petType[v.petType];
    var eye = EN.eyeColor[v.eyeColor];
    var subject = 'a ' + pat + fur + ' ' + animal + ', ' + eye + ' eyes, ' + EN.expression[v.expression] + ', ' + EN.pose[v.pose];
    var scene = ', set in ' + EN.bg[v.bg];
    var style = ', Studio Ghibli inspired soft watercolor style, delicate brush strokes, gentle light, warm atmosphere, storybook illustration, hand-painted texture, watercolor bleed, highly detailed, artistic, dreamy, masterpiece';
    return subject + scene + style;
  }

  function calc() {
    var v = getVals();
    var jp = buildJp(v);
    var en = buildEn(v);

    document.getElementById('jpPrompt').textContent = jp;
    document.getElementById('enPrompt').textContent = en;

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('detail').style.display = 'block';

    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch(e) {}

    resetCopyBtn('btnCopyJp');
    resetCopyBtn('btnCopyEn');
  }

  function copyText(targetId, btnId) {
    var text = document.getElementById(targetId).textContent;
    if (!text || text === '—') return;
    var btn = document.getElementById(btnId);
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました';
      setTimeout(function() { resetCopyBtn(btnId); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  function resetCopyBtn(btnId) {
    var btn = document.getElementById(btnId);
    if (!btn) return;
    btn.classList.remove('copied');
    btn.textContent = '📋 コピー';
  }

  // 復元
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var v = JSON.parse(saved);
      Object.keys(v).forEach(function(k) {
        var el = document.getElementById(k);
        if (el) el.value = v[k];
      });
    }
  } catch(e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
