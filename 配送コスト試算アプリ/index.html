<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配送コスト試算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>配送コスト試算</h1>
    <p class="subtitle">燃料費高騰による配送コスト増加と値上げ必要額を計算します</p>

    <section class="card">
      <h2>燃料費・基本コスト入力</h2>

      <div class="form-group">
        <label for="fuelBefore">現在の燃料費（円/月）</label>
        <input type="number" id="fuelBefore" placeholder="例：50000" min="0">
      </div>

      <div class="form-group">
        <label for="fuelAfter">値上がり後の燃料費（円/月）</label>
        <input type="number" id="fuelAfter" placeholder="例：65000" min="0">
      </div>

      <div class="form-group">
        <label for="baseDeliveryCost">月間基本配送コスト（円）</label>
        <input type="number" id="baseDeliveryCost" placeholder="例：200000" min="0">
        <small>燃料費を含む配送に関わる全コスト</small>
      </div>

      <div class="form-group">
        <label for="deliveryCount">月間配送件数（件）</label>
        <input type="number" id="deliveryCount" placeholder="例：100" min="1">
      </div>

      <div class="form-group">
        <label for="currentPrice">現在の配送単価（円/件）</label>
        <input type="number" id="currentPrice" placeholder="例：2000" min="0">
      </div>

      <div class="form-group">
        <label for="targetMargin">目標粗利率（%）</label>
        <input type="number" id="targetMargin" placeholder="例：20" min="0" max="100">
      </div>

      <button class="btn-calc" onclick="calculate()">計算する</button>
      <button class="btn-clear" onclick="clearInputs()">クリア</button>
    </section>

    <section class="card result-card" id="resultSection" style="display:none">
      <h2>試算結果</h2>

      <div class="result-row">
        <span class="result-label">燃料費増加額（月間）</span>
        <span class="result-value" id="fuelIncrease">―</span>
      </div>

      <div class="result-row">
        <span class="result-label">燃料費上昇率</span>
        <span class="result-value" id="fuelRate">―</span>
      </div>

      <div class="result-row highlight">
        <span class="result-label">配送コスト増加額（月間）</span>
        <span class="result-value" id="costIncrease">―</span>
      </div>

      <div class="result-row">
        <span class="result-label">1件あたりコスト増加</span>
        <span class="result-value" id="costPerUnit">―</span>
      </div>

      <div class="divider"></div>

      <div class="result-row highlight red">
        <span class="result-label">値上げ必要額（1件あたり）</span>
        <span class="result-value" id="priceIncrease">―</span>
      </div>

      <div class="result-row">
        <span class="result-label">推奨新単価</span>
        <span class="result-value" id="newPrice">―</span>
      </div>

      <div class="result-row">
        <span class="result-label">値上げ率</span>
        <span class="result-value" id="priceRate">―</span>
      </div>

      <div class="result-row">
        <span class="result-label">月間値上げ必要額（全件）</span>
        <span class="result-value" id="totalPriceIncrease">―</span>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
