<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="海外通販の商品価格・為替レート・関税率・海外送料を入力するだけで、日本円での総コストと内訳を即試算。個人輸入の実質負担額がすぐ分かる便利ツールです。">
  <title>海外通販コスト試算アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .inline-fields { display: flex; gap: 0.8rem; }
    .inline-fields .field { flex: 1; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>海外通販コスト試算アプリ</h1>
    <p class="subtitle">商品価格・為替・関税・送料から、日本円の総コストをサッと計算</p>
  </header>

  <!-- 入力カード：商品情報 -->
  <div class="card">
    <p class="card-title">商品情報</p>
    <div class="inline-fields">
      <div class="field" style="flex:2">
        <label for="price">商品価格（外貨）</label>
        <input type="number" id="price" placeholder="例: 49.99" step="0.01" min="0">
      </div>
      <div class="field" style="flex:1">
        <label for="currency">通貨</label>
        <select id="currency">
          <option value="USD" selected>USD（米ドル）</option>
          <option value="EUR">EUR（ユーロ）</option>
          <option value="GBP">GBP（英ポンド）</option>
          <option value="CNY">CNY（中国元）</option>
          <option value="KRW">KRW（韓国ウォン）</option>
          <option value="AUD">AUD（豪ドル）</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="quantity">個数</label>
      <input type="number" id="quantity" value="1" min="1" step="1">
    </div>
  </div>

  <!-- 入力カード：為替・コスト -->
  <div class="card">
    <p class="card-title">為替・コスト設定</p>
    <div class="field">
      <label for="rate">為替レート（1外貨 = ○円）</label>
      <input type="number" id="rate" placeholder="例: 155.50" step="0.01" min="0">
      <p class="hint">最新レートは銀行・為替サイトで確認してください</p>
    </div>
    <div class="field">
      <label for="shipping">海外送料（外貨）</label>
      <input type="number" id="shipping" placeholder="例: 15.00" step="0.01" min="0" value="0">
    </div>
    <div class="field">
      <label for="tariff">関税率（%）</label>
      <input type="number" id="tariff" placeholder="例: 10" step="0.1" min="0" value="0">
      <p class="hint">個人輸入の場合、課税対象額＝商品価格×60%が一般的です</p>
    </div>
    <div class="field">
      <label for="consumption_tax">消費税率（%）</label>
      <input type="number" id="consumption_tax" value="10" step="0.1" min="0">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">試算する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">円換算 総コスト</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、財務省・税関の個人輸入に関する公開情報を参考に、目安として使いやすく整理しています。実際の関税額は品目・原産国により異なります。最新情報は税関公式サイトをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var SAVE_KEY = 'overseas_shopping_cost_calc';

  function saveInputs() {
    var data = {
      price: document.getElementById('price').value,
      currency: document.getElementById('currency').value,
      quantity: document.getElementById('quantity').value,
      rate: document.getElementById('rate').value,
      shipping: document.getElementById('shipping').value,
      tariff: document.getElementById('tariff').value,
      consumption_tax: document.getElementById('consumption_tax').value
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadInputs() {
    try {
      var data = JSON.parse(localStorage.getItem(SAVE_KEY));
      if (!data) return;
      if (data.price) document.getElementById('price').value = data.price;
      if (data.currency) document.getElementById('currency').value = data.currency;
      if (data.quantity) document.getElementById('quantity').value = data.quantity;
      if (data.rate) document.getElementById('rate').value = data.rate;
      if (data.shipping) document.getElementById('shipping').value = data.shipping;
      if (data.tariff !== undefined) document.getElementById('tariff').value = data.tariff;
      if (data.consumption_tax !== undefined) document.getElementById('consumption_tax').value = data.consumption_tax;
    } catch(e) {}
  }

  function calc() {
    var price = parseFloat(document.getElementById('price').value);
    var qty = parseInt(document.getElementById('quantity').value) || 1;
    var rate = parseFloat(document.getElementById('rate').value);
    var shipping = parseFloat(document.getElementById('shipping').value) || 0;
    var tariffPct = parseFloat(document.getElementById('tariff').value) || 0;
    var taxPct = parseFloat(document.getElementById('consumption_tax').value) || 0;

    if (isNaN(price) || price <= 0) { showErr('商品価格を入力してください'); return; }
    if (isNaN(rate) || rate <= 0) { showErr('為替レートを入力してください'); return; }

    // 計算
    var subtotal = price * qty;                      // 商品小計（外貨）
    var totalForeign = subtotal + shipping;           // 外貨合計
    var yenSubtotal = Math.round(subtotal * rate);    // 商品円換算
    var yenShipping = Math.round(shipping * rate);    // 送料円換算

    // 個人輸入の課税対象額 = 商品価格 × 60%
    var taxableBase = Math.round(yenSubtotal * 0.6);
    var tariffAmount = Math.round(taxableBase * tariffPct / 100);

    // 消費税 = (課税対象額 + 関税) × 消費税率
    var consumptionTax = Math.round((taxableBase + tariffAmount) * taxPct / 100);

    var totalYen = yenSubtotal + yenShipping + tariffAmount + consumptionTax;

    // 商品価格に対する上乗せ率
    var markupPct = yenSubtotal > 0 ? ((totalYen - yenSubtotal) / yenSubtotal * 100).toFixed(1) : 0;

    var level = markupPct < 15 ? 'ok' : markupPct < 30 ? 'warn' : 'ng';
    var evalMsg = level === 'ok' ? '上乗せコストは控えめです'
                : level === 'warn' ? '送料・関税がやや重めです'
                : '上乗せコストが大きいです。国内購入と比較を';

    showResult(level, fmt(totalYen) + ' 円', evalMsg);
    document.getElementById('re').textContent = '商品価格比 +' + markupPct + '%';

    showDetail([
      ['商品価格（外貨）', fmt(subtotal) + ' ' + document.getElementById('currency').value],
      ['× 為替レート', '1 = ' + rate + ' 円'],
      ['商品円換算', fmt(yenSubtotal) + ' 円'],
      ['海外送料（円換算）', fmt(yenShipping) + ' 円'],
      ['課税対象額（商品×60%）', fmt(taxableBase) + ' 円'],
      ['関税（' + tariffPct + '%）', fmt(tariffAmount) + ' 円'],
      ['消費税（' + taxPct + '%）', fmt(consumptionTax) + ' 円'],
      ['総コスト', fmt(totalYen) + ' 円', true],
    ]);

    saveInputs();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('re').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 初期化
  loadInputs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
