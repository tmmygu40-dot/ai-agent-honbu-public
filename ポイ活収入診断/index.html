<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポイ活収入診断｜生活スタイル別ランキング＆月間収入目安</title>
  <meta name="description" content="5問の生活スタイル質問に答えるだけで、自分に向いているポイ活ジャンルをランキング表示し、月間ポイント収入の目安額が分かる無料診断ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; }

    .rank-list { text-align: left; margin-top: 1rem; }
    .rank-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      flex-shrink: 0;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 900;
      background: var(--accent); color: #fff;
      border-radius: 50%;
    }
    .rank-item.r2 .rank-num { background: #a3a3a3; }
    .rank-item.r3 .rank-num { background: #c08457; }
    .rank-name { flex: 1; font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .rank-amount { font-size: 0.95rem; font-weight: 800; color: var(--accent); white-space: nowrap; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ポイ活収入診断</h1>
    <p class="subtitle">5問で診断｜あなたに向いているポイ活ジャンルと月間ポイント収入目安（2026年4月時点の参考データ）</p>
  </header>

  <div class="card">
    <p class="card-title">5問の生活スタイル質問</p>

    <div class="field">
      <label for="q1">Q1. 1日のスマホ操作時間は？</label>
      <select id="q1">
        <option value="">選んでください</option>
        <option value="0">1時間未満</option>
        <option value="1">1〜3時間</option>
        <option value="2">3〜5時間</option>
        <option value="3">5時間以上</option>
      </select>
    </div>

    <div class="field">
      <label for="q2">Q2. 月の買い物頻度は？（コンビニ・スーパー・EC合計）</label>
      <select id="q2">
        <option value="">選んでください</option>
        <option value="0">月10回未満</option>
        <option value="1">月10〜30回</option>
        <option value="2">月30〜60回</option>
        <option value="3">月60回以上</option>
      </select>
    </div>

    <div class="field">
      <label for="q3">Q3. クレジットカードの利用頻度は？</label>
      <select id="q3">
        <option value="">選んでください</option>
        <option value="0">ほぼ使わない</option>
        <option value="1">たまに使う</option>
        <option value="2">よく使う</option>
        <option value="3">メインの決済手段</option>
      </select>
    </div>

    <div class="field">
      <label for="q4">Q4. すきま時間に軽作業に取り組める頻度は？</label>
      <select id="q4">
        <option value="">選んでください</option>
        <option value="0">ほぼ取れない</option>
        <option value="1">週1〜2回</option>
        <option value="2">ほぼ毎日少し</option>
        <option value="3">毎日30分以上</option>
      </select>
    </div>

    <div class="field">
      <label for="q5">Q5. 外出・お店訪問の頻度は？</label>
      <select id="q5">
        <option value="">選んでください</option>
        <option value="0">月数回</option>
        <option value="1">週1〜2回</option>
        <option value="2">ほぼ毎日</option>
        <option value="3">毎日複数店舗</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">月間ポイント収入目安（合計）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <div class="rank-list" id="rankList"></div>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">ジャンル別 月間目安額</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省統計局・各ポイ活サービスの公開情報・公開アンケート結果などを参考に、目安として使いやすく整理しています。実際の収入は利用サービス・案件・取り組み方で変動します。最新情報は各公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'poikatsu_income_diag_v1';

  var GENRES = [
    { name:'アンケート回答',           max:3000, w:{q1:0.4, q4:0.6} },
    { name:'買い物経由ポイント',       max:2000, w:{q2:1.0} },
    { name:'クレカ決済還元',           max:5000, w:{q3:0.6, q2:0.4} },
    { name:'ゲーム・動画視聴',         max:1500, w:{q1:0.6, q4:0.4} },
    { name:'モニター・覆面調査',       max:8000, w:{q5:0.7, q4:0.3} },
    { name:'ポイントサイトのミニタスク', max:1000, w:{q1:0.5, q4:0.5} }
  ];

  function loadAns() {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      ['q1','q2','q3','q4','q5'].forEach(function(k){
        if (data[k] !== undefined && data[k] !== null) {
          document.getElementById(k).value = data[k];
        }
      });
    } catch(e) {}
  }
  function saveAns(ans) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ans)); } catch(e) {}
  }

  function calc() {
    var ids = ['q1','q2','q3','q4','q5'];
    var ans = {};
    for (var i=0; i<ids.length; i++) {
      var v = document.getElementById(ids[i]).value;
      if (v === '') { showErr('すべての質問に答えてください'); return; }
      ans[ids[i]] = parseInt(v, 10);
    }
    saveAns(ans);

    var rows = GENRES.map(function(g){
      var raw = 0;
      for (var k in g.w) { raw += ans[k] * g.w[k]; }
      var amount = Math.round(g.max * (raw / 3) / 100) * 100;
      return { name:g.name, amount:amount };
    });

    var ranked = rows.slice().sort(function(a,b){ return b.amount - a.amount; });
    var top3 = ranked.slice(0, 3);
    var total = rows.reduce(function(s,r){ return s + r.amount; }, 0);

    var level = total >= 8000 ? 'ok' : total >= 3000 ? 'warn' : 'ng';
    var msg = level === 'ok'   ? 'ポイ活で月の小遣いをしっかり稼げるタイプ。上位3ジャンルから始めるのが効率的です。'
            : level === 'warn' ? '無理のない範囲でコツコツ型。生活動線に組み込みやすいジャンルから始めましょう。'
            :                    '今の生活スタイルだと収入は控えめ。スマホ・買い物頻度が増えると伸びしろあり。';

    showResult(level, fmt(total) + ' 円／月', msg);
    renderRank(top3);
    showDetail(rows);
  }

  function renderRank(top3) {
    var html = '<p style="font-size:0.82rem;font-weight:700;color:var(--text-sub);margin:0.6rem 0 0.4rem;">🏆 あなたに向いているポイ活 TOP3</p>';
    html += top3.map(function(r, i){
      return '<div class="rank-item r' + (i+1) + '">'
           + '<div class="rank-num">' + (i+1) + '</div>'
           + '<div class="rank-name">' + r.name + '</div>'
           + '<div class="rank-amount">月 ' + fmt(r.amount) + ' 円</div>'
           + '</div>';
    }).join('');
    document.getElementById('rankList').innerHTML = html;
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    var html = rows.map(function(r){
      return '<tr><td>' + r.name + '</td><td>月 ' + fmt(r.amount) + ' 円</td></tr>';
    }).join('');
    var total = rows.reduce(function(s,r){ return s + r.amount; }, 0);
    html += '<tr class="hl"><td>合計目安</td><td>月 ' + fmt(total) + ' 円</td></tr>';
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('rankList').innerHTML = '';
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  loadAns();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
