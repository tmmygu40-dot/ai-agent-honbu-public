<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ出品タイトル爆速ジェネレーター｜売れる商品名を3パターン即生成</title>
  <meta name="description" content="商品カテゴリ・状態・特徴ワードを入れるだけで、メルカリで売れやすい商品タイトルと一言説明を3パターン同時に生成できる無料ツールです。40字制限の文字数カウント・ワンタップコピーつきで出品作業を時短できます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 生成結果カード ── */
    .gen-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem;
      max-width: 600px;
    }
    .gen-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      color: #fff; background: var(--accent);
      padding: 0.2rem 0.6rem; border-radius: 999px;
      margin-bottom: 0.7rem; letter-spacing: 0.04em;
    }
    .gen-label.b { background: #2563eb; }
    .gen-label.c { background: #6b7280; }
    .gen-title-text {
      font-size: 1.02rem; font-weight: 700;
      line-height: 1.4; margin-bottom: 0.4rem;
      padding: 0.6rem 0.7rem;
      background: var(--accent-light);
      border-radius: 8px;
      word-break: break-all;
    }
    .gen-count { font-size: 0.74rem; color: var(--text-sub); margin-bottom: 0.7rem; }
    .gen-count.over { color: var(--ng); font-weight: 700; }
    .gen-desc-text {
      font-size: 0.92rem; line-height: 1.55;
      padding: 0.6rem 0.7rem;
      background: #fafaf7;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.7rem;
      white-space: pre-wrap;
    }
    .gen-btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .gen-btn {
      flex: 1 1 0; min-width: 130px;
      padding: 0.55rem 0.7rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .gen-btn:hover { border-color: var(--accent); color: var(--accent); }
    .gen-btn.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }

    /* ── 履歴 ── */
    .hist-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.86rem; color: var(--text-sub); line-height: 1.5;
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-item .hist-date { font-size: 0.72rem; color: var(--text-sub); display: block; margin-bottom: 0.2rem; }
    .hist-clear {
      display: block; margin: 0.7rem 0 0 auto;
      font-size: 0.78rem; color: var(--text-sub);
      background: none; border: none; cursor: pointer;
      text-decoration: underline;
    }
    .hist-clear:hover { color: var(--ng); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .gen-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ出品タイトル爆速ジェネレーター</h1>
    <p class="subtitle">カテゴリ・状態・特徴ワードを選ぶだけで、売れやすいタイトル＋一言説明を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">出品情報を入力</p>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="レディース">レディース服</option>
        <option value="メンズ">メンズ服</option>
        <option value="本">本・雑誌</option>
        <option value="家電">家電・スマホ</option>
        <option value="ホビー">おもちゃ・ホビー</option>
        <option value="コスメ">コスメ・美容</option>
        <option value="インテリア">インテリア・生活雑貨</option>
        <option value="スポーツ">スポーツ・アウトドア</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="cond">商品の状態</label>
      <select id="cond">
        <option value="新品・未使用">新品・未使用</option>
        <option value="未使用に近い">未使用に近い</option>
        <option value="目立った傷や汚れなし">目立った傷や汚れなし</option>
        <option value="やや傷や汚れあり">やや傷や汚れあり</option>
        <option value="傷や汚れあり">傷や汚れあり</option>
      </select>
    </div>
    <div class="field">
      <label for="brand">ブランド・商品名（任意）</label>
      <input type="text" id="brand" placeholder="例: ユニクロ ヒートテック">
      <p class="hint">入力するとタイトル先頭に入ります</p>
    </div>
    <div class="field">
      <label for="kw">特徴ワード（カンマ区切り、任意）</label>
      <input type="text" id="kw" placeholder="例: 美品, Mサイズ, 黒, 送料込み">
      <p class="hint">複数入れると訴求が強くなります</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <!-- 生成結果（JSで挿入） -->
  <div id="results"></div>

  <!-- 履歴カード -->
  <div class="card" id="hist-card" style="display:none">
    <p class="card-title">直近の生成履歴</p>
    <div id="hist-list"></div>
    <button class="hist-clear" onclick="clearHistory()">履歴をすべて削除</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、メルカリで売れやすいとされる一般的なタイトル構成を参考に、テンプレートとして提示するものです。商品の表記ルール・禁止行為など最新の規約はメルカリ公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'mercari_title_gen_history_v1';
  var MAX_TITLE = 40; // メルカリのタイトル制限

  // カテゴリ別の追加ワード候補
  var CAT_WORDS = {
    'レディース':  ['人気', 'お洒落', 'きれいめ', '可愛い', '大人女子'],
    'メンズ':      ['人気', 'カジュアル', 'シンプル', 'ビジネス', 'きれいめ'],
    '本':          ['美品', '帯付き', '初版', '読み込みなし', 'まとめ売り可'],
    '家電':        ['動作確認済み', '箱付き', '付属品完備', '即日発送', '美品'],
    'ホビー':      ['未開封', 'コレクション品', '希少', '美品', '正規品'],
    'コスメ':      ['新品未開封', '残量多め', '人気色', '限定品', '正規品'],
    'インテリア':  ['北欧風', 'お洒落', 'ナチュラル', 'コンパクト', '美品'],
    'スポーツ':    ['美品', '使用回数少', '人気モデル', '送料込み', '即日発送'],
    'その他':      ['美品', '人気', 'お得', '送料込み', '即日発送']
  };

  var DESC_HEAD = {
    'レディース':  'ご覧いただきありがとうございます。',
    'メンズ':      'ご覧いただきありがとうございます。',
    '本':          'ご覧いただきありがとうございます。',
    '家電':        'ご覧いただきありがとうございます。動作確認済みです。',
    'ホビー':      'ご覧いただきありがとうございます。',
    'コスメ':      'ご覧いただきありがとうございます。',
    'インテリア':  'ご覧いただきありがとうございます。',
    'スポーツ':    'ご覧いただきありがとうございます。',
    'その他':      'ご覧いただきありがとうございます。'
  };

  function generate() {
    var cat   = document.getElementById('cat').value;
    var cond  = document.getElementById('cond').value;
    var brand = document.getElementById('brand').value.trim();
    var kwRaw = document.getElementById('kw').value.trim();

    var kws = kwRaw ? kwRaw.split(/[,、，]/).map(function(s){return s.trim();}).filter(Boolean) : [];
    var catWords = CAT_WORDS[cat] || CAT_WORDS['その他'];

    // 不足分はカテゴリ標準ワードで補完
    var allWords = kws.slice();
    for (var i=0; i<catWords.length && allWords.length < 5; i++) {
      if (allWords.indexOf(catWords[i]) === -1) allWords.push(catWords[i]);
    }

    var head = DESC_HEAD[cat] || DESC_HEAD['その他'];
    var condShort = cond.replace('・', '');

    // パターンA：王道型（ブランド + 商品 + 状態 + 特徴1）
    var titleA = buildTitleA(brand, cat, cond, allWords);
    var descA = head + '\n\n【状態】' + cond + '\n' +
                (allWords.length ? '【特徴】' + allWords.slice(0, 3).join('・') + '\n' : '') +
                '\n気になる点があればコメントよりお気軽にご質問ください。';

    // パターンB：訴求強め型
    var titleB = buildTitleB(brand, cat, cond, allWords);
    var descB = head + '\n\n★おすすめポイント★\n' +
                allWords.slice(0, 3).map(function(w){ return '◎ ' + w; }).join('\n') + '\n\n' +
                '【状態】' + cond + '\n' +
                '匿名配送・即日〜翌日発送可能です！\n気になる点はコメントください。';

    // パターンC：シンプル型
    var titleC = buildTitleC(brand, cat, cond, allWords);
    var descC = (brand ? brand + '\n' : '') +
                '状態：' + cond + '\n' +
                (allWords.length ? '特徴：' + allWords.slice(0, 2).join('・') + '\n' : '') +
                'よろしくお願いします。';

    var patterns = [
      { label: 'A 王道型', cls: '',  title: titleA, desc: descA },
      { label: 'B 訴求型', cls: 'b', title: titleB, desc: descB },
      { label: 'C シンプル', cls: 'c', title: titleC, desc: descC }
    ];

    renderResults(patterns);
    saveHistory({ cat: cat, brand: brand, kw: kwRaw, titleA: titleA });
    renderHistory();
  }

  function buildTitleA(brand, cat, cond, words) {
    var parts = [];
    if (brand) parts.push(brand);
    if (cat && !brand) parts.push(catLabel(cat));
    if (words[0]) parts.push(words[0]);
    parts.push(condShortLabel(cond));
    return trimTitle(parts.join(' '));
  }

  function buildTitleB(brand, cat, cond, words) {
    var deco = [];
    if (cond === '新品・未使用') deco.push('【新品未使用】');
    else if (cond === '未使用に近い') deco.push('【美品】');
    if (words.indexOf('送料込み') !== -1 || words.indexOf('送料無料') !== -1) deco.push('【送料無料】');
    var parts = [];
    parts.push(deco.join(''));
    if (brand) parts.push(brand);
    if (words[0]) parts.push(words[0]);
    if (words[1]) parts.push(words[1]);
    if (!brand && !words.length) parts.push(catLabel(cat));
    return trimTitle(parts.join(' ').replace(/^ +/, ''));
  }

  function buildTitleC(brand, cat, cond, words) {
    var parts = [];
    if (brand) parts.push(brand);
    else parts.push(catLabel(cat));
    if (words[0]) parts.push(words[0]);
    return trimTitle(parts.join(' '));
  }

  function catLabel(cat) {
    var map = {
      'レディース': 'レディース', 'メンズ': 'メンズ', '本': '書籍',
      '家電': '家電', 'ホビー': 'ホビー', 'コスメ': 'コスメ',
      'インテリア': 'インテリア', 'スポーツ': 'スポーツ', 'その他': '商品'
    };
    return map[cat] || '商品';
  }

  function condShortLabel(cond) {
    var map = {
      '新品・未使用': '新品未使用',
      '未使用に近い': '未使用に近い',
      '目立った傷や汚れなし': '美品',
      'やや傷や汚れあり': '使用感あり',
      '傷や汚れあり': '訳あり'
    };
    return map[cond] || cond;
  }

  function trimTitle(s) {
    s = s.replace(/\s+/g, ' ').trim();
    if (s.length <= MAX_TITLE) return s;
    return s.slice(0, MAX_TITLE);
  }

  function renderResults(patterns) {
    var html = patterns.map(function(p, idx) {
      var len = p.title.length;
      var over = len > MAX_TITLE;
      return '<div class="gen-card">' +
        '<span class="gen-label ' + p.cls + '">' + p.label + '</span>' +
        '<p class="gen-title-text" id="t-' + idx + '">' + escapeHtml(p.title) + '</p>' +
        '<p class="gen-count' + (over ? ' over' : '') + '">タイトル文字数：' + len + ' / ' + MAX_TITLE + ' 字' +
        (over ? '（超過）' : '') + '</p>' +
        '<p class="gen-desc-text" id="d-' + idx + '">' + escapeHtml(p.desc) + '</p>' +
        '<div class="gen-btn-row">' +
          '<button class="gen-btn" onclick="copyText(\'t-' + idx + '\', this)">📋 タイトルをコピー</button>' +
          '<button class="gen-btn" onclick="copyText(\'d-' + idx + '\', this)">📋 説明文をコピー</button>' +
        '</div>' +
      '</div>';
    }).join('');
    document.getElementById('results').innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function copyText(id, btn) {
    var el = document.getElementById(id);
    var txt = el.textContent;
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, function(){ fallbackCopy(txt, done); });
    } else {
      fallbackCopy(txt, done);
    }
  }

  function fallbackCopy(txt, cb) {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }

  // ── localStorage 履歴 ──
  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
  }
  function saveHistory(item) {
    var arr = loadHistory();
    item.date = new Date().toISOString();
    arr.unshift(item);
    arr = arr.slice(0, 5);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e) {}
  }
  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    renderHistory();
  }
  function renderHistory() {
    var arr = loadHistory();
    var card = document.getElementById('hist-card');
    if (!arr.length) { card.style.display = 'none'; return; }
    card.style.display = '';
    document.getElementById('hist-list').innerHTML = arr.map(function(it){
      var d = new Date(it.date);
      var ds = d.getMonth()+1 + '/' + d.getDate() + ' ' +
               String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      return '<div class="hist-item">' +
        '<span class="hist-date">' + ds + '</span>' +
        escapeHtml(it.titleA) +
      '</div>';
    }).join('');
  }
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
