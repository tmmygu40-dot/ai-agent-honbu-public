<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大人の語彙力判定クイズ｜四字熟語・慣用句10問で語彙力レベルを即診断</title>
  <meta name="description" content="四字熟語と慣用句の10問四択クイズに答えるだけで、あなたの語彙力レベルをS〜Eで即診断。社会人の教養チェックや会話・文章力アップの腕試しに使える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress-line { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.6rem; }
    .question-text { font-size: 1.15rem; font-weight: 800; line-height: 1.5; margin-bottom: 1.1rem; }
    .choice-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem; text-align: left;
      font-size: 0.98rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); }
    .choice-btn:active { background: var(--accent-light); }
    .choice-btn.correct { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
    .choice-btn.wrong { background: var(--ng-bg); border-color: var(--ng); color: var(--ng); }
    .choice-btn:disabled { cursor: default; opacity: 0.85; }

    .feedback-box {
      margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.92rem; line-height: 1.55;
      background: var(--accent-light); border: 1px solid var(--border);
      color: var(--text);
    }
    .feedback-box.ok { background: var(--ok-bg); border-color: var(--ok); }
    .feedback-box.ng { background: var(--ng-bg); border-color: var(--ng); }
    .feedback-box .fb-title { font-weight: 800; margin-bottom: 0.3rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .best-score {
      font-size: 0.82rem; color: var(--text-sub);
      margin-top: 0.8rem; padding-top: 0.6rem; border-top: 1px dashed var(--border);
    }

    .review-list { margin-top: 0.6rem; }
    .review-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); text-align: left; }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-size: 0.92rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; line-height: 1.4; }
    .review-q .mark-ok { color: var(--ok); }
    .review-q .mark-ng { color: var(--ng); }
    .review-a { font-size: 0.86rem; color: var(--text); margin-bottom: 0.2rem; }
    .review-exp { font-size: 0.84rem; color: var(--text-sub); line-height: 1.55; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>大人の語彙力判定クイズ</h1>
    <p class="subtitle">四字熟語5問＋慣用句5問の合計10問で、あなたの語彙力をS〜Eで即診断</p>
  </header>

  <!-- スタートカード -->
  <div class="card" id="start-card">
    <p class="card-title">スタート</p>
    <p style="font-size:0.95rem;line-height:1.7;color:var(--text);">
      全10問の四択クイズです。<br>
      ・四字熟語：5問<br>
      ・慣用句　：5問<br>
      正解数に応じて <strong>S/A/B/C/D/E</strong> の6段階で判定します。<br>
      所要時間は約2〜3分。気楽にどうぞ。
    </p>
    <p class="best-score" id="best-display"></p>
  </div>

  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズを始める</button>

  <!-- 出題カード -->
  <div class="card" id="quiz-card" style="display:none">
    <p class="progress-line" id="progress"></p>
    <p class="question-text" id="qtext"></p>
    <div class="choice-list" id="choices"></div>
    <div id="feedback"></div>
    <button class="btn-calc" id="next-btn" style="display:none;margin-top:1rem;" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの語彙力レベル</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best-after"></p>
  </div>

  <!-- 解説カード -->
  <div class="card" id="review-card" style="display:none">
    <p class="card-title">全問解説</p>
    <div class="review-list" id="review-list"></div>
  </div>

  <button class="btn-calc" id="restart-btn" style="display:none" onclick="restartQuiz()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、文化庁・国語辞典等の一般的な語義を参考に、目安として使いやすく整理しています。レベル判定はあくまで参考値です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 問題データ（四字熟語5問・慣用句5問） ──
  var QUESTIONS = [
    {
      q: '「温故知新」の意味として最も近いものは？',
      choices: [
        '昔のことを学び、そこから新しい知識や考え方を得ること',
        '古い物にこだわり、新しいものを拒むこと',
        '温かい食事をとって元気を取り戻すこと',
        '故郷を懐かしむ気持ち'
      ],
      answer: 0,
      type: '四字熟語',
      exp: '「温故知新（おんこちしん）」は、昔のことをよく調べたり学んだりして、そこから新しい知識・道理を見いだすこと。論語に由来。'
    },
    {
      q: '「五里霧中」の意味として最も近いものは？',
      choices: [
        '物事の判断がつかず、迷っている状態',
        '五人で霧の中を歩くこと',
        '長距離の旅で疲れ果てること',
        '夢の中で道に迷うこと'
      ],
      answer: 0,
      type: '四字熟語',
      exp: '「五里霧中（ごりむちゅう）」は、深い霧の中で方向が分からなくなるように、物事の様子や進むべき方向が分からず迷うこと。'
    },
    {
      q: '「臥薪嘗胆」の意味として最も近いものは？',
      choices: [
        '目的達成のために苦労や苦難に耐え忍ぶこと',
        '寝る前に胆を冷やすほど反省すること',
        '薪を集めながら旅をすること',
        '美味しい料理を堪能すること'
      ],
      answer: 0,
      type: '四字熟語',
      exp: '「臥薪嘗胆（がしんしょうたん）」は、復讐や目的を達成するために、長く苦難に耐えること。中国の故事に由来。'
    },
    {
      q: '「四面楚歌」の意味として最も近いものは？',
      choices: [
        '周囲がすべて敵で、味方がいない状況',
        '四方から歌声が聞こえる楽しい場面',
        '四人組で楚の国の歌を歌うこと',
        '四方八方に道がある分岐点'
      ],
      answer: 0,
      type: '四字熟語',
      exp: '「四面楚歌（しめんそか）」は、まわりが敵だらけで、助けや味方がまったくいない孤立した状況のたとえ。'
    },
    {
      q: '「画竜点睛」の意味として最も近いものは？',
      choices: [
        '物事を完成させるために最後に加える大切な仕上げ',
        '竜の絵を点で描くこと',
        '絵が苦手な人を励ますこと',
        '目を細めて遠くを見ること'
      ],
      answer: 0,
      type: '四字熟語',
      exp: '「画竜点睛（がりょうてんせい）」は、最後に加える大事な仕上げ。これを欠くと全体が活きないことから「画竜点睛を欠く」と使う。'
    },
    {
      q: '「板につく」の意味として最も近いものは？',
      choices: [
        '経験を積んで動作や態度が様になること',
        '板の上に乗って練習すること',
        '物がしっかり固定されること',
        '板挟みで動けない状態'
      ],
      answer: 0,
      type: '慣用句',
      exp: '「板につく」は、経験を重ねて態度・動作・服装などがしっくり馴染むこと。役者の演技が舞台（板）に馴染むことから。'
    },
    {
      q: '「気が置けない」の意味として最も近いものは？',
      choices: [
        '気を遣う必要がなく、打ち解けられる',
        '油断ならず、警戒が必要',
        '気分が落ち込んで動けない',
        '物忘れがひどい'
      ],
      answer: 0,
      type: '慣用句',
      exp: '「気が置けない」は、相手に遠慮や気遣いがいらず、打ち解けて付き合えること。「油断できない」と誤用されやすい代表例。'
    },
    {
      q: '「役不足」の意味として最も近いものは？',
      choices: [
        '本人の力量に対して与えられた役目が軽すぎること',
        '能力が役目に対して足りないこと',
        '出演する役者が不足すること',
        '練習時間が足りないこと'
      ],
      answer: 0,
      type: '慣用句',
      exp: '「役不足」は、その人の実力に対して役目が軽すぎる意味。「力不足」と取り違えて使う誤用が非常に多い。'
    },
    {
      q: '「煮詰まる」の本来の意味として最も近いものは？',
      choices: [
        '議論や検討が十分に進んで結論が出る段階',
        '行き詰まって良いアイデアが出ない状態',
        '料理の味が濃くなり過ぎること',
        '気持ちが焦って慌てること'
      ],
      answer: 0,
      type: '慣用句',
      exp: '「煮詰まる」は本来、議論や考えが十分進んで結論が出せる段階のこと。近年「行き詰まる」の意味で使われることも増えているが、伝統的には正解の意味。'
    },
    {
      q: '「枯れ木も山のにぎわい」の意味として最も近いものは？',
      choices: [
        'つまらないものでも無いよりはましという意味',
        '老人も集まれば賑やかで楽しいという意味',
        '山には多くの木があるべきという教え',
        '枯れた木は早く片付けるべきという戒め'
      ],
      answer: 0,
      type: '慣用句',
      exp: '「枯れ木も山のにぎわい」は、つまらないものでもないよりはまし、の意味。自分を謙遜して使う言葉で、人をさして使うのは失礼にあたる。'
    }
  ];

  var STORAGE_KEY = 'vocab10_best_v1';
  var current = 0;
  var score = 0;
  var answered = false;
  var userAnswers = [];

  function init() {
    showBest();
  }

  function getBest() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var n = parseInt(raw, 10);
      if (isNaN(n)) return null;
      return n;
    } catch (e) { return null; }
  }
  function setBest(n) {
    try { localStorage.setItem(STORAGE_KEY, String(n)); } catch (e) {}
  }
  function showBest() {
    var best = getBest();
    var el = document.getElementById('best-display');
    if (best === null) {
      el.textContent = '🏆 過去ベスト：まだ記録なし';
    } else {
      el.textContent = '🏆 過去ベスト：' + best + ' / 10 問正解';
    }
  }

  function startQuiz() {
    current = 0; score = 0; answered = false; userAnswers = [];
    document.getElementById('start-card').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('review-card').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('quiz-card').style.display = '';
    renderQuestion();
  }

  function renderQuestion() {
    answered = false;
    var qd = QUESTIONS[current];
    document.getElementById('progress').textContent =
      '第 ' + (current + 1) + ' 問 / 全10問　[' + qd.type + ']';
    document.getElementById('qtext').textContent = qd.q;
    var cl = document.getElementById('choices');
    cl.innerHTML = '';
    qd.choices.forEach(function(text, idx) {
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.textContent = text;
      b.onclick = function() { selectChoice(idx); };
      cl.appendChild(b);
    });
    document.getElementById('feedback').innerHTML = '';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('next-btn').textContent =
      (current === QUESTIONS.length - 1) ? '結果を見る' : '次の問題へ';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function selectChoice(idx) {
    if (answered) return;
    answered = true;
    var qd = QUESTIONS[current];
    var correct = (idx === qd.answer);
    if (correct) score++;
    userAnswers.push({ picked: idx, correct: correct });

    var btns = document.getElementById('choices').querySelectorAll('.choice-btn');
    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === qd.answer) b.classList.add('correct');
      if (i === idx && !correct) b.classList.add('wrong');
    });

    var fb = document.getElementById('feedback');
    fb.innerHTML =
      '<div class="feedback-box ' + (correct ? 'ok' : 'ng') + '">' +
        '<p class="fb-title">' + (correct ? '⭕ 正解！' : '❌ 不正解…') + '</p>' +
        '<p>' + qd.exp + '</p>' +
      '</div>';

    document.getElementById('next-btn').style.display = '';
  }

  function nextQuestion() {
    current++;
    if (current >= QUESTIONS.length) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function finishQuiz() {
    document.getElementById('quiz-card').style.display = 'none';

    var level, evalText, note;
    if (score === 10)      { level = 'S'; evalText = '語彙力レベル S：博識';     note = '10問全問正解！教養と読書量がにじみ出る圧巻の語彙力です。'; }
    else if (score === 9)  { level = 'A'; evalText = '語彙力レベル A：上級';     note = '惜しくも全問正解ならず。とはいえ大人として申し分のない語彙力です。'; }
    else if (score >= 7)   { level = 'B'; evalText = '語彙力レベル B：中上級';   note = '日常会話・ビジネス文書で困ることはほぼないレベル。あと一歩で上級。'; }
    else if (score >= 5)   { level = 'C'; evalText = '語彙力レベル C：標準';     note = '社会人として平均的な語彙力。誤用しやすい慣用句を見直すとさらに伸びます。'; }
    else if (score >= 3)   { level = 'D'; evalText = '語彙力レベル D：基礎';     note = '基本は押さえている段階。本や新聞を読む習慣をつけると一気に伸びるゾーンです。'; }
    else                   { level = 'E'; evalText = '語彙力レベル E：要復習';   note = '今日が伸びしろの始まり。解説をひとつずつ読むだけで、来週の自分はもう違います。'; }

    var rc = document.getElementById('result');
    var cls = (score >= 7) ? 'ok' : (score >= 4) ? 'warn' : 'ng';
    rc.className = 'result-card ' + cls;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = level + '（' + score + '/10）';
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = note;

    // ベストスコア更新
    var prev = getBest();
    var bestEl = document.getElementById('best-after');
    if (prev === null || score > prev) {
      setBest(score);
      bestEl.textContent = '🏆 ベスト更新！過去最高：' + score + ' / 10 問正解';
    } else {
      bestEl.textContent = '🏆 過去ベスト：' + prev + ' / 10 問正解（今回：' + score + ' / 10）';
    }

    // 全問解説
    var rl = document.getElementById('review-list');
    rl.innerHTML = QUESTIONS.map(function(qd, i) {
      var ua = userAnswers[i];
      var mark = ua && ua.correct
        ? '<span class="mark-ok">⭕</span>'
        : '<span class="mark-ng">❌</span>';
      var picked = (ua && typeof ua.picked === 'number') ? qd.choices[ua.picked] : '（未回答）';
      return '<div class="review-item">' +
        '<p class="review-q">Q' + (i + 1) + '. ' + mark + ' ' + qd.q + '</p>' +
        '<p class="review-a">あなたの回答：' + picked + '</p>' +
        '<p class="review-a">正解：' + qd.choices[qd.answer] + '</p>' +
        '<p class="review-exp">' + qd.exp + '</p>' +
      '</div>';
    }).join('');
    document.getElementById('review-card').style.display = '';

    document.getElementById('restart-btn').style.display = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restartQuiz() {
    document.getElementById('start-card').style.display = '';
    document.getElementById('start-btn').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('review-card').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    showBest();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  init();
  </script>
