<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ゲームタイトル名・ジャンル・ロゴスタイルを選ぶだけで、ファミコン風タイトルロゴの画像生成AIプロンプトを即生成。コピーしてすぐ使えるプロンプトジェネレーターです。">
  <title>ファミコン風ロゴプロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 3rem; font-family: inherit; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; text-align: center; }

    /* ── プロンプト表示 ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 1rem; min-height: 4rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── お気に入り一覧 ── */
    .fav-list { margin-top: 0.8rem; }
    .fav-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-item-text {
      flex: 1; font-size: 0.82rem; line-height: 1.5; color: var(--text);
      white-space: pre-wrap; word-break: break-word; cursor: pointer;
    }
    .fav-item-text:hover { color: var(--accent); }
    .fav-item-del {
      flex-shrink: 0; background: none; border: none;
      font-size: 1rem; color: var(--ng); cursor: pointer; padding: 0.2rem;
    }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>ファミコン風ロゴプロンプトジェネレーター</h1>
    <p class="subtitle">ゲームタイトル名とスタイルを選んで、画像生成AI用プロンプトを即生成</p>
  </header>

  <!-- 入力カード：タイトル名 -->
  <div class="card">
    <p class="card-title">タイトル情報</p>
    <div class="field">
      <label for="titleName">ゲームタイトル名</label>
      <input type="text" id="titleName" placeholder="例: DRAGON QUEST">
      <p class="hint">英語・日本語どちらでもOK</p>
    </div>
    <div class="field">
      <label for="genre">ジャンル</label>
      <select id="genre">
        <option value="RPG">RPG</option>
        <option value="アクション">アクション</option>
        <option value="シューティング">シューティング</option>
        <option value="パズル">パズル</option>
        <option value="スポーツ">スポーツ</option>
        <option value="格闘">格闘</option>
        <option value="アドベンチャー">アドベンチャー</option>
        <option value="シミュレーション">シミュレーション</option>
        <option value="レース">レース</option>
        <option value="ホラー">ホラー</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="熱血・燃える">熱血・燃える</option>
        <option value="ファンタジー・神秘的">ファンタジー・神秘的</option>
        <option value="SF・近未来">SF・近未来</option>
        <option value="コミカル・ポップ">コミカル・ポップ</option>
        <option value="ダーク・シリアス">ダーク・シリアス</option>
        <option value="レトロ・ノスタルジック">レトロ・ノスタルジック</option>
        <option value="和風・侍">和風・侍</option>
        <option value="メカ・ロボット">メカ・ロボット</option>
      </select>
    </div>
  </div>

  <!-- 入力カード：スタイル -->
  <div class="card">
    <p class="card-title">ロゴスタイル</p>
    <div class="field">
      <label for="logoStyle">文字スタイル</label>
      <select id="logoStyle">
        <option value="bold pixel font, chunky 8-bit letters">ドット文字（太め8bit）</option>
        <option value="gradient metallic letters with shine effect">グラデーション・メタリック</option>
        <option value="outlined bold letters with drop shadow">影付きアウトライン</option>
        <option value="3D extruded pixel letters">3D立体ドット文字</option>
        <option value="glowing neon pixel letters">ネオン発光ドット文字</option>
        <option value="embossed stone-carved pixel letters">石彫り風エンボス</option>
        <option value="fire effect pixel letters with flames">炎エフェクト文字</option>
        <option value="ice crystal pixel letters with frost">氷結晶フロスト文字</option>
      </select>
    </div>
    <div class="field">
      <label for="bgStyle">背景</label>
      <select id="bgStyle">
        <option value="solid black background">黒背景（定番）</option>
        <option value="starry night sky background with twinkling stars">星空背景</option>
        <option value="pixel art gradient sunset background">夕焼けグラデーション</option>
        <option value="simple grid pattern background">グリッドパターン</option>
        <option value="pixel art castle and mountains background">城と山の風景</option>
        <option value="space with planets and nebula pixel art background">宇宙・惑星背景</option>
        <option value="dark dungeon stone wall background">ダンジョン石壁背景</option>
        <option value="ocean waves pixel art background">海・波背景</option>
        <option value="transparent background, no background">透過（背景なし）</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="classic NES color palette, limited 54 colors">NES標準パレット</option>
        <option value="warm red, orange, and gold tones">暖色系（赤・橙・金）</option>
        <option value="cool blue, cyan, and silver tones">寒色系（青・水色・銀）</option>
        <option value="green, brown, and earth tones">アース系（緑・茶・大地）</option>
        <option value="purple, magenta, and neon pink tones">パープル・ネオン系</option>
        <option value="monochrome grayscale palette">モノクロ・グレースケール</option>
        <option value="Game Boy green monochrome palette, 4 shades of green">ゲームボーイ風（緑4階調）</option>
        <option value="pastel soft colors, light pink, light blue, light yellow">パステルカラー</option>
      </select>
    </div>
    <div class="field">
      <label for="decoration">装飾要素</label>
      <select id="decoration">
        <option value="">なし</option>
        <option value=", with pixel art sword and shield icons">剣と盾アイコン</option>
        <option value=", with pixel art dragon motif">ドラゴンモチーフ</option>
        <option value=", with pixel art star and sparkle effects">星・キラキラエフェクト</option>
        <option value=", with pixel art ribbon banner below title">リボンバナー</option>
        <option value=", with pixel art lightning bolt effects">稲妻エフェクト</option>
        <option value=", with pixel art wings on both sides">翼モチーフ</option>
        <option value=", with pixel art crown above title">王冠モチーフ</option>
        <option value=", with pixel art flames surrounding title">炎エフェクト</option>
        <option value=", with pixel art cherry blossom petals">桜の花びら</option>
      </select>
    </div>
    <div class="field">
      <label for="extraPrompt">追加キーワード（任意）</label>
      <textarea id="extraPrompt" rows="2" placeholder="例: with subtitle text, 横長バナー形式"></textarea>
      <p class="hint">プロンプトに追加したい自由テキスト</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🎮 プロンプトを生成</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="promptOutput"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">📋 コピーする</button>
  </div>

  <!-- お気に入り保存ボタン -->
  <div class="card no-print" id="favActions" style="display:none; max-width:600px;">
    <button class="btn-calc" style="margin:0;font-size:0.9rem;padding:0.7rem;" onclick="saveFav()">⭐ このプロンプトをお気に入り保存</button>
  </div>

  <!-- お気に入り一覧 -->
  <div class="card no-print" id="favCard" style="display:none; max-width:600px;">
    <p class="card-title">お気に入りプロンプト</p>
    <div class="fav-list" id="favList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、ファミコン（NES）のグラフィック仕様やレトロゲームのデザイン資料を参考に、画像生成AI向けプロンプトの目安として整理しています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'famicom_logo_prompt_favs';

  function generate() {
    var titleName = document.getElementById('titleName').value.trim();
    if (!titleName) {
      document.getElementById('result').className = 'result-card show';
      document.getElementById('promptOutput').textContent = '⚠️ ゲームタイトル名を入力してください';
      document.getElementById('favActions').style.display = 'none';
      return;
    }

    var genre = document.getElementById('genre').value;
    var mood = document.getElementById('mood').value;
    var logoStyle = document.getElementById('logoStyle').value;
    var bgStyle = document.getElementById('bgStyle').value;
    var palette = document.getElementById('palette').value;
    var decoration = document.getElementById('decoration').value;
    var extra = document.getElementById('extraPrompt').value.trim();

    // ジャンル→英語マッピング
    var genreMap = {
      'RPG': 'RPG', 'アクション': 'action', 'シューティング': 'shooting',
      'パズル': 'puzzle', 'スポーツ': 'sports', '格闘': 'fighting',
      'アドベンチャー': 'adventure', 'シミュレーション': 'simulation',
      'レース': 'racing', 'ホラー': 'horror'
    };
    var moodMap = {
      '熱血・燃える': 'passionate and fiery', 'ファンタジー・神秘的': 'fantasy and mystical',
      'SF・近未来': 'sci-fi and futuristic', 'コミカル・ポップ': 'comical and pop',
      'ダーク・シリアス': 'dark and serious', 'レトロ・ノスタルジック': 'retro and nostalgic',
      '和風・侍': 'Japanese style, samurai', 'メカ・ロボット': 'mecha and robot'
    };

    var genreEn = genreMap[genre] || genre;
    var moodEn = moodMap[mood] || mood;

    var prompt = 'Pixel art title logo for a Famicom / NES style ' + genreEn + ' game, '
      + 'title text "' + titleName + '", '
      + logoStyle + ', '
      + bgStyle + ', '
      + palette + ', '
      + moodEn + ' atmosphere'
      + decoration;

    if (extra) {
      prompt += ', ' + extra;
    }

    prompt += ', retro 8-bit pixel art style, clean sharp pixels, no anti-aliasing, authentic NES era aesthetic';

    document.getElementById('promptOutput').textContent = prompt;
    document.getElementById('result').className = 'result-card show';
    document.getElementById('favActions').style.display = 'block';
  }

  function copyPrompt() {
    var text = document.getElementById('promptOutput').textContent;
    if (!text || text.startsWith('⚠️')) return;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btnCopy');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── お気に入り機能 ──
  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(LS_KEY, JSON.stringify(favs));
  }
  function saveFav() {
    var text = document.getElementById('promptOutput').textContent;
    if (!text || text.startsWith('⚠️')) return;
    var favs = loadFavs();
    if (favs.indexOf(text) !== -1) {
      alert('このプロンプトは既に保存されています');
      return;
    }
    favs.unshift(text);
    if (favs.length > 20) favs.pop();
    saveFavs(favs);
    renderFavs();
  }
  function deleteFav(idx) {
    var favs = loadFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }
  function useFav(idx) {
    var favs = loadFavs();
    if (favs[idx]) {
      document.getElementById('promptOutput').textContent = favs[idx];
      document.getElementById('result').className = 'result-card show';
      document.getElementById('favActions').style.display = 'block';
      window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
    }
  }
  function renderFavs() {
    var favs = loadFavs();
    var card = document.getElementById('favCard');
    var list = document.getElementById('favList');
    if (favs.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(f, i) {
      var short = f.length > 100 ? f.substring(0, 100) + '...' : f;
      return '<div class="fav-item">'
        + '<span class="fav-item-text" onclick="useFav(' + i + ')" title="クリックで表示">' + escHtml(short) + '</span>'
        + '<button class="fav-item-del" onclick="deleteFav(' + i + ')" title="削除">✕</button>'
        + '</div>';
    }).join('');
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期表示
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
