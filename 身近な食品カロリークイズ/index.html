<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>身近な食品カロリークイズ｜10問4択でカロリー感覚を磨こう</title>
  <meta name="description" content="おにぎり、ポテチ、唐揚げなど身近な食品のカロリーを4択で当てる10問クイズ。意外な数字でカロリー感覚を磨いて、ダイエットや食生活見直しのきっかけに使える無料アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      font-size: 0.85rem; color: var(--text-sub);
      text-align: center; margin-bottom: 0.4rem;
    }
    .progress-bar {
      width: 100%; max-width: 600px; margin: 0 auto 1rem;
      background: var(--border); height: 6px; border-radius: 3px; overflow: hidden;
    }
    .progress-bar > span {
      display: block; height: 100%;
      background: var(--accent); transition: width 0.3s;
    }

    .question {
      font-size: 1.1rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem;
    }
    .question .item-name { color: var(--accent); }
    .question .item-detail { font-size: 0.85rem; color: var(--text-sub); font-weight: 400; display: block; margin-top: 0.3rem; }

    .choices { display: grid; gap: 0.6rem; }
    .choice-btn {
      padding: 0.95rem 1rem;
      font-size: 1rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice-btn.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }

    .feedback {
      margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.92rem; line-height: 1.55;
      display: none;
    }
    .feedback.ok { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--ok); }
    .feedback.ng { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--ng); }
    .feedback .answer { font-weight: 800; font-size: 1rem; margin-bottom: 0.3rem; display: block; }
    .feedback .desc { color: var(--text); font-weight: 400; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.95rem; color: var(--text); line-height: 1.5; margin-top: 0.4rem; }
    .best-score { font-size: 0.85rem; color: var(--text-sub); margin-top: 0.7rem; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:nth-child(2) { text-align: center; font-weight: 600; }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>身近な食品カロリークイズ</h1>
    <p class="subtitle">10問4択でカロリー感覚をチェック ※2026年4月時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <!-- 進捗表示 -->
  <p class="progress" id="progress">第 1 問 / 全 10 問</p>
  <div class="progress-bar"><span id="pbar" style="width:10%"></span></div>

  <!-- 出題カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">クイズ</p>
    <p class="question" id="qtext">—</p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <span class="answer" id="ans"></span>
      <span class="desc" id="desc"></span>
    </div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc no-print" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ →</button>

  <!-- 最終結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">回答一覧</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-calc no-print" id="retry-btn" style="display:none" onclick="restart()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズのカロリー目安は、文部科学省「日本食品標準成分表」や食品メーカー公開情報をもとに、おおよその数値として整理しています。商品・調理法・サイズで実際の値は変わります。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 食品カロリーデータ（kcal）— 目安
  var FOODS = [
    { name: 'コンビニおにぎり 鮭',       detail: '1個（約110g）あたり', kcal: 180,
      desc: 'ご飯1膳より少し軽い感覚。具材次第で200kcal前後まで上がります。' },
    { name: 'ポテトチップス 1袋',         detail: '60g（コンビニサイズ）', kcal: 336,
      desc: '油をたっぷり吸うので意外と高カロリー。半袋で抑えると◎。' },
    { name: '鶏の唐揚げ',                 detail: '3個（約100g）', kcal: 290,
      desc: '衣の油が大半を占めます。レモンより、量を意識する方が効きます。' },
    { name: 'バナナ 1本',                 detail: '可食部約100g', kcal: 86,
      desc: '思ったより低め。腹持ち重視の朝食におすすめです。' },
    { name: 'カフェラテ（牛乳）',         detail: 'グランデ約470ml', kcal: 220,
      desc: '砂糖なしでもこの数字。低脂肪乳に変えると約140kcalまで下がります。' },
    { name: 'カップ焼きそば（標準サイズ）', detail: '1食約120g', kcal: 540,
      desc: 'ソース・揚げ麺・かやくの合計でラーメンより重いことも。' },
    { name: 'アボカド 1個',               detail: '可食部約140g', kcal: 260,
      desc: '森のバターと呼ばれる通り脂質豊富。半分で十分な日もあります。' },
    { name: 'コーラ 500ml',               detail: 'ペットボトル1本', kcal: 225,
      desc: '角砂糖約14個分の糖。喉が乾いた時の麦茶置き換えで一気にカット。' },
    { name: 'ショートケーキ 1切れ',       detail: '約100g', kcal: 340,
      desc: '生クリームとスポンジの脂質・糖質。週1のご褒美ペースが安心。' },
    { name: 'カレーライス（中皿・ルウ込）', detail: '約400g', kcal: 700,
      desc: 'ご飯200g＋ルウ＋具材で外食ランチ最強クラス。福神漬けでさらに+α。' }
  ];

  var state = {
    order: [], // 出題順
    cur: 0,    // 現在のインデックス
    score: 0,
    answers: [], // {name, kcal, choice, correct}
    locked: false
  };

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // 4択を生成（正解値＋ダミー3つ）
  function makeChoices(correctKcal) {
    var set = {};
    set[correctKcal] = true;
    // 正解値の周辺と離れた値を混ぜる
    var ratios = [0.4, 0.6, 1.5, 2.0, 0.3, 1.8, 0.5, 1.7];
    var ratiosShuffled = shuffle(ratios);
    var i = 0;
    while (Object.keys(set).length < 4 && i < ratiosShuffled.length) {
      var v = Math.round(correctKcal * ratiosShuffled[i] / 10) * 10;
      if (v >= 30 && v !== correctKcal && !set[v]) set[v] = true;
      i++;
    }
    // 念のため埋まらなければ ±100 で補完
    var k = 50;
    while (Object.keys(set).length < 4) {
      var v2 = correctKcal + k;
      if (v2 >= 30 && !set[v2]) set[v2] = true;
      k += 30;
    }
    var arr = Object.keys(set).map(function(s){ return parseInt(s, 10); });
    return shuffle(arr);
  }

  function startQuiz() {
    state.order = shuffle(FOODS.map(function(_, i){ return i; }));
    state.cur = 0;
    state.score = 0;
    state.answers = [];
    state.locked = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('quiz-card').style.display = '';
    showQuestion();
  }

  function showQuestion() {
    state.locked = false;
    var idx = state.order[state.cur];
    var food = FOODS[idx];
    var choices = makeChoices(food.kcal);

    document.getElementById('progress').textContent = '第 ' + (state.cur + 1) + ' 問 / 全 ' + FOODS.length + ' 問';
    document.getElementById('pbar').style.width = ((state.cur + 1) / FOODS.length * 100) + '%';

    document.getElementById('qtext').innerHTML =
      '<span class="item-name">' + food.name + '</span> のカロリーはどれくらい？' +
      '<span class="item-detail">' + food.detail + '</span>';

    var box = document.getElementById('choices');
    box.innerHTML = '';
    choices.forEach(function(v){
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.type = 'button';
      b.textContent = 'およそ ' + v + ' kcal';
      b.dataset.value = v;
      b.onclick = function(){ selectAnswer(v, food, b); };
      box.appendChild(b);
    });

    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectAnswer(value, food, btn) {
    if (state.locked) return;
    state.locked = true;
    var correct = (value === food.kcal);
    if (correct) state.score++;

    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(b){
      b.disabled = true;
      var v = parseInt(b.dataset.value, 10);
      if (v === food.kcal) b.classList.add('correct');
      else if (b === btn) b.classList.add('wrong');
    });

    state.answers.push({
      name: food.name, kcal: food.kcal,
      choice: value, correct: correct
    });

    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (correct ? 'ok' : 'ng');
    fb.style.display = 'block';
    document.getElementById('ans').textContent =
      (correct ? '⭕ 正解！' : '❌ 残念！') + ' 正解は ' + food.kcal + ' kcal';
    document.getElementById('desc').textContent = food.desc;

    document.getElementById('next-btn').textContent =
      (state.cur + 1 < FOODS.length) ? '次の問題へ →' : '結果を見る →';
    document.getElementById('next-btn').style.display = 'block';
  }

  function nextQuestion() {
    state.cur++;
    if (state.cur < FOODS.length) {
      showQuestion();
    } else {
      finish();
    }
  }

  function finish() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    var total = FOODS.length;
    var sc = state.score;
    var level, msg;
    if (sc >= 8)      { level = 'ok';   msg = 'カロリー感覚バツグン！外食でも判断できそうです。'; }
    else if (sc >= 5) { level = 'warn'; msg = 'まずまずの感覚。意外なカロリー食品をチェックしておくと◎。'; }
    else              { level = 'ng';   msg = '思い込みに注意！普段食べる物のカロリーを見直してみましょう。'; }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = sc + ' / ' + total + ' 問正解';
    document.getElementById('rn').textContent = msg;

    // ベストスコア（localStorage）
    try {
      var key = 'food_calorie_quiz_best_score';
      var prev = parseInt(localStorage.getItem(key) || '0', 10);
      var best = sc > prev ? sc : prev;
      if (sc > prev) localStorage.setItem(key, String(sc));
      document.getElementById('best').textContent = '🏆 ベストスコア：' + best + ' / ' + total + ' 問';
    } catch(e) {
      document.getElementById('best').textContent = '';
    }

    // 回答一覧
    var rows = state.answers.map(function(a){
      var mark = a.correct ? '⭕' : '❌';
      return '<tr><td>' + a.name + '</td><td>' + mark + '</td><td>正解 ' + a.kcal + ' kcal</td></tr>';
    }).join('');
    document.getElementById('db').innerHTML = rows;
    document.getElementById('detail').style.display = 'block';

    document.getElementById('retry-btn').style.display = 'block';
  }

  function restart() {
    startQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 起動
  startQuiz();
  </script>

</body>
