<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで浪費体質か節約体質かを診断。自分のお金タイプを知って生活防衛に役立てましょう。">
  <title>浪費・節約体質タイプ診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 質問カード ── */
    .q-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .q-progress {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.8rem;
    }
    .q-text {
      font-size: 1.1rem; font-weight: 700; line-height: 1.6;
      margin-bottom: 1.5rem; min-height: 3rem;
    }
    .q-buttons {
      display: flex; gap: 0.8rem; justify-content: center;
    }
    .q-btn {
      flex: 1; max-width: 200px; padding: 0.9rem 1rem;
      font-size: 1.05rem; font-weight: 800;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--text); cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .q-btn:hover { border-color: var(--accent); color: var(--accent); }
    .q-btn.yes:hover { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
    .q-btn.no:hover { background: var(--ng-bg); border-color: var(--ng); color: var(--ng); }

    /* ── 結果タイプ表示 ── */
    .type-emoji { font-size: 3rem; line-height: 1.2; margin-bottom: 0.3rem; }
    .type-name { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.5rem; }
    .type-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 0.8rem; }
    .type-advice {
      font-size: 0.85rem; line-height: 1.6;
      padding: 0.8rem; margin-top: 0.5rem;
      background: var(--accent-light); border-radius: 10px;
      color: var(--text);
    }

    /* ── プログレスバー ── */
    .progress-bar {
      width: 100%; max-width: 600px; height: 6px;
      background: var(--border); border-radius: 3px;
      margin: 0 auto 1.2rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; transition: width 0.3s ease;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .q-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>💰 浪費・節約体質タイプ診断</h1>
    <p class="subtitle">5問YES/NOで答えるだけ。あなたのお金の使い方タイプをサクッと診断します。</p>
  </header>

  <!-- 質問カード -->
  <div class="q-card" id="quiz-area">
    <p class="q-progress" id="q-progress">Q1 / 5</p>
    <p class="q-text" id="q-text"></p>
    <div class="q-buttons">
      <button class="q-btn yes" onclick="answer(true)">YES</button>
      <button class="q-btn no" onclick="answer(false)">NO</button>
    </div>
  </div>

  <!-- プログレスバー -->
  <div class="progress-bar no-print">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="type-emoji" id="r-emoji"></p>
    <p class="result-label">あなたのタイプ</p>
    <p class="type-name" id="r-type"></p>
    <p class="type-desc" id="r-desc"></p>
    <div class="type-advice" id="r-advice"></div>
  </div>

  <!-- 回答内訳 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">あなたの回答</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- やり直しボタン -->
  <button class="btn-calc no-print" id="retry-btn" style="display:none" onclick="retry()">🔄 もう一度やってみる</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    { text: '欲しいものを見つけたら、その日のうちに買ってしまうことが多い', tag: '衝動買い' },
    { text: 'コンビニに寄ると、つい予定外のものまで買ってしまう', tag: 'ついで買い' },
    { text: '月末に「今月何に使ったっけ？」と思い出せないことがある', tag: '支出把握' },
    { text: 'セール・ポイント還元と聞くと、必要なくても買いたくなる', tag: 'お得誘惑' },
    { text: 'お金の使い方について、将来のことより今の楽しさを優先しがち', tag: '時間軸' }
  ];

  var TYPES = [
    { min: 0, max: 1, level: 'ok',   emoji: '🐿️', name: 'しっかり節約タイプ',
      desc: '堅実にお金を管理できています。無駄遣いの心配はほぼナシ！',
      advice: '💡 節約意識は十分です。たまには自分へのご褒美を忘れずに。ストレスを溜めすぎないのも大事なお金の使い方です。' },
    { min: 2, max: 2, level: 'ok',   emoji: '🐱', name: 'ほどよくバランスタイプ',
      desc: '使うところと締めるところのメリハリが取れています。',
      advice: '💡 バランス感覚は◎。あとは「なんとなく買い」を減らせると、もう一段レベルアップできます。' },
    { min: 3, max: 3, level: 'warn', emoji: '🐶', name: 'やや浪費ぎみタイプ',
      desc: 'ちょっと財布のヒモがゆるめ。気がつくと出費がかさんでいるかも。',
      advice: '💡 まずは1週間だけ「買う前に10秒待つ」を試してみましょう。意外と「やっぱりいらない」が増えますよ。' },
    { min: 4, max: 5, level: 'ng',   emoji: '🦁', name: 'がっつり浪費タイプ',
      desc: '欲しいものに正直すぎるかも。お金が手元に残りにくい傾向です。',
      advice: '💡 まず毎月の支出を記録してみましょう。数字を「見える化」するだけで、自然とブレーキがかかりはじめます。' }
  ];

  var current = 0;
  var answers = [];

  function init() {
    current = 0;
    answers = [];
    document.getElementById('quiz-area').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').className = 'result-card';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.querySelector('.progress-bar').style.display = '';
    showQ();
  }

  function showQ() {
    document.getElementById('q-progress').textContent = 'Q' + (current + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = QUESTIONS[current].text;
    document.getElementById('progress-fill').style.width = (current / QUESTIONS.length * 100) + '%';
  }

  function answer(yes) {
    answers.push(yes);
    current++;
    if (current < QUESTIONS.length) {
      showQ();
    } else {
      showResult();
    }
  }

  function showResult() {
    var yesCount = answers.filter(function(a){ return a; }).length;
    var type = TYPES.find(function(t){ return yesCount >= t.min && yesCount <= t.max; });

    document.getElementById('quiz-area').style.display = 'none';
    document.querySelector('.progress-bar').style.display = 'none';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + type.level;
    rc.style.display = 'block';
    document.getElementById('r-emoji').textContent = type.emoji;
    document.getElementById('r-type').textContent = type.name;
    document.getElementById('r-desc').textContent = type.desc;
    document.getElementById('r-advice').innerHTML = type.advice;

    // 回答内訳
    var rows = QUESTIONS.map(function(q, i){
      return '<tr><td>' + q.tag + '</td><td>' + (answers[i] ? 'YES' : 'NO') + '</td></tr>';
    });
    rows.push('<tr class="hl"><td>YES の数</td><td>' + yesCount + ' / ' + QUESTIONS.length + '</td></tr>');
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = 'block';

    document.getElementById('retry-btn').style.display = 'block';

    // localStorage に保存
    try {
      localStorage.setItem('浪費節約体質タイプ診断_result', JSON.stringify({
        date: new Date().toISOString(),
        answers: answers,
        yesCount: yesCount,
        type: type.name
      }));
    } catch(e) {}
  }

  function retry() {
    init();
  }

  // 起動
  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
