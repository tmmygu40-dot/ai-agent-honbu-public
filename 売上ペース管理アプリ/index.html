<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上ペース管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>売上ペース管理</h1>

    <div class="card input-card">
      <div class="form-group">
        <label for="targetSales">月の目標売上（円）</label>
        <input type="number" id="targetSales" placeholder="例：1000000" min="0">
      </div>
      <div class="form-group">
        <label for="actualSales">今日までの実績（円）</label>
        <input type="number" id="actualSales" placeholder="例：350000" min="0">
      </div>
      <button id="calcBtn" class="btn-primary">計算する</button>
    </div>

    <div class="card result-card" id="resultCard" style="display:none;">
      <h2>結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">目標売上</span>
          <span class="result-value" id="resTarget"></span>
        </div>
        <div class="result-item">
          <span class="result-label">今日までの実績</span>
          <span class="result-value" id="resActual"></span>
        </div>
        <div class="result-item">
          <span class="result-label">残り売上目標</span>
          <span class="result-value highlight" id="resRemaining"></span>
        </div>
        <div class="result-item">
          <span class="result-label">残り日数（月末まで）</span>
          <span class="result-value" id="resDaysLeft"></span>
        </div>
        <div class="result-item large">
          <span class="result-label">必要な1日あたりの売上</span>
          <span class="result-value accent" id="resDailyPace"></span>
        </div>
        <div class="result-item">
          <span class="result-label">達成率</span>
          <span class="result-value" id="resProgress"></span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="result-date" id="resDate"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
