<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車両走行記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>車両走行記録</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新規記録</h2>
      <div class="form-group">
        <label for="useDate">使用日</label>
        <input type="date" id="useDate">
      </div>
      <div class="form-group">
        <label for="distance">走行距離 (km)</label>
        <input type="number" id="distance" placeholder="例：35.5" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label for="purpose">目的</label>
        <input type="text" id="purpose" placeholder="例：得意先訪問（株式会社〇〇）">
      </div>
      <button class="btn-primary" id="addBtn">記録する</button>
    </section>

    <!-- 月別集計 -->
    <section class="summary-section">
      <h2>月別集計</h2>
      <div class="month-filter">
        <input type="month" id="monthFilter">
        <button class="btn-secondary" id="filterBtn">集計</button>
      </div>
      <div class="summary-box" id="summaryBox">
        <span class="summary-label">合計走行距離</span>
        <span class="summary-value" id="totalDistance">－</span>
        <span class="summary-unit">km</span>
        <span class="summary-count" id="recordCount"></span>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>走行記録一覧</h2>
        <span class="list-filter-label" id="listFilterLabel"></span>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
