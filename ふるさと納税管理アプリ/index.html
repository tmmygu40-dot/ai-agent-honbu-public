<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふるさと納税管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🏡 ふるさと納税管理</h1>
    <p class="subtitle">控除上限の残り枠をすぐ確認</p>

    <section class="card">
      <h2>基本情報を入力</h2>

      <div class="form-group">
        <label for="income">年収（万円）</label>
        <input type="number" id="income" placeholder="例：500" min="0" max="99999">
      </div>

      <div class="form-group">
        <label for="familyType">家族構成</label>
        <select id="familyType">
          <option value="single">独身・共働き（扶養なし）</option>
          <option value="spouse">夫婦（配偶者控除あり）</option>
          <option value="spouse_child1">夫婦＋子1人（高校生以下）</option>
          <option value="spouse_child2">夫婦＋子2人（高校生以下）</option>
          <option value="spouse_child3">夫婦＋子3人以上（高校生以下）</option>
          <option value="single_child1">独身＋子1人（高校生以下）</option>
          <option value="single_child2">独身＋子2人（高校生以下）</option>
        </select>
      </div>

      <div class="form-group">
        <label for="donated">今年の寄付済み額（円）</label>
        <input type="number" id="donated" placeholder="例：30000" min="0">
      </div>

      <button id="calcBtn" class="btn-primary">計算する</button>
    </section>

    <section class="card result-card" id="resultCard">
      <h2>計算結果</h2>

      <div class="result-row">
        <span class="result-label">控除上限の目安</span>
        <span class="result-value" id="limitValue">―</span>
      </div>
      <div class="result-row">
        <span class="result-label">寄付済み額</span>
        <span class="result-value" id="donatedValue">―</span>
      </div>
      <div class="result-row highlight">
        <span class="result-label">残り枠</span>
        <span class="result-value" id="remainValue">―</span>
      </div>
      <div class="result-row recommend">
        <span class="result-label">おすすめ追加額</span>
        <span class="result-value" id="recommendValue">―</span>
      </div>

      <p class="note" id="noteText"></p>
    </section>

    <section class="card history-card">
      <h2>寄付履歴メモ</h2>
      <div class="history-input">
        <input type="text" id="historyName" placeholder="返礼品名（例：牛肉セット）">
        <input type="number" id="historyAmount" placeholder="金額（円）" min="0">
        <button id="addHistoryBtn" class="btn-secondary">追加</button>
      </div>
      <ul id="historyList" class="history-list"></ul>
      <div class="history-footer" id="historyFooter"></div>
    </section>

    <p class="disclaimer">※計算は簡易シミュレーションです。正確な控除額は税務署・自治体にご確認ください。</p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
