<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業進捗ボード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>作業進捗ボード</h1>

    <div class="progress-section">
      <div class="progress-label">
        <span>全体進捗</span>
        <span id="progress-text">0 / 0 件完了</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="form-section">
      <input type="text" id="input-staff" placeholder="スタッフ名" maxlength="30">
      <input type="text" id="input-task" placeholder="担当業務" maxlength="60">
      <button id="btn-add" onclick="addTask()">追加</button>
    </div>

    <div id="task-list"></div>

    <div class="footer-actions">
      <button class="btn-reset" onclick="confirmReset()">今日のリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
