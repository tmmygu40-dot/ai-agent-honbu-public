<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5つの質問に答えるだけで、あなたの怒りの沸点タイプを30秒で診断。瞬間沸騰／じわじわ蓄積／冷静裁判官／流して忘れの4タイプから判定する無料セルフチェックです。">
  <title>怒りの沸点タイプ診断｜5問30秒で判定</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.3rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.45; }
    .q-num { color: var(--accent); margin-right: 0.4rem; }
    .opt {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.65rem 0.7rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.12s, background 0.12s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input { margin-top: 0.2rem; flex-shrink: 0; cursor: pointer; }
    .opt-text { font-size: 0.9rem; color: var(--text); line-height: 1.45; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji-big { font-size: 3rem; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.9rem; color: var(--text); line-height: 1.6; text-align: left; margin-top: 0.6rem; }
    .result-advice { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; text-align: left; margin-top: 0.7rem; padding-top: 0.7rem; border-top: 1px dashed var(--border); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>怒りの沸点タイプ診断</h1>
    <p class="subtitle">5問30秒で、あなたの怒り方タイプを判定します</p>
  </header>

  <div class="card">
    <p class="card-title">5問の質問に答えてください</p>

    <div class="q-block" data-q="1">
      <p class="q-text"><span class="q-num">Q1.</span>電車で隣の人が音漏れする音楽を聴いている。どうする？</p>
      <label class="opt"><input type="radio" name="q1" value="A"><span class="opt-text">「うるさい」とすぐ口に出すか即注意する</span></label>
      <label class="opt"><input type="radio" name="q1" value="B"><span class="opt-text">イライラを我慢して、降りた後もずっと引きずる</span></label>
      <label class="opt"><input type="radio" name="q1" value="C"><span class="opt-text">マナーとして問題だなと心の中で評価する</span></label>
      <label class="opt"><input type="radio" name="q1" value="D"><span class="opt-text">自分のイヤホンをして気にしないようにする</span></label>
    </div>

    <div class="q-block" data-q="2">
      <p class="q-text"><span class="q-num">Q2.</span>同僚が同じミスを3回繰り返した</p>
      <label class="opt"><input type="radio" name="q2" value="A"><span class="opt-text">その場でカッとなって強く言ってしまう</span></label>
      <label class="opt"><input type="radio" name="q2" value="B"><span class="opt-text">何度か注意して我慢の限界で爆発する</span></label>
      <label class="opt"><input type="radio" name="q2" value="C"><span class="opt-text">原因と再発防止策を冷静に提案する</span></label>
      <label class="opt"><input type="radio" name="q2" value="D"><span class="opt-text">自分のことじゃないと割り切って気にしない</span></label>
    </div>

    <div class="q-block" data-q="3">
      <p class="q-text"><span class="q-num">Q3.</span>並んでいた列に割り込まれた</p>
      <label class="opt"><input type="radio" name="q3" value="A"><span class="opt-text">すぐに「並んでます！」と声に出す</span></label>
      <label class="opt"><input type="radio" name="q3" value="B"><span class="opt-text">何も言えず、その後ずっとモヤモヤする</span></label>
      <label class="opt"><input type="radio" name="q3" value="C"><span class="opt-text">「列のルールですよ」と落ち着いて指摘する</span></label>
      <label class="opt"><input type="radio" name="q3" value="D"><span class="opt-text">別にいいかと譲って次の予定に切り替える</span></label>
    </div>

    <div class="q-block" data-q="4">
      <p class="q-text"><span class="q-num">Q4.</span>SNSで自分の発言が誤解されて広まった</p>
      <label class="opt"><input type="radio" name="q4" value="A"><span class="opt-text">即反論コメントを書き込む</span></label>
      <label class="opt"><input type="radio" name="q4" value="B"><span class="opt-text">何時間もスマホを見ながらモヤモヤし続ける</span></label>
      <label class="opt"><input type="radio" name="q4" value="C"><span class="opt-text">論点を整理して訂正リプを返す</span></label>
      <label class="opt"><input type="radio" name="q4" value="D"><span class="opt-text">スルーして別のことをする</span></label>
    </div>

    <div class="q-block" data-q="5">
      <p class="q-text"><span class="q-num">Q5.</span>家族が大事な約束を忘れていた</p>
      <label class="opt"><input type="radio" name="q5" value="A"><span class="opt-text">「なんで！」と即口に出して怒る</span></label>
      <label class="opt"><input type="radio" name="q5" value="B"><span class="opt-text">言わないけど態度や顔に出る</span></label>
      <label class="opt"><input type="radio" name="q5" value="C"><span class="opt-text">「なぜ忘れたのか」を理由から確認する</span></label>
      <label class="opt"><input type="radio" name="q5" value="D"><span class="opt-text">「仕方ない」と笑って次に進む</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="judge()">タイプを診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">🔥</p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <p class="result-advice" id="ra"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断はエンタメ用途のセルフチェックです。心理的な不調が続く場合は、自治体の心の健康相談窓口や厚生労働省「まもろうよこころ」など公的な相談先もご活用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'angerBoilingType_answers_v1';

  var TYPES = {
    A: {
      emoji: '🔥', name: '瞬間沸騰タイプ',
      level: 'ng',
      note: '感情を一瞬で発火させ、その場で表に出すタイプ。スピードがある一方、後から「言いすぎたかも」と後悔しがち。瞬発的な熱量は周囲を動かす力でもあります。',
      advice: '🌬 おすすめ対処：怒りを感じたら6秒だけ深呼吸して声を出すのを遅らせる「シックスセカンド・ルール」が効果的。100ml の水を一口飲むだけでも沸点が下がります。'
    },
    B: {
      emoji: '🌋', name: 'じわじわ蓄積タイプ',
      level: 'warn',
      note: 'その場では我慢して、後から一気に爆発するタイプ。普段は穏やかに見られますが、内側でストレスをため込みやすいので要注意。',
      advice: '📓 おすすめ対処：モヤッとした瞬間に「何にイラついた／本当はどうしてほしかった」を一行メモ。書き出すだけで蓄積量が半分くらいになります。'
    },
    C: {
      emoji: '⚖️', name: '冷静裁判官タイプ',
      level: 'ok',
      note: 'ルールや筋を重視し、論理で怒るタイプ。感情をぶつけずに整理できる強みがある一方、相手にとっては「正論で詰められた」と感じられることも。',
      advice: '🤝 おすすめ対処：指摘の前に「あなたを責めたいわけじゃない」と一言添えると、正論の刺さり方が和らぎ、関係を保ったまま改善につながります。'
    },
    D: {
      emoji: '🍃', name: '流して忘れタイプ',
      level: 'ok',
      note: '怒りを溜めず、サッと切り替えるタイプ。ストレス耐性が高く穏やかに見られますが、本当に伝えるべき場面まで流してしまうと不満を抱えがち。',
      advice: '💬 おすすめ対処：「これは流していい／これは伝えるべき」を仕分けるクセをつけるとさらに楽に。譲りすぎていないか、月に1回セルフチェックを。'
    }
  };

  function loadSaved() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var saved = JSON.parse(raw);
      Object.keys(saved).forEach(function(qn) {
        var v = saved[qn];
        var el = document.querySelector('input[name="' + qn + '"][value="' + v + '"]');
        if (el) el.checked = true;
      });
    } catch (e) {}
  }

  function saveAnswers(answers) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); } catch (e) {}
  }

  function judge() {
    var answers = {};
    var counts = { A: 0, B: 0, C: 0, D: 0 };
    var missing = [];
    for (var i = 1; i <= 5; i++) {
      var qn = 'q' + i;
      var picked = document.querySelector('input[name="' + qn + '"]:checked');
      if (!picked) { missing.push(i); continue; }
      answers[qn] = picked.value;
      counts[picked.value]++;
    }
    if (missing.length > 0) {
      showError('未回答：Q' + missing.join(', Q'));
      return;
    }
    saveAnswers(answers);

    var topKey = 'A', topCount = -1;
    ['A', 'B', 'C', 'D'].forEach(function(k) {
      if (counts[k] > topCount) { topCount = counts[k]; topKey = k; }
    });
    var t = TYPES[topKey];

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;
    document.getElementById('ra').textContent = t.advice;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '回答がそろっていません';
    document.getElementById('rn').textContent = msg;
    document.getElementById('ra').textContent = '';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  loadSaved();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
