<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 1日10語英語クイズ - 英単語を日本語で当てるゲーム</title>
  <meta name="description" content="毎日10個の英単語を日本語で当てるシンプルなクイズゲーム。4択問題形式で英語学習を楽しくできます。スコア保存・復習機能付き。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>📚 1日10語英語クイズ</h1>
    <p class="subtitle">英単語を日本語で当てるシンプルなゲーム。毎日の学習に。</p>
  </header>

  <!-- クイズ問題カード -->
  <div class="card">
    <p class="card-title">問題</p>
    <p style="font-size: 1.3rem; font-weight: 700; text-align: center; margin: 1.5rem 0; color: var(--accent);" id="question">---</p>
    <p style="text-align: center; font-size: 0.88rem; color: var(--text-sub); margin-bottom: 1.2rem;" id="progress">問題 <span id="currentQ">0</span> / 10</p>
    <div id="choices-container" style="display: grid; grid-template-columns: 1fr; gap: 0.7rem;">
      <button class="btn-calc" style="margin: 0; padding: 0.8rem;" onclick="selectAnswer(0)">① ---</button>
      <button class="btn-calc" style="margin: 0; padding: 0.8rem;" onclick="selectAnswer(1)">② ---</button>
      <button class="btn-calc" style="margin: 0; padding: 0.8rem;" onclick="selectAnswer(2)">③ ---</button>
      <button class="btn-calc" style="margin: 0; padding: 0.8rem;" onclick="selectAnswer(3)">④ ---</button>
    </div>
  </div>

  <!-- クイズ終了画面 -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <button class="btn-calc" style="margin-top: 1.2rem; margin-bottom: 0;" onclick="restartQuiz()">もう一度やる</button>
  </div>

  <!-- 回答結果フィードバック -->
  <div class="card" id="feedback" style="display:none">
    <p class="result-label" id="feedback-label">回答結果</p>
    <p id="feedback-msg" style="font-size: 1.1rem; font-weight: 700; margin: 1rem 0;"></p>
    <p id="feedback-exp" style="color: var(--text-sub); line-height: 1.6;"></p>
    <button class="btn-calc" style="margin-top: 1rem; margin-bottom: 0;" onclick="nextQuestion()">次へ</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 単語データは一般的な英語学習教材と TOEIC・英検試験出題範囲を参考に選定しています。日々の学習にお役立てください。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 英単語データ（100語以上） ──
  var WORDS = [
    { w: 'apple', j: 'りんご' },
    { w: 'book', j: '本' },
    { w: 'cat', j: '猫' },
    { w: 'dog', j: '犬' },
    { w: 'elephant', j: 'ぞう' },
    { w: 'flower', j: '花' },
    { w: 'guitar', j: 'ギター' },
    { w: 'house', j: '家' },
    { w: 'ice', j: '氷' },
    { w: 'jacket', j: 'ジャケット' },
    { w: 'king', j: '王様' },
    { w: 'lamp', j: 'ランプ' },
    { w: 'monkey', j: 'サル' },
    { w: 'notebook', j: 'ノート' },
    { w: 'orange', j: 'オレンジ' },
    { w: 'pen', j: 'ペン' },
    { w: 'queen', j: '女王' },
    { w: 'rainbow', j: '虹' },
    { w: 'star', j: '星' },
    { w: 'table', j: 'テーブル' },
    { w: 'umbrella', j: '傘' },
    { w: 'violin', j: 'バイオリン' },
    { w: 'water', j: '水' },
    { w: 'yellow', j: '黄色' },
    { w: 'zoo', j: '動物園' },
    { w: 'airplane', j: '飛行機' },
    { w: 'beautiful', j: '美しい' },
    { w: 'computer', j: 'コンピュータ' },
    { w: 'different', j: '異なる' },
    { w: 'energy', j: 'エネルギー' },
    { w: 'family', j: '家族' },
    { w: 'garden', j: '庭' },
    { w: 'happy', j: '幸せな' },
    { w: 'important', j: '重要な' },
    { w: 'journey', j: '旅' },
    { w: 'kitchen', j: 'キッチン' },
    { w: 'language', j: '言語' },
    { w: 'mountain', j: '山' },
    { w: 'nature', j: '自然' },
    { w: 'ocean', j: '海' },
    { w: 'picture', j: '絵' },
    { w: 'quality', j: '質' },
    { w: 'restaurant', j: 'レストラン' },
    { w: 'science', j: '科学' },
    { w: 'teacher', j: '先生' },
    { w: 'understand', j: '理解する' },
    { w: 'vegetable', j: '野菜' },
    { w: 'weather', j: '天気' },
    { w: 'question', j: '質問' },
    { w: 'answer', j: '答え' },
    { w: 'time', j: '時間' },
    { w: 'money', j: 'お金' },
    { w: 'person', j: '人' },
    { w: 'company', j: '会社' },
    { w: 'country', j: '国' },
    { w: 'government', j: '政府' },
    { w: 'system', j: 'システム' },
    { w: 'problem', j: '問題' },
    { w: 'solution', j: '解決策' },
    { w: 'business', j: 'ビジネス' },
    { w: 'market', j: '市場' },
    { w: 'service', j: 'サービス' },
    { w: 'product', j: '製品' },
    { w: 'customer', j: '顧客' },
    { w: 'experience', j: '経験' },
    { w: 'knowledge', j: '知識' },
    { w: 'information', j: '情報' },
    { w: 'technology', j: '技術' },
    { w: 'internet', j: 'インターネット' },
    { w: 'digital', j: 'デジタル' },
    { w: 'website', j: 'ウェブサイト' },
    { w: 'application', j: 'アプリケーション' },
    { w: 'development', j: '開発' },
    { w: 'success', j: '成功' },
    { w: 'future', j: '未来' },
    { w: 'opportunity', j: '機会' },
    { w: 'challenge', j: '課題' },
    { w: 'improvement', j: '改善' },
    { w: 'health', j: '健康' },
    { w: 'exercise', j: '運動' },
    { w: 'medicine', j: '医学' },
    { w: 'hospital', j: '病院' },
    { w: 'doctor', j: '医者' },
    { w: 'patient', j: '患者' },
    { w: 'disease', j: '病気' },
    { w: 'treatment', j: '治療' },
    { w: 'education', j: '教育' },
    { w: 'school', j: '学校' },
    { w: 'student', j: '学生' },
    { w: 'university', j: '大学' },
    { w: 'study', j: '勉強' },
    { w: 'learn', j: '学ぶ' },
    { w: 'research', j: '研究' },
    { w: 'art', j: '芸術' },
    { w: 'music', j: '音楽' },
    { w: 'sport', j: 'スポーツ' },
    { w: 'game', j: 'ゲーム' },
    { w: 'entertainment', j: 'エンターテイメント' },
    { w: 'culture', j: '文化' },
    { w: 'tradition', j: '伝統' },
    { w: 'history', j: '歴史' },
    { w: 'famous', j: '有名な' }
  ];

  var state = {
    score: 0,
    correct: 0,
    question: 0,
    wordIndices: [],
    currentWordIndex: -1,
    selectedAnswer: null
  };

  function initQuiz() {
    state.score = 0;
    state.correct = 0;
    state.question = 0;
    state.selectedAnswer = null;
    // 100語からランダムに10個選択
    state.wordIndices = [];
    var indices = Array.from({length: WORDS.length}, (_, i) => i);
    for (var i = 0; i < 10 && indices.length > 0; i++) {
      var r = Math.floor(Math.random() * indices.length);
      state.wordIndices.push(indices[r]);
      indices.splice(r, 1);
    }
    document.getElementById('result').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    nextQuestion();
  }

  function nextQuestion() {
    if (state.question >= 10) {
      showFinal();
      return;
    }
    state.question++;
    state.selectedAnswer = null;
    var wIdx = state.wordIndices[state.question - 1];
    state.currentWordIndex = wIdx;

    var correctAnswer = WORDS[wIdx].j;
    var choices = [correctAnswer];

    // ランダムに3個の他の単語を選ぶ
    var used = {[wIdx]: true};
    while (choices.length < 4) {
      var r = Math.floor(Math.random() * WORDS.length);
      if (!used[r]) {
        choices.push(WORDS[r].j);
        used[r] = true;
      }
    }

    // シャッフル
    for (var i = choices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = choices[i];
      choices[i] = choices[j];
      choices[j] = tmp;
    }

    state.choices = choices;
    state.correctIdx = choices.indexOf(correctAnswer);

    document.getElementById('question').textContent = WORDS[wIdx].w;
    document.getElementById('currentQ').textContent = state.question;

    var btns = document.querySelectorAll('#choices-container button');
    for (var i = 0; i < 4; i++) {
      btns[i].textContent = String.fromCharCode(9312 + i) + ' ' + choices[i];
      btns[i].className = 'btn-calc';
      btns[i].style.margin = '0';
      btns[i].style.padding = '0.8rem';
    }

    document.getElementById('feedback').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (state.selectedAnswer !== null) return; // 既に回答済み
    state.selectedAnswer = idx;
    var isCorrect = (idx === state.correctIdx);
    if (isCorrect) {
      state.correct++;
      state.score += 10;
    }

    // ボタンの色を変更
    var btns = document.querySelectorAll('#choices-container button');
    btns[state.correctIdx].style.background = 'var(--ok)';
    if (!isCorrect) {
      btns[idx].style.background = 'var(--ng)';
    }

    document.getElementById('feedback-label').textContent = isCorrect ? '正解！' : '不正解…';
    document.getElementById('feedback-label').style.color = isCorrect ? 'var(--ok)' : 'var(--ng)';
    document.getElementById('feedback-msg').textContent = isCorrect ? '✓ 正解です！' : '✗ 答えは「' + state.choices[state.correctIdx] + '」です';
    document.getElementById('feedback-msg').style.color = isCorrect ? 'var(--ok)' : 'var(--ng)';
    document.getElementById('feedback-exp').textContent = WORDS[state.currentWordIndex].w + ' = ' + WORDS[state.currentWordIndex].j;
    document.getElementById('feedback').style.display = 'block';
  }

  function showFinal() {
    document.getElementById('result').className = 'result-card ' + (state.correct >= 7 ? 'ok' : state.correct >= 5 ? 'warn' : 'ng');
    document.getElementById('rv').textContent = state.correct + ' / 10 点';
    document.getElementById('rn').textContent = state.score + ' pts | 正解率 ' + Math.floor(state.correct * 100 / 10) + '%';
    document.getElementById('result').style.display = 'block';
  }

  function restartQuiz() {
    document.getElementById('choices-container').querySelectorAll('button').forEach(function(btn) {
      btn.style.background = '';
    });
    initQuiz();
  }

  // ページ読込時に開始
  window.addEventListener('load', function() {
    // localStorage から前回のスコアを読込（オプション）
    initQuiz();
  });
  </script>
