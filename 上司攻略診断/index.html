<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上司攻略診断｜3問で苦手な上司タイプと対処法が分かる</title>
  <meta name="description" content="苦手な上司の特徴を3問選ぶだけで、5タイプから上司タイプを判定し、すぐ使える対処法3つを表示する無料診断ツール。職場の人間関係ストレスをラクにする一歩に。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .q-title { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.4; }

    .opt {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.75rem 0.7rem; border: 1.5px solid var(--border);
      border-radius: 10px; margin-bottom: 0.5rem;
      cursor: pointer; user-select: none;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { margin-top: 0.2rem; flex-shrink: 0; cursor: pointer; }
    .opt-text { font-size: 0.92rem; line-height: 1.45; color: var(--text); }
    .opt input[type="radio"]:checked ~ .opt-text { font-weight: 700; }
    .opt:has(input:checked) { background: var(--accent-light); border-color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }
    .result-emoji { font-size: 2.6rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.7rem; color: var(--accent); text-align: center; }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; }

    .tips-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); margin: 1rem 0 0.5rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
    .tips-list { list-style: none; padding: 0; }
    .tips-list li {
      padding: 0.7rem 0.7rem 0.7rem 2.2rem;
      position: relative;
      font-size: 0.92rem; line-height: 1.55;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list li::before {
      content: '✓'; position: absolute; left: 0.7rem; top: 0.7rem;
      color: var(--accent); font-weight: 900;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>上司攻略診断</h1>
    <p class="subtitle">3問で苦手な上司タイプを判定し、明日から使える対処法をお届け</p>
  </header>

  <div class="card">
    <p class="card-title">Q1 / 3</p>
    <p class="q-title">上司の指示の出し方として一番近いのは？</p>
    <label class="opt"><input type="radio" name="q1" value="micro"><span class="opt-text">細かく指示してきて、進捗も逐一チェックされる</span></label>
    <label class="opt"><input type="radio" name="q1" value="loose"><span class="opt-text">「あとはよろしく」と丸投げで放置気味</span></label>
    <label class="opt"><input type="radio" name="q1" value="power"><span class="opt-text">大声・威圧的で詰めるような物言いが多い</span></label>
    <label class="opt"><input type="radio" name="q1" value="mood"><span class="opt-text">機嫌で態度が変わり、言うことが揺れる</span></label>
    <label class="opt"><input type="radio" name="q1" value="face"><span class="opt-text">部下より上司に媚びるタイプで八方美人</span></label>
  </div>

  <div class="card">
    <p class="card-title">Q2 / 3</p>
    <p class="q-title">一番ストレスを感じる場面は？</p>
    <label class="opt"><input type="radio" name="q2" value="micro"><span class="opt-text">進捗を毎時間のように聞かれる・やり方を細かく口出しされる</span></label>
    <label class="opt"><input type="radio" name="q2" value="loose"><span class="opt-text">何も決めてくれず、判断を全部こちらに丸投げされる</span></label>
    <label class="opt"><input type="radio" name="q2" value="power"><span class="opt-text">人前で叱責・詰められて萎縮してしまう</span></label>
    <label class="opt"><input type="radio" name="q2" value="mood"><span class="opt-text">朝と夕で言うことが違い、何が正解か分からない</span></label>
    <label class="opt"><input type="radio" name="q2" value="face"><span class="opt-text">自分のミスを部下のせいにする・手柄は持っていく</span></label>
  </div>

  <div class="card">
    <p class="card-title">Q3 / 3</p>
    <p class="q-title">あなたが望む理想の関係は？</p>
    <label class="opt"><input type="radio" name="q3" value="micro"><span class="opt-text">ある程度任せて欲しい・細かい口出しを減らして欲しい</span></label>
    <label class="opt"><input type="radio" name="q3" value="loose"><span class="opt-text">方向性ぐらいは示して欲しい・最低限の判断はして欲しい</span></label>
    <label class="opt"><input type="radio" name="q3" value="power"><span class="opt-text">落ち着いて穏やかに話したい・人前で叱らないで欲しい</span></label>
    <label class="opt"><input type="radio" name="q3" value="mood"><span class="opt-text">一貫した指示が欲しい・気分で態度を変えないで欲しい</span></label>
    <label class="opt"><input type="radio" name="q3" value="face"><span class="opt-text">公正に評価して欲しい・責任のなすりつけはやめて欲しい</span></label>
  </div>

  <button class="btn-calc" onclick="diag()">タイプを診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの上司タイプ</p>
    <p class="result-emoji" id="re">🎯</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="tips-title">明日から使える対処法</p>
    <ul class="tips-list" id="tips"></ul>
    <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省「職場におけるハラスメント対策」など公的資料や、職場コミュニケーションに関する公開知見を参考に、目安として整理しています。深刻な状況は社内相談窓口や公的相談機関へ。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    power: {
      emoji: '🦁',
      name: '威圧型ボス',
      note: '大声・詰め・人前での叱責で部下を動かそうとするタイプ。怒鳴られると委縮しやすく、思考停止に陥りがち。距離と記録が最大の武器。',
      tips: [
        '物理的・心理的に距離を取る。話す時は短く・要点だけ・人前で済ませて密室を避ける。',
        'やり取りはチャット・メール・議事録で必ず文字に残す。「言った言わない」を封じる。',
        '自分が悪くないと感じる詰めは、感情的に返さず「事実→対応案」のフォーマットで返す。',
        '本当にしんどい時は社内相談窓口・労働組合・労基などの外部窓口を使ってOK。'
      ]
    },
    micro: {
      emoji: '🔍',
      name: 'マイクロマネジメント型',
      note: '細かい指示と頻繁な進捗確認で部下を縛るタイプ。本人は「丁寧に見ている」つもり。先回りで安心材料を渡せば一気にラクになる。',
      tips: [
        '聞かれる前に進捗を出す。日次or半日サイクルで「現状・次やること・困りごと」を共有。',
        '「いつまでにこの形で出します」と先に宣言。確認タイミングをこちらから固定する。',
        '質問・口出しはまとめて受ける時間を作る。1日3回までなど暗黙のルールを作る。',
        '完成度80％で一度見せる。最後に大幅修正されるより、早めに方向性のすり合わせを。'
      ]
    },
    loose: {
      emoji: '🪁',
      name: '放任型ボス',
      note: '丸投げ・判断保留で部下が迷子になるタイプ。優しいが頼れないので、こちらから情報を取りに行く形で攻略する。',
      tips: [
        '聞き方を「どうしますか？」ではなく「Aで進めて良いですか？」のYES/NO型にする。',
        '5W1H（誰が・いつまでに・何を・どこまで）を明文化して合意を取る。後で揉めない。',
        '判断を下ろすのが苦手なので、選択肢を2〜3個用意して並べて見せる。',
        '放任を逆手に取り、自分の裁量を広げてキャリアの実績にする発想転換も有効。'
      ]
    },
    mood: {
      emoji: '🌗',
      name: '感情起伏型ボス',
      note: '機嫌の波が激しく、朝と夕で言うことが変わるタイプ。「何が正解か分からない」のは普通の感覚。記録と機嫌読みで凌ぐ。',
      tips: [
        '機嫌が良い時間帯・悪い時間帯を観察してメモ。重い相談はゴキゲン時間に集中する。',
        '指示は必ず文書化する。「先ほどのご指示はAでよろしいですか」と書面で返す。',
        '気分で言うことが変わったら、過去のメモを根拠に冷静に確認。攻撃しないのがコツ。',
        '本人の機嫌に振り回されない自分の軸を持つ。「これは私の責任ではない」を心で唱える。'
      ]
    },
    face: {
      emoji: '🎭',
      name: '八方美人型ボス',
      note: '上司には媚び、部下のミスを擦り付けてくるタイプ。一番危険なのは静かに信頼貯金を奪われること。証拠と第三者がカギ。',
      tips: [
        'やり取りは必ず文章化・CCに第三者を入れる。1対1の口頭でだけ進めない。',
        '会議・チャットの公的な場で報告し、自分の貢献を可視化する。手柄を消されないように。',
        '責任なすりつけが起きたら、その場で否定せず、後から議事録・履歴で淡々と訂正する。',
        '本気で困ったら、上司の上司や人事に客観的事実だけを淡々と相談する選択肢も持つ。'
      ]
    }
  };

  function diag() {
    var keys = ['power','micro','loose','mood','face'];
    var score = { power:0, micro:0, loose:0, mood:0, face:0 };
    var unanswered = false;
    for (var i = 1; i <= 3; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered = true; break; }
      score[sel.value]++;
    }
    if (unanswered) {
      alert('3問すべてに回答してください');
      return;
    }
    var top = keys[0];
    for (var k = 1; k < keys.length; k++) {
      if (score[keys[k]] > score[top]) top = keys[k];
    }
    var t = TYPES[top];
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.note;
    document.getElementById('tips').innerHTML = t.tips.map(function(x){
      return '<li>' + x + '</li>';
    }).join('');
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
    try { localStorage.setItem('boss-shindan-last', top); } catch(e) {}
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
