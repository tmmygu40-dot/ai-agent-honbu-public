<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="仕事のストレス原因を選ぶだけで、笑える言い訳が3パターン生成される無料ツール。ユーモアを交えて気分をリセット。">
  <title>😄 ビジネス言い訳3パターン生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem;
      cursor: pointer;
      user-select: none;
      border-radius: 9px;
      transition: background 0.15s;
    }
    .radio-item:hover {
      background: var(--accent-light);
    }
    .radio-item input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .radio-item .radio-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }

    .excuse-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-transform: uppercase; }
    .excuse-item {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 12px;
      padding: 0.95rem;
      margin-bottom: 0.8rem;
      font-size: 0.96rem;
      color: var(--text);
      line-height: 1.5;
      text-align: left;
    }
    .excuse-item:last-child {
      margin-bottom: 0;
    }
    .excuse-number {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-weight: 700;
      margin-right: 0.6rem;
      font-size: 0.85rem;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>😄 ビジネス言い訳3パターン生成器</h1>
    <p class="subtitle">仕事のストレスを笑いに変えるユーモア生成ツール</p>
  </header>

  <!-- 設問カード -->
  <div class="card">
    <p class="card-title">あなたの今のストレスは？</p>
    <div class="field">
      <label style="margin-bottom: 0.8rem;">以下から選んでください</label>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="stress" value="deadline">
          <span class="radio-text">納期に追われている</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="stress" value="meeting">
          <span class="radio-text">会議が多くて進まない</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="stress" value="email">
          <span class="radio-text">メールが止まらない</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="stress" value="relation">
          <span class="radio-text">人間関係が疲れた</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="stress" value="routine">
          <span class="radio-text">単調作業に疲れた</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="stress" value="boss">
          <span class="radio-text">上司の要求が多い</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generateExcuse()">言い訳を生成！</button>

  <!-- 結果カード -->
  <div class="result-card" id="result" style="border-color: var(--accent); background: var(--accent-light);">
    <p class="excuse-title">その場をしのぐユーモア言い訳</p>
    <div id="excuseContainer"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var excuses = {
    deadline: [
      '納期は目安です。人類は時間の概念をまだ完全には理解していないのです。',
      'デッドラインとの戦いは、武器なき戦争。だから今日のところは休戦協定で...',
      '急いでやったら、事故が起きたでしょう。これは配慮です。品質の配慮ですよ。'
    ],
    meeting: [
      '会議は会議を生む。だから会議に出ることは、社会的な責任を果たしているのです。',
      'あの会議？その会議の報告書のための別の会議だったから...。',
      'いや、確実に進んでます。内面的に。精神的な成長が著しい。'
    ],
    email: [
      'メール返信数こそ、本当の生産性。私は生産性の塊です。',
      'これはリサーチです。業界の動向を逐一チェックすることは戦略なのです。',
      '人間関係構築は、ビジネスの基本。つまり、メール返信は経営活動。'
    ],
    relation: [
      '人間関係は複雑系です。複雑だから難しい。難しいから時間がかかる。論理的ですね。',
      'ストレスは免疫系を鍛えます。つまり、私は今、強くなってる最中です。',
      'あの人は個性が強い。個性を受け入れるのが大人のビジネスマン。修行中です。'
    ],
    routine: [
      'ルーティンワークは禅です。反復することで悟りに近づく。瞑想状態です。',
      '単調作業は効率化のテスト段階。今はデータ収集と自分の限界値測定中。',
      'つまりはね、RPGの経験値稼ぎと同じ。今、着実にレベルアップしてる。'
    ],
    boss: [
      '上司の要求は企業哲学です。従うことで、会社のDNAを受け継いでいるのです。',
      'これは修行。修行だから時間がかかるんです。慈悲深い上司ですから。',
      'あの要求？次の次元へのスキップだと思ってます。意識が高い。'
    ]
  };

  function generateExcuse() {
    var selected = document.querySelector('input[name="stress"]:checked');

    if (!selected) {
      alert('ストレスの原因を選んでください！');
      return;
    }

    var stressType = selected.value;
    var excuseList = excuses[stressType];

    // localStorage に保存
    try {
      var history = JSON.parse(localStorage.getItem('excuseHistory') || '[]');
      history.push({
        type: stressType,
        date: new Date().toLocaleString('ja-JP'),
        excuses: excuseList
      });
      if (history.length > 20) history.shift();
      localStorage.setItem('excuseHistory', JSON.stringify(history));
    } catch (e) {
      // localStorage が使えない場合はスキップ
    }

    // 結果表示
    var container = document.getElementById('excuseContainer');
    container.innerHTML = excuseList.map(function(excuse, index) {
      return '<div class="excuse-item"><span class="excuse-number">' + (index + 1) + '</span>' + excuse + '</div>';
    }).join('');

    var resultCard = document.getElementById('result');
    resultCard.style.display = 'block';

    // ページトップへスクロール
    resultCard.scrollIntoView({ behavior: 'smooth' });
  }

  // エンターキーでも生成できるように
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      generateExcuse();
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
