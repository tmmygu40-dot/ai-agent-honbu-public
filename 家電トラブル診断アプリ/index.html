<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家電トラブル診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリグリッド ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
    }
    .cat-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 0.85rem 0.5rem;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 12px; cursor: pointer;
      font-size: 0.82rem; font-weight: 700; color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn .icon { font-size: 2rem; margin-bottom: 0.3rem; }
    .cat-btn:hover, .cat-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ── 症状リスト ── */
    .symptom-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .symptom-btn {
      padding: 0.8rem 1rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      font-size: 0.9rem; color: var(--text); text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .symptom-btn:hover, .symptom-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:disabled {
      background: #ccc; box-shadow: none; cursor: not-allowed;
    }
    .btn-calc:not(:disabled):active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.75rem;
      font-size: 0.9rem; font-weight: 700;
      background: #fff; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .result-title { font-size: 1.05rem; font-weight: 900; }
    .fav-btn {
      background: none; border: none; font-size: 1.4rem; cursor: pointer;
      padding: 0.2rem; -webkit-tap-highlight-color: transparent;
    }

    .cause-section { margin-bottom: 1.2rem; }
    .cause-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .cause-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      margin-bottom: 0.4rem; font-size: 0.88rem;
    }
    .cause-item .bullet {
      min-width: 1.2rem; width: 1.2rem; height: 1.2rem;
      border-radius: 50%; background: var(--warn-bg); border: 1.5px solid var(--warn);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: var(--warn); margin-top: 0.1rem;
    }

    .action-section { background: var(--ok-bg); border-radius: 10px; padding: 1rem; }
    .action-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--ok); margin-bottom: 0.5rem;
    }
    .action-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      margin-bottom: 0.4rem; font-size: 0.88rem;
    }
    .action-item:last-child { margin-bottom: 0; }
    .action-item .num {
      min-width: 1.4rem; width: 1.4rem; height: 1.4rem;
      border-radius: 50%; background: var(--ok); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; margin-top: 0.05rem;
    }

    .repair-hint {
      margin-top: 0.8rem; padding: 0.7rem 0.9rem;
      background: var(--ng-bg); border: 1px solid var(--ng);
      border-radius: 8px; font-size: 0.8rem; color: var(--ng);
    }

    /* ── ブックマーク ── */
    .bookmarks-section { display: none; }
    .bookmarks-section.show { display: block; }
    .bookmark-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0.5rem; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; cursor: pointer;
    }
    .bookmark-item:last-child { border-bottom: none; }
    .bookmark-item:hover { background: var(--accent-light); }
    .bookmark-item .bm-del {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      color: var(--text-sub); padding: 0.2rem 0.4rem;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 戻るリンク ── */
    .back-link {
      display: block; text-align: center;
      margin-top: 2rem; font-size: 0.82rem;
      color: var(--text-sub); text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 400px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-btn .icon { font-size: 1.6rem; }
    }
  </style>

  /* ─────────────── 状態管理 ─────────────── */
  var selectedCat = null;
  var selectedSymptomIdx = null;

  /* ─────────────── 初期化 ─────────────── */
  function init() {
    var grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    Object.keys(DB).forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.innerHTML = '<span class="icon">' + DB[cat].icon + '</span>' + cat;
      btn.onclick = function() { selectCat(cat, btn); };
      grid.appendChild(btn);
    });
    renderBookmarks();
  }

  function selectCat(cat, btn) {
    // ボタンのアクティブ状態
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');

    selectedCat = cat;
    selectedSymptomIdx = null;

    // 症状リスト表示
    document.getElementById('catName').textContent = DB[cat].icon + ' ' + cat + ' の症状';
    var list = document.getElementById('symptomList');
    list.innerHTML = '';
    DB[cat].symptoms.forEach(function(sym, idx) {
      var sb = document.createElement('button');
      sb.className = 'symptom-btn';
      sb.textContent = sym.s;
      sb.onclick = function() { selectSymptom(idx, sb); };
      list.appendChild(sb);
    });
    document.getElementById('step2-card').style.display = '';
    document.getElementById('diagBtn').disabled = true;

    // 結果を隠す
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('resetBtn').style.display = 'none';
  }

  function selectSymptom(idx, btn) {
    document.querySelectorAll('.symptom-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedSymptomIdx = idx;
    document.getElementById('diagBtn').disabled = false;
  }

  function showResult() {
    if (selectedCat === null || selectedSymptomIdx === null) return;
    var data = DB[selectedCat].symptoms[selectedSymptomIdx];

    document.getElementById('resultTitle').textContent = DB[selectedCat].icon + ' ' + selectedCat + '：' + data.s;

    // 原因
    var causeHTML = data.causes.map(function(c, i) {
      return '<div class="cause-item"><span class="bullet">' + (i+1) + '</span><span>' + c + '</span></div>';
    }).join('');
    document.getElementById('causeList').innerHTML = causeHTML;

    // 対処法
    var actionHTML = data.actions.map(function(a, i) {
      return '<div class="action-item"><span class="num">' + (i+1) + '</span><span>' + a + '</span></div>';
    }).join('');
    document.getElementById('actionList').innerHTML = actionHTML;

    // 修理ヒント
    var rh = document.getElementById('repairHint');
    if (data.repair) {
      rh.textContent = '🛠️ ' + data.repair;
      rh.style.display = '';
    } else {
      rh.style.display = 'none';
    }

    // ブックマークボタン
    updateFavBtn();

    document.getElementById('resultCard').classList.add('show');
    document.getElementById('resetBtn').style.display = '';

    // スクロール
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetAll() {
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    selectedCat = null;
    selectedSymptomIdx = null;
    document.getElementById('step2-card').style.display = 'none';
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('diagBtn').disabled = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ─────────────── ブックマーク ─────────────── */
  var BM_KEY = 'kaden_bm_v1';

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem(BM_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveBookmarks(bms) {
    localStorage.setItem(BM_KEY, JSON.stringify(bms));
  }

  function bmId() {
    return selectedCat + '::' + selectedSymptomIdx;
  }

  function isFaved() {
    return getBookmarks().some(function(b) { return b.id === bmId(); });
  }

  function updateFavBtn() {
    document.getElementById('favBtn').textContent = isFaved() ? '★' : '☆';
  }

  function toggleFav() {
    var bms = getBookmarks();
    var id = bmId();
    var idx = bms.findIndex(function(b) { return b.id === id; });
    if (idx >= 0) {
      bms.splice(idx, 1);
    } else {
      var data = DB[selectedCat].symptoms[selectedSymptomIdx];
      bms.push({ id: id, cat: selectedCat, symIdx: selectedSymptomIdx, label: DB[selectedCat].icon + ' ' + selectedCat + '：' + data.s });
    }
    saveBookmarks(bms);
    updateFavBtn();
    renderBookmarks();
  }

  function renderBookmarks() {
    var bms = getBookmarks();
    var sec = document.getElementById('bmSection');
    var list = document.getElementById('bmList');
    if (bms.length === 0) {
      sec.classList.remove('show');
      return;
    }
    sec.classList.add('show');
    list.innerHTML = bms.map(function(b) {
      return '<div class="bookmark-item" onclick="jumpToBm(\'' + b.id + '\')">'
        + '<span>' + b.label + '</span>'
        + '<button class="bm-del" onclick="delBm(event, \'' + b.id + '\')">✕</button>'
        + '</div>';
    }).join('');
  }

  function jumpToBm(id) {
    var parts = id.split('::');
    var cat = parts[0];
    var symIdx = parseInt(parts[1]);
    // カテゴリボタンを探してクリック
    var catBtns = document.querySelectorAll('.cat-btn');
    var catKeys = Object.keys(DB);
    var catIdx = catKeys.indexOf(cat);
    if (catIdx >= 0 && catBtns[catIdx]) {
      selectCat(cat, catBtns[catIdx]);
      // 少し待ってから症状を選択
      setTimeout(function() {
        var symBtns = document.querySelectorAll('.symptom-btn');
        if (symBtns[symIdx]) {
          selectSymptom(symIdx, symBtns[symIdx]);
          showResult();
        }
      }, 100);
    }
  }

  function delBm(e, id) {
    e.stopPropagation();
    var bms = getBookmarks().filter(function(b) { return b.id !== id; });
    saveBookmarks(bms);
    if (selectedCat !== null && bmId() === id) updateFavBtn();
    renderBookmarks();
  }

  /* ─────────────── 起動 ─────────────── */
  init();
  </script>
