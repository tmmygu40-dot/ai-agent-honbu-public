<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="生年月日と血液型を入れるだけで、あなたの仕事運命タイプと向いている副業ジャンルを楽しく判定する無料診断ツール。副業選びに迷った時の入口にどうぞ。">
  <title>仕事運命タイプ診断｜生年月日と血液型で副業ジャンルが分かる</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .row3 { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 0.6rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 0.5rem; color: var(--accent); }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.55; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>仕事運命タイプ診断</h1>
    <p class="subtitle">生年月日と血液型から、向いている副業ジャンルが分かる ※娯楽診断</p>
  </header>

  <div class="card">
    <p class="card-title">生年月日と血液型を入れて診断</p>
    <div class="field">
      <label>生年月日</label>
      <div class="row3">
        <select id="year"></select>
        <select id="month"></select>
        <select id="day"></select>
      </div>
    </div>
    <div class="field">
      <label for="blood">血液型</label>
      <select id="blood">
        <option value="">選んでください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの仕事運命タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎲 このツールは、生年月日と血液型をもとにした娯楽用の診断アプリです。占いとして気軽にお楽しみください。実際の副業選びは、ご自身の状況や本業との両立可否を踏まえてご判断ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── プルダウン初期化 ──
  (function initSelects(){
    var y = document.getElementById('year');
    var m = document.getElementById('month');
    var d = document.getElementById('day');
    var thisYear = new Date().getFullYear();
    y.innerHTML = '<option value="">年</option>';
    for (var i = thisYear; i >= 1940; i--) {
      y.innerHTML += '<option value="'+i+'">'+i+'年</option>';
    }
    m.innerHTML = '<option value="">月</option>';
    for (var j = 1; j <= 12; j++) {
      m.innerHTML += '<option value="'+j+'">'+j+'月</option>';
    }
    d.innerHTML = '<option value="">日</option>';
    for (var k = 1; k <= 31; k++) {
      d.innerHTML += '<option value="'+k+'">'+k+'日</option>';
    }
  })();

  // ── 血液型ごとの基本タイプ ──
  var BLOOD_TYPE = {
    A:  { name: '堅実プランナー型',     strength: '計画性・誠実さ・継続力', avoid: '勢い任せの即断即決' },
    B:  { name: 'マイペース職人型',     strength: '独自視点・没頭力・発想力', avoid: '同調圧力の強い集団作業' },
    O:  { name: 'リーダー突進型',       strength: '行動力・統率力・突破力',  avoid: '細かい単純作業の長期継続' },
    AB: { name: 'クリエイティブ参謀型', strength: '戦略性・冷静な分析・多才さ', avoid: '感情論で押し切る現場' }
  };

  // ── 生まれ月ごとの副業ジャンル傾向 ──
  function getSeason(month) {
    if (month >= 3 && month <= 5)  return { name: 'クリエイティブ系',  jobs: ['イラスト・LINEスタンプ販売', 'ライティング・ブログ運営', 'ハンドメイド販売'] };
    if (month >= 6 && month <= 8)  return { name: '教育・コーチ系',    jobs: ['オンライン家庭教師', 'スキルシェア講師', 'ライフコーチ'] };
    if (month >= 9 && month <= 11) return { name: '物販・投資系',      jobs: ['フリマアプリ転売', 'ネットショップ運営', '少額積立投資'] };
    return { name: 'IT・デジタル系',  jobs: ['Webサイト制作', 'プログラミング受託', '動画編集・YouTube運営'] };
  }

  // ── 数秘（生年月日合計→1桁化） ──
  function getLuckyNumber(y, m, d) {
    var sum = String(y).split('').concat(String(m).split('')).concat(String(d).split(''))
                .reduce(function(a,b){ return a + Number(b); }, 0);
    while (sum >= 10) {
      sum = String(sum).split('').reduce(function(a,b){ return a + Number(b); }, 0);
    }
    return sum;
  }

  // ── 結論レベル（数秘でちょっと変える、見栄え用） ──
  function getLevel(num) {
    if ([1,3,5,7,9].indexOf(num) >= 0) return 'ok';
    if ([2,4,6].indexOf(num) >= 0)     return 'warn';
    return 'ng';
  }

  function diagnose() {
    var y = parseInt(document.getElementById('year').value, 10);
    var m = parseInt(document.getElementById('month').value, 10);
    var d = parseInt(document.getElementById('day').value, 10);
    var b = document.getElementById('blood').value;

    if (!y || !m || !d || !b) {
      showErr('生年月日と血液型をすべて選んでください');
      return;
    }

    var basic   = BLOOD_TYPE[b];
    var season  = getSeason(m);
    var lucky   = getLuckyNumber(y, m, d);
    var level   = getLevel(lucky);

    var titleText = basic.name + ' × ' + season.name;
    var noteText  = basic.strength + ' を活かせる ' + season.name + ' の副業がおすすめです。';

    showResult(level, titleText, noteText);
    showDetail([
      ['仕事運命タイプ',  basic.name, true],
      ['副業ジャンル',    season.name],
      ['強み',            basic.strength],
      ['おすすめ副業①',  season.jobs[0]],
      ['おすすめ副業②',  season.jobs[1]],
      ['おすすめ副業③',  season.jobs[2]],
      ['避けたい場面',    basic.avoid],
      ['ラッキーナンバー', String(lucky)]
    ]);

    // localStorage 保存
    try {
      localStorage.setItem('shigotoUnmei_v1', JSON.stringify({
        y: y, m: m, d: d, b: b
      }));
    } catch (e) { /* noop */ }
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }

  // ── 起動時：localStorage から復元 ──
  (function restore(){
    try {
      var raw = localStorage.getItem('shigotoUnmei_v1');
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.y) document.getElementById('year').value  = s.y;
      if (s.m) document.getElementById('month').value = s.m;
      if (s.d) document.getElementById('day').value   = s.d;
      if (s.b) document.getElementById('blood').value = s.b;
      if (s.y && s.m && s.d && s.b) {
        diagnose();
      }
    } catch (e) { /* noop */ }
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
