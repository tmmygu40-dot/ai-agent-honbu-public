<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入居者管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>入居者管理</h1>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" data-tab="rooms">部屋・入居者</button>
      <button class="tab" data-tab="rent">家賃確認</button>
    </div>

    <!-- 部屋・入居者タブ -->
    <div id="tab-rooms" class="tab-content active">
      <section class="card">
        <h2>部屋・入居者を登録</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>部屋番号</label>
            <input type="text" id="roomNo" placeholder="例：101">
          </div>
          <div class="form-group">
            <label>入居者名</label>
            <input type="text" id="tenantName" placeholder="例：田中太郎">
          </div>
          <div class="form-group">
            <label>月額家賃（円）</label>
            <input type="number" id="rentAmount" placeholder="例：80000">
          </div>
          <div class="form-group">
            <label>契約開始日</label>
            <input type="date" id="contractStart">
          </div>
          <div class="form-group">
            <label>契約更新日</label>
            <input type="date" id="contractRenew">
          </div>
          <div class="form-group">
            <label>メモ</label>
            <input type="text" id="tenantMemo" placeholder="備考など">
          </div>
        </div>
        <button id="addTenantBtn" class="btn-primary">登録する</button>
      </section>

      <section>
        <h2>入居者一覧</h2>
        <div id="tenantList" class="tenant-list"></div>
      </section>
    </div>

    <!-- 家賃確認タブ -->
    <div id="tab-rent" class="tab-content">
      <section class="card">
        <h2>家賃確認月</h2>
        <div class="month-selector">
          <button id="prevMonth" class="btn-icon">&#9664;</button>
          <span id="currentMonthLabel"></span>
          <button id="nextMonth" class="btn-icon">&#9654;</button>
        </div>
      </section>
      <section>
        <div id="rentList" class="rent-list"></div>
      </section>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>入居者を編集</h2>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-group">
          <label>部屋番号</label>
          <input type="text" id="editRoomNo">
        </div>
        <div class="form-group">
          <label>入居者名</label>
          <input type="text" id="editTenantName">
        </div>
        <div class="form-group">
          <label>月額家賃（円）</label>
          <input type="number" id="editRentAmount">
        </div>
        <div class="form-group">
          <label>契約開始日</label>
          <input type="date" id="editContractStart">
        </div>
        <div class="form-group">
          <label>契約更新日</label>
          <input type="date" id="editContractRenew">
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="editMemo">
        </div>
      </div>
      <div class="modal-buttons">
        <button id="saveEditBtn" class="btn-primary">保存</button>
        <button id="cancelEditBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
