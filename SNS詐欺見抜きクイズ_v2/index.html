<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ SNS詐欺見抜きクイズ</title>
  <meta name="description" content="詐欺メール・フィッシング詐欺の手口を10問で学べるクイズです。実際の事例をベースにした問題で詐欺対策スキルが身につきます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── クイズカード ── */
    .quiz-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .quiz-number { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .quiz-question { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; line-height: 1.5; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
    .option-label {
      display: flex; align-items: flex-start; gap: 0.8rem;
      padding: 0.8rem; border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-label:hover { background: var(--accent-light); border-color: var(--accent); }
    .option-radio { width: 20px; height: 20px; min-width: 20px; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
    .option-text { font-size: 0.95rem; color: var(--text); line-height: 1.4; }
    .option-label input[type="radio"]:checked ~ .option-text { font-weight: 600; color: var(--accent); }

    /* ── 解説 ── */
    .explanation {
      display: none; padding: 0.9rem; margin-top: 0.8rem;
      background: #f9f7f4; border-left: 4px solid var(--accent);
      border-radius: 6px; font-size: 0.9rem; line-height: 1.6; color: var(--text-sub);
    }
    .explanation.show { display: block; }

    /* ── 進捗 ── */
    .progress-bar {
      width: 100%; max-width: 600px;
      height: 8px; margin: 0 auto 1rem;
      background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s;
    }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .quiz-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── スマホ対応 ── */
    @media (max-width: 600px) {
      .app-header h1 { font-size: 1rem; }
      .card, .quiz-card, .result-card { padding: 1rem; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🛡️ SNS詐欺見抜きクイズ</h1>
    <p class="subtitle">詐欺メール・フィッシング詐欺の手口を10問で学べます。クイズで楽しく詐欺対策スキルを身につけられます。</p>
  </header>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div id="quiz-container"></div>

  <button class="btn-calc" id="submitBtn" onclick="submitAnswer()">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">クイズ完了</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 結果詳細 -->
  <div class="card" id="resultDetail" style="display:none">
    <p class="card-title">結果詳細</p>
    <div id="resultList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは警察庁・IPA（情報処理推進機構）などの公開資料や信頼できるデータを参考に、2026年4月時点の詐欺事例をベースにしています。最新情報は公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script src="../related-widget.js"></script>
  <script src="../fav-widget.js"></script>

  <script>
    // クイズ問題定義（10問：4択）
    const QUIZ_QUESTIONS = [
      {
        q: "以下のメールで詐欺の可能性が最も高いのはどれ？",
        options: [
          "公式サイトのメールアドレスから、アカウント確認メールが送られてきた",
          "銀行名を名乗り『24時間以内に本人確認をしてください』と同じドメインメールで連絡",
          "送信元メールが『noreply@xxxx.co.jp』で、URLをクリックしてパスワード確認を求める",
          "友人のメールアドレスから日常会話でいつものような文体で来た"
        ],
        answer: 2,
        explanation: "本物の銀行は同一ドメインから緊急連絡することはなく、メール内のリンク経由で個人情報を求めません。特に『24時間以内』という期限を付けるのはフィッシング詐欺の典型手口です。"
      },
      {
        q: "フィッシング詐欺メール対策として最も効果的なのは？",
        options: [
          "メールのリンクは絶対にクリックせず、ブラウザのアドレスバーに直接URLを入力",
          "添付ファイルを開く前に送信元に確認する",
          "メール内に『確認してください』という言葉があれば疑う",
          "迷惑メールフォルダに入れて放置する"
        ],
        answer: 0,
        explanation: "メール内のリンクをクリックすると偽サイトに誘導されます。銀行やサービスを利用する際は、必ずブラウザのアドレスバーに直接URLを入力して正規サイトにアクセスしましょう。"
      },
      {
        q: "SNS上で出会った人から『副業で稼げる』と投資を誘われました。以下の対応で最適なのは？",
        options: [
          "利益が魅力的だから少額でも試してみる",
          "友人に相談してから参加するか決める",
          "急ぐ理由がないので参加しない。詐欺の可能性が高い",
          "公式サイトが立派だから信頼できると判断する"
        ],
        answer: 2,
        explanation: "SNS経由の投資勧誘は詐欺の典型パターン。『今だけ』『限定』『稼げる』という言葉は危険信号です。正規投資は信頼できる金融機関を通じて行いましょう。"
      },
      {
        q: "フリマアプリで『先に代金を銀行振込で。商品は後で発送』と言われました。どう対応すべき？",
        options: [
          "相手を信頼して先に振込する",
          "アプリの決済機能を使わず、銀行振込で対応する",
          "先に振込はせず、アプリの決済・フリマ用決済機能のみを使う",
          "現金書留で送金する"
        ],
        answer: 2,
        explanation: "フリマアプリ外での取引や先払いは詐欺リスクが高いです。必ずアプリの決済機能を利用して、買い手・売り手の両者が保護される状態で取引しましょう。"
      },
      {
        q: "『あなたのアカウントが不正アクセスされました。以下のURLで確認してください』というメールが来ました。正しい対応は？",
        options: [
          "URLをクリックしてすぐに確認する",
          "メールのURLはクリックせず、公式サイトやアプリから直接ログインして確認",
          "パスワードをメールで返信する",
          "電話で相手に確認する"
        ],
        answer: 1,
        explanation: "不正アクセス警告メールはフィッシング詐欺の常套手段です。メール内のURLは絶対にクリックせず、公式サイトやアプリから直接ログインして確認してください。"
      },
      {
        q: "届いたメールが本物か偽物か判断する最も確実な方法は？",
        options: [
          "送信元の名前や会社ロゴで判断",
          "送信元のメールアドレスドメイン部分（@以降）を確認",
          "メール内容が詳しく書かれていたら本物と判断",
          "返信メールで確認する"
        ],
        answer: 1,
        explanation: "メールアドレスのドメイン（@以降）を確認することが重要です。『support@bankname.com』が本物でも『support@bankname-check.com』なら偽物の可能性があります。必ず公式サイトで確認しましょう。"
      },
      {
        q: "スマホに『ウイルスが見つかりました。クリックして削除してください』と通知が出ました。対応は？",
        options: [
          "すぐにクリックしてウイルス削除する",
          "アプリストア内で信頼できるセキュリティアプリをインストール",
          "通知を無視して、別のセキュリティアプリをインストール",
          "メモして後で対応する"
        ],
        answer: 2,
        explanation: "ブラウザの警告ポップアップはほぼすべて詐欺です。クリックすると悪質なアプリをインストールさせられます。無視して、正規のアプリストアから信頼できるセキュリティアプリをインストールしましょう。"
      },
      {
        q: "親友からLINEで『お金に困ってる。振込してくれない？』と来ました。本当かどうか確認する最善策は？",
        options: [
          "LINEのメッセージのみで判断して振込",
          "親友のLINE IDを複数回確認してから振込",
          "音声通話や直接連絡で本人確認をしてから対応",
          "SNSで『誰か困ってますか？』と投稿して確認"
        ],
        answer: 2,
        explanation: "『なりすまし詐欺』は友人のアカウントを乗っ取ってメッセージを送ります。お金の話が出たら、LINEではなく電話や直接会って、確実に本人であることを確認してから対応しましょう。"
      },
      {
        q: "公式を装ったSMSで『限定セール開始。30分以内にアクセス』とURLが送られてきました。どうする？",
        options: [
          "期間限定なのでクリックしてアクセス",
          "URLをクリックせず、公式アプリやサイトで確認",
          "パスワードをSMS返信で送る",
          "友人に聞いてから決める"
        ],
        answer: 1,
        explanation: "『30分以内』『限定』『今だけ』という期限付きは詐欺の典型です。SMS内のURLをクリックすると個人情報を盗まれたり、悪質なアプリをインストールされたりします。公式サイトやアプリから直接確認しましょう。"
      },
      {
        q: "クレジットカード利用明細に『身に覚えのない請求』がありました。正しい対応は？",
        options: [
          "放置して次月の明細を待つ",
          "カード会社のカスタマーサービス（公式サイト記載の電話番号）に電話",
          "メールで来た『カード会社からの通知』のリンクで確認",
          "新しいカード番号を設定し直す"
        ],
        answer: 1,
        explanation: "不正請求に気付いたら、すぐにカード会社の公式サイトに記載されている電話番号に連絡してください。メール内のリンクをクリックするのは危険です。カード会社は電話での確認を求めます。"
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answers = [];

    function initQuiz() {
      loadSaved();
      renderQuestion();
    }

    function renderQuestion() {
      const container = document.getElementById('quiz-container');
      container.innerHTML = '';

      if (currentQuestion < QUIZ_QUESTIONS.length) {
        const q = QUIZ_QUESTIONS[currentQuestion];
        const html = `
          <div class="quiz-card">
            <div class="quiz-number">問 ${currentQuestion + 1} / 10</div>
            <div class="quiz-question">${q.q}</div>
            <div class="quiz-options">
              ${q.options.map((opt, i) => `
                <label class="option-label">
                  <input type="radio" name="option" value="${i}" class="option-radio" onchange="selectOption(${i})">
                  <span class="option-text">${opt}</span>
                </label>
              `).join('')}
            </div>
            <div class="explanation" id="explanation"></div>
          </div>
        `;
        container.innerHTML = html;

        const submitBtn = document.getElementById('submitBtn');
        const savedAnswer = answers[currentQuestion];
        if (savedAnswer !== undefined) {
          document.querySelector(`input[value="${savedAnswer}"]`).checked = true;
          showExplanation(savedAnswer === QUIZ_QUESTIONS[currentQuestion].answer);
          submitBtn.textContent = currentQuestion === QUIZ_QUESTIONS.length - 1 ? '結果を表示' : '次の問題へ';
        } else {
          submitBtn.textContent = '次の問題へ';
          submitBtn.disabled = true;
        }

        updateProgress();
      } else {
        showFinalResult();
      }
    }

    function selectOption(idx) {
      document.getElementById('submitBtn').disabled = false;
    }

    function showExplanation(correct) {
      const q = QUIZ_QUESTIONS[currentQuestion];
      const exDiv = document.getElementById('explanation');
      exDiv.classList.add('show');
      exDiv.innerHTML = `
        <strong>${correct ? '✅ 正解！' : '❌ 不正解'}</strong><br>${q.explanation}
      `;
    }

    function submitAnswer() {
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) return;

      const answerIdx = parseInt(selected.value);
      const q = QUIZ_QUESTIONS[currentQuestion];
      const correct = answerIdx === q.answer;

      answers[currentQuestion] = answerIdx;
      if (correct) score++;

      if (!document.getElementById('explanation').classList.contains('show')) {
        showExplanation(correct);
        document.getElementById('submitBtn').textContent = currentQuestion === QUIZ_QUESTIONS.length - 1 ? '結果を表示' : '次へ';
        return;
      }

      currentQuestion++;
      if (currentQuestion < QUIZ_QUESTIONS.length) {
        renderQuestion();
      } else {
        showFinalResult();
      }
      saveSaved();
    }

    function updateProgress() {
      const pct = ((currentQuestion + 1) / QUIZ_QUESTIONS.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function showFinalResult() {
      document.getElementById('quiz-container').innerHTML = '';
      document.getElementById('submitBtn').style.display = 'none';

      const pct = Math.round((score / QUIZ_QUESTIONS.length) * 100);
      const level = pct >= 80 ? 'ok' : pct >= 60 ? 'warn' : 'ng';
      const levelLabel = level === 'ok' ? '詐欺対策上級者！' : level === 'warn' ? '詐欺対策は要強化' : '詐欺対策初心者です';

      document.getElementById('result').classList.add(level);
      document.getElementById('result').style.display = 'block';
      document.getElementById('rv').textContent = `${score} / 10 (${pct}%)`;
      document.getElementById('rn').textContent = levelLabel;

      // 結果詳細
      const detailHtml = answers.map((ans, i) => {
        const q = QUIZ_QUESTIONS[i];
        const correct = ans === q.answer;
        return `
          <div style="padding:0.8rem 0; border-bottom:1px solid var(--border);">
            <strong style="color:${correct ? '#15803d' : '#b91c1c'}">${correct ? '✅' : '❌'} 問${i+1}</strong><br>
            <small style="color:var(--text-sub);">${correct ? '正解' : '不正解'}: ${q.options[ans]}</small>
          </div>
        `;
      }).join('');

      document.getElementById('resultDetail').innerHTML = `<p class="card-title">結果詳細</p>${detailHtml}`;
      document.getElementById('resultDetail').style.display = 'block';

      updateProgress();
      saveSaved();
      localStorage.removeItem('quiz_progress_v2');
    }

    function saveSaved() {
      const data = {
        currentQuestion,
        score,
        answers,
        timestamp: new Date().toISOString()
      };
      localStorage.setItem('quiz_progress_v2', JSON.stringify(data));
    }

    function loadSaved() {
      const data = localStorage.getItem('quiz_progress_v2');
      if (data) {
        const obj = JSON.parse(data);
        currentQuestion = obj.currentQuestion || 0;
        score = obj.score || 0;
        answers = obj.answers || [];
      }
    }

    // 初期化
    window.addEventListener('load', initQuiz);
  </script>

</body>
</html>
