      margin: 0 auto 1rem;

    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #a02060, 0 2px 8px rgba(214,51,132,0.2);
    }

    /* ── メッセージカード ── */

    .msg-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.2rem 0.9rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .msg-num {
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .msg-text {
      font-size: 0.95rem; line-height: 1.75;
      color: var(--text); white-space: pre-wrap;
      margin-bottom: 0.8rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.45rem 1.1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);

      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }

    var pool = BANK[relation][tone];
    var suffix = AGE_PREFIX[age][relation] || '';

    // 3パターンをランダムで選ぶ（重複なし）
    var indices = shuffleIndices(pool.length);
    var picked = [indices[0], indices[1], indices[2]];

    for (var i = 0; i < 3; i++) {
      var msg = pool[picked[i]] + suffix;
      document.getElementById('m' + (i + 1)).textContent = msg;
      // コピーボタンをリセット
      var btn = document.getElementById('mc' + (i + 1)).querySelector('.btn-copy');
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }

    var area = document.getElementById('msg-area');
    area.style.display = 'block';
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function shuffleIndices(len) {
    var arr = [];
    for (var i = 0; i < len; i++) arr.push(i);
    for (var j = arr.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = arr[j]; arr[j] = arr[k]; arr[k] = tmp;
    }
    return arr;
  }

  function copyMsg(num) {
    var text = document.getElementById('m' + num).textContent;
    var btn = document.getElementById('mc' + num).querySelector('.btn-copy');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✅ コピーしました';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '📋 コピー';
          btn.classList.remove('copied');
        }, 2000);
      });
    } else {
      // フォールバック
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピー';
        btn.classList.remove('copied');
      }, 2000);
    }
  }

  // ページ読み込み時に前回の選択を復元
  (function() {
    var r = localStorage.getItem('mdmg_relation');
    var a = localStorage.getItem('mdmg_age');
    var t = localStorage.getItem('mdmg_tone');
    if (r) document.getElementById('relation').value = r;
    if (a) document.getElementById('age').value = a;
    if (t) document.getElementById('tone').value = t;
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
