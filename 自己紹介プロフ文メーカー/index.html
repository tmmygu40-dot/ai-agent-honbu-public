<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介プロフ文メーカー｜職業と趣味から3パターン即生成</title>
  <meta name="description" content="職業と趣味を入れるだけで、SNSプロフィール文を3パターン（カジュアル／真面目／クリエイター）即生成。コピーしてそのまま貼れる無料ツールです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード（プロフ文1パターン分） ── */
    .prof-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .prof-card .prof-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 0.6rem;
    }
    .prof-card .prof-text {
      font-size: 0.96rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 0.9rem;
      padding: 0.8rem 0.9rem;
      background: var(--bg);
      border-radius: 10px;
    }
    .prof-card .btn-copy {
      display: block; width: 100%;
      padding: 0.7rem; font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .prof-card .btn-copy:active { background: var(--accent); color: #fff; }
    .prof-card .btn-copy.copied {
      background: var(--ok); color: #fff; border-color: var(--ok);
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem; background: var(--ng-bg);
      color: var(--ng); border: 1.5px solid var(--ng);
      border-radius: 10px; font-size: 0.9rem; font-weight: 600;
      text-align: center;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .prof-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>自己紹介プロフ文メーカー</h1>
    <p class="subtitle">職業と趣味を入れるだけで、SNS用プロフ文を3パターン即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="job">職業・肩書き</label>
      <input type="text" id="job" placeholder="例: Webデザイナー、保育士、学生 など" maxlength="40">
      <p class="hint">空欄でも生成できます（その場合は職業ぼかし表現になります）</p>
    </div>
    <div class="field">
      <label for="hobby">趣味・好きなこと（カンマ区切りで複数OK）</label>
      <input type="text" id="hobby" placeholder="例: カフェ巡り, 読書, 推し活" maxlength="80">
      <p class="hint">3つくらいまでが自然に収まります</p>
    </div>
    <div class="field">
      <label for="extra">ひとこと添えたいこと（任意）</label>
      <input type="text" id="extra" placeholder="例: 関西在住 / 30代 / フォロバ100% など" maxlength="40">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="err" class="err-msg" style="display:none"></div>

  <!-- 結果（3枚） -->
  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 生成される文章は入力をもとに自動で組み合わせた目安です。SNSの利用規約や個人情報の扱いには各自ご注意ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── localStorage キー ──
  var LS_KEY = 'profMakerInputs_v1';

  // ── テンプレ定義 ──
  // {job} 職業 / {hobbies} 趣味リスト整形済 / {hobby1} 1つ目 / {extra} ひとこと
  var TEMPLATES = {
    casual: [
      'こんにちは！{job}してます🌿\n{hobbies}が好きで、毎日ちょっとずつ更新中です。\n{extra}気軽にフォローしてください〜',
      '{job}やってます😊\n{hobby1}の沼にハマり中。\n好きなものをゆるゆる発信していきます🌸 {extra}',
      '{job}の中の人。{hobbies}が日々の楽しみ。\nあと、おいしいものに弱いです🍰 {extra}'
    ],
    serious: [
      '{job}として活動しています。{hobbies}を通じて新しい視点を広げたいと思っています。{extra}よろしくお願いいたします。',
      '{job} ｜ {hobbies}\n日々の気づきや学びを丁寧に発信していきます。{extra}',
      '{job}に従事。趣味は{hobbies}。\n気になった情報は積極的にシェアしていきます。{extra}どうぞよろしくお願いします。'
    ],
    creative: [
      '⊹ {job} ⊹ {hobbies}愛好家\n好きを集めて、世界をちょっと面白くする人。{extra}',
      '#{jobTag} ／ {hobbies}にとり憑かれている\n好きなものは、たぶん全部好き。{extra}',
      '{job}という名のオタク。{hobby1}が今いちばんの推し。\n気になったものは全部触れてみたい。{extra}'
    ]
  };

  var STYLE_LABELS = {
    casual:   'カジュアル・親しみ系',
    serious:  '丁寧・きちんと系',
    creative: 'クリエイター・個性系'
  };

  // ── 起動時：保存された入力を復元 ──
  (function restore() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (saved.job)    document.getElementById('job').value = saved.job;
      if (saved.hobby)  document.getElementById('hobby').value = saved.hobby;
      if (saved.extra)  document.getElementById('extra').value = saved.extra;
    } catch (e) { /* ignore */ }
  })();

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function joinHobbies(list) {
    if (list.length === 0) return 'いろいろなこと';
    if (list.length === 1) return list[0];
    if (list.length === 2) return list[0] + 'と' + list[1];
    return list.slice(0, -1).join('・') + '・' + list[list.length - 1];
  }

  function fillTemplate(tpl, ctx) {
    return tpl
      .replace(/\{job\}/g,     ctx.job)
      .replace(/\{jobTag\}/g,  ctx.jobTag)
      .replace(/\{hobbies\}/g, ctx.hobbies)
      .replace(/\{hobby1\}/g,  ctx.hobby1)
      .replace(/\{extra\}/g,   ctx.extra);
  }

  function generate() {
    var jobRaw   = document.getElementById('job').value.trim();
    var hobbyRaw = document.getElementById('hobby').value.trim();
    var extraRaw = document.getElementById('extra').value.trim();

    if (!hobbyRaw && !jobRaw) {
      showErr('職業または趣味のどちらかは入力してください');
      return;
    }
    hideErr();

    // localStorage 保存
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        job: jobRaw, hobby: hobbyRaw, extra: extraRaw
      }));
    } catch (e) { /* ignore */ }

    // 入力整形
    var hobbyList = hobbyRaw
      .split(/[,、，]/)
      .map(function (s) { return s.trim(); })
      .filter(function (s) { return s.length > 0; });

    var ctx = {
      job:     jobRaw || 'なにか作ったり考えたりする人',
      jobTag:  (jobRaw || '雑記').replace(/\s+/g, ''),
      hobbies: joinHobbies(hobbyList),
      hobby1:  hobbyList[0] || 'いろいろなこと',
      extra:   extraRaw ? (extraRaw + ' ／ ') : ''
    };

    // 各スタイル1案ずつ
    var styles = ['casual', 'serious', 'creative'];
    var html = '';
    styles.forEach(function (style, idx) {
      var tpl = pick(TEMPLATES[style]);
      var text = fillTemplate(tpl, ctx).trim();
      // extra が空のときに残った ／ を整える
      text = text.replace(/\s*\/\s*$/g, '').replace(/\s*／\s*$/g, '').trim();

      var safe = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html += '<div class="prof-card">'
            + '<p class="prof-label">' + STYLE_LABELS[style] + '</p>'
            + '<div class="prof-text" id="ptxt-' + idx + '">' + safe + '</div>'
            + '<button class="btn-copy" onclick="copyText(' + idx + ', this)">📋 この文をコピー</button>'
            + '</div>';
    });

    document.getElementById('results').innerHTML = html;

    // 結果まで自然にスクロール
    setTimeout(function () {
      var first = document.querySelector('.prof-card');
      if (first && first.scrollIntoView) {
        first.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 50);
  }

  function copyText(idx, btn) {
    var el = document.getElementById('ptxt-' + idx);
    if (!el) return;
    var text = el.innerText;

    var done = function () {
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function () {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1600);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }

    function fallback() {
      try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done();
      } catch (e) {
        alert('コピーに失敗しました。長押しで手動コピーしてください。');
      }
    }
  }

  function showErr(msg) {
    var e = document.getElementById('err');
    e.textContent = msg;
    e.style.display = 'block';
    document.getElementById('results').innerHTML = '';
  }
  function hideErr() {
    document.getElementById('err').style.display = 'none';
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
