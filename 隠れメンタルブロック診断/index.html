<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隠れメンタルブロック診断｜5問で分かるあなたの心のブレーキ</title>
  <meta name="description" content="5つの質問に答えるだけで、無意識に自分を縛っている「隠れメンタルブロック」のタイプが分かる無料診断。完璧主義・自己犠牲など、あなたの心のブレーキと解放ヒントを即表示します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; padding-bottom: 1.1rem; border-bottom: 1px solid var(--border); }
    .q-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.7rem; }
    .opt {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.7rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer;
      font-size: 0.9rem; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; margin: 0.8rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.shown { display: block; border-color: var(--accent); background: var(--accent-light); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; }
    .result-note strong { color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>隠れメンタルブロック診断</h1>
    <p class="subtitle">5問で暴く、あなたが無意識にかけている「心のブレーキ」のタイプ</p>
  </header>

  <div class="card">
    <p class="card-title">5つの質問</p>
    <div id="quiz"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの隠れメンタルブロック</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <button class="btn-reset" onclick="resetQuiz()">もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断は、心理学・カウンセリング分野で広く知られるメンタルブロックの傾向（完璧主義・自己犠牲・回避・承認欲求・自己否定）を参考に、簡易セルフチェック用として整理しています。医療・心理治療の代替ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    perfect: {
      name: '完璧主義型ブロック',
      note: '<strong>特徴：</strong>「100点じゃないなら出さない」と考えがち。準備が整うまで動けず、機会を逃しやすいタイプ。<br><br><strong>解放のヒント：</strong>「70点で出して、後から直す」を口グセにしてみよう。完璧な準備より、不完全な行動の方が結果に近づきます。'
    },
    sacrifice: {
      name: '自己犠牲型ブロック',
      note: '<strong>特徴：</strong>自分の希望より他人の都合を優先しがち。気づくと疲れていて、誰のための人生か分からなくなるタイプ。<br><br><strong>解放のヒント：</strong>1日1回、自分のためだけの選択をする。「私はどうしたい？」を3秒だけ考える習慣が、心の主導権を取り戻します。'
    },
    avoid: {
      name: '恐れ回避型ブロック',
      note: '<strong>特徴：</strong>失敗・批判・拒絶を想像して動けなくなるタイプ。「やらなければ傷つかない」が口グセになっていることも。<br><br><strong>解放のヒント：</strong>「最悪のシナリオ」を紙に書き出してみよう。文字にすると、想像より小さく見えてきます。怖さは行動の前にだけ大きく見える。'
    },
    approval: {
      name: '承認欲求型ブロック',
      note: '<strong>特徴：</strong>他人の評価で自分の価値を測ってしまうタイプ。SNSの反応・人の表情に一喜一憂し、本音が分からなくなりがち。<br><br><strong>解放のヒント：</strong>「自分が自分を褒める」習慣を1日1つ。他人からの「いいね」より、自分への「OK」が一番の栄養になります。'
    },
    deny: {
      name: '自己否定型ブロック',
      note: '<strong>特徴：</strong>「私なんて」「どうせ無理」が口グセになっているタイプ。チャンスが来ても自分を信じられず、最初から諦めてしまいがち。<br><br><strong>解放のヒント：</strong>過去にできた小さなことを3つメモしてみよう。自己否定は「今の感情」であって「事実」ではありません。'
    }
  };

  var QUIZ = [
    {
      q: 'Q1. 新しいことを始めるとき、最初に頭に浮かぶのは？',
      opts: [
        { t: '完璧に準備してから始めたい', s: 'perfect' },
        { t: '失敗したらどうしようと不安', s: 'avoid' },
        { t: '人にどう思われるか気になる', s: 'approval' }
      ]
    },
    {
      q: 'Q2. 自分の希望と他人の希望がぶつかったら？',
      opts: [
        { t: '相手に合わせることが多い', s: 'sacrifice' },
        { t: '自分の意見を引っ込めて様子見', s: 'avoid' },
        { t: '嫌われたくないから譲る', s: 'approval' }
      ]
    },
    {
      q: 'Q3. 良いことが起きたとき、最初に思うのは？',
      opts: [
        { t: 'たまたまだろう、自分の力じゃない', s: 'deny' },
        { t: 'もっと頑張らないと釣り合わない', s: 'perfect' },
        { t: '誰かに褒められたい・認められたい', s: 'approval' }
      ]
    },
    {
      q: 'Q4. 疲れていても、つい優先してしまうのは？',
      opts: [
        { t: '家族や周りの人の用事', s: 'sacrifice' },
        { t: 'やり残しの仕事や家事を完璧に', s: 'perfect' },
        { t: '誰かの期待に応えること', s: 'approval' }
      ]
    },
    {
      q: 'Q5. 「やってみたいけどできない」と感じる理由は？',
      opts: [
        { t: '自分には才能・資格がないから', s: 'deny' },
        { t: '失敗して傷つくのが怖いから', s: 'avoid' },
        { t: '今の生活や周りの人を犠牲にできない', s: 'sacrifice' }
      ]
    }
  ];

  function renderQuiz() {
    var html = QUIZ.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt"><input type="radio" name="q' + i + '" value="' + o.s + '"><span>' + o.t + '</span></label>';
      }).join('');
      return '<div class="q-block"><p class="q-text">' + q.q + '</p>' + opts + '</div>';
    }).join('');
    document.getElementById('quiz').innerHTML = html;
  }

  function diagnose() {
    var score = { perfect: 0, sacrifice: 0, avoid: 0, approval: 0, deny: 0 };
    var unanswered = 0;
    for (var i = 0; i < QUIZ.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered++; continue; }
      score[sel.value]++;
    }
    if (unanswered > 0) {
      alert('未回答の質問が ' + unanswered + ' 問あります。すべて答えてください。');
      return;
    }
    var topKey = 'perfect', topVal = -1;
    for (var k in score) {
      if (score[k] > topVal) { topVal = score[k]; topKey = k; }
    }
    var result = TYPES[topKey];
    var rc = document.getElementById('result');
    rc.classList.add('shown');
    document.getElementById('rv').textContent = result.name;
    document.getElementById('rn').innerHTML = result.note;
    try { localStorage.setItem('hidden_mental_block_last', topKey); } catch(e) {}
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetQuiz() {
    var radios = document.querySelectorAll('input[type="radio"]');
    for (var i = 0; i < radios.length; i++) radios[i].checked = false;
    document.getElementById('result').classList.remove('shown');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
