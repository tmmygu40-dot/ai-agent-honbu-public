<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ジャンルや世界観を選ぶだけで、8bitRPG風タイトル画面のAI画像生成プロンプト（英語）をワンタップ生成・コピーできるツールです。">
  <title>AI画像呪文ジェネレーター 8bitRPG風</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード（プロンプト表示） ── */
    .result-card {
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px;
      padding: 1rem; font-size: 0.92rem; line-height: 1.6; color: var(--text);
      word-break: break-word; min-height: 80px; margin-bottom: 0.8rem;
      white-space: pre-wrap;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.8; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── お気に入りリスト ── */
    .fav-list-item {
      display: flex; gap: 0.5rem; align-items: flex-start;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
    }
    .fav-list-item:last-child { border-bottom: none; }
    .fav-text { flex: 1; font-size: 0.82rem; color: var(--text); line-height: 1.5; word-break: break-word; cursor: pointer; }
    .fav-text:hover { color: var(--accent); }
    .fav-del {
      flex-shrink: 0; width: 28px; height: 28px;
      background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng);
      border-radius: 6px; font-size: 0.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── ランダムボタン ── */
    .btn-random {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.6rem; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-random:hover { background: var(--accent-light); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-random, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎮 AI画像呪文ジェネレーター 8bitRPG風</h1>
    <p class="subtitle">ジャンルや世界観を選ぶだけで、レトロRPGなタイトル画面プロンプトを一発生成!</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">設定を選ぶ</p>
    <div class="field">
      <label for="genre">ジャンル</label>
      <select id="genre">
        <option value="fantasy">ファンタジー</option>
        <option value="sci-fi">SF・宇宙</option>
        <option value="horror">ホラー・ダーク</option>
        <option value="japanese">和風・侍</option>
        <option value="steampunk">スチームパンク</option>
        <option value="pirate">海賊・冒険</option>
        <option value="post-apocalyptic">ポストアポカリプス</option>
        <option value="mythology">神話・伝説</option>
      </select>
    </div>
    <div class="field">
      <label for="hero">主人公タイプ</label>
      <select id="hero">
        <option value="warrior">戦士・剣士</option>
        <option value="mage">魔法使い</option>
        <option value="thief">盗賊・忍者</option>
        <option value="knight">騎士・聖騎士</option>
        <option value="ranger">弓使い・レンジャー</option>
        <option value="dragon-rider">竜騎士</option>
        <option value="robot">メカ・ロボット</option>
        <option value="princess">姫・王族</option>
      </select>
    </div>
    <div class="field">
      <label for="bg">背景シーン</label>
      <select id="bg">
        <option value="castle">城・城門</option>
        <option value="dungeon">ダンジョン・洞窟</option>
        <option value="forest">森・大樹</option>
        <option value="volcano">火山・溶岩</option>
        <option value="ocean">海・港町</option>
        <option value="sky">空・浮遊大陸</option>
        <option value="ruins">遺跡・廃墟</option>
        <option value="mountain">雪山・氷の城</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="classic">クラシック（緑・茶）</option>
        <option value="neon">ネオン（ピンク・青）</option>
        <option value="sepia">セピア・レトロ</option>
        <option value="dark">ダーク（黒・紫）</option>
        <option value="pastel">パステル（淡い色合い）</option>
        <option value="gameboy">ゲームボーイ（緑4色）</option>
        <option value="sunset">サンセット（橙・赤）</option>
        <option value="ice">アイス（水色・白）</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="epic">壮大・史詩的</option>
        <option value="mysterious">神秘的</option>
        <option value="cute">かわいい・ポップ</option>
        <option value="dark">ダーク・不気味</option>
        <option value="nostalgic">懐かしい・ノスタルジック</option>
        <option value="action">アクション・激しい</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加要素（任意）</label>
      <select id="extra">
        <option value="">なし</option>
        <option value="dragon">ドラゴン</option>
        <option value="treasure">宝箱</option>
        <option value="moon">月・星空</option>
        <option value="magic-circle">魔法陣</option>
        <option value="sword">伝説の剣</option>
        <option value="pet">お供モンスター</option>
        <option value="airship">飛空艇</option>
      </select>
    </div>
  </div>

  <!-- ランダムボタン -->
  <button class="btn-random no-print" onclick="randomize()">🎲 ランダムで決める</button>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🪄 プロンプトを生成する</button>

  <!-- プロンプト結果 -->
  <div class="result-card" id="result" style="display:none">
    <p class="result-label">生成されたプロンプト（英語）</p>
    <div class="prompt-output" id="prompt-text"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">📋 コピーする</button>
    <button class="btn-copy no-print" style="margin-top:0.5rem; background:var(--accent);" onclick="saveFav()">⭐ お気に入りに保存</button>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="fav-card" style="display:none">
    <p class="card-title">お気に入りプロンプト</p>
    <div id="fav-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 生成されるプロンプトはAI画像生成サービス（Midjourney, Stable Diffusion, DALL-E等）での使用を想定しています。サービスごとに最適なフォーマットが異なる場合があります。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── データ定義 ── */
  var DATA = {
    genre: {
      'fantasy':          { en: 'high fantasy RPG', kw: 'enchanted kingdom, magical realm' },
      'sci-fi':           { en: 'sci-fi space RPG', kw: 'starship, galactic frontier, neon lights' },
      'horror':           { en: 'dark horror RPG', kw: 'cursed land, eerie fog, haunted atmosphere' },
      'japanese':         { en: 'Japanese samurai RPG', kw: 'torii gate, cherry blossoms, katana' },
      'steampunk':        { en: 'steampunk adventure RPG', kw: 'gears, brass machinery, airship dock' },
      'pirate':           { en: 'pirate adventure RPG', kw: 'treasure map, pirate ship, ocean waves' },
      'post-apocalyptic': { en: 'post-apocalyptic RPG', kw: 'ruined city, overgrown vegetation, survival' },
      'mythology':        { en: 'mythological epic RPG', kw: 'ancient gods, divine temple, legendary artifacts' }
    },
    hero: {
      'warrior':      { en: 'brave warrior wielding a sword' },
      'mage':         { en: 'powerful mage casting a spell' },
      'thief':        { en: 'agile thief with twin daggers' },
      'knight':       { en: 'noble knight in shining armor' },
      'ranger':       { en: 'skilled ranger with a longbow' },
      'dragon-rider': { en: 'fearless dragon rider' },
      'robot':        { en: 'mechanical robot hero with glowing eyes' },
      'princess':     { en: 'royal princess with a magical staff' }
    },
    bg: {
      'castle':   { en: 'majestic castle with tall towers' },
      'dungeon':  { en: 'dark dungeon with glowing crystals' },
      'forest':   { en: 'enchanted forest with a giant ancient tree' },
      'volcano':  { en: 'erupting volcano with flowing lava' },
      'ocean':    { en: 'vast ocean with a bustling port town' },
      'sky':      { en: 'floating islands in the sky' },
      'ruins':    { en: 'ancient stone ruins overgrown with vines' },
      'mountain': { en: 'snowy mountain peak with an ice fortress' }
    },
    palette: {
      'classic': { en: 'classic retro green and brown color palette' },
      'neon':    { en: 'vibrant neon pink and blue color palette' },
      'sepia':   { en: 'warm sepia-toned retro color palette' },
      'dark':    { en: 'dark purple and black moody color palette' },
      'pastel':  { en: 'soft pastel color palette' },
      'gameboy': { en: 'Game Boy 4-shade green monochrome palette' },
      'sunset':  { en: 'warm sunset orange and red color palette' },
      'ice':     { en: 'cool ice blue and white color palette' }
    },
    mood: {
      'epic':       { en: 'epic and grand atmosphere' },
      'mysterious': { en: 'mysterious and enchanting atmosphere' },
      'cute':       { en: 'cute and pop art style' },
      'dark':       { en: 'dark and ominous atmosphere' },
      'nostalgic':  { en: 'warm nostalgic feeling' },
      'action':     { en: 'intense action-packed scene' }
    },
    extra: {
      'dragon':       { en: 'a fearsome dragon in the background' },
      'treasure':     { en: 'a glowing treasure chest' },
      'moon':         { en: 'a large moon and starry night sky' },
      'magic-circle': { en: 'a glowing magic circle on the ground' },
      'sword':        { en: 'a legendary glowing sword embedded in stone' },
      'pet':          { en: 'a cute companion monster by the hero\'s side' },
      'airship':      { en: 'a magnificent airship flying overhead' }
    }
  };

  /* ── プロンプト生成 ── */
  function generate() {
    var genre   = document.getElementById('genre').value;
    var hero    = document.getElementById('hero').value;
    var bg      = document.getElementById('bg').value;
    var palette = document.getElementById('palette').value;
    var mood    = document.getElementById('mood').value;
    var extra   = document.getElementById('extra').value;

    var parts = [
      '8-bit pixel art RPG title screen',
      DATA.genre[genre].en,
      DATA.genre[genre].kw,
      DATA.hero[hero].en + ' standing in the center',
      DATA.bg[bg].en + ' as the background',
      DATA.palette[palette].en,
      DATA.mood[mood].en
    ];

    if (extra && DATA.extra[extra]) {
      parts.push(DATA.extra[extra].en);
    }

    parts.push('retro 16-color pixel art style, NES/SNES era aesthetic, game title text at the top, "PRESS START" text at the bottom, clean pixel borders');

    var prompt = parts.join(', ');

    document.getElementById('prompt-text').textContent = prompt;
    document.getElementById('result').style.display = 'block';
    document.getElementById('btn-copy').textContent = '📋 コピーする';
    document.getElementById('btn-copy').className = 'btn-copy';
  }

  /* ── コピー ── */
  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showCopied(); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  }
  function showCopied() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = '✅ コピーしました!';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = '📋 コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  /* ── ランダム選択 ── */
  function randomize() {
    var selects = document.querySelectorAll('#genre, #hero, #bg, #palette, #mood, #extra');
    selects.forEach(function(sel) {
      var opts = sel.options;
      var startIdx = (sel.id === 'extra') ? 0 : 0;
      var idx = Math.floor(Math.random() * opts.length);
      sel.selectedIndex = idx;
    });
    generate();
  }

  /* ── お気に入り（localStorage） ── */
  var FAV_KEY = 'ai_8bit_rpg_prompt_favs';

  function getFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(list) {
    localStorage.setItem(FAV_KEY, JSON.stringify(list));
  }

  function saveFav() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    var favs = getFavs();
    if (favs.indexOf(text) !== -1) { alert('すでに保存済みです'); return; }
    favs.unshift(text);
    if (favs.length > 20) favs = favs.slice(0, 20);
    saveFavs(favs);
    renderFavs();
  }

  function deleteFav(idx) {
    var favs = getFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }

  function loadFav(idx) {
    var favs = getFavs();
    if (favs[idx]) {
      document.getElementById('prompt-text').textContent = favs[idx];
      document.getElementById('result').style.display = 'block';
      document.getElementById('btn-copy').textContent = '📋 コピーする';
      document.getElementById('btn-copy').className = 'btn-copy';
    }
  }

  function renderFavs() {
    var favs = getFavs();
    var card = document.getElementById('fav-card');
    var list = document.getElementById('fav-list');
    if (favs.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(t, i) {
      var short = t.length > 100 ? t.substring(0, 100) + '...' : t;
      return '<div class="fav-list-item">'
        + '<div class="fav-text" onclick="loadFav(' + i + ')" title="クリックで読み込み">' + escHtml(short) + '</div>'
        + '<button class="fav-del" onclick="deleteFav(' + i + ')">✕</button>'
        + '</div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 初期表示 ── */
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
