<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数見積もりアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>工数見積もり</h1>

    <div class="start-time-row">
      <label for="startTime">開始時刻：</label>
      <input type="time" id="startTime">
    </div>

    <div class="input-area">
      <input type="text" id="taskName" placeholder="作業名" maxlength="50">
      <input type="number" id="taskMinutes" placeholder="分" min="1" max="9999">
      <button id="addBtn">追加</button>
    </div>

    <ul id="taskList"></ul>

    <div class="summary" id="summary">
      <div class="summary-row">
        <span>合計工数</span>
        <span id="totalTime">0分（0時間0分）</span>
      </div>
      <div class="summary-row">
        <span>終了予定時刻</span>
        <span id="endTime">--:--</span>
      </div>
    </div>

    <button id="clearBtn" class="clear-btn">リストをクリア</button>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
