<script>

const RUNE=[
['ᚠ Fehu','豊かさ','物質的な満足や蓄えが運勢の鍵に。'],
['ᚢ Uruz','活力','内なる力が湧く一日。挑戦が吉。'],
['ᚦ Thurisaz','試練','障害を乗り越えるための慎重さを。'],
['ᚨ Ansuz','メッセージ','人からの言葉や知らせに注目を。'],
['ᚱ Raidho','旅','移動や変化が新しい流れを呼ぶ。'],
['ᚲ Kenaz','灯火','学びと閃きが訪れる時間。'],
['ᚷ Gebo','贈り物','与えることが返ってくる日。'],
['ᚹ Wunjo','喜び','小さな幸せを丁寧に感じて。'],
['ᚺ Hagalaz','嵐','一旦立ち止まり、流れを見直して。'],
['ᚾ Nauthiz','必要','制約の中にこそ成長のヒントが。'],
['ᛁ Isa','静止','焦らず待つことが正解の日。'],
['ᛃ Jera','収穫','努力が形になり始める時間。'],
['ᛇ Eihwaz','変容','古い殻を脱ぐ準備を。'],
['ᛈ Perthro','秘密','直感に従うと隠れた答えが見える。'],
['ᛉ Algiz','守護','見えない助けに気づける一日。'],
['ᛋ Sowilo','太陽','成功とエネルギーが満ちる時間。'],
['ᛏ Tiwaz','正義','信念を貫くと運が味方に。'],
['ᛒ Berkana','成長','新しい芽を育てる時間。'],
['ᛖ Ehwaz','協力','パートナーシップが鍵に。'],
['ᛗ Mannaz','人','自分と他者のバランスを意識。'],
['ᛚ Laguz','流れ','感情の流れに身を任せて吉。'],
['ᛜ Ingwaz','可能性','種が芽吹く準備が整う。'],
['ᛞ Dagaz','夜明け','新しいサイクルの始まり。'],
['ᛟ Othala','継承','家族や伝統からの学びに気づく。']];
