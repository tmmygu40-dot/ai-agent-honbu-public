<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月次資金繰りリスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── アドバイスカード ── */
    .advice-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .advice-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .advice-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .advice-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .advice-title {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em;
      margin-bottom: 0.7rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .advice-card.ok   .advice-title { color: var(--ok); }
    .advice-card.warn .advice-title { color: var(--warn); }
    .advice-card.ng   .advice-title { color: var(--ng); }
    .advice-list { list-style: none; }
    .advice-list li {
      font-size: 0.86rem; color: var(--text);
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .advice-list li:last-child { border-bottom: none; }
    .advice-list li::before { content: "▶ "; color: var(--accent); font-size: 0.72rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card, .advice-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

<body>

  <header class="app-header">
    <h1>月次資金繰りリスク診断アプリ</h1>
    <p class="subtitle">売上・固定費・現預金を入力して資金ショートまでの猶予日数を即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="sales">月次売上（万円）</label>
      <input type="number" id="sales" placeholder="例: 300" min="0" inputmode="decimal">
      <p class="hint">今月の売上見込み（税込可）</p>
    </div>
    <div class="field">
      <label for="fixed">月次固定費（万円）</label>
      <input type="number" id="fixed" placeholder="例: 250" min="0" inputmode="decimal">
      <p class="hint">家賃・人件費・リース料など毎月必ず出る費用</p>
    </div>
    <div class="field">
      <label for="cash">現預金残高（万円）</label>
      <input type="number" id="cash" placeholder="例: 500" min="0" inputmode="decimal">
      <p class="hint">今手元にある現金・預金の合計</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">資金繰りリスクを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">資金ショートまでの猶予</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="advice-card" id="advice">
    <p class="advice-title" id="advice-title">対処アドバイス</p>
    <ul class="advice-list" id="advice-list"></ul>
  </div>

  <p class="source-note no-print" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは資金繰りの目安を確認するためのものです。実際の経営判断は税理士・中小企業診断士等の専門家にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var ADVICE = {
    safe: [
      '月次キャッシュフローが黒字です。この状態を維持するため、固定費の定期見直しを続けましょう。',
      '余剰資金は3〜6ヶ月分の固定費を手元に残しつつ、設備投資や借入返済に充てることを検討できます。',
      '売上が下がった場合のシナリオも定期的にシミュレーションしておきましょう。',
    ],
    caution: [
      '現状は安全ですが、売上が落ちると状況が一変する可能性があります。',
      '変動費の削減余地を確認し、固定費の一部を変動費化できないか検討しましょう。',
      '補助金・助成金の活用や売掛金の回収サイクル短縮で手元資金を増やすことを検討してください。',
    ],
    alert: [
      '資金ショートまで60〜89日です。今すぐ対策を始めてください。',
      '不急の支出を一時停止し、固定費の交渉（家賃・リース等）を行いましょう。',
      '売上増加策（単価アップ・新規顧客開拓）と並行して、銀行や日本政策金融公庫への融資相談を検討してください。',
      '売掛金の早期回収と、仕入れ・外注費の支払い条件の見直しも有効です。',
    ],
    crisis: [
      '資金ショートまで30日未満です。緊急対応が必要です。',
      '今週中に取引銀行・日本政策金融公庫へ融資相談を行ってください。',
      '売掛金の即時回収交渉と、支払いの猶予交渉を同時進行で進めましょう。',
      '不採算部門・サービスの即時停止を検討し、固定費を最小化してください。',
      '中小企業診断士や税理士に緊急相談し、リスケジュール（返済猶予）の可否も確認してください。',
    ],
    positive: [
      '月次キャッシュフローが黒字で現預金残高も十分です。安定した財務状態です。',
      '緊急時の備えとして固定費3〜6ヶ月分の現預金は維持することを推奨します。',
      '余裕がある今こそ、売上増加への先行投資や設備更新を検討しましょう。',
    ],
  };

  function calc() {
    var sales = parseFloat(document.getElementById('sales').value);
    var fixed = parseFloat(document.getElementById('fixed').value);
    var cash  = parseFloat(document.getElementById('cash').value);

    if (isNaN(sales) || isNaN(fixed) || isNaN(cash)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (sales < 0 || fixed < 0 || cash < 0) {
      showErr('0以上の数値を入力してください');
      return;
    }

    var monthlyCF = sales - fixed; // 月次キャッシュフロー（万円）
    var dailyBurn = fixed / 30;    // 1日あたり支出（万円）

    var level, daysText, evalText, noteText, adviceKey;

    if (monthlyCF >= 0) {
      // 黒字 → ショートしない（現預金で何日賄えるか）
      var daysReserve = dailyBurn > 0 ? Math.floor(cash / dailyBurn) : 9999;
      daysText = '黒字運営中';
      evalText = '安全（月次黒字）';
      noteText = '月次キャッシュフローが黒字です。現預金は固定費約 ' + daysReserve + ' 日分の備えがあります。';
      level = 'ok';
      adviceKey = 'positive';
    } else {
      // 赤字 → 毎月 |monthlyCF| 万円ずつ減る
      var monthlyBurn = -monthlyCF;
      var daysUntilShort = dailyBurn > 0 ? Math.floor(cash / (monthlyBurn / 30)) : 9999;

      daysText = daysUntilShort + ' 日';

      if (daysUntilShort >= 90) {
        level = 'ok';
        evalText = '注意（猶予 90 日以上）';
        noteText = '当面は安全ですが、赤字が続いています。早めに収支改善策を検討してください。';
        adviceKey = 'caution';
      } else if (daysUntilShort >= 60) {
        level = 'warn';
        evalText = '警戒（猶予 60〜89 日）';
        noteText = '資金ショートまで2〜3ヶ月です。今すぐ対策を開始してください。';
        adviceKey = 'alert';
      } else if (daysUntilShort >= 30) {
        level = 'warn';
        evalText = '危機（猶予 30〜59 日）';
        noteText = '資金ショートまで1〜2ヶ月です。緊急の対策が必要です。';
        adviceKey = 'crisis';
      } else {
        level = 'ng';
        evalText = '緊急危機（猶予 30 日未満）';
        noteText = '資金ショートが目前です。今すぐ専門家・金融機関に相談してください。';
        adviceKey = 'crisis';
      }
    }

    showResult(level, daysText, evalText, noteText);
    showDetail([
      ['月次売上',             fmt(sales) + ' 万円'],
      ['月次固定費',           fmt(fixed) + ' 万円'],
      ['月次キャッシュフロー', (monthlyCF >= 0 ? '+' : '') + fmt(monthlyCF) + ' 万円', true],
      ['現預金残高',           fmt(cash) + ' 万円'],
      ['1日あたり固定費',      fmt(dailyBurn, 1) + ' 万円'],
    ]);
    showAdvice(level, adviceKey);
    save(sales, fixed, cash);
  }

  function showResult(level, val, ev, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = ev;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showAdvice(level, key) {
    var items = ADVICE[key] || [];
    document.getElementById('advice-list').innerHTML = items.map(function(a){
      return '<li>' + a + '</li>';
    }).join('');
    var ac = document.getElementById('advice');
    ac.className = 'advice-card ' + level;
    ac.style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg, '');
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice').style.display = 'none';
  }
  function fmt(n, d) {
    if (d === undefined) d = 0;
    return Number(n.toFixed(d)).toLocaleString('ja-JP');
  }

  function save(sales, fixed, cash) {
    try {
      localStorage.setItem('cashflow_sales', sales);
      localStorage.setItem('cashflow_fixed', fixed);
      localStorage.setItem('cashflow_cash',  cash);
    } catch(e) {}
  }
  function load() {
    try {
      var s = localStorage.getItem('cashflow_sales');
      var f = localStorage.getItem('cashflow_fixed');
      var c = localStorage.getItem('cashflow_cash');
      if (s !== null) document.getElementById('sales').value = s;
      if (f !== null) document.getElementById('fixed').value = f;
      if (c !== null) document.getElementById('cash').value  = c;
    } catch(e) {}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
