<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資格管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>資格管理アプリ</h1>

    <section class="form-section">
      <h2>資格・免許を登録</h2>
      <div class="form-group">
        <label for="name">資格・免許名 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：普通自動車免許" maxlength="100">
      </div>
      <div class="form-group">
        <label for="acquiredDate">取得日</label>
        <input type="date" id="acquiredDate">
      </div>
      <div class="form-group">
        <label for="expiryDate">有効期限（空欄で無期限）</label>
        <input type="date" id="expiryDate">
      </div>
      <button class="btn-primary" onclick="addLicense()">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録済み一覧</h2>
        <span id="count" class="count-badge">0件</span>
      </div>
      <div id="licenseList" class="license-list">
        <p class="empty-msg">まだ登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
