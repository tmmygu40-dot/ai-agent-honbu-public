<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GWや連休の出費をカテゴリ別に入力して、予算オーバーを事前チェック。旅行・外食・買い物・レジャーなどの散財予測で後悔ゼロの連休を。">
  <title>連休散財予測シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── カテゴリ行 ── */
    .cat-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-icon { font-size: 1.3rem; flex-shrink: 0; width: 2rem; text-align: center; }
    .cat-name { font-size: 0.88rem; font-weight: 600; flex: 1; min-width: 0; }
    .cat-input {
      width: 7rem; padding: 0.5rem 0.6rem; font-size: 0.95rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text); text-align: right;
      outline: none; -webkit-appearance: none;
    }
    .cat-input:focus { border-color: var(--accent); background: #fff; }
    .cat-unit { font-size: 0.78rem; color: var(--text-sub); flex-shrink: 0; }

    /* ── 合計表示 ── */
    .total-bar {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.8rem 0; margin-top: 0.5rem;
      border-top: 2px solid var(--accent);
    }
    .total-label { font-size: 0.88rem; font-weight: 700; color: var(--text-sub); }
    .total-value { font-size: 1.4rem; font-weight: 900; color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎌 連休散財予測シミュレーター</h1>
    <p class="subtitle">連休の出費を先読みして、使いすぎる前にブレーキをかけよう。</p>
  </header>

  <!-- 予算入力 -->
  <div class="card">
    <p class="card-title">予算設定</p>
    <div class="field">
      <label for="budget">連休の予算（上限）</label>
      <input type="number" id="budget" placeholder="例: 50000" inputmode="numeric">
      <p class="hint">連休全体で使っていい金額を入力</p>
    </div>
  </div>

  <!-- カテゴリ別入力 -->
  <div class="card">
    <p class="card-title">カテゴリ別 出費予定</p>
    <div id="cat-list">
      <div class="cat-row">
        <span class="cat-icon">✈️</span>
        <span class="cat-name">旅行・宿泊</span>
        <input type="number" class="cat-input" data-cat="旅行・宿泊" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
      <div class="cat-row">
        <span class="cat-icon">🍽️</span>
        <span class="cat-name">外食・グルメ</span>
        <input type="number" class="cat-input" data-cat="外食・グルメ" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
      <div class="cat-row">
        <span class="cat-icon">🛍️</span>
        <span class="cat-name">買い物</span>
        <input type="number" class="cat-input" data-cat="買い物" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
      <div class="cat-row">
        <span class="cat-icon">🎢</span>
        <span class="cat-name">レジャー・娯楽</span>
        <input type="number" class="cat-input" data-cat="レジャー・娯楽" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
      <div class="cat-row">
        <span class="cat-icon">🚗</span>
        <span class="cat-name">交通費</span>
        <input type="number" class="cat-input" data-cat="交通費" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
      <div class="cat-row">
        <span class="cat-icon">📦</span>
        <span class="cat-name">その他</span>
        <input type="number" class="cat-input" data-cat="その他" placeholder="0" inputmode="numeric">
        <span class="cat-unit">円</span>
      </div>
    </div>
    <div class="total-bar">
      <span class="total-label">出費予定 合計</span>
      <span class="total-value" id="live-total">0 円</span>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">予算チェックする</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">予算との差額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 GW出費カテゴリ・相場は総務省家計調査などの一般的な参考値です。実際の出費は個人差があります。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var ENABLE_RESULT_QA = true;

  var EMOJI_MSG = {
    ok:   { e: '😌', t: '余裕あり！この調子で楽しもう' },
    warn: { e: '🤔', t: 'ギリギリ…どこか削れるかも？' },
    ng:   { e: '😱', t: '予算オーバー！見直しが必要です' }
  };

  var QA = {
    ok: [
      { q: 'もっと楽しんでいい？', a: '予算に余裕があるので、プラスアルファの体験を検討してもOK。無理のない範囲で連休を満喫しましょう。' },
      { q: '余った予算はどうする？', a: '貯金に回すもよし、次の連休用に積み立てるもよし。使わなかった分は未来の自分へのプレゼントです。' },
      { q: '来年も同じペースで大丈夫？', a: '今回の実績をメモしておくと、次の連休計画がさらにラクになります。' },
      { q: '節約のコツは？', a: '早割・クーポン・平日利用など、時期をずらすだけで数千円の差が出ることも。' }
    ],
    warn: [
      { q: 'どこを削ればいい？', a: '一番大きいカテゴリから1〜2割削るだけで、予算内に収まることが多いです。' },
      { q: '外食を減らすコツは？', a: 'お弁当やテイクアウトを1回混ぜるだけで、外食費は2〜3割カットできます。' },
      { q: '交通費を抑えるには？', a: '早割切符・高速バス・カーシェアなど、移動手段を見直すと意外と浮きます。' },
      { q: 'レジャー代を抑えるには？', a: '無料の公園やイベント、自治体の割引チケットをチェックしてみましょう。' }
    ],
    ng: [
      { q: '全部やめなきゃダメ？', a: '全部やめる必要はありません。優先順位をつけて「これだけは」を残すのがコツ。' },
      { q: '一番効くカットは？', a: '金額が大きい項目を見直すのが最も効果的。旅行の日数やグレードを調整するだけで大幅に変わります。' },
      { q: '連休後の家計は大丈夫？', a: '翌月の固定費・引き落としを確認して、連休出費で赤字にならないかチェックしましょう。' },
      { q: '代替プランはある？', a: '近場レジャー・おうち時間の充実・日帰り旅行など、低コストでも満足度の高い選択肢はたくさんあります。' }
    ]
  };

  var STORAGE_KEY = 'gw_expense_sim';

  // リアルタイム合計
  var catInputs = document.querySelectorAll('.cat-input');
  catInputs.forEach(function(el) {
    el.addEventListener('input', updateLiveTotal);
  });

  function updateLiveTotal() {
    var total = 0;
    catInputs.forEach(function(el) {
      var v = parseFloat(el.value);
      if (!isNaN(v)) total += v;
    });
    document.getElementById('live-total').textContent = fmt(total) + ' 円';
  }

  function calc() {
    var budget = parseFloat(document.getElementById('budget').value);
    if (isNaN(budget) || budget <= 0) { showErr('予算を入力してください'); return; }

    var total = 0;
    var rows = [];
    catInputs.forEach(function(el) {
      var v = parseFloat(el.value) || 0;
      var name = el.getAttribute('data-cat');
      total += v;
      if (v > 0) rows.push([name, fmt(v) + ' 円']);
    });

    if (total === 0) { showErr('出費予定を1つ以上入力してください'); return; }

    var diff = budget - total;
    var ratio = total / budget * 100;
    var level = ratio <= 80 ? 'ok' : ratio <= 100 ? 'warn' : 'ng';
    var evalText = level === 'ok'   ? '予算内で余裕あり！'
                 : level === 'warn' ? '予算ギリギリ…要注意'
                 : '予算オーバー！見直しを';
    var noteText = '予算 ' + fmt(budget) + ' 円に対して、出費予定は ' + fmt(total) + ' 円（' + Math.round(ratio) + '%）';

    showResult(level, (diff >= 0 ? '+' : '') + fmt(diff) + ' 円', noteText, evalText);

    rows.push(['出費合計', fmt(total) + ' 円', true]);
    rows.push(['予算', fmt(budget) + ' 円']);
    rows.push(['差額', (diff >= 0 ? '+' : '') + fmt(diff) + ' 円', true]);
    showDetail(rows);
    showQA(level);
    saveData();
  }

  function showResult(level, val, note, evalText) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    document.getElementById('re').textContent = evalText || '';
  }
  function showQA(level) {
    if (!ENABLE_RESULT_QA) return;
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = 'block';
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // localStorage
  function saveData() {
    var data = { budget: document.getElementById('budget').value, cats: {} };
    catInputs.forEach(function(el) {
      data.cats[el.getAttribute('data-cat')] = el.value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function loadData() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
      var data = JSON.parse(raw);
      if (data.budget) document.getElementById('budget').value = data.budget;
      catInputs.forEach(function(el) {
        var key = el.getAttribute('data-cat');
        if (data.cats && data.cats[key]) el.value = data.cats[key];
      });
      updateLiveTotal();
    } catch(e) {}
  }
  loadData();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
