<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冠婚葬祭記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>冠婚葬祭記録</h1>
      <p class="subtitle">ご祝儀・香典の目安をすぐ確認</p>
    </header>

    <section class="form-section">
      <h2>記録を追加</h2>
      <form id="record-form">
        <div class="form-row">
          <label for="name">相手の名前 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-row">
          <label for="relation">続柄</label>
          <select id="relation">
            <option value="友人">友人</option>
            <option value="職場">職場</option>
            <option value="親族">親族</option>
            <option value="隣人">隣人</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row">
          <label for="event-type">種類</label>
          <select id="event-type">
            <option value="結婚式">結婚式</option>
            <option value="出産祝い">出産祝い</option>
            <option value="葬儀">葬儀</option>
            <option value="法事">法事</option>
            <option value="お見舞い">お見舞い</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row">
          <label for="amount">金額（円） <span class="required">*</span></label>
          <input type="number" id="amount" placeholder="10000" min="0" required>
        </div>
        <div class="form-row">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-row">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="お返し済みなど">
        </div>
        <button type="submit" class="btn-add">追加する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>記録一覧 <span id="count" class="count">0件</span></h2>
        <input type="text" id="search" placeholder="名前で検索..." class="search-input">
      </div>
      <div id="records-list" class="records-list">
        <p class="empty-msg">記録がありません。上のフォームから追加してください。</p>
      </div>
    </section>
  </div>

  <div id="detail-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <button class="btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
