<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金銭感覚暴君診断｜あなたの無駄遣いタイプを歴史上の暴君に例える5問診断</title>
  <meta name="description" content="5問に答えるだけで、あなたの無駄遣いの傾向を歴史上の暴君タイプに例えて診断します。自分の浪費パターンを面白く反省したい方向けの無料診断です。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #8b1e3f;
      --accent-light: #fdf2f6;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.4; }
    .q-num { color: var(--accent); margin-right: 0.4rem; }

    .opt-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .opt-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: var(--bg);
      transition: border-color 0.12s, background 0.12s;
    }
    .opt-item:hover { border-color: var(--accent); }
    .opt-item input[type="radio"] {
      margin-top: 0.18rem;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .opt-item input[type="radio"]:checked ~ .opt-text { color: var(--accent); font-weight: 600; }
    .opt-item:has(input[type="radio"]:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .opt-text { font-size: 0.9rem; line-height: 1.45; color: var(--text); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #5e1429, 0 6px 16px rgba(139,30,63,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5e1429, 0 2px 8px rgba(139,30,63,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-emoji { font-size: 3rem; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; color: var(--accent); }
    .result-catch { font-size: 1rem; font-weight: 700; line-height: 1.45; margin-bottom: 0.8rem; color: var(--text); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; text-align: left; }

    .advice-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .advice-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .advice-list { list-style: none; padding: 0; }
    .advice-list li {
      font-size: 0.92rem; line-height: 1.55;
      padding: 0.55rem 0 0.55rem 1.4rem;
      position: relative;
      border-bottom: 1px dashed var(--border);
    }
    .advice-list li:last-child { border-bottom: none; }
    .advice-list li::before {
      content: '👑'; position: absolute; left: 0; top: 0.55rem; font-size: 0.9rem;
    }

    .score-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .score-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0;
      font-size: 0.85rem;
      border-bottom: 1px dashed var(--border);
    }
    .score-row:last-child { border-bottom: none; }
    .score-name { flex: 0 0 7rem; font-weight: 700; color: var(--text); }
    .score-bar-wrap { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
    .score-bar { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.4s; }
    .score-num { flex: 0 0 2.5rem; text-align: right; color: var(--text-sub); font-variant-numeric: tabular-nums; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .btn-retry {
      display: none; margin: 0.6rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .advice-card, .score-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>👑 金銭感覚暴君診断</h1>
    <p class="subtitle">5問で分かる、あなたの無駄遣いを歴史上の暴君に例えるとこのタイプ</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">5問の質問に答えてください</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">暴君タイプを判定する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの暴君タイプ</p>
    <div class="result-emoji" id="r-emoji">👑</div>
    <p class="result-value" id="r-name">—</p>
    <p class="result-catch" id="r-catch"></p>
    <p class="result-note" id="r-note"></p>
  </div>

  <div class="advice-card" id="advice">
    <p class="advice-title">玉座から降りるための3つの掟</p>
    <ul class="advice-list" id="advice-list"></ul>
  </div>

  <div class="score-card" id="score">
    <p class="card-title">タイプ別スコア</p>
    <div id="score-body"></div>
  </div>

  <button class="btn-retry" id="btn-retry" onclick="reset()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 本診断はエンタメ目的の自己分析ツールです。歴史上の暴君像は一般的なエピソードを基にデフォルメしています。実際の家計改善は、家計簿アプリや公的家計相談（消費生活センター等）の活用も検討してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 暴君タイプ定義 ──
  var TYPES = {
    nero: {
      emoji: '🔥',
      name: 'ネロ型 / 衝動帝王',
      catch: '欲しい!と思った瞬間、もう買っている。',
      note: 'ローマ皇帝ネロのように、感情の波で財を燃やすタイプ。新商品・限定・タイムセールに弱く、気づけば「いつ買ったか覚えていない」明細が並びます。買い物のドーパミンが燃料です。',
      advice: [
        '欲しい物を見つけたら、まず「24時間カート保留」ルールを設ける',
        'クレカではなくデビットカードに切り替えると、衝動の燃料が減る',
        'ストレスMAXの夜にECサイトを開かない（買い物アプリを通知OFFに）'
      ]
    },
    caligula: {
      emoji: '💎',
      name: 'カリギュラ型 / 見栄帝王',
      catch: '安物は私の品位に関わる、と高い方を選ぶ。',
      note: 'ローマ皇帝カリギュラのように、品格と地位のために散財するタイプ。ブランド・上位グレード・高級店を選びがちで、「自分のレベルに合った物を持つべき」という美学が財布を圧迫します。',
      advice: [
        '「誰に見せるための買い物か」を購入前に1回だけ自問する',
        'グレードを1段下げても満足度はほぼ変わらない、を試して確かめる',
        '本当に大事な分野（趣味・仕事道具）だけ高級、それ以外は中庸でOK'
      ]
    },
    herod: {
      emoji: '📸',
      name: 'ヘロデ型 / 演出帝王',
      catch: '映え・話題・友達ウケのために金が流れる。',
      note: 'ヘロデ王のように、外向きの演出に投資するタイプ。SNS映えスポット・話題のスイーツ・友達との外食・話のネタになる体験など、「誰かに見せる/話す」前提の出費が積み上がります。',
      advice: [
        '「投稿しない前提でも欲しいか?」を判定基準に追加する',
        '友人との集まりは月◯回まで・予算◯円まで、と上限を設ける',
        '体験の記録は写真とメモで十分、毎回課金しない楽しみ方を持つ'
      ]
    },
    ivan: {
      emoji: '⚔️',
      name: 'イヴァン雷帝型 / ストレス帝王',
      catch: '嫌なことがあった日ほど、財布が開く。',
      note: 'ロシア皇帝イヴァン雷帝のように、感情の爆発で散財するタイプ。怒り・悲しみ・疲労を買い物で鎮めようとし、平時は節約家でも「悪い1日」の出費で月の収支が崩れます。',
      advice: [
        'ストレス発散の選択肢を「買い物以外」で3つ用意しておく（散歩・風呂・睡眠など）',
        '残業日・喧嘩した日のEC利用を48時間禁止する自分ルール',
        '月末に「ストレス出費」だけ色分け集計して可視化する'
      ]
    }
  };

  // ── 質問データ ──
  var QUESTIONS = [
    {
      q: '給料日後、最初に財布を開く瞬間は?',
      opts: [
        { t: '気になっていた新商品を即ポチる',           type: 'nero'     },
        { t: 'ご褒美にいつもより上のグレードを買う',     type: 'caligula' },
        { t: 'SNSで自慢できそうなお店・体験を予約',     type: 'herod'    },
        { t: '今月の疲れを取るために散財する',           type: 'ivan'     }
      ]
    },
    {
      q: '服を買うときに一番効くのは?',
      opts: [
        { t: '試着した瞬間に「これだ!」と感じた高揚感', type: 'nero'     },
        { t: 'ブランド・素材・「上質」というラベル',     type: 'caligula' },
        { t: '写真映え・友達ウケの良さ',                 type: 'herod'    },
        { t: '嫌な1日のあとほど買いたくなる衝動',         type: 'ivan'     }
      ]
    },
    {
      q: 'コンビニに寄ると、よく起きるのは?',
      opts: [
        { t: '新商品を全部試したくなって2,000円超え',     type: 'nero'     },
        { t: '高めのスイーツ・クラフト酒を選んでしまう', type: 'caligula' },
        { t: '誰かにシェアできる限定品を探す',             type: 'herod'    },
        { t: '疲れた日ほどスイーツ・酒を大量買い',         type: 'ivan'     }
      ]
    },
    {
      q: 'クレカ明細を見たときの第一声は?',
      opts: [
        { t: 'これいつ買ったっけ?が3件以上ある',           type: 'nero'     },
        { t: '高い買い物が多いが、後悔はない',             type: 'caligula' },
        { t: '飲み会・外食・体験系で埋まっている',         type: 'herod'    },
        { t: '今月ストレス多かったな…と振り返る',           type: 'ivan'     }
      ]
    },
    {
      q: '一番後悔した買い物のパターンは?',
      opts: [
        { t: '深夜に勢いでポチった謎グッズ',                 type: 'nero'     },
        { t: '見栄を張って買った高額品',                     type: 'caligula' },
        { t: '友達・SNS用に盛った出費',                       type: 'herod'    },
        { t: '怒りや悲しみの勢いで買った物',                   type: 'ivan'     }
      ]
    }
  ];

  var STORAGE_KEY = 'tyrant_diagnose_v1';

  function renderQuestions() {
    var html = QUESTIONS.map(function(item, idx) {
      var opts = item.opts.map(function(o, i) {
        var id = 'q' + idx + '_' + i;
        return '<label class="opt-item">'
          + '<input type="radio" name="q' + idx + '" value="' + o.type + '">'
          + '<span class="opt-text">' + escapeHtml(o.t) + '</span>'
          + '</label>';
      }).join('');
      return '<div class="q-block">'
        + '<p class="q-text"><span class="q-num">Q' + (idx + 1) + '.</span>' + escapeHtml(item.q) + '</p>'
        + '<div class="opt-list">' + opts + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function diagnose() {
    var counts = { nero: 0, caligula: 0, herod: 0, ivan: 0 };
    var unanswered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered++; continue; }
      counts[sel.value]++;
    }
    if (unanswered > 0) {
      alert('未回答が ' + unanswered + ' 問あります。すべて答えてください。');
      return;
    }

    // 最多タイプ判定（同点は質問順優先）
    var winner = 'nero';
    var maxScore = -1;
    var order = ['nero', 'caligula', 'herod', 'ivan'];
    for (var k = 0; k < order.length; k++) {
      if (counts[order[k]] > maxScore) {
        maxScore = counts[order[k]];
        winner = order[k];
      }
    }

    showResult(winner, counts);
    saveResult(winner, counts);
  }

  function showResult(winner, counts) {
    var t = TYPES[winner];
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent = t.name;
    document.getElementById('r-catch').textContent = t.catch;
    document.getElementById('r-note').textContent = t.note;
    document.getElementById('result').style.display = 'block';

    document.getElementById('advice-list').innerHTML = t.advice.map(function(a) {
      return '<li>' + escapeHtml(a) + '</li>';
    }).join('');
    document.getElementById('advice').style.display = 'block';

    var total = 0;
    var order = ['nero', 'caligula', 'herod', 'ivan'];
    for (var k = 0; k < order.length; k++) total += counts[order[k]];
    var sb = order.map(function(key) {
      var pct = total > 0 ? Math.round(counts[key] / total * 100) : 0;
      return '<div class="score-row">'
        + '<div class="score-name">' + escapeHtml(TYPES[key].name.split(' /')[0]) + '</div>'
        + '<div class="score-bar-wrap"><div class="score-bar" style="width:' + pct + '%"></div></div>'
        + '<div class="score-num">' + counts[key] + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('score-body').innerHTML = sb;
    document.getElementById('score').style.display = 'block';

    document.getElementById('btn-retry').style.display = 'block';

    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function saveResult(winner, counts) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        winner: winner,
        counts: counts,
        date: new Date().toISOString()
      }));
    } catch (e) { /* 保存失敗は無視 */ }
  }

  function loadPrev() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.winner || !TYPES[data.winner]) return;
      // 前回結果は自動表示しない（プライバシー配慮）。リトライ時のヒントとして保持のみ。
    } catch (e) { /* 読込失敗は無視 */ }
  }

  function reset() {
    var inputs = document.querySelectorAll('input[type="radio"]');
    for (var i = 0; i < inputs.length; i++) inputs[i].checked = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('advice').style.display = 'none';
    document.getElementById('score').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    document.getElementById('quiz-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  renderQuestions();
  loadPrev();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
