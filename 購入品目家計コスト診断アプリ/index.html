<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入品目 家計コスト診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 品目リスト ── */
    .category-title {
      font-size: 0.8rem; font-weight: 700; color: var(--text-sub);
      margin: 0.8rem 0 0.5rem;
      padding-left: 0.3rem;
      border-left: 3px solid var(--accent);
    }
    .item-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.55rem 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-check { width: 1.1rem; height: 1.1rem; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .item-label { flex: 1; font-size: 0.9rem; cursor: pointer; }
    .item-hike { font-size: 0.72rem; color: var(--ng); font-weight: 700; min-width: 3.2rem; text-align: right; }
    .item-amount {
      width: 6rem; padding: 0.35rem 0.5rem;
      font-size: 0.88rem; border: 1.5px solid var(--border);
      border-radius: 7px; background: var(--bg); color: var(--text);
      text-align: right; outline: none;
    }
    .item-amount:focus { border-color: var(--accent); background: #fff; }
    .amount-unit { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; }

    /* ── 選択UI ── */
    .select-all-row {
      display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap;
    }
    .btn-select {
      padding: 0.35rem 0.8rem; font-size: 0.78rem; font-weight: 600;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer;
    }
    .btn-select:hover { border-color: var(--accent); color: var(--accent); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 節約tips ── */
    .tips-list { list-style: none; margin-top: 0.5rem; }
    .tips-list li {
      padding: 0.6rem 0.7rem; margin-bottom: 0.45rem;
      background: var(--accent-light); border-radius: 8px;
      font-size: 0.85rem; line-height: 1.45;
      border-left: 3px solid var(--accent);
    }
    .tips-cat {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      display: block; margin-bottom: 0.15rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>購入品目 家計コスト診断</h1>
    <p class="subtitle">よく買う品目を選ぶだけ。値上げによる年間負担増を試算します</p>
  </header>

  <!-- 品目選択カード -->
  <div class="card">
    <p class="card-title">STEP 1｜よく買う品目を選んでください</p>
    <div class="select-all-row">
      <button class="btn-select" onclick="selectAll(true)">すべて選択</button>
      <button class="btn-select" onclick="selectAll(false)">すべて解除</button>
    </div>
    <div id="itemList"></div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">年間コスト増を診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">年間の家計負担増（試算）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">品目別 コスト増内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 節約tipカード -->
  <div class="card" id="tipsCard" style="display:none">
    <p class="card-title">コスト削減アクション</p>
    <ul class="tips-list" id="tipsList"></ul>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── 品目データ ──
  var ITEMS = [
    // カテゴリ: 主食・基本食品
    { id:'rice',    cat:'主食・基本食品', name:'お米', hike:15, def:3000,
      tip:'まとめ買い・業務用スーパーの活用でkg単価を下げられます。国産米より安価な国内産ブレンド米も検討を。' },
    { id:'bread',   cat:'主食・基本食品', name:'食パン', hike:12, def:800,
      tip:'特売日にまとめ買いして冷凍保存。ベーカリーより量販店の方が割安になりやすいです。' },
    { id:'noodle',  cat:'主食・基本食品', name:'麺類（パスタ・うどん等）', hike:10, def:1200,
      tip:'業務用サイズの購入が単価を抑える近道。食べ比べて安いブランドに切り替えましょう。' },

    // カテゴリ: 肉・魚・卵
    { id:'meat',    cat:'肉・魚・卵', name:'鶏肉・豚肉・牛肉', hike:12, def:5000,
      tip:'鶏もも・豚こまなどコスパの高い部位を活用。冷凍保存で特売品をまとめ買いすると節約に。' },
    { id:'fish',    cat:'肉・魚・卵', name:'魚・刺身', hike:10, def:3000,
      tip:'旬の魚・冷凍魚を使うと通年安定した価格で買えます。' },
    { id:'egg',     cat:'肉・魚・卵', name:'卵', hike:20, def:900,
      tip:'卵は特売情報をチェックしてまとめ買い。1パック購入より2パック購入が割安なことも多いです。' },

    // カテゴリ: 乳製品
    { id:'milk',    cat:'乳製品', name:'牛乳', hike:10, def:700,
      tip:'PBブランドや業務用パックに切り替えると月数百円の節約になります。' },
    { id:'yogurt',  cat:'乳製品', name:'ヨーグルト・チーズ', hike:12, def:1200,
      tip:'大容量パックやPBブランドへの切り替えが効果的。' },

    // カテゴリ: 野菜・果物
    { id:'vege',    cat:'野菜・果物', name:'野菜全般', hike:8, def:4000,
      tip:'旬の野菜を選ぶ・冷凍野菜を活用するだけで年間1〜2万円の節約になることがあります。' },
    { id:'fruit',   cat:'野菜・果物', name:'果物', hike:10, def:1500,
      tip:'旬のフルーツを選ぶ。高価な輸入果物は減らし、国産の旬果物に切り替えましょう。' },

    // カテゴリ: 油・調味料
    { id:'oil',     cat:'油・調味料', name:'食用油', hike:20, def:600,
      tip:'業務用の大容量サイズへ切り替えが有効。揚げ油の使い方を工夫して使用量を減らしましょう。' },
    { id:'seasoning',cat:'油・調味料', name:'しょうゆ・みりん・砂糖等', hike:10, def:1000,
      tip:'まとめ買い・業務用サイズの活用。自炊頻度を上げることで外食コストも抑えられます。' },
    { id:'mayo',    cat:'油・調味料', name:'マヨネーズ・ケチャップ等', hike:15, def:500,
      tip:'大容量パックへの切り替えとPBブランドの活用で節約。' },

    // カテゴリ: 加工食品・飲料
    { id:'frozen',  cat:'加工食品・飲料', name:'冷凍食品', hike:12, def:2000,
      tip:'特売・まとめ買いが有効。ただし自炊代替として使いすぎると逆に割高になる場合も。' },
    { id:'snack',   cat:'加工食品・飲料', name:'菓子・スナック', hike:10, def:2000,
      tip:'高頻度の購入を週1回など頻度を決めて管理。まとめ買いではなく必要量だけ購入する習慣を。' },
    { id:'drink',   cat:'加工食品・飲料', name:'飲料（ジュース・缶コーヒー等）', hike:8, def:2500,
      tip:'水筒持参・マイボトル活用が最大の節約策。自販機・コンビニ飲料を減らすだけで大幅な節約に。' },

    // カテゴリ: 光熱費
    { id:'elec',    cat:'光熱費', name:'電気代', hike:15, def:8000,
      tip:'エアコンの設定温度調整（冷房28℃・暖房20℃）、省エネ家電への買い替え、電力プランの見直しが有効。' },
    { id:'gas',     cat:'光熱費', name:'ガス代', hike:18, def:4000,
      tip:'給湯器の設定温度下げ・シャワー時間短縮・食器洗い機の活用が節約に繋がります。' },

    // カテゴリ: 日用品
    { id:'paper',   cat:'日用品', name:'ティッシュ・トイレットペーパー', hike:15, def:1200,
      tip:'ドラッグストアのまとめ買いセールを活用。倍巻きや長巻タイプへの切り替えも節約になります。' },
    { id:'detergent',cat:'日用品', name:'洗剤・シャンプー等', hike:12, def:2000,
      tip:'詰め替えタイプの活用・大容量へ切り替え・PBブランドへの変更が有効です。' },
    { id:'diaper',  cat:'日用品', name:'おむつ・ベビー用品', hike:10, def:5000,
      tip:'ドラッグストアのポイントカード活用・まとめ買いセール・PBブランドへの切り替えが節約に繋がります。' },
  ];

  // カテゴリ分類
  var CATS = [];
  ITEMS.forEach(function(it) {
    if (CATS.indexOf(it.cat) === -1) CATS.push(it.cat);
  });

  // ── 品目リスト描画 ──
  function renderItems() {
    var saved = getSaved();
    var html = '';
    CATS.forEach(function(cat) {
      html += '<p class="category-title">' + cat + '</p>';
      ITEMS.filter(function(it){ return it.cat === cat; }).forEach(function(it) {
        var checked = saved.checks.indexOf(it.id) !== -1 ? ' checked' : '';
        var amount = saved.amounts[it.id] !== undefined ? saved.amounts[it.id] : it.def;
        html += '<div class="item-row">'
          + '<input type="checkbox" class="item-check" id="chk_' + it.id + '" data-id="' + it.id + '"' + checked + '>'
          + '<label class="item-label" for="chk_' + it.id + '">' + it.name + '</label>'
          + '<span class="item-hike">+' + it.hike + '%</span>'
          + '<input type="number" class="item-amount" id="amt_' + it.id + '" value="' + amount + '" min="0">'
          + '<span class="amount-unit">円/月</span>'
          + '</div>';
      });
    });
    document.getElementById('itemList').innerHTML = html;
  }

  function selectAll(flag) {
    ITEMS.forEach(function(it) {
      var el = document.getElementById('chk_' + it.id);
      if (el) el.checked = flag;
    });
  }

  // ── 診断 ──
  function diagnose() {
    var selected = [];
    ITEMS.forEach(function(it) {
      var chk = document.getElementById('chk_' + it.id);
      if (chk && chk.checked) {
        var amtEl = document.getElementById('amt_' + it.id);
        var monthly = parseFloat(amtEl ? amtEl.value : it.def) || 0;
        var annual  = monthly * 12;
        var increase = Math.round(annual * it.hike / 100);
        selected.push({ name: it.name, hike: it.hike, monthly: monthly, annual: annual, increase: increase, tip: it.tip, cat: it.cat });
      }
    });

    if (selected.length === 0) {
      showErr('品目を1つ以上選んでください');
      return;
    }

    // 保存
    saveState(selected);

    var total = selected.reduce(function(s, it){ return s + it.increase; }, 0);
    var monthly = Math.round(total / 12);

    // 評価
    var level = total < 30000 ? 'ok' : total < 80000 ? 'warn' : 'ng';
    var eval_ = total < 30000 ? '影響は限定的です' : total < 80000 ? '家計への影響が出ています' : '大幅な負担増です。対策が必要です';

    // 結果表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(total) + ' 円';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = '月あたり約 ' + fmt(monthly) + ' 円のコスト増（選択した品目の合計）';

    // 内訳
    var rows = selected.slice().sort(function(a,b){ return b.increase - a.increase; });
    var dbHTML = rows.map(function(it){
      return '<tr><td>' + it.name + '（+' + it.hike + '%）</td><td>+' + fmt(it.increase) + ' 円/年</td></tr>';
    }).join('');
    dbHTML += '<tr class="hl"><td>合計 年間負担増</td><td>+' + fmt(total) + ' 円</td></tr>';
    document.getElementById('db').innerHTML = dbHTML;
    document.getElementById('detail').style.display = 'block';

    // 節約tips（上位3品目＋汎用tips）
    var tipsHTML = rows.slice(0, 4).map(function(it){
      return '<li><span class="tips-cat">' + it.name + ' の節約策</span>' + it.tip + '</li>';
    }).join('');
    tipsHTML += '<li><span class="tips-cat">家計全体の対策</span>支出の多い品目から順に代替・削減策を試す。スーパーのチラシアプリで特売をチェックして計画的に購入する習慣が最も効果的です。</li>';
    document.getElementById('tipsList').innerHTML = tipsHTML;
    document.getElementById('tipsCard').style.display = 'block';

    // スクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 保存・読み込み ──
  var LS_KEY = 'kaimono_hinmoku_v1';
  function saveState(selected) {
    var checks = selected.map(function(it){ return ITEMS.find(function(x){ return x.name === it.name; }).id; });
    var amounts = {};
    ITEMS.forEach(function(it) {
      var el = document.getElementById('amt_' + it.id);
      if (el) amounts[it.id] = parseFloat(el.value) || 0;
    });
    try { localStorage.setItem(LS_KEY, JSON.stringify({ checks: checks, amounts: amounts })); } catch(e){}
  }
  function getSaved() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (d && d.checks) return d;
    } catch(e){}
    // デフォルト: よく使う品目を初期選択
    var def = ['rice','bread','meat','egg','milk','vege','oil','seasoning','elec','gas','paper','detergent'];
    var amounts = {};
    ITEMS.forEach(function(it){ amounts[it.id] = it.def; });
    return { checks: def, amounts: amounts };
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('tipsCard').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 初期化
  renderItems();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
