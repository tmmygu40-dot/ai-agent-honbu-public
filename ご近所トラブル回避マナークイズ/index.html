<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご近所トラブル回避マナークイズ｜10問で学ぶ正解マナー</title>
  <meta name="description" content="騒音・ゴミ・挨拶・ペット・駐車など、ご近所トラブルの正解マナーを10問の3択クイズで即チェック。引っ越し前後やマンション暮らしの方の予習にどうぞ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      max-width: 600px; margin: 0 auto 0.8rem; padding: 0 0.2rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--text-sub);
    }
    .progress .best { font-weight: 700; color: var(--accent); }
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem;
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar > div { height: 100%; background: var(--accent); transition: width 0.25s; }

    .question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.55;
      margin-bottom: 1rem;
    }

    .choice {
      display: block; width: 100%;
      text-align: left; padding: 0.85rem 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.4;
    }
    .choice:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice:disabled { cursor: default; opacity: 0.85; }
    .choice.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice.wrong   { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .choice .mark { font-weight: 800; margin-right: 0.4rem; }

    .feedback {
      display: none;
      margin-top: 0.8rem; padding: 0.85rem 1rem;
      border-radius: 10px; font-size: 0.9rem; line-height: 1.55;
    }
    .feedback.ok { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--text); }
    .feedback.ng { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--text); }
    .feedback strong { display: block; margin-bottom: 0.3rem; font-size: 0.95rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-secondary {
      display: block; width: 100%; max-width: 600px;
      margin: 0.6rem auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.1rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.3rem; margin-bottom: 0.5rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; }

    .review-item {
      padding: 0.9rem 0; border-bottom: 1px solid var(--border);
    }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; line-height: 1.45; }
    .review-q .badge {
      display: inline-block; font-size: 0.72rem; font-weight: 800;
      padding: 0.1rem 0.45rem; border-radius: 4px; margin-right: 0.4rem; vertical-align: 1px;
    }
    .review-q .badge.ok { background: var(--ok); color: #fff; }
    .review-q .badge.ng { background: var(--ng); color: #fff; }
    .review-a { font-size: 0.82rem; color: var(--text-sub); line-height: 1.55; margin-bottom: 0.2rem; }
    .review-a b { color: var(--text); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-secondary, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>ご近所トラブル回避マナークイズ</h1>
    <p class="subtitle">騒音・ゴミ・挨拶など10問で「やっておくと安心」が分かる ※一般的な目安。最終判断は自治体・管理規約をご確認ください</p>
  </header>

  <!-- プレイ画面 -->
  <div id="play-area">
    <div class="progress">
      <span id="prog-text">問題 1 / 10</span>
      <span class="best" id="best-text"></span>
    </div>
    <div class="progress-bar"><div id="prog-bar" style="width:10%"></div></div>

    <div class="card" id="quiz-card">
      <p class="card-title">問題</p>
      <p class="question" id="q-text">—</p>
      <div id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <button class="btn-calc" id="next-btn" style="display:none" onclick="next()">次の問題へ</button>
  </div>

  <!-- 結果画面 -->
  <div id="result-area" style="display:none">
    <div class="result-card" id="result">
      <p class="result-label">あなたのスコア</p>
      <p class="result-value" id="rv">—</p>
      <p class="result-eval" id="re"></p>
      <p class="result-note" id="rn"></p>
    </div>

    <div class="card">
      <p class="card-title">復習：全問の正解と解説</p>
      <div id="review-list"></div>
    </div>

    <button class="btn-calc" onclick="restart()">もう一度挑戦する</button>
    <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、総務省・国土交通省・自治体の公開情報や、民法（相隣関係）、消防法などを参考に、生活実用の目安として整理しています。具体的な対応は地域・物件のルールをご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUIZ = [
    {
      q: '夜10時以降、上の階から大きな足音が続く。最初の行動として最も無難なのは？',
      choices: [
        '直接ドアをノックして強く抗議する',
        '管理会社や管理組合・自治会経由で相談する',
        'こちらも騒音を出して仕返しする'
      ],
      correct: 1,
      explain: '直接対面の抗議は感情的なトラブルに発展しやすい。第三者（管理会社・管理組合・自治会）を介して伝えるのが穏便で実効性も高い。'
    },
    {
      q: '燃えるゴミの収集について、最も基本的なマナーは？',
      choices: [
        '前日の夜に集積所へ出しておく',
        '指定の収集日の朝、指定時刻までに出す',
        '自宅前の道路にいつでも出してよい'
      ],
      correct: 1,
      explain: '多くの自治体は「収集日の朝、指定時刻までに集積所へ」が基本ルール。前夜出しはカラス被害や近隣迷惑、ルール違反になる地域が多い。'
    },
    {
      q: '戸建てに引っ越したとき、挨拶範囲としてよく言われる目安は？',
      choices: [
        '同じ町内会の全戸',
        '向こう三軒両隣',
        '挨拶は不要（個人の自由）'
      ],
      correct: 1,
      explain: '戸建ては「向こう三軒両隣」、マンションは「両隣＋上下階」が一般的な目安。任意ではあるが、最初の関係づくりに有効。'
    },
    {
      q: '飼っている犬の鳴き声で「うるさい」と苦情が来た。最初にすべきは？',
      choices: [
        '苦情を無視して様子を見る',
        '謝意を示し、原因と対策（しつけ・防音・受診など）を伝える',
        '「防音は無理」とハッキリ反論する'
      ],
      correct: 1,
      explain: 'まず謝意を示すことで角が立たない。そのうえで具体策を伝えると相手も納得しやすい。無視・反論は関係悪化の典型パターン。'
    },
    {
      q: '共用駐車場で他人の車に少しこすってしまった。正しい対応は？',
      choices: [
        '誰も見ていなければそのまま立ち去る',
        '連絡先を残し、警察と保険会社へ連絡する',
        '夜にこっそり修理代を置いておく'
      ],
      correct: 1,
      explain: '物損でも警察への報告義務がある（道交法）。立ち去ると当て逃げになり得る。連絡先を残し警察・保険会社に連絡するのが正解。'
    },
    {
      q: '自宅の庭木が隣家の敷地に枝でせり出している。原則の対応は？',
      choices: [
        '隣家が自由に切ってよい',
        '木の所有者（自分）が切る、または切るよう求められたら対応する',
        '市役所に通報すれば伐採される'
      ],
      correct: 1,
      explain: '原則は所有者が管理・伐採する。2023年4月の民法改正で一定条件下では隣家側の切除も可能になったが、まずは所有者へ催告するのが筋。'
    },
    {
      q: '町内会・自治会への加入について正しいのは？',
      choices: [
        '法律上の加入義務がある',
        '任意（だが防災・ゴミ・回覧板など地域情報の入口になりやすい）',
        'マンション住民は強制加入'
      ],
      correct: 1,
      explain: '町内会への加入は任意（最高裁判例あり）。ただし災害時・ゴミ集積所の運用・回覧板など、加入しておくとメリットが大きい場面も多い。'
    },
    {
      q: 'マンションの共用廊下に、同じ階の住人が私物を置き続けている。最初の対応は？',
      choices: [
        '直接呼び出して強く片付けを要求する',
        '管理会社・管理組合に相談する',
        '黙認して自分も置く'
      ],
      correct: 1,
      explain: '共用廊下の私物放置は消防法上の避難経路確保の観点で問題になり得る。管理側に相談するのが穏便かつ正攻法。'
    },
    {
      q: '子どもが他所の家のガラスを誤って割ってしまった。まず親がすべきは？',
      choices: [
        '子ども本人だけに謝らせて済ます',
        '親が同行して謝罪し、修理費用の負担を申し出る',
        'SNSで状況を説明して様子を見る'
      ],
      correct: 1,
      explain: '親が同行して誠意を示すのが第一。金銭面は個人賠償責任保険（火災保険等の特約）で対応できることも多いので確認しておくと安心。'
    },
    {
      q: '隣人からの苦情で感情的になりそうな時、トラブルを拗らせない鉄則は？',
      choices: [
        'その場で言い返してハッキリ決着させる',
        '一度距離を置き、冷静に話し合う場（または第三者）を設ける',
        'SNSに投稿して周囲の意見を募る'
      ],
      correct: 1,
      explain: '感情のぶつけ合いは関係を決定的に悪化させる。一旦時間を置く・第三者（管理会社・自治会・自治体相談窓口など）を入れるのが解決の近道。'
    }
  ];

  var STORAGE_KEY = 'gokinjo-manner-quiz-best';

  var idx = 0;
  var score = 0;
  var answers = []; // 各問の選択番号

  function init() {
    idx = 0; score = 0; answers = [];
    document.getElementById('play-area').style.display = '';
    document.getElementById('result-area').style.display = 'none';
    showBest();
    render();
  }

  function showBest() {
    var best = localStorage.getItem(STORAGE_KEY);
    var el = document.getElementById('best-text');
    if (best !== null) {
      el.textContent = '最高記録 ' + best + ' / ' + QUIZ.length;
    } else {
      el.textContent = '';
    }
  }

  function render() {
    var item = QUIZ[idx];
    document.getElementById('prog-text').textContent = '問題 ' + (idx + 1) + ' / ' + QUIZ.length;
    document.getElementById('prog-bar').style.width = ((idx + 1) / QUIZ.length * 100) + '%';
    document.getElementById('q-text').textContent = item.q;

    var marks = ['A', 'B', 'C'];
    var html = '';
    for (var i = 0; i < item.choices.length; i++) {
      html += '<button class="choice" data-i="' + i + '" onclick="answer(' + i + ')">'
            + '<span class="mark">' + marks[i] + '.</span>' + escapeHtml(item.choices[i])
            + '</button>';
    }
    document.getElementById('choices').innerHTML = html;

    var fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.className = 'feedback';
    fb.innerHTML = '';

    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('next-btn').textContent = (idx === QUIZ.length - 1) ? '結果を見る' : '次の問題へ';
  }

  function answer(i) {
    var item = QUIZ[idx];
    answers.push(i);
    var correct = (i === item.correct);
    if (correct) score++;

    var btns = document.querySelectorAll('#choices .choice');
    btns.forEach(function(b) {
      b.disabled = true;
      var bi = parseInt(b.getAttribute('data-i'), 10);
      if (bi === item.correct) b.classList.add('correct');
      else if (bi === i)        b.classList.add('wrong');
    });

    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (correct ? 'ok' : 'ng');
    var head = correct ? '⭕ 正解！' : '❌ 不正解';
    fb.innerHTML = '<strong>' + head + '</strong>' + escapeHtml(item.explain);
    fb.style.display = 'block';

    document.getElementById('next-btn').style.display = 'block';
  }

  function next() {
    if (idx < QUIZ.length - 1) {
      idx++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      finish();
    }
  }

  function finish() {
    document.getElementById('play-area').style.display = 'none';
    document.getElementById('result-area').style.display = '';

    var total = QUIZ.length;
    var level, eval_, note;
    if (score === total) {
      level = 'ok';
      eval_ = '🏆 ご近所マナーの達人！';
      note = '完璧です。今の振る舞いを続ければ、ご近所トラブルとはほぼ無縁でしょう。';
    } else if (score >= 7) {
      level = 'ok';
      eval_ = '👍 合格ライン';
      note = '基本は押さえています。間違えた問題だけ復習しておけば、いざという時に迷いません。';
    } else if (score >= 4) {
      level = 'warn';
      eval_ = '🤔 もう少し！';
      note = '半分程度。原則を知っているとトラブルの予防になります。下の解説でサクッと復習を。';
    } else {
      level = 'ng';
      eval_ = '😅 要復習ゾーン';
      note = '思い込みで動くと拗れがち。下の正解と解説をひと通り読むだけでも、対応の質がぐっと上がります。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    document.getElementById('rv').textContent = score + ' / ' + total + ' 問正解';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    // 復習リスト
    var marks = ['A', 'B', 'C'];
    var rev = '';
    for (var i = 0; i < QUIZ.length; i++) {
      var it = QUIZ[i];
      var picked = answers[i];
      var ok = (picked === it.correct);
      rev += '<div class="review-item">'
           + '<p class="review-q"><span class="badge ' + (ok ? 'ok' : 'ng') + '">' + (ok ? '正解' : '不正解') + '</span>'
           + 'Q' + (i + 1) + '. ' + escapeHtml(it.q) + '</p>'
           + '<p class="review-a">あなたの回答：' + marks[picked] + '. ' + escapeHtml(it.choices[picked]) + '</p>'
           + '<p class="review-a">正解：<b>' + marks[it.correct] + '. ' + escapeHtml(it.choices[it.correct]) + '</b></p>'
           + '<p class="review-a">' + escapeHtml(it.explain) + '</p>'
           + '</div>';
    }
    document.getElementById('review-list').innerHTML = rev;

    // 最高スコア更新
    var bestRaw = localStorage.getItem(STORAGE_KEY);
    var best = bestRaw === null ? -1 : parseInt(bestRaw, 10);
    if (isNaN(best)) best = -1;
    if (score > best) {
      try { localStorage.setItem(STORAGE_KEY, String(score)); } catch (e) {}
    }
  }

  function restart() {
    init();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  init();
  </script>
