<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="欠品・納期遅延・品質不良などのトラブル種別を選び、取引先名や品名を入力するだけでお詫びメール文面を即生成。ビジネスメール作成を時短できるジェネレーターです。">
  <title>取引先向けお詫び文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card .result-label {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); margin-bottom: 0.8rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .result-text {
      font-size: 0.92rem; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>取引先向けお詫び文ジェネレーター</h1>
    <p class="subtitle">欠品・納期遅延・品質不良…トラブル種別を選んで即メール文面を作成</p>
  </header>

  <!-- 入力カード：トラブル種別 -->
  <div class="card">
    <p class="card-title">トラブル種別</p>
    <div class="field">
      <label for="troubleType">お詫びの理由</label>
      <select id="troubleType" onchange="updateFields()">
        <option value="">-- 選択してください --</option>
        <option value="stockout">欠品（在庫切れ）</option>
        <option value="delay">納期遅延</option>
        <option value="quality">品質不良</option>
        <option value="quantity">数量間違い</option>
        <option value="wrong_item">誤出荷（商品違い）</option>
        <option value="damage">破損・汚損</option>
        <option value="system">システム障害</option>
        <option value="response">対応遅延・連絡漏れ</option>
      </select>
    </div>
  </div>

  <!-- 入力カード：詳細情報 -->
  <div class="card" id="detailInput">
    <p class="card-title">詳細情報</p>
    <div class="field">
      <label for="companyName">取引先名（会社名）</label>
      <input type="text" id="companyName" placeholder="例: 株式会社○○">
    </div>
    <div class="field">
      <label for="personName">担当者名</label>
      <input type="text" id="personName" placeholder="例: 山田様">
      <p class="hint">空欄なら「ご担当者様」になります</p>
    </div>
    <div class="field">
      <label for="productName">対象商品・サービス名</label>
      <input type="text" id="productName" placeholder="例: 型番ABC-123">
    </div>
    <div class="field" id="dateField">
      <label for="incidentDate">発生日・該当日</label>
      <input type="date" id="incidentDate">
    </div>
    <div class="field" id="delayDateField" style="display:none">
      <label for="newDate">変更後の納期・対応予定日</label>
      <input type="date" id="newDate">
      <p class="hint">未定の場合は空欄でOK</p>
    </div>
    <div class="field">
      <label for="cause">原因（簡潔に）</label>
      <input type="text" id="cause" placeholder="例: 生産ラインの設備トラブル">
      <p class="hint">空欄なら定型文が入ります</p>
    </div>
    <div class="field">
      <label for="measure">対応策・再発防止策</label>
      <textarea id="measure" placeholder="例: 検品体制を強化し、再発防止に努めます"></textarea>
      <p class="hint">空欄なら定型文が入ります</p>
    </div>
    <div class="field">
      <label for="senderName">差出人名</label>
      <input type="text" id="senderName" placeholder="例: 営業部 鈴木太郎">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">お詫び文を生成する</button>

  <!-- 結果表示 -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたお詫び文</p>
    <div class="result-text" id="resultText"></div>
  </div>

  <!-- コピーボタン -->
  <button class="btn-copy" id="copyBtn" style="display:none" onclick="copyText()">クリップボードにコピー</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは一般的なビジネスメールの書式を参考に、お詫び文の雛形を生成します。送信前に内容を必ずご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── トラブル種別ごとの定型データ ── */
  var TEMPLATES = {

      subject: '欠品のお詫びとご対応について',

      body: function(d) {

          + (d.date ? '発生日：' + d.date + '\n' : '')

          + '【今後の対応】\n'
          + (d.newDate ? '入荷予定日：' + d.newDate + '\n' : '入荷時期が確定次第、改めてご連絡いたします。\n')
          + d.measure + '\n\n'
          + '今後このようなことのないよう、管理体制の強化に取り組んでまいります。\n'
          + '何卒ご容赦くださいますようお願い申し上げます。';
      }
    },
    delay: {
      subject: '納期遅延のお詫びとご連絡',
      defaultCause: '製造工程における想定外の遅延が発生したため',
      defaultMeasure: '生産スケジュールの管理を見直し、工程ごとの進捗管理を強化することで再発防止に努めてまいります。',
      body: function(d) {
        return '平素より格別のお引き立てを賜り、厚く御礼申し上げます。\n\n'

      }

    quality: {
      subject: '品質不良のお詫びと対応について',
      defaultCause: '製造工程における検査体制の不備により、品質基準を満たさない製品が出荷されたため',
      defaultMeasure: '検品体制を強化し、出荷前の品質チェック工程を追加することで再発防止に努めてまいります。',
      body: function(d) {
        return '平素より格別のお引き立てを賜り、厚く御礼申し上げます。\n\n'

          + d.company + (d.person ? ' ' + d.person : '') + 'に多大なるご迷惑をおかけしましたこと、深くお詫び申し上げます。\n\n'
          + '【品質不良の詳細】\n'
          + (d.date ? '発覚日：' + d.date + '\n' : '')
          + '対象商品：' + d.product + '\n'
          + '原因：' + d.cause + '\n\n'
          + '【対応と再発防止策】\n'
          + '代替品の手配を速やかに進めております。\n'
          + d.measure + '\n\n'
          + '今後はこのような事態を招かぬよう、品質管理を徹底してまいります。\n'
          + '何卒ご容赦くださいますようお願い申し上げます。';
      }
    },
    quantity: {
      subject: '数量間違いのお詫びと訂正について',
      defaultCause: '出荷作業時の数量確認に不備があったため',
      defaultMeasure: 'ピッキング・梱包時のダブルチェック体制を導入し、数量の照合手順を強化することで再発防止に努めてまいります。',
      body: function(d) {
        return '平素より格別のお引き立てを賜り、厚く御礼申し上げます。\n\n'
          + 'このたびは、' + d.product + 'のご注文に対し、数量の相違が発生しましたこと、'
          + d.company + (d.person ? ' ' + d.person : '') + 'に多大なるご迷惑をおかけしましたこと、深くお詫び申し上げます。\n\n'
          + '【経緯】\n'
          + (d.date ? '発生日：' + d.date + '\n' : '')
          + '対象商品：' + d.product + '\n'
          + '原因：' + d.cause + '\n\n'
          + '【対応】\n'
          + '不足分（または過剰分）につきましては、速やかに対応させていただきます。\n'
          + d.measure + '\n\n'
          + '重ねてお詫び申し上げますとともに、今後このようなことのないよう努めてまいります。';
      }
    },
    wrong_item: {
      subject: '誤出荷のお詫びと対応について',
      defaultCause: '出荷指示の確認不足により、誤った商品を出荷してしまったため',

          + '対象商品：' + d.product + '\n'
          + '原因：' + d.cause + '\n\n'
          + '【対応】\n'
          + '代替品を速やかに手配し、お届けいたします。\n'
          + d.measure + '\n\n'
          + '今後はこのような事態を招かぬよう、細心の注意を払ってまいります。\n'

    },

      subject: 'システム障害のお詫びとご報告',
      defaultCause: 'サーバー側の障害により、一時的にサービスをご利用いただけない状態が発生したため',
      defaultMeasure: '障害原因の調査を完了し、サーバーの冗長化および監視体制の強化を行うことで再発防止に努めてまいります。',
      body: function(d) {
        return '平素より格別のお引き立てを賜り、厚く御礼申し上げます。\n\n'

          + '【障害の概要】\n'
          + (d.date ? '発生日時：' + d.date + '\n' : '')
          + '対象：' + d.product + '\n'
          + '原因：' + d.cause + '\n'
          + (d.newDate ? '復旧予定：' + d.newDate + '\n' : '現在復旧作業を進めております。\n')

          + '【経緯】\n'
          + (d.date ? '該当日：' + d.date + '\n' : '')
          + '対象：' + d.product + '\n'
          + '原因：' + d.cause + '\n\n'
          + '【再発防止策】\n'
          + d.measure + '\n\n'

  };

  /* ── 種別変更時のフィールド切り替え ── */
  function updateFields() {
    var type = document.getElementById('troubleType').value;
    var delayField = document.getElementById('delayDateField');
    if (type === 'delay' || type === 'stockout' || type === 'system') {
      delayField.style.display = 'block';
    } else {
      delayField.style.display = 'none';
    }
  }

  /* ── 日付フォーマット ── */
  function fmtDate(val) {
    if (!val) return '';
    var d = new Date(val);
    return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }

  /* ── 生成 ── */
  function generate() {
    var type = document.getElementById('troubleType').value;
    if (!type) { alert('トラブル種別を選択してください'); return; }

    var tpl = TEMPLATES[type];
    var company = document.getElementById('companyName').value.trim() || '貴社';
    var person = document.getElementById('personName').value.trim();
    var product = document.getElementById('productName').value.trim() || '該当商品';
    var date = fmtDate(document.getElementById('incidentDate').value);
    var newDate = fmtDate(document.getElementById('newDate').value);
    var cause = document.getElementById('cause').value.trim() || tpl.defaultCause;
    var measure = document.getElementById('measure').value.trim() || tpl.defaultMeasure;
    var sender = document.getElementById('senderName').value.trim();

    var data = {
      company: company,
      person: person,
      product: product,
      date: date,
      newDate: newDate,
      cause: cause,
      measure: measure
    };

    var addressee = company + '\n' + (person || 'ご担当者') + '様\n';
    var subject = '件名：' + tpl.subject + '\n\n';
    var body = addressee + '\n' + subject + tpl.body(data);
    if (sender) {
      body += '\n\n' + sender;
    }

    document.getElementById('resultText').textContent = body;
    document.getElementById('result').style.display = 'block';
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('copyBtn').textContent = 'クリップボードにコピー';
    document.getElementById('copyBtn').className = 'btn-copy';

    saveToHistory(type, company, product);
  }

  /* ── コピー ── */
  function copyText() {
    var text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = 'コピーしました!';
      btn.className = 'btn-copy copied';
      setTimeout(function() {
        btn.textContent = 'クリップボードにコピー';
        btn.className = 'btn-copy';
      }, 2000);
    });
  }

  /* ── localStorage 履歴保存 ── */
  var LS_KEY = 'owabi_gen_history';

  function saveToHistory(type, company, product) {
    var history = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    var typeLabel = document.getElementById('troubleType').selectedOptions[0].textContent;
    history.unshift({
      type: typeLabel,
      company: company,
      product: product,
      date: new Date().toISOString().slice(0, 10)
    });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(LS_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    var el = document.getElementById('historyList');
    if (!history.length) {
      el.innerHTML = '<p style="font-size:0.85rem;color:var(--text-sub);text-align:center;">履歴はまだありません</p>';
      return;
    }
    el.innerHTML = history.map(function(h) {
      return '<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;">'
        + '<span style="color:var(--accent);font-weight:600;">' + h.type + '</span> '
        + h.company + ' / ' + h.product
        + '<span style="float:right;color:var(--text-sub);font-size:0.75rem;">' + h.date + '</span>'
        + '</div>';
    }).join('');
  }

  /* ── 今日の日付をデフォルトセット ── */
  document.getElementById('incidentDate').value = new Date().toISOString().slice(0, 10);

  /* ── 初期表示 ── */
  renderHistory();
  </script>

    <div id="historyList"></div>
