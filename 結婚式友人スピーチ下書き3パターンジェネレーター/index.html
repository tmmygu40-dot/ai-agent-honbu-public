<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結婚式友人スピーチ下書き3パターンジェネレーター｜30秒で原稿が完成</title>
  <meta name="description" content="新郎新婦との関係や思い出を入れるだけで、感動・笑い・バランス型の3パターン友人スピーチ原稿を一発生成。当日の3分スピーチがそのまま使えます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .speech-card {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .speech-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em;
      background: var(--accent); color: #fff;
      padding: 0.25rem 0.7rem; border-radius: 6px;
      margin-bottom: 0.8rem;
    }
    .speech-title {
      font-size: 1.1rem; font-weight: 800;
      margin-bottom: 0.8rem; line-height: 1.4;
    }
    .speech-body {
      font-size: 0.95rem; line-height: 1.85;
      color: var(--text); white-space: pre-wrap;
      background: var(--bg);
      padding: 1rem; border-radius: 10px;
      border: 1px solid var(--border);
    }
    .speech-meta {
      font-size: 0.78rem; color: var(--text-sub);
      margin-top: 0.6rem;
    }
    .copy-btn {
      display: inline-block; margin-top: 0.7rem;
      padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:active { transform: translateY(1px); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .copy-btn { display: none !important; }
      .card, .speech-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>結婚式友人スピーチ下書き3パターンジェネレーター</h1>
    <p class="subtitle">関係性と思い出を入れるだけで、感動・笑い・バランス型の3案を即生成（約2〜3分の長さ）</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="myName">あなたのお名前</label>
      <input type="text" id="myName" placeholder="例: 田中太郎">
    </div>
    <div class="field">
      <label for="targetName">スピーチを贈る相手のお名前</label>
      <input type="text" id="targetName" placeholder="例: さくら">
      <p class="hint">新郎または新婦のどちらかを入れてください</p>
    </div>
    <div class="field">
      <label for="targetSide">相手は新郎・新婦どちら？</label>
      <select id="targetSide">
        <option value="新婦">新婦</option>
        <option value="新郎">新郎</option>
      </select>
    </div>
    <div class="field">
      <label for="relation">関係性</label>
      <select id="relation">
        <option value="大学の友人">大学の友人</option>
        <option value="高校の友人">高校の友人</option>
        <option value="中学の友人">中学の友人</option>
        <option value="幼なじみ">幼なじみ</option>
        <option value="職場の同僚">職場の同僚</option>
        <option value="サークル仲間">サークル仲間</option>
        <option value="部活の仲間">部活の仲間</option>
      </select>
    </div>
    <div class="field">
      <label for="years">付き合いの長さ（年）</label>
      <input type="number" id="years" placeholder="例: 10" min="1" max="50">
    </div>
    <div class="field">
      <label for="trait">相手の人柄を一言で</label>
      <input type="text" id="trait" placeholder="例: 明るくて面倒見がいい">
    </div>
    <div class="field">
      <label for="memory">2人の思い出エピソード</label>
      <textarea id="memory" placeholder="例: 試験前に毎日ファミレスで朝まで勉強したこと"></textarea>
      <p class="hint">短くてOK。生成時に膨らませます</p>
    </div>
    <div class="field">
      <label for="partnerName">パートナーのお名前（任意）</label>
      <input type="text" id="partnerName" placeholder="例: 健太">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 結婚式スピーチの一般的な型（自己紹介→お祝い→エピソード→人柄→締め）に沿って3案を生成します。当日読み上げる前に必ずご自身で内容を確認・調整してください。所要時間は約2〜3分が目安です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  function generate() {
    var myName = (document.getElementById('myName').value || '').trim() || '私';
    var targetName = (document.getElementById('targetName').value || '').trim();
    var targetSide = document.getElementById('targetSide').value;
    var relation = document.getElementById('relation').value;
    var years = parseInt(document.getElementById('years').value, 10);
    var trait = (document.getElementById('trait').value || '').trim() || '優しくて思いやりのある人';
    var memory = (document.getElementById('memory').value || '').trim() || '一緒に過ごした何気ない日々';
    var partnerName = (document.getElementById('partnerName').value || '').trim();

    if (!targetName) { alert('スピーチを贈る相手のお名前を入れてください'); return; }
    if (isNaN(years) || years < 1) years = 5;

    var honorific = targetSide === '新婦' ? 'さん' : 'くん';
    var partnerLine = partnerName
      ? (targetSide === '新婦' ? partnerName + 'さん' : partnerName + 'さん')
      : (targetSide === '新婦' ? '新郎さん' : '新婦さん');

    // 3パターン生成
    var emotional = makeEmotional(myName, targetName, honorific, relation, years, trait, memory, partnerLine, targetSide);
    var humor = makeHumor(myName, targetName, honorific, relation, years, trait, memory, partnerLine, targetSide);
    var balanced = makeBalanced(myName, targetName, honorific, relation, years, trait, memory, partnerLine, targetSide);

    var html = ''
      + renderSpeech('感動型', '心にじんわり染みる王道の感動スピーチ', emotional)
      + renderSpeech('笑い型', '会場をあたたかい笑いで包むエピソード重視', humor)
      + renderSpeech('バランス型', '感動と笑いを織り交ぜた万能タイプ', balanced);
    document.getElementById('results').innerHTML = html;

    // localStorage に保存
    try {
      localStorage.setItem('weddingSpeech_lastInput', JSON.stringify({
        myName: myName, targetName: targetName, targetSide: targetSide,
        relation: relation, years: years, trait: trait, memory: memory,
        partnerName: partnerName, savedAt: new Date().toISOString()
      }));
    } catch(e) {}
  }

  function renderSpeech(label, title, body) {
    var charCount = body.length;
    var minutes = (charCount / 350).toFixed(1); // 1分 約350字
    var safe = body.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    var bodyId = 'speech-' + label;
    return '<div class="speech-card">'
      + '<span class="speech-label">' + label + '</span>'
      + '<p class="speech-title">' + title + '</p>'
      + '<div class="speech-body" id="' + bodyId + '">' + safe + '</div>'
      + '<p class="speech-meta">約 ' + charCount + ' 字 / 読み上げ目安 約 ' + minutes + ' 分</p>'
      + '<button class="copy-btn" onclick="copySpeech(\'' + bodyId + '\', this)">📋 コピー</button>'
      + '</div>';
  }

  function copySpeech(id, btn) {
    var text = document.getElementById(id).innerText;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = '✅ コピー済み';
        setTimeout(function(){ btn.textContent = '📋 コピー'; }, 1800);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); btn.textContent = '✅ コピー済み';
        setTimeout(function(){ btn.textContent = '📋 コピー'; }, 1800);
      } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  function makeEmotional(myName, targetName, hon, relation, years, trait, memory, partnerLine, side) {
    var sideJp = side === '新婦' ? '新婦' : '新郎';
    return targetName + hon + '、' + partnerLine + '、本日はご結婚、本当におめでとうございます。\n\n'
      + 'ただいまご紹介に預かりました、' + sideJp + 'の' + relation + 'の' + myName + 'と申します。'
      + 'このような晴れの席でお話しさせていただけること、心から光栄に思います。\n\n'
      + targetName + hon + 'と私は、' + relation + 'として' + years + '年来のお付き合いになります。'
      + '出会った頃から今日まで、本当にたくさんの時間を一緒に過ごしてきました。\n\n'
      + '中でも忘れられないのが、' + memory + '。'
      + 'あの日々があったからこそ、今の私たちの関係があるのだと、改めて思います。\n\n'
      + targetName + hon + 'は、' + trait + '、そんな人です。'
      + 'いつも周りをそっと支えて、自分のことは後回しにしてしまう。'
      + 'そんな' + targetName + hon + 'が、心から大切に思える人と出会い、今日この日を迎えられたこと、'
      + '本当に、本当に嬉しく思います。\n\n'
      + partnerLine + '、どうかこれからも、' + targetName + hon + 'を大切にしてあげてください。'
      + 'お二人なら、きっと素敵な家庭を築いていけると信じています。\n\n'
      + '末永くお幸せに。本日は本当におめでとうございます。';
  }

  function makeHumor(myName, targetName, hon, relation, years, trait, memory, partnerLine, side) {
    var sideJp = side === '新婦' ? '新婦' : '新郎';
    return targetName + hon + '、' + partnerLine + '、ご結婚おめでとうございます！\n\n'
      + 'ご紹介に預かりました、' + sideJp + 'の' + relation + 'の' + myName + 'です。'
      + '緊張で手汗が止まらないのですが、なんとか最後まで読み切りますので、お付き合いください。\n\n'
      + targetName + hon + 'との出会いはちょうど' + years + '年前。'
      + 'あの頃の私たちは、まさかこの日が来るなんて想像もしていませんでした。'
      + '正直、' + targetName + hon + 'が結婚すると聞いたとき、一番驚いたのは私かもしれません（笑）。\n\n'
      + '思い出すのは、' + memory + '。'
      + 'あの時の' + targetName + hon + 'の顔、今でも忘れられません。'
      + '今日この場にも、当時を知る友人が何人かいますが、みんな同じ気持ちだと思います。\n\n'
      + 'そんな' + targetName + hon + 'ですが、実は本当は、' + trait + 'んです。'
      + 'ふざけているように見えて、いざという時は誰よりも頼りになる。'
      + 'それが' + targetName + hon + 'の本当の魅力だと、私は知っています。\n\n'
      + partnerLine + '、' + targetName + hon + 'はちょっと変わってますが、最高の人です。'
      + 'これから一緒に過ごす中で、たぶん毎日笑わせてもらえると思います。'
      + '末永く、よろしくお願いします。\n\n'
      + '本日は本当におめでとうございます！';
  }

  function makeBalanced(myName, targetName, hon, relation, years, trait, memory, partnerLine, side) {
    var sideJp = side === '新婦' ? '新婦' : '新郎';
    return targetName + hon + '、' + partnerLine + '、ご結婚誠におめでとうございます。\n\n'
      + 'ただいまご紹介いただきました、' + sideJp + 'の' + relation + 'の' + myName + 'です。'
      + '本日はこのような素敵な席にお招きいただき、ありがとうございます。\n\n'
      + targetName + hon + 'とは' + relation + 'として、' + years + '年来の付き合いになります。'
      + '気がつけばこんなに長い時間が経っていて、自分でも驚いています。\n\n'
      + '今でもよく覚えているのが、' + memory + 'です。'
      + 'あの時のことを思い出すと、今でも自然に笑顔になります。'
      + 'こうして二人で笑い合える思い出が積み重なって、今日まで続いてきたんだなと感じます。\n\n'
      + targetName + hon + 'は、' + trait + '。'
      + 'そばにいる人を自然と元気にしてしまう、不思議な力を持っている人です。'
      + 'そんな' + targetName + hon + 'が選んだ' + partnerLine + 'は、'
      + 'きっと' + targetName + hon + 'の魅力を一番分かってくれる人なのだと思います。\n\n'
      + partnerLine + '、どうかこれからも、' + targetName + hon + 'の笑顔を守ってあげてください。'
      + '私たち友人も、二人のことをずっと応援しています。\n\n'
      + '末永くお幸せに。本日は本当におめでとうございます。';
  }

  // 前回入力を復元
  (function restore(){
    try {
      var raw = localStorage.getItem('weddingSpeech_lastInput');
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.myName) document.getElementById('myName').value = d.myName === '私' ? '' : d.myName;
      if (d.targetName) document.getElementById('targetName').value = d.targetName;
      if (d.targetSide) document.getElementById('targetSide').value = d.targetSide;
      if (d.relation) document.getElementById('relation').value = d.relation;
      if (d.years) document.getElementById('years').value = d.years;
      if (d.trait && d.trait !== '優しくて思いやりのある人') document.getElementById('trait').value = d.trait;
      if (d.memory && d.memory !== '一緒に過ごした何気ない日々') document.getElementById('memory').value = d.memory;
      if (d.partnerName) document.getElementById('partnerName').value = d.partnerName;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
