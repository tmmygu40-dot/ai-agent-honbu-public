<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ替え歌ジェネレーター｜値上げラッシュを笑い飛ばすワンフレーズ即生成</title>
  <meta name="description" content="食品や光熱費、ガソリンなど身近な値上げを「童謡風・演歌風・ラップ風」など5つの曲調で替え歌の1フレーズに変換。ストレスをユーモアに変える無料Webアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      background: var(--accent-light);
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-lyric {
      font-size: 1.15rem; font-weight: 700; line-height: 1.7;
      color: var(--text); white-space: pre-line;
      margin-bottom: 0.8rem;
    }
    .result-meta { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 1rem; }

    .btn-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    .btn-sub {
      padding: 0.6rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
    }
    .btn-sub:active { background: var(--accent); color: #fff; }

    .fav-list-card { display: none; }
    .fav-item {
      padding: 0.7rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem; line-height: 1.6; white-space: pre-line;
      position: relative;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-meta { display: block; font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .fav-del {
      position: absolute; top: 0.6rem; right: 0.3rem;
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 0.85rem;
    }
    .fav-del:hover { color: var(--ng); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>値上げ替え歌ジェネレーター</h1>
    <p class="subtitle">値上げラッシュを笑い飛ばすワンフレーズを即生成。※フレーズはすべてオリジナルです</p>
  </header>

  <div class="card">
    <p class="card-title">ネタを選ぶ</p>
    <div class="field">
      <label for="topic">値上げ対象</label>
      <select id="topic">
        <option value="random">おまかせ（ランダム）</option>
        <option value="food">食品（キャベツ・玉子など）</option>
        <option value="energy">光熱費（電気・ガス）</option>
        <option value="fuel">ガソリン</option>
        <option value="dining">外食・コンビニ</option>
        <option value="daily">日用品（ティッシュ・洗剤）</option>
        <option value="luxury">嗜好品（コーヒー・ビール）</option>
      </select>
    </div>
    <div class="field">
      <label for="style">曲調</label>
      <select id="style">
        <option value="random">おまかせ（ランダム）</option>
        <option value="doyo">童謡風</option>
        <option value="enka">演歌風</option>
        <option value="pops">ポップス風</option>
        <option value="rap">ラップ風</option>
        <option value="samba">サンバ風</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">フレーズを生成</button>

  <div class="result-card" id="result">
    <p class="result-label">♪ 替え歌ワンフレーズ ♪</p>
    <p class="result-lyric" id="rv">—</p>
    <p class="result-meta" id="rn"></p>
    <div class="btn-row">
      <button class="btn-sub" onclick="generate()">🎵 もう一回</button>
      <button class="btn-sub" onclick="copyLyric()">📋 コピー</button>
      <button class="btn-sub" onclick="saveFav()">⭐ 保存</button>
    </div>
  </div>

  <div class="card fav-list-card" id="favCard">
    <p class="card-title">⭐ お気に入り</p>
    <div id="favList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 このアプリのフレーズはすべてアプリ独自に組み立てたオリジナルです。実在の歌詞は使っていません。値上げの体感は総務省「消費者物価指数」、資源エネルギー庁、農林水産省などの公開データを参考にしています。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ネタ語彙 ──
  var ITEMS = {
    food:    ['キャベツ', '玉子', 'お米', '玉ねぎ', 'バター', '牛乳', 'トマト', '小麦粉', '味噌', '醤油'],
    energy:  ['電気代', 'ガス代', '灯油', 'エアコン', '冷蔵庫', '電気の請求書'],
    fuel:    ['ガソリン', 'ハイオク', '軽油', '満タン'],
    dining:  ['ラーメン', '牛丼', 'コンビニ弁当', 'おにぎり', 'カフェのコーヒー', 'ハンバーガー'],
    daily:   ['ティッシュ', '洗剤', 'シャンプー', 'トイレットペーパー', 'マスク', '歯ブラシ'],
    luxury:  ['ビール', 'コーヒー', 'チョコレート', 'アイス', 'ワイン', 'ケーキ']
  };

  var STYLE_NAME = {
    doyo: '童謡風', enka: '演歌風', pops: 'ポップス風', rap: 'ラップ風', samba: 'サンバ風'
  };

  // ── フレーズパターン（{item} を差し替え） ──
  var PATTERNS = {
    doyo: [
      '{item}さん {item}さん どこ行くの～\nお値段ばかりが 高くなる～',
      'ぞうさん ぞうさん お鼻が長いの～\nそれより{item}が 高いのよ～',
      'むかしむかし {item}は 安かった～\n今じゃ手も出ない 夢のまた夢～',
      'おててつないで {item}買いに～\nレジで青ざめ 帰り道～'
    ],
    enka: [
      '{item}よ {item}よ なぜ値上げる～\n今宵もため息 ひとりきり～',
      '夜の街角 {item}の値札～\n見るたび涙が こぼれます～',
      '惚れた{item}に 振られたみたい～\n手の届かない 高嶺の花よ～',
      '酒場の隅で {item}を肴に～\n値上げの恨みを 噛みしめる～'
    ],
    pops: [
      'Oh Yeah～ {item}が値上げ～\n財布がCryin\' Tonight～',
      '{item}を抱きしめて 走り出すの～\n値段が変わる前に Hurry up～',
      'Hey hey hey {item}が止まらない～\n上昇気流に 乗っちゃった～',
      'キラキラ{item} まぶしすぎて～\n手に入らない Stay Gold～'
    ],
    rap: [
      'Yo! {item}値上げ Crazy Price～\n財布の中身は Empty Vibes',
      'チェケラ {item} 高騰中 Yeah～\n庶民の悲鳴が Echo Echo～',
      '{item}買いに行く Mission Impossible～\nレジで撃沈 Game Over～',
      'Mic Check {item}が攻めてくる～\n防御無理ゲー Help me yo～'
    ],
    samba: [
      '{item}カモーン！値上げに ハ・ナ・サ・ナ・イ～\nオレのサイフよ サンバ・ノ・チカラ～',
      'オーレ！{item} 踊る価格～\nリオの夜より 熱い値上げ～',
      'ワンモアタイム {item}でフィーバー～\nレジ前カーニバル 涙のサンバ～',
      '太陽の{item} 燃える値札～\n踊りながら 泣いちゃうよ～'
    ]
  };

  var styleKeys = Object.keys(PATTERNS);
  var topicKeys = Object.keys(ITEMS);

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generate() {
    var topic = document.getElementById('topic').value;
    var style = document.getElementById('style').value;
    if (topic === 'random') topic = pick(topicKeys);
    if (style === 'random') style = pick(styleKeys);

    var item = pick(ITEMS[topic]);
    var pat  = pick(PATTERNS[style]);
    var lyric = pat.split('{item}').join(item);

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('rv').textContent = lyric;
    document.getElementById('rn').textContent = '【' + STYLE_NAME[style] + '】 ネタ：' + item;

    rc.dataset.lyric = lyric;
    rc.dataset.meta  = '【' + STYLE_NAME[style] + '】 ネタ：' + item;
  }

  function copyLyric() {
    var lyric = document.getElementById('rv').textContent;
    if (!lyric || lyric === '—') return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(lyric).then(function(){
        flashBtn('コピーしました');
      }, function(){ fallbackCopy(lyric); });
    } else {
      fallbackCopy(lyric);
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); flashBtn('コピーしました'); }
    catch(e) { flashBtn('コピー失敗'); }
    document.body.removeChild(ta);
  }
  function flashBtn(msg) {
    var meta = document.getElementById('rn');
    var orig = meta.textContent;
    meta.textContent = '✓ ' + msg;
    setTimeout(function(){ meta.textContent = orig; }, 1500);
  }

  // ── お気に入り（localStorage） ──
  var FAV_KEY = 'kaeuta_favs_v1';
  var FAV_MAX = 20;

  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function storeFavs(list) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(list)); } catch(e) {}
  }
  function saveFav() {
    var rc = document.getElementById('result');
    var lyric = rc.dataset.lyric || '';
    var meta  = rc.dataset.meta  || '';
    if (!lyric) return;
    var list = loadFavs();
    if (list.some(function(x){ return x.lyric === lyric; })) {
      flashBtn('既に保存済みです');
      return;
    }
    list.unshift({ lyric: lyric, meta: meta, t: Date.now() });
    if (list.length > FAV_MAX) list = list.slice(0, FAV_MAX);
    storeFavs(list);
    renderFavs();
    flashBtn('お気に入りに追加');
  }
  function delFav(idx) {
    var list = loadFavs();
    list.splice(idx, 1);
    storeFavs(list);
    renderFavs();
  }
  function renderFavs() {
    var list = loadFavs();
    var card = document.getElementById('favCard');
    var box  = document.getElementById('favList');
    if (!list.length) { card.style.display = 'none'; box.innerHTML = ''; return; }
    card.style.display = 'block';
    box.innerHTML = list.map(function(x, i){
      var safeL = x.lyric.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var safeM = (x.meta || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="fav-item">' + safeL +
             '<span class="fav-meta">' + safeM + '</span>' +
             '<button class="fav-del" onclick="delFav(' + i + ')" aria-label="削除">×</button>' +
             '</div>';
    }).join('');
  }

  // 初期表示
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
