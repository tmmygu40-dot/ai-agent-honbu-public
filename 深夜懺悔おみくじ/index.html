<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深夜懺悔おみくじ｜今日のやらかしを星と月に謝る癒しアプリ</title>
  <meta name="description" content="今日の「やらかし」を選んで星と月に懺悔するだけで、おみくじ風のお告げと明日のひとことが返ってくる、寝る前にちょっと心が軽くなる癒しアプリです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #0d1326;
      --bg2: #1a1f3a;
      --card: #ffffff;
      --border: #d8d3e8;
      --accent: #6b4ec7;
      --accent-light: #f4f0ff;
      --text: #1c1917;
      --text-sub: #6b6478;
      --gold: #e0b84a;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 4px 18px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '✦  ✧    ★      ✦   ✧  ★    ✦      ✧  ★   ✦  ✧';
      position: fixed; top: 0; left: 0; right: 0;
      font-size: 0.7rem; color: rgba(255,255,255,0.15);
      letter-spacing: 0.4em; line-height: 2.2;
      white-space: pre-wrap; pointer-events: none;
      z-index: 0; padding: 1rem;
    }

    .app-header {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid var(--gold);
      padding: 1.4rem 1.2rem 1.1rem;
      margin-bottom: 1.5rem;
      text-align: center;
      position: relative; z-index: 1;
    }
    .app-header h1 {
      font-size: 1.3rem; font-weight: 900; letter-spacing: -0.01em;
      color: #fff;
    }
    .app-header .subtitle {
      font-size: 0.82rem; color: rgba(255,255,255,0.7);
      margin-top: 0.35rem;
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      position: relative; z-index: 1;
    }
    .card-title {
      font-size: 0.82rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      margin-bottom: 0.9rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: background-color 0.15s;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item:hover { background-color: var(--accent-light); }
    .check-item input[type="checkbox"] {
      width: 18px; height: 18px; flex-shrink: 0; cursor: pointer;
      accent-color: var(--accent);
    }
    .check-item .check-text { font-size: 0.95rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      color: var(--accent); font-weight: 600;
    }

    .free-input {
      margin-top: 0.9rem;
    }
    .free-input label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-sub); margin-bottom: 0.35rem;
    }
    .free-input input {
      width: 100%; padding: 0.7rem 0.9rem;
      font-size: 0.95rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--accent-light); color: var(--text);
      outline: none; -webkit-appearance: none;
    }
    .free-input input:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: calc(100% - 2.4rem); max-width: 600px;
      margin: 0 auto 1.4rem; padding: 1.1rem;
      font-size: 1.08rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent) 0%, #4c2e9e 100%);
      color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #3a2278, 0 6px 20px rgba(107,78,199,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.04em;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #3a2278, 0 2px 10px rgba(107,78,199,0.3);
    }

    .result-card {
      display: none;
      background: linear-gradient(180deg, #fffaf0 0%, #fff 100%);
      border: 2.5px solid var(--gold);
      border-radius: var(--radius);
      padding: 1.6rem 1.3rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
      margin: 0 auto 1rem; max-width: 600px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .result-emoji {
      font-size: 3rem; line-height: 1.1;
      margin-bottom: 0.6rem;
    }
    .result-label {
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.12em; color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .result-value {
      font-size: 2.2rem; font-weight: 900;
      letter-spacing: -0.02em; line-height: 1.15;
      margin-bottom: 0.7rem;
      color: var(--accent);
    }
    .result-eval {
      font-size: 1.02rem; font-weight: 700; line-height: 1.55;
      margin: 0.8rem 0;
      color: var(--text);
      padding: 0.9rem 0.8rem;
      background: var(--accent-light);
      border-radius: 10px;
    }
    .result-note {
      font-size: 0.92rem; color: var(--text-sub);
      line-height: 1.65;
      margin-top: 0.6rem;
    }
    .result-note strong { color: var(--accent); }

    .btn-retry {
      display: inline-block; margin-top: 1.2rem;
      padding: 0.75rem 1.4rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }
    .btn-retry:hover { background: var(--accent); color: #fff; }

    .counter {
      margin-top: 1rem;
      font-size: 0.78rem; color: var(--text-sub);
    }

    .back-link {
      display: block; text-align: center; margin-top: 2rem;
      font-size: 0.85rem; color: rgba(255,255,255,0.65);
      text-decoration: none; position: relative; z-index: 1;
    }
    .back-link:hover { color: var(--gold); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.2); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: calc(100% - 2.4rem);
      transition: border-color 0.15s, color 0.15s;
      position: relative; z-index: 1;
    }
    .btn-pdf:hover { border-color: var(--gold); color: var(--gold); }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      text-align: left;
      position: relative; z-index: 1;
    }

    @media print {
      body { background: #fff; padding: 0; color: #000; }
      body::before { display: none; }
      .btn-calc, .back-link, .btn-pdf, #fav-widget, .no-print, .btn-retry { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; background: #fff; }
      .app-header h1, .app-header .subtitle { color: #000; }
      a { color: #000; text-decoration: none; }
      .source-note { background: #fff; color: #000; border: 1px solid #ccc; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🌙 深夜懺悔おみくじ ✨</h1>
    <p class="subtitle">今日のやらかし、星と月が代わりに受け止めます</p>
  </header>

  <div class="card">
    <p class="card-title">🌟 今夜のやらかし（複数OK）</p>
    <label class="check-item">
      <input type="checkbox" value="食べすぎ"><span class="check-text">🍔 また食べすぎた</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="夜更かし"><span class="check-text">🌃 もう深夜なのに寝てない</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="サボり"><span class="check-text">😴 やるべきことをサボった</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="散財"><span class="check-text">💸 つい散財してしまった</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="スマホ"><span class="check-text">📱 スマホを見すぎた</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="八つ当たり"><span class="check-text">😡 ちょっと八つ当たりした</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="嘘"><span class="check-text">🤥 小さな嘘をついた</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="先延ばし"><span class="check-text">⏰ また先延ばしにした</span>
    </label>
    <label class="check-item">
      <input type="checkbox" value="自己嫌悪"><span class="check-text">🌀 自分で自分にダメ出し</span>
    </label>

    <div class="free-input">
      <label for="freeText">他にもあれば（自由記述・任意）</label>
      <input type="text" id="freeText" placeholder="例：宿題を出さなかった">
    </div>
  </div>

  <button class="btn-calc" onclick="confess()">🌟 星と月に懺悔する 🌙</button>

  <div class="result-card" id="result">
    <p class="result-emoji" id="rEmoji">🌙</p>
    <p class="result-label">今夜のお告げ</p>
    <p class="result-value" id="rRank">—</p>
    <p class="result-eval" id="rOracle"></p>
    <p class="result-note" id="rTomorrow"></p>
    <button class="btn-retry" onclick="confess()">🔄 もう一度懺悔する</button>
    <p class="counter" id="counter"></p>
  </div>

  <p class="source-note">
    🌙 このアプリは寝る前のリラックス用です。やらかしは誰にでもあります。星と月が代わりに受け止めますので、安心して眠りましょう。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 運勢ランク（おふざけ版） ──
  var RANKS = [
    { rank: '大吉夜', emoji: '🌟', weight: 12 },
    { rank: '中吉月', emoji: '🌕', weight: 18 },
    { rank: '小吉星', emoji: '✨', weight: 24 },
    { rank: '半吉雲', emoji: '☁️', weight: 18 },
    { rank: '末吉霧', emoji: '🌫️', weight: 14 },
    { rank: 'おねむ凶', emoji: '😴', weight: 10 },
    { rank: '大寝坊凶', emoji: '🛌', weight: 4 }
  ];

  // ── 星月のお告げ（カテゴリ別） ──
  var ORACLES = {
    '食べすぎ': [
      '月「夜のラーメンは月もたまに憧れる。許す」',
      '星「胃袋にも休日が必要だぞ、ほどほどに」',
      '月「腹八分目は明日からでいい」'
    ],
    '夜更かし': [
      '月「夜更かしは月の親戚だ、気にするな」',
      '星「ただし明日は早めに寝るのだ」',
      '月「夜の静けさは特別だ。今夜だけは許す」'
    ],
    'サボり': [
      '星「サボりは充電だ。エラいぞ」',
      '月「明日の自分が頑張ってくれる、たぶん」',
      '星「やる気は気まぐれな猫。逃げたらまた来る」'
    ],
    '散財': [
      '月「お金は使うために存在している」',
      '星「ただし月末の自分にだけ謝っておけ」',
      '月「推しに使った金は経費だ」'
    ],
    'スマホ': [
      '星「スマホ越しの星より、本物の星を見ろ」',
      '月「視力は月にも返せないから大事にせよ」',
      '星「タイムラインより寝室の天井を見るのだ」'
    ],
    '八つ当たり': [
      '月「明日ちょっと優しくすれば帳消しだ」',
      '星「八つ当たりはエネルギーの暴走、深呼吸せよ」',
      '月「次に会ったら笑顔を見せれば許される」'
    ],
    '嘘': [
      '星「小さな嘘は星の数ほどある。気にするな」',
      '月「次は本当のことを言えば取り戻せる」',
      '星「人を傷つけてないなら、月も同罪だ」'
    ],
    '先延ばし': [
      '月「明日できることは明日やればいい」',
      '星「ただし明日の朝イチで取りかかれ」',
      '月「先延ばしも立派な戦略だ、たぶん」'
    ],
    '自己嫌悪': [
      '星「自分にダメ出しできるのは成長してる証だ」',
      '月「お前は今日も生きた。それで十分だ」',
      '星「自分を責めるのはもう終わり。月が引き取った」'
    ]
  };

  var DEFAULT_ORACLES = [
    '月「今日も生きた。十分えらい」',
    '星「やらかしも人生の彩りだ」',
    '月「明日の星空に持ち越そう」',
    '星「過ぎた夜は月が引き取る、もう寝ろ」'
  ];

  // ── 明日のひとこと（運勢ランク別） ──
  var TOMORROW = {
    '大吉夜': '<strong>明日のひとこと：</strong>朝の光が味方をする日。早起きするとさらに吉。',
    '中吉月': '<strong>明日のひとこと：</strong>気の合う人とのちょっとした会話で運気上昇。',
    '小吉星': '<strong>明日のひとこと：</strong>小さなラッキーが3回ある日。見逃すな。',
    '半吉雲': '<strong>明日のひとこと：</strong>無理せず流れに身を任せると吉。',
    '末吉霧': '<strong>明日のひとこと：</strong>急がば回れ。深呼吸を3回してから動け。',
    'おねむ凶': '<strong>明日のひとこと：</strong>とにかくよく寝ろ。それで全部解決する。',
    '大寝坊凶': '<strong>明日のひとこと：</strong>目覚ましを3つかけろ。星が起こしてくれるかは運次第。'
  };

  function pickRank() {
    var total = 0;
    for (var i = 0; i < RANKS.length; i++) total += RANKS[i].weight;
    var r = Math.random() * total;
    for (var j = 0; j < RANKS.length; j++) {
      r -= RANKS[j].weight;
      if (r <= 0) return RANKS[j];
    }
    return RANKS[0];
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function confess() {
    // 選択されたカテゴリを集める
    var checked = document.querySelectorAll('.check-item input[type="checkbox"]:checked');
    var categories = [];
    for (var i = 0; i < checked.length; i++) categories.push(checked[i].value);
    var freeText = (document.getElementById('freeText').value || '').trim();

    if (categories.length === 0 && !freeText) {
      // 何も選んでなくても「無の懺悔」として進める
      categories = ['_none'];
    }

    // 運勢ランクを抽選
    var rank = pickRank();

    // お告げを決める（選択カテゴリの中からランダムに1つ拾う、無ければデフォルト）
    var oracleSource = DEFAULT_ORACLES;
    var validCats = [];
    for (var k = 0; k < categories.length; k++) {
      if (ORACLES[categories[k]]) validCats.push(categories[k]);
    }
    if (validCats.length > 0) {
      var picked = validCats[Math.floor(Math.random() * validCats.length)];
      oracleSource = ORACLES[picked];
    }
    var oracle = pickRandom(oracleSource);

    // 自由記述があればおまけ一文
    var freeLine = '';
    if (freeText) {
      var safeText = freeText.replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 40);
      freeLine = '<br>月「『' + safeText + '』もちゃんと預かった。安心せよ」';
    }

    // 表示
    document.getElementById('rEmoji').textContent = rank.emoji;
    document.getElementById('rRank').textContent = rank.rank;
    document.getElementById('rOracle').innerHTML = oracle + freeLine;
    document.getElementById('rTomorrow').innerHTML = TOMORROW[rank.rank] || '';

    // localStorage カウント
    var key = 'shinya-zange-count';
    var count = parseInt(localStorage.getItem(key) || '0', 10) + 1;
    try { localStorage.setItem(key, String(count)); } catch (e) {}
    document.getElementById('counter').textContent = '🌙 これまでの懺悔回数：' + count + ' 回';

    // 結果カード表示（明示値を使用）
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
