<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目的別貯金管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>目的別貯金管理</h1>
  </header>

  <main>
    <section class="add-goal">
      <h2>目標を追加</h2>
      <div class="form-row">
        <input type="text" id="goalName" placeholder="目標名（例：旅行、家電）" maxlength="30">
        <input type="number" id="goalAmount" placeholder="目標金額（円）" min="1">
        <button onclick="addGoal()">追加</button>
      </div>
    </section>

    <section class="goals" id="goalsContainer">
      <!-- 目標カードがここに表示される -->
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
