<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輸送ルート別コスト比較チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 比較テーブル ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .compare-table th {
      padding: 0.6rem 0.4rem; font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub); text-align: center; border-bottom: 2px solid var(--border);
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table td { padding: 0.6rem 0.4rem; text-align: right; border-bottom: 1px solid var(--border); }
    .compare-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .total-row td { font-weight: 800; font-size: 1rem; color: var(--text); border-top: 2px solid var(--border); }
    .compare-table .cheapest td { background: var(--ok-bg); }
    .compare-table .cheapest td:first-child { color: var(--ok); }
    .cheapest-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 800;
      background: var(--ok); color: #fff; padding: 0.15rem 0.5rem;
      border-radius: 6px; margin-left: 0.4rem; vertical-align: middle;
    }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-sub {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>輸送ルート別コスト比較チェッカー</h1>
    <p class="subtitle">航空便・海上便・陸送のコストを入力して最安ルートを即比較</p>
  </header>

  <!-- 航空便 -->
  <div class="card">
    <p class="card-title">✈️ 航空便</p>
    <div class="row2">
      <div class="field">
        <label for="air-ship">送料（円）</label>
        <input type="number" id="air-ship" placeholder="例: 50000" min="0">
      </div>
      <div class="field">
        <label for="air-fuel">燃油サーチャージ（円）</label>
        <input type="number" id="air-fuel" placeholder="例: 8000" min="0">
      </div>
    </div>
  </div>

  <!-- 海上便 -->
  <div class="card">
    <p class="card-title">🚢 海上便</p>
    <div class="row2">
      <div class="field">
        <label for="sea-ship">送料（円）</label>
        <input type="number" id="sea-ship" placeholder="例: 20000" min="0">
      </div>
      <div class="field">
        <label for="sea-fuel">燃油サーチャージ（円）</label>
        <input type="number" id="sea-fuel" placeholder="例: 3000" min="0">
      </div>
    </div>
  </div>

  <!-- 陸送 -->
  <div class="card">
    <p class="card-title">🚚 陸送</p>
    <div class="row2">
      <div class="field">
        <label for="land-ship">送料（円）</label>
        <input type="number" id="land-ship" placeholder="例: 30000" min="0">
      </div>
      <div class="field">
        <label for="land-fuel">燃油サーチャージ（円）</label>
        <input type="number" id="land-fuel" placeholder="例: 5000" min="0">
      </div>
    </div>
  </div>

  <!-- 比較ボタン -->
  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">最安ルート</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較表カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">ルート別コスト比較</p>
    <table class="compare-table">
      <thead>
        <tr><th>ルート</th><th>送料</th><th>サーチャージ</th><th>合計</th></tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>

  <!-- 差額カード -->
  <div class="card" id="diff-card" style="display:none">
    <p class="card-title">最安ルートとの差額</p>
    <table class="detail-table"><tbody id="diff-body"></tbody></table>
  </div>

  <button class="btn-sub" id="btn-clear" onclick="clearAll()" style="display:none">入力をクリア</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var ROUTES = [
    { id: 'air',  name: '✈️ 航空便', shipId: 'air-ship',  fuelId: 'air-fuel'  },
    { id: 'sea',  name: '🚢 海上便', shipId: 'sea-ship',  fuelId: 'sea-fuel'  },
    { id: 'land', name: '🚚 陸送',   shipId: 'land-ship', fuelId: 'land-fuel' }
  ];

  var LS_KEY = 'transport-cost-checker';

  function getVal(id) {
    var v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? null : v;
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function calc() {
    var data = [];
    var hasInput = false;

    for (var i = 0; i < ROUTES.length; i++) {
      var r = ROUTES[i];
      var ship = getVal(r.shipId);
      var fuel = getVal(r.fuelId);
      if (ship === null && fuel === null) {
        data.push({ name: r.name, ship: 0, fuel: 0, total: 0, empty: true });
        continue;
      }
      ship = ship || 0;
      fuel = fuel || 0;
      data.push({ name: r.name, ship: ship, fuel: fuel, total: ship + fuel, empty: false });
      hasInput = true;
    }

    if (!hasInput) {
      showErr('少なくとも1つのルートに金額を入力してください');
      return;
    }

    // 入力ありのルートだけで最安を判定
    var filled = data.filter(function(d) { return !d.empty; });
    var minTotal = Math.min.apply(null, filled.map(function(d) { return d.total; }));
    var cheapest = filled.filter(function(d) { return d.total === minTotal; });

    // 結論カード
    var rc = document.getElementById('result');
    if (filled.length === 1) {
      rc.className = 'result-card warn';
      rc.style.display = '';
      document.getElementById('rv').textContent = filled[0].name;
      document.getElementById('rn').textContent = '入力ルートが1つだけです。比較するには複数入力してください。合計: ' + fmt(filled[0].total) + ' 円';
    } else {
      rc.className = 'result-card ok';
      rc.style.display = '';
      document.getElementById('rv').textContent = cheapest[0].name;
      if (cheapest.length > 1) {
        document.getElementById('rn').textContent = '同額のルートが ' + cheapest.length + ' 件あります（合計: ' + fmt(minTotal) + ' 円）';
      } else {
        var sorted = filled.slice().sort(function(a, b) { return a.total - b.total; });
        var saving = sorted.length >= 2 ? sorted[1].total - sorted[0].total : 0;
        document.getElementById('rn').textContent = '合計 ' + fmt(minTotal) + ' 円（2番目との差額: ' + fmt(saving) + ' 円お得）';
      }
    }

    // 比較表
    var tbody = document.getElementById('compare-body');
    tbody.innerHTML = '';
    for (var j = 0; j < data.length; j++) {
      var d = data[j];
      if (d.empty) continue;
      var isCheap = d.total === minTotal && filled.length > 1;
      var tr = document.createElement('tr');
      if (isCheap) tr.className = 'total-row cheapest';
      else tr.className = 'total-row';
      tr.innerHTML = '<td>' + d.name + (isCheap ? '<span class="cheapest-badge">最安</span>' : '') + '</td>'
                   + '<td>' + fmt(d.ship) + ' 円</td>'
                   + '<td>' + fmt(d.fuel) + ' 円</td>'
                   + '<td>' + fmt(d.total) + ' 円</td>';
      tbody.appendChild(tr);
    }
    document.getElementById('detail').style.display = '';

    // 差額表
    var diffBody = document.getElementById('diff-body');
    diffBody.innerHTML = '';
    if (filled.length >= 2) {
      for (var k = 0; k < filled.length; k++) {
        var fd = filled[k];
        var diff = fd.total - minTotal;
        var trD = document.createElement('tr');
        if (diff === 0) trD.className = 'hl';
        trD.innerHTML = '<td>' + fd.name + '</td><td>' + (diff === 0 ? '— 最安' : '+' + fmt(diff) + ' 円') + '</td>';
        diffBody.appendChild(trD);
      }
      document.getElementById('diff-card').style.display = '';
    } else {
      document.getElementById('diff-card').style.display = 'none';
    }

    document.getElementById('btn-clear').style.display = '';
    saveData();
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = '';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('diff-card').style.display = 'none';
  }

  function clearAll() {
    for (var i = 0; i < ROUTES.length; i++) {
      document.getElementById(ROUTES[i].shipId).value = '';
      document.getElementById(ROUTES[i].fuelId).value = '';
    }
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('diff-card').style.display = 'none';
    document.getElementById('btn-clear').style.display = 'none';
    localStorage.removeItem(LS_KEY);
  }

  function saveData() {
    var obj = {};
    for (var i = 0; i < ROUTES.length; i++) {
      var r = ROUTES[i];
      obj[r.id + '_ship'] = document.getElementById(r.shipId).value;
      obj[r.id + '_fuel'] = document.getElementById(r.fuelId).value;
    }
    localStorage.setItem(LS_KEY, JSON.stringify(obj));
  }

  function loadData() {
    var raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    try {
      var obj = JSON.parse(raw);
      for (var i = 0; i < ROUTES.length; i++) {
        var r = ROUTES[i];
        if (obj[r.id + '_ship']) document.getElementById(r.shipId).value = obj[r.id + '_ship'];
        if (obj[r.id + '_fuel']) document.getElementById(r.fuelId).value = obj[r.id + '_fuel'];
      }
    } catch(e) {}
  }

  loadData();
  </script>
