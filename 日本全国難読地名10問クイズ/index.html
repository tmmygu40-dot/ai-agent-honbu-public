<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本全国難読地名10問クイズ｜読めたら全国地名通</title>
  <meta name="description" content="我孫子・放出・廿日市など、日本全国の難読地名を3択で出題する10問クイズ。読み方と豆知識付き。地名好き・旅行好きにおすすめの暇つぶし無料クイズです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .progress {
      max-width: 600px; margin: 0 auto 0.8rem; padding: 0 0.2rem;
      display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-sub);
    }
    .progress-bar {
      max-width: 600px; height: 6px; margin: 0 auto 1rem;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent); transition: width 0.3s;
    }

    .question-text {
      font-size: 1.6rem; font-weight: 900; text-align: center;
      letter-spacing: 0.08em; margin: 0.4rem 0 0.4rem; line-height: 1.3;
    }
    .question-hint {
      font-size: 0.85rem; color: var(--text-sub); text-align: center; margin-bottom: 1.2rem;
    }

    .choice-btn {
      display: block; width: 100%;
      margin: 0 0 0.7rem; padding: 0.95rem 1rem;
      font-size: 1rem; font-weight: 700;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice-btn.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text-sub); text-align: center; margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; text-align: center; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.ng   .result-value { color: var(--ng); }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-top: 0.6rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .final-score {
      font-size: 3rem; font-weight: 900; text-align: center; letter-spacing: -0.03em;
      color: var(--accent); line-height: 1.1; margin: 0.4rem 0;
    }
    .final-title {
      font-size: 1.15rem; font-weight: 800; text-align: center; margin: 0.2rem 0 0.5rem;
    }
    .final-sub {
      font-size: 0.9rem; color: var(--text-sub); text-align: center; line-height: 1.6;
    }
    .best-record {
      text-align: center; font-size: 0.85rem; color: var(--text-sub); margin-top: 0.8rem;
      padding-top: 0.7rem; border-top: 1px dashed var(--border);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .choice-btn { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>日本全国難読地名10問クイズ</h1>
    <p class="subtitle">読めそうで読めない地名を3択でチャレンジ。あなたは何問正解できる？</p>
  </header>

  <!-- 進捗 -->
  <div class="progress" id="progress" style="display:none">
    <span id="qcount">第1問 / 10</span>
    <span id="qscore">正解：0</span>
  </div>
  <div class="progress-bar" id="progress-bar" style="display:none">
    <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
  </div>

  <!-- スタート画面 -->
  <div class="card" id="start-card">
    <p class="card-title">スタート</p>
    <p style="text-align:center;font-size:0.95rem;line-height:1.7;color:var(--text);">
      日本全国の難読地名を10問、3択でお出しします。<br>
      読めたつもりが意外と落とし穴…？<br>
      あなたの地名読解力を試してみよう。
    </p>
    <p class="best-record" id="best-record-start"></p>
  </div>
  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズをはじめる</button>

  <!-- 問題カード -->
  <div class="card" id="question-card" style="display:none">
    <p class="card-title">問題</p>
    <p class="question-text" id="qtext">―</p>
    <p class="question-hint" id="qhint">この地名、なんて読む？</p>
    <div id="choices"></div>
  </div>

  <!-- 解説カード -->
  <div class="result-card" id="answer-card"></div>
  <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ →</button>

  <!-- 最終結果カード -->
  <div class="card" id="final-card" style="display:none">
    <p class="card-title">最終結果</p>
    <p class="final-score" id="fscore">0 / 10</p>
    <p class="final-title" id="ftitle">―</p>
    <p class="final-sub" id="fsub">―</p>
    <p class="best-record" id="best-record-final"></p>
  </div>
  <button class="btn-calc" id="retry-btn" style="display:none" onclick="startQuiz()">もう一度挑戦する</button>

  <p class="source-note" id="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国土地理院・各自治体公開資料・日本郵便の郵便番号データなどを参考に、楽しめる難読地名を選んで作成しています。読みは代表的な現行表記に準じています。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      kanji: '我孫子',
      pref: '千葉県',
      choices: ['われそんし', 'あびこ', 'がそんこ'],
      answer: 1,
      note: '千葉県北西部、手賀沼で有名な街。古代の氏族「阿毘古（あびこ）」に由来すると言われています。'
    },
    {
      kanji: '放出',
      pref: '大阪府',
      choices: ['ほうしゅつ', 'はなてん', 'はなでる'],
      answer: 1,
      note: '大阪市鶴見区の地名で、JR学研都市線にも駅があります。読みは「はなてん」。中古車屋のCMで覚えた人も多いはず。'
    },
    {
      kanji: '廿日市',
      pref: '広島県',
      choices: ['にじゅうにちいち', 'はつかいち', 'にじゅういち'],
      answer: 1,
      note: '広島県西部の市。「廿（はつか）」は20の意味で、毎月20日に市が立っていたことに由来。世界遺産・厳島神社の玄関口です。'
    },
    {
      kanji: '安心院',
      pref: '大分県',
      choices: ['あんしんいん', 'あじむ', 'やすしいん'],
      answer: 1,
      note: '大分県宇佐市の旧町名。スッポン養殖とワインで知られる山あいの里。読みは古い地名らしい「あじむ」。'
    },
    {
      kanji: '増毛',
      pref: '北海道',
      choices: ['ぞうもう', 'まします', 'ましけ'],
      answer: 2,
      note: '北海道留萌地方の町。アイヌ語「マシュキニ（カモメの多い所）」が語源。映画「駅 STATION」のロケ地としても有名。'
    },
    {
      kanji: '中百舌鳥',
      pref: '大阪府',
      choices: ['なかもず', 'ちゅうひゃくぜっとり', 'なかもずどり'],
      answer: 0,
      note: '大阪府堺市の地名。地下鉄御堂筋線の終点で、世界遺産「百舌鳥・古市古墳群」の玄関口。「百舌鳥」だけで「もず」と読みます。'
    },
    {
      kanji: '各務原',
      pref: '岐阜県',
      choices: ['かくむはら', 'かかみがはら', 'かがみはら'],
      answer: 1,
      note: '岐阜県南部の市。航空自衛隊の基地と航空機産業で有名。地元の人は「かかみはら」とも呼びます。'
    },
    {
      kanji: '帷子ノ辻',
      pref: '京都府',
      choices: ['いし子のつじ', 'かたびらのつじ', 'とばりこのつじ'],
      answer: 1,
      note: '京都市右京区の地名で、嵐電（京福電鉄）の駅名でもあります。「帷子（かたびら）」は夏の単衣のこと。古都らしい風情ある地名。'
    },
    {
      kanji: '国府津',
      pref: '神奈川県',
      choices: ['こくふつ', 'こうづ', 'くにふつ'],
      answer: 1,
      note: '神奈川県小田原市にあるJR東海道線の駅でもある地名。古代に国府（国の役所）が置かれ、その港だったことに由来。'
    },
    {
      kanji: '留辺蘂',
      pref: '北海道',
      choices: ['とめべしべ', 'るべしべ', 'とまりかすい'],
      answer: 1,
      note: '北海道北見市の地名。アイヌ語「ルペシペ（道が・下る・もの＝峠を越える道）」が由来とされます。難読地名の代表格。'
    }
  ];

  var STORAGE_KEY = 'nandoku_chimei_quiz_best_v1';
  var current = 0;
  var score = 0;
  var answered = false;

  function startQuiz() {
    current = 0;
    score = 0;
    answered = false;
    document.getElementById('start-card').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('final-card').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('answer-card').style.display = 'none';
    document.getElementById('progress').style.display = 'flex';
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('question-card').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[current];
    document.getElementById('qtext').textContent = q.kanji;
    document.getElementById('qhint').textContent = q.pref + ' のこの地名、なんて読む？';
    document.getElementById('qcount').textContent = '第' + (current + 1) + '問 / ' + QUESTIONS.length;
    document.getElementById('qscore').textContent = '正解：' + score;
    document.getElementById('progress-bar-fill').style.width = (current / QUESTIONS.length * 100) + '%';
    document.getElementById('answer-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = function() { selectAnswer(i, btn); };
      choicesEl.appendChild(btn);
    });
    answered = false;
  }

  function selectAnswer(idx, btnEl) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[current];
    var btns = document.querySelectorAll('#choices .choice-btn');
    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === q.answer) b.classList.add('correct');
      if (i === idx && idx !== q.answer) b.classList.add('wrong');
    });

    var correct = idx === q.answer;
    if (correct) score++;
    document.getElementById('qscore').textContent = '正解：' + score;

    var ac = document.getElementById('answer-card');
    ac.className = 'result-card ' + (correct ? 'ok' : 'ng');
    ac.innerHTML =
      '<p class="result-label">' + (correct ? '正解！' : '残念…') + '</p>' +
      '<p class="result-value">' + q.kanji + ' → ' + q.choices[q.answer] + '</p>' +
      '<p class="result-note">' + q.note + '</p>';
    ac.style.display = 'block';

    var nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = (current + 1 >= QUESTIONS.length) ? '結果を見る →' : '次の問題へ →';
  }

  function nextQuestion() {
    current++;
    if (current >= QUESTIONS.length) {
      showFinal();
    } else {
      showQuestion();
    }
  }

  function showFinal() {
    document.getElementById('question-card').style.display = 'none';
    document.getElementById('answer-card').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    document.getElementById('progress-bar').style.display = 'none';

    var fc = document.getElementById('final-card');
    fc.style.display = 'block';
    document.getElementById('fscore').textContent = score + ' / ' + QUESTIONS.length;

    var title, sub;
    if (score === 10) { title = '🏆 難読地名マスター'; sub = 'パーフェクト！全国の地名通を名乗っていいレベルです。'; }
    else if (score >= 8) { title = '🥇 地名ハンター'; sub = 'かなり読めてます。地理クイズも得意なはず。'; }
    else if (score >= 6) { title = '🥈 まずまず読める人'; sub = '半分以上正解。日本地理に親しみがあります。'; }
    else if (score >= 4) { title = '🥉 旅の途中'; sub = 'もう少し旅に出てみよう。読めたら世界が広がります。'; }
    else if (score >= 2) { title = '🗺 これから探検家'; sub = '伸びしろたっぷり。難読地名は知れば知るほど面白い！'; }
    else { title = '🚉 まだ未踏の地'; sub = '大丈夫、難読地名は大人でも読めません。これから覚えていこう。'; }
    document.getElementById('ftitle').textContent = title;
    document.getElementById('fsub').textContent = sub;

    updateBestRecord();
    document.getElementById('retry-btn').style.display = 'block';
  }

  function updateBestRecord() {
    var best = 0;
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved !== null) best = parseInt(saved, 10) || 0;
    } catch (e) {}
    if (score > best) {
      best = score;
      try { localStorage.setItem(STORAGE_KEY, String(best)); } catch (e) {}
    }
    var msg = '🏅 これまでの最高記録：' + best + ' / ' + QUESTIONS.length;
    document.getElementById('best-record-final').textContent = msg;
    document.getElementById('best-record-start').textContent = msg;
  }

  function showInitialBest() {
    var best = 0;
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved !== null) best = parseInt(saved, 10) || 0;
    } catch (e) {}
    if (best > 0) {
      document.getElementById('best-record-start').textContent = '🏅 これまでの最高記録：' + best + ' / ' + QUESTIONS.length;
    }
  }

  showInitialBest();
  </script>
