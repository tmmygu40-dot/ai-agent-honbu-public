<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="片付けがダルい時に背中を押すやる気フレーズを、カテゴリ別にワンタップでランダム生成。気に入った言葉はお気に入り保存で何度でも見返せる無料アプリです。">
  <title>片付けやる気フレーズジェネレーター｜断捨離が進まない人のための一言ブースター</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.6rem 1.3rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.shown {
      border-color: var(--accent); background: var(--accent-light);
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value {
      font-size: 1.25rem; font-weight: 800; line-height: 1.55;
      color: var(--text); margin-bottom: 1rem;
    }
    .result-actions { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
    .btn-sub {
      padding: 0.55rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sub:hover { background: var(--accent); color: #fff; }
    .btn-sub.saved { background: var(--accent); color: #fff; }

    /* ── お気に入り一覧 ── */
    .fav-list { list-style: none; padding: 0; margin: 0; }
    .fav-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.4rem; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-text { flex: 1; color: var(--text); }
    .fav-del {
      flex-shrink: 0; padding: 0.2rem 0.55rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
    }
    .fav-del:hover { color: var(--ng); border-color: var(--ng); }
    .fav-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 0.8rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>片付けやる気フレーズジェネレーター</h1>
    <p class="subtitle">「あとでやる」を撃退する一言を、カテゴリ別にランダム表示します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">どこを片付ける？</p>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="all">全般（部屋ごと迷走中）</option>
        <option value="clothes">服・小物（クローゼット）</option>
        <option value="books">本・書類（紙の山）</option>
        <option value="kitchen">キッチン（食器・調理器具）</option>
        <option value="memory">思い出の品（捨てられない）</option>
        <option value="room">部屋全体（一念発起）</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">やる気フレーズを出す</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">今日のあなたへ</p>
    <p class="result-value" id="rv">—</p>
    <div class="result-actions">
      <button class="btn-sub" id="btn-fav" onclick="toggleFav()">★ お気に入り</button>
      <button class="btn-sub" onclick="generate()">↻ もう一回</button>
    </div>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="fav-card" style="display:none">
    <p class="card-title">お気に入りフレーズ</p>
    <ul class="fav-list" id="fav-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは整理収納アドバイザー・断捨離関連書籍などで語られる考え方を参考に、行動のきっかけになる一言として軽く整理しています。深く悩む内容は専門家への相談もご検討ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── フレーズ集 ──
  var PHRASES = {
    all: [
      '「いつかやる」のいつかは、たいてい来ない。今やる。',
      '部屋の散らかりは、決断の先延ばしの証拠です。',
      '5分タイマーかけて、引き出し1個だけやろう。それでいい。',
      '空間がスッキリすると、頭の中まで5℃くらい涼しくなる。',
      '迷ったら捨てる、ではなく、迷ったら「保留箱」へ。それでも進む。',
      '完璧主義は片付けの天敵。今日は60点でいこう。',
      '今のあなたに必要なモノだけ残せばいい。過去の自分は許してくれる。',
      '「もったいない」より「持っててもったいない」を考えよう。',
      '片付け終わった部屋で深呼吸する未来を思い出して。',
      '今ゴミ袋1枚、未来の自分が泣いて喜ぶ。'
    ],
    clothes: [
      'その服、去年の夏も着なかったよね？',
      '「痩せたら着る」は、たいてい着ない。今の自分にYES。',
      'ハンガー20本ルール。お気に入りだけ吊るそう。',
      '同じ色のTシャツ、何枚必要？1枚で勝負しよう。',
      '高かった服ほど、着てない時間がもったいない。',
      'クローゼットは「今のあなた」を映す鏡。重くしないで。',
      'タグ付きの服、買った瞬間がピークだったかも。',
      '「いつか流行が戻る」は、戻った頃には体型が違う。',
      'パジャマにすると言いつつ何年か経ってない？',
      '靴下に穴が空いてたら、それは引退のサインです。'
    ],
    books: [
      '読んでない本は、本棚で罪悪感を生むだけ。',
      '一度読んだ本、もう一度読み返した？',
      '紙の山の下に、3年前の重要書類は眠ってない。',
      'デジタル化できるものは、紙で持たない。',
      '雑誌のバックナンバー、ネットでだいたい読める。',
      '取扱説明書、99%はメーカーサイトにPDFあるよ。',
      '本は「読む本」と「読まない本」しかない。中間はない。',
      '思い出の本だけ残せばいい。義理で持たなくていい。',
      'レシートの山は、家計簿アプリに勝てない。',
      '「いつか使う資料」は、いつか使うために整理しないと意味がない。'
    ],
    kitchen: [
      'マグカップ、家族の人数+2個で十分。',
      '使ってないタッパー、フタとセットで揃ってる？',
      '賞味期限切れの調味料、棚の奥で泣いてるよ。',
      'もらい物の食器、もう何年そこにある？',
      '「来客用」は、たぶん来客が来ない。',
      '一軍のフライパン1個あれば、だいたい戦える。',
      '割り箸の山、外食気分でも消費しきれない。',
      'お弁当箱、本当に毎日使ってる？',
      '同じサイズの皿、3枚もあれば回せる。',
      '冷蔵庫の中身、見える範囲が「使う範囲」です。'
    ],
    memory: [
      '思い出は写真に撮れば、モノは手放してもいい。',
      'もらった時の感謝と、今手元に置く意味は別物。',
      '「捨てる」じゃなくて「卒業する」と考えよう。',
      '思い出の箱、1箱までと決めればちゃんと選べる。',
      '亡くなった人の品、全部持ってなくても忘れない。',
      '昔のラブレター、今の幸せの邪魔をしてない？',
      '子どもの作品は、ベスト3だけ額に入れよう。',
      '結婚式の引き出物、義理で残してない？',
      '記念品は飾ってこそ意味がある。眠らせない。',
      '思い出は心に。スペースは未来に。'
    ],
    room: [
      '部屋を整えると、人生も整う。本当に。',
      '今日30分、未来の自分への投資です。',
      '床に物がない部屋は、それだけで気分が良い。',
      '掃除機が一発でかけられる床を取り戻そう。',
      '帰ってきて「ただいま」と言える部屋にしよう。',
      '部屋の状態は、心の状態のミラー。映り方を整えよう。',
      'ホテルみたいな部屋、家賃払ってる自分にプレゼント。',
      'まず1平方メートル。リビングの一角からでいい。',
      'モノを減らすと、掃除時間も半分になる。一石二鳥。',
      '寝る前の5分リセットで、明日の朝が変わる。'
    ]
  };

  var FAV_KEY = 'katazuke_phrase_favs';
  var currentPhrase = '';

  function generate() {
    var cat = document.getElementById('cat').value;
    var pool = PHRASES[cat] || PHRASES.all;
    var pick = pool[Math.floor(Math.random() * pool.length)];
    // 直前と同じなら引き直し（プールが2件以上ある場合）
    if (pool.length > 1 && pick === currentPhrase) {
      pick = pool[(pool.indexOf(pick) + 1) % pool.length];
    }
    currentPhrase = pick;
    var rc = document.getElementById('result');
    rc.className = 'result-card shown';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = pick;
    updateFavButtonState();
  }

  function getFavs() {
    try {
      var raw = localStorage.getItem(FAV_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function setFavs(arr) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); } catch (e) {}
  }
  function toggleFav() {
    if (!currentPhrase) return;
    var favs = getFavs();
    var idx = favs.indexOf(currentPhrase);
    if (idx >= 0) {
      favs.splice(idx, 1);
    } else {
      favs.unshift(currentPhrase);
      if (favs.length > 50) favs = favs.slice(0, 50);
    }
    setFavs(favs);
    renderFavs();
    updateFavButtonState();
  }
  function updateFavButtonState() {
    var btn = document.getElementById('btn-fav');
    if (!btn) return;
    var favs = getFavs();
    if (favs.indexOf(currentPhrase) >= 0) {
      btn.textContent = '★ 保存済み';
      btn.classList.add('saved');
    } else {
      btn.textContent = '★ お気に入り';
      btn.classList.remove('saved');
    }
  }
  function delFav(idx) {
    var favs = getFavs();
    favs.splice(idx, 1);
    setFavs(favs);
    renderFavs();
    updateFavButtonState();
  }
  function renderFavs() {
    var favs = getFavs();
    var card = document.getElementById('fav-card');
    var list = document.getElementById('fav-list');
    if (!favs.length) {
      card.style.display = 'none';
      list.innerHTML = '';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = favs.map(function(p, i){
      return '<li class="fav-item">'
           + '<span class="fav-text">' + escapeHtml(p) + '</span>'
           + '<button class="fav-del" onclick="delFav(' + i + ')">削除</button>'
           + '</li>';
    }).join('');
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  // 初期表示
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
