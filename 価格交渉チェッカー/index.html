<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格交渉チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 2列グリッド ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .grid2 .field { margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 品目一覧 ── */
    .item-list { list-style: none; }
    .item-list li {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.5rem; padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .item-list li:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; }
    .item-meta { font-size: 0.75rem; color: var(--text-sub); line-height: 1.6; }
    .item-badge {
      font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 99px; white-space: nowrap; margin-top: 0.1rem;
    }
    .badge-ok   { background: var(--ok-bg);   color: var(--ok);   }
    .badge-warn { background: var(--warn-bg);  color: var(--warn); }
    .badge-ng   { background: var(--ng-bg);    color: var(--ng);   }
    .btn-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 1.1rem; padding: 0.2rem 0.4rem;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del:hover { color: var(--ng); }

    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>価格交渉チェッカー</h1>
    <p class="subtitle">仕入れ値上げに対して許容上限と交渉余地をすぐ確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="itemName">品目名</label>
      <input type="text" id="itemName" placeholder="例：A商品">
    </div>
    <div class="grid2">
      <div class="field">
        <label for="sellPrice">売価（円）</label>
        <input type="number" id="sellPrice" placeholder="例: 1000" min="0">
      </div>
      <div class="field">
        <label for="targetMargin">粗利目標率（%）</label>
        <input type="number" id="targetMargin" placeholder="例: 30" min="0" max="100">
        <p class="hint">粗利 = 売価 × 目標率</p>
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label for="currentCost">現在の仕入れ値（円）</label>
        <input type="number" id="currentCost" placeholder="例: 650" min="0">
      </div>
      <div class="field">
        <label for="newCost">値上げ後の仕入れ値（円）</label>
        <input type="number" id="newCost" placeholder="例: 750" min="0">
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">交渉余地を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 品目保存ボタン -->
  <button class="btn-add" id="addBtn" onclick="addItem()" style="display:none">この品目を一覧に保存する</button>

  <!-- 品目一覧カード -->
  <div class="card" id="listCard" style="display:none">
    <p class="card-title">品目一覧</p>
    <ul class="item-list" id="itemList"></ul>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var items = JSON.parse(localStorage.getItem('kakaku_items') || '[]');
  var lastResult = null;

  renderList();

  function calc() {
    var name   = document.getElementById('itemName').value.trim() || '品目';
    var sell   = parseFloat(document.getElementById('sellPrice').value);
    var margin = parseFloat(document.getElementById('targetMargin').value);
    var cur    = parseFloat(document.getElementById('currentCost').value);
    var nw     = parseFloat(document.getElementById('newCost').value);

    if (isNaN(sell) || isNaN(margin) || isNaN(nw)) {
      showErr('売価・粗利目標率・値上げ後仕入れ値を入力してください');
      document.getElementById('addBtn').style.display = 'none';
      return;
    }
    if (sell <= 0) { showErr('売価は0より大きい値を入力してください'); return; }
    if (margin < 0 || margin >= 100) { showErr('粗利目標率は0〜99%で入力してください'); return; }

    // 許容仕入れ上限 = 売価 × (1 - 目標粗利率)
    var maxCost  = sell * (1 - margin / 100);
    // 交渉余地 = 許容上限 - 値上げ後仕入れ値
    var margin_  = maxCost - nw;
    // 超過率 = (値上げ後 - 許容上限) / 許容上限 × 100
    var overRate = maxCost > 0 ? ((nw - maxCost) / maxCost * 100) : 0;

    var level, label, note;
    if (margin_ >= 0) {
      level = 'ok';
      label = '受け入れ可能';
      note  = '許容上限内です。値上げを受け入れても粗利目標を維持できます。';
    } else if (overRate <= 10) {
      level = 'warn';
      label = '要交渉';
      note  = '許容上限をわずかに超えています。値引き交渉または売価の見直しを検討してください。';
    } else {
      level = 'ng';
      label = '拒否推奨';
      note  = '許容上限を大幅に超えています。この条件では粗利目標の維持が困難です。';
    }

    lastResult = { name: name, sell: sell, margin: margin, cur: cur, nw: nw, maxCost: maxCost, margin_: margin_, level: level };

    showResult(level, label, note);
    showDetail([
      ['売価',             fmt(sell) + ' 円'],
      ['粗利目標率',       margin + ' %'],
      ['許容仕入れ上限',   fmt(maxCost) + ' 円', true],
      ['現在の仕入れ値',   isNaN(cur) ? '—' : fmt(cur) + ' 円'],
      ['値上げ後仕入れ値', fmt(nw) + ' 円'],
      ['交渉余地',         (margin_ >= 0 ? '+' : '') + fmt(margin_) + ' 円', true],
    ]);

    document.getElementById('addBtn').style.display = '';
  }

  function addItem() {
    if (!lastResult) return;
    items.push(lastResult);
    save();
    renderList();
    document.getElementById('addBtn').style.display = 'none';
  }

  function deleteItem(i) {
    items.splice(i, 1);
    save();
    renderList();
  }

  function save() {
    localStorage.setItem('kakaku_items', JSON.stringify(items));
  }

  function renderList() {
    var card = document.getElementById('listCard');
    var ul   = document.getElementById('itemList');
    if (items.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = '';
    ul.innerHTML = items.map(function(it, i) {
      var badgeClass = it.level === 'ok' ? 'badge-ok' : it.level === 'warn' ? 'badge-warn' : 'badge-ng';
      var badgeLabel = it.level === 'ok' ? '受け入れ可' : it.level === 'warn' ? '要交渉' : '拒否推奨';
      return '<li>'
        + '<div class="item-info">'
        + '<div class="item-name">' + esc(it.name) + '</div>'
        + '<div class="item-meta">'
        + '売価 ' + fmt(it.sell) + '円　粗利目標 ' + it.margin + '%　値上げ後 ' + fmt(it.nw) + '円<br>'
        + '許容上限 ' + fmt(it.maxCost) + '円　交渉余地 ' + (it.margin_ >= 0 ? '+' : '') + fmt(it.margin_) + '円'
        + '</div>'
        + '<span class="item-badge ' + badgeClass + '">' + badgeLabel + '</span>'
        + '</div>'
        + '<button class="btn-del" onclick="deleteItem(' + i + ')" title="削除">✕</button>'
        + '</li>';
    }).join('');
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  </script>

<script src="../fav-widget.js"></script>
<script src="../share-widget.js"></script>
</body>
