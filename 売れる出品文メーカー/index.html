<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売れる出品文メーカー｜メルカリ向け説明文を自動生成</title>
  <meta name="description" content="商品名・カテゴリ・状態・価格を入れるだけで、メルカリで売れやすい出品タイトルと説明文を自動生成。コピーしてそのまま貼れる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .gen-block { margin-bottom: 1.1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .gen-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .gen-title { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); letter-spacing: 0.04em; margin-bottom: 0.35rem; }
    .gen-text {
      font-size: 0.95rem; line-height: 1.6; color: var(--text);
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem 0.85rem; white-space: pre-wrap; word-wrap: break-word;
    }
    .btn-copy {
      margin-top: 0.45rem; padding: 0.45rem 0.9rem;
      font-size: 0.8rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .history-item {
      padding: 0.7rem 0.4rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-sub); cursor: pointer;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { color: var(--accent); }
    .history-item .h-date { font-size: 0.7rem; color: var(--text-sub); display: block; margin-top: 0.15rem; }
    .history-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 0.5rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>売れる出品文メーカー</h1>
    <p class="subtitle">商品情報を入れるだけで、メルカリ向けタイトル＋説明文を自動生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="name">商品名</label>
      <input type="text" id="name" placeholder="例: 無印良品 リネンシャツ Mサイズ">
    </div>
    <div class="field">
      <label for="category">カテゴリ</label>
      <select id="category">
        <option value="衣類">衣類・ファッション</option>
        <option value="本">本・コミック</option>
        <option value="家電">家電・ガジェット</option>
        <option value="ホビー">おもちゃ・ホビー</option>
        <option value="コスメ">コスメ・美容</option>
        <option value="生活雑貨">生活雑貨</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="condition">状態</label>
      <select id="condition">
        <option value="新品">新品・未使用</option>
        <option value="新品同様">新品同様（未使用に近い）</option>
        <option value="良好">目立った傷や汚れなし</option>
        <option value="やや使用感">やや傷や汚れあり</option>
        <option value="使用感">使用感あり</option>
        <option value="難あり">難あり（要確認）</option>
      </select>
    </div>
    <div class="field">
      <label for="price">希望価格（円）</label>
      <input type="number" id="price" placeholder="例: 1500" inputmode="numeric">
    </div>
    <div class="field">
      <label for="point">アピールポイント（任意・カンマ区切り）</label>
      <input type="text" id="point" placeholder="例: 1度のみ着用, 喫煙者なし, ペットなし">
      <p class="hint">空欄でもOK。入力すると説明文に反映されます。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">出品文を生成する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成結果</p>
    <div class="gen-block">
      <p class="gen-title">タイトル案（30字以内）</p>
      <div class="gen-text" id="title-out"></div>
      <button class="btn-copy" onclick="copyText('title-out', this)">📋 タイトルをコピー</button>
    </div>
    <div class="gen-block">
      <p class="gen-title">説明文</p>
      <div class="gen-text" id="desc-out"></div>
      <button class="btn-copy" onclick="copyText('desc-out', this)">📋 説明文をコピー</button>
    </div>
    <div class="gen-block">
      <p class="gen-title">タイトル＋説明文（まとめてコピー）</p>
      <button class="btn-copy" onclick="copyAll(this)">📋 まとめてコピー</button>
    </div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card">
    <p class="card-title">生成履歴（最新10件）</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、フリマアプリの一般的な記載傾向を参考にした文例を自動組み立てしています。最終的な取引条件・記載内容は各プラットフォームのガイドラインをご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'sellListingMaker_history';

  // カテゴリごとの定型訴求
  var CAT_PHRASE = {
    '衣類':     ['気軽に着回せる1着です', 'クローゼット整理のため出品します', 'シーズンを問わず使えます'],
    '本':       ['通読・流し読み程度です', 'カバー付きで保管していました', '読み終わったので次の方へ'],
    '家電':     ['動作確認済みです', '本体・付属品は写真の通りです', '初期化のうえ発送します'],
    'ホビー':   ['コレクション整理のため出品します', '飾っていた程度の保管状態です', 'ファンの方にぜひ'],
    'コスメ':   ['購入後すぐに使用感が合わず出品します', '残量は写真でご確認ください', '常温・暗所で保管していました'],
    '生活雑貨': ['実用的に使えます', '買い替えのため出品します', '同じものを複数持っており出品しました'],
    'その他':   ['お気軽にご質問ください', '気になる点はコメントでお問い合わせください', 'まとめ買い歓迎です']
  };

  // 状態ごとのフレーズ
  var COND_PHRASE = {
    '新品':       { word: '新品・未使用', detail: '購入後そのまま保管していた未使用品です。', tag: '#新品 #未使用' },
    '新品同様':   { word: '新品同様',     detail: '1〜2度使用しましたが、目立つ傷や汚れはありません。', tag: '#美品 #ほぼ新品' },
    '良好':       { word: '美品',         detail: '通常使用による多少の経年はありますが、目立った傷や汚れはございません。', tag: '#美品' },
    'やや使用感': { word: '使用感あり',   detail: '使用に伴う小さな傷・汚れがあります。写真でご確認ください。', tag: '#中古' },
    '使用感':     { word: '使用感あり',   detail: '使用感がありますので、ご了承いただける方にお譲りします。', tag: '#中古' },
    '難あり':     { word: '訳あり',       detail: '一部に傷・汚れ等があります。写真と説明をよくご確認のうえご検討ください。', tag: '#訳あり #ジャンク' }
  };

  function generate() {
    var name = document.getElementById('name').value.trim();
    var cat  = document.getElementById('category').value;
    var cond = document.getElementById('condition').value;
    var price = document.getElementById('price').value.trim();
    var pointRaw = document.getElementById('point').value.trim();

    if (!name) { alert('商品名を入力してください'); return; }
    if (!price || isNaN(parseInt(price, 10))) { alert('希望価格を入力してください'); return; }

    var cp = COND_PHRASE[cond] || COND_PHRASE['良好'];
    var catList = CAT_PHRASE[cat] || CAT_PHRASE['その他'];
    var catLine = catList[Math.floor(Math.random() * catList.length)];

    // タイトル（30字以内に収める）
    var title = '【' + cp.word + '】' + name;
    if (title.length > 30) title = title.substring(0, 30);

    // 説明文
    var lines = [];
    lines.push('ご覧いただきありがとうございます。');
    lines.push('');
    lines.push('■商品名');
    lines.push(name);
    lines.push('');
    lines.push('■状態');
    lines.push(cp.word + '：' + cp.detail);
    if (pointRaw) {
      lines.push('');
      lines.push('■アピールポイント');
      pointRaw.split(/[,、]/).forEach(function(p){
        var t = p.trim(); if (t) lines.push('・' + t);
      });
    }
    lines.push('');
    lines.push('■補足');
    lines.push('・' + catLine);
    lines.push('・即購入OK／コメントなし購入歓迎です');
    lines.push('・即日〜翌日発送を心がけています');
    lines.push('');
    lines.push('価格交渉はお気軽にどうぞ。常識の範囲でご相談ください。');
    lines.push('');
    lines.push(cp.tag + ' #' + cat + ' #送料無料');

    var desc = lines.join('\n');

    // 表示
    document.getElementById('title-out').textContent = title;
    document.getElementById('desc-out').textContent = desc;
    document.getElementById('result').style.display = 'block';

    // 履歴保存
    saveHistory({
      name: name, cat: cat, cond: cond, price: price,
      title: title, desc: desc, t: Date.now()
    });
    renderHistory();

    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(id, btn) {
    var t = document.getElementById(id).textContent;
    doCopy(t, btn);
  }
  function copyAll(btn) {
    var t = document.getElementById('title-out').textContent + '\n\n' +
            document.getElementById('desc-out').textContent;
    doCopy(t, btn);
  }
  function doCopy(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ markCopied(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); try { document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta); markCopied(btn);
    }
  }
  function markCopied(btn) {
    var orig = btn.textContent;
    btn.textContent = '✓ コピーしました';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function saveHistory(item) {
    var arr = loadHistory();
    arr.unshift(item);
    arr = arr.slice(0, 10);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e){}
  }
  function renderHistory() {
    var arr = loadHistory();
    var box = document.getElementById('history-list');
    if (!arr.length) { box.innerHTML = '<p class="history-empty">まだ生成履歴はありません</p>'; return; }
    box.innerHTML = arr.map(function(it, i){
      var d = new Date(it.t);
      var ds = d.getMonth()+1 + '/' + d.getDate() + ' ' +
               ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
      return '<div class="history-item" onclick="restore(' + i + ')">'
           + (it.name || '(無題)') + '（¥' + (it.price||'-') + '）'
           + '<span class="h-date">' + ds + '</span></div>';
    }).join('');
  }
  function restore(i) {
    var arr = loadHistory();
    var it = arr[i]; if (!it) return;
    document.getElementById('title-out').textContent = it.title;
    document.getElementById('desc-out').textContent = it.desc;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
