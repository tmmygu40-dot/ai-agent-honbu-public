<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議事録メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>議事録メモ</h1>

    <section class="form-section">
      <h2>決定事項を追加</h2>
      <div class="form-group">
        <label for="item">決定事項</label>
        <textarea id="item" rows="2" placeholder="例：次回会議は来週火曜日に実施"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="owner">担当者</label>
          <input type="text" id="owner" placeholder="例：山田">
        </div>
        <div class="form-group">
          <label for="deadline">期限</label>
          <input type="date" id="deadline">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>決定事項一覧</h2>
        <span id="count" class="count-badge">0件</span>
      </div>
      <ul id="itemList"></ul>
      <p id="empty" class="empty-msg">まだ記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
