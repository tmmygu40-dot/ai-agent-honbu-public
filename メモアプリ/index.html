<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルメモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <div class="container">

    <!-- タイトルと設定ボタン -->
    <div class="app-header">
      <h1>📝 シンプルメモ</h1>
      <div class="header-controls">
        <!-- 文字サイズ -->
        <div class="font-size-btns">
          <button class="fs-btn" data-size="small">小</button>
          <button class="fs-btn active" data-size="medium">中</button>
          <button class="fs-btn" data-size="large">大</button>
        </div>
        <!-- ダークモード切り替え -->
        <button id="darkToggle" title="ダークモード切り替え">🌙</button>
      </div>
    </div>

    <!-- メモを書く入力エリア -->
    <div class="input-area">
      <textarea id="memoInput" placeholder="ここにメモを書いてください（Enter で追加 / Shift+Enter で改行）"></textarea>
      <div class="input-bottom">
        <select id="categorySelect">
          <option value="仕事">💼 仕事</option>
          <option value="個人">🙂 個人</option>
          <option value="買い物">🛒 買い物</option>
          <option value="その他">📌 その他</option>
        </select>
        <button id="addBtn">追加する</button>
      </div>
    </div>

    <!-- 検索・並び替えエリア -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍 検索...">
      <select id="sortSelect">
        <option value="new">新しい順</option>
        <option value="old">古い順</option>
      </select>
    </div>

    <!-- 絞り込みタブ（状態） -->
    <div class="filter-tabs" id="statusTabs">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了</button>
      <button class="filter-btn" data-filter="fav">⭐ お気に入り</button>
    </div>

    <!-- カテゴリ絞り込みタブ -->
    <div class="filter-tabs" id="categoryTabs">
      <button class="cat-btn active" data-cat="all">全カテゴリ</button>
      <button class="cat-btn" data-cat="仕事">💼 仕事</button>
      <button class="cat-btn" data-cat="個人">🙂 個人</button>
      <button class="cat-btn" data-cat="買い物">🛒 買い物</button>
      <button class="cat-btn" data-cat="その他">📌 その他</button>
    </div>

    <!-- 件数・書き出し・読み込み・全部削除 -->
    <div class="list-header">
      <span id="memoCount">0件</span>
      <div class="list-actions">
        <button id="exportBtn">書き出す</button>
        <label id="importLabel">読み込む
          <input type="file" id="importFile" accept=".json">
        </label>
        <button id="clearBtn">全部削除</button>
      </div>
    </div>

    <!-- メモが並ぶエリア -->
    <ul id="memoList"></ul>

  </div>

  <script src="script.js"></script>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
