<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お出かけ前チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>お出かけ前チェッカー</h1>
    <p class="subtitle">外出前に確認しよう</p>

    <div id="all-done-banner" class="all-done hidden">
      ✅ 全部確認OK！安心して出かけよう
    </div>

    <ul id="check-list" class="check-list"></ul>

    <div class="actions">
      <button id="reset-btn" class="btn btn-reset">リセット</button>
    </div>

    <div class="custom-section">
      <h2>項目を追加する</h2>
      <div class="add-form">
        <input type="text" id="new-item-input" placeholder="例：ペットのごはん" maxlength="30">
        <button id="add-btn" class="btn btn-add">追加</button>
      </div>
    </div>
  </div>

  <script>
const DEFAULT_ITEMS = [
  { id: 'default-1', label: '玄関の鍵', custom: false },
  { id: 'default-2', label: 'ガスの元栓', custom: false },
  { id: 'default-3', label: '電気（照明）', custom: false },
  { id: 'default-4', label: '窓の鍵', custom: false },
  { id: 'default-5', label: '水道（蛇口）', custom: false },
];

const STORAGE_KEY = 'odekake-checker';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function saveState(items, checked) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, checked }));
}

let state = { items: [], checked: {} };

function init() {
  const saved = loadState();
  if (saved) {
    state.items = saved.items;
    state.checked = saved.checked || {};
  } else {
    state.items = DEFAULT_ITEMS.map(i => ({ ...i }));
    state.checked = {};
  }
  render();
}

function render() {
  const list = document.getElementById('check-list');
  list.innerHTML = '';

  state.items.forEach(item => {
    const isChecked = !!state.checked[item.id];
    const li = document.createElement('li');
    li.className = 'check-item' + (isChecked ? ' checked' : '');
    li.dataset.id = item.id;

    const icon = document.createElement('span');
    icon.className = 'check-icon';
    icon.textContent = isChecked ? '✓' : '';

    const label = document.createElement('span');
    label.className = 'item-label';
    label.textContent = item.label;

    li.appendChild(icon);
    li.appendChild(label);

    if (item.custom) {
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      delBtn.setAttribute('aria-label', '削除');
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteItem(item.id);
      });
      li.appendChild(delBtn);
    }

    li.addEventListener('click', () => toggleCheck(item.id));
    list.appendChild(li);
  });

  updateBanner();
}

function toggleCheck(id) {
  state.checked[id] = !state.checked[id];
  saveState(state.items, state.checked);
  render();
}

function updateBanner() {
  const banner = document.getElementById('all-done-banner');
  const allDone = state.items.length > 0 && state.items.every(i => state.checked[i.id]);
  if (allDone) {
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }
}

function resetChecks() {
  state.checked = {};
  saveState(state.items, state.checked);
  render();
}

function addItem(label) {
  const trimmed = label.trim();
  if (!trimmed) return;
  const id = 'custom-' + Date.now();
  state.items.push({ id, label: trimmed, custom: true });
  saveState(state.items, state.checked);
  render();
}

function deleteItem(id) {
  state.items = state.items.filter(i => i.id !== id);
  delete state.checked[id];
  saveState(state.items, state.checked);
  render();
}

document.getElementById('reset-btn').addEventListener('click', resetChecks);

document.getElementById('add-btn').addEventListener('click', () => {
  const input = document.getElementById('new-item-input');
  addItem(input.value);
  input.value = '';
  input.focus();
});

document.getElementById('new-item-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const input = document.getElementById('new-item-input');
    addItem(input.value);
    input.value = '';
  }
});

init();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
