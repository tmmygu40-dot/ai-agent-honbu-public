<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お出かけ前チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>お出かけ前チェッカー</h1>
    <p class="subtitle">外出前に確認しよう</p>

    <div id="all-done-banner" class="all-done hidden">
      ✅ 全部確認OK！安心して出かけよう
    </div>

    <ul id="check-list" class="check-list"></ul>

    <div class="actions">
      <button id="reset-btn" class="btn btn-reset">リセット</button>
    </div>

    <div class="custom-section">
      <h2>項目を追加する</h2>
      <div class="add-form">
        <input type="text" id="new-item-input" placeholder="例：ペットのごはん" maxlength="30">
        <button id="add-btn" class="btn btn-add">追加</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
