<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スキンケア日記</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>🌸 スキンケア日記</h1>

    <section class="form-section">
      <div class="form-group">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label>肌の状態（複数選択可）</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" value="乾燥"> 乾燥
          </label>
          <label class="checkbox-label">
            <input type="checkbox" value="ニキビ"> ニキビ
          </label>
          <label class="checkbox-label">
            <input type="checkbox" value="かゆみ"> かゆみ
          </label>
          <label class="checkbox-label">
            <input type="checkbox" value="赤み"> 赤み
          </label>
          <label class="checkbox-label">
            <input type="checkbox" value="脂っぽい"> 脂っぽい
          </label>
          <label class="checkbox-label">
            <input type="checkbox" value="普通"> 普通
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <textarea id="memo" placeholder="スキンケア内容や気づきなど..."></textarea>
      </div>

      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <section class="records-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
