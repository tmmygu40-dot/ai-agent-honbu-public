<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今のスマホ月額料金と格安SIMプランを比較して、月額差額と年間節約額を即計算。乗り換えでいくら得するか一目で分かるチェッカーです。2026年4月時点の参考データ。">
  <title>格安SIM節約額チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── プラン比較カード ── */
    .plan-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-item .plan-name { font-weight: 600; color: var(--text); }
    .plan-item .plan-data { font-size: 0.78rem; color: var(--text-sub); }
    .plan-item .plan-price { font-weight: 700; color: var(--accent); }
    .plan-item .plan-save { font-size: 0.78rem; color: var(--ok); font-weight: 600; }
    .plan-item.selected { background: var(--accent-light); border-radius: 8px; padding: 0.6rem 0.5rem; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📱 格安SIM節約額チェッカー</h1>
    <p class="subtitle">今のスマホ代と格安SIMを比較して、年間いくら浮くかサクッと確認できます。</p>
  </header>

  <!-- 入力カード：現在の料金 -->
  <div class="card">
    <p class="card-title">現在のスマホ料金</p>
    <div class="field">
      <label for="currentBill">月額料金（税込）</label>
      <input type="number" id="currentBill" placeholder="例: 8000" inputmode="numeric">
      <p class="hint">大手キャリアの平均は月7,000〜10,000円程度</p>
    </div>
    <div class="field">
      <label for="currentData">月のデータ使用量（GB）</label>
      <select id="currentData">
        <option value="1">〜1GB</option>
        <option value="3">〜3GB</option>
        <option value="5">〜5GB</option>
        <option value="10">〜10GB</option>
        <option value="20" selected>〜20GB</option>
        <option value="50">〜50GB</option>
        <option value="999">無制限</option>
      </select>
      <p class="hint">自分に合うプランを絞り込むために選択してください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">節約額をチェックする</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">年間節約額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- プラン比較カード -->
  <div class="card" id="planCard" style="display:none">
    <p class="card-title">おすすめプラン比較（2026年4月時点の参考データ）</p>
    <div id="planList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省の通信料金に関する公開資料を参考に、目安として使いやすく整理しています。プラン料金は2026年4月時点の参考データです。最新情報は各社公式サイトをご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 格安SIMプランデータ（2026年4月時点の参考） ──
  var PLANS = [
    { name: '楽天モバイル', data: 3, price: 1078, note: '〜3GB' },
    { name: '楽天モバイル', data: 20, price: 2178, note: '〜20GB' },
    { name: '楽天モバイル', data: 999, price: 3278, note: '無制限' },
    { name: 'ahamo', data: 20, price: 2970, note: '20GB' },
    { name: 'ahamo', data: 100, price: 4950, note: '100GB（大盛り）' },
    { name: 'LINEMO', data: 3, price: 990, note: '3GB' },
    { name: 'LINEMO', data: 20, price: 2728, note: '20GB' },
    { name: 'povo', data: 3, price: 990, note: '3GB/30日' },
    { name: 'povo', data: 20, price: 2700, note: '20GB/30日' },
    { name: 'UQモバイル', data: 4, price: 2365, note: 'ミニミニ 4GB' },
    { name: 'UQモバイル', data: 20, price: 3278, note: 'トクトク 〜20GB' },
    { name: 'ワイモバイル', data: 4, price: 2365, note: 'S 4GB' },
    { name: 'ワイモバイル', data: 20, price: 4015, note: 'M 20GB' },
    { name: 'mineo', data: 5, price: 1518, note: '5GB' },
    { name: 'mineo', data: 20, price: 2178, note: '20GB' },
    { name: 'IIJmio', data: 5, price: 990, note: '5GB' },
    { name: 'IIJmio', data: 20, price: 2000, note: '20GB' },
  ];

  function calc() {
    var bill = parseFloat(document.getElementById('currentBill').value);
    if (isNaN(bill) || bill <= 0) { showErr('現在の月額料金を入力してください'); return; }

    var dataGB = parseInt(document.getElementById('currentData').value);

    // データ量に合うプランを抽出
    var matched = PLANS.filter(function(p) { return p.data >= dataGB; });
    if (matched.length === 0) matched = PLANS.filter(function(p) { return p.data === 999; });

    // 安い順にソート
    matched.sort(function(a, b) { return a.price - b.price; });

    // 最安プラン
    var best = matched[0];
    var monthSave = bill - best.price;
    var yearSave = monthSave * 12;

    var level = yearSave >= 60000 ? 'ok' : yearSave >= 20000 ? 'warn' : 'ng';
    var msg = level === 'ok' ? '大幅に節約できる可能性があります！'
            : level === 'warn' ? '乗り換えでそこそこ節約できそうです'
            : '現在の料金が既にお得か、差額が小さい状態です';

    showResult(level, fmt(yearSave) + ' 円/年', msg);
    showDetail([
      ['現在の月額', fmt(bill) + ' 円'],
      ['最安プラン月額', fmt(best.price) + ' 円（' + best.name + ' ' + best.note + '）'],
      ['月額の差額', fmt(monthSave) + ' 円', true],
      ['年間節約額', fmt(yearSave) + ' 円', true],
    ]);

    // プラン比較表示（上位5件）
    var top5 = matched.slice(0, 5);
    var html = '';
    top5.forEach(function(p) {
      var save = bill - p.price;
      html += '<div class="plan-item' + (p === best ? ' selected' : '') + '">'
            + '<div><span class="plan-name">' + p.name + '</span> <span class="plan-data">' + p.note + '</span></div>'
            + '<div><span class="plan-price">' + fmt(p.price) + '円/月</span> <span class="plan-save">-' + fmt(save) + '円/月</span></div>'
            + '</div>';
    });
    document.getElementById('planList').innerHTML = html;
    document.getElementById('planCard').style.display = 'block';

    // localStorage保存
    try {
      localStorage.setItem('sim_checker_bill', bill);
      localStorage.setItem('sim_checker_data', dataGB);
    } catch(e) {}
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('planCard').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── 起動時にlocalStorage読込 ──
  (function() {
    try {
      var b = localStorage.getItem('sim_checker_bill');
      var d = localStorage.getItem('sim_checker_data');
      if (b) document.getElementById('currentBill').value = b;
      if (d) document.getElementById('currentData').value = d;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
