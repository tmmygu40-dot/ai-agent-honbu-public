<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扶養内管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>扶養内管理アプリ</h1>
    <p class="subtitle">扶養範囲内で安全に働くための収入管理ツール</p>

    <!-- 設定セクション -->
    <section class="card">
      <h2>基本設定</h2>
      <div class="form-group">
        <label for="limit">扶養上限額（年間）</label>
        <div class="input-row">
          <select id="limitPreset">
            <option value="1030000">103万円（所得税の壁）</option>
            <option value="1060000">106万円（社会保険の壁）</option>
            <option value="1300000">130万円（社会保険の壁）</option>
            <option value="1500000">150万円（配偶者特別控除の壁）</option>
            <option value="custom">カスタム入力</option>
          </select>
        </div>
        <div class="input-row" id="customLimitRow" style="display:none;">
          <input type="number" id="customLimit" placeholder="例：1030000" min="0">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="form-group">
        <label for="earned">今年の収入累計</label>
        <div class="input-row">
          <input type="number" id="earned" placeholder="例：500000" min="0">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="form-group">
        <label for="hourlyWage">時給</label>
        <div class="input-row">
          <input type="number" id="hourlyWage" placeholder="例：1100" min="0">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="form-group">
        <label for="hoursPerShift">1シフトあたりの時間</label>
        <div class="input-row">
          <input type="number" id="hoursPerShift" placeholder="例：8" min="0" step="0.5">
          <span class="unit">時間</span>
        </div>
      </div>
      <button id="calcBtn" class="btn-primary">計算する</button>
    </section>

    <!-- 結果セクション -->
    <section class="card result-card" id="resultSection" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">扶養上限額</div>
          <div class="result-value" id="resLimit">―</div>
        </div>
        <div class="result-item">
          <div class="result-label">今年の収入累計</div>
          <div class="result-value" id="resEarned">―</div>
        </div>
        <div class="result-item highlight">
          <div class="result-label">残り収入可能額</div>
          <div class="result-value" id="resRemain">―</div>
        </div>
        <div class="result-item highlight">
          <div class="result-label">安全シフト数</div>
          <div class="result-value" id="resShifts">―</div>
        </div>
      </div>

      <div class="progress-area">
        <div class="progress-label">
          <span>収入進捗</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="warning" id="warningArea" style="display:none;"></div>
    </section>

    <!-- 月別収入セクション -->
    <section class="card">
      <h2>月別収入入力</h2>
      <div class="month-grid" id="monthGrid"></div>
      <div class="month-total">
        月別合計：<strong id="monthTotal">0</strong> 円
      </div>
      <button id="loadMonthBtn" class="btn-secondary">月別合計を「今年の収入累計」に反映</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
