<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>請求書管理</h1>

    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="client">送付先</label>
          <input type="text" id="client" placeholder="例：株式会社〇〇">
        </div>
        <div class="form-group">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" placeholder="例：50000" min="0">
        </div>
        <div class="form-group">
          <label for="dueDate">支払い期日</label>
          <input type="date" id="dueDate">
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：請求書No.001">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="filter-section">
      <label>表示フィルター：</label>
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="unpaid">未回収のみ</button>
      <button class="filter-btn" data-filter="paid">回収済みのみ</button>
    </section>

    <section class="summary-section">
      <div class="summary-item">
        <span class="summary-label">未回収合計</span>
        <span class="summary-value" id="unpaidTotal">¥0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">回収済み合計</span>
        <span class="summary-value paid" id="paidTotal">¥0</span>
      </div>
    </section>

    <section class="list-section">
      <div id="invoiceList" class="invoice-list">
        <p class="empty-message">請求書が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
