<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績管理アプリ v2</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>成績管理アプリ</h1>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" data-tab="input">成績入力</button>
      <button class="tab" data-tab="list">一覧・分析</button>
      <button class="tab" data-tab="trend">推移グラフ</button>
    </div>

    <!-- 成績入力タブ -->
    <div id="tab-input" class="tab-content active">
      <div class="card">
        <h2>成績を登録する</h2>
        <div class="form-group">
          <label>生徒名</label>
          <div class="input-row">
            <input type="text" id="studentInput" placeholder="例：山田太郎" list="studentList">
            <datalist id="studentList"></datalist>
          </div>
        </div>
        <div class="form-group">
          <label>科目名</label>
          <input type="text" id="subjectInput" placeholder="例：国語" list="subjectList">
          <datalist id="subjectList"></datalist>
        </div>
        <div class="form-group">
          <label>点数</label>
          <input type="number" id="scoreInput" placeholder="0〜100" min="0" max="100">
        </div>
        <div class="form-group">
          <label>テスト日</label>
          <input type="date" id="dateInput">
        </div>
        <button class="btn btn-primary" id="addBtn">登録する</button>
        <p id="addMsg" class="msg"></p>
      </div>
    </div>

    <!-- 一覧・分析タブ -->
    <div id="tab-list" class="tab-content">
      <div class="card">
        <div class="filter-row">
          <label>生徒で絞り込み：</label>
          <select id="filterStudent">
            <option value="">全員</option>
          </select>
        </div>
      </div>

      <div id="studentCards"></div>

      <div class="card danger-zone">
        <button class="btn btn-danger" id="clearAllBtn">全データ削除</button>
      </div>
    </div>

    <!-- 推移グラフタブ -->
    <div id="tab-trend" class="tab-content">
      <div class="card">
        <div class="form-group">
          <label>生徒を選択</label>
          <select id="trendStudent">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>科目を選択</label>
          <select id="trendSubject">
            <option value="">選択してください</option>
          </select>
        </div>
      </div>
      <div class="card">
        <canvas id="trendChart" width="600" height="300"></canvas>
        <p id="trendMsg" class="msg center">生徒と科目を選択してください</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
