<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 散財タイプ診断</title>
  <meta name="description" content="5つの質問に答えると、あなたの金銭感覚がどんな暴君に例えられるか診断。散財癖の度合いと性格をマッチングします。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問スタイル ── */
    .question { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
    .question:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .question-text { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.7rem; color: var(--text); }
    .question-text .q-number { font-size: 0.85rem; color: var(--accent); font-weight: 900; margin-right: 0.3rem; }

    /* ── ラジオボタン ── */
    .option-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .option-label {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background-color 0.15s;
      background: var(--bg);
    }
    .option-label:hover { border-color: var(--accent); background: var(--accent-light); }
    .option-label input[type="radio"] { cursor: pointer; }
    .option-label input[type="radio"]:checked ~ .option-text {
      color: var(--accent);
      font-weight: 700;
    }
    .option-text { font-size: 0.92rem; color: var(--text-sub); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.5rem; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.8rem;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>👑 散財タイプ診断</h1>
    <p class="subtitle">あなたの金銭感覚はどんな暴君？散財癖を歴史上の人物に例えて診断します。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="questionCard">
    <p class="card-title">質問</p>
    <div id="questions"></div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの散財タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 診断データ ──
  var QUESTIONS = [
    {
      text: '欲しい物を見つけた時の行動は？',
      options: [
        { text: '一瞬で買うか即決する', score: 5 },
        { text: '少し考えてから買う', score: 3 },
        { text: '必要性をよく考えてから買う', score: 1 },
        { text: 'ほぼ買わない', score: 0 }
      ]
    },
    {
      text: '月の固定費（食費・交通費など）が想定より多くなったら？',
      options: [
        { text: 'あまり気にしない', score: 5 },
        { text: 'ちょっと気になるが続ける', score: 3 },
        { text: '原因を調べて減らす努力をする', score: 1 },
        { text: '即座に節約する', score: 0 }
      ]
    },
    {
      text: 'セール・クーポンを見つけた時の反応は？',
      options: [
        { text: 'つい買ってしまう', score: 5 },
        { text: '時々買う', score: 3 },
        { text: '本当に必要な時だけ', score: 1 },
        { text: 'セールでも買わない', score: 0 }
      ]
    },
    {
      text: '今月の給料・収入の使い道を決めるのは？',
      options: [
        { text: 'まず欲しい物から買う', score: 5 },
        { text: '気分で決める', score: 3 },
        { text: '貯蓄目標を先に決める', score: 1 },
        { text: '予算表を作って管理する', score: 0 }
      ]
    },
    {
      text: '1万円あったら？',
      options: [
        { text: '全部使い切る気分', score: 5 },
        { text: 'ほぼ使う', score: 3 },
        { text: 'いくらか残す', score: 1 },
        { text: 'ほぼ貯金する', score: 0 }
      ]
    }
  ];

  var DIAGNOSIS = {
    '浪費王 ナポレオン': {
      range: [20, 25],
      emoji: '⚔️',
      description: '帝国を築く野心も金銭管理も ゼロ。とにかく今・欲望・全力散財！次々と新しい欲望に向かって、歴史に名を刻むような大散財を繰り返します。',
      note: 'シンプルに「今欲しい」→「買う」の無限ループ。気が付くと口座残高が…。',
      type: 'ng'
    },
    '享楽皇帝 ネロ': {
      range: [15, 19],
      emoji: '👑',
      description: 'ローマ帝国を音楽と享楽で満たしたネロのように、気分次第で大金を使う派。計画性より快楽が優先です。',
      note: '衝動買いと浪費のリズム感がある。給料日の翌日が危険ゾーン。',
      type: 'warn'
    },
    '虚栄心の帝王 ルイ14世': {
      range: [10, 14],
      emoji: '💎',
      description: '「朕は国家である」と言い放ったルイ14世のように、見栄と自尊心で散財。安い物は買わない、ステータス重視。',
      note: '必要性より「高級感」を優先。良い物を選ぶから貯金が減る。',
      type: 'warn'
    },
    '独裁的貴族 カロンタ': {
      range: [5, 9],
      emoji: '🎩',
      description: '不安定で気まぐれな統治者のように、計画に反発。「安いのは嫌」と突然高い物に走ったり、その逆も。一貫性がない。',
      note: 'お小遣い帳つけてるはずなのに、なぜか貯まらない…',
      type: 'warn'
    },
    '禁欲の賢人 マルクス・アウレリウス': {
      range: [0, 4],
      emoji: '🧘',
      description: 'ストア学派の賢帝のように、欲望をコントロール。必要最小限の消費で十分。未来への不安も少ない。',
      note: '「これでいい」の満足度が高い。貯金が増える喜びを知っている。',
      type: 'ok'
    }
  };

  // ── UI初期化 ──
  function initQuestions() {
    var html = QUESTIONS.map(function(q, idx) {
      var optionsHtml = q.options.map(function(opt) {
        return '<label class="option-label">' +
          '<input type="radio" name="q' + idx + '" value="' + opt.score + '">' +
          '<span class="option-text">' + opt.text + '</span>' +
        '</label>';
      }).join('');
      return '<div class="question">' +
        '<p class="question-text"><span class="q-number">Q' + (idx + 1) + '.</span>' + q.text + '</p>' +
        '<div class="option-group">' + optionsHtml + '</div>' +
      '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  // ── 診断実行 ──
  function diagnose() {
    var totalScore = 0;
    var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var selected = document.querySelector('input[name="q' + i + '"]:checked');
      if (!selected) {
        showErr('すべての質問に答えてください');
        return;
      }
      totalScore += parseInt(selected.value);
      answered++;
    }

    // スコアから診断結果を決定
    var result = null;
    for (var key in DIAGNOSIS) {
      var d = DIAGNOSIS[key];
      if (totalScore >= d.range[0] && totalScore <= d.range[1]) {
        result = key;
        break;
      }
    }

    if (!result) {
      showErr('診断に失敗しました');
      return;
    }

    var diag = DIAGNOSIS[result];
    showResult(diag.type, diag.emoji + ' ' + result, diag.description, diag.note);
    saveDiagnosis(result, totalScore);
  }

  function showResult(type, value, desc, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + type;
    rc.style.display = '';
    document.getElementById('rv').textContent = value;
    document.getElementById('re').textContent = desc;
    document.getElementById('rn').textContent = note;
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg, '');
  }

  // ── localStorage保存 ──
  function saveDiagnosis(result, score) {
    var history = JSON.parse(localStorage.getItem('散財診断_history') || '[]');
    history.push({
      date: new Date().toISOString().split('T')[0],
      result: result,
      score: score
    });
    if (history.length > 10) history.shift();
    localStorage.setItem('散財診断_history', JSON.stringify(history));
  }

  // ── 初期化 ──
  initQuestions();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
