<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省エネ買い替え採算チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 入力グループ（2列） ── */
    .field-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .field-row .field { flex: 1; margin-bottom: 0; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 累計節約カード ── */
    .savings-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .savings-item {
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center;
    }
    .savings-item .s-label { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .savings-item .s-value { font-size: 1rem; font-weight: 800; color: var(--accent); }
    .savings-item .s-value.plus { color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>省エネ買い替え採算チェッカー</h1>
    <p class="subtitle">買い替えコストと電気代節約額を比較して元が取れる時期を確認</p>
  </header>

  <!-- 買い替えコスト -->
  <div class="card">
    <p class="card-title">買い替えコスト</p>
    <div class="field">
      <label for="cost">買い替えにかかる実質コスト（円）</label>
      <input type="number" id="cost" placeholder="例: 80000" min="0">
      <p class="hint">新家電の購入価格から下取り・補助金・エコポイントを引いた金額</p>
    </div>
  </div>

  <!-- 消費電力 -->
  <div class="card">
    <p class="card-title">消費電力（月間）</p>
    <div class="field-row">
      <div class="field">
        <label for="old_kwh">現在の家電（kWh/月）</label>
        <input type="number" id="old_kwh" placeholder="例: 60" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="new_kwh">省エネ家電（kWh/月）</label>
        <input type="number" id="new_kwh" placeholder="例: 30" min="0" step="0.1">
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label for="unit_price">電気料金単価（円/kWh）</label>
      <input type="number" id="unit_price" placeholder="例: 31" min="0" step="0.1">
      <p class="hint">電気代明細の「単価」または目安31円で入力</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">元が取れる時期を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">回収期間</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">計算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 累計節約カード -->
  <div class="card" id="savings-card" style="display:none">
    <p class="card-title">累計節約シミュレーション</p>
    <div class="savings-grid" id="savings-grid"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'energy_checker_v1';

  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem(LS_KEY);
    if (saved) {
      try {
        var d = JSON.parse(saved);
        if (d.cost)       document.getElementById('cost').value       = d.cost;
        if (d.old_kwh)    document.getElementById('old_kwh').value    = d.old_kwh;
        if (d.new_kwh)    document.getElementById('new_kwh').value    = d.new_kwh;
        if (d.unit_price) document.getElementById('unit_price').value = d.unit_price;
      } catch(e) {}
    }
  });

  function calc() {
    var cost       = parseFloat(document.getElementById('cost').value);
    var oldKwh     = parseFloat(document.getElementById('old_kwh').value);
    var newKwh     = parseFloat(document.getElementById('new_kwh').value);
    var unitPrice  = parseFloat(document.getElementById('unit_price').value);

    if (isNaN(cost) || isNaN(oldKwh) || isNaN(newKwh) || isNaN(unitPrice)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (cost < 0 || oldKwh < 0 || newKwh < 0 || unitPrice <= 0) {
      showErr('入力値を正しく入力してください');
      return;
    }

    // 保存
    localStorage.setItem(LS_KEY, JSON.stringify({ cost: cost, old_kwh: oldKwh, new_kwh: newKwh, unit_price: unitPrice }));

    var saveKwh  = oldKwh - newKwh;         // 月間節約電力
    var saveMonth = saveKwh * unitPrice;    // 月間節約金額
    var saveYear  = saveMonth * 12;         // 年間節約金額

    // 節約がない・マイナスの場合
    if (saveMonth <= 0) {
      showResult('ng', '節約なし', '省エネ家電のほうが消費電力が多いか、差がありません。買い替えの節約効果は見込めません。');
      document.getElementById('detail').style.display = 'none';
      document.getElementById('savings-card').style.display = 'none';
      return;
    }

    // 回収期間
    var recoverMonths = cost / saveMonth;
    var recoverYears  = recoverMonths / 12;

    var level, note;
    if (recoverYears <= 5) {
      level = 'ok';
      note  = '5年以内に元が取れます。買い替えはお得です！';
    } else if (recoverYears <= 10) {
      level = 'warn';
      note  = '5〜10年で元が取れます。家電の寿命と比較して判断しましょう。';
    } else {
      level = 'ng';
      note  = '回収に10年以上かかります。買い替えメリットは薄いかもしれません。';
    }

    var dispYears  = Math.floor(recoverYears);
    var dispMonths = Math.round((recoverYears - dispYears) * 12);
    var recoverStr = dispYears > 0
      ? dispYears + '年' + (dispMonths > 0 ? dispMonths + 'ヶ月' : '')
      : recoverMonths.toFixed(1) + 'ヶ月';

    showResult(level, recoverStr, note);

    showDetail([
      ['月間節約電力',     fmt1(saveKwh) + ' kWh'],
      ['月間節約金額',     fmt(saveMonth) + ' 円'],
      ['年間節約金額',     fmt(saveYear) + ' 円'],
      ['買い替えコスト',   fmt(cost) + ' 円'],
      ['回収期間',         recoverStr, true],
    ]);

    showSavings(cost, saveMonth, saveYear);
  }

  function showSavings(cost, saveMonth, saveYear) {
    var years = [3, 5, 10];
    var html = '';
    for (var i = 0; i < years.length; i++) {
      var y   = years[i];
      var cum = saveMonth * 12 * y;
      var net = cum - cost;
      var cls = net >= 0 ? 'plus' : '';
      var prefix = net >= 0 ? '+' : '';
      html += '<div class="savings-item">'
            + '<div class="s-label">' + y + '年後の累計節約</div>'
            + '<div class="s-value">' + fmt(cum) + '円</div>'
            + '<div class="s-label" style="margin-top:0.25rem">実質損益</div>'
            + '<div class="s-value ' + cls + '">' + prefix + fmt(net) + '円</div>'
            + '</div>';
    }
    document.getElementById('savings-grid').innerHTML = html;
    document.getElementById('savings-card').style.display = 'block';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('savings-card').style.display = 'none';
  }
  function fmt(n)  { return Math.round(n).toLocaleString('ja-JP'); }
  function fmt1(n) { return parseFloat(n.toFixed(1)).toLocaleString('ja-JP'); }
  </script>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
