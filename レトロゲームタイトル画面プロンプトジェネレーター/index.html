<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ゲームタイトル・ジャンル・時代感・背景シーンを選ぶだけで、レトロゲーム風タイトル画面の画像生成AIプロンプトを即生成。ワンクリックでコピーできるプロンプトジェネレーター。">
  <title>レトロゲームタイトル画面プロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.8rem; text-align: center; }

    /* ── プロンプト表示 ── */
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem;
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); word-break: break-word;
      white-space: pre-wrap; min-height: 80px;
      margin-bottom: 1rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎮 レトロゲームタイトル画面プロンプトジェネレーター</h1>
    <p class="subtitle">ジャンルと雰囲気を選ぶだけで、懐かしいタイトル画面のAI画像プロンプトを即生成!</p>
  </header>

  <!-- タイトル情報カード -->
  <div class="card">
    <p class="card-title">タイトル情報</p>
    <div class="field">
      <label for="gameTitle">ゲームタイトル名（任意）</label>
      <input type="text" id="gameTitle" placeholder="例: DRAGON QUEST, MEGA STRIKER">
      <p class="hint">英語で入力するとプロンプトに組み込まれます</p>
    </div>
    <div class="field">
      <label for="genre">ゲームジャンル</label>
      <select id="genre">
        <option value="fantasy RPG">ファンタジーRPG (Fantasy RPG)</option>
        <option value="sci-fi space adventure">SF宇宙アドベンチャー (Sci-Fi Space)</option>
        <option value="action platformer">アクション (Action Platformer)</option>
        <option value="horror survival">ホラーサバイバル (Horror Survival)</option>
        <option value="strategy simulation">戦略シミュレーション (Strategy)</option>
        <option value="puzzle">パズルゲーム (Puzzle)</option>
        <option value="racing">レースゲーム (Racing)</option>
        <option value="fighting">格闘ゲーム (Fighting)</option>
        <option value="shoot-em-up">シューティング (Shoot'em up)</option>
        <option value="sports">スポーツ (Sports)</option>
        <option value="cute casual">カジュアルかわいい (Cute Casual)</option>
        <option value="ninja action">忍者アクション (Ninja Action)</option>
        <option value="mecha robot">メカ/ロボット (Mecha Robot)</option>
      </select>
    </div>
    <div class="field">
      <label for="era">時代感（ゲーム機世代）</label>
      <select id="era">
        <option value="8-bit NES/Famicom era">8bit ファミコン世代 (NES/FC)</option>
        <option value="16-bit SNES/Mega Drive era" selected>16bit スーファミ世代 (SNES/MD)</option>
        <option value="Game Boy monochrome era">ゲームボーイ世代 (GB)</option>
        <option value="Game Boy Advance era">GBA世代 (GBA)</option>
        <option value="32-bit PS1/Saturn era">32bit PS1/サターン世代</option>
        <option value="arcade cabinet CRT era">アーケード筐体風 (Arcade)</option>
        <option value="MSX/PC-88 Japanese retro computer era">MSX/PC-88風 (JP Retro PC)</option>
      </select>
    </div>
  </div>

  <!-- ビジュアル設定カード -->
  <div class="card">
    <p class="card-title">ビジュアル設定</p>
    <div class="field">
      <label for="background">背景シーン</label>
      <select id="background">
        <option value="starry night sky with mountains">星空と山脈 (Starry Mountains)</option>
        <option value="dark castle with lightning">暗黒城と稲妻 (Dark Castle)</option>
        <option value="sunset over ocean horizon">夕焼けの海 (Sunset Ocean)</option>
        <option value="deep space with planets and nebula">宇宙空間と惑星 (Deep Space)</option>
        <option value="ancient ruins with mystical glow">古代遺跡と神秘の光 (Ancient Ruins)</option>
        <option value="futuristic neon cityscape">近未来ネオンシティ (Neon City)</option>
        <option value="volcanic lava landscape">火山と溶岩の大地 (Volcanic)</option>
        <option value="enchanted forest with glowing trees">魔法の森 (Enchanted Forest)</option>
        <option value="colosseum arena battlefield">闘技場 (Colosseum Arena)</option>
        <option value="cloudy sky with floating islands">浮遊大陸と雲海 (Floating Islands)</option>
        <option value="snow covered mountain peak">雪山の頂 (Snow Peak)</option>
        <option value="underwater temple with coral">海底神殿 (Underwater Temple)</option>
        <option value="desert oasis with pyramids">砂漠とピラミッド (Desert Pyramids)</option>
        <option value="mechanical steampunk factory">スチームパンク工場 (Steampunk)</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="NES palette limited 8-bit colors">ファミコンパレット (NES 8-bit)</option>
        <option value="SNES 16-bit rich color palette" selected>スーファミパレット (SNES 16-bit)</option>
        <option value="Game Boy green monochrome 4-shade palette">ゲームボーイ緑4階調 (GB Green)</option>
        <option value="dark fantasy muted color palette">ダークファンタジー (Dark Fantasy)</option>
        <option value="bright vibrant arcade color palette">アーケードビビッド (Arcade Vivid)</option>
        <option value="pastel soft retro color palette">パステルレトロ (Pastel Retro)</option>
        <option value="warm sepia retro tone palette">セピアレトロ (Sepia)</option>
        <option value="blue-dominant sci-fi palette">SF系ブルー (Sci-Fi Blue)</option>
        <option value="red and black dramatic palette">赤黒ドラマチック (Red & Black)</option>
      </select>
    </div>
    <div class="field">
      <label for="fontStyle">タイトルフォントスタイル</label>
      <select id="fontStyle">
        <option value="large bold pixel font with metallic sheen">メタリック太字 (Metallic Bold)</option>
        <option value="glowing neon outline pixel font">ネオン発光 (Neon Glow)</option>
        <option value="embossed 3D pixel font with shadow">3Dエンボス (3D Embossed)</option>
        <option value="gothic ornate pixel font">ゴシック装飾 (Gothic Ornate)</option>
        <option value="fiery flame effect pixel font">炎エフェクト (Fire Effect)</option>
        <option value="icy crystal frozen pixel font">氷結クリスタル (Ice Crystal)</option>
        <option value="simple clean white pixel font">シンプル白 (Simple White)</option>
        <option value="gradient rainbow pixel font">レインボーグラデ (Rainbow Gradient)</option>
        <option value="stone carved ancient pixel font">石彫り古代風 (Stone Carved)</option>
      </select>
    </div>
    <div class="field">
      <label for="decoration">装飾要素</label>
      <select id="decoration">
        <option value="pixel art sword and shield emblem">剣と盾の紋章 (Sword & Shield)</option>
        <option value="dragon silhouette">ドラゴンシルエット (Dragon)</option>
        <option value="sparkle and star particle effects">キラキラ星エフェクト (Sparkle Stars)</option>
        <option value="pixel art character silhouettes">キャラシルエット (Character Silhouettes)</option>
        <option value="ornate frame border decoration">装飾フレーム枠 (Ornate Frame)</option>
        <option value="energy beam and lightning effects">エネルギービーム (Energy Beam)</option>
        <option value="scrolling clouds animation style">流れる雲 (Scrolling Clouds)</option>
        <option value="copyright text and press start prompt">PRESS START表示 (Press Start)</option>
        <option value="mechanical gears and pipes">歯車とパイプ (Mechanical Gears)</option>
        <option value="no extra decoration minimal">装飾なし (Minimal)</option>
      </select>
    </div>
    <div class="field">
      <label for="extras">追加要素（任意）</label>
      <input type="text" id="extras" placeholder="例: with Japanese katakana text, CRT scanline effect">
      <p class="hint">英語で自由に追加要素を記入できます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-output" id="prompt-text"></div>
    <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">コピーする</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎮 このツールは、画像生成AI（Stable Diffusion / Midjourney / DALL-E 等）で使えるプロンプトの目安を生成します。生成結果はAIモデルにより異なる場合があります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var LS_KEY = 'retro_game_title_screen_prompt_gen';

  function saveSettings() {
    var ids = ['gameTitle','genre','era','background','palette','fontStyle','decoration','extras'];
    var data = {};
    ids.forEach(function(id) { data[id] = document.getElementById(id).value; });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadSettings() {
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY));
      if (!data) return;
      Object.keys(data).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = data[id];
      });
    } catch(e) {}
  }

  function generate() {
    saveSettings();

    var gameTitle = document.getElementById('gameTitle').value.trim();
    var genre = document.getElementById('genre').value;
    var era = document.getElementById('era').value;
    var background = document.getElementById('background').value;
    var palette = document.getElementById('palette').value;
    var fontStyle = document.getElementById('fontStyle').value;
    var decoration = document.getElementById('decoration').value;
    var extras = document.getElementById('extras').value.trim();

    var parts = [
      'pixel art',
      'retro video game title screen',
      era
    ];

    if (gameTitle) {
      parts.push('game title "' + gameTitle + '"');
    }

    parts.push(genre + ' game');
    parts.push(background);
    parts.push(fontStyle + ' for title text');
    parts.push(palette);
    parts.push(decoration);

    if (extras) parts.push(extras);

    parts.push('clean pixel edges, no anti-aliasing, sharp pixels, nostalgic retro gaming atmosphere, high quality');

    var prompt = parts.join(', ');

    document.getElementById('prompt-text').textContent = prompt;
    var rc = document.getElementById('result');
    rc.className = 'result-card show';
    rc.style.display = 'block';

    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーする';
    btn.className = 'btn-copy';
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied();
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーしました!';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = 'コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  // 初期化
  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
