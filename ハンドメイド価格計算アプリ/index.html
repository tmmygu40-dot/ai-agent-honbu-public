<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハンドメイド価格計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>🧵 ハンドメイド価格計算</h1>
    <p class="subtitle">材料費・制作時間から適正価格を算出</p>
  </header>

  <main>
    <!-- 入力フォーム -->
    <section class="card" id="formSection">
      <h2>作品を登録</h2>

      <div class="form-group">
        <label for="itemName">作品名 <span class="required">*</span></label>
        <input type="text" id="itemName" placeholder="例：布小物ポーチ" maxlength="50">
      </div>

      <div class="form-group">
        <label for="materialCost">材料費（円）<span class="required">*</span></label>
        <input type="number" id="materialCost" placeholder="例：500" min="0" step="1">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="workHours">制作時間（時間）</label>
          <input type="number" id="workHours" placeholder="例：2" min="0" step="0.5" value="0">
        </div>
        <div class="form-group">
          <label for="workMinutes">制作時間（分）</label>
          <input type="number" id="workMinutes" placeholder="例：30" min="0" max="59" step="1" value="0">
        </div>
      </div>

      <div class="form-group">
        <label for="hourlyWage">時給（円）</label>
        <input type="number" id="hourlyWage" placeholder="例：1000" min="0" step="100" value="1000">
      </div>

      <div class="form-group">
        <label for="profitRate">利益率（倍）</label>
        <input type="number" id="profitRate" placeholder="例：1.5" min="1" step="0.1" value="1.5">
        <p class="hint">販売価格 = （材料費 + 制作時間×時給）× 利益率</p>
      </div>

      <!-- プレビュー -->
      <div class="preview" id="preview">
        <div class="preview-row">
          <span>材料費</span>
          <span id="previewMaterial">¥0</span>
        </div>
        <div class="preview-row">
          <span>人件費</span>
          <span id="previewLabor">¥0</span>
        </div>
        <div class="preview-row subtotal">
          <span>原価合計</span>
          <span id="previewCost">¥0</span>
        </div>
        <div class="preview-row total">
          <span>推奨販売価格</span>
          <span id="previewPrice">¥0</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="addBtn" onclick="addItem()">作品を追加</button>
        <button class="btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </section>

    <!-- 作品一覧 -->
    <section class="card" id="listSection">
      <div class="list-header">
        <h2>作品一覧 <span class="count" id="itemCount">0件</span></h2>
        <button class="btn-clear" onclick="clearAll()" id="clearBtn" style="display:none;">全削除</button>
      </div>

      <div id="emptyMsg" class="empty-msg">
        まだ作品がありません。<br>上のフォームから登録してください。
      </div>

      <div id="itemList"></div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
