<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材活用献立提案アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 選択カウンター ── */
    .select-count {
      font-size: 0.85rem; font-weight: 700; color: var(--text-sub);
      margin-bottom: 0.8rem; text-align: right;
    }
    .select-count span { color: var(--accent); font-size: 1.1rem; }

    /* ── カテゴリー ── */
    .category { margin-bottom: 1.1rem; }
    .category-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub); letter-spacing: 0.05em;
      margin-bottom: 0.5rem; display: block;
    }
    .ingredient-grid {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .ing-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.88rem; font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ing-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .ing-btn.disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.8rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果カード ── */
    .result-section { display: none; max-width: 600px; margin: 0 auto 1rem; }
    .result-header {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      padding: 0 0.2rem 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.8rem;
    }
    .meal-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.7rem;
    }
    .meal-card.top-pick {
      border-color: var(--accent);
      border-width: 2px;
    }
    .meal-rank {
      font-size: 0.7rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }
    .meal-name {
      font-size: 1.2rem; font-weight: 900;
      color: var(--text); margin-bottom: 0.4rem;
    }
    .meal-match {
      font-size: 0.78rem; color: var(--ok);
      font-weight: 600; margin-bottom: 0.4rem;
    }
    .meal-desc {
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.55;
    }
    .meal-used-ingredients {
      margin-top: 0.4rem; font-size: 0.78rem; color: var(--text-sub);
    }
    .meal-used-ingredients span {
      display: inline-block;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.1rem 0.5rem;
      margin: 0.1rem 0.2rem 0.1rem 0;
      color: var(--accent);
      font-weight: 600;
    }

    .no-result {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

    { name: '炊き込みご飯',        ingredients: ['鶏肉','にんじん','しめじ','えのき','油揚げ','長ねぎ'],       desc: '具材をお米と一緒に炊くだけで豪華な炊き込みご飯。' },
    { name: '冷しゃぶサラダ',       ingredients: ['豚肉','レタス','きゅうり','トマト'],                        desc: '茹でた豚肉を野菜にのせてポン酢で食べる夏の定番。' },
    { name: '豚汁うどん',          ingredients: ['豚肉','大根','にんじん','長ねぎ','こんにゃく'],              desc: '豚汁に余ったうどんを入れた満腹メニュー。' },
    { name: 'コンソメスープ',       ingredients: ['じゃがいも','にんじん','玉ねぎ','キャベツ','ベーコン'],      desc: '野菜を煮込んだ洋風スープ。シンプルで体に優しい。' },
    { name: 'ポテトグラタン',       ingredients: ['じゃがいも','チーズ','牛乳','玉ねぎ'],                      desc: 'じゃがいもをスライスして重ねて焼くだけ。' },
  ];

  // ── 選択状態 ──
  var selected = {};

  // ── 初期化 ──
  function init() {
    // 食材ボタン生成
    Object.keys(categories).forEach(function(catId) {
      var grid = document.getElementById(catId);
      categories[catId].forEach(function(ing) {
        var btn = document.createElement('button');
        btn.className = 'ing-btn';
        btn.textContent = ing;
        btn.dataset.ing = ing;
        btn.addEventListener('click', function() { toggleIngredient(ing, btn); });
        grid.appendChild(btn);
      });
    });

    // localStorage 復元
    var saved = localStorage.getItem('shokuzai_selected');
    if (saved) {
      try {
        var savedArr = JSON.parse(saved);
        savedArr.forEach(function(ing) {
          selected[ing] = true;
        });
        updateButtons();
        updateCount();
      } catch(e) {}
    }
  }

  function toggleIngredient(ing, btn) {
    if (selected[ing]) {
      delete selected[ing];
    } else {
      if (Object.keys(selected).length >= 3) return; // 3つ上限
      selected[ing] = true;
    }
    updateButtons();
    updateCount();
    saveToLS();
    // 提案済みなら再提案
    if (document.getElementById('result').style.display !== 'none') {
      suggest();
    }
  }

  function updateButtons() {
    var count = Object.keys(selected).length;
    document.querySelectorAll('.ing-btn').forEach(function(btn) {
      var ing = btn.dataset.ing;
      if (selected[ing]) {
        btn.classList.add('selected');
        btn.classList.remove('disabled');
      } else if (count >= 3) {
        btn.classList.remove('selected');
        btn.classList.add('disabled');
      } else {
        btn.classList.remove('selected');
        btn.classList.remove('disabled');
      }
    });
  }

  function updateCount() {
    document.getElementById('count').textContent = Object.keys(selected).length;
  }

  function saveToLS() {
    localStorage.setItem('shokuzai_selected', JSON.stringify(Object.keys(selected)));
  }

  // ── 献立提案 ──
  function suggest() {
    var selArr = Object.keys(selected);
    if (selArr.length === 0) {
      alert('食材を1つ以上選んでください');
      return;
    }

    // スコアリング
    var scored = mealDB.map(function(meal) {
      var matchList = selArr.filter(function(s) {
        return meal.ingredients.indexOf(s) >= 0;
      });
      return { meal: meal, matchCount: matchList.length, matchList: matchList };
    });

    // マッチ数でソート（多い順）
    scored.sort(function(a, b) {
      return b.matchCount - a.matchCount || 0;
    });

    // マッチあるもの、または上位まで表示
    var matched = scored.filter(function(s) { return s.matchCount > 0; });
    var toShow = matched.slice(0, 5);

    var ml = document.getElementById('meal-list');
    var rs = document.getElementById('result');

    if (toShow.length === 0) {
      ml.innerHTML = '<div class="no-result">選んだ食材で提案できる献立が見つかりませんでした。<br>別の食材を試してみてください。</div>';
    } else {
      ml.innerHTML = toShow.map(function(s, i) {
        var rankLabel = i === 0 ? '🥇 ベストマッチ' : (i === 1 ? '🥈 2位' : (i === 2 ? '🥉 3位' : (i + 1) + '位'));
        var topClass = i === 0 ? ' top-pick' : '';
        var matchTags = s.matchList.length > 0
          ? '<div class="meal-used-ingredients">使う食材：' + s.matchList.map(function(m) { return '<span>' + m + '</span>'; }).join('') + '</div>'
          : '<div class="meal-used-ingredients" style="color:var(--text-sub)">食材は参考用に追加してください</div>';
        return '<div class="meal-card' + topClass + '">'
          + '<p class="meal-rank">' + rankLabel + '（' + s.matchCount + '品一致）</p>'
          + '<p class="meal-name">' + s.meal.name + '</p>'
          + '<p class="meal-desc">' + s.meal.desc + '</p>'
          + matchTags
          + '</div>';
      }).join('');
    }

    rs.style.display = '';
    rs.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── リセット ──
  function resetAll() {
    selected = {};
    updateButtons();
    updateCount();
    saveToLS();
    document.getElementById('result').style.display = 'none';
  }

  init();
  </script>

</body>
</html>
