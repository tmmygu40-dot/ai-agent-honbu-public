<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>先入先出管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>先入先出管理アプリ</h1>
    <p class="subtitle">食品を登録して、使うべき順に管理しよう</p>

    <section class="form-section">
      <h2>食品を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="foodName">食品名</label>
          <input type="text" id="foodName" placeholder="例：牛乳" maxlength="50">
        </div>
        <div class="form-group">
          <label for="arrivalDate">入荷日</label>
          <input type="date" id="arrivalDate">
        </div>
        <div class="form-group">
          <label for="expiryDate">賞味期限</label>
          <input type="date" id="expiryDate">
        </div>
        <div class="form-group">
          <label for="quantity">数量・メモ（任意）</label>
          <input type="text" id="quantity" placeholder="例：1本" maxlength="30">
        </div>
      </div>
      <button id="addBtn" class="btn-add">登録する</button>
      <p id="errorMsg" class="error-msg" hidden></p>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>食材一覧 <span id="itemCount" class="count-badge">0</span></h2>
        <div class="legend">
          <span class="badge expired">期限切れ</span>
          <span class="badge danger">3日以内</span>
          <span class="badge warning">1週間以内</span>
          <span class="badge safe">余裕あり</span>
        </div>
      </div>
      <div id="foodList" class="food-list">
        <p class="empty-msg">まだ食品が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
