<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格履歴メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>価格履歴メモ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>価格を記録する</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：牛乳 1L" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="price">価格（円）</label>
        <input type="number" id="price" placeholder="例：198" min="0">
      </div>
      <div class="form-group">
        <label for="recordDate">日付</label>
        <input type="date" id="recordDate">
      </div>
      <div class="form-group">
        <label for="storeName">店舗名（任意）</label>
        <input type="text" id="storeName" placeholder="例：スーパーABC" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="addRecord()">記録する</button>
    </section>

    <!-- 絞り込み -->
    <section class="filter-section">
      <div class="form-group">
        <label for="searchProduct">商品で絞り込み</label>
        <input type="text" id="searchProduct" placeholder="商品名を入力..." oninput="renderAll()">
      </div>
    </section>

    <!-- 商品一覧 -->
    <section class="list-section">
      <div id="productList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
