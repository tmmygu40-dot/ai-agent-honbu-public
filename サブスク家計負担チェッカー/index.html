<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="契約中のサブスクを登録すると、月額合計と年間コストが一目瞭然。家計管理の第一歩に。毎月のサブスク費用をリアルタイム把握できる無料ツールです。">
  <title>💳 サブスク家計負担チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── サブスクリスト ── */
    .sub-list { margin-top: 0.5rem; }
    .sub-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .sub-item:last-child { border-bottom: none; }
    .sub-name { flex: 1; color: var(--text); font-weight: 600; }
    .sub-price { color: var(--accent); font-weight: 700; margin-right: 0.8rem; }
    .sub-del {
      background: none; border: none; color: var(--text-sub);
      cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.4rem;
      transition: color 0.15s;
    }
    .sub-del:hover { color: var(--ng); }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>💳 サブスク家計負担チェッカー</h1>
    <p class="subtitle">契約中のサブスクを登録すると、月額合計と年間コストが一目瞭然。家計管理の第一歩に。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">登録</p>
    <div class="field">
      <label for="name">サブスク名</label>
      <input type="text" id="name" placeholder="例: Netflix">
    </div>
    <div class="field">
      <label for="price">月額料金</label>
      <input type="number" id="price" placeholder="例: 1490" min="0">
    </div>
  </div>

  <!-- 登録ボタン -->
  <button class="btn-calc" onclick="addSub()">➕ 追加する</button>

  <!-- サブスクリスト -->
  <div class="card" id="listCard" style="display:none;">
    <p class="card-title">登録済みサブスク</p>
    <div class="sub-list" id="subList"></div>
  </div>

  <!-- 結論カード（JS で class="result-card ok/warn/ng" を切替・内容はJS一括書込） -->
  <div class="result-card"></div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">年間コスト</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、ご自身のサブスク契約状況を把握するための参考ツールです。実際の金額は各サービスのプラン・キャンペーンにより異なります。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（将来 AdSense コードに差し替え予定。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  const STORAGE_KEY = 'subscriptions_list';

  function loadSubs() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }

  function saveSubs(subs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(subs));
  }

  function addSub() {
    const name = document.getElementById('name').value.trim();
    const price = parseFloat(document.getElementById('price').value);

    if (!name || isNaN(price) || price < 0) {
      showErr('サービス名と金額を入力してください');
      return;
    }

    const subs = loadSubs();
    subs.push({ name: name, price: price });
    saveSubs(subs);

    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    renderList();
    updateSummary();
  }

  function deleteSub(index) {
    const subs = loadSubs();
    subs.splice(index, 1);
    saveSubs(subs);
    renderList();
    updateSummary();
  }

  function renderList() {
    const subs = loadSubs();
    const listCard = document.getElementById('listCard');
    const subList = document.getElementById('subList');

    if (subs.length === 0) {
      listCard.style.display = 'none';
      subList.innerHTML = '';
      return;
    }

    listCard.style.display = '';
    subList.innerHTML = subs.map((sub, idx) => {
      return `<div class="sub-item">
                <span class="sub-name">${escapeHtml(sub.name)}</span>
                <span class="sub-price">¥${fmt(sub.price)}</span>
                <button class="sub-del" onclick="deleteSub(${idx})">✕</button>
              </div>`;
    }).join('');
  }

  function updateSummary() {
    const subs = loadSubs();
    const resultCard = document.querySelector('.result-card');
    if (subs.length === 0) {
      resultCard.style.display = 'none';
      document.getElementById('detail').style.display = 'none';
      document.getElementById('qa-card').style.display = 'none';
      return;
    }

    const monthly = subs.reduce((sum, s) => sum + s.price, 0);
    const annual = monthly * 12;

    let level = 'ok';
    if (monthly >= 5000) level = 'ng';
    else if (monthly >= 3000) level = 'warn';

    resultCard.className = 'result-card ' + level;

    const eval_ = level === 'ok'   ? '✅ 負担レベル：低め'
               : level === 'warn' ? '⚠️ 負担レベル：やや高め'
               : '🚨 負担レベル：高め';
    const msg = level === 'ok'   ? '家計への負担は抑えられています'
              : level === 'warn' ? '少し見直すと家計が楽になります'
              : '家計に大きな負担がかかっています';

    resultCard.innerHTML =
      '<p class="result-label">月額合計</p>'
      + '<p class="result-value">¥' + fmt(monthly) + '</p>'
      + '<p class="result-eval">' + eval_ + '</p>'
      + '<p class="result-note">' + msg + '</p>';
    resultCard.style.display = 'block';

    const rows = subs.map(s => [escapeHtml(s.name), '¥' + fmt(s.price)]);
    rows.push(['合計', '¥' + fmt(monthly), true]);
    rows.push(['年間コスト', '¥' + fmt(annual), true]);

    document.getElementById('db').innerHTML = rows.map(r => {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    // Q&A カードを結果レベルに応じて表示
    const qaCard = document.getElementById('qa-card');
    const QA = {
      ok: {
        emoji: '😊',
        text: 'サブスク負担は良好です！',
        qa: [
          { q: 'このまま維持すべき？', a: '現状の負担は低めです。ただし定期的に使っていないサービスがないか確認しましょう。' },
          { q: '節約のコツは？', a: '無料トライアル期間が終わったサービスはすぐ解約する習慣をつけると効果的です。' }
        ]
      },
      warn: {
        emoji: '🤔',
        text: 'サブスク費用がやや増えています',
        qa: [
          { q: '何から見直すべき？', a: '月に1回も使っていないサービスから解約を検討してください。' },
          { q: 'まとめて払うと節約できる？', a: '年払いプランがあるサービスは月払いより10〜20%安くなることが多いです。' }
        ]
      },
      ng: {
        emoji: '😱',
        text: 'サブスク費用が家計を圧迫しています！',
        qa: [
          { q: '今すぐできる対策は？', a: '利用頻度の低いサービスを今月中に解約し、まず月額を3,000円以下に抑えることを目標にしましょう。' },
          { q: 'ファミリープランは有効？', a: '家族で同じサービスを別々に契約している場合、ファミリープランに統合すると大幅に節約できます。' }
        ]
      }
    };
    const q = QA[level];
    qaCard.className = 'card ' + level;
    document.getElementById('qe').textContent = q.emoji;
    document.getElementById('qt').textContent = q.text;
    document.getElementById('qa-list').innerHTML = q.qa.map(item =>
      '<div class="qa-item"><p class="qa-q">Q. ' + escapeHtml(item.q) + '</p>'
      + '<p class="qa-a">A. ' + escapeHtml(item.a) + '</p></div>'
    ).join('');
    qaCard.style.display = '';
  }

  function showErr(msg) {
    const resultCard = document.querySelector('.result-card');
    resultCard.className = 'result-card ng';
    resultCard.innerHTML =
      '<p class="result-label">入力エラー</p>'
      + '<p class="result-value">⚠️</p>'
      + '<p class="result-eval"></p>'
      + '<p class="result-note">' + escapeHtml(msg) + '</p>';
    resultCard.style.display = 'block';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }

  function escapeHtml(text) {
    const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  window.addEventListener('load', function() {
    renderList();
    updateSummary();
  });

  document.getElementById('price').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addSub();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
