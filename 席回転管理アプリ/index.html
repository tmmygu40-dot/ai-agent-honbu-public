<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>席回転管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>席回転管理</h1>
      <div class="settings-row">
        <label>⚠️ 警告（分）
          <input type="number" id="warnMinutes" value="30" min="1" max="999">
        </label>
        <label>🔴 超過（分）
          <input type="number" id="alertMinutes" value="60" min="1" max="999">
        </label>
      </div>
    </header>

    <div class="add-table-row">
      <input type="text" id="tableName" placeholder="テーブル名（例：1番・窓際）" maxlength="20">
      <button id="addBtn" onclick="addTable()">追加</button>
    </div>

    <div class="summary-row">
      <span id="summaryText">空席：0　着席中：0　警告：0　超過：0</span>
    </div>

    <div id="tableGrid" class="table-grid"></div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
