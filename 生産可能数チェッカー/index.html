<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生産可能数チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>生産可能数チェッカー</h1>
    <p class="subtitle">材料の在庫と使用量を登録して、あと何回製造できるか確認できます</p>

    <section class="form-section">
      <h2>材料を追加</h2>
      <div class="form-row">
        <input type="text" id="materialName" placeholder="材料名（例：小麦粉）" maxlength="50">
        <input type="number" id="stockQty" placeholder="在庫数量" min="0" step="any">
        <input type="number" id="batchQty" placeholder="1バッチ使用量" min="0.01" step="any">
        <input type="text" id="unit" placeholder="単位（例：g）" maxlength="10">
        <button id="addBtn" onclick="addMaterial()">追加</button>
      </div>
      <p id="errorMsg" class="error-msg"></p>
    </section>

    <section class="result-section">
      <div class="result-header">
        <h2>材料一覧</h2>
        <div class="summary" id="summary"></div>
      </div>
      <div id="tableWrapper">
        <table id="materialTable">
          <thead>
            <tr>
              <th>材料名</th>
              <th>在庫</th>
              <th>1バッチ使用量</th>
              <th>生産可能回数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="materialBody"></tbody>
        </table>
        <p id="emptyMsg" class="empty-msg">材料が登録されていません</p>
      </div>
    </section>

    <section class="batch-section" id="batchSection" style="display:none">
      <h2>まとめて確認</h2>
      <div class="batch-result" id="batchResult"></div>
    </section>
  </div>
  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
