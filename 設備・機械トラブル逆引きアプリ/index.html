<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備・機械トラブル逆引きアプリ</title>
  <meta name="description" content="設備や機械の症状を選ぶだけで、原因候補と応急対処法をすぐ表示。空調・電気設備・機械・配管・PC・車両など6カテゴリをカバーした現場向けトラブル逆引きアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── 原因リスト ── */
    .cause-block { margin-bottom: 1.2rem; }
    .cause-block:last-child { margin-bottom: 0; }
    .cause-title {
      font-size: 0.88rem; font-weight: 800; color: var(--text);
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .priority-badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .priority-high { background: var(--ng-bg); color: var(--ng); border: 1px solid #fca5a5; }
    .priority-mid  { background: var(--warn-bg); color: var(--warn); border: 1px solid #fcd34d; }
    .priority-low  { background: var(--ok-bg); color: var(--ok); border: 1px solid #bbf7d0; }

    .action-list { list-style: none; padding: 0; }
    .action-list li {
      display: flex; gap: 0.65rem; align-items: flex-start;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.6; color: var(--text-sub);
    }
    .action-list li:last-child { border-bottom: none; }
    .action-list li::before { content: "▶"; color: var(--accent); flex-shrink: 0; font-size: 0.72rem; margin-top: 0.3rem; }

    /* ── 警告カード ── */
    .warn-card {
      background: var(--warn-bg); border: 1.5px solid var(--warn);
      border-radius: var(--radius); padding: 1rem 1.2rem; margin: 0 auto 1rem; max-width: 600px;
      font-size: 0.88rem; line-height: 1.7; color: var(--warn);
    }
    .warn-card strong { display: block; font-size: 0.82rem; font-weight: 800; margin-bottom: 0.4rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .warn-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>設備・機械トラブル逆引きアプリ</h1>
    <p class="subtitle">症状を選ぶだけ。原因候補と応急対処法を即表示</p>
  </header>

  <div class="card">
    <p class="card-title">症状を選択</p>
    <div class="field">
      <label for="category">設備・機械カテゴリ</label>
      <select id="category" onchange="updateSymptoms()">
        <option value="hvac">空調・換気設備</option>
        <option value="elec">電気・電源設備</option>
        <option value="machine">生産機械・工作機械</option>
        <option value="pipe">配管・給排水設備</option>
        <option value="pc">PC・OA機器</option>
        <option value="vehicle">車両・フォークリフト</option>
      </select>
    </div>
    <div class="field">
      <label for="symptom">症状</label>
      <select id="symptom"></select>
    </div>
  </div>

  <button class="btn-calc" onclick="lookup()">原因・対処法を調べる</button>

  <div class="warn-card" id="warnCard" style="display:none">
    <strong>⚠️ 安全上の注意</strong>
    <span id="warnText"></span>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <p class="card-title" id="resultTitle">原因候補と応急対処法</p>
    <div id="resultList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔧 このアプリは一般的なトラブルシューティングの目安です。感電・火災・爆発の危険がある場合は作業を中止し、専門業者へご連絡ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var SYMPTOMS = {
    hvac: [
      '冷えない・暖まらない',
      '異音がする（ガタガタ・ピーピー）',
      '水漏れがある',
      '異臭がする',
      '電源が入らない',
      '風が弱い・出ない',
    ],
    elec: [
      'ブレーカーが落ちる',
      '漏電が疑われる',
      'コンセント・スイッチが使えない',
      '電圧が不安定',
      '照明がチラつく・消える',
      '機器が誤作動する',
    ],
    machine: [
      '異音・振動が大きい',
      '精度が出ない・寸法ずれ',
      '停止・電源が落ちる',
      '動作が遅い・途中で止まる',
      'オイル・液体漏れ',
      '発熱・焦げ臭い',
    ],
    pipe: [
      '水漏れ・滲み',
      '詰まり・流れが悪い',
      '異音（ハンマリング・水音）',
      '水圧が低い',
      '異臭・変色した水',
      '凍結している',
    ],
    pc: [
      '起動しない・フリーズ',
      '動作が遅い',
      '画面が映らない',
      'ネットワークに繋がらない',
      '異音・過熱している',
      'データが消えた・開けない',
    ],
    vehicle: [
      'エンジンがかからない',
      '異音（ゴトゴト・キーキー）',
      'ブレーキの効きが悪い',
      'オイル・液体が漏れている',
      '警告灯が点灯している',
      'バッテリーが上がった',
    ],
  };

  var DATA = {
    hvac: {
      '冷えない・暖まらない': {
        warn: null,
        causes: [
          { title: 'フィルター詰まり', priority: 'high', actions: ['フィルターを取り外して清掃・水洗いする', '乾燥させてから再装着する', '交換目安を過ぎている場合は新品に交換'] },
          { title: '設定温度・モードの確認', priority: 'mid', actions: ['設定温度が適切か確認（冷房20℃以下・暖房30℃以上になっていないか）', 'モード（冷房/暖房/送風）が正しく設定されているか確認'] },
          { title: '室外機の障害・汚れ', priority: 'mid', actions: ['室外機周囲1m以内に障害物がないか確認・除去', '室外機のフィンが汚れている場合は専用洗浄スプレーで清掃', '直射日光や熱気が室外機に当たっている場合は遮熱対策'] },
          { title: '冷媒ガス不足', priority: 'low', actions: ['ガス不足の場合は自己対処不可。専門業者に冷媒充填を依頼する'] },
        ],
      },
      '異音がする（ガタガタ・ピーピー）': {
        warn: null,
        causes: [
          { title: 'フィルター・カバーの緩み', priority: 'high', actions: ['フィルターやカバーが正しくセットされているか確認・締め直す', '異物（虫・埃の塊など）が内部に入り込んでいないか確認'] },
          { title: 'ファン・ベルトの異常', priority: 'mid', actions: ['ピーピー音はベルト摩耗の可能性が高い。専門業者に点検依頼', 'ガタガタ音はファン翼の変形・破損。目視確認後に専門業者へ'] },
          { title: 'ドレンパンへの水溜まり', priority: 'low', actions: ['ドレンパン（水受け皿）に水が溜まっていないか確認', '溜まっている場合はドレンホースの詰まりを確認・除去'] },
        ],
      },
      '水漏れがある': {
        warn: '電気製品の下への水漏れは感電・漏電の危険があります。電源を落としてから対処してください。',
        causes: [
          { title: 'ドレンホースの詰まり', priority: 'high', actions: ['室外のドレンホース先端を確認し、詰まりを除去する', '専用のポンプやブロワーで逆側から吸引して詰まりを解消'] },
          { title: 'フィルター詰まりによる結露過多', priority: 'mid', actions: ['フィルターを清掃して結露量を正常に戻す'] },
          { title: 'ドレンパンの割れ・ズレ', priority: 'low', actions: ['ドレンパンの位置ズレを確認・修正する', '割れている場合は専門業者に交換依頼'] },
        ],
      },
      '異臭がする': {
        warn: '焦げ臭い場合は直ちに電源を切り、使用を中止してください。',
        causes: [
          { title: '内部のカビ・汚れ', priority: 'high', actions: ['市販の空調クリーナーで内部を清掃する', 'カビ臭が強い場合は専門業者によるエアコンクリーニングを依頼'] },
          { title: '焦げ臭・電気系異常', priority: 'high', actions: ['直ちに電源を切り、コンセントを抜く', '再使用せず専門業者に点検依頼'] },
          { title: '外気・排水からの臭い', priority: 'low', actions: ['ドレンホースからの臭い逆流の場合はトラップ（水封）が切れている可能性', '定期的に水を流してトラップを維持する'] },
        ],
      },
      '電源が入らない': {
        warn: null,
        causes: [
          { title: 'ブレーカー・電源確認', priority: 'high', actions: ['専用ブレーカーが落ちていないか確認・投入', 'コンセントへの差込みを確認', 'タイマー設定がONになっていないか確認'] },
          { title: 'リモコン電池切れ', priority: 'high', actions: ['リモコンの電池を新品に交換して再試行'] },
          { title: '内部保護機能の作動', priority: 'mid', actions: ['本体リセット（コンセントを抜いて10秒後に再投入）を試みる', '改善しない場合は専門業者に点検依頼'] },
        ],
      },
      '風が弱い・出ない': {
        warn: null,
        causes: [
          { title: 'フィルター極度の目詰まり', priority: 'high', actions: ['フィルターを取り外し、清掃または交換する'] },
          { title: 'ファンモーター異常', priority: 'mid', actions: ['異音を伴う場合はファンモーターの故障の可能性。専門業者に点検依頼'] },
          { title: '設定・モードの確認', priority: 'low', actions: ['風量設定が「弱」になっていないか確認', '自動運転の場合は手動で風量を上げて確認'] },
        ],
      },
    },

    elec: {
      'ブレーカーが落ちる': {
        warn: '何度もブレーカーが落ちる場合は電気系統に異常があります。無理に投入せず電気工事士に相談してください。',
        causes: [
          { title: '過負荷（電気の使いすぎ）', priority: 'high', actions: ['同一回路の電気機器を減らして再投入する', '大電力機器（エアコン・電子レンジ等）を別回路に分散する'] },
          { title: '漏電', priority: 'high', actions: ['漏電ブレーカーが落ちている場合は漏電の可能性。配電盤の漏電ブレーカーを確認', '機器を一つずつ外しながら漏電箇所を特定する', '特定できない場合は電気工事士に依頼'] },
          { title: 'ブレーカー本体の劣化', priority: 'low', actions: ['20年以上経過したブレーカーは劣化による誤作動の可能性。電気工事士に点検依頼'] },
        ],
      },
      '漏電が疑われる': {
        warn: '感電・火災の危険があります。素手で触れず、直ちに主幹ブレーカーを落とし電気工事士に連絡してください。',
        causes: [
          { title: '配線・絶縁の劣化', priority: 'high', actions: ['主幹ブレーカーを落とす', '電気工事士に漏電調査を依頼する', '原因特定まで当該回路の使用を中止する'] },
          { title: '機器本体の絶縁不良', priority: 'high', actions: ['疑わしい機器のコンセントを抜く', '機器メーカーまたは修理業者に点検依頼'] },
        ],
      },
      'コンセント・スイッチが使えない': {
        warn: null,
        causes: [
          { title: '安全ブレーカーの落ち', priority: 'high', actions: ['配電盤の該当回路のブレーカーを確認・投入する'] },

          { title: '接触不良・差込み不足', priority: 'low', actions: ['コンセントへの差込みを一度抜き差しして確認', 'プラグの変形・腐食がないか目視確認'] },
        ],
      },
      '電圧が不安定': {
        warn: '精密機器や医療機器がある場合は直ちに電源を切ってください。',

        ],
      },
      '機器が誤作動する': {
        warn: null,
        causes: [
          { title: '電源ノイズ・瞬低', priority: 'high', actions: ['UPS（無停電電源装置）やノイズフィルターを導入する', '大電力機器と同一回路を使用していないか確認'] },

      '異音・振動が大きい': {

        ],
      },
      '停止・電源が落ちる': {

  function updateSymptoms() {
    var cat = document.getElementById('category').value;
    var symptoms = SYMPTOMS[cat];
    var sel = document.getElementById('symptom');
    sel.innerHTML = symptoms.map(function(s) {
      return '<option value="' + s + '">' + s + '</option>';
    }).join('');
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('warnCard').style.display = 'none';
  }

  function lookup() {
    var cat     = document.getElementById('category').value;
    var symptom = document.getElementById('symptom').value;
    var entry   = DATA[cat][symptom];
    if (!entry) return;

    // 警告
    if (entry.warn) {
      document.getElementById('warnText').textContent = entry.warn;
      document.getElementById('warnCard').style.display = 'block';
    } else {
      document.getElementById('warnCard').style.display = 'none';
    }

    // 結果
    var catName = document.getElementById('category').options[document.getElementById('category').selectedIndex].text;
    document.getElementById('resultTitle').textContent = '原因候補と応急対処法（' + catName + '：' + symptom + '）';

    var html = entry.causes.map(function(c) {
      var badge = c.priority === 'high' ? '<span class="priority-badge priority-high">可能性高</span>'
                : c.priority === 'mid'  ? '<span class="priority-badge priority-mid">可能性中</span>'
                                        : '<span class="priority-badge priority-low">可能性低</span>';
      var actions = c.actions.map(function(a) {
        return '<li>' + a + '</li>';
      }).join('');
      return '<div class="cause-block">'
        + '<div class="cause-title">' + badge + c.title + '</div>'
        + '<ul class="action-list">' + actions + '</ul>'
        + '</div>';
    }).join('');

    document.getElementById('resultList').innerHTML = html;
    var card = document.getElementById('resultCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function saveSettings() {
    try {
      localStorage.setItem('equip_trouble_cat', document.getElementById('category').value);
      localStorage.setItem('equip_trouble_sym', document.getElementById('symptom').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var c = localStorage.getItem('equip_trouble_cat');
      var s = localStorage.getItem('equip_trouble_sym');
      if (c) {
        document.getElementById('category').value = c;
        updateSymptoms();
      }
      if (s) document.getElementById('symptom').value = s;
    } catch(e) {}
  }

  updateSymptoms();
  loadSettings();
  </script>
