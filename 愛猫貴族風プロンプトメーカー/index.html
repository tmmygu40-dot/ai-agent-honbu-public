<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="愛猫の毛色・性格・背景・小道具を選ぶだけで、中世ヨーロッパ貴族風のAI画像生成プロンプトを即生成。SNSアイコンや遊び画像作りにサクッと使えます。">
  <title>愛猫貴族風プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #8a4a9c;
      --accent-light: #f7eefc;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; line-height: 1.5; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #5e2c70, 0 6px 16px rgba(138,74,156,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5e2c70, 0 2px 8px rgba(138,74,156,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 結果カード（プロンプト出力） */
    .prompt-card {
      display: none;
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .prompt-label {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.7rem;
    }
    .prompt-text {
      width: 100%;
      min-height: 140px;
      padding: 0.8rem;
      font-size: 0.92rem;
      line-height: 1.55;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      resize: vertical;
      font-family: inherit;
    }
    .prompt-actions {
      display: flex; gap: 0.6rem; margin-top: 0.8rem; flex-wrap: wrap;
    }
    .btn-sub {
      flex: 1; min-width: 130px;
      padding: 0.7rem 0.8rem;
      font-size: 0.9rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sub:hover { background: var(--accent-light); }
    .btn-sub.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* 履歴 */
    .history-list { list-style: none; padding: 0; margin: 0; }
    .history-item {
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text);
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-meta { color: var(--text-sub); font-size: 0.76rem; flex-shrink: 0; }
    .history-text {
      flex: 1; cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .history-text:hover { color: var(--accent); }
    .history-empty { color: var(--text-sub); font-size: 0.85rem; text-align: center; padding: 0.7rem 0; }
    .btn-clear {
      display: block; margin: 0.8rem 0 0; padding: 0.5rem 1rem;
      font-size: 0.78rem; color: var(--text-sub);
      background: none; border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer;
    }
    .btn-clear:hover { color: var(--ng); border-color: var(--ng); }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0; padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.76rem; color: var(--text-sub); line-height: 1.6; text-align: left;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .prompt-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>👑 愛猫貴族風プロンプトメーカー</h1>
    <p class="subtitle">愛猫の毛色や性格を選ぶだけで、中世ヨーロッパ貴族風AI画像プロンプトをサクッと作れます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">愛猫の特徴</p>
    <div class="field">
      <label for="fur">毛色</label>
      <select id="fur">
        <option value="black">黒猫</option>
        <option value="white">白猫</option>
        <option value="tabby">キジトラ</option>
        <option value="calico">三毛</option>
        <option value="tortoiseshell">サビ</option>
        <option value="orange">茶トラ</option>
        <option value="gray">グレー</option>
        <option value="siamese">シャム</option>
      </select>
    </div>
    <div class="field">
      <label for="personality">性格・雰囲気</label>
      <select id="personality">
        <option value="dignified">威厳ある</option>
        <option value="elegant">優雅な</option>
        <option value="mischievous">ヤンチャな</option>
        <option value="fluffy">もふもふな</option>
        <option value="tsundere">ツンデレな</option>
        <option value="cuddly">甘えん坊な</option>
        <option value="serious">真面目な</option>
        <option value="sleepy">眠そうな</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">背景</label>
      <select id="scene">
        <option value="palace">宮廷の謁見の間</option>
        <option value="library">古城の図書館</option>
        <option value="garden">薔薇咲く宮廷庭園</option>
        <option value="fireplace">暖炉の前</option>
        <option value="treasury">宝物庫</option>
        <option value="throne">玉座の間</option>
        <option value="banquet">大広間の晩餐会</option>
        <option value="balcony">月夜のバルコニー</option>
      </select>
    </div>
    <div class="field">
      <label for="prop">小道具</label>
      <select id="prop">
        <option value="crown">王冠</option>
        <option value="cape">毛皮の襟付きマント</option>
        <option value="scroll">羽ペンと羊皮紙</option>
        <option value="goblet">黄金のゴブレット</option>
        <option value="jewel">大粒の宝石ペンダント</option>
        <option value="sword">儀礼用の小さな剣</option>
        <option value="book">古い革装丁の本</option>
        <option value="ribbon">レースのリボン</option>
      </select>
    </div>
    <div class="field">
      <label for="lang">出力言語</label>
      <select id="lang">
        <option value="en">英語（AI画像生成向け）</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- プロンプト出力 -->
  <div class="prompt-card" id="result">
    <p class="prompt-label">生成プロンプト</p>
    <textarea class="prompt-text" id="promptText" readonly></textarea>
    <div class="prompt-actions">
      <button class="btn-sub" id="copyBtn" onclick="copyPrompt()">📋 コピー</button>
      <button class="btn-sub" onclick="generate()">🎲 もう一度生成</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="card" id="historyCard">
    <p class="card-title">履歴（直近10件）</p>
    <ul class="history-list" id="historyList"></ul>
    <button class="btn-clear" id="clearBtn" onclick="clearHistory()" style="display:none">履歴を全削除</button>
  </div>

  <p class="source-note">
    📚 このツールは、一般的なAI画像生成プロンプトの事例や、中世ヨーロッパ貴族文化に関する公開資料を参考に、入力するだけでサクッと使える形に整理しています。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var DICT = {
    fur: {
      black:        { en: 'a sleek black cat',           ja: '艶やかな黒猫' },
      white:        { en: 'a snow-white cat',            ja: '雪のように白い猫' },
      tabby:        { en: 'a brown tabby cat',           ja: 'キジトラ柄の猫' },
      calico:       { en: 'a calico cat',                ja: '三毛猫' },
      tortoiseshell:{ en: 'a tortoiseshell cat',         ja: 'サビ柄の猫' },
      orange:       { en: 'an orange tabby cat',         ja: '茶トラ猫' },
      gray:         { en: 'a silver-gray cat',           ja: 'シルバーグレーの猫' },
      siamese:      { en: 'a Siamese cat',               ja: 'シャム猫' }
    },
    personality: {
      dignified:    { en: 'with a dignified, regal expression',     ja: '威厳ある気品の漂う表情で' },
      elegant:      { en: 'with an elegant, graceful posture',       ja: '優雅で気品ある佇まいで' },
      mischievous:  { en: 'with a mischievous, playful glint in its eyes', ja: 'いたずらっぽい目をして' },
      fluffy:       { en: 'extremely fluffy and proud-looking',      ja: 'もふもふで誇らしげに' },
      tsundere:     { en: 'looking aloof yet secretly affectionate', ja: 'ツンとしつつもどこか優しく' },
      cuddly:       { en: 'looking sweet and affectionate',          ja: '甘えるような表情で' },
      serious:      { en: 'with a serious, contemplative gaze',      ja: '真剣で思慮深い眼差しで' },
      sleepy:       { en: 'with sleepy, half-closed eyes',           ja: '眠たげに目を細めて' }
    },
    scene: {
      palace:    { en: 'in a grand royal audience chamber with marble pillars',         ja: '大理石の柱が立ち並ぶ宮廷の謁見の間で' },
      library:   { en: 'in an old castle library filled with leather-bound books',       ja: '革装丁の本が並ぶ古城の図書館で' },
      garden:    { en: 'in a royal rose garden in full bloom',                            ja: '薔薇が咲き誇る宮廷庭園で' },
      fireplace: { en: 'sitting before a roaring stone fireplace',                        ja: '燃え盛る石造りの暖炉の前で' },
      treasury:  { en: 'inside a royal treasury filled with gold and jewels',             ja: '黄金と宝石に囲まれた宝物庫で' },
      throne:    { en: 'on a velvet cushion atop a golden throne',                        ja: '黄金の玉座のビロードのクッションの上で' },
      banquet:   { en: 'at the head of a grand banquet hall',                             ja: '晩餐会の大広間の上座で' },
      balcony:   { en: 'on a moonlit castle balcony overlooking the kingdom',             ja: '月光の差すバルコニーから王国を見下ろし' }
    },
    prop: {
      crown:  { en: 'wearing a small jeweled crown',                       ja: '宝石の輝く王冠を被り' },
      cape:   { en: 'wearing a fur-trimmed velvet cape',                    ja: '毛皮の襟がついたビロードのマントを纏い' },
      scroll: { en: 'beside a quill pen and parchment scroll',              ja: '羽ペンと羊皮紙の巻物を傍らに' },
      goblet: { en: 'next to a golden goblet of wine',                      ja: '黄金のゴブレットを脇に置き' },
      jewel:  { en: 'wearing a large jeweled pendant',                      ja: '大粒の宝石ペンダントを胸に' },
      sword:  { en: 'with a small ceremonial sword at its side',            ja: '儀礼用の小さな剣を傍らに' },
      book:   { en: 'with an old leather-bound book open before it',        ja: '革装丁の古書を前に開いて' },
      ribbon: { en: 'with a delicate lace ribbon around its neck',          ja: '繊細なレースのリボンを首に巻いて' }
    }
  };

  var BASE = {
    en: 'A noble portrait of {fur}, {personality}, {scene}, {prop}. Renaissance oil painting style, baroque lighting, ornate gold frame, regal medieval European aristocrat aesthetic, highly detailed fur texture, dramatic chiaroscuro, museum-quality masterpiece.',
    ja: '{fur}の肖像画。{personality}、{scene}、{prop}。ルネサンス期の油絵風、バロック調の重厚な光、金の装飾額縁、中世ヨーロッパ貴族の気品、毛並みの繊細な描写、ドラマチックな明暗、美術館級の傑作。'
  };

  function generate() {
    var fur = document.getElementById('fur').value;
    var personality = document.getElementById('personality').value;
    var scene = document.getElementById('scene').value;
    var prop = document.getElementById('prop').value;
    var lang = document.getElementById('lang').value;

    var tpl = BASE[lang];
    var out = tpl
      .replace('{fur}',         DICT.fur[fur][lang])
      .replace('{personality}', DICT.personality[personality][lang])
      .replace('{scene}',       DICT.scene[scene][lang])
      .replace('{prop}',        DICT.prop[prop][lang]);

    var card = document.getElementById('result');
    card.style.display = 'block';
    document.getElementById('promptText').value = out;

    var btn = document.getElementById('copyBtn');
    btn.classList.remove('copied');
    btn.textContent = '📋 コピー';

    saveHistory(out, lang);
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyPrompt() {
    var ta = document.getElementById('promptText');
    ta.select();
    ta.setSelectionRange(0, 99999);
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    if (ok) {
      var btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓ コピーしました';
    }
    if (window.getSelection) window.getSelection().removeAllRanges();
  }

  // 履歴（localStorage）
  var STORAGE_KEY = 'cat_aristocrat_prompt_history_v1';
  var MAX_HISTORY = 10;

  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  function saveHistory(text, lang) {
    var hist = loadHistory();
    hist.unshift({ t: text, l: lang, d: new Date().toISOString() });
    if (hist.length > MAX_HISTORY) hist = hist.slice(0, MAX_HISTORY);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); } catch (e) {}
    renderHistory();
  }

  function renderHistory() {
    var hist = loadHistory();
    var ul = document.getElementById('historyList');
    var clearBtn = document.getElementById('clearBtn');
    if (!hist.length) {
      ul.innerHTML = '<li class="history-empty">まだ履歴はありません</li>';
      clearBtn.style.display = 'none';
      return;
    }
    clearBtn.style.display = 'inline-block';
    ul.innerHTML = hist.map(function(h, i) {
      var d = new Date(h.d);
      var stamp = (d.getMonth()+1) + '/' + d.getDate() + ' ' +
                  String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      var preview = (h.t || '').slice(0, 60);
      return '<li class="history-item">' +
               '<span class="history-text" data-i="' + i + '" title="クリックで再表示">' + escapeHtml(preview) + '…</span>' +
               '<span class="history-meta">' + stamp + '</span>' +
             '</li>';
    }).join('');
    var spans = ul.querySelectorAll('.history-text');
    for (var i = 0; i < spans.length; i++) {
      spans[i].addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-i'), 10);
        var item = loadHistory()[idx];
        if (!item) return;
        var card = document.getElementById('result');
        card.style.display = 'block';
        document.getElementById('promptText').value = item.t;
        var btn = document.getElementById('copyBtn');
        btn.classList.remove('copied');
        btn.textContent = '📋 コピー';
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderHistory();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.addEventListener('DOMContentLoaded', renderHistory);
  </script>
