<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転換率管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>転換率管理アプリ</h1>
      <p class="subtitle">来客数・購入人数・客単価を日次入力</p>
    </header>

    <section class="input-section">
      <h2>データ入力</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="visitors">来客数（人）</label>
          <input type="number" id="visitors" placeholder="例：100" min="0">
        </div>
        <div class="form-group">
          <label for="buyers">購入人数（人）</label>
          <input type="number" id="buyers" placeholder="例：30" min="0">
        </div>
        <div class="form-group">
          <label for="unitPrice">客単価（円）</label>
          <input type="number" id="unitPrice" placeholder="例：1500" min="0">
        </div>
      </div>
      <div class="preview" id="preview" style="display:none;">
        <span>転換率：<strong id="previewRate">-</strong></span>
        <span>売上：<strong id="previewSales">-</strong></span>
      </div>
      <button class="btn-add" id="addBtn">追加</button>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <h2>サマリー</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">平均転換率</div>
          <div class="summary-value" id="avgRate">-</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">累計売上</div>
          <div class="summary-value" id="totalSales">-</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">記録日数</div>
          <div class="summary-value" id="recordCount">-</div>
        </div>
      </div>
    </section>

    <section class="chart-section" id="chartSection" style="display:none;">
      <h2>転換率の推移</h2>
      <div class="chart-wrapper">
        <canvas id="rateChart"></canvas>
      </div>
    </section>

    <section class="list-section">
      <h2>データ一覧</h2>
      <div id="emptyMsg" class="empty-msg">まだデータがありません</div>
      <div class="table-wrapper">
        <table id="dataTable" style="display:none;">
          <thead>
            <tr>
              <th>日付</th>
              <th>来客数</th>
              <th>購入人数</th>
              <th>客単価</th>
              <th>転換率</th>
              <th>売上</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
