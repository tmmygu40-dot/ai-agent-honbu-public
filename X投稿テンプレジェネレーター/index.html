  <title>X投稿テンプレジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── タグ選択 ── */
    .tag-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag-btn {
      padding: 0.5rem 1rem; font-size: 0.88rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tag-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }

    /* ── テンプレ1件 ── */
    .tmpl-item {
      padding: 1rem; margin-bottom: 0.8rem;
      background: var(--accent-light); border: 1px solid var(--border);
      border-radius: 10px; position: relative;
    }
    .tmpl-item:last-child { margin-bottom: 0; }
    .tmpl-text {
      font-size: 0.95rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .tmpl-actions {
      display: flex; gap: 0.5rem; margin-top: 0.7rem; justify-content: flex-end;
    }
    .btn-copy, .btn-fav {
      padding: 0.35rem 0.8rem; font-size: 0.78rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-fav:hover { border-color: #e74c3c; color: #e74c3c; }
    .btn-fav.saved { background: #fef2f2; border-color: #e74c3c; color: #e74c3c; }
    .copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    /* ── お気に入り一覧 ── */
    .fav-section { margin-top: 0.5rem; }
    .fav-item {
      padding: 0.8rem; margin-bottom: 0.6rem;
      background: #fff8f0; border: 1px solid var(--border);
      border-radius: 10px; position: relative;
    }
    .fav-item .tmpl-text { font-size: 0.88rem; }
    .btn-del {
      padding: 0.3rem 0.6rem; font-size: 0.72rem; font-weight: 700;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
    }
    .btn-del:hover { border-color: var(--ng); color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

  /* ══════════════════════════════════════
     アプリケーション
  ══════════════════════════════════════ */
  var selectedGenre = null;
  var selectedEmotion = null;
  var favorites = JSON.parse(localStorage.getItem('xtempl_favs') || '[]');

  // タグ描画
  function renderTags() {
    var gBox = document.getElementById('genre-tags');
    var eBox = document.getElementById('emotion-tags');
    gBox.innerHTML = GENRES.map(function(g){
      return '<button class="tag-btn" data-genre="'+g+'" onclick="pickGenre(this)">'+g+'</button>';
    }).join('');
    eBox.innerHTML = EMOTIONS.map(function(e){
      return '<button class="tag-btn" data-emotion="'+e+'" onclick="pickEmotion(this)">'+e+'</button>';
    }).join('');
  }

  function pickGenre(el) {
    document.querySelectorAll('#genre-tags .tag-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    selectedGenre = el.getAttribute('data-genre');
  }
  function pickEmotion(el) {
    document.querySelectorAll('#emotion-tags .tag-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    selectedEmotion = el.getAttribute('data-emotion');
  }

  // 生成
  function generate() {
    if (!selectedGenre || !selectedEmotion) {
      alert('ジャンルと感情タグを1つずつ選んでください');
      return;
    }
    var key = selectedGenre + '_' + selectedEmotion;
    var pool = TEMPLATES[key] || [];
    if (pool.length === 0) {
      alert('この組み合わせのテンプレートはまだありません');
      return;
    }

    // シャッフルして全件表示
    var shuffled = pool.slice().sort(function(){ return Math.random() - 0.5; });
    var html = shuffled.map(function(t, i){
      var text = t.replace(/\{topic\}/g, '○○');
      var isFav = favorites.indexOf(text) !== -1;
      return '<div class="tmpl-item">'
        + '<p class="tmpl-text">' + escHtml(text) + '</p>'
        + '<div class="tmpl-actions">'
        + '<button class="btn-copy" onclick="copyText(this)">📋 コピー</button>'
        + '<button class="btn-fav' + (isFav ? ' saved' : '') + '" onclick="toggleFav(this)">' + (isFav ? '⭐ 保存済み' : '☆ お気に入り') + '</button>'
        + '</div></div>';
    }).join('');

    var rc = document.getElementById('result');
    document.getElementById('result-list').innerHTML = html;
    rc.classList.add('show');
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // コピー
  function copyText(btn) {
    var text = btn.closest('.tmpl-item').querySelector('.tmpl-text').textContent;
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent = '✅ コピー済み';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 1500);
    });
  }

  // お気に入り
  function toggleFav(btn) {
    var text = btn.closest('.tmpl-item').querySelector('.tmpl-text').textContent;
    var idx = favorites.indexOf(text);
    if (idx === -1) {
      favorites.push(text);
      btn.classList.add('saved');
      btn.textContent = '⭐ 保存済み';
    } else {
      favorites.splice(idx, 1);
      btn.classList.remove('saved');
      btn.textContent = '☆ お気に入り';
    }
    localStorage.setItem('xtempl_favs', JSON.stringify(favorites));
    renderFavs();
  }

  function removeFav(idx) {
    favorites.splice(idx, 1);
    localStorage.setItem('xtempl_favs', JSON.stringify(favorites));
    renderFavs();
    // 結果表示のお気に入りボタンも更新
    document.querySelectorAll('.tmpl-item').forEach(function(item){
      var text = item.querySelector('.tmpl-text').textContent;
      var favBtn = item.querySelector('.btn-fav');
      if (favBtn) {
        if (favorites.indexOf(text) === -1) {
          favBtn.classList.remove('saved');
          favBtn.textContent = '☆ お気に入り';
        }
      }
    });
  }

  function renderFavs() {
    var card = document.getElementById('fav-card');
    var list = document.getElementById('fav-list');
    if (favorites.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    list.innerHTML = favorites.map(function(t, i){
      return '<div class="fav-item">'
        + '<p class="tmpl-text">' + escHtml(t) + '</p>'
        + '<div class="tmpl-actions">'
        + '<button class="btn-copy" onclick="copyText(this)">📋 コピー</button>'
        + '<button class="btn-del" onclick="removeFav('+i+')">🗑 削除</button>'
        + '</div></div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // 初期化
  renderTags();
  renderFavs();
