<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中小企業補助金逆引きアプリ</title>
  <meta name="description" content="業種・従業員規模・悩みを選ぶだけで、使える補助金・助成金の候補をすぐ表示。ものづくり補助金・IT導入補助金・持続化補助金など主要制度を逆引き検索できる中小企業向けアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── 補助金カード ── */
    .subsidy-item {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 0.85rem; background: #fff;
    }
    .subsidy-item:last-child { margin-bottom: 0; }
    .subsidy-name { font-size: 1rem; font-weight: 800; color: var(--accent); margin-bottom: 0.35rem; }
    .subsidy-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.6rem; }
    .tag {
      font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.55rem;
      border-radius: 20px; background: var(--accent-light); color: var(--accent);
      border: 1px solid #ffd199;
    }
    .tag.size { background: #f0f9ff; color: #0369a1; border-color: #bae6fd; }
    .tag.industry { background: #f0fdf4; color: var(--ok); border-color: #bbf7d0; }
    .subsidy-desc { font-size: 0.88rem; line-height: 1.65; color: var(--text-sub); margin-bottom: 0.5rem; }
    .subsidy-limit { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .subsidy-limit span { color: var(--accent); }

    .no-result {
      text-align: center; padding: 2rem 1rem;
      font-size: 0.92rem; color: var(--text-sub);
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .subsidy-item { border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>中小企業 補助金逆引きアプリ</h1>
    <p class="subtitle">業種・規模・悩みを選ぶだけ。使える補助金・助成金候補を即表示（2025年度目安）</p>
  </header>

  <div class="card">
    <p class="card-title">選択</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="all">すべての業種</option>
        <option value="mfg">製造業</option>
        <option value="retail">小売業・卸売業</option>
        <option value="food">飲食業・宿泊業</option>
        <option value="const">建設業</option>
        <option value="it">IT・情報通信業</option>
        <option value="med">医療・介護・福祉</option>
        <option value="agri">農業・林業・水産業</option>
        <option value="svc">その他サービス業</option>
      </select>
    </div>
    <div class="field">
      <label for="size">従業員規模</label>
      <select id="size">
        <option value="all">すべての規模</option>
        <option value="micro">〜5人（小規模事業者）</option>
        <option value="small">6〜20人</option>
        <option value="mid">21〜100人</option>
        <option value="large">101人〜（中小企業）</option>
      </select>
    </div>
    <div class="field">
      <label for="issue">悩み・やりたいこと</label>
      <select id="issue">
        <option value="all">すべての課題</option>
        <option value="equip">設備投資・機械導入</option>
        <option value="it">IT化・デジタル化</option>
        <option value="hr">人材採用・育成・処遇改善</option>
        <option value="energy">省エネ・脱炭素・環境対応</option>
        <option value="sales">販路拡大・新規開拓・広告</option>
        <option value="inherit">事業承継・後継者育成</option>
        <option value="startup">起業・創業・新規事業</option>
        <option value="reorg">事業再構築・業態転換</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="lookup()">補助金を逆引きする</button>

  <div class="card" id="resultCard" style="display:none">
    <p class="card-title">候補の補助金・助成金</p>
    <div id="resultList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 中小企業庁・経済産業省・厚生労働省等の公開情報を参考に整理した2025年度の目安です。補助金は年度・予算・要件が変わるため、申請前に必ず公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var SUBSIDIES = [
    {
      name: 'ものづくり・商業・サービス補助金（ものづくり補助金）',
      issues:     ['equip', 'it', 'reorg'],
      sizes:      ['small', 'mid', 'large'],
      industries: ['all'],
      tags:       ['設備投資', 'IT化', '事業再構築'],
      limit:      '最大1,250万円（通常枠）',
      desc:       '中小企業・小規模事業者が革新的な製品・サービス開発や生産プロセス改善に取り組む設備投資等を支援。補助率1/2〜2/3。',
    },
    {
      name: 'IT導入補助金',
      issues:     ['it'],
      sizes:      ['all'],
      industries: ['all'],
      tags:       ['IT化', 'デジタル化'],
      limit:      '最大450万円（デジタル化基盤導入枠）',
      desc:       '中小企業・小規模事業者のITツール（会計・販売管理・受発注等）導入費用を補助。補助率1/2〜3/4。',
    },
    {
      name: '小規模事業者持続化補助金',
      issues:     ['sales', 'it', 'equip'],
      sizes:      ['micro', 'small'],
      industries: ['all'],
      tags:       ['販路拡大', '小規模向け'],
      limit:      '最大200万円（特別枠）',
      desc:       '小規模事業者が行う販路開拓・マーケティング・設備投資等を支援。補助率2/3。商工会・商工会議所のサポートあり。',
    },
    {
      name: '事業再構築補助金',
      issues:     ['reorg', 'startup', 'sales'],
      sizes:      ['small', 'mid', 'large'],
      industries: ['all'],
      tags:       ['業態転換', '新規事業'],
      limit:      '最大7,000万円（成長枠）',
      desc:       '新市場進出・事業転換・業種転換など、思い切った事業再構築に取り組む中小企業を支援。補助率1/2〜2/3。',
    },
    {
      name: 'キャリアアップ助成金',
      issues:     ['hr'],
      sizes:      ['all'],
      industries: ['all'],
      tags:       ['人材', '正規雇用化'],
      limit:      '最大80万円/人（正規雇用化コース）',
      desc:       'パート・派遣等の非正規労働者を正規雇用・処遇改善した際に支給。厚生労働省の雇用系助成金。',
    },
    {
      name: '人材開発支援助成金',
      issues:     ['hr'],
      sizes:      ['all'],
      industries: ['all'],
      tags:       ['人材育成', '研修'],
      limit:      '訓練費用の最大75%',
      desc:       '従業員へのOFF-JT研修や資格取得支援の費用・賃金を助成。デジタル人材育成コースも設置。',
    },
    {
      name: '省エネルギー投資促進・需要構造転換支援事業費補助金',
      issues:     ['energy', 'equip'],
      sizes:      ['all'],
      industries: ['mfg', 'food', 'const', 'svc', 'retail', 'med', 'agri'],
      tags:       ['省エネ', '設備更新'],
      limit:      '補助率1/3〜1/2',
      desc:       '省エネ設備への更新・導入を支援。経済産業省・環境省が連携して実施。エネルギー使用量削減が要件。',
    },
    {
      name: '事業承継・引継ぎ補助金',
      issues:     ['inherit'],
      sizes:      ['all'],
      industries: ['all'],
      tags:       ['事業承継', '後継者'],
      limit:      '最大600万円（専門家活用型）',
      desc:       '事業承継・引継ぎに伴う設備投資・専門家活用・広報費用等を補助。補助率2/3。',
    },
    {
      name: '創業・スタートアップ支援（地域創業助成金等）',
      issues:     ['startup'],
      sizes:      ['micro', 'small'],
      industries: ['all'],
      tags:       ['創業', '起業'],
      limit:      '最大200万円（自治体による）',
      desc:       '創業時の設備・広告・専門家費用を支援。内容は自治体によって異なる。中小企業基盤整備機構も窓口。',
    },
    {
      name: '業務改善助成金',
      issues:     ['hr', 'equip'],
      sizes:      ['micro', 'small'],
      industries: ['all'],
      tags:       ['最低賃金引上げ', '設備投資'],
      limit:      '最大600万円',
      desc:       '最低賃金の引上げと合わせて生産性向上のための設備・IT導入を行った際に補助。厚生労働省。',
    },
    {
      name: 'J-クレジット制度（省エネ・再エネ）',
      issues:     ['energy'],
      sizes:      ['all'],
      industries: ['all'],
      tags:       ['脱炭素', 'カーボンクレジット'],
      limit:      '省エネ量に応じたクレジット収益',
      desc:       '省エネや再生可能エネルギー導入によって生まれたCO2削減量をクレジット化して売却できる制度。',
    },
    {
      name: '農業次世代人材投資資金（旧青年就農給付金）',
      issues:     ['startup', 'hr'],
      sizes:      ['micro'],
      industries: ['agri'],
      tags:       ['農業', '就農支援'],
      limit:      '年間最大150万円（5年間）',
      desc:       '新規就農者への生活安定のための資金給付と経営開始時の経営費用を支援。農林水産省。',
    },
    {
      name: '医療・介護施設向け設備整備補助（各都道府県）',
      issues:     ['equip', 'hr'],
      sizes:      ['all'],
      industries: ['med'],
      tags:       ['医療', '介護', '設備'],
      limit:      '自治体により異なる',
      desc:       '医療機器・介護設備の更新・新設に対する補助。内容は都道府県・市区町村によって異なる。',
    },
  ];

  function matches(sub, industry, size, issue) {
    var indOk  = sub.industries.indexOf('all') >= 0 || sub.industries.indexOf(industry) >= 0 || industry === 'all';
    var sizeOk = sub.sizes.indexOf('all') >= 0 || sub.sizes.indexOf(size) >= 0 || size === 'all';
    var issOk  = sub.issues.indexOf('all') >= 0 || sub.issues.indexOf(issue) >= 0 || issue === 'all';
    return indOk && sizeOk && issOk;
  }

  function lookup() {
    var industry = document.getElementById('industry').value;
    var size     = document.getElementById('size').value;
    var issue    = document.getElementById('issue').value;

    var results = SUBSIDIES.filter(function(s) { return matches(s, industry, size, issue); });

    var html = '';
    if (results.length === 0) {
      html = '<div class="no-result">条件に合う候補が見つかりませんでした。<br>条件を広げて再検索してみてください。</div>';
    } else {
      html = results.map(function(s) {
        var tagHtml = s.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
        return '<div class="subsidy-item">'
          + '<div class="subsidy-name">' + s.name + '</div>'
          + '<div class="subsidy-tags">' + tagHtml + '</div>'
          + '<div class="subsidy-desc">' + s.desc + '</div>'
          + '<div class="subsidy-limit">補助上限目安：<span>' + s.limit + '</span></div>'
          + '</div>';
      }).join('');
    }

    document.getElementById('resultList').innerHTML = html;
    var card = document.getElementById('resultCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function saveSettings() {
    try {
      localStorage.setItem('subsidy_rev_industry', document.getElementById('industry').value);
      localStorage.setItem('subsidy_rev_size',     document.getElementById('size').value);
      localStorage.setItem('subsidy_rev_issue',    document.getElementById('issue').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var i = localStorage.getItem('subsidy_rev_industry');
      var s = localStorage.getItem('subsidy_rev_size');
      var iss = localStorage.getItem('subsidy_rev_issue');
      if (i) document.getElementById('industry').value = i;
      if (s) document.getElementById('size').value = s;
      if (iss) document.getElementById('issue').value = iss;
    } catch(e) {}
  }
  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
