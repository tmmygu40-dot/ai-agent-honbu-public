<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<!-- 顧客一覧画面 -->
<div id="list-view" class="view active">
  <header>
    <h1>顧客メモ</h1>
    <button id="add-customer-btn" class="btn-primary">＋ 顧客追加</button>
  </header>

  <div id="customer-list" class="customer-list"></div>
  <p id="empty-msg" class="empty-msg">顧客が登録されていません</p>
</div>

<!-- 顧客追加モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modal-title">顧客追加</h2>
    <label>名前 <span class="required">*</span>
      <input type="text" id="input-name" placeholder="山田 太郎">
    </label>
    <label>会社名
      <input type="text" id="input-company" placeholder="株式会社〇〇">
    </label>
    <label>連絡先
      <input type="text" id="input-contact" placeholder="090-0000-0000">
    </label>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-secondary">キャンセル</button>
      <button id="modal-save" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- 顧客詳細画面 -->
<div id="detail-view" class="view hidden">
  <header>
    <button id="back-btn" class="btn-back">← 一覧</button>
    <div class="header-right">
      <button id="edit-customer-btn" class="btn-secondary btn-sm">編集</button>
      <button id="delete-customer-btn" class="btn-danger btn-sm">削除</button>
    </div>
  </header>

  <div class="customer-info">
    <h2 id="detail-name"></h2>
    <p id="detail-company" class="sub-info"></p>
    <p id="detail-contact" class="sub-info"></p>
  </div>

  <!-- 次回アクション -->
  <section class="section">
    <h3>次回アクション</h3>
    <div id="next-action-display" class="next-action-display"></div>
    <div class="action-input-row">
      <input type="text" id="next-action-input" placeholder="例：来週電話フォロー">
      <input type="date" id="next-action-date">
      <button id="save-action-btn" class="btn-primary btn-sm">セット</button>
    </div>
  </section>

  <!-- 対応履歴 -->
  <section class="section">
    <h3>対応履歴</h3>
    <div class="history-input-row">
      <input type="date" id="history-date">
      <input type="text" id="history-content" placeholder="対応内容を入力">
      <button id="add-history-btn" class="btn-primary btn-sm">追加</button>
    </div>
    <ul id="history-list" class="history-list"></ul>
    <p id="history-empty" class="empty-msg">履歴はありません</p>
  </section>
</div>

<script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
