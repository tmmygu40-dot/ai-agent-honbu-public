<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発注点管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>発注点管理アプリ</h1>
    <p class="subtitle">在庫数・消費量・リードタイムから発注タイミングを自動判断</p>

    <section class="form-section">
      <h2>商品を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">商品名</label>
          <input type="text" id="name" placeholder="例：コピー用紙">
        </div>
        <div class="form-group">
          <label for="stock">現在の在庫数</label>
          <input type="number" id="stock" placeholder="例：50" min="0">
        </div>
        <div class="form-group">
          <label for="dailyUse">1日の消費量</label>
          <input type="number" id="dailyUse" placeholder="例：5" min="0" step="0.1">
        </div>
        <div class="form-group">
          <label for="leadTime">リードタイム（日数）</label>
          <input type="number" id="leadTime" placeholder="例：3" min="0">
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">登録する</button>
    </section>

    <section class="list-section">
      <h2>登録商品一覧</h2>
      <div id="summary" class="summary hidden">
        <span id="alertCount" class="alert-badge"></span>
      </div>
      <div id="itemList" class="item-list">
        <p class="empty-msg">まだ商品が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
