<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="プロフィール素材を入力するだけで、SNS用の自己紹介文を堅い・親しみやすい・ユーモア系の3パターン同時生成。場面に合わせた印象別の文を使い分けるのに最適です。">
  <title>📝 SNSプロフ複数印象生成メーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #4a90d9;
      --accent-light: #eff6ff;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #2d5aa8, 0 6px 16px rgba(74,144,217,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2d5aa8, 0 2px 8px rgba(74,144,217,0.2);
    }

    /* ── 結果カード3パターン ── */
    .result-container {
      display: none; max-width: 600px; margin: 0 auto;
    }
    .result-container.show { display: block; }
    .pattern-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .pattern-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em;
      margin-bottom: 0.5rem; text-transform: uppercase;
    }
    .pattern-text {
      font-size: 0.95rem; color: var(--text); line-height: 1.6;
      margin-bottom: 0.8rem; padding: 0.7rem 0; border-top: 1px solid var(--border);
    }
    .copy-btn {
      display: inline-block; padding: 0.5rem 0.9rem;
      font-size: 0.8rem; font-weight: 600;
      background: var(--bg); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: 0.15s;
    }
    .copy-btn:hover {
      background: var(--accent); color: #fff;
    }
    .copy-btn:active {
      transform: scale(0.95);
    }
    .copy-feedback {
      display: none; font-size: 0.75rem; color: var(--ok);
      margin-top: 0.3rem; font-weight: 600;
    }
    .copy-feedback.show { display: inline; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📝 SNSプロフ複数印象生成メーカー</h1>
    <p class="subtitle">プロフィール素材を入力するだけで、印象別の自己紹介文を3パターン同時生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="profile">プロフィール素材</label>
      <textarea id="profile" placeholder="例：フリーランスWebデザイナー。猫好き。最近はカフェで仕事をすることが多いです。"></textarea>
      <p class="hint">自分について書きたい内容を入力してください</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generateProfiles()">生成する</button>

  <!-- 結果コンテナ -->
  <div class="result-container" id="result">
    <div class="pattern-card">
      <p class="pattern-label">堅い印象（ビジネス向け）</p>
      <p class="pattern-text" id="profile-formal"></p>
      <button class="copy-btn" onclick="copyText('profile-formal', this)">📋 コピー</button>
      <span class="copy-feedback" id="formal-feedback">コピーしました</span>
    </div>

    <div class="pattern-card">
      <p class="pattern-label">親しみやすい（フレンドリー）</p>
      <p class="pattern-text" id="profile-friendly"></p>
      <button class="copy-btn" onclick="copyText('profile-friendly', this)">📋 コピー</button>
      <span class="copy-feedback" id="friendly-feedback">コピーしました</span>
    </div>

    <div class="pattern-card">
      <p class="pattern-label">ユーモア系（楽しい雰囲気）</p>
      <p class="pattern-text" id="profile-humor"></p>
      <button class="copy-btn" onclick="copyText('profile-humor', this)">📋 コピー</button>
      <span class="copy-feedback" id="humor-feedback">コピーしました</span>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールはAIによって自動生成される参考文です。SNS投稿前に内容を確認・編集してからご利用ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 初期化：localStorage から読み込み ──
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('snsprofile-input');
    if (saved) {
      document.getElementById('profile').value = saved;
    }
  });

  // ── 入力を自動保存 ──
  document.getElementById('profile').addEventListener('input', function() {
    localStorage.setItem('snsprofile-input', this.value);
  });

  // ── 生成処理 ──
  function generateProfiles() {
    var input = document.getElementById('profile').value.trim();
    if (!input) {
      alert('プロフィール素材を入力してください');
      return;
    }

    // ── 3パターンを生成（簡易的なテンプレート組み立て） ──
    var formal = generateFormal(input);
    var friendly = generateFriendly(input);
    var humor = generateHumor(input);

    // ── 結果を表示 ──
    document.getElementById('profile-formal').textContent = formal;
    document.getElementById('profile-friendly').textContent = friendly;
    document.getElementById('profile-humor').textContent = humor;
    document.getElementById('result').classList.add('show');

    // ── localStorage に保存 ──
    var results = {
      formal: formal,
      friendly: friendly,
      humor: humor,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('snsprofile-results', JSON.stringify(results));
  }

  // ── 堅い印象（ビジネス向け） ──
  function generateFormal(input) {
    var lines = input.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
    if (lines.length === 0) return '';

    var first = lines[0];
    var rest = lines.slice(1).join('、');
    var suffix = rest ? '。' + rest + '。プロとしての視点を大切にしています。' : '。日々の仕事を丁寧に進めています。';
    return first + suffix;
  }

  // ── 親しみやすい（フレンドリー） ──
  function generateFriendly(input) {
    var lines = input.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
    if (lines.length === 0) return '';

    var first = lines[0];
    var rest = lines.slice(1).join('したり、');
    var suffix = rest ? '。' + rest + '。いろいろなことに興味を持っています 😄' : '。毎日楽しく過ごしています 😊';
    return first + suffix;
  }

  // ── ユーモア系（楽しい雰囲気） ──
  function generateHumor(input) {
    var lines = input.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
    if (lines.length === 0) return '';

    var first = lines[0];
    var rest = lines.slice(1).join('と、');
    var suffix = rest ? '。特に ' + rest + ' の時が一番楽しい！🎉' : '。楽しいことを見つけるのが得意です 🌟';
    return first + suffix;
  }

  // ── コピー機能 ──
  function copyText(elementId, btn) {
    var text = document.getElementById(elementId).textContent;
    navigator.clipboard.writeText(text).then(function() {
      var feedbackId = elementId.replace('profile-', '') + '-feedback';
      var feedback = document.getElementById(feedbackId);
      feedback.classList.add('show');
      setTimeout(function() {
        feedback.classList.remove('show');
      }, 2000);
    }).catch(function(err) {
      alert('コピーに失敗しました：' + err);
    });
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
