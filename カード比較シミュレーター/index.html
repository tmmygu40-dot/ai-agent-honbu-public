<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード比較シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-sm {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem; font-weight: 700;
      border: none; border-radius: 7px; cursor: pointer;
      transition: opacity 0.1s;
    }
    .btn-sm:active { opacity: 0.7; }
    .btn-del { background: var(--ng-bg); color: var(--ng); }

    /* ── ランキングカード ── */
    .rank-list { display: none; max-width: 600px; margin: 0 auto 1rem; }
    .rank-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.75rem;
      position: relative;
    }
    .rank-item.ok   { border-color: var(--ok);  background: var(--ok-bg); }
    .rank-item.warn { border-color: var(--warn); background: var(--warn-bg); }
    .rank-item.ng   { border-color: var(--ng);   background: var(--ng-bg); }

    .rank-badge {
      display: inline-block;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem; border-radius: 5px;
      margin-bottom: 0.4rem;
    }
    .rank-item.ok   .rank-badge { background: var(--ok);   color: #fff; }
    .rank-item.warn .rank-badge { background: var(--warn);  color: #fff; }
    .rank-item.ng   .rank-badge { background: var(--ng);    color: #fff; }

    .rank-name { font-size: 1rem; font-weight: 800; margin-bottom: 0.15rem; }
    .rank-gain {
      font-size: 1.6rem; font-weight: 900; line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .rank-item.ok   .rank-gain { color: var(--ok); }
    .rank-item.warn .rank-gain { color: var(--warn); }
    .rank-item.ng   .rank-gain { color: var(--ng); }

    .rank-detail { font-size: 0.78rem; color: var(--text-sub); }

    /* ── 登録済みカード一覧 ── */
    .card-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .card-list-item:last-child { border-bottom: none; }
    .card-list-item .cname { font-weight: 700; }
    .card-list-item .cmeta { color: var(--text-sub); font-size: 0.76rem; margin-top: 0.1rem; }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-sm, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .rank-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>カード比較シミュレーター</h1>
    <p class="subtitle">還元率・年会費・使用額から年間お得額を比較</p>
  </header>

  <!-- カード登録 -->
  <div class="card">
    <p class="card-title">カードを追加</p>
    <div class="field">
      <label for="cname">カード名</label>
      <input type="text" id="cname" placeholder="例: 楽天カード">
    </div>
    <div class="field">
      <label for="fee">年会費（円）</label>
      <input type="number" id="fee" placeholder="例: 0" min="0">
      <p class="hint">無料カードは 0 を入力</p>
    </div>
    <div class="field">
      <label for="rate">還元率（%）</label>
      <input type="number" id="rate" placeholder="例: 1.0" min="0" step="0.1">
      <p class="hint">1%なら 1.0 と入力</p>
    </div>
    <div class="field">
      <label for="spend">月間使用額（円）</label>
      <input type="number" id="spend" placeholder="例: 50000" min="0">
    </div>
  </div>

  <button class="btn-calc no-print" onclick="addCard()">＋ カードを追加して比較</button>

  <!-- 登録済みカード一覧 -->
  <div class="card" id="list-card" style="display:none">
    <p class="card-title">登録済みカード</p>
    <div id="card-list"></div>
    <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn-calc no-print" style="max-width:none;flex:1;margin:0;padding:0.75rem;font-size:0.92rem;" onclick="showRanking()">ランキングを表示</button>
      <button class="btn-sm btn-del no-print" style="flex:0 0 auto;padding:0.75rem 1rem;" onclick="clearAll()">全削除</button>
    </div>
  </div>

  <!-- ランキング -->
  <div class="rank-list" id="ranking">
    <div style="max-width:600px;margin:0 auto 0.75rem;">
      <p style="font-size:0.78rem;font-weight:700;color:var(--accent);letter-spacing:0.06em;">RANKING — 年間お得額（高い順）</p>
    </div>
    <div id="rank-items"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var STORAGE_KEY = 'card_simulator_cards';
  var cards = [];

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) cards = JSON.parse(raw);
    } catch(e) { cards = []; }
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  }

  function addCard() {
    var name  = document.getElementById('cname').value.trim();
    var fee   = parseFloat(document.getElementById('fee').value);
    var rate  = parseFloat(document.getElementById('rate').value);
    var spend = parseFloat(document.getElementById('spend').value);

    if (!name) { alert('カード名を入力してください'); return; }
    if (isNaN(fee) || fee < 0) { alert('年会費を入力してください（無料は0）'); return; }
    if (isNaN(rate) || rate < 0) { alert('還元率を入力してください'); return; }
    if (isNaN(spend) || spend < 0) { alert('月間使用額を入力してください'); return; }

    cards.push({ name: name, fee: fee, rate: rate, spend: spend, id: Date.now() });
    save();
    render();

    // フォームリセット
    document.getElementById('cname').value = '';
    document.getElementById('fee').value = '';
    document.getElementById('rate').value = '';
    document.getElementById('spend').value = '';
  }

  function deleteCard(id) {
    cards = cards.filter(function(c){ return c.id !== id; });
    save();
    render();
  }

  function clearAll() {
    if (!confirm('全カードを削除しますか？')) return;
    cards = [];
    save();
    render();
    document.getElementById('ranking').style.display = 'none';
  }

  function calcGain(c) {
    // 年間お得額 = 月間使用額 × 12 × 還元率% - 年会費
    return c.spend * 12 * (c.rate / 100) - c.fee;
  }

  function fmt(n) {
    return Math.round(n).toLocaleString('ja-JP');
  }

  function render() {
    var listCard = document.getElementById('list-card');
    var listEl   = document.getElementById('card-list');

    if (cards.length === 0) {
      listCard.style.display = 'none';
      return;
    }

    listCard.style.display = 'block';
    listEl.innerHTML = cards.map(function(c) {
      var gain = calcGain(c);
      return '<div class="card-list-item">'
        + '<div>'
        + '<div class="cname">' + esc(c.name) + '</div>'
        + '<div class="cmeta">年会費 ' + fmt(c.fee) + '円 / 還元率 ' + c.rate + '% / 月' + fmt(c.spend) + '円 → 年間 ' + (gain >= 0 ? '+' : '') + fmt(gain) + '円</div>'
        + '</div>'
        + '<button class="btn-sm btn-del no-print" onclick="deleteCard(' + c.id + ')">削除</button>'
        + '</div>';
    }).join('');
  }

  function showRanking() {
    if (cards.length === 0) { alert('カードを追加してください'); return; }

    var sorted = cards.slice().sort(function(a, b) {
      return calcGain(b) - calcGain(a);
    });

    var maxGain = calcGain(sorted[0]);

    var html = sorted.map(function(c, idx) {
      var gain  = calcGain(c);
      var level = gain < 0 ? 'ng' : idx === 0 ? 'ok' : 'warn';
      var badge = idx === 0 ? '1位 最もお得' : (idx + 1) + '位';
      var annualReward = c.spend * 12 * (c.rate / 100);

      return '<div class="rank-item ' + level + '">'
        + '<span class="rank-badge">' + badge + '</span>'
        + '<div class="rank-name">' + esc(c.name) + '</div>'
        + '<div class="rank-gain">' + (gain >= 0 ? '+' : '') + fmt(gain) + ' 円/年</div>'
        + '<div class="rank-detail">'
        + '年間還元額 ' + fmt(annualReward) + '円 - 年会費 ' + fmt(c.fee) + '円'
        + ' ／ 還元率 ' + c.rate + '% ／ 月' + fmt(c.spend) + '円利用'
        + '</div>'
        + '</div>';
    }).join('');

    document.getElementById('rank-items').innerHTML = html;
    document.getElementById('ranking').style.display = 'block';

    // ランキングへスクロール
    document.getElementById('ranking').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
  </script>
</body>
</html>
