<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ後売価・利益率シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 比較テーブル ── */
    .compare-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
    }
    .compare-table th {
      padding: 0.55rem 0.4rem; font-size: 0.76rem; font-weight: 700;
      color: var(--text-sub); text-align: center;
      border-bottom: 2px solid var(--border);
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table td {
      padding: 0.55rem 0.4rem; color: var(--text); border-bottom: 1px solid var(--border);
      text-align: right;
    }
    .compare-table td:first-child { text-align: left; color: var(--text-sub); font-size: 0.82rem; }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .hl td { font-weight: 700; }
    .compare-table .hl td:first-child { color: var(--text); }
    .val-after { color: var(--accent); font-weight: 700; }
    .val-up   { color: var(--ok); }
    .val-down { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; margin: 0 auto 1rem; padding: 0.55rem 1.2rem;
      font-size: 0.82rem; font-weight: 600;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>値上げ後売価・利益率シミュレーター</h1>
    <p class="subtitle">値上げ率を入れるだけで売価・粗利・利益率の変化をすぐ確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="cost">仕入れ値（円）</label>
      <input type="number" id="cost" placeholder="例: 500" min="0" inputmode="numeric">
      <p class="hint">1個あたりの仕入れ原価</p>
    </div>
    <div class="field">
      <label for="price">現在の売価（円）</label>
      <input type="number" id="price" placeholder="例: 800" min="0" inputmode="numeric">
    </div>
    <div class="field">
      <label for="rate">値上げ率（%）</label>
      <input type="number" id="rate" placeholder="例: 10" min="0" step="0.1" inputmode="decimal">
      <p class="hint">売価を何%上げるか入力してください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">シミュレーションする</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">値上げ後の利益率</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較カード -->
  <div class="card" id="compare-card" style="display:none">
    <p class="card-title">値上げ前後の比較</p>
    <table class="compare-table">
      <thead>
        <tr>
          <th>項目</th>
          <th>値上げ前</th>
          <th>値上げ後</th>
          <th>変化</th>
        </tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>

  <!-- リセットボタン -->
  <button class="btn-reset no-print" id="reset-btn" style="display:none" onclick="resetForm()">入力をリセット</button>

  <button class="btn-pdf no-print" id="pdf-btn" style="display:none" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'neage_simulator_v1';

  // ページ読み込み時にlocalStorageから復元
  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        var d = JSON.parse(saved);
        if (d.cost  !== undefined) document.getElementById('cost').value  = d.cost;
        if (d.price !== undefined) document.getElementById('price').value = d.price;
        if (d.rate  !== undefined) document.getElementById('rate').value  = d.rate;
      } catch(e) {}
    }
  });

  function calc() {
    var cost  = parseFloat(document.getElementById('cost').value);
    var price = parseFloat(document.getElementById('price').value);
    var rate  = parseFloat(document.getElementById('rate').value);

    if (isNaN(cost) || isNaN(price) || isNaN(rate)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (cost < 0 || price <= 0 || rate < 0) {
      showErr('正しい値を入力してください（売価は1円以上）');
      return;
    }

    // localStorage に保存
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ cost: cost, price: price, rate: rate }));

    // 計算
    var newPrice    = price * (1 + rate / 100);
    var profitBefore = price - cost;
    var profitAfter  = newPrice - cost;
    var rateBefore   = profitBefore / price * 100;
    var rateAfter    = profitAfter  / newPrice * 100;
    var rateDiff     = rateAfter - rateBefore;
    var profitDiff   = profitAfter - profitBefore;

    // 判定
    var level, eval_, note;
    if (rateAfter >= 30) {
      level = 'ok'; eval_ = '利益率が十分あります';
      note  = '値上げ後も粗利を確保できています。';
    } else if (rateAfter >= 15) {
      level = 'warn'; eval_ = '利益率はやや薄め';
      note  = '採算は取れますが、コスト管理を続けましょう。';
    } else if (rateAfter >= 0) {
      level = 'warn'; eval_ = '利益率が低水準です';
      note  = '追加値上げか原価削減を検討してください。';
    } else {
      level = 'ng'; eval_ = '赤字になります';
      note  = '値上げ幅を増やすか仕入れ値を下げてください。';
    }

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rateAfter.toFixed(1) + '%';
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;

    // 比較テーブル
    var rows = [
      { label: '売価', before: fmt(price) + '円', after: fmt(newPrice) + '円', diff: '+' + fmt(newPrice - price) + '円', updown: 'up' },
      { label: '粗利（1個）', before: fmt(profitBefore) + '円', after: fmt(profitAfter) + '円', diff: (profitDiff >= 0 ? '+' : '') + fmt(profitDiff) + '円', updown: profitDiff >= 0 ? 'up' : 'down' },
      { label: '利益率', before: rateBefore.toFixed(1) + '%', after: rateAfter.toFixed(1) + '%', diff: (rateDiff >= 0 ? '+' : '') + rateDiff.toFixed(1) + '%', updown: rateDiff >= 0 ? 'up' : 'down', hl: true },
    ];

    var tbody = document.getElementById('compare-body');
    tbody.innerHTML = rows.map(function(r) {
      return '<tr' + (r.hl ? ' class="hl"' : '') + '>'
        + '<td>' + r.label + '</td>'
        + '<td>' + r.before + '</td>'
        + '<td class="val-after">' + r.after + '</td>'
        + '<td class="val-' + r.updown + '">' + r.diff + '</td>'
        + '</tr>';
    }).join('');

    document.getElementById('compare-card').style.display = 'block';
    document.getElementById('reset-btn').style.display    = 'block';
    document.getElementById('pdf-btn').style.display      = 'block';
  }

  function resetForm() {
    document.getElementById('cost').value  = '';
    document.getElementById('price').value = '';
    document.getElementById('rate').value  = '';
    document.getElementById('result').style.display       = 'none';
    document.getElementById('compare-card').style.display = 'none';
    document.getElementById('reset-btn').style.display    = 'none';
    document.getElementById('pdf-btn').style.display      = 'none';
    localStorage.removeItem(STORAGE_KEY);
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('compare-card').style.display = 'none';
    document.getElementById('reset-btn').style.display    = 'block';
    document.getElementById('pdf-btn').style.display      = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

</body>
