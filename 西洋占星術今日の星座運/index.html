<div class="page-intro-card">
  <h1>西洋占星術今日の星座運</h1>

  <p class="sub-lead">生年月日からの自動判定も可能。スクショ共有しやすい構成。</p>

<div class="app-card">
  <h2>星座を選ぶ or 誕生日入力</h2>
<div class="field"><label>星座</label>
      <select id="zo">
        <option>牡羊座</option><option>牡牛座</option><option>双子座</option><option>蟹座</option>
        <option>獅子座</option><option>乙女座</option><option>天秤座</option><option>蠍座</option>
        <option>射手座</option><option>山羊座</option><option>水瓶座</option><option>魚座</option>
      </select></div>
      <div class="field"><label>または誕生日</label>
        <input type="date" id="bd"></div>
      <button class="btn" onclick="run()">今日の運勢を見る</button>
  <div id="result" class="result empty">↑ボタンを押すと結果が表示されます</div>
</div>

<script>

const ZO=['牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座','天秤座','蠍座','射手座','山羊座','水瓶座','魚座'];
const MSG=[
'積極的に動くと運が開ける一日。',
'地に足をつけた選択が吉。',
'人との会話に閃きが宿る。',
'家族や身近な人を大切に。',
'自己表現が応援される時間。',
'細やかな配慮が評価される。',
'バランス感覚で人気上昇。',
'集中力で深い気づきが訪れる。',
'冒険心がチャンスを引き寄せる。',
'コツコツの積み重ねが実る。',
'独創的なアイデアが冴える日。',
'感受性を信じて行動を。'];
function zodiacFromBD(m,d){const r=[[3,21,'牡羊座'],[4,20,'牡牛座'],[5,21,'双子座'],[6,22,'蟹座'],[7,23,'獅子座'],[8,23,'乙女座'],[9,23,'天秤座'],[10,24,'蠍座'],[11,23,'射手座'],[12,22,'山羊座'],[1,20,'水瓶座'],[2,19,'魚座']];for(const[mm,dd,n]of r){if(m===mm&&d>=dd)return n;if(m===mm+1&&d<dd)return n;}return '魚座';}
function run(){let z;const bd=document.getElementById('bd').value;if(bd){const [Y,M,D]=bd.split('-').map(Number);z=zodiacFromBD(M,D);}else{z=ZO[document.getElementById('zo').selectedIndex];}const i=ZO.indexOf(z);const r='今日の'+z+'\n\n'+MSG[i]+'\n\nラッキーアイテム: '+['ペン','ハンカチ','スマホケース','傘','カバン','メモ帳','コップ','時計','本','イヤホン','スカーフ','鏡'][i];document.getElementById('result').classList.remove('empty');document.getElementById('result').textContent=r;}

</script>
