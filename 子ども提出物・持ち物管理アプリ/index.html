<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子ども提出物・持ち物管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>📋 子どもの提出物・持ち物管理</h1>

    <section class="form-section">
      <h2>新しく追加</h2>
      <div class="form-row">
        <select id="type-select">
          <option value="提出物">📄 提出物</option>
          <option value="宿題">✏️ 宿題</option>
          <option value="持ち物">🎒 持ち物</option>
        </select>
      </div>
      <div class="form-row">
        <input type="text" id="name-input" placeholder="内容を入力（例：理科のレポート）" maxlength="80">
      </div>
      <div class="form-row">
        <label for="date-input">期限：</label>
        <input type="date" id="date-input">
      </div>
      <button id="add-btn" onclick="addItem()">＋ 追加する</button>
    </section>

    <section class="filter-section">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" data-filter="未完了" onclick="setFilter('未完了')">未完了</button>
      <button class="filter-btn" data-filter="提出物" onclick="setFilter('提出物')">📄 提出物</button>
      <button class="filter-btn" data-filter="宿題" onclick="setFilter('宿題')">✏️ 宿題</button>
      <button class="filter-btn" data-filter="持ち物" onclick="setFilter('持ち物')">🎒 持ち物</button>
    </section>

    <section class="list-section">
      <ul id="item-list"></ul>
      <p id="empty-msg" class="empty-msg">登録されているアイテムがありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
