<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 クレーム管理</h1>
    </header>

    <!-- フィルター -->
    <div class="filter-bar">
      <label>絞り込み：</label>
      <select id="filterStatus">
        <option value="all">すべて</option>
        <option value="未対応">未対応</option>
        <option value="対応中">対応中</option>
        <option value="完了">完了</option>
      </select>
    </div>

    <!-- 統計 -->
    <div class="stats" id="stats"></div>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>クレーム登録</h2>
      <form id="claimForm">
        <div class="form-row">
          <label for="date">受付日 <span class="required">*</span></label>
          <input type="date" id="date" required>
        </div>
        <div class="form-row">
          <label for="customer">顧客名</label>
          <input type="text" id="customer" placeholder="例：田中 太郎">
        </div>
        <div class="form-row">
          <label for="content">クレーム内容 <span class="required">*</span></label>
          <textarea id="content" rows="3" placeholder="クレームの内容を入力してください" required></textarea>
        </div>
        <div class="form-row">
          <label for="status">対応状況 <span class="required">*</span></label>
          <select id="status" required>
            <option value="未対応">未対応</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
          </select>
        </div>
        <div class="form-row">
          <label for="assignee">担当者 <span class="required">*</span></label>
          <input type="text" id="assignee" placeholder="例：山田 花子" required>
        </div>
        <div class="form-row">
          <label for="memo">メモ</label>
          <textarea id="memo" rows="2" placeholder="対応内容や補足を入力（任意）"></textarea>
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>クレーム一覧</h2>
        <span class="count" id="claimCount"></span>
      </div>
      <div id="claimList"></div>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>クレーム編集</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <label for="editDate">受付日</label>
          <input type="date" id="editDate" required>
        </div>
        <div class="form-row">
          <label for="editCustomer">顧客名</label>
          <input type="text" id="editCustomer">
        </div>
        <div class="form-row">
          <label for="editContent">クレーム内容</label>
          <textarea id="editContent" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <label for="editStatus">対応状況</label>
          <select id="editStatus">
            <option value="未対応">未対応</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
          </select>
        </div>
        <div class="form-row">
          <label for="editAssignee">担当者</label>
          <input type="text" id="editAssignee" required>
        </div>
        <div class="form-row">
          <label for="editMemo">メモ</label>
          <textarea id="editMemo" rows="2"></textarea>
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn-primary">保存</button>
          <button type="button" id="cancelEdit" class="btn-secondary">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
