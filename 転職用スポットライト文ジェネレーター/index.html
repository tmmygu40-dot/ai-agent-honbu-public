<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="職種・経験年数・強みを入れるだけで、転職活動で使える1行キャッチコピーを5本まとめて生成。職務経歴書・自己PR・LinkedIn見出しに即使える転職用スポットライト文ジェネレーター。">
  <title>転職用スポットライト文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }

    /* ── キャッチコピー一覧 ── */
    .copy-list { list-style: none; padding: 0; margin: 0.6rem 0 0; }
    .copy-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.85rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .copy-item:last-child { border-bottom: none; }
    .copy-text {
      flex: 1; font-size: 0.98rem; line-height: 1.55; color: var(--text);
      font-weight: 600;
    }
    .copy-btn {
      flex-shrink: 0;
      font-size: 0.78rem; font-weight: 700;
      padding: 0.45rem 0.7rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn.copied { background: var(--ok); }

    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }
    .result-hint { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.7rem; text-align: center; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .copy-btn, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>転職用スポットライト文ジェネレーター</h1>
    <p class="subtitle">職歴を1行キャッチコピーに変換 — 自己PRやLinkedIn見出しに</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたの職歴を入力</p>
    <div class="field">
      <label for="role">職種</label>
      <input type="text" id="role" placeholder="例: Webエンジニア / 営業 / 経理">
    </div>
    <div class="field">
      <label for="years">経験年数（年）</label>
      <input type="number" id="years" placeholder="例: 7" min="0" max="60">
    </div>
    <div class="field">
      <label for="skill">主な業務／強み</label>
      <input type="text" id="skill" placeholder="例: 大規模ECのバックエンド設計 / 新規開拓営業">
    </div>
    <div class="field">
      <label for="industry">業界（任意）</label>
      <input type="text" id="industry" placeholder="例: IT / 製造 / 小売">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">スポットライト文を生成する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成された1行キャッチコピー</p>
    <ul class="copy-list" id="copy-list"></ul>
    <p class="result-hint">気に入った行は「コピー」ボタンでクリップボードに保存できます</p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 このツールは、職務経歴書・自己PR・LinkedIn見出しなどで使う1行キャッチコピーを、入力情報から複数パターン生成する補助ツールです。最終文面はご自身でご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'spotlight_input_v1';

  // 入力復元
  window.addEventListener('DOMContentLoaded', function(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.role)     document.getElementById('role').value     = data.role;
      if (data.years)    document.getElementById('years').value    = data.years;
      if (data.skill)    document.getElementById('skill').value    = data.skill;
      if (data.industry) document.getElementById('industry').value = data.industry;
    } catch(e) {}
  });

  function saveInput(role, years, skill, industry) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        role: role, years: years, skill: skill, industry: industry
      }));
    } catch(e) {}
  }

  function generate() {
    var role     = (document.getElementById('role').value     || '').trim();
    var yearsRaw = (document.getElementById('years').value    || '').trim();
    var skill    = (document.getElementById('skill').value    || '').trim();
    var industry = (document.getElementById('industry').value || '').trim();

    if (!role || !yearsRaw || !skill) {
      alert('職種・経験年数・強みは必須です');
      return;
    }

    var years = parseInt(yearsRaw, 10);
    if (isNaN(years) || years < 0) {
      alert('経験年数は0以上の数字で入力してください');
      return;
    }

    saveInput(role, years, skill, industry);

    var indPart = industry ? industry + '領域で' : '';
    var indHead = industry ? industry + '×'      : '';
    var seniority = years >= 10 ? '熟練' : years >= 5 ? '中堅' : years >= 2 ? '実務派' : '若手';

    var lines = [
      indPart + years + '年、' + skill + 'を磨いてきた' + role + '。',
      skill + 'でチームを動かす' + seniority + role + '。',
      years + '年積み上げた' + skill + 'のスキルで、次の現場でも一発目から戦力に。',
      '数字で語れる' + role + ' — ' + skill + 'の' + years + '年。',
      indHead + skill + 'が代名詞の' + role + '、現場で鍛えた' + years + '年。'
    ];

    var ul = document.getElementById('copy-list');
    ul.innerHTML = lines.map(function(line, i){
      return '<li class="copy-item">'
           + '<span class="copy-text" id="line-' + i + '">' + escapeHtml(line) + '</span>'
           + '<button class="copy-btn" onclick="copyLine(' + i + ', this)">コピー</button>'
           + '</li>';
    }).join('');

    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    rc.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function copyLine(i, btn) {
    var el = document.getElementById('line-' + i);
    if (!el) return;
    var text = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ markCopied(btn); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); markCopied(btn); } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  function markCopied(btn) {
    btn.classList.add('copied');
    var orig = btn.textContent;
    btn.textContent = '✓ コピー済';
    setTimeout(function(){
      btn.classList.remove('copied');
      btn.textContent = orig;
    }, 1500);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
