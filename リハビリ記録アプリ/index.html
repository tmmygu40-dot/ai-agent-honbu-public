<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リハビリ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>🏃 リハビリ記録</h1>
    <p class="subtitle">訓練内容・回数・痛みレベルを記録して回復の経過を確認</p>
  </header>

  <main>
    <!-- 入力フォーム -->
    <section class="card form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="exercise">訓練内容</label>
          <input type="text" id="exercise" placeholder="例：膝の屈伸運動" maxlength="50">
        </div>
        <div class="form-group">
          <label for="count">回数・時間</label>
          <input type="text" id="count" placeholder="例：20回 / 10分" maxlength="30">
        </div>
        <div class="form-group pain-group">
          <label for="pain">痛みレベル：<span id="painValue">5</span></label>
          <div class="pain-scale">
            <span class="pain-label">0 (なし)</span>
            <input type="range" id="pain" min="0" max="10" value="5">
            <span class="pain-label">10 (激痛)</span>
          </div>
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="気づいたことなど" maxlength="100">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録を追加</button>
    </section>

    <!-- グラフ -->
    <section class="card chart-section">
      <h2>痛みレベルの推移</h2>
      <div class="chart-container">
        <canvas id="painChart"></canvas>
        <p id="chartEmpty" class="empty-text">記録を追加するとグラフが表示されます</p>
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="card list-section">
      <div class="list-header">
        <h2>記録一覧</h2>
        <span id="recordCount" class="count-badge">0 件</span>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-text">まだ記録がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
