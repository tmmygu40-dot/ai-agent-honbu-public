<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受注採算チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>受注採算チェッカー</h1>
    <p class="subtitle">案件の赤字リスクを即把握</p>

    <section class="form-section">
      <h2>案件登録 / 編集</h2>
      <div class="form-group">
        <label for="projectName">案件名</label>
        <input type="text" id="projectName" placeholder="例：A社向け製品納品">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="sellPrice">売価（円）</label>
          <input type="number" id="sellPrice" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="costPrice">原価（円）</label>
          <input type="number" id="costPrice" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：原材料費上昇分含む">
      </div>
      <div class="btn-row">
        <button id="addBtn" class="btn-primary" onclick="addOrUpdateProject()">登録する</button>
        <button id="cancelBtn" class="btn-secondary" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="summary-label">案件数</span>
          <span class="summary-value" id="totalCount">0</span>
        </div>
        <div class="summary-card danger">
          <span class="summary-label">赤字案件</span>
          <span class="summary-value" id="dangerCount">0</span>
        </div>
        <div class="summary-card warning">
          <span class="summary-label">要注意案件</span>
          <span class="summary-value" id="warningCount">0</span>
        </div>
        <div class="summary-card safe">
          <span class="summary-label">安全案件</span>
          <span class="summary-value" id="safeCount">0</span>
        </div>
      </div>
    </section>

    <section class="filter-section" id="filterSection" style="display:none;">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('danger', this)">赤字のみ</button>
        <button class="filter-btn" onclick="setFilter('warning', this)">要注意のみ</button>
        <button class="filter-btn" onclick="setFilter('safe', this)">安全のみ</button>
      </div>
    </section>

    <section class="list-section">
      <div id="projectList">
        <div class="empty-message">案件を登録してください</div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
