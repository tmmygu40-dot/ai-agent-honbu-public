<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接客ロールプレイ練習アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* カテゴリボタン */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }
    .cat-btn {
      padding: 0.8rem 0.5rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* シナリオ表示 */
    .scenario-box {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .scenario-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: 0.06em; }
    .scenario-text { font-size: 1rem; font-weight: 600; line-height: 1.7; color: var(--text); }

    /* 操作ボタン群 */
    .btn-row { display: flex; gap: 0.6rem; max-width: 600px; margin: 0 auto 1rem; }
    .btn-main {
      flex: 1; padding: 0.9rem;
      font-size: 0.95rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }
    .btn-sub {
      padding: 0.9rem 1.2rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); }

    /* 模範回答 */
    .answer-box {
      display: none;
      background: var(--ok-bg);
      border: 2px solid var(--ok);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .answer-box.show { display: block; }
    .answer-label { font-size: 0.75rem; font-weight: 700; color: var(--ok); margin-bottom: 0.5rem; letter-spacing: 0.06em; }
    .answer-text { font-size: 0.95rem; line-height: 1.75; color: var(--text); }
    .answer-point { font-size: 0.8rem; color: var(--ok); margin-top: 0.6rem; font-weight: 600; }

    /* 進捗 */
    .progress-bar-wrap { max-width: 600px; margin: 0 auto 1rem; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.35rem; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; }

    /* 履歴 */
    .history-list { list-style: none; }
    .history-list li {
      padding: 0.5rem 0.6rem; font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .history-list li:last-child { border-bottom: none; }
    .badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.45rem;
      border-radius: 5px; white-space: nowrap;
    }
    .badge-claim { background: #fee2e2; color: #b91c1c; }
    .badge-price { background: #fef9c3; color: #b45309; }
    .badge-decline { background: #dbeafe; color: #1d4ed8; }

    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1.5rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>接客ロールプレイ練習</h1>
    <p class="subtitle">シナリオを選んでトーク対応力を磨こう</p>
  </header>

  <!-- カテゴリ選択 -->
  <div class="card">
    <p class="card-title">カテゴリ選択</p>
    <div class="cat-grid">
      <button class="cat-btn active" onclick="selectCategory('claim')" id="cat-claim">😤 クレーム対応</button>
      <button class="cat-btn" onclick="selectCategory('price')" id="cat-price">💴 値上げ説明</button>
      <button class="cat-btn" onclick="selectCategory('decline')" id="cat-decline">🙏 断りトーク</button>
    </div>
  </div>

  <!-- 進捗バー -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="catName">クレーム対応</span>
      <span id="progressText">0 / 6 完了</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- シナリオ表示 -->
  <div class="card" id="scenarioCard">
    <p class="card-title">お客様の言葉</p>
    <div class="scenario-box">
      <p class="scenario-label">シナリオ <span id="scenarioNum">1</span> / <span id="scenarioTotal">6</span></p>
      <p class="scenario-text" id="scenarioText">カテゴリを選んで「次のシナリオ」を押してください。</p>
    </div>
    <div class="btn-row">
      <button class="btn-main" id="nextBtn" onclick="nextScenario()">次のシナリオ</button>
      <button class="btn-sub" id="randBtn" onclick="randomScenario()">ランダム</button>
    </div>
  </div>

  <!-- 模範回答（最初は非表示） -->
  <div class="answer-box" id="answerBox">
    <p class="answer-label">模範回答例</p>
    <p class="answer-text" id="answerText"></p>
    <p class="answer-point" id="answerPoint"></p>
  </div>

  <!-- 模範回答を見るボタン -->
  <div class="btn-row" id="showAnswerRow" style="display:none">
    <button class="btn-sub" style="flex:1" onclick="showAnswer()">模範回答を見る</button>
    <button class="btn-sub" onclick="markDone()">✓ 練習完了</button>
  </div>

  <!-- 練習履歴 -->
  <div class="card">
    <p class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>練習履歴</span>
      <button onclick="clearHistory()" style="background:none;border:none;font-size:0.75rem;color:var(--text-sub);cursor:pointer;">クリア</button>
    </p>
    <ul class="history-list" id="historyList">
      <li class="empty-msg">まだ練習履歴がありません</li>
    </ul>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var SCENARIOS = {
    claim: [
      {
        text: '「先日買ったこの商品、すぐ壊れたんだけど！どういうこと！？ちゃんと対応してよ！」',
        answer: '「この度はご不便をおかけして、誠に申し訳ございません。まず状況をお聞かせいただけますか？お客様のご不満はもっともでございます。すぐに確認のうえ、適切な対応をさせていただきます。」',
        point: '▶ ポイント：まず謝罪→状況確認→解決策の提示の順で落ち着いて対応する'
      },
      {
        text: '「なんで店員の態度がこんなに悪いの！？もう二度と来ない！」',
        answer: '「ご不快な思いをさせてしまい、本当に申し訳ございません。具体的にどのような点がご不満でしたでしょうか。ご意見を真摯に受け止め、改善してまいります。」',
        point: '▶ ポイント：防衛的にならず、まず謝罪→具体的な事実確認→改善意思を伝える'
      },
      {
        text: '「注文した商品と違うものが届いたんだけど！これは詐欺じゃないの？」',
        answer: '「大変失礼いたしました。ご注文の内容と届いた商品を確認させてください。お客様にご迷惑をおかけしたことをお詫び申し上げます。正しい商品をすぐに手配いたします。」',
        point: '▶ ポイント：感情的な言葉には反論せず、事実確認と解決に集中する'
      },
      {
        text: '「待ち時間が長すぎる！何時間待たせるつもり？説明してよ！」',
        answer: '「お待ちいただいているにもかかわらず、ご案内が遅くなり誠に申し訳ございません。現在○分程度お待ちいただいております。もしよろしければ、こちらで○○しながらお待ちいただけますでしょうか。」',
        point: '▶ ポイント：謝罪＋現状説明＋待ち時間の目安＋代替案の提示がセット'
      },
      {
        text: '「返品したいのに「規定上できない」ってどういうこと！？融通きかせてよ！」',
        answer: '「ご不便をおかけし申し訳ございません。返品規定については、お客様の公平性を保つために設けております。今回のご事情をもう少し詳しく伺えますでしょうか。できる限り対応できる方法を一緒に考えさせてください。」',
        point: '▶ ポイント：ルールの理由を簡単に説明しつつ、柔軟に解決策を探る姿勢を見せる'
      },
      {
        text: '「この前の店員に失礼なことを言われた。あなたが責任者？謝罪しろ！」',
        answer: '「そのような対応があったとすれば、誠に申し訳ございません。担当者に代わり、私がお詫び申し上げます。具体的にどのような対応だったか、お聞かせいただけますでしょうか。」',
        point: '▶ ポイント：事実確認前でも代表として謝罪し、詳細確認を進める'
      }
    ],
    price: [
      {
        text: '「急に値上げって、なんの説明もなかったじゃないですか。納得できません。」',
        answer: '「ご説明が不十分でご迷惑をおかけし、申し訳ございません。値上げの背景には原材料費や物流コストの上昇がございます。今後はご連絡の方法も改めてまいります。引き続きのご愛顧をお願いできますと幸いです。」',
        point: '▶ ポイント：謝罪→理由を端的に説明→今後の改善→感謝で締める'
      },
      {
        text: '「他の店は同じ商品が安いよ。なぜうちだけ高くなるの？」',
        answer: '「ご比較いただいてのご指摘、ありがとうございます。弊社では○○の品質や○○のサービスに費用をかけているため、その分がコストに反映されております。その価値をしっかりお伝えできていなかった点は反省しております。」',
        point: '▶ ポイント：競合比較には防衛的にならず、自社の付加価値を説明する'
      },
      {
        text: '「毎月値上げばかり。いつまで続くの？もう限界です。」',
        answer: '「ご負担をおかけし、大変申し訳ございません。現状では○○の価格上昇が続いており、弊社でも内部コスト削減を最大限行った上での価格設定です。お客様のご状況に合わせたプランのご相談も可能ですので、ぜひお聞かせください。」',
        point: '▶ ポイント：共感→努力説明→代替提案で顧客に選択肢を与える'
      },
      {
        text: '「値上げするなら品質も上げてよ。現状維持で値上げはおかしい。」',
        answer: '「貴重なご意見をありがとうございます。おっしゃる通り、価格に見合った価値を感じていただくことが大切ですね。今回の値上げは維持コストの増加によるものですが、品質向上についても検討を続けてまいります。」',
        point: '▶ ポイント：お客様の意見を肯定しつつ、値上げの理由と改善への意欲を伝える'
      },
      {
        text: '「値上げするならもっと早く言ってくれれば対策できたのに。」',
        answer: '「ご指摘の通りです。早めにお知らせすべきでした。今後は事前に余裕を持ってご案内できるよう改善いたします。今回のご不便については、心よりお詫び申し上げます。」',
        point: '▶ ポイント：非を認め、具体的な改善策を約束する'
      },
      {
        text: '「値上げ幅が大きすぎる。せめて段階的にできなかったの？」',
        answer: '「ご要望はもっともでございます。弊社としても段階的な見直しを検討しておりましたが、コスト上昇が急激で今回の幅になってしまいました。次回以降はより丁寧なご案内ができるよう努めてまいります。」',
        point: '▶ ポイント：意図を説明しつつ、改善意思をしっかり伝える'
      }
    ],
    decline: [
      {
        text: '「今すぐ特別割引してくれないと他に行くよ。どうするの？」',
        answer: '「ご期待に添えず申し訳ございません。特別割引については全お客様に公平な対応をしており、個別の値引きは難しい状況です。ただ、現在○○のキャンペーンをご利用いただける場合がございますが、いかがでしょうか。」',
        point: '▶ ポイント：圧力に屈しない姿勢を保ちつつ、代替案を提示する'
      },
      {
        text: '「うちだけ特別扱いしてくれればいいじゃん。いつも買ってるんだから。」',
        answer: '「日頃よりご愛顧いただき、誠にありがとうございます。ご期待に沿えず恐縮ですが、特別対応はすべてのお客様への公平性の観点から難しい状況です。ご理解いただけますと幸いです。」',
        point: '▶ ポイント：感謝を伝えつつ、公平性を理由に明確に断る'
      },
      {
        text: '「お願いだからこの期限、少しだけ延ばしてくれない？」',
        answer: '「ご事情はよく分かりました。通常は期限の延長は難しいのですが、今回のご状況について上の者に相談することは可能です。ただし確約はできかねる点をご了承いただけますでしょうか。」',
        point: '▶ ポイント：即断りにせず、確認の余地があることを伝えて誠実に対応する'
      },
      {
        text: '「競合他社ならやってくれると言ってるよ。あなた方はできないの？」',
        answer: '「他社と比較していただき、ありがとうございます。弊社ではその対応は現時点では難しい状況ですが、その分○○の点で価値を提供できると考えております。改めてご検討いただけますか。」',
        point: '▶ ポイント：他社比較に焦らず、自社の強みを前向きに説明する'
      },
      {
        text: '「どうしてもダメ？上の人に繋いでよ。あなたじゃ話にならない。」',
        answer: '「ご要望はよく分かりました。責任者への取り次ぎは可能です。ただ、私からも状況を引き継いでご対応させていただきますので、少々お待ちいただけますでしょうか。」',
        point: '▶ ポイント：感情的にならず、エスカレーションに素直に応じる姿勢を見せる'
      },
      {
        text: '「一度だけ例外として認めてよ。次は守るから。」',
        answer: '「お気持ちは理解できます。ただ、一度例外を設けると他のお客様との公平性が保てなくなるため、難しい状況です。別の方法でお力になれることがあれば、ぜひお聞かせください。」',
        point: '▶ ポイント：公平性を理由に明確に断りつつ、代替サポートの姿勢を残す'
      }
    ]
  };

  var CAT_LABELS = { claim: 'クレーム対応', price: '値上げ説明', decline: '断りトーク' };
  var CAT_BADGE  = { claim: 'badge-claim',   price: 'badge-price',  decline: 'badge-decline' };

  var currentCat = 'claim';
  var currentIdx = -1;
  var history = [];

  function init() {
    var stored = localStorage.getItem('roleplay_history');
    if (stored) { try { history = JSON.parse(stored); } catch(e) { history = []; } }
    renderHistory();
    updateProgress();
  }

  function selectCategory(cat) {
    currentCat = cat;
    currentIdx = -1;
    ['claim','price','decline'].forEach(function(c) {
      document.getElementById('cat-' + c).classList.toggle('active', c === cat);
    });
    document.getElementById('catName').textContent = CAT_LABELS[cat];
    document.getElementById('scenarioText').textContent = 'カテゴリを選んで「次のシナリオ」を押してください。';
    document.getElementById('scenarioNum').textContent = '-';
    document.getElementById('scenarioTotal').textContent = SCENARIOS[cat].length;
    document.getElementById('answerBox').classList.remove('show');
    document.getElementById('showAnswerRow').style.display = 'none';
    updateProgress();
  }

  function nextScenario() {
    var list = SCENARIOS[currentCat];
    currentIdx = (currentIdx + 1) % list.length;
    showScenario(currentIdx);
  }

  function randomScenario() {
    var list = SCENARIOS[currentCat];
    var idx;
    if (list.length > 1) {
      do { idx = Math.floor(Math.random() * list.length); } while (idx === currentIdx);
    } else { idx = 0; }
    currentIdx = idx;
    showScenario(currentIdx);
  }

  function showScenario(idx) {
    var s = SCENARIOS[currentCat][idx];
    document.getElementById('scenarioNum').textContent = idx + 1;
    document.getElementById('scenarioTotal').textContent = SCENARIOS[currentCat].length;
    document.getElementById('scenarioText').textContent = s.text;
    document.getElementById('answerBox').classList.remove('show');
    document.getElementById('showAnswerRow').style.display = 'flex';
    document.getElementById('answerText').textContent = '';
    document.getElementById('answerPoint').textContent = '';
  }

  function showAnswer() {
    if (currentIdx < 0) return;
    var s = SCENARIOS[currentCat][currentIdx];
    document.getElementById('answerText').textContent = s.answer;
    document.getElementById('answerPoint').textContent = s.point;
    document.getElementById('answerBox').classList.add('show');
  }

  function markDone() {
    if (currentIdx < 0) return;
    var s = SCENARIOS[currentCat][currentIdx];
    var entry = {
      cat: currentCat,
      text: s.text.substring(0, 30) + '…',
      time: new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
    };
    history.unshift(entry);
    if (history.length > 30) history = history.slice(0, 30);
    localStorage.setItem('roleplay_history', JSON.stringify(history));
    renderHistory();
    updateProgress();
    document.getElementById('showAnswerRow').style.display = 'none';
    document.getElementById('answerBox').classList.remove('show');
    document.getElementById('scenarioText').textContent = '練習完了！「次のシナリオ」で続けましょう。';
  }

  function renderHistory() {
    var ul = document.getElementById('historyList');
    if (history.length === 0) {
      ul.innerHTML = '<li class="empty-msg">まだ練習履歴がありません</li>';
      return;
    }
    ul.innerHTML = history.map(function(h) {
      return '<li><span class="badge ' + CAT_BADGE[h.cat] + '">' + CAT_LABELS[h.cat] + '</span>'
           + '<span>' + h.text + '</span>'
           + '<span style="margin-left:auto;white-space:nowrap;font-size:0.75rem;color:var(--text-sub)">' + h.time + '</span></li>';
    }).join('');
  }

  function updateProgress() {
    var total = SCENARIOS[currentCat].length;
    var done = history.filter(function(h) { return h.cat === currentCat; }).length;
    var pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
    document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function clearHistory() {
    if (!confirm('練習履歴をすべて削除しますか？')) return;
    history = [];
    localStorage.removeItem('roleplay_history');
    renderHistory();
    updateProgress();
  }

  init();
  </script>
