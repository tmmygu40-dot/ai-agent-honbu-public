<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お小遣い説明ジェネレーター｜親向け説明文を3パターン即生成</title>
  <meta name="description" content="子どもの学年・お小遣いの金額・方針を選ぶだけで、お小遣いの渡し方を子どもに説明する親向けトークを3パターン即生成。渡す前の「なんて伝えよう…」を解決します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 生成カード（複数表示） */
    .gen-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .gen-card.t-yasashii { border-color: #2563eb; background: #eff6ff; }
    .gen-card.t-ronri    { border-color: var(--ok); background: var(--ok-bg); }
    .gen-card.t-yurui    { border-color: var(--accent); background: var(--accent-light); }
    .gen-label {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      background: rgba(0,0,0,0.05); color: var(--text-sub);
      margin-bottom: 0.5rem;
    }
    .gen-card.t-yasashii .gen-label { background: #dbeafe; color: #1d4ed8; }
    .gen-card.t-ronri    .gen-label { background: #dcfce7; color: var(--ok); }
    .gen-card.t-yurui    .gen-label { background: #ffedd5; color: var(--accent); }
    .gen-title {
      font-size: 1rem; font-weight: 800; margin-bottom: 0.6rem; line-height: 1.4;
    }
    .gen-body {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.7rem;
    }
    .copy-btn {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: #fff; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .copy-btn, .no-print { display: none !important; }
      .card, .gen-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>お小遣い説明ジェネレーター</h1>
    <p class="subtitle">学年・金額・方針を選ぶだけで、子どもへの説明トークを3パターン生成します</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="grade">子どもの学年</label>
      <select id="grade">
        <option value="未就学">未就学（4〜6歳）</option>
        <option value="低学年" selected>小学校低学年（1〜3年）</option>
        <option value="高学年">小学校高学年（4〜6年）</option>
        <option value="中学生">中学生</option>
        <option value="高校生">高校生</option>
      </select>
    </div>
    <div class="field">
      <label for="amount">お小遣いの金額（円／月）</label>
      <input type="number" id="amount" placeholder="例: 500" inputmode="numeric">
      <p class="hint">月額の目安。お手伝い制でも一旦の月額を入れてください。</p>
    </div>
    <div class="field">
      <label for="style">渡し方</label>
      <select id="style">
        <option value="teigaku" selected>定額制（毎月決まった額）</option>
        <option value="otetsudai">お手伝い制（家事と引き換え）</option>
        <option value="hybrid">ハイブリッド（基本額＋お手伝い加算）</option>
      </select>
    </div>
    <div class="field">
      <label for="point">伝えたい一番のポイント</label>
      <select id="point">
        <option value="keikaku" selected>計画的に使ってほしい</option>
        <option value="chokin">貯金の習慣をつけてほしい</option>
        <option value="kansha">感謝の気持ちを持ってほしい</option>
        <option value="rodou">働いて得るものだと知ってほしい</option>
        <option value="muda">無駄遣いを減らしてほしい</option>
      </select>
    </div>
    <div class="field">
      <label for="nickname">子どもの呼び方（任意）</label>
      <input type="text" id="nickname" placeholder="例: ○○ちゃん（空欄なら「あなた」）" maxlength="20">
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、文部科学省・金融庁の金融教育資料や、家庭での金銭教育に関する公開情報を参考に、家庭で使いやすい言い回しに整えています。最終的な渡し方・金額はご家庭の方針でご判断ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var KEY = 'okozukai_setsumei_v1';

  // 入力復元
  window.addEventListener('DOMContentLoaded', function(){
    try {
      var s = localStorage.getItem(KEY);
      if (s) {
        var d = JSON.parse(s);
        if (d.grade)   document.getElementById('grade').value = d.grade;
        if (d.amount)  document.getElementById('amount').value = d.amount;
        if (d.style)   document.getElementById('style').value = d.style;
        if (d.point)   document.getElementById('point').value = d.point;
        if (d.nickname) document.getElementById('nickname').value = d.nickname;
      }
    } catch(e) {}
  });

  function saveInputs(d) {
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {}
  }

  function generate() {
    var grade  = document.getElementById('grade').value;
    var amount = parseInt(document.getElementById('amount').value, 10);
    var style  = document.getElementById('style').value;
    var point  = document.getElementById('point').value;
    var nick   = (document.getElementById('nickname').value || '').trim();

    if (isNaN(amount) || amount < 0) {
      alert('お小遣いの金額を入力してください（0以上）');
      return;
    }

    saveInputs({grade:grade, amount:amount, style:style, point:point, nickname:nick});

    var name = nick || 'あなた';
    var amountText = amount.toLocaleString('ja-JP') + '円';

    // 学年別の言い回しベース
    var gradeLabel = {
      '未就学': '小さなあなた',
      '低学年': '小学生になったあなた',
      '高学年': 'もうすぐ高学年のあなた',
      '中学生': '中学生になったあなた',
      '高校生': '高校生のあなた'
    }[grade];
    if (nick) gradeLabel = nick;

    // 渡し方の説明
    var styleDesc = {
      'teigaku':   '毎月決まった日に' + amountText + 'を渡す',
      'otetsudai': 'お手伝いを頑張った分だけ、合計で' + amountText + 'くらいになるように渡す',
      'hybrid':    '基本のお小遣いに、お手伝いを頑張った分を足して、月' + amountText + 'を目安に渡す'
    }[style];

    // ポイント別フレーズ
    var pointMsg = {
      'keikaku': {
        yasashii: 'ぜんぶ一気に使っちゃうと、月の終わりに「ほしい！」が出てきたとき悲しくなっちゃうから、ちょっとずつ使ってみよう。',
        ronri:   'お小遣いは「1ヶ月で使う総額」です。週ごとに使える金額を決めると、足りなくなって困ることが減ります。',
        yurui:   '一気に全部使うと、後半カツカツの「お小遣い砂漠」になるよ。配分、大事。'
      },
      'chokin': {
        yasashii: '毎月ちょっとずつ貯金箱に入れていくと、いつか大きなものが買える日がくるよ。一緒に楽しみだね。',
        ronri:   '「使うお金」と「貯めるお金」を最初に分けてください。貯金分は別の場所に置くと、自然に手をつけにくくなります。',
        yurui:   'お小遣いの一部は「未来の自分への仕送り」って思って貯めてみよう。未来の自分、ニッコリ。'
      },
      'kansha': {
        yasashii: 'お小遣いは、お父さんとお母さんが働いて得たお金からきているよ。だから「ありがとう」の気持ちも一緒にね。',
        ronri:   'このお金の出どころは家庭の収入です。当たり前ではないことを意識して、感謝とセットで受け取ってください。',
        yurui:   '実はこのお小遣い、親の給料から来てます。たまには「ありがとう」言ってもらえると、こっちも頑張れるからよろしく。'
      },
      'rodou': {
        yasashii: 'お小遣いは「自分でやった分」が形になったもの。お手伝いを頑張った自分を褒めてあげてね。',
        ronri:   '労働の対価として受け取る経験を、家庭の中で先取りで体験してもらいます。やった分だけが報酬です。',
        yurui:   'タダでもらえるお金じゃないって覚えとこう。働いた分が返ってくる、これ社会のルール。'
      },
      'muda': {
        yasashii: '「ほしい！」と思った時、一晩寝て次の日もほしかったら買おう。それでも「いらないかも」と思うものは結構あるよ。',
        ronri:   '購入前に24時間ルールを試してください。1日経っても欲しいものだけ買う。これで衝動買いの大半は防げます。',
        yurui:   '「今すぐ買わないと死ぬ！」ってなる前に、いったん深呼吸。だいたい次の日には冷めてるから不思議。'
      }
    }[point];

    var amountFeel = (function(){
      // 学年別ざっくり相場感（参考）: 低学年500円、高学年1000円、中学生1500円、高校生5000円程度を目安にコメントを変える
      var ref = { '未就学':300, '低学年':500, '高学年':1000, '中学生':1500, '高校生':5000 }[grade];
      if (!ref) return '';
      if (amount === 0) return '';
      if (amount > ref * 2) return '一般的な目安より少し多めの設定です。';
      if (amount < Math.round(ref * 0.5)) return '一般的な目安より少し控えめの設定です。';
      return '一般的な目安に近い金額です。';
    })();

    var patterns = [
      {
        cls:   't-yasashii',
        label: 'やさしいトーン',
        title: '気持ちに寄り添って伝える',
        body:
'お話があるんだ、' + name + '。\n' +
'今日から、お小遣いを始めようと思います。\n' +
styleDesc + 'ね。\n' +
'\n' +
pointMsg.yasashii + '\n' +
'\n' +
'うまく使えなかった月があっても大丈夫。' +
'一緒に「次はどうしようか」って考えていこうね。'
      },
      {
        cls:   't-ronri',
        label: 'ロジカルトーン',
        title: 'ルールを明確に伝える',
        body:
'今日から' + name + 'のお小遣いを始めます。ルールを3つ伝えます。\n' +
'\n' +
'① 金額：' + amountText + '／月。' + styleDesc + '。\n' +
'② 使い道：基本は自由。ただし、家族の決まりに反するもの（例：危ないもの）は禁止。\n' +
'③ ' + pointMsg.ronri + '\n' +
'\n' +
(amountFeel ? '※ ' + amountFeel + ' 様子を見ながら半年ごとに見直します。\n' : '※ 様子を見ながら半年ごとに見直します。\n') +
'困ったらいつでも相談してください。'
      },
      {
        cls:   't-yurui',
        label: 'ゆるカジュアル',
        title: '肩の力を抜いて伝える',
        body:
'えーっと、' + name + '、ちょっといい？\n' +
'今日からお小遣い制、始めまーす。' + amountText + 'ね。\n' +
'(' + styleDesc + 'って感じ。)\n' +
'\n' +
pointMsg.yurui + '\n' +
'\n' +
'まあ最初は失敗してOK。お父さん／お母さんも昔やらかしたから知ってる。\n' +
'分からんことあったら聞いて。じゃ、よろしくー。'
      }
    ];

    var html = patterns.map(function(p, i){
      return '<div class="gen-card ' + p.cls + '">' +
             '<span class="gen-label">パターン' + (i+1) + '：' + p.label + '</span>' +
             '<p class="gen-title">' + p.title + '</p>' +
             '<div class="gen-body" id="body-' + i + '">' + escapeHtml(p.body) + '</div>' +
             '<button class="copy-btn" onclick="copyBody(' + i + ', this)">📋 コピー</button>' +
             '</div>';
    }).join('');

    document.getElementById('results').innerHTML = html;
    document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function copyBody(i, btn) {
    var el = document.getElementById('body-' + i);
    if (!el) return;
    var text = el.textContent;
    var done = function(){
      var orig = btn.textContent;
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallback(text, done); });
    } else {
      fallback(text, done);
    }
  }
  function fallback(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
