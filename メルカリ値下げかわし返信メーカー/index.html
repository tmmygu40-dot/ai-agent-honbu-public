<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="メルカリの値下げ交渉コメントを華麗にかわす返信文を即生成。交渉タイプを選ぶだけでユーモア・きっちり・代案の3パターンが同時に出てワンタップコピーできる無料ツールです。">
  <title>メルカリ値下げかわし返信メーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --info: #2563eb;   --info-bg: #eff6ff;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .reply-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem; max-width: 600px;
      border-left: 6px solid var(--border);
    }
    .reply-card.humor { border-left-color: var(--warn); }
    .reply-card.firm  { border-left-color: var(--text-sub); }
    .reply-card.alt   { border-left-color: var(--info); }
    .reply-tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      color: #fff; margin-bottom: 0.6rem;
    }
    .reply-card.humor .reply-tag { background: var(--warn); }
    .reply-card.firm  .reply-tag { background: var(--text-sub); }
    .reply-card.alt   .reply-tag { background: var(--info); }
    .reply-text {
      white-space: pre-wrap; word-wrap: break-word;
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      margin-bottom: 0.8rem;
    }
    .copy-btn {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .copy-btn, .no-print { display: none !important; }
      .card, .reply-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ値下げかわし返信メーカー</h1>
    <p class="subtitle">交渉タイプを選ぶだけで、華麗にかわす返信を3パターン即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="kind">交渉タイプ</label>
      <select id="kind">
        <option value="vague">ふんわり「もう少し安くなりませんか」</option>
        <option value="amount">具体額提示「○○円になりませんか」</option>
        <option value="instant">即決ぶら下げ「即決します」</option>
        <option value="other">他店比較「他で安く売ってます」</option>
        <option value="cancel">キャンセル示唆「無理ならキャンセル」</option>
        <option value="shipping">送料込み要求「送料込みでお願い」</option>
      </select>
    </div>
    <div class="field">
      <label for="item">商品名（任意）</label>
      <input type="text" id="item" placeholder="例: ワイヤレスイヤホン" maxlength="40">
    </div>
    <div class="field">
      <label for="price">元の出品価格（任意・円）</label>
      <input type="number" id="price" placeholder="例: 3500" min="0" max="9999999">
      <p class="hint">入力すると小幅値引き案（5%程度）を含めた代案を生成します</p>
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">返信文を生成する</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、メルカリ公式ガイドや一般的なフリマアプリ取引マナーを参考に、目安として使いやすく整理しています。最終的な対応はご自身で内容をご確認の上ご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'mercari_kawashi_v1';

  var TEMPLATES = {
    vague: {
      humor: 'コメントありがとうございます🙇\nお気持ちはとても嬉しいのですが{itemPart}、こちらは送料・手数料込みのお値段でして…私の手元には可愛いお茶代しか残らない設定なんです🍵\nぜひこのままご検討いただけたら嬉しいです！',
      firm: 'コメント拝見いたしました。\n大変恐縮ですが{itemPart}、現状の出品価格にて販売を希望しております。\nお値下げのご希望に沿えず申し訳ございません。ご縁がございましたらよろしくお願いいたします。',
      alt:  'ご検討ありがとうございます😊\n{itemPart}申し訳ありませんが大幅なお値下げは難しい状況です。\n{altPriceLine}\nご検討いただけますと幸いです。'
    },
    amount: {
      humor: 'ご提示の金額、率直にありがとうございます！\n…ですが{itemPart}、その額だと私が泣きながら梱包することになりまして😭\nもう少し現実的な範囲でしたら検討の余地があるかもしれません。',
      firm: 'コメントありがとうございます。\n{itemPart}ご提示の金額でのお譲りは難しく、現状の出品価格にて販売を希望しております。\nお値下げのご希望に沿えず申し訳ございません。',
      alt:  'ご希望のお値段、ありがとうございます。\n{itemPart}ご提示の金額までは下げられないのですが、{altPriceLine}\nご検討よろしくお願いいたします。'
    },
    instant: {
      humor: '即決のお申し出ありがとうございます⚡\n{itemPart}スピード感は嬉しいのですが、お値段は出品価格のまま即決でお願いできますと、こちらも全力で即発送します📦💨',
      firm: 'コメントありがとうございます。\n{itemPart}即決でのご購入は大変ありがたいですが、お値引きは現状予定しておりません。\n出品価格でしたら最優先でご対応いたします。',
      alt:  '即決のご検討ありがとうございます。\n{itemPart}大幅な値引きは難しいのですが、{altPriceLine}\n上記でしたら本日中の発送も可能です。ご検討ください。'
    },
    other: {
      humor: '情報共有ありがとうございます🔍\n{itemPart}他のお店の方が安いとのこと、それはぜひそちらをご活用くださいませ✨\n価格競争に参加する元気が今ありませんで…！',
      firm: 'コメントありがとうございます。\n{itemPart}他店との価格比較によるお値下げは行っておりません。\n出品価格にてご検討いただけますと幸いです。',
      alt:  'ご検討ありがとうございます。\n{itemPart}他店価格に合わせる形でのお値下げは難しいのですが、{altPriceLine}\nこちらでご納得いただけましたら幸いです。'
    },
    cancel: {
      humor: 'コメントありがとうございます🙏\n{itemPart}キャンセルもご検討中とのこと、無理は禁物ですのでご縁がなければまた次の機会に🌱\nお値段はそのまま据え置きでお待ちしております。',
      firm: 'コメント拝見いたしました。\n{itemPart}恐れ入りますが、現状の出品価格を変更する予定はございません。\nご検討の結果、お見送りされる場合もご無理のないようご判断ください。',
      alt:  'ご検討いただきありがとうございます。\n{itemPart}大幅なお値下げは難しいのですが、{altPriceLine}\n上記でご検討いただけましたら幸いです。'
    },
    shipping: {
      humor: 'コメントありがとうございます📮\n{itemPart}送料込みのリクエスト、お気持ちは分かるのですが、こちらの出品価格はすでに送料込みの設定でして…配送業者さんへの愛もご一緒にお願いします🚚💕',
      firm: 'コメントありがとうございます。\n{itemPart}出品価格は送料込みの金額となっております。\n追加でのお値引きは難しいため、現状価格にてご検討ください。',
      alt:  'ご検討ありがとうございます。\n{itemPart}送料分の追加値引きは難しいのですが、{altPriceLine}\n上記でしたらご対応可能です。よろしくお願いいたします。'
    }
  };

  function buildItemPart(item) {
    if (!item || !item.trim()) return '';
    return '「' + item.trim() + '」につきまして、';
  }

  function buildAltPriceLine(price) {
    if (!price || isNaN(price) || price <= 0) {
      return '小幅でしたら検討の余地もあるかと思います。';
    }
    var cut = Math.max(50, Math.round(price * 0.05 / 10) * 10);
    var newPrice = price - cut;
    return '◯円 → ' + newPrice.toLocaleString('ja-JP') + '円（' + cut.toLocaleString('ja-JP') + '円のお値引き）でしたらご対応可能です。';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function fillTemplate(tpl, itemPart, altPriceLine) {
    return tpl.replace(/\{itemPart\}/g, itemPart).replace(/\{altPriceLine\}/g, altPriceLine);
  }

  function gen() {
    var kind = document.getElementById('kind').value;
    var item = document.getElementById('item').value;
    var priceVal = parseFloat(document.getElementById('price').value);
    var itemPart = buildItemPart(item);
    var altPriceLine = buildAltPriceLine(priceVal);

    var tpls = TEMPLATES[kind];
    if (!tpls) return;

    var humor = fillTemplate(tpls.humor, itemPart, altPriceLine);
    var firm  = fillTemplate(tpls.firm,  itemPart, altPriceLine);
    var alt   = fillTemplate(tpls.alt,   itemPart, altPriceLine);

    var html = ''
      + '<div class="reply-card humor">'
      +   '<span class="reply-tag">ユーモアでかわす</span>'
      +   '<div class="reply-text" id="rt-humor">' + escapeHtml(humor) + '</div>'
      +   '<button class="copy-btn" data-target="rt-humor" onclick="copyText(this)">コピー</button>'
      + '</div>'
      + '<div class="reply-card firm">'
      +   '<span class="reply-tag">きっちりお断り</span>'
      +   '<div class="reply-text" id="rt-firm">' + escapeHtml(firm) + '</div>'
      +   '<button class="copy-btn" data-target="rt-firm" onclick="copyText(this)">コピー</button>'
      + '</div>'
      + '<div class="reply-card alt">'
      +   '<span class="reply-tag">代案を提示</span>'
      +   '<div class="reply-text" id="rt-alt">' + escapeHtml(alt) + '</div>'
      +   '<button class="copy-btn" data-target="rt-alt" onclick="copyText(this)">コピー</button>'
      + '</div>';

    document.getElementById('results').innerHTML = html;

    save();

    var first = document.querySelector('.reply-card');
    if (first && first.scrollIntoView) { first.scrollIntoView({behavior:'smooth', block:'start'}); }
  }

  function copyText(btn) {
    var id = btn.getAttribute('data-target');
    var el = document.getElementById(id);
    if (!el) return;
    var text = el.textContent;
    var done = function(){
      btn.classList.add('copied');
      var orig = btn.textContent;
      btn.textContent = 'コピー済み';
      setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = orig; }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallback(text, done); });
    } else {
      fallback(text, done);
    }
  }

  function fallback(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function save() {
    try {
      var d = {
        kind: document.getElementById('kind').value,
        item: document.getElementById('item').value,
        price: document.getElementById('price').value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    } catch(e) {}
  }

  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.kind) document.getElementById('kind').value = d.kind;
      if (d.item) document.getElementById('item').value = d.item;
      if (d.price) document.getElementById('price').value = d.price;
    } catch(e) {}
  }

  restore();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
