<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="7つの質問に答えるだけで、あなたの無駄遣い傾向を歴史上の人物に例えて診断。お金の使い方のクセを楽しく客観視できる金銭感覚診断アプリです。">
  <title>金銭感覚診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 診断専用スタイル ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1.2rem;
    }
    .progress-track {
      background: var(--border); border-radius: 8px; height: 8px; overflow: hidden;
    }
    .progress-fill {
      background: var(--accent); height: 100%; border-radius: 8px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.72rem; color: var(--text-sub); text-align: right; margin-top: 0.3rem;
    }

    .option-list { list-style: none; }
    .option-item {
      display: block; padding: 0.85rem 1rem; margin-bottom: 0.6rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer; font-size: 0.95rem;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .option-item:hover { border-color: var(--accent); background: var(--accent-light); }
    .option-item:active { transform: scale(0.98); }

    .person-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .person-name { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 0.3rem; }
    .person-type { font-size: 0.88rem; font-weight: 700; color: var(--text-sub); margin-bottom: 1rem; }
    .person-desc { font-size: 0.88rem; color: var(--text); line-height: 1.7; text-align: left; margin-bottom: 1rem; }
    .person-advice { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; text-align: left; padding: 0.8rem; background: var(--accent-light); border-radius: 10px; }
    .person-advice strong { color: var(--accent); }

    .btn-share {
      display: block; width: 100%; max-width: 600px;
      margin: 0.5rem auto; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-share:hover { border-color: var(--accent); color: var(--accent); }

    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0.5rem auto; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💰 金銭感覚診断</h1>
    <p class="subtitle">7つの質問に答えるだけで、あなたのお金の使い方を歴史上の人物に例えて診断します。</p>
  </header>

  <!-- プログレスバー -->
  <div class="progress-bar" id="progress-area">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <p class="progress-text" id="progress-text">0 / 7</p>
  </div>

  <!-- 質問カード -->
  <div class="card" id="question-card">
    <p class="card-title" id="q-number">Q1</p>
    <p id="q-text" style="font-size:1rem;font-weight:700;margin-bottom:1rem;line-height:1.5;"></p>
    <ul class="option-list" id="q-options"></ul>
  </div>

  <!-- スタートボタン（初期表示） -->
  <div id="start-area" style="max-width:600px;margin:0 auto;text-align:center;">
    <button class="btn-calc" onclick="startQuiz()">診断スタート！</button>
  </div>

  <!-- 結果エリア -->
  <div id="result-area" style="display:none;">
    <div class="result-card" id="result" style="display:block;">
      <p class="person-emoji" id="r-emoji"></p>
      <p class="result-label">あなたの金銭感覚タイプ</p>
      <p class="person-name" id="r-name"></p>
      <p class="person-type" id="r-type"></p>
      <p class="person-desc" id="r-desc"></p>
      <div class="person-advice" id="r-advice"></div>
    </div>

    <div class="card" id="detail-card">
      <p class="card-title">スコア内訳</p>
      <table class="detail-table"><tbody id="db"></tbody></table>
    </div>

    <button class="btn-share no-print" onclick="shareResult()">📋 結果をコピーしてシェア</button>
    <button class="btn-retry no-print" onclick="retryQuiz()">🔄 もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断はエンターテインメント目的です。歴史上の人物像は一般的に知られるエピソードをもとに構成しています。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 質問データ ──
  var QUESTIONS = [
    {
      text: '給料日、まず何をする？',
      options: [
        { text: '欲しかったものを即購入', scores: { lavish: 2, impulse: 2 } },
        { text: '貯金用口座に先取り貯金', scores: { frugal: 2, strategic: 1 } },
        { text: '友人や家族にご馳走する', scores: { lavish: 1, generous: 2 } },
        { text: '今月の予算を細かく計画', scores: { frugal: 1, strategic: 2 } }
      ]
    },
    {
      text: 'セール会場で「70%OFF」の看板を見たら？',
      options: [
        { text: '使うかわからないけど買う。だって安い', scores: { impulse: 2, lavish: 1 } },
        { text: '本当に必要か5分考えてから判断', scores: { frugal: 2, strategic: 1 } },
        { text: '友達の分もまとめ買いしてあげる', scores: { generous: 2, lavish: 1 } },
        { text: '定価との差額を計算してニヤニヤ', scores: { strategic: 2, frugal: 1 } }
      ]
    },
    {
      text: '臨時収入10万円が入った！どうする？',
      options: [
        { text: '全額を投資や貯蓄に回す', scores: { strategic: 2, frugal: 2 } },
        { text: '半分貯金、半分ご褒美に使う', scores: { balanced: 2, strategic: 1 } },
        { text: 'パーッと豪華ディナーに全額使う', scores: { lavish: 2, impulse: 1 } },
        { text: 'みんなを誘って盛大に打ち上げ', scores: { generous: 2, lavish: 1 } }
      ]
    },
    {
      text: 'コンビニで新商品を見かけたとき？',
      options: [
        { text: 'とりあえず買う。人生は実験だ', scores: { impulse: 2, lavish: 1 } },
        { text: '値段と量を見て判断する', scores: { frugal: 2, balanced: 1 } },
        { text: 'SNSで評判を調べてから決める', scores: { strategic: 2, balanced: 1 } },
        { text: '新商品に興味がない。定番一択', scores: { frugal: 1, balanced: 2 } }
      ]
    },
    {
      text: '友人に「お金貸して」と言われたら？',
      options: [
        { text: '金額にもよるけど基本貸す', scores: { generous: 2, balanced: 1 } },
        { text: '理由を聞いてから判断する', scores: { strategic: 2, balanced: 1 } },
        { text: '貸すのは嫌なので奢りにする', scores: { generous: 1, lavish: 1 } },
        { text: '丁重にお断りする', scores: { frugal: 2, strategic: 1 } }
      ]
    },
    {
      text: '旅行の計画を立てるとき重視するのは？',
      options: [
        { text: '最高級ホテルと一流レストラン', scores: { lavish: 2, impulse: 1 } },
        { text: 'コスパ最強のプランを徹底リサーチ', scores: { strategic: 2, frugal: 1 } },
        { text: 'みんなが楽しめるかどうか', scores: { generous: 2, balanced: 1 } },
        { text: '予算内に収まるかだけ気にする', scores: { frugal: 2, balanced: 1 } }
      ]
    },
    {
      text: '老後のお金について考えると？',
      options: [
        { text: '今を楽しむ方が大事。先のことは先で', scores: { impulse: 2, lavish: 1 } },
        { text: 'すでにiDeCoやNISAを活用中', scores: { strategic: 2, frugal: 1 } },
        { text: '漠然と不安だけど具体的には何も…', scores: { balanced: 2, impulse: 1 } },
        { text: '年金と貯金でなんとかなるでしょ', scores: { balanced: 1, frugal: 1 } }
      ]
    }
  ];

  // ── 歴史上の人物タイプ ──
  var TYPES = {
    lavish: {
      emoji: '👑',
      name: '豊臣秀吉',
      type: '豪快散財タイプ',
      desc: '天下を取った秀吉は、黄金の茶室を作り、壮大な花見を催すなど、とにかくスケールの大きいお金の使い方で有名。あなたも「使うときはドーンと！」がモットーの太っ腹タイプ。周囲を喜ばせる力はピカイチですが、財布の底が見えなくなることも。',
      advice: '<strong>💡 アドバイス：</strong>秀吉も晩年は財政難に苦しみました。月の「ドーン予算」を決めて、その範囲内で豪快に楽しむのがおすすめです。'
    },
    frugal: {
      emoji: '🏯',
      name: '徳川家康',
      type: '質素倹約タイプ',
      desc: '天下統一後も質素な食事を好み、倹約を美徳とした家康。あなたも堅実にコツコツ貯める才能の持ち主。無駄遣いとは無縁で、将来への備えは万全。ただし、ケチと思われることもあるかも…？',
      advice: '<strong>💡 アドバイス：</strong>家康の倹約精神は素晴らしいですが、たまには自分へのご褒美も大切。月に1回「プチ贅沢デー」を設けてみましょう。'
    },
    strategic: {
      emoji: '🗡️',
      name: '織田信長',
      type: '戦略的投資タイプ',
      desc: '楽市楽座で経済を活性化し、鉄砲という最新兵器に大量投資した信長。あなたもお金を「増やす」ことに長けた戦略家。投資やポイ活など、お金に働いてもらう発想が得意です。',
      advice: '<strong>💡 アドバイス：</strong>信長は革新的でしたが、時に攻めすぎて失敗も。リスク分散を忘れず、「守りの資産」も確保しておきましょう。'
    },
    impulse: {
      emoji: '🎨',
      name: '足利義政',
      type: '衝動買いの美学タイプ',
      desc: '銀閣寺を建て、東山文化を花開かせた義政は、政治そっちのけで芸術に散財した人物。あなたも「ときめき」に弱く、気づけばカートが満杯になるタイプ。審美眼は確かですが、家計簿を見るのが怖くなることも。',
      advice: '<strong>💡 アドバイス：</strong>義政の美意識は素晴らしかったけど幕府は傾きました。「24時間ルール」（欲しいものは1日寝かせてから買う）を試してみて。'
    },
    generous: {
      emoji: '🌾',
      name: '上杉謙信',
      type: '義理人情・気前よしタイプ',
      desc: '「敵に塩を送る」逸話で知られる謙信は、損得より義を重んじた武将。あなたも人のためにお金を使うことに喜びを感じるタイプ。おごり上手で周囲に慕われますが、自分のことは後回しになりがち。',
      advice: '<strong>💡 アドバイス：</strong>謙信の義理堅さは美徳ですが、まず自分の生活基盤を固めてから。「先に自分の貯金、余った分で人助け」の順番を意識しましょう。'
    },
    balanced: {
      emoji: '📖',
      name: '二宮尊徳（金次郎）',
      type: 'バランス堅実タイプ',
      desc: '勤勉・倹約・推譲の三徳で農村を復興させた二宮金次郎。あなたもバランス感覚に優れ、使うところは使い、締めるところは締める理想的なお金の使い手。地味だけど確実に資産を築くタイプです。',
      advice: '<strong>💡 アドバイス：</strong>堅実さは最大の武器。さらにステップアップするなら、余剰資金の一部を「少しだけ冒険する枠」として投資に回してみるのもアリです。'
    }
  };

  var currentQ = 0;
  var scores = {};
  var started = false;

  function initScores() {
    scores = { lavish: 0, frugal: 0, strategic: 0, impulse: 0, generous: 0, balanced: 0 };
  }

  function startQuiz() {
    initScores();
    currentQ = 0;
    started = true;
    document.getElementById('start-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('question-card').style.display = 'block';
    document.getElementById('progress-area').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[currentQ];
    document.getElementById('q-number').textContent = 'Q' + (currentQ + 1);
    document.getElementById('q-text').textContent = q.text;

    var ol = document.getElementById('q-options');
    ol.innerHTML = '';
    q.options.forEach(function(opt, i) {
      var li = document.createElement('li');
      li.className = 'option-item';
      li.textContent = opt.text;
      li.onclick = function() { selectOption(i); };
      ol.appendChild(li);
    });

    // プログレスバー更新
    var pct = (currentQ / QUESTIONS.length * 100).toFixed(0);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = currentQ + ' / ' + QUESTIONS.length;
  }

  function selectOption(idx) {
    var q = QUESTIONS[currentQ];
    var optScores = q.options[idx].scores;
    for (var key in optScores) {
      scores[key] = (scores[key] || 0) + optScores[key];
    }

    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    // プログレス100%
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').textContent = QUESTIONS.length + ' / ' + QUESTIONS.length;

    // 最高スコアのタイプを判定
    var maxKey = 'balanced';
    var maxVal = 0;
    for (var key in scores) {
      if (scores[key] > maxVal) {
        maxVal = scores[key];
        maxKey = key;
      }
    }

    var person = TYPES[maxKey];

    // 質問カード非表示、結果表示
    document.getElementById('question-card').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';

    document.getElementById('r-emoji').textContent = person.emoji;
    document.getElementById('r-name').textContent = person.name;
    document.getElementById('r-type').textContent = person.type;
    document.getElementById('r-desc').textContent = person.desc;
    document.getElementById('r-advice').innerHTML = person.advice;

    // 結果カードの色（診断なので warn 統一でちょうどいい）
    var rc = document.getElementById('result');
    rc.className = 'result-card warn';
    rc.style.display = 'block';

    // スコア内訳テーブル
    var typeLabels = {
      lavish: '豪快散財', frugal: '質素倹約', strategic: '戦略投資',
      impulse: '衝動買い', generous: '義理人情', balanced: 'バランス'
    };
    var rows = [];
    var sortable = [];
    for (var k in scores) { sortable.push([k, scores[k]]); }
    sortable.sort(function(a, b) { return b[1] - a[1]; });
    sortable.forEach(function(item) {
      var isTop = item[0] === maxKey;
      rows.push('<tr' + (isTop ? ' class="hl"' : '') + '><td>' + typeLabels[item[0]] + '</td><td>' + item[1] + ' pt</td></tr>');
    });
    document.getElementById('db').innerHTML = rows.join('');

    // localStorage に保存
    try {
      localStorage.setItem('金銭感覚診断_result', JSON.stringify({
        type: maxKey, name: person.name, scores: scores, date: new Date().toISOString()
      }));
    } catch(e) {}
  }

  function shareResult() {
    var maxKey = 'balanced';
    var maxVal = 0;
    for (var key in scores) {
      if (scores[key] > maxVal) { maxVal = scores[key]; maxKey = key; }
    }
    var person = TYPES[maxKey];
    var text = '【金銭感覚診断】\n私の金銭感覚は「' + person.name + '」タイプ（' + person.type + '）でした！\n' + person.desc.substring(0, 60) + '…';

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('結果をコピーしました！');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('結果をコピーしました！');
    }
  }

  function retryQuiz() {
    document.getElementById('result-area').style.display = 'none';
    startQuiz();
  }

  // ── 初期表示 ──
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('progress-area').style.display = 'none';

  // 前回の結果があれば表示オプション
  try {
    var saved = localStorage.getItem('金銭感覚診断_result');
    if (saved) {
      var data = JSON.parse(saved);
      var d = new Date(data.date);
      var dateStr = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
      var hint = document.createElement('p');
      hint.style.cssText = 'max-width:600px;margin:0 auto 1rem;text-align:center;font-size:0.78rem;color:' + 'var(--text-sub)';
      hint.textContent = '前回の結果: ' + TYPES[data.type].name + '（' + dateStr + '）';
      document.getElementById('start-area').insertBefore(hint, document.getElementById('start-area').firstChild);
    }
  } catch(e) {}
  </script>
