<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5つの質問に答えるだけで、あなたの散財タイプを歴史の暴君に例えて30秒で診断。金銭感覚のクセを楽しく発見できるセルフチェックアプリです。">
  <title>散財タイプ暴君診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── 診断専用スタイル ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem;
      background: var(--border); border-radius: 6px; height: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 6px;
      transition: width 0.3s ease;
    }
    .progress-text {
      max-width: 600px; margin: 0 auto 0.5rem;
      font-size: 0.75rem; color: var(--text-sub); text-align: right;
      padding: 0 0.2rem;
    }
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; text-align: center;
    }
    .choices { list-style: none; }
    .choices li {
      padding: 0.85rem 1rem; margin-bottom: 0.6rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer; font-size: 0.95rem;
      line-height: 1.4; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choices li:hover { border-color: var(--accent); background: var(--accent-light); }
    .choices li:last-child { margin-bottom: 0; }

    .tyrant-emoji { font-size: 3rem; margin-bottom: 0.3rem; }
    .tyrant-name { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.3rem; color: var(--accent); }
    .tyrant-type { font-size: 0.88rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.8rem; }
    .tyrant-desc { font-size: 0.92rem; line-height: 1.6; color: var(--text); margin-bottom: 1rem; text-align: left; }
    .tyrant-advice {
      font-size: 0.88rem; line-height: 1.5; color: var(--text-sub);
      background: var(--accent-light); padding: 0.8rem 1rem;
      border-radius: 10px; text-align: left;
    }
    .tyrant-advice strong { color: var(--accent); }

    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); font-size: 0.78rem; }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>👑 散財タイプ暴君診断</h1>
    <p class="subtitle">5つの質問に答えるだけ。あなたの金銭感覚を歴史の暴君に例えて30秒で診断します。</p>
  </header>

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="card" style="text-align:center">
      <p style="font-size:2.5rem;margin-bottom:0.5rem">👑💰</p>
      <p style="font-size:1.05rem;font-weight:700;margin-bottom:0.8rem">あなたの散財タイプは<br>どの暴君？</p>
      <p style="font-size:0.85rem;color:var(--text-sub);line-height:1.5;margin-bottom:0.3rem">
        たった5問・約30秒で完了。<br>歴史の暴君たちがあなたのお金の使い方を教えてくれます。
      </p>
    </div>
    <button class="btn-calc" onclick="startQuiz()">診断スタート！</button>
  </div>

  <!-- 質問画面 -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-text" id="prog-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="card">
      <p class="question-text" id="q-text"></p>
      <ul class="choices" id="q-choices"></ul>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" style="display:none">
    <div class="result-card" id="result" style="display:block;border-color:var(--accent);background:var(--accent-light)">
      <p class="result-label">あなたの散財タイプは…</p>
      <p class="tyrant-emoji" id="r-emoji"></p>
      <p class="tyrant-name" id="r-name"></p>
      <p class="tyrant-type" id="r-type"></p>
      <p class="tyrant-desc" id="r-desc"></p>
      <div class="tyrant-advice" id="r-advice"></div>
    </div>

    <div class="card" id="detail">
      <p class="card-title">スコア内訳</p>
      <table class="detail-table"><tbody id="db"></tbody></table>
    </div>

    <button class="btn-calc" onclick="copyResult()">📋 結果をコピー</button>
    <button class="btn-calc no-print" style="background:var(--card);color:var(--accent);border:2px solid var(--accent);box-shadow:none;margin-top:-0.4rem" onclick="retryQuiz()">🔄 もう一度診断する</button>
  </div>

  <!-- 診断履歴 -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">診断履歴</p>
    <div id="history-list"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── 質問データ ── */
  var QUESTIONS = [
    {
      text: '臨時収入10万円が入った！まず何をする？',
      choices: [
        { text: '全額すぐ使う！欲しかったものを即購入', scores: [3,0,1,2,0,1] },
        { text: '高級レストランや旅行など"体験"に使う', scores: [1,3,0,0,1,2] },
        { text: '人へのプレゼントやおごりに使う', scores: [0,1,2,0,3,1] },
        { text: 'とりあえず貯金して、使い道はゆっくり考える', scores: [0,0,0,3,1,0] }
      ]
    },
    {
      text: 'ネットショッピング中、カートに入れた商品がセール対象に。どうする？',
      choices: [
        { text: '迷わず即購入。むしろ色違いも追加', scores: [3,1,0,1,0,2] },
        { text: '「この機会に」と前から気になってた高級品も一緒にポチる', scores: [1,3,1,0,0,2] },
        { text: '友達にも教えて一緒に買おうと誘う', scores: [0,0,2,0,3,1] },
        { text: 'セールに惑わされず、本当に必要か冷静に判断', scores: [0,0,0,3,1,0] }
      ]
    },
    {
      text: '月末、今月の出費を振り返ると予算オーバー。どう思う？',
      choices: [
        { text: '「まあ来月頑張ればいいか」と気にしない', scores: [3,1,0,0,1,2] },
        { text: '「でも良い買い物だったし」と満足感で相殺', scores: [1,3,1,1,0,1] },
        { text: '「みんなに奢ったからしょうがない」と思う', scores: [0,0,2,0,3,0] },
        { text: '家計簿を見直して来月の予算を立て直す', scores: [0,0,0,3,0,0] }
      ]
    },
    {
      text: '友達との食事会。お店選びで譲れないポイントは？',
      choices: [
        { text: '新しくてSNS映えする話題のお店', scores: [2,2,0,0,1,3] },
        { text: '高級感があって特別な気分になれるお店', scores: [1,3,0,0,1,2] },
        { text: 'みんなが喜ぶお店なら何でもOK（自分が多めに払ってもいい）', scores: [0,0,2,0,3,0] },
        { text: 'コスパが良くて美味しいお店', scores: [0,0,0,3,0,0] }
      ]
    },
    {
      text: '「お金があったら何に使う？」と聞かれたら？',
      choices: [
        { text: '最新ガジェット・ブランド品など「モノ」をどんどん買いたい', scores: [3,1,0,1,0,2] },
        { text: '豪邸や高級車など「一生モノの贅沢」を手に入れたい', scores: [0,3,1,0,0,2] },
        { text: '国や街をもっと良くするプロジェクトに投資したい', scores: [0,1,3,1,0,0] },
        { text: '大切な人たちを喜ばせたい。盛大にパーティーを開く', scores: [0,0,1,0,3,1] },
        { text: 'まず資産運用。お金を増やしてから考える', scores: [0,0,0,3,0,0] }
      ]
    }
  ];

  /* ── 暴君タイプデータ ── */
  /* scores index: [0]ネロ [1]ルイ14世 [2]始皇帝 [3]徳川家康 [4]ヘンリー8世 [5]クレオパトラ */
  var TYRANTS = [
    {
      name: 'ネロ（ローマ皇帝）',
      emoji: '🔥',
      type: '衝動全開タイプ',
      desc: 'あなたは「欲しい！」と思った瞬間に財布のヒモが切れるネロ型。ローマを燃やしたとも言われる暴君のように、お金もメラメラ燃えていきます。買い物のスピード感は天下一品ですが、気がつくと「あれ、今月もう残高が…？」となりがちです。',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>「欲しい！」と思ったら24時間待つルールを導入してみましょう。翌日も欲しければ本物の欲求、冷めたら衝動です。'
    },
    {
      name: 'ルイ14世（フランス国王）',
      emoji: '🏰',
      type: '贅沢追求タイプ',
      desc: 'あなたはヴェルサイユ宮殿を建てたルイ14世型。「良いもの」「本物」へのこだわりが強く、安物では満足できない性格です。品質を求める姿勢は立派ですが、気づけば身の丈を超えた出費に…。「太陽王」のプライドが財布を軽くしています。',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>贅沢は月に1回だけの「ご褒美デー」に集中させましょう。メリハリをつければ満足度も上がります。'
    },
    {
      name: '始皇帝（中国・秦）',
      emoji: '🏗️',
      type: '壮大プロジェクト型',
      desc: 'あなたは万里の長城を築いた始皇帝型。スケールの大きな計画やプロジェクトにお金をかけたがるタイプです。「これは投資だから」が口癖で、自分の理想実現のためなら出費を惜しみません。壮大なビジョンは素晴らしいですが、足元の生活費は大丈夫？',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>大きな出費の前に「これは本当に投資？それとも浪費？」を5秒だけ自問してみましょう。'
    },
    {
      name: '徳川家康',
      emoji: '🏯',
      type: '堅実倹約タイプ',
      desc: 'あなたは天下統一後も質素倹約を貫いた徳川家康型。お金の管理がしっかりしていて、無駄遣いとは無縁です。「暴君」というより「賢君」に近いあなたは、コスパを重視し、将来への備えも万全。ただし、たまにはケチと言われることも…？',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>十分堅実なあなた。たまには自分へのご褒美も忘れずに。使うべき時に使うのも大切な金銭感覚です。'
    },
    {
      name: 'ヘンリー8世（イングランド王）',
      emoji: '🍗',
      type: '人付き合い散財タイプ',
      desc: 'あなたは豪華な宴を開き続けたヘンリー8世型。人に奢るのが好きで、「みんなが楽しければOK！」と気前よくお金を使います。人望は厚いですが、交際費が家計を圧迫しがち。6人の妻を持った王のように、出費の相手も次々と増えていきます。',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>毎月の「おごり予算」を先に決めておきましょう。上限があれば罪悪感なく楽しめます。'
    },
    {
      name: 'クレオパトラ（エジプト女王）',
      emoji: '💎',
      type: 'トレンド重視タイプ',
      desc: 'あなたは真珠を酢に溶かして飲んだとも伝わるクレオパトラ型。流行や話題のものに敏感で、「今しかない！」「限定品！」に弱いタイプです。センスは抜群ですが、流行を追い続けると出費も止まりません。魅力は最大の武器であり、最大の出費源です。',
      advice: '<strong>💡 暴君からの節約アドバイス：</strong>「限定」「今だけ」に反応したら深呼吸。本当に欲しいのか、雰囲気に流されているだけか見極めましょう。'
    }
  ];

  /* ── 診断ロジック ── */
  var currentQ = 0;
  var totalScores = [0,0,0,0,0,0];

  function startQuiz() {
    currentQ = 0;
    totalScores = [0,0,0,0,0,0];
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[currentQ];
    var total = QUESTIONS.length;
    document.getElementById('prog-text').textContent = (currentQ + 1) + ' / ' + total;
    document.getElementById('prog-fill').style.width = ((currentQ + 1) / total * 100) + '%';
    document.getElementById('q-text').textContent = 'Q' + (currentQ + 1) + '. ' + q.text;
    var ul = document.getElementById('q-choices');
    ul.innerHTML = '';
    q.choices.forEach(function(c) {
      var li = document.createElement('li');
      li.textContent = c.text;
      li.onclick = function() { selectAnswer(c.scores); };
      ul.appendChild(li);
    });
  }

  function selectAnswer(scores) {
    for (var i = 0; i < scores.length; i++) {
      totalScores[i] += scores[i];
    }
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResultScreen();
    }
  }

  function showResultScreen() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    var maxIdx = 0;
    for (var i = 1; i < totalScores.length; i++) {
      if (totalScores[i] > totalScores[maxIdx]) maxIdx = i;
    }

    var t = TYRANTS[maxIdx];
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent = t.name;
    document.getElementById('r-type').textContent = '〜 ' + t.type + ' 〜';
    document.getElementById('r-desc').textContent = t.desc;
    document.getElementById('r-advice').innerHTML = t.advice;

    /* スコア内訳 */
    var tbody = document.getElementById('db');
    tbody.innerHTML = '';
    var names = ['ネロ','ルイ14世','始皇帝','徳川家康','ヘンリー8世','クレオパトラ'];
    var maxScore = Math.max.apply(null, totalScores);
    for (var j = 0; j < totalScores.length; j++) {
      var tr = document.createElement('tr');
      if (j === maxIdx) tr.className = 'hl';
      tr.innerHTML = '<td>' + names[j] + '</td><td>' + totalScores[j] + ' pt' + (j === maxIdx ? ' 🏆' : '') + '</td>';
      tbody.appendChild(tr);
    }

    saveHistory(t.name, t.type);
    renderHistory();
  }

  function retryQuiz() {
    document.getElementById('result-screen').style.display = 'none';
    startQuiz();
  }

  function copyResult() {
    var name = document.getElementById('r-name').textContent;
    var type = document.getElementById('r-type').textContent;
    var text = '【散財タイプ暴君診断】\n' +
               '私の散財タイプは「' + name + '」でした！\n' +
               type + '\n' +
               '👑 あなたも診断してみよう';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.querySelector('#result-screen .btn-calc');
        var orig = btn.textContent;
        btn.textContent = '✅ コピーしました！';
        setTimeout(function() { btn.textContent = orig; }, 1500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.querySelector('#result-screen .btn-calc');
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() { btn.textContent = orig; }, 1500);
    }
  }

  /* ── localStorage 履歴 ── */
  var STORAGE_KEY = 'tyrant_diagnosis_history';

  function saveHistory(name, type) {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    history.unshift({
      name: name,
      type: type,
      date: new Date().toLocaleString('ja-JP')
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    var card = document.getElementById('history-card');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    var list = document.getElementById('history-list');
    list.innerHTML = history.map(function(h) {
      return '<div class="history-item"><span>' + h.name + '</span><span class="history-date">' + h.date + '</span></div>';
    }).join('');
  }

  /* 初期表示で履歴があれば表示 */
  renderHistory();
  </script>
