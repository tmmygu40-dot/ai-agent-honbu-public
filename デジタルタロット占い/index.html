<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="タロット1枚引きで今日の指針とラッキーアクションを30秒で診断。大アルカナ22枚からランダムに選ばれたカードが示すあなたの今日の指針。">
  <title>デジタルタロット占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #9370db;
      --accent-light: #f3f0fb;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #7851c0, 0 6px 16px rgba(147,112,219,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #7851c0, 0 2px 8px rgba(147,112,219,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card { background: var(--accent-light); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; color: var(--accent); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
      color: var(--accent);
    }

    /* ── タロット詳細テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:first-child { font-weight: 600; color: var(--text); }
    .detail-table td:last-child { text-align: left; color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果コピーボタン ── */
    .btn-copy {
      display: inline-block; margin-top: 0.8rem; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── 履歴リスト ── */
    .history-item {
      display: flex; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      align-items: center; font-size: 0.82rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); font-size: 0.75rem; min-width: 60px; }
    .history-card { font-weight: 600; color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>✨ デジタルタロット占い</h1>
    <p class="subtitle">今日の指針とラッキーアクションを30秒で診断</p>
  </header>

  <!-- 引くボタン -->
  <button class="btn-calc" onclick="drawCard()">🎴 カードを引く</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">今日のカード</p>
    <p class="result-value" id="rv">—</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
    <button class="btn-copy" onclick="copyResult()">📋 コピーする</button>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">最近の引き</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 このツールは占いの一種です。タロットカードの伝統的な解釈を参考に、心理的なサポートや日々の指針の参考として作られています。人生の重要な決定は、信頼できる専門家や自分の直感と判断を大切にしてください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── タロット大アルカナ 22枚のカードデータ ──
  var TAROT_CARDS = [
    { name: '愚者（ザ・フール）', meaning: '新しい始まり・冒険・自由', action: 'これまでの枠を一度外して、新しい視点から物事を見てみましょう' },
    { name: '魔術師（ザ・マジシャン）', meaning: '創造・行動・力の活用', action: '手持ちのスキルや資源を活かして、主体的に動く日です' },
    { name: '女祭司（ザ・プリエステス）', meaning: '直感・秘密・内なる知識', action: '今日は理屈ではなく、心の声に耳を傾けてみて' },
    { name: '皇后（ザ・エンプレス）', meaning: '豊かさ・創造・愛', action: '周りの人や物を大切に。優しさが運を呼ぶ一日' },
    { name: '皇帝（ザ・エンペラー）', meaning: 'リーダーシップ・力・安定', action: '堂々と自分の意志を示しましょう。人は付いてきます' },
    { name: '教皇（ザ・ハイロファント）', meaning: '知識・伝統・学び', action: '知識を深めたり、誰かに教えたり、学ぶ日です' },
    { name: '恋人（ザ・ラバーズ）', meaning: '選択・結合・調和', action: '重要な選択肢があれば、心の赴くままに決めて' },
    { name: '戦車（ザ・チャリオット）', meaning: '勝利・意志・前進', action: '迷わず前に進みましょう。目標へ一歩近づく日' },
    { name: '力（ストレングス）', meaning: '内面の力・勇気・忍耐', action: '自分を信じて。困難も力強くクリアできる日です' },
    { name: '隠者（ザ・ハーミット）', meaning: '内省・平和・知恵', action: '一人の時間を大切に。自分と向き合う日にしましょう' },
    { name: '運命の輪（ホイール・オブ・フォーチュン）', meaning: '変化・周期・人生の流れ', action: '流れに身を任せて。変化は新しい可能性を呼びます' },
    { name: '正義（ジャスティス）', meaning: '公正・バランス・判断', action: '公平な判断が必要な場面があれば、心に従ってください' },
    { name: '吊るされた人（ザ・ハングドマン）', meaning: '休止・視点の変化・気づき', action: '一度立ち止まって。新しい視点が見えてきます' },
    { name: '死神（デス）', meaning: '変容・終わりと始まり・解放', action: '何かの終わりが来ています。次のステージへ進みましょう' },
    { name: '節制（テンペランス）', meaning: 'バランス・調和・癒し', action: '心と体のバランスを整える。瞑想や散歩もおすすめ' },
    { name: '悪魔（ザ・デビル）', meaning: '束縛・欲望・執着', action: '執着していることを手放してみては。自由になります' },
    { name: '塔（ザ・タワー）', meaning: '崩壊・変化・目覚め', action: '大きな変化が起きるかも。柔軟に対応してください' },
    { name: '星（ザ・スター）', meaning: '希望・理想・インスピレーション', action: 'あなたの夢や理想に向かって、一歩踏み出してください' },
    { name: '月（ザ・ムーン）', meaning: '幻想・無意識・神秘', action: '感情や直感を大切に。不安でも大丈夫、一時のことです' },
    { name: '太陽（ザ・サン）', meaning: '成功・喜び・生命力', action: '今日は最高の一日。明るく前向きに過ごしてください' },
    { name: '審判（ジャッジメント）', meaning: '覚醒・呼び出し・再生', action: '新しい章の幕開け。自信を持って進みましょう' },
    { name: '世界（ザ・ワールド）', meaning: '完成・統一・達成', action: 'あるサイクルの完成。新しい目標を立てる時期です' }
  ];

  // ── localStorage から履歴を読み込む ──
  function getHistory() {
    var stored = localStorage.getItem('tarot-history');
    return stored ? JSON.parse(stored) : [];
  }

  // ── 履歴を保存 ──
  function saveHistory(history) {
    localStorage.setItem('tarot-history', JSON.stringify(history));
  }

  // ── カードを引く ──
  function drawCard() {
    var idx = Math.floor(Math.random() * TAROT_CARDS.length);
    var card = TAROT_CARDS[idx];

    // 結果表示
    showResult(card);

    // 履歴に追加
    var history = getHistory();
    var now = new Date();
    var timeStr = now.getFullYear() + '-' + ('0' + (now.getMonth() + 1)).slice(-2) + '-' + ('0' + now.getDate()).slice(-2)
                + ' ' + ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2);
    history.unshift({ time: timeStr, card: card.name });
    if (history.length > 5) history.pop();
    saveHistory(history);

    // 履歴表示更新
    showHistory(history);
  }

  // ── 結果表示 ──
  function showResult(card) {
    document.getElementById('rv').textContent = card.name;
    var rows = [
      ['意味', card.meaning],
      ['ラッキーアクション', card.action]
    ];
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('result').style.display = '';
  }

  // ── 履歴表示 ──
  function showHistory(history) {
    if (history.length === 0) { document.getElementById('history-card').style.display = 'none'; return; }
    var html = history.map(function(h){
      return '<div class="history-item"><span class="history-date">' + h.time + '</span><span class="history-card">' + h.card + '</span></div>';
    }).join('');
    document.getElementById('history-list').innerHTML = html;
    document.getElementById('history-card').style.display = '';
  }

  // ── 結果をコピー ──
  function copyResult() {
    var name = document.getElementById('rv').textContent;
    var text = '今日のタロット: ' + name;
    navigator.clipboard.writeText(text).then(function(){
      alert('コピーしました！\n' + text);
    }).catch(function(){
      // Fallback: テキスト選択でコピー
      var el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      alert('コピーしました！\n' + text);
    });
  }

  // ── 初期化：履歴を表示 ──
  window.addEventListener('load', function(){
    var history = getHistory();
    if (history.length > 0) showHistory(history);
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
