<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ判断アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>仕入れ判断アプリ</h1>
    <p class="subtitle">仕入れ価格変動と在庫リスクを即判断</p>

    <div class="form-card">
      <h2>品目を登録</h2>
      <div class="form-group">
        <label for="itemName">品目名</label>
        <input type="text" id="itemName" placeholder="例：小麦粉 1kg" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="normalPrice">通常仕入れ価格（円）</label>
          <input type="number" id="normalPrice" placeholder="例：500" min="0" />
        </div>
        <div class="form-group">
          <label for="currentPrice">現在の仕入れ価格（円）</label>
          <input type="number" id="currentPrice" placeholder="例：580" min="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="stock">現在の在庫数</label>
          <input type="number" id="stock" placeholder="例：30" min="0" />
        </div>
        <div class="form-group">
          <label for="stockUnit">単位</label>
          <input type="text" id="stockUnit" placeholder="例：袋" />
        </div>
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：A社のみ値上がり" />
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
      <p id="errorMsg" class="error-msg"></p>
    </div>

    <div class="list-section">
      <div class="list-header">
        <h2>登録一覧</h2>
        <span id="itemCount" class="item-count">0件</span>
      </div>
      <div id="itemList" class="item-list">
        <p class="empty-msg">まだ品目が登録されていません</p>
      </div>
    </div>

    <div class="legend">
      <h3>リスク判定基準</h3>
      <div class="legend-items">
        <span class="badge risk-high">高リスク</span>価格上昇 10%以上
        <span class="badge risk-mid">中リスク</span>価格上昇 5〜10%
        <span class="badge risk-low">低リスク</span>価格上昇 5%未満
        <span class="badge risk-down">価格低下</span>通常より安い
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
