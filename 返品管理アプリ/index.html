<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返品管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>返品管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規受付登録</h2>
      <form id="returnForm">
        <div class="form-group">
          <label for="productName">商品名 <span class="required">*</span></label>
          <input type="text" id="productName" placeholder="商品名を入力" required>
        </div>
        <div class="form-group">
          <label for="reason">返品理由 <span class="required">*</span></label>
          <select id="reason" required>
            <option value="">選択してください</option>
            <option value="商品不良">商品不良</option>
            <option value="サイズ違い">サイズ違い</option>
            <option value="イメージ違い">イメージ違い</option>
            <option value="破損">破損</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="status">対応状況 <span class="required">*</span></label>
          <select id="status" required>
            <option value="受付中">受付中</option>
            <option value="返金済">返金済</option>
            <option value="交換済">交換済</option>
            <option value="対応不可">対応不可</option>
          </select>
        </div>
        <div class="form-group">
          <label for="refundAmount">返金額（円）</label>
          <input type="number" id="refundAmount" placeholder="0" min="0" value="0">
        </div>
        <div class="form-group">
          <label for="note">備考</label>
          <input type="text" id="note" placeholder="メモ（任意）">
        </div>
        <button type="submit" class="btn-primary">登録する</button>
      </form>
    </section>

    <!-- 集計 -->
    <section class="summary-section">
      <h2>集計</h2>
      <div class="summary-cards">
        <div class="card">
          <div class="card-label">総件数</div>
          <div class="card-value" id="totalCount">0<span class="unit">件</span></div>
        </div>
        <div class="card">
          <div class="card-label">返金合計</div>
          <div class="card-value" id="totalRefund">¥0</div>
        </div>
      </div>
      <h3>理由別件数</h3>
      <div id="reasonSummary" class="reason-summary"></div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>受付一覧</h2>
        <div class="filter-group">
          <select id="filterStatus">
            <option value="">すべて</option>
            <option value="受付中">受付中</option>
            <option value="返金済">返金済</option>
            <option value="交換済">交換済</option>
            <option value="対応不可">対応不可</option>
          </select>
        </div>
      </div>
      <div id="returnList" class="return-list">
        <p class="empty-msg">受付記録がありません</p>
      </div>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>対応状況を変更</h2>
      <div class="form-group">
        <label for="editStatus">対応状況</label>
        <select id="editStatus">
          <option value="受付中">受付中</option>
          <option value="返金済">返金済</option>
          <option value="交換済">交換済</option>
          <option value="対応不可">対応不可</option>
        </select>
      </div>
      <div class="form-group">
        <label for="editRefund">返金額（円）</label>
        <input type="number" id="editRefund" min="0">
      </div>
      <div class="modal-buttons">
        <button id="editSave" class="btn-primary">保存</button>
        <button id="editCancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
