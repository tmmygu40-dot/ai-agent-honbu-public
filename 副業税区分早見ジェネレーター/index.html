<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="副業の種類と年間収入を入力するだけで、確定申告の所得区分・申告要否・住民税の納付方法・会社バレ対策の注意点をひと目で確認できる早見ジェネレーターです。">
  <title>副業税区分早見ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 注意点リスト ── */
    .tips-list { list-style: none; padding: 0; }
    .tips-list li {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.6; color: var(--text);
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list li::before { content: '💡 '; }
    .tips-list .warn-tip::before { content: '⚠️ '; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💼 副業税区分早見ジェネレーター</h1>
    <p class="subtitle">副業の種類と収入を入れるだけで、申告区分とバレない対策がすぐ分かります。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="sideJobType">副業の種類</label>
      <select id="sideJobType">
        <option value="">選んでください</option>
        <option value="salary">給与所得（アルバイト・パート）</option>
        <option value="freelance">雑所得（フリーランス・単発案件）</option>
        <option value="business">事業所得（継続的な事業）</option>
        <option value="rental">不動産所得（家賃収入）</option>
        <option value="stock">譲渡所得・配当所得（株・投資）</option>
        <option value="crypto">雑所得（暗号資産・仮想通貨）</option>
        <option value="platform">雑所得（フリマ・アフィリエイト等）</option>
      </select>
    </div>
    <div class="field">
      <label for="income">年間の副業収入（売上）</label>
      <input type="number" id="income" placeholder="例: 500000" min="0">
      <p class="hint">経費を引く前の金額（円）</p>
    </div>
    <div class="field">
      <label for="expense">年間の経費（任意）</label>
      <input type="number" id="expense" placeholder="例: 100000" min="0" value="0">
      <p class="hint">交通費・通信費・消耗品など。給与所得の場合は0でOK</p>
    </div>
    <div class="field">
      <label for="hasMainJob">本業の勤め先</label>
      <select id="hasMainJob">
        <option value="company">会社員（給与所得者）</option>
        <option value="public">公務員</option>
        <option value="none">本業なし（副業のみ）</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">判定する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">区分・申告の内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注意点カード -->
  <div class="card" id="tipsCard" style="display:none">
    <p class="card-title">会社バレ対策 & 注意点</p>
    <ul class="tips-list" id="tipsList"></ul>
  </div>

  <!-- 住民税カード -->
  <div class="card" id="taxCard" style="display:none">
    <p class="card-title">住民税の納付方法</p>
    <div id="taxContent" style="font-size:0.88rem;line-height:1.7;color:var(--text);"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、国税庁・総務省の公開情報を参考に、2025年度時点の目安として整理しています。正確な判断は税理士や最寄りの税務署にご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── 副業種別データ ── */
  var JOB_DATA = {
    salary: {
      name: '給与所得',
      category: '給与所得',
      desc: 'アルバイト・パートなど雇用契約で受け取る給与',
      canDeductExpense: false,
      normalCollection: false
    },
    freelance: {
      name: '雑所得（フリーランス）',
      category: '雑所得',
      desc: '業務委託・単発案件・クラウドソーシングなど',
      canDeductExpense: true,
      normalCollection: true
    },
    business: {
      name: '事業所得',
      category: '事業所得',
      desc: '継続的・反復的に行う事業（開業届済み）',
      canDeductExpense: true,
      normalCollection: true
    },
    rental: {
      name: '不動産所得',
      category: '不動産所得',
      desc: '家賃収入・駐車場収入など',
      canDeductExpense: true,
      normalCollection: true
    },
    stock: {
      name: '譲渡所得・配当所得',
      category: '譲渡/配当所得',
      desc: '株式売買益・配当金・投資信託の分配金',
      canDeductExpense: false,
      normalCollection: true
    },
    crypto: {
      name: '雑所得（暗号資産）',
      category: '雑所得',
      desc: 'ビットコイン等の売却益・交換差益',
      canDeductExpense: true,
      normalCollection: true
    },
    platform: {
      name: '雑所得（プラットフォーム）',
      category: '雑所得',
      desc: 'フリマ出品・アフィリエイト・YouTube収益など',
      canDeductExpense: true,
      normalCollection: true
    }
  };

  function calc() {
    var typeKey = document.getElementById('sideJobType').value;
    var income = parseFloat(document.getElementById('income').value);
    var expense = parseFloat(document.getElementById('expense').value) || 0;
    var mainJob = document.getElementById('hasMainJob').value;

    if (!typeKey) { showErr('副業の種類を選んでください'); return; }
    if (isNaN(income) || income < 0) { showErr('年間の副業収入を入力してください'); return; }

    var job = JOB_DATA[typeKey];
    var profit = job.canDeductExpense ? income - expense : income;
    if (profit < 0) profit = 0;

    // ── 確定申告の要否判定 ──
    var needTaxReturn = false;
    var needMunicipalReturn = false;
    var taxReturnReason = '';

    if (mainJob === 'none') {
      // 本業なし：基礎控除48万円を超えたら確定申告
      if (profit > 480000) {
        needTaxReturn = true;
        taxReturnReason = '所得が48万円（基礎控除）を超えるため確定申告が必要';
      } else {
        taxReturnReason = '所得48万円以下のため確定申告は不要（住民税申告は別途確認）';
        if (profit > 0) needMunicipalReturn = true;
      }
    } else if (typeKey === 'salary') {
      // 給与所得が2箇所以上
      if (income > 200000) {
        needTaxReturn = true;
        taxReturnReason = '副業の給与収入が20万円を超えるため確定申告が必要';
      } else {
        taxReturnReason = '副業の給与収入が20万円以下のため確定申告は不要（住民税申告は必要）';
        needMunicipalReturn = true;
      }
    } else if (typeKey === 'stock') {
      // 特定口座（源泉徴収あり）なら申告不要の場合も
      if (profit > 200000) {
        needTaxReturn = true;
        taxReturnReason = '所得が20万円を超えるため確定申告が必要（特定口座・源泉徴収ありなら申告不要の場合も）';
      } else {
        taxReturnReason = '所得20万円以下のため確定申告は不要（住民税申告は必要）';
        needMunicipalReturn = true;
      }
    } else {
      // 雑所得・事業所得・不動産所得
      if (profit > 200000) {
        needTaxReturn = true;
        taxReturnReason = '所得が20万円を超えるため確定申告が必要';
      } else {
        taxReturnReason = '所得20万円以下のため確定申告は不要（住民税申告は必要）';
        if (profit > 0) needMunicipalReturn = true;
      }
    }

    // ── レベル判定 ──
    var level, evalText;
    if (!needTaxReturn && !needMunicipalReturn) {
      level = 'ok';
      evalText = '申告の必要なし';
    } else if (!needTaxReturn && needMunicipalReturn) {
      level = 'warn';
      evalText = '住民税の申告が必要';
    } else {
      level = 'ng';
      evalText = '確定申告が必要';
    }

    // ── 結果表示 ──
    showResult(level, job.category, taxReturnReason);
    document.getElementById('re').textContent = evalText;

    // ── 内訳 ──
    var rows = [
      ['副業の種類', job.name],
      ['所得区分', job.category],
      ['年間収入（売上）', fmt(income) + ' 円']
    ];
    if (job.canDeductExpense) {
      rows.push(['経費', fmt(expense) + ' 円']);
      rows.push(['所得（収入−経費）', fmt(profit) + ' 円', true]);
    } else {
      rows.push(['所得', fmt(profit) + ' 円', true]);
    }
    rows.push(['確定申告', needTaxReturn ? '必要' : '不要']);
    rows.push(['住民税申告', needMunicipalReturn ? '必要（別途）' : needTaxReturn ? '確定申告で自動' : '不要']);
    showDetail(rows);

    // ── 注意点 ──
    var tips = buildTips(typeKey, job, mainJob, profit, needTaxReturn);
    showTips(tips);

    // ── 住民税カード ──
    showTaxCard(typeKey, job, mainJob);

    // ── localStorage保存 ──
    saveToStorage(typeKey, income, expense, mainJob);
  }

  function buildTips(typeKey, job, mainJob, profit, needTaxReturn) {
    var tips = [];

    // 会社バレ対策
    if (mainJob === 'company' || mainJob === 'public') {
      if (job.normalCollection) {
        tips.push('住民税を「普通徴収（自分で納付）」に切り替えると、副業分の住民税が会社の給与天引きに乗らず、バレにくくなります。');
      }
      if (typeKey === 'salary') {
        tips.push({ text: '給与所得の副業は住民税の普通徴収を選べない自治体が多く、会社にバレやすい副業タイプです。', warn: true });
      }
      if (mainJob === 'public') {
        tips.push({ text: '公務員は原則副業禁止です。不動産投資・株式投資など一部を除き、任命権者の許可が必要です。', warn: true });
      }
    }

    // 申告関連
    if (needTaxReturn) {
      tips.push('確定申告の期限は毎年2月16日〜3月15日。e-Taxなら自宅からオンラインで提出できます。');
      if (typeKey === 'business') {
        tips.push('開業届を出して青色申告すると、最大65万円の青色申告特別控除が受けられます。');
      }
    }

    if (typeKey === 'freelance' || typeKey === 'platform' || typeKey === 'crypto') {
      tips.push('経費の領収書・レシートは必ず保管。交通費・通信費・PCなど業務に使ったものが対象です。');
    }

    if (profit > 0 && profit <= 200000 && mainJob !== 'none') {
      tips.push('「20万円以下で確定申告不要」は所得税の話。住民税はお住まいの市区町村へ別途申告が必要です。');
    }

    if (typeKey === 'stock') {
      tips.push('特定口座（源泉徴収あり）で取引している場合、確定申告は原則不要です。ただし損益通算や繰越控除を使いたい場合は申告が必要です。');
    }

    if (typeKey === 'crypto') {
      tips.push({ text: '暗号資産の利益は「雑所得」扱い。損失の繰越控除は認められていません（2025年度時点）。', warn: true });
    }

    return tips;
  }

  function showTips(tips) {
    var card = document.getElementById('tipsCard');
    var list = document.getElementById('tipsList');
    if (tips.length === 0) { card.style.display = 'none'; return; }
    list.innerHTML = tips.map(function(t) {
      if (typeof t === 'string') return '<li>' + t + '</li>';
      return '<li class="warn-tip">' + t.text + '</li>';
    }).join('');
    card.style.display = 'block';
  }

  function showTaxCard(typeKey, job, mainJob) {
    var card = document.getElementById('taxCard');
    var content = document.getElementById('taxContent');

    if (mainJob === 'none') {
      card.style.display = 'none';
      return;
    }

    var html = '';
    if (job.normalCollection) {
      html += '<p style="margin-bottom:0.8rem;"><strong>普通徴収（自分で納付）がおすすめ</strong></p>';
      html += '<p>確定申告書の「住民税に関する事項」で<strong>「自分で納付」にチェック</strong>を入れましょう。</p>';
      html += '<p style="margin-top:0.5rem;">これで副業分の住民税は自宅に届く納付書で支払い → 会社の給与明細に反映されません。</p>';
      if (typeKey === 'salary') {
        html += '<p style="margin-top:0.5rem;color:var(--ng);font-weight:700;">※ ただし給与所得は自治体によっては普通徴収を選べない場合があります。</p>';
      }
    } else {
      html += '<p>給与所得の副業は、住民税が本業の会社でまとめて天引き（特別徴収）されるのが原則です。</p>';
      html += '<p style="margin-top:0.5rem;color:var(--warn);font-weight:700;">自治体によっては普通徴収への切り替えが認められないことがあります。勤務先にバレるリスクが比較的高い副業タイプです。</p>';
    }
    content.innerHTML = html;
    card.style.display = 'block';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('re').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('tipsCard').style.display = 'none';
    document.getElementById('taxCard').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  /* ── localStorage ── */
  var STORAGE_KEY = 'sideJobTaxChecker';
  function saveToStorage(typeKey, income, expense, mainJob) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        sideJobType: typeKey, income: income, expense: expense, hasMainJob: mainJob
      }));
    } catch(e) {}
  }
  function loadFromStorage() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!d) return;
      if (d.sideJobType) document.getElementById('sideJobType').value = d.sideJobType;
      if (d.income !== undefined) document.getElementById('income').value = d.income;
      if (d.expense !== undefined) document.getElementById('expense').value = d.expense;
      if (d.hasMainJob) document.getElementById('hasMainJob').value = d.hasMainJob;
    } catch(e) {}
  }
  loadFromStorage();
  </script>
