<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業パイプライン管理</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>営業パイプライン管理</h1>
  </header>

  <main>
    <!-- サマリー -->
    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">総商談数</span>
        <span class="summary-value" id="totalDeals">0</span>
      </div>
      <div class="summary-card highlight">
        <span class="summary-label">受注見込み合計</span>
        <span class="summary-value" id="totalAmount">¥0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">受注済み</span>
        <span class="summary-value" id="wonAmount">¥0</span>
      </div>
    </section>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2 id="formTitle">商談を登録する</h2>
      <form id="dealForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <label for="clientName">顧客名 <span class="required">*</span></label>
          <input type="text" id="clientName" placeholder="例：株式会社〇〇" required>
        </div>
        <div class="form-row">
          <label for="stage">ステージ <span class="required">*</span></label>
          <select id="stage" required>
            <option value="リード">リード</option>
            <option value="提案">提案</option>
            <option value="交渉">交渉</option>
            <option value="受注">受注</option>
            <option value="失注">失注</option>
          </select>
        </div>
        <div class="form-row">
          <label for="amount">金額（円）</label>
          <input type="number" id="amount" placeholder="例：500000" min="0">
        </div>
        <div class="form-row">
          <label for="nextAction">次アクション</label>
          <input type="text" id="nextAction" placeholder="例：来週提案書を送付">
        </div>
        <div class="form-row">
          <label for="actionDate">アクション日</label>
          <input type="date" id="actionDate">
        </div>
        <div class="form-buttons">
          <button type="submit" id="submitBtn" class="btn btn-primary">登録する</button>
          <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;">キャンセル</button>
        </div>
      </form>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <label for="filterStage">表示：</label>
      <select id="filterStage">
        <option value="all">すべて</option>
        <option value="リード">リード</option>
        <option value="提案">提案</option>
        <option value="交渉">交渉</option>
        <option value="受注">受注</option>
        <option value="失注">失注</option>
      </select>
    </section>

    <!-- 商談一覧 -->
    <section class="deals-section">
      <div id="dealsList"></div>
      <p class="empty-msg" id="emptyMsg" style="display:none;">商談がありません</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
