<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ採算ライン診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

<body>

  <header class="app-header">
    <h1>仕入れ採算ライン診断アプリ</h1>
    <p class="subtitle">値上げ後も赤字にならない最低販売価格を即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="currentPrice">現行仕入れ価格（円）</label>
      <input type="number" id="currentPrice" placeholder="例: 1000" min="0" step="1">
      <p class="hint">現在の仕入れ単価を入力してください</p>
    </div>
    <div class="field">
      <label for="riseRate">仕入れ値上げ率（%）</label>
      <input type="number" id="riseRate" placeholder="例: 10" min="0" step="0.1">
      <p class="hint">値上げされる割合（例：10%値上げなら「10」）</p>
    </div>
    <div class="field">
      <label for="targetMargin">目標粗利率（%）</label>
      <input type="number" id="targetMargin" placeholder="例: 30" min="0" max="99" step="0.1">
      <p class="hint">確保したい粗利率（例：30%確保したいなら「30」）</p>
    </div>
    <div class="field">
      <label for="currentSellPrice">現行販売価格（円）※任意</label>
      <input type="number" id="currentSellPrice" placeholder="例: 1500" min="0" step="1">
      <p class="hint">入力すると現行の粗利率も表示されます</p>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">採算ラインを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">最低販売価格（採算ライン）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 採算ライン＝値上げ後仕入れ価格 ÷（1－目標粗利率）で計算しています。粗利率＝（販売価格－仕入れ価格）÷ 販売価格。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'shiire_sansan';

  function loadSaved() {
    try {
      var s = localStorage.getItem(LS_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.currentPrice)    document.getElementById('currentPrice').value    = d.currentPrice;
      if (d.riseRate)        document.getElementById('riseRate').value        = d.riseRate;
      if (d.targetMargin)    document.getElementById('targetMargin').value    = d.targetMargin;
      if (d.currentSellPrice) document.getElementById('currentSellPrice').value = d.currentSellPrice;
    } catch(e) {}
  }

  function saveCurrent() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        currentPrice:     document.getElementById('currentPrice').value,
        riseRate:         document.getElementById('riseRate').value,
        targetMargin:     document.getElementById('targetMargin').value,
        currentSellPrice: document.getElementById('currentSellPrice').value
      }));
    } catch(e) {}
  }

  function diagnose() {
    var cp  = parseFloat(document.getElementById('currentPrice').value);
    var rr  = parseFloat(document.getElementById('riseRate').value);
    var tm  = parseFloat(document.getElementById('targetMargin').value);
    var csp = parseFloat(document.getElementById('currentSellPrice').value);

    if (isNaN(cp) || cp <= 0) { showErr('現行仕入れ価格を入力してください'); return; }
    if (isNaN(rr) || rr < 0)  { showErr('仕入れ値上げ率を入力してください'); return; }
    if (isNaN(tm) || tm < 0 || tm >= 100) { showErr('目標粗利率を0〜99%で入力してください'); return; }

    saveCurrent();

    // 計算
    var newCost      = cp * (1 + rr / 100);                    // 値上げ後仕入れ価格
    var minSellPrice = newCost / (1 - tm / 100);               // 採算ライン（最低販売価格）
    var newMarginAmt = minSellPrice - newCost;                  // 最低販売価格での粗利額

    // 現行販売価格がある場合
    var currentMarginRate = null;
    var newMarginRateAtCurrent = null;
    if (!isNaN(csp) && csp > 0) {
      currentMarginRate      = (csp - cp)     / csp * 100;     // 現行粗利率
      newMarginRateAtCurrent = (csp - newCost) / csp * 100;    // 値上げ後の粗利率（現行販売価格のまま）
    }

    // 判定
    var level, evalText, noteText;
    if (currentMarginRate !== null) {
      if (newMarginRateAtCurrent >= tm) {
        level    = 'ok';
        evalText = '現行価格のまま採算が取れます';
        noteText = '値上げ後も目標粗利率を確保できています。価格変更は不要です。';
      } else if (newMarginRateAtCurrent >= 0) {
        level    = 'warn';
        evalText = '現行価格では粗利率が低下します';
        noteText = '赤字にはなりませんが、目標粗利率を下回ります。下記の採算ラインへの値上げを検討してください。';
      } else {
        level    = 'ng';
        evalText = '現行価格では赤字になります！';
        noteText = '仕入れ値上げ後、現行販売価格では赤字です。すぐに採算ライン以上への価格改定が必要です。';
      }
    } else {
      level    = 'warn';
      evalText = '採算ラインを確認してください';
      noteText = '現行販売価格を入力すると現状との比較もできます。';
    }

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(minSellPrice) + ' 円';
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = noteText;

    // 内訳テーブル
    var rows = [
      ['現行仕入れ価格',   fmt(cp) + ' 円'],
      ['仕入れ値上げ率',   rr.toFixed(1) + ' %'],
      ['値上げ後仕入れ価格', fmt(newCost) + ' 円'],
      ['目標粗利率',       tm.toFixed(1) + ' %'],
      ['採算ライン（最低販売価格）', fmt(minSellPrice) + ' 円', true],
      ['最低販売価格での粗利額', fmt(newMarginAmt) + ' 円'],
    ];
    if (currentMarginRate !== null && !isNaN(csp)) {
      rows.push(['現行販売価格',       fmt(csp) + ' 円']);
      rows.push(['現行粗利率',         currentMarginRate.toFixed(1) + ' %']);
      rows.push(['値上げ後の粗利率（現行価格）', newMarginRateAtCurrent.toFixed(1) + ' %']);
      var diff = csp - minSellPrice;
      rows.push(['採算ラインとの差',   (diff >= 0 ? '+' : '') + fmt(diff) + ' 円']);
    }

    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n * 10) / 10 % 1 === 0
    ? Math.round(n).toLocaleString('ja-JP')
    : (Math.round(n * 10) / 10).toLocaleString('ja-JP'); }

  loadSaved();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
