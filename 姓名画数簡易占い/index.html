<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="名前の画数から今年の運勢と開運アクションを即診断できるアプリ。毎日のモチベーションアップに。">
  <title>🔮 姓名画数簡易占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🔮 姓名画数簡易占い</h1>
    <p class="subtitle">名前の画数から今年の運勢と開運アクションを即診断。毎日のモチベーションアップに。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="name">お名前</label>
      <input type="text" id="name" placeholder="例: 山田太郎">
      <p class="hint">ひらがな・カタカナ・漢字対応（スペース・記号は除外）</p>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード（JS で class="result-card ok/warn/ng" を切替） -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 絵文字ひとこと＆結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、伝統的な姓名判断の画数計算ルールを参考に、目安として使いやすく整理しています。運勢は参考値です。最新情報は信頼できる占い師や専門家にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 結果別Q&A・絵文字ひとこと ──
  var EMOJI_MSG = {
    great: { e: '✨', t: '今年も素晴らしい一年になりそう。その勢いで進もう！' },
    good:  { e: '😊', t: '吉運あり。今年の目標をしっかり設定するチャンス。' },
    fair:  { e: '🤔', t: '変化の年。冷静に判断すれば道は開けます。' },
    need:  { e: '💪', t: '努力が報われる年。コツコツ進めることが大事。' }
  };

  var QA = {
    great: [
      { q: '運勢が良いって本当？', a: 'はい。画数が示す吉運のサイクル。この流れを大切にしましょう。' },
      { q: 'するべきことは？', a: '前向きに行動。新しいことへの挑戦が吉です。' },
      { q: 'この運勢、いつまで？', a: '画数は一生変わりません。毎年の干支と組み合わせると年ごとの運勢が変わります。' },
      { q: '開運アクションは？', a: '黄色いものを身につけ、朝日を浴びる。感謝の気持ちを大切に。' }
    ],
    good: [
      { q: '今年の過ごし方は？', a: '安定した運勢。コツコツ進めると成果が出ます。' },
      { q: 'チャレンジしても大丈夫？', a: 'はい。吉運のサポートがあります。計画的なら実行を。' },
      { q: 'リスクがあったら？', a: '吉運でも完全ではありません。無理は避けて。' },
      { q: '何を意識すべき？', a: 'バランスを取ること。仕事も休息も大切にしましょう。' }
    ],
    fair: [
      { q: '変化って悪い？', a: '必ずしも悪くありません。変化 = 成長のチャンス。' },
      { q: 'どう対応する？', a: '柔軟に。固い考えを手放し、新しい視点を取り入れて。' },
      { q: '失敗を避けたい', a: '注意深く判断を。焦らず、一歩ずつ進めるのが鉄則。' },
      { q: '開運アクションは？', a: 'グリーンを身につけ、瞑想や散歩で心を整える。' }
    ],
    need: [
      { q: '運が悪いのか？', a: '努力運です。つまり、やった分だけ報われる年。' },
      { q: 'どう過ごす？', a: '継続が力。小さなことからコツコツ。成果は後からついてきます。' },
      { q: '休息は必要？', a: 'もちろん。疲れたら休んで。頑張る時と休む時のメリハリが大事です。' },
      { q: '開運アクション？', a: 'オレンジ・赤を身につけ、運動や瞑想で心身を整える。' }
    ]
  };

  // ── 画数計算用の数字対応表 ──
  var STROKE_MAP = {
    // ひらがな（50音順）
    'あ': 3, 'い': 1, 'う': 2, 'え': 3, 'お': 3,
    'か': 5, 'き': 3, 'く': 3, 'け': 4, 'こ': 3,
    'さ': 3, 'し': 5, 'す': 3, 'せ': 5, 'そ': 5,
    'た': 3, 'ち': 4, 'つ': 3, 'て': 4, 'と': 3,
    'な': 3, 'に': 2, 'ぬ': 2, 'ね': 3, 'の': 3,
    'は': 3, 'ひ': 2, 'ふ': 4, 'へ': 3, 'ほ': 3,
    'ま': 3, 'み': 3, 'む': 3, 'め': 3, 'も': 3,
    'や': 3, 'ゆ': 3, 'よ': 3,
    'ら': 2, 'り': 2, 'る': 3, 'れ': 2, 'ろ': 5,
    'わ': 3, 'を': 3, 'ん': 2,
    // カタカナ（同じ音数）
    'ア': 3, 'イ': 1, 'ウ': 2, 'エ': 3, 'オ': 3,
    'カ': 5, 'キ': 3, 'ク': 3, 'ケ': 4, 'コ': 3,
    'サ': 3, 'シ': 5, 'ス': 3, 'セ': 5, 'ソ': 5,
    'タ': 3, 'チ': 4, 'ツ': 3, 'テ': 4, 'ト': 3,
    'ナ': 3, 'ニ': 2, 'ヌ': 2, 'ネ': 3, 'ノ': 3,
    'ハ': 3, 'ヒ': 2, 'フ': 4, 'ヘ': 3, 'ホ': 3,
    'マ': 3, 'ミ': 3, 'ム': 3, 'メ': 3, 'モ': 3,
    'ヤ': 3, 'ユ': 3, 'ヨ': 3,
    'ラ': 2, 'リ': 2, 'ル': 3, 'レ': 2, 'ロ': 5,
    'ワ': 3, 'ヲ': 3, 'ン': 2,
    // 漢字（一部抜粋・簡易版）
    '山': 3, '田': 5, '太': 4, '郎': 9, '花': 7, '子': 3, '夫': 4,
    '明': 8, '春': 9, '夏': 10, '秋': 9, '冬': 5,
    '中': 4, '小': 3, '大': 3, '高': 10, '林': 12, '森': 12,
    '水': 4, '火': 4, '木': 4, '金': 8, '土': 3,
    '一': 1, '二': 2, '三': 3, '四': 5, '五': 4, '六': 4, '七': 2, '八': 2, '九': 2, '十': 2,
  };

  // ── 運勢計算（画数から吉凶判定） ──
  function calcFortune(total) {
    // 一般的な姓名判断の吉数・凶数ルール（簡易版）
    if ([11, 13, 15, 21, 23, 31, 32, 35, 37, 41, 45, 47, 48, 52, 57, 61, 63, 67, 71, 75, 81].includes(total)) {
      return 'great';  // 大吉
    } else if ([3, 5, 7, 8, 10, 14, 16, 17, 18, 19, 22, 24, 25, 26, 27, 29, 33, 34, 36, 38, 39, 40, 42, 43, 44, 46, 49, 50, 51, 53, 54, 55, 56, 58, 59, 60, 62, 65, 66, 68, 69, 70, 72, 73, 74, 76, 77, 78, 79, 80].includes(total)) {
      return 'good';   // 吉
    } else if ([2, 4, 6, 9, 12, 20, 28, 30, 64].includes(total)) {
      return 'fair';   // 小吉/小凶
    } else {
      return 'need';   // 凶（努力運）
    }
  }

  function getStrokeCount(char) {
    return STROKE_MAP[char] || 2; // デフォルト: 2画
  }

  function diagnose() {
    var nameInput = document.getElementById('name').value.trim();
    if (!nameInput) { showErr('お名前を入力してください'); return; }

    // スペース・記号を除外
    var name = nameInput.replace(/[\s\-・]/g, '');
    if (!name) { showErr('有効な文字が入力されていません'); return; }

    // 画数計算
    var totalStrokes = 0;
    for (var i = 0; i < name.length; i++) {
      totalStrokes += getStrokeCount(name[i]);
    }

    // 運勢判定
    var level = calcFortune(totalStrokes);
    var fortuneText = level === 'great' ? '大吉 ✨'
                    : level === 'good'  ? '吉 😊'
                    : level === 'fair'  ? '小吉 🤔'
                    : '凶 💪';

    var message = level === 'great' ? '素晴らしい運勢です。積極的に行動しましょう。'
                : level === 'good'  ? '安定した運勢です。着実に進めて。'
                : level === 'fair'  ? '変化の年。柔軟に対応することが大切。'
                : '努力運です。コツコツ進めることで道が開けます。';

    showResult(level, fortuneText, message, totalStrokes, name);
    showQA(level);
    saveHistory(name, totalStrokes, level);
  }

  function showResult(level, fortune, note, strokes, name) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = fortune;
    document.getElementById('re').textContent = name + ' さんの運勢';
    document.getElementById('rn').innerHTML = note + '<br>（' + name + 'の画数：' + strokes + '画）';
  }

  function showQA(level) {
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = '';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = 'エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('qa-card').style.display = 'none';
  }

  // ── localStorage 保存機能 ──
  function saveHistory(name, strokes, level) {
    try {
      var history = JSON.parse(localStorage.getItem('fortuneHistory') || '[]');
      history.unshift({ name: name, strokes: strokes, level: level, date: new Date().toLocaleString('ja-JP') });
      if (history.length > 10) history.pop(); // 最新10件まで保持
      localStorage.setItem('fortuneHistory', JSON.stringify(history));
    } catch (e) {
      // localStorage が使えない環境は無視
    }
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
