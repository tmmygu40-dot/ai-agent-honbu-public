<head>

  <title>仕入れリスク診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── リスク指標行 ── */
    .risk-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .risk-row:last-child { border-bottom: none; }
    .risk-label { color: var(--text-sub); font-weight: 600; }
    .risk-badge {
      padding: 0.28rem 0.9rem; border-radius: 99px;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.04em;
    }
    .badge-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok);   }
    .badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng);   }

    /* ── アクションリスト ── */
    .action-list { list-style: none; padding: 0; margin: 0; }
    .action-list li {
      display: flex; align-items: flex-start; gap: 0.55rem;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.5; color: var(--text);
    }
    .action-list li:last-child { border-bottom: none; }
    .action-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

    /* ── 優先度バー ── */
    .priority-bar {
      display: flex; gap: 0.3rem; margin-top: 0.6rem; justify-content: center;
    }
    .pbar {
      height: 8px; border-radius: 4px; flex: 1; max-width: 60px;
      background: var(--border); transition: background 0.3s;
    }
    .pbar.filled-ok   { background: var(--ok); }
    .pbar.filled-warn { background: var(--warn); }
    .pbar.filled-ng   { background: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

        { icon: '🔄', text: '代替工法・代替材料（鉄骨・RC・CLT等）の採用可否を設計段階で検討する' }
      ]
    },
    fuel: {
      name: '燃料・エネルギー資材',
      importRisk: 'ng',
      tariffRisk: 'warn',
      importReason: '中東情勢・ロシア問題等により供給停止リスクが常に高い。地政学リスクに直結する',
      tariffReason: 'エネルギー資材への関税は国際情勢次第で急変動。輸入コスト増加が事業コスト全体に波及する',
      actions: [
        { icon: '🌏', text: '調達先を中東・ロシア以外（米国・カナダ・豪州・東南アジア）に分散する' },
        { icon: '📦', text: '法令範囲内で最大限の燃料備蓄（1〜3ヶ月分）を確保する' },
        { icon: '♻️', text: '再生可能エネルギー・省エネ設備への切り替えを中期計画に組み込む' },
        { icon: '💡', text: 'エネルギーコスト上昇分を価格転嫁するための交渉準備をしておく' },
        { icon: '📝', text: '燃料先物・長期固定価格契約でコストヘッジを検討する' }
      ]
    }
  };

  var levelMap = {
    ok: { label: '低', text: 'リスク低', badge: 'badge-ok' },
    warn: { label: '中', text: 'リスク中', badge: 'badge-warn' },
    ng: { label: '高', text: 'リスク高', badge: 'badge-ng' }
  };

  var totalMap = {
    ok: { cls: 'ok', val: '低リスク', note: '現時点では大きなリスクは見当たりません。ただし定期的な調達先モニタリングを継続してください。' },
    warn: { cls: 'warn', val: '中リスク', note: 'リスクが顕在化する前に代替調達先の確保と在庫積み増しを進めてください。' },
    ng: { cls: 'ng', val: '高リスク', note: '早急に代替調達先の開拓と安全在庫の積み増しが必要です。今すぐアクションを取ってください。' }
  };

  function worstLevel(a, b) {
    var order = { ok: 0, warn: 1, ng: 2 };
    return order[a] >= order[b] ? a : b;
  }

  function diagnose() {
    var cat = document.getElementById('category').value;
    if (!cat) { alert('カテゴリを選んでください'); return; }

    var d = riskData[cat];
    var total = worstLevel(d.importRisk, d.tariffRisk);
    var tm = totalMap[total];

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + tm.cls;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = tm.val;
    document.getElementById('rn').textContent = tm.note;

    // 優先度バー
    var barCount = total === 'ok' ? 1 : total === 'warn' ? 2 : 3;
    var barHtml = '';
    for (var i = 0; i < 3; i++) {
      var filled = i < barCount ? ' filled-' + total : '';
      barHtml += '<div class="pbar' + filled + '"></div>';
    }
    document.getElementById('pbar').innerHTML = barHtml;

    // リスク内訳
    var rowsHtml =
      '<div class="risk-row">' +
        '<span class="risk-label">輸入停止リスク</span>' +
        '<span class="risk-badge ' + levelMap[d.importRisk].badge + '">' + levelMap[d.importRisk].label + '</span>' +
      '</div>' +
      '<div class="risk-row">' +
        '<span class="risk-label">関税リスク</span>' +
        '<span class="risk-badge ' + levelMap[d.tariffRisk].badge + '">' + levelMap[d.tariffRisk].label + '</span>' +
      '</div>';

    // 理由を追加
    rowsHtml +=
      '<div style="margin-top:0.8rem;font-size:0.8rem;color:var(--text-sub);line-height:1.6;">' +
        '<p style="margin-bottom:0.35rem;">📌 <strong>輸入停止：</strong>' + d.importReason + '</p>' +
        '<p>📌 <strong>関税：</strong>' + d.tariffReason + '</p>' +
      '</div>';

    document.getElementById('risk-rows').innerHTML = rowsHtml;
    document.getElementById('detail').style.display = 'block';

    // アクションリスト
    var actHtml = d.actions.map(function(a) {
      return '<li><span class="action-icon">' + a.icon + '</span><span>' + a.text + '</span></li>';
    }).join('');
    document.getElementById('action-list').innerHTML = actHtml;
    document.getElementById('actions-card').style.display = 'block';

    // localStorage保存
    try {
      localStorage.setItem('shiire_risk_last', JSON.stringify({ cat: cat, ts: Date.now() }));
    } catch(e) {}

    // スクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 前回の選択を復元
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem('shiire_risk_last') || 'null');
      if (saved && saved.cat && riskData[saved.cat]) {
        document.getElementById('category').value = saved.cat;
      }
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
