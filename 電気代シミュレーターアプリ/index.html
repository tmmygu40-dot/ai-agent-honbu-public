<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気代シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>電気代シミュレーター</h1>

    <div class="rate-section">
      <label for="rate">電気代単価（円/kWh）</label>
      <div class="rate-row">
        <input type="number" id="rate" value="31" min="1" step="0.1">
        <button id="applyRate">適用</button>
      </div>
    </div>

    <div class="form-section">
      <h2>家電を追加</h2>
      <div class="form-group">
        <label for="applianceName">家電名</label>
        <input type="text" id="applianceName" placeholder="例：エアコン">
      </div>
      <div class="form-group">
        <label for="wattage">消費電力（W）</label>
        <input type="number" id="wattage" placeholder="例：700" min="1">
      </div>
      <div class="form-group">
        <label for="hoursPerDay">1日の使用時間（時間）</label>
        <input type="number" id="hoursPerDay" placeholder="例：8" min="0.1" step="0.1">
      </div>
      <button id="addBtn" class="add-btn">追加</button>
    </div>

    <div class="list-section">
      <h2>登録済み家電</h2>
      <div id="totalBox" class="total-box">
        <span>月額合計</span>
        <span id="totalCost">0 円</span>
      </div>
      <ul id="applianceList"></ul>
      <p id="emptyMsg" class="empty-msg">家電が登録されていません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
