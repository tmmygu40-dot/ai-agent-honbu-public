<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="カタカナ英語の本来の英単語を3択クイズで当てるゲーム。身近なカタカナ用語が実は何という英単語かをサクッと学べる、楽しい言語学習アプリです。">
  <title>❓ 外来語クイズゲーム</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズ問題エリア ── */
    .quiz-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1.2rem;
      max-width: 600px;
      text-align: center;
    }
    .quiz-number { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.5rem; }
    .quiz-question { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 0.2rem; }
    .quiz-label { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 1rem; }

    /* ── 選択肢ボタン ── */
    .choices {
      max-width: 600px; margin: 0 auto 1.2rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .choice-btn {
      display: block; width: 100%; padding: 1rem 1.2rem;
      font-size: 1rem; font-weight: 600;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: translateY(2px); }
    .choice-btn.disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 0.5rem; }
    .result-correct { font-size: 0.88rem; color: var(--text-sub); }

    /* ── スコアカード ── */
    .score-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .score-label { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .score-value { font-size: 1.6rem; font-weight: 900; color: var(--text); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .choice-btn, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .quiz-card, .score-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>❓ 外来語クイズゲーム</h1>
    <p class="subtitle">カタカナ英語の本来の英単語を3択で当てるクイズです。言語知識を楽しく学べます。</p>
  </header>

  <!-- スコアカード -->
  <div class="score-card">
    <p class="score-label">スコア</p>
    <p class="score-value"><span id="score">0</span> / <span id="total">20</span></p>
  </div>

  <!-- クイズカード -->
  <div class="quiz-card" id="quiz-area">
    <p class="quiz-number">第 <span id="current-q">1</span> 問</p>
    <p class="quiz-question" id="quiz-word">アジェンダ</p>
    <p class="quiz-label">この英単語は？</p>
  </div>

  <!-- 選択肢ボタン -->
  <div class="choices" id="choices-container"></div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-correct" id="rc"></p>
  </div>

  <!-- 次の問題ボタン -->
  <button class="btn-calc" id="next-btn" onclick="nextQuestion()" style="display:none;">次の問題へ</button>

  <!-- クイズ終了ボタン -->
  <button class="btn-calc" id="finish-btn" onclick="finishQuiz()" style="display:none;">結果を見る</button>

  <!-- リセットボタン -->
  <button class="btn-calc" id="reset-btn" onclick="resetQuiz()" style="display:none;">もう一度挑戦</button>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── クイズ問題セット（カタカナ英語と正答） ──
  var quizData = [
    { word: 'アジェンダ', choices: ['agenda', 'audience', 'academy'], correct: 0 },
    { word: 'エビデンス', choices: ['evidence', 'evil', 'evaluate'], correct: 0 },
    { word: 'コンセンサス', choices: ['consensus', 'concert', 'concept'], correct: 0 },
    { word: 'インセンティブ', choices: ['incentive', 'incident', 'increase'], correct: 0 },
    { word: 'ステークホルダー', choices: ['stakeholder', 'standard', 'statement'], correct: 0 },
    { word: 'シナジー', choices: ['synergy', 'synonym', 'symbol'], correct: 0 },
    { word: 'パラダイム', choices: ['paradigm', 'parallel', 'parameter'], correct: 0 },
    { word: 'コンプライアンス', choices: ['compliance', 'complaint', 'complete'], correct: 0 },
    { word: 'リテラシー', choices: ['literacy', 'literal', 'literary'], correct: 0 },
    { word: 'スキーム', choices: ['scheme', 'schedule', 'screen'], correct: 0 },
    { word: 'レジリエンス', choices: ['resilience', 'resistance', 'resource'], correct: 0 },
    { word: 'アトリビューション', choices: ['attribution', 'attitude', 'attention'], correct: 0 },
    { word: 'サステナビリティ', choices: ['sustainability', 'suitable', 'substitute'], correct: 0 },
    { word: 'プロアクティブ', choices: ['proactive', 'professional', 'process'], correct: 0 },
    { word: 'ナレッジ', choices: ['knowledge', 'needle', 'neighbor'], correct: 0 },
    { word: 'エグゼキューション', choices: ['execution', 'executive', 'exercise'], correct: 0 },
    { word: 'アウトプット', choices: ['output', 'outlook', 'outcome'], correct: 0 },
    { word: 'インプット', choices: ['input', 'import', 'impact'], correct: 0 },
    { word: 'ポートフォリオ', choices: ['portfolio', 'portion', 'portrait'], correct: 0 },
    { word: 'バリデーション', choices: ['validation', 'vacation', 'variation'], correct: 0 }
  ];

  var currentQuestion = 0;
  var score = 0;
  var answered = false;

  function init() {
    score = 0;
    currentQuestion = 0;
    answered = false;
    loadQuestion();
    updateScore();
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('finish-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
  }

  function loadQuestion() {
    if (currentQuestion >= quizData.length) {
      showFinish();
      return;
    }
    var q = quizData[currentQuestion];
    document.getElementById('quiz-word').textContent = q.word;
    document.getElementById('current-q').textContent = currentQuestion + 1;
    renderChoices(q);
    document.getElementById('result').style.display = 'none';
    answered = false;
    document.getElementById('next-btn').style.display = 'none';
  }

  function renderChoices(q) {
    var html = q.choices.map(function(choice, idx) {
      return '<button class="choice-btn" onclick="selectAnswer(' + idx + ')">' + choice + '</button>';
    }).join('');
    document.getElementById('choices-container').innerHTML = html;
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var q = quizData[currentQuestion];
    var isCorrect = idx === q.correct;
    if (isCorrect) score++;

    showResult(isCorrect, q.choices[q.correct]);
    updateScore();

    if (currentQuestion < quizData.length - 1) {
      document.getElementById('next-btn').style.display = 'block';
    } else {
      document.getElementById('finish-btn').style.display = 'block';
    }
    disableChoices();
  }

  function disableChoices() {
    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(btn) { btn.classList.add('disabled'); btn.disabled = true; });
  }

  function showResult(isCorrect, correct) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + (isCorrect ? 'ok' : 'ng');
    document.getElementById('rv').textContent = isCorrect ? '○ 正解' : '× 不正解';
    document.getElementById('rn').textContent = isCorrect ? '素晴らしい！' : '覚えておきましょう';
    document.getElementById('rc').textContent = '正答：' + correct;
    rc.style.display = 'block';
  }

  function updateScore() {
    document.getElementById('score').textContent = score;
  }

  function nextQuestion() {
    currentQuestion++;
    loadQuestion();
  }

  function finishQuiz() {
    showFinish();
  }

  function showFinish() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('choices-container').innerHTML = '';
    var rc = document.getElementById('result');
    var pct = Math.round(score / quizData.length * 100);
    rc.className = 'result-card ' + (pct >= 70 ? 'ok' : 'ng');
    document.getElementById('rv').textContent = score + ' / 20';
    document.getElementById('rn').textContent = pct + '% 正解';
    document.getElementById('rc').textContent = pct >= 80 ? '優秀です！' : pct >= 60 ? 'もう少しです' : 'またチャレンジしましょう';
    rc.style.display = 'block';

    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('finish-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'block';
  }

  function resetQuiz() {
    document.getElementById('quiz-area').style.display = '';
    init();
  }

  window.addEventListener('load', init);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
