<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給油管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>給油管理アプリ</h1>

    <section class="input-section">
      <h2>給油を記録する</h2>
      <div class="form-group">
        <label for="date">日付（任意）</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="distance">走行距離 (km) <span class="required">*</span></label>
        <input type="number" id="distance" placeholder="例：300" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label for="fuel">給油量 (L) <span class="required">*</span></label>
        <input type="number" id="fuel" placeholder="例：40" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label for="memo">メモ（任意）</label>
        <input type="text" id="memo" placeholder="例：高速使用">
      </div>

      <div id="preview" class="preview hidden">
        燃費：<span id="preview-value">--</span> km/L
      </div>

      <button class="btn-add" id="addBtn">記録する</button>
    </section>

    <section class="stats-section" id="statsSection">
      <div class="stat-card">
        <div class="stat-label">記録件数</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均燃費</div>
        <div class="stat-value" id="avgFuel">-- km/L</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">総走行距離</div>
        <div class="stat-value" id="totalDistance">-- km</div>
      </div>
    </section>

    <section class="list-section">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
