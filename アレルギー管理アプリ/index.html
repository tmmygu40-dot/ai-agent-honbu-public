<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アレルギー管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <header>
    <h1>アレルギー管理</h1>
  </header>

  <main>
    <!-- メンバー登録フォーム -->
    <section class="section">
      <h2>メンバー登録</h2>
      <div class="form-row">
        <input type="text" id="memberName" placeholder="名前（例：太郎）" maxlength="20">
        <input type="text" id="allergyInput" placeholder="アレルギー食材（例：卵、小麦）" maxlength="100">
        <button id="addMemberBtn" onclick="addMember()">登録</button>
      </div>
      <p class="hint">複数の食材はカンマ（、）または半角カンマで区切ってください</p>
    </section>

    <!-- 食材チェック -->
    <section class="section">
      <h2>食材チェック</h2>
      <div class="form-row">
        <input type="text" id="checkInput" placeholder="チェックしたい食材名を入力">
        <button onclick="checkAllergy()">チェック</button>
      </div>
      <div id="checkResult" class="check-result"></div>
    </section>

    <!-- メンバー一覧 -->
    <section class="section">
      <h2>登録メンバー一覧</h2>
      <div id="memberList" class="member-list">
        <p class="empty-msg">まだメンバーが登録されていません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
