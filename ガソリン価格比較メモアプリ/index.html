<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガソリン価格比較メモ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力グリッド ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .input-grid .full { grid-column: 1 / -1; }
    .field { }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-add {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }

    /* ── フィルタータブ ── */
    .filter-tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin: 0 auto 1rem; max-width: 600px; padding: 0 0;
    }
    .tab-btn {
      padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 30px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── 最安値サマリーカード ── */
    .best-card {
      background: var(--ok-bg);
      border: 2px solid var(--ok);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .best-card-title { font-size: 0.75rem; font-weight: 700; color: var(--ok); letter-spacing: 0.08em; margin-bottom: 0.75rem; }
    .best-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .best-item { display: flex; justify-content: space-between; align-items: center; }
    .best-item .kind { font-size: 0.82rem; color: var(--text-sub); }
    .best-item .info { text-align: right; }
    .best-item .price { font-size: 1.25rem; font-weight: 900; color: var(--ok); }
    .best-item .name { font-size: 0.78rem; color: var(--text-sub); }
    .no-data { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 0.5rem 0; }

    /* ── 価格リスト ── */
    .price-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .price-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      max-width: 600px; margin: 0 auto; width: 100%;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      transition: border-color 0.15s;
    }
    .price-item.best {
      border-color: var(--ok);
      background: var(--ok-bg);
    }
    .price-item .item-main { flex: 1; min-width: 0; }
    .price-item .item-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .price-item .item-meta { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.2rem; }
    .price-item .item-price {
      font-size: 1.5rem; font-weight: 900; white-space: nowrap;
      color: var(--text);
    }
    .price-item.best .item-price { color: var(--ok); }
    .price-item .item-price span { font-size: 0.75rem; font-weight: 500; color: var(--text-sub); }
    .best-badge {
      font-size: 0.68rem; font-weight: 800; color: var(--ok);
      background: var(--ok-bg); border: 1px solid var(--ok);
      border-radius: 20px; padding: 0.15rem 0.5rem; white-space: nowrap;
    }
    .btn-del {
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: var(--text-sub); padding: 0.25rem 0.4rem; border-radius: 6px;
      transition: background 0.1s;
    }
    .btn-del:hover { background: var(--ng-bg); color: var(--ng); }

    .empty-msg { text-align: center; color: var(--text-sub); font-size: 0.9rem; padding: 2rem 1rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 420px) {
      .input-grid { grid-template-columns: 1fr; }
      .input-grid .full { grid-column: 1; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>⛽ ガソリン価格比較メモ</h1>
    <p class="subtitle">複数スタンドの価格を登録して最安値をすぐ判断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">スタンドを登録</p>
    <div class="input-grid">
      <div class="field full">
        <label for="stName">スタンド名</label>
        <input type="text" id="stName" placeholder="例：コスモ石油 ○○店">
      </div>
      <div class="field">
        <label for="stKind">種別</label>
        <select id="stKind">
          <option value="レギュラー">レギュラー</option>
          <option value="ハイオク">ハイオク</option>
          <option value="軽油">軽油</option>
        </select>
      </div>
      <div class="field">
        <label for="stPrice">価格（円/L）</label>
        <input type="number" id="stPrice" placeholder="例：168" min="0" step="0.1">
      </div>
      <div class="field full">
        <label for="stDate">確認日</label>
        <input type="date" id="stDate">
      </div>
    </div>
  </div>

  <button class="btn-add" onclick="addEntry()">＋ 登録する</button>

  <!-- フィルタータブ -->
  <div class="filter-tabs" id="filterTabs">
    <button class="tab-btn active" data-kind="all" onclick="setFilter('all', this)">すべて</button>
    <button class="tab-btn" data-kind="レギュラー" onclick="setFilter('レギュラー', this)">レギュラー</button>
    <button class="tab-btn" data-kind="ハイオク" onclick="setFilter('ハイオク', this)">ハイオク</button>
    <button class="tab-btn" data-kind="軽油" onclick="setFilter('軽油', this)">軽油</button>
  </div>

  <!-- 最安値サマリー -->
  <div class="best-card" id="bestCard" style="display:none">
    <p class="best-card-title">最安値</p>
    <div class="best-list" id="bestList"></div>
  </div>

  <!-- 価格リスト -->
  <div id="listWrap" style="max-width:600px;margin:0 auto;padding:0 0.5rem;">
    <div class="price-list" id="priceList"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'gasoline_price_entries';
  var currentFilter = 'all';
  var entries = [];

  // 初期化
  (function init() {
    var saved = localStorage.getItem(STORAGE_KEY);
    entries = saved ? JSON.parse(saved) : [];
    // 今日の日付をデフォルトセット
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth() + 1).padStart(2, '0');
    var d = String(today.getDate()).padStart(2, '0');
    document.getElementById('stDate').value = y + '-' + m + '-' + d;
    render();
  })();

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function addEntry() {
    var name  = document.getElementById('stName').value.trim();
    var kind  = document.getElementById('stKind').value;
    var price = parseFloat(document.getElementById('stPrice').value);
    var date  = document.getElementById('stDate').value;

    if (!name) { alert('スタンド名を入力してください'); return; }
    if (isNaN(price) || price <= 0) { alert('価格を正しく入力してください'); return; }

    entries.push({ id: Date.now(), name: name, kind: kind, price: price, date: date });
    save();
    document.getElementById('stName').value = '';
    document.getElementById('stPrice').value = '';
    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(function(e) { return e.id !== id; });
    save();
    render();
  }

  function setFilter(kind, btn) {
    currentFilter = kind;
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  }

  function getBestByKind() {
    var kinds = ['レギュラー', 'ハイオク', '軽油'];
    var result = {};
    kinds.forEach(function(k) {
      var filtered = entries.filter(function(e) { return e.kind === k; });
      if (filtered.length > 0) {
        var best = filtered.reduce(function(a, b) { return a.price <= b.price ? a : b; });
        result[k] = best;
      }
    });
    return result;
  }

  function render() {
    var bests = getBestByKind();

    // 最安値サマリー
    var bestCard = document.getElementById('bestCard');
    var bestList = document.getElementById('bestList');
    if (Object.keys(bests).length === 0) {
      bestCard.style.display = 'none';
    } else {
      bestCard.style.display = '';
      bestList.innerHTML = Object.keys(bests).map(function(k) {
        var b = bests[k];
        return '<div class="best-item">'
          + '<span class="kind">' + k + '</span>'
          + '<div class="info">'
          + '<div class="price">' + b.price.toFixed(1) + '<span> 円/L</span></div>'
          + '<div class="name">' + esc(b.name) + '　' + b.date + '</div>'
          + '</div></div>';
      }).join('');
    }

    // リスト
    var filtered = currentFilter === 'all'
      ? entries
      : entries.filter(function(e) { return e.kind === currentFilter; });

    // 安い順にソート
    var sorted = filtered.slice().sort(function(a, b) { return a.price - b.price; });

    var listEl = document.getElementById('priceList');
    if (sorted.length === 0) {
      listEl.innerHTML = '<p class="empty-msg">登録されたスタンドがありません</p>';
      return;
    }

    // 各種別の最安値IDセット
    var bestIds = {};
    Object.keys(bests).forEach(function(k) { bestIds[bests[k].id] = true; });

    listEl.innerHTML = sorted.map(function(e) {
      var isBest = bestIds[e.id];
      return '<div class="price-item' + (isBest ? ' best' : '') + '">'
        + '<div class="item-main">'
        + '<div class="item-name">' + esc(e.name) + '</div>'
        + '<div class="item-meta">' + e.kind + '　' + e.date + '</div>'
        + '</div>'
        + (isBest ? '<span class="best-badge">最安値</span>' : '')
        + '<div class="item-price">' + e.price.toFixed(1) + '<span> 円/L</span></div>'
        + '<button class="btn-del" onclick="deleteEntry(' + e.id + ')" title="削除">✕</button>'
        + '</div>';
    }).join('');
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>

<script src="../fav-widget.js"></script>
</body>
</html>
