<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="自撮り写真をルネサンス名画風にするAI画像生成用プロンプトを30秒で生成。有名な古典絵画のスタイルで自撮りを変身させて、SNS投稿やプロフィール写真をアートに仕上げます。">
  <title>🎨 ルネサンス自撮りAIプロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.5; word-break: break-word; margin-bottom: 0.8rem; }
    .btn-copy {
      display: block; width: 100%; padding: 0.6rem 1rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-copy:active { opacity: 0.8; }

    /* ── プロンプト複数パターン ── */
    .prompt-list { margin-top: 1rem; }
    .prompt-item {
      background: var(--bg); padding: 0.8rem; border-radius: 8px;
      margin-bottom: 0.6rem; font-size: 0.88rem; color: var(--text);
      line-height: 1.5; word-break: break-word;
    }
    .prompt-item:last-child { margin-bottom: 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎨 ルネサンス自撮りAIプロンプトメーカー</h1>
    <p class="subtitle">自撮り写真をルネサンス名画風にするAI呪文を30秒で生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">オプション（省略可）</p>
    <div class="field">
      <label for="mood">撮影の雰囲気（任意）</label>
      <select id="mood">
        <option value="">選択しない（ランダム）</option>
        <option value="ポートレート">ポートレート</option>
        <option value="全身">全身</option>
        <option value="顔アップ">顔アップ</option>
      </select>
      <p class="hint">何を強調したいかで選択。未選択ならランダムに変わります</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompts()">プロンプトを生成</button>

  <!-- 結果カード（プロンプト表示） -->
  <div class="result-card ok" id="result" style="display: none;">
    <p class="card-title">生成されたプロンプト</p>
    <div class="prompt-list" id="prompt-list"></div>
    <button class="btn-copy" onclick="copyToClipboard()">📋 すべてコピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールで生成されるプロンプトは、Stable Diffusion・Midjourney・DALL-E などの AI 画像生成サービスに対応しています。詳細は各サービスの公式ガイドをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ルネサンス画家のスタイル
  var PAINTERS = [
    'ダ・ヴィンチ風',
    'ボッティチェリ風',
    'ミケランジェロ風',
    'ラファエロ風',
    'ティツィアーノ風',
    'カラヴァッジョ風'
  ];

  // 画風・技法
  var STYLES = [
    '油彩',
    'チェントスピラート技法',
    'スフマート技法',
    'キアロスクーロ',
    'プラスティック表現',
    '古典的肖像画'
  ];

  // 背景・構図
  var BACKGROUNDS = [
    'ルネサンス神殿の背景',
    '古城の書斎',
    'モノクロ背景',
    '暗いルネサンス背景',
    '風景を背にした構図',
    '単色背景'
  ];

  // 色合い
  var COLORS = [
    '金と深い茶色',
    'オーカーと濃紺',
    '象牙色と深紅',
    'ベージュと焦茶',
    '古びた黄土色',
    '暖色系ルネサンス配色'
  ];

  function generatePrompts() {
    var mood = document.getElementById('mood').value || 'ポートレート';
    var prompts = [];

    for (var i = 0; i < 5; i++) {
      var painter = PAINTERS[Math.floor(Math.random() * PAINTERS.length)];
      var style = STYLES[Math.floor(Math.random() * STYLES.length)];
      var bg = BACKGROUNDS[Math.floor(Math.random() * BACKGROUNDS.length)];
      var color = COLORS[Math.floor(Math.random() * COLORS.length)];

      var prompt = 'A selfie portrait painted like a ' + painter + ' masterpiece, ' + mood + ', ' + style +
                   ', ' + bg + ', ' + color + ', high quality, detailed, museum quality painting';

      prompts.push(prompt);
    }

    displayPrompts(prompts);
    saveTolocalStorage(prompts);
  }

  function displayPrompts(prompts) {
    var html = '';
    for (var i = 0; i < prompts.length; i++) {
      html += '<div class="prompt-item">' + (i+1) + '. ' + escapeHtml(prompts[i]) + '</div>';
    }
    document.getElementById('prompt-list').innerHTML = html;
    document.getElementById('result').style.display = '';
    window.currentPrompts = prompts;
  }

  function copyToClipboard() {
    if (!window.currentPrompts) return;
    var text = window.currentPrompts.join('\n\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      alert('コピーしました！');
    } catch (e) {
      alert('コピーに失敗しました。手動でコピーしてください。');
    }
    document.body.removeChild(ta);
  }

  function saveTolocalStorage(prompts) {
    var history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
    history.unshift({
      timestamp: new Date().toLocaleString('ja-JP'),
      prompts: prompts
    });
    if (history.length > 20) history.pop();
    localStorage.setItem('promptHistory', JSON.stringify(history));
  }

  function escapeHtml(text) {
    var map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }
  </script>

</body>
</html>
