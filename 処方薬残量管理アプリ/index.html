<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>処方薬残量管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>処方薬残量管理</h1>

    <section class="form-section">
      <h2>薬を登録する</h2>
      <div class="form-group">
        <label for="medicine-name">薬の名前</label>
        <input type="text" id="medicine-name" placeholder="例：アムロジピン" maxlength="50">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="remaining-count">残数（錠/包）</label>
          <input type="number" id="remaining-count" placeholder="例：28" min="0" max="9999">
        </div>
        <div class="form-group">
          <label for="daily-dose">1日の服用回数</label>
          <input type="number" id="daily-dose" placeholder="例：2" min="1" max="10">
        </div>
      </div>
      <div class="form-group">
        <label for="dose-per-time">1回の服用数</label>
        <input type="number" id="dose-per-time" placeholder="例：1" min="1" max="10" value="1">
      </div>
      <button id="add-btn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <h2>登録済みの薬 <span id="medicine-count">0</span>件</h2>
      <div id="medicine-list" class="medicine-list"></div>
      <p id="empty-message" class="empty-message">薬が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
