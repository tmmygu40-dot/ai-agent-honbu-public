<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スキルマップアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>スキルマップ</h1>

    <div class="input-section">
      <div class="input-group">
        <h2>スタッフ登録</h2>
        <div class="input-row">
          <input type="text" id="staffInput" placeholder="スタッフ名を入力" maxlength="30">
          <button onclick="addStaff()">追加</button>
        </div>
        <div id="staffList" class="tag-list"></div>
      </div>

      <div class="input-group">
        <h2>スキル登録</h2>
        <div class="input-row">
          <input type="text" id="skillInput" placeholder="スキル名を入力" maxlength="30">
          <button onclick="addSkill()">追加</button>
        </div>
        <div id="skillList" class="tag-list"></div>
      </div>
    </div>

    <div id="mapSection" class="map-section">
      <h2>スキルマップ</h2>
      <div id="summaryBar" class="summary-bar"></div>
      <div class="table-wrapper">
        <table id="skillMap">
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="mapBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
