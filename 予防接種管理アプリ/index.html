<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予防接種管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>💉 予防接種管理</h1>

    <section class="form-section">
      <h2>接種記録を追加</h2>
      <div class="form-group">
        <label for="vaccine-name">ワクチン種類</label>
        <select id="vaccine-name">
          <option value="">-- 選択してください --</option>
          <optgroup label="定期接種">
            <option value="BCG">BCG（結核）</option>
            <option value="B型肝炎">B型肝炎</option>
            <option value="ヒブ（Hib）">ヒブ（Hib）</option>
            <option value="小児用肺炎球菌">小児用肺炎球菌</option>
            <option value="四種混合（DPT-IPV）">四種混合（DPT-IPV）</option>
            <option value="水痘（水ぼうそう）">水痘（水ぼうそう）</option>
            <option value="麻しん風しん（MR）">麻しん風しん（MR）</option>
            <option value="日本脳炎">日本脳炎</option>
            <option value="二種混合（DT）">二種混合（DT）</option>
            <option value="ロタウイルス">ロタウイルス</option>
            <option value="HPV">HPV（子宮頸がん）</option>
          </optgroup>
          <optgroup label="任意接種">
            <option value="インフルエンザ">インフルエンザ</option>
            <option value="おたふくかぜ">おたふくかぜ</option>
            <option value="A型肝炎">A型肝炎</option>
          </optgroup>
          <option value="その他">その他</option>
        </select>
        <input type="text" id="vaccine-custom" placeholder="その他の場合は入力" style="display:none; margin-top:6px;">
      </div>
      <div class="form-group">
        <label for="vaccine-date">接種日</label>
        <input type="date" id="vaccine-date">
      </div>
      <div class="form-group">
        <label for="vaccine-memo">メモ（任意）</label>
        <input type="text" id="vaccine-memo" placeholder="例：1回目、副反応なし">
      </div>
      <button id="add-btn" class="btn-primary">追加する</button>
    </section>

    <section class="list-section">
      <h2>接種記録一覧</h2>
      <div id="record-list" class="record-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>

    <section class="next-section">
      <h2>次回接種の目安</h2>
      <div id="next-list" class="next-list">
        <p class="empty-msg">記録を追加すると次回目安が表示されます</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
