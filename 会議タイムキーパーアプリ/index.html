<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会議タイムキーパー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>会議タイムキーパー</h1>

    <!-- 議題登録フォーム -->
    <section class="form-section">
      <h2>議題を追加</h2>
      <div class="form-row">
        <input type="text" id="agendaTitle" placeholder="議題名" maxlength="50">
        <input type="number" id="agendaMinutes" placeholder="分" min="1" max="999">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <!-- 議題リスト -->
    <section class="list-section">
      <div class="list-header">
        <h2>議題一覧</h2>
        <button id="clearBtn" class="btn-secondary">全削除</button>
      </div>
      <ul id="agendaList"></ul>
      <p id="emptyMsg" class="empty-msg">議題がありません</p>
    </section>

    <!-- タイマー -->
    <section class="timer-section" id="timerSection">
      <div class="current-agenda" id="currentAgendaName">—</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-progress">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="timer-controls">
        <button id="startStopBtn" class="btn-primary">スタート</button>
        <button id="nextBtn" class="btn-secondary">次の議題 →</button>
      </div>
      <div class="agenda-status" id="agendaStatus"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
