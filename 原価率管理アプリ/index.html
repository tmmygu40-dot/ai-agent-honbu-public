<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原価率管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>原価率管理アプリ</h1>
  </header>

  <main>
    <!-- タブナビゲーション -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="ingredients">食材管理</button>
      <button class="tab-btn" data-tab="menus">メニュー管理</button>
    </nav>

    <!-- 食材管理タブ -->
    <section id="tab-ingredients" class="tab-content active">
      <h2>食材登録</h2>
      <form id="ingredient-form" class="form-card">
        <div class="form-row">
          <label for="ing-name">食材名</label>
          <input type="text" id="ing-name" placeholder="例：鶏もも肉" required>
        </div>
        <div class="form-row">
          <label for="ing-unit-price">単価（円）</label>
          <input type="number" id="ing-unit-price" placeholder="例：200" min="0" step="0.01" required>
        </div>
        <div class="form-row">
          <label for="ing-unit">単位</label>
          <input type="text" id="ing-unit" placeholder="例：100g、1個" required>
        </div>
        <button type="submit" class="btn-primary">登録</button>
      </form>

      <h2>食材一覧</h2>
      <div id="ingredient-list" class="list-container">
        <p class="empty-msg">食材が登録されていません</p>
      </div>
    </section>

    <!-- メニュー管理タブ -->
    <section id="tab-menus" class="tab-content">
      <h2>メニュー登録</h2>
      <form id="menu-form" class="form-card">
        <div class="form-row">
          <label for="menu-name">メニュー名</label>
          <input type="text" id="menu-name" placeholder="例：唐揚げ定食" required>
        </div>
        <div class="form-row">
          <label for="menu-price">販売価格（円）</label>
          <input type="number" id="menu-price" placeholder="例：800" min="0" step="0.01" required>
        </div>

        <h3>使用食材</h3>
        <div id="menu-ingredients">
          <!-- 動的に追加 -->
        </div>
        <button type="button" id="add-ingredient-row" class="btn-secondary">＋ 食材を追加</button>

        <button type="submit" class="btn-primary" style="margin-top:12px">登録</button>
      </form>

      <h2>メニュー一覧</h2>
      <div id="menu-list" class="list-container">
        <p class="empty-msg">メニューが登録されていません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
