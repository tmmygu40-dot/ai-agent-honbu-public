<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネタおみくじ｜今日の不運を30秒でポジ変換</title>
  <meta name="description" content="今日のちょっとした不運やミスを入力するだけで、ネタ系運勢ランクとポジティブ変換のひとことを30秒で生成。落ち込みを笑いに変える、ゆるめの開運おみくじです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { min-height: 88px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.6rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 0.8rem; font-weight: 600; }
    .result-sub { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; margin-bottom: 0.4rem; text-align: left; }
    .result-sub b { color: var(--text); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    .history-item {
      padding: 0.7rem 0.2rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-rank { font-weight: 800; color: var(--accent); margin-right: 0.4rem; }
    .history-item .h-text { color: var(--text-sub); font-size: 0.78rem; margin-top: 0.2rem; }

    .btn-share {
      display: block; margin: 0.8rem auto 0; padding: 0.55rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🔮 ネタおみくじ</h1>
    <p class="subtitle">今日のしょうもない不運を、30秒でゆるく笑い飛ばすポジ変換おみくじ</p>
  </header>

  <div class="card">
    <p class="card-title">今日の不運を入力</p>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="日常">日常（電車遅延・忘れ物・寝坊など）</option>
        <option value="仕事">仕事（会議・上司・PCトラブル）</option>
        <option value="恋愛">恋愛・人間関係</option>
        <option value="健康">健康・体調</option>
        <option value="お金">お金（出費・落とし物）</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="story">不運エピソード（1〜3行でOK）</label>
      <textarea id="story" placeholder="例：傘を忘れて全身ずぶ濡れ。しかも靴下から水が…"></textarea>
      <p class="hint">空欄でも引けます（運勢だけ知りたい人向け）</p>
    </div>
  </div>

  <button class="btn-calc" onclick="draw()">🎴 お告げを引く</button>

  <div class="result-card" id="result">
    <p class="result-label">本日のお告げ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <div id="detail-rows"></div>
    <button class="btn-share no-print" onclick="shareText()">📋 結果をコピー</button>
  </div>

  <div class="card" id="history-card" style="display:none">
    <p class="card-title">直近のお告げ履歴（最新5件）</p>
    <div id="history-list"></div>
    <button class="btn-pdf no-print" style="margin-top:0.8rem" onclick="clearHistory()">🗑 履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎲 本ツールはエンタメ目的のネタ系おみくじです。占い結果はランダム生成で、運勢を保証するものではありません。気分転換・話のタネとしてご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ネタ系運勢ランク（おみくじ風） ──
  var RANKS = [
    { name: '超神吉',    weight: 5,  level: 'ok',   emoji: '🎉' },
    { name: '大吉',      weight: 12, level: 'ok',   emoji: '🌟' },
    { name: '中吉',      weight: 18, level: 'ok',   emoji: '✨' },
    { name: '小吉',      weight: 18, level: 'ok',   emoji: '🍀' },
    { name: '末吉',      weight: 15, level: 'warn', emoji: '🌱' },
    { name: '凡',        weight: 12, level: 'warn', emoji: '😐' },
    { name: '小凶',      weight: 10, level: 'warn', emoji: '😅' },
    { name: '大凶',      weight: 7,  level: 'ng',   emoji: '💀' },
    { name: '愛され大凶', weight: 3,  level: 'ng',   emoji: '🥹' }
  ];

  // ── ポジ変換ひとこと（カテゴリ × 運勢レベル別） ──
  var POSITIVE = {
    日常: {
      ok:   [
        'その不運、宇宙が「お前は今日も主人公」と認識してる証拠だ。',
        '神様が「ネタを提供しておいた」とウインクしている。',
        '今日のあなたは伝説の始まり。語り草になる素質あり。',
        'ささやかなアクシデントは、無事だったことの裏返し。今日も生きてて偉い。'
      ],
      warn: [
        '誰かに話したら3秒で笑いが取れる。それは才能の前借りだ。',
        '人生のスパイス。ノンスパイスの料理が美味いか考えてみよう。',
        'これくらいで済んでよかった、と未来のあなたが言ってる。'
      ],
      ng:   [
        '今日は「修行回」。経験値が爆上がりしている自覚を持て。',
        'ここまで来たら、もう逆に自慢できる不運。記念日認定。',
        '神様の「お前のメンタル試したい」リストの上位にいる証。光栄である。'
      ]
    },
    仕事: {
      ok:   [
        '今日のミスは、明日のあなたを救う伏線。',
        '上司がイラついてるのは、あなたの存在感が大きい証拠。',
        '会議が長引くのは、あなたの貢献ポイントが貯まってるから。'
      ],
      warn: [
        'トラブル対応スキルが+1されました。LV.UPの音を聞け。',
        'PCが固まる時間は、思考を整える神タイム。',
        '想定外こそ、語れる経験。職務経歴書がリッチになる。'
      ],
      ng:   [
        '組織は今、あなたという核を試している。耐えた先に伝説あり。',
        '今日の理不尽は、転職市場であなたの価値を上げる燃料だ。',
        '退勤後のビールが過去最高に美味い権利、獲得済み。'
      ]
    },
    恋愛: {
      ok:   [
        'すれ違いは、再会の伏線。物語は今がいいとこ。',
        '今のモヤモヤは、自分の輪郭を確かめるためのコンパス。',
        '誰かが見てる。たぶん見てる。きっと見てる。'
      ],
      warn: [
        '人間関係の摩擦は、自分の譲れない軸を教えてくれる。',
        '気まずさは、近すぎた距離を健全に戻すサイン。',
        '「合わない人がいる」は「合う人がいる」の裏返し。'
      ],
      ng:   [
        '今日の悲恋は、未来の名作のラフ稿。',
        'この経験で「絶対譲れないリスト」が一行追加された。立派な財産。',
        '推しに課金する正当な理由が、また1つ増えた。'
      ]
    },
    健康: {
      ok:   [
        '体が「ちょっと休もう」と話しかけてきた。聞いてあげるとご褒美あり。',
        '不調は、丁寧に生きるリマインダー。',
        '今日早めに寝れば、明日の自分にめっちゃ感謝される。'
      ],
      warn: [
        '寝不足は、明日の自分に「ちゃんと寝ようね」と教える先生。',
        '体調の波は、無理してた証。よく頑張った。',
        '小さな不調は、大きな不調を未然に止めてくれている。'
      ],
      ng:   [
        '休むことは、生産性の高い選択肢のひとつ。サボりではない。',
        '今日の体は「マジで頼むから休んで」と全力で訴えている。聞こう。',
        '健康診断的に、今が見直しの神タイミング。'
      ]
    },
    お金: {
      ok:   [
        '今日の出費は、未来のあなたへの先行投資。',
        '財布が軽くなった分、フットワークが軽くなった。物理。',
        '臨時出費は、人生に必要なリズム。神様の家計簿に貸しを作った。'
      ],
      warn: [
        'お金で済む問題は、軽傷。命と健康はちゃんとある。',
        '出費の痛みは、お金との距離感を整えるストレッチ。',
        '今日の支出、来月の自分が「あの時払って正解」と言うやつ。'
      ],
      ng:   [
        'お金は天下の回りもの。今は他人の番、また回ってくる。',
        '大きな出費は、家計簿アプリを開く絶好のチャンス。',
        '損切りは勝ちへの第一歩。経済的成熟度が爆上がり中。'
      ]
    },
    その他: {
      ok:   [
        'その不運、SNSのネタとして3万いいねの素質あり。',
        '今日のあなたは何かに選ばれている。意味はあとで分かる。',
        '小さな不運は、幸運の試食コーナー。'
      ],
      warn: [
        '人生はバランス。今日のマイナスは、明日のプラスの予約金。',
        '「あるある」を集めてるレアキャラ、それがあなた。',
        '物語は平坦より起伏。今は起伏パート。読者は喜んでる。'
      ],
      ng:   [
        '神様はあなたを試して泣くほど強くしようとしている。健気である。',
        'こんな日もある、を超えて、こんな日しかない時期もある。あとで笑える。',
        '今日のあなたを、3年後のあなたが映画化したがる。'
      ]
    }
  };

  // ── ラッキーアクション（運勢レベル別） ──
  var LUCKY_ACT = {
    ok: [
      '今すぐコンビニで300円以内のご褒美を買う',
      '明るい色の服を1点身につける',
      '誰かに「今日いい日だね」と言ってみる',
      '空を10秒見上げる',
      '推しの画像を3枚開く'
    ],
    warn: [
      'お湯を多めに沸かしてあったかい飲み物を作る',
      'スマホを15分だけ伏せて深呼吸',
      '甘いものを1個だけ食べる（罪悪感ナシ）',
      '今日の自分に「お疲れ」とつぶやく',
      '部屋の電気を1段階明るくする'
    ],
    ng: [
      '湯船に肩まで5分浸かる',
      '寝る前にコップ1杯の水を飲む',
      '今日はもう何もしない権利を行使する',
      '推しの動画を1本見て無心になる',
      '明日の自分にメモを1行残して寝る'
    ]
  };

  // ── ラッキーアイテム ──
  var LUCKY_ITEMS = [
    'あったかい飲み物', '小さな鏡', '推しのアクスタ', '黄色いハンカチ', 'お気に入りの靴下',
    'チョコ1粒', '香りのあるリップ', '丸いボタン', 'ポイントカード', 'メモ帳の最終ページ',
    '歩きやすいスニーカー', '丸い時計', '小銭3枚', 'タオル1枚', 'のど飴'
  ];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function pickRank() {
    var total = 0;
    for (var i = 0; i < RANKS.length; i++) total += RANKS[i].weight;
    var r = Math.random() * total;
    var sum = 0;
    for (var j = 0; j < RANKS.length; j++) {
      sum += RANKS[j].weight;
      if (r < sum) return RANKS[j];
    }
    return RANKS[0];
  }

  function draw() {
    var cat = document.getElementById('cat').value;
    var story = document.getElementById('story').value.trim();
    var rank = pickRank();
    var msg = pick(POSITIVE[cat][rank.level]);
    var act = pick(LUCKY_ACT[rank.level]);
    var item = pick(LUCKY_ITEMS);

    showResult(rank, msg, act, item, story, cat);
    saveHistory({
      ts: Date.now(), rank: rank.name, emoji: rank.emoji,
      level: rank.level, msg: msg, act: act, item: item,
      story: story, cat: cat
    });
    renderHistory();
  }

  function showResult(rank, msg, act, item, story, cat) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + rank.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rank.emoji + ' ' + rank.name;
    document.getElementById('rn').textContent = msg;

    var rows = '';
    if (story) {
      rows += '<p class="result-sub"><b>📝 今日の不運：</b>' + escapeHtml(story) + '（' + cat + '）</p>';
    } else {
      rows += '<p class="result-sub"><b>📝 カテゴリ：</b>' + cat + '</p>';
    }
    rows += '<p class="result-sub"><b>🌈 ラッキーアクション：</b>' + escapeHtml(act) + '</p>';
    rows += '<p class="result-sub"><b>🎁 ラッキーアイテム：</b>' + escapeHtml(item) + '</p>';
    document.getElementById('detail-rows').innerHTML = rows;

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function shareText() {
    var rv = document.getElementById('rv').textContent;
    var rn = document.getElementById('rn').textContent;
    var detail = document.getElementById('detail-rows').textContent.trim().replace(/\s+/g, ' ');
    var text = '【ネタおみくじ】\n' + rv + '\n' + rn + '\n' + detail;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function () {
        alert('結果をコピーしました');
      }, function () { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('結果をコピーしました'); }
    catch (e) { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }

  // ── localStorage 履歴 ──
  var LS_KEY = 'neta_omikuji_history_v1';

  function loadHistory() {
    try {
      var s = localStorage.getItem(LS_KEY);
      return s ? JSON.parse(s) : [];
    } catch (e) { return []; }
  }
  function saveHistory(item) {
    var h = loadHistory();
    h.unshift(item);
    if (h.length > 5) h = h.slice(0, 5);
    try { localStorage.setItem(LS_KEY, JSON.stringify(h)); } catch (e) {}
  }
  function clearHistory() {
    if (!confirm('履歴を全て削除しますか？')) return;
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    renderHistory();
  }
  function renderHistory() {
    var h = loadHistory();
    var card = document.getElementById('history-card');
    var list = document.getElementById('history-list');
    if (!h.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = h.map(function (x) {
      var d = new Date(x.ts);
      var dt = d.getMonth() + 1 + '/' + d.getDate() + ' ' +
               String(d.getHours()).padStart(2, '0') + ':' +
               String(d.getMinutes()).padStart(2, '0');
      var storyPart = x.story ? '「' + escapeHtml(x.story) + '」' : '（不運：未入力）';
      return '<div class="history-item">'
           + '<span class="h-rank">' + x.emoji + ' ' + escapeHtml(x.rank) + '</span>'
           + '<span style="color:var(--text-sub);font-size:0.78rem">' + dt + ' / ' + escapeHtml(x.cat) + '</span>'
           + '<div class="h-text">' + storyPart + '</div>'
           + '<div class="h-text">→ ' + escapeHtml(x.msg) + '</div>'
           + '</div>';
    }).join('');
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // 起動時に履歴復元
  renderHistory();
  </script>
