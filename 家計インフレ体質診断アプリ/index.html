<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="食費・光熱費・通信費など支出項目と月額を入力するだけで、インフレ耐性スコアと優先的に削減すべき費目を即診断。家計の物価上昇リスクが一目でわかる生活防衛アプリです。">
  <title>家計インフレ体質診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 優先削減リスト ── */
    .cut-list { list-style: none; padding: 0; }
    .cut-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
    .cut-item:last-child { border-bottom: none; }
    .cut-rank { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 800; color: #fff; flex-shrink: 0; }
    .cut-rank.r1 { background: var(--ng); }
    .cut-rank.r2 { background: var(--warn); }
    .cut-rank.r3 { background: var(--accent); }
    .cut-rank.r4, .cut-rank.r5 { background: var(--text-sub); }
    .cut-name { font-size: 0.92rem; font-weight: 600; flex: 1; }
    .cut-impact { font-size: 0.82rem; color: var(--text-sub); text-align: right; white-space: nowrap; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>家計インフレ体質診断アプリ</h1>
    <p class="subtitle">支出を入力するだけで、物価上昇に弱い費目と耐性スコアを即診断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">月の支出を入力（円）</p>
    <div class="field">
      <label for="food">食費</label>
      <input type="number" id="food" placeholder="例: 50000" inputmode="numeric">
      <p class="hint">外食・中食・自炊すべて含む</p>
    </div>
    <div class="field">
      <label for="energy">光熱費（電気・ガス・水道）</label>
      <input type="number" id="energy" placeholder="例: 20000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="telecom">通信費（スマホ・ネット）</label>
      <input type="number" id="telecom" placeholder="例: 10000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="insurance">保険料</label>
      <input type="number" id="insurance" placeholder="例: 15000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="housing">住居費（家賃・ローン）</label>
      <input type="number" id="housing" placeholder="例: 80000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="transport">交通費（車両・通勤・ガソリン）</label>
      <input type="number" id="transport" placeholder="例: 15000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="daily">日用品・消耗品</label>
      <input type="number" id="daily" placeholder="例: 10000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="education">教育費</label>
      <input type="number" id="education" placeholder="例: 20000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="entertainment">娯楽・趣味</label>
      <input type="number" id="entertainment" placeholder="例: 15000" inputmode="numeric">
    </div>
    <div class="field">
      <label for="other">その他</label>
      <input type="number" id="other" placeholder="例: 10000" inputmode="numeric">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">インフレ耐性を診断する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">インフレ耐性スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">支出内訳とインフレ影響度</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 優先削減カード -->
  <div class="card" id="cut-card" style="display:none">
    <p class="card-title">優先削減費目（インフレに弱い順）</p>
    <ul class="cut-list" id="cut-list"></ul>
  </div>

  <!-- 結果別Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省統計局の消費者物価指数（CPI）や家計調査を参考に、品目別の物価上昇率を目安として整理しています。最新情報は総務省統計局の公式データをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 結果別Q&A ON（生活防衛系） ──
  var ENABLE_RESULT_QA = true;

  var EMOJI_MSG = {
    ok:   { e: '😌', t: '物価が上がっても、今の家計なら安心' },
    warn: { e: '🤔', t: 'ちょっと見直すと、もっと安心できるかも' },
    ng:   { e: '😱', t: '物価上昇の影響を受けやすい家計です' }
  };

  var QA = {
    ok: [
      { q: '今のままで大丈夫？', a: 'インフレに強い支出構成です。固定費が安定しているので急な物価上昇でも慌てる必要はありません。' },
      { q: 'もっと強くするには？', a: '食費の中で外食比率を抑えたり、まとめ買い・ふるさと納税を活用するとさらに安心です。' },
      { q: '定期的にチェックすべき？', a: '半年に1回、同じ項目で再診断すると変化に気づけます。' },
      { q: '余裕が出たら？', a: '余裕資金をインフレに強い資産（実物資産や物価連動型）に振り向けるのも一手です。' }
    ],
    warn: [
      { q: 'すぐ困る？', a: 'すぐに困るわけではありませんが、物価が5%上がると月数千円の負担増になる可能性があります。' },
      { q: '何から見直す？', a: '上の「優先削減費目」で1位になった項目を月1,000円でも減らすところから始めましょう。' },
      { q: '固定費は変えにくい…', a: '通信費のプラン変更、保険の見直し、電力会社の切り替えなど、1回の手続きで毎月効く方法があります。' },
      { q: '食費を減らすコツは？', a: '自炊比率を上げる、特売日にまとめ買い、冷凍保存の活用が効果的です。' }
    ],
    ng: [
      { q: '大丈夫？', a: '今すぐ生活が破綻するわけではありませんが、物価上昇が続くと家計が圧迫されやすい構成です。' },
      { q: '最優先でやることは？', a: '優先削減費目の上位2つを確認し、代替手段がないか調べることです。' },
      { q: '相談先はある？', a: '自治体の家計相談窓口や、FP（ファイナンシャルプランナー）の無料相談を活用する手もあります。' },
      { q: '長期的には？', a: '収入を増やす・支出を減らす・資産を守る、の3本柱で対策を考えましょう。' }
    ]
  };

  // ── 支出項目の定義（id, 名前, インフレ影響係数, 想定上昇率%） ──
  var ITEMS = [
    { id: 'food',          name: '食費',           weight: 1.5, rate: 8  },
    { id: 'energy',        name: '光熱費',         weight: 1.4, rate: 15 },
    { id: 'daily',         name: '日用品',         weight: 1.3, rate: 7  },
    { id: 'transport',     name: '交通費',         weight: 1.2, rate: 6  },
    { id: 'education',     name: '教育費',         weight: 1.1, rate: 4  },
    { id: 'entertainment', name: '娯楽・趣味',     weight: 1.0, rate: 3  },
    { id: 'other',         name: 'その他',         weight: 1.0, rate: 3  },
    { id: 'telecom',       name: '通信費',         weight: 0.8, rate: 2  },
    { id: 'insurance',     name: '保険料',         weight: 0.6, rate: 1  },
    { id: 'housing',       name: '住居費',         weight: 0.5, rate: 1  }
  ];

  function calc() {
    var values = {};
    var total = 0;
    var hasInput = false;

    ITEMS.forEach(function(item) {
      var v = parseFloat(document.getElementById(item.id).value) || 0;
      values[item.id] = v;
      total += v;
      if (v > 0) hasInput = true;
    });

    if (!hasInput) { showErr('1つ以上の支出を入力してください'); return; }

    // インフレ耐性スコア計算（0〜100）
    // 高weight項目の割合が高いほどスコアが低い（＝インフレに弱い）
    var weightedSum = 0;
    var maxWeightedSum = 0;
    ITEMS.forEach(function(item) {
      weightedSum += values[item.id] * item.weight;
      maxWeightedSum += values[item.id] * 1.5; // 全部最悪の場合
    });

    var vulnerabilityRatio = maxWeightedSum > 0 ? weightedSum / maxWeightedSum : 0;
    var score = Math.round((1 - vulnerabilityRatio) * 100 + 15); // 15点底上げ
    score = Math.max(0, Math.min(100, score));

    var level, evalText;
    if (score >= 65) {
      level = 'ok';
      evalText = 'インフレに強い家計です';
    } else if (score >= 40) {
      level = 'warn';
      evalText = 'やや物価上昇の影響を受けやすい家計です';
    } else {
      level = 'ng';
      evalText = 'インフレに弱い家計構造です';
    }

    var monthlyImpact = 0;
    ITEMS.forEach(function(item) {
      monthlyImpact += values[item.id] * (item.rate / 100);
    });

    showResult(level, score + ' 点', evalText);
    document.getElementById('rn').textContent =
      '物価が想定通り上昇した場合、月 ' + fmt(Math.round(monthlyImpact)) + ' 円の負担増になる見込みです';

    // 内訳テーブル
    var rows = [];
    ITEMS.forEach(function(item) {
      if (values[item.id] > 0) {
        var impact = Math.round(values[item.id] * (item.rate / 100));
        var pct = total > 0 ? (values[item.id] / total * 100).toFixed(1) : 0;
        rows.push([
          item.name,
          fmt(values[item.id]) + ' 円（' + pct + '%）',
          false
        ]);
      }
    });
    rows.push(['合計', fmt(total) + ' 円', true]);
    rows.push(['想定月額負担増', '+' + fmt(Math.round(monthlyImpact)) + ' 円/月', true]);
    showDetail(rows);

    // 優先削減リスト（金額×影響係数で降順）
    var ranked = ITEMS
      .filter(function(item) { return values[item.id] > 0; })
      .map(function(item) {
        var impactScore = values[item.id] * item.weight;
        var monthUp = Math.round(values[item.id] * (item.rate / 100));
        return { name: item.name, impactScore: impactScore, monthUp: monthUp };
      })
      .sort(function(a, b) { return b.impactScore - a.impactScore; });

    var cutHtml = '';
    ranked.forEach(function(r, i) {
      var rankClass = i < 5 ? 'r' + (i + 1) : 'r5';
      cutHtml += '<li class="cut-item">'
        + '<span class="cut-rank ' + rankClass + '">' + (i + 1) + '</span>'
        + '<span class="cut-name">' + r.name + '</span>'
        + '<span class="cut-impact">+' + fmt(r.monthUp) + ' 円/月</span>'
        + '</li>';
    });
    document.getElementById('cut-list').innerHTML = cutHtml;
    document.getElementById('cut-card').style.display = 'block';

    showQA(level);
    saveToStorage(values);
  }

  function showResult(level, val, evalText) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = evalText;
  }
  function showQA(level) {
    if (!ENABLE_RESULT_QA) return;
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = 'block';
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('cut-card').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── localStorage ──
  var STORAGE_KEY = 'inflation_taishitsu_values';
  function saveToStorage(values) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(values)); } catch(e) {}
  }
  function loadFromStorage() {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!data) return;
      ITEMS.forEach(function(item) {
        if (data[item.id]) document.getElementById(item.id).value = data[item.id];
      });
    } catch(e) {}
  }
  loadFromStorage();
  </script>
