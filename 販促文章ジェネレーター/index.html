<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販促文章ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    /* 生成結果カード */
    .result-wrap {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .platform-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .platform-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.8rem;
    }
    .platform-label {
      font-size: 0.85rem; font-weight: 800;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .platform-label.ig { color: #c13584; }
    .platform-label.tw { color: #000; }
    .platform-label.ln { color: #06c755; }
    .btn-copy {
      padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 7px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }
    .gen-text {
      width: 100%; min-height: 120px;
      padding: 0.8rem; font-size: 0.9rem; line-height: 1.7;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      resize: vertical; font-family: inherit;
    }
    /* 生成履歴 */
    .history-list { list-style: none; }
    .history-item {
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-sub); line-height: 1.4;
      cursor: pointer; transition: background 0.1s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--accent-light); border-radius: 8px; }
    .history-item strong { color: var(--text); display: block; margin-bottom: 0.15rem; }
    .history-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-copy { display: none !important; }
      .card, .platform-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>📣 販促文章ジェネレーター</h1>
    <p class="subtitle">業種・商品を入力するだけでSNS・LINE向け投稿文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食店">飲食店</option>
        <option value="カフェ・スイーツ店">カフェ・スイーツ店</option>
        <option value="美容院・サロン">美容院・サロン</option>
        <option value="小売・アパレル">小売・アパレル</option>
        <option value="整骨院・整体院">整骨院・整体院</option>
        <option value="教室・スクール">教室・スクール</option>
        <option value="不動産業">不動産業</option>
        <option value="サービス業">サービス業</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="product">商品・サービス名</label>
      <input type="text" id="product" placeholder="例: 季節のパスタランチ、夏のカラーリング">
    </div>
    <div class="field">
      <label for="point">セールスポイント</label>
      <input type="text" id="point" placeholder="例: 期間限定20%OFF、新メニュー登場、数量限定">
      <p class="hint">訴求したい一番のポイントを入力してください</p>
    </div>
    <div class="field">
      <label for="target">ターゲット</label>
      <select id="target">
        <option value="全てのお客様">全てのお客様</option>
        <option value="新規のお客様">新規のお客様</option>
        <option value="常連のお客様">常連のお客様</option>
        <option value="お近くの方">お近くの方</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">📝 投稿文を生成する</button>

  <!-- 生成結果 -->
  <div class="result-wrap" id="resultWrap">

    <div class="platform-card">
      <div class="platform-header">
        <span class="platform-label ig">📸 Instagram</span>
        <button class="btn-copy no-print" onclick="copyText('igText', this)">コピー</button>
      </div>
      <textarea class="gen-text" id="igText" readonly></textarea>
    </div>

    <div class="platform-card">
      <div class="platform-header">
        <span class="platform-label tw">🐦 X（Twitter）</span>
        <button class="btn-copy no-print" onclick="copyText('twText', this)">コピー</button>
      </div>
      <textarea class="gen-text" id="twText" readonly style="min-height:90px;"></textarea>
    </div>

    <div class="platform-card">
      <div class="platform-header">
        <span class="platform-label ln">💬 LINE</span>
        <button class="btn-copy no-print" onclick="copyText('lnText', this)">コピー</button>
      </div>
      <textarea class="gen-text" id="lnText" readonly></textarea>
    </div>

  </div>

  <!-- 生成履歴 -->
  <div class="card no-print">
    <p class="card-title">生成履歴（最大5件）</p>
    <ul class="history-list" id="historyList">
      <li class="history-empty">まだ生成履歴がありません</li>
    </ul>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'hansoku_v1';
  var HISTORY_KEY = 'hansoku_history_v1';

  // 業種別ハッシュタグ
  var hashtagMap = {
    '飲食店':     ['#飲食店', '#ランチ', '#グルメ', '#おいしい', '#食べ歩き'],
    'カフェ・スイーツ店': ['#カフェ', '#スイーツ', '#カフェ活', '#おやつ', '#カフェ巡り'],
    '美容院・サロン':  ['#美容院', '#ヘアサロン', '#ヘアカラー', '#美容', '#サロン'],
    '小売・アパレル':  ['#ファッション', '#アパレル', '#コーデ', '#おしゃれ', '#新作'],
    '整骨院・整体院':  ['#整骨院', '#整体', '#腰痛', '#肩こり', '#体の悩み'],
    '教室・スクール':  ['#習い事', '#スクール', '#教室', '#学び', '#スキルアップ'],
    '不動産業':    ['#不動産', '#賃貸', '#物件情報', '#引っ越し', '#マイホーム'],
    'サービス業':   ['#サービス', '#便利', '#おすすめ', '#地域密着', '#丁寧'],
    'その他':     ['#お知らせ', '#おすすめ', '#新着情報', '#お得', '#限定']
  };

  // 業種別絵文字
  var emojiMap = {
    '飲食店': '🍽️', 'カフェ・スイーツ店': '☕', '美容院・サロン': '✂️',
    '小売・アパレル': '👗', '整骨院・整体院': '💆', '教室・スクール': '📚',
    '不動産業': '🏠', 'サービス業': '🤝', 'その他': '✨'
  };

  function generate() {
    var industry = document.getElementById('industry').value;
    var product  = document.getElementById('product').value.trim();
    var point    = document.getElementById('point').value.trim();
    var target   = document.getElementById('target').value;

    if (!product) { alert('商品・サービス名を入力してください'); return; }
    if (!point)   { alert('セールスポイントを入力してください'); return; }

    var emoji = emojiMap[industry] || '✨';
    var tags  = (hashtagMap[industry] || ['#お知らせ']).join(' ');

    // Instagram 文章
    var ig = emoji + '【' + industry + 'からのお知らせ】' + emoji + '\n\n'
      + '✨ ' + product + ' ✨\n\n'
      + '📣 ' + point + '\n\n'
      + target + 'へお届けしたい特別情報です！\n\n'
      + 'ぜひこの機会にご利用ください🙏\n\n'
      + tags + ' #' + product.replace(/[^\u3040-\u30FF\u4E00-\u9FFF\uFF01-\uFF60a-zA-Z0-9]/g, '');

    // X(Twitter) 文章
    var tw = '【' + industry + '】' + product + '\n\n'
      + point + '！\n\n'
      + target + 'の方、ぜひチェックしてみてください👀\n\n'
      + (hashtagMap[industry] || ['#お知らせ']).slice(0, 3).join(' ');

    // LINE 文章
    var ln = 'こんにちは！\n'
      + industry + 'からお得なお知らせです😊\n\n'
      + '▼ ' + product + '\n'
      + point + '\n\n'
      + target + 'の皆様に特別にお伝えしたい情報です✉️\n\n'
      + 'ぜひお気軽にご来店・ご利用ください！\n'
      + 'お待ちしております🙏';

    document.getElementById('igText').value = ig;
    document.getElementById('twText').value = tw;
    document.getElementById('lnText').value = ln;
    document.getElementById('resultWrap').style.display = 'block';

    // 保存
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ industry: industry, product: product, point: point, target: target }));
    addHistory(industry, product, point, ig);
  }

  function copyText(id, btn) {
    var ta = document.getElementById(id);
    ta.select();
    ta.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(ta.value).then(function() {
      btn.textContent = '✓ コピー済';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
    }).catch(function() {
      document.execCommand('copy');
      btn.textContent = '✓ コピー済';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function addHistory(industry, product, point, igText) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({ industry: industry, product: product, point: point, ig: igText, ts: new Date().toLocaleString('ja-JP') });
    if (history.length > 5) history = history.slice(0, 5);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<li class="history-empty">まだ生成履歴がありません</li>';
      return;
    }
    list.innerHTML = history.map(function(h, i) {
      return '<li class="history-item" onclick="restoreHistory(' + i + ')">'
        + '<strong>' + h.industry + ' — ' + h.product + '</strong>'
        + h.point + '　<span style="font-size:0.75rem;opacity:0.7">' + h.ts + '</span>'
        + '</li>';
    }).join('');
  }

  function restoreHistory(i) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var h = history[i];
    if (!h) return;
    document.getElementById('industry').value = h.industry;
    document.getElementById('product').value  = h.product;
    document.getElementById('point').value    = h.point;
    generate();
  }

  // 初期化
  (function init() {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved) {
      if (saved.industry) document.getElementById('industry').value = saved.industry;
      if (saved.product)  document.getElementById('product').value  = saved.product;
      if (saved.point)    document.getElementById('point').value    = saved.point;
      if (saved.target)   document.getElementById('target').value   = saved.target;
    }
    renderHistory();
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
