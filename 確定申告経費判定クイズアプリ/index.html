<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="経費になる？ならない？よくある支出を○×で判定する10問クイズ。確定申告で迷いがちな経費の線引きを楽しく学べます。">
  <title>確定申告 経費判定クイズ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── クイズ専用 ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); text-align: center;
      margin-bottom: 0.8rem;
    }
    .quiz-progress-bar {
      width: 100%; max-width: 600px; height: 6px;
      background: var(--border); border-radius: 3px;
      margin: 0 auto 1rem; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; transition: width 0.3s;
    }
    .quiz-question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; text-align: center;
    }
    .quiz-scenario {
      font-size: 0.88rem; color: var(--text-sub); line-height: 1.5;
      margin-bottom: 1rem; text-align: center;
    }
    .quiz-buttons {
      display: flex; gap: 0.8rem; justify-content: center;
    }
    .quiz-btn {
      flex: 1; max-width: 180px; padding: 0.9rem 1rem;
      font-size: 1.1rem; font-weight: 800; border: 2.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      background: var(--card); color: var(--text);
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .quiz-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .quiz-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .quiz-btn.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .quiz-btn:disabled { cursor: default; opacity: 0.7; }

    .quiz-feedback {
      display: none; margin-top: 1rem; padding: 0.9rem;
      border-radius: 10px; font-size: 0.88rem; line-height: 1.5;
    }
    .quiz-feedback.correct { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); }
    .quiz-feedback.wrong { background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng); }
    .quiz-feedback .fb-title { font-weight: 700; margin-bottom: 0.3rem; }
    .quiz-feedback .fb-explain { color: var(--text-sub); }

    .quiz-next {
      display: none; margin: 1rem auto 0; padding: 0.7rem 1.5rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
    }

    /* ── スコア履歴 ── */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); }
    .history-score { font-weight: 700; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

</head>
<body>

  <header class="app-header">
    <h1>確定申告 経費判定クイズ</h1>
    <p class="subtitle">経費になる？ならない？10問で学ぶ経費の線引き（国税庁の基準を参考）</p>
  </header>

  <!-- スタート画面 -->
  <div class="card" id="start-screen">
    <p class="card-title">クイズについて</p>
    <p style="font-size:0.92rem;line-height:1.6;margin-bottom:1rem;">
      個人事業主・フリーランスがよく迷う「これって経費？」を○×形式で10問出題します。<br>
      全問終了後にスコアと解説を確認できます。
    </p>
    <div id="history-section" style="display:none;margin-top:1rem;">
      <p style="font-size:0.82rem;font-weight:700;color:var(--accent);margin-bottom:0.5rem;">過去のスコア</p>
      <div id="history-list"></div>
    </div>
  </div>

  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズをはじめる（10問）</button>

  <!-- クイズ画面 -->
  <div id="quiz-screen" style="display:none;">
    <p class="quiz-progress" id="progress-text"></p>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill"></div></div>
    <div class="card">
      <p class="quiz-question" id="q-text"></p>
      <p class="quiz-scenario" id="q-scenario"></p>
      <div class="quiz-buttons">
        <button class="quiz-btn" id="btn-yes" onclick="answer(true)">⭕ 経費になる</button>
        <button class="quiz-btn" id="btn-no" onclick="answer(false)">❌ ならない</button>
      </div>
      <div class="quiz-feedback" id="feedback">
        <p class="fb-title" id="fb-title"></p>
        <p class="fb-explain" id="fb-explain"></p>
      </div>
      <button class="quiz-next" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" style="display:none;">
    <div class="result-card" id="result">
      <p class="result-label">あなたのスコア</p>
      <p class="result-value" id="rv">—</p>
      <p class="result-note" id="rn"></p>
    </div>

    <div class="card" id="review-card">
      <p class="card-title">回答の振り返り</p>
      <div id="review-list"></div>
    </div>

    <button class="btn-calc" onclick="startQuiz()">もう一度チャレンジ</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国税庁の「必要経費」に関する公開資料を参考に作成しています。実際の判断は個別の状況により異なる場合があります。最新情報は国税庁ホームページをご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 問題データ（25問） ──
  var QUESTIONS = [
    { q: '自宅兼事務所の家賃', scenario: '自宅の一部を仕事用に使っている場合', ans: true, explain: '事業使用割合（按分）に応じた分は経費にできます。全額ではなく面積や時間で按分します。' },
    { q: '通勤用の定期券代', scenario: '自宅から取引先へ行く電車代', ans: true, explain: '事業に関連する交通費は経費になります。ただしプライベートの移動は除きます。' },
    { q: '友人との飲み会代', scenario: '週末に友人と居酒屋に行った', ans: false, explain: '事業に関連のない飲食費はプライベート支出です。取引先との会食なら接待交際費として経費になります。' },
    { q: '仕事用PCの購入費', scenario: '仕事専用に使うノートPCを12万円で購入', ans: true, explain: '事業で使用する備品は経費になります。10万円以上は減価償却の対象ですが、青色申告なら30万円未満は一括経費にできます。' },
    { q: 'スーツの購入費', scenario: '営業先への訪問用にスーツを新調した', ans: false, explain: '通常のスーツはプライベートでも使えるため、原則として経費にできません。特殊な作業着・制服は経費になります。' },
    { q: '事業用の書籍代', scenario: 'プログラミングの技術書を買った', ans: true, explain: '事業に直接関連する書籍・雑誌は「新聞図書費」として経費にできます。' },
    { q: '健康診断の費用', scenario: 'フリーランスとして年1回の健康診断を受けた', ans: false, explain: '個人事業主本人の健康診断費用は経費にできません。従業員の分は福利厚生費として経費になる場合があります。' },
    { q: '事業用の携帯電話代', scenario: '仕事専用のスマホの月額料金', ans: true, explain: '事業専用であれば全額経費にできます。私用と兼用なら使用割合で按分します。' },
    { q: '国民健康保険料', scenario: '毎月支払っている国保の保険料', ans: false, explain: '国民健康保険料は「社会保険料控除」として所得控除になりますが、事業の経費にはなりません。' },
    { q: '取引先への手土産代', scenario: '打ち合わせ時に持参した菓子折り', ans: true, explain: '取引先への贈答品は「接待交際費」として経費にできます。' },
    { q: '所得税の支払い', scenario: '確定申告で納付した所得税', ans: false, explain: '所得税・住民税は経費にできません。ただし事業税・固定資産税（事業用）は経費になります。' },
    { q: '仕事部屋の電気代', scenario: '自宅兼事務所で仕事部屋のエアコンを使用', ans: true, explain: '事業使用割合で按分した電気代は経費にできます。使用面積や時間で合理的に按分します。' },
    { q: 'セミナー参加費', scenario: 'スキルアップのための有料セミナーに参加', ans: true, explain: '事業に関連する研修・セミナー費用は「研修費」として経費にできます。' },
    { q: '交通違反の罰金', scenario: '営業中に駐車違反で切符を切られた', ans: false, explain: '罰金・科料・過料は法律上経費にできません（損金不算入）。業務中でも不可です。' },
    { q: 'クラウド会計ソフト代', scenario: '毎月の会計ソフトのサブスク料金', ans: true, explain: '事業の経理に使うソフト代は経費にできます。年払いでもOKです。' },
    { q: '自宅の住宅ローン元本', scenario: '自宅兼事務所の住宅ローンを毎月返済', ans: false, explain: 'ローンの元本返済は経費にできません。利息部分は按分して経費にできます。' },
    { q: '名刺の印刷代', scenario: '事業用の名刺を100枚印刷した', ans: true, explain: '事業用の名刺・チラシ・パンフレットなどの印刷代は「広告宣伝費」として経費にできます。' },
    { q: 'ジムの会費', scenario: '健康維持のためにスポーツジムに通っている', ans: false, explain: '個人事業主本人のジム会費はプライベート支出です。インストラクターなど体が資本の業種でも原則不可です。' },
    { q: '仕事用のインターネット回線代', scenario: '自宅の光回線を仕事にも使っている', ans: true, explain: '按分して事業使用分は経費にできます。仕事専用なら全額OK。' },
    { q: '生命保険料', scenario: '毎月支払っている生命保険の掛金', ans: false, explain: '個人の生命保険料は「生命保険料控除」として所得控除になりますが、事業経費にはなりません。' },
    { q: '外注先への支払い', scenario: 'デザイナーにロゴ制作を発注して5万円支払った', ans: true, explain: '事業に関する外注費は経費にできます。支払調書の発行も忘れずに。' },
    { q: '趣味の釣り道具', scenario: '休日の釣り用にリールを購入した', ans: false, explain: '事業に無関係な趣味の支出は経費にできません。' },
    { q: '確定申告の税理士報酬', scenario: '確定申告を税理士に依頼して3万円支払った', ans: true, explain: '税理士・会計士への報酬は事業の経費にできます。' },
    { q: '事業で使う車のガソリン代', scenario: '営業回りに使う自家用車の給油代', ans: true, explain: '事業で使う車のガソリン代は按分して経費にできます。走行距離で按分するのが一般的です。' },
    { q: '資格取得の受験料', scenario: '事業に直接関係ない趣味の資格試験を受ける', ans: false, explain: '事業に直接関連しない資格取得費用は経費にできません。事業に必要な資格なら経費になる場合があります。' }
  ];

  var currentQuiz = [];
  var currentIndex = 0;
  var score = 0;
  var answers = [];

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function startQuiz() {
    currentQuiz = shuffle(QUESTIONS.slice()).slice(0, 10);
    currentIndex = 0;
    score = 0;
    answers = [];

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';

    showQuestion();
  }

  function showQuestion() {
    var q = currentQuiz[currentIndex];
    document.getElementById('progress-text').textContent = '第 ' + (currentIndex + 1) + ' 問 / 10問';
    document.getElementById('progress-fill').style.width = ((currentIndex) / 10 * 100) + '%';
    document.getElementById('q-text').textContent = '「' + q.q + '」は経費になる？';
    document.getElementById('q-scenario').textContent = q.scenario;

    document.getElementById('btn-yes').disabled = false;
    document.getElementById('btn-no').disabled = false;
    document.getElementById('btn-yes').className = 'quiz-btn';
    document.getElementById('btn-no').className = 'quiz-btn';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function answer(userAns) {
    var q = currentQuiz[currentIndex];
    var isCorrect = (userAns === q.ans);

    if (isCorrect) score++;
    answers.push({ q: q, userAns: userAns, correct: isCorrect });

    // ボタン表示
    document.getElementById('btn-yes').disabled = true;
    document.getElementById('btn-no').disabled = true;

    if (q.ans === true) {
      document.getElementById('btn-yes').className = 'quiz-btn correct';
      if (!isCorrect) document.getElementById('btn-no').className = 'quiz-btn wrong';
    } else {
      document.getElementById('btn-no').className = 'quiz-btn correct';
      if (!isCorrect) document.getElementById('btn-yes').className = 'quiz-btn wrong';
    }

    // フィードバック
    var fb = document.getElementById('feedback');
    fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
    document.getElementById('fb-title').textContent = isCorrect ? '⭕ 正解！' : '❌ 不正解…';
    document.getElementById('fb-explain').textContent = q.explain;
    fb.style.display = 'block';

    // 次へボタン
    var nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = currentIndex < 9 ? '次の問題へ →' : '結果を見る →';
    nextBtn.style.display = 'block';
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= 10) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    var msg = score >= 8 ? '素晴らしい！経費の線引きをよく理解しています'
            : score >= 5 ? 'まずまず。間違えた問題を復習するとさらに安心です'
            : '経費の基本を再確認しましょう。解説を読んで復習してみてください';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / 10 問正解';
    document.getElementById('rn').textContent = msg;

    // 振り返りリスト
    var html = '';
    answers.forEach(function(a, i) {
      var mark = a.correct ? '⭕' : '❌';
      var ansText = a.q.ans ? '経費になる' : 'ならない';
      html += '<div style="padding:0.7rem 0;border-bottom:1px solid var(--border);">'
            + '<p style="font-size:0.9rem;font-weight:700;">' + mark + ' 第' + (i+1) + '問: ' + a.q.q + '</p>'
            + '<p style="font-size:0.8rem;color:var(--text-sub);margin-top:0.2rem;">正解: ' + ansText + '</p>'
            + '<p style="font-size:0.8rem;color:var(--text-sub);line-height:1.4;">' + a.q.explain + '</p>'
            + '</div>';
    });
    document.getElementById('review-list').innerHTML = html;

    // プログレスバー完了
    document.getElementById('progress-fill').style.width = '100%';

    // スコア保存
    saveScore(score);
  }

  // ── localStorage ──
  function saveScore(s) {
    var key = 'quiz_expense_history';
    var history = JSON.parse(localStorage.getItem(key) || '[]');
    history.unshift({ date: new Date().toLocaleDateString('ja-JP'), score: s });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem(key, JSON.stringify(history));
  }

  function loadHistory() {
    var key = 'quiz_expense_history';
    var history = JSON.parse(localStorage.getItem(key) || '[]');
    if (history.length === 0) return;

    document.getElementById('history-section').style.display = 'block';
    var html = '';
    history.forEach(function(h) {
      html += '<div class="history-item">'
            + '<span class="history-date">' + h.date + '</span>'
            + '<span class="history-score">' + h.score + ' / 10</span>'
            + '</div>';
    });
    document.getElementById('history-list').innerHTML = html;
  }

  // 初期化
  loadHistory();
  </script>
