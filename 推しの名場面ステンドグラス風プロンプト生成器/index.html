<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの特徴・名場面・雰囲気を選ぶだけで、ステンドグラス風AI画像生成プロンプト（日本語＋英語）を即作れる無料ツール。Midjourney・Stable Diffusion等にそのままコピペで使えます。">
  <title>推しの名場面ステンドグラス風プロンプト生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #7c3aed;
      --accent-light: #f5f3ff;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #5b21b6, 0 6px 16px rgba(124,58,237,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5b21b6, 0 2px 8px rgba(124,58,237,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .prompt-card {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin: 0 auto 1rem; max-width: 600px;
      display: none;
    }
    .prompt-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); margin-bottom: 0.4rem; text-transform: uppercase;
    }
    .prompt-text {
      background: #fff; border: 1px solid var(--border); border-radius: 9px;
      padding: 0.85rem; font-size: 0.92rem; line-height: 1.6;
      color: var(--text); margin-bottom: 0.7rem;
      white-space: pre-wrap; word-break: break-word;
    }
    .prompt-text.eng { font-family: -apple-system, "SF Mono", Consolas, monospace; font-size: 0.85rem; }
    .btn-copy {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; margin-bottom: 1rem;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .prompt-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>推しの名場面ステンドグラス風プロンプト生成器</h1>
    <p class="subtitle">推しの特徴・場面・雰囲気を選ぶと、ステンドグラス風AI画像プロンプト（日本語＋英語）を即生成</p>
  </header>

  <div class="card">
    <p class="card-title">推しの設定</p>
    <div class="field">
      <label for="charName">推しの名前（任意）</label>
      <input type="text" id="charName" placeholder="例: ○○さん">
    </div>
    <div class="field">
      <label for="charDesc">外見・特徴（自由入力）</label>
      <textarea id="charDesc" placeholder="例: 銀髪ロング、青い瞳、白いマント、繊細な表情"></textarea>
      <p class="hint">髪色・瞳の色・服装・武器・雰囲気などを箇条書きでもOK</p>
    </div>
    <div class="field">
      <label for="scene">名場面シーン</label>
      <select id="scene">
        <option value="battle">戦闘の決め技を放つ瞬間</option>
        <option value="smile">優しい微笑み</option>
        <option value="pray">静かに祈る姿</option>
        <option value="cry">涙を流す瞬間</option>
        <option value="live">ライブで歌う姿</option>
        <option value="walk">夕暮れに振り返る</option>
        <option value="sleep">穏やかに眠る</option>
        <option value="rise">光に包まれて立ち上がる</option>
        <option value="bond">仲間と肩を組む</option>
        <option value="dance">舞い踊る瞬間</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気・色調</label>
      <select id="mood">
        <option value="divine">神々しい・荘厳</option>
        <option value="fragile">儚い・繊細</option>
        <option value="intense">激しい・力強い</option>
        <option value="soft">柔らかい・優しい</option>
        <option value="mystic">幻想的・神秘</option>
        <option value="sorrow">哀愁・切ない</option>
        <option value="hope">希望・光あふれる</option>
        <option value="dark">闇・陰影が深い</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">メインカラー</label>
      <select id="palette">
        <option value="blue-gold">青と金</option>
        <option value="red-black">赤と黒</option>
        <option value="purple-silver">紫と銀</option>
        <option value="green-gold">緑と金</option>
        <option value="pink-white">桜色と白</option>
        <option value="rainbow">虹色</option>
        <option value="monochrome">モノクロ</option>
        <option value="warm">暖色系</option>
        <option value="cool">寒色系</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <div class="prompt-card" id="result">
    <p class="prompt-label">日本語プロンプト</p>
    <div class="prompt-text" id="promptJa"></div>
    <button class="btn-copy" onclick="copyText('promptJa', this)">📋 コピー</button>

    <p class="prompt-label">英語プロンプト（Midjourney / SD 推奨）</p>
    <div class="prompt-text eng" id="promptEn"></div>
    <button class="btn-copy" onclick="copyText('promptEn', this)">📋 コピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎨 このツールは生成AI（Midjourney・Stable Diffusion・DALL-E など）でステンドグラス風画像を作るためのプロンプト雛形を出力します。生成画像の権利・二次創作ガイドラインは各作品の公式ルールをご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var SCENE_JA = {
    battle: '戦闘の決め技を放つ瞬間', smile: '優しく微笑む姿', pray: '静かに祈りを捧げる姿',
    cry: '一筋の涙を流す瞬間', live: 'ライブで歌い上げる姿', walk: '夕暮れに振り返る姿',
    sleep: '穏やかに眠る姿', rise: '光に包まれて立ち上がる姿', bond: '仲間と肩を組む姿', dance: '舞い踊る瞬間'
  };
  var SCENE_EN = {
    battle: 'unleashing a finishing strike in battle', smile: 'with a gentle smile',
    pray: 'praying quietly', cry: 'shedding a single tear', live: 'singing on stage',
    walk: 'turning around at dusk', sleep: 'sleeping peacefully',
    rise: 'rising surrounded by light', bond: 'arms over comrades shoulders', dance: 'dancing gracefully'
  };
  var MOOD_JA = {
    divine: '神々しく荘厳な', fragile: '儚く繊細な', intense: '激しく力強い',
    soft: '柔らかく優しい', mystic: '幻想的で神秘的な', sorrow: '哀愁漂う切ない',
    hope: '希望に満ちた光あふれる', dark: '闇と陰影が深い'
  };
  var MOOD_EN = {
    divine: 'divine and majestic', fragile: 'fragile and delicate', intense: 'intense and powerful',
    soft: 'soft and gentle', mystic: 'mystical and ethereal', sorrow: 'melancholic and bittersweet',
    hope: 'hopeful and luminous', dark: 'dark with deep shadows'
  };
  var PALETTE_JA = {
    'blue-gold': '青と金を基調', 'red-black': '赤と黒を基調', 'purple-silver': '紫と銀を基調',
    'green-gold': '緑と金を基調', 'pink-white': '桜色と白を基調', 'rainbow': '虹色を基調',
    'monochrome': 'モノクロを基調', 'warm': '暖色系を基調', 'cool': '寒色系を基調'
  };
  var PALETTE_EN = {
    'blue-gold': 'blue and gold tones', 'red-black': 'red and black tones',
    'purple-silver': 'purple and silver tones', 'green-gold': 'green and gold tones',
    'pink-white': 'cherry pink and white tones', 'rainbow': 'rainbow palette',
    'monochrome': 'monochrome palette', 'warm': 'warm color palette', 'cool': 'cool color palette'
  };

  var STORAGE_KEY = 'oshi_stainedglass_v1';

  function generate() {
    var name = document.getElementById('charName').value.trim();
    var desc = document.getElementById('charDesc').value.trim();
    var scene = document.getElementById('scene').value;
    var mood = document.getElementById('mood').value;
    var palette = document.getElementById('palette').value;

    var nameJa = name ? '「' + name + '」' : 'キャラクター';
    var nameEn = name ? name : 'a character';

    var ja = 'ステンドグラス風イラスト。' + nameJa + '、' + (desc || '繊細で美しい姿') + '。' +
             SCENE_JA[scene] + 'を、' + MOOD_JA[mood] + '雰囲気で描く。' +
             PALETTE_JA[palette] + 'にした鉛線で区切られたガラスモザイク。' +
             '背後から光が透過して輝く荘厳な構図。教会のステンドグラス、装飾的な縁取り、対称性、宝石のような輝き、高精細。';

    var en = 'stained glass illustration of ' + nameEn +
             (desc ? ' (' + desc + ')' : '') +
             ', ' + SCENE_EN[scene] + ', ' + MOOD_EN[mood] + ' atmosphere, ' +
             PALETTE_EN[palette] + ', leaded glass mosaic style, backlit by glowing light, ' +
             'cathedral stained glass window, ornate borders, symmetrical composition, jewel-like radiance, ' +
             'highly detailed, masterpiece';

    document.getElementById('promptJa').textContent = ja;
    document.getElementById('promptEn').textContent = en;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

    save();
  }

  function copyText(id, btn) {
    var text = document.getElementById(id).textContent;
    var done = function() {
      var orig = btn.textContent;
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  }

  function save() {
    try {
      var data = {
        charName: document.getElementById('charName').value,
        charDesc: document.getElementById('charDesc').value,
        scene: document.getElementById('scene').value,
        mood: document.getElementById('mood').value,
        palette: document.getElementById('palette').value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {}
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.charName) document.getElementById('charName').value = d.charName;
      if (d.charDesc) document.getElementById('charDesc').value = d.charDesc;
      if (d.scene) document.getElementById('scene').value = d.scene;
      if (d.mood) document.getElementById('mood').value = d.mood;
      if (d.palette) document.getElementById('palette').value = d.palette;
    } catch (e) {}
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
