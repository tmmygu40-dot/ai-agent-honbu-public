<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム対応お詫び文ジェネレーター</title>
  <meta name="description" content="クレーム種別・お客様名・商品名を選んで入力するだけで、すぐ使えるお詫び文を自動生成。品質不良・納期遅延・対応不備など8種類のテンプレートに対応。コピーしてそのまま使える。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 出力テキストエリア ── */
    .output-textarea {
      width: 100%; min-height: 280px;
      padding: 0.85rem 0.9rem;
      font-size: 0.92rem; line-height: 1.75;
      border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      resize: vertical; outline: none;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      transition: border-color 0.15s;
    }
    .output-textarea:focus { border-color: var(--accent); background: #fff; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; margin-top: 0.85rem; padding: 0.7rem 1rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: #ffe8c5; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>クレーム対応 お詫び文ジェネレーター</h1>
    <p class="subtitle">種別と相手先を選んで入力するだけ。すぐ使えるお詫び文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">設定</p>

    <div class="field">
      <label for="claimType">クレーム種別</label>
      <select id="claimType">
        <option value="quality">品質不良・不具合</option>
        <option value="delay">納期遅延・配送遅延</option>
        <option value="response">対応不備・接客マナー</option>
        <option value="billing">誤請求・請求ミス</option>
        <option value="delivery">配送ミス・誤配</option>
        <option value="explanation">説明不足・情報不足</option>
        <option value="stock">在庫切れ・欠品</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="customerName">お客様名・会社名</label>
      <input type="text" id="customerName" placeholder="例: 山田商事株式会社">
      <p class="hint">省略すると「お客様」になります</p>
    </div>

    <div class="field">
      <label for="productName">商品・サービス名</label>
      <input type="text" id="productName" placeholder="例: ○○製品、△△サービス">
      <p class="hint">省略すると「弊社製品・サービス」になります</p>
    </div>

    <div class="field">
      <label for="staffName">担当者名（任意）</label>
      <input type="text" id="staffName" placeholder="例: 田中一郎">
      <p class="hint">入力すると文末に署名として追加されます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">お詫び文を生成する</button>

  <!-- 出力カード -->
  <div class="card" id="outputCard" style="display:none">
    <p class="card-title">生成されたお詫び文</p>
    <textarea class="output-textarea" id="outputText" readonly></textarea>
    <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 コピーする</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 生成された文章はあくまで雛形です。実際の状況に合わせて適宜修正してご使用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TEMPLATES = {
    quality: '拝啓\n\n{name} 様\n\n平素より格別のご愛顧を賜り、誠にありがとうございます。\n\nこのたびは、{product}において品質上の問題が生じ、多大なるご迷惑をおかけしましたことを深くお詫び申し上げます。\n\nご指摘いただいた内容を真摯に受け止め、原因の究明と再発防止に全力で取り組んでまいります。今後このようなことが二度と起きないよう、品質管理体制を見直し、改善に努めてまいります。\n\n何卒ご容赦くださいますようお願い申し上げます。\n\n敬具{sign}',
    delay:   '拝啓\n\n{name} 様\n\n平素より大変お世話になっております。\n\nこのたびは、{product}の納品・お届けが遅延し、多大なるご不便とご迷惑をおかけしましたことを心よりお詫び申し上げます。\n\n納期管理の徹底を怠りましたことを深く反省しております。今後は進捗管理を強化し、このようなことが再び起きないよう再発防止に努めてまいります。\n\n誠に申し訳ございませんでした。\n\n敬具{sign}',
    response:'拝啓\n\n{name} 様\n\n平素より格別のご支援を賜り、誠にありがとうございます。\n\nこのたびは、{product}に関する弊社担当者の対応においてご不快をおかけしましたことを、深くお詫び申し上げます。\n\nご指摘の点を社内で共有し、再発防止のための教育・指導を徹底してまいります。今後は、お客様に満足していただけるサービスを提供できるよう、一層努力いたします。\n\n何卒ご容赦くださいますようお願い申し上げます。\n\n敬具{sign}',
    billing: '拝啓\n\n{name} 様\n\n平素より大変お世話になっております。\n\nこのたびは、{product}の請求書において誤りが生じ、多大なるご迷惑をおかけしましたことを深くお詫び申し上げます。\n\n正しい内容にて改めてご請求書をお送りいたします。今後はこのようなミスが起きないよう、請求処理の確認体制を強化してまいります。\n\n誠に申し訳ございませんでした。\n\n敬具{sign}',
    delivery:'拝啓\n\n{name} 様\n\n平素より格別のご愛顧を賜り、誠にありがとうございます。\n\nこのたびは、{product}の配送において誤りが生じ、多大なるご不便をおかけしましたことを深くお詫び申し上げます。\n\n正しい商品を早急にお届けできるよう手配いたします。また、配送管理の徹底を図り、再発防止に努めてまいります。\n\n何卒ご容赦くださいますようお願い申し上げます。\n\n敬具{sign}',
    explanation:'拝啓\n\n{name} 様\n\n平素より大変お世話になっております。\n\nこのたびは、{product}に関するご説明が不十分であったため、ご不便・ご迷惑をおかけしましたことを深くお詫び申し上げます。\n\n改めて詳細なご案内をさせていただきます。今後は、お客様に分かりやすい説明を心がけ、このようなことが再び起きないよう努めてまいります。\n\n何卒ご容赦くださいますようお願い申し上げます。\n\n敬具{sign}',
    stock:   '拝啓\n\n{name} 様\n\n平素より格別のご愛顧を賜り、誠にありがとうございます。\n\nこのたびは、{product}の在庫切れにより、ご注文にお応えできず、多大なるご不便をおかけしましたことを深くお詫び申し上げます。\n\n現在、在庫確保に向けて早急に対応しております。入荷次第、速やかにご連絡させていただきます。今後は在庫管理を徹底してまいります。\n\n誠に申し訳ございませんでした。\n\n敬具{sign}',
    other:   '拝啓\n\n{name} 様\n\n平素より格別のご愛顧を賜り、誠にありがとうございます。\n\nこのたびは、{product}に関してご不便・ご迷惑をおかけしましたことを、深くお詫び申し上げます。\n\nいただいたご指摘を真摯に受け止め、再発防止に向けて速やかに対応してまいります。\n\n何卒ご容赦くださいますようお願い申し上げます。\n\n敬具{sign}'
  };

  function generate() {
    var type     = document.getElementById('claimType').value;
    var name     = document.getElementById('customerName').value.trim() || 'お客様';
    var product  = document.getElementById('productName').value.trim() || '弊社製品・サービス';
    var staff    = document.getElementById('staffName').value.trim();

    var sign = staff ? '\n\n' + staff : '';
    var text = TEMPLATES[type]
      .replace('{name}', name)
      .replace('{product}', product)
      .replace('{sign}', sign);

    document.getElementById('outputText').value = text;
    var card = document.getElementById('outputCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

    var btn = document.getElementById('copyBtn');
    btn.textContent = '📋 コピーする';
    btn.classList.remove('copied');

    saveSettings();
  }

  function copyText() {
    var text = document.getElementById('outputText').value;
    var btn = document.getElementById('copyBtn');
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      document.getElementById('outputText').select();
      document.execCommand('copy');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function saveSettings() {
    try {
      localStorage.setItem('claim_gen_type',     document.getElementById('claimType').value);
      localStorage.setItem('claim_gen_customer', document.getElementById('customerName').value);
      localStorage.setItem('claim_gen_product',  document.getElementById('productName').value);
      localStorage.setItem('claim_gen_staff',    document.getElementById('staffName').value);
    } catch(e) {}
  }

  function loadSettings() {
    try {
      var t = localStorage.getItem('claim_gen_type');
      var c = localStorage.getItem('claim_gen_customer');
      var p = localStorage.getItem('claim_gen_product');
      var s = localStorage.getItem('claim_gen_staff');
      if (t) document.getElementById('claimType').value = t;
      if (c) document.getElementById('customerName').value = c;
      if (p) document.getElementById('productName').value = p;
      if (s) document.getElementById('staffName').value = s;
    } catch(e) {}
  }

  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
