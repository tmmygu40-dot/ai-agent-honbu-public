<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>節税クイズアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── スタート画面 ── */
    #startScreen { text-align: center; }
    .start-icon { font-size: 3.5rem; margin-bottom: 0.8rem; }
    .start-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.5rem; }
    .start-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 1.5rem; }
    .start-stats {
      display: flex; justify-content: center; gap: 1.5rem;
      margin-bottom: 1.5rem; padding: 1rem;
      background: var(--accent-light); border-radius: 10px;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
    .stat-label { font-size: 0.72rem; color: var(--text-sub); }

    /* ── クイズ画面 ── */
    #quizScreen { display: none; }
    .progress-bar {
      max-width: 600px; margin: 0 auto 0.8rem;
      padding: 0 1rem;
    }
    .progress-info {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--text-sub);
      margin-bottom: 0.4rem;
    }
    .progress-track {
      background: var(--border); border-radius: 99px; height: 6px;
    }
    .progress-fill {
      background: var(--accent); border-radius: 99px; height: 6px;
      transition: width 0.3s;
    }
    .question-num {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em; margin-bottom: 0.7rem;
    }
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.6;
      margin-bottom: 1.4rem;
    }
    .choices { display: flex; flex-direction: column; gap: 0.7rem; }
    .choice-btn {
      width: 100%; padding: 0.9rem 1rem;
      font-size: 0.95rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice-btn.wrong   { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .choice-btn:disabled { cursor: default; }

    /* ── 解説 ── */
    .explanation {
      display: none; margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.88rem; line-height: 1.6;
    }
    .explanation.correct { background: var(--ok-bg); border: 1.5px solid var(--ok); color: #14532d; }
    .explanation.wrong   { background: var(--ng-bg); border: 1.5px solid var(--ng); color: #7f1d1d; }
    .explanation .exp-label { font-weight: 800; margin-bottom: 0.35rem; font-size: 0.9rem; }

    /* ── ボタン ── */
    .btn-main {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-sub {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.85rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果画面 ── */
    #resultScreen { display: none; }
    .score-card {
      text-align: center;
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.8rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .score-icon { font-size: 3rem; margin-bottom: 0.6rem; }
    .score-main { font-size: 2.8rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
    .score-pct { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
    .score-comment { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; }
    .score-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .score-card.ok .score-main { color: var(--ok); }
    .score-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .score-card.warn .score-main { color: var(--warn); }
    .score-card.ng { border-color: var(--ng); background: var(--ng-bg); }
    .score-card.ng .score-main { color: var(--ng); }

    /* ── 履歴 ── */
    .history-list { list-style: none; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.55rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-sub); font-size: 0.78rem; }
    .history-score { font-weight: 700; color: var(--accent); }
    .no-history { color: var(--text-sub); font-size: 0.85rem; text-align: center; padding: 0.5rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

</head>
<body>

  <header class="app-header">
    <h1>📋 節税クイズアプリ</h1>
    <p class="subtitle">確定申告で見落としやすい控除をクイズで学ぼう</p>
  </header>

  <!-- スタート画面 -->
  <div id="startScreen">
    <div class="card">
      <div class="start-icon">🧾</div>
      <div class="start-title">節税知識を試そう！</div>
      <div class="start-desc">
        確定申告で使える各種控除について、クイズ形式で楽しく学べます。<br>
        全20問から毎回10問をランダム出題します。
      </div>
      <div class="start-stats" id="startStats">
        <div class="stat-item">
          <div class="stat-num" id="statTotal">—</div>
          <div class="stat-label">累計プレイ</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="statBest">—</div>
          <div class="stat-label">最高スコア</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="statAvg">—</div>
          <div class="stat-label">平均正解率</div>
        </div>
      </div>
    </div>
    <button class="btn-main" onclick="startQuiz()">クイズをはじめる</button>

    <!-- 履歴 -->
    <div class="card" id="historyCard" style="display:none">
      <p class="card-title">プレイ履歴</p>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="quizScreen">
    <div class="progress-bar">
      <div class="progress-info">
        <span id="progressText">1 / 10</span>
        <span id="scoreText">正解: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="card">
      <p class="question-num" id="questionNum">問題 1</p>
      <p class="question-text" id="questionText"></p>
      <div class="choices" id="choicesArea"></div>
      <div class="explanation" id="explanation">
        <div class="exp-label" id="expLabel"></div>
        <div id="expText"></div>
      </div>
    </div>

    <button class="btn-main" id="nextBtn" style="display:none" onclick="nextQuestion()">次の問題へ →</button>
    <button class="btn-sub" onclick="confirmQuit()">終了する</button>
  </div>

  <!-- 結果画面 -->
  <div id="resultScreen">
    <div class="score-card" id="scoreCard">
      <div class="score-icon" id="scoreIcon"></div>
      <div class="score-main" id="scoreMain"></div>
      <div class="score-pct" id="scorePct"></div>
      <div class="score-comment" id="scoreComment"></div>
    </div>

    <button class="btn-main" onclick="startQuiz()">もう一度挑戦する</button>
    <button class="btn-sub" onclick="showStart()">トップへ戻る</button>

    <!-- 全問の正誤 -->
    <div class="card">
      <p class="card-title">今回の結果詳細</p>
      <ul class="history-list" id="resultDetail"></ul>
    </div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

      exp: '特定支出控除の対象は、通勤費・転居費・研修費・資格取得費・図書費（職務に関するもの）・交際費（半額まで）などです。日常の食費や趣味は含まれません。'

      ans: 2,
      exp: '配偶者特別控除は配偶者の合計所得金額が48万円超〜133万円以下の場合に適用されます（段階的に控除額が減少）。なお控除額を受ける本人の所得が1,000万円超の場合は適用不可です。'

  var QUIZ_COUNT = 10;
  var currentQuestions = [];
  var currentIndex = 0;
  var correctCount = 0;
  var answered = false;
  var resultLog = [];

  // ── localStorage ──
  var LS_KEY = 'setsuze_quiz_history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveHistory(history) {
    localStorage.setItem(LS_KEY, JSON.stringify(history));
  }

  // ── スタート画面更新 ──
  function updateStartStats() {
    var h = loadHistory();
    if (h.length === 0) {
      document.getElementById('statTotal').textContent = '0';
      document.getElementById('statBest').textContent = '—';
      document.getElementById('statAvg').textContent = '—';
      document.getElementById('historyCard').style.display = 'none';
      return;
    }
    document.getElementById('statTotal').textContent = h.length + '回';
    var bestPct = 0;
    var sumPct = 0;
    h.forEach(function(item) {
      if (item.pct > bestPct) bestPct = item.pct;
      sumPct += item.pct;
    });
    document.getElementById('statBest').textContent = bestPct + '%';
    document.getElementById('statAvg').textContent = Math.round(sumPct / h.length) + '%';

    var histCard = document.getElementById('historyCard');
    histCard.style.display = '';
    var ul = document.getElementById('historyList');
    var recent = h.slice(-5).reverse();
    ul.innerHTML = recent.map(function(item) {
      return '<li class="history-item">'
        + '<span class="history-date">' + item.date + '</span>'
        + '<span>' + item.correct + '/' + QUIZ_COUNT + '問正解</span>'
        + '<span class="history-score">' + item.pct + '%</span>'
        + '</li>';
    }).join('');
  }

  // ── クイズ開始 ──
  function startQuiz() {
    // ランダムに10問選ぶ
    var shuffled = ALL_QUESTIONS.slice().sort(function() { return Math.random() - 0.5; });
    currentQuestions = shuffled.slice(0, QUIZ_COUNT);
    currentIndex = 0;
    correctCount = 0;
    resultLog = [];

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = '';
    showQuestion();
  }

  function showQuestion() {
    var q = currentQuestions[currentIndex];
    answered = false;

    // プログレス
    var num = currentIndex + 1;
    document.getElementById('progressText').textContent = num + ' / ' + QUIZ_COUNT;
    document.getElementById('scoreText').textContent = '正解: ' + correctCount;
    document.getElementById('progressFill').style.width = ((currentIndex / QUIZ_COUNT) * 100) + '%';

    document.getElementById('questionNum').textContent = '問題 ' + num;
    document.getElementById('questionText').textContent = q.q;

    var ca = document.getElementById('choicesArea');
    ca.innerHTML = q.choices.map(function(c, i) {
      return '<button class="choice-btn" onclick="selectAnswer(' + i + ')">' + c + '</button>';
    }).join('');

    var exp = document.getElementById('explanation');
    exp.style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var q = currentQuestions[currentIndex];
    var btns = document.querySelectorAll('.choice-btn');
    var isCorrect = idx === q.ans;

    btns.forEach(function(btn, i) {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      else if (i === idx) btn.classList.add('wrong');
    });

    var exp = document.getElementById('explanation');
    exp.style.display = '';
    if (isCorrect) {
      exp.className = 'explanation correct';
      document.getElementById('expLabel').textContent = '⭕ 正解！';
      correctCount++;
    } else {
      exp.className = 'explanation wrong';
      document.getElementById('expLabel').textContent = '❌ 不正解…  正解は「' + q.choices[q.ans] + '」';
    }
    document.getElementById('expText').textContent = q.exp;

    resultLog.push({ q: q.q, isCorrect: isCorrect, correct: q.choices[q.ans], selected: q.choices[idx] });

    document.getElementById('scoreText').textContent = '正解: ' + correctCount;

    var nextBtn = document.getElementById('nextBtn');
    if (currentIndex + 1 >= QUIZ_COUNT) {
      nextBtn.textContent = '結果を見る';
    } else {
      nextBtn.textContent = '次の問題へ →';
    }
    nextBtn.style.display = '';
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= QUIZ_COUNT) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = '';

    var pct = Math.round(correctCount / QUIZ_COUNT * 100);
    var sc = document.getElementById('scoreCard');
    var icon, comment, level;

    if (pct >= 80) {
      level = 'ok'; icon = '🏆'; comment = '素晴らしい！節税知識がしっかり身についています。確定申告に自信を持って臨めます！';
    } else if (pct >= 50) {
      level = 'warn'; icon = '📚'; comment = '半分以上正解しました。間違えた問題の解説を読んで知識を定着させましょう。';
    } else {
      level = 'ng'; icon = '💡'; comment = 'まだ学ぶことがありそうです。控除の種類と条件をもう一度確認してみましょう！';
    }

    sc.className = 'score-card ' + level;
    document.getElementById('scoreIcon').textContent = icon;
    document.getElementById('scoreMain').textContent = correctCount + ' / ' + QUIZ_COUNT;
    document.getElementById('scorePct').textContent = '正解率 ' + pct + '%';
    document.getElementById('scoreComment').textContent = comment;

    // 詳細
    var ul = document.getElementById('resultDetail');
    ul.innerHTML = resultLog.map(function(r, i) {
      var mark = r.isCorrect ? '⭕' : '❌';
      return '<li class="history-item">'
        + '<span style="flex:1;margin-right:0.5rem;font-size:0.82rem;">' + mark + ' ' + r.q.slice(0, 25) + '…</span>'
        + '<span style="font-size:0.78rem;color:' + (r.isCorrect ? 'var(--ok)' : 'var(--ng)') + ';">' + r.correct + '</span>'
        + '</li>';
    }).join('');

    // 履歴保存
    var h = loadHistory();
    var now = new Date();
    var dateStr = (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    h.push({ date: dateStr, correct: correctCount, pct: pct });
    if (h.length > 20) h = h.slice(-20);
    saveHistory(h);
  }

  function showStart() {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = '';
    updateStartStats();
  }

  function confirmQuit() {
    if (confirm('クイズを終了してトップへ戻りますか？')) {
      showStart();
    }
  }

  // 初期化
  updateStartStats();
  </script>
</body>
</html>
