<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単位変換アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>単位変換</h1>

    <!-- カテゴリ選択 -->
    <div class="category-tabs" id="categoryTabs">
      <button class="tab active" data-category="length">長さ</button>
      <button class="tab" data-category="weight">重さ</button>
      <button class="tab" data-category="temperature">温度</button>
      <button class="tab" data-category="area">面積</button>
      <button class="tab" data-category="volume">体積</button>
    </div>

    <!-- 変換パネル -->
    <div class="converter-panel">
      <div class="input-group">
        <input type="number" id="inputValue" placeholder="数値を入力" autocomplete="off">
        <select id="fromUnit"></select>
      </div>

      <div class="arrow-row">
        <button id="swapBtn" title="入れ替え">⇅</button>
      </div>

      <div class="input-group">
        <input type="number" id="outputValue" placeholder="変換結果" readonly>
        <select id="toUnit"></select>
      </div>
    </div>

    <!-- 履歴 -->
    <div class="history-section">
      <div class="history-header">
        <span>変換履歴</span>
        <button id="clearHistoryBtn">クリア</button>
      </div>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
