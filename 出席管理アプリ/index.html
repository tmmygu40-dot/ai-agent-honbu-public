<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出席管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>出席管理アプリ</h1>

    <!-- メンバー登録 -->
    <section class="card">
      <h2>メンバー登録</h2>
      <div class="input-row">
        <input type="text" id="memberName" placeholder="氏名を入力" maxlength="30">
        <button id="addMemberBtn">追加</button>
      </div>
      <ul id="memberList" class="member-list"></ul>
    </section>

    <!-- 出欠記録 -->
    <section class="card">
      <h2>出欠記録</h2>
      <div class="input-row">
        <input type="date" id="recordDate">
      </div>
      <div id="attendanceForm" class="attendance-form"></div>
      <button id="saveAttendanceBtn" class="btn-primary">この日の出欠を保存</button>
    </section>

    <!-- 月別出席率 -->
    <section class="card">
      <h2>月別出席率</h2>
      <div class="input-row">
        <input type="month" id="selectedMonth">
      </div>
      <div id="statsTable"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
