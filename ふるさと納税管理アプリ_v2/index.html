<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふるさと納税管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>ふるさと納税管理</h1>

    <!-- 控除上限設定 -->
    <section class="limit-section card">
      <h2>控除上限額の設定</h2>
      <div class="limit-row">
        <label for="limitInput">控除上限額（円）</label>
        <input type="number" id="limitInput" placeholder="例：80000" min="0">
        <button id="setLimitBtn">設定</button>
      </div>
    </section>

    <!-- サマリー -->
    <section class="summary card">
      <div class="summary-item">
        <span class="summary-label">年間寄付額</span>
        <span class="summary-value" id="totalAmount">0 円</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">控除上限額</span>
        <span class="summary-value" id="limitAmount">未設定</span>
      </div>
      <div class="summary-item highlight">
        <span class="summary-label">残り枠</span>
        <span class="summary-value" id="remainAmount">—</span>
      </div>
      <div class="progress-bar-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <!-- 寄付登録フォーム -->
    <section class="form-section card">
      <h2>寄付を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="destInput">寄付先（自治体名）</label>
          <input type="text" id="destInput" placeholder="例：北海道上士幌町">
        </div>
        <div class="form-group">
          <label for="amountInput">金額（円）</label>
          <input type="number" id="amountInput" placeholder="例：10000" min="1">
        </div>
        <div class="form-group">
          <label for="giftInput">返礼品（任意）</label>
          <input type="text" id="giftInput" placeholder="例：特選和牛 500g">
        </div>
        <div class="form-group">
          <label for="dateInput">寄付日（任意）</label>
          <input type="date" id="dateInput">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- 寄付一覧 -->
    <section class="list-section card">
      <h2>寄付一覧 <span class="count" id="listCount">（0件）</span></h2>
      <div id="donationList" class="donation-list">
        <p class="empty-msg">まだ登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
