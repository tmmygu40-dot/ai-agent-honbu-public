<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問のYES/NOに答えるだけで、あなたの値上げストレス体質と節約タイプを診断。自分に合った節約スタイルが30秒で分かります。">
  <title>値上げストレス体質診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 質問エリア ── */
    .q-progress { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 1.2rem; }
    .q-buttons { display: flex; gap: 0.8rem; }
    .q-btn {
      flex: 1; padding: 0.9rem; font-size: 1rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: 10px;
      background: var(--card); color: var(--text); cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .q-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .q-btn:active { transform: scale(0.97); }

    /* ── 診断結果詳細 ── */
    .type-icon { font-size: 2.5rem; margin-bottom: 0.4rem; }
    .type-name { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.6rem; }
    .type-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; text-align: left; }
    .advice-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-top: 1rem; margin-bottom: 0.4rem; }
    .advice-text { font-size: 0.88rem; color: var(--text); line-height: 1.6; text-align: left; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💸 値上げストレス体質診断</h1>
    <p class="subtitle">5問答えるだけで、あなたの値上げ耐性と最適な節約タイプが分かります。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">診断スタート</p>
    <p class="q-progress" id="q-progress">Q1 / 5</p>
    <p class="q-text" id="q-text"></p>
    <div class="q-buttons">
      <button class="q-btn" onclick="answer(1)">はい</button>
      <button class="q-btn" onclick="answer(0)">いいえ</button>
    </div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="type-icon" id="r-icon"></p>
    <p class="result-label">あなたの値上げストレス体質</p>
    <p class="type-name" id="r-type"></p>
    <p class="type-desc" id="r-desc"></p>
    <p class="advice-title">おすすめ節約スタイル</p>
    <p class="advice-text" id="r-advice"></p>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc no-print" id="retry-btn" style="display:none" onclick="retry()">もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この診断はエンタメ目的です。実際の家計見直しには、総務省家計調査や各自治体の生活相談窓口を参考にしてください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var questions = [
    'スーパーで値上がりした商品を見ると、つい買うのをやめてしまう',
    '値上げニュースを見ると気分が落ち込む',
    '「節約しなきゃ」と思いつつ、何から始めればいいか分からない',
    '外食や趣味を我慢して、ストレスが溜まることがある',
    '将来の物価上昇を考えると不安になる'
  ];

  var types = [
    { min: 0, max: 1, icon: '😎', name: '鉄壁メンタル型', level: 'ok',
      desc: '値上げに動じない強いメンタルの持ち主。日常の価格変動に振り回されず、冷静に判断できるタイプです。',
      advice: '今のスタイルを維持しつつ、固定費の年1回見直しだけ習慣にすれば盤石です。' },
    { min: 2, max: 2, icon: '🤔', name: 'じわじわ気になる型', level: 'warn',
      desc: '普段は平気でも、値上げが続くとジワジワ不安が積もるタイプ。自覚が薄いので気づいた時にはストレス大。',
      advice: '月1回だけ家計簿を振り返る「ゆる管理」がベスト。神経質にならず、ざっくり把握で十分です。' },
    { min: 3, max: 3, icon: '😰', name: 'ニュース過敏型', level: 'warn',
      desc: '情報感度が高く、値上げニュースに敏感に反応するタイプ。知識はあるけれど、不安が行動を止めがち。',
      advice: '情報収集は週1回に絞り、「今月やること1つだけ」決めて実行する小さな一歩作戦が効果的。' },
    { min: 4, max: 5, icon: '🫠', name: 'ガマン爆発型', level: 'ng',
      desc: '節約のために我慢を重ねすぎて、ある日突然ドカ買いしてしまうタイプ。ストレスが最大の敵です。',
      advice: '月に1回「罪悪感ゼロの贅沢デー」を設定。メリハリ消費でストレスを逃がしながら自然に節約できます。' }
  ];

  var current = 0;
  var score = 0;

  function init() {
    current = 0;
    score = 0;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    document.getElementById('q-progress').textContent = 'Q' + (current + 1) + ' / 5';
    document.getElementById('q-text').textContent = questions[current];
  }

  function answer(val) {
    score += val;
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    var type = types.find(function(t) { return score >= t.min && score <= t.max; });
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + type.level;
    rc.style.display = 'block';
    document.getElementById('r-icon').textContent = type.icon;
    document.getElementById('r-type').textContent = type.name;
    document.getElementById('r-desc').textContent = type.desc;
    document.getElementById('r-advice').textContent = type.advice;
    document.getElementById('retry-btn').style.display = '';

    // localStorage保存
    localStorage.setItem('neage_stress_last', JSON.stringify({
      date: new Date().toISOString().slice(0, 10),
      score: score,
      type: type.name
    }));
  }

  function retry() {
    init();
  }

  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
