<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス敬語フレーズ逆引きアプリ</title>
  <meta name="description" content="ビジネスシーンと状況を選ぶだけで、適切な敬語フレーズをすぐ表示。メール・電話・対面・お礼・お断りなど8シーン×複数状況に対応。コピーしてそのまま使える敬語逆引きアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── フレーズカード ── */
    .phrase-block {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 0.85rem; background: var(--accent-light);
    }
    .phrase-block:last-child { margin-bottom: 0; }
    .phrase-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 0.45rem; letter-spacing: 0.04em; }
    .phrase-text { font-size: 0.95rem; line-height: 1.75; color: var(--text); font-weight: 500; margin-bottom: 0.6rem; }
    .phrase-note { font-size: 0.76rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 0.6rem; }
    .btn-copy-phrase {
      display: inline-block; padding: 0.3rem 0.85rem;
      font-size: 0.78rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy-phrase:hover { background: #ffe8c5; }
    .btn-copy-phrase.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* NG例 */
    .ng-phrase {
      font-size: 0.82rem; color: var(--ng); margin-top: 0.4rem;
      padding: 0.4rem 0.7rem; background: var(--ng-bg);
      border-radius: 6px; border-left: 3px solid var(--ng);
    }
    .ng-phrase strong { font-size: 0.72rem; display: block; margin-bottom: 0.15rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy-phrase, .back-link, #fav-widget, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .phrase-block { background: #fff; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>ビジネス敬語フレーズ 逆引きアプリ</h1>
    <p class="subtitle">シーンと状況を選ぶだけ。すぐ使える敬語フレーズを即表示</p>
  </header>

  <div class="card">
    <p class="card-title">シーンを選択</p>
    <div class="field">
      <label for="scene">ビジネスシーン</label>
      <select id="scene" onchange="updateSituations()">
        <option value="greeting">挨拶・自己紹介</option>
        <option value="request">依頼・お願い</option>
        <option value="decline">断り・辞退</option>
        <option value="thanks">お礼・感謝</option>
        <option value="apology">謝罪・お詫び</option>
        <option value="confirm">確認・問い合わせ</option>
        <option value="visit">訪問・来客対応</option>
        <option value="meeting">会議・打ち合わせ</option>
      </select>
    </div>
    <div class="field">
      <label for="situation">状況</label>
      <select id="situation"></select>
    </div>
  </div>

  <button class="btn-calc" onclick="lookup()">フレーズを表示する</button>

  <div class="card" id="resultCard" style="display:none">
    <p class="card-title" id="resultTitle">敬語フレーズ</p>
    <div id="resultList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 フレーズは一般的なビジネス日本語の目安です。社内ルール・相手との関係に応じて適宜調整してご使用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var SITUATIONS = {
    greeting:  ['初対面・初めての挨拶', '久しぶりの再会', '朝の出社時', '退社・お先に失礼', '年始の挨拶', '異動・転勤の挨拶'],
    request:   ['資料・情報の提供を求める', '期限の延長をお願いする', '予定の変更をお願いする', '確認・承認をお願いする', '協力・手伝いをお願いする'],

    greeting: {

      '退社・お先に失礼': [

      ],

  function updateSituations() {
    var scene = document.getElementById('scene').value;
    var sits  = SITUATIONS[scene];
    var sel   = document.getElementById('situation');
    sel.innerHTML = sits.map(function(s) {
      return '<option value="' + s + '">' + s + '</option>';
    }).join('');
    document.getElementById('resultCard').style.display = 'none';
  }

  function lookup() {
    var scene   = document.getElementById('scene').value;
    var sit     = document.getElementById('situation').value;
    var phrases = DATA[scene][sit];
    if (!phrases || phrases.length === 0) return;

    var sceneLabel = document.getElementById('scene').options[document.getElementById('scene').selectedIndex].text;
    document.getElementById('resultTitle').textContent = '敬語フレーズ（' + sceneLabel + '：' + sit + '）';

    var html = phrases.map(function(p, idx) {
      var ngHtml = p.ng ? '<div class="ng-phrase"><strong>✕ NG例・注意</strong>' + p.ng + '</div>' : '';
      var noteHtml = p.note ? '<p class="phrase-note">💡 ' + p.note + '</p>' : '';
      return '<div class="phrase-block">'
        + '<div class="phrase-label">' + p.label + '</div>'
        + '<div class="phrase-text" id="pt' + idx + '">' + p.text + '</div>'
        + noteHtml
        + ngHtml
        + '<button class="btn-copy-phrase" id="cb' + idx + '" onclick="copyPhrase(' + idx + ')">📋 コピー</button>'
        + '</div>';
    }).join('');

    document.getElementById('resultList').innerHTML = html;
    var card = document.getElementById('resultCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function copyPhrase(idx) {
    var text = document.getElementById('pt' + idx).textContent;
    var btn  = document.getElementById('cb' + idx);
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✅ コピー済み';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '✅ コピー済み'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function saveSettings() {
    try {
      localStorage.setItem('keigo_scene', document.getElementById('scene').value);
      localStorage.setItem('keigo_sit',   document.getElementById('situation').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var sc = localStorage.getItem('keigo_scene');
      var si = localStorage.getItem('keigo_sit');
      if (sc) { document.getElementById('scene').value = sc; updateSituations(); }
      if (si) document.getElementById('situation').value = si;
    } catch(e) {}
  }

  updateSituations();
  loadSettings();
  </script>
