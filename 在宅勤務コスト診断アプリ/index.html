<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在宅勤務コスト診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>在宅勤務コスト診断アプリ</h1>
    <p class="subtitle">テレワークは本当に得か損か？月次・年間コストを即判断</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="telework-days">月の在宅勤務日数（日）</label>
      <input type="number" id="telework-days" placeholder="例: 15" min="0" max="31">
      <p class="hint">1ヶ月あたりのテレワーク日数を入力してください</p>
    </div>
    <div class="field">
      <label for="utility-increase">在宅による光熱費増加額（円/月）</label>
      <input type="number" id="utility-increase" placeholder="例: 3000" min="0">
      <p class="hint">電気・ガス・水道などの増加分の合計（月額）</p>
    </div>
    <div class="field">
      <label for="commute-cost">1日あたりの通勤交通費（円/日）</label>
      <input type="number" id="commute-cost" placeholder="例: 500" min="0">
      <p class="hint">電車・バス・ガソリン代など、出社1日あたりの費用</p>
    </div>
    <div class="field">
      <label for="work-days">月の総出勤予定日数（日）</label>
      <input type="number" id="work-days" placeholder="例: 22" min="1" max="31">
      <p class="hint">テレワーク含む、月の総勤務日数（通常20〜22日）</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">月次判定</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'telework_cost_inputs';

  // ページ読み込み時に保存値を復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      if (d.teleworkDays)    document.getElementById('telework-days').value   = d.teleworkDays;
      if (d.utilityIncrease) document.getElementById('utility-increase').value = d.utilityIncrease;
      if (d.commuteCost)     document.getElementById('commute-cost').value    = d.commuteCost;
      if (d.workDays)        document.getElementById('work-days').value       = d.workDays;
    } catch(e) {}
  });

  function calc() {
    var teleworkDays    = parseFloat(document.getElementById('telework-days').value);
    var utilityIncrease = parseFloat(document.getElementById('utility-increase').value);
    var commuteCost     = parseFloat(document.getElementById('commute-cost').value);
    var workDays        = parseFloat(document.getElementById('work-days').value);

    if (isNaN(teleworkDays) || isNaN(utilityIncrease) || isNaN(commuteCost) || isNaN(workDays)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (workDays < 1) { showErr('総出勤予定日数は1以上で入力してください'); return; }
    if (teleworkDays > workDays) { showErr('在宅日数が総勤務日数を超えています'); return; }

    // 保存
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      teleworkDays: teleworkDays,
      utilityIncrease: utilityIncrease,
      commuteCost: commuteCost,
      workDays: workDays
    }));

    // 計算
    // 在宅しなかった場合の交通費（全日出社）
    var fullCommuteCost = workDays * commuteCost;
    // 実際に節約できた交通費
    var commuteReduction = teleworkDays * commuteCost;
    // 在宅による光熱費増加
    // → 既に月額で入力済み
    // 月差額 = 交通費節約 - 光熱費増加
    var monthlyDiff = commuteReduction - utilityIncrease;
    var yearlyDiff  = monthlyDiff * 12;

    var level, verdict, note;
    if (monthlyDiff > 500) {
      level   = 'ok';
      verdict = '得！';
      note    = '在宅勤務でコストが削減できています。\n月に ' + fmt(monthlyDiff) + ' 円、年間 ' + fmt(yearlyDiff) + ' 円のプラスです。';
    } else if (monthlyDiff >= -500) {
      level   = 'warn';
      verdict = 'トントン';
      note    = '在宅と出社でコストはほぼ同じです。\n月差額は ' + (monthlyDiff >= 0 ? '+' : '') + fmt(monthlyDiff) + ' 円です。';
    } else {
      level   = 'ng';
      verdict = '損！';
      note    = '光熱費増加が交通費節約を上回っています。\n月に ' + fmt(-monthlyDiff) + ' 円、年間 ' + fmt(-yearlyDiff) + ' 円のマイナスです。';
    }

    showResult(level, verdict, note);
    showDetail([
      ['交通費（全日出社の場合）', fmt(fullCommuteCost) + ' 円/月'],
      ['交通費節約額（在宅 ' + teleworkDays + ' 日分）', '▲' + fmt(commuteReduction) + ' 円/月'],
      ['光熱費増加額', '+' + fmt(utilityIncrease) + ' 円/月'],
      ['月次差額（節約 − 増加）', (monthlyDiff >= 0 ? '+' : '') + fmt(monthlyDiff) + ' 円/月', true],
      ['年間差額', (yearlyDiff >= 0 ? '+' : '') + fmt(yearlyDiff) + ' 円/年', true],
      ['在宅勤務率', Math.round(teleworkDays / workDays * 100) + ' %（' + teleworkDays + '/' + workDays + ' 日）'],
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
