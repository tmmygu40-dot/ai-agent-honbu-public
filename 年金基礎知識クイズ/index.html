<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="国民年金・厚生年金の基礎知識を10問3択で即チェック！受給開始年齢や繰下げ・第3号被保険者など、知らないと損する年金の常識をクイズで楽しく学べます。">
  <title>年金基礎知識クイズ｜10問3択で公的年金の常識をチェック</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* 進捗 */
    .progress {
      max-width: 600px; margin: 0 auto 0.6rem; padding: 0 0.2rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--text-sub); font-weight: 600;
    }
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

    /* 問題文 */
    .q-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem; color: var(--text);
    }

    /* 選択肢ボタン */
    .choice-btn {
      display: block; width: 100%; padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.98rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent; line-height: 1.4;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700;
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng); font-weight: 700;
    }

    /* 解説 */
    .explanation {
      display: none; margin-top: 0.9rem; padding: 0.9rem 1rem;
      background: var(--accent-light); border-left: 3px solid var(--accent);
      border-radius: 6px; font-size: 0.88rem; line-height: 1.6; color: var(--text);
    }
    .explanation.show { display: block; }
    .explanation strong { color: var(--accent); }

    /* 次へボタン */
    .btn-next {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.95rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next.show { display: block; }
    .btn-next:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 結果カード */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok); }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng); }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.6rem; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
    .best-score { margin-top: 0.7rem; font-size: 0.82rem; color: var(--text-sub); }

    .btn-restart {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.95rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
    }
    .btn-restart:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-next, .btn-restart, .back-link, #fav-widget, .ad-slot, .no-print, .choice-btn { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

<body>

  <header class="app-header">
    <h1>年金基礎知識クイズ</h1>
    <p class="subtitle">10問3択で公的年金の常識をチェック ※2026年4月時点の制度。最新情報は日本年金機構公式サイトをご確認ください</p>
  </header>

  <div class="progress">
    <span id="progress-text">第 1 問 / 全 10 問</span>
    <span id="score-text">正解 0</span>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>

  <div class="card" id="quiz-card">
    <p class="card-title">問題</p>
    <p class="q-text" id="q-text">読み込み中...</p>
    <div id="choices"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="bs"></p>
  </div>

  <button class="btn-restart" id="btn-restart" style="display:none" onclick="restart()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、日本年金機構・厚生労働省などの公開資料を参考に、目安として使いやすく整理しています。実際の手続きや最新の制度詳細は公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUIZ = [
    {
      q: '国民年金の老齢基礎年金を受け取るために必要な保険料納付期間（受給資格期間）は最低何年？',
      choices: ['5年', '10年', '25年'],
      a: 1,
      exp: '<strong>正解：10年</strong>。2017年8月以降、受給資格期間は25年から10年に短縮されました。ただし満額受給には40年（480か月）必要です。'
    },
    {
      q: '老齢基礎年金の受給開始年齢の標準は？',
      choices: ['60歳', '65歳', '70歳'],
      a: 1,
      exp: '<strong>正解：65歳</strong>。標準は65歳ですが、60〜75歳の間で繰上げ・繰下げを選べます。'
    },
    {
      q: '繰下げ受給で1か月遅らせるごとの増額率は？',
      choices: ['0.4%', '0.7%', '1.5%'],
      a: 1,
      exp: '<strong>正解：0.7%</strong>。最大75歳まで繰下げで、1か月あたり0.7%増額（最大84%増）。長生きするほど得になる仕組みです。'
    },
    {
      q: '繰上げ受給で1か月早めるごとの減額率は（2022年4月以降に60歳になった人）？',
      choices: ['0.4%', '0.5%', '0.7%'],
      a: 0,
      exp: '<strong>正解：0.4%</strong>。2022年4月以降に60歳になった人は0.4%減額。最大60歳まで繰上げると24%減額され、生涯その額となります。'
    },
    {
      q: '会社員の被扶養配偶者（年収130万円未満など）が分類される国民年金の種別は？',
      choices: ['第1号被保険者', '第2号被保険者', '第3号被保険者'],
      a: 2,
      exp: '<strong>正解：第3号被保険者</strong>。第1号は自営業・学生、第2号は会社員・公務員、第3号は第2号の被扶養配偶者です。第3号は保険料負担がありません。'
    },
    {
      q: '厚生年金の保険料は労使でどう負担する？',
      choices: ['全額労働者負担', '労使で折半（50%ずつ）', '全額会社負担'],
      a: 1,
      exp: '<strong>正解：労使で折半</strong>。厚生年金保険料は会社と従業員が半分ずつ負担します。給与明細に載るのは本人負担分のみです。'
    },
    {
      q: '国民年金保険料の全額免除を受けた期間は、将来の年金額にどう反映される？',
      choices: ['まったく反映されない', '半額分（国庫負担分）が反映される', '満額反映される'],
      a: 1,
      exp: '<strong>正解：半額分が反映</strong>。全額免除でも国庫負担分（1/2）が将来の年金額に反映されます。未納のまま放置よりはるかに有利です。'
    },
    {
      q: 'ねんきん定期便はいつ・誰に送られる？',
      choices: ['65歳到達時に1回だけ', '毎年誕生月に全被保険者へ', '希望者のみ請求すれば送付'],
      a: 1,
      exp: '<strong>正解：毎年誕生月に全被保険者へ</strong>。日本年金機構が毎年誕生月に送付。50歳未満は実績、50歳以上は見込み額が記載されます。'
    },
    {
      q: '加給年金とは何？',
      choices: ['長く働いた人への上乗せ', '配偶者や子がいる人への家族手当のような加算', '繰下げ時のボーナス'],
      a: 1,
      exp: '<strong>正解：配偶者や子への加算</strong>。厚生年金加入20年以上の人が65歳到達時に、生計維持する65歳未満の配偶者や18歳未満の子がいると加算されます。'
    },
    {
      q: '遺族基礎年金を受け取れるのは？',
      choices: ['配偶者のみ', '子のある配偶者または子', '親族なら誰でも'],
      a: 1,
      exp: '<strong>正解：子のある配偶者または子</strong>。遺族基礎年金は「子のある配偶者」または「子」が対象。子がいない配偶者は受給できません（遺族厚生年金は別）。'
    }
  ];

  var current = 0;
  var score = 0;
  var answered = false;
  var STORAGE_KEY = 'nenkin_quiz_best_score';

  function renderQuestion() {
    var item = QUIZ[current];
    answered = false;
    document.getElementById('progress-text').textContent = '第 ' + (current + 1) + ' 問 / 全 ' + QUIZ.length + ' 問';
    document.getElementById('score-text').textContent = '正解 ' + score;
    document.getElementById('progress-fill').style.width = ((current + 1) / QUIZ.length * 100) + '%';
    document.getElementById('q-text').textContent = 'Q' + (current + 1) + '. ' + item.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    item.choices.forEach(function(c, i){
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = String.fromCharCode(65 + i) + '. ' + c;
      btn.onclick = function(){ selectAnswer(i); };
      choicesEl.appendChild(btn);
    });
    var exp = document.getElementById('explanation');
    exp.classList.remove('show');
    exp.innerHTML = '';
    var btnNext = document.getElementById('btn-next');
    btnNext.classList.remove('show');
    btnNext.textContent = (current === QUIZ.length - 1) ? '結果を見る' : '次の問題へ';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var item = QUIZ[current];
    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(b, i){
      b.disabled = true;
      if (i === item.a) b.classList.add('correct');
      else if (i === idx) b.classList.add('wrong');
    });
    if (idx === item.a) {
      score++;
      document.getElementById('score-text').textContent = '正解 ' + score;
    }
    var exp = document.getElementById('explanation');
    exp.innerHTML = item.exp;
    exp.classList.add('show');
    document.getElementById('btn-next').classList.add('show');
  }

  function nextQuestion() {
    if (current < QUIZ.length - 1) {
      current++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('btn-next').classList.remove('show');
    var rc = document.getElementById('result');
    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    var evalText = score >= 9 ? '🎉 年金マスター！' :
                   score >= 8 ? '👏 知識十分！' :
                   score >= 5 ? '🤔 もう少し確認しよう' :
                              '😅 これを機に学び直そう';
    var note = score >= 8 ? '老後の備えはバッチリ。家族にも教えてあげましょう。' :
               score >= 5 ? '基本は押さえています。苦手分野を解説で復習しましょう。' :
                          'ねんきん定期便や日本年金機構サイトで一度しっかり確認すると安心です。';
    rc.className = 'result-card show ' + level;
    document.getElementById('rv').textContent = score + ' / ' + QUIZ.length + ' 問正解';
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = note;

    var best = 0;
    try {
      var stored = localStorage.getItem(STORAGE_KEY);
      if (stored !== null) best = parseInt(stored, 10) || 0;
      if (score > best) {
        localStorage.setItem(STORAGE_KEY, String(score));
        document.getElementById('bs').textContent = '🏆 自己ベスト更新！（前回の最高: ' + best + '点）';
      } else {
        document.getElementById('bs').textContent = '自己ベスト: ' + best + ' / ' + QUIZ.length + ' 問';
      }
    } catch(e) {
      document.getElementById('bs').textContent = '';
    }

    document.getElementById('btn-restart').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restart() {
    current = 0;
    score = 0;
    answered = false;
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('result').classList.remove('show');
    document.getElementById('btn-restart').style.display = 'none';
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderQuestion();
  </script>
