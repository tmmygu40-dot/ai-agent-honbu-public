<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引越し費用相場チェッカー</title>
  <meta name="description" content="距離・間取り・時期の3つを選ぶだけで引越し料金の相場レンジを即確認。業者に連絡する前に予算感がつかめる無料チェッカー。2025年度の業界参考データをもとに試算。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── アドバイスカード ── */
    .advice-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }
    .advice-item:last-child { border-bottom: none; }
    .advice-item strong { color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>引越し費用相場チェッカー</h1>
    <p class="subtitle">距離・間取り・時期を選ぶだけ。業者に連絡する前に相場感をチェック</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="distance">移動距離</label>
      <select id="distance">
        <option value="">-- 選んでください --</option>
        <option value="0">同じ市区町村内（近距離）</option>
        <option value="1">隣接市区町村（10〜30km）</option>
        <option value="2">同じ都道府県内（30〜100km）</option>
        <option value="3">近隣都道府県（100〜300km）</option>
        <option value="4">遠距離（300km超・他県）</option>
      </select>
    </div>
    <div class="field">
      <label for="floor_plan">間取り・荷物量</label>
      <select id="floor_plan">
        <option value="">-- 選んでください --</option>
        <option value="0">単身・1K / 1R（荷物少なめ）</option>
        <option value="1">1LDK / 2K（荷物ふつう）</option>
        <option value="2">2LDK / 3K（2人〜3人家族）</option>
        <option value="3">3LDK（3人〜4人家族）</option>
        <option value="4">4LDK以上（大家族・荷物多め）</option>
      </select>
    </div>
    <div class="field">
      <label for="season">引越し時期</label>
      <select id="season">
        <option value="">-- 選んでください --</option>
        <option value="0">繁忙期（3〜4月・9月）</option>
        <option value="1">準繁忙期（1月・2月・5月）</option>
        <option value="2">通常期（6月・10月・11月）</option>
        <option value="3">閑散期（7月・8月・12月）</option>
      </select>
      <p class="hint">3〜4月は引越し需要が集中するため料金が高くなります</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">相場を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">推定料金レンジ（目安）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳・根拠</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 節約アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">費用を抑えるポイント</p>
    <div id="advice-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、国土交通省・引越し業界団体（全日本トラック協会等）の公開資料や各社公表データを参考に目安として整理しています。実際の費用は業者・荷物量・オプション内容により大きく異なります。必ず複数社に見積もりを取ってご確認ください。2025年度参考データ。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 距離×間取りの基本相場テーブル（万円）[min, max] ──
  // rows: distance 0-4、cols: floor_plan 0-4
  var BASE = [
    // 単身    1LDK    2LDK    3LDK    4LDK+
    [ [3,6],  [5,10], [8,15], [12,22],[18,35] ],  // 同市区町村内
    [ [4,8],  [6,12], [10,18],[15,28],[22,40] ],  // 隣接市区町村
    [ [5,10], [8,15], [12,22],[18,35],[25,50] ],  // 同都道府県内
    [ [7,14], [11,20],[16,30],[24,45],[35,65] ],  // 近隣都道府県
    [ [10,20],[15,28],[22,40],[33,60],[50,90] ]   // 遠距離
  ];

  // ── 時期係数 ──
  var SEASON_RATE = [1.7, 1.2, 1.0, 0.85];
  var SEASON_LABEL = ['繁忙期（3〜4月・9月）', '準繁忙期（1月・2月・5月）', '通常期（6月・10月・11月）', '閑散期（7月・8月・12月）'];
  var SEASON_NOTE  = ['引越し需要が集中。早めの予約が必須', '少し落ち着くが予約はお早めに', '標準的な料金帯', '最も料金が下がりやすい時期'];

  var DISTANCE_LABEL = ['同じ市区町村内', '隣接市区町村', '同じ都道府県内', '近隣都道府県', '遠距離（300km超）'];
  var FLOOR_LABEL    = ['単身・1K/1R', '1LDK/2K', '2LDK/3K', '3LDK', '4LDK以上'];

  // ── アドバイス ──
  var ADVICE_COMMON = [
    '<strong>複数社で相見積もり</strong>：最低3社は取ると、相場より20〜30%安くなることも。一括見積もりサイトが便利です。',
    '<strong>荷物を減らす</strong>：不用品を処分してから見積もりを取ると、ランクが下がって料金が下がる場合があります。',
    '<strong>梱包を自分でやる</strong>：梱包代込みプランより自分で梱包するプランのほうが安くなります。'
  ];
  var ADVICE_SEASON = [
    '繁忙期を避けられるなら<strong>3月末〜4月初旬以外の日程</strong>を検討。平日なら数万円安くなることも。',
    '2月中〜下旬は繁忙期直前。<strong>2月上旬</strong>なら比較的安く動けます。',
    '時期的には標準。<strong>平日の午後便</strong>を選ぶと割引になる業者が多いです。',
    '閑散期は業者側も空きがある。<strong>値段交渉がしやすい時期</strong>です。積極的に交渉してみましょう。'
  ];

  var LS_KEY = 'hikoshi_souba_v1';

  function loadLS() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (d.distance  !== undefined) document.getElementById('distance').value   = d.distance;
      if (d.floor_plan !== undefined) document.getElementById('floor_plan').value = d.floor_plan;
      if (d.season    !== undefined) document.getElementById('season').value     = d.season;
    } catch(e) {}
  }

  function saveLS(dist, fp, sea) {
    try { localStorage.setItem(LS_KEY, JSON.stringify({distance: dist, floor_plan: fp, season: sea})); } catch(e) {}
  }

  function calc() {
    var dist = document.getElementById('distance').value;
    var fp   = document.getElementById('floor_plan').value;
    var sea  = document.getElementById('season').value;

    if (dist === '' || fp === '' || sea === '') {
      alert('3つすべて選んでください');
      return;
    }

    dist = parseInt(dist); fp = parseInt(fp); sea = parseInt(sea);
    saveLS(dist, fp, sea);

    var base = BASE[dist][fp];
    var rate = SEASON_RATE[sea];
    var minCost = Math.round(base[0] * rate);
    var maxCost = Math.round(base[1] * rate);

    // 1万円単位に揃える
    minCost = Math.round(minCost);
    maxCost = Math.round(maxCost);

    // レベル判定（遠距離×繁忙期×大きい間取りで高額になる）
    var level = maxCost <= 15 ? 'ok' : maxCost <= 40 ? 'warn' : 'ng';
    var evalMsg = level === 'ok'   ? '比較的リーズナブルな相場です'
                : level === 'warn' ? 'ある程度まとまった費用がかかります'
                : '高額になりやすい条件です。複数見積もりを';

    // 結果カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = minCost + '〜' + maxCost + ' 万円';
    document.getElementById('re').textContent = evalMsg;
    document.getElementById('rn').textContent = SEASON_NOTE[sea];

    // 内訳テーブル
    var rows = [
      ['間取り', FLOOR_LABEL[fp]],
      ['移動距離', DISTANCE_LABEL[dist]],
      ['基本相場（通常期）', base[0] + '〜' + base[1] + ' 万円'],
      ['時期係数', '×' + SEASON_RATE[sea].toFixed(2) + '（' + SEASON_LABEL[sea] + '）'],
      ['推定料金レンジ', minCost + '〜' + maxCost + ' 万円', true]
    ];
    var tbody = document.getElementById('db');
    tbody.innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';

    // アドバイス
    var adviceList = document.getElementById('advice-list');
    var advices = ADVICE_COMMON.concat([ADVICE_SEASON[sea]]);
    adviceList.innerHTML = advices.map(function(a) {
      return '<div class="advice-item">' + a + '</div>';
    }).join('');
    document.getElementById('advice-card').style.display = 'block';

    // スクロール
    document.getElementById('result').scrollIntoView({behavior: 'smooth', block: 'nearest'});
  }

  loadLS();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
