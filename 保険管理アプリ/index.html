<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保険管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>保険管理アプリ</h1>

    <section class="form-section">
      <h2>保険を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="company">保険会社名</label>
          <input type="text" id="company" placeholder="例：○○生命" maxlength="50">
        </div>
        <div class="form-group">
          <label for="type">保険の種類</label>
          <input type="text" id="type" placeholder="例：医療保険・生命保険" maxlength="50">
        </div>
        <div class="form-group">
          <label for="premium">保険料</label>
          <div class="premium-input">
            <input type="number" id="premium" placeholder="例：5000" min="0">
            <select id="premiumUnit">
              <option value="月額">月額</option>
              <option value="年額">年額</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="renewDate">更新日</label>
          <input type="date" id="renewDate">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：家族特約あり" maxlength="100">
        </div>
      </div>
      <button class="btn-add" onclick="addInsurance()">登録する</button>
    </section>

    <section class="summary-section" id="summarySection">
      <div class="summary-cards">
        <div class="summary-card">
          <span class="summary-label">登録件数</span>
          <span class="summary-value" id="totalCount">0件</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">月額合計（概算）</span>
          <span class="summary-value" id="monthlyTotal">¥0</span>
        </div>
        <div class="summary-card alert-card" id="alertCard">
          <span class="summary-label">要確認</span>
          <span class="summary-value" id="alertCount">0件</span>
        </div>
      </div>
    </section>

    <section class="list-section">
      <h2>登録済み保険一覧</h2>
      <div id="insuranceList" class="insurance-list">
        <p class="empty-message">まだ保険が登録されていません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
