<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫙 器の大きさ寛容力診断</title>
  <meta name="description" content="3つの質問に答えるだけで、あなたの「器の大きさ」レベルが分かります。人間関係改善のヒントも。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問セクション ── */
    .question {
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .question:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .question-text {
      font-size: 0.92rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.7rem;
      line-height: 1.5;
    }
    .button-group {
      display: flex; gap: 0.6rem;
      flex-wrap: wrap;
    }
    .choice-btn {
      flex: 1; min-width: 80px;
      padding: 0.65rem 0.8rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); color: var(--text); }
    .choice-btn.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent); box-shadow: 0 4px 8px rgba(224,123,0,0.2);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 0.95rem; font-weight: 600; line-height: 1.6;
      margin-top: 0.6rem; margin-bottom: 0;
      text-align: left;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🫙 器の大きさ寛容力診断</h1>
    <p class="subtitle">3つの質問に答えるだけで、あなたの「器の大きさ」レベルが分かります。</p>
  </header>

  <!-- 質問カード -->
  <div class="card">
    <p class="card-title">質問</p>

    <div class="question">
      <p class="question-text">Q1. 意見が異なる人への対応は？</p>
      <div class="button-group">
        <button class="choice-btn" onclick="setAnswer(0, 1)">相手の意見も聞く</button>
        <button class="choice-btn" onclick="setAnswer(0, 2)">自分の意見を大切にしつつ相手の意見を聞く</button>
        <button class="choice-btn" onclick="setAnswer(0, 3)">相手の立場や背景まで考える</button>
      </div>
    </div>

    <div class="question">
      <p class="question-text">Q2. 失敗した人への対応は？</p>
      <div class="button-group">
        <button class="choice-btn" onclick="setAnswer(1, 1)">失敗した方が悪い</button>
        <button class="choice-btn" onclick="setAnswer(1, 2)">失敗は誰にでもあると思う</button>
        <button class="choice-btn" onclick="setAnswer(1, 3)">失敗から学べることを一緒に考える</button>
      </div>
    </div>

    <div class="question">
      <p class="question-text">Q3. 自分と異なる価値観の人をどう思う？</p>
      <div class="button-group">
        <button class="choice-btn" onclick="setAnswer(2, 1)">理解できない</button>
        <button class="choice-btn" onclick="setAnswer(2, 2)">違う考えもあるんだなと思う</button>
        <button class="choice-btn" onclick="setAnswer(2, 3)">その人にはその人の理由があると思う</button>
      </div>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="calc()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="result-eval" id="re"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは、心理学や対人スキルの目安として、娯楽目的で使いやすく整理しています。診断結果は参考値です。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var answers = [0, 0, 0]; // 3問の回答スコア

  function setAnswer(q, score) {
    answers[q] = score;
    // 選択状態を表示
    var buttons = document.querySelectorAll('.question')[q].querySelectorAll('.choice-btn');
    buttons.forEach(function(btn, idx) {
      if (idx === score - 1) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });
  }

  function calc() {
    if (answers[0] === 0 || answers[1] === 0 || answers[2] === 0) {
      showResult('ng', '⚠️', 'すべての質問に答えてください');
      return;
    }

    var total = answers[0] + answers[1] + answers[2];
    var level, label, advice;

    if (total >= 8) {
      level = 'ok';
      label = '大器型 (8-9点)';
      advice = '■ 相手の背景や立場を理解しようとする力が強い\n■ 失敗や異なる意見を学びの機会として捉えている\n■ 人間関係が安定しており、周囲から信頼される傾向';
    } else if (total >= 5) {
      level = 'warn';
      label = '育ち中型 (5-7点)';
      advice = '■ 相手を理解しようとする姿勢がある\n■ 時々、自分の意見を優先してしまうことも\n■ 意識的に相手視点を取ることで更に成長できます';
    } else {
      level = 'ng';
      label = '小さめ型 (3-4点)';
      advice = '■ 自分の考えを大切にする傾向がある\n■ 相手の背景や理由を知ることで理解が深まる\n■ 相手の話を聞く時間を意識的に増やしてみましょう';
    }

    saveResult(total, level);
    showResult(level, label, '');
    showEval(advice, level);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showEval(text, level) {
    var re = document.getElementById('re');
    re.textContent = text;
    re.className = 'result-eval';
  }

  function saveResult(total, level) {
    var data = {
      score: total,
      level: level,
      date: new Date().toLocaleString('ja-JP')
    };
    localStorage.setItem('diagnosis_result', JSON.stringify(data));
  }

  function loadResult() {
    var data = localStorage.getItem('diagnosis_result');
    if (data) {
      var parsed = JSON.parse(data);
      // 前回結果をメモリに保持（UI表示はしない、次回起動時用）
    }
  }

  // 初期化
  loadResult();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
