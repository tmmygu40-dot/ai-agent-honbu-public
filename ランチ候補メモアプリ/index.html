<head>

          async src="//gc.zgo.at/count.js"></script>

  <link rel="canonical" href="https://nekopoke.jp/%E3%83%A9%E3%83%B3%E3%83%81%E5%80%99%E8%A3%9C%E3%83%A1%E3%83%A2%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="ランチ候補メモ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"ランチ候補メモ","description":"ランチ候補メモ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%83%A9%E3%83%B3%E3%83%81%E5%80%99%E8%A3%9C%E3%83%A1%E3%83%A2%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>🍱 ランチ候補メモ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>お店を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">店名 *</label>
          <input type="text" id="name" placeholder="例：〇〇食堂" maxlength="50">
        </div>
        <div class="form-group">
          <label for="genre">ジャンル *</label>
          <select id="genre">
            <option value="">選択してください</option>
            <option value="和食">和食</option>
            <option value="洋食">洋食</option>
            <option value="中華">中華</option>
            <option value="ラーメン">ラーメン</option>
            <option value="カフェ">カフェ</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="budget">予算（円）</label>
          <input type="number" id="budget" placeholder="例：800" min="0" max="99999">
        </div>
        <div class="form-group">
          <label for="minPeople">最小人数</label>
          <input type="number" id="minPeople" placeholder="例：1" min="1" max="100" value="1">
        </div>
        <div class="form-group">
          <label for="maxPeople">最大人数</label>
          <input type="number" id="maxPeople" placeholder="例：4" min="1" max="100" value="4">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：駐車場あり、定休日月曜" maxlength="100">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>絞り込み</h2>
      <div class="filter-grid">
        <div class="form-group">
          <label for="filterGenre">ジャンル</label>
          <select id="filterGenre">
            <option value="">すべて</option>
            <option value="和食">和食</option>
            <option value="洋食">洋食</option>
            <option value="中華">中華</option>
            <option value="ラーメン">ラーメン</option>
            <option value="カフェ">カフェ</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterBudget">予算の上限</label>
          <select id="filterBudget">
            <option value="">すべて</option>
            <option value="500">〜500円</option>
            <option value="1000">〜1,000円</option>
            <option value="1500">〜1,500円</option>
            <option value="2000">〜2,000円</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterPeople">人数</label>
          <input type="number" id="filterPeople" placeholder="例：3" min="1" max="100">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-secondary" id="filterBtn">絞り込む</button>
        <button class="btn-ghost" id="clearFilterBtn">クリア</button>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>候補一覧</h2>
        <span class="count" id="countLabel">0件</span>
      </div>
      <div id="shopList" class="shop-list">
        <p class="empty-msg">登録されているお店がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
