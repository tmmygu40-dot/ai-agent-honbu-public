<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランチ候補メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>🍱 ランチ候補メモ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>お店を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">店名 *</label>
          <input type="text" id="name" placeholder="例：〇〇食堂" maxlength="50">
        </div>
        <div class="form-group">
          <label for="genre">ジャンル *</label>
          <select id="genre">
            <option value="">選択してください</option>
            <option value="和食">和食</option>
            <option value="洋食">洋食</option>
            <option value="中華">中華</option>
            <option value="ラーメン">ラーメン</option>
            <option value="カフェ">カフェ</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="budget">予算（円）</label>
          <input type="number" id="budget" placeholder="例：800" min="0" max="99999">
        </div>
        <div class="form-group">
          <label for="minPeople">最小人数</label>
          <input type="number" id="minPeople" placeholder="例：1" min="1" max="100" value="1">
        </div>
        <div class="form-group">
          <label for="maxPeople">最大人数</label>
          <input type="number" id="maxPeople" placeholder="例：4" min="1" max="100" value="4">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：駐車場あり、定休日月曜" maxlength="100">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>絞り込み</h2>
      <div class="filter-grid">
        <div class="form-group">
          <label for="filterGenre">ジャンル</label>
          <select id="filterGenre">
            <option value="">すべて</option>
            <option value="和食">和食</option>
            <option value="洋食">洋食</option>
            <option value="中華">中華</option>
            <option value="ラーメン">ラーメン</option>
            <option value="カフェ">カフェ</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterBudget">予算の上限</label>
          <select id="filterBudget">
            <option value="">すべて</option>
            <option value="500">〜500円</option>
            <option value="1000">〜1,000円</option>
            <option value="1500">〜1,500円</option>
            <option value="2000">〜2,000円</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterPeople">人数</label>
          <input type="number" id="filterPeople" placeholder="例：3" min="1" max="100">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-secondary" id="filterBtn">絞り込む</button>
        <button class="btn-ghost" id="clearFilterBtn">クリア</button>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>候補一覧</h2>
        <span class="count" id="countLabel">0件</span>
      </div>
      <div id="shopList" class="shop-list">
        <p class="empty-msg">登録されているお店がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
