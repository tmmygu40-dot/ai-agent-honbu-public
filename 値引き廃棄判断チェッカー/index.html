<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値引き廃棄判断チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>値引き廃棄判断チェッカー</h1>
    <p class="subtitle">売れ残りの最適処理方法を数値で判断</p>

    <section class="input-section">
      <h2>商品情報を入力</h2>
      <div class="form-group">
        <label for="productName">商品名（任意）</label>
        <input type="text" id="productName" placeholder="例：サンドイッチ">
      </div>
      <div class="form-group">
        <label for="cost">原価（円）<span class="required">*</span></label>
        <input type="number" id="cost" placeholder="例：200" min="0">
      </div>
      <div class="form-group">
        <label for="price">通常販売価格（円）<span class="required">*</span></label>
        <input type="number" id="price" placeholder="例：500" min="0">
      </div>
      <div class="form-group">
        <label for="discountPrice">値引き後価格（円）<span class="required">*</span></label>
        <input type="number" id="discountPrice" placeholder="例：250" min="0">
      </div>
      <div class="form-group">
        <label for="disposalCost">廃棄コスト（円）</label>
        <input type="number" id="disposalCost" placeholder="例：50（0円でも可）" min="0" value="0">
      </div>
      <div class="form-group">
        <label for="quantity">数量（個）</label>
        <input type="number" id="quantity" placeholder="例：10" min="1" value="1">
      </div>
      <button class="btn-check" onclick="calculate()">判断する</button>
    </section>

    <section class="result-section" id="resultSection" style="display:none;">
      <h2>判断結果</h2>
      <div class="result-cards">
        <div class="result-card discount" id="discountCard">
          <div class="card-label">値引き販売</div>
          <div class="loss-label">損失額</div>
          <div class="loss-amount" id="discountLoss">-</div>
          <div class="loss-unit">円</div>
        </div>
        <div class="vs">VS</div>
        <div class="result-card disposal" id="disposalCard">
          <div class="card-label">廃棄</div>
          <div class="loss-label">損失額</div>
          <div class="loss-amount" id="disposalLoss">-</div>
          <div class="loss-unit">円</div>
        </div>
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="detail" id="detail"></div>
      <button class="btn-save" onclick="saveHistory()">履歴に保存</button>
    </section>

    <section class="history-section" id="historySection">
      <h2>計算履歴 <button class="btn-clear" onclick="clearHistory()">全削除</button></h2>
      <div id="historyList"><p class="empty">履歴はありません</p></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
