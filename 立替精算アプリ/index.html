<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立替精算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>立替精算アプリ</h1>

    <!-- メンバー登録 -->
    <section class="card">
      <h2>メンバー登録</h2>
      <div class="input-row">
        <input type="text" id="memberName" placeholder="名前を入力" maxlength="20">
        <button id="addMemberBtn">追加</button>
      </div>
      <ul id="memberList" class="tag-list"></ul>
    </section>

    <!-- 支払い入力 -->
    <section class="card">
      <h2>支払い入力</h2>
      <div class="form-group">
        <label>支払った人</label>
        <select id="payer"></select>
      </div>
      <div class="form-group">
        <label>用途</label>
        <input type="text" id="payDesc" placeholder="例：ランチ代" maxlength="30">
      </div>
      <div class="form-group">
        <label>金額（円）</label>
        <input type="number" id="payAmount" placeholder="0" min="1">
      </div>
      <div class="form-group">
        <label>対象メンバー（未選択=全員）</label>
        <div id="payTargets" class="checkbox-list"></div>
      </div>
      <button id="addPayBtn" class="btn-primary">支払いを追加</button>
    </section>

    <!-- 支払い一覧 -->
    <section class="card" id="payListSection" style="display:none">
      <h2>支払い一覧</h2>
      <ul id="payList"></ul>
    </section>

    <!-- 精算結果 -->
    <section class="card" id="resultSection" style="display:none">
      <h2>精算結果</h2>
      <div id="summaryArea"></div>
      <hr>
      <h3>送金指示</h3>
      <ul id="settlementList"></ul>
    </section>

    <div class="actions">
      <button id="calcBtn" class="btn-primary">精算を計算する</button>
      <button id="resetBtn" class="btn-danger">全リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
