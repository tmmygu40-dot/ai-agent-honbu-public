<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立替精算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>立替精算アプリ</h1>

    <!-- メンバー登録 -->
    <section class="card">
      <h2>メンバー登録</h2>
      <div class="input-row">
        <input type="text" id="memberName" placeholder="名前を入力" maxlength="20">
        <button id="addMemberBtn">追加</button>
      </div>
      <ul id="memberList" class="tag-list"></ul>
    </section>

    <!-- 支払い入力 -->
    <section class="card">
      <h2>支払い入力</h2>
      <div class="form-group">
        <label>支払った人</label>
        <select id="payer"></select>
      </div>
      <div class="form-group">
        <label>用途</label>
        <input type="text" id="payDesc" placeholder="例：ランチ代" maxlength="30">
      </div>
      <div class="form-group">
        <label>金額（円）</label>
        <input type="number" id="payAmount" placeholder="0" min="1">
      </div>
      <div class="form-group">
        <label>対象メンバー（未選択=全員）</label>
        <div id="payTargets" class="checkbox-list"></div>
      </div>
      <button id="addPayBtn" class="btn-primary">支払いを追加</button>
    </section>

    <!-- 支払い一覧 -->
    <section class="card" id="payListSection" style="display:none">
      <h2>支払い一覧</h2>
      <ul id="payList"></ul>
    </section>

    <!-- 精算結果 -->
    <section class="card" id="resultSection" style="display:none">
      <h2>精算結果</h2>
      <div id="summaryArea"></div>
      <hr>
      <h3>送金指示</h3>
      <ul id="settlementList"></ul>
    </section>

    <div class="actions">
      <button id="calcBtn" class="btn-primary">精算を計算する</button>
      <button id="resetBtn" class="btn-danger">全リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('addMemberBtn').addEventListener('click', function() {
      var name = $('memberName').value.trim();
      if (!name) return;
      if (members.includes(name)) { alert('同じ名前のメンバーが既にいます'); return; }
      members.push(name);
      $('memberName').value = '';
      save();
      renderMembers();
    });

    document.getElementById('addPayBtn').addEventListener('click', function() {
      var payer = $('payer').value;
      if (!payer) { alert('支払った人を選んでください'); return; }
      var desc = $('payDesc').value.trim() || '支払い';
      var amount = parseInt($('payAmount').value);
      if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
      var checkedBoxes = $('payTargets').querySelectorAll('input[type=checkbox]:checked');
      var targets = Array.from(checkedBoxes).map(function(cb) { return cb.value; });
      if (targets.length === 0) { alert('対象メンバーを1人以上選んでください'); return; }
      payments.push({ id: Date.now(), payer: payer, desc: desc, amount: amount, targets: targets });
      $('payDesc').value = '';
      $('payAmount').value = '';
      $('payTargets').querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = true; });
      save();
      renderPayments();
      $('resultSection').style.display = 'none';
    });

    document.getElementById('calcBtn').addEventListener('click', calculate);

    document.getElementById('resetBtn').addEventListener('click', function() {
      if (!confirm('全データをリセットしますか？')) return;
      members = [];
      payments = [];
      save();
      renderMembers();
      renderPayments();
      $('resultSection').style.display = 'none';
    });
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
