<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNS Queue Preview</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1d2a3a;
      --muted: #607089;
      --accent: #2a5db0;
      --danger: #b43838;
      --ok: #2f8b4b;
      --border: #d9e1ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 24px;
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    select, button {
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
    }
    .meta {
      color: var(--muted);
      margin-bottom: 14px;
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 14px;
    }
    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #edf3fb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .name {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f7faff;
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
    }
    .badge.status-draft { color: var(--ok); }
    .badge.status-other { color: var(--danger); }
    .field {
      border-top: 1px dashed var(--border);
      padding-top: 6px;
    }
    .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
      display: block;
    }
    .text {
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 13px;
      margin: 0;
      word-break: break-word;
    }
    .warn {
      color: var(--danger);
      font-weight: 700;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>SNS 投稿候補プレビュー</h1>
      <div class="controls">
        <label for="sortBy">並び順:</label>
        <select id="sortBy">
          <option value="priority">優先度の高い順</option>
          <option value="newest">新しい順</option>
        </select>
        <button id="reloadBtn" type="button">再読み込み</button>
      </div>
    </div>
    <div id="meta" class="meta">読み込み中...</div>
    <div id="grid" class="grid"></div>
  </div>

  <script>
    const queuePath = "./sns_queue.json";
    const grid = document.getElementById("grid");
    const meta = document.getElementById("meta");
    const sortBy = document.getElementById("sortBy");
    const reloadBtn = document.getElementById("reloadBtn");

    function getTime(item) {
      const dt = Date.parse(item.created_at || "");
      return Number.isNaN(dt) ? 0 : dt;
    }

    function sortItems(items, mode) {
      const out = [...items];
      if (mode === "newest") {
        out.sort((a, b) => getTime(b) - getTime(a));
        return out;
      }
      out.sort((a, b) => {
        const sb = Number(b.sns_priority_score || 0) - Number(a.sns_priority_score || 0);
        if (sb !== 0) return sb;
        return getTime(b) - getTime(a);
      });
      return out;
    }

    function render(items) {
      grid.innerHTML = "";
      const sorted = sortItems(items, sortBy.value);
      const withImage = sorted.filter(i => typeof i.card_image === "string" && i.card_image.length > 0).length;
      meta.textContent = `全 ${sorted.length} 件 / 画像あり ${withImage} 件 / 並び順: ${sortBy.value === "priority" ? "優先度" : "新しい順"}`;

      for (const item of sorted) {
        const card = document.createElement("article");
        card.className = "item";

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        const cardImage = item.card_image;
        if (typeof cardImage === "string" && cardImage.trim()) {
          const img = document.createElement("img");
          img.src = `../${cardImage}`;
          img.alt = item.app_name || "";
          img.onerror = () => {
            thumb.innerHTML = `<div class="warn">画像が見つかりません<br>${cardImage}</div>`;
          };
          thumb.appendChild(img);
        } else {
          thumb.innerHTML = `<div class="warn">card_image 未設定</div>`;
        }

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.app_name || "(no app_name)";

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <span class="badge">priority: ${Number(item.sns_priority_score || 0)}</span>
          <span class="badge">freshness_penalty: ${Number(item.freshness_penalty || 0)}</span>
          <span class="badge ${item.status === "draft" ? "status-draft" : "status-other"}">status: ${item.status || "-"}</span>
        `;

        const pathField = document.createElement("div");
        pathField.className = "field";
        pathField.innerHTML = `<span class="label">card_image</span><p class="text">${cardImage || "(なし)"}</p>`;

        const xField = document.createElement("div");
        xField.className = "field";
        xField.innerHTML = `<span class="label">X</span><p class="text">${item.x_text || ""}</p>`;

        const igField = document.createElement("div");
        igField.className = "field";
        igField.innerHTML = `<span class="label">Instagram</span><p class="text">${item.instagram_caption || ""}</p>`;

        const tkField = document.createElement("div");
        tkField.className = "field";
        tkField.innerHTML = `<span class="label">TikTok</span><p class="text">${item.tiktok_caption || ""}</p>`;

        card.append(thumb, name, row, pathField, xField, igField, tkField);
        grid.appendChild(card);
      }
    }

    async function load() {
      try {
        const res = await fetch(queuePath, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("sns_queue.json is not array");
        render(data);
      } catch (err) {
        meta.textContent = `読み込み失敗: ${err.message}`;
        grid.innerHTML = `<div class="warn">※ file:// 直開きで失敗する場合は、ローカルサーバー経由で開いてください。</div>`;
      }
    }

    sortBy.addEventListener("change", load);
    reloadBtn.addEventListener("click", load);
    load();
  </script>
</body>
</html>
