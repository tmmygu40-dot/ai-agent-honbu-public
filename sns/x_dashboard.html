<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X投稿ダッシュボード</title>
  <style>
    :root {
      --bg: #0a1020;
      --bg2: #101b33;
      --panel: #121c34;
      --line: #2b3b60;
      --text: #e9f1ff;
      --muted: #9caed3;
      --accent: #4ea3ff;
      --ok: #38c785;
      --warn: #ffcf65;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(1100px 700px at 0% -10%, #1a2b4a 0, var(--bg) 55%);
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    h1 { margin: 0; font-size: 30px; letter-spacing: .02em; }
    .meta {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--bg2), #0f1830);
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .metaTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .big {
      font-size: 24px;
      font-weight: 800;
      color: var(--warn);
    }
    .sub { color: var(--muted); font-size: 14px; }
    .notice {
      color: #b6cbef;
      background: #15213e;
      border: 1px solid #2d406d;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .bannerWarn {
      color: #ffe8bf;
      background: #3d2a14;
      border: 1px solid #99662e;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.45;
    }
    .statsPanel {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1830;
      display: grid;
      gap: 6px;
    }
    .statsHead {
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .statsBody {
      margin: 0;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.55;
      color: #dce6fb;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .statsMuted {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #1b2b4f;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    .urlXHint {
      margin-top: 6px;
      font-size: 12px;
      color: #9bb3d9;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .withIcon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .withIcon svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .btnMini { padding: 6px 9px; font-size: 12px; }
    .hero {
      border: 1px solid #3865a8;
      background: linear-gradient(180deg, #16305d, #14284d);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .heroTitle { font-size: 18px; font-weight: 800; color: #b8d8ff; }
    .slots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), #0f1830);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .card.posted {
      opacity: .62;
      filter: grayscale(.18);
    }
    .slot {
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
    }
    .pillRow {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #13213f;
      padding: 3px 8px;
    }
    .name { font-size: 18px; font-weight: 800; line-height: 1.4; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
      background: #0c1428;
      border: 1px solid #243960;
      border-radius: 10px;
      padding: 10px;
      word-break: break-word;
    }
    .url {
      color: #9ad1ff;
      font-size: 12px;
      word-break: break-all;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btnCopy { background: #1f5f4b; border-color: #2a8b6e; }
    .btnOpen { background: #225aa9; border-color: #2e70cc; }
    .btnDone { background: #694b76; border-color: #9c73af; }
    .btnSkip { background: #3a4558; border-color: #5a6785; font-size: 12px; }
    .slotEmpty {
      border: 1px dashed #3a4f79;
      color: var(--muted);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      min-height: 70px;
      display: grid;
      place-items: center;
      text-align: center;
    }
    /* マンネリ打破モード（未開拓・ネタ・実用フリマ・建築DIY・地域・定番の6分類） */
    .genreMode {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #142b48, #0c1730);
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .genreModeHeader { display: grid; gap: 6px; }
    .genreModeTitle {
      margin: 0;
      font-size: 18px;
      color: var(--warn);
      letter-spacing: .02em;
    }
    .genreModeSub { color: var(--muted); font-size: 12px; }
    .genreTabs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .genreTab {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #182542;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .genreTab.active { background: var(--accent); color: #07142b; border-color: var(--accent); }
    .genreSections { display: grid; gap: 10px; }
    .genreSection {
      border: 1px solid #2b3b60;
      border-radius: 12px;
      padding: 10px;
      background: #0e1a35;
    }
    .genreSection h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      letter-spacing: .02em;
      color: var(--accent);
    }
    .genreSection.unexplored h3 { color: #ffcf65; }
    .genreSection.neta       h3 { color: #ff85c1; }
    .genreSection.utility    h3 { color: #38c785; }
    .genreSection.flea       h3 { color: #62d6a4; }
    .genreSection.diy        h3 { color: #4ea3ff; }
    .genreSection.local      h3 { color: #b6cbef; }
    .genreSection.classic    h3 { color: #9caed3; }
    .genreList { display: grid; gap: 6px; }
    .genreItem {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      background: #122042;
      border: 1px solid #1f2f55;
      border-radius: 8px;
      font-size: 13px;
    }
    .genreItem .gName { font-weight: 600; }
    .genreItem .gAngle { color: var(--muted); font-size: 11px; margin-top: 2px; line-height: 1.4; }
    .genreItem .gMeta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .genreItem .gActions { display: flex; gap: 4px; }
    .genreItem .gBtn {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #182542;
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
    }
    .genreItem .gBtn:hover:not(:disabled) { filter: brightness(1.15); }
    .genreItem .gBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #1a2336;
    }
    .genreItem .gBtnOpen { background: #225aa9; border-color: #2e70cc; }
    .genreItem .gBtnDone { background: #694b76; border-color: #9c73af; }
    .genreItem .gBtnSkip { background: #3a4558; border-color: #5a6785; font-size: 10px; }
    .genreItem.queueMatch { border-left: 3px solid var(--ok); }
    .genreItem.unexploredOnly { border-left: 3px solid var(--warn); }
    .genreItem.posted { opacity: 0.55; filter: grayscale(0.3); }
    .genreItem.posted .gName::after {
      content: " ✓";
      color: var(--ok);
      font-weight: 700;
    }
    .genreEmpty {
      color: var(--muted);
      font-size: 12px;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AIエージェント本部 / X投稿ダッシュボード</h1>

    <section class="meta">
      <div class="metaTop">
        <div>
          <div class="big" id="displayDate">表示中の日付: ----</div>
          <div class="sub" id="nextPost">次の投稿予定: ----</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
          <button id="reloadBtn" type="button">再読み込み</button>
          <button id="resetPostedBtn" class="btnMini" type="button">投稿済みローカル状態をリセット</button>
          <button id="copyMarkPostedCmdBtn" class="btnMini" type="button">投稿済み反映コマンドをコピー</button>
          <button id="copyMarkArchivedCmdBtn" class="btnMini" type="button">今は出さない反映コマンドをコピー</button>
        </div>
      </div>
      <div class="statsPanel" id="statsPanel" aria-live="polite">
        <div class="statsHead">候補サマリー</div>
        <pre class="statsBody" id="statsBody">読み込み中...</pre>
        <div class="statsMuted" id="statsOrphan" hidden></div>
        <div class="bannerWarn" id="statsRefillHint" hidden></div>
      </div>
      <div class="notice" id="noticeText">読み込み中...</div>
    </section>

    <!-- マンネリ打破モード（K-156 後追加 / 占い・推し活偏重を打破して未開拓・ネタ・実用を前面に） -->
    <section class="genreMode" id="genreMode">
      <div class="genreModeHeader">
        <h2 class="genreModeTitle">🌟 マンネリ打破モード</h2>
        <div class="genreModeSub">占い・推し活・診断・脳トレ・クイズ偏重をやめ、未開拓ジャンルを優先表示</div>
        <div class="genreTabs" id="genreTabs"></div>
      </div>
      <div class="genreSections" id="genreSections"></div>
    </section>

    <section class="hero" id="hero"></section>
    <section class="slots" id="slots"></section>
  </div>

  <script>
    const QUEUE_PATH = "./sns_queue.json";
    const UNEXPLORED_PATH = "./x_unexplored_candidates.json";
    const POSTED_KEY = "x_dashboard_posted_ids_v2";
    const SKIPPED_KEY = "x_dashboard_skipped_ids_v1";
    const UNEX_POSTED_KEY = "x_dashboard_unex_posted_ids_v1";
    const UNEX_SKIPPED_KEY = "x_dashboard_unex_skipped_ids_v1";
    const GENRE_TAB_KEY = "x_dashboard_genre_tab_v1";
    const SLOT_DEFS = [
      { key: "08:00", label: "朝 08:00" },
      { key: "12:30", label: "昼 12:30" },
      { key: "20:30", label: "夜 20:30" },
    ];

    const displayDateEl = document.getElementById("displayDate");
    const nextPostEl = document.getElementById("nextPost");
    const noticeEl = document.getElementById("noticeText");
    const heroEl = document.getElementById("hero");
    const slotsEl = document.getElementById("slots");
    const genreTabsEl = document.getElementById("genreTabs");
    const genreSectionsEl = document.getElementById("genreSections");
    let unexploredCandidates = [];
    let activeGenreTab = "all";
    try {
      const saved = localStorage.getItem(GENRE_TAB_KEY);
      if (saved) activeGenreTab = saved;
    } catch {}
    const reloadBtn = document.getElementById("reloadBtn");
    const resetPostedBtn = document.getElementById("resetPostedBtn");
    const copyMarkPostedCmdBtn = document.getElementById("copyMarkPostedCmdBtn");
    const copyMarkArchivedCmdBtn = document.getElementById("copyMarkArchivedCmdBtn");
    const statsBodyEl = document.getElementById("statsBody");
    const statsOrphanEl = document.getElementById("statsOrphan");
    const statsRefillHintEl = document.getElementById("statsRefillHint");

    /** sns_queue.json を posted にするための PowerShell 用（リポジトリルート固定） */
    const REPO_ROOT_PS = "C:\\Users\\tmmyg\\OneDrive\\デスクトップ\\ai-agent-honbu-public";

    function buildMarkPostedPowerShellCommands() {
      const ids = idsForMarkPostedSync();
      if (ids.length === 0) return "";
      const lines = [`Set-Location "${REPO_ROOT_PS}"`];
      for (const id of ids) {
        lines.push(`python sns/sns_x_post_manager.py --mark-posted ${id}`);
      }
      lines.push("git status --short");
      return lines.join("\n");
    }

    function buildArchivedNotForNowPowerShellCommands() {
      const ids = idsForArchivedNotForNowSync();
      if (ids.length === 0) return "";
      const lines = [`Set-Location "${REPO_ROOT_PS}"`];
      for (const id of ids) {
        lines.push(`python sns/sns_x_post_manager.py --mark-archived-not-for-now ${id}`);
      }
      lines.push("git status --short");
      return lines.join("\n");
    }

    let scheduledItems = [];
    let nextCandidateItems = [];
    let targetDate = "";

    function ymdJst(date = new Date()) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(date);
    }

    function fmtJst(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(date).replace(/\//g, "-");
    }

    function icon(name) {
      const map = {
        refresh: '<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
        reset: '<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>',
        calendar: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
        clock: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg>',
        copy: '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/></svg>',
        external: '<svg viewBox="0 0 24 24"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7H3V3h7"/></svg>',
        check: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/></svg>',
      };
      return map[name] || "";
    }

    function parseDate(item) {
      const dt = new Date(String(item.scheduled_at || ""));
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function postedSet() {
      try {
        const raw = localStorage.getItem(POSTED_KEY);
        const arr = JSON.parse(raw || "[]");
        return new Set(Array.isArray(arr) ? arr : []);
      } catch {
        return new Set();
      }
    }

    function savePosted(set) {
      localStorage.setItem(POSTED_KEY, JSON.stringify([...set]));
    }

    function skippedSet() {
      try {
        const raw = localStorage.getItem(SKIPPED_KEY);
        const arr = JSON.parse(raw || "[]");
        return new Set(Array.isArray(arr) ? arr : []);
      } catch {
        return new Set();
      }
    }

    function saveSkipped(set) {
      localStorage.setItem(SKIPPED_KEY, JSON.stringify([...set]));
    }

    function unexPostedSet() {
      try {
        const raw = localStorage.getItem(UNEX_POSTED_KEY);
        const arr = JSON.parse(raw || "[]");
        return new Set(Array.isArray(arr) ? arr : []);
      } catch {
        return new Set();
      }
    }

    function saveUnexPosted(set) {
      localStorage.setItem(UNEX_POSTED_KEY, JSON.stringify([...set]));
    }

    function unexSkippedSet() {
      try {
        const raw = localStorage.getItem(UNEX_SKIPPED_KEY);
        const arr = JSON.parse(raw || "[]");
        return new Set(Array.isArray(arr) ? arr : []);
      } catch {
        return new Set();
      }
    }

    function saveUnexSkipped(set) {
      localStorage.setItem(UNEX_SKIPPED_KEY, JSON.stringify([...set]));
    }

    function unexId(entry) {
      if (!entry) return "";
      const rank = entry.rank;
      if (rank != null && rank !== "") return `unex:rank:${rank}`;
      const su = String(entry.short_url || "").trim();
      if (su) return `unex:url:${su}`;
      const app = String(entry.app_name || "").trim();
      if (app) return `unex:app:${app}`;
      return "";
    }

    /** 表示用: draft/scheduled かつローカルで「今は出さない」にしていない候補 */
    function visibleActiveCandidateItems() {
      const skipped = skippedSet();
      const items = Array.isArray(nextCandidateItems) ? nextCandidateItems : [];
      return items.filter(isActiveSnsCandidate).filter((x) => !skipped.has(String(x.id || "").trim()));
    }

    /** draft / scheduled のみ（archived_*・posted は対象外） */
    function isActiveSnsCandidate(item) {
      if (!item) return false;
      const st = String(item.status || "").trim();
      return st === "draft" || st === "scheduled";
    }

    /** 現在キュー上の「投稿候補」ID（sns_queue 上で draft または scheduled のみ） */
    function activeCandidateIdSet() {
      const items = Array.isArray(nextCandidateItems) ? nextCandidateItems : [];
      const ids = new Set();
      for (const x of items) {
        if (!isActiveSnsCandidate(x)) continue;
        const id = String(x && x.id != null ? x.id : "").trim();
        if (id) ids.add(id);
      }
      return ids;
    }

    /**
     * 投稿済み反映コマンド用: localStorage の posted ID のうち、
     * いまの draft/scheduled 候補に載っている ID のみ（古いIDは除外）。
     */
    function idsForMarkPostedSync() {
      const candidateIds = activeCandidateIdSet();
      const posted = postedSet();
      const out = [];
      for (const id of posted) {
        const sid = String(id || "").trim();
        if (sid && candidateIds.has(sid)) out.push(sid);
      }
      out.sort((a, b) => a.localeCompare(b));
      return out;
    }

    /**
     * 「今は出さない」反映コマンド用: skipped ID のうち、
     * いまの sns_queue 上で draft/scheduled のものだけ（posted 用ローカルとは別集合）。
     */
    function idsForArchivedNotForNowSync() {
      const candidateIds = activeCandidateIdSet();
      const skipped = skippedSet();
      const out = [];
      for (const id of skipped) {
        const sid = String(id || "").trim();
        if (sid && candidateIds.has(sid)) out.push(sid);
      }
      out.sort((a, b) => a.localeCompare(b));
      return out;
    }

    /**
     * draft/scheduled 候補と localStorage（POSTED_KEY）から件数を更新する。
     * ローカル投稿済み・本体反映待ちは「現在の候補リストに含まれるID」のみを数える。
     */
    function renderStatsSummary() {
      if (!statsBodyEl) return;
      const posted = postedSet();
      const skipped = skippedSet();
      const items = Array.isArray(nextCandidateItems) ? nextCandidateItems : [];
      const candidateIds = activeCandidateIdSet();
      const visible = visibleActiveCandidateItems();
      const visibleIds = new Set(visible.map((x) => String(x && x.id != null ? x.id : "").trim()).filter(Boolean));
      const total = visible.length;
      let localAmongCandidates = 0;
      for (const id of posted) {
        const sid = String(id || "").trim();
        if (sid && visibleIds.has(sid)) localAmongCandidates += 1;
      }
      const remaining = Math.max(0, total - localAmongCandidates);
      const pendingSync = localAmongCandidates;
      const orphanPosted = [...posted].filter((id) => {
        const sid = String(id || "").trim();
        return sid && !candidateIds.has(sid);
      }).length;
      let skippedInView = 0;
      for (const id of skipped) {
        const sid = String(id || "").trim();
        if (sid && candidateIds.has(sid)) skippedInView += 1;
      }
      const orphanSkipped = [...skipped].filter((id) => {
        const sid = String(id || "").trim();
        return sid && !candidateIds.has(sid);
      }).length;

      statsBodyEl.textContent =
        `投稿候補（表示）: ${total}件\n` +
        `（キュー上 draft/scheduled: ${candidateIds.size}件、今は出さないで非表示: ${skippedInView}件）\n` +
        `ローカル投稿済み：${localAmongCandidates}件\n` +
        `残り表示候補：${remaining}件\n` +
        `本体反映待ち：${pendingSync}件`;

      if (statsOrphanEl) {
        const parts = [];
        if (orphanPosted > 0) {
          parts.push(
            `※ 投稿済み localStorage に、いまの draft/scheduled に無いIDが ${orphanPosted} 件（過去の投稿済みトグル）。「投稿済みローカル状態をリセット」で整理できます。`
          );
        }
        if (orphanSkipped > 0) {
          parts.push(
            `※ 「今は出さない」localStorage に、いまの draft/scheduled に無いIDが ${orphanSkipped} 件残っています。再読み込み後も出る場合はリセット用キー整理を検討してください。`
          );
        }
        if (parts.length > 0) {
          statsOrphanEl.hidden = false;
          statsOrphanEl.textContent = parts.join("\n");
        } else {
          statsOrphanEl.hidden = true;
          statsOrphanEl.textContent = "";
        }
      }

      if (statsRefillHintEl) {
        if (total > 0 && remaining <= 5) {
          statsRefillHintEl.hidden = false;
          statsRefillHintEl.textContent =
            "残り表示候補が5件以下です。そろそろ補充（`sns_x_post_manager.py --generate` など）を検討してもよさそうです。";
        } else {
          statsRefillHintEl.hidden = true;
          statsRefillHintEl.textContent = "";
        }
      }
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;

    /**
     * X向けにパスの各セグメントを decode→encode で1回だけ正規化（二重エンコード防止）。
     */
    function toXPostUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return "";
      try {
        const u = new URL(value);
        const path = u.pathname || "/";
        if (path === "/" || path === "") {
          return `${u.origin}/${u.search}`;
        }
        const segments = path.split("/").filter(Boolean);
        const encodedSegs = segments.map((seg) => {
          try {
            return encodeURIComponent(decodeURIComponent(seg));
          } catch {
            return encodeURIComponent(seg);
          }
        });
        const trailing = path.endsWith("/") ? "/" : "";
        const newPath = "/" + encodedSegs.join("/") + trailing;
        return `${u.origin}${newPath}${u.search}`;
      } catch {
        return value;
      }
    }

    /** ダッシュボード本文・コピー・Xインテント共通の末尾URL（short_url があれば常にそれを優先）。 */
    function postUrlLine(item, forX) {
      const short = String(item?.short_url || "").trim();
      if (short) return short;
      const displayUrl = String(item?.url || "").trim();
      if (!displayUrl) return "";
      return forX ? (toXPostUrl(displayUrl) || displayUrl) : displayUrl;
    }

    function buildTweetText(item, opts = {}) {
      const useX = opts.forX === true;
      const skipAppNameInject = opts.skipAppNameInject === true;
      const base = String(item?.x_text || "").trim();
      const appName = String(item?.app_name || "").trim();
      const short = String(item?.short_url || "").trim();
      const raw = String(item?.url || "").trim();
      const postUrl = short
        ? short
        : raw
          ? (useX ? (toXPostUrl(raw) || raw) : raw)
          : "";
      let merged = base;
      if (!skipAppNameInject && appName && merged && !merged.includes(appName)) {
        const lines = merged.split("\n");
        if (lines.length >= 2) {
          // Insert app_name after hook line with a blank line around it.
          merged = `${lines[0]}\n\n${appName}\n\n${lines.slice(1).join("\n").trim()}`;
        } else {
          merged = `${merged}\n\n${appName}`;
        }
      }
      const arrowLine = "↓　↓　↓";
      const escPost = postUrl.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      if (!postUrl) return merged;
      if (raw && postUrl && raw !== postUrl && merged.includes(raw)) {
        merged = merged.split(raw).join(postUrl);
      }
      if (merged.includes(postUrl)) {
        const markerRe = new RegExp(`\\n(?:\\n)?(?:↓↓↓|↓ ↓ ↓|↓　↓　↓)\\n${escPost}$`);
        if (markerRe.test(merged)) return merged;
        const tailUrlRe = new RegExp(`\\n${escPost}$`);
        if (tailUrlRe.test(merged)) return merged.replace(tailUrlRe, `\n\n${arrowLine}\n${postUrl}`);
        return `${merged}\n\n${arrowLine}\n${postUrl}`;
      }
      return merged ? `${merged}\n\n${arrowLine}\n${postUrl}` : `${arrowLine}\n${postUrl}`;
    }

    function formatAppLineForPost(raw) {
      const app = String(raw || "").trim();
      if (!app) return "";
      // 猫の足あと絵文字（🐾）は付けない（新フォーマット）。既存の先頭🐾は除去。
      return app.replace(/^🐾[ 　]?/u, "").trim();
    }

    function buildAppPostTemplate(item) {
      // K-XT-PRIO: queue の x_text が既に「【今日のチェック】」形式で揃っているなら優先使用。
      // dashboard 側の hook 再計算 (resolveHookForItem の非同期) が間に合わずに
      //「（フック未計算: 再読み込みしてください）」が漏れるのを根本防止。
      const existingXText = String(item?.x_text || "").trim();
      if (existingXText.startsWith("【今日のチェック】")) {
        return existingXText;
      }
      const app = formatAppLineForPost(String(item?.app_name || ""));
      const short = String(item?.short_url || "").trim();
      const hook = pickHook(item);
      const desc = pickDescription(item);
      const out = ["【今日のチェック】", "", hook, "", desc, "", app];
      out.push("↓　↓　↓", short);
      return out.join("\n");
    }

    async function sha256hexUtf8(str) {
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(digest), (b) => b.toString(16).padStart(2, "0")).join("");
    }

    function hookSeedId(item) {
      const id = String(item?.id || "").trim();
      if (id) return id;
      return String(item?.app_name || "").trim() || "unknown";
    }

    async function pickHookStable(poolKey, pool, item) {
      const seed = `hook:${poolKey}:${hookSeedId(item)}`;
      const h = await sha256hexUtf8(seed);
      const idx = parseInt(h.slice(0, 8), 16) % pool.length;
      return pool[idx];
    }

    async function resolveHookForItem(item) {

    function pickHook(item) {
      if (item && item._hookCached !== undefined) return item._hookCached;
      // K-XT-PRIO フォールバック: queue の x_text から hook 行を抽出。
      // 「【今日のチェック】 / 空 / <hook> / 空 / desc ...」形式を期待。
      const xt = String(item?.x_text || "").trim();
      if (xt) {
        const lines = xt.split("\n");
        if (lines[0] && lines[0].includes("今日のチェック") && lines[2]) {
          const h = lines[2].trim();
          if (h) return h;
        }
      }
      return "今日のチェック";

      return "気になるポイントを先に整理して、次の行動を決めやすくする用途で使えます。";
    }

    function fitTweetLength(text, fallbackUrl) {
      const hardLimit = 280;
      if (text.length <= hardLimit) return text;
      const url = String(fallbackUrl || "").trim();
      const keep = url ? `\n\n${url}` : "";
      const tailLimit = hardLimit - keep.length;
      if (tailLimit <= 0) return (url || "").slice(0, hardLimit);
      const head = text.slice(0, tailLimit - 1).trimEnd();
      return `${head}…${keep}`;
    }

    /** ディスクレーマー語句の明示リスト（標準形→正規表現で除去） */
    const POST_DISCLAIMER_PHRASES = [
      "参考・目安として使えます",
      "参考・確認用のミニアプリです",
      "参考・確認用です",
      "参考・目安です",
      "参考目安として",
      "参考目安です",
      "あくまで目安です",
      "参考程度に",
      "目安としてご利用ください",
      "参考用ミニアプリです",
      "確認用ミニアプリです",
    ];

    /** 投稿文の見た目を統一する表示時正規化:
     *  - 🐾 を除去
     *  - 矢印を ↓　↓　↓（全角スペース区切り）に統一
     *  - 1行目の【...】見出しは【今日のチェック】に置換／無ければ先頭に付与
     *  - 「参考目安です」系のディスクレーマー語句を除去（括弧ごと）
     *  - 後始末（空括弧・行末空白・連続空行）
     */
    function normalizePostFormat(text) {
      if (!text) return text;
      let s = String(text);

      // 1. 🐾 + 直後スペースを除去
      s = s.replace(/🐾[ 　]?/gu, "");

      // 2. 矢印を ↓　↓　↓ に統一
      s = s.replace(/↓[\s　]*↓[\s　]*↓/gu, "↓　↓　↓");

      // 3. 1行目の見出しを【今日のチェック】に統一
      const lines = s.split(/\r?\n/);
      let firstIdx = 0;
      while (firstIdx < lines.length && lines[firstIdx].trim() === "") firstIdx++;
      if (firstIdx < lines.length) {
        const firstLine = lines[firstIdx];
        if (/^【.+】$/u.test(firstLine)) {
          if (firstLine !== "【今日のチェック】") lines[firstIdx] = "【今日のチェック】";
        } else {
          lines.splice(firstIdx, 0, "【今日のチェック】", "");
        }
        s = lines.join("\n");
      }

      // 4. ディスクレーマー語句を除去
      // 4-1. 括弧（全角/半角）に包まれた参考/目安系を丸ごと削除（前後の※や空白も含む、句読点も巻き取る）
      s = s.replace(/[（(][^（()）]*(?:参考|目安)[^（()）]*[）)][。、]?/gu, "");
      // 4-2. 明示リストの語句を単独でも削除（先頭の※や空白、句末の。、ごと）
      for (const ph of POST_DISCLAIMER_PHRASES) {
        const esc = ph.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        s = s.replace(new RegExp(`\\s*※?\\s*${esc}[。、]?`, "gu"), "");
      }
      // 4-3. 削除後に残る空の括弧を片付け
      s = s.replace(/[（(][\s　]*[）)]/gu, "");
      // 4-4. 行末空白除去
      s = s.split("\n").map(line => line.replace(/[ 　\t]+$/g, "")).join("\n");
      // 4-5. 連続する空行は最大1つに
      s = s.replace(/\n{3,}/g, "\n\n");

      return s;
    }

    /**
     * @param {boolean} forX true のとき本文末尾URLは X で途切れにくい percent 形式。表示用は false。
     */
    function buildDashboardPostText(item, forX = false) {
      const urlLine = postUrlLine(item, forX);
      const saved = String(item?.x_text || "").trim();
      let out;
      if (saved) {
        const text = buildTweetText(item, { forX, skipAppNameInject: true });
        out = fitTweetLength(text, urlLine);
      } else if (hasAppAndShortUrl(item)) {
        const text = buildAppPostTemplate(item);
        out = fitTweetLength(text, String(item.short_url || "").trim());
      } else {
        const text = buildTweetText(item, { forX });
        out = fitTweetLength(text, urlLine);
      }
      return normalizePostFormat(out);
    }

    function guessNameFromUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return "";
      try {
        const u = new URL(value);
        if (!/^(www\.)?nekopoke\.jp$/i.test(u.hostname)) return "";
        const path = (u.pathname || "/").replace(/\/+$/, "");
        if (!path || path === "/") return "ネコポケ";
        const last = path.split("/").filter(Boolean).pop();
        if (!last) return "ネコポケ";
        return decodeURIComponent(last);
      } catch {
        return "";
      }
    }

    function displayName(item) {
      const app = String(item?.app_name || "").trim();
      if (app) return app;
      const title = String(item?.title || "").trim();
      if (title) return title;
      return guessNameFromUrl(item?.url) || "ネコポケ投稿";
    }

    function openX(text) {
      const url = "https://x.com/intent/tweet?text=" + encodeURIComponent(text);
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function decideDisplayDate(items) {
      const today = ymdJst(new Date());
      const days = [...new Set(items.map(x => String(x.scheduled_at || "").slice(0, 10)))].sort();
      if (days.includes(today)) return { date: today, fallback: false };
      const next = days.find(d => d >= today);
      if (next) return { date: next, fallback: true };
      return { date: days[0] || today, fallback: true };
    }

    function pickNextPost(items) {
      const now = new Date();
      const all = items
        .map(x => ({ item: x, dt: parseDate(x) }))
        .filter(x => x.dt)
        .sort((a, b) => a.dt - b.dt);
      const upcoming = all.find(x => x.dt >= now);
      return (upcoming || all[0] || null);
    }

    function isTopNekopokeUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return false;
      return /^https?:\/\/(www\.)?nekopoke\.jp\/?$/i.test(value);
    }

    function hasAppAndUrl(item) {
      const app = String(item?.app_name || "").trim();
      const url = String(item?.url || "").trim();
      if (!app || !url) return false;
      if (app === "ネコポケ" || app === "ネコポケ投稿") return false;
      return !isTopNekopokeUrl(url);
    }

    function hasAppAndShortUrl(item) {
      if (!hasAppAndUrl(item)) return false;
      return String(item?.short_url || "").trim().length > 0;
    }

    /** ネコポケの実アプリURLで、パスに非ASCII（日本語等）が含まれるとき true */
    function urlPathHasNonAscii(urlStr) {
      try {
        const path = new URL(urlStr).pathname || "";
        return /[^\x00-\x7F]/.test(path);
      } catch {
        return false;
      }
    }

    /**
     * 日本語URLを含み、short_url が空のとき。Xでリンク欠損のリスクあり。
     */
    function needsShortUrlForX(item) {
      if (!hasAppAndUrl(item)) return false;
      const raw = String(item?.url || "").trim();
      if (!/^https?:\/\/(www\.)?nekopoke\.jp\//i.test(raw)) return false;
      if (String(item?.short_url || "").trim()) return false;
      return urlPathHasNonAscii(raw);
    }

    function cmpShortRisk(a, b) {
      const ra = needsShortUrlForX(a.item) ? 1 : 0;
      const rb = needsShortUrlForX(b.item) ? 1 : 0;
      return ra - rb;
    }

    function isUrlVerified(item) {
      if (!hasAppAndUrl(item)) return true;
      if (item?.url_verified_public === true) return true;
      if (String(item?.url_check_status_public || "") === "verified_public") return true;
      if (item?.url_verified === true) return true;
      return String(item?.url_check_status || "") === "verified";
    }

    /** verified を「優先」するための比較（verified を前へ。ただし非verifiedも除外しない）。 */
    function cmpVerifiedPref(a, b) {
      const va = isUrlVerified(a.item) ? 0 : 1;
      const vb = isUrlVerified(b.item) ? 0 : 1;
      return va - vb;
    }

    function pickNextUnposted(items, posted) {
      const skipped = skippedSet();
      const now = new Date();
      // draft/scheduled かつ「個別アプリURLを持つ」候補を対象にする。
      // short_url が無くても url があれば候補に出す（旧 verified+short_url の少数固定をやめる）。
      const all = items
        .filter(x => !skipped.has(String(x.id || "").trim()))
        .filter(x => !posted.has(String(x.id || "")))
        .filter(x => hasAppAndUrl(x))
        .map(x => ({ item: x, dt: parseDate(x) }));

      if (all.length === 0) return null;

      // verified は「優先」するが、verified しか出さない仕様にはしない。
      const pool = all;

      const withUpcomingDt = pool
        .filter(x => x.dt && x.dt >= now)
        .sort((a, b) => {
          const v = cmpVerifiedPref(a, b);
          if (v !== 0) return v;
          const c = cmpShortRisk(a, b);
          if (c !== 0) return c;
          return a.dt - b.dt;
        });
      if (withUpcomingDt.length > 0) return withUpcomingDt[0];

      const withAnyDt = pool.filter(x => x.dt).sort((a, b) => {
        const v = cmpVerifiedPref(a, b);
        if (v !== 0) return v;
        const c = cmpShortRisk(a, b);
        if (c !== 0) return c;
        return a.dt - b.dt;
      });
      if (withAnyDt.length > 0) return withAnyDt[0];

      return pool
        .slice()
        .sort((a, b) => {
          const v = cmpVerifiedPref(a, b);
          if (v !== 0) return v;
          const c = cmpShortRisk(a, b);
          if (c !== 0) return c;
          return String(a.item.id || "").localeCompare(String(b.item.id || ""));
        })[0];
    }

    function rankForSlots(items, posted) {
      const skipped = skippedSet();
      const now = new Date();
      // short_url 必須・verified 必須をやめ、個別アプリURLを持つ draft/scheduled を広く対象にする。
      return items
        .filter(x => !skipped.has(String(x.id || "").trim()))
        .filter(x => !posted.has(String(x.id || "")))
        .filter(x => hasAppAndUrl(x))
        .map(x => ({ item: x, dt: parseDate(x) }))
        .sort((a, b) => {
          // upcoming scheduled first
          const aFuture = a.dt && a.dt >= now ? 0 : 1;
          const bFuture = b.dt && b.dt >= now ? 0 : 1;
          if (aFuture !== bFuture) return aFuture - bFuture;
          // then scheduled before unscheduled
          const aHasDt = a.dt ? 0 : 1;
          const bHasDt = b.dt ? 0 : 1;
          if (aHasDt !== bHasDt) return aHasDt - bHasDt;
          if (a.dt && b.dt && a.dt.getTime() !== b.dt.getTime()) return a.dt - b.dt;
          // verified を優先（除外はしない）→ 同条件は id 昇順
          const v = cmpVerifiedPref(a, b);
          if (v !== 0) return v;
          return String(a.item.id || "").localeCompare(String(b.item.id || ""));
        })
        .map(x => x.item);
    }

        skipBtn.addEventListener("click", () => {

          if (!id) return;
          sk.add(id);
          saveSkipped(sk);
          render();
        });
        actionsChildren.push(skipBtn);
      }

      actions.append(...actionsChildren);
      card.appendChild(actions);
      return card;
    }

    function renderSlots(items, posted) {

        if (aHas !== bHas) return aHas - bHas;

    async function loadUnexplored() {
      try {
        const res = await fetch(UNEXPLORED_PATH, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        unexploredCandidates = Array.isArray(data?.candidates) ? data.candidates : [];

    // unex候補 → 既存ロジックが扱える item オブジェクトへ変換
    // x_text は空のまま渡す（旧テンプレート format に落とさず、buildUnexPostText を使う想定）
    function synthesizeItemFromUnex(entry) {
      const app = String(entry?.app_name || "").trim();
      const url = String(entry?.url || "").trim();
      const shortUrl = String(entry?.short_url || "").trim();
      return {
        id: `unex-${entry?.rank || entry?.app_name || Math.random()}`,
        app_name: app,
        app_path: app,
        url: url,
        short_url: shortUrl,
        x_text: "",
        category_guess: entry?.genre_class || "",
        status: "draft",
        _isUnexploredOnly: true,
      };
    }

    // 未開拓候補が投稿に使える短縮URLを持つか判定
    // 必須条件:
    //  1. short_url が "/s/" 形式の短縮URL である
    //  2. candidate.url_verified === true（HTTP実在確認済み）
    // 日本語パスURL（例: https://nekopoke.jp/メルカリ.../）は **絶対に使わない**
    // 未デプロイURL（HTTP 404）も投稿対象外 → そうしないとXで「ページが見つかりません」になる
    function unexPostableShortUrl(candidate) {
      const su = String(candidate?.short_url || "").trim();
      if (!su) return "";
      if (!/\/s\//.test(su)) return "";
      if (candidate?.url_verified !== true) return ""; // 実在確認できないURLは投稿NG
      return su;
    }

    // 未開拓候補専用 投稿文テンプレート（既存 buildAppPostTemplate と同フォーマット）
    // 【今日のチェック】 / 空行 / hook / 空行 / description / 空行 / app_name / ↓　↓　↓ / URL
    // 短縮URL（/s/形式）が無い場合は null を返す（投稿不可）
    function buildUnexPostText(candidate) {
      const url = unexPostableShortUrl(candidate);
      if (!url) return null; // 投稿不可（呼び出し側でガード）
      const app = formatAppLineForPost(String(candidate?.app_name || ""));
      const hook = String(candidate?.hook || candidate?.angle || "").trim();
      const desc = String(candidate?.description || "").trim();
      const out = ["【今日のチェック】", "", hook];
      if (desc) out.push("", desc);
      out.push("", app, "↓　↓　↓", url);
      return out.join("\n");
    }

    function buildGenreItem(entry, kind) {
      // entry は queue item or unexplored candidate
      const isUnex = kind === "unex";
      const item = isUnex ? synthesizeItemFromUnex(entry) : entry;
      const url = String(item.url || "").trim();
      const shortUrl = String(item.short_url || "").trim();
      const isQueueItem = !isUnex;
      const posted = postedSet();
      const opsId = isUnex ? unexId(entry) : String(item.id || "").trim();
      const isPosted = !!opsId && (isUnex ? unexPostedSet().has(opsId) : posted.has(opsId));

      // 投稿可否判定:
      // - queue 由来: 既存と同じ（hasAppAndUrl で判定・日本語パスでも needsShortUrlForX 警告で投稿可）
      // - unex 由来: short_url が /s/ 形式の場合のみ投稿可（日本語パスURLは投稿不可）
      const unexShort = isUnex ? unexPostableShortUrl(entry) : "";
      const isPostable = isQueueItem ? hasAppAndUrl(item) : !!unexShort;
      // URLコピーに使う URL（投稿可否とは別。閲覧用は url を許可・なければ short）
      const copyableUrl = isUnex
        ? (unexShort || "")  // unex は /s/ 形式のみ・日本語パスは閲覧してもトップへ飛ぶので除外
        : (shortUrl || url);

      // 投稿文生成器: unex は buildUnexPostText / queue は既存 buildDashboardPostText
      const getPostText = () => {
        if (isUnex) return buildUnexPostText(entry); // 投稿不可なら null
        return buildDashboardPostText(item, true);

      const wrap = document.createElement("div");

          else if (entry?.url_verified !== true) tags.push(`⚠ 未デプロイ/未確認（${entry?.url_check_status || "unknown"}・投稿不可）`);
          else tags.push("⚠ 投稿不可");

      if (!isUnex && !shortUrl && !url) tags.push("URL未設定");
      if (typeof entry?.priority === "number") tags.push(`P${entry.priority}`);
      if (item?.sns_priority_score) tags.push(`score${item.sns_priority_score}`);
      if (isPosted) tags.push("投稿済み(local)");
      meta.textContent = tags.join(" / ");

          setTimeout(() => { copyTextBtn.textContent = "投稿文コピー"; }, 1200);

          ? "短縮URL（/s/形式）が未整備のため投稿不可。日本語パスURLは使えません。"
          : "URL未設定のため投稿不可";

      // Xを開く（投稿可能URL必須）
      const openXBtn = document.createElement("button");
      openXBtn.className = "gBtn gBtnOpen";
      openXBtn.textContent = "Xを開く";
      openXBtn.disabled = !isPostable;
      if (isPostable) {
        openXBtn.addEventListener("click", () => {
          const postText = getPostText();
          if (!postText) return; // unex で short_url 無の場合の safety
          if (isUnex) {
            // unex は短縮URLが /s/ 形式である前提・追加確認を簡素化
            const msg = `投稿前URL確認\n\nX投稿に入るURL:\n${unexShort}\n\nこの内容でX投稿画面を開きますか？`;
            if (!window.confirm(msg)) return;
          } else {
            const checkUrl = url;
            const xLine =
              checkUrl && hasAppAndUrl(item)
                ? (shortUrl || toXPostUrl(checkUrl))
                : (checkUrl || shortUrl);
            if (checkUrl) {
              const risky = needsShortUrlForX(item);
              let msg = hasAppAndUrl(item)
                ? `投稿前URL確認\n\n表示（ブラウザ用）:\n${checkUrl}\n\nX投稿に入るURL:\n${xLine}\n\nこの内容でX投稿画面を開きますか？`
                : `投稿前URL確認:\n${checkUrl}\n\nこのURLでX投稿画面を開きますか？`;
              if (risky) msg = `${msg}\n\n【警告】日本語パスで short_url がありません。Xでリンク欠損のリスクがあります。`;
              if (!window.confirm(msg)) return;
            }
          }
          openX(postText);
        });
      } else {
        openXBtn.title = isUnex
          ? "短縮URL（/s/形式）が未整備のため投稿不可"
          : "URL未設定のため投稿不可";
      }
      actions.appendChild(openXBtn);

      // URLコピー（投稿可能URLのみ・閲覧用 url は除外）
      const copyUrlBtn = document.createElement("button");
      copyUrlBtn.className = "gBtn";
      copyUrlBtn.textContent = "URLコピー";
      copyUrlBtn.disabled = !copyableUrl;
      if (copyableUrl) {
        copyUrlBtn.addEventListener("click", async () => {
          const ok = await copyText(copyableUrl);
          copyUrlBtn.textContent = ok ? "✓" : "✗";
          setTimeout(() => { copyUrlBtn.textContent = "URLコピー"; }, 1200);
        });
      } else {
        copyUrlBtn.title = isUnex
          ? "短縮URL未整備（日本語パスURLはコピーしません）"
          : "URL未設定";
      }
      actions.appendChild(copyUrlBtn);

      // 投稿済み / 今は出さない（queue & unex 両方）
      // 投稿不可（URL未確認等）でも候補リスト整理用に押下可能にする
      if (opsId) {
        const getPosted = () => isUnex ? unexPostedSet() : postedSet();
        const setPosted = (s) => isUnex ? saveUnexPosted(s) : savePosted(s);
        const getSkipped = () => isUnex ? unexSkippedSet() : skippedSet();
        const setSkipped = (s) => isUnex ? saveUnexSkipped(s) : saveSkipped(s);

        const doneBtn = document.createElement("button");
        doneBtn.className = "gBtn gBtnDone";
        doneBtn.textContent = isPosted ? "投稿済み(解除)" : "投稿済みにする";
        doneBtn.addEventListener("click", () => {
          const set = getPosted();
          if (set.has(opsId)) set.delete(opsId);
          else set.add(opsId);
          setPosted(set);
          render();
        });
        actions.appendChild(doneBtn);

        if (!isPosted) {
          const skipBtn = document.createElement("button");
          skipBtn.className = "gBtn gBtnSkip";
          skipBtn.textContent = "今は出さない";
          skipBtn.addEventListener("click", () => {
            const sk = getSkipped();
            sk.add(opsId);
            setSkipped(sk);
            render();
          });
          actions.appendChild(skipBtn);
        }
      }

      wrap.appendChild(actions);
      return wrap;
    }

    function getQueueByGenreClass(genre, posted, skipped) {
      const items = Array.isArray(nextCandidateItems) ? nextCandidateItems : [];
      return items
        .filter(x => x && x.status === "draft")
        .filter(x => !posted.has(String(x.id || "")))
        .filter(x => !skipped.has(String(x.id || "").trim()))
        .filter(x => (x.genre_class || "") === genre)
        .map(x => ({
          id: x.id,
          app_name: x.app_name,
          url: x.url,
          short_url: x.short_url,
          angle: x.x_text,
          genre_class: x.genre_class,
          sns_priority_score: x.sns_priority_score,
        }))
        .sort((a, b) => (b.sns_priority_score || 0) - (a.sns_priority_score || 0));
    }

    function getUnexploredByGenreClass(genre) {
      if (!Array.isArray(unexploredCandidates) || unexploredCandidates.length === 0) return [];
      const posted = unexPostedSet();
      const skipped = unexSkippedSet();
      return unexploredCandidates
        .filter(c => (c.genre_class || "") === genre)
        .filter(c => {
          const uid = unexId(c);
          return !uid || (!posted.has(uid) && !skipped.has(uid));
        })
        .sort((a, b) => (b.priority || 0) - (a.priority || 0));
    }

    function getAllUnexploredSorted() {
      if (!Array.isArray(unexploredCandidates) || unexploredCandidates.length === 0) return [];
      const posted = unexPostedSet();
      const skipped = unexSkippedSet();
      return [...unexploredCandidates]
        .filter(c => {
          const uid = unexId(c);
          return !uid || (!posted.has(uid) && !skipped.has(uid));
        })
        .sort((a, b) => (b.priority || 0) - (a.priority || 0));
    }

    function renderGenreTabs() {
      genreTabsEl.innerHTML = "";
      // タブは GENRE_SECTION_DEFS から自動生成（DRY 化）
      // - 先頭に "all" を固定追加
      // - label 末尾の「枠」だけ削ってコンパクト化（中間の「枠」は維持）
      const tabs = [
        { key: "all", label: "🌟 おすすめTOP" },
        ...GENRE_SECTION_DEFS.map(d => ({
          key: d.key,
          label: (d && typeof d.label === "string"
            ? d.label.replace(/枠$/, "")
            : String(d && d.key || ""))
        })),
      ];
      for (const t of tabs) {
        const b = document.createElement("button");
        b.className = "genreTab" + (activeGenreTab === t.key ? " active" : "");
        b.textContent = t.label;
        b.addEventListener("click", () => {
          activeGenreTab = t.key;
          try { localStorage.setItem(GENRE_TAB_KEY, t.key); } catch {}
          renderGenreMode();
        });
        genreTabsEl.appendChild(b);
      }
    }

    function renderGenreMode() {
      renderGenreTabs();
      genreSectionsEl.innerHTML = "";
      const posted = postedSet();
      const skipped = skippedSet();

      const renderOneSection = (def) => {
        const sec = document.createElement("div");
        sec.className = "genreSection " + def.cls;
        const h = document.createElement("h3");
        h.textContent = def.label;
        sec.appendChild(h);
        const list = document.createElement("div");
        list.className = "genreList";

        let items = [];
        if (def.key === "unexplored") {
          items = getAllUnexploredSorted();
        } else {
          // queue (draft) と unexplored の両方から該当 genre_class を集める
          const q = getQueueByGenreClass(def.key, posted, skipped);
          const u = getUnexploredByGenreClass(def.key);
          // queue を優先表示 → 未開拓 で補完
          items = [
            ...q.map(x => ({ ...x, _kind: "queue" })),
            ...u.map(x => ({ ...x, _kind: "unex" })),
          ];
        }
        items = items.slice(0, def.limit);
        if (items.length === 0) {
          const e = document.createElement("div");
          e.className = "genreEmpty";
          e.textContent = "（候補なし）";
          list.appendChild(e);
        } else {
          for (const it of items) {
            list.appendChild(buildGenreItem(it, it._kind || (def.key === "unexplored" ? "unex" : "queue")));
          }
        }
        sec.appendChild(list);
        genreSectionsEl.appendChild(sec);
      };

      if (activeGenreTab === "all") {
        for (const def of GENRE_SECTION_DEFS) renderOneSection(def);
      } else {
        const def = GENRE_SECTION_DEFS.find(d => d.key === activeGenreTab);
        if (def) renderOneSection(def);
      }
    }
    // ---- end マンネリ打破モード ----

    function render() {
      const posted = postedSet();
      const shown = scheduledItems.filter(x => String(x.scheduled_at || "").startsWith(targetDate));
      const nextInfo = pickNextUnposted(nextCandidateItems, posted);
      const absoluteNext = pickNextPost(scheduledItems);
      const fallback = targetDate !== ymdJst(new Date());
      const allPosted = scheduledItems.length > 0 && scheduledItems.every(x => posted.has(String(x.id || "")));
      const riskyShortMissing = visibleActiveCandidateItems().filter((x) => needsShortUrlForX(x)).length;
      renderMeta(absoluteNext);
      renderNotice(fallback, allPosted, riskyShortMissing);
      renderGenreMode();
      renderHero(nextInfo ? nextInfo.item : null, posted);
      renderSlots(shown, posted);
      renderStatsSummary();
    }

    async function load() {
      try {
        await loadUnexplored();
        const res = await fetch(QUEUE_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("sns_queue.json is not array");

        scheduledItems = data
          .filter(x => x && x.status === "scheduled" && x.scheduled_at)
          .sort((a, b) => String(a.scheduled_at).localeCompare(String(b.scheduled_at)));
        nextCandidateItems = data.filter(
          x => x && (x.status === "scheduled" || x.status === "draft")
        );

        if (!globalThis.crypto?.subtle) {
          noticeEl.textContent = "この環境では Web Crypto が使えません（https または localhost で開いてください）。";
        } else {
          for (const x of data) {
            if (!x || (x.status !== "draft" && x.status !== "scheduled")) continue;
            delete x._hookCached;
            x._hookCached = await resolveHookForItem(x);
          }
        }

        const picked = decideDisplayDate(scheduledItems);
        targetDate = picked.date;
        render();
      } catch (err) {
        noticeEl.textContent = `読み込み失敗: ${err.message}`;
        heroEl.innerHTML = `<div class="slotEmpty">ローカルサーバー経由で開いてください（file:// は不可）。</div>`;
        slotsEl.innerHTML = "";
        if (statsBodyEl) {
          statsBodyEl.textContent = "読み込み失敗のため集計できません。";
        }
        if (statsOrphanEl) {
          statsOrphanEl.hidden = true;
          statsOrphanEl.textContent = "";
        }
        if (statsRefillHintEl) {
          statsRefillHintEl.hidden = true;
          statsRefillHintEl.textContent = "";
        }
      }
    }

    reloadBtn.addEventListener("click", load);
    resetPostedBtn.addEventListener("click", () => {
      localStorage.removeItem(POSTED_KEY);
      render();
    });
    copyMarkPostedCmdBtn.addEventListener("click", async () => {
      const ids = idsForMarkPostedSync();
      if (ids.length === 0) {
        window.alert("投稿済みにした候補がありません");
        return;
      }
      const text = buildMarkPostedPowerShellCommands();
      const ok = await copyText(text);
      copyMarkPostedCmdBtn.innerHTML = ok
        ? `${icon("check")}<span>コピー完了</span>`
        : `${icon("copy")}<span>コピー失敗</span>`;
      setTimeout(() => {
        copyMarkPostedCmdBtn.innerHTML = `${icon("copy")}<span>投稿済み反映コマンドをコピー</span>`;
      }, 1500);
    });

    copyMarkArchivedCmdBtn.addEventListener("click", async () => {
      const ids = idsForArchivedNotForNowSync();
      if (ids.length === 0) {
        window.alert("今は出さない候補がありません");
        return;
      }
      const text = buildArchivedNotForNowPowerShellCommands();
      const ok = await copyText(text);
      copyMarkArchivedCmdBtn.innerHTML = ok
        ? `${icon("check")}<span>コピー完了</span>`
        : `${icon("copy")}<span>コピー失敗</span>`;
      setTimeout(() => {
        copyMarkArchivedCmdBtn.innerHTML = `${icon("copy")}<span>今は出さない反映コマンドをコピー</span>`;
      }, 1500);
    });

    reloadBtn.classList.add("withIcon");
    reloadBtn.innerHTML = `${icon("refresh")}<span>再読み込み</span>`;
    resetPostedBtn.classList.add("withIcon");
    resetPostedBtn.innerHTML = `${icon("reset")}<span>投稿済みローカル状態をリセット</span>`;
    copyMarkPostedCmdBtn.classList.add("withIcon");
    copyMarkPostedCmdBtn.innerHTML = `${icon("copy")}<span>投稿済み反映コマンドをコピー</span>`;
    copyMarkArchivedCmdBtn.classList.add("withIcon");
    copyMarkArchivedCmdBtn.innerHTML = `${icon("copy")}<span>今は出さない反映コマンドをコピー</span>`;

    load();
  </script>
</body>
