<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X投稿ダッシュボード</title>
  <style>
    :root {
      --bg: #0a1020;
      --bg2: #101b33;
      --panel: #121c34;
      --line: #2b3b60;
      --text: #e9f1ff;
      --muted: #9caed3;
      --accent: #4ea3ff;
      --ok: #38c785;
      --warn: #ffcf65;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(1100px 700px at 0% -10%, #1a2b4a 0, var(--bg) 55%);
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    h1 { margin: 0; font-size: 30px; letter-spacing: .02em; }
    .meta {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--bg2), #0f1830);
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .metaTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .big {
      font-size: 24px;
      font-weight: 800;
      color: var(--warn);
    }
    .sub { color: var(--muted); font-size: 14px; }
    .notice {
      color: #b6cbef;
      background: #15213e;
      border: 1px solid #2d406d;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #1b2b4f;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    .urlXHint {
      margin-top: 6px;
      font-size: 12px;
      color: #9bb3d9;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .withIcon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .withIcon svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .btnMini { padding: 6px 9px; font-size: 12px; }
    .hero {
      border: 1px solid #3865a8;
      background: linear-gradient(180deg, #16305d, #14284d);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .heroTitle { font-size: 18px; font-weight: 800; color: #b8d8ff; }
    .slots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), #0f1830);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .card.posted {
      opacity: .62;
      filter: grayscale(.18);
    }
    .slot {
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
    }
    .pillRow {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #13213f;
      padding: 3px 8px;
    }
    .name { font-size: 18px; font-weight: 800; line-height: 1.4; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
      background: #0c1428;
      border: 1px solid #243960;
      border-radius: 10px;
      padding: 10px;
      word-break: break-word;
    }
    .url {
      color: #9ad1ff;
      font-size: 12px;
      word-break: break-all;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .btnCopy { background: #1f5f4b; border-color: #2a8b6e; }
    .btnOpen { background: #225aa9; border-color: #2e70cc; }
    .btnDone { background: #694b76; border-color: #9c73af; }
    .slotEmpty {
      border: 1px dashed #3a4f79;
      color: var(--muted);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      min-height: 70px;
      display: grid;
      place-items: center;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AIエージェント本部 / X投稿ダッシュボード</h1>

    <section class="meta">
      <div class="metaTop">
        <div>
          <div class="big" id="displayDate">表示中の日付: ----</div>
          <div class="sub" id="nextPost">次の投稿予定: ----</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="reloadBtn" type="button">再読み込み</button>
          <button id="resetPostedBtn" class="btnMini" type="button">投稿済みローカル状態をリセット</button>
        </div>
      </div>
      <div class="notice" id="noticeText">読み込み中...</div>
    </section>

    <section class="hero" id="hero"></section>
    <section class="slots" id="slots"></section>
  </div>

  <script>
    const QUEUE_PATH = "./sns_queue.json";
    const POSTED_KEY = "x_dashboard_posted_ids_v2";
    const SLOT_DEFS = [
      { key: "08:00", label: "朝 08:00" },
      { key: "12:30", label: "昼 12:30" },
      { key: "20:30", label: "夜 20:30" },
    ];

    const displayDateEl = document.getElementById("displayDate");
    const nextPostEl = document.getElementById("nextPost");
    const noticeEl = document.getElementById("noticeText");
    const heroEl = document.getElementById("hero");
    const slotsEl = document.getElementById("slots");
    const reloadBtn = document.getElementById("reloadBtn");
    const resetPostedBtn = document.getElementById("resetPostedBtn");

    let scheduledItems = [];
    let nextCandidateItems = [];
    let targetDate = "";

    function ymdJst(date = new Date()) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(date);
    }

    function fmtJst(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(date).replace(/\//g, "-");
    }

    function icon(name) {
      const map = {
        refresh: '<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
        reset: '<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>',
        calendar: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
        clock: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg>',
        copy: '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/></svg>',
        external: '<svg viewBox="0 0 24 24"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7H3V3h7"/></svg>',
        check: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/></svg>',
      };
      return map[name] || "";
    }

    function parseDate(item) {
      const dt = new Date(String(item.scheduled_at || ""));
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function postedSet() {
      try {
        const raw = localStorage.getItem(POSTED_KEY);
        const arr = JSON.parse(raw || "[]");
        return new Set(Array.isArray(arr) ? arr : []);
      } catch {
        return new Set();
      }
    }

    function savePosted(set) {
      localStorage.setItem(POSTED_KEY, JSON.stringify([...set]));
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        return false;
      }
    }

    /**
     * X向けにパスの各セグメントを decode→encode で1回だけ正規化（二重エンコード防止）。
     */
    function toXPostUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return "";
      try {
        const u = new URL(value);
        const path = u.pathname || "/";
        if (path === "/" || path === "") {
          return `${u.origin}/${u.search}`;
        }
        const segments = path.split("/").filter(Boolean);
        const encodedSegs = segments.map((seg) => {
          try {
            return encodeURIComponent(decodeURIComponent(seg));
          } catch {
            return encodeURIComponent(seg);
          }
        });
        const trailing = path.endsWith("/") ? "/" : "";
        const newPath = "/" + encodedSegs.join("/") + trailing;
        return `${u.origin}${newPath}${u.search}`;
      } catch {
        return value;
      }
    }

    /** ダッシュボード本文・コピー・Xインテント共通の末尾URL（short_url があれば常にそれを優先）。 */
    function postUrlLine(item, forX) {
      const short = String(item?.short_url || "").trim();
      if (short) return short;
      const displayUrl = String(item?.url || "").trim();
      if (!displayUrl) return "";
      return forX ? (toXPostUrl(displayUrl) || displayUrl) : displayUrl;
    }

    function buildTweetText(item, opts = {}) {
      const useX = opts.forX === true;
      const base = String(item?.x_text || "").trim();
      const short = String(item?.short_url || "").trim();
      const raw = String(item?.url || "").trim();
      const postUrl = short
        ? short
        : raw
          ? (useX ? (toXPostUrl(raw) || raw) : raw)
          : "";
      if (!postUrl) return base;
      let merged = base;
      if (raw && postUrl && raw !== postUrl && merged.includes(raw)) {
        merged = merged.split(raw).join(postUrl);
      }
      if (merged.includes(postUrl)) return merged;
      return merged ? `${merged}\n\n${postUrl}` : postUrl;
    }

    function isRiskTopic(item) {
      const text = [
        String(item?.app_name || ""),
        String(item?.category_guess || ""),
        String(item?.category || ""),
        String(item?.x_text || ""),
        String(item?.url || ""),
      ].join(" ").toLowerCase();
      return /(保険|税|住民税|手取り|家計|お金|ローン|投資|医療|健康|法律|退去費用)/.test(text);
    }

    function trimAppSuffix(name) {
      return String(name || "")
        .replace(/アプリ$/u, "")
        .replace(/ツール$/u, "")
        .trim();
    }

    function pickHook(item) {
      const app = String(item?.app_name || "").trim();
      if (app === "16bitマップタイルプロンプトジェネレーター") {
        return "レトロゲームのマップ、雰囲気づくりで止まりがち。";
      }
      if (/退去費用|シミュレーター/u.test(app)) {
        return "退去費用、最後にドンと来る前に。";
      }
      if (/家計|節約|生活費|手取り|住民税/u.test(app)) {
        return "家計の見直し、どこから触るか迷う。";
      }
      if (/保険|補償/u.test(app)) {
        return "保険、必要なところだけ見直したい。";
      }
      if (/プロンプトジェネレーター/u.test(app)) {
        return "作業素材づくり、毎回ゼロから考えるの重い。";
      }
      if (/チェッカー/u.test(app)) {
        return "見落とし、あとで気づく前に潰したい。";
      }
      if (/計算アプリ/u.test(app)) {
        return "手計算で迷う前に、まず1回。";
      }
      if (/診断/u.test(app)) {
        return "いまの状況、ざっくり掴んでおきたい。";
      }
      return "気になるところ、先に1分で整理。";
    }

    function pickDescription(item) {
      const app = String(item?.app_name || "").trim();
      if (app === "16bitマップタイルプロンプトジェネレーター") {
        return "ドット絵・RPG風・街・森・洞窟などのマップタイル案を作る時のプロンプト補助に使えます。";
      }
      if (/プロンプトジェネレーター/u.test(app)) {
        const base = app.replace(/プロンプトジェネレーター/u, "").trim() || app;
        return `${base}の案出しで詰まった時、最初のたたき台を短時間で作るのに使えます。`;
      }
      if (/シミュレーター/u.test(app)) {
        const base = app.replace(/シミュレーター/u, "").trim() || app;
        return `${base}の見込みを先に置いて、準備漏れを減らしたい場面で使えます。`;
      }
      if (/チェッカー/u.test(app)) {
        const base = app.replace(/チェッカー/u, "").trim() || app;
        return `${base}の抜け漏れ確認を、短時間で回したい時に使えます。`;
      }
      if (/計算アプリ/u.test(app)) {
        const base = app.replace(/計算アプリ/u, "").trim() || app;
        return `${base}を手元でさっと試算して、次の判断を早めるのに便利です。`;
      }
      if (/診断/u.test(app)) {
        const base = trimAppSuffix(app.replace(/診断/u, "").trim() || app);
        return `${base}の現状をざっくり把握して、次に確認すべき点を絞るのに使えます。`;
      }
      return "気になるポイントを先に整理して、次の行動を決めやすくする用途で使えます。";
    }

    function fitTweetLength(text, fallbackUrl) {
      const hardLimit = 280;
      if (text.length <= hardLimit) return text;
      const url = String(fallbackUrl || "").trim();
      const keep = url ? `\n\n${url}` : "";
      const tailLimit = hardLimit - keep.length;
      if (tailLimit <= 0) return (url || "").slice(0, hardLimit);
      const head = text.slice(0, tailLimit - 1).trimEnd();
      return `${head}…${keep}`;
    }

    /**
     * @param {boolean} forX true のとき本文末尾URLは X で途切れにくい percent 形式。表示用は false。
     */
    function buildDashboardPostText(item, forX = false) {
      const urlLine = postUrlLine(item, forX);
      const fitUrl = urlLine;

      if (hasAppAndUrl(item)) {
        const hook = pickHook(item);
        const app = String(item.app_name || "").trim();
        const desc = pickDescription(item);
        const out = [hook, "", app, "", desc, "", urlLine];
        if (isRiskTopic(item)) out.push("", "※参考・確認用です");
        return fitTweetLength(out.join("\n"), fitUrl);
      }
      return fitTweetLength(buildTweetText(item, { forX }), fitUrl);
    }

    function guessNameFromUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return "";
      try {
        const u = new URL(value);
        if (!/^(www\.)?nekopoke\.jp$/i.test(u.hostname)) return "";
        const path = (u.pathname || "/").replace(/\/+$/, "");
        if (!path || path === "/") return "ネコポケ";
        const last = path.split("/").filter(Boolean).pop();
        if (!last) return "ネコポケ";
        return decodeURIComponent(last);
      } catch {
        return "";
      }
    }

    function displayName(item) {
      const app = String(item?.app_name || "").trim();
      if (app) return app;
      const title = String(item?.title || "").trim();
      if (title) return title;
      return guessNameFromUrl(item?.url) || "ネコポケ投稿";
    }

    function openX(text) {
      const url = "https://x.com/intent/tweet?text=" + encodeURIComponent(text);
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function decideDisplayDate(items) {
      const today = ymdJst(new Date());
      const days = [...new Set(items.map(x => String(x.scheduled_at || "").slice(0, 10)))].sort();
      if (days.includes(today)) return { date: today, fallback: false };
      const next = days.find(d => d >= today);
      if (next) return { date: next, fallback: true };
      return { date: days[0] || today, fallback: true };
    }

    function pickNextPost(items) {
      const now = new Date();
      const all = items
        .map(x => ({ item: x, dt: parseDate(x) }))
        .filter(x => x.dt)
        .sort((a, b) => a.dt - b.dt);
      const upcoming = all.find(x => x.dt >= now);
      return (upcoming || all[0] || null);
    }

    function isTopNekopokeUrl(rawUrl) {
      const value = String(rawUrl || "").trim();
      if (!value) return false;
      return /^https?:\/\/(www\.)?nekopoke\.jp\/?$/i.test(value);
    }

    function hasAppAndUrl(item) {
      const app = String(item?.app_name || "").trim();
      const url = String(item?.url || "").trim();
      if (!app || !url) return false;
      if (app === "ネコポケ" || app === "ネコポケ投稿") return false;
      return !isTopNekopokeUrl(url);
    }

    function isUrlVerified(item) {
      if (!hasAppAndUrl(item)) return true;
      if (item?.url_verified_public === true) return true;
      if (String(item?.url_check_status_public || "") === "verified_public") return true;
      if (item?.url_verified === true) return true;
      return String(item?.url_check_status || "") === "verified";
    }

    function pickNextUnposted(items, posted) {
      const now = new Date();
      const all = items
        .filter(x => !posted.has(String(x.id || "")))
        .filter(x => isUrlVerified(x))
        .map(x => ({ item: x, dt: parseDate(x) }));

      if (all.length === 0) return null;

      // Prefer concrete app posts whenever at least one exists.
      const preferred = all.filter(x => hasAppAndUrl(x.item));
      const pool = preferred.length > 0 ? preferred : all;

      const withUpcomingDt = pool
        .filter(x => x.dt && x.dt >= now)
        .sort((a, b) => a.dt - b.dt);
      if (withUpcomingDt.length > 0) return withUpcomingDt[0];

      const withAnyDt = pool.filter(x => x.dt).sort((a, b) => a.dt - b.dt);
      if (withAnyDt.length > 0) return withAnyDt[0];

      return pool
        .slice()
        .sort((a, b) => String(a.item.id || "").localeCompare(String(b.item.id || "")))[0];
    }

    function renderHero(item, posted) {
      heroEl.innerHTML = "";
      if (!item) {
        heroEl.innerHTML = `<div class="slotEmpty">今日/次回の予定はすべて投稿済みです。</div>`;
        return;
      }
      const isPosted = posted.has(String(item.id || ""));
      const card = buildCard({ key: "next", label: "次に投稿する1件" }, item, isPosted, true);
      heroEl.appendChild(card);
    }

    function buildCard(slot, item, isPosted, hero = false) {
      const card = document.createElement("article");
      card.className = "card";
      if (isPosted) card.classList.add("posted");

      const slotEl = document.createElement("div");
      slotEl.className = "slot";
      slotEl.textContent = slot.label;
      card.appendChild(slotEl);

      const row = document.createElement("div");
      row.className = "pillRow";
      row.innerHTML = `
        <span class="pill">scheduled_at: ${item.scheduled_at || "-"}</span>
        <span class="pill">category: ${item.category_guess || "-"}</span>
        <span class="pill">status: ${isPosted ? "posted(local)" : (item.status || "-")}</span>
      `;
      card.appendChild(row);

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = displayName(item);
      card.appendChild(name);

      const text = document.createElement("pre");
      text.textContent = buildDashboardPostText(item, false);
      card.appendChild(text);

      const url = document.createElement("div");
      url.className = "url";
      const displayLine = document.createElement("div");
      displayLine.textContent = item.url ? `表示URL: ${item.url}` : "";
      url.appendChild(displayLine);
      if (item.url && hasAppAndUrl(item)) {
        const xLine = document.createElement("div");
        xLine.className = "urlXHint";
        const postHint = String(item.short_url || "").trim() || toXPostUrl(item.url);
        xLine.textContent = `X投稿用URL: ${postHint}`;
        url.appendChild(xLine);
      }
      card.appendChild(url);

      const actions = document.createElement("div");
      actions.className = "actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "btnCopy withIcon";
      copyBtn.type = "button";
      copyBtn.innerHTML = `${icon("copy")}<span>投稿文コピー</span>`;
      copyBtn.addEventListener("click", async () => {
        const ok = await copyText(buildDashboardPostText(item, true));
        copyBtn.innerHTML = ok ? `${icon("check")}<span>コピー完了</span>` : `${icon("copy")}<span>コピー失敗</span>`;
        setTimeout(() => { copyBtn.innerHTML = `${icon("copy")}<span>投稿文コピー</span>`; }, 1200);
      });

      const openBtn = document.createElement("button");
      openBtn.className = "btnOpen withIcon";
      openBtn.type = "button";
      openBtn.innerHTML = `${icon("external")}<span>Xを開く</span>`;
      openBtn.addEventListener("click", () => {
        const postText = buildDashboardPostText(item, true);
        const checkUrl = String(item?.url || "").trim();
        const xLine =
          checkUrl && hasAppAndUrl(item)
            ? (String(item?.short_url || "").trim() || toXPostUrl(checkUrl))
            : checkUrl;
        if (checkUrl) {
          const msg = hasAppAndUrl(item)
            ? `投稿前URL確認\n\n表示（ブラウザ用）:\n${checkUrl}\n\nX投稿に入るURL:\n${xLine}\n\nこの内容でX投稿画面を開きますか？`
            : `投稿前URL確認:\n${checkUrl}\n\nこのURLでX投稿画面を開きますか？`;
          const ok = window.confirm(msg);
          if (!ok) return;
        }
        openX(postText);
      });

      const doneBtn = document.createElement("button");
      doneBtn.className = "btnDone withIcon";
      doneBtn.type = "button";
      doneBtn.innerHTML = isPosted
        ? `${icon("check")}<span>投稿済み(解除)</span>`
        : `${icon("check")}<span>投稿済みにする</span>`;
      doneBtn.addEventListener("click", () => {
        const set = postedSet();
        const id = String(item.id || "");
        if (set.has(id)) set.delete(id);
        else set.add(id);
        savePosted(set);
        render();
      });

      actions.append(copyBtn, openBtn, doneBtn);
      card.appendChild(actions);
      return card;
    }

    function renderSlots(items, posted) {
      slotsEl.innerHTML = "";
      const bySlot = SLOT_DEFS.map(slot => {
        const it = items.find(x => String(x.scheduled_at || "").includes(`T${slot.key}:`));
        return { slot, item: it };
      });

      bySlot.sort((a, b) => {
        const aHas = a.item ? 0 : 1;
        const bHas = b.item ? 0 : 1;
        if (aHas !== bHas) return aHas - bHas;
        return a.slot.key.localeCompare(b.slot.key);
      });

      for (const row of bySlot) {
        if (!row.item) {
          const e = document.createElement("div");
          e.className = "slotEmpty";
          e.textContent = `${row.slot.label}: 予定なし`;
          slotsEl.appendChild(e);
          continue;
        }
        const isPosted = posted.has(String(row.item.id || ""));
        slotsEl.appendChild(buildCard(row.slot, row.item, isPosted, false));
      }
    }

    function renderNotice(fallback, allPosted) {
      if (allPosted) {
        noticeEl.textContent = "今日/次回の予定はすべて投稿済みです。必要なら「投稿済み(解除)」で戻せます。";
        return;
      }
      if (fallback) {
        noticeEl.textContent = "今日の予定がありません。次の投稿予定日を表示中です。";
      } else {
        noticeEl.textContent = "今日の投稿予定を表示中です。上から順にコピーしてXへ貼り付けてください。";
      }
    }

    function renderMeta(nextInfo) {
      displayDateEl.classList.add("withIcon");
      displayDateEl.innerHTML = `${icon("calendar")}<span>表示中の日付: ${targetDate}</span>`;
      if (!nextInfo) {
        nextPostEl.classList.add("withIcon");
        nextPostEl.innerHTML = `${icon("clock")}<span>次の投稿予定: なし</span>`;
      } else {
        nextPostEl.classList.add("withIcon");
        nextPostEl.innerHTML = `${icon("clock")}<span>次の投稿予定: ${fmtJst(nextInfo.dt)}</span>`;
      }
    }

    function render() {
      const posted = postedSet();
      const shown = scheduledItems.filter(x => String(x.scheduled_at || "").startsWith(targetDate));
      const nextInfo = pickNextUnposted(nextCandidateItems, posted);
      const absoluteNext = pickNextPost(scheduledItems);
      const fallback = targetDate !== ymdJst(new Date());
      const allPosted = scheduledItems.length > 0 && scheduledItems.every(x => posted.has(String(x.id || "")));
      renderMeta(absoluteNext);
      renderNotice(fallback, allPosted);
      renderHero(nextInfo ? nextInfo.item : null, posted);
      renderSlots(shown, posted);
    }

    async function load() {
      try {
        const res = await fetch(QUEUE_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("sns_queue.json is not array");

        scheduledItems = data
          .filter(x => x && x.status === "scheduled" && x.scheduled_at)
          .sort((a, b) => String(a.scheduled_at).localeCompare(String(b.scheduled_at)));
        nextCandidateItems = data.filter(
          x => x && (x.status === "scheduled" || x.status === "draft")
        );

        const picked = decideDisplayDate(scheduledItems);
        targetDate = picked.date;
        render();
      } catch (err) {
        noticeEl.textContent = `読み込み失敗: ${err.message}`;
        heroEl.innerHTML = `<div class="slotEmpty">ローカルサーバー経由で開いてください（file:// は不可）。</div>`;
        slotsEl.innerHTML = "";
      }
    }

    reloadBtn.addEventListener("click", load);
    resetPostedBtn.addEventListener("click", () => {
      localStorage.removeItem(POSTED_KEY);
      render();
    });

    reloadBtn.classList.add("withIcon");
    reloadBtn.innerHTML = `${icon("refresh")}<span>再読み込み</span>`;
    resetPostedBtn.classList.add("withIcon");
    resetPostedBtn.innerHTML = `${icon("reset")}<span>投稿済みローカル状態をリセット</span>`;

    load();
  </script>
</body>
</html>
