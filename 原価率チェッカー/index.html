<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原価率チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>原価率チェッカー</h1>

    <div class="card">
      <h2>商品を登録</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：コーヒー豆A">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="costPrice">仕入れ値（円）</label>
          <input type="number" id="costPrice" placeholder="例：500" min="0">
        </div>
        <div class="form-group">
          <label for="sellPrice">売価（円）</label>
          <input type="number" id="sellPrice" placeholder="例：1000" min="0">
        </div>
      </div>
      <button class="btn-primary" onclick="addProduct()">登録する</button>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none">
      <span id="summaryText"></span>
    </div>

    <div class="list-header" id="listHeader" style="display:none">
      <span class="item-count" id="itemCount"></span>
      <div class="sort-buttons">
        <span>並び替え：</span>
        <button class="btn-sort" onclick="sortBy('name')">商品名</button>
        <button class="btn-sort" onclick="sortBy('costRate')">原価率</button>
        <button class="btn-sort" onclick="sortBy('profit')">利益率</button>
      </div>
    </div>

    <div id="productList"></div>

    <p class="empty-msg" id="emptyMsg">商品を登録してください</p>

    <div class="legend" id="legend" style="display:none">
      <span class="badge badge-danger">●</span> 利益率30%未満（要注意）
      <span class="badge badge-warning" style="margin-left:12px">●</span> 利益率30〜50%
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
