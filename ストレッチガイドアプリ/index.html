<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレッチガイド</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>🧘 ストレッチガイド</h1>
    <p class="subtitle">部位を選んでストレッチを確認しよう</p>
  </header>

  <main>
    <!-- 部位選択 -->
    <section class="part-selector">
      <h2>部位を選ぶ</h2>
      <div class="part-buttons">
        <button class="part-btn active" data-part="neck">首</button>
        <button class="part-btn" data-part="shoulder">肩</button>
        <button class="part-btn" data-part="back">背中</button>
        <button class="part-btn" data-part="waist">腰</button>
        <button class="part-btn" data-part="leg">脚</button>
        <button class="part-btn" data-part="whole">全身</button>
      </div>
    </section>

    <!-- ストレッチメニュー -->
    <section class="stretch-menu">
      <h2 id="menu-title">首のストレッチ</h2>
      <div id="stretch-list" class="stretch-list"></div>
    </section>
  </main>

  <!-- お気に入りモーダル -->
  <div id="favorites-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⭐ お気に入り</h2>
        <button id="close-modal" class="close-btn">✕</button>
      </div>
      <div id="favorites-list" class="stretch-list"></div>
      <p id="no-favorites" class="no-items hidden">お気に入りはまだありません</p>
    </div>
  </div>

  <!-- フローティングボタン -->
  <button id="favorites-btn" class="fab" title="お気に入り">⭐</button>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
