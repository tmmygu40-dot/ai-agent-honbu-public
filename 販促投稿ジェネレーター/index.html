<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販促投稿ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .post-item {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 11px;
      padding: 0.9rem 1rem; margin-bottom: 0.8rem;
    }
    .post-item:last-child { margin-bottom: 0; }
    .post-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
    }
    .post-tag {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.05em;
    }
    .btn-copy {
      padding: 0.35rem 0.7rem; font-size: 0.75rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      border-radius: 7px; cursor: pointer;
    }
    .btn-copy.done { background: var(--ok); }
    .post-body {
      font-size: 0.92rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>販促投稿ジェネレーター</h1>
    <p class="subtitle">業種・商品・キャンペーンを選ぶだけで集客SNS投稿文を即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="industry">業種</label>
      <select id="industry">
        <option value="飲食店">飲食店</option>
        <option value="美容室">美容室</option>
        <option value="小売店">小売店</option>
        <option value="整体・整骨院">整体・整骨院</option>
        <option value="学習塾">学習塾</option>
        <option value="ジム・フィットネス">ジム・フィットネス</option>
        <option value="ネットショップ">ネットショップ</option>
        <option value="カフェ">カフェ</option>
      </select>
    </div>
    <div class="field">
      <label for="product">商品・サービス名</label>
      <input type="text" id="product" placeholder="例: 新作パスタ / カット＋カラー">
    </div>
    <div class="field">
      <label for="campaign">キャンペーン種類</label>
      <select id="campaign">
        <option value="新商品">新商品・新メニュー</option>
        <option value="割引">期間限定割引</option>
        <option value="セール">セール</option>
        <option value="ポイント還元">ポイント還元</option>
        <option value="先着特典">先着特典</option>
        <option value="季節">季節・イベント</option>
        <option value="新規">新規お客様向け</option>
        <option value="再来">リピーター向け</option>
      </select>
    </div>
    <div class="field">
      <label for="detail">補足（任意）</label>
      <input type="text" id="detail" placeholder="例: 20%OFF / 先着10名">
    </div>
  </div>

  <button class="btn-calc" onclick="gen()">投稿文を生成する</button>

  <div class="card" id="resultCard" style="display:none">
    <p class="card-title">生成結果（3パターン）</p>
    <div id="posts"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、SNS販促で一般的に使われる投稿パターンを参考に、テンプレート形式で投稿文を組み立てています。最終的な文面はご自身でご確認の上ご利用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEY = 'hansoku_gen_v1';

  function tones() {
    return ['friendly', 'urgent', 'informative'];
  }

  function build(industry, product, campaign, detail, tone) {
    var p = product || 'おすすめ商品';
    var d = detail ? '（' + detail + '）' : '';
    var camp = {
      '新商品':   { tag: '新登場', body: '新登場！', cta: 'ぜひお試しください✨' },
      '割引':     { tag: '期間限定', body: '期間限定でおトク！', cta: 'この機会をお見逃しなく🔥' },
      'セール':   { tag: 'SALE', body: 'セール開催中！', cta: '在庫なくなり次第終了🛒' },
      'ポイント還元': { tag: 'ポイントUP', body: 'ポイント還元中！', cta: '今がチャンス💰' },
      '先着特典': { tag: '先着特典', body: '先着特典あり！', cta: 'お早めにどうぞ🎁' },
      '季節':     { tag: '季節限定', body: 'この季節だけの特別なご提案🍃', cta: '今だけの味わいをぜひ' },
      '新規':     { tag: '初回限定', body: '初めての方に嬉しい特典✨', cta: 'お気軽にお立ち寄りください' },
      '再来':     { tag: 'リピーター様', body: 'いつもありがとうございます！', cta: 'またのご来店お待ちしております😊' }
    }[campaign] || { tag: 'お知らせ', body: 'ご案内', cta: 'ぜひどうぞ' };

    var hashIndustry = '#' + industry.replace(/[・\s]/g, '');
    var hashCamp = '#' + (campaign === 'ポイント還元' ? 'ポイント還元' : campaign);
    var hashtags = hashIndustry + ' #' + p.replace(/[・\s]/g, '') + ' ' + hashCamp + ' #おすすめ';

    if (tone === 'friendly') {
      return '【' + camp.tag + '】' + industry + 'より、\n' +
             p + ' ' + camp.body + d + '\n\n' +
             camp.cta + '\n' +
             '皆さまのお越しをお待ちしております🌿\n\n' +
             hashtags;
    }
    if (tone === 'urgent') {
      return '⚡️' + camp.tag + '⚡️\n' +
             p + ' が ' + camp.body.replace('！', '') + d + '！\n\n' +
             '👉 ' + camp.cta + '\n' +
             '見逃し厳禁です！\n\n' +
             hashtags;
    }
    return '[' + camp.tag + ' / ' + industry + ']\n' +
           '■ 対象: ' + p + '\n' +
           '■ 内容: ' + camp.body.replace('！', '') + (detail ? ' ' + detail : '') + '\n' +
           '■ ご案内: ' + camp.cta + '\n\n' +
           hashtags;
  }

  function gen() {
    var industry = document.getElementById('industry').value;
    var product  = document.getElementById('product').value.trim();
    var campaign = document.getElementById('campaign').value;
    var detail   = document.getElementById('detail').value.trim();

    try {
      localStorage.setItem(KEY, JSON.stringify({industry: industry, product: product, campaign: campaign, detail: detail}));
    } catch(e) {}

    var tl = tones();
    var labels = { friendly: 'カジュアル', urgent: '煽り強め', informative: '情報整理' };
    var html = '';
    tl.forEach(function(t, i){
      var text = build(industry, product, campaign, detail, t);
      html += '<div class="post-item">' +
              '<div class="post-head">' +
              '<span class="post-tag">パターン' + (i+1) + '：' + labels[t] + '</span>' +
              '<button class="btn-copy" onclick="copyPost(this, ' + i + ')">コピー</button>' +
              '</div>' +
              '<div class="post-body" id="post-' + i + '">' + escapeHtml(text) + '</div>' +
              '</div>';
    });
    document.getElementById('posts').innerHTML = html;
    document.getElementById('resultCard').style.display = '';
  }

  function copyPost(btn, idx) {
    var el = document.getElementById('post-' + idx);
    if (!el) return;
    var text = el.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = 'コピー済'; btn.classList.add('done');
        setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('done'); }, 1500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      btn.textContent = 'コピー済'; btn.classList.add('done');
      setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('done'); }, 1500);
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  (function restore(){
    try {
      var s = localStorage.getItem(KEY);
      if (!s) return;
      var o = JSON.parse(s);
      if (o.industry) document.getElementById('industry').value = o.industry;
      if (o.product)  document.getElementById('product').value  = o.product;
      if (o.campaign) document.getElementById('campaign').value = o.campaign;
      if (o.detail)   document.getElementById('detail').value   = o.detail;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
