<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV切替シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── セクション区切り ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; margin-bottom: 0.8rem;
      padding: 0.3rem 0.6rem; background: var(--accent-light);
      border-radius: 6px; display: inline-block;
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>EV切替シミュレーター</h1>
    <p class="subtitle">EVに乗り換えたら本当に得?走行距離と電気代・ガソリン代を入れるだけで、年間コスト差と損益分岐の年数を即可視化する買い替え判断アプリです。</p>
  </header>

  <!-- ガソリン車入力 -->
  <div class="card">
    <p class="card-title">ガソリン車の情報</p>
    <div class="field">
      <label for="mileage">年間走行距離（km）</label>
      <input type="number" id="mileage" placeholder="例: 10000" min="0">
    </div>
    <div class="field">
      <label for="fueleff">燃費（km/L）</label>
      <input type="number" id="fueleff" placeholder="例: 15" min="0.1" step="0.1">
    </div>
    <div class="field">
      <label for="gasprice">ガソリン単価（円/L）</label>
      <input type="number" id="gasprice" placeholder="例: 175" min="0">
    </div>
  </div>

  <!-- EV入力 -->
  <div class="card">
    <p class="card-title">EV（電気自動車）の情報</p>
    <div class="field">
      <label for="eveff">電費（km/kWh）</label>
      <input type="number" id="eveff" placeholder="例: 6" min="0.1" step="0.1">
      <p class="hint">一般的なEVは5〜8 km/kWh程度</p>
    </div>
    <div class="field">
      <label for="elecprice">電気代単価（円/kWh）</label>
      <input type="number" id="elecprice" placeholder="例: 30" min="0">
    </div>
    <div class="field">
      <label for="pricediff">EV車両価格の追加費用（万円）</label>
      <input type="number" id="pricediff" placeholder="例: 100" min="0">
      <p class="hint">ガソリン車より高い金額（補助金適用後）。同価格なら0</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">損益分岐を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">損益分岐年数</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var LS_KEY = 'ev_sim_inputs';

  function loadInputs() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (saved.mileage)    document.getElementById('mileage').value    = saved.mileage;
      if (saved.fueleff)    document.getElementById('fueleff').value    = saved.fueleff;
      if (saved.gasprice)   document.getElementById('gasprice').value   = saved.gasprice;
      if (saved.eveff)      document.getElementById('eveff').value      = saved.eveff;
      if (saved.elecprice)  document.getElementById('elecprice').value  = saved.elecprice;
      if (saved.pricediff !== undefined) document.getElementById('pricediff').value = saved.pricediff;
    } catch(e) {}
  }

  function saveInputs(mileage, fueleff, gasprice, eveff, elecprice, pricediff) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        mileage: mileage, fueleff: fueleff, gasprice: gasprice,
        eveff: eveff, elecprice: elecprice, pricediff: pricediff
      }));
    } catch(e) {}
  }

  function calc() {
    var mileage   = parseFloat(document.getElementById('mileage').value);
    var fueleff   = parseFloat(document.getElementById('fueleff').value);
    var gasprice  = parseFloat(document.getElementById('gasprice').value);
    var eveff     = parseFloat(document.getElementById('eveff').value);
    var elecprice = parseFloat(document.getElementById('elecprice').value);
    var pricediff = parseFloat(document.getElementById('pricediff').value) || 0;

    if (isNaN(mileage) || isNaN(fueleff) || isNaN(gasprice) || isNaN(eveff) || isNaN(elecprice)) {
      showErr('車両価格差以外の項目を入力してください');
      return;
    }
    if (fueleff <= 0 || eveff <= 0) {
      showErr('燃費・電費は0より大きい値を入力してください');
      return;
    }

    saveInputs(mileage, fueleff, gasprice, eveff, elecprice, pricediff);

    // ガソリン車の年間燃料費
    var gasAnnual = mileage / fueleff * gasprice;
    // EV年間電気代
    var evAnnual  = mileage / eveff * elecprice;
    // 年間節約額（ガソリン車 - EV）
    var saving    = gasAnnual - evAnnual;
    // 追加費用（万円→円）
    var extraCost = pricediff * 10000;

    var breakEven;
    var level, evalText, noteText;

    if (saving <= 0) {
      // EVの方が高い
      breakEven = null;
      level = 'ng';
      evalText = 'EVへの切り替えでコストが増加します';
      noteText = '年間の電気代がガソリン代より ' + fmt(Math.abs(saving)) + ' 円多くなります。\n料金プランや走行パターンを見直してみましょう。';
    } else {
      if (extraCost <= 0) {
        breakEven = 0;
        level = 'ok';
        evalText = 'すぐにお得！追加コストゼロで年間節約できます';
        noteText = '年間 ' + fmt(saving) + ' 円の節約になります。';
      } else {
        breakEven = extraCost / saving;
        if (breakEven <= 10) {
          level = 'ok';
          evalText = '10年以内に回収できます';
          noteText = '年間 ' + fmt(saving) + ' 円の節約。' + breakEven.toFixed(1) + ' 年で元が取れます。';
        } else if (breakEven <= 20) {
          level = 'warn';
          evalText = '回収まで10〜20年かかります';
          noteText = '年間 ' + fmt(saving) + ' 円の節約ですが、回収には ' + breakEven.toFixed(1) + ' 年かかります。';
        } else {
          level = 'ng';
          evalText = '回収まで20年超かかります';
          noteText = '年間節約額 ' + fmt(saving) + ' 円に対して追加費用が大きく、コスト回収に ' + breakEven.toFixed(1) + ' 年かかります。';
        }
      }
    }

    var rvText = breakEven === null ? '回収不可' : breakEven === 0 ? '即時回収' : breakEven.toFixed(1) + ' 年';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rvText;
    document.getElementById('re').textContent = evalText;
    document.getElementById('rn').textContent = noteText;

    var rows = [
      ['年間走行距離', fmt(mileage) + ' km'],
      ['ガソリン車：年間燃料費', fmt(gasAnnual) + ' 円'],
      ['EV：年間電気代', fmt(evAnnual) + ' 円'],
      ['年間コスト差（節約額）', (saving >= 0 ? '+' : '') + fmt(saving) + ' 円', true],
    ];
    if (extraCost > 0) {
      rows.push(['EV追加費用', fmt(extraCost) + ' 円']);
    }
    if (breakEven !== null && breakEven > 0) {
      rows.push(['損益分岐年数', breakEven.toFixed(1) + ' 年', true]);
    }

    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  window.addEventListener('DOMContentLoaded', loadInputs);
  </script>
</body>
</html>
