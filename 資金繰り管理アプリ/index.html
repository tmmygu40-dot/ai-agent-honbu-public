<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資金繰り管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>資金繰り管理</h1>
  </header>

  <main>
    <!-- 初期残高設定 -->
    <section class="initial-balance-section">
      <label for="initialBalance">初期残高（円）</label>
      <div class="balance-input-row">
        <input type="number" id="initialBalance" placeholder="例：100000" min="0">
        <button id="setBalanceBtn">設定</button>
      </div>
      <p class="current-balance-display">現在の初期残高：<span id="currentInitialBalance">0</span> 円</p>
    </section>

    <!-- 収支サマリー -->
    <section class="summary-section">
      <h2>今月の収支サマリー</h2>
      <div class="summary-grid">
        <div class="summary-card income">
          <span class="summary-label">入金合計</span>
          <span class="summary-amount" id="totalIncome">0</span>
          <span class="summary-unit">円</span>
        </div>
        <div class="summary-card expense">
          <span class="summary-label">支払い合計</span>
          <span class="summary-amount" id="totalExpense">0</span>
          <span class="summary-unit">円</span>
        </div>
        <div class="summary-card balance">
          <span class="summary-label">残高</span>
          <span class="summary-amount" id="totalBalance">0</span>
          <span class="summary-unit">円</span>
        </div>
      </div>
    </section>

    <!-- 月選択 -->
    <section class="month-section">
      <label for="monthSelect">表示月</label>
      <input type="month" id="monthSelect">
    </section>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>予定を追加</h2>
      <div class="form-group">
        <label for="entryType">種別</label>
        <select id="entryType">
          <option value="income">入金</option>
          <option value="expense">支払い</option>
        </select>
      </div>
      <div class="form-group">
        <label for="entryDate">日付</label>
        <input type="date" id="entryDate" required>
      </div>
      <div class="form-group">
        <label for="entryName">名称</label>
        <input type="text" id="entryName" placeholder="例：売掛金入金、家賃支払い" maxlength="50">
      </div>
      <div class="form-group">
        <label for="entryAmount">金額（円）</label>
        <input type="number" id="entryAmount" placeholder="例：50000" min="1">
      </div>
      <button id="addEntryBtn" class="add-btn">追加する</button>
    </section>

    <!-- 残高推移一覧 -->
    <section class="list-section">
      <h2>残高推移</h2>
      <div id="entryList" class="entry-list">
        <p class="empty-message">予定がありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
