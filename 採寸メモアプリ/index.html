<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採寸メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>📐 採寸メモ</h1>
    <p class="subtitle">部屋別に採寸データを記録</p>
  </header>

  <main>
    <!-- 部屋追加エリア -->
    <section class="add-room-section">
      <div class="input-row">
        <input type="text" id="roomNameInput" placeholder="部屋名を入力（例：リビング）" maxlength="30">
        <button id="addRoomBtn" onclick="addRoom()">部屋を追加</button>
      </div>
    </section>

    <!-- 部屋一覧 -->
    <section id="roomList" class="room-list">
      <!-- 動的に挿入 -->
    </section>
  </main>

  <!-- 採寸データ追加モーダル -->
  <div id="measureModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalRoomTitle">採寸を追加</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>名称<span class="required">*</span></label>
        <input type="text" id="mName" placeholder="例：窓（南）、ソファ置き場" maxlength="30">

        <div class="size-grid">
          <div>
            <label>幅 (cm)</label>
            <input type="number" id="mWidth" placeholder="例：180" min="0" step="0.1">
          </div>
          <div>
            <label>高さ (cm)</label>
            <input type="number" id="mHeight" placeholder="例：200" min="0" step="0.1">
          </div>
          <div>
            <label>奥行き (cm)</label>
            <input type="number" id="mDepth" placeholder="例：60" min="0" step="0.1">
          </div>
        </div>

        <label>メモ</label>
        <input type="text" id="mNote" placeholder="例：カーテン用、フローリングから窓枠まで" maxlength="60">

        <button class="save-btn" onclick="saveMeasure()">保存する</button>
      </div>
    </div>
  </div>
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal()"></div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
