<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開業届ガイドアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 640px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-show {
      display: block; width: 100%; max-width: 640px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-show:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* 進捗バー */
    .progress-bar-wrap {
      display: none;
      max-width: 640px; margin: 0 auto 1rem;
      padding: 0 1.2rem;
    }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 0.4rem; }
    .progress-track { background: var(--border); border-radius: 99px; height: 8px; }
    .progress-fill { background: var(--ok); height: 8px; border-radius: 99px; transition: width 0.3s; }

    /* 届出リスト */
    .app-list { list-style: none; }
    .app-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.8rem;
      background: #fff;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .app-item.done { border-color: var(--ok); background: var(--ok-bg); }
    .app-item-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1rem;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app-item-check {
      width: 22px; height: 22px; flex-shrink: 0;
      border: 2px solid var(--border); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: #fff;
      background: #fff; transition: all 0.15s;
    }
    .app-item.done .app-item-check { background: var(--ok); border-color: var(--ok); }
    .app-item-check::after { content: ''; display: none; }
    .app-item.done .app-item-check::after { content: '✓'; display: block; }

    .app-item-main { flex: 1; }
    .app-item-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
    .app-item.done .app-item-name { color: var(--ok); text-decoration: line-through; }
    .app-item-badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.55rem;
      border-radius: 99px; margin-left: 0.4rem; vertical-align: middle;
    }
    .badge-required { background: #fef2f2; color: var(--ng); border: 1px solid #fecaca; }
    .badge-optional { background: #fffbeb; color: var(--warn); border: 1px solid #fde68a; }

    .app-item-toggle {
      font-size: 0.75rem; color: var(--text-sub);
      flex-shrink: 0; transition: transform 0.2s;
    }
    .app-item.open .app-item-toggle { transform: rotate(180deg); }

    .app-item-detail {
      display: none;
      padding: 0 1rem 1rem 1rem;
      border-top: 1px solid var(--border);
    }
    .app-item.open .app-item-detail { display: block; }

    .detail-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-key { color: var(--text-sub); font-weight: 600; min-width: 4.5rem; flex-shrink: 0; }
    .detail-val { color: var(--text); line-height: 1.5; }
    .detail-val.timing-important { color: var(--ng); font-weight: 700; }
    .detail-val.timing-warning { color: var(--warn); font-weight: 600; }

    .result-summary {
      display: none;
      max-width: 640px; margin: 0 auto 1rem;
      background: var(--ok-bg); border: 2px solid var(--ok);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      text-align: center; font-weight: 700; color: var(--ok);
    }

    .btn-reset {
      display: none; max-width: 640px; width: 100%;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700; color: var(--text-sub);
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▼'; position: absolute; right: 1rem; top: 50%;
      transform: translateY(-50%); pointer-events: none;
      font-size: 0.7rem; color: var(--text-sub);
    }
  </style>

  var currentIndustry = '';

  function showGuide() {
    var sel = document.getElementById('industry').value;
    if (!sel) {
      alert('業種を選択してください');
      return;
    }
    currentIndustry = sel;
    var data = DATA[sel];
    var card = document.getElementById('guideCard');
    var list = document.getElementById('appList');
    document.getElementById('guideTitle').textContent = data.name + ' の届出リスト';

    var saved = loadChecks(sel);
    list.innerHTML = '';
    data.items.forEach(function(item) {
      var checked = saved[item.id] || false;
      var li = document.createElement('li');
      li.className = 'app-item' + (checked ? ' done' : '');
      li.dataset.id = item.id;
      var badge = item.required
        ? '<span class="app-item-badge badge-required">必須</span>'
        : '<span class="app-item-badge badge-optional">任意</span>';
      li.innerHTML =
        '<div class="app-item-header" onclick="toggleItem(this)">' +
          '<div class="app-item-check"></div>' +
          '<div class="app-item-main">' +
            '<span class="app-item-name">' + item.name + '</span>' + badge +
          '</div>' +
          '<span class="app-item-toggle">▼</span>' +
        '</div>' +
        '<div class="app-item-detail">' +
          '<div class="detail-row"><span class="detail-key">提出先</span><span class="detail-val">' + item.where + '</span></div>' +
          '<div class="detail-row"><span class="detail-key">期限</span><span class="detail-val ' + item.timingClass + '">' + item.timing + '</span></div>' +
          '<div class="detail-row"><span class="detail-key">メモ</span><span class="detail-val">' + item.memo + '</span></div>' +
        '</div>';
      list.appendChild(li);
    });

    card.style.display = '';
    document.getElementById('progressWrap').style.display = '';
    document.getElementById('btnReset').style.display = '';
    updateProgress();
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleItem(header) {
    var li = header.parentElement;
    var isCheck = false;
    if (event.target.classList.contains('app-item-check') || event.target === header.querySelector('.app-item-check')) {
      isCheck = true;
    }
    if (isCheck) {
      li.classList.toggle('done');
      saveCheck(currentIndustry, li.dataset.id, li.classList.contains('done'));
      updateProgress();
    } else {
      li.classList.toggle('open');
    }
  }

  function updateProgress() {
    var items = document.querySelectorAll('#appList .app-item');
    var total = items.length;
    var done = document.querySelectorAll('#appList .app-item.done').length;
    document.getElementById('progressText').textContent = done + ' / ' + total;
    document.getElementById('progressFill').style.width = (total ? (done / total * 100) : 0) + '%';
    var summary = document.getElementById('resultSummary');
    if (done > 0 && done === total) {
      summary.style.display = '';
    } else {
      summary.style.display = 'none';
    }
  }

  function resetChecks() {
    if (!currentIndustry) return;
    localStorage.removeItem('kaigyou_' + currentIndustry);
    document.querySelectorAll('#appList .app-item').forEach(function(li) {
      li.classList.remove('done');
    });
    updateProgress();
  }

  function saveCheck(industry, id, val) {
    var saved = loadChecks(industry);
    saved[id] = val;
    localStorage.setItem('kaigyou_' + industry, JSON.stringify(saved));
  }

  function loadChecks(industry) {
    try {
      return JSON.parse(localStorage.getItem('kaigyou_' + industry)) || {};
    } catch(e) { return {}; }
  }

  // クリックエリアを分離（チェックボックスとアコーディオン）
  document.addEventListener('click', function(e) {
    var check = e.target.closest('.app-item-check');
    var header = e.target.closest('.app-item-header');
    if (!header) return;
    var li = header.closest('.app-item');
    if (check) {
      li.classList.toggle('done');
      saveCheck(currentIndustry, li.dataset.id, li.classList.contains('done'));
      updateProgress();
    } else {
      li.classList.toggle('open');
    }
  }, true);
  </script>
