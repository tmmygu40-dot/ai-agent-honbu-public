<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿計画アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>SNS投稿計画</h1>

    <div class="form-card">
      <h2>投稿予定を追加</h2>
      <div class="form-group">
        <label for="postDate">投稿日</label>
        <input type="date" id="postDate">
      </div>
      <div class="form-group">
        <label for="platform">プラットフォーム</label>
        <select id="platform">
          <option value="Twitter/X">Twitter/X</option>
          <option value="Instagram">Instagram</option>
          <option value="Facebook">Facebook</option>
          <option value="YouTube">YouTube</option>
          <option value="TikTok">TikTok</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">内容メモ</label>
        <textarea id="memo" rows="3" placeholder="投稿内容のメモを入力..."></textarea>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
      <p id="formError" class="form-error" role="alert" aria-live="polite"></p>
    </div>

    <div class="filter-bar">
      <label for="filterPlatform">絞り込み：</label>
      <select id="filterPlatform">
        <option value="all">すべて</option>
        <option value="Twitter/X">Twitter/X</option>
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
        <option value="YouTube">YouTube</option>
        <option value="TikTok">TikTok</option>
        <option value="その他">その他</option>
      </select>
      <label class="filter-check">
        <input type="checkbox" id="hidePosted"> 投稿済みを非表示
      </label>
    </div>

    <div id="postList"></div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
