<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿計画アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>SNS投稿計画</h1>

    <div class="form-card">
      <h2>投稿予定を追加</h2>
      <div class="form-group">
        <label for="postDate">投稿日</label>
        <input type="date" id="postDate">
      </div>
      <div class="form-group">
        <label for="platform">プラットフォーム</label>
        <select id="platform">
          <option value="Twitter/X">Twitter/X</option>
          <option value="Instagram">Instagram</option>
          <option value="Facebook">Facebook</option>
          <option value="YouTube">YouTube</option>
          <option value="TikTok">TikTok</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="memo">内容メモ</label>
        <textarea id="memo" rows="3" placeholder="投稿内容のメモを入力..."></textarea>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
      <p id="formError" class="form-error" role="alert" aria-live="polite"></p>
    </div>

    <div class="filter-bar">
      <label for="filterPlatform">絞り込み：</label>
      <select id="filterPlatform">
        <option value="all">すべて</option>
        <option value="Twitter/X">Twitter/X</option>
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
        <option value="YouTube">YouTube</option>
        <option value="TikTok">TikTok</option>
        <option value="その他">その他</option>
      </select>
      <label class="filter-check">
        <input type="checkbox" id="hidePosted"> 投稿済みを非表示
      </label>
    </div>

    <div id="postList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'sns_plan_posts';

    const postDateEl = document.getElementById('postDate');
    const platformEl = document.getElementById('platform');
    const memoEl     = document.getElementById('memo');
    const addBtn     = document.getElementById('addBtn');
    const postList   = document.getElementById('postList');
    const filterPlatform = document.getElementById('filterPlatform');
    const hidePosted = document.getElementById('hidePosted');
    const formError  = document.getElementById('formError');

    postDateEl.value = new Date().toISOString().split('T')[0];

    let posts = loadPosts();
    renderList();

    addBtn.addEventListener('click', () => {
      const date     = postDateEl.value;
      const platform = platformEl.value;
      const memo     = memoEl.value.trim();

      formError.textContent = '';
      if (!date) { formError.textContent = '投稿日を入力してください。'; return; }
      if (!memo) { formError.textContent = '内容メモを入力してください。'; return; }

      posts.push({ id: Date.now(), date, platform, memo, posted: false });
      savePosts();
      renderList();
      memoEl.value = '';
      postDateEl.value = new Date().toISOString().split('T')[0];
    });

    filterPlatform.addEventListener('change', renderList);
    hidePosted.addEventListener('change', renderList);

    function renderList() {
      const filterVal = filterPlatform.value;
      const hideVal   = hidePosted.checked;
      let filtered    = [...posts];
      if (filterVal !== 'all') filtered = filtered.filter(p => p.platform === filterVal);
      if (hideVal)             filtered = filtered.filter(p => !p.posted);
      filtered.sort((a, b) => a.date.localeCompare(b.date));

      postList.innerHTML = '';
      if (filtered.length === 0) {
        postList.innerHTML = '<p class="empty-message">投稿予定がありません</p>';
        return;
      }

      filtered.forEach(post => {
        const item = document.createElement('div');
        item.className = 'post-item' + (post.posted ? ' posted' : '');
        const badgeClass    = getBadgeClass(post.platform);
        const dateFormatted = formatDate(post.date);
        item.innerHTML = `
          <input type="checkbox" class="post-check" ${post.posted ? 'checked' : ''} data-id="${post.id}" title="投稿済みにする">
          <div class="post-body">
            <div class="post-header">
              <span class="post-date">${dateFormatted}</span>
              <span class="platform-badge ${badgeClass}">${post.platform}</span>
            </div>
            <div class="post-memo">${escapeHtml(post.memo)}</div>
          </div>
          <div class="post-actions">
            <button class="btn-delete" data-id="${post.id}" title="削除">×</button>
          </div>`;
        postList.appendChild(item);
      });

      postList.querySelectorAll('.post-check').forEach(chk => {
        chk.addEventListener('change', () => {
          const p = posts.find(p => p.id === Number(chk.dataset.id));
          if (p) { p.posted = chk.checked; savePosts(); renderList(); }
        });
      });
      postList.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          posts = posts.filter(p => p.id !== Number(btn.dataset.id));
          savePosts(); renderList();
        });
      });
    }

    function getBadgeClass(platform) {
      return { 'Twitter/X':'badge-twitter', 'Instagram':'badge-instagram',
               'Facebook':'badge-facebook', 'YouTube':'badge-youtube',
               'TikTok':'badge-tiktok', 'その他':'badge-other' }[platform] || 'badge-other';
    }
    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      const day = ['日','月','火','水','木','金','土'][new Date(+y, +m-1, +d).getDay()];
      return `${y}/${m}/${d}（${day}）`;
    }
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function loadPosts()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
    function savePosts()  { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); }
  </script>
  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
