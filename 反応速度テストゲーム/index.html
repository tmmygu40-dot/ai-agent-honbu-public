<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>反応速度テストゲーム</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>反応速度テスト</h1>
    <p class="subtitle">合図が出たらすぐタップ！</p>

    <div id="tap-area" class="tap-area waiting">
      <div id="tap-message" class="tap-message">タップして開始</div>
    </div>

    <div id="result-area" class="result-area hidden">
      <div id="last-time" class="last-time"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">最速</div>
        <div id="best-time" class="stat-value">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">平均</div>
        <div id="avg-time" class="stat-value">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">回数</div>
        <div id="count" class="stat-value">0</div>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>記録一覧</h2>
        <button id="clear-btn" class="clear-btn">クリア</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
