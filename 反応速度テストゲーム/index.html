<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>反応速度テストゲーム</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>反応速度テスト</h1>
    <p class="subtitle">合図が出たらすぐタップ！</p>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">楽しくチャレンジして知識を確認できるクイズアプリです。スマホでも快適にご利用いただけます。</p>

    <div id="tap-area" class="tap-area waiting">
      <div id="tap-message" class="tap-message">タップして開始</div>
    </div>

    <div id="result-area" class="result-area hidden">
      <div id="last-time" class="last-time"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">最速</div>
        <div id="best-time" class="stat-value">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">平均</div>
        <div id="avg-time" class="stat-value">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">回数</div>
        <div id="count" class="stat-value">0</div>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>記録一覧</h2>
        <button id="clear-btn" class="clear-btn">クリア</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ クイズの解答はあくまで目安です。最新の情報は公式資料等でご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. やり直せますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、ページを再読み込みするとやり直せます。</dd>
      <dt style="font-weight:600;">Q. 正解の解説はありますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">正解・不正解後に解説が表示されます。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
