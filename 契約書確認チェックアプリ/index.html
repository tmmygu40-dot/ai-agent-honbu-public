<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>契約書確認チェックアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 種別選択 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── チェックリスト ── */
    #checklist-area { display: none; }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 8px;
      height: 10px;
      margin-bottom: 0.7rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 8px;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 0.82rem;
      color: var(--text-sub);
      margin-bottom: 1.2rem;
      text-align: right;
    }
    .progress-text span { font-weight: 700; color: var(--accent); }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .check-item:last-child { border-bottom: none; padding-bottom: 0; }
    .check-item:active { background: var(--accent-light); }

    .check-box {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      margin-top: 1px;
    }
    .check-item.checked .check-box {
      background: var(--ok);
      border-color: var(--ok);
    }
    .check-icon { display: none; color: #fff; font-size: 14px; font-weight: 900; }
    .check-item.checked .check-icon { display: block; }

    .check-text {
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--text);
      flex: 1;
    }
    .check-item.checked .check-text {
      color: var(--text-sub);
      text-decoration: line-through;
      text-decoration-color: var(--ok);
    }

    /* ── 完了バナー ── */
    .complete-banner {
      display: none;
      background: var(--ok-bg);
      border: 2px solid var(--ok);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      text-align: center;
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .complete-banner .icon { font-size: 2rem; margin-bottom: 0.3rem; }
    .complete-banner p { font-size: 1rem; font-weight: 700; color: var(--ok); }
    .complete-banner .sub { font-size: 0.8rem; color: var(--text-sub); font-weight: 400; margin-top: 0.2rem; }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.75rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card, #fff); color: var(--text-sub, #666);
      border: 1.5px solid var(--border, #ddd); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent, #e07b00); color: var(--accent, #e07b00); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>契約書確認チェックアプリ</h1>
    <p class="subtitle">種類を選ぶだけで見落としやすい重要ポイントを即チェックリスト表示</p>
  </header>

  <!-- 種別選択カード -->
  <div class="card">
    <p class="card-title">契約書の種類を選択</p>
    <div class="field">
      <label for="contract-type">契約書の種類</label>
      <select id="contract-type" onchange="loadChecklist()">
        <option value="">── 選択してください ──</option>
        <option value="employment">雇用契約</option>
        <option value="sales">売買契約</option>
        <option value="lease">賃貸借契約</option>
        <option value="outsourcing">業務委託契約</option>
        <option value="nda">秘密保持契約（NDA）</option>
        <option value="contract-work">請負契約</option>
        <option value="other">その他（基本共通確認）</option>
      </select>
    </div>
  </div>

  <!-- 完了バナー -->
  <div class="complete-banner" id="complete-banner">
    <div class="icon">✅</div>
    <p>全項目チェック完了！</p>
    <p class="sub">重要ポイントをすべて確認しました</p>
  </div>

  <!-- チェックリストエリア -->
  <div id="checklist-area">
    <div class="card">
      <p class="card-title" id="checklist-title">チェックリスト</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <p class="progress-text"><span id="progress-text">0 / 0</span> 項目完了</p>
      <div id="checklist-items"></div>
    </div>

    <button class="btn-reset no-print" onclick="resetChecks()">チェックをリセット</button>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📋 このチェックリストは一般的な確認ポイントをまとめたものです。実際の法的判断は専門家にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var CHECKLISTS = {
    employment: {
      title: '雇用契約 チェックリスト',
      items: [
        '雇用期間・更新条件（有期・無期の別）が明記されているか',
        '給与・賞与・昇給の条件が具体的に記載されているか',
        '労働時間・所定休日・有給休暇の取得条件が明確か',
        '試用期間の長さと、試用期間中の労働条件が明記されているか',
        '解雇・退職の手続き・予告期間が記載されているか',
        '秘密保持義務・競業避止義務の範囲と期間が適切か',
        '社会保険・雇用保険への加入が明記されているか',
        '就業規則の周知・確認が行われているか',
        '給与の支払い方法・締め日・支払い日が明確か',
      ]
    },
    sales: {
      title: '売買契約 チェックリスト',
      items: [
        '商品・サービスの内容・数量・仕様が明確に定義されているか',
        '代金・支払い条件・支払い期限が明記されているか',
        '引渡し時期・場所・方法が具体的に明確か',
        '危険負担の移転時点（いつから買主リスクになるか）が明確か',
        '瑕疵担保責任・品質保証の期間と対応範囲が明確か',
        '返品・交換の条件と手続きが明記されているか',
        '契約解除の条件と手続き・解除後の処理が明記されているか',
        '違約金・損害賠償の上限が記載されているか',
        '知的財産権の帰属（商標・特許等）が明確か',
      ]
    },
    lease: {
      title: '賃貸借契約 チェックリスト',
      items: [
        '賃料・管理費・敷金・礼金の金額が正確に明記されているか',
        '賃貸期間・更新条件・更新料が明記されているか',
        '原状回復の範囲と費用負担（借主・貸主の分担）が明確か',
        '禁止事項（ペット・楽器・転貸・民泊等）が明記されているか',
        '解約予告の必要期間が明記されているか',
        '連帯保証人・保証会社の条件と責任範囲が明確か',
        '設備の修繕・費用負担の分担（エアコン・給湯器等）が明確か',
        '鍵の交換費用負担が明記されているか',
        '入居前の設備確認・現況確認の記録があるか',
      ]
    },
    outsourcing: {
      title: '業務委託契約 チェックリスト',
      items: [
        '委託業務の内容・範囲・除外事項が具体的に明記されているか',
        '報酬額・計算方法・支払い条件・支払い時期が明確か',
        '成果物の定義・仕様・納期が明確か',
        '知的財産権の帰属（著作権・特許等）が明確か',
        '秘密保持義務の範囲・期間・対象情報が明記されているか',
        '再委託（外注・下請け）の可否と条件が明記されているか',
        '契約解除の条件と手続き・未払い報酬の扱いが明記されているか',
        '損害賠償責任の範囲・上限額が明確か',
        '雇用関係がないこと（指揮命令関係）が明確か',
        '瑕疵修補・やり直し対応の条件が明記されているか',
      ]
    },
    nda: {
      title: '秘密保持契約（NDA） チェックリスト',
      items: [
        '秘密情報の定義・範囲が具体的かつ明確か',
        '秘密保持の義務期間が明記されているか',
        '情報の利用目的が契約目的に限定されているか',
        '受領者の管理義務（アクセス制限・従業員への開示制限等）が明確か',
        '秘密情報の第三者提供禁止が明記されているか',
        '秘密情報の返還・廃棄の時期と手続きが明記されているか',
        '除外事項（公知情報・独自開発情報等）が適切に定められているか',
        '違反時の損害賠償・差止請求に関する規定があるか',
        '法的開示義務がある場合の手続きが定められているか',
      ]
    },
    'contract-work': {
      title: '請負契約 チェックリスト',
      items: [
        '仕事の内容・仕様・完成基準が具体的に明確か',
        '請負代金と支払い条件・支払い時期が明記されているか',
        '工期・着工日・竣工日・納期が明確か',
        '設計変更・追加工事の手続きと費用負担が明記されているか',
        '瑕疵担保責任の期間と対応範囲が明確か（建設工事は10年等）',
        '材料・設備の調達責任と品質基準が明確か',
        '下請業者への再発注の可否と条件が明記されているか',
        '不可抗力（災害・天変地異）による延期・費用の扱いが明確か',
        '検査・引渡しの手続きと合格基準が明記されているか',
      ]
    },
    other: {
      title: '基本共通確認 チェックリスト',
      items: [
        '契約当事者の名称・住所・代表者名が正確に記載されているか',
        '契約日・有効期間が明記されているか',
        '準拠法・管轄裁判所が明記されているか',
        '契約変更の手続き（書面・合意等）が明記されているか',
        '解除・解約の条件と手続きが明確か',
        '損害賠償の範囲・上限が明確か',
        '反社会的勢力排除条項が含まれているか',
        '印鑑（捺印）・署名が正しく行われているか',
        '収入印紙の貼付が必要な契約か確認したか',
        '原本の保管場所・保管期間が決まっているか',
      ]
    }
  };

  var currentType = '';
  var checkState = {};

  function loadChecklist() {
    var sel = document.getElementById('contract-type');
    var type = sel.value;
    currentType = type;

    var area = document.getElementById('checklist-area');
    if (!type) { area.style.display = 'none'; return; }

    var data = CHECKLISTS[type];
    document.getElementById('checklist-title').textContent = data.title;

    // Load saved state
    var saved = localStorage.getItem('contract-check-' + type);
    checkState = saved ? JSON.parse(saved) : {};

    renderItems(data.items);
    area.style.display = 'block';
    updateProgress(data.items.length);
  }

  function renderItems(items) {
    var container = document.getElementById('checklist-items');
    container.innerHTML = items.map(function(text, i) {
      var checked = checkState[i] ? ' checked' : '';
      return '<div class="check-item' + checked + '" onclick="toggleCheck(' + i + ', ' + items.length + ')">'
           + '<div class="check-box"><span class="check-icon">✓</span></div>'
           + '<p class="check-text">' + escHtml(text) + '</p>'
           + '</div>';
    }).join('');
  }

  function toggleCheck(index, total) {
    checkState[index] = !checkState[index];
    localStorage.setItem('contract-check-' + currentType, JSON.stringify(checkState));

    var items = document.querySelectorAll('.check-item');
    if (checkState[index]) {
      items[index].classList.add('checked');
    } else {
      items[index].classList.remove('checked');
    }
    updateProgress(total);
  }

  function updateProgress(total) {
    var done = Object.values(checkState).filter(Boolean).length;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;

    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = done + ' / ' + total;

    var banner = document.getElementById('complete-banner');
    banner.style.display = (done === total && total > 0) ? 'block' : 'none';
  }

  function resetChecks() {
    if (!currentType) return;
    checkState = {};
    localStorage.removeItem('contract-check-' + currentType);
    var data = CHECKLISTS[currentType];
    renderItems(data.items);
    updateProgress(data.items.length);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
