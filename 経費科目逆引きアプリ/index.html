  // ── 検索ロジック ──────────────────────────────────
  function doSearch() {
    var q = document.getElementById('searchInput').value.trim();
    if (!q) { renderResults([]); document.getElementById('resultCount').textContent = ''; return; }
    saveHistory(q);
    var results = search(q);
    renderResults(results, q);
  }

  function search(q) {
    var lower = q.toLowerCase();
    var scored = DATA.map(function(d) {
      var score = 0;
      // 科目名完全一致
      if (d.kmoku === q) score += 100;
      // 科目名部分一致
      if (d.kmoku.indexOf(q) >= 0) score += 50;
      // キーワード一致
      d.keywords.forEach(function(k) {
        if (k.indexOf(q) >= 0 || q.indexOf(k) >= 0) score += 30;
        if (k.toLowerCase().indexOf(lower) >= 0) score += 10;
      });
      // 説明文一致
      if (d.desc.indexOf(q) >= 0) score += 20;
      // 使用例一致
      d.examples.forEach(function(e) {
        if (e.indexOf(q) >= 0) score += 15;
      });
      return { data: d, score: score };
    });
    return scored.filter(function(s) { return s.score > 0; })
      .sort(function(a, b) { return b.score - a.score; })
      .map(function(s) { return s.data; });
  }

  function renderResults(results, q) {
    var countEl = document.getElementById('resultCount');
    var container = document.getElementById('results');
    if (!results || results.length === 0) {
      if (q) {
        countEl.textContent = '「' + q + '」に一致する科目は見つかりませんでした';
        container.innerHTML = '<div class="no-result">キーワードを変えて試してみてください。<br>例：電車代→旅費交通費、ソフト→ソフトウェア費</div>';
      } else {
        countEl.textContent = '';
        container.innerHTML = '';
      }
      return;
    }
    countEl.textContent = results.length + '件の科目が見つかりました';
    container.innerHTML = results.map(function(d) {
      return '<div class="result-item">'
        + '<div class="kmoku">' + esc(d.kmoku) + '</div>'
        + '<span class="category-tag">' + esc(d.cat) + '</span>'
        + '<p class="desc">' + esc(d.desc) + '</p>'
        + '<div class="examples"><strong>使用例：</strong>'
        + d.examples.map(function(e) { return '<span class="example-chip">' + esc(e) + '</span>'; }).join('')
        + '</div></div>';
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function onInput() {
    var q = document.getElementById('searchInput').value.trim();
    if (q.length >= 1) {
      var results = search(q);
      renderResults(results, q);
      if (results.length > 0) document.getElementById('resultCount').textContent = results.length + '件の科目が見つかりました';
    } else {
      document.getElementById('resultCount').textContent = '';
      document.getElementById('results').innerHTML = '';
    }
  }

  function onKey(e) {
    if (e.key === 'Enter') doSearch();
  }

  // ── 検索履歴 ──────────────────────────────────────
  var HIST_KEY = 'kmoku_search_history';

  function saveHistory(q) {
    var hist = loadHistory();
    hist = hist.filter(function(h) { return h !== q; });
    hist.unshift(q);
    if (hist.length > 10) hist = hist.slice(0, 10);
    try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); } catch(e) {}
    renderHistory();
  }

  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
    } catch(e) { return []; }
  }

  function renderHistory() {
    var hist = loadHistory();
    var sec = document.getElementById('historySection');
    var chips = document.getElementById('historyChips');
    if (hist.length === 0) { sec.style.display = 'none'; return; }
    sec.style.display = '';
    chips.innerHTML = hist.map(function(h) {
      return '<span class="history-chip" onclick="selectHistory(\'' + esc(h) + '\')">' + esc(h) + '</span>';
    }).join('');
  }

  function selectHistory(q) {
    document.getElementById('searchInput').value = q;
    doSearch();
  }

  // 初期表示
  renderHistory();
  </script>
</body>
</html>
