<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前と誕生日を登録するだけで、あと何日かカウントダウン表示。応援メッセージもランダム生成して推し活を盛り上げます。">
  <title>🎂 推し誕生日カウントダウン＆応援メッセージ生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 推しカード ── */
    .oshi-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      position: relative;
    }
    .oshi-card .oshi-name {
      font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem;
    }
    .oshi-card .oshi-birthday {
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .oshi-card .countdown {
      font-size: 1.8rem; font-weight: 900; color: var(--accent);
      text-align: center; margin-bottom: 0.6rem; line-height: 1.2;
    }
    .oshi-card .countdown-label {
      font-size: 0.78rem; color: var(--text-sub); text-align: center; margin-bottom: 1rem;
    }
    .oshi-card .countdown.today {
      color: var(--ok); animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    .oshi-card .message-box {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      min-height: 3rem;
    }
    .oshi-card .btn-msg {
      display: block; width: 100%; margin-top: 0.8rem; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .oshi-card .btn-msg:active { opacity: 0.8; }
    .oshi-card .btn-delete {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; font-size: 1.2rem;
      color: var(--text-sub); cursor: pointer; line-height: 1;
    }
    .oshi-card .btn-delete:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .oshi-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎂 推し誕生日カウントダウン＆応援メッセージ生成器</h1>
    <p class="subtitle">推しの誕生日まであと何日？カウントダウンしながら応援メッセージも自動生成します。</p>
  </header>

  <!-- 推し登録カード -->
  <div class="card">
    <p class="card-title">推しを登録</p>
    <div class="field">
      <label for="oshi-name">推しの名前</label>
      <input type="text" id="oshi-name" placeholder="例: 推し太郎">
    </div>
    <div class="field">
      <label for="oshi-birthday">誕生日（月/日）</label>
      <input type="date" id="oshi-birthday">
      <p class="hint">年は無視して月日だけ使います</p>
    </div>
  </div>

  <button class="btn-calc" onclick="addOshi()">✨ 推しを登録する</button>

  <!-- 推し一覧 -->
  <div id="oshi-list"></div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 応援メッセージ集 ──
  var MESSAGES = [
    '{{name}}の誕生日まであと少し！毎日の推し活が輝いてるよ✨',
    '{{name}}が生まれてきてくれてありがとう！最高の推しだよ🎉',
    '{{name}}の笑顔が世界を救う！あなたの存在が尊い💖',
    '{{name}}推してて本当に良かった！これからもずっと応援するよ📣',
    '{{name}}の誕生日が近づくとワクワクが止まらない！🎂',
    '{{name}}がいるから毎日頑張れる！ありがとう🌟',
    '{{name}}の魅力は無限大！推せる幸せを噛みしめてます💫',
    '{{name}}、生まれてきてくれてありがとう。出会えて幸せです🍀',
    '{{name}}の誕生日は世界記念日！盛大にお祝いしよう🎊',
    '{{name}}への愛は計測不能！推しパワー全開で応援中🔥',
    '{{name}}がキラキラしてるのは推しの力？いえ、本人の魅力です✨',
    '{{name}}の新しい1年が最高のものになりますように🙏',
    '{{name}}に届け、この応援パワー！全力で推してるよ💪',
    '{{name}}の存在がファンの生きがい！これからも輝いて🌈',
    '{{name}}推し歴に悔いなし！来年も再来年もずっと推す💕',
    '{{name}}、あなたの夢が全部叶いますように⭐',
    '{{name}}がいない世界は考えられない！感謝を込めて🎁',
    '{{name}}の誕生日に向けてテンション右肩上がり📈',
    '{{name}}の素晴らしさをもっと世界に伝えたい！布教活動継続中📢',
    '{{name}}のことを考えるだけで元気が出る！最強の推しです👑',
    '{{name}}の誕生日はお祭り！カウントダウン楽しすぎる🎆',
    '{{name}}への想いは365日変わらない！いつもありがとう💝',
    '{{name}}のすべてが愛おしい！推しが推しで良かった🥰',
    '{{name}}と同じ時代に生きてる幸せを実感中…！🌍',
    '{{name}}の誕生日プレゼント何にしよう？考えるだけで幸せ🎀',
    '{{name}}のために作ったこのカウントダウン、見てくれてるかな？💌',
    '{{name}}の誕生日まで毎日がスペシャル！推し活最高🏆',
    '{{name}}の笑顔のために今日も全力応援！ファイト✊',
    '{{name}}に会える日を夢見て…推しは生きる活力💓',
    '{{name}}の誕生日が近いだけでQOL爆上がり！感謝🙌'
  ];

  // ── データ管理 ──
  var KEY = 'oshi-birthday-list';

  function loadOshis() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch(e) { return []; }
  }

  function saveOshis(list) {
    localStorage.setItem(KEY, JSON.stringify(list));
  }

  function addOshi() {
    var name = document.getElementById('oshi-name').value.trim();
    var bdInput = document.getElementById('oshi-birthday').value;
    if (!name) { alert('推しの名前を入力してください'); return; }
    if (!bdInput) { alert('誕生日を入力してください'); return; }

    var parts = bdInput.split('-');
    var month = parseInt(parts[1], 10);
    var day = parseInt(parts[2], 10);

    var list = loadOshis();
    list.push({ name: name, month: month, day: day });
    saveOshis(list);

    document.getElementById('oshi-name').value = '';
    document.getElementById('oshi-birthday').value = '';
    renderOshis();
  }

  function deleteOshi(idx) {
    var list = loadOshis();
    list.splice(idx, 1);
    saveOshis(list);
    renderOshis();
  }

  function getDaysUntil(month, day) {
    var now = new Date();
    var thisYear = now.getFullYear();
    var target = new Date(thisYear, month - 1, day);
    // 時間を0にして日数比較
    now = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (target < now) {
      target = new Date(thisYear + 1, month - 1, day);
    }
    var diff = Math.round((target - now) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function getRandomMessage(name) {
    var idx = Math.floor(Math.random() * MESSAGES.length);
    return MESSAGES[idx].replace(/\{\{name\}\}/g, name);
  }

  function renderOshis() {
    var list = loadOshis();
    var container = document.getElementById('oshi-list');
    if (list.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:var(--text-sub);font-size:0.88rem;margin:1rem 0;">まだ推しが登録されていません。上のフォームから登録しよう！</p>';
      return;
    }

    // カウントダウン日数順にソート
    var sorted = list.map(function(o, i) {
      return { name: o.name, month: o.month, day: o.day, idx: i, days: getDaysUntil(o.month, o.day) };
    }).sort(function(a, b) { return a.days - b.days; });

    container.innerHTML = sorted.map(function(o) {
      var isToday = o.days === 0;
      var countdownText = isToday ? '🎉 今日！' : 'あと ' + o.days + ' 日';
      var countdownClass = isToday ? 'countdown today' : 'countdown';
      var label = isToday ? 'お誕生日おめでとう！！' : '次の誕生日まで';
      var msg = getRandomMessage(o.name);

      return '<div class="oshi-card">'
        + '<button class="btn-delete no-print" onclick="deleteOshi(' + o.idx + ')" title="削除">✕</button>'
        + '<p class="oshi-name">💖 ' + escHtml(o.name) + '</p>'
        + '<p class="oshi-birthday">' + o.month + '月' + o.day + '日</p>'
        + '<p class="countdown-label">' + label + '</p>'
        + '<p class="' + countdownClass + '">' + countdownText + '</p>'
        + '<div class="message-box" id="msg-' + o.idx + '">' + escHtml(msg) + '</div>'
        + '<button class="btn-msg no-print" onclick="refreshMsg(' + o.idx + ')">🔄 メッセージを変える</button>'
        + '</div>';
    }).join('');
  }

  function refreshMsg(idx) {
    var list = loadOshis();
    var o = list[idx];
    if (!o) return;
    var msg = getRandomMessage(o.name);
    var el = document.getElementById('msg-' + idx);
    if (el) el.textContent = msg;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期表示
  renderOshis();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
