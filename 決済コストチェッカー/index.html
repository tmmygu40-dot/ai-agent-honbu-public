<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決済コストチェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .detail-table thead tr { border-bottom: 2px solid var(--border); }
    .detail-table th {
      padding: 0.5rem 0.4rem; font-size: 0.72rem; font-weight: 700;
      color: var(--text-sub); text-align: right;
    }
    .detail-table th:first-child { text-align: left; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.6rem 0.4rem; color: var(--text-sub); text-align: right; }
    .detail-table td:first-child { text-align: left; color: var(--text); font-weight: 600; }
    .detail-table .rank1 td { background: var(--ok-bg); }
    .detail-table .rank1 td:first-child { color: var(--ok); }
    .detail-table .rank1 td { color: var(--ok); font-weight: 700; }
    .rank-badge {
      display: inline-block; width: 1.6rem; height: 1.6rem;
      line-height: 1.6rem; text-align: center;
      border-radius: 50%; font-size: 0.75rem; font-weight: 800;
      background: var(--border); color: var(--text-sub); margin-right: 0.3rem;
    }
    .rank1 .rank-badge { background: #fbbf24; color: #78350f; }

    /* ── 決済手段リスト ── */
    .method-row {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .method-row input {
      padding: 0.6rem 0.75rem;
      font-size: 0.92rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .method-row input:focus { border-color: var(--accent); background: #fff; }
    .method-row .rate-wrap { position: relative; }
    .method-row .rate-wrap input { padding-right: 1.6rem; }
    .method-row .rate-unit {
      position: absolute; right: 0.6rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.82rem; color: var(--text-sub); pointer-events: none;
    }
    .btn-del {
      width: 36px; height: 36px; border: none;
      background: var(--ng-bg); color: var(--ng);
      border-radius: 9px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-del:hover { background: #fecaca; }
    .method-header {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .method-header span {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text-sub); padding-left: 0.2rem;
    }
    .btn-add {
      width: 100%; padding: 0.6rem;
      border: 1.5px dashed var(--accent);
      background: var(--accent-light); color: var(--accent);
      border-radius: 9px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:hover { background: #ffecd4; }

    /* ── 差額バッジ ── */
    .diff-ok   { color: var(--ok); }
    .diff-warn { color: var(--warn); }
    .diff-ng   { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>決済コストチェッカー</h1>
    <p class="subtitle">複数の決済手段の手数料を比較して最もお得な方法を即判断</p>
  </header>

  <!-- 売上金額 -->
  <div class="card">
    <p class="card-title">売上金額</p>
    <div class="field">
      <label for="saleAmount">売上金額（円）</label>
      <input type="number" id="saleAmount" placeholder="例: 10000" min="0" step="1">
      <p class="hint">手数料を差し引く前の売上・受取金額</p>
    </div>
  </div>

  <!-- 決済手段設定 -->
  <div class="card">
    <p class="card-title">決済手段設定</p>
    <div class="method-header">
      <span>決済手段名</span>
      <span>手数料率</span>
      <span></span>
    </div>
    <div id="methodList"></div>
    <button class="btn-add" onclick="addMethod()">＋ 決済手段を追加</button>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">最もお得な決済方法</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較表 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">比較ランキング</p>
    <table class="detail-table">
      <thead>
        <tr>
          <th>決済手段</th>
          <th>手数料率</th>
          <th>手数料額</th>
          <th>手取り額</th>
          <th>差額</th>
        </tr>
      </thead>
      <tbody id="db"></tbody>
    </table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
    var STORAGE_KEY = 'kessai-methods';

    var defaultMethods = [
      { name: '現金',    rate: 0    },
      { name: 'クレジットカード', rate: 3.24 },
      { name: 'QR決済',  rate: 1.98 },
    ];

    function loadMethods() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return defaultMethods.map(function(m) { return { name: m.name, rate: m.rate }; });
    }

    function saveMethods() {
      var rows = document.querySelectorAll('.method-row');
      var methods = [];
      rows.forEach(function(row) {
        var name = row.querySelector('.m-name').value.trim();
        var rate = parseFloat(row.querySelector('.m-rate').value);
        if (name) methods.push({ name: name, rate: isNaN(rate) ? 0 : rate });
      });
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(methods)); } catch(e) {}
      return methods;
    }

    function renderMethods(methods) {
      var list = document.getElementById('methodList');
      list.innerHTML = '';
      methods.forEach(function(m, i) {
        var row = document.createElement('div');
        row.className = 'method-row';
        row.innerHTML =
          '<input type="text" class="m-name" placeholder="例: PayPay" value="' + esc(m.name) + '">' +
          '<div class="rate-wrap"><input type="number" class="m-rate" placeholder="0.00" value="' + m.rate + '" min="0" max="100" step="0.01"><span class="rate-unit">%</span></div>' +
          '<button class="btn-del" onclick="delMethod(this)" title="削除">×</button>';
        list.appendChild(row);
      });
    }

    function addMethod() {
      var list = document.getElementById('methodList');
      var row = document.createElement('div');
      row.className = 'method-row';
      row.innerHTML =
        '<input type="text" class="m-name" placeholder="決済手段名">' +
        '<div class="rate-wrap"><input type="number" class="m-rate" placeholder="0.00" min="0" max="100" step="0.01"><span class="rate-unit">%</span></div>' +
        '<button class="btn-del" onclick="delMethod(this)" title="削除">×</button>';
      list.appendChild(row);
      row.querySelector('.m-name').focus();
    }

    function delMethod(btn) {
      var rows = document.querySelectorAll('.method-row');
      if (rows.length <= 1) { alert('最低1つの決済手段が必要です'); return; }
      btn.closest('.method-row').remove();
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
    function fmtDec(n, d) { return n.toLocaleString('ja-JP', { minimumFractionDigits: d, maximumFractionDigits: d }); }

    function calc() {
      var sale = parseFloat(document.getElementById('saleAmount').value);
      if (isNaN(sale) || sale <= 0) {
        showErr('売上金額を入力してください');
        return;
      }

      var methods = saveMethods();
      if (methods.length === 0) {
        showErr('決済手段を1つ以上入力してください');
        return;
      }

      // 計算
      var results = methods.map(function(m) {
        var fee = sale * m.rate / 100;
        var net = sale - fee;
        return { name: m.name, rate: m.rate, fee: fee, net: net };
      });

      // 手取り多い順にソート
      results.sort(function(a, b) { return b.net - a.net; });

      var best = results[0];
      var worst = results[results.length - 1];

      // 結論カード
      var rc = document.getElementById('result');
      rc.className = 'result-card ok';
      rc.style.display = 'block';
      document.getElementById('rv').textContent = best.name;
      document.getElementById('rn').textContent =
        '手取り ' + fmt(best.net) + ' 円（手数料 ' + fmt(best.fee) + ' 円 / ' + fmtDec(best.rate, 2) + '%）' +
        (results.length > 1 ? '\n最下位との差額 ' + fmt(best.net - worst.net) + ' 円' : '');

      // 比較表
      var tbody = document.getElementById('db');
      tbody.innerHTML = results.map(function(r, i) {
        var diff = r.net - best.net;
        var diffStr = diff === 0 ? '±0' : ('−' + fmt(Math.abs(diff)));
        var diffClass = diff === 0 ? 'diff-ok' : (diff > -500 ? 'diff-warn' : 'diff-ng');
        return '<tr class="' + (i === 0 ? 'rank1' : '') + '">' +
          '<td><span class="rank-badge">' + (i + 1) + '</span>' + esc(r.name) + '</td>' +
          '<td>' + fmtDec(r.rate, 2) + '%</td>' +
          '<td>' + fmt(r.fee) + ' 円</td>' +
          '<td>' + fmt(r.net) + ' 円</td>' +
          '<td class="' + diffClass + '">' + diffStr + ' 円</td>' +
          '</tr>';
      }).join('');
      document.getElementById('detail').style.display = '';

      // 結果カードまでスクロール
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showErr(msg) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ng';
      rc.style.display = 'block';
      document.getElementById('rv').textContent = '⚠️';
      document.getElementById('rn').textContent = msg;
      document.getElementById('detail').style.display = 'none';
    }

    // 初期化
    renderMethods(loadMethods());
  </script>

<script src="../fav-widget.js"></script>
</body>
</html>
