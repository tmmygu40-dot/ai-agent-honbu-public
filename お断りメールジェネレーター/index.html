<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お断りメールジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* シーン選択グリッド */
    .scene-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0;
    }
    .scene-btn {
      padding: 0.75rem 0.5rem;
      font-size: 0.88rem; font-weight: 600;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-sub);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .scene-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .scene-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 700; }

    /* 礼節レベル */
    .level-row {
      display: flex; gap: 0.6rem;
    }
    .level-btn {
      flex: 1; padding: 0.6rem;
      font-size: 0.88rem; font-weight: 600;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-sub);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .level-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .level-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 700; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 生成結果 ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .btn-copy {
      padding: 0.4rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: var(--ok); }
    .btn-pdf {
      padding: 0.4rem 1rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--text-sub); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.15s; margin-left: 0.4rem;
    }
    .btn-pdf:hover { opacity: 0.85; }
    @media print {
      .app-header, .card, .btn-calc, .result-card-title .btn-copy, .result-card-title .btn-pdf, .back-link, #history-list, script, .result-card-title span { }
      body > *:not(.result-card) { display: none !important; }
      .result-card { display: block !important; border: none; box-shadow: none; padding: 0; }
    }

    #mail-output {
      white-space: pre-wrap;
      font-size: 0.92rem; line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      border-radius: 9px;
      padding: 1rem;
      border: 1px solid var(--border);
    }

    /* ── 履歴カード ── */
    .history-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.7rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-item:last-child { margin-bottom: 0; }
    .history-meta { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .history-preview { font-size: 0.85rem; color: var(--text); line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>お断りメールジェネレーター</h1>
    <p class="subtitle">取引先への断り・辞退メールを理由別に即生成</p>
  </header>

  <!-- シーン選択 -->
  <div class="card">
    <p class="card-title">① お断りシーンを選ぶ</p>
    <div class="scene-grid" id="scene-grid">
      <button class="scene-btn active" data-scene="mitsumori" onclick="selectScene(this)">見積もり辞退</button>
      <button class="scene-btn" data-scene="hassyu" onclick="selectScene(this)">発注お断り</button>
      <button class="scene-btn" data-scene="teian" onclick="selectScene(this)">提案・営業お断り</button>
      <button class="scene-btn" data-scene="torihiki" onclick="selectScene(this)">取引終了</button>
      <button class="scene-btn" data-scene="mendan" onclick="selectScene(this)">面談・訪問お断り</button>
      <button class="scene-btn" data-scene="kyoryoku" onclick="selectScene(this)">協力依頼お断り</button>
    </div>
  </div>

  <!-- 礼節レベル -->
  <div class="card">
    <p class="card-title">② 礼節レベル</p>
    <div class="level-row" id="level-row">
      <button class="level-btn active" data-level="formal" onclick="selectLevel(this)">丁寧（正式）</button>
      <button class="level-btn" data-level="casual" onclick="selectLevel(this)">簡潔（実務的）</button>
    </div>
  </div>

  <!-- 情報入力 -->
  <div class="card">
    <p class="card-title">③ 情報を入力する</p>
    <div class="field">
      <label for="to-company">宛先 会社名</label>
      <input type="text" id="to-company" placeholder="例：株式会社○○">
    </div>
    <div class="field">
      <label for="to-person">宛先 担当者名</label>
      <input type="text" id="to-person" placeholder="例：山田 太郎">
    </div>
    <div class="field">
      <label for="from-name">差出人名（署名）</label>
      <input type="text" id="from-name" placeholder="例：田中 花子">
    </div>
    <div class="field">
      <label for="extra">補足・追加コメント（任意）</label>
      <textarea id="extra" placeholder="例：今後機会があればご連絡させていただきます"></textarea>
      <p class="hint">追加したい一文があればここに入力してください</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">メール文を生成する</button>

  <!-- 生成結果 -->
  <div class="result-card" id="result-card">
    <div class="result-card-title">
      <span>生成されたメール文</span>
      <button class="btn-copy" id="copy-btn" onclick="copyMail()">コピー</button>
      <button class="btn-pdf" onclick="window.print()">PDFで保存</button>
    </div>
    <pre id="mail-output"></pre>
  </div>

  <!-- 履歴 -->
  <div class="card">
    <p class="card-title">生成履歴（最大5件）</p>
    <div id="history-list"><p class="history-empty">まだ履歴はありません</p></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var selectedScene = 'mitsumori';
  var selectedLevel = 'formal';

  // シーン選択
  function selectScene(btn) {
    document.querySelectorAll('.scene-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedScene = btn.dataset.scene;
  }

  // 礼節レベル
  function selectLevel(btn) {
    document.querySelectorAll('.level-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedLevel = btn.dataset.level;
  }

  // 件名・本文テンプレ
  var templates = {
    mitsumori: {
      label: '見積もり辞退',
      subject: 'お見積もりに関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nこの度はお見積もりをいただきまして、誠にありがとうございました。\n慎重に検討いたしました結果、誠に遺憾ながら今回は見送らせていただくことになりました。\n\nご提案いただいた内容は大変魅力的でしたが、社内事情により今回はご縁がなく、何卒ご了承いただけますようお願い申し上げます。\n\n{extra}\n\n今後ともよろしくお願い申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\nこの度はお見積もりをいただき、ありがとうございました。\n検討の結果、今回は別の形で進めることになりました。\n\n{extra}\n\n引き続きどうぞよろしくお願いいたします。'
    },
    hassyu: {
      label: '発注お断り',
      subject: 'ご発注に関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nこの度はご発注のご意向をお示しいただき、誠にありがとうございました。\n検討いたしました結果、誠に残念ながら今回はご期待に沿えない状況となりました。\n\nご不便をおかけすることをお詫び申し上げるとともに、何卒ご了承いただけますようお願い申し上げます。\n\n{extra}\n\n今後ともよろしくお願い申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\nご発注のご意向をいただき、ありがとうございます。\n誠に恐縮ですが、現在の状況では今回のご対応が難しい状況です。\n\n{extra}\n\n引き続きどうぞよろしくお願いいたします。'
    },
    teian: {
      label: '提案・営業お断り',
      subject: 'ご提案に関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nこの度は貴重なご提案をいただきまして、誠にありがとうございました。\n内容を慎重に検討いたしました結果、誠に遺憾ながら今回はご提案を見送らせていただくことになりました。\n\nせっかくお時間をいただきましたにもかかわらず、ご期待に沿えない形となりましたことを深くお詫び申し上げます。\n\n{extra}\n\n今後ともよろしくお願い申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\nこの度はご提案いただき、ありがとうございました。\n検討いたしましたが、今回はお受けするのが難しい状況です。\n\n{extra}\n\n引き続きよろしくお願いいたします。'
    },
    torihiki: {
      label: '取引終了',
      subject: '取引終了に関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nいつもお世話になっております。長年にわたりご支援いただきましたこと、心より感謝申し上げます。\n\n誠に恐れ入りますが、この度弊社都合により、誠に遺憾ながら今後の取引を終了させていただく運びとなりました。\n\nこれまでのご厚情に心より感謝を申し上げますとともに、突然のご連絡となりましたことを深くお詫び申し上げます。\n\n{extra}\n\n貴社のますますのご発展を心よりお祈り申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\n長らくお取引いただきありがとうございました。\n誠に恐縮ですが、弊社の都合により、今後のお取引を終了させていただくことになりました。\n\n{extra}\n\nこれまでのご厚情に感謝申し上げます。'
    },
    mendan: {
      label: '面談・訪問お断り',
      subject: 'ご面談のご依頼に関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nこの度はご面談のご依頼をいただきまして、誠にありがとうございます。\n誠に恐縮ではございますが、現在業務の都合上、ご面談のお時間をいただくことが難しい状況でございます。\n\nせっかくのお申し出にもかかわらず、ご期待に沿えない形となりましたことを心よりお詫び申し上げます。\n\n{extra}\n\n今後ともよろしくお願い申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\nご面談のご依頼ありがとうございます。\n現在のところ、ご対応できる状況ではないため、今回はお断りさせていただきます。\n\n{extra}\n\nどうぞよろしくお願いいたします。'
    },
    kyoryoku: {
      label: '協力依頼お断り',
      subject: 'ご依頼に関するご連絡',
      formal: '拝啓 {season}の候、貴社ますますご清栄のこととお慶び申し上げます。\n\nこの度はご依頼をいただきまして、誠にありがとうございます。\n検討いたしました結果、誠に遺憾ながら今回はご要望に応じることが難しい状況でございます。\n\nお力になれない状況となりましたことを、誠に申し訳なく思っております。\n\n{extra}\n\n今後ともよろしくお願い申し上げます。\n\n敬具',
      casual: 'いつもお世話になっております。\n\nご依頼ありがとうございます。\n大変恐縮ですが、現状では対応が難しい状況のため、今回はお断りさせていただきます。\n\n{extra}\n\nよろしくお願いいたします。'
    }
  };

  // 季節取得
  function getSeason() {
    var m = new Date().getMonth() + 1;
    if (m <= 2)  return '厳寒';
    if (m <= 4)  return '春暖';
    if (m <= 6)  return '初夏';
    if (m <= 8)  return '盛夏';
    if (m <= 10) return '秋涼';
    return '晩秋';
  }

  function generate() {
    var toCompany = document.getElementById('to-company').value.trim();
    var toPerson  = document.getElementById('to-person').value.trim();
    var fromName  = document.getElementById('from-name').value.trim();
    var extra     = document.getElementById('extra').value.trim();

    var tmpl = templates[selectedScene];
    var bodyTmpl = selectedLevel === 'formal' ? tmpl.formal : tmpl.casual;

    var toLine = toCompany ? toCompany : '（宛先会社名）';
    if (toPerson) toLine += '\n' + toPerson + ' 様';
    else toLine += '\nご担当者 様';

    var bodyText = bodyTmpl
      .replace(/\{season\}/g, getSeason())
      .replace(/\{extra\}/g, extra || '');

    // extra が空なら空行を除去
    if (!extra) {
      bodyText = bodyText.replace(/\n\n\n/g, '\n\n');
    }

    var subject = '件名：' + tmpl.subject;
    var sign = fromName ? '\n\n---\n' + fromName : '';

    var mail = toLine + '\n\n' + subject + '\n\n' + bodyText + sign;

    document.getElementById('mail-output').textContent = mail;
    var rc = document.getElementById('result-card');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // コピーボタンをリセット
    var cb = document.getElementById('copy-btn');
    cb.textContent = 'コピー';
    cb.className = 'btn-copy';

    // 履歴保存
    saveHistory({
      scene: tmpl.label,
      to: toLine.split('\n')[0],
      text: mail,
      date: new Date().toLocaleDateString('ja-JP')
    });
    renderHistory();
  }

  function copyMail() {
    var text = document.getElementById('mail-output').textContent;
    navigator.clipboard.writeText(text).then(function() {
      var cb = document.getElementById('copy-btn');
      cb.textContent = 'コピー済み';
      cb.className = 'btn-copy copied';
      setTimeout(function(){
        cb.textContent = 'コピー';
        cb.className = 'btn-copy';
      }, 2000);
    }).catch(function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }

  // ── localStorage ──
  var STORAGE_KEY = '断りメール_history_v1';

  function saveHistory(item) {
    var list = loadHistory();
    list.unshift(item);
    if (list.length > 5) list = list.slice(0, 5);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch(e){}
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  function renderHistory() {
    var list = loadHistory();
    var el = document.getElementById('history-list');
    if (!list.length) {
      el.innerHTML = '<p class="history-empty">まだ履歴はありません</p>';
      return;
    }
    el.innerHTML = list.map(function(item, i) {
      return '<div class="history-item" onclick="loadHistory_' + i + '()">'
           + '<div class="history-meta">' + item.date + '　' + item.scene + '　→　' + item.to + '</div>'
           + '<div class="history-preview">' + item.text.replace(/</g,'&lt;').substring(0,60) + '…</div>'
           + '</div>';
    }).join('');

    // 各履歴ボタンのクリックハンドラを動的生成
    list.forEach(function(item, i) {
      window['loadHistory_' + i] = function() {
        document.getElementById('mail-output').textContent = item.text;
        var rc = document.getElementById('result-card');
        rc.style.display = 'block';
        rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
        var cb = document.getElementById('copy-btn');
        cb.textContent = 'コピー';
        cb.className = 'btn-copy';
      };
    });
  }

  // 初期化
  renderHistory();
