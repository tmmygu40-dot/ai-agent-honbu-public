<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水分管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💧 水分管理</h1>
      <div class="date-display" id="dateDisplay"></div>
    </header>

    <section class="goal-section">
      <div class="goal-row">
        <label for="goalInput">目標水分量</label>
        <div class="goal-input-wrap">
          <input type="number" id="goalInput" value="2000" min="100" max="9999" step="100">
          <span>mL</span>
          <button id="setGoalBtn">設定</button>
        </div>
      </div>
    </section>

    <section class="progress-section">
      <div class="progress-numbers">
        <span class="current-amount" id="currentAmount">0</span>
        <span class="separator"> / </span>
        <span class="goal-amount" id="goalAmount">2000</span>
        <span class="unit">mL</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="remaining-text" id="remainingText">残り 2000 mL</div>
    </section>

    <section class="add-section">
      <h2>飲んだ量を追加</h2>
      <div class="add-form">
        <input type="text" id="drinkName" placeholder="種類（水・お茶など）" maxlength="20">
        <div class="amount-row">
          <input type="number" id="drinkAmount" placeholder="量 (mL)" min="1" max="9999" step="10">
          <span>mL</span>
        </div>
        <div class="quick-buttons">
          <button class="quick-btn" data-amount="100">100mL</button>
          <button class="quick-btn" data-amount="150">150mL</button>
          <button class="quick-btn" data-amount="200">200mL</button>
          <button class="quick-btn" data-amount="250">250mL</button>
          <button class="quick-btn" data-amount="500">500mL</button>
        </div>
        <button id="addBtn" class="add-btn">追加</button>
      </div>
    </section>

    <section class="records-section">
      <div class="records-header">
        <h2>今日の記録</h2>
        <button id="resetBtn" class="reset-btn">リセット</button>
      </div>
      <ul id="recordList" class="record-list"></ul>
      <p id="emptyMsg" class="empty-msg">まだ記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
