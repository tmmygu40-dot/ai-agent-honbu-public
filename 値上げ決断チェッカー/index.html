<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ決断チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>値上げ決断チェッカー</h1>
    <p class="subtitle">客離れを加味して値上げ後の売上が増えるか減るかを即確認</p>

    <section class="input-section card">
      <h2>基本情報を入力</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="currentSales">現在の月間売上（円）</label>
          <input type="number" id="currentSales" placeholder="例：500000" min="0">
        </div>
        <div class="form-group">
          <label for="currentCustomers">現在の月間客数（人）</label>
          <input type="number" id="currentCustomers" placeholder="例：100" min="1">
        </div>
        <div class="form-group">
          <label for="priceUpRate">値上げ率（%）</label>
          <input type="number" id="priceUpRate" placeholder="例：10" min="0" max="100" step="0.1">
        </div>
        <div class="form-group">
          <label for="churnRate">想定客離れ率（%）</label>
          <input type="number" id="churnRate" placeholder="例：15" min="0" max="100" step="0.1">
        </div>
      </div>
      <button id="calcBtn" class="btn-primary">計算する</button>
      <button id="saveBtn" class="btn-secondary">入力値を保存</button>
    </section>

    <section class="result-section card" id="resultSection" style="display:none;">
      <h2>計算結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="label">現在の客単価</span>
          <span class="value" id="unitPrice">―</span>
        </div>
        <div class="result-item">
          <span class="label">値上げ後の客単価</span>
          <span class="value" id="newUnitPrice">―</span>
        </div>
        <div class="result-item">
          <span class="label">値上げ後の客数</span>
          <span class="value" id="newCustomers">―</span>
        </div>
        <div class="result-item">
          <span class="label">値上げ後の月間売上</span>
          <span class="value" id="newSales">―</span>
        </div>
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="diff" id="diff"></div>
    </section>

    <section class="scenario-section card" id="scenarioSection" style="display:none;">
      <h2>シナリオ一覧（値上げ率1〜20%）</h2>
      <p class="scenario-note">客離れ率: <span id="scenarioChurn">―</span>% 固定</p>
      <div class="table-wrap">
        <table id="scenarioTable">
          <thead>
            <tr>
              <th>値上げ率</th>
              <th>値上げ後売上</th>
              <th>増減額</th>
              <th>増減率</th>
              <th>判定</th>
            </tr>
          </thead>
          <tbody id="scenarioBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
