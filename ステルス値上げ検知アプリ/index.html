<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ステルス値上げ検知アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>ステルス値上げ検知アプリ</h1>
    <p class="subtitle">内容量・価格の変化から実質値上がり率を計算します</p>

    <div class="card">
      <h2>商品情報を入力</h2>
      <div class="form-group">
        <label for="productName">商品名</label>
        <input type="text" id="productName" placeholder="例：○○スナック菓子" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="oldAmount">旧内容量</label>
          <div class="input-with-unit">
            <input type="number" id="oldAmount" placeholder="例：200" min="0" step="any">
            <input type="text" id="unit" placeholder="g" class="unit-input">
          </div>
        </div>
        <div class="form-group">
          <label for="newAmount">新内容量</label>
          <div class="input-with-unit">
            <input type="number" id="newAmount" placeholder="例：180" min="0" step="any">
            <span class="unit-label" id="unitLabel">g</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="oldPrice">旧価格（円）</label>
          <input type="number" id="oldPrice" placeholder="例：200" min="0" step="any">
        </div>
        <div class="form-group">
          <label for="newPrice">新価格（円）</label>
          <input type="number" id="newPrice" placeholder="例：200" min="0" step="any">
        </div>
      </div>
      <button class="btn-calc" onclick="calculate()">計算する</button>
    </div>

    <div id="resultCard" class="card result-card hidden">
      <h2>計算結果</h2>
      <div id="resultContent"></div>
      <button class="btn-save" onclick="saveRecord()">この結果を保存</button>
    </div>

    <div class="card" id="historyCard">
      <div class="history-header">
        <h2>保存済み履歴</h2>
        <button class="btn-clear" onclick="clearAll()">全削除</button>
      </div>
      <div id="historyList">
        <p class="empty-msg">まだ保存されたデータはありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
