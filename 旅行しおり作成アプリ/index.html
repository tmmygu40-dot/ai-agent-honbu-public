<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行しおり作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>✈️ 旅行しおり作成</h1>
      <div class="header-btns">
        <button id="btn-clear" class="btn-danger">クリア</button>
        <button id="btn-print" class="btn-primary">🖨️ 印刷</button>
      </div>
    </header>

    <!-- 旅行基本情報 -->
    <section class="card" id="section-info">
      <h2>基本情報</h2>
      <div class="form-grid">
        <label>旅行タイトル
          <input type="text" id="trip-title" placeholder="例：京都・奈良旅行">
        </label>
        <label>旅行期間
          <input type="text" id="trip-date" placeholder="例：2026年5月3日〜5日">
        </label>
        <label>集合場所
          <input type="text" id="trip-place" placeholder="例：東京駅 新幹線乗り場">
        </label>
        <label>集合時間
          <input type="text" id="trip-time" placeholder="例：8:30">
        </label>
        <label class="full-width">メモ
          <textarea id="trip-memo" rows="2" placeholder="例：雨天決行、各自昼食持参"></textarea>
        </label>
      </div>
    </section>

    <!-- 日程 -->
    <section class="card" id="section-schedule">
      <h2>日程スケジュール</h2>
      <div class="add-form">
        <input type="text" id="sch-day" placeholder="日程（例：1日目）" style="width:90px">
        <input type="text" id="sch-time" placeholder="時間（例：10:00）" style="width:90px">
        <input type="text" id="sch-place" placeholder="場所" style="flex:1">
        <input type="text" id="sch-content" placeholder="内容" style="flex:2">
        <button id="btn-add-sch" class="btn-primary">追加</button>
      </div>
      <table id="schedule-table">
        <thead>
          <tr>
            <th>日程</th>
            <th>時間</th>
            <th>場所</th>
            <th>内容</th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
      <p id="schedule-empty" class="empty-msg">日程が登録されていません</p>
    </section>

    <!-- 持ち物 -->
    <section class="card" id="section-items">
      <h2>持ち物リスト</h2>
      <div class="add-form">
        <input type="text" id="item-name" placeholder="持ち物を入力" style="flex:1">
        <button id="btn-add-item" class="btn-primary">追加</button>
      </div>
      <ul id="items-list"></ul>
      <p id="items-empty" class="empty-msg">持ち物が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
