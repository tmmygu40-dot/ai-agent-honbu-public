<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポジティブ変換ジョーク生成器 - イライラを笑いに変える</title>
  <meta name="description" content="今日のイライラを3択で答えるだけで、笑いに変えるポジティブなジョーク文を即生成します。仕事・家事・人間関係など、どんなイライラも楽しく解決できます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ラジオボタン（3択） ── */
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.5rem; }
    .radio-group { display: flex; flex-direction: column; gap: 0.8rem; }
    .radio-option {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.15s;
    }
    .radio-option:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .radio-option input[type="radio"] {
      width: 18px; height: 18px; flex-shrink: 0; cursor: pointer;
    }
    .radio-option span {
      font-size: 0.92rem;
      color: var(--text);
      flex: 1;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード（ジョーク文表示） ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-value {
      font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em;
      line-height: 1.6; margin-bottom: 1rem;
      color: var(--text);
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy:active { transform: scale(0.98); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>😊 ポジティブ変換ジョーク生成器</h1>
    <p class="subtitle">今日のイライラを楽しく笑いに変えます</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたのイライラを選んでください</p>
    <div class="field">
      <label>今日のイライラは？</label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="irritation" value="work">
          <span>💼 仕事・やることが終わらない</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="irritation" value="household">
          <span>🧹 家事・やることが多い</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="irritation" value="relations">
          <span>👥 人間関係・疲れた</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 変換ボタン -->
  <button class="btn-calc" onclick="generateJoke()">変換する</button>

  <!-- 結果カード（ジョーク文） -->
  <div class="result-card" id="result">
    <p class="result-label">✨ あなたへの処方箋</p>
    <p class="result-value" id="joke-text"></p>
  </div>

  <!-- コピーボタン -->
  <button class="btn-copy" id="copy-btn" onclick="copyToClipboard()" style="display:none">📋 このジョークをコピー</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ジョークデータベース
  var jokes = {
    work: [
      '「終わらない」って言ってるのは、まだ締め切りが来てないってことだよ。つまり、あと時間あるじゃん。余裕！',
      'やることが多い？じゃあ完璧を目指すのやめようぜ。60点で十分。その分、好きなことに時間使おう。',
      'やることが終わらない時の必殺技：「今日できたこと」をメモする。意外とできてる。自分のこと、褒めてあげて。'
    ],
    household: [
      '家事って、終わりじゃなくて「輪廻」なんだよ。洗濯→乾く→畳む→着る→汚れる→洗濯…これが人生。悟りを開こう。',
      '今日の家事をやらないと明日の不幸が…と思ってたけど、別に明日でもいいや。人類はそうやって進化してきた。',
      'やることが多い？なら「やらないこと」を決めちゃおう。完璧な家じゃなくて、居心地よい家を作ろう。'
    ],
    relations: [
      '人間関係で疲れた時は、人間を一回やめればいいんだよ。猫になりませんか？猫は気ままでいいぞ。',
      '誰もあなたのこと、そこまで見てない。みんな自分のこと必死。だから堂々としてていいんだ。',
      '疲れたら逃げちゃおう。「今は疲れてる」って言ってみ。案外みんな「あ、そっか」ってなる。正直が一番強い。'
    ]
  };

  var lastJoke = '';

  function generateJoke() {
    var selected = document.querySelector('input[name="irritation"]:checked');
    if (!selected) {
      showErr('イライラを1つ選んでください');
      return;
    }

    var category = selected.value;
    var jokeList = jokes[category];
    var randomJoke = jokeList[Math.floor(Math.random() * jokeList.length)];

    lastJoke = randomJoke;
    showResult(randomJoke);
    saveToStorage(category, randomJoke);
  }

  function showResult(text) {
    var rc = document.getElementById('result');
    rc.style.display = '';
    document.getElementById('joke-text').textContent = text;
    document.getElementById('copy-btn').style.display = '';
  }

  function copyToClipboard() {
    if (navigator.clipboard && lastJoke) {
      navigator.clipboard.writeText(lastJoke).then(function() {
        var btn = document.getElementById('copy-btn');
        var orig = btn.textContent;
        btn.textContent = '✅ コピーしました！';
        setTimeout(function() { btn.textContent = orig; }, 2000);
      });
    }
  }

  function showErr(msg) {
    showResult('⚠️ ' + msg);
    document.getElementById('copy-btn').style.display = 'none';
  }

  // localStorage 保存
  function saveToStorage(category, joke) {
    var data = {
      category: category,
      joke: joke,
      timestamp: new Date().toLocaleString('ja-JP')
    };
    localStorage.setItem('positiveJokeData', JSON.stringify(data));
  }

  // 初期化：前回の選択を復元
  window.addEventListener('load', function() {
    var data = localStorage.getItem('positiveJokeData');
    if (data) {
      try {
        var parsed = JSON.parse(data);
        // チェックボックスを復元
        var radio = document.querySelector('input[name="irritation"][value="' + parsed.category + '"]');
        if (radio) radio.checked = true;
      } catch(e) {}
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
