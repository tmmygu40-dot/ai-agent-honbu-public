<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リーグ戦管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>リーグ戦管理</h1>

    <!-- チーム登録 -->
    <section class="card">
      <h2>チーム登録</h2>
      <div class="input-row">
        <input type="text" id="teamNameInput" placeholder="チーム名を入力" maxlength="30">
        <button id="addTeamBtn">追加</button>
      </div>
      <ul id="teamList" class="team-list"></ul>
    </section>

    <!-- 試合結果入力 -->
    <section class="card">
      <h2>試合結果入力</h2>
      <div class="match-form">
        <div class="match-row">
          <select id="homeTeam"></select>
          <span class="vs-label">vs</span>
          <select id="awayTeam"></select>
        </div>
        <div class="match-row score-row">
          <input type="number" id="homeScore" min="0" value="0" class="score-input">
          <span class="score-sep">–</span>
          <input type="number" id="awayScore" min="0" value="0" class="score-input">
        </div>
        <button id="addMatchBtn" class="btn-primary">結果を登録</button>
      </div>

      <h3>登録済み試合</h3>
      <ul id="matchList" class="match-list"></ul>
    </section>

    <!-- 順位表 -->
    <section class="card">
      <h2>順位表</h2>
      <div class="table-wrap">
        <table id="standingsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>チーム</th>
              <th>試合</th>
              <th>勝</th>
              <th>分</th>
              <th>負</th>
              <th>得点</th>
              <th>失点</th>
              <th>得失</th>
              <th>勝点</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </section>

    <!-- リセット -->
    <div class="reset-area">
      <button id="resetBtn" class="btn-danger">全データをリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
