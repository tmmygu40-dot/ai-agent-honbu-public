<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発注管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>発注管理</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>発注を登録する</h2>
      <div class="form-grid">
        <label>
          発注先<span class="required">*</span>
          <input type="text" id="supplier" placeholder="例：〇〇商事">
        </label>
        <label>
          品名<span class="required">*</span>
          <input type="text" id="itemName" placeholder="例：A4コピー用紙">
        </label>
        <label>
          数量
          <input type="number" id="quantity" placeholder="例：100" min="1">
        </label>
        <label>
          発注日<span class="required">*</span>
          <input type="date" id="orderDate">
        </label>
        <label>
          納期<span class="required">*</span>
          <input type="date" id="dueDate">
        </label>
        <label>
          備考
          <input type="text" id="note" placeholder="例：急ぎ">
        </label>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <div class="filter-tabs">
        <button class="tab active" data-filter="pending">未入荷</button>
        <button class="tab" data-filter="received">入荷済み</button>
        <button class="tab" data-filter="all">すべて</button>
      </div>
      <div class="summary" id="summary"></div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <ul id="orderList"></ul>
      <p class="empty-msg" id="emptyMsg">発注データがありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
