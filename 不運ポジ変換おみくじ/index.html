<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>不運ポジ変換おみくじ｜今日の不運を名言に変える無料ツール</title>
  <meta name="description" content="今日の不運をカテゴリ選択 or 自由入力するだけで、偉人風のポジティブ名言に変換して笑い飛ばせるおみくじアプリ。落ち込んだ気分を一瞬で前向きに切り替えられます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #c2185b;
      --accent-light: #fff0f6;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #8e1145, 0 6px 16px rgba(194,24,91,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8e1145, 0 2px 8px rgba(194,24,91,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.6rem 1.3rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.shown {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.5rem; }
    .result-fortune { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 0.8rem; letter-spacing: -0.02em; }
    .result-quote { font-size: 1.15rem; font-weight: 700; line-height: 1.6; color: var(--text); margin-bottom: 0.8rem; padding: 0 0.3rem; }
    .result-author { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 0.6rem; }
    .result-input { font-size: 0.82rem; color: var(--text-sub); background: rgba(0,0,0,0.04); padding: 0.5rem 0.7rem; border-radius: 8px; margin-top: 0.8rem; line-height: 1.5; }

    .history-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.2rem; }
    .history-input { color: var(--text-sub); }
    .history-quote { color: var(--text); font-weight: 600; margin-top: 0.2rem; }
    .history-empty { font-size: 0.82rem; color: var(--text-sub); text-align: center; padding: 0.5rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎴 不運ポジ変換おみくじ</h1>
    <p class="subtitle">今日の不運を、偉人風の名言に変えて笑い飛ばす</p>
  </header>

  <div class="card">
    <p class="card-title">今日の不運</p>
    <div class="field">
      <label for="cat">カテゴリを選ぶ</label>
      <select id="cat">
        <option value="random">おまかせ（ランダム）</option>
        <option value="work">仕事でやらかした</option>
        <option value="human">人間関係でモヤモヤ</option>
        <option value="money">お金で痛い目にあった</option>
        <option value="health">体調不良・ケガ</option>
        <option value="love">恋愛でズッコケた</option>
        <option value="daily">日常のささいな不運</option>
      </select>
      <p class="hint">下に何があったかメモしてもOK（空欄でも引けます）</p>
    </div>
    <div class="field">
      <label for="memo">何があった？（任意・100字まで）</label>
      <input type="text" id="memo" maxlength="100" placeholder="例: 朝から傘を忘れて土砂降り">
    </div>
  </div>

  <button class="btn-calc" onclick="draw()">🎴 おみくじを引く</button>

  <div class="result-card" id="result">
    <p class="result-label">今日のおみくじ</p>
    <p class="result-fortune" id="rf">—</p>
    <p class="result-quote" id="rq">—</p>
    <p class="result-author" id="ra">—</p>
    <p class="result-input" id="ri" style="display:none"></p>
  </div>

  <div class="card">
    <p class="card-title">履歴（直近3件）</p>
    <div id="history"><p class="history-empty">まだ履歴がありません</p></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 名言は古今東西の偉人の言葉や格言を参考に、不運を笑いに変えるためのアレンジを加えています。完全な原典再現ではない場合があります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'furun_poji_history_v1';

  var FORTUNES = ['大吉', '中吉', '小吉', '吉', '末吉', '凶からの大逆転'];

  var QUOTES = {
    work: [
      { q: '失敗は成功の母である。今日のやらかしは、明日の伝説の序章だ。', a: '— エジソン風' },
      { q: '人は躓いた時にしか、地面の固さに気づけない。さあ、立ち上がる番だ。', a: '— 老子風' },
      { q: '完璧な仕事よりも、続けられる仕事の方が偉い。今日も続けたお前は偉い。', a: '— ドラッカー風' },
      { q: 'ミスをしない人間とは、何もしない人間のことだ。お前は今日、何かをした。', a: '— ルーズベルト風' },
      { q: '叱られた数だけ、お前の物語は厚くなる。回想シーンが増えただけだ。', a: '— 司馬遼太郎風' }
    ],
    human: [
      { q: '人を理解しようとする者は、まず自分の影と握手せよ。', a: '— ユング風' },
      { q: '合わない人間に出会うのは、合う人間を見つけるための地図づくりだ。', a: '— ソクラテス風' },
      { q: '他人の評価は他人の宿題。お前が代わりに解いてやる必要はない。', a: '— アドラー風' },
      { q: '気まずい沈黙は、心の中で名曲が流れている時間と思え。', a: '— 寺山修司風' },
      { q: '嫌われる勇気を持った日、お前の世界は半分軽くなる。', a: '— アドラー風' }
    ],
    money: [
      { q: '金は天下の回りもの。今日はお前の番が早めに来ただけだ。', a: '— 福沢諭吉風' },
      { q: '失った金額は、得た経験値で換算せよ。お前は今、レベルアップ中だ。', a: '— ドラクエ風' },
      { q: '財布の軽さは、心の軽さと比例することがある。風が吹いて気持ちいい。', a: '— 良寛風' },
      { q: '金で買える幸せは、金で消える幸せ。お前は別の幸せを探す権利を得た。', a: '— 渋沢栄一風' },
      { q: '貯金より大事なのは貯人脈、貯経験、貯笑い話。お前は今日、笑い話を貯めた。', a: '— 松下幸之助風' }
    ],
    health: [
      { q: '体が悲鳴を上げる時は、心が休めと言っている時だ。素直に聞け。', a: '— ヒポクラテス風' },
      { q: '健康は失って気づくが、気づいた時から取り戻せる。今日が一番若い日だ。', a: '— 貝原益軒風' },
      { q: '寝込む日は、人生の余白。空白のページにも意味がある。', a: '— 夏目漱石風' },
      { q: '痛みは体からの手紙。読んだら捨てて、ゆっくり休め。', a: '— ナイチンゲール風' },
      { q: '病は気から、回復も気から。お前の気は、まだ十分残っている。', a: '— 杉田玄白風' }
    ],
    love: [
      { q: '恋は片想いで完成する芸術である。両想いはおまけにすぎない。', a: '— 太宰治風' },
      { q: '失恋は、次の恋のための予告編。本編はまだ始まっていない。', a: '— ゲーテ風' },
      { q: 'フラれた数だけ、お前の優しさは深くなる。誰かがその深さを必要としている。', a: '— サン＝テグジュペリ風' },
      { q: '愛されるより愛したい、と歌った男は、結局たくさん愛された。', a: '— 槇原敬之風' },
      { q: '別れは出会いの逆再生ではなく、新しい出会いの予告映像だ。', a: '— ヘミングウェイ風' }
    ],
    daily: [
      { q: '雨に濡れた服は乾くが、雨に濡れた思い出は語り草になる。', a: '— 松尾芭蕉風' },
      { q: '電車を逃した時にだけ見える景色がある。お前はそれを見るために逃した。', a: '— 寺田寅彦風' },
      { q: '小さな不運は、大きな不運からお前を守るためのワクチンだ。', a: '— 中村天風風' },
      { q: '今日の災難は、明日の話のネタ。話のネタは、生きるための燃料。', a: '— 落語家風' },
      { q: '転んだ時に空が見えるのは、上を向けというサインだ。', a: '— 坂村真民風' }
    ],
    universal: [
      { q: '今日が最悪なら、明日からは全部マシな日だ。お前は底を打った。', a: '— ニーチェ風' },
      { q: '雲の上はいつも晴れ。今は雲の中を歩いているだけだ。', a: '— 三浦綾子風' },
      { q: '泣いた数だけ、笑える日が用意されている。帳尻は合うようにできている。', a: '— アンデルセン風' },
      { q: '人生は山あり谷あり。谷の景色を覚えておくと、山で語れる。', a: '— 司馬遼太郎風' },
      { q: '不運は、お前が物語の主人公である証拠。脇役には不運すら回ってこない。', a: '— シェイクスピア風' },
      { q: '雨の日は、傘を持たない自分の自由を知る日だ。', a: '— 寺山修司風' },
      { q: '逆境は人格の彫刻刀。お前は今、磨かれている最中だ。', a: '— セネカ風' }
    ]
  };

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function draw() {
    var cat = document.getElementById('cat').value;
    var memo = document.getElementById('memo').value.trim();

    var pool;
    if (cat === 'random' || !QUOTES[cat]) {
      // 全カテゴリ + universal をマージしてランダム
      pool = QUOTES.universal.slice();
      ['work','human','money','health','love','daily'].forEach(function(k){
        pool = pool.concat(QUOTES[k]);
      });
    } else {
      pool = QUOTES[cat].concat(QUOTES.universal);
    }

    var picked = pick(pool);
    var fortune = pick(FORTUNES);

    var rc = document.getElementById('result');
    rc.className = 'result-card shown';
    rc.style.display = 'block';
    document.getElementById('rf').textContent = fortune;
    document.getElementById('rq').textContent = '「' + picked.q + '」';
    document.getElementById('ra').textContent = picked.a;

    var ri = document.getElementById('ri');
    if (memo) {
      ri.textContent = '今日の不運: ' + memo;
      ri.style.display = 'block';
    } else {
      ri.style.display = 'none';
    }

    saveHistory({
      date: formatDate(new Date()),
      cat: cat,
      memo: memo,
      fortune: fortune,
      quote: picked.q,
      author: picked.a
    });
    renderHistory();

    rc.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function formatDate(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    var hh = ('0' + d.getHours()).slice(-2);
    var mm = ('0' + d.getMinutes()).slice(-2);
    return y + '/' + m + '/' + dd + ' ' + hh + ':' + mm;
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  function saveHistory(item) {
    var list = loadHistory();
    list.unshift(item);
    list = list.slice(0, 3);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (e) {}
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function renderHistory() {
    var list = loadHistory();
    var box = document.getElementById('history');
    if (!list.length) {
      box.innerHTML = '<p class="history-empty">まだ履歴がありません</p>';
      return;
    }
    box.innerHTML = list.map(function(it){
      var memo = it.memo ? '<div class="history-input">' + escapeHtml(it.memo) + '</div>' : '';
      return '<div class="history-item">'
           + '<div class="history-date">' + escapeHtml(it.date) + ' / ' + escapeHtml(it.fortune) + '</div>'
           + memo
           + '<div class="history-quote">「' + escapeHtml(it.quote) + '」 ' + escapeHtml(it.author) + '</div>'
           + '</div>';
    }).join('');
  }

  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
