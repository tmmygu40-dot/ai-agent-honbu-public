<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="梅雨の憂鬱度を5つの質問で診断。あなたの梅雨ストレスレベルに合わせた笑える梅雨あるあると気分転換アドバイスを表示します。">
  <title>梅雨乗り切り診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問カード ── */
    .question-num {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 1rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem;
    }
    .option-list { list-style: none; }
    .option-list li {
      margin-bottom: 0.5rem;
    }
    .option-btn {
      display: block; width: 100%;
      padding: 0.8rem 1rem;
      font-size: 0.92rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .option-btn.selected {
      border-color: var(--accent); background: var(--accent-light);
      color: var(--accent);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── あるある＆アドバイスカード ── */
    .aruaru-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
    }
    .aruaru-item:last-child { border-bottom: none; }
    .advice-item {
      padding: 0.6rem 0; font-size: 0.9rem; line-height: 1.5; color: var(--text-sub);
    }
    .advice-item strong { color: var(--text); }

    /* ── もう一度ボタン ── */
    .btn-retry {
      display: none; width: 100%; max-width: 600px;
      margin: 0.5rem auto 1rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-retry { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

    /* ── プログレスバー ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem;
      height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; transition: width 0.3s ease;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>☔ 梅雨乗り切り診断</h1>
    <p class="subtitle">あなたの梅雨ストレスを笑いに変えて、乗り切りアドバイスをお届けします。</p>
  </header>

  <!-- プログレスバー -->
  <div class="progress-bar" id="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- 質問エリア -->
  <div class="card" id="questionCard">
    <p class="question-num" id="qNum">Q1 / 5</p>
    <p class="question-text" id="qText"></p>
    <ul class="option-list" id="optList"></ul>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" id="btnDiag" onclick="showDiagnosis()">☔ 診断結果を見る</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの梅雨憂鬱度</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 梅雨あるあるカード -->
  <div class="card" id="aruaruCard" style="display:none">
    <p class="card-title">🌧️ あなたの梅雨あるある</p>
    <div id="aruaruList"></div>
  </div>

  <!-- 気分転換アドバイスカード -->
  <div class="card" id="adviceCard" style="display:none">
    <p class="card-title">🌈 気分転換アドバイス</p>
    <div id="adviceList"></div>
  </div>

  <!-- もう一度 -->
  <button class="btn-retry no-print" id="btnRetry" onclick="retry()">🔄 もう一度診断する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  /* ── 質問データ ── */
  var QUESTIONS = [
    {
      q: '朝、窓の外を見たら雨。最初に思うことは？',
      opts: [
        { text: '「今日も雨か…」とため息', score: 3 },
        { text: '「傘持ってこ」と即行動', score: 1 },
        { text: '「洗濯物ーー！！」と叫ぶ', score: 2 }
      ]
    },
    {
      q: '梅雨の時期、髪のコンディションは？',
      opts: [
        { text: '爆発。もはや別人', score: 3 },
        { text: 'ちょっとうねるけど許容範囲', score: 2 },
        { text: '特に変わらない（鋼のメンタル髪）', score: 1 }
      ]
    },
    {
      q: '雨の日、靴がびしょ濡れ。あなたの反応は？',
      opts: [
        { text: '「もういやだ…」と心が折れる', score: 3 },
        { text: 'コンビニでビニール傘を追加購入', score: 1 },
        { text: '靴下の替えを常備してる自分を褒める', score: 1 }
      ]
    },
    {
      q: '梅雨の週末、予定の過ごし方は？',
      opts: [
        { text: '布団と一体化して動かない', score: 3 },
        { text: 'Netflix・YouTube三昧で満喫', score: 2 },
        { text: '雨でもお出かけ。むしろ空いてて快適', score: 1 }
      ]
    },
    {
      q: '天気予報で「来週もずっと雨マーク」と聞いて…',
      opts: [
        { text: '真顔で画面を閉じる', score: 3 },
        { text: '「まあそういう季節だし」と受け入れる', score: 2 },
        { text: '「雨の音って好きだな」とポジティブ変換', score: 1 }
      ]
    }
  ];

  /* ── 診断結果データ ── */
  var RESULTS = {
    low: {
      level: 'ok',
      title: '☀️ 梅雨なんてへっちゃらタイプ',
      eval: '憂鬱度：低い',
      note: '雨が降ろうが槍が降ろうがマイペース。あなたの心には常に太陽が出ています。',
      aruaru: [
        '🌂 折りたたみ傘をいつもカバンに入れてる準備万端っぷり',
        '☕ 雨の日は「おうちカフェ日和」とポジティブ変換できる',
        '🎵 雨音をBGMにして作業効率が上がるタイプ'
      ],
      advice: [
        { icon: '🌿', title: '観葉植物を愛でよう', desc: '梅雨は植物が一番元気な季節。一緒に深呼吸してみて。' },
        { icon: '📸', title: '雨の写真を撮ってみよう', desc: '水たまりの反射や雨粒のアップ、意外と映える写真が撮れます。' },
        { icon: '🍵', title: '新しいお茶を試してみよう', desc: '湿気の日こそ温かいお茶が沁みる。未体験の茶葉に挑戦！' }
      ]
    },
    mid: {
      level: 'warn',
      title: '🌦️ そこそこ梅雨に翻弄されタイプ',
      eval: '憂鬱度：中くらい',
      note: '晴れの日は元気、雨の日はちょっとテンション下がる。人間らしくていいじゃない。',
      aruaru: [
        '👟 「今日は長靴？スニーカー？」で毎朝5分悩む',
        '🧺 洗濯物を部屋干しして、部屋が洗濯物の森になる',
        '📱 天気予報アプリを1日3回以上チェックしてる',
        '☂️ ビニール傘が家に5本以上ある'
      ],
      advice: [
        { icon: '🎬', title: '雨の日映画リストを作ろう', desc: '「雨の日に観る映画」を決めておくと、雨が楽しみに変わります。' },
        { icon: '🍲', title: '煮込み料理に挑戦', desc: '長い雨の日はコトコト煮込む系の料理がぴったり。カレーとか角煮とか。' },
        { icon: '🛁', title: '入浴剤を日替わりにしよう', desc: '湿気でだるい体にはお風呂が一番。毎日違う香りで小さな贅沢を。' },
        { icon: '📖', title: '積ん読を崩す好機', desc: '買ったまま読んでない本、今こそ開く時です。' }
      ]
    },
    high: {
      level: 'ng',
      title: '🌧️ 梅雨ガチ勢ストレスMAXタイプ',
      eval: '憂鬱度：高い',
      note: '梅雨が来るたびに「沖縄に移住したい」と本気で考えるレベル。気持ちはわかる。',
      aruaru: [
        '😩 朝起きて雨音が聞こえた瞬間、二度寝を決意',
        '💇 髪が湿気で大爆発、鏡を見て「誰？」ってなる',
        '🌀 部屋干しの生乾き臭と戦い続ける日々',
        '🐌 カタツムリを見て「お前は楽しそうでいいな…」と話しかける',
        '📅 カレンダーの晴れマークを宝物のように眺める'
      ],
      advice: [
        { icon: '🌈', title: '「梅雨明けカウントダウン」を始めよう', desc: '平年の梅雨明けまであと何日か数えると、終わりが見えて気が楽に。' },
        { icon: '🎮', title: '没頭できる趣味に全振り', desc: 'ゲーム・パズル・プラモデル…雨を忘れるくらい集中できることを。' },
        { icon: '🧁', title: 'ご褒美スイーツを用意', desc: '「雨の日だからこそ食べていいスイーツ」を決めておく作戦。' },
        { icon: '💪', title: '室内ストレッチで体を動かそう', desc: '体がだるい時こそ軽い運動。5分のストレッチで血流が変わります。' },
        { icon: '🎧', title: '雨の日専用プレイリストを作ろう', desc: 'しっとり系でもアゲ系でもOK。音楽の力で気分をコントロール。' }
      ]
    }
  };

  /* ── 状態管理 ── */
  var currentQ = 0;
  var answers = [];

  /* ── 初期表示 ── */
  showQuestion(0);

  function showQuestion(idx) {
    var q = QUESTIONS[idx];
    document.getElementById('qNum').textContent = 'Q' + (idx + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('qText').textContent = q.q;
    document.getElementById('progressFill').style.width = (idx / QUESTIONS.length * 100) + '%';

    var list = document.getElementById('optList');
    list.innerHTML = '';
    q.opts.forEach(function(opt, i) {
      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.text;
      btn.onclick = function() { selectAnswer(i); };
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  function selectAnswer(optIdx) {
    answers[currentQ] = QUESTIONS[currentQ].opts[optIdx].score;

    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      showQuestion(currentQ);
    } else {
      /* 全問回答済み → 診断ボタン表示 */
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('questionCard').style.display = 'none';
      document.getElementById('btnDiag').style.display = 'block';
    }
  }

  function showDiagnosis() {
    var total = answers.reduce(function(a, b) { return a + b; }, 0);
    var key = total <= 7 ? 'low' : total <= 11 ? 'mid' : 'high';
    var r = RESULTS[key];

    /* 結論カード */
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + r.level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = r.title;
    document.getElementById('re').textContent = r.eval;
    document.getElementById('rn').textContent = r.note;

    /* 梅雨あるある */
    var aruaruHtml = r.aruaru.map(function(a) {
      return '<div class="aruaru-item">' + a + '</div>';
    }).join('');
    document.getElementById('aruaruList').innerHTML = aruaruHtml;
    document.getElementById('aruaruCard').style.display = 'block';

    /* アドバイス */
    var adviceHtml = r.advice.map(function(a) {
      return '<div class="advice-item"><strong>' + a.icon + ' ' + a.title + '</strong><br>' + a.desc + '</div>';
    }).join('');
    document.getElementById('adviceList').innerHTML = adviceHtml;
    document.getElementById('adviceCard').style.display = 'block';

    /* ボタン切替 */
    document.getElementById('btnDiag').style.display = 'none';
    document.getElementById('btnRetry').style.display = 'block';

    /* localStorage に保存 */
    try {
      var history = JSON.parse(localStorage.getItem('tsuyu_history') || '[]');
      history.unshift({
        date: new Date().toISOString().slice(0, 10),
        score: total,
        type: key
      });
      if (history.length > 20) history = history.slice(0, 20);
      localStorage.setItem('tsuyu_history', JSON.stringify(history));
    } catch(e) {}
  }

  function retry() {
    currentQ = 0;
    answers = [];
    document.getElementById('questionCard').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('aruaruCard').style.display = 'none';
    document.getElementById('adviceCard').style.display = 'none';
    document.getElementById('btnRetry').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    showQuestion(0);
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
