<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前と誕生日・血液型を入力するだけで、星座・数秘術・血液型の3つの占いで相性スコアを即診断。推し活のお供にどうぞ。">
  <title>推し相性占いアプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 相性バー ── */
    .compat-bar-wrap { margin: 0.5rem 0; }
    .compat-bar-label { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
    .compat-bar { height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; }
    .compat-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
    .compat-bar-fill.high { background: var(--ok); }
    .compat-bar-fill.mid  { background: var(--warn); }
    .compat-bar-fill.low  { background: var(--ng); }

    /* ── 履歴カード ── */
    .history-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .history-item:last-child { border-bottom: none; }
    .history-names { font-size: 0.88rem; font-weight: 600; }
    .history-score { font-size: 0.88rem; font-weight: 700; }
    .history-delete { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 0.82rem; padding: 0.2rem 0.5rem; }
    .history-delete:hover { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>💘 推し相性占いアプリ</h1>
    <p class="subtitle">推しとの相性を星座・数秘術・血液型の3つで即診断！推し活がもっと楽しくなるかも。</p>
  </header>

  <!-- あなたの情報 -->
  <div class="card">
    <p class="card-title">あなたの情報</p>
    <div class="field">
      <label for="myName">あなたの名前</label>
      <input type="text" id="myName" placeholder="例: 田中太郎">
    </div>
    <div class="field">
      <label for="myBirth">あなたの誕生日</label>
      <input type="date" id="myBirth">
    </div>
    <div class="field">
      <label for="myBlood">あなたの血液型</label>
      <select id="myBlood">
        <option value="">選択してください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
  </div>

  <!-- 推しの情報 -->
  <div class="card">
    <p class="card-title">推しの情報</p>
    <div class="field">
      <label for="oshiName">推しの名前</label>
      <input type="text" id="oshiName" placeholder="例: 推しの名前">
    </div>
    <div class="field">
      <label for="oshiBirth">推しの誕生日</label>
      <input type="date" id="oshiBirth">
    </div>
    <div class="field">
      <label for="oshiBlood">推しの血液型</label>
      <select id="oshiBlood">
        <option value="">選択してください</option>
        <option value="A">A型</option>
        <option value="B">B型</option>
        <option value="O">O型</option>
        <option value="AB">AB型</option>
      </select>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">💘 相性を診断する</button>

  <!-- 総合結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">総合相性スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">相性の内訳</p>

    <div class="compat-bar-wrap">
      <div class="compat-bar-label"><span>⭐ 星座相性</span><span id="zodiacScore">-</span></div>
      <div class="compat-bar"><div class="compat-bar-fill" id="zodiacBar" style="width:0"></div></div>
      <p class="hint" id="zodiacDetail"></p>
    </div>

    <div class="compat-bar-wrap">
      <div class="compat-bar-label"><span>🔢 数秘術相性</span><span id="numScore">-</span></div>
      <div class="compat-bar"><div class="compat-bar-fill" id="numBar" style="width:0"></div></div>
      <p class="hint" id="numDetail"></p>
    </div>

    <div class="compat-bar-wrap">
      <div class="compat-bar-label"><span>🩸 血液型相性</span><span id="bloodScore">-</span></div>
      <div class="compat-bar"><div class="compat-bar-fill" id="bloodBar" style="width:0"></div></div>
      <p class="hint" id="bloodDetail"></p>
    </div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">診断履歴</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 この占いはエンタメ目的です。星座の四元素相性・数秘術のライフパスナンバー・血液型相性の一般的な考え方を参考にしています。結果はあくまで目安としてお楽しみください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 星座判定 ──
  function getZodiac(month, day) {
    var signs = [
      { name: '山羊座', el: '地', end: [1,19] },
      { name: '水瓶座', el: '風', end: [2,18] },
      { name: '魚座',   el: '水', end: [3,20] },
      { name: '牡羊座', el: '火', end: [4,19] },
      { name: '牡牛座', el: '地', end: [5,20] },
      { name: '双子座', el: '風', end: [6,21] },
      { name: '蟹座',   el: '水', end: [7,22] },
      { name: '獅子座', el: '火', end: [8,22] },
      { name: '乙女座', el: '地', end: [9,22] },
      { name: '天秤座', el: '風', end: [10,23] },
      { name: '蠍座',   el: '水', end: [11,22] },
      { name: '射手座', el: '火', end: [12,21] },
      { name: '山羊座', el: '地', end: [12,31] }
    ];
    for (var i = 0; i < signs.length; i++) {
      if (month < signs[i].end[0] || (month === signs[i].end[0] && day <= signs[i].end[1])) {
        return signs[i];
      }
    }
    return signs[0];
  }

  // 四元素の相性テーブル（火・地・風・水）
  var elementCompat = {
    '火火': 90, '火地': 40, '火風': 85, '火水': 50,
    '地火': 40, '地地': 85, '地風': 55, '地水': 80,
    '風火': 85, '風地': 55, '風風': 90, '風水': 45,
    '水火': 50, '水地': 80, '水風': 45, '水水': 90
  };

  function calcZodiacCompat(z1, z2) {
    var key = z1.el + z2.el;
    var score = elementCompat[key] || 60;
    // 同じ星座ボーナス
    if (z1.name === z2.name) score = Math.min(100, score + 10);
    return score;
  }

  // ── 数秘術（ライフパスナンバー） ──
  function getLifePath(dateStr) {
    var digits = dateStr.replace(/-/g, '');
    var sum = 0;
    for (var i = 0; i < digits.length; i++) sum += parseInt(digits[i]);
    while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
      var tmp = 0;
      var s = String(sum);
      for (var j = 0; j < s.length; j++) tmp += parseInt(s[j]);
      sum = tmp;
    }
    return sum;
  }

  // 数秘術相性テーブル
  var numCompat = {
    '1-1':75,'1-2':70,'1-3':90,'1-4':55,'1-5':85,'1-6':65,'1-7':80,'1-8':70,'1-9':85,
    '2-2':80,'2-3':75,'2-4':85,'2-5':60,'2-6':90,'2-7':70,'2-8':75,'2-9':65,
    '3-3':85,'3-4':55,'3-5':90,'3-6':80,'3-7':65,'3-8':70,'3-9':90,
    '4-4':80,'4-5':50,'4-6':85,'4-7':75,'4-8':90,'4-9':55,
    '5-5':85,'5-6':60,'5-7':80,'5-8':65,'5-9':90,
    '6-6':85,'6-7':60,'6-8':75,'6-9':85,
    '7-7':90,'7-8':60,'7-9':70,
    '8-8':80,'8-9':65,
    '9-9':85
  };

  function calcNumCompat(lp1, lp2) {
    // マスターナンバーは基本数に変換して相性を引く
    var n1 = lp1 > 9 ? (lp1 === 11 ? 2 : lp1 === 22 ? 4 : 6) : lp1;
    var n2 = lp2 > 9 ? (lp2 === 11 ? 2 : lp2 === 22 ? 4 : 6) : lp2;
    var lo = Math.min(n1, n2), hi = Math.max(n1, n2);
    var key = lo + '-' + hi;
    var score = numCompat[key] || 65;
    // マスターナンバー同士ボーナス
    if (lp1 > 9 && lp2 > 9) score = Math.min(100, score + 10);
    return score;
  }

  function lifePathLabel(lp) {
    var labels = {
      1:'リーダー', 2:'協調者', 3:'表現者', 4:'建設者', 5:'自由人',
      6:'奉仕者', 7:'探究者', 8:'達成者', 9:'博愛者',
      11:'直感のマスター', 22:'実現のマスター', 33:'奉仕のマスター'
    };
    return labels[lp] || '';
  }

  // ── 血液型相性 ──
  var bloodCompat = {
    'A-A':75, 'A-B':55, 'A-O':85, 'A-AB':70,
    'B-A':55, 'B-B':80, 'B-O':70, 'B-AB':85,
    'O-A':85, 'O-B':70, 'O-O':80, 'O-AB':60,
    'AB-A':70, 'AB-B':85, 'AB-O':60, 'AB-AB':75
  };

  var bloodComment = {
    'A-A':'几帳面同士で安定感抜群', 'A-B':'正反対だけど惹かれ合う', 'A-O':'王道の相性コンビ', 'A-AB':'知的な会話が弾む',
    'B-A':'刺激と安定のバランス', 'B-B':'自由同士で気楽な関係', 'B-O':'テンポが合う名コンビ', 'B-AB':'クリエイティブな化学反応',
    'O-A':'包容力×真面目の好相性', 'O-B':'ノリが合って楽しい', 'O-O':'リーダー同士でぶつかることも', 'O-AB':'ミステリアスに惹かれる',
    'AB-A':'繊細さを理解し合える', 'AB-B':'天才同士の予測不能コンビ', 'AB-O':'距離感の調整がカギ', 'AB-AB':'独自の世界観を共有'
  };

  function calcBloodCompat(b1, b2) {
    var key = b1 + '-' + b2;
    return { score: bloodCompat[key] || 65, comment: bloodComment[key] || '' };
  }

  // ── メイン診断 ──
  function diagnose() {
    var myName = document.getElementById('myName').value.trim();
    var myBirth = document.getElementById('myBirth').value;
    var myBlood = document.getElementById('myBlood').value;
    var oshiName = document.getElementById('oshiName').value.trim();
    var oshiBirth = document.getElementById('oshiBirth').value;
    var oshiBlood = document.getElementById('oshiBlood').value;

    if (!myName || !myBirth || !myBlood || !oshiName || !oshiBirth || !oshiBlood) {
      showErr('すべての項目を入力してください');
      return;
    }

    var myD = new Date(myBirth);
    var oshiD = new Date(oshiBirth);

    // 星座
    var myZ = getZodiac(myD.getMonth() + 1, myD.getDate());
    var oshiZ = getZodiac(oshiD.getMonth() + 1, oshiD.getDate());
    var zodiacScore = calcZodiacCompat(myZ, oshiZ);

    // 数秘術
    var myLP = getLifePath(myBirth);
    var oshiLP = getLifePath(oshiBirth);
    var numScore = calcNumCompat(myLP, oshiLP);

    // 血液型
    var bloodResult = calcBloodCompat(myBlood, oshiBlood);
    var bloodScore = bloodResult.score;

    // 総合スコア（加重平均）
    var total = Math.round(zodiacScore * 0.35 + numScore * 0.35 + bloodScore * 0.3);

    // 名前ハッシュで±5のゆらぎ
    var nameHash = 0;
    var combined = myName + oshiName;
    for (var i = 0; i < combined.length; i++) nameHash += combined.charCodeAt(i);
    var nudge = (nameHash % 11) - 5;
    total = Math.max(10, Math.min(100, total + nudge));

    // レベル判定
    var level, eval, note;
    if (total >= 80) {
      level = 'ok';
      eval = '最高の相性！運命を感じるレベル✨';
      note = myName + 'さんと' + oshiName + 'さんは、まるで引き寄せられるような素敵な相性です。';
    } else if (total >= 60) {
      level = 'warn';
      eval = 'なかなか良い相性！伸びしろあり💫';
      note = myName + 'さんと' + oshiName + 'さんは、お互いを高め合えるポテンシャルがあります。';
    } else {
      level = 'ng';
      eval = '意外性のある組み合わせ！新鮮な刺激あり🌟';
      note = myName + 'さんと' + oshiName + 'さんは、違いがあるからこそ新しい発見がある関係です。';
    }

    // 結果表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = total + '点';
    document.getElementById('re').textContent = eval;
    document.getElementById('rn').textContent = note;

    // 内訳バー表示
    showBar('zodiac', zodiacScore, myZ.name + '（' + myZ.el + '）× ' + oshiZ.name + '（' + oshiZ.el + '）');
    showBar('num', numScore, 'LP' + myLP + '（' + lifePathLabel(myLP) + '）× LP' + oshiLP + '（' + lifePathLabel(oshiLP) + '）');
    showBar('blood', bloodScore, bloodResult.comment);
    document.getElementById('detail').style.display = 'block';

    // 履歴保存
    saveHistory(myName, oshiName, total);
    renderHistory();
  }

  function showBar(prefix, score, detail) {
    document.getElementById(prefix + 'Score').textContent = score + '点';
    var bar = document.getElementById(prefix + 'Bar');
    bar.style.width = score + '%';
    bar.className = 'compat-bar-fill ' + (score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low');
    document.getElementById(prefix + 'Detail').textContent = detail;
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  // ── localStorage 履歴 ──
  var STORAGE_KEY = 'oshi_compat_history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveHistory(myName, oshiName, score) {
    var history = loadHistory();
    history.unshift({ my: myName, oshi: oshiName, score: score, date: new Date().toLocaleDateString('ja-JP') });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function deleteHistory(idx) {
    var history = loadHistory();
    history.splice(idx, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    var history = loadHistory();
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = history.map(function(h, i) {
      var color = h.score >= 80 ? 'var(--ok)' : h.score >= 60 ? 'var(--warn)' : 'var(--ng)';
      return '<div class="history-item">'
        + '<div><span class="history-names">' + h.my + ' × ' + h.oshi + '</span>'
        + '<br><span class="hint">' + h.date + '</span></div>'
        + '<div><span class="history-score" style="color:' + color + '">' + h.score + '点</span>'
        + ' <button class="history-delete" onclick="deleteHistory(' + i + ')">✕</button></div>'
        + '</div>';
    }).join('');
  }

  // 初期表示
  renderHistory();
  </script>
