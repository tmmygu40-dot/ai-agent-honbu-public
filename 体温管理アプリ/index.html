<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体温管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌡️ 体温管理アプリ</h1>
    </header>

    <section class="input-section">
      <h2>体温を記録する</h2>
      <div class="form-row">
        <label for="input-date">日付</label>
        <input type="date" id="input-date">
      </div>
      <div class="form-row">
        <label for="input-time">時間</label>
        <input type="time" id="input-time">
      </div>
      <div class="form-row">
        <label for="input-temp">体温（℃）</label>
        <input type="number" id="input-temp" step="0.1" min="35.0" max="42.0" placeholder="36.5">
      </div>
      <div class="form-row">
        <label for="input-memo">メモ（任意）</label>
        <input type="text" id="input-memo" placeholder="例：朝食後">
      </div>
      <button id="btn-add">記録する</button>
    </section>

    <section class="graph-section">
      <h2>体温グラフ</h2>
      <div class="graph-container">
        <canvas id="temp-chart"></canvas>
      </div>
      <div class="legend">
        <span class="legend-normal">●</span> 平熱
        <span class="legend-fever">●</span> 発熱（37.5℃以上）
        <span class="legend-line">— —</span> 37.5℃ライン
      </div>
    </section>

    <section class="list-section">
      <h2>記録一覧 <span id="record-count"></span></h2>
      <div id="record-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
