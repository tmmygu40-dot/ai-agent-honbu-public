<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診察記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏥 診察記録アプリ</h1>
      <p class="subtitle">通院記録を一元管理</p>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新しい記録を追加</h2>
      <form id="record-form">
        <div class="form-group">
          <label for="hospital">病院名 <span class="required">*</span></label>
          <input type="text" id="hospital" placeholder="例：○○クリニック" required>
        </div>
        <div class="form-group">
          <label for="visit-date">診察日 <span class="required">*</span></label>
          <input type="date" id="visit-date" required>
        </div>
        <div class="form-group">
          <label for="content">診察内容</label>
          <textarea id="content" placeholder="例：定期検診、風邪の症状など" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="medicine">処方薬</label>
          <textarea id="medicine" placeholder="例：〇〇錠 3錠 7日分" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="next-date">次回受診日</label>
          <input type="date" id="next-date">
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="その他、気になった点など" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-add">追加する</button>
      </form>
    </section>

    <!-- フィルター・検索 -->
    <section class="filter-section">
      <div class="filter-row">
        <input type="text" id="search" placeholder="病院名・診察内容で検索...">
        <select id="sort-order">
          <option value="date-desc">診察日：新しい順</option>
          <option value="date-asc">診察日：古い順</option>
          <option value="next-asc">次回受診日：近い順</option>
        </select>
      </div>
    </section>

    <!-- 次回受診日アラート -->
    <section id="upcoming-section" class="upcoming-section" style="display:none;">
      <h2>📅 近日中の受診予定</h2>
      <ul id="upcoming-list"></ul>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>診察記録一覧</h2>
        <span id="record-count" class="count-badge">0 件</span>
      </div>
      <ul id="record-list" class="record-list">
        <li class="empty-message">まだ記録がありません</li>
      </ul>
    </section>
  </div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
