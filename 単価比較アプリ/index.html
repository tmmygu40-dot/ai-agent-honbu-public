<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単価比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>単価比較アプリ</h1>
    <p class="subtitle">食品のグラム単価を自動計算して最安値を比較できます</p>

    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label for="productName">商品名</label>
          <input type="text" id="productName" placeholder="例：食パン A" maxlength="50">
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-group">
          <label for="amount">内容量 (g)</label>
          <input type="number" id="amount" placeholder="例：500" min="0.1" step="0.1">
        </div>
        <div class="form-group">
          <label for="price">価格 (円)</label>
          <input type="number" id="price" placeholder="例：198" min="0.1" step="0.1">
        </div>
      </div>
      <button id="addBtn" onclick="addProduct()">追加する</button>
    </div>

    <div id="resultArea" class="result-area hidden">
      <div class="result-header">
        <h2>比較結果 <span id="countLabel"></span></h2>
        <button class="clear-btn" onclick="clearAll()">全クリア</button>
      </div>
      <div id="productList"></div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
