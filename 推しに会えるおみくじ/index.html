<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3つのボタンから直感で1つ選ぶだけ。今日の推し活運を「大吉・中吉・小吉・凶」のおみくじでサクッと占い、推しに会えるかどうかを後押ししてくれる無料アプリです。">
  <title>推しに会えるおみくじ｜今日の推し活運を3択で占う</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .choice-grid { display: grid; grid-template-columns: 1fr; gap: 0.7rem; }
    @media (min-width: 480px) { .choice-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .choice-btn {
      padding: 1rem 0.8rem;
      font-size: 1rem; font-weight: 700;
      background: var(--accent-light); color: var(--text);
      border: 2px solid var(--border); border-radius: 12px;
      cursor: pointer; text-align: center; line-height: 1.4;
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); }
    .choice-btn:active { transform: translateY(2px); }
    .choice-btn .emoji { display: block; font-size: 2rem; margin-bottom: 0.3rem; }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 0.6rem; }
    .result-advice { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; padding-top: 0.6rem; border-top: 1px dashed var(--border); }

    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table tr { border-bottom: 1px solid var(--border); }
    .history-table tr:last-child { border-bottom: none; }
    .history-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .history-table td:nth-child(2) { text-align: right; font-weight: 700; color: var(--text); }
    .clear-btn {
      display: block; margin: 0.8rem auto 0; padding: 0.45rem 1rem;
      font-size: 0.8rem; background: transparent; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .choice-grid, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>推しに会えるおみくじ</h1>
    <p class="subtitle">直感で1つ選ぶだけ。今日の推し活運を3秒で占います</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">直感で1つ選んでね</p>
    <div class="choice-grid">
      <button type="button" class="choice-btn" onclick="draw('A')">
        <span class="emoji">🌸</span>桜のとびら
      </button>
      <button type="button" class="choice-btn" onclick="draw('B')">
        <span class="emoji">⭐</span>星のとびら
      </button>
      <button type="button" class="choice-btn" onclick="draw('C')">
        <span class="emoji">🌙</span>月のとびら
      </button>
    </div>
  </div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">今日の推し活運</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <p class="result-advice" id="ra"></p>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">直近の結果（最大5件）</p>
    <table class="history-table"><tbody id="hb"></tbody></table>
    <button type="button" class="clear-btn" onclick="clearHistory()">履歴をクリア</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🔮 これは推し活を楽しむためのエンタメおみくじです。結果は直感タップに重み付きランダムを組み合わせた遊び要素で、実際のイベント当落・接触機会を予測するものではありません。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'oshi_omikuji_history';
  var MAX_HISTORY = 5;

  // 各おみくじ結果のメッセージ
  var FORTUNES = {
    '大吉': {
      level: 'ok',
      notes: [
        '推しと目が合う予感、満点！',
        'ライブで神席当選レベルの強運。',
        '推しの新情報がドッと届く日。'
      ],
      advice: '推し活グッズを身につけて出かけよう。「会える」と信じて動いた人ほど、嬉しい偶然が舞い込みます。'
    },
    '中吉': {
      level: 'warn',
      notes: [
        'SNSでうれしい更新ありそう。',
        '小さなご褒美が舞い込むかも。',
        '推しの活動を再発見できる日。'
      ],
      advice: '推しの過去動画や昔の投稿を見返してみよう。新しい「好き」が見つかって、テンションが上がります。'
    },
    '小吉': {
      level: 'warn',
      notes: [
        '今日は静かに推しを愛でる日。',
        '焦らず、推し充スイッチON。',
        '小さな幸せを集める1日。'
      ],
      advice: '推し色の小物を1つ取り入れてみよう。気分転換だけでも、明日の運気が上向きます。'
    },
    '凶': {
      level: 'ng',
      notes: [
        'ちょっと推し疲れ気味かも。',
        '今日はゆっくり休む日。',
        'スマホを置いて深呼吸を。'
      ],
      advice: '推し活はマラソン。今日は推しの曲をBGMに、好きなお茶を入れて休もう。明日のために充電が大切です。'
    }
  };

  // 各ドアごとの重み付け（直感タップで結果に少し偏りを出す）
  var DOOR_WEIGHTS = {
    'A': { '大吉': 30, '中吉': 35, '小吉': 25, '凶': 10 }, // 桜：明るめ
    'B': { '大吉': 25, '中吉': 30, '小吉': 30, '凶': 15 }, // 星：標準
    'C': { '大吉': 20, '中吉': 30, '小吉': 30, '凶': 20 }  // 月：落ち着き
  };

  function pickFortune(door) {
    var w = DOOR_WEIGHTS[door] || DOOR_WEIGHTS['B'];
    var total = 0;
    for (var k in w) total += w[k];
    var r = Math.random() * total;
    var cum = 0;
    for (var k in w) {
      cum += w[k];
      if (r < cum) return k;
    }
    return '中吉';
  }

  function pickNote(notes) {
    return notes[Math.floor(Math.random() * notes.length)];
  }

  function draw(door) {
    var name = pickFortune(door);
    var f = FORTUNES[name];
    var note = pickNote(f.notes);
    showResult(f.level, name, note, f.advice);
    saveHistory(name);
    renderHistory();
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function showResult(level, val, note, advice) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    document.getElementById('ra').textContent = advice;
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  function saveHistory(name) {
    var arr = loadHistory();
    var d = new Date();
    var stamp = (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
                ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    arr.unshift({ stamp: stamp, name: name });
    arr = arr.slice(0, MAX_HISTORY);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
  }

  function renderHistory() {
    var arr = loadHistory();
    var card = document.getElementById('history-card');
    if (!arr.length) { card.style.display = 'none'; return; }
    var rows = arr.map(function(x){
      return '<tr><td>' + x.stamp + '</td><td>' + x.name + '</td></tr>';
    }).join('');
    document.getElementById('hb').innerHTML = rows;
    card.style.display = 'block';
  }

  function clearHistory() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderHistory();
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
