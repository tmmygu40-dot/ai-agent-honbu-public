<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当番表ジェネレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>当番表ジェネレーター</h1>
    </header>

    <!-- メンバー登録 -->
    <section class="card">
      <h2>メンバー登録</h2>
      <div class="form-row">
        <input type="text" id="memberName" placeholder="名前" maxlength="20">
        <input type="text" id="memberRole" placeholder="役割（例：掃除）" maxlength="20">
        <button id="addMemberBtn" onclick="addMember()">追加</button>
      </div>
    </section>

    <!-- メンバー一覧 -->
    <section class="card">
      <h2>メンバー一覧 <span id="memberCount" class="badge">0</span></h2>
      <ul id="memberList" class="member-list">
        <li class="empty-msg">メンバーを登録してください</li>
      </ul>
    </section>

    <!-- 現在の当番 -->
    <section class="card highlight">
      <h2>現在の当番</h2>
      <div id="currentTurn" class="current-turn">
        <span class="no-data">メンバーを登録して当番を開始してください</span>
      </div>
      <div class="btn-row">
        <button id="nextBtn" onclick="nextTurn()" class="btn-primary">次の当番へ →</button>
        <button onclick="resetTurn()" class="btn-secondary">リセット</button>
      </div>
    </section>

    <!-- ローテーション履歴 -->
    <section class="card">
      <h2>ローテーション履歴 <button onclick="clearHistory()" class="btn-link">クリア</button></h2>
      <ul id="historyList" class="history-list">
        <li class="empty-msg">履歴はまだありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
