<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部屋探しメモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>部屋探しメモ</h1>

    <section class="form-section">
      <h2>物件を追加</h2>
      <form id="propertyForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">物件名 <span class="required">*</span></label>
            <input type="text" id="name" placeholder="例：○○マンション201" required>
          </div>
          <div class="form-group">
            <label for="rent">家賃（円）</label>
            <input type="number" id="rent" placeholder="例：80000" min="0">
          </div>
          <div class="form-group">
            <label for="size">広さ（㎡）</label>
            <input type="number" id="size" placeholder="例：30" min="0" step="0.1">
          </div>
          <div class="form-group">
            <label for="station">最寄り駅</label>
            <input type="text" id="station" placeholder="例：渋谷駅 徒歩5分">
          </div>
        </div>
        <div class="form-group">
          <label for="memo">メモ・条件</label>
          <textarea id="memo" placeholder="例：築5年、南向き、ペット可" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>優先度</label>
          <div class="star-input" id="starInput">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
          <input type="hidden" id="priority" value="0">
        </div>
        <button type="submit" class="btn-primary">追加する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>候補物件一覧 <span id="count"></span></h2>
        <div class="sort-control">
          <label for="sortSelect">並び替え：</label>
          <select id="sortSelect">
            <option value="priority">優先度が高い順</option>
            <option value="rent">家賃が安い順</option>
            <option value="size">広さが広い順</option>
            <option value="date">登録が新しい順</option>
          </select>
        </div>
      </div>
      <div id="propertyList" class="property-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
