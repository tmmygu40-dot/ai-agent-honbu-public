<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="肌タイプを3択で選ぶだけで、5月の紫外線ダメージリスクを即診断。敏感肌・普通肌・丈夫な肌別に対策アドバイスもお届けします。">
  <title>☀️ UVリスクチェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 肌タイプボタン ── */
    .skin-buttons {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.7rem;
      margin-bottom: 1rem;
    }
    .skin-btn {
      padding: 0.85rem; font-size: 0.9rem; font-weight: 700;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: all 0.15s; color: var(--text);
    }
    .skin-btn:active { transform: scale(0.95); }
    .skin-btn.selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent); box-shadow: 0 4px 12px rgba(224,123,0,0.25);
    }

    /* ── 計算ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.6rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-top: 0.5rem; }

    /* ── 対策カード ── */
    .advice-card {
      display: none; background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem; margin: 0 auto 1rem; max-width: 600px;
    }
    .advice-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 0.7rem; }
    .advice-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .advice-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>☀️ UVリスクチェッカー</h1>
    <p class="subtitle">※2026年5月時点の参考目安。最新情報は気象庁をご確認ください</p>
  </header>

  <!-- 肌タイプ選択カード -->
  <div class="card">
    <p class="card-title">肌タイプを選んでください</p>
    <div class="skin-buttons">
      <button class="skin-btn" data-skin="敏感肌" onclick="selectSkin('敏感肌', this)">敏感肌</button>
      <button class="skin-btn" data-skin="普通肌" onclick="selectSkin('普通肌', this)">普通肌</button>
      <button class="skin-btn" data-skin="丈夫な肌" onclick="selectSkin('丈夫な肌', this)">丈夫な肌</button>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">紫外線ダメージリスク</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 対策カード -->
  <div class="advice-card" id="advice">
    <p class="advice-title">📋 推奨される対策</p>
    <p class="advice-text" id="at"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、気象庁・環境省などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var selectedSkin = null;

  // 肌タイプ選択
  function selectSkin(skin, btn) {
    selectedSkin = skin;
    document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    saveSkin(skin);
  }

  // 診断実行
  function diagnose() {
    if (!selectedSkin) {
      showErr('肌タイプを選んでください');
      return;
    }

    var riskLevel, riskText, advice;

    if (selectedSkin === '敏感肌') {
      riskLevel = 'ng';
      riskText = '高い ⚠️';
      advice = '敏感肌は紫外線への反応が強いため、5月は要注意です。\n毎日SPF30以上の日焼け止めを塗り直し、帽子やサングラスで物理的に守ることが大切。午前10時〜午後4時の外出を控えるのも効果的です。';
    } else if (selectedSkin === '普通肌') {
      riskLevel = 'warn';
      riskText = '中程度 🤔';
      advice = '普通肌でも5月の紫外線は無視できません。\nSPF25程度の日焼け止めを朝・昼・夕方に塗り直し、帽子や日傘で対策を。週末のアウトドアレジャーでも焼けやすいので要注意です。';
    } else {
      riskLevel = 'ok';
      riskText = '低い 😊';
      advice = 'とても丈夫な肌をお持ちですね。ただし5月でも日焼けは起こります。\nSPF20程度の日焼け止めを毎日塗ることで、将来のシミ・シワを防げます。いつまでも若々しい肌を保つために、今からの予防が大事です。';
    }

    showResult(riskLevel, riskText, '', advice);
    saveResult(selectedSkin, riskText);
  }

  function showResult(level, val, eval, advice) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = eval;
    document.getElementById('rn').textContent = '肌タイプ：' + selectedSkin;

    var ac = document.getElementById('advice');
    ac.style.display = 'block';
    document.getElementById('at').textContent = advice;
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('advice').style.display = 'none';
  }

  // localStorage 操作
  function saveSkin(skin) {
    localStorage.setItem('uvchecker_skin', skin);
  }

  function saveResult(skin, risk) {
    localStorage.setItem('uvchecker_result_skin', skin);
    localStorage.setItem('uvchecker_result_risk', risk);
    localStorage.setItem('uvchecker_result_date', new Date().toLocaleDateString('ja-JP'));
  }

  function loadSaved() {
    var saved = localStorage.getItem('uvchecker_skin');
    if (saved) {
      var btn = document.querySelector('[data-skin="' + saved + '"]');
      if (btn) selectSkin(saved, btn);
    }
  }

  // ページ読み込み時に保存データを復元
  window.addEventListener('DOMContentLoaded', loadSaved);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
