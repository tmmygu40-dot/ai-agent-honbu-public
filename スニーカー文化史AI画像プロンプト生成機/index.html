<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="愛用するスニーカーや靴の特徴を入力すると、スニーカー文化史の有名モデルに変身させるAI画像生成プロンプトを自動生成します。Nike・ADIDAS・ストリート文化など、複数のスタイルから選べます。">
  <title>スニーカー文化史AI画像プロンプト生成機</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field textarea {
      min-height: 80px; resize: vertical; font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ラジオボタングループ ── */
    .radio-group { margin-bottom: 1rem; }
    .radio-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0; cursor: pointer; user-select: none;
    }
    .radio-item input[type="radio"] { cursor: pointer; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.05rem; font-weight: 700; line-height: 1.6; color: var(--text); }
    .result-value .copy-btn {
      display: inline-block; margin-left: 0.5rem; padding: 0.3rem 0.6rem;
      font-size: 0.75rem; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
    }
    .result-value .copy-btn:active { transform: scale(0.98); }

    /* ── 履歴 ── */
    .history-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-sub);
    }
    .history-item:last-child { border-bottom: none; }
    .history-del {
      display: inline-block; margin-left: 0.5rem;
      font-size: 0.7rem; padding: 0.2rem 0.4rem;
      background: var(--ng-bg); color: var(--ng);
      border: none; border-radius: 4px; cursor: pointer;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>👟 スニーカー文化史AI画像プロンプト生成機</h1>
    <p class="subtitle">愛用する靴の特徴を入力すると、スニーカー文化史の有名モデルに変身させるAIプロンプトを自動生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="shoeDesc">靴の説明</label>
      <textarea id="shoeDesc" placeholder="例: 白いキャンバス素材。つま先と踵にゴム補強。シンプルで使いやすい。"></textarea>
      <p class="hint">色・素材・フォルム・ブランド・思い出など、靴の特徴を自由に説明してください</p>
    </div>
    <div class="field">
      <label>スタイル選択</label>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="style" value="nike" checked>
          <span>Nike Retro 90s</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="style" value="adidas">
          <span>ADIDAS Vintage Sportstyle</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="style" value="street">
          <span>Street Culture Heritage</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="style" value="japan">
          <span>Japanese Sneaker Revival</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ プロンプト生成</button>

  <!-- 結果カード -->
  <div class="result-card ok" id="result" style="display:none;">
    <p class="result-label">生成されたプロンプト</p>
    <p class="result-value" id="prompt-output">
      <button class="copy-btn" onclick="copyPrompt()">📋 コピー</button>
    </p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none;">
    <p class="card-title">履歴（最新10件）</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、スニーカー文化史とAI画像生成プロンプトのベストプラクティスを参考に、楽しくて実用的なプロンプトを生成しています。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // プロンプトテンプレート
  var TEMPLATES = {
    nike: [
      "{shoe_desc}, in the style of vintage Nike Air Jordan 1, 1990s basketball aesthetic, classic silhouette photography",
      "Iconic {shoe_desc}, reimagined as a 1990s Nike Retro sneaker, streetwear era design, heritage sportswear",
      "{shoe_desc}, transformed into a Nike classic sneaker, Air Max legacy, 90s sport culture influence"
    ],
    adidas: [
      "{shoe_desc}, classic ADIDAS Superstar heritage design, 1970s sport culture, vintage athletic styling",
      "Vintage {shoe_desc}, reimagined as ADIDAS Gazelle, retro sportswear era, timeless classic silhouette",
      "{shoe_desc}, in ADIDAS three-stripe legacy style, heritage sport design, 70s-80s athletic aesthetic"
    ],
    street: [
      "{shoe_desc}, street culture sneaker icon, hip-hop era influence, urban sportswear legend design",
      "Urban {shoe_desc}, transformed into a street culture symbol, skateboard era aesthetic, underground fashion",
      "{shoe_desc}, street style icon, 2000s hip-hop culture influence, authentic urban sneaker"
    ],
    japan: [
      "{shoe_desc}, Japanese streetwear inspired sneaker, minimal design philosophy, modern retro fusion",
      "Contemporary {shoe_desc}, Japan brand aesthetic, clean minimalist design, East Asian sneaker culture",
      "{shoe_desc}, reimagined through Japanese design philosophy, contemporary minimalism, quality craft focus"
    ]
  };

  function generate() {
    var desc = document.getElementById('shoeDesc').value.trim();
    var style = document.querySelector('input[name="style"]:checked').value;

    if (!desc) {
      alert('靴の説明を入力してください');
      return;
    }

    // プロンプト生成（ランダムにテンプレートを選択）
    var templates = TEMPLATES[style];
    var template = templates[Math.floor(Math.random() * templates.length)];
    var prompt = template.replace('{shoe_desc}', desc);

    // 結果表示
    var resultDiv = document.getElementById('result');
    document.getElementById('prompt-output').innerHTML =
      prompt + '<button class="copy-btn" onclick="copyPrompt()">📋 コピー</button>';
    resultDiv.style.display = '';
    window.currentPrompt = prompt;

    // localStorage に保存
    saveHistory({
      input: desc,
      style: style,
      prompt: prompt,
      date: new Date().toLocaleString('ja-JP')
    });

    // 履歴表示
    loadHistory();
  }

  function saveHistory(item) {
    var history = JSON.parse(localStorage.getItem('sneaker_history') || '[]');
    history.unshift(item);
    history = history.slice(0, 10); // 最新10件のみ保持
    localStorage.setItem('sneaker_history', JSON.stringify(history));
  }

  function loadHistory() {
    var history = JSON.parse(localStorage.getItem('sneaker_history') || '[]');
    if (history.length === 0) {
      document.getElementById('history-card').style.display = 'none';
      return;
    }

    var list = history.map(function(item, idx) {
      return '<div class="history-item">'
           + '<strong>' + item.style + '</strong> — ' + item.date
           + '<br>' + (item.input.length > 50 ? item.input.substring(0, 50) + '...' : item.input)
           + '<button class="history-del" onclick="deleteHistory(' + idx + ')">削除</button>'
           + '</div>';
    }).join('');

    document.getElementById('history-list').innerHTML = list;
    document.getElementById('history-card').style.display = '';
  }

  function deleteHistory(idx) {
    var history = JSON.parse(localStorage.getItem('sneaker_history') || '[]');
    history.splice(idx, 1);
    localStorage.setItem('sneaker_history', JSON.stringify(history));
    loadHistory();
  }

  function copyPrompt() {
    var text = window.currentPrompt || document.getElementById('prompt-output').textContent.replace('📋 コピー', '').trim();
    navigator.clipboard.writeText(text).then(function() {
      alert('コピーしました！');
    }).catch(function() {
      // フォールバック
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('コピーしました！');
    });
  }

  // 初期化：履歴を表示
  window.addEventListener('load', function() {
    loadHistory();
  });
  </script>

  <script src="../related-widget.js"></script>

</body>
</html>
