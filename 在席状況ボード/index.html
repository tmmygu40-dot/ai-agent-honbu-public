<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在席状況ボード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>在席状況ボード</h1>
      <p class="date" id="today"></p>
    </header>

    <section class="add-member">
      <form id="addForm">
        <input type="text" id="memberName" placeholder="メンバー名を入力" maxlength="20">
        <button type="submit">追加</button>
      </form>
    </section>

    <section class="summary" id="summary"></section>

    <section class="board" id="board">
      <p class="empty-msg" id="emptyMsg">メンバーを追加してください</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
