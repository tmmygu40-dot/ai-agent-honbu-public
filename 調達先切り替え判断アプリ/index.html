<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>調達先切り替え判断アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>調達先切り替え判断</h1>
    <p class="subtitle">国産品と輸入品の総調達コストを比較して最適な仕入れ先を判断します</p>

    <div class="input-grid">
      <!-- 国産品 -->
      <div class="card domestic">
        <h2>🇯🇵 国産品</h2>
        <div class="field">
          <label>仕入れ単価（円）</label>
          <input type="number" id="d-price" placeholder="例：500" min="0" step="0.01">
        </div>
        <div class="field">
          <label>発注数量（個）</label>
          <input type="number" id="d-qty" placeholder="例：100" min="1">
        </div>
        <div class="field">
          <label>送料・配送費（円）</label>
          <input type="number" id="d-shipping" placeholder="例：3000" min="0">
        </div>
        <div class="field">
          <label>その他費用（円）</label>
          <input type="number" id="d-other" placeholder="例：0" min="0">
        </div>
      </div>

      <!-- 輸入品 -->
      <div class="card import">
        <h2>🌏 輸入品</h2>
        <div class="field">
          <label>仕入れ単価（円換算）</label>
          <input type="number" id="i-price" placeholder="例：300" min="0" step="0.01">
        </div>
        <div class="field">
          <label>発注数量（個）</label>
          <input type="number" id="i-qty" placeholder="例：100" min="1">
        </div>
        <div class="field">
          <label>送料・輸送費（円）</label>
          <input type="number" id="i-shipping" placeholder="例：8000" min="0">
        </div>
        <div class="field">
          <label>関税・通関費用（円）</label>
          <input type="number" id="i-tariff" placeholder="例：2000" min="0">
        </div>
        <div class="field">
          <label>その他費用（円）</label>
          <input type="number" id="i-other" placeholder="例：1000" min="0">
        </div>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">比較する</button>

    <div id="result" class="result hidden">
      <h2>比較結果</h2>
      <div class="result-grid">
        <div class="result-card domestic-result">
          <div class="result-label">国産品 総コスト</div>
          <div class="result-total" id="d-total">-</div>
          <div class="result-unit-cost" id="d-unit-cost">1個あたり: -</div>
        </div>
        <div class="result-card import-result">
          <div class="result-label">輸入品 総コスト</div>
          <div class="result-total" id="i-total">-</div>
          <div class="result-unit-cost" id="i-unit-cost">1個あたり: -</div>
        </div>
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="diff-info" id="diff-info"></div>
    </div>

    <!-- 履歴 -->
    <div class="history-section">
      <div class="history-header">
        <h2>比較履歴</h2>
        <button class="clear-btn" onclick="clearHistory()">履歴を削除</button>
      </div>
      <div id="history-list">
        <p class="empty-msg">まだ比較履歴はありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
