<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>筋トレ記録</h1>

    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="exercise">種目名</label>
        <input type="text" id="exercise" placeholder="例：ベンチプレス" list="exercise-list">
        <datalist id="exercise-list"></datalist>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="sets">セット数</label>
          <input type="number" id="sets" placeholder="例：3" min="1">
        </div>
        <div class="form-group">
          <label for="weight">重量 (kg)</label>
          <input type="number" id="weight" placeholder="例：60" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label for="reps">回数</label>
          <input type="number" id="reps" placeholder="例：10" min="1">
        </div>
      </div>
      <div class="form-group">
        <label for="note">メモ（任意）</label>
        <input type="text" id="note" placeholder="例：フォーム意識">
      </div>
      <button id="add-btn" class="btn-primary">記録する</button>
    </section>

    <section class="compare-section" id="compare-section" style="display:none;">
      <h2>前回との比較</h2>
      <div id="compare-content"></div>
    </section>

    <section class="history-section">
      <h2>記録一覧</h2>
      <div class="filter-row">
        <input type="text" id="filter-exercise" placeholder="種目で絞り込み">
        <input type="date" id="filter-date">
        <button id="clear-filter-btn" class="btn-secondary">リセット</button>
      </div>
      <div id="records-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
