<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3択の質問に答えるだけで、あなたの性格や好みから「推し色タイプ」を診断。赤・青・緑・黄・紫・オレンジの6タイプからあなたの色が分かります。">
  <title>推し色タイプ診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 診断専用スタイル ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 1rem; padding: 0 1.2rem;
    }
    .progress-track {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.75rem; color: var(--text-sub); text-align: right; margin-top: 0.3rem;
    }
    .choice-btn {
      display: block; width: 100%; padding: 0.9rem 1rem;
      margin-bottom: 0.6rem; font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:last-child { margin-bottom: 0; }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: scale(0.98); }
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; color: var(--text);
    }
    .color-badge {
      display: inline-block; width: 60px; height: 60px; border-radius: 50%;
      margin-bottom: 0.6rem; border: 3px solid #fff; box-shadow: var(--shadow);
    }
    .color-name { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.3rem; }
    .color-type-label { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .personality-text {
      font-size: 0.92rem; line-height: 1.7; color: var(--text); text-align: left;
      background: var(--bg); border-radius: 10px; padding: 1rem; margin-top: 0.8rem;
    }
    .restart-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 1rem auto 0; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: transparent; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .restart-btn:hover { background: var(--accent); color: #fff; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎨 推し色タイプ診断</h1>
    <p class="subtitle">3択で答えるだけ！あなたの性格にぴったりな「推し色」を見つけよう。</p>
  </header>

  <!-- 進捗バー -->
  <div class="progress-bar" id="progress-area">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <p class="progress-text" id="progress-text">0 / 7</p>
  </div>

  <!-- 質問カード -->
  <div class="card" id="question-card">
    <p class="question-text" id="question-text"></p>
    <div id="choices"></div>
  </div>

  <!-- 結果カード（診断後に表示） -->
  <div class="result-card" id="result" style="display:none">
    <p class="result-label">あなたの推し色タイプ</p>
    <div id="color-badge" class="color-badge"></div>
    <p class="color-name" id="color-name"></p>
    <p class="color-type-label" id="color-type-label"></p>
    <p class="result-note" id="result-note"></p>
    <div class="personality-text" id="personality-text"></div>
  </div>

  <!-- スコア内訳 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">色タイプ別スコア</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- もう一度ボタン -->
  <button class="restart-btn no-print" id="restart-btn" style="display:none" onclick="restart()">🔄 もう一度診断する</button>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 色タイプ定義 ──
  var COLOR_TYPES = {
    red:    { name: '🔴 情熱レッド',     color: '#dc2626', label: '行動力と情熱の人', note: 'やると決めたら即行動！まわりを巻き込むエネルギーの持ち主です。', personality: '思い立ったら即行動。リーダーシップがあり、周囲を引っ張る力があります。熱しやすく冷めにくいタイプで、好きなことにはとことんのめり込みます。競争心が強く、負けず嫌いな一面も。困っている人を見ると放っておけない、面倒見の良さも魅力です。' },
    blue:   { name: '🔵 冷静ブルー',     color: '#2563eb', label: '知性と信頼の人',   note: '落ち着いた判断力で頼られる存在。信頼感バツグンです。', personality: '論理的で冷静な思考の持ち主。感情に流されず、データや事実を重視して判断します。約束は必ず守り、コツコツと積み上げる努力家。一人の時間を大切にし、深く考えることが得意です。少数精鋭の人間関係を好み、信頼した相手にはとことん誠実です。' },
    green:  { name: '🟢 癒しグリーン',   color: '#16a34a', label: '調和と安らぎの人', note: 'いるだけで場が和む。みんなの心のオアシス的存在です。', personality: '穏やかで協調性が高く、争いごとを好みません。聞き上手で、相手の気持ちに寄り添うのが自然にできます。自然や動物が好きで、のんびりした時間を大切にするタイプ。変化よりも安定を好み、居心地のいい空間づくりが得意。周りの人をほっとさせる不思議な力があります。' },
    yellow: { name: '🟡 ポジティブイエロー', color: '#ca8a04', label: '明るさとひらめきの人', note: 'アイデア豊富で場を明るくする太陽のような存在です。', personality: '好奇心旺盛で、新しいことにワクワクするタイプ。ユーモアのセンスがあり、周囲を笑顔にする天才です。飽きっぽい一面もありますが、そのぶん多彩な経験値を持っています。直感力が鋭く、ひらめきで道を切り開くことも。楽観的で、ピンチもチャンスに変える力があります。' },
    purple: { name: '🟣 ミステリアスパープル', color: '#9333ea', label: '感性と独創性の人', note: '独自の世界観を持つクリエイティブな存在。唯一無二の個性が光ります。', personality: '繊細な感性の持ち主で、芸術や美しいものに心を動かされます。独自の世界観があり、人とは違う視点で物事を見ることができます。直感と論理の両方を使いこなし、深い洞察力が武器。ミステリアスな雰囲気で、周囲から一目置かれる存在。内面は情熱的で、こだわりが強いタイプです。' },
    orange: { name: '🟠 アクティブオレンジ', color: '#ea580c', label: '社交性と冒険の人', note: 'フットワーク軽く、どこでも誰とでも仲良くなれるムードメーカーです。', personality: '社交的でフレンドリー、初対面でもすぐに打ち解けます。チャレンジ精神旺盛で、新しい体験や冒険が大好き。じっとしているのが苦手で、常に動き回っているタイプ。サービス精神が旺盛で、人を楽しませることに喜びを感じます。柔軟性が高く、どんな環境にも適応できる強さがあります。' }
  };

  // ── 質問データ ──
  var QUESTIONS = [
    {
      q: '休日の過ごし方、理想に近いのは？',
      choices: [
        { text: '🏃 アクティブに外へ飛び出す', scores: { red: 2, orange: 1 } },
        { text: '📖 家でのんびり好きなことをする', scores: { blue: 1, green: 2 } },
        { text: '🎨 美術館やカフェでインスピレーション探し', scores: { purple: 2, yellow: 1 } }
      ]
    },
    {
      q: '友達から相談されたとき、あなたは？',
      choices: [
        { text: '💡 具体的なアドバイスをバシッと伝える', scores: { red: 1, blue: 2 } },
        { text: '🤗 まずはじっくり話を聞いてあげる', scores: { green: 2, purple: 1 } },
        { text: '😄 笑わせて元気づける', scores: { yellow: 2, orange: 1 } }
      ]
    },
    {
      q: 'グループで何かを決めるとき、あなたの立ち位置は？',
      choices: [
        { text: '🎯 リーダーとしてまとめる', scores: { red: 2, orange: 1 } },
        { text: '🔍 情報を集めて冷静に分析する', scores: { blue: 2, purple: 1 } },
        { text: '🕊️ みんなの意見を調整して和を保つ', scores: { green: 2, yellow: 1 } }
      ]
    },
    {
      q: '自分の強みだと思うのは？',
      choices: [
        { text: '⚡ 決断力と行動力', scores: { red: 2, blue: 1 } },
        { text: '🌈 アイデアと発想力', scores: { yellow: 2, purple: 1 } },
        { text: '🤝 人とのつながりを作る力', scores: { orange: 2, green: 1 } }
      ]
    },
    {
      q: 'ストレスを感じたとき、どうする？',
      choices: [
        { text: '🏋️ 体を動かして発散する', scores: { red: 1, orange: 2 } },
        { text: '🎵 音楽や映画など好きなものに浸る', scores: { purple: 2, yellow: 1 } },
        { text: '🍵 静かな場所でリラックスする', scores: { green: 1, blue: 2 } }
      ]
    },
    {
      q: '旅行に行くなら、どんな旅がいい？',
      choices: [
        { text: '🗺️ 計画を立ててじっくり巡る旅', scores: { blue: 2, green: 1 } },
        { text: '✈️ ノープランで気の向くままに冒険', scores: { orange: 2, red: 1 } },
        { text: '📸 映える場所をめぐるフォトジェニックな旅', scores: { yellow: 1, purple: 2 } }
      ]
    },
    {
      q: '自分を動物にたとえるなら？',
      choices: [
        { text: '🦁 ライオン（堂々としたリーダー）', scores: { red: 2, orange: 1 } },
        { text: '🐱 猫（マイペースで気まぐれ）', scores: { purple: 1, blue: 2 } },
        { text: '🐕 犬（人懐っこくて忠実）', scores: { green: 1, yellow: 2 } }
      ]
    }
  ];

  var currentQ = 0;
  var scores = { red: 0, blue: 0, green: 0, yellow: 0, purple: 0, orange: 0 };

  function showQuestion() {
    if (currentQ >= QUESTIONS.length) {
      showDiagnosis();
      return;
    }
    var q = QUESTIONS[currentQ];
    document.getElementById('question-text').textContent = 'Q' + (currentQ + 1) + '. ' + q.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.text;
      btn.onclick = function() { selectChoice(i); };
      choicesEl.appendChild(btn);
    });
    // 進捗バー更新
    var pct = Math.round((currentQ / QUESTIONS.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = currentQ + ' / ' + QUESTIONS.length;
  }

  function selectChoice(idx) {
    var q = QUESTIONS[currentQ];
    var s = q.choices[idx].scores;
    for (var key in s) { scores[key] += s[key]; }
    currentQ++;
    showQuestion();
  }

  function showDiagnosis() {
    // 進捗バー100%
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').textContent = QUESTIONS.length + ' / ' + QUESTIONS.length;

    // 質問カード非表示
    document.getElementById('question-card').style.display = 'none';

    // 最高スコアの色を決定
    var maxColor = 'red', maxScore = 0;
    for (var key in scores) {
      if (scores[key] > maxScore) { maxScore = scores[key]; maxColor = key; }
    }

    var ct = COLOR_TYPES[maxColor];

    // 結果カード表示
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.style.borderColor = ct.color;
    document.getElementById('color-badge').style.background = ct.color;
    document.getElementById('color-name').textContent = ct.name;
    document.getElementById('color-name').style.color = ct.color;
    document.getElementById('color-type-label').textContent = ct.label;
    document.getElementById('result-note').textContent = ct.note;
    document.getElementById('personality-text').textContent = ct.personality;

    // スコア内訳テーブル
    var rows = [];
    var colorOrder = ['red','blue','green','yellow','purple','orange'];
    colorOrder.forEach(function(c) {
      var isTop = (c === maxColor);
      rows.push('<tr' + (isTop ? ' class="hl"' : '') + '><td>' + COLOR_TYPES[c].name + '</td><td>' + scores[c] + ' pt</td></tr>');
    });
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = 'block';

    // もう一度ボタン表示
    document.getElementById('restart-btn').style.display = 'block';

    // localStorage に保存
    try {
      var history = JSON.parse(localStorage.getItem('oshiiro_history') || '[]');
      history.unshift({ date: new Date().toISOString().slice(0,10), color: maxColor, name: ct.name, scores: Object.assign({}, scores) });
      if (history.length > 10) history = history.slice(0, 10);
      localStorage.setItem('oshiiro_history', JSON.stringify(history));
    } catch(e) {}
  }

  function restart() {
    currentQ = 0;
    scores = { red: 0, blue: 0, green: 0, yellow: 0, purple: 0, orange: 0 };
    document.getElementById('question-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    showQuestion();
  }

  // 初期表示
  showQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
