<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程表作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>工程表作成アプリ</h1>

    <section class="form-section">
      <h2>作業を追加</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="taskName">作業名</label>
          <input type="text" id="taskName" placeholder="例：設計" maxlength="30">
        </div>
        <div class="form-group">
          <label for="startDate">開始日</label>
          <input type="date" id="startDate">
        </div>
        <div class="form-group">
          <label for="duration">日数</label>
          <input type="number" id="duration" min="1" max="365" placeholder="日数" value="1">
        </div>
        <button id="addBtn" class="btn-add">追加</button>
      </div>
      <p id="errorMsg" class="error-msg" hidden></p>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <h2>ガントチャート</h2>
        <button id="clearBtn" class="btn-clear">全削除</button>
      </div>
      <div id="chartContainer" class="chart-container">
        <p class="empty-msg">作業を追加するとチャートが表示されます</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
