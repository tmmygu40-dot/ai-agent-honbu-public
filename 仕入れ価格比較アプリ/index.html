<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ価格比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>仕入れ価格比較</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>価格を登録</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="品目名（例：醤油）" />
        <input type="text" id="supplierName" placeholder="仕入れ先（例：A商店）" />
        <input type="number" id="price" placeholder="単価（円）" min="0" />
        <input type="text" id="unit" placeholder="単位（例：1L）" />
        <button id="addBtn">登録</button>
      </div>
    </section>

    <!-- 品目フィルター -->
    <section class="filter-section">
      <label for="filterItem">品目で絞り込み：</label>
      <select id="filterItem">
        <option value="">すべて</option>
      </select>
    </section>

    <!-- 比較テーブル -->
    <section class="table-section">
      <div id="comparisonArea"></div>
    </section>

    <!-- データ管理 -->
    <section class="manage-section">
      <button id="clearAllBtn" class="danger-btn">全データ削除</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
