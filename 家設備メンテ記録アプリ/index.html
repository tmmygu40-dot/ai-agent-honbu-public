<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家設備メンテ記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>家設備メンテ記録</h1>

    <section class="form-section">
      <h2 id="form-title">設備を登録する</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">設備名</label>
          <input type="text" id="name" placeholder="例：エアコン（リビング）">
        </div>
        <div class="form-group">
          <label for="last-date">最終点検・交換日</label>
          <input type="date" id="last-date">
        </div>
        <div class="form-group">
          <label for="interval">推奨インターバル（月）</label>
          <input type="number" id="interval" min="1" max="120" placeholder="例：12">
        </div>
        <div class="form-group">
          <label for="memo">メモ（任意）</label>
          <input type="text" id="memo" placeholder="例：フィルター交換">
        </div>
      </div>
      <div class="form-buttons">
        <button id="submit-btn" onclick="submitForm()">登録する</button>
        <button id="cancel-btn" class="btn-secondary hidden" onclick="cancelEdit()">キャンセル</button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>設備一覧</h2>
        <span id="count-label"></span>
      </div>
      <div id="equipment-list"></div>
      <p id="empty-msg" class="empty-msg">設備が登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
