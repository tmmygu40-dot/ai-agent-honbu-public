<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>残業上限チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>残業上限チェッカー</h1>
    <p class="subtitle">36協定 月45時間・年360時間</p>

    <section class="input-section">
      <h2>スタッフを追加</h2>
      <div class="form-row">
        <input type="text" id="staffName" placeholder="スタッフ名" maxlength="20">
        <input type="number" id="monthlyHours" placeholder="今月の残業時間（h）" min="0" max="999" step="0.5">
        <input type="number" id="yearlyHours" placeholder="今年の累計残業時間（h）" min="0" max="999" step="0.5">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <section class="list-section">
      <h2>スタッフ一覧</h2>
      <div id="staffList" class="staff-list"></div>
      <p id="emptyMsg" class="empty-msg">スタッフが登録されていません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
