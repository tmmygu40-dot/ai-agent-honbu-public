<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週報作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>週報作成アプリ</h1>
      <p class="subtitle">入力して週報テキストを生成・コピー</p>
    </header>

    <main>
      <section class="input-section">
        <div class="field">
          <label for="week-range">対象週</label>
          <input type="text" id="week-range" placeholder="例：4/14（月）〜4/18（金）">
        </div>

        <div class="field">
          <label for="tasks">今週の作業</label>
          <textarea id="tasks" rows="4" placeholder="・〇〇の対応&#10;・〇〇の確認&#10;・〇〇のミーティング"></textarea>
        </div>

        <div class="field">
          <label for="results">今週の成果</label>
          <textarea id="results" rows="4" placeholder="・〇〇が完了&#10;・〇〇を達成&#10;・〇〇を改善"></textarea>
        </div>

        <div class="field">
          <label for="issues">課題・問題点</label>
          <textarea id="issues" rows="3" placeholder="・〇〇に時間がかかった&#10;・〇〇が未完了"></textarea>
        </div>

        <div class="field">
          <label for="next-week">来週の予定</label>
          <textarea id="next-week" rows="4" placeholder="・〇〇を対応予定&#10;・〇〇の打ち合わせ&#10;・〇〇の完了を目指す"></textarea>
        </div>

        <div class="field">
          <label for="memo">その他・連絡事項</label>
          <textarea id="memo" rows="2" placeholder="（任意）休暇予定・特記事項など"></textarea>
        </div>

        <div class="btn-row">
          <button id="generate-btn" class="btn-primary">週報テキストを生成</button>
          <button id="clear-btn" class="btn-secondary">クリア</button>
        </div>
      </section>

      <section class="output-section" id="output-section">
        <div class="output-header">
          <h2>生成された週報</h2>
          <button id="copy-btn" class="btn-copy">コピー</button>
        </div>
        <pre id="output-text"></pre>
        <div id="copy-msg" class="copy-msg">コピーしました！</div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
