<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事原価管理チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .ok-row td:last-child { color: var(--ok); }
    .detail-table .ng-row td:last-child { color: var(--ng); }

    /* ── 保存ボタン ── */
    .btn-save {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.5rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }

    /* ── 案件一覧 ── */
    .project-list { max-width: 600px; margin: 0 auto; }
    .project-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
    }
    .project-item.profit-ok  { border-left: 4px solid var(--ok); }
    .project-item.profit-ng  { border-left: 4px solid var(--ng); }
    .project-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
    }
    .project-name { font-size: 1rem; font-weight: 800; }
    .project-date { font-size: 0.75rem; color: var(--text-sub); }
    .project-row {
      display: flex; justify-content: space-between;
      font-size: 0.84rem; color: var(--text-sub); margin-bottom: 0.2rem;
    }
    .project-row strong { color: var(--text); }
    .project-profit {
      font-size: 1.1rem; font-weight: 900; margin-top: 0.5rem;
    }
    .profit-ok .project-profit { color: var(--ok); }
    .profit-ng .project-profit { color: var(--ng); }
    .btn-del {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 0.3rem 0.7rem;
      font-size: 0.75rem; color: var(--text-sub); cursor: pointer;
      margin-top: 0.5rem; float: right;
    }
    .btn-del:hover { background: var(--ng-bg); border-color: var(--ng); color: var(--ng); }
    .empty-msg { text-align: center; font-size: 0.85rem; color: var(--text-sub); padding: 1.5rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* セクション見出し */
    .section-title {
      max-width: 600px; margin: 1.5rem auto 0.75rem;
      font-size: 0.85rem; font-weight: 700; color: var(--text-sub);
      padding: 0 0.2rem;
    }
  </style>

<body>

  <header class="app-header">
    <h1>工事原価管理チェッカー</h1>
    <p class="subtitle">材料費・人工数・日当を入れて見積もりとの差額と利益を即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">案件情報を入力</p>
    <div class="field">
      <label for="projName">案件名</label>
      <input type="text" id="projName" placeholder="例: ○○邸 外壁工事">
    </div>
    <div class="field">
      <label for="estimate">見積もり金額（円）</label>
      <input type="number" id="estimate" placeholder="例: 800000" min="0">
      <p class="hint">税込みの請求予定額</p>
    </div>
    <div class="field">
      <label for="material">材料費（円）</label>
      <input type="number" id="material" placeholder="例: 250000" min="0">
    </div>
    <div class="field">
      <label for="workers">人工数（人）</label>
      <input type="number" id="workers" placeholder="例: 3" min="0" step="0.5">
      <p class="hint">延べ人数。1人3日なら「3」</p>
    </div>
    <div class="field">
      <label for="dayRate">日当（円/人）</label>
      <input type="number" id="dayRate" placeholder="例: 18000" min="0">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">利益・差額を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="rl">利益</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 保存ボタン -->
  <button class="btn-save" id="saveBtn" onclick="saveProject()" style="display:none">この案件を記録に保存する</button>

  <!-- 案件一覧 -->
  <p class="section-title">📋 保存済み案件一覧</p>
  <div class="project-list" id="projectList"></div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var currentCalc = null;

  function calc() {
    var name     = document.getElementById('projName').value.trim();
    var estimate = parseFloat(document.getElementById('estimate').value);
    var material = parseFloat(document.getElementById('material').value);
    var workers  = parseFloat(document.getElementById('workers').value);
    var dayRate  = parseFloat(document.getElementById('dayRate').value);

    if (!name) { showErr('案件名を入力してください'); return; }
    if (isNaN(estimate) || isNaN(material) || isNaN(workers) || isNaN(dayRate)) {
      showErr('すべての数値を入力してください'); return;
    }

    var labor    = workers * dayRate;
    var cost     = material + labor;
    var profit   = estimate - cost;
    var pct      = estimate > 0 ? (profit / estimate * 100) : 0;

    currentCalc = { name: name, estimate: estimate, material: material, workers: workers, dayRate: dayRate, labor: labor, cost: cost, profit: profit, pct: pct, date: today() };

    var level, note;
    if (profit < 0) {
      level = 'ng'; note = '赤字です。見直しが必要です。';
    } else if (pct >= 20) {
      level = 'ok'; note = '利益率 ' + pct.toFixed(1) + '% — 十分な余裕があります。';
    } else {
      level = 'warn'; note = '利益率 ' + pct.toFixed(1) + '% — 余裕が薄い状況です。';
    }

    showResult(level, (profit >= 0 ? '+' : '') + fmt(profit) + ' 円', note);
    showDetail([
      ['見積もり金額', fmt(estimate) + ' 円'],
      ['材料費',       fmt(material) + ' 円'],
      ['人件費 (' + workers + '人 × ' + fmt(dayRate) + '円)', fmt(labor) + ' 円'],
      ['原価合計',     fmt(cost) + ' 円'],
      ['利益',         (profit >= 0 ? '+' : '') + fmt(profit) + ' 円', true, profit >= 0 ? 'ok-row' : 'ng-row'],
      ['利益率',       pct.toFixed(1) + ' %'],
    ]);

    document.getElementById('saveBtn').style.display = '';
  }

  function saveProject() {
    if (!currentCalc) return;
    var projects = loadProjects();
    projects.unshift(currentCalc);
    localStorage.setItem('kojiGenka_projects', JSON.stringify(projects));
    renderList();
    document.getElementById('saveBtn').style.display = 'none';
    currentCalc = null;
    // フォームをリセット
    ['projName','estimate','material','workers','dayRate'].forEach(function(id){ document.getElementById(id).value = ''; });
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
  }

  function deleteProject(idx) {
    var projects = loadProjects();
    projects.splice(idx, 1);
    localStorage.setItem('kojiGenka_projects', JSON.stringify(projects));
    renderList();
  }

  function loadProjects() {
    try { return JSON.parse(localStorage.getItem('kojiGenka_projects')) || []; } catch(e) { return []; }
  }

  function renderList() {
    var projects = loadProjects();
    var el = document.getElementById('projectList');
    if (projects.length === 0) {
      el.innerHTML = '<p class="empty-msg">保存済みの案件はまだありません</p>';
      return;
    }
    el.innerHTML = projects.map(function(p, i) {
      var cls = p.profit >= 0 ? 'profit-ok' : 'profit-ng';
      return '<div class="project-item ' + cls + '">'
        + '<div class="project-header">'
        + '<span class="project-name">' + esc(p.name) + '</span>'
        + '<span class="project-date">' + (p.date || '') + '</span>'
        + '</div>'
        + '<div class="project-row"><span>見積もり</span><strong>' + fmt(p.estimate) + ' 円</strong></div>'
        + '<div class="project-row"><span>材料費</span><strong>' + fmt(p.material) + ' 円</strong></div>'
        + '<div class="project-row"><span>人件費（' + p.workers + '人 × ' + fmt(p.dayRate) + '円）</span><strong>' + fmt(p.labor) + ' 円</strong></div>'
        + '<div class="project-row"><span>原価合計</span><strong>' + fmt(p.cost) + ' 円</strong></div>'
        + '<div class="project-profit">' + (p.profit >= 0 ? '▲ 利益 +' : '▼ 赤字 ') + fmt(Math.abs(p.profit)) + ' 円'
        + ' <span style="font-size:0.78rem;font-weight:600;opacity:0.75">（' + p.pct.toFixed(1) + '%）</span></div>'
        + '<button class="btn-del" onclick="deleteProject(' + i + ')">削除</button>'
        + '</div>';
    }).join('');
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr class="' + (r[2] ? 'hl ' : '') + (r[3] || '') + '">'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('saveBtn').style.display = 'none';
    currentCalc = null;
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function today() {
    var d = new Date();
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  }

  renderList();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
