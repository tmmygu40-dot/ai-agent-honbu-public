<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ターゲット別にバズるInstagramキャプション3案を入力内容に応じて自動生成。若年層・家族層・ビジネス層など、投稿内容に合わせた最適な文案をサクッと作成できるジェネレーターです。">
  <title>📱 インスタ投稿文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📱 インスタ投稿文ジェネレーター</h1>
    <p class="subtitle">ターゲット別にバズるInstagramキャプションを3案、サクッと生成できます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">投稿内容</p>
    <div class="field">
      <label for="target">ターゲット</label>
      <select id="target">
        <option value="young">若年層（Z世代・学生向け）</option>
        <option value="family">家族層（子育て層向け）</option>
        <option value="business">ビジネス層（社会人向け）</option>
        <option value="casual">カジュアル（友達同士向け）</option>
      </select>
      <p class="hint">投稿の対象者を選んでください</p>
    </div>
    <div class="field">
      <label for="keyword">キーワード（オプション）</label>
      <input type="text" id="keyword" placeholder="例: カフェ、新商品、イベント...">
      <p class="hint">投稿の内容キーワードを入力すると、より関連性の高い文案が生成されます</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">生成する</button>

  <!-- 結果カード（3案の投稿文を表示） -->
  <div class="card" id="result" style="display:none">
    <p class="card-title">生成されたキャプション</p>
    <div id="captions-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 生成されたキャプション案は参考資料です。Instagramのアルゴリズムや最新トレンドに完全対応するものではありません。実際の投稿時は、内容に応じて調整・編集をお願いします。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── キャプションテンプレート ──
  var CAPTIONS = {
    young: [
      ['問いかけ型', 'これ知ってた？{keyword}◆正解した人だけが…👀', '✨{keyword}について語り合いたい人🙋'],
      ['ストーリー型', 'さっき{keyword}してたら思ったんだけど🤔💭', '私が{keyword}でハマったのはマジで…🎯'],
      ['数字型', '{keyword}で時間潰せる${num}個の方法💯', '実は{keyword}でこんなことできる⁇知ってた？'],
    ],
    family: [
      ['共感型', '子どもも親も大満足💕{keyword}の楽しみ方', '{keyword}で子どもの笑顔GET🥰我が家の定番ルーティン'],
      ['提案型', '今週末は{keyword}で家族時間☀️子どもの反応が…👏', '親子で楽しめる{keyword}◆夏休みの強い味方です🌟'],
      ['ノウハウ型', 'ママたちが選んだ{keyword}の正解👨‍👩‍👧‍👦💛', '{keyword}を選ぶ時に気をつけてるコト3つ✓'],
    ],
    business: [
      ['実用型', '{keyword}で業務効率化◆実装事例3選📊', '2024年版・{keyword}導入のポイント📌これだけ押さえておこう'],
      ['トレンド型', '最新トレンド：{keyword}が変わる理由🔄', '{keyword}をどう活かすか？業界最新動向📈'],
      ['ノウハウ型', '{keyword}で営業成約率UP✅営業パーソン必見🎯', '{keyword}運用のコツ：成功事例から学ぶ💼'],
    ],
    casual: [
      ['楽しみ型', 'また{keyword}しちゃった😂フォロワーさんもやってた？', '{keyword}の魅力◆新しい推し活の沼へようこそ🌀'],
      ['推し型', '推しが{keyword}してるのを見たらもう…❤️‍🔥', '{keyword}なら推しの推し活も応援できるし😍これ最高'],
      ['あるあるコンテンツ', 'あるある：{keyword}だけは外せない🙅‍♀️', '{keyword}派 vs {keyword}派❓あなたはどっち🤔'],
    ]
  };

  function loadCaptions() {
    var saved = localStorage.getItem('instaCaption_saved');
    if (saved) {
      document.getElementById('captions-list').innerHTML = JSON.parse(saved);
      document.getElementById('result').style.display = '';
    }
  }

  function generate() {
    var target = document.getElementById('target').value;
    var keyword = document.getElementById('keyword').value || '【ここにキーワード】';

    if (!target) { showError('ターゲットを選んでください'); return; }

    var templates = CAPTIONS[target];
    var captions = [];
    var indices = [0, 1, 2].sort(function() { return Math.random() - 0.5; });

    for (var i = 0; i < 3; i++) {
      var idx = indices[i];
      var template = templates[idx];
      var pattern = template[1];
      var caption = pattern.replace(/{keyword}/g, keyword).replace(/{num}/g, Math.floor(Math.random() * 5) + 3);
      captions.push({type: template[0], text: caption});
    }

    showCaptions(captions);
    saveCaptions(captions);
  }

  function showCaptions(captions) {
    var html = captions.map(function(c, i) {
      return '<div style="margin-bottom:1.2rem;padding:1rem;background:var(--accent-light);border-radius:9px;border-left:4px solid var(--accent);">'
           + '<p style="font-size:0.75rem;color:var(--text-sub);margin-bottom:0.3rem;font-weight:700;">' + (i+1) + '. ' + c.type + '</p>'
           + '<p style="font-size:0.96rem;color:var(--text);line-height:1.6;margin-bottom:0.5rem;">' + c.text + '</p>'
           + '<button style="background:transparent;border:none;color:var(--accent);font-size:0.8rem;cursor:pointer;padding:0;font-weight:600;" onclick="copyText(' + "'" + c.text.replace(/'/g, "\\'") + "'" + ')">📋 コピー</button>'
           + '</div>';
    }).join('');
    document.getElementById('captions-list').innerHTML = html;
    document.getElementById('result').style.display = '';
  }

  function saveCaptions(captions) {
    var html = document.getElementById('captions-list').innerHTML;
    localStorage.setItem('instaCaption_saved', JSON.stringify(html));
  }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert('コピーしました！');
      });
    } else {
      alert('コピー機能に対応していない環境です');
    }
  }

  function showError(msg) {
    var html = '<div style="padding:1rem;background:var(--ng-bg);border:2px solid var(--ng);border-radius:9px;color:var(--ng);text-align:center;">'
             + '<p style="font-size:0.95rem;font-weight:600;">⚠️ ' + msg + '</p>'
             + '</div>';
    document.getElementById('captions-list').innerHTML = html;
    document.getElementById('result').style.display = '';
  }

  window.addEventListener('load', loadCaptions);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
