<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="今日のイライラと失敗を爆笑ネタに変える無料ツール。入力するだけで、あるあるネタや自虐ギャグに変換。ストレス解消やSNS投稿ネタ作成にお役立てください。">
  <title>😂 ユーモア返し生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── ラジオボタン ── */
    .radio-group { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.5rem; }
    .radio-item { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .radio-item input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .radio-item label { margin: 0; cursor: pointer; font-weight: normal; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.5; margin-bottom: 1rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }

    /* ── コピーボタン ── */
    .btn-copy {
      display: inline-block; padding: 0.5rem 1rem;
      font-size: 0.85rem; font-weight: 600;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-copy:active { transform: scale(0.95); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- 計測タグ 必須 -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>😂 ユーモア返し生成器</h1>
    <p class="subtitle">今日のイライラと失敗を爆笑ネタに変える文が瞬時に出ます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="input-text">イライラや失敗の内容</label>
      <textarea id="input-text" placeholder="例：朝、駅でズボンのチャックを下げたまま乗ってた"></textarea>
      <p class="hint">今日あった失敗やイライラをここに書いてください。</p>
    </div>
    <div class="field">
      <label>ユーモアのトーン</label>
      <div class="radio-group">
        <div class="radio-item">
          <input type="radio" id="tone-bright" name="tone" value="bright" checked>
          <label for="tone-bright">明るく・ポップに</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="tone-cool" name="tone" value="cool">
          <label for="tone-cool">クールに・ドライに</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="tone-warm" name="tone" value="warm">
          <label for="tone-warm">温かく・共感的に</label>
        </div>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">ユーモア返し文を生成</button>

  <!-- 結果カード（JS で表示） -->
  <div class="result-card ok" id="result" style="display:none">
    <p class="result-label">✨ ユーモア返し文</p>
    <p class="result-value" id="rv"></p>
    <button class="btn-copy" onclick="copyToClipboard()">📋 コピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは、日々のストレスをユーモアでポジティブに変えるための補助ツールです。本格的なジョーク作成・SNS投稿ネタ作成などにお役立てください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ユーモア返し文のテンプレート
  var HUMOR_TEMPLATES = {
    bright: [
      '【あるある】{text} ← 誰もが一度はやってる件w',
      '💫 {text}  それはもはや運命です（諦念）',
      '爆笑ネタ認定：{text} ← 今日のハイライト！',
      'やってしまった感 MAX：{text}',
      '🎭 {text} ← 映画化決定！',
      '{text} ← これぞプロの技（自虐）'
    ],
    cool: [
      '観察：{text} → 人間らしさの表現方法の一つ。',
      '{text} — 完璧さは幻想である。',
      '事実：{text} | 解釈：経験値を得た。',
      '{text} → 次の糧へ。',
      'ログ記録：{text} | ステータス：学習中',
      '{text} — これが人生というゲーム。'
    ],
    warm: [
      '（みんなそういう時あるよね）{text}',
      '{text} ← あ、ごめん。誰にでもある…',
      '気づいたことがあります：{text}  大切なのはそこからどうするかです。',
      '{text} を経験した。これは誰もが通る道。',
      '共感ポイント：{text} ← あなただけじゃありません',
      '{text} — そういう日もありますよね。'
    ]
  };

  function generate() {
    var text = document.getElementById('input-text').value.trim();
    var tone = document.querySelector('input[name="tone"]:checked').value;

    if (!text) {
      alert('イライラや失敗の内容を入力してください');
      return;
    }

    var templates = HUMOR_TEMPLATES[tone];
    var template = templates[Math.floor(Math.random() * templates.length)];
    var result = template.replace('{text}', text);

    showResult(result);
    saveHistory(text, tone, result);
  }

  function showResult(text) {
    var card = document.getElementById('result');
    document.getElementById('rv').textContent = text;
    card.style.display = '';
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function copyToClipboard() {
    var text = document.getElementById('rv').textContent;
    navigator.clipboard.writeText(text).then(function() {
      alert('コピーしました！');
    }).catch(function() {
      alert('コピーに失敗しました。手動でコピーしてください。');
    });
  }

  // localStorage で履歴を保存（キー名を一貫にする）
  function saveHistory(input, tone, result) {
    var history = JSON.parse(localStorage.getItem('humorgenerator-history') || '[]');
    history.push({
      input: input,
      tone: tone,
      result: result,
      timestamp: new Date().toISOString()
    });
    // 最新20件のみ保持
    if (history.length > 20) history.shift();
    localStorage.setItem('humorgenerator-history', JSON.stringify(history));
  }

  // ページロード時に前回の値を復元（オプション）
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('humorgenerator-lastInput');
    if (saved) {
      document.getElementById('input-text').value = saved;
    }
  });

  // 入力内容を自動保存
  document.getElementById('input-text').addEventListener('input', function() {
    localStorage.setItem('humorgenerator-lastInput', this.value);
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
