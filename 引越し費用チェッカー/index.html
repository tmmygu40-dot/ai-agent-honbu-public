<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引越し費用チェッカー｜距離と間取りで相場を即確認</title>
  <meta name="description" content="移動距離・間取り・時期を選ぶだけで引越し料金の相場レンジを即確認。業者に問い合わせる前の予算目安として使えるシンプルな引越し費用チェッカーです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 比較テーブル ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.5rem; }
    .compare-table th, .compare-table td { padding: 0.45rem 0.4rem; border: 1px solid var(--border); text-align: center; }
    .compare-table th { background: var(--bg); font-weight: 700; color: var(--text-sub); }
    .compare-table .highlight { background: var(--accent-light); font-weight: 700; color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>🚚 引越し費用チェッカー</h1>
    <p class="subtitle">距離・間取り・時期を選ぶだけで料金相場をすぐ確認</p>
  </header>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="distance">移動距離</label>
      <select id="distance">
        <option value="">選んでください</option>
        <option value="0">同市区町村内（近距離）</option>
        <option value="1">同都道府県内</option>
        <option value="2">近県（〜100km）</option>
        <option value="3">遠方（100km超）</option>
        <option value="4">単身パック対象</option>
      </select>
    </div>
    <div class="field">
      <label for="madori">間取り</label>
      <select id="madori">
        <option value="">選んでください</option>
        <option value="0">単身・荷物少なめ</option>
        <option value="1">1K・1DK</option>
        <option value="2">1LDK・2K</option>
        <option value="3">2LDK・3K</option>
        <option value="4">3LDK以上</option>
      </select>
      <p class="hint">単身パックは単身・荷物少なめのみ対応</p>
    </div>
    <div class="field">
      <label for="season">引越し時期</label>
      <select id="season">
        <option value="normal">通常期（5〜2月）</option>
        <option value="busy">繁忙期（3〜4月・9月）</option>
        <option value="off">閑散期（梅雨・お盆・年末）</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">相場を確認する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">料金相場の目安</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">時期別の比較</p>
    <table class="compare-table" id="compareTable"></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 表示金額は一般的な引越し業者の料金相場を参考にした目安です。実際の料金は荷物量・作業員数・時間帯・業者によって異なります。必ず複数社の見積もりを取ることをおすすめします。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 相場テーブル [距離][間取り] = [最安(万円), 最高(万円)]
  var priceTable = [
    // 同市内
    [[3,6],[4,8],[6,12],[8,15],[12,20]],
    // 同都道府県
    [[4,8],[6,12],[8,16],[12,20],[16,28]],
    // 近県100km以内
    [[5,10],[7,15],[10,20],[15,25],[20,35]],
    // 遠方100km超
    [[6,15],[10,20],[15,28],[20,35],[28,50]],
    // 単身パック
    [[2,5],[null,null],[null,null],[null,null],[null,null]],
  ];

  var seasonRate = { normal: 1.0, busy: 1.35, off: 0.85 };
  var seasonLabel = { normal: '通常期', busy: '繁忙期', off: '閑散期' };
  var distLabels = ['同市区町村内','同都道府県内','近県（〜100km）','遠方（100km超）','単身パック'];
  var madoriLabels = ['単身・少','1K・1DK','1LDK・2K','2LDK・3K','3LDK以上'];

  function calc() {
    var distIdx = document.getElementById('distance').value;
    var madIdx  = document.getElementById('madori').value;
    var season  = document.getElementById('season').value;

    if (distIdx === '' || madIdx === '') {
      showErr('移動距離と間取りを選んでください');
      return;
    }

    var base = priceTable[parseInt(distIdx)][parseInt(madIdx)];
    if (!base || base[0] === null) {
      showErr('単身パックは単身・荷物少なめのみ対応しています');
      return;
    }

    var rate = seasonRate[season];
    var lo   = Math.round(base[0] * rate * 10) / 10;
    var hi   = Math.round(base[1] * rate * 10) / 10;

    var level = season === 'busy' ? 'warn' : 'ok';
    var seasonNote = season === 'busy'
      ? '繁忙期のため通常期より20〜40%割高になる場合があります'
      : season === 'off'
      ? '閑散期のため通常期より10〜20%お得になる場合があります'
      : '通常期の標準的な相場です';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = lo + '〜' + hi + '万円';
    document.getElementById('re').textContent = distLabels[parseInt(distIdx)] + ' / ' + madoriLabels[parseInt(madIdx)] + ' / ' + seasonLabel[season];
    document.getElementById('rn').textContent = seasonNote;

    // 時期別比較テーブル
    var seasons = [
      { key: 'off',    label: '閑散期', rate: 0.85 },
      { key: 'normal', label: '通常期', rate: 1.0  },
      { key: 'busy',   label: '繁忙期', rate: 1.35 },
    ];
    var tableHtml = '<tr><th>時期</th><th>料金目安</th><th>備考</th></tr>';
    seasons.forEach(function(s) {
      var slo = Math.round(base[0] * s.rate * 10) / 10;
      var shi = Math.round(base[1] * s.rate * 10) / 10;
      var cls = s.key === season ? ' class="highlight"' : '';
      var note = s.key === 'busy' ? '3〜4月・9月' : s.key === 'off' ? '梅雨・お盆' : '5〜2月';
      tableHtml += '<tr' + cls + '><td>' + s.label + '</td><td>' + slo + '〜' + shi + '万円</td><td>' + note + '</td></tr>';
    });
    document.getElementById('compareTable').innerHTML = tableHtml;
    document.getElementById('detail').style.display = 'block';

    saveToLS();
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card warn';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function saveToLS() {
    try {
      localStorage.setItem('hikkoshi_checker', JSON.stringify({
        distance: document.getElementById('distance').value,
        madori:   document.getElementById('madori').value,
        season:   document.getElementById('season').value,
      }));
    } catch(e) {}
  }

  function loadFromLS() {
    try {
      var d = JSON.parse(localStorage.getItem('hikkoshi_checker') || 'null');
      if (!d) return;
      if (d.distance !== undefined) document.getElementById('distance').value = d.distance;
      if (d.madori   !== undefined) document.getElementById('madori').value   = d.madori;
      if (d.season   !== undefined) document.getElementById('season').value   = d.season;
    } catch(e) {}
  }

  loadFromLS();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
