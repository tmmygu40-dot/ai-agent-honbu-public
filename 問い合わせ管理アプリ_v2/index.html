<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問い合わせ管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>問い合わせ管理</h1>
  </header>

  <main>
    <section class="form-section">
      <h2>新規登録</h2>
      <form id="inquiry-form">
        <div class="form-group">
          <label for="content">問い合わせ内容</label>
          <textarea id="content" rows="3" placeholder="問い合わせの内容を入力" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="contact">問い合わせ元</label>
            <input type="text" id="contact" placeholder="会社名・名前など">
          </div>
          <div class="form-group">
            <label for="assignee">対応者</label>
            <input type="text" id="assignee" placeholder="担当者名">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">登録する</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>問い合わせ一覧</h2>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">すべて</button>
          <button class="filter-btn" data-filter="未対応">未対応</button>
          <button class="filter-btn" data-filter="対応中">対応中</button>
          <button class="filter-btn" data-filter="完了">完了</button>
        </div>
      </div>

      <div class="summary" id="summary"></div>

      <div id="inquiry-list" class="inquiry-list">
        <p class="empty-msg">問い合わせはまだありません</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
