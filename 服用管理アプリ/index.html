<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服用管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>💊 服用管理</h1>
    <p class="date" id="today-date"></p>

    <!-- 登録フォーム -->
    <section class="add-section">
      <h2>薬を登録</h2>
      <div class="form-row">
        <input type="text" id="med-name" placeholder="薬名" maxlength="30">
        <select id="med-timing">
          <option value="朝">朝</option>
          <option value="昼">昼</option>
          <option value="夜">夜</option>
          <option value="就寝前">就寝前</option>
        </select>
        <button id="add-btn">追加</button>
      </div>
    </section>

    <!-- タイミング別チェックリスト -->
    <section class="check-section">
      <div class="timing-block" id="block-朝">
        <h2>🌅 朝</h2>
        <ul class="med-list" data-timing="朝"></ul>
        <p class="empty-msg">登録なし</p>
      </div>
      <div class="timing-block" id="block-昼">
        <h2>☀️ 昼</h2>
        <ul class="med-list" data-timing="昼"></ul>
        <p class="empty-msg">登録なし</p>
      </div>
      <div class="timing-block" id="block-夜">
        <h2>🌙 夜</h2>
        <ul class="med-list" data-timing="夜"></ul>
        <p class="empty-msg">登録なし</p>
      </div>
      <div class="timing-block" id="block-就寝前">
        <h2>🛏 就寝前</h2>
        <ul class="med-list" data-timing="就寝前"></ul>
        <p class="empty-msg">登録なし</p>
      </div>
    </section>

    <!-- リセットボタン -->
    <div class="reset-area">
      <button id="reset-today-btn">今日の服用記録をリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
