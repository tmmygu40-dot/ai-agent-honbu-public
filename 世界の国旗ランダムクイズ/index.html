<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="世界の国旗を3択クイズで出題。知ってるようで知らない国旗を楽しく学べるランダムクイズアプリです。全10問で何問正解できるか挑戦しよう。">
  <title>世界の国旗ランダムクイズ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── クイズ専用スタイル ── */
    .flag-display {
      font-size: 6rem;
      text-align: center;
      line-height: 1.2;
      margin: 0.5rem 0 1rem;
    }
    .progress-bar {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .progress-track {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px;
      margin: 0 0.8rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease;
    }
    .choices {
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .choice-btn {
      display: block; width: 100%; padding: 0.9rem 1rem;
      font-size: 1rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 800;
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng); font-weight: 800;
    }
    .choice-btn:disabled { cursor: default; opacity: 0.85; }
    .choice-btn:disabled:hover { border-color: var(--border); background: var(--bg); }
    .choice-btn.correct:disabled:hover { border-color: var(--ok); background: var(--ok-bg); }
    .choice-btn.wrong:disabled:hover { border-color: var(--ng); background: var(--ng-bg); }

    .feedback {
      text-align: center; font-size: 1rem; font-weight: 700;
      margin-top: 0.8rem; min-height: 1.5em;
    }
    .feedback.correct { color: var(--ok); }
    .feedback.wrong { color: var(--ng); }

    .next-btn {
      display: none; width: 100%; padding: 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .score-area {
      text-align: center; margin-bottom: 0.5rem;
    }
    .score-area .score-num {
      font-size: 2.5rem; font-weight: 900; color: var(--accent);
    }
    .score-area .score-label {
      font-size: 0.85rem; color: var(--text-sub);
    }
    .highscore {
      text-align: center; font-size: 0.82rem; color: var(--text-sub);
      margin-top: 0.3rem;
    }
    .restart-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 1rem auto 0; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🏁 世界の国旗ランダムクイズ</h1>
    <p class="subtitle">3択で挑戦！知ってるようで知らない国旗、あなたは何問わかる？</p>
  </header>

  <!-- スタート画面 -->
  <div class="card" id="start-screen">
    <p class="card-title">クイズについて</p>
    <p style="font-size:0.92rem;line-height:1.6;margin-bottom:0.5rem;">世界の国旗がランダムに10問出題されます。<br>3つの選択肢から正しい国名を選んでください。</p>
    <p id="hs-display" style="font-size:0.82rem;color:var(--text-sub);"></p>
  </div>

  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズをはじめる</button>

  <!-- クイズ画面 -->
  <div class="card" id="quiz-screen" style="display:none">
    <div class="progress-bar">
      <span id="q-num">1/10</span>
      <div class="progress-track"><div class="progress-fill" id="q-bar" style="width:10%"></div></div>
      <span id="q-score">0問正解</span>
    </div>
    <div class="flag-display" id="flag"></div>
    <div class="choices" id="choices"></div>
    <p class="feedback" id="feedback"></p>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- 結果画面 -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <div class="score-area">
      <p class="score-num" id="final-score">—</p>
      <p class="score-label">/ 10問中</p>
    </div>
    <p class="result-note" id="result-msg"></p>
    <p class="highscore" id="highscore-msg"></p>
  </div>

  <button class="restart-btn no-print" id="restart-btn" style="display:none" onclick="startQuiz()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 国旗データはUnicode絵文字を使用しています。端末によって表示が異なる場合があります。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 国旗データ（60カ国） ──
  var FLAGS = [
    {flag:'\u{1F1EF}\u{1F1F5}',name:'日本'},
    {flag:'\u{1F1FA}\u{1F1F8}',name:'アメリカ'},
    {flag:'\u{1F1EC}\u{1F1E7}',name:'イギリス'},
    {flag:'\u{1F1EB}\u{1F1F7}',name:'フランス'},
    {flag:'\u{1F1E9}\u{1F1EA}',name:'ドイツ'},
    {flag:'\u{1F1EE}\u{1F1F9}',name:'イタリア'},
    {flag:'\u{1F1E8}\u{1F1E6}',name:'カナダ'},
    {flag:'\u{1F1E6}\u{1F1FA}',name:'オーストラリア'},
    {flag:'\u{1F1E7}\u{1F1F7}',name:'ブラジル'},
    {flag:'\u{1F1F0}\u{1F1F7}',name:'韓国'},
    {flag:'\u{1F1E8}\u{1F1F3}',name:'中国'},
    {flag:'\u{1F1EE}\u{1F1F3}',name:'インド'},
    {flag:'\u{1F1F7}\u{1F1FA}',name:'ロシア'},
    {flag:'\u{1F1F2}\u{1F1FD}',name:'メキシコ'},
    {flag:'\u{1F1EA}\u{1F1F8}',name:'スペイン'},
    {flag:'\u{1F1F5}\u{1F1F9}',name:'ポルトガル'},
    {flag:'\u{1F1F3}\u{1F1F1}',name:'オランダ'},
    {flag:'\u{1F1E7}\u{1F1EA}',name:'ベルギー'},
    {flag:'\u{1F1E8}\u{1F1ED}',name:'スイス'},
    {flag:'\u{1F1E6}\u{1F1F9}',name:'オーストリア'},
    {flag:'\u{1F1F8}\u{1F1EA}',name:'スウェーデン'},
    {flag:'\u{1F1F3}\u{1F1F4}',name:'ノルウェー'},
    {flag:'\u{1F1E9}\u{1F1F0}',name:'デンマーク'},
    {flag:'\u{1F1EB}\u{1F1EE}',name:'フィンランド'},
    {flag:'\u{1F1F5}\u{1F1F1}',name:'ポーランド'},
    {flag:'\u{1F1EC}\u{1F1F7}',name:'ギリシャ'},
    {flag:'\u{1F1F9}\u{1F1F7}',name:'トルコ'},
    {flag:'\u{1F1EA}\u{1F1EC}',name:'エジプト'},
    {flag:'\u{1F1FF}\u{1F1E6}',name:'南アフリカ'},
    {flag:'\u{1F1F3}\u{1F1EC}',name:'ナイジェリア'},
    {flag:'\u{1F1F0}\u{1F1EA}',name:'ケニア'},
    {flag:'\u{1F1F9}\u{1F1ED}',name:'タイ'},
    {flag:'\u{1F1FB}\u{1F1F3}',name:'ベトナム'},
    {flag:'\u{1F1EE}\u{1F1E9}',name:'インドネシア'},
    {flag:'\u{1F1F5}\u{1F1ED}',name:'フィリピン'},
    {flag:'\u{1F1F2}\u{1F1FE}',name:'マレーシア'},
    {flag:'\u{1F1F8}\u{1F1EC}',name:'シンガポール'},
    {flag:'\u{1F1F3}\u{1F1FF}',name:'ニュージーランド'},
    {flag:'\u{1F1E6}\u{1F1F7}',name:'アルゼンチン'},
    {flag:'\u{1F1E8}\u{1F1F1}',name:'チリ'},
    {flag:'\u{1F1E8}\u{1F1F4}',name:'コロンビア'},
    {flag:'\u{1F1F5}\u{1F1EA}',name:'ペルー'},
    {flag:'\u{1F1EE}\u{1F1EA}',name:'アイルランド'},
    {flag:'\u{1F1EE}\u{1F1F8}',name:'アイスランド'},
    {flag:'\u{1F1ED}\u{1F1FA}',name:'ハンガリー'},
    {flag:'\u{1F1E8}\u{1F1FF}',name:'チェコ'},
    {flag:'\u{1F1F7}\u{1F1F4}',name:'ルーマニア'},
    {flag:'\u{1F1FA}\u{1F1E6}',name:'ウクライナ'},
    {flag:'\u{1F1F8}\u{1F1E6}',name:'サウジアラビア'},
    {flag:'\u{1F1E6}\u{1F1EA}',name:'アラブ首長国連邦'},
    {flag:'\u{1F1EE}\u{1F1F1}',name:'イスラエル'},
    {flag:'\u{1F1EF}\u{1F1F2}',name:'ジャマイカ'},
    {flag:'\u{1F1E8}\u{1F1FA}',name:'キューバ'},
    {flag:'\u{1F1F5}\u{1F1E6}',name:'パナマ'},
    {flag:'\u{1F1F2}\u{1F1E6}',name:'モロッコ'},
    {flag:'\u{1F1EC}\u{1F1ED}',name:'ガーナ'},
    {flag:'\u{1F1F5}\u{1F1F0}',name:'パキスタン'},
    {flag:'\u{1F1E7}\u{1F1E9}',name:'バングラデシュ'},
    {flag:'\u{1F1F2}\u{1F1F2}',name:'ミャンマー'},
    {flag:'\u{1F1F1}\u{1F1F0}',name:'スリランカ'}
  ];

  var TOTAL_Q = 10;
  var questions = [];
  var current = 0;
  var score = 0;
  var answered = false;

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function generateQuestions() {
    var pool = shuffle(FLAGS.slice());
    questions = [];
    for (var i = 0; i < TOTAL_Q; i++) {
      var correct = pool[i];
      var wrongs = FLAGS.filter(function(f){ return f.name !== correct.name; });
      shuffle(wrongs);
      var choices = shuffle([correct, wrongs[0], wrongs[1]]);
      questions.push({ flag: correct.flag, answer: correct.name, choices: choices });
    }
  }

  function startQuiz() {
    generateQuestions();
    current = 0;
    score = 0;
    answered = false;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    var q = questions[current];
    document.getElementById('q-num').textContent = (current + 1) + '/' + TOTAL_Q;
    document.getElementById('q-bar').style.width = ((current + 1) / TOTAL_Q * 100) + '%';
    document.getElementById('q-score').textContent = score + '問正解';
    document.getElementById('flag').textContent = q.flag;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').style.display = 'none';

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.name;
      btn.onclick = function() { selectAnswer(btn, c.name, q.answer); };
      choicesEl.appendChild(btn);
    });
  }

  function selectAnswer(btn, selected, answer) {
    if (answered) return;
    answered = true;
    var fb = document.getElementById('feedback');
    var btns = document.querySelectorAll('.choice-btn');

    btns.forEach(function(b) {
      b.disabled = true;
      if (b.textContent === answer) b.classList.add('correct');
    });

    if (selected === answer) {
      score++;
      fb.textContent = '⭕ 正解！';
      fb.className = 'feedback correct';
    } else {
      btn.classList.add('wrong');
      fb.textContent = '❌ 不正解… 正解は「' + answer + '」';
      fb.className = 'feedback wrong';
    }

    document.getElementById('q-score').textContent = score + '問正解';

    if (current < TOTAL_Q - 1) {
      document.getElementById('next-btn').style.display = 'block';
    } else {
      setTimeout(showResult, 1200);
    }
  }

  function nextQuestion() {
    current++;
    showQuestion();
  }

  function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    var rc = document.getElementById('result');
    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';

    document.getElementById('final-score').textContent = score + '問正解';

    var msgs = {
      ok: '素晴らしい！国旗博士レベルです！',
      warn: 'まずまず！もう少しで国旗マスター！',
      ng: '惜しい！もう一度挑戦してみよう！'
    };
    document.getElementById('result-msg').textContent = msgs[level];

    // ハイスコア
    var hs = parseInt(localStorage.getItem('flagquiz_highscore') || '0');
    var hsMsg = document.getElementById('highscore-msg');
    if (score > hs) {
      localStorage.setItem('flagquiz_highscore', score);
      hsMsg.textContent = '🎉 ハイスコア更新！ ' + score + '問正解';
    } else {
      hsMsg.textContent = '🏆 ハイスコア: ' + hs + '問正解';
    }

    document.getElementById('restart-btn').style.display = 'block';
  }

  // 起動時ハイスコア表示
  (function(){
    var hs = parseInt(localStorage.getItem('flagquiz_highscore') || '0');
    if (hs > 0) {
      document.getElementById('hs-display').textContent = '🏆 ハイスコア: ' + hs + '問正解';
    }
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
