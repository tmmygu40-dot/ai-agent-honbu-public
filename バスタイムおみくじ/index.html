<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バスタイムおみくじ｜疲れタイプ別に今夜の最適入浴法を処方</title>
  <meta name="description" content="疲れタイプを選ぶだけで、今夜のお風呂の湯温・時間・入浴剤・小ワザを処方します。心身ぐったり・肩こり・冷え・寝つき・むくみの5種から、引き直しもできるおみくじ風の入浴ナビです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .app-header .lead { font-size: 0.86rem; color: var(--text); margin-top: 0.5rem; line-height: 1.5; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }
    .type-btn {
      padding: 0.85rem 0.6rem;
      font-size: 0.92rem; font-weight: 700;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 11px;
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .type-btn:hover { border-color: var(--accent); }
    .type-btn.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .type-btn .emoji { display: block; font-size: 1.5rem; margin-bottom: 0.2rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-redraw {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-redraw:hover { background: var(--accent-light); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.shown { display: block; }
    .result-emoji-big { font-size: 2.8rem; text-align: center; margin-bottom: 0.4rem; line-height: 1.2; }
    .result-title {
      font-size: 1.25rem; font-weight: 900;
      text-align: center; color: var(--accent);
      margin-bottom: 0.4rem; line-height: 1.3;
    }
    .result-sub {
      font-size: 0.85rem; text-align: center;
      color: var(--text-sub); margin-bottom: 1.2rem; line-height: 1.5;
    }

    .prescription { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .prescription tr { border-bottom: 1px solid var(--border); }
    .prescription tr:last-child { border-bottom: none; }
    .prescription th {
      width: 32%;
      text-align: left; padding: 0.7rem 0.4rem;
      font-size: 0.82rem; color: var(--text-sub);
      font-weight: 700; vertical-align: top;
    }
    .prescription td {
      padding: 0.7rem 0.3rem;
      color: var(--text); font-weight: 600;
      line-height: 1.5;
    }

    .tip-box {
      margin-top: 1rem; padding: 0.9rem 1rem;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      font-size: 0.86rem; color: var(--text);
      line-height: 1.6;
    }
    .tip-box .tip-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      display: block; margin-bottom: 0.3rem;
    }

    .source-note {
      max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;
      background:var(--card);border:1px solid var(--border);border-radius:10px;
      font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-redraw, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">
    <h1>♨ バスタイムおみくじ</h1>
    <p class="subtitle">疲れタイプ別に、今夜のお風呂の処方をおみくじで提案します</p>
    <p class="lead">今日の疲れタイプを1つ選ぶだけ。湯温・時間・入浴剤・小ワザの4点セットで、迷わずほぐれる夜に。</p>
  </header>

  <div class="card">
    <p class="card-title">今日の疲れタイプを選ぶ</p>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="exhausted"><span class="emoji">😩</span>心身ぐったり</button>
      <button class="type-btn" data-type="stiff"><span class="emoji">💪</span>肩こり・腰痛</button>
      <button class="type-btn" data-type="cold"><span class="emoji">🥶</span>冷え</button>
      <button class="type-btn" data-type="sleepless"><span class="emoji">🌙</span>眠れない</button>
      <button class="type-btn" data-type="swelling"><span class="emoji">🦵</span>むくみ</button>
    </div>
  </div>

  <button class="btn-calc" onclick="drawOmikuji()">♨ 処方おみくじを引く</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">♨</p>
    <p class="result-title" id="rt">—</p>
    <p class="result-sub" id="rs"></p>
    <table class="prescription">
      <tbody id="rb"></tbody>
    </table>
    <div class="tip-box">
      <span class="tip-label">今夜のひとことアドバイス</span>
      <span id="rtip"></span>
    </div>
  </div>

  <button class="btn-redraw" id="redrawBtn" style="display:none" onclick="drawOmikuji(true)">🔄 もう一度引く</button>

  <p class="source-note">
    📚 入浴の湯温・時間の目安は、厚生労働省の健康づくり情報や、入浴医学に関する公開データを参考にしています。持病がある方・体調不良時は無理せず、医師の指示を優先してください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'bathtime_omikuji_last_v1';

  var TYPE_LABEL = {
    exhausted: { emoji: '😩', label: '心身ぐったり' },
    stiff:     { emoji: '💪', label: '肩こり・腰痛' },
    cold:      { emoji: '🥶', label: '冷え' },
    sleepless: { emoji: '🌙', label: '眠れない' },
    swelling:  { emoji: '🦵', label: '足のむくみ' }
  };

  var DATA = {
    exhausted: [
      {
        title: '癒しのぬる湯リカバリー',
        sub: '副交感神経をやさしく立ち上げ、深いリラックスへ。',
        temp: '38〜39℃',
        time: '15〜20分（半身浴）',
        item: '森・ヒノキ系のリラックス入浴剤',
        trick: 'スマホは脱衣所に置き、深呼吸を10回ゆっくり。',
        tip: '湯上がりにコップ1杯の常温水で、体の中もリセット。'
      },
      {
        title: 'ミルク風呂で全身ふんわり',
        sub: '保湿系で肌のごわつきを取り、気分も柔らかく。',
        temp: '39℃',
        time: '15分',
        item: 'ミルク・ハチミツ系の保湿入浴剤',
        trick: '湯船で目を閉じ、肩までゆったり3分→半身浴へ',
        tip: '湯上がり3分以内にボディクリームで保湿すると効果倍増。'
      },
      {
        title: '頭を空にする「無心バス」',
        sub: '考えごとを湯に流して、脳の疲れだけほどく。',
        temp: '38℃',
        time: '20分',
        item: '無香料 or 微香のシンプル系',
        trick: '湯気を見つめながら、出てきた考えにラベルを貼って流す。',
        tip: '思いついたタスクは脱衣所のメモにだけ書いて忘れる。'
      }
    ],
    stiff: [
      {
        title: '肩までしっかり温熱バス',
        sub: '血流アップでこわばった筋肉をゆるめる。',
        temp: '40〜41℃',
        time: '10〜12分（全身浴）',
        item: '炭酸系・薬用成分入り入浴剤',
        trick: '湯の中で肩をぐるぐる10回、首をゆっくり左右に倒す。',
        tip: '湯上がりに肩を回しながらストレッチを30秒で固定化防止。'
      },
      {
        title: '首肩ピンポイント蒸しタオル併用',
        sub: '局所を集中で温めて、こりの芯にアプローチ。',
        temp: '40℃',
        time: '12分',
        item: '生薬系（よもぎ・しょうが）',
        trick: '熱めのタオルを首の後ろに3分のせる→外して湯につかる。',
        tip: '湯上がりは肩甲骨を寄せる動作を10回。デスク仕事の人ほど効く。'
      },
      {
        title: '腰ピン伸ばし背筋バス',
        sub: '湯船の浮力を使って、腰まわりをそっとゆるめる。',
        temp: '40℃',
        time: '15分',
        item: 'バブ系の発泡入浴剤',
        trick: '湯船のフチに後頭部をあずけ、膝を立てて腰を浮かせる。',
        tip: '湯上がりに腰を反らずに、膝を抱えて20秒キープを2回。'
      }
    ],
    cold: [
      {
        title: '生姜湯で芯からポカポカ',
        sub: '末端の冷えに、体の中心から熱を回す処方。',
        temp: '40〜41℃',
        time: '15分（半身浴→最後3分は肩まで）',
        item: '生姜・とうがらし系の温感入浴剤',
        trick: '湯船の中で足の指をグーパー20回、足首を回す。',
        tip: '湯上がり後はくつ下より「レッグウォーマー」のほうが冷え戻り防止に◎'
      },
      {
        title: '足先集中・足湯ブースト',
        sub: '先に足だけ温めてから入ると、全身が早く温まる。',
        temp: '42℃のお湯で足湯5分→湯船40℃で12分',
        time: '合計17分',
        item: '塩・ミネラル系入浴剤',
        trick: '足湯のあいだに肩は乾いたタオルで覆って冷やさない。',
        tip: '寝る90分前に入ると、深部体温の下りで眠りもラクに。'
      },
      {
        title: '炭酸あったまり包み',
        sub: '炭酸の細かい泡で血流を底上げ。',
        temp: '40℃',
        time: '15分',
        item: '高濃度炭酸タブレット',
        trick: '入れた直後は静かに浸かって、泡を肌に貼りつかせる。',
        tip: '湯上がりは5分以内に靴下＋一枚多めに着る。'
      }
    ],
    sleepless: [
      {
        title: '寝落ちぬる湯（就寝90分前）',
        sub: 'ゆっくり深部体温を上げて、下りで眠気をつくる。',
        temp: '38〜39℃',
        time: '15分',
        item: 'ラベンダー系のアロマ入浴剤',
        trick: '入浴中の照明は脱衣所だけ点け、浴室は暗めに。',
        tip: '湯上がりはスマホをやめて、白湯か常温水を1杯。'
      },
      {
        title: '森林浴シャワー＋ぬる湯',
        sub: '香りで自律神経を整え、頭の興奮を下げる。',
        temp: '38℃',
        time: '20分（半身浴）',
        item: 'ヒノキ・ユーカリ系',
        trick: '入る前に温シャワーを首・肩に1分かけて緊張を抜く。',
        tip: '湯上がりはストレッチ→静かな読書→消灯の順がおすすめ。'
      },
      {
        title: '寝る前ハーバルバス',
        sub: '香りと低めの湯温で、考えごとを切り替える。',
        temp: '38℃',
        time: '15分',
        item: 'カモミール・オレンジ系のハーブ入浴剤',
        trick: '湯船で「今日よかったこと」を3つ思い出す。',
        tip: '湯上がりはスクリーンを見ない時間を最低15分つくる。'
      }
    ],
    swelling: [
      {
        title: '足上げハイブリッド浴',
        sub: '重力リセットで、夕方からのむくみを流す。',
        temp: '40℃',
        time: '15分（半身浴）',
        item: '塩・ミネラル系のバスソルト',
        trick: '湯船のフチに足を乗せて1〜2分、心臓より上に上げる。',
        tip: '湯上がりは足首から太ももへ向けて、軽くさする。'
      },
      {
        title: '温冷交代セルフケア',
        sub: '血管をポンピングして、たまった水分の流れを助ける。',
        temp: '湯40℃ ／ シャワー水30℃前後',
        time: '湯3分→冷シャワー10秒×3セット',
        item: '炭酸系入浴剤（湯のほうに）',
        trick: '冷シャワーは足だけでもOK。心臓から遠い場所から。',
        tip: '体調が不安な日や血圧の薬を飲んでいる日は、温だけにする。'
      },
      {
        title: 'ふくらはぎマッサージ浴',
        sub: '湯の中で軽くもむと、すべりやすくて押しすぎを防げる。',
        temp: '40℃',
        time: '12分',
        item: 'ジュニパー・ゆず系のすっきり入浴剤',
        trick: '足首→ふくらはぎ→ひざ裏の順に、下から上へ10回。',
        tip: '湯上がりに水分補給を忘れず、すぐに脚を圧迫しすぎない。'
      }
    ]
  };

  var selectedType = null;
  var lastIndex = -1;

  // タイプ選択
  document.querySelectorAll('.type-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      selectedType = btn.getAttribute('data-type');
    });
  });

  function drawOmikuji(isRedraw) {
    if (!selectedType) {
      alert('まず疲れタイプを1つ選んでください。');
      return;
    }
    var list = DATA[selectedType];
    var idx;
    if (list.length === 1) {
      idx = 0;
    } else {
      do {
        idx = Math.floor(Math.random() * list.length);
      } while (idx === lastIndex && isRedraw);
    }
    lastIndex = idx;
    var item = list[idx];
    var meta = TYPE_LABEL[selectedType];

    document.getElementById('re').textContent = meta.emoji;
    document.getElementById('rt').textContent = item.title;
    document.getElementById('rs').textContent = '【' + meta.label + '】' + item.sub;
    document.getElementById('rb').innerHTML =
      '<tr><th>♨ 湯温</th><td>' + item.temp + '</td></tr>' +
      '<tr><th>⏱ 時間</th><td>' + item.time + '</td></tr>' +
      '<tr><th>🛁 入浴剤</th><td>' + item.item + '</td></tr>' +
      '<tr><th>✨ 小ワザ</th><td>' + item.trick + '</td></tr>';
    document.getElementById('rtip').textContent = item.tip;

    var rc = document.getElementById('result');
    rc.classList.add('shown');
    document.getElementById('redrawBtn').style.display = 'block';

    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ type: selectedType, idx: idx }));
    } catch (e) {}

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 起動時に前回の処方を表示
  (function restore() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (!s || !DATA[s.type] || typeof s.idx !== 'number' || !DATA[s.type][s.idx]) return;
      selectedType = s.type;
      lastIndex = s.idx;
      var btn = document.querySelector('.type-btn[data-type="' + s.type + '"]');
      if (btn) btn.classList.add('active');
      var item = DATA[s.type][s.idx];
      var meta = TYPE_LABEL[s.type];
      document.getElementById('re').textContent = meta.emoji;
      document.getElementById('rt').textContent = item.title;
      document.getElementById('rs').textContent = '【' + meta.label + '】' + item.sub;
      document.getElementById('rb').innerHTML =
        '<tr><th>♨ 湯温</th><td>' + item.temp + '</td></tr>' +
        '<tr><th>⏱ 時間</th><td>' + item.time + '</td></tr>' +
        '<tr><th>🛁 入浴剤</th><td>' + item.item + '</td></tr>' +
        '<tr><th>✨ 小ワザ</th><td>' + item.trick + '</td></tr>';
      document.getElementById('rtip').textContent = item.tip;
      document.getElementById('result').classList.add('shown');
      document.getElementById('redrawBtn').style.display = 'block';
    } catch (e) {}
  })();
  </script>
