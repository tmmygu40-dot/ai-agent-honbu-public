<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電話応対メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>📞 電話応対メモ</h1>

    <section class="form-section">
      <h2>新しいメモを追加</h2>
      <div class="form-group">
        <label for="caller">相手の名前</label>
        <input type="text" id="caller" placeholder="例：山田商事 田中様" maxlength="50">
      </div>
      <div class="form-group">
        <label for="call-time">時間</label>
        <input type="text" id="call-time" placeholder="例：14:30、午後2時ごろ" maxlength="30">
      </div>
      <div class="form-group">
        <label for="matter">用件</label>
        <textarea id="matter" placeholder="例：見積もりの件で折り返し希望" rows="3" maxlength="200"></textarea>
      </div>
      <button id="add-btn" class="btn-primary">追加する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>応対メモ一覧</h2>
        <span id="memo-count" class="count-badge">0件</span>
      </div>
      <div id="memo-list" class="memo-list">
        <p class="empty-message">メモがありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
