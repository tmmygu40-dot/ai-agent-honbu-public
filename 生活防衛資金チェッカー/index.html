<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活防衛資金チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.84rem; color: var(--text-sub); line-height: 1.6; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* 判定基準バー */
    .gauge-wrap { margin: 1rem 0 0; }
    .gauge-label { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.35rem; font-weight: 600; }
    .gauge-bar {
      height: 10px; border-radius: 99px;
      background: linear-gradient(to right, #b91c1c 0%, #b45309 33%, #15803d 66%);
      position: relative; overflow: visible;
    }
    .gauge-pointer {
      position: absolute; top: -4px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--text); border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transform: translateX(-50%);
      transition: left 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .gauge-ticks {
      display: flex; justify-content: space-between;
      font-size: 0.66rem; color: var(--text-sub); margin-top: 0.4rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>生活防衛資金チェッカー</h1>
    <p class="subtitle">手持ち資金で何ヶ月生活できるか即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="savings">手持ち資金（預貯金など）</label>
      <input type="number" id="savings" placeholder="例: 1500000" min="0">
      <p class="hint">すぐに使える現金・預貯金の合計（円）</p>
    </div>
    <div class="field">
      <label for="monthly">月間生活費</label>
      <input type="number" id="monthly" placeholder="例: 200000" min="1">
      <p class="hint">食費・家賃・光熱費など毎月かかる費用の合計（円）</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生活できる期間</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <div class="gauge-wrap">
      <p class="gauge-label">安全度メーター（目安：6ヶ月以上で安心）</p>
      <div class="gauge-bar">
        <div class="gauge-pointer" id="gp" style="left:0%"></div>
      </div>
      <div class="gauge-ticks">
        <span>0ヶ月</span>
        <span>3ヶ月</span>
        <span>6ヶ月</span>
        <span>12ヶ月+</span>
      </div>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">アドバイス</p>
    <p id="advice-text" style="font-size:0.88rem;line-height:1.7;color:var(--text-sub);"></p>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'seikatsubouei';

  // 起動時にlocalStorageから復元
  (function() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (d.savings) document.getElementById('savings').value = d.savings;
      if (d.monthly) document.getElementById('monthly').value = d.monthly;
    } catch(e) {}
  })();

  function calc() {
    var savings = parseFloat(document.getElementById('savings').value);
    var monthly = parseFloat(document.getElementById('monthly').value);

    if (isNaN(savings) || savings < 0) { showErr('手持ち資金を入力してください'); return; }
    if (isNaN(monthly) || monthly <= 0) { showErr('月間生活費を正しく入力してください'); return; }

    // localStorage保存
    try { localStorage.setItem(LS_KEY, JSON.stringify({savings: savings, monthly: monthly})); } catch(e) {}

    var months = savings / monthly;
    var monthsFloor = Math.floor(months * 10) / 10; // 小数第1位切り捨て

    var level, note, advice;
    if (months >= 6) {
      level = 'ok';
      note = '安心ライン達成！生活防衛資金は十分です。';
      advice = '一般的に生活防衛資金の目安は「生活費の3〜6ヶ月分」とされています。現在は十分な水準です。余剰資金は積立投資や緊急時の追加積立に回すことを検討しましょう。';
    } else if (months >= 3) {
      level = 'warn';
      note = '注意ライン。もう少し積み増しが理想です。';
      advice = '生活費の3ヶ月分は最低ラインとされています。6ヶ月分を目標に、毎月少しずつ積み増しましょう。月' + fmt(Math.ceil((6 * monthly - savings) / 12)) + '円ずつ貯めると約1年で達成できます。';
    } else {
      level = 'ng';
      note = '危険ライン。収入途絶リスクに要注意です。';
      advice = '生活費3ヶ月分（' + fmt(monthly * 3) + '円）を最優先目標にしましょう。固定費の見直し・副業・支出削減で月に少しでも積み立てることが重要です。';
    }

    var dispMonths = monthsFloor >= 100 ? '100ヶ月以上' : monthsFloor.toFixed(1) + ' ヶ月';
    showResult(level, dispMonths, note);

    // ゲージ（0〜12ヶ月で0〜100%）
    var pct = Math.min(months / 12, 1) * 100;
    document.getElementById('gp').style.left = pct + '%';

    showDetail([
      ['手持ち資金',   fmt(savings) + ' 円'],
      ['月間生活費',   fmt(monthly) + ' 円'],
      ['生活可能期間', monthsFloor.toFixed(1) + ' ヶ月', true],
      ['年換算',       (months / 12).toFixed(2) + ' 年'],
    ]);

    // アドバイス
    document.getElementById('advice-text').textContent = advice;
    document.getElementById('advice-card').style.display = '';
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
