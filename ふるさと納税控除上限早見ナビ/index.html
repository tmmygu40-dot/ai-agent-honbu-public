  <meta name="description" content="世帯年収と家族構成を選ぶだけで、2026年度のふるさと納税控除上限額の目安が30秒で分かる無料ツール。自己負担2,000円で得する寄付額の早見にお使いください。">

  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }

<body>

  <header class="app-header">
    <h1>ふるさと納税控除上限早見ナビ</h1>
    <p class="subtitle">※2026年度料率の目安。世帯年収と家族構成だけで控除上限の目安をサッと確認。最新情報は公式情報をご確認ください</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="income">世帯年収（給与・年収ベース）</label>
      <input type="number" id="income" placeholder="例: 600" inputmode="numeric">
      <p class="hint">単位：万円。所得（手取り）ではなく、額面の年収を入れてください</p>
    </div>
    <div class="field">
      <label for="family">家族構成</label>
      <select id="family">
        <option value="single">独身・共働き（配偶者控除なし・扶養なし）</option>
        <option value="couple">夫婦（配偶者控除あり・扶養なし）</option>
        <option value="dual_hs1">共働き＋子1人（高校生）</option>
        <option value="couple_hs1">夫婦＋子1人（高校生）</option>
        <option value="dual_hs_uni">共働き＋子2人（高校生＋大学生）</option>
        <option value="couple_hs_uni">夫婦＋子2人（高校生＋大学生）</option>
      </select>
      <p class="hint">配偶者控除は配偶者の年収が103万円以下の場合に適用</p>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">控除上限を計算する</button>

  <div class="result-card" id="result">
    <p class="result-label">ふるさと納税 控除上限額（目安）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・国税庁などの官公庁資料や、信頼できる公開データを参考に、2026年度の目安として使いやすく整理しています。最新の制度・正確な上限額は、各自治体・公式ポータルでご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 給与所得控除（令和2年改正後） ──
  function kyuyoShotokuKojo(income) {
    // income: 円
    if (income <= 1625000) return 550000;
    if (income <= 1800000) return Math.floor(income * 0.4) - 100000;
    if (income <= 3600000) return Math.floor(income * 0.3) + 80000;
    if (income <= 6600000) return Math.floor(income * 0.2) + 440000;
    if (income <= 8500000) return Math.floor(income * 0.1) + 1100000;
    return 1950000;
  }

  // 所得税率（速算表）課税所得→ {rate, deduction}
  function shotokuzeiRate(taxable) {
    if (taxable <= 1949000)  return { rate: 0.05, deduction: 0 };
    if (taxable <= 3299000)  return { rate: 0.10, deduction: 97500 };
    if (taxable <= 6949000)  return { rate: 0.20, deduction: 427500 };
    if (taxable <= 8999000)  return { rate: 0.23, deduction: 636000 };
    if (taxable <= 17999000) return { rate: 0.33, deduction: 1536000 };
    if (taxable <= 39999000) return { rate: 0.40, deduction: 2796000 };
    return { rate: 0.45, deduction: 4796000 };
  }

  // 家族構成→控除（所得税ベース）
  // 住民税ベースは別計算
  var FAMILY_DEDUCTION = {
    // 配偶者控除：所得税38万 / 住民税33万
    // 一般扶養（高校生16-18歳）：所得税38万 / 住民税33万
    // 特定扶養（大学生19-22歳）：所得税63万 / 住民税45万
    single:        { spouse: 0,      dep_it: 0,      dep_rt: 0      },
    couple:        { spouse: 1,      dep_it: 0,      dep_rt: 0      },
    dual_hs1:      { spouse: 0,      dep_it: 380000, dep_rt: 330000 },
    couple_hs1:    { spouse: 1,      dep_it: 380000, dep_rt: 330000 },
    dual_hs_uni:   { spouse: 0,      dep_it: 380000+630000, dep_rt: 330000+450000 },
    couple_hs_uni: { spouse: 1,      dep_it: 380000+630000, dep_rt: 330000+450000 }
  };

  function calc() {
    var incMan = parseFloat(document.getElementById('income').value);
    var fam = document.getElementById('family').value;
    if (isNaN(incMan) || incMan <= 0) { showErr('世帯年収を入力してください'); return; }

    localStorage.setItem('furusato_income', incMan);
    localStorage.setItem('furusato_family', fam);

    var income = Math.round(incMan * 10000);
    var fd = FAMILY_DEDUCTION[fam];

    // 給与所得
    var kojo = kyuyoShotokuKojo(income);
    var kyuyoShotoku = income - kojo;
    if (kyuyoShotoku < 0) kyuyoShotoku = 0;

    // 社会保険料控除（概算：年収の15%）
    var shaho = Math.round(income * 0.15);

    // 配偶者控除
    var spouseIT = fd.spouse ? 380000 : 0;
    var spouseRT = fd.spouse ? 330000 : 0;

    // 所得税：基礎控除48万 + 社会保険料 + 配偶者控除 + 扶養控除
    var kisoIT = 480000;
    var totalIT = kisoIT + shaho + spouseIT + fd.dep_it;
    var taxableIT = Math.max(0, kyuyoShotoku - totalIT);
    // 1000円未満切捨て
    taxableIT = Math.floor(taxableIT / 1000) * 1000;

    var rateInfo = shotokuzeiRate(taxableIT);

    // 住民税：基礎控除43万 + 社会保険料 + 配偶者控除33万 + 扶養控除（住民税）
    var kisoRT = 430000;
    var totalRT = kisoRT + shaho + spouseRT + fd.dep_rt;
    var taxableRT = Math.max(0, kyuyoShotoku - totalRT);
    taxableRT = Math.floor(taxableRT / 1000) * 1000;

    // 住民税所得割（10%）— 調整控除等は簡略化のため省略
    var jumin = Math.floor(taxableRT * 0.10);

    if (jumin <= 0) {
      showErr('住民税所得割が発生しないため、ふるさと納税の控除メリットはほぼありません');
      return;
    }

    // 控除上限の計算式
    // 上限 = 住民税所得割 × 20% ÷ (90% − 所得税率×1.021) + 2,000
    var rate = rateInfo.rate;
    var jouge = jumin * 0.20 / (0.90 - rate * 1.021) + 2000;
    jouge = Math.floor(jouge / 100) * 100; // 百円単位で切捨て

    // 結果レベル
    var level;
    if (jouge < 10000)      level = 'ng';
    else if (jouge < 50000) level = 'warn';
    else                    level = 'ok';

    var msg;
    if (level === 'ok')        msg = '自己負担2,000円で実質お得な寄付ができます';
    else if (level === 'warn') msg = '少額の寄付なら自己負担2,000円で楽しめます';
    else                       msg = '控除メリットは限定的。少額のお試しがおすすめ';

    showResult(level, '約 ' + fmt(jouge) + ' 円', msg);
    showDetail([
      ['世帯年収（給与）',     fmt(income) + ' 円'],
      ['給与所得控除',         fmt(kojo) + ' 円'],
      ['給与所得',             fmt(kyuyoShotoku) + ' 円'],
      ['社会保険料控除（概算）', fmt(shaho) + ' 円'],
      ['課税所得（所得税）',   fmt(taxableIT) + ' 円'],
      ['所得税率',             (rate * 100).toFixed(0) + ' %'],
      ['住民税所得割',         fmt(jumin) + ' 円'],
      ['ふるさと納税控除上限', '約 ' + fmt(jouge) + ' 円', true]
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // localStorage 復元
  (function(){
    var inc = localStorage.getItem('furusato_income');
    var fam = localStorage.getItem('furusato_family');
    if (inc) document.getElementById('income').value = inc;
    if (fam) document.getElementById('family').value = fam;
  })();
  </script>
