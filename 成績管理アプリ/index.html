<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>成績管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>点数を入力</h2>
      <div class="form-group">
        <label for="studentName">生徒名</label>
        <input type="text" id="studentName" placeholder="例：田中 太郎" maxlength="30">
      </div>
      <div class="form-group">
        <label for="subjectName">教科名</label>
        <input type="text" id="subjectName" placeholder="例：数学" maxlength="20">
      </div>
      <div class="form-group">
        <label for="score">点数</label>
        <input type="number" id="score" placeholder="0〜100" min="0" max="100">
      </div>
      <button id="addBtn" class="btn-primary">追加</button>
    </section>

    <!-- 一覧・集計 -->
    <section class="result-section">
      <div class="section-header">
        <h2>成績一覧</h2>
        <button id="clearAllBtn" class="btn-danger">全削除</button>
      </div>

      <div id="noData" class="no-data">まだデータがありません</div>

      <div id="studentList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
