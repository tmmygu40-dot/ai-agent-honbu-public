<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 ペット日本酒ラベルプロンプトメーカー</title>
  <meta name="description" content="愛猫・愛犬の特徴を選択すると、日本酒ラベル風の和柄でAI画像化するプロンプトを即生成します。ペットを美しい浮世絵・和柄風にするためのAIアート呪文をサクッと作成できるツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: inline-block; margin-top: 0.8rem; padding: 0.6rem 1.2rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:active { transform: scale(0.98); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.5; margin-bottom: 0.4rem; word-break: break-word; }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🐾 ペット日本酒ラベルプロンプトメーカー</h1>
    <p class="subtitle">愛猫・愛犬を日本酒ラベル風の和柄でAI画像化するプロンプトをサクッと生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ペット情報を選択</p>

    <div class="field">
      <label for="petType">ペット種別</label>
      <select id="petType">
        <option value="">選択してください</option>
        <option value="猫">猫 🐱</option>
        <option value="犬">犬 🐕</option>
      </select>
    </div>

    <div class="field">
      <label for="color">毛色</label>
      <select id="color">
        <option value="">選択してください</option>
        <option value="黒">黒</option>
        <option value="白">白</option>
        <option value="茶">茶色</option>
        <option value="灰">灰色</option>
        <option value="三毛">三毛</option>
        <option value="トラ">トラ模様</option>
        <option value="黒白">黒白</option>
        <option value="茶白">茶白</option>
      </select>
    </div>

    <div class="field">
      <label for="features">特徴を選択（複数選択可）</label>
      <select id="features" multiple size="5">
        <option value="かわいい">かわいい顔</option>
        <option value="おっとり">おっとりした雰囲気</option>
        <option value="活発">活発で元気</option>
        <option value="つぶらな瞳">つぶらな瞳</option>
        <option value="優雅">優雅で気品がある</option>
        <option value="凛々しい">凛々しい</option>
        <option value="いたずらっ子">いたずらっ子</option>
        <option value="寝姿">寝姿</option>
      </select>
      <p class="hint">Ctrl/Cmd + クリックで複数選択</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">プロンプトを生成</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <p class="result-value" id="rv">—</p>
    <button class="btn-copy" onclick="copyPrompt()" id="copyBtn">📋 コピーする</button>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎨 このツールで生成されたプロンプトはAI画像生成ツール（DALL-E、Midjourney、Stable Diffusionなど）で使用できます。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  function generatePrompt() {
    var petType = document.getElementById('petType').value;
    var color = document.getElementById('color').value;
    var featuresSelect = document.getElementById('features');
    var features = Array.from(featuresSelect.selectedOptions).map(o => o.value);

    if (!petType || !color || features.length === 0) {
      showResult('ペット種別・毛色・特徴をすべて選択してください');
      return;
    }

    var prompt = '和風・日本酒ラベル・浮世絵風・' + petType + '・' + color + '毛・'
      + features.join('・') + '・草紙風装飾・古典的・beautiful art style';

    displayPrompt(prompt);
  }

  function displayPrompt(prompt) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = prompt;
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('copyBtn').textContent = '📋 コピーする';
  }

  function copyPrompt() {
    var text = document.getElementById('rv').textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました！';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.textContent = '📋 コピーする';
      }, 2000);
    }).catch(function() {
      alert('コピーに失敗しました');
    });
  }

  function showResult(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = msg;
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</body>
</html>
