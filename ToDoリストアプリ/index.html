<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="タスクを入力..." maxlength="100">
      <button id="addBtn">追加</button>
    </div>

    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
      <span id="remaining">未完了：0件</span>
      <button id="clearDoneBtn">完了済みを削除</button>
    </div>
  </div>

  <script>
'use strict';

const STORAGE_KEY = 'todo_list_app';

let tasks = [];
let currentFilter = 'all';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function load() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    tasks = data ? JSON.parse(data) : [];
  } catch {
    tasks = [];
  }
}

function addTask(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  tasks.push({ id: Date.now(), text: trimmed, done: false });
  save();
  render();
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.done = !task.done;
    save();
    render();
  }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save();
  render();
}

function getFiltered() {
  if (currentFilter === 'active') return tasks.filter(t => !t.done);
  if (currentFilter === 'done')   return tasks.filter(t => t.done);
  return tasks;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function render() {
  const list = document.getElementById('taskList');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    list.innerHTML = '<li class="empty-msg">タスクがありません</li>';
  } else {
    list.innerHTML = filtered.map(task => `
      <li class="${task.done ? 'done' : ''}" data-id="${task.id}">
        <button class="check-btn" onclick="toggleTask(${task.id})" aria-label="完了切り替え">
          ${task.done ? '✓' : ''}
        </button>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="delete-btn" onclick="deleteTask(${task.id})" aria-label="削除">✕</button>
      </li>
    `).join('');
  }

  const remaining = tasks.filter(t => !t.done).length;
  document.getElementById('remaining').textContent = `未完了：${remaining}件`;
}

document.getElementById('addBtn').addEventListener('click', () => {
  const input = document.getElementById('taskInput');
  addTask(input.value);
  input.value = '';
  input.focus();
});

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const input = e.currentTarget;
    addTask(input.value);
    input.value = '';
  }
});

document.getElementById('clearDoneBtn').addEventListener('click', clearDone);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

load();
render();
  </script>
  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
