<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族健康情報カード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏥 家族健康情報カード</h1>
      <p class="subtitle">救急時にすぐ見せられる家族の医療情報</p>
    </header>

    <div class="add-section">
      <h2>メンバーを追加</h2>
      <div class="form-group">
        <label for="name">名前 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：田中 太郎">
      </div>
      <div class="form-group">
        <label for="birthdate">生年月日</label>
        <input type="date" id="birthdate">
      </div>
      <div class="form-group">
        <label for="bloodtype">血液型</label>
        <select id="bloodtype">
          <option value="">不明</option>
          <option value="A型">A型</option>
          <option value="B型">B型</option>
          <option value="O型">O型</option>
          <option value="AB型">AB型</option>
        </select>
      </div>
      <div class="form-group">
        <label for="conditions">持病・既往歴</label>
        <textarea id="conditions" placeholder="例：高血圧、糖尿病（1型）" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="medications">常備薬</label>
        <textarea id="medications" placeholder="例：アムロジピン5mg（朝1錠）" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="allergies">アレルギー</label>
        <textarea id="allergies" placeholder="例：ペニシリン系抗生物質、そば" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="doctor">かかりつけ医</label>
        <input type="text" id="doctor" placeholder="例：〇〇クリニック（内科）03-0000-0000">
      </div>
      <div class="form-group">
        <label for="emergency">緊急連絡先</label>
        <input type="text" id="emergency" placeholder="例：田中 花子（妻）090-0000-0000">
      </div>
      <div class="form-group">
        <label for="notes">その他メモ</label>
        <textarea id="notes" placeholder="例：ペースメーカー装着中" rows="2"></textarea>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </div>

    <div class="cards-section" id="cardsSection">
      <div class="cards-header">
        <h2>登録済みメンバー（<span id="memberCount">0</span>名）</h2>
        <button id="printBtn" class="btn-print">印刷する</button>
      </div>
      <div id="cardsList" class="cards-list"></div>
      <p class="empty-msg" id="emptyMsg">まだメンバーが登録されていません</p>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>メンバーを編集</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label for="editName">名前 <span class="required">*</span></label>
        <input type="text" id="editName">
      </div>
      <div class="form-group">
        <label for="editBirthdate">生年月日</label>
        <input type="date" id="editBirthdate">
      </div>
      <div class="form-group">
        <label for="editBloodtype">血液型</label>
        <select id="editBloodtype">
          <option value="">不明</option>
          <option value="A型">A型</option>
          <option value="B型">B型</option>
          <option value="O型">O型</option>
          <option value="AB型">AB型</option>
        </select>
      </div>
      <div class="form-group">
        <label for="editConditions">持病・既往歴</label>
        <textarea id="editConditions" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="editMedications">常備薬</label>
        <textarea id="editMedications" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="editAllergies">アレルギー</label>
        <textarea id="editAllergies" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="editDoctor">かかりつけ医</label>
        <input type="text" id="editDoctor">
      </div>
      <div class="form-group">
        <label for="editEmergency">緊急連絡先</label>
        <input type="text" id="editEmergency">
      </div>
      <div class="form-group">
        <label for="editNotes">その他メモ</label>
        <textarea id="editNotes" rows="2"></textarea>
      </div>
      <div class="modal-buttons">
        <button id="saveEditBtn" class="btn-primary">保存</button>
        <button id="cancelEditBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
