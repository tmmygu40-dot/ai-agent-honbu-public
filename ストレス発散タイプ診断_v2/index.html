<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食べ物で分かるストレス発散タイプ診断｜5問で即診断</title>
  <meta name="description" content="好きな食べ物を5問選ぶだけで、あなたのストレス発散タイプが分かる無料診断ツール。タイプ別に今日からできるストレス解消アドバイスもまとめて表示します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.4; }
    .opt-row {
      display: block; padding: 0.7rem 0.8rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); margin-bottom: 0.5rem;
      cursor: pointer; user-select: none;
      font-size: 0.95rem; line-height: 1.4;
      transition: border-color 0.12s, background 0.12s;
    }
    .opt-row:last-child { margin-bottom: 0; }
    .opt-row input { display: none; }
    .opt-row.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 600; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.55; text-align: left; }

    .advice-list { padding-left: 1.2rem; }
    .advice-list li { margin-bottom: 0.4rem; line-height: 1.5; font-size: 0.92rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>食べ物で分かる ストレス発散タイプ診断</h1>
    <p class="subtitle">5問の食べ物選びで、あなたに合うストレス発散方法が分かります</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">5問クイズ</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <div class="result-note" id="rn"></div>
  </div>

  <div class="card" id="advice-card" style="display:none">
    <p class="card-title">今日からできる発散アドバイス</p>
    <ul class="advice-list" id="advice-list"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・内閣府などのストレスマネジメントに関する公開情報を参考に、食べ物の嗜好からの傾向を遊び要素として整理した目安です。本格的な不調を感じる場合は専門家にご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 各選択肢にタイプタグを付与（S=刺激/H=癒し/C=社交/F=没頭）
  var QUESTIONS = [
    { q: 'Q1. 疲れた日の夜、無性に食べたくなるのは？', opts: [
      { t: '激辛ラーメン・キムチ', tag: 'S' },
      { t: '甘いケーキ・プリン', tag: 'H' },
      { t: 'みんなで囲む焼肉・鍋', tag: 'C' },
      { t: 'こだわりの一杯コーヒーと菓子', tag: 'F' },
    ]},
    { q: 'Q2. ご褒美ランチを選ぶなら？', opts: [
      { t: 'ガッツリ系ステーキ・カレー', tag: 'S' },
      { t: 'やさしい味のおにぎり・お味噌汁', tag: 'H' },
      { t: '人気店で友だちとシェアごはん', tag: 'C' },
      { t: '行列でも並ぶ専門店の一品', tag: 'F' },
    ]},
    { q: 'Q3. 旅行先でまず食べたいのは？', opts: [
      { t: 'B級グルメ・スパイス料理', tag: 'S' },
      { t: '温泉宿の和定食', tag: 'H' },
      { t: '居酒屋で地元の人と乾杯', tag: 'C' },
      { t: 'ガイドブックの星付き店', tag: 'F' },
    ]},
    { q: 'Q4. 落ち込んだ時に欲しくなる飲み物は？', opts: [
      { t: 'エナジードリンク・炭酸', tag: 'S' },
      { t: 'ホットミルク・甘いココア', tag: 'H' },
      { t: 'カフェでおしゃべり用のラテ', tag: 'C' },
      { t: '産地別こだわりのお茶・コーヒー', tag: 'F' },
    ]},
    { q: 'Q5. お菓子を選ぶならどれ？', opts: [
      { t: '辛味・酸味系スナック', tag: 'S' },
      { t: 'マシュマロ・カスタード系', tag: 'H' },
      { t: 'シェアパック・分け合い系', tag: 'C' },
      { t: '老舗和菓子・限定スイーツ', tag: 'F' },
    ]},
  ];

  var TYPES = {
    S: {
      name: '刺激発散型',
      level: 'ng',
      note: '辛い・濃い・派手な食べ物が好きなあなたは、ストレスを「刺激」で吹き飛ばすタイプ。日常に変化や挑戦を入れるとリフレッシュできます。ただし刺激物の取りすぎ・夜更かしには要注意。',
      advice: [
        'ジョギング・筋トレなど汗をかく運動を週2回入れる',
        '行ったことのないお店・町を歩いて新鮮な刺激を取る',
        'カラオケ・ライブで大声を出してスッキリする',
      ]
    },
    H: {
      name: '癒し発散型',
      level: 'ok',
      note: 'やさしい味・甘味が好きなあなたは、ストレスを「ぬくもり」で溶かすタイプ。安心できる時間と空間で回復が早まります。一人で抱え込みやすいので、こまめな休息が鍵。',
      advice: [
        'お風呂に20分つかって深呼吸する時間を取る',
        '好きなアロマ・ハーブティーで嗅覚を整える',
        '寝る1時間前はスマホを置いて静かに過ごす',
      ]
    },
    C: {
      name: '社交発散型',
      level: 'ok',
      note: 'みんなで食べる・分け合うのが好きなあなたは、ストレスを「人とのつながり」で発散するタイプ。話す・笑う・共感されることでエネルギーが回復します。ただし疲れた時の無理な集まりは逆効果。',
      advice: [
        '気の合う友だちと月1回ご飯やお茶の予定を入れる',
        'SNSで同じ趣味の仲間とゆるくつながる',
        '愚痴や相談を一人で抱えず、信頼できる人に話す',
      ]
    },
    F: {
      name: '没頭発散型',
      level: 'warn',
      note: 'こだわり・専門・限定が好きなあなたは、ストレスを「集中・没頭」で忘れるタイプ。趣味や知識追求が最高のリセットになります。ただしオンオフの切替が難しいので、意識的に休みを入れて。',
      advice: [
        '週末の数時間は趣味だけに使う「没頭タイム」を確保',
        '読書・映画・ゲームなど集中できる世界に入る',
        '寝る前は仕事のことを考えない儀式（ストレッチ等）を入れる',
      ]
    },
  };

  var STORAGE_KEY = 'stress_relief_v2_last';
  var answers = {};

  function renderQuestions() {
    var html = QUESTIONS.map(function(q, i) {
      var opts = q.opts.map(function(o, j) {
        return '<label class="opt-row" data-q="' + i + '" data-tag="' + o.tag + '" onclick="selectOpt(this)">'
             + '<input type="radio" name="q' + i + '">' + o.t + '</label>';
      }).join('');
      return '<div style="margin-bottom:1.2rem;">'
           + '<p class="q-title">' + q.q + '</p>'
           + opts + '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  function selectOpt(el) {
    var qi = el.getAttribute('data-q');
    var siblings = document.querySelectorAll('[data-q="' + qi + '"]');
    siblings.forEach(function(s){ s.classList.remove('selected'); });
    el.classList.add('selected');
    answers['q' + qi] = el.getAttribute('data-tag');
  }

  function diagnose() {
    var keys = Object.keys(answers);
    if (keys.length < QUESTIONS.length) {
      showResult('ng', '⚠️ 未回答あり', '5問すべて選んでください。');
      document.getElementById('advice-card').style.display = 'none';
      return;
    }
    var count = { S:0, H:0, C:0, F:0 };
    keys.forEach(function(k){ count[answers[k]]++; });
    var top = 'S', topVal = -1;
    ['S','H','C','F'].forEach(function(t){
      if (count[t] > topVal) { top = t; topVal = count[t]; }
    });
    var typ = TYPES[top];
    showResult(typ.level, typ.name, typ.note);
    var ul = document.getElementById('advice-list');
    ul.innerHTML = typ.advice.map(function(a){ return '<li>' + a + '</li>'; }).join('');
    document.getElementById('advice-card').style.display = 'block';

    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ type: top, at: Date.now() })); } catch(e) {}
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  renderQuestions();

  // 前回結果を表示
  try {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && TYPES[saved.type]) {
      var t = TYPES[saved.type];
      var d = new Date(saved.at);
      var ds = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
      var note = document.createElement('p');
      note.style.cssText = 'max-width:600px;margin:0 auto 1rem;padding:0.6rem 0.9rem;background:var(--accent-light);border:1px solid var(--border);border-radius:10px;font-size:0.82rem;color:var(--text-sub);';
      note.textContent = '前回（' + ds + '）の診断: ' + t.name;
      document.body.insertBefore(note, document.getElementById('quiz-card'));
    }
  } catch(e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
