<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しの名前と誕生日を入力すると、残り日数を秒単位でリアルタイムカウントダウン。ワンタップで応援メッセージを生成してコピーできる推し活応援アプリです。">
  <title>推し誕秒読み応援メッセージ生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── カウントダウン ── */
    .countdown-display {
      text-align: center; padding: 1.5rem 1rem;
    }
    .countdown-numbers {
      display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }
    .cd-unit {
      background: var(--accent-light); border: 1.5px solid var(--accent);
      border-radius: 10px; padding: 0.6rem 0.8rem; min-width: 70px;
      text-align: center;
    }
    .cd-num { font-size: 1.8rem; font-weight: 900; color: var(--accent); line-height: 1.1; }
    .cd-label { font-size: 0.68rem; color: var(--text-sub); font-weight: 600; margin-top: 0.15rem; }
    .cd-seconds-total {
      font-size: 0.88rem; color: var(--text-sub); margin-top: 0.5rem;
    }
    .cd-seconds-total span { font-weight: 700; color: var(--accent); }

    /* ── メッセージカード ── */
    .msg-card {
      background: var(--accent-light); border: 1.5px solid var(--accent);
      border-radius: var(--radius); padding: 1.2rem;
      margin: 0 auto 1rem; max-width: 600px;
      text-align: center; display: none;
    }
    .msg-text {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      line-height: 1.6; margin-bottom: 0.8rem; min-height: 3em;
    }
    .btn-copy {
      display: inline-block; padding: 0.5rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 誕生日当日 ── */
    .birthday-today {
      font-size: 1.2rem; font-weight: 900; color: var(--accent);
      text-align: center; padding: 2rem 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎂 推し誕秒読み応援メッセージ生成器</h1>
    <p class="subtitle">推しの誕生日まで秒読み開始！ワンタップで応援メッセージも作れます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">推し情報を入力</p>
    <div class="field">
      <label for="oshiName">推しの名前</label>
      <input type="text" id="oshiName" placeholder="例: 星野アイ">
    </div>
    <div class="field">
      <label for="oshiBday">推しの誕生日</label>
      <input type="date" id="oshiBday">
      <p class="hint">月日だけ使います（年は次の誕生日を自動判定）</p>
    </div>
  </div>

  <!-- 開始ボタン -->
  <button class="btn-calc" onclick="startCountdown()">カウントダウン開始</button>

  <!-- カウントダウン表示 -->
  <div class="card" id="countdownCard" style="display:none">
    <p class="card-title" id="cdTitle">カウントダウン</p>
    <div class="countdown-display" id="cdDisplay">
      <div class="countdown-numbers" id="cdNumbers">
        <div class="cd-unit"><div class="cd-num" id="cdDays">0</div><div class="cd-label">日</div></div>
        <div class="cd-unit"><div class="cd-num" id="cdHours">0</div><div class="cd-label">時間</div></div>
        <div class="cd-unit"><div class="cd-num" id="cdMins">0</div><div class="cd-label">分</div></div>
        <div class="cd-unit"><div class="cd-num" id="cdSecs">0</div><div class="cd-label">秒</div></div>
      </div>
      <p class="cd-seconds-total">あと <span id="cdTotalSecs">0</span> 秒</p>
    </div>
  </div>

  <!-- メッセージ生成ボタン -->
  <button class="btn-calc no-print" id="btnGenerate" style="display:none" onclick="generateMessage()">応援メッセージを生成</button>

  <!-- メッセージ表示 -->
  <div class="msg-card" id="msgCard">
    <p class="msg-text" id="msgText"></p>
    <button class="btn-copy" onclick="copyMessage()">コピーする</button>
    <span id="copyDone" style="font-size:0.78rem;color:var(--ok);margin-left:0.5rem;display:none;">コピーしました！</span>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">生成メッセージ履歴</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは推し活を楽しむためのジョークアプリです。メッセージは自動生成されたものなので、送信前にお好みに合わせてアレンジしてください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var timer = null;
  var targetDate = null;
  var oshiName = '';
  var msgHistory = [];

  var MESSAGES = [
    '{name}さん、お誕生日おめでとうございます！あなたの存在が毎日の活力です！',
    '{name}さんが生まれてきてくれたこの日に感謝！最高の一年になりますように！',
    'Happy Birthday {name}さん！あなたの笑顔にいつも元気をもらっています！',
    '{name}さん、お誕生日おめでとう！これからも輝き続けてください！',
    '{name}さんの誕生日を全力でお祝いします！ずっとずっと応援しています！',
    '{name}さん、素敵な一年になりますように！いつもありがとう！',
    '世界一大好きな{name}さん、お誕生日おめでとうございます！',
    '{name}さんが存在するだけで世界は明るい！最高の誕生日を！',
    '{name}さん、誕生日おめでとう！あなたのファンでいられて幸せです！',
    'お誕生日おめでとう{name}さん！今日はあなたが主役の日です！',
    '{name}さんの新しい一年が笑顔であふれますように！お誕生日おめでとう！',
    '{name}さん、生まれてきてくれてありがとう！全力でお祝いします！',
    '推しの{name}さん、お誕生日おめでとうございます！永遠に推します！',
    '{name}さん、おめでとう！あなたの夢が全部叶いますように！',
    '{name}さんのお誕生日、待ってました！最高に幸せな日になりますように！',
    'Happy Birthday！{name}さんがいてくれるから毎日頑張れます！',
    '{name}さん、お誕生日おめでとう！あなたは私たちの太陽です！',
    '{name}さんの誕生日を心からお祝いします！いつまでも大好きです！',
    '{name}さん、おめでとうございます！これからも最高の{name}さんでいてください！',
    '今日は{name}さんの特別な日！全世界のファンと一緒にお祝いします！',
    '{name}さん、お誕生日おめでとう！あなたの活躍をこれからも見守っています！',
    '{name}さんが笑っている世界が一番好きです。お誕生日おめでとう！',
    '{name}さん、おめでとう！推しが元気でいてくれるだけで最高の毎日です！',
    '{name}さん、素敵な誕生日を！あなたに出会えたことに感謝しています！',
    '{name}さんの誕生日に改めて。あなたを推せて本当に幸せです！',
  ];

  var COUNTDOWN_MESSAGES = [
    '{name}さんの誕生日まであと{days}日！楽しみすぎて眠れない！',
    'あと{days}日で{name}さんの誕生日！カウントダウン開始です！',
    '{name}さんの誕生日まで{days}日。準備は万端ですか？',
    '{name}さんの特別な日まであと{days}日！ワクワクが止まらない！',
    'あと{days}日！{name}さんの誕生日が待ち遠しい！',
    '{days}日後は{name}さんの誕生日！全力でお祝いしましょう！',
    '{name}さんの誕生日まで残り{days}日。毎日がカウントダウン！',
    'あと{days}日で{name}さんの誕生日！心の準備はOK？',
    '{name}さんの誕生日まであと{days}日！テンション上がってきた！',
    '{days}日後、{name}さんが誕生日を迎えます！最高のお祝いを！',
  ];

  function loadData() {
    try {
      var saved = localStorage.getItem('oshi_bday_countdown');
      if (saved) {
        var d = JSON.parse(saved);
        if (d.name) document.getElementById('oshiName').value = d.name;
        if (d.bday) document.getElementById('oshiBday').value = d.bday;
      }
      var hist = localStorage.getItem('oshi_bday_msg_history');
      if (hist) msgHistory = JSON.parse(hist);
    } catch(e) {}
  }

  function saveData() {
    try {
      localStorage.setItem('oshi_bday_countdown', JSON.stringify({
        name: document.getElementById('oshiName').value,
        bday: document.getElementById('oshiBday').value
      }));
    } catch(e) {}
  }

  function saveHistory() {
    try {
      localStorage.setItem('oshi_bday_msg_history', JSON.stringify(msgHistory.slice(0, 20)));
    } catch(e) {}
  }

  function getNextBirthday(monthDay) {
    var parts = monthDay.split('-');
    var m = parseInt(parts[1]) - 1;
    var d = parseInt(parts[2]);
    var now = new Date();
    var thisYear = new Date(now.getFullYear(), m, d);
    if (thisYear > now) return thisYear;
    return new Date(now.getFullYear() + 1, m, d);
  }

  function startCountdown() {
    var name = document.getElementById('oshiName').value.trim();
    var bday = document.getElementById('oshiBday').value;
    if (!name) { alert('推しの名前を入力してください'); return; }
    if (!bday) { alert('誕生日を選択してください'); return; }

    oshiName = name;
    targetDate = getNextBirthday(bday);
    saveData();

    document.getElementById('cdTitle').textContent = name + 'さんの誕生日まで';
    document.getElementById('countdownCard').style.display = 'block';
    document.getElementById('btnGenerate').style.display = 'block';
    renderHistory();

    if (timer) clearInterval(timer);
    updateCountdown();
    timer = setInterval(updateCountdown, 1000);
  }

  function updateCountdown() {
    var now = new Date();
    var diff = targetDate - now;

    if (diff <= 0) {
      document.getElementById('cdDisplay').innerHTML =
        '<div class="birthday-today">🎉🎂 今日は' + oshiName + 'さんの誕生日！🎂🎉</div>';
      document.getElementById('cdTitle').textContent = oshiName + 'さん お誕生日おめでとう！';
      if (timer) { clearInterval(timer); timer = null; }
      return;
    }

    var totalSecs = Math.floor(diff / 1000);
    var days = Math.floor(totalSecs / 86400);
    var hours = Math.floor((totalSecs % 86400) / 3600);
    var mins = Math.floor((totalSecs % 3600) / 60);
    var secs = totalSecs % 60;

    document.getElementById('cdDays').textContent = days;
    document.getElementById('cdHours').textContent = hours;
    document.getElementById('cdMins').textContent = mins;
    document.getElementById('cdSecs').textContent = secs;
    document.getElementById('cdTotalSecs').textContent = totalSecs.toLocaleString('ja-JP');
  }

  function generateMessage() {
    if (!oshiName) { alert('先にカウントダウンを開始してください'); return; }

    var now = new Date();
    var diff = targetDate - now;
    var days = Math.floor(diff / 1000 / 86400);
    var pool = days <= 0 ? MESSAGES : COUNTDOWN_MESSAGES;
    var idx = Math.floor(Math.random() * pool.length);
    var msg = pool[idx].replace(/\{name\}/g, oshiName).replace(/\{days\}/g, days);

    document.getElementById('msgText').textContent = msg;
    document.getElementById('msgCard').style.display = 'block';
    document.getElementById('copyDone').style.display = 'none';

    msgHistory.unshift({ text: msg, date: new Date().toLocaleString('ja-JP') });
    if (msgHistory.length > 20) msgHistory = msgHistory.slice(0, 20);
    saveHistory();
    renderHistory();
  }

  function copyMessage() {
    var msg = document.getElementById('msgText').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(msg).then(function() {
        document.getElementById('copyDone').style.display = 'inline';
        setTimeout(function() { document.getElementById('copyDone').style.display = 'none'; }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = msg;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      document.getElementById('copyDone').style.display = 'inline';
      setTimeout(function() { document.getElementById('copyDone').style.display = 'none'; }, 2000);
    }
  }

  function renderHistory() {
    var el = document.getElementById('historyList');
    if (msgHistory.length === 0) {
      document.getElementById('historyCard').style.display = 'none';
      return;
    }
    document.getElementById('historyCard').style.display = 'block';
    el.innerHTML = msgHistory.map(function(h) {
      return '<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;">'
        + '<div style="color:var(--text);line-height:1.5;">' + escapeHtml(h.text) + '</div>'
        + '<div style="color:var(--text-sub);font-size:0.72rem;margin-top:0.2rem;">' + escapeHtml(h.date) + '</div>'
        + '</div>';
    }).join('');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();
  var savedName = document.getElementById('oshiName').value;
  var savedBday = document.getElementById('oshiBday').value;
  if (savedName && savedBday) startCountdown();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
