<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="アニメキャラと場面を選ぶだけで、SNSでバズる推し投稿案が瞬時に3つ生成されます。推し活で人気を集めたい方、投稿のネタに困っている方に最適な無料ツールです。">
  <title>✨ アニメ推し活投稿ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 投稿案カード ── */
    .post-item {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }
    .post-item:last-child { margin-bottom: 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>✨ アニメ推し活投稿ジェネレーター</h1>
    <p class="subtitle">好きなアニメキャラと場面を選ぶだけで、SNSでバズる推し投稿3案がサクッと作れます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">選択</p>
    <div class="field">
      <label for="character">好きなアニメキャラクター</label>
      <select id="character">
        <option value="">選択してください</option>
        <option value="クール系">クール系キャラ</option>
        <option value="可愛い系">可愛い系キャラ</option>
        <option value="二次元美女">二次元美女</option>
        <option value="イケメン">イケメン</option>
        <option value="天才肌">天才肌キャラ</option>
        <option value="ツンデレ">ツンデレ</option>
        <option value="ギャル系">ギャル系キャラ</option>
        <option value="不良系">不良系キャラ</option>
        <option value="癒し系">癒し系キャラ</option>
        <option value="トリックスター">トリックスター</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">場面・シチュエーション</label>
      <select id="scene">
        <option value="">選択してください</option>
        <option value="戦闘シーン">戦闘シーン</option>
        <option value="恋愛シーン">恋愛シーン</option>
        <option value="日常生活">日常生活</option>
        <option value="感動シーン">感動シーン</option>
        <option value="ギャグシーン">ギャグシーン</option>
        <option value="修行シーン">修行シーン</option>
        <option value="絆のシーン">絆のシーン</option>
        <option value="悔しさ爆発">悔しさ爆発</option>
        <option value="勝利の瞬間">勝利の瞬間</option>
        <option value="秘密のシーン">秘密のシーン</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">推し投稿3案を生成する</button>

  <!-- 結果カード -->
  <div class="result-card ok" id="result" style="text-align: left;">
    <p class="card-title">推し投稿3案</p>
    <div id="posts"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、推し活でのSNS投稿効果を高めるための参考データをもとに作成しています。生成された投稿案は、あくまで参考です。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ローカルストレージキーの定義
  const STORAGE_KEY = 'anime_post_generator_data';

  // 推し投稿3案のテンプレート
  const POST_TEMPLATES = {
    'クール系': {
      '戦闘シーン': ['私の推しの真摯な眼差し…この一瞬が全てを物語ってる🔥', 'クールな表情だけで心を掴む。これが推しの力。', '推しのクール系キャラ、戦闘時のこのオーラ…やばい😭'],
      '恋愛シーン': ['推しの照れた顔を見たのは初めてかも…かわいい😆', 'クールなのに恋愛シーンではこんなに優しくなるんだ💕', '推しのデレデレ顔、これだけのためにアニメ見てる🥺'],
      '日常生活': ['日常のこんなシーンも推しだと推しい😌', 'クールなのに日常では案外ポンコツ…推しかわいい🦆', '何気ない日常シーンが一番好き。それが推し活🍀'],
      '感動シーン': ['推しのこの涙…俺たちのためにありがとう😭', 'クールな推しが感動で泣く…強い感情が伝わってくる', '推しの本当の気持ちが詰まった一シーン。泣いた🥺'],
      '勝利の瞬間': ['推し、勝った…この笑顔最高🏆', 'クールな推しが喜ぶの見れるのはこのシーンだけ😄', 'どんな敵でも超える推し。推し活最高🙌'],
    },
    '可愛い系': {
      '戦闘シーン': ['可愛いのに戦う姿も最高。推しのギャップ好きです💗', '推しが真剣な顔で戦ってる…こんな可愛い戦士見たことない😍', 'キュートなのに強い。これが推しクオリティ🥰'],
      '恋愛シーン': ['推しのこの恥ずかしい表情…可愛すぎて死ぬ😭', 'キュートな推しの恋愛シーンは毒。毒のようなおいしさ💕', '推しが照れてる…もう可愛いという言葉では足りない🦋'],
      '日常生活': ['日常で見せる推しのリアルな可愛さ…推し活支えてる🌷', 'こんなに可愛いキャラが日常生活してるだけでニヤニヤ😆', '何してても可愛い。それが推しの力。'],
      '感動シーン': ['可愛いのに感情も深い。推しの魅力全部詰まってる😢', '推しが泣いてる…助けてあげたい…😭', '可愛い見た目で大事な事を教えてくれる推し🌟'],
      '勝利の瞬間': ['推しの笑顔でランク変動📈', '可愛く勝利をつかむ推し。推し活の醍醐味🏅', '推しが喜ぶ姿が見たいためだけに生きてる😊'],
    },
    '二次元美女': {
      '戦闘シーン': ['美しさと強さを兼ね備えた推し…最高のキャラです🌹', '二次元最高峰の美女が戦う…この迫力', '推しのこの戦闘シーン、何度見てもため息が出る😍'],
      '恋愛シーン': ['美女系推しの恋愛シーン…最高のご褒美🎁', '推しが男性キャラに惚れるシーン…俺たちのライバル出現😭', '二次元美女の恋する姿…何か違う美しさがある💫'],
      '日常生活': ['美しさそのもの。日常だけで十分なエモさ🌸', '推しが何気なく微笑む…それで十分幸せ😌', '美女の日常って最高の娯楽🎀'],
      '感動シーン': ['推しが泣く姿も美しい…涙まで美しい😭', '美女系推しの感動シーンは芸術作品🎨', '推しの本気の感情…美しくて…辛い😢'],
      '勝利の瞬間': ['美女系推しの勝利の表情…神々しい✨', '推しが微笑んで勝利……最高の結末🏆', '美しく勝つ。それが推しクオリティ👑'],
    },
    'イケメン': {
      '戦闘シーン': ['推しのイケメンぶりが戦闘で100倍増幅されてる🔥', 'イケメンなのに戦闘は真面目…ギャップ最高😍', '推しが真剣に戦う顔…かっこよすぎて言葉出ない'],
      '恋愛シーン': ['イケメン推しの恋愛シーン…これが最高の癒し💕', 'イケメンが照れる…こんな可愛い一面見たのは初めて🥰', '推しの恋情シーン…応援したくなる💗'],
      '日常生活': ['イケメンの日常って最高のエンタメ😄', '何気なく生きてるだけでかっこいい推し🌟', '推しの何気ない仕草まで魅力的'],
      '感動シーン': ['イケメン推しが泣く…かっこよさが違う涙😭', '推しの本気が見える瞬間…泣いた', 'イケメンだけど感情深い…推し活最高🥺'],
      '勝利の瞬間': ['かっこよく勝つ推し。推し活の醍醐味🏅', 'イケメンが笑う…最高のご褒美😊', '推しの勝利の瞬間、一生忘れられない🏆'],
    }
  };

  function generate() {
    const character = document.getElementById('character').value;
    const scene = document.getElementById('scene').value;

    if (!character || !scene) {
      alert('キャラクターと場面を両方選んでください');
      return;
    }

    // データ保存
    saveData({ character, scene });

    // 推し投稿3案を生成
    const templates = POST_TEMPLATES[character] ? POST_TEMPLATES[character][scene] : null;
    let posts = [];

    if (templates && templates.length > 0) {
      posts = templates.slice(0, 3);
    } else {
      // フォールバック
      posts = [
        `推しが${character}で${scene}…最高に推しい😭`,
        `${character}の${scene}を見る度に沼が深くなる🌀`,
        `推し活って本当にいい趣味…${character}のおかげです💕`
      ];
    }

    showResult(posts);
  }

  function showResult(posts) {
    const resultDiv = document.getElementById('result');
    let html = '<p class="card-title">推し投稿3案</p>';

    posts.forEach((post, idx) => {
      html += '<div class="post-item">' +
              '<strong>' + (idx + 1) + '案目</strong><br>' +
              post +
              '</div>';
    });

    document.getElementById('posts').innerHTML = html;
    resultDiv.style.display = 'block';
    resultDiv.scrollIntoView({ behavior: 'smooth' });
  }

  function saveData(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {
      // localStorage 使用不可時は無視
    }
  }

  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('character').value = data.character || '';
        document.getElementById('scene').value = data.scene || '';
      }
    } catch(e) {
      // localStorage 読込失敗時は無視
    }
  }

  // ページ読み込み時に前回のデータを復元
  window.addEventListener('DOMContentLoaded', loadData);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
