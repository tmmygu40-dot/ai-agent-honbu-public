<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="気まずい飲み会の誘いを断りたい時、相手・シーン・理由を選ぶだけで「柔らかめ／標準／きっぱり」の3パターンのお断りLINE文を即生成。コピペでそのまま送れる無料の飲み会断り方ジェネレーターです。">
  <title>飲み会お断りLINEメーカー｜TPO別3パターン即生成</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.4rem; line-height: 1.5; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select, .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus, .field input:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 3パターン結果カード */
    .pattern-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .pattern-card.soft   { border-left: 6px solid #15803d; }
    .pattern-card.normal { border-left: 6px solid #b45309; }
    .pattern-card.firm   { border-left: 6px solid #b91c1c; }
    .pattern-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.7rem;
    }
    .pattern-name { font-size: 0.95rem; font-weight: 800; }
    .pattern-card.soft   .pattern-name { color: #15803d; }
    .pattern-card.normal .pattern-name { color: #b45309; }
    .pattern-card.firm   .pattern-name { color: #b91c1c; }
    .pattern-body {
      white-space: pre-wrap;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem; line-height: 1.7;
      color: var(--text);
      margin-bottom: 0.7rem;
    }
    .btn-copy {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .pattern-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍻 飲み会お断りLINEメーカー</h1>
    <p class="subtitle">相手とシーンを選ぶだけで、角が立たないお断りLINEを3パターンサクッと作れます。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="target">相手タイプ</label>
      <select id="target">
        <option value="boss">上司</option>
        <option value="senior">先輩</option>
        <option value="peer" selected>同僚</option>
        <option value="junior">後輩</option>
        <option value="friend">友達</option>
        <option value="client">取引先</option>
      </select>
    </div>

    <div class="field">
      <label for="scene">飲み会のシーン</label>
      <select id="scene">
        <option value="welcome">歓送迎会</option>
        <option value="year_end">忘年会</option>
        <option value="new_year">新年会</option>
        <option value="kickoff">打ち上げ</option>
        <option value="general" selected>普通の飲み会</option>
        <option value="second">二次会</option>
      </select>
    </div>

    <div class="field">
      <label for="reason">断る理由</label>
      <select id="reason">
        <option value="health" selected>体調が良くない</option>
        <option value="family">家族の予定</option>
        <option value="work">仕事の都合</option>
        <option value="money">金欠</option>
        <option value="rest">疲れていて休みたい</option>
        <option value="other">その他の予定</option>
      </select>
    </div>

    <div class="field">
      <label for="relation">関係を保ちたい度</label>
      <select id="relation">
        <option value="high">高（しっかり丁寧に）</option>
        <option value="mid" selected>中（普通の丁寧さ）</option>
        <option value="low">低（カジュアルでOK）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">LINE文を作る</button>

  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📝 一般的なビジネスマナー・カジュアルなコミュニケーションの慣習を参考に、断り文の例を整理しています。最終的な文面は、ご自身と相手の関係性に合わせて微調整してください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 文面パーツ辞書 ──
  var TARGET_PREFIX = {
    boss:   { high: 'お疲れ様です。', mid: 'お疲れ様です！', low: 'おつかれさまです。' },
    senior: { high: 'お疲れ様です。', mid: 'お疲れ様です！', low: 'おつかれです〜' },
    peer:   { high: 'お疲れ様です。', mid: 'おつかれー！',   low: 'おつー！' },
    junior: { high: 'お疲れ様。',     mid: 'おつかれ！',     low: 'おつー！' },
    friend: { high: 'こんばんは！',   mid: 'やっほ〜',       low: 'ねぇねぇ' },
    client: { high: 'お世話になっております。', mid: 'お世話になっております。', low: 'お世話になっております。' }
  };

  var SCENE_LABEL = {
    welcome:  '歓送迎会',
    year_end: '忘年会',
    new_year: '新年会',
    kickoff:  '打ち上げ',
    general:  '飲み会',
    second:   '二次会'
  };

  var REASON_TEXT = {
    health: { soft: '少し体調を崩しておりまして',         normal: '体調が優れず',           firm: '体調不良のため' },
    family: { soft: '家庭の予定が入っておりまして',       normal: '家族の用事があり',       firm: '家庭の事情で' },
    work:   { soft: '別件の業務が立て込んでおりまして',   normal: '仕事が立て込んでおり',   firm: '仕事の都合で' },
    money:  { soft: '今月ちょっと予算が厳しくて',         normal: '今月ちょっと金欠でして', firm: '金銭的に厳しく' },
    rest:   { soft: '少し疲れがたまってしまっていて',     normal: '今週かなり疲れていて',   firm: '体力的にきつく' },
    other:  { soft: '先約が入っておりまして',             normal: '先約があり',             firm: '別件の予定があり' }
  };

  var REASON_TEXT_CASUAL = {
    health: { soft: 'ちょっと体調イマイチで…',     normal: '体調微妙で',         firm: '体調悪くて' },
    family: { soft: '家のことでバタバタしてて…',   normal: '家の予定入ってて',   firm: '家庭の用事があって' },
    work:   { soft: 'ちょっと仕事ヤバくて…',       normal: '仕事立て込んでて',   firm: '仕事忙しくて' },
    money:  { soft: '今月ちょっとピンチで…',       normal: '今月ガチで金欠で',   firm: '金欠なので' },
    rest:   { soft: 'もうクタクタで…',             normal: '疲れすぎてて',       firm: '休みたくて' },
    other:  { soft: '先約あって、ごめん！',         normal: '先約あって',         firm: '別件あって' }
  };

  function pickReason(reasonKey, level, isCasual) {
    var dict = isCasual ? REASON_TEXT_CASUAL : REASON_TEXT;
    return dict[reasonKey][level];
  }

  function buildSoft(target, sceneLabel, reasonKey, relation) {
    var greet = TARGET_PREFIX[target][relation];
    var isCasual = (target === 'friend' || target === 'junior') && relation === 'low';
    var reason = pickReason(reasonKey, 'soft', isCasual);

    if (target === 'client') {
      return greet + '\n'
        + '今回の' + sceneLabel + 'のお誘いをいただきありがとうございます。\n'
        + '大変恐縮なのですが、' + reason + '今回は欠席させていただきたく存じます。\n'
        + 'せっかくお声がけいただいたのに申し訳ございません。\n'
        + 'また機会がございましたら、ぜひご一緒させてください。';
    }
    if (target === 'boss' || (target === 'senior' && relation !== 'low')) {
      return greet + '\n'
        + '今回の' + sceneLabel + 'にお声がけいただきありがとうございます！\n'
        + '大変申し訳ないのですが、' + reason + '今回は欠席させてください。\n'
        + 'ぜひまた次の機会にご一緒させてください🙇';
    }
    if (isCasual) {
      return greet + '\n'
        + sceneLabel + '誘ってくれてありがとう！\n'
        + 'ごめん、' + reason + '今回はパスさせて〜🙏\n'
        + 'また次やる時ぜひ呼んで！';
    }
    return greet + '\n'
      + sceneLabel + '誘ってくれてありがとう！\n'
      + '申し訳ないんだけど、' + reason + '今回は遠慮させてください🙏\n'
      + 'また次の機会にぜひ！';
  }

  function buildNormal(target, sceneLabel, reasonKey, relation) {
    var greet = TARGET_PREFIX[target][relation];
    var isCasual = (target === 'friend' || target === 'junior') && relation === 'low';
    var reason = pickReason(reasonKey, 'normal', isCasual);

    if (target === 'client') {
      return greet + '\n'
        + sceneLabel + 'のお誘い、ありがとうございます。\n'
        + reason + '、今回は欠席させていただきます。\n'
        + 'よろしくお願いいたします。';
    }
    if (target === 'boss' || target === 'senior') {
      return greet + '\n'
        + sceneLabel + 'のお誘いありがとうございます。\n'
        + reason + '、今回は欠席させてください。\n'
        + 'よろしくお願いします！';
    }
    if (isCasual) {
      return greet + '\n'
        + sceneLabel + '、誘ってくれてありがとう！\n'
        + reason + '、今回はパスで〜🙏';
    }
    return greet + '\n'
      + sceneLabel + 'のお誘いありがとう！\n'
      + reason + '、今回は欠席で。\n'
      + 'また誘って！';
  }

  function buildFirm(target, sceneLabel, reasonKey, relation) {
    var greet = TARGET_PREFIX[target][relation];
    var isCasual = (target === 'friend' || target === 'junior') && relation === 'low';
    var reason = pickReason(reasonKey, 'firm', isCasual);

    if (target === 'client') {
      return greet + '\n'
        + reason + '、今回の' + sceneLabel + 'は欠席させていただきます。\n'
        + 'よろしくお願いいたします。';
    }
    if (target === 'boss' || target === 'senior') {
      return greet + '\n'
        + reason + '、今回の' + sceneLabel + 'は不参加でお願いします。';
    }
    if (isCasual) {
      return greet + '\n'
        + reason + '、今回パスで！';
    }
    return greet + '\n'
      + reason + '、今回は不参加で。';
  }

  function generate() {
    var target = document.getElementById('target').value;
    var scene = document.getElementById('scene').value;
    var reason = document.getElementById('reason').value;
    var relation = document.getElementById('relation').value;
    var sceneLabel = SCENE_LABEL[scene];

    var soft   = buildSoft(target, sceneLabel, reason, relation);
    var normal = buildNormal(target, sceneLabel, reason, relation);
    var firm   = buildFirm(target, sceneLabel, reason, relation);

    var html = ''
      + renderPattern('soft',   '🟢 柔らかめ（角が立たない）', soft)
      + renderPattern('normal', '🟡 標準（普通に断る）',       normal)
      + renderPattern('firm',   '🔴 きっぱり（短く明確に）',   firm);

    document.getElementById('results').innerHTML = html;
    saveInputs();
  }

  function renderPattern(level, name, text) {
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var escForAttr = encodeURIComponent(text);
    return ''
      + '<div class="pattern-card ' + level + '">'
      +   '<div class="pattern-head">'
      +     '<span class="pattern-name">' + name + '</span>'
      +     '<button class="btn-copy" onclick="copyText(this, \'' + escForAttr + '\')">コピー</button>'
      +   '</div>'
      +   '<div class="pattern-body">' + safe + '</div>'
      + '</div>';
  }

  function copyText(btn, encoded) {
    var text = decodeURIComponent(encoded);
    var done = function() {
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(function(){
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  // ── localStorage ──
  var LS_KEY = 'nomikai_kotowari_v1';
  function saveInputs() {
    try {
      var data = {
        target:   document.getElementById('target').value,
        scene:    document.getElementById('scene').value,
        reason:   document.getElementById('reason').value,
        relation: document.getElementById('relation').value
      };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  function loadInputs() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      ['target','scene','reason','relation'].forEach(function(k){
        if (data[k]) {
          var el = document.getElementById(k);
          if (el) el.value = data[k];
        }
      });
    } catch(e) {}
  }
  loadInputs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
