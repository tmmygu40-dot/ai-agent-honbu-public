<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GW明けの自宅リカバリープランジェネレーター</title>
  <meta name="description" content="GW明けの疲れ・やる気喪失に備えて、疲れパターンを選ぶだけで自宅リカバリープラン（睡眠・食事・運動・リラックス）を自動生成。仕事復帰前の心身準備をサッと整える無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 疲れパターンボタン群 ── */
    .pattern-buttons {
      display: grid; grid-template-columns: 1fr; gap: 0.8rem;
      margin-bottom: 0;
    }
    .pattern-btn {
      padding: 1rem; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--card);
      cursor: pointer; font-size: 1rem; font-weight: 700;
      color: var(--text);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pattern-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .pattern-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.3; margin-bottom: 0.8rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .recovery-steps { list-style: none; }
    .recovery-step {
      padding: 0.8rem 0.8rem 0.8rem 2.2rem;
      margin-bottom: 0.6rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      position: relative;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .recovery-step::before {
      content: attr(data-step);
      position: absolute;
      left: 0.8rem;
      width: 28px; height: 28px;
      background: var(--accent); color: white;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 0.85rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; margin: 1.2rem auto 0; padding: 0.8rem 1.5rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: transform 0.1s;
    }
    .btn-copy:active { transform: scale(0.98); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .pattern-buttons, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- GoatCounter 計測タグ（削除禁止） -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>GW明けの自宅リカバリープラン</h1>
    <p class="subtitle">疲れパターン→リカバリープラン自動生成</p>
  </header>

  <!-- 疲れパターン選択カード -->
  <div class="card">
    <p class="card-title">あなたの疲れは？</p>
    <div class="pattern-buttons">
      <button class="pattern-btn" onclick="generateRecovery('body')">
        💪 肉体疲労<br><span style="font-size:0.75rem;font-weight:400;">体がだるい・眠い・疲労感</span>
      </button>
      <button class="pattern-btn" onclick="generateRecovery('mind')">
        🧠 精神疲労<br><span style="font-size:0.75rem;font-weight:400;">心が疲れた・やる気がない・イライラ</span>
      </button>
      <button class="pattern-btn" onclick="generateRecovery('time')">
        ⏰ 時間疲労<br><span style="font-size:0.75rem;font-weight:400;">生活リズムが乱れた・目覚めが悪い</span>
      </button>
    </div>
  </div>

  <!-- 結果カード -->
  <div class="result-card ok" id="result">
    <p class="result-label">リカバリープラン</p>
    <p class="result-value" id="rv">—</p>
    <ul class="recovery-steps" id="steps"></ul>
  </div>

  <button class="btn-copy no-print" onclick="copyPlan()">📋 プランをコピー</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省の睡眠指針やメンタルヘルス情報を参考に、自宅で実践できるリカバリー方法をまとめています。
  </p>

  <!-- 広告枠（仮） -->
  <div style="max-width:600px;margin:1.2rem auto;padding:1rem;background:var(--card);border:1px dashed var(--border);border-radius:10px;text-align:center;color:var(--text-sub);font-size:0.78rem;">
    広告枠
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // リカバリープラン定義
  var RECOVERY_PLANS = {
    body: {
      title: '肉体疲労リカバリー',
      steps: [
        '夜は就寝1時間前にぬるいお風呂（38-40℃）に15分。体温低下で入眠やすくなります。',
        '朝日を30秒浴びる + 冷たい水で顔を洗う。体内時計をリセット。',
        '3食ともタンパク質+炭水化物を。特に朝食と夜食が重要（夜は就寝3時間前）。',
      ]
    },
    mind: {
      title: '精神疲労リカバリー',
      steps: [
        '好きな音楽を聴きながら10分散歩。脳をリセットして気分転換。',
        '夜は瞑想アプリで5分。呼吸に集中（腹式呼吸6秒吸って8秒かけて吐く）。',
        '朝は1杯のコーヒーまたは紅茶を味わってゆっくり飲む。儀式化でマインドフルネス。',
      ]
    },
    time: {
      title: '時間疲労リカバリー',
      steps: [
        '毎朝6時半に目覚まし。1週間同じ時間に起床して体内時計をリセット。',
        '朝日を浴びる（最低10分）。セロトニン分泌で自然と夜の入眠時間が早まります。',
        '夜21時以降はスマホを避け、23時に就寝。生活リズムの安定に3-5日必要。',
      ]
    }
  };

  function generateRecovery(pattern) {
    if (!RECOVERY_PLANS[pattern]) return;
    var plan = RECOVERY_PLANS[pattern];

    // ボタンをアクティブ化
    document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
    event.target.closest('.pattern-btn').classList.add('active');

    // 結果を表示
    document.getElementById('rv').textContent = plan.title;
    var stepsHtml = plan.steps.map((step, idx) =>
      '<li class="recovery-step" data-step="' + (idx+1) + '">' + step + '</li>'
    ).join('');
    document.getElementById('steps').innerHTML = stepsHtml;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'center' });

    // localStorage に保存
    localStorage.setItem('gw-recovery-plan', JSON.stringify({ pattern, title: plan.title, steps: plan.steps, timestamp: new Date().toLocaleString('ja-JP') }));
  }

  function copyPlan() {
    var title = document.getElementById('rv').textContent;
    var steps = Array.from(document.querySelectorAll('.recovery-step')).map(el => el.textContent.trim()).join('\n');
    var text = 'GW明けの自宅リカバリープラン\n\n【' + title + '】\n\n' + steps + '\n\nhttps://tmmygu40-dot.github.io/ai-agent-honbu-public/ゴールデンウィーク直後の疲れを癒す自宅リカバリープランジェネレーター/';

    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => alert('コピーしました！')).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('コピーしました！');
  }

  // ページロード時に保存されたプランを復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('gw-recovery-plan');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        // 復元時の自動表示は控える（選択待ち）
      } catch(e) {}
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
