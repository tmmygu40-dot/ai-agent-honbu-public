<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メニュー表作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E3%83%A1%E3%83%8B%E3%83%A5%E3%83%BC%E8%A1%A8%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="メニュー表作成アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"メニュー表作成アプリ","description":"メニュー表作成アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%83%A1%E3%83%8B%E3%83%A5%E3%83%BC%E8%A1%A8%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>メニュー表作成アプリ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <!-- 入力フォーム -->
    <section class="input-section">
      <h2>メニューを追加</h2>
      <div class="form-row">
        <input type="text" id="categoryInput" placeholder="カテゴリ（例：前菜）" maxlength="30">
        <input type="text" id="nameInput" placeholder="料理名（必須）" maxlength="50">
        <input type="number" id="priceInput" placeholder="価格（円）" min="0" max="999999">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <!-- カテゴリ管理 -->
    <section class="manage-section">
      <div class="manage-header">
        <h2>メニュー一覧</h2>
        <button id="printBtn" class="print-btn">印刷する</button>
      </div>
      <div id="menuList" class="menu-list"></div>
    </section>

    <!-- 印刷プレビュー -->
    <section class="preview-section no-print">
      <h2>メニュー表タイトル設定</h2>
      <div class="form-row">
        <input type="text" id="menuTitle" placeholder="店名・タイトル（例：本日のメニュー）" maxlength="50" value="本日のメニュー">
      </div>
    </section>
  </div>

  <!-- 印刷用出力エリア -->
  <div id="printArea" class="print-area print-only">
    <div class="print-header">
      <h1 id="printTitle"></h1>
    </div>
    <div id="printContent"></div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
