<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>順番待ち管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>順番待ち管理</h1>

    <!-- 受付フォーム -->
    <div class="card input-card">
      <h2>受付登録</h2>
      <div class="input-row">
        <input type="text" id="nameInput" placeholder="お名前（省略可）" maxlength="20">
        <button id="addBtn" class="btn btn-primary">受付する</button>
      </div>
    </div>

    <!-- 呼び出しパネル -->
    <div class="card call-card">
      <h2>呼び出し</h2>
      <div id="currentDisplay" class="current-display">
        <span class="current-label">現在呼び出し中</span>
        <span id="currentNumber" class="current-number">---</span>
        <span id="currentName" class="current-name"></span>
      </div>
      <button id="callNextBtn" class="btn btn-call">次の方をどうぞ</button>
    </div>

    <!-- 待ちリスト -->
    <div class="card list-card">
      <div class="list-header">
        <h2>待ちリスト</h2>
        <span id="waitCount" class="wait-count">0件</span>
      </div>
      <ul id="waitList" class="wait-list">
        <li class="empty-msg">現在待ちのお客様はいません</li>
      </ul>
    </div>

    <!-- リセットボタン -->
    <div class="reset-area">
      <button id="resetBtn" class="btn btn-reset">全件リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
