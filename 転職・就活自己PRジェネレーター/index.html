<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転職・就活自己PRジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── タブ ── */
    .tabs { display: flex; gap: 0.5rem; margin: 0 auto 0.5rem; max-width: 600px; }
    .tab-btn {
      flex: 1; padding: 0.55rem 0.5rem;
      font-size: 0.82rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--card); color: var(--text-sub);
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }
    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .result-label { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
    .btn-copy {
      padding: 0.4rem 1rem; font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
    .result-text {
      font-size: 0.95rem; line-height: 1.85;
      color: var(--text); white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── パターン選択 ── */
    .pattern-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .pattern-btn {
      padding: 0.4rem 0.8rem; font-size: 0.8rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--card); color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
    }
    .pattern-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .char-count { font-size: 0.72rem; color: var(--text-sub); text-align: right; margin-top: 0.5rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .tabs, .tab-btn, .pattern-tabs { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; }
      .app-header { border-bottom: 2px solid #000; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>転職・就活 自己PRジェネレーター</h1>
    <p class="subtitle">経験・強みを入力するだけで自己PR文を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">あなたの情報を入力</p>
    <div class="field">
      <label for="job">職種・仕事内容</label>
      <input type="text" id="job" placeholder="例: 営業、エンジニア、事務、販売スタッフ">
    </div>
    <div class="field">
      <label for="exp">経験年数</label>
      <input type="text" id="exp" placeholder="例: 3年、5年以上、未経験">
    </div>
    <div class="field">
      <label for="strength">あなたの強み（キーワード）</label>
      <input type="text" id="strength" placeholder="例: 課題解決力、コミュニケーション力、継続力">
      <p class="hint">複数ある場合は「、」で区切って入力</p>
    </div>
    <div class="field">
      <label for="achievement">実績・成果（具体的な数字や事例）</label>
      <textarea id="achievement" placeholder="例: 担当エリアの売上を前年比120%達成、月間100件の顧客対応、チームの残業時間を30%削減"></textarea>
    </div>
    <div class="field">
      <label for="appeal">活かしたいこと・志望ポイント</label>
      <textarea id="appeal" placeholder="例: この経験を活かして貴社の〇〇部門で貢献したい、新しい分野でさらに成長したい"></textarea>
    </div>
  </div>

  <!-- パターン選択 -->
  <div style="max-width:600px;margin:0 auto 0.5rem;padding:0 0.2rem;">
    <p style="font-size:0.8rem;font-weight:700;color:var(--text-sub);margin-bottom:0.5rem;">生成パターン</p>
    <div class="pattern-tabs">
      <button class="pattern-btn active" onclick="setPattern(0,this)">スタンダード</button>
      <button class="pattern-btn" onclick="setPattern(1,this)">強み重視</button>
      <button class="pattern-btn" onclick="setPattern(2,this)">実績重視</button>
      <button class="pattern-btn" onclick="setPattern(3,this)">未経験向け</button>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">自己PR文を生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <div class="result-header">
      <span class="result-label">生成された自己PR文</span>
      <button class="btn-copy no-print" id="copyBtn" onclick="copyText()">コピー</button>
    </div>
    <div class="result-text" id="resultText"></div>
    <div class="char-count" id="charCount"></div>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var currentPattern = 0;

  function setPattern(idx, btn) {
    currentPattern = idx;
    document.querySelectorAll('.pattern-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }

  var patterns = [
    // 0: スタンダード
    function(d) {
      return '私は' + d.job + 'として' + d.exp + 'の経験があります。\n\n'
        + '特に強みとしているのは' + d.strength + 'です。'
        + (d.achievement ? '\n\nこれまでの実績として、' + d.achievement + '。' : '')
        + '\n\n' + (d.appeal ? d.appeal : 'この経験と強みを活かし、貴社でさらなる成長と貢献を目指したいと考えています。')
        + '\n\nぜひ採用の機会をいただけますと幸いです。よろしくお願いいたします。';
    },
    // 1: 強み重視
    function(d) {
      return '私の最大の強みは' + d.strength + 'です。\n\n'
        + d.job + 'として' + d.exp + 'の実務を通じ、この強みを徹底的に磨いてきました。'
        + (d.achievement ? '\n\n具体的には、' + d.achievement + 'という成果を残しました。' : '')
        + '\n\n' + (d.appeal ? d.appeal : '貴社においても、この強みを最大限に発揮して即戦力として活躍できると確信しています。');
    },
    // 2: 実績重視
    function(d) {
      return d.job + 'として' + d.exp + 'にわたり、確かな実績を積み重ねてきました。\n\n'
        + (d.achievement ? '代表的な成果として、' + d.achievement + '。\n\n' : '')
        + 'この実績の背景には、' + d.strength + 'という強みがあります。\n\n'
        + (d.appeal ? d.appeal : '貴社でもこれまでの経験と実績を活かし、早期に成果を出していきたいと考えています。');
    },
    // 3: 未経験向け
    function(d) {
      var str = d.strength || '主体的に学ぶ姿勢';
      return '前職では' + (d.job ? d.job + 'として' + d.exp + 'の経験を積みました。' : d.exp + 'の社会人経験を積みました。')
        + '\n\n私の強みは' + str + 'です。'
        + (d.achievement ? '\n\nこれまで' + d.achievement + 'という経験から、困難な状況でも諦めずに取り組む力を養いました。' : '')
        + '\n\n業界・職種は未経験ですが、' + (d.appeal ? d.appeal : 'これまで培った強みと吸収力を武器に、一日も早く即戦力として貢献できるよう全力で取り組みます。')
        + '\nぜひご検討いただけますと幸いです。';
    }
  ];

  function generate() {
    var job       = document.getElementById('job').value.trim() || '各種業務';
    var exp       = document.getElementById('exp').value.trim() || '数年';
    var strength  = document.getElementById('strength').value.trim() || '向上心と実行力';
    var achievement = document.getElementById('achievement').value.trim();
    var appeal    = document.getElementById('appeal').value.trim();

    var data = { job: job, exp: exp, strength: strength, achievement: achievement, appeal: appeal };
    var text = patterns[currentPattern](data);

    var resultEl = document.getElementById('result');
    document.getElementById('resultText').textContent = text;
    document.getElementById('charCount').textContent = '文字数: ' + text.length + '文字';
    resultEl.classList.add('show');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    document.getElementById('copyBtn').textContent = 'コピー';
    document.getElementById('copyBtn').classList.remove('copied');

    save();
  }

  function copyText() {
    var text = document.getElementById('resultText').textContent;
    var btn = document.getElementById('copyBtn');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = 'コピーしました！';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = 'コピーしました！'; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    }
  }

  var LS_KEY = 'jisho_pr_v1';
  function save() {
    localStorage.setItem(LS_KEY, JSON.stringify({
      job: document.getElementById('job').value,
      exp: document.getElementById('exp').value,
      strength: document.getElementById('strength').value,
      achievement: document.getElementById('achievement').value,
      appeal: document.getElementById('appeal').value,
      pattern: currentPattern
    }));
  }
  function load() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY));
      if (!d) return;
      if (d.job)         document.getElementById('job').value = d.job;
      if (d.exp)         document.getElementById('exp').value = d.exp;
      if (d.strength)    document.getElementById('strength').value = d.strength;
      if (d.achievement) document.getElementById('achievement').value = d.achievement;
      if (d.appeal)      document.getElementById('appeal').value = d.appeal;
      if (d.pattern != null) {
        currentPattern = d.pattern;
        var btns = document.querySelectorAll('.pattern-btn');
        btns.forEach(function(b){ b.classList.remove('active'); });
        if (btns[d.pattern]) btns[d.pattern].classList.add('active');
      }
    } catch(e) {}
  }
  load();

  // 入力変更時に自動保存
  ['job','exp','strength','achievement','appeal'].forEach(function(id){
    document.getElementById(id).addEventListener('input', save);
  });
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
