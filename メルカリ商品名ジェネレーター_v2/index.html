<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ商品名ジェネレーター｜特徴3行で売れるタイトル即生成</title>
  <meta name="description" content="カテゴリと特徴を3行入れるだけで、メルカリで売れやすい商品タイトルを5〜8パターン即生成。文字数カウント・ワンタップコピー対応の無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* 候補リスト */
    .candidate {
      padding: 0.85rem 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .candidate:last-child { border-bottom: none; }
    .candidate-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      line-height: 1.5; margin-bottom: 0.4rem; word-break: break-all;
    }
    .candidate-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem;
    }
    .char-count {
      font-size: 0.74rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 999px;
    }
    .char-count.ok   { background: var(--ok-bg);   color: var(--ok); }
    .char-count.warn { background: var(--warn-bg); color: var(--warn); }
    .char-count.ng   { background: var(--ng-bg);   color: var(--ng); }
    .btn-copy {
      font-size: 0.78rem; font-weight: 700;
      padding: 0.4rem 0.85rem;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer;
    }
    .btn-copy.copied { background: var(--accent); color: #fff; }

    .empty-msg {
      text-align: center; color: var(--text-sub);
      font-size: 0.88rem; padding: 1.5rem 0;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>メルカリ商品名ジェネレーター</h1>
    <p class="subtitle">特徴を3行入れるだけ。売れやすいタイトル候補を即生成します</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="fashion">ファッション</option>
        <option value="electronics">家電・スマホ</option>
        <option value="book">本・CD・DVD</option>
        <option value="hobby">おもちゃ・ホビー</option>
        <option value="cosme">コスメ・美容</option>
        <option value="interior">インテリア・雑貨</option>
        <option value="sports">スポーツ・アウトドア</option>
        <option value="baby">ベビー・キッズ</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="f1">特徴1（ブランド名・商品名など）</label>
      <input type="text" id="f1" placeholder="例: ユニクロ ヒートテック">
    </div>
    <div class="field">
      <label for="f2">特徴2（色・サイズ・型番など）</label>
      <input type="text" id="f2" placeholder="例: ブラック Mサイズ">
    </div>
    <div class="field">
      <label for="f3">特徴3（状態・付属品など）</label>
      <input type="text" id="f3" placeholder="例: 新品未使用">
      <p class="hint">3行すべて入れると精度が上がります（空欄でも生成可）</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">タイトル候補を生成する</button>

  <!-- 候補カード -->
  <div class="card" id="resultCard" style="display:none">
    <p class="card-title">生成された候補</p>
    <div id="candidates"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 メルカリのタイトルは40文字以内が推奨されています。検索でヒットしやすいキーワードを前半に入れるのがコツです。最新の出品ガイドは公式情報をご確認ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // カテゴリ別キーワード辞書
  var KEYWORDS = {
    fashion:    { pre: ['美品', '人気', '即購入OK', '希少'], post: ['送料無料', '匿名配送', 'おしゃれ', 'トレンド'] },
    electronics:{ pre: ['動作確認済', '美品', '人気', '完品'],   post: ['送料無料', '匿名配送', '即発送', '箱付き'] },
    book:       { pre: ['美品', '帯付き', '初版', '人気'],     post: ['送料無料', '匿名配送', '即発送', 'まとめ買い歓迎'] },
    hobby:      { pre: ['未開封', '美品', '希少', '人気'],     post: ['送料無料', '匿名配送', 'コレクション', '即発送'] },
    cosme:      { pre: ['新品', '未開封', '人気', '限定'],     post: ['送料無料', '匿名配送', '即発送', '正規品'] },
    interior:   { pre: ['美品', '人気', 'おしゃれ', '北欧風'],  post: ['送料無料', '匿名配送', 'インテリア', '即発送'] },
    sports:     { pre: ['美品', '人気', '即購入OK', '使用感少'], post: ['送料無料', '匿名配送', 'アウトドア', '即発送'] },
    baby:       { pre: ['新品', '美品', '使用感少', '人気'],   post: ['送料無料', '匿名配送', 'ベビー', '即発送'] },
    other:      { pre: ['美品', '人気', '即購入OK', '希少'],   post: ['送料無料', '匿名配送', '即発送', 'お買い得'] }
  };

  var STORAGE_KEY = 'mercariTitleGenV2';

  // 起動時に保存値復元
  window.addEventListener('DOMContentLoaded', function(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.cat) document.getElementById('cat').value = d.cat;
      if (d.f1) document.getElementById('f1').value = d.f1;
      if (d.f2) document.getElementById('f2').value = d.f2;
      if (d.f3) document.getElementById('f3').value = d.f3;
    } catch(e) {}
  });

  function saveInputs(cat, f1, f2, f3) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({cat:cat,f1:f1,f2:f2,f3:f3}));
    } catch(e) {}
  }

  function generate() {
    var cat = document.getElementById('cat').value;
    var f1 = document.getElementById('f1').value.trim();
    var f2 = document.getElementById('f2').value.trim();
    var f3 = document.getElementById('f3').value.trim();
    var feats = [f1, f2, f3].filter(function(x){ return x.length > 0; });

    if (feats.length === 0) {
      showEmpty('特徴を1行以上入力してください');
      return;
    }

    saveInputs(cat, f1, f2, f3);

    var kw = KEYWORDS[cat] || KEYWORDS.other;
    var candidates = buildCandidates(feats, kw);
    renderCandidates(candidates);
  }

  function buildCandidates(feats, kw) {
    var list = [];
    var p1 = kw.pre[0], p2 = kw.pre[1], p3 = kw.pre[2], p4 = kw.pre[3];
    var s1 = kw.post[0], s2 = kw.post[1], s3 = kw.post[2], s4 = kw.post[3];

    // パターン1: そのまま並べる
    list.push(feats.join(' '));
    // パターン2: 先頭にキーワード
    list.push(p1 + ' ' + feats.join(' '));
    // パターン3: 末尾にキーワード
    list.push(feats.join(' ') + ' ' + s1);
    // パターン4: 前後にキーワード
    list.push(p2 + ' ' + feats.join(' ') + ' ' + s2);
    // パターン5: 順序逆
    list.push(feats.slice().reverse().join(' '));
    // パターン6: 強調パターン
    list.push('【' + p3 + '】' + feats.join(' ') + ' ' + s3);
    // パターン7: コンパクト型（特徴のみ「・」区切り）
    list.push(feats.join('・'));
    // パターン8: 押し強め
    list.push(p4 + ' ' + feats.join(' ') + ' ' + s4);

    // 40字超は末尾キーワード削って調整
    list = list.map(function(t){ return adjustLength(t); });
    // 重複除去
    var seen = {}, out = [];
    list.forEach(function(t){
      if (!seen[t]) { seen[t] = 1; out.push(t); }
    });
    return out;
  }

  function adjustLength(t) {
    // 40字超なら末尾の付加要素を削っていく
    var max = 40;
    if (t.length <= max) return t;
    // 全角スペース・半角スペース基準で末尾から削る
    var parts = t.split(' ');
    while (parts.length > 1 && parts.join(' ').length > max) {
      parts.pop();
    }
    return parts.join(' ');
  }

  function renderCandidates(list) {
    var box = document.getElementById('candidates');
    box.innerHTML = '';
    list.forEach(function(title, i){
      var len = title.length;
      var lvl = len <= 40 ? 'ok' : (len <= 60 ? 'warn' : 'ng');
      var item = document.createElement('div');
      item.className = 'candidate';
      item.innerHTML =
        '<div class="candidate-title">' + escapeHtml(title) + '</div>' +
        '<div class="candidate-meta">' +
        '<span class="char-count ' + lvl + '">' + len + '文字</span>' +
        '<button class="btn-copy" data-text="' + escapeAttr(title) + '">コピー</button>' +
        '</div>';
      box.appendChild(item);
    });
    document.getElementById('resultCard').style.display = 'block';

    // コピーイベント
    box.querySelectorAll('.btn-copy').forEach(function(btn){
      btn.addEventListener('click', function(){
        var t = btn.getAttribute('data-text');
        copyText(t, btn);
      });
    });
  }

  function copyText(text, btn) {
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = 'コピー済';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = 'コピー';
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showEmpty(msg) {
    var box = document.getElementById('candidates');
    box.innerHTML = '<p class="empty-msg">' + escapeHtml(msg) + '</p>';
    document.getElementById('resultCard').style.display = 'block';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
