<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断れない度NOタイプ診断｜3問で分かるNOの言い方タイプ</title>
  <meta name="description" content="3問に答えるだけで、あなたの「断れない度」と上手なNOの言い方タイプを診断。断れずに疲れている人のセルフチェックと断り方コツを即提案します。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 設問 ── */
    .question-num {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 0.97rem; font-weight: 700; color: var(--text);
      line-height: 1.55; margin-bottom: 1rem;
    }
    .choices { display: flex; flex-direction: column; gap: 0.55rem; }
    .choice-label {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.8rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .choice-label:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-label input[type="radio"] { display: none; }
    .choice-label input[type="radio"]:checked ~ .choice-body { color: var(--accent); }
    .choice-label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .choice-letter {
      flex-shrink: 0;
      width: 1.6rem; height: 1.6rem;
      background: var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800; color: var(--text-sub);
      transition: background 0.15s, color 0.15s;
    }
    .choice-label:has(input:checked) .choice-letter {
      background: var(--accent); color: #fff;
    }
    .choice-body { font-size: 0.9rem; line-height: 1.5; padding-top: 0.15rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled {
      background: #ccc; box-shadow: 0 2px 0 #aaa;
      cursor: not-allowed;
    }
    .btn-retry {
      display: block; margin: 0 auto 1.2rem; padding: 0.65rem 2rem;
      font-size: 0.9rem; font-weight: 700; max-width: 600px; width: 100%;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.08em; padding: 0.2rem 0.7rem;
      border-radius: 20px; margin-bottom: 0.6rem;
    }
    .ok .result-badge   { background: var(--ok);   color: #fff; }
    .warn .result-badge { background: var(--warn);  color: #fff; }
    .ng .result-badge   { background: var(--ng);    color: #fff; }
    .result-emoji { font-size: 2.8rem; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-type  { font-size: 1.3rem; font-weight: 900; line-height: 1.3; margin-bottom: 0.6rem; }
    .ok .result-type   { color: var(--ok); }
    .warn .result-type { color: var(--warn); }
    .ng .result-type   { color: var(--ng); }
    .result-desc  { font-size: 0.88rem; color: var(--text-sub); line-height: 1.65; text-align: left; }

    /* ── アドバイスカード ── */
    .advice-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .advice-card .card-title { color: var(--accent); }
    .advice-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .advice-item:last-child { border-bottom: none; }
    .advice-scene {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; margin-bottom: 0.3rem;
    }
    .advice-phrase {
      font-size: 0.95rem; font-weight: 700; color: var(--text);
      line-height: 1.45; margin-bottom: 0.2rem;
    }
    .advice-note {
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.5;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🙅 断れない度＆NOの言い方タイプ診断</h1>
    <p class="subtitle">3問で判定！あなたの断れない度タイプとNOの言い方コツが分かります。</p>
  </header>

  <!-- 設問カード Q1 -->
  <div class="card" id="q1-card">
    <p class="card-title">QUESTION 1 / 3</p>
    <p class="question-text">友達から「今日急に飲みに行かない？」と誘われた。正直行きたくないけど…</p>
    <div class="choices">
      <label class="choice-label">
        <input type="radio" name="q1" value="1">
        <span class="choice-letter">A</span>
        <span class="choice-body">「今日はちょっと無理〜！またね」とサラッと断れる</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q1" value="2">
        <span class="choice-letter">B</span>
        <span class="choice-body">「う〜ん、ちょっとだけなら…」と結局引っ張られてしまう</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q1" value="3">
        <span class="choice-letter">C</span>
        <span class="choice-body">「いいよ」と言ってしまい、帰り道で後悔する</span>
      </label>
    </div>
  </div>

  <!-- 設問カード Q2 -->
  <div class="card" id="q2-card">
    <p class="card-title">QUESTION 2 / 3</p>
    <p class="question-text">職場で自分のキャパを超えた仕事を頼まれた。どう対応する？</p>
    <div class="choices">
      <label class="choice-label">
        <input type="radio" name="q2" value="1">
        <span class="choice-letter">A</span>
        <span class="choice-body">「今は手が回りません。〇〇さんに頼めますか？」と即答できる</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q2" value="2">
        <span class="choice-letter">B</span>
        <span class="choice-body">「えーと…できるかどうか…」と曖昧にしてその場をしのぐ</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q2" value="3">
        <span class="choice-letter">C</span>
        <span class="choice-body">「分かりました」と引き受けてしまい、深夜残業になる</span>
      </label>
    </div>
  </div>

  <!-- 設問カード Q3 -->
  <div class="card" id="q3-card">
    <p class="card-title">QUESTION 3 / 3</p>
    <p class="question-text">あまり気乗りしない長電話に付き合わされている。どうする？</p>
    <div class="choices">
      <label class="choice-label">
        <input type="radio" name="q3" value="1">
        <span class="choice-letter">A</span>
        <span class="choice-body">「そろそろ失礼します！」とキッパリ切り上げられる</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q3" value="2">
        <span class="choice-letter">B</span>
        <span class="choice-body">「え〜あと少しだけ…」と言いながら気づけば1時間超え</span>
      </label>
      <label class="choice-label">
        <input type="radio" name="q3" value="3">
        <span class="choice-letter">C</span>
        <span class="choice-body">疲れ果てても向こうが終わるまで電話を切れない</span>
      </label>
    </div>
  </div>

  <button class="btn-calc" id="btn-judge" onclick="judge()">診断する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-badge" id="rb"></p>
    <p class="result-emoji" id="re"></p>
    <p class="result-type"  id="rt"></p>
    <p class="result-desc"  id="rd"></p>
  </div>

  <!-- アドバイスカード -->
  <div class="advice-card" id="advice-card">
    <p class="card-title">上手なNOの言い方コツ</p>
    <div id="advice-list"></div>
  </div>

  <button class="btn-retry no-print" id="btn-retry" style="display:none" onclick="retry()">もう一度診断する</button>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var TYPES = [
    {
      min: 3, max: 4,
      level: 'ok',
      badge: '断り上手タイプ',
      emoji: '😎',
      type: '断り上手タイプ',
      desc: 'NOをサラッと言える人です。相手に必要以上に気を遣わず、自分の時間と気持ちをきちんと守れています。断ることへの罪悪感が少なく、関係性もフラットに保てる強みがあります。その調子で、大事なことに集中しましょう！'
    },
    {
      min: 5, max: 6,
      level: 'warn',
      badge: '空気読みすぎタイプ',
      emoji: '😅',
      type: '空気読みすぎタイプ',
      desc: '断れるときと断れないときの差が大きいタイプ。相手や状況を読むのが得意な半面、「嫌われたら…」という不安から曖昧な返事になりがちです。NOが言えないままが続くと、じわじわ疲れてきます。「NOを言っても関係は壊れない」と気づくのが第一歩です。'
    },
    {
      min: 7, max: 8,
      level: 'ng',
      badge: '断れない優しい人タイプ',
      emoji: '😢',
      type: '断れない優しい人タイプ',
      desc: '相手への気遣いが強く、ついつい引き受けてしまうタイプ。優しさゆえに限界まで頑張ってしまいます。「断ったら申し訳ない」「嫌われそう」という思いが先に立ちますが、断ることは自分を守るためのスキルです。まずは小さなNOから練習してみましょう。'
    },
    {
      min: 9, max: 9,
      level: 'ng',
      badge: '超・断れないタイプ',
      emoji: '😱',
      type: '超・断れないタイプ',
      desc: 'NOがまったく言えず、自分を消耗させてしまうタイプです。いつも引き受けてしまい、終わった後に後悔するループになっていませんか？断るのは「わがまま」ではなく「自分を大切にすること」です。下のコツから一つだけ試してみてください。'
    }
  ];

  var ADVICE = {
    ok: [
      { scene: '誘いを断るとき', phrase: '「今日はちょっと無理！またね〜」', note: 'テンション変えずにサラッと。「またね」で関係をつなぐのがポイントです。' },
      { scene: '仕事を断るとき', phrase: '「今は手が回りません。〇〇さんに聞いてもらえますか？」', note: '代替案を添えると相手も受け入れやすくなります。' },
      { scene: '電話を切り上げるとき', phrase: '「そろそろ失礼しますね！また話しましょう」', note: 'ポジティブな締めくくりで気持ちよく終わらせましょう。' }
    ],
    warn: [
      { scene: '誘いを断るとき', phrase: '「ちょっと今日は体調が…またの機会に！」', note: '理由はざっくりでOK。細かく説明するほど言い訳っぽくなります。' },
      { scene: '仕事を断るとき', phrase: '「〇〇の件が終わるまでは難しいです」', note: '今の状況を伝えるだけで十分。謝りすぎると押し切られやすくなります。' },
      { scene: '断った後の不安を消すコツ', phrase: '「断っても関係は壊れない」を3回心の中で唱える', note: '断られた側は意外とすぐ忘れています。気にしすぎないのが大事です。' }
    ],
    ng: [
      { scene: '断り方の基本形', phrase: '「今回はちょっと難しいです」', note: '理由は言わなくてOK。シンプルに「難しい」と言うだけで十分です。' },
      { scene: '練習から始めるなら', phrase: 'コンビニで「袋はいりません」と言う練習', note: '小さなNOから慣らしていくと、大事な場面でも使えるようになります。' },
      { scene: '心のブレーキを外すヒント', phrase: '「断ることは自分を守るためのスキル」', note: '断ることは冷たい行為ではなく、自分と相手の関係を長続きさせる知恵です。' }
    ]
  };

  function judge() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');
    if (!q1 || !q2 || !q3) {
      alert('3問すべて選んでください');
      return;
    }
    var total = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value);

    var t = null;
    for (var i = 0; i < TYPES.length; i++) {
      if (total >= TYPES[i].min && total <= TYPES[i].max) { t = TYPES[i]; break; }
    }
    if (!t) t = TYPES[TYPES.length - 1];

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + t.level;
    rc.style.display = 'block';
    document.getElementById('rb').textContent = t.badge;
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rt').textContent = t.type;
    document.getElementById('rd').textContent = t.desc;

    var advices = ADVICE[t.level];
    document.getElementById('advice-list').innerHTML = advices.map(function(a) {
      return '<div class="advice-item">'
        + '<p class="advice-scene">' + a.scene + '</p>'
        + '<p class="advice-phrase">' + a.phrase + '</p>'
        + '<p class="advice-note">' + a.note + '</p>'
        + '</div>';
    }).join('');
    document.getElementById('advice-card').style.display = 'block';
    document.getElementById('btn-retry').style.display = 'block';

    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

    try { localStorage.setItem('noTypeResult', JSON.stringify({ total: total, type: t.badge, date: new Date().toLocaleDateString('ja-JP') })); } catch(e) {}
  }

  function retry() {
    document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
    document.getElementById('result').style.display = 'none';
    document.getElementById('advice-card').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
