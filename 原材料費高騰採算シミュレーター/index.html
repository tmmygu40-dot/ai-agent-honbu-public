<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="原材料費の高騰率を入力すると、製品ごとの採算悪化額・利益率変化を即試算し、コスト削減に役立つ代替素材候補も提示する採算シミュレーターです。">
  <title>原材料費高騰採算シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 製品リスト ── */
    .product-item {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.8rem; margin-bottom: 0.8rem;
    }
    .product-item:last-child { margin-bottom: 0; }
    .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .product-name { font-weight: 700; font-size: 0.95rem; }
    .btn-remove {
      background: none; border: none; color: var(--ng); font-size: 1.1rem; cursor: pointer; padding: 0.2rem 0.4rem;
    }
    .product-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .product-fields .field { margin-bottom: 0; }
    .product-fields .field label { font-size: 0.75rem; }
    .product-fields .field input { padding: 0.5rem 0.6rem; font-size: 0.9rem; }

    .btn-add {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px dashed var(--accent); border-radius: 10px;
      cursor: pointer; margin-top: 0.8rem;
    }
    .btn-add:hover { background: #fff3e0; }

    /* ── 代替素材カード ── */
    .alt-card {
      background: var(--accent-light); border: 1px solid var(--accent);
      border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.6rem;
    }
    .alt-card:last-child { margin-bottom: 0; }
    .alt-title { font-weight: 700; font-size: 0.9rem; color: var(--accent); margin-bottom: 0.3rem; }
    .alt-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .alt-saving { font-size: 0.88rem; font-weight: 700; color: var(--ok); margin-top: 0.3rem; }

    /* ── 絵文字ひとこと＆結果別Q&A ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>原材料費高騰採算シミュレーター</h1>
    <p class="subtitle">原材料の高騰率を入力して、製品ごとの採算悪化と代替素材を即チェック</p>
  </header>

  <!-- 製品・原材料 入力カード -->
  <div class="card">
    <p class="card-title">製品・原材料の登録</p>
    <div id="product-list"></div>
    <button class="btn-add" onclick="addProduct()">＋ 製品を追加</button>
  </div>

  <!-- 高騰率 入力カード -->
  <div class="card">
    <p class="card-title">高騰シナリオ</p>
    <div class="field">
      <label for="rate">原材料の高騰率（%）</label>
      <input type="number" id="rate" placeholder="例: 20" value="20">
      <p class="hint">全原材料に一律適用します</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">採算を試算する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">採算影響</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">製品別 採算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 代替素材カード -->
  <div class="card" id="alt-section" style="display:none">
    <p class="card-title">代替素材の提案</p>
    <div id="alt-list"></div>
  </div>

  <!-- Q&A -->
  <div class="card" id="qa-card" style="display:none">
    <p class="result-emoji" id="qe"></p>
    <p class="result-emoji-text" id="qt"></p>
    <div id="qa-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、経産省・中小企業庁・公正取引委員会などの価格転嫁支援資料を参考に、目安として使いやすく整理しています。最新情報は各機関の公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 代替素材データベース ──
  var ALT_DB = {
    '鉄鋼':   [{ name: 'アルミニウム', ratio: 0.85, note: '軽量で加工しやすい。強度が必要な場合はアルミ合金を検討' },
               { name: 'ステンレス（SUS430）', ratio: 0.90, note: '耐食性が高く長寿命。初期コストは高いが交換頻度が下がる' }],
    '銅':     [{ name: 'アルミ導体', ratio: 0.60, note: '電気伝導率は銅の60%だが、重量あたりコストが大幅に安い' },
               { name: 'クラッド材（銅+鉄）', ratio: 0.75, note: '表面のみ銅で内部は鉄。接点用途に有効' }],
    '木材':   [{ name: '合板・集成材', ratio: 0.70, note: '無垢材より安定供給。強度も均一でコスト安' },
               { name: '再生木材（WPC）', ratio: 0.65, note: '木粉+樹脂の複合材。屋外用途に強い' }],
    '樹脂':   [{ name: '再生プラスチック', ratio: 0.70, note: 'バージン材より2〜3割安。品質は用途により要確認' },
               { name: 'バイオプラスチック', ratio: 0.90, note: '環境対応アピール可能。コストはやや高め' }],
    'ゴム':   [{ name: '合成ゴム（SBR）', ratio: 0.75, note: '天然ゴムの代替。耐摩耗性に優れる' },
               { name: 'シリコーンゴム', ratio: 1.10, note: '耐熱性が必要な場合の選択肢。コストはやや高い' }],
    '紙・パルプ': [{ name: '再生紙', ratio: 0.75, note: 'バージンパルプより安価。梱包材に最適' },
                  { name: '不織布', ratio: 0.80, note: '包装・フィルター用途で紙の代替に' }],
    'ガラス': [{ name: '強化プラスチック', ratio: 0.65, note: '軽量で割れにくい。透明度はやや劣る' },
               { name: 'ポリカーボネート', ratio: 0.80, note: '高透明・高強度。屋外用途に適する' }],
    '綿・繊維': [{ name: 'ポリエステル', ratio: 0.55, note: '安価で耐久性が高い。速乾性にも優れる' },
                 { name: 'レーヨン', ratio: 0.70, note: '肌触りが良く、天然繊維に近い風合い' }],
    'セメント': [{ name: 'フライアッシュセメント', ratio: 0.85, note: '石炭灰を混合。CO2削減効果もある' },
                 { name: '高炉セメント', ratio: 0.80, note: '鉄鋼スラグを利用。耐海水性に優れる' }],
    '小麦粉': [{ name: '米粉', ratio: 0.90, note: '国産米粉は供給安定。グルテンフリー対応も可能' },
               { name: 'タピオカ粉', ratio: 0.80, note: 'もちもち食感。一部用途で小麦粉の代替に' }],
    '大豆油': [{ name: 'パーム油', ratio: 0.65, note: '世界最安の植物油。加工食品向け' },
               { name: '菜種油', ratio: 0.85, note: '国産品もあり安定供給。風味が良い' }],
    '砂糖':   [{ name: '異性化糖（果糖ブドウ糖液糖）', ratio: 0.60, note: '飲料・加工食品向け。液体で使いやすい' },
               { name: 'ステビア甘味料', ratio: 0.40, note: '少量で高甘味度。カロリーオフ訴求可能' }],
    'その他': [{ name: '汎用代替品A', ratio: 0.80, note: '一般的な代替素材。具体的な素材名は原材料に応じて検討してください' },
               { name: '汎用代替品B', ratio: 0.70, note: 'コスト重視の代替選択肢。品質確認をおすすめします' }]
  };

  // ── Q&A ──
  var ENABLE_RESULT_QA = true;
  var EMOJI_MSG = {
    ok:   { e: '😌', t: '影響は軽微。今の仕入れで大丈夫そう' },
    warn: { e: '🤔', t: '利益が圧迫されています。対策を検討しましょう' },
    ng:   { e: '😱', t: '採算割れの危険。至急見直しが必要です' }
  };
  var QA = {
    ok: [
      { q: 'このまま様子見で大丈夫？', a: '利益率に余裕があるので、すぐの対応は不要です。ただし高騰が長期化する場合に備え、代替素材の情報は押さえておきましょう。' },
      { q: '値上げ交渉は必要？', a: '現時点では不要ですが、高騰率が30%を超える場合は早めの価格転嫁を検討するのが安全です。' }
    ],
    warn: [
      { q: '何から手を付ける？', a: '利益減少額が最も大きい製品から、代替素材の切り替えまたは価格転嫁を検討しましょう。' },
      { q: '値上げ幅の目安は？', a: '原材料費の上昇分をそのまま転嫁するのが基本です。中小企業庁の「価格交渉促進月間」の資料も参考になります。' }
    ],
    ng: [
      { q: '赤字を止めるには？', a: '①代替素材への切替 ②販売価格の値上げ ③高コスト製品の一時停止、の3つが主な選択肢です。' },
      { q: '取引先に値上げ交渉するコツは？', a: '原材料の高騰データを具体的に示し、根拠ある値上げ幅を提示しましょう。公正取引委員会の「買いたたき」ガイドラインも交渉材料になります。' }
    ]
  };

  // ── 製品管理 ──
  var products = [];
  var nextId = 1;

  function addProduct(name, material, unitCost, quantity, price) {
    var id = nextId++;
    products.push({ id: id });
    var div = document.createElement('div');
    div.className = 'product-item';
    div.id = 'p-' + id;
    div.innerHTML =
      '<div class="product-header">' +
        '<span class="product-name">製品 ' + id + '</span>' +
        '<button class="btn-remove" onclick="removeProduct(' + id + ')">✕</button>' +
      '</div>' +
      '<div class="product-fields">' +
        '<div class="field"><label>製品名</label><input type="text" id="pn-' + id + '" placeholder="例: 部品A" value="' + (name || '') + '"></div>' +
        '<div class="field"><label>主な原材料</label>' +
          '<select id="pm-' + id + '">' +
            Object.keys(ALT_DB).map(function(k){ return '<option value="' + k + '"' + (k === material ? ' selected' : '') + '>' + k + '</option>'; }).join('') +
          '</select></div>' +
        '<div class="field"><label>原材料 仕入れ単価（円）</label><input type="number" id="pc-' + id + '" placeholder="例: 500" value="' + (unitCost || '') + '"></div>' +
        '<div class="field"><label>1製品あたり使用量</label><input type="number" id="pq-' + id + '" placeholder="例: 3" value="' + (quantity || '') + '"></div>' +
        '<div class="field"><label>製品の売価（円）</label><input type="number" id="pp-' + id + '" placeholder="例: 5000" value="' + (price || '') + '"></div>' +
        '<div class="field"><label>月間生産数</label><input type="number" id="pv-' + id + '" placeholder="例: 100" value=""></div>' +
      '</div>';
    document.getElementById('product-list').appendChild(div);
    saveData();
  }

  function removeProduct(id) {
    products = products.filter(function(p){ return p.id !== id; });
    var el = document.getElementById('p-' + id);
    if (el) el.remove();
    saveData();
  }

  // ── 計算 ──
  function calc() {
    var rate = parseFloat(document.getElementById('rate').value);
    if (isNaN(rate) || rate <= 0) { showErr('高騰率を正の数値で入力してください'); return; }
    if (products.length === 0) { showErr('製品を1つ以上追加してください'); return; }

    var totalLossBefore = 0;
    var totalLossAfter = 0;
    var totalProfit = 0;
    var totalProfitAfter = 0;
    var rows = [];
    var altResults = [];
    var hasError = false;

    products.forEach(function(p) {
      var name = document.getElementById('pn-' + p.id).value || '製品' + p.id;
      var material = document.getElementById('pm-' + p.id).value;
      var unitCost = parseFloat(document.getElementById('pc-' + p.id).value);
      var qty = parseFloat(document.getElementById('pq-' + p.id).value);
      var price = parseFloat(document.getElementById('pp-' + p.id).value);
      var volume = parseFloat(document.getElementById('pv-' + p.id).value) || 1;

      if (isNaN(unitCost) || isNaN(qty) || isNaN(price)) { hasError = true; return; }

      var matCostBefore = unitCost * qty;
      var matCostAfter = matCostBefore * (1 + rate / 100);
      var profitBefore = price - matCostBefore;
      var profitAfter = price - matCostAfter;
      var lossPerUnit = matCostAfter - matCostBefore;
      var lossTotal = lossPerUnit * volume;
      var marginBefore = price > 0 ? (profitBefore / price * 100) : 0;
      var marginAfter = price > 0 ? (profitAfter / price * 100) : 0;

      totalProfit += profitBefore * volume;
      totalProfitAfter += profitAfter * volume;

      rows.push([name, fmt(Math.round(matCostBefore)) + ' → ' + fmt(Math.round(matCostAfter)) + ' 円']);
      rows.push(['  利益率', marginBefore.toFixed(1) + '% → ' + marginAfter.toFixed(1) + '%']);
      rows.push(['  月間影響額', '▲ ' + fmt(Math.round(lossTotal)) + ' 円', true]);

      // 代替素材
      var alts = ALT_DB[material] || ALT_DB['その他'];
      alts.forEach(function(alt) {
        var altCost = matCostAfter * alt.ratio;
        var saving = matCostAfter - altCost;
        altResults.push({
          product: name,
          name: alt.name,
          note: alt.note,
          saving: Math.round(saving * volume),
          ratio: alt.ratio
        });
      });
    });

    if (hasError) { showErr('すべての数値を入力してください'); return; }

    var totalLoss = totalProfit - totalProfitAfter;
    var overallMarginBefore = totalProfit > 0 ? (totalProfit / (totalProfit + totalLoss + totalProfitAfter) * 100) : 0;
    var level = totalProfitAfter < 0 ? 'ng' : totalLoss > totalProfit * 0.3 ? 'warn' : 'ok';
    var msg = level === 'ok' ? '影響は軽微です。現行の採算を維持できます'
            : level === 'warn' ? '利益が大きく圧迫されます。価格転嫁または代替素材を検討してください'
            : '採算割れの恐れがあります。至急対策が必要です';

    showResult(level, '▲ ' + fmt(Math.round(totalLoss)) + ' 円/月', msg);
    document.getElementById('re').textContent =
      '高騰前利益: ' + fmt(Math.round(totalProfit)) + '円 → 高騰後: ' + fmt(Math.round(totalProfitAfter)) + '円';

    showDetail(rows);

    // 代替素材表示
    var altHtml = '';
    altResults.sort(function(a, b){ return b.saving - a.saving; });
    altResults.forEach(function(a) {
      altHtml += '<div class="alt-card">' +
        '<div class="alt-title">' + a.product + ' → ' + a.name + '</div>' +
        '<div class="alt-desc">' + a.note + '</div>' +
        '<div class="alt-saving">月間削減見込: ' + fmt(a.saving) + ' 円（コスト比 ' + Math.round(a.ratio * 100) + '%）</div>' +
      '</div>';
    });
    document.getElementById('alt-list').innerHTML = altHtml;
    document.getElementById('alt-section').style.display = 'block';

    showQA(level);
    saveData();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showQA(level) {
    if (!ENABLE_RESULT_QA) return;
    var em = EMOJI_MSG[level], list = QA[level];
    var card = document.getElementById('qa-card');
    card.className = 'card ' + level;
    document.getElementById('qe').textContent = em.e;
    document.getElementById('qt').textContent = em.t;
    document.getElementById('qa-list').innerHTML = list.map(function(x){
      return '<div class="qa-item"><p class="qa-q">Q. ' + x.q + '</p><p class="qa-a">' + x.a + '</p></div>';
    }).join('');
    card.style.display = 'block';
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('alt-section').style.display = 'none';
    document.getElementById('qa-card').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // ── localStorage ──
  var LS_KEY = 'material_cost_sim_data';
  function saveData() {
    var data = { rate: document.getElementById('rate').value, products: [] };
    products.forEach(function(p) {
      data.products.push({
        name: document.getElementById('pn-' + p.id).value,
        material: document.getElementById('pm-' + p.id).value,
        unitCost: document.getElementById('pc-' + p.id).value,
        quantity: document.getElementById('pq-' + p.id).value,
        price: document.getElementById('pp-' + p.id).value,
        volume: document.getElementById('pv-' + p.id).value
      });
    });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadData() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return false;
      var data = JSON.parse(raw);
      if (data.rate) document.getElementById('rate').value = data.rate;
      if (data.products && data.products.length > 0) {
        data.products.forEach(function(p) {
          addProduct(p.name, p.material, p.unitCost, p.quantity, p.price);
          var id = nextId - 1;
          if (p.volume) document.getElementById('pv-' + id).value = p.volume;
        });
        return true;
      }
    } catch(e) {}
    return false;
  }

  // ── 初期化 ──
  if (!loadData()) {
    addProduct('サンプル製品', '鉄鋼', 500, 3, 5000);
  }
  </script>
