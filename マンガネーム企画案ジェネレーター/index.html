<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 マンガネーム企画案ジェネレーター</title>
  <meta name="description" content="キャラクターとテーマを選ぶだけで、マンガのストーリー展開案をサクッと自動生成。創作のネタ帳に活躍。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: left;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 1rem; }
    .story-step { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
    .story-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .step-title { font-size: 0.88rem; font-weight: 700; color: var(--accent); margin-bottom: 0.35rem; }
    .step-content { font-size: 0.92rem; color: var(--text); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>📖 マンガネーム企画案ジェネレーター</h1>
    <p class="subtitle">キャラクターとテーマを選ぶだけで、マンガのストーリー展開案をサクッと自動生成。創作のネタ帳に。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="character">主人公のキャラクター</label>
      <select id="character">
        <option value="">選択してください</option>
        <option value="少年">少年（元気・前向き）</option>
        <option value="少女">少女（優しい・感性的）</option>
        <option value="大人">大人（落ち着き・経験豊か）</option>
        <option value="変わり者">変わり者（ユニーク・型破り）</option>
      </select>
    </div>
    <div class="field">
      <label for="theme">ストーリーのテーマ</label>
      <select id="theme">
        <option value="">選択してください</option>
        <option value="恋愛">恋愛（片思い・ラブコメ・三角関係）</option>
        <option value="冒険">冒険（謎解き・未知への旅）</option>
        <option value="日常">日常（学園生活・家族・友情）</option>
        <option value="ファンタジー">ファンタジー（異世界・魔法）</option>
        <option value="サスペンス">サスペンス（謎・隠された秘密）</option>
        <option value="成長">成長（試練・自分探し）</option>
      </select>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="generateStory()">企画案を生成</button>

  <!-- 結論カード（JS で display:block を切替） -->
  <div class="result-card ok" id="result" style="display:none">
    <p class="result-label">生成されたストーリー企画案</p>
    <div id="storyContent"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは創作のネタ帳として、企画立案の手助けを目的としています。生成された案を基に、あなただけのオリジナルストーリーを作成してください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <script src="../related-widget.js"></script>
  <script src="../fav-widget.js"></script>
  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ストーリーテンプレートデータ
  var STORY_TEMPLATES = {
    '少年-恋愛': {
      出会い: ['初めて話しかけた相手が、実は同じクラスの目立たない子だった', '街でぶつかった瞬間、ときめきが止まらなくなった', 'オンラインゲームで出会った相手が、実は同じ学校の子だった'],
      展開: ['相手は自分のことをどう思っているのか不安になる', '親友に恋愛相談をして背中を押される', 'ライバルが現れて三角関係に'],
      転機: ['勇気を出して気持ちを伝える', 'ケンカをして一度は別れかけるが…', 'お互いの秘密が判明して関係が変わる'],
      クライマックス: ['告白シーンで全てが一変', '文化祭のステージで想いを伝える', '最後の試合で応援してくれる姿を見て全てが繋がる'],
      結末: ['二人で歩き始めることになった', '付き合うことになったが、これからが本当の課題だと気付く', '想い人は別の人を好きだったけど、新しい出会いが待っていた']
    },
    '少年-冒険': {
      出会い: ['古い地図を見つけて冒険に出かけることにした', '不思議な石像に導かれて秘密の場所を発見', '謎の手紙で招かれた先で仲間と出会う'],
      展開: ['予想外の敵に立ち向かう', '味方だと思った者が敵だったことが判明', '失われた遺跡への手がかりを得る'],
      転機: ['一度は諦めかけるが、新しい力に目覚める', '犠牲を払って大事な者を守ることを決意', 'ラスボスの正体が予想外だった'],
      クライマックス: ['最後の決戦で全力を尽くす', '仲間と力を合わせて奇跡を起こす', '世界を救うための最後の選択'],
      結末: ['新しい世界が広がっていた', '旅は終わったが、本当の冒険はこれからだと気付く', 'その後も冒険は続く…']
    },
    '少年-日常': {
      出会い: ['新学期で新しいクラスになった', '部活で同じチームになった子がいる', 'アルバイト先で変わった先輩に出会う'],
      展開: ['学園祭に向けて準備が進む', 'ライバルとの対抗心が芽生える', '思わぬアクシデントで困ったことに'],
      転機: ['友達との関係に亀裂が入る', '自分の夢について真剣に考えさせられる', '相手の本当の気持ちを知る'],
      クライマックス: ['文化祭本番で最高のパフォーマンス', '卒業を控えて思いを伝える', '皆で力を合わせて目標を達成'],
      結末: ['また一歩成長できた', '新しい友情が生まれた', 'その時間は二度と戻らない大事な思い出になった']
    },
    '少女-恋愛': {
      出会い: ['図書館で目が合ったけど話しかけられない', 'SNSで仲良くなった相手と現実で会う', '姉の友人の紹介で出会った'],
      展開: ['相手はどう思っているのか不安', '友達が同じ人を好きだったことが判明', '過去の恋愛トラウマと向き合う'],
      転機: ['もう一度勇気を出す決意をする', '相手の秘密を知る', '想い人が違う人に好意を持っていることに気付く'],
      クライマックス: ['素直な気持ちを手紙に書く', 'お揃いのアクセサリーをもらう', 'キスシーン'],
      結末: ['一緒にいることが当たり前になった', '付き合い始めたけど関係が変わった', 'この恋は思い出になった']
    },
    '少女-日常': {
      出会い: ['新しいカフェでバイトを始めた', '高校の文化部に入部した', '双子の妹が転入してくる'],
      展開: ['日常の中での小さなケンカ', 'イベントに向けて一緒に準備', '相手の別の一面を知る'],
      転機: ['親友だと思ってた子に裏切られる', 'SNS上での言葉が原因で大モメ', '家族の事情で学校を辞めることになるかも'],
      クライマックス: ['話し合って真実が明かされる', 'みんなで力を合わせて成功させる', '本当に大事な人が誰かわかる'],
      結末: ['友情は変わらずに続く', 'もっと深い関係になった', 'その時間は一生の宝物']
    },
    '大人-サスペンス': {
      出会い: ['事件の目撃者になってしまう', 'クローゼットから謎の書類を発見', '依頼人から謎の仕事を受ける'],
      展開: ['事件は想像以上に複雑だった', '意外な人物が関係していた', '時間制限がある中での推理'],
      転機: ['犯人の正体は予想外の人だった', '真実は隠された秘密だった', '自分も犯人に狙われ始める'],
      クライマックス: ['全ての真実が明かされる', '最後の対決で決着がつく', '謎を解くためにあるものを犠牲にする'],
      結末: ['すべてが解決した', 'しかし新たな謎が…', 'もう二度と同じ人生には戻れない']
    },
    '変わり者-ファンタジー': {
      出会い: ['普通じゃない能力に目覚めた', '不思議な生き物に助けられる', '異世界への入口を見つけた'],
      展開: ['その力の使い方を学ぶ', 'メンターとなる人物に出会う', '敵対する勢力が現れる'],
      転機: ['力が暴走して大事な者を傷つける', '能力の正体が明かされる', 'もう戻れない選択をする'],
      クライマックス: ['全ての力を使い果たす最後の戦い', '犠牲の上での勝利', '異世界と現世の運命の選択'],
      結末: ['新しい自分として生きていく', '二つの世界の架け橋になった', '全てを失ったが全てを得た']
    }
  };

  // デフォルト企画案（テーマ別）
  var DEFAULT_STORIES = {
    '恋愛': {
      出会い: '思わぬタイミングで特別な人に出会う',
      展開: '相手の気持ちを確かめたくて一喜一憂する日々',
      転機: '勇気を出して気持ちを伝える瞬間',
      クライマックス: 'ふたりの想いが通じ合う',
      結末: '新しい物語が始まった'
    },
    '冒険': {
      出会い: '冒険へ踏み出すきっかけになる出来事',
      展開: '予想外の敵や障害に立ち向かう',
      転機: '新しい力を得るか、大きな代償を払う',
      クライマックス: '全力を尽くした最後の決戦',
      結末: '世界が変わった、もしくは自分が変わった'
    },
    '日常': {
      出会い: '何気ない学園生活の中での出会い',
      展開: 'イベントに向けて一緒に準備・成長',
      転機: '思わぬトラブルや秘密が発覚',
      クライマックス: '皆で力を合わせて乗り越える',
      結末: 'より深い友情や絆が生まれた'
    },
    'ファンタジー': {
      出会い: '異世界への扉が開く瞬間',
      展開: 'その世界のルールや魔法を学ぶ',
      転機: 'メンターの死、力の暴走、選択の迫り',
      クライマックス: '不可能と思われた最後の戦い',
      結末: 'ふたつの世界の選択をする'
    },
    'サスペンス': {
      出会い: '謎・事件・秘密が浮上する',
      展開: 'ここまで信じていた人物が怪しくなる',
      転機: '真実の一部が明かされて推理が変わる',
      クライマックス: '全ての謎が解き明かされる瞬間',
      結末: '新しい真実がまた隠されている'
    },
    '成長': {
      出会い: 'やりたいことや目標が見つかる',
      展開: '試練と失敗を繰り返しながら進む',
      転機: '心が折れそうになる瞬間か、新しい発見',
      クライマックス: 'その時の全力を尽くす',
      結末: '新しい自分になった'
    }
  };

  function generateStory() {
    var character = document.getElementById('character').value;
    var theme = document.getElementById('theme').value;

    if (!character || !theme) {
      showErr('キャラクターとテーマを両方選んでください');
      return;
    }

    // テンプレートキーを作成
    var templateKey = character + '-' + theme.split('（')[0];
    var story = STORY_TEMPLATES[templateKey];

    if (!story) {
      // テンプレートがない場合はデフォルトで対応
      var themeKey = theme.split('（')[0];
      story = DEFAULT_STORIES[themeKey];
    }

    // 各ステップからランダムに選択
    var steps = {
      '出会い': story.出会い[Math.floor(Math.random() * story.出会い.length)],
      '展開': story.展開[Math.floor(Math.random() * story.展開.length)],
      '転機': story.転機[Math.floor(Math.random() * story.転機.length)],
      'クライマックス': story.クライマックス[Math.floor(Math.random() * story.クライマックス.length)],
      '結末': story.結末[Math.floor(Math.random() * story.結末.length)]
    };

    showResult(steps);
    saveHistory(character, theme, steps);
  }

  function showResult(steps) {
    var html = '';
    Object.keys(steps).forEach(function(stepName) {
      html += '<div class="story-step">';
      html += '<div class="step-title">■ ' + stepName + '</div>';
      html += '<div class="step-content">' + steps[stepName] + '</div>';
      html += '</div>';
    });

    document.getElementById('storyContent').innerHTML = html;
    document.getElementById('result').style.display = 'block';
  }

  function showErr(msg) {
    alert(msg);
  }

  function saveHistory(character, theme, steps) {
    var history = JSON.parse(localStorage.getItem('mangaHistory') || '[]');
    var entry = {
      date: new Date().toISOString(),
      character: character,
      theme: theme,
      steps: steps
    };
    history.unshift(entry);
    if (history.length > 20) history.pop();
    localStorage.setItem('mangaHistory', JSON.stringify(history));
  }

  // ページロード時に直前の結果を復元
  window.addEventListener('load', function() {
    // localStorage から前回のデータを復元（必要に応じて）
  });
  </script>
</body>
</html>
