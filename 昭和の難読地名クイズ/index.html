<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>昭和の難読地名クイズ｜10問ランダム出題</title>
  <meta name="description" content="昭和の頃から旅好き・鉄道好きを悩ませてきた難読地名を10問ランダム出題。4択でサクッと挑戦できる無料クイズアプリ。最高スコアは自動保存。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.6; }

    /* ── クイズUI ── */
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub);
      text-align: center; margin-bottom: 0.6rem;
      letter-spacing: 0.04em;
    }
    .quiz-question {
      font-size: 2.2rem; font-weight: 900;
      text-align: center; padding: 1.2rem 0.5rem;
      letter-spacing: 0.05em; color: var(--text);
      background: var(--accent-light);
      border-radius: 10px; margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    .quiz-question-sub {
      font-size: 0.78rem; color: var(--text-sub);
      text-align: center; margin-bottom: 1rem;
    }
    .quiz-choices { display: flex; flex-direction: column; gap: 0.55rem; }
    .quiz-choice {
      display: block; width: 100%; padding: 0.85rem 1rem;
      font-size: 1rem; font-weight: 600;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      text-align: left; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quiz-choice:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .quiz-choice:disabled { cursor: not-allowed; opacity: 0.85; }
    .quiz-choice.correct { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); font-weight: 800; }
    .quiz-choice.wrong { background: var(--ng-bg); border-color: var(--ng); color: var(--ng); }

    .quiz-feedback {
      margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.92rem; line-height: 1.55;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok { background: var(--ok-bg); border: 1px solid var(--ok); color: var(--ok); }
    .quiz-feedback.ng { background: var(--ng-bg); border: 1px solid var(--ng); color: var(--ng); }
    .quiz-feedback strong { font-weight: 800; }
    .quiz-feedback .note { display: block; margin-top: 0.4rem; color: var(--text-sub); font-size: 0.85rem; font-weight: normal; }

    .next-btn {
      display: none; width: 100%; max-width: 600px;
      margin: 1rem auto 0; padding: 0.9rem;
      font-size: 1rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .next-btn.show { display: block; }

    .best-score {
      text-align: center; font-size: 0.85rem;
      color: var(--text-sub); margin-bottom: 0.8rem;
    }
    .best-score b { color: var(--accent); font-weight: 800; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .next-btn, .quiz-choice { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>昭和の難読地名クイズ</h1>
    <p class="subtitle">読めそうで読めない、昭和を生き抜いた地名10問。4択でサクッと挑戦。</p>
  </header>

  <!-- イントロ -->
  <div class="card" id="intro-card">
    <p class="card-title">スタート</p>
    <p style="font-size:0.92rem;color:var(--text-sub);line-height:1.7;margin-bottom:1rem;">
      日本各地の難読地名から10問をランダム出題します。鉄道アナウンスや地図で「えっ、これ何て読むの？」と思った経験、ありませんか？
    </p>
    <p class="best-score" id="best-score-intro" style="display:none">最高スコア：<b><span id="best-num">0</span> / 10</b></p>
    <button class="btn-calc" onclick="startQuiz()">クイズを始める</button>
  </div>

  <!-- クイズ進行 -->
  <div class="card" id="quiz-card" style="display:none">
    <p class="quiz-progress" id="progress">第 1 問 / 10</p>
    <p class="quiz-question" id="q-text">—</p>
    <p class="quiz-question-sub">読み方は？</p>
    <div class="quiz-choices" id="choices"></div>
    <div class="quiz-feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">クイズ終了</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <p class="best-score" id="best-score-result" style="margin-top:1rem">最高スコア：<b><span id="best-num-result">0</span> / 10</b></p>
    <button class="btn-calc" style="margin-top:1rem" onclick="startQuiz()">もう一度挑戦する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国土地理院・各自治体の公開資料および一般的な地名辞典を参考に、楽しく学べる形に整理しています。地名の読みは行政上の正式読み（駅名・地区名）を採用しています。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 地名データ（漢字・正解読み・誤答3件・解説） ──
  var PLACES = [
    { kanji: '我孫子', ans: 'あびこ', wrong: ['われひこ', 'がそんし', 'あそんこ'], note: '千葉県我孫子市。江戸時代から水戸街道の宿場として栄え、昭和は文化人の別荘地としても知られました。' },
    { kanji: '放出', ans: 'はなてん', wrong: ['ほうしゅつ', 'なげで', 'はなで'], note: '大阪府大阪市鶴見区。中古車CMで全国的に名前が広まった、関西を代表する難読地名のひとつ。' },
    { kanji: '喜連瓜破', ans: 'きれうりわり', wrong: ['きれんかは', 'よろこびうりやぶ', 'きれんうりはぎ'], note: '大阪市平野区の地下鉄駅。「喜連」と「瓜破」二つの地名をくっつけた、駅名としても屈指の難読です。' },
    { kanji: '御器所', ans: 'ごきそ', wrong: ['おきしょ', 'みうつわじょ', 'ぎょきしょ'], note: '愛知県名古屋市昭和区。神宮の御器（食器）を作った地に由来する、昭和区を代表する地名。' },
    { kanji: '私市', ans: 'きさいち', wrong: ['わたしいち', 'しいち', 'しがいち'], note: '大阪府交野市。京阪交野線の終着駅。「私（きさき＝皇后）の領地」が転じた古い由来を持ちます。' },
    { kanji: '増毛', ans: 'ましけ', wrong: ['ぞうもう', 'ますも', 'ふえげ'], note: '北海道増毛郡増毛町。アイヌ語「マシュキニ（カモメの多い場所）」が当て字になった、日本海側の港町。' },
    { kanji: '倶知安', ans: 'くっちゃん', wrong: ['ぐちあん', 'くもしりやす', 'ともしりあん'], note: '北海道虻田郡。アイヌ語「クッシャニ（管・路のある所）」由来。スキーリゾートとして昭和から有名。' },
    { kanji: '弟子屈', ans: 'てしかが', wrong: ['でしくつ', 'おとうとしくつ', 'でしや'], note: '北海道川上郡。摩周湖・屈斜路湖を抱える、阿寒摩周国立公園の玄関口。アイヌ語由来。' },
    { kanji: '太秦', ans: 'うずまさ', wrong: ['おおはた', 'たいしん', 'だいしん'], note: '京都府京都市右京区。映画村で有名。古代渡来氏族・秦（はた）氏ゆかりの地名。' },
    { kanji: '男衾', ans: 'おぶすま', wrong: ['おとこぶすま', 'だんきん', 'おとこえり'], note: '埼玉県大里郡（旧男衾郡）。漫画「男衾三郎絵詞」でも知られる、武蔵国の古い地名。' },
    { kanji: '各務原', ans: 'かかみがはら', wrong: ['かくむはら', 'かくむげん', 'かくえりはら'], note: '岐阜県。航空自衛隊基地で知られる地名。地元では「かかみはら」とも呼ばれ、駅名で読み分けがあるのが有名。' },
    { kanji: '特牛', ans: 'こっとい', wrong: ['とくぎゅう', 'とっこう', 'こっこう'], note: '山口県下関市。山陰本線の難読駅として鉄道ファンに有名。「太い綱で繋ぐ牛」の意とも。' },
    { kanji: '神居古潭', ans: 'かむいこたん', wrong: ['かんきょこたん', 'かみいこたん', 'じんきょこたん'], note: '北海道旭川市。アイヌ語で「神の住む場所」。石狩川の景勝地として昭和の観光名所でした。' },
    { kanji: '雑餉隈', ans: 'ざっしょのくま', wrong: ['ぞうじょうぐま', 'ざっしくま', 'ざっしょぐう'], note: '福岡県福岡市博多区。西鉄の駅名でも有名。「餉」は弁当・食事の意で、街道筋の食事処に由来する説あり。' },
    { kanji: '廿日市', ans: 'はつかいち', wrong: ['にじゅうにちいち', 'はちじゅういち', 'じゅうにちいち'], note: '広島県廿日市市。「廿」は二十の意。毎月20日に市が立ったことに由来します。' },
    { kanji: '国府津', ans: 'こうづ', wrong: ['こくふつ', 'こくぶづ', 'くにふつ'], note: '神奈川県小田原市。東海道本線の要衝で、昭和の鉄道好きには車両基地でおなじみ。古代相模国府の港。' },
    { kanji: '行縢', ans: 'むかばき', wrong: ['ゆきあがき', 'こうばき', 'ぎょうばき'], note: '宮崎県延岡市の山と滝の名。「行縢」とは武士が脚に巻いた毛皮の脚絆のこと。' },
    { kanji: '麻溝台', ans: 'あさみぞだい', wrong: ['まみぞだい', 'おみぞだい', 'あさこうだい'], note: '神奈川県相模原市南区。昭和の住宅開発で広がった台地。麻畑のあった溝に由来。' },
    { kanji: '安栖里', ans: 'あせり', wrong: ['あんせり', 'やすすみさと', 'あんせいり'], note: 'JR山陰本線（京都府船井郡京丹波町）の駅。「安らかに栖（す）む里」と書いて「あせり」と読みます。' },
    { kanji: '風祭', ans: 'かざまつり', wrong: ['ふうまつり', 'かぜさい', 'かざさい'], note: '神奈川県小田原市。箱根登山鉄道の駅でも有名。風雨を鎮める祭事に由来する地名。' },
    { kanji: '安足間', ans: 'あんたろま', wrong: ['あしま', 'あそくま', 'あんそくかん'], note: '北海道上川郡愛別町。JR石北本線の駅。アイヌ語由来の難読駅名として鉄道ファンに知られます。' },
    { kanji: '及位', ans: 'のぞき', wrong: ['およびい', 'きゅうい', 'おいぐらい'], note: '山形県真室川町。山伏の修行で「位（くらい）に及ぶ」を「のぞき行（ぎょう）」と呼んだ伝承に由来。' },
    { kanji: '海士有木', ans: 'あまありき', wrong: ['かいしありき', 'うみしありき', 'あますあき'], note: '千葉県市原市。小湊鉄道の駅。「海士（あま）」と「有木（ありき）」二つの地名の合成。' },
    { kanji: '及川', ans: 'おいかわ', wrong: ['きゅうかわ', 'およびかわ', 'みかわ'], note: '岩手県奥州市など東北に多い姓・地名。読み「およびかわ」と思いがちですが「おいかわ」が正解。' }
  ];

  var BEST_KEY = 'showa_chimei_quiz_best_score';
  var quiz = { list: [], idx: 0, score: 0, answered: false };

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function loadBest() {
    var v = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    if (isNaN(v) || v < 0) v = 0;
    return v;
  }

  function showBestOnIntro() {
    var best = loadBest();
    if (best > 0) {
      document.getElementById('best-num').textContent = best;
      document.getElementById('best-score-intro').style.display = 'block';
    }
  }

  function startQuiz() {
    quiz.list = shuffle(PLACES).slice(0, 10);
    quiz.idx = 0;
    quiz.score = 0;
    quiz.answered = false;
    document.getElementById('intro-card').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    renderQuestion();
    window.scrollTo(0, 0);
  }

  function renderQuestion() {
    quiz.answered = false;
    var p = quiz.list[quiz.idx];
    document.getElementById('progress').textContent = '第 ' + (quiz.idx + 1) + ' 問 / 10';
    document.getElementById('q-text').textContent = p.kanji;

    var choices = shuffle([p.ans].concat(p.wrong));
    var html = '';
    for (var i = 0; i < choices.length; i++) {
      html += '<button class="quiz-choice" data-choice="' + encodeURIComponent(choices[i]) + '" onclick="answer(this)">' + choices[i] + '</button>';
    }
    document.getElementById('choices').innerHTML = html;

    var fb = document.getElementById('feedback');
    fb.className = 'quiz-feedback';
    fb.innerHTML = '';
    var nb = document.getElementById('next-btn');
    nb.className = 'next-btn';
    nb.textContent = quiz.idx === 9 ? '結果を見る →' : '次の問題へ →';
  }

  function answer(btn) {
    if (quiz.answered) return;
    quiz.answered = true;
    var p = quiz.list[quiz.idx];
    var picked = decodeURIComponent(btn.getAttribute('data-choice'));
    var correct = picked === p.ans;
    if (correct) quiz.score++;

    var btns = document.querySelectorAll('.quiz-choice');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      var c = decodeURIComponent(btns[i].getAttribute('data-choice'));
      if (c === p.ans) btns[i].classList.add('correct');
      else if (c === picked) btns[i].classList.add('wrong');
    }

    var fb = document.getElementById('feedback');
    fb.className = 'quiz-feedback show ' + (correct ? 'ok' : 'ng');
    fb.innerHTML = (correct ? '⭕ <strong>正解！</strong>' : '❌ <strong>不正解</strong>　正解は「' + p.ans + '」')
                 + '<span class="note">' + p.note + '</span>';

    document.getElementById('next-btn').classList.add('show');
  }

  function nextQuestion() {
    if (quiz.idx < 9) {
      quiz.idx++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      finishQuiz();
    }
  }

  function finishQuiz() {
    document.getElementById('quiz-card').style.display = 'none';

    var s = quiz.score;
    var level = s >= 8 ? 'ok' : s >= 5 ? 'warn' : 'ng';
    var msg = s >= 9 ? '昭和地理マスター級！駅員さんも一目置くレベル。'
            : s >= 7 ? 'なかなかの昭和通。日本各地に詳しい証拠です。'
            : s >= 5 ? 'まずまず。難読地名の世界、もう一歩踏み込めそう。'
            : s >= 3 ? '読めそうで読めない地名、奥が深いですね。'
            : '昭和の地名は本当に手強い。再挑戦してみましょう！';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = s + ' / 10';
    document.getElementById('rn').textContent = msg;

    var best = loadBest();
    if (s > best) {
      best = s;
      try { localStorage.setItem(BEST_KEY, String(s)); } catch (e) {}
    }
    document.getElementById('best-num-result').textContent = best;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
