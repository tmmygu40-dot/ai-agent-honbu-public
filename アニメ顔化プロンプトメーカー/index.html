<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アニメ顔化プロンプトメーカー</title>
  <meta name="description" content="顔の特徴を入力すると、Stable Diffusion・Midjourneyなど画像生成AIで使えるアニメ風プロンプトを自動生成します。「丸い顔、大きい目」といった説明から、プロにも使える英文プロンプトが30秒で完成。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- GoatCounter 計測タグ -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>アニメ顔化プロンプトメーカー</h1>
    <p class="subtitle">顔の特徴を説明するだけで、AI画像生成用のアニメプロンプトが30秒で完成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">顔の特徴を説明</p>
    <div class="field">
      <label for="face-desc">顔の特徴（日本語でOK）</label>
      <textarea id="face-desc" placeholder="例：丸い顔、大きな目、茶髪、優しい表情、美少女、無垢な感じ" style="width:100%;min-height:80px;padding:0.72rem 0.9rem;font-size:1rem;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);resize:vertical;outline:none;font-family:inherit;"></textarea>
      <p class="hint">顔の形・目・髪色・表情・年代など、思いつくままに入力してください。</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">✨ プロンプトを生成</button>

  <!-- プロンプト表示カード -->
  <div class="result-card ok" id="result" style="display:none;text-align:left;">
    <p class="result-label">生成されたプロンプト</p>
    <p id="prompt-text" style="font-size:0.95rem;color:var(--text);line-height:1.6;background:var(--bg);padding:0.8rem;border-radius:8px;margin:0.8rem 0;word-break:break-word;">—</p>
    <button onclick="copyPrompt()" style="display:block;width:100%;padding:0.7rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.95rem;">📋 プロンプトをコピー</button>
  </div>

  <!-- 生成履歴カード -->
  <div class="card" id="history" style="display:none">
    <p class="card-title">生成履歴</p>
    <div id="history-list" style="max-height:300px;overflow-y:auto;"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✨ このツールは生成AIプロンプトの補助ツールです。Stable Diffusion・Midjourney・DALL-E などで使用できる英文プロンプトを作成します。生成結果は AI モデルに依存します。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var HISTORY_KEY = 'animePromptHistory';
  var MAX_HISTORY = 20;

  // プロンプト生成テンプレート
  var PROMPT_TEMPLATES = {
    qualifiers: [
      'anime girl', 'anime boy', 'manga style',
      'digital art', 'high quality', 'detailed',
      'soft lighting', 'professional illustration'
    ],
    styles: [
      'gentle expression', 'confident pose', 'shy expression',
      'elegant', 'cute', 'beautiful', 'delicate features'
    ]
  };

  function generatePrompt() {
    var faceDesc = document.getElementById('face-desc').value.trim();
    if (!faceDesc) {
      alert('顔の特徴を入力してください');
      return;
    }

    // 日本語から簡易的なプロンプトに変換
    var basePrompt = faceDesc
      .replace(/丸い顔/g, 'round face')
      .replace(/大きな?目/g, 'big eyes')
      .replace(/茶髪/g, 'brown hair')
      .replace(/金髪/g, 'blonde hair')
      .replace(/黒髪/g, 'black hair')
      .replace(/長髪/g, 'long hair')
      .replace(/短髪/g, 'short hair')
      .replace(/優しい表情/g, 'gentle expression')
      .replace(/無垢/g, 'innocent look')
      .replace(/美少女/g, 'beautiful girl')
      .replace(/可愛い/g, 'cute')
      .replace(/美しい/g, 'beautiful')
      .replace(/美人/g, 'pretty')
      .replace(/年代/g, 'age');

    // ランダムに修飾語を追加
    var enhancements = [
      ', soft lighting, professional quality illustration',
      ', high quality, digital art, trending on artstation',
      ', detailed face, expressive eyes, masterpiece',
      ', best quality, anime style, manga style'
    ];
    var enhancement = enhancements[Math.floor(Math.random() * enhancements.length)];

    var fullPrompt = basePrompt.replace(/、/g, ', ') + enhancement;

    // 履歴に保存
    saveToHistory(faceDesc, fullPrompt);

    // 表示
    displayPrompt(fullPrompt);
  }

  function displayPrompt(prompt) {
    var resultCard = document.getElementById('result');
    document.getElementById('prompt-text').textContent = prompt;
    resultCard.style.display = '';
    resultCard.scrollIntoView({behavior: 'smooth', block: 'center'});
  }

  function copyPrompt() {
    var promptText = document.getElementById('prompt-text').textContent;
    if (!promptText || promptText === '—') return;

    navigator.clipboard.writeText(promptText).then(function() {
      var btn = event.target;
      var originalText = btn.textContent;
      btn.textContent = '✓ コピーしました！';
      setTimeout(function() {
        btn.textContent = originalText;
      }, 2000);
    });
  }

  function saveToHistory(input, output) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({
      input: input,
      output: output,
      timestamp: new Date().toISOString()
    });
    if (history.length > MAX_HISTORY) {
      history.pop();
    }
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    displayHistory();
  }

  function displayHistory() {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (history.length === 0) {
      document.getElementById('history').style.display = 'none';
      return;
    }

    var historyList = document.getElementById('history-list');
    historyList.innerHTML = history.map(function(item, idx) {
      return '<div style="padding:0.7rem 0;border-bottom:1px solid var(--border);"><p style="font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:0.3rem;">入力: ' + escapeHtml(item.input) + '</p><p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:0.4rem;">生成: ' + escapeHtml(item.output.substring(0, 100)) + (item.output.length > 100 ? '...' : '') + '</p><button onclick="copyFromHistory(' + idx + ')" style="font-size:0.75rem;padding:0.4rem 0.8rem;background:var(--border);border:none;border-radius:5px;cursor:pointer;color:var(--text-sub);">📋 コピー</button></div>';
    }).join('');
    document.getElementById('history').style.display = '';
  }

  function copyFromHistory(idx) {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (idx >= 0 && idx < history.length) {
      navigator.clipboard.writeText(history[idx].output).then(function() {
        alert('コピーしました！');
      });
    }
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ページロード時に履歴を表示
  window.addEventListener('load', displayHistory);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
