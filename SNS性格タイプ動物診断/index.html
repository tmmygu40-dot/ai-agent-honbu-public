<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="3問に答えるだけで、あなたのSNS投稿スタイルがどの動物タイプか分かる無料診断アプリ。映え重視・共感型・観察型・自由気ままタイプなど、自分のSNS性格を動物に例えて楽しめます。">
  <title>SNS性格タイプ動物診断｜投稿スタイルを動物に例える3問診断</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { font-size: 1rem; font-weight: 700; margin-bottom: 0.9rem; line-height: 1.5; }
    .choices { display: flex; flex-direction: column; gap: 0.55rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
      font-family: inherit;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: scale(0.98); }

    .progress {
      max-width: 600px; margin: 0 auto 0.8rem; padding: 0 1.2rem;
      font-size: 0.78rem; color: var(--text-sub); text-align: right;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      background: var(--accent-light);
    }
    .result-emoji-big { font-size: 4rem; line-height: 1; margin-bottom: 0.5rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-name { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 0.6rem; line-height: 1.2; }
    .result-desc { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; text-align: left; }
    .result-tip {
      font-size: 0.88rem; color: var(--text-sub); line-height: 1.6;
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      padding: 0.8rem 0.9rem; text-align: left;
    }
    .result-tip strong { color: var(--accent); display: block; margin-bottom: 0.3rem; }

    .history-list { font-size: 0.85rem; color: var(--text-sub); }
    .history-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-empty { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 0.5rem 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, #q-card { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>SNS性格タイプ動物診断</h1>
    <p class="subtitle">3問に答えると、あなたのSNS投稿スタイルが動物キャラで分かる</p>
  </header>

  <p class="progress" id="progress">Q1 / 3</p>

  <!-- 質問カード -->
  <div class="card" id="q-card">
    <p class="card-title">診断</p>
    <p class="question" id="q-text">質問文</p>
    <div class="choices" id="q-choices"></div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="r-emoji">🦊</p>
    <p class="result-label">あなたのSNSタイプ</p>
    <p class="result-name" id="r-name">—</p>
    <p class="result-desc" id="r-desc"></p>
    <div class="result-tip" id="r-tip"></div>
  </div>

  <button class="btn-calc" id="restart-btn" style="display:none" onclick="restart()">もう一度診断する</button>

  <!-- 履歴カード -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">過去の診断（最新3件）</p>
    <div class="history-list" id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎉 このツールは楽しむためのエンタメ診断です。3問の回答傾向から動物キャラを判定します。結果は気軽に楽しんでください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 動物タイプ定義 ──
  var ANIMALS = {
    fox:    { emoji: '🦊', name: '映えキツネ型',
              desc: '見栄えと演出にこだわるタイプ。投稿1枚に時間をかけて、写真・文章・タグまでトータルで完成させる完璧主義のSNSアーティスト。',
              tip: '映え写真や統一感のあるフィードで世界観を作るのが得意。Instagramやリール動画との相性が抜群です。' },
    cat:    { emoji: '🐈', name: '気まぐれネコ型',
              desc: '気が向いた時だけ投稿する自由気ままタイプ。フォロワーの反応はあまり気にせず、自分の好きなタイミングでマイペースに楽しむ。',
              tip: '無理にバズを狙わず、好きなものを淡々と発信するスタイルが向いています。Xやマストドンの一言投稿が心地よいかも。' },
    parrot: { emoji: '🦜', name: 'おしゃべりオウム型',
              desc: '日常のあれこれを言葉にして発信したい雑談型。1日に何度も投稿してしまうのは「シェアしたい欲」が強い証拠。',
              tip: '実況・小ネタ・連投が得意。Xやスレッズで流れに乗ると、フォロワーとの会話が一番盛り上がります。' },
    bear:   { emoji: '🐻', name: '共感クマ型',
              desc: '誰かの投稿を読んで「分かる！」と反応するのが好きな共感型。自分発信より、リアクションやコメントでつながるタイプ。',
              tip: 'リプ・引用・スタンプで応援するのが得意。コミュニティ系SNSや小規模グループで力を発揮します。' },
    owl:    { emoji: '🦉', name: '観察フクロウ型',
              desc: 'タイムラインを静かに眺めるROM専寄りタイプ。深夜にじっくり見て、たまに鋭い投稿を放つ知的派。',
              tip: '見るだけでも価値あり。質より洞察。たまに書く長文ポストや note・ブログとの相性が良いです。' },
    otter:  { emoji: '🦦', name: 'シェアラッコ型',
              desc: '面白いネタや便利情報を見つけたら、すぐに誰かに教えたくなるシェア好きタイプ。RT・引用・転送が日課。',
              tip: 'キュレーター気質。ニュース系・ライフハック系の発信や、Pinterest・X引用との相性が抜群です。' }
  };

  // ── 質問と各選択肢のスコア配分 ──
  var QUESTIONS = [
    {
      q: 'Q1. 何かいい瞬間に出会った時、最初にすることは？',
      choices: [
        { t: '構図を考えて何枚も写真を撮る', s: { fox: 3, owl: 1 } },
        { t: 'とりあえず一言ポストする',     s: { parrot: 3, otter: 1 } },
        { t: '誰かに「これ見て！」と送る',   s: { otter: 3, bear: 1 } },
        { t: '心の中で味わう（投稿しない）', s: { cat: 2, owl: 3 } }
      ]
    },
    {
      q: 'Q2. 投稿のペースに近いのは？',
      choices: [
        { t: '練りに練って週1〜2回',         s: { fox: 3, owl: 2 } },
        { t: '気が向いたら不定期',           s: { cat: 3, owl: 1 } },
        { t: '1日に何度も思いついた時',     s: { parrot: 3, otter: 2 } },
        { t: 'ほぼ見るだけ・たまにリプ',     s: { bear: 2, owl: 3 } }
      ]
    },
    {
      q: 'Q3. SNSで一番うれしい瞬間は？',
      choices: [
        { t: '自分の投稿に「いいね」が伸びた', s: { fox: 3, parrot: 2 } },
        { t: '誰かに役立った・シェアされた',   s: { otter: 3, bear: 2 } },
        { t: 'コメントで会話が弾んだ',         s: { bear: 3, parrot: 2 } },
        { t: '面白い投稿をひとりで眺める時間', s: { cat: 3, owl: 3 } }
      ]
    }
  ];

  var currentQ = 0;
  var scores = { fox: 0, cat: 0, parrot: 0, bear: 0, owl: 0, otter: 0 };
  var STORAGE_KEY = 'sns_animal_diagnosis_history_v1';

  function showQuestion() {
    var qcard = document.getElementById('q-card');
    qcard.style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';

    var q = QUESTIONS[currentQ];
    document.getElementById('progress').textContent = 'Q' + (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.q;

    var choicesEl = document.getElementById('q-choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i){
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.type = 'button';
      btn.textContent = c.t;
      btn.onclick = function(){ pickChoice(i); };
      choicesEl.appendChild(btn);
    });
  }

  function pickChoice(idx) {
    var c = QUESTIONS[currentQ].choices[idx];
    Object.keys(c.s).forEach(function(k){ scores[k] += c.s[k]; });
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    // 最大スコアの動物を選ぶ（同点なら先勝ち）
    var topKey = null, topScore = -1;
    Object.keys(scores).forEach(function(k){
      if (scores[k] > topScore) { topScore = scores[k]; topKey = k; }
    });
    var a = ANIMALS[topKey];

    document.getElementById('q-card').style.display = 'none';
    document.getElementById('progress').textContent = '診断完了';

    document.getElementById('r-emoji').textContent = a.emoji;
    document.getElementById('r-name').textContent = a.name;
    document.getElementById('r-desc').textContent = a.desc;
    document.getElementById('r-tip').innerHTML = '<strong>おすすめSNS活用法</strong>' + a.tip;

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('restart-btn').style.display = 'block';

    saveHistory(a.name, a.emoji);
    showHistory();
  }

  function saveHistory(name, emoji) {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      var d = new Date();
      var date = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
      arr.unshift({ name: name, emoji: emoji, date: date });
      if (arr.length > 3) arr = arr.slice(0, 3);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    } catch(e) { /* ignore */ }
  }

  function showHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      var list = document.getElementById('history-list');
      var card = document.getElementById('history-card');
      if (!arr.length) { card.style.display = 'none'; return; }
      list.innerHTML = arr.map(function(x){
        return '<div class="history-item">' + x.emoji + ' ' + x.name + '<span style="float:right">' + x.date + '</span></div>';
      }).join('');
      card.style.display = 'block';
    } catch(e) { /* ignore */ }
  }

  function restart() {
    currentQ = 0;
    scores = { fox: 0, cat: 0, parrot: 0, bear: 0, owl: 0, otter: 0 };
    showQuestion();
  }

  // 初期化
  showQuestion();
  showHistory();
  </script>

</body>
