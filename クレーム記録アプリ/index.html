<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 クレーム記録</h1>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="content">クレーム内容</label>
        <textarea id="content" rows="3" placeholder="例：商品の品質が悪い、配送が遅い など"></textarea>
      </div>
      <div class="form-group">
        <label for="cause">原因</label>
        <input type="text" id="cause" placeholder="例：製造不良、在庫不足 など">
      </div>
      <div class="form-group">
        <label for="status">対応状況</label>
        <select id="status">
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="完了">完了</option>
        </select>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>一覧</h2>
      <div class="filter-bar">
        <label>対応状況：</label>
        <select id="filterStatus">
          <option value="全て">全て</option>
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="完了">完了</option>
        </select>
        <span id="countBadge" class="count-badge">0件</span>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <ul id="claimList"></ul>
      <p id="emptyMsg" class="empty-msg">記録がありません</p>
    </section>

    <!-- ランキング -->
    <section class="ranking-section">
      <h2>多い問題ランキング（原因別）</h2>
      <ol id="rankingList">
        <li class="empty-msg">データがありません</li>
      </ol>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
