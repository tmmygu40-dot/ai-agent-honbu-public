<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クレーム記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 クレーム記録</h1>
    </header>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="content">クレーム内容</label>
        <textarea id="content" rows="3" placeholder="例：商品の品質が悪い、配送が遅い など"></textarea>
      </div>
      <div class="form-group">
        <label for="cause">原因</label>
        <input type="text" id="cause" placeholder="例：製造不良、在庫不足 など">
      </div>
      <div class="form-group">
        <label for="status">対応状況</label>
        <select id="status">
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="完了">完了</option>
        </select>
      </div>
      <button id="addBtn" class="btn-primary" onclick="addClaim()">登録する</button>
      <p id="errorMsg" class="error-msg" style="color:#c0392b;margin-top:8px;font-size:0.9em;display:none;"></p>
      <p id="successMsg" class="success-msg" style="color:#27ae60;margin-top:8px;font-size:0.9em;display:none;"></p>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <h2>一覧</h2>
      <div class="filter-bar">
        <label>対応状況：</label>
        <select id="filterStatus">
          <option value="全て">全て</option>
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="完了">完了</option>
        </select>
        <span id="countBadge" class="count-badge">0件</span>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <ul id="claimList"></ul>
      <p id="emptyMsg" class="empty-msg">記録がありません</p>
    </section>

    <!-- ランキング -->
    <section class="ranking-section">
      <h2>多い問題ランキング（原因別）</h2>
      <ol id="rankingList">
        <li class="empty-msg">データがありません</li>
      </ol>
    </section>
  </div>

  <script>
const STORAGE_KEY = 'claims_data';
let claims = [];

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  claims = raw ? JSON.parse(raw) : [];
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(claims));
}

function formatDate(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${h}:${min}`;
}

function renderList() {
  const filter = document.getElementById('filterStatus').value;
  const list = document.getElementById('claimList');
  const emptyMsg = document.getElementById('emptyMsg');
  const countBadge = document.getElementById('countBadge');
  const filtered = filter === '全て' ? claims : claims.filter(c => c.status === filter);
  countBadge.textContent = `${filtered.length}件`;
  if (filtered.length === 0) {
    list.innerHTML = '';
    emptyMsg.style.display = 'block';
  } else {
    emptyMsg.style.display = 'none';
    list.innerHTML = filtered.map(c => `
      <li class="claim-item status-${c.status}" data-id="${c.id}">
        <div class="claim-header">
          <span class="claim-content">${escapeHtml(c.content)}</span>
        </div>
        <div class="claim-meta">
          ${c.cause ? `<span class="cause-tag">${escapeHtml(c.cause)}</span>` : ''}
          <span class="status-badge badge-${c.status}">${c.status}</span>
          <span class="claim-date">${formatDate(c.date)}</span>
        </div>
        <div class="claim-actions">
          ${c.status !== '未対応' ? '' : `<button class="btn-status" onclick="changeStatus('${c.id}', '対応中')">対応中にする</button>`}
          ${c.status === '完了' ? '' : `<button class="btn-status" onclick="changeStatus('${c.id}', '完了')">完了にする</button>`}
          ${c.status !== '完了' ? '' : `<button class="btn-status" onclick="changeStatus('${c.id}', '未対応')">未対応に戻す</button>`}
          <button class="btn-delete" onclick="deleteClaim('${c.id}')">削除</button>
        </div>
      </li>
    `).join('');
  }
  renderRanking();
}

function renderRanking() {
  const rankingList = document.getElementById('rankingList');
  const causeCount = {};
  claims.forEach(c => {
    const key = c.cause.trim() || '（原因不明）';
    causeCount[key] = (causeCount[key] || 0) + 1;
  });
  const sorted = Object.entries(causeCount).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) {
    rankingList.innerHTML = '<li class="empty-msg">データがありません</li>';
    return;
  }
  rankingList.innerHTML = sorted.slice(0, 10).map(([cause, count]) => `
    <li>${escapeHtml(cause)}<span class="rank-count">${count}件</span></li>
  `).join('');
}

function showMsg(type, text) {
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');
  if (type === 'error') {
    err.textContent = text;
    err.style.display = 'block';
    suc.style.display = 'none';
  } else {
    suc.textContent = text;
    suc.style.display = 'block';
    err.style.display = 'none';
  }
}

function addClaim() {
  const content = document.getElementById('content').value.trim();
  const cause = document.getElementById('cause').value.trim();
  const status = document.getElementById('status').value;
  if (!content) {
    showMsg('error', 'クレーム内容を入力してください');
    return;
  }
  const claim = {
    id: Date.now().toString(),
    content, cause, status,
    date: new Date().toISOString()
  };
  claims.unshift(claim);
  save();
  clearForm();
  showMsg('success', 'クレームを登録しました');
  renderList();
}

function clearForm() {
  document.getElementById('content').value = '';
  document.getElementById('cause').value = '';
  document.getElementById('status').value = '未対応';
}

function changeStatus(id, newStatus) {
  const claim = claims.find(c => c.id === id);
  if (claim) { claim.status = newStatus; save(); renderList(); }
}

function deleteClaim(id) {
  if (!confirm('このクレームを削除しますか？')) return;
  claims = claims.filter(c => c.id !== id);
  save();
  renderList();
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.getElementById('filterStatus').addEventListener('change', renderList);
load();
renderList();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
