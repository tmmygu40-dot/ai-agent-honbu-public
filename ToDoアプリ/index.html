<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="タスクを入力..." maxlength="100">
      <button id="addBtn">追加</button>
    </div>

    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
      <span id="remainCount">0件の未完了タスク</span>
      <button id="clearDoneBtn">完了済みを削除</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todo_tasks';

    let tasks = [];
    let currentFilter = 'all';

    function loadTasks() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        tasks = saved ? JSON.parse(saved) : [];
      } catch (e) {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      tasks.push({ id: Date.now(), text: trimmed, done: false });
      saveTasks();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        saveTasks();
        render();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      saveTasks();
      render();
    }

    function getFilteredTasks() {
      if (currentFilter === 'active') return tasks.filter(t => !t.done);
      if (currentFilter === 'done') return tasks.filter(t => t.done);
      return tasks;
    }

    function startEdit(id) {
      const li = document.querySelector(`li[data-id="${id}"]`);
      if (!li || li.querySelector('.edit-input')) return;
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const span = li.querySelector('.task-text');
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = task.text;
      input.maxLength = 100;
      span.replaceWith(input);
      input.focus();

      function commitEdit() {
        const newText = input.value.trim();
        if (newText) task.text = newText;
        saveTasks();
        render();
      }
      input.addEventListener('blur', commitEdit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { task.text = task.text; render(); }
      });
    }

    function render() {
      const list = document.getElementById('taskList');
      const filtered = getFilteredTasks();

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty-msg">タスクはありません</li>';
      } else {
        list.innerHTML = filtered.map(task => `
          <li class="${task.done ? 'done' : ''}" data-id="${task.id}">
            <div class="task-check" data-action="toggle"></div>
            <span class="task-text" title="ダブルクリックで編集">${escapeHtml(task.text)}</span>
            <button class="delete-btn" data-action="delete" onclick="deleteTask(${task.id})" title="削除">×</button>
          </li>
        `).join('');
      }

      const remaining = tasks.filter(t => !t.done).length;
      document.getElementById('remainCount').textContent = `${remaining}件の未完了タスク`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // イベント：追加ボタン
    document.getElementById('addBtn').addEventListener('click', () => {
      const input = document.getElementById('taskInput');
      addTask(input.value);
      input.value = '';
      input.focus();
    });

    // イベント：Enterキーで追加
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const input = document.getElementById('taskInput');
        addTask(input.value);
        input.value = '';
      }
    });

    // イベント：チェック（イベント委譲）
    document.getElementById('taskList').addEventListener('click', e => {
      const li = e.target.closest('li[data-id]');
      if (!li) return;
      const id = Number(li.dataset.id);
      if (e.target.closest('[data-action="toggle"]')) toggleTask(id);
    });

    // イベント：タスクテキストのダブルクリックで編集
    document.getElementById('taskList').addEventListener('dblclick', e => {
      const span = e.target.closest('.task-text');
      if (!span) return;
      const li = span.closest('li[data-id]');
      if (li) startEdit(Number(li.dataset.id));
    });

    // イベント：フィルターボタン
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // イベント：完了済みを一括削除
    document.getElementById('clearDoneBtn').addEventListener('click', clearDone);

    // 初期化
    loadTasks();
    render();
  </script>
  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
