<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="タスクを入力..." maxlength="100">
      <button id="addBtn">追加</button>
    </div>

    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
      <span id="remainCount">0件の未完了タスク</span>
      <button id="clearDoneBtn">完了済みを削除</button>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
