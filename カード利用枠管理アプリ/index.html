<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード利用枠管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>カード利用枠管理</h1>

    <section class="form-section">
      <h2>カードを登録</h2>
      <div class="form-group">
        <label for="cardName">カード名</label>
        <input type="text" id="cardName" placeholder="例：楽天カード">
      </div>
      <div class="form-group">
        <label for="cardLimit">利用限度額（円）</label>
        <input type="number" id="cardLimit" placeholder="例：300000" min="0">
      </div>
      <div class="form-group">
        <label for="cardUsed">現在の利用額（円）</label>
        <input type="number" id="cardUsed" placeholder="例：50000" min="0">
      </div>
      <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <section class="cards-section">
      <h2>カード一覧</h2>
      <div id="summary" class="summary"></div>
      <div id="cardList" class="card-list"></div>
      <p id="emptyMsg" class="empty-msg">登録されたカードはありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
