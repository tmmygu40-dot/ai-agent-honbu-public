  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"カード利用枠管理","description":"カード利用枠管理。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%82%AB%E3%83%BC%E3%83%89%E5%88%A9%E7%94%A8%E6%9E%A0%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}

<body>
  <div class="container">
    <h1>カード利用枠管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <section class="form-section">
      <h2>カードを登録</h2>
      <div class="form-group">
        <label for="cardName">カード名</label>
        <input type="text" id="cardName" placeholder="例：楽天カード">
      </div>
      <div class="form-group">
        <label for="cardLimit">利用限度額（円）</label>
        <input type="number" id="cardLimit" placeholder="例：300000" min="0">
      </div>
      <div class="form-group">
        <label for="cardUsed">現在の利用額（円）</label>
        <input type="number" id="cardUsed" placeholder="例：50000" min="0">
      </div>
      <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <section class="cards-section">
      <h2>カード一覧</h2>
      <div id="summary" class="summary"></div>
      <div id="cardList" class="card-list"></div>
      <p id="emptyMsg" class="empty-msg">登録されたカードはありません</p>
    </section>
  </div>

  <script>
'use strict';

const STORAGE_KEY = 'card_usage_data';

let cards = [];

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { cards = JSON.parse(saved); } catch(e) { cards = []; }
  }
  render();
  document.getElementById('addBtn').addEventListener('click', addCard);
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function addCard() {
  const name = document.getElementById('cardName').value.trim();
  const limit = parseInt(document.getElementById('cardLimit').value, 10);
  const used = parseInt(document.getElementById('cardUsed').value, 10);

  if (!name) { showError('カード名を入力してください'); return; }
  if (isNaN(limit) || limit <= 0) { showError('利用限度額を正しく入力してください'); return; }
  if (isNaN(used) || used < 0) { showError('利用額を正しく入力してください'); return; }
  if (used > limit) { showError('利用額が限度額を超えています'); return; }
  showError('');

  cards.push({ id: Date.now(), name, limit, used });
  save();
  render();

  document.getElementById('cardName').value = '';
  document.getElementById('cardLimit').value = '';
  document.getElementById('cardUsed').value = '';
}

function deleteCard(id) {
  if (!confirm('このカードを削除しますか？')) return;
  cards = cards.filter(c => c.id !== id);
  save();
  render();
}

function getLevel(pct) {
  if (pct >= 80) return 'red';
  if (pct >= 60) return 'yellow';
  return 'green';
}

function render() {
  const list = document.getElementById('cardList');
  const emptyMsg = document.getElementById('emptyMsg');
  const summary = document.getElementById('summary');

  list.innerHTML = '';

  if (cards.length === 0) {
    emptyMsg.style.display = 'block';
    summary.classList.remove('show');
    return;
  }

  emptyMsg.style.display = 'none';

  const totalLimit = cards.reduce((s, c) => s + c.limit, 0);
  const totalUsed = cards.reduce((s, c) => s + c.used, 0);
  const totalRemaining = totalLimit - totalUsed;

  summary.classList.add('show');
  summary.innerHTML = `
    <div class="summary-row"><span>合計限度額</span><span>${fmt(totalLimit)}円</span></div>
    <div class="summary-row"><span>合計利用額</span><span>${fmt(totalUsed)}円</span></div>
    <div class="summary-row"><span>合計残り枠</span><span>${fmt(totalRemaining)}円</span></div>
  `;

  cards.forEach(card => {
    const remaining = card.limit - card.used;
    const pct = Math.round((card.used / card.limit) * 100);
    const level = getLevel(pct);

    const item = document.createElement('div');
    item.className = `card-item${level !== 'green' ? ' alert-' + level : ''}`;
    item.innerHTML = `
      <div class="card-header">
        <span class="card-name">${escHtml(card.name)}</span>
        <button class="delete-btn" data-id="${card.id}" title="削除">×</button>
      </div>
      <div class="card-amounts">
        <span>限度額：${fmt(card.limit)}円</span>
        <span>利用額：${fmt(card.used)}円</span>
      </div>
      <div class="card-remaining">
        <span class="remaining-label">残り使用枠 </span>${fmt(remaining)}円
      </div>
      <div class="progress-wrap">
        <div class="progress-bar ${level}" style="width:${Math.min(pct,100)}%"></div>
      </div>
      <div class="usage-label ${level !== 'green' ? level : ''}">使用率 ${pct}%</div>
    `;

    item.querySelector('.delete-btn').addEventListener('click', e => {
      deleteCard(Number(e.currentTarget.dataset.id));
    });

    list.appendChild(item);
  });
}

function fmt(n) {
  return n.toLocaleString('ja-JP');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', init);
  </script>
