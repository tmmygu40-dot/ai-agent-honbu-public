<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贈り物相場チェッカー｜年代・関係性・シーンからギフト予算を即逆引き</title>
  <meta name="description" content="年代・関係性・シーンを選ぶだけで、誕生日・結婚祝い・出産祝いなどギフトの一般的な相場レンジと選び方アドバイスをワンタップで逆引きできる無料ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.4rem; color: var(--accent); }
    .result-note { font-size: 0.88rem; color: var(--text); line-height: 1.6; margin-top: 0.6rem; text-align: left; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>贈り物相場チェッカー</h1>
    <p class="subtitle">年代・関係性・シーンから、ギフトの一般的な相場をワンタップで逆引き ※2026年時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="age">相手の年代</label>
      <select id="age">
        <option value="10">10代</option>
        <option value="20">20代</option>
        <option value="30" selected>30代</option>
        <option value="40">40代</option>
        <option value="50">50代</option>
        <option value="60">60代以上</option>
      </select>
    </div>
    <div class="field">
      <label for="rel">相手との関係性</label>
      <select id="rel">
        <option value="family">家族</option>
        <option value="lover">恋人</option>
        <option value="friend" selected>友人</option>
        <option value="colleague">同僚</option>
        <option value="boss">上司</option>
        <option value="subordinate">部下</option>
        <option value="relative">親戚</option>
        <option value="client">取引先</option>
      </select>
    </div>
    <div class="field">
      <label for="scene">シーン</label>
      <select id="scene">
        <option value="birthday" selected>誕生日</option>
        <option value="wedding">結婚祝い</option>
        <option value="baby">出産祝い</option>
        <option value="seasonal">お中元・お歳暮</option>
        <option value="retire">退職祝い</option>
        <option value="visit">お見舞い</option>
        <option value="other">その他のお祝い</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="check()">相場をチェック</button>

  <div class="result-card" id="result">
    <p class="result-label">相場レンジ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">選び方のヒント</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、民間ギフト調査・百貨店の贈答ガイド・冠婚葬祭マナー資料などの公開データを参考に、目安として整理しています。実際の相場は地域・関係の深さ・慣習で変わります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 関係性 × シーン → 基準レンジ（円）──
  var BASE = {
    family:       { birthday:[5000,15000], wedding:[30000,100000], baby:[10000,30000], seasonal:[3000,5000], retire:[10000,30000], visit:[3000,5000], other:[3000,10000] },
    lover:        { birthday:[10000,30000], wedding:[30000,50000], baby:[10000,20000], seasonal:[5000,10000], retire:[10000,20000], visit:[3000,5000], other:[5000,15000] },
    friend:       { birthday:[3000,5000], wedding:[10000,30000], baby:[5000,10000], seasonal:[3000,5000], retire:[3000,5000], visit:[3000,5000], other:[2000,5000] },
    colleague:    { birthday:[2000,5000], wedding:[5000,10000], baby:[3000,5000], seasonal:[3000,5000], retire:[3000,5000], visit:[3000,5000], other:[2000,3000] },
    boss:         { birthday:[5000,10000], wedding:[10000,30000], baby:[5000,10000], seasonal:[5000,10000], retire:[5000,10000], visit:[3000,5000], other:[3000,5000] },
    subordinate:  { birthday:[3000,5000], wedding:[10000,30000], baby:[5000,10000], seasonal:[3000,5000], retire:[5000,10000], visit:[3000,5000], other:[2000,5000] },
    relative:     { birthday:[3000,10000], wedding:[10000,30000], baby:[5000,10000], seasonal:[3000,5000], retire:[5000,10000], visit:[3000,5000], other:[3000,5000] },
    client:       { birthday:[5000,10000], wedding:[10000,30000], baby:[5000,10000], seasonal:[3000,10000], retire:[5000,10000], visit:[3000,5000], other:[3000,5000] }
  };

  // 年代補正（基準は30代＝1.0）
  var AGE_MULT = { 10:0.5, 20:0.8, 30:1.0, 40:1.1, 50:1.2, 60:1.2 };

  // 関係性ラベル
  var REL_LABEL = {
    family:'家族', lover:'恋人', friend:'友人', colleague:'同僚',
    boss:'上司', subordinate:'部下', relative:'親戚', client:'取引先'
  };
  // シーンラベル
  var SCENE_LABEL = {
    birthday:'誕生日', wedding:'結婚祝い', baby:'出産祝い',
    seasonal:'お中元・お歳暮', retire:'退職祝い', visit:'お見舞い', other:'その他のお祝い'
  };

  // 関係性別アドバイス
  var TIPS = {
    family:[['予算配分','身近な人ほど「実用＋少しの贅沢」が喜ばれる傾向。'],['NG','現金は親→子はOK、子→親は少し慎重に。'],['一言','普段言えない感謝メッセージを添えると満足度が上がる。']],
    lover: [['予算配分','金額より「相手が欲しがっていたもの」優先。'],['NG','日用品すぎるものは記念感が薄い。'],['一言','記念日カードや手紙が高評価。']],
    friend:[['予算配分','3,000〜5,000円が王道。気を使わせない範囲で。'],['NG','高すぎるギフトは逆に気まずい。'],['一言','SNSや会話から欲しいものをリサーチ。']],
    colleague:[['予算配分','個人より連名が安心。1人2,000〜3,000円目安。'],['NG','プライベート過ぎるもの（香水・下着系）は避ける。'],['一言','個包装スイーツ・コーヒーが鉄板。']],
    boss:  [['予算配分','見栄より実用＋上質感。'],['NG','靴・靴下・ハンカチは「踏みつける／別れ」を連想する説あり。'],['一言','名入れ・老舗ブランドが好印象。']],
    subordinate:[['予算配分','相手が気を遣わない金額帯に抑える。'],['NG','評価と紐づくような押し付けギフトはNG。'],['一言','頑張りをねぎらうメッセージを添えると◎。']],
    relative:[['予算配分','地域慣習を最優先。迷ったら親に確認。'],['NG','偶数枚（4・9含む）の現金包みは避ける。'],['一言','のし・水引のマナーをチェック。']],
    client:[['予算配分','個人より社名で贈る。1社あたり5,000〜10,000円目安。'],['NG','受領禁止の業界（公務員・金融など）は事前確認必須。'],['一言','日持ちする個包装お菓子・地域名産が無難。']]
  };

  function fmt(n){ return Math.round(n).toLocaleString('ja-JP'); }
  // 1000円単位に丸める
  function roundTo(n, unit){ return Math.round(n / unit) * unit; }

  function check(){
    var age = document.getElementById('age').value;
    var rel = document.getElementById('rel').value;
    var scene = document.getElementById('scene').value;

    var base = BASE[rel] && BASE[rel][scene];
    if (!base) {
      showResult('warn', '参考データなし', 'この組み合わせの一般相場は明確ではありません。3,000〜5,000円から始めて、気持ちを優先するのが無難です。');
      document.getElementById('detail').style.display = 'none';
      return;
    }

    var mult = AGE_MULT[age] || 1.0;
    var lo = roundTo(base[0] * mult, 500);
    var hi = roundTo(base[1] * mult, 500);
    if (lo < 1000) lo = 1000;
    if (hi <= lo)  hi = lo + 1000;

    var label = REL_LABEL[rel] + '・' + SCENE_LABEL[scene] + '（' + age + (age==='60'?'代以上':'代') + '）';
    var center = Math.round((lo + hi) / 2);

    showResult('ok',
      fmt(lo) + '円 〜 ' + fmt(hi) + '円',
      label + ' の一般的な相場目安です。中心値は約 ' + fmt(center) + ' 円。'
    );

    showDetail(TIPS[rel] || []);
    save({age:age, rel:rel, scene:scene, lo:lo, hi:hi});
  }

  function showResult(level, val, note){
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows){
    if (!rows.length) { document.getElementById('detail').style.display = 'none'; return; }
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  // localStorage 保存・復元
  var KEY = 'gift_price_checker_v1';
  function save(d){
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e){}
  }
  function load(){
    try {
      var s = localStorage.getItem(KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.age)   document.getElementById('age').value = d.age;
      if (d.rel)   document.getElementById('rel').value = d.rel;
      if (d.scene) document.getElementById('scene').value = d.scene;
    } catch(e){}
  }
  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
