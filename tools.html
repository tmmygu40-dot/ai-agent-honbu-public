  <script>
  // ── お気に入り機能 ──
  (function() {
    var KEY = 'ai_honbu_favs';
    function getFavs() { try { return JSON.parse(localStorage.getItem(KEY)||'[]'); } catch(e) { return []; } }
    function setFavs(a) { try { localStorage.setItem(KEY, JSON.stringify(a)); } catch(e) {} }
    function isFav(href) { return getFavs().some(function(f){ return f.href===href; }); }
    function toggleFav(href, name) {
      var a=getFavs(), i=a.findIndex(function(f){ return f.href===href; });
      if(i>=0) a.splice(i,1); else a.push({name:name,href:href});
      setFavs(a);
    }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function updateBtn(btn) {
      var on=isFav(btn.dataset.href);
      btn.innerHTML=(on?'★':'☆')+'<span class="fav-label">お気に入り</span>'; btn.classList.toggle('active',on);
      btn.title=on?'お気に入り解除':'お気に入りに追加';
    }
    function renderFavSection() {
      var favs=getFavs(), sec=document.getElementById('fav-section');
      if(!sec) return;
      if(favs.length===0){ sec.style.display='none'; return; }
      sec.style.display='';
      document.getElementById('fav-count').textContent='（'+favs.length+'件）';
      var list=document.getElementById('fav-list');
      list.innerHTML=favs.map(function(f){
        return '<li><a href="'+esc(f.href)+'">'+esc(f.name)+'</a>'
          +'<button class="fav-btn active" data-href="'+esc(f.href)+'" data-name="'+esc(f.name)+'" title="お気に入り解除">★<span class="fav-label">お気に入り</span></button></li>';
      }).join('');
      list.querySelectorAll('.fav-btn').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.preventDefault(); e.stopPropagation();
          var href=btn.dataset.href, name=btn.dataset.name;
          toggleFav(href,name);
          var now=isFav(href);
          // localStorage は即反映・一覧からは削除しない
          btn.closest('li').classList.toggle('fav-removed',!now);
          updateBtn(btn);
          var c=getFavs().length;
          var countEl=document.getElementById('fav-count');
          if(countEl) countEl.textContent='（'+c+'件）';
          document.querySelectorAll('.fav-btn').forEach(function(b){
            if(b.dataset.href===href && b.closest('#fav-list')===null) updateBtn(b);
          });
        });
      });
    }
    function addStarButtons(container) {
      container.querySelectorAll('li').forEach(function(li){
        if(li.querySelector('.fav-btn')) return;
        var a=li.querySelector('a'); if(!a) return;
        var href=a.getAttribute('href');
        var name=(a.querySelector('.name')||a).textContent.trim();
        var btn=document.createElement('button');
        btn.className='fav-btn'+(isFav(href)?' active':'');
        btn.innerHTML=(isFav(href)?'★':'☆')+'<span class="fav-label">お気に入り</span>';
        btn.title=isFav(href)?'お気に入り解除':'お気に入りに追加';
        btn.dataset.href=href; btn.dataset.name=name;
        btn.addEventListener('click', function(e){
          e.preventDefault(); e.stopPropagation();
          toggleFav(href,name); updateBtn(btn); renderFavSection();
        });
        li.appendChild(btn);
      });
    }
    document.addEventListener('DOMContentLoaded', function(){
      renderFavSection();
      addStarButtons(document.body);
    });
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        renderFavSection();
        document.querySelectorAll('.fav-btn').forEach(updateBtn);
      }
    });
    window._favAddStars = addStarButtons;
    window._favRender   = renderFavSection;
  })();
  </script>

<script>
(function(){
  var inp = document.getElementById('tools-search');
  var none = document.getElementById('tools-search-none');
  if(!inp) return;
  function doFilter(){
    function toKana(s){ return s.replace(/[ぁ-ゖ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)+0x60);}); }
    var q = toKana(inp.value.trim().toLowerCase());
    var main = document.getElementById('main-apps');
    if(!main) return;
    if(!q){
      main.querySelectorAll('li').forEach(function(li){ li.style.display=''; });
      main.querySelectorAll('ul').forEach(function(ul){ ul.style.display=''; });
      main.querySelectorAll('h2').forEach(function(h){ h.style.display=''; });
      none.style.display='none';
      return;
    }
    var anyVisible = false;
    main.querySelectorAll('li').forEach(function(li){
      var a = li.querySelector('a');
      var txt = a ? toKana((a.textContent + (a.getAttribute('href')||'')).toLowerCase()) : '';
      var show = txt.indexOf(q)>=0;
      li.style.display = show ? '' : 'none';
      if(show) anyVisible = true;
    });
    main.querySelectorAll('ul').forEach(function(ul){
      var vis = Array.from(ul.querySelectorAll('li')).some(function(li){ return li.style.display!=='none'; });
      ul.style.display = vis ? '' : 'none';
      var prev = ul.previousElementSibling;
      if(prev && prev.tagName==='H2') prev.style.display = vis ? '' : 'none';
    });
    none.style.display = anyVisible ? 'none' : '';
  }
  inp.addEventListener('input', doFilter);
  // main-apps が JS 描画後に検索が走るよう MutationObserver で監視
  var ob = new MutationObserver(function(){ doFilter(); });
  var main = document.getElementById('main-apps');
  if(main) ob.observe(main, {childList:true, subtree:false});
})();
</script>

<script>
(function() {
  var CLICK_KEY = 'ai_honbu_clicks';
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href^="./"]');
    if (!a) return;
    try {
      var data = JSON.parse(localStorage.getItem(CLICK_KEY) || '{}');
      var href = a.getAttribute('href');
      data[href] = (data[href] || 0) + 1;
      localStorage.setItem(CLICK_KEY, JSON.stringify(data));
    } catch(e) {}
  });
})();
</script>
