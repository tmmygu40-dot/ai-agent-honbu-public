<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賃上げ影響シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード（複数） ── */
    .results-row {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      max-width: 600px; margin: 0 auto 1rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem 1rem; box-shadow: var(--shadow);
      flex: 1 1 140px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text-sub); margin-bottom: 0.35rem; }
    .result-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.1; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.75rem; color: var(--text-sub); line-height: 1.4; margin-top: 0.3rem; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>賃上げ影響シミュレーター</h1>
    <p class="subtitle">最低賃金引き上げ後の人件費増加額とパート採用可能時間を即試算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">現在の状況</p>
    <div class="field">
      <label for="wage_now">現在の時給（円）</label>
      <input type="number" id="wage_now" placeholder="例: 1000" min="0">
    </div>
    <div class="field">
      <label for="wage_new">引き上げ後の時給（円）</label>
      <input type="number" id="wage_new" placeholder="例: 1050" min="0">
    </div>
    <div class="field">
      <label for="staff_count">パート・アルバイト人数（人）</label>
      <input type="number" id="staff_count" placeholder="例: 5" min="0">
    </div>
    <div class="field">
      <label for="hours_month">1人あたり月間労働時間（時間）</label>
      <input type="number" id="hours_month" placeholder="例: 80" min="0">
    </div>
  </div>

  <div class="card">
    <p class="card-title">採用可能時間の逆算（任意）</p>
    <div class="field">
      <label for="budget">月間人件費予算合計（円）</label>
      <input type="number" id="budget" placeholder="例: 500000" min="0">
      <p class="hint">入力すると「新時給で採用できる総時間数」を計算します</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">試算する</button>

  <!-- 結論カード群 -->
  <div class="results-row" id="results-row">
    <div class="result-card ng" id="card-increase">
      <p class="result-label">月間人件費 増加額</p>
      <p class="result-value" id="rv-increase">—</p>
      <p class="result-note" id="rn-increase"></p>
    </div>
    <div class="result-card warn" id="card-rate">
      <p class="result-label">増加率</p>
      <p class="result-value" id="rv-rate">—</p>
      <p class="result-note">賃上げ前比</p>
    </div>
    <div class="result-card ok" id="card-hours">
      <p class="result-label">採用可能時間（予算内）</p>
      <p class="result-value" id="rv-hours">—</p>
      <p class="result-note" id="rn-hours">予算入力時に表示</p>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'wage_sim_v1';

  function loadSaved() {
    try {
      var s = localStorage.getItem(LS_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      if (d.wage_now)     document.getElementById('wage_now').value     = d.wage_now;
      if (d.wage_new)     document.getElementById('wage_new').value     = d.wage_new;
      if (d.staff_count)  document.getElementById('staff_count').value  = d.staff_count;
      if (d.hours_month)  document.getElementById('hours_month').value  = d.hours_month;
      if (d.budget)       document.getElementById('budget').value       = d.budget;
    } catch(e) {}
  }

  function saveInput(d) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {}
  }

  function calc() {
    var wage_now    = parseFloat(document.getElementById('wage_now').value);
    var wage_new    = parseFloat(document.getElementById('wage_new').value);
    var staff_count = parseFloat(document.getElementById('staff_count').value);
    var hours_month = parseFloat(document.getElementById('hours_month').value);
    var budget      = parseFloat(document.getElementById('budget').value);

    if (isNaN(wage_now) || isNaN(wage_new) || isNaN(staff_count) || isNaN(hours_month)) {
      alert('現在の時給・引き上げ後時給・人数・月間労働時間は必須です');
      return;
    }
    if (wage_new < wage_now) {
      alert('引き上げ後の時給は現在の時給以上にしてください');
      return;
    }

    saveInput({ wage_now: wage_now, wage_new: wage_new, staff_count: staff_count, hours_month: hours_month, budget: budget || '' });

    var cost_now    = wage_now * staff_count * hours_month;
    var cost_new    = wage_new * staff_count * hours_month;
    var increase    = cost_new - cost_now;
    var rate        = cost_now > 0 ? (increase / cost_now * 100) : 0;

    // 結果カード表示
    var row = document.getElementById('results-row');
    row.style.display = 'flex';

    var cardInc = document.getElementById('card-increase');
    cardInc.classList.add('show');
    document.getElementById('rv-increase').textContent = '+' + fmt(increase) + ' 円';
    document.getElementById('rn-increase').textContent = '月間コスト増（' + staff_count + '人 × ' + hours_month + 'h）';

    var cardRate = document.getElementById('card-rate');
    cardRate.classList.add('show');
    document.getElementById('rv-rate').textContent = '+' + rate.toFixed(1) + '%';

    var cardHours = document.getElementById('card-hours');
    if (!isNaN(budget) && budget > 0) {
      var adoptable_hours = Math.floor(budget / wage_new);
      cardHours.classList.add('show');
      document.getElementById('rv-hours').textContent = fmt(adoptable_hours) + ' 時間';
      document.getElementById('rn-hours').textContent = '予算 ' + fmt(budget) + ' 円 ÷ 新時給 ' + fmt(wage_new) + ' 円';
    } else {
      cardHours.classList.remove('show');
    }

    // 内訳
    var rows = [
      ['現在の時給',         fmt(wage_now) + ' 円'],
      ['引き上げ後の時給',   fmt(wage_new) + ' 円'],
      ['対象人数',           staff_count + ' 人'],
      ['月間労働時間（1人）', hours_month + ' 時間'],
      ['現在の月間人件費',   fmt(cost_now) + ' 円'],
      ['引き上げ後の月間人件費', fmt(cost_new) + ' 円'],
      ['月間人件費 増加額',  fmt(increase) + ' 円', true],
      ['増加率',             '+' + rate.toFixed(1) + '%'],
    ];
    if (!isNaN(budget) && budget > 0) {
      var adoptable_hours2 = Math.floor(budget / wage_new);
      rows.push(['採用可能時間（予算内）', fmt(adoptable_hours2) + ' 時間', true]);
    }

    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  loadSaved();
  </script>

  <script src="../fav-widget.js"></script>

</body>
