<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原油高騰コスト影響チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    /* ── 仕切り ── */
    .section-label {
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      margin: 0 auto 0.5rem;
      max-width: 600px;
      padding: 0 0.2rem;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 変動率バッジ ── */
    .change-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.85rem; font-weight: 700;
      margin-left: 0.4rem;
    }
    .change-badge.up   { background: #fef2f2; color: var(--ng); }
    .change-badge.down { background: var(--ok-bg); color: var(--ok); }
    .change-badge.flat { background: #f1f5f9; color: #64748b; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"

</head>
<body>

  <header class="app-header">
    <h1>🛢️ 原油高騰コスト影響チェッカー</h1>
    <p class="subtitle">原油価格の変動が物流費・光熱費に与える影響を即試算</p>
  </header>

  <!-- 原油価格カード -->
  <div class="card">
    <p class="card-title">原油価格</p>
    <div class="field-row">
      <div class="field">
        <label for="basePrice">基準価格（円/バレル）</label>
        <input type="number" id="basePrice" placeholder="例: 10000" min="0">
        <p class="hint">値上がり前の単価</p>
      </div>
      <div class="field">
        <label for="curPrice">現在価格（円/バレル）</label>
        <input type="number" id="curPrice" placeholder="例: 13000" min="0">
        <p class="hint">現在の市場単価</p>
      </div>
    </div>
  </div>

  <!-- 物流費カード -->
  <div class="card">
    <p class="card-title">物流費</p>
    <div class="field-row">
      <div class="field">
        <label for="logisticsCost">月間物流費（円）</label>
        <input type="number" id="logisticsCost" placeholder="例: 500000" min="0">
      </div>
      <div class="field">
        <label for="logisticsDep">原油依存率（%）</label>
        <input type="number" id="logisticsDep" placeholder="例: 40" min="0" max="100" value="40">
        <p class="hint">燃料費が占める割合</p>
      </div>
    </div>
  </div>

  <!-- 光熱費カード -->
  <div class="card">
    <p class="card-title">光熱費</p>
    <div class="field-row">
      <div class="field">
        <label for="utilityCost">月間光熱費（円）</label>
        <input type="number" id="utilityCost" placeholder="例: 200000" min="0">
      </div>
      <div class="field">
        <label for="utilityDep">原油依存率（%）</label>
        <input type="number" id="utilityDep" placeholder="例: 30" min="0" max="100" value="30">
        <p class="hint">電気・ガスの原油連動分</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">影響額を試算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">月次コスト増加額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var KEYS = ['basePrice','curPrice','logisticsCost','logisticsDep','utilityCost','utilityDep'];
  var LS_KEY = 'crude-oil-impact-checker-v1';

  // ── localStorage 読み込み ──
  (function load() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      KEYS.forEach(function(k) {
        if (saved[k] !== undefined) {
          var el = document.getElementById(k);
          if (el) el.value = saved[k];
        }
      });
    } catch(e) {}
  })();

  // ── localStorage 保存 ──
  function save() {
    try {
      var data = {};
      KEYS.forEach(function(k) {
        var el = document.getElementById(k);
        if (el) data[k] = el.value;
      });
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function calc() {
    var base = parseFloat(document.getElementById('basePrice').value);
    var cur  = parseFloat(document.getElementById('curPrice').value);
    var lCost = parseFloat(document.getElementById('logisticsCost').value);
    var lDep  = parseFloat(document.getElementById('logisticsDep').value);
    var uCost = parseFloat(document.getElementById('utilityCost').value);
    var uDep  = parseFloat(document.getElementById('utilityDep').value);

    if (isNaN(base) || base <= 0)  { showErr('基準価格を入力してください'); return; }
    if (isNaN(cur)  || cur  <= 0)  { showErr('現在価格を入力してください'); return; }
    if (isNaN(lCost) || lCost < 0) { showErr('月間物流費を入力してください'); return; }
    if (isNaN(uCost) || uCost < 0) { showErr('月間光熱費を入力してください'); return; }
    if (isNaN(lDep) || lDep < 0 || lDep > 100) { showErr('物流費の原油依存率は0〜100で入力してください'); return; }
    if (isNaN(uDep) || uDep < 0 || uDep > 100) { showErr('光熱費の原油依存率は0〜100で入力してください'); return; }

    save();

    // 変動率
    var changePct = (cur - base) / base * 100;

    // 物流費増加額 = 物流費 × 依存率 × 原油変動率
    var logisticsIncrease = lCost * (lDep / 100) * (changePct / 100);
    // 光熱費増加額
    var utilityIncrease   = uCost * (uDep / 100) * (changePct / 100);

    var totalIncrease = logisticsIncrease + utilityIncrease;

    // 判定（月次コスト増の絶対値で判断）
    var absTotal = Math.abs(totalIncrease);
    var level, msg;
    if (changePct <= 0) {
      level = 'ok';
      msg = '原油価格が下落しています。コストは減少傾向です。';
    } else if (absTotal < 100000) {
      level = 'ok';
      msg = '影響は軽微です。現状の価格・コスト構造で対応できる範囲です。';
    } else if (absTotal < 500000) {
      level = 'warn';
      msg = '影響が出ています。値上げや節約策の検討を始めましょう。';
    } else {
      level = 'ng';
      msg = '影響が大きいです。早急に価格転嫁・コスト削減の対策が必要です。';
    }

    var sign = totalIncrease >= 0 ? '+' : '';
    showResult(level, sign + fmt(totalIncrease) + ' 円/月', msg);

    var changePctStr = (changePct >= 0 ? '+' : '') + changePct.toFixed(1) + '%';
    showDetail([
      ['原油価格変動率', changePctStr],
      ['物流費（月間）', fmt(lCost) + ' 円'],
      ['　うち原油連動分', fmt(lCost * lDep / 100) + ' 円（' + lDep + '%）'],
      ['　コスト増加額', (logisticsIncrease >= 0 ? '+' : '') + fmt(logisticsIncrease) + ' 円'],
      ['光熱費（月間）', fmt(uCost) + ' 円'],
      ['　うち原油連動分', fmt(uCost * uDep / 100) + ' 円（' + uDep + '%）'],
      ['　コスト増加額', (utilityIncrease >= 0 ? '+' : '') + fmt(utilityIncrease) + ' 円'],
      ['合計コスト増加額', (totalIncrease >= 0 ? '+' : '') + fmt(totalIncrease) + ' 円/月', true],
      ['年間換算', (totalIncrease >= 0 ? '+' : '') + fmt(totalIncrease * 12) + ' 円/年'],
    ]);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
