<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格改定シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-sub {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.7rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); }
  </style>

<body>

  <header class="app-header">
    <h1>価格改定シミュレーター</h1>
    <p class="subtitle">仕入れ原価と目標利益率から適正販売価格を即算出</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">原価・コスト入力</p>
    <div class="row2">
      <div class="field">
        <label for="cost-old">現行仕入れ原価（円）</label>
        <input type="number" id="cost-old" placeholder="例: 800" min="0">
      </div>
      <div class="field">
        <label for="cost-new">値上げ後の仕入れ原価（円）</label>
        <input type="number" id="cost-new" placeholder="例: 950" min="0">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">販売価格・利益率</p>
    <div class="row2">
      <div class="field">
        <label for="price-cur">現行販売価格（円）</label>
        <input type="number" id="price-cur" placeholder="例: 1200" min="0">
      </div>
      <div class="field">
        <label for="margin">目標粗利率（%）</label>
        <input type="number" id="margin" placeholder="例: 30" min="0" max="99.9" step="0.1">
        <p class="hint">粗利率 = (売価 − 原価) ÷ 売価 × 100</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">適正販売価格</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">シミュレーション内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 比較カード -->
  <div class="card" id="compare" style="display:none">
    <p class="card-title">現行 vs 改定後の比較</p>
    <table class="detail-table"><tbody id="cb"></tbody></table>
  </div>

  <button class="btn-sub" id="btn-clear" onclick="clearAll()" style="display:none">入力をクリア</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'price-revision-sim';

  function getVal(id) {
    var v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? null : v;
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  function calc() {
    var costOld = getVal('cost-old');
    var costNew = getVal('cost-new');
    var priceCur = getVal('price-cur');
    var marginPct = getVal('margin');

    if (costNew === null || marginPct === null) {
      showErr('値上げ後の仕入れ原価と目標粗利率は必須です');
      return;
    }

    if (marginPct >= 100) {
      showErr('粗利率は100%未満で入力してください');
      return;
    }

    // 適正販売価格 = 原価 ÷ (1 - 粗利率/100)
    var newPrice = costNew / (1 - marginPct / 100);

    // 判定
    var level, msg;
    var priceUp = 0;
    var priceUpPct = 0;

    if (priceCur !== null && priceCur > 0) {
      priceUp = newPrice - priceCur;
      priceUpPct = (priceUp / priceCur) * 100;

      if (priceUpPct <= 0) {
        level = 'ok';
        msg = '現行価格のままで目標粗利率を達成できます';
      } else if (priceUpPct <= 10) {
        level = 'ok';
        msg = '値上げ幅は' + priceUpPct.toFixed(1) + '%（小幅な改定で対応可能）';
      } else if (priceUpPct <= 20) {
        level = 'warn';
        msg = '値上げ幅は' + priceUpPct.toFixed(1) + '%（顧客への説明が必要な水準）';
      } else {
        level = 'ng';
        msg = '値上げ幅は' + priceUpPct.toFixed(1) + '%（大幅な改定が必要）';
      }
    } else {
      level = 'ok';
      msg = '目標粗利率 ' + marginPct + '% を達成する販売価格です';
    }

    // 結論表示
    showResult(level, fmt(Math.ceil(newPrice)) + ' 円', msg);

    // 内訳
    var rows = [
      ['値上げ後の仕入れ原価', fmt(costNew) + ' 円'],
      ['目標粗利率', marginPct + ' %'],
      ['適正販売価格', fmt(Math.ceil(newPrice)) + ' 円', true],
      ['1個あたりの粗利額', fmt(Math.ceil(newPrice - costNew)) + ' 円']
    ];

    if (costOld !== null) {
      var costDiff = costNew - costOld;
      var costUpPct = costOld > 0 ? ((costDiff / costOld) * 100).toFixed(1) : '—';
      rows.push(['原価上昇額', (costDiff >= 0 ? '+' : '') + fmt(costDiff) + ' 円']);
      rows.push(['原価上昇率', costUpPct + ' %']);
    }

    showDetail(rows);

    // 比較表
    if (priceCur !== null && priceCur > 0) {
      var curMargin = costOld !== null ? ((priceCur - costOld) / priceCur * 100).toFixed(1) : '—';
      var newMarginActual = ((newPrice - costNew) / newPrice * 100).toFixed(1);

      var compRows = [
        ['現行販売価格', fmt(priceCur) + ' 円'],
        ['適正販売価格（改定後）', fmt(Math.ceil(newPrice)) + ' 円'],
        ['値上げ額', (priceUp >= 0 ? '+' : '') + fmt(Math.ceil(priceUp)) + ' 円', true],
        ['値上げ率', (priceUp >= 0 ? '+' : '') + priceUpPct.toFixed(1) + ' %']
      ];

      if (costOld !== null) {
        compRows.push(['現行の粗利率', curMargin + ' %']);
      }
      compRows.push(['改定後の粗利率', newMarginActual + ' %']);

      showCompare(compRows);
    } else {
      document.getElementById('compare').style.display = 'none';
    }

    document.getElementById('btn-clear').style.display = '';
    saveData();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level; rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showCompare(rows) {
    document.getElementById('cb').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('compare').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('compare').style.display = 'none';
  }

  function clearAll() {
    document.getElementById('cost-old').value = '';
    document.getElementById('cost-new').value = '';
    document.getElementById('price-cur').value = '';
    document.getElementById('margin').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('compare').style.display = 'none';
    document.getElementById('btn-clear').style.display = 'none';
    localStorage.removeItem(LS_KEY);
  }

  function saveData() {
    var obj = {
      costOld: document.getElementById('cost-old').value,
      costNew: document.getElementById('cost-new').value,
      priceCur: document.getElementById('price-cur').value,
      margin: document.getElementById('margin').value
    };
    localStorage.setItem(LS_KEY, JSON.stringify(obj));
  }

  function loadData() {
    var raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    try {
      var obj = JSON.parse(raw);
      if (obj.costOld) document.getElementById('cost-old').value = obj.costOld;
      if (obj.costNew) document.getElementById('cost-new').value = obj.costNew;
      if (obj.priceCur) document.getElementById('price-cur').value = obj.priceCur;
      if (obj.margin) document.getElementById('margin').value = obj.margin;
    } catch(e) {}
  }

  loadData();
  </script>
