<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>固定費見直しシミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>固定費見直しシミュレーター</h1>

    <!-- 売上入力セクション -->
    <section class="card">
      <h2>月間売上（任意）</h2>
      <div class="input-row">
        <label>月間売上（円）</label>
        <input type="number" id="revenue" placeholder="例：1000000" min="0">
      </div>
    </section>

    <!-- 固定費追加フォーム -->
    <section class="card">
      <h2>固定費を追加</h2>
      <div class="input-row">
        <label>項目名</label>
        <input type="text" id="itemName" placeholder="例：家賃、水道光熱費">
      </div>
      <div class="input-row">
        <label>金額（円）</label>
        <input type="number" id="itemAmount" placeholder="例：50000" min="0">
      </div>
      <div class="input-row checkbox-row">
        <label>
          <input type="checkbox" id="itemReducible">
          削減可能な項目
        </label>
      </div>
      <button class="btn-primary" onclick="addItem()">追加</button>
    </section>

    <!-- 固定費一覧 -->
    <section class="card">
      <h2>固定費一覧</h2>
      <div id="itemList" class="item-list">
        <p class="empty-msg">まだ固定費が登録されていません</p>
      </div>
      <div class="summary">
        <div class="summary-row">
          <span>固定費合計</span>
          <span id="totalFixed">0 円</span>
        </div>
        <div class="summary-row reducible">
          <span>削減可能合計</span>
          <span id="totalReducible">0 円</span>
        </div>
        <div class="summary-row profit" id="profitRow" style="display:none">
          <span>現状利益額</span>
          <span id="currentProfit">0 円</span>
        </div>
        <div class="summary-row profit-rate" id="profitRateRow" style="display:none">
          <span>現状利益率</span>
          <span id="currentProfitRate">0 %</span>
        </div>
      </div>
    </section>

    <!-- 削減シミュレーション -->
    <section class="card">
      <h2>削減シミュレーション</h2>
      <div class="input-row">
        <label>削減率: <strong id="rateLabel">20</strong>%</label>
        <input type="range" id="reductionRate" min="5" max="50" step="5" value="20"
               oninput="updateRate(this.value)">
      </div>
      <div class="result-box">
        <div class="result-row">
          <span>削減見込み額</span>
          <strong id="savingAmount" class="highlight">0 円</strong>
        </div>
        <div class="result-row">
          <span>削減後 固定費合計</span>
          <strong id="afterFixed">0 円</strong>
        </div>
        <div class="result-row" id="afterProfitRow" style="display:none">
          <span>削減後 利益改善額</span>
          <strong id="afterProfit" class="highlight-green">0 円</strong>
        </div>
        <div class="result-row" id="afterProfitRateRow" style="display:none">
          <span>削減後 利益率</span>
          <strong id="afterProfitRate">0 %</strong>
        </div>
      </div>
    </section>

    <button class="btn-danger" onclick="clearAll()">全データ削除</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
