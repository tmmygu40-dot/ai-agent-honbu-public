<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配送積載チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>配送積載チェッカー</h1>

    <section class="limit-section">
      <label for="limitInput">積載上限（kg）</label>
      <div class="limit-row">
        <input type="number" id="limitInput" min="0" step="0.1" placeholder="例：2000">
        <button id="setLimitBtn">設定</button>
      </div>
      <p class="limit-display">現在の上限：<span id="limitDisplay">2000</span> kg</p>
    </section>

    <section class="input-section">
      <h2>荷物を追加</h2>
      <div class="input-row">
        <input type="text" id="nameInput" placeholder="荷物名">
        <input type="number" id="weightInput" min="0" step="0.1" placeholder="重量（kg）">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <section class="summary-section">
      <div class="summary-bar" id="summaryBar">
        <div class="summary-item">
          <span class="summary-label">合計重量</span>
          <span class="summary-value" id="totalWeight">0.0</span>
          <span class="summary-unit">kg</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">残り積載可能</span>
          <span class="summary-value" id="remaining">2000.0</span>
          <span class="summary-unit">kg</span>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="status-msg" id="statusMsg"></p>
    </section>

    <section class="list-section">
      <h2>荷物一覧 <span class="count" id="itemCount">0件</span></h2>
      <ul id="itemList" class="item-list">
        <li class="empty-msg">荷物が登録されていません</li>
      </ul>
      <button id="clearBtn" class="clear-btn">すべて削除</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
