<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コスト削減手法逆引きアプリ</title>
  <meta name="description" content="仕入れ・人件費・光熱費など削りたいコスト種別を選ぶだけで、すぐ実行できる削減手法と具体的なアクションポイントを即逆引きできるビジネス向け実践アプリ。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリボタン ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }
    .btn-cat {
      padding: 0.7rem 0.4rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
    }
    .btn-cat:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .btn-cat.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
      box-shadow: 0 3px 0 #b35e00;
    }
    .btn-cat .cat-icon { font-size: 1.3rem; display: block; margin-bottom: 0.2rem; }

    /* ── 手法リスト ── */
    #method-area { display: none; }
    .method-count {
      font-size: 0.78rem; color: var(--text-sub);
      max-width: 600px; margin: 0 auto 0.5rem;
      padding: 0 0.2rem;
    }
    .method-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.75rem;
      max-width: 600px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .method-card:hover { border-color: var(--accent); }
    .method-card.open { border-color: var(--accent); }
    .method-header {
      display: flex; align-items: center; gap: 0.6rem; justify-content: space-between;
    }
    .method-name {
      font-size: 0.98rem; font-weight: 800; color: var(--text); line-height: 1.4; flex: 1;
    }
    .method-tags { display: flex; gap: 0.35rem; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .tag {
      font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem;
      border-radius: 20px; white-space: nowrap;
    }
    .tag-easy   { background: #f0fdf4; color: var(--ok); border: 1px solid #bbf7d0; }
    .tag-mid    { background: var(--warn-bg); color: var(--warn); border: 1px solid #fde68a; }
    .tag-hard   { background: var(--ng-bg); color: var(--ng); border: 1px solid #fecaca; }
    .tag-speed  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .tag-medium { background: #faf5ff; color: #7e22ce; border: 1px solid #e9d5ff; }
    .tag-long   { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .method-effect {
      font-size: 0.8rem; color: var(--text-sub); margin-top: 0.4rem; line-height: 1.4;
    }
    .method-detail {
      display: none;
      margin-top: 0.8rem; padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }
    .method-card.open .method-detail { display: block; }
    .detail-row {
      display: grid; grid-template-columns: 5.5em 1fr;
      gap: 0.3rem 0.6rem; font-size: 0.85rem; margin-bottom: 0.5rem;
    }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-key { font-weight: 700; color: var(--accent); }
    .detail-val { color: var(--text); line-height: 1.5; }
    .chevron { font-size: 0.75rem; color: var(--text-sub); transition: transform 0.15s; flex-shrink: 0; }
    .method-card.open .chevron { transform: rotate(180deg); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-cat, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .method-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      .method-detail { display: block !important; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>コスト削減手法逆引きアプリ</h1>
    <p class="subtitle">削りたいコスト種別を選ぶだけ → すぐ実行できる削減手法を即逆引き</p>
  </header>

  <!-- カテゴリ選択 -->
  <div class="card">
    <p class="card-title">コスト種別を選ぶ</p>
    <div class="category-grid">
      <button class="btn-cat" onclick="selectCat('仕入れ')">
        <span class="cat-icon">📦</span>仕入れ
      </button>
      <button class="btn-cat" onclick="selectCat('人件費')">
        <span class="cat-icon">👥</span>人件費
      </button>
      <button class="btn-cat" onclick="selectCat('光熱費')">
        <span class="cat-icon">💡</span>光熱費
      </button>
      <button class="btn-cat" onclick="selectCat('通信費')">
        <span class="cat-icon">📡</span>通信費
      </button>
      <button class="btn-cat" onclick="selectCat('広告費')">
        <span class="cat-icon">📣</span>広告費
      </button>
      <button class="btn-cat" onclick="selectCat('その他')">
        <span class="cat-icon">🗂️</span>その他
      </button>
    </div>
  </div>

  <!-- 手法リスト -->
  <div id="method-area">
    <p class="method-count" id="method-count"></p>
    <div id="method-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、経済産業省・中小企業庁・公正取引委員会などの資料や実務知見をもとに、目安として整理しています。業種・規模によって効果は異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var DATA = {
    '仕入れ': [
      {
        name: '複数社見積もり比較・競合交渉',
        difficulty: '低', effect: '5〜15%削減', time: 'すぐできる',

        point: '1品目だけでもやってみると交渉の感覚が掴める。金額の大きい上位3品目から始めると効果が出やすい。'
      },
      {
        name: 'ロット発注増量・まとめ買い交渉',
        difficulty: '低', effect: '3〜10%削減', time: 'すぐできる',

      {
        name: '早期支払い割引（早払い交渉）',

      {

        difficulty: '中', effect: '10〜30%削減', time: '要検討',

        point: 'まず小ロットで試験導入してから判断する。顧客クレームリスクを先に評価すること。'

        point: '中核業務・長期的な戦力はむしろ社員化したほうがいい場合もある。業務内容と繁忙パターンで判断する。'

      {
        name: '残業削減・ノー残業デー導入',
        difficulty: '低', effect: '残業代10〜30%削減', time: 'すぐできる',
        action: '週1日ノー残業デーを設定し、定時退社を前提にした業務設計に切り替える。残業代の実額を可視化することが先決。',
        point: 'まず残業が多い部署の原因を特定する。人手不足が原因なら採用、業務過多なら工程改善が先。'

  var DIFF_TAG = {
    '低': 'tag-easy',
    '中': 'tag-mid',
    '高': 'tag-hard'
  };
  var TIME_TAG = {
    'すぐできる': 'tag-speed',
    '要検討': 'tag-medium',
    '中長期': 'tag-long'
  };

  var currentCat = null;
  var openIndex = null;

  function selectCat(cat) {
    currentCat = cat;
    // ボタン状態更新
    var btns = document.querySelectorAll('.btn-cat');
    btns.forEach(function(b) {
      b.classList.toggle('active', b.textContent.trim().includes(cat));
    });
    // localStorage保存
    localStorage.setItem('cost_reduction_cat', cat);
    // リスト表示
    renderMethods(cat);
  }

  function renderMethods(cat) {
    var methods = DATA[cat] || [];
    var area = document.getElementById('method-area');
    var countEl = document.getElementById('method-count');
    var listEl = document.getElementById('method-list');
    openIndex = null;

    countEl.textContent = cat + ' の削減手法：' + methods.length + '件';
    listEl.innerHTML = methods.map(function(m, i) {
      return '<div class="method-card" id="mc-' + i + '" onclick="toggleMethod(' + i + ')">'
        + '<div class="method-header">'
        + '<span class="method-name">' + m.name + '</span>'
        + '<div class="method-tags">'
        + '<span class="tag ' + DIFF_TAG[m.difficulty] + '">難易度:' + m.difficulty + '</span>'
        + '<span class="tag ' + TIME_TAG[m.time] + '">' + m.time + '</span>'
        + '</div>'
        + '<span class="chevron">▼</span>'
        + '</div>'
        + '<div class="method-effect">効果目安：' + m.effect + '</div>'
        + '<div class="method-detail">'
        + '<div class="detail-row"><span class="detail-key">実施方法</span><span class="detail-val">' + m.action + '</span></div>'
        + '<div class="detail-row"><span class="detail-key">実行ポイント</span><span class="detail-val">' + m.point + '</span></div>'
        + '</div>'
        + '</div>';
    }).join('');

    area.style.display = 'block';
  }

  function toggleMethod(i) {
    var card = document.getElementById('mc-' + i);
    if (!card) return;
    if (openIndex === i) {
      card.classList.remove('open');
      openIndex = null;
    } else {
      if (openIndex !== null) {
        var prev = document.getElementById('mc-' + openIndex);
        if (prev) prev.classList.remove('open');
      }
      card.classList.add('open');
      openIndex = i;
    }
  }

  // localStorage から復元
  (function() {
    var saved = localStorage.getItem('cost_reduction_cat');
    if (saved && DATA[saved]) {
      selectCat(saved);
    }
  })();
  </script>
