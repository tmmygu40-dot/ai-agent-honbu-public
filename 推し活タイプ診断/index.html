<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活タイプ診断｜3択10問であなたのスタイル判定</title>
  <meta name="description" content="3択10問に答えるだけで、あなたの推し活スタイルを5タイプから診断します。ライブ参戦派？考察派？コレクター？創作派？マイペース派？自分の推し方の傾向と相性タイプが分かる無料診断です。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 質問・選択肢 ── */
    .q-block { margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--border); }
    .q-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; }
    .q-text { font-size: 0.98rem; font-weight: 700; line-height: 1.5; margin: 0.3rem 0 0.7rem; }
    .opt {
      display: block;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.45rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 0.92rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input { margin-right: 0.55rem; vertical-align: middle; }
    .opt:hover { border-color: var(--accent); }
    .opt.selected { background: var(--accent-light); border-color: var(--accent); font-weight: 600; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; margin: 0.8rem auto 0; padding: 0.6rem 1.4rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-emoji-big { font-size: 3.2rem; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.3rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; color: var(--accent); line-height: 1.2; margin-bottom: 0.6rem; }
    .result-note { font-size: 0.92rem; color: var(--text); line-height: 1.6; text-align: left; }
    .result-sub  { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; margin-top: 0.8rem; padding-top: 0.7rem; border-top: 1px solid var(--border); text-align: left; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌟 推し活タイプ診断</h1>
    <p class="subtitle">3択10問であなたの推し活スタイルを5タイプから判定</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <p class="card-title">質問（全10問・3択）</p>
    <div id="questions"></div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">🔮 診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">🌟</p>
    <p class="result-label">あなたの推し活タイプは</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
    <p class="result-sub"   id="rs"></p>
    <button class="btn-reset" onclick="resetQuiz()">🔄 もう一度診断する</button>
  </div>

  <!-- スコア内訳 -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">タイプ別スコア内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎈 これは推し活ファン向けの娯楽・エンタメ診断です。回答パターンから5タイプに分類しているだけなので、結果はあくまで参考としてお楽しみください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── タイプ定義 ──
  var TYPES = {
    live:    { name: '熱狂ライブ参戦型',   emoji: '🔥', desc: '推しのライブ・現場こそ命。会場の熱気と一体感に全身でダイブする現場派。遠征も交通費も「未来への投資」と言い切れる、推し活の体育会系。', match: 'コレクター型と組むと「現場で買って持ち帰る」最強コンビに。' },
    think:   { name: 'じっくり考察派',     emoji: '🧐', desc: '推しの一挙手一投足にも意味を見出す解釈マスター。MV・歌詞・SNS投稿を分析して語り合う時間が至福。考察スレを読み漁るタイプ。', match: '創作応援型と相性◎。考察ネタが二次創作の燃料になる。' },
    collect: { name: 'コレクター型',       emoji: '📦', desc: 'グッズ・写真集・初回限定盤・複製サインなど、目に見える形で愛を積み上げる収集家。棚に並んだ推しを眺める時間が一番幸せ。', match: '熱狂ライブ型とタッグで「現場限定品」も逃さない布陣。' },
    create:  { name: '創作応援型',         emoji: '🎨', desc: 'ファンアート・小説・SNSでの推し布教など、自分から発信して推しの魅力を広める創造系。推しの新しい一面を作品で表現するのが得意。', match: 'じっくり考察派と組めば、深い解釈に裏打ちされた創作で人気沸騰。' },
    chill:   { name: 'マイペース癒し型',   emoji: '🌸', desc: '無理せず、自分のペースで穏やかに推しを愛でるタイプ。日常の隙間で推しの動画を見て癒される、長く続く推し活の極意を知る賢者。', match: 'どのタイプとも円満。特にコレクター型と「眺めて満たされる」共感が深い。' }
  };
  var TYPE_KEYS = ['live','think','collect','create','chill'];

  // ── 質問・選択肢（各選択肢に各タイプへのスコア） ──
  var QUESTIONS = [
    {
      q: 'Q1. 推しの新曲リリース！まずやることは？',
      opts: [
        { t: 'ライブ・イベント情報をチェックして遠征計画を立てる', s: { live:2, collect:1 } },
        { t: '歌詞・MVをじっくり何度も見て解釈を考える',           s: { think:2, create:1 } },
        { t: '初回限定盤・グッズ予約サイトを開く',                 s: { collect:2, live:1 } }
      ]
    },
    {
      q: 'Q2. 推し活に使うお金で一番大きい項目は？',
      opts: [
        { t: 'ライブ・遠征・チケット代',                           s: { live:2 } },
        { t: 'グッズ・CD・写真集・ぬいぐるみ',                     s: { collect:2 } },
        { t: 'サブスク・配信・おうち時間用の機材',                 s: { chill:2, think:1 } }
      ]
    },
    {
      q: 'Q3. SNSで推しの話をするとき、よくやるのは？',
      opts: [
        { t: '現場レポ・座席ガチャ報告で盛り上がる',               s: { live:2 } },
        { t: '考察・伏線回収のスレッドを書く',                     s: { think:2 } },
        { t: 'ファンアート・推しメイク・編集動画を投稿',           s: { create:2 } }
      ]
    },
    {
      q: 'Q4. 推しの誕生日、何して祝う？',
      opts: [
        { t: '誕生日記念グッズを爆買い、ケーキも買って棚に並べる', s: { collect:2, chill:1 } },
        { t: 'ファンアートやお祝い動画を作ってSNSに投稿',          s: { create:2 } },
        { t: 'バースデーイベント・ライブビューイングに参加',       s: { live:2 } }
      ]
    },
    {
      q: 'Q5. 推しの新ビジュ解禁！最初にすることは？',
      opts: [
        { t: '保存して壁紙にして、しばらく眺めて余韻に浸る',       s: { chill:2, collect:1 } },
        { t: '衣装・小物の意味やコンセプトを考察',                 s: { think:2 } },
        { t: '構図を真似してファンアートを描く・写真を撮る',       s: { create:2 } }
      ]
    },
    {
      q: 'Q6. 同担と話すとき、どのテーマが一番盛り上がる？',
      opts: [
        { t: '次の現場どこ行く？遠征計画と参戦履歴',               s: { live:2 } },
        { t: '最新グッズの開封報告・コレクション自慢',             s: { collect:2 } },
        { t: '推しのあの行動の意図は？深読み解釈バトル',           s: { think:2 } }
      ]
    },
    {
      q: 'Q7. 推し活の理想の休日は？',
      opts: [
        { t: '朝から会場入り、終演後は同担と打ち上げで完全燃焼',   s: { live:2 } },
        { t: '推しの過去動画・配信を1日中ぼーっと見て癒される',    s: { chill:2 } },
        { t: '集めたグッズを並べ替え・整理して棚をアップデート',   s: { collect:2 } }
      ]
    },
    {
      q: 'Q8. 推し活のモチベは何？',
      opts: [
        { t: '推しを世の中に広めたい・自分の手で布教したい',       s: { create:2, live:1 } },
        { t: '推しを深く理解したい・誰よりも知りたい',             s: { think:2 } },
        { t: '推しの存在で日々の生活が回復する・癒される',         s: { chill:2 } }
      ]
    },
    {
      q: 'Q9. 推しの限定グッズが抽選販売。どうする？',
      opts: [
        { t: '全口数フルで応募・必要なら現地販売も並ぶ',           s: { collect:2, live:1 } },
        { t: 'デザインの意味を考察してから、欲しいものだけ申し込む', s: { think:2 } },
        { t: '無理しない範囲で1口だけ。当たればラッキー',          s: { chill:2 } }
      ]
    },
    {
      q: 'Q10. 推し活で大切にしているのは？',
      opts: [
        { t: '推しと同じ時間・空間を共有する一体感',               s: { live:2 } },
        { t: '推しの世界観を自分の作品として表現すること',         s: { create:2 } },
        { t: '長く穏やかに続けられる、自分らしいペース',           s: { chill:2 } }
      ]
    }
  ];

  var STORAGE_KEY = 'oshikatsu_type_result';

  // ── 質問描画 ──
  function renderQuestions() {
    var html = '';
    QUESTIONS.forEach(function(q, qi) {
      html += '<div class="q-block">';
      html += '<p class="q-num">Q' + (qi+1) + ' / ' + QUESTIONS.length + '</p>';
      html += '<p class="q-text">' + q.q.replace(/^Q\d+\.\s*/, '') + '</p>';
      q.opts.forEach(function(opt, oi) {
        html += '<label class="opt" data-q="' + qi + '">';
        html += '<input type="radio" name="q' + qi + '" value="' + oi + '">';
        html += opt.t;
        html += '</label>';
      });
      html += '</div>';
    });
    document.getElementById('questions').innerHTML = html;

    // 選択肢クリック時のハイライト
    document.querySelectorAll('.opt').forEach(function(label) {
      label.addEventListener('click', function() {
        var qi = label.getAttribute('data-q');
        document.querySelectorAll('.opt[data-q="' + qi + '"]').forEach(function(l) {
          l.classList.remove('selected');
        });
        label.classList.add('selected');
      });
    });
  }

  // ── 診断 ──
  function diagnose() {
    var scores = { live:0, think:0, collect:0, create:0, chill:0 };
    var unanswered = [];

    QUESTIONS.forEach(function(q, qi) {
      var sel = document.querySelector('input[name="q' + qi + '"]:checked');
      if (!sel) { unanswered.push(qi+1); return; }
      var opt = q.opts[parseInt(sel.value, 10)];
      Object.keys(opt.s).forEach(function(k) {
        scores[k] += opt.s[k];
      });
    });

    if (unanswered.length > 0) {
      alert('未回答の質問があります：Q' + unanswered.join(', Q'));
      return;
    }

    // 最高得点のタイプを採用（同点はTYPE_KEYS順で先のものを採用）
    var topKey = TYPE_KEYS[0];
    TYPE_KEYS.forEach(function(k) {
      if (scores[k] > scores[topKey]) topKey = k;
    });

    showResult(topKey, scores);

    // localStorage 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ type: topKey, scores: scores, date: new Date().toISOString() }));
    } catch (e) {}
  }

  function showResult(topKey, scores) {
    var t = TYPES[topKey];
    var rc = document.getElementById('result');
    document.getElementById('re').textContent = t.emoji;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rn').textContent = t.desc;
    document.getElementById('rs').textContent = '💞 相性のいいタイプ：' + t.match;
    rc.classList.add('show');

    // スコア内訳
    var rows = TYPE_KEYS.map(function(k) {
      var name = TYPES[k].emoji + ' ' + TYPES[k].name;
      var val  = scores[k] + ' pt';
      var hl   = (k === topKey);
      return '<tr' + (hl ? ' class="hl"' : '') + '><td>' + name + '</td><td>' + val + '</td></tr>';
    });
    document.getElementById('db').innerHTML = rows.join('');
    document.getElementById('detail').style.display = 'block';

    // 結果までスクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetQuiz() {
    document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
    document.querySelectorAll('.opt').forEach(function(l) { l.classList.remove('selected'); });
    document.getElementById('result').classList.remove('show');
    document.getElementById('detail').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── 起動時 ──
  renderQuestions();

  // 前回結果があれば、参考表示（自動で結果を出すまではしない）
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var data = JSON.parse(saved);
      if (data && data.type && TYPES[data.type]) {
        var hint = document.createElement('p');
        hint.style.cssText = 'max-width:600px;margin:0 auto 1rem;padding:0.6rem 0.9rem;background:#fff8ee;border:1px solid #e8ddd0;border-radius:9px;font-size:0.78rem;color:#78716c;text-align:center;';
        hint.textContent = '前回の診断結果：' + TYPES[data.type].emoji + ' ' + TYPES[data.type].name;
        var quizCard = document.getElementById('quiz-card');
        quizCard.parentNode.insertBefore(hint, quizCard);
      }
    }
  } catch (e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
