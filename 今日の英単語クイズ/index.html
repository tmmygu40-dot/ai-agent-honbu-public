<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日の英単語クイズ | 1日10語英語クイズゲーム</title>
    <meta name="description" content="毎日異なる英単語を日本語4択で当てるクイズゲーム。1日10語を楽しく学べます。スコアはブラウザに保存。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .quiz-status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
        }

        .word-display {
            background: #f0f4ff;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }

        .word-display .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .word-display .word {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 2px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .option {
            background: #f9f9f9;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: #667eea;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
        }

        .result-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .result-message {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-message.correct {
            color: #4caf50;
        }

        .result-message.incorrect {
            color: #f44336;
        }

        .score-display {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .score-display .label {
            font-size: 12px;
            opacity: 0.9;
        }

        .score-display .score {
            font-size: 36px;
            font-weight: bold;
            margin-top: 5px;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            background: #667eea;
            height: 100%;
            transition: width 0.3s ease;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media print {
            body {
                background: white;
            }

            .btn-pdf {
                display: none;
            }
        }

        .btn-pdf {
            background: #4caf50;
            color: white;
            margin-bottom: 10px;
            width: 100%;
        }

        .btn-pdf:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 今日の英単語クイズ</h1>
        <p class="subtitle">毎日10語の英単語を日本語で当てよう</p>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="quiz-status">
            <span id="questionNumber">1</span> / 10 問
        </div>

        <div id="quizContent">
            <div class="word-display">
                <div class="label">英語</div>
                <div class="word" id="wordDisplay">apple</div>
            </div>

            <div class="options" id="optionsContainer"></div>

            <div id="resultCard" class="result-card" style="display:none;">
                <div class="result-message" id="resultMessage"></div>
                <div id="resultExplanation"></div>
            </div>

            <div class="button-group">
                <button class="btn-submit" id="nextBtn" onclick="nextQuestion()">次へ</button>
                <button class="btn-reset" onclick="resetQuiz()">リセット</button>
            </div>
        </div>

        <div id="finishContent" style="display:none;">
            <div class="score-display">
                <div class="label">最終スコア</div>
                <div class="score" id="finalScore">0/10</div>
            </div>

            <div style="text-align:center; margin-bottom:20px;">
                <p id="scoreMessage"></p>
            </div>

            <button class="btn-reset" onclick="resetQuiz()">もう一度挑戦</button>
        </div>

        <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>
    </div>

    <script src="../related-widget.js"></script>
    <script src="../fav-widget.js"></script>
    <script data-goatcounter="https://tmmygu40.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>

    <script>
        const quizData = [
            { word: 'apple', options: ['リンゴ', '花', '木', 'バナナ'], correct: 0 },
            { word: 'ocean', options: ['山', '海', '川', '湖'], correct: 1 },
            { word: 'sunrise', options: ['日の出', '日没', '月明かり', '星'], correct: 0 },
            { word: 'laugh', options: ['泣く', '笑う', '走る', '歩く'], correct: 1 },
            { word: 'courage', options: ['恐怖', '勇気', '悲しみ', '怒り'], correct: 1 },
            { word: 'journey', options: ['家', '旅', '学校', '病院'], correct: 1 },
            { word: 'bright', options: ['暗い', '明るい', '古い', '新しい'], correct: 1 },
            { word: 'silence', options: ['音', '静寂', '歌', '話'], correct: 1 },
            { word: 'freedom', options: ['奴隷', '自由', '獄中', '鎖'], correct: 1 },
            { word: 'wisdom', options: ['愚か', '知恵', '狂気', '病気'], correct: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;
        let answered = false;

        function init() {
            const saved = localStorage.getItem('quizScore');
            if (saved) {
                score = parseInt(saved);
            }
            displayQuestion();
        }

        function displayQuestion() {
            if (currentQuestion >= 10) {
                showFinish();
                return;
            }

            answered = false;
            selectedAnswer = null;

            const data = quizData[currentQuestion];
            document.getElementById('wordDisplay').textContent = data.word;
            document.getElementById('questionNumber').textContent = currentQuestion + 1;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            data.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });

            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('nextBtn').textContent = '次へ';
            document.getElementById('nextBtn').disabled = true;

            updateProgress();
        }

        function selectAnswer(index) {
            if (answered) return;

            selectedAnswer = index;
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (selectedAnswer === null && !answered) return;

            if (!answered) {
                const data = quizData[currentQuestion];
                const correct = selectedAnswer === data.correct;

                const options = document.querySelectorAll('.option');
                if (correct) {
                    options[selectedAnswer].classList.add('correct');
                    score++;
                } else {
                    options[selectedAnswer].classList.add('incorrect');
                    options[data.correct].classList.add('correct');
                }

                const resultCard = document.getElementById('resultCard');
                const messageClass = correct ? 'correct' : 'incorrect';
                const messageText = correct ? '✓ 正解！' : '✗ 不正解';
                const explanation = correct ? '' : `正解は「${quizData[currentQuestion].options[data.correct]}」です`;

                resultCard.innerHTML = `
                    <div class="result-message ${messageClass}">${messageText}</div>
                    <div id="resultExplanation">${explanation}</div>
                `;
                resultCard.style.display = 'block';

                answered = true;
                document.getElementById('nextBtn').textContent = '次の問題へ';
            } else {
                currentQuestion++;
                displayQuestion();
            }
        }

        function showFinish() {
            localStorage.setItem('quizScore', score);

            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('finishContent').style.display = 'block';
            document.getElementById('finalScore').textContent = `${score} / 10`;

            const percentage = (score / 10) * 100;
            let message = '';
            if (percentage === 100) {
                message = '🎉 完璧です！英語の達人！';
            } else if (percentage >= 80) {
                message = '⭐ 素晴らしい成績です！';
            } else if (percentage >= 60) {
                message = '👍 まあまあですね。頑張ろう！';
            } else {
                message = '💪 もう一度挑戦してみましょう！';
            }
            document.getElementById('scoreMessage').textContent = message;
        }

        function resetQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedAnswer = null;
            answered = false;
            localStorage.removeItem('quizScore');

            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('finishContent').style.display = 'none';
            displayQuestion();
        }

        function updateProgress() {
            const progress = (currentQuestion / 10) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        init();
    </script>
</body>
</html>
