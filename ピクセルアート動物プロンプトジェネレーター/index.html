<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="動物の種類・ポーズ・ピクセルスタイル・背景を選ぶだけで、画像生成AI向けのピクセルアート動物プロンプトをワンクリックで生成・コピーできる無料ツールです。">
  <title>ピクセルアート動物プロンプトジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.show { display: block; }

    /* ── プロンプト表示 ── */
    .prompt-box {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 1rem; margin-bottom: 1rem;
      font-size: 0.92rem; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
      min-height: 80px;
    }

    /* ── コピー・保存ボタン ── */
    .btn-group {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .btn-copy, .btn-save {
      flex: 1; min-width: 120px; padding: 0.7rem 1rem;
      font-size: 0.9rem; font-weight: 700;
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy {
      background: var(--accent); color: #fff;
    }
    .btn-copy:active { opacity: 0.8; }
    .btn-save {
      background: var(--card); color: var(--accent);
    }
    .btn-save:active { background: var(--accent-light); }

    /* ── お気に入りリスト ── */
    .fav-list { margin-top: 0.8rem; }
    .fav-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-text {
      flex: 1; font-size: 0.85rem; color: var(--text); line-height: 1.5;
      white-space: pre-wrap; word-break: break-all; cursor: pointer;
    }
    .fav-text:hover { color: var(--accent); }
    .fav-del {
      flex-shrink: 0; background: none; border: none;
      color: var(--ng); font-size: 1rem; cursor: pointer; padding: 0 0.3rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>ピクセルアート動物プロンプトジェネレーター</h1>
    <p class="subtitle">動物・スタイル・背景を選ぶだけで画像生成AI向けプロンプトを即生成</p>
  </header>

  <!-- 動物カード -->
  <div class="card">
    <p class="card-title">動物</p>
    <div class="field">
      <label for="animal">動物の種類</label>
      <select id="animal">
        <option value="cat">猫（Cat）</option>
        <option value="dog">犬（Dog）</option>
        <option value="bird">鳥（Bird）</option>
        <option value="rabbit">うさぎ（Rabbit）</option>
        <option value="hamster">ハムスター（Hamster）</option>
        <option value="fox">キツネ（Fox）</option>
        <option value="wolf">オオカミ（Wolf）</option>
        <option value="bear">クマ（Bear）</option>
        <option value="panda">パンダ（Panda）</option>
        <option value="deer">シカ（Deer）</option>
        <option value="owl">フクロウ（Owl）</option>
        <option value="penguin">ペンギン（Penguin）</option>
        <option value="frog">カエル（Frog）</option>
        <option value="turtle">カメ（Turtle）</option>
        <option value="fish">魚（Fish）</option>
        <option value="dragon">ドラゴン（Dragon）</option>
        <option value="dinosaur">恐竜（Dinosaur）</option>
        <option value="unicorn">ユニコーン（Unicorn）</option>
      </select>
    </div>
    <div class="field">
      <label for="animal-custom">カスタム動物名（上記以外）</label>
      <input type="text" id="animal-custom" placeholder="例: レッサーパンダ, フェニックス">
      <p class="hint">入力すると上のセレクトより優先されます</p>
    </div>
  </div>

  <!-- ポーズ・表情カード -->
  <div class="card">
    <p class="card-title">ポーズ・表情</p>
    <div class="field">
      <label for="pose">ポーズ</label>
      <select id="pose">
        <option value="sitting">座っている（Sitting）</option>
        <option value="running">走っている（Running）</option>
        <option value="sleeping">寝ている（Sleeping）</option>
        <option value="standing">立っている（Standing）</option>
        <option value="jumping">ジャンプ（Jumping）</option>
        <option value="flying">飛んでいる（Flying）</option>
        <option value="walking">歩いている（Walking）</option>
        <option value="playing">遊んでいる（Playing）</option>
        <option value="eating">食べている（Eating）</option>
        <option value="fighting">戦闘ポーズ（Fighting stance）</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="happy">にっこり（Happy）</option>
        <option value="cute">かわいい（Cute）</option>
        <option value="cool">クール（Cool）</option>
        <option value="angry">怒り（Angry）</option>
        <option value="sad">悲しい（Sad）</option>
        <option value="surprised">驚き（Surprised）</option>
        <option value="sleepy">眠そう（Sleepy）</option>
        <option value="fierce">凶暴（Fierce）</option>
        <option value="neutral">無表情（Neutral）</option>
      </select>
    </div>
  </div>

  <!-- スタイルカード -->
  <div class="card">
    <p class="card-title">ピクセルスタイル</p>
    <div class="field">
      <label for="pixel-style">解像度スタイル</label>
      <select id="pixel-style">
        <option value="8-bit">8bit（ファミコン風）</option>
        <option value="16-bit">16bit（スーファミ風）</option>
        <option value="32-bit">32bit（PS1風）</option>
        <option value="Game Boy">ゲームボーイ風</option>
        <option value="MSX">MSX風</option>
      </select>
    </div>
    <div class="field">
      <label for="view">アングル</label>
      <select id="view">
        <option value="front view">正面（Front view）</option>
        <option value="side view">横向き（Side view）</option>
        <option value="3/4 view">斜め（3/4 view）</option>
        <option value="top-down view">上から（Top-down）</option>
        <option value="isometric view">アイソメトリック</option>
      </select>
    </div>
    <div class="field">
      <label for="palette">カラーパレット</label>
      <select id="palette">
        <option value="vibrant colors">ビビッドカラー</option>
        <option value="pastel colors">パステルカラー</option>
        <option value="earth tone colors">アースカラー</option>
        <option value="NES color palette">NESパレット</option>
        <option value="Game Boy green monochrome palette">ゲームボーイ緑</option>
        <option value="limited 16-color palette">16色制限</option>
        <option value="warm colors">暖色系</option>
        <option value="cool colors">寒色系</option>
        <option value="monochrome">モノクロ</option>
        <option value="neon colors">ネオンカラー</option>
      </select>
    </div>
  </div>

  <!-- 背景・雰囲気カード -->
  <div class="card">
    <p class="card-title">背景・雰囲気</p>
    <div class="field">
      <label for="bg-type">背景</label>
      <select id="bg-type">
        <option value="transparent background">透過背景</option>
        <option value="solid color background">単色背景</option>
        <option value="grassy field background">草原</option>
        <option value="forest background">森</option>
        <option value="ocean background">海</option>
        <option value="sky with clouds background">空と雲</option>
        <option value="night sky with stars background">星空</option>
        <option value="space background">宇宙</option>
        <option value="dungeon background">ダンジョン</option>
        <option value="castle background">お城</option>
        <option value="snowy mountain background">雪山</option>
        <option value="desert background">砂漠</option>
        <option value="cherry blossom background">桜</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気</label>
      <select id="mood">
        <option value="cute and friendly">かわいい・フレンドリー</option>
        <option value="retro gaming">レトロゲーム風</option>
        <option value="fantasy RPG">ファンタジーRPG</option>
        <option value="kawaii">Kawaii</option>
        <option value="dark and mysterious">ダーク・ミステリアス</option>
        <option value="chibi style">ちびキャラ風</option>
        <option value="heroic">ヒロイック</option>
        <option value="peaceful and calm">穏やか</option>
        <option value="action-packed">アクション</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加キーワード（任意）</label>
      <input type="text" id="extra" placeholder="例: wearing a hat, holding a sword">
      <p class="hint">英語で追加したいキーワードを自由に入力</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">プロンプトを生成する</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="card-title">生成されたプロンプト</p>
    <div class="prompt-box" id="prompt-text"></div>
    <div class="btn-group">
      <button class="btn-copy" onclick="copyPrompt()">コピーする</button>
      <button class="btn-save" onclick="saveToFav()">お気に入りに保存</button>
    </div>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="fav-card" style="display:none">
    <p class="card-title">お気に入りプロンプト</p>
    <div class="fav-list" id="fav-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🎨 生成されたプロンプトは Midjourney / Stable Diffusion / DALL-E などの画像生成AIで使用できます。結果は使用するAIモデルにより異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'pixelart_animal_fav';

  function getAnimal() {
    var custom = document.getElementById('animal-custom').value.trim();
    if (custom) return custom;
    var sel = document.getElementById('animal');
    return sel.options[sel.selectedIndex].value;
  }

  function getVal(id) {
    var el = document.getElementById(id);
    return el.options[el.selectedIndex].value;
  }

  function generate() {
    var animal = getAnimal();
    var pose = getVal('pose');
    var expression = getVal('expression');
    var style = getVal('pixel-style');
    var view = getVal('view');
    var palette = getVal('palette');
    var bg = getVal('bg-type');
    var mood = getVal('mood');
    var extra = document.getElementById('extra').value.trim();

    var parts = [
      style + ' pixel art',
      'of a ' + expression + ' ' + animal,
      pose,
      view,
      palette,
      bg,
      mood + ' style',
      'clean pixel edges',
      'no anti-aliasing'
    ];
    if (extra) parts.push(extra);

    var prompt = parts.join(', ');
    document.getElementById('prompt-text').textContent = prompt;
    var rc = document.getElementById('result');
    rc.classList.add('show');
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyPrompt() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showCopyFeedback();
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyFeedback();
    }
  }

  function showCopyFeedback() {
    var btn = document.querySelector('.btn-copy');
    var orig = btn.textContent;
    btn.textContent = 'コピーしました！';
    btn.style.background = '#15803d';
    setTimeout(function() {
      btn.textContent = orig;
      btn.style.background = '';
    }, 1500);
  }

  // ── お気に入り ──
  function loadFav() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
  }

  function saveFav(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function saveToFav() {
    var text = document.getElementById('prompt-text').textContent;
    if (!text) return;
    var list = loadFav();
    if (list.indexOf(text) !== -1) {
      alert('このプロンプトは既に保存されています');
      return;
    }
    list.unshift(text);
    if (list.length > 50) list.pop();
    saveFav(list);
    renderFav();
    var btn = document.querySelector('.btn-save');
    var orig = btn.textContent;
    btn.textContent = '保存しました！';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }

  function renderFav() {
    var list = loadFav();
    var card = document.getElementById('fav-card');
    var container = document.getElementById('fav-list');
    if (list.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    container.innerHTML = list.map(function(t, i) {
      return '<div class="fav-item">'
        + '<span class="fav-text" onclick="useFav(' + i + ')" title="クリックでコピー">' + escHtml(t) + '</span>'
        + '<button class="fav-del" onclick="delFav(' + i + ')" title="削除">✕</button>'
        + '</div>';
    }).join('');
  }

  function useFav(i) {
    var list = loadFav();
    if (list[i]) {
      document.getElementById('prompt-text').textContent = list[i];
      document.getElementById('result').classList.add('show');
      copyPrompt();
    }
  }

  function delFav(i) {
    var list = loadFav();
    list.splice(i, 1);
    saveFav(list);
    renderFav();
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 初期化
  renderFav();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
