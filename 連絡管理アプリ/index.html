<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>連絡管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>連絡管理アプリ</h1>

    <!-- 登録フォーム -->
    <div class="card form-card">
      <h2 id="form-title">新しい連絡先を追加</h2>
      <div class="form-group">
        <label for="name">名前 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：田中さん">
      </div>
      <div class="form-group">
        <label for="relation">関係</label>
        <select id="relation">
          <option value="友人">友人</option>
          <option value="家族">家族</option>
          <option value="職場">職場</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="last-contact">最終連絡日 <span class="required">*</span></label>
        <input type="date" id="last-contact">
      </div>
      <div class="form-group">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="例：来月誕生日">
      </div>
      <div class="form-actions">
        <button id="submit-btn" onclick="submitForm()">追加する</button>
        <button id="cancel-btn" class="btn-secondary" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </div>

    <!-- フィルター -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('友人', this)">友人</button>
      <button class="filter-btn" onclick="setFilter('家族', this)">家族</button>
      <button class="filter-btn" onclick="setFilter('職場', this)">職場</button>
      <button class="filter-btn" onclick="setFilter('その他', this)">その他</button>
    </div>

    <!-- リスト -->
    <div id="contact-list"></div>
    <p id="empty-msg" class="empty-msg" style="display:none;">登録されている連絡先がありません</p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
