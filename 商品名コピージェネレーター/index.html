<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品名コピージェネレーター｜メルカリ向けタイトル5案を3秒で</title>
  <meta name="description" content="カテゴリ・状態・特徴キーワードを入れるだけで、メルカリ等のフリマ出品タイトル候補を5パターン自動生成。ワンタップでコピーして即出品できる無料ツールです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* タイトル候補リスト */
    .title-list { list-style: none; margin: 0; padding: 0; }
    .title-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .title-item:last-child { border-bottom: none; }
    .title-text {
      flex: 1; font-size: 0.95rem; line-height: 1.45; color: var(--text);
      font-weight: 600; word-break: break-word;
    }
    .title-meta {
      font-size: 0.7rem; color: var(--text-sub); margin-top: 0.25rem; font-weight: 400;
    }
    .btn-copy {
      flex-shrink: 0;
      padding: 0.5rem 0.85rem;
      font-size: 0.82rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:active { background: var(--accent); color: #fff; }
    .btn-copy.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.85rem 1rem;
      background: var(--ng-bg); color: var(--ng);
      border: 1.5px solid var(--ng); border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
    }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.76rem; color: var(--text-sub); line-height: 1.6; text-align: left;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>商品名コピージェネレーター</h1>
    <p class="subtitle">メルカリ等のフリマ向け：検索ヒットしやすいタイトル候補を5案ワンタップ生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>

    <div class="field">
      <label for="kw">商品名・特徴キーワード（必須）</label>
      <input type="text" id="kw" placeholder="例: 花柄 ワンピース 春">
      <p class="hint">スペース区切りで複数入れると組み合わせて使います</p>
    </div>

    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="レディース">レディース</option>
        <option value="メンズ">メンズ</option>
        <option value="ベビー・キッズ">ベビー・キッズ</option>
        <option value="家電・スマホ">家電・スマホ</option>
        <option value="ホビー・本">ホビー・本</option>
        <option value="コスメ・香水">コスメ・香水</option>
        <option value="食品・飲料">食品・飲料</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label for="brand">ブランド（任意）</label>
      <input type="text" id="brand" placeholder="例: ユニクロ">
    </div>

    <div class="field">
      <label for="size">サイズ・カラー（任意）</label>
      <input type="text" id="size" placeholder="例: Mサイズ ベージュ">
    </div>

    <div class="field">
      <label for="cond">状態</label>
      <select id="cond">
        <option value="新品・未使用">新品・未使用</option>
        <option value="未使用に近い">未使用に近い</option>
        <option value="目立った傷や汚れなし" selected>目立った傷や汚れなし</option>
        <option value="やや傷や汚れあり">やや傷や汚れあり</option>
        <option value="傷や汚れあり">傷や汚れあり</option>
      </select>
    </div>

    <div class="field">
      <label for="urg">売り急ぎ度</label>
      <select id="urg">
        <option value="slow">じっくり売りたい</option>
        <option value="normal" selected>ふつう</option>
        <option value="fast">早く売りたい</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="genTitles()">タイトルを生成</button>

  <div id="err" class="err-msg" style="display:none"></div>

  <div class="card" id="result-card" style="display:none">
    <p class="card-title">生成タイトル候補（メルカリ最大40文字）</p>
    <ul class="title-list" id="titleList"></ul>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <p class="source-note">
    📚 このツールは、メルカリ等のフリマアプリの公開ガイドライン（タイトル文字数・禁止表現の目安）を参考に、検索ヒットしやすい構成で組み立てています。実際の出品ルールは各アプリの最新規約をご確認ください。
  </p>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
    var STORAGE_KEY = 'product_title_gen_v1';
    var MAX_LEN = 40;

    // 訴求ワード辞書
    var APPEAL = {
      cond: {
        '新品・未使用': ['新品', '未使用', '新品タグ付き'],
        '未使用に近い': ['美品', 'ほぼ新品', '極美品'],
        '目立った傷や汚れなし': ['美品', '良品', 'キレイ'],
        'やや傷や汚れあり': ['お買い得', '訳あり'],
        '傷や汚れあり': ['ジャンク', '訳あり']
      },
      urg: {
        'slow':   ['人気', 'おすすめ'],
        'normal': ['送料込', '即発送', '人気'],
        'fast':   ['値下げ可', '即発送', 'セール中', '本日限定値下げ']
      },
      cat: {
        'レディース':       ['オシャレ', 'トレンド'],
        'メンズ':           ['カッコイイ', '定番'],
        'ベビー・キッズ':   ['可愛い', 'まとめ売り'],
        '家電・スマホ':     ['動作確認済', '箱あり'],
        'ホビー・本':       ['レア', '完売品', '限定'],
        'コスメ・香水':     ['新品同様', '残量多め'],
        '食品・飲料':       ['賞味期限長め', 'まとめ売り'],
        'その他':           ['お買い得']
      }
    };

    // 5パターンのレシピ
    // 各レシピは「並べる順序」を指定。値が空のパーツはスキップ。
    var RECIPES = [
      // 1. 王道：ブランド+特徴+サイズ+状態
      ['brand','keywords','size','condShort'],
      // 2. 訴求先頭：人気/美品+ブランド+特徴+カラー
      ['appealCat','brand','keywords','size'],
      // 3. 状態強調：状態+特徴+カテゴリ語
      ['appealCond','keywords','brand','size'],
      // 4. 売り急ぎ訴求：訴求+特徴+ブランド
      ['appealUrg','keywords','brand','size'],
      // 5. シンプル全部入り
      ['brand','keywords','size','appealCond','appealUrg']
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function buildPart(name, ctx) {
      switch (name) {
        case 'brand':      return ctx.brand;
        case 'keywords':   return ctx.kw;
        case 'size':       return ctx.size;
        case 'condShort':  return ctx.cond.replace('・', '');
        case 'appealCond': return pick(APPEAL.cond[ctx.cond] || ['']);
        case 'appealUrg':  return pick(APPEAL.urg[ctx.urgKey] || ['']);
        case 'appealCat':  return pick(APPEAL.cat[ctx.cat] || ['']);
      }
      return '';
    }

    function makeTitle(recipe, ctx) {
      var parts = recipe.map(function(p){ return buildPart(p, ctx); })
                        .filter(function(s){ return s && s.length > 0; });
      // 重複を除く
      var seen = {};
      parts = parts.filter(function(s){
        if (seen[s]) return false;
        seen[s] = true;
        return true;
      });
      // 結合（空白区切り）し、40文字以内になるよう末尾から削る
      var title = parts.join(' ');
      while (title.length > MAX_LEN && parts.length > 1) {
        parts.pop();
        title = parts.join(' ');
      }
      // それでも超過する場合（キーワード自体が長い）は末尾切り
      if (title.length > MAX_LEN) title = title.slice(0, MAX_LEN);
      return title;
    }

    function genTitles() {
      var kw    = document.getElementById('kw').value.trim();
      var cat   = document.getElementById('cat').value;
      var brand = document.getElementById('brand').value.trim();
      var size  = document.getElementById('size').value.trim();
      var cond  = document.getElementById('cond').value;
      var urg   = document.getElementById('urg').value;

      var errEl = document.getElementById('err');
      var resCard = document.getElementById('result-card');

      if (!kw) {
        errEl.textContent = '「商品名・特徴キーワード」を入力してください';
        errEl.style.display = 'block';
        resCard.style.display = 'none';
        return;
      }
      errEl.style.display = 'none';

      var ctx = { kw: kw, cat: cat, brand: brand, size: size, cond: cond, urgKey: urg };

      // 5案を生成（重複が出にくいよう、各案で乱択を独立に走らせる）
      var titles = [];
      var meta = [];
      for (var i = 0; i < RECIPES.length; i++) {
        var t = makeTitle(RECIPES[i], ctx);
        // 同じ文字列が出た場合、別レシピでもう一回ランダム化
        var tries = 0;
        while (titles.indexOf(t) !== -1 && tries < 3) {
          t = makeTitle(RECIPES[i], ctx);
          tries++;
        }
        titles.push(t);
        meta.push(t.length + ' / ' + MAX_LEN + ' 文字');
      }

      var ul = document.getElementById('titleList');
      ul.innerHTML = titles.map(function(t, i){
        var safeT = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<li class="title-item">'
             +   '<div style="flex:1">'
             +     '<div class="title-text">' + safeT + '</div>'
             +     '<div class="title-meta">' + meta[i] + '</div>'
             +   '</div>'
             +   '<button class="btn-copy" data-idx="' + i + '" onclick="copyTitle(this,' + i + ')">コピー</button>'
             + '</li>';
      }).join('');

      // データを保持（コピー用）
      ul.dataset.titles = JSON.stringify(titles);

      resCard.style.display = 'block';
      saveInputs({ kw: kw, cat: cat, brand: brand, size: size, cond: cond, urg: urg });

      // 結果へスクロール
      resCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyTitle(btn, idx) {
      var ul = document.getElementById('titleList');
      var titles = JSON.parse(ul.dataset.titles || '[]');
      var text = titles[idx];
      if (!text) return;

      var done = function() {
        var orig = btn.textContent;
        btn.textContent = 'コピー済';
        btn.classList.add('copied');
        setTimeout(function(){
          btn.textContent = orig === 'コピー済' ? 'コピー' : orig;
          btn.classList.remove('copied');
        }, 1500);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
      } else {
        fallbackCopy(text, done);
      }
    }

    function fallbackCopy(text, cb) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      cb();
    }

    function saveInputs(obj) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch (e) {}
    }

    function loadInputs() {
      try {
        var s = localStorage.getItem(STORAGE_KEY);
        if (!s) return;
        var obj = JSON.parse(s);
        if (obj.kw)    document.getElementById('kw').value    = obj.kw;
        if (obj.cat)   document.getElementById('cat').value   = obj.cat;
        if (obj.brand) document.getElementById('brand').value = obj.brand;
        if (obj.size)  document.getElementById('size').value  = obj.size;
        if (obj.cond)  document.getElementById('cond').value  = obj.cond;
        if (obj.urg)   document.getElementById('urg').value   = obj.urg;
      } catch (e) {}
    }

    loadInputs();
  </script>

  <script src="../related-widget.js"></script>

</body>
