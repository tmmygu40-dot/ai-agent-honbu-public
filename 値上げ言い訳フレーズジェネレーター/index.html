<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="値上げのイライラをユーモアに変換！品目を選ぶだけで笑える言い訳フレーズを即生成。コピーしてSNSやLINEで使える、値上げ時代の心の防衛アプリです。">
  <title>値上げ言い訳フレーズジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── フレーズ表示 ── */
    .phrase-box {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .phrase-category {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .phrase-text {
      font-size: 1.15rem; font-weight: 700; line-height: 1.6;
      color: var(--text); margin-bottom: 1rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.5rem 1.5rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      margin-right: 0.5rem;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-fav {
      display: inline-block; padding: 0.5rem 1.5rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-fav:active { background: var(--accent-light); }
    .copy-msg {
      font-size: 0.78rem; color: var(--ok); margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* ── お気に入りリスト ── */
    .fav-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-text { font-size: 0.88rem; color: var(--text); line-height: 1.5; flex: 1; }
    .fav-cat { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.2rem; }
    .fav-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .fav-actions button {
      font-size: 0.75rem; padding: 0.3rem 0.6rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
    }
    .fav-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .fav-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 品目ボタングリッド ── */
    .cat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem;
    }
    .cat-btn {
      padding: 0.7rem 0.4rem; font-size: 0.88rem; font-weight: 600;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .cat-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .cat-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .phrase-box { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>

<body>

  <header class="app-header">

  </header>

  <!-- 品目選択カード -->
  <div class="card">

      <button class="cat-btn" data-cat="電気代">⚡ 電気代</button>
      <button class="cat-btn" data-cat="ガス代">🔥 ガス代</button>
      <button class="cat-btn" data-cat="日用品">🧴 日用品</button>
      <button class="cat-btn" data-cat="外食">🍽️ 外食</button>
      <button class="cat-btn" data-cat="交通費">🚃 交通費</button>
      <button class="cat-btn" data-cat="通信費">📱 通信費</button>
      <button class="cat-btn" data-cat="保険料">🏥 保険料</button>
      <button class="cat-btn" data-cat="なんでも">🎲 なんでも</button>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">言い訳フレーズを生成！</button>

  <!-- フレーズ表示 -->
  <div class="phrase-box" id="phraseBox" style="display:none">

    <p class="phrase-text" id="phraseText"></p>
    <button class="btn-copy" onclick="copyPhrase()">📋 コピー</button>
    <button class="btn-fav" onclick="saveFav()">⭐ 保存</button>
    <p class="copy-msg" id="copyMsg"></p>
  </div>

  <!-- お気に入りカード -->
  <div class="card" id="favCard">
    <p class="card-title">⭐ お気に入りフレーズ</p>
    <div id="favList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省統計局（消費者物価指数）・経済産業省などの公開データを参考に、値上げ時代を楽しく乗り切るためのユーモアツールです。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── フレーズデータベース ──

  var selectedCat = null;
  var currentPhrase = '';
  var currentCatLabel = '';
  var LS_KEY = 'neage_iiwake_favs';

  // ── 品目選択 ──
  document.getElementById('catGrid').addEventListener('click', function(e) {
    var btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedCat = btn.getAttribute('data-cat');
  });

  // ── フレーズ生成 ──
  function generate() {
    if (!selectedCat) {
      alert('品目を選んでください');
      return;
    }
    var pool;
    if (selectedCat === 'なんでも') {
      var allPhrases = [];
      Object.keys(PHRASES).forEach(function(k) {
        allPhrases = allPhrases.concat(PHRASES[k]);
      });
      pool = allPhrases.concat(UNIVERSAL);
    } else {
      pool = PHRASES[selectedCat].concat(UNIVERSAL);
    }
    var idx = Math.floor(Math.random() * pool.length);
    currentPhrase = pool[idx];
    currentCatLabel = selectedCat;

    document.getElementById('phraseCat').textContent = '📢 ' + selectedCat + 'の値上げに対して…';
    document.getElementById('phraseText').textContent = currentPhrase;
    document.getElementById('phraseBox').style.display = 'block';
    document.getElementById('copyMsg').textContent = '';
  }

  // ── コピー ──
  function copyPhrase() {
    if (!currentPhrase) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(currentPhrase).then(function() {
        document.getElementById('copyMsg').textContent = 'コピーしました！';
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = currentPhrase;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      document.getElementById('copyMsg').textContent = 'コピーしました！';
    }
    setTimeout(function() {
      document.getElementById('copyMsg').textContent = '';
    }, 2000);
  }

  // ── お気に入り保存 ──
  function saveFav() {
    if (!currentPhrase) return;
    var favs = loadFavs();
    var exists = favs.some(function(f) { return f.text === currentPhrase; });
    if (exists) {
      document.getElementById('copyMsg').textContent = 'すでに保存済みです';
      setTimeout(function() { document.getElementById('copyMsg').textContent = ''; }, 2000);
      return;
    }
    favs.push({ text: currentPhrase, cat: currentCatLabel });
    saveFavs(favs);
    renderFavs();
    document.getElementById('copyMsg').textContent = '⭐ お気に入りに保存しました！';
    setTimeout(function() { document.getElementById('copyMsg').textContent = ''; }, 2000);
  }

  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(LS_KEY, JSON.stringify(favs));
  }

  function renderFavs() {
    var favs = loadFavs();
    var el = document.getElementById('favList');
    if (favs.length === 0) {
      el.innerHTML = '<p class="fav-empty">まだお気に入りがありません</p>';
      return;
    }
    el.innerHTML = favs.map(function(f, i) {
      return '<div class="fav-item">'
        + '<div><p class="fav-text">' + escHtml(f.text) + '</p>'
        + '<p class="fav-cat">' + escHtml(f.cat) + '</p></div>'
        + '<div class="fav-actions">'
        + '<button onclick="copyFav(' + i + ')">📋</button>'
        + '<button onclick="delFav(' + i + ')">🗑️</button>'
        + '</div></div>';
    }).join('');
  }

  function copyFav(i) {
    var favs = loadFavs();
    if (!favs[i]) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(favs[i].text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = favs[i].text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function delFav(i) {
    var favs = loadFavs();
    favs.splice(i, 1);
    saveFavs(favs);
    renderFavs();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初期表示
  renderFavs();
  </script>
