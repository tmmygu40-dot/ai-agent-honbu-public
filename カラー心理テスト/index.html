<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="好きな色をタップするだけで、今日のあなたの潜在欲求を3秒で診断。色彩心理学をベースにした気軽なカラー心理テストです。">
  <title>🎨 カラー心理テスト</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 色選択グリッド ── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    .color-btn {
      aspect-ratio: 1;
      border: 3px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    .color-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .color-btn:active {
      transform: scale(0.96);
    }
    .color-btn.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent), 0 4px 16px rgba(224,123,0,0.3);
    }
    .color-btn[data-color="白"],
    .color-btn[data-color="黄"] {
      color: #333;
      text-shadow: none;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.6rem; color: var(--accent); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; }
    .result-emoji-big { font-size: 3rem; margin-bottom: 0.5rem; }
    .result-keyword {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-top: 0.6rem;
    }

    /* ── 履歴カード ── */
    .history-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-color {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .history-date { color: var(--text-sub); font-size: 0.75rem; margin-left: auto; white-space: nowrap; }
    .history-empty { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── クリアボタン ── */
    .btn-clear {
      display: block; margin: 0.6rem auto 0; padding: 0.5rem 1rem;
      font-size: 0.78rem; font-weight: 600;
      background: transparent; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-clear:hover { border-color: var(--ng); color: var(--ng); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎨 カラー心理テスト</h1>
    <p class="subtitle">気になる色をタップするだけ。今日の潜在欲求を3秒で診断します。</p>
  </header>

  <!-- 色選択カード -->
  <div class="card">
    <p class="card-title">今日、気になる色は？</p>
    <div class="color-grid" id="colorGrid"></div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの潜在欲求</p>
    <p class="result-emoji-big" id="resultEmoji"></p>
    <p class="result-value" id="resultTitle"></p>
    <p class="result-note" id="resultDesc"></p>
    <span class="result-keyword" id="resultKeyword"></span>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard">
    <p class="card-title">診断履歴</p>
    <div id="historyList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このテストは色彩心理学の一般的な知見を参考にした娯楽用の簡易診断です。医学的・心理学的な診断ではありません。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠" style="display:flex;align-items:center;justify-content:center;width:100%;max-width:600px;min-height:90px;margin:1rem auto 1.2rem;padding:0.5rem;background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-sub);font-size:0.78rem;">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <button class="btn-clear no-print" onclick="clearHistory()">🗑️ 履歴をクリア</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 色データ ──
  var COLORS = [
    { name: '赤',       hex: '#e74c3c', emoji: '🔥', title: '情熱・行動欲',     keyword: '#エネルギー全開',   desc: '今日のあなたは「動きたい！」モード。新しいことを始めたり、ずっと後回しにしていたことに手をつけるのにぴったりなタイミングです。' },
    { name: 'オレンジ', hex: '#f39c12', emoji: '🌈', title: '社交・つながり欲',  keyword: '#人と話したい',     desc: '誰かと一緒にいたい、楽しい時間を共有したい気持ちが高まっています。友達や家族に連絡してみると、思わぬいい話が聞けるかも。' },
    { name: '黄',       hex: '#f1c40f', emoji: '✨', title: '好奇心・自由欲',     keyword: '#ワクワクしたい',   desc: '知らないことを知りたい、もっと自由でいたいという気持ち。本や動画、散歩など新しいインプットが今日の充電になりそうです。' },
    { name: '緑',       hex: '#27ae60', emoji: '🌿', title: '安らぎ・癒し欲',     keyword: '#ちょっと休みたい', desc: '心のどこかで「休みたい」と感じているサイン。無理せず、自分のペースでゆっくり過ごす時間を意識的に取ってみてください。' },
    { name: '青',       hex: '#2980b9', emoji: '🌊', title: '集中・没頭欲',       keyword: '#ゾーンに入りたい',desc: '一人で黙々と何かに取り組みたい気分。仕事や趣味に没頭すると、驚くほどはかどる一日になりそうです。' },
    { name: '紫',       hex: '#8e44ad', emoji: '🔮', title: '直感・スピリチュアル欲', keyword: '#感性を研ぎ澄ます', desc: '理屈よりも感覚を大事にしたい日。アートや音楽に触れたり、直感で「いいな」と思ったものを素直に選んでみましょう。' },
    { name: 'ピンク',   hex: '#e91e8c', emoji: '💖', title: '愛情・承認欲',       keyword: '#大切にされたい',   desc: '愛されたい、認めてほしいという気持ちが隠れています。自分へのご褒美を用意したり、大切な人に甘えてみるのもアリです。' },
    { name: '白',       hex: '#f8f8f8', emoji: '🕊️', title: 'リセット・浄化欲',   keyword: '#まっさらにしたい', desc: '気持ちをリセットしたい、すっきりしたいという潜在欲求。部屋の片づけや不要なものの整理が、心の整理にもつながります。' },
    { name: '黒',       hex: '#2c2c2c', emoji: '🖤', title: '自立・防衛欲',       keyword: '#自分を守りたい',   desc: '一人の時間や自分の領域を大切にしたい気持ち。周りに流されず、自分の意思で選択することが今日のテーマです。' }
  ];

  var STORAGE_KEY = 'colorPsychHistory';

  // ── 色グリッド生成 ──
  (function initGrid() {
    var grid = document.getElementById('colorGrid');
    COLORS.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.setAttribute('data-color', c.name);
      btn.style.background = c.hex;
      btn.textContent = c.name;
      btn.onclick = function() { diagnose(c); };
      grid.appendChild(btn);
    });
  })();

  // ── 診断実行 ──
  function diagnose(c) {
    // 選択状態のUI更新
    var btns = document.querySelectorAll('.color-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
    document.querySelector('[data-color="' + c.name + '"]').classList.add('selected');

    // 結果表示
    var rc = document.getElementById('result');
    document.getElementById('resultEmoji').textContent = c.emoji;
    document.getElementById('resultTitle').textContent = c.title;
    document.getElementById('resultDesc').textContent = c.desc;
    document.getElementById('resultKeyword').textContent = c.keyword;
    rc.classList.add('show');
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // 履歴保存
    saveHistory(c);
    renderHistory();
  }

  // ── localStorage 履歴 ──
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveHistory(c) {
    var hist = getHistory();
    var now = new Date();
    hist.unshift({
      color: c.name,
      hex: c.hex,
      title: c.title,
      date: now.toISOString()
    });
    if (hist.length > 30) hist = hist.slice(0, 30);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
  }

  function renderHistory() {
    var hist = getHistory();
    var el = document.getElementById('historyList');
    if (hist.length === 0) {
      el.innerHTML = '<p class="history-empty">まだ診断履歴がありません</p>';
      return;
    }
    el.innerHTML = hist.map(function(h) {
      var d = new Date(h.date);
      var ds = (d.getMonth()+1) + '/' + d.getDate() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
      return '<div class="history-item">'
        + '<span class="history-color" style="background:' + h.hex + '"></span>'
        + '<span>' + h.color + '：' + h.title + '</span>'
        + '<span class="history-date">' + ds + '</span>'
        + '</div>';
    }).join('');
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
  }

  // 初期表示
  renderHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
