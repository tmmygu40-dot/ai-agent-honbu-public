<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>収納場所メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>収納場所メモ</h1>

    <section class="form-section">
      <h2>登録</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="品名（例：ハサミ）" maxlength="50">
        <input type="text" id="itemPlace" placeholder="場所（例：引き出し2段目）" maxlength="50">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <section class="search-section">
      <h2>検索</h2>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="品名で検索...">
        <button id="clearSearchBtn">クリア</button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>一覧</h2>
        <span id="countLabel" class="count-label"></span>
      </div>
      <ul id="itemList"></ul>
      <p id="emptyMsg" class="empty-msg">登録された品目がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
