<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャッシュサイクルシミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── アドバイスボックス ── */
    .advice-box {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 1rem 1.2rem;
      border-radius: var(--radius);
      font-size: 0.85rem; line-height: 1.6;
    }
    .advice-box.ok   { background: var(--ok-bg);   border: 1.5px solid var(--ok);   color: var(--ok); }
    .advice-box.warn { background: var(--warn-bg); border: 1.5px solid var(--warn); color: var(--warn); }
    .advice-box.ng   { background: var(--ng-bg);   border: 1.5px solid var(--ng);   color: var(--ng); }
    .advice-title { font-weight: 700; margin-bottom: 0.4rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

</head>
<body>

  <header class="app-header">
    <h1>キャッシュサイクルシミュレーター</h1>
    <p class="subtitle">仕入れ・在庫・回収日数から運転資金と資金ショートリスクを即算出</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="monthly_sales">月商（売上）</label>
      <input type="number" id="monthly_sales" placeholder="例: 3000000" min="0" inputmode="numeric">
      <p class="hint">1ヶ月の売上金額（円）</p>
    </div>
    <div class="field">
      <label for="inventory_days">在庫回転日数</label>
      <input type="number" id="inventory_days" placeholder="例: 30" min="0" inputmode="numeric">
      <p class="hint">仕入れてから売れるまでの平均日数</p>
    </div>
    <div class="field">
      <label for="receivable_days">売上債権回収日数</label>
      <input type="number" id="receivable_days" placeholder="例: 45" min="0" inputmode="numeric">
      <p class="hint">売上から入金されるまでの平均日数（掛売りの場合）。現金売りなら0</p>
    </div>
    <div class="field">
      <label for="payable_days">買掛金支払いサイト</label>
      <input type="number" id="payable_days" placeholder="例: 30" min="0" inputmode="numeric">
      <p class="hint">仕入れから支払いまでの平均日数。現金仕入れなら0</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">資金ショートリスクを診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">必要運転資金</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">計算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- アドバイスカード -->
  <div id="advice-wrap" style="display:none">
    <div class="advice-box" id="advice-box">
      <p class="advice-title" id="advice-title"></p>
      <p id="advice-body"></p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 CCC（キャッシュ・コンバージョン・サイクル）＝在庫回転日数＋回収日数－支払いサイト。この値が大きいほど運転資金を多く抱える必要があります。目安値であり、業種・取引条件により異なります。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'cash_cycle_sim_v1';

  function calc() {
    var sales = parseFloat(document.getElementById('monthly_sales').value);
    var inv   = parseFloat(document.getElementById('inventory_days').value);
    var rec   = parseFloat(document.getElementById('receivable_days').value);
    var pay   = parseFloat(document.getElementById('payable_days').value);

    if (isNaN(sales) || isNaN(inv) || isNaN(rec) || isNaN(pay)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (sales <= 0) { showErr('月商は0より大きい値を入力してください'); return; }

    // CCC計算
    var ccc = inv + rec - pay;
    // 必要運転資金 = 月商 × (CCC / 30)
    var required = sales * (ccc / 30);
    if (required < 0) required = 0;

    // リスク判定
    var level, riskLabel, advTitle, advBody;
    if (ccc < 30) {
      level = 'ok';
      riskLabel = '安全圏';
      advTitle = '✅ 資金サイクルは良好です';
      advBody = 'CCC が30日未満で、運転資金の負担が小さい状態です。このサイクルを維持しつつ、売掛の早期回収や在庫最小化を継続しましょう。';
    } else if (ccc < 60) {
      level = 'warn';
      riskLabel = '注意ゾーン';
      advTitle = '⚠️ 資金繰りに余裕を持たせましょう';
      advBody = 'CCC が30〜60日で、運転資金の負担がやや大きい状態です。売掛回収を早める交渉や、買掛の支払いサイト延長の検討をお勧めします。';
    } else {
      level = 'ng';
      riskLabel = '危険ゾーン';
      advTitle = '🚨 資金ショートリスクが高い状態です';
      advBody = 'CCC が60日以上で、多額の運転資金が必要です。売掛回収の早期化・在庫圧縮・支払いサイト延長を早急に検討し、必要に応じて融資や当座借越枠の確保をご検討ください。';
    }

    // 表示
    showResult(level, fmt(required) + ' 円', riskLabel, 'CCC ' + ccc.toFixed(0) + ' 日 / 月商の ' + ((required / sales) * 100).toFixed(0) + '% が運転資金として必要');
    showDetail([
      ['月商',              fmt(sales) + ' 円'],
      ['在庫回転日数',      inv.toFixed(0) + ' 日'],
      ['売上債権回収日数',  rec.toFixed(0) + ' 日'],
      ['買掛金支払いサイト', pay.toFixed(0) + ' 日'],
      ['CCC（キャッシュサイクル）', ccc.toFixed(0) + ' 日', true],
      ['必要運転資金',      fmt(required) + ' 円', true],
    ]);
    showAdvice(level, advTitle, advBody);

    // localStorage保存
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        monthly_sales: sales, inventory_days: inv,
        receivable_days: rec, payable_days: pay
      }));
    } catch(e) {}
  }

  function showResult(level, val, eval_, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showAdvice(level, title, body) {
    var box = document.getElementById('advice-box');
    box.className = 'advice-box ' + level;
    document.getElementById('advice-title').textContent = title;
    document.getElementById('advice-body').textContent = body;
    document.getElementById('advice-wrap').style.display = 'block';
  }
  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = msg;
    document.getElementById('rn').textContent = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('advice-wrap').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // localStorage読み込み
  (function() {
    try {
      var saved = localStorage.getItem(LS_KEY);
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.monthly_sales)    document.getElementById('monthly_sales').value    = d.monthly_sales;
      if (d.inventory_days)   document.getElementById('inventory_days').value   = d.inventory_days;
      if (d.receivable_days !== undefined) document.getElementById('receivable_days').value = d.receivable_days;
      if (d.payable_days !== undefined)    document.getElementById('payable_days').value    = d.payable_days;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
