<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接対策ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 質問カード ── */
    .qa-list { max-width: 600px; margin: 0 auto; }
    .qa-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .qa-q {
      padding: 1rem 1.2rem;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      border-bottom: 1px solid transparent;
      transition: background 0.15s;
    }
    .qa-q:hover { background: var(--accent-light); }
    .qa-q.open { border-bottom-color: var(--border); background: var(--accent-light); }
    .qa-num {
      flex-shrink: 0;
      width: 1.6rem; height: 1.6rem;
      background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.75rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin-top: 0.05rem;
    }
    .qa-text { flex: 1; line-height: 1.5; }
    .qa-arrow {
      flex-shrink: 0; font-size: 0.75rem; color: var(--text-sub);
      margin-top: 0.2rem; transition: transform 0.2s;
    }
    .qa-q.open .qa-arrow { transform: rotate(180deg); }
    .qa-a {
      display: none;
      padding: 1rem 1.2rem;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text-sub);
      background: #fafaf9;
    }
    .qa-a-label {
      font-size: 0.72rem; font-weight: 700; color: var(--ok);
      letter-spacing: 0.06em; margin-bottom: 0.5rem;
    }
    .qa-a-text { color: var(--text); }
    .qa-a-tip {
      margin-top: 0.7rem; padding: 0.6rem 0.8rem;
      background: var(--warn-bg); border-left: 3px solid var(--warn);
      border-radius: 4px; font-size: 0.78rem; color: var(--warn);
    }

    /* ── 結果ヘッダー ── */
    .result-header {
      display: none;
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1.2rem;
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      font-size: 0.88rem; color: var(--accent); font-weight: 700;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>面接対策ジェネレーター</h1>
    <p class="subtitle">職種と経験年数を選ぶだけで面接想定質問と回答例を即表示</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">条件を選択</p>
    <div class="field">
      <label for="job">職種</label>
      <select id="job">
        <option value="sales">営業職</option>
        <option value="engineer">エンジニア・IT職</option>
        <option value="office">事務・バックオフィス</option>
        <option value="service">接客・サービス</option>
        <option value="manager">管理職・マネジメント</option>
        <option value="medical">医療・介護・福祉</option>
        <option value="education">教育・保育</option>
      </select>
    </div>
    <div class="field">
      <label for="exp">経験年数</label>
      <select id="exp">
        <option value="fresh">未経験・新卒</option>
        <option value="junior">1〜3年</option>
        <option value="middle">3〜5年</option>
        <option value="senior">5年以上</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">質問を生成する</button>

  <div class="result-header" id="resultHeader"></div>
  <div class="qa-list" id="qaList"></div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  // ── 質問データベース ──
  // 共通質問（全職種共通）
  var commonQ = {
    fresh: [
      {
        q: '自己紹介をしてください',
        a: '大学・専門学校での専攻や活動を中心に、この職種を目指したきっかけと結びつけて話しましょう。「私は〇〇大学〇〇学部を卒業予定です。在学中は〜に取り組み、この経験から御社の〜という事業に強い関心を持ちました」',
        tip: '1分以内を目安に。最後に「よろしくお願いします」で締める。'
      },
      {
        q: 'なぜこの業界・職種を志望しましたか？',
        a: '「〇〇という経験・出来事がきっかけで、〜という課題を解決したいと思いました。その手段として、この職種が最適だと考えました」という構成が効果的です。',
        tip: '「なんとなく」「安定しているから」は避ける。具体的なエピソードを添えること。'
      },
      {
        q: 'あなたの長所と短所を教えてください',
        a: '長所：「私の長所は〜です。大学の〇〇活動で〜という場面でこの強みを発揮しました」。短所：「〜な面があります。ただ、〜という工夫で克服するよう努めています」',
        tip: '短所は「改善への取り組み」とセットで話すと好印象。'
      },
      {
        q: '入社後にどのような仕事をしたいですか？',
        a: '「まずは基礎を徹底的に身につけ、〇年後には〜を担当できるよう成長したいです。長期的には〜で貢献したいと考えています」という段階的なビジョンを示しましょう。',
        tip: '会社の事業内容・求人票のキーワードと連動させると説得力が増す。'
      },
      {
        q: '学生時代に最も力を入れたことは何ですか？',
        a: 'STAR法で話しましょう。「Situation（状況）：〜という状況で、Task（課題）：〜が課題でした。Action（行動）：私は〜という行動を取りました。Result（結果）：その結果〜を達成しました」',
        tip: '成果は数字で示せると強い（「メンバー10名」「3ヶ月で〇%改善」など）。'
      }
    ],
    junior: [
      {
        q: '現職（前職）での主な業務内容を教えてください',
        a: '「前職では〇〇会社にて〜を担当していました。具体的には〜という業務を行い、〜の成果を出しました」。規模・数字・チーム体制なども含めて話しましょう。',
        tip: '1〜2分で簡潔に。詳細は面接官の質問に応じて深掘り。'
      },
      {
        q: '転職理由を教えてください',
        a: '「現職では〜という経験を積みましたが、〜をさらに深めるために転職を決意しました。御社では〜ができると考え、志望しています」。前向きな理由を中心に話しましょう。',
        tip: '前職の悪口・批判は絶対NG。成長意欲・キャリアアップとして表現する。'
      },
      {
        q: '仕事で成功した経験を教えてください',
        a: '「〇〇の業務で〜を達成しました。課題は〜でしたが、〜という工夫をした結果〜を実現できました」。できれば数値化して話しましょう。',
        tip: '自分一人の話ではなくチームへの貢献も入れると良い。'
      },
      {
        q: '仕事で失敗した経験と、その対処法を教えてください',
        a: '「〜という失敗をしました。原因は〜でした。この経験から〜を学び、現在は〜という対策をとっています」。失敗から何を学んだかが重要です。',
        tip: '失敗を隠さず、学びと再発防止策をセットで話す。'
      },
      {
        q: '5年後のキャリアプランを教えてください',
        a: '「3年以内に〜のスキルを習得し、5年後には〜のポジションで〜に貢献したいと思っています。御社の〜という環境がこの目標の実現に最適だと考えています」',
        tip: '会社のビジネスモデル・成長方向と整合させると好印象。'
      }
    ],
    middle: [
      {
        q: 'これまでのキャリアで最も大きな成果は何ですか？',
        a: '「〇〇プロジェクトで〜を担当し、〜という成果を上げました。特に困難だった点は〜でしたが、〜というアプローチで解決しました」。具体的な数値と役割を明示しましょう。',
        tip: '自分の役割と貢献を明確に。チームの成果と個人の成果を分けて話す。'
      },
      {
        q: 'なぜこのタイミングで転職を考えているのですか？',
        a: '「現職での〜という目標を達成できたと感じており、次のステップとして〜に挑戦したいと考えています。御社では〜という点で、そのチャレンジができると判断しました」',
        tip: 'キャリアの必然性として話す。衝動的・ネガティブな印象は避ける。'
      },
      {
        q: 'マネジメント経験はありますか？',
        a: '経験がある場合：「〜名のチームをリードした経験があります。〜という課題に対して〜という取り組みをしました」。経験がない場合：「直接のマネジメント経験はありませんが、〜場面でリード役を担い〜を学びました」',
        tip: '規模・期間・成果を具体的に。ないなら今後の意欲を示す。'
      },
      {
        q: '御社でどのように貢献できますか？',
        a: '「私の〜という経験・スキルを活かし、御社の〜という課題解決に貢献できます。具体的には〜という取り組みができると考えています」。企業研究に基づいて話しましょう。',
        tip: '会社の課題・戦略を事前に調べ、自分のスキルと紐付けて話す。'
      },
      {
        q: 'チームで意見が対立したときはどう対処しますか？',
        a: '「まず双方の意見を丁寧に聞き、お互いの主張の背景を理解します。そのうえで〜という基準で判断し、合意形成を図ります。過去に〜という場面で〜の対処をしました」',
        tip: '一方的な押し付けではなく、対話・合意形成プロセスを示す。'
      }
    ],
    senior: [
      {
        q: 'これまでのキャリアを通じて、どのような価値を生み出してきましたか？',
        a: '「〇年間で〜という領域で〜を実現しました。特に〜という状況下で〜を行い、〜という成果を出しました。これらの経験を御社で〜という形で活かしたいと考えています」',
        tip: '戦略的思考・組織への影響力・意思決定の視点を示す。'
      },
      {
        q: '組織変革や大きなプロジェクトをリードした経験を教えてください',
        a: '「〜という課題に対し、〜のアプローチで組織改革を推進しました。ステークホルダーの合意形成に苦労しましたが、〜という方法で乗り越え〜を達成しました」',
        tip: 'リーダーシップ・変化推進力・影響力の大きさを示す。'
      },
      {
        q: '現在の市場・業界トレンドをどのように捉えていますか？',
        a: '「現在〜という変化が進んでいます。この変化に対して御社が〜という方向に進むことが重要だと考えており、私の〜という経験がその推進力になれると思います」',
        tip: '業界知識と自社への応用力を示す。意見を持っていることが重要。'
      },
      {
        q: '御社の経営課題をどのように分析していますか？',
        a: '「御社の〜という事業領域において、〜という市場変化が起きています。この文脈で〜が課題になっていると推察します。私の経験では〜という対応が有効でした」',
        tip: '企業研究の深さを示す。謙虚さと自信のバランスが大事。'
      },
      {
        q: 'どのようなマネジメントスタイルをとっていますか？',
        a: '「〇〇タイプのマネジメントを基本としていますが、メンバーの特性・状況に応じて柔軟に変えています。例えば〜な場面では〜というスタイルをとります」。具体例を添えて話しましょう。',
        tip: 'スタイルの固定化ではなく状況適応力を示す。メンバーの成長への配慮も。'
      }
    ]
  };

  // 職種別追加質問
  var jobQ = {
    sales: {
      fresh: [
        { q: '営業職を志望した理由は何ですか？', a: '「人と話すことが好きで、直接お客様の課題を解決する仕事に魅力を感じました。特に〜という経験から、提案型の仕事に向いていると自覚しています」', tip: 'コミュニケーション力・ハングリー精神・成果志向をアピール。' },
        { q: 'ノルマ・目標がある仕事についてどう思いますか？', a: '「数値で成果を測れる点にやりがいを感じます。目標に向けて計画を立て、進捗を管理しながら達成を目指すことが得意です」', tip: '前向きな姿勢を示す。プレッシャーへの耐性も伝える。' }
      ],
      junior: [
        { q: '過去の営業成績を教えてください', a: '「担当エリアで月間〇件の新規開拓を行い、目標対比〇%を達成していました。特に〜という戦略が効果的でした」', tip: '数値を必ず入れる。達成方法・工夫を合わせて伝える。' },
        { q: '苦手なお客様とはどのように関わりますか？', a: '「感情的に反応せず、まず相手の立場・背景を理解することを優先します。〜という対話スタイルで関係構築を図っています」', tip: '具体的なエピソードがあると説得力が増す。' }
      ],
      middle: [
        { q: '大型案件の受注に向けてどのようなアプローチをとりますか？', a: '「まず組織の意思決定プロセスと関係者をマッピングします。キーマンへのアプローチと各ステークホルダーへの対策を立て、時間軸を意識して商談を進めます」', tip: 'プロセス管理・関係構築力・戦略性を示す。' },
        { q: '売上が不振な時期にどう対処しますか？', a: '「まず原因分析を行います（市場か、商品か、自分のアクションか）。PDCAを回しながら行動量と質を上げます。必要に応じて上司や仲間に相談し、改善策を実行します」', tip: '諦めない姿勢と論理的な問題解決力をアピール。' }
      ],
      senior: [
        { q: '営業組織の生産性を上げるためにどのような取り組みをしてきましたか？', a: '「案件管理の〇〇化とトークスクリプトの標準化を行い、新人の立ち上がり期間を〇ヶ月短縮しました。また〜という仕組みを導入し組織全体の売上を〇%向上させました」', tip: '個人成績だけでなく組織への貢献・仕組みづくりを示す。' },
        { q: '重要顧客との長期関係構築で重視していることは何ですか？', a: '「利益提供の一方通行にならず、顧客の業績・課題を定期的に確認し、パートナーとして伴走することを重視しています。〜という取り組みで〇年以上の継続取引を維持しています」', tip: '信頼関係・長期視点・顧客成功への貢献を示す。' }
      ]
    },
    engineer: {
      fresh: [
        { q: 'これまでに作成したプログラムや成果物を教えてください', a: '「大学では〜言語を使って〜を作りました。機能は〜で、〜という技術的な工夫をしました」。GitHubなどで見せられると尚よし。', tip: '小さくても自分で考えて作ったものを具体的に話す。' },
        { q: '学習意欲と自己学習の方法を教えてください', a: '「〜という教材・サービスで学習しています。最近は〜という技術に興味を持ち、〜を自作して理解を深めました」', tip: '継続的学習・アウトプット習慣があることを示す。' }

  function generate() {
    var job = document.getElementById('job').value;
    var exp = document.getElementById('exp').value;

    // localStorage に保存
    try {
      localStorage.setItem('interview_job', job);
      localStorage.setItem('interview_exp', exp);
    } catch(e) {}

    var jobName = document.getElementById('job').options[document.getElementById('job').selectedIndex].text;
    var expName = document.getElementById('exp').options[document.getElementById('exp').selectedIndex].text;

    // 質問を合成
    var allQ = (commonQ[exp] || []).concat((jobQ[job] && jobQ[job][exp]) ? jobQ[job][exp] : []);

    // 結果ヘッダー
    var header = document.getElementById('resultHeader');
    header.textContent = '📋 ' + jobName + '×' + expName + '：' + allQ.length + '問の想定質問を生成しました';
    header.style.display = 'block';

    // QA カード描画
    var list = document.getElementById('qaList');
    list.innerHTML = allQ.map(function(item, i) {
      return '<div class="qa-card">'
        + '<div class="qa-q" onclick="toggle(this)" id="q' + i + '">'
        + '<span class="qa-num">' + (i + 1) + '</span>'
        + '<span class="qa-text">' + esc(item.q) + '</span>'
        + '<span class="qa-arrow">▼</span>'
        + '</div>'
        + '<div class="qa-a" id="a' + i + '">'
        + '<p class="qa-a-label">💡 回答例・ポイント</p>'
        + '<p class="qa-a-text">' + esc(item.a) + '</p>'
        + (item.tip ? '<p class="qa-a-tip">⚡ ' + esc(item.tip) + '</p>' : '')
        + '</div>'
        + '</div>';
    }).join('');

    // スクロール
    header.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggle(el) {
    el.classList.toggle('open');
    var idx = el.id.replace('q', '');
    var ans = document.getElementById('a' + idx);
    ans.style.display = ans.style.display === 'block' ? 'none' : 'block';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ページ読み込み時に前回の設定を復元
  (function() {
    try {
      var savedJob = localStorage.getItem('interview_job');
      var savedExp = localStorage.getItem('interview_exp');
      if (savedJob) document.getElementById('job').value = savedJob;
      if (savedExp) document.getElementById('exp').value = savedExp;
    } catch(e) {}
  })();
