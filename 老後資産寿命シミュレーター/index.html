<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老後資産寿命シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 2カラム入力 ── */
    .field-row { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
    .field-row .field { flex: 1; margin-bottom: 0; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── グラフカード ── */
    .chart-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      display: none;
    }
    #chartCanvas {
      width: 100%;
      height: 220px;
      display: block;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card, .chart-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>老後資産寿命シミュレーター</h1>
    <p class="subtitle">貯蓄・年金・生活費から資産が尽きる年齢を計算</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field-row">
      <div class="field">
        <label for="age">現在の年齢</label>
        <input type="number" id="age" placeholder="例: 55" min="20" max="100">
      </div>
      <div class="field">
        <label for="savings">現在の貯蓄額（万円）</label>
        <input type="number" id="savings" placeholder="例: 2000" min="0">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">年金</p>
    <div class="field-row">
      <div class="field">
        <label for="pensionAge">年金受給開始年齢</label>
        <input type="number" id="pensionAge" placeholder="例: 65" value="65" min="60" max="75">
      </div>
      <div class="field">
        <label for="pension">年金月額（万円）</label>
        <input type="number" id="pension" placeholder="例: 15" min="0" step="0.1">
        <p class="hint">夫婦合算でも可</p>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">生活費・その他</p>
    <div class="field-row">
      <div class="field">
        <label for="expense">月々の生活費（万円）</label>
        <input type="number" id="expense" placeholder="例: 25" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="rate">運用利率（年率 %）</label>
        <input type="number" id="rate" placeholder="例: 0" value="0" min="0" max="10" step="0.1">
        <p class="hint">0のまま = 運用なし</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">資産寿命を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">資産が尽きる年齢</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">試算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- グラフカード -->
  <div class="chart-card" id="chartCard">
    <p class="card-title">年別 資産残高推移（万円）</p>
    <canvas id="chartCanvas"></canvas>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このシミュレーターは試算ツールです。実際の年金額・税金・医療費等は個人差があります。目安としてご活用ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'rogo_shisan_v1';

  // localStorage 読み込み
  (function() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (!saved) return;
      ['age','savings','pensionAge','pension','expense','rate'].forEach(function(id) {
        if (saved[id] !== undefined) document.getElementById(id).value = saved[id];
      });
    } catch(e) {}
  })();

  function calc() {
    var age        = parseFloat(document.getElementById('age').value);
    var savings    = parseFloat(document.getElementById('savings').value);
    var pensionAge = parseFloat(document.getElementById('pensionAge').value);
    var pension    = parseFloat(document.getElementById('pension').value);
    var expense    = parseFloat(document.getElementById('expense').value);
    var rate       = parseFloat(document.getElementById('rate').value) || 0;

    if (isNaN(age) || isNaN(savings) || isNaN(pensionAge) || isNaN(pension) || isNaN(expense)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (age < 20 || age > 100) { showErr('年齢は 20〜100 で入力してください'); return; }
    if (pensionAge < age)      { showErr('年金受給開始年齢は現在の年齢より大きくしてください'); return; }

    // localStorage 保存
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        age: age, savings: savings, pensionAge: pensionAge,
        pension: pension, expense: expense, rate: rate
      }));
    } catch(e) {}

    // 月次収支
    var monthlyBeforePension = -expense;         // 年金前：生活費のみ支出
    var monthlyAfterPension  = pension - expense; // 年金後：年金 - 生活費

    var MAX_AGE = 120;
    var balance = savings;
    var depletedAge = null;
    var yearlyData = [{ age: age, balance: balance }];
    var annualRate = 1 + rate / 100;

    for (var a = age; a < MAX_AGE; a++) {
      var monthly = (a < pensionAge) ? monthlyBeforePension : monthlyAfterPension;
      var yearlyChange = monthly * 12;
      balance = balance * annualRate + yearlyChange;

      var nextAge = a + 1;
      if (balance <= 0 && depletedAge === null) {
        // 尽きた年齢を月単位で補間
        var prevBalance = yearlyData[yearlyData.length - 1].balance;
        if (yearlyChange !== 0) {
          var fracYear = -prevBalance / (prevBalance * (annualRate - 1) + yearlyChange);
          depletedAge = a + Math.max(0, Math.min(1, fracYear));
        } else {
          depletedAge = a;
        }
        balance = 0;
        yearlyData.push({ age: nextAge, balance: 0 });
        break;
      }
      yearlyData.push({ age: nextAge, balance: balance });
    }

    // 結果表示
    var level, mainVal, evalTxt, noteTxt;
    var netMonthly = pension - expense;

    if (depletedAge === null) {
      level    = 'ok';
      mainVal  = MAX_AGE + '歳以降も持続';
      evalTxt  = '資産は' + MAX_AGE + '歳まで持続します';
      noteTxt  = '月次収支：' + fmt1(netMonthly) + '万円（年金受給後）';
    } else {
      var depAge = Math.floor(depletedAge);
      var remaining = depAge - age;
      level    = depAge < 80 ? 'ng' : 'warn';
      mainVal  = depAge + '歳ごろ';
      evalTxt  = '現在から約' + remaining + '年後に資産が尽きます';
      noteTxt  = (netMonthly < 0)
        ? '年金受給後も月' + fmt1(-netMonthly) + '万円の赤字が続きます'
        : '年金受給後は月' + fmt1(netMonthly) + '万円の黒字です';
    }

    showResult(level, mainVal, evalTxt, noteTxt);
    showDetail([
      ['現在の年齢',       age + '歳'],
      ['現在の貯蓄額',     fmt(savings) + '万円'],
      ['年金受給開始',     pensionAge + '歳'],
      ['年金月額',         fmt1(pension) + '万円'],
      ['生活費月額',       fmt1(expense) + '万円'],
      ['月次収支（年金前）', fmt1(monthlyBeforePension) + '万円'],
      ['月次収支（年金後）', fmt1(monthlyAfterPension) + '万円', true],
      ['運用利率',         rate + '%'],
    ]);
    drawChart(yearlyData, depletedAge);
  }

  function showResult(level, val, ev, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = ev;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg, '');
    document.getElementById('detail').style.display = 'none';
    document.getElementById('chartCard').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmt1(n) {
    var v = Math.round(n * 10) / 10;
    return (v >= 0 ? '+' : '') + v.toLocaleString('ja-JP');
  }

  // ── Canvas グラフ ──
  function drawChart(data, depletedAge) {
    var card = document.getElementById('chartCard');
    card.style.display = 'block';

    var canvas = document.getElementById('chartCanvas');
    var dpr = window.devicePixelRatio || 1;
    var W = canvas.offsetWidth || 560;
    var H = 220;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    var PAD = { top: 16, right: 20, bottom: 36, left: 54 };
    var gW = W - PAD.left - PAD.right;
    var gH = H - PAD.top  - PAD.bottom;

    var maxBalance = 0;
    data.forEach(function(d) { if (d.balance > maxBalance) maxBalance = d.balance; });
    if (maxBalance <= 0) maxBalance = 100;
    var yMax = Math.ceil(maxBalance / 500) * 500 || 500;

    var minAge = data[0].age;
    var maxAge = data[data.length - 1].age;
    var ageRange = maxAge - minAge || 1;

    function xPos(age)     { return PAD.left + (age - minAge) / ageRange * gW; }
    function yPos(balance) { return PAD.top  + gH - (balance / yMax) * gH; }

    // 背景グリッド
    ctx.strokeStyle = '#e8ddd0';
    ctx.lineWidth = 1;
    [0, 0.25, 0.5, 0.75, 1].forEach(function(t) {
      var y = PAD.top + gH * (1 - t);
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + gW, y);
      ctx.stroke();
      ctx.fillStyle = '#78716c'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(fmt(yMax * t) + '万', PAD.left - 4, y + 4);
    });

    // X軸ラベル
    ctx.fillStyle = '#78716c'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    var step = ageRange <= 20 ? 5 : ageRange <= 40 ? 10 : 15;
    for (var a = Math.ceil(minAge / step) * step; a <= maxAge; a += step) {
      var x = xPos(a);
      ctx.fillText(a + '歳', x, H - PAD.bottom + 14);
    }

    // 資産枯渇ライン（赤い縦線）
    if (depletedAge !== null) {
      var dx = xPos(depletedAge);
      ctx.strokeStyle = '#b91c1c';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(dx, PAD.top); ctx.lineTo(dx, PAD.top + gH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#b91c1c'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(Math.floor(depletedAge) + '歳で枯渇', dx, PAD.top + 10);
    }

    // 折れ線グラフ
    ctx.strokeStyle = '#e07b00';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach(function(d, i) {
      var x = xPos(d.age);
      var y = yPos(d.balance);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 塗りつぶし
    ctx.save();
    ctx.beginPath();
    data.forEach(function(d, i) {
      var x = xPos(d.age);
      var y = yPos(d.balance);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.lineTo(xPos(data[data.length - 1].age), PAD.top + gH);
    ctx.lineTo(xPos(data[0].age), PAD.top + gH);
    ctx.closePath();
    ctx.fillStyle = 'rgba(224,123,0,0.08)';
    ctx.fill();
    ctx.restore();
  }
  </script>

</body>
