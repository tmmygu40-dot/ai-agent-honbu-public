<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>研修管理アプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>研修受講を登録</h2>
      <div class="form-grid">
        <label>スタッフ名
          <input type="text" id="staffName" placeholder="例：山田 太郎">
        </label>
        <label>研修名
          <input type="text" id="trainingName" placeholder="例：安全衛生教育">
        </label>
        <label>受講日
          <input type="date" id="trainingDate">
        </label>
        <label>有効期限（任意）
          <input type="date" id="expiryDate">
        </label>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター・検索 -->
    <section class="filter-section">
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="スタッフ名・研修名で検索">
        <select id="filterStatus">
          <option value="all">すべて表示</option>
          <option value="expired">期限切れ</option>
          <option value="warning">期限間近（30日以内）</option>
          <option value="ok">正常</option>
          <option value="no_expiry">無期限</option>
        </select>
      </div>
    </section>

    <!-- ステータスサマリー -->
    <section class="summary-section">
      <div class="summary-card expired-card">
        <span class="summary-count" id="expiredCount">0</span>
        <span class="summary-label">期限切れ</span>
      </div>
      <div class="summary-card warning-card">
        <span class="summary-count" id="warningCount">0</span>
        <span class="summary-label">期限間近</span>
      </div>
      <div class="summary-card ok-card">
        <span class="summary-count" id="okCount">0</span>
        <span class="summary-label">正常</span>
      </div>
      <div class="summary-card no-expiry-card">
        <span class="summary-count" id="noExpiryCount">0</span>
        <span class="summary-label">無期限</span>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <h2>受講一覧</h2>
      <div id="trainingList" class="training-list">
        <p class="empty-msg">まだ登録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
