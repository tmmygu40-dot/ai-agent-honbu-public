<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーモア変換ツイートジェネレーター｜ネガティブを笑いに変える3案</title>
  <meta name="description" content="仕事・恋愛・家族など日常のネガティブ体験を、自虐・皮肉・ポジティブ反転など5つのトーンで笑える投稿文3案に変換できる無料ジェネレーター。コピーしてSNSにそのまま投稿できます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── ツイート案カード ── */
    .tweet-list { display: flex; flex-direction: column; gap: 0.9rem; }
    .tweet-item {
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 1rem 0.95rem; background: var(--accent-light);
    }
    .tweet-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      background: var(--accent); color: #fff;
      padding: 0.15rem 0.55rem; border-radius: 99px;
      margin-bottom: 0.55rem;
    }
    .tweet-text {
      font-size: 0.96rem; line-height: 1.65; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 0.7rem;
    }
    .tweet-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tweet-actions button {
      flex: 1; min-width: 110px;
      font-size: 0.82rem; font-weight: 700;
      padding: 0.5rem 0.8rem;
      background: #fff; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tweet-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .tweet-actions button.copied { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }
    .tweet-actions button.faved { border-color: var(--accent); color: var(--accent); background: #fff; }

    /* ── お気に入り一覧 ── */
    .fav-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 0.6rem 0; }
    .fav-item {
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 0;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-text { font-size: 0.9rem; line-height: 1.55; margin-bottom: 0.4rem; white-space: pre-wrap; word-break: break-word; }
    .fav-meta { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.4rem; }
    .fav-actions { display: flex; gap: 0.4rem; }
    .fav-actions button {
      font-size: 0.78rem; padding: 0.35rem 0.7rem;
      background: #fff; color: var(--text-sub);
      border: 1px solid var(--border); border-radius: 7px;
      cursor: pointer;
    }
    .fav-actions button:hover { border-color: var(--accent); color: var(--accent); }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.76rem; color: var(--text-sub);
      line-height: 1.6; text-align: left;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>ユーモア変換ツイートジェネレーター</h1>
    <p class="subtitle">ネガティブ体験を、自虐・皮肉・ポジティブ反転など5トーンで笑える投稿文3案に変換</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="cat">体験のカテゴリ</label>
      <select id="cat">
        <option value="仕事">仕事</option>
        <option value="恋愛">恋愛</option>
        <option value="家族">家族</option>
        <option value="友人">友人</option>
        <option value="お金">お金</option>
        <option value="健康">健康</option>
        <option value="通勤通学">通勤・通学</option>
        <option value="日常">日常</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="key">出来事キーワード</label>
      <input type="text" id="key" placeholder="例：上司に怒られた／財布落とした" maxlength="40">
      <p class="hint">短くて具体的な一言が一番ウケます（最大40文字）</p>
    </div>
    <div class="field">
      <label for="tone">変換トーン</label>
      <select id="tone">
        <option value="jigyaku">自虐ユーモア</option>
        <option value="hiniku">皮肉ジョーク</option>
        <option value="positive">ポジティブ反転</option>
        <option value="boke">小ボケ</option>
        <option value="hirinaori">開き直り</option>
        <option value="random">★おまかせ（5トーン混合）</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">3案を生成する</button>

  <!-- 結果カード -->
  <div class="card" id="result-card" style="display:none">
    <p class="card-title">変換結果（3案）</p>
    <div class="tweet-list" id="tweet-list"></div>
  </div>

  <!-- お気に入り -->
  <div class="card">
    <p class="card-title">お気に入り（最大20件）</p>
    <div id="fav-list"></div>
  </div>

  <p class="source-note">
    📚 このツールは、SNS表現の参考としてオリジナル文を自動生成します。投稿前に内容をご確認ください。誹謗中傷・特定個人や団体の中傷につながる表現は含めないようご注意ください（参考：総務省「インターネットトラブル事例集」）。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── ユーティリティ ──
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function pickN(arr, n) {
    var pool = arr.slice();
    var out = [];
    for (var i=0; i<n && pool.length>0; i++) {
      var idx = Math.floor(Math.random()*pool.length);
      out.push(pool.splice(idx,1)[0]);
    }
    return out;
  }
  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  // ── トーン別テンプレ（k=キーワード, c=カテゴリ） ──
  var TEMPLATES = {
    jigyaku: [
      function(k,c){return k+'て、もう履歴書の特技欄に「'+k+'」って書こうかな…ﾌﾌ #人生のスパイス';},
      function(k,c){return '今日の私「'+k+'」。なお、これがデフォルト設定の模様 🤖';},
      function(k,c){return k+'した。これで私の'+c+'失敗コレクションがまた一つ増えた…(誰得)';},
      function(k,c){return '「'+k+'」、私の十八番すぎて家元になれそう 🎌';},
      function(k,c){return k+'するの、年に何回やってる？もう季節の風物詩レベル🌸🌻🍁⛄';},
      function(k,c){return k+'しすぎて、もはや誇りに思えてきた段階に突入しました 🏆';},
      function(k,c){return k+'。「'+c+'」ジャンルで負け続けてる私、別ジャンルなら勝てるかな…？';}
    ],
    hiniku: [
      function(k,c){return k+'て、人生のスパイスってこういうこと？辛すぎて泣いてる🌶️';},
      function(k,c){return k+'を体験できる私、つくづく恵まれてるなぁ(白目)';},
      function(k,c){return k+'するために生きてるのか、生きるために'+k+'するのか…哲学の時間です 🤔';},
      function(k,c){return k+'。世界が私に何を期待しているのか、いまだに分からない 🌏';},
      function(k,c){return k+'。これも全部、人生の最高の演出ってことで処理しときますね 🎬';},
      function(k,c){return k+'するの、もはやプロ級。誰か'+c+'部門で表彰してくれない？🏅';},
      function(k,c){return 'また'+k+'。神は私に何の修行を課してるんだろう…🙏';}
    ],
    positive: [
      function(k,c){return k+'したけど、まあ生きてるからセーフ！🌱 むしろネタが増えてラッキー✨';},
      function(k,c){return k+'！…でも、これも経験値。レベルアップ確定です 🆙';},
      function(k,c){return k+'を乗り越えた今日の私、過去の私より1mm強くなってる説 💪';},
      function(k,c){return k+'したけど、コーヒー飲んだら復活した。人類はカフェインで救われる ☕';},
      function(k,c){return k+'！まあ、ここまでくると逆に伸びしろしかない。そう思うことにする 🌈';},
      function(k,c){return k+'したおかげで、明日のハードル爆下がり。ありがとう過去の私？🌟';},
      function(k,c){return k+'。落ちるとこまで落ちたから、あとは上がるだけだよね…？😇';}
    ],
    boke: [
      function(k,c){return k+'！？それ何？新作のお笑いコント？私、主演？ギャラは？🎤';},
      function(k,c){return k+'た瞬間、空からツッコミ役が降ってきてほしかった ☂️';},
      function(k,c){return k+'。BGMがちょうど壮大な感じだったら、完璧な一場面でした 🎵';},
      function(k,c){return k+'。これ全部、夢オチって設定でいきましょう。はい、おやすみ 🌙';},
      function(k,c){return k+'するの、もはや特殊能力では？図鑑に登録したい 📕';},
      function(k,c){return k+'。私のレベル、隠れキャラだったら相当なボス 👾';},
      function(k,c){return k+'。「'+c+'」のフィールドで遭遇する敵、私には強すぎませんか…';}
    ],
    hirinaori: [
      function(k,c){return k+'したけど、もう知らん！今日はもう寝る！🛌';},
      function(k,c){return k+'。はい、終わり！今日の私のミッション、これで完了 🍵';},
      function(k,c){return k+'！それが何か？私は今日も元気に生きてるんで✌️';},
      function(k,c){return k+'。あ〜もうカップ麺食べて全部忘れる🍜';},
      function(k,c){return k+'したから、今日のおやつはアイス2個🍦🍦 これで全部解決';},
      function(k,c){return k+'。神様の采配なので、私には何の責任もありません🙏';},
      function(k,c){return 'はい、'+k+'。次！👉 もう振り返らない、絶対。';}
    ]
  };
  var TONE_LABEL = {
    jigyaku:'自虐ユーモア', hiniku:'皮肉ジョーク', positive:'ポジティブ反転',
    boke:'小ボケ', hirinaori:'開き直り'
  };
  var ALL_TONES = ['jigyaku','hiniku','positive','boke','hirinaori'];

  // ── 生成 ──
  function generate() {
    var key = (document.getElementById('key').value || '').trim();
    var cat = document.getElementById('cat').value;
    var tone = document.getElementById('tone').value;

    if (!key) { alert('出来事キーワードを入力してください'); return; }
    if (key.length > 40) { alert('キーワードは40文字以内で入力してください'); return; }

    var items = [];
    if (tone === 'random') {
      // 5トーンから3つ重複なくサンプリング
      var picked = pickN(ALL_TONES, 3);
      picked.forEach(function(t){
        var fn = pick(TEMPLATES[t]);
        items.push({ tone: t, label: TONE_LABEL[t], text: fn(key, cat) });
      });
    } else {
      // 同トーンから3案重複なく
      var fns = pickN(TEMPLATES[tone], 3);
      fns.forEach(function(fn){
        items.push({ tone: tone, label: TONE_LABEL[tone], text: fn(key, cat) });
      });
    }
    renderResult(items);
  }

  function renderResult(items) {
    var html = items.map(function(it, i){
      return '<div class="tweet-item" data-i="'+i+'">'
           +   '<span class="tweet-tag">'+escapeHtml(it.label)+'</span>'
           +   '<p class="tweet-text">'+escapeHtml(it.text)+'</p>'
           +   '<div class="tweet-actions">'
           +     '<button onclick="copyTweet(this,'+i+')">📋 コピー</button>'
           +     '<button onclick="favTweet(this,'+i+')">⭐ お気に入り保存</button>'
           +   '</div>'
           + '</div>';
    }).join('');
    document.getElementById('tweet-list').innerHTML = html;
    document.getElementById('result-card').style.display = '';
    window.__lastItems = items;
    document.getElementById('result-card').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function copyTweet(btn, i) {
    var t = (window.__lastItems||[])[i]; if (!t) return;
    var done = function(){ btn.textContent='✅ コピー済み'; btn.classList.add('copied');
                          setTimeout(function(){btn.textContent='📋 コピー'; btn.classList.remove('copied');}, 1800); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t.text).then(done, function(){ fallbackCopy(t.text); done(); });
    } else { fallbackCopy(t.text); done(); }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea'); ta.value = text;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.select(); try { document.execCommand('copy'); } catch(e){} document.body.removeChild(ta);
  }

  // ── お気に入り（localStorage） ──
  var FAV_KEY = 'humor_tweet_favs_v1';
  var FAV_MAX = 20;
  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)||'[]'); } catch(e) { return []; }
  }
  function saveFavs(arr) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); } catch(e) {}
  }
  function favTweet(btn, i) {
    var t = (window.__lastItems||[])[i]; if (!t) return;
    var favs = loadFavs();
    if (favs.some(function(f){ return f.text === t.text; })) {
      btn.textContent = '⭐ 保存済み'; btn.classList.add('faved');
      return;
    }
    favs.unshift({ text: t.text, label: t.label, date: new Date().toISOString().slice(0,10) });
    if (favs.length > FAV_MAX) favs = favs.slice(0, FAV_MAX);
    saveFavs(favs);
    btn.textContent = '⭐ 保存済み'; btn.classList.add('faved');
    renderFavs();
  }
  function removeFav(idx) {
    var favs = loadFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }
  function copyFav(idx) {
    var favs = loadFavs(); var f = favs[idx]; if (!f) return;
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(f.text);
    else fallbackCopy(f.text);
    var btn = document.querySelector('[data-fav-copy="'+idx+'"]');
    if (btn) { var orig = btn.textContent; btn.textContent='✅ コピー済み'; setTimeout(function(){btn.textContent=orig;},1500); }
  }
  function renderFavs() {
    var favs = loadFavs();
    var box = document.getElementById('fav-list');
    if (!favs.length) { box.innerHTML = '<p class="fav-empty">まだお気に入りはありません。⭐ボタンで保存できます。</p>'; return; }
    box.innerHTML = favs.map(function(f, i){
      return '<div class="fav-item">'
           +   '<p class="fav-meta">'+escapeHtml(f.label||'')+'　'+escapeHtml(f.date||'')+'</p>'
           +   '<p class="fav-text">'+escapeHtml(f.text)+'</p>'
           +   '<div class="fav-actions">'
           +     '<button data-fav-copy="'+i+'" onclick="copyFav('+i+')">📋 コピー</button>'
           +     '<button onclick="removeFav('+i+')">🗑 削除</button>'
           +   '</div>'
           + '</div>';
    }).join('');
  }

  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
