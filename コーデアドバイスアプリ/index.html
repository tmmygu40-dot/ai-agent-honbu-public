<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コーデアドバイス</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🧥 コーデアドバイス</h1>
    <p class="subtitle">今日の気温を入れるだけで服装を提案します</p>

    <div class="input-area">
      <label for="temp">今日の気温（℃）</label>
      <div class="input-row">
        <input type="number" id="temp" placeholder="例：18" min="-30" max="50" step="0.5">
        <button id="advise-btn">提案する</button>
      </div>
    </div>

    <div id="result" class="result hidden">
      <div class="temp-display" id="temp-display"></div>
      <div class="advice-box">
        <div class="advice-label">おすすめコーデ</div>
        <div class="advice-text" id="advice-text"></div>
        <div class="advice-items" id="advice-items"></div>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>履歴</h2>
        <button id="clear-btn" class="clear-btn">全削除</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
      <p id="no-history" class="no-history">まだ履歴がありません</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
