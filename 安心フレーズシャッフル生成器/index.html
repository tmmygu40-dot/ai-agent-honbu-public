<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="不安な日もワンタップで安心フレーズをランダム表示。仕事・人間関係・将来・日常の4カテゴリから心が軽くなる言葉をお届けする生活お役立ちアプリです。">
  <title>安心フレーズシャッフル生成器</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── フレーズ表示エリア ── */
    .phrase-area {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .phrase-emoji { font-size: 2.4rem; margin-bottom: 0.5rem; line-height: 1.2; }
    .phrase-text {
      font-size: 1.15rem; font-weight: 700; line-height: 1.7;
      color: var(--text); letter-spacing: 0.01em;
    }
    .phrase-category {
      display: inline-block; margin-top: 0.7rem;
      font-size: 0.72rem; font-weight: 600; color: var(--accent);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.2rem 0.7rem;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-fav {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1rem; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-fav:hover { background: var(--accent-light); }
    .btn-fav.saved { background: var(--accent); color: #fff; }

    /* ── カテゴリフィルタ ── */
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      max-width: 600px; margin: 0 auto 1rem;
      justify-content: center;
    }
    .filter-btn {
      padding: 0.4rem 0.9rem; font-size: 0.8rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── お気に入り一覧 ── */
    .fav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-item-text { font-size: 0.88rem; color: var(--text); line-height: 1.5; flex: 1; }
    .fav-item-cat { font-size: 0.68rem; color: var(--accent); white-space: nowrap; }
    .fav-del {
      font-size: 0.78rem; color: var(--ng); cursor: pointer;
      background: none; border: 1px solid var(--ng);
      border-radius: 6px; padding: 0.2rem 0.5rem;
      white-space: nowrap; flex-shrink: 0;
    }
    .fav-del:hover { background: var(--ng-bg); }
    .fav-empty { font-size: 0.85rem; color: var(--text-sub); text-align: center; padding: 1rem 0; }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .phrase-area { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🌿 安心フレーズシャッフル生成器</h1>
    <p class="subtitle">不安な日もワンタップで心がふわっと軽くなる、安心フレーズをお届けします。</p>
  </header>

  <!-- カテゴリフィルタ -->
  <div class="filter-row" id="filters">
    <button class="filter-btn active" data-cat="all">すべて</button>
    <button class="filter-btn" data-cat="仕事">💼 仕事</button>
    <button class="filter-btn" data-cat="人間関係">🤝 人間関係</button>
    <button class="filter-btn" data-cat="将来">🔮 将来</button>
    <button class="filter-btn" data-cat="日常">☕ 日常</button>
  </div>

  <!-- フレーズ表示エリア -->
  <div class="phrase-area" id="phraseArea">
    <p class="phrase-emoji" id="phraseEmoji">🌿</p>
    <p class="phrase-text" id="phraseText">ボタンをタップすると、安心フレーズが表示されます</p>
    <span class="phrase-category" id="phraseCat" style="display:none"></span>
  </div>

  <!-- シャッフルボタン -->
  <button class="btn-calc" onclick="shuffle()">🔄 安心フレーズをシャッフル</button>

  <!-- お気に入り保存ボタン -->
  <button class="btn-fav no-print" id="btnFav" onclick="toggleFav()" style="display:none">♡ お気に入りに保存</button>

  <!-- お気に入り一覧 -->
  <div class="card" id="favCard">
    <p class="card-title">♥ お気に入りフレーズ</p>
    <div id="favList">
      <p class="fav-empty">まだお気に入りがありません</p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    🌱 このアプリは、心理学・認知行動療法の考え方を参考に、日常で使いやすい安心フレーズを収録しています。深刻な症状がある場合は専門家にご相談ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var PHRASES = [
    { cat: '仕事', emoji: '💼', text: '今日やれることを一つやれば、それで十分。全部やらなくていい。' },
    { cat: '仕事', emoji: '🌱', text: '失敗は「次はこうしよう」が見つかった証拠。前に進んでる。' },
    { cat: '仕事', emoji: '☕', text: '頑張りすぎてるなら、休むのも立派な仕事のうち。' },
    { cat: '仕事', emoji: '🎯', text: '完璧じゃなくていい。70点で出して、あとから磨けばOK。' },
    { cat: '仕事', emoji: '🌤', text: 'あなたが思ってるほど、周りはあなたのミスを気にしてない。' },
    { cat: '仕事', emoji: '💪', text: '苦手なことがあるのは当たり前。得意なことで返せばいい。' },
    { cat: '仕事', emoji: '📝', text: '「わからない」と言えるのは強さ。聞ける人が一番伸びる。' },
    { cat: '仕事', emoji: '🕊', text: '今日の仕事は今日で終わり。家に持ち帰らなくて大丈夫。' },
    { cat: '人間関係', emoji: '🤝', text: '全員に好かれなくていい。大切な人が数人いれば十分。' },
    { cat: '人間関係', emoji: '💬', text: '言いたいことを我慢しすぎなくていい。伝え方を変えればいいだけ。' },
    { cat: '人間関係', emoji: '🌻', text: '相手の機嫌は相手の問題。あなたのせいじゃない。' },
    { cat: '人間関係', emoji: '🫂', text: '「ごめんね」も「ありがとう」も、言えるだけですごいこと。' },
    { cat: '人間関係', emoji: '🎈', text: '距離を置くのは冷たいことじゃない。自分を守る優しさ。' },
    { cat: '人間関係', emoji: '🌈', text: '合わない人がいるのは自然なこと。無理に合わせなくていい。' },
    { cat: '人間関係', emoji: '☘', text: '相手を変えようとしなくていい。自分の反応だけ変えればいい。' },
    { cat: '人間関係', emoji: '💛', text: 'あなたの気持ちを大切にしてくれる人は、ちゃんといる。' },
    { cat: '将来', emoji: '🔮', text: '10年後の自分が「あの時悩んでたな」と笑って思い出す日が来る。' },
    { cat: '将来', emoji: '🗺', text: '人生に正解のルートはない。今いる場所から始めれば大丈夫。' },
    { cat: '将来', emoji: '🌅', text: '将来が不安なのは、ちゃんと考えてる証拠。それだけで一歩先。' },
    { cat: '将来', emoji: '🧩', text: '今は意味がわからなくても、あとで全部つながる日が来る。' },
    { cat: '将来', emoji: '🌟', text: '比べるのは他人じゃなくて、昨日の自分だけでいい。' },
    { cat: '将来', emoji: '🛤', text: '遠回りに見えても、あなたにしか歩けない道がある。' },
    { cat: '将来', emoji: '🕯', text: '不安な夜は長く感じるけど、朝は必ず来る。' },
    { cat: '将来', emoji: '🌳', text: '焦らなくていい。種をまいた日と実がなる日は違う。' },
    { cat: '日常', emoji: '☀', text: '朝起きられた。それだけで今日の第一関門はクリア。' },
    { cat: '日常', emoji: '🍵', text: 'とりあえず温かいものを飲もう。それだけで少し楽になる。' },
    { cat: '日常', emoji: '🛁', text: '疲れたらお風呂に入って寝る。明日の自分に任せていい。' },
    { cat: '日常', emoji: '🌙', text: '今日も一日お疲れさま。生きてるだけで100点。' },
    { cat: '日常', emoji: '🎵', text: '深呼吸を3回。吸って、吐いて。それだけで体がゆるむ。' },
    { cat: '日常', emoji: '🐱', text: 'やる気が出ない日は、やる気がなくてもできることだけやればいい。' },
    { cat: '日常', emoji: '🌸', text: '「まあいっか」は最強の魔法の言葉。使っていい。' },
    { cat: '日常', emoji: '🍀', text: '小さな幸せに気づけたら、今日はいい日。それで十分。' },
    { cat: '仕事', emoji: '🔑', text: '「やらなきゃ」を「やってみよう」に変えるだけで心が軽くなる。' },
    { cat: '人間関係', emoji: '🪴', text: '自分を大切にすることは、わがままじゃない。必要なこと。' },
    { cat: '将来', emoji: '✨', text: '今のあなたは、過去のあなたが乗り越えてきた結果。十分すごい。' },
    { cat: '日常', emoji: '🧸', text: 'がんばれない日があっても、あなたの価値は変わらない。' }
  ];

  var currentPhrase = null;
  var currentFilter = 'all';
  var FAV_KEY = 'anshin_phrase_favs';

  function getFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
    catch(e) { return []; }
  }
  function saveFavs(favs) {
    localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  }

  function getFiltered() {
    if (currentFilter === 'all') return PHRASES;
    return PHRASES.filter(function(p) { return p.cat === currentFilter; });
  }

  function shuffle() {
    var pool = getFiltered();
    if (pool.length === 0) return;
    var idx = Math.floor(Math.random() * pool.length);
    if (pool.length > 1 && currentPhrase && pool[idx].text === currentPhrase.text) {
      idx = (idx + 1) % pool.length;
    }
    currentPhrase = pool[idx];

    document.getElementById('phraseEmoji').textContent = currentPhrase.emoji;
    document.getElementById('phraseText').textContent = currentPhrase.text;
    var catEl = document.getElementById('phraseCat');
    catEl.textContent = currentPhrase.cat;
    catEl.style.display = 'inline-block';

    var btn = document.getElementById('btnFav');
    btn.style.display = 'block';
    updateFavBtn();
  }

  function isFaved(text) {
    var favs = getFavs();
    for (var i = 0; i < favs.length; i++) {
      if (favs[i].text === text) return true;
    }
    return false;
  }

  function updateFavBtn() {
    var btn = document.getElementById('btnFav');
    if (!currentPhrase) { btn.style.display = 'none'; return; }
    if (isFaved(currentPhrase.text)) {
      btn.textContent = '♥ お気に入り済み';
      btn.classList.add('saved');
    } else {
      btn.textContent = '♡ お気に入りに保存';
      btn.classList.remove('saved');
    }
  }

  function toggleFav() {
    if (!currentPhrase) return;
    var favs = getFavs();
    var exists = false;
    for (var i = 0; i < favs.length; i++) {
      if (favs[i].text === currentPhrase.text) {
        favs.splice(i, 1);
        exists = true;
        break;
      }
    }
    if (!exists) {
      favs.push({ cat: currentPhrase.cat, emoji: currentPhrase.emoji, text: currentPhrase.text });
    }
    saveFavs(favs);
    updateFavBtn();
    renderFavs();
  }

  function removeFav(idx) {
    var favs = getFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    updateFavBtn();
    renderFavs();
  }

  function renderFavs() {
    var favs = getFavs();
    var el = document.getElementById('favList');
    if (favs.length === 0) {
      el.innerHTML = '<p class="fav-empty">まだお気に入りがありません</p>';
      return;
    }
    var html = '';
    for (var i = 0; i < favs.length; i++) {
      html += '<div class="fav-item">'
        + '<span class="fav-item-text">' + favs[i].emoji + ' ' + escHtml(favs[i].text) + '</span>'
        + '<span class="fav-item-cat">' + escHtml(favs[i].cat) + '</span>'
        + '<button class="fav-del" onclick="removeFav(' + i + ')">削除</button>'
        + '</div>';
    }
    el.innerHTML = html;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // フィルタボタン
  document.getElementById('filters').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    var all = document.querySelectorAll('.filter-btn');
    for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
  });

  // 初期表示
  renderFavs();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
