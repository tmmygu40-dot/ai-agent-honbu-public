<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七夕願い事タイプ診断｜5問で分かる本音の願い</title>
  <meta name="description" content="5問の3択に答えるだけで、今一番叶えたい願い事タイプを診断。短冊に書きたい一言とアドバイスが30秒で分かる七夕向け無料診断アプリです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem; color: var(--text);
    }
    .progress {
      font-size: 0.78rem; color: var(--text-sub);
      margin-bottom: 0.6rem; text-align: right;
    }
    .choice-btn {
      display: block; width: 100%;
      padding: 0.95rem 1rem; margin-bottom: 0.7rem;
      font-size: 0.98rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover, .choice-btn:active {
      border-color: var(--accent); background: var(--accent-light);
    }
    .choice-btn:last-child { margin-bottom: 0; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-emoji-big { font-size: 3rem; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.8rem; }
    .result-quote {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      background: var(--accent-light);
      padding: 0.9rem 0.8rem; border-radius: 10px;
      margin-bottom: 0.8rem; line-height: 1.5;
    }
    .result-note { font-size: 0.9rem; color: var(--text-sub); line-height: 1.6; text-align: left; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .choice-btn { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎋 七夕願い事タイプ診断</h1>
    <p class="subtitle">5問の3択であなたの本音の願いタイプを判定。短冊に書く一言が見つかります。</p>
  </header>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <p class="progress" id="progress">質問 1 / 5</p>
    <p class="question-text" id="q-text">—</p>
    <div id="choices"></div>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-emoji-big" id="rEmoji">⭐</p>
    <p class="result-label">あなたの願い事タイプ</p>
    <p class="result-value" id="rType">—</p>
    <p class="result-quote" id="rQuote">—</p>
    <p class="result-note" id="rNote"></p>
  </div>

  <!-- もう一度ボタン（結果表示後に出す） -->
  <button class="btn-calc" id="btn-restart" style="display:none" onclick="restart()">🎋 もう一度診断する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✨ このツールはエンタメ用途の診断アプリです。願いを言語化するきっかけとしてお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 質問データ ──
  // 各選択肢の weights は {タイプ名: 重み}
  var QUESTIONS = [
    {
      q: 'ふと深呼吸したくなる夜、頭に浮かぶのは？',
      choices: [
        { text: '気になる人の顔やLINEのやり取り', w: { 恋愛: 2, 自由: 1 } },
        { text: '今日の仕事や明日の予定', w: { 仕事: 2, お金: 1 } },
        { text: '家族や友達の元気な顔', w: { 家族: 2, 健康: 1 } }
      ]
    },
    {
      q: '休日に時間ができたら、まずやりたいことは？',
      choices: [
        { text: '誰かと出かける・話す', w: { 恋愛: 1, 家族: 2 } },
        { text: 'スキルアップや副業に時間を使う', w: { 仕事: 2, お金: 2 } },
        { text: '体を動かす・ゆっくり寝る', w: { 健康: 2, 自由: 1 } }
      ]
    },
    {
      q: '最近一番ホッとした瞬間は？',
      choices: [
        { text: '誰かに「ありがとう」と言われた時', w: { 恋愛: 1, 家族: 2 } },
        { text: '貯金や給料の数字を見た時', w: { お金: 3 } },
        { text: '体調が良いと感じた時', w: { 健康: 3 } }
      ]
    },
    {
      q: 'もし1つだけ願いが叶うとしたら、本音の優先順位は？',
      choices: [
        { text: '人間関係（恋・家族・友達）が満たされる', w: { 恋愛: 2, 家族: 2 } },
        { text: '経済的に余裕ができる', w: { お金: 2, 仕事: 2 } },
        { text: '心と体が軽くなる・自由に過ごせる', w: { 健康: 2, 自由: 2 } }
      ]
    },
    {
      q: '1年後の自分に一番期待していることは？',
      choices: [
        { text: '大切な人と良い関係でいられること', w: { 恋愛: 2, 家族: 2 } },
        { text: '仕事や収入で結果を出していること', w: { 仕事: 2, お金: 2 } },
        { text: '心も体も健康で自分らしくいられること', w: { 健康: 2, 自由: 2 } }
      ]
    }
  ];

  // ── タイプ別 結果データ ──
  var TYPES = {
    恋愛: {
      emoji: '💗',
      name: '恋愛・パートナー成就タイプ',
      quote: '「大切な人と、もっと心が通いますように」',
      note: 'あなたの本音は「誰かと深くつながりたい」気持ち。短冊には素直に相手の名前や関係性を書くと、自分の気持ちにも素直になれます。気になる人がいるなら、来週中に1回は話しかけるきっかけを作ってみて。'
    },
    仕事: {
      emoji: '💼',
      name: 'キャリア・成果アップタイプ',
      quote: '「努力が形になり、自信が持てますように」',
      note: 'あなたは今、仕事やスキルで前進したいモード。短冊には具体的な数字や役職、案件名を書くと現実が動き出します。今週、自分の進捗を1行メモする習慣を始めてみてください。'
    },
    お金: {
      emoji: '💰',
      name: '金運・経済安定タイプ',
      quote: '「家計に余裕が生まれ、心も穏やかになりますように」',
      note: 'お金の不安が密かに重くなっている時期。短冊には「貯金◯万円」「副収入◯円」など金額を書くと意識が変わります。固定費の見直し1項目から始めると効果が出やすいです。'
    },
    健康: {
      emoji: '🌿',
      name: '健康・心身バランスタイプ',
      quote: '「心も体も軽やかに過ごせますように」',
      note: '体や心が「そろそろ休んで」とサインを出しています。短冊には「よく眠れますように」など体の声をそのまま書いてOK。今夜は10分早く寝る、それだけで明日が違います。'
    },
    家族: {
      emoji: '👨‍👩‍👧',
      name: '家族・大切な人の幸せタイプ',
      quote: '「家族みんなが笑顔で過ごせますように」',
      note: 'あなたは自分より周りを優先しがち。短冊には家族の名前を書きつつ、自分のことも1つ加えてみて。今週、家族と5分電話か食卓を共にする時間を意識的に作ってみてください。'
    },
    自由: {
      emoji: '🕊️',
      name: '自由・自分らしさ解放タイプ',
      quote: '「縛られず、自分らしくいられますように」',
      note: '「本当はもっと自由にやりたい」気持ちが膨らんでいます。短冊には「やめたいこと」を1つ書くのも効果的。今月、自分だけの時間を1日つくる予定を入れてみてください。'
    }
  };

  var STORAGE_KEY = 'tanabata-wish-type-last';
  var current = 0;
  var scores = {};

  function init() {
    current = 0;
    scores = { 恋愛: 0, 仕事: 0, お金: 0, 健康: 0, 家族: 0, 自由: 0 };
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('btn-restart').style.display = 'none';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[current];
    document.getElementById('progress').textContent = '質問 ' + (current + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    for (var i = 0; i < q.choices.length; i++) {
      (function(idx) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = q.choices[idx].text;
        btn.onclick = function() { answer(idx); };
        choicesEl.appendChild(btn);
      })(i);
    }
  }

  function answer(idx) {
    var w = QUESTIONS[current].choices[idx].w;
    for (var k in w) {
      if (w.hasOwnProperty(k)) {
        scores[k] = (scores[k] || 0) + w[k];
      }
    }
    current++;
    if (current >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    // 最大スコアのタイプを特定（複数あれば先に出てきたもの）
    var topType = null;
    var topScore = -1;
    var order = ['恋愛', '仕事', 'お金', '健康', '家族', '自由'];
    for (var i = 0; i < order.length; i++) {
      var k = order[i];
      if ((scores[k] || 0) > topScore) {
        topScore = scores[k];
        topType = k;
      }
    }
    var t = TYPES[topType];
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('rEmoji').textContent = t.emoji;
    document.getElementById('rType').textContent = t.name;
    document.getElementById('rQuote').textContent = t.quote;
    document.getElementById('rNote').textContent = t.note;
    document.getElementById('result').style.display = 'block';
    document.getElementById('btn-restart').style.display = 'block';
    // localStorage に保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        type: topType,
        date: new Date().toISOString().slice(0, 10)
      }));
    } catch (e) {}
    // 結果カードへスクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function restart() {
    init();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 起動
  init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
