<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ対応価格シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>値上げ対応<br>価格シミュレーター</h1>
    <p class="subtitle">仕入れ値上昇時の適正売価を自動計算</p>

    <section class="input-section card">
      <h2>商品を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="productName">商品名</label>
          <input type="text" id="productName" placeholder="例：醤油 1L">
        </div>
        <div class="form-group">
          <label for="oldCost">現行仕入れ値（円）</label>
          <input type="number" id="oldCost" placeholder="例：500" min="0">
        </div>
        <div class="form-group">
          <label for="newCost">新仕入れ値（円）</label>
          <input type="number" id="newCost" placeholder="例：600" min="0">
        </div>
        <div class="form-group">
          <label for="grossMargin">目標粗利率（%）</label>
          <input type="number" id="grossMargin" placeholder="例：30" min="0" max="99" value="30">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加して計算</button>
    </section>

    <section class="result-section">
      <div class="result-header">
        <h2>計算結果 <span id="count" class="count-badge">0件</span></h2>
        <button id="clearBtn" class="btn-danger">全削除</button>
      </div>
      <div id="emptyMsg" class="empty-msg">商品を追加すると結果が表示されます</div>
      <div id="tableWrap" class="table-wrap hidden">
        <table id="resultTable">
          <thead>
            <tr>
              <th>商品名</th>
              <th>現行仕入れ値</th>
              <th>新仕入れ値</th>
              <th>値上げ率</th>
              <th>粗利率</th>
              <th>推奨売価</th>
              <th>粗利額</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
