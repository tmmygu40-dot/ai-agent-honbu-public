<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤝 人に甘えられる力タイプ診断</title>
  <meta name="description" content="5問に答えるだけで、あなたの『人に甘えられる力』のタイプが分かります。自分の甘え方の傾向を診断して、人間関係をもっと上手く築くためのヒントをゲット。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .question-text { display: block; font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 0.6rem; }

    .option-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .option-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .option-label:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .option-label input[type="radio"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .option-label input[type="radio"]:checked + .option-text {
      font-weight: 700;
      color: var(--accent);
    }
    .option-text { font-size: 0.9rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 0.95rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🤝 人に甘えられる力タイプ診断</h1>
    <p class="subtitle">5問で分かるあなたの甘え方タイプ</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">診断問題</p>
    <div id="questions-container"></div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-emoji" id="result-emoji">🤝</p>
    <p class="result-label">あなたのタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 広告枠（仮） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
    // ── 診断データ ──
    var QUESTIONS = [
      {
        q: '友人が悩んでいるとき、あなたはどうする？',
        options: [
          { text: '話を聞いて、一緒に考えるのが自然', score: 4 },
          { text: '助言できそうなら提案するけど、自分から頼るのは別', score: 2 },
          { text: 'アドバイスより、気分転換を優先する', score: 1 },
          { text: '相手が先に頼ってくるまで待つ', score: 0 },
          { text: 'どう対応していいか分からず困る', score: 1 }
        ]
      },
      {
        q: '自分の力では解決できない問題が生じたとき、あなたは？',
        options: [
          { text: '迷わず誰かに相談・助言を求める', score: 4 },
          { text: '信頼できる人にだけ相談する', score: 3 },
          { text: '自分でなんとか解決しようとする', score: 1 },
          { text: '困っているのが周囲に気づかれるのが嫌', score: 0 },
          { text: 'とりあえず様子を見る', score: 1 }
        ]
      },
      {
        q: '誰かに何か支援してもらったとき、あなたの気持ちは？',
        options: [
          { text: '素直に感謝して、返す機会を探す', score: 3 },
          { text: '申し訳ない気持ちで、早く返そうとする', score: 2 },
          { text: 'ずっと恩義を感じ続けてしまう', score: 0 },
          { text: '当たり前だと思ってしまう', score: 2 },
          { text: '複雑な気持ちになる', score: 1 }
        ]
      },
      {
        q: 'グループで活動するとき、あなたの役割は？',
        options: [
          { text: 'サポート役に回り、他者に助言・援助する', score: 1 },
          { text: 'リード側だが、必要に応じて頼れる', score: 3 },
          { text: '自分のタスクに集中し、他者に頼らない', score: 0 },
          { text: 'メンバーの意見を聞きながら動く', score: 2 },
          { text: 'サポートを受けながら前に進む', score: 4 }
        ]
      },
      {
        q: '親友や家族との関係で、あなたが最も心地よいのは？',
        options: [
          { text: 'お互いに頼り・頼られる関係', score: 4 },
          { text: '自立しつつも、時々相談できる関係', score: 3 },
          { text: '独立した大人同士、深く干渉しない関係', score: 0 },
          { text: 'いつでも相手のサポートになれる関係', score: 1 },
          { text: '一定の距離を保ちながらも安心できる関係', score: 2 }
        ]
      }
    ];

    var TYPE_LEVELS = [
      { min: 0, max: 4, type: '甘え抵抗タイプ', emoji: '😤', eval: '自分で何とかしたいタイプ', note: 'あなたは自立心が強く、人に頼るのが苦手。でも時には甘えることで、関係がもっと深まることも。相手に「助けてもいい」と伝えることも大事。', level: 'ng' },
      { min: 5, max: 9, type: '慎重甘えタイプ', emoji: '🤔', eval: '信頼できる人への限定甘え', note: 'あなたは頼る相手を慎重に選びます。信頼できる人にはしっかり甘えられるのが強み。より多くの人に甘えられるようになると、人間関係が広がります。', level: 'warn' },
      { min: 10, max: 14, type: 'バランス甘えタイプ', emoji: '🤗', eval: '自然で健全な甘え方', note: 'あなたは人に頼ることと自立のバランスが取れています。この関係の築き方を大事にすれば、人間関係はもっと豊かになります。', level: 'ok' },
      { min: 15, max: 19, type: '積極甘えタイプ', emoji: '😊', eval: '頼ることで相手を活かす甘え', note: 'あなたは上手に甘えられるタイプ。その分、頼られた時にしっかり応えることも心がけると、より良い関係が作れます。', level: 'ok' },
      { min: 20, max: 20, type: '究極甘えタイプ', emoji: '🎉', eval: 'みんなに信頼される甘え上手', note: 'あなたは甘え上手で、周囲からも信頼されています。この関係の築き方は、職場や友人関係でも役に立つスキル。自信を持って続けましょう。', level: 'ok' }
    ];

    // ── 初期化 ──
    function init() {
      var container = document.getElementById('questions-container');
      container.innerHTML = '';
      QUESTIONS.forEach(function(q, idx) {
        var fieldDiv = document.createElement('div');
        fieldDiv.className = 'field';

        var qText = document.createElement('span');
        qText.className = 'question-text';
        qText.textContent = (idx + 1) + '問目：' + q.q;
        fieldDiv.appendChild(qText);

        var optionGroup = document.createElement('div');
        optionGroup.className = 'option-group';

        q.options.forEach(function(opt, optIdx) {
          var optId = 'q' + idx + 'o' + optIdx;
          var label = document.createElement('label');
          label.className = 'option-label';
          label.innerHTML = '<input type="radio" id="' + optId + '" name="q' + idx + '" value="' + opt.score + '">' +
                           '<span class="option-text">' + opt.text + '</span>';
          optionGroup.appendChild(label);
        });

        fieldDiv.appendChild(optionGroup);
        container.appendChild(fieldDiv);
      });

      // ── localStorage から前回の結果を復元 ──
      loadResult();
    }

    function diagnose() {
      var scores = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        var selected = document.querySelector('input[name="q' + i + '"]:checked');
        if (!selected) {
          showErr('すべての問題に答えてください');
          return;
        }
        scores.push(parseInt(selected.value));
      }

      var total = scores.reduce(function(a, b) { return a + b; }, 0);
      var typeData = TYPE_LEVELS.find(function(t) { return total >= t.min && total <= t.max; });

      if (!typeData) typeData = TYPE_LEVELS[2]; // デフォルト

      showResult(typeData);
      saveResult(typeData, total);
    }

    function showResult(typeData) {
      var rc = document.getElementById('result');
      rc.className = 'result-card ' + typeData.level;
      document.getElementById('result-emoji').textContent = typeData.emoji;
      document.getElementById('rv').textContent = typeData.type;
      document.getElementById('re').textContent = typeData.eval;
      document.getElementById('rn').textContent = typeData.note;
      rc.style.display = 'block';
    }

    function showErr(msg) {
      showResult({ type: '⚠️ 未入力エラー', emoji: '⚠️', eval: 'エラー', note: msg, level: 'ng' });
    }

    function saveResult(typeData, total) {
      var today = new Date();
      var dateStr = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
      localStorage.setItem('diagnoseResult', JSON.stringify({
        type: typeData.type,
        score: total,
        date: dateStr
      }));
    }

    function loadResult() {
      var saved = localStorage.getItem('diagnoseResult');
      if (!saved) return;
      try {
        var data = JSON.parse(saved);
        var typeData = TYPE_LEVELS.find(function(t) { return data.score >= t.min && data.score <= t.max; });
        if (typeData) showResult(typeData);
      } catch (e) {
        // 不正なデータは無視
      }
    }

    // ── 초기화 실행 ──
    init();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
