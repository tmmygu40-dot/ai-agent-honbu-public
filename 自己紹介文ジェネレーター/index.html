<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="性格・趣味・仕事を3択で選ぶだけで、SNSプロフィール用の自己紹介文を即生成。再生成で別パターンも作れて、ワンタップでコピーできる無料ツールです。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-sub); margin-bottom: 0.6rem; text-align: center;
    }
    .result-text {
      font-size: 1rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .result-actions {
      display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center;
    }
    .btn-mini {
      flex: 1 1 140px;
      padding: 0.7rem 0.9rem;
      font-size: 0.92rem; font-weight: 700;
      border-radius: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy {
      background: var(--ok); color: #fff; border: none;
    }
    .btn-copy:active { opacity: 0.85; }
    .btn-regen {
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent);
    }
    .copy-msg {
      text-align: center; font-size: 0.82rem; color: var(--ok);
      margin-top: 0.6rem; min-height: 1.2em;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>自己紹介文ジェネレーター</h1>
    <p class="subtitle">性格・趣味・仕事を3択で選ぶだけ。SNSプロフィール文がすぐ完成します</p>
  </header>

  <div class="card">
    <p class="card-title">3つを選ぶ</p>
    <div class="field">
      <label for="f1">性格</label>
      <select id="f1">
        <option value="のんびり屋">のんびり屋</option>
        <option value="せっかち">せっかち</option>
        <option value="人見知り">人見知り</option>
        <option value="社交的">社交的</option>
        <option value="マイペース">マイペース</option>
        <option value="負けず嫌い">負けず嫌い</option>
        <option value="心配性">心配性</option>
        <option value="楽天家">楽天家</option>
        <option value="真面目">真面目</option>
        <option value="ちょっと変わり者">ちょっと変わり者</option>
      </select>
    </div>
    <div class="field">
      <label for="f2">趣味</label>
      <select id="f2">
        <option value="読書">読書</option>
        <option value="映画鑑賞">映画鑑賞</option>
        <option value="ゲーム">ゲーム</option>
        <option value="カフェ巡り">カフェ巡り</option>
        <option value="筋トレ">筋トレ</option>
        <option value="散歩">散歩</option>
        <option value="料理">料理</option>
        <option value="音楽鑑賞">音楽鑑賞</option>
        <option value="旅行">旅行</option>
        <option value="アニメ">アニメ</option>
        <option value="写真">写真</option>
        <option value="二度寝">二度寝</option>
      </select>
    </div>
    <div class="field">
      <label for="f3">仕事</label>
      <select id="f3">
        <option value="会社員">会社員</option>
        <option value="エンジニア">エンジニア</option>
        <option value="デザイナー">デザイナー</option>
        <option value="営業">営業</option>
        <option value="事務">事務</option>
        <option value="フリーランス">フリーランス</option>
        <option value="学生">学生</option>
        <option value="主婦・主夫">主婦・主夫</option>
        <option value="クリエイター">クリエイター</option>
        <option value="接客業">接客業</option>
        <option value="医療従事者">医療従事者</option>
        <option value="その他">その他</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのSNSプロフィール文</p>
    <p class="result-text" id="rv">—</p>
    <div class="result-actions">
      <button class="btn-mini btn-copy" onclick="copyText()">📋 コピーする</button>
      <button class="btn-mini btn-regen" onclick="generate()">🔄 別パターン</button>
    </div>
    <p class="copy-msg" id="cm"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 生成された文はあくまで叩き台です。お好みで言い回しを調整してそのまま SNS のプロフィール欄にお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'profileGen_v1';

  var TEMPLATES = [
    function(p, h, w) {
      return '【' + p + '】タイプの' + w + 'です。\n趣味は' + h + '。\nゆるっと投稿していくのでよろしくお願いします🙌';
    },
    function(p, h, w) {
      return w + ' / ' + p + ' / ' + h + 'が好き\n気の合う人とつながれたら嬉しいです。\n気軽にフォローどうぞ✨';
    },
    function(p, h, w) {
      return 'プロフィール\n┗ ' + w + '\n┗ ' + p + 'な性格\n┗ ' + h + 'にハマり中\n日々のことをマイペースに発信📮';
    },
    function(p, h, w) {
      return 'こんにちは、' + w + 'をしている' + p + 'です。\n最近は' + h + 'にどっぷり🎯\n同じ趣味の方、ぜひ仲良くしてください！';
    },
    function(p, h, w) {
      return p + '×' + h + '×' + w + '\nこの3つで生きてます。\n発信は気まぐれですが、よろしくお願いします☕';
    },
    function(p, h, w) {
      return 'ふだんは' + w + '、休日は' + h + '。\n性格は' + p + 'タイプ。\nゆる〜く繋がりましょう🌱';
    }
  ];

  var lastIndex = -1;

  function generate() {
    var p = document.getElementById('f1').value;
    var h = document.getElementById('f2').value;
    var w = document.getElementById('f3').value;

    save({ p: p, h: h, w: w });

    var idx;
    if (TEMPLATES.length <= 1) {
      idx = 0;
    } else {
      do {
        idx = Math.floor(Math.random() * TEMPLATES.length);
      } while (idx === lastIndex);
    }
    lastIndex = idx;

    var text = TEMPLATES[idx](p, h, w);
    document.getElementById('rv').textContent = text;
    document.getElementById('cm').textContent = '';
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText() {
    var text = document.getElementById('rv').textContent;
    var msg = document.getElementById('cm');
    var ok = function(){ msg.textContent = '✅ コピーしました'; setTimeout(function(){ msg.textContent = ''; }, 2200); };
    var ng = function(){ msg.textContent = '⚠️ コピーに失敗しました。長押しで選択してください'; };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, function(){ fallbackCopy(text, ok, ng); });
    } else {
      fallbackCopy(text, ok, ng);
    }
  }

  function fallbackCopy(text, ok, ng) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'absolute'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      var done = document.execCommand('copy');
      document.body.removeChild(ta);
      done ? ok() : ng();
    } catch(e) { ng(); }
  }

  function save(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.p) setSelect('f1', s.p);
      if (s.h) setSelect('f2', s.h);
      if (s.w) setSelect('f3', s.w);
    } catch(e) {}
  }

  function setSelect(id, val) {
    var el = document.getElementById(id);
    if (!el) return;
    for (var i = 0; i < el.options.length; i++) {
      if (el.options[i].value === val) { el.selectedIndex = i; return; }
    }
  }

  restore();
  </script>

</body>
