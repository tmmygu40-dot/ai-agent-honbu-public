<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>症状別受診科案内アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── カテゴリグリッド ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }
    .cat-btn {
      padding: 0.7rem 0.4rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .cat-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .cat-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .cat-icon { display: block; font-size: 1.4rem; margin-bottom: 0.2rem; }

    /* ── 症状リスト ── */
    .symptom-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .sym-btn {
      padding: 0.65rem 0.75rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      text-align: left;
      transition: all 0.15s;
    }
    .sym-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .sym-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 700;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }

    .result-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1rem; }
    .urgency-badge {
      flex-shrink: 0;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .ok .urgency-badge   { background: var(--ok);   color: #fff; }
    .warn .urgency-badge { background: var(--warn);  color: #fff; }
    .ng .urgency-badge   { background: var(--ng);    color: #fff; }

    .result-dept {
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1.3;
    }
    .ok .result-dept   { color: var(--ok); }
    .warn .result-dept { color: var(--warn); }
    .ng .result-dept   { color: var(--ng); }

    .result-note {
      font-size: 0.84rem;
      color: var(--text-sub);
      line-height: 1.6;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* ── 最近の履歴 ── */
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .history-tag {
      padding: 0.3rem 0.75rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.78rem;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .history-tag:hover { background: var(--accent); color: #fff; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 400px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .symptom-list { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: #fff; padding: 0; }
      .back-link, #fav-widget, .no-print { display: none !important; }
    }
  </style>

</head>

  var URGENCY_TEXT = { ok: '様子を見てもOK', warn: '数日以内に受診', ng: 'すぐ受診・救急' };
  var selectedCat = null;
  var selectedSym = null;

  function init() {
    renderCategories();
    renderHistory();
  }

  function renderCategories() {
    var grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    Object.keys(DATA).forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.innerHTML = '<span class="cat-icon">' + DATA[cat].icon + '</span>' + cat;
      btn.onclick = function() { selectCategory(cat); };
      grid.appendChild(btn);
    });
  }

  function selectCategory(cat) {
    selectedCat = cat;
    selectedSym = null;

    // カテゴリボタンのactive更新
    document.querySelectorAll('.cat-btn').forEach(function(b) {
      b.classList.toggle('active', b.textContent.trim().includes(cat));
    });

    // 症状リストを表示
    var symCard = document.getElementById('symCard');
    var symList = document.getElementById('symList');
    document.getElementById('symCardTitle').textContent = '② 症状を選ぶ（' + cat + '）';
    symCard.style.display = 'block';
    symList.innerHTML = '';
    DATA[cat].symptoms.forEach(function(s, i) {
      var btn = document.createElement('button');
      btn.className = 'sym-btn';
      btn.textContent = s.name;
      btn.onclick = function() { selectSymptom(i); };
      symList.appendChild(btn);
    });

    // 結果を隠す
    document.getElementById('result').style.display = 'none';

    // スクロール
    symCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function selectSymptom(idx) {
    if (!selectedCat) return;
    var s = DATA[selectedCat].symptoms[idx];
    selectedSym = s;

    // ボタンactive
    document.querySelectorAll('.sym-btn').forEach(function(b, i) {
      b.classList.toggle('active', i === idx);
    });

    // 結果表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + s.urgency;
    rc.style.display = 'block';
    document.getElementById('urgencyBadge').textContent = URGENCY_TEXT[s.urgency];
    document.getElementById('resultDept').textContent = s.dept;
    document.getElementById('resultNote').textContent = s.note || (s.report || '');

    // 履歴保存
    saveHistory(selectedCat, s.name, idx);
    renderHistory();

    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── localStorage 履歴 ──
  var HIST_KEY = 'symptom_guide_history';

  function saveHistory(cat, sym, idx) {
    var hist = loadHistory();
    // 重複削除
    hist = hist.filter(function(h) { return !(h.cat === cat && h.sym === sym); });
    hist.unshift({ cat: cat, sym: sym, idx: idx });
    if (hist.length > 10) hist = hist.slice(0, 10);
    try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); } catch(e) {}
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { return []; }
  }

  function renderHistory() {
    var hist = loadHistory();
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');
    if (hist.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = '';
    hist.forEach(function(h) {
      var tag = document.createElement('span');
      tag.className = 'history-tag';
      tag.textContent = h.sym + '（' + h.cat + '）';
      tag.onclick = function() {
        selectCategory(h.cat);
        // 少し待ってから症状を選ぶ（DOM生成後）
        setTimeout(function() { selectSymptom(h.idx); }, 50);
      };
      list.appendChild(tag);
    });
  }

  init();
  </script>
