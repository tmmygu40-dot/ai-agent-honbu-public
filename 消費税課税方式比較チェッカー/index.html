<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消費税課税方式比較チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 比較カード ── */
    .compare-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;
      margin: 0 auto 1rem; max-width: 600px;
    }
    .compare-box {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem; text-align: center;
      box-shadow: var(--shadow);
    }
    .compare-box.winner { border-color: var(--ok); background: var(--ok-bg); }
    .compare-box-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.5rem; }
    .compare-box-amount { font-size: 1.3rem; font-weight: 900; color: var(--text); }
    .compare-box.winner .compare-box-amount { color: var(--ok); }
    .compare-box-badge {
      display: inline-block; margin-top: 0.4rem;
      font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 99px; background: var(--ok); color: #fff;
    }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .section-head td {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--accent); background: var(--accent-light);
      padding: 0.4rem 0.3rem;
    }

    /* ── 注意書き ── */
    .notice {
      max-width: 600px; margin: 0 auto 1rem;
      background: var(--warn-bg); border: 1px solid #f0c060;
      border-radius: 10px; padding: 0.8rem 1rem;
      font-size: 0.78rem; color: var(--warn); line-height: 1.6;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>消費税課税方式比較チェッカー</h1>
    <p class="subtitle">簡易課税 vs 本則課税 ― どちらが有利か即判定</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="sales">年間課税売上（税抜き・円）</label>
      <input type="number" id="sales" placeholder="例: 30000000" inputmode="numeric">
      <p class="hint">消費税抜きの課税売上高を入力してください</p>
    </div>
    <div class="field">
      <label for="purchase">年間課税仕入れ額（税抜き・円）</label>
      <input type="number" id="purchase" placeholder="例: 18000000" inputmode="numeric">
      <p class="hint">消費税抜きの課税仕入高（本則課税の控除計算に使用）</p>
    </div>
    <div class="field">
      <label for="rate">消費税率</label>
      <select id="rate">
        <option value="0.10" selected>10%（標準税率）</option>
        <option value="0.08">8%（軽減税率）</option>
      </select>
    </div>
    <div class="field">
      <label for="industry">業種（簡易課税・みなし仕入率）</label>
      <select id="industry">
        <option value="0.90">第1種事業（卸売業）― 90%</option>
        <option value="0.80">第2種事業（小売業・農林漁業等）― 80%</option>
        <option value="0.70">第3種事業（製造業・農業等）― 70%</option>
        <option value="0.60" selected>第4種事業（飲食業・その他）― 60%</option>
        <option value="0.50">第5種事業（サービス業・金融保険等）― 50%</option>
        <option value="0.40">第6種事業（不動産業）― 40%</option>
      </select>
      <p class="hint">簡易課税制度は前年度課税売上5,000万円以下の事業者のみ選択可</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">比較する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">有利な課税方式</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 比較グリッド -->
  <div class="compare-grid" id="compareGrid" style="display:none">
    <div class="compare-box" id="boxHonsoku">
      <p class="compare-box-label">本則課税 納税額</p>
      <p class="compare-box-amount" id="amtHonsoku">—</p>
    </div>
    <div class="compare-box" id="boxKantan">
      <p class="compare-box-label">簡易課税 納税額</p>
      <p class="compare-box-amount" id="amtKantan">—</p>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 注意書き -->
  <div class="notice" id="notice" style="display:none">
    ※ この結果は概算です。実際の申告には税理士や税務署にご確認ください。<br>
    ※ 簡易課税は前年度課税売上高が5,000万円以下の場合のみ選択可能です。<br>
    ※ 本則課税では、課税仕入れが多いほど控除額が増えて有利になります。
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'shohizei_checker_v1';

  // 読み込み時にlocalStorageから復元
  (function() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.sales) document.getElementById('sales').value = d.sales;
      if (d.purchase) document.getElementById('purchase').value = d.purchase;
      if (d.rate) document.getElementById('rate').value = d.rate;
      if (d.industry) document.getElementById('industry').value = d.industry;
    } catch(e) {}
  })();

  function calc() {
    var sales = parseFloat(document.getElementById('sales').value);
    var purchase = parseFloat(document.getElementById('purchase').value);
    var rate = parseFloat(document.getElementById('rate').value);
    var minashiRate = parseFloat(document.getElementById('industry').value);

    if (isNaN(sales) || sales <= 0) { showErr('課税売上を正しく入力してください'); return; }
    if (isNaN(purchase) || purchase < 0) { showErr('課税仕入れ額を正しく入力してください'); return; }

    // 保存
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        sales: sales, purchase: purchase,
        rate: rate, industry: minashiRate
      }));
    } catch(e) {}

    // 計算
    var salesTax = sales * rate;           // 売上消費税額
    var purchaseTax = purchase * rate;     // 仕入消費税額（控除可能額）

    var honsokuTax = salesTax - purchaseTax;  // 本則課税納税額
    var kantanTax = salesTax * (1 - minashiRate);  // 簡易課税納税額

    var diff = honsokuTax - kantanTax;     // プラスなら簡易が有利

    var winner, level, note;
    if (Math.abs(diff) < 100) {
      winner = 'ほぼ同額';
      level = 'warn';
      note = '両方式の差がほとんどありません。どちらを選んでも結果は同様です。';
    } else if (diff > 0) {
      winner = '簡易課税が有利';
      level = 'ok';
      note = '簡易課税の方が本則課税より ' + fmt(diff) + ' 円 節税できます。';
    } else {
      winner = '本則課税が有利';
      level = 'ok';
      note = '本則課税の方が簡易課税より ' + fmt(-diff) + ' 円 節税できます。';
    }

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = winner;
    document.getElementById('rn').textContent = note;

    // 比較グリッド
    document.getElementById('compareGrid').style.display = '';
    var boxH = document.getElementById('boxHonsoku');
    var boxK = document.getElementById('boxKantan');

    // winner badge リセット
    boxH.className = 'compare-box';
    boxK.className = 'compare-box';
    // remove old badges
    var oldBadge = document.querySelectorAll('.compare-box-badge');
    oldBadge.forEach(function(b){ b.remove(); });

    document.getElementById('amtHonsoku').textContent = fmt(Math.max(0, honsokuTax)) + ' 円';
    document.getElementById('amtKantan').textContent = fmt(Math.max(0, kantanTax)) + ' 円';

    if (diff > 100) {
      boxK.className = 'compare-box winner';
      var badge = document.createElement('div');
      badge.className = 'compare-box-badge';
      badge.textContent = '有利';
      boxK.appendChild(badge);
    } else if (diff < -100) {
      boxH.className = 'compare-box winner';
      var badge2 = document.createElement('div');
      badge2.className = 'compare-box-badge';
      badge2.textContent = '有利';
      boxH.appendChild(badge2);
    }

    // 内訳
    var industryText = document.getElementById('industry').options[document.getElementById('industry').selectedIndex].text;
    var rateText = (rate * 100).toFixed(0) + '%';

    var rows = [
      ['section', '共通'],
      ['課税売上（税抜き）', fmt(sales) + ' 円'],
      ['消費税率', rateText],
      ['売上消費税額', fmt(salesTax) + ' 円'],
      ['section', '本則課税'],
      ['課税仕入れ（税抜き）', fmt(purchase) + ' 円'],
      ['仕入れ控除額', fmt(purchaseTax) + ' 円'],
      ['本則課税 納税額', fmt(Math.max(0, honsokuTax)) + ' 円', true],
      ['section', '簡易課税'],
      ['業種・みなし仕入率', industryText],
      ['みなし仕入れ控除', fmt(salesTax * minashiRate) + ' 円'],
      ['簡易課税 納税額', fmt(Math.max(0, kantanTax)) + ' 円', true],
      ['section', '差額'],
      ['節税額（有利な方との差）', fmt(Math.abs(diff)) + ' 円', true],
    ];

    var html = '';
    rows.forEach(function(r) {
      if (r[0] === 'section') {
        html += '<tr class="section-head"><td colspan="2">' + r[1] + '</td></tr>';
      } else if (r[2]) {
        html += '<tr class="hl"><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
      } else {
        html += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
      }
    });
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = '';
    document.getElementById('notice').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️ 入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('compareGrid').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('notice').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
