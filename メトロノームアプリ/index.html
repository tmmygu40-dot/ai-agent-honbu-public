<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メトロノーム</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E3%83%A1%E3%83%88%E3%83%AD%E3%83%8E%E3%83%BC%E3%83%A0%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="メトロノーム。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"メトロノーム","description":"メトロノーム。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E3%83%A1%E3%83%88%E3%83%AD%E3%83%8E%E3%83%BC%E3%83%A0%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>メトロノーム</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <div class="beat-display">
      <div class="beat-circle" id="beatCircle"></div>
    </div>

    <div class="bpm-display">
      <span id="bpmDisplay">120</span>
      <span class="bpm-label">BPM</span>
    </div>

    <div class="bpm-controls">
      <button class="btn-adjust" id="btnMinus10">-10</button>
      <button class="btn-adjust" id="btnMinus1">-1</button>
      <input type="range" id="bpmSlider" min="40" max="240" value="120">
      <button class="btn-adjust" id="btnPlus1">+1</button>
      <button class="btn-adjust" id="btnPlus10">+10</button>
    </div>

    <div class="bpm-input-row">
      <label for="bpmInput">直接入力：</label>
      <input type="number" id="bpmInput" min="40" max="240" value="120">
      <span>BPM</span>
    </div>

    <button class="btn-start" id="btnStart">スタート</button>

    <div class="beat-counter">
      <span id="beatCounter">-</span>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
