<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断れない度診断｜3問でわかる優しさレベルとNOの言い方</title>
  <meta name="description" content="3問に答えるだけで、あなたの「断れない度」を％表示し、タイプ別に上手な断り方の例文を提案。仕事・誘い・相談で疲れがちな人のセルフ診断ツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1.4rem; }
    .field:last-child { margin-bottom: 0; }
    .field .qlabel { display: block; font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .opt {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt .opt-text { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.1rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.4rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
    .phrase-list { display: none; }
    .phrase-item {
      padding: 0.9rem 0.95rem;
      margin-bottom: 0.7rem;
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      font-size: 0.92rem; line-height: 1.55; color: var(--text);
    }
    .phrase-item:last-child { margin-bottom: 0; }
    .phrase-tag {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      color: var(--accent); margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>断れない度診断</h1>
    <p class="subtitle">3問でわかる、あなたの優しさレベルと上手なNOの言い方</p>
  </header>

  <div class="card">
    <p class="card-title">3つの質問</p>

    <div class="field">
      <span class="qlabel">Q1. 仕事終わりに「ちょっと残って手伝って」と頼まれた</span>
      <label class="opt"><input type="radio" name="q1" value="1"><span class="opt-text">予定があっても「いいよ」と引き受ける</span></label>
      <label class="opt"><input type="radio" name="q1" value="2"><span class="opt-text">迷うけど、結局やることが多い</span></label>
      <label class="opt"><input type="radio" name="q1" value="3"><span class="opt-text">予定を理由に普通に断れる</span></label>
    </div>

    <div class="field">
      <span class="qlabel">Q2. 行きたくない飲み会に誘われた</span>
      <label class="opt"><input type="radio" name="q2" value="1"><span class="opt-text">場の空気を読んで参加してしまう</span></label>
      <label class="opt"><input type="radio" name="q2" value="2"><span class="opt-text">嘘の予定をひねり出して断る</span></label>
      <label class="opt"><input type="radio" name="q2" value="3"><span class="opt-text">「今日はパス」とサラッと断れる</span></label>
    </div>

    <div class="field">
      <span class="qlabel">Q3. 友人から無理めな相談ごと（お金・時間）を持ちかけられた</span>
      <label class="opt"><input type="radio" name="q3" value="1"><span class="opt-text">無理してでも応えようとする</span></label>
      <label class="opt"><input type="radio" name="q3" value="2"><span class="opt-text">悩んだ末、一部だけ受ける</span></label>
      <label class="opt"><input type="radio" name="q3" value="3"><span class="opt-text">無理なものは無理と伝えられる</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="diag()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの断れない度</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card phrase-list" id="phrases">
    <p class="card-title">あなた向け 上手な断り方フレーズ</p>
    <div id="pbody"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 本ツールは簡易セルフ診断です。深刻な人間関係の悩みやストレスを感じている場合は、産業医・カウンセラー・公的相談窓口（よりそいホットライン等）にご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'kotowarenai_last_v1';

  var TYPES = {
    ng: {
      label: '超優しい型',
      eval: 'みんなのため、を頑張りすぎ',
      note: '断れず引き受けがちで、自分の時間と気力がすり減りやすい状態です。「即答しない」だけで景色が変わります。',
      phrases: [
        { tag: '即答しない', text: '「ありがとう、ちょっと予定確認して、夕方までに返事するね」— 即OKをやめる魔法の一言。' },
        { tag: 'できる範囲だけ', text: '「全部は難しいけど、◯◯までならできるよ」— 全or無をやめると罪悪感がゼロに。' },
        { tag: '理由は短く', text: '「今日は無理、ごめんね」— 言い訳を盛らない。短いほど自然に伝わります。' }
      ]
    },
    warn: {
      label: 'バランス型',
      eval: '断れる時もあれば、抱え込む時も',
      note: '基本は健全。ただし相手や状況によっては抱え込んでしまうことも。場面別の定番フレーズを持っておくと安定します。',
      phrases: [
        { tag: '仕事編', text: '「今ちょうど別件詰まってて、◯日以降なら手伝えます」— 代替日を出すと角が立ちません。' },
        { tag: '誘い編', text: '「今日は早く帰る日にしてるんだ、また誘って！」— 次回への期待を残して終わらせる。' },
        { tag: 'お金編', text: '「お金の貸し借りはしない主義にしてて、ごめん」— ルール化しておくと毎回悩まずに済みます。' }
      ]
    },
    ok: {
      label: 'きっぱり型',
      eval: 'NOが言える、健全タイプ',
      note: '自分の時間と気持ちを大事にできる、頼もしいタイプ。あとは「断ったあとのフォロー」を一言添えると人間関係も円満です。',
      phrases: [
        { tag: 'フォロー上手', text: '「今回は無理だけど、別の機会にぜひ」— 断り＋次への余白で関係維持。' },
        { tag: '感謝を添える', text: '「声かけてくれてありがとう、今回はパスで」— ありがとうが先にあるとカドが立ちません。' },
        { tag: '理由は浅く深く', text: '「予定があるんだ、ごめんね」— 詳細は出さなくてOK。深掘りされたら「プライベートで」で十分。' }
      ]
    }
  };

  function diag() {
    var v1 = getRadio('q1');
    var v2 = getRadio('q2');
    var v3 = getRadio('q3');
    if (!v1 || !v2 || !v3) { showErr('3問すべてに回答してください'); return; }

    // 各設問1〜3点。低いほど断れない傾向。合計3〜9。
    var sum = v1 + v2 + v3;
    // 断れない度％：合計が低いほど高い。3→100%、9→0%
    var pct = Math.round((9 - sum) / 6 * 100);

    var level;
    if (sum <= 4)      level = 'ng';   // 超優しい型
    else if (sum <= 7) level = 'warn'; // バランス型
    else               level = 'ok';   // きっぱり型

    showResult(level, pct);
    showPhrases(level);
    save({ v1: v1, v2: v2, v3: v3, level: level, pct: pct });
  }

  function getRadio(name) {
    var el = document.querySelector('input[name="' + name + '"]:checked');
    return el ? parseInt(el.value, 10) : 0;
  }

  function showResult(level, pct) {
    var t = TYPES[level];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = pct + '%';
    document.getElementById('re').textContent = 'タイプ：' + t.label + '（' + t.eval + '）';
    document.getElementById('rn').textContent = t.note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showPhrases(level) {
    var t = TYPES[level];
    var html = t.phrases.map(function(p){
      return '<div class="phrase-item"><span class="phrase-tag">' + p.tag + '</span><br>' + p.text + '</div>';
    }).join('');
    document.getElementById('pbody').innerHTML = html;
    document.getElementById('phrases').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('phrases').style.display = 'none';
  }

  function save(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
  }

  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (!d || !d.level) return;
      var setRadio = function(name, val){
        var el = document.querySelector('input[name="' + name + '"][value="' + val + '"]');
        if (el) el.checked = true;
      };
      setRadio('q1', d.v1); setRadio('q2', d.v2); setRadio('q3', d.v3);
      showResult(d.level, d.pct);
      showPhrases(d.level);
    } catch(e){}
  }

  restore();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
