<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>日報作成アプリ</h1>

    <section class="input-section">
      <h2>作業を追加</h2>
      <div class="input-group">
        <input type="text" id="taskName" placeholder="作業内容を入力" maxlength="100">
        <div class="time-row">
          <input type="number" id="taskMinutes" placeholder="時間（分）" min="1" max="1440">
          <span class="unit">分</span>
        </div>
        <button id="addBtn" onclick="addTask()">追加</button>
      </div>
    </section>

    <section class="task-section">
      <h2>作業一覧 <span id="totalTime"></span></h2>
      <ul id="taskList"></ul>
      <button id="clearBtn" onclick="clearAll()">全て削除</button>
    </section>

    <section class="report-section">
      <h2>日報テキスト</h2>
      <div class="report-header">
        <input type="date" id="reportDate">
        <button id="generateBtn" onclick="generateReport()">日報を生成</button>
      </div>
      <textarea id="reportOutput" readonly placeholder="「日報を生成」ボタンを押すとここに表示されます"></textarea>
      <button id="copyBtn" onclick="copyReport()">コピー</button>
      <span id="copyMsg" class="copy-msg"></span>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
