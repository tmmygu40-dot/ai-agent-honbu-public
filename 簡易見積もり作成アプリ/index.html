<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易見積もり作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>簡易見積もり</h1>

    <div class="table-wrapper">
      <table id="estimate-table">
        <thead>
          <tr>
            <th>品目</th>
            <th>数量</th>
            <th>単価（円）</th>
            <th>小計（円）</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="item-list">
          <!-- 行はJSで生成 -->
        </tbody>
      </table>
    </div>

    <button id="add-row-btn" class="btn btn-add">＋ 行を追加</button>

    <div class="total-area">
      <span class="total-label">合計金額</span>
      <span id="total-amount" class="total-value">¥0</span>
    </div>

    <div class="action-area">
      <button id="copy-btn" class="btn btn-copy">📋 テキストをコピー</button>
      <button id="clear-btn" class="btn btn-clear">🗑 リセット</button>
    </div>

    <div id="copy-msg" class="copy-msg hidden">コピーしました！</div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
