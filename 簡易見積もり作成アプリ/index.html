<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易見積もり作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E7%B0%A1%E6%98%93%E8%A6%8B%E7%A9%8D%E3%82%82%E3%82%8A%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="簡易見積もり。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"簡易見積もり","description":"簡易見積もり。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E7%B0%A1%E6%98%93%E8%A6%8B%E7%A9%8D%E3%82%82%E3%82%8A%E4%BD%9C%E6%88%90%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>簡易見積もり</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <div class="table-wrapper">
      <table id="estimate-table">
        <thead>
          <tr>
            <th>品目</th>
            <th>数量</th>
            <th>単価（円）</th>
            <th>小計（円）</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="item-list">
          <!-- 行はJSで生成 -->
        </tbody>
      </table>
    </div>

    <button id="add-row-btn" class="btn btn-add">＋ 行を追加</button>

    <div class="total-area">
      <span class="total-label">合計金額</span>
      <span id="total-amount" class="total-value">¥0</span>
    </div>

    <div class="action-area">
      <button id="copy-btn" class="btn btn-copy">📋 テキストをコピー</button>
      <button id="clear-btn" class="btn btn-clear">🗑 リセット</button>
    </div>

    <div id="copy-msg" class="copy-msg hidden">コピーしました！</div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
