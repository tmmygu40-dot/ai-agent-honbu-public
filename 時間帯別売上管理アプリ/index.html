<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間帯別売上管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>時間帯別売上管理</h1>

    <!-- 入力フォーム -->
    <section class="input-section">
      <h2>売上を入力</h2>
      <div class="form-row">
        <label>日付</label>
        <input type="date" id="dateInput">
      </div>
      <div class="form-row">
        <label>時間帯</label>
        <select id="hourInput"></select>
      </div>
      <div class="form-row">
        <label>売上金額（円）</label>
        <input type="number" id="amountInput" placeholder="例：15000" min="0">
      </div>
      <button id="addBtn" class="btn-primary">追加</button>
    </section>

    <!-- 日付選択 -->
    <section class="view-section">
      <h2>確認する日付</h2>
      <div class="form-row">
        <input type="date" id="viewDate">
        <button id="viewBtn" class="btn-secondary">表示</button>
      </div>
    </section>

    <!-- ピーク情報 -->
    <section id="peakSection" class="peak-section" style="display:none">
      <div id="peakInfo"></div>
    </section>

    <!-- グラフ -->
    <section id="chartSection" class="chart-section" style="display:none">
      <h2>時間帯別売上グラフ</h2>
      <canvas id="chart"></canvas>
    </section>

    <!-- 一覧 -->
    <section id="listSection" class="list-section" style="display:none">
      <h2>売上一覧</h2>
      <table>
        <thead>
          <tr>
            <th>時間帯</th>
            <th>金額</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="salesList"></tbody>
      </table>
    </section>

    <!-- 全データ一覧 -->
    <section class="all-section">
      <h2>全日付一覧</h2>
      <div id="dateList"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
