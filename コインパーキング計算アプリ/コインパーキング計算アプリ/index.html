<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コインパーキング計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🅿️ コインパーキング計算</h1>

    <section class="card">
      <h2>入庫時刻</h2>
      <div class="input-row">
        <input type="time" id="entryTime" step="60">
        <button id="setNowBtn">今すぐ入庫</button>
      </div>
    </section>

    <section class="card">
      <h2>料金設定</h2>
      <div class="settings-grid">
        <label>
          <span>無料時間（分）</span>
          <input type="number" id="freeMinutes" min="0" value="0" placeholder="0">
        </label>
        <label>
          <span>課金単位（分）</span>
          <input type="number" id="unitMinutes" min="1" value="30" placeholder="30">
        </label>
        <label>
          <span>単位料金（円）</span>
          <input type="number" id="unitFee" min="0" value="100" placeholder="100">
        </label>
        <label>
          <span>上限料金（円・0=なし）</span>
          <input type="number" id="maxFee" min="0" value="0" placeholder="0">
        </label>
      </div>
    </section>

    <section class="card result-card">
      <div class="result-main">
        <div class="result-item">
          <div class="result-label">現在の料金</div>
          <div class="result-value" id="currentFee">--</div>
        </div>
        <div class="result-item">
          <div class="result-label">駐車時間</div>
          <div class="result-value" id="parkingTime">--</div>
        </div>
      </div>
      <div class="free-time-box" id="freeTimeBox">
        <div class="free-label">無料時間 残り</div>
        <div class="free-value" id="freeTimeLeft">--</div>
      </div>
    </section>

    <div class="btn-row">
      <button id="startBtn" class="btn-primary">計算開始</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
