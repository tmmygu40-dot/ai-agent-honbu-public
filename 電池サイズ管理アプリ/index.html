<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電池サイズ管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>🔋 電池サイズ管理</h1>

    <section class="form-section">
      <h2>機器を登録</h2>
      <div class="form">
        <input type="text" id="deviceName" placeholder="機器名（例：テレビリモコン）" maxlength="50">
        <select id="batterySize">
          <option value="">電池サイズを選択</option>
          <option value="単1">単1</option>
          <option value="単2">単2</option>
          <option value="単3">単3</option>
          <option value="単4">単4</option>
          <option value="CR2032">CR2032</option>
          <option value="その他">その他</option>
        </select>
        <input type="number" id="batteryCount" placeholder="本数" min="1" max="99" value="1">
        <button id="addBtn" onclick="addDevice()">登録</button>
      </div>
    </section>

    <section class="filter-section">
      <label for="filterSize">絞り込み：</label>
      <select id="filterSize" onchange="renderList()">
        <option value="">すべて表示</option>
        <option value="単1">単1</option>
        <option value="単2">単2</option>
        <option value="単3">単3</option>
        <option value="単4">単4</option>
        <option value="CR2032">CR2032</option>
        <option value="その他">その他</option>
      </select>
    </section>

    <section class="list-section">
      <h2>登録済み機器 <span id="countBadge" class="badge">0</span></h2>
      <div id="deviceList" class="device-list"></div>
      <p id="emptyMsg" class="empty-msg">まだ登録された機器はありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
