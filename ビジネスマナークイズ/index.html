<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 ビジネスマナークイズ - 日常のマナーを3択クイズで学べる</title>
  <meta name="description" content="日常のマナーを3択クイズで楽しく学べます。10問に答えるだけで仕事スキルレベルを数値化。あなたの実力がすぐに分かります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── クイズラジオボタン ── */
    .option-group { margin-top: 0.8rem; }
    .option-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.7rem; margin-bottom: 0.5rem;
      border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer; user-select: none;
      transition: border-color 0.15s, background-color 0.15s;
    }
    .option-item:hover { border-color: var(--accent); background: var(--accent-light); }
    .option-item input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
    .option-item .option-text { font-size: 0.92rem; color: var(--text); }
    .option-item input[type="radio"]:checked + .option-text { font-weight: 600; color: var(--accent); }

    /* ── 進捗表示 ── */
    .progress-info { text-align: center; font-size: 0.82rem; color: var(--text-sub); margin-bottom: 1rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- 計測タグ 必須 -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>📋 ビジネスマナークイズ</h1>
    <p class="subtitle">日常のマナーを3択クイズで楽しく学べます。スコアから仕事スキルレベルを数値化。</p>
  </header>

  <!-- 進捗表示 -->
  <div class="progress-info" id="progressInfo"></div>

  <!-- クイズカード -->
  <div class="card" id="quizCard">
    <p class="card-title" id="questionNumber">問題1</p>
    <p id="questionText" style="font-size:0.95rem;line-height:1.5;margin-bottom:1.2rem;"></p>
    <div class="option-group" id="optionsGroup"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="nextBtn" onclick="nextQuestion()">次へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、ビジネスマナーと実務スキルの参考情報として作成しています。最新情報は公式資料をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 関連アプリ表示 必須・削除禁止 -->
  <script src="../related-widget.js"></script>
  <!-- お気に入り 必須・削除禁止 -->
  <script src="../fav-widget.js"></script>

  <p style="max-width:600px;margin:2rem auto 0;padding:1rem 0.9rem;text-align:center;font-size:0.76rem;color:var(--text-sub);">
    <a href="https://forms.gle/YOUR_FORM_ID" target="_blank">改善案・不具合報告はこちら</a>
  </p>

  <script>
    // ── クイズ問題データ ──
    const QUIZ_DATA = [
      {
        q: "取引先の方に初めてお会いするときの正しいマナーは？",
        opts: [
          "相手が座るまで自分も座らない",
          "相手より上座に座る",
          "どこに座ってもいい"
        ],
        correct: 0
      },
      {
        q: "メールを送る際、最初に書くべき相手への呼びかけは？",
        opts: [
          "〇〇さん",
          "〇〇様",
          "〇〇殿"
        ],
        correct: 1
      },
      {
        q: "電話をかけるとき、最初に言うべきことは？",
        opts: [
          "用件をすぐに言う",
          "自分の名前と所属を名乗る",
          "相手の名前を確認する"
        ],
        correct: 1
      },
      {
        q: "上司への報告・連絡・相談（ホウレンソウ）の順番は？",
        opts: [
          "連絡→報告→相談",
          "報告→連絡→相談",
          "相談→報告→連絡"
        ],
        correct: 1
      },
      {
        q: "名刺交換のときの正しいやり方は？",
        opts: [
          "右手で受け取る",
          "両手で受け取り、相手の目を見る",
          "左手でも右手でもどちらでもいい"
        ],
        correct: 1
      },
      {
        q: "会議中に携帯電話が鳴ったときの対応は？",
        opts: [
          "その場ですぐに電話に出る",
          "会議を中断して電話を切る",
          "ローマ字モードにして出ない"
        ],
        correct: 1
      },
      {
        q: "部下から相談を受けたときの最初の対応は？",
        opts: [
          "すぐに答えを言う",
          "まず相手の話を最後まで聞く",
          "自分の経験談を話す"
        ],
        correct: 1
      },
      {
        q: "来客が到着したときの対応は？",
        opts: [
          "デスクから立ち上がって迎える",
          "座ったまま手で招く",
          "上司に任せる"
        ],
        correct: 0
      },
      {
        q: "エレベーターで上司と一緒のときの正しい位置は？",
        opts: [
          "上司の前に乗る",
          "上司の後ろに乗る",
          "位置は関係ない"
        ],
        correct: 1
      },
      {
        q: "報告書やメールで誤字があった場合、どうする？",
        opts: [
          "そのまま送付する",
          "修正液で直して送付する",
          "修正版を改めて送付する"
        ],
        correct: 2
      }
    ];

    // ── 状態管理 ──
    let currentQuestion = 0;
    let score = 0;
    let answers = [];

    // ── 初期化 ──
    function init() {
      showQuestion();
    }

    // ── 問題表示 ──
    function showQuestion() {
      if (currentQuestion >= QUIZ_DATA.length) {
        showResult();
        return;
      }

      const q = QUIZ_DATA[currentQuestion];
      document.getElementById('questionNumber').textContent = `問題 ${currentQuestion + 1}`;
      document.getElementById('questionText').textContent = q.q;

      const optionsGroup = document.getElementById('optionsGroup');
      optionsGroup.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const label = document.createElement('label');
        label.className = 'option-item';
        label.innerHTML = `<input type="radio" name="option" value="${i}"> <span class="option-text">${opt}</span>`;
        optionsGroup.appendChild(label);
      });

      document.getElementById('progressInfo').textContent = `${currentQuestion + 1}/${QUIZ_DATA.length} 問目`;
      document.getElementById('nextBtn').textContent = currentQuestion === QUIZ_DATA.length - 1 ? '結果を見る' : '次へ';
      document.getElementById('result').style.display = 'none';
    }

    // ── 次の問題へ ──
    function nextQuestion() {
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) {
        alert('選択してください');
        return;
      }

      const ans = parseInt(selected.value);
      answers.push(ans);
      if (ans === QUIZ_DATA[currentQuestion].correct) {
        score++;
      }

      currentQuestion++;
      showQuestion();
    }

    // ── 結果表示 ──
    function showResult() {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('progressInfo').style.display = 'none';

      const percentage = Math.round((score / QUIZ_DATA.length) * 100);
      const resultCard = document.getElementById('result');
      resultCard.style.display = 'block';

      let level, eval_text, note;
      if (percentage >= 71) {
        resultCard.className = 'result-card ok';
        level = '上級者';
        eval_text = 'ビジネスマナーがしっかり身についています！';
        note = 'あなたは日常のマナーをしっかり理解しています。この調子で、さらに深い知識を学んでもいいですね。';
      } else if (percentage >= 31) {
        resultCard.className = 'result-card warn';
        level = '中級者';
        eval_text = 'もう少し覚えておくと、さらに安心ですね。';
        note = '基本的なマナーは理解していますが、細かいポイントをもう一度確認するといいですよ。';
      } else {
        resultCard.className = 'result-card ng';
        level = '初心者';
        eval_text = 'まずは基本から学びましょう。';
        note = 'ビジネスマナーの基本を学ぶ良い機会です。見直しながら、少しずつ覚えていきましょう。';
      }

      document.getElementById('rv').textContent = `${percentage}点`;
      document.getElementById('re').textContent = `【${level}】${eval_text}`;
      document.getElementById('rn').textContent = note;

      // localStorage に保存
      localStorage.setItem('businessMannerScore', JSON.stringify({
        date: new Date().toISOString(),
        percentage: percentage,
        level: level,
        score: score
      }));
    }

    // ── 初期化実行 ──
    init();
  </script>

</body>
</html>
