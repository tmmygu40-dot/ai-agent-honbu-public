<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GW明けのだらだら症候群を5問で診断し、リセット方法と対策を提示する無料ツール。五月病予防に役立つセルフチェッカーです。">
  <title>GW疲労リセット診断｜GW明けのだらだら症候群を5問で診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.5rem 1.2rem;
      margin: 0 auto 1.2rem;
      max-width: 600px;
      display: none;
    }
    .result-card.active { display: block; }
    .result-card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--accent); }
    .result-card .result-type { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.8rem; }
    .result-card .result-advice { font-size: 0.85rem; line-height: 1.6; color: var(--text); }

    /* ── ステータス表示（背景色） ── */
    .result-level-1 { background: var(--ok-bg); border-color: var(--ok); }
    .result-level-1 h2 { color: var(--ok); }
    .result-level-2 { background: #f0f9ff; border-color: #0284c7; }
    .result-level-2 h2 { color: #0284c7; }
    .result-level-3 { background: var(--warn-bg); border-color: var(--warn); }
    .result-level-3 h2 { color: var(--warn); }
    .result-level-4 { background: #fce7f3; border-color: #ec4899; }
    .result-level-4 h2 { color: #ec4899; }
    .result-level-5 { background: var(--ng-bg); border-color: var(--ng); }
    .result-level-5 h2 { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .breakdown { margin-top: 1rem; font-size: 0.8rem; }
    .breakdown p { margin-bottom: 0.3rem; }
    .breakdown .score { color: var(--accent); font-weight: 700; }

    /* ── ボタン（PDF・戻る） ── */
    .btn-pdf { background: #666; color: #fff; padding: 0.7rem; font-size: 0.85rem; border-radius: 8px; }
    .btn-pdf:hover { background: #333; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--accent); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    @media print {
      body { padding: 0; }
      .btn-calc, .btn-pdf.no-print, .back-link, .improvement-note { display: none; }
      .card, .result-card { max-width: 100%; margin: 0 0 1rem; }
    }

    /* ── お気に入り・改善案 ── */
    .improvement-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-sub);
    }
    .improvement-note a { color: var(--accent); text-decoration: none; }
    .improvement-note a:hover { text-decoration: underline; }

    /* ── スマホ対応 ── */
    @media (max-width: 600px) {
      .card, .result-card { margin: 0 1rem 1rem; }
      .btn-calc { max-width: calc(100% - 2rem); }
    }
  </style>
</head>
<body>

<!-- ── ヘッダー ── -->
<div class="app-header">
  <h1>🌸 GW疲労リセット診断</h1>
  <div class="subtitle">GW明けのだらだら症候群を5問で診断｜改善策を提示</div>
</div>

<!-- ── 診断カード ── -->
<div class="card">
  <div class="card-title">🔍 診断スタート</div>

  <div class="field">
    <label>Q1: GW中、十分な休息が取れましたか？</label>
    <select id="q1">
      <option value="">選択してください</option>
      <option value="1">ほぼ休まず、ずっと活動していた</option>
      <option value="2">少し休めたが、疲れが抜けていない</option>
      <option value="3">そこそこ休めた感じ</option>
      <option value="4">かなり休めた</option>
      <option value="5">十分休息が取れた、リフレッシュ完了</option>
    </select>
  </div>

  <div class="field">
    <label>Q2: 仕事復帰への不安や憂鬱さを感じますか？</label>
    <select id="q2">
      <option value="">選択してください</option>
      <option value="5">全く感じない、楽しみ</option>
      <option value="4">少し感じるが大丈夫そう</option>
      <option value="3">普通に不安がある</option>
      <option value="2">かなり憂鬱で、行きたくない</option>
      <option value="1">極度に不安で、体調に影響が出ている</option>
    </select>
  </div>

  <div class="field">
    <label>Q3: 睡眠リズム（夜更かし・朝寝坊）の混乱度は？</label>
    <select id="q3">
      <option value="">選択してください</option>
      <option value="5">リズムは通常通り</option>
      <option value="4">少し遅れ気味だが調整中</option>
      <option value="3">2～3時間程度ズレている</option>
      <option value="2">4～5時間以上ズレている</option>
      <option value="1">完全に夜型に逆転している</option>
    </select>
  </div>

  <div class="field">
    <label>Q4: 仕事・勉強へのやる気低下を感じていますか？</label>
    <select id="q4">
      <option value="">選択してください</option>
      <option value="5">やる気満々</option>
      <option value="4">通常通り</option>
      <option value="3">やや低下している</option>
      <option value="2">かなり低下、集中できない</option>
      <option value="1">全く出ない、何もしたくない</option>
    </select>
  </div>

  <div class="field">
    <label>Q5: 体調変化（倦怠感・頭痛・イライラなど）</label>
    <select id="q5">
      <option value="">選択してください</option>
      <option value="5">特に変化なし、良好</option>
      <option value="4">少し疲れは残っているが大丈夫</option>
      <option value="3">倦怠感やイライラがある</option>
      <option value="2">頭痛や疲労感が強い</option>
      <option value="1">体調不良で日常生活に支障が出ている</option>
    </select>
  </div>

  <button class="btn-calc" onclick="calculateDiagnosis()">📊 診断結果を見る</button>
</div>

<!-- ── 結果カード ── -->
<div id="resultCard" class="result-card"></div>

<!-- ── 改善案・不具合報告 ── -->
<p class="improvement-note">
  <a href="https://forms.gle/QX7mNjJq8vQyW5Wk7" target="_blank">💡 改善案・不具合報告はこちら</a>
</p>

<!-- ── 戻るリンク ── -->
<a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

<!-- ── スクリプト ── -->
<script>
function calculateDiagnosis() {
  const q1 = parseInt(document.getElementById('q1').value) || 0;
  const q2 = parseInt(document.getElementById('q2').value) || 0;
  const q3 = parseInt(document.getElementById('q3').value) || 0;
  const q4 = parseInt(document.getElementById('q4').value) || 0;
  const q5 = parseInt(document.getElementById('q5').value) || 0;

  if (!q1 || !q2 || !q3 || !q4 || !q5) {
    alert('すべての質問に答えてください');
    return;
  }

  const totalScore = q1 + q2 + q3 + q4 + q5;
  const average = totalScore / 5;

  let level, title, type, advice;

  if (average >= 4.5) {
    level = 1;
    title = '✅ リフレッシュ完了';
    type = 'レベル1: 完璧な状態';
    advice = 'GW疲労は完全にリセット！そのまま好調を保つことが大切です。毎日のルーティンを意識して、睡眠・食事・運動のバランスを整えましょう。';
  } else if (average >= 3.5) {
    level = 2;
    title = '👍 まあ大丈夫';
    type = 'レベル2: 回復中';
    advice = 'GW疲労の回復が進んでいます。ただし、睡眠リズムの調整に気をつけ、数日で通常ペースに戻るよう意識しましょう。';
  } else if (average >= 2.5) {
    level = 3;
    title = '⚠️ 要注意';
    type = 'レベル3: だらだら症候群の兆候';
    advice = 'GW疲労が蓄積中です。朝日を浴びる、軽い運動、温かい食事で体をリセット。医学的には「社会的時差ぼけ」状態なので、3～5日で回復します。';
  } else if (average >= 1.5) {
    level = 4;
    title = '😰 かなり危険';
    type = 'レベル4: 五月病寸前';
    advice = 'GW疲労が強く蓄積しています。睡眠時間の確保（22時就寝→6時起床）と朝日浴びを最優先。栄養補給も大切です。1週間改善がなければ医師に相談を。';
  } else {
    level = 5;
    title = '🚨 緊急';
    type = 'レベル5: 五月病状態';
    advice = 'GW疲労が深刻です。これは自力回復が難しい状態かもしれません。医師や心理カウンセラーに相談することを強くお勧めします。焦らず、自分のペースで進めてください。';
  }

  // ローカルストレージに保存
  const resultData = {
    date: new Date().toLocaleDateString('ja-JP'),
    score: totalScore,
    average: average.toFixed(2),
    level: level,
    title: title
  };
  localStorage.setItem('gwDiagnosisResult', JSON.stringify(resultData));

  // 結果を表示
  const resultCard = document.getElementById('resultCard');
  resultCard.innerHTML = `
    <div class="card-title">📋 診断結果</div>
    <h2 id="resultTitle">${title}</h2>
    <div class="result-type" id="resultType">${type}</div>
    <div class="result-advice" id="resultAdvice">${advice}</div>
    <div class="breakdown" id="breakdown">
      <p><strong>スコア詳細</strong></p>
      <p>Q1 休息度: <span class="score">${q1}/5</span></p>
      <p>Q2 不安度: <span class="score">${q2}/5</span></p>
      <p>Q3 睡眠リズム: <span class="score">${q3}/5</span></p>
      <p>Q4 やる気: <span class="score">${q4}/5</span></p>
      <p>Q5 体調: <span class="score">${q5}/5</span></p>
      <p><strong>総合スコア: ${totalScore}/25 (平均: ${average.toFixed(2)}/5)</strong></p>
    </div>
    <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  `;
  resultCard.className = 'result-card active result-level-' + level;

  // ページ上部へスクロール
  resultCard.scrollIntoView({ behavior: 'smooth' });
}

// ローカルストレージからの復元（オプション）
window.addEventListener('load', function() {
  const saved = localStorage.getItem('gwDiagnosisResult');
  if (saved) {
    // 前回の結果がある場合の処理（UI上で「前回の結果」として表示することも可能）
  }
});
</script>

<!-- ── 計測タグ ── -->
<script data-goatcounter="https://tmmygu40.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<!-- ── お気に入り・関連アプリ ── -->
<script src="../fav-widget.js"></script>
<script src="../related-widget.js"></script>

</body>
</html>
