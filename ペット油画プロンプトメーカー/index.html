<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペット油画プロンプトメーカー - 愛犬を絵画風に変身するAIプロンプト即生成ツール</title>
  <meta name="description" content="愛犬の特徴を選ぶだけで、ルネサンス油画風のAI画像生成プロンプトが即座に完成。生成したプロンプトはコピーしてAI画像生成ツールで使用可能です。無料・ブラウザで完結。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎨 ペット油画プロンプトメーカー</h1>
    <p class="subtitle">愛犬の特徴を選ぶと、ルネサンス油画風のAIプロンプトが即完成！</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">愛犬の特徴を選択</p>
    <div class="field">
      <label for="breed">犬種</label>
      <select id="breed">
        <option value="">選択してください</option>
        <option value="Shiba Inu">柴犬</option>
        <option value="Golden Retriever">ゴールデン・レトリーバー</option>
        <option value="Toy Poodle">トイ・プードル</option>
        <option value="Dachshund">ダックスフンド</option>
        <option value="Chihuahua">チワワ</option>
        <option value="Husky">シベリアン・ハスキー</option>
        <option value="French Bulldog">フレンチ・ブルドッグ</option>
        <option value="Corgi">コーギー</option>
      </select>
    </div>
    <div class="field">
      <label for="color">毛色</label>
      <select id="color">
        <option value="">選択してください</option>
        <option value="red">赤/茶色</option>
        <option value="white">白</option>
        <option value="black">黒</option>
        <option value="brown">茶色</option>
        <option value="golden">ゴールド</option>
        <option value="cream">クリーム</option>
        <option value="gray">グレー</option>
        <option value="multi-color">模様混合</option>
      </select>
    </div>
    <div class="field">
      <label for="feature">特徴（複数選択可）</label>
      <select id="feature" multiple style="min-height: 100px;">
        <option value="fluffy">ふわふわ</option>
        <option value="long-haired">長毛</option>
        <option value="short-haired">短毛</option>
        <option value="big-eyes">大きな瞳</option>
        <option value="cute-face">かわいい顔</option>
        <option value="athletic">筋肉質</option>
        <option value="small">小型</option>
        <option value="large">大型</option>
      </select>
      <p class="hint">Ctrl（またはCmd）+ クリックで複数選択</p>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">プロンプトを生成</button>

  <!-- 結論カード（プロンプト表示） -->
  <div class="result-card ok" id="result" style="display:none">
    <p class="result-label">生成されたプロンプト</p>
    <p class="result-value" id="rv" style="font-size:0.9rem;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;font-family:monospace;background:#f9f7f3;padding:1rem;border-radius:8px;margin:1rem 0;"></p>
    <button style="display:inline-block;padding:0.6rem 1.2rem;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-top:0.5rem;" onclick="copyPrompt()">📋 コピーしてAIに貼付</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 生成されたプロンプトは、DALL-E・Midjourney・Stable Diffusion など、主流のAI画像生成サービスで利用できます。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var currentPrompt = '';

  function generatePrompt() {
    var breed = document.getElementById('breed').value;
    var color = document.getElementById('color').value;
    var features = Array.from(document.getElementById('feature').selectedOptions).map(function(o) { return o.value; });

    if (!breed || !color) {
      alert('犬種と毛色を選択してください');
      return;
    }

    // ── プロンプト生成ロジック ──
    var breedMap = {
      'Shiba Inu': '柴犬',
      'Golden Retriever': 'ゴールデン・レトリーバー',
      'Toy Poodle': 'トイ・プードル',
      'Dachshund': 'ダックスフンド',
      'Chihuahua': 'チワワ',
      'Husky': 'ハスキー',
      'French Bulldog': 'フレンチ・ブルドッグ',
      'Corgi': 'コーギー'
    };

    var colorMap = {
      'red': '赤茶色',
      'white': '白',
      'black': '黒',
      'brown': '茶色',
      'golden': 'ゴールド',
      'cream': 'クリーム',
      'gray': 'グレー',
      'multi-color': '混色模様'
    };

    var featureText = features.length > 0 ? features.join('、') : '健康的な毛並み';
    var breedJa = breedMap[breed] || breed;
    var colorJa = colorMap[color] || color;

    // ── ルネサンス油画風プロンプト生成 ──
    currentPrompt = breed + ', ' + colorJa + ' fur, ' + featureText + ', ' +
                    'in the style of a Renaissance oil painting, '  +
                    'masterpiece, detailed, soft lighting, ' +
                    'classical composition, museum quality, ' +
                    'rich colors, detailed fur texture';

    document.getElementById('rv').textContent = currentPrompt;
    document.getElementById('result').style.display = '';

    // ── localStorage に保存 ──
    localStorage.setItem('petPromptData', JSON.stringify({
      breed: breed,
      color: color,
      features: features,
      prompt: currentPrompt,
      timestamp: new Date().toISOString()
    }));
  }

  function copyPrompt() {
    if (!currentPrompt) return;
    navigator.clipboard.writeText(currentPrompt).then(function() {
      alert('プロンプトをコピーしました！\nAI画像生成ツールに貼り付けてお使いください。');
    }).catch(function(err) {
      // フォールバック
      var textarea = document.createElement('textarea');
      textarea.value = currentPrompt;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('プロンプトをコピーしました！');
    });
  }

  // ── ページ読込時に localStorage から復元 ──
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('petPromptData');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        if (data.breed) document.getElementById('breed').value = data.breed;
        if (data.color) document.getElementById('color').value = data.color;
        if (data.features && data.features.length > 0) {
          Array.from(document.getElementById('feature').options).forEach(function(opt) {
            opt.selected = data.features.indexOf(opt.value) >= 0;
          });
        }
        if (data.prompt) {
          currentPrompt = data.prompt;
          document.getElementById('rv').textContent = currentPrompt;
          document.getElementById('result').style.display = '';
        }
      } catch (e) {
        console.log('localStorage復元失敗');
      }
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
