<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点検記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>点検記録アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新規点検記録</h2>
      <div class="form-group">
        <label for="location">点検箇所</label>
        <input type="text" id="location" placeholder="例：1F エントランス" required>
      </div>
      <div class="form-group">
        <label for="item">点検項目</label>
        <input type="text" id="item" placeholder="例：消火器の位置確認" required>
      </div>
      <div class="form-group">
        <label for="result">合否</label>
        <select id="result">
          <option value="合格">合格</option>
          <option value="不合格">不合格</option>
        </select>
      </div>
      <div class="form-group">
        <label for="inspectDate">点検日</label>
        <input type="date" id="inspectDate">
      </div>
      <div class="form-group">
        <label for="nextDate">次回点検日</label>
        <input type="date" id="nextDate">
      </div>
      <div class="form-group">
        <label for="memo">メモ</label>
        <textarea id="memo" placeholder="不合格の詳細・対応内容など" rows="2"></textarea>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <div class="filter-row">
        <span>表示：</span>
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="不合格">不合格のみ</button>
        <button class="filter-btn" data-filter="合格">合格のみ</button>
        <button class="filter-btn" data-filter="upcoming">次回点検が近い</button>
      </div>
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="箇所・項目で検索...">
      </div>
    </section>

    <!-- 統計 -->
    <section class="stats-section">
      <div class="stat-box">
        <span class="stat-label">総件数</span>
        <span class="stat-value" id="statTotal">0</span>
      </div>
      <div class="stat-box fail">
        <span class="stat-label">不合格</span>
        <span class="stat-value" id="statFail">0</span>
      </div>
      <div class="stat-box pass">
        <span class="stat-label">合格</span>
        <span class="stat-value" id="statPass">0</span>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="recordList"></div>
      <p id="emptyMsg" class="empty-msg">記録がありません</p>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>記録を編集</h2>
      <div class="form-group">
        <label for="editLocation">点検箇所</label>
        <input type="text" id="editLocation">
      </div>
      <div class="form-group">
        <label for="editItem">点検項目</label>
        <input type="text" id="editItem">
      </div>
      <div class="form-group">
        <label for="editResult">合否</label>
        <select id="editResult">
          <option value="合格">合格</option>
          <option value="不合格">不合格</option>
        </select>
      </div>
      <div class="form-group">
        <label for="editInspectDate">点検日</label>
        <input type="date" id="editInspectDate">
      </div>
      <div class="form-group">
        <label for="editNextDate">次回点検日</label>
        <input type="date" id="editNextDate">
      </div>
      <div class="form-group">
        <label for="editMemo">メモ</label>
        <textarea id="editMemo" rows="2"></textarea>
      </div>
      <div class="modal-buttons">
        <button id="saveEditBtn" class="btn-primary">保存する</button>
        <button id="cancelEditBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
