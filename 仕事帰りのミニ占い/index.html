<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="仕事・恋愛・金運を3分野で占う、仕事帰りの気軽なミニ占いアプリ。毎日の運勢をタップして確認、気分をリフレッシュできます。">
  <title>今日の運勢 — 仕事帰りのミニ占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }

    /* ── 占いボタンコンテナ ── */
    .fortune-buttons {
      max-width: 600px;
      margin: 0 auto 1.2rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
      padding: 0 1.2rem;
    }

    /* ── 占いボタン ── */
    .btn-fortune {
      padding: 1rem 0.6rem;
      font-size: 0.9rem;
      font-weight: 800;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-fortune:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-fortune .emoji { font-size: 2rem; }
    .btn-fortune .label { font-size: 0.82rem; }

    /* ── 結論カード ── */
    .result-card {
      display: none;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
      text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.8rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-advice { font-size: 0.95rem; color: var(--text); line-height: 1.6; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-fortune, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止（</head> の直前） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>今日の運勢</h1>
    <p class="subtitle">仕事・恋愛・金運を3分野で占う</p>
  </header>

  <!-- 占いボタン -->
  <div class="fortune-buttons">
    <button class="btn-fortune" onclick="showFortune('work')">
      <span class="emoji">💼</span>
      <span class="label">仕事運</span>
    </button>
    <button class="btn-fortune" onclick="showFortune('love')">
      <span class="emoji">💕</span>
      <span class="label">恋愛運</span>
    </button>
    <button class="btn-fortune" onclick="showFortune('money')">
      <span class="emoji">💰</span>
      <span class="label">金運</span>
    </button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="result-label">結果</p>
    <p class="result-value" id="result-value">—</p>
    <p class="result-advice" id="result-advice"></p>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✨ このアプリは、毎日の気分をリフレッシュするための気軽な占いです。参考程度にお楽しみください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script id="fav-widget"></script>
  <script>
    // ── 占い結果データ ──
    var FORTUNES = {
      work: {
        results: [
          { label: '好調💪', advice: '仕事が進みやすい日。得意な業務から始めると、流れに乗れます。', class: 'ok' },
          { label: '普通😊', advice: '無理なく進められる日。新しいことに挑戦する準備期間として活用できます。', class: 'warn' },
          { label: '注意⚠️', advice: '一呼吸置いて確認しながら進めると吉。焦らず、冷静な判断を心がけましょう。', class: 'ng' }
        ]
      },
      love: {
        results: [
          { label: '幸運🎀', advice: '良い流れが来ています。大事な人との時間を大切にしましょう。', class: 'ok' },
          { label: '普通💭', advice: '焦らず、ゆっくり関係を深めていく時期。小さな喜びを大切に。', class: 'warn' },
          { label: '頑張り時💪', advice: 'コミュニケーションが鍵。相手のことをもっと知る良いチャンスです。', class: 'ng' }
        ]
      },
      money: {
        results: [
          { label: '好調📈', advice: 'お金の流れが良好。今は貯金や投資を検討するチャンスです。', class: 'ok' },
          { label: '普通💼', advice: '安定した時期。日々の家計管理を大切にすることが吉。', class: 'warn' },
          { label: '注意💸', advice: '予期しない支出に注意。無駄遣いをチェックする絶好の機会です。', class: 'ng' }
        ]
      }
    };

    var EMOJI = {
      work: '💼',
      love: '💕',
      money: '💰'
    };

    function showFortune(type) {
      var fortunes = FORTUNES[type];
      var idx = Math.floor(Math.random() * fortunes.results.length);
      var result = fortunes.results[idx];

      var rc = document.getElementById('result');
      rc.className = 'result-card ' + result.class;
      rc.style.display = 'block';

      var labels = { work: '仕事運', love: '恋愛運', money: '金運' };
      document.getElementById('result-label').textContent = labels[type];
      document.getElementById('result-value').textContent = result.label;
      document.getElementById('result-advice').textContent = result.advice;

      // localStorage 保存
      var now = new Date();
      var date = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      var record = { date: date, type: type, result: result.label, advice: result.advice };
      localStorage.setItem('miniOracleLatest', JSON.stringify(record));

      rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ページロード時に localStorage から前回の結果を復元
    document.addEventListener('DOMContentLoaded', function() {
      var stored = localStorage.getItem('miniOracleLatest');
      if (stored) {
        var record = JSON.parse(stored);
        var result = FORTUNES[record.type].results.find(function(r) { return r.label === record.result; });
        if (result) {
          var rc = document.getElementById('result');
          rc.className = 'result-card ' + result.class;
          rc.style.display = 'block';
          var labels = { work: '仕事運', love: '恋愛運', money: '金運' };
          document.getElementById('result-label').textContent = labels[record.type];
          document.getElementById('result-value').textContent = record.result;
          document.getElementById('result-advice').textContent = record.advice;
        }
      }
    });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
