<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公的給付金診断アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input[type="number"], .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input[type="number"]:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── チェックボックス ── */
    .check-group { display: grid; gap: 0.6rem; }
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .check-item:hover { border-color: var(--accent); }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .check-item input[type="checkbox"]:checked + span { color: var(--text); font-weight: 600; }
    .check-item.checked { border-color: var(--accent); background: var(--accent-light); }
    .check-item span { font-size: 0.9rem; color: var(--text-sub); line-height: 1.3; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 給付金リスト ── */
    .benefit-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
      background: #fff;
    }
    .benefit-item:last-child { margin-bottom: 0; }
    .benefit-item.match { border-color: var(--ok); background: var(--ok-bg); }
    .benefit-item.no-match { opacity: 0.55; }
    .benefit-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.4rem; }
    .benefit-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .benefit-badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .benefit-badge.match { background: var(--ok); color: #fff; }
    .benefit-badge.no-match { background: #e5e7eb; color: #6b7280; }
    .benefit-amount { font-size: 0.82rem; font-weight: 600; color: var(--accent); margin-bottom: 0.3rem; }
    .benefit-desc { font-size: 0.78rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 0.3rem; }
    .benefit-office { font-size: 0.75rem; color: var(--text-sub); }
    .benefit-office span { font-weight: 600; }

    /* ── 非該当トグル ── */
    .toggle-btn {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.8rem; padding: 0.7rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-align: center;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

    .disclaimer {
      max-width: 600px; margin: 0 auto 1rem;
      font-size: 0.72rem; color: var(--text-sub);
      background: var(--warn-bg); border: 1px solid #fcd34d;
      border-radius: 8px; padding: 0.7rem 0.9rem; line-height: 1.6;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>公的給付金診断アプリ</h1>
    <p class="subtitle">世帯収入と家族構成から受給できる可能性のある給付金・支援金を即チェック</p>
  </header>

  <!-- 入力カード：基本情報 -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="income">年間世帯収入（万円）</label>
      <input type="number" id="income" placeholder="例: 300" min="0" max="9999">
      <p class="hint">給与・年金など世帯全員の合計（税込み）</p>
    </div>
    <div class="field">
      <label for="members">世帯人数</label>
      <input type="number" id="members" placeholder="例: 3" min="1" max="20">
    </div>
    <div class="field">
      <label for="children">子どもの人数（18歳以下）</label>
      <input type="number" id="children" placeholder="例: 2" min="0" max="20">
    </div>
  </div>

  <!-- 入力カード：家族構成 -->
  <div class="card">
    <p class="card-title">家族の状況（当てはまるものを選択）</p>
    <div class="check-group">
      <label class="check-item" id="lbl-child02">
        <input type="checkbox" id="child02" onchange="toggleCheck('lbl-child02')">
        <span>0〜2歳の子どもがいる</span>
      </label>
      <label class="check-item" id="lbl-child35">
        <input type="checkbox" id="child35" onchange="toggleCheck('lbl-child35')">
        <span>3〜5歳の子どもがいる（幼稚園・保育園・認定こども園に通っている）</span>
      </label>
      <label class="check-item" id="lbl-single">
        <input type="checkbox" id="single" onchange="toggleCheck('lbl-single')">
        <span>ひとり親世帯（離婚・死別・未婚など）</span>
      </label>
      <label class="check-item" id="lbl-disabled">
        <input type="checkbox" id="disabled" onchange="toggleCheck('lbl-disabled')">
        <span>障害者手帳・療育手帳・精神障害者保健福祉手帳を持つ家族がいる</span>
      </label>
      <label class="check-item" id="lbl-elderly">
        <input type="checkbox" id="elderly" onchange="toggleCheck('lbl-elderly')">
        <span>65歳以上の家族がいる（または40〜64歳で特定疾病がある）</span>
      </label>
      <label class="check-item" id="lbl-student">
        <input type="checkbox" id="student" onchange="toggleCheck('lbl-student')">
        <span>大学・専門学校に通う学生がいる</span>
      </label>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">給付金を診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">該当する可能性がある給付金</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 該当給付金リスト -->
  <div class="card" id="match-section" style="display:none">
    <p class="card-title">該当する可能性がある給付金・支援金</p>
    <div id="match-list"></div>
  </div>

  <!-- 非該当トグル -->
  <button class="toggle-btn" id="toggle-btn" style="display:none" onclick="toggleNoMatch()">
    非該当の制度も確認する ▼
  </button>

  <!-- 非該当リスト -->
  <div class="card" id="nomatch-section" style="display:none">
    <p class="card-title">今回の条件では非該当の制度</p>
    <div id="nomatch-list"></div>
  </div>

  <!-- 注意書き -->
  <div class="disclaimer" id="disclaimer" style="display:none">
    ⚠️ この診断は目安です。実際の受給可否は各窓口・担当機関でご確認ください。所得・資産の条件は制度・自治体により異なります。2025年時点の代表的な制度をもとに作成しています。
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── チェックボックスのスタイル切替 ──
  function toggleCheck(id) {
    var lbl = document.getElementById(id);
    var cb = lbl.querySelector('input[type="checkbox"]');
    lbl.classList.toggle('checked', cb.checked);
  }

  // ── 住民税非課税の簡易判定（年収目安） ──
  function isHikazei(income, members) {
    // 単身100万、2人156万、以降+38〜45万ずつ（給与所得控除後の目安）
    var thresholds = [100, 156, 205, 255, 300, 345, 390];
    var idx = Math.min(members - 1, thresholds.length - 1);
    if (members > thresholds.length) idx = thresholds.length - 1;
    // 世帯人数が多い場合は追加
    var limit = thresholds[idx] + Math.max(0, members - thresholds.length) * 40;
    return income <= limit;
  }

  // ── 給付金データ ──
  var BENEFITS = [
    {
      name: "住民税非課税世帯給付金",
      amount: "3〜10万円（政府の経済対策時に支給）",
      desc: "住民税が非課税の世帯を対象に、政府の経済対策として支給される給付金。2024〜2025年も対象世帯に給付実施。",
      office: "市区町村役場（自動通知・申請）",
      check: function(d) { return isHikazei(d.income, d.members); }
    },
    {
      name: "児童手当",
      amount: "月1万〜1.5万円/子ども（第3子以降は月3万円）",
      desc: "中学3年生以下（2024年10月から高校3年生以下に拡充）の子どもがいる世帯に支給。所得制限撤廃（2024年10月〜）。",
      office: "市区町村役場",
      check: function(d) { return d.children > 0; }
    },
    {
      name: "幼児教育・保育の無償化（3〜5歳）",
      amount: "保育料が原則無料",
      desc: "3〜5歳の子どもが幼稚園・保育所・認定こども園に通っている場合、保育料が原則無料になる。",
      office: "市区町村役場・通園施設",
      check: function(d) { return d.child35; }
    },
    {
      name: "幼児教育・保育の無償化（0〜2歳・非課税世帯）",
      amount: "保育料が原則無料",
      desc: "住民税非課税世帯の0〜2歳の子どもの保育料が無料。",
      office: "市区町村役場・通園施設",
      check: function(d) { return d.child02 && isHikazei(d.income, d.members); }
    },
    {
      name: "児童扶養手当",
      amount: "月最大4.5万円（子ども1人、全部支給）",
      desc: "離婚・死別・未婚などのひとり親世帯で子どもを養育している場合に支給。所得制限あり（目安: 年収365万以下）。",
      office: "市区町村役場",
      check: function(d) { return d.single && d.children > 0 && d.income <= 365; }
    },
    {
      name: "ひとり親家庭医療費助成",
      amount: "医療費の自己負担を軽減",
      desc: "ひとり親世帯に対して医療費の自己負担を助成（自治体により異なる）。",
      office: "市区町村役場",
      check: function(d) { return d.single && d.children > 0; }
    },
    {
      name: "障害基礎年金",
      amount: "月6.6〜8.3万円（1〜2級）",
      desc: "国民年金加入中に障害等級1・2級に該当した場合に支給される年金。",
      office: "年金事務所・市区町村役場",
      check: function(d) { return d.disabled; }
    },
    {
      name: "特別障害者手当",
      amount: "月約2.8万円",
      desc: "20歳以上で常時介護が必要な重度障害者（在宅）に支給される手当。所得制限あり。",
      office: "市区町村役場",
      check: function(d) { return d.disabled; }
    },
    {
      name: "障害者控除・障害者手当（自治体）",
      amount: "各自治体により異なる",
      desc: "障害者手帳を持つ方に対する自治体独自の給付金・手当・医療費助成。",
      office: "市区町村役場・福祉窓口",
      check: function(d) { return d.disabled; }
    },
    {
      name: "介護保険給付",
      amount: "要介護度に応じた給付（上限あり）",
      desc: "65歳以上（または40〜64歳で特定疾病）で要介護・要支援認定を受けた場合に介護サービスが給付される。",
      office: "市区町村役場・地域包括支援センター",
      check: function(d) { return d.elderly; }
    },
    {
      name: "高額療養費制度",
      amount: "1ヶ月の医療費自己負担を上限内に抑える",
      desc: "1ヶ月の医療費が一定額を超えた場合、超過分が後から還付される制度。全世帯が対象（収入により上限額が異なる）。",
      office: "健康保険組合・協会けんぽ・市区町村",
      check: function(d) { return true; }
    },
    {
      name: "高等教育の修学支援制度（給付型奨学金）",
      amount: "授業料減免＋月2〜7.5万円の給付",
      desc: "低〜中所得世帯の大学・専門学校生に対して授業料減免と給付型奨学金を支給（返済不要）。",
      office: "日本学生支援機構（JASSO）",
      check: function(d) { return d.student && d.income <= 380; }
    },
    {
      name: "生活保護",
      amount: "生活費・住居費・医療費など（最低生活費を保障）",
      desc: "資産・能力を活用しても最低生活費に満たない場合に支給。働けない事情がある場合も対象。",
      office: "福祉事務所",
      check: function(d) {
        // 生活保護の目安：非常に低収入かつ資産なし（簡易判定）
        var base = 8 + (d.members - 1) * 5; // 万円/月の目安
        return d.income <= base * 12 * 0.8;
      }
    }
  ];

  var noMatchVisible = false;

  function diagnose() {
    var income = parseFloat(document.getElementById('income').value);
    var members = parseInt(document.getElementById('members').value);
    var children = parseInt(document.getElementById('children').value) || 0;
    if (isNaN(income) || isNaN(members) || income < 0 || members < 1) {
      alert('年間世帯収入と世帯人数を入力してください');
      return;
    }

    var data = {
      income: income,
      members: members,
      children: children,
      child02: document.getElementById('child02').checked,
      child35: document.getElementById('child35').checked,
      single: document.getElementById('single').checked,
      disabled: document.getElementById('disabled').checked,
      elderly: document.getElementById('elderly').checked,
      student: document.getElementById('student').checked
    };

    // localStorage 保存
    try {
      localStorage.setItem('kyuufukin_input', JSON.stringify({
        income: income, members: members, children: children,
        child02: data.child02, child35: data.child35,
        single: data.single, disabled: data.disabled,
        elderly: data.elderly, student: data.student
      }));
    } catch(e) {}

    var matched = [];
    var notMatched = [];
    BENEFITS.forEach(function(b) {
      if (b.check(data)) matched.push(b);
      else notMatched.push(b);
    });

    // 結論カード
    var rc = document.getElementById('result');
    var level = matched.length >= 3 ? 'ok' : matched.length >= 1 ? 'warn' : 'ng';
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = matched.length + '件';
    var note = matched.length > 0
      ? '各窓口で詳細を確認してください'
      : '現在の条件では該当する制度が少ない状態です';
    document.getElementById('rn').textContent = note;

    // 該当リスト
    var matchList = document.getElementById('match-list');
    matchList.innerHTML = matched.map(function(b) {
      return benefitHTML(b, true);
    }).join('');
    document.getElementById('match-section').style.display = matched.length ? '' : 'none';

    // 非該当リスト
    var nomatchList = document.getElementById('nomatch-list');
    nomatchList.innerHTML = notMatched.map(function(b) {
      return benefitHTML(b, false);
    }).join('');
    document.getElementById('toggle-btn').style.display = notMatched.length ? '' : 'none';
    document.getElementById('nomatch-section').style.display = 'none';
    noMatchVisible = false;
    document.getElementById('toggle-btn').textContent = '非該当の制度も確認する ▼';

    document.getElementById('disclaimer').style.display = '';

    // スクロール
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function benefitHTML(b, isMatch) {
    return '<div class="benefit-item' + (isMatch ? ' match' : ' no-match') + '">'
      + '<div class="benefit-header">'
      + '<span class="benefit-name">' + esc(b.name) + '</span>'
      + '<span class="benefit-badge ' + (isMatch ? 'match' : 'no-match') + '">'
      + (isMatch ? '✓ 該当の可能性' : '非該当') + '</span>'
      + '</div>'
      + '<div class="benefit-amount">' + esc(b.amount) + '</div>'
      + '<div class="benefit-desc">' + esc(b.desc) + '</div>'
      + '<div class="benefit-office">申請・問い合わせ先：<span>' + esc(b.office) + '</span></div>'
      + '</div>';
  }

  function toggleNoMatch() {
    noMatchVisible = !noMatchVisible;
    document.getElementById('nomatch-section').style.display = noMatchVisible ? '' : 'none';
    document.getElementById('toggle-btn').textContent = noMatchVisible
      ? '非該当の制度を閉じる ▲'
      : '非該当の制度も確認する ▼';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // localStorage 復元
  (function() {
    try {
      var saved = localStorage.getItem('kyuufukin_input');
      if (!saved) return;
      var d = JSON.parse(saved);
      if (d.income !== undefined) document.getElementById('income').value = d.income;
      if (d.members !== undefined) document.getElementById('members').value = d.members;
      if (d.children !== undefined) document.getElementById('children').value = d.children;
      var keys = ['child02','child35','single','disabled','elderly','student'];
      keys.forEach(function(k) {
        var el = document.getElementById(k);
        if (el && d[k]) {
          el.checked = true;
          var lbl = document.getElementById('lbl-' + (k === 'single' ? 'single' : k));
          if (lbl) lbl.classList.add('checked');
        }
      });
    } catch(e) {}
  })();
  </script>
