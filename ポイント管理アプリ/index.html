<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポイント管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>ポイント管理</h1>

    <section class="form-section">
      <h2>カードを追加</h2>
      <div class="form">
        <input type="text" id="cardName" placeholder="カード名（例：楽天ポイント）" maxlength="50">
        <input type="number" id="cardPoints" placeholder="残ポイント" min="0">
        <input type="date" id="cardExpiry">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>カード一覧</h2>
        <span id="cardCount" class="card-count"></span>
      </div>
      <div id="cardList" class="card-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
