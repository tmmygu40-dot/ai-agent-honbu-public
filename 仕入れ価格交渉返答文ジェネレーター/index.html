<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕入れ価格交渉返答文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8; --card: #ffffff; --border: #e8ddd0; --accent: #e07b00;
      --text: #1c1917; --text-sub: #78716c;
      --ok: #15803d; --ok-bg: #f0fdf4;
      --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 3rem; }
    .app-header { background: var(--card); border-bottom: 3px solid var(--accent); padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem; }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.2rem; box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px; }
    .card-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select { width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem; border: 1.5px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    /* トーン */
    .tone-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tone-btn { flex: 1; min-width: 120px; padding: 0.6rem 0.5rem; font-size: 0.82rem; font-weight: 700; border: 2px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text-sub); cursor: pointer; transition: all 0.15s; text-align: center; }
    .tone-btn.active { border-color: var(--accent); background: #fff8ee; color: var(--accent); }
    .btn-calc { display: block; width: 100%; max-width: 600px; margin: 0 auto 1.2rem; padding: 1rem; font-size: 1.05rem; font-weight: 800; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25); transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00; }
    .result-card { display: none; background: var(--ok-bg); border: 2px solid var(--ok); border-radius: var(--radius); padding: 1.4rem 1.2rem; box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ok); margin-bottom: 0.8rem; }
    .mail-body { font-size: 0.88rem; line-height: 1.8; color: var(--text); white-space: pre-wrap; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; }
    .btn-copy { display: block; width: 100%; padding: 0.65rem; font-size: 0.88rem; font-weight: 700; background: var(--card); color: var(--ok); border: 2px solid var(--ok); border-radius: 10px; cursor: pointer; transition: background 0.15s; }
    .btn-copy:hover { background: var(--ok-bg); }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf { display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 700; background: var(--card); color: var(--text-sub); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; max-width: 600px; width: 100%; transition: border-color 0.15s, color 0.15s; }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print { body { background: #fff; padding: 0; } .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; } .card, .result-card { box-shadow: none; border: 1px solid #ccc; } .app-header { border-bottom: 2px solid #000; } @page { margin: 12mm; } }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>仕入れ価格交渉返答文ジェネレーター</h1>
    <p class="subtitle">値上げ通知への返答・交渉メールを状況別に即生成</p>
  </header>

  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field"><label>仕入れ先（会社名）</label><input type="text" id="supplier" placeholder="例：〇〇商事株式会社 ご担当者様"></div>
    <div class="field"><label>自社名・担当者名</label><input type="text" id="sender" placeholder="例：山田商店 山田太郎"></div>
    <div class="field"><label>対象商品・品目</label><input type="text" id="item" placeholder="例：食用油 18L缶"></div>
    <div class="row2">
      <div class="field">
        <label>現在の仕入れ価格（円）</label>
        <input type="number" id="currentPrice" placeholder="例: 3500" min="0">
      </div>
      <div class="field">
        <label>通知された値上げ後価格（円）</label>
        <input type="number" id="newPrice" placeholder="例: 4500" min="0">
      </div>
    </div>
    <div class="field">
      <label>値上げ適用予定日（任意）</label>
      <input type="text" id="applyDate" placeholder="例：2026年6月1日">
    </div>
  </div>

  <div class="card">
    <p class="card-title">返答スタイルを選択</p>
    <div class="field">
      <div class="tone-group">
        <button class="tone-btn active" id="tone-negotiate" onclick="setTone('negotiate')">値下げ交渉型</button>
        <button class="tone-btn" id="tone-delay" onclick="setTone('delay')">時期延長・猶予型</button>
        <button class="tone-btn" id="tone-accept" onclick="setTone('accept')">受け入れ＋条件型</button>
        <button class="tone-btn" id="tone-review" onclick="setTone('review')">再検討要請型</button>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">返答メールを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成された返答メール</p>
    <div class="mail-body" id="mailBody"></div>
    <button class="btn-copy" onclick="copyMail()">📋 メール文をコピー</button>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'purchaseReplyGen_v1';
  var currentTone = 'negotiate';

  (function() {
    try {
      var s = JSON.parse(localStorage.getItem(LS_KEY));
      if (!s) return;
      ['supplier','sender','item','currentPrice','newPrice','applyDate'].forEach(function(id) {
        if (s[id] !== undefined) { var el = document.getElementById(id); if (el) el.value = s[id]; }
      });
      if (s.tone) setTone(s.tone);
    } catch(e) {}
  })();

  function setTone(tone) {
    currentTone = tone;
    ['negotiate','delay','accept','review'].forEach(function(t) {
      document.getElementById('tone-'+t).classList.toggle('active', t === tone);
    });
  }

  function generate() {
    var supplier     = v('supplier')     || '〇〇様';
    var sender       = v('sender')       || '担当者';
    var item         = v('item')         || '商品';
    var currentPrice = parseFloat(document.getElementById('currentPrice').value);
    var newPrice     = parseFloat(document.getElementById('newPrice').value);
    var applyDate    = v('applyDate')    || '〇月〇日';

    if (isNaN(currentPrice) || isNaN(newPrice)) {
      alert('現在価格と値上げ後価格を入力してください');
      return;
    }

    try { localStorage.setItem(LS_KEY, JSON.stringify({ supplier: supplier, sender: sender, item: item, currentPrice: currentPrice, newPrice: newPrice, applyDate: applyDate, tone: currentTone })); } catch(e) {}

    var upRate = ((newPrice - currentPrice) / currentPrice * 100).toFixed(1);
    var upAmt  = Math.round(newPrice - currentPrice);
    var mail   = buildMail(supplier, sender, item, currentPrice, newPrice, applyDate, upRate, upAmt);

    document.getElementById('result').style.display = 'block';
    document.getElementById('mailBody').textContent = mail;
  }

  function buildMail(supplier, sender, item, cur, nxt, applyDate, upRate, upAmt) {
    var today = fmtDate(new Date());

    if (currentTone === 'negotiate') {
      return [
        '件名：' + item + ' 価格改定のご通知に関するご返答',
        '',
        supplier,
        '',
        'いつも大変お世話になっております。' + sender + ' でございます。',
        '',
        'この度は、' + item + ' の価格改定（' + fmt(cur) + '円→' + fmt(nxt) + '円、+' + upRate + '%）についてご連絡いただきありがとうございます。',
        '',
        '原材料・輸送コストの高騰については十分理解しておりますが、今回の値上げ幅（＋' + fmt(upAmt) + '円）は弊社の採算に直接影響し、大変厳しい状況でございます。',
        '',
        '誠に恐縮ではございますが、以下の点についてご検討いただけますでしょうか。',
        '',
        '① 値上げ幅を半減（＋' + fmt(Math.round(upAmt/2)) + '円程度）にとどめていただくこと',
        '② 発注数量を増やすことで現行価格に近い単価にご対応いただくこと',
        '③ 段階的な価格移行（' + applyDate + '時点では中間価格での設定）をご検討いただくこと',
        '',
        '引き続き良好なお取引を続けてまいりたいと考えておりますので、ぜひご協議の機会をいただけますと幸いです。',
        '何卒よろしくお願い申し上げます。',
        '',
        today,
        sender,
      ].join('\n');
    }

    if (currentTone === 'delay') {
      return [
        '件名：' + item + ' 価格改定の適用時期に関するご相談',
        '',
        supplier,
        '',
        'お世話になっております。' + sender + ' でございます。',
        '',
        '' + item + ' の価格改定（' + applyDate + ' より ' + fmt(nxt) + '円）についてご通知いただきありがとうございます。',
        '',
        '値上げの背景については理解しておりますが、弊社では現在の価格で既に顧客への販売価格を設定しており、即座の対応が困難な状況です。',
        '',
        'つきましては、以下のいずれかのご対応をご検討いただけますでしょうか。',
        '',
        '① 適用時期を3ヶ月延長し、〇月〇日以降からとしていただくこと',
        '② 現行価格での在庫を一定数量確保させていただくこと（〇〇個まで旧価格での受け付け）',
        '',
        '急なお願いで大変恐れ入りますが、事業継続のためご配慮いただけますと幸いです。',
        'よろしくお願い申し上げます。',
        '',
        today,
        sender,
      ].join('\n');
    }

    if (currentTone === 'accept') {
      return [
        '件名：' + item + ' 価格改定についてのご返答（受け入れ・条件確認）',
        '',
        supplier,
        '',
        'お世話になっております。' + sender + ' でございます。',
        '',
        '' + item + ' の価格改定（' + fmt(cur) + '円→' + fmt(nxt) + '円）について、原則お受けする方向で検討しております。',
        '',
        'ただし、以下の条件についてご確認・ご対応いただけますでしょうか。',
        '',
        '① 適用開始日：' + applyDate + ' からとし、それ以前の発注は旧価格でお願いしたいこと',
        '② 次回の価格改定の際は、少なくとも3ヶ月前にご通知いただくこと',
        '③ 一定数量以上の発注に対して数量割引（ボリュームディスカウント）をご検討いただくこと',
        '',
        '上記についてご確認いただき、ご回答いただければ幸いです。',
        '引き続きよろしくお願い申し上げます。',
        '',
        today,
        sender,
      ].join('\n');
    }

    // review（再検討要請型）
    return [
      '件名：' + item + ' 価格改定のご通知に関するご返答',
      '',
      supplier,
      '',
      'お世話になっております。' + sender + ' でございます。',
      '',
      'この度は ' + item + ' の価格改定についてご連絡いただきありがとうございます。',
      '内容を検討いたしましたところ、今回の値上げ幅（+' + upRate + '%・+' + fmt(upAmt) + '円/個）については、弊社として大変受け入れがたい状況でございます。',
      '',
      '現在、弊社では複数の調達先への切り替えも含めた検討を行っております。',
      'つきましては、価格設定の根拠となるコスト内訳資料のご提供と、改めての協議の場を設けていただけますでしょうか。',
      '',
      '弊社としては引き続き貴社との取引を継続したいと考えておりますので、ぜひ前向きなご検討をお願い申し上げます。',
      '',
      '返答期限：' + applyDate + ' の2週間前までにご回答いただけますようお願いいたします。',
      '',
      today,
      sender,
    ].join('\n');
  }

  function copyMail() {
    var text = document.getElementById('mailBody').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { alert('コピーしました'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      alert('コピーしました');
    }
  }

  function v(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmtDate(d) { return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日'; }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
