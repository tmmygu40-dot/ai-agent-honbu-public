<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="夏前のエアコン試運転で異臭・異音・冷暖房不良などの症状をチェックすると、修理・買い替え・様子見のいずれかを即判定できる無料ツールです。">
  <title>❄️ エアコン試運転チェックと修理判定アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-sub); letter-spacing: 0.05em;
      margin: 1rem 0 0.5rem; padding: 0.3rem 0.6rem;
      background: var(--bg); border-radius: 6px;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reset {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.6rem;
      font-size: 0.88rem; font-weight: 600;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 0.5rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 0.6rem; }
    .advice-list { text-align: left; font-size: 0.85rem; line-height: 1.7; color: var(--text); }
    .advice-list li { margin-bottom: 0.3rem; padding-left: 0.2rem; }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.75rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; margin-top: 2px; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.5; }
    .check-item .check-sub { font-size: 0.76rem; color: var(--text-sub); display: block; margin-top: 0.1rem; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }
    .badge-serious {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      color: var(--ng); background: var(--ng-bg); border: 1px solid var(--ng);
      border-radius: 4px; padding: 0.05rem 0.35rem; margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>❄️ エアコン試運転チェックと修理判定アプリ</h1>
    <p class="subtitle">夏前に症状をチェックするだけで、修理・買い替えの目安がすぐわかります。</p>
  </header>

  <!-- チェックリストカード -->
  <div class="card">
    <p class="card-title">試運転チェックリスト</p>
    <p style="font-size:0.8rem;color:var(--text-sub);margin-bottom:0.8rem;">当てはまる症状にチェックを入れてください。</p>

    <p class="section-label">⚠️ 重篤な症状（1つでもあれば要注意）</p>

    <label class="check-item" id="c0-label">
      <input type="checkbox" id="c0" data-serious="1" onchange="saveState()">
      <span class="check-text">
        焦げ臭い・カビ臭い匂いがする<span class="badge-serious">重篤</span>
        <span class="check-sub">異臭は電気系統・カビ繁殖の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c1-label">
      <input type="checkbox" id="c1" data-serious="1" onchange="saveState()">
      <span class="check-text">
        水漏れがある（本体や周辺から水が垂れる）<span class="badge-serious">重篤</span>
        <span class="check-sub">ドレン詰まりや冷媒漏れの可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c2-label">
      <input type="checkbox" id="c2" data-serious="1" onchange="saveState()">
      <span class="check-text">
        電源が突然落ちる・電源が入らない<span class="badge-serious">重篤</span>
        <span class="check-sub">電気系統の故障の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c3-label">
      <input type="checkbox" id="c3" data-serious="1" onchange="saveState()">
      <span class="check-text">
        設置から10年以上経っている<span class="badge-serious">重篤</span>
        <span class="check-sub">エアコンの標準寿命は10〜13年</span>
      </span>
    </label>

    <p class="section-label">📋 気になる症状（複数あれば要注意）</p>

    <label class="check-item" id="c4-label">
      <input type="checkbox" id="c4" data-serious="0" onchange="saveState()">
      <span class="check-text">
        運転中にガラガラ・ピーなど異音がする
        <span class="check-sub">異物混入・ファン劣化の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c5-label">
      <input type="checkbox" id="c5" data-serious="0" onchange="saveState()">
      <span class="check-text">
        風は出るが冷えない・暖まらない
        <span class="check-sub">冷媒ガス不足・コンプレッサー劣化の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c6-label">
      <input type="checkbox" id="c6" data-serious="0" onchange="saveState()">
      <span class="check-text">
        リモコンが効かない・反応が遅い
        <span class="check-sub">リモコン電池切れ or 受光部の故障の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c7-label">
      <input type="checkbox" id="c7" data-serious="0" onchange="saveState()">
      <span class="check-text">
        室外機がひどく振動・騒音を出している
        <span class="check-sub">コンプレッサー・ファンモーター劣化の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c8-label">
      <input type="checkbox" id="c8" data-serious="0" onchange="saveState()">
      <span class="check-text">
        フィルターが極端に汚れ、清掃してもすぐ詰まる
        <span class="check-sub">内部カビ・ダスト蓄積の可能性あり</span>
      </span>
    </label>
    <label class="check-item" id="c9-label">
      <input type="checkbox" id="c9" data-serious="0" onchange="saveState()">
      <span class="check-text">
        電気代が急に高くなった（前年比で明らかに増加）
        <span class="check-sub">効率低下・冷媒漏れの可能性あり</span>
      </span>
    </label>
  </div>

  <!-- 判定ボタン -->
  <button class="btn-calc" onclick="judge()">判定する</button>
  <button class="btn-reset no-print" onclick="resetAll()">チェックをリセット</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">判定結果</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <ul class="advice-list" id="ra"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、一般社団法人 家電製品協会・各メーカー公開情報をもとに目安として整理しています。実際の修理・買い替えの判断はメーカーや専門業者にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
  var TOTAL = 10;
  var SERIOUS_IDS = ['c0','c1','c2','c3'];
  var MINOR_IDS   = ['c4','c5','c6','c7','c8','c9'];
  var KEY = 'aircon_check_state';

  function judge() {
    var serious = SERIOUS_IDS.filter(function(id){ return document.getElementById(id).checked; }).length;
    var minor   = MINOR_IDS.filter(function(id){ return document.getElementById(id).checked; }).length;
    var total   = serious + minor;

    var level, title, note, advice;

    if (serious >= 3 || (serious >= 2 && minor >= 2)) {
      level = 'ng';
      title = '🚨 買い替えを検討';
      note = '深刻な症状が複数あります。修理費用が高額になるケースが多く、この機会に買い替えも視野に入れましょう。';
      advice = [
        '早めにメーカーや家電量販店へ修理相談を',
        '設置10年超の場合は新品買い替えも経済的に有利なことが多い',
        '買い替え時は省エネ性能（APF値）が高い機種を選ぶと電気代削減になる',
        'エアコン処分には家電リサイクル料金が必要（事前に確認を）',
      ];
    } else if (serious >= 1 || minor >= 3) {
      level = 'warn';
      title = '⚠️ 修理・点検を検討';
      note = '気になる症状があります。そのまま使い続けると故障が悪化する可能性があります。早めに点検を。';
      advice = [
        'まずフィルター清掃・リモコン電池交換など自分でできる確認を',
        'メーカーの点検サービスや家電量販店の修理相談窓口を利用しよう',
        '異臭・水漏れがある場合はすぐに使用を止めて相談を',
        '修理見積もりを取ってから買い替えと比較するのがおすすめ',
      ];
    } else {
      level = 'ok';
      title = '✅ 今シーズンも使えそう';
      note = '特に大きな問題は見当たりません。定期的なメンテナンスを続けながら快適に使いましょう。';
      advice = [
        'フィルターは2週間〜1ヶ月に1回を目安に清掃しよう',
        '試運転は梅雨前（5〜6月）に行うのがベスト',
        '室外機の周りに物を置かないようにして通気を確保しよう',
        '来シーズンもこのアプリで試運転チェックをお忘れなく！',
      ];
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = title;
    document.getElementById('rn').textContent = note;
    document.getElementById('ra').innerHTML = advice.map(function(a){
      return '<li>• ' + a + '</li>';
    }).join('');
    rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function saveState() {
    var state = {};
    for (var i = 0; i < TOTAL; i++) {
      state['c'+i] = document.getElementById('c'+i).checked;
    }
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) return;
      var state = JSON.parse(raw);
      for (var i = 0; i < TOTAL; i++) {
        var el = document.getElementById('c'+i);
        if (el && state['c'+i]) el.checked = true;
      }
    } catch(e) {}
  }

  function resetAll() {
    for (var i = 0; i < TOTAL; i++) {
      document.getElementById('c'+i).checked = false;
    }
    var rc = document.getElementById('result');
    rc.style.display = 'none';
    rc.className = 'result-card';
    try { localStorage.removeItem(KEY); } catch(e) {}
  }

  loadState();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
