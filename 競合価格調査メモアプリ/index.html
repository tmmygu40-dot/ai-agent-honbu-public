<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競合価格調査メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>競合価格調査メモ</h1>

    <section class="form-section">
      <div class="form-grid">
        <div class="form-group">
          <label for="competitorName">競合店名</label>
          <input type="text" id="competitorName" placeholder="例：〇〇スーパー">
        </div>
        <div class="form-group">
          <label for="productName">商品名</label>
          <input type="text" id="productName" placeholder="例：牛乳1L">
        </div>
        <div class="form-group">
          <label for="competitorPrice">競合価格（円）</label>
          <input type="number" id="competitorPrice" placeholder="例：198" min="0">
        </div>
        <div class="form-group">
          <label for="myPrice">自社価格（円）</label>
          <input type="number" id="myPrice" placeholder="例：218" min="0">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>登録一覧</h2>
        <span id="count" class="count-badge">0件</span>
      </div>
      <div id="emptyMsg" class="empty-msg">まだ登録されていません</div>
      <div id="list" class="list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
