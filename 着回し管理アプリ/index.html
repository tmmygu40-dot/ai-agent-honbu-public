<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>着回し管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>着回し管理</h1>

    <!-- 登録フォーム -->
    <section class="card" id="register-section">
      <h2>服を登録する</h2>
      <div class="form-group">
        <label for="item-name">名前</label>
        <input type="text" id="item-name" placeholder="例：白Tシャツ" maxlength="50">
      </div>
      <div class="form-group">
        <label for="item-category">カテゴリ</label>
        <select id="item-category">
          <option value="トップス">トップス</option>
          <option value="ボトムス">ボトムス</option>
          <option value="アウター">アウター</option>
          <option value="シューズ">シューズ</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="item-color">色</label>
        <input type="text" id="item-color" placeholder="例：白" maxlength="20">
      </div>
      <button class="btn btn-primary" id="add-btn">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="filter-bar">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="30">30日以上未着用</button>
      <button class="filter-btn" data-filter="60">60日以上未着用</button>
      <button class="filter-btn" data-filter="never">一度も着ていない</button>
    </section>

    <!-- 一覧 -->
    <section id="list-section">
      <p class="empty-msg" id="empty-msg">服が登録されていません</p>
      <div id="items-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
