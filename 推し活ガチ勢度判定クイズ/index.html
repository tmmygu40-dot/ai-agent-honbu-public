<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活ガチ勢度判定クイズ｜10問でわかる用語理解度</title>
  <meta name="description" content="推し活で使われる用語を10問の3択で出題。正解数からあなたのガチ勢度ランクを判定します。SNSのネタにも、推し活始めたばかりの自分チェックにもどうぞ。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--border); }
    .q-block:last-of-type { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .q-text { font-size: 0.96rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.6rem; color: var(--text); }
    .q-text .q-num { display: inline-block; min-width: 1.8rem; color: var(--accent); margin-right: 0.2rem; }

    .opt-row {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.7rem 0.7rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg);
      cursor: pointer; user-select: none;
      transition: border-color 0.12s, background 0.12s;
    }
    .opt-row:last-child { margin-bottom: 0; }
    .opt-row input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 0.1rem; cursor: pointer; accent-color: var(--accent); }
    .opt-row .opt-text { font-size: 0.92rem; line-height: 1.45; color: var(--text); }
    .opt-row:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-rank {
      font-size: 1.2rem; font-weight: 800; line-height: 1.4;
      margin-top: 0.2rem; margin-bottom: 0.5rem;
    }
    .result-card.ok   .result-rank { color: var(--ok); }
    .result-card.warn .result-rank { color: var(--warn); }
    .result-card.ng   .result-rank { color: var(--ng); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.6rem 0.3rem; color: var(--text-sub); vertical-align: top; }
    .detail-table td:first-child { width: 2.4rem; font-weight: 700; color: var(--text); }
    .detail-table td:last-child { text-align: right; font-weight: 700; white-space: nowrap; }
    .detail-table .ok td:last-child { color: var(--ok); }
    .detail-table .ng td:last-child { color: var(--ng); }
    .detail-table .q-line { color: var(--text); font-weight: 600; }
    .detail-table .a-line { color: var(--text-sub); font-size: 0.82rem; margin-top: 0.2rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>推し活ガチ勢度判定クイズ</h1>
    <p class="subtitle">10問の3択クイズで、あなたの推し活用語の理解度をチェック。SNSでシェアできるガチ勢度ランク付き。</p>
  </header>

  <div class="card">
    <p class="card-title">クイズ（全10問・3択）</p>
    <div id="quiz-area"></div>
  </div>

  <button class="btn-calc" onclick="grade()">結果を見る</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-rank" id="rk"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">解答内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズはSNSや推し活コミュニティで一般的に使われている用語を、エンタメ目的でまとめたものです。地域・界隈ごとに用法のゆらぎがあります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: '「自担(じたん)」とはどういう意味？',
      opts: ['自分が担当する仕事', '自分の担当（推し）の人', '自分で担いで運ぶこと'],
      ans: 1
    },
    {
      q: '「現場」とは？',
      opts: ['工事や事故が起きた場所', 'ライブ・イベント・舞台などの会場', '推しのSNSアカウント'],
      ans: 1
    },
    {
      q: '「沼(ぬま)にハマる」とは？',
      opts: ['公園の池に落ちること', '推しに夢中になって抜け出せない状態', 'ライブが中止になること'],
      ans: 1
    },
    {
      q: '「DD」が指すのは？',
      opts: ['誰でも大好き', 'ダブルダウン', 'ドリームデー'],
      ans: 0
    },
    {
      q: '「同担拒否(どうたんきょひ)」の意味は？',
      opts: ['担任の先生を変えてほしい', '担当の仕事を断ること', '同じ推しが好きな人と関わりたくない'],
      ans: 2
    },
    {
      q: '「ガチ恋(こい)」とは？',
      opts: ['ガチャを引きすぎて恋に落ちること', '推しに本気の恋愛感情を持つこと', '偽物ではない確実な恋愛'],
      ans: 1
    },
    {
      q: '「箱推し(はこおし)」とは？',
      opts: ['箱買いしたグッズを推す', 'グループ全体を推す', '段ボールリサイクルを推奨する'],
      ans: 1
    },
    {
      q: '「ヘラる」とは？',
      opts: ['へらへら笑うこと', 'メンタルが落ち込む状態', '体重を減らすこと'],
      ans: 1
    },
    {
      q: '「神対応」とは？',
      opts: ['推しのファンに対するすばらしい対応', '神社で行われる特別な対応', 'AIによる完璧な接客'],
      ans: 0
    },
    {
      q: '「FF外から失礼します」の「FF」とは？',
      opts: ['ファイナルファンタジー', '相互フォロー（Follow-Follower）', 'ファンファクト'],
      ans: 1
    }
  ];

  var STORAGE_KEY = 'oshikatsu-gachi-quiz-last-score';

  function renderQuiz() {
    var html = QUESTIONS.map(function(item, i){
      var opts = item.opts.map(function(t, j){
        var id = 'q' + i + '_' + j;
        return ''
          + '<label class="opt-row" for="' + id + '">'
          + '<input type="radio" id="' + id + '" name="q' + i + '" value="' + j + '">'
          + '<span class="opt-text">' + t + '</span>'
          + '</label>';
      }).join('');
      return ''
        + '<div class="q-block">'
        + '<p class="q-text"><span class="q-num">Q' + (i+1) + '.</span>' + item.q + '</p>'
        + opts
        + '</div>';
    }).join('');
    document.getElementById('quiz-area').innerHTML = html;
  }

  function grade() {
    var picks = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      picks.push(sel ? parseInt(sel.value, 10) : -1);
    }
    var unanswered = picks.filter(function(v){ return v === -1; }).length;
    if (unanswered > 0) {
      showError('未回答が ' + unanswered + ' 問あります。すべて選択してください。');
      return;
    }
    var correct = 0;
    var rows = QUESTIONS.map(function(item, i){
      var ok = picks[i] === item.ans;
      if (ok) correct++;
      return {
        n: i + 1,
        ok: ok,
        q: item.q,
        userText: item.opts[picks[i]],
        ansText: item.opts[item.ans]
      };
    });

    var rank = rankFor(correct);
    showResult(rank.level, correct + ' / 10', rank.label, rank.note);
    showDetail(rows);

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ score: correct, rank: rank.label, at: new Date().toISOString() }));
    } catch (e) {}

    var resultEl = document.getElementById('result');
    if (resultEl && resultEl.scrollIntoView) resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function rankFor(score) {
    if (score >= 9) return { level: 'ok',   label: '神ガチ勢',     note: 'もはや辞典レベル。界隈の用語を完全に押さえています。' };
    if (score >= 7) return { level: 'ok',   label: 'ガチ勢',       note: '相当な経験者。SNSでも自然に用語を使いこなせる層です。' };
    if (score >= 5) return { level: 'warn', label: 'ライト勢',     note: '基本は押さえています。あと少しで本格ガチ勢の入口です。' };
    if (score >= 3) return { level: 'warn', label: 'にわか',       note: '聞いたことある単語が多めの段階。ここから一気に覚えられます。' };
    return                 { level: 'ng',   label: '未経験ゾーン', note: 'まだ用語に馴染みがない段階。今日から覚えていきましょう。' };
  }

  function showResult(level, val, rank, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val + ' 問正解';
    document.getElementById('rk').textContent = rank;
    document.getElementById('rn').textContent = note;
  }

  function showError(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rk').textContent = '入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function showDetail(rows) {
    var html = rows.map(function(r){
      var mark = r.ok ? '✓' : '×';
      var detailLine = r.ok
        ? '<span class="a-line">あなたの解答：' + escapeHTML(r.userText) + '</span>'
        : '<span class="a-line">あなたの解答：' + escapeHTML(r.userText) + '<br>正解：' + escapeHTML(r.ansText) + '</span>';
      return ''
        + '<tr class="' + (r.ok ? 'ok' : 'ng') + '">'
        + '<td>Q' + r.n + '</td>'
        + '<td><div class="q-line">' + escapeHTML(r.q) + '</div>' + detailLine + '</td>'
        + '<td>' + mark + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('db').innerHTML = html;
    document.getElementById('detail').style.display = 'block';
  }

  renderQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
