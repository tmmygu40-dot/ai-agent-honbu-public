<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク仕分けアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>タスク仕分けアプリ</h1>
    <p class="subtitle">やることを緊急度×重要度で仕分けて優先順位を整理する</p>
  </header>

  <main>
    <section class="input-section">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="タスクを入力..." maxlength="100">
        <button id="addBtn">追加</button>
      </div>
      <div class="quadrant-select">
        <label>
          <input type="radio" name="quadrant" value="q1" checked>
          <span class="q1-label">緊急 × 重要</span>
        </label>
        <label>
          <input type="radio" name="quadrant" value="q2">
          <span class="q2-label">重要 × 非緊急</span>
        </label>
        <label>
          <input type="radio" name="quadrant" value="q3">
          <span class="q3-label">緊急 × 非重要</span>
        </label>
        <label>
          <input type="radio" name="quadrant" value="q4">
          <span class="q4-label">非緊急 × 非重要</span>
        </label>
      </div>
    </section>

    <section class="matrix">
      <div class="matrix-grid">
        <div class="quadrant q1" id="q1">
          <div class="quadrant-header">
            <span class="badge">第1象限</span>
            <h2>緊急 × 重要</h2>
            <p class="hint">今すぐやる</p>
          </div>
          <ul class="task-list" id="list-q1"></ul>
        </div>
        <div class="quadrant q2" id="q2">
          <div class="quadrant-header">
            <span class="badge">第2象限</span>
            <h2>重要 × 非緊急</h2>
            <p class="hint">計画して取り組む</p>
          </div>
          <ul class="task-list" id="list-q2"></ul>
        </div>
        <div class="quadrant q3" id="q3">
          <div class="quadrant-header">
            <span class="badge">第3象限</span>
            <h2>緊急 × 非重要</h2>
            <p class="hint">委任・素早く済ます</p>
          </div>
          <ul class="task-list" id="list-q3"></ul>
        </div>
        <div class="quadrant q4" id="q4">
          <div class="quadrant-header">
            <span class="badge">第4象限</span>
            <h2>非緊急 × 非重要</h2>
            <p class="hint">やめるか後回し</p>
          </div>
          <ul class="task-list" id="list-q4"></ul>
        </div>
      </div>
    </section>

    <div class="footer-actions">
      <button id="clearAllBtn" class="danger-btn">すべてクリア</button>
    </div>
  </main>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
