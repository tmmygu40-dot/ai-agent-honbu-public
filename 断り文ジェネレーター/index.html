<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>断り文ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 生成結果エリア ── */
    .result-area {
      display: none;
      max-width: 600px;
      margin: 0 auto 1rem;
    }
    .result-tabs {
      display: flex; gap: 0.4rem; margin-bottom: 0.6rem;
    }
    .tab-btn {
      flex: 1; padding: 0.55rem 0.5rem;
      font-size: 0.82rem; font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg);
      color: var(--text-sub); cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }
    .result-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
    }
    .result-card-title {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; margin-bottom: 0.75rem;
    }
    .result-text {
      font-size: 0.95rem; line-height: 1.8;
      white-space: pre-wrap; color: var(--text);
      background: var(--bg); border-radius: 9px;
      padding: 0.9rem 1rem; margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.7rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: #ffe8c0; }
    .copy-ok {
      display: none; text-align: center;
      font-size: 0.82rem; font-weight: 700;
      color: var(--ok); margin-top: 0.5rem;
    }

    /* ── 履歴 ── */
    .history-list { list-style: none; }
    .history-item {
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 0.4rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-meta {
      font-size: 0.74rem; color: var(--text-sub);
      margin-bottom: 0.35rem;
    }
    .history-preview {
      font-size: 0.85rem; line-height: 1.5;
      color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .history-copy {
      margin-top: 0.4rem;
      font-size: 0.78rem; font-weight: 600;
      color: var(--accent); background: none;
      border: none; cursor: pointer; padding: 0;
    }
    .no-history {
      text-align: center; font-size: 0.85rem;
      color: var(--text-sub); padding: 1rem 0;
    }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .result-tabs, .btn-copy { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>断り文ジェネレーター</h1>
    <p class="subtitle">業種・状況・相手を選ぶだけで、角の立たない断り文を即生成</p>
  </header>

  <!-- 選択カード -->
  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="sel-gyoshu">あなたの業種</label>
      <select id="sel-gyoshu">
        <option value="飲食業">飲食業</option>
        <option value="小売業">小売業</option>
        <option value="建設業">建設業</option>
        <option value="IT・Web">IT・Web</option>
        <option value="医療・福祉">医療・福祉</option>
        <option value="教育">教育</option>
        <option value="製造業">製造業</option>
        <option value="サービス業" selected>サービス業</option>
        <option value="不動産">不動産</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="sel-jokyo">断る状況</label>
      <select id="sel-jokyo">
        <option value="仕事・案件の依頼" selected>仕事・案件の依頼</option>
        <option value="会食・食事の誘い">会食・食事の誘い</option>
        <option value="イベント・セミナーへの参加依頼">イベント・セミナーへの参加依頼</option>
        <option value="資料・サンプルの送付依頼">資料・サンプルの送付依頼</option>
        <option value="価格・条件の交渉">価格・条件の交渉</option>
        <option value="商品・サービスの売り込み">商品・サービスの売り込み</option>
        <option value="ボランティア・手伝いの依頼">ボランティア・手伝いの依頼</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="sel-aite">相手</label>
      <select id="sel-aite">
        <option value="取引先" selected>取引先</option>
        <option value="顧客・お客様">顧客・お客様</option>
        <option value="上司">上司</option>
        <option value="同僚・部下">同僚・部下</option>
        <option value="知人・友人">知人・友人</option>
        <option value="初めての相手">初めての相手</option>
        <option value="その他">その他</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">断り文を生成する</button>

  <!-- 結果エリア -->
  <div class="result-area" id="result-area">
    <div class="result-tabs">
      <button class="tab-btn active" onclick="switchTab(0)">丁寧</button>
      <button class="tab-btn" onclick="switchTab(1)">普通</button>
      <button class="tab-btn" onclick="switchTab(2)">簡潔</button>
    </div>
    <div class="result-card">
      <p class="result-card-title" id="result-label">生成された断り文</p>
      <div class="result-text" id="result-text"></div>
      <button class="btn-copy" onclick="copyText()">📋 コピーする</button>
      <p class="copy-ok" id="copy-ok">✅ コピーしました</p>
    </div>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="history-card">
    <p class="card-title">生成履歴（最大5件）</p>
    <ul class="history-list" id="history-list">
      <li class="no-history">まだ生成履歴はありません</li>
    </ul>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var TEXTS = [];
  var currentTab = 0;

  // 断り文データ
  var templates = {
    // [状況][相手][スタイル: 0=丁寧, 1=普通, 2=簡潔]
    default: [
      function(gyoshu, jokyo, aite) {
        return 'いつも大変お世話になっております。\n\nこのたびは「' + jokyo + '」のご連絡をいただき、誠にありがとうございます。\n\nご期待に添えず大変恐縮ではございますが、現在の業務状況を考慮した結果、今回はご辞退させていただきたく存じます。\n\nせっかくのご連絡にもかかわらず、このようなご返答となってしまいましたことを深くお詫び申し上げます。\n\n今後とも何卒よろしくお願い申し上げます。';
      },
      function(gyoshu, jokyo, aite) {
        return 'いつもお世話になっております。\n\n「' + jokyo + '」についてご連絡いただきありがとうございます。\n\n大変申し訳ありませんが、今回はご対応が難しい状況です。ご期待に添えず恐縮ですが、今回はお断りさせていただきます。\n\nまたの機会がございましたら、ぜひよろしくお願いいたします。';
      },
      function(gyoshu, jokyo, aite) {
        return 'ご連絡ありがとうございます。\n\n「' + jokyo + '」の件ですが、今回は対応が難しいため、お断りさせてください。\n\nまたの機会にどうぞよろしくお願いします。';
      }
    ]
  };

  // 状況別テンプレート（中心文のみ差し替え）
  var situationCore = {
    '仕事・案件の依頼': [
      '現在、既存案件の対応で手一杯の状況であり、新規のお受けが難しい状況でございます。',
      '現在、他の案件で手が一杯のため、新しい依頼をお受けするのが難しい状況です。',
      '現在の対応状況上、新規案件はお受けできません。'
    ],
    '会食・食事の誘い': [
      '誠に残念ではございますが、当日は先約がございまして、ご一緒することが叶いません。',
      '残念ながら先約がございまして、今回はご参加が難しい状況です。',
      '先約があるため、今回は参加できません。'
    ],
    'イベント・セミナーへの参加依頼': [
      '誠に遺憾ではございますが、当日は業務の都合がつかず、ご参加が難しい状況でございます。',
      '残念ながら業務の都合上、当日の参加が難しい状況です。',
      '業務の都合で参加できません。'
    ],
    '資料・サンプルの送付依頼': [
      '誠に恐れ入りますが、現時点では対外的な資料の提供が難しい状況でございます。',
      '申し訳ありませんが、現状では資料の提供が難しい状況です。',
      '現時点では資料の提供はお断りしています。'
    ],
    '価格・条件の交渉': [
      '誠に恐縮ではございますが、現在の提示条件が当社として最善のご提案であり、それ以上のご対応が難しい状況でございます。',
      '申し訳ありませんが、提示している条件がこちらの最善のご提案となっており、変更が難しい状況です。',
      '提示条件が最終となりますので、変更はお断りします。'
    ],
    '商品・サービスの売り込み': [
      'ご案内いただきありがとうございます。現在は既存のサービスで十分な状況であり、新たな導入は検討しておりません。',
      'ありがとうございます。現在は新しい導入を検討していない状況です。',
      '現在は導入を検討していません。'
    ],
    'ボランティア・手伝いの依頼': [
      '誠に恐縮ではございますが、現在の業務・スケジュールの状況上、お力添えする余裕がございません。',
      '残念ながら、現在のスケジュール上、お手伝いするのが難しい状況です。',
      '現在の状況上、お手伝いできません。'
    ],
    'その他': [
      '誠に遺憾ではございますが、現在の状況を鑑みますと、ご要望にお応えすることが難しい状況でございます。',
      '大変申し訳ないのですが、今回はご要望にお応えするのが難しい状況です。',
      '今回はご要望にお応えできません。'
    ]
  };

  // 相手別の書き出し・締め
  var aiteStyle = {
    '取引先': {
      open: 'いつも大変お世話になっております。',
      close: '今後とも何卒よろしくお願い申し上げます。'
    },
    '顧客・お客様': {
      open: 'いつもご愛顧いただきありがとうございます。',
      close: 'またご縁がございましたら、ぜひよろしくお願い申し上げます。'
    },
    '上司': {
      open: 'お声がけいただきありがとうございます。',
      close: '引き続きよろしくお願いいたします。'
    },
    '同僚・部下': {
      open: '声をかけてくれてありがとう。',
      close: 'また別の機会にぜひよろしく。'
    },
    '知人・友人': {
      open: '誘ってくれてありがとう。',
      close: 'またの機会をぜひよろしく！'
    },
    '初めての相手': {
      open: 'この度はご連絡いただきありがとうございます。',
      close: '今後何かご縁がございましたら、またよろしくお願いいたします。'
    },
    'その他': {
      open: 'ご連絡ありがとうございます。',
      close: 'またの機会にどうぞよろしくお願いします。'
    }
  };

  // 感謝フレーズ
  var thankPhrases = {
    '仕事・案件の依頼': ['このたびはお声がけいただき、誠にありがとうございます。', 'ご依頼いただきありがとうございます。', 'ご連絡ありがとうございます。'],
    '会食・食事の誘い': ['お誘いいただきありがとうございます。', 'ありがとうございます。', 'お誘いありがとう。'],
    'イベント・セミナーへの参加依頼': ['ご案内いただきありがとうございます。', 'ご連絡いただきありがとうございます。', 'ご案内ありがとうございます。'],
    '資料・サンプルの送付依頼': ['ご関心をお寄せいただきありがとうございます。', 'ご連絡いただきありがとうございます。', 'ありがとうございます。'],
    '価格・条件の交渉': ['ご検討いただきありがとうございます。', 'ご連絡いただきありがとうございます。', 'ありがとうございます。'],
    '商品・サービスの売り込み': ['ご案内いただきありがとうございます。', 'ご連絡いただきありがとうございます。', 'ありがとうございます。'],
    'ボランティア・手伝いの依頼': ['声をかけていただきありがとうございます。', 'ご連絡いただきありがとうございます。', 'ありがとうございます。'],
    'その他': ['ご連絡いただきありがとうございます。', 'ご連絡ありがとうございます。', 'ありがとうございます。']
  };

  // お詫びフレーズ
  var soryPhrases = [
    'ご期待に添えず、大変申し訳ございません。',
    '申し訳ありませんが、',
    '今回はお断りさせてください。'
  ];

  function buildText(gyoshu, jokyo, aite, style) {
    var core = (situationCore[jokyo] || situationCore['その他'])[style];
    var as = aiteStyle[aite] || aiteStyle['その他'];
    var thank = (thankPhrases[jokyo] || thankPhrases['その他'])[style];

    if (style === 0) {
      return as.open + '\n\n' + thank + '\n\n' + core + '\n\nご期待に添えず、大変申し訳ございません。\n\n' + as.close;
    } else if (style === 1) {
      return as.open + '\n\n' + thank + '\n\n' + core + '\n\n大変申し訳ありませんが、今回はお断りさせていただきます。\n\n' + as.close;
    } else {
      return thank + '\n\n' + core + '\n\n' + as.close;
    }
  }

  function generate() {
    var gyoshu = document.getElementById('sel-gyoshu').value;
    var jokyo  = document.getElementById('sel-jokyo').value;
    var aite   = document.getElementById('sel-aite').value;

    TEXTS = [
      buildText(gyoshu, jokyo, aite, 0),
      buildText(gyoshu, jokyo, aite, 1),
      buildText(gyoshu, jokyo, aite, 2)
    ];

    currentTab = 0;
    updateTabUI();

    var area = document.getElementById('result-area');
    area.style.display = 'block';

    document.getElementById('copy-ok').style.display = 'none';

    // 履歴保存
    saveHistory({
      gyoshu: gyoshu, jokyo: jokyo, aite: aite,
      text: TEXTS[0],
      date: new Date().toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
    });
    renderHistory();
  }

  function switchTab(idx) {
    currentTab = idx;
    updateTabUI();
    document.getElementById('copy-ok').style.display = 'none';
  }

  function updateTabUI() {
    var labels = ['丁寧なメール文', '標準的なメール文', '簡潔なメール文'];
    document.getElementById('result-text').textContent = TEXTS[currentTab];
    document.getElementById('result-label').textContent = labels[currentTab];
    var tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(function(t, i) {
      t.classList.toggle('active', i === currentTab);
    });
  }

  function copyText() {
    var t = document.getElementById('result-text').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(t).then(showCopyOk).catch(function() { fallbackCopy(t); });
    } else {
      fallbackCopy(t);
    }
  }

  function fallbackCopy(t) {
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showCopyOk(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopyOk() {
    var el = document.getElementById('copy-ok');
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 2000);
  }

  // ── 履歴 ──
  var STORAGE_KEY = 'kotowari_history_v1';

  function saveHistory(entry) {
    var list = loadHistory();
    list.unshift(entry);
    if (list.length > 5) list = list.slice(0, 5);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
  }

  function renderHistory() {
    var list = loadHistory();
    var ul = document.getElementById('history-list');
    if (!list.length) {
      ul.innerHTML = '<li class="no-history">まだ生成履歴はありません</li>';
      return;
    }
    ul.innerHTML = list.map(function(item, i) {
      return '<li class="history-item">'
        + '<div class="history-meta">' + item.date + '　' + item.jokyo + '　→　' + item.aite + '</div>'
        + '<div class="history-preview">' + escHtml(item.text) + '</div>'
        + '<button class="history-copy" onclick="copyHistoryItem(' + i + ')">📋 コピー</button>'
        + '</li>';
    }).join('');
  }

  function copyHistoryItem(i) {
    var list = loadHistory();
    if (!list[i]) return;
    var t = list[i].text;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(t).catch(function() { fallbackCopy(t); });
    } else {
      fallbackCopy(t);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
  }

  // 初期表示
  renderHistory();
  </script>
