<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給与計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>給与計算アプリ</h1>

    <section class="input-section">
      <h2>勤務記録を追加</h2>
      <div class="form-group">
        <label for="work-date">日付</label>
        <input type="date" id="work-date">
      </div>
      <div class="form-group">
        <label for="work-hours">勤務時間（時間）</label>
        <input type="number" id="work-hours" min="0" max="24" step="0.5" placeholder="例：8">
      </div>
      <div class="form-group">
        <label for="hourly-wage">時給（円）</label>
        <input type="number" id="hourly-wage" min="0" placeholder="例：1200">
      </div>
      <button id="add-btn" class="btn-primary">追加</button>
    </section>

    <section class="summary-section">
      <div class="month-nav">
        <button id="prev-month" class="btn-nav">&#8249;</button>
        <span id="current-month"></span>
        <button id="next-month" class="btn-nav">&#8250;</button>
      </div>
      <div class="total-box">
        <span class="total-label">月合計</span>
        <span id="monthly-total" class="total-amount">¥0</span>
      </div>
    </section>

    <section class="records-section">
      <h2>勤務記録一覧</h2>
      <div id="records-list" class="records-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
