<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫最適化シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 推奨アクション ── */
    .action-box {
      display: none;
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .action-box strong { color: var(--accent); display: block; margin-bottom: 0.3rem; font-size: 0.78rem; letter-spacing: 0.06em; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>

          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>在庫最適化シミュレーター</h1>
    <p class="subtitle">回転率・在庫量・仕入れコストから過剰在庫の損失と最適発注量を即算出</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="productName">商品名</label>
      <input type="text" id="productName" placeholder="例：Aシャツ、コーヒー豆500g など">
    </div>
    <div class="field">
      <label for="dailySales">日次販売数（個/日）</label>
      <input type="number" id="dailySales" placeholder="例: 10" min="0" step="0.1">
      <p class="hint">1日あたりの平均販売数。週販売数÷7でもOK</p>
    </div>
    <div class="field">
      <label for="currentStock">現在の在庫数（個）</label>
      <input type="number" id="currentStock" placeholder="例: 150" min="0">
    </div>
    <div class="field">
      <label for="unitCost">仕入れ単価（円/個）</label>
      <input type="number" id="unitCost" placeholder="例: 500" min="0">
    </div>
    <div class="field">
      <label for="leadTime">リードタイム（発注〜入荷までの日数）</label>
      <input type="number" id="leadTime" placeholder="例: 7" min="1" value="7">
      <p class="hint">発注してから商品が届くまでの日数</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">過剰在庫・発注量を診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">過剰在庫の損失額（年間）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">診断内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- 推奨アクション -->
  <div class="action-box" id="actionBox">
    <strong>推奨アクション</strong>
    <span id="actionText"></span>
  </div>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 保管コスト率は仕入れ単価の年20%（倉庫代・資金機会損失の一般的な目安）。最適発注量はリードタイム分＋安全在庫（3日分）で算出しています。実際の発注は在庫管理担当者と相談してください。
  </p>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var HOLDING_RATE = 0.20; // 年間保管コスト率（仕入れ単価の20%）
  var SAFETY_DAYS  = 3;    // 安全在庫の日数

  function calc() {
    var name     = document.getElementById('productName').value.trim() || '商品';
    var daily    = parseFloat(document.getElementById('dailySales').value);
    var stock    = parseFloat(document.getElementById('currentStock').value);
    var unitCost = parseFloat(document.getElementById('unitCost').value);
    var lead     = parseFloat(document.getElementById('leadTime').value);

    if (isNaN(daily) || isNaN(stock) || isNaN(unitCost) || isNaN(lead)) {
      showErr('商品名以外のすべての項目を入力してください');
      return;
    }
    if (daily < 0 || stock < 0 || unitCost <= 0 || lead < 1) {
      showErr('入力値を確認してください（仕入れ単価は1以上、他は0以上）');
      return;
    }

    // 適正在庫 = リードタイム中の販売数 + 安全在庫
    var safetyStock   = daily * SAFETY_DAYS;
    var leadStock     = daily * lead;
    var optimalStock  = leadStock + safetyStock;

    // 過剰在庫数
    var excessStock   = Math.max(0, stock - optimalStock);

    // 最適発注量（次回）= 適正在庫量と同量を補充の目安
    var optimalOrder  = optimalStock;

    // 過剰在庫の年間保管コスト
    var excessLoss    = excessStock * unitCost * HOLDING_RATE;

    // 判定
    var level, eval_, note, action;
    if (excessStock === 0) {
      level  = 'ok';
      eval_  = '在庫は適正範囲内です';
      note   = '過剰在庫はありません。現在の発注ペースを維持してください。';
      action = '次回の発注量の目安：' + Math.ceil(optimalOrder) + '個（リードタイム分＋安全在庫）';
    } else if (excessStock <= optimalStock * 0.5) {
      level  = 'warn';
      eval_  = '在庫がやや過剰です';
      note   = name + 'の在庫が適正水準を' + Math.round(excessStock) + '個上回っています。次回の発注を減らすことを検討してください。';
      action = '過剰分を消化してから発注を再開する目安：約' + (daily > 0 ? Math.ceil(excessStock / daily) : '—') + '日後';
    } else {
      level  = 'ng';
      eval_  = '過剰在庫が深刻です';
      note   = name + 'の在庫が適正水準を' + Math.round(excessStock) + '個大幅に上回っています。年間' + fmt(excessLoss) + '円の保管コストが発生します。';
      action = '早急な対策が必要です。値引き販売・他店移送・発注停止を検討してください。';
    }

    showResult(level, fmt(excessLoss) + ' 円/年', eval_, note);
    showDetail([
      ['日次販売数',       daily.toLocaleString('ja-JP') + ' 個/日'],
      ['リードタイム',     lead + ' 日'],
      ['安全在庫（3日分）', Math.ceil(safetyStock) + ' 個'],
      ['適正在庫数',       Math.ceil(optimalStock) + ' 個'],
      ['現在の在庫数',     Math.round(stock) + ' 個'],
      ['過剰在庫数',       Math.round(excessStock) + ' 個', excessStock > 0],
      ['仕入れ単価',       fmt(unitCost) + ' 円/個'],
      ['過剰在庫の年間損失', fmt(excessLoss) + ' 円', true],
      ['推奨発注量（目安）', Math.ceil(optimalOrder) + ' 個'],
    ]);
    showAction(action);

    // localStorage に保存
    localStorage.setItem('zaiko-sim', JSON.stringify({
      name: name, daily: daily, stock: stock, unitCost: unitCost, lead: lead
    }));
  }

  function showResult(level, val, eval_, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = eval_;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }
  function showAction(text) {
    var box = document.getElementById('actionBox');
    document.getElementById('actionText').textContent = text;
    box.style.display = 'block';
  }
  function showErr(msg) {
    showResult('ng', '⚠️', msg, '');
    document.getElementById('detail').style.display = 'none';
    document.getElementById('actionBox').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  // 起動時に localStorage を読み込む
  (function() {
    var saved = localStorage.getItem('zaiko-sim');
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      if (d.name)     document.getElementById('productName').value = d.name;
      if (d.daily != null)    document.getElementById('dailySales').value   = d.daily;
      if (d.stock != null)    document.getElementById('currentStock').value  = d.stock;
      if (d.unitCost != null) document.getElementById('unitCost').value      = d.unitCost;
      if (d.lead != null)     document.getElementById('leadTime').value       = d.lead;
    } catch(e) {}
  })();
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
