<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>変動金利リスクシミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── シナリオテーブル ── */
    .scenario-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .scenario-table th {
      background: var(--accent-light); color: var(--accent);
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 0.5rem 0.4rem; text-align: center; border-bottom: 2px solid var(--accent);
    }
    .scenario-table td {
      padding: 0.52rem 0.4rem; text-align: right; border-bottom: 1px solid var(--border);
    }
    .scenario-table td:first-child { text-align: center; font-weight: 700; color: var(--accent); }
    .scenario-table tr:last-child td { border-bottom: none; }
    .scenario-table tr.current-row td { background: var(--ok-bg); color: var(--ok); font-weight: 700; }
    .scenario-table .inc { color: var(--ng); font-weight: 700; }
    .scenario-table .inc-high { color: var(--ng); font-weight: 900; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>変動金利リスクシミュレーター</h1>
    <p class="subtitle">金利が上がると月返済額は何円増える？</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">ローン情報を入力</p>
    <div class="field">
      <label for="balance">現在のローン残高（万円）</label>
      <input type="number" id="balance" placeholder="例: 2500" min="0" step="1">
      <p class="hint">残っているローン元本（万円単位）</p>
    </div>
    <div class="field">
      <label for="rate">現行の年利（%）</label>
      <input type="number" id="rate" placeholder="例: 0.5" min="0" step="0.1">
      <p class="hint">現在適用されている変動金利（年率%）</p>
    </div>
    <div class="field">
      <label for="months">残り返済月数（ヶ月）</label>
      <input type="number" id="months" placeholder="例: 300" min="1" step="1">
      <p class="hint">例：残り25年 → 300ヶ月</p>
    </div>
    <div class="field">
      <label for="rise">想定金利上昇幅（%）</label>
      <input type="number" id="rise" placeholder="例: 1.0" min="0" step="0.1">
      <p class="hint">金利がこの幅だけ上がった場合をシミュレーション</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">シミュレーションする</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">月返済額の増加額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <!-- シナリオ比較カード -->
  <div class="card" id="scenario-card" style="display:none">
    <p class="card-title">金利上昇シナリオ比較</p>
    <table class="scenario-table">
      <thead>
        <tr>
          <th>上昇幅</th>
          <th>適用金利</th>
          <th>月返済額</th>
          <th>増加額</th>
          <th>年間増加</th>
        </tr>
      </thead>
      <tbody id="sb"></tbody>
    </table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var SCENARIOS = [0, 0.5, 1.0, 1.5, 2.0, 3.0];

  /* 元利均等返済の月返済額を計算 */
  function monthlyPayment(principal, annualRate, months) {
    if (annualRate === 0) return principal / months;
    var r = annualRate / 100 / 12;
    return principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function fmtDec(n, d) { return n.toFixed(d); }

  function calc() {
    var balance  = parseFloat(document.getElementById('balance').value);
    var rate     = parseFloat(document.getElementById('rate').value);
    var months   = parseInt(document.getElementById('months').value, 10);
    var rise     = parseFloat(document.getElementById('rise').value);

    if (isNaN(balance) || isNaN(rate) || isNaN(months) || isNaN(rise)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (balance <= 0 || months <= 0) {
      showErr('残高・月数は正の値を入力してください');
      return;
    }

    var principal = balance * 10000; // 万円→円
    var newRate   = rate + rise;
    var basePay   = monthlyPayment(principal, rate, months);
    var newPay    = monthlyPayment(principal, newRate, months);
    var diff      = newPay - basePay;
    var yearDiff  = diff * 12;

    // 増加額の深刻度判定
    var level;
    if (diff < 5000)       level = 'ok';
    else if (diff < 20000) level = 'warn';
    else                   level = 'ng';

    var note = '月' + fmt(Math.round(diff)) + '円増（年間 +' + fmt(Math.round(yearDiff)) + '円）\n'
             + '現行金利 ' + fmtDec(rate, 2) + '% → 上昇後 ' + fmtDec(newRate, 2) + '%';

    showResult(level, '+' + fmt(Math.round(diff)) + ' 円/月', note);

    showDetail([
      ['ローン残高',     fmt(balance) + ' 万円'],
      ['現行金利（年）',  fmtDec(rate, 2) + ' %'],
      ['残り返済月数',    months + ' ヶ月'],
      ['現在の月返済額',  fmt(Math.round(basePay)) + ' 円'],
      ['上昇後の金利',   fmtDec(newRate, 2) + ' %'],
      ['上昇後の月返済額', fmt(Math.round(newPay)) + ' 円'],
      ['月返済額の増加', '+' + fmt(Math.round(diff)) + ' 円', true],
      ['年間増加額',     '+' + fmt(Math.round(yearDiff)) + ' 円'],
    ]);

    showScenarios(principal, rate, months, basePay, rise);
    saveInput(balance, rate, months, rise);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showScenarios(principal, baseRate, months, basePay, selectedRise) {
    var html = '';
    SCENARIOS.forEach(function(s) {
      var newRate = baseRate + s;
      var pay     = monthlyPayment(principal, newRate, months);
      var diff    = pay - basePay;
      var yearD   = diff * 12;
      var isCurrent = (s === 0);
      var isSelected = (!isCurrent && Math.abs(s - selectedRise) < 0.001);
      var cls = isCurrent ? 'current-row' : '';
      var incCls = diff >= 20000 ? 'inc-high' : 'inc';
      html += '<tr class="' + cls + '">'
            + '<td>' + (s === 0 ? '現状' : '+' + fmtDec(s, 1) + '%') + '</td>'
            + '<td>' + fmtDec(newRate, 2) + '%</td>'
            + '<td>' + fmt(Math.round(pay)) + '円</td>'
            + '<td class="' + (isCurrent ? '' : incCls) + '">'
              + (isCurrent ? '—' : '+' + fmt(Math.round(diff)) + '円') + '</td>'
            + '<td class="' + (isCurrent ? '' : incCls) + '">'
              + (isCurrent ? '—' : '+' + fmt(Math.round(yearD)) + '円') + '</td>'
            + '</tr>';
    });
    document.getElementById('sb').innerHTML = html;
    document.getElementById('scenario-card').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('scenario-card').style.display = 'none';
  }

  function saveInput(balance, rate, months, rise) {
    try {
      localStorage.setItem('vr_balance', balance);
      localStorage.setItem('vr_rate', rate);
      localStorage.setItem('vr_months', months);
      localStorage.setItem('vr_rise', rise);
    } catch(e) {}
  }

  function loadInput() {
    try {
      var b = localStorage.getItem('vr_balance');
      var r = localStorage.getItem('vr_rate');
      var m = localStorage.getItem('vr_months');
      var ri = localStorage.getItem('vr_rise');
      if (b) document.getElementById('balance').value = b;
      if (r) document.getElementById('rate').value = r;
      if (m) document.getElementById('months').value = m;
      if (ri) document.getElementById('rise').value = ri;
    } catch(e) {}
  }

  loadInput();
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
