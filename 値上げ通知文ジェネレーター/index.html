<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げ通知文ジェネレーター</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>値上げ通知文ジェネレーター</h1>
      <p class="subtitle">入力して「生成」を押すだけで通知文が完成します</p>
    </header>

    <section class="form-section">
      <h2>入力情報</h2>

      <div class="form-group">
        <label for="sender">差出人（会社名・氏名）</label>
        <input type="text" id="sender" placeholder="例：株式会社○○　営業部　田中">
      </div>

      <div class="form-group">
        <label for="recipient">取引先名</label>
        <input type="text" id="recipient" placeholder="例：△△株式会社　ご担当者様">
      </div>

      <div class="form-group">
        <label for="item">対象品目・サービス名</label>
        <input type="text" id="item" placeholder="例：○○製品、△△サービス">
      </div>

      <div class="form-group">
        <label for="reason">値上げ理由</label>
        <textarea id="reason" rows="3" placeholder="例：原材料費の高騰、エネルギーコストの大幅な上昇"></textarea>
      </div>

      <div class="form-group">
        <label>値上げ内容</label>
        <div class="price-type-row">
          <label class="radio-label">
            <input type="radio" name="priceType" value="amount" checked> 金額
          </label>
          <label class="radio-label">
            <input type="radio" name="priceType" value="rate"> 率（%）
          </label>
        </div>
        <div id="amountInput" class="price-detail">
          <input type="text" id="currentPrice" placeholder="現行価格（例：10,000円）">
          <span class="arrow">→</span>
          <input type="text" id="newPrice" placeholder="新価格（例：11,500円）">
        </div>
        <div id="rateInput" class="price-detail hidden">
          <input type="number" id="rateValue" min="0" max="100" placeholder="値上げ率（例：15）">
          <span class="unit">%</span>
        </div>
      </div>

      <div class="form-group">
        <label for="effectiveDate">値上げ実施日</label>
        <input type="date" id="effectiveDate">
      </div>

      <div class="form-group">
        <label for="extra">補足事項（任意）</label>
        <textarea id="extra" rows="2" placeholder="例：詳細は別添の資料をご参照ください。"></textarea>
      </div>

      <button class="btn-generate" id="generateBtn">通知文を生成する</button>
    </section>

    <section class="result-section hidden" id="resultSection">
      <div class="result-header">
        <h2>生成された通知文</h2>
        <button class="btn-copy" id="copyBtn">コピーする</button>
      </div>
      <div class="result-box" id="resultText"></div>
      <div class="copy-feedback hidden" id="copyFeedback">コピーしました！</div>
    </section>

    <button class="btn-clear" id="clearBtn">入力をリセット</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
