<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人件費最適化チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>人件費最適化チェッカー</h1>
    <p class="subtitle">離職時の採用コスト vs 時給アップコストを比較して最適な判断をサポートします</p>

    <div class="grid">
      <!-- 採用・育成コスト -->
      <section class="card">
        <h2>📋 採用・育成コスト（離職した場合）</h2>
        <div class="input-group">
          <label>求人広告費（円）</label>
          <input type="number" id="recruitCost" min="0" placeholder="例: 100000">
        </div>
        <div class="input-group">
          <label>採用担当の工数コスト（円）</label>
          <input type="number" id="hrCost" min="0" placeholder="例: 50000">
        </div>
        <div class="input-group">
          <label>研修・OJTコスト（円）</label>
          <input type="number" id="trainingCost" min="0" placeholder="例: 80000">
        </div>
        <div class="input-group">
          <label>引き継ぎ期間の生産性低下コスト（円）</label>
          <input type="number" id="handoverCost" min="0" placeholder="例: 60000">
        </div>
        <div class="input-group">
          <label>その他コスト（円）</label>
          <input type="number" id="otherHireCost" min="0" placeholder="例: 20000">
        </div>
        <div class="total-display">
          採用・育成コスト合計：<strong id="hireTotalDisplay">0</strong> 円
        </div>
      </section>

      <!-- 時給アップコスト -->
      <section class="card">
        <h2>💰 時給アップコスト（引き留めた場合）</h2>
        <div class="input-group">
          <label>現在の時給（円）</label>
          <input type="number" id="currentWage" min="0" placeholder="例: 1100">
        </div>
        <div class="input-group">
          <label>時給アップ幅（円）</label>
          <input type="number" id="wageIncrease" min="0" placeholder="例: 100">
        </div>
        <div class="input-group">
          <label>月間労働時間（時間）</label>
          <input type="number" id="monthlyHours" min="0" placeholder="例: 160">
        </div>
        <div class="input-group">
          <label>比較する期間（ヶ月）</label>
          <input type="number" id="months" min="1" value="12" placeholder="例: 12">
        </div>
        <div class="total-display">
          時給アップコスト合計：<strong id="wageTotalDisplay">0</strong> 円
        </div>
        <p class="note">※ 時給アップ分 × 月間労働時間 × 期間</p>
      </section>
    </div>

    <div class="actions">
      <button id="calcBtn" class="btn-primary">比較・判定する</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>

    <!-- 比較結果 -->
    <section id="resultSection" class="result-section hidden">
      <h2>📊 比較結果</h2>
      <div class="result-grid">
        <div class="result-box">
          <div class="result-label">採用・育成コスト</div>
          <div class="result-value" id="hireResult">0 円</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="result-box">
          <div class="result-label">時給アップコスト（<span id="resultMonths">12</span>ヶ月）</div>
          <div class="result-value" id="wageResult">0 円</div>
        </div>
      </div>

      <div id="judgement" class="judgement"></div>

      <div class="detail-box">
        <h3>詳細</h3>
        <table class="detail-table">
          <tr><td>採用・育成コスト</td><td id="d_hire">0 円</td></tr>
          <tr><td>時給アップ分（月）</td><td id="d_wageMonthly">0 円/月</td></tr>
          <tr><td>時給アップ総額（<span id="d_months">12</span>ヶ月）</td><td id="d_wageTotal">0 円</td></tr>
          <tr><td>差額</td><td id="d_diff">0 円</td></tr>
          <tr><td>採用コスト回収月数</td><td id="d_breakeven">－</td></tr>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
