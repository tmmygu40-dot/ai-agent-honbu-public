<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社保コスト影響チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* 2列入力 */
    .field-row { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
    .field-row .field { margin-bottom: 0; flex: 1; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .sep td { font-weight: 700; color: var(--text); background: var(--bg); font-size: 0.78rem; letter-spacing: 0.04em; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>

  <header class="app-header">
    <h1>社保コスト影響チェッカー</h1>
    <p class="subtitle">社会保険料改定後の会社負担増を人数別に即確認<br><span style="font-size:0.85em;color:#666;">※2026年度料率の目安。料率は毎年4月に見直されるため、最新値は協会けんぽ・日本年金機構の公表をご確認ください（毎年4月レビュー対象）。</span></p>
  </header>

  <!-- 基本情報 -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field-row">
      <div class="field">
        <label for="emp">従業員人数（人）</label>
        <input type="number" id="emp" placeholder="例: 10" min="1">
      </div>
      <div class="field">
        <label for="salary">平均月給（万円）</label>
        <input type="number" id="salary" placeholder="例: 30" min="1" step="0.1">
        <p class="hint">額面（標準報酬月額）</p>
      </div>
    </div>
  </div>

  <!-- 健康保険 -->
  <div class="card">
    <p class="card-title">健康保険料率（労使折半）</p>
    <div class="field-row">
      <div class="field">
        <label for="hi_before">改定前（%）</label>
        <input type="number" id="hi_before" placeholder="例: 10.00" step="0.01" min="0" max="30">
        <p class="hint">例：協会けんぽ東京10.00%</p>
      </div>
      <div class="field">
        <label for="hi_after">改定後（%）</label>
        <input type="number" id="hi_after" placeholder="例: 10.50" step="0.01" min="0" max="30">
        <p class="hint">2026年度改定後の率（目安・毎年4月レビュー対象）</p>
      </div>
    </div>
  </div>

  <!-- 厚生年金 -->
  <div class="card">
    <p class="card-title">厚生年金保険料率（労使折半）</p>
    <div class="field-row">
      <div class="field">
        <label for="ep_before">改定前（%）</label>
        <input type="number" id="ep_before" placeholder="例: 18.30" step="0.01" min="0" max="30">
        <p class="hint">現行18.30%（固定）</p>
      </div>
      <div class="field">
        <label for="ep_after">改定後（%）</label>
        <input type="number" id="ep_after" placeholder="例: 18.30" step="0.01" min="0" max="30">
        <p class="hint">変更がなければ同率</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">会社負担増加額を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">月間・会社負担増加額（合計）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'shahoCheck_v1';

  function calc() {
    var emp       = parseFloat(document.getElementById('emp').value);
    var salary    = parseFloat(document.getElementById('salary').value);
    var hi_b      = parseFloat(document.getElementById('hi_before').value);
    var hi_a      = parseFloat(document.getElementById('hi_after').value);
    var ep_b      = parseFloat(document.getElementById('ep_before').value);
    var ep_a      = parseFloat(document.getElementById('ep_after').value);

    if ([emp, salary, hi_b, hi_a, ep_b, ep_a].some(isNaN)) {
      showErr('すべての項目を入力してください');
      return;
    }
    if (emp < 1 || salary <= 0) {
      showErr('人数・給与に正の値を入力してください');
      return;
    }

    var salaryYen = salary * 10000; // 万円→円

    // 会社負担 = 総給与 × 料率 / 2 / 100（労使折半）
    var totalSalary = emp * salaryYen;

    var hi_before_comp  = totalSalary * hi_b / 2 / 100;
    var hi_after_comp   = totalSalary * hi_a / 2 / 100;
    var ep_before_comp  = totalSalary * ep_b / 2 / 100;
    var ep_after_comp   = totalSalary * ep_a / 2 / 100;

    var before_total = hi_before_comp + ep_before_comp;
    var after_total  = hi_after_comp  + ep_after_comp;

    var diff_month   = after_total - before_total;
    var diff_year    = diff_month * 12;

    // 判定：月増加額 / 月給与総額
    var ratio = diff_month / totalSalary;
    var level, msg;
    if (diff_month <= 0) {
      level = 'ok';
      msg = '社保コストの増加はありません。';
    } else if (ratio < 0.005) {
      level = 'ok';
      msg = '増加は軽微です（給与総額の ' + (ratio * 100).toFixed(2) + '%）。';
    } else if (ratio < 0.01) {
      level = 'warn';
      msg = '一定の負担増です（給与総額の ' + (ratio * 100).toFixed(2) + '%）。予算計画への反映を検討してください。';
    } else {
      level = 'ng';
      msg = '負担増が大きいです（給与総額の ' + (ratio * 100).toFixed(2) + '%）。経費計画の見直しが必要です。';
    }

    // 結果表示
    showResult(level, '月 +' + fmt(diff_month) + ' 円', msg + '\n年間では +' + fmt(diff_year) + ' 円の増加。');

    showDetail([
      ['sep', '改定前（月次）', ''],
      ['',    '健康保険　会社負担',  fmt(hi_before_comp) + ' 円'],
      ['',    '厚生年金　会社負担',  fmt(ep_before_comp) + ' 円'],
      ['hl',  '改定前　合計',         fmt(before_total)   + ' 円'],
      ['sep', '改定後（月次）', ''],
      ['',    '健康保険　会社負担',  fmt(hi_after_comp)  + ' 円'],
      ['',    '厚生年金　会社負担',  fmt(ep_after_comp)  + ' 円'],
      ['hl',  '改定後　合計',         fmt(after_total)    + ' 円'],
      ['sep', '増加分', ''],
      ['hl',  '月間増加額',           '+' + fmt(diff_month) + ' 円'],
      ['hl',  '年間増加額',           '+' + fmt(diff_year)  + ' 円'],
      ['',    '従業員1人あたり（月）', '+' + fmt(diff_month / emp) + ' 円'],
    ]);

    // localStorage保存
    saveData(emp, salary, hi_b, hi_a, ep_b, ep_a);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      if (r[0] === 'sep') {
        return '<tr class="sep"><td colspan="2">' + r[1] + '</td></tr>';
      }
      return '<tr' + (r[0] === 'hl' ? ' class="hl"' : '') + '>'
           + '<td>' + r[1] + '</td><td>' + r[2] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    showResult('ng', '⚠️', msg);
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) {
    return Math.round(n).toLocaleString('ja-JP');
  }

  function saveData(emp, salary, hi_b, hi_a, ep_b, ep_a) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ emp: emp, salary: salary, hi_b: hi_b, hi_a: hi_a, ep_b: ep_b, ep_a: ep_a }));
    } catch(e) {}
  }

  function loadData() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (!d) return;
      document.getElementById('emp').value       = d.emp;
      document.getElementById('salary').value    = d.salary;
      document.getElementById('hi_before').value = d.hi_b;
      document.getElementById('hi_after').value  = d.hi_a;
      document.getElementById('ep_before').value = d.ep_b;
      document.getElementById('ep_after').value  = d.ep_a;
    } catch(e) {}
  }

  loadData();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
