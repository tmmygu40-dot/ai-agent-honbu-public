<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欠品記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E6%AC%A0%E5%93%81%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="欠品記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"欠品記録","description":"欠品記録。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E6%AC%A0%E5%93%81%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>欠品記録</h1>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
      <span id="badge" class="badge hidden">0</span>
    </header>

    <section class="form-section">
      <div class="form-group">
        <input type="text" id="itemName" placeholder="品名（必須）" maxlength="50">
      </div>
      <div class="form-group">
        <input type="text" id="itemLocation" placeholder="場所（例：1番通路・冷蔵コーナー）" maxlength="50">
      </div>
      <div class="form-group">
        <input type="text" id="itemMemo" placeholder="メモ（任意）" maxlength="100">
      </div>
      <button id="addBtn" onclick="addItem()">欠品を登録</button>
    </section>

    <section class="filter-section">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">未補充</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">補充済み</button>
    </section>

    <ul id="itemList"></ul>

    <p id="emptyMsg" class="empty-msg">登録されている欠品はありません</p>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
