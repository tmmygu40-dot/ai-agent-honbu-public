<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欠品記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>欠品記録</h1>
      <span id="badge" class="badge hidden">0</span>
    </header>

    <section class="form-section">
      <div class="form-group">
        <input type="text" id="itemName" placeholder="品名（必須）" maxlength="50">
      </div>
      <div class="form-group">
        <input type="text" id="itemLocation" placeholder="場所（例：1番通路・冷蔵コーナー）" maxlength="50">
      </div>
      <div class="form-group">
        <input type="text" id="itemMemo" placeholder="メモ（任意）" maxlength="100">
      </div>
      <button id="addBtn" onclick="addItem()">欠品を登録</button>
    </section>

    <section class="filter-section">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">未補充</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">補充済み</button>
    </section>

    <ul id="itemList"></ul>

    <p id="emptyMsg" class="empty-msg">登録されている欠品はありません</p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
