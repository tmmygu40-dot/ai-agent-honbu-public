<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="月曜の朝、なんとなくダルい…そんな状態を3問で診断。元気・ふつう・ガチダルの3タイプに分け、すぐ試せる回復アクションを提案します。週始まりのメンタルリセットに。">
  <title>月曜ダル診断｜3問で月曜メンタル復活アクション</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.45; }
    .opt {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; margin-bottom: 0.4rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); cursor: pointer; user-select: none;
      transition: border-color 0.1s, background 0.1s;
    }
    .opt:last-child { margin-bottom: 0; }
    .opt input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt-text { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"]:checked ~ .opt-text { font-weight: 700; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-emoji-big { font-size: 3rem; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    .action-list { text-align: left; margin-top: 0.4rem; }
    .action-item {
      padding: 0.7rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.55; color: var(--text);
    }
    .action-item:last-child { border-bottom: none; }
    .action-item .num {
      display: inline-block; width: 1.6rem; height: 1.6rem; line-height: 1.6rem;
      text-align: center; border-radius: 50%; background: var(--accent); color: #fff;
      font-weight: 800; font-size: 0.8rem; margin-right: 0.5rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>月曜ダル診断</h1>
    <p class="subtitle">3問でわかる、月曜メンタルと回復アクション</p>
  </header>

  <div class="card">
    <p class="card-title">3問チェック</p>

    <div class="q-block">
      <p class="q-text">Q1. 今朝の起き心地は？</p>
      <label class="opt"><input type="radio" name="q1" value="1"><span class="opt-text">スッキリ起きられた</span></label>
      <label class="opt"><input type="radio" name="q1" value="2"><span class="opt-text">まあいつも通り</span></label>
      <label class="opt"><input type="radio" name="q1" value="3"><span class="opt-text">布団から出たくなかった</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q2. 仕事・学校のことを考えると？</p>
      <label class="opt"><input type="radio" name="q2" value="1"><span class="opt-text">わりとやる気がある</span></label>
      <label class="opt"><input type="radio" name="q2" value="2"><span class="opt-text">まあやるかという感じ</span></label>
      <label class="opt"><input type="radio" name="q2" value="3"><span class="opt-text">正直、逃げ出したい</span></label>
    </div>

    <div class="q-block">
      <p class="q-text">Q3. 体の重さ・だるさは？</p>
      <label class="opt"><input type="radio" name="q3" value="1"><span class="opt-text">軽い・ふつうに動ける</span></label>
      <label class="opt"><input type="radio" name="q3" value="2"><span class="opt-text">少し重いかな…</span></label>
      <label class="opt"><input type="radio" name="q3" value="3"><span class="opt-text">鉛が入ったみたいに重い</span></label>
    </div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-emoji-big" id="re">—</p>
    <p class="result-label">あなたの月曜タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="action-card" style="display:none">
    <p class="card-title">今すぐできる回復アクション</p>
    <div class="action-list" id="al"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・内閣府などの公的機関が公開するメンタルヘルス・睡眠関連の一般情報を参考に、個人で気軽に試せる目安として整理しています。気分の落ち込みが続く場合は専門家にご相談ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var TYPES = {
    ok: {
      emoji: '😎',
      label: '元気タイプ',
      note: '月曜なのに調子が良い、いいスタート！この勢いを維持していこう。',
      actions: [
        '今のうちに今週の優先タスクを3つだけ書き出しておく',
        '好きな曲を1曲かけて、本格始動の合図にする',
        '昼休みに5分だけ外の空気を吸って気分を維持する'
      ]
    },
    warn: {
      emoji: '☕',
      label: 'ふつうダルタイプ',
      note: 'ちょっと重いけど大丈夫。まずカンタンに動き出すのがコツ。',
      actions: [
        'コーヒーか温かい飲み物を1杯飲んで、5分だけ机周りを片付ける',
        '一番ハードルの低いタスクから手をつけて、エンジンをかける',
        '午前中に1回、立ち上がって肩を回すストレッチをする'
      ]
    },
    ng: {
      emoji: '😩',
      label: 'ガチダルタイプ',
      note: 'かなり重い月曜。いきなり全力ではなく、ハードル超低めから。',
      actions: [
        'まず深呼吸を3回して、コップ1杯の水を飲む',
        '今日のTODOを「1個だけ」紙やメモに書く（多くしない）',
        '昼休みに5分だけ屋外に出て光を浴びる'
      ]
    }
  };

  function diagnose() {
    var q1 = document.querySelector('input[name="q1"]:checked');
    var q2 = document.querySelector('input[name="q2"]:checked');
    var q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
      showErr('3問すべてに答えてください');
      return;
    }

    var sum = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value);
    var level = sum <= 4 ? 'ok' : sum <= 6 ? 'warn' : 'ng';
    var t = TYPES[level];

    showResult(level, t.emoji, t.label, t.note);
    showActions(t.actions);
    saveLast(level, sum);
  }

  function showResult(level, emoji, label, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('re').textContent = emoji;
    document.getElementById('rv').textContent = label;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  function showActions(actions) {
    var al = document.getElementById('al');
    al.innerHTML = actions.map(function(a, i) {
      return '<div class="action-item"><span class="num">' + (i+1) + '</span>' + a + '</div>';
    }).join('');
    document.getElementById('action-card').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('re').textContent = '⚠️';
    document.getElementById('rv').textContent = '入力不足';
    document.getElementById('rn').textContent = msg;
    document.getElementById('action-card').style.display = 'none';
  }

  function saveLast(level, sum) {
    try {
      localStorage.setItem('monday_dull_last', JSON.stringify({
        level: level, sum: sum, date: new Date().toISOString()
      }));
    } catch(e) {}
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
