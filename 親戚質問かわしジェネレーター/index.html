<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>親戚質問かわしジェネレーター｜GW・お盆・正月の気まずい質問を3秒でかわす返し文メーカー</title>
  <meta name="description" content="親戚の集まりで聞かれる「結婚は？子どもは？年収は？」をやんわり・ユーモア・きっぱりの3パターンでかわす返し文を即生成。GW・お盆・年末年始の気まずさを救う無料ツール。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .reply-item {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.8rem;
    }
    .reply-item:last-child { margin-bottom: 0; }
    .reply-tone {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); background: #fff;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      border: 1px solid var(--border);
      margin-bottom: 0.5rem;
    }
    .reply-text {
      font-size: 0.98rem; line-height: 1.65; color: var(--text);
      margin-bottom: 0.7rem;
    }
    .copy-btn {
      display: inline-block; padding: 0.4rem 0.9rem;
      font-size: 0.8rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 8px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--ok); border-color: var(--ok); color: #fff; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>親戚質問かわしジェネレーター</h1>
    <p class="subtitle">GW・お盆・年末年始のあの質問を、やんわり・ユーモア・きっぱりの3パターンでサッとかわす</p>
  </header>

  <div class="card">
    <p class="card-title">質問を選ぶ</p>
    <div class="field">
      <label for="q">よく聞かれる質問</label>
      <select id="q">
        <option value="kekkon">結婚はまだなの？／いつするの？</option>
        <option value="kodomo">子どもはまだ？／2人目は？</option>
        <option value="shigoto">仕事は？／給料いくら？</option>
        <option value="house">家はいつ買うの？</option>
        <option value="taikei">太った？／痩せた？</option>
        <option value="kyoudai">お兄ちゃん／妹はすごいのに…</option>
        <option value="renai">彼氏／彼女はいるの？</option>
        <option value="shingaku">受験どこ？／就職どこ？</option>
        <option value="roukai">親の介護どうするの？</option>
        <option value="otoshidama">お年玉／結婚祝いはまだ？</option>
        <option value="seiji">最近の若者は…／政治の話</option>
        <option value="ryouri">料理できるの？／家事は誰が？</option>
      </select>
      <p class="hint">気まずい質問を選んで「返しを生成」を押すだけ</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">返しを生成する</button>

  <div class="card" id="result-card" style="display:none">
    <p class="card-title">3パターンの返し文</p>
    <div id="reply-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💬 このツールは、親戚付き合い・コミュニケーション関連の一般的な会話例を参考に、角を立てずに会話をかわす言い回しを整理しています。深刻な家族トラブルは公的相談窓口（よりそいホットライン等）もご検討ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var REPLIES = {
    kekkon: [
      { tone: 'やんわり', text: 'そうですねー、ご縁があればって感じです。今は仕事とか自分のことで結構いっぱいで。叔父さん／叔母さんの頃ってどうでした？' },
      { tone: 'ユーモア', text: 'いやー、相手募集中ですよ！もし良い人いたら紹介してください（笑）でも条件うるさいって有名なんで、期待しないでくださいね。' },
      { tone: 'きっぱり', text: '結婚については自分のタイミングで考えてるので大丈夫です。心配してくれてありがとうございます。今日はお料理いただきますね。' }
    ],
    kodomo: [
      { tone: 'やんわり', text: '授かりものなので、こればっかりはなんとも…。気にかけてくれてありがとうございます。今日のお料理おいしいですね！' },
      { tone: 'ユーモア', text: '今うちには「四つ足の子ども（猫／犬）」がいて、これがまた手がかかるんですよー！夜泣きならぬ夜鳴きで（笑）' },
      { tone: 'きっぱり', text: '夫婦で話し合って決めていることなので、その話題はちょっと…。お気持ちだけありがたく受け取りますね。' }
    ],
    shigoto: [
      { tone: 'やんわり', text: 'まあ普通にやってますよー。最近は◯◯（業界ニュース等）も色々あって大変ですけど。叔父さんのお仕事は最近どうですか？' },
      { tone: 'ユーモア', text: '給料？聞かないでください、財布が泣いちゃいます（笑）まあ生きていけるくらいには稼いでます！' },
      { tone: 'きっぱり', text: '収入の話は職場でもあまりしないので、ちょっと答えづらくて。仕事自体は順調にやれてるので大丈夫です。' }
    ],
    house: [
      { tone: 'やんわり', text: '今のところは賃貸が気楽でいいなって感じです。住宅ローンも色々考えると慎重になっちゃって。' },
      { tone: 'ユーモア', text: '宝くじ当たったら即決します！今は「家を買う夢」を見ながら毎週ロト買ってます（笑）' },
      { tone: 'きっぱり', text: '購入は人生で大きな買い物なので、自分たちのペースで判断します。応援してくれるとうれしいです。' }
    ],
    taikei: [
      { tone: 'やんわり', text: 'ですよねー、最近運動不足で…。気をつけたいなとは思ってます。叔母さんスタイル変わらないですよね、秘訣あります？' },
      { tone: 'ユーモア', text: 'いやー、これはね、「貫禄」ってやつですよ（笑）今年の目標はマイナス3kgです、宣言しておきます！' },
      { tone: 'きっぱり', text: '体型のことはちょっとデリケートな話題なんで、別の話にしませんか？最近◯◯にハマってるんですけど…' }
    ],
    kyoudai: [
      { tone: 'やんわり', text: 'お兄ちゃん／妹はすごいですよねー、自分は自分のペースでやってます。それぞれ得意なこと違うので。' },
      { tone: 'ユーモア', text: 'うちの兄／妹は天才肌、私は人間味あふれる凡人タイプなんです（笑）これでバランス取れてるんですよ。' },
      { tone: 'きっぱり', text: '比べられるのはちょっと困っちゃいます。それぞれ違う道を歩いてるので、自分なりに頑張ります。' }
    ],
    renai: [
      { tone: 'やんわり', text: 'うーん、今は仕事と趣味で忙しくて。出会いがあればって感じです。叔父さん叔母さんの馴れ初めって聞いたことなかったですね！' },
      { tone: 'ユーモア', text: '彼氏／彼女より推しに夢中で…！すみません、今そっちに全エネルギー注いでます（笑）' },
      { tone: 'きっぱり', text: 'プライベートな話なので、その話題はちょっと。気にしてくれてありがとうございます。' }
    ],
    shingaku: [
      { tone: 'やんわり', text: 'まだ志望校／会社はいくつか候補がある段階で…。本人と相談しながら決めてる最中です。' },
      { tone: 'ユーモア', text: '「ハーバードかMITで悩み中です」…なんて言ったら盛り上がりますかね（笑）まだ検討中です！' },
      { tone: 'きっぱり', text: '進路は本人の問題なので、決まったら報告しますね。今は応援だけしてもらえるとありがたいです。' }
    ],
    roukai: [
      { tone: 'やんわり', text: 'そうですねー、家族で少しずつ話してる段階です。地域包括支援センターとかも調べ始めてて。' },
      { tone: 'ユーモア', text: 'まだまだ親も元気なんでー！むしろ私のほうが先に介護されそうで怖いです（笑）' },
      { tone: 'きっぱり', text: '介護は家族の中でちゃんと話し合っていくテーマなので、ここで決められる話じゃないんですよ。' }
    ],
    otoshidama: [
      { tone: 'やんわり', text: 'あっごめんなさい、今手持ちなくて…！今度ちゃんとお祝い持ってくるね。何が好き？' },
      { tone: 'ユーモア', text: 'お年玉？大人にもくれます？（笑）今年は私もちょっと景気悪くて…来年に期待してて！' },
      { tone: 'きっぱり', text: 'お祝いごとは自分のタイミングできちんとさせてください。気持ちだけ受け取っておきますね。' }
    ],
    seiji: [
      { tone: 'やんわり', text: 'うーん、私も色々考えるところはあるんですけど、難しい話題ですよね。詳しい人に聞きたいくらいです。' },
      { tone: 'ユーモア', text: '政治と宗教と野球の話は、お酒の席ではしないって父に教わりました（笑）他の話にしましょうよ！' },
      { tone: 'きっぱり', text: '政治の話はそれぞれ意見が違うので、家族の集まりではあまり踏み込みたくないんです。違う話しましょう。' }
    ],
    ryouri: [
      { tone: 'やんわり', text: 'ぼちぼちですよー。最近は便利な調理家電とかミールキットも多いので、なんとかやってます。' },
      { tone: 'ユーモア', text: '私の得意料理ですか？「予約」と「電子レンジ」が三大スキルです（笑）でも家族みんな元気なんで！' },
      { tone: 'きっぱり', text: '家事の分担は家庭内で決めてるので大丈夫です。それぞれの家のやり方ってありますしね。' }
    ]
  };

  function generate() {
    var q = document.getElementById('q').value;
    var list = REPLIES[q];
    if (!list) return;
    try { localStorage.setItem('shinseki_last_q', q); } catch(e) {}
    var html = list.map(function(r, i){
      var safe = r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      return '<div class="reply-item">'
        + '<span class="reply-tone">' + r.tone + '</span>'
        + '<p class="reply-text">' + safe + '</p>'
        + '<button class="copy-btn" data-idx="' + i + '" onclick="copyReply(this,' + i + ')">コピー</button>'
        + '</div>';
    }).join('');
    document.getElementById('reply-list').innerHTML = html;
    document.getElementById('result-card').style.display = 'block';
  }

  function copyReply(btn, idx) {
    var q = document.getElementById('q').value;
    var text = REPLIES[q][idx].text;
    var done = function(){
      btn.textContent = 'コピー済';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function(){ fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
  }

  // 前回選択を復元
  try {
    var last = localStorage.getItem('shinseki_last_q');
    if (last) {
      var sel = document.getElementById('q');
      for (var i=0; i<sel.options.length; i++) {
        if (sel.options[i].value === last) { sel.selectedIndex = i; break; }
      }
    }
  } catch(e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
