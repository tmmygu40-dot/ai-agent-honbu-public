<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インフレ老後資金チェッカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 2カラムグリッド ── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    @media (max-width: 400px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    /* ── 入力 ── */
    .field { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 年別テーブル ── */
    .detail-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .detail-table thead tr { border-bottom: 2px solid var(--border); }
    .detail-table th {
      padding: 0.5rem 0.4rem; text-align: right;
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
    }
    .detail-table th:first-child { text-align: left; }
    .detail-table tbody tr { border-bottom: 1px solid var(--border); }
    .detail-table tbody tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.5rem 0.4rem; text-align: right; color: var(--text-sub); }
    .detail-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
    .detail-table .depleted td { color: var(--ng); font-weight: 700; background: var(--ng-bg); }
    .detail-table .safe-end td { color: var(--ok); font-weight: 700; background: var(--ok-bg); }
    .detail-table .hl td:last-child { color: var(--accent); font-weight: 700; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>インフレ老後資金チェッカー</h1>
    <p class="subtitle">物価上昇を考慮して老後資金の枯渇時期を確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field-grid">
      <div class="field">
        <label for="savings">現在の貯蓄額（万円）</label>
        <input type="number" id="savings" placeholder="例: 2000" min="0">
      </div>
      <div class="field">
        <label for="currentAge">現在の年齢（歳）</label>
        <input type="number" id="currentAge" placeholder="例: 60" min="20" max="100">
      </div>
      <div class="field">
        <label for="retireAge">退職・年金開始年齢（歳）</label>
        <input type="number" id="retireAge" placeholder="例: 65" min="50" max="100">
        <p class="hint">年金受取を始める年齢</p>
      </div>
      <div class="field">
        <label for="lifespan">想定寿命（歳）</label>
        <input type="number" id="lifespan" placeholder="例: 90" min="60" max="120">
      </div>
      <div class="field">
        <label for="monthlyExpense">月の生活費（万円）</label>
        <input type="number" id="monthlyExpense" placeholder="例: 25" min="0" step="0.1">
        <p class="hint">税・保険料含む総支出</p>
      </div>
      <div class="field">
        <label for="pension">年金月額（万円）</label>
        <input type="number" id="pension" placeholder="例: 15" min="0" step="0.1">
        <p class="hint">夫婦合算でも可</p>
      </div>
      <div class="field">
        <label for="inflation">物価上昇率（%/年）</label>
        <input type="number" id="inflation" placeholder="例: 2" step="0.1" min="0" max="20">
        <p class="hint">支出の増加率。年金は固定</p>
      </div>
      <div class="field">
        <label for="preSavings">退職前の年間貯蓄（万円）</label>
        <input type="number" id="preSavings" placeholder="例: 100" min="0" step="1">
        <p class="hint">年金開始前に毎年貯蓄する額</p>
      </div>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">老後資金を試算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label" id="rl">判定</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- 年別推移カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">年別 残高推移</p>
    <div style="overflow-x:auto">
      <table class="detail-table">
        <thead>
          <tr>
            <th>年齢</th>
            <th>年支出</th>
            <th>年金収入</th>
            <th>収支</th>
            <th>残高</th>
          </tr>
        </thead>
        <tbody id="db"></tbody>
      </table>
    </div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'inflate_rougo_v1';

  // ── localStorage 復元 ──
  (function() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
      var d = JSON.parse(saved);
      ['savings','currentAge','retireAge','lifespan','monthlyExpense','pension','inflation','preSavings'].forEach(function(k) {
        if (d[k] !== undefined) document.getElementById(k).value = d[k];
      });
    } catch(e) {}
  })();

  function getVal(id) { return parseFloat(document.getElementById(id).value); }

  function calc() {
    var savings    = getVal('savings');        // 万円
    var curAge     = getVal('currentAge');
    var retireAge  = getVal('retireAge');
    var lifespan   = getVal('lifespan');
    var expense    = getVal('monthlyExpense'); // 万円/月
    var pension    = getVal('pension');        // 万円/月
    var inflation  = getVal('inflation');      // %/年
    var preSave    = getVal('preSavings');     // 万円/年（退職前）

    if ([savings,curAge,retireAge,lifespan,expense,pension,inflation].some(isNaN) || isNaN(preSave)) {
      showErr('すべての項目を入力してください'); return;
    }
    if (curAge >= lifespan) { showErr('想定寿命は現在の年齢より大きくしてください'); return; }
    if (retireAge < curAge) { showErr('退職年齢は現在の年齢以上にしてください'); return; }

    // localStorage 保存
    var inputs = { savings:savings, currentAge:curAge, retireAge:retireAge, lifespan:lifespan,
                   monthlyExpense:expense, pension:pension, inflation:inflation, preSavings:preSave };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(inputs));

    var rate   = inflation / 100;
    var balance = savings;
    var depletedAge = null;
    var rows = [];

    for (var age = curAge; age <= lifespan; age++) {
      var yearsSince = age - curAge;
      var annualExpense = expense * 12 * Math.pow(1 + rate, yearsSince); // 物価上昇後の年支出
      var annualPension = (age >= retireAge) ? pension * 12 : 0;        // 年金は年金開始後
      var annualSave    = (age < retireAge)  ? preSave      : 0;        // 退職前は貯蓄

      var netflow = annualPension + annualSave - annualExpense;
      balance += netflow;

      rows.push({
        age: age,
        expense: annualExpense,
        pension: annualPension,
        netflow: netflow,
        balance: balance
      });

      if (balance <= 0 && depletedAge === null) {
        depletedAge = age;
      }
    }

    // 判定
    var level, heading, mainVal, note;
    var finalBalance = balance;

    if (depletedAge !== null) {
      level   = depletedAge <= (curAge + (lifespan - curAge) * 0.5) ? 'ng' : 'warn';
      heading = '資金枯渇の予測時期';
      mainVal = depletedAge + ' 歳';
      note    = '現在から ' + (depletedAge - curAge) + ' 年後（想定寿命まで ' + (lifespan - depletedAge) + ' 年不足）\n物価上昇率 ' + inflation + '%/年 で試算';
    } else {
      level   = 'ok';
      heading = lifespan + '歳まで 安全';
      mainVal = fmt(Math.round(finalBalance)) + ' 万円残';
      note    = '想定寿命まで資金が持続します\n物価上昇率 ' + inflation + '%/年 で試算';
    }

    // 結論カード表示
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rl').textContent = heading;
    document.getElementById('rv').textContent = mainVal;
    document.getElementById('rn').textContent = note;

    // 年別テーブル
    var tbody = document.getElementById('db');
    tbody.innerHTML = '';
    rows.forEach(function(r) {
      var tr = document.createElement('tr');
      var isDepleted = r.balance <= 0 && (depletedAge !== null && r.age >= depletedAge);
      var isLast     = (depletedAge === null && r.age === lifespan);
      if (isDepleted) tr.className = 'depleted';
      else if (isLast) tr.className = 'safe-end';
      tr.innerHTML =
        '<td>' + r.age + '歳</td>' +
        '<td>' + fmt(Math.round(r.expense)) + '万</td>' +
        '<td>' + fmt(Math.round(r.pension)) + '万</td>' +
        '<td style="color:' + (r.netflow >= 0 ? 'var(--ok)' : 'var(--ng)') + '">' + (r.netflow >= 0 ? '+' : '') + fmt(Math.round(r.netflow)) + '万</td>' +
        '<td>' + fmt(Math.round(r.balance)) + '万</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('detail').style.display = '';

    // スクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rl').textContent = 'エラー';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return n.toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
</body>
</html>
