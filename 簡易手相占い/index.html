<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="手のひらの線を3択から選ぶだけで、あなたの金運と恋愛運が分かる簡易手相占いです。気軽に遊べる占いツール。">
  <title>🖐️ 簡易手相占い</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── リセットボタン ── */
    .btn-reset {
      display: block; margin: 0 auto 1.2rem; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.fortune { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.fortune .result-value { color: var(--ok); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reset, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🖐️ 簡易手相占い</h1>
    <p class="subtitle">手のひらの線を選んで、あなたの運を占ってみよう</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">線を選ぶ</p>
    <div class="field">
      <label for="line1">親指と人差し指の間の線</label>
      <select id="line1">
        <option value="">選んでください</option>
        <option value="straight">スッと一直線</option>
        <option value="curved">緩くカーブしている</option>
        <option value="broken">途中で切れている</option>
      </select>
    </div>
    <div class="field">
      <label for="line2">手のひらの中央を横切る線</label>
      <select id="line2">
        <option value="">選んでください</option>
        <option value="straight">スッと一直線</option>
        <option value="curved">緩くカーブしている</option>
        <option value="broken">途中で切れている</option>
      </select>
    </div>
    <div class="field">
      <label for="line3">頭の上を通る線</label>
      <select id="line3">
        <option value="">選んでください</option>
        <option value="straight">スッと一直線</option>
        <option value="curved">緩くカーブしている</option>
        <option value="broken">途中で切れている</option>
      </select>
    </div>
  </div>

  <!-- 占ボタン -->
  <button class="btn-calc" onclick="fortune()">占う</button>

  <!-- 結果カード（JS で display を切替） -->
  <div class="result-card fortune" id="result">
    <p class="result-label">あなたの運勢</p>
    <p class="result-value" id="fortune-title">—</p>
    <p class="result-note" id="fortune-money"></p>
    <p class="result-note" id="fortune-love" style="margin-top: 0.8rem;"></p>
  </div>

  <button class="btn-reset" id="reset-btn" style="display:none" onclick="reset()">もう一度占う</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    ✨ このツールは娯楽目的の簡易占いです。実際の手相占いより詳しく知りたい方は、専門家にご相談ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 占い結果データ
  var FORTUNES = {
    straight: { money: '金運：大吉', love: '恋愛運：中吉' },
    curved:   { money: '金運：中吉', love: '恋愛運：大吉' },
    broken:   { money: '金運：末吉', love: '恋愛運：末吉' }
  };

  var MESSAGES = {
    straight_money: '安定した経済運。着実に貯蓄が増えそうです。',
    straight_love: '恋は急がず、時間をかけて関係を深めるタイプ。',

    curved_money: 'お金の流れに柔軟。臨機応変な判断で運を掴みます。',
    curved_love: '相手の気持ちを敏感に感じ取る、恋のセンサーが優れています。',

    broken_money: '変化の時期。新しいチャレンジが幸運を呼びます。',
    broken_love: '予想外の出会いが。運命的な瞬間を見逃さないで。'
  };

  var LINE_NAMES = ['line1', 'line2', 'line3'];

  function fortune() {
    var line1 = document.getElementById('line1').value;
    var line2 = document.getElementById('line2').value;
    var line3 = document.getElementById('line3').value;

    if (!line1 || !line2 || !line3) {
      alert('3つの線をすべて選んでください');
      return;
    }

    // localStorage に保存
    localStorage.setItem('fortune_line1', line1);
    localStorage.setItem('fortune_line2', line2);
    localStorage.setItem('fortune_line3', line3);

    // 占い結果を計算
    var moneyFortune = FORTUNES[line1].money;
    var loveFortune = FORTUNES[line2].love;

    var moneyMsg = MESSAGES[line1 + '_money'];
    var loveMsg = MESSAGES[line2 + '_love'];

    // 結果を表示
    document.getElementById('fortune-title').textContent = '✨ あなたの運勢 ✨';
    document.getElementById('fortune-money').textContent = moneyFortune + '\n' + moneyMsg;
    document.getElementById('fortune-love').textContent = loveFortune + '\n' + loveMsg;
    document.getElementById('result').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'block';
  }

  function reset() {
    document.getElementById('line1').value = '';
    document.getElementById('line2').value = '';
    document.getElementById('line3').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    localStorage.removeItem('fortune_line1');
    localStorage.removeItem('fortune_line2');
    localStorage.removeItem('fortune_line3');
  }

  // ページ読み込み時に localStorage から復元
  window.addEventListener('load', function() {
    var line1 = localStorage.getItem('fortune_line1');
    var line2 = localStorage.getItem('fortune_line2');
    var line3 = localStorage.getItem('fortune_line3');

    if (line1 && line2 && line3) {
      document.getElementById('line1').value = line1;
      document.getElementById('line2').value = line2;
      document.getElementById('line3').value = line3;
      fortune();
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
