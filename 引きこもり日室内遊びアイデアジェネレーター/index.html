<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引きこもり日室内遊びアイデアジェネレーター</title>
  <meta name="description" content="ガソリン高で外出を控えたい日に、人数・時間・気分・年齢層を選ぶだけで家で楽しめる室内遊びアイデアを3〜5件提案する無料ツール。家族でも一人でも、退屈な休日のヒントが秒で見つかります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-reroll {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .idea-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.8rem; max-width: 600px;
    }
    .idea-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .idea-title { font-size: 1.05rem; font-weight: 800; color: var(--text); line-height: 1.4; margin-bottom: 0.4rem; }
    .idea-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; margin-bottom: 0.5rem; }
    .idea-need { font-size: 0.78rem; color: var(--text-sub); background: var(--accent-light); padding: 0.4rem 0.6rem; border-radius: 7px; }

    .empty-note {
      text-align: center; padding: 1.5rem; color: var(--text-sub); font-size: 0.9rem;
      max-width: 600px; margin: 0 auto 1rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-reroll, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .idea-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>引きこもり日室内遊びアイデアジェネレーター</h1>
    <p class="subtitle">ガソリン高で外出を控えたい日に、家で楽しめる室内遊びを3〜5件まとめて提案</p>
  </header>

  <div class="card">
    <p class="card-title">条件を選ぶ</p>
    <div class="field">
      <label for="people">人数</label>
      <select id="people">
        <option value="solo">1人</option>
        <option value="pair">2人</option>
        <option value="family">3〜4人（家族）</option>
        <option value="group">5人以上</option>
      </select>
    </div>
    <div class="field">
      <label for="time">使える時間</label>
      <select id="time">
        <option value="short">30分くらい</option>
        <option value="mid">1〜2時間</option>
        <option value="long">半日〜丸一日</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">気分</label>
      <select id="mood">
        <option value="quiet">静かに過ごしたい</option>
        <option value="loud">にぎやかに楽しみたい</option>
        <option value="focus">集中して何かしたい</option>
        <option value="lazy">だらだらしたい</option>
      </select>
    </div>
    <div class="field">
      <label for="age">年齢層</label>
      <select id="age">
        <option value="any">こだわらない</option>
        <option value="kid">子どもがいる</option>
        <option value="adult">大人だけ</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">アイデアを出す</button>

  <div id="result-area"></div>

  <button class="btn-reroll no-print" id="reroll" onclick="generate()" style="display:none">🔄 別のアイデアを出す</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 室内アクティビティの定番や手軽な工作・整理整頓アイデアを編集部独自にまとめた、目安として使いやすい参考集です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── アイデアプール ──
  // p: solo|pair|family|group|any  / tm: short|mid|long|any
  // md: quiet|loud|focus|lazy|any  / ag: any|kid|adult
  var IDEAS = [
    { t: '古い写真をテーマ別にアルバム整理', d: 'スマホやPCに眠った写真を「旅行」「家族」など3テーマだけ抜き出してフォルダ分け。', need: '必要なもの：スマホ／PCのみ', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: '押入れを「いる・いらない・保留」で仕分け', d: '一段だけ全部出して3つの山に分ける。完璧を狙わず1段で達成感。', need: '必要なもの：ゴミ袋・段ボール', p: 'solo', tm: 'long', md: 'focus', ag: 'adult' },
    { t: '引き出し1つだけ完璧整理チャレンジ', d: '対象を1か所に絞って、中身を全部出して→拭く→戻す。短時間でスッキリ。', need: '必要なもの：拭き取りシート', p: 'solo', tm: 'short', md: 'focus', ag: 'any' },
    { t: '紙飛行機の室内飛距離記録会', d: '折り方を変えて何種類か作り、リビングで距離を測る。意外と盛り上がる。', need: '必要なもの：紙・メジャー', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: 'ダンボール秘密基地を作る', d: '通販で残った段ボールをガムテで連結。子どもがその中で1日過ごせる。', need: '必要なもの：段ボール・ガムテープ', p: 'family', tm: 'mid', md: 'loud', ag: 'kid' },
    { t: 'カテゴリ縛りしりとり', d: '「食べ物のみ」「アニメ名のみ」など縛りで難易度UP。罰ゲーム付きが盛り上がる。', need: '必要なもの：声だけ', p: 'group', tm: 'short', md: 'loud', ag: 'any' },
    { t: 'お絵描き伝言ゲーム', d: 'お題を絵で描いて次の人へ。最後にどこまで原型を保つか答え合わせ。', need: '必要なもの：紙・ペン', p: 'group', tm: 'short', md: 'loud', ag: 'any' },
    { t: '紙コップタワー何段挑戦', d: 'ピラミッド状に何段積めるか家族で記録更新。崩れる音が地味に楽しい。', need: '必要なもの：紙コップ多数', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: '毛布で読書テントを作って引きこもり読書', d: '椅子に毛布を被せて簡易テント。中に好きな本と飲み物を持ち込んで2時間こもる。', need: '必要なもの：毛布・本', p: 'solo', tm: 'long', md: 'quiet', ag: 'any' },
    { t: '冷蔵庫の余り物だけで創作料理', d: 'レシピを見ずに今ある食材だけで一品作る。新ジャンルの定番が生まれることも。', need: '必要なもの：冷蔵庫の中身', p: 'pair', tm: 'mid', md: 'focus', ag: 'any' },
    { t: 'ホットケーキミックスで形いろいろおやつ', d: '動物・キャラ・文字など形を工夫して焼く。子どもが食いつく失敗作も含めて全部食べる。', need: '必要なもの：HM・卵・牛乳', p: 'family', tm: 'mid', md: 'loud', ag: 'kid' },
    { t: '半身浴+読書スパで2時間こもる', d: 'お湯ぬるめ＋防水袋でスマホ持ち込み。普段読まないジャンルの電子書籍を試す。', need: '必要なもの：本またはスマホ', p: 'solo', tm: 'mid', md: 'lazy', ag: 'adult' },
    { t: '照明オフでLEDキャンドル夜', d: '部屋の照明を全部消してLEDキャンドルだけで過ごす。会話が自然と落ち着く。', need: '必要なもの：LEDライト・スマホ', p: 'pair', tm: 'long', md: 'lazy', ag: 'adult' },
    { t: '積ん読本を1章だけ読み比べ', d: '5冊くらい買ったまま読んでない本を、最初の1章だけ次々読む。気が乗ったやつを本気読み。', need: '必要なもの：積ん読の本', p: 'solo', tm: 'short', md: 'quiet', ag: 'adult' },
    { t: 'スマホ写真フォルダの大掃除', d: 'スクショ・連写・ブレ写真を1000枚目標で削減。容量がスッキリして気分も軽くなる。', need: '必要なもの：スマホ', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: 'YouTubeを見ながら全身ストレッチ', d: '15分の動画を3本連続で。家族でやると意外な硬さが分かって笑える。', need: '必要なもの：マットや毛布', p: 'family', tm: 'short', md: 'lazy', ag: 'any' },
    { t: 'ジェンガ・ドミノで大規模建設', d: '家中のドミノ・ジェンガを総動員してリビングを横断する大作を作る。', need: '必要なもの：ジェンガ・ドミノ', p: 'family', tm: 'mid', md: 'loud', ag: 'kid' },
    { t: '冷蔵庫食材で縛りクッキング企画', d: '「使う食材5つだけ」など縛りを決めて1食作る。普段の献立にない発見が出る。', need: '必要なもの：冷蔵庫の中身', p: 'family', tm: 'mid', md: 'focus', ag: 'any' },
    { t: '推しのMV・映画を字幕付きで鑑賞', d: '普段は流し見しているコンテンツを字幕ONで見直すと別作品レベルで発見がある。', need: '必要なもの：配信サービス', p: 'solo', tm: 'long', md: 'quiet', ag: 'adult' },
    { t: '紙とペンでマインドマップ作り', d: '最近のモヤモヤを真ん中に書いて枝を伸ばす。書き出すだけでスッキリする系。', need: '必要なもの：紙・ペン', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: '家族写真でフォトブック下準備', d: 'ベスト写真30枚を選ぶだけ。発注は後日でOK、選ぶ作業自体が思い出話タイム。', need: '必要なもの：スマホ・PC', p: 'pair', tm: 'long', md: 'focus', ag: 'adult' },
    { t: '一人カラオケをヘッドホンで', d: 'カラオケアプリ＋ヘッドホン＋小声ボーカル。意外と発散できて運動にもなる。', need: '必要なもの：スマホ・ヘッドホン', p: 'solo', tm: 'short', md: 'loud', ag: 'any' },
    { t: '段ボールでミニチュア工作', d: '理想のリビング・カフェなどを箱庭サイズで作る。集中が止まらなくなる系。', need: '必要なもの：段ボール・カッター', p: 'solo', tm: 'long', md: 'focus', ag: 'any' },
    { t: 'クッションで「ふかふか島」昼寝', d: '家中のクッションを集めてリビングに島を作る。ゴロゴロしながら昼寝が最高。', need: '必要なもの：クッション・毛布', p: 'pair', tm: 'short', md: 'lazy', ag: 'any' },
    { t: '本でブックタワー積み挑戦', d: '崩さずに何段まで積めるか挑戦。ハードカバーが意外と難しい。', need: '必要なもの：本いっぱい', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: '風船バレーボール何回続く選手権', d: '床に落とさず何回続けられるか家族で挑戦。手加減なしで意外と疲れる。', need: '必要なもの：風船', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: '折り紙キャラ交換会', d: '家族それぞれが好きなキャラを折って交換。下手なほど味があって盛り上がる。', need: '必要なもの：折り紙', p: 'family', tm: 'short', md: 'lazy', ag: 'kid' },
    { t: '家中のホコリ取り選手権', d: 'コンセント・幅木・棚の上など普段見ない場所を担当制で。タイム制にすると競技化する。', need: '必要なもの：ハンディモップ', p: 'family', tm: 'short', md: 'focus', ag: 'any' },
    { t: '3か月分のレシート家計簿入力', d: '溜まったレシートを家計簿アプリに一気に入力。何にいくら使ったか可視化されて学びが多い。', need: '必要なもの：レシート・アプリ', p: 'solo', tm: 'long', md: 'focus', ag: 'adult' },
    { t: '不用品を5個だけメルカリ出品', d: '「3年使ってないもの」基準で5個だけ。完璧主義を捨てるのがコツ、写真は1枚でOK。', need: '必要なもの：スマホ・梱包材', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: 'テーマ縛りお絵描き30分', d: '「春」「夢」など1テーマで30分。家族で同テーマを描いて見せ合うと個性が出る。', need: '必要なもの：紙・ペン', p: 'family', tm: 'short', md: 'lazy', ag: 'kid' },
    { t: '観たい映画リスト30本作り', d: '次の引きこもり日に向けて観たい作品を家族で投票しながらリスト化。', need: '必要なもの：スマホ・配信アプリ', p: 'family', tm: 'short', md: 'lazy', ag: 'any' },
    { t: '古い手紙・年賀状をスキャン保存', d: 'スマホアプリでデジタル化して紙は処分。何年も置いてる紙の山が片付く。', need: '必要なもの：スマホ', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: 'アロマで部屋カフェ化', d: 'お気に入りの香り＋好きな音楽＋お茶でカフェ気分。15分でリセットできる。', need: '必要なもの：アロマ・お茶', p: 'solo', tm: 'short', md: 'lazy', ag: 'adult' },
    { t: '紙コップ電話で家の端と端', d: '糸電話を作って家のドア越しに会話。意外とちゃんと聞こえて子どもが食いつく。', need: '必要なもの：紙コップ・たこ糸', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: '段ボール迷路を作って小さい子に通らせる', d: '通販の段ボールでリビングに迷路。作る側も通る側も楽しい。', need: '必要なもの：段ボール多数', p: 'family', tm: 'mid', md: 'loud', ag: 'kid' },
    { t: '本棚を「読みたい順」に並べ替え', d: 'ジャンル順を一旦やめて「次に読みたい順」で配置。本との距離が近くなる。', need: '必要なもの：本棚', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: '3分間瞑想を10セット試す', d: '瞑想アプリで違うガイドを10種類試して自分に合うものを見つける。', need: '必要なもの：スマホ・アプリ', p: 'solo', tm: 'mid', md: 'quiet', ag: 'adult' },
    { t: 'ドアと懐中電灯で影絵シアター', d: '夜にドアを白い面にして手で影絵。スマホライトでも代用可、子どもが大喜び。', need: '必要なもの：懐中電灯', p: 'family', tm: 'short', md: 'loud', ag: 'kid' },
    { t: 'ベッドで漫画を5冊一気読み', d: '何巻も買って積んでいるシリーズを一気に。罪悪感ゼロのご褒美時間。', need: '必要なもの：漫画', p: 'solo', tm: 'long', md: 'lazy', ag: 'adult' },
    { t: 'やりたいこと100リスト', d: '思いつくまま紙に書き出す。50を超えると本音が出てきて面白い。', need: '必要なもの：紙・ペン', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: '家具レイアウトを方眼紙で再設計', d: '方眼紙に家具を切り抜いて並べ替え。実際に動かさず無料で模様替えシミュレーション。', need: '必要なもの：方眼紙・はさみ', p: 'pair', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: 'クッキー・パンケーキを家族で焼く', d: '型抜きやデコレーションで子どもの担当を作るとずっと集中してくれる。', need: '必要なもの：粉・卵・型', p: 'family', tm: 'mid', md: 'lazy', ag: 'kid' },
    { t: 'オセロ・トランプ真剣大会', d: '手加減なし・賭け（家事免除権など）ありで本気勝負。1時間あっという間。', need: '必要なもの：トランプ・オセロ', p: 'group', tm: 'mid', md: 'focus', ag: 'any' },
    { t: '英単語縛りしりとり', d: '英語のみのしりとり。意外と続かなくて勉強にもなる。スマホ辞書OKルールが優しい。', need: '必要なもの：辞書アプリ', p: 'group', tm: 'short', md: 'focus', ag: 'any' },
    { t: 'ぬり絵を1枚徹底丁寧に塗る', d: '無料DLぬり絵を印刷して、いつもより丁寧に。瞑想代わりになる集中時間。', need: '必要なもの：紙・色鉛筆', p: 'solo', tm: 'mid', md: 'quiet', ag: 'kid' },
    { t: 'お風呂掃除をタイル1枚ずつ', d: '広い面を一気にではなく1枚ずつ磨く。終わった頃には水アカが消えている。', need: '必要なもの：洗剤・スポンジ', p: 'solo', tm: 'mid', md: 'focus', ag: 'adult' },
    { t: '観葉植物の葉を1枚ずつ拭く', d: '濡れタオルで葉の表裏を拭くだけ。植物が見違えて元気になる、無心になれる。', need: '必要なもの：濡れタオル', p: 'solo', tm: 'mid', md: 'quiet', ag: 'adult' },
    { t: '思い出の動画を10秒ずつ編集', d: 'スマホに溜まった動画から10秒ずつ抜き出して1本のショート動画に。時間が溶ける。', need: '必要なもの：スマホ・編集アプリ', p: 'solo', tm: 'long', md: 'focus', ag: 'adult' },
    { t: '昔の音楽プレイリスト掘り起こし', d: '中高時代のプレイリストを再生。記憶が一気に蘇る、家族で世代別交換も楽しい。', need: '必要なもの：音楽アプリ', p: 'pair', tm: 'short', md: 'lazy', ag: 'any' },
    { t: '家でラジオ体操第1・第2フルセット', d: '懐かしのラジオ体操を朝・昼・夕の3回。動画を流すだけ、家族で並ぶと盛り上がる。', need: '必要なもの：スマホ・スペース', p: 'family', tm: 'short', md: 'loud', ag: 'any' }
  ];

  function matchPeople(idea, sel) {
    if (idea.p === 'any') return true;
    if (idea.p === sel) return true;
    // soft match: family ↔ group, pair ↔ family
    if (sel === 'family' && idea.p === 'group') return true;
    if (sel === 'group' && idea.p === 'family') return true;
    if (sel === 'pair' && idea.p === 'family') return true;
    return false;
  }
  function matchTime(idea, sel) {
    if (idea.tm === 'any') return true;
    if (idea.tm === sel) return true;
    // long can also do mid; mid can also do short
    if (sel === 'long' && idea.tm === 'mid') return true;
    if (sel === 'mid' && idea.tm === 'short') return true;
    return false;
  }
  function matchMood(idea, sel) {
    if (idea.md === 'any') return true;
    return idea.md === sel;
  }
  function matchAge(idea, sel) {
    if (sel === 'any') return true;
    if (idea.ag === 'any') return true;
    return idea.ag === sel;
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function generate() {
    var sp = document.getElementById('people').value;
    var st = document.getElementById('time').value;
    var sm = document.getElementById('mood').value;
    var sa = document.getElementById('age').value;

    // localStorage保存
    try {
      localStorage.setItem('hikikomori_play_v1', JSON.stringify({ sp: sp, st: st, sm: sm, sa: sa }));
    } catch (e) {}

    // 4軸全マッチ
    var pool = IDEAS.filter(function(x){
      return matchPeople(x, sp) && matchTime(x, st) && matchMood(x, sm) && matchAge(x, sa);
    });
    // 3件未満なら気分の縛りを緩める
    if (pool.length < 3) {
      pool = IDEAS.filter(function(x){
        return matchPeople(x, sp) && matchTime(x, st) && matchAge(x, sa);
      });
    }
    // それでも足りなければ年齢も緩める
    if (pool.length < 3) {
      pool = IDEAS.filter(function(x){
        return matchPeople(x, sp) && matchTime(x, st);
      });
    }

    var picked = shuffle(pool).slice(0, Math.min(5, Math.max(3, pool.length >= 5 ? 5 : pool.length)));
    render(picked);
  }

  function render(list) {
    var area = document.getElementById('result-area');
    if (!list || list.length === 0) {
      area.innerHTML = '<p class="empty-note">条件に合うアイデアが見つかりませんでした。条件を変えてもう一度お試しください。</p>';
      document.getElementById('reroll').style.display = 'none';
      return;
    }
    area.innerHTML = list.map(function(x, i){
      return '<div class="idea-card">'
           + '<p class="idea-num">アイデア ' + (i+1) + '</p>'
           + '<p class="idea-title">' + escapeHtml(x.t) + '</p>'
           + '<p class="idea-desc">' + escapeHtml(x.d) + '</p>'
           + '<p class="idea-need">' + escapeHtml(x.need) + '</p>'
           + '</div>';
    }).join('');
    document.getElementById('reroll').style.display = 'block';
    // スクロール
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // localStorage 復元
  (function restore(){
    try {
      var raw = localStorage.getItem('hikikomori_play_v1');
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.sp) document.getElementById('people').value = d.sp;
      if (d.st) document.getElementById('time').value = d.st;
      if (d.sm) document.getElementById('mood').value = d.sm;
      if (d.sa) document.getElementById('age').value = d.sa;
    } catch (e) {}
  })();
  </script>
