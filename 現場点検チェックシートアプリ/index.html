<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場点検チェックシート</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>現場点検チェックシート</h1>
      <p class="subtitle" id="progress-text">0 / 0 完了</p>
    </header>

    <section class="add-section">
      <div class="input-row">
        <input type="text" id="item-input" placeholder="点検項目を入力..." maxlength="100">
        <button id="add-btn" onclick="addItem()">追加</button>
      </div>
    </section>

    <section class="list-section">
      <ul id="checklist"></ul>
      <p id="empty-msg" class="empty-msg">点検項目がありません。上から追加してください。</p>
    </section>

    <section class="action-section">
      <button id="reset-btn" onclick="resetAll()">すべてのチェックをリセット</button>
      <button id="clear-btn" onclick="clearAll()">全項目を削除</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
