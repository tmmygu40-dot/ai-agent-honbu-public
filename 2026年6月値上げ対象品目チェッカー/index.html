<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 2026年6月値上げ対象品目チェッカー</title>
  <meta name="description" content="値上げ対象品を入力して、月額の家計負担増を即座に計算できるツールです。2026年度の値上げ予想から、実際の家計への影響を把握しましょう。最新情報は公式情報をご確認ください。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>💰 2026年6月値上げ対象品目チェッカー</h1>
    <p class="subtitle">値上げ対象品を登録して、月額の家計負担増を即座に計算できます。実家計への影響を把握しましょう。</p>
  </header>

  <!-- 入力カード：品目追加フォーム -->
  <div class="card">
    <p class="card-title">品目を追加</p>
    <div class="field">
      <label for="itemName">品目名</label>
      <input type="text" id="itemName" placeholder="例: 牛乳、パン、油など">
    </div>
    <div class="field">
      <label for="monthlyAmount">月額購入額（円）</label>
      <input type="number" id="monthlyAmount" placeholder="例: 3000" min="0">
    </div>
    <div class="field">
      <label for="increaseRate">値上げ率（%）</label>
      <input type="number" id="increaseRate" placeholder="例: 15" min="0" step="0.1">
    </div>
  </div>

  <button class="btn-calc" onclick="addItem()">＋ 品目を追加</button>

  <!-- 品目リスト -->
  <div class="card" id="itemListCard" style="display:none">
    <p class="card-title">登録品目</p>
    <div id="itemList"></div>
  </div>

  <!-- 計算結果 -->
  <div class="result-card" id="result">
    <p class="result-label">月額の家計負担増</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳テーブル -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">品目別の増加額</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、経済産業省・中小企業庁などの官公庁資料や、信頼できる公開データを参考に、2026年度の予想データとして使いやすく整理しています。最新情報は公式情報をご確認ください。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠（将来AdSense等に差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  const STORAGE_KEY = 'app_price_increase_items';
  let items = [];

  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        items = JSON.parse(saved);
      } catch(e) {
        items = [];
      }
    }
    renderList();
    updateResult();
  }

  function addItem() {
    const name = document.getElementById('itemName').value.trim();
    const amount = parseFloat(document.getElementById('monthlyAmount').value);
    const rate = parseFloat(document.getElementById('increaseRate').value);

    if (!name) { alert('品目名を入力してください'); return; }
    if (isNaN(amount) || amount < 0) { alert('月額購入額を入力してください'); return; }
    if (isNaN(rate) || rate < 0) { alert('値上げ率を入力してください'); return; }

    items.push({ name: name, amount: amount, rate: rate });
    saveItems();
    renderList();
    updateResult();

    document.getElementById('itemName').value = '';
    document.getElementById('monthlyAmount').value = '';
    document.getElementById('increaseRate').value = '';
  }

  function delItem(idx) {
    items.splice(idx, 1);
    saveItems();
    renderList();
    updateResult();
  }

  function renderList() {
    const listDiv = document.getElementById('itemList');
    const card = document.getElementById('itemListCard');

    if (items.length === 0) {
      card.style.display = 'none';
      return;
    }

    card.style.display = '';
    listDiv.innerHTML = items.map((item, idx) => {
      const increase = (item.amount * item.rate / 100).toFixed(0);
      return `
        <div style="display: grid; grid-template-columns: 1fr 0.9fr 0.9fr auto; gap: 0.5rem; padding: 0.8rem 0; border-bottom: 1px solid var(--border); align-items: center;">
          <div>${item.name}</div>
          <div>${fmt(item.amount)}円</div>
          <div>${item.rate}%</div>
          <div style="text-align: center;">
            <button class="btn-del" onclick="delItem(${idx})" style="display: inline-block; padding: 0.35rem 0.7rem; font-size: 0.75rem; font-weight: 700; background: var(--ng-bg); color: var(--ng); border: 1px solid var(--ng); border-radius: 6px; cursor: pointer;">削除</button>
          </div>
        </div>
        <div style="margin-bottom: 0.5rem; font-size: 0.82rem; color: var(--text-sub); text-align: right;">
          増加額: <span style="color: var(--accent); font-weight: 700;">${fmt(increase)}円/月</span>
        </div>
      `;
    }).join('');
  }

  function updateResult() {
    if (items.length === 0) {
      document.getElementById('result').style.display = 'none';
      document.getElementById('detail').style.display = 'none';
      return;
    }

    let totalIncrease = 0;
    const details = [];

    items.forEach(item => {
      const increase = item.amount * item.rate / 100;
      totalIncrease += increase;
      details.push([item.name, fmt(item.amount) + '円', item.rate + '%', fmt(increase) + '円']);
    });

    const rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(totalIncrease) + '円/月';

    let msg = '';
    if (totalIncrease >= 5000) {
      rc.className = 'result-card ng';
      msg = '月額5,000円以上の負担増。早めに家計の見直しを検討しましょう。';
    } else if (totalIncrease >= 2000) {
      rc.className = 'result-card warn';
      msg = '月額2,000円以上の負担増。対策を検討する価値があります。';
    } else {
      rc.className = 'result-card ok';
      msg = '月額の負担増は比較的少ないです。但し、複数の値上げが重なる場合があります。';
    }
    document.getElementById('rn').textContent = msg;

    const headerRow = '<tr style="font-weight: 700; border-bottom: 2px solid var(--border);"><td>品目</td><td style="text-align: center;">月額</td><td style="text-align: center;">値上げ率</td><td style="text-align: right;">増加額</td></tr>';
    const detailHtml = details.map((row, idx) => {
      const isLast = idx === details.length - 1;
      return '<tr' + (isLast ? ' class="hl"' : '') + '><td>' + row[0] + '</td><td style="text-align: center;">' + row[1] + '</td><td style="text-align: center;">' + row[2] + '</td><td style="text-align: right;">' + row[3] + '</td></tr>';
    }).join('');

    document.getElementById('db').innerHTML = headerRow + detailHtml;
    document.getElementById('detail').style.display = '';
  }

  function saveItems() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  window.addEventListener('load', init);
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
