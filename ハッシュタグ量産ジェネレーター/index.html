      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;

      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;

    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

      font-size: 0.98rem; font-weight: 700;
      background: var(--card); color: var(--accent);

      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

      min-height: 90px;

      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;

    .tag-card {

  var STORAGE_KEY = 'hashtag_gen_pref_v1';

  // ── 設定の保存／復元 ──
  function loadPref() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var p = JSON.parse(raw);
      if (p.sns === 'ig' || p.sns === 'tt') setSns(p.sns);
      if (p.genre) {
        var g = document.getElementById('genre');
        for (var i=0; i<g.options.length; i++) {
          if (g.options[i].value === p.genre) { g.selectedIndex = i; break; }
        }
      }
    } catch(e) {}
  }
  function savePref() {
    try {
      var sns = document.querySelector('#seg-sns button.active').dataset.val;
      var genre = document.getElementById('genre').value;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ sns: sns, genre: genre }));
    } catch(e) {}
  }

  // ── SNS 切替 ──
  function setSns(val) {
    var btns = document.querySelectorAll('#seg-sns button');
    for (var i=0; i<btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].dataset.val === val);
    }
  }
  document.getElementById('genre').addEventListener('change', savePref);

  // ── シャッフル ──
  function shuffle(a) {
    var arr = a.slice();
    for (var i=arr.length-1; i>0; i--) {
      var j = Math.floor(Math.random() * (i+1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  // ── 30個生成 ──
  function generate() {
    var sns = document.querySelector('#seg-sns button.active').dataset.val;
    var genre = document.getElementById('genre').value;
    var data = TAGS[sns][genre];
    if (!data) return;

    // 大8 + 中12 + 小10 = 30
    var pickL = shuffle(data.l).slice(0, 8);
    var pickM = shuffle(data.m).slice(0, 12);
    var pickS = shuffle(data.s).slice(0, 10);

    // 順序：大→中→小（投稿時の上位露出を意識）
    var items = [];
    pickL.forEach(function(t){ items.push({t:t, sz:'l'}); });
    pickM.forEach(function(t){ items.push({t:t, sz:'m'}); });
    pickS.forEach(function(t){ items.push({t:t, sz:'s'}); });

    // 重複除去（万が一の被り対策）
    var seen = {}; var dedup = [];
    for (var i=0; i<items.length; i++) {
      if (seen[items[i].t]) continue;
      seen[items[i].t] = 1;
      dedup.push(items[i]);
    }
    items = dedup.slice(0, 30);

    renderResult(items);
    savePref();
  }

  function renderResult(items) {
    var html = items.map(function(x){
      return '<span class="tg size-' + x.sz + '">' + escapeHtml(x.t) + '</span>';
    }).join(' ');
    document.getElementById('rlist').innerHTML = html;
    document.getElementById('rcount').textContent = items.length + '個';
    document.getElementById('result').style.display = 'block';
    var btn = document.getElementById('btnCopy');
    btn.classList.remove('copied');
    btn.textContent = '📋 ' + items.length + '個まとめてコピー';
    // 結果を保持
    window.__lastTags = items.map(function(x){ return x.t; });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function copyAll() {
    var tags = window.__lastTags || [];
    if (!tags.length) return;
    var text = tags.join(' ');
    var btn = document.getElementById('btnCopy');
    var done = function(){
      btn.classList.add('copied');
      btn.textContent = '✅ コピーしました';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = '📋 ' + tags.length + '個まとめてコピー';
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }

  loadPref();
  </script>
