<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 メルカリ出品文生成器</title>
  <meta name="description" content="商品情報を入力するだけで、メルカリで売れやすい出品説明文を素早く生成できるツールです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 出品文表示用カード ── */
    .listing-card { display: none; max-width: 600px; margin: 0 auto 1rem; }
    .listing-card.show { display: block; }
    #listing-text {
      width: 100%; min-height: 150px; padding: 1rem;
      font-size: 0.95rem; line-height: 1.6; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); font-family: inherit;
      resize: vertical;
    }

    /* ── ボタングループ ── */
    .btn-group {
      display: flex; gap: 0.8rem; margin-top: 0.8rem; max-width: 600px; margin-left: auto; margin-right: auto;
      flex-wrap: wrap;
    }
    .btn-copy, .btn-regen {
      flex: 1; min-width: 120px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem; font-weight: 700;
      border: 1.5px solid var(--accent); background: var(--card); color: var(--accent);
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:active, .btn-regen:active { background: var(--accent-light); }
    .btn-copy:hover, .btn-regen:hover { background: var(--accent); color: white; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .btn-regen, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .listing-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->

</head>
<body>

  <header class="app-header">
    <h1>📝 メルカリ出品文生成器</h1>
    <p class="subtitle">商品情報を入力すると、売れやすい出品説明文を素早く生成できます</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="product-name">商品名</label>
      <input type="text" id="product-name" placeholder="例: iPhone 14 128GB">
      <p class="hint">出品する商品の名前を入力してください</p>
    </div>
    <div class="field">
      <label for="product-category">カテゴリ</label>
      <select id="product-category">
        <option value="">選択してください</option>
        <option value="electronics">電子機器・スマートフォン</option>
        <option value="apparel">衣類・靴</option>
        <option value="books">本・雑誌</option>
        <option value="toys">おもちゃ・ゲーム</option>
        <option value="home">家具・インテリア</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="product-condition">商品の状態</label>
      <select id="product-condition">
        <option value="">選択してください</option>
        <option value="new">新品未使用</option>
        <option value="nearly-new">未使用に近い</option>
        <option value="good">目立った傷なし</option>
        <option value="fair">やや傷あり</option>
        <option value="poor">傷ありボロボロ</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ 出品文を生成</button>

  <!-- 出品文表示カード -->
  <div class="card listing-card" id="listing-result">
    <p class="card-title">生成された出品説明文</p>
    <textarea id="listing-text" readonly></textarea>
    <div class="btn-group">
      <button class="btn-copy" onclick="copyText()">📋 コピー</button>
      <button class="btn-regen" onclick="generate()">🔄 再生成</button>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは、メルカリで売れやすい出品文の構成を参考に、入力内容から自動生成しています。生成後は自由に編集してからご利用ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定。広告コードは未実装。結果と補足を見た後の位置に配置） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 出品文テンプレート群 ──
  var listingTemplates = {
    electronics: {
      new: `【商品説明】
この度は当店の商品をご覧いただきありがとうございます。

出品商品：{product}

状態：新品未使用のお品です。
開封していないため、傷や汚れはございません。

【特徴】
- 新品未使用
- 正規品
- 送料無料

【その他】
丁寧に梱包して、素早く発送いたします。
ご不明な点はお気軽にお問い合わせください。`,
      good: `【商品説明】

大切に使ってくださる方へお譲りします。

【特徴】
- 動作確認済み
- 清掃済み
- 送料無料

【発送について】
丁寧に梱包して、迅速に発送いたします。
ご不明な点はお気軽にお問い合わせください。`,
      fair: `【商品説明】
この度は当店の商品をご覧いただきありがとうございます。

出品商品：{product}

状態：使用に伴う傷がありますが、正常に動作します。
傷が気にならない方、ご検討ください。

【特徴】
- 動作確認済み
- 使用可能な状態です
- 送料無料

【発送について】
丁寧に梱包して、迅速に発送いたします。`,
    },
    apparel: {
      new: `【商品説明】
この度は当店の商品をご覧いただきありがとうございます。

出品商品：{product}

状態：新品未使用です。
タグ付き、開封していない状態での出品です。

【商品情報】
- 新品未使用
- タグ付き
- 送料無料

【発送について】
丁寧に梱包して、素早く発送いたします。
ご不明な点はお気軽にお問い合わせください。`,
      good: `【商品説明】

状態：数回の着用で目立った傷や汚れはございません。

      fair: `【商品説明】

    },
    other: {
      new: `【商品説明】

      good: `【商品説明】

      fair: `【商品説明】
この度は当店の商品をご覧いただきありがとうございます。

出品商品：{product}

状態：使用に伴う傷や汚れがございますが、問題なくご使用いただけます。

【商品情報】
- 使用可能
- 送料無料

【発送について】
丁寧に梱包して、迅速に発送いたします。`,
    }
  };

  function generate() {
    var name = document.getElementById('product-name').value.trim();
    var cat = document.getElementById('product-category').value;
    var cond = document.getElementById('product-condition').value;

    if (!name || !cat || !cond) {
      alert('すべての項目を選択してください');
      return;
    }

    var templates = listingTemplates[cat] || listingTemplates.other;
    var template = templates[cond] || templates.new;
    var text = template.replace('{product}', name);

    document.getElementById('listing-text').value = text;
    document.getElementById('listing-result').classList.add('show');

    // localStorage に保存
    var history = JSON.parse(localStorage.getItem('mercariHistory') || '[]');
    history.unshift({
      name: name,
      category: cat,
      condition: cond,
      text: text,
      timestamp: new Date().toLocaleString('ja-JP')
    });
    if (history.length > 10) history.pop();
    localStorage.setItem('mercariHistory', JSON.stringify(history));
  }

  function copyText() {
    var text = document.getElementById('listing-text');
    text.select();
    document.execCommand('copy');
    alert('コピーしました！');
  }

  // ページ読み込み時の復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('mercariSaved');
    if (saved) {
      var data = JSON.parse(saved);
      document.getElementById('product-name').value = data.name || '';
      document.getElementById('product-category').value = data.category || '';
      document.getElementById('product-condition').value = data.condition || '';
    }
  });

  // 入力値の自動保存
  document.getElementById('product-name').addEventListener('change', saveDraft);
  document.getElementById('product-category').addEventListener('change', saveDraft);
  document.getElementById('product-condition').addEventListener('change', saveDraft);

  function saveDraft() {
    var draft = {
      name: document.getElementById('product-name').value,
      category: document.getElementById('product-category').value,
      condition: document.getElementById('product-condition').value
    };
    localStorage.setItem('mercariSaved', JSON.stringify(draft));
  }
  </script>
