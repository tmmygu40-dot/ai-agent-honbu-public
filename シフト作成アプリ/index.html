<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>シフト作成アプリ</h1>

    <!-- スタッフ登録セクション -->
    <section class="card">
      <h2>スタッフ登録</h2>
      <div class="input-row">
        <input type="text" id="staffName" placeholder="スタッフ名を入力" maxlength="20">
        <button id="addStaffBtn">追加</button>
      </div>
      <ul id="staffList" class="staff-list"></ul>
    </section>

    <!-- 希望休登録セクション -->
    <section class="card">
      <h2>希望休登録</h2>
      <div class="input-row">
        <select id="targetStaff">
          <option value="">スタッフを選択</option>
        </select>
        <input type="month" id="targetMonth">
      </div>
      <div id="calendarInput" class="calendar-input"></div>
      <button id="saveOffBtn" class="btn-primary">希望休を保存</button>
    </section>

    <!-- シフト表セクション -->
    <section class="card">
      <h2>シフト表</h2>
      <div class="input-row">
        <input type="month" id="shiftMonth">
        <button id="generateBtn" class="btn-primary">シフト表を生成</button>
      </div>
      <div id="shiftTable" class="shift-table-wrap"></div>
      <button id="printBtn" class="btn-secondary" style="display:none;">印刷</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
