<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="趣味・雰囲気・カラーを選ぶだけで、SNSアイコン用の画像生成AIプロンプト（英語＋日本語）が即出てくる無料ツール。MidjourneyやDALL·E、Stable Diffusion用の呪文づくりに。">
  <title>SNSアイコン呪文メーカー｜画像生成AI用プロンプトを3秒で作成</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.5rem; text-align: center; }
    .prompt-box {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem; line-height: 1.55;
      color: var(--text);
      word-break: break-word;
      margin-bottom: 0.7rem;
      font-family: -apple-system, "SF Mono", Consolas, "Hiragino Sans", monospace;
    }
    .prompt-jp {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.88rem; line-height: 1.6;
      color: var(--text-sub);
      margin-bottom: 0.9rem;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.75rem;
      font-size: 0.95rem; font-weight: 700;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { background: var(--accent-light); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>SNSアイコン呪文メーカー</h1>
    <p class="subtitle">趣味・雰囲気・カラーを選ぶだけで画像生成AI用プロンプトを即出力</p>
  </header>

  <div class="card">
    <p class="card-title">アイコンの好みを選ぶ</p>
    <div class="field">
      <label for="hobby">趣味・モチーフ</label>
      <select id="hobby">
        <option value="gaming|ゲーム">ゲーム</option>
        <option value="reading books|読書">読書</option>
        <option value="cooking|料理">料理</option>
        <option value="music|音楽">音楽</option>
        <option value="traveling|旅行">旅行</option>
        <option value="cats and dogs|動物・ペット">動物・ペット</option>
        <option value="art and painting|アート・絵">アート・絵</option>
        <option value="sports|スポーツ">スポーツ</option>
        <option value="coffee|コーヒー">コーヒー</option>
        <option value="plants|植物・ガーデニング">植物・ガーデニング</option>
        <option value="camping|キャンプ・アウトドア">キャンプ・アウトドア</option>
        <option value="anime|アニメ・漫画">アニメ・漫画</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">雰囲気・テイスト</label>
      <select id="mood">
        <option value="cute, kawaii|かわいい">かわいい</option>
        <option value="cool, stylish|クール">クール</option>
        <option value="retro, vintage|レトロ">レトロ</option>
        <option value="minimal, simple|ミニマル">ミニマル</option>
        <option value="fantasy, magical|ファンタジー">ファンタジー</option>
        <option value="cyberpunk, futuristic|サイバー">サイバー</option>
        <option value="japanese traditional|和風">和風</option>
        <option value="pop, vivid|ポップ">ポップ</option>
        <option value="watercolor|水彩画風">水彩画風</option>
        <option value="anime style|アニメ風">アニメ風</option>
        <option value="pixel art|ドット絵">ドット絵</option>
        <option value="3d cartoon|3Dカートゥーン">3Dカートゥーン</option>
      </select>
    </div>
    <div class="field">
      <label for="color">カラー</label>
      <select id="color">
        <option value="pastel|パステル">パステル</option>
        <option value="vivid|ビビッド">ビビッド</option>
        <option value="monochrome black and white|モノクロ">モノクロ</option>
        <option value="earth tone|アースカラー">アースカラー</option>
        <option value="neon|ネオン">ネオン</option>
        <option value="blue|青系">青系</option>
        <option value="pink|ピンク系">ピンク系</option>
        <option value="green|グリーン系">グリーン系</option>
        <option value="red and orange|赤・オレンジ系">赤・オレンジ系</option>
        <option value="purple|紫系">紫系</option>
        <option value="gold and beige|ゴールド・ベージュ">ゴールド・ベージュ</option>
        <option value="rainbow|レインボー">レインボー</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generatePrompt()">呪文を作る</button>

  <div class="result-card" id="result">
    <p class="result-label">📜 英語プロンプト（コピーしてAIに貼り付け）</p>
    <div class="prompt-box" id="promptEn"></div>
    <p class="result-label">🌐 日本語訳</p>
    <div class="prompt-jp" id="promptJp"></div>
    <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">📋 英語プロンプトをコピー</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 出力した英語プロンプトは Midjourney / DALL·E / Stable Diffusion など主要な画像生成AIで使えます。実際の生成結果はAI側のバージョンや設定により変わります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'sns_icon_spell_v1';

  function getParts(selectId) {
    var v = document.getElementById(selectId).value;
    var parts = v.split('|');
    return { en: parts[0], jp: parts[1] };
  }

  function generatePrompt() {
    var h = getParts('hobby');
    var m = getParts('mood');
    var c = getParts('color');

    var en = 'SNS profile icon, ' + h.en + ' theme, ' + m.en + ' style, ' + c.en + ' color palette, centered composition, clean simple background, high quality, detailed';
    var jp = 'SNSアイコン用、「' + h.jp + '」をテーマに、「' + m.jp + '」な雰囲気で、「' + c.jp + '」のカラーパレット。中央構図・背景シンプル・高品質・細部まで描写。';

    document.getElementById('promptEn').textContent = en;
    document.getElementById('promptJp').textContent = jp;
    document.getElementById('result').style.display = 'block';

    var btn = document.getElementById('copyBtn');
    btn.textContent = '📋 英語プロンプトをコピー';
    btn.classList.remove('copied');

    saveSelection();
  }

  function copyPrompt() {
    var text = document.getElementById('promptEn').textContent;
    if (!text) return;
    var btn = document.getElementById('copyBtn');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { markCopied(btn); }, function() { fallbackCopy(text, btn); });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); markCopied(btn); } catch(e) {}
    document.body.removeChild(ta);
  }

  function markCopied(btn) {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
  }

  function saveSelection() {
    try {
      var data = {
        hobby: document.getElementById('hobby').value,
        mood: document.getElementById('mood').value,
        color: document.getElementById('color').value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function loadSelection() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.hobby) document.getElementById('hobby').value = data.hobby;
      if (data.mood)  document.getElementById('mood').value  = data.mood;
      if (data.color) document.getElementById('color').value = data.color;
    } catch(e) {}
  }

  loadSelection();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
