<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利益計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>利益計算アプリ</h1>

    <div class="card">
      <div class="input-group">
        <label for="cost">原価（円）</label>
        <input type="number" id="cost" placeholder="例：500" min="0">
      </div>
      <div class="input-group">
        <label for="price">売値（円）</label>
        <input type="number" id="price" placeholder="例：800" min="0">
      </div>

      <div class="result-box" id="result-box">
        <div class="result-item">
          <span class="result-label">粗利益</span>
          <span class="result-value" id="gross-profit">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">利益率</span>
          <span class="result-value" id="profit-rate">—</span>
        </div>
      </div>

      <div class="button-row">
        <button id="save-btn" class="btn-primary" disabled>履歴に保存</button>
        <button id="clear-btn" class="btn-secondary">クリア</button>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button id="clear-history-btn" class="btn-danger">全削除</button>
      </div>
      <ul id="history-list"></ul>
      <p id="no-history" class="no-history">履歴はありません</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
