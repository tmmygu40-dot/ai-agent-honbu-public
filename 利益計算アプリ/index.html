<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>利益計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E5%88%A9%E7%9B%8A%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="利益計算アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"利益計算アプリ","description":"利益計算アプリ。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%88%A9%E7%9B%8A%E8%A8%88%E7%AE%97%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="container">
    <h1>利益計算アプリ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <div class="card">
      <div class="input-group">
        <label for="cost">原価（円）</label>
        <input type="number" id="cost" placeholder="例：500" min="0">
      </div>
      <div class="input-group">
        <label for="price">売値（円）</label>
        <input type="number" id="price" placeholder="例：800" min="0">
      </div>

      <div class="result-box" id="result-box">
        <div class="result-item">
          <span class="result-label">粗利益</span>
          <span class="result-value" id="gross-profit">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">利益率</span>
          <span class="result-value" id="profit-rate">—</span>
        </div>
      </div>

      <div class="button-row">
        <button id="save-btn" class="btn-primary" disabled onclick="saveToHistory()">履歴に保存</button>
        <button id="clear-btn" class="btn-secondary" onclick="clearInputs()">クリア</button>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button id="clear-history-btn" class="btn-danger" onclick="if(confirm('履歴を全削除しますか？')) clearHistory()">全削除</button>
      </div>
      <ul id="history-list"></ul>
      <p id="no-history" class="no-history">履歴はありません</p>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
