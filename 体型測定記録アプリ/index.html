<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体型測定記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>体型測定記録</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="part">部位</label>
          <select id="part">
            <option value="ウエスト">ウエスト</option>
            <option value="ヒップ">ヒップ</option>
            <option value="バスト">バスト</option>
            <option value="太もも">太もも</option>
            <option value="ふくらはぎ">ふくらはぎ</option>
            <option value="二の腕">二の腕</option>
          </select>
        </div>
        <div class="form-group">
          <label for="size">サイズ (cm)</label>
          <input type="number" id="size" step="0.1" min="0" max="300" placeholder="例: 70.5">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <!-- グラフ表示 -->
    <section class="chart-section">
      <h2>変化グラフ</h2>
      <div class="chart-filter">
        <label for="chartPart">部位を選択：</label>
        <select id="chartPart">
          <option value="ウエスト">ウエスト</option>
          <option value="ヒップ">ヒップ</option>
          <option value="バスト">バスト</option>
          <option value="太もも">太もも</option>
          <option value="ふくらはぎ">ふくらはぎ</option>
          <option value="二の腕">二の腕</option>
        </select>
      </div>
      <div class="canvas-wrapper">
        <canvas id="chart"></canvas>
      </div>
      <p id="noDataMsg" class="no-data hidden">データがありません</p>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div class="list-filter">
        <label for="filterPart">絞り込み：</label>
        <select id="filterPart">
          <option value="all">すべて</option>
          <option value="ウエスト">ウエスト</option>
          <option value="ヒップ">ヒップ</option>
          <option value="バスト">バスト</option>
          <option value="太もも">太もも</option>
          <option value="ふくらはぎ">ふくらはぎ</option>
          <option value="二の腕">二の腕</option>
        </select>
      </div>
      <div id="recordList" class="record-list"></div>
      <p id="emptyMsg" class="no-data hidden">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
