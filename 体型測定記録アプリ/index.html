<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体型測定記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E4%BD%93%E5%9E%8B%E6%B8%AC%E5%AE%9A%E8%A8%98%E9%8C%B2%E3%82%A2%E3%83%97%E3%83%AA/" />
</head>
<body>
  <div class="container">
    <h1>体型測定記録</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="part">部位</label>
          <select id="part">
            <option value="ウエスト">ウエスト</option>
            <option value="ヒップ">ヒップ</option>
            <option value="バスト">バスト</option>
            <option value="太もも">太もも</option>
            <option value="ふくらはぎ">ふくらはぎ</option>
            <option value="二の腕">二の腕</option>
          </select>
        </div>
        <div class="form-group">
          <label for="size">サイズ (cm)</label>
          <input type="number" id="size" step="0.1" min="0" max="300" placeholder="例: 70.5">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">記録する</button>
    </section>

    <!-- グラフ表示 -->
    <section class="chart-section">
      <h2>変化グラフ</h2>
      <div class="chart-filter">
        <label for="chartPart">部位を選択：</label>
        <select id="chartPart">
          <option value="ウエスト">ウエスト</option>
          <option value="ヒップ">ヒップ</option>
          <option value="バスト">バスト</option>
          <option value="太もも">太もも</option>
          <option value="ふくらはぎ">ふくらはぎ</option>
          <option value="二の腕">二の腕</option>
        </select>
      </div>
      <div class="canvas-wrapper">
        <canvas id="chart"></canvas>
      </div>
      <p id="noDataMsg" class="no-data hidden">データがありません</p>
    </section>

    <!-- 記録一覧 -->
    <section class="list-section">
      <h2>記録一覧</h2>
      <div class="list-filter">
        <label for="filterPart">絞り込み：</label>
        <select id="filterPart">
          <option value="all">すべて</option>
          <option value="ウエスト">ウエスト</option>
          <option value="ヒップ">ヒップ</option>
          <option value="バスト">バスト</option>
          <option value="太もも">太もも</option>
          <option value="ふくらはぎ">ふくらはぎ</option>
          <option value="二の腕">二の腕</option>
        </select>
      </div>
      <div id="recordList" class="record-list"></div>
      <p id="emptyMsg" class="no-data hidden">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
