<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 GW明け復帰ナビ - 5月病チェック＆習慣管理</title>
  <meta name="description" content="5月病とGW疲れの度合いを簡単診断。その結果に基づいて、あなたにぴったりな立て直し習慣を提案します。毎日チェックして心身をリセットしましょう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── チェックリスト ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 習慣提案 ── */
    .habit-list { margin: 0; padding: 0; list-style: none; }
    .habit-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; line-height: 1.5; }
    .habit-item:last-child { border-bottom: none; }

    /* ── 進捗管理 ── */
    .progress-bar {
      width: 100%; height: 10px; background: var(--border);
      border-radius: 5px; overflow: hidden; margin: 0.5rem 0;
    }
    .progress-fill {
      height: 100%; background: var(--accent); transition: width 0.3s;
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌸 GW明け復帰ナビ</h1>
    <p class="subtitle">GW疲れから一歩ずつ。簡単な診断と習慣チェックで、5月病をサクッと乗り越えられます。</p>
  </header>

  <!-- 診断フォーム -->
  <div class="card" id="diagnosisCard">
    <p class="card-title">5月病・GW疲れ度チェック</p>
    <div class="field">
      <label>以下の5つの項目について、当てはまるか選んでください</label>
    </div>
    <div class="field">
      <label for="q1">1. 朝起きるのが辛い・倦怠感がある</label>
      <select id="q1">
        <option value="">選択してください</option>
        <option value="1">少しある</option>
        <option value="2">結構ある</option>
        <option value="3">かなり強い</option>
      </select>
    </div>
    <div class="field">
      <label for="q2">2. やる気・モチベーションが出ない</label>
      <select id="q2">
        <option value="">選択してください</option>
        <option value="1">少しある</option>
        <option value="2">結構ある</option>
        <option value="3">かなり強い</option>
      </select>
    </div>
    <div class="field">
      <label for="q3">3. 不安・イライラ・気分が沈みやすい</label>
      <select id="q3">
        <option value="">選択してください</option>
        <option value="1">少しある</option>
        <option value="2">結構ある</option>
        <option value="3">かなり強い</option>
      </select>
    </div>
    <div class="field">
      <label for="q4">4. 睡眠・食事のリズムが乱れている</label>
      <select id="q4">
        <option value="">選択してください</option>
        <option value="1">少しある</option>
        <option value="2">結構ある</option>
        <option value="3">かなり強い</option>
      </select>
    </div>
    <div class="field">
      <label for="q5">5. 集中力・思考がぼんやりしている</label>
      <select id="q5">
        <option value="">選択してください</option>
        <option value="1">少しある</option>
        <option value="2">結構ある</option>
        <option value="3">かなり強い</option>
      </select>
    </div>
  </div>

  <!-- 診断ボタン -->
  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 診断結果カード -->
  <div class="result-card" id="resultCard">
    <p class="result-label" id="resultLabel"></p>
    <p class="result-value" id="resultLevel"></p>
    <p class="result-eval" id="resultEval"></p>
    <p class="result-note" id="resultNote"></p>
  </div>

  <!-- 習慣提案カード -->
  <div class="card" id="habitCard" style="display:none">
    <p class="card-title">立て直し習慣（毎日やってみよう）</p>
    <ul class="habit-list" id="habitList"></ul>
  </div>

  <!-- 習慣チェックリスト -->
  <div class="card" id="checkCard" style="display:none">
    <p class="card-title">今日のチェック</p>
    <p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:1rem;">以下の習慣を実行できたかチェック。データは自動保存されます。</p>
    <div id="checkListContainer"></div>
    <p style="font-size:0.78rem;color:var(--text-sub);margin-top:1rem;">進捗：<span id="progress">0</span>/<span id="total">0</span></p>
    <div class="progress-bar">
      <div class="progress-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <!-- 関連アプリ表示 widget -->
  <script src="../related-widget.js"></script>
  <!-- お気に入り widget -->
  <script src="../fav-widget.js"></script>

  <!-- 改善案・不具合報告リンク -->
  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:center;">
    <a href="https://github.com/tmmygu40-dot/ai-agent-honbu-public/issues" target="_blank" style="color:inherit;text-decoration:underline;">改善案・不具合報告はこちら</a>
  </p>

  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
    // データ構造
    const diagnoses = {
      mild: {
        label: '軽度',
        eval: '少し疲れが残っている状態ですね',
        note: 'GW疲れはありますが、習慣を整えればすぐに回復できます。',
        habits: [
          '朝日を浴びる（毎朝5～10分）',
          'ラジオ体操・軽いストレッチ（10分程度）',
          'バランスの良い食事（特に夜遅くの食事は避ける）',
          '夜10時には寝る準備を始める',
          '好きなことで気分転換（好きな音楽、散歩など）'
        ]
      },
      moderate: {
        label: '中度',
        eval: '5月病の症状が出始めている状態です',
        note: '習慣の立て直しと、十分な休息が大切です。1～2週間で改善を目指しましょう。',
        habits: [
          '毎朝同じ時間に起きる（できれば6時半）',
          '朝日を浴びる（毎朝15～20分）',
          '運動習慣（散歩・ヨガなど軽い運動30分）',
          'バランスの良い食事・規則正しい食事時間',
          '夜9時に寝て、7時間の睡眠を確保'
        ]
      },
      severe: {
        label: '重度',
        eval: '5月病の症状が強く出ている状態です',
        note: '医学的なサポートが必要な場合があります。症状が1週間以上続く場合は、医師や心理士に相談してください。',
        habits: [
          '医師・心理士への相談（月～金の営業時間に電話相談から）',
          '毎朝同じ時間に起きる（朝日を浴びることが重要）',
          '軽い散歩（毎日15～30分）',
          '栄養バランスの良い3食',
          '十分な睡眠（8時間以上を目安に）'
        ]
      }
    };

    // 診断処理
    function diagnose() {
      const q1 = parseInt(document.getElementById('q1').value) || 0;
      const q2 = parseInt(document.getElementById('q2').value) || 0;
      const q3 = parseInt(document.getElementById('q3').value) || 0;
      const q4 = parseInt(document.getElementById('q4').value) || 0;
      const q5 = parseInt(document.getElementById('q5').value) || 0;

      if (q1 === 0 || q2 === 0 || q3 === 0 || q4 === 0 || q5 === 0) {
        alert('全ての質問にお答えください');
        return;
      }

      const total = q1 + q2 + q3 + q4 + q5;
      let level = 'mild';
      if (total <= 6) level = 'mild';
      else if (total <= 10) level = 'moderate';
      else level = 'severe';

      // 結果表示
      const diagnosis = diagnoses[level];
      const resultCard = document.getElementById('resultCard');

      resultCard.innerHTML = `
        <p class="result-label">診断結果</p>
        <p class="result-value">${diagnosis.label}</p>
        <p class="result-eval">${diagnosis.eval}</p>
        <p class="result-note">${diagnosis.note}</p>
      `;

      resultCard.className = 'result-card ' + (level === 'mild' ? 'ok' : level === 'moderate' ? 'warn' : 'ng');
      resultCard.style.display = 'block';

      // 習慣提案を表示
      const habitList = document.getElementById('habitList');
      habitList.innerHTML = '';
      diagnosis.habits.forEach((habit, index) => {
        const li = document.createElement('li');
        li.className = 'habit-item';
        li.textContent = habit;
        habitList.appendChild(li);
      });
      document.getElementById('habitCard').style.display = 'block';

      // チェックリストを表示
      showChecklist(diagnosis.habits);

      // localStorage に保存
      saveData({ level, total, date: new Date().toISOString() });

      // スクロール
      setTimeout(() => resultCard.scrollIntoView({ behavior: 'smooth' }), 100);
    }

    // チェックリスト表示
    function showChecklist(habits) {
      const checkListContainer = document.getElementById('checkListContainer');
      checkListContainer.innerHTML = '';

      habits.forEach((habit, index) => {
        const label = document.createElement('label');
        label.className = 'check-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.index = index;
        checkbox.addEventListener('change', saveChecklistData);

        const span = document.createElement('span');
        span.className = 'check-text';
        span.textContent = habit;

        label.appendChild(checkbox);
        label.appendChild(span);
        checkListContainer.appendChild(label);
      });

      document.getElementById('total').textContent = habits.length;
      document.getElementById('checkCard').style.display = 'block';

      // 保存されたデータを復元
      loadChecklistData();
    }

    // チェックリストのデータ保存
    function saveChecklistData() {
      const checkboxes = document.querySelectorAll('.check-item input[type="checkbox"]');
      const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
      document.getElementById('progress').textContent = checked;
      document.getElementById('progressBar').style.width = (checked / checkboxes.length * 100) + '%';

      const data = Array.from(checkboxes).map((cb, i) => cb.checked);
      localStorage.setItem('gw-checklist', JSON.stringify(data));
    }

    // チェックリストのデータ復元
    function loadChecklistData() {
      const saved = localStorage.getItem('gw-checklist');
      if (saved) {
        const data = JSON.parse(saved);
        const checkboxes = document.querySelectorAll('.check-item input[type="checkbox"]');
        checkboxes.forEach((cb, i) => {
          if (data[i]) cb.checked = true;
        });
      }
      saveChecklistData();
    }

    // データ保存
    function saveData(data) {
      localStorage.setItem('gw-diagnosis', JSON.stringify(data));
    }

    // ページ読み込み時に保存データを復元
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('gw-diagnosis');
      if (saved) {
        const data = JSON.parse(saved);
        const level = data.level;
        const diagnosis = diagnoses[level];

        // 結果カードを表示
        const resultCard = document.getElementById('resultCard');
        resultCard.innerHTML = `
          <p class="result-label">診断結果</p>
          <p class="result-value">${diagnosis.label}</p>
          <p class="result-eval">${diagnosis.eval}</p>
          <p class="result-note">${diagnosis.note}</p>
        `;
        resultCard.className = 'result-card ' + (level === 'mild' ? 'ok' : level === 'moderate' ? 'warn' : 'ng');
        resultCard.style.display = 'block';

        // 習慣提案を表示
        const habitList = document.getElementById('habitList');
        habitList.innerHTML = '';
        diagnosis.habits.forEach((habit, index) => {
          const li = document.createElement('li');
          li.className = 'habit-item';
          li.textContent = habit;
          habitList.appendChild(li);
        });
        document.getElementById('habitCard').style.display = 'block';

        // チェックリストを表示
        showChecklist(diagnosis.habits);
      }
    });
  </script>

</body>
</html>
