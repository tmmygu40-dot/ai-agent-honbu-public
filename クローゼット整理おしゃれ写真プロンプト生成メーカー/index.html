<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="クローゼット整理の様子をSNS映えさせて撮影・投稿するために、AIプロンプトを自動生成するツール。整理の雰囲気・色調・シーンを選ぶだけで、Stable Diffusionで使えるおしゃれなプロンプトが30秒で完成します。">
  <title>クローゼット整理おしゃれ写真プロンプト生成メーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 絵文字ひとこと＆結果別Q&A（ENABLE_RESULT_QA=true のときだけ表示） ── */
    .result-emoji { font-size: 2.4rem; text-align: center; margin-bottom: 0.3rem; line-height: 1.2; }
    .result-emoji-text { font-size: 1.05rem; font-weight: 700; text-align: center; margin-bottom: 1rem; line-height: 1.4; }
    #qa-card.ok   .result-emoji-text { color: var(--ok); }
    #qa-card.warn .result-emoji-text { color: var(--warn); }
    #qa-card.ng   .result-emoji-text { color: var(--ng); }
    .qa-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .qa-a { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; }

    /* ── チェックボックス行（label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示） ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>

</head>
<body>

  <header class="app-header">
    <h1>クローゼット整理おしゃれ写真プロンプト生成</h1>
    <p class="subtitle">整理の様子をSNS映えさせるAIプロンプトを自動生成 🧥✨</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">クローゼット情報を入力</p>
    <div class="field">
      <label for="atmosphere">部屋の雰囲気（モダン・ナチュラル・アンティーク等）</label>
      <input type="text" id="atmosphere" placeholder="例: 北欧モダン、ナチュラル、ミニマル">
      <p class="hint">整理後のクローゼットの雰囲気を自由に書いてください</p>
    </div>
    <div class="field">
      <label for="color">色調（黒・白・木目・カラフル等）</label>
      <input type="text" id="color" placeholder="例: 白黒、木目、パステルカラー">
      <p class="hint">主な色や色合いを指定できます</p>
    </div>
    <div class="field">
      <label for="feature">その他の特徴（狭い・広い・明るい・天井低い等）</label>
      <input type="text" id="feature" placeholder="例: 狭い、照明が綺麗、天井高い">
      <p class="hint">空間的な特徴や照明など</p>
    </div>
    <p class="card-title" style="margin-top:1.2rem;">撮影シーンを選択</p>
    <label class="check-item">
      <input type="checkbox" id="scene-before" checked>
      <span class="check-text">Before（整理前）</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="scene-after" checked>
      <span class="check-text">After（整理後）</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="scene-beforeafter">
      <span class="check-text">ビフォーアフター並べて</span>
    </label>
    <label class="check-item">
      <input type="checkbox" id="scene-detail">
      <span class="check-text">整理の細部クローズアップ</span>
    </label>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" id="generateBtn">プロンプトを生成する</button>

  <!-- 結論カード（JS で内容を完全に生成） -->
  <div class="result-card ok" id="result" style="display:none;border-color:#4B8BBE;background:#f0f7ff;text-align:left;padding:1.5rem 1.2rem;"></div>


  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、総務省・観光庁・国税庁などの官公庁資料や、信頼できる公開データを参考に、目安として使いやすく整理しています。
  </p>

  <!-- checkbox を使う場合の模範UI（必要時にコピーして使う / label で行全体を包む / 行クリックでON-OFF / チェック済みは取り消し線+薄表示）
  <div class="card">
    <p class="card-title">チェックリスト</p>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目1</span>
    </label>
    <label class="check-item">
      <input type="checkbox">
      <span class="check-text">項目2</span>
    </label>
  </div>
  -->

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ボタンバインド
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('generateBtn');
    if (btn) {
      btn.addEventListener('click', generatePrompt);
    } else {
      console.error('ERROR: generateBtn element not found');
    }
  });

  function generatePrompt() {
    var atmosphere = document.getElementById('atmosphere').value.trim();
    var color = document.getElementById('color').value.trim();
    var feature = document.getElementById('feature').value.trim();

    // 入力チェック
    if (!atmosphere || !color) {
      alert('部屋の雰囲気と色調は必須です');
      return;
    }

    // 撮影シーン選択
    var scenes = [];
    if (document.getElementById('scene-before').checked) scenes.push('before');
    if (document.getElementById('scene-after').checked) scenes.push('after');
    if (document.getElementById('scene-beforeafter').checked) scenes.push('side-by-side');
    if (document.getElementById('scene-detail').checked) scenes.push('close-up');

    if (scenes.length === 0) {
      alert('撮影シーンを最低1つ選択してください');
      return;
    }

    // プロンプト生成
    var prompt = generateStableDiffusionPrompt(atmosphere, color, feature, scenes);

    // 結果表示：result-card に確実に書き込み
    var resultCard = document.getElementById('result');

    if (!resultCard) {
      console.error('ERROR: result-card element (id="result") not found');
      alert('申し訳ありません。結果表示要素が見つかりませんでした。ページをリロードしてください。');
      return;
    }

    // result-card に結果を確実に生成・設定
    try {
      var promptEscaped = escapeHtml(prompt);
      resultCard.innerHTML = `
        <p class="result-label" style="text-align:center;">✨ 生成されたプロンプト</p>
        <p class="result-note" style="font-size:0.95rem;color:var(--text);background:var(--bg);padding:1rem;border-radius:8px;margin:1rem 0 0 0;line-height:1.6;word-break:break-word;">${promptEscaped}</p>
        <button class="btn-calc" onclick="copyPrompt()" style="margin-top:1rem;padding:0.8rem;">📋 プロンプトをコピーする</button>
      `;
      resultCard.setAttribute('data-prompt', prompt);
      resultCard.style.display = 'block';

      // 結果カードまでスクロール
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

      console.log('SUCCESS: Prompt generated and displayed');
    } catch (e) {
      console.error('ERROR: Failed to display prompt', e);
      alert('申し訳ありません。プロンプトの表示に失敗しました。ページをリロードしてください。');
      return;
    }

    // localStorage に保存
    try {
      var history = JSON.parse(localStorage.getItem('closetPromptHistory') || '[]');
      history.unshift({ prompt: prompt, date: new Date().toLocaleString('ja-JP'), atmosphere: atmosphere, color: color });
      if (history.length > 20) history.pop();
      localStorage.setItem('closetPromptHistory', JSON.stringify(history));
    } catch (e) {
      console.warn('WARNING: Failed to save history to localStorage', e);
    }
  }

  function generateStableDiffusionPrompt(atmosphere, color, feature, scenes) {
    var sceneText = {
      'before': 'ビフォー、整理前',
      'after': 'アフター、整理後、きちんと整理されたクローゼット',
      'side-by-side': 'ビフォーアフター、整理前と整理後を左右に並べて',
      'close-up': 'クローゼットの細部、整理された衣類のクローズアップ'
    };

    var scenePrompt = scenes.map(function(s) { return sceneText[s]; }).join(', ');

    var featureText = feature ? ', ' + feature : '';

    var prompt = atmosphere + 'のクローゼット, ' + color + '色' + featureText + ', ' + scenePrompt + ', studio lighting, professional photo, magazine style, beautiful composition, highly detailed, 4K';

    return prompt;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function copyPrompt() {
    var resultCard = document.getElementById('result');
    if (!resultCard) return;

    var promptElement = resultCard.querySelector('.result-note');
    if (!promptElement) return;

    var text = promptElement.textContent;
    if (!text) return;

    navigator.clipboard.writeText(text).then(function() {
      alert('プロンプトをコピーしました！\nStable Diffusion やその他の画像生成AIに貼り付けてご利用ください。');
    }).catch(function() {
      // フォールバック
      var textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('プロンプトをコピーしました！');
    });
  }
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
