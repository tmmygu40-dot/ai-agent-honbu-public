<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>90年代セル画アニメ風プロンプトメーカー｜AI画像生成用</title>
  <meta name="description" content="被写体・髪色・表情・背景・画風要素を選ぶだけで、90年代セル画アニメ風のAI画像生成プロンプトが即完成。推しキャラやペットを懐かしのアニメ画風に仕上げたい人向け。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .btn-copy {
      display: inline-block; margin-top: 0.8rem; padding: 0.55rem 1.1rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer;
    }
    .btn-copy:active { transform: translateY(1px); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }
    .prompt-box {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      font-family: "Menlo", "Consolas", monospace;
    }
    .prompt-jp {
      margin-top: 0.8rem;
      font-size: 0.82rem;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .copy-area { text-align: center; }
    .copy-msg { font-size: 0.78rem; color: var(--ok); margin-top: 0.4rem; min-height: 1em; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>90年代セル画アニメ風プロンプトメーカー</h1>
    <p class="subtitle">特徴を選ぶだけで、90年代セル画アニメ風AI画像のプロンプトが即完成</p>
  </header>

  <div class="card">
    <p class="card-title">特徴を選ぶ</p>
    <div class="field">
      <label for="subject">被写体</label>
      <select id="subject">
        <option value="a young girl with school uniform">女子高生（制服）</option>
        <option value="a young boy with school uniform">男子高生（制服）</option>
        <option value="a heroic warrior in armor">鎧の戦士・主人公</option>
        <option value="a magical girl with frilly costume">魔法少女</option>
        <option value="a mecha pilot in cockpit">メカパイロット</option>
        <option value="a cute cat character">猫キャラ</option>
        <option value="a cute dog character">犬キャラ</option>
        <option value="a chibi mascot creature">マスコット生き物</option>
      </select>
    </div>
    <div class="field">
      <label for="hair">髪色／毛色</label>
      <select id="hair">
        <option value="black hair">黒</option>
        <option value="dark brown hair">茶</option>
        <option value="blonde hair">金</option>
        <option value="silver hair">銀</option>
        <option value="bright red hair">赤</option>
        <option value="pink hair">ピンク</option>
        <option value="sky blue hair">水色</option>
        <option value="purple hair">紫</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情・ポーズ</label>
      <select id="expression">
        <option value="bright smile, hand waving">笑顔・手を振る</option>
        <option value="serious expression, determined eyes">真剣・凛々しい</option>
        <option value="slightly blushing, embarrassed">照れ・赤面</option>
        <option value="surprised face with sparkling eyes">驚き・キラキラ目</option>
        <option value="dynamic action pose">アクションポーズ</option>
        <option value="thoughtful, looking up at the sky">物思い・空を見上げる</option>
        <option value="laughing with eyes closed">大笑い</option>
      </select>
    </div>
    <div class="field">
      <label for="bg">背景・シーン</label>
      <select id="bg">
        <option value="classroom with afternoon sunlight">教室・午後の日差し</option>
        <option value="orange sunset cityscape">夕焼けの街</option>
        <option value="starry night sky with crescent moon">星空・三日月</option>
        <option value="cherry blossom street">桜並木</option>
        <option value="rainy street with neon signs">雨のネオン街</option>
        <option value="green countryside with blue sky">田舎・青空</option>
        <option value="futuristic neo-tokyo cityscape">近未来ネオ東京</option>
        <option value="quiet shrine path at dusk">夕暮れの神社</option>
      </select>
    </div>
    <div class="field">
      <label for="style">90年代画風要素</label>
      <select id="style">
        <option value="thick black ink outlines, hand-painted cel shading">太い黒線・手塗りセル画</option>
        <option value="film grain, slight VHS scanlines">フィルムグレイン・VHS走査線</option>
        <option value="muted vintage colors, slightly faded">くすんだ彩度・色褪せ感</option>
        <option value="dramatic high contrast lighting">ハイコントラスト照明</option>
        <option value="soft pastel colors, gentle gradient">パステル・優しいグラデ</option>
        <option value="pencil sketch lines, watercolor wash">鉛筆線・水彩</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">こだわり要素（任意・自由入力）</label>
      <input type="text" id="extra" placeholder="例: ロボット、猫耳、ゲーム機、桜吹雪 など">
      <p class="hint">英語でも日本語でもOK。空欄でも生成できます。</p>
    </div>
  </div>

  <button class="btn-calc" onclick="generatePrompt()">プロンプトを生成する</button>

  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト</p>
    <div class="prompt-box" id="promptBox"></div>
    <p class="prompt-jp" id="promptJp"></p>
    <div class="copy-area">
      <button class="btn-copy" onclick="copyPrompt()">📋 コピーする</button>
      <p class="copy-msg" id="copyMsg"></p>
    </div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、Stable Diffusion・Midjourney・NovelAI などの主要AI画像生成サービスで使えるよう、英語プロンプトを組み立てます。各サービスの利用規約・著作権に配慮してご利用ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORE_KEY = 'cel90s_prompt_v1';

  function loadPrev() {
    try {
      var s = localStorage.getItem(STORE_KEY);
      if (!s) return;
      var d = JSON.parse(s);
      ['subject','hair','expression','bg','style','extra'].forEach(function(k){
        if (d[k] != null) {
          var el = document.getElementById(k);
          if (el) el.value = d[k];
        }
      });
    } catch(e) {}
  }

  function savePrev(d) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {}
  }

  function getJpLabel(id) {
    var el = document.getElementById(id);
    if (!el || el.tagName !== 'SELECT') return el ? el.value : '';
    var opt = el.options[el.selectedIndex];
    return opt ? opt.text : '';
  }

  function generatePrompt() {
    var subject    = document.getElementById('subject').value;
    var hair       = document.getElementById('hair').value;
    var expression = document.getElementById('expression').value;
    var bg         = document.getElementById('bg').value;
    var style      = document.getElementById('style').value;
    var extra      = document.getElementById('extra').value.trim();

    savePrev({
      subject: subject, hair: hair, expression: expression,
      bg: bg, style: style, extra: extra
    });

    var base = '1990s Japanese anime style, retro cel-animation aesthetic, hand-drawn cel shading';
    var parts = [
      base,
      subject + ', ' + hair,
      expression,
      'background: ' + bg,
      style,
      'analog film look, nostalgic atmosphere, classic anime composition',
      'high quality, detailed, anime art'
    ];
    if (extra) parts.splice(5, 0, extra);

    var prompt = parts.join(', ');

    var jp = '【選択内容】被写体: ' + getJpLabel('subject')
           + ' / 髪色: ' + getJpLabel('hair')
           + ' / 表情: ' + getJpLabel('expression')
           + ' / 背景: ' + getJpLabel('bg')
           + ' / 画風: ' + getJpLabel('style')
           + (extra ? ' / こだわり: ' + extra : '');

    document.getElementById('promptBox').textContent = prompt;
    document.getElementById('promptJp').textContent = jp;
    document.getElementById('result').style.display = 'block';
    document.getElementById('copyMsg').textContent = '';

    setTimeout(function(){
      document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
    }, 50);
  }

  function copyPrompt() {
    var text = document.getElementById('promptBox').textContent;
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        document.getElementById('copyMsg').textContent = '✓ コピーしました';
      }).catch(function(){
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); document.getElementById('copyMsg').textContent = '✓ コピーしました'; }
    catch(e) { document.getElementById('copyMsg').textContent = '手動でコピーしてください'; }
    document.body.removeChild(ta);
  }

  loadPrev();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
