<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS成長管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>SNS成長管理</h1>

    <!-- 記録追加フォーム -->
    <section class="add-section">
      <h2>記録を追加</h2>
      <div class="form-row">
        <input type="text" id="snsName" placeholder="SNS名（例：Twitter/X）" autocomplete="off">
        <input type="number" id="followerCount" placeholder="フォロワー数" min="0">
        <input type="date" id="recordDate">
        <button id="addBtn">追加</button>
      </div>
    </section>

    <!-- SNSタブ -->
    <section class="tab-section" id="tabSection">
      <div class="tabs" id="tabs"></div>

      <!-- グラフ -->
      <div class="graph-area">
        <canvas id="chart" width="600" height="250"></canvas>
      </div>

      <!-- 一覧 -->
      <div class="list-area" id="listArea">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
