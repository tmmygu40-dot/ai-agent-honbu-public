<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚨 SNS詐欺見抜きクイズ</title>
  <meta name="description" content="詐欺メール・フィッシング詐欺の手口を10問で見抜く力がつくクイズ。知識がそのまま防御力に変わります。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #d9534f;
      --accent-light: #fff5f5;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b24040, 0 6px 16px rgba(217,83,79,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b24040, 0 2px 8px rgba(217,83,79,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .quiz-question {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 1rem; line-height: 1.5;
    }
    .quiz-options {
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .option-btn {
      padding: 0.8rem 1rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .option-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:first-child { font-weight: 600; color: var(--text); width: 70%; }
    .detail-table td:last-child { text-align: right; color: var(--accent); font-weight: 700; }

    .progress-bar {
      height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 0.8rem;
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🚨 SNS詐欺見抜きクイズ</h1>
    <p class="subtitle">詐欺メール・フィッシングの手口を10問で見抜く力がつくクイズ</p>
  </header>

  <div class="card" id="quiz-container" style="display:none">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p id="progress-text" style="font-size:0.82rem;color:var(--text-sub);margin-bottom:1rem;"></p>
    <p class="quiz-question" id="q-text"></p>
    <div class="quiz-options" id="q-options"></div>
    <button class="btn-calc" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <button class="btn-calc" id="start-btn" onclick="startQuiz()">クイズを開始</button>

  <div class="result-card" id="result">
    <p class="result-label">スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <div class="card" id="detail" style="display:none">
    <p class="card-title">詳細解説</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // クイズデータ
  var quizzes = [
    {
      q: '「あなたのAmazonアカウントが一時的に無効です。確認はここ」というメールが届きました。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '本物のAmazonからのメールはクリック不要。メール内に「確認はここ」というリンクがあれば、それはほぼ100%詐欺です。公式サイトから直接ログインしましょう。'
    },
    {
      q: '「24時間以内に返金手続きをしないと法的措置がとられます」という緊急メール。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '「24時間以内」「法的措置」などの急かし文言は詐欺の典型。正規企業は緊急で威迫することはありません。送信元をよく確認し、不明な場合は返信せず直接企業に連絡しましょう。'
    },
    {
      q: 'メール内の添付ファイル「invoice_payment.exe」をダウンロードするよう指示されました。これは安全ですか？',
      options: ['安全', '危険'],
      answer: 1,
      desc: '実行ファイル（.exe）の添付は詐欺・マルウェアの典型的な配布方法です。.exeファイルは絶対に開かないようにしましょう。見積書・請求書は通常PDFで送られます。'
    },
    {
      q: 'あなたのメールアドレスで「銀行のセキュリティアラート」が届き、パスワードの確認を求めています。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '本物の銀行は絶対にメール経由でパスワードを求めません。これはフィッシング詐欺です。銀行アプリで直接ログインして確認するか、電話で銀行に連絡しましょう。'
    },
    {
      q: 'SNSで「あなたがタグ付けされた写真があります。確認するにはここをクリック」というメッセージ。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: 'SNS詐欺の典型。リンクをクリックするとなりすましサイトに誘導され、アカウント情報を盗まれます。このようなメッセージは公式SNS内の通知で届きます。メッセージのリンクはクリックしないようにしましょう。'
    },
    {
      q: 'クレジットカード会社から「不正使用の可能性があるため、確認ページでカード番号を入力してください」というメール。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '本物のクレジットカード会社は絶対にメール経由でカード番号を求めません。これはフィッシング詐欺です。電話またはカード会社の公式サイトから直接ログインして確認しましょう。'
    },
    {
      q: 'メールの差出人が「no-reply@paypal-security.co.jp」で、PayPalのセキュリティアラート。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '本物のPayPal公式メールは「@paypal.com」など信頼できるドメインから送られます。ドメインが少し異なる場合は詐欺の可能性が高いです。必ずドメインを確認しましょう。'
    },
    {
      q: '「あなたが応募した懸賞に当選しました。景品受取のため個人情報を確認してください」というメール。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '応募した覚えのない懸賞当選は詐欺です。また正規企業は当選時に個人情報をメール経由で求めることはありません。無視してメールを削除しましょう。'
    },
    {
      q: 'あなたのGoogle アカウントから異常ログイン検出メール。リンクをクリックすると本物そっくりのGoogleログインページが表示されました。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: 'これはフィッシング詐欺です。本物そっくりのサイトに誘導されて、アカウント情報を盗まれます。公式ページはブックマークから、またはスマホアプリのGoogleで直接ログインしましょう。'
    },
    {
      q: 'メールのテキストは日本語ですが、差出人名・メールアドレス・リンク先がすべて外国語です。これは詐欺ですか？',
      options: ['詐欺', '正規'],
      answer: 0,
      desc: '日本語と外国語が混在しているメール、差出人情報がおかしい場合は詐欺の可能性が非常に高いです。送信元の信頼性を確認し、不審なリンクはクリックしないでください。'
    }
  ];

  var currentQuestion = 0;
  var correctCount = 0;
  var answers = [];
  var quizStarted = false;

  function startQuiz() {
    currentQuestion = 0;
    correctCount = 0;
    answers = [];
    quizStarted = true;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('quiz-container').style.display = '';
    showQuestion();
  }

  function showQuestion() {
    var q = quizzes[currentQuestion];
    document.getElementById('q-text').textContent = '【問題 ' + (currentQuestion + 1) + '】 ' + q.q;
    document.getElementById('progress-text').textContent = '問 ' + (currentQuestion + 1) + ' / 10';
    var pct = ((currentQuestion) / 10 * 100);
    document.getElementById('progress-fill').style.width = pct + '%';

    var optionsHtml = '';
    q.options.forEach(function(opt, idx) {
      optionsHtml += '<button class="option-btn" onclick="selectAnswer(' + idx + ')">' + opt + '</button>';
    });
    document.getElementById('q-options').innerHTML = optionsHtml;
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectAnswer(idx) {
    var q = quizzes[currentQuestion];
    answers.push(idx);
    if (idx === q.answer) {
      correctCount++;
    }
    document.querySelectorAll('.option-btn').forEach(function(btn) { btn.disabled = true; });
    document.querySelectorAll('.option-btn')[idx].classList.add('selected');
    document.getElementById('next-btn').style.display = 'block';
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < quizzes.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-btn').textContent = 'もう一度やる';

    var score = correctCount;
    var pct = (score / 10 * 100).toFixed(0);
    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    var msg = level === 'ok'   ? '詐欺見抜き力が高い！今後も注意を続けましょう'
            : level === 'warn' ? '詐欺の手口をもう少し知ると、さらに安全になります'
            : '詐欺の知識をつけることが大切です。もう一度チャレンジ！';

    var rv = document.getElementById('result');
    rv.className = 'result-card ' + level;
    rv.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / 10 点';
    document.getElementById('rn').textContent = msg;

    showDetail();
    localStorage.setItem('sns_fraud_quiz_score', score);
  }

  function showDetail() {
    var rows = [];
    quizzes.forEach(function(q, idx) {
      var userAns = answers[idx];
      var isCorrect = userAns === q.answer;
      var answerText = q.options[userAns] || '未回答';
      var correctText = q.options[q.answer];
      var status = isCorrect ? '✓' : '✗';
      rows.push([
        status + ' 問' + (idx + 1) + ': ' + q.q.substring(0, 30) + '...',
        (isCorrect ? '◎ ' : '☓ ') + (isCorrect ? '正解' : '不正解')
      ]);
    });

    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  // ページ読み込み時に前回スコアを表示
  window.addEventListener('load', function() {
    var savedScore = localStorage.getItem('sns_fraud_quiz_score');
    if (savedScore && !quizStarted) {
      // 起動時のみ保存スコア表示可能（オプション）
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <p style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、警察庁・総務省・国民生活センターなどの官公庁資料や、信頼できる公開データを参考に、詐欺防止教育として使いやすく整理しています。最新の詐欺手口については公式情報をご確認ください。
  </p>
</body>
</html>
