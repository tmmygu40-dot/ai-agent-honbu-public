<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来客カウンターアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>来客カウンター</h1>
      <div class="date-display" id="dateDisplay"></div>
    </header>

    <section class="counter-section">
      <div class="total-count">
        <span class="total-label">本日の来客数</span>
        <span class="total-number" id="totalCount">0</span>
        <span class="total-unit">人</span>
      </div>
      <button class="count-btn" id="countBtn" onclick="addCount()">
        <span class="count-icon">+1</span>
        <span class="count-label">タップして記録</span>
      </button>
      <button class="undo-btn" id="undoBtn" onclick="undoCount()">1件取り消す</button>
    </section>

    <section class="hourly-section">
      <div class="section-header">
        <h2>時間帯別来客数</h2>
        <button class="reset-btn" onclick="confirmReset()">本日リセット</button>
      </div>
      <div class="hourly-table" id="hourlyTable"></div>
    </section>

    <section class="history-section">
      <div class="section-header">
        <h2>過去の記録</h2>
        <button class="clear-history-btn" onclick="confirmClearHistory()">履歴削除</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </div>

  <div class="modal" id="confirmModal" style="display:none;">
    <div class="modal-content">
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="modal-ok" id="modalOkBtn">OK</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
