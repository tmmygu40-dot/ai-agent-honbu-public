<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来客カウンターアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://nekopoke.jp/%E6%9D%A5%E5%AE%A2%E3%82%AB%E3%82%A6%E3%83%B3%E3%82%BF%E3%83%BC%E3%82%A2%E3%83%97%E3%83%AA/" />
  <meta name="description" content="来客カウンター。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。">
  <script type="application/ld+json">
{"@context":"https://schema.org","@type":"SoftwareApplication","name":"来客カウンター","description":"来客カウンター。選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E6%9D%A5%E5%AE%A2%E3%82%AB%E3%82%A6%E3%83%B3%E3%82%BF%E3%83%BC%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="app">
    <header>
      <h1>来客カウンター</h1>
      <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">選択や入力するだけで結果をすぐ確認できるツールです。スマホでも快適にご利用いただけます。</p>
      <div class="date-display" id="dateDisplay"></div>
    </header>

    <section class="counter-section">
      <div class="total-count">
        <span class="total-label">本日の来客数</span>
        <span class="total-number" id="totalCount">0</span>
        <span class="total-unit">人</span>
      </div>
      <button class="count-btn" id="countBtn" onclick="addCount()">
        <span class="count-icon">+1</span>
        <span class="count-label">タップして記録</span>
      </button>
      <button class="undo-btn" id="undoBtn" onclick="undoCount()">1件取り消す</button>
    </section>

    <section class="hourly-section">
      <div class="section-header">
        <h2>時間帯別来客数</h2>
        <button class="reset-btn" onclick="confirmReset()">本日リセット</button>
      </div>
      <div class="hourly-table" id="hourlyTable"></div>
    </section>

    <section class="history-section">
      <div class="section-header">
        <h2>過去の記録</h2>
        <button class="clear-history-btn" onclick="confirmClearHistory()">履歴削除</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </div>

  <div class="modal" id="confirmModal" style="display:none;">
    <div class="modal-content">
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="modal-ok" id="modalOkBtn" onclick="if(typeof pendingAction==='function'){pendingAction();closeModal();}">OK</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。重要な判断の根拠にはしないでください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. 何回でも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、何度でもご利用いただけます。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
