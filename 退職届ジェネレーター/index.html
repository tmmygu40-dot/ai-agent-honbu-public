<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退職届ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 出力カード ── */
    .output-card {
      display: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }

    /* ── 退職届プレビュー ── */
    .doc-preview {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2rem 1.5rem;
      font-size: 0.95rem;
      line-height: 2;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      margin-bottom: 1rem;
    }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%;
      padding: 0.8rem;
      font-size: 1rem; font-weight: 700;
      background: var(--ok-bg); color: var(--ok);
      border: 2px solid var(--ok); border-radius: 9px; cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: #dcfce7; }
    .btn-copy.copied {
      background: var(--ok); color: #fff;
    }

    /* ── 履歴 ── */
    .history-item {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.82rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: var(--accent-light); }
    .history-item .hi-title { font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
    .history-item .hi-date { font-size: 0.72rem; }
    .no-history { text-align: center; color: var(--text-sub); font-size: 0.85rem; padding: 1rem 0; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count

</head>
<body>

  <header class="app-header">
    <h1>退職届ジェネレーター</h1>
    <p class="subtitle">退職理由と退職日を入れるだけで退職届の文面を即生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">基本情報</p>
    <div class="field">
      <label for="company">会社名</label>
      <input type="text" id="company" placeholder="例: 株式会社〇〇">
    </div>
    <div class="field">
      <label for="dept">部署名（任意）</label>
      <input type="text" id="dept" placeholder="例: 営業部">
    </div>
    <div class="field">
      <label for="name">氏名</label>
      <input type="text" id="name" placeholder="例: 山田 太郎">
    </div>
    <div class="field">
      <label for="submitDate">提出日</label>
      <input type="date" id="submitDate">
    </div>
    <div class="field">
      <label for="quitDate">退職希望日</label>
      <input type="date" id="quitDate">
    </div>
  </div>

  <div class="card">
    <p class="card-title">退職理由</p>
    <div class="field">
      <label for="reasonSelect">理由の種類</label>
      <select id="reasonSelect" onchange="updateReason()">
        <option value="一身上の都合">一身上の都合</option>
        <option value="健康上の理由">健康上の理由</option>
        <option value="家庭の事情">家庭の事情</option>
        <option value="転職のため">転職のため</option>
        <option value="一身上の都合（カスタム）">自由入力</option>
      </select>
    </div>
    <div class="field" id="customReasonField" style="display:none">
      <label for="customReason">退職理由（自由入力）</label>
      <input type="text" id="customReason" placeholder="例: 起業のため">
    </div>
    <div class="field">
      <label for="docType">書類の種類</label>
      <select id="docType">
        <option value="退職届">退職届（一方的に退職を通知）</option>
        <option value="退職願">退職願（承認をお願いする形式）</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">退職届を生成する</button>

  <!-- 出力カード -->
  <div class="output-card" id="outputCard">
    <p class="card-title">生成された文面</p>
    <div class="doc-preview" id="docPreview"></div>
    <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 クリップボードにコピー</button>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard">
    <p class="card-title">生成履歴（最大5件）</p>
    <div id="historyList"><p class="no-history">まだ履歴がありません</p></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var STORAGE_KEY = 'quitLetterGen_v1';

  /* ── 初期化 ── */
  window.addEventListener('DOMContentLoaded', function() {
    loadInputs();
    renderHistory();
  });

  /* ── 理由切り替え ── */
  function updateReason() {
    var sel = document.getElementById('reasonSelect').value;
    var show = sel === '一身上の都合（カスタム）';
    document.getElementById('customReasonField').style.display = show ? '' : 'none';
  }

  /* ── 生成 ── */
  function generate() {
    var company    = document.getElementById('company').value.trim();
    var dept       = document.getElementById('dept').value.trim();
    var name       = document.getElementById('name').value.trim();
    var submitDate = document.getElementById('submitDate').value;
    var quitDate   = document.getElementById('quitDate').value;
    var reasonSel  = document.getElementById('reasonSelect').value;
    var custom     = document.getElementById('customReason').value.trim();
    var docType    = document.getElementById('docType').value;

    if (!company || !name || !submitDate || !quitDate) {
      alert('会社名・氏名・提出日・退職希望日は必須です。');
      return;
    }

    var reason = reasonSel === '一身上の都合（カスタム）' ? (custom || '一身上の都合') : reasonSel;
    var qDate  = formatJpDate(quitDate);
    var sDate  = formatJpDate(submitDate);
    var toLine = dept ? company + '\n' + dept + '御中' : company + '\n御中';

    var text;
    if (docType === '退職届') {
      text = [
        '退職届',
        '',
        '　私儀、このたび一身上の都合により、令和' + qDate + 'をもちまして退職いたします。',
        reason !== '一身上の都合'
          ? '　退職理由：' + reason
          : '',
        '',
        '以上',
        '',
        '　　' + sDate,
        '　　' + name,
        '',
        toLine,
      ].filter(function(l, i, arr) {
        // 空行が連続する場合は1つに
        return !(l === '' && arr[i - 1] === '');
      }).join('\n');
    } else {
      text = [
        '退職願',
        '',
        '　私儀、このたび一身上の都合により、令和' + qDate + 'をもって退職いたしたく、ここにお願い申し上げます。',
        reason !== '一身上の都合'
          ? '　退職理由：' + reason
          : '',
        '',
        '以上',
        '',
        '　　' + sDate,
        '　　' + name,
        '',
        toLine,
      ].filter(function(l, i, arr) {
        return !(l === '' && arr[i - 1] === '');
      }).join('\n');
    }

    document.getElementById('docPreview').textContent = text;
    document.getElementById('outputCard').style.display = 'block';
    document.getElementById('copyBtn').textContent = '📋 クリップボードにコピー';
    document.getElementById('copyBtn').classList.remove('copied');

    saveInputs();
    saveHistory({ name: name, company: company, docType: docType, date: sDate, text: text });
    renderHistory();

    document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ── コピー ── */
  function copyText() {
    var text = document.getElementById('docPreview').textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 クリップボードにコピー';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('コピーしました。');
    });
  }

  /* ── 日付フォーマット ── */
  function formatJpDate(dateStr) {
    var d = new Date(dateStr);
    var y = d.getFullYear();
    var m = d.getMonth() + 1;
    var day = d.getDate();
    var reiwa = y - 2018;
    return reiwa + '年' + m + '月' + day + '日';
  }

  /* ── localStorage ── */
  function saveInputs() {
    var data = {
      company: document.getElementById('company').value,
      dept: document.getElementById('dept').value,
      name: document.getElementById('name').value,
      submitDate: document.getElementById('submitDate').value,
      quitDate: document.getElementById('quitDate').value,
      reasonSelect: document.getElementById('reasonSelect').value,
      customReason: document.getElementById('customReason').value,
      docType: document.getElementById('docType').value,
    };
    localStorage.setItem(STORAGE_KEY + '_inputs', JSON.stringify(data));
  }

  function loadInputs() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY + '_inputs');
      if (!raw) return;
      var d = JSON.parse(raw);
      ['company','dept','name','submitDate','quitDate','reasonSelect','customReason','docType'].forEach(function(k) {
        if (d[k] !== undefined) document.getElementById(k).value = d[k];
      });
      updateReason();
    } catch(e) {}
  }

  function saveHistory(entry) {
    try {
      var hist = JSON.parse(localStorage.getItem(STORAGE_KEY + '_history') || '[]');
      hist.unshift(entry);
      if (hist.length > 5) hist = hist.slice(0, 5);
      localStorage.setItem(STORAGE_KEY + '_history', JSON.stringify(hist));
    } catch(e) {}
  }

  function renderHistory() {
    try {
      var hist = JSON.parse(localStorage.getItem(STORAGE_KEY + '_history') || '[]');
      var el = document.getElementById('historyList');
      if (!hist.length) {
        el.innerHTML = '<p class="no-history">まだ履歴がありません</p>';
        return;
      }
      el.innerHTML = hist.map(function(h, i) {
        return '<div class="history-item" onclick="loadHistory(' + i + ')">'
          + '<div class="hi-title">' + h.docType + '　' + h.company + '　' + h.name + '</div>'
          + '<div class="hi-date">' + h.date + '</div>'
          + '</div>';
      }).join('');
    } catch(e) {}
  }

  function loadHistory(idx) {
    try {
      var hist = JSON.parse(localStorage.getItem(STORAGE_KEY + '_history') || '[]');
      var h = hist[idx];
      if (!h) return;
      document.getElementById('docPreview').textContent = h.text;
      document.getElementById('outputCard').style.display = 'block';
      document.getElementById('copyBtn').textContent = '📋 クリップボードにコピー';
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch(e) {}
  }
  </script>

</body>
