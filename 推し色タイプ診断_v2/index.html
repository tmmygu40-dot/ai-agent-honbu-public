<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し色タイプ診断 - 3問で分かるあなたのカラー</title>
  <meta name="description" content="3問の3択に答えるだけで、あなたにぴったりの推し色タイプ（赤・青・黄・紫・緑・桃・白・黒）が分かる無料診断アプリです。性格傾向と相性タイプもチェックできます。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .question { font-size: 1rem; font-weight: 700; margin-bottom: 0.8rem; line-height: 1.5; }
    .choice {
      display: block; width: 100%; padding: 0.85rem 1rem;
      margin-bottom: 0.6rem; font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

    .btn-retry {
      display: block; margin: 1rem auto 0; padding: 0.7rem 1.4rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none;
      border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
      border: 2px solid var(--border);
      background: var(--card);
    }
    .color-circle {
      display: inline-block; width: 90px; height: 90px;
      border-radius: 50%; margin-bottom: 0.8rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      border: 4px solid #fff;
    }
    .result-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.6rem; }
    .result-catch { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.8rem; color: var(--text); }
    .result-desc { font-size: 0.9rem; color: var(--text-sub); line-height: 1.7; text-align: left; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .result-desc strong { color: var(--text); display: inline-block; min-width: 5em; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>推し色タイプ診断</h1>
    <p class="subtitle">3問の3択であなたの推し色タイプ（8色）が分かる</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">3問クイズ</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" id="btn-judge" onclick="judge()" disabled>診断する</button>

  <div class="result-card" id="result">
    <span class="color-circle" id="rcircle"></span>
    <p class="result-label">あなたの推し色タイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-catch" id="rcatch"></p>
    <div class="result-desc" id="rdesc"></div>
    <button class="btn-retry" onclick="retry()">もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは推し活ファン向けのエンタメ診断です。色彩心理の一般的な傾向を参考にしていますが、占い・診断結果は楽しみ方の一例としてお使いください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: 'Q1. 推しイベントの帰り道、あなたは？',
      choices: [
        { text: '余韻に浸って涙ぐむ', scores: { pink: 2, purple: 2, white: 1 } },
        { text: 'SNSで全力レポを書く', scores: { red: 2, yellow: 2, blue: 1 } },
        { text: '黙って次の現場の予定を組む', scores: { black: 2, blue: 2, green: 1 } }
      ]
    },
    {
      q: 'Q2. 推しのどこに一番グッとくる？',
      choices: [
        { text: '情熱的でエネルギッシュなところ', scores: { red: 3, yellow: 1 } },
        { text: 'ミステリアスでクールなところ', scores: { black: 3, purple: 2, blue: 1 } },
        { text: '優しくて癒されるところ', scores: { pink: 3, green: 2, white: 1 } }
      ]
    },
    {
      q: 'Q3. 推し活グッズで最初に買うのは？',
      choices: [
        { text: 'ペンライト・うちわ（現場必須系）', scores: { red: 2, yellow: 2, blue: 1 } },
        { text: 'アクスタ・ぬい（眺めて癒される系）', scores: { pink: 2, white: 2, green: 1 } },
        { text: '写真集・ブルーレイ（じっくり鑑賞系）', scores: { purple: 2, black: 2, blue: 1 } }
      ]
    }
  ];

  var TYPES = {
    red:    { name: '赤タイプ', hex: '#e63946', catch: '燃える情熱の応援団長', personality: 'エネルギッシュで一途。推しへの愛は誰よりも熱く、現場で一番声を出すタイプ。', match: '黄タイプ・桃タイプ' },
    blue:   { name: '青タイプ', hex: '#1d72b8', catch: 'クールに支える知的サポーター', personality: '冷静に推しの活動を分析し、長期目線で支える。データ・年表に強い。', match: '紫タイプ・白タイプ' },
    yellow: { name: '黄タイプ', hex: '#f4c430', catch: '元気いっぱいムードメーカー', personality: '明るく社交的で、推し友をすぐ作れる。現場の空気を盛り上げる存在。', match: '赤タイプ・緑タイプ' },
    purple: { name: '紫タイプ', hex: '#7b3fa0', catch: 'ミステリアスな深掘り探究者', personality: '推しの隠れた一面まで愛する。考察・解釈に没頭するタイプ。', match: '青タイプ・黒タイプ' },
    green:  { name: '緑タイプ', hex: '#3a9d5d', catch: '癒し系の安定供給オタク', personality: 'マイペースに推しを愛で、日常に推しを溶け込ませる。長く推せる人。', match: '白タイプ・黄タイプ' },
    pink:   { name: '桃タイプ', hex: '#ff7eb6', catch: 'ときめき全開のロマンチスト', personality: '推しの可愛い・尊い瞬間を集める達人。感情表現が豊か。', match: '赤タイプ・白タイプ' },
    white:  { name: '白タイプ', hex: '#e6e6e6', catch: '純粋無垢な推しの守護者', personality: '推しの幸せを第一に考え、清く正しく応援するタイプ。安定感あり。', match: '青タイプ・緑タイプ' },
    black:  { name: '黒タイプ', hex: '#222222', catch: '硬派でストイックなガチ勢', personality: '寡黙だが熱量は最大級。推しのために時間もお金も惜しまない覚悟派。', match: '紫タイプ・赤タイプ' }
  };

  var STORAGE_KEY = 'oshicolor_v2_last';
  var answers = [null, null, null];

  function renderQuestions() {
    var html = '';
    QUESTIONS.forEach(function(qObj, qi) {
      html += '<div style="margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);">';
      html += '<p class="question">' + qObj.q + '</p>';
      qObj.choices.forEach(function(c, ci) {
        html += '<button class="choice" data-q="' + qi + '" data-c="' + ci + '" onclick="select(' + qi + ',' + ci + ')">' + c.text + '</button>';
      });
      html += '</div>';
    });
    document.getElementById('questions').innerHTML = html;
  }

  function select(qi, ci) {
    answers[qi] = ci;
    var btns = document.querySelectorAll('.choice[data-q="' + qi + '"]');
    btns.forEach(function(b, i) {
      if (i === ci) b.classList.add('selected');
      else b.classList.remove('selected');
    });
    document.getElementById('btn-judge').disabled = answers.indexOf(null) !== -1;
  }

  function judge() {
    if (answers.indexOf(null) !== -1) return;
    var totals = { red:0, blue:0, yellow:0, purple:0, green:0, pink:0, white:0, black:0 };
    answers.forEach(function(ci, qi) {
      var sc = QUESTIONS[qi].choices[ci].scores;
      Object.keys(sc).forEach(function(k) { totals[k] += sc[k]; });
    });
    var best = Object.keys(totals).reduce(function(a, b) { return totals[a] >= totals[b] ? a : b; });
    showResult(best);
    try { localStorage.setItem(STORAGE_KEY, best); } catch(e) {}
  }

  function showResult(typeKey) {
    var t = TYPES[typeKey];
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('rcircle').style.background = t.hex;
    document.getElementById('rv').textContent = t.name;
    document.getElementById('rcatch').textContent = '「' + t.catch + '」';
    document.getElementById('rdesc').innerHTML =
      '<p style="margin-bottom:0.6rem;"><strong>性格傾向：</strong>' + t.personality + '</p>' +
      '<p><strong>相性タイプ：</strong>' + t.match + '</p>';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function retry() {
    answers = [null, null, null];
    document.querySelectorAll('.choice').forEach(function(b) { b.classList.remove('selected'); });
    document.getElementById('btn-judge').disabled = true;
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  renderQuestions();

  // 直近結果を復元表示（参考表示）
  try {
    var last = localStorage.getItem(STORAGE_KEY);
    if (last && TYPES[last]) {
      // 結果の見た目だけ復元（ボタンは無効のまま）
      showResult(last);
    }
  } catch(e) {}
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
