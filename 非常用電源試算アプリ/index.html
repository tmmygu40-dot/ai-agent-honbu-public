<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>非常用電源試算アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 2カラムフィールド ── */
    .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .fields-row .field { margin-bottom: 0; }

    /* ── 機器リスト ── */
    .device-add-row {
      display: grid; grid-template-columns: 1fr 130px auto; gap: 0.5rem; margin-bottom: 0.75rem; align-items: end;
    }
    .device-add-row .field { margin-bottom: 0; }
    .btn-add {
      padding: 0.72rem 0.8rem; font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none; border-radius: 9px;
      cursor: pointer; white-space: nowrap; height: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .device-list { list-style: none; margin-top: 0.75rem; }
    .device-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 0.75rem; background: var(--bg); border-radius: 8px;
      margin-bottom: 0.4rem; font-size: 0.88rem;
    }
    .device-item .d-name { font-weight: 600; }
    .device-item .d-watts { color: var(--text-sub); margin-left: 0.5rem; }
    .device-item .btn-del {
      background: none; border: none; cursor: pointer; color: var(--ng);
      font-size: 1.1rem; padding: 0 0.3rem; -webkit-tap-highlight-color: transparent;
    }
    .device-total {
      text-align: right; font-size: 0.88rem; color: var(--text-sub);
      margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border);
    }
    .device-total span { font-weight: 700; color: var(--text); font-size: 1rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── サマリーグリッド ── */
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.75rem; margin: 0 auto 1rem; max-width: 600px;
    }
    .sg-item {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1rem;
      box-shadow: var(--shadow); text-align: center;
    }
    .sg-label { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .sg-value { font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; line-height: 1.1; }
    .sg-unit  { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.2rem; }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 負荷バー ── */
    .load-bar-wrap { margin: 0.5rem 0; }
    .load-bar-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .load-bar-track { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
    .load-bar-fill  { height: 100%; border-radius: 99px; transition: width 0.4s; }
    .load-bar-fill.ok   { background: var(--ok); }
    .load-bar-fill.warn { background: var(--warn); }
    .load-bar-fill.ng   { background: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── no-device ── */
    .no-device { text-align: center; font-size: 0.82rem; color: var(--text-sub); padding: 1rem 0; }
  
    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>⚡ 非常用電源試算アプリ</h1>
    <p class="subtitle">発電機スペックと接続機器を入れて稼働時間・燃料コストを即計算</p>
  </header>

  <!-- 発電機スペック -->
  <div class="card">
    <p class="card-title">発電機スペック</p>
    <div class="field">
      <label for="gen-name">発電機名（任意）</label>
      <input type="text" id="gen-name" placeholder="例: ヤマハ EF1600iS">
    </div>
    <div class="fields-row">
      <div class="field">
        <label for="gen-power">定格出力（W）</label>
        <input type="number" id="gen-power" placeholder="例: 1600" min="1" inputmode="numeric">
        <p class="hint">メーカー仕様の定格出力</p>
      </div>
      <div class="field">
        <label for="gen-tank">タンク容量（L）</label>
        <input type="number" id="gen-tank" placeholder="例: 4.1" min="0.1" step="0.1" inputmode="decimal">
        <p class="hint">燃料タンク容量</p>
      </div>
    </div>
    <div class="fields-row">
      <div class="field">
        <label for="gen-fuel">燃料消費量（L/h）</label>
        <input type="number" id="gen-fuel" placeholder="例: 0.65" min="0.01" step="0.01" inputmode="decimal">
        <p class="hint">定格時の燃費</p>
      </div>
      <div class="field">
        <label for="fuel-price">燃料単価（円/L）</label>
        <input type="number" id="fuel-price" value="170" min="1" inputmode="numeric">
        <p class="hint">ガソリン単価</p>
      </div>
    </div>
  </div>

  <!-- 接続機器 -->
  <div class="card">
    <p class="card-title">接続する機器</p>
    <div class="device-add-row">
      <div class="field">
        <label for="dev-name">機器名</label>
        <input type="text" id="dev-name" placeholder="例: 冷蔵庫">
      </div>
      <div class="field">
        <label for="dev-watts">消費電力（W）</label>
        <input type="number" id="dev-watts" placeholder="例: 200" min="1" inputmode="numeric">
      </div>
      <button class="btn-add" onclick="addDevice()">追加</button>
    </div>
    <ul class="device-list" id="device-list">
      <li class="no-device" id="no-device">機器が登録されていません</li>
    </ul>
    <div class="device-total">
      合計消費電力：<span id="total-watts">0</span> W
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">稼働時間・燃料コストを計算</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">稼働可能時間</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note"  id="rn"></p>
  </div>

  <!-- サマリーグリッド -->
  <div class="summary-grid" id="summary" style="display:none">
    <div class="sg-item">
      <p class="sg-label">総燃料コスト</p>
      <p class="sg-value" id="sg-cost">—</p>
      <p class="sg-unit">満タン1回分</p>
    </div>
    <div class="sg-item">
      <p class="sg-label">1時間あたり燃料費</p>
      <p class="sg-value" id="sg-cost-h">—</p>
      <p class="sg-unit">円/時間</p>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳</p>
    <div class="load-bar-wrap" id="load-bar-wrap" style="margin-bottom:1rem">
      <div class="load-bar-label">
        <span>発電機負荷</span>
        <span id="load-pct-label">0%</span>
      </div>
      <div class="load-bar-track">
        <div class="load-bar-fill" id="load-bar-fill" style="width:0%"></div>
      </div>
    </div>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>


  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var devices = [];

  function addDevice() {
    var name   = document.getElementById('dev-name').value.trim();
    var watts  = parseFloat(document.getElementById('dev-watts').value);
    if (!name)          { alert('機器名を入力してください'); return; }
    if (isNaN(watts) || watts <= 0) { alert('消費電力（W）を正しく入力してください'); return; }
    devices.push({ name: name, watts: watts });
    document.getElementById('dev-name').value  = '';
    document.getElementById('dev-watts').value = '';
    renderDevices();
    saveLS();
  }

  function removeDevice(i) {
    devices.splice(i, 1);
    renderDevices();
    saveLS();
  }

  function renderDevices() {
    var ul = document.getElementById('device-list');
    var nd = document.getElementById('no-device');
    var total = devices.reduce(function(s, d){ return s + d.watts; }, 0);
    document.getElementById('total-watts').textContent = fmt(total);

    if (devices.length === 0) {
      ul.innerHTML = '';
      ul.appendChild(nd);
      nd.style.display = '';
      return;
    }
    nd.style.display = 'none';
    ul.innerHTML = devices.map(function(d, i){
      return '<li class="device-item">'
           + '<span class="d-name">' + esc(d.name) + '</span>'
           + '<span class="d-watts">' + fmt(d.watts) + ' W</span>'
           + '<button class="btn-del" onclick="removeDevice(' + i + ')" aria-label="削除">✕</button>'
           + '</li>';
    }).join('');
  }

  function calc() {
    var genPower  = parseFloat(document.getElementById('gen-power').value);
    var tankCap   = parseFloat(document.getElementById('gen-tank').value);
    var fuelRate  = parseFloat(document.getElementById('gen-fuel').value);
    var fuelPrice = parseFloat(document.getElementById('fuel-price').value);

    if (isNaN(genPower) || genPower <= 0) { showErr('定格出力を入力してください'); return; }
    if (isNaN(tankCap)  || tankCap  <= 0) { showErr('タンク容量を入力してください'); return; }
    if (isNaN(fuelRate) || fuelRate <= 0) { showErr('燃料消費量を入力してください'); return; }
    if (isNaN(fuelPrice)|| fuelPrice<= 0) { showErr('燃料単価を入力してください'); return; }
    if (devices.length === 0)             { showErr('接続する機器を1つ以上追加してください'); return; }

    var totalLoad  = devices.reduce(function(s, d){ return s + d.watts; }, 0);
    var loadRatio  = totalLoad / genPower * 100;
    var runtime    = tankCap / fuelRate;             // 時間
    var totalCost  = tankCap * fuelPrice;            // 円
    var costPerH   = fuelRate * fuelPrice;           // 円/時間

    // 稼働時間の整形
    var rh = Math.floor(runtime);
    var rm = Math.round((runtime - rh) * 60);
    var rtStr = rh + '時間' + (rm > 0 ? rm + '分' : '');

    // 判定
    var level, note;
    if (totalLoad > genPower) {
      level = 'ng';
      note  = '接続機器の合計が定格出力を超えています。機器を減らしてください。';
    } else if (loadRatio > 80) {
      level = 'warn';
      note  = '発電機への負荷が高め（' + loadRatio.toFixed(0) + '%）です。長時間稼働には注意が必要です。';
    } else {
      level = 'ok';
      note  = '発電機の負荷は安全範囲内（' + loadRatio.toFixed(0) + '%）です。安定して稼働できます。';
    }

    // 結論カード
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = rtStr;
    document.getElementById('rn').textContent = note;

    // サマリーグリッド
    document.getElementById('sg-cost').textContent   = '¥' + fmt(totalCost);
    document.getElementById('sg-cost-h').textContent = '¥' + fmt(Math.round(costPerH));
    document.getElementById('summary').style.display = '';

    // 負荷バー
    var fillW = Math.min(loadRatio, 100).toFixed(1);
    var fillEl = document.getElementById('load-bar-fill');
    fillEl.style.width = fillW + '%';
    fillEl.className = 'load-bar-fill ' + level;
    document.getElementById('load-pct-label').textContent = loadRatio.toFixed(1) + '%';

    // 内訳テーブル
    var rows = [
      ['定格出力',         fmt(genPower) + ' W'],
      ['合計消費電力',      fmt(totalLoad) + ' W'],
      ['負荷率',           loadRatio.toFixed(1) + ' %'],
      ['タンク容量',        tankCap + ' L'],
      ['燃料消費量',        fuelRate + ' L/h'],
      ['稼働可能時間',      rtStr, true],
      ['総燃料コスト',      '¥' + fmt(totalCost), true],
      ['燃料費（1時間）',   '¥' + fmt(Math.round(costPerH))],
    ];
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';

    saveLS();
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng'; rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('detail').style.display  = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── localStorage ── */
  var LS_KEY = 'hijo_dengen_v1';
  function saveLS() {
    var data = {
      genName:    document.getElementById('gen-name').value,
      genPower:   document.getElementById('gen-power').value,
      genTank:    document.getElementById('gen-tank').value,
      genFuel:    document.getElementById('gen-fuel').value,
      fuelPrice:  document.getElementById('fuel-price').value,
      devices:    devices
    };
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadLS() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data.genName   !== undefined) document.getElementById('gen-name').value   = data.genName;
      if (data.genPower  !== undefined) document.getElementById('gen-power').value  = data.genPower;
      if (data.genTank   !== undefined) document.getElementById('gen-tank').value   = data.genTank;
      if (data.genFuel   !== undefined) document.getElementById('gen-fuel').value   = data.genFuel;
      if (data.fuelPrice !== undefined) document.getElementById('fuel-price').value = data.fuelPrice;
      if (Array.isArray(data.devices))  devices = data.devices;
      renderDevices();
    } catch(e) {}
  }

  /* 入力変更時にオートセーブ */
  ['gen-name','gen-power','gen-tank','gen-fuel','fuel-price'].forEach(function(id){
    document.getElementById(id).addEventListener('change', saveLS);
  });

  /* Enter で機器追加 */
  document.getElementById('dev-watts').addEventListener('keydown', function(e){
    if (e.key === 'Enter') addDevice();
  });

  loadLS();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
