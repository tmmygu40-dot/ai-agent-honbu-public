<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血糖値管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>血糖値管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="card form-section">
      <h2>記録を追加</h2>
      <div class="form-group">
        <label for="timing">食前 / 食後</label>
        <select id="timing">
          <option value="食前">食前</option>
          <option value="食後">食後</option>
        </select>
      </div>
      <div class="form-group">
        <label for="datetime">日時</label>
        <input type="datetime-local" id="datetime">
      </div>
      <div class="form-group">
        <label for="meal">食事内容</label>
        <input type="text" id="meal" placeholder="例：朝食（ご飯・味噌汁）">
      </div>
      <div class="form-group">
        <label for="glucose">血糖値（mg/dL）</label>
        <input type="number" id="glucose" placeholder="例：120" min="0" max="600">
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- グラフ -->
    <section class="card">
      <h2>血糖値の推移</h2>
      <div class="graph-wrap">
        <canvas id="graphCanvas"></canvas>
      </div>
      <div class="legend">
        <span class="legend-dot dot-normal"></span>正常
        <span class="legend-dot dot-warning"></span>要注意（食前≥100 / 食後≥140）
        <span class="legend-dot dot-high"></span>高め（食前≥126 / 食後≥200）
      </div>
    </section>

    <!-- 記録一覧 -->
    <section class="card">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
