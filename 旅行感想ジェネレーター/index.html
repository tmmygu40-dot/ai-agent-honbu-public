<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="行き先と思い出を入れて雰囲気を選ぶだけで、SNS映えするポスト文を3パターン即生成。コピーしてそのままインスタやXに投稿できる旅行感想ジェネレーターです。">
  <title>旅行感想ジェネレーター｜SNSポスト文を3パターン即生成</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; line-height: 1.6; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 生成結果カード ── */
    .post-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin: 0 auto 0.9rem; max-width: 600px;
    }
    .post-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.6rem;
    }
    .post-tag {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      background: var(--accent-light); padding: 0.25rem 0.55rem;
      border-radius: 999px; letter-spacing: 0.04em;
    }
    .btn-copy {
      font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.8rem; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
    .post-body {
      font-size: 0.95rem; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-wrap: break-word;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .btn-copy, .no-print { display: none !important; }
      .card, .post-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>✈️ 旅行感想ジェネレーター</h1>
    <p class="subtitle">行き先と思い出を入れて雰囲気を選ぶだけで、SNS映えするポスト文を3パターン即生成。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="dest">旅行先</label>
      <input type="text" id="dest" placeholder="例: 京都、沖縄、台湾、北海道…" maxlength="40">
    </div>
    <div class="field">
      <label for="memo">思い出・印象（短くてOK）</label>
      <textarea id="memo" placeholder="例: 鴨川沿いを朝散歩、抹茶パフェが絶品、夕日が忘れられない…" maxlength="200"></textarea>
      <p class="hint">単語並べ・1〜3行でOK。文末に句点なしでも大丈夫。</p>
    </div>
    <div class="field">
      <label for="mood">雰囲気・スタイル</label>
      <select id="mood">
        <option value="oshare">おしゃれ（洗練・大人っぽく）</option>
        <option value="kandou">感動（しみじみ・感謝）</option>
        <option value="gourmet">グルメ（食推し・テンション高め）</option>
        <option value="casual">カジュアル（友達ノリ・軽め）</option>
        <option value="nostalgic">ノスタルジー（しっとり・余韻）</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="gen()">ポスト文を作る</button>

  <!-- 結果エリア -->
  <div id="results"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、観光庁・国土交通省などの旅行関連公開資料や一般的なSNS投稿スタイルを参考に、思い出をポスト文化しやすい形に整えています。生成文はあくまで参考案です。最新の情報は公式情報をご確認ください。
  </p>

  <!-- 広告枠（仮） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'travel_post_gen_v1';

  var MOODS = {
    oshare:    { name:'おしゃれ', tag:'おしゃれ',
                 emojis:['✨','🥂','🌿','📸','🤍'],
                 hashtags:['#旅行記録','#旅好きな人と繋がりたい','#大人旅','#トラベルダイアリー'] },
    kandou:    { name:'感動', tag:'感動',
                 emojis:['🌅','💛','😭','✨','🙏'],
                 hashtags:['#忘れられない景色','#旅の記憶','#感動','#旅日記'] },
    gourmet:   { name:'グルメ', tag:'グルメ',
                 emojis:['🍣','🍜','🤤','🍴','😋'],
                 hashtags:['#食べスタグラム','#グルメ旅','#ご当地グルメ','#旅と食'] },
    casual:    { name:'カジュアル', tag:'カジュアル',
                 emojis:['😆','🎒','📸','🌈','✌️'],
                 hashtags:['#旅活','#週末旅','#友達と旅','#楽しかった'] },
    nostalgic: { name:'ノスタルジー', tag:'ノスタルジー',
                 emojis:['🌾','📷','🕰','🌙','🍂'],
                 hashtags:['#旅の余韻','#思い出','#ノスタルジー','#フィルム旅'] }
  };

  function gen() {
    var dest = document.getElementById('dest').value.trim();
    var memo = document.getElementById('memo').value.trim();
    var mood = document.getElementById('mood').value;

    if (!dest || !memo) {
      alert('行き先と思い出を入力してください。');
      return;
    }
    var m = MOODS[mood];
    if (!m) m = MOODS.oshare;

    var posts = buildPosts(dest, memo, m);
    renderPosts(posts);
    save(dest, memo, mood);

    // スクロール
    setTimeout(function(){
      var el = document.getElementById('results');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function buildPosts(dest, memo, m) {
    var e = m.emojis;
    var tagsAll = ['#'+dest+'旅行', '#'+dest].concat(m.hashtags);
    // 重複排除＆空除外
    var seen = {};
    var tags = [];
    for (var i=0; i<tagsAll.length; i++) {
      var t = tagsAll[i];
      if (!t || seen[t]) continue;
      seen[t] = true; tags.push(t);
    }

    // 文体テンプレ（雰囲気別）
    var styles = {
      oshare: {
        p1: e[0]+' '+dest+'での休日。\n'+memo+'\n\n'+'静かな時間に、ちゃんと心が満たされていく感じ。'+e[3]+'\n\n'+tags.slice(0,5).join(' '),
        p2: '——'+dest+'にて。\n'+memo+'。\n'+'こういう旅も、たまにはいい。'+e[1]+e[4]+'\n\n'+tags.slice(0,4).join(' '),
        p3: e[0]+e[2]+' '+dest+' / '+shortLine(memo)+'\n'+tags.slice(0,3).join(' ')
      },
      kandou: {
        p1: e[0]+' '+dest+'。\n'+memo+'。\n\n'+'胸がいっぱいで、しばらく言葉が出なかった。'+e[2]+e[1]+'\n本当に来てよかった。\n\n'+tags.slice(0,5).join(' '),
        p2: 'こころが震えた、'+dest+'での時間。\n'+memo+'\n'+'当たり前なんてないんだなって、ふと思った。'+e[4]+'\n\n'+tags.slice(0,4).join(' '),
        p3: e[0]+' '+dest+' '+shortLine(memo)+' '+e[1]+'\n'+'ありがとう、忘れません。\n'+tags.slice(0,3).join(' ')
      },
      gourmet: {
        p1: e[0]+e[1]+' '+dest+'グルメ巡り！\n'+memo+'\n\n'+'うますぎて言葉を失った…'+e[2]+' '+'これは絶対リピートしたいやつ。'+e[4]+'\n\n'+tags.slice(0,5).join(' '),
        p2: '食べた〜！'+e[2]+'\n'+dest+'で'+memo+'。\n'+'カロリー？知らない子ですね。'+e[3]+'\n\n'+tags.slice(0,4).join(' '),
        p3: e[0]+' '+dest+' / '+shortLine(memo)+' '+e[1]+'\n'+tags.slice(0,3).join(' ')
      },
      casual: {
        p1: e[0]+' '+dest+'いってきた〜！\n'+memo+'\n\n'+'まじで楽しかった、また絶対行く！'+e[2]+e[4]+'\n\n'+tags.slice(0,5).join(' '),
        p2: e[1]+' '+dest+'旅レポ\n'+memo+'。\n'+'写真撮りすぎて充電切れたw '+e[3]+'\n\n'+tags.slice(0,4).join(' '),
        p3: e[0]+' '+dest+'楽しすぎ。'+shortLine(memo)+' '+e[2]+'\n'+tags.slice(0,3).join(' ')
      },
      nostalgic: {
        p1: e[0]+' '+dest+'。\n'+memo+'。\n\n'+'写真を見返すたびに、あの空気がよみがえる。'+e[1]+e[2]+'\n\n'+tags.slice(0,5).join(' '),
        p2: 'ふと思い出した、'+dest+'のあの日。\n'+memo+'\n'+'時間って、ちょっとずつ味になる。'+e[3]+e[4]+'\n\n'+tags.slice(0,4).join(' '),
        p3: e[0]+' '+dest+' / '+shortLine(memo)+' '+e[1]+'\n'+tags.slice(0,3).join(' ')
      }
    };

    var s = styles[Object.keys(MOODS).filter(function(k){ return MOODS[k].name===m.name; })[0]];
    return [
      { label: '📝 SNS投稿向け（標準）',  body: s.p1 },
      { label: '📖 ストーリー風（中尺）', body: s.p2 },
      { label: '⚡ 写真キャプション（短）', body: s.p3 }
    ];
  }

  function shortLine(memo) {
    var t = memo.replace(/\n/g, '・').replace(/。$/, '');
    if (t.length > 28) t = t.slice(0, 28) + '…';
    return t;
  }

  function renderPosts(posts) {
    var html = '';
    for (var i=0; i<posts.length; i++) {
      var p = posts[i];
      html += '<div class="post-card">'
            +   '<div class="post-head">'
            +     '<span class="post-tag">'+escapeHtml(p.label)+'</span>'
            +     '<button class="btn-copy" data-idx="'+i+'" onclick="copyPost(this, '+i+')">コピー</button>'
            +   '</div>'
            +   '<div class="post-body" id="post-body-'+i+'">'+escapeHtml(p.body)+'</div>'
            + '</div>';
    }
    var el = document.getElementById('results');
    el.innerHTML = html;
  }

  function copyPost(btn, idx) {
    var bodyEl = document.getElementById('post-body-'+idx);
    if (!bodyEl) return;
    var text = bodyEl.textContent;
    var done = function(){
      btn.classList.add('copied');
      var orig = btn.textContent;
      btn.textContent = 'コピー済み';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.textContent = orig;
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function save(dest, memo, mood) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ dest: dest, memo: memo, mood: mood }));
    } catch(e) {}
  }
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.dest) document.getElementById('dest').value = d.dest;
      if (d.memo) document.getElementById('memo').value = d.memo;
      if (d.mood && MOODS[d.mood]) document.getElementById('mood').value = d.mood;
    } catch(e) {}
  }

  load();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
