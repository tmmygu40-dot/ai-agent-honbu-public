<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふるさと納税シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-sub {
      margin-top: 0.9rem; padding-top: 0.9rem;
      border-top: 1px solid rgba(0,0,0,0.08);
      font-size: 0.82rem; color: var(--text-sub);
    }
    .result-sub strong { color: var(--text); font-size: 1.05rem; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    .source-note {
      max-width: 600px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.76rem; color: var(--text-sub);
      line-height: 1.6; text-align: left;
    }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🏯 ふるさと納税シミュレーター</h1>
    <p class="subtitle">年収・家族構成から寄附上限額と節税メリットを即確認</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="income">年収（税込・万円）</label>
      <input type="number" id="income" placeholder="例: 500" min="100" max="10000" inputmode="numeric">
      <p class="hint">給与収入（額面）を万円単位で入力してください</p>
    </div>
    <div class="field">
      <label for="family">家族構成</label>
      <select id="family">
        <option value="0">独身</option>
        <option value="1">夫婦片働き（配偶者が専業主婦/夫）</option>
        <option value="2">共働き＋高校生の子1人（16〜18歳）</option>
        <option value="3">夫婦片働き＋高校生の子1人（16〜18歳）</option>
        <option value="4">共働き＋子2人（大学生＋高校生）</option>
        <option value="5">夫婦片働き＋子2人（大学生＋高校生）</option>
      </select>
      <p class="hint">16歳未満の子は扶養控除の対象外のため「独身」または「夫婦片働き」を選んでください</p>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">上限額を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">ふるさと納税の寄附上限額（目安）</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <div class="result-sub">
      実質の節税効果（自己負担2,000円を引いた額）<br>
      <strong id="rs">—</strong>
    </div>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">内訳（概算）</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note">
    📚 社会保険料は年収の約14.5%（健保＋厚生年金＋雇用保険の会社員概算）として試算しています。実際の控除額・税額と異なる場合があります。国税庁・総務省の公式シミュレーターも合わせてご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var LS_KEY = 'furusato_sim_v1';

  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem(LS_KEY);
    if (saved) {
      try {
        var d = JSON.parse(saved);
        if (d.income) document.getElementById('income').value = d.income;
        if (d.family !== undefined) document.getElementById('family').value = d.family;
      } catch(e) {}
    }
  });

  function saveInput() {
    localStorage.setItem(LS_KEY, JSON.stringify({
      income: document.getElementById('income').value,
      family: document.getElementById('family').value
    }));
  }

  function calc() {
    var income = parseFloat(document.getElementById('income').value);
    var familyType = parseInt(document.getElementById('family').value);

    if (isNaN(income) || income <= 0) {
      showErr('年収を入力してください');
      return;
    }
    if (income < 100) {
      showErr('年収は100万円以上で入力してください');
      return;
    }

    saveInput();

    var res = calcFurusato(income, familyType);
    var limit = res.limit;
    var jisshiSesshei = limit - 2000;

    var level = limit >= 50000 ? 'ok' : 'warn';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = fmt(limit) + ' 円';
    document.getElementById('rn').textContent = '上記の金額まで寄附すると、自己負担2,000円で節税できます';
    document.getElementById('rs').textContent = fmt(jisshiSesshei) + ' 円分を節税';

    showDetail([
      ['年収', fmt(income) + ' 万円'],
      ['家族構成', document.getElementById('family').options[familyType].text],
      ['所得税率（概算）', (res.rate * 100).toFixed(0) + ' %'],
      ['住民税所得割（概算）', fmt(res.jutakuZeigaku) + ' 円'],
      ['寄附上限額（目安）', fmt(limit) + ' 円', true],
      ['うち自己負担', '2,000 円'],
      ['実質節税効果', fmt(jisshiSesshei) + ' 円'],
    ]);
  }

  function calcFurusato(income, familyType) {
    var y = income * 10000;

    // 給与所得控除（2020年以降）
    var kyuyoKojo;
    if (y <= 1625000) kyuyoKojo = 550000;
    else if (y <= 1800000) kyuyoKojo = y * 0.4 - 100000;
    else if (y <= 3600000) kyuyoKojo = y * 0.3 + 80000;
    else if (y <= 6600000) kyuyoKojo = y * 0.2 + 440000;
    else if (y <= 8500000) kyuyoKojo = y * 0.1 + 1100000;
    else kyuyoKojo = 1950000;

    var shotoku = y - kyuyoKojo; // 給与所得

    // 社会保険料（概算：年収の14.5%）
    // 高収入は実際には上限があるが、概算として使用
    var shahoRyo = Math.min(y * 0.145, 1300000);

    // 基礎控除
    var kisoS = 480000;  // 所得税
    var kisoJ = 430000;  // 住民税

    // 家族構成別の控除
    // 0: 独身
    // 1: 夫婦片働き（配偶者控除：所得税38万、住民税33万）
    // 2: 共働き+高校生子1（扶養控除：所得税38万、住民税33万）
    // 3: 夫婦片働き+高校生子1（配偶者控除+扶養控除）
    // 4: 共働き+子2人（特定扶養63万+扶養38万）
    // 5: 夫婦片働き+子2人
    var haigS = 0, haigJ = 0, fuyoS = 0, fuyoJ = 0;

    if (familyType === 1) { haigS = 380000; haigJ = 330000; }
    else if (familyType === 2) { fuyoS = 380000; fuyoJ = 330000; }
    else if (familyType === 3) { haigS = 380000; haigJ = 330000; fuyoS = 380000; fuyoJ = 330000; }
    else if (familyType === 4) { fuyoS = 630000 + 380000; fuyoJ = 450000 + 330000; }
    else if (familyType === 5) { haigS = 380000; haigJ = 330000; fuyoS = 630000 + 380000; fuyoJ = 450000 + 330000; }

    var kazeiS = Math.max(0, shotoku - kisoS - haigS - fuyoS - shahoRyo);
    var kazeiJ = Math.max(0, shotoku - kisoJ - haigJ - fuyoJ - shahoRyo);

    // 所得税率（限界税率）
    var rate;
    if      (kazeiS <= 1950000)  rate = 0.05;
    else if (kazeiS <= 3300000)  rate = 0.10;
    else if (kazeiS <= 6950000)  rate = 0.20;
    else if (kazeiS <= 9000000)  rate = 0.23;
    else if (kazeiS <= 18000000) rate = 0.33;
    else if (kazeiS <= 40000000) rate = 0.40;
    else                          rate = 0.45;

    // 住民税所得割（10%均等割 − 調整控除2,500円）
    var jutakuZeigaku = Math.max(0, kazeiJ * 0.10 - 2500);

    // ふるさと納税上限額
    var denom = 0.9 - rate * 1.021;
    var limit = Math.floor(jutakuZeigaku * 0.2 / Math.max(denom, 0.001)) + 2000;

    return { limit: limit, rate: rate, jutakuZeigaku: Math.floor(jutakuZeigaku) };
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('rn').textContent = msg;
    document.getElementById('rs').textContent = '—';
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
