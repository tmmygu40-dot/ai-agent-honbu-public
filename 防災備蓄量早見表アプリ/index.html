<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防災備蓄量早見表アプリ</title>
  <meta name="description" content="家族人数と在宅日数を選ぶだけで、食料・飲料水・生活用水・消耗品の必要量リストをすぐ表示。内閣府・消防庁の推奨基準をもとにした防災備蓄量早見表アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card); border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem; margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active { transform: translateY(3px); box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2); }

    /* ── 結果テーブル ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.2rem 1.2rem 0.8rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-summary {
      background: var(--accent-light); border-radius: 8px;
      padding: 0.7rem 1rem; margin-bottom: 1rem;
      font-size: 0.88rem; color: var(--accent); font-weight: 700;
    }
    .section-title {
      font-size: 0.82rem; font-weight: 800; color: var(--text);
      margin: 1rem 0 0.5rem; padding-bottom: 0.35rem;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; margin-bottom: 0.5rem; }
    .detail-table th {
      text-align: left; padding: 0.45rem 0.4rem;
      font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
      border-bottom: 1.5px solid var(--border); background: #f9f5f0;
    }
    .detail-table th:last-child, .detail-table td:last-child { text-align: right; }
    .detail-table td { padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border); color: var(--text-sub); }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table .qty { font-weight: 700; color: var(--text); }
    .detail-table .unit { font-size: 0.75rem; color: var(--text-sub); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>防災備蓄量 早見表アプリ</h1>
    <p class="subtitle">家族人数と在宅日数を選ぶだけ。食料・水・消耗品の必要量を即表示（2025年時点の目安）</p>
  </header>

  <div class="card">
    <p class="card-title">家族構成・期間を選択</p>
    <div class="field">
      <label for="members">家族人数</label>
      <select id="members">
        <option value="1">1人</option>
        <option value="2">2人</option>
        <option value="3" selected>3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6">6人</option>
        <option value="7">7人以上（7人で計算）</option>
      </select>
    </div>
    <div class="field">
      <label for="days">備蓄目標日数</label>
      <select id="days">
        <option value="3">3日間（最低限）</option>
        <option value="7" selected>7日間（推奨）</option>
        <option value="14">14日間（余裕あり）</option>
        <option value="30">30日間（長期備蓄）</option>
      </select>
    </div>
    <div class="field">
      <label for="infant">乳幼児（0〜2歳）の人数</label>
      <select id="infant">
        <option value="0" selected>0人</option>
        <option value="1">1人</option>
        <option value="2">2人</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="calc()">必要量を計算する</button>

  <div class="result-card" id="result">
    <div class="result-summary" id="summaryText"></div>

    <div class="section-title">🍚 食料</div>
    <table class="detail-table">
      <thead><tr><th>品目</th><th>目安量</th></tr></thead>
      <tbody id="foodTable"></tbody>
    </table>

    <div class="section-title">💧 飲料水・生活用水</div>
    <table class="detail-table">
      <thead><tr><th>用途</th><th>必要量</th></tr></thead>
      <tbody id="waterTable"></tbody>
    </table>

    <div class="section-title">🧻 消耗品・日用品</div>
    <table class="detail-table">
      <thead><tr><th>品目</th><th>目安量</th></tr></thead>
      <tbody id="suppliesTable"></tbody>
    </table>

    <div class="section-title">🔦 防災グッズ（チェックリスト）</div>
    <table class="detail-table">
      <thead><tr><th>品目</th><th>推奨</th></tr></thead>
      <tbody id="gearTable"></tbody>
    </table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 内閣府・消防庁・農林水産省の防災備蓄ガイドラインを参考に作成した2025年時点の目安です。家族構成・体調・持病等によって必要量は異なります。最新情報は各省庁・自治体の公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  function calc() {
    var members = parseInt(document.getElementById('members').value);
    var days    = parseInt(document.getElementById('days').value);
    var infant  = parseInt(document.getElementById('infant').value);
    var adults  = members - infant;

    // ── 食料計算 ──
    // 1人1日：主食3食（米150g×3=450g or レトルト3個）、副食2食、カロリー2000kcal目安
    var rice     = Math.ceil(members * days * 0.15);   // kg（1食150g×3食/日）
    var retort   = members * days * 2;                  // 個（副食2食/日）
    var biscuits = Math.ceil(members * days * 1);       // 袋（非常食クラッカー等 1袋/日）
    var infantFormula = infant > 0 ? Math.ceil(infant * days * 0.15) : 0; // kg（粉ミルク）
    var babyFood = infant > 0 ? infant * days * 3 : 0; // 個（離乳食）

    var foodRows = [
      ['米・アルファ米', rice + ' kg', '（1人1日450g目安）'],
      ['レトルト食品・缶詰', retort + ' 個', '（副食2食/日目安）'],
      ['クラッカー・乾パン等', biscuits + ' 袋', '（間食・非常食用）'],
      ['カップ麺・インスタント', Math.ceil(members * days * 0.5) + ' 個', '（1人1食/2日目安）'],
    ];
    if (infant > 0) {
      foodRows.push(['粉ミルク', infantFormula + ' kg', '（乳幼児 ' + infant + '人分）']);
      foodRows.push(['ベビーフード', babyFood + ' 個', '（離乳食 ' + infant + '人×3食/日）']);
    }

    // ── 水計算 ──
    // 飲料：1人1日3L、生活用水：1人1日10L（トイレ・清拭等）
    var drinkWater = members * days * 3;   // L
    var lifeWater  = members * days * 10;  // L（参考）
    var pet2L      = Math.ceil(drinkWater / 2); // 2Lペットボトル本数

    var waterRows = [
      ['飲料水（1人1日3L目安）', drinkWater + ' L', '2Lペット約' + pet2L + '本'],
      ['生活用水（1人1日10L目安）', lifeWater + ' L', 'ポリタンク・浴槽に事前貯水'],
    ];

    // ── 消耗品計算 ──
    var toilet    = Math.ceil(members * days / 8);   // ロール（1人1日0.125本）
    var mask      = members * days * 2;               // 枚（1人2枚/日）
    var wet       = Math.ceil(members * days * 2);   // 枚（身体清拭用）
    var garbage   = Math.ceil(members * days * 2);   // 枚（45L）
    var diapers   = infant * days * 8;               // 枚（乳幼児）
    var sanitizer = Math.ceil(members * days * 5) + ' mL'; // 手指消毒

    var supplyRows = [
      ['トイレットペーパー', toilet + ' ロール', '（1人1日0.12ロール目安）'],
      ['使い捨てマスク', mask + ' 枚', '（1人2枚/日目安）'],
      ['ウェットティッシュ', wet + ' 枚', '（身体清拭・手拭き）'],
      ['ゴミ袋（45L）', garbage + ' 枚', '（生活ゴミ・簡易トイレ用）'],
      ['ラップフィルム', Math.ceil(members * 2) + ' 本', '（食器代用・調理）'],
      ['除菌ジェル・消毒液', sanitizer, '（1人5mL/日目安）'],
    ];
    if (infant > 0) {
      supplyRows.push(['紙おむつ', diapers + ' 枚', '（乳幼児 ' + infant + '人×8枚/日）']);
    }

    // ── 防災グッズ ──
    var gearRows = [
      ['懐中電灯・ランタン', '1〜2個', '電池式またはLEDランタン'],
      ['乾電池（単3・単4）', '多めに備蓄', '家電・ラジオ兼用可能なもの'],
      ['携帯ラジオ', '1個', '手回し・ソーラー充電式推奨'],
      ['モバイルバッテリー', members + ' 個', '大容量タイプ（20,000mAh以上）推奨'],
      ['救急セット', '1セット', '絆創膏・消毒液・包帯・解熱剤等'],
      ['常備薬・処方薬', '数日分', '持病のある方は特に重要'],
      ['現金（小銭含む）', '必要額', 'ATM停止・電子マネー不可の場合に備え'],
      ['避難場所・経路の確認', '—', 'ハザードマップを事前確認'],
      ['重要書類のコピー', '—', '保険証・通帳・マイナンバー等'],
      ['簡易トイレ', Math.ceil(members * days * 5) + ' 回分', '（断水時の備え）'],
    ];

    // テーブル描画
    document.getElementById('foodTable').innerHTML    = renderRows(foodRows);
    document.getElementById('waterTable').innerHTML   = renderRows(waterRows, true);
    document.getElementById('suppliesTable').innerHTML = renderRows(supplyRows);
    document.getElementById('gearTable').innerHTML    = renderRows(gearRows);

    document.getElementById('summaryText').textContent =
      '👨‍👩‍👧 ' + members + '人家族 / ' + days + '日間分の目安備蓄量（乳幼児' + infant + '人含む）';

    var card = document.getElementById('result');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveSettings();
  }

  function renderRows(rows, isWater) {
    return rows.map(function(r) {
      return '<tr>'
        + '<td>' + r[0] + '</td>'
        + '<td class="qty">' + r[1] + (r[2] ? '<br><span class="unit">' + r[2] + '</span>' : '') + '</td>'
        + '</tr>';
    }).join('');
  }

  function saveSettings() {
    try {
      localStorage.setItem('disaster_members', document.getElementById('members').value);
      localStorage.setItem('disaster_days',    document.getElementById('days').value);
      localStorage.setItem('disaster_infant',  document.getElementById('infant').value);
    } catch(e) {}
  }
  function loadSettings() {
    try {
      var m = localStorage.getItem('disaster_members');
      var d = localStorage.getItem('disaster_days');
      var i = localStorage.getItem('disaster_infant');
      if (m) document.getElementById('members').value = m;
      if (d) document.getElementById('days').value = d;
      if (i) document.getElementById('infant').value = i;
    } catch(e) {}
  }
  loadSettings();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
