<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金銭感覚暴君診断 - あなたの無駄遣い癖を歴史上の暴君に例えて解説</title>
  <meta name="description" content="5問の3択に答えるだけで、あなたの無駄遣い癖を歴史上の暴君5タイプに例えて診断します。浪費傾向と節約対策が一目で分かるエンタメ診断アプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #b8860b;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-num { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.25rem; }
    .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.5; }
    .q-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .q-option {
      display: block; padding: 0.7rem 0.9rem;
      font-size: 0.92rem; line-height: 1.45;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .q-option input { display: none; }
    .q-option.selected {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--text);
      font-weight: 600;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #8b6508, 0 6px 16px rgba(184,134,11,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8b6508, 0 2px 8px rgba(184,134,11,0.2);
    }
    .btn-retry {
      display: block; margin: 0.6rem auto 0; padding: 0.7rem 1.4rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.6rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-emoji { font-size: 3rem; line-height: 1.2; margin-bottom: 0.3rem; }
    .result-name { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; color: var(--accent); margin-bottom: 0.3rem; }
    .result-catch { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.8rem; line-height: 1.5; }
    .result-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.65; text-align: left; margin-bottom: 1rem; padding: 0.7rem 0.9rem; background: var(--bg); border-radius: 9px; }
    .result-section { text-align: left; margin-top: 1rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
    .result-section-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; margin-bottom: 0.4rem; }
    .result-section-body { font-size: 0.88rem; color: var(--text); line-height: 1.65; }

    .score-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    .score-table tr { border-bottom: 1px solid var(--border); }
    .score-table tr:last-child { border-bottom: none; }
    .score-table td { padding: 0.45rem 0.3rem; }
    .score-table td:last-child { text-align: right; font-weight: 600; color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-retry, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

<body>

  <header class="app-header">
    <h1>金銭感覚暴君診断</h1>
    <p class="subtitle">あなたの無駄遣い癖を歴史上の暴君に例えて解説 ※エンタメ目的の診断です</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">5問の3択にお答えください</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたの金銭感覚暴君タイプ</p>
    <p class="result-emoji" id="r-emoji">👑</p>
    <p class="result-name" id="r-name">—</p>
    <p class="result-catch" id="r-catch"></p>
    <p class="result-desc" id="r-desc"></p>

    <div class="result-section">
      <p class="result-section-title">⚠️ 浪費傾向</p>
      <p class="result-section-body" id="r-tendency"></p>
    </div>

    <div class="result-section">
      <p class="result-section-title">💰 節約アドバイス</p>
      <p class="result-section-body" id="r-advice"></p>
    </div>

    <div class="result-section">
      <p class="result-section-title">📊 タイプ別スコア</p>
      <table class="score-table"><tbody id="r-scores"></tbody></table>
    </div>

    <button class="btn-retry" onclick="retry()">もう一度診断する</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 本診断はエンタメ目的です。歴史人物像は俗説や逸話を含み、史実と異なる場合があります。お金の悩みは家計簿アプリや公的相談窓口（消費生活センター等）の活用もご検討ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 質問データ ──
  // 各選択肢は5タイプにスコアを配分
  // タイプ: nero(ネロ), cali(カリギュラ), shi(始皇帝), henry(ヘンリー8世), louis(ルイ16世)
  var QUESTIONS = [
    {
      q: 'Q1. 給料日後、つい一番やりがちなのは？',
      opts: [
        { t: '高級レストランや贅沢ディナーで自分にご褒美',           s: { nero: 2, henry: 1 } },
        { t: 'セールやポイントアップに乗じて勢いで購入',             s: { cali: 2, louis: 1 } },
        { t: '前から狙ってた高額アイテムをついに買ってしまう',       s: { shi: 2, henry: 1 } },
        { t: '友達や同僚におごる・付き合いで使ってしまう',           s: { louis: 2, nero: 1 } }
      ]
    },
    {
      q: 'Q2. お金を使った後の気分は？',
      opts: [
        { t: '自分が王様気分で最高に満たされる',                   s: { nero: 2, henry: 1 } },
        { t: 'すぐ飽きて次のものが欲しくなる',                     s: { cali: 2 } },
        { t: '所有欲が満たされて達成感がある',                     s: { shi: 2 } },
        { t: '見栄を張れて優越感がある',                          s: { henry: 2, nero: 1 } },
        { t: '断れなかった罪悪感が少し残る',                       s: { louis: 2 } }
      ]
    },
    {
      q: 'Q3. 一番お金を使うジャンルは？',
      opts: [
        { t: 'グルメ・美容・エステなど自分を彩るもの',             s: { nero: 2 } },
        { t: 'その時の気分で買う雑貨・ガジェット・趣味グッズ',     s: { cali: 2 } },
        { t: 'コレクション・限定品・高額な趣味の道具',             s: { shi: 2 } },
        { t: 'ブランド服・時計・人前で使う持ち物',                 s: { henry: 2 } },
        { t: '飲み会・サブスク・付き合いの出費',                   s: { louis: 2 } }
      ]
    },
    {
      q: 'Q4. 衝動買いをしてしまう時のきっかけは？',
      opts: [
        { t: '自分にご褒美をあげたくなった',                       s: { nero: 2, cali: 1 } },
        { t: '何となく目に入って即決した',                         s: { cali: 2 } },
        { t: '今買わないと手に入らない気がした',                   s: { shi: 2, cali: 1 } },
        { t: '人に自慢したくなった・目立ちたくなった',             s: { henry: 2 } },
        { t: '断りきれずノリで支払ってしまった',                   s: { louis: 2 } }
      ]
    },
    {
      q: 'Q5. 月末、貯金残高を見たときの心境は？',
      opts: [
        { t: '楽しかったから後悔はない！また来月稼ぐ',             s: { nero: 2, cali: 1 } },
        { t: 'え、こんなに減ったっけ…？覚えてない出費が多い',     s: { cali: 2, louis: 1 } },
        { t: '高い買い物の元は取れたから満足',                     s: { shi: 2 } },
        { t: '見栄を張った代償と自覚はあるけど続けてしまう',       s: { henry: 2 } },
        { t: '人付き合いを優先して財布が苦しい',                   s: { louis: 2 } }
      ]
    }
  ];

  // ── タイプ定義 ──
  var TYPES = {
    nero: {
      emoji: '🍷',
      name: 'ネロ型',
      catch: '自分への贅沢に糸目をつけない快楽王',
      desc: 'ローマ皇帝ネロは黄金の館（ドムス・アウレア）を建てて贅沢三昧と伝えられます。あなたも自分を満たす贅沢には惜しまず財布を開くタイプ。グルメ・美容・心地よさへの投資が止まらず、「楽しかったから後悔なし」と前向きに使い切ります。',
      tendency: '高級グルメ・美容・自分へのご褒美系で月々の予算を超過しがち。'
        + ' お金を使う＝幸福度を上げる手段になっており、節約モードに入るのが苦手です。',
      advice: '「ご褒美予算」を月1.5万円など先に天引きしてから使うのがおすすめ。'
        + '範囲内なら遠慮なく楽しんでOK、超えた分は来月の前借りと割り切ってメリハリをつけましょう。'
    },
    cali: {
      emoji: '⚡',
      name: 'カリギュラ型',
      catch: '気分で散財・衝動爆発の暴君',
      desc: 'ローマ皇帝カリギュラは気まぐれな浪費の象徴とされる人物。あなたも目に入った瞬間に即決し、その時の気分で買い物が爆発するタイプ。月末に「これいつ買ったっけ？」となりがちです。',
      tendency: 'セール・ポイントアップ・タイムセール等の即決トリガーに弱い。'
        + 'コンビニ・ECサイトの少額衝動買いが積み上がって月数万円の見えない出費に化けます。',
      advice: 'ECサイトはカートに入れて24時間放置するルールを作ると効果絶大。'
        + 'クレカではなくデビット or プリペイド利用で「今ある分しか使えない」枠を作りましょう。'
    },
    shi: {
      emoji: '👑',
      name: '始皇帝型',
      catch: '所有欲MAX・大物買いコレクター',
      desc: '中国初の皇帝・秦の始皇帝は巨大な兵馬俑や阿房宮を造らせたと言われます。あなたも普段は質素でも、ここぞという時に高額商品・限定品にドカンと使う大物買いタイプ。',
      tendency: '日常出費は意外と抑えめだが、年1～2回の大型出費（高級時計・ガジェット・趣味の機材等）で'
        + '貯金が一気に飛ぶ。「限定」「最後の1点」に特に弱い傾向あり。',
      advice: '高額品は「3日寝かせ＋類似品3つ比較」を必須ルールに。'
        + '本当に欲しいものだけ残るので、衝動の8割は自然消滅します。'
    },
    henry: {
      emoji: '👑',
      name: 'ヘンリー8世型',
      catch: '見栄消費・ステータス重視の派手王',
      desc: 'イングランド王ヘンリー8世は豪華な宮廷文化と派手な装いで知られます。あなたもブランド・人前で使う持ち物・「見せる消費」にこだわるタイプ。'
        + '中身より「他人にどう見えるか」で財布を開く傾向があります。',
      tendency: 'ブランド服・時計・最新スマホ・SNS映え消費に偏重。'
        + '同じ機能の安価品があっても、ロゴ・ステータス価値で割高品を選びがち。',
      advice: 'ブランド予算は「年収の3%以内」ルールがおすすめ。'
        + 'また3か月使ってない物を1つ売ってから次を買う「1in1out」で物量と支出を同時に絞りましょう。'
    },
    louis: {
      emoji: '🥖',
      name: 'ルイ16世型',
      catch: '流され型・付き合いで散財する優しき暴君',
      desc: 'フランス王ルイ16世は王妃マリー・アントワネットや周囲に流されたと評されます。あなたも自分から贅沢を望むよりは、断れない・付き合いで気付けば散財しているタイプ。'
        + '人柄は優しく、それゆえ財布が痛みやすい構造です。',
      tendency: '飲み会・差し入れ・サブスク・友人のおすすめ等、自分発信ではない出費が積み重なる。'
        + '「付き合いだから」と内訳を確認しないまま支出が増える傾向。',
      advice: '断る台本を用意しておくのが近道。「今月予算オーバーで」「家計会議でNG出ちゃって」'
        + 'と決まり文句にすれば角が立たず断れます。サブスク棚卸も月1で実施を。'
    }
  };

  // ── 初期化：質問描画 ──
  function renderQuestions() {
    var html = '';
    QUESTIONS.forEach(function(q, qi) {
      html += '<div class="q-block" data-qi="' + qi + '">';
      html += '<p class="q-num">Q' + (qi + 1) + '</p>';
      html += '<p class="q-text">' + q.q.replace(/^Q\d+\.\s*/, '') + '</p>';
      html += '<div class="q-options">';
      q.opts.forEach(function(o, oi) {
        html += '<label class="q-option" data-qi="' + qi + '" data-oi="' + oi + '">';
        html += '<input type="radio" name="q' + qi + '" value="' + oi + '">';
        html += o.t + '</label>';
      });
      html += '</div></div>';
    });
    document.getElementById('questions').innerHTML = html;

    document.querySelectorAll('.q-option').forEach(function(el) {
      el.addEventListener('click', function() {
        var qi = el.getAttribute('data-qi');
        document.querySelectorAll('.q-option[data-qi="' + qi + '"]').forEach(function(s){
          s.classList.remove('selected');
        });
        el.classList.add('selected');
        var input = el.querySelector('input');
        if (input) input.checked = true;
      });
    });
  }

  function diagnose() {
    var scores = { nero: 0, cali: 0, shi: 0, henry: 0, louis: 0 };
    var unanswered = [];

    QUESTIONS.forEach(function(q, qi) {
      var sel = document.querySelector('input[name="q' + qi + '"]:checked');
      if (!sel) { unanswered.push(qi + 1); return; }
      var opt = q.opts[parseInt(sel.value, 10)];
      Object.keys(opt.s).forEach(function(k) { scores[k] += opt.s[k]; });
    });

    if (unanswered.length > 0) {
      alert('未回答の質問があります：Q' + unanswered.join(', Q'));
      return;
    }

    // 最高得点タイプを決定（同点時は順位順）
    var order = ['nero', 'cali', 'shi', 'henry', 'louis'];
    var maxKey = order[0], maxVal = -1;
    order.forEach(function(k) {
      if (scores[k] > maxVal) { maxVal = scores[k]; maxKey = k; }
    });

    showResult(maxKey, scores);

    try {
      localStorage.setItem('kinsenkakuBokuncheckV2', JSON.stringify({
        type: maxKey, scores: scores, savedAt: Date.now()
      }));
    } catch (e) {}
  }

  function showResult(typeKey, scores) {
    var t = TYPES[typeKey];
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent = t.name;
    document.getElementById('r-catch').textContent = t.catch;
    document.getElementById('r-desc').textContent = t.desc;
    document.getElementById('r-tendency').textContent = t.tendency;
    document.getElementById('r-advice').textContent = t.advice;

    var rows = '';
    var order = ['nero', 'cali', 'shi', 'henry', 'louis'];
    order.forEach(function(k) {
      rows += '<tr><td>' + TYPES[k].name + '</td><td>' + scores[k] + ' 点</td></tr>';
    });
    document.getElementById('r-scores').innerHTML = rows;

    var rc = document.getElementById('result');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function retry() {
    document.querySelectorAll('.q-option.selected').forEach(function(el){ el.classList.remove('selected'); });
    document.querySelectorAll('input[type="radio"]').forEach(function(el){ el.checked = false; });
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 初期化
  renderQuestions();

  // 直近結果の復元（参考表示）
  try {
    var saved = localStorage.getItem('kinsenkakuBokuncheckV2');
    if (saved) {
      var d = JSON.parse(saved);
      if (d && d.type && TYPES[d.type] && d.scores) {
        showResult(d.type, d.scores);
      }
    }
  } catch (e) {}
  </script>
