<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="国・時代・特徴から世界遺産を当てるクイズゲームです。5問のクイズで遊びながら世界遺産について学べます。">
  <title>🌍 世界遺産クイズゲーム</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 問題エリア ── */
    .quiz-question {
      font-size: 1.05rem; font-weight: 700; margin-bottom: 1.2rem; line-height: 1.5;
    }
    .quiz-progress {
      font-size: 0.82rem; color: var(--text-sub); margin-bottom: 0.8rem;
    }

    /* ── 選択肢 ── */
    .quiz-options {
      display: grid; grid-template-columns: 1fr; gap: 0.7rem;
    }
    .quiz-option {
      display: block; width: 100%;
      padding: 1rem; text-align: left;
      background: var(--accent-light); border: 1.5px solid var(--border);
      border-radius: 9px; cursor: pointer; font-size: 0.95rem;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .quiz-option:hover { border-color: var(--accent); background: #fff3e0; }
    .quiz-option.selected { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    .quiz-option.correct { background: var(--ok); color: #fff; border-color: var(--ok); font-weight: 700; }
    .quiz-option.incorrect { background: var(--ng); color: #fff; border-color: var(--ng); font-weight: 700; }
    .quiz-option:disabled { cursor: not-allowed; opacity: 0.7; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <!-- 計測タグ（</head> 直前） -->
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"

<body>

  <header class="app-header">
    <h1>🌍 世界遺産クイズゲーム</h1>
    <p class="subtitle">国・時代・特徴から世界遺産を当てるクイズです</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-area">
    <p class="quiz-progress"><span id="current-q">1</span> / <span id="total-q">5</span></p>
    <p class="card-title">問題</p>
    <p class="quiz-question" id="question">読み込み中…</p>
    <div class="quiz-options" id="options"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc" id="btn-next" onclick="nextQuestion()">回答する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠" style="display:none">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
    // ── クイズ問題データ ──
    const QUIZZES = [
      {
        question: "1975年に登録された、古都の文化遺産。日本の京都に位置する寺院群で、17の建造物が登録されています。",
        options: ["古都京都の文化財", "日光の社寺", "富士山", "厳島神社"],
        correct: 0
      },
      {
        question: "エジプトのギザ高原にある、約4,500年前のファラオの墓。世界最古で唯一現存する古代の七不思議です。",
        options: ["アブシンベル神殿", "ギザのピラミッド群", "ナイル川のオアシス", "シナイ山"],
        correct: 1
      },
      {
        question: "インドにあるイスラム帝国の皇帝が愛妃のために建てた廟。白大理石で造られた、世界で最も美しい建築物とも言われます。",
        options: ["インド門", "タージ・マハル", "アジャンタの石窟", "コナーラク太陽神殿"],
        correct: 1
      },
      {
        question: "中国の険峻な山々を舞台にした、約21,000km の防御壁。明の時代に現在の姿がほぼ完成しました。",
        options: ["兵馬俑", "秦嶺山脈", "万里の長城", "黄河渓谷"],
        correct: 2
      },
      {
        question: "ペルーのアンデス山脈の山頂に位置する、インカ帝国の遺跡。15世紀に建造された石造建築で、失われた都市として知られています。",
        options: ["クスコ市街", "マチュピチュ", "ナスカの地上絵", "チムーの遺跡"],
        correct: 1
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let selectedOption = null;

    function loadQuestion() {
      if (currentIndex >= QUIZZES.length) {
        showResult();
        return;
      }

      const quiz = QUIZZES[currentIndex];
      document.getElementById('question').textContent = quiz.question;
      document.getElementById('current-q').textContent = currentIndex + 1;
      document.getElementById('total-q').textContent = QUIZZES.length;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      answered = false;
      selectedOption = null;
      document.getElementById('btn-next').textContent = '回答する';
      document.getElementById('btn-next').disabled = false;

      quiz.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.onclick = () => selectOption(idx, quiz.correct);
        optionsDiv.appendChild(btn);
      });
    }

    function selectOption(idx, correctIdx) {
      if (answered) return;

      selectedOption = idx;
      const optionBtns = document.querySelectorAll('.quiz-option');
      optionBtns.forEach((btn, i) => {
        if (i === correctIdx) {
          btn.classList.add('correct');
        } else if (i === idx && idx !== correctIdx) {
          btn.classList.add('incorrect');
        }
        btn.disabled = true;
      });

      if (idx === correctIdx) {
        score++;
      }

      answered = true;
      document.getElementById('btn-next').textContent = currentIndex === QUIZZES.length - 1 ? '結果を見る' : '次の問題へ';
      document.getElementById('btn-next').disabled = false;
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < QUIZZES.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quiz-area').style.display = 'none';
      document.getElementById('btn-next').style.display = 'none';

      const percentage = Math.round((score / QUIZZES.length) * 100);
      const level = score === QUIZZES.length ? 'ok' : score >= 3 ? 'warn' : 'ng';
      const msg = score === QUIZZES.length ? '完璧です！世界遺産博士ですね'
                : score >= 3 ? '良く出来ました！もう一度チャレンジしてみてください'
                : '勉強になりました。もう一度やってみましょう！';

      const rc = document.getElementById('result');
      rc.className = 'result-card ' + level;
      rc.style.display = 'block';
      document.getElementById('rv').textContent = score + ' / ' + QUIZZES.length;
      document.getElementById('rn').textContent = percentage + '% - ' + msg;

      // localStorage に成績を保存
      const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
      history.push({ date: new Date().toLocaleDateString('ja-JP'), score: score, total: QUIZZES.length });
      localStorage.setItem('quizHistory', JSON.stringify(history));
    }

    // ── 初期化 ──
    loadQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
