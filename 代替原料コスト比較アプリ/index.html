<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代替原料コスト比較アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>代替原料コスト比較アプリ</h1>
    <p class="subtitle">原材料値上がり時の切り替え判断を数値で確認</p>

    <!-- 現行原料・売価 -->
    <section class="card">
      <h2>現行原料・製品情報</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>現行原料名</label>
          <input type="text" id="currentName" placeholder="例：小麦粉A">
        </div>
        <div class="form-group">
          <label>単価（円）</label>
          <input type="number" id="currentPrice" placeholder="100" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>使用量（単位）</label>
          <input type="number" id="currentQty" placeholder="5" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>単位（例：kg、g、L）</label>
          <input type="text" id="currentUnit" placeholder="kg">
        </div>
        <div class="form-group">
          <label>製品売価（円）</label>
          <input type="number" id="sellingPrice" placeholder="1000" min="0" step="0.01">
        </div>
      </div>
      <div class="current-result" id="currentResult"></div>
    </section>

    <!-- 代替候補の追加 -->
    <section class="card">
      <h2>代替候補を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>代替原料名</label>
          <input type="text" id="altName" placeholder="例：小麦粉B（国産）">
        </div>
        <div class="form-group">
          <label>単価（円）</label>
          <input type="number" id="altPrice" placeholder="90" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>使用量（単位）</label>
          <input type="number" id="altQty" placeholder="5" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>メモ（任意）</label>
          <input type="text" id="altNote" placeholder="例：品質同等">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">候補を追加</button>
    </section>

    <!-- 比較テーブル -->
    <section class="card" id="compareSection" style="display:none;">
      <h2>比較一覧</h2>
      <div class="table-wrap">
        <table id="compareTable">
          <thead>
            <tr>
              <th>原料名</th>
              <th>単価</th>
              <th>使用量</th>
              <th>原価（円）</th>
              <th>原価差（円）</th>
              <th>コスト率</th>
              <th>コスト率差</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="compareBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
