<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="行先と雰囲気・気分を選ぶだけで、インスタやXに添えるキャプションを3パターン即生成。ハッシュタグも自動付与で、旅の写真投稿が一瞬で完成する無料ツールです。">
  <title>旅行投稿キャプションジェネレーター</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .check-line {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0; cursor: pointer; user-select: none;
      font-size: 0.95rem;
    }
    .check-line input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .caption-list { max-width: 600px; margin: 0 auto; }
    .caption-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .caption-num {
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .caption-text {
      font-size: 1rem; line-height: 1.7;
      color: var(--text); white-space: pre-wrap;
      margin-bottom: 0.9rem;
    }
    .btn-copy {
      display: inline-block; padding: 0.55rem 1.1rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { transform: scale(0.97); }
    .btn-copy.copied { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .err-msg {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.8rem 1rem; border-radius: 10px;
      background: var(--ng-bg); border: 1.5px solid var(--ng);
      color: var(--ng); font-size: 0.9rem; font-weight: 600;
      text-align: center;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .btn-copy { display: none !important; }
      .card, .caption-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>✈️ 旅行投稿キャプションジェネレーター</h1>
    <p class="subtitle">行先と雰囲気を選ぶだけで、SNSに添えるキャプションを3パターン即生成</p>
  </header>

  <div class="card">
    <p class="card-title">入力</p>
    <div class="field">
      <label for="dest">行先</label>
      <input type="text" id="dest" placeholder="例: 京都、沖縄、ハワイ、スイス">
      <p class="hint">国・都市・エリア名など、自由に書いてOK</p>
    </div>
    <div class="field">
      <label for="vibe">雰囲気</label>
      <select id="vibe">
        <option value="エモい">エモい</option>
        <option value="キラキラ">キラキラ</option>
        <option value="ゆるふわ">ゆるふわ</option>
        <option value="かっこいい">かっこいい</option>
        <option value="癒し">癒し</option>
        <option value="グルメ">グルメ</option>
        <option value="絶景">絶景</option>
      </select>
    </div>
    <div class="field">
      <label for="mood">気分</label>
      <select id="mood">
        <option value="満喫">満喫した</option>
        <option value="ほっこり">ほっこり</option>
        <option value="爆上がり">テンション爆上がり</option>
        <option value="しみじみ">しみじみ</option>
        <option value="冒険">冒険気分</option>
      </select>
    </div>
    <label class="check-line">
      <input type="checkbox" id="hash" checked>
      <span>ハッシュタグを付ける</span>
    </label>
  </div>

  <button class="btn-calc" onclick="generate()">3パターン生成する</button>

  <div id="err" class="err-msg" style="display:none"></div>

  <div class="caption-list" id="captions"></div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、観光庁・国土交通省などの公開データや、旅行・SNS投稿に関する一般的な慣習を参考に作成しています。生成内容は参考用の例文です。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var STORAGE_KEY = 'travel-caption-gen-v1';

  // ── キャプションテンプレ（雰囲気 × 気分） ──
  var TEMPLATES = {
    'エモい': [
      'ふと立ち止まった{D}の風景。\n言葉にならない、この瞬間が好き。',
      '{D}で見た景色は、たぶん一生忘れない。\n写真より、心に深く焼き付いた。',
      '{D}の空気に溶けていく時間。\nこういう旅、もっと大事にしたい。'
    ],
    'キラキラ': [
      '✨ {D}の光がまぶしすぎた日 ✨\n夢みたいな景色に思わずシャッター連打！',
      '今日の{D}、キラッキラすぎて目がくらんだ💎\nこの瞬間、永遠に保存したい。',
      '✨{D}で見つけた最高のシーン✨\nこの一枚、お気に入り更新です📸'
    ],
    'ゆるふわ': [
      'のんびり{D}さんぽ🌷\n何もしない時間が、いちばんのごちそう。',
      '{D}でゆるっとひと休み☕\nこういう日があるから、毎日がんばれる。',
      'ふらっと{D}まで🍃\n予定なしの旅って、なんでこんなに楽しいんだろ。'
    ],
    'かっこいい': [
      '{D}。圧倒的な存在感。\nこの景色の前では、言葉はいらない。',
      '一度は立つべき場所、{D}。\n空気の重みが違った。',
      '{D}で出会った景色。\nスケールの違いに、ただ呆然。'
    ],
    '癒し': [
      '{D}のやさしい時間に包まれて🌿\n肩の力が抜けていく感覚、ひさしぶり。',
      'ぼーっと{D}の景色を眺めるだけで、\n心がふわっと軽くなった。',
      '{D}で深呼吸。\nここに来てよかったって、心から思えた。'
    ],
    'グルメ': [
      '{D}で食べたこの一皿、最高すぎた🍴\nこのために旅してよかったって本気で思う。',
      '{D}のローカルグルメ巡り🍜\n結局、旅は食べ物が9割なのでは…？',
      '{D}に来たら絶対これ！って言われて挑戦。\n…噂以上だった。'
    ],
    '絶景': [
      '{D}の絶景、想像の3倍すごかった。\nこの景色のために来たと言っても過言じゃない。',
      '{D}にて。\n人生で一度は見ておきたい景色、ここにあり。',
      '{D}の壮大さの前に、しばらく無言…。\n写真じゃ伝わらない、この空気。'
    ]
  };

  // ── 気分による末尾フレーズ ──
  var MOOD_TAIL = {
    '満喫': ' たっぷり満喫した1日でした。',
    'ほっこり': ' なんだかほっこりした旅。',
    '爆上がり': ' テンション爆上がりだった！',
    'しみじみ': ' しみじみと、いい旅だったなぁ。',
    '冒険': ' ちょっとした冒険気分が止まらない。'
  };

  // ── ハッシュタグ ──
  var HASH_BASE = ['#旅行', '#旅好きな人と繋がりたい', '#travel', '#旅の思い出'];
  var HASH_VIBE = {
    'エモい': ['#エモい景色', '#エモい写真'],
    'キラキラ': ['#キラキラ', '#キラキラ写真部'],
    'ゆるふわ': ['#ゆるふわ旅', '#のんびり旅'],
    'かっこいい': ['#絶景スポット', '#男旅'],
    '癒し': ['#癒し旅', '#リフレッシュ旅'],
    'グルメ': ['#グルメ旅', '#ご当地グルメ'],
    '絶景': ['#絶景', '#死ぬまでに行きたい絶景']
  };

  function generate() {
    var dest = document.getElementById('dest').value.trim();
    var vibe = document.getElementById('vibe').value;
    var mood = document.getElementById('mood').value;
    var withHash = document.getElementById('hash').checked;

    var err = document.getElementById('err');
    if (!dest) {
      err.textContent = '行先を入力してください';
      err.style.display = 'block';
      document.getElementById('captions').innerHTML = '';
      return;
    }
    err.style.display = 'none';

    save({ dest: dest, vibe: vibe, mood: mood, hash: withHash });

    var tpls = TEMPLATES[vibe] || TEMPLATES['エモい'];
    var tail = MOOD_TAIL[mood] || '';
    var hashTags = withHash
      ? '\n\n' + HASH_BASE.concat(HASH_VIBE[vibe] || [], ['#' + dest]).join(' ')
      : '';

    var captions = tpls.map(function (t) {
      return t.replace(/\{D\}/g, dest) + tail + hashTags;
    });

    var html = captions.map(function (c, i) {
      var safe = c.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<div class="caption-card">'
           +   '<p class="caption-num">パターン ' + (i + 1) + '</p>'
           +   '<p class="caption-text" id="cap-' + i + '">' + safe + '</p>'
           +   '<button class="btn-copy" onclick="copyCap(' + i + ', this)">📋 コピー</button>'
           + '</div>';
    }).join('');

    document.getElementById('captions').innerHTML = html;
  }

  function copyCap(i, btn) {
    var txt = document.getElementById('cap-' + i).textContent;
    var done = function () {
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(function () {
        btn.textContent = '📋 コピー';
        btn.classList.remove('copied');
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, function () { fallbackCopy(txt); done(); });
    } else {
      fallbackCopy(txt);
      done();
    }
  }

  function fallbackCopy(txt) {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function save(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }

  function restore() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.dest) document.getElementById('dest').value = d.dest;
      if (d.vibe) document.getElementById('vibe').value = d.vibe;
      if (d.mood) document.getElementById('mood').value = d.mood;
      if (typeof d.hash === 'boolean') document.getElementById('hash').checked = d.hash;
    } catch (e) {}
  }
  restore();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>

</body>
</html>
