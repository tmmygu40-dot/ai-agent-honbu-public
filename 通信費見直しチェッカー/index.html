<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通信費見直しチェッカー</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #d0dce8;
      --accent: #1a7fd4;
      --accent-light: #e8f3fc;
      --text: #1c2b3a;
      --text-sub: #5a7080;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── プランブロック ── */
    .plan-block {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .plan-block:last-child { margin-bottom: 0; }
    .plan-block .plan-label {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.75rem;
    }
    .plan-row { display: flex; gap: 0.75rem; }
    .plan-row .field { flex: 1; margin-bottom: 0; }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: #fff; color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── プラン追加ボタン ── */
    .btn-add-plan {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 0.5rem; padding: 0.65rem;
      font-size: 0.88rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border: 1.5px dashed var(--accent); border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add-plan:hover { background: #d4eaf8; }

    /* ── 計算ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #1060a8, 0 6px 16px rgba(26,127,212,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1060a8, 0 2px 8px rgba(26,127,212,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }
    .detail-table .ok-row td:last-child { color: var(--ok); }
    .detail-table .ng-row td:last-child { color: var(--ng); }

    /* ── 比較テーブル ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    .compare-table th, .compare-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); text-align: right; }
    .compare-table th:first-child, .compare-table td:first-child { text-align: left; }
    .compare-table th { font-size: 0.72rem; color: var(--text-sub); font-weight: 700; letter-spacing: 0.04em; }
    .compare-table .best { background: var(--ok-bg); font-weight: 700; }
    .compare-table .best td { color: var(--ok); }
    .compare-table .best td:first-child { color: var(--text); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</head>
<body>

  <header class="app-header">
    <h1>📱 通信費見直しチェッカー</h1>
    <p class="subtitle">格安SIMへの乗り換えで年間いくら節約できるか即確認</p>
  </header>

  <!-- 現在のキャリア入力 -->
  <div class="card">
    <p class="card-title">現在のキャリア</p>
    <div class="plan-row">
      <div class="field">
        <label for="cur-name">キャリア名</label>
        <input type="text" id="cur-name" placeholder="例：docomo">
      </div>
      <div class="field">
        <label for="cur-fee">月額（円）</label>
        <input type="number" id="cur-fee" placeholder="例：8000" min="0">
      </div>
    </div>
    <p class="hint" style="margin-top:0.5rem;font-size:0.72rem;color:var(--text-sub)">
      オプション・端末代込みの実際の請求額を入力すると正確です
    </p>
  </div>

  <!-- 乗り換え先プラン -->
  <div class="card">
    <p class="card-title">乗り換え先プラン（最大3プラン）</p>
    <div id="plans-container">
      <div class="plan-block" id="plan-1">
        <p class="plan-label">プラン 1</p>
        <div class="plan-row">
          <div class="field">
            <label>プラン名</label>
            <input type="text" class="plan-name" placeholder="例：楽天モバイル">
          </div>
          <div class="field">
            <label>月額（円）</label>
            <input type="number" class="plan-fee" placeholder="例：3278" min="0">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- プラン追加ボタン -->
  <button class="btn-add-plan" id="btn-add" onclick="addPlan()">＋ プランを追加する</button>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">節約額を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">最大年間節約額</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">プラン別比較</p>
    <table class="compare-table">
      <thead>
        <tr>
          <th>プラン名</th>
          <th>月額</th>
          <th>月額差額</th>
          <th>年間節約額</th>
        </tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>

  <!-- 月次内訳カード -->
  <div class="card" id="breakdown" style="display:none">
    <p class="card-title">内訳（最安プラン）</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  var planCount = 1;

  function addPlan() {
    if (planCount >= 3) return;
    planCount++;
    var container = document.getElementById('plans-container');
    var block = document.createElement('div');
    block.className = 'plan-block';
    block.id = 'plan-' + planCount;
    block.innerHTML =
      '<p class="plan-label">プラン ' + planCount + '</p>' +
      '<div class="plan-row">' +
        '<div class="field"><label>プラン名</label>' +
        '<input type="text" class="plan-name" placeholder="例：IIJmio"></div>' +
        '<div class="field"><label>月額（円）</label>' +
        '<input type="number" class="plan-fee" placeholder="例：2000" min="0"></div>' +
      '</div>';
    container.appendChild(block);
    if (planCount >= 3) {
      document.getElementById('btn-add').style.display = 'none';
    }
    saveToStorage();
  }

  function calc() {
    var curName = document.getElementById('cur-name').value.trim() || '現在のキャリア';
    var curFee  = parseFloat(document.getElementById('cur-fee').value);
    if (isNaN(curFee) || curFee <= 0) {
      showErr('現在の月額を入力してください');
      return;
    }

    var names = document.querySelectorAll('.plan-name');
    var fees  = document.querySelectorAll('.plan-fee');
    var plans = [];
    for (var i = 0; i < names.length; i++) {
      var fee = parseFloat(fees[i].value);
      if (!isNaN(fee) && fee >= 0) {
        plans.push({
          name: names[i].value.trim() || 'プラン' + (i + 1),
          fee: fee
        });
      }
    }

    if (plans.length === 0) {
      showErr('乗り換え先プランの月額を入力してください');
      return;
    }

    // 各プランの節約額を計算
    plans.forEach(function(p) {
      p.diff = curFee - p.fee;
      p.annual = p.diff * 12;
    });

    // 最大節約プランを探す
    var best = plans.reduce(function(a, b) { return a.annual > b.annual ? a : b; });

    var level = best.annual > 0 ? 'ok' : best.annual < 0 ? 'ng' : 'warn';
    var label, note;
    if (best.annual > 0) {
      label = '年間 ' + fmt(best.annual) + ' 円 節約できます';
      note  = '最安プラン「' + best.name + '」に乗り換えた場合\n月額 ' + fmt(best.diff) + ' 円 × 12ヶ月';
    } else if (best.annual < 0) {
      label = '年間 ' + fmt(Math.abs(best.annual)) + ' 円 割高になります';
      note  = '現在のプランの方がお得な場合があります。\nオプション内容を再確認してください。';
    } else {
      label = '現在と同額です';
      note  = '月額の差はありません';
    }

    showResult(level, label, note);

    // 比較テーブル
    var bestAnnual = best.annual;
    var rows = plans.map(function(p) {
      var isBest = p.annual === bestAnnual && p.annual > 0;
      var diffStr = (p.diff >= 0 ? '−' : '＋') + fmt(Math.abs(p.diff)) + ' 円';
      var annualStr = (p.annual >= 0 ? '▲' : '▼') + fmt(Math.abs(p.annual)) + ' 円';
      return '<tr' + (isBest ? ' class="best"' : '') + '>' +
        '<td>' + escHtml(p.name) + (isBest ? ' ⭐' : '') + '</td>' +
        '<td>' + fmt(p.fee) + ' 円</td>' +
        '<td>' + diffStr + '</td>' +
        '<td>' + annualStr + '</td>' +
        '</tr>';
    });
    document.getElementById('compare-body').innerHTML = rows.join('');
    document.getElementById('detail').style.display = '';

    // 内訳（最安プラン）
    showDetail([
      ['現在の月額（' + escHtml(curName) + '）', fmt(curFee) + ' 円'],
      ['新プラン月額（' + escHtml(best.name) + '）', fmt(best.fee) + ' 円'],
      ['月額差額', fmt(Math.abs(best.diff)) + ' 円'],
      ['年間節約額', fmt(Math.abs(best.annual)) + ' 円', true],
      ['5年間節約額', fmt(Math.abs(best.annual * 5)) + ' 円'],
      ['10年間節約額', fmt(Math.abs(best.annual * 10)) + ' 円'],
    ]);

    saveToStorage();
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = '';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
  }
  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r) {
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>' +
        '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('breakdown').style.display = '';
  }
  function showErr(msg) {
    showResult('ng', '⚠️ 入力エラー', msg);
    document.getElementById('detail').style.display = 'none';
    document.getElementById('breakdown').style.display = 'none';
  }
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ── localStorage ── */
  var STORE_KEY = 'tsushinhi-checker-v1';

  function saveToStorage() {
    var names = document.querySelectorAll('.plan-name');
    var fees  = document.querySelectorAll('.plan-fee');
    var plans = [];
    for (var i = 0; i < names.length; i++) {
      plans.push({ name: names[i].value, fee: fees[i].value });
    }
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        curName: document.getElementById('cur-name').value,
        curFee:  document.getElementById('cur-fee').value,
        planCount: planCount,
        plans: plans
      }));
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      document.getElementById('cur-name').value = d.curName || '';
      document.getElementById('cur-fee').value  = d.curFee  || '';

      // 追加プランを復元
      if (d.planCount && d.planCount > 1) {
        for (var i = 1; i < d.planCount; i++) {
          addPlan();
        }
      }
      if (d.plans) {
        var names = document.querySelectorAll('.plan-name');
        var fees  = document.querySelectorAll('.plan-fee');
        d.plans.forEach(function(p, i) {
          if (names[i]) names[i].value = p.name || '';
          if (fees[i])  fees[i].value  = p.fee  || '';
        });
      }
    } catch(e) {}
  }

  // 入力変更時に自動保存
  document.addEventListener('input', function(e) {
    if (e.target.matches('input')) saveToStorage();
  });

  // 初期ロード
  loadFromStorage();
  </script>

</body>
</html>
