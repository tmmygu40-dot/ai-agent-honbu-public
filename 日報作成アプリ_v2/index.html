<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報作成アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>日報作成アプリ</h1>

    <section class="card">
      <h2>① 基本情報</h2>
      <div class="form-row">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
      <div class="form-row">
        <label for="name">氏名</label>
        <input type="text" id="name" placeholder="山田 太郎">
      </div>
    </section>

    <section class="card">
      <h2>② 作業内容</h2>
      <div id="tasks-container">
        <div class="task-item">
          <div class="task-row">
            <input type="text" class="task-name" placeholder="作業内容（例：資料作成）">
            <input type="time" class="task-start" title="開始時間">
            <span class="time-sep">〜</span>
            <input type="time" class="task-end" title="終了時間">
            <button class="btn-remove" onclick="removeTask(this)" title="削除">✕</button>
          </div>
          <textarea class="task-detail" placeholder="詳細メモ（任意）" rows="2"></textarea>
        </div>
      </div>
      <button class="btn-add" onclick="addTask()">＋ 作業を追加</button>
    </section>

    <section class="card">
      <h2>③ 課題・明日の予定</h2>
      <div class="form-row">
        <label for="issues">今日の課題・問題点</label>
        <textarea id="issues" rows="3" placeholder="気づいた問題点や改善点（任意）"></textarea>
      </div>
      <div class="form-row">
        <label for="tomorrow">明日の予定・対応</label>
        <textarea id="tomorrow" rows="3" placeholder="明日やること・フォローアップ（任意）"></textarea>
      </div>
      <div class="form-row">
        <label for="memo">その他メモ</label>
        <textarea id="memo" rows="2" placeholder="連絡事項など（任意）"></textarea>
      </div>
    </section>

    <div class="action-bar">
      <button class="btn-generate" onclick="generateReport()">日報を生成</button>
      <button class="btn-clear" onclick="clearAll()">クリア</button>
    </div>

    <section class="card output-section" id="output-section" style="display:none;">
      <div class="output-header">
        <h2>生成された日報</h2>
        <button class="btn-copy" onclick="copyReport()" id="copy-btn">コピー</button>
      </div>
      <pre id="output-text"></pre>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
