<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="推しキャラの特徴を入力するだけで、水彩画風のAI画像生成プロンプト（英語）をワンタップで作成・コピーできるツールです。">
  <title>推しキャラ水彩画風AI画像プロンプトメーカー</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }
    .field textarea { resize: vertical; min-height: 60px; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align: center; }
    .prompt-output {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px;
      padding: 1rem; font-size: 0.92rem; line-height: 1.6; color: var(--text);
      word-break: break-word; margin-bottom: 1rem; min-height: 80px;
    }
    .btn-copy {
      display: block; width: 100%; padding: 0.8rem;
      font-size: 1rem; font-weight: 700;
      background: var(--ok); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }
    .btn-copy.copied { background: var(--text-sub); }

    /* ── 履歴カード ── */
    .history-item {
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-meta { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    .history-prompt { color: var(--text); word-break: break-word; }
    .history-actions { margin-top: 0.4rem; display: flex; gap: 0.5rem; }
    .history-actions button {
      font-size: 0.75rem; padding: 0.3rem 0.7rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--card); color: var(--text-sub); cursor: pointer;
    }
    .history-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .btn-clear-all {
      display: block; width: 100%; padding: 0.5rem;
      font-size: 0.82rem; color: var(--ng); background: none;
      border: 1px solid var(--ng); border-radius: 8px;
      cursor: pointer; margin-top: 0.8rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🎨 推しキャラ水彩画風AI画像プロンプトメーカー</h1>
    <p class="subtitle">キャラの特徴を選ぶだけで、水彩画風のAI画像プロンプトをサクッと英語で生成できます。</p>
  </header>

  <!-- キャラ特徴入力カード -->
  <div class="card">
    <p class="card-title">キャラクターの特徴</p>
    <div class="field">
      <label for="charName">キャラ名・ニックネーム（任意）</label>
      <input type="text" id="charName" placeholder="例: 青い髪の魔法少女">
      <p class="hint">プロンプトには含まれません。履歴のメモ用です</p>
    </div>
    <div class="field">
      <label for="gender">性別・体型</label>
      <select id="gender">
        <option value="1 girl">女の子</option>
        <option value="1 boy">男の子</option>
        <option value="1 woman">大人の女性</option>
        <option value="1 man">大人の男性</option>
        <option value="1 child">子ども</option>
        <option value="1 person">指定なし</option>
      </select>
    </div>
    <div class="field">
      <label for="hairStyle">髪型</label>
      <select id="hairStyle">
        <option value="long hair">ロングヘア</option>
        <option value="short hair">ショートヘア</option>
        <option value="medium hair">ミディアムヘア</option>
        <option value="twin tails">ツインテール</option>
        <option value="ponytail">ポニーテール</option>
        <option value="bob cut">ボブカット</option>
        <option value="braided hair">三つ編み</option>
        <option value="messy hair">ふわくしゃ</option>
        <option value="straight hair">ストレート</option>
        <option value="wavy hair">ウェーブ</option>
        <option value="spiky hair">逆立ち・スパイキー</option>
        <option value="bald">坊主</option>
      </select>
    </div>
    <div class="field">
      <label for="hairColor">髪の色</label>
      <select id="hairColor">
        <option value="black hair">黒</option>
        <option value="brown hair">茶色</option>
        <option value="blonde hair">金色</option>
        <option value="silver hair">銀色</option>
        <option value="blue hair">青</option>
        <option value="pink hair">ピンク</option>
        <option value="red hair">赤</option>
        <option value="green hair">緑</option>
        <option value="purple hair">紫</option>
        <option value="white hair">白</option>
        <option value="gradient hair, multicolored hair">グラデーション</option>
      </select>
    </div>
    <div class="field">
      <label for="eyeColor">瞳の色</label>
      <select id="eyeColor">
        <option value="blue eyes">青</option>
        <option value="brown eyes">茶色</option>
        <option value="green eyes">緑</option>
        <option value="red eyes">赤</option>
        <option value="purple eyes">紫</option>
        <option value="golden eyes">金</option>
        <option value="heterochromia">オッドアイ</option>
      </select>
    </div>
    <div class="field">
      <label for="outfit">服装</label>
      <select id="outfit">
        <option value="school uniform">制服</option>
        <option value="casual clothes, t-shirt">カジュアル</option>
        <option value="dress, elegant">ドレス</option>
        <option value="kimono, japanese clothes">着物・和装</option>
        <option value="armor, fantasy">ファンタジー鎧</option>
        <option value="maid outfit">メイド服</option>
        <option value="hoodie, streetwear">パーカー・ストリート</option>
        <option value="suit, formal">スーツ・フォーマル</option>
        <option value="witch hat, robe, magical">魔法使いローブ</option>
        <option value="sports uniform">スポーツウェア</option>
        <option value="swimsuit">水着</option>
        <option value="gothic lolita">ゴスロリ</option>
      </select>
    </div>
    <div class="field">
      <label for="expression">表情</label>
      <select id="expression">
        <option value="smile, happy">笑顔</option>
        <option value="gentle smile, serene">穏やかな微笑み</option>
        <option value="serious, cool">クール・真���</option>
        <option value="shy, blush">照れ・恥ずかしい</option>
        <option value="surprised, open mouth">驚き</option>
        <option value="sad, tears">悲しみ・涙</option>
        <option value="angry, determined">怒り・決意</option>
        <option value="sleepy, drowsy">眠そう</option>
        <option value="wink, playful">ウィンク</option>
      </select>
    </div>
    <div class="field">
      <label for="pose">ポーズ</label>
      <select id="pose">
        <option value="standing">立ち姿</option>
        <option value="sitting">座り</option>
        <option value="upper body, portrait">上半身アップ</option>
        <option value="full body">全身</option>
        <option value="running, dynamic pose">走る・動的</option>
        <option value="hand on chest, emotional">胸に手をあてる</option>
        <option value="looking back, over shoulder">振り返り</option>
        <option value="lying down, relaxed">寝そべり</option>
        <option value="arms spread, joyful">両手を広げる</option>
        <option value="peace sign">ピースサイン</option>
      </select>
    </div>
    <div class="field">
      <label for="background">背景</label>
      <select id="background">
        <option value="cherry blossoms, spring, petals falling">桜・春</option>
        <option value="blue sky, clouds, sunny">青空</option>
        <option value="sunset, orange sky, dramatic lighting">夕焼け</option>
        <option value="night sky, stars, moonlight">星空・月明かり</option>
        <option value="flower garden, colorful flowers">花畑</option>
        <option value="forest, sunlight through trees, nature">森</option>
        <option value="city, urban, buildings">街並み</option>
        <option value="classroom, school">教室</option>
        <option value="ocean, beach, waves">海・ビーチ</option>
        <option value="rain, umbrella, wet">雨</option>
        <option value="snow, winter, cold breath">雪景色</option>
        <option value="simple background, white background">シンプル背景</option>
      </select>
    </div>
    <div class="field">
      <label for="extra">追加キーワード（任意）</label>
      <textarea id="extra" rows="2" placeholder="例: リボン、猫耳、魔法のステッキ"></textarea>
      <p class="hint">日本語でOK。自動で英語風に組み込みます</p>
    </div>
  </div>

  <!-- 画風設定カード -->
  <div class="card">
    <p class="card-title">水彩画スタイル</p>
    <div class="field">
      <label for="wcStyle">画風</label>
      <select id="wcStyle">
        <option value="transparent watercolor, delicate washes, soft edges">透明水彩（繊細・にじみ）</option>
        <option value="watercolor painting, vivid colors, wet-on-wet, paint drips">にじみ強め水彩</option>
        <option value="gouache painting, opaque watercolor, thick paint, matte finish">不透明水彩（ガッシュ）</option>
        <option value="watercolor sketch, pen and wash, ink outlines, loose brushwork">ペン＋淡彩スケッチ</option>
        <option value="dreamy watercolor, pastel tones, ethereal, soft glow">ドリーミー淡彩</option>
        <option value="botanical watercolor, precise detail, natural tones">ボタニカル水彩（精密）</option>
      </select>
    </div>
    <div class="field">
      <label for="quality">品質タグ</label>
      <select id="quality">
        <option value="masterpiece, best quality, ultra-detailed, highres">最高品質</option>
        <option value="high quality, detailed, beautiful">高品質</option>
        <option value="good quality">標準</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">🎨 プロンプトを生成する</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">生成されたプロンプト（英語）</p>
    <div class="prompt-output" id="promptOut"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">📋 コピーする</button>
  </div>

  <!-- 履歴カード -->
  <div class="card" id="historyCard" style="display:none">
    <p class="card-title">生成履歴</p>
    <div id="historyList"></div>
    <button class="btn-clear-all no-print" onclick="clearHistory()">🗑 履歴をすべて削除</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 生成されるプロンプトはAI画像生成サービス（Stable Diffusion、Midjourney等）向けの参考テキストです。各サービスの利用規約に従ってご利用ください。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var HISTORY_KEY = 'oshiWatercolorHistory';

  function generate() {
    var gender = document.getElementById('gender').value;
    var hairStyle = document.getElementById('hairStyle').value;
    var hairColor = document.getElementById('hairColor').value;
    var eyeColor = document.getElementById('eyeColor').value;
    var outfit = document.getElementById('outfit').value;
    var expression = document.getElementById('expression').value;
    var pose = document.getElementById('pose').value;
    var background = document.getElementById('background').value;
    var extra = document.getElementById('extra').value.trim();
    var wcStyle = document.getElementById('wcStyle').value;
    var quality = document.getElementById('quality').value;
    var charName = document.getElementById('charName').value.trim();

    var parts = [quality, wcStyle, gender, hairColor, hairStyle, eyeColor, outfit, expression, pose, background];
    if (extra) { parts.push(extra); }

    var prompt = parts.join(', ');

    document.getElementById('promptOut').textContent = prompt;
    var rc = document.getElementById('result');
    rc.style.display = 'block';
    document.getElementById('btnCopy').textContent = '📋 コピーする';
    document.getElementById('btnCopy').className = 'btn-copy';

    saveHistory(charName || '(名前なし)', prompt);
    renderHistory();
  }

  function copyPrompt() {
    var text = document.getElementById('promptOut').textContent;
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied();
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  }

  function showCopied() {
    var btn = document.getElementById('btnCopy');
    btn.textContent = '✅ コピーしました！';
    btn.className = 'btn-copy copied';
    setTimeout(function() {
      btn.textContent = '📋 コピーする';
      btn.className = 'btn-copy';
    }, 2000);
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveHistory(name, prompt) {
    var hist = getHistory();
    hist.unshift({
      name: name,
      prompt: prompt,
      date: new Date().toLocaleString('ja-JP')
    });
    if (hist.length > 20) hist = hist.slice(0, 20);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
  }

  function renderHistory() {
    var hist = getHistory();
    var card = document.getElementById('historyCard');
    var list = document.getElementById('historyList');
    if (hist.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = hist.map(function(h, i) {
      return '<div class="history-item">'
        + '<div class="history-meta">' + escHtml(h.date) + ' ｜ ' + escHtml(h.name) + '</div>'
        + '<div class="history-prompt">' + escHtml(h.prompt) + '</div>'
        + '<div class="history-actions">'
        + '<button onclick="copyHistoryItem(' + i + ')">コピー</button>'
        + '<button onclick="deleteHistoryItem(' + i + ')">削除</button>'
        + '</div></div>';
    }).join('');
  }

  function copyHistoryItem(idx) {
    var hist = getHistory();
    if (!hist[idx]) return;
    var text = hist[idx].prompt;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function deleteHistoryItem(idx) {
    var hist = getHistory();
    hist.splice(idx, 1);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
    renderHistory();
  }

  function clearHistory() {
    if (!confirm('履歴をすべて削除しますか？')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  renderHistory();
  </script>
