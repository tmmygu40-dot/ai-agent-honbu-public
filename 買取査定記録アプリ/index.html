<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買取査定記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>買取査定記録アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-group">
        <label for="itemName">品名</label>
        <input type="text" id="itemName" placeholder="例：iPhone 14" maxlength="100">
      </div>
      <div class="form-group">
        <label for="itemCondition">状態</label>
        <select id="itemCondition">
          <option value="良品">良品</option>
          <option value="普通">普通</option>
          <option value="難あり">難あり</option>
        </select>
      </div>
      <div class="form-group">
        <label for="itemPrice">査定額（円）</label>
        <input type="number" id="itemPrice" placeholder="例：15000" min="0">
      </div>
      <div class="form-group">
        <label for="itemMemo">メモ（任意）</label>
        <input type="text" id="itemMemo" placeholder="例：傷あり・動作確認済み" maxlength="200">
      </div>
      <button id="addBtn" onclick="addRecord()">登録する</button>
    </section>

    <!-- 集計 -->
    <section class="summary-section">
      <h2>集計</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <span class="summary-label">件数</span>
          <span class="summary-value" id="totalCount">0</span>
          <span class="summary-unit">件</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">合計買取金額</span>
          <span class="summary-value" id="totalAmount">0</span>
          <span class="summary-unit">円</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">平均査定額</span>
          <span class="summary-value" id="avgAmount">0</span>
          <span class="summary-unit">円</span>
        </div>
      </div>
    </section>

    <!-- 絞り込み -->
    <section class="filter-section">
      <h2>履歴一覧</h2>
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="品名で検索..." oninput="renderList()">
        <select id="filterCondition" onchange="renderList()">
          <option value="">すべての状態</option>
          <option value="良品">良品</option>
          <option value="普通">普通</option>
          <option value="難あり">難あり</option>
        </select>
      </div>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="recordList">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
