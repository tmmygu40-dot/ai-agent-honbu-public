<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物流遅延対策アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>物流遅延対策アプリ</h1>
    <p class="subtitle">リードタイム延長時の欠品リスクと前倒し発注量を計算します</p>

    <div class="card">
      <h2>品目を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：原材料A">
        </div>
        <div class="form-group">
          <label for="stock">現在在庫数</label>
          <input type="number" id="stock" placeholder="例：100" min="0">
        </div>
        <div class="form-group">
          <label for="dailyUsage">1日消費量</label>
          <input type="number" id="dailyUsage" placeholder="例：10" min="1">
        </div>
        <div class="form-group">
          <label for="normalLead">通常リードタイム（日）</label>
          <input type="number" id="normalLead" placeholder="例：7" min="1">
        </div>
        <div class="form-group">
          <label for="delayDays">延長日数（日）</label>
          <input type="number" id="delayDays" placeholder="例：5" min="0">
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">登録・計算</button>
    </div>

    <div class="summary" id="summary" style="display:none;">
      <h2>登録品目一覧</h2>
      <div id="itemList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
