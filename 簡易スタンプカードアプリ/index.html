<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易スタンプカード</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>スタンプカード管理</h1>
  </header>

  <main>
    <!-- 顧客登録フォーム -->
    <section class="register-section">
      <h2>顧客登録</h2>
      <div class="register-form">
        <input type="text" id="customerName" placeholder="顧客名を入力" maxlength="20">
        <input type="number" id="stampMax" placeholder="スタンプ上限" value="10" min="1" max="100">
        <button id="addCustomerBtn">登録</button>
      </div>
    </section>

    <!-- 顧客カード一覧 -->
    <section class="cards-section">
      <h2>顧客一覧 <span id="customerCount">0</span>件</h2>
      <div id="customerList" class="customer-list">
        <p class="empty-msg">まだ顧客が登録されていません</p>
      </div>
    </section>
  </main>

  <!-- 達成モーダル -->
  <div id="achieveModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-stamp">🎉</div>
      <h3 id="achieveName"></h3>
      <p>スタンプが揃いました！</p>
      <div class="modal-actions">
        <button id="resetBtn" class="btn-reset">カードをリセット</button>
        <button id="closeModalBtn" class="btn-close">閉じる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
