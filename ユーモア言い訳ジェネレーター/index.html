  function pickRandom(arr, n) {
    var copy = arr.slice();
    var out = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      out.push(copy.splice(idx, 1)[0]);
    }
    return out;
  }

  function gen() {
    var scene = document.getElementById('scene').value;
    var type = document.getElementById('type').value;
    var extra = (document.getElementById('extra').value || '').trim();
    var x = extra || 'これ';

    var pool = (TEMPLATES[scene] && TEMPLATES[scene][type]) || [];
    if (pool.length === 0) {
      alert('組み合わせのフレーズが見つかりません');
      return;
    }
    var picks = pickRandom(pool, 3);
    var phrases = picks.map(function(t){ return t.replace(/\{X\}/g, x); });

    renderResult(phrases, scene, type);
    saveHistory(phrases, scene, type);
    renderHistory();
  }

  function renderResult(phrases, scene, type) {
    var card = document.getElementById('result-card');
    var list = document.getElementById('excuse-list');
    list.innerHTML = phrases.map(function(p, i){
      var safe = escapeHtml(p);
      return '<div class="excuse-item">'
           + '<span class="excuse-num">CASE ' + (i+1) + '</span>'
           + '<p class="excuse-text">' + safe + '</p>'
           + '<div class="excuse-actions">'
           +   '<button class="excuse-btn" onclick="copyText(this, \'' + escapeAttr(p) + '\')">📋 コピー</button>'
           +   '<button class="excuse-btn" onclick="addFav(this, \'' + escapeAttr(p) + '\', \'' + scene + '\', \'' + type + '\')">⭐ お気に入り</button>'
           + '</div>'
           + '</div>';
    }).join('');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(btn, text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){
        flashBtn(btn, '✓ コピー済', 'copied');
      }).catch(function(){ fallbackCopy(btn, text); });
    } else {
      fallbackCopy(btn, text);
    }
  }
  function fallbackCopy(btn, text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); flashBtn(btn, '✓ コピー済', 'copied'); }
    catch (e) { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }
  function flashBtn(btn, label, cls) {
    var orig = btn.textContent;
    btn.textContent = label;
    btn.classList.add(cls);
    setTimeout(function(){
      btn.textContent = orig;
      btn.classList.remove(cls);
    }, 1500);
  }

  // ── お気に入り ──
  var FAV_KEY = 'humor_excuse_favs_v1';
  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
    catch (e) { return []; }
  }
  function saveFavs(list) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(list)); } catch (e) {}
  }
  function addFav(btn, text, scene, type) {
    var favs = loadFavs();
    if (favs.some(function(f){ return f.text === text; })) {
      flashBtn(btn, '✓ 登録済', 'faved');
      return;
    }
    favs.unshift({ text: text, scene: scene, type: type, t: Date.now() });
    if (favs.length > 50) favs = favs.slice(0, 50);
    saveFavs(favs);
    flashBtn(btn, '⭐ 追加済', 'faved');
    renderFavs();
  }
  function removeFav(idx) {
    var favs = loadFavs();
    favs.splice(idx, 1);
    saveFavs(favs);
    renderFavs();
  }
  function renderFavs() {
    var favs = loadFavs();
    var box = document.getElementById('fav-list');
    if (favs.length === 0) {
      box.innerHTML = '<p class="empty-msg">まだお気に入りはありません</p>';
      return;
    }
    box.innerHTML = favs.map(function(f, i){
      var meta = (SCENE_LABELS[f.scene] || '') + '×' + (TYPE_LABELS[f.type] || '');
      return '<div class="fav-item">'
           + '<span class="history-meta">' + escapeHtml(meta) + '</span>'
           + '<span class="history-text">' + escapeHtml(f.text) + '</span>'
           + '<span class="item-actions">'
           +   '<button class="mini-btn" onclick="copyText(this, \'' + escapeAttr(f.text) + '\')">コピー</button>'
           +   '<button class="mini-btn" onclick="removeFav(' + i + ')">削除</button>'
           + '</span>'
           + '</div>';
    }).join('');
  }

  // ── 履歴 ──
  var HIST_KEY = 'humor_excuse_history_v1';
  function loadHist() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
    catch (e) { return []; }
  }
  function saveHistory(phrases, scene, type) {
    var hist = loadHist();
    phrases.forEach(function(p){
      hist.unshift({ text: p, scene: scene, type: type, t: Date.now() });
    });
    if (hist.length > 10) hist = hist.slice(0, 10);
    try { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); } catch (e) {}
  }
  function renderHistory() {
    var hist = loadHist();
    var box = document.getElementById('history-list');
    if (hist.length === 0) {
      box.innerHTML = '<p class="empty-msg">まだ履歴はありません</p>';
      return;
    }
    box.innerHTML = hist.map(function(h){
      var meta = (SCENE_LABELS[h.scene] || '') + '×' + (TYPE_LABELS[h.type] || '');
      return '<div class="history-item">'
           + '<span class="history-meta">' + escapeHtml(meta) + '</span>'
           + '<span class="history-text">' + escapeHtml(h.text) + '</span>'
           + '<span class="item-actions">'
           +   '<button class="mini-btn" onclick="copyText(this, \'' + escapeAttr(h.text) + '\')">コピー</button>'
           + '</span>'
           + '</div>';
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escapeAttr(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' ');
  }

  // 初期表示
  renderFavs();
  renderHistory();
  </script>
