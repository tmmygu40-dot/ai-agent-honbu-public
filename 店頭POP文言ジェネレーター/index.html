<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店頭POP文言ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── POP結果エリア ── */
    #pop-results { display: none; max-width: 600px; margin: 0 auto; }
    #pop-results .results-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.8rem; padding: 0 0.2rem;
    }

    /* ── POP文言カード ── */
    .pop-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
      margin-bottom: 0.8rem;
    }
    .pop-item-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .pop-pattern-name {
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      background: var(--accent-light); padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }
    .btn-copy {
      font-size: 0.75rem; font-weight: 600;
      background: var(--bg); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0.3rem 0.7rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--ok); color: var(--ok); }
    .pop-text {
      font-size: 1rem; font-weight: 700; color: var(--text);
      line-height: 1.55; white-space: pre-wrap; word-break: break-all;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print { display: none !important; }
      .card, .pop-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🏪 店頭POP文言ジェネレーター</h1>
    <p class="subtitle">商品情報を入力するだけで販促コピーを複数案生成</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">商品情報を入力</p>
    <div class="field">
      <label for="product-name">商品名 <span style="color:var(--ng)">*</span></label>
      <input type="text" id="product-name" placeholder="例：国産いちごジャム">
    </div>
    <div class="field">
      <label for="product-feature">特徴・魅力（1〜3つ）</label>
      <textarea id="product-feature" placeholder="例：無添加、糖度高め、朝食にぴったり"></textarea>
      <p class="hint">コンマ区切りで複数入力できます</p>
    </div>
    <div class="field">
      <label for="product-price">価格（税込）</label>
      <input type="text" id="product-price" placeholder="例：580円、特別価格 1,980円">
    </div>
    <div class="field">
      <label for="product-target">ターゲット・シーン（省略可）</label>
      <input type="text" id="product-target" placeholder="例：お子様のいるご家庭、贈り物に、朝食に">
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generate()">✨ POP文言を生成する</button>

  <!-- 生成結果 -->
  <div id="pop-results">
    <p class="results-title" style="max-width:600px;margin:0 auto 0.8rem;font-size:0.9rem;font-weight:700;color:var(--text);">生成されたPOP文言（全<span id="result-count">0</span>案）</p>
    <div id="pop-list"></div>
  </div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← トップへ戻る</a>

  <script>
  // ── テンプレートパターン定義 ──
  var PATTERNS = [
    {
      name: '訴求型',
      fn: function(d) {
        var feat = d.features[0] || d.name;
        return '【' + feat + '】\n' + d.name + '\nぜひ一度お試しください！' + (d.price ? '\n' + d.price : '');
      }
    },
    {
      name: '価格強調型',
      fn: function(d) {
        if (!d.price) return null;
        return d.name + '\n今だけ特別価格\n' + d.price + '！';
      }
    },
    {
      name: '感情訴求型',
      fn: function(d) {
        var feat = d.features[0] || '高品質';
        var scene = d.target || 'あなたの毎日';
        return feat + 'な ' + d.name + ' が\n' + scene + ' をもっと豊かに。' + (d.price ? '\n' + d.price : '');
      }
    },
    {
      name: 'シンプル型',
      fn: function(d) {
        var parts = [d.name];
        if (d.features[0]) parts.push(d.features[0]);
        if (d.price) parts.push(d.price);
        return parts.join('\n');
      }
    },
    {
      name: '限定型',
      fn: function(d) {
        var feat = d.features.slice(0, 2).join('・') || '高品質';
        return '≪数量限定≫\n' + d.name + '\n' + feat + (d.price ? '\n' + d.price : '');
      }
    },
    {
      name: '問いかけ型',
      fn: function(d) {
        var feat = d.features[0] || '品質';
        return feat + ' にこだわるなら\nこれ一択！\n' + d.name + (d.price ? '  ' + d.price : '');
      }
    },
    {
      name: 'ベネフィット型',
      fn: function(d) {
        var feat = d.features.length > 1 ? d.features.slice(0, 2).join('×') : (d.features[0] || '高品質');
        var target = d.target ? d.target + ' に' : 'おすすめ！';
        return feat + '\n' + d.name + '\n' + target + (d.price ? '\n' + d.price : '');
      }
    },
    {
      name: 'おすすめ型',
      fn: function(d) {
        var feat = d.features.join('・') || '高品質';
        return 'スタッフおすすめ！\n' + d.name + '\n' + feat + (d.price ? '\n' + d.price : '');
      }
    }
  ];

  function generate() {
    var name    = document.getElementById('product-name').value.trim();
    var feature = document.getElementById('product-feature').value.trim();
    var price   = document.getElementById('product-price').value.trim();
    var target  = document.getElementById('product-target').value.trim();

    if (!name) { alert('商品名を入力してください'); return; }

    // 特徴を分割（コンマ・読点・改行で区切る）
    var features = feature
      ? feature.split(/[,，、\n]/).map(function(s){ return s.trim(); }).filter(Boolean)
      : [];

    var data = { name: name, features: features, price: price, target: target };

    // 生成
    var results = [];
    for (var i = 0; i < PATTERNS.length; i++) {
      var text = PATTERNS[i].fn(data);
      if (text) results.push({ name: PATTERNS[i].name, text: text });
    }

    // 表示
    var listEl = document.getElementById('pop-list');
    listEl.innerHTML = '';
    for (var j = 0; j < results.length; j++) {
      listEl.appendChild(createPopItem(results[j].name, results[j].text));
    }
    document.getElementById('result-count').textContent = results.length;
    document.getElementById('pop-results').style.display = 'block';

    // localStorage 保存
    try {
      var history = JSON.parse(localStorage.getItem('pop_gen_history') || '[]');
      history.unshift({ date: new Date().toISOString(), name: name, feature: feature, price: price, target: target });
      if (history.length > 20) history = history.slice(0, 20);
      localStorage.setItem('pop_gen_history', JSON.stringify(history));
    } catch(e) {}

    // スクロール
    document.getElementById('pop-results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function createPopItem(patternName, text) {
    var item = document.createElement('div');
    item.className = 'pop-item';

    var header = document.createElement('div');
    header.className = 'pop-item-header';

    var badge = document.createElement('span');
    badge.className = 'pop-pattern-name';
    badge.textContent = patternName;

    var copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy no-print';
    copyBtn.textContent = 'コピー';
    copyBtn.onclick = (function(t, btn) {
      return function() {
        navigator.clipboard.writeText(t).then(function() {
          btn.textContent = '✓ コピー済';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'コピー';
            btn.classList.remove('copied');
          }, 2000);
        }).catch(function() {
          // フォールバック
          var ta = document.createElement('textarea');
          ta.value = t;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.textContent = '✓ コピー済';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'コピー';
            btn.classList.remove('copied');
          }, 2000);
        });
      };
    })(text, copyBtn);

    header.appendChild(badge);
    header.appendChild(copyBtn);

    var textEl = document.createElement('p');
    textEl.className = 'pop-text';
    textEl.textContent = text;

    item.appendChild(header);
    item.appendChild(textEl);
    return item;
  }
  </script>

  <script src="../fav-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
