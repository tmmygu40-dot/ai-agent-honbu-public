<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界の変な法律3択クイズ｜ホントはどれ？</title>
  <meta name="description" content="3つの「世界の変な法律」のうち、本当に存在する（した）のはどれ？10問の3択クイズで、思わず誰かに話したくなる雑学が身につく無料クイズアプリです。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .progress {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.6rem;
    }
    .question {
      font-size: 1.05rem; font-weight: 700; line-height: 1.55;
      margin-bottom: 1rem;
    }
    .choice-btn {
      display: block; width: 100%;
      padding: 0.85rem 1rem; margin-bottom: 0.6rem;
      font-size: 0.95rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700;
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng); font-weight: 700;
    }
    .choice-btn.correct::after { content: ' ◯ ホント'; }
    .choice-btn.wrong::after { content: ' ✕ ウソ'; }

    .explain-card {
      display: none; background: var(--accent-light);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 1.1rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .explain-label {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .explain-text {
      font-size: 0.95rem; color: var(--text); line-height: 1.65;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.92rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.4rem; }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>世界の変な法律3択クイズ</h1>
    <p class="subtitle">3つのうち、ホントに存在する（した）法律はどれ？※2026年4月時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="progress" id="progress">第 1 問 / 全 10 問</p>
    <p class="question" id="question">問題</p>
    <div id="choices"></div>
  </div>

  <div class="explain-card" id="explain">
    <p class="explain-label">解説</p>
    <p class="explain-text" id="explain-text"></p>
  </div>

  <button class="btn-calc" id="next-btn" style="display:none" onclick="next()">次の問題へ</button>

  <div class="result-card" id="result">
    <p class="result-label">あなたのスコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <button class="btn-calc" style="margin-top:1.2rem;background:var(--text);box-shadow:0 4px 0 #555,0 6px 16px rgba(0,0,0,0.2);" onclick="restart()">もう一度遊ぶ</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、各国の法務関連の公開資料・報道・観光庁・外務省の渡航情報などを参考に、雑学として楽しく整理しています。一部は過去に存在した・現在も解釈に幅がある法律を含みます。最新情報は各国の公式情報をご確認ください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: 'アメリカ・アラバマ州に実在するとされる「変な法律」はどれ？',
      choices: [
        '目隠しをして車を運転してはいけない',
        'ペンギンに向かって歌を歌ってはいけない',
        'サボテンを月曜日に撃つと違反になる'
      ],
      correct: 0,
      explain: '正解は「目隠し運転禁止」。アラバマ州の古い条文として有名な一文で、もちろんしないに越したことはありません。'
    },
    {
      q: 'イギリスで王室特権として残るとされる「変な法律」はどれ？',
      choices: [
        '路上で犬に向かって笑うと罰金になる',
        '王冠を被って地下鉄に乗ると逮捕される',
        '英国沿岸で見つかった死んだクジラは原則として国王（王室）のもの'
      ],
      correct: 2,
      explain: '正解はクジラの話。中世以来の王室特権「Royal Fish」の慣習で、クジラ・チョウザメは原則として王室扱いとされています。'
    },
    {
      q: 'スイスの一部地域で実在する（とされる）ルールはどれ？',
      choices: [
        '日曜日に大きな音を出す芝刈り機の使用が制限されている',
        'チョコレートを夜8時以降に食べると違反',
        '牛にカウベルを付けないと罰金'
      ],
      correct: 0,
      explain: '正解は「日曜の芝刈り」。スイスでは安息日として日曜の騒音規制が厳しく、芝刈り機・洗車機の使用が禁止される自治体があります。'
    },
    {
      q: 'シンガポールで知られる「変な法律」はどれ？',
      choices: [
        '雨の日に傘を3本以上持つと違反',
        '医療目的以外でガム（チューインガム）の販売・輸入が原則禁止',
        '大きな笑い声を上げると注意される'
      ],
      correct: 1,
      explain: '正解はガムの話。1992年から、ニコチンガム等を除き販売・輸入が原則禁止。ポイ捨て対策として有名です。'
    },
    {
      q: 'フランスでかつて存在した（現在も話題になる）法律はどれ？',
      choices: [
        '豚に「ナポレオン」と名付けることは禁止',
        'パンを横向きに置くと罰金',
        'チーズを冷蔵庫に入れると違反'
      ],
      correct: 0,
      explain: '正解は豚の名前。皇帝ナポレオンを侮辱するとして、豚に「ナポレオン」と名付けるのを禁じた古い規定が知られています。'
    },
    {
      q: 'イタリア・ベネチアで違反になるとされる行為はどれ？',
      choices: [
        'パスタを15分以内に食べきる',
        'サン・マルコ広場などで鳩に餌をやる',
        '黒いネクタイを締めて運河沿いを歩く'
      ],
      correct: 1,
      explain: '正解は鳩への餌やり。糞害・建物の劣化対策で2008年から禁止され、違反者には罰金が科されます。'
    },
    {
      q: 'タイで観光客も注意したい不敬罪関連のルールはどれ？',
      choices: [
        'バナナを片手で食べると違反',
        '寺院でジャンプすると即逮捕',
        '国王の肖像がある紙幣・硬貨を踏みつける行為は不敬罪に問われうる'
      ],
      correct: 2,
      explain: '正解は紙幣の話。タイは不敬罪（lèse-majesté）が厳格で、国王の肖像がある通貨を踏む・破る行為は処罰対象になり得ます。'
    },
    {
      q: 'オーストラリア・ビクトリア州で長らくネタにされてきた古い規定はどれ？',
      choices: [
        '認可を受けた電気技師以外が電球を交換するのは違法',
        'カンガルーに敬礼しないと罰金',
        'ビーチで2人以上で泳ぐと違反'
      ],
      correct: 0,
      explain: '正解は電球交換。「認可なく電気工事をしてはいけない」という規定が、電球交換まで違法と解釈されるとして長年ネタにされてきました。'
    },
    {
      q: 'カナダの通貨法で実在するとされるルールはどれ？',
      choices: [
        '「カナダ」の発音を間違えると罰金',
        '雪を投げると逮捕される',
        '硬貨での支払いには金種ごとに上限額があり、相手は受取を拒否できる'
      ],
      correct: 2,
      explain: '正解は硬貨の上限。カナダの通貨法では、5¢硬貨は5ドルまで等、1回の支払いに使える金額が決められています。'
    },
    {
      q: '日本に現在も残る「ちょっと変わった法律」はどれ？',
      choices: [
        '銭湯で歌うのは法律で禁止',
        '横断歩道で振り向くと罰金',
        '明治時代制定の「決闘罪ニ関スル件」が今も有効で、決闘の申込・応諾も処罰対象'
      ],
      correct: 2,
      explain: '正解は決闘罪。1889年（明治22年）制定の法律が今も生きており、近年も適用例があります。'
    }
  ];

  var idx = 0;
  var score = 0;

  function render() {
    var card = document.getElementById('quiz-card');
    var progress = document.getElementById('progress');
    var question = document.getElementById('question');
    var choices = document.getElementById('choices');
    var explain = document.getElementById('explain');
    var nextBtn = document.getElementById('next-btn');
    var result = document.getElementById('result');

    explain.style.display = 'none';
    nextBtn.style.display = 'none';
    result.style.display = 'none';
    card.style.display = 'block';

    var qd = QUESTIONS[idx];
    progress.textContent = '第 ' + (idx + 1) + ' 問 / 全 ' + QUESTIONS.length + ' 問';
    question.textContent = qd.q;
    choices.innerHTML = '';
    for (var i = 0; i < qd.choices.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = qd.choices[i];
      (function(picked){
        btn.addEventListener('click', function(){ answer(picked); });
      })(i);
      choices.appendChild(btn);
    }
  }

  function answer(picked) {
    var qd = QUESTIONS[idx];
    var btns = document.querySelectorAll('#choices .choice-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (i === qd.correct) {
        btns[i].classList.add('correct');
      } else if (i === picked) {
        btns[i].classList.add('wrong');
      }
    }
    if (picked === qd.correct) score++;

    document.getElementById('explain-text').textContent = qd.explain;
    document.getElementById('explain').style.display = 'block';

    var nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = (idx === QUESTIONS.length - 1) ? '結果を見る' : '次の問題へ';
  }

  function next() {
    if (idx < QUESTIONS.length - 1) {
      idx++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('explain').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    var rc = document.getElementById('result');
    var level = score >= 8 ? 'ok' : score >= 5 ? 'warn' : 'ng';
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';

    document.getElementById('rv').textContent = score + ' / ' + QUESTIONS.length + ' 問正解';
    var note = level === 'ok' ? '雑学博士レベル！飲み会で披露できます。'
             : level === 'warn' ? 'いい線いってる。あと一押しで雑学マスター。'
             : 'ここからが伸びしろ。もう一度チャレンジしてみよう。';
    document.getElementById('rn').textContent = note;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restart() {
    idx = 0;
    score = 0;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  render();
  </script>
