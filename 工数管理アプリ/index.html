{"@context":"https://schema.org","@type":"SoftwareApplication","name":"工数管理アプリ","description":"工数管理アプリ。条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。スマホでも快適にご利用いただけます。","url":"https://nekopoke.jp/%E5%B7%A5%E6%95%B0%E7%AE%A1%E7%90%86%E3%82%A2%E3%83%97%E3%83%AA/","applicationCategory":"UtilityApplication","operatingSystem":"Any"}

<body>
  <div class="container">
    <h1>工数管理アプリ</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <section class="form-section">
      <h2>作業記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="projectName">案件名</label>
          <input type="text" id="projectName" placeholder="例：Aサイト制作">
        </div>
        <div class="form-group">
          <label for="hourlyRate">時給（円）</label>
          <input type="number" id="hourlyRate" placeholder="例：3000" min="0">
        </div>
        <div class="form-group">
          <label for="workHours">作業時間（時間）</label>
          <input type="number" id="workHours" placeholder="例：2.5" min="0" step="0.25">
        </div>
        <div class="form-group">
          <label for="workDate">作業日</label>
          <input type="date" id="workDate">
        </div>
        <div class="form-group form-group--full">
          <label for="workMemo">メモ（任意）</label>
          <input type="text" id="workMemo" placeholder="例：デザイン修正">
        </div>
      </div>
      <button id="addBtn" class="btn btn--primary">追加する</button>
    </section>

    <section class="filter-section">
      <label for="filterProject">案件で絞り込み：</label>
      <select id="filterProject">
        <option value="">すべて表示</option>
      </select>
    </section>

    <section class="summary-section" id="summarySection">
      <!-- 集計は JS で生成 -->
    </section>

    <section class="records-section">
      <h2>作業記録一覧</h2>
      <div id="recordsList" class="records-list">
        <p class="empty-msg">記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
