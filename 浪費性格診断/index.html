<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問の質問に答えるだけで、あなたの無駄遣い癖を戦国武将に例えて診断。30秒でサクッと浪費タイプが分かります。">
  <title>浪費性格診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 診断専用スタイル ── */
    .progress-bar {
      max-width: 600px; margin: 0 auto 0.5rem;
      height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); transition: width 0.3s;
    }
    .progress-text {
      max-width: 600px; margin: 0 auto 1rem;
      font-size: 0.75rem; color: var(--text-sub); text-align: center;
    }
    .question-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; text-align: center;
    }
    .choices {
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .choice-btn {
      width: 100%; padding: 0.9rem 1rem;
      font-size: 0.95rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:active { transform: scale(0.98); }

    .warlord-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .warlord-name { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.3rem; }
    .warlord-title { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 1rem; }
    .warlord-desc { font-size: 0.9rem; color: var(--text); line-height: 1.6; text-align: left; margin-bottom: 1rem; }
    .warlord-advice {
      font-size: 0.85rem; line-height: 1.5; text-align: left;
      padding: 0.8rem; background: var(--accent-light);
      border-radius: 8px; border: 1px solid var(--border);
    }
    .warlord-advice strong { color: var(--accent); }

    .retry-btn {
      display: inline-block; margin-top: 1.2rem; padding: 0.7rem 2rem;
      font-size: 0.9rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
    }

    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>⚔️ 浪費性格診断</h1>
    <p class="subtitle">あなたの無駄遣い癖を戦国武将に例えます。5問30秒でサクッと診断！</p>
  </header>

  <!-- 進捗バー -->
  <div class="progress-bar" id="pbar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
  <p class="progress-text" id="ptext"></p>

  <!-- 質問カード -->
  <div class="card" id="quiz-card">
    <p class="question-text" id="q-text"></p>
    <div class="choices" id="choices"></div>
  </div>

  <!-- スタートボタン -->
  <button class="btn-calc" id="start-btn" onclick="startQuiz()">診断スタート！</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="warlord-icon" id="r-icon"></p>
    <p class="warlord-name" id="r-name"></p>
    <p class="warlord-title" id="r-title"></p>
    <div class="warlord-desc" id="r-desc"></div>
    <div class="warlord-advice" id="r-advice"></div>
    <button class="retry-btn no-print" onclick="startQuiz()">もう一度診断する</button>
  </div>

  <!-- 診断履歴 -->
  <div class="card" id="history-card" style="display:none">
    <p class="card-title">診断履歴</p>
    <div id="history-list"></div>
  </div>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 質問データ ──
  var QUESTIONS = [
    {
      text: '気になる新商品を見つけた。あなたの行動は？',
      choices: [
        { text: '即買い。迷ったら負け', score: [3, 0, 0, 0, 0] },
        { text: '一晩考える…けど結局買う', score: [1, 2, 0, 0, 0] },
        { text: 'レビューを3日間読み比べる', score: [0, 0, 0, 2, 1] }
      ]
    },
    {
      text: '給料日直後のあなたは？',
      choices: [
        { text: 'ご褒美ディナーで豪遊', score: [2, 1, 0, 0, 0] },
        { text: '欲しかったものリストを一気に清算', score: [0, 0, 3, 0, 0] },
        { text: '先に貯金してから残りで生活', score: [0, 0, 0, 1, 2] }
      ]
    },
    {
      text: 'セール会場で「70%OFF」の文字。あなたは？',
      choices: [
        { text: '全色買い。安い今が正義', score: [2, 0, 2, 0, 0] },
        { text: '必要なものだけ厳選して購入', score: [0, 0, 0, 2, 1] },
        { text: '「本当に要る？」と自問して帰る', score: [0, 0, 0, 0, 3] }
      ]
    },
    {
      text: '友人から飲み会の誘い。財布はピンチ。どうする？',
      choices: [
        { text: '断るなんて人生の損失！参加！', score: [2, 2, 0, 0, 0] },
        { text: '一次会だけ参加して早めに切り上げ', score: [0, 1, 0, 2, 0] },
        { text: '「来月にしよう」と代案を出す', score: [0, 0, 0, 0, 3] }
      ]
    },
    {
      text: '月末、口座残高を見て思うことは？',
      choices: [
        { text: '「まぁ来月もらえるし」', score: [3, 0, 0, 0, 0] },
        { text: '「何に使ったっけ…？」', score: [0, 2, 1, 0, 0] },
        { text: '「計画通り」とニヤリ', score: [0, 0, 0, 1, 2] }
      ]
    }
  ];

  // ── 武将タイプデータ ──
  var WARLORDS = [
    {
      name: '織田信長タイプ',
      icon: '🔥',
      title: '天下布金の破壊王',
      desc: '「欲しい」と思った瞬間が買い時。スピード決断で周囲を圧倒する豪快な浪費スタイル。金は回してナンボ、が信条。楽市楽座の精神で経済を回す…自分の経済だけが。',
      advice: '<strong>節約のコツ：</strong>「3日ルール」を導入。欲しいと思ったら3日待つ。それでも欲しければ買ってOK。衝動の7割は3日で消えます。',
      level: 'ng'
    },
    {
      name: '豊臣秀吉タイプ',
      icon: '✨',
      title: '見栄と人情の太閤散財',
      desc: '人付き合いと見栄で財布が軽くなるタイプ。「ケチと思われたくない」が支出の原動力。後輩におごり、SNS映えに投資し、気づけば黄金の茶室状態。',
      advice: '<strong>節約のコツ：</strong>交際費に月の上限を決めよう。「今月はここまで」と線を引くだけで、人情を保ちつつ財布も守れます。',
      level: 'warn'
    },
    {
      name: '石田三成タイプ',
      icon: '📦',
      title: '計画的なのに散財する参謀',
      desc: '買い物リストは完璧。でも「ついで買い」と「まとめ買い」で結局予算オーバー。論理的に「お得だから」と正当化する知性派浪費家。',
      advice: '<strong>節約のコツ：</strong>「ついで」と「まとめ」を分けて記録しよう。本当にお得か、数字で確認するクセをつければ参謀力が活きます。',
      level: 'warn'
    },
    {
      name: '徳川家康タイプ',
      icon: '🏯',
      title: '堅実だけど意外とゆるい狸',
      desc: '基本は堅実。でも「自分へのご褒美」で意外と使う隠れ浪費家。普段我慢している分、タガが外れると大物買いしがち。鳴かぬなら…買ってしまおうホトトギス。',
      advice: '<strong>節約のコツ：</strong>我慢しすぎないのが大事。月に1回「ご褒美予算」を設定して、罪悪感なく使える枠を確保しましょう。',
      level: 'ok'
    },
    {
      name: '真田幸村タイプ',
      icon: '🛡️',
      title: '鉄壁の守銭城主',
      desc: '無駄遣い？何それ美味しいの？ガチガチの防御力で財布を守る堅牢タイプ。ただし守りすぎて「お金を使う楽しさ」を忘れがち。人生の体験にも投資を。',
      advice: '<strong>節約のコツ：</strong>あなたは十分堅実です。たまには「経験」にお金を使ってみて。旅行や学びへの投資は、未来の自分への贈り物です。',
      level: 'ok'
    }
  ];

  var currentQ = 0;
  var scores = [0, 0, 0, 0, 0];

  function startQuiz() {
    currentQ = 0;
    scores = [0, 0, 0, 0, 0];
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    var q = QUESTIONS[currentQ];
    var pct = (currentQ / QUESTIONS.length * 100);
    document.getElementById('pfill').style.width = pct + '%';
    document.getElementById('ptext').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.text;

    var html = '';
    for (var i = 0; i < q.choices.length; i++) {
      html += '<button class="choice-btn" onclick="answer(' + i + ')">' + q.choices[i].text + '</button>';
    }
    document.getElementById('choices').innerHTML = html;
  }

  function answer(idx) {
    var q = QUESTIONS[currentQ];
    var s = q.choices[idx].score;
    for (var i = 0; i < s.length; i++) scores[i] += s[i];

    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResultScreen();
    }
  }

  function showResultScreen() {
    document.getElementById('pfill').style.width = '100%';
    document.getElementById('ptext').textContent = '診断完了！';
    document.getElementById('quiz-card').style.display = 'none';

    // 最高スコアの武将を特定
    var maxIdx = 0;
    for (var i = 1; i < scores.length; i++) {
      if (scores[i] > scores[maxIdx]) maxIdx = i;
    }

    var w = WARLORDS[maxIdx];
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + w.level;
    rc.style.display = 'block';

    document.getElementById('r-icon').textContent = w.icon;
    document.getElementById('r-name').textContent = w.name;
    document.getElementById('r-title').textContent = w.title;
    document.getElementById('r-desc').textContent = w.desc;
    document.getElementById('r-advice').innerHTML = w.advice;

    // localStorage に保存
    saveHistory(w.name);
    showHistory();
  }

  function saveHistory(name) {
    var history = JSON.parse(localStorage.getItem('waste_diagnosis_history') || '[]');
    history.unshift({
      name: name,
      date: new Date().toLocaleDateString('ja-JP')
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('waste_diagnosis_history', JSON.stringify(history));
  }

  function showHistory() {
    var history = JSON.parse(localStorage.getItem('waste_diagnosis_history') || '[]');
    if (history.length === 0) return;

    var card = document.getElementById('history-card');
    card.style.display = 'block';
    var html = '';
    for (var i = 0; i < history.length; i++) {
      html += '<div class="history-item"><span>' + history[i].name + '</span><span style="color:var(--text-sub)">' + history[i].date + '</span></div>';
    }
    document.getElementById('history-list').innerHTML = html;
  }

  // 初期表示
  document.getElementById('quiz-card').style.display = 'none';
  showHistory();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
