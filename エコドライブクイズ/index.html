<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エコドライブクイズ｜燃費改善ワザを10問で学ぼう</title>
  <meta name="description" content="ガソリン高騰時代の燃費改善ワザを10問4択クイズで楽しく学べます。アイドリングストップ・急加速NG・タイヤ空気圧など、今日から使えるエコドライブ知識を身につけよう。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズUI ── */
    .quiz-progress {
      font-size: 0.78rem; color: var(--text-sub);
      margin-bottom: 0.8rem; text-align: right;
    }
    .quiz-question {
      font-size: 1rem; font-weight: 700; line-height: 1.6;
      margin-bottom: 1.2rem; color: var(--text);
    }
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.92rem; font-weight: 600; text-align: left;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok);
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng);
    }
    .choice-btn:disabled { cursor: default; }

    /* ── フィードバック ── */
    .feedback {
      display: none;
      margin-top: 1rem; padding: 0.85rem 1rem;
      border-radius: 10px; font-size: 0.88rem; line-height: 1.6;
    }
    .feedback.correct { background: var(--ok-bg); color: var(--ok); border: 1.5px solid var(--ok); }
    .feedback.wrong   { background: var(--ng-bg); color: var(--ng); border: 1.5px solid var(--ng); }
    .feedback .fb-result { font-size: 1rem; font-weight: 800; margin-bottom: 0.4rem; }
    .feedback .fb-exp { color: var(--text-sub); }

    /* ── 次へボタン ── */
    .btn-next {
      display: none;
      width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── スコアカード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.5rem; }
    .result-eval { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-top: 0.5rem; margin-bottom: 0.6rem; }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    .best-score-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 1.2rem;
      margin: 0 auto 1rem; max-width: 600px;
      font-size: 0.85rem; color: var(--text-sub); text-align: center;
    }
    .best-score-card span { font-weight: 700; color: var(--accent); font-size: 1rem; }

    /* ── リトライボタン ── */
    .btn-retry {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--text); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:hover { opacity: 0.85; }

    /* ── スタート画面 ── */
    .start-screen {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow); margin: 0 auto 1rem; max-width: 600px;
      text-align: center;
    }
    .start-screen .start-icon { font-size: 3rem; margin-bottom: 0.8rem; }
    .start-screen h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.6rem; }
    .start-screen p { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 1.2rem; }
    .btn-start {
      width: 100%; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-next, .btn-start, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🚗 エコドライブクイズ</h1>
    <p class="subtitle">燃費改善ワザを10問クイズで楽しく学べます。ガソリン高騰時代を賢くサバイバル！</p>
  </header>

  <!-- スタート画面 -->
  <div class="start-screen" id="start-screen">
    <div class="start-icon">⛽</div>
    <h2>10問チャレンジ</h2>
    <p>ガソリン代が気になる今こそ、燃費改善の知識を確認しよう。<br>アイドリングストップ・急加速NG・タイヤ空気圧など、今日から使えるエコドライブ術を10問でチェック！</p>
    <button class="btn-start" onclick="startQuiz()">クイズスタート！</button>
  </div>

  <!-- クイズカード -->
  <div class="card" id="quiz-card" style="display:none">
    <p class="quiz-progress" id="progress">1 / 10</p>
    <p class="quiz-question" id="question"></p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <p class="fb-result" id="fb-result"></p>
      <p class="fb-exp" id="fb-exp"></p>
    </div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-next no-print" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>

  <!-- スコアカード -->
  <div class="result-card" id="result">
    <p class="result-label">最終スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 最高スコア -->
  <div class="best-score-card" id="best-card" style="display:none">
    🏆 自己ベスト：<span id="best-score">—</span>
  </div>

  <!-- リトライボタン -->
  <button class="btn-retry no-print" id="btn-retry" style="display:none" onclick="retryQuiz()">🔄 もう一度チャレンジ</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、国土交通省・JAF（日本自動車連盟）の資料を参考に、目安として使いやすく整理しています。実際の燃費改善効果は車種・走行条件により異なります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var QUIZ = [
    {
      q: 'アイドリングストップ（エンジン停止）が燃費に効果的な停車時間はどれくらい？',
      choices: ['約1秒以上', '約3秒以上', '約10秒以上', '約30秒以上'],
      correct: 2,
      exp: '一般的に10秒以上の停車であれば、エンジンを切った方が燃費に有利です。現代の車はスターターの耐久性も向上しているため、積極的なアイドリングストップが推奨されています。'
    },
    {
      q: '急発進・急ブレーキを控えると燃費はどれくらい改善できる？',
      choices: ['ほとんど変わらない（1%未満）', '約5〜10%改善', '約30%改善', '約50%以上改善'],
      correct: 1,
      exp: '急発進・急ブレーキを控えることで、燃費が5〜10%程度改善されることが多いです。スムーズな加速・減速は燃費改善の基本中の基本です。'
    },
    {
      q: 'タイヤの空気圧が適正より低いと燃費はどうなる？',
      choices: ['燃費が良くなる', '燃費は変わらない', '燃費が悪くなる', 'タイヤのみ影響でエンジンには無関係'],
      correct: 2,
      exp: '空気圧が低いとタイヤが変形しやすくなり、転がり抵抗が増加して燃費が悪化します。定期的な空気圧チェックは簡単にできるエコドライブ対策です。'
    },
    {
      q: 'カーエアコン使用時に燃費が悪化する割合として正しいのは？',
      choices: ['ほぼ影響なし', '約1〜2%悪化', '約5〜10%悪化', '約30〜50%悪化'],
      correct: 2,
      exp: 'カーエアコンはエンジンに直接負荷をかけるため、使用時は燃費が5〜10%程度悪化することがあります。外気が涼しい時は窓を開けて走行するのも効果的です。'
    },
    {
      q: '高速道路で最も燃費が良い速度域はどれ？',
      choices: ['60km/h以下', '80〜100km/h', '110〜120km/h', '速度と燃費は関係ない'],
      correct: 1,
      exp: '高速道路では80〜100km/hが最も燃費に優れています。速度が上がるほど空気抵抗が急増（速度の2乗に比例）するため、120km/h以上では燃費が大きく悪化します。'
    },
    {
      q: '車間距離を十分に取ることで得られる燃費メリットは？',
      choices: ['メリットはない', '不要な加減速が減り燃費が向上する', 'タイヤの摩耗が増えて逆効果', 'エンジンへの負荷が増える'],
      correct: 1,
      exp: '十分な車間距離を保つことで前方の状況を余裕を持って予測でき、無駄な急加速・急ブレーキを避けられます。結果として燃費改善につながります。'
    },
    {
      q: 'エンジンブレーキを積極的に使うと燃費はどうなる？',
      choices: ['燃費が悪くなる', '燃費は変わらない', '燃費が良くなる', 'エンジンに悪影響がある'],
      correct: 2,
      exp: 'アクセルを離してエンジンブレーキを使っている間は「フューエルカット」機能が働き、燃料消費がゼロになります。下り坂や信号手前でのエンジンブレーキ活用は効果的です。'
    },
    {
      q: '車の軽量化と燃費の関係で正しいのは？',
      choices: ['荷物の重さは燃費に影響しない', '100kgの軽量化で約3〜4%燃費改善', '重いほど燃費が良くなる', 'タイヤにのみ影響がある'],
      correct: 1,
      exp: '車体が重いほど走行に必要なエネルギーが増加します。不要な荷物を降ろすだけで100kgの軽量化につながり、3〜4%程度の燃費改善が見込めます。'
    },
    {
      q: '現代の車（電子制御エンジン）での暖機運転（停車したまま温める）について正しいのは？',
      choices: ['必ず5分以上行う必要がある', '走りながら温める方が燃費・排ガス両面で良い', '暖機運転が長いほど燃費が良くなる', '暖機運転中は燃料をほとんど消費しない'],
      correct: 1,
      exp: '現代の電子制御エンジンは出発前の長時間暖機は不要です。30秒程度でゆっくり走り出し、走行しながら温める方が燃費・排気ガス・エンジン寿命の面でも優れています。'
    },
    {
      q: 'エコドライブで最も燃費改善効果が大きい運転習慣はどれ？',
      choices: ['毎回ガソリンを満タンにする', '純正以外のエンジンオイルに変える', '急加速・急減速を控え定速走行を心がける', '走行前に必ず窓を拭く'],
      correct: 2,
      exp: '急加速・急減速の抑制と定速走行は、最もシンプルで効果が大きいエコドライブの基本です。スムーズな走行を心がけることが、燃費改善への一番の近道です。'
    }
  ];

  var currentQ = 0;
  var score = 0;
  var answered = false;

  function startQuiz() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-card').style.display = '';
    showQuestion();
  }

  function showQuestion() {
    var q = QUIZ[currentQ];
    document.getElementById('progress').textContent = (currentQ + 1) + ' / ' + QUIZ.length;
    document.getElementById('question').textContent = q.q;
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = ['A', 'B', 'C', 'D'][i] + '．' + c;
      btn.onclick = function() { answer(i); };
      choicesEl.appendChild(btn);
    });
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    answered = false;
  }

  function answer(idx) {
    if (answered) return;
    answered = true;
    var q = QUIZ[currentQ];
    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(b) { b.disabled = true; });
    var isCorrect = idx === q.correct;
    if (isCorrect) {
      btns[idx].classList.add('correct');
      score++;
    } else {
      btns[idx].classList.add('wrong');
      btns[q.correct].classList.add('correct');
    }
    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
    document.getElementById('fb-result').textContent = isCorrect ? '⭕ 正解！' : '❌ 不正解…';
    document.getElementById('fb-exp').textContent = q.exp;
    fb.style.display = 'block';
    var btnNext = document.getElementById('btn-next');
    btnNext.textContent = currentQ < QUIZ.length - 1 ? '次の問題へ →' : '結果を見る！';
    btnNext.style.display = 'block';
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ < QUIZ.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';

    var pct = score / QUIZ.length;
    var level = pct >= 0.8 ? 'ok' : pct >= 0.5 ? 'warn' : 'ng';
    var eval_text = pct >= 0.8 ? '🏅 エコドライブマスター！' : pct >= 0.5 ? '🚗 まあまあエコドライバー' : '⛽ まだまだ改善の余地あり！';
    var note = pct >= 0.8 ? '燃費改善の知識はバッチリ！この調子でガソリン代を節約しよう。'
             : pct >= 0.5 ? '基本は押さえています。あと少しでエコドライブ完全制覇！'
             : 'エコドライブの基本を見直してみよう。知識を積んで燃費改善にチャレンジ！';

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / ' + QUIZ.length;
    document.getElementById('re').textContent = eval_text;
    document.getElementById('rn').textContent = note;

    // 最高スコア保存
    var best = parseInt(localStorage.getItem('eco_drive_quiz_best') || '0');
    if (score > best) {
      localStorage.setItem('eco_drive_quiz_best', score);
      best = score;
    }
    var bestCard = document.getElementById('best-card');
    bestCard.style.display = '';
    document.getElementById('best-score').textContent = best + ' / ' + QUIZ.length;

    document.getElementById('btn-retry').style.display = '';
  }

  function retryQuiz() {
    currentQ = 0;
    score = 0;
    answered = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('best-card').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'none';
    document.getElementById('quiz-card').style.display = '';
    showQuestion();
  }
  </script>
