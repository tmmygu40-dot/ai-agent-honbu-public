<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人工管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>人工管理アプリ</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>人工を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="kojiName">工事名</label>
          <input type="text" id="kojiName" placeholder="例：〇〇邸新築工事">
        </div>
        <div class="form-group">
          <label for="workerName">作業員名</label>
          <input type="text" id="workerName" placeholder="例：山田太郎">
        </div>
        <div class="form-group">
          <label for="workDate">日付</label>
          <input type="date" id="workDate">
        </div>
        <div class="form-group">
          <label for="unitPrice">単価（円/人日）</label>
          <input type="number" id="unitPrice" placeholder="例：20000" min="0">
        </div>
        <div class="form-group">
          <label for="manCount">人数（人日）</label>
          <input type="number" id="manCount" placeholder="例：1.5" min="0" step="0.5">
        </div>
      </div>
      <button class="btn-add" id="addBtn">登録する</button>
    </section>

    <!-- 工事別合計 -->
    <section class="summary-section">
      <h2>工事別 労務費合計</h2>
      <div id="summaryList" class="summary-list">
        <p class="empty-msg">登録データがありません</p>
      </div>
    </section>

    <!-- 登録一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>登録一覧</h2>
        <div class="filter-group">
          <label for="filterKoji">工事で絞り込み</label>
          <select id="filterKoji">
            <option value="">すべて</option>
          </select>
        </div>
      </div>
      <div id="recordList" class="record-list">
        <p class="empty-msg">登録データがありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
