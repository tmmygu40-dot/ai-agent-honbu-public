<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資格有効期限管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>資格・免許 有効期限管理</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2>新規登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">資格・免許名 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="例：普通自動車免許" maxlength="50">
        </div>
        <div class="form-group">
          <label for="acquiredDate">取得日</label>
          <input type="date" id="acquiredDate">
        </div>
        <div class="form-group">
          <label for="expiryDate">有効期限 <span class="required">*</span></label>
          <input type="date" id="expiryDate">
          <label class="no-expiry-label">
            <input type="checkbox" id="noExpiry"> 有効期限なし（永続）
          </label>
        </div>
        <div class="form-group">
          <label for="memo">メモ</label>
          <input type="text" id="memo" placeholder="例：更新手続き先：警察署" maxlength="100">
        </div>
      </div>
      <button class="btn-primary" onclick="addItem()">登録する</button>
    </section>

    <!-- 警告凡例 -->
    <div class="legend">
      <span class="badge expired">失効済み</span>
      <span class="badge danger">30日以内</span>
      <span class="badge warning">90日以内</span>
      <span class="badge ok">有効</span>
      <span class="badge no-expiry">期限なし</span>
    </div>

    <!-- 一覧 -->
    <section class="list-section">
      <div class="list-header">
        <h2>登録一覧</h2>
        <span id="count" class="count-badge">0件</span>
      </div>
      <div id="list" class="list"></div>
      <p id="empty-msg" class="empty-msg">登録された資格・免許はありません。</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
