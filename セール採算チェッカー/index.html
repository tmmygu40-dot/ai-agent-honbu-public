<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セール採算チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>セール採算チェッカー</h1>
      <p class="subtitle">赤字にならないセール価格をすぐ確認</p>
    </header>

    <section class="card input-section">
      <h2>入力</h2>
      <div class="field">
        <label for="cost">仕入れ原価（円）</label>
        <input type="number" id="cost" placeholder="例: 800" min="0" step="1">
      </div>
      <div class="field">
        <label for="normal-price">通常売価（円）</label>
        <input type="number" id="normal-price" placeholder="例: 1500" min="0" step="1">
      </div>
      <div class="field">
        <label for="target-margin">目標粗利率（%）<span class="hint">赤字ラインの基準</span></label>
        <input type="number" id="target-margin" placeholder="例: 30" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label for="discount-rate">セール割引率（%）<span class="hint">通常売価からの割引</span></label>
        <input type="number" id="discount-rate" placeholder="例: 20" min="0" max="100" step="0.1">
      </div>
    </section>

    <section class="card result-section">
      <h2>計算結果</h2>

      <div class="result-row" id="sale-price-row">
        <span class="result-label">セール価格</span>
        <span class="result-value" id="sale-price">—</span>
      </div>

      <div class="result-row highlight" id="min-price-row">
        <span class="result-label">赤字にならない最低価格</span>
        <span class="result-value" id="min-price">—</span>
      </div>

      <div class="result-row" id="profit-row">
        <span class="result-label">セール時の利益額</span>
        <span class="result-value" id="profit">—</span>
      </div>

      <div class="result-row" id="margin-row">
        <span class="result-label">セール時の粗利率</span>
        <span class="result-value" id="margin">—</span>
      </div>

      <div class="result-row" id="normal-profit-row">
        <span class="result-label">通常時の利益額</span>
        <span class="result-value" id="normal-profit">—</span>
      </div>

      <div class="verdict-box" id="verdict">
        <span id="verdict-text">数値を入力してください</span>
      </div>
    </section>

    <section class="card history-section">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button id="clear-history" class="btn-text">履歴を削除</button>
      </div>
      <ul id="history-list">
        <li class="no-history">履歴はありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
