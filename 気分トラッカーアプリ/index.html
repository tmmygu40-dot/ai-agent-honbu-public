<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>気分トラッカー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>気分トラッカー</h1>

    <section class="mood-input">
      <p class="date-label" id="todayLabel"></p>
      <p class="prompt">今日の気分は？</p>
      <div class="mood-buttons">
        <button class="mood-btn" data-mood="1" data-label="最悪">😢</button>
        <button class="mood-btn" data-mood="2" data-label="つらい">😕</button>
        <button class="mood-btn" data-mood="3" data-label="普通">😐</button>
        <button class="mood-btn" data-mood="4" data-label="良い">🙂</button>
        <button class="mood-btn" data-mood="5" data-label="最高">😄</button>
      </div>
      <div class="selected-mood" id="selectedMood">
        <span id="selectedEmoji"></span>
        <span id="selectedLabel"></span>
      </div>
      <textarea id="noteInput" placeholder="メモ（任意）" rows="2"></textarea>
      <button class="save-btn" id="saveBtn">記録する</button>
      <p class="save-msg" id="saveMsg"></p>
    </section>

    <section class="history">
      <h2>記録一覧</h2>
      <div class="filter-row">
        <label for="filterMonth">月を絞り込む：</label>
        <input type="month" id="filterMonth">
        <button id="clearFilter">全件</button>
      </div>
      <ul id="recordList"></ul>
      <p class="empty-msg" id="emptyMsg">まだ記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
