<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行費用管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>旅行費用管理</h1>

    <!-- 予算設定 -->
    <section class="card" id="budget-section">
      <h2>予算設定</h2>
      <div class="budget-input-row">
        <input type="number" id="budget-input" placeholder="旅行予算（円）" min="0">
        <button id="set-budget-btn">設定</button>
      </div>
      <div class="budget-display">
        <div class="budget-item">
          <span class="label">予算</span>
          <span class="value" id="total-budget">¥0</span>
        </div>
        <div class="budget-item">
          <span class="label">支出合計</span>
          <span class="value" id="total-spent">¥0</span>
        </div>
        <div class="budget-item highlight">
          <span class="label">残り予算</span>
          <span class="value" id="remaining-budget">¥0</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">0%使用</div>
    </section>

    <!-- 支出追加 -->
    <section class="card">
      <h2>支出を追加</h2>
      <div class="form-row">
        <select id="category-select">
          <option value="食費">食費</option>
          <option value="交通費">交通費</option>
          <option value="宿泊費">宿泊費</option>
          <option value="観光">観光</option>
          <option value="買い物">買い物</option>
          <option value="その他">その他</option>
        </select>
        <input type="number" id="amount-input" placeholder="金額（円）" min="0">
      </div>
      <div class="form-row">
        <input type="text" id="memo-input" placeholder="メモ（任意）" maxlength="40">
        <button id="add-expense-btn">追加</button>
      </div>
    </section>

    <!-- カテゴリ別集計 -->
    <section class="card">
      <h2>カテゴリ別集計</h2>
      <div id="category-summary"></div>
    </section>

    <!-- 支出一覧 -->
    <section class="card">
      <h2>支出一覧</h2>
      <div id="expense-list">
        <p class="empty-msg">まだ支出がありません</p>
      </div>
      <button id="clear-all-btn" class="danger-btn">全データをリセット</button>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
