<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行費用管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>旅行費用管理</h1>

    <!-- 予算設定 -->
    <section class="card" id="budget-section">
      <h2>予算設定</h2>
      <div class="budget-input-row">
        <input type="number" id="budget-input" placeholder="旅行予算（円）" min="0">
        <button id="set-budget-btn">設定</button>
      </div>
      <div class="budget-display">
        <div class="budget-item">
          <span class="label">予算</span>
          <span class="value" id="total-budget">¥0</span>
        </div>
        <div class="budget-item">
          <span class="label">支出合計</span>
          <span class="value" id="total-spent">¥0</span>
        </div>
        <div class="budget-item highlight">
          <span class="label">残り予算</span>
          <span class="value" id="remaining-budget">¥0</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">0%使用</div>
    </section>

    <!-- 支出追加 -->
    <section class="card">
      <h2>支出を追加</h2>
      <div class="form-row">
        <select id="category-select">
          <option value="食費">食費</option>
          <option value="交通費">交通費</option>
          <option value="宿泊費">宿泊費</option>
          <option value="観光">観光</option>
          <option value="買い物">買い物</option>
          <option value="その他">その他</option>
        </select>
        <input type="number" id="amount-input" placeholder="金額（円）" min="0">
      </div>
      <div class="form-row">
        <input type="text" id="memo-input" placeholder="メモ（任意）" maxlength="40">
        <button id="add-expense-btn">追加</button>
      </div>
    </section>

    <!-- カテゴリ別集計 -->
    <section class="card">
      <h2>カテゴリ別集計</h2>
      <div id="category-summary"></div>
    </section>

    <!-- 支出一覧 -->
    <section class="card">
      <h2>支出一覧</h2>
      <div id="expense-list">
        <p class="empty-msg">まだ支出がありません</p>
      </div>
      <button id="clear-all-btn" class="danger-btn">全データをリセット</button>
    </section>
  </div>

  <script>
const STORAGE_KEY = 'travel_expense_app';

let state = {
  budget: 0,
  expenses: []
};

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      state = JSON.parse(raw);
    } catch (e) {
      state = { budget: 0, expenses: [] };
    }
  }
}

function formatYen(n) {
  return '¥' + Number(n).toLocaleString();
}

function formatDate(iso) {
  const d = new Date(iso);
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function getTotalSpent() {
  return state.expenses.reduce((sum, e) => sum + e.amount, 0);
}

function updateBudgetDisplay() {
  const spent = getTotalSpent();
  const remaining = state.budget - spent;
  const pct = state.budget > 0 ? Math.min((spent / state.budget) * 100, 100) : 0;

  document.getElementById('total-budget').textContent = formatYen(state.budget);
  document.getElementById('total-spent').textContent = formatYen(spent);

  const remainEl = document.getElementById('remaining-budget');
  remainEl.textContent = formatYen(remaining);
  remainEl.classList.toggle('over', remaining < 0);

  const bar = document.getElementById('progress-bar');
  bar.style.width = pct + '%';
  bar.classList.toggle('over', remaining < 0);

  const pctLabel = state.budget > 0
    ? Math.round((spent / state.budget) * 100) + '% 使用'
    : '0% 使用';
  document.getElementById('progress-label').textContent = pctLabel;
}

function updateCategorySummary() {
  const container = document.getElementById('category-summary');
  const cats = {};
  state.expenses.forEach(e => {
    cats[e.category] = (cats[e.category] || 0) + e.amount;
  });

  if (Object.keys(cats).length === 0) {
    container.innerHTML = '<span class="empty-cat">まだ支出がありません</span>';
    return;
  }

  container.innerHTML = Object.entries(cats)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) =>
      `<div class="cat-chip">
        <span class="cat-name">${cat}</span>
        <span class="cat-amount">${formatYen(amt)}</span>
      </div>`
    ).join('');
}

function updateExpenseList() {
  const container = document.getElementById('expense-list');

  if (state.expenses.length === 0) {
    container.innerHTML = '<p class="empty-msg">まだ支出がありません</p>';
    return;
  }

  const items = [...state.expenses].reverse().map((e, revIdx) => {
    const idx = state.expenses.length - 1 - revIdx;
    return `<div class="expense-item">
      <div class="expense-left">
        <span class="expense-cat-badge">${e.category}</span>
        <div>
          <div class="expense-memo">${e.memo || '（メモなし）'}</div>
          <div class="expense-date">${formatDate(e.date)}</div>
        </div>
      </div>
      <div class="expense-right">
        <span class="expense-amount">${formatYen(e.amount)}</span>
        <button class="delete-btn" data-idx="${idx}">削除</button>
      </div>
    </div>`;
  });

  container.innerHTML = items.join('');

  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.idx, 10);
      state.expenses.splice(i, 1);
      saveState();
      render();
    });
  });
}

function render() {
  updateBudgetDisplay();
  updateCategorySummary();
  updateExpenseList();
}

document.getElementById('set-budget-btn').addEventListener('click', () => {
  const val = parseInt(document.getElementById('budget-input').value, 10);
  if (isNaN(val) || val < 0) {
    alert('正しい予算金額を入力してください');
    return;
  }
  state.budget = val;
  document.getElementById('budget-input').value = '';
  saveState();
  render();
});

document.getElementById('budget-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('set-budget-btn').click();
});

document.getElementById('add-expense-btn').addEventListener('click', () => {
  const category = document.getElementById('category-select').value;
  const amount = parseInt(document.getElementById('amount-input').value, 10);
  const memo = document.getElementById('memo-input').value.trim();

  if (isNaN(amount) || amount <= 0) {
    alert('正しい金額を入力してください');
    return;
  }

  state.expenses.push({
    id: Date.now(),
    category,
    amount,
    memo,
    date: new Date().toISOString()
  });

  document.getElementById('amount-input').value = '';
  document.getElementById('memo-input').value = '';
  saveState();
  render();
});

document.getElementById('amount-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('add-expense-btn').click();
});

document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (!confirm('全データをリセットします。よろしいですか？')) return;
  state = { budget: 0, expenses: [] };
  saveState();
  render();
});

loadState();
render();
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
