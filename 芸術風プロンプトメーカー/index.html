<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 芸術風プロンプトメーカー</title>
  <meta name="description" content="ペット写真や推し画を浮世絵・水墨画・印象派風に。AIアート用の呪文を一瞬で生成。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 広告枠（仮・将来差し替え予定） ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.4; margin: 0.8rem 0; word-break: break-all; }
    .result-card.ok   .result-value { color: var(--text); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; margin-top: 0.5rem; }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0.8rem auto 0; padding: 0.8rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-copy:active { opacity: 0.9; }
    .btn-copy.copied { background: var(--ok); }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>🎨 芸術風プロンプトメーカー</h1>
    <p class="subtitle">ペット写真や推し画を浮世絵・水墨画・印象派風に。AIアート用の呪文を一瞬で作成。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">スタイル選択</p>
    <div class="field">
      <label for="style">どんな風に変えたい？</label>
      <select id="style">
        <option value="ukiyoe">浮世絵風</option>
        <option value="sumi">水墨画風</option>
        <option value="impressionist">印象派風</option>
        <option value="ghibli">ジブリ風</option>
        <option value="classical">古典和風</option>
        <option value="oilpaint">油絵風</option>
      </select>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">✨ 呪文を生成</button>

  <!-- 結論カード -->
  <div class="result-card ok" id="result" style="text-align: left;">
    <p class="result-label">生成された呪文</p>
    <p class="result-value" id="rv">—</p>
  </div>

  <!-- コピーボタン -->
  <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()" style="display:none;">📋 コピーする</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールは AI画像生成サービス（Midjourney・Stable Diffusion・DALL-E など）での呪文（プロンプト）の参考として使いやすく整理しています。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // スタイルごとの呪文テンプレート
  var PROMPTS = {
    ukiyoe: {
      label: '浮世絵風',
      base: 'A serene Japanese ukiyo-e style artwork, traditional woodblock print aesthetic, soft color palette, intricate details, peaceful composition'
    },
    sumi: {
      label: '水墨画風',
      base: 'Traditional Chinese ink wash painting style, monochrome sumi-e, minimalist composition, flowing brushstrokes, serene and contemplative'
    },
    impressionist: {
      label: '印象派風',
      base: 'Impressionist painting style, soft brushstrokes, luminous colors, light and shadow play, romantic and dreamy atmosphere'
    },
    ghibli: {
      label: 'ジブリ風',
      base: 'Studio Ghibli animation style, soft watercolor-like rendering, whimsical and dreamy, intricate character design, peaceful setting'
    },
    classical: {
      label: '古典和風',
      base: 'Edo period classical Japanese art style, elegant composition, rich traditional colors, silk painting technique, peaceful landscape'
    },
    oilpaint: {
      label: '油絵風',
      base: 'Oil painting style, detailed brushwork, rich textures, museum quality, classical art technique, warm color harmonies'
    }
  };

  var currentPrompt = '';

  function generatePrompt() {
    var style = document.getElementById('style').value;
    var styleInfo = PROMPTS[style];

    // ローカルストレージに保存
    localStorage.setItem('lastStyle', style);

    // 呪文を表示
    currentPrompt = styleInfo.base;
    document.getElementById('rv').textContent = currentPrompt;
    document.getElementById('result').style.display = 'block';
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('copyBtn').textContent = '📋 コピーする';
    document.getElementById('copyBtn').classList.remove('copied');
  }

  function copyToClipboard() {
    if (!currentPrompt) return;

    navigator.clipboard.writeText(currentPrompt).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 コピーする';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function(err) {
      alert('コピーに失敗しました: ' + err);
    });
  }

  // ページロード時に前回選択したスタイルを復元
  window.addEventListener('DOMContentLoaded', function() {
    var lastStyle = localStorage.getItem('lastStyle');
    if (lastStyle) {
      document.getElementById('style').value = lastStyle;
      generatePrompt();
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
  <script src="../prompt-jp-widget.js"></script>
</body>
</html>
