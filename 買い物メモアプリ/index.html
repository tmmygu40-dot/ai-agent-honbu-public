<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い物メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🛒 買い物メモ</h1>
      <span id="counter" class="counter"></span>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="itemInput"
        placeholder="品物を入力..."
        autocomplete="off"
      >
      <button id="addBtn" class="btn btn-add">追加</button>
    </div>

    <div class="toolbar">
      <button id="clearCheckedBtn" class="btn btn-clear">✓ 完了済みを削除</button>
    </div>

    <ul id="itemList" class="item-list"></ul>

    <p id="emptyMsg" class="empty-msg">品物を追加してください</p>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
