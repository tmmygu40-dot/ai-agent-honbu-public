<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買い物メモ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🛒 買い物メモ</h1>
      <span id="counter" class="counter"></span>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="itemInput"
        placeholder="品物を入力..."
        autocomplete="off"
      >
      <button id="addBtn" class="btn btn-add">追加</button>
    </div>

    <div class="toolbar">
      <button id="clearCheckedBtn" class="btn btn-clear">✓ 完了済みを削除</button>
    </div>

    <ul id="itemList" class="item-list"></ul>

    <p id="emptyMsg" class="empty-msg">品物を追加してください</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
