<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採用コスト管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>採用コスト管理</h1>
    <p class="subtitle">媒体ごとの採用単価をすぐ比較</p>

    <section class="form-section">
      <h2>媒体を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="mediaName">媒体名</label>
          <input type="text" id="mediaName" placeholder="例：Indeed、リクナビ" maxlength="50">
        </div>
        <div class="form-group">
          <label for="applicants">応募数（人）</label>
          <input type="number" id="applicants" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="hires">採用数（人）</label>
          <input type="number" id="hires" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="cost">コスト（円）</label>
          <input type="number" id="cost" placeholder="0" min="0">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
      <p id="errorMsg" class="error-msg"></p>
    </section>

    <section class="list-section">
      <h2>媒体一覧</h2>
      <div class="table-wrapper">
        <table id="mediaTable">
          <thead>
            <tr>
              <th>媒体名</th>
              <th>応募数</th>
              <th>採用数</th>
              <th>コスト</th>
              <th>採用単価</th>
              <th>削除</th>
            </tr>
          </thead>
          <tbody id="mediaBody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="empty-msg">まだ媒体が登録されていません</p>

      <div id="summary" class="summary" style="display:none">
        <div class="summary-item">
          <span class="summary-label">総応募数</span>
          <span id="totalApplicants" class="summary-value">0 人</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">総採用数</span>
          <span id="totalHires" class="summary-value">0 人</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">総コスト</span>
          <span id="totalCost" class="summary-value">0 円</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">平均採用単価</span>
          <span id="avgCost" class="summary-value">－</span>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
