<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棚卸しチェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>棚卸しチェッカー</h1>

    <section class="input-section">
      <div class="input-row">
        <div class="input-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：商品A">
        </div>
        <div class="input-group narrow">
          <label for="bookQty">帳簿数</label>
          <input type="number" id="bookQty" placeholder="0" min="0">
        </div>
        <div class="input-group narrow">
          <label for="actualQty">実数</label>
          <input type="number" id="actualQty" placeholder="0" min="0">
        </div>
        <div class="input-group narrow">
          <label for="unitPrice">単価（任意）</label>
          <input type="number" id="unitPrice" placeholder="0" min="0">
        </div>
      </div>
      <button id="addBtn" onclick="addItem()">登録</button>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-item">
        <span class="summary-label">差異合計（実数－帳簿数）</span>
        <span class="summary-value" id="totalDiff">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">金額ロス（差異×単価）</span>
        <span class="summary-value" id="totalLoss">¥0</span>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header" id="listHeader" style="display:none;">
        <span class="col-name">品目名</span>
        <span class="col-num">帳簿数</span>
        <span class="col-num">実数</span>
        <span class="col-num">差異</span>
        <span class="col-price">単価</span>
        <span class="col-price">金額差</span>
        <span class="col-action"></span>
      </div>
      <div id="itemList"></div>
      <p id="emptyMsg" class="empty-msg">品目を登録してください</p>
    </section>

    <div class="btn-row">
      <button class="btn-clear" onclick="clearAll()">全件削除</button>
      <button class="btn-reset" onclick="resetSession()">セッションリセット</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
