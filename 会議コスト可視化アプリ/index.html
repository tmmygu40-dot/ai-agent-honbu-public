<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会議コスト可視化アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>会議コスト可視化</h1>
    <p class="subtitle">会議にかかったコストをすぐ計算</p>

    <div class="card">
      <div class="form-group">
        <label for="participants">参加人数（人）</label>
        <input type="number" id="participants" min="1" placeholder="例：5" value="">
      </div>
      <div class="form-group">
        <label for="hourlyRate">平均時給（円/時）</label>
        <input type="number" id="hourlyRate" min="1" placeholder="例：3000" value="">
      </div>
      <div class="form-group">
        <label for="duration">会議時間（分）</label>
        <input type="number" id="duration" min="1" placeholder="例：60" value="">
      </div>
      <button id="calcBtn" onclick="calculate()">コストを計算</button>
    </div>

    <div class="result-card" id="resultCard" style="display:none;">
      <div class="result-label">この会議のコスト</div>
      <div class="result-cost" id="resultCost"></div>
      <div class="result-detail" id="resultDetail"></div>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
      <div class="history-header">
        <h2>計算履歴</h2>
        <button class="clear-btn" onclick="clearHistory()">全削除</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
