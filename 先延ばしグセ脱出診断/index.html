<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5問に答えるだけで自分の先延ばしタイプ（完璧主義・先送り快楽・不安回避・気分屋）を診断し、今日からできる具体的な脱出法を即提案する自己分析アプリです。">
  <title>先延ばしグセ脱出診断｜5問でタイプ判定＆今日の脱出法</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.96rem; font-weight: 700; line-height: 1.45; margin-bottom: 0.6rem; color: var(--text); }
    .q-num { color: var(--accent); margin-right: 0.35rem; }

    .opt {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.45rem;
      cursor: pointer;
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt input[type="radio"] { margin-top: 0.18rem; flex-shrink: 0; cursor: pointer; }
    .opt-text { font-size: 0.9rem; line-height: 1.45; color: var(--text); }
    .opt input[type="radio"]:checked ~ .opt-text { font-weight: 700; }
    .opt:has(input[type="radio"]:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.55; text-align: left; }

    .escape-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .escape-list { list-style: none; padding: 0; margin: 0; }
    .escape-list li {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .escape-list li:last-child { border-bottom: none; }
    .escape-list .num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--accent); color: #fff;
      border-radius: 50%;
      font-size: 0.75rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    .last-result {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0.75rem 0.95rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--text-sub);
    }
    .last-result strong { color: var(--accent); }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    .btn-reset {
      display: block; margin: 0.6rem auto 0; padding: 0.55rem 1.2rem;
      font-size: 0.82rem; font-weight: 700;
      background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card, .escape-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>先延ばしグセ脱出診断</h1>
    <p class="subtitle">5問でタイプ判定＆今日からできる脱出法を即提案 ※一般的な傾向の目安です</p>
  </header>

  <!-- 前回結果（あれば表示） -->
  <div class="last-result" id="lastResult" style="display:none">
    前回の結果：<strong id="lastType"></strong>（<span id="lastDate"></span>）
  </div>

  <!-- 設問カード -->
  <div class="card">
    <p class="card-title">設問（全5問）</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">診断する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">あなたの先延ばしタイプ</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 脱出法カード -->
  <div class="escape-card" id="escape" style="display:none">
    <p class="card-title">今日の脱出法</p>
    <ul class="escape-list" id="escapeList"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、行動科学・心理学領域で広く知られる先延ばし傾向（Procrastination）の一般的な分類を、自己理解のヒントとして使いやすく整理したものです。診断結果は医学的判断ではありません。深刻な悩みは厚生労働省などの公的相談窓口もご活用ください。
  </p>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
  <button class="btn-reset no-print" onclick="resetAll()">🔄 もう一度診断する</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── 設問データ ──
  var QUESTIONS = [
    {
      q: '大事な仕事に取りかかる前、つい...',
      opts: [
        { t: 'A', text: '「もっと完璧な計画を」と細部を練り直してしまう' },
        { t: 'B', text: 'SNSや動画でつい気分転換してしまう' },
        { t: 'C', text: 'うまくいかない場面を想像して手が止まる' },
        { t: 'D', text: '「気分が乗ったら本気出す」と一旦置く' }
      ]
    },
    {
      q: '締切が迫った時、よく出る口グセは',
      opts: [
        { t: 'A', text: '「もう少し準備が整ってから」' },
        { t: 'B', text: '「明日から本気出す」' },
        { t: 'C', text: '「失敗したらどうしよう」' },
        { t: 'D', text: '「気分じゃないんだよなぁ」' }
      ]
    },
    {
      q: '提出物・課題の出来栄えに対しては',
      opts: [
        { t: 'A', text: '100点じゃないと出したくない' },
        { t: 'B', text: '60点でいいから早く済ませたい派、なのに着手が遅い' },
        { t: 'C', text: '評価されるのが怖くて出したくなくなる' },
        { t: 'D', text: 'その日の気分で出来栄えが変わる' }
      ]
    },
    {
      q: '朝、やるべきことリストを見たとき',
      opts: [
        { t: 'A', text: '順序や優先順位が決まらず悩んでしまう' },
        { t: 'B', text: '一番楽な雑務から先に手をつける' },
        { t: 'C', text: '重い案件は見ないふりをしてしまう' },
        { t: 'D', text: 'その時のテンションで決める' }
      ]
    },
    {
      q: '締切直前になると、自分はどうなる？',
      opts: [
        { t: 'A', text: '「ちゃんとやれなかった」と落ち込みやすい' },
        { t: 'B', text: '徹夜やカフェインで力技で乗り切る' },
        { t: 'C', text: '体調不良など回避の言い訳を考えがち' },
        { t: 'D', text: '急にスイッチが入って雑に終わらせる' }
      ]
    }
  ];

  // ── タイプ定義 ──
  var TYPES = {
    A: {
      name: '完璧主義型',
      level: 'warn',
      note: '「ちゃんとやりたい」気持ちが強すぎて、最初の一歩が踏み出しにくいタイプ。準備や計画ばかりに時間を使いがちで、着手の前に消耗してしまうことも。完璧を狙うより、まずは「下書き60点」を出してから整える方が結果として早く・うまく進みます。',
      escape: [
        '「とりあえず60点案」を15分タイマーで作り切る（質より完了優先）',
        '最初のステップを「メールを開く」「ファイルを作る」など極小サイズに切る',
        '完成版ではなく下書きの段階で、信頼できる人に一度共有してみる'
      ]
    },
    B: {
      name: '先送り快楽型',
      level: 'ng',
      note: '楽しい・楽な選択肢に流されて、肝心のタスクが後回しになりやすいタイプ。スマホやSNS、雑務など「すぐ気持ち良くなれる行動」が誘惑になりがちです。意志の力で抑えるより、誘惑を物理的に遠ざける環境設計が効きます。',
      escape: [
        'スマホを別の部屋・別バッグへ置く（または機内モードにする）',
        '「25分集中＋5分休憩」のポモドーロを、まず1セットだけやってみる',
        '着手前に「3分だけ手をつける」と自分に約束する（始めれば続きやすい）'
      ]
    },
    C: {
      name: '不安回避型',
      level: 'ng',
      note: '失敗や評価への不安で、重い案件ほど見ないふりをしてしまうタイプ。先送りの正体は「怠け」ではなく「怖さ」のことが多いです。不安を曖昧なまま放置せず、紙に分解して見える化すると、思っていたより小さな塊だと気付けます。',
      escape: [
        '怖い案件を「手書きで一行ずつ」に分解して見える化する',
        '「最悪のシナリオでも死なない」と書き出してから、最小の一歩を踏む',
        '信頼できる人に「いま着手します」と一言だけ宣言する（軽い退路を絶つ）'
      ]
    },
    D: {
      name: '気分屋型',
      level: 'warn',
      note: 'やる気の波に行動が左右されやすいタイプ。気分が乗らないと一切動けない反面、ノッた時の集中力は高め。気分に頼らずに動ける「ルーティンの仕組み」を持つと、平均パフォーマンスが一気に底上げされます。',
      escape: [
        '毎日同じ時刻に椅子に座る固定ルーティンを作る（場所と時間を固定）',
        '作業BGM（同じ曲）を決めて、流したら作業モードという条件反射を作る',
        'やる気が出る前に「形から入る」（着替える・カフェへ移動する など）'
      ]
    }
  };

  // ── 設問描画 ──
  function renderQuestions() {
    var html = QUESTIONS.map(function(qd, i){
      var num = i + 1;
      var opts = qd.opts.map(function(o, j){
        var id = 'q' + num + '_' + j;
        return ''
          + '<label class="opt" for="' + id + '">'
          +   '<input type="radio" id="' + id + '" name="q' + num + '" value="' + o.t + '">'
          +   '<span class="opt-text">' + o.text + '</span>'
          + '</label>';
      }).join('');
      return ''
        + '<div class="q-block">'
        +   '<p class="q-text"><span class="q-num">Q' + num + '.</span>' + qd.q + '</p>'
        +   opts
        + '</div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  // ── 診断 ──
  function diagnose() {
    var counts = { A: 0, B: 0, C: 0, D: 0 };
    var unanswered = 0;
    for (var i = 1; i <= QUESTIONS.length; i++) {
      var sel = document.querySelector('input[name="q' + i + '"]:checked');
      if (!sel) { unanswered++; continue; }
      counts[sel.value]++;
    }
    if (unanswered > 0) {
      showErr('未回答が ' + unanswered + ' 問あります。すべての質問に答えてください。');
      return;
    }
    // 最多タイプ判定（同数の場合は A→B→C→D の順で先勝ち）
    var top = 'A', max = -1;
    ['A','B','C','D'].forEach(function(k){
      if (counts[k] > max) { max = counts[k]; top = k; }
    });
    var t = TYPES[top];
    showResult(t.level, t.name, t.note);
    showEscape(t.escape);
    saveResult(top, t.name);
  }

  function showResult(level, val, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('rn').textContent = note;
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showEscape(list) {
    var html = list.map(function(item, i){
      return '<li><span class="num">' + (i+1) + '</span><span>' + item + '</span></li>';
    }).join('');
    document.getElementById('escapeList').innerHTML = html;
    document.getElementById('escape').style.display = 'block';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️ 入力エラー';
    document.getElementById('rn').textContent = msg;
    document.getElementById('escape').style.display = 'none';
  }

  // ── localStorage ──
  var STORAGE_KEY = 'procrastination_diagnosis_v1';

  function saveResult(typeKey, typeName) {
    try {
      var data = {
        typeKey: typeKey,
        typeName: typeName,
        date: new Date().toISOString().slice(0, 10)
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* localStorage 不可環境では無視 */ }
  }

  function loadResult() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (!data || !data.typeName) return;
      document.getElementById('lastType').textContent = data.typeName;
      document.getElementById('lastDate').textContent = data.date || '';
      document.getElementById('lastResult').style.display = 'block';
    } catch (e) { /* 無視 */ }
  }

  function resetAll() {
    document.querySelectorAll('input[type="radio"]').forEach(function(r){ r.checked = false; });
    document.getElementById('result').style.display = 'none';
    document.getElementById('escape').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── 初期化 ──
  renderQuestions();
  loadResult();
  </script>

  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
