<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カロリー雑学クイズ｜食べ物の意外なカロリーを当てよう</title>
  <meta name="description" content="身近な食べ物3択で「どれが一番カロリー高い？」を当てるクイズ。チョコ・ナッツ・バターなど意外な答えが続出！全10問で食べ物の知識をチェック。">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── クイズ進捗 ── */
    .progress-bar-wrap {
      max-width: 600px; margin: 0 auto 1rem;
      padding: 0 1.2rem;
    }
    .progress-label {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.35rem;
      display: flex; justify-content: space-between;
    }
    .progress-bar-bg {
      background: var(--border); border-radius: 99px; height: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 99px; transition: width 0.35s;
    }

    /* ── 問題カード ── */
    .q-number {
      font-size: 0.76rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.06em; margin-bottom: 0.7rem;
    }
    .q-text {
      font-size: 1rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1.2rem; color: var(--text);
    }
    .q-sub {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 1rem;
      font-weight: 400;
    }

    /* ── 選択肢ボタン ── */
    .choices { display: flex; flex-direction: column; gap: 0.7rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.97rem; font-weight: 700; text-align: left;
      background: var(--bg); color: var(--text);
      border: 2px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent); background: var(--accent-light);
    }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok);
    }
    .choice-btn.wrong {
      border-color: var(--ng); background: var(--ng-bg); color: var(--ng);
    }
    .choice-btn.show-correct {
      border-color: var(--ok); background: var(--ok-bg); color: var(--ok);
    }

    /* ── フィードバック ── */
    .feedback {
      display: none; margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.88rem; line-height: 1.6;
    }
    .feedback.correct { background: var(--ok-bg); border: 1.5px solid var(--ok); color: var(--ok); }
    .feedback.wrong   { background: var(--ng-bg); border: 1.5px solid var(--ng); color: var(--ng); }
    .feedback .fb-title { font-size: 1rem; font-weight: 800; margin-bottom: 0.4rem; }
    .feedback .fb-detail { color: var(--text-sub); font-size: 0.83rem; margin-top: 0.4rem; }
    .cal-list { list-style: none; margin-top: 0.5rem; }
    .cal-list li {
      display: flex; justify-content: space-between;
      padding: 0.3rem 0; border-bottom: 1px solid var(--border); font-size: 0.84rem;
    }
    .cal-list li:last-child { border-bottom: none; }
    .cal-list .hi { font-weight: 800; color: var(--ok); }

    /* ── Nextボタン ── */
    .btn-next {
      display: none; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結果カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-score { font-size: 3rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.3rem; }
    .result-total { font-size: 0.92rem; color: var(--text-sub); margin-bottom: 0.8rem; }
    .result-eval { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.6rem; }
    .result-best { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 1rem; }
    .btn-retry {
      display: inline-block; padding: 0.8rem 2rem;
      font-size: 1rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-next, .btn-retry, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>🍱 カロリー雑学クイズ</h1>
    <p class="subtitle">3択で「どれが一番カロリー高い？」を当てよう！全10問で食の知識をチェック。</p>
  </header>

  <!-- 進捗バー -->
  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="prog-text">第1問 / 全10問</span>
      <span id="prog-score">0問正解</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- 問題カード -->
  <div class="card" id="quiz-card">
    <p class="q-number" id="q-number">Q1 / 10</p>
    <p class="q-text" id="q-text"></p>
    <p class="q-sub">※すべて食品100gあたりの目安カロリーです</p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <p class="fb-title" id="fb-title"></p>
      <p class="fb-detail" id="fb-detail"></p>
      <ul class="cal-list" id="cal-list"></ul>
    </div>
  </div>

  <!-- 次の問題ボタン -->
  <button class="btn-next no-print" id="btn-next" onclick="nextQ()">次の問題へ →</button>

  <!-- 結果カード -->
  <div class="result-card" id="result-card">
    <p class="result-label">クイズ結果</p>
    <p class="result-score" id="result-score">—</p>
    <p class="result-total">点 / 10点満点</p>
    <p class="result-eval" id="result-eval"></p>
    <p class="result-best" id="result-best"></p>
    <button class="btn-retry" onclick="startQuiz()">もう一度チャレンジ</button>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 カロリー数値は、文部科学省「日本食品標準成分表」を参考にした100gあたりの目安です。食品の種類や調理方法によって異なる場合があります。
  </p>

  <!-- 広告枠（仮・将来差し替え予定） -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>

  <script>
  var QUIZ = [
    {
      q: 'チョコレート、ポテトチップス、クッキー。\n最もカロリーが高いのはどれ？',
      choices: ['チョコレート', 'ポテトチップス', 'クッキー'],
      answer: 0,
      cals: [558, 534, 470],
      note: 'チョコレートは脂質と糖質がたっぷり！意外とポテチより高カロリーです。'
    },
    {
      q: 'アーモンド、ピーナッツ、クルミ。\n最もカロリーが高いのはどれ？',
      choices: ['アーモンド', 'ピーナッツ', 'クルミ'],
      answer: 2,
      cals: [608, 585, 674],
      note: 'クルミは脂質が豊富でナッツの中でもトップクラス。でも良質な脂質なんです。'
    },
    {
      q: 'バター、マーガリン、マヨネーズ。\n最もカロリーが高いのはどれ？',
      choices: ['バター', 'マーガリン', 'マヨネーズ'],
      answer: 0,
      cals: [745, 715, 703],
      note: 'バターは動物性脂肪100%近く。三者ともかなり高カロリーで差は少ないです。'
    },
    {
      q: '牛カルビ、豚バラ、鶏もも（皮付き）。\n最もカロリーが高いのはどれ？',
      choices: ['牛カルビ', '豚バラ', '鶏もも（皮付き）'],
      answer: 0,
      cals: [517, 395, 253],
      note: '牛カルビはサシ（霜降り脂）がたっぷりで断トツ。鶏もも皮付きは思ったより低め。'
    },
    {
      q: 'フランスパン、食パン、もち。\n最もカロリーが高いのはどれ？',
      choices: ['フランスパン', '食パン', 'もち'],
      answer: 0,
      cals: [279, 264, 235],
      note: 'フランスパンは水分が少なく、100gあたりのカロリーが高くなります。もちは意外と低め。'
    },
    {
      q: '納豆、木綿豆腐、油揚げ。\n最もカロリーが高いのはどれ？',
      choices: ['納豆', '木綿豆腐', '油揚げ'],
      answer: 2,
      cals: [200, 73, 410],
      note: '油揚げは豆腐を油で揚げているので大幅アップ！納豆も意外と豆腐の約3倍あります。'
    },
    {
      q: 'バナナ、アボカド、ぶどう。\n最もカロリーが高いのはどれ？',
      choices: ['バナナ', 'アボカド', 'ぶどう'],
      answer: 1,
      cals: [86, 187, 59],
      note: 'アボカドは「森のバター」と呼ばれるほど脂質が豊富。ぶどうは糖質はあるが水分も多め。'
    },
    {
      q: '牛乳、生クリーム、ヨーグルト（全脂）。\n最もカロリーが高いのはどれ？',
      choices: ['牛乳', '生クリーム', 'ヨーグルト（全脂）'],
      answer: 1,
      cals: [67, 433, 62],
      note: '生クリームは脂肪分が約35〜47%！同じ乳製品でも牛乳の6倍以上のカロリーがあります。'
    },
    {
      q: 'ソーセージ、ベーコン、ロースハム。\n最もカロリーが高いのはどれ？',
      choices: ['ソーセージ（フランクフルト）', 'ベーコン', 'ロースハム'],
      answer: 1,
      cals: [321, 405, 196],
      note: 'ベーコンは豚バラ肉（脂身多め）を使うので高カロリー。ハムは意外と低いです。'
    },
    {
      q: '白米（炊いたもの）、スパゲティ（茹で）、そば（茹で）。\n最もカロリーが高いのはどれ？',
      choices: ['白米（炊いたもの）', 'スパゲティ（茹で）', 'そば（茹で）'],
      answer: 0,
      cals: [168, 165, 132],
      note: '白米とスパゲティはほぼ同じ！どちらも主食として定番。そばはやや低めです。'
    }
  ];

  var currentQ = 0;
  var score = 0;
  var answered = false;

  function startQuiz() {
    currentQ = 0;
    score = 0;
    answered = false;
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('progress-wrap').style.display = '';
    document.getElementById('btn-next').style.display = 'none';
    showQ();
  }

  function showQ() {
    var data = QUIZ[currentQ];
    answered = false;

    document.getElementById('q-number').textContent = 'Q' + (currentQ + 1) + ' / ' + QUIZ.length;
    document.getElementById('q-text').textContent = data.q;
    document.getElementById('prog-text').textContent = '第' + (currentQ + 1) + '問 / 全' + QUIZ.length + '問';
    document.getElementById('prog-score').textContent = score + '問正解';
    document.getElementById('prog-bar').style.width = (currentQ / QUIZ.length * 100) + '%';

    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    data.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = function() { selectAnswer(i); };
      choicesEl.appendChild(btn);
    });

    var fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.className = 'feedback';
    document.getElementById('btn-next').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;

    var data = QUIZ[currentQ];
    var correct = (idx === data.answer);
    if (correct) score++;

    var btns = document.querySelectorAll('.choice-btn');
    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === idx && correct) b.className = 'choice-btn correct';
      else if (i === idx && !correct) b.className = 'choice-btn wrong';
      else if (i === data.answer) b.className = 'choice-btn show-correct';
    });

    var fb = document.getElementById('feedback');
    fb.style.display = 'block';
    fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
    document.getElementById('fb-title').textContent = correct ? '⭕ 正解！' : '❌ 不正解…';
    document.getElementById('fb-detail').textContent = data.note;

    var list = document.getElementById('cal-list');
    list.innerHTML = data.choices.map(function(c, i) {
      var isHi = (i === data.answer);
      return '<li class="' + (isHi ? 'hi' : '') + '">'
           + '<span>' + (isHi ? '🏆 ' : '') + c + '</span>'
           + '<span>' + data.cals[i] + ' kcal</span>'
           + '</li>';
    }).join('');

    var nextBtn = document.getElementById('btn-next');
    nextBtn.style.display = 'block';
    nextBtn.textContent = currentQ + 1 < QUIZ.length ? '次の問題へ →' : '結果を見る';
  }

  function nextQ() {
    currentQ++;
    if (currentQ >= QUIZ.length) {
      showResult();
    } else {
      document.getElementById('btn-next').style.display = 'none';
      showQ();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';

    var eval_text =
      score === 10 ? '🎉 パーフェクト！カロリー博士認定！' :
      score >= 8   ? '😎 かなりの食の知識人！' :
      score >= 6   ? '🙂 なかなか惜しい！あと少し！' :
      score >= 4   ? '🤔 カロリー意外と難しい…' :
                     '😅 食の世界、奥が深い！';

    var best = parseInt(localStorage.getItem('calorie_quiz_best') || '0');
    if (score > best) {
      best = score;
      localStorage.setItem('calorie_quiz_best', String(best));
    }

    var rc = document.getElementById('result-card');
    rc.innerHTML =
      '<p class="result-label">クイズ結果</p>' +
      '<p class="result-score" id="result-score">' + score + '</p>' +
      '<p class="result-total">点 / 10点満点</p>' +
      '<p class="result-eval" id="result-eval">' + eval_text + '</p>' +
      '<p class="result-best" id="result-best">ベストスコア：' + best + ' / 10点</p>' +
      '<button class="btn-retry" onclick="startQuiz()">もう一度チャレンジ</button>';
    rc.style.display = 'block';

    document.getElementById('prog-bar').style.width = '100%';
    document.getElementById('prog-text').textContent = '全' + QUIZ.length + '問完了';
    document.getElementById('prog-score').textContent = score + '問正解';
    document.getElementById('progress-wrap').style.display = '';
  }

  // 開始
  startQuiz();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
</body>
</html>
