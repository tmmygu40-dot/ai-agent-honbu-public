<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エネルギーコスト試算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>⚡ エネルギーコスト試算アプリ</h1>
    <p class="subtitle">電気・ガス・燃料のコスト増加を入力して<br>ひと月の負担増と値上げ必要額を確認</p>

    <section class="card">
      <h2>エネルギーコスト増加入力</h2>
      <div class="input-group">
        <label>電気代の増加額（円/月）</label>
        <input type="number" id="electric" min="0" placeholder="例：5000">
      </div>
      <div class="input-group">
        <label>ガス代の増加額（円/月）</label>
        <input type="number" id="gas" min="0" placeholder="例：3000">
      </div>
      <div class="input-group">
        <label>燃料費の増加額（円/月）</label>
        <input type="number" id="fuel" min="0" placeholder="例：8000">
      </div>
      <div class="input-group">
        <label>その他エネルギーの増加額（円/月）</label>
        <input type="number" id="other" min="0" placeholder="例：1000">
      </div>
    </section>

    <section class="card">
      <h2>売上・粗利情報（値上げ必要額の計算用）</h2>
      <div class="input-group">
        <label>月間売上（円）</label>
        <input type="number" id="sales" min="0" placeholder="例：1000000">
      </div>
      <div class="input-group">
        <label>粗利率（%）</label>
        <input type="number" id="margin" min="0" max="100" placeholder="例：40">
      </div>
    </section>

    <div class="btn-row">
      <button id="calcBtn">計算する</button>
      <button id="resetBtn" class="secondary">リセット</button>
    </div>

    <section class="card result-card" id="resultCard">
      <h2>試算結果</h2>
      <div class="result-item">
        <span class="result-label">ひと月の総負担増</span>
        <span class="result-value" id="totalIncrease">―</span>
      </div>
      <div class="result-sub">
        <div class="sub-item"><span>電気</span><span id="r-electric">―</span></div>
        <div class="sub-item"><span>ガス</span><span id="r-gas">―</span></div>
        <div class="sub-item"><span>燃料</span><span id="r-fuel">―</span></div>
        <div class="sub-item"><span>その他</span><span id="r-other">―</span></div>
      </div>
      <hr>
      <div class="result-item">
        <span class="result-label">値上げ必要率</span>
        <span class="result-value" id="priceUpRate">―</span>
      </div>
      <div class="result-item">
        <span class="result-label">1万円の商品を値上げすると</span>
        <span class="result-value secondary-val" id="priceUpAmount">―</span>
      </div>
      <div class="result-note" id="resultNote"></div>
    </section>
  </div>

  <script>
    const FIELDS = ['electric', 'gas', 'fuel', 'other', 'sales', 'margin'];

    function fmt(num) {
      return num.toLocaleString('ja-JP') + ' 円';
    }

    function fmtRate(num) {
      return num.toFixed(2) + ' %';
    }

    function val(id) {
      const v = parseFloat(document.getElementById(id).value);
      return isNaN(v) || v < 0 ? 0 : v;
    }

    function calculate() {
      const electric = val('electric');
      const gas      = val('gas');
      const fuel     = val('fuel');
      const other    = val('other');
      const sales    = val('sales');
      const margin   = val('margin');

      const total = electric + gas + fuel + other;

      document.getElementById('totalIncrease').textContent = fmt(total);
      document.getElementById('r-electric').textContent   = fmt(electric);
      document.getElementById('r-gas').textContent        = fmt(gas);
      document.getElementById('r-fuel').textContent       = fmt(fuel);
      document.getElementById('r-other').textContent      = fmt(other);

      if (sales > 0) {
        const rate = (total / sales) * 100;
        document.getElementById('priceUpRate').textContent = fmtRate(rate);
        const upPer10000 = Math.ceil(10000 * rate / 100);
        document.getElementById('priceUpAmount').textContent =
          '約 ' + upPer10000.toLocaleString('ja-JP') + ' 円 → ' +
          (10000 + upPer10000).toLocaleString('ja-JP') + ' 円';
      } else {
        document.getElementById('priceUpRate').textContent   = '売上を入力してください';
        document.getElementById('priceUpAmount').textContent = '―';
      }

      let note = '';
      if (margin > 0 && sales > 0) {
        const grossProfit = sales * (margin / 100);
        const impactRate  = (total / grossProfit) * 100;
        note = `※ 粗利 ${fmt(Math.round(grossProfit))} に対するコスト増の影響率：${impactRate.toFixed(1)}%`;
      }
      document.getElementById('resultNote').textContent = note;
      const rcEl = document.getElementById('resultCard');
      if (!rcEl.querySelector('.rc-status')) {
        rcEl.insertAdjacentHTML('beforeend', '<span class="rc-status" hidden></span>');
      }
      rcEl.querySelector('.rc-status').textContent = fmt(total);
      rcEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      saveData();
    }

    function resetAll() {
      FIELDS.forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('totalIncrease').textContent  = '―';
      document.getElementById('r-electric').textContent     = '―';
      document.getElementById('r-gas').textContent          = '―';
      document.getElementById('r-fuel').textContent         = '―';
      document.getElementById('r-other').textContent        = '―';
      document.getElementById('priceUpRate').textContent    = '―';
      document.getElementById('priceUpAmount').textContent  = '―';
      document.getElementById('resultNote').textContent     = '';
      localStorage.removeItem('energyCostData');
    }

    function saveData() {
      const data = {};
      FIELDS.forEach(id => { data[id] = document.getElementById(id).value; });
      localStorage.setItem('energyCostData', JSON.stringify(data));
    }

    function loadData() {
      const saved = localStorage.getItem('energyCostData');
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        FIELDS.forEach(id => {
          if (data[id] !== undefined) document.getElementById(id).value = data[id];
        });
        if (FIELDS.some(id => data[id] && data[id] !== '')) calculate();
      } catch (e) {}
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('calcBtn').addEventListener('click', calculate);
      document.getElementById('resetBtn').addEventListener('click', resetAll);
      loadData();
    });
  </script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
