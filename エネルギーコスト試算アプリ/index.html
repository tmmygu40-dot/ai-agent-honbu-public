<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エネルギーコスト試算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>⚡ エネルギーコスト試算アプリ</h1>
    <p class="subtitle">電気・ガス・燃料のコスト増加を入力して<br>ひと月の負担増と値上げ必要額を確認</p>

    <section class="card">
      <h2>エネルギーコスト増加入力</h2>
      <div class="input-group">
        <label>電気代の増加額（円/月）</label>
        <input type="number" id="electric" min="0" placeholder="例：5000">
      </div>
      <div class="input-group">
        <label>ガス代の増加額（円/月）</label>
        <input type="number" id="gas" min="0" placeholder="例：3000">
      </div>
      <div class="input-group">
        <label>燃料費の増加額（円/月）</label>
        <input type="number" id="fuel" min="0" placeholder="例：8000">
      </div>
      <div class="input-group">
        <label>その他エネルギーの増加額（円/月）</label>
        <input type="number" id="other" min="0" placeholder="例：1000">
      </div>
    </section>

    <section class="card">
      <h2>売上・粗利情報（値上げ必要額の計算用）</h2>
      <div class="input-group">
        <label>月間売上（円）</label>
        <input type="number" id="sales" min="0" placeholder="例：1000000">
      </div>
      <div class="input-group">
        <label>粗利率（%）</label>
        <input type="number" id="margin" min="0" max="100" placeholder="例：40">
      </div>
    </section>

    <div class="btn-row">
      <button id="calcBtn" onclick="calculate()">計算する</button>
      <button id="resetBtn" class="secondary" onclick="resetAll()">リセット</button>
    </div>

    <section class="card result-card" id="resultCard">
      <h2>試算結果</h2>
      <div class="result-item">
        <span class="result-label">ひと月の総負担増</span>
        <span class="result-value" id="totalIncrease">―</span>
      </div>
      <div class="result-sub">
        <div class="sub-item"><span>電気</span><span id="r-electric">―</span></div>
        <div class="sub-item"><span>ガス</span><span id="r-gas">―</span></div>
        <div class="sub-item"><span>燃料</span><span id="r-fuel">―</span></div>
        <div class="sub-item"><span>その他</span><span id="r-other">―</span></div>
      </div>
      <hr>
      <div class="result-item">
        <span class="result-label">値上げ必要率</span>
        <span class="result-value" id="priceUpRate">―</span>
      </div>
      <div class="result-item">
        <span class="result-label">1万円の商品を値上げすると</span>
        <span class="result-value secondary-val" id="priceUpAmount">―</span>
      </div>
      <div class="result-note" id="resultNote"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
</body>
</html>
