<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転嫁遅延チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header>
    <h1>転嫁遅延チェッカー</h1>
    <p class="subtitle">仕入れコスト値上がり分の売価転嫁状況を品目ごとに確認</p>
  </header>

  <main>
    <section class="input-section">
      <h2>品目を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">品目名</label>
          <input type="text" id="itemName" placeholder="例：小麦粉">
        </div>
        <div class="form-group">
          <label for="oldCost">旧仕入れ値（円）</label>
          <input type="number" id="oldCost" placeholder="例：100" min="0">
        </div>
        <div class="form-group">
          <label for="newCost">新仕入れ値（円）</label>
          <input type="number" id="newCost" placeholder="例：130" min="0">
        </div>
        <div class="form-group">
          <label for="oldPrice">旧売価（円）</label>
          <input type="number" id="oldPrice" placeholder="例：200" min="0">
        </div>
        <div class="form-group">
          <label for="newPrice">新売価（円）</label>
          <input type="number" id="newPrice" placeholder="例：220" min="0">
        </div>
      </div>
      <button id="addBtn" onclick="addItem()">追加する</button>
    </section>

    <section class="legend-section">
      <div class="legend">
        <span class="badge shortage">転嫁不足</span>
        <span class="badge adequate">転嫁済み</span>
        <span class="badge excess">過剰転嫁</span>
      </div>
    </section>

    <section class="summary-section" id="summarySection" style="display:none">
      <h2>集計</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">品目数</div>
          <div class="summary-value" id="totalCount">0</div>
        </div>
        <div class="summary-card shortage-bg">
          <div class="summary-label">転嫁不足</div>
          <div class="summary-value" id="shortageCount">0</div>
        </div>
        <div class="summary-card adequate-bg">
          <div class="summary-label">転嫁済み</div>
          <div class="summary-value" id="adequateCount">0</div>
        </div>
        <div class="summary-card excess-bg">
          <div class="summary-label">過剰転嫁</div>
          <div class="summary-value" id="excessCount">0</div>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>品目一覧</h2>
        <button class="clear-btn" onclick="clearAll()">全クリア</button>
      </div>
      <div id="itemList">
        <p class="empty-msg">品目がありません。上のフォームから追加してください。</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
