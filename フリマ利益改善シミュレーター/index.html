<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="赤字販売品を黒字化するために必要な値上げ率を、原価と手数料から瞬時に計算できるシミュレーター。フリマアプリで儲かる価格設定をサッと試算。">
  <title>💰 フリマ利益改善シミュレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── スライダー ── */
    .slider-container { margin-bottom: 1rem; }
    .slider-label { font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; display: flex; justify-content: space-between; }
    .slider-value { font-weight: 700; color: var(--accent); }
    input[type="range"] {
      width: 100%; height: 6px; border-radius: 3px;
      background: var(--border); outline: none; -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 2px 6px rgba(224,123,0,0.3);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(224,123,0,0.3);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }

    /* ── 内訳テーブル ── */
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .detail-table tr { border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child { border-bottom: none; }
    .detail-table td { padding: 0.55rem 0.3rem; color: var(--text-sub); }
    .detail-table td:last-child { text-align: right; font-weight: 600; color: var(--text); }
    .detail-table .hl td { font-weight: 700; color: var(--text); }
    .detail-table .hl td:last-child { color: var(--accent); font-size: 1.05rem; }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>💰 フリマ利益改善シミュレーター</h1>
    <p class="subtitle">赤字販売品を黒字化するために必要な値上げ率を、原価と手数料から瞬時に計算。</p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <p class="card-title">販売品情報を入力</p>
    <div class="field">
      <label for="cost">原価（仕入れ・制作費）</label>
      <input type="number" id="cost" placeholder="例: 500" value="0">
      <p class="hint">商品の仕入れ価格や制作費用</p>
    </div>
    <div class="field">
      <label for="current">現在の売値</label>
      <input type="number" id="current" placeholder="例: 1000" value="0">
      <p class="hint">今販売している価格</p>
    </div>
    <div class="field">
      <label for="shipping">送料</label>
      <input type="number" id="shipping" placeholder="例: 200" value="0">
      <p class="hint">配送料金（実費）</p>
    </div>
    <div class="field">
      <label for="fee">手数料率（%）</label>
      <input type="number" id="fee" placeholder="例: 10" value="10" min="0" max="100" step="0.1">
      <p class="hint">メルカリ等の手数料（通常10%）</p>
    </div>
    <div class="slider-container">
      <div class="slider-label">
        <span>目標利益額</span>
        <span class="slider-value" id="profitLabel">0 円</span>
      </div>
      <input type="range" id="profitSlider" min="0" max="5000" step="100" value="0">
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="btn-calc" onclick="calc()">値上げ率を計算する</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="result-label">必要な値上げ率</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
  </div>

  <!-- 内訳カード -->
  <div class="card" id="detail" style="display:none">
    <p class="card-title">計算内訳</p>
    <table class="detail-table"><tbody id="db"></tbody></table>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、メルカリ・ラクマなどのフリマアプリの標準的な手数料と計算ロジックに基づいています。手数料率はアプリごとに異なる可能性があります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  function calc() {
    var cost = parseFloat(document.getElementById('cost').value);
    var current = parseFloat(document.getElementById('current').value);
    var shipping = parseFloat(document.getElementById('shipping').value);
    var feeRate = parseFloat(document.getElementById('fee').value) / 100;
    var targetProfit = parseFloat(document.getElementById('profitSlider').value);

    if (isNaN(cost) || isNaN(current) || isNaN(shipping) || isNaN(feeRate)) {
      showErr('すべて入力してください');
      return;
    }

    // 計算ロジック
    // 手数料 = 売値 × 手数料率
    // 実利益 = 売値 - 手数料 - 原価 - 送料
    // 目標利益を達成するために必要な売値：
    // targetProfit = newPrice - (newPrice × feeRate) - cost - shipping
    // targetProfit = newPrice × (1 - feeRate) - cost - shipping
    // newPrice = (targetProfit + cost + shipping) / (1 - feeRate)

    var newPrice = (targetProfit + cost + shipping) / (1 - feeRate);
    if (newPrice < 0) newPrice = 0;

    var raiseRate = current > 0 ? ((newPrice - current) / current * 100) : 0;
    var actualProfit = newPrice - (newPrice * feeRate) - cost - shipping;

    var level = actualProfit < 0 ? 'ng' : raiseRate < 0 ? 'ok' : raiseRate < 20 ? 'warn' : 'ok';
    if (raiseRate > 50) level = 'warn'; // 値上げが大きい場合は注意

    var raisingText = raiseRate < 0
      ? '値下げ可能 ' + Math.abs(raiseRate).toFixed(1) + '%'
      : raiseRate.toFixed(1) + '%';

    var msg = actualProfit < 0
      ? '赤字のままです。さらに値上げが必要です'
      : raiseRate < 0
      ? '現在の価格で十分黒字化できます'
      : raiseRate < 20
      ? '現在より' + raiseRate.toFixed(1) + '%値上げすると黒字化します'
      : '現在より大幅な値上げが必要です';

    var newPriceRounded = Math.round(newPrice);
    var actualProfitRounded = Math.round(actualProfit);
    var feeAmount = Math.round(newPrice * feeRate);

    showResult(level, raisingText, msg, newPriceRounded);
    showDetail([
      ['原価', fmt(cost) + ' 円'],
      ['送料', fmt(shipping) + ' 円'],
      ['現在の売値', fmt(current) + ' 円'],
      ['推奨売値', fmt(newPriceRounded) + ' 円', true],
      ['値上げ幅', fmt(newPriceRounded - current) + ' 円'],
      ['手数料率', feeRate * 100 + '%'],
      ['手数料額（推奨売値）', fmt(feeAmount) + ' 円'],
      ['実利益（推奨売値）', fmt(actualProfitRounded) + ' 円', true],
    ]);
  }

  function showResult(level, val, note, newPrice) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = val;
    document.getElementById('re').textContent = '推奨売値：' + fmt(newPrice) + ' 円';
    document.getElementById('rn').textContent = note;
  }

  function showDetail(rows) {
    document.getElementById('db').innerHTML = rows.map(function(r){
      return '<tr' + (r[2] ? ' class="hl"' : '') + '>'
           + '<td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
    }).join('');
    document.getElementById('detail').style.display = '';
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ng';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = '⚠️';
    document.getElementById('re').textContent = '';
    document.getElementById('rn').textContent = msg;
    document.getElementById('detail').style.display = 'none';
  }

  function fmt(n) {
    return Math.round(n).toLocaleString('ja-JP');
  }

  // スライダーのラベル更新
  document.getElementById('profitSlider').addEventListener('input', function() {
    document.getElementById('profitLabel').textContent = fmt(this.value) + ' 円';
  });

  // localStorage に入力値を保存
  window.addEventListener('beforeunload', function() {
    var data = {
      cost: document.getElementById('cost').value,
      current: document.getElementById('current').value,
      shipping: document.getElementById('shipping').value,
      fee: document.getElementById('fee').value,
      profit: document.getElementById('profitSlider').value
    };
    localStorage.setItem('フリマ利益改善', JSON.stringify(data));
  });

  // localStorage から入力値を復元
  window.addEventListener('load', function() {
    var saved = localStorage.getItem('フリマ利益改善');
    if (saved) {
      try {
        var data = JSON.parse(saved);
        if (data.cost) document.getElementById('cost').value = data.cost;
        if (data.current) document.getElementById('current').value = data.current;
        if (data.shipping) document.getElementById('shipping').value = data.shipping;
        if (data.fee) document.getElementById('fee').value = data.fee;
        if (data.profit) {
          document.getElementById('profitSlider').value = data.profit;
          document.getElementById('profitLabel').textContent = fmt(data.profit) + ' 円';
        }
      } catch (e) {}
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
