<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接メモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>面接メモアプリ</h1>

    <!-- 登録フォーム -->
    <section class="form-section">
      <h2 id="form-title">候補者を登録</h2>
      <div class="form-grid">
        <div class="form-row">
          <label for="name">名前 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="例：山田 太郎">
        </div>
        <div class="form-row">
          <label for="date">面接日 <span class="required">*</span></label>
          <input type="date" id="date">
        </div>
        <div class="form-row">
          <label for="position">応募役職</label>
          <input type="text" id="position" placeholder="例：営業マネージャー">
        </div>
        <div class="form-row">
          <label for="impression">印象</label>
          <textarea id="impression" rows="2" placeholder="第一印象・コミュニケーション・雰囲気など"></textarea>
        </div>
        <div class="form-row">
          <label for="strength">強み</label>
          <textarea id="strength" rows="2" placeholder="スキル・経験・実績など"></textarea>
        </div>
        <div class="form-row">
          <label for="concern">懸念点</label>
          <textarea id="concern" rows="2" placeholder="不明点・リスク・確認が必要なことなど"></textarea>
        </div>
        <div class="form-row">
          <label for="result">判定</label>
          <select id="result">
            <option value="">未定</option>
            <option value="pass">合格</option>
            <option value="fail">不合格</option>
            <option value="hold">保留</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button id="save-btn" onclick="saveCandidate()">登録する</button>
        <button id="cancel-btn" class="btn-secondary" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </section>

    <!-- フィルター -->
    <section class="filter-section">
      <input type="text" id="search" placeholder="名前・役職で検索..." oninput="renderList()">
      <select id="filter-result" onchange="renderList()">
        <option value="">すべて</option>
        <option value="pass">合格</option>
        <option value="fail">不合格</option>
        <option value="hold">保留</option>
        <option value="">未定</option>
      </select>
    </section>

    <!-- 一覧 -->
    <section class="list-section">
      <div id="count-label" class="count-label"></div>
      <div id="candidate-list"></div>
    </section>
  </div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button onclick="editFromModal()" class="btn-edit">編集</button>
        <button onclick="deleteFromModal()" class="btn-danger">削除</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
