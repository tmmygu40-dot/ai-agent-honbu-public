<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法定点検期限管理アプリ</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 700px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── 入力 ── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field select:focus { border-color: var(--accent); background: #fff; }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 700px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── 点検一覧テーブル ── */
    .result-area {
      display: none;
      max-width: 700px;
      margin: 0 auto 1rem;
    }
    .section-title {
      font-size: 0.85rem; font-weight: 800;
      color: var(--accent); letter-spacing: 0.04em;
      margin-bottom: 0.5rem; margin-top: 1.2rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .section-title::before {
      content: ''; display: inline-block;
      width: 4px; height: 1em; background: var(--accent); border-radius: 2px;
    }
    .insp-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.84rem; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }
    .insp-table thead tr { background: var(--accent-light); }
    .insp-table th {
      padding: 0.6rem 0.7rem; text-align: left;
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      border-bottom: 2px solid var(--border);
    }
    .insp-table td {
      padding: 0.7rem 0.7rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top; line-height: 1.45;
    }
    .insp-table tr:last-child td { border-bottom: none; }
    .insp-table tr:hover td { background: #fafaf8; }
    .cycle-badge {
      display: inline-block; padding: 0.15rem 0.5rem;
      border-radius: 20px; font-size: 0.74rem; font-weight: 700;
      white-space: nowrap;
    }
    .cycle-6m  { background: var(--warn-bg); color: var(--warn); }
    .cycle-1y  { background: var(--ok-bg);   color: var(--ok); }
    .cycle-2y  { background: #eff6ff; color: #1d4ed8; }
    .cycle-3y  { background: #f5f3ff; color: #7c3aed; }
    .cycle-other { background: #f3f4f6; color: #4b5563; }
    .law-text { font-size: 0.74rem; color: var(--text-sub); }
    .who-badge {
      display: inline-block; padding: 0.12rem 0.45rem;
      border-radius: 20px; font-size: 0.72rem; font-weight: 600;
      background: #f3f4f6; color: #374151;
    }
    .count-badge {
      display: inline-block; background: var(--accent); color: #fff;
      border-radius: 20px; font-size: 0.75rem; font-weight: 700;
      padding: 0.1rem 0.55rem; margin-left: 0.4rem;
    }

    /* ── 注釈 ── */
    .source-note {
      max-width: 700px; margin: 1.6rem auto 0;
      padding: 0.7rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.76rem; color: var(--text-sub);
      line-height: 1.6; text-align: left;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 700px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 520px) {
      .insp-table th:nth-child(4),
      .insp-table td:nth-child(4) { display: none; }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .no-print, .btn-pdf { display: none !important; }
      .card, .insp-table { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      @page { margin: 12mm; }
    }
  </style>

        <option value="construction">建設業・工事現場</option>
        <option value="manufacturing">製造業・工場</option>
        <option value="office">オフィス・事務所</option>
      </select>
    </div>
    <div class="field" id="equipment-field" style="display:none">

      <select id="equipment" onchange="generate()">
        <option value="all">すべて表示</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">点検一覧を生成する</button>

    実際の点検義務は建物規模・使用状況により異なります。管轄官公庁や専門業者にご確認ください。
  </p>

  /* 設備カテゴリの選択肢を設定 */
  function onIndustryChange() {
    var ind = document.getElementById('industry').value;
    var equipSel = document.getElementById('equipment');
    var equipField = document.getElementById('equipment-field');
    equipSel.innerHTML = '<option value="all">すべて表示</option>';

    if (!ind) { equipField.style.display = 'none'; clearResult(); return; }

    var rows = (DATA[ind] || []).concat(DATA.common || []);
    var cats = [];
    rows.forEach(function(r) {
      if (cats.indexOf(r.equipment) === -1) cats.push(r.equipment);
    });
    cats.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      equipSel.appendChild(opt);
    });
    equipField.style.display = '';

    // localStorage 保存
    try { localStorage.setItem('houki_industry', ind); } catch(e) {}

    generate();
  }

  function clearResult() {
    document.getElementById('result-area').style.display = 'none';
  }

  function generate() {
    var ind = document.getElementById('industry').value;
    if (!ind) { clearResult(); return; }
    var equipFilter = document.getElementById('equipment').value;

    // localStorage 保存
    try { localStorage.setItem('houki_industry', ind); } catch(e) {}

    var indRows    = (DATA[ind] || []).slice();
    var commonRows = DATA.common.slice();

    // 絞り込み
    if (equipFilter && equipFilter !== 'all') {
      indRows    = indRows.filter(function(r){ return r.equipment === equipFilter; });
      commonRows = commonRows.filter(function(r){ return r.equipment === equipFilter; });
    }

    var html = '';

    // 業種別
    if (indRows.length > 0) {
      var indLabel = document.getElementById('industry').options[document.getElementById('industry').selectedIndex].text;
      html += '<div class="section-title">' + escH(indLabel) + ' の点検<span class="count-badge">' + indRows.length + '件</span></div>';
      html += buildTable(indRows);
    }

    // 共通
    if (commonRows.length > 0) {
      html += '<div class="section-title">共通（全業種）<span class="count-badge">' + commonRows.length + '件</span></div>';
      html += buildTable(commonRows);
    }

    if (!html) {
      html = '<div class="card"><p style="color:var(--text-sub);text-align:center;padding:1rem">該当する点検はありませんでした</p></div>';
    }

    document.getElementById('result-content').innerHTML = html;
    document.getElementById('result-area').style.display = 'block';
  }

  function buildTable(rows) {
    var thead = '<thead><tr>'
      + '<th>点検名</th>'
      + '<th>設備</th>'
      + '<th>周期</th>'
      + '<th>根拠法令</th>'
      + '<th>実施者</th>'
      + '</tr></thead>';
    var tbody = '<tbody>' + rows.map(function(r) {
      return '<tr>'
        + '<td><strong>' + escH(r.name) + '</strong></td>'
        + '<td>' + escH(r.equipment) + '</td>'
        + '<td><span class="cycle-badge ' + r.cycleClass + '">' + escH(r.cycle) + '</span></td>'
        + '<td><span class="law-text">' + escH(r.law) + '</span></td>'
        + '<td><span class="who-badge">' + escH(r.who) + '</span></td>'
        + '</tr>';
    }).join('') + '</tbody>';
    return '<table class="insp-table">' + thead + tbody + '</table>';
  }

  function escH(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── 復元 ── */
  window.addEventListener('DOMContentLoaded', function() {
    try {
      var saved = localStorage.getItem('houki_industry');
      if (saved) {
        var sel = document.getElementById('industry');
        sel.value = saved;
        if (sel.value) { onIndustryChange(); }
      }
    } catch(e) {}
  });
  </script>
