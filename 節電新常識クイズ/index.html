<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>節電新常識クイズ｜電気代節約の最新常識を10問で学ぶ</title>
  <meta name="description" content="エアコン・冷蔵庫・待機電力など、電気代節約の新常識を10問の3択クイズで楽しく学べる無料アプリ。値上げ時代の家計防衛にすぐ役立つ知識が身につきます。">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .progress {
      font-size: 0.78rem; color: var(--text-sub); margin-bottom: 0.4rem;
    }
    .q-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      margin-bottom: 1rem;
    }
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      width: 100%; padding: 0.85rem 1rem;
      font-size: 0.98rem; font-weight: 600;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px; cursor: pointer;
      text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .choice-btn.wrong { border-color: var(--ng); background: var(--ng-bg); color: var(--ng); }
    .feedback {
      margin-top: 1rem; padding: 0.9rem 1rem;
      border-radius: 10px; font-size: 0.9rem; line-height: 1.55;
      display: none;
    }
    .feedback.ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok); }
    .feedback.ng   { background: var(--ng-bg);   color: var(--ng);   border: 1px solid var(--ng); }
    .feedback strong { display: block; font-weight: 800; margin-bottom: 0.3rem; }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .btn-calc.hidden { display: none; }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn);  background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);    background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.4rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-eval {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      margin-top: 0.5rem; margin-bottom: 0.6rem;
    }
    .result-card.ok   .result-eval { color: var(--ok); }
    .result-card.warn .result-eval { color: var(--warn); }
    .result-card.ng   .result-eval { color: var(--ng); }
    .result-note { font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }
    .high-score {
      font-size: 0.82rem; color: var(--text-sub);
      margin-top: 0.6rem; padding-top: 0.6rem;
      border-top: 1px dashed var(--border);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>節電新常識クイズ</h1>
    <p class="subtitle">電気代節約の新常識を10問で楽しく学ぶ ※2026年4月時点の参考データ。最新情報は公式情報をご確認ください</p>
  </header>

  <!-- クイズカード -->
  <div class="card" id="quiz-card">
    <p class="card-title">クイズ</p>
    <p class="progress" id="progress">第 1 問 / 10</p>
    <p class="q-text" id="q-text">—</p>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- 次へボタン -->
  <button class="btn-calc hidden" id="next-btn" onclick="nextQuestion()">次の問題へ</button>

  <!-- 結果カード -->
  <div class="result-card" id="result">
    <p class="result-label">スコア</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-eval" id="re"></p>
    <p class="result-note" id="rn"></p>
    <p class="high-score" id="hs"></p>
  </div>

  <!-- もう一度ボタン -->
  <button class="btn-calc hidden" id="retry-btn" onclick="restart()">もう一度挑戦する</button>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このクイズは、経済産業省・資源エネルギー庁・環境省などの公開情報や、家電メーカーの公式節電ガイドを参考に、目安として使いやすく整理しています。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      q: 'エアコン（冷房）の電気代を抑える設定温度の目安は？',
      choices: ['25℃', '28℃', '20℃以下'],
      answer: 1,
      explain: '冷房は28℃が目安。1℃上げるだけで消費電力を約10%節約できると言われます。'
    },
    {
      q: 'エアコンを30分だけ外出する場合、電気代の観点で得な選び方は？',
      choices: ['必ず消す', 'つけっぱなしのほうが得な場合が多い', 'どちらでも変わらない'],
      answer: 1,
      explain: '短時間の外出なら、再起動時の大きな消費電力を避けて「つけっぱなし」のほうが得な場合が多いです。'
    },
    {
      q: '冷蔵庫の節電として正しいのはどれ？',
      choices: ['壁にぴったり付けて置く', '中身をぎっしり詰める', '中身を詰めすぎず、上部や側面に隙間を空ける'],
      answer: 2,
      explain: '冷蔵庫は冷気循環のため詰めすぎNG。背面・側面の放熱スペースも必要です（冷凍庫は逆に詰めたほうが得）。'
    },
    {
      q: '待機電力で家庭の年間電力消費量に占める割合はおよそ？',
      choices: ['約1%', '約5%', '約15%以上'],
      answer: 1,
      explain: '待機電力は家庭全体の約5%程度。こまめにコンセントを抜けば年間で数千円の節約になります。'
    },
    {
      q: '電気ポットでお湯を保温し続けるのと、必要時に都度沸かすのでは？',
      choices: ['保温のほうが得', '使う頻度が低いなら都度沸かすほうが得', '同じ'],
      answer: 1,
      explain: '長時間の保温は意外と電力を消費。1日数回しか使わないなら都度沸かす（または魔法瓶に移す）ほうが省エネです。'
    },
    {
      q: 'LED電球が白熱電球より優れている点として正しいのは？',
      choices: ['消費電力は約1/5、寿命は約40倍', '消費電力は同じだが寿命が長い', '明るさが弱い'],
      answer: 0,
      explain: 'LEDは白熱電球の約1/5の消費電力で、寿命は約40倍。初期費用は高くても長期で大きく得します。'
    },
    {
      q: '洗濯乾燥機を毎日使う家庭で、最も効果的な節電方法は？',
      choices: ['乾燥工程を減らす（自然乾燥との併用）', '洗剤を増やす', 'お湯洗いに切り替える'],
      answer: 0,
      explain: '洗濯乾燥機の電力の大半は「乾燥工程」。可能な範囲で自然乾燥と組み合わせると大きく節電できます。'
    },
    {
      q: 'テレビの節電として効果が高いのは？',
      choices: ['画面の輝度を下げる', '音量を下げる', '番組数を減らす'],
      answer: 0,
      explain: '液晶テレビの消費電力の多くは「バックライトの明るさ」。輝度を下げると数十W単位で節電できます。'
    },
    {
      q: 'こたつ・電気カーペットを使う際の節電のコツは？',
      choices: ['設定温度を最大にする', '断熱マットや厚手の敷物を併用する', '小さい部屋で使う'],
      answer: 1,
      explain: '床への熱逃げが大きいため、断熱マット＋厚手の敷物を敷くと同じ温感でも消費電力を抑えられます。'
    },
    {
      q: '電気料金プランの見直しで節電以外に効果が出やすい方法は？',
      choices: ['契約アンペアを下げる／使用時間に合うプランへ変更', '深夜だけ電気を使う', '冷蔵庫を止める'],
      answer: 0,
      explain: '使用実態に合うプラン選びは即効性アリ。基本料金が下がるアンペア見直しや、時間帯別プランが代表例です。'
    }
  ];

  var STORAGE_KEY = 'setsuden_shinjoshiki_quiz_high_score_v1';
  var current = 0;
  var score = 0;
  var answered = false;

  function showQuestion() {
    answered = false;
    var q = QUESTIONS[current];
    document.getElementById('progress').textContent = '第 ' + (current + 1) + ' 問 / ' + QUESTIONS.length;
    document.getElementById('q-text').textContent = q.q;
    var box = document.getElementById('choices');
    box.innerHTML = '';
    q.choices.forEach(function(c, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.type = 'button';
      btn.textContent = (i + 1) + '. ' + c;
      btn.onclick = function() { answer(i); };
      box.appendChild(btn);
    });
    var fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.className = 'feedback';
    fb.innerHTML = '';
    document.getElementById('next-btn').classList.add('hidden');
  }

  function answer(idx) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[current];
    var btns = document.querySelectorAll('#choices .choice-btn');
    btns.forEach(function(b, i) {
      b.disabled = true;
      if (i === q.answer) b.classList.add('correct');
      else if (i === idx) b.classList.add('wrong');
    });
    var fb = document.getElementById('feedback');
    if (idx === q.answer) {
      score++;
      fb.className = 'feedback ok';
      fb.innerHTML = '<strong>⭕ 正解！</strong>' + q.explain;
    } else {
      fb.className = 'feedback ng';
      fb.innerHTML = '<strong>❌ 残念… 正解は 「' + q.choices[q.answer] + '」</strong>' + q.explain;
    }
    fb.style.display = 'block';

    var nextBtn = document.getElementById('next-btn');
    if (current < QUESTIONS.length - 1) {
      nextBtn.textContent = '次の問題へ';
    } else {
      nextBtn.textContent = '結果を見る';
    }
    nextBtn.classList.remove('hidden');
  }

  function nextQuestion() {
    if (current < QUESTIONS.length - 1) {
      current++;
      showQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('next-btn').classList.add('hidden');

    var level, evalMsg, note;
    if (score === 10) {
      level = 'ok';
      evalMsg = '🏆 完璧！節電マスター';
      note = '電気代節約の新常識を完全制覇。家計防衛のプロです。';
    } else if (score >= 7) {
      level = 'ok';
      evalMsg = '👍 上級者レベル';
      note = '節電の知識はかなり身についています。残りも復習すれば完璧です。';
    } else if (score >= 4) {
      level = 'warn';
      evalMsg = '📚 もう一歩で合格';
      note = '基本は押さえています。間違えた問題の解説を読んで再挑戦してみてください。';
    } else {
      level = 'ng';
      evalMsg = '⚠️ 節電の見直し時';
      note = '今の知識のままだと電気代でかなり損している可能性アリ。解説をチェックして再挑戦を。';
    }

    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rv').textContent = score + ' / 10';
    document.getElementById('re').textContent = evalMsg;
    document.getElementById('rn').textContent = note;

    // 最高スコア
    var prev = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    if (score > prev) {
      localStorage.setItem(STORAGE_KEY, String(score));
      document.getElementById('hs').textContent = '🎉 自己ベスト更新！（最高スコア：' + score + ' / 10）';
    } else {
      document.getElementById('hs').textContent = '最高スコア：' + prev + ' / 10';
    }

    document.getElementById('retry-btn').classList.remove('hidden');
  }

  function restart() {
    current = 0;
    score = 0;
    answered = false;
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('retry-btn').classList.add('hidden');
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  showQuestion();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
