<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家賃収支管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>家賃収支管理</h1>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" data-tab="property">物件管理</button>
      <button class="tab" data-tab="income">収支入力</button>
      <button class="tab" data-tab="summary">収支一覧</button>
    </div>

    <!-- 物件管理タブ -->
    <div id="tab-property" class="tab-content active">
      <h2>物件を登録する</h2>
      <div class="form-group">
        <label>物件名</label>
        <input type="text" id="propName" placeholder="例：渋谷マンション101">
      </div>
      <div class="form-group">
        <label>ローン月額（円）</label>
        <input type="number" id="propLoan" placeholder="例：80000" min="0">
      </div>
      <button class="btn-primary" onclick="addProperty()">登録する</button>

      <h2>登録済み物件</h2>
      <div id="propertyList" class="list"></div>
    </div>

    <!-- 収支入力タブ -->
    <div id="tab-income" class="tab-content">
      <h2>月次収支を入力する</h2>
      <div class="form-group">
        <label>物件</label>
        <select id="incomeProperty"></select>
      </div>
      <div class="form-group">
        <label>年月</label>
        <input type="month" id="incomeMonth">
      </div>
      <div class="form-group">
        <label>家賃収入（円）</label>
        <input type="number" id="incomeRent" placeholder="例：100000" min="0">
      </div>
      <div class="form-group">
        <label>修繕費（円）</label>
        <input type="number" id="incomeRepair" placeholder="例：0" min="0">
      </div>
      <div class="form-group">
        <label>その他支出（円）</label>
        <input type="number" id="incomeOther" placeholder="例：0" min="0">
      </div>
      <button class="btn-primary" onclick="addRecord()">記録する</button>
    </div>

    <!-- 収支一覧タブ -->
    <div id="tab-summary" class="tab-content">
      <h2>収支一覧</h2>
      <div class="filter-row">
        <select id="filterProperty">
          <option value="">全物件</option>
        </select>
        <input type="month" id="filterMonth">
        <button class="btn-secondary" onclick="renderSummary()">絞り込む</button>
      </div>
      <div id="summaryList"></div>
      <div id="totalRow" class="total-row"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
