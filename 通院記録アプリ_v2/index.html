<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通院記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>🏥 通院記録</h1>

    <!-- 入力フォーム -->
    <section class="form-section">
      <h2>記録を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="visitDate">通院日 <span class="required">*</span></label>
          <input type="date" id="visitDate">
        </div>
        <div class="form-group">
          <label for="department">診察科 <span class="required">*</span></label>
          <input type="text" id="department" placeholder="例：内科、整形外科">
        </div>
        <div class="form-group full-width">
          <label for="medicine">処方薬</label>
          <input type="text" id="medicine" placeholder="例：ロキソニン、アモキシシリン">
        </div>
        <div class="form-group full-width">
          <label for="memo">メモ</label>
          <textarea id="memo" rows="2" placeholder="症状・医師からの指示など"></textarea>
        </div>
      </div>
      <button id="addBtn" class="btn-primary">追加する</button>
    </section>

    <!-- フィルター・検索 -->
    <section class="filter-section">
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="🔍 診察科・処方薬で検索...">
      </div>
    </section>

    <!-- 件数 -->
    <div class="record-count">
      <span id="countText">0件の記録</span>
    </div>

    <!-- 一覧 -->
    <section id="recordList" class="record-list">
      <p class="empty-msg">記録がありません</p>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
