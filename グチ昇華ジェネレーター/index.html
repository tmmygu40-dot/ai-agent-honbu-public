<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="値上げや日常のグチを入力するだけで、ユーモラスな言い訳・ボケ風コメントを3パターン即生成。SNSやLINEにそのままコピペできて、イライラを笑いに変えるストレス昇華ツールです。">
  <title>グチ昇華ジェネレーター｜値上げのイライラを笑いに変える</title>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      font-family: inherit;
    }
    .field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 昇華パターン ── */
    .pattern-item {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
      position: relative;
    }
    .pattern-item:last-child { margin-bottom: 0; }
    .pattern-label {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      background: var(--accent); color: #fff;
      padding: 0.15rem 0.5rem; border-radius: 5px;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .pattern-text {
      font-size: 0.95rem; line-height: 1.6;
      color: var(--text);
      margin-bottom: 0.6rem;
    }
    .copy-btn {
      display: inline-block;
      font-size: 0.78rem; font-weight: 700;
      padding: 0.4rem 0.8rem;
      background: #fff; color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--ok); color: #fff; border-color: var(--ok); }

    /* ── 履歴 ── */
    .history-item {
      padding: 0.6rem 0.3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-sub);
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-text { flex: 1; word-break: break-all; }
    .history-cat { font-size: 0.72rem; color: var(--accent); flex-shrink: 0; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .copy-btn { display: none !important; }
      .card, .pattern-item { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>🌀 グチ昇華ジェネレーター</h1>
    <p class="subtitle">値上げ・日常のイライラを、ユーモラスな言い訳3パターンに変換。SNSやLINEにそのままコピペOK。</p>
  </header>

  <div class="card">
    <p class="card-title">グチを入力</p>
    <div class="field">
      <label for="gripe">どんなグチ？</label>
      <textarea id="gripe" placeholder="例：また牛乳が値上げされた。先月買った時より50円高いってどういうこと…"></textarea>
      <p class="hint">短文でもOK。値上げ・通勤・推し活など何でも。</p>
    </div>
    <div class="field">
      <label for="cat">カテゴリ</label>
      <select id="cat">
        <option value="food">食費・物価</option>
        <option value="utility">光熱費・公共料金</option>
        <option value="oshi">推し活・趣味</option>
        <option value="commute">通勤・移動</option>
        <option value="other">その他・人間関係</option>
      </select>
    </div>
  </div>

  <button class="btn-calc" onclick="generate()">🎭 ユーモアに昇華する</button>

  <div class="card" id="result-card" style="display:none">
    <p class="card-title">昇華された3パターン</p>
    <div id="patterns"></div>
  </div>

  <div class="card" id="history-card" style="display:none">
    <p class="card-title">直近のグチ履歴</p>
    <div id="history-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    💡 このツールはエンタメ目的のジェネレーターです。生成される文面はユーモア例として用意したテンプレからランダム生成されるもので、実在の商品・サービス・人物への評価ではありません。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // カテゴリ別の言い回しテンプレ（{g} に元のグチが入る）
  var TEMPLATES = {
    food: [
      'これはもう「{g}」じゃない。日本経済の縮図を一個人が肌で感じる修行です。',
      '「{g}」？違う、これは新時代のミニマリスト訓練。財布が勝手に断捨離してくれる。',
      '安心してください、「{g}」は私のせいじゃない。世界経済が連帯責任。',
      '「{g}」はもうグチじゃなくて時事ニュース。今日も無料でエコノミスト体験中。',
      '昔の人は「贅沢は敵だ」と言った。我々は「{g}」で勝手に無敵になれる。',
      '「{g}」を嘆くのは庶民、笑うのは哲学者。今日から私は哲学者です。'
    ],
    utility: [
      '「{g}」じゃない、これは地球と握手するための参加費。',
      '電力会社「{g}って言われても…」。私「言わせて。タダで言わせて」。',
      '「{g}」は夏の風物詩、もはや季語。来年の俳句大会の準備中。',
      '節電したのに「{g}」。これはもう物理法則を疑うレベル。',
      '「{g}」を払うたびに、家のブレーカーが私に「お疲れ様」って言ってる気がする。',
      '電気・ガス・水道「{g}」三段活用。我が家は今や三冠王。'
    ],
    oshi: [
      '「{g}」？違う、これは推しへの納税。納税は国民の義務。',
      '銀行口座「{g}」。私「彼を見れば全部解決する」。',
      '「{g}」は無駄遣いではない、文化への投資。私は今、文化人。',
      '「{g}」と言うけど、推しが生きてる時代に生きてる時点で黒字。',
      '推し「{g}になっちゃった？」私「いえ、これは経済を回してるんです」。',
      'FP「{g}は赤字」。私「精神は黒字です」。'
    ],
    commute: [
      '「{g}」じゃない、これは無料の社会勉強。電車の中で人間観察家になれる。',
      '満員電車で「{g}」？お得です、知らない人と密着料金タダ。',
      '「{g}」は通勤の宿命。会社まで歩く修行僧モードで対応中。',
      '駅員さん「{g}申し訳ありません」。私「いえ、これは人生の一部です」。',
      '「{g}」を嘆く時間で、もう一駅歩けば健康診断A判定。',
      '「{g}」のおかげでオフィス着く頃には心が無になってる。これが瞑想。'
    ],
    other: [
      '「{g}」？これはもう人生のスパイス。塩こしょうレベル。',
      '「{g}」と言うけど、これは私の人生に必要な「余白」。',
      '「{g}」を嘆くのは凡人、ネタにするのは芸人。私は今日から芸人です。',
      '神様「{g}くらいでへこたれてどうする」。私「いや、結構へこむんで」。',
      '「{g}」はもう日常。日常をネタに変えるのが大人のたしなみ。',
      '「{g}」？これは私が主役の朝ドラのワンシーン。来週も乞うご期待。'
    ]
  };

  var STORAGE_KEY = 'gripe_history_v1';

  function generate() {
    var gripe = document.getElementById('gripe').value.trim();
    var cat = document.getElementById('cat').value;
    if (!gripe) {
      alert('グチを入力してください');
      return;
    }
    // 句点除去（テンプレに収まるように）
    var g = gripe.replace(/[。、．，\.,]+$/, '');
    if (g.length > 60) g = g.substring(0, 60) + '…';

    var pool = TEMPLATES[cat].slice();
    // ランダムに3つ選ぶ
    var picks = [];
    for (var i = 0; i < 3 && pool.length > 0; i++) {
      var idx = Math.floor(Math.random() * pool.length);
      picks.push(pool.splice(idx, 1)[0]);
    }

    var html = '';
    picks.forEach(function(tpl, i) {
      var text = tpl.replace(/\{g\}/g, g);
      html += '<div class="pattern-item">'
            + '<span class="pattern-label">パターン ' + (i+1) + '</span>'
            + '<p class="pattern-text" id="pt-' + i + '">' + escapeHtml(text) + '</p>'
            + '<button class="copy-btn" onclick="copyPattern(' + i + ', this)">📋 コピー</button>'
            + '</div>';
    });
    document.getElementById('patterns').innerHTML = html;
    document.getElementById('result-card').style.display = 'block';

    saveHistory(gripe, cat);
    renderHistory();
  }

  function copyPattern(i, btn) {
    var text = document.getElementById('pt-' + i).textContent;
    var done = function() {
      btn.classList.add('copied');
      btn.textContent = '✓ コピーしました';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.textContent = '📋 コピー';
      }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function() { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, done) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) { alert('コピーできませんでした'); }
    document.body.removeChild(ta);
  }

  function saveHistory(gripe, cat) {
    var hist = loadHistory();
    hist.unshift({ g: gripe, c: cat, t: Date.now() });
    hist = hist.slice(0, 5);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); } catch (e) {}
  }

  function loadHistory() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : [];
    } catch (e) { return []; }
  }

  var CAT_LABEL = {
    food: '食費・物価',
    utility: '光熱費',
    oshi: '推し活',
    commute: '通勤',
    other: 'その他'
  };

  function renderHistory() {
    var hist = loadHistory();
    if (hist.length === 0) {
      document.getElementById('history-card').style.display = 'none';
      return;
    }
    var html = hist.map(function(item) {
      var preview = item.g.length > 40 ? item.g.substring(0, 40) + '…' : item.g;
      return '<div class="history-item">'
           + '<span class="history-text">' + escapeHtml(preview) + '</span>'
           + '<span class="history-cat">' + (CAT_LABEL[item.c] || item.c) + '</span>'
           + '</div>';
    }).join('');
    document.getElementById('history-list').innerHTML = html;
    document.getElementById('history-card').style.display = 'block';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  // 初期表示で履歴があれば表示
  renderHistory();
  </script>

</body>
