<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
</head>
<body>
  <div class="container">
    <h1>工程管理アプリ</h1>

    <section class="form-section">
      <h2>タスク追加</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="taskName">タスク名</label>
          <input type="text" id="taskName" placeholder="例：設計・開発・テスト" maxlength="30">
        </div>
        <div class="form-group">
          <label for="startDate">開始日</label>
          <input type="date" id="startDate">
        </div>
        <div class="form-group">
          <label for="duration">期間（日数）</label>
          <input type="number" id="duration" min="1" max="365" placeholder="日数">
        </div>
        <div class="form-group form-group--btn">
          <button id="addBtn" class="btn btn--primary">追加</button>
        </div>
      </div>
      <p id="errorMsg" class="error-msg"></p>
    </section>

    <section class="gantt-section">
      <div class="gantt-header">
        <h2>ガントチャート</h2>
        <button id="clearBtn" class="btn btn--danger">全削除</button>
      </div>

      <div id="emptyMsg" class="empty-msg">タスクを追加するとガントチャートが表示されます</div>

      <div id="ganttWrap" class="gantt-wrap" style="display:none">
        <div class="gantt-table">
          <div class="gantt-labels" id="ganttLabels"></div>
          <div class="gantt-chart-area">
            <div class="gantt-axis" id="ganttAxis"></div>
            <div class="gantt-bars" id="ganttBars"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
