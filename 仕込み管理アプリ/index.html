<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕込み管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>仕込み管理アプリ</h1>
      <p class="subtitle">翌日の仕込み目安を自動計算</p>
    </header>

    <section class="form-section">
      <h2>今日の記録を入力</h2>
      <div class="form-group">
        <label for="foodName">食材名</label>
        <input type="text" id="foodName" placeholder="例：から揚げ" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="prepAmount">仕込み量（個/g/枚など）</label>
          <input type="number" id="prepAmount" placeholder="例：100" min="0" />
        </div>
        <div class="form-group">
          <label for="soldAmount">売れた量</label>
          <input type="number" id="soldAmount" placeholder="例：85" min="0" />
        </div>
      </div>
      <div class="form-group">
        <label for="unit">単位</label>
        <input type="text" id="unit" placeholder="例：個" />
      </div>
      <button id="addBtn" class="btn btn-primary">記録を追加</button>
    </section>

    <section class="list-section">
      <div class="section-header">
        <h2>食材一覧 &amp; 明日の目安</h2>
        <span class="badge" id="itemCount">0件</span>
      </div>
      <div id="foodList" class="food-list">
        <p class="empty-msg">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
