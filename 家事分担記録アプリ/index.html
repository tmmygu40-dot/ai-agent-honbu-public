<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家事分担記録アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏠 家事分担記録</h1>
      <div class="partner-names">
        <label>
          <span>担当者1:</span>
          <input type="text" id="partner1Name" value="パートナー1" maxlength="10">
        </label>
        <label>
          <span>担当者2:</span>
          <input type="text" id="partner2Name" value="パートナー2" maxlength="10">
        </label>
      </div>
    </header>

    <section class="task-section">
      <h2>家事タスク</h2>
      <p class="hint">担当者を選んでタスクをタップ</p>
      <div class="assignee-select">
        <button class="assignee-btn active" data-assignee="1" id="btnAssignee1">パートナー1</button>
        <button class="assignee-btn" data-assignee="2" id="btnAssignee2">パートナー2</button>
      </div>
      <div class="task-grid" id="taskGrid">
        <!-- タスクボタンはJSで生成 -->
      </div>
    </section>

    <section class="summary-section">
      <div class="summary-header">
        <h2>集計</h2>
        <div class="period-tabs">
          <button class="tab-btn active" data-period="today">今日</button>
          <button class="tab-btn" data-period="week">今週</button>
          <button class="tab-btn" data-period="month">今月</button>
        </div>
      </div>
      <div class="balance-bar-wrap">
        <div class="balance-bar" id="balanceBar">
          <div class="bar-p1" id="barP1">50%</div>
          <div class="bar-p2" id="barP2">50%</div>
        </div>
        <div class="balance-labels">
          <span id="labelP1">パートナー1</span>
          <span id="labelP2">パートナー2</span>
        </div>
      </div>
      <div class="count-summary">
        <div class="count-box p1-box">
          <div class="count-name" id="countNameP1">パートナー1</div>
          <div class="count-num" id="countNumP1">0件</div>
        </div>
        <div class="count-box p2-box">
          <div class="count-name" id="countNameP2">パートナー2</div>
          <div class="count-num" id="countNumP2">0件</div>
        </div>
      </div>
    </section>

    <section class="log-section">
      <div class="log-header">
        <h2>記録一覧</h2>
        <button class="clear-btn" id="clearBtn">今日の記録を消す</button>
      </div>
      <ul class="log-list" id="logList">
        <li class="empty-msg">まだ記録がありません</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
