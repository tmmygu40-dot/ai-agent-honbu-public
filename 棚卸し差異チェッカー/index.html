<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棚卸し差異チェッカー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>棚卸し差異チェッカー</h1>

    <section class="input-section">
      <h2>商品を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="itemName">商品名</label>
          <input type="text" id="itemName" placeholder="例：コーヒー豆" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="bookQty">帳簿数</label>
          <input type="number" id="bookQty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="actualQty">実数</label>
          <input type="number" id="actualQty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="unitPrice">単価（円）</label>
          <input type="number" id="unitPrice" placeholder="0" min="0">
        </div>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <section class="summary-section" id="summarySection" style="display:none;">
      <div class="summary-box">
        <span class="summary-label">合計金額ロス</span>
        <span class="summary-value" id="totalLoss">¥0</span>
      </div>
      <div class="summary-box">
        <span class="summary-label">登録件数</span>
        <span class="summary-value" id="itemCount">0件</span>
      </div>
    </section>

    <section class="list-section" id="listSection" style="display:none;">
      <h2>棚卸し一覧</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>商品名</th>
              <th>帳簿数</th>
              <th>実数</th>
              <th>差異</th>
              <th>単価</th>
              <th>金額ロス</th>
              <th>削除</th>
            </tr>
          </thead>
          <tbody id="itemTableBody"></tbody>
        </table>
      </div>
      <button id="clearBtn" class="btn-danger">全件削除</button>
    </section>

    <div class="empty-state" id="emptyState">
      <p>商品を登録すると差異が表示されます</p>
    </div>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
