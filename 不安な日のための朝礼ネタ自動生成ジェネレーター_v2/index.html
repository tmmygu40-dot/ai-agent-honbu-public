<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="朝礼で話すネタに困ったときの救世主。生成ボタンで不安な日も乗り切ろう。ビジネス向けのポジティブで少し笑えるネタを自動生成します。">
  <title>🎤 不安な日のための朝礼ネタ自動生成ジェネレーター</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    /* ── ネタ表示 ── */
    .neta-list { display: grid; gap: 0.8rem; }
    .neta-item {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 1rem;
      position: relative;
      line-height: 1.6;
      color: var(--text);
      font-size: 0.95rem;
    }
    .neta-item .copy-btn {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; padding: 0.4rem 0.8rem;
      font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .neta-item .copy-btn:active { opacity: 0.7; }

    /* ── お気に入り表示 ── */
    .fav-card {
      background: var(--warn-bg);
      border: 1.5px solid var(--warn);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin: 0 auto 1rem;
      max-width: 600px;
      display: none;
    }
    .fav-card h3 {
      font-size: 0.9rem; font-weight: 700;
      color: var(--warn); margin-bottom: 0.5rem;
    }
    .fav-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0; font-size: 0.88rem; color: var(--text);
    }
    .fav-item .remove-btn {
      margin-left: auto;
      background: var(--warn); color: #fff;
      border: none; border-radius: 5px; padding: 0.3rem 0.6rem;
      font-size: 0.7rem; cursor: pointer;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print, .copy-btn, .remove-btn { display: none !important; }
      .card, .fav-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <!-- AdSense 必須・削除禁止・重複追加禁止（</head> の直前、ca-pub-2840085836089282） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>

</head>
<body>

  <header class="app-header">
    <h1>🎤 不安な日のための朝礼ネタ自動生成ジェネレーター</h1>
    <p class="subtitle">朝礼で話題に困ったときの救世主。不安な日も、ちょっと面白いネタで乗り切ろう。</p>
  </header>

  <button class="btn-calc" onclick="generateNeta()">✨ ネタを生成する</button>

  <!-- ネタ表示 -->
  <div class="card">
    <p class="card-title">今日の朝礼ネタ</p>
    <div class="neta-list" id="neta-container"></div>
  </div>

  <!-- お気に入り -->
  <div class="fav-card" id="fav-display">
    <h3>💚 保存済みネタ</h3>
    <div id="fav-list"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、業界トレンド・生活のコツ・雑学などをもとに、朝礼向けのポジティブで少し笑えるネタを提案しています。最新情報は公式情報をご確認ください。
  </p>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ネタリスト（最低20パターン以上）
  var NETA_LIST = [
    '朝礼ネタ: 新年度の目標達成には、「小分けにする」が秘訣。月ごと→週ごと→日ごとに下ろしていくだけで、いつのまにかクリアしてる。',
    'ネタ: GWの予定を聞かれたら「充電期間です」と答えておくと、どんな過ごし方でも大丈夫。運動もダラダラも「充電」の名の下に正当化される🔋',
    '今日のネタ: スマホの通知、全部オンにしてる人ってなぜ？例えるなら、トイレでも会議中でも「呼ばれたら返事する」状態。電話帳が電話してくるようなもん。',
    'ネタ: 書類作成の時、テンプレートから始める人と白紙から始める人。後者は「新しく作った感」が出るけど時間がかかる。実は前者が実務的🏆',
    '朝礼で: 在宅勤務のいいところ。通勤時間が0になった分、朝ご飯食べたり、スキンケアしたり、やることが増えた。結局時間は足りない😅',
    'ネタ: 部下の報告。「大丈夫ですか？」と聞かれたら、正直に「大丈夫じゃなかったら報告欄に書いてるでしょ」って言いたいけど言わない。それが大人。',
    '今日の朝礼: 無駄な会議を減らす秘訣。5分で終わる内容は「報告」でいい。30分の会議枠に無理にあわせる人、多すぎ。',
    'ネタ: パスワード。「複雑にしろ」「定期的に変えろ」「使い回すな」。企業の指示を全部守ってたら、脳が容量オーバー。ほぼ付箋に書いてる。',
    '朝礼から: 業界トレンドの話。「最近は〇〇が流行ってる」と言っても、「古い情報だ」と否定される。情報の賞味期限が3日ぐらいになってる。',
    'ネタ: 疲れた時の対策。「しっかり寝ろ」「バランスの良い食事」「適度な運動」。全部完璧にやってる人見たことない。大人は二択問題に絞られている。',
    '朝礼で: 若い人たちの仕事ぶり。デジタルツールを使いこなしてて尊敬する。ただ「Excelで計算式」とか「ショートカットキー」とか、なぜか詳しい。',
    'ネタ: メール。相手から3時間返信がないと「怒ってるのか？」と不安になるのは、ただのメール依存症。相手は多分、会議中かトイレ。',
    '朝礼から: マニュアル。「この通りやれ」と言われるけど、現場では通用しない。なぜ？マニュアルは「平均的な状況」を想定してるから。例外ばっかり。',
    'ネタ: 新しいシステムが導入される。最初は「便利だ！」。1週間後「使い方忘れた」。1ヶ月後「前のシステムの方が良かった」。これエンドレス。',
    '朝礼で: 天気の話。冬は「寒いですね」。夏は「暑いですね」。正直つまらない。でも無言で始まるより1000倍マシ。人類の知恵。',
    'ネタ: 会社の福利厚生。「健康診断」「退職金」「研修」。ありがたいんだけど、若い時に欲しいのは「有給を気軽に使わせてくれる」という福利厚生。',
    '朝礼から: 報告会。「いい質問ですね」と褒められるのは大体「一番簡単な質問」。難しい質問より「いかに簡潔に聞くか」が評価されてる。',
    'ネタ: 締め切り。1日前に「完成まであと50%です」って報告。普通は心配するけど、達成者には「大丈夫、間に合う」という謎の自信がある。',
    '朝礼で: オンライン会議。「映ってますか？」と聞きながらも、実はカメラを見てない。パソコンの画面の端っこの自分を見て、首のしわを気にしてる。',
    'ネタ: 仕事の失敗。即座に報告する人と、タイミングを見計らって報告する人がいる。結果は同じ怒られるけど、タイミング派は「上司の気分が良い時」を狙ってる知恵者。',
    '朝礼から: チームビルディング。「楽しもう！」って言われるけど、仕事の延長。本当に楽しいのは「終わってからの飲み」。そっちが本番。',
    'ネタ: 新規プロジェクト。「革新的なアイデア」と言われて期待したら、結局「既存の流れ+ちょっと違う見た目」。革新って難しい。'
  ];

  var CHAR_LIMIT = 5; // 同時表示数

  function generateNeta() {
    // ランダムにネタを複数選択
    var selected = [];
    var indices = [];
    while (selected.length < Math.min(CHAR_LIMIT, NETA_LIST.length)) {
      var idx = Math.floor(Math.random() * NETA_LIST.length);
      if (indices.indexOf(idx) === -1) {
        indices.push(idx);
        selected.push(NETA_LIST[idx]);
      }
    }

    // HTMLを生成
    var html = selected.map(function(neta, i) {
      return '<div class="neta-item">' +
             '<button class="copy-btn" onclick="copyNeta(this)">コピー</button>' +
             '<span class="neta-content">' + escapeHtml(neta) + '</span>' +
             '</div>';
    }).join('');

    document.getElementById('neta-container').innerHTML = html;
  }

  function copyNeta(btn) {
    var neta = btn.parentElement.querySelector('.neta-content').textContent;
    navigator.clipboard.writeText(neta).then(function() {
      btn.textContent = '✓ コピー済み';
      setTimeout(function() { btn.textContent = 'コピー'; }, 2000);
    });

    // お気に入りに追加
    addFavorite(neta);
  }

  function addFavorite(neta) {
    var favs = JSON.parse(localStorage.getItem('朝礼ネタ_favorites') || '[]');
    if (favs.indexOf(neta) === -1 && favs.length < 10) {
      favs.unshift(neta);
      localStorage.setItem('朝礼ネタ_favorites', JSON.stringify(favs));
      updateFavDisplay();
    }
  }

  function updateFavDisplay() {
    var favs = JSON.parse(localStorage.getItem('朝礼ネタ_favorites') || '[]');
    var display = document.getElementById('fav-display');
    var list = document.getElementById('fav-list');

    if (favs.length === 0) {
      display.style.display = 'none';
      return;
    }

    display.style.display = '';
    list.innerHTML = favs.map(function(neta, i) {
      return '<div class="fav-item">' +
             '<span>' + escapeHtml(neta) + '</span>' +
             '<button class="remove-btn" onclick="removeFavorite(' + i + ')">削除</button>' +
             '</div>';
    }).join('');
  }

  function removeFavorite(idx) {
    var favs = JSON.parse(localStorage.getItem('朝礼ネタ_favorites') || '[]');
    favs.splice(idx, 1);
    localStorage.setItem('朝礼ネタ_favorites', JSON.stringify(favs));
    updateFavDisplay();
  }

  function escapeHtml(text) {
    var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  // 初期表示
  window.addEventListener('load', function() {
    generateNeta();
    updateFavDisplay();
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
