<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="部屋の状態を6問選ぶだけで風水的な運気傾向を診断するアプリ。整理度・玄関・寝室など暮らしの基本ポイントから運気タイプと改善アドバイスがすぐ分かります。">
  <title>風水インテリア運気診断</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .q-block { margin-bottom: 1.2rem; }
    .q-block:last-child { margin-bottom: 0; }
    .q-text { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; line-height: 1.4; }
    .opt-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .opt {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.7rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt input[type="radio"] { margin-top: 0.15rem; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .opt .opt-text { font-size: 0.88rem; color: var(--text); line-height: 1.5; }
    .opt:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok   { border-color: var(--ok);   background: var(--ok-bg);   }
    .result-card.warn { border-color: var(--warn); background: var(--warn-bg); }
    .result-card.ng   { border-color: var(--ng);   background: var(--ng-bg);   }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-bottom: 0.3rem; }
    .result-card.ok   .result-value { color: var(--ok);   }
    .result-card.warn .result-value { color: var(--warn); }
    .result-card.ng   .result-value { color: var(--ng);   }
    .result-score { font-size: 2.2rem; font-weight: 900; margin-bottom: 0.4rem; letter-spacing: -0.03em; }
    .result-card.ok   .result-score { color: var(--ok); }
    .result-card.warn .result-score { color: var(--warn); }
    .result-card.ng   .result-score { color: var(--ng); }
    .result-note { font-size: 0.88rem; color: var(--text-sub); line-height: 1.6; text-align: left; margin-top: 0.8rem; }
    .advice-list { text-align: left; margin-top: 0.6rem; }
    .advice-list li { font-size: 0.88rem; color: var(--text); line-height: 1.55; margin: 0.4rem 0 0.4rem 1.2rem; }
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>風水インテリア運気診断</h1>
    <p class="subtitle">部屋の状態6問で、あなたの運気傾向と改善ポイントが分かる ※風水は伝承的な目安です</p>
  </header>

  <div class="card" id="quiz-card">
    <p class="card-title">6問にお答えください</p>
    <div id="questions"></div>
  </div>

  <button class="btn-calc" onclick="diagnose()">運気を診断する</button>

  <div class="result-card" id="result">
    <p class="result-label">診断結果</p>
    <p class="result-score" id="rs">—</p>
    <p class="result-value" id="rv">—</p>
    <p class="result-note" id="rn"></p>
    <ul class="advice-list" id="ra"></ul>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 風水は中国伝来の伝承的な環境学・住まいの考え方を参考にしています。科学的根拠のある医学・健康診断ではなく、あくまでお部屋の整え方の目安としてお楽しみください。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  var QUESTIONS = [
    {
      id: 'q1',
      q: 'Q1. 部屋全体の整理整頓状態は？',
      opts: [
        { t: 'いつもピカピカ・物の定位置あり', s: 3 },
        { t: 'おおむね片付いている', s: 2 },
        { t: '出しっぱなしが目立つ', s: 1 },
        { t: '足の踏み場が少ない', s: 0 }
      ]
    },
    {
      id: 'q2',
      q: 'Q2. 玄関の状態は？',
      opts: [
        { t: '明るく靴も整っている', s: 3 },
        { t: '普通・たまに散らかる', s: 2 },
        { t: '靴や荷物が出ている', s: 1 },
        { t: '暗くて物が積み重なっている', s: 0 }
      ]
    },
    {
      id: 'q3',
      q: 'Q3. 寝室の電子機器（TV・PC・スマホ充電器）の数は？',
      opts: [
        { t: 'なし／枕元から離している', s: 3 },
        { t: '1〜2個（必要最小限）', s: 2 },
        { t: '3〜4個ある', s: 1 },
        { t: '5個以上ある', s: 0 }
      ]
    },
    {
      id: 'q4',
      q: 'Q4. 部屋に観葉植物や生花は？',
      opts: [
        { t: '元気な観葉植物または生花がある', s: 3 },
        { t: 'フェイクグリーンを置いている', s: 2 },
        { t: '何もない', s: 1 },
        { t: '枯れた植物・しおれた花がある', s: 0 }
      ]
    },
    {
      id: 'q5',
      q: 'Q5. 鏡の置き方は？',
      opts: [
        { t: '玄関の横に明るい鏡がある', s: 3 },
        { t: '寝室・洗面所など普通の位置', s: 2 },
        { t: '玄関の真正面にある', s: 1 },
        { t: '鏡が汚れている／割れている', s: 0 }
      ]
    },
    {
      id: 'q6',
      q: 'Q6. 部屋の主な色合い・雰囲気は？',
      opts: [
        { t: '明るく自然光が入る・暖色系', s: 3 },
        { t: '白やベージュなど落ち着いた色', s: 2 },
        { t: '黒・グレーが多く暗め', s: 1 },
        { t: 'カーテンを閉めっぱなしで暗い', s: 0 }
      ]
    }
  ];

  var STORAGE_KEY = 'fengshui-interior-v1';

  function renderQuestions() {
    var html = QUESTIONS.map(function(q) {
      var opts = q.opts.map(function(o, i) {
        return '<label class="opt"><input type="radio" name="' + q.id + '" value="' + o.s + '"><span class="opt-text">' + o.t + '</span></label>';
      }).join('');
      return '<div class="q-block"><p class="q-text">' + q.q + '</p><div class="opt-list">' + opts + '</div></div>';
    }).join('');
    document.getElementById('questions').innerHTML = html;
  }

  function loadAnswers() {
    try {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!saved || !saved.answers) return;
      QUESTIONS.forEach(function(q) {
        var v = saved.answers[q.id];
        if (v == null) return;
        var radios = document.getElementsByName(q.id);
        for (var i = 0; i < radios.length; i++) {
          if (radios[i].value === String(v)) { radios[i].checked = true; break; }
        }
      });
    } catch (e) {}
  }

  function saveAnswers(ans, total) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers: ans, total: total, at: new Date().toISOString() }));
    } catch (e) {}
  }

  function diagnose() {
    var ans = {};
    var total = 0;
    var allAnswered = true;
    QUESTIONS.forEach(function(q) {
      var radios = document.getElementsByName(q.id);
      var picked = null;
      for (var i = 0; i < radios.length; i++) {
        if (radios[i].checked) { picked = parseInt(radios[i].value, 10); break; }
      }
      if (picked == null) { allAnswered = false; return; }
      ans[q.id] = picked;
      total += picked;
    });

    if (!allAnswered) {
      showResult('ng', '—', 'すべての質問にお答えください', []);
      return;
    }

    saveAnswers(ans, total);

    var level, title, note, advice;
    if (total >= 15) {
      level = 'ok';
      title = '🌟 強運タイプ（' + total + '/18点）';
      note = 'お部屋がしっかり整っており、運気を呼び込みやすい状態です。今の習慣を続けるだけで、良い流れがキープできそうです。';
      advice = [
        '月1回の換気と窓拭きを継続して気の流れを保ちましょう',
        '玄関マットを定期的に洗濯すると、さらに運気アップに',
        '季節ごとに花や植物を入れ替えると新鮮な気が入ります'
      ];
    } else if (total >= 10) {
      level = 'warn';
      title = '☀️ 上昇運タイプ（' + total + '/18点）';
      note = '基本は整っていますが、あと一歩で運気が大きく伸びる状態。ピンポイントで改善すれば流れが加速します。';
      advice = [
        '玄関と寝室の整理を最優先で見直しましょう',
        '元気な観葉植物（パキラ・サンスベリアなど）を1鉢',
        '寝室の充電器・コードを枕元から離すだけでも効果あり',
        'カーテンを開けて朝日を取り入れる習慣を'
      ];
    } else if (total >= 5) {
      level = 'warn';
      title = '🌤 標準運タイプ（' + total + '/18点）';
      note = '気の流れがやや停滞しているサイン。まずは「玄関」「寝室」「窓まわり」の3点を意識すると変化を感じやすいです。';
      advice = [
        '玄関のたたきを水拭きし、靴を3足以下に',
        '寝室の不要品を1袋分処分してみましょう',
        '枯れた植物や古い造花は処分するのがおすすめ',
        '鏡をピカピカに磨くと運気の反射が良くなります',
        '明るい色のクッションやカーテンを足してみましょう'
      ];
    } else {
      level = 'ng';
      title = '🌧 低迷運タイプ（' + total + '/18点）';
      note = '今は気の流れが詰まりやすい状態。一気に整える必要はありません。今日できる小さな1歩から始めましょう。';
      advice = [
        'まずは玄関の靴をしまうところから1分でOK',
        '寝室のスマホ充電器を枕元から離す',
        '窓を5分開けて空気を入れ替える',
        '不要品を1つだけ捨てる「1日1捨て」を習慣に',
        '汚れた鏡・割れた鏡があれば早めに対処を',
        '黒や暗い色のものを少しずつ明るい色に置き換えて'
      ];
    }

    showResult(level, total + '点', title, advice, note);
  }

  function showResult(level, score, title, advice, note) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ' + level;
    rc.style.display = 'block';
    document.getElementById('rs').textContent = score;
    document.getElementById('rv').textContent = title;
    document.getElementById('rn').textContent = note || '';
    var ul = document.getElementById('ra');
    ul.innerHTML = (advice || []).map(function(a) { return '<li>' + a + '</li>'; }).join('');
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  renderQuestions();
  loadAnswers();
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
<p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#bbb;">改善案・不具合報告はこちら</a></p>
</body>
</html>
