<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計メモ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="app">

    <header class="header">
      <h1>💴 家計メモ</h1>
      <div class="summary">
        <span id="totalCount">0件</span>
        <span class="total-amount" id="totalAmount">合計 ¥0</span>
      </div>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="labelInput"
        placeholder="用途（例：コンビニ）"
        autocomplete="off"
      >
      <div class="amount-row">
        <span class="yen">¥</span>
        <input
          type="number"
          id="amountInput"
          placeholder="金額"
          min="0"
        >
        <button class="btn btn-add" id="addBtn">追加</button>
      </div>
    </div>

    <ul class="item-list" id="itemList"></ul>

    <p class="empty-msg" id="emptyMsg">記録がありません</p>

    <div class="footer-actions">
      <button class="btn btn-clear" id="clearAllBtn">すべて削除</button>
    </div>

  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
