<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="週の空き時間と得意スキルを選ぶだけで、相性の良い副業を3つ提案する無料ジェネレーター。在宅希望・目標月収にも対応し、月収目安と最初の一歩まで分かります。">
  <title>副業マッチングジェネレーター｜空き時間×スキルで提案</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e8ddd0;
      --accent: #e07b00;
      --accent-light: #fff8ee;
      --text: #1c1917;
      --text-sub: #78716c;
      --ok: #15803d;     --ok-bg: #f0fdf4;
      --warn: #b45309;   --warn-bg: #fffbeb;
      --ng: #b91c1c;     --ng-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin-bottom: 0.35rem; }
    .field input, .field select {
      width: 100%; padding: 0.72rem 0.9rem;
      font-size: 1rem; border: 1.5px solid var(--border);
      border-radius: 9px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .field .hint { font-size: 0.72rem; color: var(--text-sub); margin-top: 0.25rem; }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }
    .skill-grid label.check-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      cursor: pointer;
    }
    .skill-grid label.check-item input { width: 16px; height: 16px; flex-shrink: 0; }
    .skill-grid label.check-item .check-text { font-size: 0.85rem; }
    .skill-grid label.check-item input[type="checkbox"]:checked ~ .check-text {
      color: var(--accent); font-weight: 700;
    }

    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 4px 0 #b35e00, 0 6px 16px rgba(224,123,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b35e00, 0 2px 8px rgba(224,123,0,0.2);
    }

    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; text-align:center; }
    .result-headline { font-size: 1.15rem; font-weight: 800; line-height: 1.4; text-align:center; margin-bottom: 0.4rem; color: var(--ok); }
    .result-note { font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; text-align:center; }

    .job-card {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 0.9rem;
      margin-top: 0.9rem;
      background: #fff;
    }
    .job-rank {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      background: var(--accent); color: #fff;
      padding: 0.18rem 0.55rem; border-radius: 99px;
      letter-spacing: 0.05em; margin-bottom: 0.4rem;
    }
    .job-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
    .job-tags { font-size: 0.74rem; color: var(--text-sub); margin-bottom: 0.55rem; }
    .job-tag { display: inline-block; background: var(--bg); padding: 0.12rem 0.5rem; border-radius: 99px; margin-right: 0.3rem; }
    .job-row { font-size: 0.86rem; line-height: 1.55; margin-top: 0.35rem; }
    .job-row b { color: var(--accent); font-size: 0.78rem; letter-spacing: 0.04em; display:block; margin-bottom: 0.1rem; }

    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282"
       crossorigin="anonymous"></script>
</head>
<body>

  <header class="app-header">
    <h1>副業マッチングジェネレーター</h1>
    <p class="subtitle">空き時間 × 得意スキル × 在宅可否で、相性のいい副業を3つ提案します</p>
  </header>

  <div class="card">
    <p class="card-title">あなたの条件</p>

    <div class="field">
      <label for="hours">週の空き時間（h）</label>
      <input type="number" id="hours" placeholder="例: 10" min="1" max="60">
      <p class="hint">無理なく副業に使える時間（1〜60h）</p>
    </div>

    <div class="field">
      <label for="place">作業場所の希望</label>
      <select id="place">
        <option value="home">完全在宅でやりたい</option>
        <option value="any">在宅でも外出でもOK</option>
        <option value="out">むしろ外で動きたい</option>
      </select>
    </div>

    <div class="field">
      <label for="goal">目標月収レンジ</label>
      <select id="goal">
        <option value="s">お小遣い（〜3万）</option>
        <option value="m" selected>月3〜10万</option>
        <option value="l">月10〜30万</option>
        <option value="xl">本業並み（30万〜）</option>
      </select>
    </div>

    <div class="field">
      <label>得意・興味あるスキル分野（複数選択可）</label>
      <div class="skill-grid" id="skillGrid"></div>
      <p class="hint">1つ以上選んでください</p>
    </div>
  </div>

  <button class="btn-calc" onclick="match()">副業を提案してもらう</button>

  <div class="result-card" id="result">
    <p class="result-label">マッチ結果 TOP3</p>
    <p class="result-headline" id="rh">—</p>
    <p class="result-note" id="rn"></p>
    <div id="jobList"></div>
  </div>

  <p class="source-note" style="max-width:600px;margin:1.6rem auto 0;padding:0.7rem 0.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:0.76rem;color:var(--text-sub);line-height:1.6;text-align:left;">
    📚 このツールは、厚生労働省・中小企業庁などの副業に関する公開資料や、一般的な副業案件・クラウドソーシング相場を参考に、目安として使いやすく整理しています。月収目安は条件・案件により大きく異なります。
  </p>

  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // ── スキル分野定義 ──
  var SKILLS = [
    { id:'write',  name:'文章・ライティング' },
    { id:'design', name:'デザイン・画像' },
    { id:'code',   name:'プログラミング' },
    { id:'video',  name:'動画編集' },
    { id:'photo',  name:'写真撮影' },
    { id:'lang',   name:'語学・翻訳' },
    { id:'teach',  name:'教える・講師' },
    { id:'sns',    name:'SNS運用' },
    { id:'office', name:'事務・データ入力' },
    { id:'craft',  name:'手芸・ハンドメイド' },
    { id:'cook',   name:'料理・お菓子' },
    { id:'drive',  name:'運転・配達' },
    { id:'body',   name:'体力・力仕事' },
    { id:'animal', name:'動物が好き' },
    { id:'kids',   name:'子どもが好き' },
    { id:'invest', name:'投資・お金の知識' }
  ];

  // ── 副業候補（条件: minH=必要週時間, place=home/out/any, income=s/m/l/xl, skills=[]） ──
  var JOBS = [
    { name:'Webライター',         skills:['write'],                 minH:5,  place:'home', income:'m',
      tags:['未経験OK','クラウド案件'],
      reason:'文章が書けて在宅でコツコツやれる人にハマります。',
      start:'クラウドワークス／ランサーズに登録 → 1記事500円〜の案件で実績作り。' },
    { name:'バナー・SNS画像デザイン', skills:['design'],              minH:5,  place:'home', income:'m',
      tags:['Canva可','単価上げやすい'],
      reason:'画像センスがあれば1案件3,000〜10,000円で時間効率◎。',
      start:'Canva/Figma で5枚ポートフォリオ → ココナラに出品。' },
    { name:'Webサイト制作・受託開発', skills:['code'],                minH:10, place:'home', income:'l',
      tags:['高単価','スキル必須'],
      reason:'コードが書ける人は時給単価が一気に跳ねます。',
      start:'実績用に小さなLP1本 → 知人案件 or レバテックフリーランス登録。' },
    { name:'動画編集（YouTube/Shorts）', skills:['video'],            minH:8,  place:'home', income:'m',
      tags:['継続案件','需要◎'],
      reason:'YouTuberの編集代行は月3〜5本で月5〜10万も狙えます。',
      start:'Premiere/DaVinci で1本サンプル → Twitterで「動画編集募集」検索。' },
    { name:'結婚式・ロケ撮影カメラマン', skills:['photo'],             minH:6,  place:'out',  income:'m',
      tags:['週末向き','機材必要'],
      reason:'外で動くのが好き＆カメラ持ちなら週末1本で5万円も。',
      start:'fotowa/ラブグラフのカメラマン審査に応募。' },
    { name:'翻訳・通訳',          skills:['lang'],                  minH:5,  place:'home', income:'m',
      tags:['語学スキル必須'],
      reason:'語学力が直接収入になる王道副業。',
      start:'Gengo / Conyac 登録 → 短文翻訳から積み上げ。' },
    { name:'オンライン講師',      skills:['teach','lang','code','invest'], minH:6, place:'home', income:'m',
      tags:['1コマ単価高め'],
      reason:'教えるのが好きな人向け。1時間2,000〜5,000円が相場。',
      start:'ストアカ / カフェトーク / マナリンク に講師登録。' },
    { name:'SNS運用代行',         skills:['sns','write','design'],  minH:8,  place:'home', income:'l',
      tags:['月額契約','ストック収入'],
      reason:'店舗・個人事業のXやInstagramを月額3〜10万で代行。',
      start:'自分のアカウントで実績作り → 中小企業に直営業 or インディード。' },
    { name:'オンライン秘書・事務代行', skills:['office'],             minH:10, place:'home', income:'m',
      tags:['安定案件','長期向き'],
      reason:'メール対応・スケジュール管理など、堅実に月3〜10万。',
      start:'CasterBiz / フジ子さん の秘書スタッフ募集に応募。' },
    { name:'minneハンドメイド販売', skills:['craft'],                minH:5,  place:'home', income:'s',
      tags:['趣味の延長','在庫リスクあり'],
      reason:'手芸・アクセサリー作りが好きならまず始められる。',
      start:'minne / Creema にショップ登録 → まず3商品出品。' },
    { name:'お菓子・パン教室／販売', skills:['cook'],                  minH:6,  place:'any',  income:'s',
      tags:['趣味の延長','要保健所許可'],
      reason:'料理が得意なら教室や委託販売で副収入に。',
      start:'菓子製造業の許可確認 → ストアカで体験レッスン出品。' },
    { name:'Uber Eats／出前館配達', skills:['drive','body'],         minH:8,  place:'out',  income:'m',
      tags:['完全シフト自由','体力勝負'],
      reason:'隙間時間にすぐ稼げる。スキル不問。',
      start:'Uber Eats／出前館の配達員登録 → 自転車 or バイクで開始。' },
    { name:'軽貨物配送（業務委託）',  skills:['drive'],                minH:15, place:'out',  income:'l',
      tags:['普通免許','本格副業'],
      reason:'時間を多く使える人なら月20万円超も現実的。',
      start:'軽貨物会社の業務委託に応募 → 開業届を提出。' },
    { name:'引越し・イベント設営バイト', skills:['body'],              minH:6,  place:'out',  income:'s',
      tags:['日払い案件','体力勝負'],
      reason:'体を動かすのが好きなら週末ガッツリ稼げます。',
      start:'タイミー／シェアフルで「設営」「引越し」検索。' },
    { name:'ペットシッター・犬の散歩代行', skills:['animal'],          minH:5,  place:'out',  income:'s',
      tags:['動物好き向け'],
      reason:'動物が好きなら近所のお宅で1回2,000〜4,000円。',
      start:'DogHuggy / ペットシッターSOSに登録 → 近所から開始。' },
    { name:'ベビーシッター・キッズ家庭教師', skills:['kids','teach'],   minH:6,  place:'out',  income:'m',
      tags:['資格あれば有利'],
      reason:'子ども好きなら1時間1,500〜3,500円で安定収入。',
      start:'キッズライン / ポピンズシッター に登録（身分証必須）。' },
    { name:'投資情報のブログ・YouTube', skills:['invest','write','video'], minH:10, place:'home', income:'l',
      tags:['ストック型','長期向き'],
      reason:'お金の知識を発信して広告収入＋アフィリエイトでストック化。',
      start:'WordPress でブログ開設 → 自分の投資体験を10記事から。' },
    { name:'note有料記事販売',    skills:['write','invest','design','code','sns'], minH:5, place:'home', income:'s',
      tags:['ノーリスク','単発OK'],
      reason:'得意分野のノウハウを300〜2,000円で販売。',
      start:'note でアカウント作成 → ノウハウを1記事まとめて販売。' },
    { name:'スキル販売（ココナラ）', skills:['design','write','code','video','sns','photo','teach','lang'],
      minH:5, place:'home', income:'m',
      tags:['幅広い案件'],
      reason:'スキル何でも商品化できる。最初の実績作りに最適。',
      start:'ココナラ会員登録 → 1サービス出品 → 安価で実績10件積む。' }
  ];

  // ── 描画：スキルチェックボックス ──
  function renderSkills() {
    var grid = document.getElementById('skillGrid');
    grid.innerHTML = SKILLS.map(function(s){
      return '<label class="check-item"><input type="checkbox" value="'+s.id+'"><span class="check-text">'+s.name+'</span></label>';
    }).join('');
  }

  // ── localStorage ──
  var STORAGE_KEY = 'sidejob_match_v1';
  function saveInput() {
    var data = {
      hours: document.getElementById('hours').value,
      place: document.getElementById('place').value,
      goal:  document.getElementById('goal').value,
      skills: getCheckedSkills()
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
  }
  function loadInput() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.hours) document.getElementById('hours').value = d.hours;
      if (d.place) document.getElementById('place').value = d.place;
      if (d.goal)  document.getElementById('goal').value  = d.goal;
      if (d.skills && d.skills.length) {
        var boxes = document.querySelectorAll('#skillGrid input[type="checkbox"]');
        for (var i=0;i<boxes.length;i++){
          if (d.skills.indexOf(boxes[i].value) >= 0) boxes[i].checked = true;
        }
      }
    } catch(e){}
  }
  function getCheckedSkills() {
    var boxes = document.querySelectorAll('#skillGrid input[type="checkbox"]:checked');
    var arr = [];
    for (var i=0;i<boxes.length;i++) arr.push(boxes[i].value);
    return arr;
  }

  // ── マッチング ──
  function match() {
    var hours = parseFloat(document.getElementById('hours').value);
    var place = document.getElementById('place').value;
    var goal  = document.getElementById('goal').value;
    var skills = getCheckedSkills();

    if (isNaN(hours) || hours <= 0) { showErr('週の空き時間を入力してください'); return; }
    if (skills.length === 0) { showErr('スキルを1つ以上選んでください'); return; }

    saveInput();

    var incomeOrder = { s:1, m:2, l:3, xl:4 };
    var goalLevel = incomeOrder[goal];

    var scored = JOBS.map(function(j){
      var score = 0;
      // スキル一致
      var matched = 0;
      for (var i=0;i<j.skills.length;i++){
        if (skills.indexOf(j.skills[i]) >= 0) matched++;
      }
      if (matched === 0) return null;
      score += matched * 30;

      // 時間
      if (hours >= j.minH) score += 25;
      else score -= (j.minH - hours) * 3;

      // 場所
      if (j.place === place) score += 20;
      else if (j.place === 'any' || place === 'any') score += 10;
      else score -= 15;

      // 目標月収との近さ
      var jLevel = incomeOrder[j.income];
      var diff = Math.abs(jLevel - goalLevel);
      score += (3 - diff) * 8;

      return { job:j, score:score, matched:matched };
    }).filter(function(x){ return x !== null; });

    scored.sort(function(a,b){ return b.score - a.score; });
    var top3 = scored.slice(0,3);

    if (top3.length === 0) {
      showErr('条件に合う候補が見つかりませんでした。スキルを増やすか時間条件を変えてみてください。');
      return;
    }
    showResult(top3, hours, place);
  }

  function showResult(top3, hours, place) {
    var rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';

    document.getElementById('rh').textContent = 'あなたに合いそうな副業 ' + top3.length + '選';
    var placeText = place === 'home' ? '在宅' : place === 'out' ? '外で動く' : '在宅／外OK';
    document.getElementById('rn').textContent = '週' + hours + '時間 × ' + placeText + ' の条件で算出しました。';

    var html = '';
    var rankLabel = ['🥇 1位','🥈 2位','🥉 3位'];
    var incomeText = { s:'〜3万円/月', m:'3〜10万円/月', l:'10〜30万円/月', xl:'30万円〜/月' };
    for (var i=0;i<top3.length;i++){
      var j = top3[i].job;
      var tags = j.tags.map(function(t){ return '<span class="job-tag">#'+t+'</span>'; }).join('');
      html += '<div class="job-card">'
            + '<span class="job-rank">'+rankLabel[i]+'</span>'
            + '<div class="job-name">'+j.name+'</div>'
            + '<div class="job-tags">'+tags+'</div>'
            + '<div class="job-row"><b>向いてる理由</b>'+j.reason+'</div>'
            + '<div class="job-row"><b>月収目安</b>'+incomeText[j.income]+'</div>'
            + '<div class="job-row"><b>最初の1歩</b>'+j.start+'</div>'
            + '</div>';
    }
    document.getElementById('jobList').innerHTML = html;

    rc.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function showErr(msg) {
    var rc = document.getElementById('result');
    rc.className = 'result-card';
    rc.style.display = 'block';
    rc.style.borderColor = 'var(--ng)';
    rc.style.background = 'var(--ng-bg)';
    document.getElementById('rh').textContent = '⚠️ 入力をご確認ください';
    document.getElementById('rh').style.color = 'var(--ng)';
    document.getElementById('rn').textContent = msg;
    document.getElementById('jobList').innerHTML = '';
  }

  // 初期化
  renderSkills();
  loadInput();
  </script>
