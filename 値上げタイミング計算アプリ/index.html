<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値上げタイミング計算アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>値上げタイミング計算</h1>
    <p class="subtitle">原価の上昇ペースから値上げすべき時期と幅を自動計算します</p>

    <section class="card">
      <h2>入力</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="currentCost">現在の原価（円）</label>
          <input type="number" id="currentCost" min="0" step="1" placeholder="例：800">
        </div>
        <div class="form-group">
          <label for="currentPrice">現在の売価（円）</label>
          <input type="number" id="currentPrice" min="0" step="1" placeholder="例：1000">
        </div>
        <div class="form-group">
          <label for="monthlyRise">月次原価上昇率（%）</label>
          <input type="number" id="monthlyRise" min="0" step="0.1" placeholder="例：1.5">
        </div>
        <div class="form-group">
          <label for="targetMargin">目標粗利率（%）</label>
          <input type="number" id="targetMargin" min="0" max="100" step="0.1" placeholder="例：20">
        </div>
      </div>
      <button id="calcBtn">計算する</button>
    </section>

    <section class="card result-card" id="resultSection" style="display:none">
      <h2>計算結果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">現在の粗利率</span>
          <span class="result-value" id="currentMarginVal">-</span>
        </div>
        <div class="result-item" id="timingBox">
          <span class="result-label">値上げ必要時期</span>
          <span class="result-value" id="timingVal">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">推奨売価</span>
          <span class="result-value" id="newPriceVal">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">値上げ幅</span>
          <span class="result-value" id="priceRiseVal">-</span>
        </div>
      </div>
      <div class="judgment" id="judgmentMsg"></div>
    </section>

    <section class="card" id="tableSection" style="display:none">
      <h2>月別推移（24ヶ月）</h2>
      <div class="table-wrap">
        <table id="trendTable">
          <thead>
            <tr>
              <th>月後</th>
              <th>原価（円）</th>
              <th>粗利率（%）</th>
              <th>状態</th>
            </tr>
          </thead>
          <tbody id="trendBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
