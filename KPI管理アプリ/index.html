<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>KPI管理アプリ</h1>
    </header>

    <!-- KPI登録フォーム -->
    <section class="card">
      <h2>KPIを登録</h2>
      <div class="form-row">
        <label>KPI名<input type="text" id="kpiName" placeholder="例：売上・訪問数"></label>
        <label>年月<input type="month" id="kpiMonth"></label>
      </div>
      <div class="form-row">
        <label>目標値<input type="number" id="kpiTarget" placeholder="例：100" min="0"></label>
        <label>実績値<input type="number" id="kpiActual" placeholder="例：85" min="0"></label>
      </div>
      <button id="addBtn" class="btn-primary">登録する</button>
    </section>

    <!-- フィルター -->
    <section class="card">
      <h2>一覧・グラフ</h2>
      <div class="filter-row">
        <label>KPI名で絞り込み
          <select id="filterName">
            <option value="">すべて</option>
          </select>
        </label>
      </div>

      <!-- 一覧テーブル -->
      <div class="table-wrap">
        <table id="kpiTable">
          <thead>
            <tr>
              <th>KPI名</th>
              <th>年月</th>
              <th>目標</th>
              <th>実績</th>
              <th>達成率</th>
              <th>前月比</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="kpiBody"></tbody>
        </table>
      </div>

      <!-- グラフ -->
      <div id="chartArea" class="chart-area" style="display:none;">
        <h3 id="chartTitle"></h3>
        <canvas id="kpiChart"></canvas>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
