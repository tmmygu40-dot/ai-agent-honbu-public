<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイバーパンク風プロンプトメーカー</title>
  <meta name="description" content="特徴3つを選ぶだけでサイバーパンク風のAI画像生成プロンプトを自動生成。夜間都市、ネオン、ロボット、グリッチなど、組み合わせ次第で無限のビジュアル表現が可能な無料メーカーです。">
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a2e;
      --border: #16213e;
      --accent: #00ff00;
      --accent-light: #1a3a1a;
      --text: #e0e0e0;
      --text-sub: #808080;
      --ok: #00ff00;     --ok-bg: #0a2a0a;
      --warn: #ffaa00;   --warn-bg: #2a2410;
      --ng: #ff0000;     --ng-bg: #2a0a0a;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,255,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 1.2rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 20px rgba(0,255,0,0.2);
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.05em; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,0,0.5); }
    .app-header .subtitle { font-size: 0.78rem; color: var(--text-sub); margin-top: 0.25rem; }

    /* ── 共通カード ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.2rem;
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 600px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      text-shadow: 0 0 5px rgba(0,255,0,0.3);
    }

    /* ── チェックボックス行 ── */
    .check-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .check-item .check-text { font-size: 0.92rem; color: var(--text); line-height: 1.4; }
    .check-item input[type="checkbox"]:checked ~ .check-text {
      text-decoration: line-through; color: var(--text-sub); opacity: 0.6;
    }

    /* ── ボタン ── */
    .btn-calc {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 1rem;
      font-size: 1.05rem; font-weight: 800;
      background: var(--accent); color: #000;
      border: 2px solid var(--accent); border-radius: var(--radius); cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,0,0.5), 0 4px 0 rgba(0,255,0,0.2);
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-calc:active {
      transform: translateY(3px);
      box-shadow: 0 0 5px rgba(0,255,0,0.3), 0 1px 0 rgba(0,255,0,0.1);
    }
    .btn-calc:hover {
      box-shadow: 0 0 20px rgba(0,255,0,0.8), 0 4px 0 rgba(0,255,0,0.4);
    }

    /* ── 結論カード ── */
    .result-card {
      display: none; background: var(--card);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem 1.2rem; box-shadow: var(--shadow);
      margin: 0 auto 1rem; max-width: 600px; text-align: center;
    }
    .result-card.ok { border-color: var(--ok); background: var(--ok-bg); box-shadow: 0 0 15px rgba(0,255,0,0.3); }
    .result-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-sub); margin-bottom: 0.4rem; }
    .result-value { font-size: 0.95rem; font-weight: 600; letter-spacing: 0; line-height: 1.6; margin-bottom: 1rem; color: var(--text); word-break: break-word; font-family: 'Courier New', monospace; }
    .result-card.ok .result-value { color: var(--accent); }

    /* ── コピーボタン ── */
    .btn-copy {
      display: block; width: 100%; max-width: 600px;
      margin: 0 auto 1.2rem; padding: 0.7rem 1rem;
      font-size: 0.95rem; font-weight: 700;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,255,0,0.2); }
    .btn-copy:active { transform: scale(0.98); }

    /* ── 広告枠 ── */
    .ad-slot {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 600px;
      min-height: 90px;
      margin: 0 auto 1.2rem; padding: 0.5rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-sub); font-size: 0.78rem;
    }

    /* ── 戻るリンク ── */
    .back-link { display: block; text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-sub); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    /* ── PDF保存ボタン ── */
    .btn-pdf {
      display: block; margin: 1.2rem auto 0; padding: 0.6rem 1.2rem;
      font-size: 0.85rem; font-weight: 700;
      background: var(--card); color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; max-width: 600px; width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 印刷/PDF出力 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-calc, .btn-copy, .back-link, #fav-widget, .ad-slot, .no-print { display: none !important; }
      .card, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .app-header { border-bottom: 2px solid #000; }
      a { color: #000; text-decoration: none; }
      @page { margin: 12mm; }
    }
  </style>
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>サイバーパンク風プロンプトメーカー</h1>
    <p class="subtitle">特徴3つ選ぶだけでサイバーパンク風AI画像プロンプト即生成</p>
  </header>

  <!-- 特徴選択カード -->
  <div class="card">
    <p class="card-title">背景・環境</p>
    <label class="check-item">
      <input type="checkbox" data-category="background">
      <span class="check-text">夜間の都市</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="background">
      <span class="check-text">ネオン光</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="background">
      <span class="check-text">雨の夜</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="background">
      <span class="check-text">ビルディング群</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="background">
      <span class="check-text">暗い路地</span>
    </label>
  </div>

  <div class="card">
    <p class="card-title">キャラクター</p>
    <label class="check-item">
      <input type="checkbox" data-category="character">
      <span class="check-text">女性キャラ</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="character">
      <span class="check-text">男性キャラ</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="character">
      <span class="check-text">ロボット</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="character">
      <span class="check-text">サイボーグ</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="character">
      <span class="check-text">人間離れした存在</span>
    </label>
  </div>

  <div class="card">
    <p class="card-title">スタイル・雰囲気</p>
    <label class="check-item">
      <input type="checkbox" data-category="style">
      <span class="check-text">高度なテック感</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="style">
      <span class="check-text">ダーク・陰気</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="style">
      <span class="check-text">鮮やかな色彩</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="style">
      <span class="check-text">グリッチ効果</span>
    </label>
    <label class="check-item">
      <input type="checkbox" data-category="style">
      <span class="check-text">映画的</span>
    </label>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-calc" onclick="generatePrompt()">⚡ プロンプト生成</button>

  <!-- 結論カード -->
  <div class="result-card" id="result">
    <p class="card-title">生成されたプロンプト</p>
    <p class="result-value" id="rv">—</p>
  </div>

  <!-- コピーボタン -->
  <button class="btn-copy" id="copyBtn" onclick="copyPrompt()" style="display:none;">📋 プロンプトをコピー</button>

  <!-- 広告枠 -->
  <div class="ad-slot" aria-label="広告枠">広告枠</div>

  <button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>

  <a class="back-link" href="../index.html">← アプリ一覧に戻る</a>

  <script>
  // 特徴テーブル
  const features = {
    background: [
      'night cityscape', 'neon-lit environment', 'rainy night', 'towering skyscrapers', 'dark alleyway'
    ],
    character: [
      'female character', 'male character', 'robot', 'cyborg', 'inhuman entity'
    ],
    style: [
      'high-tech aesthetic', 'dark and gloomy atmosphere', 'vibrant neon colors', 'glitch effects', 'cinematic'
    ]
  };

  function generatePrompt() {
    const selected = {
      background: getCheckedIndex('background'),
      character: getCheckedIndex('character'),
      style: getCheckedIndex('style')
    };

    if (selected.background === -1 || selected.character === -1 || selected.style === -1) {
      alert('背景・キャラクター・スタイルから各1つずつ選んでください');
      return;
    }

    const prompt = 'Cyberpunk, ' +
      features.background[selected.background] + ', ' +
      features.character[selected.character] + ', ' +
      features.style[selected.style] + ', ' +
      'highly detailed, 8k, masterpiece, trending on artstation';

    showResult(prompt);
  }

  function getCheckedIndex(category) {
    const checkboxes = document.querySelectorAll(`input[data-category="${category}"]:checked`);
    if (checkboxes.length === 0) return -1;
    const lastChecked = checkboxes[checkboxes.length - 1];
    const allCheckboxes = document.querySelectorAll(`input[data-category="${category}"]`);
    return Array.from(allCheckboxes).indexOf(lastChecked);
  }

  function showResult(prompt) {
    const rc = document.getElementById('result');
    rc.className = 'result-card ok';
    rc.style.display = 'block';
    document.getElementById('rv').textContent = prompt;
    document.getElementById('copyBtn').style.display = 'block';
    localStorage.setItem('cyberpromptsHistory', prompt);
  }

  function copyPrompt() {
    const text = document.getElementById('rv').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const originalText = btn.textContent;
      btn.textContent = '✅ コピーしました！';
      setTimeout(() => {
        btn.textContent = originalText;
      }, 1500);
    }).catch(err => {
      alert('コピーに失敗しました');
    });
  }

  // ページロード時に保存されたプロンプトを復元
  window.addEventListener('load', function() {
    const saved = localStorage.getItem('cyberpromptsHistory');
    if (saved) {
      document.getElementById('rv').textContent = saved;
      document.getElementById('result').className = 'result-card ok';
      document.getElementById('result').style.display = 'block';
      document.getElementById('copyBtn').style.display = 'block';
    }
  });
  </script>

  <script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script>
  <p style="text-align:center;margin:2rem 0 0.5rem;font-size:0.82rem;"><a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_2Hr02GBpDgTRbP4DmqkRAB_1Expe84k-YKV6KQyNvNAfQ/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:#999;">改善案・不具合報告はこちら</a></p>
</body>
</html>
