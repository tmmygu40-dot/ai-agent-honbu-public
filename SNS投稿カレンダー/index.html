<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿カレンダー</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://tmmygu40.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div class="container">
    <h1>SNS投稿カレンダー</h1>

    <!-- 投稿登録フォーム -->
    <section class="form-section">
      <h2>投稿を登録</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="post-date">日付</label>
          <input type="date" id="post-date">
        </div>
        <div class="form-group">
          <label for="post-platform">プラットフォーム</label>
          <select id="post-platform">
            <option value="Twitter/X">Twitter/X</option>
            <option value="Instagram">Instagram</option>
            <option value="Facebook">Facebook</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label for="post-content">投稿内容</label>
          <textarea id="post-content" placeholder="投稿内容を入力..." rows="3"></textarea>
        </div>
      </div>
      <button class="btn-primary" onclick="addPost()">登録する</button>
    </section>

    <!-- カレンダー -->
    <section class="calendar-section">
      <div class="calendar-header">
        <button class="btn-nav" onclick="changeMonth(-1)">◀</button>
        <h2 id="calendar-title"></h2>
        <button class="btn-nav" onclick="changeMonth(1)">▶</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- 投稿一覧 -->
    <section class="list-section">
      <h2>投稿一覧</h2>
      <div class="filter-row">
        <button class="btn-filter active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
        <button class="btn-filter" data-filter="pending" onclick="setFilter('pending', this)">未投稿</button>
        <button class="btn-filter" data-filter="done" onclick="setFilter('done', this)">投稿済み</button>
      </div>
      <div id="post-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
<script src="../fav-widget.js"></script></body>
</html>
