<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上進捗管理アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter=https://tmmygu40.goatcounter.com/count
          async src=//gc.zgo.at/count.js></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2840085836089282" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>売上進捗管理</h1>
    <p class="lead-desc" style="font-size:0.86rem;color:var(--text);margin-top:0.5rem;line-height:1.5;">条件を選ぶだけで結果をすぐ確認できます。チェック結果はあくまで目安としてご活用ください。</p>

    <div class="input-section">
      <div class="input-group">
        <label for="target">月間売上目標（円）</label>
        <input type="number" id="target" placeholder="例：1000000" min="0">
      </div>
      <div class="input-group">
        <label for="actual">今日までの累計実績（円）</label>
        <input type="number" id="actual" placeholder="例：650000" min="0">
      </div>
      <button id="calc-btn">計算する</button>
    </div>

    <div class="result-section" id="result-section">
      <div class="result-card achievement">
        <div class="result-label">達成率</div>
        <div class="result-value" id="rate">—</div>
      </div>
      <div class="result-card remaining">
        <div class="result-label">残り金額</div>
        <div class="result-value" id="remaining">—</div>
      </div>
      <div class="result-card progress-bar-card">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="progress-labels">
          <span>0%</span>
          <span id="progress-label">0%</span>
          <span>100%</span>
        </div>
      </div>
      <div class="result-card summary-card">
        <div class="summary-row">
          <span class="summary-label">目標</span>
          <span class="summary-val" id="disp-target">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">実績</span>
          <span class="summary-val" id="disp-actual">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">過不足</span>
          <span class="summary-val" id="disp-diff">—</span>
        </div>
      </div>
    </div>

    <button id="reset-btn" class="reset-btn">リセット</button>
  </div>

  <script src="script.js"></script>

  <div class="disclaimer" style="max-width:600px;margin:1rem auto 0;padding:0.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:0.78rem;color:#92400e;line-height:1.6;text-align:left;">
    ※ このアプリの結果はあくまで目安です。正確な判断は専門機関等にご確認ください。
  </div>

  <section class="faq-list" style="max-width:600px;margin:1.4rem auto 0;text-align:left;">
    <h2 style="font-size:0.9rem;font-weight:700;margin-bottom:0.6rem;">よくある質問</h2>
    <dl style="font-size:0.82rem;line-height:1.7;color:var(--text);">
      <dt style="font-weight:600;">Q. どのくらいの精度ですか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">一般的な参考情報をもとにしています。正確な判断は専門機関にご確認ください。</dd>
      <dt style="font-weight:600;">Q. 結果を保存できますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">「PDFで保存」ボタンから印刷・PDF保存が可能です。</dd>
      <dt style="font-weight:600;">Q. スマホでも使えますか？</dt>
      <dd style="margin:0 0 0.8rem 1rem;">はい、スマホ・タブレット・PCのブラウザでご利用いただけます。</dd>
    </dl>
  </section>
<script src="../fav-widget.js"></script>
  <script src="../related-widget.js"></script><button class="btn-pdf no-print" onclick="window.print()">📄 PDFで保存</button>
</body>
</html>
